<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">서버 유효성 검사 흐름</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="400" fill="#888" text-anchor="middle">errCode / errMsg 패턴 — 서버 오류를 클라이언트로 전달</text>

  <!-- 클라이언트 박스 -->
  <rect x="60" y="96" width="300" height="340" fill="#0e1a2a" rx="8" stroke="#2a4a7a" stroke-width="1.5"/>
  <text x="210" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">클라이언트</text>

  <!-- 클라이언트 단계들 -->
  <rect x="76" y="128" width="268" height="36" fill="#0d2137" rx="4"/>
  <text x="210" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">① 클라이언트 검증 통과</text>
  <line x1="210" y1="164" x2="210" y2="180" stroke="#555" stroke-width="1"/>
  <polygon points="206,180 210,188 214,180" fill="#555"/>

  <rect x="76" y="188" width="268" height="36" fill="#0d2137" rx="4"/>
  <text x="210" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">② transaction() 호출</text>
  <line x1="210" y1="224" x2="210" y2="240" stroke="#555" stroke-width="1"/>
  <polygon points="206,240 210,248 214,240" fill="#555"/>

  <rect x="76" y="248" width="268" height="36" fill="#111" rx="4"/>
  <text x="210" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">③ 서버 처리 대기...</text>
  <line x1="210" y1="284" x2="210" y2="300" stroke="#555" stroke-width="1"/>
  <polygon points="206,300 210,308 214,300" fill="#555"/>

  <!-- 콜백 분기 -->
  <rect x="76" y="308" width="268" height="36" fill="#111" rx="4"/>
  <text x="210" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">④ fn_saveCb(sId, nEC, sEM)</text>

  <!-- 성공 분기 -->
  <line x1="76" y1="330" x2="60" y2="376" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="60" y="376" width="120" height="44" fill="#0d1e0d" rx="4" stroke="#2a5a2a" stroke-width="1"/>
  <text x="120" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">nEC == 0</text>
  <text x="120" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">저장 성공</text>

  <!-- 실패 분기 -->
  <line x1="344" y1="330" x2="360" y2="376" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <rect x="240" y="376" width="120" height="44" fill="#1e0d0d" rx="4" stroke="#4a1e1e" stroke-width="1"/>
  <text x="300" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">nEC != 0</text>
  <text x="300" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">alert(sEM)</text>

  <!-- 서버 박스 -->
  <rect x="520" y="96" width="300" height="340" fill="#160f28" rx="8" stroke="#3a2a6a" stroke-width="1.5"/>
  <text x="670" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">서버 Adapter</text>

  <!-- 서버 단계들 -->
  <rect x="536" y="128" width="268" height="36" fill="#160f28" rx="4" stroke="#3a2a6a" stroke-width="1"/>
  <text x="670" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">① 데이터 수신</text>
  <line x1="670" y1="164" x2="670" y2="180" stroke="#555" stroke-width="1"/>
  <polygon points="666,180 670,188 674,180" fill="#555"/>

  <rect x="536" y="188" width="268" height="36" fill="#160f28" rx="4" stroke="#3a2a6a" stroke-width="1"/>
  <text x="670" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">② 비즈니스 룰 검증</text>
  <line x1="670" y1="224" x2="670" y2="240" stroke="#555" stroke-width="1"/>
  <polygon points="666,240 670,248 674,240" fill="#555"/>

  <rect x="536" y="248" width="268" height="36" fill="#160f28" rx="4" stroke="#3a2a6a" stroke-width="1"/>
  <text x="670" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">③ DB INSERT / UPDATE</text>
  <line x1="670" y1="284" x2="670" y2="300" stroke="#555" stroke-width="1"/>
  <polygon points="666,300 670,308 674,300" fill="#555"/>

  <rect x="536" y="308" width="268" height="36" fill="#160f28" rx="4" stroke="#3a2a6a" stroke-width="1"/>
  <text x="670" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">④ errCode / errMsg 응답</text>

  <!-- 양방향 화살표 -->
  <line x1="360" y1="210" x2="520" y2="210" stroke="#555" stroke-width="1.5"/>
  <polygon points="504,204 520,210 504,216" fill="#7777cc"/>
  <text x="440" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">HTTP 요청</text>

  <line x1="520" y1="330" x2="360" y2="330" stroke="#555" stroke-width="1.5" stroke-dasharray="5,4"/>
  <polygon points="376,324 360,330 376,336" fill="#7ec8e3"/>
  <text x="440" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">HTTP 응답</text>

  <!-- 서버 검증 항목 -->
  <rect x="60" y="448" width="760" height="20" fill="#0f0f0f" rx="4"/>
  <text x="440" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">서버 검증 대상: 중복 키 · 외래키 제약 · 권한 · 비즈니스 룰 · DB 트리거 · 잔액/재고 부족</text>
</svg>
