<svg width="880" height="480" viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">태그 전략 — 환경별 패턴 비교</text>
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">시맨틱 버전 · Git SHA · 날짜 · 환경 태그</text>

  <!-- Strategy cards: 2x2 grid -->

  <!-- SemVer -->
  <rect x="60" y="104" width="360" height="152" fill="#0d1117" rx="8" stroke="#7ec8e3" stroke-width="1"/>
  <text x="240" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">시맨틱 버전 (SemVer)</text>
  <rect x="80" y="140" width="320" height="72" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">myapp:1.2.3</text>
  <text x="96" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">myapp:1.2   myapp:1</text>
  <text x="96" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">myapp:latest</text>
  <text x="240" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">계층형 태그 · 사용자 친화적</text>

  <!-- Git SHA -->
  <rect x="460" y="104" width="360" height="152" fill="#0d1117" rx="8" stroke="#7777cc" stroke-width="1"/>
  <text x="640" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">Git SHA (불변 식별자)</text>
  <rect x="480" y="140" width="320" height="72" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">myapp:a1b2c3d</text>
  <text x="496" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">myapp:main-a1b2c3d</text>
  <text x="496" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># CI에서 자동 생성</text>
  <text x="640" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">재현 가능 · 자동화에 적합</text>

  <!-- Date-based -->
  <rect x="60" y="276" width="360" height="152" fill="#0d1117" rx="8" stroke="#55c555" stroke-width="1"/>
  <text x="240" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">날짜 기반</text>
  <rect x="80" y="312" width="320" height="72" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">myapp:2026-05-12</text>
  <text x="96" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">myapp:20260512</text>
  <text x="96" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 일정 배포 환경에 적합</text>
  <text x="240" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">시간 기반 롤백 · 일별 릴리즈</text>

  <!-- Environment-based -->
  <rect x="460" y="276" width="360" height="152" fill="#0d1117" rx="8" stroke="#e05555" stroke-width="1"/>
  <text x="640" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">환경 태그 (주의 필요)</text>
  <rect x="480" y="312" width="320" height="72" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">myapp:prod</text>
  <text x="496" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">myapp:staging</text>
  <text x="496" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">myapp:dev  myapp:canary</text>
  <text x="640" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">가변적 — Digest와 함께 사용 권장</text>

  <!-- Recommendation -->
  <rect x="60" y="446" width="760" height="26" fill="#111820" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="463" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">권장: SemVer 태그 + Git SHA 태그 병행 사용 — 사람이 읽기 쉽고 자동화도 안전</text>
</svg>
