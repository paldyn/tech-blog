<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Java 컬렉션 프레임워크 계층 구조</text>

  <defs>
    <marker id="inherit" viewBox="0 0 14 14" refX="7" refY="13" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 1 13 L 7 1 L 13 13 z" fill="none" stroke="#7777cc" stroke-width="1.5"/>
    </marker>
    <marker id="impl" viewBox="0 0 14 14" refX="7" refY="13" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 1 13 L 7 1 L 13 13 z" fill="none" stroke="#55c555" stroke-width="1.5"/>
    </marker>
  </defs>

  <!-- Iterable -->
  <rect x="360" y="64" width="160" height="34" fill="#1e1b4b" rx="6" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="86" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#a5b4fc" text-anchor="middle">Iterable&lt;E&gt;</text>

  <!-- Collection -->
  <rect x="360" y="128" width="160" height="34" fill="#1e1b4b" rx="6" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#a5b4fc" text-anchor="middle">Collection&lt;E&gt;</text>
  <line x1="440" y1="98" x2="440" y2="128" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#inherit)"/>

  <!-- List, Set, Queue -->
  <rect x="100" y="200" width="140" height="34" fill="#0d1a2a" rx="6" stroke="#7ec8e3" stroke-width="2"/>
  <text x="170" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">List&lt;E&gt;</text>

  <rect x="360" y="200" width="160" height="34" fill="#0d1a2a" rx="6" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Set&lt;E&gt;</text>

  <rect x="640" y="200" width="140" height="34" fill="#0d1a2a" rx="6" stroke="#7ec8e3" stroke-width="2"/>
  <text x="710" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Queue&lt;E&gt;</text>

  <line x1="360" y1="162" x2="170" y2="200" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#inherit)"/>
  <line x1="440" y1="162" x2="440" y2="200" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#inherit)"/>
  <line x1="520" y1="162" x2="710" y2="200" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#inherit)"/>

  <!-- List implementations -->
  <rect x="40" y="290" width="120" height="34" fill="#081a08" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="100" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">ArrayList</text>

  <rect x="180" y="290" width="120" height="34" fill="#081a08" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="240" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">LinkedList</text>

  <line x1="100" y1="234" x2="100" y2="290" stroke="#55c555" stroke-width="1.5" marker-end="url(#impl)"/>
  <line x1="170" y1="234" x2="240" y2="290" stroke="#55c555" stroke-width="1.5" marker-end="url(#impl)"/>

  <!-- Set implementations -->
  <rect x="340" y="290" width="120" height="34" fill="#081a08" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="400" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">HashSet</text>

  <rect x="480" y="290" width="120" height="34" fill="#081a08" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="540" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">TreeSet</text>

  <line x1="400" y1="234" x2="400" y2="290" stroke="#55c555" stroke-width="1.5" marker-end="url(#impl)"/>
  <line x1="480" y1="234" x2="540" y2="290" stroke="#55c555" stroke-width="1.5" marker-end="url(#impl)"/>

  <!-- Queue implementations -->
  <rect x="630" y="290" width="100" height="34" fill="#081a08" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="680" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">PriorityQueue</text>

  <rect x="750" y="290" width="90" height="34" fill="#081a08" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="795" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">ArrayDeque</text>

  <line x1="680" y1="234" x2="680" y2="290" stroke="#55c555" stroke-width="1.5" marker-end="url(#impl)"/>
  <line x1="740" y1="234" x2="795" y2="290" stroke="#55c555" stroke-width="1.5" marker-end="url(#impl)"/>

  <!-- Map (separate) -->
  <rect x="340" y="376" width="200" height="34" fill="#1a1000" rx="6" stroke="#ce9178" stroke-width="2"/>
  <text x="440" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">Map&lt;K, V&gt;</text>
  <text x="440" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Collection 계층 별도 — 키-값 쌍</text>

  <rect x="260" y="444" width="120" height="30" fill="#1a0a00" rx="5" stroke="#ce9178" stroke-width="1"/>
  <text x="320" y="463" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" text-anchor="middle">HashMap</text>

  <rect x="400" y="444" width="120" height="30" fill="#1a0a00" rx="5" stroke="#ce9178" stroke-width="1"/>
  <text x="460" y="463" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" text-anchor="middle">TreeMap</text>

  <rect x="540" y="444" width="140" height="30" fill="#1a0a00" rx="5" stroke="#ce9178" stroke-width="1"/>
  <text x="610" y="463" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" text-anchor="middle">LinkedHashMap</text>

  <line x1="380" y1="410" x2="320" y2="444" stroke="#ce9178" stroke-width="1.5"/>
  <line x1="440" y1="410" x2="460" y2="444" stroke="#ce9178" stroke-width="1.5"/>
  <line x1="500" y1="410" x2="610" y2="444" stroke="#ce9178" stroke-width="1.5"/>

  <!-- Legend -->
  <line x1="40" y1="430" x2="80" y2="430" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="88" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#9aa4b8">extends(인터페이스)</text>
  <line x1="40" y1="450" x2="80" y2="450" stroke="#55c555" stroke-width="1.5"/>
  <text x="88" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#9aa4b8">implements(클래스)</text>
</svg>
