<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">RLS 구현 — 멀티 테넌트 행 격리</text>

  <!-- App user sends SELECT -->
  <rect x="60" y="72" width="200" height="48" rx="6" fill="#101030" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="93" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">앱 사용자 (TenantA)</text>
  <text x="160" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">SELECT * FROM Orders</text>

  <line x1="260" y1="96" x2="320" y2="96" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- SQL Engine inserts predicate -->
  <rect x="320" y="72" width="240" height="48" rx="6" fill="#0d1e2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="93" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">SQL 엔진 — RLS 술어 삽입</text>
  <text x="440" y="111" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888">AND fn_filter(TenantID)</text>

  <line x1="560" y1="96" x2="620" y2="96" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Filtered result -->
  <rect x="620" y="72" width="200" height="48" rx="6" fill="#0a1a0e" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="93" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">TenantA 행만 반환</text>
  <text x="720" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">TenantB 행은 보이지 않음</text>

  <!-- Full implementation -->
  <rect x="60" y="148" width="760" height="220" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">-- 1. 필터 술어 함수</text>
  <text x="76" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">CREATE FUNCTION Security.fn_TenantFilter</text>
  <text x="76" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  (@TenantID INT) RETURNS TABLE WITH SCHEMABINDING</text>
  <text x="76" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">AS RETURN SELECT 1 AS r</text>
  <text x="76" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  WHERE @TenantID = CAST(SESSION_CONTEXT(N'TenantID') AS INT);</text>
  <text x="76" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">-- 2. 보안 정책 생성</text>
  <text x="76" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">CREATE SECURITY POLICY TenantPolicy</text>
  <text x="76" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  ADD FILTER PREDICATE Security.fn_TenantFilter(TenantID)</text>
  <text x="76" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">    ON dbo.Orders</text>
  <text x="76" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  WITH (STATE = ON);</text>
  <text x="76" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">-- 앱에서: EXEC sp_set_session_context N'TenantID', 5;</text>

  <text x="440" y="384" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">SESSION_CONTEXT: 연결별 컨텍스트 값 저장 — 앱 로그인 시 설정</text>
</svg>
