<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-skip" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8c84a"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">git bisect skip — 테스트 불가 커밋 건너뛰기</text>

  <!-- Timeline row -->
  <text x="60" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">탐색 범위 안에 컴파일 불가 커밋이 포함된 경우</text>

  <!-- Commits -->
  <circle cx="90" cy="135" r="20" fill="#1a3a1a" stroke="#55c555" stroke-width="2"/>
  <text x="90" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">good</text>

  <line x1="110" y1="135" x2="146" y2="135" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <circle cx="166" cy="135" r="20" fill="#1a1a1a" stroke="#888" stroke-width="2"/>
  <text x="166" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">C2</text>

  <line x1="186" y1="135" x2="222" y2="135" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Skip commit -->
  <circle cx="242" cy="135" r="20" fill="#1a160a" stroke="#e8c84a" stroke-width="2.5"/>
  <text x="242" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8c84a" font-weight="700" text-anchor="middle">SKIP</text>
  <text x="242" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e8c84a" text-anchor="middle">컴파일 실패</text>

  <!-- Skip arc -->
  <path d="M 262 135 Q 302 100 342 135" fill="none" stroke="#e8c84a"
        stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-skip)"/>

  <circle cx="362" cy="135" r="20" fill="#1a1a1a" stroke="#888" stroke-width="2"/>
  <text x="362" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">C4</text>

  <line x1="382" y1="135" x2="418" y2="135" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Bug commit -->
  <circle cx="438" cy="135" r="20" fill="#3a1a1a" stroke="#e05555" stroke-width="2.5"/>
  <text x="438" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555" font-weight="700" text-anchor="middle">버그</text>
  <text x="438" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555" text-anchor="middle">도입</text>

  <line x1="458" y1="135" x2="494" y2="135" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <circle cx="514" cy="135" r="20" fill="#3a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="514" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">bad</text>

  <line x1="534" y1="135" x2="570" y2="135" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <circle cx="590" cy="135" r="20" fill="#3a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="590" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">bad</text>

  <line x1="610" y1="135" x2="646" y2="135" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <circle cx="666" cy="135" r="20" fill="#3a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="666" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">HEAD</text>

  <!-- Result note -->
  <rect x="60" y="180" width="760" height="52" rx="8" fill="#14120a" stroke="#e8c84a" stroke-width="1"/>
  <text x="80" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8c84a" font-weight="600">bisect skip 결과:</text>
  <text x="220" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">skip된 커밋 근처에서 버그가 도입된 경우 정확한 커밋 대신 범위를 알려줌</text>
  <text x="80" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">"There are only 'skip'ped commits left to test." → 후보 커밋 목록 제공</text>

  <!-- Code block -->
  <rect x="60" y="252" width="760" height="170" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="275" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 현재 체크아웃된 커밋 건너뛰기</text>
  <text x="76" y="295" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git bisect skip</text>

  <text x="76" y="321" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 특정 커밋 SHA 건너뛰기</text>
  <text x="76" y="341" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git bisect skip abc1234</text>

  <text x="76" y="367" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 커밋 범위 건너뛰기</text>
  <text x="76" y="387" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git bisect skip abc1234..def5678</text>

  <text x="76" y="407" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># bisect run에서 exit 125로 자동 skip</text>
</svg>
