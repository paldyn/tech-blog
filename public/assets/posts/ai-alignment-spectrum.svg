<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-right" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <linearGradient id="spectrum-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e05555"/>
      <stop offset="50%" stop-color="#e0a055"/>
      <stop offset="100%" stop-color="#55c555"/>
    </linearGradient>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">AI 정렬 스펙트럼</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">인간의 가치와 AI 목표가 얼마나 일치하는가</text>

  <!-- Spectrum bar -->
  <rect x="80" y="110" width="720" height="36" rx="8" fill="url(#spectrum-grad)" opacity="0.85"/>
  <text x="80" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">비정렬</text>
  <text x="440" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e0a055" text-anchor="middle">부분 정렬</text>
  <text x="800" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">완전 정렬</text>

  <!-- Left: Misalignment examples -->
  <text x="80" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e05555">비정렬 사례</text>

  <!-- Box 1 -->
  <rect x="60" y="220" width="230" height="68" rx="8" fill="#1a1010" stroke="#e05555" stroke-width="1"/>
  <text x="78" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">보상 해킹 (Reward Hacking)</text>
  <text x="78" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">목표 지표를 왜곡해 최대화</text>
  <text x="78" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">예: 게임 버그 악용, 지표 조작</text>

  <!-- Box 2 -->
  <rect x="60" y="302" width="230" height="68" rx="8" fill="#1a1010" stroke="#e05555" stroke-width="1"/>
  <text x="78" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">명세 게임 (Spec Gaming)</text>
  <text x="78" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">규칙 문자 준수 ≠ 의도 준수</text>
  <text x="78" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">예: 청소 로봇이 카메라 가림</text>

  <!-- Box 3 -->
  <rect x="60" y="384" width="230" height="68" rx="8" fill="#1a1010" stroke="#e05555" stroke-width="1"/>
  <text x="78" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">목표 오해석 (Misspecification)</text>
  <text x="78" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">인간 의도를 잘못 학습</text>
  <text x="78" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">예: 클릭률 최적화 → 낚시성</text>

  <!-- Right: Alignment goals -->
  <text x="590" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">정렬 목표</text>

  <!-- Goal Box 1 -->
  <rect x="570" y="220" width="250" height="68" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="588" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">무해성 (Harmlessness)</text>
  <text x="588" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">사람 또는 사회를 해치지 않음</text>
  <text x="588" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">직접·간접 피해 모두 포함</text>

  <!-- Goal Box 2 -->
  <rect x="570" y="302" width="250" height="68" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="588" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">정직성 (Honesty)</text>
  <text x="588" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">사실만 말하고 속이지 않음</text>
  <text x="588" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">불확실할 때 불확실성 고지</text>

  <!-- Goal Box 3 -->
  <rect x="570" y="384" width="250" height="68" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="588" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">유용성 (Helpfulness)</text>
  <text x="588" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">인간의 실제 필요를 충족</text>
  <text x="588" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">단기·장기 이익 균형</text>

  <!-- Center arrow indicating alignment direction -->
  <line x1="310" y1="338" x2="555" y2="338" stroke="#7ec8e3" stroke-width="2"
        marker-end="url(#arr-right)" stroke-dasharray="5,3"/>
  <text x="432" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">정렬 기술 적용</text>
</svg>
