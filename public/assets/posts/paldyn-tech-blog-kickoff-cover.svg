<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">PALDYN 기술블로그 킥오프</title>
  <desc id="desc">기록과 지식을 팀 자산으로 축적하는 과정을 표현한 커버 이미지</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="630" fill="url(#bg)"/>
  <rect x="32" y="32" width="1136" height="566" rx="24" fill="none" stroke="#94a3b8" stroke-width="2"/>

  <text x="80" y="132" fill="#0f172a" font-size="30" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" letter-spacing="6">PALDYN TECH BLOG</text>
  <text x="80" y="194" fill="#020617" font-size="56" font-weight="700" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif">기록과 지식을 팀 자산으로</text>

  <g transform="translate(80 280)">
    <rect width="300" height="180" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="24" y="58" fill="#0f172a" font-size="24" font-weight="600" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif">실무 경험</text>
    <text x="24" y="98" fill="#334155" font-size="18" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif">문제, 실패, 개선 포인트</text>
  </g>

  <g transform="translate(450 280)">
    <rect width="300" height="180" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="24" y="58" fill="#0f172a" font-size="24" font-weight="600" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif">문서화</text>
    <text x="24" y="98" fill="#334155" font-size="18" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif">근거와 기준을 명확히 정리</text>
  </g>

  <g transform="translate(820 280)">
    <rect width="300" height="180" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="24" y="58" fill="#0f172a" font-size="24" font-weight="600" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif">팀 자산</text>
    <text x="24" y="98" fill="#334155" font-size="18" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif">재사용 가능한 지식 축적</text>
  </g>

  <path d="M390 370H430" stroke="url(#line)" stroke-width="4" stroke-linecap="round"/>
  <path d="M760 370H800" stroke="url(#line)" stroke-width="4" stroke-linecap="round"/>
  <polygon points="430,370 414,361 414,379" fill="#0f172a"/>
  <polygon points="800,370 784,361 784,379" fill="#0f172a"/>

  <text x="80" y="544" fill="#334155" font-size="22" font-family="Pretendard, Apple SD Gothic Neo, Noto Sans KR, sans-serif">
    Learn in production. Share with context. Improve as a team.
  </text>
</svg>
