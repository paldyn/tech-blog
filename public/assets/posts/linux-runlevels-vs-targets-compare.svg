<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SysV 런레벨 vs systemd 타겟</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">대응 관계와 현대적 전환</text>

  <!-- SysV column header -->
  <rect x="60" y="90" width="340" height="40" rx="6" fill="#2a1a1a" stroke="#6a3a3a" stroke-width="1.5"/>
  <text x="230" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">SysV 런레벨 (구버전)</text>

  <!-- systemd column header -->
  <rect x="480" y="90" width="340" height="40" rx="6" fill="#0d1a2e" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="650" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">systemd 타겟 (현재)</text>

  <!-- Row 0 -->
  <rect x="60" y="148" width="340" height="42" rx="4" fill="#1a1010" stroke="#3a2a2a" stroke-width="1"/>
  <text x="230" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">런레벨 0</text>
  <text x="230" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">시스템 종료 (halt)</text>

  <line x1="400" y1="169" x2="480" y2="169" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <rect x="480" y="148" width="340" height="42" rx="4" fill="#0d1a2e" stroke="#3a6ea8" stroke-width="1"/>
  <text x="650" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">poweroff.target</text>
  <text x="650" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">전원 차단</text>

  <!-- Row 1 -->
  <rect x="60" y="206" width="340" height="42" rx="4" fill="#1a1010" stroke="#3a2a2a" stroke-width="1"/>
  <text x="230" y="223" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">런레벨 1</text>
  <text x="230" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">단일 사용자 (복구)</text>

  <line x1="400" y1="227" x2="480" y2="227" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <rect x="480" y="206" width="340" height="42" rx="4" fill="#0d1a2e" stroke="#3a6ea8" stroke-width="1"/>
  <text x="650" y="223" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">rescue.target</text>
  <text x="650" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">복구 모드 (root 쉘)</text>

  <!-- Row 2/3 -->
  <rect x="60" y="264" width="340" height="42" rx="4" fill="#1a1010" stroke="#3a2a2a" stroke-width="1"/>
  <text x="230" y="281" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">런레벨 2 / 3 / 4</text>
  <text x="230" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">멀티유저 (텍스트)</text>

  <line x1="400" y1="285" x2="480" y2="285" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <rect x="480" y="264" width="340" height="42" rx="4" fill="#0d1a2e" stroke="#3a6ea8" stroke-width="1"/>
  <text x="650" y="281" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">multi-user.target</text>
  <text x="650" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">네트워크 O, GUI X</text>

  <!-- Row 5 -->
  <rect x="60" y="322" width="340" height="42" rx="4" fill="#1a1010" stroke="#3a2a2a" stroke-width="1"/>
  <text x="230" y="339" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">런레벨 5</text>
  <text x="230" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">멀티유저 + GUI (X11)</text>

  <line x1="400" y1="343" x2="480" y2="343" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <rect x="480" y="322" width="340" height="42" rx="4" fill="#1a2a1a" stroke="#3a6a3a" stroke-width="1.5"/>
  <text x="650" y="339" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">graphical.target ★ 기본</text>
  <text x="650" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">GUI 포함 완전한 부팅</text>

  <!-- Row 6 -->
  <rect x="60" y="380" width="340" height="42" rx="4" fill="#1a1010" stroke="#3a2a2a" stroke-width="1"/>
  <text x="230" y="397" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">런레벨 6</text>
  <text x="230" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">재부팅 (reboot)</text>

  <line x1="400" y1="401" x2="480" y2="401" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <rect x="480" y="380" width="340" height="42" rx="4" fill="#0d1a2e" stroke="#3a6ea8" stroke-width="1"/>
  <text x="650" y="397" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">reboot.target</text>
  <text x="650" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">시스템 재시작</text>

  <!-- Note -->
  <rect x="60" y="440" width="760" height="40" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="465" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">systemd는 /lib/systemd/system/runlevel*.target → .target 심볼릭 링크로 SysV 호환성 유지</text>
</svg>
