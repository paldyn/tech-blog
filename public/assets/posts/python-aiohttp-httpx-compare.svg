<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">aiohttp vs httpx</text>

  <rect x="60" y="90" width="360" height="240" fill="#11161f" stroke="#7ec8e3" stroke-width="1.5" rx="10"/>
  <text x="240" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="600" fill="#7ec8e3">aiohttp</text>
  <text x="84" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">• 비동기 전용 (async only)</text>
  <text x="84" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">• 클라이언트 + 서버 모두 제공</text>
  <text x="84" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">• 오랜 역사, 생태계 풍부</text>
  <text x="84" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">• 웹소켓 지원</text>
  <text x="84" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">대량 동시 요청 서버에 강점</text>

  <rect x="460" y="90" width="360" height="240" fill="#11161f" stroke="#55c555" stroke-width="1.5" rx="10"/>
  <text x="640" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="600" fill="#55c555">httpx</text>
  <text x="484" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">• 동기 + 비동기 모두 지원</text>
  <text x="484" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">• requests 와 유사한 API</text>
  <text x="484" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">• HTTP/2 기본 지원</text>
  <text x="484" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">• 클라이언트 중심</text>
  <text x="484" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">requests 에서 옮겨오기 쉬움</text>
</svg>
