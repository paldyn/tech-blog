<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="320" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="ci_arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">순환 임포트: 서로를 import하면 막힌다</text>

  <!-- box a -->
  <rect x="120" y="130" width="200" height="80" rx="10" fill="#101622" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="220" y="166" font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">a.py</text>
  <text x="220" y="190" font-size="12.5" fill="#888" text-anchor="middle">User 클래스 정의</text>

  <!-- box b -->
  <rect x="560" y="130" width="200" height="80" rx="10" fill="#101622" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="660" y="166" font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">b.py</text>
  <text x="660" y="190" font-size="12.5" fill="#888" text-anchor="middle">Order 클래스 정의</text>

  <!-- top arrow a->b -->
  <path d="M 320 150 C 410 110, 470 110, 560 150" fill="none" stroke="#e05555" stroke-width="2" marker-end="url(#ci_arr)"/>
  <text x="440" y="104" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" text-anchor="middle">import b</text>

  <!-- bottom arrow b->a -->
  <path d="M 560 190 C 470 230, 410 230, 320 190" fill="none" stroke="#e05555" stroke-width="2" marker-end="url(#ci_arr)"/>
  <text x="440" y="252" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" text-anchor="middle">import a</text>

  <text x="440" y="296" font-size="13" fill="#e05555" text-anchor="middle">한쪽이 아직 로드 중일 때 다른 쪽이 그 이름을 찾음 → ImportError</text>
</svg>
