<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Virtual Thread 생성 API 전체 정리</text>

  <!-- Method 1 -->
  <rect x="60" y="72" width="360" height="100" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Thread.ofVirtual().start()</text>
  <text x="240" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">이름·데몬 여부 설정 후 즉시 시작</text>
  <rect x="76" y="122" width="328" height="40" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">var</tspan><tspan fill="#ffffff"> t = Thread.ofVirtual()</tspan>
  </text>
  <text x="96" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">    .name(</tspan><tspan fill="#ce9178">"vt-handler"</tspan><tspan fill="#ffffff">).start(task);</tspan>
  </text>

  <!-- Method 2 -->
  <rect x="460" y="72" width="360" height="100" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Thread.startVirtualThread()</text>
  <text x="640" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">가장 간결한 단순 시작</text>
  <rect x="476" y="122" width="328" height="40" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="145" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">var</tspan><tspan fill="#ffffff"> t = Thread.startVirtualThread(task);</tspan>
  </text>

  <!-- Method 3 -->
  <rect x="60" y="196" width="360" height="120" rx="8" fill="#0f1a2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">newVirtualThreadPerTaskExecutor()</text>
  <text x="240" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">작업마다 새 VT — 권장 방식</text>
  <rect x="76" y="246" width="328" height="60" rx="4" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="96" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">try</tspan><tspan fill="#ffffff"> (</tspan><tspan fill="#7ec8e3" font-weight="600">var</tspan><tspan fill="#ffffff"> ex =</tspan>
  </text>
  <text x="96" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">    Executors.newVirtualThreadPerTaskExecutor()) {</tspan>
  </text>
  <text x="96" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">    ex.submit(task); }</tspan>
  </text>

  <!-- Method 4 -->
  <rect x="460" y="196" width="360" height="120" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">ThreadFactory 방식</text>
  <text x="640" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">기존 프레임워크에 주입</text>
  <rect x="476" y="246" width="328" height="60" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">var</tspan><tspan fill="#ffffff"> factory =</tspan>
  </text>
  <text x="496" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">    Thread.ofVirtual().factory();</tspan>
  </text>
  <text x="496" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">    factory.newThread(task).start();</tspan>
  </text>

  <!-- Bottom tips -->
  <rect x="60" y="340" width="760" height="96" rx="6" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Virtual Thread 특성 확인</text>
  <text x="440" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">thread.isVirtual()  →  true</text>
  <text x="440" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">thread.isDaemon()   →  항상 true (Virtual Thread는 항상 데몬)</text>
  <text x="440" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">thread.getPriority() →  항상 NORM_PRIORITY (설정 불가)</text>
  <text x="440" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">join(Duration) / join()으로 완료 대기 — interrupt()로 취소 가능</text>
</svg>
