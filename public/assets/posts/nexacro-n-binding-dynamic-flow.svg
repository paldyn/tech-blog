<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">동적 바인딩 패턴</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">런타임에 Dataset / 컬럼 교체</text>

  <!-- Scenario 1: Dataset 교체 -->
  <rect x="60" y="96" width="360" height="160" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">시나리오 1 — Dataset 교체</text>
  <!-- dsA / dsB -->
  <rect x="80" y="132" width="80" height="36" rx="6" fill="#0d1117" stroke="#7ec8e3" stroke-width="1"/>
  <text x="120" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">dsA</text>
  <rect x="200" y="132" width="80" height="36" rx="6" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">dsB</text>
  <!-- Arrow to Grid -->
  <polygon points="300,150 320,144 320,156" fill="#55c555"/>
  <line x1="280" y1="150" x2="320" y2="150" stroke="#55c555" stroke-width="2"/>
  <rect x="320" y="132" width="80" height="36" rx="6" fill="#0d1117" stroke="#55c555" stroke-width="1"/>
  <text x="360" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">Grid</text>
  <text x="360" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">binddataset</text>
  <!-- Code snippet -->
  <rect x="80" y="182" width="300" height="60" rx="4" fill="#000000" stroke="#3a4a6e"/>
  <text x="90" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">// 탭 전환 시 Grid Dataset 교체</text>
  <text x="90" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">this</text><text x="120" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">.grdMain.set_binddataset(</text>
  <text x="90" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">    "ds" + tabName</text><text x="210" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">);</text>

  <!-- Scenario 2: 컬럼 교체 -->
  <rect x="460" y="96" width="360" height="160" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">시나리오 2 — value 컬럼 교체</text>
  <!-- Edit showing different columns -->
  <rect x="480" y="132" width="300" height="36" rx="6" fill="#0d1117" stroke="#7ec8e3" stroke-width="1"/>
  <text x="630" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">Edit → NAME 표시 중</text>
  <text x="630" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">→ 버튼 클릭 후 CODE로 교체</text>
  <!-- Code snippet -->
  <rect x="480" y="182" width="320" height="60" rx="4" fill="#000000" stroke="#3a4a6e"/>
  <text x="492" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">// 언어 전환 시 표시 컬럼 교체</text>
  <text x="492" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">var</text><text x="516" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff"> col = (lang==</text><text x="612" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">"EN"</text><text x="642" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">)?</text><text x="658" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">"NM_EN"</text><text x="708" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">:</text><text x="714" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">"NM_KO"</text><text x="764" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">;</text>
  <text x="492" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"><tspan fill="#7ec8e3">this</tspan><tspan fill="#ffffff">.cboItem.set_datacolumn(col);</tspan></text>

  <!-- Unbind / re-bind pattern -->
  <rect x="60" y="278" width="760" height="154" rx="8" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">대량 데이터 채울 때 — 바인딩 해제 후 재연결</text>
  <rect x="80" y="312" width="720" height="106" rx="4" fill="#000000" stroke="#3a4a6e"/>
  <text x="96" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 바인딩 해제 → 데이터 채움 → 재연결 (화면 깜빡임 방지)</text>
  <text x="96" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">this</tspan><tspan fill="#ffffff">.grdMain.set_binddataset(</tspan><tspan fill="#ce9178">""</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="96" y="370" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// ... 수만 행 addRow 루프 ...</text>
  <text x="96" y="388" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">this</tspan><tspan fill="#ffffff">.grdMain.set_binddataset(</tspan><tspan fill="#ce9178">"dsMain"</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="96" y="406" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 재연결 시점에 한 번만 렌더링</text>
</svg>
