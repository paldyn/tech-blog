<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">DB Operator 패턴 — Stateful 앱 관리</text>

  <!-- Operator box -->
  <rect x="340" y="70" width="200" height="70" rx="10" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">DB Operator</text>
  <text x="440" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">CRD + Controller</text>
  <text x="440" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">PostgresCluster / MysqlCluster 등</text>

  <!-- Arrow to StatefulSet -->
  <line x1="340" y1="108" x2="248" y2="148" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- StatefulSet box -->
  <rect x="60" y="152" width="188" height="64" rx="8" fill="#0f1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="154" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">StatefulSet</text>
  <text x="154" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Primary + Replicas</text>
  <text x="154" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">순차 배포 보장</text>

  <!-- Arrow to Services -->
  <line x1="440" y1="140" x2="440" y2="156" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Services box -->
  <rect x="348" y="160" width="184" height="64" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">서비스 관리</text>
  <text x="440" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">read/write 엔드포인트 분리</text>
  <text x="440" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">HeadlessService + ClusterIP</text>

  <!-- Arrow to Backup -->
  <line x1="540" y1="108" x2="632" y2="148" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Backup/Restore box -->
  <rect x="632" y="152" width="188" height="64" rx="8" fill="#0f1a2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="726" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">백업 / 복원 자동화</text>
  <text x="726" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">스냅샷 스케줄</text>
  <text x="726" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">PITR(Point-In-Time Recovery)</text>

  <!-- PVC grid: 3 PVCs for StatefulSet -->
  <rect x="60" y="246" width="186" height="90" rx="6" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="153" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">자동 생성 PVC</text>
  <rect x="70" y="278" width="50" height="28" rx="4" fill="#0f2a0f" stroke="#55c555" stroke-width="1"/>
  <text x="95" y="297" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">data-0</text>
  <rect x="130" y="278" width="50" height="28" rx="4" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="155" y="297" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3">data-1</text>
  <rect x="190" y="278" width="50" height="28" rx="4" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="215" y="297" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3">data-2</text>
  <text x="153" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">각 Pod 독립 스토리지</text>

  <!-- Operators list -->
  <rect x="280" y="260" width="560" height="130" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="560" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">주요 DB Operator</text>

  <text x="360" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">PostgreSQL</text>
  <text x="360" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">CloudNativePG</text>
  <text x="360" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Zalando Postgres-Operator</text>
  <text x="360" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">PGO (Crunchy Data)</text>

  <text x="560" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">MySQL / Redis</text>
  <text x="560" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">MySQL Operator (Oracle)</text>
  <text x="560" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Vitess (PlanetScale)</text>
  <text x="560" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Redis Operator (Spotahome)</text>

  <text x="760" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Kafka / Elasticsearch</text>
  <text x="760" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Strimzi (Kafka)</text>
  <text x="760" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">ECK (Elastic)</text>
  <text x="760" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">CassKop (Instaclustr)</text>

  <line x1="462" y1="270" x2="462" y2="382" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="662" y1="270" x2="662" y2="382" stroke="#2a2a2a" stroke-width="1"/>
</svg>
