<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">주요 AI 규제 비교</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">EU · 미국 · 중국 · 한국의 AI 거버넌스 접근법</text>

  <!-- EU AI Act -->
  <rect x="60" y="96" width="380" height="168" rx="10" fill="#100d1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="80" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7777cc">🇪🇺 EU AI Act (2024)</text>
  <text x="80" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">세계 첫 포괄적 AI 법률</text>

  <rect x="80" y="154" width="340" height="92" rx="6" fill="#14101a" stroke="#7777cc" stroke-width="1" stroke-opacity="0.4"/>
  <text x="96" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">금지 (Unacceptable Risk)</text>
  <text x="96" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">실시간 원격 생체인식, 사회 신용점수, 취약계층 조작</text>
  <text x="96" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e0a055">고위험 (High Risk)</text>
  <text x="96" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">의료·채용·교육·사법: 적합성 평가, 인간 감독 필수</text>
  <text x="96" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">GPAI (범용AI): 투명성 의무, 시스템적 위험 평가</text>

  <!-- US Executive Order -->
  <rect x="460" y="96" width="360" height="168" rx="10" fill="#100d1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="480" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">🇺🇸 미국 AI 거버넌스</text>
  <text x="480" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">자율 규제 우선, 혁신 친화적</text>

  <rect x="480" y="154" width="320" height="92" rx="6" fill="#0a1820" stroke="#7ec8e3" stroke-width="1" stroke-opacity="0.4"/>
  <text x="496" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">행정명령 (2023, 수정 2025)</text>
  <text x="496" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">NIST AI RMF 가이드라인 (비강제)</text>
  <text x="496" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">대형 모델 안전성 보고서 제출 의무</text>
  <text x="496" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">섹터별 규제 (FDA·FTC 등 기존 기관 활용)</text>
  <text x="496" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">AI 안전 연구소(AISI): 평가·레드팀</text>

  <!-- China -->
  <rect x="60" y="280" width="380" height="160" rx="10" fill="#1a100d" stroke="#e05555" stroke-width="1.5"/>
  <text x="80" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e05555">🇨🇳 중국 AI 규제</text>
  <text x="80" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">강제적 · 빠른 규제, 기술 자국화</text>

  <rect x="80" y="338" width="340" height="82" rx="6" fill="#1a0d0a" stroke="#e05555" stroke-width="1" stroke-opacity="0.4"/>
  <text x="96" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">생성 AI 규정 (2023): 출시 전 보안 심사 의무</text>
  <text x="96" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">알고리즘 추천 규제 (2022): 투명성 요건</text>
  <text x="96" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">딥페이크 규정 (2022): 명확한 표시 의무</text>
  <text x="96" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">AI 국가 표준: 기술 주권 강조</text>

  <!-- Korea -->
  <rect x="460" y="280" width="360" height="160" rx="10" fill="#0d1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="480" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555">🇰🇷 한국 AI 기본법</text>
  <text x="480" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">2025년 시행, 아시아 선도적 입법</text>

  <rect x="480" y="338" width="320" height="82" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1" stroke-opacity="0.4"/>
  <text x="496" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">고영향 AI 사전 적합성 평가</text>
  <text x="496" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">AI 생성물 고지 의무</text>
  <text x="496" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">AI 안전 연구원 설립</text>
  <text x="496" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">규제 샌드박스로 혁신 지원</text>

  <!-- Bottom label -->
  <text x="440" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">규제 강도: EU &gt; 중국 &gt; 한국 &gt; 미국 순으로 강제성 높음</text>
</svg>
