<svg xmlns="http://www.w3.org/2000/svg" width="880" height="372" viewBox="0 0 880 372">
  <rect width="880" height="372" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ssh-agent — 키를 메모리에 캐싱</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">패스프레이즈를 한 번만 입력하고 세션 내내 재사용</text>

  <!-- LEFT: shell rc snippet -->
  <rect x="60" y="100" width="380" height="200" rx="10" fill="#0d141a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="80" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">셸 시작 시 자동 로드</text>
  <text x="80" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">~/.bashrc · ~/.zshrc</text>
  <rect x="76" y="160" width="348" height="108" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> ! ssh-add -l </tspan><tspan fill="#9aa4b8">&amp;&gt;/dev/null</tspan><tspan fill="#ffffff">; </tspan><tspan fill="#7ec8e3" font-weight="600">then</tspan></text>
  <text x="92" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    eval </tspan><tspan fill="#ce9178">"$(ssh-agent -s)"</tspan></text>
  <text x="92" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    ssh-add ~/.ssh/id_ed25519</tspan></text>
  <text x="92" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">fi</tspan></text>
  <text x="80" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">agent 미실행·키 없으면 자동 시작·로드</text>

  <!-- RIGHT: ssh-add reference -->
  <rect x="460" y="100" width="380" height="200" rx="10" fill="#0d1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="480" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">ssh-add 주요 명령</text>
  <text x="480" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#d4d4d4">ssh-add </tspan><tspan fill="#ce9178">key</tspan></text>
  <text x="640" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8">키를 agent 에 로드</text>
  <text x="480" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#d4d4d4">ssh-add </tspan><tspan fill="#b5cea8">-l</tspan></text>
  <text x="640" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8">로드된 키 목록</text>
  <text x="480" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#d4d4d4">ssh-add </tspan><tspan fill="#b5cea8">-t 1h</tspan></text>
  <text x="640" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8">유효기간 지정</text>
  <text x="480" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#d4d4d4">ssh-add </tspan><tspan fill="#b5cea8">-D</tspan></text>
  <text x="640" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8">전체 키 제거</text>
  <text x="480" y="288" xml:space="preserve" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">config 에 <tspan fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace">AddKeysToAgent yes</tspan> 추가 시 자동 로드</text>

  <!-- Bottom note -->
  <text x="440" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">agent 는 복호화된 키를 메모리에만 보관 — 디스크엔 평문으로 저장하지 않는다</text>
</svg>
