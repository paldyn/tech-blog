<svg xmlns="http://www.w3.org/2000/svg"
     width="880"
     viewBox="0 0 880 490"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <!-- Background -->
  <rect width="880" height="490" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">Sloppy Mode vs Strict Mode</text>
  <text x="60" y="78" font-size="16" font-weight="600" fill="#888">'use strict' 하나로 달라지는 동작들</text>

  <!--
    Left box: x=60, width=360, right=420
    Gap: 60px (420→480)
    Right box: x=480, width=340, right=820
    Arrow center: x=450, y=248
    Box height=300, y=104→404
    Footer: y=450, viewBox=490 (40px margin ✓)
  -->

  <!-- Left: Sloppy Mode (x=60, w=360) -->
  <rect x="60" y="104" width="360" height="300" fill="#1a0f0a" rx="8" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="130" font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">Sloppy Mode (기본)</text>
  <text x="240" y="148" font-size="11" fill="#8a3030" text-anchor="middle">선언 없이 실행, 오류를 조용히 무시</text>

  <!-- Code block inside left box -->
  <rect x="78" y="160" width="324" height="200" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <!-- y base=180, spacing=18: 180,198,216,234,252,270,288,306,324,342 -->
  <text x="94" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 선언 없이 변수 할당 → 전역 생성</text>
  <text x="94" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">x = 10;</text>
  <text x="94" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 전역 x 생성됨 — 에러 없음</text>
  <text x="94" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> </text>
  <text x="94" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 함수 내 this → 전역 객체</text>
  <text x="94" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">function show() {</text>
  <text x="94" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  return this; // window</text>
  <text x="94" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>
  <text x="94" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">with (obj) { ... } // 허용</text>
  <text x="94" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 중복 매개변수도 허용</text>

  <text x="78" y="376" font-size="12" fill="#888">오류를 무시하고 계속 실행 → 디버그 어려움</text>

  <!-- Center arrow: solid polygon in 60px gap -->
  <!-- Shaft x=422→452, arrowhead tip=478, center y=248 -->
  <polygon points="422,255 422,241 452,241 452,235 478,248 452,261 452,255"
           fill="#7777cc" stroke="#0a0a0a" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- label above arrow -->
  <rect x="416" y="208" width="68" height="18" fill="#0a0a0a"/>
  <text x="450" y="221" font-size="11" fill="#7777cc" text-anchor="middle">'use strict'</text>
  <!-- label below arrow -->
  <rect x="416" y="272" width="68" height="18" fill="#0a0a0a"/>
  <text x="450" y="285" font-size="11" fill="#7777cc" text-anchor="middle">적용 시</text>

  <!-- Right: Strict Mode (x=480, w=340) -->
  <rect x="480" y="104" width="340" height="300" fill="#0a1a0a" rx="8" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="130" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">Strict Mode</text>
  <text x="650" y="148" font-size="11" fill="#4a8a5a" text-anchor="middle">오류를 즉시 발견, 안전한 코드 강제</text>

  <!-- Code block inside right box -->
  <rect x="498" y="160" width="304" height="200" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <!-- y base=180, spacing=18 -->
  <text x="514" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">'use strict';</text>
  <text x="514" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> </text>
  <text x="514" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">x = 10;</text>
  <text x="514" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">// ReferenceError!</text>
  <text x="514" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> </text>
  <text x="514" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">function show() {</text>
  <text x="514" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  return this; // undefined</text>
  <text x="514" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>
  <text x="514" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">with (obj) {} // SyntaxError!</text>
  <text x="514" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">// 중복 매개변수 → SyntaxError!</text>

  <text x="498" y="376" font-size="12" fill="#888">오류를 즉시 발생 → 버그를 빠르게 발견</text>

  <!-- Footer -->
  <text x="60" y="450" font-size="11" fill="#444">PALDYN · JavaScript 완전정복 · Part I — Strict mode</text>
</svg>
