<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" style="background:#0a0a0a;border-radius:12px">
  <defs>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#3a6ea8"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">대칭 vs 비대칭 암호화 비교</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">키 구조와 사용 시나리오의 근본적 차이</text>

  <!-- Left: Symmetric -->
  <rect x="60" y="95" width="360" height="36" rx="6" fill="#0d1a0d" stroke="#3aa83a" stroke-width="1.5"/>
  <text x="240" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">대칭 암호화 (Symmetric)</text>

  <!-- Symmetric flow -->
  <rect x="60" y="145" width="110" height="56" rx="6" fill="#0d1520" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="115" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Alice</text>
  <text x="115" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">평문</text>

  <!-- Shared key box -->
  <rect x="195" y="153" width="85" height="40" rx="4" fill="#1a2a0d" stroke="#55c555" stroke-width="1"/>
  <text x="237" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">공유 키</text>
  <text x="237" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">K (동일)</text>

  <rect x="305" y="145" width="110" height="56" rx="6" fill="#0d1520" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="360" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Bob</text>
  <text x="360" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">평문</text>

  <!-- Encrypt arrow -->
  <line x1="175" y1="165" x2="193" y2="165" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <line x1="282" y1="165" x2="303" y2="165" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <!-- Process labels -->
  <text x="180" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">암호화: K 로 encrypt</text>
  <text x="180" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">복호화: K 로 decrypt</text>

  <!-- Symmetric pros/cons -->
  <rect x="60" y="275" width="360" height="90" rx="6" fill="#0f1820" stroke="#3a6ea8" stroke-width="1"/>
  <text x="80" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">장점</text>
  <text x="80" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• 속도가 매우 빠름 (비대칭의 100~1000x)</text>
  <text x="80" y="333" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• 대용량 데이터 암호화에 적합</text>
  <text x="80" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">단점</text>
  <text x="80" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• 키 교환 문제: 어떻게 안전하게 전달?</text>

  <!-- Symmetric examples -->
  <rect x="60" y="380" width="360" height="60" rx="6" fill="#0d1a0d" stroke="#3aa83a" stroke-width="1"/>
  <text x="240" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">대표 알고리즘</text>
  <text x="240" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">AES-128/256 (CBC, GCM) · ChaCha20-Poly1305</text>
  <text x="240" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">TLS 데이터 전송 · 파일 암호화 · 디스크 암호화</text>

  <!-- Right: Asymmetric -->
  <rect x="465" y="95" width="355" height="36" rx="6" fill="#180d1a" stroke="#8a3aa8" stroke-width="1.5"/>
  <text x="642" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#b07ad0" text-anchor="middle">비대칭 암호화 (Asymmetric)</text>

  <!-- Asymmetric flow -->
  <rect x="465" y="145" width="110" height="56" rx="6" fill="#0d1520" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="520" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Alice</text>
  <text x="520" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">공개키 KPub</text>

  <rect x="600" y="145" width="100" height="56" rx="6" fill="#2d0a3a" stroke="#8a3aa8" stroke-width="1"/>
  <text x="650" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#b07ad0" text-anchor="middle">공개키</text>
  <text x="650" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">KPub</text>
  <text x="650" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#aaa" text-anchor="middle">공개 배포</text>

  <rect x="718" y="145" width="102" height="56" rx="6" fill="#0d1520" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="769" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Bob</text>
  <text x="769" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">개인키 KPriv</text>

  <!-- Asymmetric process -->
  <text x="485" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">암호화: Bob의 KPub 로</text>
  <text x="485" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">복호화: Bob의 KPriv 로만</text>

  <!-- Asymmetric pros/cons -->
  <rect x="465" y="275" width="355" height="90" rx="6" fill="#0f1820" stroke="#8a3aa8" stroke-width="1"/>
  <text x="485" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">장점</text>
  <text x="485" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• 키 교환 문제 해결: 공개키는 공개 가능</text>
  <text x="485" y="333" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• 전자서명 · 인증서 발급에 사용</text>
  <text x="485" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">단점</text>
  <text x="485" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• 대칭보다 수백 배 느림 → 소용량 데이터만</text>

  <!-- Asymmetric examples -->
  <rect x="465" y="380" width="355" height="60" rx="6" fill="#180d1a" stroke="#8a3aa8" stroke-width="1"/>
  <text x="642" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#b07ad0" text-anchor="middle">대표 알고리즘</text>
  <text x="642" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">RSA-2048/4096 · ECC (ECDSA, ECDH)</text>
  <text x="642" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">TLS 핸드셰이크 · 전자서명 · SSH 키</text>

  <!-- Bottom: How TLS uses both -->
  <rect x="60" y="460" width="760" height="26" rx="4" fill="#111827"/>
  <text x="440" y="477" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">TLS: 비대칭으로 세션 키 교환 → 대칭으로 실제 데이터 암호화 (두 장점 결합)</text>
</svg>
