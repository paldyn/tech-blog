<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">PIVOT · UNPIVOT 데이터 변환</text>
  <text x="440" y="66" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">행↔열 전환으로 리포트 형식 변환</text>

  <!-- Source table (normalized) -->
  <text x="170" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">원본 (정규형)</text>

  <!-- Table header -->
  <rect x="50" y="106" width="240" height="28" rx="4" fill="#1a2233"/>
  <text x="110" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">year</text>
  <text x="175" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">product</text>
  <text x="255" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">sales</text>

  <!-- Table rows -->
  <rect x="50" y="134" width="240" height="24" fill="#111118"/>
  <text x="110" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">2024</text>
  <text x="175" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">A</text>
  <text x="255" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">120</text>

  <rect x="50" y="158" width="240" height="24" fill="#0d0d14"/>
  <text x="110" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">2024</text>
  <text x="175" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">B</text>
  <text x="255" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">85</text>

  <rect x="50" y="182" width="240" height="24" fill="#111118"/>
  <text x="110" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">2025</text>
  <text x="175" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">A</text>
  <text x="255" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">160</text>

  <rect x="50" y="206" width="240" height="24" fill="#0d0d14"/>
  <text x="110" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">2025</text>
  <text x="175" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">B</text>
  <text x="255" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">110</text>

  <rect x="50" y="106" width="240" height="124" rx="4" fill="none" stroke="#333"/>

  <!-- Arrow PIVOT -->
  <polygon points="314,170 344,165 344,175" fill="#55c555"/>
  <line x1="290" y1="170" x2="344" y2="170" stroke="#55c555" stroke-width="2"/>
  <text x="317" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555">PIVOT</text>

  <!-- Pivot result table -->
  <text x="530" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">PIVOT 결과 (크로스탭)</text>

  <rect x="360" y="106" width="340" height="28" rx="4" fill="#1a2233"/>
  <text x="420" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">year</text>
  <text x="510" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">A</text>
  <text x="650" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">B</text>

  <rect x="360" y="134" width="340" height="24" fill="#111118"/>
  <text x="420" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">2024</text>
  <text x="510" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">120</text>
  <text x="650" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">85</text>

  <rect x="360" y="158" width="340" height="24" fill="#0d0d14"/>
  <text x="420" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">2025</text>
  <text x="510" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">160</text>
  <text x="650" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">110</text>

  <rect x="360" y="106" width="340" height="76" rx="4" fill="none" stroke="#333"/>

  <!-- Arrow UNPIVOT -->
  <polygon points="314,250 290,245 290,255" fill="#e05555"/>
  <line x1="290" y1="250" x2="344" y2="250" stroke="#e05555" stroke-width="2"/>
  <text x="317" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e05555">UNPIVOT</text>

  <!-- Method boxes bottom -->
  <rect x="50" y="310" width="380" height="130" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="332" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">PIVOT 방법 비교</text>
  <text x="240" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">SQL Server / Oracle: 전용 PIVOT 구문</text>
  <text x="240" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">SELECT ... FROM t PIVOT (SUM(sales)</text>
  <text x="240" y="388" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">  FOR product IN ('A','B'))</text>
  <text x="240" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">표준 SQL / PostgreSQL: 조건부 집계</text>
  <text x="240" y="424" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">SUM(CASE WHEN product='A' THEN sales END)</text>

  <rect x="450" y="310" width="380" height="130" rx="8" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="640" y="332" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">UNPIVOT 방법 비교</text>
  <text x="640" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">SQL Server / Oracle: 전용 UNPIVOT 구문</text>
  <text x="640" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">SELECT ... FROM t UNPIVOT (sales</text>
  <text x="640" y="388" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">  FOR product IN (A, B))</text>
  <text x="640" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">표준 SQL / PostgreSQL: CROSS JOIN + VALUES</text>
  <text x="640" y="424" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">CROSS JOIN (VALUES('A'),('B')) AS v(product)</text>
</svg>
