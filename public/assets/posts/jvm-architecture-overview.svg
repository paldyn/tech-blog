<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arrow" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto">
      <polygon points="0 0, 20 7, 0 14" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">JVM 아키텍처 전체 구조</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="400" fill="#888" text-anchor="middle">Java Virtual Machine — 세 가지 핵심 서브시스템</text>

  <!-- JVM outer border -->
  <rect x="60" y="88" width="760" height="424" fill="none" stroke="#2a2a4a" stroke-width="1.5" rx="10" stroke-dasharray="4,4"/>
  <text x="76" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" font-weight="600">Java Virtual Machine</text>

  <!-- ── 1. Class Loader Subsystem ── -->
  <rect x="80" y="116" width="220" height="176" fill="#0d1117" stroke="#7777cc" stroke-width="1.2" rx="8"/>
  <text x="190" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">클래스 로더 서브시스템</text>

  <rect x="100" y="152" width="180" height="28" fill="#151b28" stroke="#444" stroke-width="1" rx="4"/>
  <text x="190" y="171" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">Loading (로딩)</text>

  <rect x="100" y="188" width="180" height="28" fill="#151b28" stroke="#444" stroke-width="1" rx="4"/>
  <text x="190" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">Linking (링킹)</text>

  <rect x="100" y="224" width="180" height="28" fill="#151b28" stroke="#444" stroke-width="1" rx="4"/>
  <text x="190" y="243" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">Initialization (초기화)</text>

  <!-- Arrow: Loading → Linking -->
  <line x1="190" y1="180" x2="190" y2="188" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="190" y1="216" x2="190" y2="224" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ── 2. Runtime Data Areas ── -->
  <rect x="330" y="116" width="220" height="396" fill="#0d1117" stroke="#55c555" stroke-width="1.2" rx="8"/>
  <text x="440" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">런타임 데이터 영역</text>

  <!-- Shared areas -->
  <rect x="350" y="152" width="180" height="36" fill="#0a1a0a" stroke="#55c555" stroke-width="1" rx="4"/>
  <text x="440" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle" font-weight="600">Method Area</text>
  <text x="440" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(클래스 메타데이터 · 공유)</text>

  <rect x="350" y="198" width="180" height="36" fill="#0a1a0a" stroke="#55c555" stroke-width="1" rx="4"/>
  <text x="440" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle" font-weight="600">Heap</text>
  <text x="440" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(객체 · 배열 · 공유)</text>

  <text x="440" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">── 스레드별 영역 ──</text>

  <rect x="350" y="266" width="180" height="36" fill="#151b28" stroke="#7ec8e3" stroke-width="1" rx="4"/>
  <text x="440" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle" font-weight="600">Java Stack</text>
  <text x="440" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(스택 프레임 · 지역변수)</text>

  <rect x="350" y="312" width="180" height="36" fill="#151b28" stroke="#7ec8e3" stroke-width="1" rx="4"/>
  <text x="440" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle" font-weight="600">PC Register</text>
  <text x="440" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(현재 실행 명령 주소)</text>

  <rect x="350" y="358" width="180" height="36" fill="#151b28" stroke="#7ec8e3" stroke-width="1" rx="4"/>
  <text x="440" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle" font-weight="600">Native Method Stack</text>
  <text x="440" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(JNI 네이티브 메서드)</text>

  <!-- ── 3. Execution Engine ── -->
  <rect x="580" y="116" width="220" height="176" fill="#0d1117" stroke="#e05555" stroke-width="1.2" rx="8"/>
  <text x="690" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">실행 엔진</text>

  <rect x="600" y="152" width="180" height="28" fill="#1a0d0d" stroke="#e05555" stroke-width="1" rx="4"/>
  <text x="690" y="171" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">Interpreter (인터프리터)</text>

  <rect x="600" y="188" width="180" height="28" fill="#1a0d0d" stroke="#e05555" stroke-width="1" rx="4"/>
  <text x="690" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">JIT Compiler</text>

  <rect x="600" y="224" width="180" height="28" fill="#1a0d0d" stroke="#e05555" stroke-width="1" rx="4"/>
  <text x="690" y="243" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">GC (가비지 컬렉터)</text>

  <!-- Native Interface &amp; Library -->
  <rect x="80" y="430" width="220" height="52" fill="#0d1117" stroke="#ce9178" stroke-width="1.2" rx="8"/>
  <text x="190" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">JNI</text>
  <text x="190" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Java Native Interface</text>

  <rect x="580" y="430" width="220" height="52" fill="#0d1117" stroke="#ce9178" stroke-width="1.2" rx="8"/>
  <text x="690" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">Native Method Libraries</text>
  <text x="690" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">OS 네이티브 라이브러리</text>

  <!-- Arrows: ClassLoader → RuntimeData -->
  <line x1="300" y1="204" x2="330" y2="204" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="315" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">로드</text>

  <!-- Arrows: RuntimeData → ExecutionEngine -->
  <line x1="550" y1="204" x2="580" y2="204" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="565" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">읽기</text>

  <!-- Arrows: ExecutionEngine → JNI / Native -->
  <line x1="690" y1="292" x2="690" y2="430" stroke="#888" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="190" y1="292" x2="190" y2="430" stroke="#888" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- .class file input -->
  <rect x="80" y="332" width="220" height="44" fill="#0d1117" stroke="#7777cc" stroke-width="1" rx="6"/>
  <text x="190" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle" font-weight="600">.class 바이트코드 파일</text>
  <text x="190" y="367" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">javac 컴파일 결과물</text>

  <!-- Arrow: .class → ClassLoader Loading -->
  <line x1="190" y1="332" x2="190" y2="292" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
