<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">주요 패턴 코드</text>

  <!-- Left: window sizing -->
  <text x="60" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">뷰포트 크기 측정</text>

  <rect x="60" y="94" width="370" height="144" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 뷰포트 내부 크기 (스크롤바 제외)</text>
  <text x="76" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">const <text fill="#e8e8e8">vw = window.innerWidth;</text></text>
  <text x="76" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">const <text fill="#e8e8e8">vh = window.innerHeight;</text></text>
  <text x="76" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// DPR — 레티나 감지</text>
  <text x="76" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">const <text fill="#e8e8e8">dpr = window.devicePixelRatio;</text></text>
  <text x="76" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 스크롤 위치</text>
  <text x="76" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">const <text fill="#e8e8e8">{ scrollX, scrollY } = window;</text></text>

  <!-- Right: navigator -->
  <text x="450" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8a84c">navigator 활용</text>

  <rect x="450" y="94" width="370" height="144" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="466" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 네트워크 상태</text>
  <text x="466" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">if <text fill="#e8e8e8">(!navigator.onLine) </text><text fill="#7ec8e3">showOfflineBanner</text><text fill="#e8e8e8">();</text></text>
  <text x="466" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 사용자 언어</text>
  <text x="466" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">const <text fill="#e8e8e8">lang = navigator.language; </text><text fill="#6a8aa0">// 'ko-KR'</text></text>
  <text x="466" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 논리 CPU 코어 수</text>
  <text x="466" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">const <text fill="#e8e8e8">cores = navigator.hardwareConcurrency;</text></text>
  <text x="466" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// sendBeacon — unload 시 데이터 전송</text>

  <!-- Bottom: document ready -->
  <text x="60" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">문서 준비 상태 처리</text>

  <rect x="60" y="276" width="760" height="126" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// DOMContentLoaded: HTML 파싱 완료 (이미지/CSS 로드 전)</text>
  <text x="76" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">document.<text fill="#7ec8e3">addEventListener</text><text fill="#e8e8e8">(</text><text fill="#ce9178">'DOMContentLoaded'</text><text fill="#e8e8e8">, initApp);</text></text>
  <text x="76" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// readyState 확인 후 처리</text>
  <text x="76" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">if <text fill="#e8e8e8">(document.readyState === </text><text fill="#ce9178">'loading'</text><text fill="#e8e8e8">) {</text></text>
  <text x="76" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  document.<text fill="#7ec8e3">addEventListener</text><text fill="#e8e8e8">(</text><text fill="#ce9178">'DOMContentLoaded'</text><text fill="#e8e8e8">, init);</text></text>
  <text x="76" y="386" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">} <text fill="#7ec8e3">else</text><text fill="#e8e8e8"> { <text fill="#7ec8e3">init</text><text fill="#e8e8e8">(); }  </text><text fill="#6a8aa0">// 이미 파싱 완료된 경우</text></text>
</svg>
