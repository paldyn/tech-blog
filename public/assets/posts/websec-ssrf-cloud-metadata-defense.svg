<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">IMDSv2와 클라우드 보안 설정</text>

  <!-- IMDSv1 vs v2 -->
  <text x="220" y="82" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">IMDSv1 (취약)</text>

  <rect x="60" y="94" width="320" height="90" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve"># 단순 GET 요청으로 탈취 가능</text>
  <text x="76" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">curl</text>
  <text x="110" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> http://169.254.169.254/</text>
  <text x="76" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">     latest/meta-data/iam/</text>
  <text x="76" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">     security-credentials/role</text>

  <text x="660" y="82" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">IMDSv2 (토큰 필수)</text>

  <rect x="500" y="94" width="320" height="120" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="516" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve"># PUT으로 토큰 발급 후 GET</text>
  <text x="516" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">TOKEN</text>
  <text x="562" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">=$(curl -X PUT \</text>
  <text x="516" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  -H </text>
  <text x="552" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">"X-aws-ec2-metadata-token-ttl-seconds: 21600"</text>
  <text x="516" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">http://169.254.169.254/latest/api/token</text>
  <text x="516" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">SSRF로 PUT 불가 → 토큰 없음 → 실패!</text>

  <!-- AWS config to enforce IMDSv2 -->
  <text x="440" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">IMDSv2 강제 + IAM 최소 권한</text>

  <rect x="60" y="252" width="760" height="120" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve"># Terraform으로 IMDSv2 강제</text>
  <text x="76" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">resource</text>
  <text x="130" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve"> "aws_instance" "web"</text>
  <text x="302" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> {</text>
  <text x="76" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  metadata_options {</text>
  <text x="76" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    http_tokens   = </text>
  <text x="216" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">"required"</text>
  <text x="276" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  # IMDSv2 강제</text>
  <text x="76" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    http_hop_limit = </text>
  <text x="228" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">1</text>
  <text x="244" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">          # 컨테이너 내 접근 제한</text>
  <text x="76" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  }}</text>
</svg>
