<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Compose 멀티 네트워크 구조</text>

  <!-- frontend network -->
  <rect x="60" y="68" width="360" height="260" rx="10" fill="#0f1820" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">frontend network</text>

  <!-- web -->
  <rect x="80" y="110" width="150" height="64" rx="8" fill="#132030" stroke="#7ec8e3" stroke-width="1"/>
  <text x="155" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">web (nginx)</text>
  <text x="155" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">networks:</text>
  <text x="155" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">- frontend</text>

  <!-- api (bridge between networks) -->
  <rect x="260" y="110" width="140" height="64" rx="8" fill="#1a1828" stroke="#7777cc" stroke-width="1.5"/>
  <text x="330" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">api</text>
  <text x="330" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">networks:</text>
  <text x="330" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">- frontend - backend</text>

  <!-- arrow web -> api -->
  <line x1="230" y1="142" x2="258" y2="142" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- DNS info -->
  <rect x="80" y="196" width="320" height="48" rx="6" fill="#111820" stroke="#555" stroke-width="1"/>
  <text x="240" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">web → api: http://api:3000</text>
  <text x="240" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">서비스 이름 = DNS 이름 (자동)</text>

  <!-- aliases info -->
  <rect x="80" y="262" width="320" height="48" rx="6" fill="#111820" stroke="#555" stroke-width="1"/>
  <text x="240" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">aliases: [app, backend-api]</text>
  <text x="240" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">네트워크별로 다른 별칭 설정 가능</text>

  <!-- Blocked between frontend and backend (other than api) -->
  <line x1="420" y1="200" x2="460" y2="200" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="440" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#e05555" font-weight="700" text-anchor="middle">✕</text>
  <text x="440" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">web ↛ db</text>

  <!-- backend network -->
  <rect x="460" y="68" width="360" height="260" rx="10" fill="#1a100f" stroke="#e05555" stroke-width="1.5"/>
  <text x="640" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">backend network (internal)</text>

  <!-- db -->
  <rect x="480" y="110" width="150" height="64" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="555" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">db (postgres)</text>
  <text x="555" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">networks:</text>
  <text x="555" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">- backend</text>

  <!-- cache -->
  <rect x="650" y="110" width="150" height="64" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="725" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">cache (redis)</text>
  <text x="725" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">networks:</text>
  <text x="725" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">- backend</text>

  <!-- api -> db arrow -->
  <line x1="400" y1="142" x2="478" y2="142" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- internal note -->
  <rect x="480" y="196" width="320" height="48" rx="6" fill="#200f0f" stroke="#e05555" stroke-width="1"/>
  <text x="640" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">internal: true</text>
  <text x="640" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">외부 인터넷 접근 완전 차단</text>

  <rect x="480" y="262" width="320" height="48" rx="6" fill="#200f0f" stroke="#e05555" stroke-width="1"/>
  <text x="640" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">api → db: http://db:5432</text>
  <text x="640" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">api만 접근 가능 (api가 양쪽 네트워크 소속)</text>

  <!-- bottom: YAML -->
  <rect x="60" y="352" width="760" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">networks</text><text x="142" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">:</text>
  <text x="76" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  frontend:</text>
  <text x="76" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  backend:</text>
  <text x="76" y="432" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    internal: </text><text x="186" y="432" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">true</text>
  <text x="76" y="452" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">    # driver: bridge (기본) | overlay (Swarm)</text>
  <text x="400" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 미선언 시 프로젝트명_default 자동 생성</text>
</svg>
