<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">3xx 리다이렉션 상태 코드</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">클라이언트를 다른 위치로 안내</text>

  <!-- 301 -->
  <rect x="60" y="90" width="760" height="56" rx="6" fill="#1a1000" stroke="#ce9178" stroke-width="1.5"/>
  <rect x="60" y="90" width="80" height="56" rx="6" fill="#150e00" stroke="#ce9178" stroke-width="1.5"/>
  <text x="100" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="20" font-weight="600" fill="#ce9178" text-anchor="middle">301</text>
  <text x="180" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">Moved Permanently</text>
  <text x="180" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">영구 이동 · Location으로 새 URL · 브라우저·검색엔진이 주소 업데이트</text>
  <text x="700" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#555" text-anchor="middle">SEO 영향 있음</text>

  <!-- 302 -->
  <rect x="60" y="154" width="760" height="56" rx="6" fill="#1a1000" stroke="#ce9178" stroke-width="1"/>
  <rect x="60" y="154" width="80" height="56" rx="6" fill="#150e00" stroke="#ce9178" stroke-width="1"/>
  <text x="100" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="20" font-weight="600" fill="#ce9178" text-anchor="middle">302</text>
  <text x="180" y="177" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">Found (임시 이동)</text>
  <text x="180" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">임시 이동 · 원래 URL 유지 · POST→GET 변환 문제 있음</text>
  <text x="700" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#555" text-anchor="middle">임시 유지</text>

  <!-- 303 -->
  <rect x="60" y="218" width="760" height="56" rx="6" fill="#1a1000" stroke="#ce9178" stroke-width="1"/>
  <rect x="60" y="218" width="80" height="56" rx="6" fill="#150e00" stroke="#ce9178" stroke-width="1"/>
  <text x="100" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="20" font-weight="600" fill="#ce9178" text-anchor="middle">303</text>
  <text x="180" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">See Other</text>
  <text x="180" y="261" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">POST 처리 후 GET으로 리다이렉트 · PRG(Post/Redirect/Get) 패턴</text>
  <text x="700" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#555" text-anchor="middle">PRG 패턴</text>

  <!-- 304 -->
  <rect x="60" y="282" width="760" height="56" rx="6" fill="#1a1000" stroke="#ce9178" stroke-width="1.5"/>
  <rect x="60" y="282" width="80" height="56" rx="6" fill="#150e00" stroke="#ce9178" stroke-width="1.5"/>
  <text x="100" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="20" font-weight="600" fill="#ce9178" text-anchor="middle">304</text>
  <text x="180" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">Not Modified</text>
  <text x="180" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">캐시 유효 · 본문 없이 캐시 사용 지시 · If-Modified-Since 검증 결과</text>
  <text x="700" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#555" text-anchor="middle">캐시 히트</text>

  <!-- 307/308 -->
  <rect x="60" y="346" width="360" height="56" rx="6" fill="#1a1000" stroke="#ce9178" stroke-width="1"/>
  <rect x="60" y="346" width="80" height="56" rx="6" fill="#150e00" stroke="#ce9178" stroke-width="1"/>
  <text x="100" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="20" font-weight="600" fill="#ce9178" text-anchor="middle">307</text>
  <text x="180" y="369" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Temporary Redirect</text>
  <text x="180" y="389" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">임시 이동 · 메서드·본문 유지</text>

  <rect x="460" y="346" width="360" height="56" rx="6" fill="#1a1000" stroke="#ce9178" stroke-width="1"/>
  <rect x="460" y="346" width="80" height="56" rx="6" fill="#150e00" stroke="#ce9178" stroke-width="1"/>
  <text x="500" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="20" font-weight="600" fill="#ce9178" text-anchor="middle">308</text>
  <text x="580" y="369" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Permanent Redirect</text>
  <text x="580" y="389" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">영구 이동 · 메서드·본문 유지</text>

  <text x="440" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">301/302는 POST→GET 변환 발생 가능 · 307/308은 메서드 보존 — API에선 307/308 선호</text>
  <text x="440" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">304는 리다이렉션이 아닌 캐시 검증 응답 — Location 헤더 없음</text>
  <text x="440" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">순환 리다이렉트(A→B→A) 브라우저는 20회 후 오류 표시</text>
</svg>
