<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">상태 끌어올리기 — 온도 변환 예제</text>

  <!-- Left: TemperatureInput -->
  <rect x="60" y="72" width="370" height="300" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="245" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">자식 컴포넌트</text>
  <rect x="76" y="108" width="338" height="252" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="128" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve" fill="#ffffff">
    <tspan x="92" dy="0"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> TemperatureInput({ scale, value, onChange }) {</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> scaleNames = {</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">    c: </tspan><tspan fill="#ce9178">'섭씨'</tspan><tspan fill="#ffffff">, f: </tspan><tspan fill="#ce9178">'화씨'</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">  };</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> (</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">    &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">fieldset</tspan><tspan fill="#ffffff">&gt;</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">      &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">legend</tspan><tspan fill="#ffffff">&gt;{scaleNames[scale]}로 입력&lt;/</tspan><tspan fill="#7ec8e3" font-weight="600">legend</tspan><tspan fill="#ffffff">&gt;</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">      &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">input</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">        value={value}</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">        onChange={e =&gt; onChange(e.target.value)}</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">      /&gt;</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">    &lt;/</tspan><tspan fill="#7ec8e3" font-weight="600">fieldset</tspan><tspan fill="#ffffff">&gt;</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">  );</tspan></tspan>
  </text>

  <!-- Right: Calculator (parent) -->
  <rect x="450" y="72" width="370" height="300" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="635" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">부모 — 상태 보유</text>
  <rect x="466" y="108" width="338" height="252" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="128" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve" fill="#ffffff">
    <tspan x="482" dy="0"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> Calculator() {</tspan></tspan>
    <tspan x="482" dy="20"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> [temp, setTemp] = useState(</tspan><tspan fill="#ce9178">''</tspan><tspan fill="#ffffff">);</tspan></tspan>
    <tspan x="482" dy="20"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> [scale, setScale] = useState(</tspan><tspan fill="#ce9178">'c'</tspan><tspan fill="#ffffff">);</tspan></tspan>
    <tspan x="482" dy="20"> </tspan>
    <tspan x="482" dy="20"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> celsius = scale === </tspan><tspan fill="#ce9178">'c'</tspan><tspan fill="#ffffff"> ? +temp : toCelsius(+temp);</tspan></tspan>
    <tspan x="482" dy="20"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> fahrenheit = scale === </tspan><tspan fill="#ce9178">'f'</tspan><tspan fill="#ffffff"> ? +temp : toFahrenheit(+temp);</tspan></tspan>
    <tspan x="482" dy="20"> </tspan>
    <tspan x="482" dy="20"><tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> (</tspan></tspan>
    <tspan x="482" dy="20"><tspan fill="#ffffff">    &lt;&gt;</tspan></tspan>
    <tspan x="482" dy="20"><tspan fill="#ffffff">      &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">TemperatureInput</tspan><tspan fill="#ffffff"> scale=</tspan><tspan fill="#ce9178">"c"</tspan></tspan>
    <tspan x="482" dy="20"><tspan fill="#ffffff">        value={celsius} onChange={v =&gt; { setTemp(v); setScale(</tspan><tspan fill="#ce9178">'c'</tspan><tspan fill="#ffffff">); }} /&gt;</tspan></tspan>
    <tspan x="482" dy="20"><tspan fill="#ffffff">      &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">TemperatureInput</tspan><tspan fill="#ffffff"> scale=</tspan><tspan fill="#ce9178">"f"</tspan></tspan>
    <tspan x="482" dy="20"><tspan fill="#ffffff">        value={fahrenheit} onChange={v =&gt; { setTemp(v); setScale(</tspan><tspan fill="#ce9178">'f'</tspan><tspan fill="#ffffff">); }} /&gt;</tspan></tspan>
  </text>
</svg>
