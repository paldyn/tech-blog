<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ANY · ALL · SOME — 집합 비교 연산자</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888" text-anchor="middle">서브쿼리 결과 집합과 스칼라 값을 비교</text>

  <!-- ANY / SOME -->
  <rect x="50" y="96" width="360" height="200" fill="#0d0d0d" rx="8" stroke="#7777cc"/>
  <text x="230" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">ANY / SOME — 하나라도 만족</text>
  <rect x="66" y="130" width="328" height="130" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="82" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 어느 한 부서 평균보다 높은 급여</text>
  <text x="82" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">SELECT</text>
  <text x="82" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">       name, salary</text>
  <text x="82" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">FROM</text>
  <text x="82" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">     employees</text>
  <text x="82" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">WHERE</text>
  <text x="82" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      salary > <tspan fill="#7ec8e3">ANY</tspan> (</text>
  <text x="82" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">SELECT</tspan> <tspan fill="#7ec8e3">AVG</tspan>(salary)</text>
  <text x="82" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">FROM</tspan> emp <tspan fill="#7ec8e3">GROUP BY</tspan> dept);</text>
  <text x="230" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">ANY = SOME (완전 동의어)</text>
  <text x="230" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">= ANY는 IN과 동치</text>

  <!-- ALL -->
  <rect x="470" y="96" width="360" height="200" fill="#0d0d0d" rx="8" stroke="#7ec8e3"/>
  <text x="650" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">ALL — 모두 만족</text>
  <rect x="486" y="130" width="328" height="130" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="502" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 모든 부서 평균보다 높은 급여</text>
  <text x="502" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">SELECT</text>
  <text x="502" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">       name, salary</text>
  <text x="502" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">FROM</text>
  <text x="502" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">     employees</text>
  <text x="502" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">WHERE</text>
  <text x="502" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      salary > <tspan fill="#7ec8e3">ALL</tspan> (</text>
  <text x="502" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">SELECT</tspan> <tspan fill="#7ec8e3">AVG</tspan>(salary)</text>
  <text x="502" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">FROM</tspan> emp <tspan fill="#7ec8e3">GROUP BY</tspan> dept);</text>
  <text x="650" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">집합의 모든 값과 조건 만족</text>
  <text x="650" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">> ALL은 MAX()보다 큰 것과 동치</text>

  <!-- Equivalences table -->
  <rect x="50" y="326" width="780" height="110" fill="#131820" rx="8" stroke="#3a4a6e"/>
  <text x="440" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">동치 변환 — MAX/MIN으로 대체 가능</text>

  <!-- Table header -->
  <rect x="66" y="358" width="748" height="24" fill="#1e2433" rx="3"/>
  <text x="210" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888" text-anchor="middle">연산자</text>
  <text x="440" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888" text-anchor="middle">동치 표현</text>
  <text x="700" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888" text-anchor="middle">비고</text>

  <!-- Row 1 -->
  <text x="210" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" text-anchor="middle">x = ANY (subq)</text>
  <text x="440" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" text-anchor="middle">x IN (subq)</text>
  <text x="700" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">완전 동치</text>

  <!-- Row 2 -->
  <text x="210" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" text-anchor="middle">x > ALL (subq)</text>
  <text x="440" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" text-anchor="middle">x > (SELECT MAX(col) FROM …)</text>
  <text x="700" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">MAX()가 더 직관적</text>
</svg>
