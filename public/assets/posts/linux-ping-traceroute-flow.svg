<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
  <marker id="arr-e05555" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto"><path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/></marker>

  <marker id="arr-55c555" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto"><path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/></marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">traceroute — TTL 기반 경로 추적</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">각 홉에서 TTL=0이 되면 ICMP Time Exceeded 반환</text>

  <!-- Source host -->
  <rect x="60" y="100" width="120" height="60" fill="#1a2535" rx="8" stroke="#7ec8e3" stroke-width="2"/>
  <text x="120" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">내 PC</text>
  <text x="120" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">192.168.1.100</text>

  <!-- Router 1 -->
  <rect x="240" y="100" width="120" height="60" fill="#1a1a2e" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="300" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7777cc" text-anchor="middle">홉 1 (GW)</text>
  <text x="300" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">192.168.1.1</text>
  <text x="300" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555" text-anchor="middle">TTL 1→0 반환</text>

  <!-- Router 2 -->
  <rect x="420" y="100" width="120" height="60" fill="#1a1a2e" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="480" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7777cc" text-anchor="middle">홉 2 (ISP)</text>
  <text x="480" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">10.0.0.1</text>
  <text x="480" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555" text-anchor="middle">TTL 2→0 반환</text>

  <!-- Router 3 -->
  <rect x="600" y="100" width="120" height="60" fill="#1a1a2e" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="660" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7777cc" text-anchor="middle">홉 3</text>
  <text x="660" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">172.16.0.1</text>
  <text x="660" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555" text-anchor="middle">TTL 3→0 반환</text>

  <!-- Destination -->
  <rect x="760" y="100" width="60" height="60" fill="#1a2e1a" rx="8" stroke="#55c555" stroke-width="2"/>
  <text x="790" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">목적지</text>
  <text x="790" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">8.8.8.8</text>
  <text x="790" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">Echo Reply</text>

  <!-- Arrows forward -->
  
  <line x1="182" y1="130" x2="242" y2="130" stroke="#55c555" stroke-width="2" marker-end="url(#arr-55c555)"/>
  <text x="205" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">TTL=1</text>

  
  <line x1="362" y1="130" x2="422" y2="130" stroke="#55c555" stroke-width="2" marker-end="url(#arr-55c555)"/>
  <text x="385" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">TTL=2</text>

  
  <line x1="542" y1="130" x2="602" y2="130" stroke="#55c555" stroke-width="2" marker-end="url(#arr-55c555)"/>
  <text x="565" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">TTL=3</text>

  
  <line x1="722" y1="130" x2="762" y2="130" stroke="#55c555" stroke-width="2" marker-end="url(#arr-55c555)"/>

  <!-- Arrows back (ICMP) -->
  
  <line x1="230" y1="152" x2="182" y2="152" stroke="#e05555" stroke-width="2" marker-end="url(#arr-e05555)"/>
  <text x="205" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555" text-anchor="middle">Time Exceeded</text>

  
  <line x1="410" y1="152" x2="362" y2="152" stroke="#e05555" stroke-width="2" marker-end="url(#arr-e05555)"/>
  <text x="385" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555" text-anchor="middle">Time Exceeded</text>

  
  <line x1="590" y1="152" x2="542" y2="152" stroke="#e05555" stroke-width="2" marker-end="url(#arr-e05555)"/>
  <text x="565" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555" text-anchor="middle">Time Exceeded</text>

  <!-- traceroute output -->
  <text x="440" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">traceroute 출력 예</text>

  <rect x="60" y="224" width="760" height="160" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="76" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">traceroute</text><text x="160" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> to 8.8.8.8, 30 hops max, 60 byte packets</text>
  <text x="76" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8"> 1</text><text x="94" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">  192.168.1.1</text><text x="214" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">     1.234 ms  1.100 ms  1.056 ms</text>
  <text x="76" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8"> 2</text><text x="94" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">  10.0.0.1</text><text x="202" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        5.432 ms  5.100 ms  4.987 ms</text>
  <text x="76" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8"> 3</text><text x="94" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">  *  *  *</text><text x="178" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  ← 라우터가 ICMP 차단 중</text>
  <text x="76" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8"> 4</text><text x="94" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">  8.8.8.8</text><text x="196" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        12.345 ms  11.987 ms  12.100 ms</text>
  <text x="76" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">※ * * * 는 해당 홉의 응답 없음 (방화벽/필터) — 목적지 도달 가능성과 무관</text>

  <text x="440" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">mtr = ping + traceroute 통합 실시간 도구 (sudo apt install mtr)</text>
</svg>
