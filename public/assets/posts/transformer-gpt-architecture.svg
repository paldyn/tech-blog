<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">GPT 아키텍처 — Decoder-only 구조</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">Cross-Attention 없이 Masked Self-Attention + FFN만 쌓는다</text>

  <!-- Left: Architecture diagram -->
  <!-- Token input -->
  <rect x="60" y="96" width="260" height="34" fill="#111827" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="190" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">입력 토큰  ["나는", "AI를", ...]</text>

  <line x1="190" y1="130" x2="190" y2="148" stroke="#444" stroke-width="2"/>
  <polygon points="183,148 190,160 197,148" fill="#444"/>

  <!-- Token + PE Embedding -->
  <rect x="90" y="160" width="200" height="32" fill="#1a1f35" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="190" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">Token Emb + 학습형 PE</text>

  <line x1="190" y1="192" x2="190" y2="210" stroke="#444" stroke-width="2"/>
  <polygon points="183,210 190,222 197,210" fill="#444"/>

  <!-- Decoder Block 1 -->
  <rect x="60" y="222" width="260" height="60" fill="#1a0d1a" rx="6" stroke="#e05555" stroke-width="1.5"/>
  <text x="190" y="247" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">Decoder Block × N</text>
  <text x="190" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Masked MHA → Add&amp;Norm → FFN → Add&amp;Norm</text>

  <line x1="190" y1="282" x2="190" y2="300" stroke="#444" stroke-width="2"/>
  <polygon points="183,300 190,312 197,300" fill="#444"/>

  <!-- Layer Norm -->
  <rect x="115" y="312" width="150" height="28" fill="#1a2a1a" rx="5" stroke="#55c555" stroke-width="1"/>
  <text x="190" y="331" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">Final LayerNorm</text>

  <line x1="190" y1="340" x2="190" y2="358" stroke="#444" stroke-width="2"/>
  <polygon points="183,358 190,370 197,358" fill="#444"/>

  <!-- Linear + Softmax -->
  <rect x="75" y="370" width="230" height="40" fill="#1a150a" rx="6" stroke="#ce9178" stroke-width="1.5"/>
  <text x="190" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#ce9178" text-anchor="middle">Linear (d_model → vocab_size)</text>
  <text x="190" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">+ Softmax → 다음 토큰 확률</text>

  <!-- GPT vs BERT comparison -->
  <rect x="350" y="96" width="490" height="380" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="595" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">GPT 계열 진화</text>

  <!-- GPT-1 -->
  <rect x="366" y="134" width="458" height="60" fill="#0d1117" rx="6" stroke="#888" stroke-width="1"/>
  <text x="380" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">GPT-1</text>
  <text x="380" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">2018 OpenAI · 12L 768d · 117M · BooksCorpus</text>
  <text x="700" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">단방향 LM 사전학습</text>

  <!-- GPT-2 -->
  <rect x="366" y="202" width="458" height="60" fill="#0d1117" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="380" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">GPT-2</text>
  <text x="380" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">2019 · 48L · 1.5B · WebText (40GB)</text>
  <text x="700" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Zero-shot 능력 첫 발견</text>

  <!-- GPT-3 -->
  <rect x="366" y="270" width="458" height="60" fill="#0d1117" rx="6" stroke="#ce9178" stroke-width="1"/>
  <text x="380" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">GPT-3</text>
  <text x="380" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">2020 · 96L · 175B · 570GB</text>
  <text x="700" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Few-shot 창발, In-Context</text>

  <!-- GPT-3.5 / InstructGPT -->
  <rect x="366" y="338" width="458" height="60" fill="#0d1117" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="380" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">InstructGPT / ChatGPT</text>
  <text x="380" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">2022 · RLHF 정렬 · 지시 따르기</text>
  <text x="700" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">LLM 대중화의 시작</text>

  <!-- GPT-4 -->
  <rect x="366" y="406" width="458" height="60" fill="#0d1117" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="380" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">GPT-4 / GPT-4o</text>
  <text x="380" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">2023~ · 멀티모달 · MoE 추정</text>
  <text x="700" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">비전+언어 통합</text>
</svg>
