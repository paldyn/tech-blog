<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">CREATE TABLE AS SELECT — 테이블 복사 패턴</text>

  <!-- CTAS left -->
  <rect x="60" y="68" width="380" height="300" fill="#0d0d0d" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="250" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">CTAS (Create Table As Select)</text>

  <rect x="76" y="102" width="348" height="170" fill="#000000" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 데이터 포함 복사</text>
  <text x="92" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">CREATE TABLE</text>
  <text x="184" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> emp_backup</text>
  <text x="92" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">AS SELECT</text>
  <text x="154" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> * </text>
  <text x="92" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">FROM</text>
  <text x="126" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> employees</text>
  <text x="92" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">WHERE</text>
  <text x="134" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> 1=0;</text>
  <text x="92" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- WHERE 1=0: 구조만 복사</text>
  <text x="92" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- WHERE 생략: 데이터도 복사</text>
  <text x="92" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 제약조건은 복사 안 됨!</text>

  <rect x="76" y="280" width="348" height="72" fill="#111" rx="4" stroke="#e05555" stroke-width="1"/>
  <text x="250" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">주의 사항</text>
  <text x="250" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">PK, FK, INDEX, DEFAULT 복사 안 됨</text>
  <text x="250" y="335" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">컬럼 타입만 같은 "빈 껍데기"</text>
  <text x="250" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">제약조건은 ALTER TABLE로 별도 추가</text>

  <!-- DB differences right -->
  <rect x="460" y="68" width="360" height="300" fill="#0d0d0d" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="640" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">DBMS별 차이점</text>

  <rect x="476" y="102" width="328" height="30" fill="#162030"/>
  <text x="640" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">자동 증가 컬럼</text>

  <text x="476" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">PostgreSQL:</text>
  <text x="560" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff"> SERIAL 또는 GENERATED ALWAYS</text>
  <text x="476" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">MySQL:</text>
  <text x="524" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff">    INT AUTO_INCREMENT</text>
  <text x="476" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8a020">Oracle:</text>
  <text x="524" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff">    GENERATED ALWAYS AS IDENTITY</text>
  <text x="476" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8">MSSQL:</text>
  <text x="524" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff">   INT IDENTITY(1,1)</text>

  <line x1="476" y1="220" x2="804" y2="220" stroke="#3a4a6e" stroke-width="0.5"/>

  <rect x="476" y="228" width="328" height="30" fill="#162030"/>
  <text x="640" y="247" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">임시 테이블</text>

  <text x="476" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">PostgreSQL:</text>
  <text x="560" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff"> CREATE TEMP TABLE</text>
  <text x="476" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">MySQL:</text>
  <text x="524" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff">    CREATE TEMPORARY TABLE</text>
  <text x="476" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8a020">Oracle:</text>
  <text x="524" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff">    CREATE GLOBAL TEMPORARY TABLE</text>
  <text x="476" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8">MSSQL:</text>
  <text x="524" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff">   CREATE TABLE #temp</text>
  <text x="476" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">세션 종료 시 자동 삭제 (Oracle: 구조 유지)</text>
</svg>