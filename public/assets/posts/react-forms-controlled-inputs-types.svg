<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">입력 타입별 제어 컴포넌트 패턴</text>

  <!-- Text input -->
  <rect x="60" y="60" width="370" height="110" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="245" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">text / email / password</text>
  <rect x="76" y="88" width="338" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="11" xml:space="preserve">
    <tspan x="92" y="106" fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> [v, setV] = useState(</tspan><tspan fill="#ce9178">''</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="92" dy="16" fill="#ce9178">&lt;input</tspan><tspan fill="#ffffff"> type=</tspan><tspan fill="#ce9178">"text"</tspan><tspan fill="#ffffff"> value={v}</tspan>
    <tspan x="92" dy="16" fill="#ffffff">  onChange={e =&gt; setV(e.target.value)} /&gt;</tspan>
  </text>

  <!-- Checkbox -->
  <rect x="450" y="60" width="370" height="110" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="635" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">checkbox</text>
  <rect x="466" y="88" width="338" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="11" xml:space="preserve">
    <tspan x="482" y="106" fill="#9aa4b8">// value 대신 checked 사용!</tspan>
    <tspan x="482" dy="16" fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> [done, setDone] = useState(</tspan><tspan fill="#7ec8e3" font-weight="600">false</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="482" dy="16" fill="#ce9178">&lt;input</tspan><tspan fill="#ffffff"> type=</tspan><tspan fill="#ce9178">"checkbox"</tspan><tspan fill="#ffffff"> checked={done}</tspan>
    <tspan x="482" dy="0" fill="#ffffff"> onChange={e =&gt; setDone(e.target.checked)}/&gt;</tspan>
  </text>

  <!-- Select -->
  <rect x="60" y="186" width="370" height="110" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="245" y="206" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">select (드롭다운)</text>
  <rect x="76" y="214" width="338" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="11" xml:space="preserve">
    <tspan x="92" y="232" fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> [opt, setOpt] = useState(</tspan><tspan fill="#ce9178">'a'</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="92" dy="16" fill="#ce9178">&lt;select</tspan><tspan fill="#ffffff"> value={opt}</tspan>
    <tspan x="92" dy="16" fill="#ffffff">  onChange={e =&gt; setOpt(e.target.value)}&gt;</tspan>
  </text>

  <!-- Textarea -->
  <rect x="450" y="186" width="370" height="110" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="635" y="206" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">textarea</text>
  <rect x="466" y="214" width="338" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="11" xml:space="preserve">
    <tspan x="482" y="232" fill="#9aa4b8">// HTML과 달리 children 아닌 value</tspan>
    <tspan x="482" dy="16" fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> [txt, setTxt] = useState(</tspan><tspan fill="#ce9178">''</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="482" dy="16" fill="#ce9178">&lt;textarea</tspan><tspan fill="#ffffff"> value={txt}</tspan>
    <tspan x="482" dy="0" fill="#ffffff"> onChange={e =&gt; setTxt(e.target.value)}/&gt;</tspan>
  </text>

  <!-- Radio group -->
  <rect x="60" y="312" width="760" height="110" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="440" y="332" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">radio 그룹 — 같은 name, checked로 현재 선택 표시</text>
  <rect x="76" y="340" width="728" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="11" xml:space="preserve">
    <tspan x="92" y="358" fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> [size, setSize] = useState(</tspan><tspan fill="#ce9178">'M'</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="92" dy="16" fill="#ffffff">{[</tspan><tspan fill="#ce9178">'S'</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">'M'</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">'L'</tspan><tspan fill="#ffffff">].map(s =&gt; (</tspan>
    <tspan x="92" dy="16" fill="#ce9178">  &lt;label</tspan><tspan fill="#ffffff"> key={s}&gt;</tspan><tspan fill="#ce9178">&lt;input</tspan><tspan fill="#ffffff"> type=</tspan><tspan fill="#ce9178">"radio"</tspan><tspan fill="#ffffff"> value={s}</tspan><tspan fill="#ffffff"> checked={size === s}</tspan><tspan fill="#ffffff"> onChange={() =&gt; setSize(s)}/&gt;{s}</tspan><tspan fill="#ce9178">&lt;/label&gt;</tspan>
  </text>

  <!-- footer note -->
  <text x="440" y="438" text-anchor="middle" font-size="12" fill="#888">checkbox/radio: value 대신 checked + e.target.checked 사용 — 다른 입력 타입과 혼동 주의</text>
  <text x="440" y="456" text-anchor="middle" font-size="11" fill="#555">React에서 &lt;textarea&gt;는 HTML과 달리 children이 아닌 value prop으로 값을 관리한다</text>
</svg>
