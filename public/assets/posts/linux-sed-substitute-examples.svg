<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">sed 치환 실전 패턴</text>

  <!-- Left: substitution patterns -->
  <rect x="60" y="70" width="360" height="300" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">기본 치환</text>
  <text x="80" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8"># 전체 치환</tspan></text>
  <text x="80" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">sed <tspan fill="#ce9178">'s/foo/bar/g'</tspan> file.txt</text>
  <text x="80" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8"># 대소문자 무시 치환</tspan></text>
  <text x="80" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">sed <tspan fill="#ce9178">'s/error/ERROR/gi'</tspan> f</text>
  <text x="80" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b9"># 매칭 문자 괄호로 감싸기</tspan></text>
  <text x="80" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">sed <tspan fill="#ce9178">'s/[0-9]*/[&amp;]/g'</tspan> f</text>
  <text x="80" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8"># 구분자를 # 으로 변경</tspan></text>
  <text x="80" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">sed <tspan fill="#ce9178">'s#/old/path#/new#g'</tspan> f</text>
  <text x="80" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8"># 2번째 매칭만 치환</tspan></text>
  <text x="80" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">sed <tspan fill="#ce9178">'s/foo/bar/2'</tspan> file.txt</text>

  <!-- Right: capture groups -->
  <rect x="460" y="70" width="360" height="300" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="480" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">캡처 그룹 활용</text>
  <text x="480" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8"># 이름 앞뒤 반전 (BRE)</tspan></text>
  <text x="480" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">sed <tspan fill="#ce9178">'s/\(A\) \(B\)/\2 \1/'</tspan> f</text>
  <text x="480" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8"># ERE 버전</tspan></text>
  <text x="480" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">sed -E <tspan fill="#ce9178">'s/(A) (B)/\2 \1/'</tspan> f</text>
  <text x="480" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8"># 날짜 형식 변환</tspan></text>
  <text x="480" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8"># YYYY-MM-DD → DD/MM/YYYY</tspan></text>
  <text x="480" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">sed -E <tspan fill="#ce9178">'s/([0-9]{4})-([0-9]{2})-([0-9]{2})/\3\/\2\/\1/'</tspan></text>
  <text x="480" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8"># HTML 태그 제거</tspan></text>
  <text x="480" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">sed -E <tspan fill="#ce9178">'s/&lt;[^&gt;]+&gt;//g'</tspan> f</text>
  <text x="480" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8"># 앞뒤 공백 제거 (trim)</tspan></text>
  <text x="480" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">sed -E <tspan fill="#ce9178">'s/^\s+|\s+$//g'</tspan> f</text>
</svg>
