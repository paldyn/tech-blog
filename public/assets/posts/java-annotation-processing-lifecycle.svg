<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="340" rx="12" fill="#0a0a0a"/>
  <text x="40" y="48" font-size="22" font-weight="700" fill="#e8e8e8">Processor의 도구 — Filer·Messager·Elements</text>

  <!-- code box -->
  <rect x="40" y="74" width="470" height="240" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan x="58" y="102" fill="#9aa4b8">@SupportedAnnotationTypes("Benchmark")</tspan>
    <tspan x="58" y="124" fill="#7ec8e3" font-weight="600">public class</tspan><tspan fill="#ffffff"> BenchProc</tspan>
    <tspan x="58" y="146" fill="#ffffff">      </tspan><tspan fill="#7ec8e3" font-weight="600">extends</tspan><tspan fill="#ffffff"> AbstractProcessor {</tspan>
    <tspan x="58" y="174" fill="#7ec8e3" font-weight="600">  public boolean</tspan><tspan fill="#ffffff"> process(</tspan>
    <tspan x="58" y="196" fill="#ffffff">      Set&lt;...&gt; anns, RoundEnvironment r) {</tspan>
    <tspan x="58" y="218" fill="#ffffff">    var es = r.getElementsAnnotatedWith(</tspan>
    <tspan x="58" y="240" fill="#ffffff">                 Benchmark.</tspan><tspan fill="#7ec8e3" font-weight="600">class</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="58" y="262" fill="#ffffff">    filer.createSourceFile(...);</tspan>
    <tspan x="58" y="284" fill="#7ec8e3" font-weight="600">    return</tspan><tspan fill="#ffffff"> true;</tspan>
    <tspan x="58" y="306" fill="#ffffff">  }}</tspan>
  </text>

  <!-- right: three tool boxes -->
  <rect x="540" y="74" width="300" height="72" rx="8" fill="#101010" stroke="#55c555" stroke-width="1"/>
  <text x="556" y="102" font-size="14" font-weight="600" fill="#e8e8e8">Filer</text>
  <text x="556" y="124" font-size="13" fill="#9aa4b8">새 소스/리소스 파일을 안전하게</text>
  <text x="556" y="142" font-size="13" fill="#9aa4b8">생성 (직접 파일 쓰기 금지)</text>

  <rect x="540" y="158" width="300" height="72" rx="8" fill="#101010" stroke="#e05555" stroke-width="1"/>
  <text x="556" y="186" font-size="14" font-weight="600" fill="#e8e8e8">Messager</text>
  <text x="556" y="208" font-size="13" fill="#9aa4b8">컴파일 에러·경고 출력.</text>
  <text x="556" y="226" font-size="13" fill="#9aa4b8">규칙 위반 시 빌드 실패시킴</text>

  <rect x="540" y="242" width="300" height="72" rx="8" fill="#101010" stroke="#7ec8e3" stroke-width="1"/>
  <text x="556" y="270" font-size="14" font-weight="600" fill="#e8e8e8">Elements / Types</text>
  <text x="556" y="292" font-size="13" fill="#9aa4b8">요소·타입 정보를 조회하는</text>
  <text x="556" y="310" font-size="13" fill="#9aa4b8">유틸리티 (이름·상위타입 등)</text>
</svg>
