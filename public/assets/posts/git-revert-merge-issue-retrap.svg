<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="340" rx="12" fill="#0a0a0a"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">revert한 브랜치를 다시 머지하면?</text>
  <text x="60" y="78" font-size="16" font-weight="600" fill="#888">Git은 "이미 머지됐다"고 보고 변경을 다시 가져오지 않는다</text>

  <rect x="60" y="105" width="760" height="100" rx="10" fill="#000000" stroke="#e05555" stroke-width="1.5"/>
  <text x="80" y="135" font-size="15" font-weight="600" fill="#e05555">함정</text>
  <text x="80" y="163" font-size="13" fill="#ffffff">머지 → revert → (수정) → 다시 머지</text>
  <text x="80" y="187" font-size="13" fill="#9aa4b8">revert 이후 새로 추가된 커밋만 들어오고, 원래 변경은 빠진 채 남는다</text>

  <rect x="60" y="225" width="760" height="80" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="255" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8"># 해결: revert를 한 번 더 revert해 변경을 되살린 뒤 작업</text>
  <text xml:space="preserve" x="80" y="283" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">git revert &lt;revert-commit&gt;   # 또는 브랜치를 새로 따서 다시 머지</text>
</svg>
