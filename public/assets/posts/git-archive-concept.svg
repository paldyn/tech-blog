<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 320">
  <rect width="880" height="320" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-ar" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">archive: 히스토리 없이 스냅샷만 내보내기</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">.git 폴더를 뺀, 특정 시점의 파일 묶음을 만든다</text>

  <!-- repo box -->
  <rect x="60" y="110" width="260" height="150" rx="10" fill="#101010" stroke="#9988dd" stroke-width="1.5"/>
  <text x="190" y="140" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="15" font-weight="600" fill="#9988dd">Git 저장소</text>
  <text x="190" y="170" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#e8e8e8">작업 파일</text>
  <text x="190" y="196" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#e05555">+ .git (모든 히스토리)</text>
  <text x="190" y="226" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#888">커밋·브랜치·태그</text>

  <!-- archive box -->
  <rect x="560" y="110" width="260" height="150" rx="10" fill="#101010" stroke="#55c555" stroke-width="1.5"/>
  <text x="690" y="140" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="15" font-weight="600" fill="#55c555">아카이브</text>
  <text x="690" y="170" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#e8e8e8">지정 시점의 파일만</text>
  <text x="690" y="196" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">release.tar.gz</text>
  <text x="690" y="226" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#888">.git 없음 · 가볍다</text>

  <line x1="320" y1="185" x2="554" y2="185" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-ar)"/>
  <text x="440" y="172" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">git archive HEAD</text>

  <text x="440" y="296" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#888">배포·릴리즈 산출물·소스 백업에 적합 (clone과 달리 히스토리 제외)</text>
</svg>
