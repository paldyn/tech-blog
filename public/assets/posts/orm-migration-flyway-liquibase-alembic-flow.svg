<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">DB 마이그레이션 워크플로우</text>

  <!-- Step boxes -->
  <rect x="60" y="74" width="140" height="64" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="101" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">스키마 변경</text>
  <text x="130" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">컬럼 추가/삭제</text>

  <line x1="200" y1="106" x2="238" y2="106" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="240" y="74" width="140" height="64" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="310" y="101" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">마이그레이션</text>
  <text x="310" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">파일 생성</text>

  <line x1="380" y1="106" x2="418" y2="106" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="420" y="74" width="140" height="64" rx="8" fill="#111827" stroke="#ce9178" stroke-width="1.5"/>
  <text x="490" y="101" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#ce9178" text-anchor="middle">검증/리뷰</text>
  <text x="490" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Git PR</text>

  <line x1="560" y1="106" x2="598" y2="106" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="600" y="74" width="140" height="64" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="670" y="101" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">적용</text>
  <text x="670" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">migrate / upgrade</text>

  <line x1="740" y1="106" x2="778" y2="106" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="780" y="74" width="60" height="64" rx="8" fill="#0a2a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="810" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="700" fill="#55c555" text-anchor="middle">DB</text>

  <!-- Three tool sections -->
  <!-- Flyway -->
  <rect x="60" y="168" width="235" height="270" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <rect x="60" y="168" width="235" height="40" rx="8" fill="#1e3a5f"/>
  <rect x="60" y="192" width="235" height="16" fill="#1e3a5f"/>
  <text x="177" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">Flyway</text>
  <text x="80" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">• SQL 파일 기반</text>
  <text x="80" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• V1__init.sql 네이밍</text>
  <text x="80" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• flyway_schema_history 테이블</text>
  <text x="80" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 체크섬 검증 (변경 불가)</text>
  <text x="80" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• Spring Boot 자동 통합</text>
  <text x="80" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"
        fill="#ce9178">V3__add_phone.sql:</text>
  <text x="80" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"
        fill="#ffffff">ALTER TABLE users</text>
  <text x="80" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"
        fill="#ffffff">  ADD COLUMN phone VARCHAR(20);</text>
  <text x="80" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">적합: Java/Spring, SQL 직접 제어</text>
  <text x="80" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">단점: 롤백 파일 별도 작성 필요</text>

  <!-- Liquibase -->
  <rect x="322" y="168" width="235" height="270" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <rect x="322" y="168" width="235" height="40" rx="8" fill="#1e3a2a"/>
  <rect x="322" y="192" width="235" height="16" fill="#1e3a2a"/>
  <text x="439" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">Liquibase</text>
  <text x="342" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">• XML/YAML/JSON 지원</text>
  <text x="342" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• changeset 단위 관리</text>
  <text x="342" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• databasechangelog 테이블</text>
  <text x="342" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">• rollback 자동 생성 가능</text>
  <text x="342" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 멀티 DB 추상화</text>
  <text x="342" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"
        fill="#9aa4b8"># changeset (YAML)</text>
  <text x="342" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"
        fill="#ffffff">changeSet:</text>
  <text x="342" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"
        fill="#ffffff">  addColumn:</text>
  <text x="342" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"
        fill="#ffffff">    tableName: users</text>
  <text x="342" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">적합: 멀티 DB, 엔터프라이즈</text>
  <text x="342" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">단점: XML 장황함</text>

  <!-- Alembic -->
  <rect x="584" y="168" width="235" height="270" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <rect x="584" y="168" width="235" height="40" rx="8" fill="#2a1e10"/>
  <rect x="584" y="192" width="235" height="16" fill="#2a1e10"/>
  <text x="701" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#ce9178" text-anchor="middle">Alembic</text>
  <text x="604" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">• Python 코드 기반</text>
  <text x="604" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• autogenerate 지원</text>
  <text x="604" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• SQLAlchemy Engine 연동</text>
  <text x="604" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• alembic_version 테이블</text>
  <text x="604" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• DAG 방식 히스토리</text>
  <text x="604" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"
        fill="#9aa4b8"># upgrade/downgrade</text>
  <text x="604" y="362" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11">
    <tspan fill="#7ec8e3" font-weight="600">def</tspan><tspan fill="#ffffff"> upgrade():</tspan>
  </text>
  <text x="604" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"
        fill="#ffffff">  op.add_column('users', ...)</text>
  <text x="604" y="398" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11">
    <tspan fill="#7ec8e3" font-weight="600">def</tspan><tspan fill="#ffffff"> downgrade():</tspan>
  </text>
  <text x="604" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">적합: Python/FastAPI/Flask</text>
  <text x="604" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">장점: 코드로 마이그레이션 표현</text>
</svg>
