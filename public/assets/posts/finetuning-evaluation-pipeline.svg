<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">파인튜닝 평가 파이프라인</text>
  <text x="440" y="66" font-size="15" fill="#888" text-anchor="middle">단계별 평가 절차와 핵심 체크포인트</text>

  <!-- Step boxes (horizontal pipeline) -->
  <!-- Step 1 -->
  <rect x="28" y="86" width="138" height="72" rx="8" fill="#111827" stroke="#7777cc" stroke-width="2"/>
  <text x="97" y="108" font-size="12" font-weight="700" fill="#7777cc" text-anchor="middle">① 평가 데이터 준비</text>
  <text x="97" y="124" font-size="10.5" fill="#aaa" text-anchor="middle">• 200~500개 이상 확보</text>
  <text x="97" y="140" font-size="10.5" fill="#aaa" text-anchor="middle">• 훈련 데이터 미포함</text>
  <text x="97" y="153" font-size="10.5" fill="#aaa" text-anchor="middle">• 실제 사용 분포 반영</text>

  <!-- Arrow 1→2 -->
  <polygon points="172,122 182,116 182,128" fill="#555"/>
  <line x1="166" y1="122" x2="182" y2="122" stroke="#555" stroke-width="1.5"/>

  <!-- Step 2 -->
  <rect x="184" y="86" width="138" height="72" rx="8" fill="#111827" stroke="#55c555" stroke-width="2"/>
  <text x="253" y="108" font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">② 베이스라인 측정</text>
  <text x="253" y="124" font-size="10.5" fill="#aaa" text-anchor="middle">• 파인튜닝 전 모델 평가</text>
  <text x="253" y="140" font-size="10.5" fill="#aaa" text-anchor="middle">• 상용 모델(GPT-4) 비교</text>
  <text x="253" y="153" font-size="10.5" fill="#aaa" text-anchor="middle">• 결과 기록·저장 필수</text>

  <!-- Arrow 2→3 -->
  <polygon points="328,122 338,116 338,128" fill="#555"/>
  <line x1="322" y1="122" x2="338" y2="122" stroke="#555" stroke-width="1.5"/>

  <!-- Step 3 -->
  <rect x="340" y="86" width="138" height="72" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="2"/>
  <text x="409" y="108" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">③ 파인튜닝 모델 측정</text>
  <text x="409" y="124" font-size="10.5" fill="#aaa" text-anchor="middle">• 동일 데이터셋 적용</text>
  <text x="409" y="140" font-size="10.5" fill="#aaa" text-anchor="middle">• 체크포인트별 평가</text>
  <text x="409" y="153" font-size="10.5" fill="#aaa" text-anchor="middle">• 훈련 loss 곡선 기록</text>

  <!-- Arrow 3→4 -->
  <polygon points="484,122 494,116 494,128" fill="#555"/>
  <line x1="478" y1="122" x2="494" y2="122" stroke="#555" stroke-width="1.5"/>

  <!-- Step 4 -->
  <rect x="496" y="86" width="138" height="72" rx="8" fill="#111827" stroke="#e8a87c" stroke-width="2"/>
  <text x="565" y="108" font-size="12" font-weight="700" fill="#e8a87c" text-anchor="middle">④ 비교 분석</text>
  <text x="565" y="124" font-size="10.5" fill="#aaa" text-anchor="middle">• Before/After 차이 계산</text>
  <text x="565" y="140" font-size="10.5" fill="#aaa" text-anchor="middle">• 개선율 % 산출</text>
  <text x="565" y="153" font-size="10.5" fill="#aaa" text-anchor="middle">• 회귀 발생 여부 확인</text>

  <!-- Arrow 4→5 -->
  <polygon points="640,122 650,116 650,128" fill="#555"/>
  <line x1="634" y1="122" x2="650" y2="122" stroke="#555" stroke-width="1.5"/>

  <!-- Step 5 -->
  <rect x="652" y="86" width="200" height="72" rx="8" fill="#111827" stroke="#e05555" stroke-width="2"/>
  <text x="752" y="108" font-size="12" font-weight="700" fill="#e05555" text-anchor="middle">⑤ 오류 분석</text>
  <text x="752" y="124" font-size="10.5" fill="#aaa" text-anchor="middle">• 실패 케이스 수집·분류</text>
  <text x="752" y="140" font-size="10.5" fill="#aaa" text-anchor="middle">• 과적합 / 파국적 망각 진단</text>
  <text x="752" y="153" font-size="10.5" fill="#aaa" text-anchor="middle">• 데이터 보강 방향 결정</text>

  <!-- Code block label -->
  <text x="60" y="190" font-size="12" font-weight="700" fill="#888">evaluate 라이브러리 활용 예시</text>

  <!-- Code block -->
  <rect x="60" y="202" width="760" height="216" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># evaluate 라이브러리로 ROUGE + BERTScore 동시 평가</text>
  <text xml:space="preserve" x="80" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">import</tspan><tspan fill="#e8e8e8"> evaluate</tspan></text>
  <text xml:space="preserve" x="80" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">from</tspan><tspan fill="#e8e8e8"> transformers </tspan><tspan fill="#7ec8e3">import</tspan><tspan fill="#e8e8e8"> pipeline</tspan></text>
  <text xml:space="preserve" x="80" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"> </text>
  <text xml:space="preserve" x="80" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">rouge </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#e8e8e8"> evaluate.load(</tspan><tspan fill="#ce9178">"rouge"</tspan><tspan fill="#e8e8e8">)</tspan></text>
  <text xml:space="preserve" x="80" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">bertscore </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#e8e8e8"> evaluate.load(</tspan><tspan fill="#ce9178">"bertscore"</tspan><tspan fill="#e8e8e8">)</tspan></text>
  <text xml:space="preserve" x="80" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"> </text>
  <text xml:space="preserve" x="80" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">results_rouge </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#e8e8e8"> rouge.compute(</tspan></text>
  <text xml:space="preserve" x="80" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    predictions</tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#e8e8e8">preds, references</tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#e8e8e8">refs)</tspan></text>
  <text xml:space="preserve" x="80" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">results_bert </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#e8e8e8"> bertscore.compute(</tspan></text>
  <text xml:space="preserve" x="80" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    predictions</tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#e8e8e8">preds, references</tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#e8e8e8">refs, lang</tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#ce9178">"ko"</tspan><tspan fill="#e8e8e8">)</tspan></text>
</svg>
