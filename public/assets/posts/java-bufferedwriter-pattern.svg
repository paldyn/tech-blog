<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">BufferedWriter / PrintWriter 사용 패턴</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">쓰기 스트림 구성과 autoFlush 동작 이해</text>

  <!-- BufferedWriter pattern -->
  <rect x="60" y="90" width="360" height="200" rx="8" fill="#101828" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">BufferedWriter 기본 사용</text>

  <rect x="76" y="122" width="328" height="156" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// Files.newBufferedWriter (권장)</text>
  <text x="92" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">try</text>
  <text x="92" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    (BufferedWriter bw =</text>
  <text x="92" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  Files.newBufferedWriter(</text>
  <text x="92" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    path, UTF_8)) {</text>
  <text x="92" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  bw.write(</text>
  <text x="92" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">           "안녕하세요");</text>
  <text x="92" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  bw.newLine(); </text>
  <text x="92" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// OS 줄구분자</text>
  <text x="92" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  bw.write(</text>
  <text x="92" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">           "두 번째 줄");</text>
  <text x="92" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">} </text>
  <text x="92" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">  // close() → flush() 자동</text>

  <!-- PrintWriter pattern -->
  <rect x="460" y="90" width="360" height="200" rx="8" fill="#102010" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">PrintWriter — 포맷 출력</text>

  <rect x="476" y="122" width="328" height="156" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// autoFlush=false (기본)</text>
  <text x="492" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">try</text>
  <text x="492" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    (PrintWriter pw =</text>
  <text x="492" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">    new</text>
  <text x="492" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">         PrintWriter(</text>
  <text x="492" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      Files.newBufferedWriter(</text>
  <text x="492" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">        path, UTF_8))) {</text>
  <text x="492" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  pw.printf(</text>
  <text x="492" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">            "%s: %d%n"</text>
  <text x="492" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    , name, count); }</text>

  <!-- autoFlush comparison -->
  <rect x="60" y="310" width="760" height="130" rx="8" fill="#101010" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="332" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">autoFlush — PrintWriter의 자동 flush 제어</text>

  <rect x="76" y="342" width="340" height="86" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="246" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">autoFlush=false (기본)</text>
  <text x="92" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">println() 호출해도 즉시 전송 안 됨</text>
  <text x="92" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">파일 쓰기: close() 또는 flush() 시점에 기록</text>
  <text x="92" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">→ 파일/배치 출력에 적합 (성능 좋음)</text>

  <rect x="448" y="342" width="356" height="86" rx="6" fill="#101810" stroke="#55c555" stroke-width="1"/>
  <text x="626" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">autoFlush=true</text>
  <text x="464" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">println() 호출마다 즉시 flush</text>
  <text x="464" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">소켓/대화형 스트림에 필요</text>
  <text x="464" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">→ 잦은 flush로 성능 저하 가능</text>
</svg>
