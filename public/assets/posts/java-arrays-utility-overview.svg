<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">java.util.Arrays 주요 메서드</text>

  <!-- Category: Sort & Search -->
  <rect x="60" y="68" width="350" height="168" fill="#0f1f30" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="235" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">정렬 · 검색</text>
  <text x="80" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Arrays.sort(arr)                   O(n log n)</text>
  <text x="80" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Arrays.sort(arr, from, to)         범위 정렬</text>
  <text x="80" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Arrays.parallelSort(arr)           병렬 정렬</text>
  <text x="80" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Arrays.binarySearch(arr, key)      O(log n)</text>
  <text x="80" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">기본 타입: Dual-Pivot QuickSort</text>
  <text x="80" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">객체 타입: TimSort (안정 정렬)</text>

  <!-- Category: Copy & Fill -->
  <rect x="470" y="68" width="350" height="168" fill="#0f2010" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="645" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">복사 · 채우기</text>
  <text x="490" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Arrays.copyOf(arr, newLen)</text>
  <text x="490" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Arrays.copyOfRange(arr, from, to)</text>
  <text x="490" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Arrays.fill(arr, value)</text>
  <text x="490" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Arrays.fill(arr, from, to, value)</text>
  <text x="490" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">System.arraycopy()보다 편리</text>
  <text x="490" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">내부는 System.arraycopy 위임</text>

  <!-- Category: Compare & String -->
  <rect x="60" y="256" width="350" height="140" fill="#201020" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="235" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc">비교 · 문자열 변환</text>
  <text x="80" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Arrays.equals(a, b)         얕은 비교</text>
  <text x="80" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Arrays.deepEquals(a, b)     다차원 비교</text>
  <text x="80" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Arrays.toString(arr)        [1, 2, 3] 형태</text>
  <text x="80" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Arrays.deepToString(arr)    다차원 포함</text>
  <text x="80" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Arrays.hashCode / deepHashCode</text>

  <!-- Category: Stream & Spliterator -->
  <rect x="470" y="256" width="350" height="140" fill="#1a1500" rx="8" stroke="#e0b555" stroke-width="1.5"/>
  <text x="645" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e0b555">Stream 변환</text>
  <text x="490" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Arrays.stream(arr)              IntStream 등</text>
  <text x="490" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Arrays.stream(arr, from, to)    범위 스트림</text>
  <text x="490" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">기본 타입 → 박싱 없이 IntStream</text>
  <text x="490" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">객체 배열 → Stream&lt;T&gt;</text>
  <text x="490" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">asList(): 고정 크기 List 뷰</text>

  <!-- Bottom caption -->
  <text x="440" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">parallelSort: ForkJoinPool 활용 — 배열 크기 8192 이상에서 순차 sort 대비 유의미한 성능 향상</text>
  <text x="440" y="460" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">binarySearch: sort 없이 호출 시 결과 미정의</text>
</svg>
