<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">stash 복원 충돌 처리 흐름</text>

  <!-- Step 1 -->
  <rect x="60" y="70" width="160" height="60" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="140" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">git stash pop</text>
  <text x="140" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">복원 시도</text>

  <line x1="220" y1="100" x2="290" y2="100" stroke="#e05555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="255" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">충돌!</text>

  <!-- Step 2 conflict -->
  <rect x="300" y="70" width="180" height="60" rx="8" fill="#1f0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="390" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">CONFLICT</text>
  <text x="390" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">충돌 마커 생성됨</text>

  <!-- Note: pop with conflict keeps stash -->
  <rect x="300" y="150" width="180" height="50" rx="6" fill="#1f1800" stroke="#e8a42a" stroke-width="1.5"/>
  <text x="390" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8a42a">⚠ pop 충돌 시</text>
  <text x="390" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">stash는 삭제 안 됨</text>

  <!-- Step 3: resolve -->
  <line x1="480" y1="100" x2="550" y2="100" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="515" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">해결</text>

  <rect x="560" y="70" width="180" height="60" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">충돌 해결</text>
  <text x="650" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">git add + drop</text>

  <!-- Code block -->
  <rect x="60" y="230" width="760" height="144" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 충돌 발생 시 처리 흐름</text>
  <text x="76" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">git stash <tspan fill="#7ec8e3" font-weight="600">pop</tspan>         <tspan fill="#9aa4b8"># CONFLICT 발생</tspan></text>
  <text x="76" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 충돌 파일 편집 후</text>
  <text x="76" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">git <tspan fill="#7ec8e3" font-weight="600">add</tspan> &lt;file&gt;     <tspan fill="#9aa4b8"># 해결된 파일 스테이징</tspan></text>
  <text x="76" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">git stash <tspan fill="#e05555" font-weight="600">drop</tspan>        <tspan fill="#9aa4b8"># stash 수동 삭제</tspan></text>
  <text x="76" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># --index: 스테이징 상태도 복원</text>
  <text x="76" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">git stash <tspan fill="#55c555" font-weight="600">apply</tspan> <tspan fill="#7ec8e3" font-weight="600">--index</tspan>  <tspan fill="#9aa4b8"># 인덱스 포함 복원</tspan></text>
</svg>
