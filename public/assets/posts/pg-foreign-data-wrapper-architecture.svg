<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <defs>
    <marker id="arr" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 20 7, 0 14" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 20 7, 0 14" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">PostgreSQL FDW 아키텍처</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">로컬 PostgreSQL에서 외부 데이터 소스를 투명하게 쿼리</text>

  <!-- Local PG -->
  <rect x="60" y="90" width="380" height="280" rx="10" fill="#111" stroke="#7ec8e3" stroke-width="2"/>
  <text x="250" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">로컬 PostgreSQL</text>

  <!-- SQL query box -->
  <rect x="90" y="130" width="320" height="40" rx="6" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="250" y="155" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">SELECT * FROM remote_orders WHERE ...</text>

  <!-- Arrow down -->
  <line x1="250" y1="170" x2="250" y2="190" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- FDW Handler -->
  <rect x="90" y="194" width="320" height="44" rx="6" fill="#1a2030" stroke="#7777cc" stroke-width="1.5"/>
  <text x="250" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">FDW 핸들러 (확장)</text>
  <text x="250" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">플래너 훅 + 실행 훅</text>

  <!-- Foreign server -->
  <rect x="90" y="254" width="148" height="44" rx="6" fill="#1a1a1a" stroke="#888" stroke-width="1"/>
  <text x="164" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">FOREIGN SERVER</text>
  <text x="164" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8" text-anchor="middle">host, port, dbname</text>

  <!-- User mapping -->
  <rect x="262" y="254" width="148" height="44" rx="6" fill="#1a1a1a" stroke="#888" stroke-width="1"/>
  <text x="336" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">USER MAPPING</text>
  <text x="336" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8" text-anchor="middle">user, password</text>

  <!-- Foreign table -->
  <rect x="90" y="316" width="320" height="40" rx="6" fill="#2e1a00" stroke="#ce9178" stroke-width="1.5"/>
  <text x="250" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#ce9178" text-anchor="middle">FOREIGN TABLE: remote_orders</text>

  <!-- Pushdown note -->
  <text x="90" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">WHERE/ORDER/LIMIT 푸시다운 지원</text>
  <text x="90" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ 원격에서 필터링 후 결과만 전송</text>

  <!-- Arrow to remote -->
  <line x1="440" y1="300" x2="510" y2="300" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>
  <line x1="510" y1="300" x2="440" y2="300" stroke="#55c555" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Remote sources -->
  <text x="530" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">외부 데이터 소스</text>

  <!-- postgres_fdw -->
  <rect x="520" y="120" width="300" height="50" rx="8" fill="#1a2e1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="630" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#55c555">postgres_fdw</text>
  <text x="750" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">(내장)</text>
  <text x="630" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">다른 PostgreSQL 서버</text>

  <!-- mysql_fdw -->
  <rect x="520" y="186" width="300" height="50" rx="8" fill="#111" stroke="#ce9178" stroke-width="1.5"/>
  <text x="630" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#ce9178">mysql_fdw</text>
  <text x="750" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">(서드파티)</text>
  <text x="630" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">MySQL / MariaDB</text>

  <!-- oracle_fdw -->
  <rect x="520" y="252" width="300" height="50" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="630" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7777cc">oracle_fdw</text>
  <text x="750" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">(서드파티)</text>
  <text x="630" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Oracle Database</text>

  <!-- file_fdw -->
  <rect x="520" y="318" width="300" height="50" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="630" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3">file_fdw</text>
  <text x="750" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">(내장)</text>
  <text x="630" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">CSV · TSV 파일</text>

  <!-- redis / S3 -->
  <rect x="520" y="384" width="300" height="50" rx="8" fill="#111" stroke="#888" stroke-width="1"/>
  <text x="630" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">redis_fdw / s3_fdw</text>
  <text x="630" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Redis, S3 (서드파티)</text>

  <!-- S3 connection line -->
  <line x1="440" y1="230" x2="516" y2="230" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <line x1="440" y1="165" x2="516" y2="165" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arr)"/>
</svg>
