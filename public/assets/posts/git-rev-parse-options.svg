<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">git rev-parse 유틸리티 옵션</text>

  <rect x="60" y="70" width="760" height="265" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text xml:space="preserve" x="80" y="96" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 저장소 루트 절대 경로</text>
  <text xml:space="preserve" x="80" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">git rev-parse --show-toplevel   </text><text xml:space="preserve" x="470" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8"># /home/alice/project</text>

  <text xml:space="preserve" x="80" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># .git 디렉터리 경로</text>
  <text xml:space="preserve" x="80" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">git rev-parse --git-dir          </text><text xml:space="preserve" x="470" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8"># /home/alice/project/.git</text>

  <text xml:space="preserve" x="80" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 현재 브랜치명 (detached HEAD면 빈 값)</text>
  <text xml:space="preserve" x="80" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">git rev-parse --abbrev-ref HEAD  </text><text xml:space="preserve" x="470" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8"># main</text>

  <text xml:space="preserve" x="80" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 단축 SHA (기본 7자, 고유성 보장)</text>
  <text xml:space="preserve" x="80" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">git rev-parse --short HEAD       </text><text xml:space="preserve" x="470" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8"># abc1234</text>

  <text xml:space="preserve" x="80" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># git 저장소 내부인지 확인 (스크립트용)</text>
  <text xml:space="preserve" x="80" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">git rev-parse --is-inside-work-tree </text><text xml:space="preserve" x="484" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8"># true</text>

  <text xml:space="preserve" x="80" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 여러 SHA를 한 번에 확인</text>
</svg>
