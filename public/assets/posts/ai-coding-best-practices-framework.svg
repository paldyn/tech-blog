<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">AI 코딩 모범 사례 프레임워크</text>
  <text x="440" y="72" text-anchor="middle" font-size="13" fill="#888">5 Pillars of Effective AI-Assisted Development</text>

  <!-- 5 pillars -->
  <!-- 1. Context -->
  <rect x="40" y="96" width="148" height="230" rx="8" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="114" y="124" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">컨텍스트</text>
  <text x="114" y="142" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">최적화</text>
  <text x="114" y="168" text-anchor="middle" font-size="12" fill="#888">명확한 주석</text>
  <text x="114" y="186" text-anchor="middle" font-size="12" fill="#888">타입 힌트 필수</text>
  <text x="114" y="204" text-anchor="middle" font-size="12" fill="#888">관련 파일 열기</text>
  <text x="114" y="222" text-anchor="middle" font-size="12" fill="#888">CLAUDE.md/</text>
  <text x="114" y="240" text-anchor="middle" font-size="12" fill="#888">.cursorrules</text>
  <text x="114" y="262" text-anchor="middle" font-size="12" fill="#888">예시 코드 제공</text>
  <text x="114" y="280" text-anchor="middle" font-size="12" fill="#888">에러 메시지 포함</text>
  <text x="114" y="306" text-anchor="middle" font-size="11" fill="#55c555">→ 제안 품질 ↑</text>

  <!-- 2. Verification -->
  <rect x="204" y="96" width="148" height="230" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="278" y="124" text-anchor="middle" font-size="14" font-weight="700" fill="#7ec8e3">코드</text>
  <text x="278" y="142" text-anchor="middle" font-size="14" font-weight="700" fill="#7ec8e3">검증</text>
  <text x="278" y="168" text-anchor="middle" font-size="12" fill="#888">반드시 읽고 이해</text>
  <text x="278" y="186" text-anchor="middle" font-size="12" fill="#888">보안 취약점 확인</text>
  <text x="278" y="204" text-anchor="middle" font-size="12" fill="#888">테스트 실행</text>
  <text x="278" y="222" text-anchor="middle" font-size="12" fill="#888">엣지 케이스 검토</text>
  <text x="278" y="240" text-anchor="middle" font-size="12" fill="#888">성능 영향 분석</text>
  <text x="278" y="262" text-anchor="middle" font-size="12" fill="#888">라이선스 확인</text>
  <text x="278" y="280" text-anchor="middle" font-size="12" fill="#888">린터·타입체커</text>
  <text x="278" y="306" text-anchor="middle" font-size="11" fill="#7ec8e3">→ 신뢰성 확보</text>

  <!-- 3. Decomposition -->
  <rect x="368" y="96" width="148" height="230" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="442" y="124" text-anchor="middle" font-size="14" font-weight="700" fill="#7777cc">작업</text>
  <text x="442" y="142" text-anchor="middle" font-size="14" font-weight="700" fill="#7777cc">분해</text>
  <text x="442" y="168" text-anchor="middle" font-size="12" fill="#888">작은 단위로 나누기</text>
  <text x="442" y="186" text-anchor="middle" font-size="12" fill="#888">한 번에 하나만</text>
  <text x="442" y="204" text-anchor="middle" font-size="12" fill="#888">완료 기준 명시</text>
  <text x="442" y="222" text-anchor="middle" font-size="12" fill="#888">중간 결과 검토</text>
  <text x="442" y="240" text-anchor="middle" font-size="12" fill="#888">점진적 통합</text>
  <text x="442" y="262" text-anchor="middle" font-size="12" fill="#888">단계별 테스트</text>
  <text x="442" y="280" text-anchor="middle" font-size="12" fill="#888">롤백 지점 확보</text>
  <text x="442" y="306" text-anchor="middle" font-size="11" fill="#7777cc">→ 제어력 유지</text>

  <!-- 4. Iteration -->
  <rect x="532" y="96" width="148" height="230" rx="8" fill="#111" stroke="#ce9178" stroke-width="1.5"/>
  <text x="606" y="124" text-anchor="middle" font-size="14" font-weight="700" fill="#ce9178">반복</text>
  <text x="606" y="142" text-anchor="middle" font-size="14" font-weight="700" fill="#ce9178">개선</text>
  <text x="606" y="168" text-anchor="middle" font-size="12" fill="#888">첫 결과에 만족 말것</text>
  <text x="606" y="186" text-anchor="middle" font-size="12" fill="#888">구체적 피드백</text>
  <text x="606" y="204" text-anchor="middle" font-size="12" fill="#888">대안 요청</text>
  <text x="606" y="222" text-anchor="middle" font-size="12" fill="#888">패턴 학습·저장</text>
  <text x="606" y="240" text-anchor="middle" font-size="12" fill="#888">프롬프트 라이브러리</text>
  <text x="606" y="262" text-anchor="middle" font-size="12" fill="#888">성공 패턴 문서화</text>
  <text x="606" y="280" text-anchor="middle" font-size="12" fill="#888">팀 공유</text>
  <text x="606" y="306" text-anchor="middle" font-size="11" fill="#ce9178">→ 효율 누적</text>

  <!-- 5. Security -->
  <rect x="696" y="96" width="144" height="230" rx="8" fill="#111" stroke="#e05555" stroke-width="1.5"/>
  <text x="768" y="124" text-anchor="middle" font-size="14" font-weight="700" fill="#e05555">보안·</text>
  <text x="768" y="142" text-anchor="middle" font-size="14" font-weight="700" fill="#e05555">윤리</text>
  <text x="768" y="168" text-anchor="middle" font-size="12" fill="#888">비밀키 노출 방지</text>
  <text x="768" y="186" text-anchor="middle" font-size="12" fill="#888">개인정보 마스킹</text>
  <text x="768" y="204" text-anchor="middle" font-size="12" fill="#888">OWASP Top 10 확인</text>
  <text x="768" y="222" text-anchor="middle" font-size="12" fill="#888">AI 생성 코드 공시</text>
  <text x="768" y="240" text-anchor="middle" font-size="12" fill="#888">라이선스 준수</text>
  <text x="768" y="262" text-anchor="middle" font-size="12" fill="#888">프라이버시 모드</text>
  <text x="768" y="280" text-anchor="middle" font-size="12" fill="#888">코드 유출 방지</text>
  <text x="768" y="306" text-anchor="middle" font-size="11" fill="#e05555">→ 위험 관리</text>

  <!-- Bottom: tool selection -->
  <rect x="40" y="348" width="800" height="88" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="372" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">도구 선택 원칙</text>
  <text x="114" y="396" text-anchor="middle" font-size="12" fill="#55c555">Copilot</text>
  <text x="114" y="412" text-anchor="middle" font-size="11" fill="#666">인라인 자동완성</text>
  <text x="114" y="426" text-anchor="middle" font-size="11" fill="#666">기존 IDE 유지</text>
  <text x="280" y="396" text-anchor="middle" font-size="12" fill="#7ec8e3">Cursor</text>
  <text x="280" y="412" text-anchor="middle" font-size="11" fill="#666">대규모 멀티파일</text>
  <text x="280" y="426" text-anchor="middle" font-size="11" fill="#666">@codebase 활용</text>
  <text x="440" y="396" text-anchor="middle" font-size="12" fill="#7777cc">Claude Code</text>
  <text x="440" y="412" text-anchor="middle" font-size="11" fill="#666">에이전트·MCP</text>
  <text x="440" y="426" text-anchor="middle" font-size="11" fill="#666">CI/CD 통합</text>
  <text x="606" y="396" text-anchor="middle" font-size="12" fill="#ce9178">Aider</text>
  <text x="606" y="412" text-anchor="middle" font-size="11" fill="#666">Git 히스토리 중시</text>
  <text x="606" y="426" text-anchor="middle" font-size="11" fill="#666">로컬 모델 선호</text>
  <text x="768" y="396" text-anchor="middle" font-size="12" fill="#e05555">ChatGPT/Claude.ai</text>
  <text x="768" y="412" text-anchor="middle" font-size="11" fill="#666">일회성 질문</text>
  <text x="768" y="426" text-anchor="middle" font-size="11" fill="#666">설명·학습 목적</text>
</svg>
