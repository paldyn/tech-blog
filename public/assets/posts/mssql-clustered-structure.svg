<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arri" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">클러스터형 인덱스 — 데이터 페이지 = 리프 노드</text>

  <!-- B-Tree structure -->
  <!-- Root node -->
  <rect x="340" y="70" width="200" height="50" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">루트 페이지</text>
  <text x="440" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">키 범위: [1-100] [101-200]</text>

  <!-- Internal nodes -->
  <rect x="130" y="160" width="180" height="50" rx="8" fill="#111122" stroke="#7777cc" stroke-width="1.5"/>
  <text x="220" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle">중간 페이지 L</text>
  <text x="220" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">키: [1-50] [51-100]</text>

  <rect x="570" y="160" width="180" height="50" rx="8" fill="#111122" stroke="#7777cc" stroke-width="1.5"/>
  <text x="660" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle">중간 페이지 R</text>
  <text x="660" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">키: [101-150] [151-200]</text>

  <!-- Arrows from root to internal -->
  <line x1="400" y1="120" x2="270" y2="160" stroke="#7ec8e3" stroke-width="2"
        marker-end="url(#arri)"/>
  <line x1="480" y1="120" x2="610" y2="160" stroke="#7ec8e3" stroke-width="2"
        marker-end="url(#arri)"/>

  <!-- Leaf nodes (data pages) -->
  <rect x="60" y="260" width="160" height="70" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="2"/>
  <text x="140" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">데이터 페이지 1</text>
  <text x="140" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">id=1 | 김민수 | 100원</text>
  <text x="140" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">id=2 | 이지현 | 200원</text>

  <rect x="250" y="260" width="160" height="70" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="2"/>
  <text x="330" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">데이터 페이지 2</text>
  <text x="330" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">id=51 | 박서준 | 50원</text>
  <text x="330" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">id=52 | 최유나 | 80원</text>

  <rect x="470" y="260" width="160" height="70" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="2"/>
  <text x="550" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">데이터 페이지 3</text>
  <text x="550" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">id=101 | 강도현 | 300원</text>
  <text x="550" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">id=102 | 윤지원 | 150원</text>

  <rect x="660" y="260" width="160" height="70" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="2"/>
  <text x="740" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">데이터 페이지 4</text>
  <text x="740" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">id=151 | 정수빈 | 90원</text>
  <text x="740" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">id=152 | 한예진 | 220원</text>

  <!-- Arrows from internal to leaf -->
  <line x1="180" y1="210" x2="140" y2="260" stroke="#7ec8e3" stroke-width="2"
        marker-end="url(#arri)"/>
  <line x1="220" y1="210" x2="330" y2="260" stroke="#7ec8e3" stroke-width="2"
        marker-end="url(#arri)"/>
  <line x1="620" y1="210" x2="550" y2="260" stroke="#7ec8e3" stroke-width="2"
        marker-end="url(#arri)"/>
  <line x1="680" y1="210" x2="740" y2="260" stroke="#7ec8e3" stroke-width="2"
        marker-end="url(#arri)"/>

  <!-- Linked list arrows between leaf pages -->
  <line x1="220" y1="295" x2="250" y2="295" stroke="#55c555" stroke-width="2"
        marker-end="url(#arri)"/>
  <line x1="410" y1="295" x2="470" y2="295" stroke="#55c555" stroke-width="2"
        marker-end="url(#arri)"/>
  <line x1="630" y1="295" x2="660" y2="295" stroke="#55c555" stroke-width="2"
        marker-end="url(#arri)"/>

  <!-- Labels -->
  <text x="140" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">리프 = 실제 데이터</text>
  <text x="140" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(B-Tree 정렬)</text>

  <!-- Key insight -->
  <rect x="60" y="390" width="760" height="80" rx="8" fill="#0f1a0f" stroke="#2a4a2a" stroke-width="1"/>
  <text x="440" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">클러스터형 인덱스의 핵심: 데이터 페이지 = 리프 노드</text>
  <text x="440" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">테이블당 1개만 가능 · 행이 클러스터 키 순서대로 물리적 정렬 · PK 기본 적용</text>
  <text x="440" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">범위 조회(BETWEEN, ≥) 최적 · 인접 행이 같은 페이지에 있어 I/O 최소화</text>
</svg>
