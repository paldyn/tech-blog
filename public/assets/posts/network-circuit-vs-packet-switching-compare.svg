<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">회선 교환 vs 패킷 교환</text>
  <text x="440" y="66" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">두 가지 근본적으로 다른 네트워크 전송 방식</text>

  <!-- Circuit Switching Left -->
  <text x="200" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">회선 교환 (Circuit Switching)</text>

  <!-- Dedicated path: A -> R1 -> R2 -> R3 -> B -->
  <circle cx="80" cy="160" r="22" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="80" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#7ec8e3" text-anchor="middle">A</text>
  <circle cx="160" cy="160" r="18" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="160" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">R1</text>
  <circle cx="240" cy="160" r="18" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="240" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">R2</text>
  <circle cx="320" cy="160" r="18" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="320" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">R3</text>
  <circle cx="400" cy="160" r="22" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="400" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#7ec8e3" text-anchor="middle">B</text>

  <!-- Dedicated path lines (thick, reserved) -->
  <line x1="102" y1="160" x2="142" y2="160" stroke="#7ec8e3" stroke-width="4"/>
  <line x1="178" y1="160" x2="222" y2="160" stroke="#7ec8e3" stroke-width="4"/>
  <line x1="258" y1="160" x2="302" y2="160" stroke="#7ec8e3" stroke-width="4"/>
  <line x1="338" y1="160" x2="378" y2="160" stroke="#7ec8e3" stroke-width="4"/>

  <text x="240" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">전용 경로 예약 (통화 내내 점유)</text>

  <!-- Pros/Cons circuit -->
  <rect x="60" y="220" width="360" height="90" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">장점</text>
  <text x="80" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">• 일정한 품질 (지연·지터 예측 가능)</text>
  <text x="80" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">• 전화망(PSTN)에 최적화</text>
  <text x="80" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">단점</text>
  <text x="80" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">• 침묵 구간에도 자원 낭비 (비효율)</text>

  <!-- Packet Switching Right -->
  <text x="660" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">패킷 교환 (Packet Switching)</text>

  <!-- Multiple paths: packets take different routes -->
  <circle cx="500" cy="160" r="22" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="500" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#55c555" text-anchor="middle">A</text>
  <circle cx="590" cy="130" r="18" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="590" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">R1</text>
  <circle cx="590" cy="190" r="18" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="590" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">R2</text>
  <circle cx="680" cy="160" r="18" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="680" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">R3</text>
  <circle cx="800" cy="160" r="22" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="800" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#55c555" text-anchor="middle">B</text>

  <!-- Packet 1 via R1 -->
  <line x1="522" y1="150" x2="572" y2="133" stroke="#55c555" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="608" y1="133" x2="662" y2="153" stroke="#55c555" stroke-width="2" stroke-dasharray="5,3"/>
  <!-- Packet 2 via R2 -->
  <line x1="522" y1="168" x2="572" y2="185" stroke="#7777cc" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="608" y1="185" x2="662" y2="167" stroke="#7777cc" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="698" y1="160" x2="778" y2="160" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>

  <text x="660" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">패킷마다 최적 경로 선택</text>

  <!-- Pros/Cons packet -->
  <rect x="480" y="220" width="360" height="90" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="500" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">장점</text>
  <text x="500" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">• 자원 공유로 높은 효율성</text>
  <text x="500" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">• 장애 발생 시 우회 경로 자동 선택</text>
  <text x="500" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">단점</text>
  <text x="500" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">• 혼잡 시 지연·지터 증가 가능</text>

  <!-- Divider -->
  <line x1="445" y1="90" x2="445" y2="330" stroke="#222" stroke-width="1.5"/>

  <!-- Bottom note -->
  <rect x="60" y="340" width="760" height="76" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" font-weight="600" text-anchor="middle">인터넷 = 패킷 교환</text>
  <text x="440" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">냉전 시대 군용 통신망(ARPANET) 설계 목표: 일부 경로가 파괴되어도</text>
  <text x="440" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">다른 경로로 데이터가 전달되도록 → 패킷 교환 방식이 채택됨</text>
</svg>
