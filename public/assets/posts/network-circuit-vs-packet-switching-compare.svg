<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrd" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">회선 교환 vs 패킷 교환</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">Circuit Switching vs Packet Switching</text>

  <!-- Circuit Switching -->
  <rect x="60" y="88" width="360" height="180" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="2"/>
  <text x="240" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">회선 교환</text>
  <text x="240" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Circuit Switching (전화망)</text>

  <!-- Dedicated path visualization -->
  <rect x="80" y="148" width="40" height="26" rx="4" fill="#1a2535" stroke="#7ec8e3" stroke-width="1"/>
  <text x="100" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3" text-anchor="middle">A</text>
  <!-- dedicated line -->
  <line x1="120" y1="161" x2="180" y2="161" stroke="#7ec8e3" stroke-width="3"/>
  <rect x="180" y="148" width="40" height="26" rx="4" fill="#1a2535" stroke="#3a4a6e" stroke-width="1"/>
  <text x="200" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">R1</text>
  <line x1="220" y1="161" x2="280" y2="161" stroke="#7ec8e3" stroke-width="3"/>
  <rect x="280" y="148" width="40" height="26" rx="4" fill="#1a2535" stroke="#3a4a6e" stroke-width="1"/>
  <text x="300" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">R2</text>
  <line x1="320" y1="161" x2="380" y2="161" stroke="#7ec8e3" stroke-width="3"/>
  <rect x="380" y="148" width="40" height="26" rx="4" fill="#1a2535" stroke="#7ec8e3" stroke-width="1"/>
  <text x="400" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3" text-anchor="middle">B</text>

  <text x="240" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">통화 내내 전용 경로 유지 (점선=유휴시에도 점유)</text>
  <line x1="80" y1="215" x2="420" y2="215" stroke="#3a4a6e" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="240" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">유휴 상태 (침묵)에도 대역폭 점유</text>
  <text x="240" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">✓ 일정한 QoS 보장</text>
  <text x="240" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">✗ 자원 낭비, 연결 수 제한</text>

  <!-- Packet Switching -->
  <rect x="460" y="88" width="360" height="180" rx="8" fill="#111827" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">패킷 교환</text>
  <text x="640" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Packet Switching (인터넷)</text>

  <!-- Multiple paths visualization -->
  <rect x="480" y="148" width="40" height="26" rx="4" fill="#1a2535" stroke="#55c555" stroke-width="1"/>
  <text x="500" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">A</text>
  <!-- multiple possible paths -->
  <line x1="520" y1="155" x2="560" y2="148" stroke="#55c555" stroke-width="1.5"/>
  <line x1="520" y1="161" x2="560" y2="168" stroke="#7777cc" stroke-width="1.5"/>
  <rect x="560" y="136" width="40" height="26" rx="4" fill="#1a2535" stroke="#3a4a6e" stroke-width="1"/>
  <text x="580" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">R1</text>
  <rect x="560" y="156" width="40" height="26" rx="4" fill="#1a2535" stroke="#3a4a6e" stroke-width="1"/>
  <text x="580" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">R2</text>
  <line x1="600" y1="149" x2="640" y2="155" stroke="#55c555" stroke-width="1.5"/>
  <line x1="600" y1="169" x2="640" y2="161" stroke="#7777cc" stroke-width="1.5"/>
  <rect x="640" y="148" width="40" height="26" rx="4" fill="#1a2535" stroke="#55c555" stroke-width="1"/>
  <text x="660" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">B</text>

  <text x="640" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">패킷마다 최적 경로로 독립 전달</text>
  <text x="640" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">같은 스트림도 다른 경로 가능</text>
  <text x="640" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">✓ 자원 공유, 확장성 우수</text>
  <text x="640" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">✗ 가변 지연, QoS 보장 어려움</text>
  <text x="640" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">✗ 패킷 순서 변경 가능</text>

  <!-- Comparison table -->
  <rect x="60" y="290" width="760" height="170" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">비교 요약</text>

  <!-- Header row -->
  <text x="160" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">항목</text>
  <text x="370" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">회선 교환</text>
  <text x="630" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">패킷 교환</text>

  <line x1="76" y1="340" x2="804" y2="340" stroke="#1e2a3a" stroke-width="1"/>

  <text x="160" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">자원 할당</text>
  <text x="370" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">연결 수립 시 전용 예약</text>
  <text x="630" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">필요 시만 사용 (공유)</text>

  <line x1="76" y1="366" x2="804" y2="366" stroke="#1e2a3a" stroke-width="1"/>

  <text x="160" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">지연 특성</text>
  <text x="370" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">일정 (저지연 보장)</text>
  <text x="630" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">가변 (혼잡 시 증가)</text>

  <line x1="76" y1="392" x2="804" y2="392" stroke="#1e2a3a" stroke-width="1"/>

  <text x="160" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">사용 예</text>
  <text x="370" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">PSTN 전화망, ISDN</text>
  <text x="630" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">인터넷, 이더넷, Wi-Fi</text>

  <line x1="76" y1="418" x2="804" y2="418" stroke="#1e2a3a" stroke-width="1"/>

  <text x="160" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">확장성</text>
  <text x="370" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">낮음 (연결 수 제한)</text>
  <text x="630" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">높음 (통계적 다중화)</text>

  <line x1="76" y1="444" x2="804" y2="444" stroke="#1e2a3a" stroke-width="1"/>
  <line x1="76" y1="340" x2="76" y2="454" stroke="#1e2a3a" stroke-width="1"/>
  <line x1="266" y1="340" x2="266" y2="454" stroke="#1e2a3a" stroke-width="1"/>
  <line x1="480" y1="340" x2="480" y2="454" stroke="#1e2a3a" stroke-width="1"/>
  <line x1="804" y1="340" x2="804" y2="454" stroke="#1e2a3a" stroke-width="1"/>
</svg>
