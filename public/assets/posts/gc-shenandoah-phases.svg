<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="flow" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888888"/>
    </marker>
  </defs>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Shenandoah 수집 페이즈 — 압축까지 동시 수행</text>

  <!-- Legend -->
  <rect x="320" y="64" width="14" height="14" rx="3" fill="#3a1414" stroke="#e05555" stroke-width="1.5"/>
  <text x="342" y="76" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">STW (아주 짧음)</text>
  <rect x="470" y="64" width="14" height="14" rx="3" fill="#143a14" stroke="#55c555" stroke-width="1.5"/>
  <text x="492" y="76" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">동시 (concurrent)</text>

  <!-- Phase 1: Init Mark (STW) -->
  <rect x="70" y="100" width="120" height="70" rx="8" fill="#1a0e0e" stroke="#e05555" stroke-width="1.5"/>
  <text x="130" y="130" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">Init Mark</text>
  <text x="130" y="150" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">STW</text>
  <text x="130" y="166" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">루트 스캔</text>

  <path d="M 192 135 L 246 135" stroke="#888888" stroke-width="2" fill="none" marker-end="url(#flow)"/>

  <!-- Phase 2: Concurrent Mark -->
  <rect x="248" y="100" width="150" height="70" rx="8" fill="#0e1a0e" stroke="#55c555" stroke-width="1.5"/>
  <text x="323" y="130" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Concurrent Mark</text>
  <text x="323" y="150" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">동시 · 객체 그래프 탐색</text>
  <text x="323" y="166" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">앱과 함께 실행</text>

  <path d="M 400 135 L 454 135" stroke="#888888" stroke-width="2" fill="none" marker-end="url(#flow)"/>

  <!-- Phase 3: Final Mark (STW) -->
  <rect x="456" y="100" width="120" height="70" rx="8" fill="#1a0e0e" stroke="#e05555" stroke-width="1.5"/>
  <text x="516" y="130" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">Final Mark</text>
  <text x="516" y="150" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">STW</text>
  <text x="516" y="166" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">마킹 마무리</text>

  <path d="M 578 135 L 632 135" stroke="#888888" stroke-width="2" fill="none" marker-end="url(#flow)"/>

  <!-- Phase 4: Concurrent Evacuation (highlighted) -->
  <rect x="634" y="96" width="176" height="78" rx="8" fill="#0e1a0e" stroke="#55c555" stroke-width="2.5"/>
  <text x="722" y="124" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Concurrent Evacuation</text>
  <text x="722" y="146" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#55c555">동시 압축(compaction)!</text>
  <text x="722" y="164" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">앱 정지 없이 객체 이동</text>

  <!-- down connector from Evac to next row -->
  <path d="M 722 178 L 722 220 L 760 220 L 760 260" stroke="#888888" stroke-width="2" fill="none" marker-end="url(#flow)"/>

  <!-- Phase 5: Init Update Refs (STW) -->
  <rect x="634" y="264" width="176" height="74" rx="8" fill="#1a0e0e" stroke="#e05555" stroke-width="1.5"/>
  <text x="722" y="292" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">Init Update Refs</text>
  <text x="722" y="312" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">STW</text>
  <text x="722" y="330" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">참조 갱신 준비</text>

  <path d="M 632 301 L 578 301" stroke="#888888" stroke-width="2" fill="none" marker-end="url(#flow)"/>

  <!-- Phase 6: Concurrent Update References -->
  <rect x="408" y="264" width="168" height="74" rx="8" fill="#0e1a0e" stroke="#55c555" stroke-width="1.5"/>
  <text x="492" y="292" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Concurrent Update Refs</text>
  <text x="492" y="312" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">동시 · 옛 참조 → 새 위치</text>
  <text x="492" y="330" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">힙 전체 참조 정정</text>

  <path d="M 406 301 L 352 301" stroke="#888888" stroke-width="2" fill="none" marker-end="url(#flow)"/>

  <!-- Phase 7: Final Update Refs (STW) -->
  <rect x="180" y="264" width="170" height="74" rx="8" fill="#1a0e0e" stroke="#e05555" stroke-width="1.5"/>
  <text x="265" y="292" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">Final Update Refs</text>
  <text x="265" y="312" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">STW · 루트 갱신</text>
  <text x="265" y="330" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">From-region 회수</text>

  <!-- Key insight box -->
  <rect x="70" y="380" width="740" height="116" rx="8" fill="#0a141a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="410" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">핵심: 압축(객체 이동)이 STW가 아니라 동시 단계에서 일어난다</text>
  <text x="440" y="438" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">전통적 Mark-Compact는 객체 이동을 STW에서 수행 → 힙이 클수록 정지가 길어진다</text>
  <text x="440" y="460" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Shenandoah는 forwarding 포인터 + 배리어로 이동을 동시에 처리 → STW는 루트 스캔 등 짧은 구간만</text>
  <text x="440" y="482" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">정지 시간이 힙 크기와 무관 (수 밀리초 이하)</text>
</svg>
