<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a;border-radius:12px">
  <defs>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#3a6ea8"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">해싱 vs 암호화: 핵심 차이</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">단방향 vs 양방향 — 언제 무엇을 쓸 것인가</text>

  <!-- Left: Hashing -->
  <rect x="60" y="95" width="360" height="36" rx="6" fill="#180d1a" stroke="#8a3aa8" stroke-width="1.5"/>
  <text x="240" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#b07ad0" text-anchor="middle">해싱 (Hashing) — 단방향</text>

  <!-- Input -->
  <rect x="60" y="146" width="120" height="44" rx="6" fill="#0d1520" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="120" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">평문</text>

  <!-- Hash function -->
  <rect x="205" y="146" width="100" height="44" rx="6" fill="#2d0a3a" stroke="#8a3aa8" stroke-width="1.5"/>
  <text x="255" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#b07ad0" text-anchor="middle">Hash</text>
  <text x="255" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">함수</text>

  <!-- Hash output -->
  <rect x="330" y="146" width="90" height="44" rx="6" fill="#0d1520" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="375" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178" text-anchor="middle">다이제스트</text>
  <text x="375" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">(고정 길이)</text>

  <!-- Arrows -->
  <line x1="182" y1="168" x2="203" y2="168" stroke="#3a6ea8" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <line x1="307" y1="168" x2="328" y2="168" stroke="#3a6ea8" stroke-width="1.5" marker-end="url(#arr-b)"/>

  <!-- No reverse arrow -->
  <text x="240" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" fill="#e05555" text-anchor="middle">역방향 불가 ✗</text>
  <text x="240" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">다이제스트 → 원본 복구 수학적으로 불가</text>

  <!-- Hash characteristics -->
  <rect x="60" y="258" width="360" height="90" rx="6" fill="#0f1820" stroke="#8a3aa8" stroke-width="1"/>
  <text x="80" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#b07ad0">특성</text>
  <text x="80" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• 결정론적: 같은 입력 → 항상 같은 해시</text>
  <text x="80" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• 눈사태 효과: 1비트 변경 → 해시 완전 변경</text>
  <text x="80" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• 충돌 저항: 같은 해시 두 입력 찾기 어려움</text>

  <!-- Hash use cases -->
  <rect x="60" y="362" width="360" height="80" rx="6" fill="#180d1a" stroke="#8a3aa8" stroke-width="1"/>
  <text x="240" y="385" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#b07ad0" text-anchor="middle">사용 사례</text>
  <text x="240" y="403" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">비밀번호 저장 (bcrypt, argon2)</text>
  <text x="240" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">파일 무결성 검증 · 디지털 서명</text>
  <text x="240" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">SHA-256, SHA-384, bcrypt, Argon2</text>

  <!-- Right: Encryption -->
  <rect x="465" y="95" width="355" height="36" rx="6" fill="#0d1a0d" stroke="#3aa83a" stroke-width="1.5"/>
  <text x="642" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">암호화 (Encryption) — 양방향</text>

  <!-- Encryption flow -->
  <rect x="465" y="146" width="100" height="44" rx="6" fill="#0d1520" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="515" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">평문</text>

  <!-- Encrypt function -->
  <rect x="588" y="146" width="90" height="44" rx="6" fill="#0d2a0d" stroke="#3aa83a" stroke-width="1.5"/>
  <text x="633" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">Encrypt</text>
  <text x="633" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">키 사용</text>

  <!-- Ciphertext -->
  <rect x="700" y="146" width="120" height="44" rx="6" fill="#0d1520" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="760" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178" text-anchor="middle">암호문</text>
  <text x="760" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">(ciphertext)</text>

  <line x1="567" y1="168" x2="586" y2="168" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <line x1="680" y1="168" x2="698" y2="168" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <!-- Decrypt arrow (bidirectional) -->
  <line x1="760" y1="192" x2="760" y2="210" stroke="#55c555" stroke-width="1.5"/>
  <line x1="760" y1="210" x2="515" y2="210" stroke="#55c555" stroke-width="1.5"/>
  <line x1="515" y1="210" x2="515" y2="192" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <text x="637" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">Decrypt (키로 복호화 가능)</text>

  <!-- Encryption characteristics -->
  <rect x="465" y="258" width="355" height="90" rx="6" fill="#0f1820" stroke="#3aa83a" stroke-width="1"/>
  <text x="485" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">특성</text>
  <text x="485" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• 가역적: 키가 있으면 원본 복구 가능</text>
  <text x="485" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• 키 보안이 전체 보안의 핵심</text>
  <text x="485" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• 대칭(AES) 또는 비대칭(RSA) 방식</text>

  <!-- Encryption use cases -->
  <rect x="465" y="362" width="355" height="80" rx="6" fill="#0d2a0d" stroke="#3aa83a" stroke-width="1"/>
  <text x="642" y="385" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">사용 사례</text>
  <text x="642" y="403" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">데이터 전송 보호 (TLS)</text>
  <text x="642" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">개인정보 저장 · 백업 암호화</text>
  <text x="642" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">AES-256-GCM, RSA-4096, ChaCha20</text>

  <!-- Bottom rule -->
  <rect x="60" y="455" width="760" height="18" rx="4" fill="#111827"/>
  <text x="440" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">비밀번호는 반드시 해싱 (암호화 X) — 복호화 필요 없고 복호화 되면 안 됨</text>
</svg>
