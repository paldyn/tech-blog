<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">__proto__ vs .prototype</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">생성자 함수와 인스턴스의 관계</text>

  <!-- User constructor function box -->
  <rect x="60" y="100" width="200" height="100" fill="#12101e" rx="8" stroke="#2a1e5f"/>
  <text x="160" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">User (함수 객체)</text>
  <text x="80" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">length: 1</text>
  <text x="80" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">name: 'User'</text>
  <text x="80" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">prototype: →</text>

  <!-- User.prototype box -->
  <rect x="320" y="100" width="240" height="120" fill="#0d1520" rx="8" stroke="#1e3a5f"/>
  <text x="440" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">User.prototype</text>
  <text x="338" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">greet: ƒ</text>
  <text x="338" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">constructor: User</text>
  <text x="338" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">[[Prototype]]: →</text>
  <text x="440" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">함수의 .prototype 프로퍼티</text>

  <!-- Arrow: User.prototype → (from User) -->
  <!-- Arrow: User.prototype property -->
  <line x1="260" y1="188" x2="316" y2="155" stroke="#7777cc" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="313,149 320,161 307,160" fill="#7777cc"/>
  <text x="270" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">.prototype</text>

  <!-- alice instance box -->
  <rect x="320" y="280" width="240" height="100" fill="#0a1410" rx="8" stroke="#1a3a20"/>
  <text x="440" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">alice (인스턴스)</text>
  <text x="338" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">name: 'Alice'</text>
  <text x="338" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">[[Prototype]]: →</text>
  <text x="440" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">new User()로 생성</text>

  <!-- Arrow: alice [[Prototype]] → User.prototype -->
  <line x1="440" y1="280" x2="440" y2="224" stroke="#55c555" stroke-width="2"/>
  <polygon points="434,226 440,214 446,226" fill="#55c555"/>
  <text x="458" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">[[Prototype]]</text>
  <text x="458" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666">(__proto__)</text>

  <!-- Object.prototype box -->
  <rect x="620" y="100" width="220" height="100" fill="#101412" rx="8" stroke="#1e3a20"/>
  <text x="730" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">Object.prototype</text>
  <text x="638" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">toString: ƒ</text>
  <text x="638" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">hasOwnProperty: ƒ</text>
  <text x="638" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">[[Prototype]]: null</text>

  <!-- Arrow: User.prototype [[Prototype]] → Object.prototype -->
  <line x1="560" y1="150" x2="616" y2="150" stroke="#7777cc" stroke-width="2"/>
  <polygon points="614,144 626,150 614,156" fill="#7777cc"/>
  <text x="564" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">[[Prototype]]</text>

  <!-- Summary table -->
  <rect x="60" y="400" width="760" height="66" fill="#111" rx="8" stroke="#222"/>
  <text x="200" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">User.prototype</text>
  <text x="200" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">함수 객체의 일반 프로퍼티</text>
  <text x="200" y="456" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">new 할 때 인스턴스의 [[Prototype]]이 됨</text>

  <line x1="380" y1="410" x2="380" y2="458" stroke="#333" stroke-width="1"/>

  <text x="530" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">alice.__proto__ (또는 [[Prototype]])</text>
  <text x="530" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">인스턴스가 가진 내부 슬롯</text>
  <text x="530" y="456" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">User.prototype과 동일한 객체를 가리킴</text>

  <!-- Footer -->
  <text x="440" y="484" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복</text>
</svg>
