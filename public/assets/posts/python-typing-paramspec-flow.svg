<svg xmlns="http://www.w3.org/2000/svg" width="880" height="290" viewBox="0 0 880 290">
  <defs>
    <marker id="ps_arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="290" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ParamSpec — 데코레이터가 시그니처를 보존</text>

  <!-- original func -->
  <rect x="60" y="100" width="240" height="90" rx="8" fill="#111418" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="132" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">원본 함수</text>
  <text x="180" y="156" font-family="'JetBrains Mono','Menlo',monospace" font-size="12.5" fill="#ffffff" text-anchor="middle">add(a: int, b: int)</text>
  <text x="180" y="176" font-family="'JetBrains Mono','Menlo',monospace" font-size="12.5" fill="#ffffff" text-anchor="middle">-&gt; int</text>

  <!-- decorator -->
  <rect x="350" y="100" width="180" height="90" rx="8" fill="#111418" stroke="#e0a955" stroke-width="1.5"/>
  <text x="440" y="140" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="14" font-weight="600" fill="#e0a955" text-anchor="middle">@logged</text>
  <text x="440" y="164" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12" fill="#aaaaaa" text-anchor="middle">P, R 로 시그니처 전달</text>

  <!-- wrapped func -->
  <rect x="580" y="100" width="240" height="90" rx="8" fill="#111418" stroke="#55c555" stroke-width="1.5"/>
  <text x="700" y="132" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">감싼 함수</text>
  <text x="700" y="156" font-family="'JetBrains Mono','Menlo',monospace" font-size="12.5" fill="#ffffff" text-anchor="middle">add(a: int, b: int)</text>
  <text x="700" y="176" font-family="'JetBrains Mono','Menlo',monospace" font-size="12.5" fill="#ffffff" text-anchor="middle">-&gt; int  (동일!)</text>

  <line x1="300" y1="145" x2="350" y2="145" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#ps_arr)"/>
  <line x1="530" y1="145" x2="580" y2="145" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#ps_arr)"/>

  <text x="440" y="244" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="13" fill="#9aa4b8" text-anchor="middle">ParamSpec(P)가 없으면 감싼 함수는 (*args, **kwargs)로 흐릿해진다</text>
</svg>
