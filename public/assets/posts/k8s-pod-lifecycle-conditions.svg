<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="13" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">파드 생성 타임라인과 Conditions</text>

  <!-- Timeline steps -->
  <!-- Step 1: API Server -->
  <rect x="60" y="72" width="760" height="48" rx="6" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1"/>
  <text x="160" y="100" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">① API Server 수락</text>
  <text x="540" y="100" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">etcd에 Pod 오브젝트 저장, UID 할당</text>
  <text x="820" y="100" text-anchor="end" dominant-baseline="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178">Phase: Pending</text>

  <line x1="440" y1="120" x2="440" y2="140" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2: Scheduler -->
  <rect x="60" y="140" width="760" height="48" rx="6" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1"/>
  <text x="160" y="168" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">② 스케줄러 노드 배정</text>
  <text x="540" y="168" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">nodeName 필드 설정</text>
  <text x="820" y="168" text-anchor="end" dominant-baseline="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555">PodScheduled=True</text>

  <line x1="440" y1="188" x2="440" y2="208" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3: kubelet + init -->
  <rect x="60" y="208" width="760" height="48" rx="6" fill="#0d2d0d" stroke="#55c555" stroke-width="1"/>
  <text x="160" y="236" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">③ Init 컨테이너 실행</text>
  <text x="540" y="236" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">순서대로 완료 후 다음 단계</text>
  <text x="820" y="236" text-anchor="end" dominant-baseline="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555">Initialized=True</text>

  <line x1="440" y1="256" x2="440" y2="276" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 4: Image pull -->
  <rect x="60" y="276" width="760" height="48" rx="6" fill="#0d2d0d" stroke="#55c555" stroke-width="1"/>
  <text x="160" y="304" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">④ 이미지 pull + 컨테이너 시작</text>
  <text x="540" y="304" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">PostStart hook 실행, readiness probe 시작</text>
  <text x="820" y="304" text-anchor="end" dominant-baseline="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178">Phase: Running</text>

  <line x1="440" y1="324" x2="440" y2="344" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 5: Ready -->
  <rect x="60" y="344" width="760" height="48" rx="6" fill="#0d2d0d" stroke="#55c555" stroke-width="1"/>
  <text x="160" y="372" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">⑤ Readiness probe 통과</text>
  <text x="540" y="372" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Service Endpoints에 등록 → 트래픽 수신 시작</text>
  <text x="820" y="372" text-anchor="end" dominant-baseline="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555">Ready=True</text>

  <!-- Conditions code block -->
  <rect x="60" y="410" width="760" height="36" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="430" text-anchor="middle" dominant-baseline="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">kubectl get pod my-pod -o jsonpath='{.status.conditions[*].type}'</text>
</svg>
