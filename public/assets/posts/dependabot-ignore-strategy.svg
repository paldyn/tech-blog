<svg xmlns="http://www.w3.org/2000/svg" width="880" height="600" viewBox="0 0 880 600">
  <defs>
    <style>text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }
    .mono { font-family: 'JetBrains Mono','Menlo',monospace; }</style>
  </defs>
  <rect width="880" height="600" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Dependabot ignore 룰 — 전후 비교</text>
  <text x="440" y="68" text-anchor="middle" font-size="13" fill="#888">메이저 bump 는 별도 PR 로 와서 자동 머지 가능 상태였음</text>

  <!-- BEFORE -->
  <rect x="40" y="100" width="395" height="460" rx="8" fill="#1a0f0f" stroke="#e05555" stroke-width="2"/>
  <text x="237" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#e05555">BEFORE — 그룹화만 minor/patch 제한</text>
  <text x="237" y="148" text-anchor="middle" font-size="11" fill="#888">메이저 bump 가 자동 머지 대상에서 제외 안 됨</text>
  <line x1="55" y1="160" x2="420" y2="160" stroke="#222"/>

  <rect x="55" y="174" width="365" height="220" rx="4" fill="#000" stroke="#222"/>
  <text x="63" y="192" class="mono" font-size="10" fill="#7ec8e3">version: 2</text>
  <text x="63" y="206" class="mono" font-size="10" fill="#7ec8e3">updates:</text>
  <text x="63" y="220" class="mono" font-size="10" fill="#aaa">  - package-ecosystem: gradle</text>
  <text x="63" y="234" class="mono" font-size="10" fill="#aaa">    groups:</text>
  <text x="63" y="248" class="mono" font-size="10" fill="#aaa">      spring:</text>
  <text x="63" y="262" class="mono" font-size="10" fill="#888">        patterns:</text>
  <text x="63" y="276" class="mono" font-size="10" fill="#888">          - "org.springframework*"</text>
  <text x="63" y="290" class="mono" font-size="10" fill="#55c555">        update-types: ["minor","patch"]</text>
  <text x="63" y="304" class="mono" font-size="10" fill="#888">      minor-and-patch:</text>
  <text x="63" y="318" class="mono" font-size="10" fill="#55c555">        update-types: ["minor","patch"]</text>
  <text x="63" y="336" class="mono" font-size="10" fill="#666">    # ignore 섹션 누락</text>
  <text x="63" y="350" class="mono" font-size="10" fill="#666">    # → spring-boot 4.x major 가</text>
  <text x="63" y="364" class="mono" font-size="10" fill="#e05555">    #   별도 PR 로 와서 자동 머지 가능</text>

  <text x="63" y="406" font-size="11" fill="#888" font-weight="600">결과</text>
  <text x="63" y="426" font-size="11" fill="#aaa">• Spring Boot 3.3 → 4.0 메이저 PR</text>
  <text x="63" y="446" font-size="11" fill="#aaa">• React 18 → 19, electron-builder 24→26</text>
  <text x="63" y="466" font-size="11" fill="#aaa">• gh CLI 일괄 머지 → 빌드 폭탄</text>
  <text x="63" y="486" font-size="11" fill="#e05555">v0.1.4 / v0.1.3 빌드 0/5 통과</text>

  <!-- AFTER -->
  <rect x="450" y="100" width="395" height="460" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="2"/>
  <text x="647" y="128" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">AFTER — 메이저 명시 ignore</text>
  <text x="647" y="148" text-anchor="middle" font-size="11" fill="#888">자동 머지는 minor/patch + actions 만</text>
  <line x1="465" y1="160" x2="830" y2="160" stroke="#222"/>

  <rect x="465" y="174" width="365" height="290" rx="4" fill="#000" stroke="#222"/>
  <text x="473" y="192" class="mono" font-size="10" fill="#7ec8e3">version: 2</text>
  <text x="473" y="206" class="mono" font-size="10" fill="#7ec8e3">updates:</text>
  <text x="473" y="220" class="mono" font-size="10" fill="#aaa">  - package-ecosystem: gradle</text>
  <text x="473" y="234" class="mono" font-size="10" fill="#aaa">    groups: ...</text>
  <text x="473" y="252" class="mono" font-size="10" fill="#7ec8e3">    ignore:</text>
  <text x="473" y="266" class="mono" font-size="10" fill="#888">      # Spring Boot 4.x 차단</text>
  <text x="473" y="280" class="mono" font-size="10" fill="#aaa">      - dependency-name:</text>
  <text x="473" y="294" class="mono" font-size="10" fill="#55c555">          "org.springframework.boot"</text>
  <text x="473" y="308" class="mono" font-size="10" fill="#55c555">        update-types:</text>
  <text x="473" y="322" class="mono" font-size="10" fill="#55c555">          [version-update:semver-major]</text>
  <text x="473" y="336" class="mono" font-size="10" fill="#aaa">      - dependency-name:</text>
  <text x="473" y="350" class="mono" font-size="10" fill="#55c555">          "io.spring.dependency-management"</text>
  <text x="473" y="364" class="mono" font-size="10" fill="#55c555">        update-types: [...semver-major]</text>
  <text x="473" y="378" class="mono" font-size="10" fill="#aaa">      - dependency-name:</text>
  <text x="473" y="392" class="mono" font-size="10" fill="#55c555">          "org.mybatis.spring.boot:..."</text>
  <text x="473" y="406" class="mono" font-size="10" fill="#aaa">      - dependency-name:</text>
  <text x="473" y="420" class="mono" font-size="10" fill="#55c555">          "org.springdoc:..."</text>
  <text x="473" y="434" class="mono" font-size="10" fill="#aaa">      - dependency-name:</text>
  <text x="473" y="448" class="mono" font-size="10" fill="#55c555">          "com.github.gavlyukovskiy:..."</text>

  <text x="473" y="476" font-size="11" fill="#888" font-weight="600">결과</text>
  <text x="473" y="494" font-size="11" fill="#aaa">• 메이저 bump 는 별도 issue 로 검토</text>
  <text x="473" y="514" font-size="11" fill="#aaa">• Dependabot PR 자동 머지 안전</text>
  <text x="473" y="534" font-size="11" fill="#55c555">v0.1.5 빌드 5/5 통과 (8m55s)</text>

  <text x="440" y="582" text-anchor="middle" font-size="11" fill="#444">PALDYN · Dependabot 자동 머지 사고기</text>
</svg>
