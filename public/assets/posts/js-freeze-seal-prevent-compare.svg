<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">객체 잠금 3단계 비교</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">preventExtensions · seal · freeze</text>

  <!-- Header row -->
  <rect x="60" y="92" width="760" height="36" fill="#111827" rx="6"/>
  <text x="200" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">기능</text>
  <text x="370" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">preventExtensions</text>
  <text x="560" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8c547">seal</text>
  <text x="740" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">freeze</text>

  <!-- Row 1: new property -->
  <rect x="60" y="136" width="760" height="40" fill="#0d1117" rx="0"/>
  <text x="200" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">새 프로퍼티 추가</text>
  <text x="370" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e05555">✗ 금지</text>
  <text x="560" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e05555">✗ 금지</text>
  <text x="740" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e05555">✗ 금지</text>

  <!-- Row 2: delete property -->
  <rect x="60" y="176" width="760" height="40" fill="#111" rx="0"/>
  <text x="200" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">프로퍼티 삭제</text>
  <text x="370" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555">✓ 가능</text>
  <text x="560" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e05555">✗ 금지</text>
  <text x="740" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e05555">✗ 금지</text>

  <!-- Row 3: modify value -->
  <rect x="60" y="216" width="760" height="40" fill="#0d1117" rx="0"/>
  <text x="200" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">값 수정 (writable)</text>
  <text x="370" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555">✓ 가능</text>
  <text x="560" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555">✓ 가능</text>
  <text x="740" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e05555">✗ 금지</text>

  <!-- Row 4: descriptor change -->
  <rect x="60" y="256" width="760" height="40" fill="#111" rx="0"/>
  <text x="200" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">디스크립터 변경 (configurable)</text>
  <text x="370" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555">✓ 가능</text>
  <text x="560" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e05555">✗ 금지</text>
  <text x="740" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e05555">✗ 금지</text>

  <!-- Row 5: check method -->
  <rect x="60" y="296" width="760" height="40" fill="#0d1117" rx="0"/>
  <text x="200" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">확인 메서드</text>
  <text x="370" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">isExtensible()</text>
  <text x="560" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8c547">isSealed()</text>
  <text x="740" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">isFrozen()</text>

  <!-- Row border bottom -->
  <line x1="60" y1="336" x2="820" y2="336" stroke="#222" stroke-width="1"/>

  <!-- Column dividers -->
  <line x1="280" y1="92" x2="280" y2="336" stroke="#222" stroke-width="1"/>
  <line x1="460" y1="92" x2="460" y2="336" stroke="#222" stroke-width="1"/>
  <line x1="640" y1="92" x2="640" y2="336" stroke="#222" stroke-width="1"/>

  <!-- Shallow note -->
  <rect x="60" y="356" width="760" height="56" fill="#1a1410" rx="8" stroke="#3a2a10"/>
  <text x="440" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">⚠ 모두 얕은(shallow) 잠금</text>
  <text x="440" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">중첩 객체의 프로퍼티는 영향을 받지 않습니다. 깊은 불변이 필요하면 재귀적으로 적용하거나 Immer를 사용하세요.</text>

  <!-- Code example -->
  <rect x="60" y="432" width="760" height="44" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="80" y="452" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">const</text><text x="116" y="452" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> o = Object.</text><text x="212" y="452" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">freeze</text><text x="260" y="452" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">({ a: </text><text x="318" y="452" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">1</text><text x="327" y="452" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">, nested: { b: </text><text x="450" y="452" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">2</text><text x="459" y="452" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> } });</text>
  <text x="80" y="468" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">o.a = </text><text x="124" y="468" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">99</text><text x="143" y="468" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">;   </text><text x="195" y="468" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 무시  </text><text x="300" y="468" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">o.nested.b = </text><text x="420" y="468" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">99</text><text x="439" y="468" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">; </text><text x="455" y="468" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 변경됨!</text>

  <!-- Footer -->
  <text x="440" y="504" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복</text>
</svg>
