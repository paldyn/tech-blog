<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">TabControl 구조와 속성</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">TabControl → Tab → Form 계층 구조</text>

  <!-- TabControl outer -->
  <rect x="60" y="90" width="760" height="310" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>

  <!-- Tab headers -->
  <rect x="60" y="90" width="150" height="36" fill="#1d4ed8" rx="6 6 0 0"/>
  <text x="135" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#fff" text-anchor="middle">기본 정보</text>

  <rect x="210" y="90" width="150" height="36" fill="#1a2535" rx="6 6 0 0" stroke="#3a4a6e"/>
  <text x="285" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">상세 내역</text>

  <rect x="360" y="90" width="150" height="36" fill="#1a2535" rx="6 6 0 0" stroke="#3a4a6e"/>
  <text x="435" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">첨부 파일</text>

  <rect x="510" y="90" width="150" height="36" fill="#1a2535" rx="6 6 0 0" stroke="#3a4a6e"/>
  <text x="585" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">이력 조회</text>

  <!-- Tab content area -->
  <rect x="60" y="126" width="760" height="274" fill="#0f1929" rx="0 0 8 8"/>

  <!-- Content label -->
  <text x="440" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#888" text-anchor="middle">Tab[0].form = "frm_basicInfo.xfdl"</text>
  <text x="440" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">각 탭 패널에 독립된 Form 파일 연결 가능</text>

  <!-- TabControl label -->
  <text x="80" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">TabControl</text>
  <text x="80" y="373" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">id="tab_main", tabindex: 현재 탭 인덱스</text>

  <!-- Properties table -->
  <rect x="60" y="420" width="760" height="42" fill="#111827" rx="6" stroke="#3a4a6e"/>
  <text x="90" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">tabindex</text>
  <text x="90" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">현재 탭 번호</text>
  <text x="220" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">tabplace</text>
  <text x="220" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">top|bottom|left|right</text>
  <text x="390" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">tabstyle</text>
  <text x="390" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">tab 외형 스타일</text>
  <text x="550" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ontabchanged</text>
  <text x="550" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">탭 변경 이벤트</text>
</svg>
