<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Python 구현체 비교</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">CPython · PyPy · Jython · MicroPython</text>

  <!-- CPython -->
  <rect x="60" y="90" width="370" height="130" rx="8" fill="#0f1025" stroke="#7777cc" stroke-width="1.5"/>
  <text x="80" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#a78bfa">CPython</text>
  <text x="220" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">표준 구현체 (C로 작성)</text>
  <text x="80" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">&#x2713;  가장 광범위한 라이브러리 지원</text>
  <text x="80" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">&#x2713;  모든 플랫폼에서 동작</text>
  <text x="80" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaaaaa">&#x26A0;  GIL로 인해 CPU 병렬 처리 제한</text>
  <text x="80" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">python.org에서 배포하는 기본 인터프리터</text>

  <!-- PyPy -->
  <rect x="460" y="90" width="360" height="130" rx="8" fill="#0f1f0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="480" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555">PyPy</text>
  <text x="540" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">JIT 컴파일 구현체</text>
  <text x="480" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">&#x2713;  CPU 집약 작업 5~10x 빠름</text>
  <text x="480" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">&#x2713;  대부분의 순수 Python 코드 호환</text>
  <text x="480" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaaaaa">&#x26A0;  C 확장 호환성 제한 (NumPy 등)</text>
  <text x="480" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">pypy.org 배포 — 장기 실행 서버에 유리</text>

  <!-- Jython / MicroPython -->
  <rect x="60" y="244" width="180" height="110" rx="8" fill="#1f1a0a" stroke="#f59e0b" stroke-width="1"/>
  <text x="150" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#f59e0b" text-anchor="middle">Jython</text>
  <text x="150" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaaaaa" text-anchor="middle">JVM 위에서 실행</text>
  <text x="150" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Java 라이브러리 직접 사용</text>
  <text x="150" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">현재 Python 2.7 기반</text>

  <rect x="260" y="244" width="170" height="110" rx="8" fill="#1a0f1a" stroke="#e05555" stroke-width="1"/>
  <text x="345" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">IronPython</text>
  <text x="345" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaaaaa" text-anchor="middle">.NET/CLR 위에서 실행</text>
  <text x="345" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">C# 라이브러리 사용 가능</text>
  <text x="345" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Windows 환경에 특화</text>

  <rect x="460" y="244" width="180" height="110" rx="8" fill="#0f1a1a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="550" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">MicroPython</text>
  <text x="550" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaaaaa" text-anchor="middle">마이크로컨트롤러용</text>
  <text x="550" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">ESP32, Raspberry Pi Pico</text>
  <text x="550" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">256KB RAM에서 동작</text>

  <rect x="660" y="244" width="160" height="110" rx="8" fill="#1a1010" stroke="#ce9178" stroke-width="1"/>
  <text x="740" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#ce9178" text-anchor="middle">Cython</text>
  <text x="740" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaaaaa" text-anchor="middle">Python→C 변환기</text>
  <text x="740" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">성능 병목 함수 최적화</text>
  <text x="740" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">NumPy 내부에서 사용</text>

  <text x="440" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#666" text-anchor="middle">일반적인 개발: CPython | 성능 최적화: PyPy | IoT: MicroPython</text>
</svg>
