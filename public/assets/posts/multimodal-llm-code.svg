<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 340" style="display:block">
  <!-- Background -->
  <rect width="880" height="340" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Anthropic Claude API — 이미지 분석</text>
  <text x="440" y="63" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Python SDK로 Base64 이미지를 멀티모달 메시지에 포함하는 실전 예시</text>

  <!-- Code box -->
  <rect x="60" y="84" width="760" height="232" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <!-- Line 1 -->
  <text x="80" y="106" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> anthropic, base64</tspan></text>

  <!-- Line 3 -->
  <text x="80" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">client = anthropic.</tspan><tspan fill="#7ec8e3" font-weight="600">Anthropic</tspan><tspan fill="#ffffff">()</tspan></text>

  <!-- Line 5 -->
  <text x="80" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">with</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">open</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"image.jpg"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"rb"</tspan><tspan fill="#ffffff">) </tspan><tspan fill="#7ec8e3" font-weight="600">as</tspan><tspan fill="#ffffff"> f:</tspan></text>

  <!-- Line 6 -->
  <text x="80" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    img_data = base64.b64encode(f.read()).decode()</tspan></text>

  <!-- Line 8 -->
  <text x="80" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">msg = client.messages.</tspan><tspan fill="#7ec8e3" font-weight="600">create</tspan><tspan fill="#ffffff">(</tspan></text>

  <!-- Line 9 -->
  <text x="80" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    model=</tspan><tspan fill="#ce9178">"claude-opus-4-7"</tspan><tspan fill="#ffffff">,</tspan></text>

  <!-- Line 10 -->
  <text x="80" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    max_tokens=</tspan><tspan fill="#b5cea8">1024</tspan><tspan fill="#ffffff">, messages=[{</tspan><tspan fill="#ce9178">"role"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"user"</tspan><tspan fill="#ffffff">,</tspan></text>

  <!-- Line 11 -->
  <text x="80" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">        </tspan><tspan fill="#ce9178">"content"</tspan><tspan fill="#ffffff">: [{</tspan><tspan fill="#ce9178">"type"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"image"</tspan><tspan fill="#ffffff">,</tspan></text>

  <!-- Line 12 -->
  <text x="80" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">            </tspan><tspan fill="#ce9178">"source"</tspan><tspan fill="#ffffff">: {</tspan><tspan fill="#ce9178">"type"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"base64"</tspan><tspan fill="#ffffff">,</tspan></text>

  <!-- Line 13 -->
  <text x="80" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">                </tspan><tspan fill="#ce9178">"media_type"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"image/jpeg"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"data"</tspan><tspan fill="#ffffff">: img_data}},</tspan></text>

  <!-- Line 14 -->
  <text x="80" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">            {</tspan><tspan fill="#ce9178">"type"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"text"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"text"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"이 이미지를 설명해 주세요."</tspan><tspan fill="#ffffff">}]}])</tspan></text>

  <!-- Line 15 -->
  <text x="80" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">print</tspan><tspan fill="#ffffff">(msg.content[</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">].text)</tspan></text>
</svg>
