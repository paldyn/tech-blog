<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="340" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">네 가지 메타 애너테이션</text>

  <!-- Retention -->
  <rect x="50" y="80" width="385" height="110" rx="8" fill="#0f1626" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="70" y="108" font-size="15" font-weight="600" fill="#7ec8e3">@Retention</text>
  <text x="70" y="134" font-size="13" fill="#ffffff">언제까지 살아남는가</text>
  <text x="70" y="158" font-size="12" fill="#9aa4b8">SOURCE / CLASS / RUNTIME</text>
  <text x="70" y="178" font-size="12" fill="#888">리플렉션엔 RUNTIME 필수</text>

  <!-- Target -->
  <rect x="445" y="80" width="385" height="110" rx="8" fill="#102117" stroke="#55c555" stroke-width="1.5"/>
  <text x="465" y="108" font-size="15" font-weight="600" fill="#55c555">@Target</text>
  <text x="465" y="134" font-size="13" fill="#ffffff">어디에 붙일 수 있는가</text>
  <text x="465" y="158" font-size="12" fill="#9aa4b8">TYPE / METHOD / FIELD ...</text>
  <text x="465" y="178" font-size="12" fill="#888">잘못된 위치는 컴파일 에러</text>

  <!-- Documented -->
  <rect x="50" y="206" width="385" height="110" rx="8" fill="#1a160d" stroke="#e0a955" stroke-width="1.5"/>
  <text x="70" y="234" font-size="15" font-weight="600" fill="#e0a955">@Documented</text>
  <text x="70" y="260" font-size="13" fill="#ffffff">Javadoc에 포함할 것인가</text>
  <text x="70" y="284" font-size="12" fill="#9aa4b8">생성 문서에 애너테이션 노출</text>
  <text x="70" y="304" font-size="12" fill="#888">공개 API 표시에 유용</text>

  <!-- Inherited -->
  <rect x="445" y="206" width="385" height="110" rx="8" fill="#161226" stroke="#7777cc" stroke-width="1.5"/>
  <text x="465" y="234" font-size="15" font-weight="600" fill="#9a9ae0">@Inherited</text>
  <text x="465" y="260" font-size="13" fill="#ffffff">하위 클래스로 상속되는가</text>
  <text x="465" y="284" font-size="12" fill="#9aa4b8">클래스 애너테이션에만 적용</text>
  <text x="465" y="304" font-size="12" fill="#888">메서드·필드엔 효과 없음</text>
</svg>
