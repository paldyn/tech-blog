<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">팀 정책 가이드</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">상황별 merge / rebase 선택 기준</text>

  <!-- Column headers -->
  <rect x="60" y="84" width="240" height="36" rx="6" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="107" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">상황</text>

  <rect x="330" y="84" width="230" height="36" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="445" y="107" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">권장 방식</text>

  <rect x="590" y="84" width="230" height="36" rx="6" fill="#1a100a" stroke="#e0aa55" stroke-width="1.5"/>
  <text x="705" y="107" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e0aa55">이유</text>

  <!-- Rows -->
  <line x1="60" y1="130" x2="820" y2="130" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">PR 제출 전 로컬 정리</text>
  <text x="350" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">rebase -i</text>
  <text x="610" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">WIP 커밋 정리, 깔끔한 PR</text>

  <line x1="60" y1="166" x2="820" y2="166" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">최신 main 반영 (로컬)</text>
  <text x="350" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">rebase main</text>
  <text x="610" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">직선 히스토리, FF 병합 가능</text>

  <line x1="60" y1="202" x2="820" y2="202" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">팀 공유 브랜치 병합</text>
  <text x="350" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">merge --no-ff</text>
  <text x="610" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">브랜치 작업 단위 보존, revert 용이</text>

  <line x1="60" y1="238" x2="820" y2="238" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">이미 push된 브랜치</text>
  <text x="350" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">merge</text>
  <text x="610" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">rebase는 SHA 변경 → force push 필요</text>

  <line x1="60" y1="274" x2="820" y2="274" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">릴리스 브랜치 → main</text>
  <text x="350" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">merge --no-ff</text>
  <text x="610" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">릴리스 경계 명확히 표시</text>

  <line x1="60" y1="310" x2="820" y2="310" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">오픈소스 기여 / PR</text>
  <text x="350" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">rebase (프로젝트 정책 따름)</text>
  <text x="610" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">리뷰 전 깔끔한 커밋 요구 많음</text>
</svg>
