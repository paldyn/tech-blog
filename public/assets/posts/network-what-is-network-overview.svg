<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">네트워크란 무엇인가</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">노드(Node)와 링크(Link)로 구성된 통신 시스템</text>

  <!-- LAN Box -->
  <rect x="60" y="100" width="220" height="170" rx="10" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="170" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">LAN</text>
  <text x="170" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Local Area Network</text>
  <rect x="82" y="158" width="52" height="36" rx="6" fill="#1a2535" stroke="#3a4a6e" stroke-width="1"/>
  <text x="108" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">PC</text>
  <rect x="148" y="158" width="52" height="36" rx="6" fill="#1a2535" stroke="#3a4a6e" stroke-width="1"/>
  <text x="174" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">PC</text>
  <rect x="214" y="158" width="52" height="36" rx="6" fill="#1a2535" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">PC</text>
  <rect x="115" y="218" width="90" height="34" rx="6" fill="#1a3a2a" stroke="#55c555" stroke-width="1"/>
  <text x="160" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">Switch</text>
  <line x1="108" y1="194" x2="145" y2="218" stroke="#3a4a6e" stroke-width="1.2"/>
  <line x1="174" y1="194" x2="160" y2="218" stroke="#3a4a6e" stroke-width="1.2"/>
  <line x1="240" y1="194" x2="175" y2="218" stroke="#3a4a6e" stroke-width="1.2"/>

  <!-- WAN Box -->
  <rect x="330" y="100" width="220" height="170" rx="10" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">WAN</text>
  <text x="440" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Wide Area Network</text>
  <rect x="352" y="158" width="66" height="36" rx="6" fill="#1a2535" stroke="#3a4a6e" stroke-width="1"/>
  <text x="385" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">Router A</text>
  <rect x="452" y="158" width="66" height="36" rx="6" fill="#1a2535" stroke="#3a4a6e" stroke-width="1"/>
  <text x="485" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">Router B</text>
  <line x1="418" y1="176" x2="452" y2="176" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="390" y="218" width="100" height="34" rx="6" fill="#1a2535" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">인터넷 백본</text>
  <line x1="385" y1="194" x2="420" y2="218" stroke="#3a4a6e" stroke-width="1.2"/>
  <line x1="485" y1="194" x2="460" y2="218" stroke="#3a4a6e" stroke-width="1.2"/>

  <!-- Internet Box -->
  <rect x="600" y="100" width="220" height="170" rx="10" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="710" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">인터넷</text>
  <text x="710" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Global Network of Networks</text>
  <rect x="624" y="158" width="60" height="36" rx="6" fill="#1a2535" stroke="#3a4a6e" stroke-width="1"/>
  <text x="654" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">서버</text>
  <rect x="698" y="158" width="60" height="36" rx="6" fill="#1a2535" stroke="#3a4a6e" stroke-width="1"/>
  <text x="728" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">CDN</text>
  <rect x="760" y="158" width="46" height="36" rx="6" fill="#1a2535" stroke="#3a4a6e" stroke-width="1"/>
  <text x="783" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e8e8e8" text-anchor="middle">DNS</text>
  <rect x="654" y="218" width="100" height="34" rx="6" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>
  <text x="704" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">프로토콜 TCP/IP</text>
  <line x1="654" y1="194" x2="684" y2="218" stroke="#3a4a6e" stroke-width="1.2"/>
  <line x1="728" y1="194" x2="720" y2="218" stroke="#3a4a6e" stroke-width="1.2"/>
  <line x1="783" y1="194" x2="754" y2="218" stroke="#3a4a6e" stroke-width="1.2"/>

  <!-- Connections between boxes -->
  <line x1="280" y1="185" x2="330" y2="185" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="305" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Router</text>
  <line x1="550" y1="185" x2="600" y2="185" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="575" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ISP</text>

  <!-- Bottom characteristics -->
  <rect x="60" y="300" width="240" height="100" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="180" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">노드 (Node)</text>
  <text x="180" y="349" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">PC, 서버, 스위치, 라우터</text>
  <text x="180" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">데이터를 생성·중계하는 장치</text>
  <text x="180" y="387" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">고유 주소(IP/MAC) 보유</text>

  <rect x="320" y="300" width="240" height="100" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">링크 (Link)</text>
  <text x="440" y="349" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">유선(이더넷) / 무선(Wi-Fi)</text>
  <text x="440" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">노드 간 데이터 전송 경로</text>
  <text x="440" y="387" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">대역폭·지연시간 특성 갖음</text>

  <rect x="580" y="300" width="240" height="100" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="700" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">프로토콜 (Protocol)</text>
  <text x="700" y="349" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">HTTP, TCP, IP, Ethernet</text>
  <text x="700" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">통신 규칙·형식·절차 약속</text>
  <text x="700" y="387" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">계층별로 역할 분리됨</text>

  <!-- Bottom summary -->
  <rect x="200" y="430" width="480" height="56" rx="8" fill="#0f1a2a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">네트워크 = 노드 + 링크 + 프로토콜이 결합된 통신 인프라</text>
  <text x="440" y="474" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">규모: PAN &#8594; LAN &#8594; MAN &#8594; WAN &#8594; 인터넷</text>
</svg>
