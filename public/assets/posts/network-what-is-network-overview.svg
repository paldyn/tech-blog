<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">네트워크란 무엇인가</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">장치들이 데이터를 주고받기 위해 연결된 구조</text>

  <!-- Node A -->
  <rect x="60" y="160" width="130" height="70" rx="10" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="125" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">컴퓨터 A</text>
  <text x="125" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">호스트(Host)</text>

  <!-- Node B -->
  <rect x="375" y="100" width="130" height="70" rx="10" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">스위치</text>
  <text x="440" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">네트워크 장비</text>

  <!-- Node C -->
  <rect x="690" y="160" width="130" height="70" rx="10" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="755" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">컴퓨터 B</text>
  <text x="755" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">호스트(Host)</text>

  <!-- Node D -->
  <rect x="375" y="300" width="130" height="70" rx="10" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">서버</text>
  <text x="440" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">리소스 제공</text>

  <!-- arrows: A -> Switch -->
  <line x1="190" y1="195" x2="375" y2="138" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <!-- Switch -> B -->
  <line x1="505" y1="138" x2="690" y2="195" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <!-- Switch -> Server -->
  <line x1="440" y1="170" x2="440" y2="300" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <!-- B -> Switch -->
  <line x1="690" y1="210" x2="505" y2="155" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- data packet label -->
  <rect x="260" y="148" width="80" height="28" rx="6" fill="#0a0a0a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="300" y="167" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">데이터 패킷</text>

  <!-- legend boxes -->
  <rect x="60" y="400" width="16" height="16" rx="3" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="84" y="413" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">단말 장치 (호스트)</text>
  <rect x="280" y="400" width="16" height="16" rx="3" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="304" y="413" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">네트워크 장비</text>
  <rect x="500" y="400" width="16" height="16" rx="3" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="524" y="413" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">서버 (리소스 제공)</text>

  <!-- key concept box -->
  <rect x="60" y="270" width="240" height="80" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="297" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">네트워크 핵심 요소</text>
  <text x="80" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 노드(Node): 연결된 장치</text>
  <text x="80" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 링크(Link): 연결 매체</text>
</svg>
