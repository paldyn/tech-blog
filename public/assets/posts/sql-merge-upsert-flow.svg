<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500" style="background:#0a0a0a;border-radius:12px">
  <defs>
    <marker id="mu-arr" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0 0,8 4,0 8" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="1"/>
    </marker>
    <marker id="mu-arrG" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0 0,8 4,0 8" fill="#55c555" stroke="#0a0a0a" stroke-width="1"/>
    </marker>
    <marker id="mu-arrR" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0 0,8 4,0 8" fill="#e05555" stroke="#0a0a0a" stroke-width="1"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">MERGE / UPSERT 흐름</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">매칭 여부에 따라 INSERT 또는 UPDATE</text>

  <!-- Source -->
  <rect x="340" y="96" width="200" height="50" rx="8" fill="#111827" stroke="#7ec8e3"/>
  <text x="440" y="127" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">소스 데이터 (신규)</text>

  <!-- Arrow down -->
  <line x1="440" y1="146" x2="440" y2="174" stroke="#7ec8e3" stroke-width="2" marker-end="url(#mu-arr)"/>

  <!-- Match check -->
  <rect x="320" y="174" width="240" height="50" rx="8" fill="#111827" stroke="#7777cc"/>
  <text x="440" y="205" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc">ON 조건으로 매칭 검사</text>

  <!-- Branch arrows -->
  <!-- Yes match -->
  <line x1="320" y1="200" x2="200" y2="200" stroke="#55c555" stroke-width="2"/>
  <line x1="200" y1="200" x2="200" y2="290" stroke="#55c555" stroke-width="2" marker-end="url(#mu-arrG)"/>
  <text x="250" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">MATCHED</text>

  <!-- No match -->
  <line x1="560" y1="200" x2="680" y2="200" stroke="#e05555" stroke-width="2"/>
  <line x1="680" y1="200" x2="680" y2="290" stroke="#e05555" stroke-width="2" marker-end="url(#mu-arrR)"/>
  <text x="580" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">NOT MATCHED</text>

  <!-- UPDATE box -->
  <rect x="100" y="290" width="200" height="50" rx="8" fill="#0a1a0a" stroke="#55c555"/>
  <text x="200" y="321" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">UPDATE</text>

  <!-- INSERT box -->
  <rect x="580" y="290" width="200" height="50" rx="8" fill="#0a0a1a" stroke="#e05555"/>
  <text x="680" y="321" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e05555">INSERT</text>

  <!-- Target table -->
  <line x1="200" y1="340" x2="200" y2="390" stroke="#55c555" stroke-width="2"/>
  <line x1="200" y1="390" x2="438" y2="390" stroke="#7ec8e3" stroke-width="2"/>
  <line x1="680" y1="340" x2="680" y2="390" stroke="#e05555" stroke-width="2"/>
  <line x1="680" y1="390" x2="442" y2="390" stroke="#7ec8e3" stroke-width="2"/>
  <line x1="440" y1="390" x2="440" y2="420" stroke="#7ec8e3" stroke-width="2" marker-end="url(#mu-arr)"/>

  <rect x="320" y="420" width="240" height="50" rx="8" fill="#111827" stroke="#7ec8e3"/>
  <text x="440" y="451" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">대상 테이블 (갱신)</text>

  <text x="440" y="490" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · SQL 완전 정복</text>
</svg>
