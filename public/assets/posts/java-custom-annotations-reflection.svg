<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="40" y="48" font-size="22" font-weight="700" fill="#e8e8e8">런타임 리플렉션으로 애너테이션 읽기</text>

  <defs>
    <marker id="ca-arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- step boxes -->
  <rect x="40" y="96" width="190" height="84" rx="8" fill="#101010" stroke="#7777cc" stroke-width="1"/>
  <text x="135" y="130" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">@Retention</text>
  <text x="135" y="152" font-size="13" fill="#9aa4b8" text-anchor="middle">RUNTIME 이어야</text>
  <text x="135" y="170" font-size="13" fill="#9aa4b8" text-anchor="middle">읽을 수 있음</text>

  <rect x="290" y="96" width="190" height="84" rx="8" fill="#101010" stroke="#7ec8e3" stroke-width="1"/>
  <text x="385" y="130" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">getAnnotation()</text>
  <text x="385" y="152" font-size="13" fill="#9aa4b8" text-anchor="middle">Method·Class에서</text>
  <text x="385" y="170" font-size="13" fill="#9aa4b8" text-anchor="middle">인스턴스 획득</text>

  <rect x="540" y="96" width="190" height="84" rx="8" fill="#101010" stroke="#55c555" stroke-width="1"/>
  <text x="635" y="130" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">속성 사용</text>
  <text x="635" y="152" font-size="13" fill="#9aa4b8" text-anchor="middle">value()·iterations()</text>
  <text x="635" y="170" font-size="13" fill="#9aa4b8" text-anchor="middle">로 동작 분기</text>

  <line x1="230" y1="138" x2="288" y2="138" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ca-arr)"/>
  <line x1="480" y1="138" x2="538" y2="138" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ca-arr)"/>

  <!-- code box -->
  <rect x="40" y="204" width="800" height="76" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan x="58" y="232" fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> (m.isAnnotationPresent(Benchmark.class)) {</tspan>
    <tspan x="58" y="254" fill="#ffffff">    Benchmark b = m.getAnnotation(Benchmark.</tspan><tspan fill="#7ec8e3" font-weight="600">class</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="58" y="276" fill="#ffffff">    run(m, b.iterations());  </tspan><tspan fill="#9aa4b8">// 속성값으로 반복</tspan>
  </text>
</svg>
