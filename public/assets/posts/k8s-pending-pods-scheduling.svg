<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arrP" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrPr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="360" rx="12" fill="#0a0a0a"/>
  <text x="50" y="52" font-size="22" font-weight="700" fill="#e8e8e8">스케줄링되지 못하면 Pending</text>
  <text x="50" y="80" font-size="14" fill="#888">스케줄러가 조건에 맞는 노드를 못 찾으면 Pod는 Pending에 묶인다</text>

  <rect x="50" y="135" width="180" height="80" rx="10" fill="#16181d" stroke="#e05555" stroke-width="1.5"/>
  <text x="140" y="170" font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">Pending Pod</text>
  <text x="140" y="193" font-size="12" fill="#9aa4b8" text-anchor="middle">노드 미배정</text>

  <rect x="350" y="135" width="180" height="80" rx="10" fill="#16181d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="170" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">스케줄러</text>
  <text x="440" y="193" font-size="12" fill="#9aa4b8" text-anchor="middle">필터 → 점수 → 배정</text>

  <g>
    <rect x="650" y="105" width="180" height="55" rx="8" fill="#16181d" stroke="#55c555" stroke-width="1.3"/>
    <text x="740" y="138" font-size="13" fill="#ffffff" text-anchor="middle">조건 충족 노드 있음 → 배정</text>
  </g>
  <g>
    <rect x="650" y="195" width="180" height="55" rx="8" fill="#16181d" stroke="#e05555" stroke-width="1.3"/>
    <text x="740" y="228" font-size="13" fill="#ffffff" text-anchor="middle">맞는 노드 없음 → Pending 유지</text>
  </g>

  <line x1="230" y1="175" x2="348" y2="175" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrP)"/>
  <line x1="530" y1="160" x2="648" y2="135" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrP)"/>
  <line x1="530" y1="190" x2="648" y2="220" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrPr)"/>

  <text x="50" y="300" font-size="13" fill="#888">FailedScheduling 메시지가 핵심 — describe Events에 "0/5 nodes are available: ..." 형태로 이유가 적힌다.</text>
  <text x="50" y="326" font-size="13" fill="#888">컨테이너가 실행되기 전 단계라 logs는 비어 있다. 노드와 스케줄러의 시야로 봐야 한다.</text>
</svg>
