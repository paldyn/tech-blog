<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Function-Based Index (FBI) 개념</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">인덱스 키를 표현식(함수 결과)으로 저장하는 Oracle B-Tree 인덱스</text>

  <!-- Left column: Problem (without FBI) -->
  <rect x="60" y="96" width="340" height="54" fill="#1a1010" rx="8" stroke="#3a1a1a" stroke-width="1"/>
  <text x="230" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">FBI 없이 — 인덱스 미사용 상황</text>
  <text x="230" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">함수 적용 시 인덱스 무효화</text>

  <!-- Right column: Solution (with FBI) -->
  <rect x="480" y="96" width="340" height="54" fill="#0d1a10" rx="8" stroke="#1a3a1a" stroke-width="1"/>
  <text x="650" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">FBI 적용 — 인덱스 사용</text>
  <text x="650" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">표현식을 키로 사전 계산·저장</text>

  <!-- Arrow between -->
  <text x="440" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#7777cc">→</text>

  <!-- Left: Query example box -->
  <rect x="60" y="168" width="340" height="80" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 컬럼에 함수 적용 → Full Scan</text>
  <text x="76" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">SELECT</text><text x="124" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> * </text><text x="148" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">FROM</text><text x="184" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> employees</text>
  <text x="76" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">WHERE</text><text x="124" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> UPPER(last_name)</text>
  <text x="76" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    = </tspan><tspan fill="#ce9178">'SMITH'</tspan><tspan fill="#9aa4b8">-- 풀 스캔!</tspan></text>

  <!-- Left: B-Tree illustration (no FBI) -->
  <rect x="60" y="264" width="340" height="110" fill="#111" rx="6" stroke="#2a2a2a" stroke-width="1"/>
  <text x="230" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">일반 인덱스 키: 원본 last_name</text>
  <!-- B-Tree nodes -->
  <rect x="180" y="292" width="100" height="26" fill="#1e2433" rx="4"/>
  <text x="230" y="310" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">Smith</text>
  <!-- left leaf -->
  <rect x="80" y="336" width="80" height="24" fill="#1e2433" rx="4"/>
  <text x="120" y="353" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">smith</text>
  <!-- right leaf -->
  <rect x="300" y="336" width="80" height="24" fill="#1e2433" rx="4"/>
  <text x="340" y="353" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">SMITH</text>
  <!-- arrows -->
  <line x1="200" y1="318" x2="145" y2="336" stroke="#3a3a3a" stroke-width="1.5"/>
  <line x1="260" y1="318" x2="320" y2="336" stroke="#3a3a3a" stroke-width="1.5"/>
  <text x="230" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">UPPER() 적용 시 어느 키와 비교?</text>

  <!-- Right: FBI creation box -->
  <rect x="480" y="168" width="340" height="80" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- FBI 생성: 표현식을 키로</text>
  <text x="496" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">CREATE INDEX</text><text x="604" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> idx_upper_name</text>
  <text x="496" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">ON</text><text x="520" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> employees (UPPER(last_name));</text>
  <text x="496" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 쿼리: 자동 FBI 사용</text>

  <!-- Right: B-Tree with FBI -->
  <rect x="480" y="264" width="340" height="110" fill="#111" rx="6" stroke="#2a2a2a" stroke-width="1"/>
  <text x="650" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">FBI 키: UPPER(last_name) 결과값</text>
  <!-- B-Tree nodes -->
  <rect x="600" y="292" width="100" height="26" fill="#1a3020" rx="4" stroke="#2a5a30" stroke-width="1"/>
  <text x="650" y="310" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">SMITH</text>
  <!-- leaf nodes -->
  <rect x="500" y="336" width="80" height="24" fill="#1a3020" rx="4"/>
  <text x="540" y="353" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">SMITH</text>
  <rect x="720" y="336" width="80" height="24" fill="#1a3020" rx="4"/>
  <text x="760" y="353" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">SMITH</text>
  <!-- arrows -->
  <line x1="620" y1="318" x2="565" y2="336" stroke="#2a5a30" stroke-width="1.5"/>
  <line x1="680" y1="318" x2="740" y2="336" stroke="#2a5a30" stroke-width="1.5"/>
  <text x="650" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Index Range Scan 가능!</text>

  <!-- Key conditions row -->
  <rect x="60" y="392" width="760" height="60" fill="#111620" rx="8" stroke="#2a3a50" stroke-width="1"/>
  <text x="440" y="416" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">FBI가 실제로 사용되려면</text>
  <text x="180" y="438" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">① 쿼리 표현식 ≡ 인덱스 표현식</text>
  <text x="440" y="438" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">② QUERY_REWRITE_ENABLED=TRUE</text>
  <text x="700" y="438" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">③ 통계 수집 (DBMS_STATS)</text>

  <!-- Use cases -->
  <rect x="60" y="468" width="760" height="36" fill="#0d0d0d" rx="6"/>
  <text x="440" y="491" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">주요 활용: 대소문자 무관 검색 · 계산 컬럼 인덱싱 · NLS 정규화 · 파생 컬럼 성능 최적화</text>
</svg>
