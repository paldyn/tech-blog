<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">입력 검증 · 정규화 · 출력 인코딩 흐름</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">입력 → 검증 → 정규화 → 처리 → 컨텍스트별 인코딩 → 출력</text>

  <!-- Flow boxes -->
  <rect x="40" y="110" width="120" height="70" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="100" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">사용자 입력</text>
  <text x="100" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">폼 / API / URL</text>
  <text x="100" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#555" text-anchor="middle">신뢰 불가 데이터</text>

  <line x1="160" y1="145" x2="198" y2="145" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="200" y="110" width="120" height="70" rx="8" fill="#101820" stroke="#7ec8e3" stroke-width="2"/>
  <text x="260" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">입력 검증</text>
  <text x="260" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#aaa" text-anchor="middle">타입·길이·형식</text>
  <text x="260" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#555" text-anchor="middle">Allowlist 검증</text>

  <line x1="320" y1="145" x2="358" y2="145" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="360" y="110" width="120" height="70" rx="8" fill="#0f200f" stroke="#55c555" stroke-width="1.5"/>
  <text x="420" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">정규화</text>
  <text x="420" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#aaa" text-anchor="middle">유니코드 정규화</text>
  <text x="420" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#555" text-anchor="middle">URL 디코딩 먼저</text>

  <line x1="480" y1="145" x2="518" y2="145" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="520" y="110" width="120" height="70" rx="8" fill="#1a1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="580" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">비즈니스 처리</text>
  <text x="580" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#aaa" text-anchor="middle">DB / 파일 / API</text>
  <text x="580" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#555" text-anchor="middle">Parameterized</text>

  <line x1="640" y1="145" x2="678" y2="145" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="680" y="110" width="160" height="70" rx="8" fill="#0a2010" stroke="#55c555" stroke-width="2"/>
  <text x="760" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">출력 인코딩</text>
  <text x="760" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#aaa" text-anchor="middle">컨텍스트별 처리</text>
  <text x="760" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#555" text-anchor="middle">HTML/JS/URL/SQL</text>

  <!-- Context boxes -->
  <text x="60" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">출력 인코딩 컨텍스트</text>

  <rect x="40" y="248" width="180" height="90" rx="8" fill="#101820" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">HTML 컨텍스트</text>
  <text x="130" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">&lt; → &amp;lt;</text>
  <text x="130" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">&amp; → &amp;amp;</text>
  <text x="130" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#666" text-anchor="middle">XSS 방어</text>

  <rect x="240" y="248" width="180" height="90" rx="8" fill="#0f200f" stroke="#55c555" stroke-width="1.5"/>
  <text x="330" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">JS 컨텍스트</text>
  <text x="330" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">\u 이스케이프</text>
  <text x="330" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">JSON.stringify</text>
  <text x="330" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#666" text-anchor="middle">DOM XSS 방어</text>

  <rect x="440" y="248" width="180" height="90" rx="8" fill="#1a1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="530" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">URL 컨텍스트</text>
  <text x="530" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">encodeURIComponent</text>
  <text x="530" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">경로 구분자 포함</text>
  <text x="530" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#666" text-anchor="middle">오픈 리다이렉트 방어</text>

  <rect x="640" y="248" width="200" height="90" rx="8" fill="#201010" stroke="#e05555" stroke-width="1.5"/>
  <text x="740" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">SQL 컨텍스트</text>
  <text x="740" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">Parameterized Query</text>
  <text x="740" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">ORM 사용</text>
  <text x="740" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#666" text-anchor="middle">SQL Injection 방어</text>

  <!-- Bottom note -->
  <rect x="40" y="380" width="800" height="44" rx="6" fill="#0f0f0f" stroke="#333" stroke-width="1"/>
  <text x="440" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">핵심 원칙: 검증은 Allowlist 기반으로, 인코딩은 컨텍스트에 맞게</text>
  <text x="440" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">Blocklist(블랙리스트) 방식은 우회 가능 — Allowlist(화이트리스트)만 신뢰</text>
</svg>
