<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="430" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">verbatimModuleSyntax의 단 하나의 규칙</text>

  <!-- Row 1: plain import stays -->
  <rect x="60" y="86" width="380" height="56" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="119" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">import { f } from "./m.js";</text>
  <line x1="444" y1="114" x2="496" y2="114" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="500" y="86" width="320" height="56" fill="#111827" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="660" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">출력에 그대로 유지</text>
  <text x="660" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">사용 여부 분석 없음 — 쓴 그대로</text>

  <!-- Row 2: import type erased -->
  <rect x="60" y="166" width="380" height="56" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">import type { T } from "./m.js";</text>
  <line x1="444" y1="194" x2="496" y2="194" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="500" y="166" width="320" height="56" fill="#111827" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="660" y="191" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">라인 전체 제거</text>
  <text x="660" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">type 키워드 = 지워도 된다는 표시</text>

  <!-- Row 3: type without keyword = error -->
  <rect x="60" y="246" width="380" height="56" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="279" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">import { T } from "./m.js";</text>
  <line x1="444" y1="274" x2="496" y2="274" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="500" y="246" width="320" height="56" fill="#111827" rx="6" stroke="#e05555" stroke-width="1.5"/>
  <text x="660" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">❌ TS1484 컴파일 에러</text>
  <text x="660" y="291" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">T가 타입이면 import type 표기 강제</text>

  <!-- Bottom note -->
  <rect x="60" y="336" width="760" height="64" fill="#111827" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">type 없는 import는 남고, type 붙은 import는 사라진다 — 끝</text>
  <text x="440" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">컴파일러의 "사용 여부 추측"이 사라져서 출력 JavaScript를 소스만 보고 예측할 수 있다</text>
</svg>
