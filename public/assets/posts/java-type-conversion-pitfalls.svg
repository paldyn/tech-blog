<svg width="880" height="376" viewBox="0 0 880 376" xmlns="http://www.w3.org/2000/svg"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <rect width="880" height="376" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">명시적 캐스팅 — 주요 함정과 안전 변환</text>

  <!-- Code block: top=68, height=14+12*18+14=244 -->
  <rect x="60" y="68" width="760" height="244" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <!-- Lines start at y=68+14+13=95 (top padding 14, font baseline ~13) -->
  <!-- Line height: 18px -->

  <!-- L1 y=95: comment -->
  <text x="76" y="95" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// ① 소수점 절삭 — 반올림이 아님</text>

  <!-- L2 y=113 -->
  <text x="76" y="113" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">double</text>
  <text x="127" y="113" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> d = </text>
  <text x="163" y="113" fill="#b5cea8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">9.99</text>
  <text x="195" y="113" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">;</text>

  <!-- L3 y=131 -->
  <text x="76" y="131" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">int</text>
  <text x="99" y="131" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    i = (</text>
  <text x="168" y="131" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">int</text>
  <text x="191" y="131" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">) d;        </text>
  <text x="282" y="131" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// 9  ← 절삭, 반올림 아님</text>

  <!-- L4 y=149: comment -->
  <text x="76" y="149" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// ② 상위 비트 손실 — 쓰레기값</text>

  <!-- L5 y=167 -->
  <text x="76" y="167" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">long</text>
  <text x="107" y="167" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">   l = </text>
  <text x="151" y="167" fill="#b5cea8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">1_234_567_890_000L</text>
  <text x="295" y="167" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">;</text>

  <!-- L6 y=185 -->
  <text x="76" y="185" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">int</text>
  <text x="99" y="185" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    j = (</text>
  <text x="168" y="185" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">int</text>
  <text x="191" y="185" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">) l;        </text>
  <text x="282" y="185" fill="#e05555" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// ⚠ 쓰레기값 (비트 손실)</text>

  <!-- L7 y=203: comment -->
  <text x="76" y="203" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// ③ 안전한 변환 방법</text>

  <!-- L8 y=221 -->
  <text x="76" y="221" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">double</text>
  <text x="127" y="221" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> r  = Math.round(</text>
  <text x="268" y="221" fill="#b5cea8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">9.99</text>
  <text x="300" y="221" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">);    </text>
  <text x="352" y="221" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// 10.0  (반올림)</text>

  <!-- L9 y=239 -->
  <text x="76" y="239" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">int</text>
  <text x="99" y="239" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    ok = Math.toIntExact(l); </text>
  <text x="352" y="239" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// overflow → ArithmeticException</text>

  <!-- L10 y=257: comment -->
  <text x="76" y="257" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// ④ 참조형 업·다운캐스팅</text>

  <!-- L11 y=275 -->
  <text x="76" y="275" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">Object</text>
  <text x="123" y="275" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> obj = </text>
  <text x="172" y="275" fill="#ce9178" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">"hello"</text>
  <text x="226" y="275" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">;         </text>
  <text x="296" y="275" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// 업캐스팅 (자동)</text>

  <!-- L12 y=293 -->
  <text x="76" y="293" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">String</text>
  <text x="119" y="293" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> s   = (</text>
  <text x="180" y="293" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">String</text>
  <text x="223" y="293" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">) obj;    </text>
  <text x="296" y="293" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// 다운캐스팅 (명시적)</text>

  <!-- Annotation panel below code block -->
  <rect x="60" y="326" width="760" height="36" rx="6" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="349" fill="#e05555" font-size="13" font-weight="600">⚠</text>
  <text x="98" y="349" fill="#888" font-size="12">down-casting 시 타입이 맞지 않으면</text>
  <text x="296" y="349" fill="#e8e8e8" font-size="12" font-weight="600"> ClassCastException</text>
  <text x="434" y="349" fill="#888" font-size="12"> — Java 16+ </text>
  <text x="508" y="349" fill="#7ec8e3" font-size="12" font-weight="600">instanceof</text>
  <text x="572" y="349" fill="#888" font-size="12"> 패턴 매칭으로 안전하게 처리 가능</text>

</svg>
