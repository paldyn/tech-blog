<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">멀티홉 RAG 추론 체인</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888">복잡한 질문을 단계별로 분해해 해결</text>

  <!-- Question -->
  <rect x="240" y="90" width="400" height="52" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">원본 복합 질문</text>
  <text x="440" y="133" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">"AlphaFold를 개발한 회사의 CEO는?"</text>

  <!-- Arrow down -->
  <line x1="440" y1="142" x2="440" y2="166" stroke="#444" stroke-width="2"/>
  <polygon points="435,162 440,172 445,162" fill="#444"/>

  <!-- Hop 1 -->
  <rect x="120" y="172" width="640" height="60" rx="8" fill="#0d1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="200" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7777cc">Hop 1</text>
  <text x="440" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">검색: "AlphaFold 개발사" → 문서 회수</text>
  <text x="440" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaaadd">→ 중간 답변: "DeepMind가 개발" 확인</text>

  <!-- Arrow down -->
  <line x1="440" y1="232" x2="440" y2="256" stroke="#444" stroke-width="2"/>
  <polygon points="435,252 440,262 445,252" fill="#444"/>

  <!-- Hop 2 -->
  <rect x="120" y="262" width="640" height="60" rx="8" fill="#0d1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="200" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555">Hop 2</text>
  <text x="440" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">검색: "DeepMind CEO" → 문서 회수</text>
  <text x="440" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaddaa">→ 중간 답변: "Demis Hassabis가 CEO" 확인</text>

  <!-- Arrow down -->
  <line x1="440" y1="322" x2="440" y2="346" stroke="#444" stroke-width="2"/>
  <polygon points="435,342 440,352 445,342" fill="#444"/>

  <!-- Final Answer -->
  <rect x="240" y="352" width="400" height="52" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="2"/>
  <text x="440" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555">최종 답변 생성</text>
  <text x="440" y="394" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">"AlphaFold 개발사 DeepMind의 CEO는 Demis Hassabis"</text>
</svg>
