  <line x1="60" y1="382" x2="820" y2="382" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Row 7 -->
  <text x="200" y="399" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
