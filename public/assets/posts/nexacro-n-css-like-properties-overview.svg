  <line x1="60" y1="90" x2="820" y2="90" stroke="#333" stroke-width="1"/>
  <line x1="325" y1="90" x2="325" y2="430" stroke="#222" stroke-width="1"/>
  <line x1="565" y1="90" x2="565" y2="430" stroke="#222" stroke-width="1"/>

  <!-- Row 1 -->
