  <line x1="60" y1="142" x2="820" y2="142" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Row 2 -->
  <text x="200" y="159" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
