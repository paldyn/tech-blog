<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="440" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">제약조건 계층과 역할</text>

  <!-- NOT NULL -->
  <rect x="60" y="60" width="360" height="80" rx="8" fill="#111822" stroke="#7ec8e3" stroke-width="2"/>
  <text x="240" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">NOT NULL</text>
  <text x="240" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">열에 NULL 값을 저장할 수 없음</text>
  <text x="240" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">열 제약으로만 정의 (테이블 제약 X)</text>

  <!-- DEFAULT -->
  <rect x="460" y="60" width="360" height="80" rx="8" fill="#111822" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">DEFAULT</text>
  <text x="640" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">INSERT 시 값 생략 시 자동으로 채워짐</text>
  <text x="640" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">표현식/함수도 사용 가능</text>

  <!-- CHECK -->
  <rect x="60" y="162" width="360" height="80" rx="8" fill="#111822" stroke="#ce9178" stroke-width="2"/>
  <text x="240" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#ce9178" text-anchor="middle">CHECK</text>
  <text x="240" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">열 값이 조건식을 만족해야 함</text>
  <text x="240" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">다중 열 참조 가능 (테이블 제약)</text>

  <!-- Note -->
  <rect x="460" y="162" width="360" height="80" rx="8" fill="#0a1a10" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">함께 쓰는 패턴</text>
  <text x="640" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">NOT NULL + DEFAULT → 안전한 열</text>
  <text x="640" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">CHECK + NOT NULL → 완전한 도메인 검증</text>

  <!-- Code -->
  <rect x="60" y="264" width="760" height="116" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">CREATE TABLE</tspan> members (</text>
  <text x="76" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  id       <tspan fill="#b5cea8">BIGINT</tspan>      <tspan font-weight="600" fill="#7ec8e3">NOT NULL</tspan>,</text>
  <text x="76" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  grade    <tspan fill="#b5cea8">VARCHAR</tspan>(<tspan fill="#b5cea8">10</tspan>) <tspan font-weight="600" fill="#7ec8e3">NOT NULL DEFAULT</tspan> <tspan fill="#ce9178">'bronze'</tspan> <tspan font-weight="600" fill="#7ec8e3">CHECK</tspan> (grade <tspan font-weight="600" fill="#7ec8e3">IN</tspan> (<tspan fill="#ce9178">'bronze'</tspan>,<tspan fill="#ce9178">'silver'</tspan>,<tspan fill="#ce9178">'gold'</tspan>)),</text>
  <text x="76" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  age      <tspan fill="#b5cea8">INT</tspan>         <tspan font-weight="600" fill="#7ec8e3">CHECK</tspan> (age <tspan font-weight="600" fill="#7ec8e3">BETWEEN</tspan> <tspan fill="#b5cea8">0</tspan> <tspan font-weight="600" fill="#7ec8e3">AND</tspan> <tspan fill="#b5cea8">150</tspan>),</text>
  <text x="76" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  <tspan font-weight="600" fill="#7ec8e3">CONSTRAINT</tspan> pk_members <tspan font-weight="600" fill="#7ec8e3">PRIMARY KEY</tspan> (id)</text>
  <text x="76" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">);</text>
</svg>
