<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">NOT NULL · DEFAULT · CHECK 제약 조건</text>

  <!-- NOT NULL section -->
  <rect x="30" y="68" width="258" height="180" fill="#0f1320" stroke="#7ec8e3" stroke-width="2" rx="8"/>
  <text x="159" y="92" text-anchor="middle" font-size="16" font-weight="700" fill="#7ec8e3">NOT NULL</text>
  <text x="159" y="114" text-anchor="middle" font-size="12" fill="#888">NULL 값 저장 금지</text>
  <text x="159" y="134" text-anchor="middle" font-size="11" fill="#888">반드시 값을 제공해야 함</text>
  <rect x="50" y="148" width="218" height="86" fill="#000000" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="70" y="168" font-size="12" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">name VARCHAR(100)</text>
  <text x="70" y="186" font-size="12" fill="#7777cc" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">  NOT NULL,</text>
  <text x="70" y="206" font-size="11" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">-- INSERT 없이 에러</text>
  <text x="70" y="222" font-size="11" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">-- UPDATE SET name=NULL 에러</text>

  <!-- DEFAULT section -->
  <rect x="311" y="68" width="258" height="180" fill="#0f1320" stroke="#55c555" stroke-width="2" rx="8"/>
  <text x="440" y="92" text-anchor="middle" font-size="16" font-weight="700" fill="#55c555">DEFAULT</text>
  <text x="440" y="114" text-anchor="middle" font-size="12" fill="#888">값 생략 시 자동 채움</text>
  <text x="440" y="134" text-anchor="middle" font-size="11" fill="#888">상수 또는 함수 표현식 사용 가능</text>
  <rect x="331" y="148" width="218" height="86" fill="#000000" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="351" y="168" font-size="12" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">status VARCHAR(20)</text>
  <text x="351" y="186" font-size="12" fill="#55c555" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">  DEFAULT 'pending',</text>
  <text x="351" y="206" font-size="12" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">created_at TIMESTAMPTZ</text>
  <text x="351" y="222" font-size="12" fill="#55c555" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">  DEFAULT now()</text>

  <!-- CHECK section -->
  <rect x="592" y="68" width="258" height="180" fill="#0f1320" stroke="#7777cc" stroke-width="2" rx="8"/>
  <text x="721" y="92" text-anchor="middle" font-size="16" font-weight="700" fill="#7777cc">CHECK</text>
  <text x="721" y="114" text-anchor="middle" font-size="12" fill="#888">조건식 만족 여부 검사</text>
  <text x="721" y="134" text-anchor="middle" font-size="11" fill="#888">TRUE 또는 NULL이면 통과</text>
  <rect x="612" y="148" width="218" height="86" fill="#000000" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="632" y="168" font-size="12" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">age INTEGER</text>
  <text x="632" y="186" font-size="12" fill="#7777cc" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">  CHECK (age &gt;= 0</text>
  <text x="632" y="204" font-size="12" fill="#7777cc" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">    AND age &lt;= 150),</text>
  <text x="632" y="220" font-size="11" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">-- 위반 시 에러 반환</text>

  <!-- Combined example code -->
  <rect x="30" y="270" width="820" height="182" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="50" y="292" font-size="11" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo',monospace">-- 세 제약 조건 함께 사용 (products 테이블)</text>
  <text x="50" y="312" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">CREATE TABLE products (</text>
  <text x="50" y="330" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">  id         BIGINT  PRIMARY KEY,</text>
  <text x="50" y="348" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">  name       VARCHAR(200) </text>
  <text x="292" y="348" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace">NOT NULL,</text>
  <text x="50" y="366" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">  price      NUMERIC(12,2) </text>
  <text x="310" y="366" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace">NOT NULL</text>
  <text x="50" y="384" font-size="13" fill="#7777cc" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">                 CHECK (price &gt; 0),</text>
  <text x="50" y="402" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">  stock      INTEGER </text>
  <text x="226" y="402" font-size="13" fill="#55c555" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace">DEFAULT 0</text>
  <text x="50" y="420" font-size="13" fill="#7777cc" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">                 CHECK (stock &gt;= 0),</text>
  <text x="50" y="438" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">);</text>
</svg>
