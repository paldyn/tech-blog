<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520" style="background:#0a0a0a;border-radius:12px">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <polygon points="0 0,6 3,0 6" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">컬럼 제약 조건 — NOT NULL · DEFAULT · CHECK</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">컬럼에 걸 수 있는 세 가지 기본 제약의 동작 원리</text>

  <!-- NOT NULL Box -->
  <rect x="60" y="100" width="240" height="160" rx="10" fill="#111827" stroke="#1e2433"/>
  <text x="180" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3">NOT NULL</text>
  <line x1="80" y1="136" x2="280" y2="136" stroke="#1e2433"/>
  <text x="180" y="157" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">NULL 값 저장 거부</text>
  <text x="180" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">컬럼에 반드시 값이 있어야 함</text>
  <text x="180" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">INSERT/UPDATE 시 검사</text>
  <rect x="90" y="216" width="180" height="28" rx="6" fill="#0d1117" stroke="#1e2433"/>
  <text x="180" y="234" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">email VARCHAR NOT NULL</text>

  <!-- DEFAULT Box -->
  <rect x="320" y="100" width="240" height="160" rx="10" fill="#111827" stroke="#1e2433"/>
  <text x="440" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555">DEFAULT</text>
  <line x1="340" y1="136" x2="540" y2="136" stroke="#1e2433"/>
  <text x="440" y="157" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">기본값 자동 적용</text>
  <text x="440" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">INSERT 시 값 생략 가능</text>
  <text x="440" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">함수·리터럴 모두 허용</text>
  <rect x="350" y="216" width="180" height="28" rx="6" fill="#0d1117" stroke="#1e2433"/>
  <text x="440" y="234" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">status VARCHAR DEFAULT 'ACTIVE'</text>

  <!-- CHECK Box -->
  <rect x="580" y="100" width="240" height="160" rx="10" fill="#111827" stroke="#1e2433"/>
  <text x="700" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e05555">CHECK</text>
  <line x1="600" y1="136" x2="800" y2="136" stroke="#1e2433"/>
  <text x="700" y="157" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">범위·조건 검사</text>
  <text x="700" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">불리언 표현식 평가</text>
  <text x="700" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">FALSE 시 에러 발생</text>
  <rect x="610" y="216" width="180" height="28" rx="6" fill="#0d1117" stroke="#1e2433"/>
  <text x="700" y="234" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">CHECK (age BETWEEN 0 AND 150)</text>

  <!-- Code block -->
  <rect x="60" y="290" width="760" height="186" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="80" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve">-- 세 제약 조건을 함께 사용하는 예</text>
  <text x="80" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">CREATE TABLE</text>
  <text x="191" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"> employees (</text>
  <text x="80" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">    emp_id      INTEGER</text>
  <text x="80" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">    name        VARCHAR(100) </text>
  <text x="312" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">NOT NULL</text>
  <text x="80" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">    hire_date   DATE         </text>
  <text x="304" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">DEFAULT CURRENT_DATE</text>
  <text x="80" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">    salary      NUMERIC(12,2)</text>
  <text x="304" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">CHECK (salary &gt; 0)</text>
  <text x="80" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">    status      VARCHAR(20)  </text>
  <text x="304" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">DEFAULT </text>
  <text x="366" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">'ACTIVE'</text>
  <text x="424" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve"> CHECK (status IN (</text>
  <text x="80" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">        'ACTIVE', 'INACTIVE', 'SUSPENDED'))</text>
  <text x="80" y="456" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">);</text>

  <!-- Footer -->
  <text x="440" y="498" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · SQL 완전 정복</text>
</svg>
