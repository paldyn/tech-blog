<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">열 제약의 역할과 검사 시점</text>

  <!-- Data flow -->
  <rect x="60" y="70" width="160" height="60" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="140" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">INSERT / UPDATE</text>
  <text x="140" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">데이터 입력</text>

  <line x1="220" y1="100" x2="278" y2="100" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- NOT NULL check -->
  <rect x="280" y="70" width="160" height="60" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="2"/>
  <text x="360" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">NOT NULL</text>
  <text x="360" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">NULL 값 차단</text>

  <line x1="440" y1="100" x2="498" y2="100" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- CHECK -->
  <rect x="500" y="70" width="160" height="60" rx="8" fill="#0f1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="580" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">CHECK</text>
  <text x="580" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">범위/패턴 검증</text>

  <line x1="660" y1="100" x2="718" y2="100" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Storage -->
  <rect x="720" y="70" width="140" height="60" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="790" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">저장</text>
  <text x="790" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">테이블</text>

  <!-- DEFAULT note below NOT NULL -->
  <rect x="280" y="160" width="160" height="50" rx="8" fill="#1a1a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="360" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">DEFAULT</text>
  <text x="360" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">값 생략 시 자동 입력</text>
  <line x1="360" y1="130" x2="360" y2="160" stroke="#e05555" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- NOT NULL detail -->
  <text x="60" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">NOT NULL 상세</text>

  <rect x="60" y="264" width="760" height="70" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="286" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">name </tspan>
    <tspan fill="#7ec8e3" font-weight="600">VARCHAR</tspan>
    <tspan fill="#ffffff">(100) </tspan>
    <tspan fill="#7ec8e3" font-weight="600">NOT NULL</tspan>
    <tspan fill="#ffffff">,   </tspan>
    <tspan fill="#9aa4b8">-- NULL 불가, 반드시 값 제공</tspan>
  </text>
  <text x="76" y="306" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">note </tspan>
    <tspan fill="#7ec8e3" font-weight="600">TEXT</tspan>
    <tspan fill="#ffffff">,                  </tspan>
    <tspan fill="#9aa4b8">-- NULL 허용 (기본) — 선택 입력 필드</tspan>
  </text>
  <text x="76" y="326" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">score </tspan>
    <tspan fill="#7ec8e3" font-weight="600">INT</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#7ec8e3" font-weight="600">NOT NULL DEFAULT</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#b5cea8">0</tspan>
    <tspan fill="#ffffff">,  </tspan>
    <tspan fill="#9aa4b8">-- 생략 시 0, NULL 불가</tspan>
  </text>

  <!-- CHECK detail -->
  <text x="60" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">CHECK 상세</text>

  <rect x="60" y="382" width="760" height="52" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="404" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">age    </tspan>
    <tspan fill="#7ec8e3" font-weight="600">INT CHECK</tspan>
    <tspan fill="#ffffff">(age </tspan>
    <tspan fill="#ffffff">&gt;= </tspan>
    <tspan fill="#b5cea8">0</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#7ec8e3" font-weight="600">AND</tspan>
    <tspan fill="#ffffff"> age &lt;= </tspan>
    <tspan fill="#b5cea8">150</tspan>
    <tspan fill="#ffffff">),</tspan>
  </text>
  <text x="76" y="424" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">status </tspan>
    <tspan fill="#7ec8e3" font-weight="600">VARCHAR</tspan>
    <tspan fill="#ffffff">(20) </tspan>
    <tspan fill="#7ec8e3" font-weight="600">CHECK</tspan>
    <tspan fill="#ffffff">(status </tspan>
    <tspan fill="#7ec8e3" font-weight="600">IN</tspan>
    <tspan fill="#ffffff"> (</tspan>
    <tspan fill="#ce9178">'pending'</tspan>
    <tspan fill="#ffffff">, </tspan>
    <tspan fill="#ce9178">'active'</tspan>
    <tspan fill="#ffffff">, </tspan>
    <tspan fill="#ce9178">'closed'</tspan>
    <tspan fill="#ffffff">))</tspan>
  </text>
</svg>
