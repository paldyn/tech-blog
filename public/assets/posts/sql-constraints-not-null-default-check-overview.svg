<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">제약 조건의 역할 — 데이터 무결성 계층</text>

  <!-- 3 layers -->
  <rect x="130" y="66" width="620" height="76" rx="8" fill="#111" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">애플리케이션 계층 (취약)</text>
  <text x="440" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">IF 문, 유효성 검사 코드 — 우회 가능, 버그 포함 가능, 직접 DB 접근 시 무력화</text>
  <text x="440" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">SQL Injection / 직접 INSERT / 배치 스크립트 실수로 우회됨</text>

  <rect x="90" y="160" width="700" height="76" rx="8" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">데이터베이스 제약 계층 (강력)</text>
  <text x="440" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">NOT NULL · DEFAULT · CHECK · UNIQUE · PRIMARY KEY · FOREIGN KEY</text>
  <text x="440" y="224" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">DBMS가 직접 강제 — 어떤 경로로 접근해도 위반 데이터 차단</text>

  <rect x="60" y="254" width="760" height="76" rx="8" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">스토리지 계층 (물리적 보장)</text>
  <text x="440" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">트랜잭션 로그, 체크섬, RAID — 데이터 손실 방지</text>
  <text x="440" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">애플리케이션 버그로부터는 보호하지 못함</text>

  <!-- Result -->
  <rect x="60" y="350" width="760" height="90" rx="8" fill="#1a2e1a" stroke="#3a5e3a" stroke-width="1"/>
  <text x="440" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">DB 제약 조건이 필요한 이유</text>

  <text x="200" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">배치 스크립트</text>
  <text x="200" y="418" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">직접 INSERT시에도 차단</text>

  <text x="440" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">DBA 실수 방지</text>
  <text x="440" y="418" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">수작업 마이그레이션 오류 차단</text>

  <text x="680" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">여러 앱 공유 DB</text>
  <text x="680" y="418" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">모든 클라이언트에 동일 규칙 강제</text>
</svg>
