<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" width="880" height="540">
  <defs>
    <style>
      text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }
      .mono { font-family: 'JetBrains Mono','Menlo','Consolas',monospace; }
    </style>
  </defs>

  <!-- background -->
  <rect width="880" height="540" rx="12" fill="#0a0a0a"/>

  <!-- title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">연산자 주요 예제</text>
  <text x="440" y="66" text-anchor="middle" font-size="14" fill="#888">단락 평가 · 비트 연산 · 삼항 · instanceof</text>

  <!-- Left column: Short-circuit &amp; Bitwise -->
  <!-- Short-circuit evaluation -->
  <text x="60" y="100" font-size="13" font-weight="600" fill="#7ec8e3">단락 평가 (Short-circuit Evaluation)</text>
  <rect x="60" y="110" width="360" height="136" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="131" class="mono" font-size="13" fill="#7ec8e3">int</text><text xml:space="preserve" x="106" y="131" class="mono" font-size="13" fill="#ffffff"> x = 0;</text>
  <text xml:space="preserve" x="76" y="149" class="mono" font-size="13" fill="#9aa4b8">// x != 0 이 false → 오른쪽 평가 안 됨</text>
  <text xml:space="preserve" x="76" y="167" class="mono" font-size="13" fill="#7ec8e3">boolean</text><text xml:space="preserve" x="144" y="167" class="mono" font-size="13" fill="#ffffff"> safe = x != 0 &amp;&amp; 10/x &gt; 1;</text>
  <text xml:space="preserve" x="76" y="185" class="mono" font-size="13" fill="#9aa4b8">// → safe = false (NPE·ArithEx 방지)</text>
  <text xml:space="preserve" x="76" y="203" class="mono" font-size="13" fill="#ffffff"> </text>
  <text xml:space="preserve" x="76" y="221" class="mono" font-size="13" fill="#7ec8e3">boolean</text><text xml:space="preserve" x="144" y="221" class="mono" font-size="13" fill="#ffffff"> flag = </text><text xml:space="preserve" x="199" y="221" class="mono" font-size="13" fill="#7ec8e3">true</text><text xml:space="preserve" x="227" y="221" class="mono" font-size="13" fill="#ffffff"> || expensive();</text>
  <text xml:space="preserve" x="76" y="237" class="mono" font-size="13" fill="#9aa4b8">// expensive() 호출되지 않음</text>

  <!-- Bitwise -->
  <text x="60" y="272" font-size="13" font-weight="600" fill="#7ec8e3">비트 연산 · 시프트</text>
  <rect x="60" y="282" width="360" height="154" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="303" class="mono" font-size="13" fill="#7ec8e3">int</text><text xml:space="preserve" x="106" y="303" class="mono" font-size="13" fill="#ffffff"> n = 0b1010_1100;  </text><text xml:space="preserve" x="270" y="303" class="mono" font-size="13" fill="#9aa4b8">// 172</text>
  <text xml:space="preserve" x="76" y="321" class="mono" font-size="13" fill="#7ec8e3">int</text><text xml:space="preserve" x="106" y="321" class="mono" font-size="13" fill="#ffffff"> mask = 0b0000_1111; </text><text xml:space="preserve" x="270" y="321" class="mono" font-size="13" fill="#9aa4b8">// 15</text>
  <text xml:space="preserve" x="76" y="339" class="mono" font-size="13" fill="#7ec8e3">int</text><text xml:space="preserve" x="106" y="339" class="mono" font-size="13" fill="#ffffff"> low4 = n &amp; mask;   </text><text xml:space="preserve" x="270" y="339" class="mono" font-size="13" fill="#9aa4b8">// 12</text>
  <text xml:space="preserve" x="76" y="357" class="mono" font-size="13" fill="#7ec8e3">int</text><text xml:space="preserve" x="106" y="357" class="mono" font-size="13" fill="#ffffff"> doubled = n &lt;&lt; 1;  </text><text xml:space="preserve" x="270" y="357" class="mono" font-size="13" fill="#9aa4b8">// 344</text>
  <text xml:space="preserve" x="76" y="375" class="mono" font-size="13" fill="#7ec8e3">int</text><text xml:space="preserve" x="106" y="375" class="mono" font-size="13" fill="#ffffff"> halved = n &gt;&gt; 1;   </text><text xml:space="preserve" x="270" y="375" class="mono" font-size="13" fill="#9aa4b8">// 86</text>
  <text xml:space="preserve" x="76" y="393" class="mono" font-size="13" fill="#9aa4b8">// &lt;&lt; 1 = ×2, &gt;&gt; 1 = ÷2 (정수 한정)</text>
  <text xml:space="preserve" x="76" y="421" class="mono" font-size="13" fill="#ffffff"> </text>

  <!-- Right column: Ternary &amp; instanceof -->
  <!-- Ternary -->
  <text x="460" y="100" font-size="13" font-weight="600" fill="#7ec8e3">삼항 연산자 (Ternary)</text>
  <rect x="460" y="110" width="360" height="118" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="476" y="131" class="mono" font-size="13" fill="#7ec8e3">int</text><text xml:space="preserve" x="506" y="131" class="mono" font-size="13" fill="#ffffff"> score = 78;</text>
  <text xml:space="preserve" x="476" y="149" class="mono" font-size="13" fill="#7ec8e3">String</text><text xml:space="preserve" x="520" y="149" class="mono" font-size="13" fill="#ffffff"> grade =</text>
  <text xml:space="preserve" x="476" y="167" class="mono" font-size="13" fill="#ffffff">    score &gt;= 90 ? </text><text xml:space="preserve" x="604" y="167" class="mono" font-size="13" fill="#ce9178">"A"</text>
  <text xml:space="preserve" x="476" y="185" class="mono" font-size="13" fill="#ffffff">  : score &gt;= 70 ? </text><text xml:space="preserve" x="604" y="185" class="mono" font-size="13" fill="#ce9178">"B"</text>
  <text xml:space="preserve" x="476" y="203" class="mono" font-size="13" fill="#ffffff">  : </text><text xml:space="preserve" x="500" y="203" class="mono" font-size="13" fill="#ce9178">"C"</text><text xml:space="preserve" x="520" y="203" class="mono" font-size="13" fill="#ffffff">;</text>
  <text xml:space="preserve" x="476" y="221" class="mono" font-size="13" fill="#9aa4b8">// grade = "B"</text>

  <!-- instanceof / Pattern -->
  <text x="460" y="252" font-size="13" font-weight="600" fill="#7ec8e3">instanceof &amp; 패턴 매칭 (Java 16+)</text>
  <rect x="460" y="262" width="360" height="172" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="476" y="283" class="mono" font-size="13" fill="#7ec8e3">Object</text><text xml:space="preserve" x="527" y="283" class="mono" font-size="13" fill="#ffffff"> obj = </text><text xml:space="preserve" x="562" y="283" class="mono" font-size="13" fill="#ce9178">"Hello"</text><text xml:space="preserve" x="618" y="283" class="mono" font-size="13" fill="#ffffff">;</text>
  <text xml:space="preserve" x="476" y="301" class="mono" font-size="13" fill="#9aa4b8">// 구식: instanceof + 캐스팅</text>
  <text xml:space="preserve" x="476" y="319" class="mono" font-size="13" fill="#7ec8e3">if</text><text xml:space="preserve" x="494" y="319" class="mono" font-size="13" fill="#ffffff"> (obj </text><text xml:space="preserve" x="524" y="319" class="mono" font-size="13" fill="#7ec8e3">instanceof</text><text xml:space="preserve" x="594" y="319" class="mono" font-size="13" fill="#ffffff"> String) {</text>
  <text xml:space="preserve" x="476" y="337" class="mono" font-size="13" fill="#ffffff">    </text><text xml:space="preserve" x="494" y="337" class="mono" font-size="13" fill="#7ec8e3">String</text><text xml:space="preserve" x="538" y="337" class="mono" font-size="13" fill="#ffffff"> s = (</text><text xml:space="preserve" x="570" y="337" class="mono" font-size="13" fill="#7ec8e3">String</text><text xml:space="preserve" x="614" y="337" class="mono" font-size="13" fill="#ffffff">) obj;</text>
  <text xml:space="preserve" x="476" y="355" class="mono" font-size="13" fill="#ffffff">}</text>
  <text xml:space="preserve" x="476" y="373" class="mono" font-size="13" fill="#9aa4b8">// 신식: 패턴 매칭 instanceof</text>
  <text xml:space="preserve" x="476" y="391" class="mono" font-size="13" fill="#7ec8e3">if</text><text xml:space="preserve" x="494" y="391" class="mono" font-size="13" fill="#ffffff"> (obj </text><text xml:space="preserve" x="524" y="391" class="mono" font-size="13" fill="#7ec8e3">instanceof</text><text xml:space="preserve" x="594" y="391" class="mono" font-size="13" fill="#ffffff"> String s) {</text>
  <text xml:space="preserve" x="476" y="409" class="mono" font-size="13" fill="#ffffff">    s.toUpperCase(); </text><text xml:space="preserve" x="628" y="409" class="mono" font-size="13" fill="#9aa4b8">// 바로 사용</text>
  <text xml:space="preserve" x="476" y="427" class="mono" font-size="13" fill="#ffffff">}</text>

  <!-- Overflow warning box -->
  <rect x="60" y="456" width="760" height="52" rx="8" fill="#1a0a0a" stroke="#3a1010" stroke-width="1"/>
  <text x="440" y="476" text-anchor="middle" font-size="12" font-weight="600" fill="#e05555">주의: 정수 오버플로 &amp; 부동소수점 정밀도</text>
  <text x="440" y="494" text-anchor="middle" font-size="12" fill="#c84040">int MAX = Integer.MAX_VALUE;  MAX + 1 → 음수!  /  0.1 + 0.2 ≠ 0.3  →  BigDecimal 사용 권장</text>
</svg>
