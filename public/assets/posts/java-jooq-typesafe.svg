<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">문자열 SQL vs jOOQ DSL — 오류를 잡는 시점</text>

  <!-- string sql -->
  <text x="60" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e05555">문자열 SQL — 오류는 실행할 때 터진다</text>
  <rect x="60" y="104" width="760" height="92" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="76" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">String sql = <tspan fill="#ce9178">"SELECT naem FROM member WHERE id = ?"</tspan>;</text>
  <text x="76" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">//          오타 ↑ 'naem' — 컴파일은 통과한다</text>
  <text x="76" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">// 운영에서 SQLException — 런타임에야 발견</text>

  <!-- jooq dsl -->
  <text x="60" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555">jOOQ DSL — 오류를 컴파일 때 막는다</text>
  <rect x="60" y="260" width="760" height="92" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="76" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">dsl.select(MEMBER.NAME)</text>
  <text x="76" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">   .from(MEMBER).where(MEMBER.ID.eq(id));</text>
  <text x="76" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">// MEMBER.NAEM 이라 쓰면 컴파일 에러 — 즉시 발견</text>

  <text x="60" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">컬럼·타입이 자바 코드라 IDE 자동완성·리팩터링·타입 검사가 모두 적용된다.</text>
</svg>
