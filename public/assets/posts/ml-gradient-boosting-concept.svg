<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380" style="background:#0a0a0a;border-radius:12px">
  <rect x="0" y="0" width="880" height="380" rx="12" fill="#0a0a0a"/>

  <!-- Header -->
  <rect x="0" y="0" width="880" height="68" rx="12" fill="#0d1a2a"/>
  <rect x="0" y="56" width="880" height="12" fill="#0d1a2a"/>
  <text x="60" y="38" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#ffffff">그래디언트 부스팅: 순차적 잔차 학습</text>
  <text x="60" y="60" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">각 트리가 이전 앙상블의 오차를 교정하며 최종 예측에 수렴</text>

  <!-- Step labels row -->
  <text x="60" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">STEP 1</text>
  <text x="246" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">STEP 2</text>
  <text x="432" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">STEP 3</text>
  <text x="640" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">FINAL</text>

  <!-- ===== STEP 1: Tree 1 ===== -->
  <rect x="60" y="110" width="150" height="130" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="135" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">Tree 1</text>
  <line x1="80" y1="142" x2="220" y2="142" stroke="#1e2433" stroke-width="1"/>
  <!-- Mini tree diagram -->
  <circle cx="135" cy="162" r="10" fill="#1a1f2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="135" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc" text-anchor="middle">X≤5?</text>
  <line x1="125" y1="172" x2="108" y2="188" stroke="#7777cc" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="145" y1="172" x2="162" y2="188" stroke="#7777cc" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="96" y="188" width="24" height="16" rx="3" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="108" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#55c555" text-anchor="middle">2.1</text>
  <rect x="150" y="188" width="24" height="16" rx="3" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="162" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#55c555" text-anchor="middle">4.8</text>
  <text x="135" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">예측: ŷ₁ = 3.2</text>

  <!-- Residual 1 box -->
  <rect x="60" y="255" width="150" height="44" rx="6" fill="#2a1a0d" stroke="#e05555" stroke-width="1.2"/>
  <text x="135" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">잔차 r₁ = y − ŷ₁</text>
  <text x="135" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">오차를 다음 트리로</text>

  <!-- Arrow 1 → 2 -->
  <line x1="214" y1="175" x2="238" y2="175" stroke="#555" stroke-width="2"/>
  <polygon points="238,170 250,175 238,180" fill="#555"/>
  <text x="232" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666" text-anchor="middle">+lr·</text>

  <!-- ===== STEP 2: Tree 2 ===== -->
  <rect x="248" y="110" width="150" height="130" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="323" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">Tree 2</text>
  <line x1="268" y1="142" x2="408" y2="142" stroke="#1e2433" stroke-width="1"/>
  <text x="323" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">학습 대상: r₁</text>
  <!-- Mini tree diagram 2 -->
  <circle cx="323" cy="178" r="10" fill="#1a1f2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="323" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3" text-anchor="middle">X≤3?</text>
  <line x1="313" y1="188" x2="296" y2="204" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="333" y1="188" x2="350" y2="204" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="284" y="204" width="24" height="16" rx="3" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="296" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#55c555" text-anchor="middle">0.9</text>
  <rect x="338" y="204" width="24" height="16" rx="3" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="350" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#55c555" text-anchor="middle">-0.4</text>
  <text x="323" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">잔차 보정: Δ₂</text>

  <!-- Residual 2 box -->
  <rect x="248" y="255" width="150" height="44" rx="6" fill="#2a1a0d" stroke="#e05555" stroke-width="1.2"/>
  <text x="323" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">잔차 r₂ = y − ŷ₂</text>
  <text x="323" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">오차 점점 줄어듦</text>

  <!-- Arrow 2 → 3 -->
  <line x1="402" y1="175" x2="426" y2="175" stroke="#555" stroke-width="2"/>
  <polygon points="426,170 438,175 426,180" fill="#555"/>
  <text x="420" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666" text-anchor="middle">+lr·</text>

  <!-- ===== STEP 3: Tree 3 ===== -->
  <rect x="436" y="110" width="150" height="130" rx="8" fill="#0d1520" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="511" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#b5cea8" text-anchor="middle">Tree 3</text>
  <line x1="456" y1="142" x2="596" y2="142" stroke="#1e2433" stroke-width="1"/>
  <text x="511" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">학습 대상: r₂</text>
  <!-- Mini tree diagram 3 -->
  <circle cx="511" cy="178" r="10" fill="#1a1f2e" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="511" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#b5cea8" text-anchor="middle">X≤7?</text>
  <line x1="501" y1="188" x2="484" y2="204" stroke="#b5cea8" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="521" y1="188" x2="538" y2="204" stroke="#b5cea8" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="472" y="204" width="24" height="16" rx="3" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="484" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#55c555" text-anchor="middle">0.3</text>
  <rect x="526" y="204" width="24" height="16" rx="3" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="538" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#55c555" text-anchor="middle">0.1</text>
  <text x="511" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">잔차 보정: Δ₃</text>

  <!-- Dots indicating more trees -->
  <text x="600" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="24" fill="#444" text-anchor="middle">···</text>

  <!-- Arrow 3 → Final -->
  <line x1="620" y1="175" x2="634" y2="175" stroke="#555" stroke-width="2"/>
  <polygon points="634,170 646,175 634,180" fill="#555"/>

  <!-- ===== Final Prediction ===== -->
  <rect x="648" y="110" width="170" height="130" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="2"/>
  <text x="733" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">최종 예측</text>
  <line x1="668" y1="142" x2="808" y2="142" stroke="#1e3020" stroke-width="1"/>
  <text x="733" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">ŷ = ŷ₁ + lr·Δ₂</text>
  <text x="733" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">+ lr·Δ₃ + ···</text>
  <line x1="668" y1="196" x2="808" y2="196" stroke="#1e3020" stroke-width="1"/>
  <text x="733" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">N개 약한 학습기의</text>
  <text x="733" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">가중합 → 강한 예측</text>

  <!-- Formula bottom -->
  <rect x="648" y="255" width="170" height="44" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="1.2"/>
  <text x="733" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">ŷ_M = Σ lr · h_m(x)</text>
  <text x="733" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">m=1 to M</text>

  <!-- Bottom label: learning rate effect -->
  <line x1="60" y1="315" x2="820" y2="315" stroke="#1e2433" stroke-width="1"/>
  <text x="60" y="337" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">학습률(lr) 작게 →</text>
  <text x="185" y="337" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">n_estimators 많이 필요, 과적합 방지</text>
  <text x="480" y="337" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">학습률(lr) 크게 →</text>
  <text x="605" y="337" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">수렴 빠름, 과적합 위험</text>

  <!-- Footer -->
  <text x="60" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">각 트리는 이전 앙상블 전체의 손실 함수(Loss Function)의 음의 기울기(Negative Gradient) 방향으로 학습 — PALDYN AI 완전 정복</text>
</svg>
