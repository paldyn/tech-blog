<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">세 전략 완전 비교 매트릭스</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888">프롬프트 엔지니어링 / RAG / 파인튜닝</text>

  <!-- Column headers -->
  <rect x="230" y="88" width="180" height="36" rx="6" fill="#0d1020" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="320" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">프롬프트 엔지니어링</text>

  <rect x="430" y="88" width="180" height="36" rx="6" fill="#0d1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="520" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">RAG</text>

  <rect x="630" y="88" width="190" height="36" rx="6" fill="#0d1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="725" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">파인튜닝</text>

  <!-- Row labels and data -->
  <!-- 1: 구현 난이도 -->
  <text x="100" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">구현 난이도</text>
  <rect x="230" y="126" width="180" height="30" rx="4" fill="#111"/>
  <text x="320" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">매우 낮음 ★</text>
  <rect x="430" y="126" width="180" height="30" rx="4" fill="#111"/>
  <text x="520" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">중간 ★★★</text>
  <rect x="630" y="126" width="190" height="30" rx="4" fill="#111"/>
  <text x="725" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">높음 ★★★★★</text>

  <!-- 2: 초기 비용 -->
  <text x="100" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">초기 비용</text>
  <rect x="230" y="160" width="180" height="30" rx="4" fill="#0e0e0e"/>
  <text x="320" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">무료 (프롬프트만)</text>
  <rect x="430" y="160" width="180" height="30" rx="4" fill="#0e0e0e"/>
  <text x="520" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">임베딩+DB 비용</text>
