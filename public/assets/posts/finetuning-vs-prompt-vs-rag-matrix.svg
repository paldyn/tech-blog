  <text x="725" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">GPU 학습 비용</text>

  <!-- 3: 지식 업데이트 -->
  <text x="100" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">지식 업데이트</text>
