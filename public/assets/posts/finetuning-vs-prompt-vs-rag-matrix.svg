  <rect x="630" y="194" width="190" height="30" rx="4" fill="#111"/>
  <text x="725" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">재학습 필요</text>

