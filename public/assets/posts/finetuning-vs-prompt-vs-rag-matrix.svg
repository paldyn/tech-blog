  <text x="320" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">불가 (컨텍스트 한계)</text>
  <rect x="430" y="228" width="180" height="30" rx="4" fill="#0e0e0e"/>
  <text x="520" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">가능 (DB 갱신)</text>
  <rect x="630" y="228" width="190" height="30" rx="4" fill="#0e0e0e"/>
  <text x="725" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">어려움</text>

  <!-- 5: 스타일 학습 -->
  <text x="100" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">행동/스타일 학습</text>
  <rect x="230" y="262" width="180" height="30" rx="4" fill="#111"/>
  <text x="320" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">제한적</text>
  <rect x="430" y="262" width="180" height="30" rx="4" fill="#111"/>
  <text x="520" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">제한적</text>
  <rect x="630" y="262" width="190" height="30" rx="4" fill="#111"/>
  <text x="725" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">가능</text>

  <!-- 6: 출처 추적 -->
  <text x="100" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">출처 추적</text>
  <rect x="230" y="296" width="180" height="30" rx="4" fill="#0e0e0e"/>
  <text x="320" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">불가</text>
  <rect x="430" y="296" width="180" height="30" rx="4" fill="#0e0e0e"/>
  <text x="520" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">가능</text>
  <rect x="630" y="296" width="190" height="30" rx="4" fill="#0e0e0e"/>
  <text x="725" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">불가</text>

  <!-- 7: 추천 시작점 -->
  <text x="100" y="346" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">추천 시작점</text>
  <rect x="230" y="330" width="180" height="30" rx="4" fill="#111"/>
  <text x="320" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">항상 먼저 시도</text>
  <rect x="430" y="330" width="180" height="30" rx="4" fill="#111"/>
  <text x="520" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">지식 부족 시</text>
  <rect x="630" y="330" width="190" height="30" rx="4" fill="#111"/>
  <text x="725" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">행동 최적화 시</text>

  <!-- Separator line -->
  <line x1="60" y1="124" x2="820" y2="124" stroke="#222" stroke-width="1"/>
  <line x1="60" y1="158" x2="820" y2="158" stroke="#222" stroke-width="1"/>
  <line x1="60" y1="192" x2="820" y2="192" stroke="#222" stroke-width="1"/>
  <line x1="60" y1="226" x2="820" y2="226" stroke="#222" stroke-width="1"/>
  <line x1="60" y1="260" x2="820" y2="260" stroke="#222" stroke-width="1"/>
  <line x1="60" y1="294" x2="820" y2="294" stroke="#222" stroke-width="1"/>
  <line x1="60" y1="328" x2="820" y2="328" stroke="#222" stroke-width="1"/>

  <!-- Bottom note -->
  <rect x="60" y="376" width="760" height="44" rx="8" fill="#1a1500" stroke="#e8b84b" stroke-width="1"/>
  <text x="440" y="395" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8b84b">진화 순서: 프롬프트 엔지니어링 → RAG → 파인튜닝 → RAG+파인튜닝 조합</text>
  <text x="440" y="412" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">항상 단순한 방법부터 시도하고, 한계에 부딪혔을 때 다음 단계로 진화</text>
</svg>
