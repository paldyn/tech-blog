<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">PK 전략: 자연키 vs 서로게이트키</text>

  <!-- Natural Key -->
  <rect x="60" y="70" width="360" height="240" rx="8" fill="#0d0d0d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">자연키 (Natural Key)</text>
  <text x="240" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">비즈니스 의미를 가진 컬럼을 PK로</text>

  <rect x="76" y="124" width="328" height="56" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">-- 주민등록번호를 PK로</text>
  <text x="92" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">CREATE TABLE</text><text x="187" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> citizens (</text>
  <text x="92" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  rrn CHAR(14) </text><text x="234" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">PRIMARY KEY</text><text x="329" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">);</text>

  <text x="80" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">장점</text>
  <text x="80" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• 별도 PK 컬럼 불필요</text>
  <text x="80" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• 도메인 의미 명확</text>
  <text x="80" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">단점</text>
  <text x="80" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• 값 변경 시 FK 연쇄 수정</text>
  <text x="80" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• 개인정보 PK 노출 위험</text>

  <!-- Surrogate Key -->
  <rect x="460" y="70" width="360" height="240" rx="8" fill="#0d0d0d" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc">서로게이트키 (Surrogate Key)</text>
  <text x="640" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">의미 없는 시퀀스/UUID를 PK로</text>

  <rect x="476" y="124" width="328" height="56" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="492" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">-- 자동 증가 ID를 PK로</text>
  <text x="492" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">CREATE TABLE</text><text x="587" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> users (</text>
  <text x="492" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  id </tspan><tspan fill="#7ec8e3">BIGINT GENERATED ALWAYS AS IDENTITY PRIMARY KEY</tspan></text>

  <text x="480" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">장점</text>
  <text x="480" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• 불변, FK JOIN 안정</text>
  <text x="480" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• 개인정보 분리 가능</text>
  <text x="480" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">단점</text>
  <text x="480" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• 추가 컬럼 필요</text>
  <text x="480" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• 도메인 의미 없음</text>

  <!-- Recommendation -->
  <rect x="60" y="328" width="760" height="36" rx="6" fill="#0d1520" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="351" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">실무 권장: 서로게이트키(BIGINT IDENTITY/SERIAL) 기본값 · 자연키는 UNIQUE 제약으로 보조</text>
</svg>
