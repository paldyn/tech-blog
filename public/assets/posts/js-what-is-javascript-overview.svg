<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">JavaScript란 무엇인가?</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">세 가지 핵심 역할</text>

  <!-- Box 1: HTML -->
  <rect x="60" y="110" width="220" height="100" rx="10" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">HTML</text>
  <text x="170" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">구조 (Structure)</text>
  <text x="170" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666" text-anchor="middle">콘텐츠와 의미</text>

  <!-- Box 2: CSS -->
  <rect x="330" y="110" width="220" height="100" rx="10" fill="#1a2e1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">CSS</text>
  <text x="440" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">표현 (Presentation)</text>
  <text x="440" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666" text-anchor="middle">스타일과 레이아웃</text>

  <!-- Box 3: JS -->
  <rect x="600" y="110" width="220" height="100" rx="10" fill="#2e2a1a" stroke="#e8c55a" stroke-width="1.5"/>
  <text x="710" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8c55a" text-anchor="middle">JavaScript</text>
  <text x="710" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">동작 (Behavior)</text>
  <text x="710" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666" text-anchor="middle">상호작용과 로직</text>

  <!-- Arrows down -->
  <line x1="170" y1="210" x2="170" y2="248" stroke="#555" stroke-width="1.5"/>
  <polygon points="170,258 165,248 175,248" fill="#555"/>
  <line x1="440" y1="210" x2="440" y2="248" stroke="#555" stroke-width="1.5"/>
  <polygon points="440,258 435,248 445,248" fill="#555"/>
  <line x1="710" y1="210" x2="710" y2="248" stroke="#555" stroke-width="1.5"/>
  <polygon points="710,258 705,248 715,248" fill="#555"/>

  <!-- Web Page box -->
  <rect x="240" y="258" width="400" height="60" rx="10" fill="#1e1e1e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">웹 페이지 (Web Page)</text>
  <text x="440" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">구조 + 스타일 + 동작이 결합된 완성된 경험</text>

  <!-- Lines from HTML/CSS to Web Page box -->
  <line x1="170" y1="258" x2="290" y2="258" stroke="#555" stroke-width="1"/>
  <line x1="710" y1="258" x2="590" y2="258" stroke="#555" stroke-width="1"/>

  <!-- JS characteristics section -->
  <text x="60" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">JavaScript의 주요 특성</text>

  <!-- Characteristics boxes -->
  <rect x="60" y="388" width="175" height="70" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="148" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">동적 타입</text>
  <text x="148" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">런타임에 타입 결정</text>
  <text x="148" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">Dynamically Typed</text>

  <rect x="251" y="388" width="175" height="70" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="339" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">인터프리터</text>
  <text x="339" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">JIT 컴파일로 최적화</text>
  <text x="339" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">Interpreted / JIT</text>

  <rect x="442" y="388" width="175" height="70" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="530" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8c55a" text-anchor="middle">멀티 패러다임</text>
  <text x="530" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">절차·객체·함수형</text>
  <text x="530" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">Multi-Paradigm</text>

  <rect x="633" y="388" width="187" height="70" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="727" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">이벤트 기반</text>
  <text x="727" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">비동기 이벤트 루프</text>
  <text x="727" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">Event-Driven</text>

  <!-- Footer -->
  <text x="440" y="500" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN · JavaScript 완전 정복</text>
</svg>
