<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Fast-Forward Merge 원리</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">갈라지지 않은 직선 히스토리에서의 병합</text>

  <!-- Before merge section -->
  <text x="100" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">병합 전</text>

  <!-- Commits -->
  <circle cx="160" cy="160" r="26" fill="#1a2233" stroke="#7ec8e3" stroke-width="2"/>
  <text x="160" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">C1</text>

  <circle cx="300" cy="160" r="26" fill="#1a2233" stroke="#7ec8e3" stroke-width="2"/>
  <text x="300" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">C2</text>

  <circle cx="440" cy="160" r="26" fill="#1a2233" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">C3</text>

  <circle cx="580" cy="160" r="26" fill="#1a2233" stroke="#55c555" stroke-width="2"/>
  <text x="580" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">C4</text>

  <!-- Arrows between commits (before) -->
  <line x1="186" y1="160" x2="272" y2="160" stroke="#555" stroke-width="2"/>
  <polygon points="272,155 282,160 272,165" fill="#555"/>
  <line x1="326" y1="160" x2="412" y2="160" stroke="#555" stroke-width="2"/>
  <polygon points="412,155 422,160 412,165" fill="#555"/>
  <line x1="466" y1="160" x2="552" y2="160" stroke="#555" stroke-width="2"/>
  <polygon points="552,155 562,160 552,165" fill="#555"/>

  <!-- Branch labels (before) -->
  <rect x="258" y="200" width="82" height="26" rx="6" fill="#1a2233" stroke="#7777cc" stroke-width="1.5"/>
  <text x="299" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">main</text>
  <line x1="299" y1="200" x2="299" y2="186" stroke="#7777cc" stroke-width="1.5"/>

  <rect x="530" y="200" width="96" height="26" rx="6" fill="#1a2233" stroke="#55c555" stroke-width="1.5"/>
  <text x="578" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">feature</text>
  <line x1="578" y1="200" x2="578" y2="186" stroke="#55c555" stroke-width="1.5"/>

  <!-- After merge section -->
  <text x="100" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">병합 후 (fast-forward)</text>

  <!-- Commits after -->
  <circle cx="160" cy="330" r="26" fill="#1a2233" stroke="#7ec8e3" stroke-width="2"/>
  <text x="160" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">C1</text>

  <circle cx="300" cy="330" r="26" fill="#1a2233" stroke="#7ec8e3" stroke-width="2"/>
  <text x="300" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">C2</text>

  <circle cx="440" cy="330" r="26" fill="#1a2233" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">C3</text>

  <circle cx="580" cy="330" r="26" fill="#1a2233" stroke="#55c555" stroke-width="2.5"/>
  <text x="580" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">C4</text>

  <!-- Arrows between commits (after) -->
  <line x1="186" y1="330" x2="272" y2="330" stroke="#555" stroke-width="2"/>
  <polygon points="272,325 282,330 272,335" fill="#555"/>
  <line x1="326" y1="330" x2="412" y2="330" stroke="#555" stroke-width="2"/>
  <polygon points="412,325 422,330 412,335" fill="#555"/>
  <line x1="466" y1="330" x2="552" y2="330" stroke="#555" stroke-width="2"/>
  <polygon points="552,325 562,330 552,335" fill="#555"/>

  <!-- Both branch labels pointing to C4 (after) -->
  <rect x="530" y="358" width="96" height="26" rx="6" fill="#1a2233" stroke="#55c555" stroke-width="1.5"/>
  <text x="578" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">feature</text>
  <line x1="578" y1="358" x2="578" y2="356" stroke="#55c555" stroke-width="1.5"/>

  <rect x="626" y="358" width="82" height="26" rx="6" fill="#1a2233" stroke="#7777cc" stroke-width="1.5"/>
  <text x="667" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">main</text>

  <!-- Arrow showing main moved forward -->
  <path d="M 667 358 L 667 300 L 606 300 L 606 356" stroke="#7777cc" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <polygon points="600,356 606,356 612,356 606,356" fill="none"/>

  <!-- Label: 새 머지 커밋 없음 -->
  <rect x="340" y="285" width="160" height="28" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="420" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">새 머지 커밋 없음</text>
</svg>
