<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="43" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">예외 연결 (Exception Chaining) 흐름</text>

  <!-- Arrow defs -->
  <defs>
    <marker id="arr-c" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-r2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Scenario A: Implicit chaining (__context__) -->
  <text x="245" y="72" text-anchor="middle" font-size="14" font-weight="700" fill="#7ec8e3">암묵적 연결 (__context__)</text>

  <rect x="55" y="85" width="380" height="50" rx="8" fill="#0c1628" stroke="#e05555" stroke-width="1.5"/>
  <text x="245" y="108" text-anchor="middle" font-size="13" fill="#e05555">원본 예외 A 발생</text>
  <text x="245" y="125" text-anchor="middle" font-size="11" fill="#888">except 블록 진입</text>

  <line x1="245" y1="135" x2="245" y2="160" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-c)"/>

  <rect x="55" y="162" width="380" height="50" rx="8" fill="#0c1628" stroke="#7777cc" stroke-width="1.5"/>
  <text x="245" y="185" text-anchor="middle" font-size="13" fill="#7777cc">except 내에서 새 예외 B 발생</text>
  <text x="245" y="202" text-anchor="middle" font-size="11" fill="#888">raise ValueError("처리 실패")</text>

  <line x1="245" y1="212" x2="245" y2="237" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-c)"/>

  <rect x="55" y="239" width="380" height="50" rx="8" fill="#0c1628" stroke="#55c555" stroke-width="1.5"/>
  <text x="245" y="262" text-anchor="middle" font-size="13" fill="#55c555">ValueError.__context__ = A</text>
  <text x="245" y="279" text-anchor="middle" font-size="11" fill="#888">자동 설정됨</text>

  <!-- Scenario B: Explicit chaining (__cause__) -->
  <text x="635" y="72" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">명시적 연결 (__cause__)</text>

  <rect x="445" y="85" width="380" height="50" rx="8" fill="#0c1628" stroke="#e05555" stroke-width="1.5"/>
  <text x="635" y="108" text-anchor="middle" font-size="13" fill="#e05555">원본 예외 A 발생</text>
  <text x="635" y="125" text-anchor="middle" font-size="11" fill="#888">except OSError as e</text>

  <line x1="635" y1="135" x2="635" y2="160" stroke="#55c555" stroke-width="2" marker-end="url(#arr-c)"/>

  <rect x="445" y="162" width="380" height="50" rx="8" fill="#0c1628" stroke="#7777cc" stroke-width="1.5"/>
  <text x="635" y="185" text-anchor="middle" font-size="13" fill="#7777cc">raise ValueError("실패") from e</text>
  <text x="635" y="202" text-anchor="middle" font-size="11" fill="#888">명시적으로 원인 지정</text>

  <line x1="635" y1="212" x2="635" y2="237" stroke="#55c555" stroke-width="2" marker-end="url(#arr-c)"/>

  <rect x="445" y="239" width="380" height="50" rx="8" fill="#0c1c0a" stroke="#55c555" stroke-width="2"/>
  <text x="635" y="262" text-anchor="middle" font-size="13" fill="#55c555">ValueError.__cause__ = A</text>
  <text x="635" y="279" text-anchor="middle" font-size="11" fill="#888">명시적 원인 체인</text>

  <!-- VS divider -->
  <line x1="435" y1="65" x2="435" y2="300" stroke="#3a4a6e" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Traceback difference -->
  <rect x="55" y="310" width="770" height="84" rx="8" fill="#0a1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="334" text-anchor="middle" font-size="13" font-weight="700" fill="#7ec8e3">트레이스백 메시지 비교</text>
  <text x="75" y="356" font-size="12" fill="#7ec8e3">__context__ :  </text>
  <text x="185" y="356" font-size="12" fill="#888">"During handling of the above exception, another exception occurred:"</text>
  <text x="75" y="378" font-size="12" fill="#55c555">__cause__   :  </text>
  <text x="185" y="378" font-size="12" fill="#888">"The above exception was the direct cause of the following exception:"</text>
</svg>
