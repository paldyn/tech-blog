<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">텍스트 모드 vs 이진 모드</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">같은 파일, 다른 해석 — 개행 변환과 인코딩/디코딩이 핵심 차이</text>

  <!-- Headers -->
  <rect x="60" y="96" width="360" height="34" rx="8" fill="#1a2a4a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="240" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">텍스트 모드 (기본)</text>

  <rect x="460" y="96" width="360" height="34" rx="8" fill="#2a1a4a" stroke="#ce9178" stroke-width="1"/>
  <text x="640" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#ce9178" text-anchor="middle">이진 모드 ('b' 추가)</text>

  <!-- Text mode features -->
  <rect x="60" y="142" width="360" height="260" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">✓ 반환 타입: str</text>
  <text x="240" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">read() → str 객체</text>

  <line x1="80" y1="202" x2="400" y2="202" stroke="#3a4a6e" stroke-width="1"/>

  <text x="240" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">✓ 개행 문자 자동 변환</text>
  <text x="240" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Windows: \r\n → \n (읽기)</text>
  <text x="240" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Windows: \n → \r\n (쓰기)</text>

  <line x1="80" y1="272" x2="400" y2="272" stroke="#3a4a6e" stroke-width="1"/>

  <text x="240" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">✓ 인코딩/디코딩</text>
  <text x="240" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">bytes ↔ str 자동 변환</text>
  <text x="240" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">encoding 매개변수 적용</text>

  <line x1="80" y1="342" x2="400" y2="342" stroke="#3a4a6e" stroke-width="1"/>

  <text x="240" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">✓ 사용 대상</text>
  <text x="240" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">.txt .csv .json .html .py</text>

  <!-- Binary mode features -->
  <rect x="460" y="142" width="360" height="260" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">✓ 반환 타입: bytes</text>
  <text x="640" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">read() → bytes 객체</text>

  <line x1="480" y1="202" x2="800" y2="202" stroke="#3a4a6e" stroke-width="1"/>

  <text x="640" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">✓ 개행 변환 없음</text>
  <text x="640" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">raw bytes 그대로</text>
  <text x="640" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">\r\n이 \r\n으로 유지</text>

  <line x1="480" y1="272" x2="800" y2="272" stroke="#3a4a6e" stroke-width="1"/>

  <text x="640" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">✓ 인코딩 없음</text>
  <text x="640" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">encoding 매개변수 무시</text>
  <text x="640" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">bytes를 직접 써야 함</text>

  <line x1="480" y1="342" x2="800" y2="342" stroke="#3a4a6e" stroke-width="1"/>

  <text x="640" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">✓ 사용 대상</text>
  <text x="640" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">.jpg .png .pdf .mp3 .exe .zip</text>

  <!-- Bottom -->
  <rect x="60" y="418" width="760" height="28" rx="6" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="437" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">이진 파일을 텍스트 모드로 열면 개행 변환으로 데이터가 손상됨 — 반드시 'rb'/'wb' 사용</text>
</svg>
