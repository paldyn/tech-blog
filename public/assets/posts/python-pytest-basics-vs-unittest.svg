<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">같은 검증, 두 가지 방식</text>

  <text x="60" y="92" font-size="16" font-weight="600" fill="#e8e8e8">unittest</text>
  <rect x="60" y="108" width="360" height="170" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">class</text>
  <text xml:space="preserve" x="118" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">TestX(TestCase):</text>
  <text xml:space="preserve" x="92" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">def</text>
  <text xml:space="preserve" x="134" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">test_add(self):</text>
  <text xml:space="preserve" x="134" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">self.assertEqual(</text>
  <text xml:space="preserve" x="158" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">add(2, 3), 5)</text>
  <text xml:space="preserve" x="76" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 클래스 + 전용 메서드</text>

  <text x="460" y="92" font-size="16" font-weight="600" fill="#e8e8e8">pytest</text>
  <rect x="460" y="108" width="360" height="170" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="476" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">def</text>
  <text xml:space="preserve" x="518" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">test_add():</text>
  <text xml:space="preserve" x="500" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">assert</text>
  <text xml:space="preserve" x="562" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">add(2, 3) == 5</text>
  <text xml:space="preserve" x="476" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 평범한 함수 + assert</text>

  <text x="60" y="306" font-size="13" fill="#888" xml:space="preserve">pytest는 평범한 함수와 내장 assert 문만으로 테스트를 작성한다.</text>
</svg>
