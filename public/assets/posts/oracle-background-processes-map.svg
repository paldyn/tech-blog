<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560">
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Oracle 핵심 백그라운드 프로세스</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">각 프로세스의 역할과 상호작용</text>

  <!-- DBWR -->
  <rect x="60" y="95" width="185" height="80" fill="#0d2040" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="152" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">DBWR</text>
  <text x="152" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Dirty 버퍼 → 데이터 파일</text>
  <text x="152" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">체크포인트 신호 수신 시</text>
  <text x="152" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">또는 LRU 교체 시</text>

  <!-- Arrow DBWR → Datafile -->
  <line x1="152" y1="175" x2="152" y2="235" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="152,248 145,233 159,233" fill="#7ec8e3"/>
  <text x="170" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Write</text>

  <rect x="80" y="248" width="146" height="36" fill="#0e1a0e" rx="6" stroke="#55c555"/>
  <text x="153" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">데이터 파일 (*.dbf)</text>

  <!-- LGWR -->
  <rect x="270" y="95" width="185" height="80" fill="#1a1000" rx="8" stroke="#e8b84b" stroke-width="1.5"/>
  <text x="362" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8b84b">LGWR</text>
  <text x="362" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Redo Log Buffer → Redo 파일</text>
  <text x="362" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">COMMIT 시 · 3초 · 1/3 차면</text>
  <text x="362" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Write-Ahead Logging 보장</text>

  <line x1="362" y1="175" x2="362" y2="235" stroke="#e8b84b" stroke-width="1.5"/>
  <polygon points="362,248 355,233 369,233" fill="#e8b84b"/>
  <text x="380" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Write</text>

  <rect x="290" y="248" width="146" height="36" fill="#1a1000" rx="6" stroke="#e8b84b"/>
  <text x="363" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8b84b">Redo Log 파일 (*.log)</text>

  <!-- CKPT -->
  <rect x="480" y="95" width="175" height="80" fill="#0d1520" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="567" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">CKPT</text>
  <text x="567" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">체크포인트 신호 전파</text>
  <text x="567" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">SCN 갱신 → Control 파일</text>
  <text x="567" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">복구 시작점 표시</text>

  <line x1="480" y1="135" x2="260" y2="135" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,2"/>
  <polygon points="248,135 262,128 262,142" fill="#7777cc"/>
  <text x="364" y="127" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">체크포인트 신호</text>

  <!-- SMON -->
  <rect x="680" y="95" width="160" height="80" fill="#111" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="760" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">SMON</text>
  <text x="760" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">인스턴스 복구</text>
  <text x="760" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Temp 정리</text>
  <text x="760" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">공간 병합</text>

  <!-- PMON -->
  <rect x="60" y="310" width="185" height="80" fill="#111" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="152" y="335" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">PMON</text>
  <text x="152" y="353" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">비정상 종료 프로세스</text>
  <text x="152" y="371" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">자원 해제·롤백</text>
  <text x="152" y="385" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">리스너 등록</text>

  <!-- ARCn -->
  <rect x="270" y="310" width="185" height="80" fill="#111" rx="8" stroke="#888" stroke-width="1.5"/>
  <text x="362" y="335" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#888">ARCn</text>
  <text x="362" y="353" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Redo → Archive 복사</text>
  <text x="362" y="371" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ARCHIVELOG 모드 시</text>
  <text x="362" y="385" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">PITR 복구 기반</text>

  <line x1="362" y1="284" x2="362" y2="308" stroke="#888" stroke-width="1.5"/>
  <polygon points="362,310 355,296 369,296" fill="#888"/>

  <!-- MNPn / CJQ -->
  <rect x="480" y="310" width="175" height="80" fill="#111" rx="8" stroke="#555" stroke-width="1"/>
  <text x="567" y="335" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#555">MNPn / CJQ</text>
  <text x="567" y="353" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">병렬 쿼리 조정</text>
  <text x="567" y="371" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">스케줄러 잡 실행</text>
  <text x="567" y="385" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">(선택적 프로세스)</text>

  <!-- SGA Center -->
  <rect x="310" y="440" width="260" height="60" fill="#0d2040" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="465" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">SGA (Buffer Cache / Redo Log Buffer)</text>
  <text x="440" y="485" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">모든 백그라운드 프로세스의 공유 접점</text>

  <!-- Arrows to SGA -->
  <line x1="152" y1="390" x2="330" y2="455" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="3,2"/>
  <line x1="362" y1="390" x2="390" y2="440" stroke="#e8b84b" stroke-width="2" stroke-dasharray="3,2"/>
  <line x1="567" y1="390" x2="490" y2="440" stroke="#7777cc" stroke-width="2" stroke-dasharray="3,2"/>
  <line x1="760" y1="175" x2="570" y2="440" stroke="#55c555" stroke-width="2" stroke-dasharray="3,2"/>

  <!-- Process check query -->
  <rect x="60" y="520" width="760" height="30" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="96" y="539" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">SELECT</text>
  <text x="142" y="539" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> name, description </text>
  <text x="286" y="539" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">FROM</text>
  <text x="320" y="539" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> v$bgprocess </text>
  <text x="428" y="539" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">WHERE</text>
  <text x="473" y="539" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> paddr != </text>
  <text x="541" y="539" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">'00'</text>
  <text x="572" y="539" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">;</text>
</svg>
