<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">CA Expander 전략 비교</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">여러 노드 그룹이 있을 때 어느 그룹에 추가할지 결정</text>

  <!-- random -->
  <rect x="60" y="90" width="170" height="140" fill="#0f1923" rx="8" stroke="#555" stroke-width="1.5"/>
  <text x="145" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888" text-anchor="middle">random</text>
  <text x="145" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">무작위 선택</text>
  <text x="145" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">특별한 요구 없을 때</text>
  <text x="145" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">기본값 (단순)</text>

  <!-- least-waste -->
  <rect x="248" y="90" width="170" height="140" fill="#0f1923" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="333" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">least-waste</text>
  <text x="333" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">추가 후 낭비</text>
  <text x="333" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">리소스 최소 그룹</text>
  <text x="333" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">비용 최적화 권장</text>

  <!-- most-pods -->
  <rect x="436" y="90" width="170" height="140" fill="#0f1923" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="521" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">most-pods</text>
  <text x="521" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">더 많은 Pending Pod를</text>
  <text x="521" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">수용할 수 있는 그룹</text>
  <text x="521" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">노드 수 절약</text>

  <!-- priority -->
  <rect x="624" y="90" width="196" height="140" fill="#0f1923" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="722" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">priority</text>
  <text x="722" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ConfigMap으로</text>
  <text x="722" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">우선순위 직접 설정</text>
  <text x="722" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">예: on-demand 전 spot</text>
  <text x="722" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">세밀한 제어</text>

  <!-- Code block -->
  <rect x="60" y="252" width="760" height="100" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#888"># CA 배포 시 expander 지정 (helm values)</text>
  <text x="80" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">extraArgs:</text>
  <text x="80" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#ffffff">  expander: least-waste</text>
  <text x="80" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#ffffff">  scale-down-utilization-threshold: "0.5"</text>
  <text x="80" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#ffffff">  scale-down-delay-after-add: "10m"</text>
</svg>
