<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">퍼저의 세 갈래</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">타깃에 대해 얼마나 아는가에 따라 전략이 달라진다</text>

  <!-- Dumb/mutation -->
  <rect x="50" y="100" width="240" height="250" rx="10" fill="#151515" stroke="#888" stroke-width="1.5"/>
  <text x="170" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8" text-anchor="middle">무작위 변형 퍼징</text>
  <text x="170" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Dumb / Mutation-based</text>
  <line x1="74" y1="168" x2="266" y2="168" stroke="#333" stroke-width="1"/>
  <text x="170" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">기존 입력을 무작위로 변형</text>
  <text x="170" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">구조를 모름 → 파서 초입에서</text>
  <text x="170" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">대부분 걸러짐</text>
  <text x="170" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#55c555" text-anchor="middle">구축 비용 최소</text>
  <text x="170" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e05555" text-anchor="middle">깊은 경로 도달 어려움</text>
  <text x="170" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">radamsa · zzuf</text>

  <!-- Coverage-guided -->
  <rect x="320" y="100" width="240" height="250" rx="10" fill="#0a2010" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">커버리지 유도 퍼징</text>
  <text x="440" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Coverage-guided · 사실상 표준</text>
  <line x1="344" y1="168" x2="536" y2="168" stroke="#1d3a26" stroke-width="1"/>
  <text x="440" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">코드 계측으로 실행 경로 추적</text>
  <text x="440" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">새 경로를 연 입력을 시드로 승격</text>
  <text x="440" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">탐색이 자동으로 깊어짐</text>
  <text x="440" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#55c555" text-anchor="middle">발견력 대비 비용 최고</text>
  <text x="440" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e05555" text-anchor="middle">소스/계측 접근 필요</text>
  <text x="440" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">AFL++ · libFuzzer · go-fuzz · Jazzer</text>

  <!-- Generation-based -->
  <rect x="590" y="100" width="240" height="250" rx="10" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="710" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">생성 기반 퍼징</text>
  <text x="710" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Generation / Grammar-based</text>
  <line x1="614" y1="168" x2="806" y2="168" stroke="#26334d" stroke-width="1"/>
  <text x="710" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">프로토콜·문법 명세로부터</text>
  <text x="710" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">유효한 입력을 생성해 변형</text>
  <text x="710" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">파서를 통과해 깊은 로직 도달</text>
  <text x="710" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#55c555" text-anchor="middle">구조적 입력에 최강</text>
  <text x="710" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e05555" text-anchor="middle">문법 작성 비용 큼</text>
  <text x="710" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">Peach · boofuzz · RESTler</text>

  <text x="440" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">웹 API 퍼징은 OpenAPI 스펙을 문법으로 쓰는 생성 기반 접근이 효과적이다</text>
</svg>
