  <line x1="109" y1="256" x2="440" y2="288" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr2u)"/>
  <line x1="255" y1="256" x2="440" y2="288" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr2u)"/>
  <line x1="401" y1="256" x2="440" y2="288" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr2u)"/>
  <line x1="547" y1="256" x2="440" y2="288" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr2u)"/>
  <line x1="693" y1="256" x2="440" y2="288" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr2u)"/>

  <!-- Merged Part -->
  <rect x="280" y="296" width="320" height="56" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">Merged Part (20250101_20250103)</text>
  <text x="440" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">ORDER BY 기준으로 정렬 · 압축 · 인덱스 재생성</text>

  <!-- Key Concepts -->
  <rect x="44" y="372" width="246" height="86" rx="6" fill="#111"/>
  <text x="167" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">Sparse Primary Index</text>
  <text x="167" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">8192행마다 인덱스 1개 (Granule)</text>
  <text x="167" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">인덱스 메모리 상주</text>
  <text x="167" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">관련 Granule만 읽는 Pruning</text>
  <text x="167" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">B-Tree 없음 (정렬로 대체)</text>

  <rect x="317" y="372" width="246" height="86" rx="6" fill="#111"/>
  <text x="440" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">열 지향 압축</text>
  <text x="440" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">LZ4 (속도) / ZSTD (압축률)</text>
  <text x="440" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">T64 (숫자) / Delta (시계열)</text>
  <text x="440" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">DoubleDelta (단조 증가)</text>
  <text x="440" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Gorilla (부동소수점)</text>

  <rect x="590" y="372" width="246" height="86" rx="6" fill="#111"/>
  <text x="713" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">MergeTree 계열 엔진</text>
  <text x="713" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ReplacingMergeTree: 중복 제거</text>
  <text x="713" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SummingMergeTree: 집계 자동화</text>
  <text x="713" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">AggregatingMergeTree: AggState</text>
  <text x="713" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">CollapsingMergeTree: 삭제 추적</text>
</svg>
