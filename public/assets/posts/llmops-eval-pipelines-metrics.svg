<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">LLM 평가 메트릭 분류</text>

  <!-- Column headers -->
  <text x="150" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">기준 기반 (Reference-Based)</text>
  <text x="440" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">모델 기반 (Model-Based)</text>
  <text x="730" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">태스크 특화 (Task-Specific)</text>

  <!-- Reference-Based -->
  <rect x="40" y="94" width="220" height="54" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="150" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Exact Match</text>
  <text x="150" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">정답과 완전 일치 여부</text>

  <rect x="40" y="158" width="220" height="54" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="150" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">ROUGE / BLEU</text>
  <text x="150" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">n-gram 중첩 기반 유사도</text>

  <rect x="40" y="222" width="220" height="54" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="150" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">BERTScore</text>
  <text x="150" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">임베딩 코사인 유사도</text>

  <!-- Model-Based -->
  <rect x="330" y="94" width="220" height="54" rx="6" fill="#1a2a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">LLM-as-Judge</text>
  <text x="440" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">GPT-4 / Claude 채점</text>

  <rect x="330" y="158" width="220" height="54" rx="6" fill="#1a2a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">G-Eval</text>
  <text x="440" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">CoT 기반 세밀 평가</text>

  <rect x="330" y="222" width="220" height="54" rx="6" fill="#1a2a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Pairwise Ranking</text>
  <text x="440" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">A vs B 상대 비교</text>

  <!-- Task-Specific -->
  <rect x="620" y="94" width="220" height="54" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="730" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">RAGAS (RAG 전용)</text>
  <text x="730" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Faithfulness / Context</text>

  <rect x="620" y="158" width="220" height="54" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="730" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">HumanEval (코드)</text>
  <text x="730" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">코드 실행 정합성</text>

  <rect x="620" y="222" width="220" height="54" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="730" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">Toxicity Score</text>
  <text x="730" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">유해 콘텐츠 감지</text>

  <!-- Summary note -->
  <rect x="40" y="296" width="800" height="62" rx="8" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="1"/>
  <text x="440" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">실무 권장: 정량(Exact Match/ROUGE) + 정성(LLM-as-Judge) 조합</text>
  <text x="440" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">RAG 시스템이면 RAGAS 추가, 코드 생성이면 HumanEval 패스율 포함</text>
</svg>
