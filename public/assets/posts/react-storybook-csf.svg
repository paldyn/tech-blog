<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" style="background:#0a0a0a;border-radius:12px;">
  <defs>
    <marker id="arrBlue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">CSF — Component Story Format</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">Button.stories.tsx 한 파일의 구조</text>

  <!-- Code box -->
  <rect x="70" y="100" width="440" height="260" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="94" y="128" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">const</tspan> meta = {</text>
  <text x="94" y="147" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    title: <tspan fill="#ce9178">'UI/Button'</tspan>,</text>
  <text x="94" y="166" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    component: Button,</text>
  <text x="94" y="185" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">} <tspan fill="#7ec8e3" font-weight="600">satisfies</tspan> Meta&lt;typeof Button&gt;;</text>
  <text x="94" y="204" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">export default</tspan> meta;</text>
  <text x="94" y="242" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">export const</tspan> Primary: Story = {</text>
  <text x="94" y="261" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    args: {</text>
  <text x="94" y="280" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        variant: <tspan fill="#ce9178">'primary'</tspan>,</text>
  <text x="94" y="299" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        children: <tspan fill="#ce9178">'저장'</tspan>,</text>
  <text x="94" y="318" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    },</text>
  <text x="94" y="337" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">};</text>

  <!-- Annotation: meta -->
  <rect x="570" y="125" width="250" height="80" rx="8" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="2"/>
  <text x="695" y="147" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Meta — default export</text>
  <text x="695" y="167" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">사이드바 위치, 대상 컴포넌트,</text>
  <text x="695" y="185" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">파일 전체의 공통 설정</text>
  <line x1="570" y1="165" x2="510" y2="165" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrBlue)"/>

  <!-- Annotation: story -->
  <rect x="570" y="250" width="250" height="80" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="2"/>
  <text x="695" y="272" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Story — named export</text>
  <text x="695" y="292" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">args(props 조합) 하나가</text>
  <text x="695" y="310" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">스토리 하나가 된다</text>
  <line x1="570" y1="290" x2="510" y2="290" stroke="#55c555" stroke-width="2" marker-end="url(#arrGreen)"/>

  <text x="440" y="416" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">스토리는 렌더링 코드가 아니라 props의 직렬화 가능한 조합이다 — 그래서 도구가 재사용한다</text>
</svg>
