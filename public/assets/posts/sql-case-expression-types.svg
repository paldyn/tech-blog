<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">CASE 표현식 두 가지 형태</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">Simple CASE vs Searched CASE</text>

  <!-- Left: Simple CASE -->
  <rect x="60" y="90" width="360" height="260" rx="6" fill="#0e1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Simple CASE</text>
  <line x1="60" y1="122" x2="420" y2="122" stroke="#1e2433"/>
  <text x="240" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">단일 표현식을 여러 값과 비교 (=만 가능)</text>

  <!-- Simple CASE syntax -->
  <rect x="76" y="152" width="328" height="130" rx="4" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><tspan fill="#7ec8e3">CASE</tspan> grade</text>
  <text x="92" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  <tspan fill="#7ec8e3">WHEN</tspan> <tspan fill="#ce9178">'A'</tspan> <tspan fill="#7ec8e3">THEN</tspan> <tspan fill="#ce9178">'우수'</tspan></text>
  <text x="92" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  <tspan fill="#7ec8e3">WHEN</tspan> <tspan fill="#ce9178">'B'</tspan> <tspan fill="#7ec8e3">THEN</tspan> <tspan fill="#ce9178">'양호'</tspan></text>
  <text x="92" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  <tspan fill="#7ec8e3">WHEN</tspan> <tspan fill="#ce9178">'C'</tspan> <tspan fill="#7ec8e3">THEN</tspan> <tspan fill="#ce9178">'보통'</tspan></text>
  <text x="92" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  <tspan fill="#7ec8e3">ELSE</tspan> <tspan fill="#ce9178">'미흡'</tspan></text>
  <text x="92" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><tspan fill="#7ec8e3">END</tspan></text>

  <!-- Simple CASE annotations -->
  <text x="240" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">grade = 'A' → '우수' (등호 비교만 가능)</text>
  <text x="240" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">NULL 비교 불가 (= NULL은 항상 FALSE)</text>
  <text x="240" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">ELSE 생략 → 매칭 없으면 NULL 반환</text>

  <!-- Right: Searched CASE -->
  <rect x="460" y="90" width="360" height="260" rx="6" fill="#0e1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">Searched CASE</text>
  <line x1="460" y1="122" x2="820" y2="122" stroke="#1e2433"/>
  <text x="640" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">각 WHEN마다 독립 조건식 (모든 비교 가능)</text>

  <!-- Searched CASE syntax -->
  <rect x="476" y="152" width="328" height="130" rx="4" fill="#070b14" stroke="#1e2433"/>
  <text x="492" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><tspan fill="#7ec8e3">CASE</tspan></text>
  <text x="492" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  <tspan fill="#7ec8e3">WHEN</tspan> score &gt;= <tspan fill="#b5cea8">90</tspan> <tspan fill="#7ec8e3">THEN</tspan> <tspan fill="#ce9178">'A'</tspan></text>
  <text x="492" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  <tspan fill="#7ec8e3">WHEN</tspan> score &gt;= <tspan fill="#b5cea8">80</tspan> <tspan fill="#7ec8e3">THEN</tspan> <tspan fill="#ce9178">'B'</tspan></text>
  <text x="492" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  <tspan fill="#7ec8e3">WHEN</tspan> score &gt;= <tspan fill="#b5cea8">70</tspan> <tspan fill="#7ec8e3">THEN</tspan> <tspan fill="#ce9178">'C'</tspan></text>
  <text x="492" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  <tspan fill="#7ec8e3">ELSE</tspan> <tspan fill="#ce9178">'F'</tspan></text>
  <text x="492" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><tspan fill="#7ec8e3">END</tspan></text>

  <!-- Searched CASE annotations -->
  <text x="640" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">범위 비교, IS NULL, LIKE, IN 등 모두 가능</text>
  <text x="640" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">위에서부터 순서대로 평가, 첫 매칭에서 종료</text>
  <text x="640" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">가장 좁은 조건을 먼저 배치해야 함</text>

  <!-- Common note -->
  <text x="440" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#666">두 형태 모두 표현식(expression) — WHERE, SELECT, ORDER BY, GROUP BY 어디서나 사용 가능</text>
  <text x="440" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#666">CASE는 문(statement)이 아닌 값을 반환하는 표현식 → 반드시 END로 닫아야 함</text>
</svg>
