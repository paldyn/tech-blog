<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">STOPSIGNAL 설정</text>

  <!-- Left: Dockerfile -->
  <rect x="60" y="68" width="360" height="140" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Dockerfile</text>

  <rect x="76" y="102" width="328" height="92" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">FROM</tspan> nginx:alpine</text>
  <text x="92" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">STOPSIGNAL</tspan> <tspan fill="#ce9178">SIGQUIT</tspan></text>
  <text x="92" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">CMD</tspan> [<tspan fill="#ce9178">"nginx"</tspan>, <tspan fill="#ce9178">"-g"</tspan>, <tspan fill="#ce9178">"daemon off;"</tspan>]</text>
  <text x="92" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"><tspan># nginx는 SIGQUIT로 graceful drain</tspan></text>

  <!-- Right: docker run override -->
  <rect x="460" y="68" width="360" height="140" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">docker run 오버라이드</text>

  <rect x="476" y="102" width="328" height="92" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">docker</tspan> run \</text>
  <text x="492" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  --stop-signal <tspan fill="#ce9178">SIGUSR1</tspan> \</text>
  <text x="492" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  --stop-timeout <tspan fill="#b5cea8">30</tspan> \</text>
  <text x="492" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  myapp</text>

  <!-- Signal comparison table -->
  <rect x="60" y="226" width="760" height="110" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">앱별 권장 종료 시그널</text>

  <text x="100" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">앱</text>
  <text x="280" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">권장 STOPSIGNAL</text>
  <text x="520" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">이유</text>
  <line x1="76" y1="278" x2="804" y2="278" stroke="#2a2a3a" stroke-width="1"/>

  <text x="100" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">nginx</text>
  <text x="280" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">SIGQUIT</text>
  <text x="520" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">연결 drain 후 graceful 종료</text>

  <text x="100" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">Redis</text>
  <text x="280" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">SIGTERM</text>
  <text x="520" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">AOF/RDB 저장 후 종료 (기본값으로 충분)</text>
</svg>
