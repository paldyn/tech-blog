<svg xmlns="http://www.w3.org/2000/svg" width="880" height="470" viewBox="0 0 880 470">
  <rect width="880" height="470" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">Streams 파이프 패턴</text>
  <text x="440" y="70" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#888">pipeThrough · pipeTo · for-await 소비</text>

  <!-- ═══ Pipe Chain Diagram ═══ -->
  <!-- RS Box -->
  <rect x="50" y="100" width="175" height="110" rx="8" fill="#0d1117" stroke="#3a4a6e" stroke-width="1.5"/>
  <rect x="50" y="100" width="175" height="34" rx="8" fill="#1a1f35"/>
  <rect x="50" y="120" width="175" height="14" fill="#1a1f35"/>
  <text x="137" y="120" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="700" fill="#7ec8e3">ReadableStream</text>
  <text x="137" y="152" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">response.body</text>
  <text x="137" y="172" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">new ReadableStream(…)</text>
  <text x="137" y="192" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555">Uint8Array chunks</text>

  <!-- Arrow 1: RS → TS -->
  <rect x="225" y="152" width="52" height="6" fill="#7777cc"/>
  <polygon points="277,143 295,155 277,167" fill="#7777cc"/>
  <text x="251" y="138" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">pipeThrough()</text>

  <!-- TS Box (TransformStream) -->
  <rect x="295" y="90" width="210" height="130" rx="8" fill="#0d1117" stroke="#3a4a6e" stroke-width="1.5"/>
  <rect x="295" y="90" width="210" height="34" rx="8" fill="#1a2040"/>
  <rect x="295" y="110" width="210" height="14" fill="#1a2040"/>
  <text x="400" y="110" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="700" fill="#7777cc">TransformStream</text>
  <text x="400" y="142" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">transform(chunk, ctrl)</text>
  <text x="400" y="162" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">flush(ctrl)</text>
  <text x="400" y="182" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555">TextDecoder / 압축 / 암호화</text>
  <text x="400" y="198" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7ec8e3">.readable / .writable</text>

  <!-- Arrow 2: TS → WS -->
  <rect x="505" y="152" width="52" height="6" fill="#7777cc"/>
  <polygon points="557,143 575,155 557,167" fill="#7777cc"/>
  <text x="531" y="138" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">pipeTo()</text>

  <!-- WS Box -->
  <rect x="575" y="100" width="175" height="110" rx="8" fill="#0d1117" stroke="#3a4a6e" stroke-width="1.5"/>
  <rect x="575" y="100" width="175" height="34" rx="8" fill="#1a1f35"/>
  <rect x="575" y="120" width="175" height="14" fill="#1a1f35"/>
  <text x="662" y="120" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="700" fill="#e05555">WritableStream</text>
  <text x="662" y="152" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">write(chunk)</text>
  <text x="662" y="172" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">close() / abort()</text>
  <text x="662" y="192" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555">파일 / 소켓 / DOM</text>

  <!-- Label: pipeTo returns Promise -->
  <text x="790" y="155" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">→ Promise</text>
  <text x="790" y="170" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">&lt;void&gt;</text>

  <!-- Divider -->
  <line x1="50" y1="255" x2="830" y2="255" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="274" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#888">for-await-of 소비 패턴 (Async Iteration)</text>

  <!-- Code block -->
  <rect x="60" y="285" width="760" height="158" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="313" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">const</tspan> res = <tspan fill="#7ec8e3">await</tspan> fetch(url);</text>
  <text x="76" y="331" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">const</tspan> decoder = <tspan fill="#7ec8e3">new</tspan> TextDecoderStream();</text>
  <text x="76" y="349" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">const</tspan> readable = res.body.pipeThrough(decoder);</text>
  <text x="76" y="367" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff"></text>
  <text x="76" y="385" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">for await</tspan> (<tspan fill="#7ec8e3">const</tspan> chunk <tspan fill="#7ec8e3">of</tspan> readable) {</text>
  <text x="76" y="403" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">  process(chunk); <tspan fill="#9aa4b8">// string chunk</tspan></text>
  <text x="76" y="421" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">}</text>
</svg>
