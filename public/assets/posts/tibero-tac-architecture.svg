  <text x="440" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">모든 노드가 동일한 스토리지를 동시에 마운트</text>

  <!-- Arrows to storage -->
  <line x1="175" y1="300" x2="300" y2="350" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="440" y1="300" x2="440" y2="350" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="705" y1="300" x2="580" y2="350" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr2)"/>
</svg>
