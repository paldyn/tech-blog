  <!-- GCS label -->
  <text x="440" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">&#x2190;&#x2014;&#x2014; Cache Fusion (블록 직접 전송) &#x2014;&#x2014;&#x2192;</text>

  <!-- Shared storage -->
  <rect x="200" y="350" width="480" height="94" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">공유 스토리지 (Shared Disk)</text>
  <text x="300" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
