  <rect x="182" y="228" width="90" height="28" rx="4" fill="#111133"/>
  <text x="227" y="247" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">Redo Buffer</text>
  <text x="175" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">GCS / GES 참여</text>

  <!-- TAC Node 2 -->
  <rect x="325" y="170" width="230" height="130" rx="8" fill="#0d1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">TAC Node 2</text>
  <text x="440" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Tibero 인스턴스</text>
  <rect x="345" y="228" width="90" height="28" rx="4" fill="#111133"/>
  <text x="390" y="247" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">Buffer Cache</text>
  <rect x="447" y="228" width="90" height="28" rx="4" fill="#111133"/>
  <text x="492" y="247" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">Redo Buffer</text>
  <text x="440" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">GCS / GES 참여</text>

  <!-- TAC Node 3 -->
  <rect x="590" y="170" width="230" height="130" rx="8" fill="#0d1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="705" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">TAC Node 3</text>
  <text x="705" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Tibero 인스턴스</text>
  <rect x="610" y="228" width="90" height="28" rx="4" fill="#111133"/>
  <text x="655" y="247" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">Buffer Cache</text>
  <rect x="712" y="228" width="90" height="28" rx="4" fill="#111133"/>
  <text x="757" y="247" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">Redo Buffer</text>
  <text x="705" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">GCS / GES 참여</text>

  <!-- Interconnect -->
  <line x1="290" y1="235" x2="325" y2="235" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="555" y1="235" x2="590" y2="235" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="308" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
