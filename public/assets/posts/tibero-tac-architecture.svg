  <!-- Arrows to nodes -->
  <line x1="160" y1="112" x2="200" y2="166" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="440" y1="112" x2="440" y2="166" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="720" y1="112" x2="680" y2="166" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- TAC Node 1 -->
  <rect x="60" y="170" width="230" height="130" rx="8" fill="#0d1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="175" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">TAC Node 1</text>
  <text x="175" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
