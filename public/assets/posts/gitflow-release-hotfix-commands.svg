<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">release와 hotfix 주요 명령어</text>

  <!-- release column -->
  <text x="230" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8c84a">release 절차</text>
  <rect x="60" y="88" width="340" height="262" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 1. release 브랜치 시작</text>
  <text xml:space="preserve" x="80" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">git flow release start 1.1.0</text>
  <text xml:space="preserve" x="80" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 2. 버전 번호 업데이트</text>
  <text xml:space="preserve" x="80" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">npm version minor</text>
  <text xml:space="preserve" x="80" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">git add package.json</text>
  <text xml:space="preserve" x="80" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">git commit -m "chore: 1.1.0"</text>
  <text xml:space="preserve" x="80" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 3. QA 후 완료</text>
  <text xml:space="preserve" x="80" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">git flow release finish 1.1.0</text>
  <text xml:space="preserve" x="80" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># main + develop 머지, 태그 생성</text>
  <text xml:space="preserve" x="80" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 브랜치 자동 삭제</text>
  <text xml:space="preserve" x="80" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"> </text>

  <!-- hotfix column -->
  <text x="650" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">hotfix 절차</text>
  <rect x="480" y="88" width="340" height="262" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="500" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 1. hotfix 브랜치 시작 (main 기반)</text>
  <text xml:space="preserve" x="500" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">git flow hotfix start 1.1.1</text>
  <text xml:space="preserve" x="500" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 2. 긴급 버그 수정</text>
  <text xml:space="preserve" x="500" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">git commit -m "fix: NPE 수정"</text>
  <text xml:space="preserve" x="500" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">npm version patch</text>
  <text xml:space="preserve" x="500" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 3. 완료 (main + develop 머지)</text>
  <text xml:space="preserve" x="500" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">git flow hotfix finish 1.1.1</text>
  <text xml:space="preserve" x="500" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 4. 태그 포함해서 push</text>
  <text xml:space="preserve" x="500" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">git push origin main develop</text>
  <text xml:space="preserve" x="500" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">git push origin --tags</text>
  <text xml:space="preserve" x="500" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"> </text>
</svg>
