<svg xmlns="http://www.w3.org/2000/svg" width="880" height="450" viewBox="0 0 880 450">
  <defs>
    <marker id="arr-gray" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888"/>
    </marker>
    <marker id="arr-green-s" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-green-e" viewBox="0 0 14 14" refX="2" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 14 0 L 1 7 L 14 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="450" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Instant — UTC 타임라인 위의 한 점</text>

  <!-- Timeline -->
  <line x1="80" y1="120" x2="796" y2="120" stroke="#888" stroke-width="2" marker-end="url(#arr-gray)"/>
  <text x="800" y="98" text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">UTC 타임라인</text>

  <!-- Epoch point -->
  <circle cx="150" cy="120" r="7" fill="#7777cc"/>
  <text x="150" y="98" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">에포크 (기준점)</text>
  <text x="150" y="148" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">1970-01-01T00:00:00Z</text>

  <!-- Instant point -->
  <circle cx="620" cy="120" r="8" fill="#55c555"/>
  <text x="620" y="98" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">Instant</text>
  <text x="620" y="148" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">2026-06-12T05:30:00Z</text>

  <!-- Dimension line -->
  <line x1="157" y1="190" x2="613" y2="190" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4"
        marker-start="url(#arr-green-e)" marker-end="url(#arr-green-s)"/>
  <text x="385" y="172" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">에포크부터 흐른 시간으로만 저장</text>
  <text x="385" y="216" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8">epochSecond = 1,781,242,200  +  nano</text>

  <!-- Code box -->
  <rect x="60" y="252" width="760" height="160" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">Instant now = Instant.now();          <tspan fill="#9aa4b8">// 항상 UTC</tspan></text>
  <text x="76" y="297" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">Instant t = Instant.ofEpochSecond(<tspan fill="#b5cea8">1_781_242_200L</tspan>);</text>
  <text x="76" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">long</tspan> ms = t.toEpochMilli();         <tspan fill="#9aa4b8">// 밀리초 변환</tspan></text>
  <text x="76" y="345" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 타임존이 없으므로 — 표시하려면 zone 적용</text>
  <text x="76" y="364" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">ZonedDateTime seoul =</text>
  <text x="76" y="383" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    t.atZone(ZoneId.of(<tspan fill="#ce9178">"Asia/Seoul"</tspan>));</text>
</svg>
