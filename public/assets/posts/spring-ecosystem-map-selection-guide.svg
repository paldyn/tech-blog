  <text x="700" y="310" text-anchor="middle" font-size="13" font-weight="600" fill="#ddcc44">배치 / 비동기</text>
  <text x="600" y="334" font-size="12" fill="#55c555">✓</text>
  <text x="618" y="334" font-size="12" fill="#bbbbbb">Spring Batch</text>
  <text x="600" y="356" font-size="12" fill="#55c555">✓</text>
  <text x="618" y="356" font-size="12" fill="#bbbbbb">Spring Kafka · AMQP</text>
  <text x="600" y="378" font-size="12" fill="#55c555">✓</text>
  <text x="618" y="378" font-size="12" fill="#bbbbbb">@Async · @Scheduled</text>

  <line x1="180" y1="394" x2="180" y2="416" stroke="#7777cc" stroke-width="1.5" marker-end="url(#g)"/>
  <line x1="440" y1="394" x2="440" y2="416" stroke="#7777cc" stroke-width="1.5" marker-end="url(#g)"/>
  <line x1="700" y1="394" x2="700" y2="416" stroke="#7777cc" stroke-width="1.5" marker-end="url(#g)"/>

  <!-- detail row -->
  <rect x="60" y="418" width="240" height="84" fill="#0a0f1a" stroke="#1a2a3a" stroke-width="1" rx="6"/>
  <text x="180" y="440" text-anchor="middle" font-size="12" font-weight="600" fill="#88aacc">데이터 액세스 선택</text>
  <text x="80" y="464" font-size="11" fill="#888">관계형 DB → Spring Data JPA</text>
  <text x="80" y="484" font-size="11" fill="#888">NoSQL → Spring Data MongoDB</text>

  <rect x="320" y="418" width="240" height="84" fill="#0a1a1a" stroke="#1a3a3a" stroke-width="1" rx="6"/>
  <text x="440" y="440" text-anchor="middle" font-size="12" font-weight="600" fill="#88cccc">MSA 규모별 선택</text>
  <text x="340" y="464" font-size="11" fill="#888">서비스 5개 미만 → Spring Boot만</text>
