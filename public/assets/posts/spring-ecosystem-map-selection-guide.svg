<svg xmlns="http://www.w3.org/2000/svg" width="880" height="600" viewBox="0 0 880 600" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;">
  <rect width="880" height="600" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">프로젝트 선택 가이드 — 어떤 스프링을 써야 하는가</text>
  <text x="440" y="70" text-anchor="middle" font-size="13" fill="#888">상황별 결정 트리 · 2026 권장 버전 기준</text>

  <defs>
    <marker id="g" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- start node -->
  <rect x="320" y="92" width="240" height="60" fill="#0d1a0d" stroke="#2a4a2a" stroke-width="2" rx="8"/>
  <text x="440" y="118" text-anchor="middle" font-size="14" font-weight="600" fill="#88dd88">새 자바 프로젝트</text>
  <text x="440" y="138" text-anchor="middle" font-size="11" fill="#666">무엇을 만들 것인가?</text>

  <line x1="440" y1="152" x2="440" y2="178" stroke="#7777cc" stroke-width="1.5" marker-end="url(#g)"/>

  <!-- Always Boot -->
  <rect x="280" y="180" width="320" height="56" fill="#1a1a08" stroke="#3a3a1a" stroke-width="1.5" rx="6"/>
  <text x="440" y="204" text-anchor="middle" font-size="13" font-weight="600" fill="#dddd55">항상: Spring Boot 사용 (3.x · Jakarta EE)</text>
  <text x="440" y="224" text-anchor="middle" font-size="11" fill="#777">Framework 직접 사용은 레거시 통합에서만</text>

  <!-- splitter -->
  <line x1="440" y1="236" x2="440" y2="262" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="180" y1="262" x2="700" y2="262" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="180" y1="262" x2="180" y2="284" stroke="#7777cc" stroke-width="1.5" marker-end="url(#g)"/>
  <line x1="440" y1="262" x2="440" y2="284" stroke="#7777cc" stroke-width="1.5" marker-end="url(#g)"/>
  <line x1="700" y1="262" x2="700" y2="284" stroke="#7777cc" stroke-width="1.5" marker-end="url(#g)"/>

  <!-- Three branches -->
  <rect x="60" y="286" width="240" height="108" fill="#0f1408" stroke="#3a4a1a" stroke-width="1.5" rx="8"/>
  <text x="180" y="310" text-anchor="middle" font-size="13" font-weight="600" fill="#aadd55">웹 / REST API</text>
  <text x="80" y="334" font-size="12" fill="#55c555">✓</text>
  <text x="98" y="334" font-size="12" fill="#bbbbbb">spring-boot-starter-web</text>
  <text x="80" y="356" font-size="12" fill="#55c555">✓</text>
  <text x="98" y="356" font-size="12" fill="#bbbbbb">spring-boot-starter-data-jpa</text>
  <text x="80" y="378" font-size="12" fill="#55c555">✓</text>
  <text x="98" y="378" font-size="12" fill="#bbbbbb">spring-boot-starter-security</text>

  <rect x="320" y="286" width="240" height="108" fill="#08111c" stroke="#1e3a5a" stroke-width="1.5" rx="8"/>
  <text x="440" y="310" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">마이크로서비스</text>
  <text x="340" y="334" font-size="12" fill="#55c555">✓</text>
  <text x="358" y="334" font-size="12" fill="#bbbbbb">Spring Cloud</text>
  <text x="340" y="356" font-size="12" fill="#55c555">✓</text>
  <text x="358" y="356" font-size="12" fill="#bbbbbb">Eureka · Gateway</text>
  <text x="340" y="378" font-size="12" fill="#55c555">✓</text>
  <text x="358" y="378" font-size="12" fill="#bbbbbb">Resilience4j</text>

