<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;">
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">프로젝트 선택 가이드 — 어떤 스프링을 써야 하는가</text>

  <defs>
    <marker id="g" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Decision flow: start -->
  <rect x="320" y="80" width="240" height="52" fill="#0d1a0d" stroke="#2a4a2a" stroke-width="2" rx="8"/>
  <text x="440" y="104" text-anchor="middle" font-size="14" fill="#88dd88">새 자바 프로젝트</text>
  <text x="440" y="122" text-anchor="middle" font-size="11" fill="#666">무엇을 만들 것인가?</text>

  <line x1="440" y1="132" x2="440" y2="156" stroke="#555" stroke-width="1.5" marker-end="url(#g)"/>

  <!-- Always Boot -->
  <rect x="280" y="158" width="320" height="46" fill="#1a1a0a" stroke="#3a3a1a" stroke-width="1.5" rx="6"/>
  <text x="440" y="178" text-anchor="middle" font-size="13" fill="#dddd55">항상: Spring Boot 사용 (3.x, Jakarta EE)</text>
  <text x="440" y="196" text-anchor="middle" font-size="11" fill="#666">Framework 직접 사용은 레거시 통합 시에만</text>

  <!-- Split lines -->
  <line x1="440" y1="204" x2="440" y2="226" stroke="#555" stroke-width="1.5"/>
  <line x1="180" y1="226" x2="700" y2="226" stroke="#555" stroke-width="1.5"/>
  <line x1="180" y1="226" x2="180" y2="248" stroke="#555" stroke-width="1.5" marker-end="url(#g)"/>
  <line x1="440" y1="226" x2="440" y2="248" stroke="#555" stroke-width="1.5" marker-end="url(#g)"/>
  <line x1="700" y1="226" x2="700" y2="248" stroke="#555" stroke-width="1.5" marker-end="url(#g)"/>

  <!-- REST API -->
  <rect x="60" y="250" width="240" height="100" fill="#0f0f0f" stroke="#2a3a1a" stroke-width="1.5" rx="8"/>
  <text x="180" y="274" text-anchor="middle" font-size="13" font-weight="600" fill="#aadd55">웹/REST API</text>
  <text x="80" y="298" font-size="12" fill="#bbbbbb">v spring-boot-starter-web</text>
  <text x="80" y="318" font-size="12" fill="#bbbbbb">v spring-boot-starter-data-jpa</text>
  <text x="80" y="338" font-size="12" fill="#bbbbbb">v spring-boot-starter-security</text>

  <!-- Microservices -->
  <rect x="320" y="250" width="240" height="100" fill="#0f0f0f" stroke="#1a2a3a" stroke-width="1.5" rx="8"/>
  <text x="440" y="274" text-anchor="middle" font-size="13" font-weight="600" fill="#55aadd">마이크로서비스</text>
  <text x="340" y="298" font-size="12" fill="#bbbbbb">v Spring Cloud</text>
  <text x="340" y="318" font-size="12" fill="#bbbbbb">v Eureka / Gateway</text>
  <text x="340" y="338" font-size="12" fill="#bbbbbb">v Resilience4j</text>

  <!-- Batch -->
  <rect x="580" y="250" width="240" height="100" fill="#0f0f0f" stroke="#2a2a1a" stroke-width="1.5" rx="8"/>
  <text x="700" y="274" text-anchor="middle" font-size="13" font-weight="600" fill="#ddcc44">배치/비동기</text>
  <text x="600" y="298" font-size="12" fill="#bbbbbb">v Spring Batch</text>
  <text x="600" y="318" font-size="12" fill="#bbbbbb">v Spring Kafka / AMQP</text>
  <text x="600" y="338" font-size="12" fill="#bbbbbb">v @Async / @Scheduled</text>

  <!-- Down arrows -->
  <line x1="180" y1="350" x2="180" y2="372" stroke="#555" stroke-width="1.5" marker-end="url(#g)"/>
  <line x1="440" y1="350" x2="440" y2="372" stroke="#555" stroke-width="1.5" marker-end="url(#g)"/>
  <line x1="700" y1="350" x2="700" y2="372" stroke="#555" stroke-width="1.5" marker-end="url(#g)"/>

  <!-- Data access -->
  <rect x="60" y="374" width="240" height="76" fill="#0a0f1a" stroke="#1a2a3a" stroke-width="1" rx="6"/>
  <text x="180" y="394" text-anchor="middle" font-size="12" fill="#88aacc">데이터 액세스 선택</text>
  <text x="80" y="416" font-size="11" fill="#888">관계형 DB → Spring Data JPA</text>
  <text x="80" y="436" font-size="11" fill="#888">NoSQL → Spring Data MongoDB</text>

  <!-- Cloud detail -->
  <rect x="320" y="374" width="240" height="76" fill="#0a1a1a" stroke="#1a2a2a" stroke-width="1" rx="6"/>
  <text x="440" y="394" text-anchor="middle" font-size="12" fill="#88cccc">MSA 기반 선택</text>
  <text x="340" y="416" font-size="11" fill="#888">서비스 5개 미만: Spring Boot만</text>
  <text x="340" y="436" font-size="11" fill="#888">서비스 5개 이상: Spring Cloud</text>

  <!-- Reactive decision -->
  <rect x="580" y="374" width="240" height="76" fill="#1a0a0f" stroke="#2a1a1a" stroke-width="1" rx="6"/>
  <text x="700" y="394" text-anchor="middle" font-size="12" fill="#cc8888">동기 vs 비동기</text>
  <text x="600" y="416" font-size="11" fill="#888">일반 요청/응답 → Spring MVC</text>
  <text x="600" y="436" font-size="11" fill="#888">고성능 스트리밍 → WebFlux</text>

  <!-- version note -->
  <rect x="60" y="470" width="760" height="60" fill="#0f0f0f" stroke="#222" stroke-width="1" rx="8"/>
  <text x="440" y="490" text-anchor="middle" font-size="12" font-weight="600" fill="#bbbbbb">현재 권장 버전 (2026)</text>
  <text x="200" y="514" text-anchor="middle" font-size="12" fill="#888">Spring Boot 3.x</text>
  <text x="380" y="514" text-anchor="middle" font-size="12" fill="#888">Spring Framework 6.x</text>
  <text x="560" y="514" text-anchor="middle" font-size="12" fill="#888">Jakarta EE 10+</text>
  <text x="720" y="514" text-anchor="middle" font-size="12" fill="#888">JDK 21 LTS</text>

  <!-- Footer -->
  <text x="440" y="548" text-anchor="middle" font-size="10" fill="#444">PALDYN · Spring 완전 정복 시리즈 · Chapter 1</text>
</svg>
