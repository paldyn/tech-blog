  <rect x="580" y="418" width="240" height="84" fill="#1a0a0f" stroke="#3a1a1a" stroke-width="1" rx="6"/>
  <text x="700" y="440" text-anchor="middle" font-size="12" font-weight="600" fill="#cc8888">동기 vs 리액티브</text>
  <text x="600" y="464" font-size="11" fill="#888">일반 요청/응답 → Spring MVC</text>
  <text x="600" y="484" font-size="11" fill="#888">고성능 스트리밍 → WebFlux</text>

  <!-- version note -->
  <rect x="60" y="518" width="760" height="54" fill="#0f0f0f" stroke="#222" stroke-width="1" rx="8"/>
  <text x="84" y="540" font-size="12" font-weight="600" fill="#bbbbbb">2026 권장 버전</text>
  <text x="220" y="556" text-anchor="middle" font-size="12" fill="#888">Spring Boot 3.x</text>
  <text x="400" y="556" text-anchor="middle" font-size="12" fill="#888">Spring Framework 6.x</text>
  <text x="580" y="556" text-anchor="middle" font-size="12" fill="#888">Jakarta EE 10+</text>
  <text x="740" y="556" text-anchor="middle" font-size="12" fill="#888">JDK 21 LTS</text>

  <text x="440" y="588" text-anchor="middle" font-size="11" fill="#444">PALDYN · Spring 완전 정복 시리즈 · Chapter 1</text>
