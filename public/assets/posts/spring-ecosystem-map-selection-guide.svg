<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="20" font-weight="700" fill="#e8e8e8">프로젝트 선택 가이드 — 어떤 스프링을 써야 하는가</text>

  <!-- Decision flow: start -->
  <rect x="340" y="68" width="200" height="44" fill="#0d1a0d" stroke="#2a4a2a" stroke-width="2" rx="8"/>
  <text x="440" y="90" text-anchor="middle" font-size="13" fill="#88dd88">새 자바 프로젝트</text>
  <text x="440" y="106" text-anchor="middle" font-size="11" fill="#555">무엇을 만들 것인가?</text>

  <!-- Arrow down -->
  <line x1="440" y1="112" x2="440" y2="134" stroke="#444" stroke-width="1.5" marker-end="url(#g)"/>
  <defs>
    <marker id="g" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#444"/>
    </marker>
  </defs>

  <!-- Always Boot -->
  <rect x="300" y="134" width="280" height="36" fill="#1a1a0a" stroke="#3a3a1a" stroke-width="1.5" rx="6"/>
  <text x="440" y="149" text-anchor="middle" font-size="12" fill="#dddd55">항상: Spring Boot 사용 (3.x, Jakarta EE)</text>
  <text x="440" y="163" text-anchor="middle" font-size="10" fill="#555">Spring Framework 직접 사용은 레거시 통합 시에만</text>

  <!-- Arrow down split -->
  <line x1="440" y1="170" x2="440" y2="192" stroke="#444" stroke-width="1.5"/>
  <line x1="440" y1="192" x2="200" y2="192" stroke="#444" stroke-width="1.5"/>
  <line x1="440" y1="192" x2="680" y2="192" stroke="#444" stroke-width="1.5"/>
  <line x1="200" y1="192" x2="200" y2="212" stroke="#444" stroke-width="1.5" marker-end="url(#g)"/>
  <line x1="440" y1="192" x2="440" y2="212" stroke="#444" stroke-width="1.5" marker-end="url(#g)"/>
  <line x1="680" y1="192" x2="680" y2="212" stroke="#444" stroke-width="1.5" marker-end="url(#g)"/>

  <!-- REST API web app -->
  <rect x="80" y="212" width="240" height="88" fill="#0f0f0f" stroke="#2a3a1a" stroke-width="1.5" rx="8"/>
  <text x="200" y="232" text-anchor="middle" font-size="12" font-weight="600" fill="#aadd55">웹/REST API</text>
  <text x="96" y="252" font-size="11" fill="#888">✓ spring-boot-starter-web</text>
  <text x="96" y="269" font-size="11" fill="#888">✓ spring-boot-starter-data-jpa</text>
  <text x="96" y="286" font-size="11" fill="#888">✓ spring-boot-starter-security</text>

  <!-- Microservices -->
  <rect x="340" y="212" width="200" height="88" fill="#0f0f0f" stroke="#1a2a3a" stroke-width="1.5" rx="8"/>
  <text x="440" y="232" text-anchor="middle" font-size="12" font-weight="600" fill="#55aadd">마이크로서비스</text>
  <text x="356" y="252" font-size="11" fill="#888">✓ Spring Cloud</text>
  <text x="356" y="269" font-size="11" fill="#888">✓ Eureka / Gateway</text>
  <text x="356" y="286" font-size="11" fill="#888">✓ Resilience4j</text>

  <!-- Batch -->
  <rect x="560" y="212" width="240" height="88" fill="#0f0f0f" stroke="#2a2a1a" stroke-width="1.5" rx="8"/>
  <text x="680" y="232" text-anchor="middle" font-size="12" font-weight="600" fill="#ddcc44">배치/비동기 처리</text>
  <text x="576" y="252" font-size="11" fill="#888">✓ Spring Batch</text>
  <text x="576" y="269" font-size="11" fill="#888">✓ Spring Kafka / AMQP</text>
  <text x="576" y="286" font-size="11" fill="#888">✓ @Async / @Scheduled</text>

  <!-- Second row questions -->
  <line x1="200" y1="300" x2="200" y2="322" stroke="#444" stroke-width="1.5" marker-end="url(#g)"/>
  <line x1="440" y1="300" x2="440" y2="322" stroke="#444" stroke-width="1.5" marker-end="url(#g)"/>
  <line x1="680" y1="300" x2="680" y2="322" stroke="#444" stroke-width="1.5" marker-end="url(#g)"/>

  <!-- Data access choice -->
  <rect x="80" y="322" width="240" height="64" fill="#0a0f1a" stroke="#1a2a3a" stroke-width="1" rx="6"/>
  <text x="200" y="340" text-anchor="middle" font-size="11" fill="#88aacc">데이터 액세스 선택</text>
  <text x="96" y="358" font-size="10" fill="#666">관계형 DB → JPA / Spring Data JPA</text>
  <text x="96" y="374" font-size="10" fill="#666">NoSQL → Spring Data MongoDB/Redis</text>

  <!-- Cloud detail -->
  <rect x="340" y="322" width="200" height="64" fill="#0a1a1a" stroke="#1a2a2a" stroke-width="1" rx="6"/>
  <text x="440" y="340" text-anchor="middle" font-size="11" fill="#88cccc">MSA 기반 선택</text>
  <text x="356" y="358" font-size="10" fill="#666">서비스 수 &lt; 5: Spring Boot만</text>
  <text x="356" y="374" font-size="10" fill="#666">서비스 수 ≥ 5: Spring Cloud 도입</text>

  <!-- Reactive decision -->
  <rect x="560" y="322" width="240" height="64" fill="#1a0a0f" stroke="#2a1a1a" stroke-width="1" rx="6"/>
  <text x="680" y="340" text-anchor="middle" font-size="11" fill="#cc8888">동기 vs 비동기 선택</text>
  <text x="576" y="358" font-size="10" fill="#666">일반 요청/응답 → Spring MVC</text>
  <text x="576" y="374" font-size="10" fill="#666">고성능 스트리밍 → WebFlux (R2DBC)</text>

  <!-- version note -->
  <rect x="60" y="406" width="760" height="54" fill="#0f0f0f" stroke="#222" stroke-width="1" rx="8"/>
  <text x="440" y="425" text-anchor="middle" font-size="11" font-weight="600" fill="#aaa">현재 권장 버전 (2026)</text>
  <text x="200" y="446" text-anchor="middle" font-size="11" fill="#666">Spring Boot 3.x</text>
  <text x="380" y="446" text-anchor="middle" font-size="11" fill="#666">Spring Framework 6.x</text>
  <text x="560" y="446" text-anchor="middle" font-size="11" fill="#666">Jakarta EE 10+</text>
  <text x="730" y="446" text-anchor="middle" font-size="11" fill="#666">JDK 21 LTS</text>

  <!-- Footer -->
  <text x="440" y="486" text-anchor="middle" font-size="10" fill="#333">PALDYN · Spring 완전 정복 시리즈 · Chapter 1</text>
</svg>
