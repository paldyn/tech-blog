<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <!-- Background -->
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Executors 팩토리 메서드 비교</text>

  <!-- Headers -->
  <rect x="60" y="58" width="200" height="32" rx="4" fill="#1a1a2a" stroke="#4a4a6e" stroke-width="1"/>
  <text x="160" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">메서드</text>
  <rect x="268" y="58" width="110" height="32" rx="4" fill="#1a1a2a" stroke="#4a4a6e" stroke-width="1"/>
  <text x="323" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">스레드 수</text>
  <rect x="386" y="58" width="160" height="32" rx="4" fill="#1a1a2a" stroke="#4a4a6e" stroke-width="1"/>
  <text x="466" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">큐</text>
  <rect x="554" y="58" width="266" height="32" rx="4" fill="#1a1a2a" stroke="#4a4a6e" stroke-width="1"/>
  <text x="687" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">용도 / 주의</text>

  <!-- Row 1: newFixedThreadPool -->
  <rect x="60" y="98" width="760" height="56" rx="4" fill="#0f1a0f" stroke="#2a4a2a" stroke-width="0.5"/>
  <text x="70" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" xml:space="preserve">newFixedThreadPool(n)</text>
  <text x="70" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">고정 크기 풀</text>
  <text x="276" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">n (고정)</text>
  <text x="394" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e09055">LinkedBlocking</text>
  <text x="394" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e09055">Queue (무제한)</text>
  <text x="562" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">동시성 한도 필요 시 적합</text>
  <text x="562" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">⚠ 무제한 큐 → OOM 위험</text>

  <!-- Row 2: newCachedThreadPool -->
  <rect x="60" y="162" width="760" height="56" rx="4" fill="#1a1a0a" stroke="#4a4a1a" stroke-width="0.5"/>
  <text x="70" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e09055" xml:space="preserve">newCachedThreadPool()</text>
  <text x="70" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">캐시 풀</text>
  <text x="276" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">0~∞</text>
  <text x="276" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">(60초 후 회수)</text>
  <text x="394" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">SynchronousQueue</text>
  <text x="562" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">단발성·짧은 비동기 작업</text>
  <text x="562" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">⚠ 폭주 시 스레드 무제한 생성</text>

  <!-- Row 3: newSingleThreadExecutor -->
  <rect x="60" y="226" width="760" height="56" rx="4" fill="#0f1a0f" stroke="#2a4a2a" stroke-width="0.5"/>
  <text x="70" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" xml:space="preserve">newSingleThread</text>
  <text x="70" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" xml:space="preserve">Executor()</text>
  <text x="276" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">1 (순서</text>
  <text x="276" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">보장)</text>
  <text x="394" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e09055">LinkedBlocking (무제한)</text>
  <text x="562" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">순서 중요한 작업, 직렬 처리</text>
  <text x="562" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">장애 시 자동 교체 스레드 생성</text>

  <!-- Row 4: newScheduledThreadPool -->
  <rect x="60" y="290" width="760" height="56" rx="4" fill="#1a1a0a" stroke="#4a4a1a" stroke-width="0.5"/>
  <text x="70" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e09055" xml:space="preserve">newScheduledThread</text>
  <text x="70" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e09055" xml:space="preserve">Pool(n)</text>
  <text x="276" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">n core</text>
  <text x="276" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">+ max</text>
  <text x="394" y="321" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">DelayedWork</text>
  <text x="562" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">지연·주기 실행</text>
  <text x="562" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">주기 작업 예외 시 이후 실행 중단됨</text>

  <!-- Row 5: newVirtualThreadPerTaskExecutor -->
  <rect x="60" y="354" width="760" height="56" rx="4" fill="#0a1a0a" stroke="#1a5a1a" stroke-width="1"/>
  <text x="70" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" xml:space="preserve">newVirtualThread</text>
  <text x="70" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" xml:space="preserve">PerTaskExecutor()  Java21</text>
  <text x="276" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">작업당</text>
  <text x="276" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">1 (경량)</text>
  <text x="394" y="385" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">없음</text>
  <text x="562" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">I/O 집약 작업에 최적 (Java 21+)</text>
  <text x="562" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">CPU 집약에는 부적합</text>

  <!-- Note -->
  <text x="440" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">실운영에서는 ThreadPoolExecutor 직접 생성으로 파라미터 명시 권장</text>
</svg>
