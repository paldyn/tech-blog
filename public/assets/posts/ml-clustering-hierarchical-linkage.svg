<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" style="background:#0a0a0a;border-radius:12px">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Header -->
  <rect x="0" y="0" width="880" height="68" rx="12" fill="#0d1a2a"/>
  <rect x="0" y="56" width="880" height="12" fill="#0d1a2a"/>
  <text x="60" y="36" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#ffffff">연결 기준(Linkage Criterion) 비교</text>
  <text x="60" y="58" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">Single · Complete · Ward — 군집 간 거리를 어떻게 정의하는가</text>
  <line x1="60" y1="78" x2="820" y2="78" stroke="#1e2433" stroke-width="1"/>

  <!-- ===== Single Linkage ===== -->
  <rect x="60" y="90" width="238" height="195" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Single Linkage</text>
  <text x="80" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">가장 가까운 두 점의 거리</text>

  <!-- Cluster A points (left group) -->
  <circle cx="110" cy="185" r="6" fill="#7ec8e3" opacity="0.9"/>
  <circle cx="125" cy="165" r="6" fill="#7ec8e3" opacity="0.9"/>
  <circle cx="100" cy="205" r="6" fill="#7ec8e3" opacity="0.9"/>
  <circle cx="130" cy="195" r="6" fill="#7ec8e3" opacity="0.9"/>
  <!-- Cluster B points (right group) -->
  <circle cx="215" cy="175" r="6" fill="#ce9178" opacity="0.9"/>
  <circle cx="235" cy="190" r="6" fill="#ce9178" opacity="0.9"/>
  <circle cx="225" cy="205" r="6" fill="#ce9178" opacity="0.9"/>
  <circle cx="250" cy="180" r="6" fill="#ce9178" opacity="0.9"/>

  <!-- Single linkage: min distance line -->
  <line x1="130" y1="195" x2="215" y2="175" stroke="#55c555" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="155" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">min dist</text>
  <!-- Labels A B -->
  <text x="100" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">A</text>
  <text x="225" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">B</text>

  <!-- Warning: chaining effect -->
  <text x="80" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">⚠ 연쇄 효과(chaining) 주의</text>
  <text x="80" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">긴 사슬 형태 군집 생성 가능</text>

  <!-- ===== Complete Linkage ===== -->
  <rect x="322" y="90" width="238" height="195" rx="8" fill="#0d1520" stroke="#e05555" stroke-width="1.5"/>
  <text x="342" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">Complete Linkage</text>
  <text x="342" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">가장 먼 두 점의 거리</text>

  <!-- Cluster A points -->
  <circle cx="372" cy="185" r="6" fill="#7ec8e3" opacity="0.9"/>
  <circle cx="387" cy="165" r="6" fill="#7ec8e3" opacity="0.9"/>
  <circle cx="362" cy="205" r="6" fill="#7ec8e3" opacity="0.9"/>
  <circle cx="392" cy="198" r="6" fill="#7ec8e3" opacity="0.9"/>
  <!-- Cluster B points -->
  <circle cx="477" cy="175" r="6" fill="#ce9178" opacity="0.9"/>
  <circle cx="497" cy="190" r="6" fill="#ce9178" opacity="0.9"/>
  <circle cx="487" cy="210" r="6" fill="#ce9178" opacity="0.9"/>
  <circle cx="512" cy="178" r="6" fill="#ce9178" opacity="0.9"/>

  <!-- Complete linkage: max distance line -->
  <line x1="387" y1="165" x2="512" y2="178" stroke="#e05555" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="415" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">max dist</text>
  <text x="372" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">A</text>
  <text x="487" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">B</text>

  <text x="342" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">✓ 컴팩트한 구형 군집 선호</text>
  <text x="342" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">이상치에 민감할 수 있음</text>

  <!-- ===== Ward Linkage ===== -->
  <rect x="584" y="90" width="238" height="195" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="2"/>
  <text x="604" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">Ward Linkage ★ 권장</text>
  <text x="604" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">병합 후 분산 증가량 최소화</text>

  <!-- Cluster A points with centroid -->
  <circle cx="634" cy="185" r="6" fill="#7ec8e3" opacity="0.9"/>
  <circle cx="649" cy="165" r="6" fill="#7ec8e3" opacity="0.9"/>
  <circle cx="624" cy="205" r="6" fill="#7ec8e3" opacity="0.9"/>
  <circle cx="654" cy="198" r="6" fill="#7ec8e3" opacity="0.9"/>
  <!-- Centroid A -->
  <circle cx="640" cy="188" r="5" fill="none" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="642" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#7ec8e3">μA</text>

  <!-- Cluster B points with centroid -->
  <circle cx="739" cy="175" r="6" fill="#ce9178" opacity="0.9"/>
  <circle cx="759" cy="190" r="6" fill="#ce9178" opacity="0.9"/>
  <circle cx="749" cy="210" r="6" fill="#ce9178" opacity="0.9"/>
  <circle cx="774" cy="178" r="6" fill="#ce9178" opacity="0.9"/>
  <!-- Centroid B -->
  <circle cx="755" cy="188" r="5" fill="none" stroke="#ce9178" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="757" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#ce9178">μB</text>

  <!-- Ward: centroid to centroid with merge visualization -->
  <line x1="640" y1="188" x2="755" y2="188" stroke="#7777cc" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="672" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">분산 증가량</text>
  <text x="624" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">A</text>
  <text x="749" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">B</text>

  <text x="604" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">✓ 균일하고 컴팩트한 군집</text>
  <text x="604" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">✓ 실전에서 가장 많이 사용</text>

  <!-- ===== Code Block ===== -->
  <rect x="60" y="302" width="760" height="130" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># AgglomerativeClustering (scikit-learn)</text>
  <text x="76" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">from</text><text x="122" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"> sklearn.cluster </text><text x="264" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">import</text><text x="318" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"> AgglomerativeClustering</text>
  <text x="76" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">from</text><text x="122" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"> scipy.cluster.hierarchy </text><text x="336" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">import</text><text x="390" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"> dendrogram, linkage</text>
  <text x="76" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">model = AgglomerativeClustering(</text>
  <text x="76" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">    n_clusters=</text><text x="194" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">3</text><text x="204" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">, linkage=</text><text x="298" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">'ward'</text><text x="343" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">)</text>
  <text x="76" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">labels = model.fit_predict(X)</text>

  <!-- Footer -->
  <text x="440" y="449" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈</text>
</svg>
