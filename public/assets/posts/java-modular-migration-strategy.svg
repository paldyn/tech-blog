<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="340" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">상향식 vs 하향식 마이그레이션</text>

  <defs>
    <marker id="msArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="msArr2" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- bottom-up -->
  <text x="220" y="84" font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">상향식 (Bottom-up)</text>
  <rect x="120" y="100" width="200" height="40" rx="6" fill="#0f1626" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="220" y="125" font-size="13" fill="#e8e8e8" text-anchor="middle">최하위 라이브러리</text>
  <rect x="120" y="166" width="200" height="40" rx="6" fill="#0f1626" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="220" y="191" font-size="13" fill="#e8e8e8" text-anchor="middle">중간 모듈</text>
  <rect x="120" y="232" width="200" height="40" rx="6" fill="#0f1626" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="220" y="257" font-size="13" fill="#e8e8e8" text-anchor="middle">애플리케이션</text>
  <line x1="220" y1="232" x2="220" y2="208" stroke="#55c555" stroke-width="2" marker-end="url(#msArr)"/>
  <line x1="220" y1="166" x2="220" y2="142" stroke="#55c555" stroke-width="2" marker-end="url(#msArr)"/>
  <text x="220" y="300" font-size="12" fill="#9aa4b8" text-anchor="middle">의존 없는 것부터 모듈화 (권장)</text>

  <!-- top-down -->
  <text x="660" y="84" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">하향식 (Top-down)</text>
  <rect x="560" y="100" width="200" height="40" rx="6" fill="#0f1626" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="660" y="125" font-size="13" fill="#e8e8e8" text-anchor="middle">애플리케이션</text>
  <rect x="560" y="166" width="200" height="40" rx="6" fill="#0f1626" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="660" y="191" font-size="13" fill="#e8e8e8" text-anchor="middle">중간 모듈</text>
  <rect x="560" y="232" width="200" height="40" rx="6" fill="#0f1626" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="660" y="257" font-size="13" fill="#e8e8e8" text-anchor="middle">최하위 (automatic)</text>
  <line x1="660" y1="166" x2="660" y2="142" stroke="#7ec8e3" stroke-width="2" marker-end="url(#msArr2)"/>
  <line x1="660" y1="232" x2="660" y2="208" stroke="#7ec8e3" stroke-width="2" marker-end="url(#msArr2)"/>
  <text x="660" y="300" font-size="12" fill="#9aa4b8" text-anchor="middle">위부터, 하위는 automatic module로</text>
</svg>
