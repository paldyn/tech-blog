<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrd" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Full 모델 PITR 복구 흐름</text>

  <!-- Timeline bar -->
  <rect x="60" y="88" width="760" height="24" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">시간 축 →</text>

  <!-- Full backup marker -->
  <rect x="80" y="72" width="4" height="56" rx="2" fill="#55c555"/>
  <text x="82" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">Full Backup (월)</text>

  <!-- Diff backup -->
  <rect x="300" y="80" width="4" height="48" rx="2" fill="#7ec8e3"/>
  <text x="302" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">Diff (수)</text>

  <!-- Log backups -->
  <rect x="160" y="84" width="3" height="40" rx="1" fill="#7777cc"/>
  <rect x="220" y="84" width="3" height="40" rx="1" fill="#7777cc"/>
  <rect x="360" y="84" width="3" height="40" rx="1" fill="#7777cc"/>
  <rect x="440" y="84" width="3" height="40" rx="1" fill="#7777cc"/>
  <rect x="520" y="84" width="3" height="40" rx="1" fill="#7777cc"/>
  <rect x="600" y="84" width="3" height="40" rx="1" fill="#7777cc"/>

  <text x="160" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7777cc">Log</text>
  <text x="220" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7777cc">Log</text>
  <text x="360" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7777cc">Log</text>
  <text x="440" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7777cc">Log</text>
  <text x="520" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7777cc">Log</text>
  <text x="600" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7777cc">Log</text>

  <!-- Failure point -->
  <rect x="660" y="72" width="4" height="56" rx="2" fill="#e05555"/>
  <text x="664" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">장애 발생 (금)</text>

  <!-- Tail log -->
  <rect x="660" y="84" width="80" height="32" rx="4" fill="#1a0a0a" stroke="#e05555" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="700" y="105" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">Tail-Log Backup</text>

  <!-- Recovery steps -->
  <rect x="60" y="168" width="760" height="196" rx="8" fill="#0d1e2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">PITR 복구 T-SQL 시퀀스</text>

  <rect x="80" y="200" width="720" height="148" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">-- 1. Tail-Log 백업 (장애 직후, 마지막 로그 보존)</text>
  <text x="96" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">BACKUP LOG AdventureWorks TO DISK='tail.bak' WITH NORECOVERY;</text>
  <text x="96" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">-- 2. Full 복원</text>
  <text x="96" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">RESTORE DATABASE AdventureWorks FROM DISK='full.bak' WITH NORECOVERY;</text>
  <text x="96" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">-- 3. Diff 복원 (있으면)</text>
  <text x="96" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">RESTORE DATABASE AdventureWorks FROM DISK='diff.bak' WITH NORECOVERY;</text>
  <text x="96" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">-- 4. 로그 순차 적용 → 특정 시점 지정</text>
  <text x="96" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">RESTORE LOG AdventureWorks FROM DISK='log1.bak'</text>
  <text x="96" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  WITH RECOVERY, STOPAT = '2026-05-23 14:30:00';</text>

  <text x="440" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">로그 체인이 끊기지 않아야 PITR이 가능하다</text>
</svg>
