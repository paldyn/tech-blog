<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-o" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SSE 스트리밍 동작 흐름</text>

  <!-- ── 열 헤더 ── -->
  <rect x="60" y="62" width="200" height="36" rx="6" fill="#1a1a2e" stroke="#3a3a6e" stroke-width="1.5"/>
  <text x="160" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">클라이언트</text>

  <rect x="340" y="62" width="200" height="36" rx="6" fill="#0f1a0f" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="440" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">API 서버</text>

  <rect x="620" y="62" width="200" height="36" rx="6" fill="#1a0f0a" stroke="#6e5a3a" stroke-width="1.5"/>
  <text x="720" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#ce9178" text-anchor="middle">추론 엔진 (vLLM)</text>

  <!-- 세로 타임라인 -->
  <line x1="160" y1="108" x2="160" y2="460" stroke="#3a3a6e" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="440" y1="108" x2="440" y2="460" stroke="#3a6e3a" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="720" y1="108" x2="720" y2="460" stroke="#6e5a3a" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Step 1: POST 요청 -->
  <text x="60" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">① POST /v1/chat/completions</text>
  <line x1="160" y1="135" x2="440" y2="135" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="300" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3" text-anchor="middle">stream: true</text>

  <!-- Step 2: 엔진으로 전달 -->
  <text x="350" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">② 추론 요청 전달</text>
  <line x1="440" y1="175" x2="720" y2="175" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- Step 3: HTTP 200 + 헤더 -->
  <text x="148" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="end">③ 200 OK + SSE 헤더</text>
  <line x1="440" y1="225" x2="160" y2="225" stroke="#ce9178" stroke-width="2" marker-end="url(#arr-o)"/>
  <text x="300" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#ce9178" text-anchor="middle">Content-Type: text/event-stream</text>

  <!-- Step 4: 첫 토큰 -->
  <text x="450" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">④ 첫 토큰 생성</text>
  <line x1="720" y1="267" x2="440" y2="267" stroke="#ce9178" stroke-width="2" marker-end="url(#arr-o)"/>

  <!-- Step 5: 첫 청크 전송 -->
  <text x="148" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="end">⑤ 첫 청크</text>
  <line x1="440" y1="307" x2="160" y2="307" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="300" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3" text-anchor="middle">data: {"delta":{"content":"안"}}</text>

  <!-- 반복 -->
  <text x="300" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#555" text-anchor="middle">… 토큰 생성마다 반복 …</text>

  <!-- Step 6: 마지막 청크 -->
  <text x="148" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="end">⑥ 마지막 청크</text>
  <line x1="440" y1="382" x2="160" y2="382" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="300" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3" text-anchor="middle">finish_reason: "stop"</text>

  <!-- Step 7: DONE -->
  <text x="148" y="415" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="end">⑦ 스트림 종료</text>
  <line x1="440" y1="422" x2="160" y2="422" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="300" y="415" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">data: [DONE]</text>

  <!-- 연결 닫힘 -->
  <text x="160" y="455" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">연결 종료</text>
  <text x="440" y="455" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">연결 종료</text>

  <!-- ── 오른쪽: 비교 박스 ── -->
  <rect x="620" y="300" width="200" height="160" rx="8" fill="#0f0f0a" stroke="#6e6e3a" stroke-width="1.5"/>
  <text x="720" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#b5cea8" text-anchor="middle">TTFT 비교</text>
  <text x="720" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e05555" text-anchor="middle">비스트리밍</text>
  <text x="720" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">전체 완료 후 수신</text>
  <text x="720" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">대기 시간: 5~30초</text>
  <line x1="640" y1="394" x2="800" y2="394" stroke="#555" stroke-width="1"/>
  <text x="720" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#55c555" text-anchor="middle">SSE 스트리밍</text>
  <text x="720" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">첫 토큰 즉시 수신</text>
  <text x="720" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">TTFT: 0.3~2초</text>
</svg>
