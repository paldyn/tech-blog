<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <style>
      text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }
      .mono { font-family: 'JetBrains Mono','Menlo','Consolas',monospace; }
    </style>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">NumPy로 구현하는 선형대수 핵심 연산</text>

  <!-- Left panel: Vector ops -->
  <rect x="60" y="64" width="364" height="30" rx="6" fill="#1a1a2e"/>
  <text x="242" y="84" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">벡터·행렬 기초 연산</text>

  <rect x="60" y="100" width="364" height="242" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text xml:space="preserve" x="76" y="122" class="mono" font-size="12" fill="#7ec8e3">import</text>
  <text xml:space="preserve" x="124" y="122" class="mono" font-size="12" fill="#e8e8e8">numpy as np</text>
  <text xml:space="preserve" x="76" y="140" class="mono" font-size="12" fill="#6a8aa0"># 벡터 정규화 (L2 Norm)</text>
  <text xml:space="preserve" x="76" y="158" class="mono" font-size="12" fill="#e8e8e8">v = np.array([</text>
  <text xml:space="preserve" x="76" y="176" class="mono" font-size="12" fill="#b5cea8">    3.0, 4.0</text>
  <text xml:space="preserve" x="76" y="176" class="mono" font-size="12" fill="#e8e8e8">          ])</text>
  <text xml:space="preserve" x="76" y="194" class="mono" font-size="12" fill="#e8e8e8">norm = np.linalg.norm(v)</text>
  <text xml:space="preserve" x="76" y="212" class="mono" font-size="12" fill="#6a8aa0"># norm = 5.0</text>
  <text xml:space="preserve" x="76" y="230" class="mono" font-size="12" fill="#e8e8e8">v_unit = v / norm</text>
  <text xml:space="preserve" x="76" y="248" class="mono" font-size="12" fill="#6a8aa0"># [0.6, 0.8] 단위 벡터</text>
  <text xml:space="preserve" x="76" y="266" class="mono" font-size="12" fill="#6a8aa0"># 코사인 유사도</text>
  <text xml:space="preserve" x="76" y="284" class="mono" font-size="12" fill="#e8e8e8">sim = np.dot(a_unit,</text>
  <text xml:space="preserve" x="76" y="302" class="mono" font-size="12" fill="#e8e8e8">            b_unit)</text>
  <text xml:space="preserve" x="76" y="320" class="mono" font-size="12" fill="#6a8aa0"># -1 ~ 1 범위</text>
  <text xml:space="preserve" x="76" y="338" class="mono" font-size="12" fill="#6a8aa0"># 1에 가까울수록 유사</text>

  <!-- Right panel: Eigenvalues -->
  <rect x="456" y="64" width="364" height="30" rx="6" fill="#0e2010"/>
  <text x="638" y="84" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">고유값·SVD (PCA의 기반)</text>

  <rect x="456" y="100" width="364" height="242" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text xml:space="preserve" x="472" y="122" class="mono" font-size="12" fill="#6a8aa0"># 고유값 분해 (Eigendecomp)</text>
  <text xml:space="preserve" x="472" y="140" class="mono" font-size="12" fill="#e8e8e8">A = np.array([</text>
  <text xml:space="preserve" x="472" y="158" class="mono" font-size="12" fill="#b5cea8">    [4, 2],</text>
  <text xml:space="preserve" x="472" y="176" class="mono" font-size="12" fill="#b5cea8">    [1, 3]</text>
  <text xml:space="preserve" x="472" y="194" class="mono" font-size="12" fill="#e8e8e8">])</text>
  <text xml:space="preserve" x="472" y="212" class="mono" font-size="12" fill="#e8e8e8">eigvals, eigvecs = \</text>
  <text xml:space="preserve" x="472" y="230" class="mono" font-size="12" fill="#e8e8e8">  np.linalg.eig(A)</text>
  <text xml:space="preserve" x="472" y="248" class="mono" font-size="12" fill="#6a8aa0"># PCA: 공분산 행렬의</text>
  <text xml:space="preserve" x="472" y="266" class="mono" font-size="12" fill="#6a8aa0"># 고유벡터 = 주성분</text>
  <text xml:space="preserve" x="472" y="284" class="mono" font-size="12" fill="#6a8aa0"># SVD: 모든 행렬을</text>
  <text xml:space="preserve" x="472" y="302" class="mono" font-size="12" fill="#6a8aa0"># U·Σ·V^T로 분해</text>
  <text xml:space="preserve" x="472" y="320" class="mono" font-size="12" fill="#e8e8e8">U,S,Vt = \</text>
  <text xml:space="preserve" x="472" y="338" class="mono" font-size="12" fill="#e8e8e8">  np.linalg.svd(A)</text>

  <!-- Bottom: Why matters -->
  <rect x="60" y="362" width="760" height="78" rx="8" fill="#111"/>
  <text x="440" y="386" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">선형대수가 AI에서 중요한 이유 한 눈에</text>
  <text x="440" y="406" text-anchor="middle" font-size="12" fill="#7ec8e3">벡터 = 임베딩(단어, 이미지, 문서의 의미를 숫자로 표현)</text>
  <text x="440" y="424" text-anchor="middle" font-size="12" fill="#55c555">행렬곱 = 신경망 연산의 99% (선형 변환)</text>
  <text x="440" y="422" text-anchor="middle" font-size="12" fill="#55c555"></text>
  <text x="200" y="424" text-anchor="middle" font-size="12" fill="#e05555">내적 = Attention, 유사도 검색의 핵심 연산</text>
  <text x="680" y="424" text-anchor="middle" font-size="12" fill="#7777cc">SVD = PCA, 추천 시스템, 데이터 압축</text>
  <text x="440" y="434" text-anchor="middle" font-size="11" fill="#555">PyTorch/TensorFlow 텐서 연산은 NumPy API의 GPU 가속 버전이다</text>

  <!-- Footer -->
  <text x="440" y="464" text-anchor="middle" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈</text>
</svg>
