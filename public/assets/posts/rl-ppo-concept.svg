<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">PPO: 클리핑 목적 함수의 동작 원리</text>

  <!-- PPO 목적 함수 -->
  <rect x="100" y="68" width="680" height="80" fill="#1a1030" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">PPO 클리핑 목적 함수</text>
  <text x="440" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8" text-anchor="middle">L_CLIP(θ) = E[ min( rₜ(θ)·Âₜ,  clip(rₜ(θ), 1-ε, 1+ε)·Âₜ ) ]</text>
  <text x="440" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">rₜ(θ) = π_θ(a|s) / π_θ_old(a|s)  — 확률 비율 | ε ≈ 0.2</text>

  <!-- Clipping 그래프 영역 -->
  <!-- 긍정 어드밴티지 (Â > 0) -->
  <rect x="60" y="174" width="360" height="200" fill="#0a0f1a" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Â > 0 (좋은 행동)</text>

  <!-- 가로축 (ratio) -->
  <line x1="80" y1="330" x2="400" y2="330" stroke="#888" stroke-width="1"/>
  <text x="240" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">확률 비율 rₜ(θ)</text>
  <!-- 세로축 -->
  <line x1="160" y1="210" x2="160" y2="340" stroke="#888" stroke-width="1"/>

  <!-- 1.0 마커 -->
  <line x1="156" y1="280" x2="164" y2="280" stroke="#888" stroke-width="1"/>
  <text x="152" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888" text-anchor="end">1.0</text>

  <!-- 클립 상한 1+ε=1.2 -->
  <line x1="220" y1="210" x2="220" y2="340" stroke="#e0a555" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="220" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e0a555" text-anchor="middle">1+ε</text>

  <!-- 클립 하한 1-ε=0.8 -->
  <line x1="100" y1="210" x2="100" y2="340" stroke="#e05555" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="100" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555" text-anchor="middle">1-ε</text>

  <!-- 클리핑 곡선 (Â>0): 오르다가 1.2에서 평탄 -->
  <polyline points="80,330 160,280 220,240 280,240 380,240"
            fill="none" stroke="#55c555" stroke-width="2.5"/>
  <text x="310" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">클리핑 →</text>

  <!-- 부정 어드밴티지 (Â < 0) -->
  <rect x="460" y="174" width="360" height="200" fill="#0a0f1a" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">Â &lt; 0 (나쁜 행동)</text>

  <!-- 가로축 -->
  <line x1="480" y1="330" x2="800" y2="330" stroke="#888" stroke-width="1"/>
  <text x="640" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">확률 비율 rₜ(θ)</text>
  <!-- 세로축 -->
  <line x1="560" y1="210" x2="560" y2="340" stroke="#888" stroke-width="1"/>

  <!-- 클립 상한 1+ε=1.2 -->
  <line x1="620" y1="210" x2="620" y2="340" stroke="#e0a555" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="620" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e0a555" text-anchor="middle">1+ε</text>

  <!-- 클립 하한 1-ε=0.8 -->
  <line x1="500" y1="210" x2="500" y2="340" stroke="#e05555" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="500" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555" text-anchor="middle">1-ε</text>

  <!-- 클리핑 곡선 (Â<0): 내려가다가 0.8에서 평탄 -->
  <polyline points="480,240 500,240 560,280 620,310 780,330"
            fill="none" stroke="#e05555" stroke-width="2.5"/>
  <text x="490" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">← 클리핑</text>

  <!-- 설명 박스 -->
  <rect x="60" y="394" width="760" height="72" fill="#0d1520" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">클리핑의 효과: 정책 업데이트 크기 제한</text>
  <text x="440" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Â>0: r이 1+ε 이상이어도 보상 없음 → 과도한 정책 변화 방지</text>
  <text x="440" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Â&lt;0: r이 1-ε 이하여도 패널티 없음 → 안정적인 정책 갱신 보장</text>
</svg>
