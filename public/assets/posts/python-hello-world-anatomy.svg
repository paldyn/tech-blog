<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <style>text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }</style>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Hello, World! 코드 해부</text>
  <text x="440" y="68" text-anchor="middle" font-size="15" font-weight="600" fill="#888">한 줄 안에 담긴 Python의 핵심 개념</text>

  <!-- Main code display -->
  <rect x="150" y="90" width="580" height="70" rx="8" fill="#070b14" stroke="#1e2433" stroke-width="2"/>
  <text x="440" y="133" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="24" font-weight="700"><tspan fill="#7ec8e3">print</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">"Hello, World!"</tspan><tspan fill="#e8e8e8">)</tspan></text>

  <!-- Annotation: print function -->
  <line x1="260" y1="160" x2="200" y2="220" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,2"/>
  <rect x="60" y="220" width="260" height="80" rx="8" fill="#0f1820" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="190" y="244" text-anchor="middle" font-size="13" font-weight="700" fill="#7ec8e3">내장 함수 (built-in)</text>
  <text x="190" y="264" text-anchor="middle" font-size="11" fill="#aaa">import 없이 바로 사용 가능</text>
  <text x="190" y="282" text-anchor="middle" font-size="11" fill="#aaa">표준 출력(stdout)에 인자 출력</text>

  <!-- Annotation: parentheses -->
  <line x1="390" y1="160" x2="370" y2="220" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,2"/>
  <rect x="280" y="220" width="200" height="80" rx="8" fill="#0f1820" stroke="#55c555" stroke-width="1.5"/>
  <text x="380" y="244" text-anchor="middle" font-size="13" font-weight="700" fill="#55c555">함수 호출 연산자</text>
  <text x="380" y="264" text-anchor="middle" font-size="11" fill="#aaa">( ) 로 함수를 호출</text>
  <text x="380" y="282" text-anchor="middle" font-size="11" fill="#aaa">Python 3의 핵심 변경점</text>

  <!-- Annotation: string -->
  <line x1="550" y1="160" x2="580" y2="220" stroke="#ce9178" stroke-width="1.5" stroke-dasharray="4,2"/>
  <rect x="500" y="220" width="260" height="80" rx="8" fill="#0f1820" stroke="#ce9178" stroke-width="1.5"/>
  <text x="630" y="244" text-anchor="middle" font-size="13" font-weight="700" fill="#ce9178">문자열 리터럴 (str)</text>
  <text x="630" y="264" text-anchor="middle" font-size="11" fill="#aaa">큰따옴표 또는 작은따옴표</text>
  <text x="630" y="282" text-anchor="middle" font-size="11" fill="#aaa">기본이 Unicode (UTF-8)</text>

  <!-- Additional concepts -->
  <rect x="60" y="330" width="760" height="110" rx="8" fill="#0f1418" stroke="#333"/>
  <text x="440" y="354" text-anchor="middle" font-size="13" font-weight="700" fill="#e8e8e8">print() 함수의 숨겨진 기능</text>
  <rect x="76" y="364" width="344" height="60" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="386" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">print</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">"a"</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#ce9178">"b"</tspan><tspan fill="#e8e8e8">, sep=</tspan><tspan fill="#ce9178">"-"</tspan><tspan fill="#e8e8e8">)</tspan></text>
  <text x="92" y="404" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">print</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">"no newline"</tspan><tspan fill="#e8e8e8">, end=</tspan><tspan fill="#ce9178">""</tspan><tspan fill="#e8e8e8">)</tspan></text>
  <text x="444" y="386" font-size="11" fill="#aaa">sep: 구분자 (기본: 공백)</text>
  <text x="444" y="406" font-size="11" fill="#aaa">end: 끝 문자 (기본: \n)</text>
  <text x="444" y="424" font-size="11" fill="#aaa">file: 출력 대상 (기본: stdout)</text>
</svg>
