  <rect x="496" y="106" width="328" height="50" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="660" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">루트 레이아웃 — title 없는 페이지</text>
  <text x="660" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" text-anchor="middle">PALDYN</text>

  <rect x="496" y="166" width="328" height="50" rx="6" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="660" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">페이지 title: 'Next.js 완전 정복'</text>
  <text x="660" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" text-anchor="middle">Next.js 완전 정복 | PALDYN</text>

  <rect x="496" y="226" width="328" height="50" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="660" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">absolute로 template 무시</text>
  <text x="660" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7777cc" text-anchor="middle">특별 페이지 제목</text>

  <rect x="496" y="290" width="328" height="44" rx="6" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text x="660" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" text-anchor="middle">title: &#123; absolute: '특별 페이지 제목' &#125;</text>
  <text x="660" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">absolute — 상위 template 완전 무시</text>

  <text x="440" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">template: '%s | 브랜드명' — %s 위치에 하위 페이지 title이 삽입됨</text>
  <text x="440" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">default: 하위에서 title 미지정 시 표시될 기본값</text>
</svg>
