<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Authorization Server · Resource Server 아키텍처</text>

  <!-- Authorization Server box -->
  <rect x="60" y="68" width="240" height="180" rx="10" fill="#0a0e1a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="180" y="92" text-anchor="middle" font-size="15" font-weight="700" fill="#7ec8e3">Authorization Server</text>

  <!-- Auth Server internals -->
  <rect x="78" y="104" width="204" height="36" rx="6" fill="#0d1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="122" text-anchor="middle" font-size="12" fill="#888">ClientRegistration 저장소</text>
  <text x="180" y="136" text-anchor="middle" font-size="11" fill="#666">RegisteredClientRepository</text>

  <rect x="78" y="148" width="204" height="36" rx="6" fill="#0d1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="166" text-anchor="middle" font-size="12" fill="#888">토큰 발급 엔드포인트</text>
  <text x="180" y="180" text-anchor="middle" font-size="11" fill="#666">POST /oauth2/token</text>

  <rect x="78" y="192" width="204" height="36" rx="6" fill="#0d1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="210" text-anchor="middle" font-size="12" fill="#888">JWK Set 엔드포인트</text>
  <text x="180" y="224" text-anchor="middle" font-size="11" fill="#666">GET /oauth2/jwks</text>

  <!-- Client / App -->
  <rect x="360" y="68" width="160" height="72" rx="10" fill="#1a1a0a" stroke="#e8c555" stroke-width="2"/>
  <text x="440" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#e8c555">Client App</text>
  <text x="440" y="110" text-anchor="middle" font-size="12" fill="#888">client_credentials /</text>
  <text x="440" y="124" text-anchor="middle" font-size="12" fill="#888">authorization_code</text>

  <!-- Resource Server box -->
  <rect x="580" y="68" width="240" height="180" rx="10" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="700" y="92" text-anchor="middle" font-size="15" font-weight="700" fill="#55c555">Resource Server</text>

  <rect x="598" y="104" width="204" height="36" rx="6" fill="#0d1a0d" stroke="#3a6e3a" stroke-width="1"/>
  <text x="700" y="122" text-anchor="middle" font-size="12" fill="#888">JWT 서명 검증</text>
  <text x="700" y="136" text-anchor="middle" font-size="11" fill="#666">NimbusJwtDecoder (JWK URI)</text>

  <rect x="598" y="148" width="204" height="36" rx="6" fill="#0d1a0d" stroke="#3a6e3a" stroke-width="1"/>
  <text x="700" y="166" text-anchor="middle" font-size="12" fill="#888">스코프 기반 인가</text>
  <text x="700" y="180" text-anchor="middle" font-size="11" fill="#666">hasAuthority('SCOPE_read')</text>

  <rect x="598" y="192" width="204" height="36" rx="6" fill="#0d1a0d" stroke="#3a6e3a" stroke-width="1"/>
  <text x="700" y="210" text-anchor="middle" font-size="12" fill="#888">보호 리소스 API</text>
  <text x="700" y="224" text-anchor="middle" font-size="11" fill="#666">GET /api/data</text>

  <!-- Arrows: Client → Auth Server -->
  <line x1="360" y1="100" x2="302" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="320" y="112" text-anchor="middle" font-size="11" fill="#888">① 토큰 요청</text>

  <!-- Auth Server → Client (token) -->
  <line x1="302" y1="170" x2="360" y2="140" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="316" y="165" text-anchor="middle" font-size="11" fill="#888">② Access Token</text>

  <!-- Client → Resource Server -->
  <line x1="520" y1="104" x2="578" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="556" y="112" text-anchor="middle" font-size="11" fill="#888">③ Bearer Token</text>

  <!-- Resource Server → Auth Server (JWK) -->
  <path d="M 580 210 Q 440 290 300 210" fill="none" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <text x="440" y="284" text-anchor="middle" font-size="11" fill="#888">④ JWK 공개키 조회 (시작 시 1회)</text>

  <!-- Resource Server → Client response -->
  <line x1="580" y1="218" x2="522" y2="130" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="564" y="183" text-anchor="middle" font-size="11" fill="#888">⑤ 응답</text>

  <!-- Code block -->
  <text x="60" y="280" font-size="16" font-weight="600" fill="#e8e8e8">Resource Server 설정</text>
  <rect x="60" y="294" width="760" height="198" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// application.yml</tspan></text>
  <text x="76" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">spring</tspan><tspan fill="#ffffff">:</tspan></text>
  <text x="76" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  security.oauth2.resourceserver.jwt:</tspan></text>
  <text x="76" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    jwk-set-uri: </tspan><tspan fill="#ce9178">http://auth-server/oauth2/jwks</tspan></text>
  <text x="76" y="390" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> </text>
  <text x="76" y="408" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// SecurityConfig</tspan></text>
  <text x="76" y="426" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">http</tspan><tspan fill="#ffffff">.authorizeHttpRequests(auth -&gt; auth</tspan></text>
  <text x="76" y="444" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    .requestMatchers(</tspan><tspan fill="#ce9178">"/api/**"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="76" y="462" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    .hasAuthority(</tspan><tspan fill="#ce9178">"SCOPE_read"</tspan><tspan fill="#ffffff">))</tspan></text>
  <text x="76" y="480" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    .oauth2ResourceServer(rs -&gt; rs.jwt(Customizer.withDefaults()));</tspan></text>
</svg>
