<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">LLaMA 패밀리 버전 진화</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">오픈소스 LLM의 판도를 바꾼 Meta의 선택</text>

  <!-- LLaMA 1 -->
  <rect x="60" y="96" width="230" height="140" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="175" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3">LLaMA 1</text>
  <text x="175" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">2023년 2월</text>
  <line x1="76" y1="154" x2="274" y2="154" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 7B / 13B / 33B / 65B</text>
  <text x="80" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 비상업용 라이선스</text>
  <text x="80" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 유출 후 오픈소스화</text>

  <!-- LLaMA 2 -->
  <rect x="320" y="96" width="230" height="140" rx="8" fill="#111827" stroke="#55c555" stroke-width="2"/>
  <text x="435" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555">LLaMA 2</text>
  <text x="435" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">2023년 7월</text>
  <line x1="336" y1="154" x2="534" y2="154" stroke="#3a4a6e" stroke-width="1"/>
  <text x="340" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 7B / 13B / 70B</text>
  <text x="340" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">• 상업용 무료 라이선스</text>
  <text x="340" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• Chat 버전 포함 (RLHF)</text>

  <!-- LLaMA 3 -->
  <rect x="580" y="96" width="240" height="140" rx="8" fill="#111827" stroke="#e05555" stroke-width="2"/>
  <text x="700" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e05555">LLaMA 3</text>
  <text x="700" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">2024년 4월~</text>
  <line x1="596" y1="154" x2="804" y2="154" stroke="#3a4a6e" stroke-width="1"/>
  <text x="600" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 8B / 70B / 405B</text>
  <text x="600" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">• GPT-4급 성능 (405B)</text>
  <text x="600" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 128K 컨텍스트</text>

  <!-- Arrows -->
  <line x1="290" y1="166" x2="318" y2="166" stroke="#444" stroke-width="2" marker-end="url(#a)"/>
  <line x1="550" y1="166" x2="578" y2="166" stroke="#444" stroke-width="2" marker-end="url(#a)"/>
  <defs>
    <marker id="a" markerWidth="18.6667" markerHeight="14" refX="18.6667" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 18.6667 7, 0 14" fill="#555"/>
    </marker>
  </defs>

  <!-- Ecosystem box -->
  <rect x="60" y="268" width="760" height="160" rx="8" fill="#0d1117" stroke="#333" stroke-width="1"/>
  <text x="440" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8">LLaMA 기반 오픈소스 생태계</text>

  <rect x="80" y="308" width="170" height="56" rx="6" fill="#111827" stroke="#7777cc" stroke-width="1"/>
  <text x="165" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">Vicuna</text>
  <text x="165" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ShareGPT 파인튜닝</text>
  <text x="165" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">대화 성능 특화</text>

  <rect x="270" y="308" width="170" height="56" rx="6" fill="#111827" stroke="#55c555" stroke-width="1"/>
  <text x="355" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">Code Llama</text>
  <text x="355" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">코딩 특화 파인튜닝</text>
  <text x="355" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">FIM 지원</text>

  <rect x="460" y="308" width="170" height="56" rx="6" fill="#111827" stroke="#e05555" stroke-width="1"/>
  <text x="545" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">WizardLM</text>
  <text x="545" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Evol-Instruct</text>
  <text x="545" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">지시 따르기 강화</text>

  <rect x="650" y="308" width="150" height="56" rx="6" fill="#111827" stroke="#7ec8e3" stroke-width="1"/>
  <text x="725" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Alpaca</text>
  <text x="725" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Stanford SFT</text>
  <text x="725" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">최초 파인튜닝</text>
</svg>
