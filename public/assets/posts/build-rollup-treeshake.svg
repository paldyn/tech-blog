<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380" style="background:#0a0a0a;border-radius:12px">
  <!-- Title -->
  <text x="60" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" xml:space="preserve">Rollup Tree Shaking — 사용하는 것만 번들에 포함</text>
  <text x="60" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888" xml:space="preserve">Static ES import 분석으로 미사용 export 제거</text>

  <!-- Left: utils.ts with unused fn -->
  <text x="60" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" xml:space="preserve">utils.ts (라이브러리)</text>
  <rect x="60" y="110" width="350" height="222" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 3개 함수 export</text>
  <text x="76" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">export function </tspan><tspan fill="#55c555">add</tspan><tspan fill="#ffffff">(a, b) {</tspan></text>

  <text x="76" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">  return </tspan><tspan fill="#ffffff">a + b; }</tspan></text>
  
  <text x="76" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">export function </tspan><tspan fill="#e05555">multiply</tspan><tspan fill="#ffffff">(a, b) {</tspan></text>

  <text x="76" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">  return </tspan><tspan fill="#ffffff">a * b; } </tspan><tspan fill="#9aa4b8">// ← 미사용</tspan></text>

  <text x="76" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">export function </tspan><tspan fill="#e05555">divide</tspan><tspan fill="#ffffff">(a, b) {</tspan></text>

  <text x="76" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">  return </tspan><tspan fill="#ffffff">a / b; } </tspan><tspan fill="#9aa4b8">// ← 미사용</tspan></text>

  <text x="76" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// app.ts에서:</text>
  <text x="76" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">import </tspan><tspan fill="#ffffff">{ add } </tspan><tspan fill="#7ec8e3">from </tspan><tspan fill="#ce9178">'./utils'</tspan></text>

  <text x="76" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">console.log(add(</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">));</tspan></text>

  <!-- Arrow -->
  <line x1="414" y1="220" x2="454" y2="220" stroke="#55c555" stroke-width="2.5"/>
  <polygon points="454,213 470,220 454,227" fill="#55c555"/>

  <!-- Right: Output (trimmed) -->
  <text x="476" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" xml:space="preserve">번들 출력 (add만 포함)</text>
  <rect x="476" y="110" width="344" height="150" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="492" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// dist/index.mjs (최종 번들)</text>
  <text x="492" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">function </tspan><tspan fill="#55c555">add</tspan><tspan fill="#ffffff">(a, b) {</tspan></text>

  <text x="492" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">  return </tspan><tspan fill="#ffffff">a + b;</tspan></text>
  
  <text x="492" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">}</text>
  <text x="492" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// multiply, divide → 완전 제거</text>
  <text x="492" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">console.log(add(</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">));</tspan></text>

  <text x="492" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 번들 크기 2/3 절감</text>

  <!-- Side effects warning -->
  <rect x="476" y="272" width="344" height="64" rx="6" fill="#2b1a0d" stroke="#703a1e"/>
  <text x="492" y="293" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" xml:space="preserve">⚠ sideEffects 주의</text>
  <text x="492" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">전역 CSS 주입·console·이벤트 등록 파일은</text>
  <text x="492" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">package.json "sideEffects": ["*.css"] 로 명시</text>

  <text x="60" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" xml:space="preserve">Rollup은 CommonJS 모듈 (동적 require)에서는 Tree Shaking이 불완전합니다.</text>
</svg>
