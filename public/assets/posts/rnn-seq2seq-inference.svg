<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Teacher Forcing vs 자기회귀 디코딩</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888">훈련 vs 추론의 차이</text>

  <!-- Training (Teacher Forcing) -->
  <rect x="60" y="90" width="360" height="220" rx="10" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <text x="240" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">훈련: Teacher Forcing</text>
  <text x="80" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">입력: &lt;SOS&gt; "Hello" "world"</text>
  <text x="80" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Step 1: &lt;SOS&gt; → "Hello" (정답 ✓)</text>
  <text x="80" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Step 2: "Hello"(정답) → "world" ✓</text>
  <text x="80" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Step 3: "world"(정답) → &lt;EOS&gt; ✓</text>
  <line x1="80" y1="228" x2="380" y2="228" stroke="#333" stroke-width="1"/>
  <text x="80" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">이전 스텝 예측이 틀려도</text>
  <text x="80" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">정답 토큰을 입력으로 사용</text>
  <text x="80" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ 빠른 학습, 훈련-추론 불일치 문제</text>
  <text x="80" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  (Exposure Bias)</text>

  <!-- Inference (Autoregressive) -->
  <rect x="460" y="90" width="360" height="220" rx="10" fill="#0d1117" stroke="#7ec8e3" stroke-width="2"/>
  <text x="640" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">추론: 자기회귀 (Autoregressive)</text>
  <text x="480" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">입력: &lt;SOS&gt;만 주어짐</text>
  <text x="480" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Step 1: &lt;SOS&gt; → 예측 "Hello"</text>
  <text x="480" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Step 2: "Hello"(예측) → "world"</text>
  <text x="480" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Step 3: "world"(예측) → &lt;EOS&gt;</text>
  <line x1="480" y1="228" x2="800" y2="228" stroke="#333" stroke-width="1"/>
  <text x="480" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">이전 스텝 예측을 그대로</text>
  <text x="480" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">다음 스텝 입력으로 사용</text>
  <text x="480" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ 실제 배포 환경에서의 생성 방식</text>
  <text x="480" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  오류가 누적될 수 있음</text>

  <!-- Beam search note -->
  <rect x="60" y="328" width="760" height="62" rx="6" fill="#111" stroke="#333"/>
  <text x="440" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">추론 품질 향상: Beam Search</text>
  <text x="440" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">beam_size=4: 매 스텝 상위 4개 후보를 동시 유지 → 탐욕 디코딩 대비 BLEU 점수 향상</text>
  <text x="440" y="394" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">단, beam_size가 커질수록 계산 비용 ∝ beam_size</text>
</svg>
