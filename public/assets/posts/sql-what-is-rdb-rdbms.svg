<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">RDBMS 쿼리 처리 흐름</text>

  <defs>
    <marker id="arrW" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8e8e8"/>
    </marker>
    <marker id="arrC" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrG" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Client -->
  <rect x="60" y="190" width="140" height="60" fill="#0f1320" stroke="#7777cc" stroke-width="2" rx="8"/>
  <text x="130" y="214" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc">클라이언트</text>
  <text x="130" y="233" text-anchor="middle" font-size="11" fill="#888">SQL 쿼리 발송</text>
  <text x="130" y="248" text-anchor="middle" font-size="11" fill="#888">결과 수신</text>

  <!-- Arrow client -> parser -->
  <line x1="200" y1="220" x2="238" y2="220" stroke="#e8e8e8" stroke-width="2" marker-end="url(#arrW)"/>
  <text x="218" y="213" text-anchor="middle" font-size="10" fill="#888">SQL</text>

  <!-- RDBMS Engine box -->
  <rect x="240" y="88" width="440" height="284" fill="#0d1320" stroke="#3a4a6e" stroke-width="1.5" rx="10"/>
  <text x="460" y="112" text-anchor="middle" font-size="14" font-weight="700" fill="#9aa4b8">RDBMS 엔진</text>

  <!-- Parser -->
  <rect x="260" y="130" width="120" height="56" fill="#0f1320" stroke="#7ec8e3" stroke-width="1.5" rx="6"/>
  <text x="320" y="153" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">파서</text>
  <text x="320" y="170" text-anchor="middle" font-size="11" fill="#888">(Parser)</text>
  <text x="320" y="182" text-anchor="middle" font-size="10" fill="#888">구문 분석</text>

  <!-- Arrow parser -> optimizer -->
  <line x1="380" y1="158" x2="418" y2="158" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrC)"/>

  <!-- Optimizer -->
  <rect x="420" y="130" width="120" height="56" fill="#0f1320" stroke="#7ec8e3" stroke-width="1.5" rx="6"/>
  <text x="480" y="153" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">옵티마이저</text>
  <text x="480" y="170" text-anchor="middle" font-size="11" fill="#888">(Optimizer)</text>
  <text x="480" y="182" text-anchor="middle" font-size="10" fill="#888">실행 계획 수립</text>

  <!-- Arrow optimizer -> executor -->
  <line x1="540" y1="158" x2="578" y2="158" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrC)"/>

  <!-- Executor -->
  <rect x="580" y="130" width="80" height="56" fill="#0f1320" stroke="#7ec8e3" stroke-width="1.5" rx="6"/>
  <text x="620" y="153" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">실행기</text>
  <text x="620" y="170" text-anchor="middle" font-size="11" fill="#888">(Executor)</text>

  <!-- Arrow executor down -> storage -->
  <line x1="620" y1="186" x2="620" y2="228" stroke="#55c555" stroke-width="2" marker-end="url(#arrG)"/>

  <!-- Storage Manager -->
  <rect x="350" y="230" width="200" height="56" fill="#0f1320" stroke="#55c555" stroke-width="1.5" rx="6"/>
  <text x="450" y="253" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">스토리지 관리자</text>
  <text x="450" y="270" text-anchor="middle" font-size="11" fill="#888">버퍼 캐시 / 디스크 I/O</text>

  <!-- Arrow executor -> storage manager -->
  <line x1="580" y1="248" x2="552" y2="258" stroke="#55c555" stroke-width="2" marker-end="url(#arrG)"/>

  <!-- Storage disks -->
  <rect x="260" y="316" width="110" height="44" fill="#0f1320" stroke="#9aa4b8" stroke-width="1" rx="6"/>
  <text x="315" y="336" text-anchor="middle" font-size="12" font-weight="600" fill="#9aa4b8">테이블 데이터</text>
  <text x="315" y="352" text-anchor="middle" font-size="10" fill="#888">힙 파일</text>

  <rect x="390" y="316" width="110" height="44" fill="#0f1320" stroke="#9aa4b8" stroke-width="1" rx="6"/>
  <text x="445" y="336" text-anchor="middle" font-size="12" font-weight="600" fill="#9aa4b8">인덱스</text>
  <text x="445" y="352" text-anchor="middle" font-size="10" fill="#888">B-Tree / Hash</text>

  <rect x="520" y="316" width="110" height="44" fill="#0f1320" stroke="#9aa4b8" stroke-width="1" rx="6"/>
  <text x="575" y="336" text-anchor="middle" font-size="12" font-weight="600" fill="#9aa4b8">트랜잭션 로그</text>
  <text x="575" y="352" text-anchor="middle" font-size="10" fill="#888">Redo / Undo</text>

  <line x1="360" y1="286" x2="315" y2="314" stroke="#9aa4b8" stroke-width="1.5"/>
  <line x1="450" y1="286" x2="445" y2="314" stroke="#9aa4b8" stroke-width="1.5"/>
  <line x1="540" y1="286" x2="575" y2="314" stroke="#9aa4b8" stroke-width="1.5"/>

  <!-- Arrow back: results to client -->
  <line x1="240" y1="248" x2="202" y2="240" stroke="#e8e8e8" stroke-width="2" marker-end="url(#arrW)"/>
  <text x="220" y="238" text-anchor="middle" font-size="10" fill="#888">결과</text>

  <!-- Right: SQL standards label -->
  <rect x="720" y="130" width="130" height="80" fill="#0f1320" stroke="#2a3a5e" stroke-width="1" rx="6"/>
  <text x="785" y="153" text-anchor="middle" font-size="12" font-weight="600" fill="#e8e8e8">접속 인터페이스</text>
  <text x="785" y="171" text-anchor="middle" font-size="11" fill="#888">JDBC / ODBC</text>
  <text x="785" y="187" text-anchor="middle" font-size="11" fill="#888">libpq / cx_Oracle</text>
  <text x="785" y="203" text-anchor="middle" font-size="11" fill="#888">네이티브 드라이버</text>
</svg>
