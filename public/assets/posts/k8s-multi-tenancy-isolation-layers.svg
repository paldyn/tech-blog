<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430">
  <rect width="880" height="430" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">소프트 멀티테넌시 — 격리는 여러 겹으로</text>

  <!-- layer 1 -->
  <rect x="80" y="86" width="720" height="52" rx="8" fill="#1a3a4a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="104" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">RBAC</text>
  <text x="280" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">테넌트는 자기 네임스페이스만 — Role + RoleBinding으로 권한 차단</text>

  <!-- layer 2 -->
  <rect x="80" y="148" width="720" height="52" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="104" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">ResourceQuota · LimitRange</text>
  <text x="380" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">한 테넌트가 자원을 독식하지 못하게 상한 부여</text>

  <!-- layer 3 -->
  <rect x="80" y="210" width="720" height="52" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="104" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">NetworkPolicy</text>
  <text x="320" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">기본 차단(deny-all) 후 같은 테넌트 내 통신만 허용</text>

  <!-- layer 4 -->
  <rect x="80" y="272" width="720" height="52" rx="8" fill="#201a10" stroke="#ce9178" stroke-width="1.5"/>
  <text x="104" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#ce9178">Pod Security · 정책 엔진</text>
  <text x="380" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">특권 컨테이너·호스트 접근 차단 (PSA · Kyverno)</text>

  <!-- layer 5 -->
  <rect x="80" y="334" width="720" height="52" rx="8" fill="#2a1416" stroke="#e05555" stroke-width="1.5"/>
  <text x="104" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">노드 격리(선택)</text>
  <text x="320" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">taint·affinity로 민감 테넌트를 전용 노드에 배치</text>
</svg>
