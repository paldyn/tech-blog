<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">수퍼타입/서브타입 구현 전략 3가지</text>

  <!-- Strategy 1: STI (Single Table Inheritance) -->
  <rect x="60" y="66" width="240" height="340" rx="8" fill="#0d0d0d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">① 단일 테이블 (STI)</text>
  <text x="180" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">모든 타입을 한 테이블에</text>

  <rect x="76" y="118" width="208" height="200" rx="4" fill="#111" stroke="#333"/>
  <rect x="76" y="118" width="208" height="26" rx="4" fill="#0d1a20" stroke="#333"/>
  <text x="180" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#7ec8e3">PAYMENT</text>
  <text x="86" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">PK  id</text>
  <text x="86" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">    type  ← 타입 구분</text>
  <text x="86" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">    amount</text>
  <text x="86" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">    card_no  (카드만)</text>
  <text x="86" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">    bank_code (계좌만)</text>
  <text x="86" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">    crypto_addr (코인만)</text>
  <text x="86" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">    ⬆ NULL 많음</text>
  <text x="86" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">장점: 쿼리 단순</text>
  <text x="86" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">단점: NULL 컬럼 많음</text>
  <text x="86" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">      CHECK 제약 복잡</text>
  <text x="86" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">      테이블 커짐</text>
  <text x="86" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">적합: 서브타입 적고</text>
  <text x="86" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">      전체 조회 빈번</text>

  <!-- Strategy 2: CTI (Class Table Inheritance) -->
  <rect x="320" y="66" width="240" height="340" rx="8" fill="#0d0d0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">② 분리 테이블 (CTI)</text>
  <text x="440" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">수퍼+서브 각각 테이블</text>

  <rect x="336" y="118" width="90" height="76" rx="4" fill="#111" stroke="#333"/>
  <rect x="336" y="118" width="90" height="26" rx="4" fill="#0d200d" stroke="#333"/>
  <text x="381" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" font-weight="700" fill="#55c555">PAYMENT</text>
  <text x="342" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#7ec8e3">PK  id</text>
  <text x="342" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#e8e8e8">    amount</text>
  <text x="342" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#e8e8e8">    type</text>

  <!-- Sub tables -->
  <rect x="336" y="206" width="75" height="55" rx="4" fill="#111" stroke="#333"/>
  <text x="373" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" font-weight="700" fill="#7ec8e3">CARD_PAY</text>
  <text x="341" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#7777cc">FK  pay_id</text>
  <text x="341" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#e8e8e8">    card_no</text>

  <rect x="430" y="206" width="80" height="55" rx="4" fill="#111" stroke="#333"/>
  <text x="470" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" font-weight="700" fill="#7ec8e3">BANK_PAY</text>
  <text x="435" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#7777cc">FK  pay_id</text>
  <text x="435" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#e8e8e8">    bank_code</text>

  <!-- lines from parent to child -->
  <line x1="373" y1="194" x2="373" y2="206" stroke="#888" stroke-width="1" stroke-dasharray="4,2"/>
  <line x1="470" y1="194" x2="470" y2="206" stroke="#888" stroke-width="1" stroke-dasharray="4,2"/>

  <text x="336" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">장점: 정규화, 제약 명확</text>
  <text x="336" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">단점: JOIN 필요</text>
  <text x="336" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">      INSERT 2단계</text>
  <text x="336" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">적합: 서브타입 많고</text>
  <text x="336" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">      속성 차이 클 때</text>

  <!-- Strategy 3: Concrete Table -->
  <rect x="580" y="66" width="240" height="340" rx="8" fill="#0d0d0d" stroke="#ce9178" stroke-width="1.5"/>
  <text x="700" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#ce9178">③ 서브타입별 테이블</text>
  <text x="700" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">수퍼타입 테이블 없음</text>

  <rect x="596" y="118" width="100" height="70" rx="4" fill="#111" stroke="#333"/>
  <text x="646" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" font-weight="700" fill="#ce9178">CARD_PAYMENT</text>
  <text x="601" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#7ec8e3">PK  id</text>
  <text x="601" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#e8e8e8">    amount</text>
  <text x="601" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#e8e8e8">    card_no</text>

  <rect x="720" y="118" width="88" height="70" rx="4" fill="#111" stroke="#333"/>
  <text x="764" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" font-weight="700" fill="#ce9178">BANK_PAYMENT</text>
  <text x="725" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#7ec8e3">PK  id</text>
  <text x="725" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#e8e8e8">    amount</text>
  <text x="725" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#e8e8e8">    bank_code</text>

  <text x="596" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">장점: 완전 독립</text>
  <text x="596" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">      JOIN 없음</text>
  <text x="596" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">단점: 공통 속성 중복</text>
  <text x="596" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">      전체 조회 UNION</text>
  <text x="596" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">적합: 타입간 속성</text>
  <text x="596" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">      겹침 거의 없을 때</text>

  <!-- Bottom recommendation -->
  <rect x="60" y="424" width="760" height="60" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">선택 가이드</text>
  <text x="440" y="468" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">서브타입 2~3개·NULL 적음 → STI │ 서브타입 많음·속성 차이 큼 → CTI │ 완전 독립 도메인 → 서브타입별</text>
</svg>
