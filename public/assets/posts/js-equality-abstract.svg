<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">== 느슨한 동등 — 형변환 규칙 요약</text>

  <!-- Comparison table header -->
  <rect x="60" y="72" width="760" height="36" fill="#1e2433" rx="4"/>
  <text x="180" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">표현식</text>
  <text x="440" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">결과</text>
  <text x="680" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">이유</text>

  <!-- Row 1 -->
  <rect x="60" y="108" width="760" height="32" fill="#111620" rx="0"/>
  <text x="180" y="129" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">0 == false</text>
  <text x="440" y="129" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">true</text>
  <text x="680" y="129" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">false → 0 변환 후 비교</text>

  <!-- Row 2 -->
  <rect x="60" y="140" width="760" height="32" fill="#0d1118" rx="0"/>
  <text x="180" y="161" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">'' == false</text>
  <text x="440" y="161" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">true</text>
  <text x="680" y="161" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">false→0, ''→0</text>

  <!-- Row 3 -->
  <rect x="60" y="172" width="760" height="32" fill="#111620" rx="0"/>
  <text x="180" y="193" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">'0' == false</text>
  <text x="440" y="193" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">true</text>
  <text x="680" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">false→0, '0'→0</text>

  <!-- Row 4 -->
  <rect x="60" y="204" width="760" height="32" fill="#0d1118" rx="0"/>
  <text x="180" y="225" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">null == undefined</text>
  <text x="440" y="225" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">true</text>
  <text x="680" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">스펙에서 특별 처리</text>

  <!-- Row 5 -->
  <rect x="60" y="236" width="760" height="32" fill="#111620" rx="0"/>
  <text x="180" y="257" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">null == 0</text>
  <text x="440" y="257" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" text-anchor="middle">false</text>
  <text x="680" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">null은 null/undefined에만 ==</text>

  <!-- Row 6 -->
  <rect x="60" y="268" width="760" height="32" fill="#0d1118" rx="0"/>
  <text x="180" y="289" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">[] == false</text>
  <text x="440" y="289" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">true</text>
  <text x="680" y="289" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">[]→''→0, false→0</text>

  <!-- Row 7 -->
  <rect x="60" y="300" width="760" height="32" fill="#111620" rx="0"/>
  <text x="180" y="321" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">[] == ![]</text>
  <text x="440" y="321" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">true</text>
  <text x="680" y="321" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">![]→false, []→0, false→0</text>

  <!-- Row 8 -->
  <rect x="60" y="332" width="760" height="32" fill="#0d1118" rx="0"/>
  <text x="180" y="353" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">NaN == NaN</text>
  <text x="440" y="353" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" text-anchor="middle">false</text>
  <text x="680" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">NaN은 자기 자신과도 ≠</text>

  <!-- Tip box -->
  <rect x="60" y="386" width="760" height="90" fill="#0d1418" rx="6" stroke="#2a3a2a"/>
  <text x="440" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">권장 사항</text>
  <text x="440" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">== 는 null/undefined 동시 검사 (value == null) 이외에는</text>
  <text x="440" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">항상 === 를 사용하세요. ESLint eqeqeq 규칙으로 강제할 수 있습니다.</text>

  <!-- Footer -->
  <text x="440" y="502" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN — JavaScript 완전 정복</text>
</svg>
