<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-y" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8c84a"/>
    </marker>
  </defs>
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">외부 코드 포함 방법 선택 트리</text>

  <!-- Start -->
  <rect x="330" y="68" width="220" height="50" rx="8" fill="#1a2035" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8" text-anchor="middle">외부 코드를 포함해야 함</text>

  <line x1="440" y1="118" x2="440" y2="142" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Q1 -->
  <rect x="260" y="146" width="360" height="50" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">패키지 매니저(npm/pip/maven)로 관리 가능?</text>

  <!-- Yes branch -->
  <line x1="260" y1="171" x2="160" y2="171" stroke="#55c555" stroke-width="2"/>
  <line x1="160" y1="171" x2="160" y2="250" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="200" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">Yes</text>

  <rect x="60" y="254" width="200" height="60" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">패키지 매니저 사용</text>
  <text x="160" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">가장 권장</text>

  <!-- No branch: Q2 -->
  <line x1="620" y1="171" x2="720" y2="171" stroke="#7ec8e3" stroke-width="2"/>
  <line x1="720" y1="171" x2="720" y2="250" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="658" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">No</text>

  <line x1="440" y1="196" x2="440" y2="250" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Q2 -->
  <rect x="260" y="254" width="360" height="50" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">업스트림에 직접 기여(PR)해야 하는가?</text>
  <text x="440" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">독립 버전 관리 필요한가?</text>

  <!-- Yes → submodule -->
  <line x1="260" y1="277" x2="160" y2="277" stroke="#7ec8e3" stroke-width="2"/>
  <line x1="160" y1="277" x2="160" y2="356" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="200" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">Yes</text>

  <rect x="60" y="360" width="200" height="60" rx="8" fill="#1a2035" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">git submodule</text>
  <text x="160" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">독립 관리 + 기여 용이</text>

  <!-- No → subtree -->
  <line x1="620" y1="277" x2="720" y2="277" stroke="#7ec8e3" stroke-width="2"/>
  <line x1="720" y1="277" x2="720" y2="356" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="658" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">No</text>

  <rect x="620" y="360" width="200" height="60" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">git subtree</text>
  <text x="720" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">단순 포함 + 팀 친화적</text>

  <!-- Tip -->
  <rect x="60" y="438" width="760" height="8" rx="4" fill="#1a1a2e"/>
</svg>
