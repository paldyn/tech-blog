<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700">spawn · exec 사용 예제</text>
  <text x="440" y="70" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">스트리밍(왼쪽)과 Promise 버퍼링(오른쪽) 패턴</text>

  <!-- Left: spawn streaming -->
  <text x="60" y="102" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">spawn — 스트리밍</text>
  <rect x="60" y="112" width="370" height="270" rx="6" fill="#070b14" stroke="#1e2433"/>

  <text x="76" y="140" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">import</text>
  <text x="120" y="140" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"> { spawn } </text>
  <text x="206" y="140" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">from</text>
  <text x="238" y="140" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"> 'child_process'</text>

  <text x="76" y="176" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">const</text>
  <text x="116" y="176" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"> child = spawn(</text>
  <text x="76" y="194" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  'ffmpeg'</text>
  <text x="76" y="212" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  [</text>
  <text x="90" y="212" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">'-i'</text>
  <text x="118" y="212" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">, </text>
  <text x="134" y="212" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">'input.mp4'</text>
  <text x="218" y="212" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">,</text>
  <text x="90" y="230" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">   'output.mp3'</text>
  <text x="76" y="248" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  ]</text>
  <text x="76" y="266" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">);</text>

  <text x="76" y="302" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">child.stderr.on(</text>
  <text x="186" y="302" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">'data'</text>
  <text x="228" y="302" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">, (d) =&gt; {</text>
  <text x="76" y="320" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  process.stderr.write(d);</text>
  <text x="76" y="338" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">});</text>
  <text x="76" y="356" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">child.on(</text>
  <text x="142" y="356" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">'close'</text>
  <text x="190" y="356" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">, (code) =&gt; {</text>
  <text x="76" y="374" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  console.log(</text>
  <text x="182" y="374" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">`종료: ${code}`</text>
  <text x="296" y="374" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">); });</text>

  <!-- Right: exec promise -->
  <text x="450" y="102" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">exec — Promise (child_process/promises)</text>
  <rect x="450" y="112" width="370" height="270" rx="6" fill="#070b14" stroke="#1e2433"/>

  <text x="466" y="140" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">import</text>
  <text x="510" y="140" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"> { exec } </text>
  <text x="578" y="140" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">from</text>
  <text x="610" y="140" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"> 'child_process/promises'</text>

  <text x="466" y="176" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">async function</text>
  <text x="566" y="176" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"> gitLog() {</text>
  <text x="466" y="194" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  try</text>
  <text x="494" y="194" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"> {</text>
  <text x="466" y="212" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    const</text>
  <text x="510" y="212" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"> { stdout } =</text>
  <text x="466" y="230" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">      await</text>
  <text x="514" y="230" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"> exec(</text>
  <text x="554" y="230" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">'git log --oneline -5'</text>
  <text x="466" y="248" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">      );</text>
  <text x="466" y="266" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    </text>
  <text x="480" y="266" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">console.log(stdout);</text>
  <text x="466" y="284" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  } </text>
  <text x="490" y="284" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">catch</text>
  <text x="530" y="284" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"> (err) {</text>
  <text x="466" y="302" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    // err.code, err.stderr 포함</text>
  <text x="466" y="320" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    console.error(err.stderr);</text>
  <text x="466" y="338" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  }</text>
  <text x="466" y="356" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">}</text>

  <!-- Bottom note -->
  <text x="440" y="405" text-anchor="middle" fill="#555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">spawn 인수 배열에 사용자 입력 → 셸 미사용 → 안전. exec 문자열에 직접 삽입 → 위험</text>
</svg>
