        font-size="12" fill="#e05555">17 Standard</text>

  <!-- Other -->
  <rect x="60" y="444" width="760" height="38" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="458" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">기타: ZGC 개선(15 prod), Hidden Classes(15), Unix-Domain Sockets(16), Strong Encapsulation(16)</text>
  <text x="440" y="474" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">Helpful NullPointerExceptions(14), JFR 이벤트 스트리밍(14)</text>
