  <text x="700" y="284" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">16 Standard</text>

  <!-- Pattern Matching instanceof -->
  <rect x="60" y="308" width="760" height="56" rx="8" fill="#1a1a0a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="80" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">Pattern Matching for instanceof (JEP 305/394)</text>
  <text x="80" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Preview in 14(305) → 표준화 16(394): 타입 검사 + 바인딩 변수 한번에 처리</text>
  <text x="700" y="332" text-anchor="middle"
