        font-size="12" fill="#888">12 Preview</text>
  <text x="700" y="148" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">14 Standard</text>

  <!-- Text Block -->
  <rect x="60" y="172" width="760" height="56" rx="8" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
