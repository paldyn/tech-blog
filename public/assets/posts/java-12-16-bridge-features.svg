  <text x="80" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Preview in 13, 14 → 표준화 15: 멀티라인 문자열, 들여쓰기 정규화, 이스케이프 시퀀스</text>
  <text x="700" y="196" text-anchor="middle"
