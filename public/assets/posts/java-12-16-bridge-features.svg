        font-size="12" fill="#888">14 Preview</text>
  <text x="700" y="352" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">16 Standard</text>

  <!-- Sealed Classes -->
  <rect x="60" y="376" width="760" height="56" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="80" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">Sealed Classes (JEP 360/397)</text>
  <text x="80" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
