  <line x1="209" y1="58" x2="209" y2="86" stroke="#333" stroke-width="1"/>
  <line x1="363" y1="58" x2="363" y2="86" stroke="#333" stroke-width="1"/>
  <line x1="517" y1="58" x2="517" y2="86" stroke="#333" stroke-width="1"/>
  <line x1="671" y1="58" x2="671" y2="86" stroke="#333" stroke-width="1"/>

  <!-- Feature rows -->
  <!-- Switch Expression -->
  <rect x="60" y="104" width="760" height="56" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Switch 표현식 (JEP 325/354/361)</text>
  <text x="80" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Preview in 12(325), 13(354) → 표준화 14(361): yield 키워드, 화살표 표현식, 다중 레이블</text>
  <text x="700" y="128" text-anchor="middle"
