        font-size="12" fill="#888">13 Preview</text>
  <text x="700" y="216" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">15 Standard</text>

  <!-- Records -->
  <rect x="60" y="240" width="760" height="56" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="80" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
