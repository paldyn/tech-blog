<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">any 대신 unknown</text>
  <text x="60" y="76" font-size="14" fill="#888">unknown은 "모름"을 안전하게 표현한다 — 쓰기 전에 좁히도록 강제</text>

  <!-- any box -->
  <rect x="60" y="100" width="360" height="270" fill="#101418" rx="10" stroke="#e05555" stroke-width="1.5"/>
  <text x="84" y="134" font-size="16" font-weight="600" fill="#e05555">any — 검사 비활성</text>
  <rect x="84" y="152" width="312" height="158" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="100" y="178" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">let</tspan> x: <tspan fill="#7ec8e3" font-weight="600">any</tspan> = getValue();</text>
  <text xml:space="preserve" x="100" y="206" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">x.foo.bar();   <tspan fill="#9aa4b8">// 검사 안 함</tspan></text>
  <text xml:space="preserve" x="100" y="234" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">x();           <tspan fill="#9aa4b8">// 통과</tspan></text>
  <text xml:space="preserve" x="100" y="262" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">const</tspan> n: number = x;</text>
  <text xml:space="preserve" x="100" y="290" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e05555">// 전부 통과 → 런타임 폭발</text>
  <text x="84" y="346" font-size="13" fill="#888">타입 검사를 꺼버려 전염된다</text>

  <!-- unknown box -->
  <rect x="460" y="100" width="360" height="270" fill="#101418" rx="10" stroke="#55c555" stroke-width="1.5"/>
  <text x="484" y="134" font-size="16" font-weight="600" fill="#55c555">unknown — 안전</text>
  <rect x="484" y="152" width="312" height="158" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="500" y="178" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">let</tspan> x: <tspan fill="#7ec8e3" font-weight="600">unknown</tspan> = getValue();</text>
  <text xml:space="preserve" x="500" y="206" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">x.foo;  <tspan fill="#e05555">// ❌ 먼저 좁혀라</tspan></text>
  <text xml:space="preserve" x="500" y="234" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">if</tspan> (<tspan fill="#7ec8e3" font-weight="600">typeof</tspan> x === <tspan fill="#ce9178">"string"</tspan>) {</text>
  <text xml:space="preserve" x="500" y="262" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">  x.toUpperCase(); <tspan fill="#55c555">// ✅</tspan></text>
  <text xml:space="preserve" x="500" y="290" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">}</text>
  <text x="484" y="346" font-size="13" fill="#888">쓰기 전 좁힘을 강제 → 안전</text>
</svg>
