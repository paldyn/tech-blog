<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8e8e8"/>
    </marker>
  </defs>

  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Java IO 클래스 계층 구조</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">바이트 스트림(Stream) vs 문자 스트림(Reader/Writer)</text>

  <!-- Left: Byte Stream -->
  <rect x="60" y="90" width="360" height="34" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">바이트 스트림 (8-bit raw data)</text>

  <line x1="180" y1="124" x2="130" y2="154" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="300" y1="124" x2="350" y2="154" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="60" y="156" width="160" height="40" rx="6" fill="#101828" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">InputStream</text>

  <rect x="240" y="156" width="160" height="40" rx="6" fill="#101828" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="320" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">OutputStream</text>

  <!-- InputStream children -->
  <line x1="100" y1="196" x2="80" y2="226" stroke="#e8e8e8" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="130" y1="196" x2="160" y2="226" stroke="#e8e8e8" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="160" y1="196" x2="240" y2="226" stroke="#e8e8e8" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="56" y="228" width="130" height="36" rx="6" fill="#0e1618" stroke="#7ec8e3" stroke-width="1"/>
  <text x="121" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">FileInputStream</text>

  <rect x="136" y="228" width="130" height="36" rx="6" fill="#0e1618" stroke="#7ec8e3" stroke-width="1"/>
  <text x="201" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">BufferedInputStream</text>

  <!-- OutputStream children -->
  <line x1="290" y1="196" x2="270" y2="226" stroke="#e8e8e8" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="340" y1="196" x2="360" y2="226" stroke="#e8e8e8" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="246" y="228" width="130" height="36" rx="6" fill="#0e1618" stroke="#7ec8e3" stroke-width="1"/>
  <text x="311" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">FileOutputStream</text>

  <rect x="324" y="228" width="100" height="36" rx="6" fill="#0e1618" stroke="#7ec8e3" stroke-width="1"/>
  <text x="374" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">PrintStream</text>

  <!-- Right: Character Stream -->
  <rect x="460" y="90" width="360" height="34" rx="6" fill="#102010" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">문자 스트림 (16-bit Unicode)</text>

  <line x1="580" y1="124" x2="540" y2="154" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="700" y1="124" x2="740" y2="154" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="460" y="156" width="140" height="40" rx="6" fill="#101828" stroke="#55c555" stroke-width="1.5"/>
  <text x="530" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Reader</text>

  <rect x="620" y="156" width="140" height="40" rx="6" fill="#101828" stroke="#55c555" stroke-width="1.5"/>
  <text x="690" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Writer</text>

  <!-- Reader children -->
  <line x1="490" y1="196" x2="470" y2="226" stroke="#e8e8e8" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="530" y1="196" x2="560" y2="226" stroke="#e8e8e8" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="446" y="228" width="120" height="36" rx="6" fill="#0e1618" stroke="#55c555" stroke-width="1"/>
  <text x="506" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">FileReader</text>

  <rect x="520" y="228" width="130" height="36" rx="6" fill="#0e1618" stroke="#55c555" stroke-width="1"/>
  <text x="585" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">BufferedReader</text>

  <!-- Writer children -->
  <line x1="660" y1="196" x2="640" y2="226" stroke="#e8e8e8" stroke-width="1" marker-end="url(#arr)"/>
  <line x1="710" y1="196" x2="740" y2="226" stroke="#e8e8e8" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="616" y="228" width="120" height="36" rx="6" fill="#0e1618" stroke="#55c555" stroke-width="1"/>
  <text x="676" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">FileWriter</text>

  <rect x="716" y="228" width="130" height="36" rx="6" fill="#0e1618" stroke="#55c555" stroke-width="1"/>
  <text x="781" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">PrintWriter</text>

  <!-- Bridge: InputStreamReader / OutputStreamWriter -->
  <rect x="60" y="300" width="760" height="70" rx="8" fill="#101020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">브리지 클래스 — 바이트 ↔ 문자 변환</text>
  <text x="440" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">InputStreamReader(is, Charset)  |  OutputStreamWriter(os, Charset)</text>
  <text x="440" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">바이트 스트림을 지정 인코딩으로 문자 스트림으로 변환 (UTF-8, EUC-KR 등)</text>

  <!-- Decorator pattern note -->
  <rect x="60" y="390" width="760" height="110" rx="8" fill="#101010" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="412" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">데코레이터 패턴 — 기능 조합</text>
  <text x="440" y="434" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">IO 클래스는 데코레이터 패턴으로 설계 — 기본 스트림에 기능을 겹겹이 추가</text>

  <rect x="76" y="445" width="728" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="465" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">new</text>
  <text x="92" y="465" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">     PrintWriter(</text>
  <text x="92" y="483" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">    new</text>
  <text x="92" y="483" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">         BufferedWriter(</text>
  <text x="92" y="483" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">new</text>
  <text x="92" y="483" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">        OutputStreamWriter(</text>
  <text x="92" y="483" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">new</text>
  <text x="92" y="483" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">         FileOutputStream(file), StandardCharsets.UTF_8)))</text>
</svg>
