<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">DOM 트리 구조</text>

  <!-- Document 노드 -->
  <rect x="330" y="72" width="220" height="44" fill="#1a2235" rx="6" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="100" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" text-anchor="middle">Document</text>

  <!-- 화살표: Document → html -->
  <line x1="440" y1="116" x2="440" y2="148" stroke="#555" stroke-width="1.5"/>
  <polygon points="440,154 434,144 446,144" fill="#555"/>

  <!-- html 노드 -->
  <rect x="330" y="158" width="220" height="44" fill="#111827" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="186" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" text-anchor="middle">&lt;html&gt;</text>

  <!-- 화살표: html → head -->
  <line x1="360" y1="202" x2="220" y2="258" stroke="#555" stroke-width="1.5"/>
  <polygon points="216,260 218,248 228,256" fill="#555"/>

  <!-- 화살표: html → body -->
  <line x1="520" y1="202" x2="660" y2="258" stroke="#555" stroke-width="1.5"/>
  <polygon points="664,260 652,252 662,244" fill="#555"/>

  <!-- head 노드 -->
  <rect x="120" y="262" width="200" height="44" fill="#111827" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="220" y="290" fill="#7777cc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" text-anchor="middle">&lt;head&gt;</text>

  <!-- body 노드 -->
  <rect x="560" y="262" width="200" height="44" fill="#111827" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="660" y="290" fill="#7777cc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" text-anchor="middle">&lt;body&gt;</text>

  <!-- head → title -->
  <line x1="220" y1="306" x2="160" y2="356" stroke="#555" stroke-width="1.5"/>
  <polygon points="156,358 158,346 168,354" fill="#555"/>

  <!-- title 노드 -->
  <rect x="60" y="360" width="160" height="40" fill="#0d1117" rx="6" stroke="#888" stroke-width="1"/>
  <text x="140" y="385" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">&lt;title&gt;</text>

  <!-- body → div -->
  <line x1="620" y1="306" x2="560" y2="356" stroke="#555" stroke-width="1.5"/>
  <polygon points="556,358 558,346 568,354" fill="#555"/>

  <!-- body → p -->
  <line x1="700" y1="306" x2="760" y2="356" stroke="#555" stroke-width="1.5"/>
  <polygon points="764,358 752,350 762,342" fill="#555"/>

  <!-- div 노드 -->
  <rect x="460" y="360" width="160" height="40" fill="#0d1117" rx="6" stroke="#888" stroke-width="1"/>
  <text x="540" y="385" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">&lt;div&gt;</text>

  <!-- p 노드 -->
  <rect x="660" y="360" width="160" height="40" fill="#0d1117" rx="6" stroke="#888" stroke-width="1"/>
  <text x="740" y="385" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">&lt;p&gt; TextNode</text>

  <!-- 범례 -->
  <rect x="60" y="426" width="14" height="14" fill="#1a2235" rx="2" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="82" y="438" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">Document 노드</text>
  <rect x="220" y="426" width="14" height="14" fill="#111827" rx="2" stroke="#55c555" stroke-width="1.5"/>
  <text x="242" y="438" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">Element 노드</text>
  <rect x="380" y="426" width="14" height="14" fill="#111827" rx="2" stroke="#7777cc" stroke-width="1.5"/>
  <text x="402" y="438" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">자식 Element</text>
  <rect x="540" y="426" width="14" height="14" fill="#0d1117" rx="2" stroke="#888" stroke-width="1"/>
  <text x="562" y="438" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">리프 노드</text>

  <!-- 관계 설명 -->
  <text x="440" y="472" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">parentNode ↔ childNodes / firstChild / lastChild / nextSibling / previousSibling</text>
</svg>
