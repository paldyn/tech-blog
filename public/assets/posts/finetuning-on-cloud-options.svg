<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">클라우드 파인튜닝 옵션 비교</text>
  <text x="440" y="68" font-size="15" fill="#888" text-anchor="middle">AWS SageMaker · GCP Vertex AI · Azure ML 주요 특징 비교</text>

  <!-- Column headers -->
  <!-- AWS -->
  <rect x="60" y="86" width="232" height="46" rx="8" fill="#1a1208" stroke="#f5a623" stroke-width="2"/>
  <text x="176" y="105" font-size="14" font-weight="700" fill="#f5a623" text-anchor="middle">AWS SageMaker</text>
  <text x="176" y="122" font-size="11" fill="#bbb" text-anchor="middle">Amazon Web Services</text>

  <!-- GCP -->
  <rect x="324" y="86" width="232" height="46" rx="8" fill="#0d1a0d" stroke="#34a853" stroke-width="2"/>
  <text x="440" y="105" font-size="14" font-weight="700" fill="#34a853" text-anchor="middle">GCP Vertex AI</text>
  <text x="440" y="122" font-size="11" fill="#bbb" text-anchor="middle">Google Cloud Platform</text>

  <!-- Azure -->
  <rect x="588" y="86" width="232" height="46" rx="8" fill="#0d1020" stroke="#0078d4" stroke-width="2"/>
  <text x="704" y="105" font-size="14" font-weight="700" fill="#0078d4" text-anchor="middle">Azure ML</text>
  <text x="704" y="122" font-size="11" fill="#bbb" text-anchor="middle">Microsoft Azure</text>

  <!-- Row 1: GPU 인스턴스 -->
  <text x="30" y="164" font-size="11" font-weight="700" fill="#888" text-anchor="start">GPU 인스턴스</text>
  <line x1="28" y1="148" x2="852" y2="148" stroke="#222" stroke-width="1"/>

  <rect x="60" y="152" width="232" height="50" rx="6" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
  <text x="176" y="169" font-size="11" fill="#e8e8e8" text-anchor="middle">ml.p4d.24xlarge (A100 8×)</text>
  <text x="176" y="185" font-size="11" fill="#e8e8e8" text-anchor="middle">ml.p3.8xlarge (V100 4×)</text>
  <text x="176" y="198" font-size="11" fill="#aaa" text-anchor="middle">ml.g5.12xlarge (A10G 4×)</text>

  <rect x="324" y="152" width="232" height="50" rx="6" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
  <text x="440" y="169" font-size="11" fill="#e8e8e8" text-anchor="middle">a2-highgpu-8g (A100 8×)</text>
  <text x="440" y="185" font-size="11" fill="#e8e8e8" text-anchor="middle">TPU v4-8, v5e-8</text>
  <text x="440" y="198" font-size="11" fill="#aaa" text-anchor="middle">n1-standard + T4/V100</text>

  <rect x="588" y="152" width="232" height="50" rx="6" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
  <text x="704" y="169" font-size="11" fill="#e8e8e8" text-anchor="middle">Standard_ND96asr_v4 (A100 8×)</text>
  <text x="704" y="185" font-size="11" fill="#e8e8e8" text-anchor="middle">Standard_NC96ads_A100 v4</text>
  <text x="704" y="198" font-size="11" fill="#aaa" text-anchor="middle">Standard_NC6s_v3 (V100)</text>

  <!-- Row 2: 시간당 비용 -->
  <line x1="28" y1="208" x2="852" y2="208" stroke="#222" stroke-width="1"/>
  <text x="30" y="228" font-size="11" font-weight="700" fill="#888" text-anchor="start">시간당 비용 (온디맨드)</text>

  <rect x="60" y="212" width="232" height="50" rx="6" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
  <text x="176" y="229" font-size="11" fill="#b5cea8" text-anchor="middle">A100 8× : ~$32/hr</text>
  <text x="176" y="245" font-size="11" fill="#b5cea8" text-anchor="middle">A10G 4× : ~$8/hr</text>
  <text x="176" y="259" font-size="11" fill="#aaa" text-anchor="middle">스팟: 약 70% 절감 가능</text>

  <rect x="324" y="212" width="232" height="50" rx="6" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
  <text x="440" y="229" font-size="11" fill="#b5cea8" text-anchor="middle">A100 8× : ~$29/hr</text>
  <text x="440" y="245" font-size="11" fill="#b5cea8" text-anchor="middle">TPU v4-8 : ~$12/hr</text>
  <text x="440" y="259" font-size="11" fill="#aaa" text-anchor="middle">프리엠티블: 약 60~80% 절감</text>

  <rect x="588" y="212" width="232" height="50" rx="6" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
  <text x="704" y="229" font-size="11" fill="#b5cea8" text-anchor="middle">A100 8× : ~$33/hr</text>
  <text x="704" y="245" font-size="11" fill="#b5cea8" text-anchor="middle">V100 (NC6s_v3) : ~$3/hr</text>
  <text x="704" y="259" font-size="11" fill="#aaa" text-anchor="middle">스팟: 약 60~80% 절감</text>

  <!-- Row 3: 주요 특징 -->
  <line x1="28" y1="268" x2="852" y2="268" stroke="#222" stroke-width="1"/>
  <text x="30" y="288" font-size="11" font-weight="700" fill="#888" text-anchor="start">주요 특징</text>

  <rect x="60" y="272" width="232" height="68" rx="6" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
  <text x="176" y="289" font-size="11" fill="#e8e8e8" text-anchor="middle">• S3와 네이티브 연동</text>
  <text x="176" y="305" font-size="11" fill="#e8e8e8" text-anchor="middle">• IAM 역할 기반 보안</text>
  <text x="176" y="321" font-size="11" fill="#e8e8e8" text-anchor="middle">• 관리형 스팟 훈련 지원</text>
  <text x="176" y="333" font-size="11" fill="#aaa" text-anchor="middle">HuggingFace 내장 지원</text>

  <rect x="324" y="272" width="232" height="68" rx="6" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
  <text x="440" y="289" font-size="11" fill="#e8e8e8" text-anchor="middle">• TPU 네이티브 지원</text>
  <text x="440" y="305" font-size="11" fill="#e8e8e8" text-anchor="middle">• GCS와 자연스러운 연동</text>
  <text x="440" y="321" font-size="11" fill="#e8e8e8" text-anchor="middle">• Colab Pro+ 연계 개발</text>
  <text x="440" y="333" font-size="11" fill="#aaa" text-anchor="middle">BigQuery 데이터 파이프라인</text>

  <rect x="588" y="272" width="232" height="68" rx="6" fill="#141414" stroke="#2a2a2a" stroke-width="1"/>
  <text x="704" y="289" font-size="11" fill="#e8e8e8" text-anchor="middle">• Azure Blob 연동</text>
  <text x="704" y="305" font-size="11" fill="#e8e8e8" text-anchor="middle">• MLflow 내장 통합</text>
  <text x="704" y="321" font-size="11" fill="#e8e8e8" text-anchor="middle">• Microsoft 365 연계</text>
  <text x="704" y="333" font-size="11" fill="#aaa" text-anchor="middle">엔터프라이즈 보안·컴플라이언스</text>

  <!-- Bottom guide -->
  <line x1="28" y1="348" x2="852" y2="348" stroke="#222" stroke-width="1"/>
  <rect x="60" y="356" width="760" height="108" rx="8" fill="#0f0f1a" stroke="#333" stroke-width="1"/>
  <text x="440" y="376" font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">클라우드 플랫폼 선택 기준</text>

  <!-- Selection criteria: 3 columns -->
  <text x="176" y="396" font-size="12" font-weight="700" fill="#f5a623" text-anchor="middle">AWS 선택 시</text>
  <text x="176" y="412" font-size="11" fill="#aaa" text-anchor="middle">• 이미 AWS 인프라 사용 중</text>
  <text x="176" y="428" font-size="11" fill="#aaa" text-anchor="middle">• S3 데이터 파이프라인 보유</text>
  <text x="176" y="444" font-size="11" fill="#aaa" text-anchor="middle">• 엔터프라이즈·스타트업 무관</text>

  <line x1="310" y1="364" x2="310" y2="454" stroke="#222" stroke-width="1"/>

  <text x="440" y="396" font-size="12" font-weight="700" fill="#34a853" text-anchor="middle">GCP 선택 시</text>
  <text x="440" y="412" font-size="11" fill="#aaa" text-anchor="middle">• TPU 활용 또는 연구 목적</text>
  <text x="440" y="428" font-size="11" fill="#aaa" text-anchor="middle">• 비용 절감이 최우선</text>
  <text x="440" y="444" font-size="11" fill="#aaa" text-anchor="middle">• Google Cloud 계열 팀</text>

  <line x1="570" y1="364" x2="570" y2="454" stroke="#222" stroke-width="1"/>

  <text x="716" y="396" font-size="12" font-weight="700" fill="#0078d4" text-anchor="middle">Azure 선택 시</text>
  <text x="716" y="412" font-size="11" fill="#aaa" text-anchor="middle">• Microsoft 365·Teams 연계</text>
  <text x="716" y="428" font-size="11" fill="#aaa" text-anchor="middle">• 기업 보안·컴플라이언스 중요</text>
  <text x="716" y="444" font-size="11" fill="#aaa" text-anchor="middle">• Azure AD 통합 필요</text>
</svg>
