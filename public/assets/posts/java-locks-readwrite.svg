<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="arrlr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">ReentrantReadWriteLock 동시성 모델</text>

  <!-- Read lock: multiple readers -->
  <rect x="60" y="66" width="360" height="110" rx="8" fill="#0a1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="240" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Read Lock (공유)</text>

  <rect x="80" y="104" width="70" height="32" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="115" y="125" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">Thread A</text>

  <rect x="165" y="104" width="70" height="32" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="200" y="125" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">Thread B</text>

  <rect x="250" y="104" width="70" height="32" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="285" y="125" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">Thread C</text>

  <text x="240" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">여러 스레드 동시 읽기 가능</text>

  <!-- Write lock: exclusive -->
  <rect x="460" y="66" width="360" height="110" rx="8" fill="#1f0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="640" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">Write Lock (배타)</text>

  <rect x="560" y="104" width="160" height="32" rx="4" fill="#2a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="640" y="125" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">Thread D (단독 쓰기)</text>

  <text x="640" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">다른 모든 스레드 BLOCKED</text>

  <!-- Code -->
  <text x="80" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">사용 예시</text>
  <rect x="60" y="220" width="760" height="156" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">ReadWriteLock</text>
  <text x="202" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> rwl = </text>
  <text x="252" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">new</text>
  <text x="278" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> ReentrantReadWriteLock();</text>
  <text x="76" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">Lock</text>
  <text x="110" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> r = rwl.readLock(), w = rwl.writeLock();</text>
  <text x="76" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 읽기 — 동시 허용</text>
  <text x="76" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">r.lock(); </text>
  <text x="76" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">try</text>
  <text x="100" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> { readData(); } </text>
  <text x="76" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">finally</text>
  <text x="136" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> { r.unlock(); }</text>
  <text x="76" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 쓰기 — 단독 점유</text>
  <text x="76" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">w.lock(); </text>
  <text x="146.5" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">try</text>
  <text x="162.1" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> { writeData(); } </text>
  <text x="76" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">finally</text>
  <text x="136" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> { w.unlock(); }</text>
</svg>
