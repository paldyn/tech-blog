<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 600">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrOrange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8944a"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="600" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">API Aggregation 요청 라우팅과 TLS/인증 처리</text>

  <!-- Step numbers row -->
  <!-- Step 1: kubectl -->
  <circle cx="110" cy="108" r="16" fill="#1a0a2a" stroke="#7777cc" stroke-width="2"/>
  <text x="110" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">1</text>
  <text x="110" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">kubectl</text>
  <text x="110" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">GET /apis/</text>
  <text x="110" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">metrics.k8s.io/v1beta1</text>

  <!-- Arrow 1 → 2 -->
  <line x1="168" y1="108" x2="222" y2="108" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="195" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">mTLS</text>

  <!-- Step 2: kube-apiserver -->
  <circle cx="270" cy="108" r="16" fill="#1a0a2a" stroke="#7777cc" stroke-width="2"/>
  <text x="270" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">2</text>
  <text x="270" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">kube-apiserver</text>
  <text x="270" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">APIService 조회</text>
  <text x="270" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">라우팅 결정</text>

  <!-- Arrow 2 → 3 -->
  <line x1="328" y1="108" x2="382" y2="108" stroke="#e8944a" stroke-width="2" marker-end="url(#arrOrange)"/>
  <text x="355" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8944a" text-anchor="middle">프록시</text>

  <!-- Step 3: Aggregation Layer -->
  <circle cx="430" cy="108" r="16" fill="#1a1000" stroke="#e8944a" stroke-width="2"/>
  <text x="430" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8944a" text-anchor="middle">3</text>
  <text x="430" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8944a" text-anchor="middle">Aggregation</text>
  <text x="430" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">헤더 주입</text>
  <text x="430" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">인증정보 포워딩</text>

  <!-- Arrow 3 → 4 -->
  <line x1="488" y1="108" x2="542" y2="108" stroke="#55c555" stroke-width="2" marker-end="url(#arrGreen)"/>
  <text x="515" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">TLS</text>

  <!-- Step 4: Extension API Server -->
  <circle cx="590" cy="108" r="16" fill="#0a2a0a" stroke="#55c555" stroke-width="2"/>
  <text x="590" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">4</text>
  <text x="590" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">확장 API 서버</text>
  <text x="590" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">인증 헤더 확인</text>
  <text x="590" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">응답 처리</text>

  <!-- Arrow 4 → 5 -->
  <line x1="648" y1="108" x2="702" y2="108" stroke="#55c555" stroke-width="2" marker-end="url(#arrGreen)"/>
  <text x="675" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">응답</text>

  <!-- Step 5: Response back -->
  <circle cx="750" cy="108" r="16" fill="#1a1a1a" stroke="#888" stroke-width="2"/>
  <text x="750" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">5</text>
  <text x="750" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">클라이언트</text>
  <text x="750" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">JSON 응답</text>
  <text x="750" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">수신 완료</text>

  <!-- Divider -->
  <line x1="60" y1="196" x2="820" y2="196" stroke="#222" stroke-width="1"/>

  <!-- TLS section label -->
  <text x="440" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888" text-anchor="middle">인증 헤더 흐름 (Impersonation)</text>

  <!-- Auth headers detail -->
  <rect x="60" y="240" width="360" height="120" rx="8" fill="#1a0a00" stroke="#e8944a" stroke-width="1.5"/>
  <text x="240" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8944a" text-anchor="middle">kube-apiserver 가 주입하는 헤더</text>
  <text x="80" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">X-Remote-User: </text>
  <text x="208" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">alice</text>
  <text x="80" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">X-Remote-Group: </text>
  <text x="212" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">system:masters</text>
  <text x="80" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">X-Remote-Extra-*: </text>
  <text x="218" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">추가 클레임</text>
  <text x="80" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">확장 서버는 이 헤더로 RBAC 결정</text>

  <!-- TLS detail -->
  <rect x="460" y="240" width="360" height="120" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">TLS 설정 (APIService spec)</text>
  <text x="480" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">caBundle: </text>
  <text x="566" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">&lt;base64 CA&gt;</text>
  <text x="480" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">insecureSkipTLSVerify: </text>
  <text x="678" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">false</text>
  <text x="480" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">caBundle 로 서버 인증서 검증</text>
  <text x="480" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">cert-manager 로 자동 갱신 권장</text>

  <!-- Code block: APIService YAML -->
  <rect x="60" y="386" width="760" height="178" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="410" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># APIService 등록 예시</text>
  <text x="80" y="430" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">apiVersion</text>
  <text x="80" y="430" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">           : apiregistration.k8s.io/v1</text>
  <text x="80" y="448" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">kind</text>
  <text x="80" y="448" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">     : APIService</text>
  <text x="80" y="466" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">spec</text>
  <text x="80" y="466" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    :</text>
  <text x="80" y="484" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  group: </text>
  <text x="147" y="484" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">metrics.k8s.io</text>
  <text x="80" y="502" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  version: </text>
  <text x="157" y="502" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">v1beta1</text>
  <text x="80" y="520" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  service: {namespace: kube-system, name: metrics-server}</text>
  <text x="80" y="538" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  caBundle: </text>
  <text x="162" y="538" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">LS0tLS1CRUdJTi... </text>
  <text x="320" y="538" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># base64 CA cert</text>
  <text x="80" y="556" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  groupPriorityMinimum: 100   versionPriority: 100</text>
</svg>
