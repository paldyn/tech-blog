  <line x1="220" y1="142" x2="250" y2="142" stroke="#7ec8e3" stroke-width="2"/>

  <rect x="252" y="120" width="130" height="44" fill="#0f1f30" rx="8" stroke="#1e3a5f"/>
  <text x="317" y="143" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">get() 실행</text>
  <text x="317" y="157" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">getter 함수 자동 호출</text>

  <!-- Arrow -->
  <polygon points="396,142 412,136 412,148" fill="#7ec8e3"/>
  <line x1="382" y1="142" x2="412" y2="142" stroke="#7ec8e3" stroke-width="2"/>

