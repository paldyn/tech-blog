  <text x="200" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">쓰기 — setter 호출</text>

  <rect x="60" y="220" width="160" height="44" fill="#0f1f14" rx="8" stroke="#1e4a2a"/>
