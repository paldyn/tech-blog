<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">컴포넌트 구조 해부</text>

  <!-- Main code block with callouts -->
  <rect x="60" y="68" width="500" height="320" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="92" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">import</tspan><tspan fill="#ffffff"> { useState, useEffect } </tspan><tspan font-weight="600" fill="#7ec8e3">from</tspan><tspan fill="#ce9178"> 'react'</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="76" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> </text>
  <text x="76" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">function</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#e0c044">SearchBox</tspan><tspan fill="#ffffff">({ placeholder = </tspan><tspan fill="#ce9178">'검색...'</tspan><tspan fill="#ffffff"> }) {</tspan></text>
  <text x="76" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">  // ① 상태 선언</tspan></text>
  <text x="76" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan font-weight="600" fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> [query, setQuery] = useState(</tspan><tspan fill="#ce9178">''</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="76" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">  // ② 부수 효과</tspan></text>
  <text x="76" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  useEffect(() =&gt; { search(query); }, [query]);</tspan></text>
  <text x="76" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">  // ③ 이벤트 핸들러</tspan></text>
  <text x="76" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">  const</tspan><tspan fill="#ffffff"> handleChange = (e) =&gt; setQuery(e.target.value);</tspan></text>
  <text x="76" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">  // ④ 렌더 (return JSX)</tspan></text>
  <text x="76" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan font-weight="600" fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> (</tspan></text>
  <text x="76" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    &lt;</tspan><tspan fill="#55c555">input</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#cc77cc">value</tspan><tspan fill="#ffffff">={query}</tspan></text>
  <text x="76" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">      </tspan><tspan fill="#cc77cc">placeholder</tspan><tspan fill="#ffffff">={placeholder}</tspan></text>
  <text x="76" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">      </tspan><tspan fill="#cc77cc">onChange</tspan><tspan fill="#ffffff">={handleChange} /&gt;</tspan></text>
  <text x="76" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  );</text>

  <!-- Right: callout boxes -->
  <rect x="580" y="84" width="260" height="54" rx="10" fill="#0f1825" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="600" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">컴포넌트 이름</text>
  <text x="600" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">반드시 대문자로 시작</text>
  <line x1="560" y1="132" x2="580" y2="111" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="580" y="154" width="260" height="54" rx="10" fill="#0d2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="600" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">Props (인자)</text>
  <text x="600" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">기본값 설정 가능</text>
  <line x1="560" y1="172" x2="580" y2="181" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="580" y="224" width="260" height="54" rx="10" fill="#1a1a0d" stroke="#e0c044" stroke-width="1.5"/>
  <text x="600" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e0c044">State 선언</text>
  <text x="600" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">Hooks — 최상위에서만 호출</text>
  <line x1="560" y1="172" x2="580" y2="251" stroke="#e0c044" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="580" y="294" width="260" height="54" rx="10" fill="#1a1025" stroke="#cc77cc" stroke-width="1.5"/>
  <text x="600" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#cc77cc">JSX 반환</text>
  <text x="600" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">단일 루트, 항상 반환</text>
  <line x1="560" y1="292" x2="580" y2="321" stroke="#cc77cc" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Design principles -->
  <rect x="60" y="412" width="760" height="52" rx="8" fill="#0f1825" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="434" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">컴포넌트 설계 원칙</text>
  <text x="440" y="454" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">단일 책임 | 재사용 가능 | 순수(Pure) | 상태 최소화 | 예측 가능</text>
</svg>
