<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">React 함수 컴포넌트 해부</text>

  <!-- component code -->
  <rect x="60" y="76" width="460" height="260" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="100" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">
    {/* 함수 컴포넌트 전체 구조 */}
  </text>
  <text x="80" y="122" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan> </tspan><tspan fill="#55c555">UserCard</tspan><tspan>({ name, role }) {</tspan>
  </text>
  <text x="80" y="142" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">
    <tspan>  </tspan>{/* 훅: 렌더 사이에 정보 유지 */}
  </text>
  <text x="80" y="162" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>  </tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan> [open, setOpen] = useState(</tspan><tspan fill="#7ec8e3" font-weight="600">false</tspan><tspan>);</tspan>
  </text>
  <text x="80" y="190" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">
    <tspan>  </tspan>{/* 파생 계산 */}
  </text>
  <text x="80" y="210" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>  </tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan> label = role === </tspan><tspan fill="#ce9178">'admin'</tspan><tspan> ? </tspan><tspan fill="#ce9178">'관리자'</tspan><tspan> : </tspan><tspan fill="#ce9178">'일반'</tspan><tspan>;</tspan>
  </text>
  <text x="80" y="238" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">
    <tspan>  </tspan>{/* JSX 반환 */}
  </text>
  <text x="80" y="258" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>  </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan> &lt;div onClick={() =&gt; setOpen(!open)}&gt;</tspan>
  </text>
  <text x="80" y="278" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>    &lt;span&gt;{name}&lt;/span&gt;&lt;badge&gt;{label}&lt;/badge&gt;</tspan>
  </text>
  <text x="80" y="298" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>  &lt;/div&gt;;</tspan>
  </text>
  <text x="80" y="318" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>}</tspan>
  </text>

  <!-- annotations -->
  <rect x="560" y="108" width="280" height="54" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="580" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">① Props (입력)</text>
  <text x="580" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">부모가 내려보내는 읽기 전용 값</text>

  <rect x="560" y="180" width="280" height="54" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="580" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">② 훅 (내부 상태)</text>
  <text x="580" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">렌더 사이에 값 유지, 부수 효과</text>

  <rect x="560" y="252" width="280" height="54" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="580" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">③ 계산 (파생 값)</text>
  <text x="580" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">state/props로 결정되는 값</text>

  <rect x="560" y="324" width="280" height="54" rx="8" fill="#111827" stroke="#ce9178" stroke-width="1.5"/>
  <text x="580" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">④ JSX 반환 (출력)</text>
  <text x="580" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">화면에 그릴 구조 기술</text>

  <!-- pure function note -->
  <rect x="60" y="390" width="460" height="56" rx="8" fill="#141414" stroke="#3a3a3a" stroke-width="1"/>
  <text x="290" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">컴포넌트는 순수 함수처럼 동작해야 한다</text>
  <text x="290" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">같은 props → 항상 같은 JSX. 렌더 중 외부 상태 변경 금지</text>
</svg>
