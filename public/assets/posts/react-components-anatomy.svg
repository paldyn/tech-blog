<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;background:#0a0a0a">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">컴포넌트 해부도</text>
  <text x="440" y="72" font-size="14" fill="#888" text-anchor="middle">함수형 컴포넌트의 구조와 각 부분의 역할</text>

  <!-- Main component code -->
  <rect x="55" y="95" width="770" height="280" rx="8" fill="#0a0a0a" stroke="#7ec8e3" stroke-width="2"/>
  <rect x="70" y="110" width="740" height="250" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Line 1: import -->
  <text x="82" y="132" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">import</text>
  <text x="124" y="132" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> { useState } </text>
  <text x="218" y="132" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">from</text>
  <text x="248" y="132" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve"> 'react'</text>
  <!-- annotation -->
  <text x="390" y="132" font-size="12" fill="#7777cc" font-family="'JetBrains Mono',monospace" xml:space="preserve">// ① Hook import</text>

  <!-- Line 2: blank -->
  <!-- Line 3: function signature -->
  <text x="82" y="168" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">function</text>
  <text x="125" y="168" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> Counter({ </text>
  <text x="194" y="168" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">initialCount</text>
  <text x="287" y="168" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> = </text>
  <text x="303" y="168" font-size="13" fill="#b5cea8" font-family="'JetBrains Mono',monospace" xml:space="preserve">0</text>
  <text x="312" y="168" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> }) {</text>
  <text x="390" y="168" font-size="12" fill="#7777cc" font-family="'JetBrains Mono',monospace" xml:space="preserve">// ② props (기본값 설정)</text>

  <!-- Line 4: useState -->
  <text x="82" y="186" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">  const</text>
  <text x="120" y="186" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> [</text>
  <text x="133" y="186" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">count</text>
  <text x="169" y="186" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">, </text>
  <text x="182" y="186" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">setCount</text>
  <text x="234" y="186" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">] = </text>
  <text x="258" y="186" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">useState(initialCount)</text>
  <text x="420" y="186" font-size="12" fill="#7777cc" font-family="'JetBrains Mono',monospace" xml:space="preserve">// ③ 로컬 State</text>

  <!-- Line 5: handler -->
  <text x="82" y="204" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">  const</text>
  <text x="120" y="204" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> increment = () =&gt; setCount(c =&gt; c + </text>
  <text x="348" y="204" font-size="13" fill="#b5cea8" font-family="'JetBrains Mono',monospace" xml:space="preserve">1</text>
  <text x="357" y="204" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">)</text>
  <text x="420" y="204" font-size="12" fill="#7777cc" font-family="'JetBrains Mono',monospace" xml:space="preserve">// ④ 이벤트 핸들러</text>

  <!-- Line 6: return JSX -->
  <text x="82" y="226" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">  return</text>
  <text x="126" y="226" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> (</text>
  <text x="420" y="226" font-size="12" fill="#7777cc" font-family="'JetBrains Mono',monospace" xml:space="preserve">// ⑤ JSX 반환</text>

  <text x="82" y="244" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">    &lt;div className=</text>
  <text x="198" y="244" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">"counter"</text>
  <text x="254" y="244" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&gt;</text>
  <text x="82" y="262" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">      &lt;p&gt;카운트: {count}&lt;/p&gt;</text>
  <text x="82" y="280" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">      &lt;button onClick={increment}&gt;+1&lt;/button&gt;</text>
  <text x="82" y="298" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">    &lt;/div&gt;</text>
  <text x="82" y="316" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">  )</text>
  <text x="82" y="334" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">}</text>

  <!-- Bottom: Rules -->
  <rect x="55" y="395" width="770" height="60" rx="8" fill="#111118" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="418" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">컴포넌트 명명 규칙: 반드시 대문자로 시작 (PascalCase)</text>
  <text x="440" y="440" font-size="12" fill="#888" text-anchor="middle">&lt;counter /&gt; 는 HTML 태그, &lt;Counter /&gt; 는 React 컴포넌트 — React가 대소문자로 구분</text>
</svg>
