<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">컴포넌트 해부 — 함수 컴포넌트 구조</text>

  <!-- Input: props -->
  <rect x="60" y="80" width="160" height="60" rx="8" fill="#0f1629" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="140" y="106" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">props</text>
  <text x="140" y="126" text-anchor="middle" font-size="12" fill="#888">부모가 전달한 데이터</text>
  <line x1="220" y1="110" x2="300" y2="160" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Input: state -->
  <rect x="60" y="180" width="160" height="60" rx="8" fill="#0f2a0f" stroke="#374151" stroke-width="1.5"/>
  <text x="140" y="206" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">state</text>
  <text x="140" y="226" text-anchor="middle" font-size="12" fill="#888">컴포넌트 내부 상태</text>
  <line x1="220" y1="210" x2="300" y2="200" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Component Function box -->
  <rect x="300" y="90" width="320" height="220" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="460" y="114" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">컴포넌트 함수</text>
  <rect x="316" y="124" width="288" height="172" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve">
    <tspan x="332" y="146" fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> Card({ title, desc }) {</tspan>
    <tspan x="332" dy="18" fill="#7ec8e3" font-weight="600">  const</tspan><tspan fill="#ffffff"> [liked, setLiked] =</tspan>
    <tspan x="332" dy="18" fill="#ffffff">    useState(</tspan><tspan fill="#7ec8e3" font-weight="600">false</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="332" dy="18"> </tspan>
    <tspan x="332" dy="18" fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> (</tspan>
    <tspan x="332" dy="18" fill="#ffffff">    </tspan><tspan fill="#ce9178">&lt;div&gt;</tspan>
    <tspan x="332" dy="18" fill="#ffffff">      </tspan><tspan fill="#ce9178">&lt;h2&gt;</tspan><tspan fill="#ffffff">{title}</tspan><tspan fill="#ce9178">&lt;/h2&gt;</tspan>
    <tspan x="332" dy="18" fill="#ffffff">    </tspan><tspan fill="#ce9178">&lt;/div&gt;</tspan>
    <tspan x="332" dy="18" fill="#ffffff">  );</tspan>
    <tspan x="332" dy="18" fill="#ffffff">}</tspan>
  </text>

  <!-- Output: JSX -->
  <line x1="620" y1="200" x2="700" y2="200" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>
  <rect x="700" y="168" width="140" height="64" rx="8" fill="#0f2a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="770" y="196" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">JSX 반환</text>
  <text x="770" y="216" text-anchor="middle" font-size="12" fill="#888">React Element</text>

  <!-- Rules section -->
  <rect x="60" y="340" width="760" height="100" rx="10" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="440" y="365" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">컴포넌트 두 가지 규칙</text>

  <rect x="76" y="378" width="340" height="50" rx="6" fill="#1e1b4b" stroke="#3a4a6e" stroke-width="1"/>
  <text x="246" y="400" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">① 이름은 반드시 대문자로 시작</text>
  <text x="246" y="420" text-anchor="middle" font-size="12" fill="#888">소문자면 HTML 태그로 해석됨</text>

  <rect x="464" y="378" width="340" height="50" rx="6" fill="#1e1b4b" stroke="#3a4a6e" stroke-width="1"/>
  <text x="634" y="400" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">② JSX 또는 null 반환</text>
  <text x="634" y="420" text-anchor="middle" font-size="12" fill="#888">아무것도 안 보여주려면 null 반환</text>
</svg>
