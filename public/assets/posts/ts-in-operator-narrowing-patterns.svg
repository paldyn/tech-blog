<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <!-- Background -->
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">in 연산자와 판별 유니온 패턴</text>

  <!-- Pattern 1: Discriminated Union with in -->
  <rect x="40" y="66" width="400" height="200" rx="8" fill="#0a1628" stroke="#3178c6" stroke-width="1.5"/>
  <text x="240" y="90" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">① 판별 유니온 (Discriminated Union)</text>
  <rect x="56" y="100" width="368" height="152" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="72" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">type</tspan><tspan fill="#ffffff"> Shape =</tspan></text>
  <text x="72" y="139" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  | { </tspan><tspan fill="#7ec8e3" font-weight="600">kind</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"circle"</tspan><tspan fill="#ffffff">; </tspan><tspan fill="#7ec8e3" font-weight="600">radius</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff"> }</tspan></text>
  <text x="72" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  | { </tspan><tspan fill="#7ec8e3" font-weight="600">kind</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"rect"</tspan><tspan fill="#ffffff">; </tspan><tspan fill="#7ec8e3" font-weight="600">w</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff">; </tspan><tspan fill="#7ec8e3" font-weight="600">h</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff"> };</tspan></text>
  <text x="72" y="181" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> area(s: Shape) {</tspan></text>
  <text x="72" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> (</tspan><tspan fill="#ce9178">"radius"</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> s) {</tspan></text>
  <text x="72" y="219" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#9aa4b8">// s: { kind: "circle"; radius: number }</tspan></text>
  <text x="72" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> Math.PI * s.</tspan><tspan fill="#7ec8e3" font-weight="600">radius</tspan><tspan fill="#ffffff"> ** </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">;</tspan></text>

  <!-- Pattern 2: in with optional properties -->
  <rect x="460" y="66" width="400" height="200" rx="8" fill="#0a1628" stroke="#3178c6" stroke-width="1.5"/>
  <text x="660" y="90" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">② 옵셔널 프로퍼티 확인</text>
  <rect x="476" y="100" width="368" height="152" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">type</tspan><tspan fill="#ffffff"> User = {</tspan></text>
  <text x="492" y="139" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">name</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="492" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">email</tspan><tspan fill="#ffffff">?: </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="492" y="177" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">};</tspan></text>
  <text x="492" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> notify(u: User) {</tspan></text>
  <text x="492" y="219" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> (</tspan><tspan fill="#ce9178">"email"</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> u) {</tspan></text>
  <text x="492" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#9aa4b8">// u.email: string</tspan></text>

  <!-- Pattern 3: in vs hasOwnProperty comparison -->
  <rect x="40" y="286" width="400" height="150" rx="8" fill="#0a1628" stroke="#3178c6" stroke-width="1.5"/>
  <text x="240" y="310" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">③ in vs hasOwnProperty</text>
  <rect x="56" y="320" width="368" height="102" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="72" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// in: 프로토타입 체인 포함 검사</tspan></text>
  <text x="72" y="359" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ce9178">"toString"</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> {}  </tspan><tspan fill="#9aa4b8">// true (프로토타입)</tspan></text>
  <text x="72" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// TS 타입 좁히기는 in 사용 권장</tspan></text>
  <text x="72" y="397" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> (</tspan><tspan fill="#ce9178">"bark"</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> animal) { </tspan><tspan fill="#9aa4b8">/* Dog */</tspan><tspan fill="#ffffff"> }</tspan></text>

  <!-- Pattern 4: Multiple in checks -->
  <rect x="460" y="286" width="400" height="150" rx="8" fill="#0a1628" stroke="#3178c6" stroke-width="1.5"/>
  <text x="660" y="310" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">④ 복합 in 체크</text>
  <rect x="476" y="320" width="368" height="102" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">type</tspan><tspan fill="#ffffff"> Admin = User &amp; { </tspan><tspan fill="#7ec8e3" font-weight="600">role</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff"> };</tspan></text>
  <text x="492" y="359" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> check(u: User | Admin) {</tspan></text>
  <text x="492" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> (</tspan><tspan fill="#ce9178">"role"</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> u) {</tspan></text>
  <text x="492" y="397" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#9aa4b8">// u: Admin — role 접근 가능</tspan></text>
</svg>
