<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Cache API 요청 흐름</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">Cache-First vs Network-First 전략</text>

  <!-- LEFT: Cache-First -->
  <rect x="60" y="95" width="360" height="350" rx="8" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">Cache-First</text>

  <!-- Step boxes -->
  <rect x="90" y="138" width="260" height="38" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="220" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">요청 수신</text>

  <line x1="220" y1="176" x2="220" y2="194" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="214,194 220,206 226,194" fill="#55c555"/>

  <rect x="90" y="206" width="260" height="38" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="220" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">caches.match(request)</text>

  <!-- Branch -->
  <line x1="220" y1="244" x2="220" y2="260" stroke="#55c555" stroke-width="1.5"/>

  <rect x="90" y="260" width="112" height="38" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="146" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">캐시 HIT</text>

  <rect x="218" y="260" width="132" height="38" rx="6" fill="#1f0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="284" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">캐시 MISS</text>

  <!-- HIT arrow down -->
  <line x1="146" y1="298" x2="146" y2="316" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="140,316 146,328 152,316" fill="#55c555"/>
  <rect x="90" y="328" width="112" height="38" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="146" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">캐시 응답 반환 ✓</text>

  <!-- MISS arrow down -->
  <line x1="284" y1="298" x2="284" y2="316" stroke="#e05555" stroke-width="1.5"/>
  <polygon points="278,316 284,328 290,316" fill="#e05555"/>
  <rect x="218" y="328" width="132" height="38" rx="6" fill="#1f0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="284" y="347" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">네트워크 fetch</text>
  <text x="284" y="361" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">+ 캐시 저장</text>

  <text x="240" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">오프라인 우선 / 정적 에셋에 적합</text>

  <!-- RIGHT: Network-First -->
  <rect x="460" y="95" width="360" height="350" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="640" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">Network-First</text>

  <rect x="490" y="138" width="300" height="38" rx="6" fill="#0d1a1f" stroke="#7ec8e3" stroke-width="1"/>
  <text x="640" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">요청 수신</text>

  <line x1="640" y1="176" x2="640" y2="194" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="634,194 640,206 646,194" fill="#7ec8e3"/>

  <rect x="490" y="206" width="300" height="38" rx="6" fill="#0d1a1f" stroke="#7ec8e3" stroke-width="1"/>
  <text x="640" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">fetch(request) 시도</text>

  <line x1="640" y1="244" x2="640" y2="260" stroke="#7ec8e3" stroke-width="1.5"/>

  <rect x="490" y="260" width="132" height="38" rx="6" fill="#0d1a1f" stroke="#7ec8e3" stroke-width="1"/>
  <text x="556" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">성공 → 캐시 갱신</text>

  <rect x="638" y="260" width="112" height="38" rx="6" fill="#1f1400" stroke="#e8b84b" stroke-width="1"/>
  <text x="694" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8b84b">실패(오프라인)</text>

  <line x1="556" y1="298" x2="556" y2="316" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="550,316 556,328 562,316" fill="#7ec8e3"/>
  <rect x="490" y="328" width="132" height="38" rx="6" fill="#0d1a1f" stroke="#7ec8e3" stroke-width="1"/>
  <text x="556" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">네트워크 응답 반환</text>

  <line x1="694" y1="298" x2="694" y2="316" stroke="#e8b84b" stroke-width="1.5"/>
  <polygon points="688,316 694,328 700,316" fill="#e8b84b"/>
  <rect x="638" y="328" width="112" height="38" rx="6" fill="#1f1400" stroke="#e8b84b" stroke-width="1"/>
  <text x="694" y="347" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8b84b">캐시 폴백</text>
  <text x="694" y="361" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">구버전 응답</text>

  <text x="640" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">API / 최신 데이터 우선 / 폴백 필요 시</text>

  <!-- Bottom note -->
  <text x="440" y="462" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Service Worker의 fetch 이벤트 안에서 전략을 선택</text>
</svg>
