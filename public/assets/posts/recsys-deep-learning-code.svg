<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 330">
  <!-- 배경 -->
  <rect width="880" height="330" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="38" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">PyTorch NCF 구현</text>
  <text x="440" y="58" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Neural Collaborative Filtering</text>

  <!-- 코드 박스 -->
  <rect x="60" y="72" width="760" height="238" fill="#000000" stroke="#3a4a6e" stroke-width="1.5" rx="6"/>

