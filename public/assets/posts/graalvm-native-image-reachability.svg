<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Reachability Metadata — 도달 가능성 메타데이터</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">동적 기능을 빌드 시점에 명시하는 JSON 구성</text>

  <!-- Center: native-image tool -->
  <rect x="340" y="94" width="200" height="56" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">native-image</text>
  <text x="440" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">정적 분석 + 메타데이터 병합</text>

  <!-- Metadata boxes left column -->
  <!-- Reflection -->
  <rect x="60" y="94" width="200" height="56" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">리플렉션</text>
  <text x="160" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">reflect-config.json</text>

  <!-- JNI -->
  <rect x="60" y="170" width="200" height="56" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">JNI</text>
  <text x="160" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">jni-config.json</text>

  <!-- Resources -->
  <rect x="60" y="246" width="200" height="56" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">리소스</text>
  <text x="160" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">resource-config.json</text>

  <!-- Proxy -->
  <rect x="60" y="322" width="200" height="56" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="346" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">동적 프록시</text>
  <text x="160" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">proxy-config.json</text>

  <!-- Arrows left → center -->
  <line x1="260" y1="122" x2="340" y2="122" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <line x1="260" y1="198" x2="310" y2="140" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <line x1="260" y1="274" x2="310" y2="148" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <line x1="260" y1="350" x2="310" y2="150" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr-purple)"/>

  <!-- Code box: reflect-config.json example -->
  <rect x="340" y="170" width="480" height="168" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="356" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// reflect-config.json (발췌)</text>
  <text x="356" y="211" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">[</text>
  <text x="356" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  {</text>
  <text x="356" y="249" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    <tspan fill="#ce9178">"name"</tspan>: <tspan fill="#ce9178">"com.example.MyService"</tspan>,</text>
  <text x="356" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    <tspan fill="#ce9178">"allDeclaredMethods"</tspan>: <tspan fill="#7ec8e3" font-weight="600">true</tspan>,</text>
  <text x="356" y="287" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    <tspan fill="#ce9178">"allDeclaredConstructors"</tspan>: <tspan fill="#7ec8e3" font-weight="600">true</tspan></text>
  <text x="356" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  }</text>
  <text x="356" y="325" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">]</text>

  <!-- Tracing agent tip -->
  <rect x="340" y="358" width="480" height="60" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="360" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">자동 수집: Tracing Agent</text>
  <text x="360" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">-agentlib:native-image-agent=config-output-dir=META-INF/native-image</text>

  <!-- GraalVM reachability metadata repo -->
  <rect x="60" y="430" width="760" height="50" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">GraalVM Reachability Metadata Repository</text>
  <text x="440" y="470" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">oracle/graalvm-reachability-metadata — 주요 오픈소스 라이브러리용 메타데이터 커뮤니티 관리</text>
</svg>
