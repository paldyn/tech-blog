<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arrblue" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrred" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arrgreen" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">아호-코라식: 트라이 + 실패 링크 구조</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">패턴: {"he", "she", "his", "hers"} — 실패 링크로 다중 패턴 동시 탐색</text>

  <!-- Trie nodes -->
  <!-- Root -->
  <circle cx="440" cy="116" r="22" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">root</text>
  <text x="440" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">0</text>

  <!-- Level 1 -->
  <circle cx="240" cy="210" r="22" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="214" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e8e8e8">h</text>
  <text x="240" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">1</text>

  <circle cx="560" cy="210" r="22" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="560" y="214" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e8e8e8">s</text>
  <text x="560" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">3</text>

  <!-- Root to L1 arrows -->
  <line x1="422" y1="134" x2="258" y2="192" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrblue)"/>
  <text x="325" y="164" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">h</text>
  <line x1="458" y1="134" x2="542" y2="192" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrblue)"/>
  <text x="510" y="164" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">s</text>

  <!-- Level 2 under h -->
  <circle cx="150" cy="310" r="22" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="150" y="314" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#55c555">e</text>
  <text x="150" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">2 ✓he</text>

  <circle cx="330" cy="310" r="22" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="330" y="314" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e8e8e8">i</text>
  <text x="330" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">6</text>

  <line x1="228" y1="230" x2="168" y2="292" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrblue)"/>
  <text x="190" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">e</text>
  <line x1="252" y1="230" x2="312" y2="292" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrblue)"/>
  <text x="285" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">i</text>

  <!-- Level 2 under s -->
  <circle cx="560" cy="310" r="22" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="560" y="314" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e8e8e8">h</text>
  <text x="560" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">4</text>
  <line x1="560" y1="232" x2="560" y2="288" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrblue)"/>
  <text x="574" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">h</text>

  <!-- Level 3 -->
  <circle cx="150" cy="410" r="22" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="150" y="414" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#55c555">r</text>
  <text x="150" y="428" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">5</text>

  <circle cx="330" cy="410" r="22" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="330" y="414" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#55c555">s</text>
  <text x="330" y="428" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">7 ✓his</text>

  <circle cx="560" cy="410" r="22" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="560" y="414" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#55c555">e</text>
  <text x="560" y="428" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">5 ✓she</text>

  <line x1="150" y1="332" x2="150" y2="388" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrblue)"/>
  <text x="164" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">r</text>
  <line x1="330" y1="332" x2="330" y2="388" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrblue)"/>
  <text x="344" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">s</text>
  <line x1="560" y1="332" x2="560" y2="388" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrblue)"/>
  <text x="574" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">e</text>

  <!-- Failure links (dashed red) -->
  <path d="M 538 310 Q 480 270 352 210 Q 320 200 302 210" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" fill="none" marker-end="url(#arrred)"/>
  <text x="420" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">fail</text>

  <path d="M 538 410 Q 460 380 390 340 Q 340 318 352 310" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" fill="none" marker-end="url(#arrred)"/>

  <!-- Legend -->
  <rect x="680" y="200" width="170" height="130" fill="#111" stroke="#2a3a2a" stroke-width="1" rx="6"/>
  <text x="765" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8">범례</text>
  <circle cx="698" cy="244" r="8" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="714" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">패턴 완성 노드</text>
  <circle cx="698" cy="268" r="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="714" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">트라이 엣지</text>
  <line x1="690" y1="292" x2="706" y2="292" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="714" y="297" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">실패 링크</text>
  <text x="765" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">O(n + 총 매칭)</text>
</svg>
