<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">OutOfMemoryError는 어느 메모리에서 터지나</text>

  <!-- col 1: Java Heap -->
  <rect x="50" y="80" width="240" height="200" rx="8" fill="#0f1626" stroke="#3a4a6e" stroke-width="1"/>
  <text x="170" y="110" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">Java Heap</text>
  <text x="170" y="132" font-size="12" fill="#888" text-anchor="middle">객체가 사는 영역</text>
  <rect x="62" y="148" width="216" height="50" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="170" y="170" font-size="12" fill="#ffffff" text-anchor="middle" font-family="'JetBrains Mono','Menlo',monospace">Java heap space</text>
  <text x="170" y="188" font-size="11" fill="#888" text-anchor="middle">힙이 가득 참</text>
  <rect x="62" y="210" width="216" height="50" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="170" y="232" font-size="12" fill="#ffffff" text-anchor="middle" font-family="'JetBrains Mono','Menlo',monospace">GC overhead limit</text>
  <text x="170" y="250" font-size="11" fill="#888" text-anchor="middle">GC만 돌고 회수 거의 0</text>

  <!-- col 2: Metaspace -->
  <rect x="320" y="80" width="240" height="200" rx="8" fill="#0f1626" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="110" font-size="16" font-weight="600" fill="#e0a055" text-anchor="middle">Metaspace</text>
  <text x="440" y="132" font-size="12" fill="#888" text-anchor="middle">클래스 메타데이터</text>
  <rect x="332" y="148" width="216" height="50" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="170" font-size="12" fill="#ffffff" text-anchor="middle" font-family="'JetBrains Mono','Menlo',monospace">Metaspace</text>
  <text x="440" y="188" font-size="11" fill="#888" text-anchor="middle">클래스 과다 로딩</text>
  <rect x="332" y="210" width="216" height="50" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="232" font-size="12" fill="#ffffff" text-anchor="middle">동적 클래스·프록시</text>
  <text x="440" y="250" font-size="11" fill="#888" text-anchor="middle">언로드 안 되는 로더</text>

  <!-- col 3: Native -->
  <rect x="590" y="80" width="240" height="200" rx="8" fill="#0f1626" stroke="#3a4a6e" stroke-width="1"/>
  <text x="710" y="110" font-size="16" font-weight="600" fill="#e05555" text-anchor="middle">Native Memory</text>
  <text x="710" y="132" font-size="12" fill="#888" text-anchor="middle">힙 밖 OS 메모리</text>
  <rect x="602" y="148" width="216" height="50" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="710" y="170" font-size="11.5" fill="#ffffff" text-anchor="middle" font-family="'JetBrains Mono','Menlo',monospace">native thread</text>
  <text x="710" y="188" font-size="11" fill="#888" text-anchor="middle">스레드 과다 생성</text>
  <rect x="602" y="210" width="216" height="50" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="710" y="232" font-size="11.5" fill="#ffffff" text-anchor="middle" font-family="'JetBrains Mono','Menlo',monospace">Direct buffer memory</text>
  <text x="710" y="250" font-size="11" fill="#888" text-anchor="middle">NIO 다이렉트 버퍼</text>
</svg>
