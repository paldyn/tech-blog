<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-y" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8c55e"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">FUSE 아키텍처 — 사용자 공간 파일시스템</text>

  <!-- Layer labels -->
  <text x="50" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">사용자</text>
  <text x="50" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">커널</text>

  <!-- User App -->
  <rect x="120" y="75" width="160" height="50" rx="8" fill="#1a2030" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="200" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">사용자 애플리케이션</text>
  <text x="200" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">open() / read() / write()</text>

  <!-- FUSE User Process -->
  <rect x="540" y="75" width="200" height="50" rx="8" fill="#1a1200" stroke="#e8c55e" stroke-width="1.5"/>
  <text x="640" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8c55e" text-anchor="middle">FUSE 데몬 (사용자 공간)</text>
  <text x="640" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">libfuse / 사용자 구현 콜백</text>

  <!-- Kernel divider -->
  <line x1="80" y1="148" x2="820" y2="148" stroke="#333" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- VFS -->
  <rect x="300" y="165" width="200" height="50" rx="8" fill="#0f2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="400" y="187" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">VFS (가상 파일시스템)</text>
  <text x="400" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">커널 파일시스템 추상 레이어</text>

  <!-- FUSE kernel module -->
  <rect x="300" y="265" width="200" height="50" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="400" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">fuse.ko (커널 모듈)</text>
  <text x="400" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">/dev/fuse 장치 파일</text>

  <!-- Arrows: App -> VFS -> FUSE kernel -> FUSE daemon -> kernel -> App -->
  <!-- App down to VFS -->
  <line x1="200" y1="125" x2="200" y2="178" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="200" y1="178" x2="300" y2="190" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- VFS down to fuse.ko -->
  <line x1="400" y1="215" x2="400" y2="265" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- fuse.ko -> /dev/fuse -> FUSE daemon -->
  <path d="M 500 290 C 580 290 560 100 550 100" stroke="#e8c55e" stroke-width="2" stroke-dasharray="4,4" fill="none" marker-end="url(#arr-y)"/>
  <text x="560" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8c55e">/dev/fuse</text>
  <text x="560" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8c55e">read/write</text>

  <!-- FUSE daemon response back -->
  <path d="M 540 125 C 510 125 490 290 500 290" stroke="#e8c55e" stroke-width="2" stroke-dasharray="4,4" fill="none" marker-end="url(#arr-y)"/>

  <!-- Result back to app -->
  <line x1="300" y1="215" x2="200" y2="215" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="200" y1="215" x2="200" y2="148" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Flow labels -->
  <text x="185" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">① 시스템콜</text>
  <text x="185" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">⑥ 결과 반환</text>
  <text x="340" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">② VFS 라우팅</text>
  <text x="170" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">③ FUSE 커널로</text>
  <text x="614" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8c55e">④ 데몬에 요청</text>
  <text x="505" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8c55e">⑤ 응답</text>

  <!-- Examples box -->
  <rect x="60" y="360" width="760" height="116" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="383" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">FUSE 파일시스템 사용 사례</text>

  <text x="100" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">sshfs</text>
  <text x="100" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">SSH로 원격 서버 마운트</text>

  <text x="270" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">rclone mount</text>
  <text x="270" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">S3·GCS·Dropbox 마운트</text>

  <text x="460" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8c55e">gocryptfs</text>
  <text x="460" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">투명 암호화 파일시스템</text>

  <text x="650" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">SQLiteFS</text>
  <text x="650" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">DB를 파일시스템으로</text>

  <text x="440" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">커널 코드 없이 사용자 공간(Python·Go·Rust 등)으로 파일시스템 구현 가능</text>
</svg>
