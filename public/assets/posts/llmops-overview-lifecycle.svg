<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="lc-arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="lc-feedback" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">LLM 운영 라이프사이클</text>

  <!-- 6 cycle nodes -->
  <!-- 1. 요구사항 -->
  <rect x="60" y="80" width="130" height="70" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="125" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">요구사항 정의</text>
  <text x="125" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">유스케이스 · KPI</text>
  <text x="125" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">데이터 수집 계획</text>

  <!-- 2. 모델 선택 -->
  <rect x="240" y="80" width="130" height="70" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="305" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">모델 선택</text>
  <text x="305" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">API vs 자체 호스팅</text>
  <text x="305" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">벤치마크 비교</text>

  <!-- 3. 프롬프트 개발 -->
  <rect x="420" y="80" width="130" height="70" rx="8" fill="#2a1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="485" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">프롬프트 개발</text>
  <text x="485" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">엔지니어링 · 평가</text>
  <text x="485" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">버전 관리</text>

  <!-- 4. 파인튜닝 (선택) -->
  <rect x="600" y="80" width="130" height="70" rx="8" fill="#2a1a2a" stroke="#e05555" stroke-width="1.5"/>
  <text x="665" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">파인튜닝</text>
  <text x="665" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(선택 사항)</text>
  <text x="665" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">LoRA · SFT · RLHF</text>
  <text x="665" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">레지스트리 등록</text>

  <!-- Arrows row 1 -->
  <line x1="190" y1="115" x2="238" y2="115" stroke="#7ec8e3" stroke-width="2" marker-end="url(#lc-arr)"/>
  <line x1="370" y1="115" x2="418" y2="115" stroke="#7ec8e3" stroke-width="2" marker-end="url(#lc-arr)"/>
  <line x1="550" y1="115" x2="598" y2="115" stroke="#7ec8e3" stroke-width="2" marker-end="url(#lc-arr)"/>

  <!-- 5. 배포 -->
  <rect x="600" y="210" width="130" height="70" rx="8" fill="#1a2a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="665" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">배포</text>
  <text x="665" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">API 서빙 · 캐싱</text>
  <text x="665" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Fallback 전략</text>

  <!-- Arrow 4->5 -->
  <line x1="665" y1="180" x2="665" y2="208" stroke="#7ec8e3" stroke-width="2" marker-end="url(#lc-arr)"/>

  <!-- 6. 모니터링 -->
  <rect x="420" y="210" width="130" height="70" rx="8" fill="#2a2a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="485" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">모니터링</text>
  <text x="485" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">토큰 비용 · 레이턴시</text>
  <text x="485" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">품질 · 환각 감지</text>

  <!-- Arrow 5->6 -->
  <line x1="600" y1="245" x2="552" y2="245" stroke="#7ec8e3" stroke-width="2" marker-end="url(#lc-arr)"/>

  <!-- Feedback loop: 6 -> 3 (점선) -->
  <path d="M 485 210 Q 485 170 485 152" stroke="#e05555" stroke-width="2" fill="none"
        stroke-dasharray="4,4" marker-end="url(#lc-feedback)"/>
  <text x="510" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">피드백 루프</text>

  <!-- code block -->
  <rect x="60" y="310" width="760" height="90" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># LLMOps 핵심 지표 모니터링</text>
  <text x="76" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">metrics</tspan><tspan fill="#ffffff"> = {</tspan></text>
  <text x="76" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#ce9178">"cost_per_request"</tspan><tspan fill="#ffffff">: token_count * price_per_token,</tspan></text>
  <text x="76" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#ce9178">"hallucination_rate"</tspan><tspan fill="#ffffff">: eval_score / total_requests,</tspan></text>
  <text x="76" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#ce9178">"p99_latency_ms"</tspan><tspan fill="#ffffff">: percentile(latencies, </tspan><tspan fill="#b5cea8">99</tspan><tspan fill="#ffffff">)}</tspan></text>
</svg>
