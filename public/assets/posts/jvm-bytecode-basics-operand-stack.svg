<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">오퍼랜드 스택 실행 모델 — add(3, 4) 단계별 추적</text>

  <!-- ===== Left: Bytecode code block ===== -->
  <rect x="60" y="72" width="310" height="306" fill="#0d1117" rx="10" stroke="#1e2433" stroke-width="1.5"/>
  <text x="215" y="98" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#e8e8e8">바이트코드 (javap -c)</text>
  <text x="215" y="116" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">static int add(int a, int b)</text>

  <rect x="76" y="128" width="278" height="200" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="88" y="148" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#6a8aa0">// 로컬 변수: local[0]=a, local[1]=b</text>
  <text x="88" y="166" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#6a8aa0">// 예: add(3, 4) 호출</text>
  <text x="88" y="184" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#b5cea8">0</text>
  <text x="100" y="184" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">: </text>
  <text x="116" y="184" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#7ec8e3">iload_0</text>
  <text x="190" y="184" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#6a8aa0">// push local[0]→a</text>
  <text x="88" y="202" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#b5cea8">1</text>
  <text x="100" y="202" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">: </text>
  <text x="116" y="202" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#7ec8e3">iload_1</text>
  <text x="190" y="202" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#6a8aa0">// push local[1]→b</text>
  <text x="88" y="220" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#b5cea8">2</text>
  <text x="100" y="220" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">: </text>
  <text x="116" y="220" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#7ec8e3">iadd</text>
  <text x="190" y="220" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#6a8aa0">// pop 2→push sum</text>
  <text x="88" y="238" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#b5cea8">3</text>
  <text x="100" y="238" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">: </text>
  <text x="116" y="238" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#7ec8e3">ireturn</text>
  <text x="190" y="238" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#6a8aa0">// pop→반환값</text>
  <text x="88" y="310" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#6a8aa0">; Stack: LIFO, 최대 깊이=2</text>

  <text x="215" y="354" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">스택 기반 가상 머신</text>
  <text x="215" y="372" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">로컬 변수 테이블 ↔ 오퍼랜드 스택</text>

  <!-- ===== Right: 4 stack state cells (2x2) ===== -->
  <!-- Cell labels row 1 -->
  <text x="523" y="90" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7ec8e3">① iload_0 실행 후</text>
  <text x="726" y="90" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7ec8e3">② iload_1 실행 후</text>

  <!-- Cell 1: x=430, y=100, w=186, h=148 -->
  <rect x="430" y="100" width="186" height="148" fill="#0d1117" rx="8" stroke="#1e2433" stroke-width="1.5"/>
  <text x="523" y="124" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">스택 (top ↓)</text>
  <!-- Stack item: 3 -->
  <rect x="456" y="132" width="134" height="30" fill="#1a3040" rx="4" stroke="#7ec8e3" stroke-width="1"/>
  <text x="523" y="152" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7ec8e3">3  (a = local[0])</text>
  <text x="523" y="200" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#6a8aa0">push local[0]=a</text>
  <text x="523" y="216" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#6a8aa0">스택 깊이: 1</text>
  <text x="523" y="238" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">[ 3 ]</text>

  <!-- Cell 2: x=626, y=100, w=186, h=148 -->
  <rect x="626" y="100" width="186" height="148" fill="#0d1117" rx="8" stroke="#1e2433" stroke-width="1.5"/>
  <text x="719" y="124" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">스택 (top ↓)</text>
  <!-- Stack item top: 4 -->
  <rect x="652" y="132" width="134" height="28" fill="#1a3040" rx="4" stroke="#7ec8e3" stroke-width="1"/>
  <text x="719" y="151" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7ec8e3">4  (b = local[1])</text>
  <!-- Stack item bottom: 3 -->
  <rect x="652" y="164" width="134" height="28" fill="#152030" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="719" y="183" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" fill="#888">3</text>
  <text x="719" y="220" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#6a8aa0">스택 깊이: 2</text>
  <text x="719" y="238" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">[ 3, 4 ]  ← top</text>

  <!-- Cell labels row 2 -->
  <text x="523" y="272" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#55c555">③ iadd 실행 후</text>
  <text x="726" y="272" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#e05555">④ ireturn 실행 후</text>

  <!-- Cell 3: x=430, y=282, w=186, h=148 -->
  <rect x="430" y="282" width="186" height="148" fill="#0d1117" rx="8" stroke="#1e2433" stroke-width="1.5"/>
  <text x="523" y="306" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">스택 (top ↓)</text>
  <!-- Stack item: 7 -->
  <rect x="456" y="314" width="134" height="30" fill="#1a3a1a" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="523" y="334" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#55c555">7  (3 + 4)</text>
  <text x="523" y="382" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#6a8aa0">pop 2 → 더하기 → push</text>
  <text x="523" y="400" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#6a8aa0">스택 깊이: 1</text>
  <text x="523" y="420" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">[ 7 ]</text>

  <!-- Cell 4: x=626, y=282, w=186, h=148 -->
  <rect x="626" y="282" width="186" height="148" fill="#0d1117" rx="8" stroke="#1e2433" stroke-width="1.5"/>
  <text x="719" y="308" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">스택 비어 있음</text>
  <rect x="652" y="316" width="134" height="42" fill="#2a1010" rx="4" stroke="#e05555" stroke-width="1"/>
  <text x="719" y="334" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e05555">반환값: 7</text>
  <text x="719" y="350" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">호출자 스택으로</text>
  <text x="719" y="382" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#6a8aa0">pop top → 호출 프레임으로</text>
  <text x="719" y="400" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#6a8aa0">현재 프레임 소멸</text>
  <text x="719" y="420" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">[ empty ]</text>

  <!-- Caption -->
  <text x="440" y="458" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#6a8aa0">JVM 오퍼랜드 스택은 LIFO 구조 — 명령어마다 push/pop으로 중간 값을 처리한다</text>
</svg>
