<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">컴포넌트 스캔 동작 과정</text>
  <text x="440" y="68" text-anchor="middle" font-size="14" font-weight="600" fill="#888">@ComponentScan이 실행될 때 스프링 내부에서 일어나는 일</text>

  <!-- Step flow: 4 horizontal stages with arrows -->
  <!-- Stage widths: each ~160px, gaps 40px -->
  <!-- Stages centered at: 100, 300, 500, 700 (approx) -->

  <!-- Stage 1: @ComponentScan 선언 -->
  <rect x="60" y="96" width="160" height="80" rx="8" fill="#0f1a20" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="126" text-anchor="middle" font-size="13" font-weight="700" fill="#7ec8e3">① 스캔 선언</text>
  <text x="140" y="146" text-anchor="middle" font-size="12" fill="#888">@ComponentScan</text>
  <text x="140" y="162" text-anchor="middle" font-size="12" fill="#888">basePackages 지정</text>

  <!-- Arrow 1→2 -->
  <line x1="220" y1="136" x2="258" y2="136" stroke="#444" stroke-width="1.5"/>
  <polygon points="261,136 251,130 251,142" fill="#444"/>

  <!-- Stage 2: classpath 탐색 -->
  <rect x="260" y="96" width="160" height="80" rx="8" fill="#0f1a20" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="340" y="126" text-anchor="middle" font-size="13" font-weight="700" fill="#7ec8e3">② classpath 탐색</text>
  <text x="340" y="146" text-anchor="middle" font-size="12" fill="#888">패키지 하위의</text>
  <text x="340" y="162" text-anchor="middle" font-size="12" fill="#888">.class 파일 수집</text>

  <!-- Arrow 2→3 -->
  <line x1="420" y1="136" x2="458" y2="136" stroke="#444" stroke-width="1.5"/>
  <polygon points="461,136 451,130 451,142" fill="#444"/>

  <!-- Stage 3: 어노테이션 필터링 -->
  <rect x="460" y="96" width="160" height="80" rx="8" fill="#0f1814" stroke="#55c555" stroke-width="1.5"/>
  <text x="540" y="126" text-anchor="middle" font-size="13" font-weight="700" fill="#55c555">③ 어노테이션 필터</text>
  <text x="540" y="146" text-anchor="middle" font-size="12" fill="#888">@Component 계열</text>
  <text x="540" y="162" text-anchor="middle" font-size="12" fill="#888">클래스만 통과</text>

  <!-- Arrow 3→4 -->
  <line x1="620" y1="136" x2="658" y2="136" stroke="#444" stroke-width="1.5"/>
  <polygon points="661,136 651,130 651,142" fill="#444"/>

  <!-- Stage 4: BeanDefinition 등록 -->
  <rect x="660" y="96" width="160" height="80" rx="8" fill="#0f1814" stroke="#55c555" stroke-width="1.5"/>
  <text x="740" y="126" text-anchor="middle" font-size="13" font-weight="700" fill="#55c555">④ 빈 정의 등록</text>
  <text x="740" y="146" text-anchor="middle" font-size="12" fill="#888">BeanDefinition</text>
  <text x="740" y="162" text-anchor="middle" font-size="12" fill="#888">Registry에 추가</text>

  <!-- Stereotype annotations -->
  <text x="440" y="210" text-anchor="middle" font-size="14" font-weight="600" fill="#888">@Component 계열 스테레오타입 어노테이션</text>

  <!-- Four annotation boxes: @Component, @Service, @Repository, @Controller -->
  <rect x="60" y="224" width="170" height="70" rx="7" fill="#0e0e1a" stroke="#7777cc" stroke-width="1"/>
  <text x="145" y="250" text-anchor="middle" font-size="14" font-weight="700" fill="#7777cc">@Component</text>
  <text x="145" y="270" text-anchor="middle" font-size="11" fill="#888">범용 컴포넌트</text>
  <text x="145" y="284" text-anchor="middle" font-size="11" fill="#888">레이어 구분 없음</text>

  <rect x="250" y="224" width="170" height="70" rx="7" fill="#0a1814" stroke="#55c555" stroke-width="1"/>
  <text x="335" y="250" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">@Service</text>
  <text x="335" y="270" text-anchor="middle" font-size="11" fill="#888">비즈니스 로직 레이어</text>
  <text x="335" y="284" text-anchor="middle" font-size="11" fill="#888">@Component 확장</text>

  <rect x="440" y="224" width="170" height="70" rx="7" fill="#1a0e08" stroke="#e8903a" stroke-width="1"/>
  <text x="525" y="250" text-anchor="middle" font-size="14" font-weight="700" fill="#e8903a">@Repository</text>
  <text x="525" y="270" text-anchor="middle" font-size="11" fill="#888">데이터 접근 레이어</text>
  <text x="525" y="284" text-anchor="middle" font-size="11" fill="#888">예외 변환 기능 추가</text>

  <rect x="630" y="224" width="190" height="70" rx="7" fill="#0a0f1a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="725" y="250" text-anchor="middle" font-size="14" font-weight="700" fill="#7ec8e3">@Controller</text>
  <text x="725" y="270" text-anchor="middle" font-size="11" fill="#888">웹 요청 처리 레이어</text>
  <text x="725" y="284" text-anchor="middle" font-size="11" fill="#888">DispatcherServlet 연동</text>

  <!-- Bean naming rule -->
  <rect x="60" y="314" width="760" height="80" rx="8" fill="#111" stroke="#222"/>
  <text x="440" y="340" text-anchor="middle" font-size="14" font-weight="600" fill="#888">빈 이름 자동 결정 규칙</text>
  <text x="440" y="362" text-anchor="middle" font-size="13" fill="#e8e8e8">클래스 이름의 첫 글자를 소문자로 변환 — OrderService → orderService</text>
  <text x="440" y="380" text-anchor="middle" font-size="12" fill="#888">직접 지정: @Component("myService") · @Service("paymentSvc")</text>

  <!-- Code snippet -->
  <rect x="60" y="406" width="760" height="74" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="429" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#7ec8e3">@ComponentScan</text>
  <text x="76" y="447" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#7ec8e3">@Configuration</text>
  <text x="76" y="465" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#7ec8e3">public class </text>
  <text x="184" y="465" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#e8e8e8">AppConfig {}  </text>
  <text x="380" y="465" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#6a8aa0">// 선언 클래스 패키지부터 스캔 시작</text>

  <!-- Footer -->
  <text x="440" y="502" text-anchor="middle" font-size="11" fill="#444">@SpringBootApplication = @SpringBootConfiguration + @EnableAutoConfiguration + @ComponentScan</text>
</svg>
