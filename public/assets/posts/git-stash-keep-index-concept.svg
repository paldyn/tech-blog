<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">--keep-index 동작 원리</text>

  <!-- WITHOUT keep-index -->
  <text x="220" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">기본 stash</text>

  <!-- Before box -->
  <rect x="60" y="96" width="160" height="120" rx="8" fill="#0d1224" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Working Tree</text>
  <text x="140" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">★ staged: api.js</text>
  <text x="140" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">~ unstaged: ui.js</text>
  <text x="140" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">? untracked: new.js</text>
  <text x="140" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">Before</text>

  <!-- Arrow -->
  <line x1="220" y1="156" x2="280" y2="156" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="250" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">stash</text>

  <!-- After basic stash -->
  <rect x="280" y="96" width="160" height="120" rx="8" fill="#1a1a1a" stroke="#555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="360" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#555">Working Tree</text>
  <text x="360" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#555">모두 사라짐</text>
  <text x="360" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">staged 상태도 없어짐</text>
  <text x="360" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">After</text>

  <!-- WITH keep-index -->
  <text x="660" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">--keep-index</text>

  <!-- Before box 2 -->
  <rect x="460" y="96" width="160" height="120" rx="8" fill="#0d1224" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="540" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Working Tree</text>
  <text x="540" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">★ staged: api.js</text>
  <text x="540" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">~ unstaged: ui.js</text>
  <text x="540" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">? untracked: new.js</text>
  <text x="540" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">Before</text>

  <!-- Arrow -->
  <line x1="620" y1="156" x2="680" y2="156" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="650" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">stash --keep-index</text>

  <!-- After keep-index -->
  <rect x="680" y="96" width="160" height="120" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="760" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Working Tree</text>
  <text x="760" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">★ staged: api.js 유지!</text>
  <text x="760" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">ui.js 제거됨</text>
  <text x="760" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">new.js 제거됨</text>
  <text x="760" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">After</text>

  <!-- Use case box -->
  <rect x="60" y="246" width="760" height="70" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">주요 사용 시나리오</text>
  <text x="440" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">스테이징된 변경만 커밋 전 테스트하고 싶을 때 — unstaged 변경을 잠깐 치우기</text>

  <!-- Code block -->
  <rect x="60" y="336" width="760" height="60" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">git stash <tspan fill="#7ec8e3" font-weight="600">push</tspan> <tspan fill="#55c555" font-weight="600">--keep-index</tspan>      <tspan fill="#9aa4b8"># staged 유지, unstaged 저장</tspan></text>
  <text x="76" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">git stash <tspan fill="#7ec8e3" font-weight="600">push</tspan> <tspan fill="#55c555" font-weight="600">--keep-index -u</tspan>   <tspan fill="#9aa4b8"># untracked도 포함</tspan></text>
</svg>
