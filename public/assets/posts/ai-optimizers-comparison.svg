<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 560" style="background:#0a0a0a;border-radius:12px">
  <!-- Header -->
  <rect x="0" y="0" width="880" height="72" rx="12" fill="#0d1a2a"/>
  <rect x="0" y="60" width="880" height="12" fill="#0d1a2a"/>
  <text x="60" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#ffffff">옵티마이저 계보와 핵심 아이디어</text>
  <text x="60" y="62" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">SGD부터 AdamW까지: 각 옵티마이저가 해결하는 문제</text>
  <line x1="60" y1="82" x2="820" y2="82" stroke="#1e2433" stroke-width="1"/>

  <!-- SGD -->
  <rect x="60" y="100" width="360" height="78" rx="8" fill="#0d1520" stroke="#888"/>
  <text x="80" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">SGD</text>
  <text x="80" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">θ ← θ − η·∇L</text>
  <text x="80" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">문제: 학습률 고정, 모든 파라미터 동일 step</text>
  <text x="80" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">saddle point에서 느림, 학습률 튜닝 민감</text>

  <!-- Arrow SGD → Momentum -->
  <line x1="240" y1="180" x2="240" y2="200" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="234,200 240,212 246,200" fill="#7ec8e3"/>
  <text x="255" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">속도 개념 추가</text>

  <!-- Momentum -->
  <rect x="60" y="214" width="360" height="78" rx="8" fill="#0d1520" stroke="#7ec8e3"/>
  <text x="80" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">SGD + Momentum</text>
  <text x="80" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">v ← β·v − η·∇L  ;  θ ← θ + v</text>
  <text x="80" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">이전 방향을 관성으로 유지 (β≈0.9)</text>
  <text x="80" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">평탄한 방향은 가속, 진동은 감쇠</text>

  <!-- Arrow Momentum → Adam -->
  <line x1="240" y1="294" x2="240" y2="314" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="234,314 240,326 246,314" fill="#7ec8e3"/>
  <text x="255" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">적응형 학습률 추가</text>

  <!-- Adam -->
  <rect x="60" y="328" width="360" height="96" rx="8" fill="#0d1520" stroke="#55c555" stroke-width="2"/>
  <text x="80" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">Adam (Adaptive Moment Estimation) ★</text>
  <text x="80" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">m ← β₁·m + (1−β₁)·∇L      (1차 모멘트)</text>
  <text x="80" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">v ← β₂·v + (1−β₂)·∇L²     (2차 모멘트)</text>
  <text x="80" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">θ ← θ − η · m̂ / (√v̂ + ε)</text>
  <text x="80" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">파라미터별 적응형 학습률 + 모멘텀 효과</text>

  <!-- AdamW -->
  <rect x="60" y="436" width="360" height="60" rx="8" fill="#0d1520" stroke="#7777cc"/>
  <text x="80" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">AdamW</text>
  <text x="80" y="476" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Adam + 가중치 감쇠를 그래디언트와 분리</text>
  <text x="80" y="487" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">LLM 학습의 표준 (GPT, BERT, LLaMA)</text>

  <!-- RIGHT: AdaGrad/RMSProp Branch -->
  <text x="480" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">적응형 학습률 계열</text>

  <!-- AdaGrad -->
  <rect x="480" y="115" width="340" height="78" rx="8" fill="#0d1520" stroke="#ce9178"/>
  <text x="500" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">AdaGrad</text>
  <text x="500" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">G ← G + ∇L²  ;  θ ← θ − η/√G · ∇L</text>
  <text x="500" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">자주 등장한 파라미터는 lr↓, 드문 것은 lr↑</text>
  <text x="500" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">문제: G가 계속 누적 → 학습률이 0에 수렴</text>

  <!-- RMSProp -->
  <rect x="480" y="210" width="340" height="78" rx="8" fill="#0d1520" stroke="#ce9178" stroke-opacity="0.7"/>
  <text x="500" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">RMSProp</text>
  <text x="500" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">v ← β·v + (1−β)·∇L²</text>
  <text x="500" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">지수 가중 이동 평균으로 G 누적 문제 해결</text>
  <text x="500" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">RNN 학습에 효과적 (Hinton 제안)</text>

  <!-- Comparison table -->
  <text x="480" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">실전 선택 가이드</text>
  <rect x="480" y="318" width="340" height="180" rx="8" fill="#0d1520" stroke="#1e2433"/>
  <text x="500" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">상황</text>
  <text x="640" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">추천</text>
  <line x1="500" y1="344" x2="800" y2="344" stroke="#333" stroke-width="1"/>
  <text x="500" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">LLM/대형 트랜스포머</text>
  <text x="640" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">AdamW</text>
  <text x="500" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">CNN 이미지 분류</text>
  <text x="640" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">SGD+Momentum</text>
  <text x="500" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">일반 딥러닝 (기본값)</text>
  <text x="640" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Adam</text>
  <text x="500" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">희소 특성 (임베딩)</text>
  <text x="640" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">Adagrad/Adam</text>
  <text x="500" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">RLHF / 파인튜닝</text>
  <text x="640" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">AdamW + cosine lr</text>
  <text x="500" y="464" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">RNN 시계열</text>
  <text x="640" y="464" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">RMSProp</text>
  <text x="500" y="490" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">β₁=0.9, β₂=0.999, ε=1e-8 (Adam 기본값)</text>

  <!-- Footer -->
  <text x="440" y="548" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈</text>
</svg>
