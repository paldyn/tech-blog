<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">import 문법 5가지 패턴</text>

  <!-- Pattern 1 -->
  <rect x="50" y="68" width="370" height="90" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="70" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">① 모듈 전체 임포트</text>
  <rect x="66" y="96" width="338" height="48" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">import</text>
  <text x="126" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> math</text>
  <text x="82" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">math.sqrt(</text>
  <text x="164" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">16</text>
  <text x="178" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)  </text>
  <text x="206" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># → 4.0</text>

  <!-- Pattern 2 -->
  <rect x="460" y="68" width="370" height="90" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">② 특정 이름만 임포트</text>
  <rect x="476" y="96" width="338" height="48" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">from</text>
  <text x="524" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> math </text>
  <text x="566" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">import</text>
  <text x="614" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> sqrt, pi</text>
  <text x="492" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">sqrt(</text>
  <text x="530" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">16</text>
  <text x="546" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)  </text>
  <text x="566" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># math. 없이 사용</text>

  <!-- Pattern 3 -->
  <rect x="50" y="174" width="370" height="90" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="70" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">③ 별칭(alias) 사용</text>
  <rect x="66" y="202" width="338" height="48" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">import</text>
  <text x="126" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> numpy </text>
  <text x="186" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">as</text>
  <text x="204" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> np</text>
  <text x="82" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">np.array([</text>
  <text x="162" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">1</text>
  <text x="170" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">, </text>
  <text x="182" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">2</text>
  <text x="190" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">, </text>
  <text x="202" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">3</text>
  <text x="210" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">])</text>

  <!-- Pattern 4 -->
  <rect x="460" y="174" width="370" height="90" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">④ 여러 이름 임포트</text>
  <rect x="476" y="202" width="338" height="48" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">from</text>
  <text x="524" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> os.path </text>
  <text x="586" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">import</text>
  <text x="492" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    join, exists, dirname</text>

  <!-- Pattern 5 - star import (discouraged) -->
  <rect x="50" y="280" width="780" height="90" rx="8" fill="#2a1515" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">⑤ * 임포트 — 권장하지 않음</text>
  <rect x="66" y="308" width="748" height="48" rx="6" fill="#000000" stroke="#2a1515" stroke-width="1"/>
  <text x="82" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">from</text>
  <text x="114" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> math </text>
  <text x="156" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">import</text>
  <text x="200" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> *   </text>
  <text x="240" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555"># 이름 충돌 가능, 어디서 왔는지 불명확</text>
  <text x="82" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># __all__ 이 정의된 경우만 예외적으로 허용 (예: tkinter)</text>

  <!-- Bottom: module types -->
  <rect x="50" y="388" width="780" height="80" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">모듈 종류</text>

  <rect x="68" y="418" width="170" height="34" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="153" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">표준 라이브러리</text>

  <rect x="258" y="418" width="170" height="34" rx="6" fill="#07111a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="343" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">서드파티 (pip)</text>

  <rect x="448" y="418" width="170" height="34" rx="6" fill="#13131f" stroke="#7777cc" stroke-width="1"/>
  <text x="533" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">직접 작성한 모듈</text>

  <rect x="638" y="418" width="170" height="34" rx="6" fill="#1a1607" stroke="#b5cea8" stroke-width="1"/>
  <text x="723" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8" text-anchor="middle">C 확장 모듈</text>
</svg>
