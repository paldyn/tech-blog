<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Nexacro N 트랜잭션 처리 흐름</text>

  <!-- Client Box -->
  <rect x="60" y="80" width="200" height="280" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="160" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">클라이언트</text>
  <text x="160" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">(Nexacro N Form)</text>

  <rect x="80" y="138" width="160" height="36" fill="#0d1520" rx="5" stroke="#1e2433"/>
  <text x="160" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">① transaction() 호출</text>
  <text x="160" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">서비스ID, Dataset 지정</text>

  <rect x="80" y="190" width="160" height="36" fill="#0d1520" rx="5" stroke="#1e2433"/>
  <text x="160" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">② 입력 Dataset 직렬화</text>
  <text x="160" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">PL 포맷 변환</text>

  <rect x="80" y="242" width="160" height="36" fill="#0d1520" rx="5" stroke="#1e2433"/>
  <text x="160" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">③ HTTP POST 전송</text>
  <text x="160" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Service URL로</text>

  <rect x="80" y="294" width="160" height="36" fill="#0d1520" rx="5" stroke="#1e2433"/>
  <text x="160" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">⑦ 콜백 함수 실행</text>
  <text x="160" y="324" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">errCode, Dataset 수신</text>

  <!-- Arrow right (request) -->
  <polygon points="278,196 308,186 308,206" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="1.5"/>
  <line x1="260" y1="196" x2="308" y2="196" stroke="#7ec8e3" stroke-width="2.5"/>
  <text x="283" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">요청</text>

  <!-- Arrow left (response) -->
  <polygon points="262,310 262,300 262,320" fill="#55c555"/>
  <polygon points="278,310 248,300 248,320" fill="#55c555" stroke="#0a0a0a" stroke-width="1.5"/>
  <line x1="248" y1="310" x2="310" y2="310" stroke="#55c555" stroke-width="2.5"/>
  <text x="283" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">응답</text>

  <!-- Adapter Box -->
  <rect x="315" y="80" width="250" height="280" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e05555">서버 어댑터</text>
  <text x="440" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">(Nexacro Adapter / Spring)</text>

  <rect x="335" y="138" width="210" height="36" fill="#0d1520" rx="5" stroke="#1e2433"/>
  <text x="440" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">④ PL 파싱 → Dataset 복원</text>
  <text x="440" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">NexacroDataSet 객체 생성</text>

  <rect x="335" y="190" width="210" height="36" fill="#0d1520" rx="5" stroke="#1e2433"/>
  <text x="440" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">⑤ 서비스 메서드 호출</text>
  <text x="440" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">@Service 비즈니스 로직 실행</text>

  <rect x="335" y="242" width="210" height="36" fill="#0d1520" rx="5" stroke="#1e2433"/>
  <text x="440" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">⑥ 결과 Dataset → PL 직렬화</text>
  <text x="440" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">errCode, errMsg 포함</text>

  <rect x="335" y="294" width="210" height="36" fill="#0d1520" rx="5" stroke="#1e2433"/>
  <text x="440" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">HTTP 응답 전송</text>
  <text x="440" y="324" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">클라이언트로 반환</text>

  <!-- Arrow right (adapter→db) -->
  <polygon points="583,240 613,230 613,250" fill="#7777cc" stroke="#0a0a0a" stroke-width="1.5"/>
  <line x1="565" y1="240" x2="613" y2="240" stroke="#7777cc" stroke-width="2.5"/>
  <text x="589" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">SQL</text>

  <!-- Arrow left (db→adapter) -->
  <polygon points="581,270 551,260 551,280" fill="#7777cc" stroke="#0a0a0a" stroke-width="1.5"/>
  <line x1="551" y1="270" x2="613" y2="270" stroke="#7777cc" stroke-width="2.5"/>
  <text x="589" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">결과</text>

  <!-- DB Box -->
  <rect x="620" y="80" width="200" height="280" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="720" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc">데이터베이스</text>
  <text x="720" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">(Oracle / MySQL / etc.)</text>

  <rect x="640" y="160" width="160" height="40" fill="#0d1520" rx="5" stroke="#1e2433"/>
  <text x="720" y="177" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">SELECT / INSERT</text>
  <text x="720" y="193" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">UPDATE / DELETE</text>

  <rect x="640" y="224" width="160" height="40" fill="#0d1520" rx="5" stroke="#1e2433"/>
  <text x="720" y="241" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">ResultSet 반환</text>
  <text x="720" y="257" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">JDBC / MyBatis</text>

  <!-- Bottom Label -->
  <text x="440" y="398" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">transaction()은 비동기 호출이 기본 — 콜백 함수에서 결과를 처리</text>

  <!-- Legend -->
  <rect x="60" y="418" width="760" height="44" fill="#111827" rx="6" stroke="#1e2433"/>
  <rect x="80" y="432" width="12" height="12" fill="#7ec8e3" rx="2"/>
  <text x="98" y="443" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">요청 흐름</text>
  <rect x="180" y="432" width="12" height="12" fill="#55c555" rx="2"/>
  <text x="198" y="443" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">응답 흐름</text>
  <rect x="280" y="432" width="12" height="12" fill="#7777cc" rx="2"/>
  <text x="298" y="443" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">DB 연동</text>
  <rect x="380" y="432" width="12" height="12" fill="#e05555" rx="2"/>
  <text x="398" y="443" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">서버 어댑터 처리</text>
</svg>
