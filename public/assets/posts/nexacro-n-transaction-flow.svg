<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <linearGradient id="hdrTx" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="clientGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#111820;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0c1018;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="serverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1208;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#120c04;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#061206;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowRight" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#4488ff"/>
    </marker>
    <marker id="arrowLeft" markerWidth="9" markerHeight="9" refX="2" refY="3.5" orient="auto">
      <path d="M9,0 L9,7 L0,3.5 z" fill="#44cc88"/>
    </marker>
    <marker id="arrowRightOr" markerWidth="9" markerHeight="9" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#ff8844"/>
    </marker>
    <marker id="arrowLeftOr" markerWidth="9" markerHeight="9" refX="2" refY="3.5" orient="auto">
      <path d="M9,0 L9,7 L0,3.5 z" fill="#ff8844"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Header -->
  <rect x="0" y="0" width="880" height="64" rx="12" fill="url(#hdrTx)"/>
  <rect x="0" y="52" width="880" height="12" fill="url(#hdrTx)"/>
  <text x="44" y="38" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#e8e8e8">Nexacro N — Transaction 요청/응답 흐름</text>
  <text x="44" y="56" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="12" fill="#555">this.transaction() → HTTP → Server(XService) → DB → Callback</text>

  <!-- ── CLIENT BOX ── -->
  <rect x="30" y="90" width="220" height="400" rx="10" fill="url(#clientGrad)" stroke="#2a4a6a" stroke-width="1.5"/>
  <text x="140" y="113" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#4488ff" text-anchor="middle">Client (Nexacro)</text>

  <!-- Form -->
  <rect x="50" y="124" width="180" height="46" rx="6" fill="#0d1a26" stroke="#2a4060" stroke-width="1"/>
  <text x="140" y="143" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#88bbff" text-anchor="middle">Form Script</text>
  <text x="140" y="160" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#446688" text-anchor="middle">fn_search() 호출</text>

  <!-- transaction() call box -->
  <rect x="50" y="186" width="180" height="64" rx="6" fill="#0a1520" stroke="#3355aa" stroke-width="1.5"/>
  <text x="140" y="205" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#6699ff" text-anchor="middle">this.transaction(</text>
  <text x="140" y="219" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#4466aa" text-anchor="middle">  "svcSearch",</text>
  <text x="140" y="232" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#4466aa" text-anchor="middle">  "Service/query.do",</text>
  <text x="140" y="245" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#4466aa" text-anchor="middle">  "in:dsParam out:dsResult" )</text>

  <!-- Dataset In -->
  <rect x="50" y="266" width="80" height="36" rx="5" fill="#0d1520" stroke="#2244aa" stroke-width="1"/>
  <text x="90" y="281" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#5577cc" text-anchor="middle">dsParam</text>
  <text x="90" y="295" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="8" fill="#334466" text-anchor="middle">요청 Dataset</text>

  <!-- Dataset Out -->
  <rect x="150" y="266" width="80" height="36" rx="5" fill="#0d1520" stroke="#2244aa" stroke-width="1"/>
  <text x="190" y="281" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#5577cc" text-anchor="middle">dsResult</text>
  <text x="190" y="295" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="8" fill="#334466" text-anchor="middle">응답 Dataset</text>

  <!-- Callback -->
  <rect x="50" y="316" width="180" height="46" rx="6" fill="#0c1a10" stroke="#224422" stroke-width="1.5"/>
  <text x="140" y="335" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#44aa66" text-anchor="middle">fn_searchCallback(</text>
  <text x="140" y="349" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#336644" text-anchor="middle">svcid, err, errmsg)</text>

  <!-- Grid/Component -->
  <rect x="50" y="376" width="180" height="40" rx="6" fill="#121208" stroke="#333322" stroke-width="1"/>
  <text x="140" y="394" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#aaaa44" text-anchor="middle">Grid / Edit 컴포넌트</text>
  <text x="140" y="408" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="8" fill="#555533" text-anchor="middle">dsResult 바인딩 → 자동 갱신</text>

  <!-- ── SERVER BOX ── -->
  <rect x="340" y="90" width="220" height="300" rx="10" fill="url(#serverGrad)" stroke="#4a3010" stroke-width="1.5"/>
  <text x="450" y="113" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#ffaa44" text-anchor="middle">Server</text>

  <!-- Controller -->
  <rect x="360" y="124" width="180" height="46" rx="6" fill="#1a1206" stroke="#443300" stroke-width="1"/>
  <text x="450" y="143" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#cc8833" text-anchor="middle">Controller / Servlet</text>
  <text x="450" y="158" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#664422" text-anchor="middle">XPlatformManager.parse()</text>

  <!-- XService -->
  <rect x="360" y="186" width="180" height="46" rx="6" fill="#160e04" stroke="#442200" stroke-width="1.5"/>
  <text x="450" y="205" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#ff8833" text-anchor="middle">XService / Service</text>
  <text x="450" y="220" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#664422" text-anchor="middle">비즈니스 로직 처리</text>

  <!-- Mapper/DAO -->
  <rect x="360" y="248" width="180" height="46" rx="6" fill="#120c04" stroke="#332200" stroke-width="1"/>
  <text x="450" y="267" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#cc7722" text-anchor="middle">MyBatis Mapper / DAO</text>
  <text x="450" y="282" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#553311" text-anchor="middle">SQL 실행 / 결과 매핑</text>

  <!-- Response build -->
  <rect x="360" y="310" width="180" height="46" rx="6" fill="#120c04" stroke="#332200" stroke-width="1"/>
  <text x="450" y="329" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#aa6611" text-anchor="middle">XPlatformManager.render()</text>
  <text x="450" y="344" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#553311" text-anchor="middle">Dataset XML 직렬화</text>

  <!-- ── DB BOX ── -->
  <rect x="650" y="90" width="200" height="180" rx="10" fill="url(#dbGrad)" stroke="#143014" stroke-width="1.5"/>
  <text x="750" y="113" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#44cc66" text-anchor="middle">Database</text>

  <!-- DB cylinder representation -->
  <ellipse cx="750" cy="155" rx="60" ry="16" fill="#0a1a0a" stroke="#1a4a1a" stroke-width="1.5"/>
  <rect x="690" y="155" width="120" height="60" fill="#0a1a0a" stroke="#1a4a1a" stroke-width="1.5"/>
  <ellipse cx="750" cy="215" rx="60" ry="16" fill="#0a1a0a" stroke="#1a4a1a" stroke-width="1.5"/>
  <text x="750" y="180" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="12" fill="#33aa55" text-anchor="middle">RDBMS</text>
  <text x="750" y="197" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#225533" text-anchor="middle">Oracle / MySQL</text>
  <text x="750" y="211" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#1a4422" text-anchor="middle">PostgreSQL / MSSQL</text>

  <!-- ── ARROWS ── -->
  <!-- Client → Server (request) -->
  <line x1="250" y1="218" x2="338" y2="218" stroke="#4488ff" stroke-width="2" marker-end="url(#arrowRight)" stroke-dasharray="none"/>
  <text x="294" y="210" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#4488ff" text-anchor="middle">HTTP POST</text>
  <text x="294" y="230" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="8" fill="#2255aa" text-anchor="middle">Dataset XML</text>

  <!-- Server → Client (response) -->
  <line x1="338" y1="240" x2="250" y2="300" stroke="#44cc88" stroke-width="2" marker-end="url(#arrowLeftOr)" stroke-dasharray="5,3"/>
  <text x="294" y="262" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#44cc88" text-anchor="middle">HTTP 200</text>
  <text x="294" y="275" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="8" fill="#226644" text-anchor="middle">Dataset XML</text>

  <!-- Server → DB -->
  <line x1="560" y1="218" x2="648" y2="180" stroke="#ff8844" stroke-width="2" marker-end="url(#arrowRightOr)"/>
  <text x="604" y="192" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#ff8844" text-anchor="middle">SQL</text>

  <!-- DB → Server -->
  <line x1="648" y1="200" x2="560" y2="248" stroke="#44cc88" stroke-width="2" marker-end="url(#arrowLeftOr)" stroke-dasharray="5,3"/>
  <text x="604" y="234" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#44cc88" text-anchor="middle">ResultSet</text>

  <!-- ── LEGEND ── -->
  <rect x="30" y="454" width="820" height="44" rx="6" fill="#0d0d0d" stroke="#1e1e1e" stroke-width="1"/>
  <line x1="60" y1="476" x2="100" y2="476" stroke="#4488ff" stroke-width="2"/>
  <text x="108" y="480" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888">요청 (Request)</text>
  <line x1="220" y1="476" x2="260" y2="476" stroke="#44cc88" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="268" y="480" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888">응답 (Response)</text>
  <text x="450" y="470" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555" text-anchor="middle">Nexacro N은 Dataset 단위로 데이터를 직렬화하여 서버와 통신합니다.</text>
  <text x="450" y="487" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#444" text-anchor="middle">callback 함수에서 errorCode == 0 이면 정상, 그 외 오류 처리 분기.</text>
</svg>
