<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">trace() 로그 레벨 관리 전략</text>
  <text x="440" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">개발·QA·운영 환경별 로그 출력 제어</text>

  <!-- Level diagram: pyramid style -->
  <!-- Level boxes left to right, top to bottom representing severity -->

  <!-- Row 1: ERROR -->
  <rect x="280" y="105" width="320" height="52" rx="8" fill="#1a0808" stroke="#e05555" stroke-width="2"/>
  <text x="440" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">ERROR</text>
  <text x="440" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">운영 포함 모든 환경에서 출력 | 즉시 대응 필요</text>

  <!-- Row 2: WARN -->
  <rect x="200" y="170" width="480" height="52" rx="8" fill="#1a1208" stroke="#e0a055" stroke-width="1.5"/>
  <text x="440" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e0a055" text-anchor="middle">WARN</text>
  <text x="440" y="213" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">비정상 상황이나 복구 가능 | QA + 개발에서 출력</text>

  <!-- Row 3: INFO -->
  <rect x="120" y="235" width="640" height="52" rx="8" fill="#0d1818" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">INFO</text>
  <text x="440" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">중요 이벤트 (조회 완료, 저장 성공 등) | 개발 + QA에서 출력</text>

  <!-- Row 4: DEBUG -->
  <rect x="40" y="300" width="800" height="52" rx="8" fill="#101018" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="323" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">DEBUG</text>
  <text x="440" y="343" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">상세 변수 값, 루프 상태 등 | 개발 환경에서만 출력</text>

  <!-- Environment legend -->
  <rect x="40" y="374" width="800" height="62" rx="8" fill="#111118" stroke="#2a2a3a" stroke-width="1"/>
  <text x="60" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">환경별 활성화 레벨</text>
  <rect x="60" y="403" width="14" height="14" rx="3" fill="#e05555"/>
  <text x="82" y="415" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">운영: ERROR만</text>
  <rect x="230" y="403" width="14" height="14" rx="3" fill="#e0a055"/>
  <text x="252" y="415" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">QA: ERROR + WARN + INFO</text>
  <rect x="450" y="403" width="14" height="14" rx="3" fill="#7777cc"/>
  <text x="472" y="415" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c8c8c8">개발: 전체 (DEBUG 포함)</text>
  <text x="60" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">전역 변수 LOG_LEVEL로 제어 → 운영 배포 시 DEBUG/INFO trace() 자동 비활성화</text>
</svg>
