  <text x="60" y="211" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    text=</tspan><tspan fill="#ce9178">"안녕하세요, 반갑습니다."            </tspan><tspan fill="#ffffff">,  </tspan><tspan fill="#9aa4b8"># 화자 복제</tspan></text>

