<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">파이프 패턴 구현 방식 비교</text>

  <!-- Custom pipe class -->
  <rect x="60" y="68" width="360" height="200" rx="8" fill="#0f1a2e" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="240" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">커스텀 Pipe 클래스</text>
  <rect x="76" y="100" width="328" height="154" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="90" y="120" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">class</tspan>
    <tspan fill="#ffffff"> Pipe:</tspan>
  </text>
  <text x="90" y="140" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    def</tspan>
    <tspan fill="#ffffff"> __init__(self, value):</tspan>
  </text>
  <text x="90" y="160" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">        self.value = value</tspan>
  </text>
  <text x="90" y="180" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    def</tspan>
    <tspan fill="#ffffff"> __or__(self, f):</tspan>
  </text>
  <text x="90" y="200" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">        return</tspan>
    <tspan fill="#ffffff"> Pipe(f(self.value))</tspan>
  </text>
  <text x="90" y="228" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#9aa4b8"># | 연산자로 파이프라인</tspan>
  </text>
  <text x="90" y="246" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">r = (Pipe([</tspan>
    <tspan fill="#b5cea8">1</tspan>
    <tspan fill="#ffffff">,</tspan>
    <tspan fill="#b5cea8">2</tspan>
    <tspan fill="#ffffff">,</tspan>
    <tspan fill="#b5cea8">3</tspan>
    <tspan fill="#ffffff">]) | sorted | </tspan>
    <tspan fill="#7ec8e3" font-weight="600">list</tspan>
    <tspan fill="#ffffff">).value</tspan>
  </text>

  <!-- Method chaining -->
  <rect x="460" y="68" width="360" height="200" rx="8" fill="#0f2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">메서드 체이닝 패턴</text>
  <rect x="476" y="100" width="328" height="154" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="490" y="120" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#9aa4b8"># pandas DataFrame 파이프라인</tspan>
  </text>
  <text x="490" y="140" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">result = (</tspan>
  </text>
  <text x="490" y="160" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">    df</tspan>
  </text>
  <text x="490" y="180" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">    .pipe(add_tax)</tspan>
  </text>
  <text x="490" y="200" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">    .pipe(convert_currency)</tspan>
  </text>
  <text x="490" y="220" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">    .pipe(round_prices)</tspan>
  </text>
  <text x="490" y="240" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">)</tspan>
    <tspan fill="#9aa4b8">  # pandas .pipe() 메서드</tspan>
  </text>

  <!-- When to use pipe -->
  <rect x="60" y="288" width="760" height="90" rx="8" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
  <text x="440" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">파이프 패턴을 쓸 때 vs 쓰지 않을 때</text>
  <text x="200" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">✓ 단계가 3개 이상</text>
  <text x="200" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">✓ 각 단계가 순수 함수</text>
  <text x="540" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">✗ 단계가 1~2개 → 직접 호출</text>
  <text x="540" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">✗ 에러 처리 복잡 → 일반 코드</text>
  <text x="200" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">(추가 의존성 없이 사용 가능)</text>
</svg>
