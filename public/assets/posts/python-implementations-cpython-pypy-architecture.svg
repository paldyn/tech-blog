<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <style>text:not([font-family]) { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }</style>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">CPython 실행 파이프라인</text>
  <text x="440" y="68" text-anchor="middle" font-size="15" font-weight="600" fill="#888">소스 코드에서 실행까지</text>

  <!-- Pipeline boxes -->
  <!-- Source Code -->
  <rect x="60" y="96" width="110" height="56" rx="8" fill="#0f1820" stroke="#7ec8e3" stroke-width="2"/>
  <text x="115" y="122" text-anchor="middle" font-size="12" font-weight="700" fill="#7ec8e3">소스 코드</text>
  <text x="115" y="140" text-anchor="middle" font-size="10" fill="#666">hello.py</text>

  <polygon points="172,124 184,118 184,130" fill="#7ec8e3"/>
  <line x1="170" y1="124" x2="184" y2="124" stroke="#7ec8e3" stroke-width="1.5"/>

  <!-- Tokenizer -->
  <rect x="186" y="96" width="100" height="56" rx="8" fill="#0f1820" stroke="#7777cc" stroke-width="1.5"/>
  <text x="236" y="120" text-anchor="middle" font-size="11" font-weight="700" fill="#7777cc">Tokenizer</text>
  <text x="236" y="138" text-anchor="middle" font-size="10" fill="#666">토큰 분리</text>

  <polygon points="288,124 300,118 300,130" fill="#7777cc"/>
  <line x1="286" y1="124" x2="300" y2="124" stroke="#7777cc" stroke-width="1.5"/>

  <!-- Parser -->
  <rect x="302" y="96" width="100" height="56" rx="8" fill="#0f1820" stroke="#7777cc" stroke-width="1.5"/>
  <text x="352" y="120" text-anchor="middle" font-size="11" font-weight="700" fill="#7777cc">Parser</text>
  <text x="352" y="138" text-anchor="middle" font-size="10" fill="#666">문법 분석</text>

  <polygon points="404,124 416,118 416,130" fill="#7777cc"/>
  <line x1="402" y1="124" x2="416" y2="124" stroke="#7777cc" stroke-width="1.5"/>

  <!-- AST -->
  <rect x="418" y="96" width="100" height="56" rx="8" fill="#0f1820" stroke="#55c555" stroke-width="1.5"/>
  <text x="468" y="120" text-anchor="middle" font-size="11" font-weight="700" fill="#55c555">AST</text>
  <text x="468" y="138" text-anchor="middle" font-size="10" fill="#666">추상 구문 트리</text>

  <polygon points="520,124 532,118 532,130" fill="#55c555"/>
  <line x1="518" y1="124" x2="532" y2="124" stroke="#55c555" stroke-width="1.5"/>

  <!-- Compiler -->
  <rect x="534" y="96" width="100" height="56" rx="8" fill="#0f1820" stroke="#55c555" stroke-width="1.5"/>
  <text x="584" y="120" text-anchor="middle" font-size="11" font-weight="700" fill="#55c555">Compiler</text>
  <text x="584" y="138" text-anchor="middle" font-size="10" fill="#666">바이트코드 생성</text>

  <polygon points="636,124 648,118 648,130" fill="#55c555"/>
  <line x1="634" y1="124" x2="648" y2="124" stroke="#55c555" stroke-width="1.5"/>

  <!-- PVM -->
  <rect x="650" y="96" width="170" height="56" rx="8" fill="#0f1820" stroke="#e05555" stroke-width="2"/>
  <text x="735" y="120" text-anchor="middle" font-size="12" font-weight="700" fill="#e05555">PVM 실행</text>
  <text x="735" y="140" text-anchor="middle" font-size="10" fill="#666">Python Virtual Machine</text>

  <!-- Bytecode label -->
  <rect x="60" y="180" width="280" height="60" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0"># 바이트코드 예시</text>
  <text x="76" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"><tspan fill="#b5cea8">0</tspan><tspan fill="#e8e8e8"> LOAD_GLOBAL  print</tspan></text>
  <text x="76" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8"> LOAD_CONST   </tspan><tspan fill="#ce9178">"Hello"</tspan></text>

  <!-- .pyc label -->
  <rect x="360" y="180" width="160" height="60" rx="6" fill="#0f1418" stroke="#333"/>
  <text x="440" y="204" text-anchor="middle" font-size="12" font-weight="600" fill="#55c555">__pycache__/</text>
  <text x="440" y="222" text-anchor="middle" font-family="'JetBrains Mono','Menlo',monospace" font-size="11" fill="#e8e8e8">hello.cpython-312.pyc</text>
  <text x="440" y="236" text-anchor="middle" font-size="10" fill="#666">캐시된 바이트코드</text>

  <!-- CPython implementation box -->
  <rect x="60" y="264" width="760" height="176" rx="8" fill="#0f1418" stroke="#333"/>
  <text x="440" y="290" text-anchor="middle" font-size="13" font-weight="700" fill="#e8e8e8">CPython의 특징</text>

  <rect x="80" y="306" width="200" height="114" rx="6" fill="#0a0f18" stroke="#7ec8e3" stroke-width="1"/>
  <text x="180" y="328" text-anchor="middle" font-size="12" font-weight="600" fill="#7ec8e3">GIL (전역 인터프리터 잠금)</text>
  <text x="180" y="348" text-anchor="middle" font-size="11" fill="#aaa">한 번에 한 스레드만</text>
  <text x="180" y="366" text-anchor="middle" font-size="11" fill="#aaa">Python 바이트코드 실행</text>
  <text x="180" y="384" text-anchor="middle" font-size="11" fill="#aaa">멀티코어 활용 제한</text>
  <text x="180" y="402" text-anchor="middle" font-size="10" fill="#666">3.13+부터 실험적 제거 지원</text>

  <rect x="300" y="306" width="200" height="114" rx="6" fill="#0a0f18" stroke="#55c555" stroke-width="1"/>
  <text x="400" y="328" text-anchor="middle" font-size="12" font-weight="600" fill="#55c555">레퍼런스 카운팅 GC</text>
  <text x="400" y="348" text-anchor="middle" font-size="11" fill="#aaa">객체 참조 횟수 추적</text>
  <text x="400" y="366" text-anchor="middle" font-size="11" fill="#aaa">0이 되면 즉시 해제</text>
  <text x="400" y="384" text-anchor="middle" font-size="11" fill="#aaa">순환 참조는 별도 GC</text>
  <text x="400" y="402" text-anchor="middle" font-size="10" fill="#666">C 언어로 구현</text>

  <rect x="520" y="306" width="280" height="114" rx="6" fill="#0a0f18" stroke="#7777cc" stroke-width="1"/>
  <text x="660" y="328" text-anchor="middle" font-size="12" font-weight="600" fill="#7777cc">C 확장 모듈</text>
  <text x="660" y="348" text-anchor="middle" font-size="11" fill="#aaa">numpy, pandas 등 핵심 라이브러리</text>
  <text x="660" y="366" text-anchor="middle" font-size="11" fill="#aaa">C/C++로 작성된 고성능 코드를</text>
  <text x="660" y="384" text-anchor="middle" font-size="11" fill="#aaa">Python에서 직접 호출 가능</text>
  <text x="660" y="402" text-anchor="middle" font-size="10" fill="#666">CPython API로 연동</text>
</svg>
