<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">화살표 함수 this — 잘못 쓰는 패턴</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">객체 메서드·prototype·동적 this가 필요한 곳엔 쓰지 않는다</text>

  <!-- Left: Object method pitfall -->
  <rect x="60" y="90" width="370" height="260" rx="6" fill="#000000" stroke="#e05555" stroke-width="1"/>
  <text x="80" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">// ❌ 객체 리터럴 메서드에 화살표</text>
  <text x="80" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">const</text>
  <text x="118" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> obj = {</text>
  <text x="80" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  value: </text>
  <text x="142" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">42</text>
  <text x="158" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">,</text>
  <text x="80" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">  // 화살표: 전역 this 캡처</text>
  <text x="80" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  getValue: () </tspan><tspan fill="#7ec8e3">=&gt;</tspan><tspan fill="#7ec8e3"> this</tspan><tspan fill="#ffffff">.value,</tspan></text>

  <text x="80" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">};</text>
  <text x="80" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">obj.getValue(); </text>
  <text x="206" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">// undefined!</text>

  <text x="80" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">// ❌ 이벤트 핸들러에서 el이 필요할 때</text>
  <text x="80" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">el.addEventListener(</tspan><tspan fill="#ce9178">'click'</tspan><tspan fill="#ffffff">,</tspan></text>

  <text x="80" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  () </tspan><tspan fill="#7ec8e3">=&gt;</tspan><tspan fill="#ffffff"> console.log(</tspan><tspan fill="#7ec8e3">this</tspan><tspan fill="#ffffff">)</tspan></text>

  <text x="80" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">); </text>
  <text x="108" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">// el이 아닌 외부 this</text>
  <text x="80" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// e.currentTarget 사용해야 함</text>

  <!-- Right: Correct usage -->
  <rect x="460" y="90" width="360" height="260" rx="6" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="480" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">// ✓ 콜백 내부에서 this 필요할 때</text>
  <text x="480" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">class</text>
  <text x="516" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> DataLoader {</text>
  <text x="480" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  constructor() {</text>
  <text x="480" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">    this</tspan><tspan fill="#ffffff">.data = [];</tspan></text>
  
  <text x="480" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  }</text>

  <text x="480" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  load(url) {</text>
  <text x="480" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    fetch(url)</text>
  <text x="480" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">      .then(r </tspan><tspan fill="#7ec8e3">=&gt;</tspan><tspan fill="#ffffff"> r.json())</tspan></text>

  <text x="480" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">      .then(json </tspan><tspan fill="#7ec8e3">=&gt;</tspan><tspan fill="#ffffff"> {</tspan></text>

  <text x="480" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">        // this = DataLoader 인스턴스</text>
  <text x="480" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">        this</tspan><tspan fill="#ffffff">.data = json;</tspan></text>
  
  <text x="480" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      });</text>
  <text x="480" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  }</text>

  <!-- Bottom table -->
  <rect x="60" y="368" width="760" height="60" rx="6" fill="#0d0d0d" stroke="#3a4a6e"/>
  <text x="75" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" font-weight="600">화살표 함수 적합:</text>
  <text x="75" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">콜백 내부에서 외부 this 필요 · Array 메서드 콜백 · Promise .then/.catch</text>
  <text x="430" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" font-weight="600">화살표 함수 부적합:</text>
  <text x="430" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">객체 메서드 · prototype 메서드 · 생성자 함수 · 동적 this 필요</text>

  <!-- Footer -->
</svg>
