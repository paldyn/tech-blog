<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">미처리 Rejection — 발생 경로와 감지</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">catch 없이 reject된 Promise는 unhandledRejection 이벤트 발생</text>

  <!-- Scenario 1: No catch -->
  <rect x="50" y="90" width="370" height="130" rx="6" fill="#1a0808" stroke="#e05555"/>
  <text x="235" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">케이스 1: .catch() 없음</text>
  <text x="66" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// await 없이 호출 — catch 연결 안 됨</text>
  <text x="66" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">async function</tspan><tspan fill="#e8e8e8"> doWork() {</tspan></text>
  
  <text x="66" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">  throw new</tspan><tspan fill="#e8e8e8"> Error(</tspan><tspan fill="#ce9178">'문제 발생'</tspan><tspan fill="#e8e8e8">); }</tspan></text>

  <text x="66" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">doWork(); </text>
  <text x="144" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// ← await 없음! 미처리</text>
  <text x="66" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// → unhandledRejection 이벤트 발생</text>

  <!-- Scenario 2: Promise without catch -->
  <rect x="460" y="90" width="370" height="130" rx="6" fill="#1a0808" stroke="#e05555"/>
  <text x="645" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">케이스 2: Promise 체인에 .catch 없음</text>
  <text x="476" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">const</text>
  <text x="512" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> p = fetch(url)</text>
  <text x="476" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  .then(r =&gt; r.json());</text>
  <text x="476" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// p가 reject되면 → 미처리</text>
  <text x="476" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 나중에 p를 사용하지 않으면</text>
  <text x="476" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// → unhandledRejection 이벤트</text>

  <!-- Flow diagram -->
  <rect x="200" y="244" width="480" height="50" rx="8" fill="#0d1520" stroke="#7ec8e3"/>
  <text x="440" y="275" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">rejected Promise + catch 없음</text>

  <!-- Arrow down -->
  <line x1="440" y1="294" x2="440" y2="318" stroke="#e05555" stroke-width="2"/>
  <polygon points="433,311 440,320 447,311" fill="#e05555"/>

  <!-- unhandledRejection event -->
  <rect x="200" y="320" width="480" height="50" rx="8" fill="#1a0808" stroke="#e05555" stroke-width="2"/>
  <text x="440" y="351" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">unhandledRejection 이벤트 발생</text>

  <!-- Two outcomes -->
  <line x1="300" y1="370" x2="200" y2="406" stroke="#888" stroke-width="1.5"/>
  <polygon points="195,399 198,409 206,402" fill="#888"/>
  <line x1="580" y1="370" x2="680" y2="406" stroke="#888" stroke-width="1.5"/>
  <polygon points="674,399 677,409 685,402" fill="#888"/>

  <rect x="60" y="408" width="280" height="46" rx="6" fill="#141410" stroke="#888"/>
  <text x="200" y="428" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">브라우저: 콘솔 경고 출력</text>
  <text x="200" y="446" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">event.preventDefault()로 억제 가능</text>

  <rect x="540" y="408" width="280" height="46" rx="6" fill="#14100a" stroke="#e05555"/>
  <text x="680" y="428" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">Node.js: 프로세스 경고 (기본)</text>
  <text x="680" y="446" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">v15+: 프로세스 종료 (기본값 변경)</text>
</svg>
