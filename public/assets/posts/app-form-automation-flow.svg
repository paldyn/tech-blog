<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380"
     style="border-radius:12px" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="ac" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="ag" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="ae" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>
  <text x="440" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">서류 처리 상태 흐름도</text>

  <!-- States in a row -->
  <!-- S1: Received -->
  <rect x="60" y="120" width="130" height="60" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="125" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">접수됨</text>
  <text x="125" y="166" text-anchor="middle" font-size="11" fill="#888">RECEIVED</text>

  <line x1="190" y1="150" x2="236" y2="150" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ac)"/>

  <!-- S2: Processing -->
  <rect x="236" y="120" width="130" height="60" rx="8" fill="#1a1030" stroke="#7777cc" stroke-width="1.5"/>
  <text x="301" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">처리 중</text>
  <text x="301" y="166" text-anchor="middle" font-size="11" fill="#888">PROCESSING</text>

  <line x1="366" y1="150" x2="412" y2="150" stroke="#7777cc" stroke-width="2" marker-end="url(#ac)"/>

  <!-- S3: Extracted -->
  <rect x="412" y="120" width="130" height="60" rx="8" fill="#1a1030" stroke="#7777cc" stroke-width="1.5"/>
  <text x="477" y="148" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">추출 완료</text>
  <text x="477" y="166" text-anchor="middle" font-size="11" fill="#888">EXTRACTED</text>

  <!-- Branch from Extracted -->
  <line x1="477" y1="180" x2="350" y2="250" stroke="#e05555" stroke-width="2" marker-end="url(#ae)"/>
  <line x1="477" y1="180" x2="600" y2="250" stroke="#55c555" stroke-width="2" marker-end="url(#ag)"/>
  <text x="400" y="228" text-anchor="middle" font-size="11" fill="#e05555">신뢰도 &lt; 0.9</text>
  <text x="556" y="228" text-anchor="middle" font-size="11" fill="#55c555">신뢰도 ≥ 0.9</text>

  <!-- S4a: Review -->
  <rect x="256" y="250" width="160" height="60" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="336" y="278" text-anchor="middle" font-size="13" font-weight="600" fill="#e05555">검토 대기</text>
  <text x="336" y="296" text-anchor="middle" font-size="11" fill="#888">PENDING_REVIEW</text>

  <!-- S4b: Auto complete -->
  <rect x="464" y="250" width="160" height="60" rx="8" fill="#0f2418" stroke="#55c555" stroke-width="1.5"/>
  <text x="544" y="278" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">자동 완료</text>
  <text x="544" y="296" text-anchor="middle" font-size="11" fill="#888">AUTO_COMPLETE</text>

  <!-- S5: Completed -->
  <rect x="680" y="120" width="140" height="60" rx="8" fill="#0f2418" stroke="#55c555" stroke-width="2"/>
  <text x="750" y="148" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">완료</text>
  <text x="750" y="166" text-anchor="middle" font-size="11" fill="#888">COMPLETED</text>

  <line x1="624" y1="280" x2="750" y2="180" stroke="#55c555" stroke-width="2" marker-end="url(#ag)"/>
  <line x1="336" y1="310" x2="680" y2="160" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#ac)"/>
  <text x="520" y="330" text-anchor="middle" font-size="11" fill="#888">수동 검토 후 승인</text>
</svg>
