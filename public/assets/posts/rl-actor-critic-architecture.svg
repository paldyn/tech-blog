<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e0a555"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">액터-크리틱 아키텍처</text>
  <text x="440" y="62" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">정책(Actor) + 가치 함수(Critic)의 협력 구조</text>

  <!-- 환경 박스 -->
  <rect x="340" y="90" width="200" height="70" fill="#0f1a2e" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">환경</text>
  <text x="440" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">상태 sₜ, 보상 rₜ</text>

  <!-- 공유 백본 -->
  <rect x="290" y="200" width="300" height="66" fill="#14142a" rx="8" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">공유 백본 (Shared Backbone)</text>
  <text x="440" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">상태 표현 추출 (feature extraction)</text>
  <text x="440" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#555" text-anchor="middle">Linear → Tanh → Linear → Tanh</text>

  <!-- 환경 → 백본 -->
  <line x1="440" y1="160" x2="440" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="456" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">sₜ</text>

  <!-- Actor 헤드 -->
  <rect x="60" y="310" width="260" height="80" fill="#1a1030" rx="8" stroke="#7777cc" stroke-width="2"/>
  <text x="190" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Actor (정책 헤드)</text>
  <text x="190" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">π_θ(a|s) 출력</text>
  <text x="190" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">행동 확률 분포</text>
  <text x="190" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#555" text-anchor="middle">→ Softmax(logits)</text>

  <!-- Critic 헤드 -->
  <rect x="560" y="310" width="260" height="80" fill="#0d1f0d" rx="8" stroke="#55c555" stroke-width="2"/>
  <text x="690" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Critic (가치 헤드)</text>
  <text x="690" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">V_θ(s) 출력</text>
  <text x="690" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">상태 가치 스칼라</text>
  <text x="690" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#555" text-anchor="middle">→ Linear(1)</text>

  <!-- 백본 → Actor -->
  <line x1="340" y1="266" x2="248" y2="310" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-purple)"/>

  <!-- 백본 → Critic -->
  <line x1="540" y1="266" x2="632" y2="310" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- Actor → 행동 -->
  <line x1="190" y1="390" x2="190" y2="418" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-purple)"/>
  <rect x="120" y="418" width="140" height="32" fill="#0f0f1a" rx="4" stroke="#7777cc" stroke-width="1"/>
  <text x="190" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">행동 aₜ 선택</text>

  <!-- Critic → 어드밴티지 -->
  <line x1="690" y1="390" x2="690" y2="418" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <rect x="580" y="418" width="220" height="32" fill="#0d1f0d" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="690" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">Â = r + γV(s') - V(s)</text>

  <!-- 어드밴티지 → Actor 피드백 -->
  <path d="M 690 418 Q 690 280 380 350" fill="none" stroke="#e0a555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-orange)"/>
  <text x="555" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e0a555" text-anchor="middle">어드밴티지로</text>
  <text x="555" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e0a555" text-anchor="middle">Actor 업데이트</text>
</svg>
