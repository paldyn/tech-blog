<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Conventional Commits 메시지 구조</text>

  <!-- full message box -->
  <rect x="60" y="64" width="760" height="148" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="90" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">type</text>
  <text xml:space="preserve" x="118" y="90" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">(</text>
  <text xml:space="preserve" x="126" y="90" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">scope</text>
  <text xml:space="preserve" x="172" y="90" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">)</text>
  <text xml:space="preserve" x="180" y="90" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555">!</text>
  <text xml:space="preserve" x="190" y="90" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">: </text>
  <text xml:space="preserve" x="210" y="90" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">description</text>
  <text xml:space="preserve" x="80" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">                           (필수)</text>
  <text xml:space="preserve" x="80" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">[blank line]</text>
  <text xml:space="preserve" x="80" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">body (선택)</text>
  <text xml:space="preserve" x="80" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">[blank line]</text>
  <text xml:space="preserve" x="80" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">footer: BREAKING CHANGE: ... (선택)</text>

  <!-- labels -->
  <rect x="60" y="230" width="120" height="52" rx="6" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="120" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">type</text>
  <text x="120" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">feat, fix, docs...</text>

  <rect x="210" y="230" width="130" height="52" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="275" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">scope</text>
  <text x="275" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">선택, 변경 범위</text>

  <rect x="370" y="230" width="100" height="52" rx="6" fill="#1f1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="420" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">!</text>
  <text x="420" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">breaking change</text>

  <!-- examples -->
  <text x="440" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">예시</text>

  <rect x="60" y="330" width="760" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">feat</text>
  <text xml:space="preserve" x="118" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">(auth): 소셜 로그인 OAuth2 지원 추가</text>
  <text xml:space="preserve" x="80" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">fix</text>
  <text xml:space="preserve" x="110" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">(api): null 응답 시 500 에러 수정</text>
  <text xml:space="preserve" x="80" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">feat</text>
  <text xml:space="preserve" x="118" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">(api)!</text>
  <text xml:space="preserve" x="170" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">: v2 응답 구조 변경 (BREAKING)</text>
  <text xml:space="preserve" x="80" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">chore</text>
  <text xml:space="preserve" x="130" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">: eslint 설정 업데이트</text>
</svg>
