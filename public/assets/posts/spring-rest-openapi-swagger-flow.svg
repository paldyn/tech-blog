<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 2 L 12 7 L 0 12 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">springdoc-openapi 동작 원리</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">런타임 스캔 → OpenAPI 3.0 JSON 자동 생성 → Swagger UI 렌더링</text>

  <!-- Step 1: Spring Boot App -->
  <rect x="60" y="100" width="180" height="70" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="150" y="129" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">Spring Boot App</text>
  <text x="150" y="149" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">@RestController 들</text>

  <!-- Arrow 1 -->
  <line x1="240" y1="135" x2="296" y2="135" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="268" y="126" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">스캔</text>

  <!-- Step 2: springdoc-openapi -->
  <rect x="296" y="100" width="200" height="70" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="396" y="125" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc">springdoc-openapi</text>
  <text x="396" y="143" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">컨트롤러·어노테이션 분석</text>
  <text x="396" y="159" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">OpenAPI 3.0 스펙 생성</text>

  <!-- Arrow 2 -->
  <line x1="496" y1="135" x2="552" y2="135" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="524" y="126" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">노출</text>

  <!-- Step 3: /v3/api-docs -->
  <rect x="552" y="100" width="200" height="70" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="652" y="125" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555">OpenAPI JSON</text>
  <text x="652" y="143" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">GET /v3/api-docs</text>
  <text x="652" y="159" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">application/json 응답</text>

  <!-- Arrow 3 down to Swagger UI -->
  <line x1="652" y1="170" x2="652" y2="220" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4: Swagger UI -->
  <rect x="552" y="220" width="200" height="70" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="652" y="246" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">Swagger UI</text>
  <text x="652" y="264" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">GET /swagger-ui.html</text>
  <text x="652" y="280" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">대화형 API 문서 UI</text>

  <!-- Divider -->
  <line x1="60" y1="330" x2="820" y2="330" stroke="#222" stroke-width="1"/>
  <text x="440" y="352" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">의존성 한 줄로 자동 설정</text>

  <!-- Dependency box -->
  <rect x="60" y="364" width="760" height="60" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// build.gradle</tspan></text>
  <text x="76" y="410" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">implementation </tspan><tspan fill="#ce9178">'org.springdoc:springdoc-openapi-starter-webmvc-ui:2.8.x'</tspan></text>
</svg>
