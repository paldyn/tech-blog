<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400"
     style="border-radius:12px" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>
  <text x="440" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">에스컬레이션 우선순위 기준</text>

  <!-- Header row -->
  <text x="130" y="72" text-anchor="middle" font-size="13" fill="#888">우선순위</text>
  <text x="310" y="72" text-anchor="middle" font-size="13" fill="#888">카테고리</text>
  <text x="530" y="72" text-anchor="middle" font-size="13" fill="#888">에스컬레이션 조건</text>
  <text x="760" y="72" text-anchor="middle" font-size="13" fill="#888">목표 응답 시간</text>
  <line x1="60" y1="80" x2="820" y2="80" stroke="#222" stroke-width="1"/>

  <!-- P1: Critical -->
  <rect x="70" y="88" width="120" height="48" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="130" y="116" text-anchor="middle" font-size="14" font-weight="700" fill="#e05555">P1 긴급</text>
  <text x="310" y="110" text-anchor="middle" font-size="13" fill="#e8e8e8">결제 오류 · 계정 도용</text>
  <text x="310" y="126" text-anchor="middle" font-size="12" fill="#888">보안 · 금융 이슈</text>
  <text x="530" y="110" text-anchor="middle" font-size="12" fill="#888">AI 신뢰도 &lt; 0.9 또는 키워드 감지</text>
  <text x="530" y="126" text-anchor="middle" font-size="12" fill="#888">"환불 불가" · "법적 조치" 등</text>
  <text x="760" y="118" text-anchor="middle" font-size="14" font-weight="600" fill="#e05555">15분 이내</text>
  <line x1="60" y1="144" x2="820" y2="144" stroke="#222" stroke-width="1"/>

  <!-- P2: High -->
  <rect x="70" y="152" width="120" height="48" rx="6" fill="#1a1200" stroke="#e09060" stroke-width="1.5"/>
  <text x="130" y="180" text-anchor="middle" font-size="14" font-weight="700" fill="#e09060">P2 높음</text>
  <text x="310" y="174" text-anchor="middle" font-size="13" fill="#e8e8e8">서비스 장애 · 기술 문제</text>
  <text x="310" y="190" text-anchor="middle" font-size="12" fill="#888">오류 재현 · 데이터 손실</text>
  <text x="530" y="174" text-anchor="middle" font-size="12" fill="#888">AI 3회 답변 실패 또는 부정 감정</text>
  <text x="530" y="190" text-anchor="middle" font-size="12" fill="#888">감정 점수 &lt; -0.7</text>
  <text x="760" y="182" text-anchor="middle" font-size="14" font-weight="600" fill="#e09060">1시간 이내</text>
  <line x1="60" y1="208" x2="820" y2="208" stroke="#222" stroke-width="1"/>

  <!-- P3: Medium -->
  <rect x="70" y="216" width="120" height="48" rx="6" fill="#111820" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="244" text-anchor="middle" font-size="14" font-weight="700" fill="#7ec8e3">P3 보통</text>
  <text x="310" y="238" text-anchor="middle" font-size="13" fill="#e8e8e8">환불 · 구독 변경</text>
  <text x="310" y="254" text-anchor="middle" font-size="12" fill="#888">정책 예외 요청</text>
  <text x="530" y="238" text-anchor="middle" font-size="12" fill="#888">AI 정책 범위 외 요청</text>
  <text x="530" y="254" text-anchor="middle" font-size="12" fill="#888">권한 초과 처리 필요</text>
  <text x="760" y="246" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">4시간 이내</text>
  <line x1="60" y1="272" x2="820" y2="272" stroke="#222" stroke-width="1"/>

  <!-- P4: Low -->
  <rect x="70" y="280" width="120" height="48" rx="6" fill="#0f2418" stroke="#55c555" stroke-width="1.5"/>
  <text x="130" y="308" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">P4 낮음</text>
  <text x="310" y="302" text-anchor="middle" font-size="13" fill="#e8e8e8">일반 문의 · 개선 제안</text>
  <text x="310" y="318" text-anchor="middle" font-size="12" fill="#888">정보 요청 · 피드백</text>
  <text x="530" y="302" text-anchor="middle" font-size="12" fill="#888">고객 직접 요청 ("담당자 연결")</text>
  <text x="530" y="318" text-anchor="middle" font-size="12" fill="#888">또는 AI 답변율 &lt; 0.7</text>
  <text x="760" y="310" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">24시간 이내</text>
  <line x1="60" y1="336" x2="820" y2="336" stroke="#222" stroke-width="1"/>

  <line x1="60" y1="80" x2="60" y2="336" stroke="#222" stroke-width="1"/>
  <line x1="820" y1="80" x2="820" y2="336" stroke="#222" stroke-width="1"/>

  <!-- Bottom note -->
  <text x="440" y="368" text-anchor="middle" font-size="12" fill="#888">AI 신뢰도 임계값과 감정 점수는 서비스 성격에 맞게 튜닝 필요</text>
</svg>
