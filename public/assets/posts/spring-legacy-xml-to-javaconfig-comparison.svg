<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">XML 설정 vs Java Config 비교</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">레거시 XML에서 타입 안전한 Java Config로 전환하기</text>

  <!-- Left Label -->
  <rect x="60" y="88" width="360" height="28" rx="4" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">✕  XML 기반 설정 (Legacy)</text>

  <!-- Left Code Box -->
  <rect x="60" y="116" width="360" height="202" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">&lt;!-- applicationContext.xml --&gt;</text>
  <text x="76" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">&lt;beans</tspan><tspan fill="#ffffff"> xmlns="..."&gt;</tspan></text>
  <text x="76" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">&lt;bean</tspan><tspan fill="#ffffff"> id=</tspan><tspan fill="#ce9178">"userService"</tspan></text>
  <text x="76" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    class=<tspan fill="#ce9178">"UserServiceImpl"</tspan><tspan fill="#ffffff">&gt;</tspan></text>
  <text x="76" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">    <tspan fill="#7ec8e3" font-weight="600">&lt;property</tspan><tspan fill="#ffffff"> name=</tspan><tspan fill="#ce9178">"repo"</tspan></text>
  <text x="76" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">      ref=<tspan fill="#ce9178">"userRepository"</tspan><tspan fill="#ffffff">/&gt;</tspan></text>
  <text x="76" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">&lt;/bean&gt;</tspan></text>
  <text x="76" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">&lt;bean</tspan><tspan fill="#ffffff"> id=</tspan><tspan fill="#ce9178">"userRepository"</tspan></text>
  <text x="76" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    class=<tspan fill="#ce9178">"JpaUserRepo"</tspan><tspan fill="#ffffff">/&gt;</tspan></text>
  <text x="76" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">&lt;/beans&gt;</tspan></text>

  <!-- Right Label -->
  <rect x="460" y="88" width="360" height="28" rx="4" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">✓  Java Config (Modern)</text>

  <!-- Right Code Box -->
  <rect x="460" y="116" width="360" height="202" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">@Configuration</tspan></text>
  <text x="476" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">public class</tspan><tspan fill="#ffffff"> AppConfig {</tspan></text>
  <text x="476" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">@Bean</tspan></text>
  <text x="476" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">public</tspan><tspan fill="#ffffff"> UserService userService() {</tspan></text>
  <text x="476" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">    <tspan fill="#7ec8e3" font-weight="600">return new</tspan><tspan fill="#ffffff"> UserServiceImpl(</tspan></text>
  <text x="476" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">      userRepository());</text>
  <text x="476" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  }</text>
  <text x="476" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">@Bean</tspan></text>
  <text x="476" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">public</tspan><tspan fill="#ffffff"> UserRepository repo() {</tspan></text>
  <text x="476" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">    <tspan fill="#7ec8e3" font-weight="600">return new</tspan><tspan fill="#ffffff"> JpaUserRepository();</tspan></text>

  <!-- VS separator -->
  <text x="440" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#555" text-anchor="middle">→</text>

  <!-- Bottom Benefits -->
  <rect x="60" y="338" width="220" height="70" rx="8" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="170" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">타입 안전성</text>
  <text x="170" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">컴파일 타임 오류 검출</text>
  <text x="170" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">IDE 자동완성 지원</text>

  <rect x="310" y="338" width="220" height="70" rx="8" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="420" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">리팩토링 용이</text>
  <text x="420" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">IDE 리팩토링 자동 반영</text>
  <text x="420" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">빈 이름 변경 추적 가능</text>

  <rect x="560" y="338" width="220" height="70" rx="8" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="670" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">조건부 빈 생성</text>
  <text x="670" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Java 코드로 조건 분기</text>
  <text x="670" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">@Conditional 활용</text>

  <!-- Bottom label -->
  <text x="440" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">Spring 3.0+에서 Java Config 지원 / Spring 4.0+에서 XML 없는 순수 Java Config 권장</text>
</svg>
