<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">비즈니스 로직 취약점 유형별 예시</text>

  <!-- Type 1: Price Manipulation -->
  <rect x="60" y="68" width="370" height="140" rx="8" fill="#1a0505" stroke="#e05555" stroke-width="1"/>
  <text x="245" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">① 가격 조작 (Price Manipulation)</text>
  <rect x="76" y="104" width="338" height="92" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 장바구니 수량 음수 입력</text>
  <text x="92" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">POST /cart/add</text>
  <text x="92" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">{"item": "laptop", "qty": -1}</text>
  <text x="92" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">→ 총 금액 마이너스 → 환불 받음</text>

  <!-- Type 2: Workflow bypass -->
  <rect x="450" y="68" width="370" height="140" rx="8" fill="#1a0505" stroke="#e05555" stroke-width="1"/>
  <text x="635" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">② 단계 건너뛰기 (Workflow Skip)</text>
  <rect x="466" y="104" width="338" height="92" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 결제 단계 없이 완료 직접 접근</text>
  <text x="482" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">GET /checkout/confirm</text>
  <text x="482" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">→ 결제 없이 주문 완료 처리</text>
  <text x="482" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 서버가 세션 상태 미검증</text>

  <!-- Type 3: Limit bypass -->
  <rect x="60" y="228" width="370" height="140" rx="8" fill="#1a0505" stroke="#e05555" stroke-width="1"/>
  <text x="245" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">③ 제한 우회 (Limit Bypass)</text>
  <rect x="76" y="264" width="338" height="92" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 1회 한정 초대 코드 재사용</text>
  <text x="92" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">POST /signup</text>
  <text x="92" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">{"invite_code": "WELCOME2026"}</text>
  <text x="92" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">→ 동일 코드로 계정 100개 생성</text>

  <!-- Type 4: State confusion -->
  <rect x="450" y="228" width="370" height="140" rx="8" fill="#1a0505" stroke="#e05555" stroke-width="1"/>
  <text x="635" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">④ 상태 혼동 (State Confusion)</text>
  <rect x="466" y="264" width="338" height="92" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 이메일 변경 후 구 링크로 인증</text>
  <text x="482" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">1. 이메일 변경 요청</text>
  <text x="482" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">2. 구 이메일로 인증 링크 클릭</text>
  <text x="482" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">→ 새 이메일로 계정 이전!</text>

  <!-- Key insight -->
  <rect x="60" y="388" width="760" height="88" rx="8" fill="#0a0a18" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="410" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">비즈니스 로직 취약점의 특징</text>
  <text x="440" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">스캐너가 탐지 어려움 — 기술적으로 유효한 요청이지만 의도에 어긋남</text>
  <text x="440" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">개발자가 정상 흐름만 설계하고 비정상 입력·순서를 고려하지 않은 경우 발생</text>
  <text x="440" y="468" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">도메인 지식이 없으면 발견하기 어려움 — 수동 테스트 필수</text>
</svg>
