<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">플랫폼별 Git 설치 방법</text>

  <!-- macOS -->
  <rect x="60" y="72" width="232" height="370" rx="10" fill="#111" stroke="#1e2a1e"/>
  <text x="176" y="102" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">macOS</text>

  <rect x="78" y="116" width="196" height="56" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="94" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># Homebrew 권장</text>
  <text x="94" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">brew</text><text x="136" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> install git</text>

  <rect x="78" y="182" width="196" height="56" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="94" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># Xcode CLT로도 가능</text>
  <text x="94" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">xcode-select</text><text x="192" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> --install</text>

  <text x="176" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">Homebrew 없으면</text>
  <text x="176" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">git.scm.com에서</text>
  <text x="176" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">macOS 인스톨러 다운로드</text>

  <!-- Windows -->
  <rect x="324" y="72" width="232" height="370" rx="10" fill="#111" stroke="#1e1e2a"/>
  <text x="440" y="102" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">Windows</text>

  <rect x="342" y="116" width="196" height="56" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="358" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># winget 권장</text>
  <text x="358" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">winget</text><text x="406" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> install Git.Git</text>

  <rect x="342" y="182" width="196" height="56" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="358" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 또는 git-scm.com</text>
  <text x="358" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">Git for Windows</text>

  <text x="440" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">Git Bash 포함 — Unix 명령어를</text>
  <text x="440" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">Windows에서 사용 가능</text>
  <text x="440" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">WSL2도 권장 옵션</text>

  <!-- Linux -->
  <rect x="588" y="72" width="232" height="370" rx="10" fill="#111" stroke="#2a1e1a"/>
  <text x="704" y="102" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8c55e">Linux</text>

  <rect x="606" y="116" width="196" height="74" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="622" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># Debian/Ubuntu</text>
  <text x="622" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">apt</text><text x="644" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> install git</text>
  <text x="622" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># Fedora/RHEL</text>

  <rect x="606" y="200" width="196" height="38" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="622" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">dnf</text><text x="644" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> install git</text>

  <text x="704" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">패키지 매니저로 간단 설치</text>
  <text x="704" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">최신 버전은 소스 빌드 또는</text>
  <text x="704" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">PPA(Ubuntu) 사용</text>

  <!-- common verification -->
  <rect x="60" y="370" width="760" height="56" rx="8" fill="#000000" stroke="#3a4a6e"/>
  <text x="80" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 설치 확인 (모든 플랫폼 공통)</text>
  <text x="80" y="410" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">git</text><text x="104" y="410" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> --version</text><text x="220" y="410" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  # git version 2.x.x</text>

  <text x="440" y="456" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">설치 후 반드시 git --version으로 정상 설치 확인</text>
</svg>
