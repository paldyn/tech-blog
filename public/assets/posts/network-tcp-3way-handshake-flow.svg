<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">TCP 3-way 핸드셰이크</text>

  <!-- Client box -->
  <rect x="80" y="70" width="160" height="48" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">클라이언트</text>

  <!-- Server box -->
  <rect x="640" y="70" width="160" height="48" rx="8" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">서버</text>

  <!-- Timeline lines -->
  <line x1="160" y1="118" x2="160" y2="460" stroke="#2a3a4a" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="720" y1="118" x2="720" y2="460" stroke="#2a4a2a" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Step 1: SYN -->
  <line x1="160" y1="165" x2="706" y2="215" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="290" y="148" width="240" height="42" rx="6" fill="#0a1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="410" y="165" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">SYN</text>
  <text x="410" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">seq=x  (연결 요청)</text>

  <!-- State annotations step 1 -->
  <text x="60" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178">SYN_SENT</text>
  <text x="726" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178">SYN_RCVD</text>

  <!-- Step 2: SYN-ACK -->
  <line x1="720" y1="268" x2="174" y2="318" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <rect x="320" y="252" width="240" height="42" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="269" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">SYN + ACK</text>
  <text x="440" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">seq=y, ack=x+1</text>

  <!-- Step 3: ACK -->
  <line x1="160" y1="362" x2="706" y2="362" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="290" y="345" width="240" height="34" rx="6" fill="#0a1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="410" y="359" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">ACK</text>
  <text x="410" y="373" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">ack=y+1</text>

  <!-- State: ESTABLISHED -->
  <text x="50" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">ESTABLISHED</text>
  <text x="692" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">ESTABLISHED</text>

  <!-- Connected state bar -->
  <rect x="120" y="418" width="80" height="30" rx="4" fill="#0a2a0a" stroke="#55c555" stroke-width="1"/>
  <text x="160" y="438" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">연결됨</text>
  <rect x="680" y="418" width="80" height="30" rx="4" fill="#0a2a0a" stroke="#55c555" stroke-width="1"/>
  <text x="720" y="438" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">연결됨</text>

  <!-- Step labels -->
  <text x="166" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#888">① </text>
  <text x="726" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#888">② </text>
  <text x="166" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#888">③ </text>

  <!-- Data flow indicator -->
  <line x1="120" y1="462" x2="760" y2="462" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="480" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">데이터 전송 가능 구간</text>

  <!-- Bottom note -->
  <rect x="60" y="490" width="760" height="22" rx="4" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="440" y="505" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">각 방향 ISN(초기 순서 번호)을 교환 → 순서 번호 동기화 + 반이중 채널 각각 수립</text>
</svg>
