<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">WHERE 절의 비교 연산자</text>

  <!-- Operator table header -->
  <rect x="60" y="66" width="760" height="32" rx="4" fill="#111827"/>
  <text x="140" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle" xml:space="preserve">연산자</text>
  <text x="330" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle" xml:space="preserve">의미</text>
  <text x="580" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle" xml:space="preserve">예시</text>

  <!-- Rows -->
  <rect x="60" y="98" width="760" height="28" fill="#0d1117"/>
  <text x="140" y="117" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">= / &lt;&gt; / !=</text>
  <text x="330" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">같음 / 다름</text>
  <text x="580" y="117" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">status = 'active'</text>

  <rect x="60" y="126" width="760" height="28" fill="#111827"/>
  <text x="140" y="145" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">&lt; / &gt; / &lt;= / &gt;=</text>
  <text x="330" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">크기 비교</text>
  <text x="580" y="145" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">age &gt;= 18</text>

  <rect x="60" y="154" width="760" height="28" fill="#0d1117"/>
  <text x="140" y="173" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">IS NULL / IS NOT NULL</text>
  <text x="330" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">NULL 여부 확인</text>
  <text x="580" y="173" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">deleted_at IS NULL</text>

  <rect x="60" y="182" width="760" height="28" fill="#111827"/>
  <text x="140" y="201" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">BETWEEN a AND b</text>
  <text x="330" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">a 이상 b 이하 (양쪽 포함)</text>
  <text x="580" y="201" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">score BETWEEN 80 AND 100</text>

  <rect x="60" y="210" width="760" height="28" fill="#0d1117"/>
  <text x="140" y="229" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">IN (v1, v2, ...)</text>
  <text x="330" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">목록 중 하나</text>
  <text x="580" y="229" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">country IN ('KR','US','JP')</text>

  <rect x="60" y="238" width="760" height="28" fill="#111827"/>
  <text x="140" y="257" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">LIKE 'pattern'</text>
  <text x="330" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">패턴 매칭 (% = *, _ = 1자)</text>
  <text x="580" y="257" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">name LIKE 'Kim%'</text>

  <!-- AND/OR/NOT section -->
  <text x="60" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8" xml:space="preserve">논리 연산자 우선순위: NOT &gt; AND &gt; OR</text>

  <rect x="60" y="314" width="760" height="130" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- AND가 OR보다 우선 처리됨 (괄호로 명시 권장)</text>
  <text x="76" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">WHERE</text>
  <text x="124" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> country = </text>
  <text x="220" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">'KR'</text>
  <text x="256" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve"> OR</text>
  <text x="280" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> country = </text>
  <text x="376" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">'US'</text>
  <text x="412" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve"> AND</text>
  <text x="448" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> active = </text>
  <text x="532" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">true</text>
  <text x="76" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- 위 쿼리 실제 해석: country='KR' OR (country='US' AND active=true)</text>
  <text x="76" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">WHERE</text>
  <text x="124" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> (country = </text>
  <text x="232" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">'KR'</text>
  <text x="268" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve"> OR</text>
  <text x="292" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> country = </text>
  <text x="388" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">'US'</text>
  <text x="424" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">)</text>
  <text x="436" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve"> AND</text>
  <text x="472" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> active = </text>
  <text x="556" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">true</text>
  <text x="76" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- ^ 의도를 괄호로 명확히 표현</text>
  <text x="76" y="426" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- NOT: WHERE NOT (status = 'deleted')</text>

  <!-- Footer -->
  <text x="440" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle" xml:space="preserve">PALDYN — SQL 완전 정복</text>
</svg>
