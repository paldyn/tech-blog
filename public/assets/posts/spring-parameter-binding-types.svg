<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" width="880">
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Spring MVC 파라미터 바인딩 전체 지도</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">HTTP 요청의 어느 부분에서 값을 꺼내느냐가 핵심</text>

  <!-- HTTP Request box (left) -->
  <rect x="60" y="96" width="240" height="360" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">HTTP Request</text>

  <!-- Request Line -->
  <rect x="76" y="132" width="208" height="36" fill="#000000" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="84" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">GET /users/5?page=1</text>
  <text x="84" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">Request Line</text>

  <!-- Headers section -->
  <rect x="76" y="176" width="208" height="60" fill="#000000" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="84" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">Content-Type: json</text>
  <text x="84" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">Authorization: Bearer …</text>
  <text x="84" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">Headers</text>

  <!-- Cookie section -->
  <rect x="76" y="244" width="208" height="36" fill="#000000" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="84" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">Cookie: SESSION=abc123</text>
  <text x="84" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">Cookie</text>

  <!-- Body section -->
  <rect x="76" y="288" width="208" height="60" fill="#000000" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="84" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8" xml:space="preserve">{"name": "홍길동",</text>
  <text x="84" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8" xml:space="preserve"> "email": "…"}</text>
  <text x="84" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">Body (JSON / Form)</text>

  <!-- Matrix section -->
  <rect x="76" y="356" width="208" height="36" fill="#000000" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="84" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc" xml:space="preserve">/cars;color=red;year=2024</text>
  <text x="84" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">Matrix Variables</text>

  <!-- Annotations column (right) -->
  <!-- @PathVariable -->
  <rect x="420" y="110" width="400" height="48" fill="#0d1a2a" rx="6" stroke="#1e3a5a" stroke-width="1"/>
  <text x="436" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">@PathVariable</text>
  <text x="436" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">URL 경로 변수 /users/{id} → Long id</text>

  <!-- @RequestParam -->
  <rect x="420" y="168" width="400" height="48" fill="#0d1a2a" rx="6" stroke="#1e3a5a" stroke-width="1"/>
  <text x="436" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">@RequestParam</text>
  <text x="436" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">쿼리 파라미터 ?page=1 · 폼 필드</text>

  <!-- @RequestHeader -->
  <rect x="420" y="226" width="400" height="48" fill="#0d1a2a" rx="6" stroke="#1e3a5a" stroke-width="1"/>
  <text x="436" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">@RequestHeader</text>
  <text x="436" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">요청 헤더 Authorization 등</text>

  <!-- @CookieValue -->
  <rect x="420" y="284" width="400" height="48" fill="#0d1a2a" rx="6" stroke="#1e3a5a" stroke-width="1"/>
  <text x="436" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">@CookieValue</text>
  <text x="436" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">쿠키 값 SESSION 등</text>

  <!-- @RequestBody -->
  <rect x="420" y="342" width="400" height="48" fill="#0d1a2a" rx="6" stroke="#1e3a5a" stroke-width="1"/>
  <text x="436" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">@RequestBody</text>
  <text x="436" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">바디 전체를 객체로 역직렬화</text>

  <!-- @ModelAttribute -->
  <rect x="420" y="400" width="400" height="48" fill="#0d1a2a" rx="6" stroke="#1e3a5a" stroke-width="1"/>
  <text x="436" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">@ModelAttribute</text>
  <text x="436" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">폼 필드 → 객체 프로퍼티 자동 바인딩</text>

  <!-- @MatrixVariable -->
  <rect x="420" y="458" width="400" height="48" fill="#0d1a2a" rx="6" stroke="#1e3a5a" stroke-width="1"/>
  <text x="436" y="478" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">@MatrixVariable</text>
  <text x="436" y="496" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">경로 세그먼트 내 ;key=value</text>

  <!-- Arrows from request box to annotations -->
  <!-- Arrow to @PathVariable -->
  <line x1="300" y1="150" x2="416" y2="134" stroke="#1e3a5a" stroke-width="2" stroke-dasharray="4,3"/>
  <!-- Arrow to @RequestParam -->
  <line x1="300" y1="150" x2="416" y2="192" stroke="#1e3a5a" stroke-width="2" stroke-dasharray="4,3"/>
  <!-- Arrow to @RequestHeader -->
  <line x1="300" y1="206" x2="416" y2="250" stroke="#1e3a5a" stroke-width="2" stroke-dasharray="4,3"/>
  <!-- Arrow to @CookieValue -->
  <line x1="300" y1="262" x2="416" y2="308" stroke="#1e3a5a" stroke-width="2" stroke-dasharray="4,3"/>
  <!-- Arrow to @RequestBody -->
  <line x1="300" y1="318" x2="416" y2="366" stroke="#1e3a5a" stroke-width="2" stroke-dasharray="4,3"/>
  <!-- Arrow to @ModelAttribute -->
  <line x1="300" y1="338" x2="416" y2="424" stroke="#1e3a5a" stroke-width="2" stroke-dasharray="4,3"/>
  <!-- Arrow to @MatrixVariable -->
  <line x1="300" y1="374" x2="416" y2="482" stroke="#1e3a5a" stroke-width="2" stroke-dasharray="4,3"/>
</svg>
