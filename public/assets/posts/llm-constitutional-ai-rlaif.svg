<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">RLAIF vs RLHF: 레이블러 비교</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">인간 레이블러 vs AI 레이블러로 선호 데이터 생성</text>

  <!-- Divider -->
  <line x1="440" y1="88" x2="440" y2="398" stroke="#3a4a6e" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- RLHF Side -->
  <text x="220" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7ec8e3" text-anchor="middle">RLHF</text>
  <text x="220" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">인간이 직접 선호 레이블 부여</text>

  <!-- Human labeler icon area -->
  <rect x="80" y="138" width="300" height="80" fill="#0d1520" rx="8" stroke="#3a4a6e"/>
  <text x="230" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="32" text-anchor="middle">👤</text>
  <text x="230" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">숙련된 인간 레이블러</text>
  <text x="230" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">(전문 가이드라인 교육 이수)</text>

  <!-- RLHF Process -->
  <rect x="80" y="232" width="300" height="140" fill="#111827" rx="8" stroke="#333"/>
  <text x="100" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">프로세스</text>
  <text x="100" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">응답 A, B 읽기 (수초~수분)</text>
  <text x="100" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">유해성·유용성·정확성 평가</text>
  <text x="100" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">더 나은 응답 선택 후 기록</text>
  <line x1="100" y1="328" x2="360" y2="328" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">비용: 레이블 당 $1~10+</text>
  <text x="100" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">속도: 느림 (인력 확보 필요)</text>

  <!-- RLAIF Side -->
  <text x="660" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555" text-anchor="middle">RLAIF (CAI)</text>
  <text x="660" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">AI가 원칙에 따라 레이블 부여</text>

  <!-- AI labeler icon area -->
  <rect x="500" y="138" width="300" height="80" fill="#0d1520" rx="8" stroke="#3a4a6e"/>
  <text x="650" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="32" text-anchor="middle">🤖</text>
  <text x="650" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">Constitution 기반 AI 레이블러</text>
  <text x="650" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">(Claude / Helpful RLHF 모델)</text>

  <!-- RLAIF Process -->
  <rect x="500" y="232" width="300" height="140" fill="#111827" rx="8" stroke="#333"/>
  <text x="520" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">프로세스</text>
  <text x="520" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">원칙 목록 + 응답 쌍 컨텍스트 구성</text>
  <text x="520" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">AI가 원칙에 따라 응답 비교</text>
  <text x="520" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">선호 레이블 자동 생성 (A/B)</text>
  <line x1="520" y1="328" x2="780" y2="328" stroke="#3a4a6e" stroke-width="1"/>
  <text x="520" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">비용: API 호출 비용 (매우 저렴)</text>
  <text x="520" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">속도: 빠름 (병렬 처리 가능)</text>

  <!-- Bottom comparison table -->
  <rect x="60" y="406" width="760" height="42" fill="#0d1520" rx="8" stroke="#3a4a6e"/>
  <text x="150" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">일관성</text>
  <text x="150" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">레이블러마다 다름</text>
  <text x="370" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">확장성</text>
  <text x="370" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">인력 한계</text>
  <text x="590" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">일관성</text>
  <text x="590" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">원칙에 따라 일관적</text>
  <text x="780" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">확장성</text>
  <text x="780" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">무제한 확장 가능</text>
</svg>
