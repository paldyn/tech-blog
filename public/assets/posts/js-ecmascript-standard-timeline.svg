<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="540" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">ECMAScript 버전 타임라인</text>

  <!-- Vertical timeline line -->
  <line x1="180" y1="70" x2="180" y2="480" stroke="#333" stroke-width="2"/>

  <!-- ES1~ES3 -->
  <circle cx="180" cy="90" r="8" fill="#444" stroke="#7ec8e3" stroke-width="2"/>
  <text x="200" y="88" font-size="13" font-weight="600" fill="#7ec8e3">ES1 ~ ES3</text>
  <text x="200" y="106" font-size="12" fill="#888">1997 ~ 1999 · 초기 표준화</text>
  <text x="120" y="94" text-anchor="end" font-size="11" fill="#555">1997</text>

  <!-- ES5 -->
  <circle cx="180" cy="148" r="8" fill="#444" stroke="#55c555" stroke-width="2"/>
  <text x="200" y="146" font-size="13" font-weight="600" fill="#55c555">ES5</text>
  <text x="200" y="164" font-size="12" fill="#888">2009 · strict mode · JSON · Array 메서드</text>
  <text x="120" y="152" text-anchor="end" font-size="11" fill="#555">2009</text>

  <!-- ES6 / ES2015 — highlight -->
  <rect x="192" y="196" width="560" height="64" rx="8" fill="#0d1117" stroke="#f7df1e" stroke-width="1.5"/>
  <circle cx="180" cy="228" r="10" fill="#f7df1e" stroke="#0a0a0a" stroke-width="2"/>
  <text x="210" y="216" font-size="14" font-weight="700" fill="#f7df1e">ES6 / ES2015  ← 가장 중요한 버전</text>
  <text x="210" y="236" font-size="12" fill="#e8e8e8">let/const · 화살표 함수 · 클래스 · 템플릿 리터럴</text>
  <text x="210" y="252" font-size="12" fill="#e8e8e8">모듈(import/export) · Promise · 제너레이터 · 디스트럭처링</text>
  <text x="120" y="232" text-anchor="end" font-size="11" fill="#555">2015</text>

  <!-- ES2016 -->
  <circle cx="180" cy="290" r="7" fill="#444" stroke="#7777cc" stroke-width="2"/>
  <text x="200" y="288" font-size="13" font-weight="600" fill="#7777cc">ES2016 (ES7)</text>
  <text x="200" y="306" font-size="12" fill="#888">Array.includes · 지수 연산자(**)</text>
  <text x="120" y="294" text-anchor="end" font-size="11" fill="#555">2016</text>

  <!-- ES2017 -->
  <circle cx="180" cy="336" r="7" fill="#444" stroke="#7777cc" stroke-width="2"/>
  <text x="200" y="334" font-size="13" font-weight="600" fill="#7777cc">ES2017 (ES8)</text>
  <text x="200" y="352" font-size="12" fill="#888">async/await · Object.entries/values · SharedArrayBuffer</text>
  <text x="120" y="340" text-anchor="end" font-size="11" fill="#555">2017</text>

  <!-- ES2018~2020 -->
  <circle cx="180" cy="388" r="7" fill="#444" stroke="#ce9178" stroke-width="2"/>
  <text x="200" y="386" font-size="13" font-weight="600" fill="#ce9178">ES2018 ~ ES2020</text>
  <text x="200" y="404" font-size="12" fill="#888">Promise.allSettled · BigInt · optional chaining · nullish coalescing</text>
  <text x="120" y="392" text-anchor="end" font-size="11" fill="#555">2018–20</text>

  <!-- ES2021~2024 -->
  <circle cx="180" cy="440" r="7" fill="#444" stroke="#55c555" stroke-width="2"/>
  <text x="200" y="438" font-size="13" font-weight="600" fill="#55c555">ES2021 ~ ES2024</text>
  <text x="200" y="456" font-size="12" fill="#888">논리 할당 · structuredClone · Object.groupBy · toSorted · withResolvers</text>
  <text x="120" y="444" text-anchor="end" font-size="11" fill="#555">2021–24</text>

  <!-- Footer note -->
  <text x="440" y="500" text-anchor="middle" font-size="11" fill="#444">ES5까지는 '번호', ES2015부터는 '연도' 표기가 공식. 숫자/연도 혼용이 흔하므로 매핑을 알아두세요.</text>
  <text x="440" y="520" text-anchor="middle" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복 시리즈 #2</text>
</svg>
