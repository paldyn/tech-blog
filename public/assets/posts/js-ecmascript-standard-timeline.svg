<svg xmlns="http://www.w3.org/2000/svg" width="880" height="600" viewBox="0 0 880 600"
  style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="600" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">ECMAScript 버전 히스토리</text>
  <text x="440" y="68" text-anchor="middle" font-size="14" fill="#888">ECMA-262 표준의 주요 이정표</text>

  <!-- Timeline vertical line -->
  <line x1="160" y1="95" x2="160" y2="530" stroke="#1e2433" stroke-width="2"/>

  <!-- ES1~ES3 -->
  <circle cx="160" cy="110" r="7" fill="#444"/>
  <text x="145" y="114" text-anchor="end" font-size="12" fill="#666">1997–1999</text>
  <rect x="180" y="96" width="300" height="32" rx="6" fill="#111827" stroke="#1e2433"/>
  <text x="330" y="117" text-anchor="middle" font-size="12" fill="#888">ES1 · ES2 · ES3 — 기초 표준 정립</text>

  <!-- ES5 -->
  <circle cx="160" cy="165" r="8" fill="#7ec8e3"/>
  <text x="145" y="169" text-anchor="end" font-size="12" fill="#7ec8e3">2009</text>
  <rect x="180" y="149" width="480" height="48" rx="6" fill="#0d1928" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="420" y="170" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">ES5 — 현대 JS의 시작</text>
  <text x="420" y="188" text-anchor="middle" font-size="12" fill="#888">strict mode · JSON · Array 고차 메서드 · getter/setter</text>

  <!-- ES6/ES2015 — THE BIG ONE -->
  <circle cx="160" cy="250" r="10" fill="#55c555"/>
  <text x="145" y="254" text-anchor="end" font-size="12" fill="#55c555">2015</text>
  <rect x="180" y="228" width="580" height="60" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="2"/>
  <text x="470" y="252" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">ES6 / ES2015 — 패러다임 전환 ★</text>
  <text x="470" y="272" text-anchor="middle" font-size="12" fill="#aaa">class · arrow fn · let/const · Promise · module · destructuring · template literals · Symbol</text>

  <!-- ES2016 -->
  <circle cx="160" cy="320" r="6" fill="#555"/>
  <text x="145" y="324" text-anchor="end" font-size="11" fill="#666">2016</text>
  <rect x="180" y="309" width="380" height="28" rx="5" fill="#111" stroke="#333"/>
  <text x="370" y="328" text-anchor="middle" font-size="12" fill="#777">ES2016 — Array.includes · 지수 연산자 (**)     </text>

  <!-- ES2017 -->
  <circle cx="160" cy="365" r="7" fill="#7777cc"/>
  <text x="145" y="369" text-anchor="end" font-size="11" fill="#7777cc">2017</text>
  <rect x="180" y="352" width="460" height="30" rx="5" fill="#12122a" stroke="#7777cc" stroke-width="1.2"/>
  <text x="410" y="372" text-anchor="middle" font-size="12" fill="#9999dd">ES2017 — async/await · Object.entries/values · SharedArrayBuffer</text>

  <!-- ES2018~2019 -->
  <circle cx="160" cy="410" r="6" fill="#555"/>
  <text x="145" y="414" text-anchor="end" font-size="11" fill="#666">2018–19</text>
  <rect x="180" y="398" width="460" height="30" rx="5" fill="#111" stroke="#333"/>
  <text x="410" y="418" text-anchor="middle" font-size="12" fill="#777">Promise.allSettled · Optional catch · Object rest/spread · for-await-of</text>

  <!-- ES2020 -->
  <circle cx="160" cy="453" r="7" fill="#ce9178"/>
  <text x="145" y="457" text-anchor="end" font-size="11" fill="#ce9178">2020</text>
  <rect x="180" y="440" width="460" height="30" rx="5" fill="#1a1208" stroke="#ce9178" stroke-width="1.2"/>
  <text x="410" y="460" text-anchor="middle" font-size="12" fill="#e0a87a">ES2020 — BigInt · nullish (??) · optional chaining (?.) · Promise.allSettled</text>

  <!-- ES2021~2024 -->
  <circle cx="160" cy="498" r="7" fill="#e8e8e8"/>
  <text x="145" y="502" text-anchor="end" font-size="11" fill="#e8e8e8">2021–24</text>
  <rect x="180" y="485" width="560" height="32" rx="5" fill="#1a1a1a" stroke="#555"/>
  <text x="460" y="501" text-anchor="middle" font-size="12" fill="#ccc">논리 할당 · at() · Error cause · structuredClone · Array.groupBy · Promise.withResolvers</text>
  <text x="460" y="516" text-anchor="middle" font-size="11" fill="#666">매년 6월 새 버전 — TC39 단계별 제안 프로세스</text>

  <!-- Footer -->
  <text x="440" y="558" text-anchor="middle" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복 시리즈 · Part I</text>
</svg>
