<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">TypeDefinition 기반 라이브러리 포함 구조</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">TypeDefinition.xml → 전역 포함 → 모든 폼에서 접근 가능</text>

  <!-- TypeDefinition box -->
  <rect x="60" y="96" width="320" height="290" rx="8" fill="#070b14" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="220" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">TypeDefinition.xml</text>

  <text x="80" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">&lt;TypeDefinition&gt;</text>
  <text x="80" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">  &lt;Includes&gt;</text>
  <text x="80" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">    &lt;FileRef</text>
  <text x="80" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">      path="common/gfn_common.xjs"</text>
  <text x="80" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">    /&gt;</text>
  <text x="80" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">    &lt;FileRef</text>
  <text x="80" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">      path="common/gfn_string.xjs"</text>
  <text x="80" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">    /&gt;</text>
  <text x="80" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">    &lt;FileRef</text>
  <text x="80" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">      path="common/CommonVars.xjs"</text>
  <text x="80" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">    /&gt;</text>
  <text x="80" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">  &lt;/Includes&gt;</text>
  <text x="80" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">&lt;/TypeDefinition&gt;</text>

  <!-- Arrow -->
  <line x1="380" y1="240" x2="440" y2="240" stroke="#555" stroke-width="2"/>
  <polygon points="448,240 436,234 436,246" fill="#555"/>

  <!-- Runtime box -->
  <rect x="448" y="96" width="372" height="290" rx="8" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="634" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">런타임 전역 스코프 (Global Scope)</text>

  <text x="468" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">포함된 .xjs 파일의 함수는</text>
  <text x="468" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">전역 함수로 등록된다</text>

  <rect x="468" y="188" width="332" height="36" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="634" y="211" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle" xml:space="preserve">gfn_isNull()  gfn_nvl()</text>

  <rect x="468" y="234" width="332" height="36" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="634" y="257" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle" xml:space="preserve">gfn_trim()  gfn_lpad()</text>

  <rect x="468" y="280" width="332" height="36" rx="6" fill="#1a2233" stroke="#7ec8e3" stroke-width="1"/>
  <text x="634" y="303" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">gv_userId  gv_userNm</text>

  <text x="468" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">모든 업무 폼에서 호출 가능</text>

  <rect x="468" y="350" width="332" height="28" rx="6" fill="#151515" stroke="#e8a840" stroke-width="1"/>
  <text x="634" y="369" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8a840" text-anchor="middle" xml:space="preserve">SCR001.xfdl  SCR002.xfdl ...</text>

  <!-- Label at bottom -->
  <text x="440" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">TypeDefinition에 한 번 등록하면 모든 폼에서 별도 import 없이 사용 가능</text>
</svg>
