<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Java 프로그램 실행 흐름</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#888">소스 작성 → 컴파일 → 클래스 로드 → 바이트코드 실행</text>

  <!-- ─── STEP 1: .java 소스 ─── -->
  <rect x="60" y="110" width="148" height="110" rx="8"
        fill="#0c1d2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="134" y="136" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">Hello.java</text>
  <line x1="80" y1="145" x2="188" y2="145" stroke="#1e3550" stroke-width="1"/>
  <text x="134" y="163" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">소스 파일</text>
  <text x="134" y="181" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#777">사람이 읽는 형식</text>
  <text x="134" y="199" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#777">UTF-8 텍스트</text>

  <!-- Step label 1 -->
  <text x="134" y="105" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">① 작성</text>

  <!-- ─── Arrow 1 ─── -->
  <rect x="208" y="161" width="42" height="8" rx="2" fill="#55c555" opacity="0.8"/>
  <polygon points="250,153 268,165 250,177" fill="#55c555" opacity="0.8" stroke="#0a0a0a" stroke-width="1"/>

  <!-- Arrow label 1 -->
  <text x="236" y="152" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">javac</text>

  <!-- ─── STEP 2: .class 바이트코드 ─── -->
  <rect x="268" y="110" width="148" height="110" rx="8"
        fill="#0d1e10" stroke="#55c555" stroke-width="1.5"/>
  <text x="342" y="136" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">Hello.class</text>
  <line x1="288" y1="145" x2="396" y2="145" stroke="#1a2e1a" stroke-width="1"/>
  <text x="342" y="163" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">바이트코드 파일</text>
  <text x="342" y="181" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#777">플랫폼 독립 바이너리</text>
  <text x="342" y="199" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#777">magic: 0xCAFEBABE</text>

  <!-- Step label 2 -->
  <text x="342" y="105" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">② 컴파일</text>

  <!-- ─── Arrow 2 ─── -->
  <rect x="416" y="161" width="42" height="8" rx="2" fill="#7777cc" opacity="0.8"/>
  <polygon points="458,153 476,165 458,177" fill="#7777cc" opacity="0.8" stroke="#0a0a0a" stroke-width="1"/>

  <!-- Arrow label 2 -->
  <text x="444" y="152" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9999dd">ClassLoader</text>

  <!-- ─── STEP 3: JVM 실행 ─── -->
  <rect x="476" y="110" width="148" height="110" rx="8"
        fill="#131028" stroke="#7777cc" stroke-width="1.5"/>
  <text x="550" y="136" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#9999dd">JVM</text>
  <line x1="496" y1="145" x2="604" y2="145" stroke="#1e1a3a" stroke-width="1"/>
  <text x="550" y="163" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">클래스 로드</text>
  <text x="550" y="181" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#777">바이트코드 검증</text>
  <text x="550" y="199" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#777">JIT 컴파일 / 실행</text>

  <!-- Step label 3 -->
  <text x="550" y="105" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9999dd">③ 로드 &amp; 실행</text>

  <!-- ─── Arrow 3 ─── -->
  <rect x="624" y="161" width="42" height="8" rx="2" fill="#e05555" opacity="0.8"/>
  <polygon points="666,153 684,165 666,177" fill="#e05555" opacity="0.8" stroke="#0a0a0a" stroke-width="1"/>

  <!-- Arrow label 3 -->
  <text x="652" y="152" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">출력</text>

  <!-- ─── STEP 4: 출력 결과 ─── -->
  <rect x="684" y="110" width="148" height="110" rx="8"
        fill="#1c0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="758" y="136" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">표준 출력</text>
  <line x1="704" y1="145" x2="812" y2="145" stroke="#2e1a1a" stroke-width="1"/>
  <!-- terminal mini display -->
  <rect x="700" y="152" width="120" height="52" rx="4" fill="#000000" stroke="#3a4a6e"/>
  <text x="712" y="170" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178">Hello, World!</text>
  <text x="712" y="188" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8">$</text>

  <!-- Step label 4 -->
  <text x="758" y="105" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">④ 결과</text>

  <!-- ─── OS/Platform note ─── -->
  <rect x="268" y="250" width="564" height="38" rx="6" fill="#111" stroke="#222"/>
  <text x="550" y="273" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#777">.class 파일은 Windows·macOS·Linux 어디서나 동일하게 동작한다 — Write Once, Run Anywhere</text>

  <!-- ─── Bottom: JVM internals labels ─── -->
  <text x="476" y="320" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8">JVM 내부 실행 단계</text>

  <rect x="60" y="340" width="210" height="52" rx="5" fill="#111" stroke="#333"/>
  <text x="165" y="358" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">Class Loader</text>
  <text x="165" y="378" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#777">.class 로드 → 링킹 → 초기화</text>

  <rect x="290" y="340" width="210" height="52" rx="5" fill="#111" stroke="#333"/>
  <text x="395" y="358" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">Runtime Data Areas</text>
  <text x="395" y="378" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#777">힙·스택·메서드 영역 메모리</text>

  <rect x="520" y="340" width="210" height="52" rx="5" fill="#111" stroke="#333"/>
  <text x="625" y="358" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">Execution Engine</text>
  <text x="625" y="378" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#777">인터프리터 + JIT 컴파일러</text>
</svg>
