<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">pathlib vs open() — 파일 I/O 비교</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Python 3.4+의 pathlib은 경로 조작과 파일 읽기·쓰기를 하나로 통합</text>

  <!-- Left: open() -->
  <rect x="60" y="96" width="360" height="30" rx="6" fill="#2a1a1a"/>
  <text x="240" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888" text-anchor="middle">전통 방식: open() 함수</text>

  <rect x="60" y="128" width="360" height="280" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 경로를 문자열로 처리</text>
  <text xml:space="preserve" x="76" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><ttml:tspan font-weight="600" fill="#7ec8e3">import</ttml:tspan> os</text>
  <text xml:space="preserve" x="76" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">path = os.path.join(<ttml:tspan fill="#ce9178">"data"</ttml:tspan>, <ttml:tspan fill="#ce9178">"log.txt"</ttml:tspan>)</text>
  <text xml:space="preserve" x="76" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><ttml:tspan font-weight="600" fill="#7ec8e3">with</ttml:tspan> <ttml:tspan font-weight="600" fill="#7ec8e3">open</ttml:tspan>(path, <ttml:tspan fill="#ce9178">"r"</ttml:tspan>,</text>
  <text xml:space="preserve" x="76" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">     encoding=<ttml:tspan fill="#ce9178">"utf-8"</ttml:tspan>) as f:</text>
  <text xml:space="preserve" x="76" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    content = f.read()</text>
  <text xml:space="preserve" x="76" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 파일 존재 확인도 별도</text>
  <text xml:space="preserve" x="76" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">exists = os.path.exists(path)</text>
  <text xml:space="preserve" x="76" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">size = os.path.getsize(path)</text>
  <text xml:space="preserve" x="76" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">name = os.path.basename(path)</text>
  <text xml:space="preserve" x="76" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">ext = os.path.splitext(path)[<ttml:tspan fill="#b5cea8">1</ttml:tspan>]</text>

  <!-- Right: pathlib -->
  <rect x="460" y="96" width="360" height="30" rx="6" fill="#1a2a1a"/>
  <text x="640" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">현대 방식: pathlib.Path</text>

  <rect x="460" y="128" width="360" height="280" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="476" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 경로를 객체로 처리</text>
  <text xml:space="preserve" x="476" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><ttml:tspan font-weight="600" fill="#7ec8e3">from</ttml:tspan> pathlib <ttml:tspan font-weight="600" fill="#7ec8e3">import</ttml:tspan> Path</text>
  <text xml:space="preserve" x="476" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">p = Path(<ttml:tspan fill="#ce9178">"data"</ttml:tspan>) / <ttml:tspan fill="#ce9178">"log.txt"</ttml:tspan></text>
  <text xml:space="preserve" x="476" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 한 줄로 전체 읽기</text>
  <text xml:space="preserve" x="476" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">content = p.read_text(</text>
  <text xml:space="preserve" x="476" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    encoding=<ttml:tspan fill="#ce9178">"utf-8"</ttml:tspan>)</text>
  <text xml:space="preserve" x="476" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 모든 메타데이터가 p에</text>
  <text xml:space="preserve" x="476" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">exists = p.exists()</text>
  <text xml:space="preserve" x="476" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">size = p.stat().st_size</text>
  <text xml:space="preserve" x="476" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">name = p.name     <ttml:tspan fill="#9aa4b8"># 'log.txt'</ttml:tspan></text>
  <text xml:space="preserve" x="476" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">ext = p.suffix    <ttml:tspan fill="#9aa4b8"># '.txt'</ttml:tspan></text>

  <!-- Bottom: / operator and open -->
  <rect x="60" y="420" width="760" height="28" rx="6" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="439" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">pathlib.Path는 / 연산자로 경로를 이어붙이고, open()에도 그대로 전달 가능</text>
</svg>
