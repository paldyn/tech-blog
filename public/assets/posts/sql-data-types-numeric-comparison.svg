<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">숫자 데이터 타입 비교</text>

  <!-- Header -->
  <rect x="60" y="68" width="760" height="32" fill="#162030"/>
  <text x="150" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">타입</text>
  <text x="300" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">범위 / 정밀도</text>
  <text x="490" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">저장 공간</text>
  <text x="680" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">사용 케이스</text>
  <line x1="230" y1="68" x2="230" y2="388" stroke="#3a4a6e" stroke-width="0.5"/>
  <line x1="380" y1="68" x2="380" y2="388" stroke="#3a4a6e" stroke-width="0.5"/>
  <line x1="600" y1="68" x2="600" y2="388" stroke="#3a4a6e" stroke-width="0.5"/>

  <rect x="60" y="100" width="760" height="32" fill="#0e1520"/>
  <text x="150" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">SMALLINT</text>
  <text x="300" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">-32,768 ~ 32,767</text>
  <text x="490" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">2 bytes</text>
  <text x="680" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">소량 코드값</text>

  <rect x="60" y="132" width="760" height="32" fill="#0a1018"/>
  <text x="150" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">INT / INTEGER</text>
  <text x="300" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">-2.1억 ~ 2.1억</text>
  <text x="490" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">4 bytes</text>
  <text x="680" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">일반 ID, 카운터</text>

  <rect x="60" y="164" width="760" height="32" fill="#0e1520"/>
  <text x="150" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">BIGINT</text>
  <text x="300" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">-922경 ~ 922경</text>
  <text x="490" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">8 bytes</text>
  <text x="680" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Snowflake ID, 대용량 PK</text>

  <rect x="60" y="196" width="760" height="32" fill="#0a1018"/>
  <text x="150" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">DECIMAL(p,s)</text>
  <text x="300" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">최대 38자리 정밀</text>
  <text x="490" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">가변 (p에 따라)</text>
  <text x="680" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">금액, 세금, 비율 (정확)</text>

  <rect x="60" y="228" width="760" height="32" fill="#0e1520"/>
  <text x="150" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">NUMERIC(p,s)</text>
  <text x="300" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">DECIMAL과 동일 (표준)</text>
  <text x="490" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">가변</text>
  <text x="680" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Oracle: NUMBER(p,s)</text>

  <rect x="60" y="260" width="760" height="32" fill="#0a1018"/>
  <text x="150" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8a020" text-anchor="middle">FLOAT / REAL</text>
  <text x="300" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">IEEE 754 단/배정밀도</text>
  <text x="490" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">4 / 8 bytes</text>
  <text x="680" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">과학/통계값 (근사)</text>

  <rect x="60" y="292" width="760" height="32" fill="#0e1520"/>
  <text x="150" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8a020" text-anchor="middle">DOUBLE PRECISION</text>
  <text x="300" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">15~17자리 유효숫자</text>
  <text x="490" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">8 bytes</text>
  <text x="680" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">ML 특징값 (근사)</text>

  <line x1="60" y1="324" x2="820" y2="324" stroke="#3a4a6e" stroke-width="0.5"/>

  <!-- Important note -->
  <rect x="60" y="340" width="760" height="64" fill="#1a1010" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">금액에는 반드시 DECIMAL/NUMERIC — FLOAT는 절대 사용 금지</text>
  <text x="440" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">SELECT 0.1 + 0.2 = 0.3 → FLOAT는 FALSE (부동소수점 오차)</text>
  <text x="440" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">DECIMAL은 정확한 10진수 연산 → 금융/결제 시스템 필수</text>

  <!-- Row dividers -->
  <line x1="60" y1="132" x2="820" y2="132" stroke="#3a4a6e" stroke-width="0.5"/>
  <line x1="60" y1="164" x2="820" y2="164" stroke="#3a4a6e" stroke-width="0.5"/>
  <line x1="60" y1="196" x2="820" y2="196" stroke="#3a4a6e" stroke-width="0.5"/>
  <line x1="60" y1="228" x2="820" y2="228" stroke="#3a4a6e" stroke-width="0.5"/>
  <line x1="60" y1="260" x2="820" y2="260" stroke="#3a4a6e" stroke-width="0.5"/>
  <line x1="60" y1="292" x2="820" y2="292" stroke="#3a4a6e" stroke-width="0.5"/>
  <line x1="60" y1="324" x2="820" y2="324" stroke="#3a4a6e" stroke-width="0.5"/>
</svg>