<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Graph RAG 파이프라인</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888">문서 → 지식 그래프 구축 → 그래프 기반 검색</text>

  <!-- Phase 1: Indexing -->
  <rect x="60" y="90" width="360" height="36" rx="6" fill="#0d1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">인덱싱 단계 (오프라인)</text>

  <rect x="60" y="134" width="100" height="60" rx="6" fill="#111" stroke="#333"/>
  <text x="110" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#e8e8e8">문서 청킹</text>
  <text x="110" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">텍스트 분할</text>

  <line x1="160" y1="164" x2="176" y2="164" stroke="#444" stroke-width="1.5"/>
  <polygon points="172,159 182,164 172,169" fill="#444"/>

  <rect x="182" y="134" width="110" height="60" rx="6" fill="#111" stroke="#333"/>
  <text x="237" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#e8e8e8">NER·관계 추출</text>
  <text x="237" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">(LLM 사용)</text>
  <text x="237" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">엔티티·트리플</text>

  <line x1="292" y1="164" x2="308" y2="164" stroke="#444" stroke-width="1.5"/>
  <polygon points="304,159 314,164 304,169" fill="#444"/>

  <rect x="314" y="134" width="106" height="60" rx="6" fill="#0d1020" stroke="#55c555" stroke-width="1.5"/>
  <text x="367" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#55c555">지식 그래프</text>
  <text x="367" y="173" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">Neo4j / NetworkX</text>
  <text x="367" y="187" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">노드+엣지 저장</text>

  <!-- Phase 2: Retrieval -->
  <rect x="460" y="90" width="360" height="36" rx="6" fill="#0d1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">검색 단계 (온라인)</text>

  <rect x="460" y="134" width="100" height="60" rx="6" fill="#111" stroke="#333"/>
  <text x="510" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#e8e8e8">쿼리 분석</text>
  <text x="510" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">핵심 엔티티</text>
  <text x="510" y="187" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">추출</text>

  <line x1="560" y1="164" x2="576" y2="164" stroke="#444" stroke-width="1.5"/>
  <polygon points="572,159 582,164 572,169" fill="#444"/>

  <rect x="582" y="134" width="110" height="60" rx="6" fill="#111" stroke="#333"/>
  <text x="637" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#e8e8e8">서브그래프 탐색</text>
  <text x="637" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">BFS/DFS로</text>
  <text x="637" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">N홉 이웃 수집</text>

  <line x1="692" y1="164" x2="708" y2="164" stroke="#444" stroke-width="1.5"/>
  <polygon points="704,159 714,164 704,169" fill="#444"/>

  <rect x="714" y="134" width="106" height="60" rx="6" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="767" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#e05555">컨텍스트 생성</text>
  <text x="767" y="173" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">그래프 → 텍스트</text>
  <text x="767" y="187" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">변환 후 LLM</text>

  <!-- Microsoft GraphRAG -->
  <rect x="60" y="216" width="760" height="60" rx="8" fill="#111" stroke="#333"/>
  <text x="440" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8e8e8">Microsoft GraphRAG의 두 가지 검색 모드</text>
  <text x="220" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">Local Search: 특정 엔티티 주변 서브그래프</text>
  <text x="660" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">Global Search: 전체 그래프 요약 커뮤니티 활용</text>

  <!-- Code block -->
  <rect x="60" y="296" width="760" height="64" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># LLMGraphTransformer로 지식 그래프 자동 구축</text>
  <text x="76" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">from</text>
  <text x="108" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> langchain_experimental.graph_transformers </text>
  <text x="108" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">                                            import</text>
  <text x="108" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">                                                   LLMGraphTransformer</text>
  <text x="76" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">transformer = LLMGraphTransformer(llm=llm)</text>
  <text x="76" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">                                             # 문서에서 (엔티티, 관계, 엔티티) 트리플 추출</text>
</svg>
