<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">CNN 아키텍처 역사 타임라인</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">1989 → 2019: 30년간의 혁신</text>

  <!-- Timeline line -->
  <line x1="60" y1="160" x2="820" y2="160" stroke="#2a3550" stroke-width="3"/>

  <!-- LeNet (1989/1998) -->
  <circle cx="100" cy="160" r="10" fill="#7ec8e3" stroke="#3a7aaa" stroke-width="2"/>
  <line x1="100" y1="150" x2="100" y2="100" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="52" y="62" width="96" height="36" fill="#101828" rx="4" stroke="#7ec8e3" stroke-width="1"/>
  <text x="100" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3">LeNet-5</text>
  <text x="100" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">1998 · LeCun</text>
  <text x="100" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">손글씨 인식</text>
  <text x="100" y="195" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">60K 파라미터</text>

  <!-- AlexNet (2012) -->
  <circle cx="260" cy="160" r="14" fill="#e05555" stroke="#8a1515" stroke-width="2"/>
  <line x1="260" y1="174" x2="260" y2="230" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="196" y="230" width="128" height="52" fill="#1a0d0d" rx="4" stroke="#e05555" stroke-width="1.5"/>
  <text x="260" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e05555">AlexNet</text>
  <text x="260" y="263" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">2012 · Krizhevsky</text>
  <text x="260" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">Top-5: 15.3%</text>
  <text x="260" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">⚡ 딥러닝 붐</text>

  <!-- VGGNet (2014) -->
  <circle cx="400" cy="160" r="10" fill="#ce9178" stroke="#7a5530" stroke-width="2"/>
  <line x1="400" y1="150" x2="400" y2="100" stroke="#ce9178" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="344" y="62" width="112" height="36" fill="#1a1208" rx="4" stroke="#ce9178" stroke-width="1"/>
  <text x="400" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#ce9178">VGGNet</text>
  <text x="400" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">2014 · Oxford</text>
  <text x="400" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">3×3 일관성</text>
  <text x="400" y="195" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">138M 파라미터</text>

  <!-- GoogLeNet (2014) -->
  <circle cx="500" cy="160" r="10" fill="#7777cc" stroke="#3a3a8a" stroke-width="2"/>
  <line x1="500" y1="174" x2="500" y2="230" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="440" y="230" width="120" height="52" fill="#0d0d1a" rx="4" stroke="#7777cc" stroke-width="1"/>
  <text x="500" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7777cc">GoogLeNet</text>
  <text x="500" y="263" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">2014 · Google</text>
  <text x="500" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">Inception 모듈</text>

  <!-- ResNet (2015) -->
  <circle cx="610" cy="160" r="14" fill="#55c555" stroke="#1a5a1a" stroke-width="2"/>
  <line x1="610" y1="150" x2="610" y2="100" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="548" y="62" width="124" height="36" fill="#0d1a0d" rx="4" stroke="#55c555" stroke-width="1.5"/>
  <text x="610" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555">ResNet</text>
  <text x="610" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">2015 · He et al.</text>
  <text x="610" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">⚡ 잔차 연결</text>
  <text x="610" y="195" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">152층 돌파</text>

  <!-- DenseNet (2017) -->
  <circle cx="710" cy="160" r="10" fill="#7ec8e3" stroke="#3a7aaa" stroke-width="2"/>
  <line x1="710" y1="174" x2="710" y2="230" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="652" y="230" width="116" height="52" fill="#101828" rx="4" stroke="#7ec8e3" stroke-width="1"/>
  <text x="710" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3">DenseNet</text>
  <text x="710" y="263" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">2017 · Huang</text>
  <text x="710" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">밀집 연결</text>

  <!-- EfficientNet (2019) -->
  <circle cx="800" cy="160" r="10" fill="#ce9178" stroke="#7a5530" stroke-width="2"/>
  <line x1="800" y1="150" x2="800" y2="100" stroke="#ce9178" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="740" y="62" width="124" height="36" fill="#1a1208" rx="4" stroke="#ce9178" stroke-width="1"/>
  <text x="802" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#ce9178">EfficientNet</text>
  <text x="802" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">2019 · Google</text>
  <text x="800" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">복합 스케일링</text>
  <text x="800" y="195" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">SoTA 정확도</text>

  <!-- Year labels -->
  <text x="100"  y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">1998</text>
  <text x="260"  y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">2012</text>
  <text x="400"  y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">2014</text>
  <text x="500"  y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">2014</text>
  <text x="610"  y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">2015</text>
  <text x="710"  y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">2017</text>
  <text x="800"  y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">2019</text>

  <!-- ImageNet Top-5 Error chart -->
  <rect x="36" y="310" width="808" height="145" fill="#070b14" rx="8" stroke="#1e2433"/>
  <text x="440" y="332" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">ImageNet Top-5 오류율 변화</text>

  <!-- Bar chart -->
  <g transform="translate(60, 345)">
    <!-- Bars (lower = better, bars go down from top) -->
    <!-- Human: 5.1% -->
    <line x1="0" y1="90" x2="760" y2="90" stroke="#1e2433" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="-8" y="94" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">5%</text>

    <!-- LeNet: ~26% -->
    <rect x="20"  y="18" width="40" height="72" fill="#7ec8e3" opacity="0.6" rx="2"/>
    <text x="40"  y="14" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">26%</text>
    <text x="40"  y="105" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">LeNet</text>

    <!-- AlexNet: 15.3% -->
    <rect x="120" y="46" width="40" height="44" fill="#e05555" opacity="0.8" rx="2"/>
    <text x="140" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">15.3%</text>
    <text x="140" y="105" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">AlexNet</text>

    <!-- VGG: 7.3% -->
    <rect x="220" y="68" width="40" height="22" fill="#ce9178" opacity="0.8" rx="2"/>
    <text x="240" y="64" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#ce9178">7.3%</text>
    <text x="240" y="105" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">VGG</text>

    <!-- GoogLeNet: 6.7% -->
    <rect x="320" y="69" width="40" height="21" fill="#7777cc" opacity="0.8" rx="2"/>
    <text x="340" y="65" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">6.7%</text>
    <text x="340" y="105" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">GoogLeNet</text>

    <!-- ResNet: 3.6% -->
    <rect x="420" y="79" width="40" height="11" fill="#55c555" opacity="0.8" rx="2"/>
    <text x="440" y="75" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">3.6%</text>
    <text x="440" y="105" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">ResNet</text>

    <!-- DenseNet: 3.5% -->
    <rect x="520" y="79" width="40" height="11" fill="#7ec8e3" opacity="0.8" rx="2"/>
    <text x="540" y="75" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">3.5%</text>
    <text x="540" y="105" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">DenseNet</text>

    <!-- EfficientNet: 2.9% -->
    <rect x="620" y="81" width="40" height="9" fill="#ce9178" opacity="0.8" rx="2"/>
    <text x="640" y="77" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#ce9178">2.9%</text>
    <text x="640" y="105" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">EfficientNet</text>

    <!-- Human line label -->
    <text x="720" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">← 인간 수준</text>
  </g>
</svg>
