<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr-t" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-o" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
    <marker id="arr-gt" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">여러 원격 저장소 토폴로지</text>

  <!-- Local Repo (Center) -->
  <rect x="330" y="180" width="220" height="70" rx="10" fill="#0e1420" stroke="#3a4a6e" stroke-width="2"/>
  <text x="440" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">로컬 저장소</text>
  <text x="440" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">origin + upstream + backup</text>

  <!-- origin (My Fork) -->
  <rect x="60" y="70" width="190" height="60" rx="8" fill="#1a2233" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="155" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">origin</text>
  <text x="155" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">내 포크 (GitHub)</text>

  <!-- Arrow: origin ↔ local -->
  <line x1="250" y1="100" x2="370" y2="196" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-t)"/>
  <line x1="370" y1="210" x2="250" y2="120" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-t)"/>
  <text x="296" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">push / fetch</text>

  <!-- upstream (Original) -->
  <rect x="630" y="70" width="190" height="60" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="725" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">upstream</text>
  <text x="725" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">원본 저장소 (GitHub)</text>

  <!-- Arrow: upstream → local (fetch only) -->
  <line x1="630" y1="110" x2="550" y2="196" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-gt)"/>
  <text x="600" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">fetch only</text>

  <!-- backup (S3/Self-hosted) -->
  <rect x="330" y="360" width="220" height="60" rx="8" fill="#2a1a1a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="440" y="385" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">backup</text>
  <text x="440" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">자체 서버 / S3</text>

  <!-- Arrow: local → backup -->
  <line x1="440" y1="250" x2="440" y2="359" stroke="#ce9178" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-o)"/>
  <text x="472" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">push only</text>

  <!-- Bottom: config commands -->
  <rect x="60" y="442" width="760" height="0" rx="0" fill="none"/>
</svg>
