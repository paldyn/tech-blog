<svg width="880" height="380" viewBox="0 0 880 380" xmlns="http://www.w3.org/2000/svg" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">함수 실전 패턴</text>

  <!-- Error handling pattern -->
  <rect x="60" y="64" width="370" height="36" rx="6" fill="#1e3a5f" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="245" y="86" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">에러 핸들링 함수</text>
  <rect x="60" y="106" width="370" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="126" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">die() {</tspan></text>
  <text x="76" y="144" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"ERROR: $*"</tspan><tspan fill="#ffffff"> &gt;&amp;2</tspan></text>
  <text x="76" y="162" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">exit</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">1</tspan></text>
  <text x="76" y="180" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">}</tspan></text>
  <text x="76" y="198" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">log() {</tspan><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"[$(date +%T)] $*"</tspan><tspan fill="#ffffff">; }</tspan></text>
  <text x="76" y="216" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># 사용</text>
  <text x="76" y="234" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">cp src dst || die </tspan><tspan fill="#ce9178">"복사 실패"</tspan></text>

  <!-- Recursive function -->
  <rect x="450" y="64" width="370" height="36" rx="6" fill="#1e3a5f" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="635" y="86" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">재귀 함수</text>
  <rect x="450" y="106" width="370" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="466" y="126" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">factorial() {</tspan></text>
  <text x="466" y="144" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">local</tspan><tspan fill="#ffffff"> n=$1</tspan></text>
  <text x="466" y="162" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">    (( n &lt;= </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff"> )) &amp;&amp; { </tspan><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">; </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff">; }</tspan></text>
  <text x="466" y="180" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">    echo</tspan><tspan fill="#ffffff"> $(( n * $(factorial $((n-1))) ))</tspan></text>
  <text x="466" y="198" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">}</tspan></text>
  <text x="466" y="216" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> $(factorial </tspan><tspan fill="#b5cea8">5</tspan><tspan fill="#ffffff">)</tspan><tspan fill="#9aa4b8">  # 120</tspan></text>

  <!-- Function export -->
  <rect x="60" y="256" width="760" height="96" rx="8" fill="#111827" stroke="#334155" stroke-width="1"/>
  <text x="440" y="280" text-anchor="middle" font-size="15" font-weight="600" fill="#e8e8e8">함수 내보내기 (export -f)</text>
  <rect x="76" y="290" width="728" height="50" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="310" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">export</tspan><tspan fill="#ffffff"> -f greet               </tspan><tspan fill="#9aa4b8"># 서브셸·xargs에서도 사용 가능</tspan></text>
  <text x="92" y="328" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">find</tspan><tspan fill="#ffffff"> . -name </tspan><tspan fill="#ce9178">"*.txt"</tspan><tspan fill="#ffffff"> -exec bash -c </tspan><tspan fill="#ce9178">'greet "$1"'</tspan><tspan fill="#ffffff"> _ {} \;</tspan></text>
</svg>
