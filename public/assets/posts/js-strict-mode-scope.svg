<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <style>
      text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }
    </style>
  </defs>
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Strict Mode 적용 범위와 선언 방법</text>

  <!-- Section 1: 적용 방법 -->
  <text x="60" y="80" font-size="16" font-weight="600" fill="#e8e8e8">적용 방법</text>

  <!-- File-level -->
  <rect x="60" y="94" width="360" height="130" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="116" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">파일 전체 적용</text>
  <rect x="76" y="124" width="328" height="88" rx="5" fill="#070b14" stroke="#1e2433"/>
  <text x="88" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">'use strict'; // 파일 맨 위</text>
  <text x="88" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> </text>
  <text x="88" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">function foo() { ... }</text>
  <text x="88" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// 전체 파일이 strict</text>

  <!-- Function-level -->
  <rect x="460" y="94" width="360" height="130" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="640" y="116" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">함수 단위 적용</text>
  <rect x="476" y="124" width="328" height="88" rx="5" fill="#070b14" stroke="#1e2433"/>
  <text x="488" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">function strict() {</text>
  <text x="488" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">  'use strict';</text>
  <text x="488" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  // strict 적용됨</text>
  <text x="488" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">}</text>

  <!-- Section 2: 자동 적용 -->
  <text x="60" y="248" font-size="16" font-weight="600" fill="#e8e8e8">자동으로 Strict Mode가 되는 경우</text>

  <!-- Auto-strict cases -->
  <rect x="60" y="262" width="236" height="80" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="178" y="284" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">ES Modules</text>
  <text x="178" y="304" text-anchor="middle" font-size="12" fill="#888">import/export가 있는 파일</text>
  <text x="178" y="322" text-anchor="middle" font-size="11" fill="#666">자동으로 strict 적용</text>

  <rect x="322" y="262" width="236" height="80" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="284" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">클래스 내부</text>
  <text x="440" y="304" text-anchor="middle" font-size="12" fill="#888">class 바디는 항상 strict</text>
  <text x="440" y="322" text-anchor="middle" font-size="11" fill="#666">ES2015+</text>

  <rect x="584" y="262" width="236" height="80" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="702" y="284" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">빌드 도구</text>
  <text x="702" y="304" text-anchor="middle" font-size="12" fill="#888">Babel · TypeScript 출력</text>
  <text x="702" y="322" text-anchor="middle" font-size="11" fill="#666">'use strict' 자동 삽입</text>

  <!-- Key note -->
  <rect x="60" y="362" width="760" height="60" rx="6" fill="#0d1117" stroke="#2a2a2a"/>
  <text x="440" y="385" text-anchor="middle" font-size="13" fill="#e8e8e8">오늘날 실무 코드는 대부분 자동으로 strict mode입니다</text>
  <text x="440" y="407" text-anchor="middle" font-size="12" fill="#888">ES Modules (import/export), TypeScript, 빌드 도구 — 이 중 하나라도 쓰면 'use strict'를 따로 쓸 필요가 없습니다</text>

  <!-- Footer -->
  <text x="440" y="448" text-anchor="middle" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복 시리즈</text>
</svg>
