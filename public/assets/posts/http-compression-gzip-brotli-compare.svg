<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">gzip vs Brotli</text>
    <!-- gzip box -->
    <rect x="60" y="75" width="350" height="110" rx="8" fill="#0f1f3a" stroke="#4a7aaa" stroke-width="1.5"/>
    <text x="235" y="101" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">gzip (1992)</text>
    <text x="235" y="123" text-anchor="middle" font-size="11" fill="#888">DEFLATE = LZ77 + 허프만 부호화</text>
    <text x="235" y="143" text-anchor="middle" font-size="11" fill="#888">참조 윈도 32KB · 레벨 1~9</text>
    <text x="235" y="163" text-anchor="middle" font-size="11" fill="#888">모든 클라이언트 지원 — 동적 압축의 표준</text>
    <!-- brotli box -->
    <rect x="470" y="75" width="350" height="110" rx="8" fill="#1f173a" stroke="#7777cc" stroke-width="1.5"/>
    <text x="645" y="101" text-anchor="middle" font-size="13" font-weight="600" fill="#9b8fe8">Brotli (2015, Google)</text>
    <text x="645" y="123" text-anchor="middle" font-size="11" fill="#888">LZ77 확장 + 컨텍스트 모델링 + 정적 사전</text>
    <text x="645" y="143" text-anchor="middle" font-size="11" fill="#888">참조 윈도 최대 16MB · 레벨 0~11</text>
    <text x="645" y="163" text-anchor="middle" font-size="11" fill="#888">웹 텍스트 특화 사전 내장 — 정적 자산 최강</text>
    <!-- Bar chart -->
    <text x="60" y="232" font-size="13" font-weight="600" fill="#e8e8e8">번들 JS 1,200KB 압축 결과 (높은 레벨 기준)</text>
    <text x="160" y="270" text-anchor="end" font-size="12" fill="#888">원본</text>
    <rect x="176" y="252" width="600" height="26" rx="4" fill="#333333"/>
    <text x="470" y="270" text-anchor="middle" font-size="12" fill="#cccccc">1,200KB</text>
    <text x="160" y="312" text-anchor="end" font-size="12" fill="#7ec8e3">gzip -9</text>
    <rect x="176" y="294" width="190" height="26" rx="4" fill="#0f1f3a" stroke="#4a7aaa" stroke-width="1"/>
    <text x="378" y="312" font-size="12" fill="#7ec8e3">380KB (-68%)</text>
    <text x="160" y="354" text-anchor="end" font-size="12" fill="#9b8fe8">brotli -11</text>
    <rect x="176" y="336" width="145" height="26" rx="4" fill="#1f173a" stroke="#7777cc" stroke-width="1"/>
    <text x="333" y="354" font-size="12" fill="#9b8fe8">290KB (-76%, gzip보다 ~24% 작음)</text>
    <!-- Summary -->
    <text x="440" y="408" text-anchor="middle" font-size="12" fill="#888">정적 자산: 빌드 때 brotli -11 사전 압축 · 동적 응답: gzip 4~6 또는 brotli 4~5 실시간 압축</text>
    <text x="440" y="426" text-anchor="middle" font-size="11" fill="#555">brotli 최고 레벨은 압축이 느려 실시간용이 아니다 — 미리 압축해 두는 용도</text>
  </g>
</svg>
