<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Next.js i18n 라우팅 구조</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">로케일 기반 URL 설계 — [locale] 세그먼트 방식</text>

  <!-- URL examples -->
  <rect x="60" y="96" width="380" height="220" rx="7" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="250" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">URL 구조</text>

  <rect x="80" y="138" width="340" height="32" rx="5" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text x="250" y="159" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">example.com/ko/about</text>

  <rect x="80" y="180" width="340" height="32" rx="5" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text x="250" y="201" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">example.com/en/about</text>

  <rect x="80" y="222" width="340" height="32" rx="5" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text x="250" y="243" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">example.com/ja/about</text>

  <rect x="80" y="264" width="340" height="32" rx="5" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text x="250" y="285" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">example.com/about (기본 로케일 리다이렉트)</text>

  <!-- File structure -->
  <rect x="460" y="96" width="360" height="220" rx="7" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">파일 구조</text>
  <text x="476" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">app/</text>
  <text x="476" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">  [locale]/</text>
  <text x="476" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    layout.tsx</text>
  <text x="476" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    page.tsx</text>
  <text x="476" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    about/</text>
  <text x="476" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      page.tsx</text>
  <text x="476" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">messages/</text>
  <text x="476" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">  ko.json · en.json · ja.json</text>
  <text x="476" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">middleware.ts</text>

  <!-- Middleware flow -->
  <rect x="60" y="334" width="760" height="82" rx="7" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8">미들웨어 처리 흐름</text>
  <text x="200" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">① 요청 URL 분석</text>
  <text x="200" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Accept-Language 헤더</text>
  <text x="440" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">② 로케일 감지 · 결정</text>
  <text x="440" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">쿠키 우선 → 헤더 → 기본값</text>
  <text x="680" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">③ 리다이렉트 또는 패스스루</text>
  <text x="680" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">/en/page로 rewrite</text>
</svg>
