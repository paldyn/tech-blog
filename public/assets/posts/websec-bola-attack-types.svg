<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">BOLA 공격 유형과 방어 전략</text>

  <!-- Left column: Attack types -->
  <text x="215" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">공격 유형</text>

  <!-- Type 1: Sequential ID -->
  <rect x="60" y="88" width="310" height="70" rx="6" fill="#2a1010" stroke="#7a2a2a" stroke-width="1"/>
  <text x="215" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">1. 순차 ID 열거</text>
  <text x="215" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">GET /users/1, /users/2, /users/3...</text>
  <text x="215" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">자동 스크립트로 모든 사용자 데이터 수집</text>

  <!-- Type 2: Horizontal Priv Esc -->
  <rect x="60" y="172" width="310" height="70" rx="6" fill="#2a1010" stroke="#7a2a2a" stroke-width="1"/>
  <text x="215" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">2. 수평적 권한 상승</text>
  <text x="215" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">같은 역할, 다른 사용자 자원 접근</text>
  <text x="215" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">UserA가 UserB 프로필 수정</text>

  <!-- Type 3: Indirect Reference -->
  <rect x="60" y="256" width="310" height="70" rx="6" fill="#2a1010" stroke="#7a2a2a" stroke-width="1"/>
  <text x="215" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">3. 간접 참조 우회</text>
  <text x="215" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">파일 경로, 해시, UUID도 예측 가능</text>
  <text x="215" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">응답에서 다른 사용자 ID 노출</text>

  <!-- Type 4: GraphQL -->
  <rect x="60" y="340" width="310" height="70" rx="6" fill="#2a1010" stroke="#7a2a2a" stroke-width="1"/>
  <text x="215" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">4. 관계 탐색</text>
  <text x="215" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">자신 자원 → 연관 자원 타인 것 접근</text>
  <text x="215" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">order.user.credit_card (중첩 쿼리)</text>

  <!-- Right column: Defenses -->
  <text x="665" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">방어 전략</text>

  <rect x="470" y="88" width="350" height="70" rx="6" fill="#0d1f0d" stroke="#2a5a2a" stroke-width="1"/>
  <text x="645" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">무작위 UUID 사용</text>
  <text x="645" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">GET /users/550e8400-e29b-41d4-...</text>
  <text x="645" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">순차 예측 불가 → 열거 어렵게</text>

  <rect x="470" y="172" width="350" height="70" rx="6" fill="#0d1f0d" stroke="#2a5a2a" stroke-width="1"/>
  <text x="645" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">쿼리 소유자 필터</text>
  <text x="645" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">WHERE id=? AND user_id=current_user</text>
  <text x="645" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">없으면 404 (403 아님 — 존재 노출 금지)</text>

  <rect x="470" y="256" width="350" height="70" rx="6" fill="#0d1f0d" stroke="#2a5a2a" stroke-width="1"/>
  <text x="645" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">응답 필드 최소화</text>
  <text x="645" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">다른 사용자 ID 포함 필드 제거</text>
  <text x="645" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">참조 타고 나갈 수 있는 필드 제한</text>

  <rect x="470" y="340" width="350" height="70" rx="6" fill="#0d1f0d" stroke="#2a5a2a" stroke-width="1"/>
  <text x="645" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">GraphQL 깊이 + 필드 권한 제한</text>
  <text x="645" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">중첩 쿼리 깊이 제한 + 필드별 권한</text>
  <text x="645" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">관계 필드마다 독립 권한 확인</text>

  <!-- Bottom -->
  <text x="440" y="434" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">UUID가 보안을 보장하지는 않는다 — 소유자 검증이 핵심. UUID는 예측을 어렵게 할 뿐.</text>
  <text x="440" y="454" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">자동화 BOLA 테스트: Autorize(Burp Suite 플러그인) 또는 직접 Pytest로 권한 매트릭스 테스트 구성</text>
</svg>
