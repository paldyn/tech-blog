<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-pu" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
    <marker id="arr-gr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">MVC vs WebFlux 선택 기준</text>

  <!-- Start node -->
  <rect x="330" y="72" width="220" height="40" rx="20" fill="#1a2035" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="96" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">새 프로젝트 시작</text>

  <!-- Arrow down -->
  <line x1="440" y1="112" x2="440" y2="144" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Q1: Blocking libs? -->
  <rect x="270" y="146" width="340" height="48" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="167" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">블로킹 라이브러리가 필수인가?</text>
  <text x="440" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">(JDBC, 동기 SDK, 레거시 연동 등)</text>

  <!-- YES branch left -->
  <line x1="270" y1="170" x2="220" y2="170" stroke="#e05555" stroke-width="2"/>
  <line x1="220" y1="170" x2="220" y2="266" stroke="#e05555" stroke-width="2" marker-end="url(#arr-pu)"/>
  <text x="244" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">YES</text>

  <!-- NO branch right -->
  <line x1="610" y1="170" x2="660" y2="170" stroke="#55c555" stroke-width="2"/>
  <line x1="660" y1="170" x2="660" y2="266" stroke="#55c555" stroke-width="2" marker-end="url(#arr-gr)"/>
  <text x="614" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">NO</text>

  <!-- Arrow down from Q1 -->
  <line x1="440" y1="194" x2="440" y2="226" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Q2: Team familiar with reactive? -->
  <rect x="270" y="228" width="340" height="48" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="249" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">팀이 리액티브에 익숙한가?</text>
  <text x="440" y="267" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">(Reactor, Mono/Flux 경험 유무)</text>

  <!-- YES from Q2 -->
  <line x1="440" y1="276" x2="440" y2="310" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="448" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">YES</text>

  <!-- Q3: High concurrency? -->
  <rect x="270" y="312" width="340" height="48" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="333" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">고동시성·I/O 집약형인가?</text>
  <text x="440" y="351" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">(API 게이트웨이, 스트리밍, 채팅 등)</text>

  <!-- NO from Q2 goes left -->
  <line x1="270" y1="252" x2="220" y2="252" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="220" y1="252" x2="220" y2="266" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-pu)"/>
  <text x="224" y="247" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">NO</text>

  <!-- Q3 YES arrow right -->
  <line x1="610" y1="336" x2="658" y2="336" stroke="#55c555" stroke-width="2" marker-end="url(#arr-gr)"/>
  <text x="614" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">YES</text>

  <!-- Q3 NO arrow down-left -->
  <line x1="270" y1="336" x2="222" y2="336" stroke="#e05555" stroke-width="2"/>
  <line x1="222" y1="336" x2="222" y2="418" stroke="#e05555" stroke-width="2" marker-end="url(#arr-pu)"/>
  <text x="226" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">NO</text>

  <!-- RESULT LEFT: Spring MVC -->
  <rect x="60" y="268" width="152" height="58" rx="8" fill="#17102a" stroke="#7777cc" stroke-width="2"/>
  <text x="136" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">Spring MVC</text>
  <text x="136" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">검증된 안정성</text>
  <text x="136" y="324" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">낮은 러닝 커브</text>

  <!-- RESULT RIGHT: Spring WebFlux -->
  <rect x="668" y="310" width="152" height="58" rx="8" fill="#091a10" stroke="#55c555" stroke-width="2"/>
  <text x="744" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">Spring WebFlux</text>
  <text x="744" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">고동시성 처리</text>
  <text x="744" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">논블로킹 I/O</text>

  <!-- RESULT LEFT 2: Spring MVC (from Q3 NO) -->
  <rect x="60" y="392" width="152" height="58" rx="8" fill="#17102a" stroke="#7777cc" stroke-width="2"/>
  <text x="136" y="416" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">Spring MVC</text>
  <text x="136" y="434" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">생산성 우선</text>
  <text x="136" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">일반 CRUD 앱</text>

  <!-- Bottom tip -->
  <rect x="240" y="430" width="400" height="56" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" font-weight="600">💡 Tip: 둘을 혼용하지 마세요</text>
  <text x="440" y="470" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">WebFlux 앱에서 블로킹 코드는 전체 성능을 망칩니다</text>
</svg>
