<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">libvirt 아키텍처 — 통합 가상화 API</text>

  <!-- Clients row -->
  <rect x="60" y="80" width="140" height="60" rx="8" fill="#001a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">virsh</text>
  <text x="130" y="128" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">CLI</text>

  <rect x="220" y="80" width="140" height="60" rx="8" fill="#001a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="290" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">virt-manager</text>
  <text x="290" y="128" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">GUI</text>

  <rect x="380" y="80" width="140" height="60" rx="8" fill="#001a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="450" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">oVirt / OpenStack</text>
  <text x="450" y="128" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">클라우드 플랫폼</text>

  <rect x="540" y="80" width="140" height="60" rx="8" fill="#001a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="610" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Python/Go SDK</text>
  <text x="610" y="128" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">libvirt API</text>

  <!-- Arrows down to libvirtd -->
  <line x1="130" y1="140" x2="130" y2="192" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="290" y1="140" x2="290" y2="192" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="450" y1="140" x2="450" y2="192" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="610" y1="140" x2="610" y2="192" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- libvirtd -->
  <rect x="60" y="192" width="760" height="70" rx="8" fill="#002020" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="222" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555">libvirtd / virtqemud</text>
  <text x="440" y="244" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Unix 소켓(/var/run/libvirt/libvirt.sock) 또는 TLS 원격 연결</text>

  <!-- Arrow down to drivers -->
  <line x1="220" y1="262" x2="220" y2="300" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <line x1="440" y1="262" x2="440" y2="300" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <line x1="660" y1="262" x2="660" y2="300" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <!-- Hypervisor drivers -->
  <rect x="60" y="300" width="220" height="60" rx="8" fill="#102810" stroke="#55c555" stroke-width="1"/>
  <text x="170" y="326" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">QEMU/KVM Driver</text>
  <text x="170" y="346" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">qemu:///system</text>

  <rect x="330" y="300" width="220" height="60" rx="8" fill="#102810" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="326" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">LXC Driver</text>
  <text x="440" y="346" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">lxc:///</text>

  <rect x="600" y="300" width="220" height="60" rx="8" fill="#102810" stroke="#55c555" stroke-width="1"/>
  <text x="710" y="326" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Remote Driver</text>
  <text x="710" y="346" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">qemu+ssh://host/system</text>

  <!-- Storage / Network / Node -->
  <rect x="60" y="390" width="220" height="50" rx="6" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="0.8"/>
  <text x="170" y="420" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">스토리지 풀 관리</text>

  <rect x="330" y="390" width="220" height="50" rx="6" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="0.8"/>
  <text x="440" y="420" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">가상 네트워크 관리</text>

  <rect x="600" y="390" width="220" height="50" rx="6" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="0.8"/>
  <text x="710" y="420" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">호스트 노드 정보</text>
</svg>
