<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">HTTP 헤더 카테고리</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">RFC 7231 기준 4가지 분류 — 100개 이상의 표준 헤더</text>

  <!-- General headers -->
  <rect x="60" y="88" width="370" height="190" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="245" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">공통 헤더 (General)</text>
  <text x="245" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">요청·응답 모두 사용 가능</text>

  <text x="80" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">Date:</text>
  <text x="130" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888"> 메시지 생성 시각</text>
  <text x="80" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">Connection:</text>
  <text x="180" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888"> 연결 관리 (keep-alive)</text>
  <text x="80" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">Cache-Control:</text>
  <text x="216" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888"> 캐시 지시어</text>
  <text x="80" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">Transfer-Encoding:</text>
  <text x="270" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888"> chunked</text>
  <text x="80" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">Via:</text>
  <text x="112" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888"> 프록시 경유 정보</text>
  <text x="80" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">Upgrade:</text>
  <text x="162" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888"> 프로토콜 업그레이드 (WS)</text>

  <!-- Request headers -->
  <rect x="450" y="88" width="370" height="190" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="635" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">요청 헤더 (Request)</text>
  <text x="635" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">클라이언트가 요청에 추가</text>

  <text x="470" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" font-weight="600">Host:</text>
  <text x="520" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888"> 요청 대상 서버 (필수)</text>
  <text x="470" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" font-weight="600">User-Agent:</text>
  <text x="582" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888"> 클라이언트 소프트웨어</text>
  <text x="470" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" font-weight="600">Accept:</text>
  <text x="546" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888"> 선호 미디어 타입</text>
  <text x="470" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" font-weight="600">Authorization:</text>
  <text x="600" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888"> 인증 자격증명</text>
  <text x="470" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" font-weight="600">Referer:</text>
  <text x="550" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888"> 이전 페이지 URL</text>
  <text x="470" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" font-weight="600">Cookie:</text>
  <text x="544" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888"> 저장된 쿠키 전송</text>

  <!-- Response headers -->
  <rect x="60" y="296" width="370" height="190" rx="8" fill="#0d1117" stroke="#e05555" stroke-width="1.5"/>
  <text x="245" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">응답 헤더 (Response)</text>
  <text x="245" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">서버가 응답에 추가</text>

  <text x="80" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555" font-weight="600">Server:</text>
  <text x="148" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888"> 서버 소프트웨어</text>
  <text x="80" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555" font-weight="600">Set-Cookie:</text>
  <text x="182" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888"> 쿠키 설정</text>
  <text x="80" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555" font-weight="600">Location:</text>
  <text x="162" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888"> 리다이렉트 대상 URL</text>
  <text x="80" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555" font-weight="600">WWW-Authenticate:</text>
  <text x="264" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888"> 인증 방식 안내</text>
  <text x="80" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Retry-After · ETag · Allow</text>
  <text x="80" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Access-Control-* (CORS)</text>

  <!-- Representation headers -->
  <rect x="450" y="296" width="370" height="190" rx="8" fill="#0d1117" stroke="#ce9178" stroke-width="1.5"/>
  <text x="635" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#ce9178" text-anchor="middle">표현 헤더 (Representation)</text>
  <text x="635" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">본문 데이터의 형식/인코딩 설명</text>

  <text x="470" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" font-weight="600">Content-Type:</text>
  <text x="608" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888"> MIME 타입</text>
  <text x="470" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" font-weight="600">Content-Length:</text>
  <text x="622" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888"> 본문 바이트 수</text>
  <text x="470" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" font-weight="600">Content-Encoding:</text>
  <text x="638" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888"> gzip, br</text>
  <text x="470" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" font-weight="600">Content-Language:</text>
  <text x="638" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888"> ko, en</text>
  <text x="470" y="434" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" font-weight="600">Content-Range:</text>
  <text x="616" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888"> 부분 응답 범위</text>
  <text x="470" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">ETag · Last-Modified</text>

  <text x="440" y="502" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">커스텀 헤더: X- 접두사 관례(RFC 6648에서 deprecated) · 기업별 고유 헤더 사용</text>
</svg>
