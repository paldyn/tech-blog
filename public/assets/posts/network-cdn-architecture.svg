<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arrC" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrO" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">CDN 아키텍처 — 글로벌 엣지 네트워크</text>

  <!-- Origin Server (right) -->
  <rect x="680" y="185" width="165" height="82" rx="10" fill="#1a0f0b" stroke="#7a5a2a" stroke-width="2"/>
  <text x="762" y="221" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e0a055">Origin 서버</text>
  <text x="762" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">원본 콘텐츠 저장소</text>
  <text x="762" y="259" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">서울 IDC</text>

  <!-- CDN PoPs -->
  <!-- PoP 1 (Asia) -->
  <rect x="370" y="100" width="158" height="74" rx="8" fill="#0b1a24" stroke="#2a6a8a" stroke-width="1.5"/>
  <text x="449" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">PoP — 서울</text>
  <text x="449" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">엣지 서버 캐시</text>
  <text x="449" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">RTT &lt; 5ms</text>

  <!-- PoP 2 (US) -->
  <rect x="370" y="220" width="158" height="74" rx="8" fill="#0b1a24" stroke="#2a6a8a" stroke-width="1.5"/>
  <text x="449" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">PoP — 도쿄</text>
  <text x="449" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">엣지 서버 캐시</text>
  <text x="449" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">RTT &lt; 20ms</text>

  <!-- PoP 3 (Europe) -->
  <rect x="370" y="340" width="158" height="74" rx="8" fill="#0b1a24" stroke="#2a6a8a" stroke-width="1.5"/>
  <text x="449" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">PoP — 도쿄 2</text>
  <text x="449" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">엣지 서버 캐시</text>
  <text x="449" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">RTT &lt; 30ms</text>

  <!-- Users (left) -->
  <!-- User 1 -->
  <rect x="50" y="113" width="120" height="48" rx="8" fill="#0f1a2a" stroke="#2a5a8a" stroke-width="1.5"/>
  <text x="110" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">사용자 (서울)</text>

  <!-- User 2 -->
  <rect x="50" y="233" width="120" height="48" rx="8" fill="#0f1a2a" stroke="#2a5a8a" stroke-width="1.5"/>
  <text x="110" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">사용자 (도쿄)</text>

  <!-- User 3 -->
  <rect x="50" y="353" width="120" height="48" rx="8" fill="#0f1a2a" stroke="#2a5a8a" stroke-width="1.5"/>
  <text x="110" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">사용자 (오사카)</text>

  <!-- Arrows: Users → PoPs -->
  <line x1="170" y1="137" x2="370" y2="137" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrC)"/>
  <line x1="170" y1="257" x2="370" y2="257" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrC)"/>
  <line x1="170" y1="377" x2="370" y2="377" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrC)"/>

  <!-- Arrows: PoPs → Origin (cache miss) -->
  <line x1="528" y1="137" x2="680" y2="216" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrO)"/>
  <line x1="528" y1="257" x2="680" y2="232" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrO)"/>
  <line x1="528" y1="377" x2="680" y2="248" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrO)"/>

  <!-- Labels -->
  <text x="268" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">가장 가까운 PoP</text>
  <text x="608" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">Cache Miss 시만</text>

  <!-- DNS Anycast note -->
  <rect x="50" y="440" width="780" height="28" rx="4" fill="#0f1400" stroke="#2a3a10" stroke-width="1"/>
  <text x="440" y="458" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">DNS Anycast: cdn.example.com → 클라이언트 위치에서 가장 가까운 PoP IP 반환</text>
</svg>
