<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">컬렉션 선택 가이드</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">요구사항 → 최적 컬렉션 결정 트리</text>

  <!-- Decision nodes -->
  <!-- Root question -->
  <rect x="310" y="86" width="260" height="46" fill="#1a2a3a" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">어떤 자료구조가 필요한가?</text>

  <!-- Branch: List -->
  <line x1="340" y1="132" x2="180" y2="172" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="230" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">순서 있는 목록</text>

  <rect x="80" y="176" width="200" height="46" fill="#0f1f30" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="180" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">List 계열</text>
  <text x="180" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">인덱스 접근 vs 삽입/삭제</text>

  <!-- List sub-branch -->
  <line x1="120" y1="222" x2="90" y2="262" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="60" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">랜덤 접근</text>
  <rect x="60" y="266" width="120" height="36" fill="#112233" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="120" y="289" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">ArrayList</text>

  <line x1="240" y1="222" x2="270" y2="262" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="310" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">빈번한 삽입/삭제</text>
  <rect x="200" y="266" width="130" height="36" fill="#112233" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="265" y="289" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">LinkedList</text>

  <!-- Branch: Set -->
  <line x1="440" y1="132" x2="440" y2="172" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="466" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">중복 없는 집합</text>

  <rect x="360" y="176" width="160" height="46" fill="#201020" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">Set 계열</text>
  <text x="440" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">순서 요구 여부</text>

  <line x1="390" y1="222" x2="370" y2="262" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="330" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">순서 무관</text>
  <rect x="330" y="266" width="100" height="36" fill="#201020" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="380" y="289" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">HashSet</text>

  <line x1="490" y1="222" x2="510" y2="262" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="552" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">정렬 순서</text>
  <rect x="450" y="266" width="100" height="36" fill="#201020" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="500" y="289" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">TreeSet</text>

  <!-- Branch: Map -->
  <line x1="540" y1="132" x2="700" y2="172" stroke="#e0b555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="646" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">키-값 매핑</text>

  <rect x="610" y="176" width="210" height="46" fill="#1a1500" rx="6" stroke="#e0b555" stroke-width="1"/>
  <text x="715" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e0b555">Map 계열</text>
  <text x="715" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">순서·동시성 요구 여부</text>

  <line x1="660" y1="222" x2="640" y2="262" stroke="#e0b555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="600" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">일반</text>
  <rect x="580" y="266" width="100" height="36" fill="#1a1500" rx="6" stroke="#e0b555" stroke-width="1"/>
  <text x="630" y="289" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e0b555">HashMap</text>

  <line x1="770" y1="222" x2="790" y2="262" stroke="#e0b555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="818" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">동시성</text>
  <rect x="730" y="266" width="100" height="36" fill="#1a1500" rx="6" stroke="#e0b555" stroke-width="1"/>
  <text x="780" y="283" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#e0b555">Concurrent</text>
  <text x="780" y="297" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#e0b555">HashMap</text>

  <!-- Performance table -->
  <text x="440" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">주요 연산 시간 복잡도 비교</text>

  <!-- Table header -->
  <rect x="60" y="352" width="760" height="32" fill="#1a2a3a" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="130" y="373" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">자료구조</text>
  <text x="290" y="373" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">인덱스/get</text>
  <text x="430" y="373" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">삽입/삭제(끝)</text>
  <text x="570" y="373" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">삽입/삭제(중간)</text>
  <text x="720" y="373" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">contains</text>

  <rect x="60" y="384" width="760" height="28" fill="#0f1a26" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="130" y="403" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">ArrayList</text>
  <text x="290" y="403" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">O(1)</text>
  <text x="430" y="403" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">O(1) amort.</text>
  <text x="570" y="403" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">O(n)</text>
  <text x="720" y="403" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">O(n)</text>

  <rect x="60" y="412" width="760" height="28" fill="#0a1520" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="130" y="431" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">LinkedList</text>
  <text x="290" y="431" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">O(n)</text>
  <text x="430" y="431" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">O(1)</text>
  <text x="570" y="431" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">O(1)*</text>
  <text x="720" y="431" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">O(n)</text>

  <rect x="60" y="440" width="760" height="28" fill="#0f1a26" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="130" y="459" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">HashMap</text>
  <text x="290" y="459" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">N/A</text>
  <text x="430" y="459" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">O(1) amort.</text>
  <text x="570" y="459" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">O(1) amort.</text>
  <text x="720" y="459" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">O(1)</text>

  <rect x="60" y="468" width="760" height="28" fill="#0a1520" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="130" y="487" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">TreeMap</text>
  <text x="290" y="487" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">N/A</text>
  <text x="430" y="487" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">O(log n)</text>
  <text x="570" y="487" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">O(log n)</text>
  <text x="720" y="487" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">O(log n)</text>

  <text x="440" y="510" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">* LinkedList 중간 삽입/삭제는 위치 탐색 O(n) 포함 시 실제로는 O(n)</text>
</svg>
