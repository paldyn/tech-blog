<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">스프링의 본질 — 비침투적 컨테이너</text>

  <!-- Outer container: Spring Container -->
  <rect x="60" y="72" width="760" height="340" fill="#0d1117" stroke="#1e3a2a" stroke-width="2" rx="10"/>
  <text x="80" y="98" font-size="13" font-weight="600" fill="#55c555">Spring IoC Container</text>
  <text x="720" y="98" text-anchor="end" font-size="11" fill="#555">ApplicationContext</text>

  <!-- Layer: Your Business Code -->
  <rect x="100" y="112" width="660" height="200" fill="#0f1a0f" stroke="#2a4a2a" stroke-width="1" rx="8"/>
  <text x="430" y="134" text-anchor="middle" font-size="12" font-weight="600" fill="#88cc88">당신의 비즈니스 코드 (순수 POJO)</text>

  <!-- Three POJO boxes -->
  <rect x="120" y="148" width="180" height="80" fill="#070b14" stroke="#1e2a3a" stroke-width="1" rx="6"/>
  <text x="210" y="172" text-anchor="middle" font-size="12" fill="#e8e8e8">Controller</text>
  <text x="138" y="193" font-size="10" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace">@RestController</text>
  <text x="138" y="210" font-size="10" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">class OrderController</text>

  <rect x="340" y="148" width="180" height="80" fill="#070b14" stroke="#1e2a3a" stroke-width="1" rx="6"/>
  <text x="430" y="172" text-anchor="middle" font-size="12" fill="#e8e8e8">Service</text>
  <text x="358" y="193" font-size="10" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace">@Service</text>
  <text x="358" y="210" font-size="10" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">class OrderService</text>

  <rect x="560" y="148" width="180" height="80" fill="#070b14" stroke="#1e2a3a" stroke-width="1" rx="6"/>
  <text x="650" y="172" text-anchor="middle" font-size="12" fill="#e8e8e8">Repository</text>
  <text x="578" y="193" font-size="10" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace">@Repository</text>
  <text x="578" y="210" font-size="10" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace">class OrderRepo</text>

  <!-- Arrows between components -->
  <line x1="300" y1="188" x2="340" y2="188" stroke="#444" stroke-width="1.5" marker-end="url(#a2)"/>
  <line x1="520" y1="188" x2="560" y2="188" stroke="#444" stroke-width="1.5" marker-end="url(#a2)"/>
  <defs>
    <marker id="a2" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#444"/>
    </marker>
  </defs>

  <!-- Dependency labels -->
  <text x="320" y="182" text-anchor="middle" font-size="9" fill="#555">DI</text>
  <text x="540" y="182" text-anchor="middle" font-size="9" fill="#555">DI</text>

  <!-- Spring Services row -->
  <rect x="100" y="322" width="660" height="68" fill="#101820" stroke="#1a2a3a" stroke-width="1" rx="8"/>
  <text x="430" y="342" text-anchor="middle" font-size="11" font-weight="600" fill="#6699cc">스프링이 관리하는 인프라 서비스</text>

  <!-- Service chips -->
  <rect x="116" y="350" width="88" height="24" fill="#0d1a2a" stroke="#1e3a5a" rx="4"/>
  <text x="160" y="366" text-anchor="middle" font-size="10" fill="#7ec8e3">트랜잭션</text>

  <rect x="214" y="350" width="88" height="24" fill="#0d1a2a" stroke="#1e3a5a" rx="4"/>
  <text x="258" y="366" text-anchor="middle" font-size="10" fill="#7ec8e3">AOP/로깅</text>

  <rect x="312" y="350" width="88" height="24" fill="#0d1a2a" stroke="#1e3a5a" rx="4"/>
  <text x="356" y="366" text-anchor="middle" font-size="10" fill="#7ec8e3">보안</text>

  <rect x="410" y="350" width="88" height="24" fill="#0d1a2a" stroke="#1e3a5a" rx="4"/>
  <text x="454" y="366" text-anchor="middle" font-size="10" fill="#7ec8e3">캐시</text>

  <rect x="508" y="350" width="88" height="24" fill="#0d1a2a" stroke="#1e3a5a" rx="4"/>
  <text x="552" y="366" text-anchor="middle" font-size="10" fill="#7ec8e3">이벤트</text>

  <rect x="606" y="350" width="138" height="24" fill="#0d1a2a" stroke="#1e3a5a" rx="4"/>
  <text x="675" y="366" text-anchor="middle" font-size="10" fill="#7ec8e3">스케줄링/비동기</text>

  <!-- Connector dots -->
  <line x1="210" y1="228" x2="210" y2="322" stroke="#2a4a2a" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="430" y1="228" x2="430" y2="322" stroke="#2a4a2a" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="650" y1="228" x2="650" y2="322" stroke="#2a4a2a" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Key insight -->
  <rect x="60" y="430" width="760" height="44" fill="#0f1a0f" stroke="#2a4a2a" stroke-width="1" rx="8"/>
  <text x="440" y="449" text-anchor="middle" font-size="12" fill="#88cc88">핵심 통찰</text>
  <text x="440" y="466" text-anchor="middle" font-size="11" fill="#888">비즈니스 코드는 스프링을 모른다 — 스프링이 비침투적으로 관리할 뿐이다</text>
</svg>
