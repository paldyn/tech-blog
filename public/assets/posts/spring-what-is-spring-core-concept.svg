<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;">
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">스프링의 본질 — 비침투적 컨테이너</text>

  <defs>
    <marker id="a2" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Outer container -->
  <rect x="60" y="84" width="760" height="356" fill="#0d1117" stroke="#1e3a2a" stroke-width="2" rx="10"/>
  <text x="84" y="112" font-size="14" font-weight="600" fill="#55c555">Spring IoC Container</text>
  <text x="796" y="112" text-anchor="end" font-size="11" fill="#666">ApplicationContext</text>

  <!-- Layer: Business POJOs -->
  <rect x="100" y="128" width="680" height="208" fill="#0f1a0f" stroke="#2a4a2a" stroke-width="1" rx="8"/>
  <text x="440" y="154" text-anchor="middle" font-size="13" font-weight="600" fill="#88cc88">당신의 비즈니스 코드 (순수 POJO)</text>

  <!-- Three POJO boxes -->
  <rect x="124" y="172" width="196" height="140" fill="#070b14" stroke="#1e2a3a" stroke-width="1" rx="6"/>
  <text x="222" y="196" text-anchor="middle" font-size="13" fill="#e8e8e8">Controller</text>
  <text x="148" y="226" xml:space="preserve" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace">@RestController</text>
  <text x="148" y="244" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">class OrderApi {</text>
  <text x="148" y="262" xml:space="preserve" font-size="13" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    // 라우팅</text>
  <text x="148" y="280" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>

  <rect x="342" y="172" width="196" height="140" fill="#070b14" stroke="#1e2a3a" stroke-width="1" rx="6"/>
  <text x="440" y="196" text-anchor="middle" font-size="13" fill="#e8e8e8">Service</text>
  <text x="366" y="226" xml:space="preserve" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace">@Service</text>
  <text x="366" y="244" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">class OrderService {</text>
  <text x="366" y="262" xml:space="preserve" font-size="13" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    // 비즈니스</text>
  <text x="366" y="280" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>

  <rect x="560" y="172" width="196" height="140" fill="#070b14" stroke="#1e2a3a" stroke-width="1" rx="6"/>
  <text x="658" y="196" text-anchor="middle" font-size="13" fill="#e8e8e8">Repository</text>
  <text x="584" y="226" xml:space="preserve" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace">@Repository</text>
  <text x="584" y="244" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">class OrderRepo {</text>
  <text x="584" y="262" xml:space="preserve" font-size="13" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    // 영속성</text>
  <text x="584" y="280" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>

  <!-- Arrows between components (DI) -->
  <line x1="320" y1="240" x2="342" y2="240" stroke="#555" stroke-width="1.5" marker-end="url(#a2)"/>
  <line x1="538" y1="240" x2="560" y2="240" stroke="#555" stroke-width="1.5" marker-end="url(#a2)"/>
  <text x="331" y="232" text-anchor="middle" font-size="10" fill="#666">DI</text>
  <text x="549" y="232" text-anchor="middle" font-size="10" fill="#666">DI</text>

  <!-- Spring Services row -->
  <rect x="100" y="350" width="680" height="76" fill="#101820" stroke="#1a2a3a" stroke-width="1" rx="8"/>
  <text x="440" y="372" text-anchor="middle" font-size="12" font-weight="600" fill="#7ec8e3">스프링이 관리하는 인프라 서비스</text>

  <!-- chips -->
  <rect x="116" y="384" width="100" height="28" fill="#0d1a2a" stroke="#1e3a5a" rx="4"/>
  <text x="166" y="402" text-anchor="middle" font-size="12" fill="#7ec8e3">트랜잭션</text>
  <rect x="226" y="384" width="100" height="28" fill="#0d1a2a" stroke="#1e3a5a" rx="4"/>
  <text x="276" y="402" text-anchor="middle" font-size="12" fill="#7ec8e3">AOP/로깅</text>
  <rect x="336" y="384" width="100" height="28" fill="#0d1a2a" stroke="#1e3a5a" rx="4"/>
  <text x="386" y="402" text-anchor="middle" font-size="12" fill="#7ec8e3">보안</text>
  <rect x="446" y="384" width="100" height="28" fill="#0d1a2a" stroke="#1e3a5a" rx="4"/>
  <text x="496" y="402" text-anchor="middle" font-size="12" fill="#7ec8e3">캐시</text>
  <rect x="556" y="384" width="100" height="28" fill="#0d1a2a" stroke="#1e3a5a" rx="4"/>
  <text x="606" y="402" text-anchor="middle" font-size="12" fill="#7ec8e3">이벤트</text>
  <rect x="666" y="384" width="100" height="28" fill="#0d1a2a" stroke="#1e3a5a" rx="4"/>
  <text x="716" y="402" text-anchor="middle" font-size="12" fill="#7ec8e3">스케줄링</text>

  <!-- Connector dots -->
  <line x1="222" y1="312" x2="222" y2="350" stroke="#2a4a2a" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="440" y1="312" x2="440" y2="350" stroke="#2a4a2a" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="658" y1="312" x2="658" y2="350" stroke="#2a4a2a" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Key insight -->
  <rect x="60" y="456" width="760" height="48" fill="#0f1a0f" stroke="#2a4a2a" stroke-width="1" rx="8"/>
  <text x="440" y="476" text-anchor="middle" font-size="13" font-weight="600" fill="#88cc88">핵심 통찰</text>
  <text x="440" y="494" text-anchor="middle" font-size="12" fill="#888">비즈니스 코드는 스프링을 모른다 — 스프링이 비침투적으로 관리할 뿐이다</text>
</svg>
