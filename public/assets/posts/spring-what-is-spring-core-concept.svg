<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;">
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">스프링의 본질 — 비침투적 컨테이너</text>
  <text x="440" y="70" text-anchor="middle" font-size="13" fill="#888">비즈니스 코드는 스프링을 모른다 · 스프링이 비침투적으로 관리할 뿐</text>

  <defs>
    <marker id="a2" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Outer container -->
  <rect x="60" y="92" width="760" height="370" fill="#0d1117" stroke="#2a4a2a" stroke-width="2" rx="10"/>
  <text x="84" y="120" font-size="16" font-weight="600" fill="#55c555">Spring IoC Container</text>
  <text x="796" y="120" text-anchor="end" font-size="11" fill="#666">ApplicationContext</text>

  <!-- POJO layer -->
  <rect x="84" y="138" width="712" height="190" fill="#0f1a0f" stroke="#2a4a2a" stroke-width="1" rx="8"/>
  <text x="440" y="162" text-anchor="middle" font-size="13" font-weight="600" fill="#88cc88">당신의 비즈니스 코드 (순수 POJO)</text>

  <!-- Three POJO boxes: width 220, gap 16, total 220*3 + 32 = 692, start at 94 -->
  <!-- but inside container starts at 84+24=108. let's use x=108, 332, 556, w=220 -->
  <rect x="108" y="180" width="220" height="132" fill="#070b14" stroke="#1e2a3a" stroke-width="1" rx="6"/>
  <text x="218" y="202" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">Controller</text>
  <text x="124" y="232" xml:space="preserve" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace">@RestController</text>
  <text x="124" y="250" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">class OrderApi {</text>
  <text x="138" y="268" xml:space="preserve" font-size="13" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// 라우팅</text>
  <text x="124" y="286" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>

  <rect x="332" y="180" width="220" height="132" fill="#070b14" stroke="#1e2a3a" stroke-width="1" rx="6"/>
  <text x="442" y="202" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">Service</text>
  <text x="348" y="232" xml:space="preserve" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace">@Service</text>
  <text x="348" y="250" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">class OrderService {</text>
  <text x="362" y="268" xml:space="preserve" font-size="13" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// 비즈니스 로직</text>
  <text x="348" y="286" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>

  <rect x="556" y="180" width="220" height="132" fill="#070b14" stroke="#1e2a3a" stroke-width="1" rx="6"/>
  <text x="666" y="202" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">Repository</text>
  <text x="572" y="232" xml:space="preserve" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace">@Repository</text>
  <text x="572" y="250" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">class OrderRepo {</text>
  <text x="586" y="268" xml:space="preserve" font-size="13" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// 영속성</text>
  <text x="572" y="286" xml:space="preserve" font-size="13" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>

  <!-- DI arrows -->
  <line x1="328" y1="246" x2="332" y2="246" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#a2)"/>
  <line x1="552" y1="246" x2="556" y2="246" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#a2)"/>
  <text x="330" y="240" text-anchor="middle" font-size="10" fill="#7777cc">DI</text>
  <text x="554" y="240" text-anchor="middle" font-size="10" fill="#7777cc">DI</text>

  <!-- Infra services row -->
  <rect x="84" y="344" width="712" height="98" fill="#0a1420" stroke="#1a2a3a" stroke-width="1" rx="8"/>
  <text x="440" y="368" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">스프링이 관리하는 인프라 서비스</text>

  <!-- chips: 6 chips, w 100, gap 12, total = 600 + 60 = 660; start x = 84 + (712-660)/2 = 110 -->
  <rect x="110" y="384" width="100" height="32" fill="#0d1a2a" stroke="#1e3a5a" rx="4"/>
  <text x="160" y="404" text-anchor="middle" font-size="12" fill="#7ec8e3">트랜잭션</text>
  <rect x="222" y="384" width="100" height="32" fill="#0d1a2a" stroke="#1e3a5a" rx="4"/>
  <text x="272" y="404" text-anchor="middle" font-size="12" fill="#7ec8e3">AOP/로깅</text>
  <rect x="334" y="384" width="100" height="32" fill="#0d1a2a" stroke="#1e3a5a" rx="4"/>
  <text x="384" y="404" text-anchor="middle" font-size="12" fill="#7ec8e3">보안</text>
  <rect x="446" y="384" width="100" height="32" fill="#0d1a2a" stroke="#1e3a5a" rx="4"/>
  <text x="496" y="404" text-anchor="middle" font-size="12" fill="#7ec8e3">캐시</text>
  <rect x="558" y="384" width="100" height="32" fill="#0d1a2a" stroke="#1e3a5a" rx="4"/>
  <text x="608" y="404" text-anchor="middle" font-size="12" fill="#7ec8e3">이벤트</text>
  <rect x="670" y="384" width="100" height="32" fill="#0d1a2a" stroke="#1e3a5a" rx="4"/>
  <text x="720" y="404" text-anchor="middle" font-size="12" fill="#7ec8e3">스케줄링</text>

  <text x="440" y="432" text-anchor="middle" font-size="11" fill="#666">애노테이션 한 줄로 비즈니스 코드에 투명하게 적용</text>

  <!-- Key insight -->
  <rect x="60" y="478" width="760" height="50" fill="#0f1a0f" stroke="#2a4a2a" stroke-width="1" rx="8"/>
  <text x="440" y="498" text-anchor="middle" font-size="13" font-weight="600" fill="#88cc88">핵심 통찰</text>
  <text x="440" y="516" text-anchor="middle" font-size="12" fill="#bbbbbb">비즈니스는 모르고 컨테이너는 안다 — 그것이 스프링이다</text>
</svg>
