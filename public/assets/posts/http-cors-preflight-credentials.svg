<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430">
  <rect width="880" height="430" fill="#0a0a0a" rx="12"/>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">자격 증명 포함 요청과 프리플라이트 캐시</text>
    <!-- Left box: credentials triple lock -->
    <rect x="60" y="75" width="350" height="120" rx="8" fill="#0f1f3a" stroke="#4a7aaa" stroke-width="1.5"/>
    <text x="235" y="103" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">쿠키 포함 요청의 3중 합의</text>
    <text x="235" y="129" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">fetch(url, {credentials:'include'})</text>
    <text x="235" y="151" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">Access-Control-Allow-Credentials: true</text>
    <text x="235" y="173" text-anchor="middle" font-size="11" fill="#888">ACAO는 구체적 출처만 — 와일드카드 불가</text>
    <!-- Right box: preflight cache -->
    <rect x="470" y="75" width="350" height="120" rx="8" fill="#0f2a1a" stroke="#3aaa5a" stroke-width="1.5"/>
    <text x="645" y="103" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">프리플라이트 결과 캐시</text>
    <text x="645" y="129" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">Access-Control-Max-Age: 86400</text>
    <text x="645" y="151" text-anchor="middle" font-size="11" fill="#888">같은 URL·메서드·헤더 조합은 OPTIONS 생략</text>
    <text x="645" y="173" text-anchor="middle" font-size="11" fill="#888">브라우저 상한: Chrome 2시간 · Firefox 24시간</text>
    <!-- Wildcard rule code box -->
    <rect x="60" y="225" width="760" height="124" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="76" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># credentials:'include'일 때 거부되는 조합</text>
    <text x="76" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">Access-Control-Allow-Origin: *            </tspan><tspan fill="#e05555">→ 브라우저가 차단</tspan></text>
    <text x="76" y="297" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 허용되는 조합 — 출처를 반사하고 Vary: Origin 추가</text>
    <text x="76" y="317" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">Access-Control-Allow-Origin: https://app.shop.com  </tspan><tspan fill="#55c555">→ 허용</tspan></text>
    <text x="76" y="337" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Access-Control-Allow-Credentials</tspan><tspan fill="#ffffff">: true</tspan></text>
    <!-- Summary -->
    <text x="440" y="385" text-anchor="middle" font-size="12" fill="#888">Allow-Methods·Allow-Headers의 와일드카드(*)도 자격 증명 모드에서는 리터럴 문자로 취급된다</text>
    <text x="440" y="403" text-anchor="middle" font-size="11" fill="#555">프리플라이트 요청 자체에는 쿠키가 실리지 않는다 — 본 요청에만 첨부</text>
  </g>
</svg>
