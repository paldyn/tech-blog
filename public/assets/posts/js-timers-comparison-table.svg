<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">타이머 &amp; 스케줄링 API 비교</text>

  <!-- Header row -->
  <rect x="50" y="68" width="780" height="40" rx="0" fill="#111520"/>
  <text x="130" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">API</text>
  <text x="310" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">큐 종류</text>
  <text x="490" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">최소 지연</text>
  <text x="700" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">주요 용도</text>

  <!-- Row 1: setTimeout -->
  <rect x="50" y="108" width="780" height="50" rx="0" fill="#0d1117"/>
  <text x="130" y="138" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">setTimeout</text>
  <text x="310" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">Macrotask</text>
  <text x="490" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">4ms (중첩시)</text>
  <text x="490" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6a8aa0">비활성 탭 1000ms+</text>
  <text x="700" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">일회성 지연 실행</text>

  <!-- Row 2: setInterval -->
  <rect x="50" y="158" width="780" height="50" rx="0" fill="#111520"/>
  <text x="130" y="188" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">setInterval</text>
  <text x="310" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">Macrotask</text>
  <text x="490" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">4ms</text>
  <text x="700" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">반복 실행</text>
  <text x="700" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6a8aa0">드리프트 주의</text>

  <!-- Row 3: queueMicrotask -->
  <rect x="50" y="208" width="780" height="50" rx="0" fill="#0d1117"/>
  <text x="130" y="238" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">queueMicrotask</text>
  <text x="310" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Microtask</text>
  <text x="490" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">현재 태스크 직후</text>
  <text x="700" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Promise 없이 마이크로태스크</text>

  <!-- Row 4: requestAnimationFrame -->
  <rect x="50" y="258" width="780" height="50" rx="0" fill="#111520"/>
  <text x="130" y="288" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">requestAnimationFrame</text>
  <text x="310" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">렌더링 전</text>
  <text x="490" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">~16ms (60fps)</text>
  <text x="490" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6a8aa0">vsync 동기화</text>
  <text x="700" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">애니메이션·DOM 배치</text>

  <!-- Row 5: requestIdleCallback -->
  <rect x="50" y="308" width="780" height="50" rx="0" fill="#0d1117"/>
  <text x="130" y="338" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">requestIdleCallback</text>
  <text x="310" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">유휴 시간</text>
  <text x="490" y="332" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">보장 없음</text>
  <text x="490" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6a8aa0">timeout 옵션으로 데드라인</text>
  <text x="700" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">비우선 백그라운드 작업</text>

  <!-- Bottom border -->
  <line x1="50" y1="358" x2="830" y2="358" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Execution order note -->
  <rect x="50" y="372" width="780" height="68" rx="6" fill="#111520" stroke="#3a4a6e"/>
  <text x="66" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">실행 우선순위 (빠름 → 느림)</text>
  <text x="66" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">동기 코드</text>
  <text x="170" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">→</text>
  <text x="190" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">queueMicrotask / Promise</text>
  <text x="390" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">→</text>
  <text x="410" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">rAF</text>
  <text x="440" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">→</text>
  <text x="460" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">setTimeout / setInterval</text>
  <text x="650" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">→</text>
  <text x="668" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">rIC</text>
</svg>
