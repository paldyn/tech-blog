<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">VM vs 컨테이너 — 주요 특성 비교</text>

  <!-- Header row -->
  <rect x="60" y="66" width="340" height="36" fill="#1a1a1a" stroke="#333" rx="6"/>
  <text x="230" y="89" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#aaa">항목</text>

  <rect x="410" y="66" width="180" height="36" fill="#2a0f0f" stroke="#e05555" rx="6"/>
  <text x="500" y="89" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">VM</text>

  <rect x="600" y="66" width="220" height="36" fill="#0f2a0f" stroke="#55c555" rx="6"/>
  <text x="710" y="89" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">컨테이너</text>

  <!-- Row 1: 이미지 크기 -->
  <rect x="60" y="110" width="340" height="38" fill="#111" stroke="#222" rx="4"/>
  <text x="80" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ccc">이미지 크기</text>
  <rect x="410" y="110" width="180" height="38" fill="#150808" stroke="#222" rx="4"/>
  <text x="500" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e08080">수백 MB ~ 수 GB</text>
  <rect x="600" y="110" width="220" height="38" fill="#08150a" stroke="#222" rx="4"/>
  <text x="710" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#80c880">수 MB ~ 수백 MB</text>

  <!-- Row 2: 시작 시간 -->
  <rect x="60" y="154" width="340" height="38" fill="#0e0e0e" stroke="#222" rx="4"/>
  <text x="80" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ccc">시작 시간</text>
  <rect x="410" y="154" width="180" height="38" fill="#150808" stroke="#222" rx="4"/>
  <text x="500" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e08080">수십 초 ~ 수 분</text>
  <rect x="600" y="154" width="220" height="38" fill="#08150a" stroke="#222" rx="4"/>
  <text x="710" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#80c880">수백 ms ~ 수 초</text>

  <!-- Row 3: 격리 수준 -->
  <rect x="60" y="198" width="340" height="38" fill="#111" stroke="#222" rx="4"/>
  <text x="80" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ccc">격리 수준</text>
  <rect x="410" y="198" width="180" height="38" fill="#150808" stroke="#222" rx="4"/>
  <text x="500" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">강함 (하드웨어)</text>
  <rect x="600" y="198" width="220" height="38" fill="#08150a" stroke="#222" rx="4"/>
  <text x="710" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e0a030">중간 (namespace)</text>

  <!-- Row 4: 성능 오버헤드 -->
  <rect x="60" y="242" width="340" height="38" fill="#0e0e0e" stroke="#222" rx="4"/>
  <text x="80" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ccc">성능 오버헤드</text>
  <rect x="410" y="242" width="180" height="38" fill="#150808" stroke="#222" rx="4"/>
  <text x="500" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e08080">높음 (에뮬레이션)</text>
  <rect x="600" y="242" width="220" height="38" fill="#08150a" stroke="#222" rx="4"/>
  <text x="710" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#80c880">낮음 (네이티브)</text>

  <!-- Row 5: OS 다양성 -->
  <rect x="60" y="286" width="340" height="38" fill="#111" stroke="#222" rx="4"/>
  <text x="80" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ccc">다른 OS 실행</text>
  <rect x="410" y="286" width="180" height="38" fill="#150808" stroke="#222" rx="4"/>
  <text x="500" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">가능 (Windows, Linux 등)</text>
  <rect x="600" y="286" width="220" height="38" fill="#08150a" stroke="#222" rx="4"/>
  <text x="710" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">동일 커널 필요</text>

  <!-- Row 6: 밀도 -->
  <rect x="60" y="330" width="340" height="38" fill="#0e0e0e" stroke="#222" rx="4"/>
  <text x="80" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ccc">서버 당 인스턴스 밀도</text>
  <rect x="410" y="330" width="180" height="38" fill="#150808" stroke="#222" rx="4"/>
  <text x="500" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e08080">수십 개</text>
  <rect x="600" y="330" width="220" height="38" fill="#08150a" stroke="#222" rx="4"/>
  <text x="710" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#80c880">수백 ~ 수천 개</text>

  <!-- Footer note -->
  <text x="440" y="398" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">VM과 컨테이너는 경쟁 관계가 아닙니다 — 클라우드 환경에서는 VM 위에서 컨테이너를 실행하는 것이 일반적입니다</text>
</svg>
