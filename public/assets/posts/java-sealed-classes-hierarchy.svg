<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Sealed Class 계층 구조</text>

  <!-- Shape sealed class -->
  <rect x="290" y="62" width="300" height="60" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="88" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc">sealed interface</text>
  <text x="440" y="109" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="17" font-weight="700" fill="#e8e8e8">Shape</text>

  <!-- permits label -->
  <text x="440" y="148" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">permits Circle, Rectangle, Triangle</text>

  <!-- Arrows from Shape to subclasses -->
  <line x1="365" y1="122" x2="165" y2="205" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="440" y1="122" x2="440" y2="205" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="515" y1="122" x2="715" y2="205" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Circle (final) -->
  <rect x="60" y="205" width="210" height="65" rx="8" fill="#0d2214" stroke="#55c555" stroke-width="2"/>
  <text x="165" y="229" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">final</text>
  <text x="165" y="253" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">Circle</text>

  <!-- Rectangle (sealed) -->
  <rect x="335" y="205" width="210" height="65" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="229" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc">sealed</text>
  <text x="440" y="253" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">Rectangle</text>

  <!-- Triangle (non-sealed) -->
  <rect x="610" y="205" width="210" height="65" rx="8" fill="#1a1414" stroke="#e05555" stroke-width="2"/>
  <text x="715" y="229" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">non-sealed</text>
  <text x="715" y="253" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">Triangle</text>

  <!-- Arrow from Rectangle to SpecialRect -->
  <line x1="440" y1="270" x2="440" y2="340" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>
  <text x="456" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">permits</text>

  <!-- SpecialRect (final) under Rectangle -->
  <rect x="335" y="340" width="210" height="65" rx="8" fill="#0d2214" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="364" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">final</text>
  <text x="440" y="388" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">SpecialRect</text>

  <!-- AnyShape can extend Triangle (non-sealed) -->
  <rect x="610" y="340" width="210" height="65" rx="8" fill="#221414" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="715" y="364" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">외부 클래스</text>
  <text x="715" y="388" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#888">AnyTriangle</text>
  <line x1="715" y1="270" x2="715" y2="340" stroke="#888" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <!-- Legend -->
  <rect x="60" y="424" width="16" height="16" rx="3" fill="#0d2214" stroke="#55c555" stroke-width="1.5"/>
  <text x="84" y="437" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">final — 추가 상속 불가</text>
  <rect x="260" y="424" width="16" height="16" rx="3" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="284" y="437" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">sealed — 제한적 상속</text>
  <rect x="460" y="424" width="16" height="16" rx="3" fill="#1a1414" stroke="#e05555" stroke-width="1.5"/>
  <text x="484" y="437" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">non-sealed — 자유 상속</text>
</svg>
