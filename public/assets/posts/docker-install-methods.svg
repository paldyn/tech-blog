<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Docker 설치 방법 비교</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">플랫폼별 권장 설치 경로</text>

  <!-- Linux column -->
  <rect x="60" y="90" width="230" height="320" fill="#0d1020" stroke="#7ec8e3" stroke-width="1.5" rx="10"/>
  <text x="175" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">Linux</text>

  <rect x="76" y="128" width="198" height="32" fill="#0f1f2f" stroke="#2a3a4a" rx="6"/>
  <text x="175" y="149" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">apt (Ubuntu/Debian) ✓</text>

  <rect x="76" y="168" width="198" height="32" fill="#111" stroke="#222" rx="6"/>
  <text x="175" y="189" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">dnf/yum (RHEL/Fedora)</text>

  <rect x="76" y="208" width="198" height="32" fill="#111" stroke="#222" rx="6"/>
  <text x="175" y="229" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">convenience script</text>

  <rect x="76" y="248" width="198" height="32" fill="#111" stroke="#222" rx="6"/>
  <text x="175" y="269" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Docker Desktop (GUI)</text>

  <text x="80" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">• 서버/CI 환경 주력 플랫폼</text>
  <text x="80" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">• Docker Engine 직접 설치</text>
  <text x="80" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">• rootless 모드 사용 가능</text>
  <text x="80" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">• systemd 서비스 관리</text>
  <text x="80" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">권장: 공식 APT/DNF 저장소</text>

  <!-- macOS column -->
  <rect x="325" y="90" width="230" height="320" fill="#1a1408" stroke="#e0a030" stroke-width="1.5" rx="10"/>
  <text x="440" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e0a030">macOS</text>

  <rect x="341" y="128" width="198" height="32" fill="#2a1e08" stroke="#4a3a08" rx="6"/>
  <text x="440" y="149" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e0a030">Docker Desktop ✓</text>

  <rect x="341" y="168" width="198" height="32" fill="#111" stroke="#222" rx="6"/>
  <text x="440" y="189" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">Homebrew (brew install docker)</text>

  <rect x="341" y="208" width="198" height="32" fill="#111" stroke="#222" rx="6"/>
  <text x="440" y="229" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Colima (경량 대안)</text>

  <rect x="341" y="248" width="198" height="32" fill="#111" stroke="#222" rx="6"/>
  <text x="440" y="269" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">OrbStack (유료, 빠름)</text>

  <text x="345" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">• Linux VM 위에서 실행</text>
  <text x="345" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">• Docker Desktop: GUI 포함</text>
  <text x="345" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">• Apple Silicon(M1/M2) 지원</text>
  <text x="345" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">• 기업 사용 시 유료 라이선스</text>
  <text x="345" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e0a030">권장: Docker Desktop 또는 OrbStack</text>

  <!-- Windows column -->
  <rect x="590" y="90" width="230" height="320" fill="#13122a" stroke="#7777cc" stroke-width="1.5" rx="10"/>
  <text x="705" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc">Windows</text>

  <rect x="606" y="128" width="198" height="32" fill="#1e1c3a" stroke="#3a3858" rx="6"/>
  <text x="705" y="149" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">Docker Desktop ✓</text>

  <rect x="606" y="168" width="198" height="32" fill="#111" stroke="#222" rx="6"/>
  <text x="705" y="189" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">WSL 2 + Docker Engine</text>

  <rect x="606" y="208" width="198" height="32" fill="#111" stroke="#222" rx="6"/>
  <text x="705" y="229" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Windows Containers (특수)</text>

  <rect x="606" y="248" width="198" height="32" fill="#111" stroke="#222" rx="6"/>
  <text x="705" y="269" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Rancher Desktop (무료 대안)</text>

  <text x="610" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">• WSL 2 필수 (Hyper-V 대안)</text>
  <text x="610" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">• Linux 컨테이너 기본 실행</text>
  <text x="610" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">• Docker Desktop: GUI 포함</text>
  <text x="610" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">• 기업 사용 시 유료 라이선스</text>
  <text x="610" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">권장: Docker Desktop (WSL 2)</text>

  <!-- Bottom note -->
  <text x="440" y="430" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#666">모든 플랫폼에서 docker CLI + Compose 플러그인이 함께 설치됩니다</text>
  <text x="440" y="450" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#666">배포/CI 서버: Docker Engine, 로컬 개발: Docker Desktop 또는 대안 도구</text>
</svg>
