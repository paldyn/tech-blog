<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 540" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">N+1 해결 전략 비교</text>
  <text x="440" y="68" text-anchor="middle" fill="#888" font-size="13">fetch join · @EntityGraph · @BatchSize — 상황별 최적 선택</text>

  <!-- Column 1: fetch join -->
  <rect x="60" y="86" width="228" height="380" rx="8" fill="#0a100a" stroke="#55c555" stroke-width="1.5"/>
  <rect x="61" y="87" width="226" height="32" rx="7" fill="#122012"/>
  <rect x="61" y="107" width="226" height="12" fill="#122012"/>
  <text x="174" y="109" text-anchor="middle" fill="#55c555" font-size="13" font-weight="600">① fetch join</text>

  <rect x="72" y="130" width="204" height="150" rx="4" fill="#000000" stroke="#3a4a6e"/>
  <text x="84" y="148" fill="#9aa4b8" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// JPQL</text>
  <text x="84" y="166" fill="#7ec8e3" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">@Query(</text>
  <text x="84" y="184" fill="#ce9178" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> "SELECT m</text>
  <text x="84" y="202" fill="#ce9178" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  FROM Member m</text>
  <text x="84" y="220" fill="#ce9178" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  JOIN FETCH</text>
  <text x="84" y="238" fill="#ce9178" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    m.orders"</text><text x="154" y="238" fill="#ffffff" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">)</text>
  <text x="84" y="256" fill="#ffffff" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">List&lt;Member&gt; findAll();</text>

  <text x="72" y="302" fill="#e8e8e8" font-size="12">생성 SQL:</text>
  <rect x="72" y="310" width="204" height="54" rx="4" fill="#000000" stroke="#3a4a6e"/>
  <text x="84" y="328" fill="#7ec8e3" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">SELECT</text><text x="126" y="328" fill="#ffffff" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> m.*, o.*</text>
  <text x="84" y="346" fill="#7ec8e3" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">FROM</text><text x="116" y="346" fill="#ffffff" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> member m</text>
  <text x="84" y="364" fill="#7ec8e3" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">JOIN</text><text x="112" y="364" fill="#ffffff" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> orders o …</text>

  <text x="174" y="396" text-anchor="middle" fill="#55c555" font-size="12" font-weight="600">SQL 1번</text>
  <text x="174" y="412" text-anchor="middle" fill="#888" font-size="11">완전한 최적화</text>
  <text x="174" y="428" text-anchor="middle" fill="#888" font-size="11">페이징 시 주의</text>
  <text x="174" y="444" text-anchor="middle" fill="#7777cc" font-size="11">복잡한 조건에 적합</text>

  <!-- Column 2: @EntityGraph -->
  <rect x="326" y="86" width="228" height="380" rx="8" fill="#0a0a10" stroke="#7ec8e3" stroke-width="1.5"/>
  <rect x="327" y="87" width="226" height="32" rx="7" fill="#121230"/>
  <rect x="327" y="107" width="226" height="12" fill="#121230"/>
  <text x="440" y="109" text-anchor="middle" fill="#7ec8e3" font-size="13" font-weight="600">② @EntityGraph</text>

  <rect x="338" y="130" width="204" height="150" rx="4" fill="#000000" stroke="#3a4a6e"/>
  <text x="350" y="148" fill="#9aa4b8" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// Spring Data JPA</text>
  <text x="350" y="166" fill="#ffffff" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">@EntityGraph(</text>
  <text x="350" y="184" fill="#ffffff" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> attributePaths =</text>
  <text x="350" y="202" fill="#ffffff" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">   {</text><text x="366" y="202" fill="#ce9178" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">"orders"</text><text x="422" y="202" fill="#ffffff" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">})</text>
  <text x="350" y="220" fill="#ffffff" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">@Override</text>
  <text x="350" y="238" fill="#ffffff" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">List&lt;Member&gt; findAll();</text>
  <text x="350" y="256" fill="#9aa4b8" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// LEFT JOIN FETCH 생성</text>

  <text x="338" y="302" fill="#e8e8e8" font-size="12">생성 SQL:</text>
  <rect x="338" y="310" width="204" height="54" rx="4" fill="#000000" stroke="#3a4a6e"/>
  <text x="350" y="328" fill="#7ec8e3" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">SELECT</text><text x="392" y="328" fill="#ffffff" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> m.*, o.*</text>
  <text x="350" y="346" fill="#7ec8e3" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">FROM</text><text x="382" y="346" fill="#ffffff" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> member m</text>
  <text x="350" y="364" fill="#ffffff" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">LEFT JOIN orders …</text>

  <text x="440" y="396" text-anchor="middle" fill="#55c555" font-size="12" font-weight="600">SQL 1번</text>
  <text x="440" y="412" text-anchor="middle" fill="#888" font-size="11">JPQL 없이 적용</text>
  <text x="440" y="428" text-anchor="middle" fill="#888" font-size="11">LEFT JOIN 고정</text>
  <text x="440" y="444" text-anchor="middle" fill="#7777cc" font-size="11">단순 조회에 적합</text>

  <!-- Column 3: @BatchSize -->
  <rect x="592" y="86" width="228" height="380" rx="8" fill="#100a10" stroke="#7777cc" stroke-width="1.5"/>
  <rect x="593" y="87" width="226" height="32" rx="7" fill="#201220"/>
  <rect x="593" y="107" width="226" height="12" fill="#201220"/>
  <text x="706" y="109" text-anchor="middle" fill="#7777cc" font-size="13" font-weight="600">③ @BatchSize</text>

  <rect x="604" y="130" width="204" height="150" rx="4" fill="#000000" stroke="#3a4a6e"/>
  <text x="616" y="148" fill="#9aa4b8" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// 엔티티 또는 전역 설정</text>
  <text x="616" y="166" fill="#ffffff" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">@BatchSize(size = </text><text x="728" y="166" fill="#b5cea8" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">100</text><text x="752" y="166" fill="#ffffff" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">)</text>
  <text x="616" y="184" fill="#ffffff" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">@OneToMany(</text>
  <text x="616" y="202" fill="#ffffff" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  mappedBy = </text><text x="692" y="202" fill="#ce9178" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">"member"</text><text x="748" y="202" fill="#ffffff" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">)</text>
  <text x="616" y="220" fill="#7ec8e3" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">private</text><text x="664" y="220" fill="#ffffff" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> List&lt;Order&gt;</text>
  <text x="616" y="238" fill="#ffffff" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    orders;</text>
  <text x="616" y="256" fill="#9aa4b8" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// IN(?,?,…) 100개씩 묶음</text>

  <text x="604" y="302" fill="#e8e8e8" font-size="12">생성 SQL:</text>
  <rect x="604" y="310" width="204" height="54" rx="4" fill="#000000" stroke="#3a4a6e"/>
  <text x="616" y="328" fill="#7ec8e3" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">SELECT</text><text x="658" y="328" fill="#ffffff" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> * FROM orders</text>
  <text x="616" y="346" fill="#7ec8e3" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">WHERE</text><text x="654" y="346" fill="#ffffff" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> member_id</text>
  <text x="616" y="364" fill="#7ec8e3" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">IN</text><text x="634" y="364" fill="#ffffff" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> (1,2,…,100)</text>

  <text x="706" y="396" text-anchor="middle" fill="#55c555" font-size="12" font-weight="600">SQL 최소화</text>
  <text x="706" y="412" text-anchor="middle" fill="#888" font-size="11">페이징과 호환</text>
  <text x="706" y="428" text-anchor="middle" fill="#888" font-size="11">컬렉션 최적화</text>
  <text x="706" y="444" text-anchor="middle" fill="#7777cc" font-size="11">전역 설정 가능</text>

  <!-- Bottom summary -->
  <rect x="60" y="484" width="760" height="40" rx="6" fill="#0f0f1a" stroke="#2a2a3a"/>
  <text x="440" y="500" text-anchor="middle" fill="#888" font-size="12">일반 조회: fetch join · @EntityGraph</text>
  <text x="440" y="518" text-anchor="middle" fill="#888" font-size="12">페이징이 필요한 컬렉션: @BatchSize + default_batch_fetch_size</text>
</svg>
