<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr-down" viewBox="0 0 14 14" refX="7" refY="12"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 1 0 L 7 13 L 13 0 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Context Provider 패턴 — 서버 레이아웃 안에서</text>

  <!-- Layer 1: RootLayout (Server) -->
  <rect x="50" y="68" width="780" height="80" rx="8" fill="#0d1f2d" stroke="#3a5a7e" stroke-width="2"/>
  <text x="440" y="100" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">RootLayout</text>
  <text x="440" y="120" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">app/layout.tsx — Server Component (async 가능)</text>

  <!-- Arrow down -->
  <line x1="440" y1="148" x2="440" y2="170" stroke="#7777cc" stroke-width="2"
        marker-end="url(#arr-down)"/>

  <!-- Layer 2: ThemeProvider (Client) -->
  <rect x="100" y="170" width="680" height="70" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="198" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc">ThemeProvider</text>
  <text x="440" y="218" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">providers/ThemeProvider.tsx — 'use client' (Context 생성)</text>

  <!-- Arrow down -->
  <line x1="440" y1="240" x2="440" y2="262" stroke="#7777cc" stroke-width="2"
        marker-end="url(#arr-down)"/>

  <!-- Layer 3: children = page -->
  <rect x="160" y="262" width="560" height="70" rx="8" fill="#0d1f2d" stroke="#3a5a7e" stroke-width="1.5"/>
  <text x="440" y="290" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">{children} — Page</text>
  <text x="440" y="310" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Server Component — Context 값을 props로 받지 않음</text>

  <!-- Key rule box -->
  <rect x="50" y="356" width="780" height="84" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="440" y="380" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">핵심 규칙</text>
  <text x="70" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">· Context.Provider는 'use client' 필요 (createContext는 클라이언트 API)</text>
  <text x="70" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">· Provider를 별도 파일로 분리 → 레이아웃은 서버 컴포넌트 유지</text>
  <text x="70" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">· Provider가 감싸는 children은 서버 컴포넌트 가능 (RSC 직렬화)</text>
</svg>
