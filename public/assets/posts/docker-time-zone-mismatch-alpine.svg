<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Alpine/Distroless 시간대 설정</text>

  <!-- Alpine -->
  <rect x="60" y="70" width="360" height="180" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Alpine Linux</text>
  <text x="240" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">tzdata 패키지 설치 후 링크</text>
  <rect x="76" y="128" width="328" height="110" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">FROM</text>
  <text x="136" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> node:20-alpine</text>
  <text x="92" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">RUN</text>
  <text x="124" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> apk add --no-cache tzdata \</text>
  <text x="92" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  &amp;&amp; cp /usr/share/zoneinfo/Asia/Seoul \</text>
  <text x="92" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">     /etc/localtime \</text>
  <text x="92" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  &amp;&amp; apk del tzdata</text>

  <!-- Debian/Ubuntu -->
  <rect x="460" y="70" width="360" height="180" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="640" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Debian / Ubuntu</text>
  <text x="640" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">DEBIAN_FRONTEND=noninteractive 필수</text>
  <rect x="476" y="128" width="328" height="110" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">FROM</text>
  <text x="536" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> debian:bookworm-slim</text>
  <text x="492" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">ENV</text>
  <text x="524" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> DEBIAN_FRONTEND=noninteractive</text>
  <text x="492" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">RUN</text>
  <text x="524" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> apt-get update \</text>
  <text x="492" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  &amp;&amp; apt-get install -y tzdata \</text>
  <text x="492" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  &amp;&amp; rm -rf /var/lib/apt/lists/*</text>

  <!-- ENV TZ -->
  <rect x="60" y="280" width="760" height="80" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Dockerfile에 TZ 환경변수 설정 (모든 이미지 공통)</text>
  <rect x="76" y="315" width="728" height="34" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="337" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">ENV</text>
  <text x="124" y="337" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> TZ=Asia/Seoul</text>
  <text x="340" y="337" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">   # tzdata 없이도 일부 앱에서 동작</text>
</svg>
