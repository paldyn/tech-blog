<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">스케줄링 프레임워크 Extension Points</text>

  <!-- Pipeline bar -->
  <rect x="60" y="80" width="760" height="40" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="440" y="105" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Scheduling Cycle &#x2192; Binding Cycle</text>

  <!-- Extension point boxes -->
  <rect x="60" y="150" width="110" height="50" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="115" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#7ec8e3" text-anchor="middle">PreFilter</text>
  <text x="115" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#6b7280" text-anchor="middle">사전 조건 검사</text>

  <rect x="185" y="150" width="110" height="50" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="240" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#7ec8e3" text-anchor="middle">Filter</text>
  <text x="240" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#6b7280" text-anchor="middle">불가 노드 제거</text>

  <rect x="310" y="150" width="110" height="50" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="365" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#7ec8e3" text-anchor="middle">PreScore</text>
  <text x="365" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#6b7280" text-anchor="middle">점수 사전 처리</text>

  <rect x="435" y="150" width="110" height="50" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="490" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#7ec8e3" text-anchor="middle">Score</text>
  <text x="490" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#6b7280" text-anchor="middle">노드 점수화</text>

  <rect x="560" y="150" width="110" height="50" rx="6" fill="#0d1f12" stroke="#166534" stroke-width="1"/>
  <text x="615" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#55c555" text-anchor="middle">Reserve</text>
  <text x="615" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#6b7280" text-anchor="middle">리소스 예약</text>

  <rect x="685" y="150" width="110" height="50" rx="6" fill="#0d1f12" stroke="#166534" stroke-width="1"/>
  <text x="740" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#55c555" text-anchor="middle">Bind</text>
  <text x="740" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#6b7280" text-anchor="middle">노드 바인딩</text>

  <!-- Custom scheduler code block -->
  <rect x="60" y="240" width="760" height="120" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 커스텀 스케줄러 지정 — Pod spec</text>
  <text x="76" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">spec:</text>
  <text x="76" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">schedulerName</tspan>: my-custom-scheduler</text>
  <text x="76" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  # 기본값: default-scheduler</text>
  <text x="76" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  # 미지정 시 kube-scheduler 사용</text>
</svg>
