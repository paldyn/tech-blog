<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">REST API 보안: HTTP 메서드별 취약점과 방어</text>

  <!-- Method table header -->
  <rect x="60" y="62" width="760" height="34" rx="6" fill="#141a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="120" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">메서드</text>
  <text x="260" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">보안 고려사항</text>
  <text x="500" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">주요 취약점</text>
  <text x="720" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">방어 포인트</text>

  <!-- GET -->
  <rect x="60" y="96" width="760" height="44" rx="0" fill="#0f1520" stroke="#2a3a5e" stroke-width="1"/>
  <text x="120" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">GET</text>
  <text x="260" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">쿼리 파라미터 로그 노출 주의</text>
  <text x="260" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">부하에 취약 (대용량 응답)</text>
  <text x="500" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">BOLA: 타인 데이터 접근</text>
  <text x="720" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">소유자 검증 필수</text>
  <text x="720" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">페이지네이션 강제</text>

  <!-- POST -->
  <rect x="60" y="140" width="760" height="44" rx="0" fill="#111820" stroke="#2a3a5e" stroke-width="1"/>
  <text x="120" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">POST</text>
  <text x="260" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">바디 크기 제한 없으면 과부하</text>
  <text x="260" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Content-Type 미검증 시 인젝션</text>
  <text x="500" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">Mass Assignment: 권한 없는 필드</text>
  <text x="500" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">Injection: SQL/NoSQL/Command</text>
  <text x="720" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">스키마 화이트리스트 검증</text>
  <text x="720" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Content-Type 강제</text>

  <!-- PUT/PATCH -->
  <rect x="60" y="184" width="760" height="44" rx="0" fill="#0f1520" stroke="#2a3a5e" stroke-width="1"/>
  <text x="120" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#ce9178">PUT/PATCH</text>
  <text x="260" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">부분 업데이트 권한 세분화</text>
  <text x="260" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">멱등성 고려</text>
  <text x="500" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">권한 상승: role 필드 직접 변경</text>
  <text x="720" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">수정 가능 필드 화이트리스트</text>
  <text x="720" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">소유자+권한 이중 검증</text>

  <!-- DELETE -->
  <rect x="60" y="228" width="760" height="44" rx="0" fill="#111820" stroke="#2a3a5e" stroke-width="1"/>
  <text x="120" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">DELETE</text>
  <text x="260" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">소프트 삭제 vs 하드 삭제</text>
  <text x="260" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">중요 자원 추가 확인 필요</text>
  <text x="500" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">타인 자원 삭제(BOLA)</text>
  <text x="720" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">2차 확인, 감사 로그 필수</text>

  <!-- Code block: JWT verification -->
  <rect x="60" y="294" width="760" height="162" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># REST API 응답 필드 필터링 (Node.js/Express)</text>
  <text x="76" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 화이트리스트 직렬화 — password_hash 등 제외</text>
  <text x="76" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">const ALLOWED_USER_FIELDS = [</text>
  <text x="76" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">  "id", "email", "name", "createdAt"</text>
  <text x="76" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">];</text>
  <text x="76" y="406" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">function sanitizeUser(user) {</text>
  <text x="76" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  return pick(user, ALLOWED_USER_FIELDS);</text>
  <text x="76" y="442" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">}</text>
</svg>
