<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 340">
  <rect width="880" height="340" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">세 가지 무한 이터레이터</text>

  <!-- count() box -->
  <rect x="50" y="64" width="240" height="240" rx="8"
        fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="92" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="17" font-weight="700" fill="#7ec8e3">count(start, step)</text>
  <text x="170" y="114" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">start부터 step씩 증가 (무한)</text>
  <rect x="66" y="126" width="208" height="80" rx="4"
        fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="147" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">count(<tspan fill="#b5cea8">0</tspan>, <tspan fill="#b5cea8">10</tspan>)</text>
  <text x="82" y="165" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">→ 0, 10, 20, 30, ...</tspan></text>
  <text x="82" y="183" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8"># 소수점도 가능: 0.5, 1.0, 1.5</tspan></text>
  <text x="170" y="232" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">enumerate()의 일반화</text>
  <text x="170" y="252" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">zip(count(n), iterable)로</text>
  <text x="170" y="270" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">인덱스 붙이기 활용</text>

  <!-- cycle() box -->
  <rect x="320" y="64" width="240" height="240" rx="8"
        fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="92" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="17" font-weight="700" fill="#55c555">cycle(iterable)</text>
  <text x="440" y="114" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">이터러블을 무한 반복</text>
  <rect x="336" y="126" width="208" height="80" rx="4"
        fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="352" y="147" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">cycle([<tspan fill="#ce9178">'A'</tspan>, <tspan fill="#ce9178">'B'</tspan>, <tspan fill="#ce9178">'C'</tspan>])</text>
  <text x="352" y="165" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">→ A, B, C, A, B, C, ...</tspan></text>
  <text x="352" y="183" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8"># 내부적으로 복사본 유지</tspan></text>
  <text x="440" y="232" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">순환 패턴, 색상 교대,</text>
  <text x="440" y="252" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">로드밸런싱 등에 활용</text>
  <text x="440" y="270" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">메모리 주의: 복사본 저장</text>

  <!-- repeat() box -->
  <rect x="590" y="64" width="240" height="240" rx="8"
        fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="710" y="92" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="17" font-weight="700" fill="#7777cc">repeat(obj, times)</text>
  <text x="710" y="114" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">같은 값을 반복 (times 생략 시 무한)</text>
  <rect x="606" y="126" width="208" height="80" rx="4"
        fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="622" y="147" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">repeat(<tspan fill="#b5cea8">0</tspan>, <tspan fill="#b5cea8">3</tspan>)  <tspan fill="#9aa4b8"># 유한</tspan></text>
  <text x="622" y="165" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">→ 0, 0, 0</tspan></text>
  <text x="622" y="183" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">repeat(<tspan fill="#b5cea8">42</tspan>)  <tspan fill="#9aa4b8">    # 무한</tspan></text>
  <text x="710" y="232" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">map()과 함께</text>
  <text x="710" y="252" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">고정 인자 제공에 활용</text>
  <text x="710" y="270" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">기본값 채우기에 유용</text>

  <!-- islice reminder -->
  <rect x="50" y="320" width="780" height="8" rx="4" fill="#111827" stroke="none"/>
  <text x="440" y="333" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">무한 이터레이터는 반드시 islice(), takewhile(), next() 등으로 종료 조건을 지정해야 한다</text>
</svg>
