<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" style="background:#0a0a0a;border-radius:12px;">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">createAsyncThunk 비동기 흐름</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">pending → fulfilled/rejected 자동 액션 생성</text>

  <!-- Step 1: dispatch thunk -->
  <rect x="60" y="100" width="160" height="60" rx="10" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="140" y="124" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">dispatch</text>
  <text x="140" y="144" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">fetchUsers()</text>

  <line x1="220" y1="130" x2="278" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2: pending -->
  <rect x="280" y="100" width="160" height="60" rx="10" fill="#2a1a0d" stroke="#e05555" stroke-width="2"/>
  <text x="360" y="124" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">pending</text>
  <text x="360" y="144" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">loading: true</text>

  <line x1="440" y1="130" x2="498" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3: async work -->
  <rect x="500" y="100" width="160" height="60" rx="10" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="2"/>
  <text x="580" y="124" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">비동기 작업</text>
  <text x="580" y="144" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">API 호출</text>

  <!-- Arrows to fulfilled/rejected -->
  <line x1="660" y1="120" x2="718" y2="104" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>
  <line x1="660" y1="140" x2="718" y2="156" stroke="#e05555" stroke-width="2" marker-end="url(#arrr)"/>

  <!-- Fulfilled -->
  <rect x="720" y="90" width="120" height="50" rx="8" fill="#0d2a0d" stroke="#55c555" stroke-width="2"/>
  <text x="780" y="112" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">fulfilled</text>
  <text x="780" y="130" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">payload = data</text>

  <!-- Rejected -->
  <rect x="720" y="150" width="120" height="50" rx="8" fill="#2a0d0d" stroke="#e05555" stroke-width="2"/>
  <text x="780" y="172" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">rejected</text>
  <text x="780" y="190" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">error 처리</text>

  <!-- Code section -->
  <rect x="60" y="224" width="760" height="208" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="243" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// createAsyncThunk로 비동기 액션 생성</text>
  <text x="76" y="261" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">export const</tspan> fetchUsers = createAsyncThunk(</text>
  <text x="76" y="279" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#ce9178">'users/fetchAll'</tspan>,</text>
  <text x="76" y="297" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">async</tspan> () =&gt; (await fetch(<tspan fill="#ce9178">'/api/users'</tspan>)).json()</text>
  <text x="76" y="315" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">);</text>
  <text x="76" y="333" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// extraReducers에서 3개 케이스 처리</text>
  <text x="76" y="351" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">extraReducers: (builder) =&gt; &#123;</text>
  <text x="76" y="369" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  builder</text>
  <text x="76" y="387" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    .addCase(fetchUsers.pending, s =&gt; &#123; s.loading = <tspan fill="#b5cea8">true</tspan>; &#125;)</text>
  <text x="76" y="405" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    .addCase(fetchUsers.fulfilled, (s, a) =&gt; &#123; s.users = a.payload; s.loading = <tspan fill="#b5cea8">false</tspan>; &#125;)</text>
  <text x="76" y="423" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    .addCase(fetchUsers.rejected, (s, a) =&gt; &#123; s.error = a.error.message; s.loading = <tspan fill="#b5cea8">false</tspan>; &#125;);</text>
</svg>
