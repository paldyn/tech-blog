<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="360" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">인라인 핸들러는 타입이 공짜다</text>
  <text x="60" y="78" font-size="13" fill="#888">JSX 속성 자리에 직접 쓰면 e의 타입이 자동 추론된다</text>

  <!-- inline -->
  <rect x="60" y="100" width="360" height="230" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="128" font-size="14" font-weight="600" fill="#55c555">인라인 — 추론됨</text>
  <text xml:space="preserve" x="76" y="162" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">&lt;input</text>
  <text xml:space="preserve" x="76" y="184" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">  onChange={(e) =&gt; {</text>
  <text xml:space="preserve" x="76" y="206" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#9aa4b8">    // e: ChangeEvent&lt;</tspan></text>
  <text xml:space="preserve" x="76" y="228" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">    //   HTMLInputElement&gt;</text>
  <text xml:space="preserve" x="76" y="250" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">    set(e.target.value);</text>
  <text xml:space="preserve" x="76" y="272" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">  }}</text>
  <text xml:space="preserve" x="76" y="294" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">/&gt;</text>
  <text x="76" y="322" font-size="13" fill="#55c555">타입 명시 불필요</text>

  <!-- named -->
  <rect x="460" y="100" width="360" height="230" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="128" font-size="14" font-weight="600" fill="#e05555">분리된 함수 — 명시 필요</text>
  <text xml:space="preserve" x="476" y="162" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> onChange(</tspan></text>
  <text xml:space="preserve" x="476" y="184" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">  e: ChangeEvent&lt;</text>
  <text xml:space="preserve" x="476" y="206" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">    HTMLInputElement&gt;) {</text>
  <text xml:space="preserve" x="476" y="228" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">  set(e.target.value);</text>
  <text xml:space="preserve" x="476" y="250" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">}</text>
  <text x="476" y="294" font-size="13" fill="#ffffff">JSX 맥락 밖이라</text>
  <text x="476" y="316" font-size="13" fill="#e05555">인자 타입을 직접 달아야 함</text>
</svg>
