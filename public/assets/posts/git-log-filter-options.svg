<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">git log 필터 옵션</text>

  <!-- Table -->
  <rect x="60" y="68" width="760" height="366" rx="8" fill="#111827" stroke="#2a3650" stroke-width="1.5"/>

  <!-- Header -->
  <rect x="60" y="68" width="760" height="34" rx="8" fill="#1a2035"/>
  <text x="200" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">옵션</text>
  <text x="590" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">필터 기준</text>

  <line x1="60" y1="102" x2="820" y2="102" stroke="#2a3650" stroke-width="1"/>

  <text x="200" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">--author="..."</text>
  <text x="590" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">저자 이름 또는 이메일 (정규식)</text>

  <line x1="60" y1="134" x2="820" y2="134" stroke="#2a3650" stroke-width="1"/>

  <text x="200" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">--committer="..."</text>
  <text x="590" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">커미터 (rebase 시 저자와 달라짐)</text>

  <line x1="60" y1="166" x2="820" y2="166" stroke="#2a3650" stroke-width="1"/>

  <text x="200" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">--since / --after</text>
  <text x="590" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">날짜 이후 커밋 (예: "2 weeks ago", "2026-05-01")</text>

  <line x1="60" y1="198" x2="820" y2="198" stroke="#2a3650" stroke-width="1"/>

  <text x="200" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">--until / --before</text>
  <text x="590" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">날짜 이전 커밋</text>

  <line x1="60" y1="230" x2="820" y2="230" stroke="#2a3650" stroke-width="1"/>

  <text x="200" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">--grep="..."</text>
  <text x="590" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">커밋 메시지에서 키워드 검색</text>

  <line x1="60" y1="262" x2="820" y2="262" stroke="#2a3650" stroke-width="1"/>

  <text x="200" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">-S "..."</text>
  <text x="590" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">코드 내용 변경 검색 (pickaxe)</text>

  <line x1="60" y1="294" x2="820" y2="294" stroke="#2a3650" stroke-width="1"/>

  <text x="200" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">-G "..."</text>
  <text x="590" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">정규식으로 코드 변경 검색</text>

  <line x1="60" y1="326" x2="820" y2="326" stroke="#2a3650" stroke-width="1"/>

  <text x="200" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">--no-merges</text>
  <text x="590" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">머지 커밋 제외</text>

  <line x1="60" y1="358" x2="820" y2="358" stroke="#2a3650" stroke-width="1"/>

  <text x="200" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">--merges</text>
  <text x="590" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">머지 커밋만</text>

  <line x1="60" y1="390" x2="820" y2="390" stroke="#2a3650" stroke-width="1"/>

  <text x="200" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">--all-match</text>
  <text x="590" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">복수 --grep 모두 만족 (AND)</text>
</svg>
