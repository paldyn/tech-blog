<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">fn_new() 신규 행 추가 흐름</text>

  <!-- Step 1 -->
  <rect x="60" y="72" width="760" height="54" fill="#12213a" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="92" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">① 신규 버튼 클릭 → fn_new() 호출</text>
  <text x="440" y="114" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">btn_new.onclick = "fn_new" — 서버 요청 없이 로컬 처리만</text>

  <polygon points="437,126 443,126 443,154 449,154 440,166 431,154 437,154"
           fill="#55c555" stroke="#0a0a0a" stroke-width="1"/>

  <!-- Step 2 -->
  <rect x="60" y="166" width="760" height="54" fill="#122a12" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="186" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">② ds_list.addRow() — rowStatus = INSERT(2)</text>
  <text x="440" y="208" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Dataset 맨 끝에 빈 행 추가 · 반환값 = 새 행 인덱스</text>

  <polygon points="437,220 443,220 443,248 449,248 440,260 431,248 437,248"
           fill="#55c555" stroke="#0a0a0a" stroke-width="1"/>

  <!-- Step 3 -->
  <rect x="60" y="260" width="760" height="54" fill="#122a12" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="280" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">③ setColumn() 기본값 초기화</text>
  <text x="440" y="302" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">등록일 · 상태코드 · 등록자 ID 등 자동 채움</text>

  <polygon points="437,314 443,314 443,342 449,342 440,354 431,342 437,342"
           fill="#55c555" stroke="#0a0a0a" stroke-width="1"/>

  <!-- Step 4 -->
  <rect x="60" y="354" width="760" height="54" fill="#122a12" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="374" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">④ Grid.setFocus(row, colId) — 입력 대기</text>
  <text x="440" y="396" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">새 행으로 스크롤 + 첫 번째 편집 셀에 커서 위치</text>

  <!-- Bottom note -->
  <text x="440" y="440"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#666" text-anchor="middle">저장 없이 다시 fn_search() 호출 시 미저장 신규 행은 사라짐 — 이탈 경고 구현 필요</text>
</svg>
