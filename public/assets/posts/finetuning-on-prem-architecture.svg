<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <!-- Background -->
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">온프레미스 파인튜닝 서버 아키텍처</text>
  <text x="440" y="68" font-size="15" fill="#888" text-anchor="middle">Multi-GPU · NVLink · InfiniBand · NVMe SSD</text>

  <!-- ===== GPU SERVER BOX ===== -->
  <rect x="60" y="92" width="500" height="300" rx="12" fill="#111722" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="310" y="116" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">GPU 서버 (8× A100 80GB)</text>

  <!-- GPU blocks row 1 -->
  <rect x="82" y="126" width="96" height="48" rx="8" fill="#0d1b2a" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="130" y="146" font-size="11" font-weight="700" fill="#7ec8e3" text-anchor="middle">GPU 0</text>
  <text x="130" y="162" font-size="10" fill="#888" text-anchor="middle">A100 80GB</text>

  <rect x="194" y="126" width="96" height="48" rx="8" fill="#0d1b2a" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="242" y="146" font-size="11" font-weight="700" fill="#7ec8e3" text-anchor="middle">GPU 1</text>
  <text x="242" y="162" font-size="10" fill="#888" text-anchor="middle">A100 80GB</text>

  <rect x="306" y="126" width="96" height="48" rx="8" fill="#0d1b2a" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="354" y="146" font-size="11" font-weight="700" fill="#7ec8e3" text-anchor="middle">GPU 2</text>
  <text x="354" y="162" font-size="10" fill="#888" text-anchor="middle">A100 80GB</text>

  <rect x="418" y="126" width="96" height="48" rx="8" fill="#0d1b2a" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="466" y="146" font-size="11" font-weight="700" fill="#7ec8e3" text-anchor="middle">GPU 3</text>
  <text x="466" y="162" font-size="10" fill="#888" text-anchor="middle">A100 80GB</text>

  <!-- NVLink bar row 1 -->
  <rect x="82" y="178" width="432" height="10" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="0.8"/>
  <text x="298" y="187" font-size="9" fill="#7ec8e3" text-anchor="middle">NVLink 600 GB/s</text>

  <!-- GPU blocks row 2 -->
  <rect x="82" y="198" width="96" height="48" rx="8" fill="#0d1b2a" stroke="#7777cc" stroke-width="1.2"/>
  <text x="130" y="218" font-size="11" font-weight="700" fill="#7777cc" text-anchor="middle">GPU 4</text>
  <text x="130" y="234" font-size="10" fill="#888" text-anchor="middle">A100 80GB</text>

  <rect x="194" y="198" width="96" height="48" rx="8" fill="#0d1b2a" stroke="#7777cc" stroke-width="1.2"/>
  <text x="242" y="218" font-size="11" font-weight="700" fill="#7777cc" text-anchor="middle">GPU 5</text>
  <text x="242" y="234" font-size="10" fill="#888" text-anchor="middle">A100 80GB</text>

  <rect x="306" y="198" width="96" height="48" rx="8" fill="#0d1b2a" stroke="#7777cc" stroke-width="1.2"/>
  <text x="354" y="218" font-size="11" font-weight="700" fill="#7777cc" text-anchor="middle">GPU 6</text>
  <text x="354" y="234" font-size="10" fill="#888" text-anchor="middle">A100 80GB</text>

  <rect x="418" y="198" width="96" height="48" rx="8" fill="#0d1b2a" stroke="#7777cc" stroke-width="1.2"/>
  <text x="466" y="218" font-size="11" font-weight="700" fill="#7777cc" text-anchor="middle">GPU 7</text>
  <text x="466" y="234" font-size="10" fill="#888" text-anchor="middle">A100 80GB</text>

  <!-- NVLink bar row 2 -->
  <rect x="82" y="250" width="432" height="10" rx="4" fill="#1a2233" stroke="#7777cc" stroke-width="0.8"/>
  <text x="298" y="259" font-size="9" fill="#7777cc" text-anchor="middle">NVLink 600 GB/s</text>

  <!-- Software Stack -->
  <text x="298" y="285" font-size="11" font-weight="700" fill="#888" text-anchor="middle">소프트웨어 스택</text>
  <rect x="82" y="292" width="72" height="26" rx="6" fill="#0d2210" stroke="#55c555" stroke-width="1"/>
  <text x="118" y="310" font-size="10" font-weight="700" fill="#55c555" text-anchor="middle">Ubuntu</text>

  <text x="162" y="310" font-size="11" fill="#444" text-anchor="middle">→</text>

  <rect x="170" y="292" width="60" height="26" rx="6" fill="#0d1b2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="200" y="310" font-size="10" font-weight="700" fill="#7ec8e3" text-anchor="middle">CUDA</text>

  <text x="238" y="310" font-size="11" fill="#444" text-anchor="middle">→</text>

  <rect x="248" y="292" width="70" height="26" rx="6" fill="#0d1b2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="283" y="310" font-size="10" font-weight="700" fill="#7ec8e3" text-anchor="middle">PyTorch</text>

  <text x="326" y="310" font-size="11" fill="#444" text-anchor="middle">→</text>

  <rect x="336" y="292" width="80" height="26" rx="6" fill="#1a0d2a" stroke="#7777cc" stroke-width="1"/>
  <text x="376" y="310" font-size="10" font-weight="700" fill="#7777cc" text-anchor="middle">DeepSpeed</text>

  <text x="424" y="310" font-size="11" fill="#444" text-anchor="middle">→</text>

  <rect x="434" y="292" width="80" height="26" rx="6" fill="#1a1500" stroke="#b5cea8" stroke-width="1"/>
  <text x="474" y="310" font-size="10" font-weight="700" fill="#b5cea8" text-anchor="middle">HuggingFace</text>

  <!-- NVMe SSD -->
  <rect x="82" y="330" width="200" height="44" rx="8" fill="#0d1d0d" stroke="#55c555" stroke-width="1.2"/>
  <text x="182" y="350" font-size="11" font-weight="700" fill="#55c555" text-anchor="middle">NVMe SSD RAID</text>
  <text x="182" y="366" font-size="10" fill="#888" text-anchor="middle">7 GB/s · 수십 TB</text>

  <!-- CPU / RAM -->
  <rect x="300" y="330" width="212" height="44" rx="8" fill="#14100d" stroke="#ce9178" stroke-width="1.2"/>
  <text x="406" y="350" font-size="11" font-weight="700" fill="#ce9178" text-anchor="middle">CPU + 시스템 메모리</text>
  <text x="406" y="366" font-size="10" fill="#888" text-anchor="middle">2× Xeon / 512GB DDR5</text>

  <!-- ===== RIGHT PANEL: Data Flow ===== -->
  <rect x="582" y="92" width="238" height="300" rx="12" fill="#111722" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="701" y="116" font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">데이터 흐름</text>

  <!-- Storage -->
  <rect x="606" y="128" width="190" height="44" rx="8" fill="#0d1d0d" stroke="#55c555" stroke-width="1.2"/>
  <text x="701" y="148" font-size="11" font-weight="700" fill="#55c555" text-anchor="middle">NVMe 스토리지</text>
  <text x="701" y="163" font-size="10" fill="#888" text-anchor="middle">학습 데이터셋 / 토크나이저</text>

  <!-- Arrow down -->
  <line x1="701" y1="172" x2="701" y2="198" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="720" y="188" font-size="9" fill="#7ec8e3">DataLoader</text>

  <!-- GPU Memory -->
  <rect x="606" y="200" width="190" height="44" rx="8" fill="#0d1b2a" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="701" y="220" font-size="11" font-weight="700" fill="#7ec8e3" text-anchor="middle">GPU 메모리</text>
  <text x="701" y="235" font-size="10" fill="#888" text-anchor="middle">모델 가중치 · 활성화 · 그래디언트</text>

  <!-- Arrow down -->
  <line x1="701" y1="244" x2="701" y2="270" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="715" y="260" font-size="9" fill="#7777cc">저장</text>

  <!-- Checkpoint -->
  <rect x="606" y="272" width="190" height="44" rx="8" fill="#1a0d2a" stroke="#7777cc" stroke-width="1.2"/>
  <text x="701" y="292" font-size="11" font-weight="700" fill="#7777cc" text-anchor="middle">체크포인트</text>
  <text x="701" y="307" font-size="10" fill="#888" text-anchor="middle">model.safetensors · optimizer.pt</text>

  <!-- Arrow down -->
  <line x1="701" y1="316" x2="701" y2="342" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- InfiniBand -->
  <rect x="606" y="344" width="190" height="38" rx="8" fill="#0d1d0d" stroke="#55c555" stroke-width="1.2"/>
  <text x="701" y="360" font-size="11" font-weight="700" fill="#55c555" text-anchor="middle">InfiniBand 네트워크</text>
  <text x="701" y="374" font-size="10" fill="#888" text-anchor="middle">멀티노드 200Gb/s</text>

  <!-- Arrow from GPU server to right panel -->
  <line x1="560" y1="250" x2="582" y2="250" stroke="#888" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- defs -->
  <defs>
    <marker id="arr" markerWidth="14" markerHeight="14" refX="8" refY="7" orient="auto">
      <path d="M0,0 L0,14 L14,7 Z" fill="#888"/>
    </marker>
  </defs>

  <!-- Bottom bar -->
  <text x="440" y="472" font-size="12" fill="#444" text-anchor="middle">온프레미스 환경: 초기 투자비용 높음 / 장기 운영비용 절감 / 데이터 보안 확보</text>
</svg>
