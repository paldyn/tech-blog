<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">제너레이터 실전 활용 패턴</text>
  <text x="440" y="70" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">무한 시퀀스 · 이터러블 · 지연 평가</text>

  <!-- Infinite sequence -->
  <rect x="60" y="90" width="360" height="200" fill="#111" rx="10" stroke="#1e2433" stroke-width="1"/>
  <text x="240" y="112" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" text-anchor="middle">무한 시퀀스</text>

  <rect x="76" y="122" width="328" height="148" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="92" y="142" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">// 피보나치 무한 수열</text>
  <text x="92" y="160" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">function*</tspan> fibonacci() {</text>
  <text x="92" y="178" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">let</tspan> [a, b] = [<tspan fill="#b5cea8">0</tspan>, <tspan fill="#b5cea8">1</tspan>];</text>
  <text x="92" y="196" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">while</tspan> (<tspan fill="#7ec8e3">true</tspan>) {</text>
  <text x="92" y="214" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    <tspan fill="#7ec8e3">yield</tspan> a;</text>
  <text x="92" y="232" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    [a, b] = [b, a + b];</text>
  <text x="92" y="250" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  }</text>
  <text x="92" y="268" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">}</text>

  <!-- Lazy evaluation -->
  <rect x="460" y="90" width="360" height="200" fill="#111" rx="10" stroke="#1e2433" stroke-width="1"/>
  <text x="640" y="112" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" text-anchor="middle">지연 평가 (Lazy Evaluation)</text>

  <rect x="476" y="122" width="328" height="148" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="492" y="142" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">// 필요할 때만 계산</text>
  <text x="492" y="160" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">function*</tspan> <tspan fill="#e8e8e8">take</tspan>(n, iter) {</text>
  <text x="492" y="178" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">for</tspan> (<tspan fill="#7ec8e3">const</tspan> x <tspan fill="#7ec8e3">of</tspan> iter) {</text>
  <text x="492" y="196" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    <tspan fill="#7ec8e3">yield</tspan> x;</text>
  <text x="492" y="214" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    <tspan fill="#7ec8e3">if</tspan> (--n === <tspan fill="#b5cea8">0</tspan>) <tspan fill="#7ec8e3">return</tspan>;</text>
  <text x="492" y="232" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  }</text>
  <text x="492" y="250" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">}</text>
  <text x="492" y="272" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">[...take(<tspan fill="#b5cea8">5</tspan>, fibonacci())];</text>

  <!-- yield* delegation -->
  <rect x="60" y="308" width="760" height="110" fill="#0d0d0d" rx="10" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="330" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" text-anchor="middle">yield* 위임</text>

  <rect x="76" y="340" width="727" height="64" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="92" y="360" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">function*</tspan> gen() { <tspan fill="#7ec8e3">yield</tspan> <tspan fill="#b5cea8">1</tspan>; <tspan fill="#7ec8e3">yield</tspan> <tspan fill="#b5cea8">2</tspan>; }</text>
  <text x="92" y="378" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">function*</tspan> combined() { <tspan fill="#7ec8e3">yield*</tspan> gen(); <tspan fill="#7ec8e3">yield</tspan> <tspan fill="#b5cea8">3</tspan>; }</text>
  <text x="92" y="396" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">[...combined()]; <tspan fill="#6a8aa0">// [1, 2, 3]</tspan></text>

  <!-- Footer -->
  <text x="440" y="442" fill="#444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">PALDYN · JavaScript 완전 정복</text>
</svg>
