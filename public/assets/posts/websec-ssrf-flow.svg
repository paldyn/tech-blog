<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>

  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">SSRF 공격 흐름: 서버를 내부 프록시로 악용</text>

  <!-- External zone -->
  <rect x="60" y="70" width="220" height="420" rx="10" fill="#0a1a0a" stroke="#55c555" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="170" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">외부 (인터넷)</text>

  <rect x="80" y="104" width="180" height="60" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">공격자</text>
  <text x="170" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">악성 URL 제공</text>

  <!-- Internal zone -->
  <rect x="420" y="70" width="430" height="420" rx="10" fill="#0a0a1a" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="635" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">내부 네트워크 (방화벽 내부)</text>

  <!-- Vulnerable server in middle -->
  <rect x="310" y="150" width="100" height="290" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="360" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e05555">취약</text>
  <text x="360" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e05555">웹 서버</text>
  <text x="360" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">URL Fetch</text>
  <text x="360" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">기능 보유</text>
  <text x="360" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" fill="#e05555">⚠</text>

  <!-- Attack arrow: attacker to server -->
  <line x1="262" y1="164" x2="308" y2="230" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="270" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">① 악성 URL</text>
  <text x="270" y="207" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">요청 전송</text>

  <!-- Internal targets -->
  <rect x="440" y="110" width="190" height="60" rx="8" fill="#0a0a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="535" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">내부 DB 서버</text>
  <text x="535" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">192.168.1.100:5432</text>

  <rect x="650" y="110" width="190" height="60" rx="8" fill="#0a0a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="745" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">클라우드 메타데이터</text>
  <text x="745" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">169.254.169.254</text>

  <rect x="440" y="210" width="190" height="60" rx="8" fill="#0a0a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="535" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">내부 관리 패널</text>
  <text x="535" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">http://admin:8080</text>

  <rect x="650" y="210" width="190" height="60" rx="8" fill="#0a0a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="745" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">내부 API 서버</text>
  <text x="745" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">http://internal-api</text>

  <rect x="440" y="310" width="400" height="60" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="640" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">Redis / Memcached</text>
  <text x="640" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">http://localhost:6379 — 인증 없음!</text>

  <!-- Server to internal arrows -->
  <line x1="412" y1="225" x2="438" y2="140" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-red)"/>
  <line x1="412" y1="260" x2="438" y2="240" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-red)"/>
  <line x1="412" y1="295" x2="438" y2="340" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-red)"/>
  <line x1="412" y1="225" x2="648" y2="140" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-red)"/>
  <line x1="412" y1="260" x2="648" y2="240" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-red)"/>

  <text x="360" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">② 내부망</text>
  <text x="360" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">요청 전달</text>

  <!-- Return arrow -->
  <line x1="308" y1="260" x2="262" y2="260" stroke="#ce9178" stroke-width="2" marker-end="url(#arr-orange)"/>
  <text x="268" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#ce9178">③ 내부 데이터</text>
  <text x="268" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#ce9178">공격자에게 반환</text>

  <!-- Code example -->
  <rect x="60" y="498" width="760" height="34" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="518" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">GET /fetch?url=http://169.254.169.254/latest/meta-data/iam/security-credentials/</text>
</svg>
