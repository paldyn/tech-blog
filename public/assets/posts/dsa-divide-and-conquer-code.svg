<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">분할 정복 - Merge Sort 구현</text>

  <!-- Code box -->
  <rect x="60" y="62" width="760" height="390" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <!-- merge_sort function -->
  <text x="80" y="90" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">def </tspan><tspan fill="#ffffff">merge_sort(arr):</tspan></text>

  <text x="80" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">len</tspan><tspan fill="#ffffff">(arr) &lt;= </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">:</tspan></text>

  <text x="80" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> arr      </tspan><tspan fill="#9aa4b8"># base case</tspan></text>

  <text x="80" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  mid = </tspan><tspan fill="#7ec8e3" font-weight="600">len</tspan><tspan fill="#ffffff">(arr) // </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">  </tspan><tspan fill="#9aa4b8"># DIVIDE</tspan></text>

  <text x="80" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  left  = merge_sort(arr[:mid])</tspan></text>

  <text x="80" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  right = merge_sort(arr[mid:]) </tspan><tspan fill="#9aa4b8"># CONQUER</tspan></text>

  <text x="80" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> merge(left, right)  </tspan><tspan fill="#9aa4b8"># COMBINE</tspan></text>

  <!-- Separator -->
  <line x1="80" y1="234" x2="800" y2="234" stroke="#3a4a6e" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- merge function -->
  <text x="80" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">def </tspan><tspan fill="#ffffff">merge(left, right):</tspan></text>

  <text x="80" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  result = []; i = j = </tspan><tspan fill="#b5cea8">0</tspan></text>

  <text x="80" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">  while</tspan><tspan fill="#ffffff"> i &lt; </tspan><tspan fill="#7ec8e3" font-weight="600">len</tspan><tspan fill="#ffffff">(left) </tspan><tspan fill="#7ec8e3" font-weight="600">and</tspan><tspan fill="#ffffff"> j &lt; </tspan><tspan fill="#7ec8e3" font-weight="600">len</tspan><tspan fill="#ffffff">(right):</tspan></text>

  <text x="80" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> left[i] &lt;= right[j]:</tspan></text>

  <text x="80" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">      result.append(left[i]); i+=</tspan><tspan fill="#b5cea8">1</tspan></text>

  <text x="80" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">    else</tspan><tspan fill="#ffffff">:</tspan></text>

  <text x="80" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">      result.append(right[j]); j+=</tspan><tspan fill="#b5cea8">1</tspan></text>

  <text x="80" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> result + left[i:] + right[j:]</tspan></text>

  <!-- Complexity annotation -->
  <text x="80" y="440" font-size="13" fill="#888">T(N) = 2T(N/2) + O(N)   →   마스터 정리 케이스 2   →   O(N log N)</text>
  <text x="80" y="458" font-size="13" fill="#7ec8e3">안정 정렬 (Stable Sort) | 공간: O(N) | 최악/평균/최선 모두 O(N log N)</text>
</svg>
