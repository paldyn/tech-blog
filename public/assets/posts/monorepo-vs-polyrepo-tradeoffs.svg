<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">트레이드오프 비교</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Monorepo ↔ Polyrepo 장단점</text>

  <!-- Headers -->
  <text x="50" y="100"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">항목</text>
  <text x="270" y="100" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Monorepo</text>
  <text x="650" y="100" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0955e">Polyrepo</text>

  <!-- Dividers -->
  <line x1="40" y1="108" x2="840" y2="108" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="440" y1="95" x2="440" y2="390" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Row: 원자적 변경 -->
  <text x="50" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">원자적 변경</text>
  <text x="270" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">단일 커밋으로 크로스 서비스 변경</text>
  <text x="650" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">복수 PR 필요</text>
  <line x1="40" y1="147" x2="840" y2="147" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Row: 빌드 시간 -->
  <text x="50" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">빌드 시간</text>
  <text x="270" y="173" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e0955e">전체 빌드 느림 (캐시 필수)</text>
  <text x="650" y="173" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">서비스별 독립 빌드 빠름</text>
  <line x1="40" y1="186" x2="840" y2="186" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Row: 코드 재사용 -->
  <text x="50" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">코드 재사용</text>
  <text x="270" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">직접 import 가능</text>
  <text x="650" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e0955e">패키지 publish 필요</text>
  <line x1="40" y1="225" x2="840" y2="225" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Row: 권한 분리 -->
  <text x="50" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">권한 분리</text>
  <text x="270" y="251" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">CODEOWNERS 필요, 전체 코드 노출</text>
  <text x="650" y="251" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">저장소 단위 접근 제어</text>
  <line x1="40" y1="264" x2="840" y2="264" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Row: 의존성 관리 -->
  <text x="50" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">의존성 관리</text>
  <text x="270" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">단일 lock 파일, 버전 일관성</text>
  <text x="650" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e0955e">서비스별 버전 불일치 위험</text>
  <line x1="40" y1="303" x2="840" y2="303" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Row: 클론 크기 -->
  <text x="50" y="329" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">클론 크기</text>
  <text x="270" y="329" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">대형 — sparse-checkout 권장</text>
  <text x="650" y="329" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">서비스별 소규모</text>
  <line x1="40" y1="342" x2="840" y2="342" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Row: 대표 사례 -->
  <text x="50" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">대표 사례</text>
  <text x="270" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Google, Meta, Microsoft</text>
  <text x="650" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Netflix, Shopify 초기</text>

  <!-- Footer -->
  <text x="440" y="405" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">선택 기준: 팀 간 의존성이 높으면 Monorepo, 팀 독립성이 중요하면 Polyrepo</text>
</svg>
