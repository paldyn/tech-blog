<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 560" style="background:#0a0a0a;border-radius:12px">
  <!-- Header -->
  <rect x="0" y="0" width="880" height="72" rx="12" fill="#0d1a2a"/>
  <rect x="0" y="60" width="880" height="12" fill="#0d1a2a"/>
  <text x="60" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#ffffff">머신러닝 학습 패러다임 완전 지도</text>
  <text x="60" y="62" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">레이블 유무와 학습 방식에 따른 4가지 분류</text>
  <line x1="60" y1="82" x2="820" y2="82" stroke="#1e2433" stroke-width="1"/>

  <!-- Supervised Learning -->
  <rect x="60" y="100" width="370" height="190" rx="8" fill="#0d1520" stroke="#55c555" stroke-width="2"/>
  <text x="245" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">지도 학습 (Supervised)</text>
  <text x="80" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">입력(X)과 정답 레이블(y) 쌍으로 학습</text>
  <text x="80" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">목표: f(X) ≈ y 인 함수 학습</text>
  <line x1="80" y1="178" x2="410" y2="178" stroke="#1e2433" stroke-width="1"/>
  <text x="80" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">분류 (Classification)</text>
  <text x="250" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">이미지 분류, 스팸 필터, 감성 분석</text>
  <text x="80" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">회귀 (Regression)</text>
  <text x="250" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">집값 예측, 기온 예측, 주가 예측</text>
  <text x="80" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">대표 알고리즘</text>
  <text x="250" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">선형회귀, 로지스틱회귀, SVM, RF</text>
  <text x="80" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">딥러닝 연결</text>
  <text x="250" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">CNN, Transformer (분류/회귀 헤드)</text>
  <text x="80" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">⚠ 레이블링 비용이 높음 (사람이 직접 태깅)</text>

  <!-- Unsupervised Learning -->
  <rect x="460" y="100" width="360" height="190" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="640" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">비지도 학습 (Unsupervised)</text>
  <text x="480" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">레이블 없이 데이터의 구조·패턴 발견</text>
  <text x="480" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">목표: P(X)의 구조 이해</text>
  <line x1="480" y1="178" x2="800" y2="178" stroke="#1e2433" stroke-width="1"/>
  <text x="480" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">군집화 (Clustering)</text>
  <text x="620" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">K-means, DBSCAN, 계층 군집</text>
  <text x="480" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">차원 축소</text>
  <text x="620" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">PCA, t-SNE, UMAP, 오토인코더</text>
  <text x="480" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">밀도 추정</text>
  <text x="620" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">GMM, KDE, 이상 탐지</text>
  <text x="480" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">생성 모델</text>
  <text x="620" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">GAN, VAE, Diffusion</text>
  <text x="480" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">✓ 레이블 불필요 → 대규모 데이터 활용 가능</text>

  <!-- Semi-supervised -->
  <rect x="60" y="308" width="370" height="140" rx="8" fill="#0d1520" stroke="#ce9178" stroke-width="1.5"/>
  <text x="245" y="332" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#ce9178">반지도 학습 (Semi-supervised)</text>
  <text x="80" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">소수 레이블 + 다수 무레이블 데이터 활용</text>
  <text x="80" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Pseudo-Labeling: 모델 예측으로 레이블 생성</text>
  <text x="80" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Consistency Training: 증강 전후 일관성 유지</text>
  <text x="80" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ce9178">실용적: 의료 영상, 법률 문서 분류 등 레이블 희귀 도메인</text>
  <text x="80" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">대표: FixMatch, MixMatch, UDA</text>

  <!-- Self-supervised -->
  <rect x="460" y="308" width="360" height="140" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="332" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">자기지도 학습 (Self-supervised)</text>
  <text x="480" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">데이터 자체에서 지도 신호를 만들어 학습</text>
  <text x="480" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">마스킹: BERT (토큰 가리기→맞추기)</text>
  <text x="480" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">다음 예측: GPT (다음 토큰 예측)</text>
  <text x="480" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">대조 학습: CLIP (이미지-텍스트 매칭)</text>
  <text x="480" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">LLM 사전학습의 핵심 패러다임</text>

  <!-- Bottom note -->
  <rect x="60" y="464" width="760" height="50" rx="8" fill="#0d1520" stroke="#1e2433"/>
  <text x="440" y="486" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">현대 AI: 자기지도 학습(사전학습) → 지도 학습(파인튜닝) → RLHF(인간 선호) 순서로 구축</text>
  <text x="440" y="504" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">GPT-4·Claude·Gemini 모두 이 세 단계를 거침</text>

  <!-- Footer -->
  <text x="440" y="548" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈</text>
</svg>
