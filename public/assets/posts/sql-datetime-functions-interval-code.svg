<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">날짜 함수 실전 패턴</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">월별 집계 · D-day · 기간 유효성 · 나이 계산</text>

  <!-- Code block -->
  <rect x="60" y="88" width="760" height="228" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="76" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#9aa4b8">-- 월별 집계: DATE_TRUNC 사용</tspan></text>
  <text x="76" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">GROUP BY DATE_TRUNC</tspan>(<tspan fill="#ce9178">'month'</tspan>, order_date)</text>
  <text x="76" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#9aa4b8">-- D-day: 오늘로부터 며칠 남았나</tspan></text>
  <text x="76" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">deadline - <tspan fill="#7ec8e3">CURRENT_DATE</tspan> <tspan fill="#7ec8e3">AS</tspan> days_left</text>
  <text x="76" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#9aa4b8">-- 최근 30일 데이터 필터</tspan></text>
  <text x="76" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">WHERE</tspan> created_at &gt;= <tspan fill="#7ec8e3">NOW</tspan>() - <tspan fill="#7ec8e3">INTERVAL</tspan> <tspan fill="#ce9178">'30 days'</tspan></text>
  <text x="76" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#9aa4b8">-- 나이 계산 (PostgreSQL)</tspan></text>
  <text x="76" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#55c555">EXTRACT</tspan>(<tspan fill="#7ec8e3">YEAR FROM AGE</tspan>(birth_date))</text>
  <text x="76" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#9aa4b8">-- 요일별 집계 (0=일, 6=토)</tspan></text>
  <text x="76" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#55c555">EXTRACT</tspan>(<tspan fill="#7ec8e3">DOW FROM</tspan> order_date) <tspan fill="#7ec8e3">AS</tspan> dow</text>
  <text x="76" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#9aa4b8">-- 해당 달 마지막 날</tspan></text>
  <text x="76" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#55c555">DATE_TRUNC</tspan>(<tspan fill="#ce9178">'month'</tspan>,d) + <tspan fill="#7ec8e3">INTERVAL</tspan> <tspan fill="#ce9178">'1 month'</tspan>-<tspan fill="#b5cea8">1</tspan></text>

  <!-- Note -->
  <text x="440" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#666">PostgreSQL: date - date = 정수(일 수) / timestamp - timestamp = interval</text>
</svg>
