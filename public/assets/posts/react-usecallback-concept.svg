<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">useCallback — 함수 메모이제이션</text>

  <!-- Left column: without useCallback -->
  <text x="210" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">useCallback 없음</text>

  <rect x="60" y="86" width="300" height="54" rx="8" fill="#1a1a1a" stroke="#555"/>
  <text x="210" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">부모 리렌더</text>
  <text x="210" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">count: 0 → 1</text>

  <line x1="210" y1="140" x2="210" y2="164" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>

  <rect x="60" y="166" width="300" height="54" rx="8" fill="#200a0a" stroke="#e05555"/>
  <text x="210" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle" font-weight="600">새 함수 객체 생성</text>
  <text x="210" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">handleClick !== 이전 handleClick</text>

  <line x1="210" y1="220" x2="210" y2="244" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>

  <rect x="60" y="246" width="300" height="54" rx="8" fill="#200a0a" stroke="#e05555"/>
  <text x="210" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle" font-weight="600">React.memo 자식도 리렌더</text>
  <text x="210" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">prop 레퍼런스가 달라짐</text>

  <!-- Divider -->
  <line x1="440" y1="70" x2="440" y2="316" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Right column: with useCallback -->
  <text x="670" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">useCallback 사용</text>

  <rect x="520" y="86" width="300" height="54" rx="8" fill="#1a1a1a" stroke="#555"/>
  <text x="670" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">부모 리렌더</text>
  <text x="670" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">count: 0 → 1</text>

  <line x1="670" y1="140" x2="670" y2="164" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="520" y="166" width="300" height="54" rx="8" fill="#0a1a20" stroke="#7ec8e3"/>
  <text x="670" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle" font-weight="600">의존성 배열 비교</text>
  <text x="670" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">deps 변경 없음 → 캐시 반환</text>

  <line x1="670" y1="220" x2="670" y2="244" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <rect x="520" y="246" width="300" height="54" rx="8" fill="#0a200a" stroke="#55c555"/>
  <text x="670" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle" font-weight="600">동일 함수 레퍼런스 유지</text>
  <text x="670" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">자식 리렌더 생략</text>

  <!-- Code section -->
  <rect x="60" y="330" width="760" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#9aa4b8">// deps 빈 배열: 컴포넌트 생명 동안 동일 함수 유지</tspan></text>
  <text x="76" y="371" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> handleSubmit = </tspan><tspan fill="#7ec8e3" font-weight="600">useCallback</tspan><tspan fill="#ffffff">((e) =&gt; {</tspan></text>
  <text x="76" y="390" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">  e.preventDefault();</tspan></text>
  <text x="76" y="409" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">onSubmit</tspan><tspan fill="#ffffff">(formData);</tspan></text>
  <text x="76" y="428" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">}, [formData, onSubmit]);</tspan></text>
</svg>
