  <text x="60" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888" xml:space="preserve">동일 코드베이스 기준 상대 빌드 시간 (낮을수록 빠름)</text>

  <!-- Babel bar -->
