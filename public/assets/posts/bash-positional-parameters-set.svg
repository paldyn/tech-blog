<svg width="880" height="360" viewBox="0 0 880 380" xmlns="http://www.w3.org/2000/svg" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">set -- 로 위치 매개변수 재설정</text>

  <rect x="60" y="64" width="760" height="290" rx="8" fill="#111827" stroke="#334155" stroke-width="1"/>

  <rect x="76" y="80" width="728" height="260" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="100" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># set -- 로 위치 매개변수 직접 설정</text>
  <text x="92" y="118" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">set</tspan><tspan fill="#ffffff"> -- </tspan><tspan fill="#ce9178">"alpha"</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"beta"</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"gamma"</tspan></text>
  <text x="92" y="136" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> $1 $2 $3</tspan><tspan fill="#9aa4b8">  # alpha beta gamma</tspan></text>
  <text x="92" y="154" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"> </text>
  <text x="92" y="172" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># IFS 분리 결과를 위치 매개변수로</text>
  <text x="92" y="190" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">DATE=$(date </tspan><tspan fill="#ce9178">"+%Y-%m-%d"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="92" y="208" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">IFS=</tspan><tspan fill="#ce9178">'-'</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">read</tspan><tspan fill="#ffffff"> -r year month day &lt;&lt;&lt; </tspan><tspan fill="#ce9178">"$DATE"</tspan></text>
  <text x="92" y="226" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"년=$year 월=$month 일=$day"</tspan></text>
  <text x="92" y="244" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"> </text>
  <text x="92" y="262" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># 인자 유효성 검사 패턴</text>
  <text x="92" y="280" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">main() {</tspan></text>
  <text x="92" y="298" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">    [[ $# -lt </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff"> ]] &amp;&amp; { </tspan><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"사용법: $0 &lt;이름&gt;"</tspan><tspan fill="#ffffff">; </tspan><tspan fill="#7ec8e3" font-weight="600">exit</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">; }</tspan></text>
  <text x="92" y="316" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"안녕하세요, $1"</tspan></text>
  <text x="92" y="334" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">}</tspan></text>
</svg>
