<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-a" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">JUnit 5 아키텍처 &amp; AssertJ 체인</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">Jupiter · Vintage · Platform 구조와 유창한 단언(Fluent Assertion)</text>

  <!-- JUnit 5 Platform layer -->
  <rect x="60" y="90" width="760" height="56" rx="8" fill="#141424" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">JUnit Platform</text>
  <text x="440" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">테스트 엔진 실행 인프라 — IDE · Maven · Gradle 연동 공통 런처</text>

  <!-- Jupiter -->
  <rect x="80" y="174" width="220" height="80" rx="6" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="190" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">JUnit Jupiter</text>
  <text x="190" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">JUnit 5 새 프로그래밍 모델</text>
  <text x="190" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">@Test · @BeforeEach · Extensions</text>

  <!-- Vintage -->
  <rect x="330" y="174" width="220" height="80" rx="6" fill="#1a1a2a" stroke="#e09555" stroke-width="1.5"/>
  <text x="440" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e09555" text-anchor="middle">JUnit Vintage</text>
  <text x="440" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">JUnit 3/4 하위 호환</text>
  <text x="440" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">레거시 테스트 공존</text>

  <!-- Third-party -->
  <rect x="580" y="174" width="220" height="80" rx="6" fill="#1a1a2a" stroke="#55c555" stroke-width="1.5"/>
  <text x="690" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">서드파티 엔진</text>
  <text x="690" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Spock · Cucumber</text>
  <text x="690" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">TestNG 등 플러그인</text>

  <!-- Arrows Platform -> engines -->
  <line x1="190" y1="146" x2="190" y2="174" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr-a)"/>
  <line x1="440" y1="146" x2="440" y2="174" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr-a)"/>
  <line x1="690" y1="146" x2="690" y2="174" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr-a)"/>

  <!-- JUnit 5 annotations section -->
  <text x="60" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8">JUnit 5 주요 애노테이션</text>

  <!-- Annotation grid -->
  <rect x="60" y="310" width="360" height="174" rx="6" fill="#111111" stroke="#333" stroke-width="1"/>

  <rect x="76" y="322" width="140" height="34" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="146" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">@Test</text>
  <text x="146" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">테스트 메서드</text>

  <rect x="234" y="322" width="170" height="34" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="319" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">@ParameterizedTest</text>
  <text x="319" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">파라미터 반복 테스트</text>

  <rect x="76" y="368" width="140" height="34" rx="4" fill="#1a2a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="146" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">@BeforeEach</text>
  <text x="146" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">각 테스트 전</text>

  <rect x="234" y="368" width="170" height="34" rx="4" fill="#1a2a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="319" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">@AfterEach</text>
  <text x="319" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">각 테스트 후</text>

  <rect x="76" y="414" width="140" height="34" rx="4" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="146" y="430" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc" text-anchor="middle">@BeforeAll</text>
  <text x="146" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">클래스 전체 한 번</text>

  <rect x="234" y="414" width="170" height="34" rx="4" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="319" y="430" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc" text-anchor="middle">@Nested</text>
  <text x="319" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">중첩 테스트 클래스</text>

  <rect x="76" y="460" width="140" height="34" rx="4" fill="#1a1515" stroke="#e05555" stroke-width="1"/>
  <text x="146" y="476" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" text-anchor="middle">@Disabled</text>
  <text x="146" y="488" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">테스트 비활성화</text>

  <rect x="234" y="460" width="170" height="34" rx="4" fill="#1a1515" stroke="#e09555" stroke-width="1"/>
  <text x="319" y="476" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e09555" text-anchor="middle">@ExtendWith</text>
  <text x="319" y="488" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">Extension 등록</text>

  <!-- AssertJ chain section -->
  <text x="450" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8">AssertJ 체이닝 구조</text>

  <rect x="450" y="310" width="370" height="174" rx="6" fill="#111111" stroke="#333" stroke-width="1"/>

  <!-- Chain items -->
  <rect x="466" y="322" width="338" height="28" rx="4" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="635" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc" text-anchor="middle">assertThat(actual)</text>

  <text x="635" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" fill="#555" text-anchor="middle">↓ 체이닝</text>

  <rect x="466" y="372" width="338" height="28" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="635" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">.isEqualTo(expected)</text>

  <rect x="466" y="406" width="338" height="28" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="635" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">.isNotNull().hasSize(3)</text>

  <rect x="466" y="440" width="338" height="28" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="635" y="458" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">.contains("A").doesNotContain("X")</text>

  <rect x="466" y="474" width="338" height="28" rx="4" fill="#1a1515" stroke="#e05555" stroke-width="1"/>
  <text x="635" y="492" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" text-anchor="middle">.satisfies(o -&gt; assertThat(o.id).isPositive())</text>
</svg>
