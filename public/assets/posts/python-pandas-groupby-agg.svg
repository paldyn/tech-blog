<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">하나의 함수 vs 여러 집계</text>

  <text x="60" y="92" font-size="16" font-weight="600" fill="#e8e8e8">단일 집계</text>
  <rect x="60" y="108" width="360" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="78" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(df.groupby(<tspan fill="#ce9178">"city"</tspan>)</text>
  <text xml:space="preserve" x="78" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">   [<tspan fill="#ce9178">"sales"</tspan>]</text>
  <text xml:space="preserve" x="78" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">   .mean())</text>
  <text xml:space="preserve" x="78" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 도시별 평균 매출</text>

  <text x="480" y="92" font-size="16" font-weight="600" fill="#e8e8e8">여러 집계 동시에</text>
  <rect x="480" y="108" width="360" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="498" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(df.groupby(<tspan fill="#ce9178">"city"</tspan>)</text>
  <text xml:space="preserve" x="498" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">   .agg(</text>
  <text xml:space="preserve" x="498" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">     total=(<tspan fill="#ce9178">"sales"</tspan>, <tspan fill="#ce9178">"sum"</tspan>),</text>
  <text xml:space="preserve" x="498" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">     n=(<tspan fill="#ce9178">"sales"</tspan>, <tspan fill="#ce9178">"count"</tspan>)))</text>

  <rect x="60" y="252" width="780" height="34" rx="4" fill="#0f1320" stroke="#3a4a6e" stroke-width="1"/>
  <text x="450" y="274" font-size="13" fill="#7ec8e3" text-anchor="middle">.agg(name=(컬럼, 함수)) 형태로 결과 컬럼 이름까지 한 번에 지정한다</text>
</svg>
