<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="13" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">멀티 컨테이너 파드 패턴</text>

  <!-- Pattern 1: Sidecar -->
  <rect x="60" y="68" width="240" height="380" rx="8" fill="#0a0a0a" stroke="#7ec8e3" stroke-width="1.5"/>
  <rect x="60" y="68" width="240" height="36" rx="8" fill="#0d1f2d"/>
  <text x="180" y="90" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">Sidecar 패턴</text>

  <!-- Pod boundary -->
  <rect x="80" y="120" width="200" height="180" rx="6" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
  <text x="180" y="138" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">Pod</text>

  <rect x="96" y="148" width="168" height="44" rx="4" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1"/>
  <text x="180" y="174" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">Main Container</text>

  <line x1="180" y1="192" x2="180" y2="210" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="96" y="210" width="168" height="44" rx="4" fill="#1e1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="180" y="230" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">Sidecar</text>
  <text x="180" y="244" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">로그 수집 / 프록시</text>

  <text x="180" y="330" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">메인 컨테이너를</text>
  <text x="180" y="348" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">보조하는 사이드카</text>
  <text x="180" y="380" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">예: Envoy, Fluentd</text>

  <!-- Pattern 2: Ambassador -->
  <rect x="320" y="68" width="240" height="380" rx="8" fill="#0a0a0a" stroke="#55c555" stroke-width="1.5"/>
  <rect x="320" y="68" width="240" height="36" rx="8" fill="#0d2d0d"/>
  <text x="440" y="90" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">Ambassador 패턴</text>

  <rect x="340" y="120" width="200" height="180" rx="6" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
  <text x="440" y="138" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">Pod</text>

  <rect x="356" y="148" width="168" height="44" rx="4" fill="#0d2d0d" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="174" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">Main Container</text>

  <line x1="440" y1="192" x2="400" y2="210" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="356" y="210" width="168" height="44" rx="4" fill="#0d2d0d" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="230" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">Ambassador</text>
  <text x="440" y="244" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">외부 통신 대리</text>

  <text x="440" y="330" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">외부 서비스 접근을</text>
  <text x="440" y="348" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">프록시로 단순화</text>
  <text x="440" y="380" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">예: DB 연결 풀링</text>

  <!-- Pattern 3: Adapter -->
  <rect x="580" y="68" width="240" height="380" rx="8" fill="#0a0a0a" stroke="#ce9178" stroke-width="1.5"/>
  <rect x="580" y="68" width="240" height="36" rx="8" fill="#2d1a0a"/>
  <text x="700" y="90" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#ce9178">Adapter 패턴</text>

  <rect x="600" y="120" width="200" height="180" rx="6" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
  <text x="700" y="138" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">Pod</text>

  <rect x="616" y="148" width="168" height="44" rx="4" fill="#2d1a0a" stroke="#ce9178" stroke-width="1"/>
  <text x="700" y="174" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ce9178">Main Container</text>

  <line x1="700" y1="192" x2="700" y2="210" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="616" y="210" width="168" height="44" rx="4" fill="#2d1a0a" stroke="#ce9178" stroke-width="1"/>
  <text x="700" y="230" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ce9178">Adapter</text>
  <text x="700" y="244" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">출력 형식 변환</text>

  <text x="700" y="330" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">앱 출력을 표준 형식으로</text>
  <text x="700" y="348" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">변환 (모니터링 통합)</text>
  <text x="700" y="380" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178">예: Prometheus 익스포터</text>

  <!-- Bottom note -->
  <text x="440" y="460" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">같은 파드 내 컨테이너는 localhost로 통신 + 볼륨 공유 가능</text>
</svg>
