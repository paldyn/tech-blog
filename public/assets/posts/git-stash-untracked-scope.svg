  <!-- Default stash column -->
  <rect x="100" y="106" width="120" height="30" rx="4" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓ 포함</text>

  <rect x="100" y="156" width="120" height="30" rx="4" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓ 포함</text>

  <rect x="100" y="206" width="120" height="30" rx="4" fill="#1f0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="160" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
