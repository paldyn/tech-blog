  <rect x="660" y="206" width="120" height="30" rx="4" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓ 포함</text>

  <rect x="660" y="256" width="120" height="30" rx="4" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓ 포함</text>

  <!-- Code row -->
  <rect x="60" y="310" width="760" height="66" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">git stash <tspan fill="#7ec8e3" font-weight="600">push</tspan>                    <tspan fill="#9aa4b8"># staged + modified만</tspan></text>
  <text x="76" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">git stash <tspan fill="#7ec8e3" font-weight="600">push</tspan> <tspan fill="#55c555" font-weight="600">-u</tspan>              <tspan fill="#9aa4b8"># + untracked</tspan></text>
  <text x="76" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">git stash <tspan fill="#7ec8e3" font-weight="600">push</tspan> <tspan fill="#55c555" font-weight="600">-a</tspan>              <tspan fill="#9aa4b8"># + untracked + ignored</tspan></text>
</svg>
