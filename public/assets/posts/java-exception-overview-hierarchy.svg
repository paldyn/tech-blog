<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Java 예외 계층 구조</text>

  <!-- Throwable (root) -->
  <rect x="330" y="62" width="220" height="46" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="81" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Throwable</text>
  <text x="440" y="99" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">java.lang.Throwable</text>

  <!-- Lines from Throwable -->
  <line x1="330" y1="108" x2="200" y2="148" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="550" y1="108" x2="670" y2="148" stroke="#7777cc" stroke-width="1.5"/>

  <!-- Error -->
  <rect x="110" y="148" width="180" height="46" rx="8" fill="#2a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="200" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">Error</text>
  <text x="200" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">복구 불가능한 오류</text>

  <!-- Exception -->
  <rect x="580" y="148" width="180" height="46" rx="8" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="670" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Exception</text>
  <text x="670" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">복구 가능한 예외</text>

  <!-- Error children -->
  <line x1="200" y1="194" x2="110" y2="234" stroke="#e05555" stroke-width="1"/>
  <line x1="200" y1="194" x2="200" y2="234" stroke="#e05555" stroke-width="1"/>
  <line x1="200" y1="194" x2="290" y2="234" stroke="#e05555" stroke-width="1"/>

  <rect x="40" y="234" width="130" height="40" rx="6" fill="#2a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="105" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">OutOfMemory</text>
  <text x="105" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">Error</text>

  <rect x="142" y="234" width="110" height="40" rx="6" fill="#2a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="197" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">StackOverflow</text>
  <text x="197" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">Error</text>

  <rect x="262" y="234" width="100" height="40" rx="6" fill="#2a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="312" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">AssertionError</text>
  <text x="312" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">외</text>

  <!-- Exception children -->
  <line x1="670" y1="194" x2="560" y2="234" stroke="#7ec8e3" stroke-width="1"/>
  <line x1="670" y1="194" x2="780" y2="234" stroke="#7ec8e3" stroke-width="1"/>

  <!-- Checked Exception -->
  <rect x="460" y="234" width="190" height="46" rx="6" fill="#0d1a2a" stroke="#55c555" stroke-width="1.5"/>
  <text x="555" y="253" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Checked Exception</text>
  <text x="555" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">컴파일러가 강제 처리</text>

  <!-- Unchecked (RuntimeException) -->
  <rect x="680" y="234" width="180" height="46" rx="6" fill="#1a1a0d" stroke="#ce9178" stroke-width="1.5"/>
  <text x="770" y="253" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">RuntimeException</text>
  <text x="770" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">선택적 처리 (Unchecked)</text>

  <!-- Checked examples -->
  <text x="400" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">예: IOException, SQLException,</text>
  <text x="400" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">ClassNotFoundException</text>

  <!-- RuntimeException examples -->
  <text x="680" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">예: NullPointerException,</text>
  <text x="680" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">IllegalArgumentException,</text>
  <text x="680" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">IndexOutOfBoundsException</text>

  <!-- Code block -->
  <rect x="60" y="376" width="760" height="120" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 예외 계층 확인</text>
  <text x="76" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">new</tspan><tspan fill="#ffffff"> NullPointerException() </tspan><tspan fill="#7ec8e3" font-weight="600">instanceof</tspan><tspan fill="#ffffff"> RuntimeException;  </tspan><tspan fill="#9aa4b8">// true</tspan></text>
  <text x="76" y="438" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">new</tspan><tspan fill="#ffffff"> IOException()         </tspan><tspan fill="#7ec8e3" font-weight="600">instanceof</tspan><tspan fill="#ffffff"> Exception;         </tspan><tspan fill="#9aa4b8">// true</tspan></text>
  <text x="76" y="458" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">new</tspan><tspan fill="#ffffff"> IOException()         </tspan><tspan fill="#7ec8e3" font-weight="600">instanceof</tspan><tspan fill="#ffffff"> RuntimeException;  </tspan><tspan fill="#9aa4b8">// false</tspan></text>
  <text x="76" y="478" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">new</tspan><tspan fill="#ffffff"> OutOfMemoryError()    </tspan><tspan fill="#7ec8e3" font-weight="600">instanceof</tspan><tspan fill="#ffffff"> Throwable;         </tspan><tspan fill="#9aa4b8">// true</tspan></text>
</svg>
