<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
    <marker id="arrg" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#55c555" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
    <marker id="arrp" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#7777cc" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
  </defs>

  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">JVM 실행 엔진 구성 요소</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">Interpreter · JIT Compiler · Garbage Collector</text>

  <!-- Input: Bytecode -->
  <rect x="60" y="96" width="200" height="68" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">바이트코드 (.class)</text>
  <text x="160" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">클래스 로더가 로드 완료</text>

  <!-- Arrow → Execution Engine -->
  <line x1="260" y1="130" x2="310" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Execution Engine outer box -->
  <rect x="310" y="88" width="510" height="340" rx="10" fill="#0d1117" stroke="#555" stroke-width="1.2"/>
  <text x="565" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e8e8e8" text-anchor="middle">Execution Engine</text>

  <!-- Interpreter -->
  <rect x="330" y="126" width="220" height="120" rx="8" fill="#0b1a0b" stroke="#55c555" stroke-width="1.3"/>
  <text x="440" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">Interpreter</text>
  <text x="440" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">바이트코드를 한 줄씩</text>
  <text x="440" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">네이티브 명령어로 변환</text>
  <text x="440" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">빠른 시작, 반복 실행 시 느림</text>
  <text x="440" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Profiling 데이터 수집</text>

  <!-- JIT Compiler -->
  <rect x="570" y="126" width="230" height="120" rx="8" fill="#101828" stroke="#7ec8e3" stroke-width="1.3"/>
  <text x="685" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">JIT Compiler</text>
  <text x="685" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">Hot Method를 네이티브</text>
  <text x="685" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">코드로 컴파일 후 캐시</text>
  <text x="685" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">C1 (빠른 컴파일)</text>
  <text x="685" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">C2 (최적화 컴파일)</text>

  <!-- Arrow Interpreter ↔ JIT -->
  <line x1="550" y1="174" x2="568" y2="174" stroke="#e8c84a" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="559" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8c84a" text-anchor="middle">Hot?</text>

  <!-- GC -->
  <rect x="330" y="268" width="470" height="120" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.3"/>
  <text x="565" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">Garbage Collector</text>
  <text x="565" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">참조가 끊긴 객체를 자동으로 Heap에서 회수</text>

  <rect x="348" y="326" width="100" height="28" rx="4" fill="#0d1117"/>
  <text x="398" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">G1GC (기본)</text>

  <rect x="460" y="326" width="80" height="28" rx="4" fill="#0d1117"/>
  <text x="500" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">ZGC</text>

  <rect x="552" y="326" width="108" height="28" rx="4" fill="#0d1117"/>
  <text x="606" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">Shenandoah</text>

  <rect x="672" y="326" width="110" height="28" rx="4" fill="#0d1117"/>
  <text x="727" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">SerialGC 등</text>

  <text x="565" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">GC는 Execution Engine의 일부 — 실행과 메모리 관리가 협력</text>

  <!-- Output: Native Code -->
  <rect x="60" y="450" width="200" height="56" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="478" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">네이티브 실행</text>
  <text x="160" y="496" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">CPU에서 직접 수행</text>

  <!-- Arrow Engine → Native -->
  <line x1="310" y1="186" x2="260" y2="478" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrg)" stroke-dasharray="4,3"/>

  <!-- Code Cache -->
  <rect x="60" y="300" width="200" height="80" rx="8" fill="#070b14" stroke="#e8c84a" stroke-width="1.2"/>
  <text x="160" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8c84a" text-anchor="middle">Code Cache</text>
  <text x="160" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">JIT 컴파일 결과 저장</text>
  <text x="160" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">기본 240MB</text>
  <text x="160" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">-XX:ReservedCodeCacheSize</text>

  <!-- Arrow JIT → Code Cache -->
  <line x1="440" y1="300" x2="260" y2="352" stroke="#e8c84a" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4,3"/>
</svg>
