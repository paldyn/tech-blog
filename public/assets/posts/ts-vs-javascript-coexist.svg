<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">JS와 TS의 관계: 슈퍼셋 포함 관계</text>

  <!-- Nested circles visualization -->
  <!-- JS outer circle (ellipse) -->
  <ellipse cx="440" cy="210" rx="340" ry="140" fill="#1a1a0a" stroke="#e8c840" stroke-width="2"/>
  <text x="440" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e8c840" text-anchor="middle">JavaScript</text>
  <text x="440" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">모든 유효한 JS 코드</text>

  <!-- TS inner ellipse -->
  <ellipse cx="440" cy="210" rx="220" ry="90" fill="#0a1a2a" stroke="#3178c6" stroke-width="2"/>
  <text x="440" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">TypeScript</text>
  <text x="440" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">JS + 타입 문법</text>
  <text x="440" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">interface · type · generic</text>
  <text x="440" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">enum · decorator · namespace</text>

  <!-- JS-only zone labels -->
  <text x="140" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8c840" text-anchor="middle">JS 전용</text>
  <text x="140" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(TS 불가)</text>

  <text x="740" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8c840" text-anchor="middle">JS 전용</text>
  <text x="740" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(TS 불가)</text>

  <!-- Bottom info boxes -->
  <rect x="60" y="308" width="360" height="52" rx="6" fill="#0f1f0f" stroke="#55c555" stroke-width="1"/>
  <text x="240" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">유효한 JS = 유효한 TS</text>
  <text x="240" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">점진적 마이그레이션 가능 · 기존 JS 라이브러리 사용 가능</text>

  <rect x="460" y="308" width="360" height="52" rx="6" fill="#1f1a0a" stroke="#e8c840" stroke-width="1"/>
  <text x="640" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8c840" text-anchor="middle">유효한 TS ≠ 항상 유효한 JS</text>
  <text x="640" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">타입 문법은 JS에 없음 → 컴파일 단계 필요</text>
</svg>
