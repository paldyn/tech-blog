<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">대리 키 전략 비교 — INT vs UUID vs ULID</text>

  <!-- Header -->
  <rect x="60" y="68" width="760" height="32" fill="#162030"/>
  <text x="160" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">전략</text>
  <text x="340" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">특징</text>
  <text x="560" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">장점</text>
  <text x="720" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">단점</text>
  <line x1="240" y1="68" x2="240" y2="280" stroke="#3a4a6e" stroke-width="0.5"/>
  <line x1="440" y1="68" x2="440" y2="280" stroke="#3a4a6e" stroke-width="0.5"/>
  <line x1="660" y1="68" x2="660" y2="280" stroke="#3a4a6e" stroke-width="0.5"/>

  <!-- BIGINT -->
  <rect x="60" y="100" width="760" height="48" fill="#0e1520"/>
  <text x="160" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">BIGINT</text>
  <text x="160" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">AUTO_INCREMENT / IDENTITY</text>
  <text x="340" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">8 bytes, 순차 증가</text>
  <text x="340" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">단일 DB 기준</text>
  <text x="560" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">가장 빠른 JOIN/인덱스</text>
  <text x="560" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">저장 공간 최소</text>
  <text x="720" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">분산 환경 충돌</text>
  <text x="720" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">순번 노출</text>

  <!-- UUID v4 -->
  <rect x="60" y="148" width="760" height="48" fill="#0a1018"/>
  <text x="160" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">UUID v4</text>
  <text x="160" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">랜덤 128bit</text>
  <text x="340" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">16 bytes, 완전 랜덤</text>
  <text x="340" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">분산 시스템 안전</text>
  <text x="560" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">전역 유일성</text>
  <text x="560" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">외부 노출 안전</text>
  <text x="720" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">랜덤 → B-Tree 단편화</text>
  <text x="720" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">페이지 분할 증가</text>

  <!-- UUID v7 / ULID -->
  <rect x="60" y="196" width="760" height="48" fill="#0e1520"/>
  <text x="160" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8a020" text-anchor="middle">UUID v7 / ULID</text>
  <text x="160" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">시간 정렬형</text>
  <text x="340" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">앞 48비트 = 타임스탬프</text>
  <text x="340" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">시간순 정렬 가능</text>
  <text x="560" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">분산 + 정렬 가능</text>
  <text x="560" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">B-Tree 단편화 적음</text>
  <text x="720" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">BIGINT보다 느림</text>
  <text x="720" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">일부 DB 미지원</text>

  <!-- Snowflake -->
  <rect x="60" y="244" width="760" height="36" fill="#0a1018"/>
  <text x="160" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Snowflake ID</text>
  <text x="340" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">64bit: 타임스탬프+노드+시퀀스</text>
  <text x="560" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">분산 + BIGINT 수준 성능</text>
  <text x="720" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">생성 인프라 필요</text>

  <!-- Recommendation box -->
  <rect x="60" y="298" width="760" height="116" fill="#0d1a0d" rx="8" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">선택 가이드</text>
  <text x="440" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">단일 DB, 내부 시스템 → BIGINT (가장 성능 좋음)</text>
  <text x="440" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">외부 노출 API, UUID 필요 → UUID v7 또는 ULID (정렬 가능한 UUID)</text>
  <text x="440" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">대용량 분산 시스템 → Snowflake ID 또는 Twitter Flake 방식</text>
  <text x="440" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">UUID v4는 B-Tree 인덱스 단편화 문제로 MySQL InnoDB 클러스터드 인덱스에서 성능 저하</text>
</svg>