<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">PK 생성 전략 비교</text>

  <!-- Header -->
  <rect x="60" y="65" width="760" height="34" rx="4" fill="#131320" stroke="#3a4a6e" stroke-width="1"/>
  <text x="150" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">전략</text>
  <text x="310" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">예시</text>
  <text x="490" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">장점</text>
  <text x="690" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">단점 / 주의</text>

  <rect x="60" y="99" width="760" height="34" rx="0" fill="#0e0e18" stroke="#1a1a2a" stroke-width="1"/>
  <text x="150" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle" font-weight="600">BIGINT 순번</text>
  <text x="310" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">1, 2, 3...</text>
  <text x="490" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">작고 빠름, 조인 최적</text>
  <text x="690" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">예측 가능, 단일 노드 한계</text>

  <rect x="60" y="133" width="760" height="34" rx="0" fill="#0a0a12" stroke="#1a1a2a" stroke-width="1"/>
  <text x="150" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle" font-weight="600">UUID v4</text>
  <text x="310" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">550e8400-e29b...</text>
  <text x="490" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">전역 유일, 분산 생성</text>
  <text x="690" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">랜덤 → 인덱스 단편화</text>

  <rect x="60" y="167" width="760" height="34" rx="0" fill="#0e0e18" stroke="#1a1a2a" stroke-width="1"/>
  <text x="150" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle" font-weight="600">UUID v7</text>
  <text x="310" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">시간+랜덤 (정렬 가능)</text>
  <text x="490" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">정렬 가능 + 전역 유일</text>
  <text x="690" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">BIGINT보다 큼 (16B)</text>

  <rect x="60" y="201" width="760" height="34" rx="0" fill="#0a0a12" stroke="#1a1a2a" stroke-width="1"/>
  <text x="150" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle" font-weight="600">ULID</text>
  <text x="310" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">01ARZ3NDEKTS...</text>
  <text x="490" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">정렬 가능 + 사람이 읽기 쉬움</text>
  <text x="690" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">VARCHAR(26), 표준 아님</text>

  <rect x="60" y="235" width="760" height="34" rx="0" fill="#0e0e18" stroke="#1a1a2a" stroke-width="1"/>
  <text x="150" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle" font-weight="600">Snowflake ID</text>
  <text x="310" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">64bit: 시간+노드+순번</text>
  <text x="490" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">분산+정렬+BIGINT 크기</text>
  <text x="690" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">ID 생성 서버 필요</text>

  <!-- Code box -->
  <rect x="60" y="285" width="760" height="96" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="305" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- PostgreSQL: UUID v4 vs UUID v7 (pg_uuidv7 확장)</text>
  <text x="80" y="325" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">id</text>
  <text x="100" y="325" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600"> UUID</text>
  <text x="152" y="325" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600"> PRIMARY KEY DEFAULT</text>
  <text x="380" y="325" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> gen_random_uuid(),   </text>
  <text x="590" y="325" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- v4 랜덤</text>
  <text x="80" y="345" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">id</text>
  <text x="100" y="345" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600"> UUID</text>
  <text x="152" y="345" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600"> PRIMARY KEY DEFAULT</text>
  <text x="380" y="345" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> uuidv7(),            </text>
  <text x="502" y="345" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- v7 정렬 가능 (권장)</text>
  <text x="80" y="365" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">id</text>
  <text x="100" y="365" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600"> BIGINT</text>
  <text x="160" y="365" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600"> GENERATED ALWAYS AS IDENTITY PRIMARY KEY  </text>
  <text x="648" y="365" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- 순번</text>
</svg>
