<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">GPT 추론 — 자기 회귀 생성과 In-Context Learning</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">파인튜닝 없이 프롬프트만으로 태스크 적응</text>

  <!-- Code block: generation -->
  <rect x="50" y="90" width="400" height="280" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="66" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># GPT 텍스트 생성 (HuggingFace)</text>
  <text x="66" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">from </tspan><tspan fill="#e8e8e8">transformers </tspan><tspan fill="#7ec8e3">import </tspan><tspan fill="#e8e8e8">pipeline</tspan></text>

  <text x="66" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">gen = pipeline(</text>
  <text x="66" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">    'text-generation'</text>
  <text x="66" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">               </text>
  <text x="66" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    model=</tspan><tspan fill="#ce9178">'gpt2'</tspan><tspan fill="#e8e8e8">,</tspan></text>

  <text x="66" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    device=</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#e8e8e8">)</tspan></text>

  <text x="66" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">result = gen(</text>
  <text x="66" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">    "AI의 미래는"</text>
  <text x="66" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    max_new_tokens=</text>
  <text x="204" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">100</text>
  <text x="228" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">,</text>
  <text x="66" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    temperature=</tspan><tspan fill="#b5cea8">0.8</tspan><tspan fill="#e8e8e8">,</tspan></text>

  <text x="66" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    do_sample=</tspan><tspan fill="#b5cea8">True</tspan><tspan fill="#e8e8e8">,</tspan></text>

  <text x="66" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    top_p=</tspan><tspan fill="#b5cea8">0.9</tspan><tspan fill="#e8e8e8">,</tspan></text>

  <text x="66" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    repetition_penalty=</tspan><tspan fill="#b5cea8">1.2</tspan><tspan fill="#e8e8e8">,</tspan></text>

  <text x="66" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">)</text>

  <!-- In-Context Learning panel -->
  <rect x="470" y="90" width="360" height="280" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="650" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">In-Context Learning (ICL)</text>

  <!-- Zero-shot -->
  <text x="486" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">Zero-shot</text>
  <rect x="486" y="146" width="328" height="36" fill="#0d1117" rx="4"/>
  <text x="650" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" text-anchor="middle">"다음 문장을 한국어로 번역하라:</text>
  <text x="650" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" text-anchor="middle">I love AI →"</text>

  <!-- One-shot -->
  <text x="486" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#ce9178">One-shot</text>
  <rect x="486" y="208" width="328" height="54" fill="#0d1117" rx="4"/>
  <text x="650" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">EN: "Hello" → KO: "안녕"</text>
  <text x="650" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" text-anchor="middle">EN: "I love AI" → KO:</text>
  <text x="650" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">[모델이 완성]</text>

  <!-- Few-shot -->
  <text x="486" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">Few-shot</text>
  <rect x="486" y="286" width="328" height="36" fill="#0d1117" rx="4"/>
  <text x="650" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">여러 예제 포함 → 더 높은 정확도</text>
  <text x="650" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#555" text-anchor="middle">그래디언트 업데이트 없이 적응</text>

  <!-- BERT vs GPT table -->
  <rect x="50" y="386" width="780" height="8" fill="#0a0a0a" rx="0"/>

  <!-- Footer note merged into bottom -->
  <rect x="50" y="380" width="780" height="14" fill="#111827" rx="3"/>
  <text x="440" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">BERT: 이해(분류/추출) 특화 — Encoder-only | GPT: 생성 특화 — Decoder-only, Causal Mask</text>
</svg>
