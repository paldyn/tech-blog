<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430">
  <defs>
    <marker id="ts-arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="430" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">계층으로 좁히기 — 어디가 깨졌는가</text>

  <!-- layers -->
  <rect x="120" y="84" width="640" height="46" rx="8" fill="#1a3a4a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="144" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">클러스터 / 컨트롤 플레인</text>
  <text x="470" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">API 서버 응답? 컴포넌트 정상? get componentstatuses</text>

  <rect x="160" y="142" width="560" height="46" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="184" y="171" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">노드</text>
  <text x="470" y="171" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Ready? 자원 압박? get nodes / describe node</text>

  <rect x="200" y="200" width="480" height="46" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="224" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">워크로드 (Deployment 등)</text>
  <text x="470" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">원하는 수만큼 떴나? rollout status</text>

  <rect x="240" y="258" width="400" height="46" rx="8" fill="#201a10" stroke="#ce9178" stroke-width="1.5"/>
  <text x="264" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">Pod</text>
  <text x="470" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">상태·이벤트·재시작 횟수</text>

  <rect x="280" y="316" width="320" height="46" rx="8" fill="#2a1416" stroke="#e05555" stroke-width="1.5"/>
  <text x="304" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">컨테이너 / 네트워크</text>
  <text x="470" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">로그·exec·DNS</text>

  <line x1="440" y1="130" x2="440" y2="142" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ts-arr)"/>
  <line x1="440" y1="188" x2="440" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ts-arr)"/>
  <line x1="440" y1="246" x2="440" y2="258" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ts-arr)"/>
  <line x1="440" y1="304" x2="440" y2="316" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ts-arr)"/>

  <text x="440" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">위에서 아래로 범위를 좁힌다 — 노드가 죽었으면 Pod 로그를 백날 봐도 소용없다</text>
</svg>
