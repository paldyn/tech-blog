<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 540">
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">HTTP 메서드 9종 개요</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">RFC 7231 정의 — 각 메서드의 의미와 용도</text>

  <!-- GET -->
  <rect x="60" y="90" width="360" height="56" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" font-weight="600" fill="#55c555">GET</text>
  <text x="150" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">리소스 조회 · 본문 없음 · 캐시 가능</text>
  <text x="80" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">안전 O · 멱등 O · 캐시 O</text>

  <!-- POST -->
  <rect x="60" y="158" width="360" height="56" rx="6" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="80" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" font-weight="600" fill="#e05555">POST</text>
  <text x="160" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">리소스 생성·처리 · 본문 사용</text>
  <text x="80" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">안전 X · 멱등 X · 캐시 △</text>

  <!-- PUT -->
  <rect x="60" y="226" width="360" height="56" rx="6" fill="#0f0f1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="80" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" font-weight="600" fill="#7777cc">PUT</text>
  <text x="148" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">리소스 완전 대체 · 없으면 생성</text>
  <text x="80" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">안전 X · 멱등 O · 캐시 X</text>

  <!-- PATCH -->
  <rect x="60" y="294" width="360" height="56" rx="6" fill="#0f0f1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" font-weight="600" fill="#7ec8e3">PATCH</text>
  <text x="168" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">리소스 부분 수정</text>
  <text x="80" y="337" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">안전 X · 멱등 △ · 캐시 X</text>

  <!-- DELETE -->
  <rect x="60" y="362" width="360" height="56" rx="6" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="80" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" font-weight="600" fill="#e05555">DELETE</text>
  <text x="186" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">리소스 삭제</text>
  <text x="80" y="405" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">안전 X · 멱등 O · 캐시 X</text>

  <!-- HEAD -->
  <rect x="460" y="90" width="360" height="56" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="480" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" font-weight="600" fill="#55c555">HEAD</text>
  <text x="556" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">헤더만 요청 · 본문 없는 GET</text>
  <text x="480" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">안전 O · 멱등 O · 캐시 O</text>

  <!-- OPTIONS -->
  <rect x="460" y="158" width="360" height="56" rx="6" fill="#1a1000" stroke="#ce9178" stroke-width="1.5"/>
  <text x="480" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" font-weight="600" fill="#ce9178">OPTIONS</text>
  <text x="590" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">허용 메서드 조회 · CORS</text>
  <text x="480" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">안전 O · 멱등 O · 캐시 X</text>

  <!-- CONNECT -->
  <rect x="460" y="226" width="360" height="56" rx="6" fill="#0f0f1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="480" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" font-weight="600" fill="#7777cc">CONNECT</text>
  <text x="590" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">HTTPS 터널 수립 (프록시)</text>
  <text x="480" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">안전 X · 멱등 X · 캐시 X</text>

  <!-- TRACE -->
  <rect x="460" y="294" width="360" height="56" rx="6" fill="#1a1000" stroke="#ce9178" stroke-width="1.5"/>
  <text x="480" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" font-weight="600" fill="#ce9178">TRACE</text>
  <text x="556" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">루프백 진단 · 실무 거의 미사용</text>
  <text x="480" y="337" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">안전 O · 멱등 O · 캐시 X</text>

  <!-- Bottom legend -->
  <rect x="60" y="450" width="760" height="68" rx="8" fill="#0d1117" stroke="#2a3a4a" stroke-width="1"/>
  <text x="440" y="471" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">용어 정리</text>
  <text x="120" y="492" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">안전(Safe)</text>
  <text x="120" y="508" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">서버 상태 변경 없음</text>
  <text x="340" y="492" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">멱등(Idempotent)</text>
  <text x="340" y="508" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">동일 요청 반복 시 결과 동일</text>
  <text x="560" y="492" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">캐시 가능</text>
  <text x="560" y="508" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">응답을 캐시에 저장 허용</text>
  <text x="760" y="492" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">△ = 조건부</text>
  <text x="760" y="508" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">구현에 따라 다름</text>
</svg>
