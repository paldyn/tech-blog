<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">git rebase --onto 동작 원리</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">세 인자로 이동 범위를 정밀하게 지정한다</text>

  <!-- BEFORE -->
  <text x="80" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">이전 상태: feature2가 feature1 위에서 분기</text>

  <!-- main commits -->
  <circle cx="100" cy="170" r="20" fill="#1a2233" stroke="#7ec8e3" stroke-width="2"/>
  <text x="100" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">C1</text>
  <circle cx="180" cy="170" r="20" fill="#1a2233" stroke="#7ec8e3" stroke-width="2"/>
  <text x="180" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">C2</text>

  <!-- main label -->
  <rect x="156" y="200" width="48" height="20" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="180" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">main</text>
  <line x1="180" y1="200" x2="180" y2="190" stroke="#7777cc" stroke-width="1.5"/>

  <!-- feature1 -->
  <circle cx="280" cy="120" r="20" fill="#1a2233" stroke="#e0aa55" stroke-width="2"/>
  <text x="280" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e0aa55">F1</text>
  <circle cx="360" cy="120" r="20" fill="#1a2233" stroke="#e0aa55" stroke-width="2"/>
  <text x="360" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e0aa55">F2</text>

  <rect x="328" y="80" width="64" height="20" rx="4" fill="#1a1a0a" stroke="#e0aa55" stroke-width="1.5"/>
  <text x="360" y="95" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e0aa55">feature1</text>
  <line x1="360" y1="100" x2="360" y2="140" stroke="#e0aa55" stroke-width="1.5"/>

  <!-- feature2 (branching from F1) -->
  <circle cx="440" cy="170" r="20" fill="#1a2233" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">G1</text>
  <circle cx="530" cy="170" r="20" fill="#1a2233" stroke="#55c555" stroke-width="2"/>
  <text x="530" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">G2</text>

  <rect x="498" y="200" width="64" height="20" rx="4" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="530" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">feature2</text>
  <line x1="530" y1="200" x2="530" y2="190" stroke="#55c555" stroke-width="1.5"/>

  <!-- Arrows before -->
  <line x1="120" y1="170" x2="158" y2="170" stroke="#555" stroke-width="2"/>
  <polygon points="158,165 168,170 158,175" fill="#555"/>
  <line x1="196" y1="158" x2="258" y2="128" stroke="#555" stroke-width="2"/>
  <polygon points="253,122 263,127 255,135" fill="#555"/>
  <line x1="300" y1="120" x2="338" y2="120" stroke="#e0aa55" stroke-width="2"/>
  <polygon points="338,115 348,120 338,125" fill="#e0aa55"/>
  <line x1="296" y1="132" x2="418" y2="162" stroke="#555" stroke-width="2"/>
  <polygon points="414,157 424,162 416,170" fill="#555"/>
  <line x1="460" y1="170" x2="508" y2="170" stroke="#55c555" stroke-width="2"/>
  <polygon points="508,165 518,170 508,175" fill="#55c555"/>

  <!-- Command -->
  <rect x="200" y="244" width="480" height="28" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="263" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">git rebase --onto main feature1 feature2</text>

  <!-- Arrow down -->
  <line x1="440" y1="272" x2="440" y2="296" stroke="#e8e8e8" stroke-width="2"/>
  <polygon points="433,296 440,308 447,296" fill="#e8e8e8"/>

  <!-- AFTER -->
  <text x="80" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">결과: feature2 커밋(G1,G2)이 main 위로 이동</text>

  <!-- main commits after -->
  <circle cx="100" cy="380" r="20" fill="#1a2233" stroke="#7ec8e3" stroke-width="2"/>
  <text x="100" y="384" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">C1</text>
  <circle cx="180" cy="380" r="20" fill="#1a2233" stroke="#7ec8e3" stroke-width="2"/>
  <text x="180" y="384" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">C2</text>

  <!-- main label after -->
  <rect x="156" y="408" width="48" height="20" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="180" y="423" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">main</text>
  <line x1="180" y1="408" x2="180" y2="400" stroke="#7777cc" stroke-width="1.5"/>

  <!-- G1', G2' on main after -->
  <circle cx="280" cy="380" r="20" fill="#1a1a0a" stroke="#55c555" stroke-width="2.5"/>
  <text x="280" y="384" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">G1'</text>
  <circle cx="380" cy="380" r="20" fill="#1a1a0a" stroke="#55c555" stroke-width="2.5"/>
  <text x="380" y="384" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">G2'</text>

  <rect x="348" y="408" width="64" height="20" rx="4" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="380" y="423" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">feature2</text>
  <line x1="380" y1="408" x2="380" y2="400" stroke="#55c555" stroke-width="1.5"/>

  <!-- Arrows after -->
  <line x1="120" y1="380" x2="158" y2="380" stroke="#555" stroke-width="2"/>
  <polygon points="158,375 168,380 158,385" fill="#555"/>
  <line x1="200" y1="380" x2="258" y2="380" stroke="#555" stroke-width="2"/>
  <polygon points="258,375 268,380 258,385" fill="#555"/>
  <line x1="300" y1="380" x2="358" y2="380" stroke="#55c555" stroke-width="2"/>
  <polygon points="358,375 368,380 358,385" fill="#55c555"/>

  <!-- feature1 note -->
  <text x="620" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">feature1(F1,F2)은</text>
  <text x="620" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">그대로 남아있음</text>
</svg>
