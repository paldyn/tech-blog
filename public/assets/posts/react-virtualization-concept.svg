<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">가상화(Virtualization): 보이는 것만 렌더링</text>

  <!-- Without virtualization -->
  <text x="220" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">가상화 없음 — 10,000개 DOM</text>

  <rect x="60" y="96" width="320" height="280" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <!-- scroll container -->
  <rect x="80" y="114" width="280" height="200" rx="4" fill="#0a0a0a" stroke="#555" stroke-width="1"/>
  <!-- all items rendered -->
  <rect x="84" y="118" width="272" height="18" rx="2" fill="#2a1010"/>
  <text x="220" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888" text-anchor="middle">Item 0001</text>
  <rect x="84" y="140" width="272" height="18" rx="2" fill="#2a1010"/>
  <text x="220" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888" text-anchor="middle">Item 0002</text>
  <rect x="84" y="162" width="272" height="18" rx="2" fill="#2a1010"/>
  <text x="220" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888" text-anchor="middle">Item 0003</text>
  <rect x="84" y="184" width="272" height="18" rx="2" fill="#2a1010"/>
  <text x="220" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888" text-anchor="middle">Item 0004</text>
  <rect x="84" y="206" width="272" height="18" rx="2" fill="#2a1010"/>
  <text x="220" y="219" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888" text-anchor="middle">Item 0005</text>
  <text x="220" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="20" fill="#e05555" text-anchor="middle">↕ 9,995개</text>
  <text x="220" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e05555" text-anchor="middle">모두 DOM에 존재</text>

  <text x="220" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e05555" text-anchor="middle">초기 렌더 느림, 스크롤 끊김</text>
  <text x="220" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e05555" text-anchor="middle">메모리 폭증, 레이아웃 재계산 비쌈</text>

  <!-- With virtualization -->
  <text x="660" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">react-window — 보이는 것만</text>

  <rect x="500" y="96" width="320" height="280" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <!-- scroll container -->
  <rect x="520" y="114" width="280" height="200" rx="4" fill="#0a0a0a" stroke="#555" stroke-width="1"/>

  <!-- viewport indicator -->
  <rect x="520" y="114" width="280" height="200" rx="4" fill="none" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- visible items -->
  <rect x="524" y="118" width="272" height="18" rx="2" fill="#0d2a0d"/>
  <text x="660" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555" text-anchor="middle">Item 0042 ← 뷰포트</text>
  <rect x="524" y="140" width="272" height="18" rx="2" fill="#0d2a0d"/>
  <text x="660" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555" text-anchor="middle">Item 0043</text>
  <rect x="524" y="162" width="272" height="18" rx="2" fill="#0d2a0d"/>
  <text x="660" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555" text-anchor="middle">Item 0044</text>
  <rect x="524" y="184" width="272" height="18" rx="2" fill="#0d2a0d"/>
  <text x="660" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555" text-anchor="middle">Item 0045</text>
  <rect x="524" y="206" width="272" height="18" rx="2" fill="#0d2a0d"/>
  <text x="660" y="219" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555" text-anchor="middle">Item 0046</text>
  <text x="660" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" fill="#55c555" text-anchor="middle">DOM에는 ~10개</text>
  <text x="660" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888" text-anchor="middle">나머지는 재활용(recycled)</text>

  <text x="660" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555" text-anchor="middle">초기 렌더 빠름, 스크롤 부드러움</text>
  <text x="660" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555" text-anchor="middle">메모리 고정, 10만 건도 OK</text>
</svg>
