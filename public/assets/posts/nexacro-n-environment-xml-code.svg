<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111318"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
  </defs>
  <rect width="880" height="560" rx="12" fill="url(#bg4)"/>
  <!-- Title bar -->
  <rect x="0" y="0" width="880" height="56" rx="12" fill="#13151c"/>
  <rect x="0" y="44" width="880" height="12" fill="#13151c"/>
  <text x="440" y="34" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Environment.xml 실전 설정 예시</text>

  <!-- Left: Environment.xml code -->
  <rect x="50" y="76" width="380" height="434" rx="8" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
  <text x="240" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">Environment.xml (production)</text>
  <g font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <text x="70" y="126" fill="#7ec8e3">&lt;Environment&gt;</text>
    <text x="70" y="144" fill="#6a8aa0">  &lt;!-- 앱 속성 --&gt;</text>
    <text x="70" y="162" fill="#7ec8e3">  &lt;Properties</text>
    <text x="70" y="180" fill="#e8e8e8">    encoding=<tspan fill="#ce9178">"utf-8"</tspan></text>
    <text x="70" y="198" fill="#e8e8e8">    charsettype=<tspan fill="#ce9178">"utf-8"</tspan></text>
    <text x="70" y="216" fill="#e8e8e8">    loadstyle=<tspan fill="#ce9178">"default"</tspan></text>
    <text x="70" y="234" fill="#7ec8e3">  /&gt;</text>
    <text x="70" y="252" fill="#6a8aa0">  &lt;!-- 서버 URL --&gt;</text>
    <text x="70" y="270" fill="#7ec8e3">  &lt;Service</text>
    <text x="70" y="288" fill="#e8e8e8">    baseurl=<tspan fill="#ce9178">"https://api.myapp.com"</tspan></text>
    <text x="70" y="306" fill="#e8e8e8">    formurl=<tspan fill="#ce9178">"https://cdn.myapp.com"</tspan></text>
    <text x="70" y="324" fill="#7ec8e3">  /&gt;</text>
    <text x="70" y="342" fill="#6a8aa0">  &lt;!-- 통신 프로토콜 --&gt;</text>
    <text x="70" y="360" fill="#7ec8e3">  &lt;Protocol</text>
    <text x="70" y="378" fill="#e8e8e8">    type=<tspan fill="#ce9178">"HTTPProtocol"</tspan></text>
    <text x="70" y="396" fill="#e8e8e8">    encoding=<tspan fill="#ce9178">"utf-8"</tspan></text>
    <text x="70" y="414" fill="#e8e8e8">    compress=<tspan fill="#ce9178">"true"</tspan></text>
    <text x="70" y="432" fill="#7ec8e3">  /&gt;</text>
    <text x="70" y="450" fill="#7ec8e3">  &lt;Session</text>
    <text x="70" y="468" fill="#e8e8e8">    timeout=<tspan fill="#b5cea8">"1800"</tspan></text>
    <text x="70" y="486" fill="#7ec8e3">  /&gt;</text>
    <text x="70" y="504" fill="#7ec8e3">&lt;/Environment&gt;</text>
  </g>

  <!-- Right: Key descriptions -->
  <rect x="460" y="76" width="370" height="434" rx="8" fill="#0d1117" stroke="#1e2433" stroke-width="1"/>
  <text x="645" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">설정 항목 해설</text>

  <!-- encoding -->
  <rect x="480" y="114" width="330" height="58" rx="6" fill="#0f1624" stroke="#1e2c4a" stroke-width="1"/>
  <text x="496" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-weight="700" fill="#7ec8e3" font-size="13">encoding / charsettype</text>
  <text x="496" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" fill="#bbb" font-size="11">요청·응답 인코딩. 서버와 동일하게 utf-8로 맞춰야</text>
  <text x="496" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" fill="#bbb" font-size="11">데이터 깨짐이 없음. 레거시 시스템은 euc-kr 가능</text>

  <!-- baseurl -->
  <rect x="480" y="182" width="330" height="58" rx="6" fill="#0f1624" stroke="#1e2c4a" stroke-width="1"/>
  <text x="496" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-weight="700" fill="#55c555" font-size="13">Service.baseurl</text>
  <text x="496" y="219" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" fill="#bbb" font-size="11">transaction() 호출 시 서비스 URL의 기본 경로.</text>
  <text x="496" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" fill="#bbb" font-size="11">Service.xml의 URL 앞에 자동으로 붙음</text>

  <!-- formurl -->
  <rect x="480" y="250" width="330" height="58" rx="6" fill="#0f1624" stroke="#1e2c4a" stroke-width="1"/>
  <text x="496" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-weight="700" fill="#55c555" font-size="13">Service.formurl</text>
  <text x="496" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" fill="#bbb" font-size="11">.xfdl 파일을 다운로드하는 서버 주소. CDN 분리 시</text>
  <text x="496" y="301" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" fill="#bbb" font-size="11">baseurl과 다른 호스트 지정 가능</text>

  <!-- Protocol.type -->
  <rect x="480" y="318" width="330" height="58" rx="6" fill="#0f1624" stroke="#1e2c4a" stroke-width="1"/>
  <text x="496" y="337" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-weight="700" fill="#e05555" font-size="13">Protocol.type</text>
  <text x="496" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" fill="#bbb" font-size="11">HTTPProtocol (REST/HTTP) 또는 PLProtocol</text>
  <text x="496" y="369" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" fill="#bbb" font-size="11">(Nexacro 전용 바이너리 프로토콜) 중 선택</text>

  <!-- Session.timeout -->
  <rect x="480" y="386" width="330" height="58" rx="6" fill="#0f1624" stroke="#1e2c4a" stroke-width="1"/>
  <text x="496" y="405" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-weight="700" fill="#7777cc" font-size="13">Session.timeout</text>
  <text x="496" y="423" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" fill="#bbb" font-size="11">초 단위 세션 만료 시간. 0이면 타임아웃 없음.</text>
  <text x="496" y="437" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" fill="#bbb" font-size="11">alerttype으로 만료 알림 방식(msgbox/none) 제어</text>

  <!-- Warning box -->
  <rect x="480" y="454" width="330" height="48" rx="6" fill="#1a0f10" stroke="#3d1e20" stroke-width="1"/>
  <text x="496" y="473" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-weight="700" fill="#e05555" font-size="12">⚠ 주의</text>
  <text x="496" y="491" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" fill="#e08a8a" font-size="11">runtime에서 이 파일은 캐시될 수 있음. 변경 후 반드시 재빌드</text>

  <!-- Footer -->
  <text x="440" y="536" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN · Nexacro N 완전 정복 시리즈</text>
</svg>
