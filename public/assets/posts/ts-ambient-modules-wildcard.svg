<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <!-- Background -->
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">와일드카드 모듈 — 에셋 import에 타입을</text>

  <!-- Row 1: svg -->
  <rect x="60" y="84" width="340" height="60" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">declare module "*.svg" {</text>
  <text x="76" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  const url: string; ... }</text>
  <rect x="440" y="84" width="380" height="60" fill="#111827" rx="6" stroke="#334155" stroke-width="1"/>
  <text x="456" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" xml:space="preserve">이미지 import → 번들러가 URL 문자열로 변환</text>
  <text x="456" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" xml:space="preserve">import logo from "./logo.svg" 의 logo는 string</text>

  <!-- Row 2: css -->
  <rect x="60" y="160" width="340" height="60" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">declare module "*.css";</text>
  <text x="76" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 본문 없는 축약형</text>
  <rect x="440" y="160" width="380" height="60" fill="#111827" rx="6" stroke="#334155" stroke-width="1"/>
  <text x="456" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" xml:space="preserve">사이드 이펙트 import 허용 — 내보내기는 전부 any</text>
  <text x="456" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" xml:space="preserve">import "./global.css" 가 에러 없이 통과</text>

  <!-- Row 3: raw -->
  <rect x="60" y="236" width="340" height="60" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">declare module "*?raw" {</text>
  <text x="76" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  const text: string; ... }</text>
  <rect x="440" y="236" width="380" height="60" fill="#111827" rx="6" stroke="#334155" stroke-width="1"/>
  <text x="456" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" xml:space="preserve">Vite 쿼리 접미사 — 파일 내용을 통째로 문자열로</text>
  <text x="456" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" xml:space="preserve">셰이더·템플릿·마크다운 로드에 활용</text>

  <!-- Bottom note -->
  <rect x="60" y="324" width="760" height="64" fill="#111827" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">vite/client, next-env.d.ts의 정체가 바로 이 와일드카드 선언 묶음</text>
  <text x="440" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">번들러가 처리하는 비-JS import를 타입 시스템이 이해하도록 다리를 놓는다</text>
</svg>
