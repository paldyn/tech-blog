<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arrB" viewBox="0 0 21 14" refX="19" refY="7" markerUnits="userSpaceOnUse" markerWidth="21" markerHeight="14" orient="auto">
      <polygon points="0,0 21,7 0,14" fill="#7ec8e3"/>
    </marker>
    <marker id="arrG" viewBox="0 0 21 14" refX="19" refY="7" markerUnits="userSpaceOnUse" markerWidth="21" markerHeight="14" orient="auto">
      <polygon points="0,0 21,7 0,14" fill="#55c555"/>
    </marker>
    <marker id="arrR" viewBox="0 0 21 14" refX="19" refY="7" markerUnits="userSpaceOnUse" markerWidth="21" markerHeight="14" orient="auto">
      <polygon points="0,0 21,7 0,14" fill="#e05555"/>
    </marker>
    <marker id="arrY" viewBox="0 0 21 14" refX="19" refY="7" markerUnits="userSpaceOnUse" markerWidth="21" markerHeight="14" orient="auto">
      <polygon points="0,0 21,7 0,14" fill="#e0b755"/>
    </marker>
  </defs>

  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">@TransactionalEventListener — 트랜잭션 단계별 실행 시점</text>
  <text x="440" y="62" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">TransactionPhase: BEFORE_COMMIT · AFTER_COMMIT · AFTER_ROLLBACK · AFTER_COMPLETION</text>

  <!-- Transaction timeline bar -->
  <text x="60" y="94"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">트랜잭션 생명주기</text>

  <!-- Timeline boxes -->
  <!-- BEGIN -->
  <rect x="60" y="104" width="120" height="40" rx="6" fill="#0d1f35" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="120" y="128" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">BEGIN</text>

  <!-- Arrow -->
  <line x1="180" y1="124" x2="206" y2="124" stroke="#3a4a6e" stroke-width="2" marker-end="url(#arrB)"/>

  <!-- DB WORK -->
  <rect x="208" y="104" width="180" height="40" rx="6" fill="#0d1f35" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="298" y="121" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">DB 작업</text>
  <text x="298" y="136" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">publishEvent() 포함</text>

  <!-- Arrow -->
  <line x1="388" y1="124" x2="414" y2="124" stroke="#3a4a6e" stroke-width="2" marker-end="url(#arrB)"/>

  <!-- BEFORE COMMIT marker -->
  <rect x="416" y="104" width="100" height="40" rx="6" fill="#1a1228" stroke="#7777cc" stroke-width="1.5"/>
  <text x="466" y="121" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#7777cc">BEFORE</text>
  <text x="466" y="136" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#7777cc">COMMIT</text>

  <!-- Arrow -->
  <line x1="516" y1="124" x2="542" y2="124" stroke="#3a4a6e" stroke-width="2" marker-end="url(#arrB)"/>

  <!-- COMMIT -->
  <rect x="544" y="104" width="100" height="40" rx="6" fill="#061406" stroke="#55c555" stroke-width="2"/>
  <text x="594" y="128" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">COMMIT</text>

  <!-- Arrow after commit -->
  <line x1="644" y1="124" x2="670" y2="124" stroke="#3a4a6e" stroke-width="2" marker-end="url(#arrB)"/>

  <!-- AFTER COMMIT marker -->
  <rect x="672" y="104" width="100" height="40" rx="6" fill="#0a1f0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="722" y="121" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#55c555">AFTER</text>
  <text x="722" y="136" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#55c555">COMMIT</text>

  <!-- End marker -->
  <rect x="784" y="104" width="36" height="40" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="802" y="128" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">END</text>

  <!-- ROLLBACK path -->
  <text x="60" y="182"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">롤백 경로</text>

  <rect x="60" y="192" width="120" height="40" rx="6" fill="#0d1f35" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="120" y="216" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">BEGIN</text>
  <line x1="180" y1="212" x2="206" y2="212" stroke="#3a4a6e" stroke-width="2" marker-end="url(#arrB)"/>

  <rect x="208" y="192" width="180" height="40" rx="6" fill="#0d1f35" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="298" y="212" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">DB 작업 중 예외</text>
  <line x1="388" y1="212" x2="414" y2="212" stroke="#e05555" stroke-width="2" marker-end="url(#arrR)"/>

  <rect x="416" y="192" width="120" height="40" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="2"/>
  <text x="476" y="216" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">ROLLBACK</text>
  <line x1="536" y1="212" x2="562" y2="212" stroke="#3a4a6e" stroke-width="2" marker-end="url(#arrB)"/>

  <rect x="564" y="192" width="120" height="40" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="624" y="209" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e05555">AFTER</text>
  <text x="624" y="224" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e05555">ROLLBACK</text>

  <!-- AFTER_COMPLETION covers both -->
  <rect x="700" y="192" width="120" height="40" rx="6" fill="#1a1208" stroke="#e0b755" stroke-width="1.5"/>
  <text x="760" y="209" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e0b755">AFTER</text>
  <text x="760" y="224" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e0b755">COMPLETION</text>

  <!-- AFTER_COMPLETION explanation -->
  <text x="834" y="212" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">커밋·</text>
  <text x="834" y="226" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">롤백 공통</text>

  <!-- Separator -->
  <line x1="60" y1="254" x2="820" y2="254" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Phase descriptions -->
  <text x="440" y="274" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">TransactionPhase 선택 기준</text>

  <!-- BEFORE_COMMIT -->
  <rect x="60" y="286" width="180" height="90" rx="8" fill="#1a1228" stroke="#7777cc" stroke-width="1.5"/>
  <text x="150" y="306" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">BEFORE_COMMIT</text>
  <text x="150" y="324" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">커밋 직전 실행</text>
  <text x="150" y="342" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">같은 트랜잭션 참여</text>
  <text x="150" y="360" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">감사 로그 작성에 적합</text>

  <!-- AFTER_COMMIT (default) -->
  <rect x="258" y="286" width="180" height="90" rx="8" fill="#0a1f0a" stroke="#55c555" stroke-width="2"/>
  <text x="348" y="306" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">AFTER_COMMIT ★</text>
  <text x="348" y="324" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">커밋 완료 후 실행</text>
  <text x="348" y="342" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">새 트랜잭션 필요 시 REQUIRES_NEW</text>
  <text x="348" y="360" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">이메일·알림 발송 (기본값)</text>

  <!-- AFTER_ROLLBACK -->
  <rect x="456" y="286" width="180" height="90" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="546" y="306" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">AFTER_ROLLBACK</text>
  <text x="546" y="324" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">롤백 완료 후 실행</text>
  <text x="546" y="342" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">실패 이벤트 발행 가능</text>
  <text x="546" y="360" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">보상 트랜잭션, 알림</text>

  <!-- AFTER_COMPLETION -->
  <rect x="654" y="286" width="166" height="90" rx="8" fill="#1a1208" stroke="#e0b755" stroke-width="1.5"/>
  <text x="737" y="306" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0b755">AFTER_COMPLETION</text>
  <text x="737" y="324" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">커밋 + 롤백 공통</text>
  <text x="737" y="342" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">결과와 무관한 리소스 정리</text>
  <text x="737" y="360" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">임시파일 삭제, 락 해제</text>

  <!-- Bottom note -->
  <rect x="60" y="392" width="760" height="36" rx="6" fill="#141414" stroke="#333"/>
  <text x="440" y="415" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">AFTER_COMMIT 리스너에서 DB 쓰기 → 기본 트랜잭션 없음 → @Transactional(propagation=REQUIRES_NEW) 필수</text>
</svg>
