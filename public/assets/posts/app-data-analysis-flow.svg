<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380"
     style="border-radius:12px" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="ac" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>
  <text x="440" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">AI 데이터 분석 보조 유형</text>

  <!-- Headers -->
  <text x="130" y="72" text-anchor="middle" font-size="13" fill="#888">유형</text>
  <text x="390" y="72" text-anchor="middle" font-size="13" fill="#888">설명 · 예시</text>
  <text x="700" y="72" text-anchor="middle" font-size="13" fill="#888">출력 형태</text>
  <line x1="60" y1="80" x2="820" y2="80" stroke="#222" stroke-width="1"/>

  <!-- Row 1 -->
  <rect x="70" y="88" width="120" height="48" rx="6" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="116" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">쿼리 생성</text>
  <text x="390" y="108" text-anchor="middle" font-size="13" fill="#e8e8e8">"지난 주 신규 가입자 지역별 분포"</text>
  <text x="390" y="126" text-anchor="middle" font-size="12" fill="#888">NL → SQL 자동 변환</text>
  <text x="700" y="116" text-anchor="middle" font-size="13" fill="#7ec8e3">SQL 쿼리 + 실행 결과</text>
  <line x1="60" y1="144" x2="820" y2="144" stroke="#222" stroke-width="1"/>

  <!-- Row 2 -->
  <rect x="70" y="152" width="120" height="48" rx="6" fill="#1a1030" stroke="#7777cc" stroke-width="1.5"/>
  <text x="130" y="180" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">시각화 코드</text>
  <text x="390" y="172" text-anchor="middle" font-size="13" fill="#e8e8e8">"매출 트렌드 차트 그려줘"</text>
  <text x="390" y="190" text-anchor="middle" font-size="12" fill="#888">Python matplotlib / Plotly 코드 생성</text>
  <text x="700" y="180" text-anchor="middle" font-size="13" fill="#7777cc">실행 가능한 차트 코드</text>
  <line x1="60" y1="208" x2="820" y2="208" stroke="#222" stroke-width="1"/>

  <!-- Row 3 -->
  <rect x="70" y="216" width="120" height="48" rx="6" fill="#1a1200" stroke="#e09060" stroke-width="1.5"/>
  <text x="130" y="244" text-anchor="middle" font-size="13" font-weight="600" fill="#e09060">이상 탐지</text>
  <text x="390" y="236" text-anchor="middle" font-size="13" fill="#e8e8e8">"이번 달 비정상적인 거래 찾아줘"</text>
  <text x="390" y="254" text-anchor="middle" font-size="12" fill="#888">통계 이상값 + AI 해석 제공</text>
  <text x="700" y="244" text-anchor="middle" font-size="13" fill="#e09060">이상 항목 목록 + 근거</text>
  <line x1="60" y1="272" x2="820" y2="272" stroke="#222" stroke-width="1"/>

  <!-- Row 4 -->
  <rect x="70" y="280" width="120" height="48" rx="6" fill="#0f2418" stroke="#55c555" stroke-width="1.5"/>
  <text x="130" y="308" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">인사이트 요약</text>
  <text x="390" y="300" text-anchor="middle" font-size="13" fill="#e8e8e8">"이 대시보드에서 주목할 점은?"</text>
  <text x="390" y="318" text-anchor="middle" font-size="12" fill="#888">데이터 기반 자연어 해석</text>
  <text x="700" y="308" text-anchor="middle" font-size="13" fill="#55c555">경영진 보고서 형식</text>
  <line x1="60" y1="336" x2="820" y2="336" stroke="#222" stroke-width="1"/>

  <line x1="60" y1="80" x2="60" y2="336" stroke="#222" stroke-width="1"/>
  <line x1="820" y1="80" x2="820" y2="336" stroke="#222" stroke-width="1"/>
  <text x="440" y="360" text-anchor="middle" font-size="12" fill="#888">각 유형은 독립 API 엔드포인트로 분리하면 재사용성 극대화</text>
</svg>
