<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="43" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">try / except / else / finally 실행 흐름</text>

  <!-- 4 scenario columns -->
  <!-- Col headers: y=80 -->
  <!-- Col 1: 예외 없음 -->
  <rect x="55" y="65" width="175" height="36" rx="6" fill="#0c1628" stroke="#7ec8e3" stroke-width="1"/>
  <text x="143" y="88" text-anchor="middle" font-size="12" font-weight="700" fill="#7ec8e3">예외 없는 경우</text>

  <!-- Col 2: 예외 매칭 -->
  <rect x="248" y="65" width="175" height="36" rx="6" fill="#0c1628" stroke="#e05555" stroke-width="1"/>
  <text x="336" y="88" text-anchor="middle" font-size="12" font-weight="700" fill="#e05555">예외 발생 + 매칭</text>

  <!-- Col 3: 예외 미매칭 -->
  <rect x="441" y="65" width="175" height="36" rx="6" fill="#0c1628" stroke="#ce9178" stroke-width="1"/>
  <text x="529" y="88" text-anchor="middle" font-size="12" font-weight="700" fill="#ce9178">예외 발생 + 미매칭</text>

  <!-- Col 4: else에서 예외 -->
  <rect x="634" y="65" width="191" height="36" rx="6" fill="#0c1628" stroke="#7777cc" stroke-width="1"/>
  <text x="730" y="88" text-anchor="middle" font-size="12" font-weight="700" fill="#7777cc">else에서 예외 발생</text>

  <!-- Rows: try, except, else, finally -->
  <!-- Row labels y=130, 200, 270, 340 -->

  <!-- try row -->
  <text x="30" y="153" text-anchor="end" font-size="12" font-weight="700" fill="#7ec8e3">try</text>
  <rect x="55" y="120" width="175" height="44" rx="6" fill="#0c1c2a" stroke="#55c555" stroke-width="2"/>
  <text x="143" y="147" text-anchor="middle" font-size="12" fill="#55c555">✓ 실행</text>
  <rect x="248" y="120" width="175" height="44" rx="6" fill="#0c1c2a" stroke="#e05555" stroke-width="2"/>
  <text x="336" y="147" text-anchor="middle" font-size="12" fill="#e05555">✓ 실행 → 예외</text>
  <rect x="441" y="120" width="175" height="44" rx="6" fill="#0c1c2a" stroke="#e05555" stroke-width="2"/>
  <text x="529" y="147" text-anchor="middle" font-size="12" fill="#e05555">✓ 실행 → 예외</text>
  <rect x="634" y="120" width="191" height="44" rx="6" fill="#0c1c2a" stroke="#55c555" stroke-width="2"/>
  <text x="730" y="147" text-anchor="middle" font-size="12" fill="#55c555">✓ 실행</text>

  <!-- except row -->
  <text x="30" y="223" text-anchor="end" font-size="12" font-weight="700" fill="#e05555">except</text>
  <rect x="55" y="192" width="175" height="44" rx="6" fill="#1a1a1a" stroke="#3a4a6e" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="143" y="219" text-anchor="middle" font-size="12" fill="#888">— 건너뜀</text>
  <rect x="248" y="192" width="175" height="44" rx="6" fill="#0c1c2a" stroke="#55c555" stroke-width="2"/>
  <text x="336" y="219" text-anchor="middle" font-size="12" fill="#55c555">✓ 실행</text>
  <rect x="441" y="192" width="175" height="44" rx="6" fill="#1a1a1a" stroke="#3a4a6e" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="529" y="219" text-anchor="middle" font-size="12" fill="#888">— 건너뜀</text>
  <rect x="634" y="192" width="191" height="44" rx="6" fill="#1a1a1a" stroke="#3a4a6e" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="730" y="219" text-anchor="middle" font-size="12" fill="#888">— 건너뜀</text>

  <!-- else row -->
  <text x="30" y="293" text-anchor="end" font-size="12" font-weight="700" fill="#55c555">else</text>
  <rect x="55" y="262" width="175" height="44" rx="6" fill="#0c1c2a" stroke="#55c555" stroke-width="2"/>
  <text x="143" y="289" text-anchor="middle" font-size="12" fill="#55c555">✓ 실행</text>
  <rect x="248" y="262" width="175" height="44" rx="6" fill="#1a1a1a" stroke="#3a4a6e" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="336" y="289" text-anchor="middle" font-size="12" fill="#888">— 건너뜀</text>
  <rect x="441" y="262" width="175" height="44" rx="6" fill="#1a1a1a" stroke="#3a4a6e" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="529" y="289" text-anchor="middle" font-size="12" fill="#888">— 건너뜀</text>
  <rect x="634" y="262" width="191" height="44" rx="6" fill="#0c1c2a" stroke="#e05555" stroke-width="2"/>
  <text x="730" y="289" text-anchor="middle" font-size="12" fill="#e05555">✓ 실행 → 예외</text>

  <!-- finally row -->
  <text x="30" y="363" text-anchor="end" font-size="12" font-weight="700" fill="#ce9178">finally</text>
  <rect x="55" y="332" width="175" height="44" rx="6" fill="#0c1c2a" stroke="#ce9178" stroke-width="2"/>
  <text x="143" y="359" text-anchor="middle" font-size="12" fill="#ce9178">✓ 항상 실행</text>
  <rect x="248" y="332" width="175" height="44" rx="6" fill="#0c1c2a" stroke="#ce9178" stroke-width="2"/>
  <text x="336" y="359" text-anchor="middle" font-size="12" fill="#ce9178">✓ 항상 실행</text>
  <rect x="441" y="332" width="175" height="44" rx="6" fill="#0c1c2a" stroke="#ce9178" stroke-width="2"/>
  <text x="529" y="359" text-anchor="middle" font-size="12" fill="#ce9178">✓ 항상 실행</text>
  <rect x="634" y="332" width="191" height="44" rx="6" fill="#0c1c2a" stroke="#ce9178" stroke-width="2"/>
  <text x="730" y="359" text-anchor="middle" font-size="12" fill="#ce9178">✓ 항상 실행</text>

  <!-- Result row -->
  <rect x="55" y="398" width="175" height="36" rx="6" fill="#0a1520" stroke="#2a3d5e" stroke-width="1"/>
  <text x="143" y="421" text-anchor="middle" font-size="11" fill="#55c555">정상 종료</text>
  <rect x="248" y="398" width="175" height="36" rx="6" fill="#0a1520" stroke="#2a3d5e" stroke-width="1"/>
  <text x="336" y="421" text-anchor="middle" font-size="11" fill="#55c555">정상 종료</text>
  <rect x="441" y="398" width="175" height="36" rx="6" fill="#0a1520" stroke="#2a3d5e" stroke-width="1"/>
  <text x="529" y="421" text-anchor="middle" font-size="11" fill="#e05555">예외 전파 ↑</text>
  <rect x="634" y="398" width="191" height="36" rx="6" fill="#0a1520" stroke="#2a3d5e" stroke-width="1"/>
  <text x="730" y="421" text-anchor="middle" font-size="11" fill="#e05555">예외 전파 ↑</text>
</svg>
