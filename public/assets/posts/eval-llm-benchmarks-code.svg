<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380">
  <!-- 배경 -->
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <!-- 제목 -->
  <text x="440" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">LM Evaluation Harness 활용</text>
  <!-- 코드 박스 -->
  <rect x="60" y="60" width="760" height="298" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="86" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># CLI: lm_eval --model hf --model_args pretrained=meta-llama/Llama-3-8B \</text>
  <text x="80" y="106" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">#   --tasks mmlu,hellaswag,arc_challenge --num_fewshot 5 --output_path results/</text>
  <text x="80" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">import</tspan>
    <tspan fill="#ffffff"> lm_eval</tspan>
  </text>
  <text x="80" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">from</tspan>
    <tspan fill="#ffffff"> lm_eval.models.huggingface </tspan>
    <tspan fill="#7ec8e3" font-weight="600">import</tspan>
    <tspan fill="#ffffff"> HFLM</tspan>
  </text>
  <text x="80" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">model = HFLM(pretrained=</tspan>
    <tspan fill="#ce9178">"meta-llama/Llama-3-8B-Instruct"</tspan>
    <tspan fill="#ffffff">)</tspan>
  </text>
  <text x="80" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">results = lm_eval.simple_evaluate(</tspan>
  </text>
  <text x="80" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    model=model,</tspan>
  </text>
  <text x="80" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    tasks=[</tspan>
    <tspan fill="#ce9178">"mmlu"</tspan>
    <tspan fill="#ffffff">, </tspan>
    <tspan fill="#ce9178">"hellaswag"</tspan>
    <tspan fill="#ffffff">, </tspan>
    <tspan fill="#ce9178">"arc_challenge"</tspan>
    <tspan fill="#ffffff">, </tspan>
    <tspan fill="#ce9178">"gsm8k"</tspan>
    <tspan fill="#ffffff">],</tspan>
  </text>
  <text x="80" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    num_fewshot=</tspan>
    <tspan fill="#b5cea8">5</tspan>
    <tspan fill="#ffffff">,    </tspan>
    <tspan fill="#9aa4b8"># few-shot 예시 수</tspan>
  </text>
  <text x="80" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    batch_size=</tspan>
    <tspan fill="#b5cea8">32</tspan>
    <tspan fill="#ffffff">,</tspan>
  </text>
  <text x="80" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">)</tspan>
  </text>
  <text x="80" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">for</tspan>
    <tspan fill="#ffffff"> task, res </tspan>
    <tspan fill="#7ec8e3" font-weight="600">in</tspan>
    <tspan fill="#ffffff"> results[</tspan>
    <tspan fill="#ce9178">"results"</tspan>
    <tspan fill="#ffffff">].items():</tspan>
  </text>
  <text x="80" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    print(</tspan>
    <tspan fill="#ce9178">f"{task}: acc={res.get('acc,none', 'N/A'):.3f}"</tspan>
    <tspan fill="#ffffff">)</tspan>
  </text>
</svg>
