  <text x="80" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">레이블 있음 + 클래스 예측 → 로지스틱회귀, Random Forest, XGBoost, CNN/Transformer</text>
