<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Gemini 패밀리 구조</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">Google의 멀티모달 네이티브 LLM 전략</text>

  <!-- Gemini Ultra -->
  <rect x="60" y="96" width="360" height="140" rx="10" fill="#111827" stroke="#7777cc" stroke-width="2"/>
  <text x="240" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7777cc">Gemini Ultra / 1.5 Ultra</text>
  <text x="240" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">최고 성능 · 연구·엔터프라이즈</text>
  <text x="80" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• MMLU 90.0% — GPT-4 첫 초과 달성</text>
  <text x="80" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• 멀티모달 네이티브 (텍스트/이미지/오디오/비디오)</text>
  <text x="80" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• Gemini Advanced (Google One AI Premium)</text>

  <!-- Gemini Pro -->
  <rect x="460" y="96" width="360" height="140" rx="10" fill="#111827" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555">Gemini Pro / 1.5 Pro</text>
  <text x="640" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">균형 · 일반 개발자 · API</text>
  <text x="480" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• 1M 토큰 컨텍스트 (1.5 Pro)</text>
  <text x="480" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• Google AI Studio / Vertex AI 제공</text>
  <text x="480" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• 무료 API 티어 존재</text>

  <!-- Gemini Flash / Nano -->
  <rect x="60" y="264" width="360" height="140" rx="10" fill="#111827" stroke="#7ec8e3" stroke-width="2"/>
  <text x="240" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7ec8e3">Gemini Flash</text>
  <text x="240" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">속도 최적화 · 고처리량</text>
  <text x="80" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• 응답 속도: Pro 대비 3~5배 빠름</text>
  <text x="80" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• 비용: Pro 대비 10배 저렴</text>
  <text x="80" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• 실시간 스트리밍 애플리케이션 최적</text>

  <!-- Gemini Nano / on-device -->
  <rect x="460" y="264" width="360" height="140" rx="10" fill="#111827" stroke="#e05555" stroke-width="2"/>
  <text x="640" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#e05555">Gemini Nano</text>
  <text x="640" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">온디바이스 · 모바일</text>
  <text x="480" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• Pixel 8 이상 디바이스 내장</text>
  <text x="480" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• 오프라인 동작 가능</text>
  <text x="480" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• 개인 데이터 클라우드 미전송</text>

  <!-- Center label -->
  <text x="440" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">Gemini 2.0 Flash: 실시간 멀티모달 스트리밍 (2025)</text>
</svg>
