<svg width="880" height="480" viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Error Cause — 에러 연쇄</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">ES2022 — cause 속성으로 원인 에러 보존</text>
  <line x1="60" y1="92" x2="820" y2="92" stroke="#1e2433" stroke-width="1"/>

  <!-- Error chain visualization -->
  <text x="60" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">에러 연쇄 구조</text>

  <!-- Root cause error -->
  <rect x="60" y="128" width="220" height="70" fill="#1a0e0e" rx="8" stroke="#e05555" stroke-width="2"/>
  <text x="170" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">원인 에러</text>
  <text x="76" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">NetworkError: timeout</text>
  <text x="76" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#6a8aa0">fetchData()에서 발생</text>

  <!-- Arrow -->
  <line x1="280" y1="163" x2="338" y2="163" stroke="#6a8aa0" stroke-width="1.5"/>
  <polygon points="340,163 330,157 330,169" fill="#6a8aa0"/>
  <text x="310" y="153" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#6a8aa0">cause</text>

  <!-- Wrapped error -->
  <rect x="340" y="128" width="240" height="70" fill="#1a0e0e" rx="8" stroke="#e05555" stroke-width="2"/>
  <text x="460" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">래핑 에러</text>
  <text x="356" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">Error: 사용자 로드 실패</text>
  <text x="356" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#6a8aa0">loadUser()에서 래핑</text>

  <!-- Arrow 2 -->
  <line x1="580" y1="163" x2="638" y2="163" stroke="#6a8aa0" stroke-width="1.5"/>
  <polygon points="640,163 630,157 630,169" fill="#6a8aa0"/>
  <text x="610" y="153" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#6a8aa0">cause</text>

  <!-- Top-level error -->
  <rect x="640" y="128" width="180" height="70" fill="#1a0e0e" rx="8" stroke="#e05555" stroke-width="2"/>
  <text x="730" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">최상위 에러</text>
  <text x="656" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">Error: 페이지 에러</text>
  <text x="656" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#6a8aa0">renderPage()에서 래핑</text>

  <!-- Code block -->
  <text x="60" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">ES2022 cause 사용법</text>
  <rect x="60" y="238" width="760" height="190" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">async function</tspan><tspan fill="#e8e8e8"> loadUser(id) {</tspan>
  </text>
  <text x="76" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">  try</tspan><tspan fill="#e8e8e8"> {</tspan>
  </text>
  <text x="76" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">    return await</tspan><tspan fill="#e8e8e8"> fetchData(</tspan><tspan fill="#ce9178">`/users/${id}`</tspan><tspan fill="#e8e8e8">);</tspan>
  </text>
  <text x="76" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">  } catch</tspan><tspan fill="#e8e8e8"> (err) {</tspan>
  </text>
  <text x="76" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">    throw new</tspan><tspan fill="#e8e8e8"> Error(</tspan><tspan fill="#ce9178">'사용자 로드 실패'</tspan><tspan fill="#e8e8e8">, {</tspan>
  </text>
  <text x="76" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">      cause: err,</tspan><tspan fill="#6a8aa0"> // ← 원인 보존</tspan>
  </text>
  <text x="76" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">    });</tspan>
  </text>
  <text x="76" y="386" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">  }</tspan>
  </text>
  <text x="76" y="404" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">}</tspan>
  </text>

  <text x="440" y="460" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복</text>
</svg>
