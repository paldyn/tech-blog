<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Buffer Pool 모니터링 — 핵심 지표</text>

  <!-- Code block: monitoring queries -->
  <rect x="60" y="68" width="500" height="198" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="94" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">-- Buffer Pool 적중률 (0.99+ 권장)</text>
  <text x="76" y="112" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">SELECT</text>
  <text x="76" y="130" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">  1 - (</text>
  <text x="76" y="148" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">    Innodb_buffer_pool_reads /</text>
  <text x="76" y="166" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">    Innodb_buffer_pool_read_requests</text>
  <text x="76" y="184" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">  ) AS hit_ratio</text>
  <text x="76" y="202" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">FROM</text>
  <text x="76" y="220" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">  information_schema.GLOBAL_STATUS</text>
  <text x="76" y="238" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">WHERE</text>
  <text x="76" y="256" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">  1=1; </text>

  <!-- Status metrics -->
  <rect x="580" y="68" width="260" height="198" rx="6" fill="#111827" stroke="#2a2a40"/>
  <text x="710" y="94" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">주요 Status 변수</text>

  <text x="596" y="118" font-size="12" fill="#7ec8e3">pool_read_requests</text>
  <text x="596" y="134" font-size="12" fill="#888">논리 읽기 총계</text>
  <line x1="596" y1="144" x2="830" y2="144" stroke="#2a2a40" stroke-width="0.5"/>

  <text x="596" y="162" font-size="12" fill="#7ec8e3">pool_reads</text>
  <text x="596" y="178" font-size="12" fill="#888">디스크 읽기 횟수</text>
  <line x1="596" y1="188" x2="830" y2="188" stroke="#2a2a40" stroke-width="0.5"/>

  <text x="596" y="206" font-size="12" fill="#7ec8e3">pool_wait_free</text>
  <text x="596" y="222" font-size="12" fill="#888">빈 페이지 대기 횟수</text>
  <line x1="596" y1="232" x2="830" y2="232" stroke="#2a2a40" stroke-width="0.5"/>

  <text x="596" y="250" font-size="12" fill="#e05555">pool_pages_dirty</text>
  <text x="596" y="266" font-size="12" fill="#888">Dirty Page 수</text>

  <!-- Configuration tips -->
  <rect x="60" y="290" width="760" height="90" rx="8" fill="#111827" stroke="#2a2a40"/>
  <text x="440" y="314" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">Buffer Pool 설정 가이드</text>
  <text x="200" y="342" text-anchor="middle" font-size="13" fill="#7ec8e3">innodb_buffer_pool_size</text>
  <text x="200" y="360" text-anchor="middle" font-size="13" fill="#888">총 RAM의 50~70% 권장</text>
  <text x="550" y="342" text-anchor="middle" font-size="13" fill="#7ec8e3">innodb_buffer_pool_instances</text>
  <text x="550" y="360" text-anchor="middle" font-size="13" fill="#888">8GB 이상이면 8 권장 (Mutex 분산)</text>
</svg>
