<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">cascade · orphanRemoval 올바른 사용</text>
  <text x="440" y="68" text-anchor="middle" fill="#888" font-size="13">부모-자식 완전 소유 관계에서만 사용 — 공유 엔티티에는 절대 사용 금지</text>

  <!-- Left: Correct usage -->
  <rect x="60" y="86" width="362" height="374" rx="6" fill="#000000" stroke="#55c555" stroke-width="1.5"/>
  <rect x="61" y="87" width="360" height="28" rx="5" fill="#0d2010"/>
  <rect x="61" y="103" width="360" height="12" fill="#0d2010"/>
  <text x="241" y="106" text-anchor="middle" fill="#55c555" font-size="12" font-weight="600">✓ 올바른 사용 (부모-자식 완전 소유)</text>

  <text x="80" y="134" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// Post가 Comment를 완전히 소유</text>
  <text x="80" y="152" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">@Entity</text>
  <text x="80" y="170" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">public class</text><text x="172" y="170" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> Post {</text>
  <text x="80" y="188" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  @OneToMany(</text>
  <text x="80" y="206" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    mappedBy = </text><text x="176" y="206" fill="#ce9178" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">"post"</text><text x="220" y="206" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">,</text>
  <text x="80" y="224" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    cascade = CascadeType.</text><text x="248" y="224" fill="#55c555" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">ALL</text><text x="272" y="224" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">,</text>
  <text x="80" y="242" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    orphanRemoval = </text><text x="224" y="242" fill="#b5cea8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">true</text><text x="252" y="242" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">)</text>
  <text x="80" y="260" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  private</text><text x="136" y="260" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> List&lt;Comment&gt; comments</text>
  <text x="80" y="278" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">      = </text><text x="120" y="278" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">new</text><text x="146" y="278" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> ArrayList&lt;&gt;();</text>
  <text x="80" y="296" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">}</text>

  <text x="80" y="326" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// post 저장 시 comments도 INSERT</text>
  <text x="80" y="344" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">postRepository.save(post);</text>

  <text x="80" y="374" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// 컬렉션 remove → orphan DELETE</text>
  <text x="80" y="392" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">post.getComments().remove(</text><text x="282" y="392" fill="#b5cea8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">0</text><text x="290" y="392" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">);</text>
  <text x="80" y="410" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// → DELETE FROM comment WHERE id=?</text>
  <text x="80" y="440" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// post 삭제 시 comments 모두 삭제</text>
  <text x="80" y="458" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">postRepository.delete(post);</text>

  <!-- Right: Wrong usage -->
  <rect x="458" y="86" width="362" height="374" rx="6" fill="#000000" stroke="#e05555" stroke-width="1.5"/>
  <rect x="459" y="87" width="360" height="28" rx="5" fill="#200d0d"/>
  <rect x="459" y="103" width="360" height="12" fill="#200d0d"/>
  <text x="639" y="106" text-anchor="middle" fill="#e05555" font-size="12" font-weight="600">✗ 잘못된 사용 (공유 자원에 cascade)</text>

  <text x="478" y="134" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// ❌ Tag는 여러 Post가 공유하는 자원</text>
  <text x="478" y="152" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">@Entity</text>
  <text x="478" y="170" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">public class</text><text x="570" y="170" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> Post {</text>
  <text x="478" y="188" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  @ManyToMany(</text>
  <text x="478" y="206" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    cascade = CascadeType.</text><text x="646" y="206" fill="#e05555" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">ALL</text><text x="670" y="206" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> // ❌</text>
  <text x="478" y="224" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  )</text>
  <text x="478" y="242" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  private</text><text x="534" y="242" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> List&lt;Tag&gt; tags;</text>
  <text x="478" y="260" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">}</text>

  <text x="478" y="296" fill="#e05555" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// 위험: post 삭제 시 공유 Tag도 삭제!</text>
  <text x="478" y="314" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">postRepository.delete(postA);</text>
  <text x="478" y="332" fill="#e05555" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// postB가 참조하던 Tag도 삭제됨!</text>

  <line x1="458" y1="350" x2="820" y2="350" stroke="#2a1010" stroke-width="1"/>
  <text x="478" y="376" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// 올바른 대안: cascade 없이 단순 연관</text>
  <text x="478" y="394" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  @ManyToMany</text>
  <text x="478" y="412" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  // cascade 없음 — Tag 수명 독립</text>
  <text x="478" y="430" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  private</text><text x="534" y="430" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> List&lt;Tag&gt; tags;</text>
  <text x="478" y="448" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  // Tag 삭제는 별도로 명시적 처리</text>

  <!-- Bottom tip -->
  <text x="440" y="488" text-anchor="middle" fill="#7777cc" font-size="12">cascade ALL + orphanRemoval = 완전한 부모-자식 관계 (생명주기가 완전히 일치할 때만)</text>
</svg>
