<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">JDK 주요 도구 분류</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">JDK bin/ 디렉터리 안의 실행 파일들</text>

  <!-- Row 1: Compiler + Runtime -->
  <!-- Compiler Tools -->
  <rect x="60" y="96" width="240" height="140" fill="#0f1a2e" rx="8" stroke="#1e2d4a" stroke-width="1"/>
  <text x="180" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">컴파일러 도구</text>
  <rect x="80" y="132" width="200" height="1" fill="#1e2d4a"/>
  <text x="98" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">javac</text>
  <text x="148" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">— .java → .class</text>
  <text x="98" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">javap</text>
  <text x="148" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">— 바이트코드 역어셈블</text>
  <text x="98" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">jdeps</text>
  <text x="148" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">— 의존성 분석</text>

  <!-- Runtime Tools -->
  <rect x="320" y="96" width="240" height="140" fill="#0f1a2e" rx="8" stroke="#1e2d4a" stroke-width="1"/>
  <text x="440" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">실행 도구</text>
  <rect x="340" y="132" width="200" height="1" fill="#1e2d4a"/>
  <text x="358" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">java</text>
  <text x="400" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">— JVM으로 클래스 실행</text>
  <text x="358" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">jshell</text>
  <text x="408" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">— REPL 환경</text>
  <text x="358" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">jrunscript</text>
  <text x="438" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">— 스크립트 실행</text>

  <!-- Package Tools -->
  <rect x="580" y="96" width="240" height="140" fill="#0f1a2e" rx="8" stroke="#1e2d4a" stroke-width="1"/>
  <text x="700" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#ce9178" text-anchor="middle">패키징 도구</text>
  <rect x="600" y="132" width="200" height="1" fill="#1e2d4a"/>
  <text x="618" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">jar</text>
  <text x="648" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">— JAR 아카이브 생성</text>
  <text x="618" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">jmod</text>
  <text x="658" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">— 모듈 파일 생성</text>
  <text x="618" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">jlink</text>
  <text x="658" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">— 커스텀 런타임 생성</text>

  <!-- Row 2: Diagnostic + Monitoring + Security -->
  <!-- Diagnostic Tools -->
  <rect x="60" y="258" width="240" height="180" fill="#1a0f0f" rx="8" stroke="#3a1e1e" stroke-width="1"/>
  <text x="180" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">진단 도구</text>
  <rect x="80" y="294" width="200" height="1" fill="#3a1e1e"/>
  <text x="98" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">jcmd</text>
  <text x="148" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">— JVM 진단 명령</text>
  <text x="98" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">jstack</text>
  <text x="148" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">— 스레드 덤프</text>
  <text x="98" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">jmap</text>
  <text x="148" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">— 힙 덤프</text>
  <text x="98" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">jstat</text>
  <text x="148" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">— GC/클래스 통계</text>
  <text x="98" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">jinfo</text>
  <text x="148" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">— JVM 플래그 조회</text>

  <!-- Monitoring Tools -->
  <rect x="320" y="258" width="240" height="180" fill="#0f1a18" rx="8" stroke="#1e3a34" stroke-width="1"/>
  <text x="440" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c5a8" text-anchor="middle">모니터링 도구</text>
  <rect x="340" y="294" width="200" height="1" fill="#1e3a34"/>
  <text x="358" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">jconsole</text>
  <text x="428" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">— GUI 모니터링</text>
  <text x="358" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">jps</text>
  <text x="388" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">— Java 프로세스 목록</text>
  <text x="358" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">jhsdb</text>
  <text x="408" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">— 힙/스택 디버거</text>
  <text x="358" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">jfr</text>
  <text x="388" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">— Flight Recorder</text>

  <!-- Security Tools -->
  <rect x="580" y="258" width="240" height="180" fill="#151428" rx="8" stroke="#2a2855" stroke-width="1"/>
  <text x="700" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">보안 &amp; 기타 도구</text>
  <rect x="600" y="294" width="200" height="1" fill="#2a2855"/>
  <text x="618" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">keytool</text>
  <text x="668" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">— 키스토어 관리</text>
  <text x="618" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">jarsigner</text>
  <text x="678" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">— JAR 서명</text>
  <text x="618" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">javadoc</text>
  <text x="678" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">— API 문서 생성</text>
  <text x="618" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">serialver</text>
  <text x="678" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">— serialVersionUID</text>

  <!-- Bottom label -->
  <text x="440" y="490" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">모든 도구는 $JAVA_HOME/bin/ 경로에 위치</text>
</svg>
