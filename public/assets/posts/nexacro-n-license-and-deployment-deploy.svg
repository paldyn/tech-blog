<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Nexacro N 배포 방식</text>

  <!-- ── Studio N box ── -->
  <rect x="60" y="150" width="180" height="140" rx="8" fill="#0f1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="150" y="198" text-anchor="middle" font-size="15" font-weight="700" fill="#7777cc">Nexacro</text>
  <text x="150" y="218" text-anchor="middle" font-size="15" font-weight="700" fill="#7777cc">Studio N</text>
  <text x="150" y="244" text-anchor="middle" font-size="12" fill="#888">프로젝트 편집</text>
  <text x="150" y="262" text-anchor="middle" font-size="12" fill="#888">빌드 패키징</text>

  <!-- Main arrow: Studio N → dist/ (shaft 44px, head width 20px) -->
  <text x="267" y="213" text-anchor="middle" font-size="11" fill="#888">빌드</text>
  <polygon points="242,220 286,220 286,214 300,224 286,234 286,228 242,228"
           fill="#555" stroke="#333" stroke-width="1"/>

  <!-- ── dist/ box ── -->
  <rect x="302" y="68" width="186" height="296" rx="8" fill="#0f1520" stroke="#e8e8e8" stroke-width="1"/>
  <text x="395" y="94" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">빌드 출력 (dist/)</text>

  <!-- Code block inside dist/ -->
  <rect x="316" y="106" width="158" height="148" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="332" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8" xml:space="preserve">dist/</text>
  <text x="332" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">  |-- nexacro.js</text>
  <text x="332" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">  |-- service.xml</text>
  <text x="332" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">  |-- TypeDef/</text>
  <text x="332" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">  |-- form/</text>
  <text x="332" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">  |-- css/</text>
  <text x="332" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">  \-- index.html</text>

  <!-- Notes in dist/ box -->
  <text x="395" y="276" text-anchor="middle" font-size="11" fill="#888">환경별 service.xml 분리</text>
  <text x="395" y="294" text-anchor="middle" font-size="11" fill="#888">dist/ = 정적 파일 전체</text>
  <text x="395" y="314" text-anchor="middle" font-size="11" fill="#888">웹서버 루트에 복사 배포</text>
  <text x="395" y="342" text-anchor="middle" font-size="11" fill="#888">HiApp 래핑 도구 입력</text>

  <!-- ── Arrows: dist/ → targets (shaft 44px, head width 20px) ── -->
  <!-- Arrow to Box 1 (y=122) -->
  <polygon points="490,118 534,118 534,112 548,122 534,132 534,126 490,126"
           fill="#555" stroke="#333" stroke-width="1"/>
  <!-- Arrow to Box 2 (y=224) -->
  <polygon points="490,220 534,220 534,214 548,224 534,234 534,228 490,228"
           fill="#555" stroke="#333" stroke-width="1"/>
  <!-- Arrow to Box 3 (y=328) -->
  <polygon points="490,324 534,324 534,318 548,328 534,338 534,332 490,332"
           fill="#555" stroke="#333" stroke-width="1"/>

  <!-- ── Target Box 1: 웹 서버 배포 ── -->
  <rect x="550" y="76" width="270" height="92" rx="8" fill="#0f1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="685" y="103" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">웹 서버 배포</text>
  <text x="685" y="124" text-anchor="middle" font-size="12" fill="#888">Apache · Nginx · IIS</text>
  <text x="685" y="144" text-anchor="middle" font-size="12" fill="#888">정적 파일 서빙 · CDN 결합 가능</text>

  <!-- ── Target Box 2: HiApp ── -->
  <rect x="550" y="178" width="270" height="92" rx="8" fill="#0f1520" stroke="#55c555" stroke-width="1.5"/>
  <text x="685" y="205" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">HiApp (하이브리드)</text>
  <text x="685" y="226" text-anchor="middle" font-size="12" fill="#888">iOS · Android · Windows PC</text>
  <text x="685" y="246" text-anchor="middle" font-size="12" fill="#888">앱 래핑 + 오프라인 지원</text>

  <!-- ── Target Box 3: eGov ── -->
  <rect x="550" y="280" width="270" height="92" rx="8" fill="#0f1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="685" y="307" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc">전자정부(eGov) 통합</text>
  <text x="685" y="328" text-anchor="middle" font-size="12" fill="#888">표준프레임워크 Spring Boot 연동</text>
  <text x="685" y="348" text-anchor="middle" font-size="12" fill="#888">공공 업무 시스템 · 정부24</text>

  <!-- Footer -->
  <text x="440" y="432" text-anchor="middle" font-size="11" fill="#444">© PALDYN · Nexacro N 완전 정복 시리즈</text>
</svg>
