<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Java 8 → 11: 사라진 것들</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">JDK에서 제거된 Java EE 모듈은 별도 의존성으로 다시 추가해야 한다</text>

  <!-- removed left -->
  <rect x="60" y="100" width="380" height="272" rx="10" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="250" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e05555">JDK에서 제거됨</text>
  <line x1="84" y1="148" x2="416" y2="148" stroke="#402020" stroke-width="1"/>
  <text x="90" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">java.xml.bind  (JAXB)</text>
  <text x="90" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">java.xml.ws  (JAX-WS)</text>
  <text x="90" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">java.activation  (JAF)</text>
  <text x="90" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">java.corba  (CORBA)</text>
  <text x="90" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">java.transaction  (JTA)</text>
  <text x="90" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">증상: ClassNotFoundException</text>
  <text x="90" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">NoClassDefFoundError</text>

  <!-- solution right -->
  <rect x="460" y="100" width="360" height="272" rx="10" fill="#102010" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555">해결: 의존성으로 추가</text>
  <line x1="484" y1="148" x2="796" y2="148" stroke="#204020" stroke-width="1"/>
  <text x="484" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">JAXB → jakarta.xml.bind</text>
  <text x="484" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">JAX-WS → jakarta.xml.ws</text>
  <text x="484" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">JAF → jakarta.activation</text>
  <text x="484" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">CORBA → 대안 기술로 재설계</text>
  <text x="484" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">Maven/Gradle 의존성 명시로</text>
  <text x="484" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">대부분 즉시 복구 가능</text>
</svg>
