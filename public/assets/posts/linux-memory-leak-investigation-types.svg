<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">메모리 누수 유형과 증상</text>

  <!-- Type 1: True leak -->
  <rect x="60" y="68" width="240" height="200" rx="8" fill="#1e0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="180" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">진성 누수</text>
  <text x="180" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">True Leak</text>
  <text x="75" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">할당 후 포인터 분실</text>
  <text x="75" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">free()를 호출할 수 없는 상태</text>
  <text x="75" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">C/C++에서 malloc 후 포인터 덮어씀</text>
  <text x="75" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">valgrind "definitely lost"</text>
  <text x="75" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">→ 시간이 갈수록 메모리 계속 증가</text>
  <text x="75" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">→ 결국 OOM Killer 발동</text>
  <text x="75" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">C/C++ 주요 원인</text>

  <!-- Type 2: Growth without leak -->
  <rect x="320" y="68" width="240" height="200" rx="8" fill="#1a1200" stroke="#e8c55e" stroke-width="1.5"/>
  <text x="440" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8c55e" text-anchor="middle">논리적 누수</text>
  <text x="440" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Logical Leak</text>
  <text x="335" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">참조는 있지만 더 쓰지 않음</text>
  <text x="335" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">GC 언어(Java/Python)의 주된 누수</text>
  <text x="335" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">전역 컨테이너에 계속 추가만 함</text>
  <text x="335" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">캐시에 만료 정책 없음</text>
  <text x="335" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8c55e">→ GC는 살아있는 객체로 판단</text>
  <text x="335" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">→ heap dump 분석 필요</text>
  <text x="335" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">Java/Python/Node 주요 원인</text>

  <!-- Type 3: Fragmentation -->
  <rect x="580" y="68" width="240" height="200" rx="8" fill="#0f1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="700" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">단편화</text>
  <text x="700" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Fragmentation</text>
  <text x="595" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">힙이 파편화되어 낭비</text>
  <text x="595" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">malloc은 큰 청크 요청, 실제 사용은 작음</text>
  <text x="595" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">glibc malloc arena 문제</text>
  <text x="595" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">tcmalloc/jemalloc으로 개선</text>
  <text x="595" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">→ RSS 높지만 실제 사용은 작음</text>
  <text x="595" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">→ /proc/PID/smaps 분석</text>
  <text x="595" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">멀티스레드 앱 주요 원인</text>

  <!-- Detection signals -->
  <rect x="60" y="290" width="760" height="80" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">누수 조기 탐지 신호</text>
  <text x="130" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">RSS 지속 증가</text>
  <text x="130" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">free -h 또는 smaps</text>
  <text x="330" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8c55e" text-anchor="middle">GC 빈도 증가</text>
  <text x="330" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">GC 로그 / JVM 메트릭</text>
  <text x="550" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle">OOM Killer 발동</text>
  <text x="550" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">dmesg | grep -i oom</text>
  <text x="740" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">스왑 급증</text>
  <text x="740" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">vmstat / swapon -s</text>

  <!-- Memory map -->
  <rect x="60" y="390" width="760" height="70" rx="8" fill="#0a0a14" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="413" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">프로세스 메모리 지표 해석</text>
  <text x="440" y="437" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">VSZ: 가상 주소 공간 (과장됨) | RSS: 실제 물리 메모리 사용 | PSS: 공유 메모리 비례 배분 | USS: 프로세스 단독 사용량</text>
  <text x="440" y="453" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">누수 지표로는 USS (smaps_rollup에서 확인) 가장 적합</text>
</svg>
