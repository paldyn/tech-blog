<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="aFwd" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="aMid" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e0a055"/>
    </marker>
    <marker id="aOri" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">CDN 다계층 캐시 — L1 엣지 · L2 미드티어 · Origin</text>

  <!-- User (left) -->
  <rect x="40" y="192" width="110" height="52" rx="8" fill="#0f1a2a" stroke="#2a5a8a" stroke-width="1.5"/>
  <text x="95" y="223" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">사용자</text>

  <!-- L1 Edge (tier-1) -->
  <rect x="220" y="120" width="165" height="196" rx="10" fill="#0b1a24" stroke="#2a6a8a" stroke-width="2"/>
  <text x="302" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">L1 엣지 (PoP)</text>
  <line x1="240" y1="168" x2="365" y2="168" stroke="#1a3a4a" stroke-width="1"/>
  <text x="302" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">인메모리 캐시</text>
  <text x="302" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">HIT Rate: ~90%</text>
  <text x="302" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">TTL: 짧음 (수 분)</text>
  <text x="302" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">수십~수백 대</text>
  <text x="302" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">RTT &lt; 20ms</text>

  <!-- L2 Mid-tier -->
  <rect x="460" y="120" width="165" height="196" rx="10" fill="#1a120b" stroke="#6a4a1a" stroke-width="2"/>
  <text x="542" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e0a055">L2 미드티어</text>
  <line x1="480" y1="168" x2="605" y2="168" stroke="#4a3a1a" stroke-width="1"/>
  <text x="542" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">대용량 SSD 캐시</text>
  <text x="542" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e0a055">HIT Rate: ~95%</text>
  <text x="542" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">TTL: 길음 (수 시간)</text>
  <text x="542" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">소수 지역 거점</text>
  <text x="542" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">RTT &lt; 50ms</text>

  <!-- Origin -->
  <rect x="700" y="185" width="150" height="86" rx="10" fill="#1a0f0b" stroke="#7a5a2a" stroke-width="2"/>
  <text x="775" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e0a055">Origin</text>
  <text x="775" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">원본 서버</text>
  <text x="775" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">최소 요청만</text>

  <!-- Arrows -->
  <line x1="150" y1="218" x2="220" y2="218" stroke="#7ec8e3" stroke-width="2" marker-end="url(#aFwd)"/>
  <text x="184" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">요청</text>

  <line x1="385" y1="218" x2="460" y2="218" stroke="#e0a055" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#aMid)"/>
  <text x="421" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e0a055">L1 MISS 시</text>

  <line x1="625" y1="218" x2="700" y2="228" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#aOri)"/>
  <text x="661" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">L2 MISS 시</text>

  <!-- Benefit note -->
  <rect x="40" y="356" width="800" height="80" rx="8" fill="#0f1219" stroke="#1a2a3a" stroke-width="1"/>
  <text x="440" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">미드티어(Shield) 효과</text>
  <text x="440" y="404" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">수백 개 L1 PoP가 Origin에 직접 요청하는 대신 소수 L2가 집약 → Origin 요청 수 95%+ 감소</text>
  <text x="440" y="424" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">Cloudflare Tiered Cache / AWS CloudFront Origin Shield 등이 이 구조를 제공</text>
</svg>
