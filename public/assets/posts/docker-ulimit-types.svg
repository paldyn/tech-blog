<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Docker ulimit 주요 타입</text>

  <!-- Header row -->
  <text x="80" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">타입</text>
  <text x="260" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">기본값 (soft/hard)</text>
  <text x="480" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">설명</text>

  <line x1="60" y1="100" x2="820" y2="100" stroke="#2a2a3a" stroke-width="1"/>

  <!-- nofile -->
  <rect x="60" y="108" width="160" height="52" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="140" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">nofile</text>
  <text x="140" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">열린 파일 디스크립터 수</text>

  <rect x="240" y="108" width="200" height="52" rx="6" fill="#111827" stroke="#2a2a3a" stroke-width="1"/>
  <text x="340" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b5cea8" text-anchor="middle">1024 / 524288</text>
  <text x="340" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">soft=1024, hard=524288</text>

  <rect x="460" y="108" width="360" height="52" rx="6" fill="#111827" stroke="#2a2a3a" stroke-width="1"/>
  <text x="640" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">프로세스가 동시에 열 수 있는 파일 수</text>
  <text x="640" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">네트워크 서버에서 가장 중요</text>

  <!-- nproc -->
  <rect x="60" y="174" width="160" height="52" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="140" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">nproc</text>
  <text x="140" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">프로세스/스레드 수</text>

  <rect x="240" y="174" width="200" height="52" rx="6" fill="#111827" stroke="#2a2a3a" stroke-width="1"/>
  <text x="340" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b5cea8" text-anchor="middle">1024 / 1048576</text>
  <text x="340" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">호스트 커널 설정에 종속</text>

  <rect x="460" y="174" width="360" height="52" rx="6" fill="#111827" stroke="#2a2a3a" stroke-width="1"/>
  <text x="640" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">사용자당 생성 가능한 프로세스 총 수</text>
  <text x="640" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">fork bomb 방지에 활용</text>

  <!-- memlock -->
  <rect x="60" y="240" width="160" height="52" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="140" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">memlock</text>
  <text x="140" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">메모리 잠금 크기</text>

  <rect x="240" y="240" width="200" height="52" rx="6" fill="#111827" stroke="#2a2a3a" stroke-width="1"/>
  <text x="340" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b5cea8" text-anchor="middle">67108864 (64MB)</text>
  <text x="340" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">bytes 단위</text>

  <rect x="460" y="240" width="360" height="52" rx="6" fill="#111827" stroke="#2a2a3a" stroke-width="1"/>
  <text x="640" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">스왑 불가 메모리 잠금 크기</text>
  <text x="640" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Elasticsearch, Kafka 등에서 unlimited 필요</text>

  <!-- stack -->
  <rect x="60" y="306" width="160" height="52" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="140" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">stack</text>
  <text x="140" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">스택 크기</text>

  <rect x="240" y="306" width="200" height="52" rx="6" fill="#111827" stroke="#2a2a3a" stroke-width="1"/>
  <text x="340" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b5cea8" text-anchor="middle">8MB / unlimited</text>
  <text x="340" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">bytes 단위</text>

  <rect x="460" y="306" width="360" height="52" rx="6" fill="#111827" stroke="#2a2a3a" stroke-width="1"/>
  <text x="640" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">스레드 스택 최대 크기</text>
  <text x="640" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Java, JVM 계열에서 조정 필요</text>

  <!-- core -->
  <rect x="60" y="372" width="160" height="52" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="140" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">core</text>
  <text x="140" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">코어 덤프 크기</text>

  <rect x="240" y="372" width="200" height="52" rx="6" fill="#111827" stroke="#2a2a3a" stroke-width="1"/>
  <text x="340" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b5cea8" text-anchor="middle">0 / unlimited</text>
  <text x="340" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">0 = 코어 덤프 비활성</text>

  <rect x="460" y="372" width="360" height="52" rx="6" fill="#111827" stroke="#2a2a3a" stroke-width="1"/>
  <text x="640" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">크래시 덤프 파일 최대 크기</text>
  <text x="640" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">디버깅용으로 unlimited 설정</text>

  <!-- Info note -->
  <rect x="60" y="436" width="760" height="28" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="455" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">soft ≤ hard · 컨테이너 hard는 호스트 hard를 초과할 수 없음 · unlimited = -1</text>
</svg>
