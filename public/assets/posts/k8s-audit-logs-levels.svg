<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">감사 레벨 4단계와 정책 작성</text>

  <!-- levels (left) -->
  <rect x="60" y="90" width="360" height="74" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#9aa4b8">None</text>
  <text x="80" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">기록 안 함 — 노이즈 소스 제외용 (kube-proxy의 watch 등)</text>

  <rect x="60" y="178" width="360" height="74" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">Metadata</text>
  <text x="80" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">누가 · 언제 · 무엇에 · 어떤 동사 — 본문 제외 (기본 권장)</text>

  <rect x="60" y="266" width="360" height="74" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#55c555">Request</text>
  <text x="80" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Metadata + 요청 본문 (무엇을 어떻게 바꾸려 했는가)</text>

  <rect x="60" y="354" width="360" height="74" rx="8" fill="#201a10" stroke="#ce9178" stroke-width="1.5"/>
  <text x="80" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#ce9178">RequestResponse</text>
  <text x="80" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">요청 + 응답 본문 전체 — 가장 상세, 가장 큰 용량</text>

  <text x="240" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">↓ 아래로 갈수록 상세해지고 로그 용량 ↑</text>

  <!-- policy yaml (right) -->
  <text x="650" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">정책 파일 — 첫 매칭 규칙이 적용</text>

  <rect x="460" y="98" width="380" height="270" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="126" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">apiVersion</tspan>: audit.k8s.io/v1</text>
  <text x="476" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">kind</tspan>: Policy</text>
  <text x="476" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">rules</tspan>:</text>
  <text x="476" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  - level: <tspan fill="#9aa4b8">None</tspan></text>
  <text x="476" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    users: [<tspan fill="#ce9178">"system:kube-proxy"</tspan>]</text>
  <text x="476" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  - level: <tspan fill="#7ec8e3" font-weight="600">Metadata</tspan></text>
  <text x="476" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    resources:</text>
  <text x="476" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      - resources: [<tspan fill="#ce9178">"secrets"</tspan>]</text>
  <text x="476" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  - level: <tspan fill="#ce9178">RequestResponse</tspan></text>
  <text x="476" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    verbs: [<tspan fill="#ce9178">"delete"</tspan>, <tspan fill="#ce9178">"patch"</tspan>]</text>

  <rect x="460" y="388" width="380" height="80" rx="8" fill="#200f10" stroke="#e05555" stroke-width="1.5"/>
  <text x="650" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">Secret은 절대 Request 이상으로 기록 금지</text>
  <text x="650" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">본문을 기록하면 시크릿 값이 감사 로그에 평문으로 남는다</text>
  <text x="650" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">→ Metadata 레벨로 제한하는 규칙을 반드시 앞쪽에</text>
</svg>
