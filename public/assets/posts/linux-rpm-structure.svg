<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">.rpm 패키지 구조와 rpm 명령</text>

  <!-- rpm file name anatomy -->
  <rect x="60" y="72" width="760" height="72" rx="8" fill="#0a1020" stroke="#7ec8e3" stroke-width="2"/>
  <text x="80" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">파일명 해부</text>
  <text x="80" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e8e8e8">nginx  -  1.26.0  -  1.el9  .  x86_64  .rpm</text>
  <!-- Annotations -->
  <text x="85" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">이름</text>
  <text x="186" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">버전</text>
  <text x="290" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e0a855">릴리스.배포판</text>
  <text x="450" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">아키텍처</text>

  <!-- rpm internal structure -->
  <rect x="60" y="164" width="340" height="180" rx="8" fill="#0d0d0d" stroke="#333"/>
  <text x="80" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">.rpm 내부 구성</text>

  <rect x="80" y="200" width="300" height="32" rx="4" fill="#111" stroke="#7ec8e3"/>
  <text x="230" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">Lead (매직 바이트, 서명 포인터)</text>

  <rect x="80" y="240" width="300" height="32" rx="4" fill="#111" stroke="#55c555"/>
  <text x="230" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">Signature (GPG/SHA 서명)</text>

  <rect x="80" y="280" width="300" height="32" rx="4" fill="#111" stroke="#7777cc"/>
  <text x="230" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc" text-anchor="middle">Header (메타데이터, 의존성, 스크립트)</text>

  <rect x="80" y="320" width="300" height="32" rx="4" fill="#111" stroke="#e05555"/>
  <text x="230" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" text-anchor="middle">Payload (cpio.gz — 실제 파일)</text>

  <!-- rpm db -->
  <rect x="460" y="164" width="360" height="180" rx="8" fill="#0d0d0d" stroke="#333"/>
  <text x="480" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">rpm 데이터베이스</text>
  <text x="480" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">/var/lib/rpm/</text>
  <text x="480" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">Packages</text>
  <text x="570" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  주 DB (BDB)</text>
  <text x="480" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">Name</text>
  <text x="530" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  이름 인덱스</text>
  <text x="480" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">Basenames</text>
  <text x="560" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  파일 인덱스</text>
  <text x="480" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">• DB 손상 시: rpm --rebuilddb</text>
  <text x="480" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• RHEL 9+: SQLite 기반으로 전환</text>
  <text x="480" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• 백업: cp -a /var/lib/rpm /var/lib/rpm.bak</text>

  <!-- Bottom commands -->
  <rect x="60" y="364" width="760" height="72" rx="8" fill="#070b14" stroke="#1e2433"/>
  <text x="80" y="388" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># GPG 키 가져오기 후 서명 검증</text>
  <text x="80" y="406" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">rpm --import https://nginx.org/keys/nginx_signing.key</text>
  <text x="80" y="424" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">rpm -K nginx.rpm</text>
  <text x="400" y="424" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">  # OK → 서명 유효</text>
</svg>
