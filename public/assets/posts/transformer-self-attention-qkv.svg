<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Self-Attention: Q, K, V 계산 과정</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888">입력 벡터 → 선형 투영 → 어텐션 계산</text>

  <!-- Input tokens -->
  <text x="440" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">입력 시퀀스 임베딩 X ∈ R^{n × d_model}</text>
  <rect x="100" y="114" width="90" height="40" rx="6" fill="#0d1117" stroke="#888" stroke-width="1.5"/>
  <text x="145" y="139" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">x₁</text>
  <rect x="240" y="114" width="90" height="40" rx="6" fill="#0d1117" stroke="#888" stroke-width="1.5"/>
  <text x="285" y="139" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">x₂</text>
  <rect x="380" y="114" width="90" height="40" rx="6" fill="#0d1117" stroke="#888" stroke-width="1.5"/>
  <text x="425" y="139" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">x₃</text>
  <rect x="520" y="114" width="90" height="40" rx="6" fill="#0d1117" stroke="#888" stroke-width="1.5"/>
  <text x="565" y="139" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">x₄</text>

  <!-- Linear projections W_Q, W_K, W_V -->
  <text x="60" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">선형 투영 (공유 가중치 행렬 W_Q, W_K, W_V ∈ R^{d_model × d_k})</text>

  <!-- Q row -->
  <rect x="80" y="212" width="70" height="36" rx="4" fill="#0d1117" stroke="#e05555" stroke-width="2"/>
  <text x="115" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555">Q₁</text>
  <rect x="210" y="212" width="70" height="36" rx="4" fill="#0d1117" stroke="#e05555" stroke-width="2"/>
  <text x="245" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555">Q₂</text>
  <rect x="340" y="212" width="70" height="36" rx="4" fill="#0d1117" stroke="#e05555" stroke-width="2"/>
  <text x="375" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555">Q₃</text>
  <rect x="470" y="212" width="70" height="36" rx="4" fill="#0d1117" stroke="#e05555" stroke-width="2"/>
  <text x="505" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555">Q₄</text>
  <text x="570" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">= X·W_Q  Query</text>

  <!-- K row -->
  <rect x="80" y="260" width="70" height="36" rx="4" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <text x="115" y="283" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">K₁</text>
  <rect x="210" y="260" width="70" height="36" rx="4" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <text x="245" y="283" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">K₂</text>
  <rect x="340" y="260" width="70" height="36" rx="4" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <text x="375" y="283" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">K₃</text>
  <rect x="470" y="260" width="70" height="36" rx="4" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <text x="505" y="283" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">K₄</text>
  <text x="570" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">= X·W_K  Key</text>

  <!-- V row -->
  <rect x="80" y="308" width="70" height="36" rx="4" fill="#0d1117" stroke="#7ec8e3" stroke-width="2"/>
  <text x="115" y="331" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">V₁</text>
  <rect x="210" y="308" width="70" height="36" rx="4" fill="#0d1117" stroke="#7ec8e3" stroke-width="2"/>
  <text x="245" y="331" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">V₂</text>
  <rect x="340" y="308" width="70" height="36" rx="4" fill="#0d1117" stroke="#7ec8e3" stroke-width="2"/>
  <text x="375" y="331" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">V₃</text>
  <rect x="470" y="308" width="70" height="36" rx="4" fill="#0d1117" stroke="#7ec8e3" stroke-width="2"/>
  <text x="505" y="331" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">V₄</text>
  <text x="570" y="331" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">= X·W_V  Value</text>

  <!-- Formula -->
  <rect x="60" y="364" width="760" height="52" rx="8" fill="#111" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc">Attention(Q, K, V) = softmax( Q·Kᵀ / √d_k ) · V</text>
  <text x="440" y="408" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Q·Kᵀ ∈ R^{n×n}  →  각 쿼리가 모든 키와 얼마나 관련되는지 점수 행렬</text>

  <!-- Code block -->
  <rect x="60" y="428" width="760" height="52" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="450" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">Q = x @ W_Q;  K = x @ W_K;  V = x @ W_V</text>
  <text x="76" y="468" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">scores = (Q @ K.transpose(-</text>
  <text x="286" y="468" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">2</text>
  <text x="294" y="468" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">,-</text>
  <text x="310" y="468" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">1</text>
  <text x="318" y="468" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">)) / math.sqrt(d_k);  out = F.softmax(scores,-</text>
  <text x="680" y="468" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">1</text>
  <text x="688" y="468" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">) @ V</text>
</svg>
