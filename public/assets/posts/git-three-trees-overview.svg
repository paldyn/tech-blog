<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto">
      <polygon points="0 0, 20 7, 0 14" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
    <marker id="arrG" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto">
      <polygon points="0 0, 20 7, 0 14" fill="#55c555" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Git의 세 가지 트리</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">Git이 파일 변경을 추적하는 세 개의 공간</text>

  <!-- Tree 1: Working Directory -->
  <rect x="60" y="90" width="230" height="360" rx="10" fill="#111" stroke="#2a2a1a"/>
  <rect x="60" y="90" width="230" height="48" rx="10" fill="#1a1a0d" stroke="#3a3a1a"/>
  <text x="175" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8c55e">작업 디렉토리</text>
  <text x="175" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Working Directory</text>
  <text x="175" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">실제 파일이 존재하는 공간</text>

  <!-- Files in working dir -->
  <rect x="82" y="186" width="186" height="36" rx="5" fill="#1a1a12" stroke="#2a2a1e"/>
  <text x="175" y="209" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">index.html</text>

  <rect x="82" y="232" width="186" height="36" rx="5" fill="#1a150d" stroke="#2a2010"/>
  <text x="175" y="255" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8c55e">app.js  ← 수정됨</text>

  <rect x="82" y="278" width="186" height="36" rx="5" fill="#120d1a" stroke="#1e1020"/>
  <text x="175" y="301" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#cc7ec8">new.css  ← 추가됨</text>

  <text x="175" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">에디터에서 파일을 열고</text>
  <text x="175" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">코드를 편집하는 공간</text>
  <text x="175" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8c55e">git status로 확인</text>
  <text x="175" y="424" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8c55e">변경된 파일 표시</text>

  <!-- Arrow 1→2 -->
  <line x1="293" y1="260" x2="327" y2="260" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="310" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">git add</text>

  <!-- Tree 2: Staging Area / Index -->
  <rect x="330" y="90" width="220" height="360" rx="10" fill="#111" stroke="#1e2a3a"/>
  <rect x="330" y="90" width="220" height="48" rx="10" fill="#0d1520" stroke="#1e2a3a"/>
  <text x="440" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">스테이징 영역</text>
  <text x="440" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Index / Staging Area</text>
  <text x="440" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">다음 커밋에 포함될 변경 사항</text>

  <!-- Files staged -->
  <rect x="350" y="186" width="180" height="36" rx="5" fill="#0d1520" stroke="#1e2a40"/>
  <text x="440" y="209" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">index.html</text>

  <rect x="350" y="232" width="180" height="36" rx="5" fill="#0d1520" stroke="#1e2a40"/>
  <text x="440" y="255" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">app.js</text>

  <text x="440" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">커밋으로 묶을 변경을</text>
  <text x="440" y="346" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">선별해서 담아두는 공간</text>
  <text x="440" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">git diff --staged 로 확인</text>
  <text x="440" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">.git/index 파일에 저장</text>

  <!-- Arrow 2→3 -->
  <line x1="553" y1="260" x2="587" y2="260" stroke="#55c555" stroke-width="2.5" marker-end="url(#arrG)"/>
  <text x="570" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">git commit</text>

  <!-- Tree 3: Repository / HEAD -->
  <rect x="590" y="90" width="230" height="360" rx="10" fill="#111" stroke="#1e3a1e"/>
  <rect x="590" y="90" width="230" height="48" rx="10" fill="#0d1a0d" stroke="#1e3a1e"/>
  <text x="705" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">저장소 (HEAD)</text>
  <text x="705" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Repository / HEAD</text>
  <text x="705" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">커밋된 이력 저장소</text>

  <!-- Commits -->
  <circle cx="650" cy="220" r="22" fill="#0d1a0d" stroke="#55c555"/>
  <text x="650" y="225" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#55c555">c3</text>
  <circle cx="720" cy="220" r="22" fill="#0d1a0d" stroke="#55c555"/>
  <text x="720" y="225" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#55c555">c4</text>
  <line x1="672" y1="220" x2="697" y2="220" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrG)"/>

  <text x="705" y="290" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">HEAD → main</text>

  <text x="705" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">영구적으로 저장된</text>
  <text x="705" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">버전 이력</text>
  <text x="705" y="398" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">git log 로 확인</text>
  <text x="705" y="416" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">.git/objects 에 저장</text>

  <!-- bottom note -->
  <text x="440" y="474" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">reset, checkout, restore 등 대부분의 Git 명령어는 이 세 트리 사이의 상태를 조작한다</text>
</svg>
