<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">apt search · show · cache — 패키지 탐색</text>

  <!-- Search flow -->
  <rect x="60" y="76" width="180" height="52" rx="8" fill="#0d0d0d" stroke="#555"/>
  <text x="150" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">로컬 캐시</text>
  <text x="150" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">/var/lib/apt/lists/</text>

  <!-- arrow to apt search -->
  <line x1="240" y1="102" x2="290" y2="102" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="288,97 300,102 288,107" fill="#7ec8e3"/>
  <text x="255" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">조회</text>

  <rect x="300" y="76" width="200" height="52" rx="8" fill="#0a1020" stroke="#7ec8e3" stroke-width="2"/>
  <text x="400" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">apt search KEYWORD</text>
  <text x="400" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">이름·설명 정규표현식 검색</text>

  <!-- arrow to result -->
  <line x1="500" y1="102" x2="550" y2="102" stroke="#55c555" stroke-width="2"/>
  <polygon points="548,97 560,102 548,107" fill="#55c555"/>

  <rect x="560" y="76" width="260" height="52" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="2"/>
  <text x="690" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555" text-anchor="middle">패키지 목록 출력</text>
  <text x="690" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">name/version — description</text>

  <!-- Command examples -->
  <rect x="60" y="152" width="760" height="256" rx="8" fill="#000000" stroke="#3a4a6e"/>
  <text x="80" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">주요 탐색 명령어</text>

  <!-- search -->
  <text x="80" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 이름/설명에서 키워드 검색</text>
  <text x="80" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">apt search nginx</text>
  <text x="80" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">apt search </text>
  <text x="148" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"^python3-"</text>
  <text x="80" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 상세 정보 조회</text>
  <text x="80" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">apt show nginx</text>
  <text x="80" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># apt-cache 계열 (스크립트 친화)</text>
  <text x="80" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">apt-cache search nginx</text>
  <text x="80" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">apt-cache show nginx</text>
  <text x="80" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">apt-cache policy nginx</text>
  <text x="80" y="370" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 설치 후 파일 확인 (dpkg)</text>
  <text x="80" y="388" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">dpkg -L nginx</text>

  <!-- right side descriptions -->
  <text x="460" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">apt show 출력 필드</text>
  <text x="460" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">Package:</text>
  <text x="538" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888"> 패키지명</text>
  <text x="460" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">Version:</text>
  <text x="534" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888"> 설치 가능 버전</text>
  <text x="460" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">Depends:</text>
  <text x="542" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888"> 필수 의존성</text>
  <text x="460" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">Recommends:</text>
  <text x="570" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888"> 권장 패키지</text>
  <text x="460" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">Installed-Size:</text>
  <text x="584" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888"> 설치 후 용량</text>
  <text x="460" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">Homepage:</text>
  <text x="546" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888"> 공식 사이트</text>
  <text x="460" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">apt-cache policy</text>
  <text x="460" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888"> 설치된 버전 vs 후보 버전</text>
  <text x="460" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888"> 저장소 우선순위 표시</text>
</svg>
