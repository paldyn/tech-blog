<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Vercel 배포 프로세스</text>

  <!-- Step 1: Local Dev -->
  <rect x="60" y="90" width="160" height="70" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="140" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">로컬 개발</text>
  <text x="140" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">git push origin main</text>

  <!-- Arrow 1→2 -->
  <line x1="220" y1="125" x2="278" y2="125" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>

  <!-- Step 2: GitHub -->
  <rect x="280" y="90" width="160" height="70" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="360" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">GitHub</text>
  <text x="360" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Webhook 트리거</text>

  <!-- Arrow 2→3 -->
  <line x1="440" y1="125" x2="498" y2="125" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>

  <!-- Step 3: Vercel Build -->
  <rect x="500" y="90" width="160" height="70" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="580" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Vercel 빌드</text>
  <text x="580" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">next build 자동 실행</text>

  <!-- Arrow 3→4 -->
  <line x1="660" y1="125" x2="718" y2="125" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>

  <!-- Step 4: Edge Network -->
  <rect x="720" y="90" width="100" height="70" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="770" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Edge</text>
  <text x="770" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Network</text>

  <!-- Branch types section -->
  <text x="60" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">브랜치별 배포 전략</text>

  <!-- main branch -->
  <rect x="60" y="228" width="220" height="76" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">main 브랜치</text>
  <text x="80" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">→ Production 배포</text>
  <text x="80" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">paldyn.com (커스텀 도메인)</text>

  <!-- PR branch -->
  <rect x="310" y="228" width="220" height="76" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="330" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">PR / 기타 브랜치</text>
  <text x="330" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">→ Preview 배포</text>
  <text x="330" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">*.vercel.app (고유 URL)</text>

  <!-- CLI box -->
  <rect x="560" y="228" width="260" height="76" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="580" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Vercel CLI 수동 배포</text>
  <text x="580" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">vercel --prod</text>
  <text x="580" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">GitHub 없이도 배포 가능</text>

  <!-- Code block: vercel.json -->
  <text x="60" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">vercel.json 설정 예시</text>

  <rect x="60" y="370" width="370" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="394" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">{</text>
  <text x="76" y="412" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ce9178">  "buildCommand"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"next build"</tspan><tspan fill="#ffffff">,</tspan>
  </text>
  <text x="76" y="430" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ce9178">  "outputDirectory"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">".next"</tspan><tspan fill="#ffffff">,</tspan>
  </text>
  <text x="76" y="448" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ce9178">  "framework"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"nextjs"</tspan><tspan fill="#ffffff">,</tspan>
  </text>
  <text x="76" y="466" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ce9178">  "regions"</tspan><tspan fill="#ffffff">: [</tspan><tspan fill="#ce9178">"icn1"</tspan><tspan fill="#ffffff">]</tspan>
  </text>
  <text x="76" y="484" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>

  <!-- Env vars box -->
  <rect x="460" y="370" width="360" height="120" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="480" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">환경 변수 범위</text>
  <text x="480" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">Production</text>
  <text x="570" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">— main 브랜치 배포에만 적용</text>
  <text x="480" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">Preview</text>
  <text x="540" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">— PR 배포에만 적용</text>
  <text x="480" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">Development</text>
  <text x="578" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">— vercel dev 시 적용</text>
  <text x="480" y="484" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Vercel Dashboard → Settings → Env Vars</text>
</svg>
