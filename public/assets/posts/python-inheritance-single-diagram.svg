<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">단일 상속 계층 구조</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">부모 클래스의 속성과 메서드를 자식 클래스가 물려받습니다</text>

  <!-- Parent class box -->
  <rect x="290" y="95" width="300" height="110" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="2"/>
  <rect x="290" y="95" width="300" height="34" rx="8" fill="#1a2040" stroke="#7ec8e3" stroke-width="2"/>
  <rect x="290" y="129" width="300" height="1" fill="#1e2433"/>
  <text x="440" y="118" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" font-weight="700" fill="#7ec8e3">Animal</text>
  <text x="310" y="149" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">name: str</text>
  <text x="310" y="165" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">age: int</text>
  <text x="310" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">+ speak() → str</text>

  <!-- Inheritance arrows -->
  <!-- Left child -->
  <line x1="340" y1="205" x2="220" y2="290" stroke="#888" stroke-width="2" stroke-dasharray="4,4"/>
  <polygon points="220,290 210,274 234,278" fill="#0a0a0a" stroke="#888" stroke-width="1.5"/>

  <!-- Right child -->
  <line x1="540" y1="205" x2="660" y2="290" stroke="#888" stroke-width="2" stroke-dasharray="4,4"/>
  <polygon points="660,290 646,274 670,278" fill="#0a0a0a" stroke="#888" stroke-width="1.5"/>

  <!-- Label on arrows -->
  <text x="255" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">상속</text>
  <text x="620" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">상속</text>

  <!-- Child 1: Dog -->
  <rect x="90" y="290" width="260" height="120" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <rect x="90" y="290" width="260" height="34" rx="8" fill="#1a2e1a" stroke="#55c555" stroke-width="2"/>
  <rect x="90" y="324" width="260" height="1" fill="#1e2433"/>
  <text x="220" y="313" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" font-weight="700" fill="#55c555">Dog</text>
  <text x="110" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">breed: str  ← 추가 속성</text>
  <text x="110" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">+ speak() → "Woof"</text>
  <text x="110" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">+ fetch()  ← 추가 메서드</text>
  <text x="110" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  name, age (상속)</text>

  <!-- Child 2: Cat -->
  <rect x="530" y="290" width="260" height="120" rx="8" fill="#0d1117" stroke="#e8c040" stroke-width="2"/>
  <rect x="530" y="290" width="260" height="34" rx="8" fill="#2e2a10" stroke="#e8c040" stroke-width="2"/>
  <rect x="530" y="324" width="260" height="1" fill="#1e2433"/>
  <text x="660" y="313" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" font-weight="700" fill="#e8c040">Cat</text>
  <text x="550" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">indoor: bool ← 추가 속성</text>
  <text x="550" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8c040">+ speak() → "Meow"</text>
  <text x="550" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">+ purr()   ← 추가 메서드</text>
  <text x="550" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  name, age (상속)</text>

  <!-- Note -->
  <rect x="60" y="430" width="760" height="20" rx="4" fill="none"/>
  <text x="440" y="445" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6a8aa0">자식 클래스는 부모 메서드를 오버라이드하거나(speak), 새 메서드를 추가(fetch/purr)하거나, 그대로 상속할 수 있습니다</text>
</svg>
