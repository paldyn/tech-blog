<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ps aux 출력 컬럼 해설</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">각 컬럼의 의미와 주요 값 해석</text>

  <!-- ps aux output header row -->
  <rect x="50" y="86" width="780" height="34" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1.5"/>
  <text x="66" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">USER       PID  %CPU  %MEM    VSZ   RSS TTY      STAT  START   TIME COMMAND</text>

  <!-- Sample row 1 -->
  <rect x="50" y="126" width="780" height="28" rx="0" fill="#0d1422"/>
  <text x="66" y="145" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">root         1   0.0   0.1  21708  9812 ?        Ss   09:01   0:02 /sbin/init</text>

  <!-- Sample row 2 -->
  <rect x="50" y="154" width="780" height="28" rx="0" fill="#0a0a0a"/>
  <text x="66" y="173" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">user      1234   2.1   0.8 123456 32400 pts/0    Sl+  10:22   0:15 python app.py</text>

  <!-- Sample row 3 -->
  <rect x="50" y="182" width="780" height="28" rx="0" fill="#0d1422"/>
  <text x="66" y="201" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">www-data  4567   0.3   0.2  89012 10240 ?        S    09:05   0:31 nginx: worker</text>

  <!-- Column annotation boxes -->
  <!-- USER -->
  <line x1="88" y1="210" x2="88" y2="238" stroke="#888" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="50" y="238" width="72" height="56" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="86" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">USER</text>
  <text x="86" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">실행</text>
  <text x="86" y="289" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">사용자</text>

  <!-- PID -->
  <line x1="148" y1="210" x2="148" y2="238" stroke="#888" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="122" y="238" width="60" height="56" rx="6" fill="#0f2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="152" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">PID</text>
  <text x="152" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">프로세스</text>
  <text x="152" y="289" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">번호</text>

  <!-- %CPU -->
  <line x1="208" y1="210" x2="208" y2="238" stroke="#888" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="186" y="238" width="68" height="56" rx="6" fill="#1a1500" stroke="#e8e8e8" stroke-width="1.5"/>
  <text x="220" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">%CPU</text>
  <text x="220" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">CPU</text>
  <text x="220" y="289" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">사용률</text>

  <!-- %MEM -->
  <line x1="278" y1="210" x2="278" y2="238" stroke="#888" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="256" y="238" width="68" height="56" rx="6" fill="#1a1500" stroke="#e8e8e8" stroke-width="1.5"/>
  <text x="290" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">%MEM</text>
  <text x="290" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">물리메모리</text>
  <text x="290" y="289" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">사용률</text>

  <!-- VSZ -->
  <line x1="358" y1="210" x2="358" y2="238" stroke="#888" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="326" y="238" width="64" height="56" rx="6" fill="#101020" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="358" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">VSZ</text>
  <text x="358" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">가상메모리</text>
  <text x="358" y="289" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">크기(KB)</text>

  <!-- RSS -->
  <line x1="428" y1="210" x2="428" y2="238" stroke="#888" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="396" y="238" width="64" height="56" rx="6" fill="#101020" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="428" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">RSS</text>
  <text x="428" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">실물리메모리</text>
  <text x="428" y="289" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">크기(KB)</text>

  <!-- TTY -->
  <line x1="500" y1="210" x2="500" y2="238" stroke="#888" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="472" y="238" width="56" height="56" rx="6" fill="#1a1a0a" stroke="#e8e8e8" stroke-width="1"/>
  <text x="500" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">TTY</text>
  <text x="500" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">터미널</text>
  <text x="500" y="289" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">?=없음</text>

  <!-- STAT -->
  <line x1="568" y1="210" x2="568" y2="238" stroke="#888" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="534" y="238" width="68" height="56" rx="6" fill="#200a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="568" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">STAT</text>
  <text x="568" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">프로세스</text>
  <text x="568" y="289" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">상태코드</text>

  <!-- COMMAND -->
  <line x1="740" y1="210" x2="740" y2="238" stroke="#888" stroke-width="1" stroke-dasharray="3,2"/>
  <rect x="698" y="238" width="112" height="56" rx="6" fill="#1a1a0a" stroke="#e8e8e8" stroke-width="1"/>
  <text x="754" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">COMMAND</text>
  <text x="754" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">실행 명령어</text>
  <text x="754" y="289" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(인수 포함)</text>

  <!-- STAT legend -->
  <rect x="50" y="316" width="780" height="150" rx="8" fill="#111827" stroke="#1e2d45" stroke-width="1.5"/>
  <text x="440" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">STAT 상태 코드 해석</text>

  <!-- STAT codes in a grid -->
  <text x="80" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">R</text>
  <text x="100" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Running / Runnable</text>

  <text x="300" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">S</text>
  <text x="320" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Sleeping (인터럽트 가능)</text>

  <text x="560" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">D</text>
  <text x="580" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">I/O 대기 (kill 불가)</text>

  <text x="80" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">Z</text>
  <text x="100" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Zombie (종료, 미수거)</text>

  <text x="300" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">T</text>
  <text x="320" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Stopped (SIGSTOP)</text>

  <text x="560" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">I</text>
  <text x="580" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Idle kernel thread</text>

  <!-- Modifier codes -->
  <text x="80" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">수식자 (STAT 두 번째 문자)</text>
  <text x="80" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">s</text>
  <text x="96" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">세션 리더   </text>
  <text x="200" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">+</text>
  <text x="216" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">포그라운드 프로세스 그룹   </text>
  <text x="440" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">l</text>
  <text x="456" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">멀티스레드   </text>
  <text x="560" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">&lt;</text>
  <text x="576" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">높은 우선순위(nice &lt; 0)</text>
</svg>
