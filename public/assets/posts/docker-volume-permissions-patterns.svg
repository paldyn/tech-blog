<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 340" width="880" height="340">
  <rect width="880" height="340" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">권한 설정 패턴 예시</text>

  <!-- Pattern 1: Dockerfile entrypoint chown -->
  <text x="80" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">패턴 1: entrypoint.sh에서 chown</text>
  <rect x="80" y="88" width="340" height="170" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">#!/bin/sh</tspan></text>
  <text x="96" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8"># entrypoint.sh</tspan></text>
  <text x="96" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8"># root로 먼저 chown, 이후 비루트로 전환</tspan></text>
  <text x="96" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">chown</tspan><tspan fill="#ffffff"> -R app:app /app/data</tspan></text>
  <text x="96" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">exec su-exec</tspan><tspan fill="#ffffff"> app </tspan><tspan fill="#ce9178">"$@"</tspan></text>
  <text x="96" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8"># su-exec: alpine에서 gosu 대체제</tspan></text>
  <text x="96" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8"># gosu: Ubuntu/Debian 기반</tspan></text>
  <text x="96" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8"># exec gosu app "$@"</tspan></text>

  <!-- Pattern 2: –user flag -->
  <text x="460" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">패턴 2: docker run --user</text>
  <rect x="460" y="88" width="360" height="170" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8"># 호스트 파일 소유자와 UID 일치</tspan></text>
  <text x="476" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8"># 먼저 디렉터리 소유자 확인</tspan></text>
  <text x="476" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">$ stat -c "%u:%g" ./data</tspan></text>
  <text x="476" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#b5cea8">1000</tspan><tspan fill="#ffffff">:</tspan><tspan fill="#b5cea8">1000</tspan></text>
  <text x="476" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8"># 동일 UID로 컨테이너 실행</tspan></text>
  <text x="476" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">docker run</tspan><tspan fill="#ffffff"> --user </tspan><tspan fill="#b5cea8">1000</tspan><tspan fill="#ffffff">:</tspan><tspan fill="#b5cea8">1000</tspan><tspan fill="#ffffff"> \</tspan></text>
  <text x="476" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  -v $(pwd)/data:/app/data \</tspan></text>
  <text x="476" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  my-app</tspan></text>

  <!-- Bottom tip -->
  <rect x="80" y="282" width="740" height="40" fill="#0f1a0f" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">현재 사용자 UID 자동 주입: --user $(id -u):$(id -g)  — CI 환경에서 유용</text>
</svg>
