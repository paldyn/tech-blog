<svg width="880" height="500" viewBox="0 0 880 500" xmlns="http://www.w3.org/2000/svg" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Bash 조건문 구조</text>

  <!-- if/elif/else flow -->
  <!-- Start box -->
  <rect x="360" y="64" width="160" height="44" rx="8" fill="#1e3a5f" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="440" y="90" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">if [ 조건 ]</text>

  <defs>
    <marker id="arrB" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrR" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- true branch -->
  <line x1="360" y1="86" x2="230" y2="86" stroke="#55c555" stroke-width="2" marker-end="url(#arrB)"/>
  <text x="295" y="80" text-anchor="middle" font-size="12" fill="#55c555">참(true)</text>
  <rect x="100" y="66" width="128" height="40" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="164" y="90" text-anchor="middle" font-size="13" fill="#e8e8e8">then 블록 실행</text>

  <!-- false branch -->
  <line x1="520" y1="86" x2="640" y2="86" stroke="#e05555" stroke-width="2" marker-end="url(#arrR)"/>
  <text x="580" y="80" text-anchor="middle" font-size="12" fill="#e05555">거짓(false)</text>
  <rect x="640" y="66" width="140" height="40" rx="6" fill="#3b1212" stroke="#ef4444" stroke-width="1.5"/>
  <text x="710" y="90" text-anchor="middle" font-size="13" fill="#e8e8e8">elif 조건 확인</text>

  <!-- elif sub-branch -->
  <line x1="710" y1="106" x2="710" y2="142" stroke="#e05555" stroke-width="2" marker-end="url(#arrR)"/>
  <rect x="640" y="142" width="140" height="40" rx="6" fill="#3b1212" stroke="#ef4444" stroke-width="1.5"/>
  <text x="710" y="166" text-anchor="middle" font-size="13" fill="#e8e8e8">else 블록 실행</text>

  <!-- Code block -->
  <rect x="60" y="160" width="540" height="180" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="180" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> [[ $score -ge </tspan><tspan fill="#b5cea8">90</tspan><tspan fill="#ffffff"> ]]; </tspan><tspan fill="#7ec8e3" font-weight="600">then</tspan></text>
  <text x="76" y="198" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"A등급"</tspan></text>
  <text x="76" y="216" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">elif</tspan><tspan fill="#ffffff"> [[ $score -ge </tspan><tspan fill="#b5cea8">80</tspan><tspan fill="#ffffff"> ]]; </tspan><tspan fill="#7ec8e3" font-weight="600">then</tspan></text>
  <text x="76" y="234" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"B등급"</tspan></text>
  <text x="76" y="252" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">elif</tspan><tspan fill="#ffffff"> [[ $score -ge </tspan><tspan fill="#b5cea8">70</tspan><tspan fill="#ffffff"> ]]; </tspan><tspan fill="#7ec8e3" font-weight="600">then</tspan></text>
  <text x="76" y="270" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"C등급"</tspan></text>
  <text x="76" y="288" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">else</tspan></text>
  <text x="76" y="306" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"재시험"</tspan></text>
  <text x="76" y="324" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">fi</tspan></text>

  <!-- case statement -->
  <rect x="60" y="360" width="760" height="120" rx="8" fill="#111827" stroke="#334155" stroke-width="1"/>
  <text x="440" y="386" text-anchor="middle" font-size="16" font-weight="600" fill="#e8e8e8">case 문 — 패턴 매칭</text>
  <rect x="76" y="396" width="728" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="416" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">case</tspan><tspan fill="#ffffff"> $OS </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan></text>
  <text x="92" y="434" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">  ubuntu|debian) </tspan><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"apt"</tspan><tspan fill="#ffffff"> ;; </tspan><tspan fill="#9aa4b8">  fedora|rhel) echo "dnf" ;;</tspan></text>
  <text x="92" y="452" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">  arch*) </tspan><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"pacman"</tspan><tspan fill="#ffffff"> ;; </tspan><tspan fill="#9aa4b8">            *) echo "알 수 없음" ;;</tspan></text>
  <text x="92" y="470" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">esac</tspan></text>
</svg>
