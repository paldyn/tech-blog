<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">CLIP 대조 학습 구조</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">이미지·텍스트 쌍을 공동 임베딩 공간에 정렬</text>

  <!-- Image Encoder -->
  <rect x="40" y="100" width="200" height="220" rx="10" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">이미지 인코더</text>

  <!-- Image input examples -->
  <rect x="60" y="140" width="160" height="36" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="140" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">🐱 고양이 이미지</text>

  <rect x="60" y="181" width="160" height="36" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="140" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">🚗 자동차 이미지</text>

  <rect x="60" y="222" width="160" height="36" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="140" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">🌳 나무 이미지</text>

  <!-- ViT box -->
  <rect x="60" y="270" width="160" height="30" rx="6" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="140" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">ViT / ResNet</text>

  <!-- Arrow from image encoder -->
  <line x1="240" y1="210" x2="298" y2="210" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="269" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">I_e</text>

  <!-- Text Encoder -->
  <rect x="640" y="100" width="200" height="220" rx="10" fill="#0d1117" stroke="#ce9178" stroke-width="1.5"/>
  <text x="740" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#ce9178" text-anchor="middle">텍스트 인코더</text>

  <rect x="660" y="140" width="160" height="36" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="740" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">"a photo of a cat"</text>

  <rect x="660" y="181" width="160" height="36" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="740" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
