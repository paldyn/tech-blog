  <!-- Similarity matrix -->
  <rect x="300" y="100" width="280" height="240" rx="10" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">코사인 유사도 행렬</text>
  <text x="440" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">I_e · T_eᵀ / τ</text>

  <!-- Matrix cells -->
  <!-- Row labels -->
  <text x="330" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">🐱</text>
  <text x="330" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">🚗</text>
  <text x="330" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">🌳</text>

  <!-- Col labels -->
  <text x="380" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
