  <!-- Arrow from text encoder -->
  <line x1="640" y1="210" x2="582" y2="210" stroke="#ce9178" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="611" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
