  <!-- Row 1 -->
  <rect x="350" y="172" width="55" height="26" rx="3" fill="#0f2a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="378" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">0.92</text>
  <rect x="410" y="172" width="55" height="26" rx="3" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="438" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">0.08</text>
  <rect x="470" y="172" width="55" height="26" rx="3" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="498" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">0.05</text>
  <text x="548" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">…</text>

  <!-- Row 2 -->
  <rect x="350" y="203" width="55" height="26" rx="3" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="378" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">0.06</text>
  <rect x="410" y="203" width="55" height="26" rx="3" fill="#0f2a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="438" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">0.89</text>
  <rect x="470" y="203" width="55" height="26" rx="3" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="498" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">0.04</text>
  <text x="548" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">…</text>

  <!-- Row 3 -->
  <rect x="350" y="234" width="55" height="26" rx="3" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="378" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">0.04</text>
  <rect x="410" y="234" width="55" height="26" rx="3" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="438" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">0.07</text>
  <rect x="470" y="234" width="55" height="26" rx="3" fill="#0f2a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="498" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">0.94</text>
  <text x="548" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">…</text>

  <!-- Loss explanation -->
  <rect x="310" y="278" width="260" height="44" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="440" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">InfoNCE Loss</text>
  <text x="440" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">대각선(매칭 쌍) 최대화, 나머지 최소화</text>

  <!-- Zero-shot section -->
  <rect x="40" y="355" width="800" height="110" rx="10" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">제로샷 이미지 분류 동작 방식</text>

  <text x="80" y="403" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa">① 후보 텍스트 생성: "a photo of a {class}" (각 클래스별)</text>
  <text x="80" y="423" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa">② 이미지 임베딩 ↔ 모든 텍스트 임베딩 코사인 유사도 계산</text>
  <text x="80" y="443" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
