<svg width="880" height="410" viewBox="0 0 880 410" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="swArr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="410" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">수직선을 왼→오른쪽으로 쓸며 사건을 처리</text>

  <!-- horizontal segments -->
  <line x1="120" y1="140" x2="320" y2="140" stroke="#7ec8e3" stroke-width="3"/>
  <line x1="220" y1="200" x2="520" y2="200" stroke="#7ec8e3" stroke-width="3"/>
  <line x1="380" y1="260" x2="640" y2="260" stroke="#7ec8e3" stroke-width="3"/>
  <line x1="160" y1="320" x2="420" y2="320" stroke="#7ec8e3" stroke-width="3"/>

  <!-- sweep line -->
  <line x1="400" y1="100" x2="400" y2="360" stroke="#e05555" stroke-width="2.5" stroke-dasharray="6,4"/>
  <text x="400" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e05555" font-weight="600">sweep line</text>
  <line x1="430" y1="380" x2="540" y2="380" stroke="#e05555" stroke-width="2" marker-end="url(#swArr)"/>
  <text x="470" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">진행 방향</text>

  <!-- active markers -->
  <circle cx="400" cy="200" r="6" fill="#55c555"/>
  <circle cx="400" cy="260" r="6" fill="#55c555"/>
  <text x="660" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">← 현재 활성 (active set)</text>

  <!-- legend right -->
  <rect x="700" y="120" width="150" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="716" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">사건(event)</text>
  <text x="716" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" font-weight="600">▸ 시작점: 추가</text>
  <text x="716" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" font-weight="600">▸ 끝점: 제거</text>
  <text x="716" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" font-weight="600">▸ 교차: 보고</text>

  <text x="60" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">전체 평면 대신, 선이 지나는 좌표(사건)에서만 상태를 갱신 → 차원을 하나 줄인다</text>
</svg>
