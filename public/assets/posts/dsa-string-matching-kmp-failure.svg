<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">KMP 실패 함수(Failure Function) 구성</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">패턴 "ABABCABAB"의 접두사-접미사 최대 일치 길이</text>

  <!-- Pattern chars -->
  <text x="60" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">인덱스</text>
  <text x="60" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">패턴</text>
  <text x="60" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">fail[]</text>

  <!-- Index row -->
  <text x="160" y="108" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">0</text>
  <text x="220" y="108" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">1</text>
  <text x="280" y="108" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">2</text>
  <text x="340" y="108" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">3</text>
  <text x="400" y="108" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">4</text>
  <text x="460" y="108" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">5</text>
  <text x="520" y="108" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">6</text>
  <text x="580" y="108" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">7</text>
  <text x="640" y="108" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">8</text>

  <!-- Pattern chars cells -->
  <rect x="134" y="114" width="52" height="36" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1" rx="4"/>
  <text x="160" y="137" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" font-weight="600" fill="#7ec8e3">A</text>
  <rect x="194" y="114" width="52" height="36" fill="#1a2a1a" stroke="#55c555" stroke-width="1" rx="4"/>
  <text x="220" y="137" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" font-weight="600" fill="#55c555">B</text>
  <rect x="254" y="114" width="52" height="36" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1" rx="4"/>
  <text x="280" y="137" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" font-weight="600" fill="#7ec8e3">A</text>
  <rect x="314" y="114" width="52" height="36" fill="#1a2a1a" stroke="#55c555" stroke-width="1" rx="4"/>
  <text x="340" y="137" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" font-weight="600" fill="#55c555">B</text>
  <rect x="374" y="114" width="52" height="36" fill="#2a1a1a" stroke="#e05555" stroke-width="1" rx="4"/>
  <text x="400" y="137" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" font-weight="600" fill="#e05555">C</text>
  <rect x="434" y="114" width="52" height="36" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1" rx="4"/>
  <text x="460" y="137" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" font-weight="600" fill="#7ec8e3">A</text>
  <rect x="494" y="114" width="52" height="36" fill="#1a2a1a" stroke="#55c555" stroke-width="1" rx="4"/>
  <text x="520" y="137" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" font-weight="600" fill="#55c555">B</text>
  <rect x="554" y="114" width="52" height="36" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1" rx="4"/>
  <text x="580" y="137" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" font-weight="600" fill="#7ec8e3">A</text>
  <rect x="614" y="114" width="52" height="36" fill="#1a2a1a" stroke="#55c555" stroke-width="1" rx="4"/>
  <text x="640" y="137" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" font-weight="600" fill="#55c555">B</text>

  <!-- Failure function values -->
  <rect x="134" y="158" width="52" height="36" fill="#111" stroke="#333" stroke-width="1" rx="4"/>
  <text x="160" y="181" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#888">0</text>
  <rect x="194" y="158" width="52" height="36" fill="#111" stroke="#333" stroke-width="1" rx="4"/>
  <text x="220" y="181" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#888">0</text>
  <rect x="254" y="158" width="52" height="36" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1" rx="4"/>
  <text x="280" y="181" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#7ec8e3">1</text>
  <rect x="314" y="158" width="52" height="36" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1" rx="4"/>
  <text x="340" y="181" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#7ec8e3">2</text>
  <rect x="374" y="158" width="52" height="36" fill="#111" stroke="#333" stroke-width="1" rx="4"/>
  <text x="400" y="181" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#888">0</text>
  <rect x="434" y="158" width="52" height="36" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1" rx="4"/>
  <text x="460" y="181" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#7ec8e3">1</text>
  <rect x="494" y="158" width="52" height="36" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1" rx="4"/>
  <text x="520" y="181" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#7ec8e3">2</text>
  <rect x="554" y="158" width="52" height="36" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1" rx="4"/>
  <text x="580" y="181" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#7ec8e3">3</text>
  <rect x="614" y="158" width="52" height="36" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1" rx="4"/>
  <text x="640" y="181" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#7ec8e3">4</text>

  <!-- Annotation: index 8 has value 4 meaning "ABAB" -->
  <text x="640" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ce9178">↑ "ABAB" 길이 4</text>
  <text x="640" y="231" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">접두=접미 일치</text>

  <!-- Failure function code -->
  <text x="60" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">실패 함수 구축 코드</text>
  <rect x="60" y="272" width="380" height="182" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="76" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">def</text>
  <text x="104" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> build_failure(pat):</text>
  <text x="76" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    m = len(pat)</text>
  <text x="76" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    fail = [0] * m</text>
  <text x="76" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    j = 0</text>
  <text x="76" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">    for</text>
  <text x="109" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> i in range(1, m):</text>
  <text x="76" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">        while</text>
  <text x="134" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> j &gt; 0 and pat[i] != pat[j]:</text>
  <text x="76" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">            j = fail[j-1]</text>
  <text x="76" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">        if</text>
  <text x="105" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> pat[i] == pat[j]:</text>
  <text x="76" y="436" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">            j += 1</text>
  <text x="76" y="454" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">        fail[i] = j</text>

  <!-- KMP property explanation -->
  <rect x="460" y="272" width="360" height="182" fill="#111" stroke="#2a3a2a" stroke-width="1" rx="6"/>
  <text x="640" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">fail[i]의 의미</text>
  <text x="476" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">pat[0..i]의 접두사와 접미사가</text>
  <text x="476" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">일치하는 최대 길이</text>
  <text x="476" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">불일치 발생 시:</text>
  <text x="476" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">패턴 포인터를 처음으로</text>
  <text x="476" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">돌리는 대신 fail[j-1]로</text>
  <text x="476" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">이미 매칭된 정보 재사용</text>
  <text x="476" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">→ O(n+m) 시간 보장</text>
</svg>
