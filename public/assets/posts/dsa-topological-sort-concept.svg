<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr-topo" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">위상 정렬 — DAG의 선후 관계 순서</text>

  <!-- DAG visualization -->
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">예제 DAG (강의 선수 과목)</text>

  <!-- Nodes -->
  <rect x="60" y="90" width="100" height="36" rx="18" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="110" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle" font-weight="600">수학 (0)</text>

  <rect x="60" y="160" width="100" height="36" rx="18" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="110" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle" font-weight="600">물리 (1)</text>

  <rect x="220" y="90" width="100" height="36" rx="18" fill="#1a2a3a" stroke="#55c555" stroke-width="2"/>
  <text x="270" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle" font-weight="600">알고리즘 (2)</text>

  <rect x="220" y="160" width="100" height="36" rx="18" fill="#1a2a3a" stroke="#55c555" stroke-width="2"/>
  <text x="270" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle" font-weight="600">자료구조 (3)</text>

  <rect x="380" y="90" width="100" height="36" rx="18" fill="#2e2a1a" stroke="#e8c060" stroke-width="2"/>
  <text x="430" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8c060" text-anchor="middle" font-weight="600">OS (4)</text>

  <rect x="380" y="160" width="100" height="36" rx="18" fill="#2e2a1a" stroke="#e8c060" stroke-width="2"/>
  <text x="430" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8c060" text-anchor="middle" font-weight="600">네트워크 (5)</text>

  <rect x="540" y="120" width="110" height="36" rx="18" fill="#2e1a1a" stroke="#e05555" stroke-width="2.5"/>
  <text x="595" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle" font-weight="600">분산시스템 (6)</text>

  <!-- Edges -->
  <line x1="160" y1="108" x2="218" y2="105" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr-topo)"/>
  <line x1="160" y1="118" x2="218" y2="168" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr-topo)"/>
  <line x1="160" y1="177" x2="218" y2="168" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr-topo)"/>
  <line x1="320" y1="108" x2="378" y2="105" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-topo)"/>
  <line x1="320" y1="175" x2="378" y2="168" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-topo)"/>
  <line x1="480" y1="110" x2="538" y2="130" stroke="#e8c060" stroke-width="1.5" marker-end="url(#arr-topo)"/>
  <line x1="480" y1="172" x2="538" y2="148" stroke="#e8c060" stroke-width="1.5" marker-end="url(#arr-topo)"/>

  <!-- In-degree labels -->
  <text x="60" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">in=0</text>
  <text x="60" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">in=0</text>
  <text x="220" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">in=1</text>
  <text x="220" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">in=2</text>
  <text x="380" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">in=1</text>
  <text x="380" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">in=1</text>
  <text x="656" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">in=2</text>

  <!-- Kahn's algorithm steps -->
  <text x="60" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">Kahn 알고리즘 (BFS 기반)</text>

  <rect x="60" y="260" width="760" height="100" rx="6" fill="#0f0f1a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">초기 큐 (in=0):</text>
  <rect x="200" y="270" width="80" height="26" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="287" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">0(수학)</text>
  <rect x="286" y="270" width="80" height="26" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="326" y="287" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">1(물리)</text>

  <text x="76" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">결과 순서:</text>
  <rect x="176" y="306" width="80" height="26" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="216" y="323" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">0</text>
  <rect x="264" y="306" width="80" height="26" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="304" y="323" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">1</text>
  <rect x="352" y="306" width="80" height="26" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="392" y="323" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">2</text>
  <rect x="440" y="306" width="80" height="26" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="480" y="323" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">3</text>
  <rect x="528" y="306" width="80" height="26" rx="4" fill="#2e2a1a" stroke="#e8c060" stroke-width="1.5"/>
  <text x="568" y="323" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8c060" text-anchor="middle">4</text>
  <rect x="616" y="306" width="80" height="26" rx="4" fill="#2e2a1a" stroke="#e8c060" stroke-width="1.5"/>
  <text x="656" y="323" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8c060" text-anchor="middle">5</text>
  <rect x="704" y="306" width="80" height="26" rx="4" fill="#2e1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="744" y="323" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" text-anchor="middle">6</text>

  <text x="76" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">각 노드 dequeue 시 이웃의 in-degree 감소 → in=0 되면 큐에 추가</text>

  <!-- Properties -->
  <text x="60" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓ 모든 선행 관계 충족  |  ✓ 결과 길이 &lt; V이면 사이클 존재 (DAG 아님)</text>
  <text x="60" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">시간: O(V+E)  |  공간: O(V)  |  DAG에서만 정의됨</text>
  <text x="60" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">여러 유효한 위상 정렬이 존재할 수 있음 (큐에서 선택 순서 달라지면 순서 달라짐)</text>
</svg>
