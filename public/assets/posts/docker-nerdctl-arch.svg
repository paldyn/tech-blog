<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">nerdctl — containerd 직접 연결 아키텍처</text>

  <!-- Docker path (left, faded) -->
  <text x="200" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#555" text-anchor="middle">기존: docker CLI 경로</text>

  <rect x="80" y="96" width="240" height="44" rx="5" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="200" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#555" text-anchor="middle">docker CLI</text>

  <line x1="200" y1="140" x2="200" y2="170" stroke="#444" stroke-width="1.5" marker-end="url(#arr)" opacity="0.5"/>

  <rect x="80" y="170" width="240" height="44" rx="5" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="200" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#555" text-anchor="middle">dockerd (데몬)</text>

  <line x1="200" y1="214" x2="200" y2="244" stroke="#444" stroke-width="1.5" marker-end="url(#arr)" opacity="0.5"/>

  <rect x="80" y="244" width="240" height="44" rx="5" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="200" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#555" text-anchor="middle">containerd</text>

  <!-- nerdctl path (right, highlighted) -->
  <text x="640" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">nerdctl 경로 (단순)</text>

  <rect x="500" y="96" width="280" height="44" rx="5" fill="#0a1628" stroke="#7ec8e3" stroke-width="2"/>
  <text x="640" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">nerdctl CLI</text>

  <line x1="640" y1="140" x2="640" y2="244" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="670" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">containerd 소켓 직접 접근</text>
  <text x="670" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">/run/containerd/containerd.sock</text>

  <rect x="500" y="244" width="280" height="44" rx="5" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">containerd</text>

  <!-- Shared lower stack -->
  <line x1="200" y1="288" x2="440" y2="336" stroke="#444" stroke-width="1.5" marker-end="url(#arr)" opacity="0.5"/>
  <line x1="640" y1="288" x2="440" y2="336" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="290" y="336" width="300" height="44" rx="5" fill="#0a1628" stroke="#ce9178" stroke-width="1.5"/>
  <text x="440" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">runc → Linux Kernel</text>

  <!-- CNI / BuildKit labels -->
  <rect x="60" y="340" width="200" height="56" rx="5" fill="#0d1117" stroke="#7777cc" stroke-width="1"/>
  <text x="160" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">CNI 플러그인</text>
  <text x="160" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">nerdctl의 네트워크 지원</text>
  <text x="160" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">(bridge, host, none)</text>

  <rect x="620" y="340" width="200" height="56" rx="5" fill="#0d1117" stroke="#f5c542" stroke-width="1"/>
  <text x="720" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#f5c542" text-anchor="middle">BuildKit</text>
  <text x="720" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">nerdctl build 지원</text>
  <text x="720" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">(docker build 호환)</text>

  <!-- Bottom label -->
  <text x="440" y="425" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">nerdctl = Docker API 없이 containerd에 직접 연결 → dockerd 제거, CNI/BuildKit 플러그인으로 기능 보완</text>
</svg>
