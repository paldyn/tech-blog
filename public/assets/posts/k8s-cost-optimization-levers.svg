<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">비용 최적화 레버 — 두 방향에서 조인다</text>

  <!-- workload side -->
  <text x="230" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">워크로드 측 — 요청을 줄인다</text>

  <rect x="50" y="108" width="360" height="74" rx="8" fill="#1a3a4a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="74" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">라이트사이징 (VPA · 메트릭 기반)</text>
  <text x="74" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">실제 사용에 맞게 requests/limits 조정</text>

  <rect x="50" y="194" width="360" height="74" rx="8" fill="#1a3a4a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="74" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">HPA — 부하 따라 복제본 증감</text>
  <text x="74" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">한가할 땐 줄여서 자원 반납</text>

  <rect x="50" y="280" width="360" height="74" rx="8" fill="#1a3a4a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="74" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">유휴 정리 — dev 환경 야간 축소</text>
  <text x="74" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">안 쓰는 PVC·LoadBalancer 회수</text>

  <!-- infra side -->
  <text x="650" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">인프라 측 — 단가를 낮춘다</text>

  <rect x="470" y="108" width="360" height="74" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="494" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Cluster Autoscaler · Karpenter</text>
  <text x="494" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">빈 노드 축소, 수요 맞춰 노드 공급</text>

  <rect x="470" y="194" width="360" height="74" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="494" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">스팟 인스턴스 — 큰 폭 할인</text>
  <text x="494" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">무중단 워크로드를 저렴한 노드로</text>

  <rect x="470" y="280" width="360" height="74" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="494" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">빈 패킹 · 약정 할인</text>
  <text x="494" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">밀도 ↑ · 예약/약정으로 기저 비용 ↓</text>

  <text x="440" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">먼저 측정(가시성) → 라이트사이징 → 오토스케일링 → 단가 인하 순으로 — 측정 없는 최적화는 추측이다</text>
</svg>
