<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">조정 루프 (Reconciliation Loop)</text>

  <!-- Git desired -->
  <rect x="60" y="110" width="200" height="110" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="160" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">Git 저장소</text>
  <text x="160" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">원하는 상태 (desired)</text>
  <text x="160" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" text-anchor="middle">replicas: 3</text>

  <!-- operator -->
  <rect x="340" y="100" width="200" height="130" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">GitOps 오퍼레이터</text>
  <text x="440" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">desired와 actual을</text>
  <text x="440" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">계속 비교(diff)</text>
  <text x="440" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">다르면 → 수렴시킨다</text>

  <!-- cluster actual -->
  <rect x="620" y="110" width="200" height="110" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="720" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">클러스터</text>
  <text x="720" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">실제 상태 (actual)</text>
  <text x="720" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" text-anchor="middle">replicas: 2 ?!</text>

  <line x1="260" y1="150" x2="340" y2="150" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="300" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">관찰</text>

  <line x1="620" y1="150" x2="540" y2="150" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>
  <text x="580" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">상태 조회</text>

  <path d="M 540 200 C 580 230, 620 230, 660 220" fill="none" stroke="#55c555" stroke-width="2.5" marker-end="url(#arrg)"/>
  <text x="600" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">apply — desired로 수렴</text>

  <!-- drift example -->
  <rect x="60" y="290" width="760" height="70" rx="8" fill="#1a0f10" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">드리프트 자동 복구</text>
  <text x="440" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">누군가 kubectl edit로 몰래 바꿔도 → 다음 조정 주기에 Git 상태로 되돌아간다 (self-healing)</text>

  <!-- 4 principles -->
  <text x="440" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">OpenGitOps 4원칙</text>

  <rect x="60" y="410" width="180" height="70" rx="8" fill="#0f1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="150" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">① 선언적</text>
  <text x="150" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">상태를 YAML로 기술</text>

  <rect x="254" y="410" width="180" height="70" rx="8" fill="#0f1520" stroke="#55c555" stroke-width="1"/>
  <text x="344" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">② 버전·불변 저장</text>
  <text x="344" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Git 히스토리 = 감사 기록</text>

  <rect x="448" y="410" width="180" height="70" rx="8" fill="#0f1520" stroke="#7777cc" stroke-width="1"/>
  <text x="538" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">③ 자동 Pull</text>
  <text x="538" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">에이전트가 가져온다</text>

  <rect x="642" y="410" width="178" height="70" rx="8" fill="#0f1520" stroke="#ce9178" stroke-width="1"/>
  <text x="731" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ce9178" text-anchor="middle">④ 지속 조정</text>
  <text x="731" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">계속 비교하고 수렴</text>
</svg>
