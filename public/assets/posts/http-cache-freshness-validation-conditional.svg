<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arro" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#dd9955"/>
    </marker>
  </defs>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">조건부 요청과 304 Not Modified</text>
    <!-- Client -->
    <rect x="60" y="75" width="170" height="54" rx="8" fill="#0f1f3a" stroke="#4a7aaa" stroke-width="1.5"/>
    <text x="145" y="107" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">브라우저</text>
    <!-- Server -->
    <rect x="650" y="75" width="170" height="54" rx="8" fill="#0f2a1a" stroke="#3aaa5a" stroke-width="1.5"/>
    <text x="735" y="107" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">원본 서버</text>
    <!-- Code block -->
    <rect x="60" y="150" width="760" height="206" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="76" y="177" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 1. 최초 응답 (서버가 검증자 전달)</text>
    <text x="76" y="197" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Last-Modified</tspan><tspan fill="#ffffff">: Wed, 01 Jan 2026 12:00:00 GMT</tspan></text>
    <text x="76" y="217" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">ETag</tspan><tspan fill="#ffffff">: &quot;abc123&quot;</tspan></text>
    <text x="76" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 2. 만료 후 조건부 재검증 요청</text>
    <text x="76" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">If-None-Match</tspan><tspan fill="#ffffff">: &quot;abc123&quot;</tspan></text>
    <text x="76" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">If-Modified-Since</tspan><tspan fill="#ffffff">: Wed, 01 Jan 2026 12:00:00 GMT</tspan></text>
    <text x="76" y="307" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 3. 변경 없으면 304 (본문 없음)</text>
    <text x="76" y="327" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#55c555">HTTP/1.1 304 Not Modified</tspan><tspan fill="#9aa4b8">  # 바디 없음, 헤더만</tspan></text>
    <text x="76" y="347" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Cache-Control</tspan><tspan fill="#ffffff">: max-age=3600</tspan><tspan fill="#9aa4b8">  # TTL 갱신</tspan></text>
    <!-- Summary -->
    <text x="440" y="390" text-anchor="middle" font-size="12" fill="#888">ETag 우선, Last-Modified는 폴백 — 1초 단위 Last-Modified 한계를 ETag가 보완</text>
    <text x="440" y="408" text-anchor="middle" font-size="11" fill="#555">304 응답은 본문 없으므로 대역폭 절감 — 캐시된 콘텐츠 재사용</text>
  </g>
</svg>
