<svg width="880" height="460" viewBox="0 0 880 460" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">FinalizationRegistry</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">객체가 GC될 때 콜백 실행</text>
  <line x1="60" y1="92" x2="820" y2="92" stroke="#1e2433" stroke-width="1"/>

  <text x="60" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">캐시 정리 예제</text>
  <rect x="60" y="126" width="760" height="190" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>

  <text x="76" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> registry = </tspan><tspan fill="#7ec8e3">new</tspan><tspan fill="#e8e8e8"> FinalizationRegistry((key) =&gt; {</tspan>
  </text>
  <text x="76" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">  cache.</tspan><tspan fill="#7ec8e3">delete</tspan><tspan fill="#e8e8e8">(key); </tspan><tspan fill="#6a8aa0">// GC 후 캐시도 삭제</tspan>
  </text>
  <text x="76" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">});</tspan>
  </text>
  <text x="76" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> cache = </tspan><tspan fill="#7ec8e3">new</tspan><tspan fill="#e8e8e8"> Map();</tspan>
  </text>
  <text x="76" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">function</tspan><tspan fill="#e8e8e8"> store(key, obj) {</tspan>
  </text>
  <text x="76" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">  cache.set(key, </tspan><tspan fill="#7ec8e3">new</tspan><tspan fill="#e8e8e8"> WeakRef(obj));</tspan>
  </text>
  <text x="76" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">  registry.register(obj, key);</tspan>
  </text>
  <text x="76" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">}</tspan>
  </text>

  <!-- Warnings -->
  <text x="60" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">⚠ 주의사항</text>
  <rect x="60" y="356" width="760" height="64" fill="#1a0e0e" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="76" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">콜백 실행 시점은 엔진이 결정 — 즉각 실행을 보장하지 않습니다.</text>
  <text x="76" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">프로그램 종료 전 GC가 일어나지 않으면 콜백이 호출되지 않을 수 있습니다.</text>

  <text x="440" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복</text>
</svg>
