<svg width="880" height="600" viewBox="0 0 880 600" xmlns="http://www.w3.org/2000/svg" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="600" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
