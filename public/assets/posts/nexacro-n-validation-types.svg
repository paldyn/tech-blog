<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <!-- Background -->
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="36" text-anchor="middle"
    font-family="Wanted Sans Variable, -apple-system, sans-serif"
    font-size="18" font-weight="700" fill="#e8e8e8">Nexacro N 유효성 검사 유형 정리</text>

  <!-- Table Header -->
  <rect x="20" y="56" width="840" height="36" rx="4" fill="#1a1a1a"/>
  <text x="120" y="79" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#aaa">검사 유형</text>
  <text x="300" y="79" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#aaa">설명 / 방법</text>
  <text x="580" y="79" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#aaa">코드 예시</text>
  <!-- vertical dividers in header -->
  <line x1="210" y1="56" x2="210" y2="92" stroke="#333" stroke-width="1"/>
  <line x1="420" y1="56" x2="420" y2="92" stroke="#333" stroke-width="1"/>

  <!-- Row 1: 필수값 검사 -->
  <rect x="20" y="92" width="840" height="62" rx="0" fill="#0d1520"/>
  <rect x="20" y="92" width="190" height="62" fill="#0d1520"/>
  <rect x="20" y="92" width="6" height="62" fill="#64b5f6" rx="2"/>
  <text x="120" y="116" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#90caf9">필수값 검사</text>
  <text x="120" y="133" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555">Required</text>
  <text x="315" y="112" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#888">입력 필드가 비어 있는지 확인</text>
  <text x="315" y="130" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#888">ds.getColumn(i, "colNm") 으로 값 추출</text>
  <text x="315" y="147" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#555">null / "" / undefined 모두 체크 필요</text>
  <text x="436" y="112" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" font-family="monospace" fill="#64b5f6">var val = ds.getColumn(i, "userId");</text>
  <text x="436" y="130" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#64b5f6">if (nexacro.isNull(val) || val === "") {</text>
  <text x="436" y="147" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#64b5f6">  /* 오류 처리 */ }</text>
  <line x1="20" y1="154" x2="860" y2="154" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="210" y1="92" x2="210" y2="154" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="420" y1="92" x2="420" y2="154" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Row 2: 형식 검사 -->
  <rect x="20" y="154" width="840" height="62" fill="#0d1a10"/>
  <rect x="20" y="154" width="6" height="62" fill="#81c784" rx="2"/>
  <text x="120" y="178" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#a5d6a7">형식 검사</text>
  <text x="120" y="196" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555">Format / Regex</text>
  <text x="315" y="174" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#888">정규식으로 형식(날짜·전화·이메일) 검증</text>
  <text x="315" y="192" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#888">Edit 컴포넌트의 inputtype 속성도 활용</text>
  <text x="315" y="209" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#555">mask 속성으로 입력 자체를 제한 가능</text>
  <text x="436" y="174" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#81c784">var re = /^\d{4}-\d{2}-\d{2}$/;</text>
  <text x="436" y="192" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#81c784">if (!re.test(val)) {</text>
  <text x="436" y="209" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#81c784">  /* 날짜 형식 오류 */ }</text>
  <line x1="20" y1="216" x2="860" y2="216" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="210" y1="154" x2="210" y2="216" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="420" y1="154" x2="420" y2="216" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Row 3: 범위 검사 -->
  <rect x="20" y="216" width="840" height="62" fill="#1a1000"/>
  <rect x="20" y="216" width="6" height="62" fill="#ffb74d" rx="2"/>
  <text x="120" y="240" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#ffcc80">범위 검사</text>
  <text x="120" y="258" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555">Range / Min-Max</text>
  <text x="315" y="236" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#888">숫자·날짜가 허용 범위 안에 있는지 확인</text>
  <text x="315" y="254" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#888">시작일 ≤ 종료일 같은 연관 필드 비교</text>
  <text x="315" y="271" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#555">parseFloat / parseInt 변환 후 비교</text>
  <text x="436" y="236" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#ffb74d">var qty = parseInt(ds.getColumn(i,"qty"));</text>
  <text x="436" y="254" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#ffb74d">if (qty &lt; 0 || qty &gt; 9999) {</text>
  <text x="436" y="271" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#ffb74d">  /* 범위 오류 */ }</text>
  <line x1="20" y1="278" x2="860" y2="278" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="210" y1="216" x2="210" y2="278" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="420" y1="216" x2="420" y2="278" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Row 4: 연관 검사 -->
  <rect x="20" y="278" width="840" height="62" fill="#150b1a"/>
  <rect x="20" y="278" width="6" height="62" fill="#ce93d8" rx="2"/>
  <text x="120" y="302" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#e1bee7">연관 검사</text>
  <text x="120" y="320" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555">Cross-field</text>
  <text x="315" y="298" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#888">두 컬럼 간의 논리 관계 검증</text>
  <text x="315" y="316" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#888">시작일·종료일, 최솟값·최댓값 쌍</text>
  <text x="315" y="333" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#555">비즈니스 규칙에 따라 커스텀 작성</text>
  <text x="436" y="298" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#ce93d8">var sdt = ds.getColumn(i, "startDt");</text>
  <text x="436" y="316" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#ce93d8">var edt = ds.getColumn(i, "endDt");</text>
  <text x="436" y="333" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#ce93d8">if (sdt &gt; edt) { /* 날짜 역전 오류 */ }</text>
  <line x1="20" y1="340" x2="860" y2="340" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="210" y1="278" x2="210" y2="340" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="420" y1="278" x2="420" y2="340" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Row 5: Grid 셀 검사 -->
  <rect x="20" y="340" width="840" height="62" fill="#100d1a"/>
  <rect x="20" y="340" width="6" height="62" fill="#ef5350" rx="2"/>
  <text x="120" y="364" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#ef9a9a">Grid 셀 검사</text>
  <text x="120" y="382" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555">In-cell Validation</text>
  <text x="315" y="360" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#888">Grid의 onvalidate 이벤트로 실시간 처리</text>
  <text x="315" y="378" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#888">Grid.setCellPos() 로 오류 셀 강조</text>
  <text x="315" y="395" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#555">obj.setCellAttribute(row, col, "background", "#3a0a0a")</text>
  <text x="436" y="360" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#ef9a9a">// Grid onvalidate 이벤트</text>
  <text x="436" y="378" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#ef9a9a">if (obj.currentcell == "amt" &amp;&amp; !val) {</text>
  <text x="436" y="395" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#ef9a9a">  return false; // 셀 이동 차단 }</text>
  <line x1="210" y1="340" x2="210" y2="402" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="420" y1="340" x2="420" y2="402" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Bottom border -->
  <rect x="20" y="402" width="840" height="2" fill="#1a1a1a"/>

  <!-- Footer -->
  <text x="440" y="430" text-anchor="middle"
    font-family="Wanted Sans Variable, -apple-system, sans-serif"
    font-size="11" fill="#444">nexacro.isNull(val) 함수로 null·undefined·""를 한 번에 체크할 수 있습니다</text>
  <text x="440" y="448" text-anchor="middle"
    font-family="Wanted Sans Variable, -apple-system, sans-serif"
    font-size="11" fill="#333">Grid의 edittype 속성과 mask를 함께 사용하면 입력 단계에서 오류를 차단할 수 있습니다</text>
</svg>
