  <text x="420" y="520" font-size="11" fill="#aabbdd" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">// onvalidate 이벤트</text>
  <text x="420" y="538" font-size="11" fill="#7799cc" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">if (obj.col == "amt" &amp;&amp; !val) {</text>
  <text x="438" y="552" font-size="11" fill="#888" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">return false;</text>

  <!-- Footer note -->
  <text x="440" y="588" text-anchor="middle" font-size="11" fill="#555">nexacro.isNull() · Edit inputtype · Grid onvalidate를 조합하면 단계별 방어가 가능</text>
</svg>
