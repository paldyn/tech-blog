  <text x="420" y="344" font-size="11" fill="#aabbdd" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">var qty = parseInt(ds.getColumn(i, "qty"));</text>
  <text x="420" y="362" font-size="11" fill="#7799cc" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">if (qty &lt; 0 || qty &gt; 9999) {</text>
  <text x="438" y="376" font-size="11" fill="#888" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">/* 범위 오류 */</text>

