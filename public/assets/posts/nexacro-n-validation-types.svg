  <text x="420" y="186" font-size="11" fill="#7799cc" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">if (nexacro.isNull(val) || val === "") {</text>
  <text x="438" y="200" font-size="11" fill="#888" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">/* error */</text>

  <!-- Row 2: 형식 검사 -->
  <rect x="40" y="224" width="800" height="80" rx="4" fill="#0e1a0e"/>
  <rect x="40" y="224" width="6" height="80" fill="#66aa77" rx="2"/>
  <text x="120" y="258" text-anchor="middle" font-size="13" font-weight="700" fill="#88dd99">형식 검사</text>
  <text x="120" y="276" text-anchor="middle" font-size="10" fill="#556" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">Format / Regex</text>
  <text x="216" y="258" font-size="11" fill="#aaa">정규식으로 형식 검사.</text>
  <text x="216" y="276" font-size="11" fill="#888">날짜·전화·이메일.</text>
  <rect x="406" y="236" width="418" height="56" rx="6" fill="#070b14" stroke="#1a2030" stroke-width="1"/>
  <text x="420" y="256" font-size="11" fill="#aabbdd" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">var re = /^\d{4}-\d{2}-\d{2}$/;</text>
  <text x="420" y="274" font-size="11" fill="#7799cc" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">if (!re.test(val)) {</text>
  <text x="438" y="288" font-size="11" fill="#888" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">/* 날짜 형식 오류 */</text>

