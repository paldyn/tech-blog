  <text x="120" y="452" text-anchor="middle" font-size="10" fill="#556" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">Cross-field</text>
  <text x="216" y="434" font-size="11" fill="#aaa">두 컬럼 간의 논리 관계.</text>
  <text x="216" y="452" font-size="11" fill="#888">시작·종료, 최솟값·최댓값.</text>
  <rect x="406" y="412" width="418" height="56" rx="6" fill="#070b14" stroke="#1a2030" stroke-width="1"/>
  <text x="420" y="432" font-size="11" fill="#aabbdd" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">var sdt = ds.getColumn(i, "startDt");</text>
  <text x="420" y="450" font-size="11" fill="#aabbdd" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">var edt = ds.getColumn(i, "endDt");</text>
  <text x="420" y="464" font-size="11" fill="#888" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">if (sdt &gt; edt) /* 날짜 역전 */</text>

  <!-- Row 5: Grid 셀 검사 -->
