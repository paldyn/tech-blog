<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">perf stat &amp; 하드웨어 카운터 해석</text>

  <!-- perf stat output example -->
  <rect x="60" y="64" width="480" height="280" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="86" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># perf stat ./myapp 출력 예시</text>
  <text x="76" y="106" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"> Performance counter stats for './myapp':</text>
  <text x="76" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">      5,012.34 msec task-clock</text>
  <text x="320" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"> # 0.98 CPUs used</text>
  <text x="76" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">            23  context-switches</text>
  <text x="76" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">             2  cpu-migrations</text>
  <text x="76" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">        84,123  page-faults</text>
  <text x="76" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">18,432,108,234  cycles</text>
  <text x="76" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">24,891,234,567  instructions</text>
  <text x="350" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve"> # 1.35 insn/cycle</text>
  <text x="76" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> 5,213,456,789  branches</text>
  <text x="76" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" xml:space="preserve">   123,456,789  branch-misses</text>
  <text x="340" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"> # 2.37% misses</text>
  <text x="76" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" xml:space="preserve">    45,678,901  cache-misses</text>
  <text x="310" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"> # 18.3% of cache refs</text>
  <text x="76" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">       5.122534271 seconds time elapsed</text>

  <!-- Interpretation -->
  <rect x="560" y="64" width="280" height="280" rx="8" fill="#111111" stroke="#444" stroke-width="1"/>
  <text x="700" y="88" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">지표 해석 가이드</text>

  <text x="576" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">IPC (insn/cycle)</text>
  <text x="576" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">&gt; 2.0: 효율적</text>
  <text x="576" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">1.0~2.0: 보통</text>
  <text x="576" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">&lt; 1.0: 메모리 병목 의심</text>

  <text x="576" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">cache-misses</text>
  <text x="576" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">&lt; 1%: 우수</text>
  <text x="576" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">1~10%: 보통</text>
  <text x="576" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">&gt; 20%: 캐시 최적화 필요</text>

  <text x="576" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">branch-misses</text>
  <text x="576" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">&lt; 1%: 좋음</text>
  <text x="576" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">&gt; 5%: 분기 예측 실패</text>
  <text x="576" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">정렬된 데이터 → 개선</text>

  <!-- Quick commands -->
  <rect x="60" y="358" width="760" height="84" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 자주 쓰는 perf 명령</text>
  <text x="76" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">perf stat</text>
  <text x="148" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> -e cache-misses,cache-references -p PID</text>
  <text x="76" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">perf top</text>
  <text x="145" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> -p PID</text>
  <text x="250" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  # 실시간 핫 함수</text>
  <text x="450" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">perf record</text>
  <text x="548" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> -e LLC-load-misses -g -p PID -- sleep 10</text>
</svg>
