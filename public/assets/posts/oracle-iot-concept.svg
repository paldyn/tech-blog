<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Index-Organized Table (IOT)</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">Heap 테이블과의 구조 비교 — 데이터가 B-Tree 리프에 직접 저장</text>

  <!-- Left: Heap Table -->
  <text x="200" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">일반 Heap 테이블 + 인덱스</text>

  <!-- Heap: Index B-Tree -->
  <rect x="60" y="118" width="280" height="130" fill="#111" rx="8" stroke="#2a2a2a" stroke-width="1"/>
  <text x="200" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">PK 인덱스 (B-Tree)</text>
  <!-- root -->
  <rect x="155" y="148" width="90" height="24" fill="#1e2433" rx="4"/>
  <text x="200" y="164" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">PK=500</text>
  <!-- leaf nodes -->
  <rect x="75" y="192" width="90" height="24" fill="#1e2433" rx="4"/>
  <text x="120" y="208" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">PK→ROWID</text>
  <rect x="235" y="192" width="90" height="24" fill="#1e2433" rx="4"/>
  <text x="280" y="208" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">PK→ROWID</text>
  <line x1="175" y1="172" x2="140" y2="192" stroke="#3a3a3a" stroke-width="1.5"/>
  <line x1="225" y1="172" x2="260" y2="192" stroke="#3a3a3a" stroke-width="1.5"/>
  <!-- ROWID pointer arrows -->
  <line x1="120" y1="216" x2="120" y2="232" stroke="#e05555" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="280" y1="216" x2="280" y2="232" stroke="#e05555" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="200" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">ROWID 포인터 (추가 I/O)</text>

  <!-- Heap: Data segment -->
  <rect x="60" y="262" width="280" height="60" fill="#1a1010" rx="6" stroke="#3a1a1a" stroke-width="1"/>
  <text x="200" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">힙 세그먼트 (데이터)</text>
  <text x="200" y="300" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">무작위 배치 | 분산 블록 접근</text>

  <!-- Access flow label -->
  <text x="200" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">① 인덱스 탐색  ② ROWID  ③ 힙 블록 접근 (2단계 I/O)</text>

  <!-- Divider arrow -->
  <polygon points="424,220 456,220 440,240" fill="#7777cc"/>
  <line x1="440" y1="204" x2="440" y2="220" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">vs</text>

  <!-- Right: IOT -->
  <text x="680" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">Index-Organized Table (IOT)</text>

  <!-- IOT B-Tree (data in leaf) -->
  <rect x="540" y="118" width="280" height="200" fill="#111" rx="8" stroke="#2a2a2a" stroke-width="1"/>
  <text x="680" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">단일 B-Tree 구조</text>
  <!-- root -->
  <rect x="635" y="148" width="90" height="24" fill="#1a3020" rx="4" stroke="#2a5a30" stroke-width="1"/>
  <text x="680" y="164" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">PK=500</text>
  <!-- leaf nodes with data embedded -->
  <rect x="545" y="192" width="130" height="36" fill="#1a3020" rx="4" stroke="#2a5a30" stroke-width="1"/>
  <text x="610" y="208" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#55c555">PK | col1 | col2</text>
  <text x="610" y="222" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff">데이터 직접 포함</text>
  <rect x="705" y="192" width="110" height="36" fill="#1a3020" rx="4" stroke="#2a5a30" stroke-width="1"/>
  <text x="760" y="208" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#55c555">PK | col1 | col2</text>
  <text x="760" y="222" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#ffffff">데이터 직접 포함</text>
  <line x1="655" y1="172" x2="610" y2="192" stroke="#2a5a30" stroke-width="1.5"/>
  <line x1="705" y1="172" x2="760" y2="192" stroke="#2a5a30" stroke-width="1.5"/>
  <text x="680" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">별도 힙 세그먼트 없음</text>
  <text x="680" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">리프 노드 = 데이터 행</text>
  <text x="680" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">PK 순서 = 물리 저장 순서</text>

  <!-- Access flow label -->
  <text x="680" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">① 인덱스 탐색  ② 리프에서 데이터 즉시 반환 (1단계 I/O)</text>

  <!-- Benefits table -->
  <rect x="60" y="362" width="760" height="120" fill="#111620" rx="8" stroke="#2a3a50" stroke-width="1"/>
  <text x="440" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">IOT 특성 요약</text>

  <!-- Header row -->
  <text x="150" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">특성</text>
  <text x="380" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">Heap 테이블</text>
  <text x="620" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">IOT</text>

  <line x1="70" y1="412" x2="810" y2="412" stroke="#2a3a50" stroke-width="1"/>

  <text x="150" y="430" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">PK 조회 I/O</text>
  <text x="380" y="430" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">인덱스 + 힙 (2회)</text>
  <text x="620" y="430" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">인덱스 리프 1회</text>

  <text x="150" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">범위 스캔 효율</text>
  <text x="380" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">랜덤 I/O 발생</text>
  <text x="620" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">순차 리프 스캔</text>

  <text x="150" y="474" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">ROWID</text>
  <text x="380" y="474" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">고정 ROWID</text>
  <text x="620" y="474" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">논리 ROWID (UROWID)</text>
</svg>
