<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">사용자 정의 이터레이터 구현</text>

  <!-- Left label -->
  <text x="230" y="72" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">클래스 정의</text>

  <!-- Left code box -->
  <rect x="50" y="82" width="370" height="290" rx="6"
        fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="66" y="105" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="66" dy="0" font-weight="600" fill="#7ec8e3">class </tspan><tspan fill="#ffffff">CountUp:</tspan>
  </text>
  <text x="66" y="123" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="66" dy="0" font-weight="600" fill="#7ec8e3">    def </tspan><tspan fill="#ffffff">__init__(self, start, stop):</tspan>
  </text>
  <text x="66" y="141" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        self.current = start</text>
  <text x="66" y="159" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        self.stop = stop</text>
  <text x="66" y="185" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="66" dy="0" font-weight="600" fill="#7ec8e3">    def </tspan><tspan fill="#ffffff">__iter__(self):</tspan>
  </text>
  <text x="66" y="203" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="66" dy="0" font-weight="600" fill="#7ec8e3">        return </tspan><tspan fill="#ffffff">self</tspan>
  </text>
  <text x="66" y="229" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="66" dy="0" font-weight="600" fill="#7ec8e3">    def </tspan><tspan fill="#ffffff">__next__(self):</tspan>
  </text>
  <text x="66" y="247" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="66" dy="0" font-weight="600" fill="#7ec8e3">        if </tspan><tspan fill="#ffffff">self.current &gt;= self.stop:</tspan>
  </text>
  <text x="66" y="265" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="66" dy="0" font-weight="600" fill="#7ec8e3">            raise </tspan><tspan fill="#ffffff">StopIteration</tspan>
  </text>
  <text x="66" y="283" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        val = self.current</text>
  <text x="66" y="301" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        self.current += 1</text>
  <text x="66" y="319" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="66" dy="0" font-weight="600" fill="#7ec8e3">        return </tspan><tspan fill="#ffffff">val</tspan>
  </text>

  <!-- Right label -->
  <text x="650" y="72" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">사용 예시</text>

  <!-- Right code box -->
  <rect x="460" y="82" width="370" height="218" rx="6"
        fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="476" y="105" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># for 루프로 순회</text>
  <text x="476" y="123" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="476" dy="0" font-weight="600" fill="#7ec8e3">for </tspan><tspan fill="#ffffff">n </tspan><tspan font-weight="600" fill="#7ec8e3">in </tspan><tspan fill="#ffffff">CountUp(</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">4</tspan><tspan fill="#ffffff">):</tspan>
  </text>
  <text x="476" y="141" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    print(n)  <tspan fill="#9aa4b8"># 1  2  3</tspan></text>
  <text x="476" y="167" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># next() 직접 호출</text>
  <text x="476" y="185" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">it = CountUp(<tspan fill="#b5cea8">10</tspan>, <tspan fill="#b5cea8">12</tspan>)</text>
  <text x="476" y="203" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">print(next(it))  <tspan fill="#9aa4b8"># 10</tspan></text>
  <text x="476" y="221" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">print(next(it))  <tspan fill="#9aa4b8"># 11</tspan></text>
  <text x="476" y="239" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">print(next(it))  <tspan fill="#9aa4b8"># StopIteration ↑</tspan></text>

  <!-- Note box -->
  <rect x="460" y="322" width="370" height="50" rx="6"
        fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="645" y="345" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">이터레이터는 소진되면 재사용 불가.</text>
  <text x="645" y="362" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">다시 순회하려면 새 인스턴스를 생성한다.</text>
</svg>
