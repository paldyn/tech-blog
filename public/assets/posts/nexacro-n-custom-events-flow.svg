<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">사용자 정의 이벤트 흐름</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888" text-anchor="middle">Child Form → Parent Form 커스텀 이벤트 전달 패턴</text>

  <!-- Child Form -->
  <rect x="60" y="100" width="340" height="300" rx="10" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="230" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">Child Form</text>
  <line x1="80" y1="136" x2="380" y2="136" stroke="#333" stroke-width="1"/>

  <!-- Child declares event -->
  <rect x="80" y="148" width="300" height="80" rx="6" fill="#0d1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="230" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">① 이벤트 선언 (onUserSelected)</text>
  <text x="230" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" text-anchor="middle">this.addEventHandler(</text>
  <text x="230" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" text-anchor="middle">"onUserSelected", ...);</text>

  <!-- Child fires event -->
  <rect x="80" y="248" width="300" height="100" rx="6" fill="#0d1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="230" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">② 이벤트 발생 (fireEvent)</text>
  <text x="230" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" text-anchor="middle">var oArgs = {</text>
  <text x="230" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" text-anchor="middle">  userId: "hong"</text>
  <text x="230" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" text-anchor="middle">};</text>

  <!-- Arrow -->
  <line x1="400" y1="260" x2="448" y2="260" stroke="#7ec8e3" stroke-width="2.5"/>
  <polygon points="448,253 460,260 448,267" fill="#7ec8e3"/>
  <text x="430" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">이벤트</text>
  <text x="430" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">전달</text>

  <!-- Parent Form -->
  <rect x="460" y="100" width="360" height="300" rx="10" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">Parent Form</text>
  <line x1="480" y1="136" x2="800" y2="136" stroke="#333" stroke-width="1"/>

  <!-- Parent registers handler -->
  <rect x="480" y="148" width="320" height="100" rx="6" fill="#0d2e0d" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">③ 핸들러 등록 (부모에서)</text>
  <text x="640" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" text-anchor="middle">this.childForm</text>
  <text x="640" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" text-anchor="middle">  .addEventHandler(</text>
  <text x="640" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" text-anchor="middle">  "onUserSelected", fn, this);</text>

  <!-- Parent receives -->
  <rect x="480" y="268" width="320" height="100" rx="6" fill="#0d2e0d" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">④ 핸들러 처리</text>
  <text x="640" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" text-anchor="middle">function fn(obj, e) {</text>
  <text x="640" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" text-anchor="middle">  var sId = e.userId;</text>
  <text x="640" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" text-anchor="middle">  fn_loadDetail(sId);</text>
  <text x="640" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" text-anchor="middle">}</text>

  <!-- Bottom note -->
  <rect x="60" y="420" width="760" height="28" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="439" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">커스텀 이벤트로 Form 간 결합도를 낮추고 재사용성을 높일 수 있음</text>
</svg>
