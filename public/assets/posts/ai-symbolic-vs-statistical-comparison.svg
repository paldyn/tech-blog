<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <style>text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }</style>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">기호주의 AI vs 통계적 AI</text>

  <!-- Left column header -->
  <rect x="60" y="64" width="360" height="42" rx="8" fill="#1a1a2e"/>
  <text x="240" y="90" text-anchor="middle" font-size="16" font-weight="700" fill="#7777cc">기호주의 AI (Symbolic AI)</text>

  <!-- Right column header -->
  <rect x="460" y="64" width="360" height="42" rx="8" fill="#0e2010"/>
  <text x="640" y="90" text-anchor="middle" font-size="16" font-weight="700" fill="#55c555">통계적 AI (Statistical AI)</text>

  <!-- VS divider -->
  <text x="440" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#555">VS</text>

  <!-- Row 1: 핵심 철학 -->
  <text x="440" y="128" text-anchor="middle" font-size="12" font-weight="600" fill="#888">핵심 철학</text>
  <rect x="60" y="134" width="360" height="44" rx="4" fill="#111"/>
  <text x="240" y="153" text-anchor="middle" font-size="12" fill="#e8e8e8">지식은 명시적 규칙과 논리로 표현 가능</text>
  <text x="240" y="170" text-anchor="middle" font-size="12" fill="#7777cc">인간이 규칙을 작성 → 컴퓨터가 실행</text>
  <rect x="460" y="134" width="360" height="44" rx="4" fill="#111"/>
  <text x="640" y="153" text-anchor="middle" font-size="12" fill="#e8e8e8">지식은 데이터에서 패턴으로 학습 가능</text>
  <text x="640" y="170" text-anchor="middle" font-size="12" fill="#55c555">데이터 제공 → 컴퓨터가 규칙을 찾음</text>

  <!-- Row 2: 지식 표현 -->
  <text x="440" y="202" text-anchor="middle" font-size="12" font-weight="600" fill="#888">지식 표현</text>
  <rect x="60" y="208" width="360" height="44" rx="4" fill="#111"/>
  <text x="240" y="227" text-anchor="middle" font-size="12" fill="#aaa">논리식, 의미망, 온톨로지,</text>
  <text x="240" y="244" text-anchor="middle" font-size="12" fill="#aaa">프로덕션 룰 (if-then), 프레임</text>
  <rect x="460" y="208" width="360" height="44" rx="4" fill="#111"/>
  <text x="640" y="227" text-anchor="middle" font-size="12" fill="#aaa">수치 벡터(가중치), 확률 분포,</text>
  <text x="640" y="244" text-anchor="middle" font-size="12" fill="#aaa">신경망 파라미터</text>

  <!-- Row 3: 강점 -->
  <text x="440" y="276" text-anchor="middle" font-size="12" font-weight="600" fill="#888">강점</text>
  <rect x="60" y="282" width="360" height="60" rx="4" fill="#0e1420"/>
  <text x="240" y="300" text-anchor="middle" font-size="12" fill="#7777cc">✓ 설명 가능 (왜 이 결과인지 추적)</text>
  <text x="240" y="318" text-anchor="middle" font-size="12" fill="#7777cc">✓ 소량 데이터로도 동작</text>
  <text x="240" y="336" text-anchor="middle" font-size="12" fill="#7777cc">✓ 규칙의 수정·검증 용이</text>
  <rect x="460" y="282" width="360" height="60" rx="4" fill="#0e2010"/>
  <text x="640" y="300" text-anchor="middle" font-size="12" fill="#55c555">✓ 복잡한 패턴 자동 발견</text>
  <text x="640" y="318" text-anchor="middle" font-size="12" fill="#55c555">✓ 대량 데이터에서 탁월한 성능</text>
  <text x="640" y="336" text-anchor="middle" font-size="12" fill="#55c555">✓ 도메인 전문 지식 불필요</text>

  <!-- Row 4: 약점 -->
  <text x="440" y="366" text-anchor="middle" font-size="12" font-weight="600" fill="#888">약점</text>
  <rect x="60" y="372" width="360" height="60" rx="4" fill="#1a1010"/>
  <text x="240" y="390" text-anchor="middle" font-size="12" fill="#e05555">✗ 규칙 작성이 어렵고 비용이 큼</text>
  <text x="240" y="408" text-anchor="middle" font-size="12" fill="#e05555">✗ 불확실성 처리 취약</text>
  <text x="240" y="426" text-anchor="middle" font-size="12" fill="#e05555">✗ 지식 획득 병목(Knowledge bottleneck)</text>
  <rect x="460" y="372" width="360" height="60" rx="4" fill="#1a1010"/>
  <text x="640" y="390" text-anchor="middle" font-size="12" fill="#e05555">✗ 대량 데이터 필요</text>
  <text x="640" y="408" text-anchor="middle" font-size="12" fill="#e05555">✗ 블랙박스 (설명 어려움)</text>
  <text x="640" y="426" text-anchor="middle" font-size="12" fill="#e05555">✗ 분포 외 입력에 취약</text>

  <!-- Footer -->
  <text x="440" y="504" text-anchor="middle" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈</text>
</svg>
