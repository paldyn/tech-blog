<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Debounce — 마지막 입력만 처리</text>

  <!-- Timeline labels -->
  <text x="60" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">사용자 입력</text>
  <text x="60" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">API 호출</text>
  <text x="60" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Debounce 후</text>

  <!-- Timeline base lines -->
  <line x1="180" y1="90" x2="820" y2="90" stroke="#333" stroke-width="1"/>
  <line x1="180" y1="166" x2="820" y2="166" stroke="#333" stroke-width="1"/>
  <line x1="180" y1="242" x2="820" y2="242" stroke="#333" stroke-width="1"/>

  <!-- Input events (keystrokes) -->
  <circle cx="230" cy="90" r="5" fill="#7777cc"/>
  <circle cx="280" cy="90" r="5" fill="#7777cc"/>
  <circle cx="320" cy="90" r="5" fill="#7777cc"/>
  <circle cx="380" cy="90" r="5" fill="#7777cc"/>
  <circle cx="450" cy="90" r="5" fill="#7777cc"/>
  <circle cx="500" cy="90" r="5" fill="#7777cc"/>
  <circle cx="560" cy="90" r="5" fill="#7777cc"/>
  <circle cx="630" cy="90" r="5" fill="#7777cc"/>
  <circle cx="720" cy="90" r="5" fill="#7777cc"/>
  <text x="440" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">9번의 키 입력</text>

  <!-- Without debounce: 9 API calls -->
  <circle cx="230" cy="166" r="5" fill="#e05555"/>
  <circle cx="280" cy="166" r="5" fill="#e05555"/>
  <circle cx="320" cy="166" r="5" fill="#e05555"/>
  <circle cx="380" cy="166" r="5" fill="#e05555"/>
  <circle cx="450" cy="166" r="5" fill="#e05555"/>
  <circle cx="500" cy="166" r="5" fill="#e05555"/>
  <circle cx="560" cy="166" r="5" fill="#e05555"/>
  <circle cx="630" cy="166" r="5" fill="#e05555"/>
  <circle cx="720" cy="166" r="5" fill="#e05555"/>
  <text x="440" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">9번 API 호출 (낭비)</text>

  <!-- Debounce window bracket -->
  <rect x="620" y="214" width="200" height="20" rx="2" fill="none" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="720" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">300ms 대기</text>

  <!-- With debounce: 1 API call -->
  <circle cx="820" cy="242" r="7" fill="#55c555"/>
  <text x="820" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">1번</text>
  <text x="440" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">마지막 입력 후 300ms 뒤에만 호출</text>

  <!-- Code section -->
  <rect x="60" y="286" width="760" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> useDebounce(value, delay = 300) {</tspan></text>
  <text x="76" y="327" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">  const</tspan><tspan fill="#ffffff"> [debouncedValue, setDebouncedValue] = </tspan><tspan fill="#7ec8e3" font-weight="600">useState</tspan><tspan fill="#ffffff">(value);</tspan></text>
  <text x="76" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">  useEffect</tspan><tspan fill="#ffffff">(() =&gt; {</tspan></text>
  <text x="76" y="365" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">    const</tspan><tspan fill="#ffffff"> timer = setTimeout(() =&gt; setDebouncedValue(value), delay);</tspan></text>
  <text x="76" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">    return</tspan><tspan fill="#ffffff"> () =&gt; clearTimeout(timer); </tspan><tspan fill="#9aa4b8">// 새 value 오면 이전 타이머 취소</tspan></text>
  <text x="76" y="403" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">  }, [value, delay]);</tspan></text>
  <text x="76" y="422" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> debouncedValue;</tspan></text>
</svg>
