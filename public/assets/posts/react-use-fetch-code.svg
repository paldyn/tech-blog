<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">useFetch 전체 구현</text>

  <rect x="60" y="66" width="760" height="332" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="88" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> reducer = (state, action) =&gt; {</tspan></text>
  <text x="76" y="105" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#7ec8e3" font-weight="600">  switch</tspan><tspan fill="#ffffff"> (action.type) {</tspan></text>
  <text x="76" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#7ec8e3" font-weight="600">    case</tspan><tspan fill="#ce9178"> 'FETCH'</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> { ...state, isLoading: </tspan><tspan fill="#7ec8e3" font-weight="600">true</tspan><tspan fill="#ffffff">, error: </tspan><tspan fill="#7ec8e3" font-weight="600">null</tspan><tspan fill="#ffffff"> };</tspan></text>
  <text x="76" y="139" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#7ec8e3" font-weight="600">    case</tspan><tspan fill="#ce9178"> 'SUCCESS'</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> { data: action.payload, isLoading: </tspan><tspan fill="#7ec8e3" font-weight="600">false</tspan><tspan fill="#ffffff">, error: </tspan><tspan fill="#7ec8e3" font-weight="600">null</tspan><tspan fill="#ffffff"> };</tspan></text>
  <text x="76" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#7ec8e3" font-weight="600">    case</tspan><tspan fill="#ce9178"> 'ERROR'</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> { data: </tspan><tspan fill="#7ec8e3" font-weight="600">null</tspan><tspan fill="#ffffff">, isLoading: </tspan><tspan fill="#7ec8e3" font-weight="600">false</tspan><tspan fill="#ffffff">, error: action.payload };</tspan></text>
  <text x="76" y="173" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#7ec8e3" font-weight="600">    default</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> state; } };</tspan></text>
  <text x="76" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> useFetch(url) {</tspan></text>
  <text x="76" y="209" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#7ec8e3" font-weight="600">  const</tspan><tspan fill="#ffffff"> [state, dispatch] = </tspan><tspan fill="#7ec8e3" font-weight="600">useReducer</tspan><tspan fill="#ffffff">(reducer, { data: </tspan><tspan fill="#7ec8e3" font-weight="600">null</tspan><tspan fill="#ffffff">, isLoading: </tspan><tspan fill="#b5cea8">!!url</tspan><tspan fill="#ffffff">, error: </tspan><tspan fill="#7ec8e3" font-weight="600">null</tspan><tspan fill="#ffffff"> });</tspan></text>
  <text x="76" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#7ec8e3" font-weight="600">  const</tspan><tspan fill="#ffffff"> [refreshIndex, setRefreshIndex] = </tspan><tspan fill="#7ec8e3" font-weight="600">useState</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="76" y="243" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#7ec8e3" font-weight="600">  useEffect</tspan><tspan fill="#ffffff">(() =&gt; {</tspan></text>
  <text x="76" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> (!url) </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff">;  </tspan><tspan fill="#9aa4b8">// null URL이면 요청 안 함</tspan></text>
  <text x="76" y="277" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#7ec8e3" font-weight="600">    let</tspan><tspan fill="#ffffff"> active = </tspan><tspan fill="#7ec8e3" font-weight="600">true</tspan><tspan fill="#ffffff">;  </tspan><tspan fill="#9aa4b8">// 경쟁 조건 방지 플래그</tspan></text>
  <text x="76" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> controller = </tspan><tspan fill="#7ec8e3" font-weight="600">new</tspan><tspan fill="#ffffff"> AbortController();</tspan></text>
  <text x="76" y="311" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#ffffff">    dispatch({ type: </tspan><tspan fill="#ce9178">'FETCH'</tspan><tspan fill="#ffffff"> });</tspan></text>
  <text x="76" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#7ec8e3" font-weight="600">    fetch</tspan><tspan fill="#ffffff">(url, { signal: controller.signal })</tspan></text>
  <text x="76" y="345" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#ffffff">      .</tspan><tspan fill="#7ec8e3" font-weight="600">then</tspan><tspan fill="#ffffff">(r =&gt; { </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> (!r.ok) </tspan><tspan fill="#7ec8e3" font-weight="600">throw new</tspan><tspan fill="#ffffff"> Error(</tspan><tspan fill="#ce9178">`HTTP ${r.status}`</tspan><tspan fill="#ffffff">); </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> r.json(); })</tspan></text>
  <text x="76" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#ffffff">      .</tspan><tspan fill="#7ec8e3" font-weight="600">then</tspan><tspan fill="#ffffff">(data =&gt; { </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> (active) dispatch({ type: </tspan><tspan fill="#ce9178">'SUCCESS'</tspan><tspan fill="#ffffff">, payload: data }); })</tspan></text>
  <text x="76" y="379" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#ffffff">      .</tspan><tspan fill="#7ec8e3" font-weight="600">catch</tspan><tspan fill="#ffffff">(err =&gt; { </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> (active &amp;&amp; err.name !== </tspan><tspan fill="#ce9178">'AbortError'</tspan><tspan fill="#ffffff">) dispatch({ type: </tspan><tspan fill="#ce9178">'ERROR'</tspan><tspan fill="#ffffff">, payload: err }); });</tspan></text>
  <text x="76" y="396" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#7ec8e3" font-weight="600">    return</tspan><tspan fill="#ffffff"> () =&gt; { active = </tspan><tspan fill="#7ec8e3" font-weight="600">false</tspan><tspan fill="#ffffff">; controller.abort(); };</tspan></text>
  <text x="76" y="413" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#ffffff">  }, [url, refreshIndex]);</tspan></text>
</svg>
