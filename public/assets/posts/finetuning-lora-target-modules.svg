<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 560" style="background:#0a0a0a" rx="12">
  <rect width="880" height="560" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">LoRA target_modules 선택 전략</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">어떤 레이어에 LoRA 어댑터를 붙이느냐에 따라 성능과 비용이 달라진다</text>

  <!-- === LEFT: Transformer Layer Diagram === -->
  <!-- Layer outer box -->
  <rect x="60" y="90" width="340" height="320" rx="10" fill="#0d1117" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="230" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">Transformer Layer</text>

  <!-- Attention block -->
  <rect x="80" y="122" width="300" height="160" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="230" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Multi-Head Attention</text>

  <!-- Q K V O boxes -->
  <rect x="94" y="152" width="58" height="34" rx="6" fill="#1a2744" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="123" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">q_proj</text>

  <rect x="164" y="152" width="58" height="34" rx="6" fill="#1a2744" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="193" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">k_proj</text>

  <rect x="234" y="152" width="58" height="34" rx="6" fill="#1a2744" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="263" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">v_proj</text>

  <rect x="304" y="152" width="58" height="34" rx="6" fill="#1a2744" stroke="#55c555" stroke-width="1.5"/>
  <text x="333" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">o_proj</text>

  <!-- LoRA tags on Q V -->
  <rect x="96" y="191" width="54" height="16" rx="3" fill="#7ec8e3" opacity="0.2"/>
  <text x="123" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3" text-anchor="middle">LoRA ✓</text>
  <rect x="236" y="191" width="54" height="16" rx="3" fill="#7ec8e3" opacity="0.2"/>
  <text x="263" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3" text-anchor="middle">LoRA ✓</text>
  <rect x="166" y="191" width="54" height="16" rx="3" fill="#7ec8e3" opacity="0.1"/>
  <text x="193" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">선택적</text>
  <rect x="306" y="191" width="54" height="16" rx="3" fill="#55c555" opacity="0.15"/>
  <text x="333" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">선택적</text>

  <!-- Attention line -->
  <line x1="230" y1="215" x2="230" y2="235" stroke="#333" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="230" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Attention Scores</text>
  <line x1="230" y1="257" x2="230" y2="275" stroke="#333" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- FFN block -->
  <rect x="80" y="275" width="300" height="120" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="230" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Feed-Forward Network</text>

  <rect x="100" y="305" width="70" height="34" rx="6" fill="#1a1a44" stroke="#7777cc" stroke-width="1.5"/>
  <text x="135" y="327" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7777cc" text-anchor="middle">gate_proj</text>

  <rect x="185" y="305" width="60" height="34" rx="6" fill="#1a1a44" stroke="#7777cc" stroke-width="1.5"/>
  <text x="215" y="327" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7777cc" text-anchor="middle">up_proj</text>

  <rect x="260" y="305" width="68" height="34" rx="6" fill="#1a1a44" stroke="#7777cc" stroke-width="1.5"/>
  <text x="294" y="327" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7777cc" text-anchor="middle">down_proj</text>

  <text x="230" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">FFN 포함 시 파라미터 +3x, 성능 ↑↑</text>

  <!-- === RIGHT: Strategy Table === -->
  <rect x="420" y="90" width="400" height="320" rx="10" fill="#0d1117" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="620" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">전략별 target_modules</text>

  <!-- Strategy 1: Minimal -->
  <rect x="438" y="122" width="364" height="70" rx="6" fill="#111827" stroke="#7ec8e3" stroke-width="1"/>
  <text x="448" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3">전략 1: 최소 (q, v만)</text>
  <text x="448" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">modules: ["q_proj", "v_proj"]</text>
  <text x="448" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">• 파라미터: 최소  • 빠른 실험  • 일반 분류/요약</text>
  <text x="760" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="end">절약 ↑</text>

  <!-- Strategy 2: Full Attention -->
  <rect x="438" y="202" width="364" height="70" rx="6" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="448" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555">전략 2: 전체 Attention (권장) ★</text>
  <text x="448" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">modules: ["q_proj","k_proj","v_proj","o_proj"]</text>
  <text x="448" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">• 균형  • 대부분 태스크  • rank=16, alpha=32</text>
  <text x="760" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="end">성능 ↑↑</text>

  <!-- Strategy 3: Full -->
  <rect x="438" y="282" width="364" height="70" rx="6" fill="#111827" stroke="#7777cc" stroke-width="1"/>
  <text x="448" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7777cc">전략 3: Attention + FFN (최대)</text>
  <text x="448" y="317" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">modules: ["q","k","v","o","gate","up","down"]</text>
  <text x="448" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">• 복잡한 도메인 적응  • 코드/수학  • 파라미터 3x↑</text>
  <text x="760" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="end">최고 품질</text>

  <!-- Code block: LoraConfig -->
  <rect x="60" y="425" width="760" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="84" y="448" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">from peft import LoraConfig</text>
  <text x="84" y="466" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"> </text>
  <text x="84" y="484" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#ffffff">config = </tspan><tspan fill="#7ec8e3">LoraConfig</tspan><tspan fill="#ffffff">(</tspan></text>
  <text x="84" y="502" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    <tspan fill="#ffffff">r</tspan><tspan fill="#9aa4b8">=</tspan><tspan fill="#b5cea8">16</tspan><tspan fill="#9aa4b8">,</tspan>  <tspan fill="#9aa4b8"># rank</tspan></text>
  <text x="84" y="520" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    <tspan fill="#ffffff">lora_alpha</tspan><tspan fill="#9aa4b8">=</tspan><tspan fill="#b5cea8">32</tspan><tspan fill="#9aa4b8">,  </tspan><tspan fill="#ffffff">target_modules</tspan><tspan fill="#9aa4b8">=</tspan><tspan fill="#ce9178">["q_proj","k_proj","v_proj","o_proj"]</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="84" y="538" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    <tspan fill="#ffffff">lora_dropout</tspan><tspan fill="#9aa4b8">=</tspan><tspan fill="#b5cea8">0.05</tspan><tspan fill="#9aa4b8">, </tspan><tspan fill="#ffffff">bias</tspan><tspan fill="#9aa4b8">=</tspan><tspan fill="#ce9178">"none"</tspan><tspan fill="#9aa4b8">, </tspan><tspan fill="#ffffff">task_type</tspan><tspan fill="#9aa4b8">=</tspan><tspan fill="#ce9178">"CAUSAL_LM"</tspan><tspan fill="#ffffff">)</tspan></text>
</svg>
