<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">내장 서버 vs 외장 서버 배포 모델</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">Spring Boot Embedded Server</text>

  <!-- LEFT: Traditional WAR -->
  <rect x="60" y="96" width="340" height="44" rx="8" fill="#2a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="230" y="123" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e05555">전통적 WAR 배포</text>

  <rect x="60" y="154" width="340" height="64" rx="8" fill="#1a1010" stroke="#e05555" stroke-width="1"/>
  <text x="230" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8e8e8">외부 WAS (Tomcat / JBoss)</text>
  <text x="230" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">별도 설치 · 관리 · 버전 맞춤 필요</text>

  <!-- Arrow down -->
  <polygon points="230,232 222,220 238,220" fill="#e05555"/>
  <line x1="230" y1="218" x2="230" y2="232" stroke="#e05555" stroke-width="2"/>

  <rect x="100" y="236" width="260" height="44" rx="6" fill="#1a1010" stroke="#e05555" stroke-width="1"/>
  <text x="230" y="263" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">myapp.war 배포</text>

  <!-- Pain points -->
  <text x="80" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">✗  WAS 설치 · 설정 · 버전 관리 별도</text>
  <text x="80" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">✗  환경마다 서버 설정이 달라짐</text>
  <text x="80" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">✗  빌드 → 배포 → 재시작 사이클이 무거움</text>
  <text x="80" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">✗  컨테이너(Docker) 활용이 번거로움</text>

  <!-- Separator -->
  <line x1="440" y1="96" x2="440" y2="430" stroke="#333" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- RIGHT: Embedded -->
  <rect x="480" y="96" width="340" height="44" rx="8" fill="#0a2014" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="123" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">Spring Boot 내장 서버</text>

  <!-- Fat JAR box -->
  <rect x="480" y="154" width="340" height="220" rx="8" fill="#0f1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">myapp.jar (Executable Fat JAR)</text>

  <rect x="500" y="192" width="300" height="38" rx="6" fill="#55c555" fill-opacity="0.15" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">내장 Tomcat / Jetty / Undertow</text>

  <rect x="500" y="240" width="300" height="38" rx="6" fill="#7777cc" fill-opacity="0.15" stroke="#7777cc" stroke-width="1"/>
  <text x="650" y="263" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9999ee">Spring Framework (Web MVC)</text>

  <rect x="500" y="288" width="300" height="38" rx="6" fill="#7ec8e3" fill-opacity="0.15" stroke="#7ec8e3" stroke-width="1"/>
  <text x="650" y="311" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">애플리케이션 코드 + 의존성</text>

  <text x="650" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa">↓ 실행</text>
  <rect x="540" y="362" width="220" height="34" rx="6" fill="#0a0a0a" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="383" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">java -jar myapp.jar</text>

  <!-- Benefits -->
  <text x="500" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓  JRE만 있으면 어디서든 실행</text>
  <text x="500" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓  서버 설정이 코드로 관리됨</text>
  <text x="500" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓  Docker 이미지 단순화</text>

  <!-- Bottom note -->
  <text x="440" y="496" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">내장 서버는 서버 설정을 application.properties 한 파일로 통합합니다</text>
</svg>
