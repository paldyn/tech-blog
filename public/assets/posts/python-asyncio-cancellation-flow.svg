<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="cnArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="cnArrG" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">cancel() 이 작동하는 과정</text>

  <rect x="60" y="100" width="220" height="70" fill="#11161f" stroke="#7ec8e3" stroke-width="1.5" rx="10"/>
  <text x="170" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">task.cancel()</text>
  <text x="170" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">취소 요청 등록</text>

  <rect x="330" y="100" width="240" height="70" fill="#11161f" stroke="#e05555" stroke-width="1.5" rx="10"/>
  <text x="450" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">다음 await 지점에서</text>
  <text x="450" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">CancelledError 발생</text>

  <rect x="620" y="100" width="200" height="70" fill="#11161f" stroke="#55c555" stroke-width="1.5" rx="10"/>
  <text x="720" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">finally 로 정리</text>
  <text x="720" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">자원 해제 후 종료</text>

  <path d="M 280 135 L 322 135" stroke="#e05555" stroke-width="2" marker-end="url(#cnArr)"/>
  <path d="M 570 135 L 612 135" stroke="#55c555" stroke-width="2" marker-end="url(#cnArrG)"/>

  <rect x="60" y="220" width="760" height="124" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text xml:space="preserve" x="76" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">try</tspan>:</text>
  <text xml:space="preserve" x="76" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3" font-weight="600">await</tspan> asyncio.sleep(10)</text>
  <text xml:space="preserve" x="76" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">except</tspan> asyncio.CancelledError:</text>
  <text xml:space="preserve" x="76" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    # 정리만 하고 반드시 re-raise</text>
  <text xml:space="preserve" x="76" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3" font-weight="600">raise</tspan></text>
</svg>
