<svg width="880" viewBox="0 0 880 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">클래스 정의 기본 패턴</text>
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">클래스 선언 · 필드 · 생성자 · 메서드</text>

  <!-- Code block -->
  <rect x="60" y="100" width="760" height="256" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff"><tspan fill="#7ec8e3">class</tspan><tspan> Animal {</tspan></text>
  <text x="76" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">  type = <tspan fill="#ce9178">'animal'</tspan><tspan>; </tspan><tspan fill="#9aa4b8">// 클래스 필드</tspan></text>
  <text x="76" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff"> </text>
  <text x="76" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">  <tspan fill="#7ec8e3">constructor</tspan><tspan>(name) {</tspan></text>
  <text x="76" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">    <tspan fill="#7ec8e3">this</tspan><tspan>.name = name;</tspan></text>
  <text x="76" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">  }</text>
  <text x="76" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff"> </text>
  <text x="76" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">  speak() {</text>
  <text x="76" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">    <tspan fill="#7ec8e3">return</tspan><tspan> `${</tspan><tspan fill="#7ec8e3">this</tspan><tspan>.name}: ...`;</tspan></text>
  <text x="76" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">  }</text>
  <text x="76" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">}</text>
  <text x="76" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff"><tspan fill="#7ec8e3">const</tspan><tspan> cat = </tspan><tspan fill="#7ec8e3">new</tspan><tspan> Animal(</tspan><tspan fill="#ce9178">'야옹이'</tspan><tspan>);</tspan></text>

  <!-- Footer -->
</svg>
