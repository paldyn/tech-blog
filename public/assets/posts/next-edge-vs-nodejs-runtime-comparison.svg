<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Edge Runtime vs Node.js Runtime 비교</text>

  <!-- Column headers -->
  <text x="240" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">Edge Runtime</text>
  <text x="640" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">Node.js Runtime</text>

  <!-- Divider -->
  <line x1="440" y1="92" x2="440" y2="400" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Row 1: 실행 환경 -->
  <rect x="60" y="98" width="360" height="56" rx="6" fill="#0f1f3a" stroke="#2a4a7e" stroke-width="1"/>
  <text x="240" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">V8 Isolate (Web Standard APIs)</text>
  <text x="240" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">fetch, Request, Response, Web Crypto</text>

  <rect x="460" y="98" width="360" height="56" rx="6" fill="#0f2e1a" stroke="#2a6e3a" stroke-width="1"/>
  <text x="640" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Node.js (Full API)</text>
  <text x="640" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">fs, crypto, child_process, native modules</text>

  <!-- Row label -->
  <text x="440" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">실행 환경</text>

  <!-- Row 2: 콜드 스타트 -->
  <rect x="60" y="168" width="360" height="56" rx="6" fill="#0f1f3a" stroke="#2a4a7e" stroke-width="1"/>
  <text x="240" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">~1ms 이하 (초고속)</text>
  <text x="240" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">경량 Isolate — Node.js보다 수십 배 빠름</text>

  <rect x="460" y="168" width="360" height="56" rx="6" fill="#0f2e1a" stroke="#2a6e3a" stroke-width="1"/>
  <text x="640" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">수십~수백ms</text>
  <text x="640" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Node.js 프로세스 초기화 비용</text>

  <text x="440" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">콜드 스타트</text>

  <!-- Row 3: 메모리 제한 -->
  <rect x="60" y="238" width="360" height="56" rx="6" fill="#0f1f3a" stroke="#2a4a7e" stroke-width="1"/>
  <text x="240" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">128MB (엄격)</text>
  <text x="240" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">큰 라이브러리, ORM 사용 어려움</text>

  <rect x="460" y="238" width="360" height="56" rx="6" fill="#0f2e1a" stroke="#2a6e3a" stroke-width="1"/>
  <text x="640" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">수 GB (유연)</text>
  <text x="640" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Prisma, sharp, PDFKit 모두 가능</text>

  <text x="440" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">메모리 제한</text>

  <!-- Row 4: 적합한 용도 -->
  <rect x="60" y="308" width="360" height="66" rx="6" fill="#0f1f3a" stroke="#2a4a7e" stroke-width="1"/>
  <text x="240" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">미들웨어, 지역화, A/B 테스트</text>
  <text x="240" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">인증 쿠키 검사, 요청 리라이트</text>
  <text x="240" y="364" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">지연 민감 API 프록시</text>

  <rect x="460" y="308" width="360" height="66" rx="6" fill="#0f2e1a" stroke="#2a6e3a" stroke-width="1"/>
  <text x="640" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">DB 쿼리, 파일 처리, 이메일</text>
  <text x="640" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">ORM (Prisma, Drizzle), 이미지 리사이즈</text>
  <text x="640" y="364" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">PDF 생성, 복잡한 비즈니스 로직</text>

  <text x="440" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">적합한 용도</text>

  <!-- Bottom note -->
  <text x="440" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">기본값: Node.js Runtime  |  export const runtime = 'edge' 로 변경</text>
  <text x="440" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">미들웨어는 항상 Edge Runtime에서 실행됨</text>
</svg>
