<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430">
  <rect width="880" height="430" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">RFC 7807 Problem Details — 전후 비교</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">표준화 이전: 팀마다 다른 오류 구조 vs 표준화 이후: 클라이언트가 예측 가능한 구조</text>

  <!-- Left label -->
  <text x="60" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">✕  표준화 이전 — 팀마다 제각각</text>
  <!-- Left code box -->
  <rect x="60" y="108" width="380" height="262" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// 팀 A의 오류 응답</tspan></text>
  <text x="76" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">{ </tspan><tspan fill="#7ec8e3" font-weight="600">"message"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"User not found"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="76" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">"code"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#b5cea8">1004</tspan><tspan fill="#ffffff"> }</tspan></text>
  <text x="76" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"> </text>
  <text x="76" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// 팀 B의 오류 응답</tspan></text>
  <text x="76" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">{ </tspan><tspan fill="#7ec8e3" font-weight="600">"error"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"NOT_FOUND"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="76" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">"status"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#b5cea8">404</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="76" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">"msg"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"no user"</tspan><tspan fill="#ffffff"> }</tspan></text>
  <text x="76" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"> </text>
  <text x="76" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// 팀마다 message/error/msg 혼재</tspan></text>
  <text x="76" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// 클라이언트 파싱 로직 중복 작성</tspan></text>
  <text x="76" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// 추가 컨텍스트(URI·유형) 없음</tspan></text>

  <!-- Right label -->
  <text x="460" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓  RFC 7807 Problem Details 표준</text>
  <!-- Right code box -->
  <rect x="460" y="108" width="360" height="262" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>

  <text x="476" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// Content-Type: application/problem+json</tspan></text>
  <text x="476" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">{</tspan></text>
  <text x="476" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">"type"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"https://.../not-found"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="476" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">"title"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"Resource Not Found"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="476" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">"status"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#b5cea8">404</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="476" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">"detail"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"User id=42 not found"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="476" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">"instance"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"/api/users/42"</tspan></text>
  <text x="476" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">}</tspan></text>
  <text x="476" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"> </text>
  <text x="476" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// type: 오류 유형 문서 URI</tspan></text>
  <text x="476" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// detail: 이번 요청에 특화된 설명</tspan></text>
  <text x="476" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// 확장 필드 자유롭게 추가 가능</tspan></text>

  <!-- Bottom note -->
  <text x="440" y="398" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#555">Spring 6 / Boot 3: ProblemDetail 클래스 기본 내장 · spring.mvc.problemdetails.enabled=true</text>
</svg>
