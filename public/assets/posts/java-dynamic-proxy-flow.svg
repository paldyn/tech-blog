<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">동적 프록시 — 호출을 가로채 위임한다</text>

  <defs>
    <marker id="dpArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- caller -->
  <rect x="50" y="130" width="150" height="70" rx="8" fill="#0f1626" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="125" y="162" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">호출자</text>
  <text x="125" y="183" font-size="12" fill="#888" text-anchor="middle">svc.pay()</text>

  <!-- proxy -->
  <rect x="270" y="120" width="170" height="90" rx="8" fill="#0d1322" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="355" y="150" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">$Proxy0</text>
  <text x="355" y="172" font-size="12" fill="#888" text-anchor="middle">런타임 생성 클래스</text>
  <text x="355" y="192" font-size="12" fill="#888" text-anchor="middle">implements Service</text>

  <!-- handler -->
  <rect x="510" y="120" width="180" height="90" rx="8" fill="#1a160d" stroke="#e0a955" stroke-width="1.5"/>
  <text x="600" y="150" font-size="14" font-weight="600" fill="#e0a955" text-anchor="middle">InvocationHandler</text>
  <text x="600" y="172" font-size="12" fill="#888" text-anchor="middle">invoke(proxy,</text>
  <text x="600" y="192" font-size="12" fill="#888" text-anchor="middle">method, args)</text>

  <!-- target -->
  <rect x="730" y="130" width="120" height="70" rx="8" fill="#102117" stroke="#55c555" stroke-width="1.5"/>
  <text x="790" y="162" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">실제 구현</text>
  <text x="790" y="183" font-size="12" fill="#888" text-anchor="middle">target</text>

  <line x1="200" y1="165" x2="268" y2="165" stroke="#7ec8e3" stroke-width="2" marker-end="url(#dpArr)"/>
  <line x1="440" y1="165" x2="508" y2="165" stroke="#7ec8e3" stroke-width="2" marker-end="url(#dpArr)"/>
  <line x1="690" y1="165" x2="728" y2="165" stroke="#7ec8e3" stroke-width="2" marker-end="url(#dpArr)"/>

  <text x="440" y="265" font-size="13" fill="#9aa4b8" text-anchor="middle">모든 메서드 호출이 invoke() 한 곳으로 모인다 — 로깅·트랜잭션·보안을 한 자리에 끼운다</text>
</svg>
