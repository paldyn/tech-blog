<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">5-겹 교차 검증 (5-Fold Cross-Validation)</text>
  <text x="440" y="66" text-anchor="middle" fill="#888" font-size="13">데이터 전체를 5등분하여 매 반복마다 검증 세트를 순환시킨다</text>

  <!-- Legend -->
  <rect x="620" y="84" width="14" height="14" rx="2" fill="#1a3a5c"/>
  <text x="640" y="96" fill="#7ec8e3" font-size="12">훈련</text>
  <rect x="700" y="84" width="14" height="14" rx="2" fill="#3a1a0a"/>
  <text x="720" y="96" fill="#e07030" font-size="12">검증</text>

  <!-- Fold labels -->
  <text x="50" y="126" text-anchor="middle" fill="#888" font-size="12">Fold 1</text>
  <text x="50" y="174" text-anchor="middle" fill="#888" font-size="12">Fold 2</text>
  <text x="50" y="222" text-anchor="middle" fill="#888" font-size="12">Fold 3</text>
  <text x="50" y="270" text-anchor="middle" fill="#888" font-size="12">Fold 4</text>
  <text x="50" y="318" text-anchor="middle" fill="#888" font-size="12">Fold 5</text>

  <!-- Each fold row: 5 blocks, x=80 to x=820, width=740 / 5 = 148 per block -->
  <!-- Row 1: val=0, train=1-4 -->
  <rect x="80"  y="108" width="146" height="36" rx="4" fill="#3a1a0a"/>
  <text x="153" y="131" text-anchor="middle" fill="#e07030" font-size="12" font-weight="600">검증</text>
  <rect x="228" y="108" width="146" height="36" rx="4" fill="#1a3a5c"/>
  <rect x="376" y="108" width="146" height="36" rx="4" fill="#1a3a5c"/>
  <rect x="524" y="108" width="146" height="36" rx="4" fill="#1a3a5c"/>
  <rect x="672" y="108" width="146" height="36" rx="4" fill="#1a3a5c"/>
  <text x="524" y="131" text-anchor="middle" fill="#7ec8e3" font-size="11">훈련 세트 (80%)</text>

  <!-- Row 2: val=1, train=0,2-4 -->
  <rect x="80"  y="156" width="146" height="36" rx="4" fill="#1a3a5c"/>
  <rect x="228" y="156" width="146" height="36" rx="4" fill="#3a1a0a"/>
  <text x="301" y="179" text-anchor="middle" fill="#e07030" font-size="12" font-weight="600">검증</text>
  <rect x="376" y="156" width="146" height="36" rx="4" fill="#1a3a5c"/>
  <rect x="524" y="156" width="146" height="36" rx="4" fill="#1a3a5c"/>
  <rect x="672" y="156" width="146" height="36" rx="4" fill="#1a3a5c"/>

  <!-- Row 3 -->
  <rect x="80"  y="204" width="146" height="36" rx="4" fill="#1a3a5c"/>
  <rect x="228" y="204" width="146" height="36" rx="4" fill="#1a3a5c"/>
  <rect x="376" y="204" width="146" height="36" rx="4" fill="#3a1a0a"/>
  <text x="449" y="227" text-anchor="middle" fill="#e07030" font-size="12" font-weight="600">검증</text>
  <rect x="524" y="204" width="146" height="36" rx="4" fill="#1a3a5c"/>
  <rect x="672" y="204" width="146" height="36" rx="4" fill="#1a3a5c"/>

  <!-- Row 4 -->
  <rect x="80"  y="252" width="146" height="36" rx="4" fill="#1a3a5c"/>
  <rect x="228" y="252" width="146" height="36" rx="4" fill="#1a3a5c"/>
  <rect x="376" y="252" width="146" height="36" rx="4" fill="#1a3a5c"/>
  <rect x="524" y="252" width="146" height="36" rx="4" fill="#3a1a0a"/>
  <text x="597" y="275" text-anchor="middle" fill="#e07030" font-size="12" font-weight="600">검증</text>
  <rect x="672" y="252" width="146" height="36" rx="4" fill="#1a3a5c"/>

  <!-- Row 5 -->
  <rect x="80"  y="300" width="146" height="36" rx="4" fill="#1a3a5c"/>
  <rect x="228" y="300" width="146" height="36" rx="4" fill="#1a3a5c"/>
  <rect x="376" y="300" width="146" height="36" rx="4" fill="#1a3a5c"/>
  <rect x="524" y="300" width="146" height="36" rx="4" fill="#1a3a5c"/>
  <rect x="672" y="300" width="146" height="36" rx="4" fill="#3a1a0a"/>
  <text x="745" y="323" text-anchor="middle" fill="#e07030" font-size="12" font-weight="600">검증</text>

  <!-- Score summary box -->
  <rect x="80" y="356" width="740" height="50" rx="8" fill="#111827" stroke="#333" stroke-width="1"/>
  <text x="200" y="377" text-anchor="middle" fill="#888" font-size="12">각 Fold 점수</text>
  <text x="200" y="395" text-anchor="middle" fill="#e8e8e8" font-size="13" font-weight="600">0.842, 0.857, 0.831, 0.863, 0.848</text>
  <text x="560" y="377" text-anchor="middle" fill="#888" font-size="12">최종 CV 점수</text>
  <text x="680" y="388" text-anchor="middle" fill="#7ec8e3" font-size="16" font-weight="700">0.848 ± 0.011</text>

  <!-- Footer -->
  <text x="440" y="428" text-anchor="middle" fill="#444" font-size="11">PALDYN · AI 완전 정복 시리즈</text>
</svg>
