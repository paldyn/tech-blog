<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">시크릿 관리 방식 비교</text>

  <!-- 방법 1: 하드코딩 (나쁨) -->
  <text x="145" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">하드코딩 (금지)</text>

  <rect x="40" y="96" width="210" height="60" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="145" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">application.yml에 평문 기재</text>
  <text x="145" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Git 히스토리에 영구 노출</text>

  <!-- 방법 2: 환경변수 (기본) -->
  <text x="440" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">환경변수 (기본)</text>

  <rect x="325" y="96" width="230" height="60" rx="6" fill="#0a1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">OS 환경변수 / Docker env</text>
  <text x="440" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">프로세스 간 격리 없음</text>

  <!-- 방법 3: Secrets Manager (권장) -->
  <text x="745" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Secrets Manager (권장)</text>

  <rect x="630" y="96" width="210" height="60" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="735" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">AWS / HashiCorp Vault</text>
  <text x="735" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">감사로그·자동 로테이션</text>

  <!-- 수평 구분선 -->
  <line x1="40" y1="178" x2="840" y2="178" stroke="#222" stroke-width="1"/>

  <!-- AWS Secrets Manager 흐름 -->
  <text x="440" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">AWS Secrets Manager 통합 흐름</text>

  <!-- Spring Boot App -->
  <rect x="60" y="226" width="180" height="64" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="150" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Spring Boot App</text>
  <text x="150" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">시작 시 시크릿 로드</text>

  <!-- IAM Role -->
  <rect x="300" y="226" width="160" height="64" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="380" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">IAM Role</text>
  <text x="380" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ECS Task Role</text>

  <line x1="240" y1="258" x2="298" y2="258" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- AWS Secrets Manager -->
  <rect x="520" y="226" width="200" height="64" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="620" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Secrets Manager</text>
  <text x="620" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">암호화된 시크릿 저장</text>

  <line x1="460" y1="258" x2="518" y2="258" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- 코드 박스 1: application.yml -->
  <rect x="40" y="322" width="380" height="210" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="60" y="346" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># application.yml (환경변수 참조)</text>
  <text x="60" y="366" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">spring</text>
  <text x="60" y="386" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  datasource:</text>
  <text x="60" y="406" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    url: ${DB_URL}</text>
  <text x="60" y="426" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    username: ${DB_USER}</text>
  <text x="60" y="446" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    password: ${DB_PASS}</text>
  <text x="60" y="466" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 기본값 제공 (개발용)</text>
  <text x="60" y="486" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    url: ${DB_URL:jdbc:h2:mem:dev}</text>
  <text x="60" y="506" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 콜론 뒤가 기본값</text>

  <!-- 코드 박스 2: AWS SDK -->
  <rect x="460" y="322" width="380" height="210" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="346" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># AWS Secrets Manager SDK 사용</text>
  <text x="480" y="366" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// build.gradle</text>
  <text x="480" y="386" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">implementation </text>
  <text x="608" y="386" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">'io.awspring.cloud</text>
  <text x="480" y="406" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">  :spring-cloud-aws-secrets-manager'</text>
  <text x="480" y="426" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// application.yml</text>
  <text x="480" y="446" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">spring.config.import</text>
  <text x="480" y="466" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  : aws-secretsmanager:/prod/myapp</text>
  <text x="480" y="486" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># /prod/myapp 의 JSON 키→프로퍼티 매핑</text>
  <text x="480" y="506" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># DB_URL, DB_PASS 등 자동 주입</text>
</svg>
