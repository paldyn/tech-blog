<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">관계 유형별 테이블 매핑 규칙</text>

  <!-- 1:1 -->
  <rect x="60" y="70" width="760" height="110" rx="8" fill="#0d0d0d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="93" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">① 1:1 관계</text>
  <text x="80" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b0b0b0">한쪽 테이블에 FK + UNIQUE 제약 추가 (또는 두 테이블 병합)</text>
  <rect x="80" y="120" width="700" height="48" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="96" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">-- EMPLOYEE(1) ↔ PARKING_SPOT(1)</text>
  <text x="96" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">ALTER TABLE</text><text x="191" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> parking_spots</text><text x="326" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3"> ADD</text><text x="359" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> employee_id INT </text><text x="499" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">UNIQUE REFERENCES</text><text x="657" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> employees(id);</text>

  <!-- 1:N -->
  <rect x="60" y="198" width="760" height="110" rx="8" fill="#0d0d0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">② 1:N 관계</text>
  <text x="80" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b0b0b0">N 쪽 테이블에 FK 추가 (가장 일반적인 관계)</text>
  <rect x="80" y="248" width="700" height="48" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="96" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">-- DEPARTMENT(1) → EMPLOYEE(N)</text>
  <text x="96" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">ALTER TABLE</tspan><tspan fill="#e8e8e8"> employees </tspan><tspan fill="#7ec8e3">ADD</tspan><tspan fill="#e8e8e8"> dept_id INT </tspan><tspan fill="#7ec8e3">REFERENCES</tspan><tspan fill="#e8e8e8"> departments(id);</tspan></text>

  <!-- N:M -->
  <rect x="60" y="326" width="760" height="120" rx="8" fill="#0d0d0d" stroke="#ce9178" stroke-width="1.5"/>
  <text x="80" y="349" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#ce9178">③ N:M 관계</text>
  <text x="80" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b0b0b0">교차 테이블(Junction Table) 생성: 양쪽 FK + 복합 PK</text>
  <rect x="80" y="376" width="700" height="58" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="96" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">-- STUDENT(N) ↔ COURSE(M)</text>
  <text x="96" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">CREATE TABLE</text><text x="192" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> enrollments (student_id INT, course_id INT,</text>
  <text x="96" y="430" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  </text><text x="108" y="430" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">PRIMARY KEY</text><text x="209" y="430" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> (student_id, course_id));</text>

  <!-- footer note -->
  <rect x="60" y="460" width="760" height="14" rx="4" fill="none"/>
  <text x="440" y="472" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">1:1은 드물다 — 같은 엔티티라면 병합, 보안·성능 이유로 분리할 때만 사용</text>
</svg>
