<svg xmlns="http://www.w3.org/2000/svg" width="880" height="280" viewBox="0 0 880 280">
  <defs>
    <marker id="sf_arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="280" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Self 타입과 메서드 체이닝</text>

  <!-- chain boxes -->
  <rect x="60" y="100" width="180" height="64" rx="8" fill="#111418" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="138" font-family="'JetBrains Mono','Menlo',monospace" font-size="13.5" fill="#ffffff" text-anchor="middle">Query()</text>

  <rect x="300" y="100" width="180" height="64" rx="8" fill="#111418" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="390" y="138" font-family="'JetBrains Mono','Menlo',monospace" font-size="13.5" fill="#ffffff" text-anchor="middle">.filter(a=1)</text>

  <rect x="540" y="100" width="180" height="64" rx="8" fill="#111418" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="630" y="138" font-family="'JetBrains Mono','Menlo',monospace" font-size="13.5" fill="#ffffff" text-anchor="middle">.limit(10)</text>

  <line x1="240" y1="132" x2="300" y2="132" stroke="#55c555" stroke-width="2.5" marker-end="url(#sf_arr)"/>
  <line x1="480" y1="132" x2="540" y2="132" stroke="#55c555" stroke-width="2.5" marker-end="url(#sf_arr)"/>

  <text x="150" y="194" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12" fill="#9aa4b8" text-anchor="middle">-&gt; Self</text>
  <text x="390" y="194" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12" fill="#9aa4b8" text-anchor="middle">-&gt; Self</text>
  <text x="630" y="194" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12" fill="#9aa4b8" text-anchor="middle">-&gt; Self</text>

  <text x="440" y="246" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="13" fill="#9aa4b8" text-anchor="middle">각 메서드가 Self를 반환 — 서브클래스에서도 정확한 자기 타입으로 추론된다</text>
</svg>
