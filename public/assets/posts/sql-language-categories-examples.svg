<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340">
  <rect width="880" height="340" fill="#0a0a0a" rx="12"/>
  <text x="440" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">분류별 대표 SQL 예시</text>
  <rect x="60" y="56" width="760" height="264" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="78" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- DDL: 구조 정의</text>
  <text x="76" y="98" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">CREATE TABLE</tspan> products (id <tspan fill="#b5cea8">INT</tspan> <tspan font-weight="600" fill="#7ec8e3">PRIMARY KEY</tspan>, name <tspan fill="#b5cea8">VARCHAR</tspan>(<tspan fill="#b5cea8">100</tspan>));</text>
  <text x="76" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">ALTER TABLE</tspan> products <tspan font-weight="600" fill="#7ec8e3">ADD COLUMN</tspan> price <tspan fill="#b5cea8">DECIMAL</tspan>(<tspan fill="#b5cea8">10,2</tspan>);</text>
  <text x="76" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- DML: 데이터 조작</text>
  <text x="76" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">INSERT INTO</tspan> products (id, name, price) <tspan font-weight="600" fill="#7ec8e3">VALUES</tspan> (<tspan fill="#b5cea8">1</tspan>, <tspan fill="#ce9178">'노트북'</tspan>, <tspan fill="#b5cea8">1590000</tspan>);</text>
  <text x="76" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">UPDATE</tspan> products <tspan font-weight="600" fill="#7ec8e3">SET</tspan> price = <tspan fill="#b5cea8">1490000</tspan> <tspan font-weight="600" fill="#7ec8e3">WHERE</tspan> id = <tspan fill="#b5cea8">1</tspan>;</text>
  <text x="76" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">SELECT</tspan> * <tspan font-weight="600" fill="#7ec8e3">FROM</tspan> products <tspan font-weight="600" fill="#7ec8e3">WHERE</tspan> price &gt; <tspan fill="#b5cea8">1000000</tspan>;</text>
  <text x="76" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- DCL: 권한 제어</text>
  <text x="76" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">GRANT</tspan> <tspan font-weight="600" fill="#7ec8e3">SELECT</tspan>, <tspan font-weight="600" fill="#7ec8e3">INSERT</tspan> <tspan font-weight="600" fill="#7ec8e3">ON</tspan> products <tspan font-weight="600" fill="#7ec8e3">TO</tspan> app_user;</text>
  <text x="76" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- TCL: 트랜잭션 제어</text>
  <text x="76" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">BEGIN</tspan>; <tspan font-weight="600" fill="#7ec8e3">UPDATE</tspan> ...; <tspan font-weight="600" fill="#7ec8e3">INSERT</tspan> ...; <tspan font-weight="600" fill="#7ec8e3">COMMIT</tspan>;</text>
  <text x="76" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- ROLLBACK 조건: 예외 발생 시 모두 취소</text>
</svg>
