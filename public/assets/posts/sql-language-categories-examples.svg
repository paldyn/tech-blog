<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">분류별 SQL 예시</text>

  <!-- DDL example -->
  <rect x="60" y="66" width="360" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">DDL 예시</text>
  <text x="80" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">CREATE TABLE</tspan><tspan fill="#ffffff"> 고객 (</tspan></text>
  <text x="80" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  고객ID  </tspan><tspan fill="#7ec8e3" font-weight="600">VARCHAR</tspan><tspan fill="#ffffff">(10) </tspan><tspan fill="#7ec8e3" font-weight="600">PRIMARY KEY</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="80" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  이름    </tspan><tspan fill="#7ec8e3" font-weight="600">VARCHAR</tspan><tspan fill="#ffffff">(50) </tspan><tspan fill="#7ec8e3" font-weight="600">NOT NULL</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="80" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  나이    </tspan><tspan fill="#7ec8e3" font-weight="600">INTEGER</tspan></text>
  <text x="80" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">);</tspan></text>
  <text x="80" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">-- 자동 커밋, 롤백 불가</text>

  <!-- DML example -->
  <rect x="460" y="66" width="360" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">DML 예시</text>
  <text x="480" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">INSERT INTO</tspan><tspan fill="#ffffff"> 고객</tspan></text>
  <text x="480" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  (고객ID, 이름, 나이)</tspan></text>
  <text x="480" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">VALUES</tspan></text>
  <text x="480" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  (</tspan><tspan fill="#ce9178">'C001'</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">'홍길동'</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">25</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="480" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">-- ROLLBACK으로 취소 가능</text>

  <!-- TCL example -->
  <rect x="60" y="240" width="360" height="132" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">TCL 예시</text>
  <text x="80" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">BEGIN</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="80" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">UPDATE</tspan><tspan fill="#ffffff"> 계좌 </tspan><tspan fill="#7ec8e3" font-weight="600">SET</tspan><tspan fill="#ffffff"> 잔액 = 잔액 - </tspan><tspan fill="#b5cea8">10000</tspan></text>
  <text x="80" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">WHERE</tspan><tspan fill="#ffffff"> 계좌ID = </tspan><tspan fill="#ce9178">'A001'</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="80" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">UPDATE</tspan><tspan fill="#ffffff"> 계좌 </tspan><tspan fill="#7ec8e3" font-weight="600">SET</tspan><tspan fill="#ffffff"> 잔액 = 잔액 + </tspan><tspan fill="#b5cea8">10000</tspan></text>
  <text x="80" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">WHERE</tspan><tspan fill="#ffffff"> 계좌ID = </tspan><tspan fill="#ce9178">'A002'</tspan><tspan fill="#ffffff">;</tspan></text>

  <!-- DCL example -->
  <rect x="460" y="240" width="360" height="132" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ce9178">DCL 예시</text>
  <text x="480" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">-- 권한 부여</tspan></text>
  <text x="480" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">GRANT</tspan><tspan fill="#ffffff"> SELECT, INSERT</tspan></text>
  <text x="480" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">ON</tspan><tspan fill="#ffffff"> 고객</tspan></text>
  <text x="480" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">TO</tspan><tspan fill="#ffffff"> app_user;</tspan></text>
  <text x="480" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">-- 최소 권한 원칙(PoLP) 적용</text>

  <text x="440" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">DML은 항상 트랜잭션 안에서 실행 — DDL은 트랜잭션 지원 여부가 DBMS마다 다름</text>
</svg>
