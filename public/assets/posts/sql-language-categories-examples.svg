<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">SQL 분류별 대표 문법</text>

  <!-- DDL -->
  <rect x="30" y="68" width="160" height="28" fill="#192040" rx="4"/>
  <text x="110" y="86" text-anchor="middle" font-size="13" font-weight="700" fill="#7ec8e3">DDL — 구조 정의</text>
  <rect x="30" y="98" width="400" height="106" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="50" y="118" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">CREATE TABLE orders (</text>
  <text x="50" y="136" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">  id       INT PRIMARY KEY,</text>
  <text x="50" y="154" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">  total    NUMERIC(12,2)</text>
  <text x="50" y="172" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">);</text>
  <text x="50" y="194" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">ALTER TABLE orders ADD status VARCHAR(20);</text>

  <!-- DML -->
  <rect x="450" y="68" width="160" height="28" fill="#0f2010" rx="4"/>
  <text x="530" y="86" text-anchor="middle" font-size="13" font-weight="700" fill="#55c555">DML — 데이터 조작</text>
  <rect x="450" y="98" width="400" height="106" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="470" y="118" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">INSERT INTO orders VALUES (1, 99.99);</text>
  <text x="470" y="138" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">UPDATE orders</text>
  <text x="470" y="156" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">  SET    status = </text>
  <text x="600" y="156" font-size="13" fill="#ce9178" font-family="'JetBrains Mono','Menlo',monospace">'paid'</text>
  <text x="470" y="174" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">  WHERE  id = 1;</text>
  <text x="470" y="194" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">DELETE FROM orders WHERE id = 1;</text>

  <!-- DQL -->
  <rect x="30" y="228" width="160" height="28" fill="#1a1a2e" rx="4"/>
  <text x="110" y="246" text-anchor="middle" font-size="13" font-weight="700" fill="#7777cc">DQL — 데이터 조회</text>
  <rect x="30" y="258" width="400" height="106" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="50" y="278" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">SELECT id, total, status</text>
  <text x="50" y="296" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">FROM   orders</text>
  <text x="50" y="314" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">WHERE  status = </text>
  <text x="198" y="314" font-size="13" fill="#ce9178" font-family="'JetBrains Mono','Menlo',monospace">'paid'</text>
  <text x="50" y="332" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">ORDER  BY id DESC</text>
  <text x="50" y="350" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">LIMIT  10;</text>

  <!-- DCL + TCL -->
  <rect x="450" y="228" width="160" height="28" fill="#1a0f0f" rx="4"/>
  <text x="530" y="246" text-anchor="middle" font-size="13" font-weight="700" fill="#e05555">DCL — 권한 제어</text>
  <rect x="450" y="258" width="400" height="60" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="470" y="278" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">GRANT SELECT ON orders TO app_user;</text>
  <text x="470" y="298" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">REVOKE DELETE ON orders FROM app_user;</text>

  <rect x="450" y="334" width="160" height="28" fill="#1a100a" rx="4"/>
  <text x="530" y="352" text-anchor="middle" font-size="13" font-weight="700" fill="#ce9178">TCL — 트랜잭션 제어</text>
  <rect x="450" y="364" width="400" height="60" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="470" y="384" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">BEGIN;</text>
  <text x="470" y="402" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">COMMIT;   -- 또는 ROLLBACK;</text>

  <!-- Bottom: note on auto-commit -->
  <rect x="30" y="432" width="820" height="48" fill="#0f1320" stroke="#2a3a5e" stroke-width="1" rx="6"/>
  <text x="440" y="452" text-anchor="middle" font-size="12" font-weight="600" fill="#e8e8e8">AUTO COMMIT 주의</text>
  <text x="440" y="470" text-anchor="middle" font-size="11" fill="#888">대부분의 드라이버는 기본적으로 AUTO COMMIT ON — DDL/DML 실행 즉시 커밋됨. 트랜잭션이 필요하면 명시적으로 BEGIN 후 COMMIT/ROLLBACK</text>
</svg>
