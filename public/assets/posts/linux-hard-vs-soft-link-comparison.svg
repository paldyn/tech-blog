<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420" style="background:#0a0a0a;border-radius:12px;">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">링크 생성 &amp; 비교 표</text>
  <text x="440" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">ln 명령어와 주요 차이점</text>

  <!-- commands -->
  <text x="80" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">링크 생성 명령</text>
  <rect x="60" y="120" width="760" height="100" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 하드 링크: 동일 파일시스템, 디렉터리 불가</text>
  <text x="76" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ ln <tspan fill="#ce9178">original.txt</tspan><tspan fill="#e8e8e8"> hardlink.txt</tspan></text>
  <text x="76" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 심볼릭 링크: 다른 파일시스템·절대경로·디렉터리 모두 가능</text>
  <text x="76" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">$ ln -s <tspan fill="#ce9178">/path/to/original.txt</tspan><tspan fill="#e8e8e8"> symlink.txt</tspan></text>

  <!-- comparison table -->
  <rect x="60" y="238" width="760" height="36" fill="#1e2433" rx="6"/>
  <text x="195" y="261" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">항목</text>
  <text x="460" y="261" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">하드 링크</text>
  <text x="700" y="261" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">심볼릭 링크</text>

  <rect x="60" y="274" width="760" height="26" fill="#111827"/>
  <text x="195" y="291" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">inode 번호</text>
  <text x="460" y="291" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">원본과 동일</text>
  <text x="700" y="291" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">독립된 inode</text>

  <rect x="60" y="300" width="760" height="26" fill="#0f1621"/>
  <text x="195" y="317" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">파일시스템 경계</text>
  <text x="460" y="317" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">동일 파일시스템만</text>
  <text x="700" y="317" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">경계 무관</text>

  <rect x="60" y="326" width="760" height="26" fill="#111827"/>
  <text x="195" y="343" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">디렉터리 링크</text>
  <text x="460" y="343" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">루트만 가능(제한)</text>
  <text x="700" y="343" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">가능</text>

  <rect x="60" y="352" width="760" height="26" fill="#0f1621"/>
  <text x="195" y="369" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">원본 삭제 시</text>
  <text x="460" y="369" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">데이터 계속 유지</text>
  <text x="700" y="369" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">댕글링(깨진) 링크</text>

  <rect x="60" y="378" width="760" height="26" fill="#111827" rx="0" style="border-bottom-left-radius:6px; border-bottom-right-radius:6px;"/>
  <text x="195" y="395" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">ls -l 출력</text>
  <text x="460" y="395" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" text-anchor="middle">-rw-r--r-- 2 …</text>
  <text x="700" y="395" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc" text-anchor="middle">lrwxrwxrwx … → …</text>

  <text x="440" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">ls -l 첫 글자: - 일반파일, l 심볼릭링크, d 디렉터리</text>
</svg>
