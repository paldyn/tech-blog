<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 430" style="background:#0a0a0a;border-radius:12px;">
  <defs>
    <marker id="arrGreen" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrGray" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888888"/>
    </marker>
    <marker id="arrYellow" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8c800"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Zustand 스토어 모델</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">React 외부의 단일 스토어와 선택적 구독</text>

  <!-- set() trigger chip -->
  <rect x="80" y="112" width="170" height="46" rx="8" fill="#1a1a00" stroke="#e8c800" stroke-width="2"/>
  <text x="165" y="140" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#e8c800">set({ bears: 3 })</text>
  <line x1="250" y1="135" x2="315" y2="135" stroke="#e8c800" stroke-width="2" marker-end="url(#arrYellow)"/>

  <!-- Store box -->
  <rect x="315" y="100" width="250" height="70" rx="8" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="122" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Zustand 스토어</text>
  <text x="440" y="140" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">{ bears: 3, fish: 7 }</text>
  <text x="440" y="158" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">React 트리 밖에 존재</text>

  <!-- Subscription arrows -->
  <line x1="375" y1="170" x2="170" y2="240" stroke="#55c555" stroke-width="2" marker-end="url(#arrGreen)"/>
  <text x="230" y="200" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">리렌더</text>
  <line x1="440" y1="170" x2="440" y2="240" stroke="#888888" stroke-width="2"
        stroke-dasharray="4,4" marker-end="url(#arrGray)"/>
  <text x="458" y="208" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">스킵</text>
  <line x1="505" y1="170" x2="710" y2="240" stroke="#55c555" stroke-width="2" marker-end="url(#arrGreen)"/>
  <text x="650" y="200" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">리렌더</text>

  <!-- Component boxes -->
  <rect x="50" y="240" width="240" height="70" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="2"/>
  <text x="170" y="262" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#55c555">BearCounter</text>
  <text x="170" y="280" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff">useStore(s =&gt; s.bears)</text>
  <text x="170" y="298" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">bears 변경 → 리렌더</text>

  <rect x="320" y="240" width="240" height="70" rx="8" fill="#12121f" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="262" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7777cc">FishTank</text>
  <text x="440" y="280" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff">useStore(s =&gt; s.fish)</text>
  <text x="440" y="298" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">fish 그대로 → 스킵</text>

  <rect x="590" y="240" width="240" height="70" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="2"/>
  <text x="710" y="262" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#55c555">BearHeader</text>
  <text x="710" y="280" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff">useStore(s =&gt; s.bears)</text>
  <text x="710" y="298" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">bears 변경 → 리렌더</text>

  <text x="440" y="372" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">선택한 조각이 Object.is 비교로 달라졌을 때만 해당 컴포넌트가 리렌더링된다</text>
</svg>
