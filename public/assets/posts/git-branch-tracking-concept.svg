<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">추적 브랜치(Tracking Branch) 개념</text>
  <text x="60" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">로컬 브랜치가 원격 브랜치를 '추적'하는 관계</text>

  <!-- Local side -->
  <rect x="60" y="108" width="340" height="200" rx="10" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="230" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">로컬 저장소</text>

  <!-- local main branch -->
  <rect x="90" y="152" width="120" height="36" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.2"/>
  <text x="150" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">main</text>

  <!-- local commit -->
  <rect x="230" y="152" width="150" height="36" rx="6" fill="#0d1117" stroke="#555" stroke-width="1"/>
  <text x="305" y="175" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" text-anchor="middle">abc1234 (C5)</text>

  <!-- remote tracking ref -->
  <rect x="90" y="210" width="120" height="36" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.2"/>
  <text x="150" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">origin/main</text>
  <text x="150" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">(원격 추적 브랜치)</text>

  <!-- remote tracking commit -->
  <rect x="230" y="210" width="150" height="36" rx="6" fill="#0d1117" stroke="#555" stroke-width="1"/>
  <text x="305" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" text-anchor="middle">def5678 (C4)</text>
  <text x="305" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8a838" text-anchor="middle">1 ahead, 0 behind</text>

  <text x="230" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">로컬이 1 커밋 앞</text>

  <!-- Remote side -->
  <rect x="480" y="108" width="340" height="200" rx="10" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="650" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">원격 저장소 (origin)</text>

  <!-- remote main -->
  <rect x="510" y="152" width="120" height="36" rx="6" fill="#0d1a1a" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="570" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">main</text>

  <!-- remote commit -->
  <rect x="650" y="152" width="150" height="36" rx="6" fill="#0d1117" stroke="#555" stroke-width="1"/>
  <text x="725" y="175" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" text-anchor="middle">def5678 (C4)</text>

  <!-- Arrow between local and remote -->
  <line x1="400" y1="178" x2="480" y2="178" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="480,173 492,178 480,183" fill="#7ec8e3"/>
  <text x="440" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">push</text>

  <line x1="480" y1="220" x2="400" y2="220" stroke="#55c555" stroke-width="2"/>
  <polygon points="400,215 388,220 400,225" fill="#55c555"/>
  <text x="440" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">fetch/pull</text>

  <!-- Status explanation -->
  <rect x="60" y="326" width="760" height="118" rx="8" fill="#0d1117" stroke="#3a4a6e"/>
  <text x="80" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">추적 상태 확인</text>
  <text x="80" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">$ git status</text>
  <text x="80" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">On branch main</text>
  <text x="80" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">Your branch is ahead of 'origin/main' by 1 commit.</text>
  <text x="80" y="426" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  (use "git push" to publish your local commits)</text>
</svg>
