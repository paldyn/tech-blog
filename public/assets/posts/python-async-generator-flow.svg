<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 320">
  <rect width="880" height="320" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">비동기 제너레이터 동작 흐름</text>

  <!-- Row 1: comparison header -->
  <text x="230" y="72" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">동기 제너레이터</text>
  <text x="650" y="72" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">비동기 제너레이터</text>

  <!-- Sync generator code -->
  <rect x="50" y="82" width="360" height="108" rx="6"
        fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="66" y="105" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan font-weight="600" fill="#7ec8e3">def </tspan><tspan>sync_squares(n):</tspan>
  </text>
  <text x="66" y="123" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="66" dy="0">    </tspan><tspan font-weight="600" fill="#7ec8e3">for </tspan><tspan>i </tspan><tspan font-weight="600" fill="#7ec8e3">in </tspan><tspan>range(n):</tspan>
  </text>
  <text x="66" y="141" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="66" dy="0">        </tspan><tspan font-weight="600" fill="#7ec8e3">yield </tspan><tspan>i * i</tspan>
  </text>
  <text x="66" y="167" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 반환: generator 객체</text>

  <!-- Arrow middle -->
  <text x="440" y="132" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">+async +await</text>
  <line x1="430" y1="142" x2="460" y2="142"
        stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Async generator code -->
  <rect x="470" y="82" width="360" height="108" rx="6"
        fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="486" y="105" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan font-weight="600" fill="#7ec8e3">async def </tspan><tspan>async_squares(n):</tspan>
  </text>
  <text x="486" y="123" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="486" dy="0">    </tspan><tspan font-weight="600" fill="#7ec8e3">for </tspan><tspan>i </tspan><tspan font-weight="600" fill="#7ec8e3">in </tspan><tspan>range(n):</tspan>
  </text>
  <text x="486" y="141" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="486" dy="0">        </tspan><tspan font-weight="600" fill="#7ec8e3">yield </tspan><tspan>i * i</tspan>
  </text>
  <text x="486" y="167" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 반환: async_generator 객체</text>

  <!-- Key differences box -->
  <rect x="50" y="214" width="780" height="90" rx="8"
        fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="238" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">비동기 제너레이터만의 특징</text>
  <text x="240" y="264" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">async def 내부에서 await 사용 가능</text>
  <text x="640" y="264" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">async for로 소비 (await anext())</text>
  <text x="440" y="290" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">return에 값 불가 (return None만 허용) | yield from 사용 불가 (async for 대신)</text>
</svg>
