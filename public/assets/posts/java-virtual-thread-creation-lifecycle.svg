<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="340" rx="12" fill="#0a0a0a"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Virtual Thread 생명주기</text>

  <!-- NEW -->
  <rect x="60" y="80" width="110" height="48" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="115" y="109" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888" text-anchor="middle">NEW</text>

  <!-- RUNNABLE -->
  <rect x="220" y="80" width="130" height="48" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="285" y="109" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">RUNNABLE</text>

  <!-- RUNNING (mounted) -->
  <rect x="410" y="80" width="160" height="48" rx="8" fill="#0f1a2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="490" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">RUNNING</text>
  <text x="490" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(캐리어에 mounted)</text>

  <!-- PARKED -->
  <rect x="490" y="200" width="140" height="48" rx="8" fill="#0f1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="560" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">PARKED</text>
  <text x="560" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(I/O 대기, unmounted)</text>

  <!-- TERMINATED -->
  <rect x="690" y="80" width="130" height="48" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="755" y="109" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#555" text-anchor="middle">TERMINATED</text>

  <!-- Arrows -->
  <line x1="170" y1="104" x2="220" y2="104" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="195" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">start()</text>

  <line x1="350" y1="104" x2="410" y2="104" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="380" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">mount</text>

  <line x1="570" y1="104" x2="690" y2="104" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="630" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">완료</text>

  <!-- Running -> Parked -->
  <line x1="530" y1="128" x2="540" y2="200" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>
  <text x="505" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7777cc" text-anchor="middle">I/O 블로킹</text>

  <!-- Parked -> Runnable -->
  <path d="M 490 224 Q 360 260 285 128" stroke="#7ec8e3" stroke-width="2" fill="none" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <text x="360" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3" text-anchor="middle">I/O 완료 → 스케줄 큐 복귀</text>

  <!-- Notes -->
  <rect x="60" y="274" width="380" height="44" rx="6" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="250" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">interrupt() → PARKED 상태에서 InterruptedException</text>
  <text x="250" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">플랫폼 스레드와 동일한 취소 메커니즘</text>
</svg>
