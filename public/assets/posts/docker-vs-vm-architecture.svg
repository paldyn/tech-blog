<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">VM vs 컨테이너 아키텍처 비교</text>

  <!-- VM Column header -->
  <text x="220" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e05555">가상 머신 (VM)</text>

  <!-- Container Column header -->
  <text x="660" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555">컨테이너</text>

  <!-- Divider -->
  <line x1="440" y1="62" x2="440" y2="470" stroke="#222" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- VM stack -->
  <!-- VM App boxes (3 VMs) -->
  <rect x="62" y="96" width="104" height="40" fill="#2a0f0f" stroke="#e05555" rx="6"/>
  <text x="114" y="121" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">App A</text>

  <rect x="174" y="96" width="104" height="40" fill="#2a0f0f" stroke="#e05555" rx="6"/>
  <text x="226" y="121" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">App B</text>

  <rect x="286" y="96" width="104" height="40" fill="#2a0f0f" stroke="#e05555" rx="6"/>
  <text x="338" y="121" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">App C</text>

  <!-- Guest OS -->
  <rect x="62" y="144" width="104" height="36" fill="#1c0909" stroke="#a03030" rx="5"/>
  <text x="114" y="167" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#cc8080">Guest OS</text>

  <rect x="174" y="144" width="104" height="36" fill="#1c0909" stroke="#a03030" rx="5"/>
  <text x="226" y="167" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#cc8080">Guest OS</text>

  <rect x="286" y="144" width="104" height="36" fill="#1c0909" stroke="#a03030" rx="5"/>
  <text x="338" y="167" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#cc8080">Guest OS</text>

  <!-- Hypervisor -->
  <rect x="62" y="190" width="328" height="44" fill="#1a0a0a" stroke="#cc4444" stroke-width="1.5" rx="7"/>
  <text x="226" y="217" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">Hypervisor (VMware / KVM / Hyper-V)</text>

  <!-- Host OS (VM) -->
  <rect x="62" y="244" width="328" height="40" fill="#111" stroke="#555" rx="6"/>
  <text x="226" y="269" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa">Host OS</text>

  <!-- Hardware (VM) -->
  <rect x="62" y="294" width="328" height="40" fill="#0c0c0c" stroke="#444" rx="6"/>
  <text x="226" y="319" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Hardware</text>

  <!-- VM characteristics -->
  <text x="226" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">● 각 VM마다 Guest OS 포함 (수 GB)</text>
  <text x="226" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">● 부팅 시간: 수십 초 ~ 수 분</text>
  <text x="226" y="404" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">● 강한 격리 (하드웨어 수준)</text>
  <text x="226" y="426" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">● 다른 커널/OS 실행 가능</text>

  <!-- Container stack -->
  <!-- Container boxes -->
  <rect x="456" y="96" width="104" height="40" fill="#0f2a0f" stroke="#55c555" rx="6"/>
  <text x="508" y="121" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">App A</text>

  <rect x="568" y="96" width="104" height="40" fill="#0f2a0f" stroke="#55c555" rx="6"/>
  <text x="620" y="121" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">App B</text>

  <rect x="680" y="96" width="104" height="40" fill="#0f2a0f" stroke="#55c555" rx="6"/>
  <text x="732" y="121" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">App C</text>

  <!-- Libs (container) -->
  <rect x="456" y="144" width="104" height="36" fill="#0a1c0a" stroke="#336633" rx="5"/>
  <text x="508" y="167" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#88bb88">Libs</text>

  <rect x="568" y="144" width="104" height="36" fill="#0a1c0a" stroke="#336633" rx="5"/>
  <text x="620" y="167" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#88bb88">Libs</text>

  <rect x="680" y="144" width="104" height="36" fill="#0a1c0a" stroke="#336633" rx="5"/>
  <text x="732" y="167" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#88bb88">Libs</text>

  <!-- Container Runtime -->
  <rect x="456" y="190" width="328" height="44" fill="#0a1a0a" stroke="#44aa44" stroke-width="1.5" rx="7"/>
  <text x="620" y="217" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">Container Runtime (Docker / containerd)</text>

  <!-- Host OS (shared) -->
  <rect x="456" y="244" width="328" height="40" fill="#111" stroke="#555" rx="6"/>
  <text x="620" y="269" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa">Host OS Kernel (공유)</text>

  <!-- Hardware (container) -->
  <rect x="456" y="294" width="328" height="40" fill="#0c0c0c" stroke="#444" rx="6"/>
  <text x="620" y="319" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Hardware</text>

  <!-- Container characteristics -->
  <text x="620" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">● 커널 공유, 이미지 수십 MB 수준</text>
  <text x="620" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">● 시작 시간: 수백 ms ~ 수 초</text>
  <text x="620" y="404" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">● namespace 수준 격리</text>
  <text x="620" y="426" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">● 동일 커널 위에서만 실행 가능</text>
</svg>
