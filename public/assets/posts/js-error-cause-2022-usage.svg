<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Error cause 사용 패턴</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">new Error(msg, { cause }) / 커스텀 클래스 / 체인 출력</text>

  <!-- Left: basic cause usage -->
  <rect x="50" y="90" width="370" height="200" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="235" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">cause 전달 패턴</text>

  <text x="66" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">async function</tspan><tspan fill="#e8e8e8"> getUser(id) {</tspan></text>
  
  <text x="66" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">  try</tspan><tspan fill="#e8e8e8"> {</tspan></text>
  
  <text x="66" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">    return await</tspan><tspan fill="#e8e8e8"> fetchUser(id);</tspan></text>
  
  <text x="66" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  } </tspan><tspan fill="#7ec8e3">catch</tspan><tspan fill="#e8e8e8"> (cause) {</tspan></text>

  <text x="66" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">    throw new</tspan><tspan fill="#e8e8e8"> Error(</tspan></text>
  
  <text x="66" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">      `사용자 ${id} 로드 실패`</text>
  <text x="66" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">      , { cause }  </tspan><tspan fill="#6a8aa0">// cause 전달!</tspan></text>
  
  <text x="66" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    );</text>
  <text x="66" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  }</text>
  <text x="66" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>

  <!-- Right: printCauseChain -->
  <rect x="460" y="90" width="370" height="200" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="645" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">cause 체인 출력</text>

  <text x="476" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">function</tspan><tspan fill="#e8e8e8"> printChain(e, depth = </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#e8e8e8">) {</tspan></text>

  <text x="476" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  console.error(</text>
  <text x="476" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ce9178">    `${'  '.repeat(depth)}</tspan><tspan fill="#e8e8e8">${e.name}: ${e.message}</tspan><tspan fill="#ce9178">`</tspan></text>

  <text x="476" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  );</text>
  <text x="476" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">  if</tspan><tspan fill="#e8e8e8"> (e.cause </tspan><tspan fill="#7ec8e3">instanceof</tspan><tspan fill="#e8e8e8"> Error)</tspan></text>

  <text x="476" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    printChain(e.cause, depth + </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">);</tspan></text>

  <text x="476" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>
  <text x="476" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// DashboardError: 대시보드 로드 실패</text>
  <text x="476" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">//   UserServiceError: 사용자 로드 실패</text>

  <!-- Bottom notes -->
  <rect x="50" y="308" width="370" height="106" rx="6" fill="#0a1020" stroke="#7ec8e3"/>
  <text x="235" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">브라우저/Node.js 지원</text>
  <text x="66" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• Node.js 16.9+ / Chrome 93+ 지원</text>
  <text x="66" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 구형 환경: 수동으로 this.cause = cause</text>
  <text x="66" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  super()에 options 전달 전에 할당</text>

  <rect x="460" y="308" width="370" height="106" rx="6" fill="#0a180a" stroke="#55c555"/>
  <text x="645" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">이전 방식 vs cause</text>
  <text x="476" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">이전: e.message에 원인 문자열 삽입</text>
  <text x="476" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">cause: 원인 에러 객체 자체를 연결</text>
  <text x="476" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  → 체인 순회 · 타입 검사 가능</text>
</svg>
