<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">배열 타입 구조와 UNNEST 변환</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">행 안의 배열 → 행들의 집합으로 펼치기</text>

  <!-- Left: Array row in table -->
  <text x="60" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">article 테이블 (배열 저장)</text>

  <!-- Table header -->
  <rect x="60" y="116" width="340" height="36" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="100" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">id</text>
  <text x="160" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">title</text>
  <text x="280" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">tags (text[])</text>

  <!-- Row 1 -->
  <rect x="60" y="152" width="340" height="36" rx="0" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="100" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">1</text>
  <text x="160" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">PG 가이드</text>
  <rect x="272" y="158" width="20" height="22" rx="3" fill="#1a2e1a" stroke="#55c555" stroke-width="1"/>
  <text x="282" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">pg</text>
  <rect x="296" y="158" width="30" height="22" rx="3" fill="#1a2e1a" stroke="#55c555" stroke-width="1"/>
  <text x="311" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">sql</text>
  <rect x="330" y="158" width="40" height="22" rx="3" fill="#1a2e1a" stroke="#55c555" stroke-width="1"/>
  <text x="350" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">index</text>

  <!-- Row 2 -->
  <rect x="60" y="188" width="340" height="36" rx="0" fill="#0e0e0e" stroke="#2a2a2a" stroke-width="1"/>
  <text x="100" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">2</text>
  <text x="160" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">MySQL 튜닝</text>
  <rect x="272" y="194" width="38" height="22" rx="3" fill="#1a2e1a" stroke="#55c555" stroke-width="1"/>
  <text x="291" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">mysql</text>
  <rect x="314" y="194" width="30" height="22" rx="3" fill="#1a2e1a" stroke="#55c555" stroke-width="1"/>
  <text x="329" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">sql</text>

  <!-- Arrow: UNNEST -->
  <line x1="420" y1="200" x2="460" y2="200" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="460,194 474,200 460,206" fill="#7ec8e3"/>
  <text x="447" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">UNNEST</text>

  <!-- Right: unnested result -->
  <text x="490" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">UNNEST 결과 (행으로 펼쳐짐)</text>

  <!-- Result table header -->
  <rect x="490" y="116" width="330" height="36" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="520" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">id</text>
  <text x="570" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">title</text>
  <text x="700" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">tag</text>

  <!-- Result rows -->
  <rect x="490" y="152" width="330" height="30" rx="0" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="520" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">1</text>
  <text x="570" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">PG 가이드</text>
  <text x="700" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">pg</text>

  <rect x="490" y="182" width="330" height="30" rx="0" fill="#0e0e0e" stroke="#2a2a2a" stroke-width="1"/>
  <text x="520" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">1</text>
  <text x="570" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">PG 가이드</text>
  <text x="700" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">sql</text>

  <rect x="490" y="212" width="330" height="30" rx="0" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="520" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">1</text>
  <text x="570" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">PG 가이드</text>
  <text x="700" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">index</text>

  <rect x="490" y="242" width="330" height="30" rx="0" fill="#0e0e0e" stroke="#2a2a2a" stroke-width="1"/>
  <text x="520" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">2</text>
  <text x="570" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">MySQL 튜닝</text>
  <text x="700" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">mysql</text>

  <rect x="490" y="272" width="330" height="30" rx="0" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="520" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">2</text>
  <text x="570" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">MySQL 튜닝</text>
  <text x="700" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">sql</text>

  <!-- GIN Index Note -->
  <rect x="60" y="350" width="340" height="110" rx="8" fill="#0d1a1f" stroke="#7ec8e3" stroke-width="1"/>
  <text x="230" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">GIN 인덱스 — 배열 검색 핵심</text>
  <text x="80" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• @&gt;  tags @&gt; ARRAY['sql'] — sql 포함 검색</text>
  <text x="80" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• &lt;@  ARRAY['pg'] &lt;@ tags — 역방향 포함</text>
  <text x="80" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• &amp;&amp;  tags &amp;&amp; ARRAY['pg','sql'] — 교집합</text>
  <text x="80" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">• CREATE INDEX ON article USING GIN(tags)</text>

  <!-- Array functions note -->
  <rect x="430" y="350" width="390" height="110" rx="8" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="625" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">유용한 배열 함수</text>
  <text x="450" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">array_length(arr, dim) — 차원별 길이</text>
  <text x="450" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">array_append / array_prepend — 원소 추가</text>
  <text x="450" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">array_remove(arr, elem) — 원소 제거</text>
  <text x="450" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">array_agg(col) — 값 → 배열로 집계</text>
</svg>
