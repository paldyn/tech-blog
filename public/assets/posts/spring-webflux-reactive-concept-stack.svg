<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Reactive Streams 스펙 &amp; WebFlux 스택</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">Publisher → Subscriber 계약 기반 논블로킹 스트림</text>

  <!-- Reactive Streams 4대 인터페이스 (좌측) -->
  <text x="220" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8c84a">Reactive Streams 인터페이스</text>

  <rect x="60" y="116" width="340" height="240" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" xml:space="preserve">// 4개 핵심 인터페이스 (java.util.concurrent.Flow)</text>
  <text x="76" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">interface</tspan><tspan fill="#ffffff"> Publisher</tspan><tspan fill="#ce9178">&lt;T&gt;</tspan><tspan fill="#ffffff"> {</tspan></text>
  <text x="76" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  <tspan font-weight="600" fill="#7ec8e3">void</tspan><tspan fill="#ffffff"> subscribe(Subscriber</tspan><tspan fill="#ce9178">&lt;T&gt;</tspan><tspan fill="#ffffff"> s);</tspan></text>
  <text x="76" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>
  <text x="76" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">interface</tspan><tspan fill="#ffffff"> Subscriber</tspan><tspan fill="#ce9178">&lt;T&gt;</tspan><tspan fill="#ffffff"> {</tspan></text>
  <text x="76" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  <tspan font-weight="600" fill="#7ec8e3">void</tspan><tspan fill="#ffffff"> onSubscribe(Subscription s);</tspan></text>
  <text x="76" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  <tspan font-weight="600" fill="#7ec8e3">void</tspan><tspan fill="#ffffff"> onNext(T item);</tspan></text>
  <text x="76" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  <tspan font-weight="600" fill="#7ec8e3">void</tspan><tspan fill="#ffffff"> onError(Throwable t);</tspan></text>
  <text x="76" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  <tspan font-weight="600" fill="#7ec8e3">void</tspan><tspan fill="#ffffff"> onComplete();</tspan></text>
  <text x="76" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>
  <text x="76" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">// Subscription: request(n) 으로 배압 제어</text>
  <text x="76" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">// Processor: Publisher + Subscriber 동시 구현</text>

  <!-- WebFlux 스택 레이어 (우측) -->
  <text x="660" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">Spring WebFlux 스택 레이어</text>

  <!-- 레이어들 -->
  <rect x="480" y="116" width="340" height="46" rx="6" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="650" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">@RestController / Router Function</text>
  <text x="650" y="153" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">어노테이션 방식 or 함수형 엔드포인트</text>

  <line x1="650" y1="162" x2="650" y2="174" stroke="#555" stroke-width="2" marker-end="url(#arr-blue)"/>

  <rect x="480" y="176" width="340" height="46" rx="6" fill="#0a1a2e" stroke="#3a5a9e" stroke-width="1.5"/>
  <text x="650" y="195" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">WebFlux Framework</text>
  <text x="650" y="213" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">DispatcherHandler, HandlerMapping, Codecs</text>

  <line x1="650" y1="222" x2="650" y2="234" stroke="#555" stroke-width="2" marker-end="url(#arr-blue)"/>

  <rect x="480" y="236" width="340" height="46" rx="6" fill="#1a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="650" y="255" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#c077cc">Reactor (Project Reactor)</text>
  <text x="650" y="273" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Mono / Flux — Reactive Streams 구현체</text>

  <line x1="650" y1="282" x2="650" y2="294" stroke="#555" stroke-width="2" marker-end="url(#arr-blue)"/>

  <rect x="480" y="296" width="340" height="46" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="315" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Netty / Undertow / Servlet 3.1+</text>
  <text x="650" y="333" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">논블로킹 I/O 런타임 (기본: Netty)</text>

  <line x1="650" y1="342" x2="650" y2="354" stroke="#555" stroke-width="2" marker-end="url(#arr-blue)"/>

  <rect x="480" y="356" width="340" height="46" rx="6" fill="#1a1a0a" stroke="#e8c84a" stroke-width="1.5"/>
  <text x="650" y="375" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8c84a">OS 비동기 I/O (epoll / kqueue)</text>
  <text x="650" y="393" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">커널 레벨 논블로킹 I/O 다중화</text>

  <!-- 하단 배압(Backpressure) 설명 -->
  <rect x="60" y="376" width="340" height="78" rx="8" fill="#0f0f1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="230" y="398" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#c077cc">배압(Backpressure)</text>
  <text x="230" y="418" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Subscriber가 request(n)으로 처리 가능한</text>
  <text x="230" y="436" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">데이터 수를 Publisher에게 알림</text>
  <text x="230" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">OutOfMemoryError 방지, 흐름 제어의 핵심</text>

  <!-- 하단 의존성 코드 -->
  <rect x="480" y="420" width="340" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="496" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" xml:space="preserve">// spring-boot-starter-webflux</text>
  <text x="496" y="456" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">implementation</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">'org.springframework.boot</tspan></text>
</svg>
