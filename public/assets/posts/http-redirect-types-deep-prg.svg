<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arrG" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrR" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arrW" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="420" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">PRG 패턴 — 303으로 중복 제출 방지</text>
  <text x="60" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Post → Redirect(303) → Get : 새로고침해도 GET만 반복</text>

  <rect x="60" y="150" width="200" height="90" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="160" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">브라우저</text>
  <text x="160" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">사용자 / 폼</text>

  <rect x="620" y="150" width="200" height="90" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="720" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">서버</text>
  <text x="720" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">/orders</text>

  <line x1="260" y1="172" x2="620" y2="172" stroke="#e05555" stroke-width="2.5" marker-end="url(#arrR)"/>
  <text x="440" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" text-anchor="middle" xml:space="preserve">1. POST /orders (주문 저장)</text>

  <line x1="620" y1="200" x2="260" y2="200" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#arrG)"/>
  <text x="440" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" text-anchor="middle" xml:space="preserve">2. 303 Location: /orders/1234</text>

  <line x1="260" y1="250" x2="620" y2="250" stroke="#55c555" stroke-width="2.5" marker-end="url(#arrW)"/>
  <text x="440" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle" xml:space="preserve">3. GET /orders/1234 (자동)</text>

  <rect x="60" y="320" width="760" height="60" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="78" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff" xml:space="preserve">마지막 기록은 GET — F5 새로고침해도 안전한 GET만 반복된다.</text>
  <text x="78" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9aa4b8" xml:space="preserve">POST 재전송 경고 없음 · 같은 주문이 두 번 들어가지 않음</text>
</svg>
