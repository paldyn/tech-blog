<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" rx="12" fill="#0a0a0a"/>

  <text x="440" y="40" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" font-weight="700" fill="#e8e8e8">격리 수준 설정 구문</text>

  <!-- Left: Standard + PG + MSSQL -->
  <rect x="50" y="58" width="370" height="22" rx="4" fill="#111118"/>
  <text x="235" y="73" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">표준 SQL / PostgreSQL / SQL Server</text>

  <rect x="50" y="84" width="370" height="234" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="66" y="106" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 세션(연결) 수준 설정</text>
  <text x="66" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">SET<tspan fill="#ffffff"> TRANSACTION ISOLATION LEVEL</tspan></text>
  <text x="66" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">    READ COMMITTED<tspan fill="#ffffff">;</tspan></text>
  <text x="66" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 트랜잭션 단위 설정 (표준)</text>
  <text x="66" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">START TRANSACTION</text>
  <text x="66" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    ISOLATION LEVEL</text>
  <text x="66" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">    SERIALIZABLE<tspan fill="#ffffff">;</tspan></text>
  <text x="66" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- PostgreSQL 세션 설정</text>
  <text x="66" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">SET<tspan fill="#ffffff"> default_transaction_isolation</tspan></text>
  <text x="66" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    = <tspan fill="#ce9178">'repeatable read'</tspan>;</text>
  <text x="66" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 현재 격리 수준 조회</text>
  <text x="66" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">SHOW<tspan fill="#ffffff"> transaction_isolation;</tspan></text>

  <!-- Right: Oracle + MySQL -->
  <rect x="460" y="58" width="370" height="22" rx="4" fill="#111118"/>
  <text x="645" y="73" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">Oracle / MySQL</text>

  <rect x="460" y="84" width="370" height="234" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="476" y="106" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- Oracle: 트랜잭션 단위만 지원</text>
  <text x="476" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">SET TRANSACTION<tspan fill="#ffffff"> ISOLATION LEVEL</tspan></text>
  <text x="476" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">    READ COMMITTED<tspan fill="#ffffff">;</tspan></text>
  <text x="476" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- Oracle 기본값 조회</text>
  <text x="476" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">SELECT<tspan fill="#ffffff"> value</tspan></text>
  <text x="476" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">FROM<tspan fill="#ffffff"> v$parameter</tspan></text>
  <text x="476" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">WHERE<tspan fill="#ffffff"> name=</tspan><tspan fill="#ce9178">'isolation_level'</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="476" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- MySQL 세션/글로벌 설정</text>
  <text x="476" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">SET SESSION<tspan fill="#ffffff"> TRANSACTION</tspan></text>
  <text x="476" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    ISOLATION LEVEL</text>
  <text x="476" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">    REPEATABLE READ<tspan fill="#ffffff">;</tspan></text>
  <text x="476" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">SELECT<tspan fill="#ffffff"> @@transaction_isolation;</tspan></text>

  <rect x="50" y="330" width="780" height="22" rx="4" fill="#111118"/>
  <text x="440" y="345" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">트랜잭션 내에서 격리 수준 변경은 대부분의 DB에서 불가 → BEGIN 전에 설정해야 함</text>
</svg>
