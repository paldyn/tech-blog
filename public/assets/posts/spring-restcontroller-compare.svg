<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <defs>
    <marker id="arrb" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 20 7, 0 14" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 20 7, 0 14" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">@Controller vs @RestController</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">어노테이션 구성과 처리 경로 차이</text>

  <!-- Divider -->
  <line x1="440" y1="90" x2="440" y2="460" stroke="#222" stroke-width="2" stroke-dasharray="6 4"/>

  <!-- Left: @Controller -->
  <text x="220" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3">@Controller</text>

  <rect x="60" y="116" width="340" height="72" rx="8" fill="#111827" stroke="#3a4a6e"/>
  <text x="80" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">구성</text>
  <text x="80" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">@Component + 뷰 이름 반환</text>
  <text x="80" y="177" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ViewResolver → 템플릿 렌더링</text>

  <!-- @Controller flow -->
  <rect x="80" y="206" width="130" height="44" rx="6" fill="#111827" stroke="#3a4a6e"/>
  <text x="145" y="223" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">메서드 반환</text>
  <text x="145" y="241" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">"String" 뷰 이름</text>

  <line x1="210" y1="228" x2="250" y2="228" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrb)"/>

  <rect x="250" y="206" width="130" height="44" rx="6" fill="#111827" stroke="#3a4a6e"/>
  <text x="315" y="223" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">ViewResolver</text>
  <text x="315" y="241" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">HTML 템플릿</text>

  <!-- @ResponseBody note -->
  <rect x="80" y="268" width="300" height="52" rx="6" fill="#0d1a2d" stroke="#7777cc" stroke-width="1.5"/>
  <text x="230" y="289" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">+ @ResponseBody 추가 시</text>
  <text x="230" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">MessageConverter를 거쳐 HTTP body 직접 기록</text>

  <!-- Right: @RestController -->
  <text x="660" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555">@RestController</text>

  <rect x="460" y="116" width="360" height="72" rx="8" fill="#0d1d0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="480" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">구성</text>
  <text x="480" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">@Controller + @ResponseBody (메타)</text>
  <text x="480" y="177" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">모든 메서드에 @ResponseBody 묵시 적용</text>

  <!-- @RestController flow -->
  <rect x="480" y="206" width="140" height="44" rx="6" fill="#111827" stroke="#3a4a6e"/>
  <text x="550" y="223" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">메서드 반환</text>
  <text x="550" y="241" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">Java 객체</text>

  <line x1="620" y1="228" x2="660" y2="228" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>

  <rect x="660" y="206" width="160" height="44" rx="6" fill="#0d1d0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="740" y="223" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">MessageConverter</text>
  <text x="740" y="241" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">JSON 응답 body</text>

  <!-- @RestController benefit -->
  <rect x="480" y="268" width="340" height="52" rx="6" fill="#0d1d0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="289" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">ViewResolver 경로 생략</text>
  <text x="650" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">REST API 개발 시 반복 @ResponseBody 제거</text>

  <!-- Source code decompose -->
  <text x="440" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">@RestController 내부 구조</text>

  <rect x="200" y="370" width="480" height="108" rx="8" fill="#000000" stroke="#3a4a6e"/>
  <text x="216" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// Spring 소스 (단순화)</text>
  <text x="216" y="410" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">@Target</tspan><tspan fill="#ffffff">      (ElementType.TYPE)</tspan></text>
  
  <text x="216" y="428" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">@Retention</text>
  <text x="216" y="428" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">           (RetentionPolicy.RUNTIME)</text>
  <text x="216" y="446" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">@Controller</text>
  <text x="216" y="464" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">@ResponseBody</text>
  <text x="216" y="464" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">               // 핵심 — 모든 메서드에 적용</text>
  <text x="216" y="482" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">public @interface </text>
  <text x="216" y="482" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">                  RestController {}</text>
</svg>
