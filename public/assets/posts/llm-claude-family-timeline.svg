<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Claude 패밀리 진화 타임라인</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">Constitutional AI 기반의 안전성 우선 LLM</text>

  <!-- Timeline axis -->
  <line x1="80" y1="190" x2="800" y2="190" stroke="#333" stroke-width="2"/>

  <!-- Claude 1 -->
  <circle cx="120" cy="190" r="12" fill="#7ec8e3"/>
  <rect x="70" y="212" width="110" height="56" rx="6" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="125" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">Claude 1</text>
  <text x="125" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">2023.03</text>
  <text x="125" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Constitutional AI</text>
  <text x="125" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Anthropic 설립</text>
  <text x="125" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">2021년</text>

  <!-- Claude 2 -->
  <circle cx="280" cy="190" r="14" fill="#55c555"/>
  <rect x="224" y="212" width="116" height="56" rx="6" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="282" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">Claude 2</text>
  <text x="282" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">2023.07</text>
  <text x="282" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">100K 컨텍스트</text>
  <text x="282" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">코딩·추론</text>
  <text x="282" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">대폭 향상</text>

  <!-- Claude 3 -->
  <circle cx="460" cy="190" r="18" fill="#e05555"/>
  <rect x="396" y="212" width="132" height="56" rx="6" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="462" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555">Claude 3 시리즈</text>
  <text x="462" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">2024.03</text>
  <text x="462" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Haiku·Sonnet·Opus</text>
  <text x="462" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">GPT-4 동급</text>
  <text x="462" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">멀티모달 지원</text>

  <!-- Claude 3.5 / 4 -->
  <circle cx="680" cy="190" r="22" fill="#7777cc"/>
  <rect x="608" y="212" width="148" height="56" rx="6" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="682" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">Claude 3.5 / 4</text>
  <text x="682" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">2024~2025</text>
  <text x="682" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">코딩·에이전트</text>
  <text x="682" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">Sonnet 4.6</text>
  <text x="682" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">현재 최신</text>

  <!-- Connector arrows -->
  <line x1="132" y1="190" x2="266" y2="190" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="294" y1="190" x2="442" y2="190" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="478" y1="190" x2="658" y2="190" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>

  <defs>
    <marker id="arr" markerWidth="20" markerHeight="14" refX="20" refY="7" orient="auto">
      <polygon points="0 0, 20 7, 0 14" fill="#555"/>
    </marker>
  </defs>

  <!-- Constitutional AI principle box -->
  <rect x="60" y="308" width="760" height="120" rx="8" fill="#0d1117" stroke="#333" stroke-width="1"/>
  <text x="84" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8">Constitutional AI 핵심 원칙</text>
  <text x="84" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• Helpful: 사용자 요청을 최대한 도움이 되게 처리</text>
  <text x="84" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• Harmless: 해로운 결과를 일으키지 않도록 설계</text>
  <text x="84" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">• Honest: 불확실한 것은 불확실하다고 말하고, 거짓말하지 않음</text>
  <text x="440" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• AI 자체 비평으로 RLHF 의존도 감소</text>
  <text x="440" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• 원칙 집합(Constitution)으로 정렬 안정화</text>
  <text x="440" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">• RLAIF: AI 피드백으로 인간 레이블 보완</text>
</svg>
