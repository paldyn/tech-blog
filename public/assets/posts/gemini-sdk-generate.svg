<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-o" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Gemini SDK: generate_content() 흐름</text>

  <!-- ── 상단 흐름 ── -->

  <!-- Step 1: 설정 -->
  <rect x="30" y="70" width="160" height="64" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="110" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">1. 설정</text>
  <text x="110" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">genai.configure(</text>
  <text x="110" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">api_key=...)</text>

  <line x1="190" y1="102" x2="240" y2="102" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2: 모델 생성 -->
  <rect x="240" y="70" width="180" height="64" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="330" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">2. 모델 생성</text>
  <text x="330" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">GenerativeModel(</text>
  <text x="330" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">"gemini-2.0-flash")</text>

  <line x1="420" y1="102" x2="470" y2="102" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3: 생성 호출 -->
  <rect x="470" y="70" width="190" height="64" rx="8" fill="#0f1a0f" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="565" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">3. 생성 호출</text>
  <text x="565" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">model.generate_content(</text>
  <text x="565" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">prompt / [image, text])</text>

  <line x1="660" y1="102" x2="710" y2="102" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- Step 4: 응답 -->
  <rect x="710" y="70" width="140" height="64" rx="8" fill="#1a0f0a" stroke="#6e5a3a" stroke-width="1.5"/>
  <text x="780" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">4. 응답</text>
  <text x="780" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">response.text</text>
  <text x="780" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">usage_metadata</text>

  <!-- ── 모델 선택 섹션 ── -->
  <text x="60" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">모델 선택 가이드</text>

  <rect x="30" y="174" width="260" height="70" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="160" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">gemini-2.0-flash</text>
  <text x="160" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">속도 · 비용 균형 · 멀티모달</text>
  <text x="160" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">범용 프로덕션 기본 선택</text>

  <rect x="310" y="174" width="260" height="70" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">gemini-1.5-pro</text>
  <text x="440" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">1M 토큰 컨텍스트</text>
  <text x="440" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">장문 문서 · 동영상 전체 처리</text>

  <rect x="590" y="174" width="260" height="70" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="720" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">generation_config</text>
  <text x="720" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">temperature / top_p / top_k</text>
  <text x="720" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">max_output_tokens</text>

  <!-- ── 코드 블록 ── -->
  <rect x="30" y="262" width="820" height="272" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text x="50" y="283" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"
        ># Gemini SDK: 기본 generate_content() 예시</text>

  <text x="50" y="303" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> google.generativeai </tspan><tspan fill="#7ec8e3" font-weight="600">as</tspan><tspan fill="#ffffff"> genai</tspan>
  </text>

  <text x="50" y="323" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ffffff"> google.generativeai.types </tspan><tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> GenerationConfig</tspan>
  </text>

  <text x="50" y="343" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">genai.configure(api_key=</tspan><tspan fill="#ce9178">"YOUR_API_KEY"</tspan><tspan fill="#ffffff">)</tspan>
  </text>

  <text x="50" y="363" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">model = genai.GenerativeModel(</tspan><tspan fill="#ce9178">"gemini-2.0-flash"</tspan><tspan fill="#ffffff">,</tspan>
  </text>

  <text x="50" y="383" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    generation_config=GenerationConfig(temperature=</tspan><tspan fill="#b5cea8">0.4</tspan><tspan fill="#ffffff">,</tspan>
  </text>

  <text x="50" y="403" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">        top_p=</tspan><tspan fill="#b5cea8">0.95</tspan><tspan fill="#ffffff">, max_output_tokens=</tspan><tspan fill="#b5cea8">1024</tspan><tspan fill="#ffffff">))</tspan>
  </text>

  <text x="50" y="423" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">response = model.generate_content(</tspan><tspan fill="#ce9178">"딥러닝이란?"</tspan><tspan fill="#ffffff">)</tspan>
  </text>

  <text x="50" y="443" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">print</tspan><tspan fill="#ffffff">(response.text)</tspan>
  </text>

  <text x="50" y="463" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">
    <tspan># 토큰 사용량 확인</tspan>
  </text>

  <text x="50" y="483" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">print</tspan><tspan fill="#ffffff">(response.usage_metadata.prompt_token_count)</tspan>
  </text>

  <text x="50" y="503" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">
    <tspan># 스트리밍: stream=True → chunk.text 로 실시간 출력</tspan>
  </text>

  <text x="50" y="523" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> chunk </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> model.generate_content(prompt, stream=</tspan><tspan fill="#7ec8e3" font-weight="600">True</tspan><tspan fill="#ffffff">):</tspan>
  </text>

</svg>
