<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420"
     style="border-radius:12px" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="ac" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="ag" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>
  <text x="440" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">AI 콘텐츠 생성 파이프라인</text>

  <!-- Stage 1 -->
  <rect x="60" y="80" width="160" height="68" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="106" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">주제 · 키워드</text>
  <text x="140" y="126" text-anchor="middle" font-size="12" fill="#888">인풋 정의</text>
  <line x1="220" y1="114" x2="268" y2="114" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ac)"/>

  <!-- Stage 2 -->
  <rect x="268" y="80" width="160" height="68" rx="8" fill="#1a1030" stroke="#7777cc" stroke-width="1.5"/>
  <text x="348" y="106" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc">아웃라인 생성</text>
  <text x="348" y="126" text-anchor="middle" font-size="12" fill="#888">구조 설계</text>
  <line x1="428" y1="114" x2="476" y2="114" stroke="#7777cc" stroke-width="2" marker-end="url(#ac)"/>

  <!-- Stage 3 -->
  <rect x="476" y="80" width="160" height="68" rx="8" fill="#1a1030" stroke="#7777cc" stroke-width="1.5"/>
  <text x="556" y="106" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc">섹션별 작성</text>
  <text x="556" y="126" text-anchor="middle" font-size="12" fill="#888">병렬 생성</text>
  <line x1="636" y1="114" x2="684" y2="114" stroke="#7777cc" stroke-width="2" marker-end="url(#ac)"/>

  <!-- Stage 4 -->
  <rect x="684" y="80" width="136" height="68" rx="8" fill="#0f2418" stroke="#55c555" stroke-width="1.5"/>
  <text x="752" y="106" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">검토 · 편집</text>
  <text x="752" y="126" text-anchor="middle" font-size="12" fill="#888">AI 품질 검토</text>

  <!-- Parallel generation detail -->
  <text x="440" y="190" text-anchor="middle" font-size="13" fill="#888">섹션별 병렬 생성 구조</text>

  <rect x="60" y="208" width="200" height="52" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="160" y="232" text-anchor="middle" font-size="13" fill="#e8e8e8">도입부 작성</text>
  <text x="160" y="250" text-anchor="middle" font-size="11" fill="#888">배경 · 문제 정의</text>

  <rect x="340" y="208" width="200" height="52" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="232" text-anchor="middle" font-size="13" fill="#e8e8e8">본문 섹션 N개</text>
  <text x="440" y="250" text-anchor="middle" font-size="11" fill="#888">각 섹션 독립 프롬프트</text>

  <rect x="620" y="208" width="200" height="52" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="720" y="232" text-anchor="middle" font-size="13" fill="#e8e8e8">결론 · 요약</text>
  <text x="720" y="250" text-anchor="middle" font-size="11" fill="#888">핵심 메시지 강조</text>

  <!-- Merge arrow -->
  <line x1="160" y1="260" x2="340" y2="314" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ac)"/>
  <line x1="440" y1="260" x2="440" y2="314" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ac)"/>
  <line x1="720" y1="260" x2="540" y2="314" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ac)"/>

  <!-- Final output -->
  <rect x="280" y="314" width="320" height="60" rx="8" fill="#0f2418" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="338" text-anchor="middle" font-size="15" font-weight="600" fill="#55c555">통합 + 최종 편집</text>
  <text x="440" y="358" text-anchor="middle" font-size="12" fill="#888">일관성 · 스타일 · SEO 최적화</text>
</svg>
