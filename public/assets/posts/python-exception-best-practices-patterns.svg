<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="43" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">안티패턴 vs 모범 사례 코드 비교</text>

  <!-- Left: Anti-pattern -->
  <rect x="55" y="65" width="380" height="36" rx="6" fill="#1a0c0c" stroke="#e05555" stroke-width="1.5"/>
  <text x="245" y="89" text-anchor="middle" font-size="13" font-weight="700" fill="#e05555">❌ 안티패턴</text>

  <rect x="55" y="112" width="380" height="220" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="75" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8"># 나쁜 예: 예외 묵음 처리</text>
  <text x="75" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#7ec8e3" font-weight="600">def</text><text x="107" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff"> parse_user(data):</text>
  <text x="75" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#7ec8e3" font-weight="600">    try</text><text x="107" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">:</text>
  <text x="75" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#ffffff">        name = data[</text><text x="215" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">"name"</text><text x="257" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">]</text>
  <text x="75" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#ffffff">        age = </text><text x="155" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">int</text><text x="177" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">(data[</text><text x="229" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">"age"</text><text x="271" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">])</text>
  <text x="75" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#7ec8e3" font-weight="600">        return</text><text x="131" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff"> {</text><text x="148" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">"name"</text><text x="190" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">: name, </text><text x="252" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">"age"</text><text x="290" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">: age}</text>
  <text x="75" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#e05555" font-weight="600">    except</text><text x="131" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">:  </text><text x="162" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8"># ← 모든 예외 묵음!</text>
  <text x="75" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#7ec8e3" font-weight="600">        return</text><text x="131" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff"> </text><text x="143" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">None</text>
  <text x="75" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">  # None을 반환해도 왜인지 모름 ↑</text>
  <text x="75" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">  # 타입·키 오류 모두 삼켜버림</text>

  <!-- Right: Best practice -->
  <rect x="455" y="65" width="370" height="36" rx="6" fill="#0c1c0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="89" text-anchor="middle" font-size="13" font-weight="700" fill="#55c555">✅ 모범 사례</text>

  <rect x="455" y="112" width="370" height="220" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="475" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8"># 좋은 예: 명확한 오류 전달</text>
  <text x="475" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#7ec8e3" font-weight="600">def</text><text x="507" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff"> parse_user(data):</text>
  <text x="475" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#7ec8e3" font-weight="600">    try</text><text x="507" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">:</text>
  <text x="475" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#ffffff">        name = data[</text><text x="615" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">"name"</text><text x="657" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">]</text>
  <text x="475" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#7ec8e3" font-weight="600">    except</text><text x="531" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff"> KeyError </text><text x="601" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">as</text><text x="621" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff"> e:</text>
  <text x="475" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#7ec8e3" font-weight="600">        raise</text><text x="531" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff"> ValidationError(</text><text x="676" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">) </text><text x="692" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">from</text><text x="728" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff"> e</text>
  <text x="475" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#7ec8e3" font-weight="600">    try</text><text x="507" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">:</text>
  <text x="475" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#ffffff">        age = </text><text x="555" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">int</text><text x="577" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">(data[</text><text x="629" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">"age"</text><text x="671" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">])</text>
  <text x="475" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#7ec8e3" font-weight="600">    except</text><text x="531" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff"> (KeyError, ValueError) </text><text x="700" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">as</text><text x="720" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff"> e:</text>
  <text x="475" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#7ec8e3" font-weight="600">        raise</text><text x="531" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff"> ValidationError(</text><text x="676" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">) </text><text x="692" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">from</text><text x="728" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff"> e</text>
  <text x="475" y="325" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">  # 명확한 타입, 원인 보존 ↑</text>

  <!-- Bottom diff summary -->
  <rect x="55" y="354" width="770" height="46" rx="6" fill="#0c1628" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="376" text-anchor="middle" font-size="12" font-weight="700" fill="#7ec8e3">핵심 차이</text>
  <text x="440" y="393" text-anchor="middle" font-size="12" fill="#888">오른쪽은 어떤 필드에서 어떤 오류가 발생했는지 스택 트레이스로 즉시 파악 가능. 왼쪽은 None만 반환되어 원인 불명.</text>
</svg>
