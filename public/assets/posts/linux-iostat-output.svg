<svg width="880" height="480" viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">iostat -x 출력 구조</text>

  <!-- Code box -->
  <rect x="60" y="68" width="760" height="118" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="92" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">$ iostat -x 1 2</text>
  <text x="76" y="110" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">Device  r/s  w/s  rkB/s  wkB/s  r_await  w_await  util%</text>
  <text x="76" y="128" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">sda     120   85  4800   3400     1.2      2.8    42.5</text>
  <text x="76" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">nvme0n1 850  620 34000  24800     0.08     0.12     7.2</text>
  <text x="76" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8"># util% 100에 가까울수록 디스크 포화 상태</text>

  <!-- Field annotations below -->
  <!-- Row 1: r/s, w/s -->
  <rect x="60" y="210" width="195" height="68" rx="8" fill="#0a100a" stroke="#55c555" stroke-width="1.5"/>
  <text x="157" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">r/s  &amp;  w/s</text>
  <text x="157" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">초당 읽기 / 쓰기 요청 수</text>
  <text x="157" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">IOPS 지표</text>

  <!-- rkB/s, wkB/s -->
  <rect x="275" y="210" width="195" height="68" rx="8" fill="#0a100a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="372" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">rkB/s  &amp;  wkB/s</text>
  <text x="372" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">초당 읽기 / 쓰기 처리량</text>
  <text x="372" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Throughput (KB/s)</text>

  <!-- r_await, w_await -->
  <rect x="490" y="210" width="195" height="68" rx="8" fill="#150a0a" stroke="#e0a055" stroke-width="1.5"/>
  <text x="587" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e0a055">r_await  &amp;  w_await</text>
  <text x="587" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">읽기 / 쓰기 평균 지연 시간</text>
  <text x="587" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ms 단위, 낮을수록 좋음</text>

  <!-- util% -->
  <rect x="705" y="210" width="115" height="68" rx="8" fill="#130800" stroke="#e05555" stroke-width="1.5"/>
  <text x="762" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">util%</text>
  <text x="762" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">디스크 사용률</text>
  <text x="762" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">100% = 포화</text>

  <!-- SSD vs HDD benchmark comparison -->
  <text x="440" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">HDD vs SSD 정상 범위 비교</text>

  <!-- Table -->
  <rect x="60" y="330" width="760" height="110" rx="8" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="1"/>
  <!-- Header -->
  <text x="160" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">지표</text>
  <text x="380" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">HDD 정상 범위</text>
  <text x="600" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">NVMe 정상 범위</text>
  <line x1="76" y1="362" x2="804" y2="362" stroke="#2a2a2a" stroke-width="1"/>
  <text x="160" y="384" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">r_await / w_await</text>
  <text x="380" y="384" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">5 ~ 20 ms</text>
  <text x="600" y="384" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">0.05 ~ 0.5 ms</text>
  <text x="160" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">util%</text>
  <text x="380" y="406" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">&lt; 60%</text>
  <text x="600" y="406" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">&lt; 30%</text>
  <text x="160" y="428" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">r/s + w/s (IOPS)</text>
  <text x="380" y="428" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">50 ~ 200</text>
  <text x="600" y="428" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">10,000 ~ 500,000</text>
</svg>
