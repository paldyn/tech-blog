<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" style="background:#0a0a0a;border-radius:12px;font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">Docker none 네트워크: 완전한 격리</text>
  <text x="440" y="68" text-anchor="middle" fill="#888" font-size="13">loopback(lo)만 존재 — 외부와 일절 통신 불가</text>

  <!-- External world -->
  <rect x="60" y="90" width="200" height="60" rx="8" fill="#0a0a0a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="125" text-anchor="middle" fill="#7777cc" font-size="14">외부 네트워크</text>

  <!-- Other container -->
  <rect x="60" y="210" width="200" height="60" rx="8" fill="#0d1b2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="245" text-anchor="middle" fill="#7ec8e3" font-size="14">다른 컨테이너</text>

  <!-- Block arrows -->
  <line x1="260" y1="120" x2="380" y2="200" stroke="#e05555" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="320" y="155" fill="#e05555" font-size="13">차단</text>

  <line x1="260" y1="240" x2="380" y2="280" stroke="#e05555" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="305" y="268" fill="#e05555" font-size="13">차단</text>

  <!-- Host -->
  <rect x="60" y="320" width="200" height="60" rx="8" fill="#1a1a0d" stroke="#888" stroke-width="1.5"/>
  <text x="160" y="355" text-anchor="middle" fill="#888" font-size="14">호스트 네트워크</text>

  <line x1="260" y1="350" x2="380" y2="340" stroke="#e05555" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="305" y="360" fill="#e05555" font-size="13">차단</text>

  <!-- None container (center) -->
  <rect x="380" y="180" width="260" height="200" rx="10" fill="#0d0d0d" stroke="#7777cc" stroke-width="2"/>
  <text x="510" y="210" text-anchor="middle" fill="#7777cc" font-size="16" font-weight="600">Container (none)</text>

  <!-- loopback indicator -->
  <rect x="410" y="228" width="200" height="60" rx="6" fill="#1a0d1a" stroke="#7777cc" stroke-width="1"/>
  <text x="510" y="256" text-anchor="middle" fill="#e8e8e8" font-size="13">lo (127.0.0.1)</text>
  <text x="510" y="276" text-anchor="middle" fill="#888" font-size="12">loopback only</text>

  <!-- Self loop arrow -->
  <path d="M 510 320 Q 560 360 510 360 Q 460 360 510 320" fill="none" stroke="#7777cc" stroke-width="1.5"/>
  <text x="510" y="350" text-anchor="middle" fill="#7777cc" font-size="11">자기 자신만 통신</text>

  <!-- Right side use cases -->
  <rect x="680" y="90" width="160" height="320" rx="10" fill="#0d0d1a" stroke="#7777cc" stroke-width="1"/>
  <text x="760" y="116" text-anchor="middle" fill="#7777cc" font-size="13" font-weight="600">사용 사례</text>
  <text x="760" y="144" text-anchor="middle" fill="#e8e8e8" font-size="12">보안 처리</text>
  <text x="760" y="164" text-anchor="middle" fill="#888" font-size="11">암호화/서명</text>
  <text x="760" y="192" text-anchor="middle" fill="#e8e8e8" font-size="12">파일 변환</text>
  <text x="760" y="212" text-anchor="middle" fill="#888" font-size="11">포맷 변환 작업</text>
  <text x="760" y="240" text-anchor="middle" fill="#e8e8e8" font-size="12">테스트 격리</text>
  <text x="760" y="260" text-anchor="middle" fill="#888" font-size="11">외부 의존성 제거</text>
  <text x="760" y="288" text-anchor="middle" fill="#e8e8e8" font-size="12">플러그인 준비</text>
  <text x="760" y="308" text-anchor="middle" fill="#888" font-size="11">커스텀 네트워크</text>
  <text x="760" y="328" text-anchor="middle" fill="#888" font-size="11">플러그인 연결 전</text>
  <text x="760" y="360" text-anchor="middle" fill="#7777cc" font-size="11">네트워크 불필요</text>
  <text x="760" y="378" text-anchor="middle" fill="#7777cc" font-size="11">작업에 최적</text>
</svg>
