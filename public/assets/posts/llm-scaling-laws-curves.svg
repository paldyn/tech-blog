<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">스케일링 법칙: N·D·C와 Loss의 관계</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">파라미터·데이터·컴퓨트 증가에 따른 검증 손실 감소</text>

  <!-- Chart area -->
  <rect x="60" y="88" width="760" height="300" fill="#0d1117" rx="8" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Y-axis label -->
  <text x="78" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" transform="rotate(-90 78 244)">검증 손실 (낮을수록 좋음)</text>

  <!-- Y axis -->
  <line x1="110" y1="100" x2="110" y2="368" stroke="#333" stroke-width="1"/>
  <!-- X axis -->
  <line x1="110" y1="368" x2="800" y2="368" stroke="#333" stroke-width="1"/>

  <!-- Y ticks -->
  <text x="104" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="end">높음</text>
  <line x1="108" y1="108" x2="112" y2="108" stroke="#444" stroke-width="1"/>
  <line x1="108" y1="188" x2="112" y2="188" stroke="#444" stroke-width="1"/>
  <line x1="108" y1="268" x2="112" y2="268" stroke="#444" stroke-width="1"/>
  <text x="104" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="end">낮음</text>

  <!-- Grid lines -->
  <line x1="110" y1="188" x2="800" y2="188" stroke="#3a4a6e" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="110" y1="268" x2="800" y2="268" stroke="#3a4a6e" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- X labels -->
  <text x="200" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">소규모</text>
  <text x="455" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">중규모</text>
  <text x="710" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">대규모</text>
  <text x="455" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">→ 스케일 증가</text>

  <!-- Curve N (Parameters) - purple -->
  <path d="M 130,340 C 200,300 300,240 400,210 C 500,185 600,168 750,155" fill="none" stroke="#7777cc" stroke-width="2.5"/>
  <!-- Curve D (Data) - blue -->
  <path d="M 130,355 C 200,310 310,250 430,215 C 540,188 640,170 750,158" fill="none" stroke="#7ec8e3" stroke-width="2.5"/>
  <!-- Curve C (Compute) - green -->
  <path d="M 130,360 C 200,320 320,260 450,220 C 560,190 660,172 750,161" fill="none" stroke="#55c555" stroke-width="2.5"/>

  <!-- Legend -->
  <line x1="130" y1="124" x2="170" y2="124" stroke="#7777cc" stroke-width="2.5"/>
  <circle cx="150" cy="124" r="4" fill="#7777cc"/>
  <text x="178" y="129" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">N (파라미터 수)</text>

  <line x1="340" y1="124" x2="380" y2="124" stroke="#7ec8e3" stroke-width="2.5"/>
  <circle cx="360" cy="124" r="4" fill="#7ec8e3"/>
  <text x="388" y="129" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">D (학습 토큰 수)</text>

  <line x1="560" y1="124" x2="600" y2="124" stroke="#55c555" stroke-width="2.5"/>
  <circle cx="580" cy="124" r="4" fill="#55c555"/>
  <text x="608" y="129" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">C (컴퓨팅 FLOPs)</text>

  <!-- Annotation: Power law -->
  <text x="620" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">L(N) ∝ N^(-α)</text>
  <text x="620" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">α ≈ 0.076 (Kaplan)</text>

  <!-- Notable model markers -->
  <line x1="310" y1="108" x2="310" y2="368" stroke="#333" stroke-width="2" stroke-dasharray="3,3"/>
  <text x="310" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">GPT-2</text>
  <line x1="530" y1="108" x2="530" y2="368" stroke="#333" stroke-width="2" stroke-dasharray="3,3"/>
  <text x="530" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">GPT-3</text>
  <line x1="720" y1="108" x2="720" y2="368" stroke="#333" stroke-width="2" stroke-dasharray="3,3"/>
  <text x="720" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">GPT-4급</text>

  <!-- Bottom formulas -->
  <text x="220" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" text-anchor="middle">L(N) ∝ N^(-0.076)</text>
  <text x="440" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">L(D) ∝ D^(-0.095)</text>
  <text x="660" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">L(C) ∝ C^(-0.050)</text>
  <text x="440" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">지수 값은 Kaplan et al. (2020) OpenAI 스케일링 법칙 논문 기준</text>
</svg>
