<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">비동기 제너레이터 동작 원리</text>
  <text x="440" y="70" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">async function* + for await...of</text>

  <!-- Left: sync vs async comparison -->
  <rect x="60" y="90" width="360" height="200" fill="#0d0d1a" rx="10" stroke="#1a1a3a" stroke-width="1.5"/>
  <text x="240" y="114" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" text-anchor="middle">동기 제너레이터</text>

  <rect x="76" y="124" width="328" height="144" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="92" y="144" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">function*</tspan> gen() {</text>
  <text x="92" y="162" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">yield</tspan> <tspan fill="#b5cea8">1</tspan>;</text>
  <text x="92" y="180" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">yield</tspan> <tspan fill="#b5cea8">2</tspan>;</text>
  <text x="92" y="198" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">}</text>
  <text x="92" y="220" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">// next() → { value, done }</text>
  <text x="92" y="238" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">// for...of 사용</text>
  <text x="92" y="256" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">Iterator&lt;T, void, void&gt;</text>

  <rect x="460" y="90" width="360" height="200" fill="#0d1a1a" rx="10" stroke="#1a3a3a" stroke-width="1.5"/>
  <text x="640" y="114" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" text-anchor="middle">비동기 제너레이터</text>

  <rect x="476" y="124" width="328" height="144" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="492" y="144" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">async function*</tspan> agen() {</text>
  <text x="492" y="162" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">yield await</tspan> fetch(<tspan fill="#ce9178">'/a'</tspan>);</text>
  <text x="492" y="180" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">yield await</tspan> fetch(<tspan fill="#ce9178">'/b'</tspan>);</text>
  <text x="492" y="198" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">}</text>
  <text x="492" y="220" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">// next() → Promise&lt;{v,d}&gt;</text>
  <text x="492" y="238" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">// for await...of 사용</text>
  <text x="492" y="256" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">AsyncIterator&lt;T&gt;</text>

  <!-- Timeline diagram -->
  <rect x="60" y="308" width="760" height="150" fill="#0d0d0d" rx="10" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="330" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" text-anchor="middle">비동기 스트리밍 흐름</text>

  <!-- Timeline -->
  <line x1="90" y1="360" x2="810" y2="360" stroke="#333" stroke-width="1.5"/>
  <text x="90" y="378" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">0ms</text>

  <rect x="106" y="340" width="80" height="20" fill="#1a1a3a" rx="3"/>
  <text x="146" y="354" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" text-anchor="middle">next() 호출</text>

  <line x1="190" y1="345" x2="320" y2="345" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="255" y="340" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" text-anchor="middle">awaiting...</text>

  <rect x="322" y="334" width="80" height="20" fill="#0d3a0d" rx="3"/>
  <text x="362" y="348" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" text-anchor="middle">Promise 해결</text>

  <line x1="406" y1="345" x2="456" y2="345" stroke="#55c555" stroke-width="1.5"/>
  <rect x="458" y="334" width="80" height="20" fill="#0a1a0a" rx="3"/>
  <text x="498" y="348" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" text-anchor="middle">{v, done:F}</text>

  <line x1="542" y1="345" x2="582" y2="345" stroke="#e8e8e8" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="584" y="334" width="80" height="20" fill="#1a1a3a" rx="3"/>
  <text x="624" y="348" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" text-anchor="middle">next() 호출</text>

  <line x1="668" y1="345" x2="750" y2="345" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="709" y="340" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" text-anchor="middle">awaiting...</text>

  <!-- Time axis labels -->
  <text x="362" y="378" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">~200ms</text>
  <text x="624" y="378" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">~400ms</text>

  <!-- Legend -->
  <text x="90" y="420" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">각 next() 호출은 Promise를 반환합니다.</text>
  <text x="90" y="440" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">for await...of는 자동으로 다음 next()를 호출해 값을 소비합니다.</text>

  <!-- Footer -->
  <text x="440" y="474" fill="#444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">PALDYN · JavaScript 완전 정복</text>
</svg>
