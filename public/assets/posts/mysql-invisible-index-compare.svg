<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340">
  <rect width="880" height="340" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Invisible Index vs DROP INDEX — 차이점 비교</text>

  <!-- Header -->
  <rect x="60" y="66" width="760" height="34" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="200" y="88" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">항목</text>
  <text x="480" y="88" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Invisible Index</text>
  <text x="740" y="88" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">DROP INDEX</text>

  <!-- Row 1 -->
  <rect x="60" y="100" width="760" height="36" fill="#0d1a2e" stroke="#333" stroke-width="0.5"/>
  <text x="200" y="123" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">인덱스 유지</text>
  <text x="480" y="123" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓ 유지 (데이터 동기화 계속)</text>
  <text x="740" y="123" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">✗ 삭제</text>

  <!-- Row 2 -->
  <rect x="60" y="136" width="760" height="36" fill="#0a0a1a" stroke="#333" stroke-width="0.5"/>
  <text x="200" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">옵티마이저 사용</text>
  <text x="480" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">✗ 제외</text>
  <text x="740" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">✗ 없음</text>

  <!-- Row 3 -->
  <rect x="60" y="172" width="760" height="36" fill="#0d1a2e" stroke="#333" stroke-width="0.5"/>
  <text x="200" y="195" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">즉시 복원</text>
  <text x="480" y="195" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓ ALTER INDEX VISIBLE</text>
  <text x="740" y="195" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">✗ CREATE INDEX 재빌드 필요</text>

  <!-- Row 4 -->
  <rect x="60" y="208" width="760" height="36" fill="#0a0a1a" stroke="#333" stroke-width="0.5"/>
  <text x="200" y="231" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">쓰기 오버헤드</text>
  <text x="480" y="231" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">△ 있음 (인덱스 유지됨)</text>
  <text x="740" y="231" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓ 없음</text>

  <!-- Row 5 -->
  <rect x="60" y="244" width="760" height="36" fill="#0d1a2e" stroke="#333" stroke-width="0.5"/>
  <text x="200" y="267" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">사용 시점</text>
  <text x="480" y="267" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">삭제 전 영향도 테스트</text>
  <text x="740" y="267" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">영향도 확인 후 최종 삭제</text>

  <!-- Summary -->
  <rect x="60" y="296" width="760" height="34" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="319" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">권장 절차: Invisible → 모니터링 → 문제 없으면 DROP / 문제 있으면 Visible 복원</text>
</svg>
