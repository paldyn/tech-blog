<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>
  <text x="440" y="52" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Spring Framework란 무엇인가</text>
  <text x="440" y="78" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">Java 엔터프라이즈 개발을 단순하게 만들기 위한 오픈소스 프레임워크</text>
  <rect x="60" y="110" width="240" height="130" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="180" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">EJB 시대의 문제</text>
  <text x="84" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">&#x2022; 복잡한 설정과 배포 과정</text>
  <text x="84" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">&#x2022; 무거운 WAS 의존성</text>
  <text x="84" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">&#x2022; 테스트 어려움</text>
  <text x="84" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">&#x2022; 과도한 보일러플레이트</text>
  <line x1="300" y1="175" x2="355" y2="175" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>
  <text x="327" y="167" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">해결</text>
  <rect x="358" y="110" width="164" height="130" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555">Spring</text>
  <text x="440" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Framework</text>
  <text x="440" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">경량 컨테이너</text>
  <text x="440" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">POJO 기반</text>
  <text x="440" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">비침투적 설계</text>
  <line x1="522" y1="175" x2="577" y2="175" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="549" y="167" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">제공</text>
  <rect x="580" y="110" width="240" height="130" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="700" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">Spring의 해결책</text>
  <text x="596" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">&#x2022; IoC/DI로 객체 의존성 관리</text>
  <text x="596" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">&#x2022; AOP로 횡단 관심사 분리</text>
  <text x="596" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">&#x2022; 선언적 트랜잭션 관리</text>
  <text x="596" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">&#x2022; 테스트 용이성 향상</text>
  <text x="440" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">3대 핵심 원칙</text>
  <rect x="60" y="310" width="230" height="80" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="175" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">IoC (제어의 역전)</text>
  <text x="175" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">객체 생성, 의존 주입을</text>
  <text x="175" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">프레임워크가 담당</text>
  <rect x="325" y="310" width="230" height="80" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">AOP (관점 지향)</text>
  <text x="440" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">로깅, 트랜잭션 등</text>
  <text x="440" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">횡단 관심사 모듈화</text>
  <rect x="590" y="310" width="230" height="80" rx="8" fill="#0d1520" stroke="#ce9178" stroke-width="1.5"/>
  <text x="705" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#ce9178">PSA (서비스 추상화)</text>
  <text x="705" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">기술 구현 교체 가능한</text>
  <text x="705" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">일관된 추상화 레이어</text>
  <rect x="60" y="420" width="760" height="70" rx="8" fill="#111111" stroke="#444" stroke-width="1"/>
  <text x="440" y="449" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">POJO (Plain Old Java Object) 기반 개발</text>
  <text x="440" y="472" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">특정 인터페이스를 강제하지 않는 순수 자바 객체로 비즈니스 로직 작성 가능</text>
</svg>
