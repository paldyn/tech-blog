<svg xmlns="http://www.w3.org/2000/svg" width="880" height="490" viewBox="0 0 880 490">
  <rect width="880" height="490" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr-dn" viewBox="0 0 14 14" refX="7" refY="13"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 14 0 L 7 13 z" fill="#55c555"/>
    </marker>
  </defs>

  <text x="440" y="44"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Spring Framework 계층 구조</text>

  <!-- Layer 1: Your Application -->
  <rect x="60" y="66" width="760" height="62" rx="8" fill="#1a1f2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="92"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">당신의 애플리케이션 (Business Logic)</text>
  <text x="440" y="112"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">@Controller · @Service · @Repository · 도메인 모델</text>

  <!-- Arrow 1 to 2 -->
  <line x1="440" y1="128" x2="440" y2="153"
        stroke="#55c555" stroke-width="2" marker-end="url(#arr-dn)"/>

  <!-- Layer 2: Spring Container -->
  <rect x="60" y="156" width="760" height="222" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="180"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">Spring Framework Container</text>

  <!-- Row 1 boxes: IoC/DI, AOP, Transaction -->
  <rect x="80" y="196" width="226" height="60" rx="6" fill="#0a120a" stroke="#55c555" stroke-width="1"/>
  <text x="193" y="220"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">IoC / DI</text>
  <text x="193" y="240"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">제어 역전 · 의존성 주입</text>

  <rect x="326" y="196" width="226" height="60" rx="6" fill="#0a120a" stroke="#55c555" stroke-width="1"/>
  <text x="439" y="220"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">AOP</text>
  <text x="439" y="240"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">횡단 관심사 분리</text>

  <rect x="572" y="196" width="226" height="60" rx="6" fill="#0a120a" stroke="#55c555" stroke-width="1"/>
  <text x="685" y="220"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Transaction</text>
  <text x="685" y="240"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">선언적 트랜잭션 관리</text>

  <!-- Row 2 boxes: Web MVC, Data Access -->
  <rect x="80" y="276" width="350" height="60" rx="6" fill="#0a100f" stroke="#7ec8e3" stroke-width="1"/>
  <text x="255" y="300"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Web MVC / REST</text>
  <text x="255" y="320"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">DispatcherServlet · @Controller · REST API</text>

  <rect x="450" y="276" width="350" height="60" rx="6" fill="#0a100f" stroke="#7ec8e3" stroke-width="1"/>
  <text x="625" y="300"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Data Access</text>
  <text x="625" y="320"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">JdbcTemplate · JPA · @Transactional</text>

  <text x="440" y="358"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">경량 컨테이너가 객체 생명주기와 의존성을 자동으로 관리</text>

  <!-- Arrow 2 to 3 -->
  <line x1="440" y1="378" x2="440" y2="395"
        stroke="#55c555" stroke-width="2" marker-end="url(#arr-dn)"/>

  <!-- Layer 3: Infrastructure -->
  <rect x="60" y="398" width="760" height="62" rx="8" fill="#1a1a0f" stroke="#ce9178" stroke-width="1.5"/>
  <text x="440" y="424"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">Java EE · JVM · Servlet Container</text>
  <text x="440" y="444"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Tomcat · Undertow · JDBC · JMS · OS</text>
</svg>
