<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" width="880" height="540">
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Spring Framework 란?</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">자바 엔터프라이즈 개발의 표준 프레임워크</text>

  <!-- Three pillars -->
  <!-- IoC Box -->
  <rect x="60" y="108" width="230" height="150" rx="10" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="175" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3">IoC / DI</text>
  <text x="175" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa">제어의 역전</text>
  <text x="90" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#c8c8c8">• 객체 생성을 컨테이너가 담당</text>
  <text x="90" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#c8c8c8">• 의존성 자동 주입(DI)</text>
  <text x="90" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#c8c8c8">• 낮은 결합도 실현</text>

  <!-- AOP Box -->
  <rect x="325" y="108" width="230" height="150" rx="10" fill="#1a1a0f" stroke="#e8c84a" stroke-width="1.5"/>
  <text x="440" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8c84a">AOP</text>
  <text x="440" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa">관점 지향 프로그래밍</text>
  <text x="355" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#c8c8c8">• 횡단 관심사 분리</text>
  <text x="355" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#c8c8c8">• 로깅·트랜잭션 자동화</text>
  <text x="355" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#c8c8c8">• 프록시 기반 적용</text>

  <!-- PSA Box -->
  <rect x="590" y="108" width="230" height="150" rx="10" fill="#0f2014" stroke="#55c555" stroke-width="1.5"/>
  <text x="705" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555">PSA</text>
  <text x="705" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa">일관된 서비스 추상화</text>
  <text x="620" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#c8c8c8">• JDBC → JPA 전환 용이</text>
  <text x="620" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#c8c8c8">• 트랜잭션 추상화</text>
  <text x="620" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#c8c8c8">• 기술 교체 최소 영향</text>

  <!-- Arrow down from pillars -->
  <line x1="440" y1="258" x2="440" y2="290" stroke="#555" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="440,300 434,288 446,288" fill="#555"/>

  <!-- Container Box -->
  <rect x="200" y="304" width="480" height="80" rx="10" fill="#141414" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7777cc">Spring IoC 컨테이너 (ApplicationContext)</text>
  <text x="440" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa">빈(Bean) 생성 · 관리 · 의존성 주입 · 생명주기 제어</text>

  <!-- Arrow down -->
  <line x1="440" y1="384" x2="440" y2="416" stroke="#555" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="440,426 434,414 446,414" fill="#555"/>

  <!-- App Layer -->
  <rect x="200" y="430" width="480" height="70" rx="10" fill="#141414" stroke="#444" stroke-width="1.5"/>
  <text x="440" y="460" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">개발자 코드 (비즈니스 로직)</text>
  <text x="440" y="483" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">인프라 코드 없이 핵심 로직에만 집중</text>
</svg>
