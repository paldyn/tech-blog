<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">안전성 · 멱등성 · 캐시 가능성 행렬</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">HTTP 메서드별 속성 — RFC 7231 §4 정의</text>

  <!-- Table header -->
  <rect x="60" y="90" width="760" height="44" rx="6" fill="#0f1a2a" stroke="#2a3a5a" stroke-width="1.5"/>
  <text x="160" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">메서드</text>
  <text x="330" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">안전(Safe)</text>
  <text x="510" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">멱등(Idempotent)</text>
  <text x="700" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">캐시 가능</text>

  <!-- Rows -->
  <!-- GET -->
  <rect x="60" y="140" width="760" height="44" rx="4" fill="#0f1a0f" stroke="#1a2a1a" stroke-width="1"/>
  <text x="160" y="167" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">GET</text>
  <text x="330" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#55c555" text-anchor="middle">✓</text>
  <text x="510" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#55c555" text-anchor="middle">✓</text>
  <text x="700" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#55c555" text-anchor="middle">✓</text>

  <!-- HEAD -->
  <rect x="60" y="190" width="760" height="44" rx="4" fill="#0a0a0a" stroke="#1a2020" stroke-width="1"/>
  <text x="160" y="217" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">HEAD</text>
  <text x="330" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#55c555" text-anchor="middle">✓</text>
  <text x="510" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#55c555" text-anchor="middle">✓</text>
  <text x="700" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#55c555" text-anchor="middle">✓</text>

  <!-- OPTIONS -->
  <rect x="60" y="240" width="760" height="44" rx="4" fill="#0f1a0f" stroke="#1a2a1a" stroke-width="1"/>
  <text x="160" y="267" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">OPTIONS</text>
  <text x="330" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#55c555" text-anchor="middle">✓</text>
  <text x="510" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#55c555" text-anchor="middle">✓</text>
  <text x="700" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#e05555" text-anchor="middle">✗</text>

  <!-- POST -->
  <rect x="60" y="290" width="760" height="44" rx="4" fill="#1a0f0f" stroke="#2a1a1a" stroke-width="1"/>
  <text x="160" y="317" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">POST</text>
  <text x="330" y="317" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#e05555" text-anchor="middle">✗</text>
  <text x="510" y="317" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#e05555" text-anchor="middle">✗</text>
  <text x="700" y="317" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#888" text-anchor="middle">△</text>

  <!-- PUT -->
  <rect x="60" y="340" width="760" height="44" rx="4" fill="#0f0f1a" stroke="#1a1a2a" stroke-width="1"/>
  <text x="160" y="367" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">PUT</text>
  <text x="330" y="367" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#e05555" text-anchor="middle">✗</text>
  <text x="510" y="367" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#55c555" text-anchor="middle">✓</text>
  <text x="700" y="367" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#e05555" text-anchor="middle">✗</text>

  <!-- PATCH / DELETE -->
  <rect x="60" y="390" width="370" height="44" rx="4" fill="#0f0f1a" stroke="#1a1a2a" stroke-width="1"/>
  <text x="160" y="417" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">PATCH</text>
  <text x="330" y="417" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#e05555" text-anchor="middle">✗</text>
  <text x="270" y="417" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#888" text-anchor="middle">△</text>

  <rect x="450" y="390" width="370" height="44" rx="4" fill="#1a0f0f" stroke="#2a1a1a" stroke-width="1"/>
  <text x="550" y="417" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">DELETE</text>
  <text x="700" y="417" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#55c555" text-anchor="middle">✓</text>
  <text x="820" y="417" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#e05555" text-anchor="middle">✗</text>

  <!-- Fix DELETE row labels -->
  <text x="510" y="417" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#e05555" text-anchor="middle">✗</text>

  <text x="440" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">△ = 구현에 따라 다름 · 안전하다 ≠ 오류 없음 (서버 상태 변경 여부)</text>
</svg>
