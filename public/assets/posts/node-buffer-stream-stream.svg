<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="stream-arr" markerWidth="14" markerHeight="9" refX="13" refY="4.5" orient="auto">
      <polygon points="0 0,14 4.5,0 9" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">Stream 파이프라인 · 청크 처리</text>

  <!-- Stream types diagram -->
  <!-- Readable -->
  <rect x="60" y="68" width="176" height="86" rx="8" fill="#0a1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="148" y="93" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7ec8e3">Readable</text>
  <text x="148" y="113" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">데이터 생산</text>
  <text x="148" y="131" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#888">fs.createReadStream</text>
  <text x="148" y="147" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#888">http.IncomingMessage</text>

  <!-- Arrow Readable → Transform -->
  <line x1="244" y1="111" x2="290" y2="111"
    stroke="#7ec8e3" stroke-width="2" marker-end="url(#stream-arr)"/>
  <text x="267" y="103" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7ec8e3">chunk</text>

  <!-- Transform -->
  <rect x="298" y="68" width="176" height="86" rx="8" fill="#0a200a" stroke="#55c555" stroke-width="1.5"/>
  <text x="386" y="93" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#55c555">Transform</text>
  <text x="386" y="113" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">변환 (in → out)</text>
  <text x="386" y="131" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#888">zlib.createGzip</text>
  <text x="386" y="147" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#888">crypto.createCipher</text>

  <!-- Arrow Transform → Writable -->
  <line x1="482" y1="111" x2="528" y2="111"
    stroke="#7ec8e3" stroke-width="2" marker-end="url(#stream-arr)"/>
  <text x="505" y="103" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7ec8e3">chunk</text>

  <!-- Writable -->
  <rect x="536" y="68" width="176" height="86" rx="8" fill="#100a20" stroke="#7777cc" stroke-width="1.5"/>
  <text x="624" y="93" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7777cc">Writable</text>
  <text x="624" y="113" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">데이터 소비</text>
  <text x="624" y="131" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#888">fs.createWriteStream</text>
  <text x="624" y="147" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#888">http.ServerResponse</text>

  <!-- Duplex note -->
  <rect x="730" y="68" width="130" height="86" rx="8" fill="#0d1117" stroke="#e0a030" stroke-width="1"/>
  <text x="795" y="93" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#e0a030">Duplex</text>
  <text x="795" y="113" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">읽기+쓰기</text>
  <text x="795" y="133" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#888">net.Socket</text>
  <text x="795" y="149" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#888">WebSocket</text>

  <!-- Code block -->
  <rect x="60" y="178" width="760" height="218" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">stream/promises.pipeline 사용 (권장)</text>

  <!-- line 1 -->
  <text x="76" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">import </text>
  <text x="124" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">{ pipeline } from </text>
  <text x="272" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">'stream/promises'</text>
  <text x="412" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">;</text>
  <text x="76" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">import </text>
  <text x="124" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">{ createReadStream, createWriteStream } from </text>
  <text x="434" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">'fs'</text>
  <text x="458" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">;</text>
  <text x="76" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">import </text>
  <text x="124" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">{ createGzip } from </text>
  <text x="278" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">'zlib'</text>
  <text x="318" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">;</text>

  <text x="76" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">await </text>
  <text x="117" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">pipeline(</text>
  <text x="76" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  createReadStream(</text>
  <text x="232" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">'input.txt'</text>
  <text x="298" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">),</text>
  <text x="320" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">    // Readable</text>
  <text x="76" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  createGzip(),</text>
  <text x="214" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">                            // Transform</text>
  <text x="76" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  createWriteStream(</text>
  <text x="235" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">'output.txt.gz'</text>
  <text x="327" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">)</text>
  <text x="350" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">  // Writable</text>
  <text x="76" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">);</text>
  <text x="106" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 에러 시 자동 정리, 백프레셔 자동 처리</text>

  <text x="76" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 고수준 옵션: highWaterMark — 청크 크기 (기본 16 KB)</text>
</svg>
