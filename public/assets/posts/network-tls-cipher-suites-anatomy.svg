<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">TLS 암호 스위트 구조 해부</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384 분해</text>

  <!-- 암호 스위트 이름 박스 -->
  <rect x="60" y="88" width="760" height="48" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="118" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" font-weight="600" fill="#ffffff" xml:space="preserve">TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384</text>

  <!-- 분해 화살표들 -->
  <defs>
    <marker id="segArr" viewBox="0 0 14 14" refX="7" refY="12" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M 0 0 L 7 12 L 14 0 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- 세그먼트 박스들 -->
  <!-- TLS -->
  <rect x="60" y="175" width="80" height="52" rx="6" fill="#1a1a0a" stroke="#e8c44a" stroke-width="1.5"/>
  <text x="100" y="197" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8c44a">TLS</text>
  <text x="100" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">프로토콜</text>
  <line x1="100" y1="136" x2="100" y2="175" stroke="#7777cc" stroke-width="1.5" marker-end="url(#segArr)"/>

  <!-- ECDHE -->
  <rect x="160" y="175" width="120" height="52" rx="6" fill="#0a1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="220" y="197" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">ECDHE</text>
  <text x="220" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">키 교환</text>
  <line x1="220" y1="136" x2="220" y2="175" stroke="#7777cc" stroke-width="1.5" marker-end="url(#segArr)"/>

  <!-- RSA -->
  <rect x="300" y="175" width="100" height="52" rx="6" fill="#2a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="350" y="197" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">RSA</text>
  <text x="350" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">인증</text>
  <line x1="350" y1="136" x2="350" y2="175" stroke="#7777cc" stroke-width="1.5" marker-end="url(#segArr)"/>

  <!-- AES_256_GCM -->
  <rect x="420" y="175" width="180" height="52" rx="6" fill="#0d2a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="510" y="197" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">AES-256-GCM</text>
  <text x="510" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">대칭키 암호화 (AEAD)</text>
  <line x1="510" y1="136" x2="510" y2="175" stroke="#7777cc" stroke-width="1.5" marker-end="url(#segArr)"/>

  <!-- SHA384 -->
  <rect x="620" y="175" width="120" height="52" rx="6" fill="#1a0d2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="680" y="197" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">SHA-384</text>
  <text x="680" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">PRF / MAC</text>
  <line x1="680" y1="136" x2="680" y2="175" stroke="#7777cc" stroke-width="1.5" marker-end="url(#segArr)"/>

  <!-- 설명 카드들 -->
  <rect x="60" y="258" width="180" height="80" rx="6" fill="#111"/>
  <text x="150" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">키 교환 (ECDHE)</text>
  <text x="150" y="295" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">타원곡선 ECDH + Ephemeral</text>
  <text x="150" y="313" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">세션마다 새 키 → FS 보장</text>
  <text x="150" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">TLS 1.3: DHE/ECDHE만 허용</text>

  <rect x="260" y="258" width="180" height="80" rx="6" fill="#111"/>
  <text x="350" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">인증 (RSA)</text>
  <text x="350" y="295" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">서버 인증서 서명 검증</text>
  <text x="350" y="313" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">RSA-2048 이상 권장</text>
  <text x="350" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">ECDSA가 더 빠름</text>

  <rect x="460" y="258" width="180" height="80" rx="6" fill="#111"/>
  <text x="550" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">대칭키 암호화 (AEAD)</text>
  <text x="550" y="295" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">AES-256 + GCM 모드</text>
  <text x="550" y="313" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">암호화 + 무결성 동시 보장</text>
  <text x="550" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">ChaCha20-Poly1305 대안</text>

  <rect x="660" y="258" width="160" height="80" rx="6" fill="#111"/>
  <text x="740" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">해시 (SHA-384)</text>
  <text x="740" y="295" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">PRF 및 HMAC에 사용</text>
  <text x="740" y="313" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">키 파생 함수(HKDF) 기반</text>
  <text x="740" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">TLS 1.3: SHA-256/384만</text>

  <!-- TLS 1.3 예시 -->
  <rect x="60" y="360" width="760" height="52" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="100" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve"># TLS 1.3 암호 스위트 (키 교환 분리)</text>
  <text x="100" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">TLS_AES_256_GCM_SHA384   TLS_CHACHA20_POLY1305_SHA256</text>
</svg>
