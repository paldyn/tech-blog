<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">sklearn 분류 평가 지표 코드</text>
  <text x="440" y="66" text-anchor="middle" fill="#888" font-size="13">classification_report 한 번으로 모든 지표를 확인한다</text>

  <!-- Code block -->
  <rect x="60" y="86" width="760" height="328" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1.5"/>

  <text x="76" y="108" xml:space="preserve" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">from</text>
  <text x="110" y="108" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"> sklearn.metrics </text>
  <text x="228" y="108" xml:space="preserve" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">import</text>
  <text x="270" y="108" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"> (</text>
  <text x="76" y="126" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">    accuracy_score, precision_score,</text>
  <text x="76" y="144" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">    recall_score, f1_score,</text>
  <text x="76" y="162" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">    classification_report)</text>

  <line x1="76" y1="176" x2="804" y2="176" stroke="#1e2433" stroke-width="1"/>

  <text x="76" y="194" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"># 개별 지표 계산</text>
  <text x="76" y="212" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">acc  = accuracy_score(y_true, y_pred)</text>
  <text x="76" y="230" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">prec = precision_score(y_true, y_pred,</text>
  <text x="76" y="248" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">          average=</text>
  <text x="172" y="248" xml:space="preserve" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">'weighted'</text>
  <text x="235" y="248" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">)</text>
  <text x="76" y="266" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">rec  = recall_score(y_true, y_pred,</text>
  <text x="76" y="284" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">          average=</text>
  <text x="172" y="284" xml:space="preserve" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">'weighted'</text>
  <text x="235" y="284" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">)</text>
  <text x="76" y="302" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">f1   = f1_score(y_true, y_pred,</text>
  <text x="76" y="320" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">          average=</text>
  <text x="172" y="320" xml:space="preserve" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">'weighted'</text>
  <text x="235" y="320" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">)</text>

  <line x1="76" y1="334" x2="804" y2="334" stroke="#1e2433" stroke-width="1"/>

  <text x="76" y="352" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"># 전체 리포트 (한 줄로 해결)</text>
  <text x="76" y="370" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">print(classification_report(</text>
  <text x="76" y="388" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">    y_true, y_pred,</text>
  <text x="76" y="406" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">    target_names=[</text>
  <text x="188" y="406" xml:space="preserve" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">'neg'</text>
  <text x="215" y="406" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">, </text>
  <text x="228" y="406" xml:space="preserve" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">'pos'</text>
  <text x="255" y="406" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">]))</text>

  <!-- Footer -->
  <text x="440" y="448" text-anchor="middle" fill="#444" font-size="11">PALDYN · AI 완전 정복 시리즈</text>
</svg>
