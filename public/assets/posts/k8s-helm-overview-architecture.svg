<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Helm 아키텍처 — 설치부터 배포까지</text>

  <!-- Row 1: Developer -->
  <rect x="60" y="100" width="150" height="72" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="135" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">개발자</text>
  <text x="135" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">helm install</text>
  <text x="135" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">helm upgrade</text>

  <!-- Arrow: Developer → Helm CLI -->
  <line x1="210" y1="136" x2="264" y2="136" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-purple)"/>

  <!-- Helm CLI box -->
  <rect x="268" y="100" width="160" height="72" rx="8" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="348" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Helm CLI</text>
  <text x="348" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">chart 렌더링</text>
  <text x="348" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">값 병합 (values)</text>

  <!-- Arrow: Helm CLI → K8s API -->
  <line x1="428" y1="136" x2="492" y2="136" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="460" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">manifest</text>

  <!-- K8s API Server box -->
  <rect x="496" y="100" width="190" height="72" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="591" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">K8s API Server</text>
  <text x="591" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">오브젝트 생성/수정</text>
  <text x="591" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">etcd 저장</text>

  <!-- Arrow: K8s API → Cluster Resources -->
  <line x1="591" y1="172" x2="591" y2="234" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- K8s Cluster Resources box -->
  <rect x="496" y="238" width="190" height="120" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="591" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">클러스터 리소스</text>
  <text x="591" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Deployment</text>
  <text x="591" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Service</text>
  <text x="591" y="319" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">ConfigMap / Secret</text>
  <text x="591" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Ingress / PVC</text>

  <!-- Arrow: Helm CLI ↓ to Chart Repository -->
  <line x1="348" y1="172" x2="348" y2="234" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-blue)"/>
  <text x="370" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">pull</text>

  <!-- Chart Repository box -->
  <rect x="268" y="238" width="160" height="72" rx="8" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1"/>
  <text x="348" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Chart Repository</text>
  <text x="348" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Artifact Hub</text>
  <text x="348" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Private Registry</text>

  <!-- Release Info -->
  <rect x="60" y="238" width="180" height="120" rx="8" fill="#1a1a0d" stroke="#ce9178" stroke-width="1"/>
  <text x="150" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">Release</text>
  <text x="150" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">배포 인스턴스 단위</text>
  <text x="150" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">이름 + 버전 추적</text>
  <text x="150" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">rollback 가능</text>
  <text x="150" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">K8s Secret에 저장</text>

  <!-- Arrow: Helm CLI → Release -->
  <line x1="268" y1="200" x2="240" y2="238" stroke="#ce9178" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-purple)"/>
  <text x="220" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">기록</text>

  <!-- Bottom legend -->
  <text x="440" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">helm install → Chart 렌더링 → K8s manifest 적용 → Release 기록</text>
</svg>
