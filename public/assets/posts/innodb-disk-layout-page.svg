<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">InnoDB 페이지(16 KB) 내부 구조</text>

  <!-- Page layout -->
  <rect x="60" y="72" width="460" height="340" rx="8" fill="#0d1117" stroke="#2a3a5a"/>

  <!-- File Header -->
  <rect x="70" y="82" width="440" height="40" rx="4" fill="#1e2d4a" stroke="#2a3a5a"/>
  <text x="290" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">File Header (38 bytes)</text>
  <text x="70" y="133" font-size="11" fill="#888">Checksum, Page No, Prev/Next Page, LSN, Page Type, Space ID</text>

  <!-- Page Header -->
  <rect x="70" y="138" width="440" height="36" rx="4" fill="#16213e" stroke="#2a3a5a"/>
  <text x="290" y="162" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">Page Header (56 bytes)</text>

  <!-- Infimum + Supremum -->
  <rect x="70" y="180" width="440" height="28" rx="4" fill="#111827" stroke="#2a3a4a"/>
  <text x="290" y="199" text-anchor="middle" font-size="12" fill="#888">Infimum / Supremum 레코드 (26 bytes)</text>

  <!-- User Records -->
  <rect x="70" y="214" width="440" height="80" rx="4" fill="#1e3a2a" stroke="#2a4a2a"/>
  <text x="290" y="238" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">User Records</text>
  <text x="100" y="260" font-size="12" fill="#e8e8e8">record 1 → record 2 → record 3 → ...</text>
  <text x="100" y="278" font-size="12" fill="#888">단방향 링크드 리스트 (key 순 정렬)</text>

  <!-- Free Space -->
  <rect x="70" y="300" width="440" height="40" rx="4" fill="#0f1a10" stroke="#1a3a1a"/>
  <text x="290" y="325" text-anchor="middle" font-size="13" fill="#888">Free Space (삽입 시 줄어듦)</text>

  <!-- Page Directory -->
  <rect x="70" y="346" width="440" height="30" rx="4" fill="#16213e" stroke="#2a3a5a"/>
  <text x="290" y="366" text-anchor="middle" font-size="12" fill="#7777cc">Page Directory (슬롯 배열, 역방향)</text>

  <!-- File Trailer -->
  <rect x="70" y="382" width="440" height="22" rx="4" fill="#1e2d4a" stroke="#2a3a5a"/>
  <text x="290" y="398" text-anchor="middle" font-size="11" fill="#7ec8e3">File Trailer (8 bytes) — Checksum 검증</text>

  <!-- Right annotations -->
  <rect x="540" y="72" width="300" height="340" rx="8" fill="#111827" stroke="#2a2a40"/>
  <text x="690" y="100" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">핵심 포인트</text>

  <text x="558" y="130" font-size="13" fill="#7ec8e3">페이지 크기</text>
  <text x="558" y="150" font-size="13" fill="#888">기본 16KB, innodb_page_size</text>
  <text x="558" y="166" font-size="13" fill="#888">로 4K/8K/32K/64K 선택 가능</text>

  <line x1="558" y1="180" x2="830" y2="180" stroke="#2a2a40" stroke-width="0.5"/>

  <text x="558" y="200" font-size="13" fill="#55c555">B+Tree 노드 = 페이지</text>
  <text x="558" y="220" font-size="13" fill="#888">클러스터 인덱스의 리프 노드에</text>
  <text x="558" y="236" font-size="13" fill="#888">실제 행 데이터가 저장됨</text>

  <line x1="558" y1="252" x2="830" y2="252" stroke="#2a2a40" stroke-width="0.5"/>

  <text x="558" y="272" font-size="13" fill="#7777cc">Doublewrite Buffer</text>
  <text x="558" y="292" font-size="13" fill="#888">페이지 쓰기 전 별도 영역에</text>
  <text x="558" y="308" font-size="13" fill="#888">먼저 기록 → 부분 쓰기 방지</text>

  <line x1="558" y1="324" x2="830" y2="324" stroke="#2a2a40" stroke-width="0.5"/>

  <text x="558" y="344" font-size="13" fill="#e05555">Checksum 검증</text>
  <text x="558" y="364" font-size="13" fill="#888">File Header + Trailer 비교</text>
  <text x="558" y="380" font-size="13" fill="#888">페이지 손상 자동 감지</text>
</svg>
