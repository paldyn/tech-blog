<svg xmlns="http://www.w3.org/2000/svg" width="880" height="297" viewBox="0 0 880 297">
<rect width="880" height="297" fill="#0a0a0a" rx="12"/>
<text x="50" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">제네릭으로 채워진 키 추적</text>
<text x="50" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3">Builder&lt;Filled&gt;</text>
<rect x="50" y="96" width="780" height="173" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
<text y="123" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" font-weight="600" fill="#7ec8e3">class</tspan><tspan fill="#ffffff"> Builder&lt;F = </tspan><tspan font-weight="600" fill="#7ec8e3">never</tspan><tspan fill="#ffffff">&gt; {</tspan></text>
<text y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" fill="#ffffff">  set&lt;K </tspan><tspan font-weight="600" fill="#7ec8e3">extends</tspan><tspan fill="#ffffff"> keyof Cfg&gt;(</tspan></text>
<text y="161" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" fill="#ffffff">    k: K, v: Cfg[K]</tspan></text>
<text y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" fill="#ffffff">  ): Builder&lt;F | K&gt; { </tspan><tspan fill="#9aa4b8">/* ... */</tspan><tspan fill="#ffffff"> }</tspan></text>
<text y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" fill="#ffffff">  build(</tspan><tspan font-weight="600" fill="#7ec8e3">this</tspan><tspan fill="#ffffff">: Builder&lt;keyof Cfg&gt;)</tspan></text>
<text y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" fill="#ffffff">    : Cfg { </tspan><tspan fill="#9aa4b8">/* 모든 키 채워짐 */</tspan><tspan fill="#ffffff"> }</tspan></text>
<text y="237" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" fill="#ffffff">}</tspan></text>
<text y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="66" fill="#9aa4b8">// build()는 모든 키가 모일 때만 호출 가능</tspan></text>
</svg>
