<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">CIDR 표기법과 프리픽스 길이</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">192.168.1.0/24 — 슬래시 뒤 숫자가 네트워크 비트 수 (서브넷 마스크 대체)</text>

  <!-- CIDR breakdown -->
  <text x="80" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8e8e8" font-weight="600">CIDR 주소 분해: 10.0.0.0/8</text>

  <!-- Bit visualization -->
  <rect x="80" y="120" width="520" height="36" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="100" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600" xml:space="preserve">00001010 </text>
  <text x="220" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">. 00000000 . 00000000 . 00000000</text>
  <rect x="614" y="120" width="80" height="36" rx="4" fill="#0f0f1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="654" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc" text-anchor="middle">/8</text>

  <text x="150" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">← 네트워크 8비트 →</text>
  <text x="400" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">← 호스트 24비트 (16,777,214 호스트) →</text>

  <!-- CIDR examples table -->
  <rect x="80" y="200" width="760" height="200" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8e8e8" font-weight="600">CIDR 프리픽스 길이별 호스트 수</text>

  <!-- Table header -->
  <rect x="100" y="232" width="720" height="24" rx="4" fill="#1a1a2e"/>
  <text x="120" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">CIDR     서브넷 마스크       네트워크 수    호스트/네트워크  용도</text>

  <text x="120" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">/8       255.0.0.0          1 (클래스A)    16,777,214      대형 ISP</text>
  <text x="120" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">/16      255.255.0.0        256 (클래스B)  65,534          기업</text>
  <text x="120" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">/24      255.255.255.0      65536 (클래스C) 254            소규모 LAN</text>
  <text x="120" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">/30      255.255.255.252    —              2               포인트-투-포인트</text>
  <text x="120" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">/32      255.255.255.255    —              1 (호스트 라우트) 특정 호스트 지정</text>
  <text x="120" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">/0       0.0.0.0            —              전체             기본 라우트 (default)</text>

  <!-- Key info -->
  <rect x="80" y="416" width="760" height="30" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="100" y="437" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">유효 호스트 = 2^(32-프리픽스) - 2   (네트워크 주소 · 브로드캐스트 주소 제외)</text>
</svg>
