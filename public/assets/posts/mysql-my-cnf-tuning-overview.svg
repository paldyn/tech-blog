<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">MySQL my.cnf 핵심 파라미터 맵</text>

  <!-- InnoDB -->
  <rect x="60" y="74" width="360" height="260" rx="8" fill="#0f1a2e" stroke="#3a6aae" stroke-width="2"/>
  <text x="240" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e8" text-anchor="middle">InnoDB 파라미터</text>

  <text x="76" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" font-weight="600">innodb_buffer_pool_size</text>
  <text x="76" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">RAM의 70~80%. 가장 중요한 파라미터</text>

  <text x="76" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" font-weight="600">innodb_buffer_pool_instances</text>
  <text x="76" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">1GB당 1개 (최대 64). 경합 감소</text>

  <text x="76" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" font-weight="600">innodb_log_file_size</text>
  <text x="76" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">쓰기 집약 시 256M~2G. 너무 작으면 체크포인트 잦음</text>

  <text x="76" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" font-weight="600">innodb_flush_log_at_trx_commit</text>
  <text x="76" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">1=ACID 완전 준수 / 2=OS 크래시시 1초 손실 가능</text>

  <text x="76" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" font-weight="600">innodb_io_capacity</text>
  <text x="76" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">HDD: 200 / SSD: 2000~4000. 백그라운드 I/O 한도</text>

  <text x="76" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">innodb_read_io_threads / innodb_write_io_threads: 기본 4, SSD는 8~16</text>

  <!-- Connection & Query -->
  <rect x="460" y="74" width="360" height="260" rx="8" fill="#0a1a10" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">연결 & 쿼리 파라미터</text>

  <text x="476" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" font-weight="600">max_connections</text>
  <text x="476" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">기본 151. 메모리 = 연결당 ~1MB × max_connections</text>

  <text x="476" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" font-weight="600">thread_cache_size</text>
  <text x="476" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">재사용 스레드 캐시. 8~32로 설정 (연결 오버헤드 감소)</text>

  <text x="476" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" font-weight="600">sort_buffer_size</text>
  <text x="476" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">256K~4M. 크게 설정하면 메모리 폭발 위험 (세션별)</text>

  <text x="476" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" font-weight="600">join_buffer_size</text>
  <text x="476" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">인덱스 없는 조인에 사용. 기본 256K (세션별)</text>

  <text x="476" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" font-weight="600">tmp_table_size / max_heap_table_size</text>
  <text x="476" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">인메모리 임시 테이블 최대 크기. 초과 시 디스크로</text>

  <text x="476" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">long_query_time: 슬로우 쿼리 기준 (0.5~1초 권장)</text>

  <!-- Bottom: Replication & Logging -->
  <rect x="60" y="354" width="760" height="100" rx="8" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="440" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">리플리케이션 & 로깅 파라미터</text>

  <text x="80" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">server_id</text>
  <text x="80" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">각 서버 고유값 필수</text>
  <text x="80" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">1~(2^32-1)</text>

  <text x="240" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">sync_binlog</text>
  <text x="240" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">1=매 커밋마다 fsync</text>
  <text x="240" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">성능 ↔ 내구성 균형</text>

  <text x="400" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">replica_parallel_workers</text>
  <text x="400" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">병렬 적용 워커 수</text>
  <text x="400" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">CPU코어 × 0.5 권장</text>

  <text x="600" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">slow_query_log</text>
  <text x="600" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">슬로우 쿼리 파일 기록</text>
  <text x="600" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">log_queries_not_using_indexes</text>
</svg>
