  <line x1="60" y1="360" x2="820" y2="360" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="60" y1="386" x2="820" y2="386" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="60" y1="412" x2="820" y2="412" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="60" y1="438" x2="820" y2="438" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="60" y1="464" x2="820" y2="464" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="248" y1="354" x2="248" y2="500" stroke="#1a1a1a" stroke-width="1"/>
