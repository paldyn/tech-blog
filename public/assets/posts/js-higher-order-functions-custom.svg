<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">고차 함수 — 직접 구현</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">데코레이터 · once · memoize · debounce</text>

  <!-- once -->
  <rect x="60" y="100" width="360" height="155" fill="#111827" rx="8" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="240" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">once — 한 번만 실행</text>
  <rect x="80" y="132" width="320" height="111" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="96" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">function</text><text x="168" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> once(fn) {</text>
  <text x="96" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">  let</tspan><tspan fill="#e8e8e8"> called = </tspan><tspan fill="#7ec8e3">false</tspan><tspan fill="#e8e8e8">, result;</tspan></text>
  <text x="96" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  return</text><text x="156" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> (...args) => {</text>
  <text x="96" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">    if</tspan><tspan fill="#e8e8e8"> (!called) { called = </tspan><tspan fill="#7ec8e3">true</tspan><tspan fill="#e8e8e8">; result = fn(...args); }</tspan></text>
  <text x="96" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">    return</tspan><tspan fill="#e8e8e8"> result;</tspan></text>
  <text x="96" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  };</text>

  <!-- debounce -->
  <rect x="460" y="100" width="360" height="155" fill="#111827" rx="8" stroke="#4a1e5f" stroke-width="1.5"/>
  <text x="640" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">debounce — 연속 호출 억제</text>
  <rect x="480" y="132" width="320" height="111" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="496" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">function</text><text x="568" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> debounce(fn, delay) {</text>
  <text x="496" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">  let</tspan><tspan fill="#e8e8e8"> timer;</tspan></text>
  <text x="496" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  return</text><text x="556" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> (...args) => {</text>
  <text x="496" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    clearTimeout(timer);</text>
  <text x="496" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    timer = setTimeout(() => fn(...args), delay);</text>
  <text x="496" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  };</text>

  <!-- reduce 고급 활용 -->
  <rect x="60" y="275" width="760" height="155" fill="#111827" rx="8" stroke="#1e5f3a" stroke-width="1.5"/>
  <text x="440" y="297" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">reduce 고급 활용 — 객체 집계·그루핑</text>
  <rect x="80" y="307" width="720" height="111" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="96" y="327" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> orders = [{cat:</tspan><tspan fill="#ce9178">'food'</tspan><tspan fill="#e8e8e8">, amt:</tspan><tspan fill="#b5cea8">30</tspan><tspan fill="#e8e8e8">}, {cat:</tspan><tspan fill="#ce9178">'book'</tspan><tspan fill="#e8e8e8">, amt:</tspan><tspan fill="#b5cea8">20</tspan><tspan fill="#e8e8e8">}, {cat:</tspan><tspan fill="#ce9178">'food'</tspan><tspan fill="#e8e8e8">, amt:</tspan><tspan fill="#b5cea8">15</tspan><tspan fill="#e8e8e8">}];</tspan></text>
  <text x="96" y="345" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">const</text><text x="144" y="345" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> totals = orders.reduce((acc, {cat, amt}) => ({</text>
  <text x="96" y="363" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  ...acc, [cat]: (acc[cat] ?? </text><text x="306" y="363" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">0</text><text x="312" y="363" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">) + amt</text>
  <text x="96" y="381" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}), {});</text>
  <text x="96" y="399" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// { food: 45, book: 20 }</text>

</svg>
