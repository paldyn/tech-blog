<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">마나커: 문자열 변환과 P 배열</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">"abba" → "#a#b#b#a#" — 짝수/홀수 통합 처리</text>

  <!-- Original string -->
  <text x="60" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">원본:</text>
  <rect x="110" y="90" width="44" height="36" fill="#111" stroke="#333" stroke-width="1" rx="3"/>
  <text x="132" y="113" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#e8e8e8">a</text>
  <rect x="158" y="90" width="44" height="36" fill="#111" stroke="#333" stroke-width="1" rx="3"/>
  <text x="180" y="113" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#e8e8e8">b</text>
  <rect x="206" y="90" width="44" height="36" fill="#111" stroke="#333" stroke-width="1" rx="3"/>
  <text x="228" y="113" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#e8e8e8">b</text>
  <rect x="254" y="90" width="44" height="36" fill="#111" stroke="#333" stroke-width="1" rx="3"/>
  <text x="276" y="113" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#e8e8e8">a</text>

  <!-- Transformed string -->
  <text x="60" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">변환:</text>

  <!-- T = #a#b#b#a# -->
  <rect x="110" y="142" width="36" height="36" fill="#2a1a2a" stroke="#7777cc" stroke-width="1" rx="2"/>
  <text x="128" y="165" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7777cc">#</text>
  <rect x="150" y="142" width="36" height="36" fill="#111" stroke="#333" stroke-width="1" rx="2"/>
  <text x="168" y="165" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e8e8e8">a</text>
  <rect x="190" y="142" width="36" height="36" fill="#2a1a2a" stroke="#7777cc" stroke-width="1" rx="2"/>
  <text x="208" y="165" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7777cc">#</text>
  <rect x="230" y="142" width="36" height="36" fill="#111" stroke="#333" stroke-width="1" rx="2"/>
  <text x="248" y="165" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e8e8e8">b</text>
  <rect x="270" y="142" width="36" height="36" fill="#1a2a1a" stroke="#55c555" stroke-width="2" rx="2"/>
  <text x="288" y="165" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#55c555">#</text>
  <rect x="310" y="142" width="36" height="36" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="2" rx="2"/>
  <text x="328" y="165" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7ec8e3">b</text>
  <rect x="350" y="142" width="36" height="36" fill="#2a1a2a" stroke="#7777cc" stroke-width="1" rx="2"/>
  <text x="368" y="165" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7777cc">#</text>
  <rect x="390" y="142" width="36" height="36" fill="#111" stroke="#333" stroke-width="1" rx="2"/>
  <text x="408" y="165" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e8e8e8">a</text>
  <rect x="430" y="142" width="36" height="36" fill="#2a1a2a" stroke="#7777cc" stroke-width="1" rx="2"/>
  <text x="448" y="165" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7777cc">#</text>

  <!-- Index row -->
  <text x="128" y="196" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888">0</text>
  <text x="168" y="196" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888">1</text>
  <text x="208" y="196" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888">2</text>
  <text x="248" y="196" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888">3</text>
  <text x="288" y="196" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#55c555">4</text>
  <text x="328" y="196" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3">5</text>
  <text x="368" y="196" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888">6</text>
  <text x="408" y="196" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888">7</text>
  <text x="448" y="196" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888">8</text>

  <!-- P array -->
  <text x="60" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">P값:</text>
  <text x="128" y="228" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">0</text>
  <text x="168" y="228" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">1</text>
  <text x="208" y="228" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">0</text>
  <text x="248" y="228" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">1</text>
  <text x="288" y="228" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">4</text>
  <text x="328" y="228" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">3</text>
  <text x="368" y="228" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">0</text>
  <text x="408" y="228" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">1</text>
  <text x="448" y="228" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">0</text>

  <text x="110" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">P[4]=4: T[0..8]의 중심 4 팰린드롬 반지름 → 원본 "abba" 전체</text>
  <text x="110" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">P[5]=3: T[2..8] → 원본에서 "bb" (짝수 길이 팰린드롬)</text>

  <!-- Code -->
  <text x="60" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">변환 함수</text>
  <rect x="60" y="310" width="760" height="108" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="76" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">def</text>
  <text x="104" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"> transform(s):</text>
  <text x="76" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">    # "abc" → "#a#b#c#"</text>
  <text x="76" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">    return</text>
  <text x="124" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"> '#' + '#'.join(s) + '#'</text>
  <text x="76" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve"># P[i] = 변환 문자열에서 i 중심 팰린드롬 반지름</text>
  <text x="76" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve"># 원본 팰린드롬 길이 = P[i], 시작 = (i - P[i]) // 2</text>
</svg>
