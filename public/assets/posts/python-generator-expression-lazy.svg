<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">제너레이터 표현식 — 지연 평가</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">(표현식 for 변수 in 이터러블 if 조건)</text>

  <!-- Syntax -->
  <rect x="60" y="100" width="760" height="72" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="440" y="130" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" fill="#e8e8e8">(<tspan fill="#ce9178">x**2</tspan>  <tspan fill="#7ec8e3">for</tspan>  <tspan fill="#55c555">x</tspan>  <tspan fill="#7ec8e3">in</tspan>  <tspan fill="#7777cc">range(10)</tspan>  <tspan fill="#7ec8e3">if</tspan>  <tspan fill="#e8e8e8">x%2==0</tspan>)</text>
  <text x="440" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#6a8aa0">[ ] → list 즉시 생성  |  ( ) → generator 객체 반환 (지연)</text>

  <!-- Memory comparison -->
  <rect x="60" y="192" width="360" height="180" rx="8" fill="#1f0f0f" stroke="#e05555"/>
  <text x="240" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">리스트 컴프리헨션 — 즉시 평가</text>
  <rect x="76" y="228" width="328" height="128" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">lst = [x**<tspan fill="#b5cea8">2</tspan> <tspan fill="#7ec8e3">for</tspan> x <tspan fill="#7ec8e3">in</tspan> range(<tspan fill="#b5cea8">10</tspan>)]</text>
  <text x="92" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 즉시 [0,1,4,...,81] 생성</text>
  <text x="92" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 메모리: N개 모두 적재</text>
  <text x="92" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">import sys</text>
  <text x="92" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">sys.getsizeof(lst)  <tspan fill="#6a8aa0"># ~184 bytes</tspan></text>
  <text x="92" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 1M 개면 ~8 MB</text>

  <!-- Generator -->
  <rect x="460" y="192" width="360" height="180" rx="8" fill="#0f1f0f" stroke="#55c555"/>
  <text x="640" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">제너레이터 표현식 — 지연 평가</text>
  <rect x="476" y="228" width="328" height="128" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="492" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">gen = (x**<tspan fill="#b5cea8">2</tspan> <tspan fill="#7ec8e3">for</tspan> x <tspan fill="#7ec8e3">in</tspan> range(<tspan fill="#b5cea8">10</tspan>))</text>
  <text x="492" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 즉시 계산 안 함 — 껍데기만</text>
  <text x="492" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 메모리: 상수 — 항상 ~120 bytes</text>
  <text x="492" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">sys.getsizeof(gen)  <tspan fill="#6a8aa0"># ~120 bytes</tspan></text>
  <text x="492" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 1M 개도 ~120 bytes!</text>
  <text x="492" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><tspan fill="#7ec8e3">next</tspan>(gen)  <tspan fill="#6a8aa0"># 0 — 이때 첫 계산</tspan></text>

  <!-- Usage patterns -->
  <rect x="60" y="392" width="760" height="78" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="440" y="416" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">함수 인자로 직접 전달 — 괄호 하나로</text>
  <rect x="76" y="428" width="728" height="36" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="452" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><tspan fill="#7ec8e3">sum</tspan>(x**<tspan fill="#b5cea8">2</tspan> <tspan fill="#7ec8e3">for</tspan> x <tspan fill="#7ec8e3">in</tspan> range(<tspan fill="#b5cea8">100</tspan>))  <tspan fill="#6a8aa0"># 괄호 하나로 — sum((genexp)) 와 동일</tspan></text>

  <text x="440" y="486" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">한 번만 순회 가능 — 재사용이 필요하면 list()로 변환</text>
</svg>
