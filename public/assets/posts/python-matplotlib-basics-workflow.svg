<svg xmlns="http://www.w3.org/2000/svg" width="880" height="250" viewBox="0 0 880 250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="250" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">기본 흐름: 만들고 → 그리고 → 꾸미고 → 보여 준다</text>

  <defs>
    <marker id="mplar" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="60" y="92" width="170" height="62" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="145" y="118" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">subplots()</text>
  <text x="145" y="140" font-size="12" fill="#9aa4b8" text-anchor="middle">fig, ax 만들기</text>

  <line x1="230" y1="123" x2="266" y2="123" stroke="#7ec8e3" stroke-width="2" marker-end="url(#mplar)"/>

  <rect x="270" y="92" width="170" height="62" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="355" y="118" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">ax.plot(x, y)</text>
  <text x="355" y="140" font-size="12" fill="#9aa4b8" text-anchor="middle">데이터 그리기</text>

  <line x1="440" y1="123" x2="476" y2="123" stroke="#7ec8e3" stroke-width="2" marker-end="url(#mplar)"/>

  <rect x="480" y="92" width="170" height="62" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="565" y="118" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">ax.set_xlabel</text>
  <text x="565" y="140" font-size="12" fill="#9aa4b8" text-anchor="middle">축·제목 꾸미기</text>

  <line x1="650" y1="123" x2="686" y2="123" stroke="#7ec8e3" stroke-width="2" marker-end="url(#mplar)"/>

  <rect x="690" y="92" width="130" height="62" rx="6" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="755" y="118" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">show()</text>
  <text x="755" y="140" font-size="12" fill="#9aa4b8" text-anchor="middle">또는 savefig</text>

  <rect x="60" y="186" width="760" height="44" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="214" font-size="14" fill="#55c555" text-anchor="middle">fig·ax를 명시적으로 잡는 객체지향 방식이 복잡한 그래프에서 헷갈리지 않는다</text>
</svg>
