<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Trusted Types 도입 전략</text>

  <!-- Step 1: Report-only -->
  <rect x="60" y="68" width="228" height="144" rx="8" fill="#0a1020" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="174" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">① Report-Only 모드</text>
  <text x="174" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">차단 없이 위반만 보고</text>
  <rect x="76" y="124" width="204" height="76" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">CSP-Report-Only:</text>
  <text x="92" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">require-trusted-types-for</text>
  <text x="92" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">'script';</text>
  <text x="92" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">report-uri /tt-report</text>

  <!-- Arrow -->
  <line x1="288" y1="140" x2="318" y2="140" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="318,135 328,140 318,145" fill="#7ec8e3"/>

  <!-- Step 2: Fix sinks -->
  <rect x="328" y="68" width="228" height="144" rx="8" fill="#0a1020" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="442" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">② 위반 싱크 수정</text>
  <text x="442" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">보고된 싱크를 정책으로 교체</text>
  <rect x="344" y="124" width="204" height="76" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="360" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">// before</text>
  <text x="360" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">el.innerHTML = data</text>
  <text x="360" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">// after</text>
  <text x="360" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">el.innerHTML = p.createHTML(data)</text>

  <!-- Arrow -->
  <line x1="556" y1="140" x2="586" y2="140" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="586,135 596,140 586,145" fill="#7ec8e3"/>

  <!-- Step 3: Enforce -->
  <rect x="596" y="68" width="224" height="144" rx="8" fill="#0a100a" stroke="#55c555" stroke-width="1.5"/>
  <text x="708" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">③ 강제 모드 활성화</text>
  <text x="708" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">실제 차단 적용</text>
  <rect x="612" y="124" width="196" height="76" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="628" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" font-weight="600" xml:space="preserve">Content-Security-Policy:</text>
  <text x="628" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" font-weight="600" xml:space="preserve">require-trusted-types-for</text>
  <text x="628" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" font-weight="600" xml:space="preserve">'script';</text>
  <text x="628" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">trusted-types myPolicy</text>

  <!-- Third-party libraries -->
  <text x="60" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">서드파티 라이브러리 처리 방법</text>

  <rect x="60" y="264" width="760" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">라이브러리가 unsafe 싱크를 사용하는 경우 — 래퍼 정책 또는 passthrough 정책 사용</text>
  <text x="76" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 임시: passthrough (주의: 보안 감소)</text>
  <text x="76" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">trustedTypes.createPolicy('default', {</text>
  <text x="76" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">  createHTML: (s) =&gt; s, // 검증 없음 — 마이그레이션 중에만</text>
  <text x="76" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">})</text>
  <text x="76" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">장기적으로는 Trusted Types를 지원하는 라이브러리(DOMPurify 3.x, Angular 등) 사용 권장</text>
</svg>
