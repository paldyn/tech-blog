<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340">
  <rect width="880" height="340" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">StampedLock vs ReadWriteLock 성능 비교</text>

  <!-- Comparison table -->
  <rect x="60" y="60" width="240" height="36" rx="4" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <rect x="302" y="60" width="240" height="36" rx="4" fill="#0a1520" stroke="#7ec8e3" stroke-width="1"/>
  <rect x="544" y="60" width="276" height="36" rx="4" fill="#0a1f0a" stroke="#55c555" stroke-width="1"/>
  <text x="180" y="83" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">항목</text>
  <text x="422" y="83" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">ReentrantReadWriteLock</text>
  <text x="682" y="83" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">StampedLock</text>

  <!-- Rows -->
  <rect x="60" y="98" width="240" height="36" rx="4" fill="#111111" stroke="#333" stroke-width="1"/>
  <rect x="302" y="98" width="240" height="36" rx="4" fill="#111111" stroke="#333" stroke-width="1"/>
  <rect x="544" y="98" width="276" height="36" rx="4" fill="#111111" stroke="#333" stroke-width="1"/>
  <text x="180" y="121" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">낙관적 읽기</text>
  <text x="422" y="121" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">✗ 없음</text>
  <text x="682" y="121" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓ tryOptimisticRead()</text>

  <rect x="60" y="136" width="240" height="36" rx="4" fill="#111111" stroke="#333" stroke-width="1"/>
  <rect x="302" y="136" width="240" height="36" rx="4" fill="#111111" stroke="#333" stroke-width="1"/>
  <rect x="544" y="136" width="276" height="36" rx="4" fill="#111111" stroke="#333" stroke-width="1"/>
  <text x="180" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">재진입(Reentrant)</text>
  <text x="422" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓ 가능</text>
  <text x="682" y="159" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">✗ 불가 (교착 위험)</text>

  <rect x="60" y="174" width="240" height="36" rx="4" fill="#111111" stroke="#333" stroke-width="1"/>
  <rect x="302" y="174" width="240" height="36" rx="4" fill="#111111" stroke="#333" stroke-width="1"/>
  <rect x="544" y="174" width="276" height="36" rx="4" fill="#111111" stroke="#333" stroke-width="1"/>
  <text x="180" y="197" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">조건 변수(Condition)</text>
  <text x="422" y="197" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓ newCondition()</text>
  <text x="682" y="197" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">✗ 지원 안 함</text>

  <rect x="60" y="212" width="240" height="36" rx="4" fill="#111111" stroke="#333" stroke-width="1"/>
  <rect x="302" y="212" width="240" height="36" rx="4" fill="#111111" stroke="#333" stroke-width="1"/>
  <rect x="544" y="212" width="276" height="36" rx="4" fill="#111111" stroke="#333" stroke-width="1"/>
  <text x="180" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">읽기 처리량 (고경합)</text>
  <text x="422" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">중간</text>
  <text x="682" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">높음 (낙관적 읽기 시)</text>

  <rect x="60" y="250" width="240" height="36" rx="4" fill="#111111" stroke="#333" stroke-width="1"/>
  <rect x="302" y="250" width="240" height="36" rx="4" fill="#111111" stroke="#333" stroke-width="1"/>
  <rect x="544" y="250" width="276" height="36" rx="4" fill="#111111" stroke="#333" stroke-width="1"/>
  <text x="180" y="273" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">사용 난이도</text>
  <text x="422" y="273" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">쉬움</text>
  <text x="682" y="273" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8c44a">복잡 (패턴 엄수 필요)</text>

  <!-- Recommendation -->
  <rect x="60" y="298" width="760" height="32" rx="6" fill="#0a1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="319" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">권장: 단순 RW → ReentrantReadWriteLock  |  극한 읽기 성능 필요 → StampedLock (재진입 없는 단순 패턴)</text>
</svg>
