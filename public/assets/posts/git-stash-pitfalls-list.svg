<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">stash 주요 함정 5가지</text>

  <!-- Pitfall 1 -->
  <rect x="60" y="72" width="760" height="60" rx="8" fill="#1f0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="100" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">① untracked 파일 미포함</text>
  <text x="100" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">기본 stash는 추적 파일만 저장 — 새 파일은 -u 옵션 필요</text>

  <!-- Pitfall 2 -->
  <rect x="60" y="148" width="760" height="60" rx="8" fill="#1f0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="100" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">② pop 충돌 시 stash 삭제 착각</text>
  <text x="100" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">충돌 발생 시 stash는 유지됨 — 수동 drop 필요, 이중 적용 주의</text>

  <!-- Pitfall 3 -->
  <rect x="60" y="224" width="760" height="60" rx="8" fill="#1f0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="100" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">③ clear의 비가역성</text>
  <text x="100" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">git stash clear는 확인 없이 전체 삭제 — GC 후 복구 불가</text>

  <!-- Pitfall 4 -->
  <rect x="60" y="300" width="760" height="60" rx="8" fill="#1f0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="100" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">④ stash는 브랜치를 타지 않음</text>
  <text x="100" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">어떤 브랜치에서도 stash 목록은 공유됨 — 다른 브랜치 stash 실수 주의</text>

  <!-- Pitfall 5 -->
  <rect x="60" y="376" width="760" height="60" rx="8" fill="#1f0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="100" y="401" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">⑤ submodule 변경 미저장</text>
  <text x="100" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">stash는 서브모듈 내부 변경을 저장하지 않음 — 각 서브모듈에서 별도 stash</text>
</svg>
