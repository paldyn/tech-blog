<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">배열 메서드 카테고리 맵</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">순회 · 변환 · 검색 · 집계 · 정렬 · 구조변경</text>

  <!-- Category: 순회 -->
  <rect x="60" y="100" width="230" height="160" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="60" y="100" width="230" height="32" rx="8" fill="#1a2a3a"/>
  <rect x="60" y="120" width="230" height="12" fill="#1a2a3a"/>
  <text x="175" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">순회</text>
  <text x="80" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">forEach</text>
  <text x="80" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">entries / keys / values</text>
  <text x="80" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">for...of</text>
  <text x="80" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">반환값 없음 (side-effect 전용)</text>
  <text x="80" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6a8aa0">원본 변경 없음</text>

  <!-- Category: 변환 -->
  <rect x="310" y="100" width="230" height="160" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="310" y="100" width="230" height="32" rx="8" fill="#1a3a1a"/>
  <rect x="310" y="120" width="230" height="12" fill="#1a3a1a"/>
  <text x="425" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">변환</text>
  <text x="330" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">map</text>
  <text x="330" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">flatMap / flat</text>
  <text x="330" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">filter</text>
  <text x="330" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">slice / concat / join</text>
  <text x="330" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6a8aa0">원본 변경 없음 (새 배열 반환)</text>

  <!-- Category: 검색 -->
  <rect x="560" y="100" width="260" height="160" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="560" y="100" width="260" height="32" rx="8" fill="#2a1a3a"/>
  <rect x="560" y="120" width="260" height="12" fill="#2a1a3a"/>
  <text x="690" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">검색</text>
  <text x="580" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">find / findIndex</text>
  <text x="580" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">findLast / findLastIndex</text>
  <text x="580" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">includes / indexOf</text>
  <text x="580" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">some / every</text>
  <text x="580" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6a8aa0">원본 변경 없음</text>

  <!-- Category: 집계 -->
  <rect x="60" y="290" width="230" height="130" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="60" y="290" width="230" height="32" rx="8" fill="#2a2a1a"/>
  <rect x="60" y="310" width="230" height="12" fill="#2a2a1a"/>
  <text x="175" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e0c045" text-anchor="middle">집계</text>
  <text x="80" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">reduce / reduceRight</text>
  <text x="80" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">length</text>
  <text x="80" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6a8aa0">단일 값 반환</text>

  <!-- Category: 정렬 -->
  <rect x="310" y="290" width="230" height="130" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="310" y="290" width="230" height="32" rx="8" fill="#3a1a1a"/>
  <rect x="310" y="310" width="230" height="12" fill="#3a1a1a"/>
  <text x="425" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">정렬</text>
  <text x="330" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">sort ⚠ 원본 변경</text>
  <text x="330" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">reverse ⚠ 원본 변경</text>
  <text x="330" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">toSorted (ES2023)</text>
  <text x="330" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">toReversed (ES2023)</text>

  <!-- Category: 구조변경 -->
  <rect x="560" y="290" width="260" height="130" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="560" y="290" width="260" height="32" rx="8" fill="#3a1a2a"/>
  <rect x="560" y="310" width="260" height="12" fill="#3a1a2a"/>
  <text x="690" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">구조변경 ⚠ 원본 변경</text>
  <text x="580" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">push / pop</text>
  <text x="580" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">shift / unshift</text>
  <text x="580" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">splice / fill / copyWithin</text>
  <text x="580" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">with (ES2023)</text>

  <!-- Legend at bottom -->
  <rect x="60" y="444" width="760" height="56" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="466" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">원칙</text>
  <text x="80" y="485" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">불변 메서드(순회·변환·검색·집계)는 원본 유지. sort·splice 등 변경 메서드는 복사 후 사용 권장. ES2023 toSorted/toReversed로 대체 가능.</text>
</svg>
