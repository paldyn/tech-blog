<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" width="880">
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">RESTful URI 설계 원칙</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">명사 기반 계층 구조 · HTTP 메서드로 행위 표현</text>

  <!-- Bad column header -->
  <rect x="60" y="96" width="340" height="36" fill="#2a1010" rx="6"/>
  <text x="230" y="119" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e05555">❌ 나쁜 URI 설계</text>

  <!-- Good column header -->
  <rect x="480" y="96" width="340" height="36" fill="#0e2a10" rx="6"/>
  <text x="650" y="119" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">✅ 좋은 URI 설계</text>

  <!-- Row 1: 동사 vs 명사 -->
  <rect x="60" y="148" width="340" height="28" fill="#1a0a0a" rx="4"/>
  <text x="80" y="167" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">GET /getUsers</text>
  <rect x="480" y="148" width="340" height="28" fill="#0a1a0a" rx="4"/>
  <text x="500" y="167" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">GET /users</text>
  <text x="230" y="167" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">동사 포함</text>

  <!-- Row 2 -->
  <rect x="60" y="184" width="340" height="28" fill="#1a0a0a" rx="4"/>
  <text x="80" y="203" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">POST /createUser</text>
  <rect x="480" y="184" width="340" height="28" fill="#0a1a0a" rx="4"/>
  <text x="500" y="203" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">POST /users</text>
  <text x="230" y="203" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">동사 포함</text>

  <!-- Row 3 -->
  <rect x="60" y="220" width="340" height="28" fill="#1a0a0a" rx="4"/>
  <text x="80" y="239" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">GET /user-list</text>
  <rect x="480" y="220" width="340" height="28" fill="#0a1a0a" rx="4"/>
  <text x="500" y="239" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">GET /users</text>
  <text x="230" y="239" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">복수형 사용</text>

  <!-- Row 4 -->
  <rect x="60" y="256" width="340" height="28" fill="#1a0a0a" rx="4"/>
  <text x="80" y="275" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">GET /Users/ID/Orders</text>
  <rect x="480" y="256" width="340" height="28" fill="#0a1a0a" rx="4"/>
  <text x="500" y="275" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">GET /users/{id}/orders</text>
  <text x="230" y="275" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">소문자 + 계층 표현</text>

  <!-- Row 5 -->
  <rect x="60" y="292" width="340" height="28" fill="#1a0a0a" rx="4"/>
  <text x="80" y="311" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">DELETE /deleteOrder?id=5</text>
  <rect x="480" y="292" width="340" height="28" fill="#0a1a0a" rx="4"/>
  <text x="500" y="311" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">DELETE /orders/5</text>
  <text x="230" y="311" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">경로 변수 활용</text>

  <!-- Row 6 -->
  <rect x="60" y="328" width="340" height="28" fill="#1a0a0a" rx="4"/>
  <text x="80" y="347" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">POST /orders/5/doCancel</text>
  <rect x="480" y="328" width="340" height="28" fill="#0a1a0a" rx="4"/>
  <text x="500" y="347" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">POST /orders/5/cancel</text>
  <text x="230" y="347" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">행위도 명사화</text>

  <!-- Divider -->
  <line x1="60" y1="376" x2="820" y2="376" stroke="#222" stroke-width="1"/>

  <!-- REST 계층 구조 원칙 boxes -->
  <text x="440" y="404" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">계층 구조 설계 원칙</text>

  <!-- Box 1 -->
  <rect x="60" y="418" width="174" height="88" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="147" y="442" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">컬렉션</text>
  <text x="147" y="462" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">GET /users</text>
  <text x="147" y="480" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">POST /users</text>
  <text x="147" y="498" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">목록 조회 / 생성</text>

  <!-- Box 2 -->
  <rect x="246" y="418" width="174" height="88" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="333" y="442" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">단일 리소스</text>
  <text x="333" y="462" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">GET /users/{id}</text>
  <text x="333" y="480" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">PUT /users/{id}</text>
  <text x="333" y="498" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">조회 / 수정 / 삭제</text>

  <!-- Box 3 -->
  <rect x="432" y="418" width="174" height="88" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="519" y="442" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">서브 리소스</text>
  <text x="519" y="462" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">/users/{id}/orders</text>
  <text x="519" y="480" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">/orders/{id}/items</text>
  <text x="519" y="498" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">중첩 리소스 관계</text>

  <!-- Box 4 -->
  <rect x="618" y="418" width="202" height="88" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="719" y="442" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">행위 표현</text>
  <text x="719" y="462" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">/orders/{id}/cancel</text>
  <text x="719" y="480" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">/users/{id}/activate</text>
  <text x="719" y="498" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">CRUD 외 동작은 명사화</text>
</svg>
