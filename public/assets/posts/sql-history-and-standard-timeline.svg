<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">SQL 역사 타임라인</text>

  <!-- Timeline line -->
  <line x1="80" y1="160" x2="820" y2="160" stroke="#3a4a6e" stroke-width="2"/>

  <!-- 1970: Codd's paper -->
  <circle cx="110" cy="160" r="8" fill="#7777cc"/>
  <line x1="110" y1="152" x2="110" y2="100" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4"/>
  <rect x="60" y="68" width="100" height="30" fill="#0f1320" stroke="#7777cc" stroke-width="1" rx="4"/>
  <text x="110" y="88" text-anchor="middle" font-size="12" font-weight="600" fill="#7777cc">1970</text>
  <text x="110" y="178" text-anchor="middle" font-size="10" fill="#888">Codd 논문</text>

  <!-- 1974: SEQUEL -->
  <circle cx="190" cy="160" r="8" fill="#7ec8e3"/>
  <line x1="190" y1="168" x2="190" y2="220" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4"/>
  <rect x="140" y="222" width="100" height="30" fill="#0f1320" stroke="#7ec8e3" stroke-width="1" rx="4"/>
  <text x="190" y="242" text-anchor="middle" font-size="12" font-weight="600" fill="#7ec8e3">1974</text>
  <text x="190" y="142" text-anchor="middle" font-size="10" fill="#888">SEQUEL</text>

  <!-- 1979: Oracle v2 -->
  <circle cx="270" cy="160" r="8" fill="#e05555"/>
  <line x1="270" y1="152" x2="270" y2="100" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <rect x="220" y="68" width="100" height="30" fill="#0f1320" stroke="#e05555" stroke-width="1" rx="4"/>
  <text x="270" y="88" text-anchor="middle" font-size="12" font-weight="600" fill="#e05555">1979</text>
  <text x="270" y="178" text-anchor="middle" font-size="10" fill="#888">Oracle v2</text>

  <!-- 1986: SQL-86 (ANSI) -->
  <circle cx="360" cy="160" r="10" fill="#55c555"/>
  <line x1="360" y1="168" x2="360" y2="220" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <rect x="306" y="222" width="108" height="30" fill="#0f1320" stroke="#55c555" stroke-width="1.5" rx="4"/>
  <text x="360" y="242" text-anchor="middle" font-size="12" font-weight="700" fill="#55c555">SQL-86</text>
  <text x="360" y="142" text-anchor="middle" font-size="10" fill="#888">최초 ANSI 표준</text>

  <!-- 1992: SQL-92 -->
  <circle cx="460" cy="160" r="10" fill="#55c555"/>
  <line x1="460" y1="152" x2="460" y2="100" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <rect x="406" y="68" width="108" height="30" fill="#0f1320" stroke="#55c555" stroke-width="1.5" rx="4"/>
  <text x="460" y="88" text-anchor="middle" font-size="12" font-weight="700" fill="#55c555">SQL-92</text>
  <text x="460" y="178" text-anchor="middle" font-size="10" fill="#888">JOIN·서브쿼리</text>

  <!-- 1999: SQL:1999 -->
  <circle cx="560" cy="160" r="10" fill="#7ec8e3"/>
  <line x1="560" y1="168" x2="560" y2="220" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4"/>
  <rect x="506" y="222" width="108" height="30" fill="#0f1320" stroke="#7ec8e3" stroke-width="1.5" rx="4"/>
  <text x="560" y="242" text-anchor="middle" font-size="12" font-weight="700" fill="#7ec8e3">SQL:1999</text>
  <text x="560" y="142" text-anchor="middle" font-size="10" fill="#888">CTE·재귀·OO</text>

  <!-- 2003: SQL:2003 -->
  <circle cx="640" cy="160" r="8" fill="#ce9178"/>
  <line x1="640" y1="152" x2="640" y2="100" stroke="#ce9178" stroke-width="1.5" stroke-dasharray="4,4"/>
  <rect x="590" y="68" width="100" height="30" fill="#0f1320" stroke="#ce9178" stroke-width="1" rx="4"/>
  <text x="640" y="88" text-anchor="middle" font-size="12" font-weight="600" fill="#ce9178">SQL:2003</text>
  <text x="640" y="178" text-anchor="middle" font-size="10" fill="#888">Window 함수</text>

  <!-- 2011: SQL:2011 -->
  <circle cx="720" cy="160" r="8" fill="#b5cea8"/>
  <line x1="720" y1="168" x2="720" y2="220" stroke="#b5cea8" stroke-width="1.5" stroke-dasharray="4,4"/>
  <rect x="670" y="222" width="100" height="30" fill="#0f1320" stroke="#b5cea8" stroke-width="1" rx="4"/>
  <text x="720" y="242" text-anchor="middle" font-size="12" font-weight="600" fill="#b5cea8">SQL:2011</text>
  <text x="720" y="142" text-anchor="middle" font-size="10" fill="#888">Temporal</text>

  <!-- 2023: SQL:2023 -->
  <circle cx="800" cy="160" r="10" fill="#7777cc"/>
  <line x1="800" y1="152" x2="800" y2="100" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4"/>
  <rect x="746" y="68" width="108" height="30" fill="#0f1320" stroke="#7777cc" stroke-width="1.5" rx="4"/>
  <text x="800" y="88" text-anchor="middle" font-size="12" font-weight="700" fill="#7777cc">SQL:2023</text>
  <text x="800" y="178" text-anchor="middle" font-size="10" fill="#888">JSON·Graph</text>

  <!-- Legend -->
  <rect x="80" y="290" width="720" height="140" fill="#0f1320" stroke="#2a3a5e" stroke-width="1" rx="8"/>
  <text x="440" y="312" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">주요 표준별 추가 기능</text>

  <text x="110" y="336" font-size="12" font-weight="600" fill="#55c555">SQL-86/89</text>
  <text x="110" y="352" font-size="11" fill="#888">기본 SELECT/INSERT/UPDATE/DELETE, 무결성 제약</text>

  <text x="110" y="374" font-size="12" font-weight="600" fill="#55c555">SQL-92</text>
  <text x="110" y="390" font-size="11" fill="#888">JOIN 구문 표준화, 서브쿼리, CASE, CAST, 스키마 정보</text>

  <text x="490" y="336" font-size="12" font-weight="600" fill="#7ec8e3">SQL:1999</text>
  <text x="490" y="352" font-size="11" fill="#888">CTE(WITH), 재귀 쿼리, 사용자 정의 타입</text>

  <text x="490" y="374" font-size="12" font-weight="600" fill="#7ec8e3">SQL:2003~2023</text>
  <text x="490" y="390" font-size="11" fill="#888">Window 함수, MERGE, JSON, Temporal, Graph(GQL)</text>

  <text x="440" y="416" text-anchor="middle" font-size="11" fill="#888">각 RDBMS는 표준의 일부만 구현하며 독자 확장을 추가 — 방언(dialect) 차이의 원인</text>
</svg>
