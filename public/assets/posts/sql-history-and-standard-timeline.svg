<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SQL 역사 타임라인</text>

  <!-- Timeline line -->
  <line x1="80" y1="110" x2="800" y2="110" stroke="#3a4a6e" stroke-width="2"/>

  <!-- 1970 -->
  <circle cx="100" cy="110" r="8" fill="#7777cc"/>
  <text x="100" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">1970</text>
  <text x="100" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Codd 논문</text>
  <text x="100" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">관계형 모델</text>

  <!-- 1974 -->
  <circle cx="210" cy="110" r="8" fill="#55c555"/>
  <text x="210" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">1974</text>
  <text x="210" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SEQUEL</text>
  <text x="210" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">IBM 연구소</text>

  <!-- 1979 -->
  <circle cx="320" cy="110" r="8" fill="#7ec8e3"/>
  <text x="320" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">1979</text>
  <text x="320" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Oracle v2</text>
  <text x="320" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">최초 상용 RDBMS</text>

  <!-- 1986 -->
  <circle cx="440" cy="110" r="8" fill="#e05555"/>
  <text x="440" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">1986</text>
  <text x="440" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SQL-86</text>
  <text x="440" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">첫 ANSI 표준</text>

  <!-- 1992 -->
  <circle cx="550" cy="110" r="8" fill="#55c555"/>
  <text x="550" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">1992</text>
  <text x="550" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SQL-92</text>
  <text x="550" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">JOIN, 서브쿼리</text>

  <!-- 1999 -->
  <circle cx="660" cy="110" r="8" fill="#7ec8e3"/>
  <text x="660" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">1999</text>
  <text x="660" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SQL:1999</text>
  <text x="660" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">CTE, 윈도우 함수</text>

  <!-- 2003+ -->
  <circle cx="780" cy="110" r="8" fill="#7777cc"/>
  <text x="780" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">2003~</text>
  <text x="780" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SQL:2003~23</text>
  <text x="780" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">JSON, MERGE 등</text>

  <!-- Standards table -->
  <text x="440" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">주요 SQL 표준과 추가 기능</text>

  <rect x="60" y="215" width="760" height="32" rx="4" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="170" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" font-weight="600" text-anchor="middle">표준</text>
  <text x="440" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" font-weight="600" text-anchor="middle">주요 추가 기능</text>
  <text x="720" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" font-weight="600" text-anchor="middle">별칭</text>

  <rect x="60" y="247" width="760" height="28" fill="#0f1a0f" stroke="#2a3a2a" stroke-width="1"/>
  <text x="170" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">SQL-86</text>
  <text x="440" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">기본 SELECT, INSERT, UPDATE, DELETE</text>
  <text x="720" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">SQL1</text>

  <rect x="60" y="275" width="760" height="28" fill="#111827" stroke="#2a3a2a" stroke-width="1"/>
  <text x="170" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">SQL-92</text>
  <text x="440" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">JOIN 표준화, 서브쿼리, CASE, CAST</text>
  <text x="720" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">SQL2</text>

  <rect x="60" y="303" width="760" height="28" fill="#0f1a0f" stroke="#2a3a2a" stroke-width="1"/>
  <text x="170" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">SQL:1999</text>
  <text x="440" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">CTE(WITH), 윈도우 함수, 재귀 쿼리</text>
  <text x="720" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">SQL3</text>

  <rect x="60" y="331" width="760" height="28" fill="#111827" stroke="#2a3a2a" stroke-width="1"/>
  <text x="170" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">SQL:2003</text>
  <text x="440" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">MERGE, SEQUENCE, XML 지원</text>
  <text x="720" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">-</text>

  <rect x="60" y="359" width="760" height="28" fill="#0f1a0f" stroke="#2a3a2a" stroke-width="1"/>
  <text x="170" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">SQL:2016~23</text>
  <text x="440" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">JSON 함수, MATCH_RECOGNIZE, 다형적 함수</text>
  <text x="720" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">최신</text>

  <rect x="60" y="410" width="760" height="30" rx="8" fill="#0f1a2a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">벤더 구현은 표준을 부분 지원 + 독자 확장 — 방언(dialect) 차이 주의</text>
</svg>
