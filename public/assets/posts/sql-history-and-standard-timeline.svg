<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SQL 표준 역사 타임라인</text>

  <!-- Timeline line -->
  <line x1="80" y1="130" x2="800" y2="130" stroke="#3a4a6e" stroke-width="2"/>

  <!-- 1970 - Codd -->
  <circle cx="100" cy="130" r="6" fill="#7ec8e3"/>
  <text x="100" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">1970</text>
  <rect x="62" y="150" width="76" height="70" fill="#111827" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">코드 논문</text>
  <text x="100" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">관계형 모델</text>
  <text x="100" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">발표(IBM)</text>

  <!-- 1974 - SEQUEL -->
  <circle cx="200" cy="130" r="6" fill="#7ec8e3"/>
  <text x="200" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">1974</text>
  <rect x="162" y="150" width="76" height="70" fill="#111827" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="200" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">SEQUEL</text>
  <text x="200" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">IBM 실험</text>
  <text x="200" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">System R</text>

  <!-- 1979 - Oracle -->
  <circle cx="310" cy="130" r="6" fill="#55c555"/>
  <text x="310" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">1979</text>
  <rect x="272" y="150" width="76" height="70" fill="#111827" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="310" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">Oracle 2</text>
  <text x="310" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">최초 상용</text>
  <text x="310" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">RDBMS 출시</text>

  <!-- 1986 - SQL-86 -->
  <circle cx="420" cy="130" r="8" fill="#e05555"/>
  <text x="420" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">1986</text>
  <rect x="374" y="150" width="92" height="70" fill="#1a1010" rx="6" stroke="#4a2222" stroke-width="1.5"/>
  <text x="420" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle" font-weight="600">SQL-86</text>
  <text x="420" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">ANSI/ISO</text>
  <text x="420" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">최초 표준화</text>

  <!-- 1992 - SQL-92 -->
  <circle cx="530" cy="130" r="8" fill="#e05555"/>
  <text x="530" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">1992</text>
  <rect x="484" y="150" width="92" height="70" fill="#1a1010" rx="6" stroke="#4a2222" stroke-width="1.5"/>
  <text x="530" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle" font-weight="600">SQL-92</text>
  <text x="530" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">대폭 확장</text>
  <text x="530" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">JOIN·서브쿼리</text>

  <!-- 1999 - SQL:1999 -->
  <circle cx="640" cy="130" r="8" fill="#7777cc"/>
  <text x="640" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">1999</text>
  <rect x="594" y="150" width="92" height="70" fill="#0d0d1a" rx="6" stroke="#2a2a5a" stroke-width="1.5"/>
  <text x="640" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle" font-weight="600">SQL:1999</text>
  <text x="640" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">CTE·재귀</text>
  <text x="640" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">윈도우 함수</text>

  <!-- 2003+ -->
  <circle cx="780" cy="130" r="8" fill="#55c555"/>
  <text x="780" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">2003~</text>
  <rect x="734" y="150" width="92" height="70" fill="#0d1a0d" rx="6" stroke="#1a4a1a" stroke-width="1.5"/>
  <text x="780" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle" font-weight="600">SQL:2003+</text>
  <text x="780" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">XML·JSON</text>
  <text x="780" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">MERGE·2023</text>

  <!-- Major features table -->
  <rect x="60" y="296" width="760" height="152" fill="#111827" rx="10" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">표준별 주요 추가 기능</text>

  <text x="80" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" font-weight="600">SQL-92:</text>
  <text x="170" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">OUTER JOIN, CASE, CAST, 문자열 함수, 서브쿼리 강화</text>

  <text x="80" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" font-weight="600">SQL:1999:</text>
  <text x="170" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">재귀 CTE(WITH RECURSIVE), ROLLUP/CUBE, 트리거, 사용자 정의 타입</text>

  <text x="80" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" font-weight="600">SQL:2003:</text>
  <text x="170" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">윈도우 함수(OVER), MERGE, IDENTITY, XML 지원</text>

  <text x="80" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" font-weight="600">SQL:2016+:</text>
  <text x="170" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">JSON 경로, 행 패턴 매칭(MATCH_RECOGNIZE), LISTAGG, 2023 그래프 쿼리</text>
</svg>
