<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">SQL의 역사 — 표준화 타임라인</text>

  <!-- Timeline line -->
  <line x1="80" y1="130" x2="820" y2="130" stroke="#3a4a6e" stroke-width="2"/>

  <!-- 1970 -->
  <circle cx="110" cy="130" r="8" fill="#7777cc"/>
  <text x="110" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#7777cc">1970</text>
  <text x="110" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">Codd 논문</text>
  <text x="110" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">관계형 모델</text>

  <!-- 1974 -->
  <circle cx="210" cy="130" r="8" fill="#7ec8e3"/>
  <text x="210" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#7ec8e3">1974</text>
  <text x="210" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">IBM SEQUEL</text>
  <text x="210" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">SQL 전신</text>

  <!-- 1979 -->
  <circle cx="310" cy="130" r="8" fill="#55c555"/>
  <text x="310" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#55c555">1979</text>
  <text x="310" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">Oracle v2</text>
  <text x="310" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">최초 상용 RDBMS</text>

  <!-- 1986 SQL-86 -->
  <circle cx="420" cy="130" r="10" fill="#ce9178"/>
  <text x="420" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#ce9178">1986</text>
  <text x="420" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#ce9178">SQL-86</text>
  <text x="420" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">최초 ISO 표준</text>

  <!-- 1992 SQL-92 -->
  <circle cx="530" cy="130" r="10" fill="#ce9178"/>
  <text x="530" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#ce9178">1992</text>
  <text x="530" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#ce9178">SQL-92</text>
  <text x="530" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">JOIN, 트랜잭션 표준화</text>

  <!-- 1999 SQL:1999 -->
  <circle cx="640" cy="130" r="10" fill="#e05555"/>
  <text x="640" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e05555">1999</text>
  <text x="640" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">SQL:1999</text>
  <text x="640" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">CTE, Trigger, OO</text>

  <!-- 2003+ -->
  <circle cx="760" cy="130" r="10" fill="#e05555"/>
  <text x="760" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e05555">2003+</text>
  <text x="760" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">SQL:2003~2023</text>
  <text x="760" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">Window, JSON, 행패턴</text>

  <!-- Standard versions detail -->
  <rect x="60" y="194" width="760" height="240" rx="8" fill="#111" stroke="#2a3a5a" stroke-width="1"/>
  <rect x="60" y="194" width="760" height="28" rx="8" fill="#1a2a4a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="213" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">주요 SQL 표준별 도입 기능</text>

  <!-- Table header -->
  <line x1="60" y1="222" x2="820" y2="222" stroke="#2a3a5a" stroke-width="1"/>
  <text x="130" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">표준</text>
  <text x="440" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">주요 도입 기능</text>
  <text x="720" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">별칭</text>

  <line x1="60" y1="244" x2="820" y2="244" stroke="#1e1e3e" stroke-width="1"/>
  <text x="130" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178" font-weight="600">SQL-86/89</text>
  <text x="440" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ffffff">SELECT, INSERT, UPDATE, DELETE, WHERE, GROUP BY</text>
  <text x="720" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">SQL1</text>

  <line x1="60" y1="266" x2="820" y2="266" stroke="#1e1e3e" stroke-width="1"/>
  <text x="130" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178" font-weight="600">SQL-92</text>
  <text x="440" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ffffff">OUTER JOIN, CASE, CAST, 트랜잭션 격리 수준, 서브쿼리</text>
  <text x="720" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">SQL2</text>

  <line x1="60" y1="288" x2="820" y2="288" stroke="#1e1e3e" stroke-width="1"/>
  <text x="130" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" font-weight="600">SQL:1999</text>
  <text x="440" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ffffff">CTE(WITH), 재귀 쿼리, 트리거, 저장 프로시저, 객체 타입</text>
  <text x="720" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">SQL3</text>

  <line x1="60" y1="310" x2="820" y2="310" stroke="#1e1e3e" stroke-width="1"/>
  <text x="130" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" font-weight="600">SQL:2003</text>
  <text x="440" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ffffff">윈도우 함수, XML, MERGE, IDENTITY/SEQUENCE</text>
  <text x="720" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">SQL4</text>

  <line x1="60" y1="332" x2="820" y2="332" stroke="#1e1e3e" stroke-width="1"/>
  <text x="130" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" font-weight="600">SQL:2016</text>
  <text x="440" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ffffff">JSON 함수, 행 패턴 인식(MATCH_RECOGNIZE)</text>
  <text x="720" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">SQL:2016</text>

  <line x1="60" y1="354" x2="820" y2="354" stroke="#1e1e3e" stroke-width="1"/>
  <text x="130" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" font-weight="600">SQL:2023</text>
  <text x="440" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ffffff">그래프 쿼리(GQL), 속성 그래프, UNIQUE 널 처리 개선</text>
  <text x="720" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">최신</text>

  <line x1="60" y1="376" x2="820" y2="376" stroke="#1e1e3e" stroke-width="1"/>
  <text x="440" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">표준은 최소 공통 분모 — 각 DBMS는 독자 확장을 추가함</text>
</svg>
