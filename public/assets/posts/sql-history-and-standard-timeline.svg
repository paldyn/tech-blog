<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">SQL 역사 타임라인</text>
  <text x="440" y="68" text-anchor="middle" font-size="14" fill="#888">1970년 Codd 논문부터 SQL:2023까지</text>

  <!-- Timeline axis -->
  <line x1="80" y1="280" x2="800" y2="280" stroke="#2a3040" stroke-width="2"/>

  <!-- Events above the line -->
  <!-- 1970: Codd paper -->
  <line x1="100" y1="280" x2="100" y2="200" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="100" cy="280" r="5" fill="#7777cc"/>
  <rect x="62" y="148" width="76" height="48" fill="#0f0f1a" rx="5" stroke="#2a2a5a"/>
  <text x="100" y="168" text-anchor="middle" font-size="11" font-weight="600" fill="#7777cc">1970</text>
  <text x="100" y="184" text-anchor="middle" font-size="10" fill="#888">Codd 논문</text>
  <text x="100" y="196" text-anchor="middle" font-size="10" fill="#888">관계형 모델</text>

  <!-- 1974: SEQUEL -->
  <line x1="190" y1="280" x2="190" y2="148" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="190" cy="280" r="5" fill="#7ec8e3"/>
  <rect x="148" y="96" width="84" height="48" fill="#0a1520" rx="5" stroke="#1a3a5a"/>
  <text x="190" y="116" text-anchor="middle" font-size="11" font-weight="600" fill="#7ec8e3">1974</text>
  <text x="190" y="132" text-anchor="middle" font-size="10" fill="#888">SEQUEL</text>
  <text x="190" y="144" text-anchor="middle" font-size="10" fill="#888">IBM System R</text>

  <!-- 1979: Oracle -->
  <line x1="290" y1="280" x2="290" y2="200" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="290" cy="280" r="5" fill="#e05555"/>
  <rect x="248" y="148" width="84" height="48" fill="#1a0a0a" rx="5" stroke="#5a1a1a"/>
  <text x="290" y="168" text-anchor="middle" font-size="11" font-weight="600" fill="#e05555">1979</text>
  <text x="290" y="184" text-anchor="middle" font-size="10" fill="#888">Oracle V2</text>
  <text x="290" y="196" text-anchor="middle" font-size="10" fill="#888">최초 상용 SQL</text>

  <!-- 1986: SQL-86 -->
  <line x1="400" y1="280" x2="400" y2="148" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="400" cy="280" r="7" fill="#55c555"/>
  <rect x="352" y="96" width="96" height="48" fill="#0a1a0a" rx="5" stroke="#1a5a1a" stroke-width="2"/>
  <text x="400" y="116" text-anchor="middle" font-size="11" font-weight="700" fill="#55c555">1986</text>
  <text x="400" y="132" text-anchor="middle" font-size="10" fill="#e8e8e8">SQL-86</text>
  <text x="400" y="144" text-anchor="middle" font-size="10" fill="#888">ANSI 최초 표준</text>

  <!-- 1992: SQL-92 -->
  <line x1="490" y1="280" x2="490" y2="200" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="490" cy="280" r="7" fill="#55c555"/>
  <rect x="446" y="148" width="88" height="48" fill="#0a1a0a" rx="5" stroke="#1a5a1a" stroke-width="2"/>
  <text x="490" y="168" text-anchor="middle" font-size="11" font-weight="700" fill="#55c555">1992</text>
  <text x="490" y="184" text-anchor="middle" font-size="10" fill="#e8e8e8">SQL-92 (SQL2)</text>
  <text x="490" y="196" text-anchor="middle" font-size="10" fill="#888">JOIN 표준화</text>

  <!-- 1999: SQL:1999 -->
  <line x1="580" y1="280" x2="580" y2="148" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="580" cy="280" r="5" fill="#7ec8e3"/>
  <rect x="536" y="96" width="88" height="48" fill="#0a1520" rx="5" stroke="#1a3a5a"/>
  <text x="580" y="116" text-anchor="middle" font-size="11" font-weight="600" fill="#7ec8e3">1999</text>
  <text x="580" y="132" text-anchor="middle" font-size="10" fill="#e8e8e8">SQL:1999 (SQL3)</text>
  <text x="580" y="144" text-anchor="middle" font-size="10" fill="#888">CTE · 윈도우 함수</text>

  <!-- 2003/2006/2008/2011/2016/2019/2023 condensed -->
  <line x1="670" y1="280" x2="670" y2="200" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="670" cy="280" r="5" fill="#7777cc"/>
  <rect x="628" y="148" width="84" height="48" fill="#0f0f1a" rx="5" stroke="#2a2a5a"/>
  <text x="670" y="168" text-anchor="middle" font-size="11" font-weight="600" fill="#7777cc">2003~</text>
  <text x="670" y="184" text-anchor="middle" font-size="10" fill="#e8e8e8">SQL:2003</text>
  <text x="670" y="196" text-anchor="middle" font-size="10" fill="#888">XML · 시퀀스</text>

  <line x1="760" y1="280" x2="760" y2="200" stroke="#e8c060" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="760" cy="280" r="6" fill="#e8c060"/>
  <rect x="714" y="148" width="86" height="48" fill="#120e00" rx="5" stroke="#5a3a00" stroke-width="1.5"/>
  <text x="757" y="168" text-anchor="middle" font-size="11" font-weight="600" fill="#e8c060">2023</text>
  <text x="757" y="184" text-anchor="middle" font-size="10" fill="#e8e8e8">SQL:2023</text>
  <text x="757" y="196" text-anchor="middle" font-size="10" fill="#888">JSON · 그래프 쿼리</text>

  <!-- Below axis: DBMS labels -->
  <text x="100" y="304" text-anchor="middle" font-size="10" fill="#555">IBM</text>
  <text x="290" y="304" text-anchor="middle" font-size="10" fill="#555">Oracle</text>
  <text x="380" y="322" text-anchor="middle" font-size="10" fill="#555">Sybase/</text>
  <text x="380" y="334" text-anchor="middle" font-size="10" fill="#555">SQL Server</text>
  <text x="490" y="304" text-anchor="middle" font-size="10" fill="#555">MySQL 1995</text>
  <text x="600" y="322" text-anchor="middle" font-size="10" fill="#555">PostgreSQL</text>
  <text x="600" y="334" text-anchor="middle" font-size="10" fill="#555">1996</text>

  <!-- Standards table -->
  <rect x="60" y="360" width="760" height="120" fill="#0f1520" rx="8" stroke="#1e3a5a" stroke-width="1"/>
  <text x="80" y="386" font-size="13" font-weight="600" fill="#7ec8e3">주요 SQL 표준 비교</text>

  <!-- Table rows -->
  <text x="100" y="410" font-size="12" fill="#888">표준</text>
  <text x="220" y="410" font-size="12" fill="#888">주요 추가 기능</text>
  <text x="580" y="410" font-size="12" fill="#888">DBMS 지원</text>

  <line x1="80" y1="415" x2="800" y2="415" stroke="#1e3a5a" stroke-width="0.5"/>

  <text x="100" y="432" font-size="12" fill="#55c555">SQL-92</text>
  <text x="220" y="432" font-size="12" fill="#e8e8e8">OUTER JOIN, CASE, CAST, 서브쿼리</text>
  <text x="580" y="432" font-size="12" fill="#888">현재 모든 RDBMS</text>

  <text x="100" y="452" font-size="12" fill="#7ec8e3">SQL:1999</text>
  <text x="220" y="452" font-size="12" fill="#e8e8e8">CTE(WITH), 재귀, 윈도우 함수, TRIGGER</text>
  <text x="580" y="452" font-size="12" fill="#888">Oracle 9i+, PG 8.4+</text>

  <text x="100" y="472" font-size="12" fill="#e8c060">SQL:2023</text>
  <text x="220" y="472" font-size="12" fill="#e8e8e8">JSON_TABLE, 그래프 패턴 매칭(GQL)</text>
  <text x="580" y="472" font-size="12" fill="#888">일부 지원 중</text>

  <!-- Footer -->
  <text x="440" y="504" text-anchor="middle" font-size="11" fill="#444">PALDYN · SQL 완전 정복 Chapter 1</text>
</svg>
