<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SQL 역사 타임라인</text>

  <!-- Timeline line -->
  <line x1="80" y1="100" x2="800" y2="100" stroke="#3a4a6e" stroke-width="2"/>

  <!-- 1970 -->
  <circle cx="100" cy="100" r="6" fill="#7ec8e3"/>
  <text x="100" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">1970</text>
  <text x="100" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Codd 논문</text>

  <!-- 1974 -->
  <circle cx="200" cy="100" r="6" fill="#55c555"/>
  <text x="200" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">1974</text>
  <text x="200" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SEQUEL</text>
  <text x="200" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">→ SQL</text>

  <!-- 1979 -->
  <circle cx="310" cy="100" r="6" fill="#ce9178"/>
  <text x="310" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178" text-anchor="middle">1979</text>
  <text x="310" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Oracle 최초</text>
  <text x="310" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">상용 RDBMS</text>

  <!-- SQL-86 -->
  <circle cx="410" cy="100" r="6" fill="#7777cc"/>
  <text x="410" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">1986</text>
  <text x="410" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SQL-86</text>
  <text x="410" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ANSI 최초표준</text>

  <!-- SQL-92 -->
  <circle cx="510" cy="100" r="8" fill="#7ec8e3"/>
  <text x="510" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">1992</text>
  <text x="510" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">SQL-92</text>
  <text x="510" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">현재 기준선</text>

  <!-- SQL:1999 -->
  <circle cx="600" cy="100" r="6" fill="#55c555"/>
  <text x="600" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">1999</text>
  <text x="600" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SQL:1999</text>
  <text x="600" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">CTE/Window</text>

  <!-- SQL:2003 -->
  <circle cx="680" cy="100" r="6" fill="#ce9178"/>
  <text x="680" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178" text-anchor="middle">2003</text>
  <text x="680" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SQL:2003</text>
  <text x="680" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">XML/Seq</text>

  <!-- SQL:2023 -->
  <circle cx="780" cy="100" r="8" fill="#e05555"/>
  <text x="780" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">2023</text>
  <text x="780" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">SQL:2023</text>
  <text x="780" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">JSON/Property</text>
  <text x="780" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Graph</text>

  <!-- Standard comparison table -->
  <text x="440" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">주요 표준별 추가 기능</text>

  <rect x="60" y="200" width="760" height="32" rx="4" fill="#1a2a3a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="130" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">표준</text>
  <text x="370" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">주요 추가 기능</text>
  <text x="680" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">실무 중요도</text>

  <rect x="60" y="232" width="760" height="26" fill="#0f1a24" stroke="#2a3a4e" stroke-width="0.5"/>
  <text x="130" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">SQL-92</text>
  <text x="370" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">JOIN, OUTER JOIN, 서브쿼리, CASE, CAST</text>
  <text x="680" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">★★★★★</text>

  <rect x="60" y="258" width="760" height="26" fill="#0a1219" stroke="#2a3a4e" stroke-width="0.5"/>
  <text x="130" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">SQL:1999</text>
  <text x="370" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">CTE(WITH), 재귀쿼리, 윈도우함수(초안)</text>
  <text x="680" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">★★★★☆</text>

  <rect x="60" y="284" width="760" height="26" fill="#0f1a24" stroke="#2a3a4e" stroke-width="0.5"/>
  <text x="130" y="301" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">SQL:2003</text>
  <text x="370" y="301" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">윈도우함수 확정, SEQUENCE, XML</text>
  <text x="680" y="301" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">★★★★☆</text>

  <rect x="60" y="310" width="760" height="26" fill="#0a1219" stroke="#2a3a4e" stroke-width="0.5"/>
  <text x="130" y="327" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">SQL:2016</text>
  <text x="370" y="327" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">JSON 함수, MATCH_RECOGNIZE, 행 패턴</text>
  <text x="680" y="327" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">★★★☆☆</text>

  <rect x="60" y="336" width="760" height="26" fill="#0f1a24" stroke="#2a3a4e" stroke-width="0.5"/>
  <text x="130" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">SQL:2023</text>
  <text x="370" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Property Graph, JSON 확장, CALL</text>
  <text x="680" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">★★★☆☆</text>

  <text x="440" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">각 DBMS는 표준을 선택적으로 구현 — 방언(Dialect) 차이가 발생하는 이유</text>
</svg>
