<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 600"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="600" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">SQL 표준의 역사 — 1970 → 2023</text>

  <!-- Timeline vertical line -->
  <line x1="440" y1="80" x2="440" y2="548" stroke="#2a2a2a" stroke-width="2"/>

  <!-- ── Event 1: 1970 ── -->
  <circle cx="440" cy="100" r="9" fill="#7777cc" stroke="#0a0a0a" stroke-width="2"/>
  <text x="422" y="104" text-anchor="end" font-size="13" font-weight="700" fill="#7777cc">1970</text>
  <text x="458" y="96" font-size="13" font-weight="600" fill="#e8e8e8">코드(Codd) 논문 발표</text>
  <text x="458" y="112" font-size="11" fill="#888">관계형 모델 이론 최초 제안 (IBM 연구 저널)</text>

  <!-- ── Event 2: 1974 ── -->
  <circle cx="440" cy="160" r="7" fill="#444" stroke="#666" stroke-width="1.5"/>
  <text x="422" y="164" text-anchor="end" font-size="12" fill="#888">1974</text>
  <text x="458" y="156" font-size="12" fill="#ccc">SEQUEL 개발 (IBM System R)</text>
  <text x="458" y="172" font-size="11" fill="#555">후에 SQL로 이름 변경 — 상표권 문제로</text>

  <!-- ── Event 3: 1979 ── -->
  <circle cx="440" cy="220" r="7" fill="#444" stroke="#666" stroke-width="1.5"/>
  <text x="422" y="224" text-anchor="end" font-size="12" fill="#888">1979</text>
  <text x="458" y="216" font-size="12" fill="#ccc">Oracle v2 — 최초 상업용 RDBMS 출시</text>
  <text x="458" y="232" font-size="11" fill="#555">SQL을 탑재한 첫 상용 제품</text>

  <!-- ── Event 4: 1986 ── -->
  <circle cx="440" cy="280" r="10" fill="#55c555" stroke="#0a0a0a" stroke-width="2"/>
  <text x="422" y="284" text-anchor="end" font-size="13" font-weight="700" fill="#55c555">1986</text>
  <text x="458" y="276" font-size="13" font-weight="600" fill="#e8e8e8">SQL-86 — ANSI 최초 표준 제정</text>
  <text x="458" y="292" font-size="11" fill="#888">이듬해 ISO 채택 (SQL-87). 기본 DML/DDL 정의</text>

  <!-- ── Event 5: 1992 ── -->
  <circle cx="440" cy="348" r="10" fill="#55c555" stroke="#0a0a0a" stroke-width="2"/>
  <text x="422" y="352" text-anchor="end" font-size="13" font-weight="700" fill="#55c555">1992</text>
  <text x="458" y="344" font-size="13" font-weight="600" fill="#e8e8e8">SQL-92 (SQL2) — 대폭 확장</text>
  <text x="458" y="360" font-size="11" fill="#888">OUTER JOIN, CASE, 동적 SQL, 서브쿼리 강화</text>

  <!-- ── Event 6: 1999 ── -->
  <circle cx="440" cy="410" r="10" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="2"/>
  <text x="422" y="414" text-anchor="end" font-size="13" font-weight="700" fill="#7ec8e3">1999</text>
  <text x="458" y="406" font-size="13" font-weight="600" fill="#e8e8e8">SQL:1999 (SQL3) — 객체·재귀</text>
  <text x="458" y="422" font-size="11" fill="#888">재귀 CTE, 트리거, OLAP 함수(ROLLUP/CUBE)</text>

  <!-- ── Event 7: 2003 ── -->
  <circle cx="440" cy="464" r="9" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="1.5"/>
  <text x="422" y="468" text-anchor="end" font-size="12" font-weight="600" fill="#7ec8e3">2003</text>
  <text x="458" y="460" font-size="12" font-weight="600" fill="#e8e8e8">SQL:2003 — 윈도우 함수 완성</text>
  <text x="458" y="476" font-size="11" fill="#888">ROW_NUMBER, RANK, MERGE, 생성 컬럼</text>

  <!-- ── Event 8: 2023 ── -->
  <circle cx="440" cy="524" r="10" fill="#e8c555" stroke="#0a0a0a" stroke-width="2"/>
  <text x="422" y="528" text-anchor="end" font-size="13" font-weight="700" fill="#e8c555">2023</text>
  <text x="458" y="520" font-size="13" font-weight="600" fill="#e8e8e8">SQL:2023 — 그래프·JSON 완성</text>
  <text x="458" y="536" font-size="11" fill="#888">속성 그래프 쿼리, UUID 함수, 고급 수학 함수</text>

  <!-- Footer -->
  <text x="440" y="570" text-anchor="middle" font-size="11" fill="#444">PALDYN · SQL 완전 정복 · Part I · Chapter 1</text>
</svg>
