<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">타입 단언 vs 타입 가드</text>

  <!-- Left: Type Assertion (unsafe) -->
  <text x="220" y="76" text-anchor="middle" font-size="14" font-weight="600" fill="#e05555">타입 단언 — 강제 선언 (위험)</text>
  <rect x="60" y="88" width="360" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="108" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// 개발자가 타입을 "강제 선언"</text>
  <text x="76" y="128" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// 런타임 검사 없음</text>
  <text x="76" y="148" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">function</text>
  <text x="148" y="148" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> processData(val: </text>
  <text x="298" y="148" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">unknown</text>
  <text x="356" y="148" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">) {</text>
  <text x="76" y="168" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  const</text>
  <text x="118" y="168" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> s = val </text>
  <text x="166" y="168" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">as string</text>
  <text x="234" y="168" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">;</text>
  <text x="76" y="188" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  s.toUpperCase(); </text>
  <text x="76" y="208" font-size="13" fill="#e05555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  // val이 42이면 런타임 에러!</text>
  <text x="76" y="228" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">}</text>
  <text x="76" y="260" font-size="13" fill="#e05555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// 컴파일 OK, 런타임에서 TypeError 가능</text>
  <text x="76" y="278" font-size="13" fill="#e05555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// TypeScript가 신뢰하지만 실제로는 틀릴 수 있음</text>

  <!-- Right: Type Guard (safe) -->
  <text x="660" y="76" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">타입 가드 — 런타임 검사 (안전)</text>
  <rect x="480" y="88" width="360" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="108" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// 런타임에 실제로 타입 확인</text>
  <text x="496" y="128" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// 타입 오류 발생 불가</text>
  <text x="496" y="148" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">function</text>
  <text x="568" y="148" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> processData(val: </text>
  <text x="718" y="148" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">unknown</text>
  <text x="776" y="148" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">) {</text>
  <text x="496" y="168" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  if</text>
  <text x="520" y="168" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> (</text>
  <text x="534" y="168" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">typeof</text>
  <text x="584" y="168" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> val === </text>
  <text x="638" y="168" font-size="13" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">"string"</text>
  <text x="698" y="168" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">) {</text>
  <text x="496" y="188" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    val.toUpperCase(); </text>
  <text x="496" y="208" font-size="13" fill="#55c555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    // 완전히 안전</text>
  <text x="496" y="228" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  }</text>
  <text x="496" y="248" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">}</text>
  <text x="496" y="270" font-size="13" fill="#55c555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// 런타임 + 컴파일 모두 안전</text>
  <text x="496" y="288" font-size="13" fill="#55c555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// 항상 타입 가드를 먼저 검토</text>

  <!-- Bottom summary -->
  <rect x="60" y="318" width="760" height="118" rx="8" fill="#0a0d14" stroke="#3178c6" stroke-width="1.5"/>
  <text x="440" y="342" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">선택 기준</text>
  <text x="440" y="366" text-anchor="middle" font-size="13" fill="#aaa">타입 가드(typeof, instanceof, in)로 해결 가능하면 → 타입 가드 사용 (런타임 안전)</text>
  <text x="440" y="388" text-anchor="middle" font-size="13" fill="#aaa">DOM API처럼 반환 타입이 넓게 정의된 경우 → as 단언 허용</text>
  <text x="440" y="408" text-anchor="middle" font-size="13" fill="#aaa">타입 에러를 무력화하려는 목적 → 절대 사용 금지</text>
  <text x="440" y="428" text-anchor="middle" font-size="12" fill="#7ec8e3">as any는 타입 시스템 전체를 무력화 — 사용 시 코드 리뷰 필요</text>
</svg>
