<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="50" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">보안 마인드셋</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">개발자 vs 보안 전문가 시각 비교</text>

  <!-- Dev mindset -->
  <rect x="60" y="100" width="350" height="340" rx="10" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="235" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">일반 개발자 시각</text>
  <text x="235" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">"어떻게 작동하게 만들까?"</text>

  <rect x="80" y="168" width="310" height="38" rx="6" fill="#12121a" stroke="#444" stroke-width="1"/>
  <text x="235" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">정상적인 사용자 흐름에 집중</text>

  <rect x="80" y="216" width="310" height="38" rx="6" fill="#12121a" stroke="#444" stroke-width="1"/>
  <text x="235" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">기능 완성이 최우선</text>

  <rect x="80" y="264" width="310" height="38" rx="6" fill="#12121a" stroke="#444" stroke-width="1"/>
  <text x="235" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">오류는 예외 처리로 해결</text>

  <rect x="80" y="312" width="310" height="38" rx="6" fill="#12121a" stroke="#444" stroke-width="1"/>
  <text x="235" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">보안은 "나중에" 추가</text>

  <rect x="80" y="360" width="310" height="38" rx="6" fill="#12121a" stroke="#444" stroke-width="1"/>
  <text x="235" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">사용자는 선의로 사용</text>

  <!-- Security mindset -->
  <rect x="470" y="100" width="350" height="340" rx="10" fill="#0d1a2a" stroke="#e05555" stroke-width="2"/>
  <text x="645" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">보안 마인드셋</text>
  <text x="645" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">"어떻게 악용될 수 있을까?"</text>

  <rect x="490" y="168" width="310" height="38" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="645" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">악의적 입력·경계 케이스 탐색</text>

  <rect x="490" y="216" width="310" height="38" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="645" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">기능 완성 + 보안이 동시 목표</text>

  <rect x="490" y="264" width="310" height="38" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="645" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">오류는 정보 유출 벡터</text>

  <rect x="490" y="312" width="310" height="38" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="645" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">보안은 설계 초기부터</text>

  <rect x="490" y="360" width="310" height="38" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="645" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">모든 입력은 잠재적 공격</text>

  <!-- Center arrow -->
  <text x="440" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="26" font-weight="700" fill="#55c555" text-anchor="middle">→</text>
  <text x="440" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">전환</text>

  <!-- Bottom -->
  <rect x="60" y="456" width="760" height="16" rx="4" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="469" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">보안 마인드셋은 타고나는 것이 아니라 습관으로 키우는 것이다</text>
</svg>
