<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">GPG 서명 설정 흐름</text>

  <defs>
    <marker id="arrgpg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Step 1 -->
  <rect x="60" y="80" width="180" height="70" rx="8" fill="#111122" stroke="#7777cc" stroke-width="2"/>
  <text x="150" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">1. GPG 키 생성</text>
  <text x="150" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">gpg --full-generate-key</text>
  <text x="150" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666">RSA 4096 권장</text>

  <line x1="240" y1="115" x2="290" y2="115" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrgpg)"/>

  <!-- Step 2 -->
  <rect x="290" y="80" width="180" height="70" rx="8" fill="#111122" stroke="#7ec8e3" stroke-width="2"/>
  <text x="380" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">2. 키 ID 확인</text>
  <text x="380" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">gpg --list-secret-keys</text>
  <text x="380" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666">긴 키 ID 복사</text>

  <line x1="470" y1="115" x2="520" y2="115" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrgpg)"/>

  <!-- Step 3 -->
  <rect x="520" y="80" width="180" height="70" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="610" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">3. Git 설정</text>
  <text x="610" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">user.signingkey 설정</text>
  <text x="610" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666">commit.gpgsign = true</text>

  <line x1="700" y1="115" x2="750" y2="115" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrgpg)"/>

  <!-- Step 4 -->
  <rect x="750" y="80" width="70" height="70" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="785" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#55c555">4. 완료</text>
  <text x="785" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">git commit</text>
  <text x="785" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">자동 서명</text>

  <!-- Code box -->
  <rect x="60" y="180" width="760" height="250" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 1. GPG 키 생성 (대화형)</text>
  <text xml:space="preserve" x="80" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">gpg</text><text xml:space="preserve" x="108" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> --full-generate-key</text>

  <text xml:space="preserve" x="80" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 2. 생성된 키 ID 확인 (--keyid-format LONG)</text>
  <text xml:space="preserve" x="80" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">gpg</text><text xml:space="preserve" x="108" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> --list-secret-keys --keyid-format LONG</text>
  <text xml:space="preserve" x="80" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8"># sec   rsa4096/3AA5C34371567BD2 2024-01-01</text>

  <text xml:space="preserve" x="80" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 3. Git 에 서명 키 등록</text>
  <text xml:space="preserve" x="80" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">git config</text><text xml:space="preserve" x="178" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> --global user.signingkey 3AA5C34371567BD2</text>
  <text xml:space="preserve" x="80" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">git config</text><text xml:space="preserve" x="178" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> --global commit.gpgsign true</text>

  <text xml:space="preserve" x="80" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 4. GitHub 에 공개키 등록 (공개키 내보내기)</text>
  <text xml:space="preserve" x="80" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">gpg</text><text xml:space="preserve" x="108" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> --armor --export 3AA5C34371567BD2</text>
  <text xml:space="preserve" x="80" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 출력을 복사해 GitHub Settings &gt; SSH and GPG keys 에 붙여넣기</text>
</svg>
