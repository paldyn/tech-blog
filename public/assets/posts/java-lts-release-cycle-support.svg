<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <!-- Background -->
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">LTS vs 일반 릴리즈 — 지원 기간 비교</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">Oracle 유료 지원 / OpenJDK 커뮤니티 지원 / 일반 릴리즈</text>

  <!-- ──── Row Labels ──── -->
  <!-- Row 1: 일반 릴리즈 (non-LTS) -->
  <text x="180" y="120" text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">일반 릴리즈</text>
  <!-- Row 2: OpenJDK LTS -->
  <text x="180" y="190" text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">LTS (OpenJDK)</text>
  <!-- Row 3: Oracle JDK LTS -->
  <text x="180" y="260" text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">LTS (Oracle)</text>
  <!-- Row 4: Adoptium / Vendors -->
  <text x="180" y="330" text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">LTS (벤더)</text>

  <!-- ──── Scale: 0 ~ 8 years (x=200 to x=820, total=620px, 1yr=77.5px) ──── -->
  <!-- Grid lines + year labels -->
  <!-- 0yr -->
  <line x1="200" y1="90" x2="200" y2="360" stroke="#1e1e1e" stroke-width="1"/>
  <text x="200" y="380" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">0y</text>

  <!-- 1yr x=277.5 -->
  <line x1="278" y1="90" x2="278" y2="360" stroke="#1a1a1a" stroke-width="1"/>
  <text x="278" y="380" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#444">1y</text>

  <!-- 2yr x=355 -->
  <line x1="355" y1="90" x2="355" y2="360" stroke="#1a1a1a" stroke-width="1"/>
  <text x="355" y="380" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#444">2y</text>

  <!-- 3yr x=432 -->
  <line x1="432" y1="90" x2="432" y2="360" stroke="#1a1a1a" stroke-width="1"/>
  <text x="432" y="380" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#444">3y</text>

  <!-- 4yr x=510 -->
  <line x1="510" y1="90" x2="510" y2="360" stroke="#1a1a1a" stroke-width="1"/>
  <text x="510" y="380" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#444">4y</text>

  <!-- 6yr x=665 -->
  <line x1="665" y1="90" x2="665" y2="360" stroke="#1a1a1a" stroke-width="1"/>
  <text x="665" y="380" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#444">6y</text>

  <!-- 8yr x=820 -->
  <line x1="820" y1="90" x2="820" y2="360" stroke="#1a1a1a" stroke-width="1"/>
  <text x="820" y="380" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#444">8y</text>

  <!-- ──── Row 1: 일반 릴리즈 — 6개월 (6/12 yr = ~38.75px) ──── -->
  <!-- 6개월 = 0.5yr = 38.75px -->
  <rect x="200" y="104" width="39" height="30" rx="4" fill="#2a2020" stroke="#553030" stroke-width="1"/>
  <text x="220" y="123" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aa7777">6개월</text>

  <!-- ──── Row 2: OpenJDK LTS — ~3년 (3yr = 232.5px) ──── -->
  <rect x="200" y="174" width="233" height="30" rx="4" fill="#0c2430" stroke="#1e4a60" stroke-width="1"/>
  <text x="316" y="193" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">~3년 (커뮤니티 지원)</text>

  <!-- ──── Row 3: Oracle JDK LTS — 8년 (8yr = 620px) ──── -->
  <!-- Primary: 5년 (5yr = 387.5px) -->
  <rect x="200" y="244" width="388" height="30" rx="4" fill="#0c2840" stroke="#1e5080" stroke-width="1"/>
  <text x="394" y="263" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">Premier (5년)</text>
  <!-- Extended: 추가 3년 (3yr = 232.5px) -->
  <rect x="588" y="244" width="232" height="30" rx="4" fill="#0a1e34" stroke="#1a3a60" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="704" y="263" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#4a8aaa">Extended (3년)</text>

  <!-- ──── Row 4: Vendors (Temurin/Corretto/etc) — 4~8년 ──── -->
  <!-- 벤더마다 다르지만 최소 4년 보장 -->
  <rect x="200" y="314" width="465" height="30" rx="4" fill="#102010" stroke="#204020" stroke-width="1"/>
  <text x="432" y="333" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">벤더별 4~6년 (Temurin / Corretto / Zulu 등)</text>

  <!-- Axis label -->
  <text x="510" y="398" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">← 릴리즈 후 경과 연수 →</text>

  <!-- Summary box -->
  <rect x="60" y="415" width="760" height="28" rx="5" fill="#0c1414" stroke="#1e2a20" stroke-width="1"/>
  <text x="440" y="433" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">결론: 프로덕션에서는 <tspan fill="#7ec8e3">LTS 버전</tspan>을 사용하고, Oracle 무료 범위(1년)가 지나면 <tspan fill="#55c555">벤더 배포판(Temurin, Corretto)</tspan>으로 전환</text>

  <!-- Footer -->
  <text x="440" y="452" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#444">PALDYN — Java 완전 정복</text>
</svg>
