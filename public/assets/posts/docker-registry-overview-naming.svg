<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">
    이미지 이름 구조 해석
  </text>

  <!-- Full image reference breakdown -->
  <!-- Full name -->
  <rect x="60" y="68" width="760" height="48" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="98" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="16" fill="#ffffff" text-anchor="middle">ghcr.io/myorg/myapp:v1.2.3</text>

  <!-- Breakdown arrows and labels -->
  <!-- Registry -->
  <line x1="175" y1="116" x2="175" y2="140" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4"/>
  <rect x="80" y="142" width="190" height="48" rx="4" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="175" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle" font-weight="600">Registry Host</text>
  <text x="175" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" text-anchor="middle">ghcr.io</text>

  <!-- Namespace/Org -->
  <line x1="345" y1="116" x2="345" y2="140" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <rect x="280" y="142" width="130" height="48" rx="4" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="345" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle" font-weight="600">Namespace</text>
  <text x="345" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" text-anchor="middle">myorg</text>

  <!-- Image name -->
  <line x1="505" y1="116" x2="505" y2="140" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4"/>
  <rect x="430" y="142" width="150" height="48" rx="4" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="505" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle" font-weight="600">Repository</text>
  <text x="505" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" text-anchor="middle">myapp</text>

  <!-- Tag -->
  <line x1="705" y1="116" x2="705" y2="140" stroke="#e8a020" stroke-width="1.5" stroke-dasharray="4,4"/>
  <rect x="620" y="142" width="160" height="48" rx="4" fill="#1a1a0a" stroke="#e8a020" stroke-width="1"/>
  <text x="700" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8a020" text-anchor="middle" font-weight="600">Tag</text>
  <text x="700" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" text-anchor="middle">v1.2.3</text>

  <!-- Default values note -->
  <rect x="60" y="212" width="760" height="120" rx="6" fill="#0a0a1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Registry 생략 시 기본값</text>

  <text x="80" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">nginx           </text>
  <text x="290" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">→ docker.io/library/nginx:latest</text>

  <text x="80" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">myorg/myapp     </text>
  <text x="290" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">→ docker.io/myorg/myapp:latest</text>

  <text x="80" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">myapp:v2        </text>
  <text x="290" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">→ docker.io/library/myapp:v2</text>

  <text x="80" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">레지스트리가 없으면 docker.io, 네임스페이스가 없으면 library, 태그가 없으면 :latest</text>
</svg>
