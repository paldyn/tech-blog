<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420" style="background:#0a0a0a;border-radius:12px;">
  <defs>
    <marker id="arr" markerWidth="18" markerHeight="14" refX="16" refY="7" orient="auto">
      <polygon points="0 0,18 7,0 14" fill="#4a5a6a" stroke="none"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" xml:space="preserve">NetworkManager 구성 요소</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" xml:space="preserve">데몬 · 플러그인 · 클라이언트 · 설정 파일 관계</text>
  <line x1="60" y1="86" x2="820" y2="86" stroke="#3a4a6e" stroke-width="1"/>

  <!-- NetworkManager daemon (center top) -->
  <rect x="300" y="100" width="280" height="64" rx="10" fill="#12192a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3" xml:space="preserve">NetworkManager</text>
  <text x="440" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" xml:space="preserve">systemd 서비스 · D-Bus 기반</text>

  <!-- Clients (left column) -->
  <rect x="60" y="220" width="160" height="50" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="140" y="241" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" xml:space="preserve">nmcli</text>
  <text x="140" y="259" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">CLI 클라이언트</text>

  <rect x="60" y="290" width="160" height="50" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="140" y="311" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" xml:space="preserve">nmtui</text>
  <text x="140" y="329" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">TUI 클라이언트</text>

  <rect x="60" y="360" width="160" height="50" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="140" y="381" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" xml:space="preserve">nm-applet</text>
  <text x="140" y="399" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">GUI 트레이 아이콘</text>

  <!-- Arrows: clients → daemon -->
  <line x1="220" y1="245" x2="298" y2="155" stroke="#4a5a6a" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="220" y1="315" x2="298" y2="155" stroke="#4a5a6a" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="220" y1="385" x2="298" y2="164" stroke="#4a5a6a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Right: config files -->
  <rect x="660" y="220" width="160" height="50" rx="8" fill="#0d1520" stroke="#55c555" stroke-width="1.5"/>
  <text x="740" y="241" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" xml:space="preserve">/etc/NetworkManager/</text>
  <text x="740" y="259" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">설정 디렉터리</text>

  <rect x="660" y="290" width="160" height="50" rx="8" fill="#0d1520" stroke="#55c555" stroke-width="1.5"/>
  <text x="740" y="311" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" xml:space="preserve">system-connections/</text>
  <text x="740" y="329" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">연결 프로파일 (keyfile)</text>

  <rect x="660" y="360" width="160" height="50" rx="8" fill="#0d1520" stroke="#55c555" stroke-width="1.5"/>
  <text x="740" y="381" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" xml:space="preserve">NetworkManager.conf</text>
  <text x="740" y="399" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">전역 설정</text>

  <!-- Arrows: daemon ↔ config -->
  <line x1="582" y1="155" x2="658" y2="245" stroke="#4a5a6a" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="582" y1="155" x2="658" y2="315" stroke="#4a5a6a" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="582" y1="164" x2="658" y2="385" stroke="#4a5a6a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Client label -->
  <text x="140" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" xml:space="preserve">클라이언트 (D-Bus)</text>

  <!-- Config label -->
  <text x="740" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" xml:space="preserve">설정 파일</text>
</svg>
