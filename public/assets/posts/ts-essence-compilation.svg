<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380" style="background:#0a0a0a">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">TypeScript 컴파일 흐름</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888" text-anchor="middle">.ts 소스 → 타입 검사 → .js 출력 → 실행</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="fl" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Step 1: .ts 파일 -->
  <rect x="60" y="110" width="160" height="120" rx="10" fill="#0d0d1a" stroke="#6a4a9e" stroke-width="1.5"/>
  <text x="140" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" font-weight="700" fill="#7777cc" text-anchor="middle">.ts</text>
  <text x="140" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">TypeScript</text>
  <text x="140" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">소스 파일</text>
  <text x="140" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">타입 어노테이션 포함</text>

  <!-- Arrow 1 -->
  <line x1="220" y1="170" x2="284" y2="170" stroke="#7ec8e3" stroke-width="2" marker-end="url(#fl)"/>

  <!-- Step 2: tsc 컴파일러 -->
  <rect x="286" y="110" width="160" height="120" rx="10" fill="#0d1a0d" stroke="#3a8e3a" stroke-width="1.5"/>
  <text x="366" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555" text-anchor="middle">tsc</text>
  <text x="366" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">TypeScript</text>
  <text x="366" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">컴파일러</text>
  <text x="366" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">&#x2713; 타입 검사 수행</text>
  <text x="366" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">&#x2713; 오류 즉시 보고</text>

  <!-- Arrow 2 -->
  <line x1="446" y1="170" x2="510" y2="170" stroke="#7ec8e3" stroke-width="2" marker-end="url(#fl)"/>

  <!-- Step 3: .js 출력 -->
  <rect x="512" y="110" width="160" height="120" rx="10" fill="#1a1500" stroke="#8e7a3a" stroke-width="1.5"/>
  <text x="592" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" font-weight="700" fill="#b5cea8" text-anchor="middle">.js</text>
  <text x="592" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">JavaScript</text>
  <text x="592" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">출력 파일</text>
  <text x="592" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">타입 정보 제거됨</text>

  <!-- Arrow 3 -->
  <line x1="672" y1="170" x2="736" y2="170" stroke="#7ec8e3" stroke-width="2" marker-end="url(#fl)"/>

  <!-- Step 4: 실행 환경 -->
  <rect x="738" y="110" width="102" height="120" rx="10" fill="#1a0d0d" stroke="#8e3a3a" stroke-width="1.5"/>
  <text x="789" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">실행</text>
  <text x="789" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Node.js</text>
  <text x="789" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">또는</text>
  <text x="789" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">브라우저</text>

  <!-- Type error box (below tsc) -->
  <rect x="286" y="266" width="160" height="70" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="366" y="291" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">타입 오류 발견 시</text>
  <text x="366" y="309" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">컴파일 중단</text>
  <text x="366" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">오류 메시지 출력</text>

  <!-- Dashed arrow: tsc to error -->
  <defs>
    <marker id="flerr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <line x1="366" y1="230" x2="366" y2="258" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#flerr)"/>

  <!-- Step numbers -->
  <text x="140" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">① 작성</text>
  <text x="366" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">② 컴파일</text>
  <text x="592" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">③ 출력</text>
  <text x="789" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">④ 실행</text>
</svg>
