<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">heapq — 최소 힙 구조</text>

  <!-- Heap tree -->
  <!-- Root -->
  <circle cx="440" cy="108" r="30" fill="#0d1926" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="115" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="18" font-weight="700" fill="#7ec8e3">1</text>
  <text x="440" y="78" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">heap[0] = 최솟값</text>

  <!-- Level 2 -->
  <line x1="416" y1="133" x2="290" y2="175" stroke="#1e2433" stroke-width="1.5"/>
  <line x1="464" y1="133" x2="590" y2="175" stroke="#1e2433" stroke-width="1.5"/>
  <circle cx="280" cy="194" r="28" fill="#131825" stroke="#1e2433" stroke-width="1.5"/>
  <text x="280" y="201" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" fill="#e8e8e8">3</text>
  <circle cx="600" cy="194" r="28" fill="#131825" stroke="#1e2433" stroke-width="1.5"/>
  <text x="600" y="201" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" fill="#e8e8e8">2</text>

  <!-- Level 3 -->
  <line x1="258" y1="218" x2="180" y2="260" stroke="#1e2433" stroke-width="1.5"/>
  <line x1="302" y1="218" x2="370" y2="260" stroke="#1e2433" stroke-width="1.5"/>
  <line x1="578" y1="218" x2="510" y2="260" stroke="#1e2433" stroke-width="1.5"/>
  <line x1="622" y1="218" x2="700" y2="260" stroke="#1e2433" stroke-width="1.5"/>
  <circle cx="170" cy="278" r="26" fill="#131825" stroke="#1e2433"/>
  <text x="170" y="285" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e8e8e8">7</text>
  <circle cx="380" cy="278" r="26" fill="#131825" stroke="#1e2433"/>
  <text x="380" y="285" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e8e8e8">5</text>
  <circle cx="500" cy="278" r="26" fill="#131825" stroke="#1e2433"/>
  <text x="500" y="285" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e8e8e8">4</text>
  <circle cx="710" cy="278" r="26" fill="#131825" stroke="#1e2433"/>
  <text x="710" y="285" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e8e8e8">9</text>

  <!-- Array representation -->
  <text x="440" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">리스트 표현: heap[i]의 자식은 heap[2i+1], heap[2i+2]</text>
  <rect x="160" y="348" width="560" height="40" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="170" y="373" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">인덱스:  <tspan fill="#b5cea8"> 0    1    2    3    4    5    6</tspan></text>
  <text x="170" y="395" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">값:     <tspan fill="#7ec8e3"> 1</tspan><tspan fill="#e8e8e8">    3    2    7    5    4    9</tspan></text>

  <!-- Property label -->
  <text x="440" y="416" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">힙 불변성(Heap Invariant): 부모 ≤ 자식 — 항상 heap[0]이 최솟값</text>
</svg>
