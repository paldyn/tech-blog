<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <!-- Title -->
    <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">이진 트리 종류</text>
    <text x="440" y="70" font-size="14" fill="#888" text-anchor="middle">완전·포화·완벽·편향 이진 트리의 정의와 차이</text>

    <!-- Dividers -->
    <line x1="220" y1="82" x2="220" y2="440" stroke="#2a3a5e" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="440" y1="82" x2="440" y2="440" stroke="#2a3a5e" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="660" y1="82" x2="660" y2="440" stroke="#2a3a5e" stroke-width="1" stroke-dasharray="4,4"/>

    <!-- Column titles -->
    <text x="110" y="100" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">완전 이진 트리</text>
    <text x="330" y="100" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">포화 이진 트리</text>
    <text x="550" y="100" font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">완벽 이진 트리</text>
    <text x="770" y="100" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">편향 이진 트리</text>

    <!-- Complete Binary Tree -->
    <circle cx="110" cy="148" r="18" fill="#1a2544" stroke="#7ec8e3" stroke-width="2"/>
    <text x="110" y="153" font-size="12" fill="#7ec8e3" text-anchor="middle">1</text>
    <circle cx="62" cy="208" r="18" fill="#1a2544" stroke="#7ec8e3" stroke-width="1.5"/>
    <text x="62" y="213" font-size="12" fill="#e8e8e8" text-anchor="middle">2</text>
    <circle cx="158" cy="208" r="18" fill="#1a2544" stroke="#7ec8e3" stroke-width="1.5"/>
    <text x="158" y="213" font-size="12" fill="#e8e8e8" text-anchor="middle">3</text>
    <circle cx="38" cy="268" r="18" fill="#1a2544" stroke="#7ec8e3" stroke-width="1.5"/>
    <text x="38" y="273" font-size="12" fill="#e8e8e8" text-anchor="middle">4</text>
    <circle cx="86" cy="268" r="18" fill="#1a2544" stroke="#7ec8e3" stroke-width="1.5"/>
    <text x="86" y="273" font-size="12" fill="#e8e8e8" text-anchor="middle">5</text>
    <!-- 6 filled left to right -->
    <circle cx="134" cy="268" r="18" fill="#1a2544" stroke="#7ec8e3" stroke-width="1.5"/>
    <text x="134" y="273" font-size="12" fill="#e8e8e8" text-anchor="middle">6</text>
    <!-- 7 missing (rightmost) is OK for complete -->
    <line x1="97" y1="163" x2="73" y2="192" stroke="#3a4a6e" stroke-width="2"/>
    <line x1="123" y1="163" x2="147" y2="192" stroke="#3a4a6e" stroke-width="2"/>
    <line x1="50" y1="223" x2="43" y2="252" stroke="#3a4a6e" stroke-width="2"/>
    <line x1="74" y1="223" x2="81" y2="252" stroke="#3a4a6e" stroke-width="2"/>
    <line x1="146" y1="223" x2="139" y2="252" stroke="#3a4a6e" stroke-width="2"/>

    <text x="110" y="310" font-size="11" fill="#888" text-anchor="middle">마지막 레벨 제외</text>
    <text x="110" y="326" font-size="11" fill="#888" text-anchor="middle">모든 레벨 꽉 참</text>
    <text x="110" y="342" font-size="11" fill="#7ec8e3" text-anchor="middle">힙(Heap) = 완전 이진 트리</text>

    <!-- Full Binary Tree -->
    <circle cx="330" cy="148" r="18" fill="#1a3a1e" stroke="#55c555" stroke-width="2"/>
    <text x="330" y="153" font-size="12" fill="#55c555" text-anchor="middle">1</text>
    <circle cx="282" cy="208" r="18" fill="#1a3a1e" stroke="#55c555" stroke-width="1.5"/>
    <text x="282" y="213" font-size="12" fill="#e8e8e8" text-anchor="middle">2</text>
    <circle cx="378" cy="208" r="18" fill="#1a3a1e" stroke="#55c555" stroke-width="1.5"/>
    <text x="378" y="213" font-size="12" fill="#e8e8e8" text-anchor="middle">3</text>
    <!-- leaf nodes for 2 -->
    <circle cx="258" cy="268" r="18" fill="#1a3a1e" stroke="#55c555" stroke-width="1.5"/>
    <text x="258" y="273" font-size="12" fill="#e8e8e8" text-anchor="middle">4</text>
    <circle cx="306" cy="268" r="18" fill="#1a3a1e" stroke="#55c555" stroke-width="1.5"/>
    <text x="306" y="273" font-size="12" fill="#e8e8e8" text-anchor="middle">5</text>
    <!-- 3 has no children to show "full" = each node has 0 or 2 children -->
    <line x1="317" y1="163" x2="293" y2="192" stroke="#2a4a2e" stroke-width="2"/>
    <line x1="343" y1="163" x2="367" y2="192" stroke="#2a4a2e" stroke-width="2"/>
    <line x1="270" y1="223" x2="263" y2="252" stroke="#2a4a2e" stroke-width="2"/>
    <line x1="294" y1="223" x2="301" y2="252" stroke="#2a4a2e" stroke-width="2"/>

    <text x="330" y="310" font-size="11" fill="#888" text-anchor="middle">각 노드가 자식을</text>
    <text x="330" y="326" font-size="11" fill="#888" text-anchor="middle">0개 또는 2개 보유</text>
    <text x="330" y="342" font-size="11" fill="#55c555" text-anchor="middle">Huffman 코드 트리</text>

    <!-- Perfect Binary Tree -->
    <circle cx="550" cy="148" r="18" fill="#2a1e10" stroke="#ce9178" stroke-width="2"/>
    <text x="550" y="153" font-size="12" fill="#ce9178" text-anchor="middle">1</text>
    <circle cx="502" cy="208" r="18" fill="#2a1e10" stroke="#ce9178" stroke-width="1.5"/>
    <text x="502" y="213" font-size="12" fill="#e8e8e8" text-anchor="middle">2</text>
    <circle cx="598" cy="208" r="18" fill="#2a1e10" stroke="#ce9178" stroke-width="1.5"/>
    <text x="598" y="213" font-size="12" fill="#e8e8e8" text-anchor="middle">3</text>
    <circle cx="478" cy="268" r="18" fill="#2a1e10" stroke="#ce9178" stroke-width="1.5"/>
    <text x="478" y="273" font-size="12" fill="#e8e8e8" text-anchor="middle">4</text>
    <circle cx="526" cy="268" r="18" fill="#2a1e10" stroke="#ce9178" stroke-width="1.5"/>
    <text x="526" y="273" font-size="12" fill="#e8e8e8" text-anchor="middle">5</text>
    <circle cx="574" cy="268" r="18" fill="#2a1e10" stroke="#ce9178" stroke-width="1.5"/>
    <text x="574" y="273" font-size="12" fill="#e8e8e8" text-anchor="middle">6</text>
    <circle cx="622" cy="268" r="18" fill="#2a1e10" stroke="#ce9178" stroke-width="1.5"/>
    <text x="622" y="273" font-size="12" fill="#e8e8e8" text-anchor="middle">7</text>
    <line x1="537" y1="163" x2="513" y2="192" stroke="#5a3a20" stroke-width="2"/>
    <line x1="563" y1="163" x2="587" y2="192" stroke="#5a3a20" stroke-width="2"/>
    <line x1="490" y1="223" x2="483" y2="252" stroke="#5a3a20" stroke-width="2"/>
    <line x1="514" y1="223" x2="521" y2="252" stroke="#5a3a20" stroke-width="2"/>
    <line x1="586" y1="223" x2="579" y2="252" stroke="#5a3a20" stroke-width="2"/>
    <line x1="610" y1="223" x2="617" y2="252" stroke="#5a3a20" stroke-width="2"/>

    <text x="550" y="310" font-size="11" fill="#888" text-anchor="middle">모든 레벨이 완전히 차고</text>
    <text x="550" y="326" font-size="11" fill="#888" text-anchor="middle">모든 리프가 같은 깊이</text>
    <text x="550" y="342" font-size="11" fill="#ce9178" text-anchor="middle">n = 2^(h+1) - 1</text>

    <!-- Skewed Binary Tree -->
    <circle cx="760" cy="148" r="18" fill="#2a1010" stroke="#e05555" stroke-width="2"/>
    <text x="760" y="153" font-size="12" fill="#e05555" text-anchor="middle">1</text>
    <circle cx="760" cy="208" r="18" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
    <text x="760" y="213" font-size="12" fill="#e8e8e8" text-anchor="middle">2</text>
    <circle cx="760" cy="268" r="18" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
    <text x="760" y="273" font-size="12" fill="#e8e8e8" text-anchor="middle">3</text>
    <circle cx="760" cy="328" r="18" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
    <text x="760" y="333" font-size="12" fill="#e8e8e8" text-anchor="middle">4</text>
    <line x1="760" y1="166" x2="760" y2="190" stroke="#5a1010" stroke-width="2"/>
    <line x1="760" y1="226" x2="760" y2="250" stroke="#5a1010" stroke-width="2"/>
    <line x1="760" y1="286" x2="760" y2="310" stroke="#5a1010" stroke-width="2"/>

    <text x="770" y="365" font-size="11" fill="#e05555" text-anchor="middle">연결 리스트와 동일</text>
    <text x="770" y="381" font-size="11" fill="#888" text-anchor="middle">높이 O(n)</text>
    <text x="770" y="397" font-size="11" fill="#888" text-anchor="middle">검색 O(n) (최악)</text>

    <!-- Bottom note -->
    <rect x="60" y="415" width="760" height="32" fill="#0f1a2e" stroke="#2a3a5e" stroke-width="1" rx="4"/>
    <text x="440" y="436" font-size="12" fill="#888" text-anchor="middle">완벽 ⊂ 완전 ⊂ 이진 트리  |  균형 트리(AVL, RB) = 편향을 방지하기 위한 자가 균형</text>
  </g>
</svg>
