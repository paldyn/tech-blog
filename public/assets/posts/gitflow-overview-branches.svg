<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-y" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8c84a"/>
    </marker>
    <marker id="arr-p" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Gitflow 브랜치 구조</text>

  <!-- Timeline axis -->
  <line x1="60" y1="80" x2="60" y2="460" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="60" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">시간 →</text>

  <!-- main branch -->
  <text x="76" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">main</text>
  <line x1="60" y1="120" x2="820" y2="120" stroke="#7ec8e3" stroke-width="3"/>
  <!-- main tags -->
  <circle cx="160" cy="120" r="7" fill="#7ec8e3"/>
  <text x="160" y="108" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3">v1.0</text>
  <circle cx="560" cy="120" r="7" fill="#7ec8e3"/>
  <text x="560" y="108" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3">v1.1</text>
  <circle cx="760" cy="120" r="7" fill="#e05555"/>
  <text x="760" y="108" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#e05555">v1.1.1</text>

  <!-- develop branch -->
  <text x="76" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">develop</text>
  <line x1="160" y1="190" x2="820" y2="190" stroke="#55c555" stroke-width="2.5"/>
  <!-- develop start from main -->
  <line x1="160" y1="120" x2="160" y2="190" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- feature branch -->
  <text x="220" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">feature/login</text>
  <line x1="240" y1="270" x2="400" y2="270" stroke="#7777cc" stroke-width="2"/>
  <!-- feature fork/merge -->
  <line x1="240" y1="190" x2="240" y2="270" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-p)"/>
  <line x1="400" y1="270" x2="400" y2="190" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-g)"/>

  <!-- release branch -->
  <text x="435" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8c84a">release/1.1</text>
  <line x1="450" y1="350" x2="560" y2="350" stroke="#e8c84a" stroke-width="2"/>
  <line x1="450" y1="190" x2="450" y2="350" stroke="#e8c84a" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-y)"/>
  <!-- merge to main and develop -->
  <line x1="560" y1="350" x2="560" y2="190" stroke="#e8c84a" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-g)"/>
  <line x1="560" y1="350" x2="560" y2="120" stroke="#e8c84a" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <!-- hotfix branch -->
  <text x="635" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">hotfix/1.1.1</text>
  <line x1="650" y1="430" x2="760" y2="430" stroke="#e05555" stroke-width="2"/>
  <line x1="650" y1="120" x2="650" y2="430" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-r)"/>
  <!-- merge hotfix to main and develop -->
  <line x1="760" y1="430" x2="760" y2="120" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-r)"/>
  <line x1="760" y1="430" x2="760" y2="190" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <circle cx="760" cy="190" r="5" fill="#e05555"/>

  <!-- legend -->
  <rect x="60" y="460" width="760" height="30" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <circle cx="100" cy="475" r="5" fill="#7ec8e3"/>
  <text x="115" y="479" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">main</text>
  <circle cx="165" cy="475" r="5" fill="#55c555"/>
  <text x="180" y="479" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">develop</text>
  <circle cx="250" cy="475" r="5" fill="#7777cc"/>
  <text x="265" y="479" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">feature</text>
  <circle cx="340" cy="475" r="5" fill="#e8c84a"/>
  <text x="355" y="479" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8c84a">release</text>
  <circle cx="420" cy="475" r="5" fill="#e05555"/>
  <text x="435" y="479" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">hotfix</text>
</svg>
