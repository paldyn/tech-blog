<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300">
  <rect width="880" height="300" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">JaCoCo 측정 흐름</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">바이트코드 계측 → 실행 기록 → 리포트</text>

  <defs>
    <marker id="tcpArr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="40" y="130" width="190" height="80" rx="8" fill="#000000" stroke="#7777cc" stroke-width="1"/>
  <text x="135" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">계측 (Agent)</text>
  <text x="135" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">바이트코드에 프로브 삽입</text>

  <rect x="345" y="130" width="190" height="80" rx="8" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">테스트 실행</text>
  <text x="440" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">jacoco.exec 기록</text>

  <rect x="650" y="130" width="190" height="80" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="745" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8" text-anchor="middle">리포트 생성</text>
  <text x="745" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">HTML / XML</text>

  <line x1="230" y1="170" x2="345" y2="170" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#tcpArr)"/>
  <line x1="535" y1="170" x2="650" y2="170" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#tcpArr)"/>

  <text x="440" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">check 단계에서 최소 커버리지 미달 시 빌드 실패</text>
</svg>
