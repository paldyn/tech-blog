<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Dataset rowStatus 변경 추적</text>

  <!-- Column headers -->
  <!-- NORMAL -->
  <rect x="60" y="68" width="178" height="50" fill="#12213a" rx="6" stroke="#7ec8e3" stroke-width="2"/>
  <text x="149" y="88" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">NORMAL</text>
  <text x="149" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">값 = 1</text>

  <!-- INSERT -->
  <rect x="252" y="68" width="178" height="50" fill="#122a12" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="341" y="88" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">INSERT</text>
  <text x="341" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">값 = 2</text>

  <!-- UPDATE -->
  <rect x="444" y="68" width="178" height="50" fill="#1a1a35" rx="6" stroke="#7777cc" stroke-width="2"/>
  <text x="533" y="88" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">UPDATE</text>
  <text x="533" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">값 = 4</text>

  <!-- DELETE -->
  <rect x="636" y="68" width="184" height="50" fill="#2a1212" rx="6" stroke="#e05555" stroke-width="2"/>
  <text x="728" y="88" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">DELETE</text>
  <text x="728" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">값 = 8</text>

  <!-- Row 1: 도달 방법 -->
  <rect x="60" y="134" width="760" height="26" fill="#111" rx="0"/>
  <text x="440" y="152" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#666">도달 방법</text>

  <text x="149" y="186" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">서버 조회 완료</text>
  <text x="149" y="204" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">또는 savePoint()</text>

  <text x="341" y="186" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">addRow()</text>
  <text x="341" y="204" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">insertRow(idx)</text>

  <text x="533" y="186" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">setColumn(row, col, val)</text>
  <text x="533" y="204" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">기존 NORMAL 행에 값 변경</text>

  <text x="728" y="186" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">deleteRow(row)</text>
  <text x="728" y="204" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Grid에서 숨김 처리</text>

  <!-- Row 2: 변경 수 확인 메서드 -->
  <rect x="60" y="220" width="760" height="26" fill="#111" rx="0"/>
  <text x="440" y="238" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#666">변경 수 확인 메서드</text>

  <text x="149" y="268" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">(변경 없음)</text>

  <text x="341" y="268" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">getInsertRowCount()</text>

  <text x="533" y="268" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">getUpdateRowCount()</text>

  <text x="728" y="268" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">getDeleteRowCount()</text>

  <!-- Row 3: fn_save 처리 -->
  <rect x="60" y="290" width="760" height="26" fill="#111" rx="0"/>
  <text x="440" y="308" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#666">fn_save() 서버 처리</text>

  <text x="149" y="338" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">전송 제외</text>

  <text x="341" y="338" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">서버 INSERT</text>

  <text x="533" y="338" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">서버 UPDATE</text>

  <text x="728" y="338" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">서버 DELETE</text>

  <!-- Vertical column dividers -->
  <line x1="242" y1="68" x2="242" y2="360" stroke="#222" stroke-width="1"/>
  <line x1="434" y1="68" x2="434" y2="360" stroke="#222" stroke-width="1"/>
  <line x1="626" y1="68" x2="626" y2="360" stroke="#222" stroke-width="1"/>

  <!-- Bottom border -->
  <rect x="60" y="358" width="760" height="1" fill="#222"/>

  <!-- Note -->
  <text x="440" y="400"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">savePoint() 호출 시 모든 행 rowStatus → NORMAL 리셋 · savedData에 현재 상태 스냅샷 저장</text>
  <text x="440" y="422"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">getOrgColumn(row, col) — 마지막 savePoint 이후 원본값 조회</text>
</svg>
