<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arrow-blue" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14"
            refX="11" refY="5" orient="auto">
      <path d="M2,1 L11,5 L2,9 Z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrow-red" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14"
            refX="11" refY="5" orient="auto">
      <path d="M2,1 L11,5 L2,9 Z" fill="#e05555"/>
    </marker>
    <marker id="arrow-green" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14"
            refX="11" refY="5" orient="auto">
      <path d="M2,1 L11,5 L2,9 Z" fill="#55c555"/>
    </marker>
    <marker id="arrow-purple" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14"
            refX="11" refY="5" orient="auto">
      <path d="M2,1 L11,5 L2,9 Z" fill="#b07ec8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="45" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Redux 단방향 데이터 흐름</text>

  <!-- Middleware badge (top-right) -->
  <rect x="580" y="68" width="260" height="36" rx="6" fill="#1a1500" stroke="#e8c55a" stroke-width="1.5"/>
  <text x="710" y="91" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8c55a">Middleware (Redux Thunk / Saga)</text>

  <!-- ===== VIEW box (top-center) ===== -->
  <rect x="340" y="80" width="200" height="60" rx="8" fill="#0a1020" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="107" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">View</text>
  <text x="440" y="127" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">React Component</text>

  <!-- ===== ACTION box (right) ===== -->
  <rect x="640" y="200" width="180" height="60" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="730" y="227" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e05555">Action</text>
  <text x="730" y="247" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">{ type, payload }</text>

  <!-- ===== REDUCER box (bottom-center) ===== -->
  <rect x="340" y="350" width="200" height="60" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="377" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">Reducer</text>
  <text x="440" y="397" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">순수 함수 (state, action)</text>

  <!-- ===== STORE box (left) ===== -->
  <rect x="60" y="200" width="180" height="60" rx="8" fill="#1a0a1a" stroke="#b07ec8" stroke-width="2"/>
  <text x="150" y="227" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#b07ec8">Store</text>
  <text x="150" y="247" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">단일 상태 트리</text>

  <!-- Arrow 1: VIEW → ACTION (dispatch) -->
  <path d="M 540,110 C 620,110 620,220 640,230"
        fill="none" stroke="#e05555" stroke-width="2"
        marker-end="url(#arrow-red)"/>
  <text x="618" y="158"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">dispatch(action)</text>

  <!-- Arrow 2: ACTION → REDUCER -->
  <path d="M 720,260 C 720,310 620,360 540,375"
        fill="none" stroke="#55c555" stroke-width="2"
        marker-end="url(#arrow-green)"/>
  <text x="680" y="328"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">순수 계산</text>

  <!-- Arrow 3: REDUCER → STORE -->
  <path d="M 340,375 C 260,375 200,290 150,260"
        fill="none" stroke="#b07ec8" stroke-width="2"
        marker-end="url(#arrow-purple)"/>
  <text x="218" y="352"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b07ec8" text-anchor="middle">새 state 반환</text>

  <!-- Arrow 4: STORE → VIEW (subscribe) -->
  <path d="M 150,200 C 150,130 280,110 340,110"
        fill="none" stroke="#7ec8e3" stroke-width="2"
        marker-end="url(#arrow-blue)"/>
  <text x="180" y="152"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">subscribe</text>

  <!-- Center label -->
  <text x="440" y="240"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#444" text-anchor="middle">불변성 유지</text>
  <text x="440" y="256"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#333" text-anchor="middle">⟳</text>

  <!-- Bottom annotation -->
  <text x="440" y="448"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#555" text-anchor="middle">단방향 흐름: View → Action → Reducer → Store → View (무한 반복)</text>
</svg>
