<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" style="background:#0a0a0a;border-radius:12px;">
  <defs>
    <marker id="arrBlue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrGray" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888888"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">자동 refetch 트리거</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">트리거가 와도 stale일 때만 다시 가져온다</text>

  <!-- Trigger chips -->
  <rect x="60" y="110" width="250" height="54" rx="8" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="2"/>
  <text x="185" y="132" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">컴포넌트 마운트</text>
  <text x="185" y="150" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">refetchOnMount</text>

  <rect x="60" y="180" width="250" height="54" rx="8" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="2"/>
  <text x="185" y="202" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">창 포커스</text>
  <text x="185" y="220" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">refetchOnWindowFocus</text>

  <rect x="60" y="250" width="250" height="54" rx="8" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="2"/>
  <text x="185" y="272" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">네트워크 재연결</text>
  <text x="185" y="290" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">refetchOnReconnect</text>

  <rect x="60" y="320" width="250" height="54" rx="8" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="2"/>
  <text x="185" y="342" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">주기적 폴링</text>
  <text x="185" y="360" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">refetchInterval</text>

  <!-- Converging arrows -->
  <line x1="310" y1="137" x2="400" y2="210" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrBlue)"/>
  <line x1="310" y1="207" x2="400" y2="225" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrBlue)"/>
  <line x1="310" y1="277" x2="400" y2="240" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrBlue)"/>
  <line x1="310" y1="347" x2="400" y2="255" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrBlue)"/>

  <!-- Decision box -->
  <rect x="400" y="200" width="160" height="64" rx="12" fill="#1a1a00" stroke="#e8c800" stroke-width="2"/>
  <text x="480" y="226" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8c800">쿼리가 stale인가?</text>
  <text x="480" y="246" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">staleTime 기준</text>

  <!-- Yes / No branches -->
  <line x1="560" y1="216" x2="640" y2="186" stroke="#55c555" stroke-width="2" marker-end="url(#arrGreen)"/>
  <text x="596" y="180" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">예</text>
  <line x1="560" y1="248" x2="640" y2="288" stroke="#888888" stroke-width="2"
        stroke-dasharray="4,4" marker-end="url(#arrGray)"/>
  <text x="596" y="290" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">아니오</text>

  <rect x="640" y="156" width="190" height="60" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="2"/>
  <text x="735" y="180" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">refetch 실행</text>
  <text x="735" y="200" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">백그라운드 재요청</text>

  <rect x="640" y="258" width="190" height="60" rx="8" fill="#12121f" stroke="#7777cc" stroke-width="2"/>
  <text x="735" y="282" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">요청 없음</text>
  <text x="735" y="302" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">캐시 그대로 사용</text>

  <text x="440" y="408" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">staleTime을 늘리는 것이 불필요한 요청을 줄이는 가장 직접적인 방법이다</text>
</svg>
