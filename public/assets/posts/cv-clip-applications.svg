  <!-- Use case boxes -->
  <rect x="40" y="322" width="170" height="64" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="125" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">제로샷 분류</text>
  <text x="125" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
