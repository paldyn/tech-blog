  <text x="125" y="379" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">임의 클래스 분류</text>

  <rect x="220" y="322" width="170" height="64" rx="8" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="305" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">이미지-텍스트 검색</text>
  <text x="305" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">텍스트 쿼리로</text>
  <text x="305" y="379" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">이미지 검색</text>

  <rect x="400" y="322" width="170" height="64" rx="8" fill="#111" stroke="#ce9178" stroke-width="1"/>
  <text x="485" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">이미지 캡셔닝</text>
  <text x="485" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">시각 피처 + LLM</text>
  <text x="485" y="379" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">멀티모달 VLM</text>

  <rect x="580" y="322" width="260" height="64" rx="8" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="710" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">텍스트→이미지 생성</text>
  <text x="710" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">CLIP 임베딩을 확산 모델</text>
  <text x="710" y="379" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">컨디셔닝에 사용</text>
