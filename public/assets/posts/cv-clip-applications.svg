  <line x1="220" y1="235" x2="329" y2="155" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- SigLIP -->
  <rect x="660" y="200" width="180" height="70" rx="8" fill="#2a1a0a" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="750" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
