<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">CLIP 파생 응용 모델 생태계</text>

  <!-- CLIP center -->
  <rect x="330" y="80" width="220" height="70" rx="10" fill="#1a1a3e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#7777cc" text-anchor="middle">CLIP</text>
  <text x="440" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">공동 비전-언어 임베딩</text>

  <!-- DALL-E 2 -->
  <rect x="40" y="80" width="180" height="70" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">DALL-E 2</text>
  <text x="130" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">CLIP 임베딩 기반</text>
  <text x="130" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">텍스트→이미지 생성</text>
  <line x1="220" y1="115" x2="329" y2="115" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <!-- Stable Diffusion -->
  <rect x="660" y="80" width="180" height="70" rx="8" fill="#1a0f2e" stroke="#ce9178" stroke-width="1.5"/>
  <text x="750" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
