  <line x1="551" y1="115" x2="659" y2="115" stroke="#ce9178" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <!-- ALIGN (below) -->
  <rect x="40" y="200" width="180" height="70" rx="8" fill="#0f2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="130" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
