  <line x1="660" y1="235" x2="551" y2="155" stroke="#b5cea8" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- OpenCLIP -->
  <rect x="330" y="200" width="220" height="70" rx="8" fill="#1a1a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
