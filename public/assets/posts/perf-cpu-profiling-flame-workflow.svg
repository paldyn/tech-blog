<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 2 L 12 7 L 0 12 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">CPU 프로파일링 워크플로</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">재현 → 녹화 → 분석 → 수정 → 검증</text>

  <!-- Step boxes -->
  <rect x="60" y="96" width="120" height="60" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="120" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">① 재현</text>
  <text x="120" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">느린 동작 특정</text>

  <line x1="180" y1="126" x2="208" y2="126" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="210" y="96" width="120" height="60" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="270" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">② 녹화</text>
  <text x="270" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Performance 탭</text>

  <line x1="330" y1="126" x2="358" y2="126" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="360" y="96" width="120" height="60" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="420" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">③ 분석</text>
  <text x="420" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">플레임 차트</text>

  <line x1="480" y1="126" x2="508" y2="126" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="510" y="96" width="120" height="60" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="570" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">④ 수정</text>
  <text x="570" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">병목 함수 최적화</text>

  <line x1="630" y1="126" x2="658" y2="126" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="660" y="96" width="120" height="60" rx="8" fill="#0d2a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">⑤ 검증</text>
  <text x="720" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">재측정·비교</text>

  <!-- Code block: profiling -->
  <rect x="60" y="186" width="760" height="186" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// console.profile()로 코드에서 프로파일링 범위 지정</text>
  <text x="76" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">console.profile(<tspan fill="#ce9178">'정렬 성능 측정'</tspan>);</text>
  <text x="76" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">sortLargeArray(data);</text>
  <text x="76" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">console.profileEnd(<tspan fill="#ce9178">'정렬 성능 측정'</tspan>);</text>
  <text x="76" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// performance.mark / measure — 구간 마킹</text>
  <text x="76" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">performance.mark(<tspan fill="#ce9178">'sort-start'</tspan>);</text>
  <text x="76" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">sortLargeArray(data);</text>
  <text x="76" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">performance.mark(<tspan fill="#ce9178">'sort-end'</tspan>);</text>
  <text x="76" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">performance.measure(<tspan fill="#ce9178">'정렬'</tspan>, <tspan fill="#ce9178">'sort-start'</tspan>, <tspan fill="#ce9178">'sort-end'</tspan>);</text>
  <text x="76" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// → DevTools Performance 타임라인에서 녹색 마커로 표시</text>
</svg>
