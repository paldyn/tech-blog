<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="340" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">Class 객체 — 리플렉션의 관문</text>

  <defs>
    <marker id="rcArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- center Class -->
  <rect x="350" y="140" width="180" height="64" rx="8" fill="#0d1322" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="170" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">Class&lt;User&gt;</text>
  <text x="440" y="191" font-size="12" fill="#888" text-anchor="middle">타입의 메타 객체</text>

  <!-- three ways to get -->
  <rect x="60" y="86" width="240" height="44" rx="6" fill="#0f1626" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="180" y="113" font-size="13" fill="#e8e8e8" text-anchor="middle">User.class</text>
  <rect x="60" y="148" width="240" height="44" rx="6" fill="#0f1626" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="180" y="175" font-size="13" fill="#e8e8e8" text-anchor="middle">obj.getClass()</text>
  <rect x="60" y="210" width="240" height="44" rx="6" fill="#0f1626" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="180" y="237" font-size="13" fill="#e8e8e8" text-anchor="middle">Class.forName("..")</text>

  <line x1="300" y1="108" x2="352" y2="155" stroke="#7ec8e3" stroke-width="2" marker-end="url(#rcArr)"/>
  <line x1="300" y1="170" x2="348" y2="172" stroke="#7ec8e3" stroke-width="2" marker-end="url(#rcArr)"/>
  <line x1="300" y1="232" x2="352" y2="190" stroke="#7ec8e3" stroke-width="2" marker-end="url(#rcArr)"/>

  <!-- outputs -->
  <rect x="580" y="86" width="240" height="44" rx="6" fill="#102117" stroke="#55c555" stroke-width="1.5"/>
  <text x="700" y="113" font-size="13" fill="#55c555" text-anchor="middle">getDeclaredFields()</text>
  <rect x="580" y="148" width="240" height="44" rx="6" fill="#102117" stroke="#55c555" stroke-width="1.5"/>
  <text x="700" y="175" font-size="13" fill="#55c555" text-anchor="middle">getDeclaredMethods()</text>
  <rect x="580" y="210" width="240" height="44" rx="6" fill="#102117" stroke="#55c555" stroke-width="1.5"/>
  <text x="700" y="237" font-size="13" fill="#55c555" text-anchor="middle">getConstructors()</text>

  <line x1="530" y1="160" x2="578" y2="110" stroke="#55c555" stroke-width="2" marker-end="url(#rcArr)"/>
  <line x1="530" y1="172" x2="578" y2="170" stroke="#55c555" stroke-width="2" marker-end="url(#rcArr)"/>
  <line x1="530" y1="184" x2="578" y2="232" stroke="#55c555" stroke-width="2" marker-end="url(#rcArr)"/>

  <text x="440" y="300" font-size="13" fill="#9aa4b8" text-anchor="middle">Class 객체를 손에 넣으면 필드·메서드·생성자 등 모든 멤버에 접근할 수 있다</text>
</svg>
