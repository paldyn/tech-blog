<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">주요 시간 복잡도 성장률 비교</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">n이 커질수록 알고리즘 효율성의 차이가 극명해진다</text>

  <!-- Axes -->
  <line x1="80" y1="380" x2="820" y2="380" stroke="#444" stroke-width="1.5"/>
  <line x1="80" y1="100" x2="80" y2="380" stroke="#444" stroke-width="1.5"/>

  <!-- X axis labels -->
  <text x="80" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">0</text>
  <text x="200" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">2</text>
  <text x="320" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">4</text>
  <text x="440" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">6</text>
  <text x="560" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">8</text>
  <text x="680" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">10</text>
  <text x="800" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">12</text>
  <text x="450" y="425" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">입력 크기 n</text>

  <!-- Y axis label -->
  <text x="40" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle" transform="rotate(-90,40,240)">연산 횟수</text>

  <!-- O(1) line - constant at y=375 -->
  <line x1="80" y1="375" x2="820" y2="375" stroke="#55c555" stroke-width="2.5"/>
  <text x="825" y="379" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">O(1)</text>

  <!-- O(log n) - gentle curve -->
  <path d="M 80,375 C 150,360 250,345 350,335 S 550,325 820,318" stroke="#7ec8e3" stroke-width="2.5" fill="none"/>
  <text x="825" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">O(log n)</text>

  <!-- O(n) - linear -->
  <line x1="80" y1="375" x2="820" y2="155" stroke="#b5cea8" stroke-width="2.5"/>
  <text x="825" y="159" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8">O(n)</text>

  <!-- O(n log n) - slightly curved above linear -->
  <path d="M 80,375 C 200,340 400,280 600,200 S 750,150 820,130" stroke="#ce9178" stroke-width="2.5" fill="none"/>
  <text x="825" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">O(n log n)</text>

  <!-- O(n²) - steep curve -->
  <path d="M 80,375 C 150,368 250,340 350,290 S 500,210 600,140 S 700,105 820,100" stroke="#e05555" stroke-width="2.5" fill="none"/>
  <text x="733" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">O(n²)</text>

  <!-- Legend table -->
  <rect x="80" y="432" width="720" height="38" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="100" y="455" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">● O(1) 최적</text>
  <text x="200" y="455" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">● O(log n) 우수</text>
  <text x="330" y="455" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8">● O(n) 양호</text>
  <text x="440" y="455" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">● O(n log n) 보통</text>
  <text x="590" y="455" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">● O(n²) 주의</text>
</svg>
