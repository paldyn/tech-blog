<svg xmlns="http://www.w3.org/2000/svg" width="880" height="270" viewBox="0 0 880 270">
  <defs>
    <marker id="ov_arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="270" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">타입 힌트는 어떻게 동작하는가</text>

  <!-- Box 1 -->
  <rect x="60" y="90" width="220" height="120" rx="8" fill="#111418" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="132" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="15.5" font-weight="600" fill="#7ec8e3" text-anchor="middle">① 타입 힌트 작성</text>
  <text x="170" y="154" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12.5" fill="#cccccc" text-anchor="middle">x: int, -&gt; str 같은</text>
  <text x="170" y="176" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12.5" fill="#cccccc" text-anchor="middle">어노테이션을 추가</text>

  <!-- Box 2 -->
  <rect x="330" y="90" width="220" height="120" rx="8" fill="#111418" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="132" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="15.5" font-weight="600" fill="#55c555" text-anchor="middle">② 정적 검사기</text>
  <text x="440" y="154" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12.5" fill="#cccccc" text-anchor="middle">mypy·pyright가</text>
  <text x="440" y="176" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12.5" fill="#cccccc" text-anchor="middle">실행 전 코드를 분석</text>

  <!-- Box 3 -->
  <rect x="600" y="90" width="220" height="120" rx="8" fill="#111418" stroke="#7777cc" stroke-width="1.5"/>
  <text x="710" y="132" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="15.5" font-weight="600" fill="#9a9ad8" text-anchor="middle">③ 런타임</text>
  <text x="710" y="154" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12.5" fill="#cccccc" text-anchor="middle">힌트를 무시하고</text>
  <text x="710" y="176" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12.5" fill="#cccccc" text-anchor="middle">그대로 실행한다</text>

  <!-- Arrows -->
  <line x1="280" y1="150" x2="330" y2="150" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#ov_arr)"/>
  <line x1="550" y1="150" x2="600" y2="150" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#ov_arr)"/>

  <text x="440" y="245" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="13" fill="#9aa4b8" text-anchor="middle">타입 힌트는 실행 속도에 영향을 주지 않는다 — 검사 도구를 위한 메타데이터다</text>
</svg>
