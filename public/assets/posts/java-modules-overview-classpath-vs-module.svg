<svg xmlns="http://www.w3.org/2000/svg" width="880" height="350" viewBox="0 0 880 350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="350" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">Classpath vs Module Path</text>

  <defs>
    <marker id="mpArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- left panel: classpath -->
  <rect x="50" y="74" width="370" height="250" rx="10" fill="#1a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="235" y="104" font-size="16" font-weight="600" fill="#e05555" text-anchor="middle">Classpath (~JDK 8)</text>

  <rect x="74" y="128" width="100" height="40" rx="6" fill="#0f1626" stroke="#3a4a6e" stroke-width="1"/>
  <text x="124" y="153" font-size="13" fill="#e8e8e8" text-anchor="middle">A.jar</text>
  <rect x="186" y="128" width="100" height="40" rx="6" fill="#0f1626" stroke="#3a4a6e" stroke-width="1"/>
  <text x="236" y="153" font-size="13" fill="#e8e8e8" text-anchor="middle">B.jar</text>
  <rect x="298" y="128" width="100" height="40" rx="6" fill="#0f1626" stroke="#3a4a6e" stroke-width="1"/>
  <text x="348" y="153" font-size="13" fill="#e8e8e8" text-anchor="middle">C.jar</text>

  <text x="235" y="200" font-size="12" fill="#aaa" text-anchor="middle">한 줄에 평평하게 — 경계가 없음</text>
  <text x="74" y="248" font-size="13" fill="#e05555">✕ internal 패키지도 전부 접근 가능</text>
  <text x="74" y="276" font-size="13" fill="#e05555">✕ 빠진 의존성은 런타임에야 터짐</text>
  <text x="74" y="304" font-size="13" fill="#e05555">✕ 같은 패키지 충돌(split package)</text>

  <!-- right panel: module path -->
  <rect x="460" y="74" width="370" height="250" rx="10" fill="#101a12" stroke="#55c555" stroke-width="1.5"/>
  <text x="645" y="104" font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">Module Path (JPMS)</text>

  <rect x="540" y="124" width="210" height="36" rx="6" fill="#0f1626" stroke="#3a4a6e" stroke-width="1"/>
  <text x="645" y="147" font-size="13" fill="#e8e8e8" text-anchor="middle">app.module</text>
  <rect x="540" y="184" width="210" height="36" rx="6" fill="#0f1626" stroke="#3a4a6e" stroke-width="1"/>
  <text x="645" y="207" font-size="13" fill="#e8e8e8" text-anchor="middle">service.module</text>
  <rect x="540" y="244" width="210" height="36" rx="6" fill="#0f1626" stroke="#3a4a6e" stroke-width="1"/>
  <text x="645" y="267" font-size="13" fill="#e8e8e8" text-anchor="middle">util.module</text>

  <line x1="645" y1="160" x2="645" y2="182" stroke="#55c555" stroke-width="2" marker-end="url(#mpArr)"/>
  <line x1="645" y1="220" x2="645" y2="242" stroke="#55c555" stroke-width="2" marker-end="url(#mpArr)"/>
  <text x="660" y="176" font-size="11" fill="#55c555">requires</text>
  <text x="660" y="236" font-size="11" fill="#55c555">requires</text>

  <text x="500" y="306" font-size="13" fill="#55c555">○ 의존 명시 · exports한 패키지만 공개</text>
</svg>
