<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="40" y="48" font-size="22" font-weight="700" fill="#e8e8e8">G1 String Deduplication 동작 흐름</text>

  <defs>
    <marker id="sf-arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="40" y="96" width="180" height="90" rx="8" fill="#101010" stroke="#7777cc" stroke-width="1"/>
  <text x="130" y="130" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Young GC 중</text>
  <text x="130" y="154" font-size="13" fill="#9aa4b8" text-anchor="middle">일정 나이를 넘긴</text>
  <text x="130" y="174" font-size="13" fill="#9aa4b8" text-anchor="middle">String을 후보로 큐잉</text>

  <rect x="270" y="96" width="180" height="90" rx="8" fill="#101010" stroke="#7ec8e3" stroke-width="1"/>
  <text x="360" y="130" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">해시 계산</text>
  <text x="360" y="154" font-size="13" fill="#9aa4b8" text-anchor="middle">백그라운드 스레드가</text>
  <text x="360" y="174" font-size="13" fill="#9aa4b8" text-anchor="middle">내부 배열 해시 계산</text>

  <rect x="500" y="96" width="180" height="90" rx="8" fill="#101010" stroke="#7ec8e3" stroke-width="1"/>
  <text x="590" y="130" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">테이블 조회</text>
  <text x="590" y="154" font-size="13" fill="#9aa4b8" text-anchor="middle">같은 내용 배열이</text>
  <text x="590" y="174" font-size="13" fill="#9aa4b8" text-anchor="middle">이미 있는지 확인</text>

  <rect x="730" y="96" width="110" height="90" rx="8" fill="#101010" stroke="#55c555" stroke-width="1"/>
  <text x="785" y="130" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">공유</text>
  <text x="785" y="154" font-size="13" fill="#9aa4b8" text-anchor="middle">기존 배열을</text>
  <text x="785" y="174" font-size="13" fill="#9aa4b8" text-anchor="middle">참조로 교체</text>

  <line x1="220" y1="141" x2="268" y2="141" stroke="#7ec8e3" stroke-width="2" marker-end="url(#sf-arr)"/>
  <line x1="450" y1="141" x2="498" y2="141" stroke="#7ec8e3" stroke-width="2" marker-end="url(#sf-arr)"/>
  <line x1="680" y1="141" x2="728" y2="141" stroke="#7ec8e3" stroke-width="2" marker-end="url(#sf-arr)"/>

  <text x="40" y="232" font-size="13" fill="#9aa4b8">G1에서만 동작하며 -XX:+UseStringDeduplication 으로 활성화 (기본 비활성).</text>
  <text x="40" y="258" font-size="13" fill="#9aa4b8">String의 불변성과 내부 배열 분리 구조 덕에 안전. 객체 자체 수는 그대로, 배열 메모리만 절약.</text>
</svg>
