<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arb" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="are" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">태그 기반 캐시 무효화</text>

  <!-- Subtitle -->
  <text x="440" y="70"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">여러 fetch 항목을 태그로 묶어 일괄 무효화</text>

  <!-- Cache entries -->
  <!-- Entry 1: /api/posts -->
  <rect x="60" y="90" width="340" height="68" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="116"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">fetch('/api/posts')</text>
  <text x="80" y="138"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">tags: ['posts', 'all-content']</text>

  <!-- Entry 2: /api/posts/1 -->
  <rect x="60" y="174" width="340" height="68" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="200"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">fetch('/api/posts/1')</text>
  <text x="80" y="222"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">tags: ['posts', 'post-1', 'all-content']</text>

  <!-- Entry 3: /api/comments/1 -->
  <rect x="60" y="258" width="340" height="68" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="284"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">fetch('/api/comments/1')</text>
  <text x="80" y="306"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">tags: ['comments', 'post-1', 'all-content']</text>

  <!-- Tag boxes on the right -->
  <!-- Tag: posts -->
  <rect x="600" y="90" width="220" height="48" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="710" y="118"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">revalidateTag('posts')</text>

  <!-- Tag: post-1 -->
  <rect x="600" y="186" width="220" height="48" rx="6" fill="#0d0d1a" stroke="#7777cc" stroke-width="1"/>
  <text x="710" y="214"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">revalidateTag('post-1')</text>

  <!-- Tag: all-content -->
  <rect x="600" y="282" width="220" height="48" rx="6" fill="#1a1000" stroke="#e09050" stroke-width="1"/>
  <text x="710" y="310"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e09050">revalidateTag('all-content')</text>

  <!-- Connection lines: Entry 1 to tags -->
  <line x1="400" y1="110" x2="600" y2="110" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#are)"/>
  <line x1="400" y1="130" x2="600" y2="300" stroke="#e09050" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#are)"/>

  <!-- Connection lines: Entry 2 to tags -->
  <line x1="400" y1="196" x2="600" y2="110" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#are)"/>
  <line x1="400" y1="208" x2="600" y2="204" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#are)"/>
  <line x1="400" y1="220" x2="600" y2="300" stroke="#e09050" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#are)"/>

  <!-- Connection lines: Entry 3 to post-1 and all-content -->
  <line x1="400" y1="278" x2="600" y2="208" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#are)"/>
  <line x1="400" y1="300" x2="600" y2="304" stroke="#e09050" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#are)"/>

  <!-- Effects description -->
  <text x="120" y="364"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">→ /posts 무효화</text>
  <text x="120" y="382"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">→ /posts/1 무효화</text>
  <text x="310" y="364"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">→ /posts/1 무효화</text>
  <text x="310" y="382"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">→ /comments/1 무효화</text>
  <text x="710" y="364"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e09050">→ 3개 항목 모두 무효화</text>

  <!-- Bottom note -->
  <text x="440" y="412"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">하나의 fetch에 여러 태그를 붙일 수 있고, 하나의 revalidateTag 호출로 여러 캐시 항목을 무효화합니다</text>
</svg>
