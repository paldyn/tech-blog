<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" markerWidth="21" markerHeight="14" refX="19.25" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 21 7, 0 14" fill="#555" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">@RequestMapping 속성 완전 정리</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888">URL · 메서드 · 조건의 조합으로 핸들러를 특정</text>

  <!-- Center: @RequestMapping -->
  <ellipse cx="440" cy="270" rx="80" ry="50" fill="#0d1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">@Request</text>
  <text x="440" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">Mapping</text>

  <!-- 1. path / value -->
  <line x1="368" y1="242" x2="268" y2="164" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="60" y="94" width="200" height="72" rx="8" fill="#091a09" stroke="#55c555" stroke-width="1.2"/>
  <text x="160" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">path / value</text>
  <text x="70" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">"/users", "/users/{id}"</text>
  <text x="70" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">{변수}, *, ** 와일드카드</text>

  <!-- 2. method -->
  <line x1="400" y1="222" x2="358" y2="164" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="240" y="94" width="178" height="72" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="329" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">method</text>
  <text x="250" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">GET · POST · PUT</text>
  <text x="250" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">PATCH · DELETE · HEAD</text>

  <!-- 3. params -->
  <line x1="440" y1="220" x2="440" y2="168" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="432" y="94" width="160" height="72" rx="8" fill="#1a100a" stroke="#ce9178" stroke-width="1.2"/>
  <text x="512" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">params</text>
  <text x="442" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">"type=premium"</text>
  <text x="442" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">"!debug" (파라미터 없어야)</text>

  <!-- 4. headers -->
  <line x1="480" y1="222" x2="534" y2="164" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="608" y="94" width="192" height="72" rx="8" fill="#13102a" stroke="#7777cc" stroke-width="1.2"/>
  <text x="704" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">headers</text>
  <text x="618" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">"X-API-Version=2"</text>
  <text x="618" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">헤더 조건 매칭</text>

  <!-- 5. consumes -->
  <line x1="368" y1="298" x2="268" y2="366" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="60" y="368" width="200" height="90" rx="8" fill="#1a0f08" stroke="#ce9178" stroke-width="1.2"/>
  <text x="160" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">consumes</text>
  <text x="70" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">요청 Content-Type 조건</text>
  <text x="70" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">"application/json"</text>
  <text x="70" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">"!text/plain"</text>

  <!-- 6. produces -->
  <line x1="480" y1="298" x2="534" y2="366" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="618" y="368" width="202" height="90" rx="8" fill="#091a09" stroke="#55c555" stroke-width="1.2"/>
  <text x="719" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">produces</text>
  <text x="628" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">응답 Accept 헤더 조건</text>
  <text x="628" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">"application/json"</text>
  <text x="628" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">"text/html;charset=UTF-8"</text>

  <!-- Shortcut annotations box -->
  <rect x="270" y="368" width="340" height="110" rx="8" fill="#0f0f0f" stroke="#333" stroke-width="1.5"/>
  <text x="440" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">단축 어노테이션 (HTTP 메서드 고정)</text>
  <text x="284" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">@GetMapping</text>
  <text x="440" y="414" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ GET</text>
  <text x="284" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">@PostMapping</text>
  <text x="440" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ POST</text>
  <text x="284" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">@PutMapping · @PatchMapping</text>
  <text x="284" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">@DeleteMapping</text>
  <text x="440" y="450" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ PUT / PATCH</text>
  <text x="440" y="468" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ DELETE</text>
</svg>
