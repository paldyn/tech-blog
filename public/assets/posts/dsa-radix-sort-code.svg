<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380" style="background:#0a0a0a">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">기수 정렬 LSD 구현 (C++)</text>

  <rect x="60" y="64" width="490" height="286" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text x="76" y="88" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">// 자릿수 exp 기준 카운팅 정렬 (안정)</tspan>
  </text>
  <text x="76" y="106" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">void</tspan><tspan fill="#ffffff"> countByDigit(vector&lt;</tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff">&gt;&amp; a, </tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff"> exp) {</tspan>
  </text>
  <text x="76" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  int</tspan><tspan fill="#ffffff"> n = a.size();</tspan>
  </text>
  <text x="76" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  vector&lt;</tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff">&gt; c(10, 0), b(n);</tspan>
  </text>
  <text x="76" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  for</tspan><tspan fill="#ffffff"> (</tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff"> x : a) c[(x / exp) % 10]++;</tspan>
  </text>
  <text x="76" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  for</tspan><tspan fill="#ffffff"> (</tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff"> i = 1; i &lt; 10; i++) c[i] += c[i-1];</tspan>
  </text>
  <text x="76" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  for</tspan><tspan fill="#ffffff"> (</tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff"> i = n-1; i &gt;= 0; i--)</tspan>
  </text>
  <text x="76" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    b[--c[(a[i]/exp)%10]] = a[i];</tspan>
  </text>
  <text x="76" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  a = b;</tspan>
  </text>
  <text x="76" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">}</tspan>
  </text>
  <text x="76" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">void</tspan><tspan fill="#ffffff"> radixSort(vector&lt;</tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff">&gt;&amp; a) {</tspan>
  </text>
  <text x="76" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  int</tspan><tspan fill="#ffffff"> mx = *max_element(a.begin(), a.end());</tspan>
  </text>
  <text x="76" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  for</tspan><tspan fill="#ffffff"> (</tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff"> exp = 1; mx/exp &gt; 0; exp *= 10)</tspan>
  </text>
  <text x="76" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    countByDigit(a, exp);</tspan>
  </text>
  <text x="76" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">}</tspan>
  </text>

  <!-- Right panel -->
  <rect x="576" y="64" width="264" height="286" rx="8" fill="#0a0f1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="708" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">복잡도</text>
  <text x="594" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">시간: O(d × (N + K))</text>
  <text x="594" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">  d = 최대 자릿수</text>
  <text x="594" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">  K = 기수 (10진수면 10)</text>
  <text x="594" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">공간: O(N + K)</text>
  <text x="594" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">  안정 정렬 보장</text>

  <text x="708" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc">LSD vs MSD</text>
  <text x="594" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">LSD: 낮은 자리부터</text>
  <text x="594" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">  구현 단순, 안정 정렬</text>
  <text x="594" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">MSD: 높은 자리부터</text>
  <text x="594" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">  재귀·문자열 정렬에 적합</text>
  <text x="594" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">  조기 종료 가능</text>
</svg>
