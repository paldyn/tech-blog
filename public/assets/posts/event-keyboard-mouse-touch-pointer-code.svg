<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">입력 이벤트 코드 패턴</text>

  <!-- Left: keyboard shortcut -->
  <text x="60" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">키보드 단축키 처리</text>

  <rect x="60" y="94" width="370" height="162" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">document.<tspan fill="#7ec8e3">addEventListener</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'keydown'</tspan><tspan fill="#e8e8e8">, e =&gt; {</tspan></text>
  <text x="76" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  // Ctrl+S / Cmd+S 저장</text>
  <text x="76" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  if <tspan fill="#ffffff">((e.ctrlKey || e.metaKey) &amp;&amp;</tspan></text>
  <text x="76" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      e.key === <tspan fill="#ce9178">'s'</tspan><tspan fill="#e8e8e8">) {</tspan></text>
  <text x="76" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    e.<tspan fill="#7ec8e3">preventDefault</tspan><tspan fill="#e8e8e8">();</tspan></text>
  <text x="76" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">saveDocument</tspan><tspan fill="#e8e8e8">();</tspan></text>
  <text x="76" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  }</text>
  <text x="76" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">});</text>

  <!-- Right: pointer drag -->
  <text x="450" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">Pointer 드래그 구현</text>

  <rect x="450" y="94" width="370" height="162" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="466" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">el.<tspan fill="#7ec8e3">addEventListener</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'pointerdown'</tspan><tspan fill="#e8e8e8">, e =&gt; {</tspan></text>
  <text x="466" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  el.<tspan fill="#7ec8e3">setPointerCapture</tspan><tspan fill="#e8e8e8">(e.pointerId);</tspan></text>
  <text x="466" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">});</text>
  <text x="466" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">el.<tspan fill="#7ec8e3">addEventListener</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'pointermove'</tspan><tspan fill="#e8e8e8">, e =&gt; {</tspan></text>
  <text x="466" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3">updatePosition</tspan><tspan fill="#e8e8e8">(e.clientX, e.clientY);</tspan></text>
  <text x="466" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">});</text>
  <text x="466" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// pointerup 시 자동으로 capture 해제</text>
  <text x="466" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 마우스·터치·펜 모두 동작</text>

  <!-- Bottom: touch pinch detect -->
  <text x="60" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8a84c">터치 핀치 줌 감지</text>

  <rect x="60" y="296" width="760" height="126" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">let <tspan fill="#ffffff">initialDist = </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#e8e8e8">;</tspan></text>
  <text x="76" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">function <tspan fill="#ffffff">dist(t) {</tspan></text>
  <text x="76" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  const <tspan fill="#ffffff">dx = t[</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#e8e8e8">].clientX - t[</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">].clientX;</tspan></text>
  <text x="76" y="370" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  const <tspan fill="#ffffff">dy = t[</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#e8e8e8">].clientY - t[</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">].clientY;</tspan></text>
  <text x="76" y="388" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  return <tspan fill="#ffffff">Math.</tspan><tspan fill="#7ec8e3">hypot</tspan><tspan fill="#e8e8e8">(dx, dy);</tspan></text>
  <text x="76" y="406" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>
  <text x="76" y="410" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// touchstart에서 initialDist 설정 후 touchmove에서 scale 계산</text>
</svg>
