<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="390" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">chmod 8진수 → 심볼릭 변환표</text>
  <text x="440" y="68" text-anchor="middle" font-size="14" fill="#888">각 자리 (0~7) × 3자리 = 소유자·그룹·기타</text>

  <!-- Bit value header -->
  <rect x="60" y="84" width="760" height="34" rx="6" fill="#141622"/>
  <text x="160" y="106" text-anchor="middle" font-size="13" font-weight="600" fill="#888">숫자</text>
  <text x="290" y="106" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">r (4)</text>
  <text x="390" y="106" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">w (2)</text>
  <text x="490" y="106" text-anchor="middle" font-size="13" font-weight="600" fill="#e05555">x (1)</text>
  <text x="620" y="106" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">심볼릭</text>
  <text x="760" y="106" text-anchor="middle" font-size="13" font-weight="600" fill="#888">설명</text>

  <!-- Rows -->
  <!-- 0 -->
  <rect x="60" y="118" width="760" height="28" fill="#0e1018"/>
  <text x="160" y="137" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">0</text>
  <text x="290" y="137" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#555">-</text>
  <text x="390" y="137" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#555">-</text>
  <text x="490" y="137" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#555">-</text>
  <text x="620" y="137" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7777cc">---</text>
  <text x="760" y="137" text-anchor="middle" font-size="12" fill="#888">권한 없음</text>

  <!-- 1 -->
  <rect x="60" y="146" width="760" height="28" fill="#0a0a0a"/>
  <text x="160" y="165" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">1</text>
  <text x="290" y="165" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#555">-</text>
  <text x="390" y="165" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#555">-</text>
  <text x="490" y="165" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e05555">x</text>
  <text x="620" y="165" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7777cc">--x</text>
  <text x="760" y="165" text-anchor="middle" font-size="12" fill="#888">실행만</text>

  <!-- 2 -->
  <rect x="60" y="174" width="760" height="28" fill="#0e1018"/>
  <text x="160" y="193" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">2</text>
  <text x="290" y="193" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#555">-</text>
  <text x="390" y="193" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3">w</text>
  <text x="490" y="193" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#555">-</text>
  <text x="620" y="193" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7777cc">-w-</text>
  <text x="760" y="193" text-anchor="middle" font-size="12" fill="#888">쓰기만 (희귀)</text>

  <!-- 3 -->
  <rect x="60" y="202" width="760" height="28" fill="#0a0a0a"/>
  <text x="160" y="221" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">3</text>
  <text x="290" y="221" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#555">-</text>
  <text x="390" y="221" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3">w</text>
  <text x="490" y="221" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e05555">x</text>
  <text x="620" y="221" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7777cc">-wx</text>
  <text x="760" y="221" text-anchor="middle" font-size="12" fill="#888">쓰기+실행</text>

  <!-- 4 -->
  <rect x="60" y="230" width="760" height="28" fill="#0e1018"/>
  <text x="160" y="249" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">4</text>
  <text x="290" y="249" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555">r</text>
  <text x="390" y="249" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#555">-</text>
  <text x="490" y="249" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#555">-</text>
  <text x="620" y="249" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7777cc">r--</text>
  <text x="760" y="249" text-anchor="middle" font-size="12" fill="#888">읽기만</text>

  <!-- 5 -->
  <rect x="60" y="258" width="760" height="28" fill="#0a0a0a"/>
  <text x="160" y="277" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">5</text>
  <text x="290" y="277" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555">r</text>
  <text x="390" y="277" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#555">-</text>
  <text x="490" y="277" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e05555">x</text>
  <text x="620" y="277" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7777cc">r-x</text>
  <text x="760" y="277" text-anchor="middle" font-size="12" fill="#888">읽기+실행</text>

  <!-- 6 -->
  <rect x="60" y="286" width="760" height="28" fill="#0e1018"/>
  <text x="160" y="305" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">6</text>
  <text x="290" y="305" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555">r</text>
  <text x="390" y="305" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3">w</text>
  <text x="490" y="305" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#555">-</text>
  <text x="620" y="305" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7777cc">rw-</text>
  <text x="760" y="305" text-anchor="middle" font-size="12" fill="#888">읽기+쓰기 (일반 파일)</text>

  <!-- 7 -->
  <rect x="60" y="314" width="760" height="28" fill="#0a0a0a"/>
  <text x="160" y="333" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">7</text>
  <text x="290" y="333" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555">r</text>
  <text x="390" y="333" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3">w</text>
  <text x="490" y="333" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e05555">x</text>
  <text x="620" y="333" text-anchor="middle" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7777cc">rwx</text>
  <text x="760" y="333" text-anchor="middle" font-size="12" fill="#888">모든 권한</text>

  <!-- Border -->
  <rect x="60" y="84" width="760" height="258" rx="6" fill="none" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Bottom tip -->
  <rect x="60" y="356" width="760" height="24" rx="6" fill="#141622"/>
  <text x="440" y="372" text-anchor="middle" font-size="12" fill="#7ec8e3">예시: chmod 755 → 소유자 rwx(7), 그룹 r-x(5), 기타 r-x(5)</text>
</svg>
