<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 620" width="880" height="620" style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <!-- background -->
  <rect width="880" height="620" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="52" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">Nexacro N 도입 판단 기준</text>
  <text x="440" y="76" text-anchor="middle" fill="#888" font-size="13">어떤 프로젝트에 Nexacro N이 적합한가</text>

  <!-- Column headers -->
  <rect x="60" y="100" width="230" height="36" rx="6" fill="#1a1a2e"/>
  <text x="175" y="123" text-anchor="middle" fill="#7ec8e3" font-size="14" font-weight="600">판단 항목</text>

  <rect x="306" y="100" width="188" height="36" rx="6" fill="#0d2a1a"/>
  <text x="400" y="123" text-anchor="middle" fill="#55c555" font-size="14" font-weight="600">Nexacro N 적합</text>

  <rect x="510" y="100" width="188" height="36" rx="6" fill="#2a1a0d"/>
  <text x="604" y="123" text-anchor="middle" fill="#e0a040" font-size="14" font-weight="600">웹/SPA 적합</text>

  <rect x="714" y="100" width="106" height="36" rx="6" fill="#2a0d0d"/>
  <text x="767" y="123" text-anchor="middle" fill="#e05555" font-size="14" font-weight="600">주의 필요</text>

  <!-- Row 1 -->
  <rect x="60" y="148" width="760" height="44" rx="4" fill="#111"/>
  <text x="175" y="175" text-anchor="middle" fill="#e8e8e8" font-size="13">화면 수</text>
  <text x="400" y="175" text-anchor="middle" fill="#55c555" font-size="13">200개 이상 대규모 ERP</text>
  <text x="604" y="175" text-anchor="middle" fill="#e0a040" font-size="13">10~50개 서비스 화면</text>
  <text x="767" y="175" text-anchor="middle" fill="#888" font-size="13">—</text>

  <!-- Row 2 -->
  <rect x="60" y="198" width="760" height="44" rx="4" fill="#0d0d0d"/>
  <text x="175" y="225" text-anchor="middle" fill="#e8e8e8" font-size="13">그리드 복잡도</text>
  <text x="400" y="225" text-anchor="middle" fill="#55c555" font-size="13">복합 헤더·셀 병합·대용량</text>
  <text x="604" y="225" text-anchor="middle" fill="#e0a040" font-size="13">단순 테이블·리스트</text>
  <text x="767" y="225" text-anchor="middle" fill="#888" font-size="13">—</text>

  <!-- Row 3 -->
  <rect x="60" y="248" width="760" height="44" rx="4" fill="#111"/>
  <text x="175" y="275" text-anchor="middle" fill="#e8e8e8" font-size="13">업무 도메인</text>
  <text x="400" y="275" text-anchor="middle" fill="#55c555" font-size="13">금융·공공·제조 MES/ERP</text>
  <text x="604" y="275" text-anchor="middle" fill="#e0a040" font-size="13">B2C 쇼핑몰·콘텐츠</text>
  <text x="767" y="275" text-anchor="middle" fill="#e05555" font-size="13">모바일 전용</text>

  <!-- Row 4 -->
  <rect x="60" y="298" width="760" height="44" rx="4" fill="#0d0d0d"/>
  <text x="175" y="325" text-anchor="middle" fill="#e8e8e8" font-size="13">개발 인력</text>
  <text x="400" y="325" text-anchor="middle" fill="#55c555" font-size="13">Nexacro 경험자 보유</text>
  <text x="604" y="325" text-anchor="middle" fill="#e0a040" font-size="13">React/Vue 전문팀</text>
  <text x="767" y="325" text-anchor="middle" fill="#e05555" font-size="13">신규팀 전원 Web</text>

  <!-- Row 5 -->
  <rect x="60" y="348" width="760" height="44" rx="4" fill="#111"/>
  <text x="175" y="375" text-anchor="middle" fill="#e8e8e8" font-size="13">IE 지원 필요</text>
  <text x="400" y="375" text-anchor="middle" fill="#e05555" font-size="13">불가 (N은 IE 미지원)</text>
  <text x="604" y="375" text-anchor="middle" fill="#888" font-size="13">—</text>
  <text x="767" y="375" text-anchor="middle" fill="#e05555" font-size="13">Platform 유지 고려</text>

  <!-- Row 6 -->
  <rect x="60" y="398" width="760" height="44" rx="4" fill="#0d0d0d"/>
  <text x="175" y="425" text-anchor="middle" fill="#e8e8e8" font-size="13">라이선스 예산</text>
  <text x="400" y="425" text-anchor="middle" fill="#55c555" font-size="13">엔터프라이즈 구매 가능</text>
  <text x="604" y="425" text-anchor="middle" fill="#e0a040" font-size="13">오픈소스 선호</text>
  <text x="767" y="425" text-anchor="middle" fill="#e05555" font-size="13">스타트업 초기</text>

  <!-- Row 7 -->
  <rect x="60" y="448" width="760" height="44" rx="4" fill="#111"/>
  <text x="175" y="475" text-anchor="middle" fill="#e8e8e8" font-size="13">운영 환경</text>
  <text x="400" y="475" text-anchor="middle" fill="#55c555" font-size="13">사내망·VPN 폐쇄망</text>
  <text x="604" y="475" text-anchor="middle" fill="#e0a040" font-size="13">퍼블릭 인터넷 서비스</text>
  <text x="767" y="475" text-anchor="middle" fill="#888" font-size="13">—</text>

  <!-- Row 8 -->
  <rect x="60" y="498" width="760" height="44" rx="4" fill="#0d0d0d"/>
  <text x="175" y="525" text-anchor="middle" fill="#e8e8e8" font-size="13">기존 시스템</text>
  <text x="400" y="525" text-anchor="middle" fill="#55c555" font-size="13">Nexacro Platform 레거시</text>
  <text x="604" y="525" text-anchor="middle" fill="#e0a040" font-size="13">Spring MVC JSP</text>
  <text x="767" y="525" text-anchor="middle" fill="#888" font-size="13">—</text>

  <!-- dividers -->
  <line x1="298" y1="100" x2="298" y2="548" stroke="#222" stroke-width="1"/>
  <line x1="502" y1="100" x2="502" y2="548" stroke="#222" stroke-width="1"/>
  <line x1="706" y1="100" x2="706" y2="548" stroke="#222" stroke-width="1"/>

  <!-- footer -->
  <text x="440" y="592" text-anchor="middle" fill="#444" font-size="11">PALDYN · Nexacro N 완전 정복 시리즈</text>
</svg>
