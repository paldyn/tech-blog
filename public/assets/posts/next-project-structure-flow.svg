<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="arr1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Next.js 요청 처리 흐름</text>
  <text x="440" y="70" text-anchor="middle" font-size="14" fill="#888">브라우저 요청에서 응답까지</text>

  <!-- Browser -->
  <rect x="60" y="100" width="140" height="60" rx="8" fill="#0c1a28" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="125" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">Browser</text>
  <text x="130" y="145" text-anchor="middle" font-size="11" fill="#888">GET /blog/post1</text>

  <!-- Arrow 1 -->
  <line x1="200" y1="130" x2="248" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>

  <!-- Middleware -->
  <rect x="250" y="100" width="140" height="60" rx="8" fill="#10102a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="320" y="125" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc">Middleware</text>
  <text x="320" y="145" text-anchor="middle" font-size="11" fill="#888">인증 · 리다이렉트</text>

  <!-- Arrow 2 -->
  <line x1="390" y1="130" x2="438" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>

  <!-- App Router -->
  <rect x="440" y="100" width="140" height="60" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="510" y="125" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">App Router</text>
  <text x="510" y="145" text-anchor="middle" font-size="11" fill="#888">라우트 매칭</text>

  <!-- Arrow 3 -->
  <line x1="580" y1="130" x2="628" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>

  <!-- Server -->
  <rect x="630" y="100" width="140" height="60" rx="8" fill="#1a150a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="700" y="125" text-anchor="middle" font-size="14" font-weight="600" fill="#ce9178">Server</text>
  <text x="700" y="145" text-anchor="middle" font-size="11" fill="#888">RSC · API 실행</text>

  <!-- Return arrow (bottom) -->
  <path d="M 770 160 Q 770 210 440 230 Q 110 250 130 170"
        fill="none" stroke="#555" stroke-width="2" stroke-dasharray="5,3"
        marker-end="url(#arr1)"/>
  <text x="440" y="250" text-anchor="middle" font-size="12" fill="#888">HTML/JSON 응답 반환</text>

  <!-- Layer boxes (bottom half) -->
  <text x="440" y="300" text-anchor="middle" font-size="15" font-weight="600" fill="#e8e8e8">레이어별 역할</text>

  <rect x="60" y="318" width="170" height="70" rx="8" fill="#0c1a1f" stroke="#7ec8e3" stroke-width="1"/>
  <text x="145" y="343" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">public/</text>
  <text x="145" y="363" text-anchor="middle" font-size="11" fill="#888">정적 파일 직접 서빙</text>

  <rect x="248" y="318" width="180" height="70" rx="8" fill="#10102a" stroke="#7777cc" stroke-width="1"/>
  <text x="338" y="343" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">src/app/</text>
  <text x="338" y="363" text-anchor="middle" font-size="11" fill="#888">라우트 + 렌더링 로직</text>

  <rect x="446" y="318" width="180" height="70" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="536" y="343" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">src/components/</text>
  <text x="536" y="363" text-anchor="middle" font-size="11" fill="#888">재사용 UI 컴포넌트</text>

  <rect x="644" y="318" width="176" height="70" rx="8" fill="#1a150a" stroke="#ce9178" stroke-width="1"/>
  <text x="732" y="343" text-anchor="middle" font-size="13" font-weight="600" fill="#ce9178">src/lib/</text>
  <text x="732" y="363" text-anchor="middle" font-size="11" fill="#888">DB · 유틸 · 서버 로직</text>
</svg>
