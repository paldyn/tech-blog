<svg width="880" height="440" viewBox="0 0 880 440" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">.at() 활용 예제</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">Array · String · TypedArray 공통 메서드</text>
  <line x1="60" y1="92" x2="820" y2="92" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Left: Array -->
  <text x="60" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">배열에서</text>
  <rect x="60" y="126" width="355" height="172" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> arr = [</tspan><tspan fill="#b5cea8">10</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">20</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">30</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">40</tspan><tspan fill="#ffffff">];</tspan>
  </text>
  <text x="76" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">arr.at(</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">)   </tspan><tspan fill="#9aa4b8">// 10</tspan>
  </text>
  <text x="76" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">arr.at(-</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">)  </tspan><tspan fill="#9aa4b8">// 40</tspan>
  </text>
  <text x="76" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">arr.at(-</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">)  </tspan><tspan fill="#9aa4b8">// 30</tspan>
  </text>
  <text x="76" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 범위 초과 → undefined</text>
  <text x="76" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">arr.at(</tspan><tspan fill="#b5cea8">99</tspan><tspan fill="#ffffff">)  </tspan><tspan fill="#9aa4b8">// undefined</tspan>
  </text>
  <text x="76" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">arr.at(-</tspan><tspan fill="#b5cea8">99</tspan><tspan fill="#ffffff">) </tspan><tspan fill="#9aa4b8">// undefined</tspan>
  </text>
  <text x="76" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 에러 없이 undefined 반환</text>

  <!-- Right: String + TypedArray -->
  <text x="465" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">문자열 · TypedArray</text>
  <rect x="465" y="126" width="355" height="172" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="481" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 문자열</text>
  <text x="481" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> s = </tspan><tspan fill="#ce9178">'hello'</tspan><tspan fill="#ffffff">;</tspan>
  </text>
  <text x="481" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">s.at(-</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">)  </tspan><tspan fill="#9aa4b8">// 'o'</tspan>
  </text>
  <text x="481" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">s.at(-</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">)  </tspan><tspan fill="#9aa4b8">// 'l'</tspan>
  </text>
  <text x="481" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// TypedArray</text>
  <text x="481" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> buf = </tspan><tspan fill="#7ec8e3">new</tspan><tspan fill="#ffffff"> Uint8Array([</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff">]);</tspan>
  </text>
  <text x="481" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">buf.at(-</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">)  </tspan><tspan fill="#9aa4b8">// 3</tspan>
  </text>
  <text x="481" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 메서드 체이닝에도 유용</text>

  <!-- Method chaining example -->
  <text x="60" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">메서드 체이닝 활용</text>
  <rect x="60" y="340" width="760" height="50" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">items.filter(x =&gt; x.active).at(-</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">)?.name;</tspan>
  </text>
  <text x="76" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 임시 변수 없이 마지막 활성 항목의 name 접근</text>

</svg>
