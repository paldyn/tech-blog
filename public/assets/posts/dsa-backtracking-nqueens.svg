<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">N-Queens: 백트래킹으로 4×4 풀기</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">열·대각선 충돌 검사로 가지치기, 유효한 배치를 찾으면 기록</text>

  <!-- Board attempt 1: col 0 row 0, col 1 row 2 (conflict) -->
  <text x="120" y="102" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">시도 1 — 충돌 가지치기</text>

  <!-- 4x4 board attempt 1 -->
  <rect x="60" y="112" width="50" height="50" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <rect x="110" y="112" width="50" height="50" fill="#252525" stroke="#333" stroke-width="1"/>
  <rect x="160" y="112" width="50" height="50" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <rect x="210" y="112" width="50" height="50" fill="#252525" stroke="#333" stroke-width="1"/>
  <rect x="60" y="162" width="50" height="50" fill="#252525" stroke="#333" stroke-width="1"/>
  <rect x="110" y="162" width="50" height="50" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <rect x="160" y="162" width="50" height="50" fill="#252525" stroke="#333" stroke-width="1"/>
  <rect x="210" y="162" width="50" height="50" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <rect x="60" y="212" width="50" height="50" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <rect x="110" y="212" width="50" height="50" fill="#252525" stroke="#333" stroke-width="1"/>
  <rect x="160" y="212" width="50" height="50" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <rect x="210" y="212" width="50" height="50" fill="#252525" stroke="#333" stroke-width="1"/>
  <rect x="60" y="262" width="50" height="50" fill="#252525" stroke="#333" stroke-width="1"/>
  <rect x="110" y="262" width="50" height="50" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <rect x="160" y="262" width="50" height="50" fill="#252525" stroke="#333" stroke-width="1"/>
  <rect x="210" y="262" width="50" height="50" fill="#1a1a1a" stroke="#333" stroke-width="1"/>

  <!-- Queens placed -->
  <text x="85" y="145" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" fill="#55c555">♛</text>
  <text x="135" y="195" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" fill="#55c555">♛</text>
  <!-- Conflict zone highlight -->
  <rect x="60" y="212" width="50" height="50" fill="#2a1010" stroke="#e05555" stroke-width="2"/>
  <rect x="160" y="212" width="50" height="50" fill="#2a1010" stroke="#e05555" stroke-width="2"/>
  <text x="85" y="245" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#e05555">✗</text>
  <text x="185" y="245" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#e05555">✗</text>
  <text x="135" y="245" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" fill="#e05555">♛</text>

  <text x="120" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">3행: 배치 불가 → 백트랙</text>

  <!-- Board solution: valid 4-queens -->
  <text x="470" y="102" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">해 발견 — 유효한 배치</text>

  <!-- 4x4 board solution -->
  <rect x="410" y="112" width="50" height="50" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <rect x="460" y="112" width="50" height="50" fill="#252525" stroke="#333" stroke-width="1"/>
  <rect x="510" y="112" width="50" height="50" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <rect x="560" y="112" width="50" height="50" fill="#252525" stroke="#333" stroke-width="1"/>
  <rect x="410" y="162" width="50" height="50" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <rect x="460" y="162" width="50" height="50" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <rect x="510" y="162" width="50" height="50" fill="#252525" stroke="#333" stroke-width="1"/>
  <rect x="560" y="162" width="50" height="50" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <rect x="410" y="212" width="50" height="50" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <rect x="460" y="212" width="50" height="50" fill="#252525" stroke="#333" stroke-width="1"/>
  <rect x="510" y="212" width="50" height="50" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <rect x="560" y="212" width="50" height="50" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <rect x="410" y="262" width="50" height="50" fill="#252525" stroke="#333" stroke-width="1"/>
  <rect x="460" y="262" width="50" height="50" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <rect x="510" y="262" width="50" height="50" fill="#252525" stroke="#333" stroke-width="1"/>
  <rect x="560" y="262" width="50" height="50" fill="#1a1a1a" stroke="#333" stroke-width="1"/>

  <text x="535" y="145" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" fill="#55c555">♛</text>
  <text x="435" y="195" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" fill="#55c555">♛</text>
  <text x="585" y="245" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" fill="#55c555">♛</text>
  <text x="485" y="295" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" fill="#55c555">♛</text>

  <text x="470" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">cols = [2, 0, 3, 1] — 유효 해</text>

  <!-- Code box -->
  <rect x="650" y="96" width="200" height="220" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="662" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">def</text>
  <text x="693" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"> solve(row):</text>
  <text x="662" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">  # 모든 행 배치 완료</text>
  <text x="662" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">  if</text>
  <text x="682" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"> row == n:</text>
  <text x="662" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">    result.append(</text>
  <text x="662" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">      cols[:])</text>
  <text x="662" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">    return</text>
  <text x="662" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">  for</text>
  <text x="683" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"> col in range(n):</text>
  <text x="662" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">    if</text>
  <text x="683" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"> valid(row,col):</text>
  <text x="662" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">      place(row,col)</text>
  <text x="662" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">      solve(row+1)</text>
  <text x="662" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">      remove(row,col)</text>

  <!-- Summary stats -->
  <rect x="60" y="360" width="580" height="96" fill="#111" stroke="#2a3a2a" stroke-width="1" rx="8"/>
  <text x="350" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">N-Queens 해의 수</text>
  <text x="110" y="410" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">N=4</text>
  <text x="110" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">2가지</text>
  <text x="230" y="410" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">N=6</text>
  <text x="230" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">4가지</text>
  <text x="350" y="410" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">N=8</text>
  <text x="350" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">92가지</text>
  <text x="470" y="410" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">N=12</text>
  <text x="470" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">14200가지</text>
  <text x="590" y="410" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178">가지치기</text>
  <text x="590" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">탐색 공간 대폭 감소</text>
</svg>
