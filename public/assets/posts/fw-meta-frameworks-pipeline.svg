<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <text x="440" y="45" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Island 아키텍처 (Astro)</text>

  <!-- Main page background -->
  <rect x="80" y="75" width="720" height="290" rx="8" fill="#111" stroke="#333" stroke-width="1.5"/>

  <!-- Page title label -->
  <text x="96" y="71" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">HTML 정적 콘텐츠</text>

  <!-- Header static zone -->
  <rect x="100" y="90" width="660" height="40" rx="4" fill="#1a1a1a"/>
  <text x="430" y="115" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Header (정적)</text>

  <!-- Cart interactive island (top-right) -->
  <rect x="680" y="95" width="80" height="30" rx="4" fill="#0a1020" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="720" y="114" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">Cart 🛒</text>

  <!-- Article static zone -->
  <rect x="100" y="145" width="300" height="90" rx="4" fill="#1a1a1a"/>
  <text x="250" y="190" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Article (정적)</text>
  <text x="250" y="208" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">순수 HTML/CSS — JS 없음</text>

  <!-- Interactive Island -->
  <rect x="415" y="145" width="345" height="90" rx="4" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="587" y="171" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">🏝 Interactive Island</text>
  <text x="587" y="192" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">React / Vue / Svelte</text>
  <text x="587" y="212" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">JS 번들 분리 로딩</text>

  <!-- Footer static zone -->
  <rect x="100" y="252" width="660" height="40" rx="4" fill="#1a1a1a"/>
  <text x="430" y="277" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Footer (정적)</text>

  <!-- Legend labels -->
  <rect x="100" y="308" width="14" height="14" rx="2" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
  <text x="120" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">정적 영역 (JS 없음)</text>

  <rect x="250" y="308" width="14" height="14" rx="2" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="270" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">인터랙티브 아일랜드 (선택적 수화)</text>

  <rect x="490" y="308" width="14" height="14" rx="2" fill="#0a1020" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="510" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">경량 위젯</text>

  <!-- Bottom annotation -->
  <text x="440" y="390" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#666">기본: 0 JS → 아일랜드만 선택적 수화(Hydration) — 페이지 전체의 JS 부담을 최소화</text>
</svg>
