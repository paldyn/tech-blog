<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" style="background:#0a0a0a;border-radius:12px;font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">Docker overlay 네트워크: VXLAN 터널링</text>
  <text x="440" y="68" text-anchor="middle" fill="#888" font-size="13">여러 Docker 호스트에 걸친 가상 L2 네트워크</text>

  <!-- Overlay network layer (top) -->
  <rect x="60" y="90" width="760" height="50" rx="8" fill="#0d2a0d" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="440" y="120" text-anchor="middle" fill="#55c555" font-size="14" font-weight="600">overlay 네트워크 (10.0.0.0/24) — 논리적 가상 L2</text>

  <!-- Host 1 -->
  <rect x="60" y="165" width="340" height="290" rx="10" fill="#0d1320" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="193" text-anchor="middle" fill="#7ec8e3" font-size="14" font-weight="600">Host 1 (192.168.1.10)</text>

  <rect x="80" y="208" width="140" height="80" rx="6" fill="#0d1b2a" stroke="#55c555" stroke-width="1"/>
  <text x="150" y="232" text-anchor="middle" fill="#55c555" font-size="13">Service A</text>
  <text x="150" y="252" text-anchor="middle" fill="#888" font-size="11">10.0.0.2</text>
  <text x="150" y="270" text-anchor="middle" fill="#888" font-size="11">eth0</text>

  <rect x="240" y="208" width="140" height="80" rx="6" fill="#0d1b2a" stroke="#55c555" stroke-width="1"/>
  <text x="310" y="232" text-anchor="middle" fill="#55c555" font-size="13">Service B</text>
  <text x="310" y="252" text-anchor="middle" fill="#888" font-size="11">10.0.0.3</text>
  <text x="310" y="270" text-anchor="middle" fill="#888" font-size="11">eth0</text>

  <!-- VXLAN on host1 -->
  <rect x="100" y="316" width="260" height="36" rx="6" fill="#1a1a0d" stroke="#888"/>
  <text x="230" y="339" text-anchor="middle" fill="#888" font-size="12">VXLAN (vxlan0) — VTEP</text>

  <!-- eth0 host1 -->
  <rect x="100" y="376" width="260" height="36" rx="6" fill="#0a0a0a" stroke="#444"/>
  <text x="230" y="399" text-anchor="middle" fill="#e8e8e8" font-size="12">Host eth0 (192.168.1.10)</text>

  <!-- arrows host1 -->
  <line x1="230" y1="288" x2="230" y2="316" stroke="#555" stroke-width="1.5"/>
  <line x1="230" y1="352" x2="230" y2="376" stroke="#555" stroke-width="1.5"/>

  <!-- Host 2 -->
  <rect x="480" y="165" width="340" height="290" rx="10" fill="#0d1320" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="650" y="193" text-anchor="middle" fill="#7ec8e3" font-size="14" font-weight="600">Host 2 (192.168.1.20)</text>

  <rect x="500" y="208" width="140" height="80" rx="6" fill="#0d1b2a" stroke="#55c555" stroke-width="1"/>
  <text x="570" y="232" text-anchor="middle" fill="#55c555" font-size="13">Service C</text>
  <text x="570" y="252" text-anchor="middle" fill="#888" font-size="11">10.0.0.4</text>
  <text x="570" y="270" text-anchor="middle" fill="#888" font-size="11">eth0</text>

  <rect x="660" y="208" width="140" height="80" rx="6" fill="#0d1b2a" stroke="#55c555" stroke-width="1"/>
  <text x="730" y="232" text-anchor="middle" fill="#55c555" font-size="13">Service D</text>
  <text x="730" y="252" text-anchor="middle" fill="#888" font-size="11">10.0.0.5</text>
  <text x="730" y="270" text-anchor="middle" fill="#888" font-size="11">eth0</text>

  <!-- VXLAN on host2 -->
  <rect x="520" y="316" width="260" height="36" rx="6" fill="#1a1a0d" stroke="#888"/>
  <text x="650" y="339" text-anchor="middle" fill="#888" font-size="12">VXLAN (vxlan0) — VTEP</text>

  <!-- eth0 host2 -->
  <rect x="520" y="376" width="260" height="36" rx="6" fill="#0a0a0a" stroke="#444"/>
  <text x="650" y="399" text-anchor="middle" fill="#e8e8e8" font-size="12">Host eth0 (192.168.1.20)</text>

  <!-- arrows host2 -->
  <line x1="650" y1="288" x2="650" y2="316" stroke="#555" stroke-width="1.5"/>
  <line x1="650" y1="352" x2="650" y2="376" stroke="#555" stroke-width="1.5"/>

  <!-- VXLAN tunnel between hosts -->
  <line x1="360" y1="394" x2="520" y2="394" stroke="#b5cea8" stroke-width="2"/>
  <polygon points="520,394 506,388 506,400" fill="#b5cea8"/>
  <polygon points="360,394 374,388 374,400" fill="#b5cea8"/>
  <text x="440" y="415" text-anchor="middle" fill="#b5cea8" font-size="12">UDP/4789 VXLAN 터널</text>
  <text x="440" y="432" text-anchor="middle" fill="#888" font-size="11">L2 프레임을 UDP로 캡슐화 전송</text>

  <!-- Overlay arrow -->
  <line x1="230" y1="140" x2="230" y2="165" stroke="#55c555" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="650" y1="140" x2="650" y2="165" stroke="#55c555" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Control plane note -->
  <rect x="60" y="468" width="760" height="22" rx="4" fill="#0d1a0d" stroke="none"/>
  <text x="440" y="483" text-anchor="middle" fill="#888" font-size="11">제어 플레인: Swarm manager가 etcd/Raft로 네트워크 상태 동기화  |  데이터 플레인: VXLAN UDP 터널</text>
</svg>
