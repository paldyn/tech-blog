<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480"
     style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">JSX 중괄호 안에서 쓸 수 있는 표현식</text>

  <!-- Allowed section header -->
  <text x="66" y="76" font-size="16" font-weight="600" fill="#55c555">✓ 허용 — 값을 반환하는 표현식</text>

  <!-- Card 1: Variable -->
  <rect x="60" y="86" width="180" height="110" rx="8" fill="#0f1a0f" stroke="#2a4a2a" stroke-width="1.5"/>
  <text x="150" y="106" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">변수·상수</text>
  <rect x="72" y="112" width="156" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve">
    <tspan x="84" y="130" fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> msg = </tspan><tspan fill="#ce9178">"hi"</tspan><tspan fill="#ffffff">;</tspan>
    <tspan x="84" dy="18" fill="#ce9178">&lt;p&gt;</tspan><tspan fill="#ffffff">{msg}</tspan><tspan fill="#ce9178">&lt;/p&gt;</tspan>
    <tspan x="84" dy="18" fill="#ce9178">&lt;p&gt;</tspan><tspan fill="#ffffff">{user.name}</tspan><tspan fill="#ce9178">&lt;/p&gt;</tspan>
  </text>

  <!-- Card 2: Ternary -->
  <rect x="254" y="86" width="180" height="110" rx="8" fill="#0f1a0f" stroke="#2a4a2a" stroke-width="1.5"/>
  <text x="344" y="106" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">삼항 연산자</text>
  <rect x="266" y="112" width="156" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve">
    <tspan x="278" y="130" fill="#ffffff">{isOn</tspan>
    <tspan x="278" dy="18" fill="#ffffff">  ? </tspan><tspan fill="#ce9178">'켜짐'</tspan>
    <tspan x="278" dy="18" fill="#ffffff">  : </tspan><tspan fill="#ce9178">'꺼짐'</tspan><tspan fill="#ffffff">}</tspan>
  </text>

  <!-- Card 3: && -->
  <rect x="448" y="86" width="180" height="110" rx="8" fill="#0f1a0f" stroke="#2a4a2a" stroke-width="1.5"/>
  <text x="538" y="106" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">&amp;&amp; 단락 평가</text>
  <rect x="460" y="112" width="156" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve">
    <tspan x="472" y="130" fill="#ffffff">{count &gt; 0 &amp;&amp;</tspan>
    <tspan x="472" dy="18" fill="#ffffff">  </tspan><tspan fill="#ce9178">&lt;Badge</tspan>
    <tspan x="472" dy="18" fill="#ffffff">    n={count}</tspan><tspan fill="#ce9178">/&gt;</tspan><tspan fill="#ffffff">}</tspan>
  </text>

  <!-- Card 4: map -->
  <rect x="642" y="86" width="178" height="110" rx="8" fill="#0f1a0f" stroke="#2a4a2a" stroke-width="1.5"/>
  <text x="731" y="106" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">.map() 배열</text>
  <rect x="654" y="112" width="154" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve">
    <tspan x="666" y="130" fill="#ffffff">{items.map(</tspan><tspan fill="#7ec8e3" font-weight="600">item</tspan><tspan fill="#ffffff"> =&gt;</tspan>
    <tspan x="666" dy="18" fill="#ffffff">  </tspan><tspan fill="#ce9178">&lt;li</tspan><tspan fill="#ffffff"> key={item.id}</tspan><tspan fill="#ce9178">&gt;</tspan>
    <tspan x="666" dy="18" fill="#ffffff">    {item.name}</tspan><tspan fill="#ce9178">&lt;/li&gt;</tspan>
  </text>

  <!-- Divider -->
  <line x1="60" y1="218" x2="820" y2="218" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Not allowed section header -->
  <text x="66" y="242" font-size="16" font-weight="600" fill="#e05555">✗ 불가 — 문(Statement)은 표현식이 아님</text>

  <!-- Bad Card 1: if statement -->
  <rect x="60" y="252" width="220" height="130" rx="8" fill="#1a0f0f" stroke="#4a2a2a" stroke-width="1.5"/>
  <text x="170" y="272" text-anchor="middle" font-size="13" font-weight="600" fill="#e05555">if 문</text>
  <rect x="72" y="278" width="196" height="92" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve">
    <tspan x="84" y="298" fill="#9aa4b8">// ❌ 불가</tspan>
    <tspan x="84" dy="18" fill="#ce9178">&lt;div&gt;</tspan>
    <tspan x="84" dy="18" fill="#ffffff">  {</tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> (ok) </tspan><tspan fill="#ce9178">&lt;p/&gt;</tspan><tspan fill="#ffffff">}</tspan>
    <tspan x="84" dy="18" fill="#ce9178">&lt;/div&gt;</tspan>
  </text>

  <!-- Bad Card 2: for loop -->
  <rect x="295" y="252" width="220" height="130" rx="8" fill="#1a0f0f" stroke="#4a2a2a" stroke-width="1.5"/>
  <text x="405" y="272" text-anchor="middle" font-size="13" font-weight="600" fill="#e05555">for 문</text>
  <rect x="307" y="278" width="196" height="92" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve">
    <tspan x="319" y="298" fill="#9aa4b8">// ❌ 불가</tspan>
    <tspan x="319" dy="18" fill="#ffffff">{</tspan><tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> (</tspan><tspan fill="#7ec8e3" font-weight="600">let</tspan><tspan fill="#ffffff"> i=0;</tspan>
    <tspan x="319" dy="18" fill="#ffffff">  i &lt; 3; i++)</tspan>
    <tspan x="319" dy="18" fill="#ffffff">  items[i]}</tspan>
  </text>

  <!-- Bad Card 3: multiple roots -->
  <rect x="530" y="252" width="290" height="130" rx="8" fill="#1a0f0f" stroke="#4a2a2a" stroke-width="1.5"/>
  <text x="675" y="272" text-anchor="middle" font-size="13" font-weight="600" fill="#e05555">여러 루트 요소</text>
  <rect x="542" y="278" width="266" height="92" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve">
    <tspan x="554" y="298" fill="#9aa4b8">// ❌ 단일 루트 필수</tspan>
    <tspan x="554" dy="18" fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">&lt;h1/&gt;</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">&lt;p/&gt;</tspan><tspan fill="#ffffff">;</tspan>
    <tspan x="554" dy="18" fill="#9aa4b8">// ✓ Fragment으로 감싸기</tspan>
    <tspan x="554" dy="18" fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">&lt;&gt;&lt;h1/&gt;&lt;p/&gt;&lt;/&gt;</tspan><tspan fill="#ffffff">;</tspan>
  </text>

  <!-- Bottom note -->
  <text x="440" y="420" text-anchor="middle" font-size="13" fill="#7777cc">💡 JSX는 결국 함수 호출이므로 표현식만 허용 — 문(Statement)은 {}  안에 넣을 수 없다</text>
  <text x="440" y="442" text-anchor="middle" font-size="12" fill="#888">if/for가 필요하면 JSX 밖에서 처리하거나, 즉시 실행 화살표 함수(IIFE) 또는 .map()으로 대체한다</text>
  <text x="440" y="462" text-anchor="middle" font-size="12" fill="#888">&amp;&amp;는 왼쪽 값이 0이면 0을 렌더링하는 함정 — Boolean 변환(!!count &amp;&amp; ...)을 권장</text>
</svg>
