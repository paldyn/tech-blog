<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520" style="background:#0a0a0a">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">JSX 심화: 표현식과 특수 패턴</text>

  <!-- Spread attributes -->
  <rect x="60" y="68" width="370" height="100" rx="12" fill="#0f1825" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="245" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">속성 스프레드 (Spread Attributes)</text>
  <rect x="76" y="104" width="338" height="52" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> props = { id: </tspan><tspan fill="#ce9178">'btn'</tspan><tspan fill="#ffffff">, disabled: </tspan><tspan font-weight="600" fill="#7ec8e3">false</tspan><tspan fill="#ffffff"> };</tspan></text>
  <text x="92" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> &lt;</tspan><tspan fill="#55c555">button</tspan><tspan fill="#ffffff"> {...props}&gt;클릭&lt;/</tspan><tspan fill="#55c555">button</tspan><tspan fill="#ffffff">&gt;;</tspan></text>

  <!-- Conditional rendering patterns -->
  <rect x="450" y="68" width="370" height="100" rx="12" fill="#0f1825" stroke="#e0c044" stroke-width="1.5"/>
  <text x="635" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e0c044">조건부 렌더링 3가지 패턴</text>
  <rect x="466" y="104" width="338" height="52" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">{isOn ? &lt;</tspan><tspan fill="#55c555">span</tspan><tspan fill="#ffffff">&gt;ON&lt;/</tspan><tspan fill="#55c555">span</tspan><tspan fill="#ffffff">&gt; : </tspan><tspan font-weight="600" fill="#7ec8e3">null</tspan><tspan fill="#ffffff">}</tspan></text>
  <text x="482" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">{isOn </tspan><tspan fill="#e05555">&amp;&amp;</tspan><tspan fill="#ffffff"> &lt;</tspan><tspan fill="#55c555">span</tspan><tspan fill="#ffffff">&gt;표시&lt;/</tspan><tspan fill="#55c555">span</tspan><tspan fill="#ffffff">&gt;}</tspan></text>

  <!-- List rendering -->
  <rect x="60" y="186" width="370" height="120" rx="12" fill="#0d2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="245" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">리스트 렌더링 (map)</text>
  <rect x="76" y="222" width="338" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> items = [</tspan><tspan fill="#ce9178">'A'</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">'B'</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">'C'</tspan><tspan fill="#ffffff">];</tspan></text>
  <text x="92" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> &lt;</tspan><tspan fill="#55c555">ul</tspan><tspan fill="#ffffff">&gt;{items.map(item =&gt; (</tspan></text>
  <text x="92" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  &lt;</tspan><tspan fill="#55c555">li</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#cc77cc">key</tspan><tspan fill="#ffffff">={item}&gt;{item}&lt;/</tspan><tspan fill="#55c555">li</tspan><tspan fill="#ffffff">&gt;</tspan></text>

  <!-- Nested expressions -->
  <rect x="450" y="186" width="370" height="120" rx="12" fill="#1a1025" stroke="#cc77cc" stroke-width="1.5"/>
  <text x="635" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#cc77cc">JSX를 변수/함수로 분리</text>
  <rect x="466" y="222" width="338" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> badge = isNew </tspan><tspan fill="#e05555">&amp;&amp;</tspan><tspan fill="#ffffff"> &lt;</tspan><tspan fill="#55c555">span</tspan><tspan fill="#ffffff">&gt;NEW&lt;/</tspan><tspan fill="#55c555">span</tspan><tspan fill="#ffffff">&gt;;</tspan></text>
  <text x="482" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> &lt;</tspan><tspan fill="#55c555">div</tspan><tspan fill="#ffffff">&gt;{badge}&lt;/</tspan><tspan fill="#55c555">div</tspan><tspan fill="#ffffff">&gt;;</tspan></text>
  <text x="482" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">// 복잡한 JSX는 변수로 분리</text>

  <!-- Pitfalls -->
  <text x="440" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e05555">주의해야 할 함정</text>

  <rect x="60" y="352" width="760" height="140" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// count=0이면 화면에 "0" 출력! (0은 falsy이지만 숫자라 렌더링됨)</text>
  <text x="76" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#e05555">// ❌</tspan><tspan fill="#ffffff"> {count </tspan><tspan fill="#e05555">&amp;&amp;</tspan><tspan fill="#ffffff"> &lt;</tspan><tspan fill="#55c555">p</tspan><tspan fill="#ffffff">&gt;{count}개&lt;/</tspan><tspan fill="#55c555">p</tspan><tspan fill="#ffffff">&gt;}</tspan></text>
  <text x="76" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#55c555">// ✅</tspan><tspan fill="#ffffff"> {count &gt; </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#e05555">&amp;&amp;</tspan><tspan fill="#ffffff"> &lt;</tspan><tspan fill="#55c555">p</tspan><tspan fill="#ffffff">&gt;{count}개&lt;/</tspan><tspan fill="#55c555">p</tspan><tspan fill="#ffffff">&gt;}</tspan></text>
  <text x="76" y="434" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"> </text>
  <text x="76" y="454" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// JSX에서 객체를 직접 렌더링 불가 — 문자열/숫자/배열/null만 가능</text>
  <text x="76" y="474" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#e05555">// {obj}</tspan><tspan fill="#9aa4b8"> → Error: Objects are not valid as a React child</tspan></text>
</svg>
