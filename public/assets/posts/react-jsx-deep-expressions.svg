<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;background:#0a0a0a">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">JSX 표현식 완전 정리</text>
  <text x="440" y="72" font-size="14" fill="#888" text-anchor="middle">{} 안에 넣을 수 있는 것과 넣을 수 없는 것</text>

  <!-- Allowed -->
  <rect x="55" y="95" width="370" height="375" rx="8" fill="#0f1e12" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="120" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">넣을 수 있는 표현식</text>

  <rect x="70" y="132" width="340" height="68" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="151" font-size="12" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// 변수 / 속성 접근</text>
  <text x="82" y="169" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&lt;p&gt;{user.name}&lt;/p&gt;</text>
  <text x="82" y="187" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&lt;p&gt;{items[0]}&lt;/p&gt;</text>

  <rect x="70" y="212" width="340" height="68" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="231" font-size="12" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// 연산 / 함수 호출</text>
  <text x="82" y="249" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&lt;p&gt;{price * 1.1}&lt;/p&gt;</text>
  <text x="82" y="267" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&lt;p&gt;{formatDate(date)}&lt;/p&gt;</text>

  <rect x="70" y="292" width="340" height="68" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="311" font-size="12" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// 삼항 연산자</text>
  <text x="82" y="329" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">{isOk ? </text>
  <text x="132" y="329" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">'성공'</text>
  <text x="172" y="329" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> : </text>
  <text x="190" y="329" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">'실패'</text>
  <text x="230" y="329" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">}</text>
  <text x="82" y="347" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">{isOk &amp;&amp; &lt;span&gt;OK&lt;/span&gt;}</text>

  <rect x="70" y="372" width="340" height="68" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="391" font-size="12" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// 배열 / map</text>
  <text x="82" y="409" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">{items.map(i =&gt; </text>
  <text x="198" y="409" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&lt;li key={i.id}&gt;</text>
  <text x="82" y="427" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">  {i.name}&lt;/li&gt;)}</text>
  <text x="82" y="445" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// JSX 자체도 표현식</text>

  <!-- Not Allowed -->
  <rect x="455" y="95" width="370" height="375" rx="8" fill="#1e0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="640" y="120" font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">넣을 수 없는 것 (문, Statement)</text>

  <rect x="470" y="132" width="340" height="68" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="151" font-size="12" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// if문 ❌</text>
  <text x="482" y="169" font-size="13" fill="#e05555" font-family="'JetBrains Mono',monospace" xml:space="preserve">{if (ok) {</text>
  <text x="482" y="187" font-size="13" fill="#e05555" font-family="'JetBrains Mono',monospace" xml:space="preserve">  return &lt;p&gt;OK&lt;/p&gt;</text>
  <text x="482" y="205" font-size="13" fill="#e05555" font-family="'JetBrains Mono',monospace" xml:space="preserve">}}</text>

  <rect x="470" y="212" width="340" height="68" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="231" font-size="12" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// for 루프 ❌</text>
  <text x="482" y="249" font-size="13" fill="#e05555" font-family="'JetBrains Mono',monospace" xml:space="preserve">{for (let i=0; i&lt;5; i++) {</text>
  <text x="482" y="267" font-size="13" fill="#e05555" font-family="'JetBrains Mono',monospace" xml:space="preserve">  &lt;li&gt;{i}&lt;/li&gt;</text>
  <text x="482" y="285" font-size="13" fill="#e05555" font-family="'JetBrains Mono',monospace" xml:space="preserve">}}</text>

  <rect x="470" y="292" width="340" height="68" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="311" font-size="12" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// 렌더링 안 되는 값들 (무시됨)</text>
  <text x="482" y="329" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">{null}   </text>
  <text x="542" y="329" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// 아무것도 안 보임</text>
  <text x="482" y="347" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">{undefined}</text>
  <text x="482" y="365" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">{false}  {true}</text>

  <rect x="470" y="372" width="340" height="68" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="391" font-size="12" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// ⚠ 숫자 0은 렌더링됨!</text>
  <text x="482" y="409" font-size="13" fill="#e05555" font-family="'JetBrains Mono',monospace" xml:space="preserve">{count &amp;&amp; &lt;p&gt;목록&lt;/p&gt;}</text>
  <text x="482" y="427" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// count=0 이면 "0" 출력!</text>
  <text x="482" y="445" font-size="13" fill="#55c555" font-family="'JetBrains Mono',monospace" xml:space="preserve">// 해결: count &gt; 0 &amp;&amp; ...</text>
</svg>
