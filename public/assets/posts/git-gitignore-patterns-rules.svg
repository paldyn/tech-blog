<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">.gitignore 패턴 규칙</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">와일드카드·경로·부정(!) 패턴의 동작 방식</text>

  <!-- Pattern rules code block -->
  <rect x="60" y="88" width="760" height="208" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan x="76" y="112" fill="#9aa4b8"># 빈 줄·# 주석은 무시</tspan>
    <tspan x="76" dy="18" fill="#ce9178">*.log</tspan>
    <tspan fill="#9aa4b8">           # 모든 .log 파일 무시</tspan>
    <tspan x="76" dy="18" fill="#ce9178">build/</tspan>
    <tspan fill="#9aa4b8">          # build 디렉터리 전체 무시</tspan>
    <tspan x="76" dy="18" fill="#ce9178">**/tmp/</tspan>
    <tspan fill="#9aa4b8">         # 어느 위치든 tmp/ 무시</tspan>
    <tspan x="76" dy="18" fill="#ce9178">doc/*.txt</tspan>
    <tspan fill="#9aa4b8">       # doc 바로 아래 .txt만 (하위 X)</tspan>
    <tspan x="76" dy="18" fill="#ce9178">doc/**/*.txt</tspan>
    <tspan fill="#9aa4b8">     # doc 아래 모든 .txt (재귀)</tspan>
    <tspan x="76" dy="18" fill="#55c555">!important.log</tspan>
    <tspan fill="#9aa4b8">   # 예외: 이 파일은 무시하지 않음</tspan>
    <tspan x="76" dy="18" fill="#ce9178">/TODO</tspan>
    <tspan fill="#9aa4b8">           # 루트 TODO 파일만 무시</tspan>
  </text>

  <!-- Wildcard reference -->
  <text x="440" y="318" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">와일드카드 의미</text>

  <!-- Table rows -->
  <rect x="60" y="330" width="760" height="32" fill="#0d1520" rx="4" stroke="#1e2c4a" stroke-width="1"/>
  <text x="120" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">*</text>
  <text x="220" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">/ 를 제외한 임의 문자열 (단일 경로 레벨)</text>
  <text x="600" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">*.js  →  foo.js  (not  src/foo.js)</text>

  <rect x="60" y="364" width="760" height="32" fill="#0a0f1a" rx="4" stroke="#1e2c4a" stroke-width="1"/>
  <text x="120" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">**</text>
  <text x="220" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">경로 구분자 포함 임의 문자열 (여러 레벨)</text>
  <text x="600" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">**/*.log  →  모든 경로의 .log</text>

  <rect x="60" y="398" width="760" height="32" fill="#0d1520" rx="4" stroke="#1e2c4a" stroke-width="1"/>
  <text x="120" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">?</text>
  <text x="220" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">/ 를 제외한 임의 문자 하나</text>
  <text x="600" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">log?.txt  →  log1.txt, logA.txt</text>

  <rect x="60" y="432" width="760" height="24" fill="#0a0f1a" rx="4" stroke="#1e2c4a" stroke-width="1"/>
  <text x="120" y="448" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">!</text>
  <text x="220" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">부정 패턴 — 이전 규칙에서 제외된 파일을 다시 추적</text>
</svg>
