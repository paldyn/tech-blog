<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">행렬 연쇄 곱셈 — DP 테이블</text>
  <text x="440" y="66" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">행렬 A(10×30) · B(30×5) · C(5×60) — 최소 곱셈 횟수</text>

  <!-- Cost table dp[i][j] -->
  <text x="60" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">dp[i][j] = 행렬 i~j를 곱하는 최소 비용</text>

  <!-- Table header row -->
  <text x="110" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">j=1</text>
  <text x="180" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">j=2</text>
  <text x="250" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">j=3</text>
  <text x="320" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">j=4</text>

  <!-- Row i=1 -->
  <text x="62" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">i=1</text>
  <rect x="76" y="130" width="68" height="38" fill="#1a3a2a" rx="4" stroke="#55c555" stroke-width="1.5"/>
  <text x="110" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">0</text>
  <rect x="146" y="130" width="68" height="38" fill="#1a2a3a" rx="4" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">1500</text>
  <rect x="216" y="130" width="68" height="38" fill="#1a2a3a" rx="4" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="250" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">7500</text>
  <rect x="286" y="130" width="68" height="38" fill="#1a2a3a" rx="4" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="320" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">18000</text>

  <!-- Row i=2 -->
  <text x="62" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">i=2</text>
  <rect x="76" y="176" width="68" height="38" fill="#111" rx="4" stroke="#333" stroke-width="1"/>
  <text x="110" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#555">-</text>
  <rect x="146" y="176" width="68" height="38" fill="#1a3a2a" rx="4" stroke="#55c555" stroke-width="1.5"/>
  <text x="180" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">0</text>
  <rect x="216" y="176" width="68" height="38" fill="#1a2a3a" rx="4" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="250" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">9000</text>
  <rect x="286" y="176" width="68" height="38" fill="#1a2a3a" rx="4" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="320" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">-</text>

  <!-- Row i=3 -->
  <text x="62" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">i=3</text>
  <rect x="76" y="222" width="68" height="38" fill="#111" rx="4" stroke="#333" stroke-width="1"/>
  <text x="110" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#555">-</text>
  <rect x="146" y="222" width="68" height="38" fill="#111" rx="4" stroke="#333" stroke-width="1"/>
  <text x="180" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#555">-</text>
  <rect x="216" y="222" width="68" height="38" fill="#1a3a2a" rx="4" stroke="#55c555" stroke-width="1.5"/>
  <text x="250" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">0</text>
  <rect x="286" y="222" width="68" height="38" fill="#1a2a3a" rx="4" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="320" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">-</text>

  <!-- Row i=4 -->
  <text x="62" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">i=4</text>
  <rect x="76" y="268" width="68" height="38" fill="#111" rx="4" stroke="#333" stroke-width="1"/>
  <text x="110" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#555">-</text>
  <rect x="146" y="268" width="68" height="38" fill="#111" rx="4" stroke="#333" stroke-width="1"/>
  <text x="180" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#555">-</text>
  <rect x="216" y="268" width="68" height="38" fill="#111" rx="4" stroke="#333" stroke-width="1"/>
  <text x="250" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#555">-</text>
  <rect x="286" y="268" width="68" height="38" fill="#1a3a2a" rx="4" stroke="#55c555" stroke-width="1.5"/>
  <text x="320" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">0</text>

  <!-- Diagonal fill direction arrow -->
  <text x="420" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">채우는 방향:</text>
  <text x="420" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">대각선 방향으로</text>
  <text x="420" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">길이 1 → 2 → 3 ...</text>

  <!-- Recurrence annotation -->
  <rect x="420" y="98" width="420" height="136" fill="#111" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">점화식 (1-indexed, dims[0..n])</text>
  <text x="440" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">dp[i][j] = min over k (i ≤ k &lt; j):</text>
  <text x="440" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">  dp[i][k] + dp[k+1][j]</text>
  <text x="440" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">  + dims[i-1]*dims[k]*dims[j]</text>
  <text x="440" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">기저: dp[i][i] = 0 (단일 행렬)</text>
  <text x="440" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">시간 O(n³),  공간 O(n²)</text>

  <!-- Example calculation -->
  <text x="60" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">dp[1][3] 계산 예 (A·B·C, dims=[10,30,5,60]):</text>
  <rect x="60" y="342" width="760" height="136" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># k=1: (A)*(B*C) = dp[1][1]+dp[2][3]+10*30*60</text>
  <text x="76" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">#       = 0 + 9000 + 18000 = 27000</text>
  <text x="76" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># k=2: (A*B)*(C) = dp[1][2]+dp[3][3]+10*5*60</text>
  <text x="76" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">#       = 1500 + 0 + 3000 = 4500</text>
  <text x="76" y="434" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600" xml:space="preserve"># dp[1][3] = min(27000, 4500) = 4500  ← (A*B)*C 먼저</text>
  <text x="76" y="452" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 비교: 순서 바꾸면 27000 — 6배 차이!</text>
  <text x="76" y="470" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 시간 O(n³), 공간 O(n²)</text>
</svg>
