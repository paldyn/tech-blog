<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">OCI 이미지 매니페스트 구조</text>

  <!-- Manifest JSON -->
  <rect x="60" y="66" width="380" height="290" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="88" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// OCI Image Manifest v1.1</text>
  <text x="76" y="106" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">{</text>
  <text x="76" y="122" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  <tspan fill="#7ec8e3">"schemaVersion"</tspan>: <tspan fill="#b5cea8">2</tspan>,</text>
  <text x="76" y="138" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  <tspan fill="#7ec8e3">"mediaType"</tspan>: <tspan fill="#ce9178">"application/vnd.oci.image.manifest.v1+json"</tspan>,</text>
  <text x="76" y="154" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  <tspan fill="#7ec8e3">"config"</tspan>: {</text>
  <text x="76" y="170" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">    <tspan fill="#7ec8e3">"mediaType"</tspan>: <tspan fill="#ce9178">"...image.config.v1+json"</tspan>,</text>
  <text x="76" y="186" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">    <tspan fill="#7ec8e3">"digest"</tspan>: <tspan fill="#ce9178">"sha256:abc123..."</tspan>,</text>
  <text x="76" y="202" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">    <tspan fill="#7ec8e3">"size"</tspan>: <tspan fill="#b5cea8">7023</tspan></text>
  <text x="76" y="218" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  },</text>
  <text x="76" y="234" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  <tspan fill="#7ec8e3">"layers"</tspan>: [</text>
  <text x="76" y="250" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">    { <tspan fill="#7ec8e3">"mediaType"</tspan>: <tspan fill="#ce9178">"...layer.v1.tar+gzip"</tspan>,</text>
  <text x="76" y="266" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">      <tspan fill="#7ec8e3">"digest"</tspan>: <tspan fill="#ce9178">"sha256:def456..."</tspan>, <tspan fill="#7ec8e3">"size"</tspan>: <tspan fill="#b5cea8">1234567</tspan> },</text>
  <text x="76" y="282" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">    { <tspan fill="#7ec8e3">"digest"</tspan>: <tspan fill="#ce9178">"sha256:ghi789..."</tspan>, <tspan fill="#7ec8e3">"size"</tspan>: <tspan fill="#b5cea8">456789</tspan> }</text>
  <text x="76" y="298" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  ]</text>
  <text x="76" y="314" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">}</text>
  <text x="76" y="346" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8"># Content-Type: application/vnd.oci.image.manifest.v1+json</text>

  <!-- Right: Key points -->
  <rect x="470" y="66" width="350" height="290" rx="6" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="645" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">OCI 이미지 스펙 핵심 원칙</text>

  <rect x="486" y="102" width="318" height="48" rx="4" fill="#0a1628" stroke="#55c555" stroke-width="1"/>
  <text x="645" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">Content Addressability</text>
  <text x="645" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">모든 블롭은 sha256 다이제스트로 참조</text>

  <rect x="486" y="158" width="318" height="48" rx="4" fill="#0a1628" stroke="#ce9178" stroke-width="1"/>
  <text x="645" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ce9178" text-anchor="middle">불변성 (Immutability)</text>
  <text x="645" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">다이제스트가 같으면 내용이 동일 보장</text>

  <rect x="486" y="214" width="318" height="48" rx="4" fill="#0a1628" stroke="#b5cea8" stroke-width="1"/>
  <text x="645" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#b5cea8" text-anchor="middle">멀티 아키텍처 (Index)</text>
  <text x="645" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">단일 태그로 arm64/amd64 자동 선택</text>

  <rect x="486" y="270" width="318" height="48" rx="4" fill="#0a1628" stroke="#f5c542" stroke-width="1"/>
  <text x="645" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#f5c542" text-anchor="middle">레지스트리 독립</text>
  <text x="645" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Docker Hub·ECR·GCR·Harbor 모두 동일 API</text>

  <!-- Bottom label -->
  <text x="440" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">OCI 매니페스트 = 레이어 조합 레시피 — sha256 기반 내용 주소화로 이미지 무결성 보장</text>
</svg>
