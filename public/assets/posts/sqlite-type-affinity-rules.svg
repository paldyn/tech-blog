<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SQLite 타입 어파이니티 규칙</text>

  <!-- 5 affinity types -->
  <rect x="60" y="70" width="760" height="58" fill="#0f1a2e" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">5가지 타입 어파이니티</text>
  <text x="440" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8" text-anchor="middle">TEXT · NUMERIC · INTEGER · REAL · BLOB (NONE)</text>

  <!-- Rules table -->
  <!-- INTEGER affinity -->
  <rect x="60" y="146" width="760" height="56" fill="#1a1a2e" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="76" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">INTEGER</text>
  <text x="180" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">컬럼명에 INT 포함 (INTEGER, BIGINT, TINYINT, INT2, INT8 …)</text>
  <text x="180" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">정수로 변환 가능한 값 저장 시 INTEGER 스토리지 클래스 사용</text>

  <rect x="60" y="210" width="760" height="56" fill="#1a1a2e" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="76" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">REAL</text>
  <text x="180" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">REAL, DOUBLE, FLOAT, DOUBLE PRECISION 등 포함</text>
  <text x="180" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">정수도 IEEE-754 REAL로 변환해 저장</text>

  <rect x="60" y="274" width="760" height="56" fill="#1a1a2e" rx="6" stroke="#ce9178" stroke-width="1"/>
  <text x="76" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ce9178">TEXT</text>
  <text x="180" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">TEXT, CHAR, CLOB, VARCHAR, CHARACTER 등 포함</text>
  <text x="180" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">숫자도 텍스트로 변환해 저장 (비교 시 사전순)</text>

  <rect x="60" y="338" width="760" height="56" fill="#1a1a2e" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="76" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">NUMERIC</text>
  <text x="180" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">DECIMAL, NUMERIC, BOOLEAN, DATE, DATETIME 등</text>
  <text x="180" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">텍스트를 정수/실수로 변환 시도, 불가시 TEXT 유지</text>

  <rect x="60" y="402" width="760" height="56" fill="#1a1a2e" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#9aa4b8">BLOB (NONE)</text>
  <text x="180" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">BLOB, 또는 타입 미지정 / 매칭 없음</text>
  <text x="180" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">어떤 타입 변환도 하지 않음 — 입력값 그대로 저장</text>
</svg>
