<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" role="img" aria-label="FROM 인스트럭션 문법">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">FROM 인스트럭션 문법</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">이미지 참조 형식과 AS alias 활용</text>

  <!-- Syntax breakdown -->
  <rect x="60" y="98" width="760" height="70" rx="8" fill="#070b14" stroke="#1e2433" stroke-width="1"/>

  <!-- FROM keyword -->
  <text x="88" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="18" font-weight="700" fill="#7ec8e3" xml:space="preserve">FROM</text>
  <!-- image ref -->
  <text x="160" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="18" fill="#e8e8e8" xml:space="preserve"> node:20-alpine</text>
  <!-- AS -->
  <text x="370" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="18" fill="#7ec8e3" xml:space="preserve"> AS</text>
  <!-- alias -->
  <text x="406" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="18" fill="#ce9178" xml:space="preserve"> base</text>

  <!-- Annotations -->
  <!-- FROM arrow down -->
  <line x1="108" y1="170" x2="108" y2="196" stroke="#7ec8e3" stroke-width="1.5"/>
  <rect x="60" y="196" width="98" height="26" rx="4" fill="#0d1520" stroke="#1e3a5f" stroke-width="1"/>
  <text x="109" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">키워드 (필수)</text>

  <!-- image ref arrow -->
  <line x1="258" y1="170" x2="258" y2="196" stroke="#888" stroke-width="1.5"/>
  <rect x="160" y="196" width="200" height="26" rx="4" fill="#111318" stroke="#2a2d3a" stroke-width="1"/>
  <text x="260" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">이미지[:태그] 또는 @digest</text>

  <!-- AS arrow -->
  <line x1="388" y1="170" x2="388" y2="196" stroke="#7ec8e3" stroke-width="1.5"/>
  <rect x="370" y="196" width="40" height="26" rx="4" fill="#0d1520" stroke="#1e3a5f" stroke-width="1"/>
  <text x="390" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">AS</text>

  <!-- alias arrow -->
  <line x1="426" y1="170" x2="426" y2="196" stroke="#ce9178" stroke-width="1.5"/>
  <rect x="380" y="196" width="110" height="26" rx="4" fill="#1a100d" stroke="#3d2a1e" stroke-width="1"/>
  <text x="435" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">스테이지 별칭 (선택)</text>

  <!-- Examples section -->
  <text x="60" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e8e8e8">이미지 참조 형식 예시</text>

  <rect x="60" y="272" width="760" height="148" rx="8" fill="#070b14" stroke="#1e2433" stroke-width="1"/>

  <text x="76" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve"># 태그 생략 → latest (비권장)</text>
  <text x="76" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">FROM</text>
  <text x="120" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"> node</text>

  <text x="76" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve"># 태그 명시 (권장)</text>
  <text x="76" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">FROM</text>
  <text x="120" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"> node:</text>
  <text x="158" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">20</text>
  <text x="172" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">-alpine</text>

  <text x="76" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve"># digest로 정확한 버전 고정</text>
  <text x="76" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">FROM</text>
  <text x="120" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"> node@sha256:abc123...</text>

  <!-- bottom note -->
  <text x="440" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555">멀티 스테이지 빌드에서는 FROM이 여러 번 등장할 수 있다</text>
</svg>
