<?xml version="1.0" encoding="UTF-8"?>
<svg width="880" height="420" viewBox="0 0 880 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="60" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">람다의 전형적인 사용 패턴</text>
  <text x="60" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">sorted / map / filter — 함수를 인수로 넘길 때</text>

  <!-- Left: sorted key, map, filter -->
  <rect x="60" y="90" width="360" height="288" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="76" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># sorted key 인수</text>
  <text x="76" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">words = [</tspan><tspan fill="#ce9178">"banana"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"apple"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"fig"</tspan><tspan fill="#ffffff">]</tspan></text>
  <text x="76" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">sorted(words, key=</tspan><tspan fill="#7ec8e3">lambda</tspan><tspan fill="#ffffff"> w: len(w))</tspan></text>
  <text x="76" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># ['fig', 'apple', 'banana']</text>

  <text x="76" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># map</text>
  <text x="76" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">nums = [</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">4</tspan><tspan fill="#ffffff">]</tspan></text>
  <text x="76" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">list(map(</tspan><tspan fill="#7ec8e3">lambda</tspan><tspan fill="#ffffff"> x: x**</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">, nums))</tspan></text>
  <text x="76" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># [1, 4, 9, 16]</text>

  <text x="76" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># filter</text>
  <text x="76" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">list(filter(</tspan><tspan fill="#7ec8e3">lambda</tspan><tspan fill="#ffffff"> x: x%</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">==</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">, nums))</tspan></text>
  <text x="76" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># [2, 4]</text>
  <text x="76" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">대부분 컴프리헨션으로 대체 가능</text>

  <!-- Right: tkinter/callback, immediate call -->
  <rect x="460" y="90" width="360" height="288" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="476" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 다중 키 정렬</text>
  <text x="476" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">people = [</tspan></text>
  <text x="476" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    {</tspan><tspan fill="#ce9178">"name"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"B"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"age"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#b5cea8">30</tspan><tspan fill="#ffffff">},</tspan></text>
  <text x="476" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    {</tspan><tspan fill="#ce9178">"name"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"A"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"age"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#b5cea8">25</tspan><tspan fill="#ffffff">},</tspan></text>
  <text x="476" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">]</tspan></text>
  <text x="476" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">sorted(people,</tspan></text>
  <text x="476" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    key=</tspan><tspan fill="#7ec8e3">lambda</tspan><tspan fill="#ffffff"> p: p[</tspan><tspan fill="#ce9178">"age"</tspan><tspan fill="#ffffff">])</tspan></text>
  <text x="476" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 나이 기준 오름차순</text>

  <text x="476" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 즉시 실행 람다 (IIFE)</text>
  <text x="476" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">(</tspan><tspan fill="#7ec8e3">lambda</tspan><tspan fill="#ffffff"> x, y: x + y)(</tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">4</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="476" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 7 — 정의 즉시 호출</text>
  <text x="476" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8"># 실무에서 드물게 사용</text>
  <text x="476" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">key= 인수가 람다의 핵심 사용처</text>
</svg>
