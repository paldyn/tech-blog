<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">break · continue · label</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">루프 제어 흐름 시각화</text>

  <!-- break 박스 -->
  <rect x="60" y="96" width="360" height="180" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="80" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">break — 루프 즉시 탈출</text>
  <rect x="80" y="130" width="320" height="130" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="96" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">for</tspan><tspan fill="#e8e8e8"> (</tspan><tspan fill="#7ec8e3">let</tspan><tspan fill="#e8e8e8"> i = </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#e8e8e8">; i &lt; </tspan><tspan fill="#b5cea8">5</tspan><tspan fill="#e8e8e8">; i++) {</tspan></text>

  <text x="96" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">  if</tspan><tspan fill="#e8e8e8"> (i === </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#e8e8e8">) </tspan><tspan fill="#e05555">break</tspan><tspan fill="#e8e8e8">;</tspan></text>

  <text x="96" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  console.log(i);</text>
  <text x="96" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>
  <text x="96" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 출력: 0, 1, 2</text>
  <text x="96" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// i===3 에서 루프 종료</text>

  <!-- continue 박스 -->
  <rect x="460" y="96" width="360" height="180" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="480" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">continue — 현재 반복 건너뜀</text>
  <rect x="480" y="130" width="320" height="130" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="496" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">for</tspan><tspan fill="#e8e8e8"> (</tspan><tspan fill="#7ec8e3">let</tspan><tspan fill="#e8e8e8"> i = </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#e8e8e8">; i &lt; </tspan><tspan fill="#b5cea8">5</tspan><tspan fill="#e8e8e8">; i++) {</tspan></text>

  <text x="496" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  if</text>
  <text x="524" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> (i % </text>
  <text x="564" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">2</text>
  <text x="572" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> === </text>
  <text x="604" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">0</text>
  <text x="612" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">) </text>
  <text x="628" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">continue</text>
  <text x="700" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">;</text>
  <text x="496" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  console.log(i);</text>
  <text x="496" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>
  <text x="496" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 출력: 1, 3</text>
  <text x="496" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 짝수 건너뜀</text>

  <!-- label break 박스 -->
  <rect x="60" y="300" width="760" height="140" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="80" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">label — 중첩 루프 탈출</text>
  <rect x="80" y="334" width="740" height="90" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="96" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7777cc">outer</tspan><tspan fill="#e8e8e8">: </tspan><tspan fill="#7ec8e3">for</tspan><tspan fill="#e8e8e8"> (</tspan><tspan fill="#7ec8e3">let</tspan><tspan fill="#e8e8e8"> i = </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#e8e8e8">; i &lt; </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#e8e8e8">; i++) {</tspan></text>

  <text x="96" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  </tspan><tspan fill="#7ec8e3">for</tspan><tspan fill="#6a8aa0">                              </tspan><tspan fill="#e8e8e8"> (</tspan><tspan fill="#7ec8e3">let</tspan><tspan fill="#e8e8e8"> j = </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#e8e8e8">; j &lt; </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#e8e8e8">; j++) {</tspan><tspan fill="#7ec8e3">    if</tspan><tspan fill="#e8e8e8"> (i===</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8"> &amp;&amp; j===</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">) </tspan><tspan fill="#e05555">break</tspan><tspan fill="#7777cc"> outer</tspan><tspan fill="#e8e8e8">;</tspan></text>

  <text x="96" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  }</text>
  <text x="96" y="410" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>
  <text x="396" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// outer 루프까지 탈출</text>

</svg>
