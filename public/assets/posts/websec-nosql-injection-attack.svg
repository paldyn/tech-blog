<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">NoSQL 인젝션 공격 패턴</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">MongoDB 연산자 조작 · JavaScript 인젝션 · 타입 혼동 공격</text>

  <!-- Left: Operator Injection -->
  <rect x="60" y="96" width="360" height="180" rx="10" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">연산자 인젝션</text>
  <text x="240" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">JSON Body에 MongoDB 연산자 삽입</text>

  <rect x="80" y="158" width="320" height="82" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="96" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">// 취약 쿼리</text>
  <text xml:space="preserve" x="96" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">db.users.findOne({</text>
  <text xml:space="preserve" x="96" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">  username: req.body.username,</text>
  <text xml:space="preserve" x="96" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">  password: req.body.password})</text>

  <text x="240" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">{"username":"admin","password":{"$ne":"x"}}</text>
  <text x="240" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">→ password != "x" (항상 True) → 인증 우회!</text>

  <!-- Right: JS Injection -->
  <rect x="460" y="96" width="360" height="180" rx="10" fill="#1a1a0f" stroke="#e0a055" stroke-width="1.5"/>
  <text x="640" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e0a055">JavaScript 인젝션</text>
  <text x="640" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">$where 연산자에 JS 코드 삽입</text>

  <rect x="480" y="158" width="320" height="82" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="496" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">// $where로 JS 실행 (MongoDB)</text>
  <text xml:space="preserve" x="496" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">db.users.find({$where:</text>
  <text xml:space="preserve" x="496" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">  "this.username == '" + input + "'"})</text>
  <text xml:space="preserve" x="496" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555">// input = "x' || '1'=='1"</text>

  <text x="640" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">JS sleep()으로 Time-based도 가능</text>
  <text x="640" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e0a055">$where · mapReduce · $accumulator 주의</text>

  <!-- Defense -->
  <rect x="60" y="296" width="760" height="138" rx="10" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">방어 전략</text>

  <rect x="80" y="334" width="340" height="80" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="96" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">// ① 타입 강제 검증</text>
  <text xml:space="preserve" x="96" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" font-weight="600">if</text>
  <text xml:space="preserve" x="114" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff"> (typeof password !== </text>
  <text xml:space="preserve" x="278" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">'string'</text>
  <text xml:space="preserve" x="330" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">)</text>
  <text xml:space="preserve" x="96" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">  </text>
  <text xml:space="preserve" x="110" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" font-weight="600">throw</text>
  <text xml:space="preserve" x="152" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff"> new Error(</text>
  <text xml:space="preserve" x="218" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">"Invalid input"</text>
  <text xml:space="preserve" x="316" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">);</text>

  <rect x="440" y="334" width="360" height="80" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="456" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">// ② $where 연산자 사용 금지</text>
  <text xml:space="preserve" x="456" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">// 대신 조건 연산자만 사용</text>
  <text xml:space="preserve" x="456" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">db.users.findOne({username, password})</text>
</svg>
