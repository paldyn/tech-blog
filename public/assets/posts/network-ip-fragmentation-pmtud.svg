<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">PMTUD — Path MTU Discovery</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">단편화를 피하기 위해 경로 최소 MTU를 미리 탐색 (DF 비트 활용)</text>

  <defs>
    <marker id="pm1" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="pm2" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Host A -->
  <rect x="60" y="170" width="100" height="50" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="110" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle" font-weight="600">호스트 A</text>
  <text x="110" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">MTU 1500</text>

  <!-- Router (bottleneck) -->
  <circle cx="440" cy="195" r="32" fill="#111" stroke="#e05555" stroke-width="2"/>
  <text x="440" y="191" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle" font-weight="600">라우터</text>
  <text x="440" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">MTU 576</text>

  <!-- Host B -->
  <rect x="720" y="170" width="100" height="50" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="770" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle" font-weight="600">호스트 B</text>
  <text x="770" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">MTU 1500</text>

  <!-- Step 1: DF=1 packet sent -->
  <line x1="160" y1="185" x2="408" y2="185" stroke="#7ec8e3" stroke-width="2" marker-end="url(#pm1)"/>
  <text x="284" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">① DF=1, 1500B 패킷 전송</text>

  <!-- Step 2: ICMP Too Big returned -->
  <line x1="408" y1="210" x2="160" y2="218" stroke="#e05555" stroke-width="2" marker-end="url(#pm2)" stroke-dasharray="5,3"/>
  <text x="284" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">② ICMP Type 3 Code 4: Fragmentation Needed (Next-Hop MTU=576)</text>

  <!-- Step 3: Resend with smaller size -->
  <line x1="160" y1="225" x2="408" y2="217" stroke="#55c555" stroke-width="2" marker-end="url(#pm1)"/>
  <line x1="472" y1="195" x2="720" y2="195" stroke="#55c555" stroke-width="2" marker-end="url(#pm1)"/>
  <text x="284" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">③ 576B로 재전송 성공</text>

  <!-- Code box -->
  <rect x="60" y="300" width="760" height="96" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8e8e8" font-weight="600">단편화 비교</text>
  <text x="80" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">IPv4 단편화 </text>
  <text x="200" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">라우터 또는 송신 호스트에서 분할 (중간 경로 포함)</text>
  <text x="80" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">IPv6 단편화 </text>
  <text x="200" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">송신 호스트만 가능 (라우터 단편화 불가) → PMTUD 필수</text>
  <text x="80" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">PMTUD 실패 시: 방화벽이 ICMP 차단 → TCP 연결 블랙홀 (Clamp MSS로 우회)</text>
</svg>
