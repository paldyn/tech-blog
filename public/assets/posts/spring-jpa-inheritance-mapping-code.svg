<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">상속 매핑 어노테이션 — 코드 패턴</text>
  <text x="440" y="68" text-anchor="middle" fill="#888" font-size="13">@Inheritance · @DiscriminatorColumn · @DiscriminatorValue 핵심 어노테이션</text>

  <!-- Left: SINGLE_TABLE / JOINED parent class code -->
  <rect x="60" y="86" width="380" height="396" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="80" y="108" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// 부모 클래스 (추상 or 구체)</text>
  <text x="80" y="126" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">@Entity</text>
  <text x="80" y="144" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">@Inheritance(strategy =</text>
  <text x="80" y="162" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  InheritanceType.</text><text x="194" y="162" fill="#55c555" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">JOINED</text><text x="242" y="162" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">)</text>
  <text x="80" y="180" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">@DiscriminatorColumn(</text>
  <text x="80" y="198" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  name = </text><text x="142" y="198" fill="#ce9178" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">"dtype"</text><text x="196" y="198" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">,</text>
  <text x="80" y="216" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  discriminatorType = STRING)</text>
  <text x="80" y="234" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">public abstract class</text><text x="222" y="234" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> Animal {</text>
  <text x="80" y="252" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  @Id @GeneratedValue</text>
  <text x="80" y="270" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  protected</text><text x="148" y="270" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> Long id;</text>
  <text x="80" y="288" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  protected</text><text x="148" y="288" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> String name;</text>
  <text x="80" y="306" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">}</text>

  <text x="80" y="336" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// 자식 클래스</text>
  <text x="80" y="354" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">@Entity</text>
  <text x="80" y="372" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">@DiscriminatorValue(</text><text x="222" y="372" fill="#ce9178" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">"DOG"</text><text x="258" y="372" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">)</text>
  <text x="80" y="390" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">public class</text><text x="160" y="390" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> Dog extends Animal {</text>
  <text x="80" y="408" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  private</text><text x="136" y="408" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> String breed;</text>
  <text x="80" y="426" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">}</text>
  <text x="80" y="462" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// JOINED: dog 테이블에 id(FK), breed</text>
  <text x="80" y="476" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// SINGLE_TABLE: animal 테이블 한곳에</text>

  <!-- Right: Repository usage + @MappedSuperclass -->
  <rect x="460" y="86" width="360" height="396" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="480" y="108" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// 조회: 다형성 지원</text>
  <text x="480" y="126" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// Animal 조회 → Dog/Cat 모두 포함</text>
  <text x="480" y="144" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">List&lt;Animal&gt; animals =</text>
  <text x="480" y="162" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  animalRepo.findAll();</text>
  <text x="480" y="180" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// Dog 인스턴스는 Dog로 반환</text>

  <text x="480" y="210" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// 자식만 조회</text>
  <text x="480" y="228" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">List&lt;Dog&gt; dogs =</text>
  <text x="480" y="246" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  dogRepo.findAll();</text>
  <text x="480" y="264" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// JOINED: animal JOIN dog 쿼리</text>

  <line x1="480" y1="282" x2="800" y2="282" stroke="#3a4a6e"/>
  <text x="480" y="302" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// @MappedSuperclass: 테이블 없음</text>
  <text x="480" y="320" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// 공통 필드만 상속 목적</text>
  <text x="480" y="338" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">@MappedSuperclass</text>
  <text x="480" y="356" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">public abstract class</text><text x="638" y="356" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> BaseEntity {</text>
  <text x="480" y="374" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  @CreatedDate</text>
  <text x="480" y="392" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  private</text><text x="536" y="392" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> LocalDateTime createdAt;</text>
  <text x="480" y="410" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  @LastModifiedDate</text>
  <text x="480" y="428" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  private</text><text x="536" y="428" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> LocalDateTime updatedAt;</text>
  <text x="480" y="446" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">}</text>
  <text x="480" y="466" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// 상속받는 엔티티의 테이블에 포함</text>
  <text x="480" y="484" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// 실무에서 auditing 공통 필드에 사용</text>

  <!-- Bottom tip -->
  <text x="440" y="510" text-anchor="middle" fill="#7777cc" font-size="12">@MappedSuperclass ≠ @Inheritance — 테이블 없이 공통 필드만 상속할 때는 @MappedSuperclass 사용</text>
</svg>
