<svg height="460" width="880" viewBox="0 0 880 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>text { font-family: 'Wanted Sans Variable', 'Wanted Sans', -apple-system, sans-serif; }</style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#444"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#86efac"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="40" fill="#e8e8e8" font-size="18" font-weight="600" text-anchor="middle">모듈 번들링 &amp; 트리 쉐이킹</text>
  <line x1="40" y1="54" x2="840" y2="54" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Source files -->
  <text x="80" y="82" fill="#888" font-size="11" text-anchor="middle">소스 파일</text>

  <rect x="20" y="90" width="120" height="52" fill="#141414" rx="6"/>
  <text x="80" y="110" fill="#7dd3fc" font-size="11" text-anchor="middle" font-family="monospace, 'Courier New'">main.js</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="80" y="128" fill="#555" font-size="10" text-anchor="middle">import { add } from './math'</text>

  <rect x="20" y="156" width="120" height="52" fill="#141414" rx="6"/>
  <text x="80" y="176" fill="#7dd3fc" font-size="11" text-anchor="middle" font-family="monospace, 'Courier New'">math.js</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="80" y="194" fill="#555" font-size="10" text-anchor="middle">export add, multiply</text>

  <rect x="20" y="222" width="120" height="52" fill="#141414" rx="6"/>
  <text x="80" y="242" fill="#7dd3fc" font-size="11" text-anchor="middle" font-family="monospace, 'Courier New'">utils.js</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="80" y="260" fill="#555" font-size="10" text-anchor="middle">export format, parse</text>

  <!-- Arrow to bundler -->
  <line x1="142" y1="168" x2="218" y2="200" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="142" y1="116" x2="218" y2="190" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="142" y1="248" x2="218" y2="212" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Bundler -->
  <rect x="220" y="150" width="160" height="110" fill="#1a1020" rx="8"/>
  <text x="300" y="176" fill="#c4b5fd" font-size="13" font-weight="600" text-anchor="middle">번들러</text>
  <text x="300" y="196" fill="#888" font-size="10" text-anchor="middle">Webpack / Rollup</text>
  <text x="300" y="212" fill="#888" font-size="10" text-anchor="middle">Vite / esbuild</text>
  <line x1="240" y1="222" x2="360" y2="222" stroke="#2d1f4a" stroke-width="1"/>
  <text x="300" y="238" fill="#86efac" font-size="10" text-anchor="middle">✓ 트리 쉐이킹</text>
  <text x="300" y="252" fill="#86efac" font-size="10" text-anchor="middle">✓ 코드 분할</text>

  <!-- Arrow to outputs -->
  <line x1="382" y1="190" x2="455" y2="145" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="382" y1="205" x2="455" y2="235" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="382" y1="220" x2="455" y2="325" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output bundles -->
  <text x="620" y="82" fill="#888" font-size="11" text-anchor="middle">출력</text>

  <rect x="460" y="90" width="160" height="70" fill="#0d1f0d" rx="6"/>
  <text x="540" y="112" fill="#86efac" font-size="11" text-anchor="middle" font-family="monospace, 'Courier New'">bundle.js</text>
  <text x="540" y="130" fill="#555" font-size="10" text-anchor="middle">add만 포함 (multiply 제거)</text>
  <text x="540" y="148" fill="#444" font-size="10" text-anchor="middle">→ 트리 쉐이킹 효과</text>

  <rect x="460" y="180" width="160" height="70" fill="#0d1f0d" rx="6"/>
  <text x="540" y="202" fill="#86efac" font-size="11" text-anchor="middle" font-family="monospace, 'Courier New'">chunk.js</text>
  <text x="540" y="220" fill="#555" font-size="10" text-anchor="middle">동적 import() 분할</text>
  <text x="540" y="238" fill="#444" font-size="10" text-anchor="middle">→ 필요 시 지연 로딩</text>

  <rect x="460" y="270" width="160" height="70" fill="#1a0d0d" rx="6"/>
  <text x="540" y="292" fill="#f87171" font-size="11" text-anchor="middle" font-family="monospace, 'Courier New'">utils_dead.js</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="540" y="310" fill="#555" font-size="10" text-anchor="middle">format, parse 미사용</text>
  <text x="540" y="328" fill="#f87171" font-size="10" text-anchor="middle">→ 번들에서 제거됨</text>

  <!-- ESM only note -->
  <rect x="655" y="90" width="205" height="250" fill="#111" rx="8"/>
  <text x="757" y="114" fill="#fbbf24" font-size="12" font-weight="600" text-anchor="middle">트리 쉐이킹 조건</text>
  <line x1="675" y1="122" x2="842" y2="122" stroke="#1e1e1e" stroke-width="1"/>

  <text x="675" y="144" fill="#86efac" font-size="11">✓ ES Module 사용</text>
  <text x="675" y="162" fill="#86efac" font-size="11">✓ 정적 import/export</text>
  <text x="675" y="180" fill="#86efac" font-size="11">✓ 사이드 이펙트 없음</text>
  <text x="675" y="206" fill="#f87171" font-size="11">✗ CommonJS require()</text>
  <text x="675" y="224" fill="#f87171" font-size="11">✗ 동적 export 조작</text>
  <text x="675" y="242" fill="#f87171" font-size="11">✗ 전역 상태 변경</text>

  <line x1="675" y1="256" x2="842" y2="256" stroke="#1e1e1e" stroke-width="1"/>
  <text x="675" y="274" fill="#888" font-size="10">package.json에</text>
  <text x="675" y="290" fill="#fbbf24" font-size="10" font-family="monospace, 'Courier New'">"sideEffects": false</text>
  <text x="675" y="306" fill="#888" font-size="10">선언 시 번들러 힌트 제공</text>

  <!-- Footer -->
  <text x="440" y="430" fill="#444" font-size="10" text-anchor="middle">동적 import()는 코드 분할의 경계  ·  import() 반환값은 Promise&lt;Module&gt;</text>
</svg>
