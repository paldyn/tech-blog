<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340">
  <rect width="880" height="340" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="pcArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">생산자-소비자 패턴</text>

  <rect x="60" y="120" width="180" height="120" fill="#11161f" stroke="#55c555" stroke-width="1.5" rx="10"/>
  <text x="150" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555">생산자</text>
  <text x="150" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">put(item)</text>

  <rect x="350" y="120" width="180" height="120" fill="#11161f" stroke="#7ec8e3" stroke-width="1.5" rx="10"/>
  <text x="440" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">Queue</text>
  <text x="440" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">FIFO 버퍼</text>
  <text x="440" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">락 내장, 스레드 안전</text>

  <rect x="640" y="120" width="180" height="120" fill="#11161f" stroke="#7777cc" stroke-width="1.5" rx="10"/>
  <text x="730" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7777cc">소비자</text>
  <text x="730" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">get()</text>

  <path d="M 240 180 L 342 180" stroke="#7ec8e3" stroke-width="2" marker-end="url(#pcArr)"/>
  <path d="M 530 180 L 632 180" stroke="#7ec8e3" stroke-width="2" marker-end="url(#pcArr)"/>

  <text x="60" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9aa4b8">여러 스레드가 put/get 해도 락이 자동으로 보호 — 직접 락을 걸 필요 없다</text>
</svg>
