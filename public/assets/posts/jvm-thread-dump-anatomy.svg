<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">스레드 덤프 한 블록 읽기</text>

  <defs>
    <marker id="tdArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- code box -->
  <rect x="60" y="86" width="420" height="158" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="114" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ce9178">"exec-3"</tspan><tspan fill="#ffffff"> #34 daemon prio=5</tspan></text>
  <text x="76" y="138" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" fill="#ffffff" xml:space="preserve">  State: <tspan fill="#e05555" font-weight="600">BLOCKED</tspan> (on monitor)</text>
  <text x="76" y="162" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" fill="#ffffff" xml:space="preserve">  at Svc.charge(Svc.java:42)</text>
  <text x="76" y="186" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" fill="#ffffff" xml:space="preserve">  - waiting to lock &lt;0x..a&gt;</text>
  <text x="76" y="210" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" fill="#ffffff" xml:space="preserve">  - locked &lt;0x..b&gt;</text>

  <!-- annotations -->
  <rect x="560" y="116" width="260" height="44" rx="6" fill="#0f1626" stroke="#e05555" stroke-width="1"/>
  <text x="576" y="134" font-size="13" font-weight="600" fill="#e05555">현재 상태</text>
  <text x="576" y="152" font-size="12" fill="#bbb">BLOCKED = 모니터 락 대기</text>

  <rect x="560" y="172" width="260" height="44" rx="6" fill="#0f1626" stroke="#e0a055" stroke-width="1"/>
  <text x="576" y="190" font-size="13" font-weight="600" fill="#e0a055">기다리는 락</text>
  <text x="576" y="208" font-size="12" fill="#bbb">이 락을 누가 쥐었는지 추적</text>

  <rect x="560" y="228" width="260" height="44" rx="6" fill="#0f1626" stroke="#55c555" stroke-width="1"/>
  <text x="576" y="246" font-size="13" font-weight="600" fill="#55c555">이미 쥔 락</text>
  <text x="576" y="264" font-size="12" fill="#bbb">다른 스레드가 이걸 기다릴 수도</text>

  <!-- arrows -->
  <line x1="558" y1="138" x2="484" y2="138" stroke="#7ec8e3" stroke-width="2" marker-end="url(#tdArr)"/>
  <line x1="558" y1="190" x2="484" y2="186" stroke="#7ec8e3" stroke-width="2" marker-end="url(#tdArr)"/>
  <line x1="558" y1="246" x2="484" y2="210" stroke="#7ec8e3" stroke-width="2" marker-end="url(#tdArr)"/>
</svg>
