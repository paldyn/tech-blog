<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">볼륨이 필요한 이유</text>

  <!-- Left: No volume section -->
  <rect x="60" y="68" width="360" height="320" fill="#111318" rx="10" stroke="#1e2433" stroke-width="1"/>
  <text x="240" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e05555" text-anchor="middle">볼륨 없이</text>

  <!-- Container box left -->
  <rect x="100" y="118" width="280" height="90" fill="#1a1a2e" rx="8" stroke="#3a3a5e" stroke-width="1.5"/>
  <text x="165" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">컨테이너</text>
  <rect x="115" y="157" width="250" height="32" fill="#0f1625" rx="4" stroke="#2a3040" stroke-width="1"/>
  <text x="240" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">데이터 (컨테이너 레이어)</text>

  <!-- Down arrow -->
  <line x1="240" y1="212" x2="240" y2="250" stroke="#e05555" stroke-width="2"/>
  <polygon points="240,258 233,244 247,244" fill="#e05555"/>
  <text x="300" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">rm 실행</text>

  <!-- Deleted container -->
  <rect x="100" y="262" width="280" height="56" fill="#1a0f0f" rx="8" stroke="#e05555" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="240" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">컨테이너 삭제됨</text>
  <text x="240" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">⚠ 데이터도 함께 사라짐</text>

  <!-- Right: With volume section -->
  <rect x="460" y="68" width="360" height="320" fill="#111318" rx="10" stroke="#1e2433" stroke-width="1"/>
  <text x="640" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">볼륨 사용</text>

  <!-- Container box right -->
  <rect x="500" y="118" width="240" height="90" fill="#1a1a2e" rx="8" stroke="#3a3a5e" stroke-width="1.5"/>
  <text x="565" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">컨테이너</text>
  <rect x="515" y="157" width="210" height="32" fill="#0f1625" rx="4" stroke="#2a3040" stroke-width="1"/>
  <text x="620" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">/app/data (마운트 포인트)</text>

  <!-- Volume box right -->
  <rect x="722" y="130" width="84" height="66" fill="#0f1f2e" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="764" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">Volume</text>
  <text x="764" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">my-data</text>

  <!-- Connect line -->
  <line x1="725" y1="163" x2="726" y2="163" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="726" y1="163" x2="726" y2="163" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="725" y1="173" x2="725" y2="173" stroke="none"/>
  <!-- Arrow from container to volume -->
  <line x1="725" y1="163" x2="716" y2="163" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Down arrow right -->
  <line x1="590" y1="212" x2="590" y2="250" stroke="#e05555" stroke-width="2"/>
  <polygon points="590,258 583,244 597,244" fill="#e05555"/>
  <text x="650" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">rm 실행</text>

  <!-- Deleted container right -->
  <rect x="500" y="262" width="240" height="40" fill="#1a0f0f" rx="8" stroke="#e05555" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="620" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">컨테이너 삭제됨</text>

  <!-- Volume still alive -->
  <rect x="722" y="270" width="84" height="66" fill="#0f1f2e" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="764" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">Volume</text>
  <text x="764" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">✓ 유지</text>

  <!-- Arrow pointing to volume (still exists) -->
  <line x1="740" y1="303" x2="744" y2="303" stroke="#55c555" stroke-width="1.5"/>

  <!-- Bottom note right -->
  <text x="640" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">✓ 데이터 보존됨</text>
  <text x="240" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">✗ 재현 불가능, 복구 불가</text>

  <!-- Center divider -->
  <line x1="440" y1="80" x2="440" y2="400" stroke="#2a2a3e" stroke-width="1" stroke-dasharray="4,4"/>
</svg>
