<svg width="880" height="400" viewBox="0 0 880 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">볼록 껍질: 점들을 감싸는 고무줄</text>

  <text x="230" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#888">입력: 점 집합</text>
  <text x="650" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">출력: 볼록 껍질</text>

  <!-- left: scattered points -->
  <g fill="#7ec8e3">
    <circle cx="120" cy="320" r="5"/>
    <circle cx="200" cy="350" r="5"/>
    <circle cx="340" cy="330" r="5"/>
    <circle cx="380" cy="240" r="5"/>
    <circle cx="300" cy="150" r="5"/>
    <circle cx="180" cy="160" r="5"/>
    <circle cx="110" cy="230" r="5"/>
    <circle cx="240" cy="250" r="5"/>
    <circle cx="270" cy="300" r="5"/>
    <circle cx="200" cy="220" r="5"/>
  </g>

  <!-- right: hull -->
  <g transform="translate(420,0)">
    <polygon points="120,320 200,350 340,330 380,240 300,150 180,160 110,230"
             fill="#55c55522" stroke="#55c555" stroke-width="2.5"/>
    <g fill="#7ec8e3">
      <circle cx="340" cy="330" r="5"/>
      <circle cx="380" cy="240" r="5"/>
      <circle cx="300" cy="150" r="5"/>
      <circle cx="180" cy="160" r="5"/>
      <circle cx="110" cy="230" r="5"/>
      <circle cx="240" cy="250" r="4" fill="#555"/>
      <circle cx="270" cy="300" r="4" fill="#555"/>
      <circle cx="200" cy="220" r="4" fill="#555"/>
    </g>
    <g fill="#55c555">
      <circle cx="120" cy="320" r="5"/>
      <circle cx="200" cy="350" r="5"/>
    </g>
  </g>

  <text x="650" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">초록 = 껍질 꼭짓점,  회색 = 내부 점</text>
  <text x="230" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">모든 점을 감싸는 가장 작은 볼록 다각형</text>
</svg>
