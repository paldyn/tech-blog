<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" width="880" height="540">
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">티어드 컴파일 5단계</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">Level 0 → 1 → 2 → 3 → 4 전환 흐름</text>

  <!-- Level boxes -->
  <!-- Level 0: Interpreter -->
  <rect x="60" y="100" width="160" height="76" rx="8" fill="#12182b" stroke="#1e2433" stroke-width="1.5"/>
  <text x="140" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#888" text-anchor="middle">Level 0</text>
  <text x="140" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">Interpreter</text>
  <text x="140" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">바이트코드 해석 실행</text>

  <!-- Arrow 0→1 -->
  <line x1="220" y1="138" x2="248" y2="138" stroke="#444" stroke-width="2"/>
  <polygon points="248,132 260,138 248,144" fill="#444"/>

  <!-- Level 1: C1 simple -->
  <rect x="260" y="100" width="160" height="76" rx="8" fill="#12182b" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="340" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">Level 1</text>
  <text x="340" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">C1 (단순)</text>
  <text x="340" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">프로파일링 없음</text>

  <!-- Arrow 1→2 or 1→4 bypass -->
  <line x1="420" y1="138" x2="448" y2="138" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="448,132 460,138 448,144" fill="#7ec8e3"/>

  <!-- Level 2: C1 limited -->
  <rect x="460" y="100" width="160" height="76" rx="8" fill="#12182b" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="540" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">Level 2</text>
  <text x="540" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">C1 (제한 계측)</text>
  <text x="540" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">호출·루프 카운터만</text>

  <!-- Arrow 2→3 -->
  <line x1="620" y1="138" x2="648" y2="138" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="648,132 660,138 648,144" fill="#7ec8e3"/>

  <!-- Level 3: C1 full profiling -->
  <rect x="660" y="100" width="160" height="76" rx="8" fill="#12182b" stroke="#7777cc" stroke-width="1.5"/>
  <text x="740" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">Level 3</text>
  <text x="740" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">C1 (완전 계측)</text>
  <text x="740" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">타입·분기 프로파일</text>

  <!-- Arrow 3→4 (down) -->
  <line x1="740" y1="176" x2="740" y2="218" stroke="#55c555" stroke-width="2"/>
  <polygon points="734,218 740,230 746,218" fill="#55c555"/>

  <!-- Level 4 box (bottom right) -->
  <rect x="600" y="230" width="240" height="80" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="2"/>
  <text x="720" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">Level 4 — C2 (완전 최적화)</text>
  <text x="720" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">인라이닝 · 탈출분석 · SIMD</text>
  <text x="720" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">공격적 투기적 최적화</text>

  <!-- Bypass arrow: 0→4 for very simple methods -->
  <path d="M 140 176 Q 140 340 430 340 Q 600 340 600 310" stroke="#55c555" stroke-width="1.5" fill="none" stroke-dasharray="8,4"/>
  <polygon points="594,313 600,302 606,313" fill="#55c555"/>
  <text x="350" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">빠른 경로 (Trivial Method)</text>

  <!-- Transition condition table -->
  <rect x="60" y="390" width="760" height="130" rx="8" fill="#0f0f1a" stroke="#1e2433" stroke-width="1.5"/>
  <text x="440" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">단계 전환 조건</text>

  <!-- Header row -->
  <text x="120" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">전환</text>
  <text x="440" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">조건</text>
  <text x="720" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">설명</text>
  <line x1="80" y1="438" x2="800" y2="438" stroke="#1e2433" stroke-width="1"/>

  <text x="120" y="455" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">0 → 3</text>
  <text x="440" y="455" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">invocation / backedge 카운터 초과</text>
  <text x="720" y="455" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">일반 메서드 기본 경로</text>

  <text x="120" y="474" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">3 → 4</text>
  <text x="440" y="474" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">C2 큐 용량 있음 + 프로파일 충분</text>
  <text x="720" y="474" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Hot Method 최종 최적화</text>

  <text x="120" y="493" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">3 → 1</text>
  <text x="440" y="493" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">C2 큐 포화 (백프레셔)</text>
  <text x="720" y="493" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">C2 바쁠 때 C1 단순으로 강등</text>

  <text x="120" y="512" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">4 → 0</text>
  <text x="440" y="512" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">가정 위반 (Deoptimization)</text>
  <text x="720" y="512" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">인터프리터로 재진입</text>
</svg>
