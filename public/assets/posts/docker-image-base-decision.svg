<svg width="880" height="500" viewBox="0 0 880 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">베이스 이미지 선택 결정 흐름</text>
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">질문 3개로 최적 베이스 이미지 결정</text>

  <!-- Q1 -->
  <rect x="300" y="104" width="280" height="52" fill="#0d1117" rx="8" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">Q1. 정적 바이너리만 있나요?</text>
  <text x="440" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">(Go, Rust CGO 없음 등)</text>

  <!-- Yes → scratch -->
  <line x1="300" y1="130" x2="140" y2="200" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="136,204 130,191 142,194" fill="#55c555"/>
  <text x="196" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">예</text>
  <rect x="60" y="204" width="160" height="44" fill="#0f1a0f" rx="8" stroke="#55c555" stroke-width="1"/>
  <text x="140" y="231" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">scratch</text>

  <!-- No → Q2 -->
  <line x1="440" y1="156" x2="440" y2="208" stroke="#e8e8e8" stroke-width="1.5"/>
  <polygon points="440,214 434,200 446,200" fill="#e8e8e8"/>
  <text x="454" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">아니요</text>

  <!-- Q2 -->
  <rect x="300" y="214" width="280" height="52" fill="#0d1117" rx="8" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">Q2. 셸·디버깅 도구 필요?</text>
  <text x="440" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">(exec, 패키지 설치 등)</text>

  <!-- No → distroless -->
  <line x1="580" y1="240" x2="720" y2="240" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="726,240 712,234 712,246" fill="#7777cc"/>
  <text x="648" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">아니요</text>
  <rect x="726" y="218" width="120" height="44" fill="#0f1a0f" rx="8" stroke="#7777cc" stroke-width="1"/>
  <text x="786" y="245" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">distroless</text>

  <!-- Yes → Q3 -->
  <line x1="440" y1="266" x2="440" y2="318" stroke="#e8e8e8" stroke-width="1.5"/>
  <polygon points="440,324 434,310 446,310" fill="#e8e8e8"/>
  <text x="454" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">예</text>

  <!-- Q3 -->
  <rect x="300" y="324" width="280" height="52" fill="#0d1117" rx="8" stroke="#e05555" stroke-width="2"/>
  <text x="440" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">Q3. musl 호환성 검증됨?</text>
  <text x="440" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">(C 라이브러리 의존 여부)</text>

  <!-- Yes → alpine -->
  <line x1="300" y1="350" x2="140" y2="408" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="136,412 130,399 142,402" fill="#55c555"/>
  <text x="196" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">예</text>
  <rect x="60" y="412" width="160" height="44" fill="#0f1a0f" rx="8" stroke="#55c555" stroke-width="1"/>
  <text x="140" y="439" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">alpine</text>

  <!-- No → debian-slim -->
  <line x1="580" y1="350" x2="720" y2="408" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="724,412 714,400 726,398" fill="#7ec8e3"/>
  <text x="660" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">불확실 / 아니요</text>
  <rect x="724" y="412" width="120" height="44" fill="#0d1117" rx="8" stroke="#7ec8e3" stroke-width="1"/>
  <text x="784" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" font-weight="700" fill="#7ec8e3" text-anchor="middle">debian-slim</text>
  <text x="784" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">(안전한 기본 선택)</text>

  <!-- Tip -->
  <rect x="60" y="470" width="560" height="22" fill="#111820" rx="4" stroke="#7ec8e3" stroke-width="1"/>
  <text x="340" y="485" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">멀티 스테이지 빌드: 빌드는 full 이미지 / 실행은 slim·distroless 사용 권장</text>
</svg>
