<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <style>
      text { font-family: 'Wanted Sans Variable', 'Wanted Sans', -apple-system, sans-serif; }
      .main-title { font-size: 14px; font-weight: 700; fill: #e8e8e8; letter-spacing: 0.06em; }
      .axis-label { font-size: 11px; font-weight: 600; fill: #888; letter-spacing: 0.05em; }
      .token-label { font-size: 12px; fill: #ccc; font-weight: 600; }
      .pct-text { font-size: 11px; fill: #777; }
      .note-text { font-size: 10px; fill: #555; }
      .explain-title { font-size: 13px; font-weight: 700; fill: #e8e8e8; }
      .explain-text { font-size: 11px; fill: #888; }
      .legend-text { font-size: 10px; fill: #666; }
    </style>
  </defs>

  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Main title -->
  <text x="330" y="36" class="main-title" text-anchor="middle">자기 어텐션 (Self-Attention) 스코어 행렬</text>
  <text x="330" y="52" class="note-text" text-anchor="middle">각 토큰(쿼리)이 전체 시퀀스(키)를 얼마나 참조하는지 나타냅니다</text>

  <!-- Axis labels -->
  <text x="330" y="70" class="axis-label" text-anchor="middle">키 (Key) →</text>
  <!-- Query label (rotated) -->
  <text x="30" y="200" class="axis-label" text-anchor="middle" transform="rotate(-90,30,200)">← 쿼리 (Query)</text>

  <!-- Column headers: 나는, 고양이를, 정말, 좋아해 -->
  <text x="195" y="82" class="token-label" text-anchor="middle">나는</text>
  <text x="285" y="82" class="token-label" text-anchor="middle">고양이를</text>
  <text x="375" y="82" class="token-label" text-anchor="middle">정말</text>
  <text x="465" y="82" class="token-label" text-anchor="middle">좋아해</text>

  <!-- Row labels (queries) -->
  <text x="140" y="115" class="token-label" text-anchor="end">나는</text>
  <text x="140" y="175" class="token-label" text-anchor="end">고양이를</text>
  <text x="140" y="235" class="token-label" text-anchor="end">정말</text>
  <text x="140" y="295" class="token-label" text-anchor="end">좋아해</text>

  <!-- ===== MATRIX CELLS ===== -->
  <!-- Cell fill colors based on attention weight:
       0.10 → #181818 | 0.15 → #1e1e1e | 0.20 → #242424
       0.30 → #2c2c2c | 0.35 → #303030 | 0.40 → #363636
       0.45 → #3c3c3c | 0.50 → #424242 | 0.55 → #484848 -->

  <!-- Row 0: 나는 → [0.50, 0.20, 0.10, 0.20] -->
  <rect x="150" y="88" width="90" height="54" fill="#424242" stroke="#2e2e2e" stroke-width="1" rx="3"/>
  <text x="195" y="119" class="pct-text" text-anchor="middle">50%</text>

  <rect x="240" y="88" width="90" height="54" fill="#242424" stroke="#2e2e2e" stroke-width="1" rx="3"/>
  <text x="285" y="119" class="pct-text" text-anchor="middle">20%</text>

  <rect x="330" y="88" width="90" height="54" fill="#181818" stroke="#2e2e2e" stroke-width="1" rx="3"/>
  <text x="375" y="119" class="pct-text" text-anchor="middle">10%</text>

  <rect x="420" y="88" width="90" height="54" fill="#242424" stroke="#2e2e2e" stroke-width="1" rx="3"/>
  <text x="465" y="119" class="pct-text" text-anchor="middle">20%</text>

  <!-- Row 1: 고양이를 → [0.15, 0.55, 0.15, 0.15] -->
  <rect x="150" y="148" width="90" height="54" fill="#1e1e1e" stroke="#2e2e2e" stroke-width="1" rx="3"/>
  <text x="195" y="179" class="pct-text" text-anchor="middle">15%</text>

  <rect x="240" y="148" width="90" height="54" fill="#484848" stroke="#3e3e3e" stroke-width="1.5" rx="3"/>
  <text x="285" y="179" class="pct-text" text-anchor="middle" fill="#aaa">55%</text>

  <rect x="330" y="148" width="90" height="54" fill="#1e1e1e" stroke="#2e2e2e" stroke-width="1" rx="3"/>
  <text x="375" y="179" class="pct-text" text-anchor="middle">15%</text>

  <rect x="420" y="148" width="90" height="54" fill="#1e1e1e" stroke="#2e2e2e" stroke-width="1" rx="3"/>
  <text x="465" y="179" class="pct-text" text-anchor="middle">15%</text>

  <!-- Row 2: 정말 → [0.10, 0.35, 0.45, 0.10] -->
  <rect x="150" y="208" width="90" height="54" fill="#181818" stroke="#2e2e2e" stroke-width="1" rx="3"/>
  <text x="195" y="239" class="pct-text" text-anchor="middle">10%</text>

  <rect x="240" y="208" width="90" height="54" fill="#303030" stroke="#2e2e2e" stroke-width="1" rx="3"/>
  <text x="285" y="239" class="pct-text" text-anchor="middle">35%</text>

  <rect x="330" y="208" width="90" height="54" fill="#3c3c3c" stroke="#2e2e2e" stroke-width="1" rx="3"/>
  <text x="375" y="239" class="pct-text" text-anchor="middle">45%</text>

  <rect x="420" y="208" width="90" height="54" fill="#181818" stroke="#2e2e2e" stroke-width="1" rx="3"/>
  <text x="465" y="239" class="pct-text" text-anchor="middle">10%</text>

  <!-- Row 3: 좋아해 → [0.20, 0.40, 0.10, 0.30] -->
  <rect x="150" y="268" width="90" height="54" fill="#242424" stroke="#2e2e2e" stroke-width="1" rx="3"/>
  <text x="195" y="299" class="pct-text" text-anchor="middle">20%</text>

  <rect x="240" y="268" width="90" height="54" fill="#363636" stroke="#2e2e2e" stroke-width="1" rx="3"/>
  <text x="285" y="299" class="pct-text" text-anchor="middle">40%</text>

  <rect x="330" y="268" width="90" height="54" fill="#181818" stroke="#2e2e2e" stroke-width="1" rx="3"/>
  <text x="375" y="299" class="pct-text" text-anchor="middle">10%</text>

  <rect x="420" y="268" width="90" height="54" fill="#2c2c2c" stroke="#2e2e2e" stroke-width="1" rx="3"/>
  <text x="465" y="299" class="pct-text" text-anchor="middle">30%</text>

  <!-- ===== EXPLANATION PANEL (right) ===== -->
  <rect x="560" y="80" width="300" height="250" fill="#0d0d0d" stroke="#222" stroke-width="1" rx="8"/>

  <text x="710" y="105" class="explain-title" text-anchor="middle">어텐션이 하는 일</text>

  <line x1="580" y1="114" x2="840" y2="114" stroke="#222" stroke-width="1"/>

  <text x="580" y="136" class="explain-text">각 토큰은 문장 전체를 동시에 참조합니다.</text>
  <text x="580" y="158" class="explain-text">셀이 밝을수록 → 높은 어텐션 가중치</text>
  <text x="580" y="180" class="explain-text">셀이 어두울수록 → 낮은 어텐션 가중치</text>

  <line x1="580" y1="196" x2="840" y2="196" stroke="#1e1e1e" stroke-width="1"/>

  <text x="580" y="216" class="explain-text">예시 해석:</text>
  <text x="580" y="234" class="explain-text">· "고양이를"은 자기 자신에 55%,</text>
  <text x="580" y="252" class="explain-text">  "나는"에 15% 어텐션을 둡니다.</text>
  <text x="580" y="270" class="explain-text">· "좋아해"는 "고양이를"에 40%로</text>
  <text x="580" y="288" class="explain-text">  가장 강하게 주목합니다.</text>

  <line x1="580" y1="304" x2="840" y2="304" stroke="#1e1e1e" stroke-width="1"/>

  <text x="580" y="320" class="explain-text">이것이 문맥을 이해하는 방식입니다.</text>

  <!-- Legend at bottom -->
  <text x="155" y="354" class="legend-text">밝음</text>
  <rect x="180" y="342" width="18" height="12" fill="#484848" rx="2"/>
  <rect x="202" y="342" width="18" height="12" fill="#363636" rx="2"/>
  <rect x="224" y="342" width="18" height="12" fill="#242424" rx="2"/>
  <rect x="246" y="342" width="18" height="12" fill="#181818" rx="2"/>
  <text x="270" y="354" class="legend-text">어두움</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="330" y="354" class="legend-text">= 어텐션 가중치 높음 / 낮음</text>

  <!-- Bottom note -->
  <text x="440" y="380" class="note-text" text-anchor="middle">계산: Attention(Q, K, V) = softmax( Q·Kᵀ / √dₖ ) · V</text>

</svg>
