<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" fill="#e8e8e8" font-size="22" font-weight="700" text-anchor="middle">팝업 스택 — 중첩 팝업 구조</text>

  <!-- Layer 0: Main -->
  <rect x="60" y="80" width="760" height="360" rx="8" fill="#0f172a" stroke="#374151" stroke-width="1.5"/>
  <text x="100" y="108" fill="#888" font-size="13">Main Form</text>
  <text x="100" y="128" fill="#7ec8e3" font-size="12">openPopup("ListPopup", ...)</text>

  <!-- Layer 1: ListPopup -->
  <rect x="140" y="140" width="580" height="260" rx="8" fill="#1e293b" stroke="#7ec8e3" stroke-width="2"/>
  <text x="175" y="165" fill="#7ec8e3" font-size="13" font-weight="600">ListPopup (1단계)</text>
  <text x="175" y="185" fill="#888" font-size="12">openPopup("DetailPopup", ...)</text>

  <!-- Layer 2: DetailPopup -->
  <rect x="220" y="200" width="420" height="170" rx="8" fill="#1e3a5f" stroke="#55c555" stroke-width="2"/>
  <text x="255" y="225" fill="#55c555" font-size="13" font-weight="600">DetailPopup (2단계)</text>
  <text x="255" y="245" fill="#888" font-size="12">openPopup("ConfirmPopup", ...)</text>

  <!-- Layer 3: ConfirmPopup -->
  <rect x="300" y="265" width="260" height="86" rx="8" fill="#2d1b69" stroke="#7777cc" stroke-width="2"/>
  <text x="340" y="290" fill="#7777cc" font-size="13" font-weight="600">ConfirmPopup (3단계)</text>
  <text x="340" y="310" fill="#888" font-size="12">closePopup(1)</text>
  <text x="340" y="328" fill="#888" font-size="12">→ DetailPopup 콜백</text>

  <!-- Stack depth indicator -->
  <rect x="780" y="140" width="80" height="260" rx="4" fill="#111827" stroke="#374151"/>
  <text x="820" y="164" fill="#888" font-size="11" text-anchor="middle">스택</text>
  <rect x="790" y="310" width="60" height="28" rx="3" fill="#7777cc" fill-opacity="0.3" stroke="#7777cc"/>
  <text x="820" y="329" fill="#7777cc" font-size="10" text-anchor="middle">Confirm</text>
  <rect x="790" y="278" width="60" height="28" rx="3" fill="#55c555" fill-opacity="0.3" stroke="#55c555"/>
  <text x="820" y="297" fill="#55c555" font-size="10" text-anchor="middle">Detail</text>
  <rect x="790" y="246" width="60" height="28" rx="3" fill="#7ec8e3" fill-opacity="0.3" stroke="#7ec8e3"/>
  <text x="820" y="265" fill="#7ec8e3" font-size="10" text-anchor="middle">List</text>
  <rect x="790" y="214" width="60" height="28" rx="3" fill="#374151" stroke="#374151"/>
  <text x="820" y="233" fill="#888" font-size="10" text-anchor="middle">Main</text>
  <text x="820" y="395" fill="#888" font-size="10" text-anchor="middle">TOP</text>
  <text x="820" y="182" fill="#888" font-size="10" text-anchor="middle">BOTTOM</text>

  <!-- Close order annotation -->
  <text x="440" y="455" fill="#888" font-size="12" text-anchor="middle">닫힘 순서: ConfirmPopup → DetailPopup → ListPopup → Main (LIFO)</text>
</svg>
