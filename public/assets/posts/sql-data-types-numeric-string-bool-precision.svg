<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">NUMERIC(p,s) vs FLOAT — 정밀도 차이</text>

  <!-- NUMERIC example -->
  <rect x="60" y="72" width="360" height="230" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="96" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#9aa4b8">-- NUMERIC: 정확한 소수 계산</text>
  <text x="76" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">SELECT</text>
  <text x="76" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#b5cea8">        0.1</text>
  <text x="76" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">           ::NUMERIC +</text>
  <text x="76" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#b5cea8">       0.2</text>
  <text x="76" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">          ::NUMERIC;</text>
  <text x="76" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#9aa4b8">-- 결과: 0.3 (정확)</text>

  <line x1="76" y1="164" x2="404" y2="164" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#9aa4b8">-- FLOAT: 부동소수점 오차</text>
  <text x="76" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">SELECT</text>
  <text x="76" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#b5cea8">        0.1</text>
  <text x="76" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">           ::FLOAT +</text>
  <text x="76" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#b5cea8">       0.2</text>
  <text x="76" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">          ::FLOAT;</text>
  <text x="76" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#e05555">-- 결과: 0.30000000000000004 !</text>
  <text x="76" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#9aa4b8">-- 금액 계산엔 절대 사용 금지</text>
  <text x="76" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff"> </text>

  <!-- VARCHAR vs CHAR comparison -->
  <rect x="460" y="72" width="360" height="230" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="640" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">CHAR vs VARCHAR</text>

  <text x="476" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" font-weight="600">CHAR(10)에 'abc' 저장</text>
  <rect x="476" y="130" width="180" height="28" fill="#0d1520" rx="4"/>
  <text x="484" y="148" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="12" fill="#ffffff">'abc       '</text>
  <text x="670" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">(공백 패딩 7칸)</text>

  <text x="476" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" font-weight="600">VARCHAR(10)에 'abc' 저장</text>
  <rect x="476" y="184" width="180" height="28" fill="#0d1520" rx="4"/>
  <text x="484" y="202" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="12" fill="#ffffff">'abc'</text>
  <text x="670" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">(3바이트만 저장)</text>

  <text x="476" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">사용 권장</text>
  <text x="476" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">CHAR: 고정 코드값(ISO 국가코드, 성별 등)</text>
  <text x="476" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">VARCHAR: 그 외 모든 문자열 (기본 선택)</text>
  <text x="476" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#e05555">⚠ CHAR 비교 시 후행 공백 처리 DBMS마다 다름</text>

  <!-- Bottom note -->
  <rect x="60" y="318" width="760" height="28" fill="#111827" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">NUMERIC(p, s): p = precision(총 자릿수), s = scale(소수점 이하 자릿수). 예: NUMERIC(8,2) → 최대 999999.99</text>
</svg>
