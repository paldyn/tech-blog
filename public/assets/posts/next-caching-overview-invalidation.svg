<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <!-- Background -->
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">캐시 무효화 방법 정리</text>

  <!-- Column headers -->
  <text x="160" y="80"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#888">계층</text>
  <text x="360" y="80"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#888">무효화 방법</text>
  <text x="620" y="80"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#888">자동 해제 조건</text>

  <line x1="60" y1="88" x2="820" y2="88" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Row 1: Request Memoization -->
  <rect x="60" y="96" width="760" height="56" rx="0" fill="#0a0a0a" stroke="none"/>
  <text x="160" y="120"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">Request Memoization</text>
  <text x="160" y="140"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">React 계층</text>
  <text x="360" y="120"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">수동 무효화 불가</text>
  <text x="360" y="140"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">렌더 패스당 자동 관리</text>
  <text x="620" y="120"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">렌더링 완료 즉시</text>
  <text x="620" y="140"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">매 서버 요청마다 초기화</text>

  <line x1="60" y1="156" x2="820" y2="156" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Row 2: Data Cache -->
  <text x="160" y="180"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">Data Cache</text>
  <text x="160" y="200"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">서버 파일시스템</text>
  <text x="360" y="180"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">revalidateTag('tag')</text>
  <text x="360" y="200"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">revalidatePath('/path')</text>
  <text x="620" y="180"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">revalidate 시간 만료</text>
  <text x="620" y="200"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">또는 서버 재배포</text>

  <line x1="60" y1="216" x2="820" y2="216" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Row 3: Full Route Cache -->
  <text x="160" y="240"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e09050">Full Route Cache</text>
  <text x="160" y="260"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">서버 HTML+RSC</text>
  <text x="360" y="240"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">revalidateTag / Path</text>
  <text x="360" y="260"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Data Cache 무효화 연쇄</text>
  <text x="620" y="240"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e09050">새 배포 시</text>
  <text x="620" y="260"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">또는 Data Cache 재검증</text>

  <line x1="60" y1="276" x2="820" y2="276" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Row 4: Router Cache -->
  <text x="160" y="300"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">Router Cache</text>
  <text x="160" y="320"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">클라이언트 메모리</text>
  <text x="360" y="300"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">router.refresh()</text>
  <text x="360" y="320"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Server Action 성공 시 자동</text>
  <text x="620" y="300"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">브라우저 탭 닫기</text>
  <text x="620" y="320"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">또는 30분 비활성</text>

  <line x1="60" y1="336" x2="820" y2="336" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Bottom tip -->
  <text x="440" y="370"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">Server Action에서 revalidateTag 호출 → Data Cache + Full Route Cache 동시 무효화</text>
  <text x="440" y="392"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">클라이언트에서 router.refresh() 추가 호출 → Router Cache까지 무효화 (완전 갱신)</text>
  <text x="440" y="414"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">일반적으로 Server Action 성공 후 자동으로 Router Cache도 무효화됩니다</text>
</svg>
