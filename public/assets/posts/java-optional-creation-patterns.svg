<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Optional 생성 실전 패턴</text>

  <!-- Left: Service layer pattern -->
  <text x="60" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">서비스 레이어 패턴</text>
  <rect x="60" y="94" width="380" height="148" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">public</tspan><tspan fill="#ffffff"> Optional&lt;User&gt; findById(</tspan><tspan fill="#7ec8e3" font-weight="600">long</tspan><tspan fill="#ffffff"> id) {</tspan></text>
  <text x="76" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    User user = userRepo.get(id);</tspan></text>
  <text x="76" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">    return</tspan><tspan fill="#ffffff"> Optional.ofNullable(user);</tspan></text>
  <text x="76" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">}</tspan></text>
  <text x="76" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// JPA는 이미 Optional 반환</text>
  <text x="76" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">interface</tspan><tspan fill="#ffffff"> UserRepo </tspan><tspan fill="#7ec8e3" font-weight="600">extends</tspan><tspan fill="#ffffff"> JpaRepository {</tspan></text>
  <text x="76" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    Optional&lt;User&gt; findByEmail(String e);</tspan></text>

  <!-- Right: Map/Stream integration -->
  <text x="470" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">Map·Stream 연동</text>
  <rect x="470" y="94" width="350" height="148" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="486" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// Map.get() 래핑</text>
  <text x="486" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">Optional</tspan><tspan fill="#ffffff">&lt;String&gt; val =</tspan></text>
  <text x="486" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    Optional.ofNullable(map.get(key));</tspan></text>
  <text x="486" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// Stream findFirst는 Optional 반환</text>
  <text x="486" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">Optional</tspan><tspan fill="#ffffff">&lt;String&gt; first =</tspan></text>
  <text x="486" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    list.stream().filter(s -&gt; s.startsWith(</tspan><tspan fill="#ce9178">"A"</tspan><tspan fill="#ffffff">))</tspan></text>
  <text x="486" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">        .findFirst();</tspan></text>

  <!-- equality and type -->
  <rect x="60" y="274" width="760" height="50" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" text-anchor="middle">Optional은 값 기반 동등성 — Optional.of("a").equals(Optional.of("a")) == true</text>
  <text x="440" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Optional.empty().equals(Optional.empty()) == true (싱글턴)</text>

  <!-- PrimitiveOptional -->
  <rect x="60" y="352" width="760" height="68" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 기본 타입은 박싱 비용 절감을 위한 전용 Optional</text>
  <text x="76" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">OptionalInt</tspan><tspan fill="#ffffff"> i = OptionalInt.of(42); </tspan><tspan fill="#9aa4b8">// OptionalLong, OptionalDouble도 동일</tspan></text>
  <text x="76" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">i.getAsInt();    </tspan><tspan fill="#9aa4b8">// get() 아닌 getAsInt()</tspan></text>
</svg>
