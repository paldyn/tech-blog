<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Pod 라이프사이클 훅 실행 순서</text>

  <!-- Timeline -->
  <line x1="80" y1="200" x2="800" y2="200" stroke="#374151" stroke-width="2"/>

  <!-- Container Start -->
  <circle cx="120" cy="200" r="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="120" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">컨테이너</text>
  <text x="120" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">시작</text>

  <!-- postStart -->
  <rect x="160" y="90" width="160" height="80" rx="8" fill="#1a237e" stroke="#3949ab" stroke-width="2"/>
  <text x="240" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#9fa8da" text-anchor="middle">postStart 훅</text>
  <text x="240" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#6b7280" text-anchor="middle">컨테이너 시작과</text>
  <text x="240" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#6b7280" text-anchor="middle">거의 동시에 실행</text>
  <line x1="240" y1="170" x2="240" y2="200" stroke="#3949ab" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Liveness Probe -->
  <circle cx="380" cy="200" r="8" fill="#0d1f12" stroke="#166534" stroke-width="2"/>
  <rect x="310" y="90" width="160" height="80" rx="8" fill="#0d1f12" stroke="#166534" stroke-width="1.5"/>
  <text x="390" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">Liveness Probe</text>
  <text x="390" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#6b7280" text-anchor="middle">initialDelaySeconds</text>
  <text x="390" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#6b7280" text-anchor="middle">후 시작. 실패 시 재시작</text>
  <line x1="390" y1="170" x2="390" y2="200" stroke="#166534" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Readiness Probe -->
  <circle cx="540" cy="200" r="8" fill="#0d1f12" stroke="#166534" stroke-width="2"/>
  <rect x="460" y="90" width="160" height="80" rx="8" fill="#0d1f12" stroke="#166534" stroke-width="1.5"/>
  <text x="540" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">Readiness Probe</text>
  <text x="540" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#6b7280" text-anchor="middle">통과 시 Service</text>
  <text x="540" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#6b7280" text-anchor="middle">트래픽 수신 시작</text>
  <line x1="540" y1="170" x2="540" y2="200" stroke="#166534" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- SIGTERM -->
  <circle cx="680" cy="200" r="8" fill="#1a0000" stroke="#7f1d1d" stroke-width="2"/>
  <text x="680" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">SIGTERM</text>
  <text x="680" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">수신</text>

  <!-- preStop -->
  <rect x="610" y="280" width="160" height="80" rx="8" fill="#1a0000" stroke="#7f1d1d" stroke-width="2"/>
  <text x="690" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">preStop 훅</text>
  <text x="690" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#6b7280" text-anchor="middle">SIGTERM 전에</text>
  <text x="690" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#6b7280" text-anchor="middle">호출됨</text>
  <line x1="690" y1="280" x2="690" y2="210" stroke="#7f1d1d" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Exit -->
  <circle cx="800" cy="200" r="8" fill="#374151" stroke="#6b7280" stroke-width="2"/>
  <text x="800" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9ca3af" text-anchor="middle">종료</text>

  <!-- Note -->
  <rect x="60" y="380" width="760" height="42" rx="8" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
  <text x="440" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">postStart가 완료되기 전에 Liveness/Readiness Probe가 시작될 수 있어 초기 실패 주의</text>
  <text x="440" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">preStop + gracePeriodSeconds 이내에 컨테이너가 종료되지 않으면 SIGKILL 강제 종료</text>
</svg>
