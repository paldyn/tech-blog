<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">DNS 레코드 타입</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">dig로 조회하는 주요 레코드</text>

  <!-- Header -->
  <rect x="60" y="94" width="760" height="38" fill="#111827" rx="6"/>
  <text x="140" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">타입</text>
  <text x="320" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#888" text-anchor="middle">의미</text>
  <text x="590" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#888" text-anchor="middle">dig 예제</text>

  <!-- A -->
  <rect x="60" y="134" width="760" height="40" fill="#0f1117" rx="3"/>
  <text x="140" y="159" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">A</text>
  <text x="320" y="159" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">도메인 → IPv4 주소</text>
  <text x="590" y="159" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">dig A google.com</text>

  <!-- AAAA -->
  <rect x="60" y="176" width="760" height="40" fill="#13151f" rx="3"/>
  <text x="140" y="201" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">AAAA</text>
  <text x="320" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">도메인 → IPv6 주소</text>
  <text x="590" y="201" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">dig AAAA google.com</text>

  <!-- CNAME -->
  <rect x="60" y="218" width="760" height="40" fill="#0f1117" rx="3"/>
  <text x="140" y="243" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">CNAME</text>
  <text x="320" y="243" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">별칭 → 정규 도메인</text>
  <text x="590" y="243" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">dig CNAME www.github.com</text>

  <!-- MX -->
  <rect x="60" y="260" width="760" height="40" fill="#13151f" rx="3"/>
  <text x="140" y="285" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">MX</text>
  <text x="320" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">메일 서버 (우선순위 포함)</text>
  <text x="590" y="285" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">dig MX gmail.com</text>

  <!-- TXT -->
  <rect x="60" y="302" width="760" height="40" fill="#0f1117" rx="3"/>
  <text x="140" y="327" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">TXT</text>
  <text x="320" y="327" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">텍스트 (SPF, DKIM, 검증)</text>
  <text x="590" y="327" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">dig TXT google.com</text>

  <!-- NS -->
  <rect x="60" y="344" width="760" height="40" fill="#13151f" rx="3"/>
  <text x="140" y="369" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="700" fill="#888" text-anchor="middle">NS</text>
  <text x="320" y="369" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">네임서버</text>
  <text x="590" y="369" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">dig NS google.com</text>

  <!-- PTR -->
  <rect x="60" y="386" width="760" height="40" fill="#0f1117" rx="3"/>
  <text x="140" y="411" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="700" fill="#888" text-anchor="middle">PTR</text>
  <text x="320" y="411" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">역방향 조회 (IP → 도메인)</text>
  <text x="590" y="411" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">dig -x 8.8.8.8</text>

  <!-- Dividers -->
  <line x1="220" y1="94" x2="220" y2="426" stroke="#222" stroke-width="1"/>
  <line x1="440" y1="94" x2="440" y2="426" stroke="#222" stroke-width="1"/>

  <text x="440" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">dig ANY domain.com 으로 모든 레코드 조회 (서버가 허용하면)</text>
</svg>
