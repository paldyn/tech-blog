<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">딕셔너리 컴프리헨션 활용</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">zip · enumerate · 중첩 구조</text>

  <!-- zip -->
  <rect x="60" y="100" width="360" height="160" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="240" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">zip으로 두 리스트 병합</text>
  <rect x="76" y="136" width="328" height="108" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">keys = [<tspan fill="#ce9178">"name"</tspan>, <tspan fill="#ce9178">"age"</tspan>, <tspan fill="#ce9178">"city"</tspan>]</text>
  <text x="92" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">vals = [<tspan fill="#ce9178">"Kim"</tspan>, <tspan fill="#b5cea8">30</tspan>, <tspan fill="#ce9178">"Seoul"</tspan>]</text>
  <text x="92" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">d = {k: v <tspan fill="#7ec8e3">for</tspan> k, v <tspan fill="#7ec8e3">in</tspan> <tspan fill="#7ec8e3">zip</tspan>(keys, vals)}</text>
  <text x="92" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># {'name':'Kim','age':30,...}</tspan></text>
  <text x="92" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># dict(zip(keys, vals)) 도 동등</tspan></text>

  <!-- enumerate -->
  <rect x="460" y="100" width="360" height="160" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="640" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">enumerate로 인덱스 매핑</text>
  <rect x="476" y="136" width="328" height="108" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="492" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">fruits = [<tspan fill="#ce9178">"apple"</tspan>,<tspan fill="#ce9178">"banana"</tspan>,<tspan fill="#ce9178">"cherry"</tspan>]</text>
  <text x="492" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">idx = {f: i <tspan fill="#7ec8e3">for</tspan> i, f</text>
  <text x="492" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">       <tspan fill="#7ec8e3">in</tspan> <tspan fill="#7ec8e3">enumerate</tspan>(fruits)}</text>
  <text x="492" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># {'apple':0,'banana':1,'cherry':2}</tspan></text>
  <text x="492" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 빠른 lookup table 구성</tspan></text>

  <!-- Nested dict -->
  <rect x="60" y="280" width="760" height="130" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="440" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#ce9178">중첩 딕셔너리 컴프리헨션</text>
  <rect x="76" y="316" width="728" height="78" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 구구단 테이블 — {2: {1:2, 2:4, ...}, 3: {...}, ...}</tspan></text>
  <text x="92" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">table = {i: {j: i*j <tspan fill="#7ec8e3">for</tspan> j <tspan fill="#7ec8e3">in</tspan> range(<tspan fill="#b5cea8">1</tspan>, <tspan fill="#b5cea8">10</tspan>)}</text>
  <text x="92" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">         <tspan fill="#7ec8e3">for</tspan> i <tspan fill="#7ec8e3">in</tspan> range(<tspan fill="#b5cea8">2</tspan>, <tspan fill="#b5cea8">10</tspan>)}</text>
  <text x="92" y="390" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">table[3][4]  # 12</tspan></text>

  <text x="440" y="424" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">키 중복 위험에 주의 — collections.defaultdict 또는 setdefault 조합 고려</text>
</svg>
