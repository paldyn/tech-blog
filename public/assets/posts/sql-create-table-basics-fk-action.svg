<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="340" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ON DELETE / ON UPDATE 동작 옵션</text>

  <!-- Table -->
  <rect x="60" y="68" width="760" height="32" rx="4" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="160" y="89" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" font-weight="600" text-anchor="middle">옵션</text>
  <text x="440" y="89" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" font-weight="600" text-anchor="middle">동작</text>
  <text x="720" y="89" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" font-weight="600" text-anchor="middle">사용 시나리오</text>

  <rect x="60" y="100" width="760" height="28" fill="#0f1a0f" stroke="#2a3a2a" stroke-width="1"/>
  <text x="160" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">RESTRICT</text>
  <text x="440" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">자식이 있으면 부모 삭제 차단</text>
  <text x="720" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">기본값 (안전)</text>

  <rect x="60" y="128" width="760" height="28" fill="#111827" stroke="#2a3a2a" stroke-width="1"/>
  <text x="160" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">CASCADE</text>
  <text x="440" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">부모 삭제 시 자식도 자동 삭제</text>
  <text x="720" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">로그, 이미지 등 종속 데이터</text>

  <rect x="60" y="156" width="760" height="28" fill="#0f1a0f" stroke="#2a3a2a" stroke-width="1"/>
  <text x="160" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">SET NULL</text>
  <text x="440" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">부모 삭제 시 FK 컬럼을 NULL로</text>
  <text x="720" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">소프트 관계 (담당자 없어짐)</text>

  <rect x="60" y="184" width="760" height="28" fill="#111827" stroke="#2a3a2a" stroke-width="1"/>
  <text x="160" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">SET DEFAULT</text>
  <text x="440" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">FK 컬럼에 DEFAULT 값 적용</text>
  <text x="720" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">기본 담당자로 재배정</text>

  <rect x="60" y="212" width="760" height="28" fill="#0f1a0f" stroke="#2a3a2a" stroke-width="1"/>
  <text x="160" y="231" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">NO ACTION</text>
  <text x="440" y="231" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">트랜잭션 끝까지 지연 후 검사</text>
  <text x="720" y="231" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">지연 가능(DEFERRABLE) 제약과 조합</text>

  <!-- Code example -->
  <rect x="60" y="256" width="760" height="62" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="278" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">FOREIGN KEY</tspan>
    <tspan fill="#ffffff"> (customer_id) </tspan>
    <tspan fill="#7ec8e3" font-weight="600">REFERENCES</tspan>
    <tspan fill="#ffffff"> customers(id)</tspan>
  </text>
  <text x="76" y="298" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    ON DELETE CASCADE</tspan>
    <tspan fill="#7ec8e3" font-weight="600"> ON UPDATE RESTRICT</tspan>
  </text>
</svg>
