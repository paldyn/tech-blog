<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Reverse Key 인덱스: 문제와 해법</text>

  <!-- Problem: Normal B-Tree in RAC -->
  <rect x="60" y="70" width="360" height="180" rx="8" fill="#1a0808" stroke="#e05555" stroke-width="2"/>
  <text x="240" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555">문제: 일반 B-Tree (RAC 환경)</text>

  <!-- Sequence values going right -->
  <rect x="80" y="110" width="60" height="36" rx="4" fill="#2a1010" stroke="#e05555"/>
  <text x="110" y="133" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">1001</text>

  <rect x="150" y="110" width="60" height="36" rx="4" fill="#2a1010" stroke="#e05555"/>
  <text x="180" y="133" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">1002</text>

  <rect x="220" y="110" width="60" height="36" rx="4" fill="#2a1010" stroke="#e05555"/>
  <text x="250" y="133" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">1003</text>

  <rect x="290" y="110" width="100" height="36" rx="4" fill="#2a0808" stroke="#e05555" stroke-width="2"/>
  <text x="340" y="133" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">1004 ← HOT</text>

  <text x="240" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">단조 증가 시퀀스 → 항상 우측 Leaf 블록에 INSERT</text>
  <text x="240" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">RAC 노드 1, 2, 3이 동일 블록 경합 → buffer busy waits</text>
  <text x="240" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">인스턴스 간 블록 전송(Cache Fusion) 폭증</text>
  <text x="240" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">gc buffer busy acquire / gc cr block 2-way 대기 급증</text>

  <!-- Solution: Reverse Key -->
  <rect x="460" y="70" width="360" height="180" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">해법: Reverse Key 인덱스</text>

  <!-- Reversed values distributed -->
  <rect x="480" y="110" width="60" height="36" rx="4" fill="#0a200a" stroke="#55c555"/>
  <text x="510" y="133" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">1001→1001</text>

  <rect x="550" y="110" width="60" height="36" rx="4" fill="#0a200a" stroke="#55c555"/>
  <text x="580" y="133" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">1002→2001</text>

  <rect x="620" y="110" width="60" height="36" rx="4" fill="#0a200a" stroke="#55c555"/>
  <text x="650" y="133" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">1003→3001</text>

  <rect x="690" y="110" width="110" height="36" rx="4" fill="#0a200a" stroke="#55c555"/>
  <text x="745" y="133" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">1004→4001</text>

  <text x="640" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">바이트를 뒤집어 저장 → 분산된 Leaf 블록에 분산 삽입</text>
  <text x="640" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">RAC 노드별로 서로 다른 블록 접근 → 경합 제거</text>
  <text x="640" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">트레이드오프: Range Scan 불가</text>
  <text x="640" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">WHERE id BETWEEN 1001 AND 2000 → Full Scan 필요</text>

  <!-- Trade-off matrix -->
  <rect x="60" y="270" width="760" height="100" rx="8" fill="#111" stroke="#333"/>
  <text x="440" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">Reverse Key 인덱스 트레이드오프</text>

  <text x="180" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">장점</text>
  <text x="180" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">RAC INSERT 경합 해소</text>
  <text x="180" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">균일한 Leaf 분산</text>

  <text x="440" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">단점</text>
  <text x="440" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Range Scan 불가 (Index Range Scan → Full Scan)</text>
  <text x="440" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ORDER BY 정렬 인덱스 활용 불가</text>

  <text x="700" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">적합 상황</text>
  <text x="700" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">PK = 시퀀스</text>
  <text x="700" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">등치 검색만 사용</text>

  <!-- Note -->
  <rect x="60" y="390" width="760" height="90" rx="8" fill="#0d1828" stroke="#7ec8e3"/>
  <text x="440" y="412" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">단일 인스턴스 환경에서의 Reverse Key</text>
  <text x="440" y="434" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">단일 인스턴스(비 RAC)에서는 Right-growing 패턴이 큰 문제가 되지 않는다</text>
  <text x="440" y="454" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">불필요한 Reverse Key는 Range Scan을 희생하는 대가가 더 크다</text>
  <text x="440" y="474" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">RAC 환경, 특히 buffer busy waits / gc buffer busy acquire 경합 시 적용 검토</text>
</svg>
