<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <!-- Background -->
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ESM 파일의 상대 경로 — 확장자는 .js로</text>

  <!-- Left: wrong -->
  <rect x="60" y="76" width="360" height="190" fill="#111827" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">❌ 확장자 생략 — 에러</text>

  <rect x="76" y="116" width="328" height="96" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">import { fmt }</text>
  <text x="92" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  from "./util";</text>
  <text x="92" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" xml:space="preserve">// TS2835: 상대 경로에는</text>
  <text x="92" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" xml:space="preserve">// 확장자가 필요합니다</text>

  <text x="240" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Node ESM 런타임은 확장자 없는 경로를 못 찾는다</text>

  <!-- Right: correct -->
  <rect x="460" y="76" width="360" height="190" fill="#111827" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">✅ 출력 기준 .js 확장자</text>

  <rect x="476" y="116" width="328" height="96" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">import { fmt }</text>
  <text x="492" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  from "./util.js";</text>
  <text x="492" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve">// 타입은 util.ts에서,</text>
  <text x="492" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve">// 런타임은 util.js를 로드</text>

  <text x="640" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">소스에 .js라고 써도 tsc가 .ts 파일로 매핑한다</text>

  <!-- Mapping table -->
  <rect x="60" y="294" width="760" height="120" fill="#111827" rx="8" stroke="#334155" stroke-width="1.5"/>
  <text x="440" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">import에 쓰는 확장자 → 실제로 찾는 소스 파일</text>

  <text x="160" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" text-anchor="middle">"./a.js"</text>
  <text x="160" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" text-anchor="middle">a.ts · a.tsx · a.d.ts</text>

  <text x="440" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" text-anchor="middle">"./a.mjs"</text>
  <text x="440" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" text-anchor="middle">a.mts · a.d.mts</text>

  <text x="720" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" text-anchor="middle">"./a.cjs"</text>
  <text x="720" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" text-anchor="middle">a.cts · a.d.cts</text>
</svg>
