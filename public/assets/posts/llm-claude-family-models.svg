  <text x="351" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• 복잡한 문서 작성</text>
  <text x="351" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• 에이전트 오케스트레이션</text>
  <text x="351" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• 프로덕션 기본값</text>

  <!-- Opus -->
  <rect x="586" y="96" width="234" height="280" rx="10" fill="#111827" stroke="#7777cc" stroke-width="2"/>
  <text x="703" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7777cc">Opus</text>
  <text x="703" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">최강 · 고비용 · 심층 추론</text>
  <line x1="606" y1="162" x2="800" y2="162" stroke="#3a4a6e" stroke-width="1"/>
  <text x="614" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">속도</text>
  <rect x="666" y="172" width="116" height="16" rx="4" fill="#1a2a1a"/>
  <rect x="666" y="172" width="44" height="16" rx="4" fill="#7777cc"/>
  <text x="614" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">비용</text>
  <rect x="666" y="204" width="116" height="16" rx="4" fill="#1a2a1a"/>
  <rect x="666" y="204" width="40" height="16" rx="4" fill="#7777cc"/>
  <text x="614" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">추론력</text>
  <rect x="666" y="236" width="116" height="16" rx="4" fill="#1a2a1a"/>
  <rect x="666" y="236" width="116" height="16" rx="4" fill="#7777cc"/>
  <text x="614" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• 복잡한 수학·과학</text>
  <text x="614" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• 전략적 의사결정</text>
  <text x="614" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• 연구·분석 보조</text>
  <text x="614" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• 고부가가치 태스크</text>

  <!-- Bottom label -->
  <text x="440" y="410" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">팁: 프로덕션은 Sonnet으로 시작, 품질 부족 시 Opus, 비용 절감 시 Haiku로 이동</text>
</svg>
