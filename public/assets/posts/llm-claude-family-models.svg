  <rect x="403" y="204" width="116" height="16" rx="4" fill="#1a2a1a"/>
  <rect x="403" y="204" width="70" height="16" rx="4" fill="#e05555"/>
  <text x="351" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">추론력</text>
  <rect x="403" y="236" width="116" height="16" rx="4" fill="#1a2a1a"/>
  <rect x="403" y="236" width="90" height="16" rx="4" fill="#e05555"/>
