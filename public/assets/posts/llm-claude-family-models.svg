<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Claude 모델 티어 비교</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">Haiku · Sonnet · Opus 포지셔닝</text>

  <!-- Haiku -->
  <rect x="60" y="96" width="234" height="280" rx="10" fill="#111827" stroke="#7ec8e3" stroke-width="2"/>
  <text x="177" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7ec8e3">Haiku</text>
  <text x="177" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">경량 · 저비용 · 빠름</text>
  <line x1="80" y1="162" x2="274" y2="162" stroke="#3a4a6e" stroke-width="1"/>
  <text x="88" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">속도</text>
  <rect x="140" y="172" width="116" height="16" rx="4" fill="#1a2a1a"/>
  <rect x="140" y="172" width="110" height="16" rx="4" fill="#55c555"/>
  <text x="88" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">비용</text>
  <rect x="140" y="204" width="116" height="16" rx="4" fill="#1a2a1a"/>
  <rect x="140" y="204" width="112" height="16" rx="4" fill="#55c555"/>
  <text x="88" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">추론력</text>
