  <rect x="140" y="236" width="50" height="16" rx="4" fill="#7ec8e3"/>
  <text x="88" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• 실시간 챗봇</text>
  <text x="88" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• 단순 분류/요약</text>
  <text x="88" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• 대량 배치 처리</text>
  <text x="88" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• 모바일 앱 백엔드</text>

  <!-- Sonnet -->
  <rect x="323" y="96" width="234" height="280" rx="10" fill="#111827" stroke="#e05555" stroke-width="2"/>
