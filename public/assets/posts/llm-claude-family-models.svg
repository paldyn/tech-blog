  <text x="440" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">균형 · 실용 · 코딩</text>
  <line x1="343" y1="162" x2="537" y2="162" stroke="#3a4a6e" stroke-width="1"/>
  <text x="351" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">속도</text>
  <rect x="403" y="172" width="116" height="16" rx="4" fill="#1a2a1a"/>
  <rect x="403" y="172" width="80" height="16" rx="4" fill="#e05555"/>
