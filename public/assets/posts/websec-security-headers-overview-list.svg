<svg xmlns="http://www.w3.org/2000/svg" width="880" height="530" viewBox="0 0 880 530">
  <rect width="880" height="530" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">주요 HTTP 보안 헤더 한눈에 보기</text>

  <!-- Row 1 -->
  <rect x="60" y="68" width="760" height="62" rx="7" fill="#0f1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <rect x="60" y="68" width="6" height="62" rx="3" fill="#e05555"/>
  <text x="84" y="93" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">Content-Security-Policy (CSP)</text>
  <text x="84" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">XSS 공격 방어 — 로드 가능한 리소스 출처를 화이트리스트로 제한</text>
  <text x="760" y="103" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="end">필수</text>

  <!-- Row 2 -->
  <rect x="60" y="142" width="760" height="62" rx="7" fill="#0f1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <rect x="60" y="142" width="6" height="62" rx="3" fill="#7ec8e3"/>
  <text x="84" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Strict-Transport-Security (HSTS)</text>
  <text x="84" y="187" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">HTTPS 강제 연결 — 브라우저가 항상 HTTPS로만 통신하도록 지시</text>
  <text x="760" y="177" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="end">필수</text>

  <!-- Row 3 -->
  <rect x="60" y="216" width="760" height="62" rx="7" fill="#0f1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <rect x="60" y="216" width="6" height="62" rx="3" fill="#7777cc"/>
  <text x="84" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">X-Frame-Options</text>
  <text x="84" y="261" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">클릭재킹 방어 — iframe에서 사이트 로드를 허용/차단 (CSP frame-ancestors로 대체됨)</text>
  <text x="760" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="end">권장</text>

  <!-- Row 4 -->
  <rect x="60" y="290" width="760" height="62" rx="7" fill="#0f1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <rect x="60" y="290" width="6" height="62" rx="3" fill="#55c555"/>
  <text x="84" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">X-Content-Type-Options</text>
  <text x="84" y="335" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">MIME 스니핑 방지 — 브라우저가 Content-Type을 임의로 바꾸지 못하게 차단</text>
  <text x="760" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="end">권장</text>

  <!-- Row 5 -->
  <rect x="60" y="364" width="760" height="62" rx="7" fill="#0f1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <rect x="60" y="364" width="6" height="62" rx="3" fill="#e8c55a"/>
  <text x="84" y="389" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8c55a">Referrer-Policy</text>
  <text x="84" y="409" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">리퍼러 정보 제한 — 링크 클릭 시 전송되는 URL 정보를 통제</text>
  <text x="760" y="399" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="end">권장</text>

  <!-- Row 6 -->
  <rect x="60" y="438" width="760" height="62" rx="7" fill="#0f1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <rect x="60" y="438" width="6" height="62" rx="3" fill="#888"/>
  <text x="84" y="463" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">Permissions-Policy</text>
  <text x="84" y="483" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">브라우저 기능 접근 제한 — 카메라·마이크·위치 등 브라우저 API 접근 제어</text>
  <text x="760" y="473" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="end">권장</text>

  <text x="440" y="516" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">securityheaders.com 에서 현재 사이트의 헤더 점수를 무료로 확인할 수 있다</text>
</svg>
