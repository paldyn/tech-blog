<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Java 메모리 모델(JMM) 개요</text>

  <!-- Thread 1 -->
  <rect x="60" y="68" width="220" height="160" rx="10" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="170" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">Thread 1</text>

  <rect x="80" y="104" width="180" height="36" rx="6" fill="#1a2a3a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="170" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Working Memory</text>
  <text x="170" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">x = 1 (로컬 캐시)</text>

  <rect x="80" y="150" width="180" height="36" rx="6" fill="#1a2a3a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="170" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">CPU 레지스터</text>
  <text x="170" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">L1/L2 캐시</text>

  <text x="170" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e09055">쓰기 → 메인 메모리 지연 가능</text>

  <!-- Thread 2 -->
  <rect x="600" y="68" width="220" height="160" rx="10" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="710" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">Thread 2</text>

  <rect x="620" y="104" width="180" height="36" rx="6" fill="#1a2a3a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="710" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Working Memory</text>
  <text x="710" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">x = 0 (낡은 값!)</text>

  <rect x="620" y="150" width="180" height="36" rx="6" fill="#1a2a3a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="710" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">CPU 레지스터</text>
  <text x="710" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">L1/L2 캐시</text>

  <text x="710" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e09055">읽기 → 캐시 히트 (가시성 문제)</text>

  <!-- Main Memory -->
  <rect x="260" y="100" width="360" height="100" rx="10" fill="#1a1a0f" stroke="#6e6e2a" stroke-width="1.5"/>
  <text x="440" y="125" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">메인 메모리 (Heap)</text>
  <text x="440" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#b5cea8">공유 변수: x = 1</text>
  <text x="440" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">모든 스레드가 접근하는 공통 영역</text>

  <!-- Arrows: Thread1 writes to main memory -->
  <path d="M 170 228 L 170 260 L 280 190" stroke="#55c555" stroke-width="2" fill="none" marker-end="url(#arr-g)"/>
  <text x="130" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">flush</text>

  <!-- Arrows: Thread2 reads from main memory (stale) -->
  <path d="M 620 155 L 530 155" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" fill="none" marker-end="url(#arr-r)"/>
  <text x="540" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">stale read</text>

  <!-- JMM guarantees section -->
  <rect x="60" y="260" width="760" height="192" rx="10" fill="#0a1a0a" stroke="#2a5a2a" stroke-width="1"/>
  <text x="440" y="285" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">JMM이 해결하는 세 가지 문제</text>

  <!-- Problem boxes -->
  <rect x="80" y="298" width="190" height="132" rx="8" fill="#0a0a1a" stroke="#3a3a6e" stroke-width="1"/>
  <text x="175" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">가시성 (Visibility)</text>
  <text x="90" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">한 스레드의 쓰기가</text>
  <text x="90" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">다른 스레드에서 즉시</text>
  <text x="90" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">보이는지 여부</text>
  <text x="90" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">→ volatile / synchronized</text>
  <text x="90" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">   로 보장</text>

  <rect x="345" y="298" width="190" height="132" rx="8" fill="#0a0a1a" stroke="#3a3a6e" stroke-width="1"/>
  <text x="440" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">원자성 (Atomicity)</text>
  <text x="355" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">long/double 읽기·쓰기도</text>
  <text x="355" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">64비트 플랫폼 외에는</text>
  <text x="355" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">분할 연산 가능</text>
  <text x="355" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">→ synchronized / Atomic</text>
  <text x="355" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">   클래스로 보장</text>

  <rect x="610" y="298" width="190" height="132" rx="8" fill="#0a0a1a" stroke="#3a3a6e" stroke-width="1"/>
  <text x="705" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">순서 재배치 (Reordering)</text>
  <text x="620" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">컴파일러·JIT·CPU가</text>
  <text x="620" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">성능을 위해 명령 순서를</text>
  <text x="620" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">바꿀 수 있음</text>
  <text x="620" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">→ happens-before 규칙</text>
  <text x="620" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">   으로 제약</text>
</svg>
