<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">Web Worker 메시지 패턴</text>
  <text x="440" y="70" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#888">메인 스크립트 · Worker 스크립트</text>

  <!-- Left: Main thread code -->
  <text x="60" y="100"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#7ec8e3">main.js — 메인 스레드</text>
  <rect x="60" y="110" width="370" height="316" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="138" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8"><tspan fill="#7ec8e3">const</tspan> worker = <tspan fill="#7ec8e3">new</tspan> Worker(</text>
  <text x="76" y="156" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">  <tspan fill="#ce9178">'./worker.js'</tspan>,</text>
  <text x="76" y="174" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">  { type: <tspan fill="#ce9178">'module'</tspan> } <tspan fill="#6a8aa0">// ESM 워커</tspan></text>
  <text x="76" y="192" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">);</text>
  <text x="76" y="212" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">worker.postMessage({</text>
  <text x="76" y="230" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">  type: <tspan fill="#ce9178">'SORT'</tspan>,</text>
  <text x="76" y="248" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">  data: largeArray</text>
  <text x="76" y="266" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">});</text>
  <text x="76" y="284" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">worker.onmessage = ({ data }) => {</text>
  <text x="76" y="302" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">  renderResult(data.sorted);</text>
  <text x="76" y="320" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">};</text>
  <text x="76" y="338" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">worker.onerror = (e) => {</text>
  <text x="76" y="356" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">  console.error(e.message);</text>
  <text x="76" y="374" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">};</text>
  <text x="76" y="392" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8"><tspan fill="#6a8aa0">// 워커 종료</tspan></text>
  <text x="76" y="410" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">worker.terminate();</text>

  <!-- Right: Worker code -->
  <text x="460" y="100"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#7777cc">worker.js — Worker 스레드</text>
  <rect x="460" y="110" width="370" height="316" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
  <text x="476" y="138" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#6a8aa0">// Worker 전역: self (WorkerGlobalScope)</text>
  <text x="476" y="156" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">self.onmessage = ({ data }) => {</text>
  <text x="476" y="174" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">  <tspan fill="#7ec8e3">const</tspan> { type, data: d } = data;</text>
  <text x="476" y="192" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">  <tspan fill="#7ec8e3">if</tspan> (type === <tspan fill="#ce9178">'SORT'</tspan>) {</text>
  <text x="476" y="210" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#6a8aa0">    // CPU 집중 작업</text>
  <text x="476" y="228" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">    <tspan fill="#7ec8e3">const</tspan> sorted = [...d].sort(</text>
  <text x="476" y="246" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">      (a, b) => a - b</text>
  <text x="476" y="264" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">    );</text>
  <text x="476" y="282" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#6a8aa0">    // 결과를 메인에 전송</text>
  <text x="476" y="300" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">    self.postMessage({ sorted });</text>
  <text x="476" y="318" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">  }</text>
  <text x="476" y="336" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">};</text>
  <text x="476" y="360" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#6a8aa0">// 내부에서 종료 가능</text>
  <text x="476" y="378" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">self.close();</text>
  <text x="476" y="396" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#6a8aa0">// 에러 전파 차단 가능</text>
  <text x="476" y="414" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">self.onerror = (e) => e.preventDefault();</text>
</svg>
