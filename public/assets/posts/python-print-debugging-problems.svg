<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">print 디버깅이 새는 곳</text>

  <rect x="60" y="86" width="370" height="64" rx="6" fill="#1a0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="80" y="114" font-size="14" font-weight="600" fill="#e05555">지우는 걸 잊는다</text>
  <text x="80" y="138" font-size="12" fill="#9aa4b8">디버깅 print가 운영 로그를 더럽힌다</text>

  <rect x="450" y="86" width="370" height="64" rx="6" fill="#1a0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="470" y="114" font-size="14" font-weight="600" fill="#e05555">어디서 찍혔는지 모른다</text>
  <text x="470" y="138" font-size="12" fill="#9aa4b8">파일·줄·시각 정보가 없다</text>

  <rect x="60" y="162" width="370" height="64" rx="6" fill="#1a0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="80" y="190" font-size="14" font-weight="600" fill="#e05555">켜고 끌 수 없다</text>
  <text x="80" y="214" font-size="12" fill="#9aa4b8">레벨 구분이 없어 전부 아니면 전무</text>

  <rect x="450" y="162" width="370" height="64" rx="6" fill="#1a0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="470" y="190" font-size="14" font-weight="600" fill="#e05555">버퍼링에 묻힌다</text>
  <text x="470" y="214" font-size="12" fill="#9aa4b8">크래시 직전 출력이 사라지기도</text>

  <rect x="60" y="244" width="760" height="40" rx="4" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="78" y="269" font-size="13" fill="#55c555">→ logging은 이 네 가지를 모두 구조적으로 해결한다</text>
</svg>
