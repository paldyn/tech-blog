<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">DBMS별 SQL 방언(Dialect) 차이</text>

  <!-- Center: ISO SQL -->
  <rect x="340" y="66" width="200" height="60" rx="8" fill="#1a2a4a" stroke="#3a4a6e" stroke-width="2"/>
  <text x="440" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">ISO SQL 표준</text>
  <text x="440" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">공통 문법 기반</text>

  <!-- Lines to DBMSes -->
  <line x1="340" y1="96" x2="220" y2="150" stroke="#3a4a6e" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="440" y1="126" x2="440" y2="150" stroke="#3a4a6e" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="540" y1="96" x2="660" y2="150" stroke="#3a4a6e" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="340" y1="110" x2="110" y2="200" stroke="#3a4a6e" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="540" y1="110" x2="770" y2="200" stroke="#3a4a6e" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Oracle -->
  <rect x="60" y="150" width="160" height="70" rx="6" fill="#111" stroke="#ce9178" stroke-width="1"/>
  <text x="140" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ce9178">Oracle</text>
  <text x="140" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">ROWNUM, CONNECT BY</text>
  <text x="140" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">NVL, DECODE, PL/SQL</text>

  <!-- PostgreSQL -->
  <rect x="360" y="150" width="160" height="70" rx="6" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">PostgreSQL</text>
  <text x="440" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">RETURNING, ILIKE</text>
  <text x="440" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">JSONB, 배열 타입, PL/pgSQL</text>

  <!-- MySQL -->
  <rect x="660" y="150" width="160" height="70" rx="6" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="740" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">MySQL / MariaDB</text>
  <text x="740" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">LIMIT, AUTO_INCREMENT</text>
  <text x="740" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">IFNULL, 스토리지 엔진</text>

  <!-- SQL Server -->
  <rect x="60" y="248" width="160" height="70" rx="6" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="140" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">SQL Server</text>
  <text x="140" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">TOP N, T-SQL, APPLY</text>
  <text x="140" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">ISNULL, NOLOCK 힌트</text>

  <!-- SQLite -->
  <rect x="660" y="248" width="160" height="70" rx="6" fill="#111" stroke="#888" stroke-width="1"/>
  <text x="740" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">SQLite</text>
  <text x="740" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">경량, 타입 선호도</text>
  <text x="740" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">AUTOINCREMENT, JSON1</text>

  <!-- Common ground note -->
  <rect x="260" y="248" width="360" height="70" rx="6" fill="#1a2e1a" stroke="#3a5e3a" stroke-width="1"/>
  <text x="440" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">표준 SQL 공통 문법</text>
  <text x="440" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">SELECT, INSERT, UPDATE, DELETE</text>
  <text x="440" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">JOIN, GROUP BY, 집계 함수, 서브쿼리</text>

  <text x="440" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">방언은 다르지만 핵심 SQL은 이식 가능 — 이 시리즈는 표준 기반으로 설명, 방언은 별도 표기</text>
</svg>
