<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700">모노레포 워크스페이스 구조</text>
  <text x="440" y="70" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">단일 레포지터리에서 여러 패키지 관리 — pnpm workspaces</text>

  <!-- Root -->
  <rect x="340" y="90" width="200" height="44" rx="8" fill="#1a2533" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="117" text-anchor="middle" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600">my-monorepo/</text>

  <!-- Connector lines from root -->
  <line x1="440" y1="134" x2="440" y2="160" stroke="#555" stroke-width="1"/>
  <line x1="160" y1="160" x2="720" y2="160" stroke="#555" stroke-width="1"/>
  <line x1="160" y1="160" x2="160" y2="180" stroke="#555" stroke-width="1"/>
  <line x1="440" y1="160" x2="440" y2="180" stroke="#555" stroke-width="1"/>
  <line x1="720" y1="160" x2="720" y2="180" stroke="#555" stroke-width="1"/>

  <!-- packages/ -->
  <rect x="60" y="180" width="200" height="44" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="207" text-anchor="middle" fill="#7777cc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600">packages/</text>

  <!-- apps/ -->
  <rect x="340" y="180" width="200" height="44" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="207" text-anchor="middle" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600">apps/</text>

  <!-- tooling/ -->
  <rect x="620" y="180" width="200" height="44" rx="8" fill="#111827" stroke="#888" stroke-width="1.5"/>
  <text x="720" y="207" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600">tooling/</text>

  <!-- packages sub-items -->
  <line x1="160" y1="224" x2="160" y2="250" stroke="#555" stroke-width="1"/>
  <line x1="100" y1="250" x2="220" y2="250" stroke="#555" stroke-width="1"/>
  <line x1="100" y1="250" x2="100" y2="270" stroke="#555" stroke-width="1"/>
  <line x1="220" y1="250" x2="220" y2="270" stroke="#555" stroke-width="1"/>

  <rect x="60" y="270" width="120" height="36" rx="6" fill="#1a2533" stroke="#7777cc" stroke-width="1"/>
  <text x="120" y="293" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">ui</text>
  <text x="120" y="308" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11">@myorg/ui</text>

  <rect x="190" y="270" width="120" height="36" rx="6" fill="#1a2533" stroke="#7777cc" stroke-width="1"/>
  <text x="250" y="293" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">utils</text>
  <text x="250" y="308" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11">@myorg/utils</text>

  <!-- apps sub-items -->
  <line x1="440" y1="224" x2="440" y2="250" stroke="#555" stroke-width="1"/>
  <line x1="380" y1="250" x2="500" y2="250" stroke="#555" stroke-width="1"/>
  <line x1="380" y1="250" x2="380" y2="270" stroke="#555" stroke-width="1"/>
  <line x1="500" y1="250" x2="500" y2="270" stroke="#555" stroke-width="1"/>

  <rect x="340" y="270" width="120" height="36" rx="6" fill="#1a2533" stroke="#55c555" stroke-width="1"/>
  <text x="400" y="293" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">web</text>
  <text x="400" y="308" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11">Next.js 앱</text>

  <rect x="470" y="270" width="120" height="36" rx="6" fill="#1a2533" stroke="#55c555" stroke-width="1"/>
  <text x="530" y="293" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">api</text>
  <text x="530" y="308" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11">Node.js API</text>

  <!-- tooling sub-items -->
  <line x1="720" y1="224" x2="720" y2="270" stroke="#555" stroke-width="1"/>

  <rect x="660" y="270" width="120" height="36" rx="6" fill="#1a2533" stroke="#888" stroke-width="1"/>
  <text x="720" y="293" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">eslint-config</text>
  <text x="720" y="308" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11">공유 설정</text>

  <!-- Root files -->
  <rect x="60" y="370" width="760" height="80" rx="8" fill="#111218" stroke="#555" stroke-width="1"/>
  <text x="440" y="396" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600">루트 파일</text>
  <text x="100" y="416" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">package.json</text>
  <text x="100" y="434" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">workspaces 선언</text>
  <text x="280" y="416" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">pnpm-workspace.yaml</text>
  <text x="280" y="434" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">패키지 경로 지정</text>
  <text x="500" y="416" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">turbo.json</text>
  <text x="500" y="434" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">빌드 파이프라인</text>
  <text x="650" y="416" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">tsconfig.base.json</text>
  <text x="650" y="434" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">공유 TS 설정</text>

  <!-- Bottom note -->
  <text x="440" y="472" text-anchor="middle" fill="#555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">apps/web는 packages/ui를 "workspace:*"로 참조 — 로컬 패키지 심링크</text>
</svg>
