<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Karpenter vs Cluster Autoscaler</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">주요 차이점 비교</text>

  <!-- Header row -->
  <rect x="60" y="90" width="360" height="36" fill="#1a1420" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="240" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Karpenter</text>

  <rect x="460" y="90" width="360" height="36" fill="#0f1923" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Cluster Autoscaler</text>

  <!-- Row 1 -->
  <rect x="60" y="134" width="360" height="36" fill="#0a1015" rx="4" stroke="#2a2a3e" stroke-width="1"/>
  <text x="240" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">노드 그룹 불필요 — Pod 요건으로 직접 선택</text>

  <rect x="460" y="134" width="360" height="36" fill="#0a1015" rx="4" stroke="#2a2a3e" stroke-width="1"/>
  <text x="640" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">사전 정의된 노드 그룹(ASG 등) 필요</text>

  <!-- Row 2 -->
  <rect x="60" y="178" width="360" height="36" fill="#0a1015" rx="4" stroke="#2a2a3e" stroke-width="1"/>
  <text x="240" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">수백 가지 인스턴스 타입 자동 평가</text>

  <rect x="460" y="178" width="360" height="36" fill="#0a1015" rx="4" stroke="#2a2a3e" stroke-width="1"/>
  <text x="640" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">미리 구성된 인스턴스 타입만</text>

  <!-- Row 3 -->
  <rect x="60" y="222" width="360" height="36" fill="#0a1015" rx="4" stroke="#2a2a3e" stroke-width="1"/>
  <text x="240" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">Consolidation — 노드 통합 최적화</text>

  <rect x="460" y="222" width="360" height="36" fill="#0a1015" rx="4" stroke="#2a2a3e" stroke-width="1"/>
  <text x="640" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">일정 조건 미달 노드만 제거</text>

  <!-- Row 4 -->
  <rect x="60" y="266" width="360" height="36" fill="#0a1015" rx="4" stroke="#2a2a3e" stroke-width="1"/>
  <text x="240" y="289" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8a020" text-anchor="middle">AWS·Azure 지원 (멀티 클라우드 제한)</text>

  <rect x="460" y="266" width="360" height="36" fill="#0a1015" rx="4" stroke="#2a2a3e" stroke-width="1"/>
  <text x="640" y="289" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">20+ Cloud Provider 지원</text>

  <!-- Row 5 -->
  <rect x="60" y="310" width="360" height="32" fill="#0a1015" rx="4" stroke="#2a2a3e" stroke-width="1"/>
  <text x="240" y="331" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">빠른 프로비저닝 (60초 내)</text>

  <rect x="460" y="310" width="360" height="32" fill="#0a1015" rx="4" stroke="#2a2a3e" stroke-width="1"/>
  <text x="640" y="331" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">ASG 지연 포함 (3~5분)</text>
</svg>
