<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">LVM 3계층 아키텍처</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">PV (물리 볼륨) → VG (볼륨 그룹) → LV (논리 볼륨)</text>

  <!-- Layer 1: Physical Volumes -->
  <text x="440" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">Layer 1 — Physical Volumes (PV)</text>
  <rect x="60" y="116" width="230" height="50" fill="#111827" rx="8" stroke="#888" stroke-width="1.5"/>
  <text x="175" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">/dev/sdb1</text>
  <text x="175" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">100G — Physical Extents</text>
  <rect x="325" y="116" width="230" height="50" fill="#111827" rx="8" stroke="#888" stroke-width="1.5"/>
  <text x="440" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">/dev/sdc1</text>
  <text x="440" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">200G — Physical Extents</text>
  <rect x="590" y="116" width="230" height="50" fill="#111827" rx="8" stroke="#888" stroke-width="1.5"/>
  <text x="705" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">/dev/sdd</text>
  <text x="705" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">500G — Physical Extents</text>

  <!-- Arrows PV to VG -->
  <line x1="175" y1="166" x2="175" y2="190" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="175,196 169,184 181,184" fill="#7ec8e3"/>
  <line x1="440" y1="166" x2="440" y2="190" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="440,196 434,184 446,184" fill="#7ec8e3"/>
  <line x1="705" y1="166" x2="705" y2="190" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="705,196 699,184 711,184" fill="#7ec8e3"/>

  <!-- Layer 2: Volume Group -->
  <text x="440" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Layer 2 — Volume Group (VG): vg_data</text>
  <rect x="60" y="224" width="760" height="50" fill="#071420" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">vg_data</text>
  <text x="440" y="263" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">800G 통합 풀 — 세 장치의 용량이 하나의 공간으로</text>

  <!-- Arrows VG to LV -->
  <line x1="230" y1="274" x2="230" y2="298" stroke="#55c555" stroke-width="2"/>
  <polygon points="230,304 224,292 236,292" fill="#55c555"/>
  <line x1="440" y1="274" x2="440" y2="298" stroke="#55c555" stroke-width="2"/>
  <polygon points="440,304 434,292 446,292" fill="#55c555"/>
  <line x1="660" y1="274" x2="660" y2="298" stroke="#55c555" stroke-width="2"/>
  <polygon points="660,304 654,292 666,292" fill="#55c555"/>

  <!-- Layer 3: Logical Volumes -->
  <text x="440" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Layer 3 — Logical Volumes (LV)</text>
  <rect x="60" y="328" width="290" height="52" fill="#071a07" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="205" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">lv_root</text>
  <text x="205" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">50G → /dev/vg_data/lv_root → /</text>
  <rect x="295" y="328" width="290" height="52" fill="#071a07" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">lv_home</text>
  <text x="440" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">200G → /dev/vg_data/lv_home → /home</text>
  <rect x="530" y="328" width="290" height="52" fill="#071a07" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="675" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" text-anchor="middle">lv_data (미할당)</text>
  <text x="675" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">550G 남음 → 언제든 LV 추가/확장</text>

  <!-- Bottom benefit -->
  <rect x="60" y="400" width="760" height="44" fill="#071a07" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">LVM 핵심 장점: 서비스 중단 없이 LV 확장 가능 · 여러 디스크를 하나의 공간으로 통합</text>
  <text x="440" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">스냅샷(snapshot) · 씬 프로비저닝(thin-provisioning) · RAID 기능 내장</text>
</svg>
