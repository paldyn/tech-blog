<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="360" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">모듈화 사다리 — 한 단계씩 올라간다</text>

  <defs>
    <marker id="mmArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- step 1 -->
  <rect x="60" y="86" width="760" height="56" rx="8" fill="#0f1626" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="84" y="112" font-size="14" font-weight="600" fill="#e8e8e8">1. classpath — unnamed module</text>
  <text x="84" y="132" font-size="12" fill="#9aa4b8">기존 그대로. 모든 JAR가 이름 없는 모듈로 묶여 동작 (출발점)</text>

  <!-- step 2 -->
  <rect x="60" y="160" width="760" height="56" rx="8" fill="#0f1626" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="84" y="186" font-size="14" font-weight="600" fill="#7ec8e3">2. automatic module</text>
  <text x="84" y="206" font-size="12" fill="#9aa4b8">module-info 없는 JAR를 module path에 — 파일명이 모듈명, 모든 패키지 export</text>

  <!-- step 3 -->
  <rect x="60" y="234" width="760" height="56" rx="8" fill="#102117" stroke="#55c555" stroke-width="1.5"/>
  <text x="84" y="260" font-size="14" font-weight="600" fill="#55c555">3. explicit module</text>
  <text x="84" y="280" font-size="12" fill="#9aa4b8">module-info.java 작성 — requires/exports로 의존과 공개를 명시 (목표)</text>

  <line x1="440" y1="142" x2="440" y2="158" stroke="#7ec8e3" stroke-width="2" marker-end="url(#mmArr)"/>
  <line x1="440" y1="216" x2="440" y2="232" stroke="#7ec8e3" stroke-width="2" marker-end="url(#mmArr)"/>

  <text x="440" y="328" font-size="13" fill="#9aa4b8" text-anchor="middle">한 번에 전부 바꾸지 않고, 단계별로 점진 이행할 수 있게 설계되어 있다</text>
</svg>
