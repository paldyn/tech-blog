<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" style="background:#0a0a0a;">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">Edit / Textarea — 주요 속성 비교</text>

  <!-- Left column header: Edit -->
  <rect x="50" y="66" width="370" height="396" rx="8" fill="#0d1220" stroke="#2a3a4a" stroke-width="1.5"/>
  <rect x="50" y="66" width="370" height="44" rx="8" fill="#0a1a34"/>
  <rect x="50" y="94" width="370" height="16" fill="#0a1a34"/>
  <text x="235" y="95" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#7ec8e3">Edit</text>

  <!-- Right column header: Textarea -->
  <rect x="460" y="66" width="370" height="396" rx="8" fill="#0d1220" stroke="#2a3a4a" stroke-width="1.5"/>
  <rect x="460" y="66" width="370" height="44" rx="8" fill="#0a2530"/>
  <rect x="460" y="94" width="370" height="16" fill="#0a2530"/>
  <text x="645" y="95" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#55c555">Textarea</text>

  <!-- Row lines and content -->
  <!-- Row 1: type description -->
  <rect x="60" y="122" width="350" height="50" rx="4" fill="#101828"/>
  <text x="72" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">용도</text>
  <text x="72" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8">단일 행 텍스트 입력</text>

  <rect x="470" y="122" width="350" height="50" rx="4" fill="#101828"/>
  <text x="482" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">용도</text>
  <text x="482" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8">다중 행 텍스트 입력</text>

  <!-- Row 2: value -->
  <rect x="60" y="182" width="350" height="50" rx="4" fill="#0d1520"/>
  <text x="72" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">value</text>
  <text x="72" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#7ec8e3">obj.value</text>

  <rect x="470" y="182" width="350" height="50" rx="4" fill="#0d1520"/>
  <text x="482" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">value</text>
  <text x="482" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#7ec8e3">obj.value (줄바꿈 \n 포함)</text>

  <!-- Row 3: multiline -->
  <rect x="60" y="242" width="350" height="50" rx="4" fill="#101828"/>
  <text x="72" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">multiline</text>
  <text x="72" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e05555">지원 안 함</text>

  <rect x="470" y="242" width="350" height="50" rx="4" fill="#101828"/>
  <text x="482" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">multiline</text>
  <text x="482" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#55c555">기본 지원, 스크롤 자동</text>

  <!-- Row 4: key events -->
  <rect x="60" y="302" width="350" height="50" rx="4" fill="#0d1520"/>
  <text x="72" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">주요 이벤트</text>
  <text x="72" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8">onkeyup, onchanged, oninput</text>

  <rect x="470" y="302" width="350" height="50" rx="4" fill="#0d1520"/>
  <text x="482" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">주요 이벤트</text>
  <text x="482" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8">onkeyup, onchanged, onscroll</text>

  <!-- Row 5: style -->
  <rect x="60" y="362" width="350" height="50" rx="4" fill="#101828"/>
  <text x="72" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">텍스트 정렬</text>
  <text x="72" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8">halign: left/center/right</text>

  <rect x="470" y="362" width="350" height="50" rx="4" fill="#101828"/>
  <text x="482" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">텍스트 정렬</text>
  <text x="482" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8">halign + wordwrap 조합</text>

  <!-- Footer -->
  <text x="440" y="484" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#444">PALDYN · Nexacro N 완전 정복</text>
</svg>
