<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">throw — 콜 스택 위로 에러 전파</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">catch를 만날 때까지 스택을 거슬러 올라간다</text>

  <!-- Stack frames (bottom to top) -->
  <!-- Frame 3: parseJSON (throw here) -->
  <rect x="300" y="380" width="280" height="60" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="2"/>
  <text x="440" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">parseJSON()</text>
  <text x="440" y="424" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">throw new SyntaxError('잘못된 JSON')</text>

  <!-- Frame 2: loadConfig -->
  <rect x="240" y="290" width="400" height="60" rx="6" fill="#0f0808" stroke="#e05555"/>
  <text x="440" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">loadConfig()</text>
  <text x="440" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">parseJSON(text) 호출 → 에러 전파 중...</text>

  <!-- Frame 1: init -->
  <rect x="180" y="200" width="520" height="60" rx="6" fill="#0f0808" stroke="#e05555"/>
  <text x="440" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">init()</text>
  <text x="440" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">loadConfig() 호출 → 에러 전파 중...</text>

  <!-- Frame 0: main (catch here) -->
  <rect x="80" y="110" width="720" height="60" rx="6" fill="#071510" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">main() — try { ... } catch(e) { ... }</text>
  <text x="440" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">여기서 포착 → e instanceof SyntaxError</text>

  <!-- Arrows (upward propagation) -->
  <line x1="440" y1="378" x2="440" y2="352" stroke="#e05555" stroke-width="2"/>
  <polygon points="433,358 440,348 447,358" fill="#e05555"/>

  <line x1="440" y1="288" x2="440" y2="262" stroke="#e05555" stroke-width="2"/>
  <polygon points="433,268 440,258 447,268" fill="#e05555"/>

  <line x1="440" y1="198" x2="440" y2="172" stroke="#e05555" stroke-width="2"/>
  <polygon points="433,178 440,168 447,178" fill="#55c555"/>

  <!-- Labels -->
  <text x="458" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">throw</text>
  <text x="458" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">전파</text>
  <text x="458" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">포착!</text>

  <!-- Stack label -->
  <text x="62" y="476" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">콜 스택 (위 = 더 오래된 호출, 아래 = 현재 실행 위치)</text>
  <line x1="50" y1="104" x2="50" y2="446" stroke="#333" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="44" y="110" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">오래된</text>
  <text x="44" y="448" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">최신</text>

  <!-- Finally note -->
  <rect x="80" y="456" width="720" height="28" rx="4" fill="#0a1020" stroke="#7777cc"/>
  <text x="440" y="475" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">finally 블록은 catch 전에 각 프레임을 빠져나갈 때 항상 실행됩니다</text>
</svg>
