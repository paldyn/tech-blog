<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Skopeo inspect — pull 없이 이미지 정보 조회</text>

  <!-- Code block -->
  <rect x="60" y="66" width="760" height="280" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="90" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># pull 없이 레지스트리에서 이미지 메타데이터 조회</text>
  <text x="76" y="108" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">skopeo <tspan fill="#7ec8e3" font-weight="600">inspect</tspan> docker://nginx:latest</text>

  <text x="76" y="132" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 특정 다이제스트로 정확한 버전 조회</text>
  <text x="76" y="150" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">skopeo inspect docker://nginx@sha256:<tspan fill="#ce9178">abc123...</tspan></text>

  <text x="76" y="174" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># raw 매니페스트 조회 (레이어 다이제스트 포함)</text>
  <text x="76" y="192" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">skopeo inspect --raw docker://nginx:latest | python3 -m json.tool</text>

  <text x="76" y="216" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 프라이빗 레지스트리 (인증)</text>
  <text x="76" y="234" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">skopeo inspect \</text>
  <text x="76" y="252" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  --creds <tspan fill="#ce9178">user:password</tspan> \</text>
  <text x="76" y="270" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  docker://myregistry.io/myapp:latest</text>

  <text x="76" y="294" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 멀티 아키텍처 이미지 목록 조회</text>
  <text x="76" y="312" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">skopeo <tspan fill="#7ec8e3" font-weight="600">inspect</tspan> --raw docker://nginx:latest \</text>
  <text x="76" y="330" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  | jq '.manifests[] | {arch: .platform.architecture, digest: .digest}'</text>

  <!-- Bottom label -->
  <text x="440" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">skopeo inspect = 이미지 다운로드 없이 레지스트리 API 직접 조회 → CI 체크·취약점 스캔 전처리에 활용</text>
</svg>
