<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420" style="background:#0a0a0a;border-radius:12px">
  <defs>
    <marker id="arrDown2" viewBox="0 0 14 14" refX="7" refY="12"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 7 14 L 14 0 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">제네릭 클래스 — Stack&lt;T&gt; 구조</text>

  <!-- Generic class definition -->
  <rect x="270" y="64" width="340" height="80" rx="10" fill="#0a0a12" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="90" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">class Stack&lt;T&gt;</text>
  <text x="440" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">items: T[]</text>
  <text x="440" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">push(item: T) / pop(): T | undefined</text>

  <!-- Instance 1: string stack -->
  <rect x="80" y="200" width="240" height="110" rx="10" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="200" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" text-anchor="middle">Stack&lt;string&gt;</text>
  <text x="200" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">items: string[]</text>
  <text x="200" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">push("hello") ✅</text>
  <text x="200" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555" text-anchor="middle">push(42) ❌</text>
  <text x="200" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">T = string으로 고정</text>

  <!-- Instance 2: number stack -->
  <rect x="560" y="200" width="240" height="110" rx="10" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="680" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" text-anchor="middle">Stack&lt;number&gt;</text>
  <text x="680" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">items: number[]</text>
  <text x="680" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">push(42) ✅</text>
  <text x="680" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555" text-anchor="middle">push("x") ❌</text>
  <text x="680" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">T = number로 고정</text>

  <!-- Arrows -->
  <line x1="360" y1="144" x2="240" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrDown2)"/>
  <line x1="520" y1="144" x2="640" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrDown2)"/>

  <!-- new Stack<string>() label -->
  <text x="268" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">new Stack&lt;string&gt;()</text>
  <text x="524" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">new Stack&lt;number&gt;()</text>

  <!-- Bottom note -->
  <rect x="80" y="334" width="720" height="64" rx="8" fill="#111111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">제네릭 클래스 핵심</text>
  <text x="100" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">인스턴스 생성 시점에 T가 확정 — 이후 모든 메서드·프로퍼티에 동일 T 적용</text>
</svg>
