<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">들여쓰기 오류 유형과 해결</text>

  <rect x="60" y="66" width="760" height="276" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text x="76" y="94" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 오류 1: IndentationError — 들여쓰기 없음</text>
  <text x="76" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">def</tspan><tspan fill="#ffffff"> greet():</tspan></text>
  <text x="76" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e05555">print</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"hi"</tspan><tspan fill="#ffffff">)  </tspan><tspan fill="#e05555"># IndentationError: expected an indented block</tspan></text>

  <text x="76" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 오류 2: IndentationError — 예상치 못한 들여쓰기</text>
  <text x="76" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">x = </tspan><tspan fill="#b5cea8">10</tspan></text>
  <text x="76" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e05555">    </tspan><tspan fill="#ffffff">y = </tspan><tspan fill="#b5cea8">20</tspan><tspan fill="#e05555">  # IndentationError: unexpected indent</tspan></text>

  <text x="76" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 오류 3: TabError — 탭과 스페이스 혼용</text>
  <text x="76" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">def</tspan><tspan fill="#ffffff"> mixed():</tspan></text>
  <text x="76" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    a = </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#9aa4b8">    # 스페이스 4칸</tspan></text>
  <text x="76" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e05555">	</tspan><tspan fill="#ffffff">b = </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e05555">   # 탭 1개 → TabError (Python 3)</tspan></text>

  <text x="76" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 해결: 에디터 설정에서 탭을 스페이스 4칸으로 자동 변환</text>
  <text x="76" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555"># VS Code: editor.insertSpaces=true, editor.tabSize=4</text>
</svg>
