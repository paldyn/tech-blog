<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <style>text:not([font-family]) { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }</style>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">들여쓰기 오류 유형</text>
  <text x="440" y="68" text-anchor="middle" font-size="15" font-weight="600" fill="#888">자주 만나는 IndentationError 해결법</text>

  <!-- Error 1: unexpected indent -->
  <rect x="60" y="88" width="360" height="36" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="111" text-anchor="middle" font-size="12" font-weight="700" fill="#e05555">unexpected indent</text>

  <rect x="60" y="132" width="360" height="88" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">x = </tspan><tspan fill="#b5cea8">5</tspan></text>
  <text x="76" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    y = </tspan><tspan fill="#b5cea8">10</tspan><tspan fill="#6a8aa0">  # ← 불필요한 들여쓰기</tspan></text>
  <text x="76" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">IndentationError: unexpected indent</text>
  <text x="76" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 블록 없이 들여쓰기 불가</text>

  <!-- Error 2: expected indented block -->
  <rect x="460" y="88" width="360" height="36" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="640" y="111" text-anchor="middle" font-size="12" font-weight="700" fill="#e05555">expected an indented block</text>

  <rect x="460" y="132" width="360" height="88" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="476" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">def</tspan><tspan fill="#e8e8e8"> </tspan><tspan fill="#55c555">do_work</tspan><tspan fill="#e8e8e8">():</tspan></text>
  <text x="476" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># 아무 것도 없음</tspan></text>
  <text x="476" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">IndentationError: expected indent</text>
  <text x="476" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># pass 또는 ... 으로 해결</text>

  <!-- Fix section -->
  <text x="440" y="260" text-anchor="middle" font-size="14" font-weight="700" fill="#888">해결 방법</text>

  <!-- Fix 1 -->
  <rect x="60" y="276" width="360" height="88" rx="6" fill="#070b14" stroke="#55c555" stroke-width="1"/>
  <text x="76" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 수정: 들여쓰기 제거</text>
  <text x="76" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">x = </tspan><tspan fill="#b5cea8">5</tspan></text>
  <text x="76" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">y = </tspan><tspan fill="#b5cea8">10</tspan><tspan fill="#6a8aa0">  # ← 올바른 수준</tspan></text>
  <text x="76" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">✓ 같은 수준으로 정렬</text>

  <!-- Fix 2 -->
  <rect x="460" y="276" width="360" height="88" rx="6" fill="#070b14" stroke="#55c555" stroke-width="1"/>
  <text x="476" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 수정: 빈 함수는 pass 사용</text>
  <text x="476" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">def</tspan><tspan fill="#e8e8e8"> </tspan><tspan fill="#55c555">do_work</tspan><tspan fill="#e8e8e8">():</tspan></text>
  <text x="476" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    </tspan><tspan fill="#7ec8e3">pass</tspan><tspan fill="#6a8aa0">  # 또는 ...</tspan></text>
  <text x="476" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">✓ 빈 블록 자리 표시자</text>

  <!-- TabError note -->
  <rect x="60" y="382" width="760" height="78" rx="8" fill="#0f1418" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="406" text-anchor="middle" font-size="13" font-weight="700" fill="#7777cc">TabError: inconsistent use of tabs and spaces</text>
  <text x="440" y="428" text-anchor="middle" font-size="12" fill="#aaa">탭과 스페이스를 같은 파일에서 혼용했을 때 발생</text>
  <text x="440" y="448" text-anchor="middle" font-size="12" fill="#aaa">에디터에서 "스페이스로 탭 변환" 설정으로 영구 방지 가능</text>
</svg>
