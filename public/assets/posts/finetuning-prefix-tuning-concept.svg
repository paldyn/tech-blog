<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" style="background:#0a0a0a" rx="12">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Prefix Tuning 작동 원리</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888" text-anchor="middle">학습 가능한 접두사 토큰이 각 Transformer 레이어의 KV에 삽입된다</text>

  <!-- ─── Left: Standard Input (no prefix) ─── -->
  <text x="190" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#888" text-anchor="middle">일반 입력 (Hard Prompt)</text>

  <!-- Token boxes -->
  <rect x="60" y="116" width="56" height="36" rx="6" fill="#12161f" stroke="#2a3040" stroke-width="1.2"/>
  <text x="88" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">[BOS]</text>

  <rect x="122" y="116" width="56" height="36" rx="6" fill="#12161f" stroke="#2a3040" stroke-width="1.2"/>
  <text x="150" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">입력1</text>

  <rect x="184" y="116" width="56" height="36" rx="6" fill="#12161f" stroke="#2a3040" stroke-width="1.2"/>
  <text x="212" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">입력2</text>

  <rect x="246" y="116" width="56" height="36" rx="6" fill="#12161f" stroke="#2a3040" stroke-width="1.2"/>
  <text x="274" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">입력3</text>

  <!-- Arrow down to Transformer -->
  <line x1="190" y1="155" x2="190" y2="194" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Transformer block left -->
  <rect x="80" y="196" width="220" height="52" rx="8" fill="#0f1420" stroke="#2a3040" stroke-width="1.2"/>
  <text x="190" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">Transformer Layer</text>
  <text x="190" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Self-Attention + FFN</text>

  <line x1="190" y1="250" x2="190" y2="284" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="130" y="286" width="120" height="34" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.2"/>
  <text x="190" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">출력 (Output)</text>

  <!-- ─── Right: Prefix Tuning ─── -->
  <text x="650" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">Prefix Tuning (Soft Prompt)</text>

  <!-- Prefix token boxes (learnable, highlighted) -->
  <rect x="480" y="116" width="58" height="36" rx="6" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="1.8"/>
  <text x="509" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">P₁</text>
  <text x="509" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#5a8aaa" text-anchor="middle">학습가능</text>

  <rect x="544" y="116" width="58" height="36" rx="6" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="1.8"/>
  <text x="573" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">P₂</text>
  <text x="573" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#5a8aaa" text-anchor="middle">학습가능</text>

  <!-- Input token boxes -->
  <rect x="608" y="116" width="52" height="36" rx="6" fill="#12161f" stroke="#2a3040" stroke-width="1.2"/>
  <text x="634" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">입력1</text>

  <rect x="666" y="116" width="52" height="36" rx="6" fill="#12161f" stroke="#2a3040" stroke-width="1.2"/>
  <text x="692" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">입력2</text>

  <rect x="724" y="116" width="52" height="36" rx="6" fill="#12161f" stroke="#2a3040" stroke-width="1.2"/>
  <text x="750" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">입력3</text>

  <line x1="630" y1="155" x2="630" y2="172" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- KV Cache annotation -->
  <rect x="480" y="174" width="340" height="28" rx="5" fill="#0d1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="650" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">KV Cache에 Prefix 키·값 선행 삽입</text>

  <line x1="650" y1="204" x2="650" y2="194" stroke="#555" stroke-width="1"/>
  <line x1="650" y1="204" x2="650" y2="218" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Transformer block right -->
  <rect x="480" y="220" width="340" height="52" rx="8" fill="#0f1420" stroke="#2a3040" stroke-width="1.2"/>
  <text x="650" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">Transformer Layer</text>
  <text x="650" y="261" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">기본 모델 파라미터 동결 (Frozen)</text>

  <line x1="650" y1="274" x2="650" y2="308" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="585" y="310" width="130" height="34" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.2"/>
  <text x="650" y="331" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">출력 (Output)</text>

  <!-- ─── Vertical divider ─── -->
  <line x1="430" y1="90" x2="430" y2="360" stroke="#2a3040" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- ─── Bottom comparison table ─── -->
  <rect x="60" y="372" width="760" height="72" rx="8" fill="#0f1117" stroke="#1e2433" stroke-width="1.2"/>

  <!-- Header -->
  <rect x="60" y="372" width="760" height="26" rx="8" fill="#131825"/>
  <text x="60" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="1" fill="none">.</text>
  <text x="190" y="389" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">Hard Prompt</text>
  <text x="440" y="389" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">Soft Prompt</text>
  <text x="690" y="389" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">Prefix Tuning</text>

  <line x1="60" y1="398" x2="820" y2="398" stroke="#1e2433" stroke-width="1"/>
  <line x1="330" y1="372" x2="330" y2="444" stroke="#1e2433" stroke-width="1"/>
  <line x1="570" y1="372" x2="570" y2="444" stroke="#1e2433" stroke-width="1"/>

  <text x="190" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">자연어 지시문</text>
  <text x="190" y="433" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">이산 토큰, 고정</text>

  <text x="440" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">임베딩 공간의 연속 벡터</text>
  <text x="440" y="433" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">입력 레이어에만 적용</text>

  <text x="690" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">모든 레이어 KV에 적용</text>
  <text x="690" y="433" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">기울기로 직접 최적화</text>

  <!-- Defs -->
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#555"/>
    </marker>
  </defs>
</svg>
