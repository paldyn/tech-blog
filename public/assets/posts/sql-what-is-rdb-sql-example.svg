<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SQL 질의의 처리 흐름</text>

  <defs>
    <marker id="step-arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="60" y="70" width="180" height="70" fill="#111" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">① SQL 입력</text>
  <text x="150" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">SELECT * FROM users</text>
  <text x="150" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">WHERE id = 1</text>

  <line x1="240" y1="105" x2="280" y2="105" stroke="#7ec8e3" stroke-width="2" marker-end="url(#step-arr)"/>

  <rect x="280" y="70" width="150" height="70" fill="#111" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="355" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">② 파서</text>
  <text x="355" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">구문 분석</text>
  <text x="355" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">AST 생성</text>

  <line x1="430" y1="105" x2="470" y2="105" stroke="#7ec8e3" stroke-width="2" marker-end="url(#step-arr)"/>

  <rect x="470" y="70" width="150" height="70" fill="#111" rx="8" stroke="#e8a020" stroke-width="1.5"/>
  <text x="545" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8a020" text-anchor="middle">③ 최적화</text>
  <text x="545" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">실행 계획 선택</text>
  <text x="545" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">최저비용 경로</text>

  <line x1="620" y1="105" x2="660" y2="105" stroke="#7ec8e3" stroke-width="2" marker-end="url(#step-arr)"/>

  <rect x="660" y="70" width="160" height="70" fill="#111" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="740" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">④ 실행</text>
  <text x="740" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">실행 엔진</text>
  <text x="740" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">데이터 획득</text>

  <rect x="60" y="170" width="380" height="220" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="193" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 간단한 조회 예시</text>
  <text x="76" y="213" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">SELECT</text>
  <text x="130" y="213" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  u.name, o.amount</text>
  <text x="76" y="233" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">FROM</text>
  <text x="116" y="233" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    users u</text>
  <text x="76" y="253" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">JOIN</text>
  <text x="108" y="253" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    orders o</text>
  <text x="76" y="273" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">  ON</text>
  <text x="104" y="273" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  u.user_id = o.user_id</text>
  <text x="76" y="293" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">WHERE</text>
  <text x="118" y="293" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  o.amount &gt; 40000</text>
  <text x="76" y="313" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">ORDER BY</text>
  <text x="140" y="313" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> o.amount DESC;</text>
  <text x="76" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 결과: 김철수 | 50,000</text>
  <text x="76" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">--       이영희 | 120,000</text>

  <rect x="460" y="170" width="360" height="220" fill="#0d0d0d" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">RDB vs NoSQL 비교</text>

  <rect x="476" y="208" width="150" height="22" fill="#162030"/>
  <text x="551" y="223" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">RDB</text>
  <rect x="634" y="208" width="170" height="22" fill="#162030"/>
  <text x="719" y="223" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">NoSQL</text>

  <text x="476" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">구조:</text>
  <text x="551" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">고정 스키마</text>
  <text x="719" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">유연 스키마</text>

  <text x="476" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">쿼리:</text>
  <text x="551" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">SQL 표준</text>
  <text x="719" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">다양한 API</text>

  <text x="476" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">트랜잭션:</text>
  <text x="551" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">ACID 강력</text>
  <text x="719" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#9aa4b8" text-anchor="middle">BASE (대부분)</text>

  <text x="476" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">스케일:</text>
  <text x="551" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#9aa4b8" text-anchor="middle">수직적(상대적)</text>
  <text x="719" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">수평적 확장 용이</text>

  <text x="476" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">어디:</text>
  <text x="551" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">금융/ERP/CRM</text>
  <text x="719" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">캐시/로그/소셜</text>

  <line x1="460" y1="230" x2="820" y2="230" stroke="#3a4a6e" stroke-width="0.5"/>
  <line x1="626" y1="208" x2="626" y2="358" stroke="#3a4a6e" stroke-width="0.5"/>
</svg>