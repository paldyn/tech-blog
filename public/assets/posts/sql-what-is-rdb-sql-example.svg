<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SQL로 데이터를 다루는 방법</text>

  <!-- Code box -->
  <rect x="60" y="68" width="760" height="240" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text x="76" y="96" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 테이블 생성</text>
  <text x="76" y="116" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">CREATE TABLE</tspan>
    <tspan fill="#ffffff"> customers (</tspan>
  </text>
  <text x="76" y="136" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    id       </tspan>
    <tspan fill="#7ec8e3" font-weight="600">INT</tspan>
    <tspan fill="#7ec8e3" font-weight="600"> PRIMARY KEY</tspan>
    <tspan fill="#ffffff">,</tspan>
  </text>
  <text x="76" y="156" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    name     </tspan>
    <tspan fill="#7ec8e3" font-weight="600">VARCHAR</tspan>
    <tspan fill="#ffffff">(</tspan>
    <tspan fill="#b5cea8">100</tspan>
    <tspan fill="#ffffff">)</tspan>
    <tspan fill="#7ec8e3" font-weight="600"> NOT NULL</tspan>
    <tspan fill="#ffffff">,</tspan>
  </text>
  <text x="76" y="176" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    email    </tspan>
    <tspan fill="#7ec8e3" font-weight="600">VARCHAR</tspan>
    <tspan fill="#ffffff">(</tspan>
    <tspan fill="#b5cea8">200</tspan>
    <tspan fill="#ffffff">)</tspan>
  </text>
  <text x="76" y="196" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">);</tspan>
  </text>

  <text x="76" y="220" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 데이터 조회</text>
  <text x="76" y="240" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">SELECT</tspan>
    <tspan fill="#ffffff"> id, name, email</tspan>
  </text>
  <text x="76" y="260" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">FROM</tspan>
    <tspan fill="#ffffff"> customers</tspan>
  </text>
  <text x="76" y="280" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">WHERE</tspan>
    <tspan fill="#ffffff"> id = </tspan>
    <tspan fill="#b5cea8">1</tspan>
    <tspan fill="#ffffff">;</tspan>
  </text>

  <!-- Three labels -->
  <rect x="60" y="330" width="230" height="60" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="175" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">DDL</text>
  <text x="175" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">구조 정의 (CREATE)</text>

  <rect x="325" y="330" width="230" height="60" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">DML</text>
  <text x="440" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">데이터 조작 (SELECT)</text>

  <rect x="590" y="330" width="230" height="60" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="705" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">TCL</text>
  <text x="705" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">트랜잭션 제어</text>
</svg>
