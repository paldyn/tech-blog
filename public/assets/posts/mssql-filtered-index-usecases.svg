<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">필터된 인덱스 활용 패턴</text>

  <!-- Pattern 1: Sparse unique -->
  <rect x="60" y="68" width="360" height="120" rx="8" fill="#111122" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">① 희소 유니크 제약 (Sparse UNIQUE)</text>
  <text x="80" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">NULL을 제외한 값만 유니크 보장</text>
  <rect x="80" y="126" width="320" height="48" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#7ec8e3">CREATE UNIQUE INDEX</text>
  <text x="96" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">ON users (email) </text>
  <text x="96" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#7ec8e3">WHERE</text>
  <text x="96" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> email </text>
  <text x="96" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#7ec8e3">IS NOT NULL</text>

  <!-- Pattern 2: Status filter -->
  <rect x="460" y="68" width="360" height="120" rx="8" fill="#111122" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">② 상태 기반 작업 큐</text>
  <text x="480" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">미완료 항목만 빠르게 조회</text>
  <rect x="480" y="126" width="320" height="48" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#7ec8e3">CREATE INDEX</text>
  <text x="496" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> ix_pending</text>
  <text x="496" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">ON jobs (created_at) </text>
  <text x="496" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#7ec8e3">WHERE</text>
  <text x="496" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> done=0</text>

  <!-- Pattern 3: Soft delete -->
  <rect x="60" y="210" width="360" height="120" rx="8" fill="#111122" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">③ 소프트 삭제 필터</text>
  <text x="80" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">삭제되지 않은 활성 데이터만 색인</text>
  <rect x="80" y="268" width="320" height="48" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#7ec8e3">CREATE INDEX</text>
  <text x="96" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> ix_active_items</text>
  <text x="96" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">ON items (name, price) </text>
  <text x="96" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#7ec8e3">WHERE</text>
  <text x="96" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> deleted_at </text>
  <text x="96" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#7ec8e3">IS NULL</text>

  <!-- Pattern 4: Range filter -->
  <rect x="460" y="210" width="360" height="120" rx="8" fill="#111122" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">④ 최근 데이터 집중 최적화</text>
  <text x="480" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">특정 기간 데이터에 특화</text>
  <rect x="480" y="268" width="320" height="48" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#7ec8e3">CREATE INDEX</text>
  <text x="496" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> ix_recent</text>
  <text x="496" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">ON logs (created) </text>
  <text x="496" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#7ec8e3">WHERE</text>
  <text x="496" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> created>='2026-01-01'</text>

  <!-- Bottom note -->
  <text x="440" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">필터 조건은 단순한 비교·IS NULL·IS NOT NULL만 지원 (복잡한 서브쿼리 불가)</text>
  <text x="440" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">쿼리 WHERE 절이 인덱스 필터 조건을 포함해야 옵티마이저가 선택</text>
  <text x="440" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">파라미터화된 쿼리(@status = 'ACTIVE')는 필터된 인덱스 사용에 주의 필요</text>
</svg>
