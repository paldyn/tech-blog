<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-o" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e0a855"/>
    </marker>
  </defs>

  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">mem0: 계층적 메모리 관리 시스템</text>
  <text x="440" y="66" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">사용자·에이전트·세션 단위로 기억을 자동 추출·저장·검색하는 메모리 레이어</text>

  <!-- User -->
  <rect x="40" y="100" width="100" height="50" rx="6" fill="#0f1f0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="90" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">사용자</text>
  <text x="90" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">대화 입력</text>

  <line x1="140" y1="125" x2="188" y2="125" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- mem0 add -->
  <rect x="190" y="88" width="160" height="74" rx="6" fill="#1a1000" stroke="#e0a855" stroke-width="1.5"/>
  <text x="270" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a855">mem0.add()</text>
  <text x="270" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">LLM으로 핵심 정보</text>
  <text x="270" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">자동 추출·임베딩</text>

  <!-- Arrow down to storage -->
  <line x1="270" y1="162" x2="270" y2="200" stroke="#e0a855" stroke-width="2" marker-end="url(#arr-o)"/>

  <!-- Storage boxes -->
  <rect x="60" y="202" width="430" height="80" rx="6" fill="#0f0f0f" stroke="#333" stroke-width="1"/>
  <text x="275" y="224" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">영속 스토리지</text>

  <rect x="76" y="234" width="110" height="34" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="131" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#7777cc">VectorDB</text>
  <text x="131" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">임베딩 검색</text>

  <rect x="200" y="234" width="110" height="34" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="255" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#7777cc">KV Store</text>
  <text x="255" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">사용자/세션 매핑</text>

  <rect x="324" y="234" width="154" height="34" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="401" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#7777cc">GraphDB (선택)</text>
  <text x="401" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">관계형 메모리</text>

  <!-- Arrow: search -->
  <line x1="350" y1="125" x2="468" y2="125" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="409" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">쿼리</text>

  <!-- mem0 search -->
  <rect x="470" y="88" width="160" height="74" rx="6" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="550" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">mem0.search()</text>
  <text x="550" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">관련 기억 검색</text>
  <text x="550" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">user_id 필터링</text>

  <!-- Arrow to agent -->
  <line x1="630" y1="125" x2="688" y2="125" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="659" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">주입</text>

  <!-- Agent with memory -->
  <rect x="690" y="88" width="160" height="74" rx="6" fill="#0f1f0f" stroke="#55c555" stroke-width="2"/>
  <text x="770" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">에이전트</text>
  <text x="770" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">기억 기반 응답</text>
  <text x="770" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">개인화 서비스</text>

  <!-- Arrow search from storage to mem0 search -->
  <line x1="410" y1="240" x2="550" y2="165" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <!-- Code example -->
  <rect x="40" y="310" width="800" height="106" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="60" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">from mem0 import Memory</text>
  <text x="60" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">m = Memory()</text>
  <text x="60" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve"># 저장</text>
  <text x="60" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">        m.add(</text>
  <text x="60" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">              "사용자가 Python을 선호하고 초보자임"</text>
  <text x="60" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                                                  , user_id=</text>
  <text x="60" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">                                                             "u1"</text>
  <text x="60" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                                                                 )</text>
  <text x="60" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve"># 검색</text>
  <text x="60" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">        results = m.search(</text>
  <text x="60" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">                          "코딩 레벨"</text>
  <text x="60" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                                    , user_id=</text>
  <text x="60" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">                                               "u1"</text>
  <text x="60" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                                                   )</text>
  <text x="60" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># → [{'memory': '사용자는 Python 초보자', 'score': 0.92}]</text>
</svg>
