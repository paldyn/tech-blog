<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">구조화 로그 표준 스키마</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">모든 로그가 같은 필드를 가지면 검색 · 대시보드 · 알림이 가능해진다</text>

  <!-- LEFT: JSON sample -->
  <rect x="60" y="100" width="380" height="320" rx="10" fill="#0d141a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="80" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">표준 JSON 로그 한 줄</text>
  <rect x="76" y="148" width="348" height="256" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">{</tspan></text>
  <text x="92" y="193" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">  "time"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#b5cea8">1699</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="92" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">  "level"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"info"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="92" y="235" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">  "msg"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"order created"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="92" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">  "service"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"checkout"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="92" y="277" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">  "traceId"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"a1b2c3"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="92" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">  "requestId"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"r-99"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="92" y="319" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">  "userId"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#b5cea8">42</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="92" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">  "duration"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#b5cea8">128</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="92" y="361" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">  "err"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#7777cc">null</tspan></text>
  <text x="92" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">}</tspan></text>

  <!-- RIGHT: field reference -->
  <rect x="460" y="100" width="380" height="320" rx="10" fill="#14101a" stroke="#7777cc" stroke-width="1"/>
  <text x="480" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc">필드 레퍼런스</text>

  <text x="480" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">time</text>
  <text x="610" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#d4d4d4">발생 시각 (epoch ms)</text>
  <text x="480" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">level</text>
  <text x="610" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#d4d4d4">심각도 info/warn/error</text>
  <text x="480" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">msg</text>
  <text x="610" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#d4d4d4">짧은 사람용 설명</text>
  <text x="480" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">service</text>
  <text x="610" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#d4d4d4">서비스 이름</text>
  <text x="480" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">traceId</text>
  <text x="610" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#d4d4d4">요청 전체 추적 ID</text>
  <text x="480" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">requestId</text>
  <text x="610" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#d4d4d4">단일 요청 ID</text>
  <text x="480" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">userId</text>
  <text x="610" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#d4d4d4">행위 주체</text>
  <text x="480" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">duration</text>
  <text x="610" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#d4d4d4">처리 시간 (ms)</text>
  <text x="480" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">err</text>
  <text x="610" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#d4d4d4">오류 객체 · 스택</text>

  <!-- Bottom note -->
  <text x="440" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">필드 이름과 타입을 팀 표준으로 고정 — 자유 텍스트 로그로는 못 하는 일이 가능해진다</text>
</svg>
