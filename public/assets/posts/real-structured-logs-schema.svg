<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">구조화 로그 JSON 스키마</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">필드별 역할과 분류</text>

  <!-- Header fields -->
  <text x="60" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">필수 필드 (모든 로그에 포함)</text>

  <rect x="50" y="110" width="780" height="80" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <!-- Field boxes -->
  <rect x="66" y="122" width="100" height="54" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="116" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" font-weight="600">timestamp</text>
  <text x="116" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">ISO8601</text>
  <text x="116" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">2026-05-24T...</text>

  <rect x="180" y="122" width="80" height="54" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="220" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" font-weight="600">level</text>
  <text x="220" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">숫자·문자열</text>
  <text x="220" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">info/warn...</text>

  <rect x="274" y="122" width="80" height="54" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="314" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" font-weight="600">msg</text>
  <text x="314" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">정적 문자열</text>
  <text x="314" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">이벤트 설명</text>

  <rect x="368" y="122" width="100" height="54" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="418" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" font-weight="600">service</text>
  <text x="418" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">서비스 이름</text>
  <text x="418" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">api-gateway</text>

  <rect x="482" y="122" width="100" height="54" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="532" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" font-weight="600">traceId</text>
  <text x="532" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">분산 추적 ID</text>
  <text x="532" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">서비스 간 연결</text>

  <rect x="596" y="122" width="100" height="54" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="646" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" font-weight="600">requestId</text>
  <text x="646" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">요청 단위 ID</text>
  <text x="646" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">요청 흐름 추적</text>

  <!-- Optional fields -->
  <text x="60" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">선택 필드 (이벤트별)</text>

  <rect x="50" y="230" width="370" height="80" rx="6" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="235" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">HTTP 요청 컨텍스트</text>
  <text x="80" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">method, path, statusCode, duration (ms)</text>
  <text x="80" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">userId, sessionId, ip, userAgent</text>
  <text x="80" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">responseSize (bytes)</text>

  <rect x="460" y="230" width="370" height="80" rx="6" fill="#111" stroke="#e05555" stroke-width="1"/>
  <text x="645" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">에러 컨텍스트</text>
  <text x="480" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">err.name, err.message, err.stack</text>
  <text x="480" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">err.code (HTTP/DB/Custom)</text>
  <text x="480" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">err.cause (원인 체인)</text>

  <!-- Example JSON -->
  <text x="60" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">출력 예시 (JSON):</text>
  <rect x="50" y="358" width="780" height="50" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="66" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12">
    <tspan fill="#ffffff">{"level":30,"time":1716516000000,"msg":</tspan>
    <tspan fill="#ce9178">"사용자 로그인 성공"</tspan>
    <tspan fill="#ffffff">,"userId":42,"traceId":</tspan>
    <tspan fill="#ce9178">"abc-123"</tspan>
    <tspan fill="#ffffff">}</tspan>
  </text>
  <text xml:space="preserve" x="66" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// level 숫자: 10=trace, 20=debug, 30=info, 40=warn, 50=error, 60=fatal (Pino 기본)</tspan>
</svg>
