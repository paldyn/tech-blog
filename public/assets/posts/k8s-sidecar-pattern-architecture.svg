<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-p" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">사이드카 패턴 — 공유 리소스로 기능 확장</text>
  <text x="440" y="66" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">메인 컨테이너를 수정하지 않고 사이드카로 로깅·프록시·동기화 기능을 추가합니다</text>

  <!-- Pod boundary -->
  <rect x="60" y="84" width="760" height="240" rx="12" fill="#0a0f1e" stroke="#3a4a6e" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="80" y="106"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#3a4a6e">Pod: web-pod</text>

  <!-- Shared volume (emptyDir) in center -->
  <rect x="368" y="140" width="144" height="100" rx="8" fill="#121e38" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="168" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">공유 볼륨</text>
  <text x="440" y="188" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">emptyDir</text>
  <text x="440" y="206" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">/var/log/app</text>
  <text x="440" y="224" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">localhost 공유</text>

  <!-- Main app container -->
  <rect x="86" y="126" width="230" height="128" rx="8" fill="#0d1520" stroke="#55c555" stroke-width="2"/>
  <text x="201" y="152" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">main-app</text>
  <text x="201" y="172" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">nginx:1.25</text>
  <text x="201" y="190" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">액세스 로그를</text>
  <text x="201" y="208" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">/var/log/app에 기록</text>
  <text x="201" y="228" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">port: 80</text>

  <!-- Sidecar container -->
  <rect x="564" y="126" width="230" height="128" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="2"/>
  <text x="679" y="152" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc">log-shipper</text>
  <text x="679" y="172" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">fluentd:v1.16</text>
  <text x="679" y="190" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">로그 파일 읽어서</text>
  <text x="679" y="208" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Elasticsearch로 전송</text>
  <text x="679" y="228" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">사이드카 역할</text>

  <!-- Arrows between containers and shared volume -->
  <line x1="316" y1="190" x2="366" y2="190" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="341" y="183" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">쓰기</text>

  <line x1="512" y1="190" x2="562" y2="190" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-p)"/>
  <text x="537" y="183" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">읽기</text>

  <!-- External: Elasticsearch -->
  <rect x="620" y="360" width="200" height="52" rx="8" fill="#121e38" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="720" y="384" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8">Elasticsearch</text>
  <text x="720" y="402" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">로그 저장소</text>

  <line x1="679" y1="256" x2="720" y2="358" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-p)"/>

  <!-- 3 sidecar use cases -->
  <rect x="60" y="350" width="520" height="118" rx="8" fill="#0d1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="300" y="372" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">주요 사이드카 패턴</text>

  <text x="80" y="394"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">●</text>
  <text x="98" y="394"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">로그 수집 사이드카: Fluentd / Filebeat가 로그 파일 tail</text>

  <text x="80" y="414"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">●</text>
  <text x="98" y="414"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">프록시 사이드카: Envoy / Istio가 트래픽 인터셉트 (서비스 메시)</text>

  <text x="80" y="434"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">●</text>
  <text x="98" y="434"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">동기화 사이드카: git-sync가 Git 레포 파일 주기적 동기화</text>

  <text x="80" y="454"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">●</text>
  <text x="98" y="454"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">어댑터 사이드카: 다른 포맷의 메트릭을 Prometheus 형식으로 변환</text>
</svg>
