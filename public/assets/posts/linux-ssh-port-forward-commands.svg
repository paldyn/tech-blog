<svg xmlns="http://www.w3.org/2000/svg" width="880" height="370" viewBox="0 0 880 370" style="background:#0a0a0a;border-radius:12px;">
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" xml:space="preserve">SSH 포트 포워딩 명령어</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" xml:space="preserve">-L, -R, -D 실전 사용 예시</text>
  <line x1="60" y1="86" x2="820" y2="86" stroke="#3a4a6e" stroke-width="1"/>

  <rect x="60" y="98" width="760" height="250" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">ssh-port-forward.sh</text>
  <line x1="76" y1="128" x2="804" y2="128" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 로컬 포워딩: localhost:5432 → DB서버:5432</text>
  <text x="76" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3">ssh</tspan> -N -L <tspan fill="#b5cea8">5432</tspan>:db.internal:<tspan fill="#b5cea8">5432</tspan> user@jump</text>
  <text x="76" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 원격 포워딩: jump:8080 → 로컬:80</text>
  <text x="76" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3">ssh</tspan> -N -R <tspan fill="#b5cea8">8080</tspan>:localhost:<tspan fill="#b5cea8">80</tspan> user@jump</text>
  <text x="76" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 다이나믹 (SOCKS5 프록시)</text>
  <text x="76" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3">ssh</tspan> -N -D <tspan fill="#b5cea8">1080</tspan> user@jump</text>
  <text x="76" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 백그라운드 포워딩 &amp; 자동 재연결</text>
  <text x="76" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3">ssh</tspan> -f -N -L <tspan fill="#b5cea8">8080</tspan>:localhost:<tspan fill="#b5cea8">80</tspan> user@jump</text>
  <text x="76" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># ~/.ssh/config 영구 설정</text>
  <text x="76" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3">LocalForward</tspan> <tspan fill="#b5cea8">5432</tspan> db.internal:<tspan fill="#b5cea8">5432</tspan></text>
</svg>
