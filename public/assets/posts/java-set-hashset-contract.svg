<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">equals / hashCode 계약</text>

  <!-- Contract rules -->
  <rect x="60" y="68" width="760" height="100" rx="6" fill="#0f1827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">핵심 계약 (Object.equals/hashCode Javadoc)</text>
  <text x="80" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">① a.equals(b) == true  →  a.hashCode() == b.hashCode()</text>
  <text x="80" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">② a.hashCode() == b.hashCode()  →  a.equals(b)는 true일 수도, false일 수도 있음 (충돌)</text>
  <text x="80" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">③ equals를 재정의하면 반드시 hashCode도 재정의해야 함</text>

  <!-- Broken class example -->
  <text x="60" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">잘못된 구현 — hashCode 없이 equals만 재정의</text>
  <rect x="60" y="200" width="370" height="120" rx="6" fill="#000000" stroke="#e05555" stroke-width="1.5"/>
  <text x="76" y="220" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">class</text>
  <text x="118" y="220" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> Point {</text>
  <text x="76" y="238" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    int</text>
  <text x="116" y="238" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> x, y;</text>
  <text x="76" y="256" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">    // equals 재정의 (좌표 비교)</text>
  <text x="76" y="274" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">    // hashCode 재정의 없음 ← 버그!</text>
  <text x="76" y="292" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">}</text>
  <text x="76" y="312" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// set.add(new Point(1,2)) — 버킷 A</text>

  <!-- Result of bad implementation -->
  <rect x="60" y="328" width="370" height="72" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="80" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">결과: HashSet에 중복 허용</text>
  <text x="80" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">new Point(1,2).equals(new Point(1,2)) → true</text>
  <text x="80" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">but hashCode 다름 → 다른 버킷 → 중복 저장됨!</text>

  <!-- Correct class example -->
  <text x="450" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">올바른 구현 — equals + hashCode 모두 재정의</text>
  <rect x="450" y="200" width="370" height="120" rx="6" fill="#000000" stroke="#55c555" stroke-width="1.5"/>
  <text x="466" y="220" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">@Override</text>
  <text x="466" y="238" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">public boolean</text>
  <text x="574" y="238" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> equals(Object o) {</text>
  <text x="466" y="256" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">    // ...필드 비교</text>
  <text x="466" y="274" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">}</text>
  <text x="466" y="292" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">@Override</text>
  <text x="466" y="310" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">public int</text>
  <text x="534" y="310" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> hashCode() {</text>

  <!-- Correct result -->
  <rect x="450" y="328" width="370" height="72" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="470" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">결과: 중복 제거 정상 작동</text>
  <text x="470" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">equals true + hashCode 동일 → 동일 버킷</text>
  <text x="470" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">→ 기존 원소 교체 → 중복 없음</text>
</svg>
