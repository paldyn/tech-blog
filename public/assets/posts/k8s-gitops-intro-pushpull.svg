<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="540" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Push 배포 vs Pull 배포 (GitOps)</text>

  <!-- PUSH -->
  <text x="70" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">Push 방식 — 전통 CI/CD</text>

  <rect x="60" y="104" width="130" height="64" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="125" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">개발자</text>
  <text x="125" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">git push</text>

  <line x1="190" y1="136" x2="250" y2="136" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="250" y="104" width="130" height="64" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="315" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Git 저장소</text>
  <text x="315" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">코드 + 매니페스트</text>

  <line x1="380" y1="136" x2="440" y2="136" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="440" y="104" width="160" height="64" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="520" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">CI 파이프라인</text>
  <text x="520" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" text-anchor="middle">kubectl apply</text>

  <line x1="600" y1="136" x2="670" y2="136" stroke="#e05555" stroke-width="2" marker-end="url(#arrr)"/>

  <rect x="670" y="104" width="150" height="64" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="745" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">클러스터</text>
  <text x="745" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">밖에서 변경 주입</text>

  <rect x="60" y="190" width="760" height="50" rx="8" fill="#1a0f10" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">클러스터 admin 자격증명이 CI 시스템에 노출 · 배포 후 상태를 아무도 감시하지 않음</text>
  <text x="440" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">수동 kubectl 변경(드리프트)이 생겨도 다음 배포까지 모름</text>

  <!-- PULL -->
  <text x="70" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">Pull 방식 — GitOps</text>

  <rect x="60" y="306" width="130" height="64" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="125" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">개발자</text>
  <text x="125" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">PR + 머지만</text>

  <line x1="190" y1="338" x2="250" y2="338" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="250" y="306" width="150" height="64" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="325" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Git 저장소</text>
  <text x="325" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">유일한 진실 공급원</text>

  <!-- cluster with operator -->
  <rect x="470" y="288" width="350" height="150" rx="10" fill="#0f1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="645" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">클러스터</text>

  <rect x="500" y="330" width="180" height="80" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="2"/>
  <text x="590" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">GitOps 오퍼레이터</text>
  <text x="590" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Argo CD · Flux</text>
  <text x="590" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">안에서 당겨와 적용</text>

  <text x="745" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">자격증명이</text>
  <text x="745" y="385" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">밖으로 안 나감</text>

  <path d="M 500 350 C 460 348, 440 344, 400 340" fill="none" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrg)"/>
  <text x="448" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">pull (watch)</text>

  <!-- bottom -->
  <rect x="60" y="464" width="760" height="56" rx="8" fill="#0f1a12" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="488" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">방향이 뒤집힌다: "CI가 클러스터에 민다" → "클러스터가 Git에서 당긴다"</text>
  <text x="440" y="508" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">배포 권한은 클러스터 내부에만 존재하고, 사람은 Git에만 손을 댄다</text>
</svg>
