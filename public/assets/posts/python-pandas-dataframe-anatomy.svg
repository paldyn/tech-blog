<svg xmlns="http://www.w3.org/2000/svg" width="880" height="330" viewBox="0 0 880 330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="330" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">DataFrame = 인덱스 + 컬럼(Series)</text>

  <text x="60" y="92" font-size="13" fill="#888">column 라벨</text>
  <g font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" text-anchor="middle">
    <rect x="160" y="100" width="120" height="40" rx="4" fill="#0f1320" stroke="#7777cc"/>
    <text x="220" y="125" fill="#7ec8e3" font-weight="600">name</text>
    <rect x="284" y="100" width="120" height="40" rx="4" fill="#0f1320" stroke="#7777cc"/>
    <text x="344" y="125" fill="#7ec8e3" font-weight="600">age</text>
    <rect x="408" y="100" width="120" height="40" rx="4" fill="#0f1320" stroke="#7777cc"/>
    <text x="468" y="125" fill="#7ec8e3" font-weight="600">city</text>

    <rect x="60" y="144" width="96" height="40" rx="4" fill="#0f1320" stroke="#7777cc"/>
    <text x="108" y="169" fill="#b5cea8">0</text>
    <rect x="160" y="144" width="120" height="40" rx="4" fill="#000000" stroke="#3a4a6e"/>
    <text x="220" y="169" fill="#ce9178">"Ana"</text>
    <rect x="284" y="144" width="120" height="40" rx="4" fill="#000000" stroke="#3a4a6e"/>
    <text x="344" y="169" fill="#ffffff">30</text>
    <rect x="408" y="144" width="120" height="40" rx="4" fill="#000000" stroke="#3a4a6e"/>
    <text x="468" y="169" fill="#ce9178">"Seoul"</text>

    <rect x="60" y="188" width="96" height="40" rx="4" fill="#0f1320" stroke="#7777cc"/>
    <text x="108" y="213" fill="#b5cea8">1</text>
    <rect x="160" y="188" width="120" height="40" rx="4" fill="#000000" stroke="#3a4a6e"/>
    <text x="220" y="213" fill="#ce9178">"Bo"</text>
    <rect x="284" y="188" width="120" height="40" rx="4" fill="#000000" stroke="#3a4a6e"/>
    <text x="344" y="213" fill="#ffffff">25</text>
    <rect x="408" y="188" width="120" height="40" rx="4" fill="#000000" stroke="#3a4a6e"/>
    <text x="468" y="213" fill="#ce9178">"Busan"</text>
  </g>
  <text x="108" y="92" font-size="13" fill="#888" text-anchor="middle">index</text>

  <rect x="572" y="100" width="248" height="128" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="588" y="126" font-size="13" fill="#9aa4b8">각 column은 하나의 Series</text>
  <text x="588" y="150" font-size="13" fill="#9aa4b8">→ column마다 dtype이 다름</text>
  <text x="588" y="174" font-size="13" fill="#9aa4b8">→ index는 행을 식별하는 라벨</text>
  <text x="588" y="198" font-size="13" fill="#9aa4b8">→ DataFrame은 Series의 묶음</text>

  <rect x="60" y="256" width="760" height="44" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="284" font-size="14" fill="#55c555" text-anchor="middle">행은 index로, 열은 column 이름으로 — 둘 다 라벨이 붙은 2차원 표</text>
</svg>
