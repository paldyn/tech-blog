  <text xml:space="preserve" x="76" y="241" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">var</tspan><tspan fill="#ffffff"> v = ds.getConstColumn(</tspan></text>
