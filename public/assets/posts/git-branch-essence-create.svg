<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">브랜치 생성 전후 비교</text>
  <text x="60" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">커밋 이동 없이 포인터만 추가됨</text>

  <!-- BEFORE label -->
  <text x="60" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">BEFORE: git branch feature</text>

  <!-- Commits C1, C2, C3 -->
  <rect x="80" y="128" width="90" height="50" rx="6" fill="#0d1117" stroke="#555" stroke-width="1.2"/>
  <text x="125" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" text-anchor="middle">C1</text>
  <line x1="170" y1="153" x2="210" y2="153" stroke="#555" stroke-width="1.5"/>
  <polygon points="210,149 220,153 210,157" fill="#555"/>

  <rect x="220" y="128" width="90" height="50" rx="6" fill="#0d1117" stroke="#555" stroke-width="1.2"/>
  <text x="265" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" text-anchor="middle">C2</text>
  <line x1="310" y1="153" x2="350" y2="153" stroke="#555" stroke-width="1.5"/>
  <polygon points="350,149 360,153 350,157" fill="#555"/>

  <rect x="360" y="128" width="90" height="50" rx="6" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="405" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">C3</text>

  <!-- main pointer -->
  <rect x="360" y="88" width="90" height="30" rx="5" fill="#1a2a1a" stroke="#55c555" stroke-width="1.2"/>
  <text x="405" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">main</text>
  <line x1="405" y1="118" x2="405" y2="128" stroke="#55c555" stroke-width="1.2"/>

  <!-- HEAD → main -->
  <rect x="360" y="52" width="90" height="28" rx="5" fill="#2a1a0a" stroke="#e8a838" stroke-width="1.2"/>
  <text x="405" y="71" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8a838" text-anchor="middle">HEAD</text>
  <line x1="405" y1="80" x2="405" y2="88" stroke="#e8a838" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- AFTER label -->
  <text x="500" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">AFTER: git branch feature</text>

  <!-- Same commits -->
  <rect x="520" y="128" width="90" height="50" rx="6" fill="#0d1117" stroke="#555" stroke-width="1.2"/>
  <text x="565" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" text-anchor="middle">C1</text>
  <line x1="610" y1="153" x2="648" y2="153" stroke="#555" stroke-width="1.5"/>
  <polygon points="648,149 658,153 648,157" fill="#555"/>

  <rect x="658" y="128" width="90" height="50" rx="6" fill="#0d1117" stroke="#555" stroke-width="1.2"/>
  <text x="703" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" text-anchor="middle">C2</text>
  <line x1="748" y1="153" x2="758" y2="153" stroke="#555" stroke-width="1.5"/>
  <polygon points="758,149 768,153 758,157" fill="#555"/>

  <rect x="768" y="128" width="72" height="50" rx="6" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="804" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">C3</text>

  <!-- main pointer -->
  <rect x="740" y="88" width="72" height="30" rx="5" fill="#1a2a1a" stroke="#55c555" stroke-width="1.2"/>
  <text x="776" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">main</text>
  <line x1="776" y1="118" x2="793" y2="128" stroke="#55c555" stroke-width="1.2"/>

  <!-- feature pointer (new!) -->
  <rect x="800" y="88" width="72" height="30" rx="5" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="836" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" text-anchor="middle">feature</text>
  <line x1="820" y1="118" x2="810" y2="128" stroke="#7777cc" stroke-width="1.5"/>

  <!-- HEAD → main (still) -->
  <rect x="740" y="52" width="72" height="28" rx="5" fill="#2a1a0a" stroke="#e8a838" stroke-width="1.2"/>
  <text x="776" y="71" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8a838" text-anchor="middle">HEAD</text>
  <line x1="776" y1="80" x2="776" y2="88" stroke="#e8a838" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Divider -->
  <line x1="490" y1="40" x2="490" y2="200" stroke="#333" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- Key point -->
  <rect x="60" y="218" width="760" height="80" rx="8" fill="#0d1117" stroke="#3a4a6e"/>
  <text x="80" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">브랜치 생성 비용</text>
  <text x="80" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa">• 커밋 개수와 무관하게 항상 O(1) — 41바이트 파일 1개 생성</text>
  <text x="80" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• 커밋을 복사하거나 체크아웃을 변경하지 않음 (HEAD는 main 그대로)</text>

  <!-- Code block -->
  <rect x="60" y="316" width="760" height="110" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan x="76" dy="0"><tspan fill="#9aa4b8"># 브랜치 생성 후 .git/refs/heads 확인</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git branch</tspan> feature</tspan>
    <tspan x="76" dy="18">ls .git/refs/heads/</tspan>
    <tspan x="76" dy="18"><tspan fill="#9aa4b8"># → main  feature  (두 파일, 각 41바이트)</tspan></tspan>
    <tspan x="76" dy="18">cat .git/refs/heads/feature   <tspan fill="#9aa4b8"># C3의 SHA-1 출력</tspan></tspan>
  </text>
</svg>
