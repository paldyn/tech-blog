<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">tsconfig.json 핵심 옵션</text>

  <!-- Code block left -->
  <rect x="60" y="68" width="380" height="300" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="92" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// tsconfig.json (기본 설정)</text>
  <text x="76" y="112" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">{</text>
  <text x="76" y="132" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  <tspan fill="#ce9178">"compilerOptions"</tspan>: {</text>
  <text x="76" y="152" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    <tspan fill="#ce9178">"target"</tspan>: <tspan fill="#ce9178">"ES2022"</tspan>,</text>
  <text x="76" y="172" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    <tspan fill="#ce9178">"module"</tspan>: <tspan fill="#ce9178">"commonjs"</tspan>,</text>
  <text x="76" y="192" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    <tspan fill="#ce9178">"outDir"</tspan>: <tspan fill="#ce9178">"./dist"</tspan>,</text>
  <text x="76" y="212" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    <tspan fill="#ce9178">"rootDir"</tspan>: <tspan fill="#ce9178">"./src"</tspan>,</text>
  <text x="76" y="232" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    <tspan fill="#ce9178">"strict"</tspan>: <tspan fill="#7ec8e3" font-weight="600">true</tspan>,</text>
  <text x="76" y="252" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    <tspan fill="#ce9178">"esModuleInterop"</tspan>: <tspan fill="#7ec8e3" font-weight="600">true</tspan></text>
  <text x="76" y="272" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  },</text>
  <text x="76" y="292" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  <tspan fill="#ce9178">"include"</tspan>: [<tspan fill="#ce9178">"src"</tspan>],</text>
  <text x="76" y="312" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  <tspan fill="#ce9178">"exclude"</tspan>: [<tspan fill="#ce9178">"node_modules"</tspan>]</text>
  <text x="76" y="332" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">}</text>

  <!-- Explanation boxes -->
  <rect x="460" y="68" width="360" height="52" rx="6" fill="#0f1f2f" stroke="#3178c6" stroke-width="1"/>
  <text x="640" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">target: "ES2022"</text>
  <text x="640" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">출력 JS 버전. 구버전 지원 필요하면 ES5/ES6</text>

  <rect x="460" y="130" width="360" height="52" rx="6" fill="#0f1f2f" stroke="#3178c6" stroke-width="1"/>
  <text x="640" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">outDir / rootDir</text>
  <text x="640" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">소스 위치와 컴파일 결과 출력 위치</text>

  <rect x="460" y="192" width="360" height="52" rx="6" fill="#0f2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">strict: true</text>
  <text x="640" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">엄격 모드 — null 체크 등 강력한 검사 활성화</text>

  <rect x="460" y="254" width="360" height="52" rx="6" fill="#2a1a0a" stroke="#ce9178" stroke-width="1"/>
  <text x="640" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">esModuleInterop: true</text>
  <text x="640" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">CommonJS 모듈 import 편의 옵션</text>

  <rect x="460" y="316" width="360" height="52" rx="6" fill="#1a0a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="640" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">include / exclude</text>
  <text x="640" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">컴파일 대상 파일 범위 지정</text>
</svg>
