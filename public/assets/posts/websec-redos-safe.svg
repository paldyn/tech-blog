  <text x="58" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// &#x2705; &#xD0C0;&#xC784;&#xC544;&#xC6C3; &#xAD6C;&#xD604;</text>
  <text x="58" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> { exec } = </tspan><tspan fill="#7ec8e3" font-weight="600">require</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">'node-re2'</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="58" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> timeout = </tspan><tspan fill="#ce9178">100</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#9aa4b8">// ms</tspan></text>

