  <text x="488" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#4ec94e">a+</text>
  <text x="488" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#4ec94e">[a-zA-Z]+</text>
  <text x="488" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#4ec94e">a{1,100}</text>
  <text x="488" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8">&#xB2E8;&#xC21C; &#xC218;&#xC815;&#xC790; = &#xC120;&#xD615; &#xBCF5;&#xC7A1;&#xB3C4;</text>
  <text x="488" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8">&#xC218;&#xB7C9; &#xC81C;&#xD55C; {n,m}&#xC73C;&#xB85C; &#xBC14;&#xC6B4;&#xB4DC; &#xC124;&#xC815;</text>
  <text x="488" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8">&#xACC4;&#xC218;&#xD615; &#xB3C4;&#xAD6C;(safe-regex)&#xB85C; &#xAC80;&#xC99D;</text>

