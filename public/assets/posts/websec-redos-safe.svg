  <text x="58" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ce9178">(a+)+</text>
  <text x="58" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ce9178">([a-zA-Z]+)*</text>
  <text x="58" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ce9178">(a|aa)+</text>
  <text x="58" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8">&#xC911;&#xCCA9; &#xC218;&#xC815;&#xC790;&#xAC00; &#xCF1C;&#xC9C4; &#xADF8;&#xB8F9; = &#xC9C0;&#xC218; &#xD3ED;&#xBC1C;</text>
  <text x="58" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8">&#xBCF4;&#xC548;: &#xC4F0;&#xC9C0; &#xB9D0; &#xAC83;</text>
  <text x="58" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8">&#xAD50;&#xC560; &#xAD6C;&#xC870;&#xC5D0; &#xC218;&#xC815;&#xC790; &#xBC18;&#xBCF5; &#xAE08;&#xC9C0;</text>

  <!-- Right box: Safe -->
