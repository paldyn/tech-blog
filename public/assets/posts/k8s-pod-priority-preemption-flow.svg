<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Pod Priority &amp; Preemption — 선점 스케줄링 흐름</text>

  <!-- High priority pod waiting -->
  <rect x="40" y="76" width="180" height="80" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="130" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">High-Priority Pod</text>
  <text x="130" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">priority: 1000000</text>
  <text x="130" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">Pending (리소스 부족)</text>

  <!-- Arrow to scheduler -->
  <line x1="220" y1="116" x2="270" y2="116" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Scheduler evaluates -->
  <rect x="270" y="86" width="160" height="60" rx="8" fill="#1a0a2a" stroke="#7777cc" stroke-width="2"/>
  <text x="350" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Scheduler</text>
  <text x="350" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">후보 노드 탐색</text>

  <!-- Decision -->
  <line x1="430" y1="116" x2="470" y2="116" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="470" y="86" width="180" height="60" rx="8" fill="#1a1a0a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="560" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Preemption 대상 선택</text>
  <text x="560" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">낮은 priority Pod 탐색</text>

  <!-- Node full of low priority pods -->
  <rect x="680" y="76" width="160" height="340" rx="8" fill="#1a0a0a" stroke="#888" stroke-width="1"/>
  <text x="760" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Node</text>

  <rect x="696" y="112" width="128" height="48" rx="4" fill="#2a1a0a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="760" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">Low-Priority Pod A</text>
  <text x="760" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">priority: 100</text>

  <rect x="696" y="170" width="128" height="48" rx="4" fill="#2a1a0a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="760" y="191" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">Low-Priority Pod B</text>
  <text x="760" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">priority: 100</text>

  <rect x="696" y="228" width="128" height="48" rx="4" fill="#2a1a0a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="760" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">Low-Priority Pod C</text>
  <text x="760" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">priority: 100</text>

  <!-- Preemption arrow -->
  <line x1="650" y1="116" x2="680" y2="180" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrRed)"/>
  <text x="632" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">축출 →</text>

  <!-- Evicted pods -->
  <rect x="40" y="220" width="610" height="60" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="345" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">Low-Priority Pod A, B → Terminating → 다른 노드에서 재시작 시도</text>

  <!-- High priority pod scheduled -->
  <rect x="696" y="350" width="128" height="56" rx="4" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="760" y="373" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">High-Priority Pod</text>
  <text x="760" y="389" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Running ✓</text>
  <text x="760" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#55c555" text-anchor="middle">priority: 1000000</text>

  <line x1="760" y1="324" x2="760" y2="350" stroke="#55c555" stroke-width="2" marker-end="url(#arrGreen)"/>
  <text x="440" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Preemption: 높은 priority Pod를 위해 낮은 priority Pod를 축출하고 자리를 만드는 과정</text>
</svg>
