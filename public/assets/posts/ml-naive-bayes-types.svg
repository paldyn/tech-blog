<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a;border-radius:12px">
  <!-- Background -->
  <rect x="0" y="0" width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Header band -->
  <rect x="0" y="0" width="880" height="72" rx="12" fill="#0d1a2a"/>
  <rect x="0" y="60" width="880" height="12" fill="#0d1a2a"/>
  <text x="60" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#ffffff">나이브 베이즈 3가지 종류</text>
  <text x="60" y="62" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">가우시안·다항식·베르누이 — 특성 유형에 따라 선택하는 법</text>
  <line x1="60" y1="82" x2="820" y2="82" stroke="#1e2433" stroke-width="1"/>

  <!-- Section label -->
  <text x="60" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">특성 유형별 나이브 베이즈 분류기</text>

  <!-- ===== 3 TYPE CARDS ===== -->

  <!-- Card 1: Gaussian -->
  <rect x="60" y="116" width="236" height="148" rx="8" fill="#0d1520" stroke="#55c555" stroke-width="1.5"/>
  <text x="88" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">가우시안 나이브 베이즈</text>
  <text x="88" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">GaussianNB</text>
  <line x1="88" y1="163" x2="280" y2="163" stroke="#1e2433" stroke-width="1"/>
  <text x="88" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">특성 유형: 연속형 실수값</text>
  <text x="88" y="199" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">분포 가정: 정규(가우시안) 분포</text>
  <text x="88" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">예: 키, 몸무게, 온도, 센서값</text>
  <text x="88" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">P(xᵢ|c) = 정규분포(μ꜀, σ꜀²)</text>
  <text x="88" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">아이리스, 의료 데이터에 적합</text>

  <!-- Card 2: Multinomial -->
  <rect x="322" y="116" width="236" height="148" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="350" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">다항 나이브 베이즈</text>
  <text x="350" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">MultinomialNB</text>
  <line x1="350" y1="163" x2="542" y2="163" stroke="#1e2433" stroke-width="1"/>
  <text x="350" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">특성 유형: 정수 카운트값</text>
  <text x="350" y="199" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">분포 가정: 다항 분포</text>
  <text x="350" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">예: 단어 빈도, 클릭 횟수, TF</text>
  <text x="350" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">P(xᵢ|c) = 다항 분포 파라미터</text>
  <text x="350" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">텍스트 분류의 표준 선택</text>

  <!-- Card 3: Bernoulli -->
  <rect x="584" y="116" width="236" height="148" rx="8" fill="#0d1520" stroke="#ce9178" stroke-width="1.5"/>
  <text x="612" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#ce9178">베르누이 나이브 베이즈</text>
  <text x="612" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">BernoulliNB</text>
  <line x1="612" y1="163" x2="804" y2="163" stroke="#1e2433" stroke-width="1"/>
  <text x="612" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">특성 유형: 이진값 (0 또는 1)</text>
  <text x="612" y="199" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">분포 가정: 베르누이 분포</text>
  <text x="612" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">예: 단어 존재 여부, 플래그</text>
  <text x="612" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">P(xᵢ|c) = p^xᵢ × (1-p)^(1-xᵢ)</text>
  <text x="612" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ce9178">짧은 텍스트 분류에 효과적</text>

  <!-- ===== CODE BLOCK ===== -->
  <text x="60" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">scikit-learn 구현: 3가지 나이브 베이즈</text>
  <rect x="60" y="295" width="760" height="152" rx="6" fill="#070b14" stroke="#1e2433"/>

  <!-- Line 1 -->
  <text x="76" y="317" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">from</text>
  <text x="120" y="317" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"> sklearn.naive_bayes </text>
  <text x="360" y="317" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">import</text>
  <text x="410" y="317" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"> GaussianNB, MultinomialNB, BernoulliNB</text>

  <!-- Line 2 -->
  <text x="76" y="335" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># ① 가우시안: 연속형 특성 (예: 아이리스)</text>

  <!-- Line 3 -->
  <text x="76" y="353" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">gnb = GaussianNB(var_smoothing=</text>
  <text x="388" y="353" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">1e-9</text>
  <text x="430" y="353" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">).fit(X_train, y_train)</text>

  <!-- Line 4 -->
  <text x="76" y="371" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># ② 다항식: 단어 빈도 (TF, CountVectorizer)</text>

  <!-- Line 5 -->
  <text x="76" y="389" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">mnb = MultinomialNB(alpha=</text>
  <text x="308" y="389" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">1.0</text>
  <text x="342" y="389" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">).fit(X_counts, y_train)</text>
  <text x="600" y="389" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"> # 라플라스 스무딩</text>

  <!-- Line 6 -->
  <text x="76" y="407" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># ③ 베르누이: 단어 존재 여부 (0/1)</text>

  <!-- Line 7 -->
  <text x="76" y="425" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">bnb = BernoulliNB(alpha=</text>
  <text x="290" y="425" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">1.0</text>
  <text x="324" y="425" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">).fit(X_binary, y_train)</text>
  <text x="590" y="425" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"> # binarize=0.0 옵션</text>

  <!-- Footer -->
  <text x="440" y="470" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈</text>
</svg>
