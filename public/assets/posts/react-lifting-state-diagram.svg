<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">상태 끌어올리기 (Lifting State Up)</text>

  <defs>
    <marker id="ard" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="aru" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Left: Before (state in each child) -->
  <text x="220" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e05555">Before — 각 자식이 상태 보유</text>

  <rect x="160" y="98" width="120" height="50" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="220" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Parent</text>

  <line x1="180" y1="148" x2="140" y2="188" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#ard)"/>
  <line x1="260" y1="148" x2="300" y2="188" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#ard)"/>

  <rect x="80" y="192" width="120" height="60" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="140" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">ChildA</text>
  <text x="140" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">state: count=3</text>

  <rect x="240" y="192" width="120" height="60" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="300" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">ChildB</text>
  <text x="300" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">state: count=?</text>

  <!-- Problem label -->
  <rect x="60" y="274" width="360" height="40" rx="6" fill="#1a0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">ChildB가 ChildA의 상태를 알 수 없음</text>

  <!-- Right: After (state lifted to parent) -->
  <text x="660" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">After — 공통 부모로 끌어올림</text>

  <rect x="600" y="98" width="120" height="60" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="660" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">Parent</text>
  <text x="660" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">state: count=3</text>

  <!-- Props down arrow left -->
  <line x1="635" y1="158" x2="575" y2="198" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#ard)"/>
  <text x="590" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">props</text>
  <!-- Props down arrow right -->
  <line x1="685" y1="158" x2="745" y2="198" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#ard)"/>
  <text x="718" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">props</text>

  <!-- Callback up left -->
  <line x1="560" y1="192" x2="615" y2="155" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#aru)"/>
  <text x="568" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">callback</text>

  <rect x="520" y="196" width="120" height="60" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="580" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">ChildA</text>
  <text x="580" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">count={count}</text>

  <rect x="680" y="196" width="120" height="60" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="740" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">ChildB</text>
  <text x="740" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">onCount={setCount}</text>

  <!-- Solution label -->
  <rect x="460" y="274" width="360" height="40" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">공통 부모가 상태 → 두 자식이 동기화됨</text>

  <!-- Bottom rule -->
  <rect x="60" y="336" width="760" height="90" rx="10" fill="#0f1629" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="364" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">끌어올리기 원칙</text>
  <text x="440" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">상태를 사용하는 컴포넌트들의 가장 가까운 공통 조상에 위치시킨다</text>
  <text x="440" y="412" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">부모 → 자식 props / 자식 → 부모 callback 패턴</text>
</svg>
