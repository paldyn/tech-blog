<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560">
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arrB" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">프리플라이트 — 본 요청 전의 허락 절차</text>
    <!-- Box 1: preflight request -->
    <rect x="60" y="70" width="760" height="124" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="76" y="97" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 1) 브라우저가 자동 전송하는 프리플라이트</text>
    <text x="76" y="117" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">OPTIONS</tspan><tspan fill="#ffffff"> /orders HTTP/1.1</tspan></text>
    <text x="76" y="137" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Origin</tspan><tspan fill="#ffffff">: https://app.shop.com</tspan></text>
    <text x="76" y="157" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Access-Control-Request-Method</tspan><tspan fill="#ffffff">: PUT</tspan></text>
    <text x="76" y="177" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Access-Control-Request-Headers</tspan><tspan fill="#ffffff">: content-type</tspan></text>
    <line x1="440" y1="194" x2="440" y2="224" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrB)"/>
    <!-- Box 2: preflight response -->
    <rect x="60" y="226" width="760" height="144" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="76" y="253" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 2) 서버가 허용 범위를 선언</text>
    <text x="76" y="273" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#55c555">HTTP/1.1 204 No Content</tspan></text>
    <text x="76" y="293" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Access-Control-Allow-Origin</tspan><tspan fill="#ffffff">: https://app.shop.com</tspan></text>
    <text x="76" y="313" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Access-Control-Allow-Methods</tspan><tspan fill="#ffffff">: PUT, DELETE</tspan></text>
    <text x="76" y="333" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Access-Control-Allow-Headers</tspan><tspan fill="#ffffff">: content-type</tspan></text>
    <text x="76" y="353" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Access-Control-Max-Age</tspan><tspan fill="#ffffff">: 86400</tspan><tspan fill="#9aa4b8">  # 24시간 캐시</tspan></text>
    <line x1="440" y1="370" x2="440" y2="400" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrB)"/>
    <!-- Box 3: actual request -->
    <rect x="60" y="402" width="760" height="84" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="76" y="429" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 3) 검증 통과 → 이제서야 본 요청 전송</text>
    <text x="76" y="449" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">PUT</tspan><tspan fill="#ffffff"> /orders + Content-Type: application/json</tspan></text>
    <text x="76" y="469" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#55c555">200 OK</tspan><tspan fill="#ffffff"> + Access-Control-Allow-Origin</tspan><tspan fill="#9aa4b8">  # 본 응답에도 필수</tspan></text>
    <!-- Summary -->
    <text x="440" y="518" text-anchor="middle" font-size="12" fill="#888">프리플라이트가 거부되면 본 요청은 아예 전송되지 않는다 — 단순 요청과의 결정적 차이</text>
    <text x="440" y="536" text-anchor="middle" font-size="11" fill="#555">OPTIONS 응답에는 인증·리다이렉트 없이 2xx로 답해야 한다</text>
  </g>
</svg>
