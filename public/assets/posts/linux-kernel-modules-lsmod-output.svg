<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">lsmod 출력 해부</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">3개 컬럼의 의미와 읽는 법</text>

  <!-- Code block -->
  <rect x="60" y="90" width="760" height="190" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="114" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">$ lsmod</text>
  <text x="76" y="134" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">Module                  Size  Used by</text>
  <text x="76" y="154" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">ext4                   974848  2</text>
  <text x="76" y="174" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">mbcache                 16384  1 ext4</text>
  <text x="76" y="194" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">jbd2                  147456  1 ext4</text>
  <text x="76" y="214" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">e1000e                 315392  0</text>
  <text x="76" y="234" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">usbcore                286720  8 uhci_hcd,...</text>
  <text x="76" y="254" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># Used=0 이면 rmmod 가능</text>

  <!-- Annotation boxes -->
  <!-- Module column annotation -->
  <rect x="60" y="302" width="220" height="80" rx="6" fill="#0d1a2e" stroke="#3a6ea8" stroke-width="1"/>
  <text x="170" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Module</text>
  <text x="170" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">모듈 이름</text>
  <text x="170" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">/lib/modules/.../</text>
  <text x="170" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">&lt;name&gt;.ko</text>

  <!-- Size column annotation -->
  <rect x="310" y="302" width="220" height="80" rx="6" fill="#0d1a2e" stroke="#3a6ea8" stroke-width="1"/>
  <text x="420" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Size</text>
  <text x="420" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">메모리 사용량 (bytes)</text>
  <text x="420" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">커널에 로드된 모듈의</text>
  <text x="420" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">실제 메모리 크기</text>

  <!-- Used by column annotation -->
  <rect x="560" y="302" width="260" height="80" rx="6" fill="#0d1a2e" stroke="#3a6ea8" stroke-width="1"/>
  <text x="690" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Used by</text>
  <text x="690" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">참조 카운트 + 의존 모듈</text>
  <text x="690" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">0이면 unload 가능</text>
  <text x="690" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">&#62;0이면 의존성 있음</text>

  <!-- connector lines -->
  <line x1="170" y1="290" x2="170" y2="302" stroke="#3a6ea8" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="420" y1="290" x2="420" y2="302" stroke="#3a6ea8" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="690" y1="290" x2="690" y2="302" stroke="#3a6ea8" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="60" y1="290" x2="820" y2="290" stroke="#3a6ea8" stroke-width="1" stroke-dasharray="4,4"/>
</svg>
