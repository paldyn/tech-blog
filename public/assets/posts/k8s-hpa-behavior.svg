<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">HPA behavior — 스케일 속도 세밀 조정</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">scaleUp · scaleDown policies 설정</text>

  <!-- scaleUp -->
  <rect x="60" y="90" width="360" height="220" fill="#0f1923" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">scaleUp</text>

  <rect x="78" y="128" width="324" height="48" fill="#0a1a0a" rx="5" stroke="#1a3a1a" stroke-width="1"/>
  <text x="240" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">type: Pods · value: 4</text>
  <text x="240" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">60초마다 최대 4개 Pod 추가</text>

  <rect x="78" y="184" width="324" height="48" fill="#0a1a0a" rx="5" stroke="#1a3a1a" stroke-width="1"/>
  <text x="240" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">type: Percent · value: 100</text>
  <text x="240" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">60초마다 현재 replicas의 100% 추가</text>

  <rect x="78" y="240" width="324" height="48" fill="#0a1a0a" rx="5" stroke="#1a3a1a" stroke-width="1"/>
  <text x="240" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">selectPolicy: Max (기본)</text>
  <text x="240" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">두 정책 중 더 큰 값 선택 (공격적 스케일업)</text>

  <!-- scaleDown -->
  <rect x="460" y="90" width="360" height="220" fill="#0f1923" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="640" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">scaleDown</text>

  <rect x="478" y="128" width="324" height="48" fill="#1a0a0a" rx="5" stroke="#3a1a1a" stroke-width="1"/>
  <text x="640" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">type: Percent · value: 10</text>
  <text x="640" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">60초마다 현재 replicas의 10%만 축소</text>

  <rect x="478" y="184" width="324" height="48" fill="#1a0a0a" rx="5" stroke="#3a1a1a" stroke-width="1"/>
  <text x="640" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">stabilizationWindowSeconds: 300</text>
  <text x="640" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">최근 5분 중 가장 높은 값 기준으로 유지</text>

  <rect x="478" y="240" width="324" height="48" fill="#1a0a0a" rx="5" stroke="#3a1a1a" stroke-width="1"/>
  <text x="640" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">selectPolicy: Min (보수적)</text>
  <text x="640" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">두 정책 중 더 작은 변화만 허용</text>

  <!-- Code block -->
  <rect x="60" y="328" width="760" height="88" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">behavior:</text>
  <text x="80" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#ffffff">  scaleUp:</text>
  <text x="80" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#ffffff">    policies: [{type: Pods, value: 4, periodSeconds: 60}]</text>
  <text x="80" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#ffffff">  scaleDown:</text>
</svg>
