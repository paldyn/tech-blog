<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">집합 컴프리헨션</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">{표현식 for 변수 in 이터러블 if 조건} — 중복 자동 제거</text>

  <!-- Syntax box -->
  <rect x="60" y="100" width="760" height="72" rx="8" fill="#111827" stroke="#3a4a6e"/>
  <text x="440" y="130" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" fill="#ffffff">{<tspan fill="#ce9178">x.lower()</tspan>  <tspan fill="#7ec8e3">for</tspan>  <tspan fill="#55c555">x</tspan>  <tspan fill="#7ec8e3">in</tspan>  <tspan fill="#7777cc">words</tspan>  <tspan fill="#7ec8e3">if</tspan>  <tspan fill="#ffffff">len(x) > 2</tspan>}</text>
  <text x="440" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#6a8aa0">{ } 안에 키:값 구분자(:) 없음 → 집합. 결과는 순서 없음, 중복 없음</text>

  <!-- Left: set vs list -->
  <rect x="60" y="192" width="360" height="230" rx="8" fill="#111827" stroke="#3a4a6e"/>
  <text x="240" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">집합 vs 리스트 비교</text>
  <rect x="76" y="228" width="328" height="178" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="92" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">data = [<tspan fill="#b5cea8">1</tspan>,<tspan fill="#b5cea8">2</tspan>,<tspan fill="#b5cea8">2</tspan>,<tspan fill="#b5cea8">3</tspan>,<tspan fill="#b5cea8">3</tspan>,<tspan fill="#b5cea8">3</tspan>,<tspan fill="#b5cea8">4</tspan>]</text>
  <text x="92" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 리스트 컴프리헨션 — 중복 유지</text>
  <text x="92" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">[x**<tspan fill="#b5cea8">2</tspan> <tspan fill="#7ec8e3">for</tspan> x <tspan fill="#7ec8e3">in</tspan> data]</text>
  <text x="92" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># [1,4,4,9,9,9,16]</text>
  <text x="92" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"></text>
  <text x="92" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 집합 컴프리헨션 — 중복 제거</text>
  <text x="92" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">{x**<tspan fill="#b5cea8">2</tspan> <tspan fill="#7ec8e3">for</tspan> x <tspan fill="#7ec8e3">in</tspan> data}</text>
  <text x="92" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># {1, 4, 9, 16}</text>
  <text x="92" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 순서 보장 없음</text>

  <!-- Right: practical uses -->
  <rect x="460" y="192" width="360" height="230" rx="8" fill="#111827" stroke="#3a4a6e"/>
  <text x="640" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">실전 활용</text>
  <rect x="476" y="228" width="328" height="178" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="492" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 고유 도메인 추출</text>
  <text x="492" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">emails = [<tspan fill="#ce9178">"a@x.com"</tspan>,<tspan fill="#ce9178">"b@y.com"</tspan>,</text>
  <text x="492" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">          <tspan fill="#ce9178">"c@x.com"</tspan>]</text>
  <text x="492" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">domains = {e.split(<tspan fill="#ce9178">"@"</tspan>)[<tspan fill="#b5cea8">1</tspan>]</text>
  <text x="492" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">           <tspan fill="#7ec8e3">for</tspan> e <tspan fill="#7ec8e3">in</tspan> emails}</text>
  <text x="492" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># {'x.com', 'y.com'}</text>
  <text x="492" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 고유 단어 (소문자)</text>
  <text x="492" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">text = <tspan fill="#ce9178">"Go go go home"</tspan></text>
  <text x="492" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">{w.lower() <tspan fill="#7ec8e3">for</tspan> w <tspan fill="#7ec8e3">in</tspan> text.split()}</text>

  <text x="440" y="438" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">빈 집합은 set() — {} 는 빈 딕셔너리</text>
</svg>
