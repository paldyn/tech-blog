<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">OWASP Top 10 변화 추이 (2017 → 2021)</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">순위 변동과 신규 추가 항목으로 보안 패러다임의 변화를 읽는다</text>

  <!-- Column Headers -->
  <text x="220" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">2017</text>
  <text x="660" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">2021</text>

  <!-- 2017 items -->
  <rect x="60" y="118" width="320" height="36" rx="6" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="80" y="141" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" font-weight="600">A01</text>
  <text x="108" y="141" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">인젝션 (Injection)</text>

  <rect x="60" y="162" width="320" height="36" rx="6" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="80" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" font-weight="600">A02</text>
  <text x="108" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">인증 실패</text>

  <rect x="60" y="206" width="320" height="36" rx="6" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="80" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" font-weight="600">A03</text>
  <text x="108" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">민감 데이터 노출</text>

  <rect x="60" y="250" width="320" height="36" rx="6" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="80" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" font-weight="600">A05</text>
  <text x="108" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">손상된 접근 제어</text>

  <rect x="60" y="294" width="320" height="36" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="80" y="317" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666" font-weight="600">A07</text>
  <text x="108" y="317" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">크로스 사이트 스크립팅</text>

  <!-- 2021 items -->
  <rect x="500" y="118" width="320" height="36" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="520" y="141" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" font-weight="600">A01</text>
  <text x="548" y="141" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">손상된 접근 제어 ▲4</text>

  <rect x="500" y="162" width="320" height="36" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="520" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" font-weight="600">A02</text>
  <text x="548" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">암호화 실패 ▲1</text>

  <rect x="500" y="206" width="320" height="36" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="520" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" font-weight="600">A03</text>
  <text x="548" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">인젝션 ▼2 (XSS 흡수)</text>

  <rect x="500" y="250" width="320" height="36" rx="6" fill="#1a0f2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="520" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" font-weight="600">A04</text>
  <text x="548" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">안전하지 않은 설계 ★신규</text>

  <rect x="500" y="294" width="320" height="36" rx="6" fill="#1a0f2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="520" y="317" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" font-weight="600">A10</text>
  <text x="548" y="317" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">SSRF ★신규</text>

  <!-- Arrow connections (faint) -->
  <line x1="380" y1="136" x2="500" y2="136" stroke="#444" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="380" y1="180" x2="500" y2="224" stroke="#444" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="380" y1="224" x2="500" y2="180" stroke="#444" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="380" y1="268" x2="500" y2="136" stroke="#444" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Legend -->
  <rect x="60" y="356" width="14" height="14" rx="3" fill="#1a0f2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="82" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">★ 신규 카테고리 (2021 추가)</text>
  <text x="310" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">▲ 순위 상승  ▼ 순위 하락</text>

  <!-- Footer -->
  <rect x="60" y="390" width="760" height="34" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="411" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">2021 신규: Insecure Design(A04), Integrity Failures(A08), SSRF(A10) — 설계·공급망·인프라 위협 반영</text>
