<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">유효성 검사 UX 패턴 비교</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="400" fill="#888" text-anchor="middle">좋은 UX vs 나쁜 UX — 사용자 관점에서 본 검증 피드백</text>

  <!-- BAD -->
  <rect x="60" y="96" width="360" height="320" fill="#1a0d0d" rx="8" stroke="#4a2a2a" stroke-width="1.5"/>
  <text x="240" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e05555" text-anchor="middle">❌ 나쁜 UX</text>

  <rect x="76" y="132" width="328" height="40" fill="#111" rx="4"/>
  <text x="240" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">입력 오류가 있습니다.</text>
  <text x="240" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">← 어떤 항목? 어디를 고쳐야?</text>

  <rect x="76" y="188" width="328" height="40" fill="#111" rx="4"/>
  <text x="240" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">저장하시겠습니까? (팝업)</text>
  <text x="240" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">← 검증 전 확인 → 실패하면 두 번 알림</text>

  <rect x="76" y="244" width="328" height="40" fill="#111" rx="4"/>
  <text x="240" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">모든 오류 한꺼번에 alert</text>
  <text x="240" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">← 길고 복잡한 메시지 — 읽기 어려움</text>

  <rect x="76" y="300" width="328" height="40" fill="#111" rx="4"/>
  <text x="240" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">입력값을 지우고 포커스 이동</text>
  <text x="240" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">← 사용자가 재입력해야 함</text>

  <rect x="76" y="356" width="328" height="44" fill="#111" rx="4"/>
  <text x="240" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">포커스 이동 없음</text>
  <text x="240" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">← 사용자가 어디를 고쳐야 할지 모름</text>

  <!-- GOOD -->
  <rect x="460" y="96" width="360" height="320" fill="#0d1e0d" rx="8" stroke="#2a5a2a" stroke-width="1.5"/>
  <text x="640" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">✅ 좋은 UX</text>

  <rect x="476" y="132" width="328" height="40" fill="#0a1a0a" rx="4" stroke="#2a5a2a" stroke-width="1"/>
  <text x="640" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">사용자명은 필수 입력값입니다.</text>
  <text x="640" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">← 항목명 명시 + 포커스 자동 이동</text>

  <rect x="476" y="188" width="328" height="40" fill="#0a1a0a" rx="4" stroke="#2a5a2a" stroke-width="1"/>
  <text x="640" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">검증 통과 후 저장 (확인 팝업 없음)</text>
  <text x="640" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">← 확인 없이 바로 저장 → 빠른 UX</text>

  <rect x="476" y="244" width="328" height="40" fill="#0a1a0a" rx="4" stroke="#2a5a2a" stroke-width="1"/>
  <text x="640" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">첫 번째 오류만 alert</text>
  <text x="640" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">← 짧고 명확 — 수정 후 재시도</text>

  <rect x="476" y="300" width="328" height="40" fill="#0a1a0a" rx="4" stroke="#2a5a2a" stroke-width="1"/>
  <text x="640" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">입력값 유지 + 빨간 테두리 표시</text>
  <text x="640" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">← 어디가 잘못됐는지 시각적으로 명확</text>

  <rect x="476" y="356" width="328" height="44" fill="#0a1a0a" rx="4" stroke="#2a5a2a" stroke-width="1"/>
  <text x="640" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">setFocus() 자동 포커스 이동</text>
  <text x="640" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">← 사용자가 즉시 수정 가능</text>

  <!-- 구분선 -->
  <rect x="60" y="430" width="760" height="36" fill="#0f0f0f" rx="6"/>
  <text x="440" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">원칙: 비파괴적 피드백 · 구체적 메시지 · 즉각적 포커스 이동 · 시각적 강조</text>
</svg>
