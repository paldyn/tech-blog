<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Pinning 탐지: JFR &amp; 시스템 설정</text>

  <!-- Step 1: JVM 플래그 설정 -->
  <text x="200" y="78" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">① JVM 플래그 설정</text>
  <rect x="60" y="88" width="340" height="78" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 스택 트레이스 출력 (임계값: ms)</text>
  <text xml:space="preserve" x="76" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">-Djdk.tracePinnedThreads=</text>
  <text xml:space="preserve" x="76" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">full</text>
  <text xml:space="preserve" x="76" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># full | short</text>

  <!-- Step 2: JFR 이벤트 -->
  <text x="200" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">② JFR 이벤트 수집</text>
  <rect x="60" y="208" width="340" height="98" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># JFR 시작</text>
  <text xml:space="preserve" x="76" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">jcmd &lt;pid&gt; JFR.start</text>
  <text xml:space="preserve" x="76" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  name=pin duration=60s</text>
  <text xml:space="preserve" x="76" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  filename=pinning.jfr</text>

  <!-- Step 3: 이벤트 분석 -->
  <text x="200" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">③ 이벤트 분석</text>
  <rect x="60" y="352" width="340" height="118" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// JFR Event API</text>
  <text xml:space="preserve" x="76" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">var</text>
  <text xml:space="preserve" x="76" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> events = RecordingFile</text>
  <text xml:space="preserve" x="76" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  .readAllEvents(path);</text>
  <text xml:space="preserve" x="76" y="434" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// jdk.VirtualThreadPinned 필터</text>
  <text xml:space="preserve" x="76" y="454" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">events.filter(e -&gt; e.getEventType()</text>

  <!-- Arrow 1 to 2 -->
  <line x1="200" y1="166" x2="200" y2="196" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Arrow 2 to 3 -->
  <line x1="200" y1="306" x2="200" y2="340" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- RIGHT COLUMN: Pinning 해결책 -->
  <text x="660" y="78" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">Pinning 해결 전략</text>

  <!-- Strategy 1 -->
  <rect x="460" y="90" width="360" height="68" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">1. synchronized → ReentrantLock 교체</text>
  <text x="640" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">java.util.concurrent.locks 패키지 사용</text>
  <text x="640" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">lock.lock() / tryLock(timeout) / unlock()</text>

  <!-- Strategy 2 -->
  <rect x="460" y="178" width="360" height="68" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">2. Java 23+ (JEP 491) 업그레이드</text>
  <text x="640" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">synchronized 내 blocking I/O도 Pinning 없음</text>
  <text x="640" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">JDK 수준에서 해결 (권고)</text>

  <!-- Strategy 3 -->
  <rect x="460" y="266" width="360" height="68" rx="8" fill="#1a1a0a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">3. Carrier Pool 크기 조정</text>
  <text x="640" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">-Djdk.virtualThreadScheduler.maxPoolSize=N</text>
  <text x="640" y="324" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">임시방편 — 근본 해결 아님</text>

  <!-- Strategy 4 -->
  <rect x="460" y="354" width="360" height="68" rx="8" fill="#0a0a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="640" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">4. native / JNI 코드 격리</text>
  <text x="640" y="394" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">native frame 존재 시 항상 Pinning 발생</text>
  <text x="640" y="412" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">별도 스레드 풀(platform thread)에서 실행</text>

  <!-- divider -->
  <line x1="450" y1="70" x2="450" y2="460" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- bottom note -->
  <rect x="460" y="440" width="360" height="40" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="640" y="456" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">JEP 444(Java 21) → JEP 491(Java 23): synchronized Pinning 제거</text>
  <text x="640" y="472" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">Java 23+ 사용 시 전략 1,2가 불필요해짐</text>
</svg>
