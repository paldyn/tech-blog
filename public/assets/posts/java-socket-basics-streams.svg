<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arrI" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="360" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">Socket 하나에 입력·출력 스트림이 함께 붙는다</text>

  <!-- Socket box center -->
  <rect x="365" y="150" width="150" height="80" rx="10" fill="#11151c" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="184" font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">Socket</text>
  <text x="440" y="208" font-size="12" fill="#888" text-anchor="middle">연결된 연결점</text>

  <!-- Input stream box left -->
  <rect x="60" y="150" width="230" height="80" rx="10" fill="#11151c" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="175" y="184" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">getInputStream()</text>
  <text x="175" y="208" font-size="12" fill="#888" text-anchor="middle">상대가 보낸 바이트를 읽음</text>

  <!-- Output stream box right -->
  <rect x="590" y="150" width="230" height="80" rx="10" fill="#11151c" stroke="#55c555" stroke-width="1.5"/>
  <text x="705" y="184" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">getOutputStream()</text>
  <text x="705" y="208" font-size="12" fill="#888" text-anchor="middle">상대에게 바이트를 보냄</text>

  <line x1="363" y1="190" x2="292" y2="190" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#arrI)"/>
  <line x1="517" y1="190" x2="588" y2="190" stroke="#55c555" stroke-width="2.5" marker-end="url(#arrI)"/>

  <!-- code box -->
  <rect x="60" y="270" width="760" height="64" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="296" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">var</tspan> in  = socket.getInputStream();   <tspan fill="#7ec8e3" font-weight="600">var</tspan> out = socket.getOutputStream();</text>
  <text xml:space="preserve" x="76" y="320" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// 한 소켓에서 읽기와 쓰기를 동시에 처리한다</text>
</svg>
