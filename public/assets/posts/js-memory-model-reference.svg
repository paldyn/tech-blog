<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">참조 타입 — 변수는 주소를 공유한다</text>

  <!-- Code block -->
  <rect x="60" y="62" width="380" height="200" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="86" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 객체 할당과 참조 공유</text>
  <text x="76" y="104" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> a </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#ffffff"> { x: </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff"> };</tspan>
  </text>
  <text x="76" y="122" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> b </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#ffffff"> a;</tspan><tspan fill="#9aa4b8">  // 주소 복사!</tspan>
  </text>
  <text x="76" y="140" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">b.x </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">99</tspan><tspan fill="#ffffff">;</tspan>
  </text>
  <text x="76" y="158" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">console.log(a.x);</tspan><tspan fill="#9aa4b8"> // 99 !</tspan>
  </text>
  <text x="76" y="194" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">// 원시값은 값 복사</tspan>
  </text>
  <text x="76" y="212" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">let</tspan><tspan fill="#ffffff"> n </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">5</tspan><tspan fill="#ffffff">; </tspan><tspan fill="#7ec8e3">let</tspan><tspan fill="#ffffff"> m </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#ffffff"> n;</tspan>
  </text>
  <text x="76" y="230" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">m </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">99</tspan><tspan fill="#ffffff">;</tspan>
  </text>
  <text x="76" y="248" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">console.log(n);</tspan><tspan fill="#9aa4b8"> // 5 (불변)</tspan>
  </text>

  <!-- Reference diagram (right side) -->
  <!-- Variable boxes -->
  <text x="550" y="82" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#e8e8e8">참조 공유 다이어그램</text>

  <!-- var a box -->
  <rect x="490" y="100" width="120" height="44" fill="#141f2e" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="550" y="118" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">변수 a</text>
  <text x="550" y="136" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#7777cc">0x1a2b</text>

  <!-- var b box -->
  <rect x="490" y="164" width="120" height="44" fill="#141f2e" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="550" y="182" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">변수 b</text>
  <text x="550" y="200" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#7777cc">0x1a2b</text>

  <!-- Heap object -->
  <rect x="680" y="120" width="160" height="68" fill="#0d1f0d" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="760" y="142" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#55c555">Heap @0x1a2b</text>
  <text x="696" y="164"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">x:</text>
  <text x="714" y="164"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#b5cea8">99</text>
  <text x="740" y="164"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e05555">(b.x=99로 변경됨)</text>

  <!-- Arrows: a → heap -->
  <line x1="612" y1="122" x2="678" y2="147" stroke="#7777cc" stroke-width="2"/>
  <polygon points="676,141 692,148 676,155" fill="#7777cc"/>

  <!-- Arrows: b → heap -->
  <line x1="612" y1="186" x2="678" y2="163" stroke="#7777cc" stroke-width="2"/>
  <polygon points="676,157 692,154 676,169" fill="#7777cc"/>

  <!-- Label: same reference -->
  <text x="760" y="210" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e05555">두 변수가 같은 객체를 가리킴</text>

  <!-- Primitive diagram -->
  <text x="550" y="258" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#55c555">원시값: 독립적인 값 복사</text>

  <rect x="490" y="272" width="120" height="44" fill="#141f2e" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="550" y="290" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">변수 n</text>
  <text x="550" y="308" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#b5cea8">5</text>

  <rect x="680" y="272" width="120" height="44" fill="#141f2e" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="740" y="290" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">변수 m</text>
  <text x="740" y="308" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#b5cea8">99</text>

  <text x="615" y="300" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="20" fill="#55c555">≠</text>

  <text x="615" y="318" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555">독립적 복사</text>

  <!-- Rule boxes at bottom -->
  <rect x="60" y="290" width="380" height="60" fill="#0d1a0d" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="250" y="312" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#55c555">핵심 규칙</text>
  <text x="250" y="334" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8">원시값 = 값 복사 / 객체·배열·함수 = 주소 복사</text>

  <!-- Bottom legend -->
  <text x="440" y="378" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#7ec8e3">💡 const로 선언해도 객체 내부는 변경 가능 — const는 참조(주소)를 고정할 뿐</text>

  <!-- Immutable vs mutable note -->
  <rect x="60" y="392" width="760" height="44" fill="#14141a" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="410" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">원시값 (Primitive): </text>
  <text x="440" y="428" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">number · string · boolean · null · undefined · symbol · bigint — 모두 불변(immutable). 객체만 가변(mutable)</text>
</svg>
