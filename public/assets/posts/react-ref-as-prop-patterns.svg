<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" style="background:#0a0a0a;border-radius:12px;">
  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">ref prop + useImperativeHandle 패턴</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">React 19 방식으로 커스텀 인터페이스 노출</text>

  <!-- Left: ref + useImperativeHandle -->
  <rect x="60" y="94" width="380" height="340" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="113" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// React 19: ref를 prop으로 받음</text>
  <text x="76" y="131" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">type</tspan> VideoHandle = &#123;</text>
  <text x="76" y="149" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  play: () =&gt; <tspan fill="#7ec8e3" font-weight="600">void</tspan>;</text>
  <text x="76" y="167" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  pause: () =&gt; <tspan fill="#7ec8e3" font-weight="600">void</tspan>;</text>
  <text x="76" y="185" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">&#125;;</text>
  <text x="76" y="203" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">function</tspan> VideoPlayer(&#123;</text>
  <text x="76" y="221" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  src, ref</text>
  <text x="76" y="239" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">&#125;: &#123; src: <tspan fill="#7ec8e3" font-weight="600">string</tspan>; ref?: React.Ref&lt;VideoHandle&gt; &#125;) &#123;</text>
  <text x="76" y="257" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">const</tspan> videoRef = useRef&lt;HTMLVideoElement&gt;(<tspan fill="#b5cea8">null</tspan>);</text>
  <text x="76" y="275" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  useImperativeHandle(ref, () =&gt; (&#123;</text>
  <text x="76" y="293" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    play: () =&gt; videoRef.current?.play(),</text>
  <text x="76" y="311" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    pause: () =&gt; videoRef.current?.pause(),</text>
  <text x="76" y="329" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  &#125;));</text>
  <text x="76" y="347" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">return</tspan> &lt;<tspan fill="#7ec8e3" font-weight="600">video</tspan> ref=&#123;videoRef&#125; src=&#123;src&#125; /&gt;;</text>
  <text x="76" y="365" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">&#125;</text>
  <text x="76" y="383" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 사용처:</text>
  <text x="76" y="401" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">const</tspan> playerRef = useRef&lt;VideoHandle&gt;(<tspan fill="#b5cea8">null</tspan>);</text>
  <text x="76" y="419" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">&lt;<tspan fill="#7ec8e3" font-weight="600">VideoPlayer</tspan> src=<tspan fill="#ce9178">"/v.mp4"</tspan> ref=&#123;playerRef&#125; /&gt;</text>

  <!-- Right: cleanup return from ref callback -->
  <rect x="460" y="94" width="360" height="340" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="113" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// React 19: ref callback cleanup</text>
  <text x="476" y="131" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// ref callback에서 함수 반환 가능</text>
  <text x="476" y="149" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">function</tspan> AutoFocusInput() &#123;</text>
  <text x="476" y="167" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">return</tspan> (</text>
  <text x="476" y="185" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    &lt;<tspan fill="#7ec8e3" font-weight="600">input</tspan></text>
  <text x="476" y="203" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      ref=&#123;(node) =&gt; &#123;</text>
  <text x="476" y="221" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">        <tspan fill="#7ec8e3" font-weight="600">if</tspan> (!node) <tspan fill="#7ec8e3" font-weight="600">return</tspan>;</text>
  <text x="476" y="239" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">        node.focus();</text>
  <text x="476" y="257" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">        // cleanup 함수 반환</text>
  <text x="476" y="275" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">        <tspan fill="#7ec8e3" font-weight="600">return</tspan> () =&gt; node.blur();</text>
  <text x="476" y="293" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      &#125;&#125;</text>
  <text x="476" y="311" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    /&gt;</text>
  <text x="476" y="329" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  );</text>
  <text x="476" y="347" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">&#125;</text>
  <text x="476" y="365" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 이전 React: null 체크 필요</text>
  <text x="476" y="383" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// ref={(node) =&gt; &#123;</text>
  <text x="476" y="401" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">//   if (node) node.focus();</text>
  <text x="476" y="419" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">//   else node?.blur(); // unmount 시</text>
</svg>
