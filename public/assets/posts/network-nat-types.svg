<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="an" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="ang" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">NAT: 패킷이 라우터를 통과할 때 주소가 바뀐다</text>

  <!-- Private network -->
  <rect x="40" y="75" width="280" height="180" rx="10" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="180" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">사설 네트워크 (192.168.0.0/24)</text>

  <rect x="60" y="114" width="110" height="40" rx="6" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>
  <text x="115" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">PC A</text>
  <text x="115" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888" text-anchor="middle">192.168.0.10</text>

  <rect x="60" y="165" width="110" height="40" rx="6" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>
  <text x="115" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">PC B</text>
  <text x="115" y="197" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888" text-anchor="middle">192.168.0.11</text>

  <rect x="190" y="140" width="110" height="40" rx="6" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>
  <text x="245" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">PC C</text>
  <text x="245" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888" text-anchor="middle">192.168.0.12</text>

  <!-- NAT Router -->
  <rect x="340" y="105" width="150" height="120" rx="10" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="415" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">NAT 라우터</text>
  <text x="415" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888" text-anchor="middle">내부: 192.168.0.1</text>
  <text x="415" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#7ec8e3" text-anchor="middle">외부: 203.0.113.1</text>
  <text x="415" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">NAT 변환 테이블</text>
  <text x="415" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">유지·포트 매핑</text>

  <!-- Arrows -->
  <line x1="320" y1="155" x2="340" y2="155" stroke="#55c555" stroke-width="2" marker-end="url(#ang)"/>
  <line x1="490" y1="155" x2="540" y2="155" stroke="#7ec8e3" stroke-width="2" marker-end="url(#an)"/>

  <!-- Internet -->
  <ellipse cx="650" cy="165" rx="100" ry="60" fill="#111" stroke="#555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="650" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">인터넷</text>
  <text x="650" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#666" text-anchor="middle">공인 IP만 통신</text>

  <!-- NAT table -->
  <rect x="40" y="280" width="800" height="180" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">NAPT 변환 테이블 (포트 기반, PAT)</text>
  <text x="60" y="322" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">사설 IP:포트              공인 IP:포트          목적지 IP:포트        프로토콜</text>
  <line x1="60" y1="330" x2="820" y2="330" stroke="#3a4a6e" stroke-width="1"/>
  <text x="60" y="348" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">192.168.0.10:51000   203.0.113.1:40001    8.8.8.8:443           TCP</text>
  <text x="60" y="368" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">192.168.0.11:52000   203.0.113.1:40002    8.8.8.8:443           TCP</text>
  <text x="60" y="388" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">192.168.0.12:53000   203.0.113.1:40003    1.1.1.1:53            UDP</text>
  <text x="60" y="408" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8"># 반환 패킷: dst=203.0.113.1:40002 → 192.168.0.11:52000 으로 역변환</text>
  <text x="60" y="428" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8"># 포트 번호로 어느 사설 호스트에게 전달할지 구분</text>
  <text x="60" y="448" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8"># 하나의 공인 IP로 수만 개의 동시 연결 지원</text>
</svg>
