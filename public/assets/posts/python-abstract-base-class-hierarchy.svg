<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">추상 기반 클래스(ABC) 구조</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">인터페이스를 정의하고 구현 강제 — 인스턴스화 불가</text>

  <!-- Abstract class box (top) -->
  <rect x="270" y="88" width="340" height="110" rx="8" fill="#0d1117" stroke="#e05555" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="440" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">«abstract»</text>
  <text x="440" y="132" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="700" fill="#7ec8e3">Shape</text>
  <line x1="290" y1="142" x2="590" y2="142" stroke="#1e2433" stroke-width="1"/>
  <text x="290" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">  @abstractmethod area()</text>
  <text x="290" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">  @abstractmethod perimeter()</text>

  <!-- Arrows down -->
  <line x1="340" y1="198" x2="220" y2="268" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="214,272 210,256 230,262" fill="#888"/>
  <line x1="440" y1="198" x2="440" y2="268" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="433,268 440,284 447,268" fill="#888"/>
  <line x1="540" y1="198" x2="660" y2="268" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="666,272 656,256 676,264" fill="#888"/>

  <!-- Concrete class 1: Circle -->
  <rect x="80" y="284" width="260" height="110" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <text x="210" y="308" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" font-weight="700" fill="#55c555">Circle</text>
  <line x1="100" y1="316" x2="320" y2="316" stroke="#1e2433" stroke-width="1"/>
  <text x="100" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  radius: float</text>
  <text x="100" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">  area() ✓</text>
  <text x="100" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">  perimeter() ✓</text>

  <!-- Concrete class 2: Rectangle -->
  <rect x="310" y="284" width="260" height="110" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="308" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" font-weight="700" fill="#55c555">Rectangle</text>
  <line x1="330" y1="316" x2="550" y2="316" stroke="#1e2433" stroke-width="1"/>
  <text x="330" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  width, height: float</text>
  <text x="330" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">  area() ✓</text>
  <text x="330" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">  perimeter() ✓</text>

  <!-- Incomplete class: BadShape -->
  <rect x="540" y="284" width="260" height="110" rx="8" fill="#0d1117" stroke="#e05555" stroke-width="2"/>
  <text x="670" y="308" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" font-weight="700" fill="#e05555">BadShape</text>
  <line x1="560" y1="316" x2="780" y2="316" stroke="#1e2433" stroke-width="1"/>
  <text x="560" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">  area() ✓</text>
  <text x="560" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">  perimeter() ✗ 미구현</text>
  <text x="560" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555">  → TypeError 발생!</text>

  <!-- Footer -->
  <rect x="60" y="414" width="760" height="52" rx="8" fill="#0d1117" stroke="#1e2433"/>
  <text x="440" y="436" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">BadShape()  →  TypeError: Can't instantiate abstract class</text>
  <text x="440" y="454" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6a8aa0">abstractmethod를 모두 구현하지 않으면 인스턴스화 시점에 즉시 오류</text>
</svg>
