<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">실전 필터 예시</text>

  <!-- Example 1: author + date -->
  <text x="60" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">저자 + 날짜</text>
  <rect x="60" y="96" width="760" height="72" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1.5"/>
  <text x="76" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># Alice가 지난 2주 동안 작성한 커밋</text>
  <text x="76" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">git log --author="Alice" --since="2 weeks ago" --oneline</text>
  <text x="76" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 이메일로도 가능 (부분 매칭, 정규식)</text>

  <!-- Example 2: grep + no-merges -->
  <text x="60" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">키워드 + 머지 제외</text>
  <rect x="60" y="208" width="760" height="72" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1.5"/>
  <text x="76" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># "auth" 관련 작업 커밋 (머지 제외)</text>
  <text x="76" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">git log --grep="auth" --no-merges --oneline</text>
  <text x="76" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># --grep은 대소문자 구분 — -i로 무시 가능</text>

  <!-- Example 3: pickaxe -S -->
  <text x="60" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">코드 내용 변경 추적 (-S)</text>
  <rect x="60" y="318" width="760" height="54" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1.5"/>
  <text x="76" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># "validatePassword" 함수가 추가/삭제된 커밋</text>
  <text x="76" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">git log -S "validatePassword" --oneline -p</text>
</svg>
