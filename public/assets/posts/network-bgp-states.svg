<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="abs" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">BGP FSM: 세션 수립 상태 머신</text>

  <!-- States -->
  <rect x="60" y="80" width="110" height="44" rx="8" fill="#111" stroke="#555" stroke-width="1.5"/>
  <text x="115" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">Idle</text>

  <line x1="170" y1="102" x2="218" y2="102" stroke="#7ec8e3" stroke-width="2" marker-end="url(#abs)"/>
  <text x="194" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">Start</text>

  <rect x="220" y="80" width="110" height="44" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="275" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Connect</text>

  <line x1="330" y1="102" x2="378" y2="102" stroke="#7ec8e3" stroke-width="2" marker-end="url(#abs)"/>
  <text x="354" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">TCP OK</text>

  <rect x="380" y="80" width="110" height="44" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="435" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">OpenSent</text>

  <line x1="490" y1="102" x2="538" y2="102" stroke="#7ec8e3" stroke-width="2" marker-end="url(#abs)"/>
  <text x="514" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">OPEN rcvd</text>

  <rect x="540" y="80" width="110" height="44" rx="8" fill="#111" stroke="#e8a030" stroke-width="1.5"/>
  <text x="595" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8a030" text-anchor="middle">OpenConfirm</text>

  <line x1="650" y1="102" x2="698" y2="102" stroke="#7ec8e3" stroke-width="2" marker-end="url(#abs)"/>
  <text x="674" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">KEEPALIVE</text>

  <rect x="700" y="80" width="120" height="44" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="760" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Established</text>

  <!-- Active state (error path) -->
  <rect x="220" y="180" width="110" height="44" rx="8" fill="#111" stroke="#e05555" stroke-width="1.5"/>
  <text x="275" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">Active</text>
  <line x1="275" y1="124" x2="275" y2="178" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="246" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">TCP fail</text>

  <!-- Message types -->
  <rect x="60" y="260" width="760" height="120" rx="8" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">BGP 메시지 타입</text>
  <text x="100" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" font-weight="600">OPEN</text>
  <text x="165" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">세션 수립 협상 (AS 번호, Hold Time, BGP ID)</text>
  <text x="100" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" font-weight="600">UPDATE</text>
  <text x="175" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">경로 추가/철회 (NLRI + 속성 포함)</text>
  <text x="100" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8a030" font-weight="600">KEEPALIVE</text>
  <text x="205" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Hold Timer 갱신 (기본 60초마다)</text>
  <text x="100" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" font-weight="600">NOTIFICATION</text>
  <text x="230" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">오류 통보 후 세션 종료</text>
</svg>
