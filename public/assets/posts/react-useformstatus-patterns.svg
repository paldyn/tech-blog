<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" style="background:#0a0a0a;border-radius:12px;">
  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">useFormStatus 활용 패턴</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">pending 상태로 UI 피드백 구현</text>

  <!-- Pattern 1: Submit button -->
  <rect x="60" y="94" width="370" height="160" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="113" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 1. 제출 버튼 비활성화 + 텍스트 변경</text>
  <text x="76" y="131" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">import</tspan> &#123; useFormStatus &#125; <tspan fill="#7ec8e3" font-weight="600">from</tspan> <tspan fill="#ce9178">'react-dom'</tspan>;</text>
  <text x="76" y="149" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">function</tspan> SubmitButton() &#123;</text>
  <text x="76" y="167" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">const</tspan> &#123; pending &#125; = useFormStatus();</text>
  <text x="76" y="185" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">return</tspan> (</text>
  <text x="76" y="203" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    &lt;<tspan fill="#7ec8e3" font-weight="600">button</tspan> type=<tspan fill="#ce9178">"submit"</tspan> disabled=&#123;pending&#125;&gt;</text>
  <text x="76" y="221" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      &#123;pending ? <tspan fill="#ce9178">'저장 중...'</tspan> : <tspan fill="#ce9178">'저장'</tspan>&#125;</text>
  <text x="76" y="239" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    &lt;/<tspan fill="#7ec8e3" font-weight="600">button</tspan>&gt;</text>

  <!-- Pattern 2: Input disabled -->
  <rect x="450" y="94" width="370" height="160" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="466" y="113" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 2. 제출 중 입력 필드 비활성화</text>
  <text x="466" y="131" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">function</tspan> DisabledInput(&#123; name &#125;) &#123;</text>
  <text x="466" y="149" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">const</tspan> &#123; pending &#125; = useFormStatus();</text>
  <text x="466" y="167" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">return</tspan> (</text>
  <text x="466" y="185" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    &lt;<tspan fill="#7ec8e3" font-weight="600">input</tspan></text>
  <text x="466" y="203" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      name=&#123;name&#125;</text>
  <text x="466" y="221" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      disabled=&#123;pending&#125;</text>
  <text x="466" y="239" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    /&gt;</text>

  <!-- Pattern 3: data usage -->
  <rect x="60" y="274" width="760" height="162" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="293" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 3. data로 제출 중인 값 미리 표시 (낙관적 UI 없이 간단하게)</text>
  <text x="76" y="311" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">function</tspan> UsernameDisplay() &#123;</text>
  <text x="76" y="329" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">const</tspan> &#123; pending, data &#125; = useFormStatus();</text>
  <text x="76" y="347" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">if</tspan> (!pending) <tspan fill="#7ec8e3" font-weight="600">return</tspan> <tspan fill="#b5cea8">null</tspan>;</text>
  <text x="76" y="365" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">const</tspan> username = data?.get(<tspan fill="#ce9178">'username'</tspan>);</text>
  <text x="76" y="383" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">return</tspan> &lt;<tspan fill="#7ec8e3" font-weight="600">p</tspan>&gt;&#123;username&#125;(으)로 변경 중...&lt;/<tspan fill="#7ec8e3" font-weight="600">p</tspan>&gt;;</text>
  <text x="76" y="401" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">&#125;</text>
  <text x="76" y="419" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// form 안에서: &lt;UsernameDisplay /&gt; 를 포함하면 제출 중에 "홍길동(으)로 변경 중..." 표시</text>
  <text x="76" y="428" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" xml:space="preserve">// useOptimistic 없이도 간단한 낙관적 피드백 구현 가능</text>
</svg>
