<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <!-- Background -->
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">AI 기술 진화 — 3단계 도약</text>
  <text x="440" y="74" text-anchor="middle" font-size="13" fill="#888">규칙 기반 → 통계 학습 → 신경망 → LLM</text>

  <!-- Step boxes -->

  <!-- Step 1: Rule-based -->
  <rect x="60" y="105" width="180" height="200" fill="#111122" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="150" y="135" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc">1단계</text>
  <text x="150" y="157" text-anchor="middle" font-size="13" fill="#e8e8e8">규칙 기반 AI</text>
  <text x="150" y="177" text-anchor="middle" font-size="11" fill="#555">1950~1980s</text>
  <line x1="80" y1="188" x2="220" y2="188" stroke="#222" stroke-width="1"/>
  <text x="80" y="208" font-size="11" fill="#888">• if-else 규칙 수동 작성</text>
  <text x="80" y="226" font-size="11" fill="#888">• 전문가 시스템</text>
  <text x="80" y="244" font-size="11" fill="#888">• 탐색·계획 알고리즘</text>
  <text x="80" y="266" font-size="11" fill="#555">한계: 규칙 폭발</text>
  <text x="80" y="282" font-size="11" fill="#555">유지보수 불가</text>

  <!-- Arrow 1→2 -->
  <polygon points="254,195 274,195 274,185 294,205 274,225 274,215 254,215"
           fill="#7777cc" stroke="#0a0a0a" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Step 2: Statistical ML -->
  <rect x="308" y="105" width="180" height="200" fill="#0f1a1f" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="398" y="135" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">2단계</text>
  <text x="398" y="157" text-anchor="middle" font-size="13" fill="#e8e8e8">통계 기반 ML</text>
  <text x="398" y="177" text-anchor="middle" font-size="11" fill="#555">1980~2012</text>
  <line x1="328" y1="188" x2="468" y2="188" stroke="#222" stroke-width="1"/>
  <text x="328" y="208" font-size="11" fill="#888">• 데이터로 패턴 학습</text>
  <text x="328" y="226" font-size="11" fill="#888">• SVM · 결정트리 · RF</text>
  <text x="328" y="244" font-size="11" fill="#888">• 특징은 사람이 설계</text>
  <text x="328" y="266" font-size="11" fill="#555">한계: 고차원 데이터</text>
  <text x="328" y="282" font-size="11" fill="#555">특징 설계 부담</text>

  <!-- Arrow 2→3 -->
  <polygon points="502,195 522,195 522,185 542,205 522,225 522,215 502,215"
           fill="#7ec8e3" stroke="#0a0a0a" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Step 3: Deep Learning -->
  <rect x="556" y="105" width="180" height="200" fill="#0f1f12" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="646" y="135" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">3단계</text>
  <text x="646" y="157" text-anchor="middle" font-size="13" fill="#e8e8e8">딥러닝 + LLM</text>
  <text x="646" y="177" text-anchor="middle" font-size="11" fill="#555">2012~현재</text>
  <line x1="576" y1="188" x2="716" y2="188" stroke="#222" stroke-width="1"/>
  <text x="576" y="208" font-size="11" fill="#888">• 특징 자동 추출</text>
  <text x="576" y="226" font-size="11" fill="#888">• 다층 신경망(CNN/Transformer)</text>
  <text x="576" y="244" font-size="11" fill="#888">• 대규모 언어 모델</text>
  <text x="576" y="266" font-size="11" fill="#555">한계: 환각, 비용,</text>
  <text x="576" y="282" font-size="11" fill="#555">데이터·GPU 의존</text>

  <!-- Key enablers section -->
  <rect x="60" y="330" width="760" height="110" fill="#141414" rx="8" stroke="#333" stroke-width="1"/>
  <text x="440" y="356" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">딥러닝 부흥을 가능하게 한 3가지 요소</text>
  <line x1="80" y1="368" x2="800" y2="368" stroke="#222" stroke-width="1"/>

  <!-- Three enablers -->
  <text x="200" y="392" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">빅데이터</text>
  <text x="200" y="412" text-anchor="middle" font-size="12" fill="#888">인터넷·SNS 폭발로</text>
  <text x="200" y="430" text-anchor="middle" font-size="12" fill="#888">수억 개 레이블 데이터 확보</text>

  <text x="440" y="392" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">GPU 병렬 연산</text>
  <text x="440" y="412" text-anchor="middle" font-size="12" fill="#888">NVIDIA GPU로 행렬 연산</text>
  <text x="440" y="430" text-anchor="middle" font-size="12" fill="#888">100배 이상 속도 향상</text>

  <text x="680" y="392" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">알고리즘 혁신</text>
  <text x="680" y="412" text-anchor="middle" font-size="12" fill="#888">ReLU · Dropout · BatchNorm</text>
  <text x="680" y="430" text-anchor="middle" font-size="12" fill="#888">Transformer 아키텍처</text>

  <!-- Footer -->
  <text x="440" y="476" text-anchor="middle" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈 #2</text>
</svg>
