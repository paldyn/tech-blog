<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Data Guard 설정 &amp; 전환 명령</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">LOG_ARCHIVE_DEST_n 설정 · Switchover · Failover 명령</text>

  <!-- Left: Configuration -->
  <text x="230" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Primary 설정 (파라미터)</text>
  <rect x="50" y="108" width="360" height="276" rx="6" fill="#070b14" stroke="#1e2433"/>

  <text x="66" y="128" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">-- 주요 파라미터</text>
  <text x="66" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">-- (Primary 측 설정)</text>
  <text x="66" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">LOG_ARCHIVE_CONFIG=</text>
  <text x="66" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">  'DG_CONFIG=(primary,standby1)'</text>

  <text x="66" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">LOG_ARCHIVE_DEST_2=</text>
  <text x="66" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">  'SERVICE=standby1</text>
  <text x="66" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">   ASYNC</text>
  <text x="66" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">   VALID_FOR=(ALL_LOGFILES,</text>
  <text x="66" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">    PRIMARY_ROLE)</text>
  <text x="66" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">   DB_UNIQUE_NAME=standby1'</text>

  <text x="66" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">STANDBY_FILE_MANAGEMENT=<tspan fill="#ce9178">AUTO</tspan></text>
  <text x="66" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">DB_UNIQUE_NAME=<tspan fill="#ce9178">primary</tspan></text>
  <text x="66" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">FAL_SERVER=<tspan fill="#ce9178">standby1</tspan></text>

  <!-- Right: Switchover/Failover -->
  <text x="650" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">역할 전환 명령</text>
  <rect x="470" y="108" width="360" height="276" rx="6" fill="#070b14" stroke="#1e2433"/>

  <text x="486" y="128" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">-- Switchover (계획된 전환)</text>
  <text x="486" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">-- 1. Primary에서 실행</text>
  <text x="486" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">ALTER DATABASE</text>
  <text x="486" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  COMMIT TO SWITCHOVER</text>
  <text x="486" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  TO STANDBY</text>
  <text x="486" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  WITH SESSION SHUTDOWN</text>
  <text x="486" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  ;</text>

  <text x="486" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">-- 2. Standby에서 실행</text>
  <text x="486" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">ALTER DATABASE</text>
  <text x="486" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">  COMMIT TO SWITCHOVER</text>
  <text x="486" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">  TO PRIMARY</text>
  <text x="486" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  ;</text>

  <text x="486" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">-- Failover (비계획, Primary 불능)</text>
  <text x="486" y="370" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">ALTER DATABASE ACTIVATE</text>

  <!-- Bottom note -->
  <text x="440" y="398" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">Data Guard Broker (DGMGRL): 통합 관리 · 자동 Failover (Fast-Start Failover) 지원</text>
  <text x="440" y="412" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">Oracle 19c+: DGMGRL 없이도 Active Data Guard DML Redirect (Standby → Primary 자동 포워드)</text>
</svg>
