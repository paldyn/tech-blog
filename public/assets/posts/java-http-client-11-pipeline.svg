<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="hc1" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">HttpClient — 세 객체로 나뉜 명확한 역할</text>

  <rect x="60" y="115" width="220" height="100" rx="10" fill="#11151c" stroke="#7777cc" stroke-width="1.5"/>
  <text x="170" y="155" font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">HttpClient</text>
  <text x="170" y="181" font-size="12" fill="#888" text-anchor="middle">재사용하는 호출자</text>

  <rect x="330" y="115" width="220" height="100" rx="10" fill="#11151c" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="155" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">HttpRequest</text>
  <text x="440" y="181" font-size="12" fill="#888" text-anchor="middle">불변 요청 명세</text>

  <rect x="600" y="115" width="220" height="100" rx="10" fill="#11151c" stroke="#55c555" stroke-width="1.5"/>
  <text x="710" y="155" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">HttpResponse&lt;T&gt;</text>
  <text x="710" y="181" font-size="12" fill="#888" text-anchor="middle">상태 · 헤더 · 본문</text>

  <line x1="282" y1="165" x2="328" y2="165" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#hc1)"/>
  <line x1="552" y1="165" x2="598" y2="165" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#hc1)"/>
  <text x="305" y="150" font-size="11" fill="#888" text-anchor="middle">send</text>
  <text x="575" y="150" font-size="11" fill="#888" text-anchor="middle">반환</text>

  <text x="440" y="262" font-size="13" fill="#888" text-anchor="middle">HttpClient는 한 번 만들어 재사용하고, 요청은 빌더로 조립한 불변 객체로 표현한다</text>
