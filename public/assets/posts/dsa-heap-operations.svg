<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arw" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arwr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">힙 삽입 (Sift-Up) / 삭제 (Sift-Down)</text>

  <!-- Sift-Up section -->
  <text x="180" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">삽입 90 → Sift-Up</text>

  <!-- Before insert -->
  <text x="100" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">삽입 전</text>
  <circle cx="100" cy="118" r="22" fill="#1a2a4a" stroke="#3a5a7e" stroke-width="1.5"/>
  <text x="100" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">100</text>
  <circle cx="60" cy="172" r="22" fill="#1a2a4a" stroke="#3a5a7e" stroke-width="1.5"/>
  <text x="60" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">80</text>
  <circle cx="140" cy="172" r="22" fill="#1a2a4a" stroke="#3a5a7e" stroke-width="1.5"/>
  <text x="140" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">60</text>
  <circle cx="40" cy="226" r="22" fill="#1a2a4a" stroke="#3a5a7e" stroke-width="1.5"/>
  <text x="40" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">40</text>
  <circle cx="95" cy="226" r="22" fill="#55c555" stroke="#55c555" stroke-width="1.5"/>
  <text x="95" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#fff" text-anchor="middle">90</text>
  <text x="95" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">새로 추가</text>
  <line x1="85" y1="134" x2="71" y2="152" stroke="#555" stroke-width="1.5"/>
  <line x1="115" y1="134" x2="129" y2="152" stroke="#555" stroke-width="1.5"/>
  <line x1="47" y1="189" x2="43" y2="206" stroke="#555" stroke-width="1.5"/>
  <line x1="73" y1="189" x2="85" y2="206" stroke="#555" stroke-width="1.5"/>

  <!-- Arrow -->
  <path d="M 200 175 L 240 175" stroke="#55c555" stroke-width="2" fill="none" marker-end="url(#arw)"/>
  <text x="220" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">Sift-Up</text>

  <!-- After sift-up: 90 swapped with 80 -->
  <text x="330" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">1회 교환 후</text>
  <circle cx="330" cy="118" r="22" fill="#1a2a4a" stroke="#3a5a7e" stroke-width="1.5"/>
  <text x="330" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">100</text>
  <circle cx="290" cy="172" r="22" fill="#55c555" stroke="#55c555" stroke-width="1.5"/>
  <text x="290" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#fff" text-anchor="middle">90</text>
  <circle cx="370" cy="172" r="22" fill="#1a2a4a" stroke="#3a5a7e" stroke-width="1.5"/>
  <text x="370" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">60</text>
  <circle cx="265" cy="226" r="22" fill="#1a2a4a" stroke="#3a5a7e" stroke-width="1.5"/>
  <text x="265" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">40</text>
  <circle cx="318" cy="226" r="22" fill="#1a2a4a" stroke="#3a5a7e" stroke-width="1.5"/>
  <text x="318" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">80</text>
  <line x1="315" y1="134" x2="300" y2="152" stroke="#555" stroke-width="1.5"/>
  <line x1="345" y1="134" x2="359" y2="152" stroke="#555" stroke-width="1.5"/>
  <line x1="278" y1="189" x2="272" y2="206" stroke="#555" stroke-width="1.5"/>
  <line x1="302" y1="189" x2="308" y2="206" stroke="#555" stroke-width="1.5"/>

  <!-- Sift-Down section -->
  <text x="660" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">최대값 추출 → Sift-Down</text>

  <text x="570" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">루트 제거 후</text>

  <!-- After extract: last element at root -->
  <circle cx="570" cy="118" r="22" fill="#2a1a1a" stroke="#e05555" stroke-width="2"/>
  <text x="570" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">30</text>
  <text x="570" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555" text-anchor="middle">마지막→루트</text>
  <circle cx="530" cy="172" r="22" fill="#1a2a4a" stroke="#3a5a7e" stroke-width="1.5"/>
  <text x="530" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">80</text>
  <circle cx="610" cy="172" r="22" fill="#1a2a4a" stroke="#3a5a7e" stroke-width="1.5"/>
  <text x="610" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">60</text>
  <line x1="556" y1="134" x2="541" y2="152" stroke="#555" stroke-width="1.5"/>
  <line x1="584" y1="134" x2="599" y2="152" stroke="#555" stroke-width="1.5"/>

  <!-- Arrow -->
  <path d="M 653 155 L 685 155" stroke="#e05555" stroke-width="2" fill="none" marker-end="url(#arwr)"/>
  <text x="669" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">Sift-Down</text>

  <text x="790" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">정렬 완료</text>
  <circle cx="790" cy="118" r="22" fill="#1a2a4a" stroke="#55c555" stroke-width="2"/>
  <text x="790" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">80</text>
  <circle cx="750" cy="172" r="22" fill="#1a2a4a" stroke="#3a5a7e" stroke-width="1.5"/>
  <text x="750" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">30</text>
  <circle cx="830" cy="172" r="22" fill="#1a2a4a" stroke="#3a5a7e" stroke-width="1.5"/>
  <text x="830" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">60</text>
  <line x1="776" y1="134" x2="761" y2="152" stroke="#555" stroke-width="1.5"/>
  <line x1="804" y1="134" x2="819" y2="152" stroke="#555" stroke-width="1.5"/>

  <!-- Code box -->
  <rect x="50" y="275" width="780" height="130" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="66" y="297" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">def</tspan><tspan fill="#ffffff"> push(self, val):    </tspan><tspan fill="#9aa4b8"># O(log n)</tspan>
  </text>
  <text x="66" y="315" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    self.heap.append(val); self._sift_up(len(self.heap)-</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">)</tspan>
  </text>
  <text x="66" y="333" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">def</tspan><tspan fill="#ffffff"> pop(self):          </tspan><tspan fill="#9aa4b8"># O(log n) — 최대값 반환</tspan>
  </text>
  <text x="66" y="351" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    top = self.heap[</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">]</tspan>
  </text>
  <text x="66" y="369" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    self.heap[</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">] = self.heap.pop()  </tspan><tspan fill="#9aa4b8"># 마지막 → 루트</tspan>
  </text>
  <text x="66" y="387" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    self._sift_down(</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">); </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> top</tspan>
  </text>
</svg>
