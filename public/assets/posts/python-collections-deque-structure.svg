<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">deque — 양방향 큐 구조</text>

  <!-- Left arrow: appendleft / popleft -->
  <rect x="60" y="110" width="120" height="48" rx="8" fill="#0d1926" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="120" y="131" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">appendleft()</text>
  <text x="120" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">popleft()</text>
  <!-- Arrow right from left -->
  <line x1="180" y1="134" x2="220" y2="134" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="220,134 210,129 210,139" fill="#7ec8e3"/>
  <!-- Arrow left to left -->
  <line x1="220" y1="148" x2="180" y2="148" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="180,148 190,143 190,153" fill="#7ec8e3"/>

  <!-- deque nodes -->
  <rect x="220" y="104" width="68" height="56" rx="6" fill="#131825" stroke="#1e2433" stroke-width="1.5"/>
  <text x="254" y="136" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="18" font-weight="700" fill="#e8e8e8">A</text>
  <text x="254" y="153" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">head</text>

  <rect x="296" y="104" width="68" height="56" rx="6" fill="#131825" stroke="#1e2433" stroke-width="1.5"/>
  <text x="330" y="136" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="18" font-weight="700" fill="#e8e8e8">B</text>

  <rect x="372" y="104" width="68" height="56" rx="6" fill="#131825" stroke="#1e2433" stroke-width="1.5"/>
  <text x="406" y="136" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="18" font-weight="700" fill="#e8e8e8">C</text>

  <rect x="448" y="104" width="68" height="56" rx="6" fill="#131825" stroke="#1e2433" stroke-width="1.5"/>
  <text x="482" y="136" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="18" font-weight="700" fill="#e8e8e8">D</text>

  <rect x="524" y="104" width="68" height="56" rx="6" fill="#131825" stroke="#1e2433" stroke-width="1.5"/>
  <text x="558" y="136" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="18" font-weight="700" fill="#e8e8e8">E</text>
  <text x="558" y="153" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">tail</text>

  <!-- Right arrows: append / pop -->
  <line x1="592" y1="120" x2="640" y2="120" stroke="#e05555" stroke-width="2"/>
  <polygon points="640,120 630,115 630,125" fill="#e05555"/>
  <line x1="640" y1="143" x2="592" y2="143" stroke="#e05555" stroke-width="2"/>
  <polygon points="592,143 602,138 602,148" fill="#e05555"/>

  <rect x="640" y="110" width="100" height="48" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="690" y="131" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">append()</text>
  <text x="690" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">pop()</text>

  <!-- O(1) labels -->
  <text x="120" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">O(1)</text>
  <text x="690" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">O(1)</text>
  <text x="406" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">내부: 이중 연결 리스트</text>

  <!-- list comparison -->
  <rect x="60" y="210" width="760" height="100" rx="8" fill="#0d0d0d" stroke="#1e2433"/>
  <text x="440" y="233" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">deque vs list — 복잡도 비교</text>

  <text x="120" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">연산</text>
  <text x="320" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">deque</text>
  <text x="560" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">list</text>

  <text x="120" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">앞쪽 삽입/삭제</text>
  <text x="320" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">O(1)</text>
  <text x="560" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">O(n) ← 전체 이동</text>

  <text x="120" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">뒤쪽 삽입/삭제</text>
  <text x="320" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">O(1)</text>
  <text x="560" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">O(1)</text>

  <!-- maxlen -->
  <rect x="60" y="330" width="760" height="60" rx="8" fill="#1a1a0d" stroke="#b5cea8"/>
  <text x="80" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#b5cea8">maxlen 옵션 — 고정 크기 슬라이딩 윈도우</text>
  <text x="80" y="373" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">deque(maxlen=3)에서 append() 시 반대편 끝 요소가 자동으로 제거됩니다</text>
</svg>
