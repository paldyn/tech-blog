<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Prisma 개발 워크플로우</text>

  <!-- Step 1 -->
  <rect x="60" y="72" width="160" height="72" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">① 스키마 정의</text>
  <text x="140" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">schema.prisma 작성</text>

  <!-- Arrow 1→2 -->
  <line x1="220" y1="108" x2="278" y2="108" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="280" y="72" width="160" height="72" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="360" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">② 마이그레이션</text>
  <text x="360" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">prisma migrate dev</text>

  <!-- Arrow 2→3 -->
  <line x1="440" y1="108" x2="498" y2="108" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="500" y="72" width="160" height="72" rx="8" fill="#111827" stroke="#ce9178" stroke-width="1.5"/>
  <text x="580" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#ce9178" text-anchor="middle">③ Client 생성</text>
  <text x="580" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">prisma generate</text>

  <!-- Arrow 3→4 -->
  <line x1="660" y1="108" x2="718" y2="108" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4 -->
  <rect x="720" y="72" width="140" height="72" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="790" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">④ 코드 사용</text>
  <text x="790" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">PrismaClient API</text>

  <!-- Code block: Prisma query examples -->
  <rect x="60" y="174" width="370" height="260" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="198" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// Prisma Client 조회</text>
  <text x="80" y="218" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> users = </tspan><tspan fill="#7ec8e3" font-weight="600">await</tspan><tspan fill="#ffffff"> prisma.user.findMany({</tspan>
  </text>
  <text x="80" y="238" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  where: { isActive: </tspan><tspan fill="#7ec8e3" font-weight="600">true</tspan><tspan fill="#ffffff"> },</tspan>
  </text>
  <text x="80" y="258" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  include: { orders: </tspan><tspan fill="#7ec8e3" font-weight="600">true</tspan><tspan fill="#ffffff"> },</tspan>
  </text>
  <text x="80" y="278" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  orderBy: { createdAt: </tspan><tspan fill="#ce9178">'desc'</tspan><tspan fill="#ffffff"> }</tspan>
  </text>
  <text x="80" y="298" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">});</tspan>
  </text>
  <text x="80" y="326" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// Raw SQL 폴백</text>
  <text x="80" y="346" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> result = </tspan><tspan fill="#7ec8e3" font-weight="600">await</tspan><tspan fill="#ffffff"> prisma.$queryRaw</tspan>
  </text>
  <text x="80" y="366" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ce9178">  `SELECT * FROM users`</tspan>
  </text>
  <text x="80" y="386" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  // 파라미터 바인딩 자동 처리</text>
  <text x="80" y="406" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  </tspan><tspan fill="#b5cea8">Prisma.sql</tspan><tspan fill="#ffffff">` WHERE id = ${userId}`;</tspan>
  </text>

  <!-- Sequelize code -->
  <rect x="450" y="174" width="370" height="260" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="470" y="198" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// Sequelize 조회</text>
  <text x="470" y="218" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> users = </tspan><tspan fill="#7ec8e3" font-weight="600">await</tspan><tspan fill="#ffffff"> User.findAll({</tspan>
  </text>
  <text x="470" y="238" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  where: { isActive: </tspan><tspan fill="#7ec8e3" font-weight="600">true</tspan><tspan fill="#ffffff"> },</tspan>
  </text>
  <text x="470" y="258" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  include: [Order],</tspan>
  </text>
  <text x="470" y="278" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  order: [[</tspan><tspan fill="#ce9178">'createdAt'</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">'DESC'</tspan><tspan fill="#ffffff">]]</tspan>
  </text>
  <text x="470" y="298" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">});</tspan>
  </text>
  <text x="470" y="326" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// Raw Query</text>
  <text x="470" y="346" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">await</tspan><tspan fill="#ffffff"> sequelize.query(</tspan>
  </text>
  <text x="470" y="366" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ce9178">  'SELECT * FROM users WHERE id=?'</tspan><tspan fill="#ffffff">,</tspan>
  </text>
  <text x="470" y="386" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  { replacements: [userId],</tspan>
  </text>
  <text x="470" y="406" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    type: QueryTypes.SELECT }</tspan>
  </text>
</svg>
