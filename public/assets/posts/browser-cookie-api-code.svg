<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">쿠키 조작 코드 패턴</text>

  <!-- Left: document.cookie CRUD -->
  <text x="60" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">document.cookie CRUD</text>

  <rect x="60" y="94" width="370" height="180" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 쓰기 — 기존 쿠키에 추가 (덮어쓰기 아님)</text>
  <text x="76" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">document.cookie = </text>
  <text x="76" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">  `theme=dark; Max-Age=86400; Path=/`<text fill="#e8e8e8">;</text></text>
  <text x="76" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 읽기 — 전체 문자열 (name=val; name2=val2)</text>
  <text x="76" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">function <text fill="#e8e8e8">getCookie(name) {</text></text>
  <text x="76" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  return <text fill="#e8e8e8">document.cookie</text></text>
  <text x="76" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    .<text fill="#7ec8e3">split</text><text fill="#e8e8e8">(</text><text fill="#ce9178">';'</text><text fill="#e8e8e8">).<text fill="#7ec8e3">find</text><text fill="#e8e8e8">(s =&gt; s.</text><text fill="#7ec8e3">trim</text><text fill="#e8e8e8">().</text><text fill="#7ec8e3">startsWith</text><text fill="#e8e8e8">(</text><text fill="#ce9178">`${name}=`</text><text fill="#e8e8e8">))</text></text></text>
  <text x="76" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    ?.<text fill="#7ec8e3">split</text><text fill="#e8e8e8">(</text><text fill="#ce9178">'='</text><text fill="#e8e8e8">).<text fill="#7ec8e3">slice</text><text fill="#e8e8e8">(</text><text fill="#b5cea8">1</text><text fill="#e8e8e8">).<text fill="#7ec8e3">join</text><text fill="#e8e8e8">(</text><text fill="#ce9178">'='</text><text fill="#e8e8e8">) ?? </text><text fill="#b5cea8">null</text><text fill="#e8e8e8">;</text></text>
  <text x="76" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>

  <!-- Right: CookieStore API -->
  <text x="450" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">CookieStore API (현대적)</text>

  <rect x="450" y="94" width="370" height="180" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="466" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 비동기, 타입 안전, 옵션 객체</text>
  <text x="466" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">await <text fill="#e8e8e8">cookieStore.</text><text fill="#7ec8e3">set</text><text fill="#e8e8e8">({</text></text>
  <text x="466" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  name: <text fill="#ce9178">'theme'</text><text fill="#e8e8e8">, value: </text><text fill="#ce9178">'dark'</text><text fill="#e8e8e8">,</text></text>
  <text x="466" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  maxAge: <text fill="#b5cea8">86400</text><text fill="#e8e8e8">, sameSite: </text><text fill="#ce9178">'lax'</text><text fill="#e8e8e8">,</text></text>
  <text x="466" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">});</text>
  <text x="466" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">const <text fill="#e8e8e8">c = </text><text fill="#7ec8e3">await <text fill="#e8e8e8">cookieStore.</text><text fill="#7ec8e3">get</text><text fill="#e8e8e8">(</text><text fill="#ce9178">'theme'</text><text fill="#e8e8e8">);</text></text></text>
  <text x="466" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">c?.value;  </text><text x="466" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 'dark' or undefined</text>
  <text x="466" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">await <text fill="#e8e8e8">cookieStore.</text><text fill="#7ec8e3">delete</text><text fill="#e8e8e8">(</text><text fill="#ce9178">'theme'</text><text fill="#e8e8e8">);</text></text>
  <text x="466" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// Service Worker에서도 사용 가능</text>

  <!-- Bottom: delete cookie -->
  <text x="60" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8a84c">쿠키 삭제 (document.cookie)</text>

  <rect x="60" y="316" width="760" height="88" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// Max-Age=0으로 설정하면 즉시 만료</text>
  <text x="76" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">function <text fill="#e8e8e8">deleteCookie(name, path = </text><text fill="#ce9178">'/'</text><text fill="#e8e8e8">) {</text></text>
  <text x="76" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  document.cookie = </text><text fill="#ce9178">`${name}=; Max-Age=0; Path=${path}`</text><text fill="#e8e8e8">;</text></text>
  <text x="76" y="390" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>
  <text x="76" y="396" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// Path/Domain이 설정 시와 동일해야 삭제됨</text>
</svg>
