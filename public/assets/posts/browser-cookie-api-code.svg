<svg xmlns="http://www.w3.org/2000/svg" width="880" height="450" viewBox="0 0 880 450">
  <rect width="880" height="450" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">쿠키 조작 코드 패턴</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">document.cookie 의 읽기 · 쓰기 · 삭제와 현대적 CookieStore</text>

  <!-- Card 1: 쓰기 -->
  <rect x="60" y="100" width="380" height="148" rx="10" fill="#0d141a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="80" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">① 쓰기 — document.cookie</text>
  <rect x="76" y="144" width="348" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">document.cookie =</tspan></text>
  <text x="92" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">  'id=42; Max-Age=3600;</tspan></text>
  <text x="92" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">   Path=/; SameSite=Lax'</tspan></text>
  <text x="80" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">같은 이름이면 갱신 · 아니면 추가</text>

  <!-- Card 2: 읽기 -->
  <rect x="460" y="100" width="380" height="148" rx="10" fill="#0d1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="480" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">② 읽기 — 문자열 파싱</text>
  <rect x="476" y="144" width="348" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">document.cookie</tspan></text>
  <text x="492" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  .split(</tspan><tspan fill="#ce9178">'; '</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="492" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  .find(s =&gt; s.startsWith(</tspan><tspan fill="#ce9178">'id='</tspan><tspan fill="#ffffff">))</tspan></text>
  <text x="480" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">세미콜론으로 분리해 찾기</text>

  <!-- Card 3: 삭제 -->
  <rect x="60" y="264" width="380" height="148" rx="10" fill="#1a100d" stroke="#e05555" stroke-width="1"/>
  <text x="80" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555">③ 삭제 — Max-Age=0</text>
  <rect x="76" y="308" width="348" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// Max-Age=0 으로 즉시 만료</tspan></text>
  <text x="92" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">document.cookie =</tspan></text>
  <text x="92" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">  'id=; Max-Age=0; Path=/'</tspan></text>
  <text x="80" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Path · Domain 을 설정과 동일하게</text>

  <!-- Card 4: CookieStore -->
  <rect x="460" y="264" width="380" height="148" rx="10" fill="#14101a" stroke="#7777cc" stroke-width="1"/>
  <text x="480" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc">④ CookieStore — 비동기</text>
  <rect x="476" y="308" width="348" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">await</tspan><tspan fill="#ffffff"> cookieStore.set({</tspan></text>
  <text x="492" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  name:</tspan><tspan fill="#ce9178">'id'</tspan><tspan fill="#ffffff">, maxAge:</tspan><tspan fill="#b5cea8">3600</tspan><tspan fill="#ffffff"> })</tspan></text>
  <text x="492" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">await</tspan><tspan fill="#ffffff"> cookieStore.get(</tspan><tspan fill="#ce9178">'id'</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="480" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">문자열 파싱 없는 현대 API</text>

  <!-- Bottom note -->
  <text x="440" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">인증 쿠키엔 Secure · HttpOnly · SameSite 조합 — HttpOnly 는 JS 로 못 읽는다</text>
</svg>
