<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">커스텀 Error 클래스 구현 패턴</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">name 수정 · 추가 프로퍼티 · captureStackTrace</text>

  <!-- Left: AppError base class -->
  <rect x="50" y="90" width="370" height="232" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="235" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">AppError 베이스 클래스</text>

  <text x="66" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">class</tspan><tspan fill="#ffffff"> AppError </tspan><tspan fill="#7ec8e3">extends</tspan><tspan fill="#ffffff"> Error {</tspan></text>

  <text x="66" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  constructor(message, options = {}) {</text>
  <text x="66" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    super</tspan><tspan fill="#ffffff">(message, options);</tspan></text>
  
  <text x="66" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    this</tspan><tspan fill="#ffffff">.name = </tspan><tspan fill="#7ec8e3">this</tspan><tspan fill="#ffffff">.constructor.name;</tspan></text>

  <text x="66" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    if</tspan><tspan fill="#ffffff"> (Error.captureStackTrace) {</tspan></text>
  
  <text x="66" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      Error.captureStackTrace(</text>
  <text x="66" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">        this</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#7ec8e3">this</tspan><tspan fill="#ffffff">.constructor);</tspan></text>

  <text x="66" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    }</text>
  <text x="66" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  }</text>
  <text x="66" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>
  <text x="66" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 서브클래스에서 자동으로 name 설정됨</text>

  <!-- Right: Subclass with extra props -->
  <rect x="460" y="90" width="370" height="232" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="645" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">서브클래스 — 도메인 데이터 추가</text>

  <text x="476" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">class</tspan><tspan fill="#ffffff"> ValidationError </tspan><tspan fill="#7ec8e3">extends</tspan><tspan fill="#ffffff"> AppError {</tspan></text>

  <text x="476" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  constructor(message, field) {</text>
  <text x="476" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    super</tspan><tspan fill="#ffffff">(message);</tspan></text>
  
  <text x="476" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    this</tspan><tspan fill="#ffffff">.field = field; </tspan><tspan fill="#9aa4b8">// 추가 정보</tspan></text>

  <text x="476" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  }</text>
  <text x="476" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>

  <text x="476" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 사용</text>
  <text x="476" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">throw new</text>
  <text x="538" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> ValidationError(</text>
  <text x="476" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">  '이메일 형식 오류'</tspan><tspan fill="#ffffff">,</tspan></text>
  
  <text x="476" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">  'email'</tspan><tspan fill="#ffffff">);</tspan></text>
  
  <text x="476" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// .name = 'ValidationError' 자동 설정</text>

  <!-- Bottom: catch usage -->
  <rect x="50" y="338" width="780" height="72" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="66" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">catch</text>
  <text x="96" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> (e) {</text>
  <text x="66" y="378" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">  if</tspan><tspan fill="#ffffff"> (e </tspan><tspan fill="#7ec8e3">instanceof</tspan><tspan fill="#ffffff"> ValidationError) showFieldError(e.field, e.message);</tspan></text>

  <text x="66" y="396" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">  else if</tspan><tspan fill="#ffffff"> (e </tspan><tspan fill="#7ec8e3">instanceof</tspan><tspan fill="#ffffff"> AppError) showGenericError(e.message);</tspan><tspan fill="#7ec8e3">  else throw</tspan><tspan fill="#ffffff"> e;</tspan></text>

  <text x="66" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>
</svg>
