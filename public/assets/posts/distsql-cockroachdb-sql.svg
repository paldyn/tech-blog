<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">CockroachDB SQL 특징</text>

  <!-- Code block 1: Schema -->
  <rect x="60" y="68" width="370" height="160" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="90" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- CockroachDB DDL (PostgreSQL 호환)</text>
  <text x="76" y="110" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">CREATE TABLE</tspan><tspan fill="#ffffff"> orders (</tspan>
  </text>
  <text x="76" y="130" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  id      </tspan><tspan fill="#7ec8e3" font-weight="600">UUID</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">PRIMARY KEY</tspan>
  </text>
  <text x="76" y="150" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">            </tspan><tspan fill="#7ec8e3" font-weight="600">DEFAULT</tspan><tspan fill="#ffffff"> gen_random_uuid(),</tspan>
  </text>
  <text x="76" y="170" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  amount  </tspan><tspan fill="#7ec8e3" font-weight="600">DECIMAL</tspan><tspan fill="#ffffff">(12,2),</tspan>
  </text>
  <text x="76" y="190" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  region  </tspan><tspan fill="#7ec8e3" font-weight="600">STRING</tspan>
  </text>
  <text x="76" y="210" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">) </tspan><tspan fill="#7ec8e3" font-weight="600">LOCALITY</tspan><tspan fill="#ffffff"> REGIONAL BY ROW;</tspan>
  </text>

  <!-- Code block 2: Multi-region -->
  <rect x="450" y="68" width="370" height="160" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="466" y="90" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 멀티 리전 설정</text>
  <text x="466" y="110" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">ALTER DATABASE</tspan><tspan fill="#ffffff"> mydb</tspan>
  </text>
  <text x="466" y="130" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  ADD REGION</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">'us-east1'</tspan><tspan fill="#ffffff">;</tspan>
  </text>
  <text x="466" y="150" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">ALTER DATABASE</tspan><tspan fill="#ffffff"> mydb</tspan>
  </text>
  <text x="466" y="170" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  ADD REGION</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">'ap-northeast1'</tspan><tspan fill="#ffffff">;</tspan>
  </text>
  <text x="466" y="190" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 행의 region 컬럼 값에 따라</text>
  <text x="466" y="210" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 복제본을 해당 리전에 핀닝</text>

  <!-- Feature boxes -->
  <rect x="60" y="252" width="182" height="72" rx="8" fill="#0e1c30" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="151" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Serializable</text>
  <text x="151" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#c8c8c8" text-anchor="middle">기본 격리 수준</text>
  <text x="151" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">SSI (Serializable SI)</text>

  <rect x="254" y="252" width="182" height="72" rx="8" fill="#0e1c30" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="345" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">PostgreSQL 호환</text>
  <text x="345" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#c8c8c8" text-anchor="middle">psql / libpq 사용 가능</text>
  <text x="345" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">대부분 ORM 호환</text>

  <rect x="448" y="252" width="182" height="72" rx="8" fill="#0e1c30" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="539" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Multi-Region</text>
  <text x="539" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#c8c8c8" text-anchor="middle">행 단위 리전 핀닝</text>
  <text x="539" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">지역 지연 최소화</text>

  <rect x="642" y="252" width="182" height="72" rx="8" fill="#0e1c30" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="733" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">자동 재균형</text>
  <text x="733" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#c8c8c8" text-anchor="middle">Range 자동 분할</text>
  <text x="733" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">핫스팟 자동 해소</text>

  <!-- Note -->
  <rect x="60" y="348" width="760" height="52" rx="6" fill="#0d0d0d" stroke="#333" stroke-width="1"/>
  <text x="440" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">⚠ UUID PK 권장: 순차 INT는 모든 쓰기가 마지막 Range에 집중 (핫스팟)</text>
  <text x="440" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">gen_random_uuid() 또는 ULIDv4로 쓰기 분산</text>
</svg>
