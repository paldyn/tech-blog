<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">su vs sudo 비교</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">사용자 전환 vs 권한 위임</text>

  <!-- Headers -->
  <rect x="60" y="88" width="355" height="44" fill="#111827" rx="6" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="237" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">su</text>

  <rect x="465" y="88" width="355" height="44" fill="#111827" rx="6" stroke="#2d4a1e" stroke-width="1.5"/>
  <text x="642" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">sudo</text>

  <!-- Row 1: 인증 -->
  <rect x="60" y="144" width="355" height="56" fill="#0d1929" rx="4"/>
  <text x="80" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">인증 방식</text>
  <text x="80" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">대상 계정의 비밀번호 필요</text>

  <rect x="465" y="144" width="355" height="56" fill="#0d200d" rx="4"/>
  <text x="485" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">인증 방식</text>
  <text x="485" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">자신의 비밀번호로 인증</text>

  <!-- Row 2: 범위 -->
  <rect x="60" y="212" width="355" height="56" fill="#0d1929" rx="4"/>
  <text x="80" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">권한 범위</text>
  <text x="80" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">대상 사용자 환경 전체 전환</text>

  <rect x="465" y="212" width="355" height="56" fill="#0d200d" rx="4"/>
  <text x="485" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">권한 범위</text>
  <text x="485" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">sudoers가 허용한 명령만</text>

  <!-- Row 3: 로깅 -->
  <rect x="60" y="280" width="355" height="56" fill="#0d1929" rx="4"/>
  <text x="80" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">로깅</text>
  <text x="80" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">전환 사실만 기록 (내부 명령 미기록)</text>

  <rect x="465" y="280" width="355" height="56" fill="#0d200d" rx="4"/>
  <text x="485" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">로깅</text>
  <text x="485" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">실행 명령 전체 기록</text>

  <!-- Row 4: 보안 -->
  <rect x="60" y="348" width="355" height="56" fill="#0d1929" rx="4"/>
  <text x="80" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">보안 모델</text>
  <text x="80" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">root 비밀번호 공유 필요</text>

  <rect x="465" y="348" width="355" height="56" fill="#0d200d" rx="4"/>
  <text x="485" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">보안 모델</text>
  <text x="485" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">root 비밀번호 불필요</text>

  <text x="440" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">현대 Linux에서는 sudo 방식이 권장됨 — root 비밀번호를 설정하지 않는 배포판도 있음</text>
  <text x="440" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">(Ubuntu, Fedora 등은 기본적으로 root 계정 잠금)</text>
</svg>
