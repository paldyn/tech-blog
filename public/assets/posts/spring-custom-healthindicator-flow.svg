<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">HealthIndicator 계층 구조와 흐름</text>

  <!-- /actuator/health request -->
  <rect x="340" y="70" width="200" height="48" rx="8" fill="#1a0d1a" stroke="#9a4f9a" stroke-width="1.5"/>
  <text x="440" y="94" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#b07eec">GET /actuator/health</text>
  <text x="440" y="110" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">클라이언트 요청</text>

  <!-- Arrow down -->
  <line x1="440" y1="118" x2="440" y2="148" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- CompositeHealthContributor -->
  <rect x="260" y="148" width="360" height="56" rx="8" fill="#0d1b33" stroke="#4a9eff" stroke-width="2"/>
  <text x="440" y="174" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">CompositeHealthContributor</text>
  <text x="440" y="193" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">모든 HealthIndicator를 집계하여 최종 status 결정</text>

  <!-- Fan out arrows to indicators -->
  <path d="M 340 204 Q 148 230 148 258" stroke="#7ec8e3" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M 390 204 Q 320 240 300 258" stroke="#7ec8e3" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <line x1="440" y1="204" x2="440" y2="258" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <path d="M 490 204 Q 560 240 580 258" stroke="#7ec8e3" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <path d="M 540 204 Q 732 230 732 258" stroke="#7ec8e3" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- Built-in: DiskSpaceHealthIndicator -->
  <rect x="60" y="258" width="180" height="56" rx="6" fill="#1a2e1a" stroke="#4aaf6b" stroke-width="1.5"/>
  <text x="150" y="281" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">DiskSpace</text>
  <text x="150" y="299" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">디스크 여유 공간</text>

  <!-- Built-in: DataSourceHealthIndicator -->
  <rect x="258" y="258" width="180" height="56" rx="6" fill="#1a2e1a" stroke="#4aaf6b" stroke-width="1.5"/>
  <text x="348" y="281" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">DataSource</text>
  <text x="348" y="299" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">DB 연결 상태</text>

  <!-- Built-in: RedisHealthIndicator -->
  <rect x="355" y="258" width="170" height="56" rx="6" fill="#1a2e1a" stroke="#4aaf6b" stroke-width="1.5"/>
  <text x="440" y="281" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">Redis</text>
  <text x="440" y="299" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Redis PING</text>

  <!-- Custom: ExternalApiHealthIndicator -->
  <rect x="533" y="258" width="180" height="56" rx="6" fill="#0d1b33" stroke="#7ec8e3" stroke-width="2"/>
  <text x="623" y="277" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#7ec8e3">ExternalApi</text>
  <text x="623" y="294" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">커스텀 구현</text>
  <text x="623" y="308" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">외부 API 상태 확인</text>

  <!-- Custom: BusinessRuleHealthIndicator -->
  <rect x="722" y="258" width="118" height="56" rx="6" fill="#0d1b33" stroke="#7ec8e3" stroke-width="2"/>
  <text x="781" y="277" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="700" fill="#7ec8e3">BusinessRule</text>
  <text x="781" y="294" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">커스텀 구현</text>
  <text x="781" y="308" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">비즈니스 규칙 점검</text>

  <!-- Built-in label -->
  <text x="348" y="336" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">Spring Boot 내장 (Auto-configured)</text>

  <!-- Custom label -->
  <text x="702" y="336" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">개발자 직접 구현</text>

  <!-- Status aggregation: UP/DOWN -->
  <rect x="200" y="368" width="480" height="48" rx="8" fill="#1a1a0a" stroke="#7a7a00" stroke-width="1.5"/>
  <text x="440" y="390" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#c5c555">최종 Status 집계 규칙</text>
  <text x="440" y="408" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">하나라도 DOWN → 전체 DOWN | 하나라도 OUT_OF_SERVICE → OUT_OF_SERVICE</text>
</svg>
