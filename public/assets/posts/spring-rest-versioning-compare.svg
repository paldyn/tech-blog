<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">REST API 버전 관리 전략 비교</text>
  <text x="440" y="72" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">4가지 방법 — 각 방법의 장단점과 실무 권장 전략</text>

  <!-- Strategy 1: URI Path -->
  <rect x="60" y="94" width="370" height="86" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="122"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">① URI Path 버전</text>
  <text x="80" y="142"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">GET /api/v1/users</text>
  <text x="80" y="162"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">직관적 · 캐시 쉬움 · URL에 버전 노출</text>

  <!-- Strategy 2: Query Parameter -->
  <rect x="450" y="94" width="370" height="86" rx="8" fill="#1a2e0f" stroke="#7ec87e" stroke-width="1.5"/>
  <text x="470" y="122"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec87e">② Query Parameter 버전</text>
  <text x="470" y="142"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">GET /api/users?version=1</text>
  <text x="470" y="162"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">URI 깔끔 · 옵션 파라미터처럼 보임</text>

  <!-- Strategy 3: Custom Header -->
  <rect x="60" y="198" width="370" height="86" rx="8" fill="#2e1a0f" stroke="#c8a07e" stroke-width="1.5"/>
  <text x="80" y="226"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#c8a07e">③ Custom Header 버전</text>
  <text x="80" y="246"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">X-API-Version: 2</text>
  <text x="80" y="266"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">URI 깔끔 · 브라우저 직접 접근 어려움</text>

  <!-- Strategy 4: Content-Type -->
  <rect x="450" y="198" width="370" height="86" rx="8" fill="#2e0f2e" stroke="#c87ec8" stroke-width="1.5"/>
  <text x="470" y="226"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#c87ec8">④ Accept Header 버전</text>
  <text x="470" y="246"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">Accept: application/vnd.api.v2+json</text>
  <text x="470" y="266"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">REST 표준에 가까움 · 구현 복잡</text>

  <!-- Comparison table -->
  <line x1="60" y1="306" x2="820" y2="306" stroke="#222" stroke-width="1"/>
  <text x="440" y="328" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">전략별 비교</text>

  <!-- Table header -->
  <rect x="60" y="338" width="760" height="28" rx="4" fill="#111827"/>
  <text x="100" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">전략</text>
  <text x="250" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">캐시</text>
  <text x="350" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">직관성</text>
  <text x="460" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">REST 순수성</text>
  <text x="610" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">실무 사용 빈도</text>

  <!-- Row 1 -->
  <rect x="60" y="368" width="760" height="24" rx="0" fill="#0c1520"/>
  <text x="100" y="385" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">URI Path</text>
  <text x="250" y="385" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">★★★</text>
  <text x="350" y="385" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">★★★</text>
  <text x="460" y="385" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e08844">★★☆</text>
  <text x="610" y="385" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">매우 높음 — 실무 표준</text>

  <!-- Row 2 -->
  <text x="100" y="409" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec87e">Query Param</text>
  <text x="250" y="409" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e08844">★★☆</text>
  <text x="350" y="409" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e08844">★★☆</text>
  <text x="460" y="409" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e08844">★★☆</text>
  <text x="610" y="409" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">보통 — 내부 API</text>

  <!-- Row 3 -->
  <rect x="60" y="418" width="760" height="24" rx="0" fill="#0c1520"/>
  <text x="100" y="435" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#c8a07e">Custom Header</text>
  <text x="250" y="435" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">★☆☆</text>
  <text x="350" y="435" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e08844">★★☆</text>
  <text x="460" y="435" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e08844">★★☆</text>
  <text x="610" y="435" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">낮음 — 엔터프라이즈 내부</text>

  <!-- Row 4 -->
  <text x="100" y="459" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#c87ec8">Accept Header</text>
  <text x="250" y="459" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">★☆☆</text>
  <text x="350" y="459" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">★☆☆</text>
  <text x="460" y="459" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">★★★</text>
  <text x="610" y="459" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">낮음 — 이론적 권장</text>
</svg>
