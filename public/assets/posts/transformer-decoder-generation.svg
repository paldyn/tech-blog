<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">자기 회귀 생성 흐름 — 번역 예시</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">"I love AI" → "나는 AI를 사랑한다"</text>

  <!-- Encoder side -->
  <rect x="50" y="96" width="200" height="280" fill="#0d1117" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Encoder</text>
  <text x="150" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">입력: "I love AI"</text>
  <rect x="66" y="152" width="168" height="28" fill="#111827" rx="4"/>
  <text x="150" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" text-anchor="middle">["I", "love", "AI"]</text>
  <text x="150" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">↓  N layers</text>
  <rect x="66" y="225" width="168" height="100" fill="#111827" rx="4"/>
  <text x="150" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">문맥 표현 (K, V)</text>
  <text x="150" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">h_I   = [...]</text>
  <text x="150" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">h_love= [...]</text>
  <text x="150" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">h_AI  = [...]</text>
  <text x="150" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">고정 (디코딩 내내)</text>

  <!-- Arrow encoder to decoder -->
  <line x1="250" y1="236" x2="288" y2="236" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="288,230 302,236 288,242" fill="#7ec8e3"/>
  <text x="270" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3" text-anchor="middle">K, V</text>

  <!-- Decoder side -->
  <rect x="302" y="96" width="528" height="280" fill="#0d1117" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="566" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">Decoder — 자기 회귀 생성 (추론)</text>

  <!-- Step headers -->
  <text x="318" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#888">Step</text>
  <text x="366" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#888">디코더 입력</text>
  <text x="550" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#888">→ 생성 토큰</text>
  <text x="680" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#888">크로스 어텐션 가중치</text>

  <!-- Steps -->
  <rect x="310" y="152" width="510" height="30" fill="#111827" rx="4"/>
  <text x="318" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">1</text>
  <text x="366" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">&lt;BOS&gt;</text>
  <text x="550" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">"나는"</text>
  <text x="680" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">주로 "I"에 집중</text>

  <rect x="310" y="188" width="510" height="30" fill="#0d1117" rx="4"/>
  <text x="318" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">2</text>
  <text x="366" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">&lt;BOS&gt; "나는"</text>
  <text x="550" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">"AI를"</text>
  <text x="680" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">"AI"에 집중</text>

  <rect x="310" y="224" width="510" height="30" fill="#111827" rx="4"/>
  <text x="318" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">3</text>
  <text x="366" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">&lt;BOS&gt; "나는" "AI를"</text>
  <text x="550" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">"사랑한다"</text>
  <text x="680" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">"love"에 집중</text>

  <rect x="310" y="260" width="510" height="30" fill="#0d1117" rx="4"/>
  <text x="318" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">4</text>
  <text x="366" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">&lt;BOS&gt; ··· "사랑한다"</text>
  <text x="550" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">&lt;EOS&gt; → 종료</text>
  <text x="680" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">전체 분산</text>

  <!-- Note -->
  <rect x="310" y="302" width="510" height="60" fill="#111827" rx="4"/>
  <text x="318" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">Teacher Forcing (학습)</text>
  <text x="318" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">정답 전체를 시프트하여 입력 → Masked MHA로 미래 차단 → 병렬 학습</text>
  <text x="318" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">추론 시 자기 회귀 (이전 출력이 다음 입력) → KV Cache로 속도 최적화</text>

  <!-- Code block bottom -->
  <rect x="50" y="390" width="780" height="20" fill="#070b14" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="66" y="404" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 핵심: 학습=Teacher Forcing(병렬),  추론=자기회귀(순차)  —  KV Cache가 추론 속도를 대폭 향상</text>
</svg>
