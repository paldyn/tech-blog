<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="alnk" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="ahsh2" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">LinkedHashMap — HashMap + 삽입/접근 순서 연결 리스트</text>

  <!-- Mode labels -->
  <text x="220" y="80" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">삽입 순서 모드 (기본)</text>
  <text x="660" y="80" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178">접근 순서 모드 (LRU)</text>

  <!-- Insertion order: put "a", "b", "c" -->
  <text x="220" y="100" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">put("a",1) → put("b",2) → put("c",3)</text>

  <!-- Nodes in insertion order -->
  <rect x="80" y="116" width="90" height="52" rx="6" fill="#0d1b2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="125" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">1st</text>
  <text x="125" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">a=1</text>
  <text x="125" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">head</text>

  <rect x="215" y="116" width="90" height="52" rx="6" fill="#0d1b2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="260" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">2nd</text>
  <text x="260" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">b=2</text>

  <rect x="350" y="116" width="90" height="52" rx="6" fill="#0d1b2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="395" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">3rd</text>
  <text x="395" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">c=3</text>
  <text x="395" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">tail</text>

  <!-- Arrows in insertion order -->
  <line x1="170" y1="142" x2="211" y2="142" stroke="#55c555" stroke-width="2" marker-end="url(#alnk)"/>
  <line x1="305" y1="142" x2="346" y2="142" stroke="#55c555" stroke-width="2" marker-end="url(#alnk)"/>

  <!-- Iteration result -->
  <rect x="60" y="185" width="380" height="40" rx="4" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="250" y="209" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">순회: a=1 → b=2 → c=3 (삽입 순서)</text>

  <!-- Access order: access "b", then "a" -->
  <text x="660" y="100" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">get("b") 호출 후 → b가 tail로 이동</text>

  <!-- Access order nodes -->
  <rect x="510" y="116" width="90" height="52" rx="6" fill="#1a0a0f" stroke="#ce9178" stroke-width="1.5"/>
  <text x="555" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">least recent</text>
  <text x="555" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#ce9178">a=1</text>
  <text x="555" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">head (LRU)</text>

  <rect x="645" y="116" width="90" height="52" rx="6" fill="#1a0a0f" stroke="#ce9178" stroke-width="1.5"/>
  <text x="690" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">mid</text>
  <text x="690" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#ce9178">c=3</text>

  <rect x="780" y="116" width="90" height="52" rx="6" fill="#1a0f0f" stroke="#e05555" stroke-width="2"/>
  <text x="825" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">most recent</text>
  <text x="825" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">b=2</text>
  <text x="825" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">tail (MRU)</text>

  <line x1="600" y1="142" x2="641" y2="142" stroke="#ce9178" stroke-width="2" marker-end="url(#alnk)"/>
  <line x1="735" y1="142" x2="776" y2="142" stroke="#ce9178" stroke-width="2" marker-end="url(#alnk)"/>

  <!-- Access order iteration -->
  <rect x="490" y="185" width="380" height="40" rx="4" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="680" y="209" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">순회: a=1 → c=3 → b=2 (접근 순서, LRU eviction용)</text>

  <!-- LRU cache info box -->
  <rect x="60" y="246" width="760" height="132" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="268" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// LRU 캐시 구현 — 접근 순서 + removeEldestEntry 오버라이드</text>
  <text x="76" y="286" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">int</text>
  <text x="107" y="286" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> capacity = </text>
  <text x="203" y="286" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8">100</text>
  <text x="229" y="286" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">;</text>
  <text x="76" y="304" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">Map</text>
  <text x="107" y="304" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">&lt;String, String&gt; lru = </text>
  <text x="279.2" y="304" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">new</text>
  <text x="302.7" y="304" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> LinkedHashMap&lt;&gt;(</text>
  <text x="435.7" y="304" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8">16</text>
  <text x="451.4" y="304" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">, </text>
  <text x="460" y="304" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8">0.75f</text>
  <text x="499.1" y="304" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">, </text>
  <text x="508" y="304" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">true</text>
  <text x="539.3" y="304" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">) {</text>
  <text x="76" y="322" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    </text>
  <text x="94" y="322" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">@Override</text>
  <text x="76" y="340" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    protected boolean</text>
  <text x="240.4" y="340" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> removeEldestEntry(Map.Entry&lt;?,?&gt; e) {</text>
  <text x="76" y="358" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">        return</text>
  <text x="185.6" y="358" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> size() &gt; capacity; } };</text>
</svg>
