<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">공급망 공격은 어디서 시작되는가</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">오염된 패키지가 레지스트리를 거쳐 프로덕션까지 전파되는 경로</text>

  <!-- Attack vectors left column -->
  <rect x="40" y="100" width="240" height="70" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="160" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">타이포스쿼팅</text>
  <text x="160" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">lodash → lodahs 오타 노림</text>
  <text x="160" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">Typosquatting</text>

  <rect x="40" y="190" width="240" height="70" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="160" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">메인테이너 계정 탈취</text>
  <text x="160" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">정상 패키지에 악성 버전 게시</text>
  <text x="160" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">event-stream · ua-parser-js</text>

  <rect x="40" y="280" width="240" height="70" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="160" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">의존성 혼동</text>
  <text x="160" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">내부 패키지명을 공개 저장소에 선점</text>
  <text x="160" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">Dependency Confusion</text>

  <!-- Arrows left to center -->
  <line x1="280" y1="135" x2="318" y2="200" stroke="#e05555" stroke-width="2"
        stroke-dasharray="4,4" marker-end="url(#arr-red)"/>
  <line x1="280" y1="225" x2="318" y2="225" stroke="#e05555" stroke-width="2"
        stroke-dasharray="4,4" marker-end="url(#arr-red)"/>
  <line x1="280" y1="315" x2="318" y2="250" stroke="#e05555" stroke-width="2"
        stroke-dasharray="4,4" marker-end="url(#arr-red)"/>

  <!-- Center: registry -->
  <rect x="320" y="168" width="240" height="114" rx="10" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">패키지 레지스트리</text>
  <text x="440" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">npm · PyPI · Maven Central</text>
  <text x="440" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">오염된 버전이 정상처럼 배포</text>
  <text x="440" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">주간 수십억 건 다운로드</text>

  <!-- Arrows center to right -->
  <line x1="560" y1="200" x2="598" y2="135" stroke="#e05555" stroke-width="2"
        marker-end="url(#arr-red)"/>
  <line x1="560" y1="225" x2="598" y2="225" stroke="#e05555" stroke-width="2"
        marker-end="url(#arr-red)"/>
  <line x1="560" y1="250" x2="598" y2="315" stroke="#e05555" stroke-width="2"
        marker-end="url(#arr-red)"/>

  <!-- Propagation right column -->
  <rect x="600" y="100" width="240" height="70" rx="8" fill="#15152a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="720" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">개발자 로컬 환경</text>
  <text x="720" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">npm install 시 postinstall 실행</text>
  <text x="720" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">토큰 · SSH 키 탈취</text>

  <rect x="600" y="190" width="240" height="70" rx="8" fill="#15152a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="720" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">CI/CD 빌드</text>
  <text x="720" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">시크릿 · 배포 자격증명 노출</text>
  <text x="720" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">빌드 산출물 변조</text>

  <rect x="600" y="280" width="240" height="70" rx="8" fill="#15152a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="720" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">프로덕션 서비스</text>
  <text x="720" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">백도어 · 데이터 유출 코드 동작</text>
  <text x="720" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">사용자에게 직접 피해</text>

  <text x="440" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">패키지 하나의 오염이 의존성 그래프를 타고 수천 개 프로젝트로 전파된다</text>
</svg>
