<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">ESM vs CommonJS · 핵심 차이</text>

  <!-- Column headers -->
  <rect x="60" y="62" width="374" height="40" rx="8" fill="#0a1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="247" y="87" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#7ec8e3">ESM (ES Modules)</text>

  <rect x="446" y="62" width="374" height="40" rx="8" fill="#100a20" stroke="#7777cc" stroke-width="1.5"/>
  <text x="633" y="87" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#7777cc">CommonJS</text>

  <!-- Row: 파일 확장자 -->
  <text x="247" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">파일 확장자</text>
  <text x="633" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">파일 확장자</text>
  <text x="247" y="142" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">.mjs 또는 package.json "type":"module"</text>
  <text x="633" y="142" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">.cjs 또는 기본 .js</text>
  <line x1="60" y1="152" x2="820" y2="152" stroke="#1e2433" stroke-width="1"/>

  <!-- Row: 가져오기 -->
  <text x="247" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">가져오기 문법</text>
  <text x="633" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">가져오기 문법</text>
  <text x="247" y="190" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">import { fn } from './mod.js'</text>
  <text x="633" y="190" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">const { fn } = require('./mod')</text>
  <line x1="60" y1="200" x2="820" y2="200" stroke="#1e2433" stroke-width="1"/>

  <!-- Row: 내보내기 -->
  <text x="247" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">내보내기 문법</text>
  <text x="633" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">내보내기 문법</text>
  <text x="247" y="238" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">export function fn() {}</text>
  <text x="633" y="238" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">module.exports = { fn }</text>
  <line x1="60" y1="248" x2="820" y2="248" stroke="#1e2433" stroke-width="1"/>

  <!-- Row: 로딩 방식 -->
  <text x="247" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">로딩 방식</text>
  <text x="633" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">로딩 방식</text>
  <text x="247" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">비동기, 정적 분석 가능</text>
  <text x="633" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">동기, 런타임 동적 평가</text>
  <line x1="60" y1="296" x2="820" y2="296" stroke="#1e2433" stroke-width="1"/>

  <!-- Row: this / __dirname -->
  <text x="247" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">최상위 this</text>
  <text x="633" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">최상위 this</text>
  <text x="247" y="334" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">undefined</text>
  <text x="633" y="334" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">module.exports (== {})</text>
  <line x1="60" y1="344" x2="820" y2="344" stroke="#1e2433" stroke-width="1"/>

  <!-- Row: __dirname -->
  <text x="247" y="364" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">__dirname / __filename</text>
  <text x="633" y="364" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">__dirname / __filename</text>
  <text x="247" y="382" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">없음 → import.meta.url 사용</text>
  <text x="633" y="382" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">자동 제공</text>
  <line x1="60" y1="392" x2="820" y2="392" stroke="#1e2433" stroke-width="1"/>

  <!-- Row: 동적 임포트 -->
  <text x="247" y="412" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">동적 임포트</text>
  <text x="633" y="412" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">동적 임포트</text>
  <text x="247" y="428" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">import() (표준)</text>
  <text x="633" y="428" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">require() (동기)</text>
</svg>
