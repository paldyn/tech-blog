<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a;border-radius:12px;">
  <defs>
    <marker id="arrGreen" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arrBlue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">낙관적 업데이트 사이클</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">UI를 먼저 바꾸고, 실패하면 스냅샷으로 되돌린다</text>

  <!-- onMutate -->
  <rect x="290" y="100" width="300" height="88" rx="8" fill="#1a1a00" stroke="#e8c800" stroke-width="2"/>
  <text x="440" y="122" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#e8c800">onMutate</text>
  <text x="440" y="140" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ffffff">1. cancelQueries — 충돌 방지</text>
  <text x="440" y="158" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ffffff">2. 이전 데이터 스냅샷 저장</text>
  <text x="440" y="176" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ffffff">3. setQueryData로 즉시 반영</text>

  <!-- Branch arrows -->
  <line x1="350" y1="188" x2="230" y2="250" stroke="#e05555" stroke-width="2" marker-end="url(#arrRed)"/>
  <text x="240" y="208" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">요청 실패</text>
  <line x1="530" y1="188" x2="650" y2="250" stroke="#55c555" stroke-width="2" marker-end="url(#arrGreen)"/>
  <text x="640" y="208" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">요청 성공</text>

  <!-- Error box -->
  <rect x="70" y="250" width="320" height="70" rx="8" fill="#200d0d" stroke="#e05555" stroke-width="2"/>
  <text x="230" y="272" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#e05555">onError</text>
  <text x="230" y="290" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff">setQueryData(key, context.previous)</text>
  <text x="230" y="308" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">스냅샷으로 롤백</text>

  <!-- Success box -->
  <rect x="490" y="250" width="320" height="70" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="2"/>
  <text x="650" y="272" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">성공</text>
  <text x="650" y="290" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ffffff">낙관적으로 그린 UI가 그대로 확정</text>
  <text x="650" y="308" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">사용자는 지연을 느끼지 못함</text>

  <!-- onSettled -->
  <line x1="230" y1="320" x2="350" y2="380" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrBlue)"/>
  <line x1="650" y1="320" x2="530" y2="380" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrBlue)"/>

  <rect x="290" y="380" width="300" height="60" rx="8" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="404" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">onSettled</text>
  <text x="440" y="424" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">invalidateQueries로 서버와 최종 동기화</text>
</svg>
