<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" height="360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">볼륨 사용 체크리스트</text>

  <!-- Checklist items -->
  <rect x="60" y="64" width="760" height="260" fill="#111318" rx="10" stroke="#3a4a6e" stroke-width="1"/>

  <text x="88" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" fill="#55c555">✓</text>
  <text x="120" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8e8e8">DB 이미지는 반드시 Named Volume을 명시한다</text>
  <text x="120" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-v pgdata:/var/lib/postgresql/data</text>

  <line x1="80" y1="124" x2="820" y2="124" stroke="#3a4a6e" stroke-width="1"/>

  <text x="88" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" fill="#55c555">✓</text>
  <text x="120" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8e8e8">고아 볼륨을 주기적으로 정리한다</text>
  <text x="120" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">docker volume prune  또는  docker system prune --volumes</text>

  <line x1="80" y1="176" x2="820" y2="176" stroke="#3a4a6e" stroke-width="1"/>

  <text x="88" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" fill="#55c555">✓</text>
  <text x="120" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8e8e8">볼륨 이름에 프로젝트 접두사를 붙인다</text>
  <text x="120" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">myapp_pgdata  (Compose가 자동으로 프로젝트명 접두사 추가)</text>

  <line x1="80" y1="228" x2="820" y2="228" stroke="#3a4a6e" stroke-width="1"/>

  <text x="88" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" fill="#55c555">✓</text>
  <text x="120" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8e8e8">DB 백업은 논리 백업(dump)으로 수행한다</text>
  <text x="120" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">pg_dump / mysqldump  — 파일 레벨 tar 금지 (DB 실행 중)</text>

  <line x1="80" y1="280" x2="820" y2="280" stroke="#3a4a6e" stroke-width="1"/>

  <text x="88" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" fill="#55c555">✓</text>
  <text x="120" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8e8e8">볼륨 소유권과 컨테이너 UID를 일치시킨다</text>
  <text x="120" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">entrypoint chown  또는  --user $(id -u):$(id -g)</text>
</svg>
