<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arrInfo" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrSuccess" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="880" height="560" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">HTTP 인증 헤더 맵 — 401 vs 407</text>
  <text x="60" y="78" font-size="13" fill="#888">서버는 challenge를 보내고(401/407), 클라이언트는 credential로 응답한다</text>

  <!-- column headers -->
  <text x="60" y="116" font-size="16" font-weight="600" fill="#e8e8e8">서버 → 클라이언트 (challenge)</text>
  <text x="490" y="116" font-size="16" font-weight="600" fill="#e8e8e8">클라이언트 → 서버 (credential)</text>

  <!-- Origin row: 401 WWW-Authenticate -->
  <rect x="60" y="138" width="330" height="70" rx="8" fill="#111" stroke="#e05555" stroke-width="1.5"/>
  <text x="76" y="160" font-size="13" font-weight="600" fill="#e8e8e8">401 Unauthorized</text>
  <text x="76" y="178" font-size="11" fill="#888">WWW-Authenticate: Bearer realm=...</text>
  <text x="76" y="196" font-size="11" fill="#e05555">origin 서버가 인증 요구</text>

  <rect x="490" y="138" width="330" height="70" rx="8" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="506" y="160" font-size="13" font-weight="600" fill="#e8e8e8">Authorization</text>
  <text x="506" y="178" font-size="11" fill="#888">Authorization: Bearer eyJ...</text>
  <text x="506" y="196" font-size="11" fill="#55c555">origin용 credential</text>

  <line x1="390" y1="166" x2="490" y2="166" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrInfo)"/>
  <line x1="490" y1="190" x2="390" y2="190" stroke="#55c555" stroke-width="2" marker-end="url(#arrSuccess)"/>

  <!-- Proxy row: 407 Proxy-Authenticate -->
  <rect x="60" y="248" width="330" height="70" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="76" y="270" font-size="13" font-weight="600" fill="#e8e8e8">407 Proxy Authentication Required</text>
  <text x="76" y="288" font-size="11" fill="#888">Proxy-Authenticate: Basic realm=...</text>
  <text x="76" y="306" font-size="11" fill="#7777cc">중간 프록시가 인증 요구</text>

  <rect x="490" y="248" width="330" height="70" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="506" y="270" font-size="13" font-weight="600" fill="#e8e8e8">Proxy-Authorization</text>
  <text x="506" y="288" font-size="11" fill="#888">Proxy-Authorization: Basic dXNlcg==</text>
  <text x="506" y="306" font-size="11" fill="#7777cc">프록시용 credential (hop-by-hop)</text>

  <line x1="390" y1="276" x2="490" y2="276" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrInfo)"/>
  <line x1="490" y1="300" x2="390" y2="300" stroke="#55c555" stroke-width="2" marker-end="url(#arrSuccess)"/>

  <!-- Authentication-Info -->
  <rect x="60" y="358" width="330" height="70" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="76" y="380" font-size="13" font-weight="600" fill="#e8e8e8">Authentication-Info</text>
  <text x="76" y="398" font-size="11" fill="#888">2xx 응답에 동봉 (인증 성공 후)</text>
  <text x="76" y="416" font-size="11" fill="#7ec8e3">nextnonce 등 추가 인증 정보</text>

  <rect x="490" y="358" width="330" height="70" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="506" y="382" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># Digest 응답에서 주로 사용</text>
  <text x="506" y="402" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">Authentication-Info:</text>
  <text x="506" y="420" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve">  nextnonce="..."</text>

  <!-- legend -->
  <line x1="60" y1="466" x2="820" y2="466" stroke="#333" stroke-width="1"/>
  <text x="60" y="498" font-size="13" fill="#888" xml:space="preserve">구분 핵심</text>
  <text x="60" y="520" font-size="13" fill="#e05555" xml:space="preserve">401 = origin 서버 인증 (WWW-Authenticate / Authorization)</text>
  <text x="60" y="540" font-size="13" fill="#7777cc" xml:space="preserve">407 = 프록시 인증 (Proxy-Authenticate / Proxy-Authorization) — hop-by-hop, 다음 홉으로 전달 안 됨</text>
</svg>
