<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">with 문 활용 패턴</text>

  <!-- Left panel: multiple context managers -->
  <rect x="60" y="68" width="370" height="26" rx="4" fill="#1a2a4a"/>
  <text x="245" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">여러 컨텍스트 매니저</text>

  <rect x="60" y="96" width="370" height="300" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># Python 3.10+ 괄호 스타일 (권장)</text>
  <text xml:space="preserve" x="76" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">with</tspan> (</text>
  <text xml:space="preserve" x="76" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    <tspan font-weight="600" fill="#7ec8e3">open</tspan>(<tspan fill="#ce9178">"in.txt"</tspan>, <tspan fill="#ce9178">"r"</tspan>,</text>
  <text xml:space="preserve" x="76" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">         encoding=<tspan fill="#ce9178">"utf-8"</tspan>) as fin,</text>
  <text xml:space="preserve" x="76" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    <tspan font-weight="600" fill="#7ec8e3">open</tspan>(<tspan fill="#ce9178">"out.txt"</tspan>, <tspan fill="#ce9178">"w"</tspan>,</text>
  <text xml:space="preserve" x="76" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">         encoding=<tspan fill="#ce9178">"utf-8"</tspan>) as fout</text>
  <text xml:space="preserve" x="76" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">):</text>
  <text xml:space="preserve" x="76" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    <tspan font-weight="600" fill="#7ec8e3">for</tspan> line in fin:</text>
  <text xml:space="preserve" x="76" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        fout.write(line.upper())</text>
  <text xml:space="preserve" x="76" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 구버전 방식 (콤마 구분)</text>
  <text xml:space="preserve" x="76" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">with</tspan> <tspan font-weight="600" fill="#7ec8e3">open</tspan>(<tspan fill="#ce9178">"a"</tspan>) as a, <tspan font-weight="600" fill="#7ec8e3">open</tspan>(<tspan fill="#ce9178">"b"</tspan>) as b:</text>
  <text xml:space="preserve" x="76" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    ...</text>

  <!-- Right panel: custom context manager -->
  <rect x="450" y="68" width="370" height="26" rx="4" fill="#2a1a4a"/>
  <text x="635" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">커스텀 컨텍스트 매니저</text>

  <rect x="450" y="96" width="370" height="300" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="466" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">from</tspan> contextlib <tspan font-weight="600" fill="#7ec8e3">import</tspan> contextmanager</text>
  <text xml:space="preserve" x="466" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">@contextmanager</text>
  <text xml:space="preserve" x="466" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">def</tspan> <tspan fill="#55c555">temp_dir</tspan>(prefix=<tspan fill="#ce9178">"tmp"</tspan>):</text>
  <text xml:space="preserve" x="466" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    path = Path(mkdtemp(prefix=prefix))</text>
  <text xml:space="preserve" x="466" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    <tspan font-weight="600" fill="#7ec8e3">try</tspan>:</text>
  <text xml:space="preserve" x="466" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        <tspan font-weight="600" fill="#7ec8e3">yield</tspan> path  <tspan fill="#9aa4b8"># ← with 블록</tspan></text>
  <text xml:space="preserve" x="466" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    <tspan font-weight="600" fill="#7ec8e3">finally</tspan>:</text>
  <text xml:space="preserve" x="466" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        shutil.rmtree(path)</text>
  <text xml:space="preserve" x="466" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 사용</text>
  <text xml:space="preserve" x="466" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">with</tspan> temp_dir() as d:</text>
  <text xml:space="preserve" x="466" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    (d / <tspan fill="#ce9178">"work.txt"</tspan>).write_text(<tspan fill="#ce9178">"…"</tspan>)</text>
  <text xml:space="preserve" x="466" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">    # 블록 후 자동 삭제</text>

  <!-- Bottom note -->
  <rect x="60" y="410" width="760" height="22" rx="4" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">with 문 = __enter__ + 블록 실행 + __exit__ (예외 발생 여부와 무관하게 보장)</text>
</svg>
