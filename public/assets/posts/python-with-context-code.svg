<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430">
  <rect width="880" height="430" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">컨텍스트 매니저 두 가지 구현</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">클래스의 __enter__·__exit__ 와 @contextmanager 의 yield</text>

  <!-- LEFT: class style -->
  <rect x="60" y="100" width="360" height="230" rx="10" fill="#14101a" stroke="#7777cc" stroke-width="1"/>
  <text x="80" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc">클래스 방식</text>

  <rect x="76" y="144" width="328" height="176" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">class</tspan><tspan fill="#ffffff"> Timer:</tspan></text>
  <text x="92" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">def</tspan><tspan fill="#ffffff"> __enter__(self):</tspan></text>
  <text x="92" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">        self.t = time()</tspan></text>
  <text x="92" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">        </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> self</tspan></text>
  <text x="92" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">def</tspan><tspan fill="#ffffff"> __exit__(self, *a):</tspan></text>
  <text x="92" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">        log(time() - self.t)</tspan></text>

  <!-- RIGHT: @contextmanager -->
  <rect x="460" y="100" width="360" height="230" rx="10" fill="#0d1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="480" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">@contextmanager 방식</text>

  <rect x="476" y="144" width="328" height="176" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">@contextmanager</tspan></text>
  <text x="492" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">def</tspan><tspan fill="#ffffff"> timer():</tspan></text>
  <text x="492" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    t = time()</tspan><tspan fill="#9aa4b8">      # 진입</tspan></text>
  <text x="492" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">yield</tspan><tspan fill="#9aa4b8">           # 본문에 양보</tspan></text>
  <text x="492" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    log(time() - t)</tspan><tspan fill="#9aa4b8"> # 종료</tspan></text>

  <!-- Mapping chips -->
  <rect x="60" y="350" width="240" height="58" rx="8" fill="#0d1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="180" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">yield 이전 코드</text>
  <text x="180" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">≡  __enter__</text>

  <rect x="320" y="350" width="240" height="58" rx="8" fill="#0d141a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">yield 의 값</text>
  <text x="440" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">≡  with … as 변수</text>

  <rect x="580" y="350" width="240" height="58" rx="8" fill="#1a100d" stroke="#e05555" stroke-width="1"/>
  <text x="700" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">yield 이후 코드</text>
  <text x="700" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">≡  __exit__</text>
</svg>
