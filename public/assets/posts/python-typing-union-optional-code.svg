<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300">
  <rect width="880" height="300" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">좁히기(narrowing)로 None 다루기</text>

  <rect x="60" y="64" width="760" height="216" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text x="80" y="92" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">def</tspan><tspan fill="#ffffff"> length(s: </tspan><tspan fill="#7ec8e3" font-weight="600">str</tspan><tspan fill="#ffffff"> | </tspan><tspan fill="#7ec8e3" font-weight="600">None</tspan><tspan fill="#ffffff">) -&gt; </tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff">:</tspan></text>

  <text x="80" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    if</tspan><tspan fill="#ffffff"> s </tspan><tspan fill="#7ec8e3" font-weight="600">is None</tspan><tspan fill="#ffffff">:</tspan></text>

  <text x="80" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">        return</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#9aa4b8">          # 여기서 s 는 None</tspan></text>

  <text x="80" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">    # 이 줄부터 검사기는 s 를 str 로 좁힌다</tspan></text>

  <text x="80" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    return</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">len</tspan><tspan fill="#ffffff">(s)</tspan><tspan fill="#9aa4b8">        # str 메서드 안전</tspan></text>

  <text x="80" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">length(</tspan><tspan fill="#ce9178">"hello"</tspan><tspan fill="#ffffff">)</tspan><tspan fill="#9aa4b8">   # 5</tspan></text>

  <text x="80" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">length(</tspan><tspan fill="#7ec8e3" font-weight="600">None</tspan><tspan fill="#ffffff">)</tspan><tspan fill="#9aa4b8">      # 0</tspan></text>
</svg>
