<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">사용자 정의 타입 분류</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">DOMAIN · ENUM · COMPOSITE · RANGE</text>

  <!-- DOMAIN -->
  <rect x="60" y="100" width="370" height="170" rx="8" fill="#1a1a0d" stroke="#e8c84a" stroke-width="1.5"/>
  <text x="245" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8c84a" text-anchor="middle">DOMAIN — 제약 내장 기반 타입</text>
  <text x="80" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 기존 타입 + CHECK 제약 조합</text>
  <text x="80" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• NOT NULL 기본값 설정 가능</text>
  <text x="80" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 여러 테이블에서 재사용 가능</text>
  <text x="80" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• ALTER DOMAIN으로 제약 추가/변경</text>
  <text x="80" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">→ 이메일, 전화번호, 양수 금액 등</text>
  <text x="80" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8c84a">CREATE DOMAIN positive_int AS integer</text>
  <text x="80" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8c84a">  CHECK (VALUE > 0);</text>

  <!-- ENUM -->
  <rect x="450" y="100" width="370" height="170" rx="8" fill="#0d1a1f" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="635" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">ENUM — 열거형 레이블 타입</text>
  <text x="470" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 허용된 문자열 값만 저장</text>
  <text x="470" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 내부적으로 OID 정수로 저장</text>
  <text x="470" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 정렬 순서 = 정의 순서</text>
  <text x="470" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• ALTER TYPE ... ADD VALUE로 확장</text>
  <text x="470" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">→ 상태 코드, 카테고리, 색상 등</text>
  <text x="470" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">CREATE TYPE status AS ENUM</text>
  <text x="470" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">  ('pending','active','closed');</text>

  <!-- COMPOSITE -->
  <rect x="60" y="290" width="370" height="170" rx="8" fill="#1a0d1f" stroke="#c880e0" stroke-width="1.5"/>
  <text x="245" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#c880e0" text-anchor="middle">COMPOSITE — 복합 타입</text>
  <text x="80" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 여러 필드를 하나의 타입으로 묶음</text>
  <text x="80" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 함수 반환 타입으로 자주 활용</text>
  <text x="80" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 테이블 행 자체도 복합 타입</text>
  <text x="80" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">→ 주소, 좌표, 연락처 등</text>
  <text x="80" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c880e0">CREATE TYPE address AS (</text>
  <text x="80" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#c880e0">  street text, city text);</text>

  <!-- RANGE (custom) -->
  <rect x="450" y="290" width="370" height="170" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="635" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">RANGE — 사용자 정의 범위</text>
  <text x="470" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 기존 기본 타입 외 범위 생성</text>
  <text x="470" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• subtype_diff 함수로 크기 최적화</text>
  <text x="470" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 모든 범위 연산자 자동 상속</text>
  <text x="470" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">→ float8range, 도메인 범위 등</text>
  <text x="470" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">CREATE TYPE float8range AS RANGE</text>
  <text x="470" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">  (subtype = float8);</text>
</svg>
