<svg xmlns="http://www.w3.org/2000/svg" width="880" height="580" viewBox="0 0 880 580">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="580" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">모놀리스 vs 마이크로서비스 아키텍처</text>

  <!-- 모놀리스 -->
  <text x="185" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">모놀리스(Monolith)</text>

  <rect x="60" y="92" width="250" height="200" rx="10" fill="#0d0d1a" stroke="#7777cc" stroke-width="2"/>
  <text x="185" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">단일 배포 단위</text>

  <rect x="80" y="124" width="210" height="36" rx="5" fill="#13132a" stroke="#7777cc" stroke-width="1"/>
  <text x="185" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">사용자 도메인</text>

  <rect x="80" y="168" width="210" height="36" rx="5" fill="#13132a" stroke="#7777cc" stroke-width="1"/>
  <text x="185" y="191" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">주문 도메인</text>

  <rect x="80" y="212" width="210" height="36" rx="5" fill="#13132a" stroke="#7777cc" stroke-width="1"/>
  <text x="185" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">상품 도메인</text>

  <rect x="80" y="256" width="210" height="28" rx="5" fill="#1a1a30" stroke="#555" stroke-width="1"/>
  <text x="185" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">단일 DB</text>

  <!-- 모놀리스 단점 -->
  <rect x="60" y="308" width="250" height="52" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="185" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">배포: 전체 재시작 필요</text>
  <text x="185" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">스케일: 전체 스케일아웃만 가능</text>

  <!-- 구분선 -->
  <line x1="350" y1="72" x2="350" y2="380" stroke="#333" stroke-width="1"/>

  <!-- MSA -->
  <text x="615" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">마이크로서비스(MSA)</text>

  <!-- 사용자 서비스 -->
  <rect x="390" y="92" width="140" height="72" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="460" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">사용자 서비스</text>
  <text x="460" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">:8081</text>
  <rect x="405" y="146" width="110" height="12" rx="3" fill="#0a2a0a" stroke="#3a5a3a" stroke-width="1"/>
  <text x="460" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#888" text-anchor="middle">User DB</text>

  <!-- 주문 서비스 -->
  <rect x="550" y="92" width="140" height="72" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="620" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">주문 서비스</text>
  <text x="620" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">:8082</text>
  <rect x="565" y="146" width="110" height="12" rx="3" fill="#0a2a0a" stroke="#3a5a3a" stroke-width="1"/>
  <text x="620" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#888" text-anchor="middle">Order DB</text>

  <!-- 상품 서비스 -->
  <rect x="710" y="92" width="130" height="72" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="775" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">상품 서비스</text>
  <text x="775" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">:8083</text>
  <rect x="724" y="146" width="103" height="12" rx="3" fill="#0a2a0a" stroke="#3a5a3a" stroke-width="1"/>
  <text x="775" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#888" text-anchor="middle">Product DB</text>

  <!-- API Gateway -->
  <rect x="490" y="198" width="180" height="48" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="2"/>
  <text x="580" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">API Gateway</text>
  <text x="580" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">Spring Cloud Gateway</text>

  <!-- Gateway → Services (수직 화살표) -->
  <line x1="510" y1="198" x2="470" y2="166" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="580" y1="198" x2="620" y2="166" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="650" y1="198" x2="760" y2="166" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Service Registry -->
  <rect x="490" y="268" width="180" height="48" rx="8" fill="#0d1117" stroke="#ce9178" stroke-width="1.5"/>
  <text x="580" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">Service Registry</text>
  <text x="580" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">Eureka / Consul</text>

  <!-- 서비스들 → Registry 점선 -->
  <path d="M 460 164 Q 460 260 490 292" fill="none" stroke="#ce9178" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <path d="M 620 164 Q 620 260 580 268" fill="none" stroke="#ce9178" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <!-- MSA 장점 -->
  <rect x="390" y="336" width="450" height="52" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="615" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">독립 배포: 서비스별 개별 배포 가능</text>
  <text x="615" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">독립 스케일: 주문 서비스만 스케일아웃 가능</text>

  <!-- 비교 표 -->
  <rect x="60" y="408" width="760" height="140" rx="6" fill="#0d0d0d" stroke="#333" stroke-width="1"/>
  <text x="440" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">선택 기준</text>

  <!-- 표 헤더 -->
  <text x="140" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">기준</text>
  <text x="340" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">모놀리스</text>
  <text x="620" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">마이크로서비스</text>

  <line x1="80" y1="462" x2="800" y2="462" stroke="#222" stroke-width="1"/>

  <text x="140" y="480" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">팀 규모</text>
  <text x="340" y="480" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">소규모 (1~5명)</text>
  <text x="620" y="480" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">중대규모 (팀별 독립)</text>

  <text x="140" y="500" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">배포 빈도</text>
  <text x="340" y="500" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">낮음 (전체 배포)</text>
  <text x="620" y="500" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">높음 (서비스별 독립)</text>

  <text x="140" y="520" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">운영 복잡도</text>
  <text x="340" y="520" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">낮음</text>
  <text x="620" y="520" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">높음 (분산 트레이싱 등 필요)</text>
</svg>
