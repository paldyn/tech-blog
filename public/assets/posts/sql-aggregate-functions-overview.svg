<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">5대 집계 함수 — 동작과 NULL 처리</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">COUNT · SUM · AVG · MIN · MAX</text>

  <!-- Data set -->
  <rect x="60" y="90" width="180" height="232" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="150" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">sample data</text>
  <rect x="60" y="122" width="180" height="22" rx="4" fill="#0f1a2e"/>
  <text x="150" y="137" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">amount</text>
  <line x1="60" y1="144" x2="240" y2="144" stroke="#1e2433" stroke-width="1"/>
  <text x="150" y="162" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">1000</text>
  <line x1="60" y1="168" x2="240" y2="168" stroke="#1e2433" stroke-width="1"/>
  <text x="150" y="186" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">2000</text>
  <line x1="60" y1="192" x2="240" y2="192" stroke="#1e2433" stroke-width="1"/>
  <text x="150" y="210" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">NULL</text>
  <line x1="60" y1="216" x2="240" y2="216" stroke="#1e2433" stroke-width="1"/>
  <text x="150" y="234" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">3000</text>
  <line x1="60" y1="240" x2="240" y2="240" stroke="#1e2433" stroke-width="1"/>
  <text x="150" y="258" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">4000</text>
  <line x1="60" y1="264" x2="240" y2="264" stroke="#1e2433" stroke-width="1"/>
  <text x="150" y="282" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">NULL</text>
  <line x1="60" y1="288" x2="240" y2="288" stroke="#1e2433" stroke-width="1"/>
  <text x="150" y="302" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">5000</text>
  <text x="150" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">NULL 2개 포함</text>

  <!-- Functions grid -->
  <!-- COUNT(*) -->
  <rect x="260" y="90" width="280" height="100" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="400" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">COUNT</text>
  <rect x="272" y="124" width="256" height="54" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="288" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">COUNT(*)       = </text>
  <text x="480" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">7</text>
  <text x="288" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">COUNT(amount)  = </text>
  <text x="480" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">5</text>
  <text x="288" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- NULL 포함 전체 / NULL 제외</text>

  <!-- SUM -->
  <rect x="560" y="90" width="260" height="100" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="690" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">SUM</text>
  <rect x="572" y="124" width="236" height="54" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="588" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">SUM(amount) = </text>
  <text x="728" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">15000</text>
  <text x="588" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- NULL 무시</text>
  <text x="588" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- 모두 NULL이면 NULL 반환</text>

  <!-- AVG -->
  <rect x="260" y="208" width="280" height="100" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="400" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">AVG</text>
  <rect x="272" y="242" width="256" height="54" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="288" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc" xml:space="preserve">AVG(amount) = </text>
  <text x="456" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">3000</text>
  <text x="288" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- 15000 / 5 (NULL 제외)</text>
  <text x="288" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- 7로 나누지 않음!</text>

  <!-- MIN / MAX -->
  <rect x="560" y="208" width="260" height="100" rx="8" fill="#111827" stroke="#e8c87a" stroke-width="1.5"/>
  <text x="690" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8c87a">MIN / MAX</text>
  <rect x="572" y="242" width="236" height="54" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="588" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8c87a" xml:space="preserve">MIN(amount) = </text>
  <text x="730" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">1000</text>
  <text x="588" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8c87a" xml:space="preserve">MAX(amount) = </text>
  <text x="730" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">5000</text>
  <text x="588" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- NULL 무시, 문자열도 가능</text>

  <!-- NULL rule highlight -->
  <rect x="60" y="360" width="760" height="100" rx="8" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="384" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">집계 함수와 NULL 규칙</text>
  <text x="440" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">COUNT(*) 제외 모든 집계 함수는 NULL을 무시하고 계산</text>
  <text x="440" y="428" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">AVG의 분모는 NULL 제외 행 수 — NULL을 0으로 취급하지 않음에 주의</text>
  <text x="440" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">0을 포함하려면 COALESCE(amount, 0)으로 NULL → 0 변환 후 집계</text>

  <!-- Footer -->
  <text x="440" y="484" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · SQL 완전 정복</text>
</svg>
