<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">트리 쉐이킹 — 죽은 코드 제거</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">사용하는 것만 번들에 포함 — Dead Code Elimination</text>

  <!-- Left: Before tree shaking -->
  <text x="230" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">번들 전 — 전체 모듈</text>
  <rect x="60" y="106" width="340" height="200" rx="8" fill="#1a0808" stroke="#5c1a1a" stroke-width="1.5"/>

  <!-- utils.mjs functions -->
  <rect x="78" y="118" width="306" height="36" rx="4" fill="#2a0f0f"/>
  <text x="234" y="141" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">export function add(a, b) {...}</text>

  <rect x="78" y="162" width="306" height="36" rx="4" fill="#2a0f0f"/>
  <text x="234" y="185" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">export function subtract(a, b) {...}</text>

  <rect x="78" y="206" width="306" height="36" rx="4" fill="#2a0f0f"/>
  <text x="234" y="229" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">export function multiply(a, b) {...}</text>

  <rect x="78" y="250" width="306" height="36" rx="4" fill="#2a0f0f"/>
  <text x="234" y="273" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">export function divide(a, b) {...}</text>

  <text x="230" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8c842">utils.mjs — 4개 함수 정의</text>
  <text x="230" y="346" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">main.mjs: import { add } from './utils'</text>
  <text x="230" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">add만 사용, 나머지 3개는 미사용</text>

  <!-- Arrow -->
  <polygon points="466,232 450,222 450,242" fill="#7777cc"/>
  <text x="472" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">번들러</text>
  <text x="472" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">분석</text>

  <!-- Right: After tree shaking -->
  <text x="650" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">번들 후 — 사용한 것만</text>
  <rect x="480" y="106" width="340" height="200" rx="8" fill="#0a1a0a" stroke="#1a5c1a" stroke-width="1.5"/>

  <!-- Only add survives -->
  <rect x="498" y="118" width="306" height="36" rx="4" fill="#0d2a0d"/>
  <text x="651" y="141" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">function add(a, b) {...}</text>

  <!-- Removed ones shown as crossed out -->
  <rect x="498" y="162" width="306" height="36" rx="4" fill="#111"/>
  <text x="651" y="185" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#333" xml:space="preserve">// subtract — 제거됨</text>
  <line x1="498" y1="180" x2="804" y2="180" stroke="#333" stroke-width="1"/>

  <rect x="498" y="206" width="306" height="36" rx="4" fill="#111"/>
  <text x="651" y="229" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#333" xml:space="preserve">// multiply — 제거됨</text>
  <line x1="498" y1="224" x2="804" y2="224" stroke="#333" stroke-width="1"/>

  <rect x="498" y="250" width="306" height="36" rx="4" fill="#111"/>
  <text x="651" y="273" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#333" xml:space="preserve">// divide — 제거됨</text>
  <line x1="498" y1="268" x2="804" y2="268" stroke="#333" stroke-width="1"/>

  <text x="650" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">번들 크기: 75% 감소</text>
  <text x="650" y="346" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">사용된 add만 최종 번들에 포함</text>
  <text x="650" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">ESM 정적 구조 덕분에 가능</text>

  <!-- Bottom: prerequisites -->
  <rect x="60" y="400" width="760" height="64" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="440" y="424" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">트리 쉐이킹 동작 조건</text>
  <text x="440" y="446" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">① ES 모듈 사용 (import/export)  ②  번들러 설정 (production mode)  ③  sideEffects: false 또는 명시</text>
  <text x="440" y="458" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6a8aa0">CommonJS(require)는 트리쉐이킹 불가 — 동적 로드라 정적 분석 어려움</text>

  <!-- Footer -->
  <text x="440" y="488" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN — JavaScript 완전 정복</text>
</svg>
