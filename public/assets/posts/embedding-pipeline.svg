<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <!-- Background -->
  <rect width="880" height="540" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="38"
        text-anchor="middle"
        fill="#e8e8e8"
        font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif"
        font-size="18" font-weight="600">임베딩 활용 파이프라인 — 유사 문서 검색</text>

  <!-- ──────────────────────────────────────────────
       STEP 1: 텍스트 입력  x=60 w=150
       ────────────────────────────────────────────── -->
  <rect x="60" y="68" width="152" height="400" rx="10"
        fill="#0d0d1a" stroke="#3b5bdb" stroke-width="1.2"/>

  <!-- Step badge -->
  <rect x="100" y="60" width="72" height="20" rx="10" fill="#3b5bdb"/>
  <text x="136" y="74" text-anchor="middle" fill="#fff" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="10" font-weight="700">STEP 1</text>

  <text x="136" y="102"
        text-anchor="middle"
        fill="#748ffc"
        font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif"
        font-size="12" font-weight="700">텍스트 입력</text>

  <!-- Input text blocks -->
  <rect x="76" y="114" width="120" height="46" rx="5" fill="#12121e" stroke="#2a2a4a" stroke-width="1"/>
  <text x="136" y="131" text-anchor="middle" fill="#aaa" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="10">쿼리:</text>
  <text x="136" y="148" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="11">"고양이 키우는 법"</text>

  <text x="136" y="186" text-anchor="middle" fill="#555" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="10">문서 DB:</text>

  <rect x="76" y="194" width="120" height="36" rx="4" fill="#0a100a" stroke="#1a2a1a" stroke-width="1"/>
  <text x="136" y="209" text-anchor="middle" fill="#38d9a9" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="9">doc_1: 고양이 사료</text>
  <text x="136" y="222" text-anchor="middle" fill="#38d9a9" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="9">선택 방법...</text>

  <rect x="76" y="236" width="120" height="36" rx="4" fill="#0a100a" stroke="#1a2a1a" stroke-width="1"/>
  <text x="136" y="251" text-anchor="middle" fill="#2db88f" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="9">doc_2: 강아지 훈련</text>
  <text x="136" y="264" text-anchor="middle" fill="#2db88f" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="9">기초 방법...</text>

  <rect x="76" y="278" width="120" height="36" rx="4" fill="#0a100a" stroke="#1a2a1a" stroke-width="1"/>
  <text x="136" y="293" text-anchor="middle" fill="#1a6a4a" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="9">doc_3: 주식 투자</text>
  <text x="136" y="306" text-anchor="middle" fill="#1a6a4a" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="9">전략 안내...</text>

  <rect x="76" y="320" width="120" height="36" rx="4" fill="#0a100a" stroke="#1a2a1a" stroke-width="1"/>
  <text x="136" y="335" text-anchor="middle" fill="#1a6a4a" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="9">doc_4: 파이썬 기초</text>
  <text x="136" y="348" text-anchor="middle" fill="#1a6a4a" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="9">문법 정리...</text>

  <!-- Code -->
  <rect x="72" y="370" width="132" height="82" rx="5"
        fill="#070b14" stroke="#1e2a3a" stroke-width="1"/>
  <rect x="72" y="370" width="132" height="18" rx="5" fill="#0d1622"/>
  <rect x="72" y="378" width="132" height="10" fill="#0d1622"/>
  <text x="82" y="383" fill="#3a4a5a" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="8">step1.py</text>
  <text x="80" y="400" fill="#c792ea" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9">query =</text>
  <text x="80" y="414" fill="#c3e88d" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9">  "고양이 키우는 법"</text>
  <text x="80" y="428" fill="#c792ea" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9">docs =</text>
  <text x="80" y="442" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9">  [doc1, doc2, ...]</text>

  <!-- Arrow 1→2 -->
  <line x1="218" y1="268" x2="248" y2="268" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ──────────────────────────────────────────────
       STEP 2: 임베딩 모델  x=253 w=150
       ────────────────────────────────────────────── -->
  <rect x="253" y="68" width="152" height="400" rx="10"
        fill="#07180f" stroke="#0ca678" stroke-width="1.2"/>

  <rect x="293" y="60" width="72" height="20" rx="10" fill="#0ca678"/>
  <text x="329" y="74" text-anchor="middle" fill="#fff" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="10" font-weight="700">STEP 2</text>

  <text x="329" y="102"
        text-anchor="middle"
        fill="#38d9a9"
        font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif"
        font-size="12" font-weight="700">임베딩 모델</text>

  <text x="329" y="128" text-anchor="middle" fill="#555" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="10">모델 예시</text>

  <rect x="270" y="136" width="118" height="26" rx="5" fill="#0a2010" stroke="#0ca678" stroke-width="0.8"/>
  <text x="329" y="153" text-anchor="middle" fill="#38d9a9" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">text-embedding-3</text>

  <rect x="270" y="168" width="118" height="26" rx="5" fill="#0a2010" stroke="#0ca678" stroke-width="0.8"/>
  <text x="329" y="185" text-anchor="middle" fill="#38d9a9" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">bge-m3</text>

  <rect x="270" y="200" width="118" height="26" rx="5" fill="#0a2010" stroke="#0ca678" stroke-width="0.8"/>
  <text x="329" y="217" text-anchor="middle" fill="#38d9a9" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">ko-sroberta</text>

  <!-- Code block -->
  <rect x="265" y="242" width="128" height="212" rx="5"
        fill="#070b14" stroke="#1e2a3a" stroke-width="1"/>
  <rect x="265" y="242" width="128" height="18" rx="5" fill="#0d1622"/>
  <rect x="265" y="250" width="128" height="10" fill="#0d1622"/>
  <text x="275" y="255" fill="#3a4a5a" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="8">step2.py</text>

  <text x="273" y="276" fill="#c792ea" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9">from</text>
  <text x="302" y="276" fill="#82aaff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9">openai</text>
  <text x="273" y="290" fill="#c792ea" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9">import</text>
  <text x="310" y="290" fill="#82aaff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9">OpenAI</text>

  <text x="273" y="308" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9">client = OpenAI()</text>

  <text x="273" y="326" fill="#6a8f5a" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9"># 쿼리 임베딩</text>
  <text x="273" y="340" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9">q_vec =</text>
  <text x="273" y="354" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9">  client.embeddings</text>
  <text x="273" y="368" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9">  .create(</text>
  <text x="273" y="382" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9">    input=query,</text>
  <text x="273" y="396" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9">    model=</text>
  <text x="273" y="410" fill="#c3e88d" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9">   "text-emb-3"</text>
  <text x="273" y="424" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9">  ).data[0].embedding</text>
  <text x="273" y="440" fill="#6a8f5a" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9"># → 1536차원 벡터</text>

  <!-- Arrow 2→3 -->
  <line x1="411" y1="268" x2="441" y2="268" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ──────────────────────────────────────────────
       STEP 3: 코사인 유사도  x=446 w=150
       ────────────────────────────────────────────── -->
  <rect x="446" y="68" width="152" height="400" rx="10"
        fill="#190e00" stroke="#e67700" stroke-width="1.2"/>

  <rect x="486" y="60" width="72" height="20" rx="10" fill="#e67700"/>
  <text x="522" y="74" text-anchor="middle" fill="#fff" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="10" font-weight="700">STEP 3</text>

  <text x="522" y="102"
        text-anchor="middle"
        fill="#ffa94d"
        font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif"
        font-size="12" font-weight="700">유사도 계산</text>

  <text x="522" y="126" text-anchor="middle" fill="#555" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="10">코사인 유사도</text>

  <!-- Similarity formula -->
  <rect x="462" y="136" width="118" height="44" rx="5" fill="#120800" stroke="#7a3c00" stroke-width="1"/>
  <text x="521" y="156" text-anchor="middle" fill="#ffa94d" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">sim(A, B) =</text>
  <text x="521" y="172" text-anchor="middle" fill="#ffa94d" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">A·B / ‖A‖‖B‖</text>

  <text x="522" y="202" text-anchor="middle" fill="#555" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="10">결과 (0~1)</text>

  <!-- Score bars -->
  <text x="462" y="224" fill="#ffa94d" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="10">doc_1 (고양이)</text>
  <rect x="462" y="228" width="118" height="10" rx="3" fill="#111"/>
  <rect x="462" y="228" width="108" height="10" rx="3" fill="#e67700" opacity="0.8"/>
  <text x="578" y="238" fill="#ffa94d" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9">0.91</text>

  <text x="462" y="256" fill="#888" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="10">doc_2 (강아지)</text>
  <rect x="462" y="260" width="118" height="10" rx="3" fill="#111"/>
  <rect x="462" y="260" width="72" height="10" rx="3" fill="#7a4a00" opacity="0.8"/>
  <text x="542" y="270" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9">0.61</text>

  <text x="462" y="288" fill="#444" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="10">doc_3 (주식)</text>
  <rect x="462" y="292" width="118" height="10" rx="3" fill="#111"/>
  <rect x="462" y="292" width="20" height="10" rx="3" fill="#333" opacity="0.8"/>
  <text x="490" y="302" fill="#444" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9">0.17</text>

  <text x="462" y="320" fill="#444" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="10">doc_4 (파이썬)</text>
  <rect x="462" y="324" width="118" height="10" rx="3" fill="#111"/>
  <rect x="462" y="324" width="14" height="10" rx="3" fill="#333" opacity="0.8"/>
  <text x="484" y="334" fill="#444" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9">0.12</text>

  <!-- Code block -->
  <rect x="458" y="350" width="132" height="102" rx="5"
        fill="#070b14" stroke="#1e2a3a" stroke-width="1"/>
  <rect x="458" y="350" width="132" height="18" rx="5" fill="#0d1622"/>
  <rect x="458" y="358" width="132" height="10" fill="#0d1622"/>
  <text x="468" y="363" fill="#3a4a5a" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="8">step3.py</text>
  <text x="466" y="382" fill="#c792ea" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9">from</text>
  <text x="495" y="382" fill="#82aaff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9">sklearn.metrics</text>
  <text x="466" y="396" fill="#c792ea" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9">import</text>
  <text x="503" y="396" fill="#82aaff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9">pairwise</text>
  <text x="466" y="412" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9">scores =</text>
  <text x="466" y="426" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9">  pairwise.cosine_</text>
  <text x="466" y="440" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9">  similarity(q, docs)</text>

  <!-- Arrow 3→4 -->
  <line x1="604" y1="268" x2="634" y2="268" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ──────────────────────────────────────────────
       STEP 4: 검색 결과  x=639 w=181
       ────────────────────────────────────────────── -->
  <rect x="639" y="68" width="181" height="400" rx="10"
        fill="#140000" stroke="#e03131" stroke-width="1.2"/>

  <rect x="685" y="60" width="72" height="20" rx="10" fill="#e03131"/>
  <text x="721" y="74" text-anchor="middle" fill="#fff" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="10" font-weight="700">STEP 4</text>

  <text x="730" y="102"
        text-anchor="middle"
        fill="#ff6b6b"
        font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif"
        font-size="12" font-weight="700">검색 결과</text>

  <!-- Result 1 -->
  <rect x="655" y="116" width="149" height="56" rx="6" fill="#200000" stroke="#e03131" stroke-width="1.2"/>
  <text x="665" y="133" fill="#ff6b6b" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="10" font-weight="700">#1  doc_1  ★ 0.91</text>
  <text x="665" y="149" fill="#ccc" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="10">고양이 사료 선택 방법</text>
  <text x="665" y="163" fill="#888" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="9">→ 가장 유사한 문서</text>

  <!-- Result 2 -->
  <rect x="655" y="180" width="149" height="56" rx="6" fill="#120800" stroke="#7a3c00" stroke-width="0.8"/>
  <text x="665" y="197" fill="#ffa94d" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="10" font-weight="700">#2  doc_2  ★ 0.61</text>
  <text x="665" y="213" fill="#ccc" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="10">강아지 훈련 기초 방법</text>
  <text x="665" y="227" fill="#666" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="9">→ 동물 관련, 유사</text>

  <!-- Excluded -->
  <text x="665" y="258" fill="#333" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="10">doc_3, doc_4 제외</text>
  <text x="665" y="274" fill="#2a2a2a" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="9">유사도 낮음 (관련 없음)</text>

  <!-- Code result -->
  <rect x="651" y="292" width="157" height="162" rx="5"
        fill="#070b14" stroke="#1e2a3a" stroke-width="1"/>
  <rect x="651" y="292" width="157" height="18" rx="5" fill="#0d1622"/>
  <rect x="651" y="300" width="157" height="10" fill="#0d1622"/>
  <text x="661" y="305" fill="#3a4a5a" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="8">step4.py</text>
  <text x="659" y="324" fill="#6a8f5a" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9"># 상위 k개 반환</text>
  <text x="659" y="338" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9">k = 2</text>
  <text x="659" y="352" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9">top = sorted(</text>
  <text x="659" y="366" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9">    zip(scores, docs),</text>
  <text x="659" y="380" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9">    reverse=True</text>
  <text x="659" y="394" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9">)[:k]</text>
  <text x="659" y="412" fill="#6a8f5a" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9"># RAG의 핵심 단계</text>
  <text x="659" y="426" fill="#6a8f5a" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9"># top 문서를 LLM에 전달</text>
  <text x="659" y="440" fill="#6a8f5a" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9"># → 답변 생성</text>

  <!-- Arrow marker def -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#444"/>
    </marker>
  </defs>

  <!-- Footer -->
  <text x="440" y="524"
        text-anchor="middle"
        fill="#333"
        font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif"
        font-size="11">PALDYN · AI Basics Series #9 — 임베딩 기반 유사 문서 검색 파이프라인</text>
</svg>
