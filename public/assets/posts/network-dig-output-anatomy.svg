<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">dig 출력 구조 완전 해부</text>

  <!-- Command -->
  <rect x="50" y="64" width="780" height="36" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="70" y="87" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">$ <tspan fill="#7ec8e3" font-weight="600">dig</tspan> example.com A +stats</text>

  <!-- Section: HEADER -->
  <text x="50" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#b87ce8">HEADER 섹션</text>
  <rect x="50" y="130" width="780" height="52" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="70" y="151" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">;; -&gt;&gt;HEADER&lt;&lt;- opcode: <tspan fill="#ffffff">QUERY</tspan>, status: <tspan fill="#55c555">NOERROR</tspan>, id: 12345</text>
  <text x="70" y="171" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">;; flags: <tspan fill="#7ec8e3">qr aa rd ra</tspan>; QUERY: 1, ANSWER: 2, AUTHORITY: 0, ADDITIONAL: 1</text>

  <!-- Section: QUESTION -->
  <text x="50" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#b87ce8">QUESTION 섹션 (내가 요청한 것)</text>
  <rect x="50" y="213" width="780" height="36" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="70" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">;example.com.            IN   <tspan fill="#e0a055">A</tspan></text>

  <!-- Section: ANSWER -->
  <text x="50" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#b87ce8">ANSWER 섹션 (DNS 응답)</text>
  <rect x="50" y="279" width="780" height="52" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="70" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">example.com.     <tspan fill="#b5cea8">300</tspan>    IN   <tspan fill="#e0a055">A</tspan>    93.184.216.34</text>
  <text x="70" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">example.com.     <tspan fill="#b5cea8">300</tspan>    IN   <tspan fill="#e0a055">A</tspan>    93.184.216.35</text>

  <!-- Section: STATS -->
  <text x="50" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#b87ce8">STATS 섹션 (+stats 옵션 시)</text>
  <rect x="50" y="363" width="780" height="52" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="70" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">;; Query time: <tspan fill="#55c555">3 msec</tspan></text>
  <text x="70" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">;; SERVER: <tspan fill="#7ec8e3">8.8.8.8#53</tspan>(8.8.8.8)  ;; MSG SIZE rcvd: 87</text>

  <!-- Legend -->
  <text x="50" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">status: NOERROR=성공  NXDOMAIN=도메인없음  SERVFAIL=서버오류  REFUSED=거부</text>
  <text x="50" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">flags: qr=응답  aa=authoritative  rd=재귀요청  ra=재귀지원  TTL(300)=캐시 수명(초)</text>
  <text x="50" y="480" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">레코드 타입: A(IPv4)  AAAA(IPv6)  CNAME(별칭)  MX(메일)  TXT(텍스트)  NS(네임서버)</text>
</svg>
