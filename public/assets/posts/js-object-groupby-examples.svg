<svg width="880" height="460" viewBox="0 0 880 460" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">groupBy — Object vs Map</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">키 타입에 따라 Object 또는 Map 선택</text>
  <line x1="60" y1="92" x2="820" y2="92" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Left: Object.groupBy -->
  <text x="60" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">Object.groupBy — 문자열 키</text>
  <rect x="60" y="126" width="360" height="244" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> items = [</tspan>
  </text>
  <text x="76" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  { name: </tspan><tspan fill="#ce9178">'a'</tspan><tspan fill="#ffffff">, qty: </tspan><tspan fill="#b5cea8">5</tspan><tspan fill="#ffffff"> },</tspan>
  </text>
  <text x="76" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  { name: </tspan><tspan fill="#ce9178">'b'</tspan><tspan fill="#ffffff">, qty: </tspan><tspan fill="#b5cea8">20</tspan><tspan fill="#ffffff"> },</tspan>
  </text>
  <text x="76" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  { name: </tspan><tspan fill="#ce9178">'c'</tspan><tspan fill="#ffffff">, qty: </tspan><tspan fill="#b5cea8">8</tspan><tspan fill="#ffffff"> },</tspan>
  </text>
  <text x="76" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">];</tspan>
  </text>
  <text x="76" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> g = Object.groupBy(</tspan>
  </text>
  <text x="76" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  items,</tspan>
  </text>
  <text x="76" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  i =&gt; i.qty &lt; </tspan><tspan fill="#b5cea8">10</tspan><tspan fill="#ffffff"> ? </tspan><tspan fill="#ce9178">'low'</tspan><tspan fill="#ffffff"> : </tspan><tspan fill="#ce9178">'high'</tspan>
  </text>
  <text x="76" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">);</tspan>
  </text>
  <text x="76" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">g.low;  </tspan><tspan fill="#9aa4b8">// [a, c]</tspan>
  </text>
  <text x="76" y="364" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">g.high; </tspan><tspan fill="#9aa4b8">// [b]</tspan>
  </text>

  <!-- Right: Map.groupBy -->
  <text x="460" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">Map.groupBy — 임의 키 타입</text>
  <rect x="460" y="126" width="360" height="244" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 객체를 키로 사용 가능</text>
  <text x="476" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> lowBucket = { label: </tspan><tspan fill="#ce9178">'low'</tspan><tspan fill="#ffffff"> };</tspan>
  </text>
  <text x="476" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> highBucket = { label: </tspan><tspan fill="#ce9178">'high'</tspan><tspan fill="#ffffff"> };</tspan>
  </text>
  <text x="476" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> gm = Map.groupBy(</tspan>
  </text>
  <text x="476" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  items,</tspan>
  </text>
  <text x="476" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  i =&gt; i.qty &lt; </tspan><tspan fill="#b5cea8">10</tspan>
  </text>
  <text x="476" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    ? lowBucket : highBucket</tspan>
  </text>
  <text x="476" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">);</tspan>
  </text>
  <text x="476" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">gm.get(lowBucket);  </tspan><tspan fill="#9aa4b8">// [a, c]</tspan>
  </text>
  <text x="476" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">gm.get(highBucket); </tspan><tspan fill="#9aa4b8">// [b]</tspan>
  </text>
  <text x="476" y="364" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// Map이므로 객체 키 사용 가능</text>

</svg>
