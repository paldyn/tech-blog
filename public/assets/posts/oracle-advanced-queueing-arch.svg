<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arrd" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto">
      <polygon points="0 0,20 7,0 14" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto">
      <polygon points="0 0,20 7,0 14" fill="#55c555"/>
    </marker>
    <marker id="arro" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto">
      <polygon points="0 0,20 7,0 14" fill="#e8a855"/>
    </marker>
  </defs>
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Oracle Advanced Queuing 아키텍처</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">DB 내장 메시지 큐 — 트랜잭션 보장 · 영속성 · 구독/발행</text>

  <!-- Producer -->
  <rect x="50" y="92" width="180" height="64" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Producer</text>
  <text x="140" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">DBMS_AQ.ENQUEUE</text>
  <text x="140" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">트랜잭션 내 메시지 삽입</text>

  <!-- Arrow to Queue Table -->
  <line x1="232" y1="124" x2="300" y2="124" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrd)"/>

  <!-- Queue Table (Oracle Table) -->
  <rect x="304" y="80" width="272" height="240" rx="10" fill="#111" stroke="#e8a855" stroke-width="2"/>
  <text x="440" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8a855">Queue Table (Oracle Table)</text>

  <!-- Messages in queue -->
  <rect x="320" y="118" width="240" height="32" rx="4" fill="#1a1510" stroke="#e8a855" stroke-width="1"/>
  <text x="344" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8a855">MSG#003</text>
  <text x="500" y="132" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">READY | HIGH</text>
  <text x="440" y="147" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#555">priority=1 enq_time=2024-01-15 09:00</text>

  <rect x="320" y="158" width="240" height="32" rx="4" fill="#1a1510" stroke="#e8a855" stroke-width="1"/>
  <text x="344" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8a855">MSG#002</text>
  <text x="500" y="172" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">READY | NORMAL</text>
  <text x="440" y="187" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#555">priority=5 enq_time=2024-01-15 08:45</text>

  <rect x="320" y="198" width="240" height="32" rx="4" fill="#12201a" stroke="#55c555" stroke-width="1"/>
  <text x="344" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">MSG#001</text>
  <text x="500" y="212" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">PROCESSED</text>
  <text x="440" y="227" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#555">DEQUEUE 완료 → 보존/삭제</text>

  <!-- Delay / Expiration info -->
  <rect x="320" y="242" width="240" height="62" rx="4" fill="#0a0f08"/>
  <text x="440" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#e8e8e8">메시지 속성</text>
  <text x="440" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#ccc">DELAY: 지연 전달 (예: 5분 후 처리)</text>
  <text x="440" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#ccc">EXPIRATION: 처리 안 되면 만료</text>

  <!-- Arrow to Consumer -->
  <line x1="578" y1="138" x2="648" y2="138" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>

  <!-- Consumer -->
  <rect x="652" y="92" width="180" height="64" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="742" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">Consumer</text>
  <text x="742" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">DBMS_AQ.DEQUEUE</text>
  <text x="742" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">트랜잭션 내 메시지 소비</text>

  <!-- AQ features below -->
  <rect x="50" y="348" width="780" height="130" rx="8" fill="#111" stroke="#333"/>
  <text x="440" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">AQ 핵심 기능</text>

  <rect x="66" y="382" width="220" height="80" rx="6" fill="#0d1520"/>
  <text x="176" y="402" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">트랜잭션 보장</text>
  <text x="176" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ccc">ENQUEUE/DEQUEUE가</text>
  <text x="176" y="438" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ccc">트랜잭션과 동일 단위</text>
  <text x="176" y="456" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">롤백 → 메시지도 롤백</text>

  <rect x="302" y="382" width="220" height="80" rx="6" fill="#0d1a0d"/>
  <text x="412" y="402" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">Pub/Sub 지원</text>
  <text x="412" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ccc">복수 구독자에게</text>
  <text x="412" y="438" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ccc">메시지 자동 전달</text>
  <text x="412" y="456" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">Rule 기반 라우팅 가능</text>

  <rect x="538" y="382" width="280" height="80" rx="6" fill="#12101a"/>
  <text x="678" y="402" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">DB 내장 = 별도 MQ 불필요</text>
  <text x="678" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ccc">Oracle RAC에서 HA 자동 보장</text>
  <text x="678" y="438" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ccc">JMS 인터페이스 지원</text>
  <text x="678" y="456" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">Kafka 등 외부 MQ와 연동 가능</text>
</svg>
