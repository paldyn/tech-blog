<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <style>text:not([font-family]) { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }</style>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Hello, World! 실행 흐름</text>
  <text x="440" y="68" text-anchor="middle" font-size="15" font-weight="600" fill="#888">한 줄의 코드가 실행되기까지</text>

  <!-- Step boxes -->
  <!-- hello.py -->
  <rect x="60" y="100" width="130" height="70" rx="8" fill="#0f1820" stroke="#7ec8e3" stroke-width="2"/>
  <text x="125" y="130" text-anchor="middle" font-size="12" font-weight="700" fill="#7ec8e3">hello.py</text>
  <text x="125" y="150" text-anchor="middle" font-family="'JetBrains Mono','Menlo',monospace" font-size="10" fill="#ce9178">print("Hello!")</text>
  <text x="125" y="164" text-anchor="middle" font-size="10" fill="#666">소스 파일</text>

  <polygon points="192,135 204,129 204,141" fill="#7ec8e3"/>
  <line x1="190" y1="135" x2="204" y2="135" stroke="#7ec8e3" stroke-width="1.5"/>

  <!-- CPython -->
  <rect x="206" y="100" width="130" height="70" rx="8" fill="#0f1820" stroke="#7777cc" stroke-width="1.5"/>
  <text x="271" y="128" text-anchor="middle" font-size="12" font-weight="700" fill="#7777cc">CPython</text>
  <text x="271" y="146" text-anchor="middle" font-size="11" fill="#aaa">lexer + parser</text>
  <text x="271" y="162" text-anchor="middle" font-size="10" fill="#666">문법 분석</text>

  <polygon points="338,135 350,129 350,141" fill="#7777cc"/>
  <line x1="336" y1="135" x2="350" y2="135" stroke="#7777cc" stroke-width="1.5"/>

  <!-- Bytecode -->
  <rect x="352" y="100" width="130" height="70" rx="8" fill="#0f1820" stroke="#55c555" stroke-width="1.5"/>
  <text x="417" y="128" text-anchor="middle" font-size="12" font-weight="700" fill="#55c555">Bytecode</text>
  <text x="417" y="146" text-anchor="middle" font-size="11" fill="#aaa">.pyc 캐시 생성</text>
  <text x="417" y="162" text-anchor="middle" font-size="10" fill="#666">중간 표현</text>

  <polygon points="484,135 496,129 496,141" fill="#55c555"/>
  <line x1="482" y1="135" x2="496" y2="135" stroke="#55c555" stroke-width="1.5"/>

  <!-- PVM -->
  <rect x="498" y="100" width="130" height="70" rx="8" fill="#0f1820" stroke="#ce9178" stroke-width="1.5"/>
  <text x="563" y="128" text-anchor="middle" font-size="12" font-weight="700" fill="#ce9178">PVM</text>
  <text x="563" y="146" text-anchor="middle" font-size="11" fill="#aaa">바이트코드 실행</text>
  <text x="563" y="162" text-anchor="middle" font-size="10" fill="#666">스택 머신</text>

  <polygon points="630,135 642,129 642,141" fill="#ce9178"/>
  <line x1="628" y1="135" x2="642" y2="135" stroke="#ce9178" stroke-width="1.5"/>

  <!-- stdout -->
  <rect x="644" y="100" width="176" height="70" rx="8" fill="#0f1820" stroke="#55c555" stroke-width="2"/>
  <text x="732" y="126" text-anchor="middle" font-size="12" font-weight="700" fill="#55c555">stdout</text>
  <text x="732" y="146" text-anchor="middle" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8">Hello, World!</text>
  <text x="732" y="164" text-anchor="middle" font-size="10" fill="#666">터미널 출력</text>

  <!-- Three ways to run -->
  <text x="440" y="210" text-anchor="middle" font-size="14" font-weight="700" fill="#888">Python 실행 3가지 방법</text>

  <!-- Method 1: Script -->
  <rect x="60" y="230" width="240" height="170" rx="8" fill="#0f1820" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="254" text-anchor="middle" font-size="13" font-weight="700" fill="#7ec8e3">스크립트 파일</text>
  <rect x="76" y="264" width="208" height="60" rx="4" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0"># hello.py</text>
  <text x="92" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"><tspan fill="#7ec8e3">print</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">"Hello!"</tspan><tspan fill="#e8e8e8">)</tspan></text>
  <text x="180" y="346" text-anchor="middle" font-family="'JetBrains Mono','Menlo',monospace" font-size="11" fill="#55c555">python hello.py</text>
  <text x="180" y="366" text-anchor="middle" font-size="10" fill="#666">파일 저장 후 실행</text>
  <text x="180" y="384" text-anchor="middle" font-size="10" fill="#666">재사용 가능한 코드</text>

  <!-- Method 2: REPL -->
  <rect x="320" y="230" width="240" height="170" rx="8" fill="#0f1820" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="254" text-anchor="middle" font-size="13" font-weight="700" fill="#55c555">REPL 인터랙티브</text>
  <rect x="336" y="264" width="208" height="60" rx="4" fill="#070b14" stroke="#1e2433"/>
  <text x="352" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11"><tspan fill="#55c555">&gt;&gt;&gt;</tspan><tspan fill="#e8e8e8"> </tspan><tspan fill="#7ec8e3">print</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">"Hello!"</tspan><tspan fill="#e8e8e8">)</tspan></text>
  <text x="352" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">Hello!</text>
  <text x="440" y="346" text-anchor="middle" font-family="'JetBrains Mono','Menlo',monospace" font-size="11" fill="#55c555">python</text>
  <text x="440" y="366" text-anchor="middle" font-size="10" fill="#666">즉시 실행 환경</text>
  <text x="440" y="384" text-anchor="middle" font-size="10" fill="#666">실험·탐색에 적합</text>

  <!-- Method 3: One-liner -->
  <rect x="580" y="230" width="240" height="170" rx="8" fill="#0f1820" stroke="#7777cc" stroke-width="1.5"/>
  <text x="700" y="254" text-anchor="middle" font-size="13" font-weight="700" fill="#7777cc">-c 플래그</text>
  <rect x="596" y="264" width="208" height="60" rx="4" fill="#070b14" stroke="#1e2433"/>
  <text x="612" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10"><tspan fill="#e8e8e8">python -c </tspan><tspan fill="#ce9178">"print(42)"</tspan></text>
  <text x="612" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">42</text>
  <text x="700" y="346" text-anchor="middle" font-size="11" fill="#7777cc">인라인 코드 실행</text>
  <text x="700" y="366" text-anchor="middle" font-size="10" fill="#666">셸 스크립트 연동</text>
  <text x="700" y="384" text-anchor="middle" font-size="10" fill="#666">빠른 테스트용</text>
</svg>
