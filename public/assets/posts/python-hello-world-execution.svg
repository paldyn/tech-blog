<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Python 실행 방법 세 가지</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">REPL · 스크립트 파일 · 모듈 실행</text>

  <!-- REPL -->
  <rect x="60" y="88" width="240" height="60" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">① REPL 대화형</text>
  <text x="180" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">$ python</text>

  <rect x="60" y="168" width="240" height="90" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="192" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">&gt;&gt;&gt; </tspan><tspan fill="#7ec8e3" font-weight="600">print</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"Hello!"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="76" y="212" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">Hello!</tspan></text>
  <text x="76" y="232" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">&gt;&gt;&gt; </tspan><tspan fill="#b5cea8">1 + 2</tspan></text>
  <text x="76" y="250" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#b5cea8">3</tspan></text>

  <!-- Script file -->
  <rect x="330" y="88" width="220" height="60" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">② 스크립트 파일</text>
  <text x="440" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">$ python hello.py</text>

  <rect x="330" y="168" width="220" height="90" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="346" y="192" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8"># hello.py</tspan></text>
  <text x="346" y="212" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">print</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"Hello!"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="346" y="240" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8"># 출력: Hello!</tspan></text>

  <!-- Module -->
  <rect x="580" y="88" width="240" height="60" rx="8" fill="#1f1a0a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="700" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#f59e0b" text-anchor="middle">③ -m 모듈 실행</text>
  <text x="700" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">$ python -m module</text>

  <rect x="580" y="168" width="240" height="90" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="596" y="192" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8"># 내장 모듈 직접 실행</tspan></text>
  <text x="596" y="212" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">$ python -m json.tool</tspan></text>
  <text x="596" y="232" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">$ python -m http.server</tspan></text>
  <text x="596" y="252" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">$ python -m pytest</tspan></text>

  <!-- print signature -->
  <rect x="60" y="290" width="760" height="70" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">print() 함수 시그니처</text>
  <text x="80" y="348" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">print</tspan><tspan fill="#ffffff">(*objects, sep=</tspan><tspan fill="#ce9178">' '</tspan><tspan fill="#ffffff">, end=</tspan><tspan fill="#ce9178">'\n'</tspan><tspan fill="#ffffff">, file=sys.stdout, flush=</tspan><tspan fill="#7ec8e3" font-weight="600">False</tspan><tspan fill="#ffffff">)</tspan></text>

  <text x="440" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">REPL은 탐색에, 스크립트는 실행에, -m은 도구 호출에 사용</text>
</svg>
