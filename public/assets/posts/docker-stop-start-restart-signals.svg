<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">docker stop 종료 시퀀스</text>
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#aaaaaa">SIGTERM → grace period → SIGKILL</text>

  <!-- Timeline bar -->
  <rect x="60" y="120" width="760" height="8" rx="4" fill="#1e2433"/>

  <!-- Phase 1: SIGTERM -->
  <rect x="60" y="108" width="400" height="8" rx="4" fill="#7ec8e3"/>
  <text x="60" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">① SIGTERM 전송 (정상 종료 요청)</text>

  <!-- Phase 2: Grace period -->
  <rect x="460" y="108" width="260" height="8" rx="4" fill="#e8a030"/>
  <text x="460" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8a030">② Grace period (기본 10초)</text>

  <!-- Phase 3: SIGKILL -->
  <rect x="720" y="108" width="100" height="8" rx="4" fill="#e05555"/>
  <text x="720" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">③ SIGKILL</text>

  <!-- Time markers -->
  <text x="60" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">t=0</text>
  <text x="710" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">t=10s</text>
  <text x="800" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">종료</text>

  <!-- Vertical marker lines -->
  <line x1="60" y1="108" x2="60" y2="160" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="460" y1="108" x2="460" y2="160" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="720" y1="108" x2="720" y2="160" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="820" y1="108" x2="820" y2="160" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Explanation boxes -->
  <!-- SIGTERM box -->
  <rect x="60" y="180" width="260" height="100" rx="8" fill="#0d1a22" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="190" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">SIGTERM (15)</text>
  <text x="80" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">PID 1 에 정상 종료 요청</text>
  <text x="80" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">프로세스가 직접 처리 가능</text>
  <text x="80" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">연결 drain, 파일 flush 등</text>

  <!-- Grace period box -->
  <rect x="340" y="180" width="200" height="100" rx="8" fill="#1f1400" stroke="#e8a030" stroke-width="1.5"/>
  <text x="440" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8a030">Grace Period</text>
  <text x="360" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">기본값: 10초</text>
  <text x="360" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">변경: -t N 옵션</text>
  <text x="360" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">docker stop -t 30</text>

  <!-- SIGKILL box -->
  <rect x="560" y="180" width="200" height="100" rx="8" fill="#2d0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="660" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555">SIGKILL (9)</text>
  <text x="580" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">강제 즉시 종료</text>
  <text x="580" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">무시·블록 불가</text>
  <text x="580" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">데이터 유실 위험</text>

  <!-- Code block -->
  <rect x="60" y="302" width="760" height="78" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># grace period 30초로 변경 (Dockerfile: STOPSIGNAL SIGTERM)</text>
  <text x="76" y="344" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">docker stop</tspan>
    <tspan fill="#e8e8e8"> </tspan>
    <tspan fill="#7777cc">-t 30</tspan>
    <tspan fill="#e8e8e8"> </tspan>
    <tspan fill="#ce9178">web</tspan>
  </text>
  <text x="76" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">docker kill</tspan>
    <tspan fill="#e8e8e8"> </tspan>
    <tspan fill="#7777cc">--signal SIGUSR1</tspan>
    <tspan fill="#e8e8e8"> </tspan>
    <tspan fill="#ce9178">web</tspan>
    <tspan fill="#6a8aa0">  # 커스텀 시그널 전송</tspan>
  </text>
</svg>
