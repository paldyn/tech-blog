<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <style>text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }</style>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">베이즈 정리 완전 해부</text>

  <!-- Main formula box -->
  <rect x="120" y="64" width="640" height="80" rx="10" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="96" text-anchor="middle" font-size="28" font-weight="700" fill="#7777cc">P(H|E) = P(E|H) · P(H) / P(E)</text>
  <text x="440" y="128" text-anchor="middle" font-size="14" fill="#888">사후 확률 = 우도 × 사전 확률 / 증거</text>

  <!-- Term annotations -->
  <!-- P(H|E) -->
  <rect x="60" y="164" width="170" height="90" rx="6" fill="#111" stroke="#e05555" stroke-width="1"/>
  <text x="145" y="186" text-anchor="middle" font-size="14" font-weight="700" fill="#e05555">P(H|E)</text>
  <text x="145" y="206" text-anchor="middle" font-size="12" font-weight="600" fill="#e05555">사후 확률 (Posterior)</text>
  <text x="145" y="224" text-anchor="middle" font-size="11" fill="#aaa">증거 E를 본 후</text>
  <text x="145" y="242" text-anchor="middle" font-size="11" fill="#aaa">H가 참일 확률</text>

  <!-- P(E|H) -->
  <rect x="250" y="164" width="170" height="90" rx="6" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="335" y="186" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">P(E|H)</text>
  <text x="335" y="206" text-anchor="middle" font-size="12" font-weight="600" fill="#55c555">우도 (Likelihood)</text>
  <text x="335" y="224" text-anchor="middle" font-size="11" fill="#aaa">H가 참일 때</text>
  <text x="335" y="242" text-anchor="middle" font-size="11" fill="#aaa">증거 E가 나올 확률</text>

  <!-- P(H) -->
  <rect x="440" y="164" width="170" height="90" rx="6" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="525" y="186" text-anchor="middle" font-size="14" font-weight="700" fill="#7ec8e3">P(H)</text>
  <text x="525" y="206" text-anchor="middle" font-size="12" font-weight="600" fill="#7ec8e3">사전 확률 (Prior)</text>
  <text x="525" y="224" text-anchor="middle" font-size="11" fill="#aaa">증거를 보기 전</text>
  <text x="525" y="242" text-anchor="middle" font-size="11" fill="#aaa">H에 대한 초기 믿음</text>

  <!-- P(E) -->
  <rect x="630" y="164" width="190" height="90" rx="6" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="725" y="186" text-anchor="middle" font-size="14" font-weight="700" fill="#7777cc">P(E)</text>
  <text x="725" y="206" text-anchor="middle" font-size="12" font-weight="600" fill="#7777cc">증거 (Evidence)</text>
  <text x="725" y="224" text-anchor="middle" font-size="11" fill="#aaa">관찰된 데이터가</text>
  <text x="725" y="242" text-anchor="middle" font-size="11" fill="#aaa">나올 총 확률 (정규화)</text>

  <!-- Practical example -->
  <text x="440" y="282" text-anchor="middle" font-size="14" font-weight="600" fill="#888">직관적 예시: 의료 진단</text>
  <rect x="60" y="294" width="760" height="100" rx="8" fill="#111"/>
  <text x="440" y="318" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">질문: 검사 양성이면 실제 병에 걸렸을 확률은?</text>
  <text x="210" y="344" text-anchor="middle" font-size="12" fill="#7ec8e3">P(병) = 0.001 (유병률)</text>
  <text x="440" y="344" text-anchor="middle" font-size="12" fill="#55c555">P(양성|병) = 0.99 (민감도)</text>
  <text x="690" y="344" text-anchor="middle" font-size="12" fill="#e05555">P(양성|정상) = 0.05 (위양성률)</text>
  <text x="440" y="370" text-anchor="middle" font-size="12" fill="#7777cc">P(병|양성) = (0.99×0.001) / (0.99×0.001 + 0.05×0.999) ≈ 1.9%!</text>
  <text x="440" y="386" text-anchor="middle" font-size="11" fill="#555">유병률이 낮으면 양성이더라도 실제 병에 걸렸을 확률은 매우 낮다 → 기저율 무시 오류 주의</text>

  <!-- AI connections -->
  <rect x="60" y="412" width="370" height="72" rx="6" fill="#0e1420"/>
  <text x="245" y="434" text-anchor="middle" font-size="12" font-weight="600" fill="#7ec8e3">베이즈 정리의 AI 응용</text>
  <text x="245" y="452" text-anchor="middle" font-size="11" fill="#aaa">나이브 베이즈 분류기 (스팸 필터)</text>
  <text x="245" y="468" text-anchor="middle" font-size="11" fill="#aaa">베이즈 최적화 (하이퍼파라미터 탐색)</text>
  <text x="245" y="478" text-anchor="middle" font-size="10" fill="#555">베이즈 신경망 (불확실성 정량화)</text>

  <rect x="450" y="412" width="370" height="72" rx="6" fill="#0e2010"/>
  <text x="635" y="434" text-anchor="middle" font-size="12" font-weight="600" fill="#55c555">LLM과 베이즈 관점</text>
  <text x="635" y="452" text-anchor="middle" font-size="11" fill="#aaa">사전 확률 = 사전학습으로 얻은 지식</text>
  <text x="635" y="468" text-anchor="middle" font-size="11" fill="#aaa">증거 = 프롬프트 / 컨텍스트</text>
  <text x="635" y="478" text-anchor="middle" font-size="10" fill="#555">사후 확률 = 컨텍스트를 반영한 출력</text>

  <!-- Footer -->
  <text x="440" y="504" text-anchor="middle" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈</text>
</svg>
