<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">인터페이스 메서드 타입 비교</text>

  <!-- Table background -->
  <rect x="60" y="72" width="760" height="204" fill="#111111" rx="8" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Header row: y=72, h=44 -->
  <rect x="60" y="72" width="190" height="44" fill="#1a1a1a" rx="0"/>
  <rect x="250" y="72" width="190" height="44" fill="#1e1020" rx="0"/>
  <rect x="440" y="72" width="190" height="44" fill="#0e200e" rx="0"/>
  <rect x="630" y="72" width="190" height="44" fill="#0e151e" rx="0"/>

  <!-- Header rounded corners for outer cells -->
  <path d="M68,72 Q60,72 60,80 L60,116 L250,116 L250,72 Z" fill="#1a1a1a"/>
  <path d="M812,72 Q820,72 820,80 L820,116 L630,116 L630,72 Z" fill="#0e151e"/>

  <!-- Header text -->
  <text x="155" y="98" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#888888">속성</text>
  <text x="345" y="98" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">abstract</text>
  <text x="535" y="98" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">default</text>
  <text x="725" y="98" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">static</text>

  <!-- Row separators -->
  <line x1="60" y1="116" x2="820" y2="116" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="60" y1="156" x2="820" y2="156" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="60" y1="196" x2="820" y2="196" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="60" y1="236" x2="820" y2="236" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Column separators -->
  <line x1="250" y1="72" x2="250" y2="276" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="440" y1="72" x2="440" y2="276" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="630" y1="72" x2="630" y2="276" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Row 1: 구현 의무 / y=116, h=40, text at y+24=140 -->
  <text x="155" y="140" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888888">구현 의무</text>
  <text x="345" y="140" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">클래스 필수 구현</text>
  <text x="535" y="140" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">선택적 재정의</text>
  <text x="725" y="140" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">해당 없음</text>

  <!-- Row 2: 기본 구현 / y=156, text at y+24=180 -->
  <rect x="60" y="156" width="760" height="40" fill="#0d0d0d"/>
  <text x="155" y="180" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888888">기본 구현</text>
  <text x="345" y="180" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">없음 (선언만)</text>
  <text x="535" y="180" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">있음 (바디 포함)</text>
  <text x="725" y="180" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">있음 (필수)</text>

  <!-- Row 3: 상속 여부 / y=196, text at y+24=220 -->
  <text x="155" y="220" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888888">상속 여부</text>
  <text x="345" y="220" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">구현 클래스로 상속</text>
  <text x="535" y="220" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">구현 클래스로 상속</text>
  <text x="725" y="220" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">상속 안 됨</text>

  <!-- Row 4: 호출 방식 / y=236, text at y+24=260 -->
  <rect x="60" y="236" width="760" height="40" fill="#0d0d0d"/>
  <text x="155" y="260" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888888">호출 방식</text>
  <text x="345" y="260" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">obj.method()</text>
  <text x="535" y="260" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">obj.method()</text>
  <text x="725" y="260" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">Interface.method()</text>

  <!-- Code box: x=60, y=298, w=760, h=76 -->
  <rect x="60" y="298" width="760" height="76" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="320" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">interface </tspan><tspan fill="#ffffff">Shape {  </tspan>
    <tspan fill="#9aa4b8">double area();  </tspan>
    <tspan fill="#7ec8e3" font-weight="600">default </tspan><tspan fill="#ffffff">boolean empty() {...}  </tspan>
    <tspan fill="#7ec8e3" font-weight="600">static </tspan><tspan fill="#ffffff">Shape of() {...} }</tspan>
  </text>
  <text x="80" y="340" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#9aa4b8">// abstract: obj.area()  |  </tspan>
    <tspan fill="#9aa4b8">default: obj.empty()  |  </tspan>
    <tspan fill="#9aa4b8">static: Shape.of()</tspan>
  </text>
  <text x="80" y="360" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#9aa4b8">// static 메서드는 구현 클래스·하위 인터페이스에 상속되지 않는다</tspan>
  </text>
</svg>
