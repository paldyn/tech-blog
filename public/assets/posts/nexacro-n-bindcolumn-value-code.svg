<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 340" width="880" height="340">
  <rect width="880" height="340" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">스크립트로 value / bindcolumn 읽기</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">get_value() · getColumn() 차이</text>

  <!-- Left: get_value -->
  <text x="60" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">컴포넌트 value 읽기</text>
  <rect x="60" y="108" width="370" height="196" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// Edit의 현재 표시값 읽기</text>
  <text x="76" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">var</tspan><tspan fill="#e8e8e8"> v1 = </tspan><tspan fill="#7ec8e3">this</tspan><tspan fill="#e8e8e8">.edtName.get_value();</tspan></text>
  <text x="76" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// Dataset에서 직접 읽기 (동일)</text>
  <text x="76" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">var</tspan><tspan fill="#e8e8e8"> v2 = </tspan><tspan fill="#7ec8e3">this</tspan><tspan fill="#e8e8e8">.dsMain.getColumn(</tspan></text>
  <text x="76" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    </tspan><tspan fill="#7ec8e3">this</tspan><tspan fill="#e8e8e8">.dsMain.currentrow, </tspan><tspan fill="#ce9178">"NAME"</tspan><tspan fill="#e8e8e8">);</tspan></text>
  <text x="76" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// v1 === v2 (바인딩 시 동일)</text>
  <text x="76" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// Combo: 코드값 읽기</text>
  <text x="76" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">var</tspan><tspan fill="#e8e8e8"> code = </tspan><tspan fill="#7ec8e3">this</tspan><tspan fill="#e8e8e8">.cboStatus.get_value();</tspan></text>
  <text x="76" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 표시(이름)값 읽기</text>
  <text x="76" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">var</tspan><tspan fill="#e8e8e8"> name = </tspan><tspan fill="#7ec8e3">this</tspan><tspan fill="#e8e8e8">.cboStatus.get_text();</tspan></text>

  <!-- Right: set_value -->
  <text x="450" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">스크립트로 값 설정</text>
  <rect x="450" y="108" width="370" height="196" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
  <text x="466" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// Dataset 값 변경 → 컴포넌트 자동갱신</text>
  <text x="466" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">this</tspan><tspan fill="#e8e8e8">.dsMain.setColumn(</tspan></text>
  <text x="466" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    </tspan><tspan fill="#7ec8e3">this</tspan><tspan fill="#e8e8e8">.dsMain.currentrow, </tspan><tspan fill="#ce9178">"NAME"</tspan><tspan fill="#e8e8e8">,</tspan></text>
  <text x="466" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ce9178">    "홍길동"</tspan><tspan fill="#e8e8e8">);</tspan></text>
  <text x="466" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 또는 컴포넌트에 직접 값 지정</text>
  <text x="466" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// (Dataset도 자동으로 변경됨)</text>
  <text x="466" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">this</tspan><tspan fill="#e8e8e8">.edtName.set_value(</tspan><tspan fill="#ce9178">"홍길동"</tspan><tspan fill="#e8e8e8">);</tspan></text>
  <text x="466" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// ⚠ 바인딩 없을 때만 set_value 사용</text>
  <text x="466" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">//   바인딩 있을 땐 Dataset 조작 권장</text>
  <text x="466" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">// → 단일 진실 공급원 원칙</text>
</svg>
