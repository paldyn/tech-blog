<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430">
  <rect width="880" height="430" fill="#0a0a0a" rx="12"/>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">세션 관리 방식 비교</text>
    <!-- Headers -->
    <text x="170" y="75" text-anchor="middle" font-size="14" font-weight="700" fill="#7ec8e3">쿠키-세션</text>
    <text x="440" y="75" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">JWT 토큰</text>
    <text x="710" y="75" text-anchor="middle" font-size="14" font-weight="700" fill="#dd9955">캐시 (Redis)</text>
    <line x1="60" y1="85" x2="820" y2="85" stroke="#333" stroke-width="1"/>
    <!-- Row: 저장 위치 -->
    <text x="60" y="113" font-size="11" fill="#888">저장 위치</text>
    <text x="170" y="113" text-anchor="middle" font-size="11" fill="#e8e8e8">서버 메모리/DB</text>
    <text x="440" y="113" text-anchor="middle" font-size="11" fill="#e8e8e8">클라이언트 (토큰 내)</text>
    <text x="710" y="113" text-anchor="middle" font-size="11" fill="#e8e8e8">Redis/분산 저장소</text>
    <line x1="60" y1="123" x2="820" y2="123" stroke="#222" stroke-width="1"/>
    <!-- Row: 확장성 -->
    <text x="60" y="151" font-size="11" fill="#888">수평 확장</text>
    <text x="170" y="151" text-anchor="middle" font-size="11" fill="#e05555">△ Sticky 세션 필요</text>
    <text x="440" y="151" text-anchor="middle" font-size="11" fill="#55c555">✓ 무상태(Stateless)</text>
    <text x="710" y="151" text-anchor="middle" font-size="11" fill="#55c555">✓ 분산 세션 공유</text>
    <line x1="60" y1="161" x2="820" y2="161" stroke="#222" stroke-width="1"/>
    <!-- Row: 무효화 -->
    <text x="60" y="189" font-size="11" fill="#888">즉시 무효화</text>
    <text x="170" y="189" text-anchor="middle" font-size="11" fill="#55c555">✓ 즉시 가능</text>
    <text x="440" y="189" text-anchor="middle" font-size="11" fill="#e05555">✗ 만료까지 대기</text>
    <text x="710" y="189" text-anchor="middle" font-size="11" fill="#55c555">✓ 즉시 가능</text>
    <line x1="60" y1="199" x2="820" y2="199" stroke="#222" stroke-width="1"/>
    <!-- Row: 페이로드 크기 -->
    <text x="60" y="227" font-size="11" fill="#888">쿠키 크기</text>
    <text x="170" y="227" text-anchor="middle" font-size="11" fill="#55c555">작음 (ID만)</text>
    <text x="440" y="227" text-anchor="middle" font-size="11" fill="#e05555">크다 (페이로드 포함)</text>
    <text x="710" y="227" text-anchor="middle" font-size="11" fill="#55c555">작음 (ID만)</text>
    <line x1="60" y1="237" x2="820" y2="237" stroke="#222" stroke-width="1"/>
    <!-- Row: 보안 -->
    <text x="60" y="265" font-size="11" fill="#888">보안</text>
    <text x="170" y="265" text-anchor="middle" font-size="11" fill="#55c555">✓ 서버에만 존재</text>
    <text x="440" y="265" text-anchor="middle" font-size="11" fill="#dd9955">△ 서명 검증 필요</text>
    <text x="710" y="265" text-anchor="middle" font-size="11" fill="#55c555">✓ 서버 저장</text>
    <line x1="60" y1="275" x2="820" y2="275" stroke="#222" stroke-width="1"/>
    <!-- Recommendation box -->
    <rect x="60" y="290" width="760" height="110" rx="8" fill="#0f1f0f" stroke="#3a6a3a" stroke-width="1.5"/>
    <text x="440" y="312" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">선택 가이드</text>
    <text x="80" y="335" font-size="12" fill="#e8e8e8">단일 서버 · 소규모: 쿠키 세션 (구현 간단)</text>
    <text x="80" y="355" font-size="12" fill="#e8e8e8">마이크로서비스 · 수평 확장: Redis 세션 or JWT (Refresh Token)</text>
    <text x="80" y="375" font-size="12" fill="#e8e8e8">모바일/서드파티 API: JWT + 짧은 TTL + Refresh Token 회전</text>
    <text x="440" y="415" text-anchor="middle" font-size="11" fill="#555">JWT 사용 시 민감 정보 payload에 포함 금지 — Base64 인코딩은 암호화가 아님</text>
  </g>
</svg>
