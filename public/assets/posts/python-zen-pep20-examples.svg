<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <style>text:not([font-family]) { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }</style>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Zen 원칙 실전 적용</text>
  <text x="440" y="68" text-anchor="middle" font-size="15" font-weight="600" fill="#888">나쁜 코드 vs Zen을 따른 코드</text>

  <!-- Bad code header -->
  <rect x="60" y="84" width="360" height="30" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#e05555">Zen 위반 — 암묵적·복잡</text>

  <!-- Good code header -->
  <rect x="460" y="84" width="360" height="30" rx="6" fill="#102010" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="103" text-anchor="middle" font-size="13" font-weight="700" fill="#55c555">Zen 준수 — 명시적·단순</text>

  <!-- Bad code block -->
  <rect x="60" y="124" width="360" height="166" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 암묵적 (True/False 확인)</text>
  <text x="76" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">def</tspan><tspan fill="#e8e8e8"> </tspan><tspan fill="#55c555">is_ok</tspan><tspan fill="#e8e8e8">(val):</tspan></text>
  <text x="76" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    </tspan><tspan fill="#7ec8e3">return</tspan><tspan fill="#e8e8e8"> </tspan><tspan fill="#7ec8e3">not not</tspan><tspan fill="#e8e8e8"> val</tspan></text>
  <text x="76" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 오류 무시 (silent error)</text>
  <text x="76" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">try</tspan><tspan fill="#e8e8e8">:</tspan></text>
  <text x="76" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    risky()</tspan></text>
  <text x="76" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">except</tspan><tspan fill="#e8e8e8">:</tspan></text>
  <text x="76" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    </tspan><tspan fill="#7ec8e3">pass</tspan><tspan fill="#6a8aa0">  # 모든 오류 숨김</tspan></text>

  <!-- Good code block -->
  <rect x="460" y="124" width="360" height="166" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="476" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 명시적 (의도가 분명)</text>
  <text x="476" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">def</tspan><tspan fill="#e8e8e8"> </tspan><tspan fill="#55c555">is_ok</tspan><tspan fill="#e8e8e8">(val):</tspan></text>
  <text x="476" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    </tspan><tspan fill="#7ec8e3">return</tspan><tspan fill="#e8e8e8"> </tspan><tspan fill="#7ec8e3">bool</tspan><tspan fill="#e8e8e8">(val)</tspan></text>
  <text x="476" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 오류 명시적 처리</text>
  <text x="476" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">try</tspan><tspan fill="#e8e8e8">:</tspan></text>
  <text x="476" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    risky()</tspan></text>
  <text x="476" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">except</tspan><tspan fill="#e8e8e8"> ValueError </tspan><tspan fill="#7ec8e3">as</tspan><tspan fill="#e8e8e8"> e:</tspan></text>
  <text x="476" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    log(e)</tspan><tspan fill="#6a8aa0">  # 오류 기록</tspan></text>

  <!-- Summary boxes -->
  <rect x="60" y="308" width="360" height="132" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="332" text-anchor="middle" font-size="12" font-weight="700" fill="#e05555">위반 패턴</text>
  <text x="80" y="356" font-size="11" fill="#aaa">• not not x — 의도 불명확</text>
  <text x="80" y="376" font-size="11" fill="#aaa">• bare except — 모든 오류 숨김</text>
  <text x="80" y="396" font-size="11" fill="#aaa">• magic number — 맥락 없는 숫자</text>
  <text x="80" y="416" font-size="11" fill="#aaa">• 한 줄에 너무 많은 동작 압축</text>

  <rect x="460" y="308" width="360" height="132" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="332" text-anchor="middle" font-size="12" font-weight="700" fill="#55c555">Zen 준수 패턴</text>
  <text x="480" y="356" font-size="11" fill="#aaa">• bool(x) — 변환 의도 명시</text>
  <text x="480" y="376" font-size="11" fill="#aaa">• 구체적 예외 명시</text>
  <text x="480" y="396" font-size="11" fill="#aaa">• 상수에 이름 부여</text>
  <text x="480" y="416" font-size="11" fill="#aaa">• 읽히는 단계로 코드 분리</text>
</svg>
