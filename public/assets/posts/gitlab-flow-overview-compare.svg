<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-w" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8e8e8"/>
    </marker>
    <marker id="arr-o" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e0955e"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">GitHub Flow vs GitLab Flow</text>

  <!-- Divider -->
  <line x1="440" y1="65" x2="440" y2="430" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ===== LEFT: GitHub Flow ===== -->
  <text x="220" y="90" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">GitHub Flow</text>

  <!-- feature → main → deploy -->
  <rect x="60" y="115" width="140" height="40" rx="6" fill="#071624" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="140" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">feature 브랜치</text>

  <line x1="130" y1="155" x2="130" y2="188" stroke="#e8e8e8" stroke-width="2" marker-end="url(#arr-w)"/>
  <text x="148" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">PR 머지</text>

  <rect x="60" y="195" width="140" height="40" rx="6" fill="#071624" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="220" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">main</text>

  <line x1="130" y1="235" x2="130" y2="268" stroke="#e8e8e8" stroke-width="2" marker-end="url(#arr-w)"/>
  <text x="148" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">자동 배포</text>

  <rect x="60" y="275" width="140" height="40" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="130" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">production</text>

  <!-- GitHub Flow characteristics -->
  <rect x="40" y="340" width="380" height="80" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="60" y="364"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· 브랜치 2종 (feature, main)</text>
  <text x="60" y="384"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· main 머지 즉시 프로덕션 배포</text>
  <text x="60" y="404"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· 강력한 CI/CD 인프라 필수</text>

  <!-- ===== RIGHT: GitLab Flow ===== -->
  <text x="660" y="90" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e0955e">GitLab Flow</text>

  <!-- feature → main → staging → production -->
  <rect x="590" y="115" width="140" height="40" rx="6" fill="#071624" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="660" y="140" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">feature 브랜치</text>

  <line x1="660" y1="155" x2="660" y2="188" stroke="#e8e8e8" stroke-width="2" marker-end="url(#arr-w)"/>

  <rect x="590" y="195" width="140" height="40" rx="6" fill="#071624" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="660" y="220" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">main</text>

  <line x1="660" y1="235" x2="660" y2="268" stroke="#e0955e" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-o)"/>
  <text x="678" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e0955e">환경 배포</text>

  <rect x="590" y="275" width="140" height="40" rx="6" fill="#1a150a" stroke="#e0955e" stroke-width="1.5"/>
  <text x="660" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0955e">staging</text>

  <line x1="660" y1="315" x2="660" y2="348" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-g)"/>

  <rect x="590" y="355" width="140" height="40" rx="6" fill="#071a07" stroke="#55c555" stroke-width="1.5"/>
  <text x="660" y="380" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">production</text>

  <!-- GitLab Flow characteristics -->
  <text x="476" y="364"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· 환경 브랜치 추가</text>
  <text x="476" y="384"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· 검증 단계 분리</text>
  <text x="476" y="404"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· 업스트림 순서 강제</text>
</svg>
