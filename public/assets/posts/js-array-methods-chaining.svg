<svg viewBox="0 0 880 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>text { font-family: 'Wanted Sans Variable', 'Wanted Sans', -apple-system, sans-serif; }</style>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#444"/>
    </marker>
  </defs>
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="40" fill="#e8e8e8" font-size="18" font-weight="600" text-anchor="middle">메서드 체이닝 — 데이터 파이프라인</text>
  <line x1="40" y1="54" x2="840" y2="54" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Example label -->
  <text x="40" y="80" fill="#555" font-size="11">활성 사용자의 총 점수 계산</text>

  <!-- Code block -->
  <rect x="20" y="90" width="840" height="110" fill="#111" rx="8"/>
  <text x="40" y="112" fill="#555" font-size="11" font-family="monospace, 'Courier New'">const result = users</text>
  <text x="40" y="130" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">  .<tspan fill="#7dd3fc">filter</tspan>(u =&gt; u.active)                     <tspan fill="#555">// 1. 활성 사용자만</tspan></text>
  <text x="40" y="148" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">  .<tspan fill="#86efac">map</tspan>(u =&gt; u.score * (u.premium ? 1.5 : 1)) <tspan fill="#555">// 2. 점수 변환 (프리미엄 보너스)</tspan></text>
  <text x="40" y="166" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">  .<tspan fill="#fbbf24">reduce</tspan>((sum, score) =&gt; sum + score, 0)    <tspan fill="#555">// 3. 합산</tspan></text>
  <text x="40" y="184" fill="#555" font-size="11" font-family="monospace, 'Courier New'">  <tspan fill="#444">// 결과: 숫자 하나</tspan></text>

  <!-- Pipeline stages -->
  <!-- Stage 1: Raw data -->
  <rect x="20" y="220" width="140" height="68" fill="#141414" rx="6"/>
  <text x="90" y="240" fill="#888" font-size="10" text-anchor="middle">원본 배열</text>
  <text x="90" y="258" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'" text-anchor="middle">users[]</text>
  <text x="90" y="276" fill="#555" font-size="10" text-anchor="middle">5명 (활성 3, 비활성 2)</text>

  <!-- Arrow 1 -->
  <line x1="162" y1="254" x2="198" y2="254" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="180" y="244" fill="#7dd3fc" font-size="10" text-anchor="middle">filter</text>

  <!-- Stage 2: Filtered -->
  <rect x="200" y="220" width="140" height="68" fill="#0d1f0d" rx="6"/>
  <text x="270" y="240" fill="#888" font-size="10" text-anchor="middle">필터 결과</text>
  <text x="270" y="258" fill="#86efac" font-size="11" font-family="monospace, 'Courier New'" text-anchor="middle">[ u1, u2, u3 ]</text>
  <text x="270" y="276" fill="#555" font-size="10" text-anchor="middle">3명 (비활성 제거)</text>

  <!-- Arrow 2 -->
  <line x1="342" y1="254" x2="378" y2="254" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="360" y="244" fill="#86efac" font-size="10" text-anchor="middle">map</text>

  <!-- Stage 3: Mapped -->
  <rect x="380" y="220" width="165" height="68" fill="#0d1a1f" rx="6"/>
  <text x="462" y="240" fill="#888" font-size="10" text-anchor="middle">변환 결과</text>
  <text x="462" y="258" fill="#7dd3fc" font-size="11" font-family="monospace, 'Courier New'" text-anchor="middle">[ 150, 80, 225 ]</text>
  <text x="462" y="276" fill="#555" font-size="10" text-anchor="middle">점수 (프리미엄 ×1.5)</text>

  <!-- Arrow 3 -->
  <line x1="547" y1="254" x2="583" y2="254" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="565" y="244" fill="#fbbf24" font-size="10" text-anchor="middle">reduce</text>

  <!-- Stage 4: Result -->
  <rect x="585" y="220" width="140" height="68" fill="#1a1400" rx="6"/>
  <text x="655" y="240" fill="#888" font-size="10" text-anchor="middle">최종 결과</text>
  <text x="655" y="260" fill="#fbbf24" font-size="16" font-weight="600" font-family="monospace, 'Courier New'" text-anchor="middle">455</text>
  <text x="655" y="278" fill="#555" font-size="10" text-anchor="middle">150 + 80 + 225</text>

  <!-- Reduce detail explanation -->
  <rect x="740" y="220" width="120" height="68" fill="#111" rx="6"/>
  <text x="800" y="239" fill="#555" font-size="10" text-anchor="middle">reduce 과정</text>
  <text x="800" y="255" fill="#888" font-size="10" font-family="monospace, 'Courier New'" text-anchor="middle">0 + 150 = 150</text>
  <text x="800" y="269" fill="#888" font-size="10" font-family="monospace, 'Courier New'" text-anchor="middle">150 + 80 = 230</text>
  <text x="800" y="283" fill="#e8e8e8" font-size="10" font-family="monospace, 'Courier New'" text-anchor="middle">230 + 225 = 455</text>

  <!-- Additional patterns -->
  <text x="40" y="320" fill="#555" font-size="11">자주 쓰는 체이닝 패턴</text>
  <line x1="40" y1="328" x2="840" y2="328" stroke="#1a1a1a" stroke-width="1"/>

  <rect x="20" y="336" width="260" height="62" fill="#111" rx="6"/>
  <text x="36" y="354" fill="#888" font-size="10">중복 제거 후 정렬</text>
  <text x="36" y="372" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">[...new Set(arr)]</text>
  <text x="36" y="388" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">  .toSorted()</text>

  <rect x="296" y="336" width="274" height="62" fill="#111" rx="6"/>
  <text x="312" y="354" fill="#888" font-size="10">중첩 배열 평탄화 + 변환</text>
  <text x="312" y="372" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">arr.flatMap(x =&gt; [x, x * 2])</text>
  <text x="312" y="388" fill="#555" font-size="10" font-family="monospace, 'Courier New'">[1,2] → [1,2,2,4]</text>

  <rect x="586" y="336" width="274" height="62" fill="#111" rx="6"/>
  <text x="602" y="354" fill="#888" font-size="10">객체 배열을 맵으로 변환</text>
  <text x="602" y="372" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">Object.fromEntries(</text>
  <text x="602" y="388" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">  arr.map(u =&gt; [u.id, u]))</text>
</svg>
