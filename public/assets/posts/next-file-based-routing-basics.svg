<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="rarr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">파일 기반 라우팅</text>
  <text x="440" y="70" text-anchor="middle" font-size="14" fill="#888">폴더 구조 = URL 구조</text>

  <!-- Column headers -->
  <text x="200" y="98" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">파일 경로</text>
  <text x="660" y="98" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">URL 경로</text>
  <line x1="60" y1="106" x2="820" y2="106" stroke="#333" stroke-width="1"/>

  <!-- Row 1 -->
  <rect x="60" y="116" width="300" height="50" rx="6" fill="#0c1a1f" stroke="#333" stroke-width="1"/>
  <text x="210" y="147" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">app/page.tsx</text>
  <line x1="370" y1="141" x2="468" y2="141" stroke="#55c555" stroke-width="2" marker-end="url(#rarr)"/>
  <rect x="480" y="116" width="300" height="50" rx="6" fill="#0d1f0d" stroke="#333" stroke-width="1"/>
  <text x="630" y="147" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">/</text>

  <!-- Row 2 -->
  <rect x="60" y="178" width="300" height="50" rx="6" fill="#0c1a1f" stroke="#333" stroke-width="1"/>
  <text x="210" y="209" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">app/about/page.tsx</text>
  <line x1="370" y1="203" x2="468" y2="203" stroke="#55c555" stroke-width="2" marker-end="url(#rarr)"/>
  <rect x="480" y="178" width="300" height="50" rx="6" fill="#0d1f0d" stroke="#333" stroke-width="1"/>
  <text x="630" y="209" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">/about</text>

  <!-- Row 3 -->
  <rect x="60" y="240" width="300" height="50" rx="6" fill="#0c1a1f" stroke="#333" stroke-width="1"/>
  <text x="210" y="271" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">app/blog/page.tsx</text>
  <line x1="370" y1="265" x2="468" y2="265" stroke="#55c555" stroke-width="2" marker-end="url(#rarr)"/>
  <rect x="480" y="240" width="300" height="50" rx="6" fill="#0d1f0d" stroke="#333" stroke-width="1"/>
  <text x="630" y="271" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">/blog</text>

  <!-- Row 4 (dynamic) -->
  <rect x="60" y="302" width="300" height="50" rx="6" fill="#10102a" stroke="#7777cc" stroke-width="1"/>
  <text x="210" y="333" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">app/blog/[slug]/page.tsx</text>
  <line x1="370" y1="327" x2="468" y2="327" stroke="#7777cc" stroke-width="2" marker-end="url(#rarr)"/>
  <rect x="480" y="302" width="300" height="50" rx="6" fill="#10102a" stroke="#7777cc" stroke-width="1"/>
  <text x="630" y="327" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">/blog/:slug</text>

  <!-- Row 5 (nested) -->
  <rect x="60" y="364" width="300" height="50" rx="6" fill="#1a150a" stroke="#ce9178" stroke-width="1"/>
  <text x="210" y="395" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">app/shop/[id]/review/page.tsx</text>
  <line x1="370" y1="389" x2="468" y2="389" stroke="#ce9178" stroke-width="2" marker-end="url(#rarr)"/>
  <rect x="480" y="364" width="300" height="50" rx="6" fill="#1a150a" stroke="#ce9178" stroke-width="1"/>
  <text x="630" y="395" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">/shop/:id/review</text>
</svg>
