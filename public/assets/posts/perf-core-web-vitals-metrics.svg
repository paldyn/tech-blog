<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Core Web Vitals — 3가지 핵심 지표</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">Google이 검색 순위에 반영하는 사용자 경험 지표</text>

  <!-- LCP -->
  <rect x="60" y="96" width="240" height="200" rx="10" fill="#0d1f0d" stroke="#55c555" stroke-width="2"/>
  <text x="180" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#55c555" text-anchor="middle">LCP</text>
  <text x="180" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">Largest Contentful Paint</text>
  <text x="180" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">로딩 성능</text>
  <text x="180" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">가장 큰 콘텐츠 요소가</text>
  <text x="180" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">화면에 렌더된 시간</text>
  <!-- Score bars -->
  <rect x="80" y="232" width="60" height="18" rx="4" fill="#0d2a0d" stroke="#55c555" stroke-width="1"/>
  <text x="110" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">≤2.5s 좋음</text>
  <rect x="150" y="232" width="60" height="18" rx="4" fill="#2a2a0d" stroke="#e0a055" stroke-width="1"/>
  <text x="180" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e0a055" text-anchor="middle">≤4s 보통</text>
  <rect x="220" y="232" width="60" height="18" rx="4" fill="#2a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="250" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">&gt;4s 나쁨</text>
  <text x="180" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">이미지·비디오·텍스트 블록</text>

  <!-- INP -->
  <rect x="320" y="96" width="240" height="200" rx="10" fill="#0d1f2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#7ec8e3" text-anchor="middle">INP</text>
  <text x="440" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">Interaction to Next Paint</text>
  <text x="440" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">상호작용 반응성</text>
  <text x="440" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">클릭·키 입력에서</text>
  <text x="440" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">다음 렌더까지 시간</text>
  <rect x="340" y="232" width="60" height="18" rx="4" fill="#0d2a0d" stroke="#55c555" stroke-width="1"/>
  <text x="370" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">≤200ms</text>
  <rect x="410" y="232" width="60" height="18" rx="4" fill="#2a2a0d" stroke="#e0a055" stroke-width="1"/>
  <text x="440" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e0a055" text-anchor="middle">≤500ms</text>
  <rect x="480" y="232" width="60" height="18" rx="4" fill="#2a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="510" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">&gt;500ms</text>
  <text x="440" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">FID를 대체 (2024년~)</text>

  <!-- CLS -->
  <rect x="580" y="96" width="240" height="200" rx="10" fill="#1f0d1f" stroke="#7777cc" stroke-width="2"/>
  <text x="700" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#7777cc" text-anchor="middle">CLS</text>
  <text x="700" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">Cumulative Layout Shift</text>
  <text x="700" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">시각적 안정성</text>
  <text x="700" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">예기치 않은 레이아웃</text>
  <text x="700" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">이동의 누적 점수</text>
  <rect x="600" y="232" width="60" height="18" rx="4" fill="#0d2a0d" stroke="#55c555" stroke-width="1"/>
  <text x="630" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">≤0.1 좋음</text>
  <rect x="670" y="232" width="60" height="18" rx="4" fill="#2a2a0d" stroke="#e0a055" stroke-width="1"/>
  <text x="700" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e0a055" text-anchor="middle">≤0.25</text>
  <rect x="740" y="232" width="60" height="18" rx="4" fill="#2a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="770" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">&gt;0.25</text>
  <text x="700" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">이미지 크기·광고·폰트</text>

  <!-- Measurement code -->
  <rect x="60" y="316" width="760" height="160" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// web-vitals 라이브러리로 측정</text>
  <text x="76" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">import</tspan> { onLCP, onINP, onCLS } <tspan fill="#7ec8e3" font-weight="600">from</tspan> <tspan fill="#ce9178">'web-vitals'</tspan>;</text>
  <text x="76" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">onLCP(metric => sendToAnalytics({ name: <tspan fill="#ce9178">'LCP'</tspan>, value: metric.value }));</text>
  <text x="76" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">onINP(metric => sendToAnalytics({ name: <tspan fill="#ce9178">'INP'</tspan>, value: metric.value }));</text>
  <text x="76" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">onCLS(metric => sendToAnalytics({ name: <tspan fill="#ce9178">'CLS'</tspan>, value: metric.value }));</text>
  <text x="76" y="434" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// reportAllChanges: true로 실시간 업데이트 수신 가능</text>
  <text x="76" y="452" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">onCLS(handler, { reportAllChanges: <tspan fill="#b5cea8">true</tspan> });</text>
  <text x="76" y="466" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 기본값: 세션 완료(페이지 언로드/숨김) 시 한 번 보고</text>
</svg>
