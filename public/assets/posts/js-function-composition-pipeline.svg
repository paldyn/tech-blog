<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">실전 파이프라인 패턴</text>
  <text x="440" y="70" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">Data Transform Pipeline with pipe</text>

  <!-- Pipeline code -->
  <rect x="60" y="90" width="760" height="230" fill="#111" rx="10" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="112" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" text-anchor="middle">사용자 데이터 정제 파이프라인</text>

  <rect x="76" y="122" width="727" height="180" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="92" y="142" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">const</tspan> pipe = (...fns) =&gt; x =&gt; fns.reduce((v, f) =&gt; f(v), x);</text>
  <text x="92" y="164" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">// 각 변환 함수 — 모두 순수, 단독 테스트 가능</text>
  <text x="92" y="182" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">const</tspan> trim       = s =&gt; s.trim();</text>
  <text x="92" y="200" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">const</tspan> lower      = s =&gt; s.toLowerCase();</text>
  <text x="92" y="218" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">const</tspan> removeAt   = s =&gt; s.replace(<tspan fill="#ce9178">/@.*$/</tspan>, <tspan fill="#ce9178">''</tspan>);</text>
  <text x="92" y="236" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">const</tspan> addDomain  = s =&gt; <tspan fill="#ce9178">`</tspan><tspan fill="#e8e8e8">${s}</tspan><tspan fill="#ce9178">@company.com`</tspan>;</text>
  <text x="92" y="258" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">// 파이프라인 조립</text>
  <text x="92" y="276" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">const</tspan> normalizeEmail = pipe(trim, lower, removeAt, addDomain);</text>
  <text x="92" y="294" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">normalizeEmail(<tspan fill="#ce9178">'  Alice@Gmail.com  '</tspan>); <tspan fill="#6a8aa0">// 'alice@company.com'</tspan></text>

  <!-- Stage visualization -->
  <rect x="60" y="340" width="760" height="70" fill="#0d0d0d" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="360" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">각 단계의 출력</text>

  <rect x="76" y="368" width="136" height="28" fill="#1a1a2a" rx="5"/>
  <text x="144" y="386" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" text-anchor="middle">'Alice@Gmail.com'</text>
  <polygon points="214,382 224,376 224,388" fill="#7ec8e3"/>
  <rect x="226" y="368" width="136" height="28" fill="#1a1a2a" rx="5"/>
  <text x="294" y="386" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" text-anchor="middle">'alice@gmail.com'</text>
  <polygon points="364,382 374,376 374,388" fill="#7ec8e3"/>
  <rect x="376" y="368" width="100" height="28" fill="#1a1a2a" rx="5"/>
  <text x="426" y="386" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" text-anchor="middle">'alice'</text>
  <polygon points="478,382 490,376 490,388" fill="#55c555"/>
  <rect x="492" y="368" width="152" height="28" fill="#0a1a0a" rx="5"/>
  <text x="568" y="386" fill="#55c555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" text-anchor="middle">'alice@company.com'</text>

  <!-- Footer -->
  <text x="440" y="442" fill="#444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">PALDYN · JavaScript 완전 정복</text>
</svg>
