<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">BART 사전학습 노이즈 기법</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">텍스트에 다양한 노이즈를 추가 → Encoder-Decoder로 원문 복원</text>

  <!-- Noise types (6) -->
  <!-- 1. Token Masking -->
  <rect x="50" y="90" width="250" height="90" fill="#111827" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="175" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">① Token Masking</text>
  <text x="175" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">BERT의 MLM과 유사</text>
  <text x="175" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">나는 [M] 좋아한다</text>
  <text x="175" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">→ "나는 AI를 좋아한다"</text>

  <!-- 2. Token Deletion -->
  <rect x="320" y="90" width="250" height="90" fill="#111827" rx="6" stroke="#ce9178" stroke-width="1.5"/>
  <text x="445" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">② Token Deletion</text>
  <text x="445" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">토큰 삭제 (어느 위치인지 모름)</text>
  <text x="445" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">나는 좋아한다</text>
  <text x="445" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">→ "나는 AI를 좋아한다"</text>

  <!-- 3. Text Infilling -->
  <rect x="590" y="90" width="250" height="90" fill="#111827" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="715" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">③ Text Infilling</text>
  <text x="715" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">구간(span)을 단일 [MASK]로 교체</text>
  <text x="715" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">나는 [M] 한다</text>
  <text x="715" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">→ "나는 AI를 좋아한다"</text>

  <!-- 4. Sentence Permutation -->
  <rect x="50" y="200" width="250" height="90" fill="#111827" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="175" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">④ Sentence Permutation</text>
  <text x="175" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">문서 내 문장 순서 무작위 섞기</text>
  <text x="175" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">[S3][S1][S4][S2]</text>
  <text x="175" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">→ "[S1][S2][S3][S4]"</text>

  <!-- 5. Document Rotation -->
  <rect x="320" y="200" width="250" height="90" fill="#111827" rx="6" stroke="#e05555" stroke-width="1.5"/>
  <text x="445" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">⑤ Document Rotation</text>
  <text x="445" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">특정 토큰을 문서 시작으로 회전</text>
  <text x="445" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">좋아 한다 나는 AI를</text>
  <text x="445" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">→ "나는 AI를 좋아한다"</text>

  <!-- 6. Best combination -->
  <rect x="590" y="200" width="250" height="90" fill="#111827" rx="6" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="715" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#b5cea8" text-anchor="middle">최적 조합</text>
  <text x="715" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Text Infilling + Sent. Perm.</text>
  <text x="715" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">→ 요약·번역 파인튜닝 성능 최상</text>
  <text x="715" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#b5cea8" text-anchor="middle">CNN/DailyMail SOTA 달성</text>

  <!-- Architecture details -->
  <rect x="50" y="308" width="780" height="150" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">BART 아키텍처 특징</text>

  <!-- Encoder info -->
  <text x="66" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">인코더 (BERT 유사)</text>
  <text x="66" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">· 양방향 Self-Attention</text>
  <text x="66" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">· 노이즈 입력 처리</text>
  <text x="66" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">· 학습형 PE (최대 1024)</text>
  <text x="66" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">· 6 레이어, 1024 히든</text>
  <text x="66" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">BART-large: 400M</text>

  <!-- Decoder info -->
  <text x="280" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#ce9178">디코더 (GPT 유사)</text>
  <text x="280" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">· Causal Self-Attention</text>
  <text x="280" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">· Cross-Attention → 인코더</text>
  <text x="280" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">· 자기 회귀 생성</text>
  <text x="280" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">· 6 레이어, 1024 히든</text>

  <!-- Applications -->
  <text x="520" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">주요 응용</text>
  <text x="520" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">· 추상 요약 (SOTA)</text>
  <text x="520" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">· 기계 번역</text>
  <text x="520" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">· 대화 생성</text>
  <text x="520" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">· mBART (다국어 확장)</text>
  <text x="520" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">· 데이터 증강</text>
</svg>
