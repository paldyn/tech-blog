<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <!-- Title -->
    <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">블룸 필터 (Bloom Filter) 구조</text>
    <text x="440" y="70" font-size="14" fill="#888" text-anchor="middle">m개의 비트 배열 + k개의 해시 함수 → 공간 효율적 멤버십 확인</text>

    <!-- Insert "apple" -->
    <text x="120" y="108" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">삽입: "apple"</text>

    <!-- Three hash functions -->
    <rect x="60" y="120" width="120" height="36" fill="#1a2544" stroke="#3a4a6e" stroke-width="1" rx="4"/>
    <text x="120" y="143" font-size="13" fill="#e8e8e8" text-anchor="middle">h1("apple")=2</text>
    <rect x="60" y="162" width="120" height="36" fill="#1a2544" stroke="#3a4a6e" stroke-width="1" rx="4"/>
    <text x="120" y="185" font-size="13" fill="#e8e8e8" text-anchor="middle">h2("apple")=5</text>
    <rect x="60" y="204" width="120" height="36" fill="#1a2544" stroke="#3a4a6e" stroke-width="1" rx="4"/>
    <text x="120" y="227" font-size="13" fill="#e8e8e8" text-anchor="middle">h3("apple")=9</text>

    <!-- Arrows from hash functions to bit array positions -->
    <line x1="180" y1="138" x2="258" y2="188" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
    <line x1="180" y1="180" x2="288" y2="188" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
    <line x1="180" y1="222" x2="348" y2="188" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

    <!-- Bit array (12 bits, 0-11) -->
    <text x="450" y="108" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">비트 배열 (m=12)</text>

    <!-- Bit boxes -->
    <!-- bit 0 -->
    <rect x="218" y="160" width="38" height="38" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="3"/>
    <text x="237" y="175" font-size="10" fill="#555" text-anchor="middle">0</text>
    <text x="237" y="191" font-size="13" fill="#555" text-anchor="middle">0</text>
    <!-- bit 1 -->
    <rect x="258" y="160" width="38" height="38" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="3"/>
    <text x="277" y="175" font-size="10" fill="#555" text-anchor="middle">1</text>
    <text x="277" y="191" font-size="13" fill="#555" text-anchor="middle">0</text>
    <!-- bit 2: SET -->
    <rect x="298" y="160" width="38" height="38" fill="#0d2a1e" stroke="#55c555" stroke-width="2" rx="3"/>
    <text x="317" y="175" font-size="10" fill="#55c555" text-anchor="middle">2</text>
    <text x="317" y="191" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">1</text>
    <!-- bit 3 -->
    <rect x="338" y="160" width="38" height="38" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="3"/>
    <text x="357" y="175" font-size="10" fill="#555" text-anchor="middle">3</text>
    <text x="357" y="191" font-size="13" fill="#555" text-anchor="middle">0</text>
    <!-- bit 4 -->
    <rect x="378" y="160" width="38" height="38" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="3"/>
    <text x="397" y="175" font-size="10" fill="#555" text-anchor="middle">4</text>
    <text x="397" y="191" font-size="13" fill="#555" text-anchor="middle">0</text>
    <!-- bit 5: SET -->
    <rect x="418" y="160" width="38" height="38" fill="#0d2a1e" stroke="#55c555" stroke-width="2" rx="3"/>
    <text x="437" y="175" font-size="10" fill="#55c555" text-anchor="middle">5</text>
    <text x="437" y="191" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">1</text>
    <!-- bit 6 -->
    <rect x="458" y="160" width="38" height="38" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="3"/>
    <text x="477" y="175" font-size="10" fill="#555" text-anchor="middle">6</text>
    <text x="477" y="191" font-size="13" fill="#555" text-anchor="middle">0</text>
    <!-- bit 7 -->
    <rect x="498" y="160" width="38" height="38" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="3"/>
    <text x="517" y="175" font-size="10" fill="#555" text-anchor="middle">7</text>
    <text x="517" y="191" font-size="13" fill="#555" text-anchor="middle">0</text>
    <!-- bit 8 -->
    <rect x="538" y="160" width="38" height="38" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="3"/>
    <text x="557" y="175" font-size="10" fill="#555" text-anchor="middle">8</text>
    <text x="557" y="191" font-size="13" fill="#555" text-anchor="middle">0</text>
    <!-- bit 9: SET -->
    <rect x="578" y="160" width="38" height="38" fill="#0d2a1e" stroke="#55c555" stroke-width="2" rx="3"/>
    <text x="597" y="175" font-size="10" fill="#55c555" text-anchor="middle">9</text>
    <text x="597" y="191" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">1</text>
    <!-- bit 10 -->
    <rect x="618" y="160" width="38" height="38" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="3"/>
    <text x="637" y="175" font-size="10" fill="#555" text-anchor="middle">10</text>
    <text x="637" y="191" font-size="13" fill="#555" text-anchor="middle">0</text>
    <!-- bit 11 -->
    <rect x="658" y="160" width="38" height="38" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="3"/>
    <text x="677" y="175" font-size="10" fill="#555" text-anchor="middle">11</text>
    <text x="677" y="191" font-size="13" fill="#555" text-anchor="middle">0</text>

    <!-- Divider -->
    <line x1="60" y1="226" x2="820" y2="226" stroke="#2a3a5e" stroke-width="1" stroke-dasharray="4,4"/>

    <!-- Query section -->
    <text x="120" y="255" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">조회: "apple" — 있음?</text>
    <text x="500" y="255" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">조회: "grape" — 있음?</text>

    <!-- Query "apple" result -->
    <rect x="60" y="266" width="280" height="60" fill="#0d2a1e" stroke="#55c555" stroke-width="1" rx="6"/>
    <text x="200" y="288" font-size="13" fill="#e8e8e8" text-anchor="middle">h1=2✓  h2=5✓  h3=9✓</text>
    <text x="200" y="308" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">→ "있을 수 있음" (정답)</text>

    <!-- Query "grape" result -->
    <rect x="380" y="266" width="420" height="60" fill="#2a1010" stroke="#e05555" stroke-width="1" rx="6"/>
    <text x="590" y="288" font-size="13" fill="#e8e8e8" text-anchor="middle">h1=2✓  h2=5✓  h3=7✗</text>
    <text x="590" y="308" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">→ "확실히 없음" (정확)</text>

    <!-- Key properties -->
    <rect x="60" y="348" width="760" height="100" fill="#0f1a2e" stroke="#2a3a5e" stroke-width="1" rx="6"/>
    <text x="440" y="372" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">블룸 필터의 보장</text>
    <text x="200" y="398" font-size="13" fill="#55c555" font-weight="600" text-anchor="middle">거짓 음성(False Negative): 없음</text>
    <text x="200" y="418" font-size="12" fill="#888" text-anchor="middle">"없음"이면 확실히 없음</text>
    <text x="600" y="398" font-size="13" fill="#e05555" font-weight="600" text-anchor="middle">거짓 양성(False Positive): 있음</text>
    <text x="600" y="418" font-size="12" fill="#888" text-anchor="middle">"있음"이어도 실제로 없을 수 있음</text>
    <line x1="440" y1="355" x2="440" y2="435" stroke="#2a3a5e" stroke-width="1"/>
    <text x="440" y="440" font-size="12" fill="#555" text-anchor="middle">삭제 불가 (일반 블룸 필터)</text>
  </g>
</svg>
