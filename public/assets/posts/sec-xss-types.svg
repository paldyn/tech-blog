<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- 제목 -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">XSS 공격 유형 3가지</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">Stored · Reflected · DOM-based</text>

  <!-- Stored XSS -->
  <rect x="60" y="100" width="230" height="52" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="175" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">① Stored XSS</text>
  <text x="175" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">악성 스크립트 → DB 저장</text>

  <!-- Reflected XSS -->
  <rect x="325" y="100" width="230" height="52" rx="8" fill="#1a100a" stroke="#e8883a" stroke-width="1.5"/>
  <text x="440" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8883a" text-anchor="middle">② Reflected XSS</text>
  <text x="440" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">URL 파라미터 → 즉시 응답</text>

  <!-- DOM-based XSS -->
  <rect x="590" y="100" width="230" height="52" rx="8" fill="#0a0a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="705" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">③ DOM-based XSS</text>
  <text x="705" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">클라이언트 DOM 조작</text>

  <!-- Stored XSS flow -->
  <rect x="60" y="185" width="230" height="44" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="175" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">공격자: 댓글에 스크립트 삽입</text>
  <text x="175" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">&lt;script&gt;steal()&lt;/script&gt;</text>

  <line x1="175" y1="229" x2="175" y2="258" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>

  <rect x="60" y="260" width="230" height="44" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="175" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">서버: DB에 저장</text>
  <text x="175" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">모든 방문자에게 실행됨</text>

  <line x1="175" y1="304" x2="175" y2="333" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>

  <rect x="60" y="335" width="230" height="44" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="175" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">피해자: 쿠키/세션 탈취</text>
  <text x="175" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">영구적·지속적 공격</text>

  <!-- Reflected XSS flow -->
  <rect x="325" y="185" width="230" height="44" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="440" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">공격자: 악성 링크 전송</text>
  <text x="440" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">/search?q=&lt;script&gt;...</text>

  <line x1="440" y1="229" x2="440" y2="258" stroke="#e8883a" stroke-width="2" marker-end="url(#arr-red)"/>

  <rect x="325" y="260" width="230" height="44" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="440" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">서버: 파라미터 그대로 반환</text>
  <text x="440" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">HTML에 인라인 삽입</text>

  <line x1="440" y1="304" x2="440" y2="333" stroke="#e8883a" stroke-width="2" marker-end="url(#arr-red)"/>

  <rect x="325" y="335" width="230" height="44" rx="6" fill="#1a100a" stroke="#e8883a" stroke-width="1"/>
  <text x="440" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8883a" text-anchor="middle">피해자: 링크 클릭 시 실행</text>
  <text x="440" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">일회성·피싱 조합</text>

  <!-- DOM-based XSS flow -->
  <rect x="590" y="185" width="230" height="44" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="705" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">공격자: URL fragment 조작</text>
  <text x="705" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">#&lt;img onerror=steal()&gt;</text>

  <line x1="705" y1="229" x2="705" y2="258" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <rect x="590" y="260" width="230" height="44" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="705" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">서버: 정상 응답</text>
  <text x="705" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">JS가 DOM에 직접 삽입</text>

  <line x1="705" y1="304" x2="705" y2="333" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <rect x="590" y="335" width="230" height="44" rx="6" fill="#0a0a1a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="705" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">서버 로그에 안 남음</text>
  <text x="705" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">innerHTML 등 sink 오염</text>

  <!-- 대응책 박스 -->
  <rect x="60" y="405" width="760" height="90" rx="8" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="427" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">핵심 방어책</text>
  <text x="180" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">출력 시 HTML 이스케이프</text>
  <text x="180" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">&amp; &lt; &gt; " ' 변환</text>
  <text x="440" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">CSP 헤더 설정</text>
  <text x="440" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Content-Security-Policy</text>
  <text x="700" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">innerHTML 대신 textContent</text>
  <text x="700" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">DOM sink 안전하게 사용</text>
  <line x1="300" y1="415" x2="300" y2="490" stroke="#333" stroke-width="1"/>
  <line x1="575" y1="415" x2="575" y2="490" stroke="#333" stroke-width="1"/>
</svg>
