<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440"
     style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Props — 단방향 데이터 흐름</text>

  <!-- Parent component -->
  <rect x="60" y="68" width="760" height="160" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="96" y="94" font-size="14" font-weight="600" fill="#7ec8e3">부모: App</text>
  <rect x="76" y="106" width="728" height="108" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve">
    <tspan x="92" y="128" fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> App() {</tspan>
    <tspan x="92" dy="18" fill="#7ec8e3" font-weight="600">  const</tspan><tspan fill="#ffffff"> user = { name: </tspan><tspan fill="#ce9178">'Alice'</tspan><tspan fill="#ffffff">, score: </tspan><tspan fill="#b5cea8">42</tspan><tspan fill="#ffffff"> };</tspan>
    <tspan x="92" dy="18" fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">&lt;UserCard</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3">name</tspan><tspan fill="#ffffff">={user.name} </tspan><tspan fill="#7ec8e3">score</tspan><tspan fill="#ffffff">={user.score} </tspan><tspan fill="#7ec8e3">onLogin</tspan><tspan fill="#ffffff">={handleLogin} </tspan><tspan fill="#ce9178">/&gt;</tspan><tspan fill="#ffffff">;</tspan>
    <tspan x="92" dy="18" fill="#ffffff">}</tspan>
  </text>

  <!-- Arrow down -->
  <line x1="440" y1="228" x2="440" y2="270" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="500" y="254" font-size="12" fill="#7ec8e3">props 전달</text>

  <!-- Child component -->
  <rect x="60" y="270" width="760" height="110" rx="10" fill="#0f1629" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="96" y="294" font-size="14" font-weight="600" fill="#7ec8e3">자식: UserCard</text>
  <rect x="76" y="306" width="728" height="62" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve">
    <tspan x="92" y="328" fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> UserCard({ name, score, onLogin }) {</tspan>
    <tspan x="92" dy="18" fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">&lt;div&gt;</tspan><tspan fill="#ffffff">{name} — {score}점 </tspan><tspan fill="#ce9178">&lt;button</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3">onClick</tspan><tspan fill="#ffffff">={onLogin}</tspan><tspan fill="#ce9178">&gt;</tspan><tspan fill="#ffffff">로그인</tspan><tspan fill="#ce9178">&lt;/button&gt;&lt;/div&gt;</tspan><tspan fill="#ffffff">;</tspan>
    <tspan x="92" dy="18" fill="#ffffff">}</tspan>
  </text>

  <!-- Read-only note -->
  <rect x="60" y="398" width="340" height="32" rx="6" fill="#2a0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="230" y="419" text-anchor="middle" font-size="13" fill="#e05555">✕  자식은 props를 수정할 수 없다 (읽기 전용)</text>

  <rect x="480" y="398" width="340" height="32" rx="6" fill="#0f2a0f" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="419" text-anchor="middle" font-size="13" fill="#55c555">✓  부모가 내려준 콜백으로 상태 변경 요청</text>
</svg>
