<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" style="background:#0a0a0a">
  <defs>
    <marker id="arr-down" viewBox="0 0 14 14" refX="7" refY="12" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 14 0 L 7 13 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-right" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Props: 단방향 데이터 흐름</text>

  <!-- App (root) -->
  <rect x="330" y="68" width="220" height="54" rx="12" fill="#0f1f3d" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="91" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">App</text>
  <text x="440" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">user = { name: "홍길동" }</text>

  <!-- Arrow down to two children -->
  <line x1="380" y1="122" x2="240" y2="158" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-right)"/>
  <line x1="500" y1="122" x2="640" y2="158" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-right)"/>
  <text x="280" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">user prop</text>
  <text x="520" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">user prop</text>

  <!-- Header -->
  <rect x="110" y="166" width="220" height="54" rx="12" fill="#0f1825" stroke="#55c555" stroke-width="1.5"/>
  <text x="220" y="189" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">Header</text>
  <text x="220" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">props.user.name</text>

  <!-- Dashboard -->
  <rect x="550" y="166" width="220" height="54" rx="12" fill="#0f1825" stroke="#55c555" stroke-width="1.5"/>
  <text x="660" y="189" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">Dashboard</text>
  <text x="660" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">props.user</text>

  <line x1="660" y1="220" x2="660" y2="256" stroke="#55c555" stroke-width="2" marker-end="url(#arr-right)"/>
  <text x="668" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">user.name</text>

  <!-- UserCard (grandchild) -->
  <rect x="550" y="264" width="220" height="54" rx="12" fill="#0d2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="660" y="287" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">UserCard</text>
  <text x="660" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">props.name (읽기 전용)</text>

  <!-- Read-only annotation -->
  <rect x="60" y="362" width="760" height="116" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// Props는 읽기 전용 — 절대 직접 수정 불가</text>
  <text x="76" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">function</tspan><tspan fill="#ffffff"> UserCard({ name, score }) {</tspan></text>
  <text x="76" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#e05555">  // name = '다른이름'; </tspan><tspan fill="#9aa4b8">← ❌ TypeError! props는 읽기 전용</tspan></text>
  <text x="76" y="444" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan font-weight="600" fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> &lt;</tspan><tspan fill="#55c555">p</tspan><tspan fill="#ffffff">&gt;{name}: {score}점&lt;/</tspan><tspan fill="#55c555">p</tspan><tspan fill="#ffffff">&gt;;</tspan></text>
  <text x="76" y="464" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">}</text>
</svg>
