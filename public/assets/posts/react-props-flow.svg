<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;background:#0a0a0a">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Props: 단방향 데이터 흐름</text>
  <text x="440" y="72" font-size="14" fill="#888" text-anchor="middle">Props는 부모에서 자식으로만 흐른다 — 절대 거슬러 올라가지 않는다</text>

  <defs>
    <marker id="arr-down" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-up" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Parent (App) -->
  <rect x="310" y="95" width="260" height="70" rx="8" fill="#1a1a30" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="122" font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">App (부모)</text>
  <text x="440" y="143" font-size="12" fill="#888" text-anchor="middle">user = {{ name: 'Alice', score: 95 }}</text>

  <!-- Arrow: props down -->
  <line x1="440" y1="165" x2="440" y2="215" stroke="#55c555" stroke-width="2.5" marker-end="url(#arr-down)"/>
  <rect x="360" y="172" width="160" height="26" rx="4" fill="#0f1e12" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="189" font-size="12" fill="#55c555" text-anchor="middle">props 전달 (읽기 전용)</text>

  <!-- Child -->
  <rect x="280" y="215" width="320" height="70" rx="8" fill="#12201a" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="242" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">UserCard (자식)</text>
  <text x="440" y="262" font-size="12" fill="#888" text-anchor="middle">props.user = {{ name: 'Alice', score: 95 }}</text>

  <!-- Arrow: callback up -->
  <line x1="335" y1="215" x2="360" y2="165" stroke="#ce9178" stroke-width="2" stroke-dasharray="5,3"/>
  <rect x="230" y="182" width="180" height="26" rx="4" fill="#1e1a0a" stroke="#ce9178" stroke-width="1"/>
  <text x="320" y="199" font-size="12" fill="#ce9178" text-anchor="middle">callback으로 이벤트 전달</text>
  <text x="270" y="172" font-size="11" fill="#888">↑ 자식→부모 소통 방법</text>

  <!-- Arrow wrong direction -->
  <line x1="545" y1="215" x2="545" y2="165" stroke="#e05555" stroke-width="2" marker-end="url(#arr-up)"/>
  <rect x="558" y="185" width="130" height="24" rx="4" fill="#1e0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="623" y="201" font-size="12" fill="#e05555" text-anchor="middle">❌ props 직접 수정</text>
  <text x="623" y="218" font-size="11" fill="#888" text-anchor="middle">불가능 (읽기 전용)</text>

  <!-- Bottom code: props immutable -->
  <rect x="55" y="315" width="770" height="120" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="338" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Props는 읽기 전용 — 절대 변경하면 안 된다</text>
  <rect x="70" y="350" width="340" height="72" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="370" font-size="12" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// ❌ props 직접 변경 (오류)</text>
  <text x="82" y="388" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">function</text>
  <text x="125" y="388" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> Bad({ user }) {</text>
  <text x="82" y="406" font-size="13" fill="#e05555" font-family="'JetBrains Mono',monospace" xml:space="preserve">  user.name = 'Bob'</text>
  <text x="82" y="406" font-size="12" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">                    // ❌</text>

  <rect x="470" y="350" width="340" height="72" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="370" font-size="12" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// ✅ 로컬 변수로 파생값 계산</text>
  <text x="482" y="388" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">function</text>
  <text x="525" y="388" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> Good({ user }) {</text>
  <text x="482" y="406" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">  const</text>
  <text x="520" y="406" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> displayName = user.name</text>
</svg>
