<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Props — 단방향 데이터 흐름</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">부모 → 자식. 자식은 props를 읽기만 한다</text>

  <!-- Parent -->
  <rect x="290" y="96" width="300" height="80" rx="8" fill="#1a2a4a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">부모 컴포넌트</text>
  <text x="440" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">state를 소유. props로 내려보냄</text>

  <!-- Down arrow (props) -->
  <line x1="440" y1="176" x2="440" y2="226" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="480" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">props</text>

  <!-- Child -->
  <rect x="290" y="226" width="300" height="80" rx="8" fill="#0d1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">자식 컴포넌트</text>
  <text x="440" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">props를 받아 렌더. 직접 수정 불가</text>

  <!-- Up arrow (callback) -->
  <path d="M 360 306 Q 220 340 220 380 Q 220 420 360 420 Q 500 420 500 380 Q 500 340 560 306"
        fill="none" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4"
        marker-end="url(#arr)">
    <marker id="arr3" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </path>
  <text x="440" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">콜백 props로 부모에 이벤트 전달</text>

  <!-- Cannot modify note -->
  <rect x="60" y="246" width="210" height="60" rx="8" fill="#1a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="165" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">props 직접 수정 금지</text>
  <text x="165" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">props.value = 'x'  ❌</text>

  <!-- Readonly note -->
  <rect x="610" y="246" width="210" height="60" rx="8" fill="#0d1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="715" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">이벤트로 부모에 알림</text>
  <text x="715" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">onChange(newVal)  ✅</text>
</svg>
