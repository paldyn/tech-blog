<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">안전한 input() 패턴</text>

  <rect x="60" y="66" width="760" height="276" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text x="76" y="94" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 패턴 1: try-except로 잘못된 입력 처리</text>
  <text x="76" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">try</tspan><tspan fill="#ffffff">:</tspan></text>
  <text x="76" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    age = </tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#7ec8e3" font-weight="600">input</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"나이: "</tspan><tspan fill="#ffffff">))</tspan></text>
  <text x="76" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">except</tspan><tspan fill="#ffffff"> ValueError:</tspan></text>
  <text x="76" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">    print</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"숫자를 입력해주세요"</tspan><tspan fill="#ffffff">)</tspan></text>

  <text x="76" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 패턴 2: 유효한 입력이 들어올 때까지 반복</text>
  <text x="76" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">while True</tspan><tspan fill="#ffffff">:</tspan></text>
  <text x="76" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    raw = </tspan><tspan fill="#7ec8e3" font-weight="600">input</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"1~10 사이 숫자: "</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="76" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> raw.isdigit() </tspan><tspan fill="#7ec8e3" font-weight="600">and</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff"> &lt;= </tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff">(raw) &lt;= </tspan><tspan fill="#b5cea8">10</tspan><tspan fill="#ffffff">:</tspan></text>
  <text x="76" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">        number = </tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff">(raw)</tspan></text>
  <text x="76" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">        </tspan><tspan fill="#7ec8e3" font-weight="600">break</tspan></text>
  <text x="76" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">    print</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"잘못된 입력, 다시 시도하세요"</tspan><tspan fill="#ffffff">)</tspan></text>
</svg>
