<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arrow" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrow-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Git LFS 동작 원리</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">포인터는 저장소에, 실제 파일은 LFS 서버에</text>

  <!-- WITHOUT LFS (left) -->
  <text x="220" y="102" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555">LFS 없이</text>

  <!-- Git repo box -->
  <rect x="60" y="118" width="320" height="160" fill="#0d1520" rx="8" stroke="#2a3a5e" stroke-width="1"/>
  <text x="220" y="143" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#aaa">Git 저장소</text>

  <!-- Objects in repo (heavy) -->
  <rect x="80" y="158" width="130" height="40" fill="#1a0a0a" rx="6" stroke="#5a1a1a" stroke-width="1"/>
  <text x="145" y="182" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">video.mp4 (200MB)</text>
  <rect x="225" y="158" width="130" height="40" fill="#1a0a0a" rx="6" stroke="#5a1a1a" stroke-width="1"/>
  <text x="290" y="182" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">design.psd (80MB)</text>
  <rect x="80" y="212" width="130" height="40" fill="#1a0a0a" rx="6" stroke="#5a1a1a" stroke-width="1"/>
  <text x="145" y="236" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">archive.zip (150MB)</text>
  <rect x="225" y="212" width="130" height="40" fill="#0d1a0d" rx="6" stroke="#1a3a1a" stroke-width="1"/>
  <text x="290" y="236" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">main.go (2KB)</text>

  <text x="220" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">저장소 크기: 430MB+</text>

  <!-- WITH LFS (right) -->
  <text x="660" y="102" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">LFS 사용</text>

  <!-- Git repo (light) -->
  <rect x="500" y="118" width="180" height="160" fill="#0d1520" rx="8" stroke="#2a3a5e" stroke-width="1"/>
  <text x="590" y="143" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#aaa">Git 저장소</text>

  <!-- Pointer files -->
  <rect x="520" y="158" width="140" height="40" fill="#0a0f1a" rx="6" stroke="#2a4a6e" stroke-width="1"/>
  <text x="590" y="178" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">video.mp4.pointer</text>
  <text x="590" y="192" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">(134 bytes)</text>
  <rect x="520" y="210" width="140" height="40" fill="#0a0f1a" rx="6" stroke="#2a4a6e" stroke-width="1"/>
  <text x="590" y="230" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">design.psd.pointer</text>
  <text x="590" y="244" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">(134 bytes)</text>

  <text x="590" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">저장소 크기: ~2KB</text>

  <!-- Arrow from repo to LFS server -->
  <line x1="680" y1="200" x2="740" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- LFS server box -->
  <rect x="740" y="155" width="100" height="90" fill="#0d1a20" rx="8" stroke="#2a5a6e" stroke-width="1"/>
  <text x="790" y="185" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">LFS</text>
  <text x="790" y="200" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">서버</text>
  <text x="790" y="225" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">실제 파일</text>
  <text x="790" y="238" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">보관</text>

  <!-- Separator -->
  <line x1="440" y1="90" x2="440" y2="320" stroke="#1e2c4a" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Pointer file contents -->
  <rect x="60" y="328" width="760" height="100" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="350" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">LFS 포인터 파일 내용 (실제로 저장소에 커밋되는 텍스트)</text>
  <text xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan x="76" y="372" fill="#9aa4b8">version https://git-lfs.github.com/spec/v1</tspan>
    <tspan x="76" dy="18" fill="#7ec8e3" font-weight="600">oid</tspan><tspan fill="#ffffff"> sha256:4d7a214614ab2935c943f9e0ff69d22eadbb8f32</tspan>
    <tspan x="76" dy="18" fill="#7ec8e3" font-weight="600">size</tspan><tspan fill="#ffffff"> 209715200</tspan>
  </text>
</svg>
