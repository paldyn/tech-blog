<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Stream 파이프라인 구조</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">소스 → 중간 연산(지연) → 종료 연산(실행 트리거)</text>

  <!-- Pipeline stages -->
  <!-- Source -->
  <rect x="60" y="96" width="160" height="60" fill="#1a3a5a" rx="8" stroke="#7ec8e3" stroke-width="2"/>
  <text x="140" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">소스</text>
  <text x="140" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Collection / Array / etc.</text>

  <!-- Arrow -->
  <line x1="220" y1="126" x2="268" y2="126" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Intermediate 1: filter -->
  <rect x="272" y="96" width="140" height="60" fill="#0f2010" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="342" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">filter()</text>
  <text x="342" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">중간 연산 (지연)</text>
  <text x="342" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">Stateless</text>

  <!-- Arrow -->
  <line x1="412" y1="126" x2="458" y2="126" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Intermediate 2: map -->
  <rect x="462" y="96" width="140" height="60" fill="#0f2010" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="532" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">map()</text>
  <text x="532" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">중간 연산 (지연)</text>
  <text x="532" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">Stateless</text>

  <!-- Arrow -->
  <line x1="602" y1="126" x2="648" y2="126" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Terminal -->
  <rect x="652" y="96" width="168" height="60" fill="#2a1a1a" rx="8" stroke="#e05555" stroke-width="2"/>
  <text x="736" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555">collect()</text>
  <text x="736" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">종료 연산 (실행 트리거)</text>
  <text x="736" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">결과 생성</text>

  <!-- Lazy evaluation note -->
  <rect x="272" y="176" width="330" height="40" fill="#0a1520" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="437" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">종료 연산 호출 전까지 중간 연산은 실행되지 않음 (지연 평가)</text>

  <!-- Stateful vs Stateless -->
  <text x="440" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">중간 연산 분류 — Stateless vs Stateful</text>

  <rect x="60" y="266" width="370" height="140" fill="#0f2010" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="245" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">Stateless (이전 원소 불필요)</text>
  <text x="80" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">filter(Predicate)          — 조건 필터</text>
  <text x="80" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">map(Function)             — 변환</text>
  <text x="80" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">flatMap(Function)         — 펼치기</text>
  <text x="80" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">peek(Consumer)            — 사이드이펙트</text>

  <rect x="450" y="266" width="370" height="140" fill="#2a1a1a" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="635" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">Stateful (전체 원소 필요)</text>
  <text x="470" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">sorted()                  — 전체 정렬 버퍼링</text>
  <text x="470" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">distinct()                — 중복 추적 집합 필요</text>
  <text x="470" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">limit(n) / skip(n)        — 카운터 상태</text>
  <text x="470" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">병렬 스트림에서 성능 병목 주의</text>

  <!-- Short circuit -->
  <text x="440" y="430" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">단락 평가(short-circuit): findFirst·findAny·anyMatch·allMatch·noneMatch·limit — 조건 충족 시 즉시 종료</text>
  <text x="440" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">스트림은 1회 소비 — 종료 연산 후 재사용 불가 (IllegalStateException)</text>
  <text x="440" y="474" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">내부 반복(internal iteration): JVM이 원소 순회 제어 → 병렬화·최적화 용이</text>
</svg>
