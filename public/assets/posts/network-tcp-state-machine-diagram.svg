<svg xmlns="http://www.w3.org/2000/svg" width="880" height="620" viewBox="0 0 880 620">
  <defs>
    <marker id="a1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="a2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="a3" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="a4" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>

  <rect width="880" height="620" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">TCP 상태 머신 (11개 상태)</text>

  <!-- CLOSED -->
  <rect x="380" y="60" width="120" height="36" rx="6" fill="#1a1a1a" stroke="#555" stroke-width="1.5"/>
  <text x="440" y="83" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#888">CLOSED</text>

  <!-- Arrow CLOSED -> LISTEN (server) -->
  <line x1="380" y1="78" x2="214" y2="128" stroke="#55c555" stroke-width="1.5" marker-end="url(#a2)"/>
  <text x="265" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">listen()</text>

  <!-- Arrow CLOSED -> SYN_SENT (client) -->
  <line x1="500" y1="78" x2="666" y2="128" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="610" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3">connect()</text>

  <!-- LISTEN -->
  <rect x="120" y="130" width="120" height="36" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="180" y="153" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">LISTEN</text>

  <!-- SYN_SENT -->
  <rect x="640" y="130" width="120" height="36" rx="6" fill="#0a1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="700" y="153" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">SYN_SENT</text>

  <!-- LISTEN -> SYN_RCVD -->
  <line x1="180" y1="166" x2="180" y2="216" stroke="#55c555" stroke-width="1.5" marker-end="url(#a2)"/>
  <text x="100" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">SYN 수신</text>

  <!-- SYN_SENT -> ESTABLISHED (via SYN+ACK) -->
  <line x1="700" y1="166" x2="560" y2="216" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="648" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3">SYN+ACK 수신</text>

  <!-- SYN_RCVD -->
  <rect x="120" y="218" width="120" height="36" rx="6" fill="#0a1820" stroke="#7777cc" stroke-width="1.5"/>
  <text x="180" y="241" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc">SYN_RCVD</text>

  <!-- SYN_RCVD -> ESTABLISHED -->
  <line x1="240" y1="236" x2="380" y2="276" stroke="#7777cc" stroke-width="1.5" marker-end="url(#a4)"/>
  <text x="290" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7777cc">ACK 수신</text>

  <!-- ESTABLISHED -->
  <rect x="340" y="278" width="160" height="40" rx="6" fill="#0a2a0a" stroke="#55c555" stroke-width="2"/>
  <text x="420" y="303" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">ESTABLISHED</text>

  <!-- ESTABLISHED -> FIN_WAIT_1 -->
  <line x1="340" y1="298" x2="204" y2="350" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="240" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3">close()/FIN 전송</text>

  <!-- ESTABLISHED -> CLOSE_WAIT -->
  <line x1="500" y1="298" x2="636" y2="350" stroke="#e05555" stroke-width="1.5" marker-end="url(#a3)"/>
  <text x="590" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">FIN 수신</text>

  <!-- FIN_WAIT_1 -->
  <rect x="100" y="352" width="120" height="36" rx="6" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="375" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#7ec8e3">FIN_WAIT_1</text>

  <!-- CLOSE_WAIT -->
  <rect x="660" y="352" width="120" height="36" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="720" y="375" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e05555">CLOSE_WAIT</text>

  <!-- FIN_WAIT_1 -> FIN_WAIT_2 -->
  <line x1="160" y1="388" x2="160" y2="438" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="80" y="418" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">ACK 수신</text>

  <!-- CLOSE_WAIT -> LAST_ACK -->
  <line x1="720" y1="388" x2="720" y2="438" stroke="#e05555" stroke-width="1.5" marker-end="url(#a3)"/>
  <text x="790" y="418" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">close()/FIN 전송</text>

  <!-- FIN_WAIT_2 -->
  <rect x="100" y="440" width="120" height="36" rx="6" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="463" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#7ec8e3">FIN_WAIT_2</text>

  <!-- LAST_ACK -->
  <rect x="660" y="440" width="120" height="36" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="720" y="463" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e05555">LAST_ACK</text>

  <!-- FIN_WAIT_2 -> TIME_WAIT -->
  <line x1="160" y1="476" x2="260" y2="526" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#a1)"/>
  <text x="180" y="510" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">FIN 수신</text>

  <!-- LAST_ACK -> CLOSED -->
  <line x1="720" y1="476" x2="640" y2="526" stroke="#e05555" stroke-width="1.5" marker-end="url(#a3)"/>
  <text x="710" y="510" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">ACK 수신</text>

  <!-- TIME_WAIT -->
  <rect x="240" y="528" width="120" height="36" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="300" y="551" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e05555">TIME_WAIT</text>

  <!-- CLOSED (bottom) -->
  <rect x="540" y="528" width="120" height="36" rx="6" fill="#1a1a1a" stroke="#555" stroke-width="1.5"/>
  <text x="600" y="551" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#888">CLOSED</text>

  <!-- TIME_WAIT -> CLOSED -->
  <line x1="360" y1="546" x2="540" y2="546" stroke="#ce9178" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#a4)"/>
  <text x="450" y="540" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#ce9178">2MSL 타임아웃</text>

  <!-- Legend -->
  <rect x="60" y="586" width="760" height="24" rx="4" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="80" y1="598" x2="108" y2="598" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="112" y="603" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">클라이언트 경로</text>
  <line x1="230" y1="598" x2="258" y2="598" stroke="#55c555" stroke-width="1.5"/>
  <text x="262" y="603" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">서버 경로</text>
  <line x1="340" y1="598" x2="368" y2="598" stroke="#e05555" stroke-width="1.5"/>
  <text x="372" y="603" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">종료(Passive)</text>
  <line x1="470" y1="598" x2="498" y2="598" stroke="#ce9178" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="502" y="603" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178">타임아웃</text>
</svg>
