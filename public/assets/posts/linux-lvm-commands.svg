<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">LVM 핵심 명령어 — PV / VG / LV</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">각 계층마다 pv/vg/lv 접두사 명령어 사용</text>

  <!-- PV commands -->
  <text x="60" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">PV 명령어</text>
  <rect x="60" y="114" width="230" height="130" fill="#000000" rx="6" stroke="#888" stroke-width="1"/>
  <text x="76" y="133" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">pvcreate /dev/sdb1</text>
  <text x="76" y="151" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">pvs</text>
  <text x="76" y="169" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">pvdisplay /dev/sdb1</text>
  <text x="76" y="187" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">pvremove /dev/sdb1</text>
  <text x="76" y="205" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">pvmove /dev/sdb1</text>
  <text x="76" y="223" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" xml:space="preserve"># PE 이동 후 장치 제거</text>
  <text x="76" y="241" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">pvscan</text>

  <!-- VG commands -->
  <text x="325" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">VG 명령어</text>
  <rect x="325" y="114" width="230" height="130" fill="#000000" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="341" y="133" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">vgcreate vg0 /dev/sdb1</text>
  <text x="341" y="151" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">vgs</text>
  <text x="341" y="169" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">vgdisplay vg0</text>
  <text x="341" y="187" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">vgextend vg0 /dev/sdc1</text>
  <text x="341" y="205" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">vgreduce vg0 /dev/sdb1</text>
  <text x="341" y="223" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">vgrename vg0 vg_data</text>
  <text x="341" y="241" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">vgremove vg0</text>

  <!-- LV commands -->
  <text x="590" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">LV 명령어</text>
  <rect x="590" y="114" width="230" height="130" fill="#000000" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="606" y="133" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">lvcreate -L 50G -n lv_root vg0</text>
  <text x="606" y="151" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">lvs</text>
  <text x="606" y="169" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">lvdisplay /dev/vg0/lv_root</text>
  <text x="606" y="187" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" xml:space="preserve">lvextend -L +10G /dev/vg0/lv_root</text>
  <text x="606" y="205" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" xml:space="preserve">resize2fs /dev/vg0/lv_root</text>
  <text x="606" y="223" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">lvremove /dev/vg0/lv_root</text>
  <text x="606" y="241" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc" xml:space="preserve">lvcreate -s -L 5G -n snap lv_root</text>

  <!-- Extend workflow -->
  <text x="60" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">LV 온라인 확장 워크플로 (ext4)</text>
  <rect x="60" y="284" width="760" height="112" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="303" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 남은 VG 공간 확인</text>
  <text x="76" y="321" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">vgs</text>
  <text x="400" y="303" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># LV 확장 + FS 동시 처리</text>
  <text x="400" y="321" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">lvresize -L +20G -r /dev/vg0/lv_home</text>
  <text x="76" y="339" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># VG에 새 PV 추가 (디스크 확장)</text>
  <text x="76" y="357" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">pvcreate /dev/sdd</text>
  <text x="76" y="375" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">vgextend vg0 /dev/sdd</text>
  <text x="400" y="357" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 이제 LV에 최대 공간까지 확장 가능</text>
  <text x="400" y="375" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">lvresize -l +100%FREE -r /dev/vg0/lv_home</text>
  <text x="76" y="393" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 확인</text>
  <text x="400" y="393" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">df -h /home</text>
</svg>
