<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">UserDetails 인터페이스와 인증 로딩 흐름</text>

  <!-- ===== 왼쪽: UserDetails 인터페이스 ===== -->
  <rect x="60" y="62" width="370" height="390" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="245" y="87" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">UserDetails 인터페이스</text>
  <line x1="60" y1="98" x2="430" y2="98" stroke="#7ec8e3" stroke-width="1" opacity="0.35"/>

  <!-- 7개 메서드 목록: body=98~452=354px, 6×41=246span
       pad=(354-246-13)/2=47.5 → first=98+47.5+10=155.5≈156 -->
  <!-- Row 1: getUsername() -->
  <text x="80" y="156"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">getUsername()</text>
  <text x="260" y="156"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">→ String  로그인 식별자</text>

  <!-- Row 2: getPassword() -->
  <text x="80" y="197"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">getPassword()</text>
  <text x="260" y="197"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">→ String  인코딩된 비밀번호</text>

  <!-- Row 3: getAuthorities() -->
  <text x="80" y="238"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">getAuthorities()</text>
  <text x="260" y="238"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">→ Collection  권한 목록</text>

  <!-- Row 4: isAccountNonExpired() -->
  <text x="80" y="279"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">isAccountNonExpired()</text>
  <text x="80" y="294"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">계정 만료 여부 (true = 미만료)</text>

  <!-- Row 5: isAccountNonLocked() -->
  <text x="80" y="323"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">isAccountNonLocked()</text>
  <text x="80" y="338"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">계정 잠금 여부 (true = 미잠금)</text>

  <!-- Row 6: isCredentialsNonExpired() -->
  <text x="80" y="367"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">isCredentialsNonExpired()</text>
  <text x="80" y="382"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">비밀번호 만료 여부 (true = 미만료)</text>

  <!-- Row 7: isEnabled() -->
  <text x="80" y="411"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">isEnabled()</text>
  <text x="80" y="426"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">계정 활성화 여부 (true = 사용 가능)</text>

  <!-- ===== 오른쪽: 인증 로딩 흐름 ===== -->
  <rect x="450" y="62" width="370" height="390" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="635" y="87" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">인증 로딩 흐름</text>
  <line x1="450" y1="98" x2="820" y2="98" stroke="#55c555" stroke-width="1" opacity="0.35"/>

  <!-- 5개 flow 박스 (w=320, h=42, x=470)
       body=98~452=354px, 4×54=216span
       pad=(354-216-13)/2=62.5 → first=98+62.5+10=170.5≈171 -->
  <!-- Flow Box 1: AuthenticationManager -->
  <rect x="470" y="112" width="320" height="42" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.2"/>
  <text x="630" y="133" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">① AuthenticationManager</text>
  <text x="630" y="148" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">폼 로그인 → 인증 요청 시작</text>

  <!-- Arrow 1 -->
  <line x1="630" y1="154" x2="630" y2="180"
        stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- Flow Box 2: UserDetailsService -->
  <rect x="470" y="182" width="320" height="42" rx="6" fill="#0a1a0a" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="630" y="203" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">② UserDetailsService</text>
  <text x="630" y="218" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">loadUserByUsername(username) 호출</text>

  <!-- Arrow 2 -->
  <line x1="630" y1="224" x2="630" y2="250"
        stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Flow Box 3: Repository -->
  <rect x="470" y="252" width="320" height="42" rx="6" fill="#0a1a0a" stroke="#7777cc" stroke-width="1.2"/>
  <text x="630" y="273" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">③ UserRepository</text>
  <text x="630" y="288" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">DB에서 사용자 엔티티 조회</text>

  <!-- Arrow 3 -->
  <line x1="630" y1="294" x2="630" y2="320"
        stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Flow Box 4: UserDetails 반환 -->
  <rect x="470" y="322" width="320" height="42" rx="6" fill="#0a1a0a" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="630" y="343" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">④ UserDetails 반환</text>
  <text x="630" y="358" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">엔티티 → UserDetails 변환 후 반환</text>

  <!-- Arrow 4 -->
  <line x1="630" y1="364" x2="630" y2="390"
        stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- Flow Box 5: PasswordEncoder -->
  <rect x="470" y="392" width="320" height="42" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="630" y="413" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">⑤ PasswordEncoder.matches()</text>
  <text x="630" y="428" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">입력 비밀번호와 해시 비교 → 인증 성공/실패</text>
</svg>
