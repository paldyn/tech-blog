<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Plot 차트 타입 개요</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">Bar · Line · Pie · Area · Scatter</text>

  <!-- Bar Chart Box -->
  <rect x="60" y="96" width="230" height="180" fill="#111827" rx="8" stroke="#3a4a6e"/>
  <text x="175" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Bar</text>
  <!-- Bar chart bars -->
  <rect x="90" y="200" width="28" height="50" fill="#7ec8e3" rx="2"/>
  <rect x="128" y="170" width="28" height="80" fill="#7ec8e3" rx="2"/>
  <rect x="166" y="185" width="28" height="65" fill="#7ec8e3" rx="2"/>
  <rect x="204" y="155" width="28" height="95" fill="#7ec8e3" rx="2"/>
  <line x1="80" y1="255" x2="248" y2="255" stroke="#3a4a6e" stroke-width="1"/>
  <text x="175" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">비교·순위 데이터</text>

  <!-- Line Chart Box -->
  <rect x="310" y="96" width="230" height="180" fill="#111827" rx="8" stroke="#3a4a6e"/>
  <text x="425" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Line</text>
  <!-- Line chart -->
  <polyline points="330,230 370,200 410,215 450,185 490,195 530,175" fill="none" stroke="#55c555" stroke-width="2"/>
  <circle cx="330" cy="230" r="3" fill="#55c555"/>
  <circle cx="370" cy="200" r="3" fill="#55c555"/>
  <circle cx="410" cy="215" r="3" fill="#55c555"/>
  <circle cx="450" cy="185" r="3" fill="#55c555"/>
  <circle cx="490" cy="195" r="3" fill="#55c555"/>
  <circle cx="530" cy="175" r="3" fill="#55c555"/>
  <line x1="320" y1="255" x2="540" y2="255" stroke="#3a4a6e" stroke-width="1"/>
  <text x="425" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">추세·시계열 데이터</text>

  <!-- Pie Chart Box -->
  <rect x="560" y="96" width="260" height="180" fill="#111827" rx="8" stroke="#3a4a6e"/>
  <text x="690" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">Pie / Donut</text>
  <!-- Pie chart approximation -->
  <circle cx="650" cy="200" r="50" fill="none" stroke="#3a4a6e"/>
  <path d="M 650 200 L 650 150 A 50 50 0 0 1 693 225 Z" fill="#7ec8e3"/>
  <path d="M 650 200 L 693 225 A 50 50 0 0 1 630 248 Z" fill="#55c555"/>
  <path d="M 650 200 L 630 248 A 50 50 0 0 1 600 200 Z" fill="#e05555"/>
  <path d="M 650 200 L 600 200 A 50 50 0 0 1 650 150 Z" fill="#e0a030"/>
  <!-- Legend -->
  <rect x="714" y="168" width="10" height="10" fill="#7ec8e3"/>
  <text x="728" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">A</text>
  <rect x="714" y="184" width="10" height="10" fill="#55c555"/>
  <text x="728" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">B</text>
  <rect x="714" y="200" width="10" height="10" fill="#e05555"/>
  <text x="728" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">C</text>
  <rect x="714" y="216" width="10" height="10" fill="#e0a030"/>
  <text x="728" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">D</text>
  <text x="690" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">비율·구성 데이터</text>

  <!-- chartInfo structure -->
  <rect x="60" y="310" width="760" height="160" fill="#111827" rx="8" stroke="#3a4a6e"/>
  <text x="440" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">chartInfo 핵심 속성</text>

  <rect x="80" y="350" width="160" height="40" fill="#0f1929" rx="5"/>
  <text x="160" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">charttype</text>
  <text x="160" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">bar | line | pie</text>

  <rect x="260" y="350" width="160" height="40" fill="#0f1929" rx="5"/>
  <text x="340" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">xtitle / ytitle</text>
  <text x="340" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">축 제목 텍스트</text>

  <rect x="440" y="350" width="160" height="40" fill="#0f1929" rx="5"/>
  <text x="520" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">legendvisible</text>
  <text x="520" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">true | false</text>

  <rect x="620" y="350" width="180" height="40" fill="#0f1929" rx="5"/>
  <text x="710" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">datacolumn</text>
  <text x="710" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">y축 데이터 컬럼명</text>

  <text x="80" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Dataset 바인딩: bindingInfo = "ds_sales" → 컬럼 자동 매핑</text>
  <text x="80" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">labelcolumn: x축 레이블 컬럼명 지정</text>
</svg>
