<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="40" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8">Branded Type &#xc2e4;&#xc804; &#xd328;&#xd134;</text>
  <text x="440" y="62" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">&#xd310;&#xc5fc; / &#xac80;&#xc99d; &#xd328;&#xd134; &#x2014; &#xb7f0;&#xd0c0;&#xc784; &#xbcf4;&#xd638; + &#xd0c0;&#xc785; &#xc548;&#xc804;</text>

  <!-- Validated string -->
  <rect x="30" y="82" width="820" height="140" rx="8" fill="#0d1117" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="50" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#4a9eff">&#xac80;&#xc99d;&#xb41c; &#xbb38;&#xc790;&#xc5f4; &#xd328;&#xd134;</text>
  <rect x="50" y="118" width="760" height="92" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="66" y="140" font-family="'Courier New',monospace" font-size="12" fill="#888">type EmailAddress = string &amp; { _brand: "EmailAddress" };</text>
  <text x="66" y="158" font-family="'Courier New',monospace" font-size="12" fill="#888">function parseEmail(raw: string): EmailAddress {</text>
  <text x="66" y="176" font-family="'Courier New',monospace" font-size="12" fill="#888">  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(raw)) throw new Error("invalid email");</text>
  <text x="66" y="194" font-family="'Courier New',monospace" font-size="12" fill="#4a9eff">  return raw as EmailAddress;  // &#xac80;&#xc99d; &#xd6c4; &#xcbf8;&#xd568;</text>

  <!-- Units -->
  <rect x="30" y="234" width="400" height="130" rx="8" fill="#0d1117" stroke="#e0a855" stroke-width="1.5"/>
  <text x="50" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a855">&#xb2e8;&#xc704; &#xad6c;&#xbd84;</text>
  <rect x="50" y="270" width="362" height="80" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="66" y="292" font-family="'Courier New',monospace" font-size="12" fill="#888">type Meters  = number &amp; { _brand: "m"  };</text>
  <text x="66" y="310" font-family="'Courier New',monospace" font-size="12" fill="#888">type Seconds = number &amp; { _brand: "s"  };</text>
  <text x="66" y="328" font-family="'Courier New',monospace" font-size="12" fill="#e0a855">// &#xbbf8;&#xd130;&#xc5d0; &#xcd08;&#xb97c; &#xc804;&#xb2ec; &#xbd88;&#xac00; &#x2014; &#xb2e8;&#xc704; &#xbc84;&#xadf8; &#xbc29;&#xc9c0;</text>

  <!-- Opaque types -->
  <rect x="450" y="234" width="400" height="130" rx="8" fill="#0d1117" stroke="#22c55e" stroke-width="1.5"/>
  <text x="470" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#22c55e">unique symbol &#xd328;&#xd134;</text>
  <rect x="470" y="270" width="362" height="80" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="486" y="292" font-family="'Courier New',monospace" font-size="12" fill="#888">declare const _brand: unique symbol;</text>
  <text x="486" y="310" font-family="'Courier New',monospace" font-size="12" fill="#888">type Brand&lt;T, B extends string&gt; =</text>
  <text x="486" y="328" font-family="'Courier New',monospace" font-size="12" fill="#22c55e">  T &amp; Record&lt;typeof _brand, B&gt;;</text>

  <!-- Summary -->
  <rect x="30" y="376" width="820" height="86" rx="8" fill="#0f0f0f" stroke="#3a4a6e" stroke-width="1"/>
  <text x="50" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">&#xd448;&#xc73c;&#xb85c; &#xae30;&#xc5b5;&#xd560; &#xac83;</text>
  <text x="50" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">&#x2022; Brand &#xd0c0;&#xc785;&#xc740; &#xb7f0;&#xd0c0;&#xc784; &#xc624;&#xbc84;&#xd5e4;&#xb4dc; &#xc5c6;&#xc74c; &#x2014; &#xcef4;&#xd30c;&#xc77c; &#xd0c0;&#xc784;&#xc5d0;&#xb9cc; &#xc874;&#xc7ac;</text>
  <text x="50" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">&#x2022; &#xd310;&#xc5fc; &#xae30;&#xb2a5;(parse)&#xc5d0;&#xc11c; &#xcbf8;&#xd568; &#xd6c4; &#xd558;&#xc704; &#xcf54;&#xb4dc;&#xb294; &#xac80;&#xc99d;&#xb41c; &#xd0c0;&#xc785;&#xc73c;&#xb85c; &#xcd5c;&#xc9c0; &#xd544;&#xc694; &#xc5c6;&#xc74c;</text>
  <text x="50" y="458" font-family="'Courier New',monospace" font-size="11" fill="#555">  // parse at the boundaries, trust the types inside</text>
</svg>