<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-down" viewBox="0 0 14 14" refX="7" refY="12"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 7 13 L 14 0 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-up" viewBox="0 0 14 14" refX="7" refY="2"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 14 L 7 1 L 14 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-right" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">스택 연산 — LIFO (Last In, First Out)</text>

  <!-- ─── LEFT: Stack state visualization ─── -->
  <text x="190" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">스택 상태</text>

  <!-- Stack container outline -->
  <rect x="130" y="96" width="120" height="300" rx="6" fill="none" stroke="#3a4a6e" stroke-width="2"/>
  <!-- bottom closed -->
  <line x1="130" y1="396" x2="250" y2="396" stroke="#3a4a6e" stroke-width="3"/>

  <!-- Stack items (bottom to top: 10, 20, 30) -->
  <rect x="136" y="336" width="108" height="54" rx="4" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="190" y="368" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="16" font-weight="600" fill="#e8e8e8">10</text>

  <rect x="136" y="276" width="108" height="54" rx="4" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="190" y="308" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="16" font-weight="600" fill="#e8e8e8">20</text>

  <rect x="136" y="216" width="108" height="54" rx="4" fill="#2a1a4a" stroke="#5a3a8a" stroke-width="2"/>
  <text x="190" y="248" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="16" font-weight="600" fill="#7ec8e3">30</text>

  <!-- TOP pointer -->
  <text x="270" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">← TOP</text>

  <!-- empty slots (dashed) -->
  <rect x="136" y="156" width="108" height="54" rx="4" fill="none" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,4"/>
  <rect x="136" y="96" width="108" height="54" rx="4" fill="none" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="190" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#444">비어있음</text>

  <!-- ─── MIDDLE: Operations ─── -->
  <text x="440" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">연산 설명</text>

  <!-- push -->
  <rect x="350" y="100" width="180" height="86" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="366" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">push(40)</text>
  <text x="366" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">top++</text>
  <text x="366" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">stack[top] = 40</text>
  <text x="366" y="177" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555" xml:space="preserve">// O(1)</text>

  <!-- pop -->
  <rect x="350" y="204" width="180" height="86" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="366" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" font-weight="600" xml:space="preserve">pop()</text>
  <text x="366" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">val = stack[top]</text>
  <text x="366" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">top--</text>
  <text x="366" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555" xml:space="preserve">// O(1)</text>

  <!-- peek -->
  <rect x="350" y="308" width="180" height="86" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="366" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7777cc" font-weight="600" xml:space="preserve">peek()</text>
  <text x="366" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">return stack[top]</text>
  <text x="366" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">// top 변경 없음</text>
  <text x="366" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555" xml:space="preserve">// O(1)</text>

  <!-- arrows from ops to stack -->
  <line x1="350" y1="143" x2="255" y2="200" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-right)"/>
  <line x1="350" y1="247" x2="255" y2="243" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-right)"/>
  <line x1="350" y1="351" x2="255" y2="243" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-right)"/>

  <!-- ─── RIGHT: Complexity table ─── -->
  <text x="680" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">복잡도</text>

  <rect x="570" y="100" width="250" height="200" rx="8" fill="#0d1020" stroke="#2a3a5e" stroke-width="1"/>

  <text x="586" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">연산</text>
  <text x="726" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">시간</text>
  <line x1="586" y1="134" x2="804" y2="134" stroke="#2a3a5e" stroke-width="1"/>

  <text x="586" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">push</text>
  <text x="726" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">O(1)</text>

  <text x="586" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">pop</text>
  <text x="726" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">O(1)</text>

  <text x="586" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">peek</text>
  <text x="726" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">O(1)</text>

  <text x="586" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">isEmpty</text>
  <text x="726" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">O(1)</text>

  <text x="586" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">공간</text>
  <text x="726" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">O(n)</text>

  <!-- applications -->
  <rect x="570" y="316" width="250" height="110" rx="8" fill="#0d1020" stroke="#2a3a5e" stroke-width="1"/>
  <text x="695" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">주요 활용</text>
  <text x="586" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 함수 호출 스택 (Call Stack)</text>
  <text x="586" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 괄호 유효성 검사</text>
  <text x="586" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 수식 평가 (후위 표기법)</text>
  <text x="586" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• DFS 반복 구현</text>

  <!-- bottom code strip -->
  <rect x="60" y="448" width="760" height="48" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="468" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">배열 기반: top 인덱스만 관리  |  연결 리스트 기반: head가 top 역할</text>
  <text x="76" y="486" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">불변식</tspan>: top == -1 이면 empty  |  top == capacity-1 이면 full</text>
</svg>
