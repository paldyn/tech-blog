<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <text x="440" y="48" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">pull --rebase vs pull (merge)</text>
  <text x="440" y="78" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#888">머지 커밋 없이 히스토리를 일직선으로 유지</text>

  <!-- Divider -->
  <line x1="440" y1="100" x2="440" y2="460" stroke="#222" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- === LEFT: pull (merge) === -->
  <text x="220" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555">git pull (기본 — merge)</text>

  <!-- Commits: A - B - C (remote) -->
  <circle cx="90" cy="165" r="16" fill="#2a3a52" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="90" y="169" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3">A</text>
  <line x1="106" y1="165" x2="134" y2="165" stroke="#7ec8e3" stroke-width="1.5"/>
  <circle cx="150" cy="165" r="16" fill="#2a3a52" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="169" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3">B</text>
  <text x="150" y="195" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">origin/main</text>

  <!-- Local commit D (diverged) -->
  <circle cx="90" cy="255" r="16" fill="#2a3a52" stroke="#7777cc" stroke-width="1.5"/>
  <text x="90" y="259" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7777cc">A</text>
  <line x1="106" y1="255" x2="134" y2="255" stroke="#7777cc" stroke-width="1.5"/>
  <circle cx="150" cy="255" r="16" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="150" y="259" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7777cc">D</text>
  <text x="150" y="285" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">로컬 커밋</text>

  <!-- Merge result -->
  <line x1="166" y1="255" x2="254" y2="330" stroke="#e05555" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="166" y1="165" x2="254" y2="330" stroke="#e05555" stroke-width="1.5" stroke-dasharray="3,2"/>
  <circle cx="270" cy="340" r="18" fill="#1a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="270" y="344" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#e05555">M</text>
  <text x="270" y="374" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">머지 커밋 생성</text>
  <text x="270" y="392" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">히스토리 복잡해짐</text>

  <!-- === RIGHT: pull --rebase === -->
  <text x="660" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">git pull --rebase</text>

  <!-- origin commits -->
  <circle cx="480" cy="165" r="16" fill="#2a3a52" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="480" y="169" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3">A</text>
  <line x1="496" y1="165" x2="524" y2="165" stroke="#7ec8e3" stroke-width="1.5"/>
  <circle cx="540" cy="165" r="16" fill="#2a3a52" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="540" y="169" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3">B</text>
  <text x="540" y="195" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">origin/main</text>

  <!-- Local D (before rebase) -->
  <circle cx="480" cy="255" r="16" fill="#2a3a52" stroke="#888" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="480" y="259" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">A</text>
  <line x1="496" y1="255" x2="524" y2="255" stroke="#888" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="540" cy="255" r="16" fill="#0d1117" stroke="#888" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="540" y="259" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">D</text>

  <!-- Rebase result: A-B-D' -->
  <circle cx="480" cy="360" r="16" fill="#2a3a52" stroke="#55c555" stroke-width="1.5"/>
  <text x="480" y="364" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555">A</text>
  <line x1="496" y1="360" x2="524" y2="360" stroke="#55c555" stroke-width="1.5"/>
  <circle cx="540" cy="360" r="16" fill="#2a3a52" stroke="#55c555" stroke-width="1.5"/>
  <text x="540" y="364" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555">B</text>
  <line x1="556" y1="360" x2="584" y2="360" stroke="#55c555" stroke-width="1.5"/>
  <circle cx="600" cy="360" r="16" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="600" y="364" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555">D'</text>
  <text x="540" y="392" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">일직선 히스토리 유지</text>
  <text x="540" y="410" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">머지 커밋 없음</text>

  <!-- Arrow showing rebase -->
  <text x="660" y="315" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">D → D' (재적용)</text>
</svg>
