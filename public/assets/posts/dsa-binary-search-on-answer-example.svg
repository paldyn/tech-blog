<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" style="background:#0a0a0a">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">예제: 나무 자르기 (BOJ 2805)</text>

  <!-- Problem description -->
  <rect x="60" y="60" width="760" height="72" rx="8" fill="#0a0f1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">문제</text>
  <text x="440" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">나무 높이: [20, 15, 10, 17]  ·  필요 목재: M = 7</text>
  <text x="440" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">절단기 높이 H를 설정하면 H 이상인 나무는 (h - H)만큼 잘림. 총 잘린 양 &gt;= M인 최댓값 H = ?</text>

  <!-- Feasible check visualization -->
  <text x="60" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">H=15로 시도: [20-15=5, 15-15=0, 10→0, 17-15=2] → 총 7 = M ✓</text>

  <!-- Trees at H=15 -->
  <rect x="60" y="172" width="60" height="120" rx="4" fill="#1a3a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="90" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">h=20</text>
  <!-- Cut portion (top 5) highlighted -->
  <rect x="60" y="172" width="60" height="30" rx="4" fill="#1a2a1f" stroke="#55c555" stroke-width="2"/>
  <text x="90" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555">+5</text>

  <rect x="136" y="202" width="60" height="90" rx="4" fill="#1a3a1f" stroke="#3a4a6e" stroke-width="1"/>
  <text x="166" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">h=15</text>
  <text x="166" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">+0</text>

  <rect x="212" y="232" width="60" height="60" rx="4" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="242" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">h=10</text>
  <text x="242" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">+0</text>

  <rect x="288" y="192" width="60" height="100" rx="4" fill="#1a3a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="318" y="247" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">h=17</text>
  <rect x="288" y="192" width="60" height="12" rx="4" fill="#1a2a1f" stroke="#55c555" stroke-width="2"/>
  <text x="318" y="203" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555">+2</text>

  <!-- H line -->
  <line x1="60" y1="202" x2="380" y2="202" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="390" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">H=15</text>

  <!-- Right: binary search steps -->
  <text x="480" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">이진 탐색 과정</text>
  <rect x="480" y="172" width="360" height="160" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="496" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8"># lo=0, hi=20 (max 나무 높이)</tspan>
  </text>
  <text x="496" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8"># H=10: 잘림=10 &gt;= 7 → True → hi=10</tspan>
  </text>
  <text x="496" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8"># H=15: 잘림=7 &gt;= 7 → True → hi=15</tspan>
  </text>
  <text x="496" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8"># H=17: 잘림=3 &lt; 7 → False → lo=18</tspan>
  </text>
  <text x="496" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8"># H=16: 잘림=6 &lt; 7 → False → lo=17</tspan>
  </text>
  <text x="496" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8"># lo &gt;= hi → 종료</tspan>
  </text>
  <text x="496" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#55c555" font-weight="600">정답: H = 15</tspan>
  </text>

  <!-- Implementation -->
  <rect x="60" y="354" width="760" height="72" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">bool</tspan><tspan fill="#ffffff"> feasible(vector&lt;</tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff">&gt;&amp; h, </tspan><tspan fill="#7ec8e3" font-weight="600">long long</tspan><tspan fill="#ffffff"> H, </tspan><tspan fill="#7ec8e3" font-weight="600">long long</tspan><tspan fill="#ffffff"> M) {</tspan>
  </text>
  <text x="76" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  long long</tspan><tspan fill="#ffffff"> total = 0;</tspan>
  </text>
  <text x="76" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  for</tspan><tspan fill="#ffffff"> (</tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff"> x : h) </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> (x &gt; H) total += x - H;</tspan>
  </text>
  <text x="76" y="430" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> total &gt;= M;</tspan>
  </text>
</svg>
