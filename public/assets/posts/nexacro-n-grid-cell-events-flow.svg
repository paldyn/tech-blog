<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Grid 셀 이벤트 발생 흐름</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">클릭 → 편집 시작 → 값 변경 → 편집 종료 순서</text>

  <!-- Step boxes -->
  <!-- Step 1 -->
  <rect x="60" y="106" width="180" height="54" fill="#1a1a2e" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">oncellclick</text>
  <text x="150" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">셀 클릭 시 발생</text>

  <!-- Arrow 1→2 -->
  <polygon points="244,133 270,127 270,130 300,130 300,127 326,133 300,139 300,136 270,136 270,139" fill="#7777cc" stroke="#4a4a99" stroke-width="1"/>

  <!-- Step 2 -->
  <rect x="330" y="106" width="220" height="54" fill="#1a1a2e" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">oncelleditbegin</text>
  <text x="440" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">편집 컨트롤 활성화 직전</text>

  <!-- Arrow 2→3 -->
  <polygon points="554,133 580,127 580,130 610,130 610,127 636,133 610,139 610,136 580,136 580,139" fill="#7777cc" stroke="#4a4a99" stroke-width="1"/>

  <!-- Step 3 -->
  <rect x="640" y="106" width="180" height="54" fill="#1a1a2e" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="730" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">oncellchange</text>
  <text x="730" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Dataset 값 변경됨</text>

  <!-- Down arrows -->
  <polygon points="730,165 736,165 736,195 742,195 730,213 718,195 724,195 724,165" fill="#7777cc" stroke="#4a4a99" stroke-width="1"/>
  <polygon points="440,165 446,165 446,195 452,195 440,213 428,195 434,195 434,165" fill="#7777cc" stroke="#4a4a99" stroke-width="1"/>

  <!-- Step 4 -->
  <rect x="330" y="218" width="220" height="54" fill="#1a1a2e" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">oncelleditend</text>
  <text x="440" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">편집 종료 (e.cancel 가능)</text>

  <!-- Step 5 -->
  <rect x="640" y="218" width="180" height="54" fill="#1a1a2e" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="730" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">onrowposchanged</text>
  <text x="730" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">행 포커스 이동 시</text>

  <!-- oncelldblclick separate -->
  <rect x="60" y="218" width="180" height="54" fill="#1a2e1a" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="150" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">oncelldblclick</text>
  <text x="150" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">셀 더블클릭</text>

  <!-- Dashed line oncellclick → oncelldblclick -->
  <line x1="150" y1="160" x2="150" y2="218" stroke="#55c555" stroke-width="2" stroke-dasharray="5,4"/>
  <text x="154" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">더블클릭</text>

  <!-- e.cancel explanation -->
  <rect x="60" y="310" width="760" height="56" fill="#1f0d0d" rx="8" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">oncelleditend에서 e.cancel = true 반환 시 편집 내용 취소, Dataset 이전 값 복원</text>
  <text x="440" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">유효성 검사 실패 시 이 패턴으로 셀 편집을 원복합니다</text>

  <!-- Event object info -->
  <rect x="60" y="388" width="760" height="72" fill="#0d1a1a" rx="8" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">이벤트 핸들러 공통 인자: obj(그리드), e(이벤트 객체)</text>
  <text x="200" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">e.row — 행 인덱스</text>
  <text x="440" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">e.col — 컬럼 인덱스</text>
  <text x="680" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">e.newvalue</text>
  <text x="200" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">행 위치</text>
  <text x="440" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">컬럼 위치</text>
  <text x="680" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">변경된 값</text>
</svg>
