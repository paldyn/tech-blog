<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <defs>
    <marker id="cf-arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="360" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">kubeadm 인증서 갱신 절차</text>

  <!-- step 1 -->
  <rect x="40" y="100" width="190" height="110" rx="8" fill="#1a3a4a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="135" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">1. 만료 확인</text>
  <text x="135" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" text-anchor="middle">certs</text>
  <text x="135" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" text-anchor="middle">check-expiration</text>

  <!-- step 2 -->
  <rect x="270" y="100" width="190" height="110" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="365" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">2. 갱신</text>
  <text x="365" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" text-anchor="middle">certs renew all</text>
  <text x="365" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">CA로 재서명</text>

  <!-- step 3 -->
  <rect x="500" y="100" width="190" height="110" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="595" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">3. 재기동</text>
  <text x="595" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">컨트롤 플레인</text>
  <text x="595" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">static pod 재시작</text>

  <!-- step 4 -->
  <rect x="730" y="100" width="120" height="110" rx="8" fill="#201a10" stroke="#ce9178" stroke-width="1.5"/>
  <text x="790" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#ce9178" text-anchor="middle">4. 검증</text>
  <text x="790" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">새 만료일</text>
  <text x="790" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">재확인</text>

  <line x1="230" y1="155" x2="270" y2="155" stroke="#7ec8e3" stroke-width="2" marker-end="url(#cf-arr)"/>
  <line x1="460" y1="155" x2="500" y2="155" stroke="#7ec8e3" stroke-width="2" marker-end="url(#cf-arr)"/>
  <line x1="690" y1="155" x2="730" y2="155" stroke="#7ec8e3" stroke-width="2" marker-end="url(#cf-arr)"/>

  <!-- note -->
  <rect x="40" y="250" width="810" height="80" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="60" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">자동 갱신: kubeadm는 컨트롤 플레인 업그레이드 때 인증서를 자동 갱신한다</text>
  <text x="60" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">→ 1년에 최소 한 번 업그레이드하면 만료 위험이 크게 줄어든다. kubelet 인증서는 자체 자동 갱신.</text>
</svg>
