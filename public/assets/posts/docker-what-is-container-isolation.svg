<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">컨테이너 격리 메커니즘</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888">Linux Namespace (격리) + cgroups (자원 제한)</text>

  <!-- Namespace panel -->
  <rect x="60" y="96" width="350" height="300" fill="#0d1020" stroke="#7ec8e3" stroke-width="1.5" rx="10"/>
  <text x="235" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3">Linux Namespaces</text>
  <text x="235" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">프로세스의 시야(view) 격리</text>

  <!-- Namespace items -->
  <rect x="88" y="160" width="294" height="36" fill="#111827" stroke="#2d3a4a" rx="6"/>
  <text x="138" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">PID</text>
  <text x="175" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ccc">프로세스 ID 격리 — 컨테이너 내 PID 1</text>

  <rect x="88" y="204" width="294" height="36" fill="#111827" stroke="#2d3a4a" rx="6"/>
  <text x="88" y="227" dx="14" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">NET</text>
  <text x="125" y="227" dx="14" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ccc">독립 네트워크 스택 (eth0, lo)</text>

  <rect x="88" y="248" width="294" height="36" fill="#111827" stroke="#2d3a4a" rx="6"/>
  <text x="88" y="271" dx="14" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">MNT</text>
  <text x="125" y="271" dx="14" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ccc">독립 파일시스템 마운트 트리</text>

  <rect x="88" y="292" width="294" height="36" fill="#111827" stroke="#2d3a4a" rx="6"/>
  <text x="88" y="315" dx="14" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">UTS</text>
  <text x="125" y="315" dx="14" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ccc">독립 hostname / domainname</text>

  <rect x="88" y="336" width="294" height="36" fill="#111827" stroke="#2d3a4a" rx="6"/>
  <text x="88" y="359" dx="14" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">USER</text>
  <text x="130" y="359" dx="14" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ccc">UID/GID 매핑 격리</text>

  <!-- cgroups panel -->
  <rect x="470" y="96" width="350" height="300" fill="#0d1a10" stroke="#55c555" stroke-width="1.5" rx="10"/>
  <text x="645" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555">cgroups (v2)</text>
  <text x="645" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">자원 사용량 제한 및 계정</text>

  <!-- cgroup items -->
  <rect x="498" y="160" width="294" height="36" fill="#0f1f11" stroke="#1e3a20" rx="6"/>
  <text x="498" y="183" dx="14" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">cpu</text>
  <text x="532" y="183" dx="14" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ccc">CPU 시간 할당 제한 (--cpus)</text>

  <rect x="498" y="204" width="294" height="36" fill="#0f1f11" stroke="#1e3a20" rx="6"/>
  <text x="498" y="227" dx="14" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">memory</text>
  <text x="551" y="227" dx="14" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ccc">메모리 상한 설정 (--memory)</text>

  <rect x="498" y="248" width="294" height="36" fill="#0f1f11" stroke="#1e3a20" rx="6"/>
  <text x="498" y="271" dx="14" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">blkio</text>
  <text x="534" y="271" dx="14" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ccc">블록 I/O 대역폭 제어</text>

  <rect x="498" y="292" width="294" height="36" fill="#0f1f11" stroke="#1e3a20" rx="6"/>
  <text x="498" y="315" dx="14" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">net_cls</text>
  <text x="545" y="315" dx="14" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ccc">네트워크 패킷 분류/제어</text>

  <rect x="498" y="336" width="294" height="36" fill="#0f1f11" stroke="#1e3a20" rx="6"/>
  <text x="498" y="359" dx="14" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">pids</text>
  <text x="528" y="359" dx="14" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ccc">생성 가능한 PID 수 제한</text>

  <!-- Center label -->
  <text x="440" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555">+</text>

  <!-- Bottom label -->
  <text x="440" y="418" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#666">두 메커니즘이 결합하여 "격리되면서도 자원이 제한된" 컨테이너 환경을 구성합니다</text>
</svg>
