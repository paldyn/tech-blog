<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">GPT 아키텍처 핵심 구성</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">Transformer Decoder-only 스택</text>

  <!-- Code block -->
  <rect x="60" y="90" width="360" height="330" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># GPT 추론 (간략화)</text>
  <text x="76" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">import</text>
  <text x="130" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> openai</text>
  <text x="76" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> </text>
  <text x="76" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">client = openai.OpenAI()</text>
  <text x="76" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> </text>
  <text x="76" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">def</text>
  <text x="104" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> chat(prompt):</text>
  <text x="76" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    resp = client.chat</text>
  <text x="76" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">      .completions.create(</text>
  <text x="76" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">        model=</text>
  <text x="136" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">"gpt-4o"</text>
  <text x="196" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">,</text>
  <text x="76" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">        messages=[{</text>
  <text x="76" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">          "role"</text>
  <text x="136" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">:</text>
  <text x="145" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">"user"</text>
  <text x="195" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">,</text>
  <text x="76" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">          "content"</text>
  <text x="157" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">: prompt}]</text>
  <text x="76" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    )</text>
  <text x="76" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">    return</text>
  <text x="130" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> resp.choices[</text>
  <text x="235" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">0</text>
  <text x="244" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">]</text>
  <text x="76" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">      .message.content</text>

  <!-- Right side: architecture diagram -->
  <!-- Input tokens -->
  <rect x="490" y="96" width="330" height="40" rx="6" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="655" y="121" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">입력 토큰 임베딩</text>

  <!-- Arrow down -->
  <line x1="655" y1="136" x2="655" y2="156" stroke="#555" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Positional encoding -->
  <rect x="490" y="158" width="330" height="36" rx="6" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="655" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">위치 인코딩 (Positional Encoding)</text>

  <!-- Arrow -->
  <line x1="655" y1="194" x2="655" y2="214" stroke="#555" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- N× transformer blocks -->
  <rect x="490" y="216" width="330" height="100" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <text x="655" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">Transformer Block × N</text>
  <rect x="508" y="248" width="140" height="26" rx="4" fill="#111827" stroke="#888" stroke-width="1"/>
  <text x="578" y="265" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Masked Self-Attention</text>
  <rect x="660" y="248" width="144" height="26" rx="4" fill="#111827" stroke="#888" stroke-width="1"/>
  <text x="732" y="265" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Feed-Forward</text>
  <text x="655" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Layer Norm + Residual Connection</text>

  <!-- Arrow -->
  <line x1="655" y1="316" x2="655" y2="336" stroke="#555" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- LM Head -->
  <rect x="490" y="338" width="330" height="36" rx="6" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="655" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">LM Head (Vocab 크기로 선형 변환)</text>

  <!-- Arrow -->
  <line x1="655" y1="374" x2="655" y2="394" stroke="#555" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Softmax output -->
  <rect x="490" y="396" width="330" height="36" rx="6" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="655" y="418" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">Softmax → 다음 토큰 확률 분포</text>

  <defs>
    <marker id="arr2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>
</svg>
