<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="a1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">GC 로그 한 줄 해부 — Unified Logging (-Xlog:gc*)</text>

  <!-- Raw log code box -->
  <rect x="40" y="78" width="800" height="64" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="56" y="104"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">[<tspan fill="#b5cea8">0.523s</tspan>][<tspan fill="#7ec8e3" font-weight="600">info</tspan>][<tspan fill="#ce9178">gc</tspan>] <tspan fill="#7ec8e3" font-weight="600">GC(7)</tspan> Pause Young (Normal)</text>
  <text xml:space="preserve" x="56" y="126"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">      (G1 Evacuation Pause) <tspan fill="#b5cea8">512M</tspan>-&gt;<tspan fill="#b5cea8">76M</tspan>(<tspan fill="#b5cea8">1024M</tspan>) <tspan fill="#b5cea8">4.382ms</tspan></text>

  <!-- Segment markers (tick boxes) under the line -->
  <!-- 1 timestamp/uptime -->
  <rect x="48" y="86" width="58" height="22" fill="none" stroke="#7ec8e3" stroke-width="1.5" rx="3"/>
  <!-- 2 level -->
  <rect x="114" y="86" width="46" height="22" fill="none" stroke="#7ec8e3" stroke-width="1.5" rx="3"/>
  <!-- 3 tag -->
  <rect x="168" y="86" width="36" height="22" fill="none" stroke="#7ec8e3" stroke-width="1.5" rx="3"/>
  <!-- 4 GC id -->
  <rect x="212" y="86" width="50" height="22" fill="none" stroke="#55c555" stroke-width="1.5" rx="3"/>
  <!-- 5 phase/cause -->
  <rect x="270" y="86" width="280" height="44" fill="none" stroke="#e05555" stroke-width="1.5" rx="3"/>
  <!-- 6 before->after(heap) -->
  <rect x="48" y="108" width="200" height="22" fill="none" stroke="#55c555" stroke-width="1.5" rx="3"/>
  <!-- 7 pause -->
  <rect x="256" y="108" width="74" height="22" fill="none" stroke="#e05555" stroke-width="1.5" rx="3"/>

  <!-- Connector arrows + callout rows -->
  <!-- Row layout: 4 callout boxes -->

  <!-- 1 timestamp -->
  <line x1="77" y1="86" x2="120" y2="186" stroke="#7777cc" stroke-width="1.5" marker-end="url(#a1)"/>
  <rect x="40" y="190" width="250" height="60" rx="8" fill="#101422" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="56" y="214"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">타임스탬프 · 데코레이터</text>
  <text x="56" y="234"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">uptime(0.523s) · level(info) · tag(gc)</text>

  <!-- 4 GC id -->
  <line x1="237" y1="86" x2="430" y2="186" stroke="#7777cc" stroke-width="1.5" marker-end="url(#a1)"/>
  <rect x="315" y="190" width="240" height="60" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="331" y="214"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">GC id — GC(7)</text>
  <text x="331" y="234"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">한 번의 GC 사이클을 묶는 일련번호</text>

  <!-- 5 phase/cause -->
  <line x1="410" y1="130" x2="700" y2="186" stroke="#7777cc" stroke-width="1.5" marker-end="url(#a1)"/>
  <rect x="580" y="190" width="260" height="60" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="596" y="214"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">단계 / 원인 (cause)</text>
  <text x="596" y="234"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Pause Young · G1 Evacuation Pause</text>

  <!-- 6 before->after heap -->
  <line x1="148" y1="130" x2="200" y2="296" stroke="#7777cc" stroke-width="1.5" marker-end="url(#a1)"/>
  <rect x="40" y="300" width="380" height="78" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="56" y="326"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">힙 변화 — 512M-&gt;76M(1024M)</text>
  <text x="56" y="348"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">before(수집 전) -&gt; after(수집 후)(전체 힙 용량)</text>
  <text x="56" y="367"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">436M 회수 — 회수량과 after 추세를 본다</text>

  <!-- 7 pause -->
  <line x1="293" y1="130" x2="620" y2="296" stroke="#7777cc" stroke-width="1.5" marker-end="url(#a1)"/>
  <rect x="460" y="300" width="380" height="78" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="476" y="326"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">pause 시간 — 4.382ms</text>
  <text x="476" y="348"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">이 GC가 애플리케이션을 멈춘 시간</text>
  <text x="476" y="367"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">지연 진단의 핵심 — p99 분포로 평가</text>

  <!-- Bottom note -->
  <text x="440" y="416" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">young 수집은 "Pause Young", 전체 수집은 "Pause Full"로 한 줄에서 바로 구분된다</text>
  <text x="440" y="438" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">JDK 9+ Unified Logging은 모든 GC 이벤트를 [tags] 기반 통일 포맷으로 출력한다</text>
</svg>
