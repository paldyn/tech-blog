<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Next.js 아키텍처 개요</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">React 위에서 동작하는 풀스택 프레임워크</text>

  <!-- Row 1: React (foundation) -->
  <rect x="60" y="100" width="760" height="70" rx="8" fill="#111827" stroke="#3b4a6e" stroke-width="1.5"/>
  <text x="440" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">React</text>
  <text x="440" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">컴포넌트 기반 UI 라이브러리 · 상태 관리 · 이벤트 처리</text>

  <!-- Arrow down -->
  <line x1="440" y1="170" x2="440" y2="196" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>

  <!-- Row 2: Next.js (main) -->
  <rect x="60" y="198" width="760" height="70" rx="8" fill="#0f1f14" stroke="#2d5a3d" stroke-width="1.5"/>
  <text x="440" y="224" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">Next.js</text>
  <text x="440" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">서버 렌더링 · 라우팅 · 최적화 · 빌드 시스템 통합</text>

  <!-- Arrow down -->
  <line x1="440" y1="268" x2="440" y2="294" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Row 3: Output boxes -->
  <rect x="60" y="296" width="220" height="70" rx="8" fill="#1a1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="170" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">SSR</text>
  <text x="170" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">서버 사이드 렌더링</text>

  <rect x="330" y="296" width="220" height="70" rx="8" fill="#1a1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">SSG</text>
  <text x="440" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">정적 사이트 생성</text>

  <rect x="600" y="296" width="220" height="70" rx="8" fill="#1a1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="710" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">API Routes</text>
  <text x="710" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">서버리스 API 엔드포인트</text>

  <!-- Connecting lines from next.js box to the three output boxes -->
  <line x1="300" y1="283" x2="170" y2="296" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="440" y1="283" x2="440" y2="296" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="580" y1="283" x2="710" y2="296" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Row 4: Node.js runtime -->
  <rect x="60" y="400" width="760" height="60" rx="8" fill="#181410" stroke="#4a3820" stroke-width="1.5"/>
  <text x="440" y="424" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178">Node.js 런타임 / Vercel Edge Network</text>
  <text x="440" y="446" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">빌드 · 배포 · 실행 환경</text>
</svg>
