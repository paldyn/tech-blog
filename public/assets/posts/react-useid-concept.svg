<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">useId — 안정적인 고유 ID 생성</text>

  <!-- Problem: manual IDs -->
  <rect x="60" y="72" width="360" height="172" rx="8" fill="#200a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">수동 ID 관리의 문제</text>
  <rect x="76" y="108" width="328" height="122" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="88" y="126" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// ❌ 하드코딩된 ID</text>
  <text x="88" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#ffffff">&lt;label htmlFor=</tspan><tspan fill="#ce9178">"email"</tspan><tspan fill="#ffffff">&gt;이메일&lt;/label&gt;</tspan></text>
  <text x="88" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#ffffff">&lt;input id=</tspan><tspan fill="#ce9178">"email"</tspan><tspan fill="#ffffff"> /&gt;</tspan></text>
  <text x="88" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555">// 같은 폼을 두 번 렌더하면 중복 ID!</text>
  <text x="88" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// SSR: 서버/클라이언트 ID 불일치</text>
  <text x="88" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// Math.random() → hydration 경고 발생</text>

  <!-- Solution: useId -->
  <rect x="460" y="72" width="360" height="172" rx="8" fill="#0a200a" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">useId 해결책</text>
  <rect x="476" y="108" width="328" height="122" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="488" y="126" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// ✅ useId 사용</text>
  <text x="488" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> EmailField() {</tspan></text>
  <text x="488" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#7ec8e3" font-weight="600">  const</tspan><tspan fill="#ffffff"> id = </tspan><tspan fill="#7ec8e3" font-weight="600">useId</tspan><tspan fill="#ffffff">();</tspan></text>
  <text x="488" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> (</tspan></text>
  <text x="488" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#ffffff">    &lt;label htmlFor={id}&gt;이메일&lt;/label&gt;</tspan></text>
  <text x="488" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#ffffff">    &lt;input id={id} type=</tspan><tspan fill="#ce9178">"email"</tspan><tspan fill="#ffffff"> /&gt;</tspan></text>

  <!-- Generated IDs -->
  <rect x="60" y="264" width="760" height="80" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle" font-weight="600">생성되는 ID 형식</text>
  <text x="80" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">첫 번째 인스턴스:</text>
  <text x="260" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ce9178">:r0:</text>
  <text x="340" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">두 번째 인스턴스:</text>
  <text x="530" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ce9178">:r1:</text>
  <text x="590" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">SSR에서도 동일하게 생성됨</text>
  <text x="80" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">서버/클라이언트 모두 컴포넌트 트리 위치 기반으로 동일한 ID 생성 → hydration 불일치 없음</text>

  <!-- Code section -->
  <rect x="60" y="362" width="760" height="60" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#9aa4b8">// 여러 연관 ID에는 접두어 패턴 사용</tspan></text>
  <text x="76" y="401" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> id = </tspan><tspan fill="#7ec8e3" font-weight="600">useId</tspan><tspan fill="#ffffff">();  </tspan><tspan fill="#9aa4b8">// ":r0:"</tspan></text>
  <text x="376" y="401" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">  </tspan><tspan fill="#9aa4b8">// labelId=":r0:-label", descId=":r0:-desc"</tspan></text>
</svg>
