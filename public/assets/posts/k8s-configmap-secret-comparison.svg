<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">ConfigMap vs Secret</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">설정값과 민감 정보를 분리하여 관리</text>

  <!-- ConfigMap column -->
  <rect x="60" y="90" width="360" height="48" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3">ConfigMap</text>

  <!-- Secret column -->
  <rect x="460" y="90" width="360" height="48" rx="8" fill="#200d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="640" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e05555">Secret</text>

  <!-- Row 1: Data type -->
  <rect x="60" y="152" width="360" height="50" rx="4" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="240" y="173" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">일반 설정값</text>
  <text x="240" y="191" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">DB_HOST, APP_PORT, LOG_LEVEL</text>

  <rect x="460" y="152" width="360" height="50" rx="4" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="640" y="173" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">민감 정보</text>
  <text x="640" y="191" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">비밀번호, API 키, 인증서</text>

  <!-- Row 2: Encoding -->
  <rect x="60" y="215" width="360" height="50" rx="4" fill="#0d0d15" stroke="#222" stroke-width="1"/>
  <text x="240" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">평문 저장</text>
  <text x="240" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">kubectl describe 로 바로 확인 가능</text>

  <rect x="460" y="215" width="360" height="50" rx="4" fill="#0d0d15" stroke="#222" stroke-width="1"/>
  <text x="640" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">Base64 인코딩</text>
  <text x="640" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">암호화 아님 — etcd at-rest 암호화 필요</text>

  <!-- Row 3: Size -->
  <rect x="60" y="278" width="360" height="50" rx="4" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="240" y="299" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">최대 1MiB</text>
  <text x="240" y="317" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">설정 파일, properties 파일 등</text>

  <rect x="460" y="278" width="360" height="50" rx="4" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="640" y="299" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">최대 1MiB</text>
  <text x="640" y="317" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">TLS 인증서, kubeconfig 등</text>

  <!-- Row 4: Access -->
  <rect x="60" y="341" width="360" height="50" rx="4" fill="#0d0d15" stroke="#222" stroke-width="1"/>
  <text x="240" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">envFrom / volume mount</text>
  <text x="240" y="380" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">파드에서 환경변수 / 파일로 주입</text>

  <rect x="460" y="341" width="360" height="50" rx="4" fill="#0d0d15" stroke="#222" stroke-width="1"/>
  <text x="640" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">envFrom / volume mount</text>
  <text x="640" y="380" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">tmpfs 마운트, 메모리에만 존재</text>

  <!-- Row labels -->
  <text x="430" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">용도</text>
  <text x="430" y="243" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">저장</text>
  <text x="430" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">크기</text>
  <text x="430" y="369" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">주입</text>

  <!-- Warning note -->
  <rect x="60" y="408" width="760" height="48" rx="8" fill="#1a1000" stroke="#ce9178" stroke-width="1"/>
  <text x="440" y="430" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178">⚠ Secret은 Base64 인코딩일 뿐 암호화가 아니다 — 추가 보안이 필요하면 Vault나 Sealed Secrets 사용</text>
  <text x="440" y="449" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">etcd 암호화(EncryptionConfiguration) 또는 외부 시크릿 관리자 연동 권장</text>
</svg>
