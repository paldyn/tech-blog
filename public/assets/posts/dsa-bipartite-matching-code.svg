<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="38" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">이분 매칭 구현 (DFS 증가 경로)</text>

  <!-- Complexity row -->
  <rect x="60" y="56" width="760" height="46" fill="#111" rx="8" stroke="#7ec8e3" stroke-width="1"/>
  <text x="200" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Hungarian (DFS)</text>
  <text x="200" y="93" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">O(VE)</text>
  <line x1="320" y1="60" x2="320" y2="100" stroke="#222" stroke-width="1"/>
  <text x="440" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Hopcroft-Karp (BFS+DFS)</text>
  <text x="440" y="93" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">O(E√V)</text>
  <line x1="560" y1="60" x2="560" y2="100" stroke="#222" stroke-width="1"/>
  <text x="710" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Dinic (이분 그래프)</text>
  <text x="710" y="93" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">O(E√V)</text>

  <!-- Code block -->
  <rect x="60" y="118" width="760" height="278" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#9aa4b8" xml:space="preserve">// Hungarian DFS 이분 매칭</text>
  <text x="76" y="161" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#7ec8e3" font-weight="600" xml:space="preserve">int</text>
  <text x="103" y="161" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve"> matchL[MAXN], matchR[MAXN];</text>
  <text x="76" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#7ec8e3" font-weight="600" xml:space="preserve">bool</text>
  <text x="116" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve"> visited[MAXN];</text>
  <text x="76" y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve"> </text>
  <text x="76" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#7ec8e3" font-weight="600" xml:space="preserve">bool</text>
  <text x="116" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve"> dfs(int u) &#123;</text>
  <text x="76" y="237" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#7ec8e3" font-weight="600" xml:space="preserve">    for</text>
  <text x="111" y="237" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve"> (int v : adj[u]) &#123;</text>
  <text x="76" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#7ec8e3" font-weight="600" xml:space="preserve">        if</text>
  <text x="111" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve"> (!visited[v]) &#123;</text>
  <text x="76" y="275" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">            visited[v] = true;</text>
  <text x="76" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#7ec8e3" font-weight="600" xml:space="preserve">            if</text>
  <text x="130" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve"> (matchR[v]==-1 || dfs(matchR[v])) &#123;</text>
  <text x="76" y="313" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">                matchL[u]=v; matchR[v]=u;</text>
  <text x="76" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#7ec8e3" font-weight="600" xml:space="preserve">                return</text>
  <text x="176" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#b5cea8" xml:space="preserve"> true</text>
  <text x="210" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">; &#125; &#125; &#125;</text>
  <text x="76" y="351" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#7ec8e3" font-weight="600" xml:space="preserve">    return</text>
  <text x="141" y="351" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#b5cea8" xml:space="preserve"> false</text>
  <text x="182" y="351" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">; &#125;</text>
  <text x="76" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#9aa4b8" xml:space="preserve">// 호출: for each L: fill(visited,false); if dfs(u) ans++;</text>
  <text x="76" y="389" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#9aa4b8" xml:space="preserve">// 최소 버텍스 커버 = 최대 매칭 (König's theorem)</text>
</svg>
