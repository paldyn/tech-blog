<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">타입 단언(Type Assertion) 문법</text>

  <!-- Left: as 문법 -->
  <text x="220" y="80" text-anchor="middle" font-size="15" font-weight="600" fill="#e8e8e8">as 키워드 문법 (권장)</text>
  <rect x="60" y="92" width="340" height="240" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="112" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// 기본 형태: value as Type</text>
  <text x="76" y="132" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">const</text>
  <text x="118" y="132" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> input = document</text>
  <text x="76" y="152" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  .getElementById(</text>
  <text x="76" y="172" font-size="13" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    "myInput"</text>
  <text x="76" y="192" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  ) </text>
  <text x="104" y="192" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">as</text>
  <text x="128" y="192" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> HTMLInputElement;</text>
  <text x="76" y="220" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// 이후 input은 HTMLInputElement</text>
  <text x="76" y="240" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">input.value; </text>
  <text x="170" y="240" font-size="13" fill="#55c555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// OK</text>
  <text x="76" y="268" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// unknown → 구체 타입</text>
  <text x="76" y="288" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">const</text>
  <text x="118" y="288" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> data: </text>
  <text x="158" y="288" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">unknown</text>
  <text x="216" y="288" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> = JSON.parse(</text>
  <text x="76" y="308" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  raw) </text>
  <text x="110" y="308" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">as</text>
  <text x="134" y="308" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> ApiResponse;</text>

  <!-- Right: non-null assertion and angle bracket syntax -->
  <text x="640" y="80" text-anchor="middle" font-size="15" font-weight="600" fill="#e8e8e8">Non-Null 단언과 Double 단언</text>
  <rect x="480" y="92" width="340" height="240" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="112" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// ! — null/undefined 아님을 단언</text>
  <text x="496" y="132" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">const</text>
  <text x="538" y="132" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> el = document</text>
  <text x="496" y="152" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  .getElementById(</text>
  <text x="496" y="172" font-size="13" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    "app"</text>
  <text x="496" y="192" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">  )!; </text>
  <text x="532" y="192" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// null 아님</text>
  <text x="496" y="220" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// Double Assertion (위험)</text>
  <text x="496" y="240" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// 안전 경계를 강제로 넘을 때</text>
  <text x="496" y="260" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">const</text>
  <text x="538" y="260" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> x = foo </text>
  <text x="590" y="260" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">as unknown</text>
  <text x="496" y="280" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">           </text>
  <text x="568" y="280" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">as</text>
  <text x="592" y="280" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> Bar;</text>
  <text x="496" y="308" font-size="13" fill="#e05555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// 최후의 수단, 매우 조심해서 사용</text>

  <!-- Bottom: Warning and when to use -->
  <rect x="60" y="356" width="760" height="100" rx="8" fill="#0a0d14" stroke="#3178c6" stroke-width="1.5"/>
  <text x="440" y="380" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">타입 단언 사용 원칙</text>
  <text x="260" y="404" text-anchor="middle" font-size="13" fill="#55c555">사용해도 좋은 경우</text>
  <text x="260" y="422" text-anchor="middle" font-size="12" fill="#aaa">개발자가 컴파일러보다 더 많이 아는 경우</text>
  <text x="260" y="438" text-anchor="middle" font-size="12" fill="#aaa">DOM API, 외부 라이브러리 반환값</text>
  <text x="620" y="404" text-anchor="middle" font-size="13" fill="#e05555">피해야 할 경우</text>
  <text x="620" y="422" text-anchor="middle" font-size="12" fill="#aaa">타입 에러를 덮으려는 용도</text>
  <text x="620" y="438" text-anchor="middle" font-size="12" fill="#aaa">타입 가드로 해결 가능한 경우</text>
</svg>
