<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">미디에이터 vs 직접 통신</text>

  <!-- Without Mediator -->
  <text x="170" y="82" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555">직접 통신 (문제)</text>

  <rect x="50" y="100" width="80" height="44" rx="6" fill="#111" stroke="#e05555" stroke-width="1"/>
  <text x="90" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">컴포넌트 A</text>
  <text x="90" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">검색창</text>

  <rect x="160" y="100" width="80" height="44" rx="6" fill="#111" stroke="#e05555" stroke-width="1"/>
  <text x="200" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">컴포넌트 B</text>
  <text x="200" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">결과 목록</text>

  <rect x="100" y="186" width="80" height="44" rx="6" fill="#111" stroke="#e05555" stroke-width="1"/>
  <text x="140" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">컴포넌트 C</text>
  <text x="140" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">필터 패널</text>

  <!-- spaghetti arrows -->
  <line x1="130" y1="122" x2="158" y2="122" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="200" y1="144" x2="170" y2="184" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="140" y1="186" x2="100" y2="146" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="160" y1="208" x2="175" y2="148" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4"/>

  <text x="170" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">결합도 N×(N-1)/2 → 스파게티</text>

  <!-- With Mediator -->
  <text x="580" y="82" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">미디에이터 패턴 (해결)</text>

  <!-- Mediator center -->
  <rect x="510" y="178" width="140" height="50" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="580" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">미디에이터</text>
  <text x="580" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">이벤트 조율</text>

  <!-- Components around mediator -->
  <rect x="430" y="100" width="80" height="44" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="470" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">컴포넌트 A</text>
  <text x="470" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">검색창</text>

  <rect x="650" y="100" width="80" height="44" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="690" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">컴포넌트 B</text>
  <text x="690" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">결과 목록</text>

  <rect x="430" y="280" width="80" height="44" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="470" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">컴포넌트 C</text>
  <text x="470" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">필터 패널</text>

  <rect x="650" y="280" width="80" height="44" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="690" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">컴포넌트 D</text>
  <text x="690" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">페이지네이션</text>

  <!-- arrows to/from mediator -->
  <line x1="510" y1="144" x2="530" y2="178" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="650" y1="144" x2="630" y2="178" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="510" y1="280" x2="530" y2="228" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="650" y1="280" x2="630" y2="228" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <text x="580" y="380" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">결합도 N → 컴포넌트는 미디에이터만 알면 됨</text>

  <!-- Mixin section -->
  <text x="440" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">미디에이터: 컴포넌트 간 결합도 ↓ · 믹스인: 클래스 간 기능 재사용↑</text>
</svg>
