<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">RIA 시대부터 Nexacro N까지</text>
  <text x="440" y="68" text-anchor="middle" font-size="13" fill="#888">기업용 웹 UI 플랫폼의 30년 진화</text>

  <!-- Timeline backbone -->
  <line x1="70" y1="240" x2="800" y2="240" stroke="#2a2a2a" stroke-width="2"/>
  <polygon points="800,235 814,240 800,245" fill="#2a2a2a"/>

  <!-- ===== Era 1: 초기 웹 (above, left) ===== -->
  <!-- box x=60-180, center=120 -->
  <rect x="60" y="125" width="120" height="85" fill="#0e1218" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="120" y="148" text-anchor="middle" font-size="11" font-weight="600" fill="#7ec8e3">1990년대</text>
  <text x="120" y="165" text-anchor="middle" font-size="12" font-weight="700" fill="#e8e8e8">초기 웹 시대</text>
  <text x="120" y="182" text-anchor="middle" font-size="10" fill="#888">HTML · CSS · CGI</text>
  <text x="120" y="198" text-anchor="middle" font-size="10" fill="#888">정적 페이지 중심</text>
  <line x1="120" y1="210" x2="120" y2="234" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="120" cy="240" r="6" fill="#7ec8e3"/>
  <text x="120" y="257" text-anchor="middle" font-size="10" fill="#555">~1999</text>

  <!-- ===== Era 2: RIA 전성기 (below) ===== -->
  <!-- box x=200-320, center=260 -->
  <rect x="200" y="265" width="120" height="85" fill="#0e1218" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="260" y="288" text-anchor="middle" font-size="11" font-weight="600" fill="#e05555">2000년대</text>
  <text x="260" y="305" text-anchor="middle" font-size="12" font-weight="700" fill="#e8e8e8">RIA 전성기</text>
  <text x="260" y="322" text-anchor="middle" font-size="10" fill="#888">Flash · ActiveX</text>
  <text x="260" y="338" text-anchor="middle" font-size="10" fill="#888">Java Applet</text>
  <circle cx="260" cy="240" r="6" fill="#e05555"/>
  <line x1="260" y1="246" x2="260" y2="265" stroke="#e05555" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="260" y="257" text-anchor="middle" font-size="10" fill="#555">~2009</text>

  <!-- ===== Era 3: HTML5 전환기 (above) ===== -->
  <!-- box x=350-470, center=410 -->
  <rect x="350" y="125" width="120" height="85" fill="#0e1218" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="410" y="148" text-anchor="middle" font-size="11" font-weight="600" fill="#55c555">2010년대</text>
  <text x="410" y="165" text-anchor="middle" font-size="12" font-weight="700" fill="#e8e8e8">HTML5 전환기</text>
  <text x="410" y="182" text-anchor="middle" font-size="10" fill="#888">모바일·반응형 웹</text>
  <text x="410" y="198" text-anchor="middle" font-size="10" fill="#888">Flash 지원 종료</text>
  <line x1="410" y1="210" x2="410" y2="234" stroke="#55c555" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="410" cy="240" r="6" fill="#55c555"/>
  <text x="410" y="257" text-anchor="middle" font-size="10" fill="#555">~2016</text>

  <!-- ===== Era 4: Nexacro Platform (below) ===== -->
  <!-- box x=500-620, center=560 -->
  <rect x="500" y="265" width="120" height="85" fill="#12101a" rx="8" stroke="#2a1e40" stroke-width="1"/>
  <text x="560" y="288" text-anchor="middle" font-size="11" font-weight="600" fill="#7777cc">2013~2021</text>
  <text x="560" y="305" text-anchor="middle" font-size="11" font-weight="700" fill="#e8e8e8">Nexacro Platform</text>
  <text x="560" y="322" text-anchor="middle" font-size="10" fill="#888">기업용 RIA 표준</text>
  <text x="560" y="338" text-anchor="middle" font-size="10" fill="#888">14 → Platform</text>
  <circle cx="560" cy="240" r="6" fill="#7777cc"/>
  <line x1="560" y1="246" x2="560" y2="265" stroke="#7777cc" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="560" y="257" text-anchor="middle" font-size="10" fill="#555">~2021</text>

  <!-- ===== Era 5: Nexacro N (above, highlighted) ===== -->
  <!-- box x=660-780, center=720 -->
  <rect x="660" y="112" width="120" height="100" fill="#0d1420" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="720" y="135" text-anchor="middle" font-size="11" font-weight="600" fill="#7ec8e3">2022~현재</text>
  <text x="720" y="153" text-anchor="middle" font-size="13" font-weight="700" fill="#e8e8e8">Nexacro N</text>
  <text x="720" y="170" text-anchor="middle" font-size="10" fill="#888">HTML5 순수 기반</text>
  <text x="720" y="186" text-anchor="middle" font-size="10" fill="#888">크로스 브라우저</text>
  <text x="720" y="202" text-anchor="middle" font-size="10" fill="#55c555">V24 최신판</text>
  <line x1="720" y1="212" x2="720" y2="234" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="3,2"/>
  <circle cx="720" cy="240" r="8" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="2"/>
  <text x="720" y="257" text-anchor="middle" font-size="10" fill="#7ec8e3">현재</text>

  <!-- Footer -->
  <text x="440" y="420" text-anchor="middle" font-size="11" fill="#444">PALDYN · Nexacro N 완전 정복 시리즈 — Chapter 1</text>
</svg>
