<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">루프의 else: break 여부에 따른 분기</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#aaaaaa" text-anchor="middle">else는 "break 없이 완주했을 때"만 실행</text>

  <!-- Left: for-else flow -->
  <text x="200" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">for / else 흐름</text>

  <rect x="120" y="110" width="160" height="36" rx="18" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="200" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" text-anchor="middle">이터러블 순회 시작</text>

  <line x1="200" y1="146" x2="200" y2="166" stroke="#555" stroke-width="1.5"/>

  <rect x="120" y="166" width="160" height="36" rx="6" fill="#0d2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="200" y="189" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">루프 바디 실행</text>

  <line x1="200" y1="202" x2="200" y2="222" stroke="#555" stroke-width="1.5"/>

  <polygon points="200,222 280,250 200,278 120,250" fill="#1a1a2e" stroke="#e05555" stroke-width="1.5"/>
  <text x="200" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">break?</text>

  <!-- break → no else -->
  <line x1="280" y1="250" x2="360" y2="250" stroke="#e05555" stroke-width="2"/>
  <polygon points="364,250 354,245 354,255" fill="#e05555"/>
  <text x="322" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">Yes</text>
  <rect x="364" y="228" width="140" height="44" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="434" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">루프 탈출</text>
  <text x="434" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">else 블록 건너뜀</text>

  <!-- no break → continue -->
  <line x1="200" y1="278" x2="200" y2="298" stroke="#55c555" stroke-width="1.5"/>
  <text x="212" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">No</text>

  <polygon points="200,298 280,320 200,342 120,320" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="200" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">더 있음?</text>

  <!-- yes more items: back up -->
  <line x1="120" y1="320" x2="80" y2="320" stroke="#555" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="80" y1="320" x2="80" y2="184" stroke="#555" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="80" y1="184" x2="120" y2="184" stroke="#555" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="52" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">다음</text>

  <!-- no more: else -->
  <line x1="200" y1="342" x2="200" y2="362" stroke="#e8a838" stroke-width="2"/>
  <polygon points="200,366 195,356 205,356" fill="#e8a838"/>
  <text x="212" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8a838">소진</text>
  <rect x="120" y="366" width="160" height="44" rx="8" fill="#2a1a0d" stroke="#e8a838" stroke-width="2"/>
  <text x="200" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8a838" text-anchor="middle">else 블록 실행</text>
  <text x="200" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">break 없이 완주!</text>

  <!-- Right: code examples -->
  <text x="660" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">소수 판별 예제</text>
  <rect x="530" y="108" width="320" height="200" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="546" y="131" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">def</text>
  <text x="576" y="131" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> is_prime(n):</text>
  <text x="546" y="149" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">    for</text>
  <text x="586" y="149" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> i </text>
  <text x="604" y="149" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">in</text>
  <text x="622" y="149" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> range(</text>
  <text x="670" y="149" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">2</text>
  <text x="678" y="149" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">, n):</text>
  <text x="546" y="167" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">        if</text>
  <text x="600" y="167" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> n % i == </text>
  <text x="672" y="167" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">0</text>
  <text x="680" y="167" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">:</text>
  <text x="546" y="185" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">            return</text>
  <text x="654" y="185" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc"> False</text>
  <text x="546" y="203" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">    else</text>
  <text x="590" y="203" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">:   </text>
  <text x="616" y="203" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># break 없이 완주</text>
  <text x="546" y="221" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">        return</text>
  <text x="630" y="221" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc"> True</text>
  <text x="546" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  </text>
  <text x="546" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">print</text>
  <text x="586" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(is_prime(</text>
  <text x="664" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">7</text>
  <text x="672" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">))  </text>
  <text x="706" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># True</text>
  <text x="546" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">print</text>
  <text x="586" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(is_prime(</text>
  <text x="664" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">6</text>
  <text x="672" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">))  </text>
  <text x="706" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># False</text>
  <text x="546" y="295" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 7은 약수 없이 완주 → else → True</text>

  <!-- Bottom key insight -->
  <rect x="60" y="390" width="760" height="54" rx="8" fill="#111827" stroke="#2a3444"/>
  <text x="440" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle"><tspan font-weight="700" fill="#e8a838">핵심:</tspan> for/while else는 <tspan font-weight="700" fill="#55c555">break 없이 정상 완료</tspan>됐을 때만 실행 — "no-break" 절이라고 외우면 편함</text>
  <text x="440" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">while else도 동일: break 없이 조건이 False가 돼서 종료됐을 때 실행</text>
</svg>
