<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">docker ps 필터링과 포맷</text>
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#aaaaaa">-f, --format 옵션 활용</text>

  <!-- Left panel: -f filter -->
  <rect x="60" y="100" width="360" height="200" rx="8" fill="#0d0d0d" stroke="#1e2433"/>
  <text x="80" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">-f (필터) 키 목록</text>

  <text x="80" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">status=running</text>
  <text x="80" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">  실행 중인 컨테이너만</text>

  <text x="80" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">name=web</text>
  <text x="80" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">  이름에 "web" 포함</text>

  <text x="80" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">ancestor=nginx</text>
  <text x="80" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">  nginx 이미지 기반 컨테이너</text>

  <text x="80" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">label=env=prod</text>
  <text x="80" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">  특정 레이블이 있는 것</text>

  <!-- Right panel: –format -->
  <rect x="460" y="100" width="360" height="200" rx="8" fill="#0d0d0d" stroke="#1e2433"/>
  <text x="480" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">--format (Go 템플릿)</text>

  <text x="480" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">{{.ID}}</text>
  <text x="480" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">  컨테이너 ID (단축)</text>

  <text x="480" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">{{.Names}}</text>
  <text x="480" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">  컨테이너 이름</text>

  <text x="480" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">{{.Status}}</text>
  <text x="480" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">  실행 상태</text>

  <text x="480" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">{{.Ports}}</text>
  <text x="480" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">  노출된 포트 정보</text>

  <!-- Code examples -->
  <rect x="60" y="320" width="760" height="120" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 실행 중인 것만 + 이름 필터</text>
  <text x="76" y="364" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">docker ps</tspan>
    <tspan fill="#e8e8e8"> </tspan>
    <tspan fill="#7777cc">-f</tspan>
    <tspan fill="#e8e8e8"> </tspan>
    <tspan fill="#ce9178">status=running</tspan>
    <tspan fill="#e8e8e8"> </tspan>
    <tspan fill="#7777cc">-f</tspan>
    <tspan fill="#e8e8e8"> </tspan>
    <tspan fill="#ce9178">name=app</tspan>
  </text>
  <text x="76" y="386" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 이름만 출력 (스크립트에서 활용)</text>
  <text x="76" y="404" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">docker ps</tspan>
    <tspan fill="#e8e8e8"> </tspan>
    <tspan fill="#7777cc">--format</tspan>
    <tspan fill="#e8e8e8"> </tspan>
    <tspan fill="#ce9178">'{{.Names}}\t{{.Status}}'</tspan>
  </text>
  <text x="76" y="422" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># -q: ID만 출력 → xargs 파이프에 유용</text>
</svg>
