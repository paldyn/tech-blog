<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">템플릿 4가지 핵심 패턴</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">실무에서 자주 쓰이는 프롬프트 구조 유형</text>

  <!-- Pattern 1 -->
  <rect x="60" y="88" width="370" height="130" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">① 추출 패턴 (Extraction)</text>
  <text x="80" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">문서에서 구조화 데이터 뽑기</text>
  <text x="80" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">다음 텍스트에서 추출:</text>
  <text x="80" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">{text}</text>
  <text x="80" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">JSON: {fields} 형식으로 반환</text>
  <text x="80" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">→ NER, 폼 파싱, 문서 분류</text>

  <!-- Pattern 2 -->
  <rect x="450" y="88" width="370" height="130" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="470" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">② 변환 패턴 (Transformation)</text>
  <text x="470" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">형식·어조·언어 변환</text>
  <text x="470" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">다음 텍스트를</text>
  <text x="470" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">{source_style}</text>
  <text x="470" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">         에서</text>
  <text x="470" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">{target_style}</text>
  <text x="470" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">         로 변환:</text>
  <text x="470" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">→ 요약, 번역, 격식체↔구어체</text>

  <!-- Pattern 3 -->
  <rect x="60" y="238" width="370" height="130" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">③ 생성 패턴 (Generation)</text>
  <text x="80" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">새 콘텐츠 생성</text>
  <text x="80" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">주제: </text>
  <text x="116" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">{topic}</text>
  <text x="80" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">대상: </text>
  <text x="116" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">{audience}</text>
  <text x="80" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">형식: </text>
  <text x="116" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">{format}</text>
  <text x="80" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">→ 블로그, 이메일, 마케팅 카피</text>

  <!-- Pattern 4 -->
  <rect x="450" y="238" width="370" height="130" rx="8" fill="#111827" stroke="#ce9178" stroke-width="1.5"/>
  <text x="470" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">④ 평가 패턴 (Evaluation)</text>
  <text x="470" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">결과물 품질 채점·피드백</text>
  <text x="470" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">기준: </text>
  <text x="506" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">{rubric}</text>
  <text x="470" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">결과물: </text>
  <text x="524" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">{output}</text>
  <text x="470" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">1-10점 + 개선 의견 제공</text>
  <text x="470" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">→ LLM-as-Judge, 코드 리뷰</text>
</svg>
