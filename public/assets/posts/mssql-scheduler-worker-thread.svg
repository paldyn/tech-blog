<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">선점형 vs 협력적 스케줄링 비교</text>

  <!-- Preemptive (OS) -->
  <rect x="60" y="70" width="360" height="260" rx="10" fill="#1a0a1a" stroke="#7777cc" stroke-width="2"/>
  <text x="240" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">OS 선점형 스케줄링</text>
  <text x="240" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">(외부 CLR, xp_cmdshell 등)</text>
  <line x1="80" y1="125" x2="400" y2="125" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">OS 타이머가 강제 선점</text>
  <text x="240" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">컨텍스트 스위치 비용 높음</text>
  <text x="240" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">스레드별 독립 스택</text>
  <text x="240" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">커널 메모리 기반 스레드</text>
  <text x="240" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">SQL Server: PREEMPTIVE_</text>
  <text x="240" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">대기 유형으로 식별 가능</text>

  <rect x="90" y="270" width="300" height="40" rx="6" fill="#1a1520" stroke="#7777cc" stroke-width="1"/>
  <text x="240" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">최대 ~32,767개 OS 스레드 제한</text>

  <!-- Cooperative (SQLOS) -->
  <rect x="460" y="70" width="360" height="260" rx="10" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">SQLOS 협력적 스케줄링</text>
  <text x="640" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">(일반 SQL 실행 경로)</text>
  <line x1="480" y1="125" x2="800" y2="125" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">Worker 자발적 양보</text>
  <text x="640" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">컨텍스트 스위치 최소화</text>
  <text x="640" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">Quantum = 4ms</text>
  <text x="640" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">스케줄러당 1개 Worker만 실행</text>
  <text x="640" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Fiber Mode(UMS)도 지원</text>
  <text x="640" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">(대부분 환경에선 비활성화)</text>

  <rect x="480" y="270" width="300" height="40" rx="6" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">max worker threads 내 재사용</text>

  <!-- Code block -->
  <rect x="60" y="355" width="760" height="84" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- 현재 실행 중인 요청과 대기 상태</text>
  <text xml:space="preserve" x="80" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">SELECT</tspan><tspan fill="#ffffff"> r.session_id, r.status, r.wait_type, r.wait_time,</tspan></text>
  <text xml:space="preserve" x="80" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">       t.scheduler_id, t.exec_context_id, r.cpu_time</tspan></text>
  <text xml:space="preserve" x="80" y="430" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">FROM</tspan><tspan fill="#ffffff"> sys.dm_exec_requests r </tspan><tspan fill="#7ec8e3" font-weight="600">JOIN</tspan><tspan fill="#ffffff"> sys.dm_os_tasks t </tspan><tspan fill="#7ec8e3" font-weight="600">ON</tspan><tspan fill="#ffffff"> r.task_address=t.task_address;</tspan></text>
</svg>
