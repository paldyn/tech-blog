<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">git log --format 플레이스홀더</text>

  <!-- Code block: format string -->
  <text x="60" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">형식 지정 방법</text>
  <rect x="60" y="92" width="760" height="54" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1.5"/>
  <text x="76" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">git log --format="%h %an %ar %s"</text>
  <text x="76" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">9a3f1b2 Alice 2 hours ago feat: add user authentication</text>

  <!-- Placeholders table -->
  <rect x="60" y="164" width="760" height="270" rx="8" fill="#111827" stroke="#2a3650" stroke-width="1.5"/>

  <!-- Header -->
  <rect x="60" y="164" width="760" height="34" rx="8" fill="#1a2035"/>
  <text x="170" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">플레이스홀더</text>
  <text x="590" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">의미</text>

  <line x1="60" y1="198" x2="820" y2="198" stroke="#2a3650" stroke-width="1"/>

  <text x="170" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">%H / %h</text>
  <text x="590" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">전체 / 짧은 커밋 해시</text>

  <line x1="60" y1="228" x2="820" y2="228" stroke="#2a3650" stroke-width="1"/>

  <text x="170" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">%an / %ae</text>
  <text x="590" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">저자 이름 / 이메일</text>

  <line x1="60" y1="258" x2="820" y2="258" stroke="#2a3650" stroke-width="1"/>

  <text x="170" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">%ad / %ar</text>
  <text x="590" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">저자 날짜 / 상대 날짜 (N days ago)</text>

  <line x1="60" y1="288" x2="820" y2="288" stroke="#2a3650" stroke-width="1"/>

  <text x="170" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">%s</text>
  <text x="590" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">커밋 메시지 제목 줄</text>

  <line x1="60" y1="318" x2="820" y2="318" stroke="#2a3650" stroke-width="1"/>

  <text x="170" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">%b</text>
  <text x="590" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">커밋 메시지 본문</text>

  <line x1="60" y1="348" x2="820" y2="348" stroke="#2a3650" stroke-width="1"/>

  <text x="170" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">%d</text>
  <text x="590" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">브랜치·태그 등 ref 이름</text>

  <line x1="60" y1="378" x2="820" y2="378" stroke="#2a3650" stroke-width="1"/>

  <text x="170" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">%Cred %Cgreen %Creset</text>
  <text x="590" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">터미널 색상 적용 / 리셋</text>

  <!-- Note: format vs pretty -->
  <rect x="60" y="450" width="760" height="0" rx="8" fill="#111827" stroke="#2a3650" stroke-width="1.5"/>
</svg>
