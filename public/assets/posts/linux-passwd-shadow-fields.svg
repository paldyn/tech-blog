<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420" style="background:#0a0a0a;border-radius:12px;">
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" xml:space="preserve">/etc/shadow 파일 필드 구조</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" xml:space="preserve">9개 필드 · root만 읽기 (600 권한)</text>
  <line x1="60" y1="86" x2="820" y2="86" stroke="#1e2433" stroke-width="1"/>

  <!-- shadow example line -->
  <rect x="60" y="98" width="760" height="50" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1.5"/>
  <text x="76" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">/etc/shadow (한 줄 예시)</text>
  <text x="76" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve"><tspan fill="#ce9178">alice</tspan>:<tspan fill="#e05555">$6$salt$hash...</tspan>:<tspan fill="#b5cea8">19900</tspan>:<tspan fill="#7ec8e3">0</tspan>:<tspan fill="#7777cc">99999</tspan>:<tspan fill="#55c555">7</tspan>:::</text>

  <!-- Field table header -->
  <rect x="60" y="160" width="760" height="40" rx="6" fill="#12192a"/>
  <line x1="60" y1="160" x2="60" y2="200" stroke="#1e2433" stroke-width="1"/>
  <line x1="200" y1="160" x2="200" y2="200" stroke="#1e2433" stroke-width="1"/>
  <line x1="400" y1="160" x2="400" y2="200" stroke="#1e2433" stroke-width="1"/>
  <text x="130" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" xml:space="preserve">필드</text>
  <text x="300" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" xml:space="preserve">값/형식</text>
  <text x="610" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" xml:space="preserve">설명</text>

  <!-- Rows -->
  <rect x="60" y="200" width="760" height="36" fill="#0d1520"/>
  <line x1="200" y1="200" x2="200" y2="236" stroke="#1e2433" stroke-width="1"/>
  <line x1="400" y1="200" x2="400" y2="236" stroke="#1e2433" stroke-width="1"/>
  <text x="130" y="223" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178" xml:space="preserve">① 사용자명</text>
  <text x="300" y="223" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">alice</text>
  <text x="610" y="223" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" xml:space="preserve">/etc/passwd와 연결되는 키</text>

  <rect x="60" y="236" width="760" height="36" fill="#0a0a0a"/>
  <line x1="200" y1="236" x2="200" y2="272" stroke="#1e2433" stroke-width="1"/>
  <line x1="400" y1="236" x2="400" y2="272" stroke="#1e2433" stroke-width="1"/>
  <text x="130" y="259" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" xml:space="preserve">② 해시 비밀번호</text>
  <text x="300" y="259" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555" xml:space="preserve">$알고리즘$salt$hash</text>
  <text x="610" y="259" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" xml:space="preserve">$6=SHA-512, !잠금, *로그인불가</text>

  <rect x="60" y="272" width="760" height="36" fill="#0d1520"/>
  <line x1="200" y1="272" x2="200" y2="308" stroke="#1e2433" stroke-width="1"/>
  <line x1="400" y1="272" x2="400" y2="308" stroke="#1e2433" stroke-width="1"/>
  <text x="130" y="295" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#b5cea8" xml:space="preserve">③ 마지막 변경일</text>
  <text x="300" y="295" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">19900</text>
  <text x="610" y="295" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" xml:space="preserve">1970-01-01 기준 일수 (epoch days)</text>

  <rect x="60" y="308" width="760" height="36" fill="#0a0a0a"/>
  <line x1="200" y1="308" x2="200" y2="344" stroke="#1e2433" stroke-width="1"/>
  <line x1="400" y1="308" x2="400" y2="344" stroke="#1e2433" stroke-width="1"/>
  <text x="130" y="331" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">④⑤ 최소/최대 유효기간</text>
  <text x="300" y="331" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">0 / 99999</text>
  <text x="610" y="331" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" xml:space="preserve">변경 금지 기간 / 비밀번호 만료일(일)</text>

  <rect x="60" y="344" width="760" height="36" fill="#0d1520"/>
  <line x1="200" y1="344" x2="200" y2="380" stroke="#1e2433" stroke-width="1"/>
  <line x1="400" y1="344" x2="400" y2="380" stroke="#1e2433" stroke-width="1"/>
  <text x="130" y="367" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" xml:space="preserve">⑥ 경고 기간</text>
  <text x="300" y="367" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">7</text>
  <text x="610" y="367" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" xml:space="preserve">만료 N일 전부터 사용자에게 경고</text>

  <rect x="60" y="380" width="760" height="36" fill="#0a0a0a"/>
  <line x1="200" y1="380" x2="200" y2="416" stroke="#1e2433" stroke-width="1"/>
  <line x1="400" y1="380" x2="400" y2="416" stroke="#1e2433" stroke-width="1"/>
  <text x="130" y="403" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" xml:space="preserve">⑦⑧⑨ 비활성/만료/예약</text>
  <text x="300" y="403" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">(비어있음)</text>
  <text x="610" y="403" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">비활성 유예·계정만료일·예약 필드</text>

  <rect x="60" y="160" width="760" height="256" rx="6" fill="none" stroke="#1e2433" stroke-width="1"/>
</svg>
