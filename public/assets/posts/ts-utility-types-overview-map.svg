<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">TypeScript 내장 유틸리티 타입 전체 지도</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">용도별 그룹으로 분류한 완전 목록</text>

  <!-- Group 1: Object transform -->
  <rect x="60" y="90" width="240" height="180" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="180" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">객체 변환</text>
  <text x="180" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">Partial&lt;T&gt;</text>
  <text x="180" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">Required&lt;T&gt;</text>
  <text x="180" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">Readonly&lt;T&gt;</text>
  <text x="180" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">Pick&lt;T, K&gt;</text>
  <text x="180" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">Omit&lt;T, K&gt;</text>
  <text x="180" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">Record&lt;K, V&gt;</text>
  <text x="180" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">NonNullable&lt;T&gt;</text>
  <text x="180" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" text-anchor="middle">매핑된 타입 기반</text>

  <!-- Group 2: Union/Set -->
  <rect x="320" y="90" width="240" height="180" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">유니언 조작</text>
  <text x="440" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">Extract&lt;T, U&gt;</text>
  <text x="440" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">Exclude&lt;T, U&gt;</text>
  <text x="440" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" text-anchor="middle">분배 조건부 타입 기반</text>

  <!-- Group 3: Function/Class -->
  <rect x="580" y="90" width="240" height="180" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="700" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">함수 &amp; 클래스</text>
  <text x="700" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">ReturnType&lt;F&gt;</text>
  <text x="700" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">Parameters&lt;F&gt;</text>
  <text x="700" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">ConstructorParameters&lt;C&gt;</text>
  <text x="700" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">InstanceType&lt;C&gt;</text>
  <text x="700" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">ThisType&lt;T&gt;</text>
  <text x="700" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">OmitThisParameter&lt;F&gt;</text>
  <text x="700" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" text-anchor="middle">infer 기반</text>

  <!-- Group 4: Promise/Async -->
  <rect x="60" y="290" width="240" height="110" rx="8" fill="#1a1a0a" stroke="#e8c84a" stroke-width="1"/>
  <text x="180" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8c84a" text-anchor="middle">비동기</text>
  <text x="180" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">Awaited&lt;T&gt;</text>
  <text x="180" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" text-anchor="middle">Promise 재귀 해제 (TS 4.5)</text>

  <!-- Group 5: String -->
  <rect x="320" y="290" width="240" height="110" rx="8" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">문자열 조작</text>
  <text x="440" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">Uppercase · Lowercase</text>
  <text x="440" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">Capitalize · Uncapitalize</text>
  <text x="440" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" text-anchor="middle">intrinsic (TS 4.1)</text>

  <!-- Group 6: Inference control -->
  <rect x="580" y="290" width="240" height="110" rx="8" fill="#1a0a1a" stroke="#cc77cc" stroke-width="1"/>
  <text x="700" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#cc77cc" text-anchor="middle">추론 제어</text>
  <text x="700" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">NoInfer&lt;T&gt;</text>
  <text x="700" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" text-anchor="middle">추론 사이트 차단 (TS 5.4)</text>

  <!-- Bottom note -->
  <rect x="60" y="424" width="760" height="54" rx="6" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">선택 기준</text>
  <text x="440" y="464" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">속성 조작 → Partial/Required/Pick/Omit | 타입 추출 → Extract/Exclude | 함수 분해 → ReturnType/Parameters</text>
</svg>
