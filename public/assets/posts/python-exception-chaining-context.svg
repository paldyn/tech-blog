<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="43" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">예외 연결 실전 코드</text>

  <!-- Code block: chaining example -->
  <rect x="55" y="65" width="770" height="230" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="75" y="90" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3" font-weight="600">def</text><text x="105" y="90" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> load_config(path):</text>
  <text x="75" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3" font-weight="600">    try</text><text x="111" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">:</text>
  <text x="75" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">        </text><text x="147" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">with</text><text x="183" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> open(path) </text><text x="270" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">as</text><text x="290" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> f:</text>
  <text x="75" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">            </text><text x="175" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">return</text><text x="215" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> json.load(f)</text>
  <text x="75" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e05555" font-weight="600">    except</text><text x="135" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> FileNotFoundError </text><text x="282" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">as</text><text x="302" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> e:</text>
  <text x="75" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">        # 원인을 명시하여 재발생</text>
  <text x="75" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3" font-weight="600">        raise</text><text x="131" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> ConfigError(</text><text x="248" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">f"설정 파일 없음: {path}"</text><text x="480" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">) </text><text x="494" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">from</text><text x="530" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> e</text>
  <text x="75" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e05555" font-weight="600">    except</text><text x="135" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> json.JSONDecodeError </text><text x="298" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">as</text><text x="318" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> e:</text>
  <text x="75" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3" font-weight="600">        raise</text><text x="131" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> ConfigError(</text><text x="248" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"설정 파일 JSON 오류"</text><text x="422" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">) </text><text x="436" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">from</text><text x="472" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> e</text>
  <text x="75" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8"># → 트레이스백에 원본 FileNotFoundError / JSONDecodeError가 함께 표시</text>

  <!-- Bottom rule -->
  <rect x="55" y="315" width="770" height="44" rx="6" fill="#0c1c0a" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="336" text-anchor="middle" font-size="12" font-weight="700" fill="#55c555">라이브러리/API 예외를 앱 예외로 변환할 때 항상 raise AppError(...) from original</text>
  <text x="440" y="354" text-anchor="middle" font-size="11" fill="#888">호출자가 내부 구현 세부사항(OSError, JSONDecodeError)에 의존하지 않아도 됨</text>
</svg>
