<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">트라이 구현 핵심</text>

  <!-- Left: Node structure -->
  <rect x="50" y="65" width="360" height="275" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="230" y="85" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">노드 구조 및 삽입</text>
  <text x="66" y="108" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">class</tspan><tspan fill="#ffffff"> TrieNode:</tspan>
  </text>
  <text x="66" y="126" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    def</tspan><tspan fill="#ffffff"> __init__(self):</tspan>
  </text>
  <text x="66" y="144" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">        self.children = {}   </tspan><tspan fill="#9aa4b8"># 최대 26</tspan>
  </text>
  <text x="66" y="162" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">        self.is_end = </tspan><tspan fill="#7ec8e3" font-weight="600">False</tspan>
  </text>
  <text x="66" y="186" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">class</tspan><tspan fill="#ffffff"> Trie:</tspan>
  </text>
  <text x="66" y="204" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    def</tspan><tspan fill="#ffffff"> insert(self, word): </tspan><tspan fill="#9aa4b8"># O(m)</tspan>
  </text>
  <text x="66" y="222" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">        node = self.root</tspan>
  </text>
  <text x="66" y="240" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">        for</tspan><tspan fill="#ffffff"> ch </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> word:</tspan>
  </text>
  <text x="66" y="258" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">            if</tspan><tspan fill="#ffffff"> ch </tspan><tspan fill="#7ec8e3" font-weight="600">not in</tspan><tspan fill="#ffffff"> node.children:</tspan>
  </text>
  <text x="66" y="276" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">                node.children[ch] = TrieNode()</tspan>
  </text>
  <text x="66" y="294" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">            node = node.children[ch]</tspan>
  </text>
  <text x="66" y="312" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">        node.is_end = </tspan><tspan fill="#7ec8e3" font-weight="600">True</tspan>
  </text>

  <!-- Right: search and prefix -->
  <rect x="470" y="65" width="360" height="275" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="650" y="85" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">검색 및 접두사 검색</text>
  <text x="486" y="108" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    def</tspan><tspan fill="#ffffff"> search(self, word): </tspan><tspan fill="#9aa4b8"># O(m)</tspan>
  </text>
  <text x="486" y="126" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">        node = self._traverse(word)</tspan>
  </text>
  <text x="486" y="144" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">        return</tspan><tspan fill="#ffffff"> node </tspan><tspan fill="#7ec8e3" font-weight="600">is not</tspan><tspan fill="#ffffff"> None </tspan><tspan fill="#7ec8e3" font-weight="600">and</tspan><tspan fill="#ffffff"> node.is_end</tspan>
  </text>
  <text x="486" y="168" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    def</tspan><tspan fill="#ffffff"> starts_with(self, prefix):</tspan>
  </text>
  <text x="486" y="186" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">        return</tspan><tspan fill="#ffffff"> self._traverse(prefix) </tspan><tspan fill="#7ec8e3" font-weight="600">is not</tspan><tspan fill="#ffffff"> None</tspan>
  </text>
  <text x="486" y="210" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    def</tspan><tspan fill="#ffffff"> _traverse(self, word):</tspan>
  </text>
  <text x="486" y="228" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">        node = self.root</tspan>
  </text>
  <text x="486" y="246" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">        for</tspan><tspan fill="#ffffff"> ch </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> word:</tspan>
  </text>
  <text x="486" y="264" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">            if</tspan><tspan fill="#ffffff"> ch </tspan><tspan fill="#7ec8e3" font-weight="600">not in</tspan><tspan fill="#ffffff"> node.children:</tspan>
  </text>
  <text x="486" y="282" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">                return</tspan><tspan fill="#ffffff"> None</tspan>
  </text>
  <text x="486" y="300" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">            node = node.children[ch]</tspan>
  </text>
  <text x="486" y="318" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">        return</tspan><tspan fill="#ffffff"> node</tspan>
  </text>
</svg>
