<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">WebSocket 구현 — Dataset 연동 패턴</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">onmessage에서 수신 데이터를 Dataset에 addRow로 축적</text>

  <!-- Code block -->
  <rect x="60" y="88" width="760" height="264" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="115" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3">var</tspan><tspan> ws = </tspan><tspan fill="#7ec8e3">null</tspan><tspan>;</tspan>
  </text>

  <text x="76" y="133" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3">function</tspan><tspan> fn_wsConnect() {</tspan>
  </text>

  <text x="76" y="151" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan>  ws = </tspan><tspan fill="#7ec8e3">new</tspan><tspan> WebSocket(</tspan><tspan fill="#ce9178">"wss://host/ws"</tspan><tspan>);</tspan>
  </text>

  <text x="76" y="169" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">  // 연결 성공</text>

  <text x="76" y="187" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan>  ws.onopen = </tspan><tspan fill="#7ec8e3">function</tspan><tspan>() {</tspan>
  </text>

  <text x="76" y="205" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan>    trace(</tspan><tspan fill="#ce9178">"WS 연결 완료"</tspan><tspan>); };</tspan>
  </text>

  <text x="76" y="223" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">  // 메시지 수신 → Dataset 저장</text>

  <text x="76" y="241" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan>  ws.onmessage = </tspan><tspan fill="#7ec8e3">function</tspan><tspan>(ev) {</tspan>
  </text>

  <text x="76" y="259" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan>    </tspan><tspan fill="#7ec8e3">var</tspan><tspan> r = ds_rt.addRow();</tspan>
  </text>

  <text x="76" y="277" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan>    ds_rt.setColumn(r,</tspan><tspan fill="#ce9178">"MSG"</tspan><tspan>,ev.data); };</tspan>
  </text>

  <text x="76" y="295" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">  // 연결 종료</text>

  <text x="76" y="313" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan>  ws.onclose = </tspan><tspan fill="#7ec8e3">function</tspan><tspan>() {</tspan>
  </text>

  <text x="76" y="331" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan>    trace(</tspan><tspan fill="#ce9178">"WS 종료"</tspan><tspan>); };</tspan>
  </text>

  <text x="76" y="349" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">}</text>

  <!-- Bottom annotation -->
  <text x="440" y="382"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">ws.send(JSON.stringify(obj)) — JSON 직렬화 후 송신 권장</text>
</svg>
