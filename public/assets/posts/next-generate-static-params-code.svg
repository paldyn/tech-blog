<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <!-- Background -->
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">generateStaticParams 패턴</text>

  <!-- Left column: Basic usage -->
  <text x="230" y="78"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">기본 사용</text>

  <rect x="60" y="88" width="360" height="222" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="110" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// app/posts/[slug]/page.tsx</text>
  <text x="76" y="128" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">export async function</tspan>
    <tspan fill="#ffffff"> generateStaticParams() {</tspan>
  </text>
  <text x="76" y="146" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  const</tspan>
    <tspan fill="#ffffff"> posts = </tspan>
    <tspan fill="#7ec8e3" font-weight="600">await</tspan>
    <tspan fill="#ffffff"> fetchPosts();</tspan>
  </text>
  <text x="76" y="164" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  return</tspan>
    <tspan fill="#ffffff"> posts.map((post) =&gt; ({</tspan>
  </text>
  <text x="76" y="182" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">    slug: post.slug,</tspan>
  </text>
  <text x="76" y="200" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  }));</text>
  <text x="76" y="218" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">}</text>
  <text x="76" y="248" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">export default async function</tspan>
    <tspan fill="#ffffff"> Page({</tspan>
  </text>
  <text x="76" y="266" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">  params </tspan>
  </text>
  <text x="76" y="284" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">}) {</text>
  <text x="76" y="296" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  const</tspan>
    <tspan fill="#ffffff"> { slug } = </tspan>
    <tspan fill="#7ec8e3" font-weight="600">await</tspan>
    <tspan fill="#ffffff"> params;</tspan>
  </text>

  <!-- Right column: Nested params -->
  <text x="650" y="78"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">중첩 동적 라우트</text>

  <rect x="460" y="88" width="360" height="222" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="110" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// app/[category]/[slug]/page.tsx</text>
  <text x="476" y="128" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">export async function</tspan>
    <tspan fill="#ffffff"> generateStaticParams() {</tspan>
  </text>
  <text x="476" y="146" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  const</tspan>
    <tspan fill="#ffffff"> posts = </tspan>
    <tspan fill="#7ec8e3" font-weight="600">await</tspan>
    <tspan fill="#ffffff"> fetchAll();</tspan>
  </text>
  <text x="476" y="164" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  return</tspan>
    <tspan fill="#ffffff"> posts.map((p) =&gt; ({</tspan>
  </text>
  <text x="476" y="182" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">    category: p.category,</tspan>
  </text>
  <text x="476" y="200" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">    slug: p.slug,</tspan>
  </text>
  <text x="476" y="218" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  }));</text>
  <text x="476" y="236" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">}</text>
  <text x="476" y="266" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 결과: /nextjs/hello</text>
  <text x="476" y="284" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">//       /react/world</text>
  <text x="476" y="302" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">//       ...</text>

  <!-- dynamicParams code -->
  <text x="440" y="340"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">dynamicParams 제어</text>

  <rect x="60" y="352" width="760" height="88" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="374" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 목록에 없는 경로 처리 (기본: true = 요청 시 렌더링 후 캐시)</text>
  <text x="76" y="392" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">export const</tspan>
    <tspan fill="#ffffff"> dynamicParams = </tspan>
    <tspan fill="#b5cea8">true</tspan>
    <tspan fill="#ffffff">; </tspan>
    <tspan fill="#9aa4b8">// 새 글 추가해도 배포 없이 바로 서빙</tspan>
  </text>
  <text x="76" y="410" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">export const</tspan>
    <tspan fill="#ffffff"> dynamicParams = </tspan>
    <tspan fill="#b5cea8">false</tspan>
    <tspan fill="#ffffff">; </tspan>
    <tspan fill="#9aa4b8">// 목록 외 경로 404 처리</tspan>
  </text>
  <text x="76" y="428" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// revalidate 설정 시 특정 주기로 자동 갱신도 가능</text>
</svg>
