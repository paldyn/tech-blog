<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">execution() 표현식 문법 해부</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">각 토큰의 역할과 와일드카드 규칙</text>

  <!-- expression banner -->
  <rect x="60" y="88" width="760" height="52" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="106" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7777cc">execution(</tspan><tspan fill="#ce9178">public</tspan><tspan fill="#55c555">*</tspan><tspan fill="#7ec8e3">com.example.service</tspan><tspan fill="#ffffff">.*</tspan><tspan fill="#b5cea8">Service</tspan><tspan fill="#ffffff">.</tspan><tspan fill="#e05555">find</tspan><tspan fill="#ffffff">*(</tspan><tspan fill="#9aa4b8">..</tspan><tspan fill="#ffffff">))</tspan></text>

  <!-- second line in banner -->
  <text x="80" y="128" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#444">지시자     [수식어]  반환타입    패키지               클래스명      메서드명  파라미터</text>

  <!-- annotation lines below banner -->
  <!-- modifier -->
  <line x1="189" y1="140" x2="189" y2="172" stroke="#ce9178" stroke-width="2" stroke-dasharray="4,2"/>
  <rect x="140" y="174" width="90" height="28" rx="4" fill="#1a0f08" stroke="#ce9178" stroke-width="1"/>
  <text x="185" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ce9178">수식어 (생략 가능)</text>

  <!-- return type -->
  <line x1="222" y1="140" x2="222" y2="212" stroke="#55c555" stroke-width="2" stroke-dasharray="4,2"/>
  <rect x="192" y="214" width="60" height="28" rx="4" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="222" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">반환 타입</text>

  <!-- package -->
  <line x1="330" y1="140" x2="330" y2="172" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,2"/>
  <rect x="258" y="174" width="144" height="28" rx="4" fill="#071520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="330" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">패키지 (.. = 하위 포함)</text>

  <!-- class -->
  <line x1="430" y1="140" x2="430" y2="212" stroke="#b5cea8" stroke-width="2" stroke-dasharray="4,2"/>
  <rect x="382" y="214" width="96" height="28" rx="4" fill="#0d1200" stroke="#b5cea8" stroke-width="1"/>
  <text x="430" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#b5cea8">클래스명 (* 와일드카드)</text>

  <!-- method -->
  <line x1="475" y1="140" x2="475" y2="172" stroke="#e05555" stroke-width="2" stroke-dasharray="4,2"/>
  <rect x="430" y="174" width="90" height="28" rx="4" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="475" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">메서드명 (* 가능)</text>

  <!-- params -->
  <line x1="510" y1="140" x2="510" y2="212" stroke="#888" stroke-width="2" stroke-dasharray="4,2"/>
  <rect x="470" y="214" width="80" height="28" rx="4" fill="#141414" stroke="#555" stroke-width="1"/>
  <text x="510" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">파라미터</text>

  <!-- Wildcard reference table -->
  <rect x="60" y="268" width="360" height="196" rx="8" fill="#0f0f0f" stroke="#222" stroke-width="1"/>
  <text x="80" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">와일드카드 규칙</text>
  <line x1="80" y1="300" x2="400" y2="300" stroke="#222" stroke-width="1"/>

  <text x="90" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">*</text>
  <text x="116" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">임의의 단일 토큰 (패키지 한 단계)</text>
  <text x="90" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">..</text>
  <text x="116" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">파라미터: 0개 이상 모든 타입</text>
  <text x="116" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">패키지: 하위 패키지 포함</text>
  <text x="90" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">(*)</text>
  <text x="116" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">정확히 1개 파라미터 (타입 무관)</text>
  <text x="90" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">+</text>
  <text x="116" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">해당 타입 + 서브타입 모두 매칭</text>
  <text x="90" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">!</text>
  <text x="116" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">부정 (NOT)</text>
  <text x="90" y="436" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">&amp;&amp;  ||</text>
  <text x="116" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">AND / OR 조합</text>
  <text x="90" y="456" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">ServiceImpl+</text>
  <text x="188" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ServiceImpl 및 그 하위 클래스</text>

  <!-- Examples table right -->
  <rect x="450" y="268" width="370" height="196" rx="8" fill="#0f0f0f" stroke="#222" stroke-width="1"/>
  <text x="470" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">자주 쓰는 패턴</text>
  <line x1="470" y1="300" x2="800" y2="300" stroke="#222" stroke-width="1"/>

  <text x="466" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">execution(public * *(..))</text>
  <text x="470" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">모든 public 메서드</text>

  <text x="466" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">execution(* com.example..*.*(..))</text>
  <text x="470" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">com.example 하위 전체</text>

  <text x="466" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">execution(* *Service.find*(..))</text>
  <text x="470" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">*Service 클래스의 find* 메서드</text>

  <text x="466" y="428" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">execution(* *(String, ..))</text>
  <text x="470" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">첫 인자가 String인 메서드</text>

  <text x="466" y="464" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">!execution(* toString(..))</text>
  <text x="470" y="480" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">toString() 제외</text>

  <!-- footer -->
</svg>
