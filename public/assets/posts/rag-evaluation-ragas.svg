<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">RAGAS 평가 프레임워크</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888">RAG 파이프라인의 4가지 핵심 지표</text>

  <!-- Central: RAG System -->
  <rect x="330" y="100" width="220" height="60" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="127" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">RAG 시스템</text>
  <text x="440" y="149" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">쿼리 → 검색 → 생성 → 답변</text>

  <!-- Metric 1: Faithfulness -->
  <rect x="60" y="200" width="180" height="100" rx="8" fill="#0d1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="150" y="224" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">Faithfulness</text>
  <text x="150" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">충실도</text>
  <text x="150" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaddaa">답변이 검색된 문서에</text>
  <text x="150" y="281" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaddaa">근거했는가?</text>
  <text x="150" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">할루시네이션 감지</text>

  <!-- Metric 2: Answer Relevance -->
  <rect x="260" y="200" width="180" height="100" rx="8" fill="#0d1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="350" y="224" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">Answer Relevance</text>
  <text x="350" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">답변 관련성</text>
  <text x="350" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaaadd">답변이 질문에</text>
  <text x="350" y="281" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaaadd">적절히 응답하는가?</text>
  <text x="350" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">답변 품질 측정</text>

  <!-- Metric 3: Context Precision -->
  <rect x="460" y="200" width="180" height="100" rx="8" fill="#1a1500" stroke="#e8b84b" stroke-width="1.5"/>
  <text x="550" y="224" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8b84b">Context Precision</text>
  <text x="550" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">컨텍스트 정밀도</text>
  <text x="550" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#cccc88">검색된 문서 중</text>
  <text x="550" y="281" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#cccc88">실제 관련 문서 비율</text>
  <text x="550" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8b84b">검색기 노이즈 측정</text>

  <!-- Metric 4: Context Recall -->
  <rect x="660" y="200" width="160" height="100" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="740" y="224" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555">Context Recall</text>
  <text x="740" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">컨텍스트 재현율</text>
  <text x="740" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ddaaaa">필요한 정보가</text>
  <text x="740" y="281" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ddaaaa">실제 검색됐는가?</text>
  <text x="740" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">검색 누락 측정</text>

  <!-- Arrows from center to metrics -->
  <line x1="370" y1="160" x2="200" y2="198" stroke="#444" stroke-width="1.5"/>
  <polygon points="198,192 198,204 205,198" fill="#444"/>
  <line x1="400" y1="160" x2="350" y2="198" stroke="#444" stroke-width="1.5"/>
  <polygon points="344,192 344,204 351,198" fill="#444"/>
  <line x1="480" y1="160" x2="540" y2="198" stroke="#444" stroke-width="1.5"/>
  <polygon points="536,192 543,198 536,204" fill="#444"/>
  <line x1="510" y1="160" x2="720" y2="198" stroke="#444" stroke-width="1.5"/>
  <polygon points="716,192 723,198 716,204" fill="#444"/>

  <!-- Code block -->
  <rect x="60" y="320" width="760" height="80" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># RAGAS 평가 실행</text>
  <text x="76" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">from</text>
  <text x="108" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> ragas </text>
  <text x="108" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">       import</text>
  <text x="108" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">              evaluate</text>
  <text x="76" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">from</text>
  <text x="108" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> ragas.metrics </text>
  <text x="108" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">               import</text>
  <text x="108" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">                      faithfulness, answer_relevancy, context_precision</text>
  <text x="76" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">results = evaluate(dataset, metrics=[faithfulness, answer_relevancy, context_precision])</text>
</svg>
