<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">B-Tree 인덱스 구조</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">루트 → 브랜치 → 리프 노드 · 리프는 힙(데이터) 포인터 보유</text>

  <!-- ROOT node -->
  <rect x="340" y="86" width="200" height="44" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="103" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7777cc">ROOT</text>
  <text x="440" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">25 | 50 | 75</text>

  <!-- Branch nodes -->
  <rect x="120" y="170" width="150" height="44" rx="6" fill="#121220" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="195" y="187" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#7ec8e3">BRANCH</text>
  <text x="195" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">10 | 20</text>

  <rect x="365" y="170" width="150" height="44" rx="6" fill="#121220" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="187" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#7ec8e3">BRANCH</text>
  <text x="440" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">30 | 40</text>

  <rect x="610" y="170" width="150" height="44" rx="6" fill="#121220" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="685" y="187" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#7ec8e3">BRANCH</text>
  <text x="685" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">60 | 70</text>

  <!-- Lines from root to branches -->
  <line x1="390" y1="130" x2="195" y2="170" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="440" y1="130" x2="440" y2="170" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="490" y1="130" x2="685" y2="170" stroke="#7777cc" stroke-width="1.5"/>

  <!-- Leaf nodes -->
  <rect x="60" y="264" width="110" height="60" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="115" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" font-weight="700" fill="#55c555">LEAF</text>
  <text x="115" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">1, 5, 8</text>
  <text x="115" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#888">→ 힙 포인터</text>

  <rect x="182" y="264" width="110" height="60" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="237" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" font-weight="700" fill="#55c555">LEAF</text>
  <text x="237" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">12, 15, 18</text>
  <text x="237" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#888">→ 힙 포인터</text>

  <rect x="304" y="264" width="110" height="60" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="359" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" font-weight="700" fill="#55c555">LEAF</text>
  <text x="359" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">26, 28, 29</text>
  <text x="359" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#888">→ 힙 포인터</text>

  <rect x="426" y="264" width="110" height="60" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="481" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" font-weight="700" fill="#55c555">LEAF</text>
  <text x="481" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">32, 35, 39</text>
  <text x="481" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#888">→ 힙 포인터</text>

  <rect x="548" y="264" width="110" height="60" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="603" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" font-weight="700" fill="#55c555">LEAF</text>
  <text x="603" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">52, 58</text>
  <text x="603" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#888">→ 힙 포인터</text>

  <rect x="670" y="264" width="110" height="60" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="725" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" font-weight="700" fill="#55c555">LEAF</text>
  <text x="725" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">62, 68, 72</text>
  <text x="725" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#888">→ 힙 포인터</text>

  <!-- Lines from branches to leaves -->
  <line x1="160" y1="214" x2="115" y2="264" stroke="#7ec8e3" stroke-width="1"/>
  <line x1="195" y1="214" x2="237" y2="264" stroke="#7ec8e3" stroke-width="1"/>
  <line x1="395" y1="214" x2="359" y2="264" stroke="#7ec8e3" stroke-width="1"/>
  <line x1="440" y1="214" x2="481" y2="264" stroke="#7ec8e3" stroke-width="1"/>
  <line x1="635" y1="214" x2="603" y2="264" stroke="#7ec8e3" stroke-width="1"/>
  <line x1="685" y1="214" x2="725" y2="264" stroke="#7ec8e3" stroke-width="1"/>

  <!-- Leaf linked list arrows -->
  <line x1="170" y1="294" x2="182" y2="294" stroke="#ce9178" stroke-width="1.5"/>
  <polygon points="182,290 190,294 182,298" fill="#ce9178"/>
  <line x1="292" y1="294" x2="304" y2="294" stroke="#ce9178" stroke-width="1.5"/>
  <polygon points="304,290 312,294 304,298" fill="#ce9178"/>
  <line x1="414" y1="294" x2="426" y2="294" stroke="#ce9178" stroke-width="1.5"/>
  <polygon points="426,290 434,294 426,298" fill="#ce9178"/>
  <line x1="536" y1="294" x2="548" y2="294" stroke="#ce9178" stroke-width="1.5"/>
  <polygon points="548,290 556,294 548,298" fill="#ce9178"/>
  <line x1="658" y1="294" x2="670" y2="294" stroke="#ce9178" stroke-width="1.5"/>
  <polygon points="670,290 678,294 670,298" fill="#ce9178"/>

  <!-- Legend -->
  <rect x="60" y="350" width="760" height="32" rx="6" fill="#111" stroke="#333"/>
  <text x="100" y="371" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ce9178">━━▶ 리프 노드 연결 리스트</text>
  <text x="310" y="371" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">(범위 스캔 시 → 다음 리프로 이동)</text>
  <text x="600" y="371" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">높이(Height) = 3 → 탐색 I/O = 3회</text>

  <!-- Height indicator -->
  <text x="30" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">H=1</text>
  <text x="30" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">H=2</text>
  <text x="30" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">H=3</text>

  <!-- Heap pointer label -->
  <rect x="60" y="390" width="760" height="80" rx="6" fill="#0d1520" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="412" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">B-Tree 핵심 특성</text>
  <text x="80" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• O(log N) 탐색: 1억 행 → 높이 약 7 → 7번 블록 I/O로 검색 완료</text>
  <text x="80" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• 리프 연결 리스트: 범위 스캔 시 추가 트리 탐색 없이 순차 이동</text>
  <text x="80" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• 밸런스 유지: 모든 리프 노드가 같은 높이 (Balanced Tree)</text>
</svg>
