<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" width="880" height="540" style="background:#0a0a0a;" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">AWR · ASH 아키텍처</text>
  <text x="440" y="68" text-anchor="middle" font-size="16" font-weight="600" fill="#aaaaaa">Automatic Workload Repository &amp; Active Session History</text>

  <!-- Memory layer -->
  <rect x="60" y="100" width="760" height="110" rx="12" fill="#0e1623" stroke="#1e3050" stroke-width="1.5"/>
  <text x="80" y="122" font-size="13" fill="#888">메모리 (SGA)</text>

  <!-- ASH memory box -->
  <rect x="100" y="130" width="250" height="64" rx="8" fill="#112236" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="225" y="156" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">V$ACTIVE_SESSION_HISTORY</text>
  <text x="225" y="178" text-anchor="middle" font-size="12" fill="#aaaaaa">1초마다 Active 세션 샘플링 (최근 30분)</text>

  <!-- AWR buffer -->
  <rect x="530" y="130" width="250" height="64" rx="8" fill="#112236" stroke="#55c555" stroke-width="1.5"/>
  <text x="655" y="156" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">AWR Buffer (SGA)</text>
  <text x="655" y="178" text-anchor="middle" font-size="12" fill="#aaaaaa">통계 수집 → Snapshot 대기</text>

  <!-- Arrow ASH -> AWR buffer -->
  <line x1="350" y1="162" x2="530" y2="162" stroke="#888" stroke-width="2" stroke-dasharray="4,4"/>
  <polygon points="530,157 545,162 530,167" fill="#888"/>
  <text x="440" y="154" text-anchor="middle" font-size="12" fill="#888">10초마다 flush</text>

  <!-- Disk layer -->
  <rect x="60" y="240" width="760" height="110" rx="12" fill="#0e1a0e" stroke="#1e4020" stroke-width="1.5"/>
  <text x="80" y="262" font-size="13" fill="#888">디스크 (SYSAUX Tablespace)</text>

  <!-- DBA_HIST_ACTIVE_SESS_HISTORY -->
  <rect x="100" y="270" width="270" height="64" rx="8" fill="#0f2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="235" y="296" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">DBA_HIST_ACTIVE_SESS_HISTORY</text>
  <text x="235" y="316" text-anchor="middle" font-size="12" fill="#aaaaaa">ASH 장기 보관 (기본 8일)</text>

  <!-- AWR snapshots -->
  <rect x="510" y="270" width="270" height="64" rx="8" fill="#0f2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="645" y="296" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">DBA_HIST_SNAPSHOT</text>
  <text x="645" y="316" text-anchor="middle" font-size="12" fill="#aaaaaa">스냅샷 메타데이터 (기본 1시간 간격)</text>

  <!-- Arrow memory -> disk -->
  <line x1="225" y1="194" x2="225" y2="270" stroke="#55c555" stroke-width="2"/>
  <polygon points="220,270 225,286 230,270" fill="#55c555"/>
  <text x="245" y="238" font-size="12" fill="#888">Flush by MMON</text>

  <line x1="655" y1="194" x2="655" y2="270" stroke="#55c555" stroke-width="2"/>
  <polygon points="650,270 655,286 660,270" fill="#55c555"/>
  <text x="665" y="238" font-size="12" fill="#888">Snap by MMON</text>

  <!-- MMON label -->
  <rect x="355" y="218" width="150" height="36" rx="6" fill="#1a1a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="430" y="241" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">MMON / MMNL</text>

  <!-- Reports section -->
  <rect x="60" y="380" width="760" height="110" rx="12" fill="#1a1208" stroke="#e0a833" stroke-width="1.5"/>
  <text x="80" y="402" font-size="13" fill="#888">분석 도구</text>

  <rect x="100" y="408" width="180" height="64" rx="8" fill="#221a08" stroke="#e0a833" stroke-width="1.5"/>
  <text x="190" y="432" text-anchor="middle" font-size="13" font-weight="600" fill="#e0a833">AWR Report</text>
  <text x="190" y="452" text-anchor="middle" font-size="12" fill="#aaaaaa">두 Snapshot 간 비교</text>
  <text x="190" y="468" text-anchor="middle" font-size="11" fill="#888">awrrpt.sql</text>

  <rect x="310" y="408" width="180" height="64" rx="8" fill="#221a08" stroke="#e0a833" stroke-width="1.5"/>
  <text x="400" y="432" text-anchor="middle" font-size="13" font-weight="600" fill="#e0a833">ASH Report</text>
  <text x="400" y="452" text-anchor="middle" font-size="12" fill="#aaaaaa">특정 시간대 세션 분석</text>
  <text x="400" y="468" text-anchor="middle" font-size="11" fill="#888">ashrpt.sql</text>

  <rect x="520" y="408" width="180" height="64" rx="8" fill="#221a08" stroke="#e0a833" stroke-width="1.5"/>
  <text x="610" y="432" text-anchor="middle" font-size="13" font-weight="600" fill="#e0a833">ADDM</text>
  <text x="610" y="452" text-anchor="middle" font-size="12" fill="#aaaaaa">자동 진단 권고</text>
  <text x="610" y="468" text-anchor="middle" font-size="11" fill="#888">DBMS_ADDM</text>

  <!-- Arrows from disk to reports -->
  <line x1="235" y1="334" x2="190" y2="408" stroke="#e0a833" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="645" y1="334" x2="610" y2="408" stroke="#e0a833" stroke-width="2" stroke-dasharray="5,3"/>
</svg>
