<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" width="880" height="540" style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <text x="440" y="52" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">HTML5 런타임 초기화 시퀀스</text>
  <text x="440" y="76" text-anchor="middle" fill="#888" font-size="13">브라우저가 Nexacro 앱을 로드할 때 일어나는 순서</text>

  <!-- Step boxes: horizontal flow with arrows -->
  <!-- Step 1 -->
  <rect x="60" y="110" width="130" height="70" rx="8" fill="#0e1520" stroke="#1e3050" stroke-width="1.5"/>
  <text x="125" y="138" text-anchor="middle" fill="#7ec8e3" font-size="12" font-weight="700">① 런타임 JS</text>
  <text x="125" y="156" text-anchor="middle" fill="#888" font-size="11">nexacro.js 로드</text>
  <text x="125" y="172" text-anchor="middle" fill="#888" font-size="11">엔진 초기화</text>

  <!-- Arrow 1→2 -->
  <line x1="190" y1="145" x2="218" y2="145" stroke="#555" stroke-width="2"/>
  <polygon points="222,145 212,139 212,151" fill="#555"/>

  <!-- Step 2 -->
  <rect x="222" y="110" width="130" height="70" rx="8" fill="#0e1520" stroke="#1e3050" stroke-width="1.5"/>
  <text x="287" y="138" text-anchor="middle" fill="#7ec8e3" font-size="12" font-weight="700">② 환경설정 로드</text>
  <text x="287" y="156" text-anchor="middle" fill="#888" font-size="11">service.xml 파싱</text>
  <text x="287" y="172" text-anchor="middle" fill="#888" font-size="11">서비스 URL 등록</text>

  <!-- Arrow 2→3 -->
  <line x1="352" y1="145" x2="380" y2="145" stroke="#555" stroke-width="2"/>
  <polygon points="384,145 374,139 374,151" fill="#555"/>

  <!-- Step 3 -->
  <rect x="384" y="110" width="130" height="70" rx="8" fill="#0e1520" stroke="#1e3050" stroke-width="1.5"/>
  <text x="449" y="138" text-anchor="middle" fill="#7ec8e3" font-size="12" font-weight="700">③ TypeDef 파싱</text>
  <text x="449" y="156" text-anchor="middle" fill="#888" font-size="11">컴포넌트 정의</text>
  <text x="449" y="172" text-anchor="middle" fill="#888" font-size="11">타입 등록</text>

  <!-- Arrow 3→4 -->
  <line x1="514" y1="145" x2="542" y2="145" stroke="#555" stroke-width="2"/>
  <polygon points="546,145 536,139 536,151" fill="#555"/>

  <!-- Step 4 -->
  <rect x="546" y="110" width="130" height="70" rx="8" fill="#0e1520" stroke="#1e3050" stroke-width="1.5"/>
  <text x="611" y="138" text-anchor="middle" fill="#7ec8e3" font-size="12" font-weight="700">④ 첫 폼 로드</text>
  <text x="611" y="156" text-anchor="middle" fill="#888" font-size="11">.xfdl 파싱</text>
  <text x="611" y="172" text-anchor="middle" fill="#888" font-size="11">컴포넌트 생성</text>

  <!-- Arrow 4→5 -->
  <line x1="676" y1="145" x2="704" y2="145" stroke="#555" stroke-width="2"/>
  <polygon points="708,145 698,139 698,151" fill="#555"/>

  <!-- Step 5 -->
  <rect x="708" y="110" width="112" height="70" rx="8" fill="#0e200e" stroke="#1e501e" stroke-width="1.5"/>
  <text x="764" y="138" text-anchor="middle" fill="#55c555" font-size="12" font-weight="700">⑤ onload 발생</text>
  <text x="764" y="156" text-anchor="middle" fill="#888" font-size="11">스크립트 실행</text>
  <text x="764" y="172" text-anchor="middle" fill="#888" font-size="11">화면 출력 완료</text>

  <!-- Code block: nexacro.js loading pattern -->
  <rect x="60" y="210" width="380" height="230" rx="8" fill="#0e1520" stroke="#1e3050" stroke-width="1"/>
  <text x="250" y="234" text-anchor="middle" fill="#7ec8e3" font-size="13" font-weight="600">index.html 핵심 구조</text>
  <rect x="76" y="244" width="348" height="184" rx="6" fill="#070b14" stroke="#1e2433"/>
  <!-- code lines -->
  <text xml:space="preserve" x="92" y="264" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">&lt;!-- 1. 런타임 로드 --&gt;</text>
  <text xml:space="preserve" x="92" y="282" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">&lt;<tspan fill="#7ec8e3">script</tspan> <tspan fill="#ce9178">src</tspan>=<tspan fill="#ce9178">"nexacro.js"</tspan>&gt;&lt;/<tspan fill="#7ec8e3">script</tspan>&gt;</text>
  <text xml:space="preserve" x="92" y="300" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">&lt;!-- 2. 앱 시작 --&gt;</text>
  <text xml:space="preserve" x="92" y="318" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">&lt;<tspan fill="#7ec8e3">script</tspan>&gt;</text>
  <text xml:space="preserve" x="106" y="336" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">nexacro.<tspan fill="#e8e8e8">init</tspan>({</text>
  <text xml:space="preserve" x="120" y="354" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">startForm: <tspan fill="#ce9178">"MainForm"</tspan>,</text>
  <text xml:space="preserve" x="120" y="372" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">serviceURL: <tspan fill="#ce9178">"service.xml"</tspan></text>
  <text xml:space="preserve" x="106" y="390" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">});</text>
  <text xml:space="preserve" x="92" y="408" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">&lt;/<tspan fill="#7ec8e3">script</tspan>&gt;</text>

  <!-- Right side: plugin 비교 -->
  <rect x="460" y="210" width="360" height="230" rx="8" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="640" y="234" text-anchor="middle" fill="#e8e8e8" font-size="13" font-weight="600">플러그인 의존성 비교</text>

  <!-- old row -->
  <rect x="476" y="248" width="328" height="44" rx="4" fill="#200e0e"/>
  <text x="490" y="268" fill="#e05555" font-size="12" font-weight="600">Nexacro Platform (구)</text>
  <text x="490" y="284" fill="#888" font-size="11">ActiveX NPXLCF 플러그인 필수 → IE 전용</text>

  <!-- new row -->
  <rect x="476" y="302" width="328" height="44" rx="4" fill="#0e200e"/>
  <text x="490" y="322" fill="#55c555" font-size="12" font-weight="600">Nexacro N (현재)</text>
  <text x="490" y="338" fill="#888" font-size="11">순수 JS/Canvas → 플러그인 없음, 모든 브라우저</text>

  <!-- rendering info -->
  <rect x="476" y="356" width="328" height="72" rx="4" fill="#0e0e20"/>
  <text x="490" y="376" fill="#7777cc" font-size="12" font-weight="600">Canvas 렌더링 방식</text>
  <text x="490" y="394" fill="#888" font-size="11">• 컴포넌트 = Canvas 위 직접 그리기</text>
  <text x="490" y="412" fill="#888" font-size="11">• DOM 최소화 → 대량 행 렌더링 성능↑</text>
  <text x="490" y="428" fill="#888" font-size="11">• 브라우저 resize 시 Canvas 재계산</text>

  <text x="440" y="502" text-anchor="middle" fill="#444" font-size="11">PALDYN · Nexacro N 완전 정복 시리즈</text>
</svg>
