<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">컨테이너 내부 구조</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888">격리된 실행 단위 — 애플리케이션부터 런타임까지</text>

  <!-- Container outer boundary -->
  <rect x="80" y="94" width="720" height="280" fill="#0f1117" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" rx="12"/>
  <text x="104" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">Container (격리된 프로세스 환경)</text>

  <!-- App layer -->
  <rect x="120" y="126" width="640" height="64" fill="#13162a" stroke="#7ec8e3" stroke-width="1.5" rx="8"/>
  <text x="440" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3">Application</text>
  <text x="440" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">웹 서버, API, 배치 프로세스 등 실제 비즈니스 로직</text>

  <!-- Libraries layer -->
  <rect x="120" y="204" width="640" height="64" fill="#0f1a12" stroke="#55c555" stroke-width="1.5" rx="8"/>
  <text x="440" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555">Libraries / Dependencies</text>
  <text x="440" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Node.js, Python 패키지, .so 공유 라이브러리 등</text>

  <!-- Runtime layer -->
  <rect x="120" y="282" width="640" height="64" fill="#1a1408" stroke="#e0a030" stroke-width="1.5" rx="8"/>
  <text x="440" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e0a030">Container Filesystem (Read-Only Image + Writable Layer)</text>
  <text x="440" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">OverlayFS 레이어 스택 — 이미지는 읽기 전용, 실행 중 변경은 writable layer에</text>

  <!-- Arrow down -->
  <line x1="440" y1="382" x2="440" y2="412" stroke="#555" stroke-width="2"/>
  <polygon points="440,420 433,410 447,410" fill="#555"/>

  <!-- Host OS Kernel -->
  <rect x="80" y="422" width="720" height="56" fill="#111" stroke="#555" stroke-width="1.5" rx="8"/>
  <text x="440" y="446" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#aaa">Host OS Kernel</text>
  <text x="440" y="466" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#666">모든 컨테이너가 공유 — namespace/cgroup으로 격리</text>
</svg>
