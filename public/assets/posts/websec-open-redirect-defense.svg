<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">오픈 리다이렉트 방어 전략</text>

  <!-- Defense 1: Allowlist -->
  <rect x="60" y="68" width="370" height="150" rx="8" fill="#0a100a" stroke="#55c555" stroke-width="1"/>
  <text x="245" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">① 허용 목록(allowlist) 검증</text>
  <rect x="76" y="104" width="338" height="102" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">const SAFE_HOSTS = [</text>
  <text x="92" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">  'app.example.com',</text>
  <text x="92" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">  'sub.example.com'</text>
  <text x="92" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">]</text>
  <text x="92" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">// new URL().hostname 으로 파싱</text>

  <!-- Defense 2: Relative URLs -->
  <rect x="450" y="68" width="370" height="150" rx="8" fill="#0a100a" stroke="#55c555" stroke-width="1"/>
  <text x="635" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">② 상대 경로만 허용</text>
  <rect x="466" y="104" width="338" height="102" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">function safeRedirect(url) {</text>
  <text x="482" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">  // 상대 경로만 허용</text>
  <text x="482" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  if (!/^\/[^\/\\]/.test(url))</text>
  <text x="482" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600" xml:space="preserve">    return '/dashboard'</text>
  <text x="482" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  return url</text>
  <text x="482" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">}</text>

  <!-- Defense 3: Indirect redirect -->
  <rect x="60" y="240" width="370" height="148" rx="8" fill="#0a100a" stroke="#55c555" stroke-width="1"/>
  <text x="245" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">③ 간접 리다이렉트 (토큰 방식)</text>
  <rect x="76" y="276" width="338" height="100" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// URL을 DB에 저장, 토큰만 노출</text>
  <text x="92" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">GET /redirect?id=abc123</text>
  <text x="92" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">→ DB 조회: id=abc123</text>
  <text x="92" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600" xml:space="preserve">→ 302 Location: /dashboard</text>
  <text x="76" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">외부 URL 파라미터를 URL에 노출하지 않음</text>

  <!-- Defense 4: Warning page -->
  <rect x="450" y="240" width="370" height="148" rx="8" fill="#0a0a18" stroke="#7777cc" stroke-width="1"/>
  <text x="635" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">④ 이탈 경고 페이지</text>
  <text x="466" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">외부 URL로 이동 시 중간 경고 페이지</text>
  <text x="466" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">사용자가 목적지를 확인 후 직접 선택</text>
  <rect x="466" y="320" width="338" height="56" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">이 사이트를 나가서 이동합니다:</text>
  <text x="482" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">https://external-site.com</text>
  <text x="635" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">계속 / 취소 버튼으로 사용자 동의 획득</text>
</svg>
