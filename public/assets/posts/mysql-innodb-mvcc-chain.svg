<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">InnoDB MVCC — 숨겨진 컬럼과 버전 체인</text>

  <!-- Current row in table -->
  <rect x="60" y="72" width="760" height="72" rx="8" fill="#111827" stroke="#2a2a40"/>
  <text x="160" y="96" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">accounts 행 (현재)</text>
  <rect x="80" y="108" width="680" height="26" rx="3" fill="#16213e" stroke="#2a3a5a"/>
  <text x="180" y="126" text-anchor="middle" font-size="12" fill="#888">id</text>
  <text x="300" y="126" text-anchor="middle" font-size="12" fill="#888">balance</text>
  <text x="460" y="126" text-anchor="middle" font-size="12" fill="#7ec8e3">DB_TRX_ID (숨김)</text>
  <text x="660" y="126" text-anchor="middle" font-size="12" fill="#7777cc">DB_ROLL_PTR (숨김)</text>

  <!-- actual values row -->
  <rect x="80" y="134" width="680" height="26" rx="3" fill="#0f1520" stroke="#2a2a40"/>
  <text x="180" y="152" text-anchor="middle" font-size="13" fill="#b5cea8">1</text>
  <text x="300" y="152" text-anchor="middle" font-size="13" fill="#e8e8e8">900</text>
  <text x="460" y="152" text-anchor="middle" font-size="13" fill="#7ec8e3">TRX 103</text>
  <text x="660" y="152" text-anchor="middle" font-size="13" fill="#7777cc">→ Undo v3</text>

  <!-- Version chain -->
  <text x="440" y="196" text-anchor="middle" font-size="13" fill="#888">DB_ROLL_PTR 가 가리키는 Undo Log 체인</text>

  <!-- Undo v3 -->
  <rect x="60" y="210" width="220" height="80" rx="6" fill="#070b14" stroke="#2a3a4a"/>
  <text x="170" y="234" text-anchor="middle" font-size="12" font-weight="600" fill="#7777cc">Undo v3 (TRX 103 이전)</text>
  <text x="80" y="256" font-size="12" fill="#888">balance = 950</text>
  <text x="80" y="274" font-size="12" fill="#7ec8e3">DB_TRX_ID = 102</text>
  <text x="80" y="280" font-size="11" fill="#7777cc">→ Undo v2</text>

  <line x1="280" y1="250" x2="310" y2="250" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="310,244 322,250 310,256" fill="#7777cc"/>

  <!-- Undo v2 -->
  <rect x="324" y="210" width="220" height="80" rx="6" fill="#070b14" stroke="#2a3a4a"/>
  <text x="434" y="234" text-anchor="middle" font-size="12" font-weight="600" fill="#7777cc">Undo v2 (TRX 102 이전)</text>
  <text x="344" y="256" font-size="12" fill="#888">balance = 1000</text>
  <text x="344" y="274" font-size="12" fill="#7ec8e3">DB_TRX_ID = 98</text>
  <text x="344" y="280" font-size="11" fill="#7777cc">→ Undo v1</text>

  <line x1="544" y1="250" x2="574" y2="250" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,2"/>
  <polygon points="574,244 586,250 574,256" fill="#7777cc"/>

  <!-- Undo v1 -->
  <rect x="588" y="210" width="220" height="80" rx="6" fill="#070b14" stroke="#2a3a4a"/>
  <text x="698" y="234" text-anchor="middle" font-size="12" font-weight="600" fill="#7777cc">Undo v1 (TRX 98 이전)</text>
  <text x="608" y="256" font-size="12" fill="#888">balance = 1200</text>
  <text x="608" y="274" font-size="12" fill="#7ec8e3">DB_TRX_ID = 50</text>
  <text x="608" y="280" font-size="11" fill="#888">→ NULL</text>

  <!-- ReadView section -->
  <rect x="60" y="320" width="760" height="158" rx="8" fill="#111827" stroke="#2a2a40"/>
  <text x="440" y="346" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">ReadView — 어느 버전이 보이는가</text>

  <rect x="80" y="360" width="340" height="100" rx="6" fill="#0f1520" stroke="#2a3a5a"/>
  <text x="250" y="382" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">ReadView 구성 요소</text>
  <text x="96" y="404" font-size="12" fill="#888">m_ids:         열린 트랜잭션 ID 목록</text>
  <text x="96" y="422" font-size="12" fill="#888">min_trx_id:    m_ids 중 최솟값</text>
  <text x="96" y="440" font-size="12" fill="#888">max_trx_id:    ReadView 생성 시 다음 TRX_ID</text>
  <text x="96" y="458" font-size="12" fill="#888">creator_trx_id: 이 ReadView를 만든 TRX_ID</text>

  <rect x="440" y="360" width="364" height="100" rx="6" fill="#1e3a2a" stroke="#2a4a2a"/>
  <text x="622" y="382" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">가시성 판단 규칙</text>
  <text x="458" y="404" font-size="12" fill="#888">TRX_ID &lt; min_trx_id → 볼 수 있음</text>
  <text x="458" y="422" font-size="12" fill="#888">TRX_ID &gt;= max_trx_id → 볼 수 없음</text>
  <text x="458" y="440" font-size="12" fill="#888">m_ids에 있음 → 볼 수 없음 (아직 열림)</text>
  <text x="458" y="458" font-size="12" fill="#55c555">볼 수 없으면 Undo 체인에서 이전 버전 탐색</text>
</svg>
