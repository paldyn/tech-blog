<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="arr-t1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-t2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-t3" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">경쟁 조건 — 오래된 응답이 나중에 도착</text>

  <!-- Timeline header -->
  <text x="80" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">시간 →</text>
  <line x1="80" y1="90" x2="820" y2="90" stroke="#333" stroke-width="1"/>

  <!-- Request 1 (userId=1) -->
  <text x="80" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">userId=1 요청</text>
  <line x1="80" y1="126" x2="700" y2="126" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-t1)"/>

  <!-- Request 2 (userId=2) -->
  <text x="80" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">userId=2 요청</text>
  <line x1="80" y1="174" x2="500" y2="174" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-t3)"/>

  <!-- Response markers -->
  <!-- Response 2 arrives first -->
  <rect x="500" y="160" width="120" height="34" rx="4" fill="#0d2e0d" stroke="#55c555" stroke-width="1"/>
  <text x="560" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">userId=2 응답 ✓</text>

  <!-- Response 1 arrives AFTER response 2 -->
  <rect x="700" y="112" width="120" height="34" rx="4" fill="#2e0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="760" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">userId=1 응답 ⚠</text>

  <!-- Problem indication -->
  <line x1="760" y1="148" x2="760" y2="196" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-t2)"/>

  <rect x="640" y="200" width="200" height="46" rx="6" fill="#2e0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="740" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">setUser(userId=1 데이터)</text>
  <text x="740" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">userId=2를 보고 있는데 오래된 데이터!</text>

  <!-- Divider -->
  <line x1="60" y1="278" x2="820" y2="278" stroke="#222" stroke-width="1"/>
  <text x="440" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">— 해결책: ignore 플래그 패턴 —</text>

  <!-- Solution timeline -->
  <text x="80" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">userId=1 요청</text>
  <line x1="80" y1="316" x2="700" y2="316" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-t1)"/>

  <text x="80" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">userId=2 요청 → ignore=true (userId=1)</text>
  <line x1="80" y1="362" x2="500" y2="362" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-t3)"/>

  <!-- Ignored response -->
  <rect x="700" y="302" width="120" height="34" rx="4" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="760" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">ignore=true → 무시 ✓</text>

  <!-- Valid response -->
  <rect x="500" y="348" width="120" height="34" rx="4" fill="#0d2e0d" stroke="#55c555" stroke-width="1"/>
  <text x="560" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">userId=2 정상 처리 ✓</text>
</svg>
