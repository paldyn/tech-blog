<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">useId 주요 활용 패턴</text>

  <!-- Pattern 1: Accessibility -->
  <rect x="60" y="68" width="360" height="150" rx="8" fill="#0a1a20" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">접근성 — aria 연결</text>
  <rect x="76" y="104" width="328" height="100" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="88" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> id = </tspan><tspan fill="#7ec8e3" font-weight="600">useId</tspan><tspan fill="#ffffff">();</tspan></text>
  <text x="88" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> (</tspan></text>
  <text x="88" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#ffffff">  &lt;div role=</tspan><tspan fill="#ce9178">"group"</tspan><tspan fill="#ffffff"> aria-labelledby={</tspan><tspan fill="#ce9178">`${id}-label`</tspan><tspan fill="#ffffff">}&gt;</tspan></text>
  <text x="88" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#ffffff">    &lt;h3 id={</tspan><tspan fill="#ce9178">`${id}-label`</tspan><tspan fill="#ffffff">}&gt;그룹 제목&lt;/h3&gt;</tspan></text>
  <text x="88" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#ffffff">  &lt;/div&gt;</tspan></text>

  <!-- Pattern 2: Multiple related IDs -->
  <rect x="460" y="68" width="360" height="150" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">연관 ID 세트</text>
  <rect x="476" y="104" width="328" height="100" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="488" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#9aa4b8">// useId 하나로 여러 관련 ID 생성</tspan></text>
  <text x="488" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> id = </tspan><tspan fill="#7ec8e3" font-weight="600">useId</tspan><tspan fill="#ffffff">();</tspan></text>
  <text x="488" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> inputId = </tspan><tspan fill="#ce9178">`${id}-input`</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="488" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> descId = </tspan><tspan fill="#ce9178">`${id}-desc`</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="488" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12"><tspan fill="#9aa4b8">// inputId, descId는 항상 짝</tspan></text>

  <!-- Note: when NOT to use -->
  <rect x="60" y="238" width="760" height="116" rx="8" fill="#1a1a1a" stroke="#555"/>
  <text x="440" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">useId 주의사항</text>
  <text x="80" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">❌  목록 아이템 key로 사용 금지 — key는 데이터 고유 ID 사용</text>
  <text x="80" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">❌  CSS selector용 ID에는 적합하지 않음 — 콜론(:) 포함</text>
  <text x="80" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✅  label-input 연결, aria-* 연결, describedby 등 접근성 속성에 최적</text>
  <text x="80" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✅  React 18+ 전용, SSR hydration과 완전 호환</text>
</svg>
