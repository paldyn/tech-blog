<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 2 L 12 7 L 0 12 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 2 L 12 7 L 0 12 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Spring REST Docs 동작 흐름</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">테스트 통과 = 스니펫 생성 → AsciiDoc 조립 → HTML 문서 완성</text>

  <!-- Step 1: MockMvc Test -->
  <rect x="60" y="96" width="180" height="80" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="150" y="122" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">MockMvc 테스트</text>
  <text x="150" y="140" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">@WebMvcTest</text>
  <text x="150" y="157" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">document() 호출</text>

  <!-- Arrow 1 -->
  <line x1="240" y1="136" x2="296" y2="136" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="268" y="127" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">테스트 통과</text>

  <!-- Step 2: Snippets -->
  <rect x="296" y="96" width="200" height="80" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="396" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">스니펫 생성</text>
  <text x="396" y="136" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">request-fields.adoc</text>
  <text x="396" y="152" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">response-fields.adoc</text>
  <text x="396" y="167" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">curl-request.adoc</text>

  <!-- Arrow 2 -->
  <line x1="496" y1="136" x2="552" y2="136" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="524" y="127" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">조합</text>

  <!-- Step 3: AsciiDoc -->
  <rect x="552" y="96" width="200" height="80" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="652" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">AsciiDoc 문서</text>
  <text x="652" y="136" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">index.adoc</text>
  <text x="652" y="152" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">include::스니펫</text>
  <text x="652" y="167" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">빌드 시 HTML 변환</text>

  <!-- Arrow down to HTML -->
  <line x1="652" y1="176" x2="652" y2="226" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- Step 4: HTML Output -->
  <rect x="552" y="226" width="200" height="60" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="652" y="251" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">HTML 문서 완성</text>
  <text x="652" y="270" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">정적 파일로 배포 가능</text>

  <!-- Divider -->
  <line x1="60" y1="320" x2="820" y2="320" stroke="#222" stroke-width="1"/>

  <!-- Comparison: REST Docs vs Swagger -->
  <text x="440" y="346" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">REST Docs vs Swagger 비교</text>

  <!-- Left comparison box -->
  <rect x="60" y="360" width="360" height="90" rx="8" fill="#1a1a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="240" y="382" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">Spring REST Docs</text>
  <text x="240" y="400" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">테스트 필수 → 항상 최신 보장</text>
  <text x="240" y="416" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">프로덕션 코드 오염 없음</text>
  <text x="240" y="432" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">커스텀 가능한 정적 HTML 문서</text>

  <!-- Right comparison box -->
  <rect x="460" y="360" width="360" height="90" rx="8" fill="#1a1a1a" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="382" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">Swagger / springdoc</text>
  <text x="640" y="400" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">테스트 없이 빠른 시작</text>
  <text x="640" y="416" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">대화형 Try-it-out UI</text>
  <text x="640" y="432" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">런타임 스캔 기반</text>
</svg>
