<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" role="img" aria-label="VOLUME 인스트럭션 동작 원리">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">VOLUME 인스트럭션 동작 원리</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">컨테이너 실행 시 익명 볼륨을 자동 마운트</text>

  <!-- Container -->
  <rect x="200" y="100" width="480" height="250" rx="8" fill="#111318" stroke="#2a2d3a" stroke-width="1.5"/>
  <text x="440" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#888">컨테이너 파일시스템</text>

  <!-- Normal layer -->
  <rect x="220" y="140" width="200" height="50" rx="4" fill="#0d1520" stroke="#1e3a5f" stroke-width="1"/>
  <text x="320" y="170" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">/app/src (읽기/쓰기 레이어)</text>

  <!-- Volume layer -->
  <rect x="220" y="200" width="200" height="60" rx="4" fill="#0d180d" stroke="#1e3d1e" stroke-width="2"/>
  <text x="320" y="226" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">/app/data</text>
  <text x="320" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">VOLUME /app/data</text>

  <!-- Mount line -->
  <line x1="430" y1="230" x2="530" y2="230" stroke="#55c555" stroke-width="2.5" stroke-dasharray="6,3"/>
  <polygon points="530,224 544,230 530,236" fill="#55c555"/>

  <!-- Volume on host -->
  <rect x="546" y="200" width="100" height="60" rx="4" fill="#0a2a0a" stroke="#1e4d1e" stroke-width="1.5"/>
  <text x="596" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">익명 볼륨</text>
  <text x="596" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">/var/lib</text>
  <text x="596" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">/docker/</text>

  <!-- Behavior notes -->
  <rect x="60" y="310" width="760" height="100" rx="8" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" font-weight="600">VOLUME 선언 후 동작</text>
  <text x="76" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">① 해당 경로는 컨테이너 레이어가 아닌 볼륨에 저장됨 (컨테이너 삭제 후에도 데이터 유지)</text>
  <text x="76" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">② 같은 이미지로 실행한 컨테이너마다 별도 익명 볼륨 생성됨</text>
  <text x="76" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">③ VOLUME 선언 이후 Dockerfile에서 해당 경로에 쓴 데이터는 이미지에 포함되지 않음</text>
</svg>
