<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <!-- Background -->
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">얕은 복제 주요 명령어</text>

  <!-- Section 1: Clone options -->
  <text x="60" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">복제 옵션</text>
  <rect x="60" y="92" width="750" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 특정 브랜치만 depth 1로 복제</text>
  <text x="80" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git </text>
  <text x="113" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">clone --depth 1 --branch main &lt;url&gt;</text>
  <text x="80" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 단일 브랜치만 받아 용량 최소화</text>
  <text x="80" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git </text>
  <text x="113" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">clone --depth 1 --single-branch &lt;url&gt;</text>

  <!-- Section 2: Deepen / Unshallow -->
  <text x="60" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">히스토리 확장</text>
  <rect x="60" y="236" width="750" height="90" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># depth를 10개 더 늘리기</text>
  <text x="80" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git </text>
  <text x="113" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">fetch --deepen 10</text>
  <text x="80" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git </text>
  <text x="113" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">fetch --unshallow   </text>
  <text x="430" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 전체 히스토리 복원</text>

  <!-- Section 3: Use cases -->
  <text x="60" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">주요 사용 사례</text>

  <!-- Pill badges -->
  <rect x="60" y="364" width="150" height="34" rx="17" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="135" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">CI / CD 파이프라인</text>

  <rect x="226" y="364" width="140" height="34" rx="17" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="296" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">대형 저장소 빌드</text>

  <rect x="382" y="364" width="160" height="34" rx="17" fill="#2a1a1a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="462" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">LFS 없이 소스만 검사</text>

  <rect x="558" y="364" width="150" height="34" rx="17" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="633" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">첫 기여자 빠른 시작</text>
</svg>
