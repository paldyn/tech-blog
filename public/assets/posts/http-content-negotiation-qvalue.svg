<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">q-factor 우선순위 (Quality Value)</text>
    <!-- code block -->
    <rect x="60" y="65" width="760" height="126" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="76" y="92" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># q 값: 0.0(거부) ~ 1.0(최우선), 기본값 1.0</text>
    <text x="76" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Accept</tspan><tspan fill="#ffffff">: text/html, application/json;q=0.9, */*;q=0.5</tspan></text>
    <text x="76" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Accept-Language</tspan><tspan fill="#ffffff">: ko-KR, ko;q=0.9, en-US;q=0.8, en;q=0.7</tspan></text>
    <text x="76" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Accept-Encoding</tspan><tspan fill="#ffffff">: gzip, br;q=0.9, deflate;q=0.5, identity;q=0</tspan></text>
    <text x="76" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># identity;q=0 → 무압축 거부</text>
    <!-- Priority bars -->
    <text x="440" y="220" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">Accept: text/html 우선순위 시각화</text>
    <!-- bar: text/html q=1.0 -->
    <text x="80" y="248" font-size="12" fill="#e8e8e8">text/html (q=1.0)</text>
    <rect x="260" y="234" width="540" height="20" rx="4" fill="#4a7aaa"/>
    <text x="810" y="249" font-size="11" fill="#7ec8e3">1.0</text>
    <!-- bar: application/json q=0.9 -->
    <text x="80" y="278" font-size="12" fill="#e8e8e8">application/json (q=0.9)</text>
    <rect x="260" y="264" width="486" height="20" rx="4" fill="#3a6a9a"/>
    <text x="756" y="279" font-size="11" fill="#7ec8e3">0.9</text>
    <!-- bar: */* q=0.5 -->
    <text x="80" y="308" font-size="12" fill="#e8e8e8">*/* (q=0.5)</text>
    <rect x="260" y="294" width="270" height="20" rx="4" fill="#1a3a5a"/>
    <text x="540" y="309" font-size="11" fill="#7ec8e3">0.5</text>
    <!-- x-axis labels -->
    <line x1="260" y1="326" x2="800" y2="326" stroke="#333" stroke-width="1"/>
    <text x="260" y="340" text-anchor="middle" font-size="10" fill="#666">0.0</text>
    <text x="530" y="340" text-anchor="middle" font-size="10" fill="#666">0.5</text>
    <text x="800" y="340" text-anchor="middle" font-size="10" fill="#666">1.0</text>
    <text x="440" y="380" text-anchor="middle" font-size="11" fill="#555">동일 q값 시 더 구체적인 타입이 우선 (text/html &gt; text/* &gt; */*)</text>
  </g>
</svg>
