<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">git rm / git mv 동작 흐름</text>

  <!-- git rm section -->
  <text x="60" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3">git rm</text>

  <!-- Working Tree box -->
  <rect x="60" y="108" width="200" height="60" rx="8" fill="#111827" stroke="#2a3650" stroke-width="1.5"/>
  <text x="160" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">워킹트리</text>
  <text x="160" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">file.txt 존재</text>

  <!-- Index box -->
  <rect x="340" y="108" width="200" height="60" rx="8" fill="#111827" stroke="#2a3650" stroke-width="1.5"/>
  <text x="440" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">인덱스 (스테이징)</text>
  <text x="440" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">file.txt 추적 중</text>

  <!-- Arrow: rm removes from both -->
  <polygon points="270,135 310,128 310,142" fill="#e05555"/>
  <line x1="260" y1="135" x2="310" y2="135" stroke="#e05555" stroke-width="2"/>
  <text x="282" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">삭제</text>

  <!-- git rm result -->
  <rect x="620" y="108" width="200" height="60" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="720" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">삭제 스테이징</text>
  <text x="720" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">다음 커밋에 반영</text>

  <polygon points="550,135 590,128 590,142" fill="#7777cc"/>
  <line x1="540" y1="135" x2="590" y2="135" stroke="#7777cc" stroke-width="2"/>
  <text x="565" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">스테이징</text>

  <!-- Divider -->
  <line x1="60" y1="210" x2="820" y2="210" stroke="#2a3650" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- git mv section -->
  <text x="60" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555">git mv</text>

  <!-- Before box -->
  <rect x="60" y="258" width="200" height="60" rx="8" fill="#111827" stroke="#2a3650" stroke-width="1.5"/>
  <text x="160" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">old-name.txt</text>
  <text x="160" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">이름 변경 전</text>

  <!-- 3-step flow -->
  <polygon points="270,285 310,278 310,292" fill="#55c555"/>
  <line x1="260" y1="285" x2="310" y2="285" stroke="#55c555" stroke-width="2"/>
  <text x="282" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">이동</text>

  <rect x="315" y="258" width="250" height="60" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">① old 삭제 (rm)</text>
  <text x="440" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">② new 생성 (add)</text>
  <text x="440" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">한 번에 스테이징</text>

  <polygon points="575,285 615,278 615,292" fill="#7777cc"/>
  <line x1="565" y1="285" x2="615" y2="285" stroke="#7777cc" stroke-width="2"/>

  <rect x="620" y="258" width="200" height="60" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">new-name.txt</text>
  <text x="720" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">rename 스테이징 완료</text>

  <!-- Divider -->
  <line x1="60" y1="360" x2="820" y2="360" stroke="#2a3650" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- --cached flag note -->
  <text x="60" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">git rm --cached</text>
  <rect x="60" y="400" width="760" height="52" rx="8" fill="#111827" stroke="#2a3650" stroke-width="1.5"/>
  <text x="82" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">인덱스에서만 제거</text>
  <text x="82" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">워킹트리 파일은 그대로 유지 — .gitignore 추가 누락 파일을 추적에서 제외할 때 사용</text>
</svg>
