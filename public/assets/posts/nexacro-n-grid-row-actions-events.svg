<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Grid 행 단위 액션 이벤트</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">oncellclick · onrowdblclick · multiselect 패턴</text>

  <!-- Grid mock with events annotated -->
  <rect x="60" y="90" width="760" height="300" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>

  <!-- Head row -->
  <rect x="60" y="90" width="760" height="36" fill="#1a2744" rx="8"/>
  <rect x="60" y="108" width="760" height="18" fill="#1a2744"/>
  <text x="120" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">사번</text>
  <text x="280" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">성명</text>
  <text x="460" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">부서</text>
  <text x="640" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">급여</text>
  <text x="760" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">상세</text>
  <line x1="60" y1="126" x2="820" y2="126" stroke="#253555" stroke-width="1"/>

  <!-- Column separators -->
  <line x1="200" y1="90" x2="200" y2="390" stroke="#1a2030" stroke-width="1"/>
  <line x1="360" y1="90" x2="360" y2="390" stroke="#1a2030" stroke-width="1"/>
  <line x1="560" y1="90" x2="560" y2="390" stroke="#1a2030" stroke-width="1"/>
  <line x1="720" y1="90" x2="720" y2="390" stroke="#1a2030" stroke-width="1"/>

  <!-- Row 1 - single click highlighted -->
  <rect x="60" y="126" width="760" height="36" fill="#1d3a6e"/>
  <rect x="60" y="126" width="4" height="36" fill="#7ec8e3"/>
  <text x="120" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#fff" text-anchor="middle">E001</text>
  <text x="280" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#fff" text-anchor="middle">홍길동</text>
  <text x="460" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#fff" text-anchor="middle">개발팀</text>
  <text x="700" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#fff" text-anchor="end">4,500,000</text>
  <text x="760" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">상세→</text>
  <!-- Annotation: oncellclick -->
  <line x1="825" y1="144" x2="870" y2="144" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="872" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">oncellclick</text>
  <line x1="60" y1="162" x2="820" y2="162" stroke="#2a4a8e" stroke-width="1"/>

  <!-- Row 2 - double click (dblclick) -->
  <rect x="60" y="162" width="760" height="36" fill="#111827"/>
  <text x="120" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">E002</text>
  <text x="280" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">김철수</text>
  <text x="460" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">기획팀</text>
  <text x="700" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="end">3,800,000</text>
  <text x="760" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">상세→</text>
  <line x1="60" y1="198" x2="820" y2="198" stroke="#1a2030" stroke-width="1"/>

  <!-- Row 3 - multi-select row 1 -->
  <rect x="60" y="198" width="760" height="36" fill="#162035"/>
  <rect x="62" y="200" width="12" height="12" fill="#7ec8e3" rx="2"/>
  <text x="68" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#000" text-anchor="middle">✓</text>
  <text x="120" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">E003</text>
  <text x="280" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">이영희</text>
  <text x="460" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">개발팀</text>
  <text x="700" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="end">4,200,000</text>
  <line x1="60" y1="234" x2="820" y2="234" stroke="#1a2030" stroke-width="1"/>

  <!-- Row 4 - multi-select row 2 -->
  <rect x="60" y="234" width="760" height="36" fill="#162035"/>
  <rect x="62" y="236" width="12" height="12" fill="#7ec8e3" rx="2"/>
  <text x="68" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#000" text-anchor="middle">✓</text>
  <text x="120" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">E004</text>
  <text x="280" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">박민수</text>
  <text x="460" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">영업팀</text>
  <text x="700" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="end">3,600,000</text>
  <!-- Annotation: multiselect -->
  <line x1="825" y1="234" x2="870" y2="234" stroke="#7777cc" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="872" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">multiselect</text>
  <line x1="60" y1="270" x2="820" y2="270" stroke="#1a2030" stroke-width="1"/>

  <!-- Row 5 - normal -->
  <rect x="60" y="270" width="760" height="36" fill="#0e1420"/>
  <text x="120" y="293" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">E005</text>
  <text x="280" y="293" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">최지연</text>
  <text x="460" y="293" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">인사팀</text>
  <text x="700" y="293" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="end">4,000,000</text>
  <line x1="60" y1="306" x2="820" y2="306" stroke="#1a2030" stroke-width="1"/>

  <!-- Row 6 - dblclick highlighted -->
  <rect x="60" y="306" width="760" height="36" fill="#1a2f20"/>
  <text x="120" y="329" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">E006</text>
  <text x="280" y="329" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">정수진</text>
  <text x="460" y="329" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">개발팀</text>
  <text x="700" y="329" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="end">3,900,000</text>
  <!-- Annotation: onrowdblclick -->
  <line x1="825" y1="325" x2="870" y2="325" stroke="#55c555" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="872" y="329" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">onrowdblclick</text>

  <!-- Legend -->
  <rect x="60" y="400" width="760" height="30" fill="#0f1520" rx="6"/>
  <rect x="80" y="410" width="14" height="10" fill="#1d3a6e" rx="2"/>
  <text x="100" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">단일 선택 (oncellclick)</text>
  <rect x="270" y="410" width="14" height="10" fill="#162035" rx="2"/>
  <text x="290" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">다중 선택 (multiselect + Ctrl클릭)</text>
  <rect x="530" y="410" width="14" height="10" fill="#1a2f20" rx="2"/>
  <text x="550" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">더블클릭 (onrowdblclick)</text>
</svg>
