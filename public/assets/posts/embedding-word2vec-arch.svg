<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" width="880" height="540">
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arrowGray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#444"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Word2Vec 아키텍처: CBOW vs Skip-gram</text>

  <!-- Left Panel: CBOW -->
  <rect x="60" y="72" width="360" height="380" fill="#111" rx="10" stroke="#2a2a2a" stroke-width="1"/>
  <text x="240" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">CBOW</text>
  <text x="240" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">Continuous Bag of Words</text>

  <!-- CBOW context words -->
  <rect x="84" y="140" width="90" height="32" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="129" y="161" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">나는</text>

  <rect x="84" y="185" width="90" height="32" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="129" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">오늘</text>

  <rect x="84" y="275" width="90" height="32" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="129" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">먹었다</text>

  <rect x="84" y="320" width="90" height="32" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="129" y="341" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">맛있게</text>

  <text x="129" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#444" text-anchor="middle">⋮</text>
  <text x="84" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">문맥 단어 (Context)</text>

  <!-- CBOW Projection box -->
  <rect x="210" y="210" width="90" height="60" fill="#1a1a2a" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="255" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" text-anchor="middle">평균</text>
  <text x="255" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" text-anchor="middle">Projection</text>

  <!-- CBOW output -->
  <rect x="340" y="223" width="60" height="34" fill="#2a1a1a" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="370" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">밥을</text>
  <text x="340" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">예측 (Target)</text>

  <!-- Arrows CBOW context → projection -->
  <line x1="174" y1="156" x2="210" y2="230" stroke="#444" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="174" y1="201" x2="210" y2="235" stroke="#444" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="174" y1="291" x2="210" y2="250" stroke="#444" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="174" y1="336" x2="210" y2="255" stroke="#444" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Arrow projection → output -->
  <polygon points="300,240 386,240 386,234 400,240 386,246 386,240" fill="#7777cc" opacity="0.8"/>

  <!-- Right Panel: Skip-gram -->
  <rect x="460" y="72" width="360" height="380" fill="#111" rx="10" stroke="#2a2a2a" stroke-width="1"/>
  <text x="640" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8a020" text-anchor="middle">Skip-gram</text>
  <text x="640" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">중심 단어 → 문맥 단어 예측</text>

  <!-- Skip-gram center word -->
  <rect x="484" y="215" width="80" height="34" fill="#2a1a1a" rx="6" stroke="#e05555" stroke-width="1.5"/>
  <text x="524" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">밥을</text>
  <text x="484" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">중심 단어 (Input)</text>

  <!-- Skip-gram projection -->
  <rect x="600" y="210" width="90" height="44" fill="#1a1a2a" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="645" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" text-anchor="middle">Projection</text>

  <!-- Skip-gram output words -->
  <rect x="736" y="140" width="62" height="30" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="767" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">나는</text>
  <rect x="736" y="182" width="62" height="30" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="767" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">오늘</text>
  <rect x="736" y="272" width="62" height="30" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="767" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">먹었다</text>
  <rect x="736" y="314" width="62" height="30" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="767" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">맛있게</text>
  <text x="767" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#444" text-anchor="middle">⋮</text>
  <text x="736" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">예측 단어 (Output)</text>

  <!-- Arrow center → projection -->
  <polygon points="564,232 596,232 596,226 614,232 596,238 596,232" fill="#e05555" opacity="0.8"/>

  <!-- Arrows projection → output words -->
  <line x1="690" y1="225" x2="736" y2="155" stroke="#444" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="690" y1="228" x2="736" y2="197" stroke="#444" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="690" y1="235" x2="736" y2="287" stroke="#444" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="690" y1="238" x2="736" y2="329" stroke="#444" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- Bottom comparison -->
  <rect x="60" y="468" width="760" height="56" fill="#111" rx="8" stroke="#2a2a2a" stroke-width="1"/>
  <text x="240" y="490" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">CBOW: 빠름, 빈번한 단어에 유리</text>
  <text x="240" y="510" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">문맥 → 중심 단어 예측</text>
  <line x1="440" y1="472" x2="440" y2="520" stroke="#2a2a2a" stroke-width="1"/>
  <text x="640" y="490" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8a020" text-anchor="middle">Skip-gram: 느리지만 희소 단어에 강함</text>
  <text x="640" y="510" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">중심 단어 → 문맥 예측</text>
</svg>
