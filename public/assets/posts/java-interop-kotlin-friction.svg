<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">상호운용에서 신경 쓸 세 가지 마찰점</text>

  <rect x="60" y="90" width="760" height="60" rx="10" fill="#11151c" stroke="#e05555" stroke-width="1.5"/>
  <text x="84" y="118" font-size="14" font-weight="600" fill="#e05555">플랫폼 타입</text>
  <text x="84" y="140" font-size="12" fill="#888">자바의 String은 Kotlin에 String!(널 여부 미상)으로 보임 — @Nullable 표기로 보완</text>

  <rect x="60" y="166" width="760" height="60" rx="10" fill="#11151c" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="84" y="194" font-size="14" font-weight="600" fill="#7ec8e3">getter/setter ↔ 프로퍼티</text>
  <text x="84" y="216" font-size="12" fill="#888">자바의 getName()은 Kotlin에서 .name 프로퍼티처럼 보인다</text>

  <rect x="60" y="242" width="760" height="60" rx="10" fill="#11151c" stroke="#55c555" stroke-width="1.5"/>
  <text x="84" y="270" font-size="14" font-weight="600" fill="#55c555">static ↔ companion</text>
  <text x="84" y="292" font-size="12" fill="#888">자바에서 Kotlin의 companion 멤버를 부르려면 @JvmStatic이 편하다</text>
</svg>
