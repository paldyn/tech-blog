<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">검증 시점과 검증 항목 매핑</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="400" fill="#888" text-anchor="middle">이벤트·타이밍에 따라 적합한 검증 종류가 다르다</text>

  <!-- 헤더 행 -->
  <rect x="60" y="88" width="200" height="36" fill="#111" rx="4"/>
  <text x="160" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">검증 시점</text>
  <rect x="264" y="88" width="200" height="36" fill="#111" rx="4"/>
  <text x="364" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">이벤트 / 함수</text>
  <rect x="468" y="88" width="352" height="36" fill="#111" rx="4"/>
  <text x="644" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">주요 검증 항목</text>

  <!-- 행 1 -->
  <rect x="60" y="128" width="200" height="44" fill="#0d2137" rx="4"/>
  <text x="160" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">입력 중</text>
  <rect x="264" y="128" width="200" height="44" fill="#0d2137" rx="4"/>
  <text x="364" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">onchanged</text>
  <text x="364" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Edit 컴포넌트</text>
  <rect x="468" y="128" width="352" height="44" fill="#0d2137" rx="4"/>
  <text x="644" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">글자 수 제한, 숫자만 허용, 자동 포맷</text>

  <!-- 행 2 -->
  <rect x="60" y="176" width="200" height="44" fill="#0d1a2a" rx="4"/>
  <text x="160" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">포커스 이탈</text>
  <rect x="264" y="176" width="200" height="44" fill="#0d1a2a" rx="4"/>
  <text x="364" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">onkillfocus</text>
  <text x="364" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Edit / Combo</text>
  <rect x="468" y="176" width="352" height="44" fill="#0d1a2a" rx="4"/>
  <text x="644" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">단일 필드 형식, 필수 여부 즉시 표시</text>

  <!-- 행 3 -->
  <rect x="60" y="224" width="200" height="44" fill="#0d1e0d" rx="4"/>
  <text x="160" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">저장 버튼 클릭</text>
  <rect x="264" y="224" width="200" height="44" fill="#0d1e0d" rx="4"/>
  <text x="364" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">fn_save()</text>
  <text x="364" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">→ gfn_validate()</text>
  <rect x="468" y="224" width="352" height="44" fill="#0d1e0d" rx="4"/>
  <text x="644" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">전체 필수·형식·범위·상호의존성</text>

  <!-- 행 4 -->
  <rect x="60" y="272" width="200" height="44" fill="#160f28" rx="4"/>
  <text x="160" y="299" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" text-anchor="middle">서버 응답</text>
  <rect x="264" y="272" width="200" height="44" fill="#160f28" rx="4"/>
  <text x="364" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">콜백 fn_saveCb</text>
  <text x="364" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">nEC / sEM 확인</text>
  <rect x="468" y="272" width="352" height="44" fill="#160f28" rx="4"/>
  <text x="644" y="299" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">중복값, 참조 무결성, 권한, 비즈니스 룰</text>

  <!-- 행 5 -->
  <rect x="60" y="320" width="200" height="44" fill="#111" rx="4"/>
  <text x="160" y="347" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">그리드 셀 이탈</text>
  <rect x="264" y="320" width="200" height="44" fill="#111" rx="4"/>
  <text x="364" y="347" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">oncellkillfocus</text>
  <rect x="468" y="320" width="352" height="44" fill="#111" rx="4"/>
  <text x="644" y="347" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">셀 단위 형식·범위 실시간 표시</text>

  <!-- 범례 -->
  <rect x="60" y="384" width="14" height="14" fill="#0d2137" rx="2" stroke="#2a4a7a" stroke-width="1"/>
  <text x="80" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">입력/포커스</text>
  <rect x="180" y="384" width="14" height="14" fill="#0d1e0d" rx="2" stroke="#2a5a2a" stroke-width="1"/>
  <text x="200" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">저장 직전</text>
  <rect x="300" y="384" width="14" height="14" fill="#160f28" rx="2" stroke="#4a2a7a" stroke-width="1"/>
  <text x="320" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">서버 응답</text>
</svg>
