<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">HOC 실전 패턴 3가지</text>

  <rect x="60" y="72" width="236" height="50" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="178" y="102" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">인증 가드</text>

  <rect x="60" y="132" width="236" height="234" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="152" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve" fill="#ffffff">
    <tspan x="76" dy="0"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> withAuth = (C) =&gt; {</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3" font-weight="600">  return function</tspan><tspan fill="#ffffff"> Protected(props) {</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> user = useAuth();</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3" font-weight="600">    if</tspan><tspan fill="#ffffff"> (!user)</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3" font-weight="600">      return</tspan><tspan fill="#ffffff"> &lt;Navigate to=</tspan><tspan fill="#ce9178">"/login"</tspan><tspan fill="#ffffff"> /&gt;;</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3" font-weight="600">    return</tspan><tspan fill="#ffffff"> &lt;C {...props} user={user} /&gt;;</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#ffffff">  };</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#ffffff">};</tspan></tspan>
    <tspan x="76" dy="18"> </tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> PrivatePage = withAuth(Page);</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#9aa4b8">// PrivatePage.displayName =</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#9aa4b8">//   "withAuth(Page)"</tspan></tspan>
  </text>

  <rect x="322" y="72" width="236" height="50" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="102" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc">로딩 상태</text>

  <rect x="322" y="132" width="236" height="234" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="338" y="152" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve" fill="#ffffff">
    <tspan x="338" dy="0"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> withLoading = (C) =&gt; {</tspan></tspan>
    <tspan x="338" dy="18"><tspan fill="#7ec8e3" font-weight="600">  return function</tspan><tspan fill="#ffffff"> WithLoading({ isLoading, ...props }) {</tspan></tspan>
    <tspan x="338" dy="18"><tspan fill="#7ec8e3" font-weight="600">    if</tspan><tspan fill="#ffffff"> (isLoading)</tspan></tspan>
    <tspan x="338" dy="18"><tspan fill="#7ec8e3" font-weight="600">      return</tspan><tspan fill="#ffffff"> &lt;Spinner /&gt;;</tspan></tspan>
    <tspan x="338" dy="18"><tspan fill="#7ec8e3" font-weight="600">    return</tspan><tspan fill="#ffffff"> &lt;C {...props} /&gt;;</tspan></tspan>
    <tspan x="338" dy="18"><tspan fill="#ffffff">  };</tspan></tspan>
    <tspan x="338" dy="18"><tspan fill="#ffffff">};</tspan></tspan>
    <tspan x="338" dy="18"> </tspan>
    <tspan x="338" dy="18"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> UserListWithLoading</tspan></tspan>
    <tspan x="338" dy="18"><tspan fill="#ffffff">  = withLoading(UserList);</tspan></tspan>
    <tspan x="338" dy="36"><tspan fill="#9aa4b8">// 여러 HOC 합성</tspan></tspan>
    <tspan x="338" dy="18"><tspan fill="#9aa4b8">// withAuth(withLoading(Page))</tspan></tspan>
  </text>

  <rect x="584" y="72" width="236" height="50" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="702" y="102" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e05555">에러 바운더리</text>

  <rect x="584" y="132" width="236" height="234" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="600" y="152" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve" fill="#ffffff">
    <tspan x="600" dy="0"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> withErrorBoundary =</tspan></tspan>
    <tspan x="600" dy="18"><tspan fill="#ffffff">  (C, Fallback) =&gt; {</tspan></tspan>
    <tspan x="600" dy="18"><tspan fill="#7ec8e3" font-weight="600">  return function</tspan><tspan fill="#ffffff"> Safe(props) {</tspan></tspan>
    <tspan x="600" dy="18"><tspan fill="#7ec8e3" font-weight="600">    return</tspan><tspan fill="#ffffff"> (</tspan></tspan>
    <tspan x="600" dy="18"><tspan fill="#ffffff">      &lt;ErrorBoundary</tspan></tspan>
    <tspan x="600" dy="18"><tspan fill="#ffffff">        fallback={&lt;Fallback /&gt;}</tspan></tspan>
    <tspan x="600" dy="18"><tspan fill="#ffffff">      &gt;</tspan></tspan>
    <tspan x="600" dy="18"><tspan fill="#ffffff">        &lt;C {...props} /&gt;</tspan></tspan>
    <tspan x="600" dy="18"><tspan fill="#ffffff">      &lt;/ErrorBoundary&gt;</tspan></tspan>
    <tspan x="600" dy="18"><tspan fill="#ffffff">    );</tspan></tspan>
    <tspan x="600" dy="18"><tspan fill="#ffffff">  };</tspan></tspan>
    <tspan x="600" dy="18"><tspan fill="#ffffff">};</tspan></tspan>
  </text>
</svg>