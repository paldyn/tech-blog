<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">drop 후 인덱스 재번호</text>

  <!-- Before -->
  <text x="190" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">Before</text>

  <rect x="90" y="96" width="200" height="40" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="190" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">stash@{0}: A</text>

  <rect x="90" y="142" width="200" height="40" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="190" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">stash@{1}: B</text>

  <rect x="90" y="188" width="200" height="40" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="190" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">stash@{2}: C</text>

  <!-- drop stash@{0} -->
  <text x="190" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">git stash drop (stash@{0} 삭제)</text>

  <!-- Arrow -->
  <line x1="320" y1="165" x2="420" y2="165" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- After -->
  <text x="610" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">After</text>

  <rect x="430" y="142" width="200" height="40" rx="6" fill="#1a1a2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="530" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">stash@{0}: B  ← 재번호</text>
  <text x="530" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">(이전 stash@{1})</text>

  <rect x="430" y="196" width="200" height="40" rx="6" fill="#1a1a2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="530" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">stash@{1}: C  ← 재번호</text>
  <text x="530" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">(이전 stash@{2})</text>

  <!-- Warning box -->
  <rect x="60" y="280" width="760" height="55" rx="6" fill="#1f1800" stroke="#e8a42a" stroke-width="1.5"/>
  <text x="440" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8a42a">⚠ drop 후 인덱스 번호가 바뀐다</text>
  <text x="440" y="324" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">스크립트에서 stash@{N}을 하드코딩하면 의도치 않은 항목이 삭제될 수 있음</text>
</svg>
