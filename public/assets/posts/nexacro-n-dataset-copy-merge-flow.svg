<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Dataset 복사·병합 API 비교</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">copyData, appendData, mergeData — 세 가지 데이터 이동 방법</text>

  <!-- ===== Source Dataset ===== -->
  <rect x="60" y="92" width="200" height="160" fill="#0f0f1a" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <rect x="60" y="92" width="200" height="36" fill="#1a1a2e" rx="8"/>
  <rect x="60" y="116" width="200" height="12" fill="#1a1a2e"/>
  <text x="160" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">원본 (dsA)</text>
  <rect x="60" y="128" width="200" height="22" fill="#1a2a1a"/>
  <text x="160" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#55c555" text-anchor="middle">CODE | NAME</text>
  <rect x="60" y="150" width="200" height="20" fill="#0d1a0d"/><text x="160" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">A01 | 항목A</text>
  <rect x="60" y="170" width="200" height="20" fill="#111"/><text x="160" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">A02 | 항목B</text>
  <rect x="60" y="190" width="200" height="20" fill="#0d1a0d"/><text x="160" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">A03 | 항목C</text>
  <text x="160" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">3행</text>

  <!-- ===== Middle column: three operations ===== -->

  <!-- copyData arrow -->
  <polygon points="268,130 294,124 294,127 334,127 334,124 360,130 334,136 334,133 294,133 294,136" fill="#7ec8e3" stroke="#3a8aa0" stroke-width="1"/>
  <text x="314" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">copyData()</text>

  <!-- appendData arrow -->
  <polygon points="268,190 294,184 294,187 334,187 334,184 360,190 334,196 334,193 294,193 294,196" fill="#55c555" stroke="#2a6a2a" stroke-width="1"/>
  <text x="314" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">appendData()</text>
  <text x="314" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(기존+추가)</text>

  <!-- mergeData arrow -->
  <polygon points="268,246 294,240 294,243 334,243 334,240 360,246 334,252 334,249 294,249 294,252" fill="#7777cc" stroke="#4a4a99" stroke-width="1"/>
  <text x="314" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">mergeData()</text>
  <text x="314" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(키 기반 병합)</text>

  <!-- ===== copyData result ===== -->
  <rect x="364" y="92" width="200" height="120" fill="#0f1a1a" rx="8" stroke="#7ec8e3" stroke-width="1"/>
  <rect x="364" y="92" width="200" height="30" fill="#1a2e2e" rx="8"/>
  <rect x="364" y="110" width="200" height="12" fill="#1a2e2e"/>
  <text x="464" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">copyData 결과</text>
  <text x="464" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">dsB 내용 → 완전 대체</text>
  <rect x="364" y="148" width="200" height="20" fill="#0d1a2e"/><text x="464" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">A01 | 항목A ← NEW</text>
  <rect x="364" y="168" width="200" height="20" fill="#111"/><text x="464" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">A02 | 항목B ← NEW</text>
  <rect x="364" y="188" width="200" height="22" fill="#0d1a2e"/><text x="464" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">A03 | 항목C ← NEW</text>

  <!-- ===== appendData result (dsB already had B01,B02) ===== -->
  <rect x="364" y="228" width="200" height="158" fill="#0f1a0f" rx="8" stroke="#55c555" stroke-width="1"/>
  <rect x="364" y="228" width="200" height="30" fill="#1a2e1a" rx="8"/>
  <rect x="364" y="246" width="200" height="12" fill="#1a2e1a"/>
  <text x="464" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">appendData 결과</text>
  <text x="464" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">기존 행 유지 + 추가</text>
  <rect x="364" y="282" width="200" height="18" fill="#1a0d0d"/><text x="464" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">B01 | 기존1</text>
  <rect x="364" y="300" width="200" height="18" fill="#1a0d0d"/><text x="464" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">B02 | 기존2</text>
  <rect x="364" y="318" width="200" height="18" fill="#0d1a0d"/><text x="464" y="331" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">A01 | 항목A ← 추가</text>
  <rect x="364" y="336" width="200" height="18" fill="#111"/><text x="464" y="349" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">A02 | 항목B ← 추가</text>
  <rect x="364" y="354" width="200" height="22" fill="#0d1a0d"/><text x="464" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">A03 | 항목C ← 추가</text>

  <!-- ===== mergeData result ===== -->
  <rect x="620" y="92" width="200" height="250" fill="#0f0f1a" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <rect x="620" y="92" width="200" height="30" fill="#1a1a2e" rx="8"/>
  <rect x="620" y="110" width="200" height="12" fill="#1a1a2e"/>
  <text x="720" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7777cc" text-anchor="middle">mergeData 결과</text>
  <text x="720" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">키 컬럼 기준 병합</text>
  <text x="720" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">기존 키 있으면 UPDATE</text>
  <text x="720" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">없으면 INSERT</text>
  <rect x="620" y="182" width="200" height="20" fill="#1a1000"/><text x="720" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8c85a" text-anchor="middle">A01 → UPDATE</text>
  <rect x="620" y="202" width="200" height="20" fill="#111"/><text x="720" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">B02 | 기존2 유지</text>
  <rect x="620" y="222" width="200" height="20" fill="#0d1a2e"/><text x="720" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">A02 → INSERT</text>
  <rect x="620" y="242" width="200" height="20" fill="#111"/><text x="720" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">A03 → INSERT</text>
  <text x="720" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">mergeData(dsA,"CODE")</text>
  <text x="720" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">두 번째 인수: 키 컬럼</text>

  <!-- Bottom note -->
  <rect x="60" y="400" width="760" height="60" fill="#0f0f1a" rx="8" stroke="#444" stroke-width="1"/>
  <text x="440" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">copyData: 완전 덮어쓰기 / appendData: 뒤에 추가 / mergeData: 키 기반 업서트</text>
  <text x="440" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">세 API 모두 컬럼 구조(이름·타입)가 일치해야 합니다</text>
</svg>
