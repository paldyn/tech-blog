<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">BERT 파인튜닝 패턴</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">태스크별 헤드 교체 — 사전학습 가중치는 미세 조정</text>

  <!-- 4 task cards -->
  <!-- Text Classification -->
  <rect x="50" y="96" width="180" height="180" fill="#111827" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">텍스트 분류</text>
  <text x="140" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">감성 분석, 주제 분류</text>
  <rect x="70" y="152" width="140" height="24" fill="#1a1f35" rx="4"/>
  <text x="140" y="169" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" text-anchor="middle">[CLS] 문장 [SEP]</text>
  <line x1="140" y1="176" x2="140" y2="194" stroke="#444" stroke-width="1.5"/>
  <polygon points="134,194 140,204 146,194" fill="#444"/>
  <rect x="80" y="204" width="120" height="24" fill="#0a1520" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="140" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">Linear([CLS])</text>
  <text x="140" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">→ 긍정/부정/중립</text>

  <!-- NER -->
  <rect x="250" y="96" width="180" height="180" fill="#111827" rx="8" stroke="#ce9178" stroke-width="1.5"/>
  <text x="340" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">개체명 인식 (NER)</text>
  <text x="340" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">각 토큰별 레이블 예측</text>
  <rect x="270" y="152" width="140" height="24" fill="#1a1f35" rx="4"/>
  <text x="340" y="169" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" text-anchor="middle">[CLS] 토큰1 토큰2 ...</text>
  <line x1="340" y1="176" x2="340" y2="194" stroke="#444" stroke-width="1.5"/>
  <polygon points="334,194 340,204 346,194" fill="#444"/>
  <rect x="280" y="204" width="120" height="24" fill="#0a1520" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="340" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">Linear(각 토큰)</text>
  <text x="340" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">→ B-ORG, I-PER ...</text>

  <!-- QA -->
  <rect x="450" y="96" width="180" height="180" fill="#111827" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="540" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">독해 QA (SQuAD)</text>
  <text x="540" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">답 구간 start/end 예측</text>
  <rect x="470" y="152" width="140" height="24" fill="#1a1f35" rx="4"/>
  <text x="540" y="169" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#55c555" text-anchor="middle">[CLS]질문[SEP]컨텍스트</text>
  <line x1="540" y1="176" x2="540" y2="194" stroke="#444" stroke-width="1.5"/>
  <polygon points="534,194 540,204 546,194" fill="#444"/>
  <rect x="480" y="204" width="120" height="24" fill="#0a1520" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="540" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">start/end logit</text>
  <text x="540" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">→ 답 스팬 추출</text>

  <!-- NLI -->
  <rect x="650" y="96" width="180" height="180" fill="#111827" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="740" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">자연어 추론 (NLI)</text>
  <text x="740" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">전제-가설 관계 분류</text>
  <rect x="670" y="152" width="140" height="24" fill="#1a1f35" rx="4"/>
  <text x="740" y="169" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7777cc" text-anchor="middle">[CLS]전제[SEP]가설[SEP]</text>
  <line x1="740" y1="176" x2="740" y2="194" stroke="#444" stroke-width="1.5"/>
  <polygon points="734,194 740,204 746,194" fill="#444"/>
  <rect x="680" y="204" width="120" height="24" fill="#0a1520" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="740" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">Linear([CLS])</text>
  <text x="740" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">→ 함의/중립/모순</text>

  <!-- BERT Variants -->
  <rect x="50" y="296" width="780" height="100" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">BERT 계열 모델 비교</text>

  <text x="66" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">BERT-Base</text>
  <text x="66" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">12L 768d 12h 110M</text>

  <text x="230" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#ce9178">RoBERTa</text>
  <text x="230" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">NSP 제거, 더 많은 데이터</text>
  <text x="230" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">MLM 최적화, 성능↑</text>

  <text x="430" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">ALBERT</text>
  <text x="430" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">파라미터 공유, 경량화</text>
  <text x="430" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">SOP: 문장 순서 예측</text>

  <text x="640" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">KR-BERT / KLUE</text>
  <text x="640" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">한국어 특화 BERT</text>
  <text x="640" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">KLUE 벤치마크 활용</text>
</svg>
