<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arr-main" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#55c555"/>
    </marker>
    <marker id="arr-red" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#e05555"/>
    </marker>
    <marker id="arr-gray" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">팀 워크플로: 모델 등록 → 배포</text>

  <!-- Actor column header -->
  <text x="78" y="80" text-anchor="middle" font-size="12" font-weight="600" fill="#555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">Actor</text>
  <text x="530" y="80" text-anchor="middle" font-size="12" font-weight="600" fill="#555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">Workflow Steps</text>

  <!-- Divider line -->
  <line x1="145" y1="68" x2="145" y2="440" stroke="#222" stroke-width="1.5"/>

  <!-- ── ROW 1: 데이터 과학자 ── -->
  <!-- Actor box -->
  <rect x="18" y="98" width="118" height="50" rx="8" fill="#141420" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="77" y="118" text-anchor="middle" font-size="12" font-weight="700" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">데이터</text>
  <text x="77" y="136" text-anchor="middle" font-size="12" font-weight="700" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">과학자</text>

  <!-- Step boxes row 1 -->
  <rect x="158" y="98" width="170" height="50" rx="6" fill="#0f1a1f" stroke="#7ec8e3" stroke-width="1"/>
  <text x="243" y="118" text-anchor="middle" font-size="12" font-weight="600" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">모델 학습 완료</text>
  <text x="243" y="136" text-anchor="middle" font-size="11" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">실험 파라미터 기록</text>

  <line x1="328" y1="123" x2="352" y2="123" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr-main)"/>

  <rect x="354" y="98" width="170" height="50" rx="6" fill="#0f1a1f" stroke="#7ec8e3" stroke-width="1"/>
  <text x="439" y="118" text-anchor="middle" font-size="12" font-weight="600" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">실험 로그 기록</text>
  <text x="439" y="136" text-anchor="middle" font-size="11" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">MLflow Tracking</text>

  <line x1="524" y1="123" x2="548" y2="123" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr-main)"/>

  <rect x="550" y="98" width="190" height="50" rx="6" fill="#0f1a1f" stroke="#7ec8e3" stroke-width="1"/>
  <text x="645" y="118" text-anchor="middle" font-size="12" font-weight="600" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">모델 Registry 등록</text>
  <text x="645" y="136" text-anchor="middle" font-size="11" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">mlflow.register_model()</text>

  <!-- ── ROW 2: ML 엔지니어 ── -->
  <rect x="18" y="198" width="118" height="50" rx="8" fill="#14201a" stroke="#55c555" stroke-width="1.5"/>
  <text x="77" y="218" text-anchor="middle" font-size="12" font-weight="700" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">ML</text>
  <text x="77" y="236" text-anchor="middle" font-size="12" font-weight="700" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">엔지니어</text>

  <!-- Down arrow: Row1 → Row2 (from registry box) -->
  <line x1="645" y1="148" x2="645" y2="195" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-main)"/>

  <!-- Row 2 steps -->
  <rect x="158" y="198" width="170" height="50" rx="6" fill="#0f1a14" stroke="#55c555" stroke-width="1"/>
  <text x="243" y="218" text-anchor="middle" font-size="12" font-weight="600" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">코드 리뷰 + 승인</text>
  <text x="243" y="236" text-anchor="middle" font-size="11" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">품질 게이트 확인</text>

  <line x1="328" y1="223" x2="352" y2="223" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <rect x="354" y="198" width="170" height="50" rx="6" fill="#0f1a14" stroke="#55c555" stroke-width="1"/>
  <text x="439" y="218" text-anchor="middle" font-size="12" font-weight="600" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">Staging 전환</text>
  <text x="439" y="236" text-anchor="middle" font-size="11" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">transition_stage("Staging")</text>

  <line x1="524" y1="223" x2="548" y2="223" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <rect x="550" y="198" width="190" height="50" rx="6" fill="#0f1a14" stroke="#55c555" stroke-width="1"/>
  <text x="645" y="218" text-anchor="middle" font-size="12" font-weight="600" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">자동 테스트 실행</text>
  <text x="645" y="236" text-anchor="middle" font-size="11" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">성능·회귀·부하 테스트</text>

  <!-- ── ROW 3: CI/CD ── -->
  <rect x="18" y="310" width="118" height="50" rx="8" fill="#1a1418" stroke="#e8c56a" stroke-width="1.5"/>
  <text x="77" y="330" text-anchor="middle" font-size="12" font-weight="700" fill="#e8c56a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">CI/CD</text>
  <text x="77" y="348" text-anchor="middle" font-size="12" font-weight="700" fill="#e8c56a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">시스템</text>

  <!-- Down arrow: Row2 → Row3 -->
  <line x1="645" y1="248" x2="645" y2="305" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-green)"/>

  <!-- Decision diamond -->
  <polygon points="354,335 414,310 474,335 414,360" fill="#1a1808" stroke="#e8c56a" stroke-width="1.5"/>
  <text x="414" y="331" text-anchor="middle" font-size="11" font-weight="700" fill="#e8c56a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">테스트</text>
  <text x="414" y="346" text-anchor="middle" font-size="11" font-weight="700" fill="#e8c56a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">통과?</text>

  <!-- Row 3 step left of diamond -->
  <rect x="158" y="310" width="170" height="50" rx="6" fill="#181410" stroke="#e8c56a" stroke-width="1"/>
  <text x="243" y="330" text-anchor="middle" font-size="12" font-weight="600" fill="#e8c56a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">테스트 결과 수집</text>
  <text x="243" y="348" text-anchor="middle" font-size="11" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">메트릭 임계값 검사</text>

  <line x1="328" y1="335" x2="352" y2="335" stroke="#e8c56a" stroke-width="1.5" marker-end="url(#arr-gray)"/>

  <!-- Yes path → Production -->
  <line x1="474" y1="335" x2="548" y2="335" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="511" y="328" text-anchor="middle" font-size="11" font-weight="600" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">Yes</text>

  <rect x="550" y="310" width="190" height="50" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="645" y="330" text-anchor="middle" font-size="12" font-weight="700" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">Production 승격</text>
  <text x="645" y="348" text-anchor="middle" font-size="11" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">archive_existing=True</text>

  <!-- No path → Staging -->
  <path d="M414,360 Q414,406 243,406 Q243,388 243,360" stroke="#e05555" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#arr-red)"/>
  <text x="320" y="420" text-anchor="middle" font-size="11" font-weight="600" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">No → Staging 유지 + 알림 발송</text>
</svg>
