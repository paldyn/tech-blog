<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arrd" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Vercel 주요 기능 한눈에 보기</text>

  <!-- Feature boxes: 2x3 grid -->
  <!-- Row 1 -->
  <rect x="60" y="78" width="235" height="86" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Analytics</text>
  <text x="80" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Web Vitals 자동 수집</text>
  <text x="80" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">LCP / CLS / TTFB 실시간 모니터링</text>

  <rect x="323" y="78" width="234" height="86" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="343" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">Edge Functions</text>
  <text x="343" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">미들웨어 / Route Handlers</text>
  <text x="343" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">사용자 근처 엣지에서 실행</text>

  <rect x="585" y="78" width="235" height="86" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="605" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">ISR / 캐싱</text>
  <text x="605" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">revalidate 자동 처리</text>
  <text x="605" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">On-demand revalidation 지원</text>

  <!-- Row 2 -->
  <rect x="60" y="184" width="235" height="86" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178">Custom Domains</text>
  <text x="80" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">도메인 연결 &amp; SSL 자동화</text>
  <text x="80" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">www 리다이렉트 자동 설정</text>

  <rect x="323" y="184" width="234" height="86" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="343" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Preview Deployments</text>
  <text x="343" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">PR마다 독립 환경 생성</text>
  <text x="343" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">팀원 리뷰 / 기능 검증</text>

  <rect x="585" y="184" width="235" height="86" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="605" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">Logs &amp; Monitoring</text>
  <text x="605" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">빌드 / 런타임 로그 실시간</text>
  <text x="605" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Error 알림 Slack / Email 연동</text>

  <!-- Code block: CLI commands -->
  <text x="60" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">자주 쓰는 Vercel CLI 명령어</text>

  <rect x="60" y="328" width="760" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="352" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8"># 프로젝트 연결 및 초기 설정</tspan>
  </text>
  <text x="76" y="370" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#55c555">npx</tspan><tspan fill="#ffffff"> vercel login  </tspan><tspan fill="#9aa4b8">  # Vercel 계정 로그인</tspan>
  </text>
  <text x="76" y="388" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#55c555">npx</tspan><tspan fill="#ffffff"> vercel link   </tspan><tspan fill="#9aa4b8">  # 현재 디렉토리를 프로젝트에 연결</tspan>
  </text>
  <text x="76" y="406" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#55c555">npx</tspan><tspan fill="#ffffff"> vercel        </tspan><tspan fill="#9aa4b8">  # Preview 배포</tspan>
  </text>
  <text x="76" y="424" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#55c555">npx</tspan><tspan fill="#ffffff"> vercel </tspan><tspan fill="#7ec8e3" font-weight="600">--prod</tspan><tspan fill="#ffffff">  </tspan><tspan fill="#9aa4b8">  # Production 배포</tspan>
  </text>
  <text x="76" y="442" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#55c555">npx</tspan><tspan fill="#ffffff"> vercel env pull</tspan><tspan fill="#9aa4b8"> # 환경 변수 로컬 동기화</tspan>
  </text>
</svg>
