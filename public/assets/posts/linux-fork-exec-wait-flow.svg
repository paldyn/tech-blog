<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>
  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">fork / exec / wait — 프로세스 생성 흐름</text>

  <!-- Parent Process Box -->
  <rect x="60" y="80" width="200" height="64" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="160" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7777cc" text-anchor="middle">부모 프로세스</text>
  <text x="160" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">PID = 1000</text>

  <!-- fork() call arrow down -->
  <line x1="160" y1="144" x2="160" y2="184" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="172" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">fork()</text>

  <!-- After fork: two branches -->
  <!-- Parent continues right -->
  <rect x="60" y="184" width="200" height="64" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="2"/>
  <text x="160" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">부모 (계속)</text>
  <text x="160" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">fork() → 자식 PID 반환</text>

  <!-- Child process box -->
  <rect x="320" y="184" width="200" height="64" rx="8" fill="#1a0f0f" stroke="#e05555" stroke-width="2"/>
  <text x="420" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e05555" text-anchor="middle">자식 프로세스</text>
  <text x="420" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">fork() → 0 반환, PID = 1001</text>

  <!-- fork arrow to child -->
  <line x1="260" y1="216" x2="318" y2="216" stroke="#e05555" stroke-width="2"/>
  <polygon points="318,211 328,216 318,221" fill="#e05555"/>

  <!-- exec() arrow from child -->
  <line x1="420" y1="248" x2="420" y2="288" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="432" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">exec()</text>

  <!-- New program box -->
  <rect x="320" y="288" width="200" height="64" rx="8" fill="#0a1020" stroke="#7ec8e3" stroke-width="2"/>
  <text x="420" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">새 프로그램 실행</text>
  <text x="420" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">이미지 교체, PID 유지</text>

  <!-- Program exits -->
  <line x1="420" y1="352" x2="420" y2="392" stroke="#888" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="432" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">exit()</text>

  <rect x="320" y="392" width="200" height="48" rx="8" fill="#1a1010" stroke="#888" stroke-width="1"/>
  <text x="420" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">종료 (exit code 보존)</text>

  <!-- wait() in parent -->
  <line x1="160" y1="248" x2="160" y2="400" stroke="#55c555" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="90" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">wait()</text>
  <text x="72" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">자식 종료 대기</text>

  <rect x="60" y="400" width="200" height="48" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="2"/>
  <text x="160" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555" text-anchor="middle">종료 코드 수집 완료</text>
  <text x="160" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">zombie 해제</text>

  <!-- wait notified by exit -->
  <line x1="320" y1="416" x2="262" y2="416" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="264,411 254,416 264,421" fill="#55c555"/>
  <text x="278" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">SIGCHLD</text>

  <!-- COW label -->
  <rect x="590" y="160" width="230" height="100" rx="8" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="705" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Copy-on-Write (CoW)</text>
  <text x="610" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">fork() 직후 메모리 공유</text>
  <text x="610" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">쓰기 시점에 실제 복사</text>
  <text x="610" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">→ 불필요한 복사 최소화</text>

  <!-- exec label -->
  <rect x="590" y="280" width="230" height="84" rx="8" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="705" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">exec() 계열 함수</text>
  <text x="610" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">execve / execl / execp</text>
  <text x="610" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">PID 유지, 메모리 교체</text>

  <!-- Bottom note -->
  <text x="440" y="482" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">부모가 wait() 하지 않으면 자식은 zombie로 남는다</text>
</svg>
