<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Symbol.toPrimitive &amp; Symbol.toStringTag</text>

  <!-- toPrimitive code -->
  <text x="60" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">Symbol.toPrimitive — 형변환 제어</text>
  <rect x="60" y="98" width="760" height="152" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="80" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">class</text><text x="118" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> Money {</text>
  <text x="80" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  constructor(amount, currency) {</text>
  <text x="80" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    this</tspan><tspan fill="#ffffff">.amount = amount; </tspan><tspan fill="#7ec8e3">this</tspan><tspan fill="#ffffff">.currency = currency; }</tspan></text>
  <text x="80" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  [</tspan><tspan fill="#7ec8e3">Symbol</tspan><tspan fill="#ffffff">.toPrimitive](hint) {</tspan></text>
  <text x="80" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    if</tspan><tspan fill="#ffffff"> (hint === </tspan><tspan fill="#ce9178">'number'</tspan><tspan fill="#ffffff">) </tspan><tspan fill="#7ec8e3">return</tspan><tspan fill="#7ec8e3"> this</tspan><tspan fill="#ffffff">.amount;</tspan></text>
  <text x="80" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    return</tspan><tspan fill="#ce9178"> `${</tspan><tspan fill="#7ec8e3">this</tspan><tspan fill="#ce9178">.amount}${</tspan><tspan fill="#7ec8e3">this</tspan><tspan fill="#ce9178">.currency}`</tspan><tspan fill="#ffffff">; }</tspan></text>
  <text x="80" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>
  <text x="80" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> m = </tspan><tspan fill="#7ec8e3">new</tspan><tspan fill="#ffffff"> Money(</tspan><tspan fill="#b5cea8">100</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">'USD'</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="80" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">m * </text><text x="110" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">2</text><text x="118" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">;    // 200 (hint: 'number')</text>
  <text x="80" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">`${m}`</text><text x="126" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">; // '100USD' (hint: 'string')</text>

  <!-- toStringTag -->
  <text x="60" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">Symbol.toStringTag — Object.prototype.toString 커스터마이즈</text>
  <rect x="60" y="336" width="760" height="78" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="80" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">class</text><text x="118" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> Queue {</text>
  <text x="80" y="378" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">  get</tspan><tspan fill="#ffffff"> [</tspan><tspan fill="#7ec8e3">Symbol</tspan><tspan fill="#ffffff">.toStringTag]() { </tspan><tspan fill="#7ec8e3">return</tspan><tspan fill="#ce9178"> 'Queue'</tspan><tspan fill="#ffffff">; } }</tspan></text>
  <text x="80" y="396" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">Object.prototype.toString.call(</tspan><tspan fill="#7ec8e3">new</tspan><tspan fill="#ffffff"> Queue()); </tspan><tspan fill="#9aa4b8">// '[object Queue]'</tspan></text>

  <!-- Footer -->
</svg>
