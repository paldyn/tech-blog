<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">대용량 데이터 처리 전략</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">조회 범위 제한 → 페이징/무한스크롤 → 가상화</text>

  <!-- Strategy 1 -->
  <rect x="60" y="100" width="230" height="200" fill="#111" rx="10" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="175" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">전략 1. 조회 제한</text>
  <text x="175" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">서버에서 N건만 반환</text>
  <rect x="80" y="160" width="190" height="28" fill="#1a1a2e" rx="4"/>
  <text x="175" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">LIMIT / TOP / ROWNUM</text>
  <text x="80" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">· 구현 간단</text>
  <text x="80" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">· 전체 조회 불가</text>
  <text x="80" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">· 권장: 1,000건 이하</text>
  <rect x="80" y="266" width="190" height="24" fill="#0d1a0d" rx="4"/>
  <text x="175" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">단순 조회 화면에 적합</text>

  <!-- Arrow 1→2 -->
  <polygon points="293,200 320,194 320,197 350,197 350,194 376,200 350,206 350,203 320,203 320,206" fill="#7777cc" stroke="#4a4a99" stroke-width="1"/>

  <!-- Strategy 2 -->
  <rect x="380" y="100" width="140" height="200" fill="#111" rx="10" stroke="#e8e8e8" stroke-width="1.5"/>
  <text x="450" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">전략 2. 페이징</text>
  <text x="450" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">페이지 단위 조회</text>
  <rect x="396" y="160" width="108" height="28" fill="#1a1a2e" rx="4"/>
  <text x="450" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">OFFSET·FETCH</text>
  <text x="396" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">· 전체 탐색 가능</text>
  <text x="396" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">· 서버 요청 반복</text>
  <rect x="396" y="260" width="108" height="30" fill="#1a1a2e" rx="4"/>
  <text x="450" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">목록형 화면</text>

  <!-- Arrow 2→3 -->
  <polygon points="523,200 550,194 550,197 580,197 580,194 606,200 580,206 580,203 550,203 550,206" fill="#7777cc" stroke="#4a4a99" stroke-width="1"/>

  <!-- Strategy 3 -->
  <rect x="610" y="100" width="210" height="200" fill="#111" rx="10" stroke="#55c555" stroke-width="1.5"/>
  <text x="715" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">전략 3. 가상화</text>
  <text x="715" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">DOM 최소화 렌더링</text>
  <rect x="626" y="160" width="178" height="28" fill="#0d2e0d" rx="4"/>
  <text x="715" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">virtualrowcount 설정</text>
  <text x="626" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">· 10만 행도 부드럽게</text>
  <text x="626" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">· 전체 로드 필요</text>
  <rect x="626" y="260" width="178" height="30" fill="#0d2e0d" rx="4"/>
  <text x="715" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">이미 로드된 대용량</text>

  <!-- Bottom: recommended limits -->
  <rect x="60" y="324" width="760" height="136" fill="#111" rx="8"/>
  <text x="440" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">데이터 규모별 권장 전략</text>

  <rect x="80" y="362" width="180" height="80" fill="#0d1a2e" rx="6"/>
  <text x="170" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">~1,000건</text>
  <text x="170" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">단순 조회 제한</text>
  <text x="170" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">문제 없음</text>
  <text x="170" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">가상화 불필요</text>

  <rect x="300" y="362" width="180" height="80" fill="#1a1a0d" rx="6"/>
  <text x="390" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">1,000~10,000건</text>
  <text x="390" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">페이징 권장</text>
  <text x="390" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">또는 가상화</text>
  <text x="390" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">스크롤 체감 주의</text>

  <rect x="520" y="362" width="280" height="80" fill="#0d2e0d" rx="6"/>
  <text x="660" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">10,000건 이상</text>
  <text x="660" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">가상화 필수</text>
  <text x="660" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">virtualrowcount + 필터/검색</text>
  <text x="660" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">전체 로드 자제</text>
</svg>
