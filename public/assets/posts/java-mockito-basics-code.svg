<svg xmlns="http://www.w3.org/2000/svg" width="880" height="404" viewBox="0 0 880 404">
  <rect width="880" height="404" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Mockito 기본 흐름</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">@Mock · when · verify</text>

  <rect x="60" y="90" width="760" height="294" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="78" y="118" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  ><tspan fill="#b5cea8">@ExtendWith</tspan>(MockitoExtension.class)</text>
  <text x="78" y="138" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  ><tspan fill="#7ec8e3" font-weight="600">class</tspan> OrderServiceTest {</text>
  <text x="78" y="162" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >    <tspan fill="#b5cea8">@Mock</tspan> PaymentGateway gateway;</text>
  <text x="78" y="182" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >    <tspan fill="#b5cea8">@InjectMocks</tspan> OrderService service;</text>
  <text x="78" y="210" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >    <tspan fill="#b5cea8">@Test</tspan> <tspan fill="#7ec8e3" font-weight="600">void</tspan> placesOrder() {</text>
  <text x="78" y="230" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >        <tspan fill="#9aa4b8">// 1. 스터빙 — 반환값 지정</tspan></text>
  <text x="78" y="250" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >        when(gateway.pay(<tspan fill="#b5cea8">1000</tspan>))</text>
  <text x="78" y="270" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >            .thenReturn(<tspan fill="#7ec8e3" font-weight="600">true</tspan>);</text>
  <text x="78" y="294" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >        <tspan fill="#9aa4b8">// 2. 실행</tspan></text>
  <text x="78" y="314" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >        service.place(<tspan fill="#b5cea8">1000</tspan>);</text>
  <text x="78" y="338" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >        <tspan fill="#9aa4b8">// 3. 검증 — 호출되었는가</tspan></text>
  <text x="78" y="358" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >        verify(gateway).pay(<tspan fill="#b5cea8">1000</tspan>);</text>
  <text x="78" y="378" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >    } }</text>
</svg>
