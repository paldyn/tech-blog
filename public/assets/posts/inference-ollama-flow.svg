<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Ollama 아키텍처와 사용 흐름</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">설치부터 API 서빙까지 한 번에</text>

  <!-- Central Ollama daemon -->
  <rect x="310" y="96" width="260" height="120" rx="8" fill="#151c24" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7ec8e3" text-anchor="middle">Ollama Daemon</text>
  <text x="440" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">localhost:11434</text>
  <text x="440" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">llama.cpp 내장 엔진</text>
  <text x="440" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">GGUF 모델 관리자</text>

  <!-- Clients -->
  <rect x="60" y="96" width="180" height="60" rx="6" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="150" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">CLI</text>
  <text x="150" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">ollama run llama3</text>

  <rect x="60" y="168" width="180" height="60" rx="6" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="150" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Python SDK</text>
  <text x="150" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">ollama.chat()</text>

  <!-- Arrows client → daemon -->
  <line x1="240" y1="126" x2="308" y2="140" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="308,134 320,140 308,146" fill="#7777cc"/>
  <line x1="240" y1="198" x2="308" y2="170" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="306,162 320,168 310,176" fill="#7777cc"/>

  <!-- Right side clients -->
  <rect x="640" y="96" width="180" height="60" rx="6" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="730" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Open WebUI</text>
  <text x="730" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">ChatGPT 스타일 UI</text>

  <rect x="640" y="168" width="180" height="60" rx="6" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="730" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">OpenAI Client</text>
  <text x="730" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">호환 API 연결</text>

  <!-- Arrows daemon → clients -->
  <line x1="570" y1="140" x2="638" y2="126" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="638,120 650,126 638,132" fill="#55c555"/>
  <line x1="570" y1="170" x2="638" y2="186" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="638,180 650,186 638,192" fill="#55c555"/>

  <!-- Model storage -->
  <rect x="310" y="250" width="260" height="60" rx="6" fill="#111" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">모델 저장소</text>
  <text x="440" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">~/.ollama/models/ (GGUF 자동 관리)</text>
  <line x1="440" y1="216" x2="440" y2="250" stroke="#444" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Code -->
  <rect x="60" y="330" width="760" height="108" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># Ollama Python SDK 사용</text>
  <text x="76" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">import</text>
  <text x="120" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> ollama</text>
  <text x="76" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">response = ollama.chat(</text>
  <text x="76" y="406" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    model=</text>
  <text x="136" y="406" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">"llama3.1:8b"</text>
  <text x="232" y="406" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">,</text>
  <text x="76" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    messages=[{</text>
  <text x="172" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">"role"</text>
  <text x="220" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">: </text>
  <text x="232" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">"user"</text>
  <text x="280" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">, </text>
  <text x="296" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">"content"</text>
  <text x="368" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">: </text>
  <text x="380" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">"안녕!"</text>
  <text x="424" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">}])</text>
  <text x="76" y="442" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">print(response[</text>
  <text x="196" y="442" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">"message"</text>
  <text x="268" y="442" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">][</text>
  <text x="284" y="442" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">"content"</text>
  <text x="356" y="442" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">])</text>
</svg>
