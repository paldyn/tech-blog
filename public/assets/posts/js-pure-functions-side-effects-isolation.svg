<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">부수 효과 격리 패턴</text>
  <text x="440" y="70" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">Side Effect Isolation Pattern</text>

  <!-- Left column: Code before isolation -->
  <rect x="60" y="90" width="360" height="300" fill="#111" rx="10" stroke="#1e2433" stroke-width="1"/>
  <text x="240" y="112" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" text-anchor="middle">혼합된 코드 (Before)</text>

  <rect x="76" y="122" width="328" height="248" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="92" y="142" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">async function</tspan> <tspan fill="#e8e8e8">loadUser</tspan>(id) {</text>
  <text x="92" y="160" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">const</tspan> res = <tspan fill="#7ec8e3">await</tspan> fetch(</text>
  <text x="92" y="178" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    <tspan fill="#ce9178">`/api/user/</tspan><tspan fill="#e8e8e8">${id}</tspan><tspan fill="#ce9178">`</tspan>);</text>
  <text x="92" y="196" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">const</tspan> data = <tspan fill="#7ec8e3">await</tspan> res.json();</text>
  <text x="92" y="214" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  // 비즈니스 로직 + I/O 혼합</text>
  <text x="92" y="232" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">const</tspan> fullName =</text>
  <text x="92" y="250" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    data.first + <tspan fill="#ce9178">' '</tspan> + data.last;</text>
  <text x="92" y="268" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  document.title = fullName;</text>
  <text x="92" y="286" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">return</tspan> fullName;</text>
  <text x="92" y="304" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">}</text>
  <text x="92" y="326" fill="#e05555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#e05555">// 테스트가 어렵다!</tspan></text>
  <text x="92" y="344" fill="#e05555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#e05555">// fetch + DOM 모킹 필요</tspan></text>

  <!-- Arrow -->
  <polygon points="435,230 455,220 455,240" fill="#7ec8e3"/>
  <rect x="415" y="228" width="40" height="4" fill="#7ec8e3" rx="2"/>

  <!-- Right column: Isolated code -->
  <rect x="460" y="90" width="360" height="300" fill="#111" rx="10" stroke="#1e2433" stroke-width="1"/>
  <text x="640" y="112" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" text-anchor="middle">격리된 코드 (After)</text>

  <rect x="476" y="122" width="328" height="248" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="492" y="142" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">// 순수: 비즈니스 로직만</text>
  <text x="492" y="160" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">function</tspan> <tspan fill="#e8e8e8">formatUser</tspan>(data) {</text>
  <text x="492" y="178" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">return</tspan> data.first+<tspan fill="#ce9178">' '</tspan>+data.last;</text>
  <text x="492" y="196" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">}</text>
  <text x="492" y="218" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">// 격리: I/O + DOM 효과</text>
  <text x="492" y="236" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">async function</tspan> <tspan fill="#e8e8e8">loadUser</tspan>(id) {</text>
  <text x="492" y="254" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">const</tspan> res = <tspan fill="#7ec8e3">await</tspan> fetch(</text>
  <text x="492" y="272" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    <tspan fill="#ce9178">`/api/user/</tspan><tspan fill="#e8e8e8">${id}</tspan><tspan fill="#ce9178">`</tspan>);</text>
  <text x="492" y="290" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">const</tspan> name = formatUser(</text>
  <text x="492" y="308" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    <tspan fill="#7ec8e3">await</tspan> res.json());</text>
  <text x="492" y="326" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  document.title = name;</text>
  <text x="492" y="344" fill="#55c555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#55c555">// formatUser만 단독 테스트!</tspan></text>

  <!-- Bottom badges -->
  <rect x="60" y="406" width="172" height="40" fill="#0a1a0a" rx="8" stroke="#1a3a1a" stroke-width="1"/>
  <text x="146" y="422" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" text-anchor="middle">예측 가능</text>
  <text x="146" y="438" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">Predictable</text>

  <rect x="246" y="406" width="172" height="40" fill="#0a1a0a" rx="8" stroke="#1a3a1a" stroke-width="1"/>
  <text x="332" y="422" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" text-anchor="middle">테스트 용이</text>
  <text x="332" y="438" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">Testable</text>

  <rect x="460" y="406" width="172" height="40" fill="#0a1a0a" rx="8" stroke="#1a3a1a" stroke-width="1"/>
  <text x="546" y="422" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" text-anchor="middle">재사용 가능</text>
  <text x="546" y="438" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">Reusable</text>

  <rect x="646" y="406" width="172" height="40" fill="#0a1a0a" rx="8" stroke="#1a3a1a" stroke-width="1"/>
  <text x="732" y="422" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" text-anchor="middle">캐싱 가능</text>
  <text x="732" y="438" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">Cacheable</text>

  <!-- Footer -->
  <text x="440" y="480" fill="#444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">PALDYN · JavaScript 완전 정복</text>
</svg>
