<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Ollama Modelfile: 커스텀 모델 정의</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">시스템 프롬프트·파라미터·템플릿을 모델에 내장</text>

  <!-- Left: Modelfile syntax -->
  <rect x="60" y="90" width="380" height="284" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># Modelfile 예시</text>
  <text x="76" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">FROM</text>
  <text x="120" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve"> llama3.1:8b</text>
  <text x="76" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> </text>
  <text x="76" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">SYSTEM</text>
  <text x="136" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve"> """</text>
  <text x="76" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">당신은 한국어 코딩 튜터입니다.</text>
  <text x="76" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">항상 한국어로 답하고 예제 코드를</text>
  <text x="76" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">반드시 포함하세요.</text>
  <text x="76" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">"""</text>
  <text x="76" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> </text>
  <text x="76" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">PARAMETER</text>
  <text x="160" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> temperature </text>
  <text x="280" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">0.3</text>
  <text x="76" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">PARAMETER</text>
  <text x="160" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> top_k       </text>
  <text x="280" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">20</text>
  <text x="76" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">PARAMETER</text>
  <text x="160" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> num_ctx     </text>
  <text x="280" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">8192</text>
  <text x="76" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> </text>
  <text x="76" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">FROM</text>
  <text x="120" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve"> ./my-finetuned.gguf</text>
  <text x="76" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 로컬 GGUF도 FROM 가능</text>

  <!-- Right: Build + use -->
  <rect x="480" y="90" width="360" height="284" rx="6" fill="#111" stroke="#222"/>
  <text x="500" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">빌드 및 사용</text>
  <line x1="500" y1="124" x2="820" y2="124" stroke="#222" stroke-width="1"/>

  <text x="500" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">빌드</text>
  <rect x="500" y="154" width="320" height="30" rx="4" fill="#000000"/>
  <text x="512" y="173" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">ollama create ko-tutor -f Modelfile</text>

  <text x="500" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">실행</text>
  <rect x="500" y="214" width="320" height="30" rx="4" fill="#000000"/>
  <text x="512" y="233" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" xml:space="preserve">ollama run ko-tutor</text>

  <text x="500" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">주요 명령어</text>
  <text x="500" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" xml:space="preserve">ollama list          # 설치된 모델</text>
  <text x="500" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" xml:space="preserve">ollama pull gemma3   # 다운로드</text>
  <text x="500" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" xml:space="preserve">ollama show llama3   # 모델 정보</text>
  <text x="500" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" xml:space="preserve">ollama rm llama3     # 삭제</text>
  <text x="500" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" xml:space="preserve">ollama ps            # 실행 중 모델</text>
</svg>
