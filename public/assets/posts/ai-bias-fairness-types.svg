<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">AI 편향의 유형과 발생 경로</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">데이터 수집 → 모델 학습 → 배포까지 각 단계별 편향</text>

  <!-- Stage 1: Data -->
  <rect x="60" y="100" width="740" height="100" rx="10" fill="#100d1a" stroke="#7777cc" stroke-width="1"/>
  <text x="80" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc">① 데이터 편향</text>

  <rect x="80" y="136" width="200" height="48" rx="6" fill="#1a1228" stroke="#7777cc" stroke-width="1" stroke-opacity="0.5"/>
  <text x="100" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">표본 편향</text>
  <text x="100" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">특정 집단 과대/과소 대표</text>

  <rect x="298" y="136" width="200" height="48" rx="6" fill="#1a1228" stroke="#7777cc" stroke-width="1" stroke-opacity="0.5"/>
  <text x="318" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">레이블 편향</text>
  <text x="318" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">레이블러의 주관적 판단 반영</text>

  <rect x="516" y="136" width="264" height="48" rx="6" fill="#1a1228" stroke="#7777cc" stroke-width="1" stroke-opacity="0.5"/>
  <text x="536" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">역사적 편향</text>
  <text x="536" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">과거 사회 불평등이 데이터에 내재화</text>

  <!-- Arrow down -->
  <line x1="440" y1="200" x2="440" y2="220" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Stage 2: Model -->
  <rect x="60" y="222" width="740" height="100" rx="10" fill="#10180d" stroke="#55c555" stroke-width="1"/>
  <text x="80" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">② 모델 편향</text>

  <rect x="80" y="258" width="220" height="48" rx="6" fill="#0d1a0a" stroke="#55c555" stroke-width="1" stroke-opacity="0.5"/>
  <text x="100" y="279" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">집계 편향</text>
  <text x="100" y="297" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">하위 집단 성능 차이 무시</text>

  <rect x="318" y="258" width="220" height="48" rx="6" fill="#0d1a0a" stroke="#55c555" stroke-width="1" stroke-opacity="0.5"/>
  <text x="338" y="279" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">목적함수 편향</text>
  <text x="338" y="297" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">손실함수가 특정 그룹에 불리</text>

  <rect x="556" y="258" width="224" height="48" rx="6" fill="#0d1a0a" stroke="#55c555" stroke-width="1" stroke-opacity="0.5"/>
  <text x="576" y="279" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">과적합 편향</text>
  <text x="576" y="297" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">다수 집단에만 과적합</text>

  <!-- Arrow down -->
  <line x1="440" y1="322" x2="440" y2="342" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Stage 3: Deployment -->
  <rect x="60" y="344" width="740" height="100" rx="10" fill="#1a100d" stroke="#e05555" stroke-width="1"/>
  <text x="80" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555">③ 배포·피드백 편향</text>

  <rect x="80" y="380" width="220" height="48" rx="6" fill="#1a0d0a" stroke="#e05555" stroke-width="1" stroke-opacity="0.5"/>
  <text x="100" y="401" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">확증 편향 루프</text>
  <text x="100" y="419" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">편향된 결과 → 편향 데이터 재수집</text>

  <rect x="318" y="380" width="220" height="48" rx="6" fill="#1a0d0a" stroke="#e05555" stroke-width="1" stroke-opacity="0.5"/>
  <text x="338" y="401" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">자동화 편향</text>
  <text x="338" y="419" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">사용자가 AI 결과를 맹신</text>

  <rect x="556" y="380" width="224" height="48" rx="6" fill="#1a0d0a" stroke="#e05555" stroke-width="1" stroke-opacity="0.5"/>
  <text x="576" y="401" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">맥락 편향</text>
  <text x="576" y="419" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">학습 맥락 ≠ 배포 맥락</text>

  <!-- Bottom note -->
  <text x="440" y="466" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">실제 편향은 여러 단계가 복합적으로 작용 — 단일 단계 수정만으로는 해결 불가</text>
</svg>
