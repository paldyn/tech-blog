<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <!-- Background -->
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Pages Router vs App Router 대응 관계</text>

  <!-- Column headers -->
  <rect x="60" y="70" width="360" height="40" rx="6" fill="#1a1a2e" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">Pages Router (이전)</text>

  <rect x="460" y="70" width="360" height="40" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">App Router (이후)</text>

  <!-- Divider arrow -->
  <text x="430" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#7ec8e3" text-anchor="middle">→</text>

  <!-- Row 1: _app.tsx -->
  <rect x="60" y="124" width="360" height="54" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">pages/_app.tsx</text>
  <text x="80" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">전역 Provider, 글로벌 CSS 적용</text>

  <rect x="460" y="124" width="360" height="54" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">app/layout.tsx</text>
  <text x="480" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Root Layout — html, body, Provider</text>

  <!-- Row 2: _document.tsx -->
  <rect x="60" y="190" width="360" height="54" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">pages/_document.tsx</text>
  <text x="80" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">html/body 태그, head 커스텀</text>

  <rect x="460" y="190" width="360" height="54" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">app/layout.tsx</text>
  <text x="480" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">layout 안에서 html/body 직접 작성</text>

  <!-- Row 3: getServerSideProps -->
  <rect x="60" y="256" width="360" height="54" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">getServerSideProps</text>
  <text x="80" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">요청마다 서버에서 데이터 페치</text>

  <rect x="460" y="256" width="360" height="54" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Server Component + fetch (no-store)</text>
  <text x="480" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">cache: 'no-store' → 동적 렌더링</text>

  <!-- Row 4: getStaticProps -->
  <rect x="60" y="322" width="360" height="54" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">getStaticProps + revalidate</text>
  <text x="80" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">빌드 시 정적 생성 + ISR</text>

  <rect x="460" y="322" width="360" height="54" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Server Component + fetch (revalidate)</text>
  <text x="480" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">next: &#123; revalidate: N &#125; → ISR</text>

  <!-- Row 5: useRouter -->
  <rect x="60" y="388" width="360" height="54" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">useRouter (pages)</text>
  <text x="80" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">router.push('/path')</text>

  <rect x="460" y="388" width="360" height="54" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">useRouter (next/navigation)</text>
  <text x="480" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">import from 'next/navigation'</text>
</svg>
