<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">로그 레벨과 출력 전략</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">개발 → 스테이징 → 프로덕션 환경별 로그 레벨</text>

  <!-- Log levels pyramid - left to right by verbosity -->
  <!-- trace -->
  <rect x="50" y="100" width="120" height="56" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="110" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">TRACE</text>
  <text x="110" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">함수 진입/출구</text>
  <text x="110" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#444">세부 실행 흐름</text>

  <!-- debug -->
  <rect x="190" y="100" width="120" height="56" rx="6" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="250" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">DEBUG</text>
  <text x="250" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">변수값·상태</text>
  <text x="250" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">개발 디버깅용</text>

  <!-- info -->
  <rect x="330" y="100" width="120" height="56" rx="6" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="390" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">INFO</text>
  <text x="390" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">서버 시작·요청</text>
  <text x="390" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">정상 운영 이벤트</text>

  <!-- warn -->
  <rect x="470" y="100" width="120" height="56" rx="6" fill="#111" stroke="#e8a23a" stroke-width="1.5"/>
  <text x="530" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8a23a">WARN</text>
  <text x="530" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">회복 가능 오류</text>
  <text x="530" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">재시도·폴백 발생</text>

  <!-- error -->
  <rect x="610" y="100" width="120" height="56" rx="6" fill="#111" stroke="#e05555" stroke-width="1.5"/>
  <text x="670" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">ERROR</text>
  <text x="670" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">처리 실패</text>
  <text x="670" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">즉시 알림 필요</text>

  <!-- fatal -->
  <rect x="750" y="100" width="80" height="56" rx="6" fill="#2a0000" stroke="#e05555" stroke-width="2"/>
  <text x="790" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">FATAL</text>
  <text x="790" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">앱 종료</text>

  <!-- Environment rows -->
  <text x="60" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">환경별 최소 출력 레벨:</text>

  <rect x="50" y="216" width="780" height="44" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="140" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" font-weight="600">개발(development)</text>
  <text x="140" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">debug 이상 모두</text>
  <text x="440" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">DEBUG → INFO → WARN → ERROR → FATAL</text>
  <text x="740" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">verbose</text>

  <rect x="50" y="272" width="780" height="44" rx="6" fill="#1a2010" stroke="#7ec8e3" stroke-width="1"/>
  <text x="140" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" font-weight="600">스테이징(staging)</text>
  <text x="140" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">info 이상</text>
  <text x="440" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">INFO → WARN → ERROR → FATAL</text>
  <text x="740" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">standard</text>

  <rect x="50" y="328" width="780" height="44" rx="6" fill="#1a1510" stroke="#e8a23a" stroke-width="1"/>
  <text x="140" y="346" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8a23a" font-weight="600">프로덕션(production)</text>
  <text x="140" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">warn 이상</text>
  <text x="440" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">WARN → ERROR → FATAL</text>
  <text x="740" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8a23a">노이즈 최소화</text>

  <text x="440" y="414" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">프로덕션에 debug 로그를 남기면 성능 저하 + 민감 정보 노출 위험</text>
</svg>
