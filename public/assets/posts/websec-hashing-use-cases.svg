<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" style="background:#0a0a0a;border-radius:12px">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">해시 함수 알고리즘 선택 가이드</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">용도에 맞는 알고리즘 — 잘못된 선택이 보안 취약점</text>

  <!-- Header -->
  <rect x="60" y="92" width="760" height="36" rx="6" fill="#1a2a3a" stroke="#3a6ea8" stroke-width="1"/>
  <text x="150" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">알고리즘</text>
  <text x="350" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">특성</text>
  <text x="570" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">사용 용도</text>
  <text x="760" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">권장</text>
  <line x1="240" y1="92" x2="240" y2="404" stroke="#2a3a4a" stroke-width="1"/>
  <line x1="460" y1="92" x2="460" y2="404" stroke="#2a3a4a" stroke-width="1"/>
  <line x1="680" y1="92" x2="680" y2="404" stroke="#2a3a4a" stroke-width="1"/>

  <!-- MD5 -->
  <rect x="60" y="128" width="760" height="48" rx="0" fill="#1a0d0d"/>
  <text x="150" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" text-anchor="middle">MD5</text>
  <text x="350" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">128비트 · 충돌 알려짐</text>
  <text x="350" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">1996년 취약점 발견</text>
  <text x="570" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">절대 사용 금지</text>
  <rect x="720" y="138" width="80" height="26" rx="4" fill="#5a1a1a"/>
  <text x="760" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e05555" text-anchor="middle">금지</text>

  <!-- SHA-1 -->
  <rect x="60" y="176" width="760" height="48" rx="0" fill="#0f1820"/>
  <text x="150" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" text-anchor="middle">SHA-1</text>
  <text x="350" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">160비트 · 충돌 데모됨</text>
  <text x="350" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">SHAttered (2017) 공격</text>
  <text x="570" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">인증서·서명에 사용 금지</text>
  <rect x="720" y="186" width="80" height="26" rx="4" fill="#5a1a1a"/>
  <text x="760" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e05555" text-anchor="middle">폐기</text>

  <!-- SHA-256/384/512 -->
  <rect x="60" y="224" width="760" height="48" rx="0" fill="#0d1520"/>
  <text x="150" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">SHA-256/384/512</text>
  <text x="350" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">256~512비트 · 안전</text>
  <text x="350" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">범용 목적</text>
  <text x="570" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">파일 무결성 · 디지털 서명 · SRI</text>
  <rect x="720" y="234" width="80" height="26" rx="4" fill="#0d2a0d"/>
  <text x="760" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">권장</text>

  <!-- bcrypt -->
  <rect x="60" y="272" width="760" height="48" rx="0" fill="#0f1820"/>
  <text x="150" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">bcrypt</text>
  <text x="350" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">느림 (의도적) · salt 내장</text>
  <text x="350" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">work factor 설정 가능</text>
  <text x="570" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">비밀번호 해싱 전용</text>
  <rect x="720" y="282" width="80" height="26" rx="4" fill="#0d2a0d"/>
  <text x="760" y="299" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">권장</text>

  <!-- Argon2 -->
  <rect x="60" y="320" width="760" height="48" rx="0" fill="#0d1520"/>
  <text x="150" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">Argon2id</text>
  <text x="350" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">메모리 집약적 · GPU 저항</text>
  <text x="350" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">PHC 우승 알고리즘 2015</text>
  <text x="570" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">비밀번호 해싱 최신 표준</text>
  <rect x="720" y="330" width="80" height="26" rx="4" fill="#0d2a0d"/>
  <text x="760" y="347" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">최우선</text>

  <rect x="60" y="128" width="760" height="240" fill="none" stroke="#2a3a4a" stroke-width="1"/>

  <!-- Bottom code -->
  <rect x="60" y="388" width="760" height="55" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8"># Python Argon2 비밀번호 해싱</text>
  <text x="76" y="426" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#7ec8e3" font-weight="600">from </text>
  <text x="111" y="426" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#ffffff">argon2 </text>
  <text x="155" y="426" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#7ec8e3" font-weight="600">import </text>
  <text x="200" y="426" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#ffffff">PasswordHasher; ph = PasswordHasher(); hash = ph.hash(password)</text>
  <text x="76" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">검증: ph.verify(hash, password)  |  재해싱: ph.check_needs_rehash(hash)</text>
</svg>
