<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="340" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="lb_arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">클로저는 값이 아니라 변수를 캡처한다</text>

  <rect x="60" y="74" width="760" height="58" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="110" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">funcs = [</tspan><tspan fill="#7ec8e3" font-weight="600">lambda</tspan><tspan fill="#ffffff">: i </tspan><tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> i </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> range(3)]</tspan></text>

  <!-- call 1 -->
  <rect x="60" y="170" width="200" height="80" rx="10" fill="#1a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="160" y="204" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" text-anchor="middle">funcs[0]()</text>
  <text x="160" y="230" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#b5cea8" text-anchor="middle">→ 2 (기대: 0)</text>

  <!-- call 2 -->
  <rect x="340" y="170" width="200" height="80" rx="10" fill="#1a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="204" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" text-anchor="middle">funcs[1]()</text>
  <text x="440" y="230" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#b5cea8" text-anchor="middle">→ 2 (기대: 1)</text>

  <!-- call 3 -->
  <rect x="620" y="170" width="200" height="80" rx="10" fill="#1a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="720" y="204" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" text-anchor="middle">funcs[2]()</text>
  <text x="720" y="230" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#b5cea8" text-anchor="middle">→ 2 (기대: 2)</text>

  <line x1="260" y1="210" x2="334" y2="210" stroke="#e05555" stroke-width="2" marker-end="url(#lb_arr)"/>
  <line x1="540" y1="210" x2="614" y2="210" stroke="#e05555" stroke-width="2" marker-end="url(#lb_arr)"/>

  <text x="440" y="296" font-size="13" fill="#9aa4b8" text-anchor="middle">모든 람다가 같은 변수 i를 본다 → 호출 시점에 i는 이미 마지막 값(2)으로 끝나 있다</text>
</svg>
