<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="40" y="48" font-size="22" font-weight="700" fill="#e8e8e8">CDS — 클래스 메타데이터를 메모리 매핑으로 공유</text>

  <defs>
    <marker id="cds-arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- archive -->
  <rect x="340" y="96" width="200" height="80" rx="8" fill="#101010" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="128" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">공유 아카이브</text>
  <text x="440" y="150" font-size="13" fill="#9aa4b8" text-anchor="middle">classes.jsa (read-only)</text>
  <text x="440" y="168" font-size="13" fill="#9aa4b8" text-anchor="middle">파싱·검증 끝난 클래스</text>

  <!-- three JVMs -->
  <rect x="40" y="216" width="220" height="56" rx="8" fill="#101010" stroke="#7777cc" stroke-width="1"/>
  <text x="150" y="249" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">JVM 프로세스 1</text>

  <rect x="330" y="216" width="220" height="56" rx="8" fill="#101010" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="249" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">JVM 프로세스 2</text>

  <rect x="620" y="216" width="220" height="56" rx="8" fill="#101010" stroke="#7777cc" stroke-width="1"/>
  <text x="730" y="249" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">JVM 프로세스 3</text>

  <line x1="400" y1="176" x2="180" y2="214" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#cds-arr)"/>
  <line x1="440" y1="176" x2="440" y2="214" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#cds-arr)"/>
  <line x1="480" y1="176" x2="700" y2="214" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#cds-arr)"/>

  <text x="440" y="76" font-size="13" fill="#9aa4b8" text-anchor="middle">여러 JVM이 같은 아카이브를 mmap → 클래스 로딩·검증 비용 절감, 메모리 공유</text>
</svg>
