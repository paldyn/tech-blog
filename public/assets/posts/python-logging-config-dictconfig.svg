<svg xmlns="http://www.w3.org/2000/svg" width="880" height="318" viewBox="0 0 880 318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="318" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">dictConfig 한눈에</text>

  <rect x="60" y="84" width="760" height="218" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="78" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">logging.config.dictConfig({</text>
  <text xml:space="preserve" x="78" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#ce9178">"version"</tspan>: <tspan fill="#b5cea8">1</tspan>,</text>
  <text xml:space="preserve" x="78" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#ce9178">"formatters"</tspan>: {<tspan fill="#ce9178">"std"</tspan>: {<tspan fill="#ce9178">"format"</tspan>: <tspan fill="#ce9178">"%(asctime)s %(levelname)s %(message)s"</tspan>}},</text>
  <text xml:space="preserve" x="78" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#ce9178">"handlers"</tspan>: {<tspan fill="#ce9178">"console"</tspan>: {<tspan fill="#ce9178">"class"</tspan>: <tspan fill="#ce9178">"logging.StreamHandler"</tspan>,</text>
  <text xml:space="preserve" x="78" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">                            <tspan fill="#ce9178">"formatter"</tspan>: <tspan fill="#ce9178">"std"</tspan>}},</text>
  <text xml:space="preserve" x="78" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#ce9178">"root"</tspan>: {<tspan fill="#ce9178">"level"</tspan>: <tspan fill="#ce9178">"INFO"</tspan>, <tspan fill="#ce9178">"handlers"</tspan>: [<tspan fill="#ce9178">"console"</tspan>]},</text>
  <text xml:space="preserve" x="78" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">})</text>
  <text xml:space="preserve" x="78" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># formatters → handlers → root 순으로 엮인다</text>
</svg>
