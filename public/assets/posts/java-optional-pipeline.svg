<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-empty" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Optional 파이프라인 — map · flatMap · filter</text>

  <!-- Pipeline flow with value -->
  <text x="60" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">값이 있는 경우 (present)</text>

  <rect x="60" y="96" width="130" height="50" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="125" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">Optional</text>
  <text x="125" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">.of("hello")</text>

  <line x1="200" y1="121" x2="240" y2="121" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="220" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">map</text>

  <rect x="250" y="96" width="130" height="50" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="315" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">Optional</text>
  <text x="315" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">.of("HELLO")</text>

  <line x1="390" y1="121" x2="430" y2="121" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="410" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">filter</text>

  <rect x="440" y="96" width="130" height="50" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="505" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">Optional</text>
  <text x="505" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">.of("HELLO")</text>

  <line x1="580" y1="121" x2="620" y2="121" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="600" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">orElse</text>

  <rect x="630" y="96" width="180" height="50" rx="6" fill="#1a2a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="720" y="127" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">"HELLO"</text>

  <!-- Pipeline flow with empty -->
  <text x="60" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">값이 없는 경우 (empty) — 단락 처리</text>

  <rect x="60" y="202" width="130" height="50" rx="6" fill="#1a1a1a" stroke="#888" stroke-width="1.5"/>
  <text x="125" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Optional</text>
  <text x="125" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">.empty()</text>

  <line x1="200" y1="227" x2="240" y2="227" stroke="#888" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-empty)"/>
  <text x="220" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">map</text>

  <rect x="250" y="202" width="130" height="50" rx="6" fill="#1a1a1a" stroke="#888" stroke-width="1.5"/>
  <text x="315" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Optional</text>
  <text x="315" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">.empty() — 건너뜀</text>

  <line x1="390" y1="227" x2="580" y2="227" stroke="#888" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-empty)"/>
  <text x="485" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">filter / map 모두 건너뜀</text>

  <rect x="630" y="202" width="180" height="50" rx="6" fill="#1a1a1a" stroke="#888" stroke-width="1.5"/>
  <text x="720" y="233" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" text-anchor="middle">"기본값"</text>

  <!-- Code block -->
  <rect x="60" y="280" width="760" height="136" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 파이프라인 예시</text>
  <text x="76" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">String</tspan><tspan fill="#ffffff"> result = findUser(id)         </tspan><tspan fill="#9aa4b8">// Optional&lt;User&gt;</tspan></text>
  <text x="76" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    .map(User::getName)            </tspan><tspan fill="#9aa4b8">// Optional&lt;String&gt;</tspan></text>
  <text x="76" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    .filter(n -&gt; !n.isBlank())     </tspan><tspan fill="#9aa4b8">// 빈 이름 제외</tspan></text>
  <text x="76" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    .map(String::toUpperCase)</tspan></text>
  <text x="76" y="402" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    .orElse(</tspan><tspan fill="#ce9178">"UNKNOWN"</tspan><tspan fill="#ffffff">);             </tspan><tspan fill="#9aa4b8">// 없으면 기본값</tspan></text>
</svg>
