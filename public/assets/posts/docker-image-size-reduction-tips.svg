<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <!-- background -->
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">이미지 크기 절감 핵심 팁</text>

  <!-- 6 tip boxes -->
  <!-- Row 1 -->
  <rect x="60" y="66" width="230" height="88" rx="6" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="175" y="88" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">① Alpine/slim 베이스</text>
  <text x="80" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">ubuntu: ~77MB</text>
  <text x="80" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">alpine: ~7MB</text>
  <text x="80" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">debian-slim: ~30MB</text>

  <rect x="325" y="66" width="230" height="88" rx="6" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="88" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">② apt/apk 캐시 삭제</text>
  <text x="345" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">apt: --no-install-recommends</text>
  <text x="345" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">      + rm -rf /var/lib/apt/lists/*</text>
  <text x="345" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">apk: --no-cache 플래그 사용</text>

  <rect x="590" y="66" width="230" height="88" rx="6" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="705" y="88" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">③ .dockerignore</text>
  <text x="610" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">node_modules/</text>
  <text x="610" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">.git/ .env tests/</text>
  <text x="610" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">*.log *.md Dockerfile</text>

  <!-- Row 2 -->
  <rect x="60" y="172" width="230" height="88" rx="6" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="175" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">④ RUN 명령 합치기</text>
  <text x="80" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">RUN A &amp;&amp; RUN B → 레이어 2개</text>
  <text x="80" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">RUN A &amp;&amp; B → 레이어 1개</text>
  <text x="80" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">캐시/임시파일도 같이 삭제</text>

  <rect x="325" y="172" width="230" height="88" rx="6" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">⑤ 멀티 스테이지 빌드</text>
  <text x="345" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Stage 1: 빌더 (gcc, maven 등)</text>
  <text x="345" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">Stage 2: 런타임 결과물만</text>
  <text x="345" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">빌드 도구가 최종 이미지에 없음</text>

  <rect x="590" y="172" width="230" height="88" rx="6" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="705" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">⑥ distroless / scratch</text>
  <text x="610" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">distroless: OS도구 없는 최소 이미지</text>
  <text x="610" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">scratch: 완전 빈 이미지 (Go 등)</text>
  <text x="610" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">shell도 없어 보안 강화</text>

  <!-- Bottom: analysis tools -->
  <rect x="60" y="280" width="760" height="88" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">이미지 분석 도구</text>
  <text x="80" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">dive</text><text x="120" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888"> — 레이어별 내용을 인터랙티브하게 탐색 (github.com/wagoodman/dive)</text>
  <text x="80" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">docker-slim</text><text x="168" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888"> — 앱을 실행해 필요한 파일만 남기고 자동 최소화</text>
  <text x="80" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">docker history</text><text x="194" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888"> — 각 레이어 크기 확인  /  </text><text x="430" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">docker image inspect</text><text x="616" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888"> — 메타데이터 분석</text>
</svg>
