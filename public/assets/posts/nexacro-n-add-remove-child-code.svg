<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" fill="#e8e8e8" font-size="22" font-weight="700" text-anchor="middle">addChild / removeChild 패턴</text>

  <!-- Left: addChild + rebuild pattern -->
  <text x="230" y="82" fill="#888" font-size="13" text-anchor="middle">반복 재구성 패턴</text>
  <rect x="60" y="92" width="360" height="322" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="114" xml:space="preserve" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// 컨테이너 초기화 후 재구성</text>
  <text x="76" y="132" xml:space="preserve" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">function <tspan fill="#ffffff">fn_rebuild</tspan>() {</text>
  <text x="76" y="150" xml:space="preserve" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  // 기존 동적 컴포넌트 모두 제거</text>
  <text x="76" y="168" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  this.div_form.removeAll();</text>
  <text x="76" y="186" xml:space="preserve" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  // 새 메타로 재구성</text>
  <text x="76" y="204" xml:space="preserve" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  var <tspan fill="#ffffff">nY</tspan> = <tspan fill="#b5cea8">8</tspan>;</text>
  <text x="76" y="222" xml:space="preserve" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  for <tspan fill="#ffffff">(var i = </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="76" y="240" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">       i &lt; this.ds_meta.rowcount;</text>
  <text x="76" y="258" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">       i++) {</text>
  <text x="76" y="276" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    fn_createRow(</text>
  <text x="76" y="294" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">      this.ds_meta.getColumn(i,</text>
  <text x="76" y="312" xml:space="preserve" fill="#ce9178" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">        "colNm"</text>
  <text x="76" y="330" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">      ), nY);</text>
  <text x="76" y="348" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    nY += <tspan fill="#b5cea8">32</tspan>;</text>
  <text x="76" y="366" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  }</text>
  <text x="76" y="384" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  this.div_form.set_height(nY);</text>
  <text x="76" y="402" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>

  <!-- Right: removeChild single + getChild -->
  <text x="650" y="82" fill="#888" font-size="13" text-anchor="middle">단건 제거 · 자식 조회</text>
  <rect x="460" y="92" width="360" height="322" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="476" y="114" xml:space="preserve" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// 특정 ID로 제거</text>
  <text x="476" y="132" xml:space="preserve" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">function <tspan fill="#ffffff">fn_removeField</tspan>(sColNm) {</text>
  <text x="476" y="150" xml:space="preserve" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  var <tspan fill="#ffffff">oDiv</tspan> = this.div_form;</text>
  <text x="476" y="168" xml:space="preserve" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  // 존재 확인 후 제거</text>
  <text x="476" y="186" xml:space="preserve" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  if <tspan fill="#ffffff">(oDiv.getChild(</tspan></text>
  <text x="476" y="204" xml:space="preserve" fill="#ce9178" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">        "edt_" + sColNm</text>
  <text x="476" y="222" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">      )) {</text>
  <text x="476" y="240" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    oDiv.removeChild(</text>
  <text x="476" y="258" xml:space="preserve" fill="#ce9178" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">      "edt_" + sColNm);</text>
  <text x="476" y="276" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    oDiv.removeChild(</text>
  <text x="476" y="294" xml:space="preserve" fill="#ce9178" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">      "stc_" + sColNm);</text>
  <text x="476" y="312" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  }</text>
  <text x="476" y="330" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>
  <text x="476" y="358" xml:space="preserve" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// 자식 컴포넌트 순회</text>
  <text x="476" y="376" xml:space="preserve" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">var <tspan fill="#ffffff">oList</tspan> = oDiv.getChildAll();</text>
  <text x="476" y="394" xml:space="preserve" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">for <tspan fill="#ffffff">(var k in oList) {</tspan></text>
  <text x="476" y="412" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  trace(oList[k].id);</text>
  <text x="476" y="430" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>
</svg>
