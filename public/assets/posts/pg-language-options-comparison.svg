<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">PostgreSQL 서버 사이드 언어 비교</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">언어별 특징·성능·신뢰도 한눈에</text>

  <!-- Header row -->
  <rect x="60" y="88" width="760" height="36" rx="6" fill="#1a1a2e"/>
  <text x="150" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">언어</text>
  <text x="290" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">설치</text>
  <text x="420" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">신뢰도</text>
  <text x="560" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">성능</text>
  <text x="720" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">주요 용도</text>

  <!-- SQL row -->
  <rect x="60" y="128" width="760" height="52" rx="0" fill="#111"/>
  <text x="150" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">SQL</text>
  <text x="150" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">기본 내장</text>
  <text x="290" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">내장</text>
  <text x="420" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">TRUSTED</text>
  <text x="560" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">최고 (인라인 가능)</text>
  <text x="720" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">단순 표현식·집계</text>

  <!-- PL/pgSQL row -->
  <rect x="60" y="180" width="760" height="52" rx="0" fill="#0e0e14"/>
  <text x="150" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">PL/pgSQL</text>
  <text x="150" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">기본 내장</text>
  <text x="290" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">내장</text>
  <text x="420" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">TRUSTED</text>
  <text x="560" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">높음</text>
  <text x="720" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">업무 로직·트리거</text>

  <!-- PL/Python row -->
  <rect x="60" y="232" width="760" height="52" rx="0" fill="#111"/>
  <text x="150" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#b5cea8" text-anchor="middle">PL/Python</text>
  <text x="150" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">plpython3u</text>
  <text x="290" y="263" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">패키지 설치</text>
  <text x="420" y="263" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">UNTRUSTED</text>
  <text x="560" y="263" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">중간</text>
  <text x="720" y="263" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">ML·데이터 변환</text>

  <!-- PL/Perl row -->
  <rect x="60" y="284" width="760" height="52" rx="0" fill="#0e0e14"/>
  <text x="150" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#ce9178" text-anchor="middle">PL/Perl</text>
  <text x="150" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">plperl</text>
  <text x="290" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">패키지 설치</text>
  <text x="420" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">TRUSTED (plperl)</text>
  <text x="560" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">중간</text>
  <text x="720" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">문자열 처리·정규식</text>

  <!-- PL/Tcl row -->
  <rect x="60" y="336" width="760" height="52" rx="0" fill="#111"/>
  <text x="150" y="359" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#888" text-anchor="middle">PL/Tcl</text>
  <text x="150" y="377" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">pltcl</text>
  <text x="290" y="367" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">패키지 설치</text>
  <text x="420" y="367" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">TRUSTED (pltcl)</text>
  <text x="560" y="367" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">중간</text>
  <text x="720" y="367" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">레거시</text>

  <!-- C row -->
  <rect x="60" y="388" width="760" height="52" rx="0" fill="#0e0e14"/>
  <text x="150" y="411" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">C</text>
  <text x="150" y="429" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">공유 라이브러리</text>
  <text x="290" y="419" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">서버 컴파일</text>
  <text x="420" y="419" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">UNTRUSTED</text>
  <text x="560" y="419" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">최고</text>
  <text x="720" y="419" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">확장 개발·초고성능</text>

  <!-- Border lines -->
  <line x1="60" y1="128" x2="820" y2="128" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="60" y1="180" x2="820" y2="180" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="60" y1="232" x2="820" y2="232" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="60" y1="284" x2="820" y2="284" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="60" y1="336" x2="820" y2="336" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="60" y1="388" x2="820" y2="388" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="60" y="88" width="760" height="352" rx="6" fill="none" stroke="#3a4a6e" stroke-width="1.5"/>

  <!-- Trusted explanation -->
  <rect x="60" y="460" width="360" height="44" rx="6" fill="#1a2e1a" stroke="#55c555" stroke-width="1"/>
  <text x="80" y="478" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" font-weight="600">TRUSTED:</text>
  <text x="155" y="478" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">일반 사용자도 CREATE FUNCTION 가능</text>
  <text x="80" y="496" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">파일시스템·네트워크 접근 불가로 샌드박스 격리됨</text>

  <rect x="460" y="460" width="360" height="44" rx="6" fill="#2e1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="480" y="478" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" font-weight="600">UNTRUSTED:</text>
  <text x="580" y="478" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">슈퍼유저만 CREATE FUNCTION</text>
  <text x="480" y="496" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">OS·파일시스템 접근 가능 — 신뢰된 환경에서만 사용</text>
</svg>
