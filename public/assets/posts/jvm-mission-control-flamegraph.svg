<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">플레임 그래프 읽는 법</text>

  <!-- level 0: root -->
  <rect x="60" y="240" width="760" height="34" rx="3" fill="#5a4a2a" stroke="#0a0a0a" stroke-width="1"/>
  <text x="440" y="262" font-size="13" fill="#ffffff" text-anchor="middle" font-family="'JetBrains Mono','Menlo',monospace">main()</text>

  <!-- level 1 -->
  <rect x="60" y="200" width="600" height="34" rx="3" fill="#7a5a2a" stroke="#0a0a0a" stroke-width="1"/>
  <text x="360" y="222" font-size="13" fill="#ffffff" text-anchor="middle" font-family="'JetBrains Mono','Menlo',monospace">handleRequest()</text>
  <rect x="664" y="200" width="156" height="34" rx="3" fill="#5a4a2a" stroke="#0a0a0a" stroke-width="1"/>
  <text x="742" y="222" font-size="12" fill="#ffffff" text-anchor="middle" font-family="'JetBrains Mono','Menlo',monospace">logging()</text>

  <!-- level 2 -->
  <rect x="60" y="160" width="420" height="34" rx="3" fill="#c06a2a" stroke="#0a0a0a" stroke-width="1"/>
  <text x="270" y="182" font-size="13" fill="#ffffff" text-anchor="middle" font-family="'JetBrains Mono','Menlo',monospace">parseJson()</text>
  <rect x="484" y="160" width="176" height="34" rx="3" fill="#7a5a2a" stroke="#0a0a0a" stroke-width="1"/>
  <text x="572" y="182" font-size="12" fill="#ffffff" text-anchor="middle" font-family="'JetBrains Mono','Menlo',monospace">dbQuery()</text>

  <!-- level 3: hottest -->
  <rect x="60" y="120" width="300" height="34" rx="3" fill="#e05555" stroke="#0a0a0a" stroke-width="1"/>
  <text x="210" y="142" font-size="13" fill="#ffffff" text-anchor="middle" font-family="'JetBrains Mono','Menlo',monospace">regexMatch()</text>

  <!-- legend -->
  <text x="60" y="298" font-size="13" fill="#888">바가 넓을수록 CPU 샘플이 많은 메서드 = 핫스팟. 세로는 호출 깊이(콜 스택).</text>
</svg>
