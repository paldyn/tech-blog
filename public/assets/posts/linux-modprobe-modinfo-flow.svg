<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">modprobe vs insmod 비교</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">의존성 자동 해결 여부의 차이</text>

  <!-- insmod column -->
  <text x="220" y="105" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e05555" text-anchor="middle">insmod (수동)</text>

  <rect x="100" y="118" width="240" height="50" rx="6" fill="#2a1a1a" stroke="#6a3a3a" stroke-width="1"/>
  <text x="220" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">insmod ext4.ko</text>
  <text x="220" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">절대 경로 필요</text>

  <!-- insmod step2 - fail -->
  <rect x="100" y="195" width="240" height="50" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="220" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">Unknown symbol error!</text>
  <text x="220" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">jbd2, mbcache 미로드 상태</text>

  <line x1="220" y1="168" x2="220" y2="195" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="100" y="268" width="240" height="50" rx="6" fill="#1a1a1a" stroke="#3a3a3a" stroke-width="1"/>
  <text x="220" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">수동으로 의존성 순서 파악 후</text>
  <text x="220" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">mbcache → jbd2 → ext4 순서 직접 로드</text>

  <line x1="220" y1="245" x2="220" y2="268" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <!-- modprobe column -->
  <text x="660" y="105" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">modprobe (자동)</text>

  <rect x="540" y="118" width="240" height="50" rx="6" fill="#1a2a1a" stroke="#3a6a3a" stroke-width="1"/>
  <text x="660" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">modprobe ext4</text>
  <text x="660" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">이름만 지정 (경로 불필요)</text>

  <line x1="660" y1="168" x2="660" y2="195" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- modules.dep lookup -->
  <rect x="540" y="195" width="240" height="50" rx="6" fill="#0d1a2e" stroke="#3a6ea8" stroke-width="1"/>
  <text x="660" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">modules.dep 자동 조회</text>
  <text x="660" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ext4 → jbd2, mbcache 확인</text>

  <line x1="660" y1="245" x2="660" y2="272" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- auto load deps -->
  <rect x="540" y="272" width="240" height="50" rx="6" fill="#1a2a1a" stroke="#3a6a3a" stroke-width="1"/>
  <text x="660" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">의존 모듈 자동 로드</text>
  <text x="660" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">mbcache → jbd2 → ext4</text>

  <line x1="660" y1="322" x2="660" y2="348" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <rect x="540" y="348" width="240" height="50" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="660" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">로드 완료!</text>
  <text x="660" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">에러 없음</text>

  <!-- divider -->
  <line x1="440" y1="100" x2="440" y2="430" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- modprobe -r -->
  <rect x="200" y="435" width="480" height="42" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">modprobe -r ext4  →  의존 모듈까지 역순으로 자동 제거</text>
  <text x="440" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ext4 → jbd2 → mbcache 순서</text>
</svg>
