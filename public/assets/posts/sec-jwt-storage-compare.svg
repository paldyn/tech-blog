<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">JWT 저장 위치별 보안 비교</text>

  <!-- 헤더 행 -->
  <rect x="60" y="65" width="220" height="36" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="170" y="89" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#888" text-anchor="middle">저장 위치</text>

  <rect x="295" y="65" width="175" height="36" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="382" y="89" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">XSS 위험</text>

  <rect x="485" y="65" width="175" height="36" rx="6" fill="#1a0a0a" stroke="#e8883a" stroke-width="1.5"/>
  <text x="572" y="89" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8883a" text-anchor="middle">CSRF 위험</text>

  <rect x="675" y="65" width="145" height="36" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="748" y="89" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#888" text-anchor="middle">권장 용도</text>

  <!-- localStorage -->
  <rect x="60" y="115" width="220" height="52" rx="6" fill="#0a0a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="137" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">localStorage</text>
  <text x="170" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">JS로 읽기·쓰기 자유</text>

  <rect x="295" y="115" width="175" height="52" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="382" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">⚠ 높음</text>
  <text x="382" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">XSS 발생 시 즉시 탈취</text>

  <rect x="485" y="115" width="175" height="52" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="572" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">✅ 낮음</text>
  <text x="572" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">자동 첨부 안 됨</text>

  <rect x="675" y="115" width="145" height="52" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="748" y="141" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">단기 토큰</text>
  <text x="748" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">비민감 API</text>

  <!-- sessionStorage -->
  <rect x="60" y="182" width="220" height="52" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="170" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">sessionStorage</text>
  <text x="170" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">탭 닫으면 소멸</text>

  <rect x="295" y="182" width="175" height="52" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="382" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">⚠ 높음</text>
  <text x="382" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">localStorage와 동일</text>

  <rect x="485" y="182" width="175" height="52" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="572" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">✅ 낮음</text>
  <text x="572" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">자동 첨부 안 됨</text>

  <rect x="675" y="182" width="145" height="52" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="748" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">일회성 작업</text>

  <!-- HttpOnly Cookie -->
  <rect x="60" y="249" width="220" height="52" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="170" y="271" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">HttpOnly Cookie</text>
  <text x="170" y="291" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">서버만 접근 가능 ← 권장</text>

  <rect x="295" y="249" width="175" height="52" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="382" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">✅ 낮음</text>
  <text x="382" y="291" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">JS 접근 불가</text>

  <rect x="485" y="249" width="175" height="52" rx="6" fill="#1a0a0a" stroke="#e8883a" stroke-width="1"/>
  <text x="572" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8883a" text-anchor="middle">⚠ 있음</text>
  <text x="572" y="291" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SameSite로 방어</text>

  <rect x="675" y="249" width="145" height="52" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="748" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">인증 토큰</text>
  <text x="748" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">강력 권장</text>

  <!-- 인메모리 -->
  <rect x="60" y="316" width="220" height="52" rx="6" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="170" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">In-memory (변수)</text>
  <text x="170" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">새로고침 시 소멸</text>

  <rect x="295" y="316" width="175" height="52" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="382" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">✅ 낮음</text>
  <text x="382" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">탭 격리됨</text>

  <rect x="485" y="316" width="175" height="52" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="572" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">✅ 낮음</text>
  <text x="572" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">자동 첨부 안 됨</text>

  <rect x="675" y="316" width="145" height="52" rx="6" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="748" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Access Token</text>
  <text x="748" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SPA 단기 보관</text>

  <!-- 결론 -->
  <rect x="60" y="390" width="760" height="50" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="411" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">권장 패턴</text>
  <text x="440" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">Refresh Token → HttpOnly Cookie  /  Access Token → 인메모리(변수)</text>
</svg>
