<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">SSH 키 쌍 — 공개키 인증의 원리</text>

  <!-- Key pair diagram -->
  <text x="60" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">공개키/개인키 쌍 구조</text>

  <!-- Private key -->
  <rect x="60" y="92" width="240" height="120" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="180" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555">개인키 (Private Key)</text>
  <text x="180" y="140" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">~/.ssh/id_ed25519</text>
  <text x="180" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">절대 외부 공개 금지</text>
  <text x="180" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">chmod 600</text>

  <!-- Public key -->
  <rect x="580" y="92" width="240" height="120" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="700" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">공개키 (Public Key)</text>
  <text x="700" y="140" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">~/.ssh/id_ed25519.pub</text>
  <text x="700" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">서버에 복사해도 안전</text>
  <text x="700" y="198" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">~/.ssh/authorized_keys</text>

  <!-- Relationship arrows -->
  <defs>
    <marker id="arrG" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrB" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <text x="440" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">수학적으로 연결된 쌍</text>
  <line x1="302" y1="152" x2="576" y2="152" stroke="#3a4a6e" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Auth flow -->
  <text x="60" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">인증 흐름</text>

  <rect x="60" y="262" width="140" height="52" rx="6" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="130" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">클라이언트</text>
  <text x="130" y="302" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">개인키 보유</text>

  <line x1="202" y1="288" x2="258" y2="288" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrB)"/>
  <text x="210" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">①연결</text>

  <rect x="260" y="262" width="160" height="52" rx="6" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="340" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">서버</text>
  <text x="340" y="302" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">authorized_keys</text>

  <line x1="422" y1="288" x2="478" y2="288" stroke="#55c555" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="428" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">②챌린지</text>

  <rect x="480" y="262" width="170" height="52" rx="6" fill="#0f1a2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="565" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">클라이언트</text>
  <text x="565" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">개인키로 서명 ③</text>

  <line x1="652" y1="288" x2="708" y2="288" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrB)"/>
  <text x="655" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">④검증</text>

  <rect x="710" y="262" width="110" height="52" rx="6" fill="#0f2a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="765" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">인증 성공</text>
  <text x="765" y="302" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">접속 허용</text>

  <!-- Key types table -->
  <text x="60" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">알고리즘 비교</text>

  <rect x="60" y="370" width="760" height="70" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">ed25519   </text>
  <text x="185" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">권장 — 짧고 빠르며 보안 강도 높음</text>
  <text x="80" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">rsa 4096  </text>
  <text x="185" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">호환성 필요 시 (구형 서버 대응)</text>
  <text x="540" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">dsa/ecdsa  </text>
  <text x="660" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">비권장</text>
</svg>
