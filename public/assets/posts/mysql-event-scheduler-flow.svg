<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">MySQL 이벤트 스케줄러 구조</text>

  <!-- Event Scheduler thread -->
  <rect x="60" y="70" width="220" height="80" fill="#0e1a2e" rx="8" stroke="#3a5a8e" stroke-width="2"/>
  <text x="170" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">Event Scheduler</text>
  <text x="170" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">백그라운드 스레드</text>
  <text x="170" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">event_scheduler=ON</text>

  <!-- Arrow -->
  <line x1="280" y1="110" x2="340" y2="110" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="310" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">폴링</text>

  <!-- Event table -->
  <rect x="340" y="70" width="240" height="80" fill="#0e1420" rx="8" stroke="#2a3a5e" stroke-width="1.5"/>
  <text x="460" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">mysql.event 테이블</text>
  <text x="460" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">이벤트 정의·스케줄 저장</text>
  <text x="460" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">INFORMATION_SCHEMA.EVENTS로 조회</text>

  <!-- Arrow -->
  <line x1="580" y1="110" x2="640" y2="110" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="610" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">실행</text>

  <!-- Event worker thread -->
  <rect x="640" y="70" width="200" height="80" fill="#1a2a1a" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="740" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">이벤트 워커</text>
  <text x="740" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">임시 커넥션으로 실행</text>
  <text x="740" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">완료 후 커넥션 해제</text>

  <!-- Schedule types -->
  <text x="60" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">스케줄 유형</text>

  <rect x="60" y="200" width="360" height="64" fill="#0b1520" rx="6" stroke="#2a3a5e" stroke-width="1"/>
  <text x="240" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">ONE TIME</text>
  <text x="240" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">AT '2026-12-31 23:59:59'</text>
  <text x="240" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">지정 시점 1회 실행 후 자동 삭제(ON COMPLETION NOT PRESERVE)</text>

  <rect x="440" y="200" width="400" height="64" fill="#0b1520" rx="6" stroke="#2a3a5e" stroke-width="1"/>
  <text x="640" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">RECURRING (반복)</text>
  <text x="640" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">EVERY 1 DAY / EVERY 30 MINUTE</text>
  <text x="640" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">STARTS / ENDS 옵션으로 기간 지정 가능</text>

  <!-- INTERVAL units -->
  <text x="60" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">INTERVAL 단위</text>

  <rect x="60" y="312" width="760" height="40" fill="#0e1420" rx="6" stroke="#2a3a5e" stroke-width="1"/>
  <text x="440" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">SECOND · MINUTE · HOUR · DAY · WEEK · MONTH · QUARTER · YEAR</text>
  <text x="440" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">EVERY 6 HOUR / EVERY 2 WEEK / EVERY 3 MONTH 등</text>

  <!-- Important notes -->
  <rect x="60" y="370" width="360" height="44" fill="#1e1a0a" rx="6" stroke="#e0aa55" stroke-width="1"/>
  <text x="240" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e0aa55" text-anchor="middle">이벤트는 서버 타임존 기준 실행</text>
  <text x="240" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">system_time_zone 변수 확인 필수</text>

  <rect x="440" y="370" width="400" height="44" fill="#1e1a0a" rx="6" stroke="#e0aa55" stroke-width="1"/>
  <text x="640" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e0aa55" text-anchor="middle">이벤트 에러는 일반 로그에만 기록</text>
  <text x="640" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">에러 감지하려면 이벤트 내 로그 테이블 직접 기록</text>
</svg>
