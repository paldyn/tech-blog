<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">입력 이벤트 4종 비교</text>

  <!-- Keyboard -->
  <rect x="60" y="66" width="180" height="36" rx="6" fill="#131a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="150" y="89" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">Keyboard</text>

  <text x="60" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">keydown → keypress* → keyup</text>
  <text x="60" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6a8aa0">* keypress deprecated</text>
  <text x="60" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">e.key — 'Enter', 'ArrowUp' …</text>
  <text x="60" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">e.code — 'KeyA', 'Space' …</text>
  <text x="60" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">e.repeat — 키 홀드 시 true</text>
  <text x="60" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">수식키: ctrlKey/shiftKey/altKey/metaKey</text>

  <!-- Mouse -->
  <rect x="275" y="66" width="160" height="36" rx="6" fill="#131a2e" stroke="#55c555" stroke-width="2"/>
  <text x="355" y="89" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">Mouse</text>

  <text x="275" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">mousedown mouseup click dblclick</text>
  <text x="275" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">mouseover mouseout mouseenter mouseleave</text>
  <text x="275" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">e.clientX/Y — 뷰포트 기준</text>
  <text x="275" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">e.pageX/Y — 문서 기준</text>
  <text x="275" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">e.offsetX/Y — 요소 내부 기준</text>
  <text x="275" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">e.button: 0=좌 1=중 2=우</text>

  <!-- Touch -->
  <rect x="490" y="66" width="160" height="36" rx="6" fill="#131a2e" stroke="#e8a84c" stroke-width="2"/>
  <text x="570" y="89" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8a84c" text-anchor="middle">Touch</text>

  <text x="490" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">touchstart touchmove touchend touchcancel</text>
  <text x="490" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">e.touches — 현재 화면의 모든 터치</text>
  <text x="490" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">e.changedTouches — 이번 이벤트 변경분</text>
  <text x="490" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">e.targetTouches — 대상 요소의 터치</text>
  <text x="490" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">멀티터치 제스처 구현 가능</text>
  <text x="490" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6a8aa0">passive:true 권장 (스크롤 성능)</text>

  <!-- Pointer -->
  <rect x="700" y="66" width="120" height="36" rx="6" fill="#131a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="760" y="89" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">Pointer</text>

  <text x="700" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">pointerdown pointermove</text>
  <text x="700" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">pointerup pointercancel</text>
  <text x="700" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">pointerover pointerout</text>
  <text x="700" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">e.pointerId — 식별자</text>
  <text x="700" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">e.pointerType — 입력 타입</text>
  <text x="700" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">마우스+터치+펜 단일 API</text>

  <!-- Separator -->
  <line x1="60" y1="250" x2="820" y2="250" stroke="#2a2a2a" stroke-width="1"/>

  <!-- mouseover vs mouseenter -->
  <text x="60" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">mouseover vs mouseenter 차이</text>

  <!-- mouseover: bubbles -->
  <rect x="60" y="296" width="340" height="80" rx="6" fill="#111" stroke="#2a2a2a"/>
  <text x="80" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">mouseover / mouseout</text>
  <text x="80" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">버블링 O — 자식 요소 진입 시 부모에도 발생</text>
  <text x="80" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">relatedTarget으로 이전/이후 요소 파악</text>

  <!-- mouseenter: no bubble -->
  <rect x="430" y="296" width="380" height="80" rx="6" fill="#111" stroke="#2a2a2a"/>
  <text x="450" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">mouseenter / mouseleave</text>
  <text x="450" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">버블링 X — 등록된 요소에만 발생</text>
  <text x="450" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">자식 진입해도 부모 이벤트 재발생 없음</text>

  <!-- pointer capture -->
  <text x="60" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">Pointer Capture — 드래그 안정성</text>

  <rect x="60" y="428" width="760" height="72" rx="6" fill="#131a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="80" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">setPointerCapture(pointerId) — 포인터가 요소 밖으로 나가도 이벤트를 계속 받음</text>
  <text x="80" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">슬라이더·드래그 UI에서 포인터가 빠르게 이동해도 이벤트 손실 없음</text>
  <text x="80" y="490" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#6a8aa0">releasePointerCapture(pointerId) 또는 pointerup 시 자동 해제</text>
</svg>
