<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">데이터바인딩 개념도</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">Dataset ↔ 컴포넌트 자동 동기화</text>

  <!-- Dataset box -->
  <rect x="60" y="100" width="300" height="240" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="210" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">Dataset (dsMain)</text>
  <line x1="60" y1="140" x2="360" y2="140" stroke="#222" stroke-width="1"/>
  <text x="100" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ROW</text>
  <text x="160" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">NAME</text>
  <text x="240" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">AMT</text>
  <text x="310" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">STATUS</text>
  <line x1="60" y1="166" x2="360" y2="166" stroke="#222" stroke-width="1"/>
  <!-- Highlight current row -->
  <rect x="61" y="167" width="298" height="22" rx="0" fill="#1a2233"/>
  <text x="100" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">0 ◄</text>
  <text x="160" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">홍길동</text>
  <text x="240" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">5000</text>
  <text x="310" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">A</text>
  <text x="100" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">1</text>
  <text x="160" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">이순신</text>
  <text x="240" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">8000</text>
  <text x="310" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">B</text>
  <text x="100" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">2</text>
  <text x="160" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">강감찬</text>
  <text x="240" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">12000</text>
  <text x="310" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">A</text>
  <text x="210" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">currentrow = 0</text>

  <!-- Arrow left-right (binding) -->
  <!-- Right arrow -->
  <polygon points="398,180 428,172 428,188" fill="#55c555"/>
  <line x1="360" y1="180" x2="428" y2="180" stroke="#55c555" stroke-width="2"/>
  <text x="394" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">자동 반영</text>
  <!-- Left arrow -->
  <polygon points="362,200 392,192 392,208" fill="#7777cc"/>
  <line x1="362" y1="200" x2="428" y2="200" stroke="#7777cc" stroke-width="2"/>
  <text x="394" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">입력 반영</text>

  <!-- Components box -->
  <rect x="428" y="100" width="392" height="240" rx="8" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text x="624" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">바인딩된 컴포넌트</text>
  <!-- Edit: NAME -->
  <rect x="448" y="144" width="160" height="40" rx="6" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="528" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Edit (NAME)</text>
  <text x="528" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">홍길동</text>
  <!-- Edit: AMT -->
  <rect x="640" y="144" width="160" height="40" rx="6" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="720" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Edit (AMT)</text>
  <text x="720" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b5cea8">5000</text>
  <!-- Combo: STATUS -->
  <rect x="448" y="208" width="352" height="40" rx="6" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="624" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Combo (STATUS)</text>
  <text x="624" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178">A — 신규</text>
  <!-- Grid -->
  <rect x="448" y="272" width="352" height="50" rx="6" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="624" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Grid (dsMain 전체)</text>
  <text x="624" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">행 전체 표시 · currentrow 연동</text>

  <!-- Bottom: key properties -->
  <rect x="60" y="366" width="760" height="82" rx="8" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">바인딩 핵심 속성</text>
  <text x="80" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">dataset    — 연결할 Dataset ID (예: dsMain)</text>
  <text x="80" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">binddataset — 그리드·리스트 전체 바인딩 (dataset 복수형)</text>
  <text x="80" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">value      — 컬럼명 지정 (예: NAME)  /  bindcolumn — 그리드 셀 컬럼</text>
</svg>
