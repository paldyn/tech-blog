<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">JWT 토큰 인증 흐름</text>

  <!-- Login -->
  <rect x="60" y="80" width="200" height="64" rx="6" fill="#1a2a1a" stroke="#55c555"/>
  <text x="160" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">① 로그인 (ID/PW)</text>
  <text x="160" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">POST /api/auth/login</text>

  <!-- Arrow -->
  <line x1="260" y1="112" x2="318" y2="112" stroke="#555" stroke-width="1.5"/>
  <polygon points="316,106 330,112 316,118" fill="#555"/>

  <!-- Server validates -->
  <rect x="330" y="80" width="200" height="64" rx="6" fill="#111827" stroke="#7ec8e3"/>
  <text x="430" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">서버 검증</text>
  <text x="430" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">ID/PW 확인 → JWT 발급</text>

  <!-- Arrow -->
  <line x1="530" y1="112" x2="588" y2="112" stroke="#555" stroke-width="1.5"/>
  <polygon points="586,106 600,112 586,118" fill="#555"/>

  <!-- JWT Response -->
  <rect x="600" y="80" width="220" height="64" rx="6" fill="#111827" stroke="#7777cc"/>
  <text x="710" y="103" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">② JWT 응답</text>
  <text x="710" y="121" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">access_token (15분)</text>
  <text x="710" y="137" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">refresh_token (7일)</text>

  <!-- Store -->
  <rect x="60" y="190" width="760" height="52" rx="6" fill="#111827" stroke="#3a4a6e"/>
  <text x="440" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">③ application.gv_accessToken / gv_refreshToken 저장</text>
  <text x="440" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">메모리 저장 권장 (XSS 위험으로 localStorage 지양)</text>

  <!-- API call with token -->
  <rect x="60" y="272" width="350" height="64" rx="6" fill="#1a2030" stroke="#7ec8e3"/>
  <text x="235" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">④ API 호출 (Authorization 헤더)</text>
  <text x="235" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">ServiceGroup: Authorization=Bearer {token}</text>

  <!-- Arrow -->
  <line x1="410" y1="304" x2="468" y2="304" stroke="#555" stroke-width="1.5"/>
  <polygon points="466,298 480,304 466,310" fill="#555"/>

  <!-- Token refresh -->
  <rect x="480" y="272" width="360" height="64" rx="6" fill="#2a2a1a" stroke="#e05555"/>
  <text x="660" y="295" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">⑤ 401 만료 시 자동 갱신</text>
  <text x="660" y="315" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">POST /api/auth/refresh → 새 access_token</text>
  <text x="660" y="333" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ 원래 요청 재시도</text>

  <!-- Code block hint -->
  <rect x="60" y="364" width="760" height="88" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 공통 트랜잭션 래퍼에서 헤더 자동 첨부</text>
  <text x="76" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">function</text><text x="150" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> fn_tx(svcId, url, input, output, callback) {</text>
  <text x="76" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    this.addServiceGroup(svcId,</text><text x="286" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">"http"</text><text x="328" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">,</text><text x="338" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">"Authorization=Bearer "</text><text x="534" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> + application.gv_accessToken);</text>
  <text x="76" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    this.transaction(svcId, url, input, output,</text><text x="428" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">""</text><text x="446" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">, callback);</text>
</svg>
