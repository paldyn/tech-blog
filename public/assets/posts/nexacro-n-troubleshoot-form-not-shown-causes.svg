<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">폼 미표시 주요 원인 5가지</text>

  <!-- Cause 1 -->
  <rect x="60" y="62" width="760" height="52" rx="6" fill="#111518" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">① 잘못된 TypeDefinition 경로</text>
  <text x="100" y="103" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">application.xprj에 등록된 폼 경로와 실제 파일 위치가 다른 경우. 대소문자 불일치도 포함.</text>

  <!-- Cause 2 -->
  <rect x="60" y="124" width="760" height="52" rx="6" fill="#0e1215" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e0a030">② visibility / display 속성 false</text>
  <text x="100" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">컴포넌트 또는 부모 컨테이너의 visible 속성이 false. 조건부 표시 로직 오류.</text>

  <!-- Cause 3 -->
  <rect x="60" y="186" width="760" height="52" rx="6" fill="#111518" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">③ onload 스크립트 에러로 렌더 중단</text>
  <text x="100" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Form_onload 내 예외 발생 시 이후 컴포넌트 초기화가 실행되지 않아 빈 화면이 표시됨.</text>

  <!-- Cause 4 -->
  <rect x="60" y="248" width="760" height="52" rx="6" fill="#0e1215" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">④ z-order 겹침 (다른 컴포넌트 아래)</text>
  <text x="100" y="289" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">같은 좌표에 다른 컴포넌트가 위에 배치되어 시각적으로 가려진 상태.</text>

  <!-- Cause 5 -->
  <rect x="60" y="310" width="760" height="52" rx="6" fill="#111518" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">⑤ 부모 컨테이너 크기 0</text>
  <text x="100" y="351" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">부모 Div의 width 또는 height가 0이면 자식 폼도 화면에 나타나지 않음. 레이아웃 설정 오류.</text>
</svg>
