<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <defs>
    <marker id="arrow-green" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="9" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#55c555"/>
    </marker>
    <marker id="arrow-accent" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="9" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#7777cc"/>
    </marker>
    <marker id="arrow-info" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="9" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrow-warn" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="9" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#e05555"/>
    </marker>
    <marker id="arrow-gray" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="9" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#555"/>
    </marker>
  </defs>

  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">프롬프트 이터레이션 워크플로우</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">Write → Test → Score → Compare → Accept/Reject → Merge → Repeat</text>

  <!-- ── Step boxes (top row: 1-4) ── -->

  <!-- Step 1: Write Prompt -->
  <rect x="60" y="96" width="138" height="72" rx="10" fill="#111" stroke="#7777cc" stroke-width="2"/>
  <text x="129" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">1. Write</text>
  <text x="129" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">프롬프트 작성</text>
  <text x="129" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">YAML template</text>

  <line x1="198" y1="132" x2="228" y2="132" stroke="#7777cc" stroke-width="2" marker-end="url(#arrow-accent)"/>

  <!-- Step 2: Run on Test Suite -->
  <rect x="230" y="96" width="138" height="72" rx="10" fill="#111" stroke="#7ec8e3" stroke-width="2"/>
  <text x="299" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">2. Test</text>
  <text x="299" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">테스트 실행</text>
  <text x="299" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">eval_runner.py</text>

  <line x1="368" y1="132" x2="398" y2="132" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrow-info)"/>

  <!-- Step 3: Score Results -->
  <rect x="400" y="96" width="138" height="72" rx="10" fill="#111" stroke="#55c555" stroke-width="2"/>
  <text x="469" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">3. Score</text>
  <text x="469" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">자동 채점</text>
  <text x="469" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">LLM-as-Judge</text>

  <line x1="538" y1="132" x2="568" y2="132" stroke="#55c555" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Step 4: Compare vs Baseline -->
  <rect x="570" y="96" width="138" height="72" rx="10" fill="#111" stroke="#7ec8e3" stroke-width="2"/>
  <text x="639" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">4. Compare</text>
  <text x="639" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">베이스라인 비교</text>
  <text x="639" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">A/B 점수</text>
  <text x="639" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">stat. significance</text>

  <!-- ── A/B Comparison score bars ── -->
  <text x="440" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8e8e8">A/B 점수 비교</text>

  <!-- Baseline bar -->
  <text x="84" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">v1.2 (baseline)</text>
  <rect x="220" y="218" width="400" height="24" rx="4" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <rect x="220" y="218" width="288" height="24" rx="4" fill="#7777cc" opacity="0.7"/>
  <text x="516" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">72%</text>
  <text x="630" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">72/100</text>

  <!-- Candidate bar -->
  <text x="84" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">v1.3 (candidate)</text>
  <rect x="220" y="248" width="400" height="24" rx="4" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <rect x="220" y="248" width="344" height="24" rx="4" fill="#55c555" opacity="0.8"/>
  <text x="572" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" font-weight="700">86%</text>
  <text x="630" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">86/100</text>

  <!-- Delta label -->
  <text x="726" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">+14%</text>
  <text x="726" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">p &lt; 0.05</text>

  <!-- ── Step 5: Accept / Reject ── -->
  <text x="440" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8e8e8">5. Accept / Reject</text>

  <!-- Accept path -->
  <rect x="180" y="316" width="200" height="60" rx="10" fill="#0d2010" stroke="#55c555" stroke-width="2"/>
  <text x="280" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">Accept</text>
  <text x="280" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">점수 향상 + 통계적 유의</text>
  <text x="280" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">→ main 브랜치 병합</text>

  <!-- Reject path -->
  <rect x="500" y="316" width="200" height="60" rx="10" fill="#1a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="600" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">Reject</text>
  <text x="600" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">점수 하락 또는 회귀</text>
  <text x="600" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">→ 재작성</text>

  <!-- ── Step 6 + 7: Merge → Repeat ── -->
  <rect x="60" y="408" width="138" height="60" rx="10" fill="#111" stroke="#55c555" stroke-width="2"/>
  <text x="129" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">6. Merge</text>
  <text x="129" y="450" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Git prompt PR</text>
  <text x="129" y="462" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">버전 태그</text>

  <line x1="198" y1="438" x2="228" y2="438" stroke="#55c555" stroke-width="2" marker-end="url(#arrow-green)"/>

  <rect x="230" y="408" width="138" height="60" rx="10" fill="#111" stroke="#7777cc" stroke-width="2"/>
  <text x="299" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">7. Monitor</text>
  <text x="299" y="450" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">프로덕션 지표</text>
  <text x="299" y="462" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">회귀 자동 알림</text>

  <!-- Repeat arrow back to Step 1 -->
  <line x1="368" y1="438" x2="440" y2="438" stroke="#7777cc" stroke-width="2"/>
  <line x1="440" y1="438" x2="440" y2="476" stroke="#7777cc" stroke-width="2"/>
  <line x1="440" y1="476" x2="129" y2="476" stroke="#7777cc" stroke-width="2"/>
  <line x1="129" y1="476" x2="129" y2="492" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="494" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">Repeat — 지속적 개선 사이클</text>

  <!-- Reject loop back -->
  <line x1="700" y1="346" x2="780" y2="346" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="780" y1="346" x2="780" y2="132" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="780" y1="132" x2="708" y2="132" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow-warn)"/>
  <text x="800" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">재</text>
  <text x="800" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">작</text>
  <text x="800" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">성</text>

  <!-- Accept down arrow to Merge -->
  <line x1="280" y1="376" x2="280" y2="400" stroke="#55c555" stroke-width="2" marker-end="url(#arrow-green)"/>
  <line x1="280" y1="400" x2="129" y2="400" stroke="#55c555" stroke-width="2"/>
  <line x1="129" y1="400" x2="129" y2="408" stroke="#55c555" stroke-width="2" marker-end="url(#arrow-green)"/>
</svg>
