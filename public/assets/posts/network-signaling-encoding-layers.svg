<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">아날로그 vs 디지털 신호 및 변조</text>

  <!-- Analog signal -->
  <text x="80" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7ec8e3" font-weight="600">아날로그 신호 (연속 파형)</text>
  <path d="M 80,130 C 120,90 160,90 200,130 C 240,170 280,170 320,130 C 360,90 400,90 440,130 C 480,170 520,170 560,130 C 600,90 640,90 680,130" fill="none" stroke="#7ec8e3" stroke-width="2.5"/>
  <line x1="80" y1="130" x2="800" y2="130" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="720" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">기준선</text>

  <!-- Digital signal -->
  <text x="80" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555" font-weight="600">디지털 신호 (이산 전압 레벨)</text>
  <polyline points="80,220 140,220 140,250 200,250 200,220 260,220 320,220 380,250 440,250 500,220 560,220 620,250 680,250 740,220" fill="none" stroke="#55c555" stroke-width="2.5"/>
  <text x="80" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">High (+5V = 1)          Low (0V = 0)          복잡한 패턴도 2진법으로 표현</text>

  <!-- Modulation box -->
  <rect x="80" y="300" width="760" height="116" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8e8e8" font-weight="600">아날로그 반송파를 이용한 디지털 변조 (DSL, Wi-Fi)</text>
  <text x="100" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">ASK </text>
  <text x="150" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">(Amplitude Shift Keying)  진폭 변화로 0/1 표현</text>
  <text x="100" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">FSK </text>
  <text x="150" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">(Frequency Shift Keying) 주파수 변화로 0/1 표현</text>
  <text x="100" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">QAM </text>
  <text x="160" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">(Quadrature Amplitude)   진폭+위상 동시 변조 (Wi-Fi 6E: QAM-4096)</text>
  <text x="100" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">채널 용량 C = B × log2(1 + S/N)  [Shannon 정리 — 이론적 최대 속도]</text>
</svg>
