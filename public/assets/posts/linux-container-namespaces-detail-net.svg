<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Network Namespace — 컨테이너 네트워킹 구현</text>

  <!-- Host namespace -->
  <rect x="60" y="68" width="360" height="280" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">호스트 Network Namespace</text>

  <rect x="80" y="100" width="150" height="50" rx="6" fill="#1a2e3e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="155" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">eth0</text>
  <text x="155" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">192.168.1.100</text>

  <rect x="245" y="100" width="155" height="50" rx="6" fill="#1a2e3e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="322" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">docker0 bridge</text>
  <text x="322" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">172.17.0.1</text>

  <rect x="80" y="170" width="150" height="50" rx="6" fill="#1a2e3e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="155" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">veth0 (pair)</text>
  <text x="155" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">호스트 측 veth</text>

  <!-- veth pair arrow (crosses the boundary) -->
  <line x1="210" y1="195" x2="278" y2="195" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="244" y="187" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">veth pair</text>

  <rect x="80" y="240" width="320" height="92" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="240" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">iptables MASQUERADE (NAT)</text>
  <text x="240" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">컨테이너 → 외부 트래픽 SNAT</text>
  <text x="240" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">포트 바인딩 → DNAT (호스트:80 → 컨테이너:8080)</text>
  <text x="240" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">iptables -t nat -L -n</text>

  <!-- Container namespace -->
  <rect x="460" y="68" width="360" height="280" rx="8" fill="#1a2e1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">컨테이너 Network Namespace</text>

  <rect x="480" y="100" width="150" height="50" rx="6" fill="#1a3e1a" stroke="#55c555" stroke-width="1"/>
  <text x="555" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">eth0 (veth1)</text>
  <text x="555" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">172.17.0.2</text>

  <rect x="650" y="100" width="150" height="50" rx="6" fill="#1a3e1a" stroke="#55c555" stroke-width="1"/>
  <text x="725" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">lo (loopback)</text>
  <text x="725" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">127.0.0.1</text>

  <rect x="480" y="170" width="320" height="40" rx="6" fill="#1a3e1a" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="195" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">독립된 라우팅 테이블 / iptables</text>

  <rect x="480" y="230" width="320" height="60" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">컨테이너 앱: 0.0.0.0:8080 LISTEN</text>
  <text x="640" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">호스트의 80 포트와 완전 독립</text>
  <text x="640" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">다른 컨테이너도 8080 사용 가능</text>

  <!-- Commands -->
  <rect x="60" y="368" width="760" height="84" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># Network Namespace 실습</text>
  <text x="76" y="410" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">ip netns add</text>
  <text x="180" y="410" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> myns</text>
  <text x="280" y="410" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  # 새 net ns 생성</text>
  <text x="76" y="430" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">ip netns exec</text>
  <text x="184" y="430" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> myns ip addr</text>
  <text x="330" y="430" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  # ns에서 명령 실행</text>
  <text x="76" y="450" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">nsenter</text>
  <text x="136" y="450" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> --net=/proc/12345/ns/net ip addr</text>
  <text x="430" y="450" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"> # 컨테이너 ns 진입</text>
</svg>
