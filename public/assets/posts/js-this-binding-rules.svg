<svg width="880" height="480" viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="20" font-weight="700" fill="#e8e8e8">this 바인딩 4가지 규칙</text>
  <text x="440" y="66" text-anchor="middle" font-size="13" fill="#555">호출 방식이 this가 무엇을 가리키는지를 결정한다</text>

  <!-- Rule 1: Default -->
  <rect x="30" y="84" width="195" height="354" rx="10" fill="#141014" stroke="#2a1a2a" stroke-width="1"/>
  <rect x="30" y="84" width="195" height="40" rx="10" fill="#2a1a2a"/>
  <text x="127" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#aa77cc">① 기본 바인딩</text>
  <text x="127" y="140" text-anchor="middle" font-size="11" fill="#666">단순 함수 호출</text>
  <text x="127" y="158" text-anchor="middle" font-size="11" fill="#888">fn()</text>
  <line x1="50" y1="168" x2="205" y2="168" stroke="#2a1a2a" stroke-width="1"/>
  <rect x="48" y="178" width="160" height="80" rx="5" fill="#0e080e"/>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="128" y="198" text-anchor="middle" font-size="10.5" fill="#aa77cc">function fn() {</text>
  <text x="128" y="215" text-anchor="middle" font-size="10.5" fill="#888">  console.log(this);</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="128" y="232" text-anchor="middle" font-size="10.5" fill="#aa77cc">}</text>
  <text x="128" y="249" text-anchor="middle" font-size="10.5" fill="#888">fn(); // 전역 or undefined</text>
  <rect x="60" y="288" width="135" height="44" rx="6" fill="#180a20"/>
  <text x="127" y="308" text-anchor="middle" font-size="11" fill="#cc99ee">strict 모드: undefined</text>
  <text x="127" y="324" text-anchor="middle" font-size="11" fill="#666">비strict: window/global</text>
  <text x="127" y="380" text-anchor="middle" font-size="11" fill="#554">일반 함수를</text>
  <text x="127" y="396" text-anchor="middle" font-size="11" fill="#554">단독으로 호출할 때</text>

  <!-- Rule 2: Implicit -->
  <rect x="242" y="84" width="195" height="354" rx="10" fill="#101410" stroke="#1a2a1a" stroke-width="1"/>
  <rect x="242" y="84" width="195" height="40" rx="10" fill="#1a2a1a"/>
  <text x="339" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#66bb66">② 암시적 바인딩</text>
  <text x="339" y="140" text-anchor="middle" font-size="11" fill="#666">객체의 메서드 호출</text>
  <text x="339" y="158" text-anchor="middle" font-size="11" fill="#888">obj.fn()</text>
  <line x1="262" y1="168" x2="417" y2="168" stroke="#1a2a1a" stroke-width="1"/>
  <rect x="260" y="178" width="160" height="96" rx="5" fill="#080e08"/>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="340" y="198" text-anchor="middle" font-size="10.5" fill="#66bb66">const obj = {</text>
  <text x="340" y="215" text-anchor="middle" font-size="10.5" fill="#888">  name: "obj",</text>
  <text x="340" y="232" text-anchor="middle" font-size="10.5" fill="#66bb66">  fn() { return this.name; }</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="340" y="249" text-anchor="middle" font-size="10.5" fill="#66bb66">};</text>
  <text x="340" y="266" text-anchor="middle" font-size="10.5" fill="#888">obj.fn(); // "obj"</text>
  <rect x="272" y="290" width="135" height="44" rx="6" fill="#08180a"/>
  <text x="339" y="310" text-anchor="middle" font-size="11" fill="#88dd88">this = 호출 앞의 객체</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="339" y="326" text-anchor="middle" font-size="11" fill="#666">(점 왼쪽 객체)</text>
  <text x="339" y="380" text-anchor="middle" font-size="11" fill="#554">가장 흔한 패턴,</text>
  <text x="339" y="396" text-anchor="middle" font-size="11" fill="#554">분리 시 잃어버림 주의</text>

  <!-- Rule 3: Explicit -->
  <rect x="454" y="84" width="195" height="354" rx="10" fill="#141008" stroke="#2a2010" stroke-width="1"/>
  <rect x="454" y="84" width="195" height="40" rx="10" fill="#2a2010"/>
  <text x="551" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#ccaa44">③ 명시적 바인딩</text>
  <text x="551" y="140" text-anchor="middle" font-size="11" fill="#666">call / apply / bind</text>
  <text x="551" y="158" text-anchor="middle" font-size="11" fill="#888">fn.call(obj)</text>
  <line x1="474" y1="168" x2="629" y2="168" stroke="#2a2010" stroke-width="1"/>
  <rect x="472" y="178" width="160" height="96" rx="5" fill="#0e0c04"/>
  <text x="552" y="198" text-anchor="middle" font-size="10.5" fill="#ccaa44">fn.call(obj, arg1);</text>
  <text x="552" y="215" text-anchor="middle" font-size="10.5" fill="#ccaa44">fn.apply(obj, [args]);</text>
  <text x="552" y="232" text-anchor="middle" font-size="10.5" fill="#888">// 즉시 호출</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="552" y="252" text-anchor="middle" font-size="10.5" fill="#ccaa44">const bound = fn.bind(obj);</text>
  <text x="552" y="269" text-anchor="middle" font-size="10.5" fill="#888">// 나중에 호출</text>
  <rect x="484" y="290" width="135" height="44" rx="6" fill="#1c1400"/>
  <text x="551" y="310" text-anchor="middle" font-size="11" fill="#eecc66">this를 직접 지정</text>
  <text x="551" y="326" text-anchor="middle" font-size="11" fill="#666">bind는 새 함수 반환</text>
  <text x="551" y="380" text-anchor="middle" font-size="11" fill="#554">이벤트 핸들러</text>
  <text x="551" y="396" text-anchor="middle" font-size="11" fill="#554">메서드 재사용 시</text>

  <!-- Rule 4: new -->
  <rect x="666" y="84" width="184" height="354" rx="10" fill="#100814" stroke="#201228" stroke-width="1"/>
  <rect x="666" y="84" width="184" height="40" rx="10" fill="#201228"/>
  <text x="758" y="110" text-anchor="middle" font-size="13" font-weight="700" fill="#cc66aa">④ new 바인딩</text>
  <text x="758" y="140" text-anchor="middle" font-size="11" fill="#666">생성자 함수 호출</text>
  <text x="758" y="158" text-anchor="middle" font-size="11" fill="#888">new Fn()</text>
  <line x1="686" y1="168" x2="830" y2="168" stroke="#201228" stroke-width="1"/>
  <rect x="684" y="178" width="160" height="96" rx="5" fill="#08040e"/>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="764" y="198" text-anchor="middle" font-size="10.5" fill="#cc66aa">function Person(name) {</text>
  <text x="764" y="215" text-anchor="middle" font-size="10.5" fill="#888">  this.name = name;</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="764" y="232" text-anchor="middle" font-size="10.5" fill="#cc66aa">}</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="764" y="252" text-anchor="middle" font-size="10.5" fill="#888">const p = new Person("Alice");</text>
  <text x="764" y="269" text-anchor="middle" font-size="10.5" fill="#888">p.name; // "Alice"</text>
  <rect x="696" y="290" width="135" height="44" rx="6" fill="#140818"/>
  <text x="763" y="310" text-anchor="middle" font-size="11" fill="#ee88cc">this = 새 객체</text>
  <text x="763" y="326" text-anchor="middle" font-size="11" fill="#666">자동 반환됨</text>
  <text x="758" y="380" text-anchor="middle" font-size="11" fill="#554">클래스/생성자로</text>
  <text x="758" y="396" text-anchor="middle" font-size="11" fill="#554">인스턴스 생성 시</text>

  <text x="440" y="460" text-anchor="middle" font-size="11" fill="#444">우선순위: new &gt; 명시적(call/apply/bind) &gt; 암시적(메서드) &gt; 기본 바인딩</text>
</svg>
