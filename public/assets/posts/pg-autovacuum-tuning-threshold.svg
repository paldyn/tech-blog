<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" style="background:#0a0a0a;border-radius:12px">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Autovacuum 트리거 임계값 계산</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">Dead 튜플이 임계값을 초과하면 autovacuum worker 가동</text>

  <!-- Formula Box -->
  <rect x="60" y="96" width="760" height="72" rx="8" fill="#0d1117" stroke="#1e2433"/>
  <text x="440" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">VACUUM 트리거 조건</text>
  <text x="440" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" text-anchor="middle">n_dead_tup &gt; autovacuum_vacuum_threshold + autovacuum_vacuum_scale_factor × reltuples</text>

  <!-- Parameters column LEFT -->
  <rect x="60" y="192" width="340" height="220" rx="8" fill="#111" stroke="#1e2433"/>
  <text x="230" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">기본값 (postgresql.conf)</text>
  <!-- rows -->
  <text x="84" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">파라미터</text>
  <text x="310" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" text-anchor="end">기본값</text>
  <line x1="84" y1="256" x2="386" y2="256" stroke="#1e2433"/>
  <text x="84" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">vacuum_threshold</text>
  <text x="386" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" text-anchor="end">50</text>
  <text x="84" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">vacuum_scale_factor</text>
  <text x="386" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" text-anchor="end">0.20</text>
  <text x="84" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">analyze_threshold</text>
  <text x="386" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" text-anchor="end">50</text>
  <text x="84" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">analyze_scale_factor</text>
  <text x="386" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" text-anchor="end">0.10</text>
  <text x="84" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">vacuum_cost_delay</text>
  <text x="386" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" text-anchor="end">2ms</text>
  <text x="84" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">max_workers</text>
  <text x="386" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" text-anchor="end">3</text>

  <!-- Arrow -->
  <line x1="420" y1="302" x2="456" y2="302" stroke="#7777cc" stroke-width="2"/>
  <polygon points="456,296 468,302 456,308" fill="#7777cc"/>

  <!-- Example column RIGHT -->
  <rect x="480" y="192" width="340" height="220" rx="8" fill="#111" stroke="#1e2433"/>
  <text x="650" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">대형 테이블 권장 설정</text>
  <text x="504" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">파라미터</text>
  <text x="806" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" text-anchor="end">권장값</text>
  <line x1="504" y1="256" x2="806" y2="256" stroke="#1e2433"/>
  <text x="504" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">vacuum_scale_factor</text>
  <text x="806" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="end">0.01</text>
  <text x="504" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">analyze_scale_factor</text>
  <text x="806" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="end">0.005</text>
  <text x="504" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">vacuum_cost_delay</text>
  <text x="806" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="end">10ms</text>
  <text x="504" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">vacuum_cost_limit</text>
  <text x="806" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="end">400</text>
  <text x="504" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">max_workers</text>
  <text x="806" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="end">6</text>
  <!-- note -->
  <text x="650" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">1억 행 테이블: 임계=100만 → 20만으로 단축</text>

  <!-- Bottom note -->
  <rect x="60" y="432" width="760" height="60" rx="6" fill="#0d1117" stroke="#1e2433"/>
  <text x="440" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">테이블별 스토리지 파라미터로 개별 설정: ALTER TABLE t SET (autovacuum_vacuum_scale_factor = 0.01);</text>
  <text x="440" y="478" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">pg_stat_user_tables.n_dead_tup 모니터링으로 VACUUM 시점 조기 감지 가능</text>
</svg>
