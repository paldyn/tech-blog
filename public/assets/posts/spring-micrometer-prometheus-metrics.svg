<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Micrometer 4가지 메트릭 타입</text>

  <!-- COUNTER -->
  <rect x="40" y="68" width="190" height="134" rx="8" fill="#0d1b33" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="135" y="90" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">Counter</text>
  <text x="135" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">단조 증가 값</text>
  <rect x="55" y="118" width="160" height="70" rx="4" fill="#000000" stroke="#2a3a60" stroke-width="1"/>
  <text x="63" y="138" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">Counter.builder(</text>
  <text x="63" y="154" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">  "orders.created")</text>
  <text x="63" y="170" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">  .register(registry)</text>
  <text x="63" y="188" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">  .increment();</text>
  <text x="135" y="214" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">주문 수, 요청 수, 오류 수</text>

  <!-- GAUGE -->
  <rect x="250" y="68" width="190" height="134" rx="8" fill="#1a2e1a" stroke="#4aaf6b" stroke-width="1.5"/>
  <text x="345" y="90" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">Gauge</text>
  <text x="345" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">현재 상태 값</text>
  <rect x="265" y="118" width="160" height="70" rx="4" fill="#000000" stroke="#2a3a60" stroke-width="1"/>
  <text x="273" y="138" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">Gauge.builder(</text>
  <text x="273" y="154" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">  "queue.size",</text>
  <text x="273" y="170" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">  queue, Queue::size)</text>
  <text x="273" y="188" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">  .register(registry);</text>
  <text x="345" y="214" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">큐 크기, 활성 연결 수, 메모리</text>

  <!-- TIMER -->
  <rect x="460" y="68" width="190" height="134" rx="8" fill="#331a0d" stroke="#e07a40" stroke-width="1.5"/>
  <text x="555" y="90" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e07a40">Timer</text>
  <text x="555" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">소요 시간 측정</text>
  <rect x="475" y="118" width="160" height="70" rx="4" fill="#000000" stroke="#2a3a60" stroke-width="1"/>
  <text x="483" y="138" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">Timer timer =</text>
  <text x="483" y="154" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">  Timer.builder(</text>
  <text x="483" y="170" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">    "api.latency")</text>
  <text x="483" y="188" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">  .register(registry);</text>
  <text x="555" y="214" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">API 응답 시간, DB 쿼리 시간</text>

  <!-- DISTRIBUTION SUMMARY -->
  <rect x="670" y="68" width="180" height="134" rx="8" fill="#1a0d1a" stroke="#9a4f9a" stroke-width="1.5"/>
  <text x="760" y="90" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#b07eec">DistributionSummary</text>
  <text x="760" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">크기/양 분포</text>
  <rect x="685" y="118" width="150" height="70" rx="4" fill="#000000" stroke="#2a3a60" stroke-width="1"/>
  <text x="693" y="138" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">DistributionSummary</text>
  <text x="693" y="154" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">  .builder(</text>
  <text x="693" y="170" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">    "payload.size")</text>
  <text x="693" y="188" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">  .register(reg);</text>
  <text x="760" y="214" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555">요청 크기, 배치 건수</text>

  <!-- @Timed annotation code block -->
  <text x="440" y="248" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">@Timed — 선언적 Timer 적용</text>
  <rect x="40" y="260" width="800" height="136" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="56" y="285" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">@RestController</text>
  <text x="56" y="303" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">public class OrderController {</text>
  <text x="56" y="321" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">  @Timed(value = "orders.processing",</text>
  <text x="56" y="339" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">         extraTags = {"type", "create"},</text>
  <text x="56" y="357" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">         percentiles = {0.5, 0.95, 0.99})</text>
  <text x="56" y="375" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  public ResponseEntity&lt;OrderDto&gt; createOrder(@RequestBody OrderRequest req) { ... }</text>
</svg>
