<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="ep-arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="ep-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="ep-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">LLM 평가 파이프라인 구조</text>

  <!-- Test Dataset -->
  <rect x="60" y="76" width="160" height="70" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="140" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">평가 데이터셋</text>
  <text x="140" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">골든셋 · 엣지케이스</text>
  <text x="140" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">입력 + 기대 출력</text>

  <!-- LLM under test -->
  <rect x="280" y="76" width="160" height="70" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="360" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">LLM 추론</text>
  <text x="360" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">테스트 대상 모델</text>
  <text x="360" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">실제 출력 생성</text>

  <!-- Evaluators -->
  <text x="580" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">평가자 (Evaluators)</text>

  <rect x="500" y="82" width="140" height="54" rx="8" fill="#2a1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="570" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">정확도 체크</text>
  <text x="570" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Exact Match / ROUGE</text>

  <rect x="660" y="82" width="140" height="54" rx="8" fill="#2a1a2a" stroke="#e05555" stroke-width="1.5"/>
  <text x="730" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">LLM-as-Judge</text>
  <text x="730" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">GPT-4 / Claude 채점</text>

  <!-- Arrows -->
  <line x1="220" y1="111" x2="278" y2="111" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ep-arr)"/>
  <line x1="440" y1="96" x2="498" y2="96" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ep-arr)"/>
  <line x1="440" y1="126" x2="658" y2="126" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ep-arr)"/>

  <!-- Score Aggregator -->
  <rect x="560" y="176" width="200" height="60" rx="8" fill="#1a2a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="660" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">점수 집계</text>
  <text x="660" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">종합 점수 계산 + 리포트</text>

  <line x1="570" y1="136" x2="630" y2="176" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ep-arr)"/>
  <line x1="730" y1="136" x2="700" y2="176" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ep-arr)"/>

  <!-- Pass/Fail Gate -->
  <rect x="290" y="180" width="190" height="56" rx="8" fill="#2a2a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="385" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">임계값 게이트</text>
  <text x="385" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">score ≥ threshold?</text>

  <line x1="560" y1="206" x2="480" y2="206" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ep-arr)"/>

  <!-- Pass -->
  <rect x="60" y="280" width="160" height="56" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="140" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">✓ 배포 승인</text>
  <text x="140" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">프롬프트 레지스트리 승격</text>

  <!-- Fail -->
  <rect x="240" y="280" width="160" height="56" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="320" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">✗ PR 블록</text>
  <text x="320" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Slack 알림 + 리포트</text>

  <line x1="340" y1="236" x2="200" y2="280" stroke="#55c555" stroke-width="2" marker-end="url(#ep-green)"/>
  <line x1="420" y1="236" x2="360" y2="280" stroke="#e05555" stroke-width="2" marker-end="url(#ep-red)"/>
  <text x="190" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">Pass</text>
  <text x="400" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">Fail</text>

  <!-- Code block -->
  <rect x="60" y="358" width="760" height="108" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># DeepEval로 LLM 출력 자동 평가</text>
  <text x="76" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ffffff"> deepeval </tspan><tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> assert_test, LLMTestCase</tspan></text>
  <text x="76" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ffffff"> deepeval.metrics </tspan><tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> AnswerRelevancyMetric</tspan></text>
  <text x="76" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">tc = LLMTestCase(input=</tspan><tspan fill="#ce9178">"파이썬이란?"</tspan><tspan fill="#ffffff">, actual_output=llm_response)</tspan></text>
  <text x="76" y="450" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">assert_test</tspan><tspan fill="#ffffff">(tc, [AnswerRelevancyMetric(threshold=</tspan><tspan fill="#b5cea8">0.7</tspan><tspan fill="#ffffff">)])</tspan></text>
</svg>
