<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">BFG Repo-Cleaner — 빠른 히스토리 정리</text>

  <!-- Comparison header -->
  <text x="240" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">BFG Repo-Cleaner</text>
  <text x="660" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#888" text-anchor="middle">git filter-repo</text>

  <!-- BFG column -->
  <rect x="60" y="108" width="360" height="200" rx="8" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="240" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">✓ Java 기반, 단일 JAR 실행</text>
  <text x="240" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">✓ 대용량 파일 삭제 특화</text>
  <text x="240" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">✓ 비밀번호/텍스트 교체 지원</text>
  <text x="240" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">✗ filter-repo보다 기능 적음</text>
  <text x="240" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">✗ 현재 커밋 내용은 보존</text>
  <text x="240" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">✗ Java 런타임 필요</text>
  <text x="240" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">단순 파일·텍스트 제거에 빠르고 편함</text>

  <!-- filter-repo column -->
  <rect x="460" y="108" width="360" height="200" rx="8" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
  <text x="640" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">✓ 파이썬, 다양한 OS</text>
  <text x="640" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">✓ 경로·정규식·콜백 필터</text>
  <text x="640" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">✓ 현재 커밋도 포함해 정리</text>
  <text x="640" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">✓ Git 공식 권장 도구</text>
  <text x="640" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">복잡한 재작성엔 더 강력함</text>
  <text x="640" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">복잡한 재구성·서브디렉터리 추출에 적합</text>

  <!-- vs divider -->
  <line x1="440" y1="108" x2="440" y2="308" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="440" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#555" text-anchor="middle">vs</text>

  <!-- Bottom note -->
  <rect x="60" y="330" width="760" height="60" rx="8" fill="#1a1a0a" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle" font-weight="600">선택 기준</text>
  <text x="440" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">단순 대용량 파일 or 비밀 텍스트 제거 → BFG  /  복잡한 재구성·서브디렉터리 분리 → filter-repo</text>
</svg>
