<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arb" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">전통적 렌더링 vs 스트리밍 렌더링</text>

  <!-- Left column: Traditional -->
  <text x="230" y="80"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555">전통적 동적 렌더링</text>

  <!-- Timeline for traditional -->
  <!-- Server phase -->
  <rect x="60" y="96" width="340" height="52" rx="6" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="230" y="120"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">서버: 모든 데이터 패칭 대기</text>
  <text x="230" y="138"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Layout + Main + Sidebar 전부 완료될 때까지...</text>

  <line x1="230" y1="148" x2="230" y2="174" stroke="#e05555" stroke-width="1.5" marker-end="url(#arb)"/>

  <rect x="60" y="178" width="340" height="44" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="230" y="198"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">느린 DB 쿼리 대기 (예: 2,000ms)</text>
  <text x="230" y="214"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">사용자 화면: 빈 화면</text>

  <line x1="230" y1="222" x2="230" y2="248" stroke="#e05555" stroke-width="1.5" marker-end="url(#arb)"/>

  <rect x="60" y="252" width="340" height="52" rx="6" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="230" y="276"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">HTML 전체를 한 번에 전송</text>
  <text x="230" y="294"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">TTFB: ~2,000ms — 사용자 오래 기다림</text>

  <!-- Divider -->
  <line x1="440" y1="70" x2="440" y2="460" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Right column: Streaming -->
  <text x="660" y="80"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">Streaming (Suspense)</text>

  <!-- Step 1: Shell -->
  <rect x="480" y="96" width="340" height="52" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="660" y="120"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">① 정적 셸 즉시 전송 (~50ms)</text>
  <text x="660" y="138"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Layout + Skeleton fallback HTML</text>

  <line x1="660" y1="148" x2="660" y2="174" stroke="#55c555" stroke-width="1.5" marker-end="url(#arb)"/>

  <!-- Step 2: Skeleton visible -->
  <rect x="480" y="178" width="340" height="44" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="660" y="198"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">사용자: 레이아웃 + 스켈레톤 표시</text>
  <text x="660" y="214"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">백그라운드: 느린 쿼리 실행 중</text>

  <line x1="660" y1="222" x2="660" y2="248" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arb)"/>

  <!-- Step 3: Stream chunk -->
  <rect x="480" y="252" width="340" height="52" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="660" y="276"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">② 준비된 청크 스트리밍</text>
  <text x="660" y="294"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">각 Suspense 경계 완료 순으로 전송</text>

  <!-- Benefit summary -->
  <rect x="60" y="330" width="760" height="68" rx="8" fill="#0d0d1a" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="356"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">Streaming의 핵심 이점</text>
  <text x="440" y="378"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">빠른 TTFB (정적 셸)  |  체감 성능 향상 (스켈레톤)  |  느린 컴포넌트가 나머지를 블로킹하지 않음</text>

  <!-- Code hint -->
  <rect x="60" y="420" width="760" height="56" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="442" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#9aa4b8">// 핵심: Suspense로 감싸기만 하면 자동으로 스트리밍</tspan>
  </text>
  <text x="76" y="462" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">&lt;</tspan>
    <tspan fill="#7ec8e3" font-weight="600">Suspense</tspan>
    <tspan fill="#ffffff"> fallback={&lt;</tspan>
    <tspan fill="#7ec8e3" font-weight="600">Skeleton</tspan>
    <tspan fill="#ffffff"> /&gt;}&gt;&lt;</tspan>
    <tspan fill="#7ec8e3" font-weight="600">SlowComponent</tspan>
    <tspan fill="#ffffff"> /&gt;&lt;/</tspan>
    <tspan fill="#7ec8e3" font-weight="600">Suspense</tspan>
    <tspan fill="#ffffff">&gt;</tspan>
  </text>
</svg>
