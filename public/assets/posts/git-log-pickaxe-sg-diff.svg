<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 300">
  <rect width="880" height="300" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">-S 와 -G 의 차이</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">"등장 횟수 변화"냐 "변경 줄에 패턴 출현"이냐</text>

  <rect x="60" y="100" width="360" height="160" rx="10" fill="#101010" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="132" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="16" font-weight="600" fill="#7ec8e3">-S "문자열"</text>
  <text x="240" y="160" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#e8e8e8">등장 횟수가 바뀐 커밋</text>
  <text x="240" y="184" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#888">추가/삭제 시점 포착</text>
  <text x="240" y="214" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#55c555">"언제 생겼나/사라졌나"</text>
  <text x="240" y="238" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#888">단순 이동은 안 잡힘</text>

  <rect x="460" y="100" width="360" height="160" rx="10" fill="#101010" stroke="#9988dd" stroke-width="1.5"/>
  <text x="640" y="132" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="16" font-weight="600" fill="#9988dd">-G "정규식"</text>
  <text x="640" y="160" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#e8e8e8">변경 줄에 패턴이 나온 커밋</text>
  <text x="640" y="184" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#888">+/− 어느 쪽이든</text>
  <text x="640" y="214" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#55c555">"언제 건드렸나"</text>
  <text x="640" y="238" text-anchor="middle"
        font-family="'Wanted Sans Variable',sans-serif" font-size="13" fill="#888">이동·수정도 포착</text>
</svg>
