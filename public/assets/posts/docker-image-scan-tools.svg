<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">이미지 취약점 스캔 도구 비교</text>

  <!-- Trivy -->
  <rect x="60" y="66" width="230" height="36" rx="6" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="175" y="89" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">Trivy (Aqua Security)</text>

  <rect x="60" y="114" width="230" height="200" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="80" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">장점</text>
  <text x="80" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">✓  오픈소스, 무료</text>
  <text x="80" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">✓  OS + 라이브러리 동시 스캔</text>
  <text x="80" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">✓  IaC, GitRepo 스캔 지원</text>
  <text x="80" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">✓  CI 통합 용이</text>
  <text x="80" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">✓  SBOM 생성 지원</text>
  <text x="80" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">단점</text>
  <text x="80" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">✗  DB 업데이트 주기 짧음</text>
  <text x="80" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">✗  오탐(false positive) 가능</text>

  <!-- Docker Scout -->
  <rect x="325" y="66" width="230" height="36" rx="6" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="89" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">Docker Scout</text>

  <rect x="325" y="114" width="230" height="200" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="345" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">장점</text>
  <text x="345" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">✓  Docker CLI 기본 통합</text>
  <text x="345" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">✓  Docker Hub 연동</text>
  <text x="345" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">✓  베이스 이미지 추천</text>
  <text x="345" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">✓  정책(Policy) 기반 게이트</text>
  <text x="345" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">✓  GUI 대시보드 제공</text>
  <text x="345" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">단점</text>
  <text x="345" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">✗  무료 플랜 제한 있음</text>
  <text x="345" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">✗  Trivy 대비 스캔 범위 좁음</text>

  <!-- Grype -->
  <rect x="590" y="66" width="230" height="36" rx="6" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="705" y="89" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">Grype (Anchore)</text>

  <rect x="590" y="114" width="230" height="200" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="610" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">장점</text>
  <text x="610" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">✓  오픈소스, 무료</text>
  <text x="610" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">✓  Syft SBOM과 연동 탁월</text>
  <text x="610" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">✓  정책 설정 유연</text>
  <text x="610" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">✓  JSON/SARIF 출력</text>
  <text x="610" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">✓  Anchore Enterprise 연동</text>
  <text x="610" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">단점</text>
  <text x="610" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">✗  Trivy보다 DB 크기 큼</text>
  <text x="610" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">✗  인지도 상대적으로 낮음</text>

  <!-- Severity legend -->
  <rect x="60" y="336" width="760" height="100" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">취약점 심각도(CVSS)</text>

  <rect x="90" y="370" width="90" height="28" rx="4" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="135" y="389" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">CRITICAL</text>

  <rect x="210" y="370" width="90" height="28" rx="4" fill="#2a1810" stroke="#e07525" stroke-width="1"/>
  <text x="255" y="389" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e07525">HIGH</text>

  <rect x="330" y="370" width="90" height="28" rx="4" fill="#2a2010" stroke="#e0d025" stroke-width="1"/>
  <text x="375" y="389" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e0d025">MEDIUM</text>

  <rect x="450" y="370" width="90" height="28" rx="4" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="495" y="389" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">LOW</text>

  <rect x="570" y="370" width="90" height="28" rx="4" fill="#111" stroke="#888" stroke-width="1"/>
  <text x="615" y="389" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">NEGLIGIBLE</text>

  <text x="440" y="424" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">CI 정책: CRITICAL·HIGH → 빌드 실패 / MEDIUM → 경고 / LOW 이하 → 무시</text>

  <!-- bottom note -->
  <text x="440" y="458" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">세 도구 모두 NVD, OSV, GitHub Advisory 등 공개 취약점 데이터베이스를 참조한다</text>
</svg>
