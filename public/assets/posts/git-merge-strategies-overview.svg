<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Git Merge 전략 비교</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">상황에 따라 선택하는 병합 알고리즘</text>

  <!-- ort -->
  <rect x="60" y="96" width="230" height="130" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="175" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">ort (기본)</text>
  <text x="80" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Git 2.34+ 기본 전략</text>
  <text x="80" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Orthogonal Recursive Text</text>
  <text x="80" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">rename 추적 정확도 향상</text>
  <text x="80" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">criss-cross 병합 안정적</text>
  <text x="80" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">가장 많이 쓰이는 전략</text>

  <!-- recursive -->
  <rect x="326" y="96" width="230" height="130" rx="8" fill="#0d1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="441" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc">recursive</text>
  <text x="346" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Git 2.33 이하 기본 전략</text>
  <text x="346" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">공통 조상 재귀 탐색</text>
  <text x="346" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">criss-cross 병합 지원</text>
  <text x="346" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ort로 대체되는 중</text>
  <text x="346" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">현재도 사용 가능</text>

  <!-- octopus -->
  <rect x="592" y="96" width="230" height="130" rx="8" fill="#1a100a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="707" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">octopus</text>
  <text x="612" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">3개 이상 브랜치 동시 병합</text>
  <text x="612" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">단일 머지 커밋 생성</text>
  <text x="612" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">충돌 발생 시 실패</text>
  <text x="612" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">모놀리포 통합 작업에 유용</text>
  <text x="612" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">충돌 없을 때만 사용</text>

  <!-- ours / theirs -->
  <rect x="60" y="256" width="360" height="110" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555">ours (전략)</text>
  <text x="80" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">상대 브랜치 변경 무시 — HEAD 내용만 유지</text>
  <text x="80" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">머지 커밋은 생성됨 (히스토리 기록용)</text>
  <text x="80" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">-X ours 옵션(충돌 해결)과 다름</text>
  <text x="80" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">git merge -s ours old-branch</text>

  <!-- resolve -->
  <rect x="460" y="256" width="360" height="110" rx="8" fill="#0a0a1a" stroke="#888" stroke-width="1.5"/>
  <text x="640" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#888">resolve</text>
  <text x="480" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">단일 공통 조상만 사용 (재귀 없음)</text>
  <text x="480" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">criss-cross 병합 미지원</text>
  <text x="480" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">레거시 / 단순한 히스토리용</text>
  <text x="480" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">실무에서 거의 사용 안 함</text>
</svg>
