<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">암호화 레이어: 저장 vs 전송</text>

  <!-- Client -->
  <rect x="60" y="68" width="160" height="60" rx="8" fill="#111122" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="91" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">클라이언트</text>
  <text x="140" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">브라우저 / 앱</text>

  <!-- TLS Arrow -->
  <line x1="222" y1="98" x2="418" y2="98" stroke="#55c555" stroke-width="2.5" marker-end="url(#arr-g)"/>
  <rect x="260" y="68" width="120" height="24" rx="4" fill="#0a0a0a"/>
  <text x="320" y="85" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">TLS 1.3 암호화</text>

  <!-- Server -->
  <rect x="420" y="68" width="180" height="60" rx="8" fill="#111122" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="510" y="91" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">웹 서버</text>
  <text x="510" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">TLS 종료 후 평문 처리</text>

  <!-- Server to DB -->
  <line x1="602" y1="98" x2="698" y2="98" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="610" y="70" width="80" height="22" rx="4" fill="#0a0a0a"/>
  <text x="650" y="85" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">TLS (내부)</text>

  <!-- DB -->
  <rect x="700" y="68" width="140" height="60" rx="8" fill="#0d200d" stroke="#55c555" stroke-width="1.5"/>
  <text x="770" y="91" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">데이터베이스</text>
  <text x="770" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">저장 암호화</text>

  <!-- Encryption in Transit -->
  <rect x="60" y="148" width="760" height="130" rx="8" fill="#0d200d" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">전송 중 암호화 (Encryption in Transit)</text>

  <rect x="80" y="184" width="340" height="80" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># nginx TLS 설정</text>
  <text x="96" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">ssl_protocols TLSv1.2 TLSv1.3;</text>
  <text x="96" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:</text>
  <text x="96" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">          ECDHE-RSA-AES256-GCM-SHA384;</text>

  <text x="480" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· HTTPS: 클라이언트 ↔ 서버</text>
  <text x="480" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· 내부 서비스 간: mutual TLS (mTLS)</text>
  <text x="480" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· HSTS로 HTTP 다운그레이드 방지</text>
  <text x="480" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· 내부망도 암호화 — 제로 트러스트</text>

  <!-- Encryption at Rest -->
  <rect x="60" y="294" width="760" height="150" rx="8" fill="#111122" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">저장 데이터 암호화 (Encryption at Rest)</text>

  <!-- 3 columns -->
  <rect x="80" y="330" width="200" height="100" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="180" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">디스크 레벨</text>
  <text x="180" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">OS/클라우드 관리</text>
  <text x="180" y="384" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">AWS EBS, GCS 기본 제공</text>
  <text x="180" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Linux: LUKS, BitLocker</text>
  <text x="180" y="418" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">DB 서버 접근 시 평문 노출</text>

  <rect x="300" y="330" width="220" height="100" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="410" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">DB 레벨 (TDE)</text>
  <text x="410" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Transparent Data Encryption</text>
  <text x="410" y="384" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">PostgreSQL pgcrypto</text>
  <text x="410" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">MySQL InnoDB TDE</text>
  <text x="410" y="418" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">DBA 접근 시 평문 노출</text>

  <rect x="540" y="330" width="260" height="100" rx="6" fill="#111a11" stroke="#55c555" stroke-width="1"/>
  <text x="670" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">애플리케이션 레벨 ★</text>
  <text x="670" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">앱이 암호화 후 저장</text>
  <text x="670" y="384" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">DBA 접근해도 암호문만 보임</text>
  <text x="670" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">키 관리 복잡도 증가</text>
  <text x="670" y="418" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">PII, 카드번호 등에 필수</text>

  <!-- Bottom note -->
  <text x="440" y="462" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">방어 심층화: 디스크 암호화 + TDE + 앱 레벨 암호화 중 상황에 맞게 조합</text>
</svg>
