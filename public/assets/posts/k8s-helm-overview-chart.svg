<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Helm Chart 디렉터리 구조</text>

  <!-- Left: Directory tree -->
  <rect x="60" y="72" width="360" height="316" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="100" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">mychart/</text>
  <text x="80" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve" font-weight="600">├── Chart.yaml</text>
  <text x="80" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve" font-weight="600">├── values.yaml</text>
  <text x="80" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">├── templates/</text>
  <text x="80" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">│   ├── deployment.yaml</text>
  <text x="80" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">│   ├── service.yaml</text>
  <text x="80" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">│   ├── ingress.yaml</text>
  <text x="80" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">│   ├── _helpers.tpl</text>
  <text x="80" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">│   └── NOTES.txt</text>
  <text x="80" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">├── charts/</text>
  <text x="80" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">│   └── (하위 chart 의존성)</text>
  <text x="80" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">├── .helmignore</text>
  <text x="80" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">└── README.md</text>

  <!-- Right: File descriptions -->
  <rect x="460" y="72" width="360" height="130" rx="8" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1"/>
  <text x="480" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Chart.yaml</text>
  <text x="480" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">이름, 버전, 설명, 의존성 선언</text>
  <text x="480" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">values.yaml</text>
  <text x="480" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">기본 설정값. helm install -f로 오버라이드</text>
  <text x="480" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">--set key=value 로 개별 값 변경 가능</text>

  <rect x="460" y="214" width="360" height="110" rx="8" fill="#1a1a0a" stroke="#ce9178" stroke-width="1"/>
  <text x="480" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">templates/</text>
  <text x="480" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Go 템플릿으로 작성한 K8s manifest</text>
  <text x="480" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">{{ .Values.image.tag }} 처럼 값 참조</text>
  <text x="480" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">_helpers.tpl: 재사용 함수 정의</text>
  <text x="480" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">NOTES.txt: 설치 후 출력 안내</text>

  <rect x="460" y="336" width="360" height="52" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="480" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">charts/</text>
  <text x="480" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">하위 의존성 chart. helm dependency update</text>
</svg>
