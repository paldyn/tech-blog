<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" style="background:#0a0a0a">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">tsconfig.json 핵심 설정</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888" text-anchor="middle">처음 시작할 때 알아야 할 필수 옵션</text>

  <!-- Left: tsconfig code block -->
  <rect x="60" y="96" width="380" height="370" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">{</text>
  <text x="76" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">  "compilerOptions"</tspan><tspan fill="#ffffff">: {</tspan></text>
  <text x="76" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">    "target"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"ES2022"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="76" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">    "module"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"commonjs"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="76" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">    "strict"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#7ec8e3" font-weight="600">true</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="76" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">    "outDir"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"./dist"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="76" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">    "rootDir"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"./src"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="76" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">    "esModuleInterop"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#7ec8e3" font-weight="600">true</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="76" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">    "skipLibCheck"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#7ec8e3" font-weight="600">true</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="76" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">    "declaration"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#7ec8e3" font-weight="600">true</tspan></text>
  <text x="76" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  },</text>
  <text x="76" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">  "include"</tspan><tspan fill="#ffffff">: [</tspan><tspan fill="#ce9178">"src/**/*"</tspan><tspan fill="#ffffff">],</tspan></text>
  <text x="76" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">  "exclude"</tspan><tspan fill="#ffffff">: [</tspan><tspan fill="#ce9178">"node_modules"</tspan><tspan fill="#ffffff">]</tspan></text>
  <text x="76" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>

  <!-- Right: option explanations -->
  <rect x="464" y="96" width="356" height="60" rx="6" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="484" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">target: "ES2022"</text>
  <text x="484" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">출력 JS 버전. 모던 Node.js는 ES2022 권장</text>

  <rect x="464" y="166" width="356" height="60" rx="6" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="484" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">strict: true</text>
  <text x="484" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">엄격 타입 검사 활성화. 초기부터 켜두길 권장</text>

  <rect x="464" y="236" width="356" height="60" rx="6" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="484" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">outDir / rootDir</text>
  <text x="484" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">소스(src)와 출력(dist) 디렉터리 분리</text>

  <rect x="464" y="306" width="356" height="60" rx="6" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="484" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">esModuleInterop: true</text>
  <text x="484" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">CommonJS 모듈 import/export 호환성 확보</text>

  <rect x="464" y="376" width="356" height="60" rx="6" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="484" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">declaration: true</text>
  <text x="484" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">라이브러리 배포 시 .d.ts 타입 선언 파일 생성</text>

  <!-- Bottom note -->
  <text x="440" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">tsc --init 으로 주석 포함 전체 옵션 템플릿 자동 생성 가능</text>
</svg>
