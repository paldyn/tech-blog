<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="40" y="48" font-size="22" font-weight="700" fill="#e8e8e8">JMH 실행 구조 — Fork · Warmup · Measurement</text>

  <!-- fork bracket -->
  <rect x="40" y="84" width="800" height="120" rx="8" fill="none" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="56" y="106" font-size="13" fill="#7777cc">Fork 1 (별도 JVM 프로세스 — 여러 번 반복)</text>

  <!-- warmup iterations -->
  <rect x="64" y="120" width="160" height="64" rx="6" fill="#101010" stroke="#e05555" stroke-width="1"/>
  <text x="144" y="148" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">Warmup ×5</text>
  <text x="144" y="170" font-size="13" fill="#9aa4b8" text-anchor="middle">측정 안 함</text>

  <rect x="248" y="120" width="560" height="64" rx="6" fill="#101010" stroke="#55c555" stroke-width="1"/>
  <text x="528" y="148" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">Measurement ×5</text>
  <text x="528" y="170" font-size="13" fill="#9aa4b8" text-anchor="middle">JIT가 C2로 컴파일을 끝낸 안정 상태에서만 시간 측정</text>

  <text x="40" y="240" font-size="13" fill="#9aa4b8">웜업 반복으로 JIT 컴파일·캐시 워밍을 끝낸 뒤 측정 반복에서만 수치를 수집합니다.</text>
  <text x="40" y="266" font-size="13" fill="#9aa4b8">여러 Fork로 JVM마다 다른 프로파일·메모리 배치의 편차까지 평균 내어 통계적으로 신뢰도를 높입니다.</text>
</svg>
