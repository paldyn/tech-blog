<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">타입 파라미터 관례 &amp; Box&lt;T&gt; 예제</text>

  <!-- Type parameter table -->
  <rect x="40" y="64" width="360" height="280" fill="#111111" rx="10" stroke="#3a4a6e" stroke-width="1"/>
  <text x="220" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">타입 파라미터 이름 관례</text>

  <rect x="56" y="104" width="328" height="30" fill="#1a1a2e" rx="4"/>
  <text x="72" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3">T</text>
  <text x="108" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Type — 일반 타입 파라미터</text>

  <rect x="56" y="138" width="328" height="30" fill="#0e1a0e" rx="4"/>
  <text x="72" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#55c555">E</text>
  <text x="108" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Element — 컬렉션 원소 타입</text>

  <rect x="56" y="172" width="328" height="30" fill="#1a1a2e" rx="4"/>
  <text x="72" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3">K, V</text>
  <text x="120" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Key, Value — Map 키/값 타입</text>

  <rect x="56" y="206" width="328" height="30" fill="#0e1a0e" rx="4"/>
  <text x="72" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#55c555">N</text>
  <text x="108" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Number — 숫자 타입</text>

  <rect x="56" y="240" width="328" height="30" fill="#1a1a2e" rx="4"/>
  <text x="72" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3">R</text>
  <text x="108" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Result — 반환 타입</text>

  <rect x="56" y="274" width="328" height="30" fill="#0e1a0e" rx="4"/>
  <text x="72" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#55c555">S, U, V</text>
  <text x="136" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">다중 파라미터 2번째, 3번째</text>

  <!-- Box<T> code block -->
  <rect x="440" y="64" width="400" height="230" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="456" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">// Box&lt;T&gt; 제네릭 클래스</text>
  <text x="456" y="104" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">class</tspan><tspan fill="#ffffff"> Box&lt;</tspan><tspan fill="#55c555">T</tspan><tspan fill="#ffffff">&gt; {</tspan></text>
  <text x="456" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">private</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#55c555">T</tspan><tspan fill="#ffffff"> value;</tspan></text>
  <text x="456" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">public</tspan><tspan fill="#ffffff"> Box(</tspan><tspan fill="#55c555">T</tspan><tspan fill="#ffffff"> value) { </tspan><tspan fill="#7ec8e3" font-weight="600">this</tspan><tspan fill="#ffffff">.value = value; }</tspan></text>
  <text x="456" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">public</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#55c555">T</tspan><tspan fill="#ffffff"> getValue() { </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> value; }</tspan></text>
  <text x="456" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>
  <text x="456" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// T = String 으로 사용</tspan></text>
  <text x="456" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">Box&lt;</tspan><tspan fill="#7ec8e3" font-weight="600">String</tspan><tspan fill="#ffffff">&gt; box = </tspan><tspan fill="#7ec8e3" font-weight="600">new</tspan><tspan fill="#ffffff"> Box&lt;&gt;(</tspan><tspan fill="#ce9178">"Java"</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="456" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">String</tspan><tspan fill="#ffffff"> s = box.getValue(); </tspan><tspan fill="#9aa4b8">// 캐스팅 없음</tspan></text>
  <text x="456" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// box.getValue() 반환 타입 = String</tspan></text>

  <!-- Benefits row -->
  <rect x="440" y="310" width="185" height="62" fill="#0d1a2a" rx="8" stroke="#7ec8e3" stroke-width="1"/>
  <text x="532" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">코드 재사용</text>
  <text x="532" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">하나의 Box로 모든 타입 지원</text>

  <rect x="655" y="310" width="185" height="62" fill="#0a200a" rx="8" stroke="#55c555" stroke-width="1"/>
  <text x="747" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">타입 안전</text>
  <text x="747" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">컴파일러가 타입 오류 검출</text>
</svg>
