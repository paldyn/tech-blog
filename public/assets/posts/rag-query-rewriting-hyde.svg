<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">HyDE: 가상 문서 임베딩 검색</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888">Hypothetical Document Embeddings</text>

  <!-- Step 1: Query -->
  <rect x="60" y="100" width="140" height="56" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">원본 쿼리</text>
  <text x="130" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">"양자컴퓨터 원리?"</text>

  <!-- Arrow 1 -->
  <line x1="200" y1="128" x2="238" y2="128" stroke="#444" stroke-width="2"/>
  <polygon points="234,123 244,128 234,133" fill="#444"/>

  <!-- Step 2: LLM generates hypothetical doc -->
  <rect x="244" y="90" width="180" height="76" rx="8" fill="#0d1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="334" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">LLM 가상 답변 생성</text>
  <text x="334" y="133" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">"양자컴퓨터는 큐비트를</text>
  <text x="334" y="149" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888"> 이용해 중첩과 얽힘으로</text>
  <text x="334" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888"> 계산하는 장치입니다..."</text>

  <!-- Arrow 2 -->
  <line x1="424" y1="128" x2="462" y2="128" stroke="#444" stroke-width="2"/>
  <polygon points="458,123 468,128 458,133" fill="#444"/>

  <!-- Step 3: Embed hypothetical doc -->
  <rect x="468" y="100" width="150" height="56" rx="8" fill="#0d1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="543" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">가상 문서 임베딩</text>
  <text x="543" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">[0.23, -0.11, ...]</text>

  <!-- Arrow 3 -->
  <line x1="618" y1="128" x2="656" y2="128" stroke="#444" stroke-width="2"/>
  <polygon points="652,123 662,128 652,133" fill="#444"/>

  <!-- Step 4: Vector Search -->
  <rect x="662" y="100" width="148" height="56" rx="8" fill="#1a1a2e" stroke="#e05555" stroke-width="1.5"/>
  <text x="736" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">벡터 유사도 검색</text>
  <text x="736" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">실제 문서 Top-K</text>

  <!-- Why HyDE works -->
  <rect x="60" y="196" width="760" height="72" rx="8" fill="#111" stroke="#333"/>
  <text x="440" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8">HyDE가 효과적인 이유</text>
  <text x="440" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">짧은 쿼리("양자컴퓨터 원리?")보다 가상 답변("양자컴퓨터는 큐비트를...")이 실제 문서와 더 유사한 임베딩 공간에 위치</text>
  <text x="440" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">쿼리-문서 임베딩 분포 불일치(Asymmetry) 문제를 가상 문서로 해소</text>

  <!-- Code block -->
  <rect x="60" y="288" width="760" height="72" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># HyDE 구현 핵심 패턴</text>
  <text x="76" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">def</text>
  <text x="106" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> hyde_retrieve(query, llm, vectorstore):</text>
  <text x="76" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    hyp = llm.invoke(</text>
  <text x="220" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">f"다음 질문에 한 단락으로 답하라: {query}"</text>
  <text x="616" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">)</text>
  <text x="76" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">    return</text>
  <text x="124" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> vectorstore.similarity_search(hyp.content, k=</text>
  <text x="472" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">5</text>
  <text x="480" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">)</text>
</svg>
