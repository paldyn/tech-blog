<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arrUp" viewBox="0 0 14 14" refX="7" refY="12"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 14 L 7 0 L 14 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrRight" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">seek()와 tell() — 파일 포인터 제어</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">파일을 처음부터 끝까지 읽지 않고 원하는 위치로 바로 이동</text>

  <!-- File bytes visualization -->
  <text x="60" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">파일 내용 (바이트 단위 주소)</text>

  <!-- Byte cells -->
  <rect x="60" y="120" width="50" height="40" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="85" y="145" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" text-anchor="middle">H</text>

  <rect x="110" y="120" width="50" height="40" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="135" y="145" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" text-anchor="middle">e</text>

  <rect x="160" y="120" width="50" height="40" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="185" y="145" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" text-anchor="middle">l</text>

  <rect x="210" y="120" width="50" height="40" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="235" y="145" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" text-anchor="middle">l</text>

  <rect x="260" y="120" width="50" height="40" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="285" y="145" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" text-anchor="middle">o</text>

  <rect x="310" y="120" width="50" height="40" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="335" y="145" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">\n</text>

  <rect x="360" y="120" width="50" height="40" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="385" y="145" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">W</text>

  <rect x="410" y="120" width="50" height="40" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="435" y="145" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">o</text>

  <rect x="460" y="120" width="50" height="40" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="485" y="145" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">r</text>

  <rect x="510" y="120" width="50" height="40" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="535" y="145" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">l</text>

  <rect x="560" y="120" width="50" height="40" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="585" y="145" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">d</text>

  <!-- Byte numbers -->
  <text x="85" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888" text-anchor="middle">0</text>
  <text x="135" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888" text-anchor="middle">1</text>
  <text x="185" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888" text-anchor="middle">2</text>
  <text x="235" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888" text-anchor="middle">3</text>
  <text x="285" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888" text-anchor="middle">4</text>
  <text x="335" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888" text-anchor="middle">5</text>
  <text x="385" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888" text-anchor="middle">6</text>
  <text x="435" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888" text-anchor="middle">7</text>
  <text x="485" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888" text-anchor="middle">8</text>
  <text x="535" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888" text-anchor="middle">9</text>
  <text x="585" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888" text-anchor="middle">10</text>

  <!-- Pointer indicator -->
  <line x1="385" y1="190" x2="385" y2="206" stroke="#ce9178" stroke-width="2" marker-end="url(#arrUp)"/>
  <rect x="340" y="210" width="92" height="24" rx="4" fill="#2a1a1a" stroke="#ce9178" stroke-width="1"/>
  <text x="386" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178" text-anchor="middle">tell() → 6</text>

  <!-- seek table -->
  <rect x="60" y="260" width="760" height="160" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="78" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># seek(offset, whence) — whence: 0=시작, 1=현재, 2=끝</text>
  <text xml:space="preserve" x="78" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">f.seek(<ttml:tspan fill="#b5cea8">0</ttml:tspan>)          <ttml:tspan fill="#9aa4b8"># 파일 맨 처음으로</ttml:tspan></text>
  <text xml:space="preserve" x="78" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">f.seek(<ttml:tspan fill="#b5cea8">6</ttml:tspan>)          <ttml:tspan fill="#9aa4b8"># 6바이트 위치로</ttml:tspan></text>
  <text xml:space="preserve" x="78" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">f.seek(<ttml:tspan fill="#b5cea8">0</ttml:tspan>, <ttml:tspan fill="#b5cea8">2</ttml:tspan>)        <ttml:tspan fill="#9aa4b8"># 파일 맨 끝으로 (크기 확인)</ttml:tspan></text>
  <text xml:space="preserve" x="78" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">size = f.tell()   <ttml:tspan fill="#9aa4b8"># 파일 크기 = 마지막 바이트 위치+1</ttml:tspan></text>
  <text xml:space="preserve" x="78" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">f.seek(-<ttml:tspan fill="#b5cea8">10</ttml:tspan>, <ttml:tspan fill="#b5cea8">2</ttml:tspan>)      <ttml:tspan fill="#9aa4b8"># 끝에서 10바이트 전으로</ttml:tspan></text>
  <text xml:space="preserve" x="78" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">                  <ttml:tspan fill="#e05555"># 텍스트 모드: seek(0)·seek(tell()) 만 안전</ttml:tspan></text>
</svg>
