<svg xmlns="http://www.w3.org/2000/svg" width="880" height="260" viewBox="0 0 880 260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="260" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">로그 레벨의 위계</text>

  <rect x="60" y="92" width="142" height="60" rx="6" fill="#000000" stroke="#7777cc" stroke-width="1"/>
  <text x="131" y="120" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">DEBUG</text>
  <text x="131" y="140" font-size="11" fill="#9aa4b8" text-anchor="middle">10</text>

  <rect x="216" y="92" width="142" height="60" rx="6" fill="#000000" stroke="#7777cc" stroke-width="1"/>
  <text x="287" y="120" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">INFO</text>
  <text x="287" y="140" font-size="11" fill="#9aa4b8" text-anchor="middle">20</text>

  <rect x="372" y="92" width="142" height="60" rx="6" fill="#000000" stroke="#e0a555" stroke-width="1"/>
  <text x="443" y="120" font-size="14" font-weight="600" fill="#e0a555" text-anchor="middle">WARNING</text>
  <text x="443" y="140" font-size="11" fill="#9aa4b8" text-anchor="middle">30</text>

  <rect x="528" y="92" width="142" height="60" rx="6" fill="#000000" stroke="#e05555" stroke-width="1"/>
  <text x="599" y="120" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">ERROR</text>
  <text x="599" y="140" font-size="11" fill="#9aa4b8" text-anchor="middle">40</text>

  <rect x="684" y="92" width="136" height="60" rx="6" fill="#000000" stroke="#e05555" stroke-width="1"/>
  <text x="752" y="120" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">CRITICAL</text>
  <text x="752" y="140" font-size="11" fill="#9aa4b8" text-anchor="middle">50</text>

  <text x="60" y="184" font-size="13" fill="#888">낮음 (자세함) ──────────────────────────────────── 높음 (심각)</text>

  <rect x="60" y="200" width="760" height="42" rx="4" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text xml:space="preserve" x="78" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">레벨을 WARNING으로 두면 → DEBUG·INFO는 숨고 WARNING 이상만 출력</text>
</svg>
