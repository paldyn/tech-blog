<svg xmlns="http://www.w3.org/2000/svg" width="880" height="490" viewBox="0 0 880 490">
  <rect width="880" height="490" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Oracle 격리 수준 비교</text>

  <!-- Header row -->
  <rect x="60" y="66" width="200" height="44" rx="6" fill="#111" stroke="#333"/>
  <text x="160" y="93" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">이상 현상</text>

  <rect x="275" y="66" width="240" height="44" rx="6" fill="#0a1020" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="395" y="86" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">READ COMMITTED</text>
  <text x="395" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Oracle 기본값</text>

  <rect x="530" y="66" width="290" height="44" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="675" y="86" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">SERIALIZABLE</text>
  <text x="675" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">SET TRANSACTION ISOLATION LEVEL SERIALIZABLE</text>

  <!-- Row 1: Dirty Read -->
  <rect x="60" y="122" width="200" height="44" rx="4" fill="#111" stroke="#222"/>
  <text x="160" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Dirty Read</text>

  <rect x="275" y="122" width="240" height="44" rx="4" fill="#0a1020" stroke="#222"/>
  <text x="395" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">방지 ✓</text>

  <rect x="530" y="122" width="290" height="44" rx="4" fill="#0f1a0f" stroke="#222"/>
  <text x="675" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">방지 ✓</text>

  <!-- Row 2: Non-Repeatable Read -->
  <rect x="60" y="178" width="200" height="44" rx="4" fill="#111" stroke="#222"/>
  <text x="160" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Non-Repeatable</text>

  <rect x="275" y="178" width="240" height="44" rx="4" fill="#0a1020" stroke="#222"/>
  <text x="395" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">발생 가능 ✗</text>

  <rect x="530" y="178" width="290" height="44" rx="4" fill="#0f1a0f" stroke="#222"/>
  <text x="675" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">방지 ✓</text>

  <!-- Row 3: Phantom Read -->
  <rect x="60" y="234" width="200" height="44" rx="4" fill="#111" stroke="#222"/>
  <text x="160" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Phantom Read</text>

  <rect x="275" y="234" width="240" height="44" rx="4" fill="#0a1020" stroke="#222"/>
  <text x="395" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">발생 가능 ✗</text>

  <rect x="530" y="234" width="290" height="44" rx="4" fill="#0f1a0f" stroke="#222"/>
  <text x="675" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">방지 ✓</text>

  <!-- Row 4: SCN 기준 -->
  <rect x="60" y="290" width="200" height="44" rx="4" fill="#111" stroke="#222"/>
  <text x="160" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">SCN 기준 고정</text>

  <rect x="275" y="290" width="240" height="44" rx="4" fill="#0a1020" stroke="#222"/>
  <text x="395" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">문장(Statement) 시작 시</text>

  <rect x="530" y="290" width="290" height="44" rx="4" fill="#0f1a0f" stroke="#222"/>
  <text x="675" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">트랜잭션(Transaction) 시작 시</text>

  <!-- Row 5: ORA-08177 -->
  <rect x="60" y="346" width="200" height="44" rx="4" fill="#111" stroke="#222"/>
  <text x="160" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">ORA-08177 위험</text>

  <rect x="275" y="346" width="240" height="44" rx="4" fill="#0a1020" stroke="#222"/>
  <text x="395" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">없음</text>

  <rect x="530" y="346" width="290" height="44" rx="4" fill="#0f1a0f" stroke="#222"/>
  <text x="675" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">발생 가능 (Serialization Failure)</text>

  <!-- Note -->
  <rect x="60" y="408" width="760" height="62" rx="6" fill="#111" stroke="#333"/>
  <text x="440" y="430" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">Oracle이 지원하지 않는 표준 격리 수준</text>
  <text x="440" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">READ UNCOMMITTED (Dirty Read 허용) — Oracle은 비커밋 데이터 읽기를 구조적으로 지원하지 않음</text>
  <text x="440" y="468" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">REPEATABLE READ — 별도 지원 없음 (SERIALIZABLE로 대체)</text>
</svg>
