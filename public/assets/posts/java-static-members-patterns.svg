<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">static 실전 패턴 — 싱글톤 · 팩토리 · 상수</text>

  <!-- 패턴 1: 상수 -->
  <rect x="60" y="68" width="230" height="160" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="175" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">① 상수 정의</text>
  <rect x="76" y="104" width="198" height="110" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="86" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">static</tspan> <tspan font-weight="600" fill="#7ec8e3">final</tspan> <tspan font-weight="600" fill="#7ec8e3">int</tspan></text>
  <text x="86" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  MAX = 100;</text>
  <text x="86" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">static</tspan> <tspan font-weight="600" fill="#7ec8e3">final</tspan></text>
  <text x="86" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  String PREFIX</text>
  <text x="86" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">    = <tspan fill="#ce9178">"APP_"</tspan>;</text>

  <!-- 패턴 2: 팩토리 메서드 -->
  <rect x="325" y="68" width="230" height="160" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">② 팩토리 메서드</text>
  <rect x="341" y="104" width="198" height="110" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="351" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">static</tspan> Connection</text>
  <text x="351" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  of(<tspan font-weight="600" fill="#7ec8e3">String</tspan> host) {</text>
  <text x="351" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">    <tspan font-weight="600" fill="#7ec8e3">return new</tspan></text>
  <text x="351" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">      Connection(host);</text>
  <text x="351" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">}</text>

  <!-- 패턴 3: 싱글톤 -->
  <rect x="590" y="68" width="230" height="160" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="705" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">③ 싱글톤</text>
  <rect x="606" y="104" width="198" height="110" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="616" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">private static</tspan></text>
  <text x="616" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  Config inst;</text>
  <text x="616" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">static</tspan> Config get() {</text>
  <text x="616" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  <tspan font-weight="600" fill="#7ec8e3">if</tspan>(inst==<tspan font-weight="600" fill="#7ec8e3">null</tspan>)</text>
  <text x="616" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">    inst=<tspan font-weight="600" fill="#7ec8e3">new</tspan> Config();</text>

  <!-- 구분선 -->
  <line x1="60" y1="252" x2="820" y2="252" stroke="#2a2a2a" stroke-width="1"/>

  <!-- static 주의사항 제목 -->
  <text x="440" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">static 멤버 접근 규칙</text>

  <!-- 접근 매트릭스 -->
  <!-- 헤더 -->
  <rect x="60" y="294" width="200" height="36" rx="4" fill="#1a1a2e" stroke="#2a2a4a" stroke-width="1"/>
  <text x="160" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">접근 위치</text>
  <rect x="270" y="294" width="180" height="36" rx="4" fill="#0d1726" stroke="#7ec8e3" stroke-width="1"/>
  <text x="360" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">static 멤버</text>
  <rect x="460" y="294" width="180" height="36" rx="4" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="550" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">인스턴스 멤버</text>
  <rect x="650" y="294" width="170" height="36" rx="4" fill="#1a1a2e" stroke="#2a2a4a" stroke-width="1"/>
  <text x="735" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">비고</text>

  <!-- 행 1: static 메서드에서 -->
  <rect x="60" y="340" width="200" height="40" rx="4" fill="#111827" stroke="#2a2a2a" stroke-width="1"/>
  <text x="160" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">static 메서드</text>
  <rect x="270" y="340" width="180" height="40" rx="4" fill="#111827" stroke="#2a2a2a" stroke-width="1"/>
  <text x="360" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">✓ 직접 접근</text>
  <rect x="460" y="340" width="180" height="40" rx="4" fill="#111827" stroke="#2a2a2a" stroke-width="1"/>
  <text x="550" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">✗ 불가</text>
  <rect x="650" y="340" width="170" height="40" rx="4" fill="#111827" stroke="#2a2a2a" stroke-width="1"/>
  <text x="735" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">this 참조 없음</text>

  <!-- 행 2: 인스턴스 메서드에서 -->
  <rect x="60" y="390" width="200" height="40" rx="4" fill="#111827" stroke="#2a2a2a" stroke-width="1"/>
  <text x="160" y="415" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">인스턴스 메서드</text>
  <rect x="270" y="390" width="180" height="40" rx="4" fill="#111827" stroke="#2a2a2a" stroke-width="1"/>
  <text x="360" y="415" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">✓ 접근 가능</text>
  <rect x="460" y="390" width="180" height="40" rx="4" fill="#111827" stroke="#2a2a2a" stroke-width="1"/>
  <text x="550" y="415" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">✓ 접근 가능</text>
  <rect x="650" y="390" width="170" height="40" rx="4" fill="#111827" stroke="#2a2a2a" stroke-width="1"/>
  <text x="735" y="415" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">this 참조 있음</text>

  <!-- 행 3: 외부에서 -->
  <rect x="60" y="440" width="200" height="40" rx="4" fill="#111827" stroke="#2a2a2a" stroke-width="1"/>
  <text x="160" y="465" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">외부 코드</text>
  <rect x="270" y="440" width="180" height="40" rx="4" fill="#111827" stroke="#2a2a2a" stroke-width="1"/>
  <text x="360" y="465" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">ClassName.method()</text>
  <rect x="460" y="440" width="180" height="40" rx="4" fill="#111827" stroke="#2a2a2a" stroke-width="1"/>
  <text x="550" y="465" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle">instance.method()</text>
  <rect x="650" y="440" width="170" height="40" rx="4" fill="#111827" stroke="#2a2a2a" stroke-width="1"/>
  <text x="735" y="465" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">클래스명 권장</text>
</svg>
