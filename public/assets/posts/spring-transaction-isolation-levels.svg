<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">트랜잭션 격리 수준과 동시성 문제</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">높을수록 안전하지만 성능 저하 — 격리 수준별 허용 문제</text>

  <!-- Column headers -->
  <rect x="60" y="88" width="180" height="34" fill="#111" rx="6" stroke="#222" stroke-width="1"/>
  <text x="150" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">격리 수준</text>

  <rect x="248" y="88" width="140" height="34" fill="#111" rx="6" stroke="#222" stroke-width="1"/>
  <text x="318" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">Dirty Read</text>

  <rect x="396" y="88" width="140" height="34" fill="#111" rx="6" stroke="#222" stroke-width="1"/>
  <text x="466" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">Non-Repeatable</text>

  <rect x="544" y="88" width="130" height="34" fill="#111" rx="6" stroke="#222" stroke-width="1"/>
  <text x="609" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">Phantom Read</text>

  <rect x="682" y="88" width="140" height="34" fill="#111" rx="6" stroke="#222" stroke-width="1"/>
  <text x="752" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">성능</text>

  <!-- Row 1: READ_UNCOMMITTED -->
  <rect x="60" y="130" width="180" height="52" fill="#0d1a2e" rx="6" stroke="#1e2e4a" stroke-width="1"/>
  <text x="80" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">READ_</text>
  <text x="80" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">UNCOMMITTED</text>

  <rect x="248" y="130" width="140" height="52" fill="#1a0a0a" rx="6" stroke="#2e1a1a" stroke-width="1"/>
  <text x="318" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e05555" text-anchor="middle">✗</text>

  <rect x="396" y="130" width="140" height="52" fill="#1a0a0a" rx="6" stroke="#2e1a1a" stroke-width="1"/>
  <text x="466" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e05555" text-anchor="middle">✗</text>

  <rect x="544" y="130" width="130" height="52" fill="#1a0a0a" rx="6" stroke="#2e1a1a" stroke-width="1"/>
  <text x="609" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e05555" text-anchor="middle">✗</text>

  <rect x="682" y="130" width="140" height="52" fill="#0a1a0a" rx="6" stroke="#1a2e1a" stroke-width="1"/>
  <text x="752" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555" text-anchor="middle">최고</text>

  <!-- Row 2: READ_COMMITTED -->
  <rect x="60" y="190" width="180" height="52" fill="#0d1a2e" rx="6" stroke="#1e2e4a" stroke-width="1"/>
  <text x="80" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">READ_</text>
  <text x="80" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">COMMITTED</text>

  <rect x="248" y="190" width="140" height="52" fill="#0a1a0a" rx="6" stroke="#1a2e1a" stroke-width="1"/>
  <text x="318" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#55c555" text-anchor="middle">✓</text>

  <rect x="396" y="190" width="140" height="52" fill="#1a0a0a" rx="6" stroke="#2e1a1a" stroke-width="1"/>
  <text x="466" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e05555" text-anchor="middle">✗</text>

  <rect x="544" y="190" width="130" height="52" fill="#1a0a0a" rx="6" stroke="#2e1a1a" stroke-width="1"/>
  <text x="609" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e05555" text-anchor="middle">✗</text>

  <rect x="682" y="190" width="140" height="52" fill="#0a1a0a" rx="6" stroke="#1a2e1a" stroke-width="1"/>
  <text x="752" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555" text-anchor="middle">높음</text>

  <!-- Row 3: REPEATABLE_READ -->
  <rect x="60" y="250" width="180" height="52" fill="#0d1a2e" rx="6" stroke="#1e2e4a" stroke-width="1"/>
  <text x="80" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">REPEATABLE_</text>
  <text x="80" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">READ</text>

  <rect x="248" y="250" width="140" height="52" fill="#0a1a0a" rx="6" stroke="#1a2e1a" stroke-width="1"/>
  <text x="318" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#55c555" text-anchor="middle">✓</text>

  <rect x="396" y="250" width="140" height="52" fill="#0a1a0a" rx="6" stroke="#1a2e1a" stroke-width="1"/>
  <text x="466" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#55c555" text-anchor="middle">✓</text>

  <rect x="544" y="250" width="130" height="52" fill="#1a0a0a" rx="6" stroke="#2e1a1a" stroke-width="1"/>
  <text x="609" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e05555" text-anchor="middle">✗</text>

  <rect x="682" y="250" width="140" height="52" fill="#1a1000" rx="6" stroke="#2e2000" stroke-width="1"/>
  <text x="752" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8c855" text-anchor="middle">보통</text>

  <!-- Row 4: SERIALIZABLE -->
  <rect x="60" y="310" width="180" height="52" fill="#0d1a2e" rx="6" stroke="#1e2e4a" stroke-width="1"/>
  <text x="80" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">SERIALIZABLE</text>

  <rect x="248" y="310" width="140" height="52" fill="#0a1a0a" rx="6" stroke="#1a2e1a" stroke-width="1"/>
  <text x="318" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#55c555" text-anchor="middle">✓</text>

  <rect x="396" y="310" width="140" height="52" fill="#0a1a0a" rx="6" stroke="#1a2e1a" stroke-width="1"/>
  <text x="466" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#55c555" text-anchor="middle">✓</text>

  <rect x="544" y="310" width="130" height="52" fill="#0a1a0a" rx="6" stroke="#1a2e1a" stroke-width="1"/>
  <text x="609" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#55c555" text-anchor="middle">✓</text>

  <rect x="682" y="310" width="140" height="52" fill="#1a0a0a" rx="6" stroke="#2e1a1a" stroke-width="1"/>
  <text x="752" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e05555" text-anchor="middle">최저</text>

  <!-- Legend row: problem types -->
  <rect x="60" y="390" width="760" height="1" fill="#222"/>

  <text x="60" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">동시성 문제 정의</text>

  <rect x="60" y="430" width="220" height="50" fill="#111" rx="6" stroke="#222" stroke-width="1"/>
  <text x="80" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">Dirty Read</text>
  <text x="80" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">커밋 안 된 데이터를 읽음</text>

  <rect x="296" y="430" width="240" height="50" fill="#111" rx="6" stroke="#222" stroke-width="1"/>
  <text x="316" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8a855">Non-Repeatable Read</text>
  <text x="316" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">같은 행이 두 번 조회 시 달라짐</text>

  <rect x="552" y="430" width="268" height="50" fill="#111" rx="6" stroke="#222" stroke-width="1"/>
  <text x="572" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">Phantom Read</text>
  <text x="572" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">같은 쿼리로 다른 행이 나타남</text>

  <!-- MySQL default note -->
  <text x="60" y="500" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">✦ MySQL InnoDB 기본값: REPEATABLE_READ (MVCC로 Phantom Read도 대부분 방지)</text>
  <text x="60" y="516" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">✦ PostgreSQL 기본값: READ_COMMITTED</text>
</svg>
