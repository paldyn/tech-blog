<svg xmlns="http://www.w3.org/2000/svg" width="880" height="390" viewBox="0 0 880 390" style="background:#0a0a0a;border-radius:12px;">
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" xml:space="preserve">nmcli 핵심 명령어</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" xml:space="preserve">연결 조회·추가·수정·활성화</text>
  <line x1="60" y1="86" x2="820" y2="86" stroke="#3a4a6e" stroke-width="1"/>

  <rect x="60" y="98" width="760" height="270" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">nmcli-cheatsheet.sh</text>
  <line x1="76" y1="128" x2="804" y2="128" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 장치 및 연결 목록</text>
  <text x="76" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3">nmcli</tspan> device status</text>
  <text x="76" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3">nmcli</tspan> connection show</text>
  <text x="76" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 고정 IP 연결 추가</text>
  <text x="76" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3">nmcli</tspan> con add type ethernet \</text>
  <text x="76" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  con-name <tspan fill="#ce9178">"myconn"</tspan> ifname eth0 \</text>
  <text x="76" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  ip4 <tspan fill="#ce9178">192.168.1.10/24</tspan> gw4 <tspan fill="#ce9178">192.168.1.1</tspan></text>
  <text x="76" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 연결 활성화 / 비활성화</text>
  <text x="76" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3">nmcli</tspan> con up <tspan fill="#ce9178">"myconn"</tspan></text>
  <text x="76" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3">nmcli</tspan> con down <tspan fill="#ce9178">"myconn"</tspan></text>
  <text x="76" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># DNS 서버 수정</text>
  <text x="76" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3">nmcli</tspan> con mod <tspan fill="#ce9178">"myconn"</tspan> ipv4.dns <tspan fill="#ce9178">"8.8.8.8"</tspan></text>
</svg>
