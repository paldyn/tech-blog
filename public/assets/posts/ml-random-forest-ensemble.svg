<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400" style="background:#0a0a0a;border-radius:12px">
  <rect x="0" y="0" width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Header -->
  <rect x="0" y="0" width="880" height="72" rx="12" fill="#0d1a2a"/>
  <rect x="0" y="60" width="880" height="12" fill="#0d1a2a"/>
  <text x="60" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#ffffff">랜덤 포레스트: 앙상블 학습의 흐름</text>
  <text x="60" y="62" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">부트스트랩 샘플링 → 개별 트리 → 다수결 → 최종 예측</text>
  <line x1="60" y1="82" x2="820" y2="82" stroke="#1e2433" stroke-width="1"/>

  <!-- Step 1: Original Data -->
  <rect x="60" y="100" width="140" height="64" rx="8" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="130" y="125" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">원본 데이터</text>
  <text x="130" y="145" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">N개 샘플</text>
  <text x="130" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">d개 특성</text>

  <!-- Step 1 label -->
  <text x="130" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">STEP 1</text>

  <!-- Arrow from data to bootstrap -->
  <line x1="200" y1="132" x2="238" y2="132" stroke="#444" stroke-width="2"/>
  <polygon points="234,126 246,132 234,138" fill="#444"/>

  <!-- Step 2: Bootstrap Sampling -->
  <rect x="246" y="100" width="148" height="64" rx="8" fill="#0d1a2a" stroke="#7777cc" stroke-width="2"/>
  <text x="320" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">부트스트랩</text>
  <text x="320" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">샘플링 ×B</text>
  <text x="320" y="153" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">복원 추출, N개씩</text>
  <text x="320" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">STEP 2</text>

  <!-- Arrows from bootstrap to trees (fan out) -->
  <!-- To Tree 1 -->
  <line x1="394" y1="118" x2="448" y2="158" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="442,155 454,161 446,166" fill="#55c555"/>
  <!-- To Tree 2 -->
  <line x1="394" y1="132" x2="448" y2="196" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="442,193 454,199 446,204" fill="#55c555"/>
  <!-- To Tree 3 -->
  <line x1="394" y1="146" x2="448" y2="238" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="442,235 454,241 446,246" fill="#55c555"/>

  <!-- Step 3: Individual Trees label -->
  <text x="530" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">STEP 3: 개별 트리 (랜덤 특성 선택)</text>

  <!-- Tree 1 -->
  <rect x="456" y="148" width="148" height="48" rx="6" fill="#0d1520" stroke="#55c555" stroke-width="1.5"/>
  <text x="530" y="169" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" font-weight="600">트리 1</text>
  <text x="530" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">부트스트랩 샘플₁ + √d 특성</text>

  <!-- Tree 2 -->
  <rect x="456" y="210" width="148" height="48" rx="6" fill="#0d1520" stroke="#55c555" stroke-width="1.5"/>
  <text x="530" y="231" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" font-weight="600">트리 2</text>
  <text x="530" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">부트스트랩 샘플₂ + √d 특성</text>

  <!-- Tree 3 (ellipsis) -->
  <rect x="456" y="272" width="148" height="48" rx="6" fill="#0d1520" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="530" y="293" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" font-weight="600">트리 B</text>
  <text x="530" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">부트스트랩 샘플_B + √d 특성</text>
  <text x="530" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" fill="#444">···</text>

  <!-- Arrows from trees to aggregation -->
  <line x1="604" y1="172" x2="662" y2="222" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="656,218 668,224 660,230" fill="#7ec8e3"/>
  <line x1="604" y1="234" x2="662" y2="238" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="658,232 670,238 658,244" fill="#7ec8e3"/>
  <line x1="604" y1="296" x2="662" y2="258" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="656,252 668,258 660,264" fill="#7ec8e3"/>

  <!-- Step 4: Aggregation -->
  <text x="726" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">STEP 4</text>
  <rect x="670" y="200" width="150" height="72" rx="8" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="745" y="224" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">다수결 투표</text>
  <text x="745" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">분류: 다수결</text>
  <text x="745" y="261" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">회귀: 평균</text>

  <!-- Arrow to final prediction -->
  <line x1="820" y1="236" x2="820" y2="236" stroke="#e8e8e8" stroke-width="1"/>

  <!-- Prediction result -->
  <rect x="670" y="298" width="150" height="48" rx="8" fill="#0d1a2a" stroke="#55c555" stroke-width="2"/>
  <text x="745" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">최종 예측</text>
  <text x="745" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">분산 감소 · 낮은 과적합</text>
  <line x1="745" y1="272" x2="745" y2="296" stroke="#55c555" stroke-width="2"/>
  <polygon points="739,293 751,293 745,300" fill="#55c555"/>

  <!-- Bottom info bar -->
  <rect x="60" y="356" width="760" height="28" rx="6" fill="#111827" stroke="#1e2433"/>
  <text x="80" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" font-weight="600">랜덤 서브스페이스:</text>
  <text x="210" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">각 노드 분기 시 전체 d개 특성 중 √d (또는 log₂d) 개만 무작위로 선택 → 트리 간 상관도 낮춤</text>

  <!-- Footer -->
  <text x="440" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈</text>
</svg>
