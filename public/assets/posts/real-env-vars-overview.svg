<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">환경 변수 공급 체계</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">소스 → 로더 → 런타임 → 코드</text>

  <!-- Sources column -->
  <text x="120" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">소스</text>

  <rect x="50" y="114" width="140" height="40" rx="6" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="120" y="133" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">.env 파일</text>
  <text x="120" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">.env.local, .env.production</text>

  <rect x="50" y="168" width="140" height="40" rx="6" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="120" y="187" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">OS 환경 변수</text>
  <text x="120" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">export, systemd, docker</text>

  <rect x="50" y="222" width="140" height="40" rx="6" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="120" y="241" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">CI/CD Secrets</text>
  <text x="120" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">GitHub Actions, Vercel</text>

  <rect x="50" y="276" width="140" height="40" rx="6" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="120" y="295" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Secret Manager</text>
  <text x="120" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">AWS SSM, Vault</text>

  <!-- arrows sources → loaders -->
  <line x1="190" y1="196" x2="238" y2="196" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Loaders column -->
  <text x="320" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">로더</text>

  <rect x="240" y="140" width="160" height="50" rx="6" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="320" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">dotenv / dotenvx</text>
  <text x="320" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">.env → process.env 주입</text>

  <rect x="240" y="206" width="160" height="50" rx="6" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="320" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">Vite / Next.js 내장</text>
  <text x="320" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">빌드 타임 치환 (import.meta.env)</text>

  <rect x="240" y="272" width="160" height="50" rx="6" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="320" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">Node --env-file</text>
  <text x="320" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">Node 20.6+, 라이브러리 불필요</text>

  <line x1="400" y1="230" x2="448" y2="230" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Runtime column -->
  <text x="560" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">런타임 접근</text>

  <rect x="460" y="140" width="200" height="50" rx="6" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="560" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">process.env (Node.js)</text>
  <text x="560" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">서버 사이드, 런타임 읽기</text>

  <rect x="460" y="206" width="200" height="50" rx="6" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="560" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">import.meta.env (브라우저)</text>
  <text x="560" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">빌드 타임 치환 → 클라이언트 번들</text>

  <rect x="460" y="272" width="200" height="50" rx="6" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="560" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">Deno.env / Bun.env</text>
  <text x="560" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">런타임별 API</text>

  <line x1="660" y1="230" x2="708" y2="230" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Code column -->
  <text x="780" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">코드</text>

  <rect x="720" y="180" width="120" height="100" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="780" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8">설정 모듈</text>
  <text x="780" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8">검증 + 기본값</text>
  <text x="780" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8">타입 변환</text>
  <text x="780" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8">앱 전체 공유</text>

  <!-- Security warning -->
  <rect x="50" y="360" width="780" height="60" rx="8" fill="#2a1515" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="384" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">⚠ 보안 규칙</text>
  <text x="440" y="404" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">.env 파일은 절대 git에 커밋하지 않는다 · VITE_/NEXT_PUBLIC_ 접두사 변수는 번들에 포함 (비밀값 금지)</text>
</svg>
