<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">키보드 내비게이션 패턴</text>

  <!-- 4 key patterns -->
  <rect x="60" y="74" width="360" height="110" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="84" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7ec8e3">Tab / Shift+Tab</text>
  <text x="84" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">포커스 가능한 요소 간 순환 이동</text>
  <text x="84" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">tabIndex="0": 탭 순서에 포함</text>
  <text x="84" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7ec8e3">tabIndex="-1": 탭 제외, JS로만 포커스 가능</text>

  <rect x="460" y="74" width="360" height="110" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="484" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#55c555">Enter / Space</text>
  <text x="484" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">&lt;button&gt;: Enter, Space 모두 클릭 발동</text>
  <text x="484" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">&lt;a href&gt;: Enter 클릭, Space 스크롤</text>
  <text x="484" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555">onKeyDown으로 커스텀 키 핸들링 가능</text>

  <rect x="60" y="202" width="360" height="110" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="84" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7777cc">포커스 트랩 (Focus Trap)</text>
  <text x="84" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">모달 안에서 Tab이 빠져나가지 않도록</text>
  <text x="84" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">마지막 요소에서 Tab → 첫 요소로 순환</text>
  <text x="84" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7777cc">라이브러리: focus-trap-react</text>

  <rect x="460" y="202" width="360" height="110" rx="8" fill="#111827" stroke="#ce9178" stroke-width="1.5"/>
  <text x="484" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#ce9178">방향키 내비게이션</text>
  <text x="484" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">메뉴, 탭, 라디오 그룹 등에서 사용</text>
  <text x="484" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">화살표 키로 항목 간 이동</text>
  <text x="484" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#ce9178">e.key === 'ArrowDown' / 'ArrowUp'</text>

  <!-- Code snippet: skip link -->
  <rect x="60" y="332" width="760" height="52" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="78" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#9aa4b8">// 스킵 네비게이션: 화면 최상단에 추가</text>
  <text x="78" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="13" fill="#e8e8e8">&lt;a href="#main" className="skip-link"&gt;메인 콘텐츠로 건너뛰기&lt;/a&gt;</text>
</svg>
