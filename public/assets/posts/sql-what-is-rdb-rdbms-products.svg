<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">주요 RDBMS 제품군 한눈에 보기</text>

  <!-- Enterprise -->
  <rect x="60" y="75" width="230" height="130" rx="8" fill="#111827" stroke="#2a2a40" stroke-width="1.5"/>
  <rect x="60" y="75" width="230" height="32" rx="8" fill="#1e2d4a"/>
  <rect x="60" y="91" width="230" height="16" fill="#1e2d4a"/>
  <text x="175" y="97" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">엔터프라이즈</text>
  <text x="88" y="128" font-size="14" fill="#e8e8e8">Oracle Database</text>
  <text x="88" y="152" font-size="14" fill="#e8e8e8">SQL Server (MS)</text>
  <text x="88" y="176" font-size="14" fill="#e8e8e8">IBM Db2</text>

  <!-- Open Source -->
  <rect x="325" y="75" width="230" height="130" rx="8" fill="#111827" stroke="#2a2a40" stroke-width="1.5"/>
  <rect x="325" y="75" width="230" height="32" rx="8" fill="#1e3a2a"/>
  <rect x="325" y="91" width="230" height="16" fill="#1e3a2a"/>
  <text x="440" y="97" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">오픈소스</text>
  <text x="353" y="128" font-size="14" fill="#e8e8e8">PostgreSQL</text>
  <text x="353" y="152" font-size="14" fill="#e8e8e8">MySQL / MariaDB</text>
  <text x="353" y="176" font-size="14" fill="#e8e8e8">SQLite</text>

  <!-- Korean/Domestic -->
  <rect x="590" y="75" width="230" height="130" rx="8" fill="#111827" stroke="#2a2a40" stroke-width="1.5"/>
  <rect x="590" y="75" width="230" height="32" rx="8" fill="#2a1e3a"/>
  <rect x="590" y="91" width="230" height="16" fill="#2a1e3a"/>
  <text x="705" y="97" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">국산</text>
  <text x="618" y="128" font-size="14" fill="#e8e8e8">Tibero (TmaxSoft)</text>
  <text x="618" y="152" font-size="14" fill="#e8e8e8">Altibase</text>
  <text x="618" y="176" font-size="14" fill="#e8e8e8">CUBRID</text>

  <!-- Code block: SQL works on all -->
  <rect x="60" y="230" width="760" height="148" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="258" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">-- 표준 SQL은 어떤 RDBMS에서도 동작합니다</text>
  <text x="76" y="276" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">SELECT</text>
  <text x="118" y="276" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve"> c.name, COUNT(o.id) AS order_count</text>
  <text x="76" y="294" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">FROM</text>
  <text x="110" y="294" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">   customers c</text>
  <text x="76" y="312" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">JOIN</text>
  <text x="110" y="312" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">    orders o ON o.customer_id = c.id</text>
  <text x="76" y="330" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">GROUP BY</text>
  <text x="144" y="330" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve"> c.name</text>
  <text x="76" y="348" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">ORDER BY</text>
  <text x="148" y="348" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve"> order_count </text>
  <text x="296" y="348" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">DESC</text>
  <text x="76" y="366" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">LIMIT</text>
  <text x="118" y="366" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#b5cea8" xml:space="preserve">   10</text>

  <text x="440" y="398" text-anchor="middle" font-size="13" fill="#888">표준 SQL은 어느 RDBMS에서나 기본 구문이 동일합니다</text>
</svg>
