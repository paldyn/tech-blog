<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">git grep vs grep</text>
  <text x="60" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">Git이 알고 있는 파일만 대상 — .gitignore 자동 적용</text>

  <!-- Left: system grep -->
  <text x="60" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">system grep (문제)</text>
  <rect x="60" y="124" width="360" height="150" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">
    <tspan x="76" dy="0"><tspan fill="#6a8aa0"># node_modules까지 검색됨</tspan></tspan>
    <tspan x="76" dy="18">grep -r "useState" .</tspan>
    <tspan x="76" dy="18"> </tspan>
    <tspan x="76" dy="18"><tspan fill="#6a8aa0"># 무시하려면 직접 제외</tspan></tspan>
    <tspan x="76" dy="18">grep -r "useState" . \</tspan>
    <tspan x="76" dy="18">  --exclude-dir=node_modules</tspan>
    <tspan x="76" dy="18">  --exclude-dir=.git</tspan>
  </text>

  <!-- Right: git grep -->
  <text x="450" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">git grep (해결)</text>
  <rect x="450" y="124" width="370" height="150" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="466" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">
    <tspan x="466" dy="0"><tspan fill="#6a8aa0"># tracked 파일만, .gitignore 적용</tspan></tspan>
    <tspan x="466" dy="18"><tspan fill="#7ec8e3">git grep</tspan> "useState"</tspan>
    <tspan x="466" dy="18"> </tspan>
    <tspan x="466" dy="18"><tspan fill="#6a8aa0"># 과거 커밋/브랜치 검색</tspan></tspan>
    <tspan x="466" dy="18"><tspan fill="#7ec8e3">git grep</tspan> "useState" HEAD~5</tspan>
    <tspan x="466" dy="18"><tspan fill="#7ec8e3">git grep</tspan> "useState" main</tspan>
    <tspan x="466" dy="18"><tspan fill="#7ec8e3">git grep</tspan> "useState" v1.0.0</tspan>
  </text>

  <!-- Arrows comparing -->
  <text x="420" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" fill="#888" text-anchor="middle">vs</text>

  <!-- Output example -->
  <text x="60" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">출력 예시</text>
  <rect x="60" y="310" width="760" height="100" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">
    <tspan x="76" dy="0"><tspan fill="#55c555">src/components/Auth.js</tspan>:<tspan fill="#7777cc">12</tspan>:  const [user, setUser] = <tspan fill="#7ec8e3">useState</tspan>(null)</tspan>
    <tspan x="76" dy="18"><tspan fill="#55c555">src/components/Profile.js</tspan>:<tspan fill="#7777cc">8</tspan>:   const [data, setData] = <tspan fill="#7ec8e3">useState</tspan>({})</tspan>
    <tspan x="76" dy="18"><tspan fill="#55c555">src/hooks/useAuth.js</tspan>:<tspan fill="#7777cc">3</tspan>:    const [loading, setLoading] = <tspan fill="#7ec8e3">useState</tspan>(false)</tspan>
    <tspan x="76" dy="18">  <tspan fill="#888">파일명:줄번호:매칭 내용</tspan></tspan>
  </text>

  <!-- Feature tag -->
  <rect x="60" y="428" width="220" height="24" rx="6" fill="#0d1117" stroke="#7ec8e3" stroke-width="1"/>
  <text x="170" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">Git 히스토리 검색 가능</text>

  <rect x="294" y="428" width="220" height="24" rx="6" fill="#0d1117" stroke="#55c555" stroke-width="1"/>
  <text x="404" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">.gitignore 자동 적용</text>

  <rect x="528" y="428" width="220" height="24" rx="6" fill="#0d1117" stroke="#7777cc" stroke-width="1"/>
  <text x="638" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">병렬 처리로 빠름</text>
</svg>
