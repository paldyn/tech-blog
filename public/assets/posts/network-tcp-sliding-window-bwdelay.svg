<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Bandwidth-Delay Product: 파이프를 채워라</text>

  <!-- Pipe visualization -->
  <text x="60" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">예시: 1 Gbps 링크, RTT = 100ms</text>

  <!-- Pipe -->
  <rect x="60" y="96" width="760" height="60" rx="6" fill="#0a1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">BDP = 1 Gbps × 0.1 s = 100 Mbits = 12.5 MB</text>
  <text x="440" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">링크를 가득 채우려면 윈도우 크기 ≥ 12.5 MB 필요</text>

  <!-- Comparison table -->
  <rect x="60" y="176" width="200" height="60" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="1.5"/>
  <text x="160" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">기본 윈도우 (65KB)</text>
  <text x="160" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">65535 / 12,500,000</text>
  <text x="160" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">= 0.5% 활용</text>

  <rect x="340" y="176" width="200" height="60" rx="6" fill="#1a1a0a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="440" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ce9178">Window Scale (4MB)</text>
  <text x="440" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">4,194,304 / 12,500,000</text>
  <text x="440" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">= 33.5% 활용</text>

  <rect x="620" y="176" width="200" height="60" rx="6" fill="#0a2a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">Window Scale (16MB)</text>
  <text x="720" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">16,777,216 / 12,500,000</text>
  <text x="720" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">≥ 100% (가득 참)</text>

  <!-- Formula -->
  <rect x="60" y="258" width="760" height="88" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 최적 윈도우 크기 계산</text>
  <text x="76" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">BDP = bandwidth_bps × rtt_sec</text>
  <text x="76" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">optimal_window = BDP / <text fill="#b5cea8">8</text>  <text fill="#9aa4b8"># bits to bytes</text></text>
  <text x="76" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 예: 1Gbps, 100ms → 12.5 MB</text>
</svg>
