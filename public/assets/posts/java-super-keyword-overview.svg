<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8a040"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">super 키워드 — 3가지 사용법</text>

  <!-- ===== LEFT: Parent class box ===== -->
  <rect x="60" y="80" width="340" height="54" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="230" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">부모 클래스 (Animal)</text>
  <text x="230" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Animal(String name) · sound()</text>

  <!-- ===== RIGHT: Child class box ===== -->
  <rect x="480" y="80" width="340" height="54" rx="8" fill="#1a2e1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">자식 클래스 (Dog)</text>
  <text x="650" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Dog(String name) · sound()</text>

  <!-- arrow parent to child -->
  <line x1="400" y1="107" x2="474" y2="107" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="437" y="99" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">extends</text>

  <!-- ===== Usage 1: super() constructor ===== -->
  <text x="60" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8a040">① super() — 부모 생성자 호출</text>

  <rect x="60" y="196" width="360" height="118" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// Dog.java</text>
  <text x="76" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">public</tspan> Dog(String name, String breed) {</text>
  <text x="76" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3" font-weight="600">super</tspan>(name);  <tspan fill="#9aa4b8">// ① 반드시 첫 줄</tspan></text>
  <text x="76" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3" font-weight="600">this</tspan>.breed = breed;</text>
  <text x="76" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">}</text>
  <text x="76" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// super()는 생성자 첫 번째 문장</text>

  <!-- ===== Usage 2: super.method() ===== -->
  <text x="460" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">② super.method() — 부모 메서드 호출</text>

  <rect x="460" y="196" width="360" height="118" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// Dog.java (오버라이딩 후 확장)</text>
  <text x="476" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">@Override</text>
  <text x="476" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">public void</tspan> sound() {</text>
  <text x="476" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3" font-weight="600">super</tspan>.sound(); <tspan fill="#9aa4b8">// 부모 실행</tspan></text>
  <text x="476" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    System.out.println(<tspan fill="#ce9178">"멍멍!"</tspan>);</text>
  <text x="476" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">}</text>

  <!-- ===== Usage 3: super.field ===== -->
  <text x="60" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">③ super.field — 부모 필드 접근</text>

  <rect x="60" y="366" width="360" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="388" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 필드 숨김(hiding) 상황</text>
  <text x="76" y="406" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">void</tspan> printType() {</text>
  <text x="76" y="424" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    System.out.println(<tspan fill="#7ec8e3" font-weight="600">super</tspan>.type);</text>
  <text x="76" y="442" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    System.out.println(<tspan fill="#7ec8e3" font-weight="600">this</tspan>.type);</text>
  <text x="76" y="460" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">}</text>

  <!-- ===== Rules box ===== -->
  <rect x="460" y="350" width="360" height="148" rx="8" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
  <text x="640" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">핵심 규칙</text>
  <text x="476" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8a040">• super()는 생성자 첫 번째 문장이어야 함</text>
  <text x="476" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">• this()와 super() 동시 호출 불가</text>
  <text x="476" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">• super.method()는 어디서나 가능</text>
  <text x="476" y="464" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">• 정적 컨텍스트에서 super 사용 불가</text>
  <text x="476" y="486" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">• 두 단계 이상(super.super) 접근 불가</text>

  <!-- bottom info -->
  <text x="440" y="524" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">super는 부모 클래스에 대한 참조 — 상속 계층에서 부모의 구현에 직접 접근하는 유일한 방법</text>
</svg>
