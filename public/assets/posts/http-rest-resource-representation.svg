<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="440" rx="12" fill="#0a0a0a"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">자원(Resource) vs 표현(Representation)</text>
  <text x="60" y="76" font-size="13" fill="#888">하나의 자원은 URI로 식별되고, Accept 헤더로 협상된 여러 표현으로 전달된다</text>

  <!-- Resource (left) -->
  <rect x="60" y="170" width="260" height="100" rx="8" fill="#101418" stroke="#55c555" stroke-width="1.5"/>
  <text x="84" y="200" font-size="13" fill="#888">자원 식별자 (URI)</text>
  <text x="84" y="228" font-size="17" font-weight="600" fill="#e8e8e8">/users/42</text>
  <text x="84" y="252" font-size="12" fill="#9aa4b8">개념적 대상: "42번 사용자"</text>

  <!-- Representations (right) -->
  <rect x="560" y="116" width="260" height="60" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="584" y="140" font-size="15" font-weight="600" fill="#ffffff">JSON 표현</text>
  <text x="584" y="160" font-size="12" fill="#9aa4b8">Accept: application/json</text>

  <rect x="560" y="190" width="260" height="60" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="584" y="214" font-size="15" font-weight="600" fill="#ffffff">XML 표현</text>
  <text x="584" y="234" font-size="12" fill="#9aa4b8">Accept: application/xml</text>

  <rect x="560" y="264" width="260" height="60" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="584" y="288" font-size="15" font-weight="600" fill="#ffffff">HTML 표현</text>
  <text x="584" y="308" font-size="12" fill="#9aa4b8">Accept: text/html</text>

  <!-- Arrows from resource to representations -->
  <path d="M 320 210 L 440 146 L 560 146" fill="none" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 320 220 L 560 220" fill="none" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <path d="M 320 230 L 440 294 L 560 294" fill="none" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <text x="372" y="180" font-size="13" fill="#7ec8e3">콘텐츠 협상</text>

  <!-- Note -->
  <rect x="60" y="370" width="760" height="44" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="84" y="397" font-size="13" fill="#e8e8e8">자원은 시간에 따라 값이 바뀌어도 동일한 자원. 표현은 그 자원의 한 시점·한 형식의 스냅샷일 뿐이다.</text>
</svg>
