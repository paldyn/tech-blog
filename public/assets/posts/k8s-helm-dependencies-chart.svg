<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Helm 의존성 구조 — Chart.yaml &amp; Chart.lock</text>

  <!-- Main Chart box -->
  <rect x="60" y="80" width="220" height="60" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">my-app (부모 차트)</text>
  <text x="170" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Chart.yaml + templates/</text>

  <!-- arrows to sub-charts -->
  <line x1="280" y1="110" x2="350" y2="110" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>
  <line x1="280" y1="110" x2="350" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>
  <line x1="280" y1="110" x2="350" y2="290" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>

  <!-- Sub chart 1: postgresql -->
  <rect x="350" y="80" width="180" height="60" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">postgresql</text>
  <text x="440" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">version: 13.2.0</text>

  <!-- Sub chart 2: redis -->
  <rect x="350" y="170" width="180" height="60" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">redis</text>
  <text x="440" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">version: 18.0.0</text>

  <!-- Sub chart 3: nginx-ingress -->
  <rect x="350" y="260" width="180" height="60" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">nginx-ingress</text>
  <text x="440" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">version: 4.9.0</text>

  <!-- Code block: Chart.yaml -->
  <rect x="60" y="170" width="255" height="185" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="193" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">Chart.yaml</text>
  <text x="76" y="213" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">dependencies:</text>
  <text x="76" y="231" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">  - name: postgresql</text>
  <text x="76" y="249" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    version: "13.2.0"</text>
  <text x="76" y="267" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    repository: "oci://..."</text>
  <text x="76" y="285" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">  - name: redis</text>
  <text x="76" y="303" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    version: "18.x.x"</text>
  <text x="76" y="321" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    alias: cache</text>
  <text x="76" y="339" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">    # 별칭으로 두 번 포함 가능</text>

  <!-- charts/ directory -->
  <rect x="570" y="80" width="240" height="270" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="690" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">charts/ 디렉토리</text>
  <text x="690" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">helm dependency update 실행 후</text>

  <rect x="590" y="140" width="200" height="40" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="690" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" text-anchor="middle">postgresql-13.2.0.tgz</text>

  <rect x="590" y="190" width="200" height="40" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="690" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" text-anchor="middle">redis-18.1.3.tgz</text>

  <rect x="590" y="240" width="200" height="40" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="690" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" text-anchor="middle">nginx-ingress-4.9.0.tgz</text>

  <!-- Chart.lock box -->
  <rect x="590" y="292" width="200" height="48" rx="6" fill="#2a1a00" stroke="#e05555" stroke-width="1.5"/>
  <text x="690" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">Chart.lock</text>
  <text x="690" y="333" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">정확한 버전 고정 (VCS 커밋)</text>

  <!-- arrow: sub charts to charts/ -->
  <line x1="530" y1="200" x2="568" y2="200" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="549" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">다운로드</text>

  <!-- bottom: workflow steps -->
  <rect x="60" y="380" width="760" height="110" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">의존성 관리 명령어</text>

  <rect x="80" y="416" width="160" height="60" rx="6" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="160" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3" font-weight="600" text-anchor="middle">helm dependency</text>
  <text x="160" y="458" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3" font-weight="600" text-anchor="middle">update</text>
  <text x="160" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">최신 버전 다운로드</text>

  <rect x="260" y="416" width="160" height="60" rx="6" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="340" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3" font-weight="600" text-anchor="middle">helm dependency</text>
  <text x="340" y="458" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3" font-weight="600" text-anchor="middle">build</text>
  <text x="340" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">lock 파일로 재현</text>

  <rect x="440" y="416" width="160" height="60" rx="6" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="520" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3" font-weight="600" text-anchor="middle">helm dependency</text>
  <text x="520" y="458" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3" font-weight="600" text-anchor="middle">list</text>
  <text x="520" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">현재 의존성 목록</text>

  <rect x="620" y="416" width="180" height="60" rx="6" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="710" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3" font-weight="600" text-anchor="middle">helm install</text>
  <text x="710" y="458" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555" font-weight="600" text-anchor="middle">--dependency-update</text>
  <text x="710" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">설치 전 자동 업데이트</text>
</svg>
