<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">OpenAI 코딩 AI 진화</text>
  <text x="440" y="72" text-anchor="middle" font-size="13" fill="#888">Codex → ChatGPT → GPT-4o → o-series</text>

  <defs>
    <marker id="evoarr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Timeline boxes -->
  <!-- 2021: Codex -->
  <rect x="40" y="104" width="155" height="110" rx="8" fill="#111" stroke="#555" stroke-width="1.5"/>
  <text x="118" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#888">2021.08</text>
  <text x="118" y="150" text-anchor="middle" font-size="15" font-weight="700" fill="#e8e8e8">Codex</text>
  <text x="118" y="172" text-anchor="middle" font-size="12" fill="#888">GPT-3 파인튜닝</text>
  <text x="118" y="190" text-anchor="middle" font-size="12" fill="#888">GitHub 코드 학습</text>
  <text x="118" y="208" text-anchor="middle" font-size="12" fill="#555">Copilot 초기 기반</text>

  <line x1="195" y1="159" x2="224" y2="159" stroke="#7ec8e3" stroke-width="2" marker-end="url(#evoarr)"/>

  <!-- 2022: ChatGPT -->
  <rect x="224" y="104" width="155" height="110" rx="8" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="302" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#55c555">2022.11</text>
  <text x="302" y="150" text-anchor="middle" font-size="15" font-weight="700" fill="#e8e8e8">ChatGPT</text>
  <text x="302" y="172" text-anchor="middle" font-size="12" fill="#888">GPT-3.5 + RLHF</text>
  <text x="302" y="190" text-anchor="middle" font-size="12" fill="#888">대화형 코딩 조수</text>
  <text x="302" y="208" text-anchor="middle" font-size="12" fill="#55c555">AI 코딩 대중화</text>

  <line x1="379" y1="159" x2="408" y2="159" stroke="#7ec8e3" stroke-width="2" marker-end="url(#evoarr)"/>

  <!-- 2023: GPT-4 -->
  <rect x="408" y="104" width="155" height="110" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="486" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#7ec8e3">2023.03</text>
  <text x="486" y="150" text-anchor="middle" font-size="15" font-weight="700" fill="#e8e8e8">GPT-4</text>
  <text x="486" y="172" text-anchor="middle" font-size="12" fill="#888">멀티모달 + 코드</text>
  <text x="486" y="190" text-anchor="middle" font-size="12" fill="#888">Code Interpreter</text>
  <text x="486" y="208" text-anchor="middle" font-size="12" fill="#7ec8e3">데이터 분석 혁신</text>

  <line x1="563" y1="159" x2="592" y2="159" stroke="#7ec8e3" stroke-width="2" marker-end="url(#evoarr)"/>

  <!-- 2024+: GPT-4o + o-series -->
  <rect x="592" y="104" width="248" height="110" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="716" y="128" text-anchor="middle" font-size="13" font-weight="700" fill="#7777cc">2024–2025</text>
  <text x="716" y="150" text-anchor="middle" font-size="15" font-weight="700" fill="#e8e8e8">GPT-4o + o-series</text>
  <text x="716" y="172" text-anchor="middle" font-size="12" fill="#888">o1/o3/o4-mini: 추론 강화</text>
  <text x="716" y="190" text-anchor="middle" font-size="12" fill="#888">Codex CLI 에이전트</text>
  <text x="716" y="208" text-anchor="middle" font-size="12" fill="#7777cc">자율 코딩 에이전트</text>

  <!-- ChatGPT code features -->
  <text x="40" y="256" font-size="14" font-weight="600" fill="#e8e8e8">ChatGPT 코딩 활용 패턴</text>

  <rect x="40" y="272" width="185" height="72" rx="6" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="132" y="294" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">Canvas 모드</text>
  <text x="132" y="314" text-anchor="middle" font-size="12" fill="#888">실시간 코드 편집</text>
  <text x="132" y="332" text-anchor="middle" font-size="12" fill="#888">인라인 주석·수정</text>

  <rect x="241" y="272" width="185" height="72" rx="6" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="333" y="294" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">Code Interpreter</text>
  <text x="333" y="314" text-anchor="middle" font-size="12" fill="#888">Python 실행 환경</text>
  <text x="333" y="332" text-anchor="middle" font-size="12" fill="#888">데이터 분석·시각화</text>

  <rect x="442" y="272" width="185" height="72" rx="6" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="534" y="294" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">GPT-4o API</text>
  <text x="534" y="314" text-anchor="middle" font-size="12" fill="#888">코드 생성·분석</text>
  <text x="534" y="332" text-anchor="middle" font-size="12" fill="#888">Tool Calling 통합</text>

  <rect x="643" y="272" width="197" height="72" rx="6" fill="#111" stroke="#e05555" stroke-width="1"/>
  <text x="741" y="294" text-anchor="middle" font-size="13" font-weight="600" fill="#e05555">Codex CLI</text>
  <text x="741" y="314" text-anchor="middle" font-size="12" fill="#888">터미널 에이전트</text>
  <text x="741" y="332" text-anchor="middle" font-size="12" fill="#888">멀티파일 수정</text>

  <!-- Benchmark row -->
  <rect x="40" y="370" width="800" height="36" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="386" text-anchor="middle" font-size="12" font-weight="600" fill="#e8e8e8">HumanEval 벤치마크: Codex 28.8% → GPT-3.5 48.1% → GPT-4 67.0% → o4-mini 92%+</text>
  <text x="440" y="400" text-anchor="middle" font-size="12" fill="#555">코딩 능력이 4년 만에 인간 상위 수준으로 도달</text>
</svg>
