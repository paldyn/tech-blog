<svg xmlns="http://www.w3.org/2000/svg" width="880" height="290" viewBox="0 0 880 290">
  <rect width="880" height="290" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">runtime_checkable의 가능과 한계</text>

  <!-- can -->
  <rect x="60" y="80" width="360" height="170" rx="8" fill="#111418" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="110" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="15.5" font-weight="600" fill="#55c555" text-anchor="middle">isinstance로 검사 가능</text>
  <text x="84" y="142" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12.5" fill="#cccccc">@runtime_checkable Protocol에</text>
  <text x="84" y="162" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12.5" fill="#cccccc">대해 isinstance(obj, P) 가</text>
  <text x="84" y="182" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12.5" fill="#cccccc">동작한다.</text>
  <text x="84" y="214" font-family="'JetBrains Mono','Menlo',monospace" font-size="12.5" fill="#b5cea8">isinstance(f, Closable)</text>
  <text x="84" y="236" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12.5" fill="#aaaaaa">→ 메서드 "존재" 여부만 확인</text>

  <!-- cannot -->
  <rect x="460" y="80" width="360" height="170" rx="8" fill="#111418" stroke="#e05555" stroke-width="1.5"/>
  <text x="640" y="110" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="15.5" font-weight="600" fill="#e05555" text-anchor="middle">검사하지 못하는 것</text>
  <text x="484" y="142" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12.5" fill="#cccccc">· 메서드 시그니처·인자 타입</text>
  <text x="484" y="162" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12.5" fill="#cccccc">· 속성의 실제 값 타입</text>
  <text x="484" y="182" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12.5" fill="#cccccc">· 제네릭 파라미터(list[int] 등)</text>
  <text x="484" y="214" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12.5" fill="#cccccc">이름만 같고 시그니처가 달라도</text>
  <text x="484" y="236" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12.5" fill="#cccccc">True 가 나올 수 있다.</text>
</svg>
