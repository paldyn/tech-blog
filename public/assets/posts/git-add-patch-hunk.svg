<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">git add -p: 헝크 단위 스테이징</text>

  <!-- Left: Diff output with hunk -->
  <rect x="60" y="68" width="430" height="320" rx="8" fill="#070b14" stroke="#1e2433" stroke-width="1.5"/>
  <text x="80" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">파일에 두 가지 변경이 섞인 경우</text>

  <!-- Hunk 1 -->
  <rect x="80" y="106" width="390" height="82" rx="4" fill="#0a0a1a" stroke="#2a2a5a" stroke-width="1"/>
  <text x="92" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">@@ -1,6 +1,7 @@</text>
  <text x="92" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> function login(user) {</text>
  <text x="92" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">+  validateInput(user);</text>
  <text x="92" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">   return auth.login(user);</text>

  <text x="80" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">헝크 1: 입력 검증 추가 (feat)</text>

  <!-- Hunk 2 -->
  <rect x="80" y="218" width="390" height="100" rx="4" fill="#0a0a1a" stroke="#2a2a5a" stroke-width="1"/>
  <text x="92" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">@@ -20,6 +21,7 @@</text>
  <text x="92" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> function logout(user) {</text>
  <text x="92" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">-  console.log(user);  // debug</text>
  <text x="92" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">   clearSession();</text>
  <text x="92" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> }</text>

  <text x="80" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">헝크 2: 디버그 로그 제거 (chore)</text>

  <text x="80" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ git add -p로 헝크1만 선택해 feat 커밋,</text>
  <text x="80" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">  헝크2는 별도 chore 커밋으로 분리 가능</text>

  <!-- Right: Prompt options -->
  <rect x="510" y="68" width="310" height="320" rx="8" fill="#070b14" stroke="#1e2433" stroke-width="1.5"/>
  <text x="530" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">프롬프트 옵션</text>
  <text x="530" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#555">Stage this hunk? [y,n,q,a,d,/,e,?]</text>

  <text x="530" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">y</text>
  <text x="550" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8"> 이 헝크 스테이징</text>

  <text x="530" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">n</text>
  <text x="550" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8"> 이 헝크 건너뜀</text>

  <text x="530" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">s</text>
  <text x="550" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8"> 헝크 더 작게 분할</text>

  <text x="530" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">e</text>
  <text x="550" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8"> 편집기로 수동 편집</text>

  <text x="530" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">a</text>
  <text x="550" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8"> 파일의 나머지 모두 스테이징</text>

  <text x="530" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">d</text>
  <text x="550" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8"> 나머지 모두 건너뜀</text>

  <text x="530" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">q</text>
  <text x="550" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8"> 종료</text>

  <text x="530" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">?</text>
  <text x="550" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8"> 도움말 출력</text>

  <rect x="530" y="316" width="270" height="52" rx="4" fill="#0a1a08"/>
  <text x="542" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">s 옵션: 헝크가 충분히 작으면</text>
  <text x="542" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">분할 안 된다고 표시됨. e로 수동 편집.</text>
</svg>
