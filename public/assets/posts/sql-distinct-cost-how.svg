<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">DISTINCT 동작 원리와 비용</text>

  <!-- Input rows (before distinct) -->
  <text x="80" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" xml:space="preserve">SELECT dept FROM employees (중복 포함)</text>

  <rect x="60" y="94" width="140" height="170" rx="6" fill="#0d1117" stroke="#1e2433"/>
  <text x="130" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">dept</text>
  <line x1="76" y1="120" x2="184" y2="120" stroke="#1e2433"/>
  <text x="130" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">HR</text>
  <text x="130" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" text-anchor="middle" xml:space="preserve">HR</text>
  <text x="130" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">IT</text>
  <text x="130" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">Sales</text>
  <text x="130" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" text-anchor="middle" xml:space="preserve">IT</text>
  <text x="130" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" text-anchor="middle" xml:space="preserve">HR</text>
  <text x="130" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">Sales</text>

  <!-- Arrow: sort/hash -->
  <line x1="200" y1="179" x2="250" y2="179" stroke="#444" stroke-width="2"/>
  <polygon points="250,174 262,179 250,184" fill="#444"/>
  <text x="226" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle" xml:space="preserve">정렬 or</text>
  <text x="226" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle" xml:space="preserve">해시</text>

  <!-- DISTINCT processing -->
  <rect x="262" y="94" width="240" height="170" rx="6" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="382" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">DISTINCT 처리 (정렬 후 중복 제거)</text>
  <line x1="278" y1="120" x2="486" y2="120" stroke="#1e2433"/>
  <text x="382" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">HR ← 1개 유지</text>
  <text x="382" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" text-anchor="middle" xml:space="preserve">HR ← 중복 제거</text>
  <text x="382" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" text-anchor="middle" xml:space="preserve">HR ← 중복 제거</text>
  <text x="382" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">IT ← 1개 유지</text>
  <text x="382" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" text-anchor="middle" xml:space="preserve">IT ← 중복 제거</text>
  <text x="382" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">Sales ← 1개 유지</text>
  <text x="382" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" text-anchor="middle" xml:space="preserve">Sales ← 중복 제거</text>

  <!-- Arrow -->
  <line x1="502" y1="179" x2="552" y2="179" stroke="#55c555" stroke-width="2"/>
  <polygon points="552,174 564,179 552,184" fill="#55c555"/>

  <!-- Output rows (after distinct) -->
  <rect x="564" y="94" width="140" height="120" rx="6" fill="#071a07" stroke="#55c555" stroke-width="1.5"/>
  <text x="634" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle" xml:space="preserve">dept</text>
  <line x1="580" y1="120" x2="688" y2="120" stroke="#1e3a1e"/>
  <text x="634" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle" xml:space="preserve">HR</text>
  <text x="634" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle" xml:space="preserve">IT</text>
  <text x="634" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle" xml:space="preserve">Sales</text>
  <text x="634" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">3행 반환</text>

  <!-- Cost annotation -->
  <rect x="60" y="284" width="760" height="120" rx="6" fill="#1a1a0a" stroke="#e8a800" stroke-width="1"/>
  <text x="440" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8a800" text-anchor="middle" xml:space="preserve">DISTINCT의 비용</text>
  <text x="76" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" xml:space="preserve">1. 전체 결과를 정렬하거나 해시 테이블을 만들어야 한다 → 메모리 / 임시 파일</text>
  <text x="76" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" xml:space="preserve">2. LIMIT와 함께 써도 최종 결과가 확정되기 전까지 전체 SELECT를 완료해야 한다</text>
  <text x="76" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" xml:space="preserve">3. 카디널리티(유니크 값 수)가 높을수록 비용 증가</text>
  <text x="76" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" xml:space="preserve">→ 대안: GROUP BY, EXISTS, 집계 쿼리 재구성, 애플리케이션 레벨 중복 제거</text>

  <!-- Footer -->
  <text x="440" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle" xml:space="preserve">PALDYN — SQL 완전 정복</text>
</svg>
