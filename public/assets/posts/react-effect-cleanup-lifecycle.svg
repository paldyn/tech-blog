<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e08020"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-gray" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">cleanup 함수 실행 시점</text>

  <!-- Phase labels -->
  <text x="160" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">① 마운트</text>
  <text x="440" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">② 의존성 변경 시</text>
  <text x="720" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">③ 언마운트</text>

  <!-- Phase 1: Mount — Effect box -->
  <rect x="60" y="106" width="200" height="54" rx="8" fill="#0d2e0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="129" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Effect 실행</text>
  <text x="160" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">마운트 직후 한 번</text>

  <!-- Arrow phase1 to phase2 -->
  <line x1="263" y1="133" x2="337" y2="133" stroke="#555" stroke-width="1.5" marker-end="url(#arr-gray)"/>

  <!-- Phase 2: Cleanup box -->
  <rect x="340" y="106" width="200" height="54" rx="8" fill="#2e1a00" stroke="#e08020" stroke-width="1.5"/>
  <text x="440" y="129" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e08020" text-anchor="middle">Cleanup 실행</text>
  <text x="440" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">이전 Effect 정리</text>

  <!-- Arrow down: cleanup to effect re-run -->
  <line x1="440" y1="162" x2="440" y2="196" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Phase 2: Effect re-run box -->
  <rect x="340" y="200" width="200" height="54" rx="8" fill="#0d2e0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="223" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Effect 재실행</text>
  <text x="440" y="243" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">새 의존성으로</text>

  <!-- Arrow phase2 to phase3 (from cleanup level) -->
  <line x1="543" y1="133" x2="617" y2="133" stroke="#555" stroke-width="1.5" marker-end="url(#arr-gray)"/>

  <!-- Phase 3: Final Cleanup box -->
  <rect x="620" y="106" width="200" height="54" rx="8" fill="#2e0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="720" y="129" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">최종 Cleanup</text>
  <text x="720" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">언마운트 전 정리</text>

  <!-- Summary box -->
  <rect x="60" y="302" width="760" height="96" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="80" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">핵심 규칙</text>
  <text x="80" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">• Cleanup은 항상 다음 Effect 실행 직전에 먼저 실행된다</text>
  <text x="80" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">• Cleanup &#x2192; Effect 순서는 React가 보장한다</text>
  <text x="80" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">• Strict Mode: 마운트 시 Effect를 두 번 실행해 cleanup 동작 검증</text>
</svg>
