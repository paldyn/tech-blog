<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arrh" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrhg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Hekaton In-Memory OLTP — 아키텍처 개요</text>

  <!-- Memory (top) -->
  <rect x="60" y="68" width="760" height="60" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="93" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">메모리 (Memory-Optimized Tables)</text>
  <text x="440" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">모든 데이터 행이 메모리에 상주 · 락 없는 MVCC · 해시/범위 인덱스</text>

  <!-- Three components -->
  <!-- Native SP -->
  <rect x="60" y="160" width="220" height="100" rx="8" fill="#111122" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">네이티브 컴파일</text>
  <text x="170" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">저장 프로시저</text>
  <text x="170" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">T-SQL → C → DLL</text>
  <text x="170" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">SQL 파서 우회</text>

  <!-- MVCC -->
  <rect x="330" y="160" width="220" height="100" rx="8" fill="#111122" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">낙관적 동시성</text>
  <text x="440" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">락 없는 MVCC</text>
  <text x="440" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">충돌 시 재시도</text>
  <text x="440" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">래치 없는 인덱스</text>

  <!-- Durability -->
  <rect x="600" y="160" width="220" height="100" rx="8" fill="#111122" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="710" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">내구성 옵션</text>
  <text x="710" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">SCHEMA_AND_DATA</text>
  <text x="710" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">SCHEMA_ONLY</text>
  <text x="710" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">체크포인트 파일</text>

  <!-- Arrows from memory to components -->
  <line x1="200" y1="128" x2="170" y2="160" stroke="#7ec8e3" stroke-width="2"
        marker-end="url(#arrh)"/>
  <line x1="440" y1="128" x2="440" y2="160" stroke="#7ec8e3" stroke-width="2"
        marker-end="url(#arrh)"/>
  <line x1="680" y1="128" x2="710" y2="160" stroke="#7ec8e3" stroke-width="2"
        marker-end="url(#arrh)"/>

  <!-- Disk (bottom) -->
  <rect x="60" y="300" width="760" height="60" rx="8" fill="#111111" stroke="#444" stroke-width="1"/>
  <text x="440" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888" text-anchor="middle">디스크 (Checkpoint Files)</text>
  <text x="440" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">데이터 파일 + 델타 파일 쌍 · 재시작 시 메모리로 복원 (복구 시간 고려 필요)</text>

  <!-- Arrow from components to disk -->
  <line x1="440" y1="260" x2="440" y2="300" stroke="#555" stroke-width="2" stroke-dasharray="4,4"
        marker-end="url(#arrh)"/>
  <text x="460" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">영속화</text>

  <!-- Performance comparison -->
  <rect x="60" y="390" width="760" height="84" rx="8" fill="#0f1a0f" stroke="#2a4a2a" stroke-width="1"/>
  <text x="440" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">In-Memory OLTP 성능 특성</text>
  <text x="220" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">단건 트랜잭션: 디스크 대비 10~30배</text>
  <text x="220" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">세션당 메모리 = 데이터 크기</text>
  <text x="660" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">네이티브 SP: 추가 5~10배 가속</text>
  <text x="660" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">서버 재시작 시 메모리 복원 시간 주의</text>
  <line x1="430" y1="420" x2="430" y2="468" stroke="#2a4a2a" stroke-width="1"/>
</svg>
