<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">packed-refs 파일 포맷</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">여러 ref를 하나의 파일에 압축 저장</text>

  <!-- File content -->
  <rect x="60" y="94" width="760" height="220" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">.git/packed-refs</text>
  <text x="76" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">  # pack-refs with: peeled fully-peeled sorted</text>
  <text x="76" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#b5cea8">  abc123def456789abcdef1234567890abcdef12  </tspan><tspan fill="#7ec8e3">refs/heads/main</tspan></text>
  <text x="76" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#b5cea8">  fff000aaa111222333444555666777888999bbb  </tspan><tspan fill="#7ec8e3">refs/heads/feature/login</tspan></text>
  <text x="76" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#b5cea8">  ttt999fff888777666555444333222111000aaa  </tspan><tspan fill="#55c555">refs/tags/v1.0.0</tspan></text>
  <text x="76" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ce9178">  ^abc123def456789abcdef1234567890abcdef12</tspan><tspan fill="#888">  ← peeled: tag가 가리키는 commit</tspan></text>
  <text x="76" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#b5cea8">  eee777ddd666ccc555bbb444aaa333fff222111  </tspan><tspan fill="#7777cc">refs/remotes/origin/main</tspan></text>
  <text x="76" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#b5cea8">  ddd555ccc444bbb333aaa222fff111eee000999  </tspan><tspan fill="#7777cc">refs/remotes/origin/feature</tspan></text>
  <text x="76" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">  {SHA 40자}  {refname}  ← 한 줄이 하나의 ref</text>

  <!-- Explanation boxes -->
  <!-- Loose vs packed priority -->
  <rect x="60" y="330" width="360" height="110" fill="#0d1a0d" rx="8" stroke="#55c555" stroke-width="1"/>
  <text x="240" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Loose ref 우선 조회</text>
  <text x="240" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">refs/heads/main 파일이 있으면</text>
  <text x="240" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">packed-refs보다 loose ref를 우선 사용</text>
  <text x="240" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">삭제 시: loose 파일 제거 후</text>
  <text x="240" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">packed-refs에서도 해당 줄 제거</text>

  <!-- peeled notation -->
  <rect x="460" y="330" width="360" height="110" fill="#0d0d1a" rx="8" stroke="#7777cc" stroke-width="1"/>
  <text x="640" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">^ (peeled ref)</text>
  <text x="640" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">annotated tag 다음 줄에 ^로 시작</text>
  <text x="640" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">tag 오브젝트가 가리키는 commit SHA</text>
  <text x="640" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">git rev-parse v1.0.0^{} 와 동일 값</text>
  <text x="640" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">lightweight tag는 ^ 줄 없음</text>
</svg>
