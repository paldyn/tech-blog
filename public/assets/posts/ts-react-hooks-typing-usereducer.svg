<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="360" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">useReducer — State와 판별 유니온 Action</text>
  <text x="60" y="78" font-size="13" fill="#888">Action을 판별 유니온으로 두면 reducer 안에서 자동 좁혀진다</text>

  <defs>
    <marker id="arrH" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- State box -->
  <rect x="60" y="120" width="200" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="160" y="150" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">State</text>
  <text x="160" y="186" font-size="13" fill="#ffffff" text-anchor="middle">{ count: number }</text>
  <text x="160" y="214" font-size="13" fill="#9aa4b8" text-anchor="middle">현재 상태</text>

  <!-- reducer box -->
  <rect x="340" y="110" width="200" height="140" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="140" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">reducer</text>
  <text x="440" y="172" font-size="13" fill="#ffffff" text-anchor="middle">(state, action)</text>
  <text x="440" y="194" font-size="13" fill="#ffffff" text-anchor="middle">=&gt; State</text>
  <text x="440" y="226" font-size="13" fill="#9aa4b8" text-anchor="middle">switch(action.type)</text>

  <!-- Action box -->
  <rect x="620" y="120" width="200" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="720" y="150" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">Action</text>
  <text x="720" y="182" font-size="13" fill="#ffffff" text-anchor="middle">판별 유니온</text>
  <text x="720" y="210" font-size="13" fill="#9aa4b8" text-anchor="middle">type 필드로 구분</text>

  <!-- arrows -->
  <line x1="260" y1="180" x2="338" y2="180" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrH)"/>
  <line x1="620" y1="180" x2="542" y2="180" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrH)"/>

  <text x="300" y="166" font-size="12" fill="#888" text-anchor="middle">입력</text>
  <text x="580" y="166" font-size="12" fill="#888" text-anchor="middle">dispatch</text>

  <text x="60" y="300" font-size="13" fill="#ffffff">reducer의 매개변수 타입만 달면, dispatch(action)의 인자도 자동 검증되고</text>
  <text x="60" y="322" font-size="13" fill="#ffffff">switch 분기마다 action의 payload가 해당 type으로 좁혀진다.</text>
</svg>
