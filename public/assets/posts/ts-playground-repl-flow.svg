<svg width="880" height="400" viewBox="0 0 880 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Playground로 TypeScript 학습하는 법</text>
  <defs>
    <marker id="arr-loop" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>
  <!-- Cycle: 3 large circles connected -->
  <!-- Circle 1: Write -->
  <circle cx="180" cy="200" r="90" fill="none" stroke="#3178c6" stroke-width="2"/>
  <text x="180" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#3178c6">① 작성</text>
  <text x="180" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">타입 주석 추가해</text>
  <text x="180" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">코드 작성</text>
  <!-- Arrow 1->2 -->
  <line x1="270" y1="175" x2="350" y2="175" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-loop)"/>
  <!-- Circle 2: Check -->
  <circle cx="440" cy="200" r="90" fill="none" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7777cc">② 확인</text>
  <text x="440" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">오류 메시지</text>
  <text x="440" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">읽고 이해</text>
  <!-- Arrow 2->3 -->
  <line x1="530" y1="175" x2="610" y2="175" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-loop)"/>
  <!-- Circle 3: Explore -->
  <circle cx="700" cy="200" r="90" fill="none" stroke="#55c555" stroke-width="2"/>
  <text x="700" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555">③ 탐구</text>
  <text x="700" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">JS 출력 탭과</text>
  <text x="700" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">비교 분석</text>
  <!-- Curved back arrow: 3 -> 1 -->
  <path d="M 700 290 C 700 360, 180 360, 180 290" fill="none" stroke="#7777cc" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-loop)"/>
  <text x="440" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">수정 후 반복</text>
  <!-- Tips at top -->
  <rect x="60" y="65" width="760" height="30" rx="6" fill="#0d0d1a" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">Ctrl+Space: 자동완성  |  마우스 호버: 타입 표시  |  Ctrl+Shift+P: 팔레트</text>
</svg>
