<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430">
  <rect width="880" height="430" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">ReadableStream 구조</text>
  <text x="440" y="70" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#888">Source → 내부 큐 → Reader 3-layer pipeline</text>

  <!-- ═══ Box 1: Source ═══ -->
  <rect x="50" y="100" width="175" height="230" rx="8" fill="#0d1117" stroke="#1e2433" stroke-width="1.5"/>
  <rect x="50" y="100" width="175" height="36" rx="8" fill="#1a1f35"/>
  <rect x="50" y="122" width="175" height="14" fill="#1a1f35"/>
  <text x="137" y="122" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="700" fill="#7ec8e3">Source</text>
  <text x="137" y="149" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">UnderlyingSource</text>
  <text x="70" y="178"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8">start(controller)</text>
  <text x="70" y="200"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8">pull(controller)</text>
  <text x="70" y="222"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8">cancel(reason)</text>
  <text x="137" y="308" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">데이터 공급</text>

  <!-- Arrow 1: Source → ReadableStream -->
  <rect x="225" y="217" width="52" height="6" fill="#7777cc"/>
  <polygon points="277,208 295,220 277,232" fill="#7777cc"/>
  <text x="251" y="202" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">enqueue()</text>

  <!-- ═══ Box 2: ReadableStream ═══ -->
  <rect x="295" y="90" width="250" height="260" rx="8" fill="#0d1117" stroke="#1e2433" stroke-width="1.5"/>
  <rect x="295" y="90" width="250" height="36" rx="8" fill="#1a1f35"/>
  <rect x="295" y="112" width="250" height="14" fill="#1a1f35"/>
  <text x="420" y="112" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="700" fill="#e8e8e8">ReadableStream</text>
  <text x="420" y="140" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">내부 큐 (Internal Queue)</text>

  <!-- Chunks in queue -->
  <rect x="310" y="155" width="62" height="28" rx="4" fill="#1a2b1a" stroke="#55c555" stroke-width="1"/>
  <text x="341" y="174" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">chunk0</text>
  <rect x="380" y="155" width="62" height="28" rx="4" fill="#1a2b1a" stroke="#55c555" stroke-width="1"/>
  <text x="411" y="174" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">chunk1</text>
  <rect x="450" y="155" width="62" height="28" rx="4" fill="#1a2b1a" stroke="#55c555" stroke-width="1"/>
  <text x="481" y="174" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">chunk2</text>

  <!-- Stream properties -->
  <text x="315" y="210"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">highWaterMark: <tspan fill="#b5cea8">1</tspan></text>
  <text x="315" y="228"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">desiredSize: <tspan fill="#b5cea8">0</tspan></text>
  <text x="315" y="246"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">locked: <tspan fill="#7ec8e3">false</tspan></text>

  <!-- Controller box inside Stream -->
  <rect x="310" y="260" width="220" height="72" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
  <text x="420" y="278" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">ReadableStreamDefaultController</text>
  <text x="320" y="298"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#7ec8e3">enqueue()</text>
  <text x="400" y="298"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e05555">close()</text>
  <text x="456" y="298"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e05555">error()</text>
  <text x="320" y="318"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">desiredSize → backpressure 신호</text>

  <!-- Arrow 2: ReadableStream → Reader -->
  <rect x="545" y="217" width="52" height="6" fill="#7777cc"/>
  <polygon points="597,208 615,220 597,232" fill="#7777cc"/>
  <text x="571" y="202" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">read()</text>

  <!-- ═══ Box 3: Reader ═══ -->
  <rect x="615" y="100" width="215" height="230" rx="8" fill="#0d1117" stroke="#1e2433" stroke-width="1.5"/>
  <rect x="615" y="100" width="215" height="36" rx="8" fill="#1a1f35"/>
  <rect x="615" y="122" width="215" height="14" fill="#1a1f35"/>
  <text x="722" y="122" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="700" fill="#7ec8e3">Reader</text>
  <text x="722" y="149" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">ReadableStreamDefaultReader</text>
  <text x="635" y="178"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8">read()</text>
  <text x="635" y="196"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">→ Promise&lt;{value, done}&gt;</text>
  <text x="635" y="218"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8">cancel(reason)</text>
  <text x="635" y="240"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8">closed</text>
  <text x="635" y="258"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">→ Promise&lt;void&gt;</text>
  <text x="635" y="280"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8">releaseLock()</text>
  <text x="722" y="308" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">데이터 소비</text>

  <!-- Backpressure arrow (dashed, left-pointing) -->
  <line x1="420" y1="372" x2="230" y2="372" stroke="#e05555" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="230,365 214,372 230,379" fill="#e05555"/>
  <text x="317" y="392" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e05555">backpressure — desiredSize ≤ 0 시 pull 억제</text>
</svg>
