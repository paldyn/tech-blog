  <rect x="600" y="358" width="240" height="70" rx="8" fill="#1a1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="720" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
