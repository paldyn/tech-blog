<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">마스터 정리 적용 예시</text>

  <!-- header row -->
  <text x="60"  y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">점화식</text>
  <text x="280" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">a, b, c=log_b(a)</text>
  <text x="480" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">케이스</text>
  <text x="600" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">결과</text>
  <text x="730" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">알고리즘</text>
  <line x1="60" y1="90" x2="820" y2="90" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Row 1: Merge Sort -->
  <rect x="60"  y="100" width="204" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76"  y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">2T(n/2) + n</text>
  <text x="76"  y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8" xml:space="preserve">f(n) = n</text>

  <text x="280" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">a=2, b=2</text>
  <text x="280" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">c = log₂2 = 1</text>

  <rect x="472" y="104" width="90" height="32" rx="6" fill="#0d1a0d" stroke="#3a7a3a" stroke-width="1"/>
  <text x="517" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Case 2</text>

  <text x="600" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" font-weight="600">Θ(n log n)</text>
  <text x="600" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">k=0이므로 log¹n</text>
  <text x="730" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">병합 정렬</text>

  <line x1="60" y1="154" x2="820" y2="154" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Row 2: Binary Search -->
  <rect x="60"  y="164" width="204" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76"  y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">T(n/2) + 1</text>
  <text x="76"  y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8" xml:space="preserve">f(n) = 1</text>

  <text x="280" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">a=1, b=2</text>
  <text x="280" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">c = log₂1 = 0</text>

  <rect x="472" y="168" width="90" height="32" rx="6" fill="#0d1a0d" stroke="#3a7a3a" stroke-width="1"/>
  <text x="517" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Case 2</text>

  <text x="600" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" font-weight="600">Θ(log n)</text>
  <text x="600" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">n^0=1, log^1n</text>
  <text x="730" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">이진 탐색</text>

  <line x1="60" y1="218" x2="820" y2="218" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Row 3: Strassen -->
  <rect x="60"  y="228" width="204" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76"  y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">7T(n/2) + n²</text>
  <text x="76"  y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8" xml:space="preserve">f(n) = n²</text>

  <text x="280" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">a=7, b=2</text>
  <text x="280" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">c = log₂7 ≈ 2.81</text>

  <rect x="472" y="232" width="90" height="32" rx="6" fill="#0d0d1f" stroke="#4a4a9a" stroke-width="1"/>
  <text x="517" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Case 1</text>

  <text x="600" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" font-weight="600">Θ(n^2.81)</text>
  <text x="600" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">n²&lt;n^2.81</text>
  <text x="730" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Strassen 행렬</text>

  <line x1="60" y1="282" x2="820" y2="282" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Row 4: Naive matrix -->
  <rect x="60"  y="292" width="204" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76"  y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">8T(n/2) + n²</text>
  <text x="76"  y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8" xml:space="preserve">f(n) = n²</text>

  <text x="280" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">a=8, b=2</text>
  <text x="280" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">c = log₂8 = 3</text>

  <rect x="472" y="296" width="90" height="32" rx="6" fill="#0d0d1f" stroke="#4a4a9a" stroke-width="1"/>
  <text x="517" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Case 1</text>

  <text x="600" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" font-weight="600">Θ(n³)</text>
  <text x="600" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">n²&lt;n³</text>
  <text x="730" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">일반 행렬 곱</text>

  <line x1="60" y1="346" x2="820" y2="346" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Row 5: Quick sort avg -->
  <rect x="60"  y="356" width="204" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76"  y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">2T(n/2) + n</text>
  <text x="76"  y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8" xml:space="preserve">균등 분할 가정</text>

  <text x="280" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">a=2, b=2</text>
  <text x="280" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">c = 1</text>

  <rect x="472" y="360" width="90" height="32" rx="6" fill="#0d1a0d" stroke="#3a7a3a" stroke-width="1"/>
  <text x="517" y="380" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Case 2</text>

  <text x="600" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" font-weight="600">Θ(n log n)</text>
  <text x="600" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">평균 케이스</text>
  <text x="730" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">퀵 정렬(평균)</text>

  <!-- note -->
  <line x1="60" y1="418" x2="820" y2="418" stroke="#2a2a2a" stroke-width="1"/>
  <text x="60" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Case 결정 핵심: n^c 와 f(n)의 차수 비교 — ε &gt; 0 차이가 나야 Case 1/3 적용 가능</text>
  <text x="60" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Case 2 (k=0)가 가장 흔함: f(n) = Θ(n^c) 이면 T(n) = Θ(n^c · log n)</text>
</svg>
