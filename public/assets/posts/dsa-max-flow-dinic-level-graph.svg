<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-gray" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#444"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Dinic 알고리즘 — 레벨 그래프 (BFS 분류)</text>

  <!-- Level labels -->
  <text x="100" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Level 0</text>
  <text x="260" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Level 1</text>
  <text x="440" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Level 2</text>
  <text x="620" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Level 3</text>
  <text x="780" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Level 4</text>

  <!-- Level dividers -->
  <line x1="180" y1="75" x2="180" y2="460" stroke="#222" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="350" y1="75" x2="350" y2="460" stroke="#222" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="530" y1="75" x2="530" y2="460" stroke="#222" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="700" y1="75" x2="700" y2="460" stroke="#222" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Nodes -->
  <!-- s (level 0) -->
  <circle cx="100" cy="260" r="28" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="100" y="265" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">s</text>

  <!-- A (level 1) -->
  <circle cx="260" cy="180" r="28" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="260" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">A</text>

  <!-- B (level 1) -->
  <circle cx="260" cy="340" r="28" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="260" y="345" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">B</text>

  <!-- C (level 2) -->
  <circle cx="440" cy="180" r="28" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">C</text>

  <!-- D (level 2) -->
  <circle cx="440" cy="340" r="28" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="345" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">D</text>

  <!-- E (level 3) -->
  <circle cx="620" cy="260" r="28" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="620" y="265" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">E</text>

  <!-- t (level 4) -->
  <circle cx="780" cy="260" r="28" fill="#1a1a2e" stroke="#55c555" stroke-width="2"/>
  <text x="780" y="265" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555">t</text>

  <!-- Valid level edges (blue) -->
  <!-- s -> A -->
  <line x1="128" y1="246" x2="230" y2="193" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="178" y="207" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">10</text>

  <!-- s -> B -->
  <line x1="128" y1="274" x2="230" y2="327" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="178" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">8</text>

  <!-- A -> C -->
  <line x1="288" y1="180" x2="410" y2="180" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="349" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">6</text>

  <!-- A -> D -->
  <line x1="282" y1="200" x2="418" y2="320" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="355" y="265" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">4</text>

  <!-- B -> D -->
  <line x1="288" y1="340" x2="410" y2="340" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="349" y="332" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">7</text>

  <!-- C -> E -->
  <line x1="468" y1="200" x2="592" y2="246" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="534" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">5</text>

  <!-- D -> E -->
  <line x1="468" y1="320" x2="592" y2="274" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="534" y="311" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">9</text>

  <!-- E -> t -->
  <line x1="648" y1="260" x2="750" y2="260" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="699" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">12</text>

  <!-- Cross-level edge (gray, invalid) A -> B skip level -->
  <!-- Actually cross edges go same level, let's show B->C as a cross-level skip -->
  <path d="M 260 312 Q 310 250 410 180" stroke="#444" stroke-width="1.5" stroke-dasharray="4,4"
        fill="none" marker-end="url(#arr-gray)"/>
  <text x="315" y="237" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">skip</text>

  <!-- Legend -->
  <rect x="60" y="418" width="760" height="56" fill="#111" rx="8" stroke="#222" stroke-width="1"/>
  <line x1="90" y1="446" x2="130" y2="446" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="140" y="451" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">유효 간선 (level[v] = level[u]+1)</text>
  <line x1="390" y1="446" x2="430" y2="446" stroke="#444" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-gray)"/>
  <text x="440" y="451" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">레벨 건너뜀 — 블로킹 플로우에서 제외</text>
</svg>
