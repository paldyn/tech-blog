  <!-- Recurrence explanation -->
  <rect x="60" y="295" width="760" height="96" fill="#111" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">점화식</text>
  <text x="80" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">dp[i][w] = dp[i-1][w]</text>
  <text x="380" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">if w[i] &gt; w  (물품 i를 넣을 수 없음)</text>
  <text x="80" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">dp[i][w] = max(dp[i-1][w],  dp[i-1][w-w[i]] + v[i])</text>
  <text x="500" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">if w[i] ≤ w  (넣거나 말거나)</text>
  <text x="80" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">기저: dp[0][*] = 0 (물품 없음),  dp[*][0] = 0 (가방 용량 0)</text>

  <!-- Code box -->
  <rect x="60" y="400" width="760" height="96" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">def knapsack(W, weights, values, n):</text>
  <text x="76" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    dp = [[0]*(W+1) for _ in range(n+1)]</text>
  <text x="76" y="456" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">    for i in range(1, n+1):</text>
  <text x="76" y="474" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">        for w in range(W+1):</text>
  <text x="76" y="492" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">            dp[i][w]=max(dp[i-1][w],dp[i-1][w-weights[i-1]]+values[i-1] if weights[i-1]&lt;=w else 0)</text>
</svg>
