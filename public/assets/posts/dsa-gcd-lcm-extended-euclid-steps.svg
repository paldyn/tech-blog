<svg width="880" height="460" viewBox="0 0 880 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrB" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">유클리드 호제법: gcd(48, 18) 계산 과정</text>

  <g font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <rect x="60" y="100" width="420" height="48" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="76" y="129" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">gcd(48, 18)</tspan><tspan fill="#ffffff">   48 mod 18 = </tspan><tspan fill="#b5cea8">12</tspan></text>

    <rect x="60" y="180" width="420" height="48" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="76" y="209" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">gcd(18, 12)</tspan><tspan fill="#ffffff">   18 mod 12 = </tspan><tspan fill="#b5cea8">6</tspan></text>

    <rect x="60" y="260" width="420" height="48" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="76" y="289" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">gcd(12, 6)</tspan><tspan fill="#ffffff">    12 mod 6  = </tspan><tspan fill="#b5cea8">0</tspan></text>

    <rect x="60" y="340" width="420" height="48" rx="6" fill="#000000" stroke="#55c555" stroke-width="1.5"/>
    <text x="76" y="369" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">gcd(6, 0)</tspan><tspan fill="#ffffff"> = </tspan><tspan fill="#55c555" font-weight="600">6</tspan><tspan fill="#9aa4b8">  # b가 0이면 a가 답</tspan></text>
  </g>

  <!-- arrows between steps -->
  <line x1="270" y1="148" x2="270" y2="178" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrB)"/>
  <line x1="270" y1="228" x2="270" y2="258" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrB)"/>
  <line x1="270" y1="308" x2="270" y2="338" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrB)"/>

  <!-- annotation box -->
  <rect x="540" y="130" width="280" height="180" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">
    <text x="556" y="164" fill="#7ec8e3" font-weight="600">gcd(a, b) = gcd(b, a mod b)</text>
    <text x="556" y="194" fill="#ffffff">나머지는 절반 이하로 줄어듦</text>
    <text x="556" y="222" fill="#ffffff">→ O(log min(a, b)) 단계</text>
    <text x="556" y="256" fill="#ffffff">lcm(48, 18) = 48·18 ÷ 6</text>
    <text x="556" y="284" fill="#ffffff">= <tspan fill="#55c555" font-weight="600">144</tspan></text>
  </g>

  <text x="60" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">두 수가 피보나치 이웃일 때 단계 수가 최대 — 이것이 최악 케이스 (라메의 정리)</text>
</svg>
