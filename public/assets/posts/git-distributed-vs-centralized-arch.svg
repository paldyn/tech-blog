<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 20 7, 0 14" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
    <marker id="arr2" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 20 7, 0 14" fill="#55c555" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
    <marker id="arrR" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 20 7, 0 14" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
    <marker id="arrL" markerWidth="20" markerHeight="14" refX="0" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="20 0, 0 7, 20 14" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">중앙집중식 vs 분산형 버전 관리</text>

  <!-- LEFT: CVCS -->
  <rect x="40" y="68" width="370" height="400" rx="10" fill="#111" stroke="#2a2020"/>
  <text x="225" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e05555">중앙집중식 (CVCS)</text>
  <text x="225" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">SVN, CVS, Perforce</text>

  <!-- Central Server -->
  <rect x="130" y="128" width="190" height="52" rx="8" fill="#1a0d0d" stroke="#4a1a1a"/>
  <text x="225" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">중앙 서버</text>
  <text x="225" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">전체 이력 저장</text>

  <!-- Client boxes -->
  <rect x="68" y="240" width="110" height="44" rx="6" fill="#141414" stroke="#2a2a2a"/>
  <text x="123" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">개발자 A</text>
  <text x="123" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">최신본만</text>

  <rect x="195" y="240" width="110" height="44" rx="6" fill="#141414" stroke="#2a2a2a"/>
  <text x="250" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">개발자 B</text>
  <text x="250" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">최신본만</text>

  <rect x="320" y="240" width="68" height="44" rx="6" fill="#141414" stroke="#2a2a2a"/>
  <text x="354" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">개발자 C</text>
  <text x="354" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">최신본만</text>

  <!-- Arrows server to clients -->
  <line x1="192" y1="180" x2="145" y2="238" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="225" y1="180" x2="250" y2="238" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="252" y1="180" x2="354" y2="238" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Problems -->
  <rect x="68" y="312" width="320" height="130" rx="6" fill="#150d0d" stroke="#3a1e1e"/>
  <text x="84" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">단점</text>
  <text x="84" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#cc7777">✗ 서버 장애 시 전체 작업 중단</text>
  <text x="84" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#cc7777">✗ 오프라인에서 커밋 불가</text>
  <text x="84" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#cc7777">✗ 서버 데이터 손실 = 전체 이력 소실</text>
  <text x="84" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#cc7777">✗ 브랜치 생성·병합이 느리고 무거움</text>

  <!-- RIGHT: DVCS -->
  <rect x="470" y="68" width="370" height="400" rx="10" fill="#111" stroke="#1a2a1a"/>
  <text x="655" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555">분산형 (DVCS)</text>
  <text x="655" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Git, Mercurial</text>

  <!-- Remote Server (optional) -->
  <rect x="563" y="128" width="184" height="52" rx="8" fill="#0d1a0d" stroke="#1e4a1e"/>
  <text x="655" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">원격 저장소</text>
  <text x="655" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">선택적 동기화</text>

  <!-- Dev boxes with full history -->
  <rect x="492" y="228" width="118" height="58" rx="6" fill="#0d150d" stroke="#1e3a1e"/>
  <text x="551" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">개발자 A</text>
  <text x="551" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">전체 이력 보유</text>
  <text x="551" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">로컬 커밋 가능</text>

  <rect x="630" y="228" width="118" height="58" rx="6" fill="#0d150d" stroke="#1e3a1e"/>
  <text x="689" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">개발자 B</text>
  <text x="689" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">전체 이력 보유</text>
  <text x="689" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">로컬 커밋 가능</text>

  <!-- Peer arrows -->
  <line x1="610" y1="258" x2="628" y2="258" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr2)"/>

  <!-- Server arrows -->
  <line x1="610" y1="180" x2="570" y2="226" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="688" y1="180" x2="712" y2="226" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Benefits -->
  <rect x="492" y="308" width="326" height="134" rx="6" fill="#0d150d" stroke="#1e3a1e"/>
  <text x="508" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">장점</text>
  <text x="508" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#77cc77">✓ 오프라인에서도 전체 기능 사용</text>
  <text x="508" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#77cc77">✓ 서버 없이 로컬에서 커밋·브랜치</text>
  <text x="508" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#77cc77">✓ 모든 사본이 완전한 백업</text>
  <text x="508" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#77cc77">✓ 브랜치·병합이 빠르고 가벼움</text>
</svg>
