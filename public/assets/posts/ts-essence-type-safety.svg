<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">타입 안전성: 오류를 언제 발견하는가</text>

  <!-- Left: JavaScript path -->
  <text x="220" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#f6c90e" text-anchor="middle">JavaScript (동적 타입)</text>

  <!-- JS Code block -->
  <rect x="60" y="96" width="320" height="112" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">function greet(user) {</text>
  <text x="76" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  return user.name.toUpperCase();</text>
  <text x="76" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">}</text>
  <text x="76" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">greet(null); </text>
  <text x="76" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 문제 없어 보임...</text>

  <!-- Arrow down to runtime error -->
  <line x1="220" y1="208" x2="220" y2="244" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>

  <rect x="80" y="246" width="280" height="56" rx="6" fill="#2a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="220" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">런타임 오류</text>
  <text x="220" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">TypeError: Cannot read property 'name'</text>

  <!-- Arrow to production -->
  <line x1="220" y1="302" x2="220" y2="336" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-red)"/>
  <rect x="100" y="338" width="240" height="44" rx="6" fill="#2a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="220" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">사용자가 오류 경험</text>
  <text x="220" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">발견 비용: 높음</text>

  <!-- Divider -->
  <line x1="440" y1="70" x2="440" y2="430" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Right: TypeScript path -->
  <text x="660" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">TypeScript (정적 타입)</text>

  <!-- TS Code block -->
  <rect x="500" y="96" width="320" height="128" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="516" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">interface User {</text>
  <text x="516" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  name: </text>
  <text x="596" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">string</text>
  <text x="638" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">;</text>
  <text x="516" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">}</text>
  <text x="516" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">function </text>
  <text x="586" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">greet(user: User) {</text>
  <text x="516" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  return user.name.toUpperCase();</text>
  <text x="516" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">}</text>

  <!-- Arrow down to compile error -->
  <line x1="660" y1="224" x2="660" y2="260" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <rect x="520" y="262" width="280" height="56" rx="6" fill="#0a2a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="660" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">컴파일 타임 오류</text>
  <text x="660" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">greet(null) — null은 User 타입이 아님</text>

  <rect x="540" y="338" width="240" height="44" rx="6" fill="#0a2a0a" stroke="#55c555" stroke-width="1"/>
  <text x="660" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">코딩 중 에디터에서 발견</text>
  <text x="660" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">발견 비용: 낮음</text>

  <!-- Bottom summary -->
  <rect x="60" y="406" width="760" height="38" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="440" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa" text-anchor="middle">오류 발견이 빠를수록 수정 비용은 기하급수적으로 줄어든다 — 이것이 TypeScript의 핵심 가치다</text>
</svg>
