<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr-white" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="38" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">switchMap vs mergeMap vs concatMap</text>

  <!-- ===== CODE BOX (right) ===== -->
  <rect x="600" y="58" width="240" height="370" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>

  <text xml:space="preserve" x="616" y="80"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">// 검색 자동완성</text>
  <text xml:space="preserve" x="616" y="98"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">input$.pipe(</text>
  <text xml:space="preserve" x="616" y="116"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">  debounceTime(300),</text>
  <text xml:space="preserve" x="616" y="134"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">  distinctUntilChanged(),</text>
  <text xml:space="preserve" x="616" y="152"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">  switchMap(q =&gt;</text>
  <text xml:space="preserve" x="616" y="170"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">    searchApi(q)</text>
  <text xml:space="preserve" x="616" y="188"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">  )</text>
  <text xml:space="preserve" x="616" y="206"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">).subscribe(</text>
  <text xml:space="preserve" x="616" y="224"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">  results =&gt;</text>
  <text xml:space="preserve" x="616" y="242"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">    setResults(results)</text>
  <text xml:space="preserve" x="616" y="260"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">)</text>
  <text xml:space="preserve" x="616" y="290"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">// 파일 업로드 순서 보장</text>
  <text xml:space="preserve" x="616" y="308"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">files$.pipe(</text>
  <text xml:space="preserve" x="616" y="326"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">  concatMap(f =&gt;</text>
  <text xml:space="preserve" x="616" y="344"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">    upload(f)</text>
  <text xml:space="preserve" x="616" y="362"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">  )</text>
  <text xml:space="preserve" x="616" y="380"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">)</text>

  <!-- ===== ROW 1: switchMap ===== -->
  <!-- Header -->
  <text x="68" y="72"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">switchMap — 이전 inner 취소</text>
  <text x="68" y="88"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">검색 자동완성, 최신 요청만 유효</text>

  <!-- Source timeline row 1 -->
  <line x1="68" y1="108" x2="560" y2="108" stroke="#555" stroke-width="1.5" marker-end="url(#arr-white)"/>
  <text x="68" y="103" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">source</text>

  <!-- Source marbles: A at 130, B at 250, C at 380 -->
  <circle cx="130" cy="108" r="14" fill="#1a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="130" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">A</text>

  <circle cx="250" cy="108" r="14" fill="#1a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="250" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">B</text>

  <circle cx="390" cy="108" r="14" fill="#1a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="390" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">C</text>

  <!-- Result timeline row 1 -->
  <line x1="68" y1="148" x2="560" y2="148" stroke="#555" stroke-width="1.5" marker-end="url(#arr-white)"/>
  <text x="68" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">result</text>

  <!-- A starts → cancelled at B arrival (x mark at 240) -->
  <line x1="130" y1="122" x2="130" y2="134" stroke="#e05555" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- A's partial bar -->
  <line x1="130" y1="148" x2="240" y2="148" stroke="#e05555" stroke-width="3" opacity="0.4"/>
  <!-- Cancel X at 240 -->
  <line x1="234" y1="142" x2="246" y2="154" stroke="#e05555" stroke-width="2"/>
  <line x1="246" y1="142" x2="234" y2="154" stroke="#e05555" stroke-width="2"/>

  <!-- B starts → cancelled at C arrival -->
  <line x1="250" y1="122" x2="250" y2="134" stroke="#e05555" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="250" y1="148" x2="376" y2="148" stroke="#e05555" stroke-width="3" opacity="0.4"/>
  <line x1="370" y1="142" x2="382" y2="154" stroke="#e05555" stroke-width="2"/>
  <line x1="382" y1="142" x2="370" y2="154" stroke="#e05555" stroke-width="2"/>

  <!-- C completes -->
  <line x1="390" y1="122" x2="390" y2="134" stroke="#e05555" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="500" cy="148" r="14" fill="#1a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="500" y="153" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">C</text>
  <line x1="540" y1="134" x2="540" y2="162" stroke="#888" stroke-width="2"/>

  <!-- ===== ROW 2: mergeMap ===== -->
  <text x="68" y="190"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">mergeMap — 병렬 실행</text>
  <text x="68" y="206"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">HTTP 요청 병렬 처리, 도착 순서 비보장</text>

  <!-- Source timeline row 2 -->
  <line x1="68" y1="224" x2="560" y2="224" stroke="#555" stroke-width="1.5" marker-end="url(#arr-white)"/>
  <text x="68" y="219" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">source</text>

  <circle cx="130" cy="224" r="14" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="130" y="229" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">A</text>

  <circle cx="250" cy="224" r="14" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="250" y="229" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">B</text>

  <!-- Result timeline row 2 -->
  <line x1="68" y1="264" x2="560" y2="264" stroke="#555" stroke-width="1.5" marker-end="url(#arr-white)"/>
  <text x="68" y="259" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">result</text>

  <!-- Both A and B run in parallel, results interleaved -->
  <line x1="130" y1="238" x2="130" y2="250" stroke="#55c555" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="250" y1="238" x2="250" y2="250" stroke="#55c555" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- B's result arrives first (faster) -->
  <circle cx="350" cy="264" r="14" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="350" y="269" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">B</text>

  <!-- A's result arrives second -->
  <circle cx="460" cy="264" r="14" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="460" y="269" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">A</text>

  <!-- "순서 뒤바뀜" note -->
  <text x="405" y="290" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">도착 순서 비보장</text>

  <!-- ===== ROW 3: concatMap ===== -->
  <text x="68" y="318"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">concatMap — 순서 보장</text>
  <text x="68" y="334"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">파일 업로드, 순차 API 호출 보장</text>

  <!-- Source timeline row 3 -->
  <line x1="68" y1="352" x2="560" y2="352" stroke="#555" stroke-width="1.5" marker-end="url(#arr-white)"/>
  <text x="68" y="347" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">source</text>

  <circle cx="130" cy="352" r="14" fill="#0a101a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="130" y="357" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">A</text>

  <!-- B arrives fast but must wait -->
  <circle cx="190" cy="352" r="14" fill="#0a101a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="190" y="357" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">B</text>

  <!-- Result timeline row 3 -->
  <line x1="68" y1="400" x2="560" y2="400" stroke="#555" stroke-width="1.5" marker-end="url(#arr-white)"/>
  <text x="68" y="395" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">result</text>

  <!-- A processes first -->
  <line x1="130" y1="366" x2="130" y2="386" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="310" cy="400" r="14" fill="#0a101a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="310" y="405" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">A</text>

  <!-- B waits, shown with dotted wait line -->
  <line x1="190" y1="366" x2="310" y2="388" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4" opacity="0.5"/>
  <text x="250" y="381" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">대기</text>

  <!-- B processes after A -->
  <circle cx="460" cy="400" r="14" fill="#0a101a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="460" y="405" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">B</text>
  <line x1="330" y1="400" x2="440" y2="400" stroke="#7ec8e3" stroke-width="2" opacity="0.3"/>

  <!-- complete marker -->
  <line x1="484" y1="386" x2="484" y2="414" stroke="#888" stroke-width="2"/>
</svg>
