<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">ICE · STUN · TURN 구조</text>
  <text x="440" y="70" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#888">NAT 통과 전략 우선순위</text>

  <!-- Peer A (left) -->
  <rect x="50" y="100" width="130" height="200" rx="8" fill="#0d1117" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="115" y="122" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="700" fill="#7777cc">Peer A</text>
  <text x="115" y="142" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">NAT 내부</text>
  <text x="115" y="162" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">192.168.1.10</text>
  <text x="115" y="190" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7ec8e3">ICE 후보 수집:</text>
  <text x="115" y="208" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="10" fill="#888">host</text>
  <text x="115" y="224" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="10" fill="#888">srflx (STUN)</text>
  <text x="115" y="240" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="10" fill="#888">relay (TURN)</text>
  <text x="115" y="278" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555">우선순위 높음</text>
  <text x="115" y="294" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="10" fill="#888">host → srflx → relay</text>

  <!-- STUN Server (top center) -->
  <rect x="300" y="100" width="180" height="100" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="390" y="126" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="700" fill="#7ec8e3">STUN Server</text>
  <text x="390" y="148" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">공인 IP 반영 반환</text>
  <text x="390" y="166" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">stun.l.google.com:19302</text>
  <text x="390" y="184" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7ec8e3">무료 · 낮은 부하</text>

  <!-- TURN Server (bottom center) -->
  <rect x="300" y="240" width="180" height="110" rx="8" fill="#0d1117" stroke="#e05555" stroke-width="1.5"/>
  <text x="390" y="265" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="700" fill="#e05555">TURN Server</text>
  <text x="390" y="287" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">트래픽 릴레이</text>
  <text x="390" y="307" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">NAT/방화벽 완전 우회</text>
  <text x="390" y="327" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e05555">높은 대역폭 비용</text>
  <text x="390" y="342" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="10" fill="#888">coturn · Twilio / ~10% 사용</text>

  <!-- Peer B (right) -->
  <rect x="700" y="100" width="130" height="200" rx="8" fill="#0d1117" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="765" y="122" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="700" fill="#7777cc">Peer B</text>
  <text x="765" y="142" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">NAT 내부</text>
  <text x="765" y="162" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">10.0.0.5</text>
  <text x="765" y="190" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7ec8e3">ICE 후보 수집:</text>
  <text x="765" y="208" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="10" fill="#888">host</text>
  <text x="765" y="224" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="10" fill="#888">srflx (STUN)</text>
  <text x="765" y="240" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="10" fill="#888">relay (TURN)</text>
  <text x="765" y="278" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555">최적 후보 쌍 선택</text>
  <text x="765" y="294" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="10" fill="#888">ICE Connectivity Check</text>

  <!-- Arrow: A → STUN -->
  <line x1="180" y1="148" x2="300" y2="148" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="300,141 318,148 300,155" fill="#7ec8e3"/>
  <text x="240" y="136" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="10" fill="#7ec8e3">Binding Request</text>

  <!-- Arrow: STUN → A -->
  <line x1="300" y1="162" x2="180" y2="162" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="180,155 162,162 180,169" fill="#7ec8e3"/>
  <text x="240" y="178" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="10" fill="#7ec8e3">203.0.113.5:54321</text>

  <!-- Arrow: B → STUN -->
  <line x1="700" y1="148" x2="580" y2="148" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="580,141 562,148 580,155" fill="#7ec8e3"/>

  <!-- Arrow: STUN → B -->
  <line x1="580" y1="162" x2="700" y2="162" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="700,155 718,162 700,169" fill="#7ec8e3"/>

  <!-- Arrow: A → TURN -->
  <line x1="180" y1="270" x2="300" y2="290" stroke="#e05555" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="300,283 318,293 302,302" fill="#e05555"/>

  <!-- Arrow: TURN → B -->
  <line x1="480" y1="290" x2="700" y2="270" stroke="#e05555" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="700,263 718,268 703,278" fill="#e05555"/>

  <!-- Direct P2P arrow -->
  <line x1="180" y1="385" x2="700" y2="385" stroke="#55c555" stroke-width="2"/>
  <polygon points="700,378 718,385 700,392" fill="#55c555"/>
  <polygon points="180,378 162,385 180,392" fill="#55c555"/>
  <text x="440" y="374" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" font-weight="600" fill="#55c555">P2P 직접 통신 (~90% 성공)</text>
  <text x="440" y="405" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">UDP 우선 · TCP 폴백 · DTLS 암호화</text>
</svg>
