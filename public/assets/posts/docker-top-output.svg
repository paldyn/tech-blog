<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">docker top 출력 구조</text>
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#aaaaaa">컨테이너 내부 프로세스를 호스트 시각으로 표시</text>

  <!-- Output code block -->
  <rect x="60" y="96" width="760" height="128" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="120" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">$ docker top web</text>
  <text x="76" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">UID     PID    PPID   C  STIME  TTY  TIME      CMD</text>
  <text x="76" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">root    12345  12320  0  08:00  ?    00:00:01  nginx: master</text>
  <text x="76" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">101     12360  12345  0  08:00  ?    00:00:00  nginx: worker</text>
  <text x="76" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">101     12361  12345  0  08:00  ?    00:00:00  nginx: worker</text>
  <text x="76" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">↑ 호스트 PID 네임스페이스 기준 (컨테이너 내부 PID와 다름)</text>

  <!-- Column annotations -->
  <!-- UID -->
  <rect x="60" y="250" width="80" height="70" rx="6" fill="#1a1a30" stroke="#7777cc" stroke-width="1"/>
  <text x="100" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#7777cc">UID</text>
  <text x="100" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">사용자 ID</text>
  <text x="100" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666">호스트 기준</text>

  <!-- PID -->
  <rect x="154" y="250" width="80" height="70" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="194" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#55c555">PID</text>
  <text x="194" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">호스트 PID</text>
  <text x="194" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666">nsenter에 사용</text>

  <!-- PPID -->
  <rect x="248" y="250" width="80" height="70" rx="6" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1"/>
  <text x="288" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#7ec8e3">PPID</text>
  <text x="288" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">부모 PID</text>
  <text x="288" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666">컨테이너 shim</text>

  <!-- C -->
  <rect x="342" y="250" width="60" height="70" rx="6" fill="#111827" stroke="#888" stroke-width="1"/>
  <text x="372" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#888">C</text>
  <text x="372" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666">CPU 사용률</text>
  <text x="372" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">정수 비율</text>

  <!-- STIME -->
  <rect x="416" y="250" width="80" height="70" rx="6" fill="#111827" stroke="#888" stroke-width="1"/>
  <text x="456" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#888">STIME</text>
  <text x="456" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666">시작 시각</text>

  <!-- CMD -->
  <rect x="510" y="250" width="120" height="70" rx="6" fill="#2d0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="570" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#e05555">CMD</text>
  <text x="570" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">실행 중인 명령</text>
  <text x="570" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666">프로세스 트리 확인</text>

  <!-- Code block: ps options -->
  <rect x="60" y="344" width="760" height="100" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 기본 (ps -ef 형식)</text>
  <text x="76" y="386" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">docker top</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#ce9178">web</tspan>
  </text>
  <text x="76" y="406" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># ps 옵션 전달 (메모리·CPU 정렬)</text>
  <text x="76" y="424" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3">docker top</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#ce9178">web</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#7777cc">aux --sort=-%mem</tspan>
    <tspan fill="#9aa4b8">  # 메모리 사용 내림차순</tspan>
  </text>
  <text x="76" y="436" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"/>
</svg>
