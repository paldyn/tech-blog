  <rect x="500" y="316" width="160" height="50" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="580" y="337" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
