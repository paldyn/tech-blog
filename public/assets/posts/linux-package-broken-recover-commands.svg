<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="360" rx="12" fill="#0a0a0a"/>
  <text x="60" y="44" font-size="22" font-weight="700" fill="#e8e8e8">복구 명령 한눈에</text>

  <rect x="60" y="72" width="760" height="256" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <g font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <text x="76" y="100" xml:space="preserve" fill="#9aa4b8"># 1) 중단된 설정 마무리</text>
    <text x="76" y="120" xml:space="preserve" fill="#ffffff">$ sudo <tspan fill="#7ec8e3" font-weight="600">dpkg</tspan> --configure -a</text>
    <text x="76" y="160" xml:space="preserve" fill="#9aa4b8"># 2) 깨진 의존성 복구</text>
    <text x="76" y="180" xml:space="preserve" fill="#ffffff">$ sudo <tspan fill="#7ec8e3" font-weight="600">apt-get</tspan> install -f</text>
    <text x="76" y="220" xml:space="preserve" fill="#9aa4b8"># 3) dpkg 잠금 해제 (필요시)</text>
    <text x="76" y="240" xml:space="preserve" fill="#ffffff">$ sudo <tspan fill="#7ec8e3" font-weight="600">rm</tspan> <tspan fill="#ce9178">/var/lib/dpkg/lock*</tspan></text>
    <text x="76" y="280" xml:space="preserve" fill="#9aa4b8"># 4) 특정 패키지 강제 재설치</text>
    <text x="76" y="300" xml:space="preserve" fill="#ffffff">$ sudo <tspan fill="#7ec8e3" font-weight="600">apt-get</tspan> install --reinstall <tspan fill="#ce9178">nginx</tspan></text>
  </g>
</svg>
