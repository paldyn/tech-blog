<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Docker 볼륨 드라이버 구조</text>

  <!-- Container layer -->
  <rect x="60" y="68" width="760" height="60" fill="#1a1a2e" rx="8" stroke="#3a3a5e" stroke-width="1.5"/>
  <text x="440" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">컨테이너  /  Docker Volume API</text>
  <text x="440" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">docker volume create --driver DRIVER_NAME  /  docker run -v name:/path</text>

  <!-- Arrow down -->
  <line x1="440" y1="128" x2="440" y2="158" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="440,166 433,152 447,152" fill="#7ec8e3"/>

  <!-- Driver plugins -->
  <text x="440" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">볼륨 드라이버 플러그인</text>

  <!-- Local driver -->
  <rect x="60" y="200" width="160" height="70" fill="#0f1f2e" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">local</text>
  <text x="140" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">기본 내장 드라이버</text>
  <text x="140" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">호스트 로컬 디스크</text>

  <!-- NFS driver -->
  <rect x="244" y="200" width="160" height="70" fill="#0f1f2e" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="324" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">local (NFS)</text>
  <text x="324" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">NFS 마운트 옵션</text>
  <text x="324" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">네트워크 파일 시스템</text>

  <!-- AWS EBS -->
  <rect x="428" y="200" width="160" height="70" fill="#0f1f2e" rx="8" stroke="#ce9178" stroke-width="1.5"/>
  <text x="508" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">aws-ebs</text>
  <text x="508" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">AWS EBS 볼륨</text>
  <text x="508" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">클라우드 스토리지</text>

  <!-- Ceph / GlusterFS -->
  <rect x="612" y="200" width="168" height="70" fill="#0f1f2e" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="696" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">rexray / ceph</text>
  <text x="696" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">분산 스토리지</text>
  <text x="696" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Ceph, GlusterFS</text>

  <!-- Storage backends -->
  <line x1="140" y1="270" x2="140" y2="308" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="140,316 133,302 147,302" fill="#7ec8e3"/>
  <line x1="324" y1="270" x2="324" y2="308" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="324,316 317,302 331,302" fill="#7777cc"/>
  <line x1="508" y1="270" x2="508" y2="308" stroke="#ce9178" stroke-width="1.5"/>
  <polygon points="508,316 501,302 515,302" fill="#ce9178"/>
  <line x1="696" y1="270" x2="696" y2="308" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="696,316 689,302 703,302" fill="#55c555"/>

  <text x="140" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">호스트 디스크</text>
  <text x="324" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">NFS 서버</text>
  <text x="508" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178" text-anchor="middle">AWS EBS</text>
  <text x="696" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">Ceph 클러스터</text>

  <!-- Bottom note -->
  <text x="440" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">드라이버를 교체해도 컨테이너는 동일한 Volume API로 접근 — 스토리지 백엔드 변경이 애플리케이션에 투명</text>
</svg>
