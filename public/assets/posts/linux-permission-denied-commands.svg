<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">권한 진단 핵심 명령어</text>

  <!-- Left: 진단 -->
  <text x="220" y="76" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">진단</text>

  <rect x="50" y="88" width="360" height="192" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="66" y="116" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 파일 권한·소유자 확인</text>
  <text x="66" y="134" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">ls -la /path/to/file</text>
  <text x="66" y="152" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">stat /path/to/file</text>
  <text x="66" y="174" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 현재 사용자 ID</text>
  <text x="66" y="192" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">id</text>
  <text x="66" y="210" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># ACL 확인</text>
  <text x="66" y="228" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">getfacl /path/to/file</text>
  <text x="66" y="246" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># SELinux 상태</text>
  <text x="66" y="264" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">getenforce; ls -Z file</text>

  <!-- Right: 조치 -->
  <text x="660" y="76" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">조치</text>

  <rect x="470" y="88" width="360" height="192" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="486" y="116" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 권한 변경</text>
  <text x="486" y="134" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan font-weight="600" fill="#7ec8e3">chmod</tspan><tspan fill="#ffffff"> 644 file</tspan></text>
  <text x="486" y="152" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan font-weight="600" fill="#7ec8e3">chmod</tspan><tspan fill="#ffffff"> u+x script.sh</tspan></text>
  <text x="486" y="174" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 소유자 변경</text>
  <text x="486" y="192" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan font-weight="600" fill="#7ec8e3">chown</tspan><tspan fill="#ffffff"> user:group file</tspan></text>
  <text x="486" y="214" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># ACL 추가</text>
  <text x="486" y="232" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan font-weight="600" fill="#7ec8e3">setfacl</tspan><tspan fill="#ffffff"> -m u:bob:rwx f</tspan></text>
  <text x="486" y="254" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># SELinux 컨텍스트 복구</text>
  <text x="486" y="272" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">restorecon -Rv /path</text>

  <!-- Bottom tip -->
  <rect x="50" y="298" width="780" height="70" rx="8" fill="#0f1525" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="322" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">immutable 속성 확인 — chmod 해도 효과 없을 때</text>
  <text x="440" y="344" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">lsattr file</text>
  <text x="440" y="360" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">i 플래그 있으면: chattr -i file 후 재시도</text>
</svg>
