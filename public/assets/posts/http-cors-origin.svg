<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="410" viewBox="0 0 880 410">
  <rect width="880" height="410" fill="#0a0a0a" rx="12"/>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">출처(Origin) = 스킴 + 호스트 + 포트</text>
    <!-- URL decomposition -->
    <text x="278" y="100" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="20" font-weight="600" xml:space="preserve"><tspan fill="#7ec8e3">https</tspan><tspan fill="#888">://</tspan><tspan fill="#55c555">app.example.com</tspan><tspan fill="#dd9955">:443</tspan></text>
    <line x1="278" y1="114" x2="338" y2="114" stroke="#7ec8e3" stroke-width="2.5"/>
    <line x1="374" y1="114" x2="554" y2="114" stroke="#55c555" stroke-width="2.5"/>
    <line x1="554" y1="114" x2="602" y2="114" stroke="#dd9955" stroke-width="2.5"/>
    <text x="308" y="138" text-anchor="middle" font-size="12" fill="#7ec8e3">스킴</text>
    <text x="464" y="138" text-anchor="middle" font-size="12" fill="#55c555">호스트</text>
    <text x="578" y="138" text-anchor="middle" font-size="12" fill="#dd9955">포트</text>
    <!-- Comparison code box -->
    <rect x="60" y="166" width="760" height="140" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="76" y="193" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 기준 출처: https://app.example.com (기본 포트 443)</text>
    <text x="76" y="213" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">https://app.example.com/any/path   </tspan><tspan fill="#55c555">→ 같은 출처</tspan></text>
    <text x="76" y="233" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">https://app.example.com:8443       </tspan><tspan fill="#e05555">→ 다른 출처 (포트)</tspan></text>
    <text x="76" y="253" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">http://app.example.com             </tspan><tspan fill="#e05555">→ 다른 출처 (스킴)</tspan></text>
    <text x="76" y="273" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">https://api.example.com            </tspan><tspan fill="#e05555">→ 다른 출처 (호스트)</tspan></text>
    <text x="76" y="293" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">https://www.app.example.com        </tspan><tspan fill="#e05555">→ 다른 출처 (서브도메인)</tspan></text>
    <!-- Summary -->
    <text x="440" y="346" text-anchor="middle" font-size="12" fill="#888">경로·쿼리는 출처 판정과 무관 — 스킴·호스트·포트 셋 중 하나만 달라도 교차 출처</text>
    <text x="440" y="364" text-anchor="middle" font-size="11" fill="#555">같은 회사 도메인이라도 서브도메인이 다르면 브라우저에게는 남이다</text>
  </g>
</svg>
