<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">create-next-app 프로젝트 생성</text>
  <text x="440" y="70" text-anchor="middle" font-size="14" fill="#888">CLI 명령어 한 줄로 완전한 Next.js 환경 구성</text>

  <!-- Terminal code box -->
  <rect x="80" y="90" width="720" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8"># npx로 새 프로젝트 생성</text>
  <text x="96" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">npx</tspan><tspan fill="#ffffff"> create-next-app@latest my-app</tspan>
  </text>
  <text x="96" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8"># pnpm 또는 yarn 사용</text>
  <text x="96" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">pnpm</tspan><tspan fill="#ffffff"> create next-app@latest my-app</tspan>
  </text>

  <!-- Options title -->
  <text x="440" y="240" text-anchor="middle" font-size="16" font-weight="600" fill="#e8e8e8">설치 시 인터랙티브 선택 옵션</text>

  <!-- Options grid -->
  <rect x="80" y="258" width="340" height="60" rx="8" fill="#12122a" stroke="#7777cc" stroke-width="1"/>
  <text x="250" y="283" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc">TypeScript</text>
  <text x="250" y="303" text-anchor="middle" font-size="12" fill="#888">정적 타입 언어 사용 (권장)</text>

  <rect x="460" y="258" width="340" height="60" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="630" y="283" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">ESLint</text>
  <text x="630" y="303" text-anchor="middle" font-size="12" fill="#888">코드 품질 검사 도구</text>

  <rect x="80" y="332" width="340" height="60" rx="8" fill="#1a150a" stroke="#ce9178" stroke-width="1"/>
  <text x="250" y="357" text-anchor="middle" font-size="14" font-weight="600" fill="#ce9178">Tailwind CSS</text>
  <text x="250" y="377" text-anchor="middle" font-size="12" fill="#888">유틸리티 퍼스트 CSS 프레임워크</text>

  <rect x="460" y="332" width="340" height="60" rx="8" fill="#0c1a1f" stroke="#7ec8e3" stroke-width="1"/>
  <text x="630" y="357" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">src/ 디렉토리</text>
  <text x="630" y="377" text-anchor="middle" font-size="12" fill="#888">소스 파일을 src/에 정리</text>

  <rect x="80" y="406" width="340" height="60" rx="8" fill="#10102a" stroke="#7777cc" stroke-width="1"/>
  <text x="250" y="431" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc">App Router</text>
  <text x="250" y="451" text-anchor="middle" font-size="12" fill="#888">신규 App Router 사용 (권장)</text>

  <rect x="460" y="406" width="340" height="60" rx="8" fill="#1a100a" stroke="#ce9178" stroke-width="1"/>
  <text x="630" y="431" text-anchor="middle" font-size="14" font-weight="600" fill="#ce9178">Turbopack</text>
  <text x="630" y="451" text-anchor="middle" font-size="12" fill="#888">Rust 기반 고속 번들러 (베타)</text>
</svg>
