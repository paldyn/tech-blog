<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Git 충돌이 발생하는 세 가지 상황</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#888">같은 위치를 동시에 수정했을 때 Git이 자동 병합하지 못하면 충돌</text>

  <!-- Card 1: merge -->
  <rect x="60" y="96" width="234" height="340" rx="10" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="177" y="124" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">git merge</text>
  <rect x="80" y="138" width="194" height="64" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="96" y="159" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">A ── B ── C  (main)</text>
  <text x="96" y="177" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">     └── D  (feature)</text>
  <line x1="177" y1="202" x2="177" y2="230" stroke="#555" stroke-width="1.5"/>
  <polygon points="177,238 170,228 184,228" fill="#555"/>
  <text x="177" y="262" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">C와 D가 같은 줄 수정</text>
  <text x="177" y="284" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">→ 3-way merge 실패</text>
  <rect x="97" y="304" width="160" height="36" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="177" y="327" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">CONFLICT</text>
  <text x="177" y="376" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">두 브랜치를 합칠 때</text>
  <text x="177" y="396" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">가장 흔한 충돌 상황</text>

  <!-- Card 2: rebase -->
  <rect x="323" y="96" width="234" height="340" rx="10" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="124" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc">git rebase</text>
  <rect x="343" y="138" width="194" height="64" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="359" y="159" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">A ── B ── C  (main)</text>
  <text x="359" y="177" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">     └── D  (feature)</text>
  <line x1="440" y1="202" x2="440" y2="230" stroke="#555" stroke-width="1.5"/>
  <polygon points="440,238 433,228 447,228" fill="#555"/>
  <text x="440" y="262" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">D를 C 위에 재배치</text>
  <text x="440" y="284" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">→ 커밋별 재적용 충돌</text>
  <rect x="360" y="304" width="160" height="36" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="327" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">CONFLICT</text>
  <text x="440" y="376" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">커밋 하나씩 재적용 중</text>
  <text x="440" y="396" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">각 커밋마다 충돌 가능</text>

  <!-- Card 3: cherry-pick -->
  <rect x="586" y="96" width="234" height="340" rx="10" fill="#0d1117" stroke="#ce9178" stroke-width="1.5"/>
  <text x="703" y="124" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#ce9178">git cherry-pick</text>
  <rect x="606" y="138" width="194" height="64" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="622" y="159" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">A ── B ── C  (main)</text>
  <text x="622" y="177" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">D ── E       (feature)</text>
  <line x1="703" y1="202" x2="703" y2="230" stroke="#555" stroke-width="1.5"/>
  <polygon points="703,238 696,228 710,228" fill="#555"/>
  <text x="703" y="262" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">E만 main에 복사</text>
  <text x="703" y="284" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">→ C와 E가 같은 줄 수정</text>
  <rect x="623" y="304" width="160" height="36" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="703" y="327" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">CONFLICT</text>
  <text x="703" y="376" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">특정 커밋만 골라 적용</text>
  <text x="703" y="396" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">맥락 차이로 충돌 잦음</text>
</svg>
