<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="arrf" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">
    태그 생성 — 현재 커밋 vs 과거 커밋
  </text>

  <!-- HEAD box -->
  <rect x="360" y="80" width="160" height="60" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">HEAD</text>
  <text x="440" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">현재 커밋</text>

  <!-- git tag v1.0.0 -->
  <rect x="60" y="200" width="260" height="60" rx="8" fill="#0d1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="190" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" text-anchor="middle">git tag v1.0.0</text>
  <text x="190" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">HEAD에 태그 (옵션 없음)</text>

  <!-- git tag -a v1.0.0 -m -->
  <rect x="560" y="200" width="260" height="60" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="690" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" text-anchor="middle">git tag -a v1.0.0 -m "..."</text>
  <text x="690" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">HEAD에 Annotated 태그</text>

  <!-- Arrows from HEAD -->
  <line x1="360" y1="130" x2="190" y2="200" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arrf)"/>
  <line x1="440" y1="140" x2="690" y2="200" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arrf)"/>

  <!-- past commit box -->
  <rect x="310" y="315" width="260" height="60" rx="8" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="341" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" text-anchor="middle">git tag v0.9 abc1234</text>
  <text x="440" y="361" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">과거 커밋 SHA 지정</text>

  <!-- note -->
  <text x="440" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">SHA 일부(7자리 이상)로도 지정 가능</text>
</svg>
