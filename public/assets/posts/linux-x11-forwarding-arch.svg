<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">X11 포워딩 아키텍처</text>

  <!-- Local machine -->
  <rect x="60" y="68" width="320" height="260" rx="10" fill="#0d0d20" stroke="#3a4a6e" stroke-width="2"/>
  <text x="220" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">로컬 머신 (클라이언트)</text>

  <rect x="80" y="104" width="280" height="50" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="220" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">X Server (Xorg / XQuartz)</text>
  <text x="220" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">화면 렌더링 담당</text>

  <rect x="80" y="164" width="280" height="50" rx="6" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="220" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff" text-anchor="middle">SSH 클라이언트</text>
  <text x="220" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ssh -X / -Y user@remote</text>

  <rect x="80" y="224" width="280" height="50" rx="6" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="220" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">DISPLAY=localhost:10.0</text>
  <text x="220" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">자동 설정됨</text>

  <rect x="80" y="284" width="280" height="28" rx="4" fill="#1a2e1a" stroke="#3a6e3a" stroke-width="1"/>
  <text x="220" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">GUI 창이 이 화면에 나타남</text>

  <!-- SSH channel -->
  <rect x="400" y="140" width="80" height="100" rx="6" fill="#1a102e" stroke="#6a3a8e" stroke-width="1.5"/>
  <text x="440" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">SSH</text>
  <text x="440" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">암호화</text>
  <text x="440" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">채널</text>
  <text x="440" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">포트 22</text>
  <text x="440" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">X11 subch.</text>

  <!-- Remote machine -->
  <rect x="500" y="68" width="320" height="260" rx="10" fill="#0d200d" stroke="#3a6e3a" stroke-width="2"/>
  <text x="660" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">원격 서버</text>

  <rect x="520" y="104" width="280" height="50" rx="6" fill="#1a2e1a" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="660" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">GUI 애플리케이션</text>
  <text x="660" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">gedit, wireshark, firefox 등</text>

  <rect x="520" y="164" width="280" height="50" rx="6" fill="#112211" stroke="#2a5e2a" stroke-width="1"/>
  <text x="660" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff" text-anchor="middle">X Client (X11 프로토콜)</text>
  <text x="660" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">그리기 명령을 X Server로 전송</text>

  <rect x="520" y="224" width="280" height="50" rx="6" fill="#112211" stroke="#2a5e2a" stroke-width="1"/>
  <text x="660" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">sshd + X11 Forwarding</text>
  <text x="660" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">X11UseLocalhost, ForwardX11Trusted</text>

  <!-- Arrows -->
  <line x1="380" y1="196" x2="400" y2="196" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="480" y1="196" x2="500" y2="196" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <text x="390" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7777cc" text-anchor="middle">X data</text>
  <text x="490" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7777cc" text-anchor="middle">X cmds</text>

  <!-- Code -->
  <rect x="60" y="346" width="760" height="96" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="366" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># -X: 신뢰 안 함(보안 강함), -Y: 신뢰(제한 없음, 더 호환됨)</text>
  <text x="80" y="384" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">ssh</text>
  <text x="110" y="384" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> -X user@server  </text>
  <text x="80" y="402" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 접속 후 GUI 앱 실행 (백그라운드로)</text>
  <text x="80" y="420" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">user@server:~$ </text>
  <text x="80" y="438" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">wireshark</text>
  <text x="80" y="436" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">                   &amp; # 로컬 화면에 창 열림</text>
</svg>
