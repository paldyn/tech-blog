<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">pgrep / pkill vs 기존 방법 비교</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">ps + grep + kill 파이프라인 vs pgrep/pkill 단일 명령</text>

  <!-- Left: Old way -->
  <rect x="50" y="90" width="370" height="360" rx="8" fill="#0d1929" stroke="#444" stroke-width="1.5"/>
  <text x="235" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">기존 방법 (ps + grep + kill)</text>
  <line x1="66" y1="124" x2="404" y2="124" stroke="#444" stroke-width="1"/>

  <text x="66" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># PID 찾기 (grep 자신도 포함)</text>
  <text x="66" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">ps aux | grep nginx | grep -v grep</text>

  <text x="66" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># PID만 추출</text>
  <text x="66" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">ps aux | grep '[n]ginx' \</text>
  <text x="66" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  | awk '{print $2}'</text>

  <text x="66" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># PID 추출 후 kill</text>
  <text x="66" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">kill $(ps aux | grep '[n]ginx' \</text>
  <text x="66" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">       | awk '{print $2}')</text>

  <rect x="66" y="316" width="318" height="36" rx="6" fill="#200a0a" stroke="#e05555" stroke-width="1"/>
  <text x="225" y="339" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">⚠ 취약: grep 자신 포함, 파이프 에러, 장황함</text>

  <text x="66" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># 특정 사용자 프로세스만</text>
  <text x="66" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">ps aux | grep www-data \</text>
  <text x="66" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  | grep nginx | awk '{print $2}'</text>

  <rect x="66" y="428" width="318" height="14" rx="3" fill="#444"/>
  <text x="225" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">여러 명령을 조합해야 함</text>

  <!-- Right: pgrep/pkill -->
  <rect x="460" y="90" width="370" height="360" rx="8" fill="#0f2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="645" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">pgrep / pkill (권장)</text>
  <line x1="476" y1="124" x2="814" y2="124" stroke="#55c555" stroke-width="1"/>

  <text x="476" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># PID만 출력 (자신 제외 자동)</text>
  <text x="476" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">pgrep nginx</text>

  <text x="476" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># 이름 + PID 출력</text>
  <text x="476" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">pgrep -la nginx</text>

  <text x="476" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># 시그널 전송 (SIGTERM 기본)</text>
  <text x="476" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">pkill nginx</text>

  <text x="476" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># 특정 사용자 프로세스만</text>
  <text x="476" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">pkill -u www-data nginx</text>

  <rect x="476" y="320" width="318" height="36" rx="6" fill="#0f2010" stroke="#55c555" stroke-width="1"/>
  <text x="635" y="343" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">✓ 간결, 안전, 옵션 풍부</text>

  <text x="476" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># 정규식 전체 경로 매칭</text>
  <text x="476" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">pgrep -f "python.*app.py"</text>

  <rect x="476" y="412" width="318" height="30" rx="3" fill="#0d2010" stroke="#55c555" stroke-width="1"/>
  <text x="635" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">-f: 프로세스 이름 대신 전체 커맨드라인 매칭</text>
</svg>
