<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">gh: 터미널과 GitHub를 잇는 다리</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">브라우저 없이 PR·이슈·릴리즈를 명령줄에서 처리한다</text>

  <!-- terminal -->
  <rect x="60" y="110" width="220" height="70" rx="10" fill="#101010" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="142" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">로컬 터미널</text>
  <text x="170" y="164" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">gh pr create</text>

  <!-- gh CLI -->
  <rect x="330" y="110" width="220" height="70" rx="10" fill="#16122a" stroke="#9988dd" stroke-width="1.5"/>
  <text x="440" y="142" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#9988dd">gh CLI</text>
  <text x="440" y="164" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">인증 토큰 + REST/GraphQL</text>

  <!-- github -->
  <rect x="600" y="110" width="220" height="70" rx="10" fill="#101010" stroke="#55c555" stroke-width="1.5"/>
  <text x="710" y="142" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">GitHub API</text>
  <text x="710" y="164" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">PR · Issue · Release</text>

  <line x1="280" y1="145" x2="324" y2="145" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <line x1="550" y1="145" x2="594" y2="145" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- command box -->
  <rect x="60" y="220" width="760" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="78" y="248" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 자주 쓰는 명령</text>
  <text x="78" y="272" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">gh <tspan fill="#7ec8e3" font-weight="600">auth</tspan> login        <tspan fill="#9aa4b8"># 인증</tspan></text>
  <text x="78" y="296" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">gh <tspan fill="#7ec8e3" font-weight="600">pr</tspan> create         <tspan fill="#9aa4b8"># PR 생성</tspan></text>
  <text x="78" y="320" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">gh <tspan fill="#7ec8e3" font-weight="600">issue</tspan> list       <tspan fill="#9aa4b8"># 이슈 목록</tspan></text>
  <text x="78" y="344" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">gh <tspan fill="#7ec8e3" font-weight="600">repo</tspan> clone owner/name  <tspan fill="#9aa4b8"># 클론</tspan></text>
</svg>
