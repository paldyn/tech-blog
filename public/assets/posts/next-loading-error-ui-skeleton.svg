<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <!-- Background -->
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">로딩 UI 패턴 — 스켈레톤과 Suspense 경계</text>

  <!-- Left: loading.tsx (full page) -->
  <rect x="50" y="68" width="360" height="360" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="230" y="96" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">loading.tsx — 전체 페이지 로딩</text>

  <!-- Skeleton mockup -->
  <rect x="70" y="108" width="320" height="200" rx="6" fill="#0d1520" stroke="#1e2a3e" stroke-width="1"/>
  <!-- Skeleton header -->
  <rect x="86" y="124" width="200" height="16" rx="3" fill="#1e2a3e"/>
  <!-- Skeleton lines -->
  <rect x="86" y="152" width="280" height="10" rx="2" fill="#1e2a3e"/>
  <rect x="86" y="168" width="240" height="10" rx="2" fill="#1e2a3e"/>
  <rect x="86" y="184" width="260" height="10" rx="2" fill="#1e2a3e"/>
  <!-- Skeleton card -->
  <rect x="86" y="210" width="130" height="80" rx="4" fill="#1e2a3e"/>
  <rect x="228" y="210" width="130" height="80" rx="4" fill="#1e2a3e"/>

  <rect x="70" y="320" width="320" height="96" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="86" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// app/blog/loading.tsx</text>
  <text x="86" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">export default function</text>
  <text x="86" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  Loading() {</text>
  <text x="86" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  return &lt;PostListSkeleton /&gt;</text>
  <text x="86" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve">}</text>

  <!-- Right: Suspense boundary (granular) -->
  <rect x="470" y="68" width="360" height="360" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="650" y="96" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">Suspense — 세분화된 로딩</text>

  <!-- Split loading mockup -->
  <rect x="490" y="108" width="320" height="200" rx="6" fill="#0d1520" stroke="#1e2a3e" stroke-width="1"/>
  <!-- Header (loaded) -->
  <rect x="506" y="120" width="160" height="14" rx="2" fill="#3a5a7e"/>
  <text x="590" y="133" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#7ec8e3">제목 (로딩 완료)</text>
  <!-- Content skeleton -->
  <rect x="506" y="148" width="288" height="60" rx="4" fill="#1e2a3e" stroke="#2a3a5e" stroke-width="1"
        stroke-dasharray="4,4"/>
  <text x="650" y="182" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Suspense &lt;PostList /&gt;</text>
  <!-- Sidebar loaded -->
  <rect x="506" y="226" width="100" height="70" rx="4" fill="#1a3a1a" stroke="#2a5a2a" stroke-width="1"/>
  <text x="556" y="266" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#55c555">사이드바 완료</text>
  <!-- Recommend skeleton -->
  <rect x="622" y="226" width="172" height="70" rx="4" fill="#1e2a3e" stroke="#2a3a5e" stroke-width="1"
        stroke-dasharray="4,4"/>
  <text x="708" y="266" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#888">추천 로딩 중</text>

  <rect x="490" y="320" width="320" height="96" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="506" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 세분화된 Suspense 경계</text>
  <text x="506" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">&lt;Suspense</text>
  <text x="540" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> fallback={&lt;Skeleton/&gt;}&gt;</text>
  <text x="506" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  &lt;PostList /&gt;</text>
  <text x="506" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">&lt;/Suspense&gt;</text>
</svg>
