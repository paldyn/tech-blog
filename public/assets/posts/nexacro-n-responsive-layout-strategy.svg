<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Nexacro N 반응형 레이아웃 전략</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">3가지 접근 방식 비교</text>

  <!-- Strategy 1: anchors -->
  <rect x="60" y="90" width="230" height="270" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="175" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">① Anchor 기반</text>
  <text x="175" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">컴포넌트 자동 조정</text>
  <!-- mini layout -->
  <rect x="78" y="152" width="194" height="100" rx="4" fill="#0a1020" stroke="#2a4a6a" stroke-width="1"/>
  <rect x="86" y="160" width="178" height="24" rx="2" fill="#1a3a5a" stroke="#3a7aa0" stroke-width="1"/>
  <text x="175" y="177" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3" text-anchor="middle">anchors="left right"</text>
  <rect x="86" y="192" width="178" height="52" rx="2" fill="#0d2040" stroke="#3a7aa0" stroke-width="1"/>
  <text x="175" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3" text-anchor="middle">Grid: left right top bottom</text>
  <!-- pros/cons -->
  <text x="78" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ 설정 간단</text>
  <text x="78" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ Studio N 지원</text>
  <text x="78" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">△ 비율 제어 한계</text>
  <text x="78" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">△ 복잡한 레이아웃 어려움</text>
  <text x="78" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">적합: 단순 전체화면</text>

  <!-- Strategy 2: onsize -->
  <rect x="325" y="90" width="230" height="270" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">② onsize 이벤트</text>
  <text x="440" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">스크립트 동적 재계산</text>
  <!-- mini code -->
  <rect x="343" y="152" width="194" height="100" rx="4" fill="#070b14" stroke="#1e2433"/>
  <text x="350" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3">function</text>
  <text x="350" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#e8e8e8">Form_onsize(o,e){</text>
  <text x="350" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#e8e8e8">  fn_relayout();</text>
  <text x="350" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#e8e8e8">  fn_adjust();</text>
  <text x="350" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#e8e8e8">}</text>
  <!-- pros/cons -->
  <text x="343" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ 정밀한 비율 제어</text>
  <text x="343" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ 복잡한 레이아웃 가능</text>
  <text x="343" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">✗ 코드량 증가</text>
  <text x="343" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">✗ 성능 주의 필요</text>
  <text x="343" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">적합: 복잡한 분할 화면</text>

  <!-- Strategy 3: breakpoint -->
  <rect x="590" y="90" width="230" height="270" rx="8" fill="#1f0d0d" stroke="#e05555" stroke-width="2"/>
  <text x="705" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">③ 브레이크포인트</text>
  <text x="705" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">해상도별 레이아웃 전환</text>
  <!-- mini code -->
  <rect x="608" y="152" width="194" height="100" rx="4" fill="#070b14" stroke="#1e2433"/>
  <text x="615" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3">if</text><text x="628" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#e8e8e8">(w &lt; 1280){</text>
  <text x="615" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#e8e8e8">  fn_mobileLayout();</text>
  <text x="615" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3">} else {</text>
  <text x="615" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#e8e8e8">  fn_desktopLayout();</text>
  <text x="615" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#7ec8e3">}</text>
  <!-- pros/cons -->
  <text x="608" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ 해상도별 최적화</text>
  <text x="608" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ 모바일/태블릿 대응</text>
  <text x="608" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">✗ 레이아웃 코드 복잡</text>
  <text x="608" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">✗ 테스트 경우의 수 증가</text>
  <text x="608" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">적합: 멀티 디바이스 앱</text>

  <!-- Bottom recommendation -->
  <rect x="60" y="386" width="760" height="74" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8c84a" text-anchor="middle">실무 권장: ① + ② 조합</text>
  <text x="440" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">기본은 Anchor(①)로 처리하고, 복잡한 분할 비율이 필요한 경우에만 onsize(②) 추가</text>
  <text x="440" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">멀티 디바이스 지원이 필요한 경우 브레이크포인트(③)를 선택적으로 적용</text>

  <!-- Footer -->
  <text x="440" y="482" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN · Nexacro N 완전 정복 시리즈</text>
</svg>
