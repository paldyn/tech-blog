<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340">
  <rect width="880" height="340" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">재시도 전략: Exponential Backoff with Jitter</text>

  <!-- Timeline -->
  <line x1="60" y1="120" x2="820" y2="120" stroke="#2a2a2a" stroke-width="1.5"/>
  <text x="60" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">시간 →</text>

  <!-- Attempt 1 -->
  <circle cx="100" cy="120" r="8" fill="#7ec8e3"/>
  <text x="100" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">시도1</text>
  <rect x="80" y="80" width="40" height="30" rx="4" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="100" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555" text-anchor="middle">실패</text>

  <!-- Wait 1s + jitter -->
  <line x1="108" y1="120" x2="212" y2="120" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="160" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">~1.2s</text>

  <!-- Attempt 2 -->
  <circle cx="220" cy="120" r="8" fill="#7ec8e3"/>
  <text x="220" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">시도2</text>
  <rect x="200" y="80" width="40" height="30" rx="4" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="220" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555" text-anchor="middle">실패</text>

  <!-- Wait 2s + jitter -->
  <line x1="228" y1="120" x2="432" y2="120" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="330" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">~2.4s</text>

  <!-- Attempt 3 -->
  <circle cx="440" cy="120" r="8" fill="#7ec8e3"/>
  <text x="440" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">시도3</text>
  <rect x="420" y="80" width="40" height="30" rx="4" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555" text-anchor="middle">실패</text>

  <!-- Wait 4s + jitter -->
  <line x1="448" y1="120" x2="752" y2="120" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="600" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">~4.8s</text>

  <!-- Attempt 4 success -->
  <circle cx="760" cy="120" r="8" fill="#55c555"/>
  <text x="760" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">시도4</text>
  <rect x="740" y="80" width="40" height="30" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="760" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">성공</text>

  <!-- Code block -->
  <rect x="60" y="168" width="760" height="148" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># Exponential Backoff with Jitter</text>
  <text x="76" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> random, time</tspan></text>
  <text x="76" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">def</tspan><tspan fill="#ffffff"> backoff_delay(attempt: int, base=</tspan><tspan fill="#b5cea8">1.0</tspan><tspan fill="#ffffff">, cap=</tspan><tspan fill="#b5cea8">32.0</tspan><tspan fill="#ffffff">) -> float:</tspan></text>
  <text x="76" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">    delay = </tspan><tspan fill="#7ec8e3" font-weight="600">min</tspan><tspan fill="#ffffff">(cap, base * (</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff"> ** attempt))</tspan></text>
  <text x="76" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> delay * (</tspan><tspan fill="#b5cea8">0.5</tspan><tspan fill="#ffffff"> + random.random() * </tspan><tspan fill="#b5cea8">0.5</tspan><tspan fill="#ffffff">)  </tspan><tspan fill="#9aa4b8"># jitter</tspan></text>
  <text x="76" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#9aa4b8"># attempt=0→~1s, 1→~2s, 2→~4s, 3→~8s</tspan></text>
  <text x="76" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#9aa4b8"># Jitter: 동시 재시도 폭풍(Thundering Herd) 방지</tspan></text>
  <text x="76" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#9aa4b8"># cap: 최대 32초 이상 기다리지 않음</tspan></text>
</svg>
