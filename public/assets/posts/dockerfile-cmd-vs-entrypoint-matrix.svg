<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" role="img" aria-label="CMD vs ENTRYPOINT 조합 매트릭스">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">CMD vs ENTRYPOINT 조합 매트릭스</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">각 조합에서 실제로 실행되는 명령</text>

  <!-- Header -->
  <rect x="60" y="95" width="200" height="40" rx="4" fill="#1a1d26" stroke="#2a2d3a" stroke-width="1"/>
  <text x="160" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#888">Dockerfile</text>

  <rect x="268" y="95" width="180" height="40" rx="4" fill="#0d1520" stroke="#1e3a5f" stroke-width="1"/>
  <text x="358" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3">ENTRYPOINT 없음</text>
  <text x="358" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">(default: /bin/sh -c)</text>

  <rect x="456" y="95" width="180" height="40" rx="4" fill="#0d1520" stroke="#1e3a5f" stroke-width="1"/>
  <text x="546" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3">ENTRYPOINT</text>
  <text x="546" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">["exec"]</text>

  <rect x="644" y="95" width="196" height="40" rx="4" fill="#0d1520" stroke="#1e3a5f" stroke-width="1"/>
  <text x="742" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3">ENTRYPOINT</text>
  <text x="742" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">"exec arg1"</text>

  <!-- Row 1: No CMD -->
  <rect x="60" y="142" width="200" height="50" rx="0" fill="#111318" stroke="#2a2d3a" stroke-width="0.5"/>
  <text x="160" y="172" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">CMD 없음</text>

  <rect x="268" y="142" width="180" height="50" rx="0" fill="#0d1520" stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="358" y="172" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555">에러</text>

  <rect x="456" y="142" width="180" height="50" rx="0" fill="#0d1520" stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="546" y="172" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">exec</text>

  <rect x="644" y="142" width="196" height="50" rx="0" fill="#0d1520" stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="742" y="172" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">/bin/sh -c "exec arg1"</text>

  <!-- Row 2: CMD ["cmd"] exec form -->
  <rect x="60" y="192" width="200" height="60" rx="0" fill="#111318" stroke="#2a2d3a" stroke-width="0.5"/>
  <text x="160" y="216" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">CMD ["cmd"]</text>
  <text x="160" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">exec form</text>

  <rect x="268" y="192" width="180" height="60" rx="0" fill="#0d1520" stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="358" y="227" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">cmd</text>

  <rect x="456" y="192" width="180" height="60" rx="0" fill="#0d1520" stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="546" y="227" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">exec cmd</text>

  <rect x="644" y="192" width="196" height="60" rx="0" fill="#0d1520" stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="742" y="220" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">/bin/sh -c</text>
  <text x="742" y="238" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">"exec arg1" cmd</text>

  <!-- Row 3: CMD ["p1","p2"] as default params -->
  <rect x="60" y="252" width="200" height="70" rx="0" fill="#111318" stroke="#2a2d3a" stroke-width="0.5"/>
  <text x="160" y="276" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">CMD ["p1","p2"]</text>
  <text x="160" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">기본 인수로 활용</text>

  <rect x="268" y="252" width="180" height="70" rx="0" fill="#0d1520" stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="358" y="291" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">p1 p2</text>

  <rect x="456" y="252" width="180" height="70" rx="0" fill="#0d1520" stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="546" y="291" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">exec p1 p2</text>

  <rect x="644" y="252" width="196" height="70" rx="0" fill="#0d1520" stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="742" y="284" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">/bin/sh -c "exec arg1"</text>
  <text x="742" y="302" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#555">p1 p2 무시됨</text>

  <!-- Row 4: CMD cmd shell form -->
  <rect x="60" y="322" width="200" height="60" rx="0" fill="#111318" stroke="#2a2d3a" stroke-width="0.5"/>
  <text x="160" y="346" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">CMD cmd</text>
  <text x="160" y="364" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">shell form</text>

  <rect x="268" y="322" width="180" height="60" rx="0" fill="#0d1520" stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="358" y="356" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">/bin/sh -c cmd</text>

  <rect x="456" y="322" width="180" height="60" rx="0" fill="#0d1520" stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="546" y="349" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">exec</text>
  <text x="546" y="367" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#555">/bin/sh -c cmd</text>

  <rect x="644" y="322" width="196" height="60" rx="0" fill="#0d1520" stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="742" y="356" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">/bin/sh -c "exec arg1"</text>

  <!-- Bottom note -->
  <rect x="60" y="410" width="760" height="40" rx="6" fill="#1a100d" stroke="#3d2a1e" stroke-width="1"/>
  <text x="440" y="435" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178">ENTRYPOINT exec form + CMD exec form 조합이 권장 — 시그널이 PID 1로 정확히 전달됨</text>
</svg>
