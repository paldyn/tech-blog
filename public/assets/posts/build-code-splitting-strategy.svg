<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" style="background:#0a0a0a;border-radius:12px">
  <defs>
    <marker id="csa" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="60" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" xml:space="preserve">코드 스플리팅 전략</text>
  <text x="60" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888" xml:space="preserve">초기 로드 감소 · 병렬 다운로드 · 캐시 효율화</text>

  <!-- Before: single bundle -->
  <text x="60" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" xml:space="preserve">Before — 단일 번들 (안티패턴)</text>
  <rect x="60" y="110" width="340" height="56" rx="6" fill="#2b0d0d" stroke="#701e1e"/>
  <text x="76" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" xml:space="preserve">bundle.js  2.4MB</text>
  <text x="76" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">앱 코드 + 벤더 + 차트 라이브러리 모두 합쳐짐</text>

  <!-- Arrow -->
  <line x1="200" y1="168" x2="200" y2="196" stroke="#55c555" stroke-width="2" marker-end="url(#csa)"/>

  <!-- After: split bundles -->
  <text x="60" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" xml:space="preserve">After — 청킹 후 (권장)</text>
  <rect x="60" y="225" width="154" height="48" rx="6" fill="#0d2b1a" stroke="#1e7040"/>
  <text x="76" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" xml:space="preserve">main.[hash].js</text>
  <text x="76" y="263" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" xml:space="preserve">앱 코드 120KB</text>

  <rect x="230" y="225" width="154" height="48" rx="6" fill="#0d1a2b" stroke="#1e4070"/>
  <text x="246" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">vendor.[hash].js</text>
  <text x="246" y="263" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" xml:space="preserve">React+Router 280KB</text>

  <rect x="400" y="225" width="154" height="48" rx="6" fill="#0d1a2b" stroke="#1e4070"/>
  <text x="416" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">chart.[hash].js</text>
  <text x="416" y="263" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" xml:space="preserve">지연 로드 200KB</text>

  <!-- Benefits labels -->
  <text x="60" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" xml:space="preserve">→ 초기 로드 120KB만</text>
  <text x="230" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" xml:space="preserve">→ 앱 변경 시 vendor 캐시 유지</text>
  <text x="400" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" xml:space="preserve">→ 차트 페이지 이동 시 로드</text>

  <!-- Divider -->
  <line x1="60" y1="310" x2="820" y2="310" stroke="#1e2433" stroke-width="1"/>

  <!-- Code: dynamic import -->
  <text x="60" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" xml:space="preserve">Dynamic Import — 경로 기반 / 이벤트 기반 지연 로드</text>
  <rect x="60" y="342" width="360" height="78" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve">// React Router v6 — 경로별 코드 분할</text>
  <text x="76" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">const </text>
  <text x="116" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">Dashboard = React.lazy(() =&gt;</text>
  <text x="76" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">  import</text>
  <text x="115" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">(</text>
  <text x="122" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve">/* webpackChunkName: "dashboard" */</text>
  <text x="76" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">  './pages/Dashboard'</text>
  <text x="212" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">));</text>

  <!-- Code: prefetch -->
  <rect x="460" y="342" width="360" height="78" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="476" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve">// Prefetch — 유휴 시간에 미리 로드</text>
  <text x="476" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">import</text>
  <text x="510" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">(</text>
  <text x="517" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve">/* webpackPrefetch: true */</text>
  <text x="476" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">  './HeavyChart'</text>
  <text x="579" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">)</text>
  <text x="476" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve">// &lt;link rel="prefetch"&gt; 자동 삽입</text>
</svg>
