<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">포커스 관리 — useRef로 포커스 제어</text>

  <!-- Left: Problem -->
  <text x="220" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">포커스 관리가 필요한 상황</text>

  <rect x="60" y="94" width="360" height="220" rx="8" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <rect x="80" y="112" width="320" height="42" rx="6" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e8e8e8" text-anchor="middle">모달이 열릴 때</text>
  <text x="240" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888" text-anchor="middle">→ 모달 첫 요소로 포커스 이동 필요</text>

  <rect x="80" y="162" width="320" height="42" rx="6" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e8e8e8" text-anchor="middle">모달이 닫힐 때</text>
  <text x="240" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888" text-anchor="middle">→ 모달을 연 버튼으로 포커스 복원 필요</text>

  <rect x="80" y="212" width="320" height="42" rx="6" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e8e8e8" text-anchor="middle">에러 발생 시</text>
  <text x="240" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888" text-anchor="middle">→ 에러 메시지 또는 해당 필드로 포커스</text>

  <rect x="80" y="262" width="320" height="42" rx="6" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e8e8e8" text-anchor="middle">라우팅 후</text>
  <text x="240" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888" text-anchor="middle">→ 새 페이지 h1 또는 메인 콘텐츠로 이동</text>

  <!-- Right: Code -->
  <text x="660" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">useRef로 포커스 제어</text>
  <rect x="500" y="94" width="320" height="220" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="518" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="12" fill="#7ec8e3" font-weight="600">function</text>
  <text x="570" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="12" fill="#e8e8e8"> Modal({ isOpen, onClose }) {</text>
  <text x="518" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="12" fill="#9aa4b8">  // 첫 번째 포커스 대상</text>
  <text x="518" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="12" fill="#7ec8e3" font-weight="600">  const</text>
  <text x="556" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="12" fill="#e8e8e8"> firstRef = useRef(null);</text>
  <text x="518" y="183" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="12" fill="#9aa4b8">  // 열릴 때 포커스 이동</text>
  <text x="518" y="203" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="12" fill="#e8e8e8">  useEffect(() =&gt; {</text>
  <text x="518" y="223" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="12" fill="#7ec8e3" font-weight="600">    if</text>
  <text x="540" y="223" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="12" fill="#e8e8e8"> (isOpen) firstRef.current?.focus();</text>
  <text x="518" y="243" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="12" fill="#e8e8e8">  }, [isOpen]);</text>
  <text x="518" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="12" fill="#9aa4b8">  // 닫기 버튼에 ref 연결</text>
  <text x="518" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="12" fill="#e8e8e8">  return &lt;button ref={firstRef}&gt;닫기&lt;/button&gt;;</text>
  <text x="518" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="12" fill="#e8e8e8">}</text>

  <!-- Bottom -->
  <rect x="60" y="334" width="760" height="36" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555" text-anchor="middle">포커스 관리는 시각 장애인 사용자가 키보드만으로 앱을 쓸 수 있게 하는 핵심 요소</text>
</svg>
