<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arrl" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">중첩 레이아웃 구조</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">라우트 세그먼트마다 독립된 레이아웃을 갖는 구조</text>

  <!-- Left: file tree -->
  <text x="200" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">파일 구조</text>
  <rect x="60" y="108" width="300" height="180" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">app/</text>
  <text x="76" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">├── <tspan fill="#55c555">layout.tsx</tspan>   ← 루트</text>
  <text x="76" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">├── page.tsx</text>
  <text x="76" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">└── dashboard/</text>
  <text x="76" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    ├── <tspan fill="#7ec8e3">layout.tsx</tspan> ← 중첩</text>
  <text x="76" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    ├── page.tsx</text>
  <text x="76" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    └── settings/page.tsx</text>

  <!-- Arrow -->
  <line x1="360" y1="200" x2="430" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrl)"/>

  <!-- Right: nested visual -->
  <text x="650" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">렌더링 결과 (/dashboard)</text>

  <!-- Root layout (outermost) -->
  <rect x="440" y="108" width="400" height="180" rx="8" fill="#0a1020" stroke="#55c555" stroke-width="2"/>
  <text x="456" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">app/layout.tsx (루트 레이아웃)</text>
  <!-- Header in root -->
  <rect x="456" y="134" width="368" height="24" rx="3" fill="#0d2040" stroke="#3b4a6e" stroke-width="1"/>
  <text x="640" y="151" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">공통 헤더 (모든 페이지)</text>

  <!-- Dashboard layout (nested) -->
  <rect x="456" y="164" width="368" height="108" rx="6" fill="#0a2010" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="468" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">dashboard/layout.tsx</text>

  <!-- Sidebar in dashboard layout -->
  <rect x="464" y="186" width="80" height="72" rx="3" fill="#0d3020" stroke="#2d5a3d" stroke-width="1"/>
  <text x="504" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">사이드바</text>

  <!-- Page content -->
  <rect x="552" y="186" width="256" height="72" rx="3" fill="#0a0a1a" stroke="#4a4a8e" stroke-width="1"/>
  <text x="680" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">{children} = page.tsx</text>

  <!-- Code block: dashboard layout -->
  <rect x="60" y="316" width="760" height="160" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// app/dashboard/layout.tsx</text>
  <text x="76" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">export default function</text>
  <text x="244" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> DashboardLayout({children}) {</text>
  <text x="76" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  return</text>
  <text x="116" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> (</text>
  <text x="76" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    &lt;div className=<tspan fill="#ce9178">"flex"</tspan>&gt;</text>
  <text x="76" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      &lt;Sidebar /&gt;</text>
  <text x="76" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      &lt;main&gt;{children}&lt;/main&gt;</text>
  <text x="76" y="458" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    &lt;/div&gt;  )</text>
  <text x="76" y="466" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">}</text>
</svg>
