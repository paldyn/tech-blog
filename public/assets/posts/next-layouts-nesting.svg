<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">중첩 레이아웃 구조</text>
  <text x="440" y="70" text-anchor="middle" font-size="14" fill="#888">바깥 레이아웃 → 안쪽 레이아웃 → page 순서로 렌더링</text>

  <!-- Root Layout (outermost) -->
  <rect x="60" y="90" width="760" height="350" rx="10" fill="#10102a" stroke="#7777cc" stroke-width="2"/>
  <text x="116" y="116" font-size="14" font-weight="600" fill="#7777cc">app/layout.tsx — 루트 레이아웃</text>
  <rect x="80" y="122" width="720" height="20" rx="3" fill="#7777cc22"/>
  <text x="440" y="136" text-anchor="middle" font-size="11" fill="#7777cc88">Header (전체 공통)</text>

  <!-- Dashboard Layout (middle) -->
  <rect x="100" y="152" width="680" height="230" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="156" y="178" font-size="13" font-weight="600" fill="#55c555">app/dashboard/layout.tsx — 대시보드 레이아웃</text>
  <rect x="118" y="184" width="640" height="20" rx="3" fill="#55c55522"/>
  <text x="438" y="198" text-anchor="middle" font-size="11" fill="#55c55588">Sidebar (대시보드 공통)</text>

  <!-- Page (innermost) -->
  <rect x="130" y="218" width="620" height="140" rx="8" fill="#0c1a28" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="248" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">app/dashboard/settings/page.tsx</text>
  <text x="440" y="270" text-anchor="middle" font-size="12" fill="#888">URL: /dashboard/settings</text>

  <!-- page content mockup -->
  <rect x="160" y="286" width="180" height="50" rx="4" fill="#7ec8e322" stroke="#7ec8e366" stroke-width="1"/>
  <text x="250" y="316" text-anchor="middle" font-size="11" fill="#7ec8e3">Settings Form</text>
  <rect x="360" y="286" width="180" height="50" rx="4" fill="#7ec8e322" stroke="#7ec8e366" stroke-width="1"/>
  <text x="450" y="316" text-anchor="middle" font-size="11" fill="#7ec8e3">Account Info</text>

  <!-- Footer area -->
  <rect x="80" y="392" width="720" height="20" rx="3" fill="#7777cc22"/>
  <text x="440" y="406" text-anchor="middle" font-size="11" fill="#7777cc88">Footer (전체 공통)</text>

  <!-- Legend -->
  <text x="440" y="450" text-anchor="middle" font-size="12" fill="#888">레이아웃 간 이동 시 루트·대시보드 레이아웃은 리렌더링 없이 유지됨</text>
</svg>
