<svg xmlns="http://www.w3.org/2000/svg" width="880" height="290" viewBox="0 0 880 290">
  <rect width="880" height="290" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Union·Optional·신문법 비교</text>

  <!-- Column 1 -->
  <rect x="60" y="80" width="360" height="90" rx="8" fill="#111418" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="84" y="109" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="15.5" font-weight="600" fill="#7ec8e3">Union[int, str]</text>
  <text x="84" y="129" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12.5" fill="#aaaaaa">두 타입 중 어느 것이든 허용.</text>
  <text x="84" y="149" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12.5" fill="#aaaaaa">전통적인 typing 표기법이다.</text>

  <!-- Column 2 -->
  <rect x="460" y="80" width="360" height="90" rx="8" fill="#111418" stroke="#55c555" stroke-width="1.5"/>
  <text x="484" y="109" font-family="'JetBrains Mono','Menlo',monospace" font-size="14.5" font-weight="600" fill="#55c555">int | str</text>
  <text x="484" y="129" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12.5" fill="#aaaaaa">3.10+ 의 신문법. import 없이</text>
  <text x="484" y="149" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12.5" fill="#aaaaaa">파이프로 동일하게 표현한다.</text>

  <!-- Bottom Optional -->
  <rect x="60" y="190" width="760" height="60" rx="8" fill="#111418" stroke="#e0a955" stroke-width="1.5"/>
  <text x="84" y="216" font-family="'JetBrains Mono','Menlo',monospace" font-size="14" font-weight="600" fill="#e0a955">Optional[int]  ≡  int | None</text>
  <text x="84" y="236" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="12.5" fill="#aaaaaa">"값이 없을 수도 있음(None 허용)"을 뜻하는 Union의 특수형 — 기본값을 만들지는 않는다.</text>
</svg>
