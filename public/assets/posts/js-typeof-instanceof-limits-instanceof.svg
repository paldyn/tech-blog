<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">instanceof 동작과 한계</text>

  <!-- Left: how instanceof works -->
  <text x="210" y="78" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="15" font-weight="600" fill="#7ec8e3">instanceof 동작 방식</text>

  <rect x="60" y="90" width="360" height="240" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="112" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#6a8aa0">// obj instanceof Cls</tspan>
  </text>
  <text x="76" y="130" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#6a8aa0">// = 프로토타입 체인에 Cls.prototype이 있는가?</tspan>
  </text>
  <text x="76" y="166" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">class</tspan><tspan fill="#e8e8e8"> Animal {}</tspan>
  </text>
  <text x="76" y="184" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">class</tspan><tspan fill="#e8e8e8"> Dog </tspan><tspan fill="#7ec8e3">extends</tspan><tspan fill="#e8e8e8"> Animal {}</tspan>
  </text>
  <text x="76" y="202" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> d </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#e8e8e8"> </tspan><tspan fill="#7ec8e3">new</tspan><tspan fill="#e8e8e8"> Dog();</tspan>
  </text>
  <text x="76" y="220" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">d </tspan><tspan fill="#7ec8e3">instanceof</tspan><tspan fill="#e8e8e8"> Dog;    </tspan><tspan fill="#6a8aa0">// true</tspan>
  </text>
  <text x="76" y="238" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">d </tspan><tspan fill="#7ec8e3">instanceof</tspan><tspan fill="#e8e8e8"> Animal; </tspan><tspan fill="#6a8aa0">// true (체인)</tspan>
  </text>
  <text x="76" y="256" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">d </tspan><tspan fill="#7ec8e3">instanceof</tspan><tspan fill="#e8e8e8"> Object; </tspan><tspan fill="#6a8aa0">// true</tspan>
  </text>
  <text x="76" y="292" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// Symbol.hasInstance로 커스터마이즈 가능</tspan>
  </text>
  <text x="76" y="310" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// class Cls { static [Symbol.hasInstance](v){} }</tspan>
  </text>

  <!-- Right: limitations -->
  <text x="660" y="78" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="15" font-weight="600" fill="#e05555">instanceof 한계</text>

  <!-- Limitation 1: cross-realm -->
  <rect x="460" y="90" width="360" height="100" fill="#1a0d0d" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="476" y="110"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#e05555">⚠ Cross-Realm (iframe 문제)</text>
  <text x="476" y="132" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> arr </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#e8e8e8"> iframe.contentWindow</tspan>
  </text>
  <text x="476" y="150" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">                .eval(</tspan><tspan fill="#ce9178">'[1,2,3]'</tspan><tspan fill="#e8e8e8">);</tspan>
  </text>
  <text x="476" y="168" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">arr </tspan><tspan fill="#7ec8e3">instanceof</tspan><tspan fill="#e8e8e8"> Array; </tspan><tspan fill="#e05555">// false!</tspan>
  </text>
  <text x="476" y="184"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">다른 realm은 다른 Array.prototype을 가짐</text>

  <!-- Limitation 2: prototype tampering -->
  <rect x="460" y="202" width="360" height="100" fill="#1a0d0d" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="476" y="222"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#e05555">⚠ 프로토타입 교체 시 깨짐</text>
  <text x="476" y="244" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">function</tspan><tspan fill="#e8e8e8"> Foo() {}</tspan>
  </text>
  <text x="476" y="262" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> f </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#e8e8e8"> </tspan><tspan fill="#7ec8e3">new</tspan><tspan fill="#e8e8e8"> Foo();</tspan>
  </text>
  <text x="476" y="280" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">Foo.prototype </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#e8e8e8"> {};</tspan><tspan fill="#6a8aa0"> // 교체!</tspan>
  </text>
  <text x="476" y="298" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">f </tspan><tspan fill="#7ec8e3">instanceof</tspan><tspan fill="#e8e8e8"> Foo; </tspan><tspan fill="#e05555">// false!</tspan>
  </text>

  <!-- Limitation 3: primitives -->
  <rect x="460" y="314" width="360" height="80" fill="#1a0d0d" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="476" y="334"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#e05555">⚠ 원시값에는 항상 false</text>
  <text x="476" y="356" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#b5cea8">42</tspan><tspan fill="#e8e8e8"> </tspan><tspan fill="#7ec8e3">instanceof</tspan><tspan fill="#e8e8e8"> Number; </tspan><tspan fill="#e05555">// false</tspan>
  </text>
  <text x="476" y="374" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ce9178">"hi"</tspan><tspan fill="#e8e8e8"> </tspan><tspan fill="#7ec8e3">instanceof</tspan><tspan fill="#e8e8e8"> String; </tspan><tspan fill="#e05555">// false</tspan>
  </text>

  <!-- Bottom: alternatives -->
  <rect x="60" y="350" width="760" height="76" fill="#0f0f1a" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="372" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7777cc">대안: 안전한 타입 판별 방법</text>
  <text x="440" y="394" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">Array.isArray(v)     </tspan>
    <tspan fill="#6a8aa0">// cross-realm 안전</tspan>
  </text>
  <text x="440" y="412" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">Object.prototype.toString.call(v) </tspan>
    <tspan fill="#6a8aa0">// "[object Array]" 등</tspan>
  </text>

  <!-- Bottom note -->
  <text x="440" y="440" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#666">정밀한 타입 판별이 필요하면 Object.prototype.toString.call() 또는 커스텀 태그(Symbol.toStringTag)</text>
</svg>
