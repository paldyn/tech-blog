<svg width="880" height="480" viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">tsc 핵심 컴파일러 옵션</text>
  <!-- Column headers -->
  <rect x="60" y="64" width="200" height="36" rx="6" fill="#1a1a1a"/>
  <rect x="270" y="64" width="200" height="36" rx="6" fill="#1a1a1a"/>
  <rect x="480" y="64" width="340" height="36" rx="6" fill="#1a1a1a"/>
  <text x="160" y="87" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">옵션</text>
  <text x="370" y="87" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">기본값</text>
  <text x="650" y="87" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">설명</text>
  <!-- Rows -->
  <!-- target -->
  <rect x="60" y="110" width="200" height="40" rx="4" fill="#0a0a10"/>
  <rect x="270" y="110" width="200" height="40" rx="4" fill="#0a0a10"/>
  <rect x="480" y="110" width="340" height="40" rx="4" fill="#0a0a10"/>
  <text x="80" y="135" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">target</text>
  <text x="290" y="135" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">"ES3"</text>
  <text x="500" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">출력 JS ECMAScript 버전 (ES2022 권장)</text>
  <!-- module -->
  <rect x="60" y="160" width="200" height="40" rx="4" fill="#0d0d15"/>
  <rect x="270" y="160" width="200" height="40" rx="4" fill="#0d0d15"/>
  <rect x="480" y="160" width="340" height="40" rx="4" fill="#0d0d15"/>
  <text x="80" y="185" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">module</text>
  <text x="290" y="185" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">"CommonJS"</text>
  <text x="500" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">모듈 시스템 (Node16 / NodeNext)</text>
  <!-- strict -->
  <rect x="60" y="210" width="200" height="40" rx="4" fill="#0a0a10"/>
  <rect x="270" y="210" width="200" height="40" rx="4" fill="#0a0a10"/>
  <rect x="480" y="210" width="340" height="40" rx="4" fill="#0a0a10"/>
  <text x="80" y="235" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">strict</text>
  <text x="290" y="235" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">false</text>
  <text x="500" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">엄격 모드 플래그 묶음 (true 권장)</text>
  <!-- outDir -->
  <rect x="60" y="260" width="200" height="40" rx="4" fill="#0d0d15"/>
  <rect x="270" y="260" width="200" height="40" rx="4" fill="#0d0d15"/>
  <rect x="480" y="260" width="340" height="40" rx="4" fill="#0d0d15"/>
  <text x="80" y="285" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">outDir</text>
  <text x="290" y="285" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">(없음)</text>
  <text x="500" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">컴파일된 JS 출력 디렉토리</text>
  <!-- noEmit -->
  <rect x="60" y="310" width="200" height="40" rx="4" fill="#0a0a10"/>
  <rect x="270" y="310" width="200" height="40" rx="4" fill="#0a0a10"/>
  <rect x="480" y="310" width="340" height="40" rx="4" fill="#0a0a10"/>
  <text x="80" y="335" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">noEmit</text>
  <text x="290" y="335" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">false</text>
  <text x="500" y="335" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">타입 검사만, 파일 출력 안 함</text>
  <!-- declaration -->
  <rect x="60" y="360" width="200" height="40" rx="4" fill="#0d0d15"/>
  <rect x="270" y="360" width="200" height="40" rx="4" fill="#0d0d15"/>
  <rect x="480" y="360" width="340" height="40" rx="4" fill="#0d0d15"/>
  <text x="80" y="385" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">declaration</text>
  <text x="290" y="385" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">false</text>
  <text x="500" y="385" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">.d.ts 타입 선언 파일 생성 (라이브러리용)</text>
  <!-- Footer -->
  <text x="440" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">npx tsc --init 후 tsconfig.json에서 직접 편집</text>
</svg>
