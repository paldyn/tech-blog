<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" style="background:#0a0a0a">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">자주 쓰는 tsc 컴파일러 옵션</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888" text-anchor="middle">tsconfig.json compilerOptions 핵심 항목</text>

  <!-- Category 1: Output -->
  <text x="76" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">출력 제어</text>
  <rect x="60" y="116" width="760" height="82" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">"target"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"ES2022"</tspan><tspan fill="#9aa4b8">  // 출력 JS 버전: ES5, ES6, ES2020, ESNext</tspan></text>
  <text x="76" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">"module"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"commonjs"</tspan><tspan fill="#9aa4b8">  // 모듈 시스템: commonjs, ESNext, AMD</tspan></text>
  <text x="76" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">"outDir"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"./dist"</tspan><tspan fill="#9aa4b8">  // 컴파일 결과 디렉터리</tspan></text>

  <!-- Category 2: Strict -->
  <text x="76" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">엄격도 설정</text>
  <rect x="60" y="234" width="760" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">"strict"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#7ec8e3" font-weight="600">true</tspan><tspan fill="#9aa4b8">      // 아래 옵션 전체 활성화 (권장)</tspan></text>
  <text x="76" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">"noImplicitAny"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#7ec8e3" font-weight="600">true</tspan><tspan fill="#9aa4b8"> // any 암묵 추론 금지</tspan></text>
  <text x="76" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">"strictNullChecks"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#7ec8e3" font-weight="600">true</tspan><tspan fill="#9aa4b8"> // null/undefined 분리 검사</tspan></text>
  <text x="76" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">"strictFunctionTypes"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#7ec8e3" font-weight="600">true</tspan><tspan fill="#9aa4b8"> // 함수 파라미터 공변/반변</tspan></text>

  <!-- Category 3: Interop/Lib -->
  <text x="76" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">호환성 및 라이브러리</text>
  <rect x="60" y="374" width="760" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">"lib"</tspan><tspan fill="#ffffff">: [</tspan><tspan fill="#ce9178">"ES2022"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"DOM"</tspan><tspan fill="#ffffff">]</tspan><tspan fill="#9aa4b8"> // 사용 가능 내장 타입</tspan></text>
  <text x="76" y="420" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">"esModuleInterop"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#7ec8e3" font-weight="600">true</tspan><tspan fill="#9aa4b8"> // import X from 'y' 허용</tspan></text>
  <text x="76" y="440" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">"skipLibCheck"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#7ec8e3" font-weight="600">true</tspan><tspan fill="#9aa4b8"> // .d.ts 파일 타입 검사 건너뜀</tspan></text>
</svg>
