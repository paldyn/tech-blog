<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">누적 합계·이동 평균 SQL</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">ROWS BETWEEN … AND CURRENT ROW 프레임 활용</text>

  <!-- Code block -->
  <rect x="60" y="88" width="760" height="228" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="76" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">SELECT</tspan></text>
  <text x="76" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  sale_date, amount,</text>
  <text x="76" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3">SUM</tspan>(amount) <tspan fill="#7ec8e3">OVER</tspan> (</text>
  <text x="76" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">ORDER BY</tspan> sale_date</text>
  <text x="76" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">ROWS BETWEEN</tspan> <tspan fill="#b5cea8">UNBOUNDED</tspan> <tspan fill="#7ec8e3">PRECEDING</tspan></text>
  <text x="76" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      <tspan fill="#7ec8e3">AND CURRENT ROW</tspan>) <tspan fill="#7ec8e3">AS</tspan> running_total,</text>
  <text x="76" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3">AVG</tspan>(amount) <tspan fill="#7ec8e3">OVER</tspan> (</text>
  <text x="76" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">ORDER BY</tspan> sale_date</text>
  <text x="76" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">ROWS BETWEEN</tspan> <tspan fill="#b5cea8">2</tspan> <tspan fill="#7ec8e3">PRECEDING</tspan></text>
  <text x="76" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      <tspan fill="#7ec8e3">AND CURRENT ROW</tspan>) <tspan fill="#7ec8e3">AS</tspan> ma3,</text>
  <text x="76" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3">SUM</tspan>(amount) <tspan fill="#7ec8e3">OVER</tspan> (</text>
  <text x="76" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">ORDER BY</tspan> sale_date <tspan fill="#7ec8e3">ROWS</tspan> <tspan fill="#b5cea8">2</tspan> <tspan fill="#7ec8e3">PRECEDING</tspan>) <tspan fill="#7ec8e3">AS</tspan> sum3</text>

  <!-- Note -->
  <text x="440" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#666">ROWS 2 PRECEDING = ROWS BETWEEN 2 PRECEDING AND CURRENT ROW 축약형</text>
</svg>
