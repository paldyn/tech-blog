<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Zen 원칙의 코드 적용</text>

  <!-- Left: Bad example -->
  <text x="195" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">❌ Non-Pythonic</text>
  <rect x="60" y="84" width="340" height="272" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text x="76" y="110" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 암묵적, 복잡, 중첩된 구조</text>
  <text x="76" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">def</tspan><tspan fill="#ffffff"> f(l):</tspan></text>
  <text x="76" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    r = []</tspan></text>
  <text x="76" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">    for</tspan><tspan fill="#ffffff"> i </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> l:</tspan></text>
  <text x="76" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">        if</tspan><tspan fill="#ffffff"> i % </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff"> == </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">:</tspan></text>
  <text x="76" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">            r.append(i)</tspan></text>
  <text x="76" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">    return</tspan><tspan fill="#ffffff"> r</tspan></text>

  <text x="76" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 오류 무시 (Errors pass silently)</text>
  <text x="76" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">try</tspan><tspan fill="#ffffff">:</tspan></text>
  <text x="76" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    x = </tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"abc"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="76" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">except</tspan><tspan fill="#ffffff">:    </tspan><tspan fill="#9aa4b8"># 모든 예외 무시 ❌</tspan></text>
  <text x="76" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">    pass</tspan></text>

  <!-- Right: Good example -->
  <text x="685" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">✓ Pythonic</text>
  <rect x="480" y="84" width="340" height="272" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text x="496" y="110" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 명시적, 단순, 평평한 구조</text>
  <text x="496" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">def</tspan><tspan fill="#ffffff"> get_evens(numbers):</tspan></text>
  <text x="496" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">    return</tspan><tspan fill="#ffffff"> [n </tspan><tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> n </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> numbers</tspan></text>
  <text x="496" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">             </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> n % </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff"> == </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">]</tspan></text>

  <text x="496" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 명확한 이름, 단 한 가지 방법</text>
  <text x="496" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">evens = get_evens([</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#b5cea8">4</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#b5cea8">5</tspan><tspan fill="#ffffff">])</tspan></text>

  <text x="496" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 오류를 명시적으로 처리</text>
  <text x="496" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">try</tspan><tspan fill="#ffffff">:</tspan></text>
  <text x="496" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    x = </tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"abc"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="496" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">except</tspan><tspan fill="#ffffff"> ValueError:</tspan></text>
  <text x="496" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">    print</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"숫자가 아닙니다"</tspan><tspan fill="#ffffff">)</tspan></text>
</svg>
