<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">TextDecoder 옵션 · encodeInto · 스트리밍</text>

  <!-- 옵션 테이블 -->
  <rect x="60" y="72" width="360" height="140" fill="#111827" rx="8" stroke="#1e2433"/>
  <text x="240" y="97" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" text-anchor="middle">TextDecoder 옵션</text>
  <text x="80" y="120" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">label</text>
  <text x="180" y="120" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">'utf-8', 'utf-16le', 'euc-kr' 등</text>
  <text x="80" y="142" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">fatal</text>
  <text x="180" y="142" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">true → 잘못된 바이트 시 TypeError</text>
  <text x="80" y="164" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">ignoreBOM</text>
  <text x="180" y="164" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">true → BOM 문자 제거 안 함</text>
  <text x="80" y="194" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">decode(buf, { stream: true }) → 청크 디코딩</text>

  <!-- encodeInto 박스 -->
  <rect x="460" y="72" width="360" height="140" fill="#111827" rx="8" stroke="#1e2433"/>
  <text x="640" y="97" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" text-anchor="middle">encodeInto — 제로카피</text>
  <text x="480" y="120" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">encode()</text>
  <text x="560" y="120" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">새 버퍼 할당</text>
  <text x="480" y="142" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">encodeInto()</text>
  <text x="560" y="142" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">기존 버퍼에 직접 쓰기</text>
  <text x="480" y="164" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">반환값</text>
  <text x="560" y="164" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">{ read, written } 객체</text>
  <text x="480" y="194" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">WASM·WebSocket 고성능 경로에서 활용</text>

  <!-- 코드 블록 -->
  <rect x="60" y="236" width="760" height="180" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="80" y="262" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// encodeInto — 미리 할당된 버퍼에 씀</text>
  <text x="80" y="280" xml:space="preserve" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">const</text>
  <text x="124" y="280" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"> buf = new Uint8Array(</text>
  <text x="284" y="280" xml:space="preserve" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">20</text>
  <text x="298" y="280" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">);</text>
  <text x="80" y="298" xml:space="preserve" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">const</text>
  <text x="124" y="298" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"> { read, written } = new TextEncoder().encodeInto(</text>
  <text x="80" y="316" xml:space="preserve" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">  '안녕'</text>
  <text x="128" y="316" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">, buf);</text>
  <text x="80" y="334" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// read: 2, written: 6</text>
  <text x="80" y="364" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// 스트리밍 디코딩 — { stream: true } 로 청크 누적</text>
  <text x="80" y="382" xml:space="preserve" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">const</text>
  <text x="124" y="382" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"> dec = new TextDecoder(</text>
  <text x="278" y="382" xml:space="preserve" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">'utf-8'</text>
  <text x="328" y="382" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">, { fatal: </text>
  <text x="414" y="382" xml:space="preserve" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">true</text>
  <text x="446" y="382" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"> });</text>
  <text x="80" y="400" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">dec.decode(chunk1, { stream: </text>
  <text x="304" y="400" xml:space="preserve" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">true</text>
  <text x="336" y="400" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"> }); </text>
  <text x="384" y="400" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// 분할된 청크 중간 결과</text>
</svg>
