<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr3" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">얕은 복사 vs 깊은 복사</text>

  <!-- Shallow Copy Section -->
  <text x="220" y="78" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e05555">얕은 복사 (Shallow Copy)</text>

  <!-- Original object -->
  <rect x="60" y="90" width="160" height="80" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="140" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">original</text>
  <text x="140" y="136" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">name: "Alice"</text>
  <text x="140" y="154" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">tags: →</text>

  <!-- Clone object (shallow) -->
  <rect x="260" y="90" width="160" height="80" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="340" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">cloned</text>
  <text x="340" y="136" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">name: "Alice"</text>
  <text x="340" y="154" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">tags: →</text>

  <!-- Shared list (both point to same) -->
  <rect x="190" y="220" width="140" height="60" rx="8" fill="#1a1414" stroke="#e05555" stroke-width="2"/>
  <text x="260" y="246" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">List ["java"]</text>
  <text x="260" y="264" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">공유된 참조!</text>

  <!-- Arrows to shared list -->
  <line x1="196" y1="154" x2="250" y2="220" stroke="#e05555" stroke-width="2" marker-end="url(#arr3)"/>
  <line x1="304" y1="154" x2="270" y2="220" stroke="#e05555" stroke-width="2" marker-end="url(#arr3)"/>

  <!-- Warning -->
  <text x="220" y="308" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">original.tags.add("kotlin") 하면</text>
  <text x="220" y="326" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">cloned.tags도 변경됨!</text>

  <!-- Deep Copy Section -->
  <text x="660" y="78" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">깊은 복사 (Deep Copy)</text>

  <!-- Original object deep -->
  <rect x="480" y="90" width="160" height="80" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="560" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">original</text>
  <text x="560" y="136" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">name: "Alice"</text>
  <text x="560" y="154" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">tags: →</text>

  <!-- Clone object (deep) -->
  <rect x="680" y="90" width="160" height="80" rx="8" fill="#0d2214" stroke="#55c555" stroke-width="2"/>
  <text x="760" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">cloned</text>
  <text x="760" y="136" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">name: "Alice"</text>
  <text x="760" y="154" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">tags: →</text>

  <!-- Separate lists -->
  <rect x="490" y="220" width="130" height="50" rx="8" fill="#0d1428" stroke="#7777cc" stroke-width="1.5"/>
  <text x="555" y="250" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">List ["java"]</text>

  <rect x="710" y="220" width="130" height="50" rx="8" fill="#0d2214" stroke="#55c555" stroke-width="1.5"/>
  <text x="775" y="250" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">List ["java"]</text>

  <!-- Arrows to separate lists -->
  <line x1="596" y1="154" x2="560" y2="220" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="800" y1="154" x2="786" y2="220" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- OK message -->
  <text x="660" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">독립적인 복사본</text>
  <text x="660" y="318" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">서로 영향 없음</text>

  <!-- Bottom table -->
  <text x="440" y="368" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">복사 방법 비교</text>

  <rect x="60" y="380" width="225" height="60" rx="8" fill="#0a0a14" stroke="#888" stroke-width="1"/>
  <text x="172" y="403" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">Object.clone()</text>
  <text x="172" y="423" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">얕은 복사 기본, 깊은 복사 직접 구현</text>

  <rect x="305" y="380" width="225" height="60" rx="8" fill="#0d1428" stroke="#7ec8e3" stroke-width="1"/>
  <text x="417" y="403" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">복사 생성자</text>
  <text x="417" y="423" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">new Person(other) — 권장</text>

  <rect x="550" y="380" width="270" height="60" rx="8" fill="#0d2214" stroke="#55c555" stroke-width="1"/>
  <text x="685" y="403" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">정적 팩터리 copy()</text>
  <text x="685" y="423" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Person.copyOf(other) — 명시적</text>
</svg>
