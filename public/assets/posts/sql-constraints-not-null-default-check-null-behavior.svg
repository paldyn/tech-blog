<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480" style="background:#0a0a0a;border-radius:12px">
  <defs>
    <marker id="arr2" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0 0,8 4,0 8" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="1"/>
    </marker>
    <marker id="arrR" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0 0,8 4,0 8" fill="#e05555" stroke="#0a0a0a" stroke-width="1"/>
    </marker>
    <marker id="arrG" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <polygon points="0 0,8 4,0 8" fill="#55c555" stroke="#0a0a0a" stroke-width="1"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">NULL 허용 여부와 CHECK의 NULL 처리</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">CHECK는 NULL을 에러로 보지 않는다 — 세 값 논리(Three-Valued Logic)</text>

  <!-- Left: NULL Allowed vs Not Allowed -->
  <rect x="60" y="100" width="360" height="140" rx="10" fill="#111827" stroke="#1e2433"/>
  <text x="240" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">NULL 허용 컬럼 vs NOT NULL 컬럼</text>
  <line x1="80" y1="132" x2="400" y2="132" stroke="#1e2433"/>
  <!-- Table header -->
  <text x="120" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">컬럼 정의</text>
  <text x="280" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">NULL INSERT</text>
  <!-- Row 1 -->
  <text x="120" y="174" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">col INTEGER</text>
  <text x="280" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓ 허용</text>
  <!-- Row 2 -->
  <text x="120" y="196" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">col INTEGER NOT NULL</text>
  <text x="280" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">✗ 에러</text>
  <!-- Row 3 -->
  <text x="120" y="218" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">col INTEGER DEFAULT 0</text>
  <text x="280" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">0 저장</text>

  <!-- Right: Three-valued logic -->
  <rect x="460" y="100" width="360" height="140" rx="10" fill="#111827" stroke="#1e2433"/>
  <text x="640" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e05555">CHECK와 세 값 논리(3VL)</text>
  <line x1="480" y1="132" x2="800" y2="132" stroke="#1e2433"/>
  <text x="540" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">표현식 결과</text>
  <text x="700" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">CHECK 결과</text>
  <text x="540" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">TRUE</text>
  <text x="700" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">통과</text>
  <text x="540" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">FALSE</text>
  <text x="700" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">거부 (에러)</text>
  <text x="540" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">UNKNOWN (NULL)</text>
  <text x="700" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">통과 (!)</text>

  <!-- Code block -->
  <rect x="60" y="268" width="760" height="166" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="80" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve">-- CHECK NULL 통과 예시</text>
  <text x="80" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">CREATE TABLE</text>
  <text x="191" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"> products (</text>
  <text x="80" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">    price NUMERIC </text>
  <text x="227" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">CHECK (price &gt; 0)</text>
  <text x="80" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">);</text>
  <text x="80" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve">-- price=NULL이면 NULL > 0 → UNKNOWN → 통과!</text>
  <text x="80" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">INSERT INTO</text>
  <text x="172" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"> products (price) </text>
  <text x="336" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">VALUES</text>
  <text x="393" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve"> (</text>
  <text x="409" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc" xml:space="preserve">NULL</text>
  <text x="443" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">);  </text>
  <text x="469" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve">-- 성공!</text>
  <text x="80" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve">-- NULL도 막으려면 NOT NULL + CHECK를 함께 사용</text>
  <text x="80" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">    price NUMERIC </text>
  <text x="227" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">NOT NULL </text>
  <text x="305" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">CHECK (price &gt; 0)</text>

  <text x="440" y="458" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · SQL 완전 정복</text>
</svg>
