<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">ER 다이어그램 표기법 비교</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">Chen Notation vs Crow's Foot Notation</text>

  <!-- Chen Notation panel -->
  <rect x="60" y="88" width="360" height="290" rx="8" fill="#0d0d0d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">Chen 표기법</text>

  <!-- Chen Entity box -->
  <rect x="100" y="128" width="120" height="44" rx="0" fill="none" stroke="#e8e8e8" stroke-width="1.5"/>
  <text x="160" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8e8e8">CUSTOMER</text>
  <text x="160" y="183" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">직사각형 = 엔티티</text>

  <!-- Chen Attribute ellipse (simulated) -->
  <ellipse cx="160" cy="235" rx="50" ry="22" fill="none" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="239" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">attr</text>
  <text x="160" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">타원 = 속성</text>

  <!-- Chen Relationship diamond (simulated with polygon) -->
  <polygon points="160,300 220,326 160,352 100,326" fill="none" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="331" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">PLACES</text>
  <text x="160" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">마름모 = 관계</text>

  <!-- Crow's Foot panel -->
  <rect x="460" y="88" width="360" height="290" rx="8" fill="#0d0d0d" stroke="#ce9178" stroke-width="1.5"/>
  <text x="640" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#ce9178">Crow's Foot 표기법</text>

  <!-- Entity box left -->
  <rect x="490" y="128" width="110" height="160" rx="4" fill="#111" stroke="#e8e8e8" stroke-width="1.5"/>
  <rect x="490" y="128" width="110" height="30" rx="4" fill="#1a1a2e" stroke="#e8e8e8" stroke-width="1.5"/>
  <text x="545" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8e8e8">CUSTOMER</text>
  <text x="500" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">PK  id</text>
  <text x="500" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#b0b0b0">    name</text>
  <text x="500" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#b0b0b0">    email</text>

  <!-- Entity box right -->
  <rect x="660" y="128" width="110" height="160" rx="4" fill="#111" stroke="#e8e8e8" stroke-width="1.5"/>
  <rect x="660" y="128" width="110" height="30" rx="4" fill="#1a1a2e" stroke="#e8e8e8" stroke-width="1.5"/>
  <text x="715" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8e8e8">ORDER</text>
  <text x="670" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">PK  id</text>
  <text x="670" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">FK  cust_id</text>
  <text x="670" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#b0b0b0">    total</text>

  <!-- Crow's foot relationship line (1:N) -->
  <!-- line between entities -->
  <line x1="600" y1="208" x2="660" y2="208" stroke="#888" stroke-width="1.5"/>
  <!-- "1" side: single bar -->
  <line x1="605" y1="202" x2="605" y2="214" stroke="#888" stroke-width="1.5"/>
  <!-- "many" side: crow's foot (3 lines) -->
  <line x1="655" y1="208" x2="645" y2="202" stroke="#888" stroke-width="1.5"/>
  <line x1="655" y1="208" x2="645" y2="208" stroke="#888" stroke-width="1.5"/>
  <line x1="655" y1="208" x2="645" y2="214" stroke="#888" stroke-width="1.5"/>
  <text x="630" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">1 : N</text>

  <!-- Cardinality legend -->
  <rect x="460" y="310" width="360" height="60" rx="6" fill="#111" stroke="#333"/>
  <text x="640" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">기수성(Cardinality) 표기</text>
  <text x="480" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#b0b0b0">│ = 정확히 1</text>
  <text x="570" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#b0b0b0">O = 0 (선택)</text>
  <text x="660" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#b0b0b0">≫ = 다수(N)</text>
  <text x="750" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#b0b0b0">O≫ = 0~N</text>

  <!-- Bottom summary -->
  <rect x="60" y="398" width="760" height="62" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">실무 권장</text>
  <text x="440" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">Crow's Foot (IE 표기법) — ERD 도구 대부분의 기본값, 속성까지 표현 가능</text>
  <text x="440" y="455" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">Chen — 학술/개념 설계 단계에서 관계의 의미를 명확히 할 때 유용</text>
</svg>
