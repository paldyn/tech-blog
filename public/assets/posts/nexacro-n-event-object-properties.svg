<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">이벤트 객체(Event Object) 주요 속성</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888" text-anchor="middle">핸들러 파라미터 obj, e 의 구조</text>

  <!-- obj (sender) -->
  <rect x="60" y="96" width="360" height="368" rx="10" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">obj — 이벤트 발생 컴포넌트</text>
  <line x1="80" y1="134" x2="400" y2="134" stroke="#333" stroke-width="1"/>

  <text x="80" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">속성</text>
  <text x="200" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">설명</text>

  <line x1="80" y1="166" x2="400" y2="166" stroke="#222" stroke-width="1"/>

  <text x="80" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">obj.id</text>
  <text x="200" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">컴포넌트 ID 문자열</text>

  <text x="80" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">obj.value</text>
  <text x="200" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">현재 컴포넌트 값</text>

  <text x="80" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">obj.text</text>
  <text x="200" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">버튼 텍스트 등</text>

  <text x="80" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">obj.enable</text>
  <text x="200" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">활성화 여부</text>

  <text x="80" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">obj.visible</text>
  <text x="200" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">표시 여부</text>

  <text x="80" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">obj.parent</text>
  <text x="200" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">부모 컨테이너</text>

  <line x1="80" y1="318" x2="400" y2="318" stroke="#222" stroke-width="1"/>

  <!-- Grid-specific -->
  <text x="80" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">Grid 전용 속성</text>
  <text x="80" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">obj.currentrow</text>
  <text x="200" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">현재 선택 행 인덱스</text>
  <text x="80" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">obj.currentcol</text>
  <text x="200" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">현재 선택 열 인덱스</text>
  <text x="80" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">obj.getBindDataset()</text>
  <text x="80" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">    바인딩된 Dataset 반환</text>
  <text x="80" y="448" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">obj.getCellText(r, c)</text>
  <text x="80" y="466" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">    특정 셀의 텍스트 반환</text>

  <!-- e (event info) -->
  <rect x="460" y="96" width="360" height="368" rx="10" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7777cc" text-anchor="middle">e — 이벤트 정보 객체</text>
  <line x1="480" y1="134" x2="800" y2="134" stroke="#333" stroke-width="1"/>

  <text x="480" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">속성</text>
  <text x="620" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">설명</text>

  <line x1="480" y1="166" x2="800" y2="166" stroke="#222" stroke-width="1"/>

  <text x="480" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">e.eventid</text>
  <text x="620" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">이벤트 이름 문자열</text>

  <text x="480" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">e.leftbutton</text>
  <text x="620" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">마우스 왼쪽 버튼 여부</text>

  <text x="480" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">e.rightbutton</text>
  <text x="620" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">마우스 오른쪽 버튼 여부</text>

  <text x="480" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">e.shiftkey</text>
  <text x="620" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Shift 키 여부</text>

  <text x="480" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">e.altkey</text>
  <text x="620" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Alt 키 여부</text>

  <text x="480" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">e.ctrlkey</text>
  <text x="620" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Ctrl 키 여부</text>

  <line x1="480" y1="318" x2="800" y2="318" stroke="#222" stroke-width="1"/>

  <text x="480" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">키보드 이벤트 전용</text>
  <text x="480" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">e.keycode</text>
  <text x="620" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">키코드 정수값</text>

  <text x="480" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">변경 이벤트 전용</text>
  <text x="480" y="410" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">e.prevalue</text>
  <text x="620" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">변경 전 값</text>
  <text x="480" y="434" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">e.postvalue</text>
  <text x="620" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">변경 후 값</text>
  <text x="480" y="458" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">e.cancel</text>
  <text x="620" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">이벤트 취소 여부</text>
</svg>
