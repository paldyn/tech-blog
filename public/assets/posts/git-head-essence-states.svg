<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="a1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="a2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="a3" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">HEAD의 두 가지 상태</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">Attached HEAD vs Detached HEAD</text>

  <!-- Left: Attached HEAD -->
  <text x="210" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">Attached HEAD (정상)</text>

  <!-- HEAD file box -->
  <rect x="60" y="116" width="200" height="54" fill="#0d1a0d" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">.git/HEAD</text>
  <text x="160" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" text-anchor="middle">ref: refs/heads/main</text>

  <!-- Arrow HEAD -> branch ref -->
  <line x1="260" y1="143" x2="308" y2="143" stroke="#55c555" stroke-width="2" marker-end="url(#a1)"/>

  <!-- Branch ref box -->
  <rect x="308" y="116" width="180" height="54" fill="#0d1a0d" rx="8" stroke="#55c555" stroke-width="1"/>
  <text x="398" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">refs/heads/main</text>
  <text x="398" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">abc123def…</text>

  <!-- Arrow branch ref -> commit -->
  <line x1="160" y1="170" x2="160" y2="220" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="398" y1="170" x2="398" y2="220" stroke="#7777cc" stroke-width="1.5" marker-end="url(#a3)"/>

  <!-- commit box left -->
  <rect x="60" y="220" width="200" height="54" fill="#111" rx="8" stroke="#555" stroke-width="1"/>
  <text x="160" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">HEAD → main → commit</text>
  <text x="160" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#aaa" text-anchor="middle">두 단계 역참조</text>

  <!-- commit box right -->
  <rect x="308" y="220" width="180" height="54" fill="#111" rx="8" stroke="#7777cc" stroke-width="1"/>
  <text x="398" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">commit abc123def</text>
  <text x="398" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">현재 워킹 디렉터리</text>

  <!-- New commit: main advances -->
  <text x="210" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">새 커밋 시 → main이 앞으로 이동, HEAD는 그대로</text>

  <!-- Divider -->
  <line x1="520" y1="94" x2="520" y2="310" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Right: Detached HEAD -->
  <text x="700" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e05555" text-anchor="middle">Detached HEAD (주의)</text>

  <!-- HEAD file box detached -->
  <rect x="540" y="116" width="200" height="54" fill="#1a0d0d" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="640" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">.git/HEAD</text>
  <text x="640" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" text-anchor="middle">fff000aaa…  (직접 SHA)</text>

  <!-- Arrow HEAD -> commit directly -->
  <line x1="640" y1="170" x2="640" y2="218" stroke="#e05555" stroke-width="2" marker-end="url(#a2)"/>

  <!-- Commit box -->
  <rect x="540" y="220" width="200" height="54" fill="#111" rx="8" stroke="#e05555" stroke-width="1"/>
  <text x="640" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">commit fff000aaa</text>
  <text x="640" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">브랜치 없이 직접 가리킴</text>

  <text x="640" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">새 커밋 시 → 브랜치 없이 고립됨</text>

  <!-- Special HEADs -->
  <text x="440" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">특수 HEAD 파일들</text>

  <rect x="60" y="352" width="220" height="100" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="170" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">ORIG_HEAD</text>
  <text x="170" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">merge·rebase·reset 전</text>
  <text x="170" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">이전 HEAD를 백업</text>
  <text x="170" y="430" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" text-anchor="middle">git reset ORIG_HEAD 로 복구</text>
  <text x="170" y="445" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">→ 위험한 작업 취소 가능</text>

  <rect x="330" y="352" width="220" height="100" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a020" text-anchor="middle">MERGE_HEAD</text>
  <text x="440" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">merge 진행 중에만 존재</text>
  <text x="440" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">병합될 브랜치의 commit</text>
  <text x="440" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">충돌 해결 후 사라짐</text>

  <rect x="600" y="352" width="220" height="100" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="710" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">CHERRY_PICK_HEAD</text>
  <text x="710" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">cherry-pick 진행 중</text>
  <text x="710" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">적용 중인 commit</text>
  <text x="710" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">충돌 해결 후 사라짐</text>
</svg>
