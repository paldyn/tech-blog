<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">커스텀 이벤트 생명주기</text>

  <!-- Step 1: Create -->
  <rect x="60" y="70" width="180" height="60" rx="8" fill="#131a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="150" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">① 생성</text>
  <text x="150" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">new CustomEvent()</text>

  <!-- Arrow -->
  <line x1="240" y1="100" x2="290" y2="100" stroke="#555" stroke-width="2"/>
  <polygon points="290,100 278,94 278,106" fill="#555"/>

  <!-- Step 2: Configure -->
  <rect x="290" y="70" width="200" height="60" rx="8" fill="#131a2e" stroke="#55c555" stroke-width="2"/>
  <text x="390" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">② 설정</text>
  <text x="390" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">bubbles / detail / cancelable</text>

  <!-- Arrow -->
  <line x1="490" y1="100" x2="540" y2="100" stroke="#555" stroke-width="2"/>
  <polygon points="540,100 528,94 528,106" fill="#555"/>

  <!-- Step 3: Dispatch -->
  <rect x="540" y="70" width="180" height="60" rx="8" fill="#131a2e" stroke="#e8a84c" stroke-width="2"/>
  <text x="630" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8a84c" text-anchor="middle">③ 발송</text>
  <text x="630" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">element.dispatchEvent()</text>

  <!-- Arrow -->
  <line x1="720" y1="100" x2="770" y2="100" stroke="#555" stroke-width="2"/>
  <polygon points="770,100 758,94 758,106" fill="#555"/>

  <!-- Step 4: Listen -->
  <rect x="770" y="70" width="50" height="60" rx="8" fill="#131a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="795" y="103" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#7777cc" text-anchor="middle">④</text>

  <!-- CustomEvent options detail -->
  <text x="60" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">CustomEvent 옵션</text>

  <rect x="60" y="184" width="340" height="180" rx="8" fill="#111" stroke="#2a2a2a"/>
  <!-- Option rows -->
  <text x="84" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">bubbles</text>
  <text x="180" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">boolean — 기본 false</text>
  <text x="84" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6a8aa0">true이면 DOM 위로 버블링됨</text>

  <line x1="80" y1="244" x2="380" y2="244" stroke="#2a2a2a" stroke-width="1"/>

  <text x="84" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">cancelable</text>
  <text x="180" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">boolean — 기본 false</text>
  <text x="84" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6a8aa0">preventDefault() 허용 여부</text>

  <line x1="80" y1="296" x2="380" y2="296" stroke="#2a2a2a" stroke-width="1"/>

  <text x="84" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">detail</text>
  <text x="180" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">any — 기본 null</text>
  <text x="84" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6a8aa0">리스너에 전달할 임의 데이터</text>
  <text x="84" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6a8aa0">e.detail로 접근</text>

  <!-- dispatchEvent return value -->
  <text x="440" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">dispatchEvent() 반환값</text>

  <rect x="440" y="184" width="380" height="180" rx="8" fill="#111" stroke="#2a2a2a"/>
  <text x="460" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">동기 실행 — 리스너가 모두 끝난 뒤 반환</text>

  <line x1="456" y1="224" x2="800" y2="224" stroke="#2a2a2a" stroke-width="1"/>

  <text x="460" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">true</text>
  <text x="510" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">— preventDefault() 호출 안 됨</text>

  <text x="460" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">false</text>
  <text x="510" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">— preventDefault() 호출됨</text>

  <line x1="456" y1="290" x2="800" y2="290" stroke="#2a2a2a" stroke-width="1"/>

  <text x="460" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">발송 전 리스너 등록 필수</text>
  <text x="460" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6a8aa0">dispatchEvent 자체는 비동기 이벤트 생성 안 함</text>
  <text x="460" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6a8aa0">Promise 대신 패턴에 자주 활용</text>

  <!-- EventTarget extension pattern -->
  <text x="60" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc">EventTarget 확장 패턴</text>
  <rect x="60" y="410" width="760" height="52" rx="6" fill="#131a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="80" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">클래스에서 <tspan fill="#7ec8e3">EventTarget</tspan>을 상속하거나 mixin하면 DOM 요소 없이도</text>
  <text x="80" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">addEventListener / dispatchEvent를 사용할 수 있음 — 모델 레이어 이벤트 버스 구현에 활용</text>
</svg>
