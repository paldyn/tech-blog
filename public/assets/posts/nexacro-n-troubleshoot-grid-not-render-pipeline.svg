<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
      markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#555"/>
    </marker>
  </defs>

  <text x="440" y="42" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">Grid 렌더링 파이프라인</text>

  <!-- Pipeline steps horizontal -->
  <rect x="60" y="72" width="128" height="56" rx="6" fill="#1a2233" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="124" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">Dataset</text>
  <text x="124" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">데이터 공급</text>

  <line x1="188" y1="100" x2="216" y2="100" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="218" y="72" width="128" height="56" rx="6" fill="#1a2233" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="282" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">binddataset</text>
  <text x="282" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">연결 속성</text>

  <line x1="346" y1="100" x2="374" y2="100" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="376" y="72" width="128" height="56" rx="6" fill="#1a2233" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">GridFormat</text>
  <text x="440" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">컬럼 정의</text>

  <line x1="504" y1="100" x2="532" y2="100" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="534" y="72" width="128" height="56" rx="6" fill="#1a2233" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="598" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">Render</text>
  <text x="598" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">화면 그리기</text>

  <line x1="662" y1="100" x2="690" y2="100" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="692" y="72" width="128" height="56" rx="6" fill="#0d2b1e" stroke="#55c555" stroke-width="1.5"/>
  <text x="756" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">표시 완료</text>
  <text x="756" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">사용자 조작</text>

  <!-- Failure points -->
  <text x="440" y="162" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#e05555">▼ 단계별 장애 원인</text>

  <!-- Failure boxes 2x2 -->
  <rect x="60" y="180" width="368" height="68" rx="6" fill="#1e0505" stroke="#e05555" stroke-width="1"/>
  <text x="244" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">Dataset 비어 있음</text>
  <text x="244" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">트랜잭션 응답 전 Grid 접근, dsResult rowcount=0</text>
  <text x="244" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">→ 콜백 이후 Grid 갱신, rowcount 확인</text>

  <rect x="452" y="180" width="368" height="68" rx="6" fill="#1e0505" stroke="#e05555" stroke-width="1"/>
  <text x="636" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">binddataset 미설정</text>
  <text x="636" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Grid의 binddataset 속성이 공백이거나 잘못됨</text>
  <text x="636" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">→ 속성 창에서 Dataset 이름 정확히 입력</text>

  <rect x="60" y="260" width="368" height="68" rx="6" fill="#1e0505" stroke="#e05555" stroke-width="1"/>
  <text x="244" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">GridFormat 컬럼 없음</text>
  <text x="244" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Format 에디터에서 컬럼 정의가 빠진 경우</text>
  <text x="244" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">→ 스튜디오 Grid Format 에디터에서 컬럼 추가</text>

  <rect x="452" y="260" width="368" height="68" rx="6" fill="#1e0505" stroke="#e05555" stroke-width="1"/>
  <text x="636" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">Grid 크기 0 / invisible</text>
  <text x="636" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">width/height=0 또는 visible=false</text>
  <text x="636" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">→ 레이아웃 속성 확인</text>

  <text x="440" y="360" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#555">파이프라인의 각 단계를 순서대로 확인하면 원인을 빠르게 좁힐 수 있다</text>
</svg>
