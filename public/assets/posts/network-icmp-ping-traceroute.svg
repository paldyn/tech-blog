<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="atr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="atr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">traceroute 원리: TTL을 하나씩 늘려가며 경로 발견</text>

  <!-- Source -->
  <rect x="40" y="90" width="90" height="50" rx="6" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="85" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">출발지</text>
  <text x="85" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888" text-anchor="middle">10.0.0.1</text>

  <!-- Router 1 -->
  <rect x="200" y="90" width="90" height="50" rx="6" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="245" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">Router 1</text>
  <text x="245" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888" text-anchor="middle">10.0.1.1</text>

  <!-- Router 2 -->
  <rect x="370" y="90" width="90" height="50" rx="6" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="415" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">Router 2</text>
  <text x="415" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888" text-anchor="middle">203.0.0.1</text>

  <!-- Router 3 -->
  <rect x="540" y="90" width="90" height="50" rx="6" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="585" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">Router 3</text>
  <text x="585" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888" text-anchor="middle">1.2.3.4</text>

  <!-- Destination -->
  <rect x="710" y="90" width="90" height="50" rx="6" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="755" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">목적지</text>
  <text x="755" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888" text-anchor="middle">8.8.8.8</text>

  <!-- TTL=1 probes -->
  <text x="85" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8a030" text-anchor="middle">TTL=1</text>
  <line x1="130" y1="155" x2="200" y2="155" stroke="#e8a030" stroke-width="2" marker-end="url(#atr)"/>
  <line x1="200" y1="165" x2="130" y2="175" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#atr2)"/>
  <text x="165" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555" text-anchor="middle">Time Exceeded</text>

  <!-- TTL=2 probes -->
  <text x="85" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8a030" text-anchor="middle">TTL=2</text>
  <line x1="130" y1="210" x2="370" y2="210" stroke="#e8a030" stroke-width="2" marker-end="url(#atr)"/>
  <line x1="370" y1="220" x2="130" y2="230" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#atr2)"/>
  <text x="250" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555" text-anchor="middle">Time Exceeded</text>

  <!-- TTL=3 probes -->
  <text x="85" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8a030" text-anchor="middle">TTL=3</text>
  <line x1="130" y1="260" x2="540" y2="260" stroke="#e8a030" stroke-width="2" marker-end="url(#atr)"/>
  <line x1="540" y1="270" x2="130" y2="280" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#atr2)"/>
  <text x="335" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555" text-anchor="middle">Time Exceeded</text>

  <!-- TTL=4 probes -->
  <text x="85" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">TTL=4</text>
  <line x1="130" y1="310" x2="710" y2="310" stroke="#55c555" stroke-width="2" marker-end="url(#atr)"/>
  <line x1="710" y1="320" x2="130" y2="330" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#atr)"/>
  <text x="420" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">Echo Reply (목적지 도달!)</text>

  <!-- Result -->
  <rect x="40" y="360" width="800" height="40" rx="6" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="385" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" text-anchor="middle">경로 발견: 출발지 → 10.0.1.1 → 203.0.0.1 → 1.2.3.4 → 8.8.8.8 (4 hops)</text>
</svg>
