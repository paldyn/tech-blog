<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 340" width="880" height="340">
  <rect width="880" height="340" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">언제 어떤 유사도 지표를 쓸까?</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">상황별 최적 지표 선택 가이드</text>

  <!-- Header row -->
  <rect x="60" y="86" width="760" height="36" rx="4" fill="#1a1a2e"/>
  <text x="200" y="109" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8e8e8">상황</text>
  <text x="390" y="109" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">코사인 유사도</text>
  <text x="560" y="109" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">유클리드 거리</text>
  <text x="730" y="109" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">내적</text>

  <!-- Row 1: 정규화된 벡터 -->
  <rect x="60" y="126" width="760" height="44" rx="4" fill="#111"/>
  <text x="200" y="153" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">정규화된 벡터 (단위벡터)</text>
  <rect x="356" y="133" width="68" height="26" rx="4" fill="#1a1040"/>
  <text x="390" y="151" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">★ 최적</text>
  <rect x="526" y="133" width="68" height="26" rx="4" fill="#0a1e0a"/>
  <text x="560" y="151" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">가능</text>
  <rect x="697" y="133" width="68" height="26" rx="4" fill="#0a1e28"/>
  <text x="731" y="151" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">★ 최적</text>

  <!-- Row 2: 미정규화 벡터 -->
  <rect x="60" y="174" width="760" height="44" rx="4" fill="#0d0d0d"/>
  <text x="200" y="201" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">미정규화·가변 크기 벡터</text>
  <rect x="356" y="181" width="68" height="26" rx="4" fill="#1a1040"/>
  <text x="390" y="199" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">★ 최적</text>
  <rect x="526" y="181" width="68" height="26" rx="4" fill="#0a1e0a"/>
  <text x="560" y="199" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">★ 최적</text>
  <rect x="697" y="181" width="68" height="26" rx="4" fill="#1e1e1e"/>
  <text x="731" y="199" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555">주의</text>

