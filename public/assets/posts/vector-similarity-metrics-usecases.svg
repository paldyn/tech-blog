  <rect x="60" y="222" width="760" height="44" rx="4" fill="#111"/>
  <text x="200" y="249" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">속도 최우선 (MIPS 최적화)</text>
  <rect x="356" y="229" width="68" height="26" rx="4" fill="#1e1e1e"/>
  <text x="390" y="247" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555">보통</text>
  <rect x="526" y="229" width="68" height="26" rx="4" fill="#1e1e1e"/>
  <text x="560" y="247" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555">보통</text>
  <rect x="697" y="229" width="68" height="26" rx="4" fill="#0a1e28"/>
  <text x="731" y="247" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">★ 최적</text>

  <!-- Row 4: 절대 거리 중요 -->
  <rect x="60" y="270" width="760" height="44" rx="4" fill="#0d0d0d"/>
  <text x="200" y="297" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">절대 거리·클러스터링 중요</text>
  <rect x="356" y="277" width="68" height="26" rx="4" fill="#1e1e1e"/>
  <text x="390" y="295" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555">부적합</text>
  <rect x="526" y="277" width="68" height="26" rx="4" fill="#0a1e0a"/>
  <text x="560" y="295" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">★ 최적</text>
  <rect x="697" y="277" width="68" height="26" rx="4" fill="#1e1e1e"/>
  <text x="731" y="295" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555">부적합</text>
