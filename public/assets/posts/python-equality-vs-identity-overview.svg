<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">동등성(==) vs 동일성(is)</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">값 비교 vs 객체 동일성 · id() · 인터닝</text>

  <!-- Memory diagram -->
  <!-- Variable a -->
  <rect x="80" y="110" width="80" height="40" rx="6" fill="#111520" stroke="#7ec8e3"/>
  <text x="120" y="135" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7ec8e3" text-anchor="middle">a</text>

  <!-- Variable b -->
  <rect x="80" y="170" width="80" height="40" rx="6" fill="#111520" stroke="#7ec8e3"/>
  <text x="120" y="195" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7ec8e3" text-anchor="middle">b</text>

  <!-- Variable c -->
  <rect x="80" y="280" width="80" height="40" rx="6" fill="#111520" stroke="#7777cc"/>
  <text x="120" y="305" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7777cc" text-anchor="middle">c</text>

  <!-- Object 1 -->
  <rect x="260" y="120" width="160" height="40" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="340" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">id:0xA1  val:[1,2]</text>

  <!-- Object 2 -->
  <rect x="260" y="180" width="160" height="40" rx="6" fill="#1a2a1a" stroke="#e05555" stroke-width="2"/>
  <text x="340" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" text-anchor="middle">id:0xB2  val:[1,2]</text>

  <!-- Object 3 (alias) -->
  <rect x="260" y="270" width="160" height="40" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="340" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">id:0xA1  val:[1,2]</text>

  <!-- Arrows -->
  <line x1="160" y1="130" x2="260" y2="140" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="260,136 272,140 260,144" fill="#7ec8e3"/>
  <line x1="160" y1="190" x2="260" y2="200" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="260,196 272,200 260,204" fill="#7ec8e3"/>
  <line x1="160" y1="300" x2="260" y2="285" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="260,281 272,285 260,289" fill="#7777cc"/>

  <!-- Labels -->
  <text x="200" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">참조</text>
  <text x="200" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">참조</text>
  <text x="200" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">참조</text>

  <!-- Comparison labels -->
  <text x="460" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">a == b → True  (값 동일)</text>
  <text x="460" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">a is b → False  (다른 객체)</text>
  <text x="460" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">c = a  (같은 객체 참조)</text>
  <text x="460" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">a == c → True</text>
  <text x="460" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">a is c → True  (같은 객체!)</text>

  <!-- Code block -->
  <rect x="60" y="360" width="760" height="112" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">a = [</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">]; b = [</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">]; c = a</tspan></text>
  <text x="76" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">a == b  </tspan><tspan fill="#9aa4b8"># True</tspan><tspan fill="#ffffff">    a </tspan><tspan fill="#7ec8e3">is</tspan><tspan fill="#ffffff"> b  </tspan><tspan fill="#9aa4b8"># False (다른 객체)</tspan></text>
  <text x="76" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">a </tspan><tspan fill="#7ec8e3">is</tspan><tspan fill="#ffffff"> c  </tspan><tspan fill="#9aa4b8"># True  (같은 id)</tspan><tspan fill="#ffffff">   id(a) == id(c)  </tspan><tspan fill="#9aa4b8"># True</tspan></text>
  <text x="76" y="436" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">x </tspan><tspan fill="#7ec8e3">is</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3">None</tspan><tspan fill="#ffffff">  </tspan><tspan fill="#9aa4b8"># None 검사 — is 사용 (권장)</tspan></text>
  <text x="76" y="454" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">x </tspan><tspan fill="#7ec8e3">is True</tspan><tspan fill="#ffffff">    </tspan><tspan fill="#9aa4b8"># 싱글턴 검사만 is 사용</tspan></text>
</svg>
