<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">DPO vs RLHF 비교</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">보상 모델 필요 여부와 학습 복잡도 차이</text>

  <!-- Divider -->
  <line x1="440" y1="88" x2="440" y2="420" stroke="#1e2433" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- RLHF Column -->
  <text x="220" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#e05555" text-anchor="middle">RLHF (PPO)</text>

  <!-- RLHF Step 1 -->
  <rect x="70" y="118" width="320" height="48" fill="#1a0f0f" rx="8" stroke="#e05555" stroke-width="1"/>
  <text x="230" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">① SFT 모델 학습</text>
  <text x="230" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">지도 파인튜닝 (필수 사전 단계)</text>

  <!-- RLHF Arrow -->
  <polygon points="221,172 227,172 227,178 233,166 239,178 239,172 245,172 245,176 233,162 221,176" fill="#e05555"/>

  <!-- RLHF Step 2 -->
  <rect x="70" y="188" width="320" height="48" fill="#1a0f0f" rx="8" stroke="#e05555" stroke-width="1"/>
  <text x="230" y="209" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">② 보상 모델 학습</text>
  <text x="230" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">선호 쌍 → 스칼라 점수 예측 모델</text>

  <polygon points="221,242 227,242 227,248 233,236 239,248 239,242 245,242 245,246 233,232 221,246" fill="#e05555"/>

  <!-- RLHF Step 3 -->
  <rect x="70" y="258" width="320" height="48" fill="#1a0f0f" rx="8" stroke="#e05555" stroke-width="1"/>
  <text x="230" y="279" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">③ PPO 강화학습</text>
  <text x="230" y="297" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">정책 모델 + 보상 모델 동시 실행</text>

  <!-- RLHF Stats -->
  <rect x="70" y="326" width="320" height="72" fill="#111827" rx="8" stroke="#333" stroke-width="1"/>
  <text x="230" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">복잡도 / 비용</text>
  <text x="90" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">✗  4개 모델 동시 메모리 필요</text>
  <text x="90" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">✗  하이퍼파라미터 튜닝 어려움</text>
  <text x="90" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓  이론적으로 강력한 최적화</text>

  <!-- DPO Column -->
  <text x="660" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555" text-anchor="middle">DPO</text>

  <!-- DPO Step 1 -->
  <rect x="490" y="118" width="320" height="48" fill="#0a1a0f" rx="8" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">① SFT 모델 학습</text>
  <text x="650" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">지도 파인튜닝 (동일한 사전 단계)</text>

  <polygon points="641,172 647,172 647,178 653,166 659,178 659,172 665,172 665,176 653,162 641,176" fill="#55c555"/>

  <!-- DPO Step 2 - Direct -->
  <rect x="490" y="188" width="320" height="118" fill="#0a1a0f" rx="8" stroke="#55c555" stroke-width="2"/>
  <text x="650" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">② 직접 선호도 최적화 (DPO)</text>
  <text x="650" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">보상 모델 없이 선호 데이터로 직접 학습</text>
  <line x1="510" y1="248" x2="790" y2="248" stroke="#1e2433" stroke-width="1"/>
  <text x="510" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">  선호 응답 log π_θ(y_w|x) ↑ 증가</text>
  <text x="510" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">  거부 응답 log π_θ(y_l|x) ↓ 감소</text>
  <text x="510" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">  β * ref_model 암묵적 KL 제어</text>

  <!-- DPO Stats -->
  <rect x="490" y="326" width="320" height="72" fill="#111827" rx="8" stroke="#333" stroke-width="1"/>
  <text x="650" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">복잡도 / 비용</text>
  <text x="510" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓  2개 모델만 필요 (정책 + ref)</text>
  <text x="510" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓  지도학습처럼 단순하고 안정적</text>
  <text x="510" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">~  오프라인 학습만 가능</text>

  <!-- Bottom note -->
  <text x="440" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">DPO는 RLHF와 수학적으로 동등한 목표를 달성하지만 구현이 훨씬 단순하다 (Rafailov et al., 2023)</text>
</svg>
