<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">RSA vs ECC — 공개키 암호화 알고리즘 비교</text>

  <!-- RSA Column Header -->
  <rect x="60" y="70" width="360" height="44" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="97" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">RSA</text>

  <!-- ECC Column Header -->
  <rect x="460" y="70" width="360" height="44" rx="8" fill="#1a2e1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="97" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">ECC (타원곡선 암호)</text>

  <!-- RSA Basis -->
  <rect x="60" y="130" width="360" height="70" rx="8" fill="#111122" stroke="#3a3a5e" stroke-width="1"/>
  <text x="240" y="153" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">수학적 기반</text>
  <text x="240" y="173" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">큰 정수의 소인수분해 어려움</text>
  <text x="240" y="191" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">n = p × q (p, q: 큰 소수)</text>

  <!-- ECC Basis -->
  <rect x="460" y="130" width="360" height="70" rx="8" fill="#111a11" stroke="#3a5e3a" stroke-width="1"/>
  <text x="640" y="153" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">수학적 기반</text>
  <text x="640" y="173" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">타원곡선 이산 로그 문제 어려움</text>
  <text x="640" y="191" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">y² = x³ + ax + b (mod p)</text>

  <!-- RSA Key Size -->
  <rect x="60" y="218" width="360" height="70" rx="8" fill="#111122" stroke="#3a3a5e" stroke-width="1"/>
  <text x="240" y="241" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">권장 키 길이</text>
  <text x="240" y="261" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">2048 bit (최소) · 4096 bit (권장)</text>
  <text x="240" y="279" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">키가 길수록 연산 비용 급격 증가</text>

  <!-- ECC Key Size -->
  <rect x="460" y="218" width="360" height="70" rx="8" fill="#111a11" stroke="#3a5e3a" stroke-width="1"/>
  <text x="640" y="241" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">권장 키 길이</text>
  <text x="640" y="261" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">256 bit = RSA 3072 bit 수준 보안</text>
  <text x="640" y="279" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">짧은 키로 동등한 보안 강도 제공</text>

  <!-- RSA Speed -->
  <rect x="60" y="306" width="360" height="70" rx="8" fill="#111122" stroke="#3a3a5e" stroke-width="1"/>
  <text x="240" y="329" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">성능</text>
  <text x="240" y="349" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">서명/검증 상대적으로 느림</text>
  <text x="240" y="367" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">IoT·모바일 환경에 부담</text>

  <!-- ECC Speed -->
  <rect x="460" y="306" width="360" height="70" rx="8" fill="#111a11" stroke="#3a5e3a" stroke-width="1"/>
  <text x="640" y="329" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">성능</text>
  <text x="640" y="349" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">서명/검증 RSA 대비 훨씬 빠름</text>
  <text x="640" y="367" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">TLS, 모바일, IoT 환경에 적합</text>

  <!-- RSA Use Cases -->
  <rect x="60" y="394" width="360" height="70" rx="8" fill="#111122" stroke="#3a3a5e" stroke-width="1"/>
  <text x="240" y="417" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">주요 사용처</text>
  <text x="240" y="437" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">SSH 키 인증, 이메일 서명(PGP)</text>
  <text x="240" y="455" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">TLS (레거시), 코드 서명</text>

  <!-- ECC Use Cases -->
  <rect x="460" y="394" width="360" height="70" rx="8" fill="#111a11" stroke="#3a5e3a" stroke-width="1"/>
  <text x="640" y="417" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">주요 사용처</text>
  <text x="640" y="437" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">TLS 1.3, ECDSA 서명, JWT</text>
  <text x="640" y="455" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">비트코인(secp256k1), Apple Secure Enclave</text>

  <!-- VS divider -->
  <line x1="428" y1="70" x2="428" y2="470" stroke="#444" stroke-width="1" stroke-dasharray="4,4"/>
  <rect x="410" y="270" width="40" height="26" rx="4" fill="#0a0a0a" stroke="#444" stroke-width="1"/>
  <text x="430" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#888">VS</text>

  <!-- Bottom note -->
  <text x="440" y="497" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">* 양자 컴퓨터 등장 시 RSA·ECC 모두 Shor 알고리즘에 취약 — Post-Quantum 암호화로 전환 필요</text>
</svg>
