<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Unix → Linux 역사 타임라인</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">1969년 Bell Labs에서 오늘날 클라우드까지</text>

  <!-- Timeline line -->
  <line x1="100" y1="250" x2="780" y2="250" stroke="#333" stroke-width="2"/>

  <!-- 1969: Unix -->
  <circle cx="130" cy="250" r="8" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="2"/>
  <text x="130" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">1969</text>
  <rect x="60" y="128" width="140" height="96" fill="#0d1a2a" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="130" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">Unix 탄생</text>
  <text x="130" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaa" text-anchor="middle">Bell Labs</text>
  <text x="130" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaa" text-anchor="middle">Thompson &amp; Ritchie</text>
  <text x="130" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaa" text-anchor="middle">C언어로 재작성(1973)</text>
  <line x1="130" y1="224" x2="130" y2="242" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- 1983: GNU -->
  <circle cx="270" cy="250" r="8" fill="#55c555" stroke="#0a0a0a" stroke-width="2"/>
  <text x="270" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">1983</text>
  <rect x="200" y="298" width="140" height="80" fill="#0d1f0d" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="270" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">GNU 프로젝트</text>
  <text x="270" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaa" text-anchor="middle">Richard Stallman</text>
  <text x="270" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaa" text-anchor="middle">gcc, glibc, bash …</text>
  <line x1="270" y1="258" x2="270" y2="296" stroke="#55c555" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- 1991: Linux -->
  <circle cx="430" cy="250" r="10" fill="#e8c55a" stroke="#0a0a0a" stroke-width="2"/>
  <text x="430" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8c55a" text-anchor="middle">1991</text>
  <rect x="355" y="110" width="150" height="116" fill="#1c1a0d" rx="6" stroke="#e8c55a" stroke-width="1.5"/>
  <text x="430" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8c55a" text-anchor="middle">Linux 커널 0.01</text>
  <text x="430" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaa" text-anchor="middle">Linus Torvalds</text>
  <text x="430" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaa" text-anchor="middle">Helsinki 대학원생</text>
  <text x="430" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaa" text-anchor="middle">comp.os.minix 공개</text>
  <text x="430" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaa" text-anchor="middle">GPL v2 라이선스</text>
  <line x1="430" y1="226" x2="430" y2="240" stroke="#e8c55a" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- 1994: Red Hat / Slackware -->
  <circle cx="570" cy="250" r="8" fill="#e05555" stroke="#0a0a0a" stroke-width="2"/>
  <text x="570" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e05555" text-anchor="middle">1994</text>
  <rect x="500" y="298" width="140" height="80" fill="#1a0d0d" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="570" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">배포판 폭발</text>
  <text x="570" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaa" text-anchor="middle">Red Hat · Slackware</text>
  <text x="570" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaa" text-anchor="middle">Debian (1993)</text>
  <line x1="570" y1="258" x2="570" y2="296" stroke="#e05555" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- 2004+: Modern -->
  <circle cx="720" cy="250" r="8" fill="#7777cc" stroke="#0a0a0a" stroke-width="2"/>
  <text x="720" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7777cc" text-anchor="middle">2004~</text>
  <rect x="650" y="128" width="150" height="96" fill="#1a0d1a" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="725" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">현대 Linux</text>
  <text x="725" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaa" text-anchor="middle">Ubuntu(2004)</text>
  <text x="725" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaa" text-anchor="middle">Android(2008)</text>
  <text x="725" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#aaa" text-anchor="middle">클라우드·컨테이너</text>
  <line x1="720" y1="224" x2="720" y2="242" stroke="#7777cc" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Arrow tip on timeline -->
  <polygon points="785,250 772,244 772,256" fill="#333"/>

  <text x="440" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">Linux 커널 코드 기여자: 21,000명 이상 / 기업: 1,700곳 이상 (2024년 기준)</text>
</svg>
