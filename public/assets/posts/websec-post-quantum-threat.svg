<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">양자 컴퓨터의 암호화 위협</text>

  <!-- Classical vs Quantum comparison -->
  <!-- Classical Computer -->
  <rect x="60" y="68" width="360" height="80" rx="8" fill="#141a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="93" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">고전 컴퓨터</text>
  <text x="240" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">RSA-2048 해독: 수십억 년 소요</text>
  <text x="240" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ECC-256 해독: 현실적으로 불가능</text>

  <!-- Quantum Computer -->
  <rect x="460" y="68" width="360" height="80" rx="8" fill="#1a0a0a" stroke="#6e3a3a" stroke-width="1"/>
  <text x="640" y="93" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e05555">양자 컴퓨터 (미래)</text>
  <text x="640" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">RSA-2048 해독: 수 시간 (Shor 알고리즘)</text>
  <text x="640" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ECC-256 해독: 수 시간 (Shor 알고리즘)</text>

  <!-- Affected algorithms -->
  <text x="60" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">영향받는 알고리즘</text>

  <!-- Algorithm boxes -->
  <rect x="60" y="196" width="180" height="60" rx="6" fill="#2a1010" stroke="#7a2a2a" stroke-width="1"/>
  <text x="150" y="219" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">RSA</text>
  <text x="150" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">소인수분해 기반</text>
  <text x="150" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">Shor 알고리즘으로 파괴</text>

  <rect x="260" y="196" width="180" height="60" rx="6" fill="#2a1010" stroke="#7a2a2a" stroke-width="1"/>
  <text x="350" y="219" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">ECC / ECDH</text>
  <text x="350" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">이산 로그 기반</text>
  <text x="350" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">Shor 알고리즘으로 파괴</text>

  <rect x="460" y="196" width="180" height="60" rx="6" fill="#2a1010" stroke="#7a2a2a" stroke-width="1"/>
  <text x="550" y="219" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">DH / DSA</text>
  <text x="550" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">이산 로그 기반</text>
  <text x="550" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">Shor 알고리즘으로 파괴</text>

  <rect x="660" y="196" width="160" height="60" rx="6" fill="#1a1a0d" stroke="#4a4a1a" stroke-width="1"/>
  <text x="740" y="219" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">AES-256</text>
  <text x="740" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">대칭키</text>
  <text x="740" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">키 길이 2배면 안전</text>

  <!-- Harvest now decrypt later -->
  <rect x="60" y="280" width="760" height="68" rx="8" fill="#1a0a1a" stroke="#5a2a5a" stroke-width="1"/>
  <text x="440" y="303" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">&#x26A0; "Harvest Now, Decrypt Later" 위협</text>
  <text x="440" y="323" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">국가 행위자가 지금 암호화된 트래픽을 대량 수집 중 — 양자 컴퓨터 완성 시 소급 복호화 목표</text>
  <text x="440" y="339" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">장기 기밀 데이터(정부·의료·금융)는 지금 전환해야 미래 노출을 막을 수 있다</text>

  <!-- Timeline -->
  <text x="60" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">마이그레이션 타임라인 (NIST 권고)</text>

  <rect x="60" y="394" width="220" height="52" rx="6" fill="#141a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="170" y="415" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">2024</text>
  <text x="170" y="433" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">FIPS 203/204/205 최종 표준화</text>

  <line x1="280" y1="420" x2="310" y2="420" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <rect x="310" y="394" width="220" height="52" rx="6" fill="#141a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="420" y="415" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">2025~2028</text>
  <text x="420" y="433" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">주요 인프라 하이브리드 전환</text>

  <line x1="530" y1="420" x2="560" y2="420" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <rect x="560" y="394" width="260" height="52" rx="6" fill="#0d1f0d" stroke="#2a5a2a" stroke-width="1"/>
  <text x="690" y="415" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">2030 이후</text>
  <text x="690" y="433" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">RSA/ECC 단독 사용 금지 권고</text>
</svg>
