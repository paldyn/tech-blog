<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <defs>
    <style>
      text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }
      .mono { font-family: 'JetBrains Mono','Menlo','Consolas',monospace; }
    </style>
  </defs>

  <!-- background -->
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">제어 흐름 코드 예제</text>
  <text x="440" y="66" text-anchor="middle" font-size="14" fill="#888">for · while · for-each · break &amp; continue</text>

  <!-- Left: for loop -->
  <text x="60" y="96" font-size="13" font-weight="600" fill="#7ec8e3">기본 for 루프</text>
  <rect x="60" y="104" width="360" height="118" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="125" class="mono" font-size="13" fill="#9aa4b8">// 1~10 합산</text>
  <text xml:space="preserve" x="76" y="143" class="mono" font-size="13" fill="#7ec8e3">int</text><text xml:space="preserve" x="106" y="143" class="mono" font-size="13" fill="#ffffff"> sum = 0;</text>
  <text xml:space="preserve" x="76" y="161" class="mono" font-size="13" fill="#7ec8e3">for</text><text xml:space="preserve" x="104" y="161" class="mono" font-size="13" fill="#ffffff"> (</text><text xml:space="preserve" x="119.7" y="161" class="mono" font-size="13" fill="#7ec8e3">int</text><text xml:space="preserve" x="147" y="161" class="mono" font-size="13" fill="#ffffff"> i = 1; i &lt;= 10; i++) {</text>
  <text xml:space="preserve" x="76" y="179" class="mono" font-size="13" fill="#ffffff">    sum += i;</text>
  <text xml:space="preserve" x="76" y="197" class="mono" font-size="13" fill="#ffffff">}</text>
  <text xml:space="preserve" x="76" y="215" class="mono" font-size="13" fill="#9aa4b8">// sum = 55</text>

  <!-- Left: while -->
  <text x="60" y="244" font-size="13" font-weight="600" fill="#7ec8e3">while · do-while</text>
  <rect x="60" y="252" width="360" height="136" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="273" class="mono" font-size="13" fill="#7ec8e3">int</text><text xml:space="preserve" x="106" y="273" class="mono" font-size="13" fill="#ffffff"> n = 1;</text>
  <text xml:space="preserve" x="76" y="291" class="mono" font-size="13" fill="#7ec8e3">while</text><text xml:space="preserve" x="120" y="291" class="mono" font-size="13" fill="#ffffff"> (n &lt; 100) {</text>
  <text xml:space="preserve" x="76" y="309" class="mono" font-size="13" fill="#ffffff">    n *= 2;  </text><text xml:space="preserve" x="196" y="309" class="mono" font-size="13" fill="#9aa4b8">// 2배씩 증가</text>
  <text xml:space="preserve" x="76" y="327" class="mono" font-size="13" fill="#ffffff">}</text>
  <text xml:space="preserve" x="76" y="345" class="mono" font-size="13" fill="#9aa4b8">// do-while: 최소 1회 실행 보장</text>
  <text xml:space="preserve" x="76" y="363" class="mono" font-size="13" fill="#7ec8e3">do</text><text xml:space="preserve" x="100" y="363" class="mono" font-size="13" fill="#ffffff"> { n--; } </text><text xml:space="preserve" x="184" y="363" class="mono" font-size="13" fill="#7ec8e3">while</text><text xml:space="preserve" x="228" y="363" class="mono" font-size="13" fill="#ffffff"> (n &gt; 0);</text>

  <!-- Right: for-each -->
  <text x="460" y="96" font-size="13" font-weight="600" fill="#7ec8e3">Enhanced for (for-each)</text>
  <rect x="460" y="104" width="360" height="118" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="476" y="125" class="mono" font-size="13" fill="#7ec8e3">int</text><text xml:space="preserve" x="506" y="125" class="mono" font-size="13" fill="#ffffff">[] nums = {3, 1, 4, 1, 5, 9};</text>
  <text xml:space="preserve" x="476" y="143" class="mono" font-size="13" fill="#7ec8e3">int</text><text xml:space="preserve" x="506" y="143" class="mono" font-size="13" fill="#ffffff"> total = 0;</text>
  <text xml:space="preserve" x="476" y="161" class="mono" font-size="13" fill="#7ec8e3">for</text><text xml:space="preserve" x="504" y="161" class="mono" font-size="13" fill="#ffffff"> (</text><text xml:space="preserve" x="519.7" y="161" class="mono" font-size="13" fill="#7ec8e3">int</text><text xml:space="preserve" x="547" y="161" class="mono" font-size="13" fill="#ffffff"> num : nums) {</text>
  <text xml:space="preserve" x="476" y="179" class="mono" font-size="13" fill="#ffffff">    total += num;</text>
  <text xml:space="preserve" x="476" y="197" class="mono" font-size="13" fill="#ffffff">}</text>
  <text xml:space="preserve" x="476" y="215" class="mono" font-size="13" fill="#9aa4b8">// total = 23</text>

  <!-- Right: break / continue / labeled -->
  <text x="460" y="244" font-size="13" font-weight="600" fill="#7ec8e3">break · continue · labeled break</text>
  <rect x="460" y="252" width="360" height="154" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="476" y="273" class="mono" font-size="13" fill="#9aa4b8">// 짝수만 출력, 20 이상이면 중단</text>
  <text xml:space="preserve" x="476" y="291" class="mono" font-size="13" fill="#7ec8e3">for</text><text xml:space="preserve" x="504" y="291" class="mono" font-size="13" fill="#ffffff"> (</text><text xml:space="preserve" x="519.7" y="291" class="mono" font-size="13" fill="#7ec8e3">int</text><text xml:space="preserve" x="547" y="291" class="mono" font-size="13" fill="#ffffff"> i = 1; i &lt;= 30; i++) {</text>
  <text xml:space="preserve" x="476" y="309" class="mono" font-size="13" fill="#7ec8e3">    if</text><text xml:space="preserve" x="515.2" y="309" class="mono" font-size="13" fill="#ffffff"> (i &gt;= 20) </text><text xml:space="preserve" x="594" y="309" class="mono" font-size="13" fill="#7ec8e3">break</text><text xml:space="preserve" x="638" y="309" class="mono" font-size="13" fill="#ffffff">;</text>
  <text xml:space="preserve" x="476" y="327" class="mono" font-size="13" fill="#7ec8e3">    if</text><text xml:space="preserve" x="515.2" y="327" class="mono" font-size="13" fill="#ffffff"> (i % 2 != 0) </text><text xml:space="preserve" x="616.9" y="327" class="mono" font-size="13" fill="#7ec8e3">continue</text><text xml:space="preserve" x="679.5" y="327" class="mono" font-size="13" fill="#ffffff">;</text>
  <text xml:space="preserve" x="476" y="345" class="mono" font-size="13" fill="#ffffff">    System.out.print(i + </text><text xml:space="preserve" x="663.8" y="345" class="mono" font-size="13" fill="#ce9178">" "</text><text xml:space="preserve" x="687.3" y="345" class="mono" font-size="13" fill="#ffffff">);</text>
  <text xml:space="preserve" x="476" y="363" class="mono" font-size="13" fill="#ffffff">}</text>
  <text xml:space="preserve" x="476" y="381" class="mono" font-size="13" fill="#9aa4b8">// 출력: 2 4 6 8 10 12 14 16 18</text>
  <text xml:space="preserve" x="476" y="399" class="mono" font-size="13" fill="#9aa4b8">// labeled: outer: for(...) { break outer; }</text>

  <!-- Bottom: if-else if summary -->
  <rect x="60" y="416" width="760" height="76" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="438" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">if / else if / else — 기본 패턴</text>
  <text x="200" y="462" text-anchor="middle" font-size="12" fill="#55c555">단일 조건: if (cond) { }</text>
  <text x="200" y="480" text-anchor="middle" font-size="12" fill="#888">중괄호 생략 가능하지만 권장 안 함</text>
  <text x="440" y="462" text-anchor="middle" font-size="12" fill="#7ec8e3">다중: if / else if / else 체인</text>
  <text x="440" y="480" text-anchor="middle" font-size="12" fill="#888">3개 이상 분기는 switch 고려</text>
  <text x="680" y="462" text-anchor="middle" font-size="12" fill="#e05555">중첩 if 과다 → 가드 클로즈 패턴</text>
  <text x="680" y="480" text-anchor="middle" font-size="12" fill="#888">if (!valid) return; 로 조기 반환</text>
</svg>
