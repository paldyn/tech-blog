<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Optional 변환 메서드 — map · flatMap · filter</text>

  <!-- map -->
  <text x="60" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3">map(Function)</text>
  <rect x="60" y="94" width="180" height="50" rx="6" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">Optional&lt;T&gt;</text>
  <text x="150" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">값 존재</text>
  <line x1="250" y1="119" x2="290" y2="119" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="270" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3" text-anchor="middle">fn(T)</text>
  <rect x="300" y="94" width="180" height="50" rx="6" fill="#0d1a2a" stroke="#55c555" stroke-width="1.5"/>
  <text x="390" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">Optional&lt;R&gt;</text>
  <text x="390" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">변환된 값</text>
  <text x="60" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">empty 입력 → empty 출력 (fn 실행 안 함)</text>

  <!-- flatMap -->
  <text x="60" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#b5cea8">flatMap(Function&lt;T, Optional&lt;R&gt;&gt;)</text>
  <rect x="60" y="214" width="180" height="50" rx="6" fill="#0d1a2a" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="150" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8" text-anchor="middle">Optional&lt;T&gt;</text>
  <text x="150" y="253" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">값 존재</text>
  <line x1="250" y1="239" x2="290" y2="239" stroke="#b5cea8" stroke-width="2" marker-end="url(#arr)"/>
  <text x="270" y="231" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#b5cea8" text-anchor="middle">fn(T)→Opt</text>
  <rect x="300" y="214" width="200" height="50" rx="6" fill="#0d1a2a" stroke="#55c555" stroke-width="1.5"/>
  <text x="400" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">Optional&lt;R&gt;</text>
  <text x="400" y="253" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">중첩 없이 반환</text>
  <text x="60" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">fn이 Optional을 반환할 때 — map이면 Optional&lt;Optional&lt;R&gt;&gt; 발생</text>

  <!-- filter -->
  <text x="60" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#ce9178">filter(Predicate)</text>
  <rect x="60" y="332" width="180" height="50" rx="6" fill="#0d1a2a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="150" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178" text-anchor="middle">Optional&lt;T&gt;</text>
  <text x="150" y="373" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">값 존재</text>
  <line x1="250" y1="357" x2="290" y2="340" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <line x1="250" y1="357" x2="290" y2="374" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <rect x="300" y="322" width="160" height="40" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="380" y="347" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">Optional&lt;T&gt; — 통과</text>
  <rect x="300" y="370" width="160" height="40" rx="6" fill="#1a1a1a" stroke="#888" stroke-width="1.5"/>
  <text x="380" y="395" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">empty — 필터 탈락</text>
  <text x="60" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">조건 만족: 그대로 통과 / 불만족 또는 empty 입력: empty 반환</text>

  <!-- Code example -->
  <rect x="530" y="94" width="310" height="340" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="546" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// map 예시</text>
  <text x="546" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">Optional</tspan><tspan fill="#ffffff">.of(</tspan><tspan fill="#ce9178">"hello"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="546" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  .map(String::length)</tspan></text>
  <text x="546" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  .orElse(0); </tspan><tspan fill="#9aa4b8">// 5</tspan></text>
  <text x="546" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// flatMap 예시</text>
  <text x="546" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">Optional</tspan><tspan fill="#ffffff">.of(user)</tspan></text>
  <text x="546" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  .flatMap(u-&gt;u.getAddress())</tspan></text>
  <text x="546" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  .map(Address::getCity)</tspan></text>
  <text x="546" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  .orElse(</tspan><tspan fill="#ce9178">"Unknown"</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="546" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// filter 예시</text>
  <text x="546" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">Optional</tspan><tspan fill="#ffffff">.of(42)</tspan></text>
  <text x="546" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  .filter(n -&gt; n &gt; 18)</tspan></text>
  <text x="546" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  .isPresent(); </tspan><tspan fill="#9aa4b8">// true</tspan></text>
  <text x="546" y="396" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">Optional</tspan><tspan fill="#ffffff">.of(5)</tspan></text>
  <text x="546" y="416" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  .filter(n -&gt; n &gt; 18)</tspan></text>
  <text x="546" y="436" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  .isEmpty();   </tspan><tspan fill="#9aa4b8">// true</tspan></text>
</svg>
