<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">JIT 컴파일 파이프라인</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">바이트코드 → 프로파일링 → 최적화된 네이티브 코드</text>

  <!-- Stage boxes (5 stages in a row) -->
  <!-- Stage 1: Bytecode -->
  <rect x="60" y="110" width="140" height="60" rx="8" fill="#12182b" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="130" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">바이트코드</text>
  <text x="130" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">.class 파일</text>

  <!-- Arrow 1 -->
  <line x1="200" y1="140" x2="228" y2="140" stroke="#444" stroke-width="2"/>
  <polygon points="228,134 240,140 228,146" fill="#444"/>

  <!-- Stage 2: Interpreter -->
  <rect x="240" y="110" width="140" height="60" rx="8" fill="#12182b" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="310" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Interpreter</text>
  <text x="310" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">한 줄씩 실행</text>

  <!-- Arrow 2 -->
  <line x1="380" y1="140" x2="408" y2="140" stroke="#444" stroke-width="2"/>
  <polygon points="408,134 420,140 408,146" fill="#444"/>

  <!-- Stage 3: Profiler -->
  <rect x="420" y="110" width="140" height="60" rx="8" fill="#12182b" stroke="#7777cc" stroke-width="1.5"/>
  <text x="490" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Profiler</text>
  <text x="490" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">호출 빈도 측정</text>

  <!-- Arrow 3 -->
  <line x1="560" y1="140" x2="588" y2="140" stroke="#444" stroke-width="2"/>
  <polygon points="588,134 600,140 588,146" fill="#444"/>

  <!-- Stage 4: JIT Compiler -->
  <rect x="600" y="110" width="140" height="60" rx="8" fill="#12182b" stroke="#55c555" stroke-width="1.5"/>
  <text x="670" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">JIT Compiler</text>
  <text x="670" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">C1 / C2 최적화</text>

  <!-- Arrow 4 down to native -->
  <line x1="670" y1="170" x2="670" y2="212" stroke="#55c555" stroke-width="2"/>
  <polygon points="664,212 670,224 676,212" fill="#55c555"/>

  <!-- Native Code -->
  <rect x="560" y="224" width="220" height="60" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="2"/>
  <text x="670" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">네이티브 코드</text>
  <text x="670" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Code Cache에 저장</text>

  <!-- Threshold label -->
  <text x="490" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">임계값 초과 시</text>
  <text x="490" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">Hot Method 판정</text>

  <!-- Deoptimization arrow (back from native to interpreter) -->
  <path d="M 560 254 Q 440 254 440 320 Q 440 380 310 380 Q 240 380 240 310 Q 240 250 260 200 Q 280 170 310 170" stroke="#e05555" stroke-width="2" fill="none" stroke-dasharray="4,4"/>
  <polygon points="305,163 310,175 315,163" fill="#e05555"/>
  <text x="380" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">Deoptimization</text>
  <text x="380" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">가정 위반 시 인터프리터로</text>

  <!-- Divider -->
  <line x1="60" y1="420" x2="820" y2="420" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Code block: JVM flags -->
  <rect x="60" y="430" width="760" height="72" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="450" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># JIT 관련 주요 JVM 옵션</text>
  <text x="76" y="468" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">-XX:CompileThreshold=<tspan fill="#b5cea8">10000</tspan>   <tspan fill="#9aa4b8"># 인터프리터 실행 횟수 임계값</tspan></text>
  <text x="76" y="486" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">-XX:ReservedCodeCacheSize=<tspan fill="#b5cea8">256m</tspan>  <tspan fill="#9aa4b8"># Code Cache 크기</tspan></text>
</svg>
