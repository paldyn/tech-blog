<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">캐시 전략 3가지</text>
  <text x="440" y="70" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#888">Cache-First · Network-First · Stale-While-Revalidate</text>

  <!-- ── Strategy 1: Cache-First ── -->
  <rect x="50" y="92" width="240" height="340" rx="8" fill="#0d1117" stroke="#3a4a6e" stroke-width="1.5"/>
  <rect x="50" y="92" width="240" height="34" rx="8" fill="#1a2b1a"/>
  <rect x="50" y="113" width="240" height="13" fill="#1a2b1a"/>
  <text x="170" y="113" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="700" fill="#55c555">Cache-First</text>
  <text x="170" y="140" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">캐시 우선, 없으면 네트워크</text>
  <text x="66" y="165"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555">✅ 속도 최적 (오프라인 지원)</text>
  <text x="66" y="183"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e05555">❌ 최신 데이터 아닐 수 있음</text>
  <text x="170" y="205" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">이미지·폰트·정적 에셋</text>
  <!-- Code -->
  <rect x="60" y="215" width="220" height="196" rx="4" fill="#000000" stroke="#3a4a6e"/>
  <text x="70" y="237" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#ffffff">e.respondWith(</text>
  <text x="70" y="255" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#ffffff">  caches.match(e.request)</text>
  <text x="70" y="273" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#ffffff">  .then(r => r ||</text>
  <text x="70" y="291" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#ffffff">    fetch(e.request)</text>
  <text x="70" y="309" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#ffffff">    .then(res => {</text>
  <text x="70" y="327" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#ffffff">      cache.put(req,res);</text>
  <text x="70" y="345" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#ffffff">      <tspan fill="#7ec8e3">return</tspan> res;</text>
  <text x="70" y="363" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#ffffff">    })</text>
  <text x="70" y="381" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#ffffff">  )</text>
  <text x="70" y="399" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#ffffff">);</text>

  <!-- ── Strategy 2: Network-First ── -->
  <rect x="320" y="92" width="240" height="340" rx="8" fill="#0d1117" stroke="#3a4a6e" stroke-width="1.5"/>
  <rect x="320" y="92" width="240" height="34" rx="8" fill="#1a1f35"/>
  <rect x="320" y="113" width="240" height="13" fill="#1a1f35"/>
  <text x="440" y="113" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="700" fill="#7ec8e3">Network-First</text>
  <text x="440" y="140" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">네트워크 우선, 실패 시 캐시</text>
  <text x="336" y="165"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555">✅ 최신 데이터 보장</text>
  <text x="336" y="183"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e05555">❌ 오프라인 시 구 버전</text>
  <text x="440" y="205" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">API 응답·HTML 페이지</text>
  <rect x="330" y="215" width="220" height="196" rx="4" fill="#000000" stroke="#3a4a6e"/>
  <text x="340" y="237" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#ffffff">e.respondWith(</text>
  <text x="340" y="255" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#ffffff">  fetch(e.request)</text>
  <text x="340" y="273" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#ffffff">  .then(res => {</text>
  <text x="340" y="291" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#ffffff">    cache.put(req,res.clone());</text>
  <text x="340" y="309" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#ffffff">    <tspan fill="#7ec8e3">return</tspan> res;</text>
  <text x="340" y="327" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#ffffff">  })</text>
  <text x="340" y="345" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#ffffff">  .catch(() =></text>
  <text x="340" y="363" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#ffffff">    caches.match(e.request)</text>
  <text x="340" y="381" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#ffffff">  )</text>
  <text x="340" y="399" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#ffffff">);</text>

  <!-- ── Strategy 3: SWR ── -->
  <rect x="590" y="92" width="240" height="340" rx="8" fill="#0d1117" stroke="#3a4a6e" stroke-width="1.5"/>
  <rect x="590" y="92" width="240" height="34" rx="8" fill="#1a1f2a"/>
  <rect x="590" y="113" width="240" height="13" fill="#1a1f2a"/>
  <text x="710" y="113" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="700" fill="#7777cc">Stale-While-Revalidate</text>
  <text x="710" y="140" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">캐시 즉시 반환 + 백그라운드 갱신</text>
  <text x="606" y="165"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555">✅ 빠른 응답 + 점진적 최신화</text>
  <text x="606" y="183"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">◐ 잠깐 구 버전 표시 가능</text>
  <text x="710" y="205" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">뉴스·피드·앱 셸</text>
  <rect x="600" y="215" width="220" height="196" rx="4" fill="#000000" stroke="#3a4a6e"/>
  <text x="610" y="237" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#ffffff"><tspan fill="#7ec8e3">const</tspan> cached =</text>
  <text x="610" y="255" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#ffffff">  caches.match(e.request);</text>
  <text x="610" y="273" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#ffffff"><tspan fill="#7ec8e3">const</tspan> fresh = fetch(e.request)</text>
  <text x="610" y="291" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#ffffff">  .then(res => {</text>
  <text x="610" y="309" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#ffffff">    cache.put(req,res.clone());</text>
  <text x="610" y="327" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#ffffff">    <tspan fill="#7ec8e3">return</tspan> res;</text>
  <text x="610" y="345" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#ffffff">  });</text>
  <text x="610" y="363" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#ffffff">e.respondWith(</text>
  <text x="610" y="381" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#ffffff">  cached || fresh</text>
  <text x="610" y="399" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#ffffff">);</text>
</svg>
