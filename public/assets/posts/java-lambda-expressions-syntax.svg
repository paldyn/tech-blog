<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">람다 표현식 — 문법 해부</text>

  <!-- Lambda anatomy -->
  <rect x="60" y="66" width="760" height="80" rx="10" fill="#0d0d25" stroke="#7777cc" stroke-width="1.5"/>

  <!-- Lambda code display -->
  <text x="160" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="26" font-weight="600" fill="#7ec8e3" text-anchor="middle">(x, y)</text>
  <text x="310" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="26" font-weight="600" fill="#e8c542" text-anchor="middle">-&gt;</text>
  <text x="530" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="26" font-weight="600" fill="#55c555" text-anchor="middle">x + y</text>

  <!-- Labels below lambda -->
  <line x1="160" y1="148" x2="160" y2="166" stroke="#7ec8e3" stroke-width="1.5"/>
  <rect x="80" y="168" width="160" height="44" rx="6" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="160" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">파라미터 목록</text>
  <text x="160" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">타입 생략 가능 (추론)</text>

  <line x1="310" y1="148" x2="310" y2="166" stroke="#e8c542" stroke-width="1.5"/>
  <rect x="230" y="168" width="160" height="44" rx="6" fill="#111" stroke="#e8c542" stroke-width="1"/>
  <text x="310" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8c542" text-anchor="middle">화살표 연산자</text>
  <text x="310" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">파라미터와 본문 구분</text>

  <line x1="530" y1="148" x2="530" y2="166" stroke="#55c555" stroke-width="1.5"/>
  <rect x="420" y="168" width="220" height="44" rx="6" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="530" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">본문 (표현식 or 블록)</text>
  <text x="530" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">단일 식이면 return 생략</text>

  <!-- Divider -->
  <line x1="60" y1="228" x2="820" y2="228" stroke="#222" stroke-width="1"/>
  <text x="440" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">다양한 람다 형태</text>

  <!-- Form 1: 파라미터 0개 -->
  <rect x="60" y="260" width="370" height="50" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="281" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 파라미터 없음</text>
  <text x="76" y="299" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan font-weight="600" fill="#7ec8e3">Runnable</tspan><tspan fill="#ffffff"> r = () -&gt; </tspan><tspan font-weight="600" fill="#7ec8e3">System</tspan><tspan fill="#ffffff">.out.</tspan><tspan font-weight="600" fill="#7ec8e3">println</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"Hi"</tspan><tspan fill="#ffffff">);</tspan>
  </text>

  <!-- Form 2: 파라미터 1개 -->
  <rect x="450" y="260" width="370" height="50" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="466" y="281" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 파라미터 1개, 괄호 생략 가능</text>
  <text x="466" y="299" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan font-weight="600" fill="#7ec8e3">Consumer</tspan><tspan fill="#ffffff">&lt;</tspan><tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff">&gt; c = s -&gt; </tspan><tspan font-weight="600" fill="#7ec8e3">print</tspan><tspan fill="#ffffff">(s);</tspan>
  </text>

  <!-- Form 3: 블록 본문 -->
  <rect x="60" y="326" width="370" height="86" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="347" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 블록 본문 (여러 문장)</text>
  <text x="76" y="367" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan font-weight="600" fill="#7ec8e3">Comparator</tspan><tspan fill="#ffffff">&lt;</tspan><tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff">&gt; cmp = (a, b) -&gt; {</tspan>
  </text>
  <text x="76" y="387" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    </tspan><tspan font-weight="600" fill="#7ec8e3">int</tspan><tspan fill="#ffffff"> diff = a.</tspan><tspan font-weight="600" fill="#7ec8e3">length</tspan><tspan fill="#ffffff">() - b.</tspan><tspan font-weight="600" fill="#7ec8e3">length</tspan><tspan fill="#ffffff">();</tspan>
  </text>
  <text x="76" y="403" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    </tspan><tspan font-weight="600" fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> diff != </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff"> ? diff : a.</tspan><tspan font-weight="600" fill="#7ec8e3">compareTo</tspan><tspan fill="#ffffff">(b);</tspan>
  </text>
  <text x="76" y="404" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">};</tspan></text>

  <!-- Form 4: effectively final 캡처 -->
  <rect x="450" y="326" width="370" height="86" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="466" y="347" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// effectively final 변수 캡처</text>
  <text x="466" y="367" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff"> prefix = </tspan><tspan fill="#ce9178">"Hello"</tspan><tspan fill="#ffffff">;</tspan>
  </text>
  <text x="466" y="387" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan font-weight="600" fill="#7ec8e3">Function</tspan><tspan fill="#ffffff">&lt;</tspan><tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff">, </tspan><tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff">&gt; fn =</tspan>
  </text>
  <text x="466" y="407" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    name -&gt; prefix + </tspan><tspan fill="#ce9178">" "</tspan><tspan fill="#ffffff"> + name;</tspan>
  </text>

  <text x="440" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">람다는 함수형 인터페이스의 인스턴스 — @FunctionalInterface 어노테이션이 달린 인터페이스에만 사용 가능</text>
  <text x="440" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">캡처 변수는 effectively final (한 번 초기화 후 변경 없어야 함)</text>
</svg>
