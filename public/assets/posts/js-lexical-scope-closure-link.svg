<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">렉시컬 환경과 클로저</text>
  <text x="440" y="70" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">Lexical Environment &amp; Closure Connection</text>

  <!-- Outer function environment -->
  <rect x="60" y="90" width="340" height="290" fill="#0d0d1a" rx="10" stroke="#1a1a3a" stroke-width="1.5"/>
  <text x="230" y="114" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" text-anchor="middle">makeGreeter 렉시컬 환경</text>

  <rect x="76" y="124" width="308" height="240" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="92" y="144" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">function</tspan> makeGreeter(lang) {</text>
  <text x="92" y="162" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  // lang 이 환경에 저장</text>
  <text x="92" y="180" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">const</tspan> greetings = {</text>
  <text x="92" y="198" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    ko: <tspan fill="#ce9178">'안녕하세요'</tspan>,</text>
  <text x="92" y="216" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    en: <tspan fill="#ce9178">'Hello'</tspan>,</text>
  <text x="92" y="234" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  };</text>
  <text x="92" y="252" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">return function</tspan>(name) {</text>
  <text x="92" y="270" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    // 외부 lang, greetings 참조</text>
  <text x="92" y="288" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    <tspan fill="#7ec8e3">return</tspan> <tspan fill="#ce9178">`</tspan><tspan fill="#e8e8e8">${greetings[lang]}</tspan><tspan fill="#ce9178">, </tspan><tspan fill="#e8e8e8">${name}</tspan><tspan fill="#ce9178">!`</tspan>;</text>
  <text x="92" y="306" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  };</text>
  <text x="92" y="324" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">}</text>

  <!-- Arrows -->
  <polygon points="406,230 420,222 420,238" fill="#7ec8e3"/>
  <rect x="406" y="228" width="14" height="4" fill="#7ec8e3" rx="1"/>

  <!-- Closure instances -->
  <rect x="430" y="90" width="390" height="130" fill="#0a0d0a" rx="10" stroke="#1a3a1a" stroke-width="1.5"/>
  <text x="625" y="114" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" text-anchor="middle">클로저 인스턴스 — greetKo</text>

  <rect x="446" y="124" width="358" height="80" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="462" y="144" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">const</tspan> greetKo = makeGreeter(<tspan fill="#ce9178">'ko'</tspan>);</text>
  <text x="462" y="162" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">// greetKo는 lang='ko'인 환경 보유</text>
  <text x="462" y="180" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">greetKo(<tspan fill="#ce9178">'홍길동'</tspan>); <tspan fill="#6a8aa0">// '안녕하세요, 홍길동!'</tspan></text>

  <rect x="430" y="234" width="390" height="130" fill="#0d1a0d" rx="10" stroke="#1a3a1a" stroke-width="1.5"/>
  <text x="625" y="258" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" text-anchor="middle">클로저 인스턴스 — greetEn</text>

  <rect x="446" y="268" width="358" height="80" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="462" y="288" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">const</tspan> greetEn = makeGreeter(<tspan fill="#ce9178">'en'</tspan>);</text>
  <text x="462" y="306" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">// greetEn은 lang='en'인 환경 보유</text>
  <text x="462" y="324" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">greetEn(<tspan fill="#ce9178">'Alice'</tspan>); <tspan fill="#6a8aa0">// 'Hello, Alice!'</tspan></text>

  <!-- Key insight -->
  <rect x="60" y="400" width="760" height="30" fill="#0a1a0a" rx="6"/>
  <text x="440" y="419" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" text-anchor="middle">각 클로저는 독립된 렉시컬 환경을 가집니다 — 렉시컬 스코프 덕분에 가능</text>

  <!-- Footer -->
  <text x="440" y="442" fill="#444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">PALDYN · JavaScript 완전 정복</text>
</svg>
