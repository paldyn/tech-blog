<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">OSI 캡슐화 — 헤더가 계층마다 추가되는 과정</text>

  <!-- Application data -->
  <rect x="60" y="70" width="760" height="40" rx="6" fill="#2a0a2a" stroke="#cc55cc" stroke-width="1.5"/>
  <text x="180" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#cc55cc">7 응용</text>
  <text x="440" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">Application Data (메시지)</text>

  <!-- Transport -->
  <rect x="60" y="126" width="760" height="40" rx="6" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <rect x="60" y="126" width="100" height="40" rx="6" fill="#0a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="110" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">4 전송</text>
  <text x="110" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3" text-anchor="middle">TCP 헤더</text>
  <text x="490" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">Application Data (세그먼트)</text>

  <!-- Network -->
  <rect x="60" y="182" width="760" height="40" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <rect x="60" y="182" width="160" height="40" rx="6" fill="#0a2a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="140" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">3 네트워크</text>
  <text x="140" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">IP 헤더 | TCP 헤더</text>
  <text x="530" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">Data (패킷)</text>

  <!-- Data Link -->
  <rect x="60" y="238" width="760" height="40" rx="6" fill="#1a1200" stroke="#c8c855" stroke-width="1.5"/>
  <rect x="60" y="238" width="220" height="40" rx="6" fill="#2a2000" stroke="#c8c855" stroke-width="1.5"/>
  <text x="170" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#c8c855" text-anchor="middle">2 데이터링크</text>
  <text x="170" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#c8c855" text-anchor="middle">이더넷 헤더 | IP | TCP</text>
  <rect x="760" y="238" width="60" height="40" rx="0" fill="#1a1800" stroke="#c8c855" stroke-width="1.5"/>
  <text x="790" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#c8c855" text-anchor="middle">FCS</text>
  <text x="520" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">Data (프레임)</text>

  <!-- Physical -->
  <rect x="60" y="294" width="760" height="40" rx="6" fill="#1a0a00" stroke="#e8a55c" stroke-width="1.5"/>
  <text x="440" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8a55c" text-anchor="middle">1 물리</text>
  <text x="440" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">01001101 01000101 ... (비트 스트림)</text>

  <!-- Down arrows between layers -->
  <line x1="440" y1="110" x2="440" y2="124" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-r)"/>
  <line x1="440" y1="166" x2="440" y2="180" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-r)"/>
  <line x1="440" y1="222" x2="440" y2="236" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-r)"/>
  <line x1="440" y1="278" x2="440" y2="292" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-r)"/>

  <!-- Bottom description -->
  <rect x="60" y="360" width="760" height="70" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">캡슐화(Encapsulation): 각 계층이 헤더/트레일러를 붙여 하위 계층으로 전달</text>
  <text x="440" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">수신 측은 역순으로 헤더를 제거하며 상위 계층으로 전달 (역캡슐화)</text>
</svg>
