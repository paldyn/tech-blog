<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="arrd" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arru" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="440" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">캡슐화 (Encapsulation)</text>
  <text x="440" y="60" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">각 계층이 헤더(또는 트레일러)를 추가하며 데이터를 감싸는 과정</text>

  <!-- L7: Data -->
  <rect x="280" y="80" width="320" height="34" rx="5" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">DATA (응용 데이터)</text>

  <!-- L4: TCP Header + Data -->
  <rect x="210" y="126" width="70" height="34" rx="5" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="245" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" font-weight="600" fill="#55c555" text-anchor="middle">TCP H</text>
  <rect x="280" y="126" width="320" height="34" rx="5" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">DATA</text>
  <text x="160" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">세그먼트</text>

  <!-- L3: IP Header + TCP + Data -->
  <rect x="140" y="172" width="70" height="34" rx="5" fill="#2a1a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="175" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" font-weight="600" fill="#e05555" text-anchor="middle">IP H</text>
  <rect x="210" y="172" width="70" height="34" rx="5" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="245" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">TCP H</text>
  <rect x="280" y="172" width="320" height="34" rx="5" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">DATA</text>
  <text x="90" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">패킷</text>

  <!-- L2: ETH Header + IP + TCP + Data + FCS -->
  <rect x="70" y="218" width="70" height="34" rx="5" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="105" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" font-weight="600" fill="#7777cc" text-anchor="middle">ETH H</text>
  <rect x="140" y="218" width="70" height="34" rx="5" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="175" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">IP H</text>
  <rect x="210" y="218" width="70" height="34" rx="5" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="245" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">TCP H</text>
  <rect x="280" y="218" width="320" height="34" rx="5" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">DATA</text>
  <rect x="600" y="218" width="50" height="34" rx="5" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="625" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" font-weight="600" fill="#7777cc" text-anchor="middle">FCS</text>
  <text x="660" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">프레임</text>

  <!-- L1: Bits -->
  <rect x="70" y="264" width="580" height="34" rx="5" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="360" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">01001000 01100101 01101100 01101100 ... (비트 스트림)</text>

  <!-- Down arrow -->
  <line x1="760" y1="90" x2="760" y2="280" stroke="#55c555" stroke-width="2" marker-end="url(#arrd)"/>
  <text x="770" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">송신</text>
  <text x="770" y="199" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">7→1</text>

  <!-- Bottom note -->
  <rect x="60" y="318" width="760" height="56" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="341" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">수신 측은 반대로 1→7 방향으로 각 계층의 헤더를 제거하며 역캡슐화(Decapsulation)한다.</text>
  <text x="440" y="361" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">같은 계층끼리 논리적으로 통신하는 것처럼 보이지만 실제로는 물리 계층을 통한 비트가 이동한다.</text>
</svg>
