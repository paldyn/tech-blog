<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">OSI 캡슐화 (Encapsulation)</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">각 계층이 헤더를 추가하며 데이터가 내려가는 과정</text>

  <!-- Layer labels on left -->
  <text x="70" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="start">응용(7)</text>
  <text x="70" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="start">전송(4)</text>
  <text x="70" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="start">네트워크(3)</text>
  <text x="70" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555" text-anchor="start">데이터링크(2)</text>
  <text x="70" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ce9178" text-anchor="start">물리(1)</text>

  <!-- Row 1: Application data -->
  <rect x="160" y="96" width="560" height="40" rx="6" fill="#1a1a35" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">Data (HTTP Request)</text>

  <!-- Arrow down -->
  <text x="440" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#555" text-anchor="middle">+TCP Header ↓</text>

  <!-- Row 2: TCP segment -->
  <rect x="160" y="160" width="120" height="40" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="220" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">TCP HDR</text>
  <rect x="280" y="160" width="440" height="40" rx="6" fill="#1a1a35" stroke="#7777cc" stroke-width="1"/>
  <text x="500" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Data</text>

  <!-- Arrow down -->
  <text x="440" y="219" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#555" text-anchor="middle">+IP Header ↓</text>

  <!-- Row 3: IP packet -->
  <rect x="160" y="224" width="100" height="40" rx="6" fill="#1a2a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="210" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">IP HDR</text>
  <rect x="260" y="224" width="120" height="40" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="320" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">TCP HDR</text>
  <rect x="380" y="224" width="340" height="40" rx="6" fill="#1a1a35" stroke="#7777cc" stroke-width="1"/>
  <text x="550" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Data</text>

  <!-- Arrow down -->
  <text x="440" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#555" text-anchor="middle">+Ethernet Header ↓</text>

  <!-- Row 4: Ethernet frame -->
  <rect x="160" y="288" width="80" height="40" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="200" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e05555" text-anchor="middle">ETH HDR</text>
  <rect x="240" y="288" width="80" height="40" rx="6" fill="#1a2a1a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="280" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3" text-anchor="middle">IP HDR</text>
  <rect x="320" y="288" width="80" height="40" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="360" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">TCP HDR</text>
  <rect x="400" y="288" width="240" height="40" rx="6" fill="#1a1a35" stroke="#7777cc" stroke-width="1"/>
  <text x="520" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Data</text>
  <rect x="640" y="288" width="80" height="40" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="680" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e05555" text-anchor="middle">FCS</text>

  <!-- Row 5: bits -->
  <text x="440" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#555" text-anchor="middle">전기신호/광신호 변환 ↓</text>
  <rect x="160" y="358" width="560" height="40" rx="6" fill="#1a1212" stroke="#ce9178" stroke-width="1.5"/>
  <text x="440" y="383" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" text-anchor="middle">01001000 01010100 01010100 01010000 ...</text>

  <!-- Right side note -->
  <text x="740" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="start">PDU: Data</text>
  <text x="740" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="start">PDU: Segment</text>
  <text x="740" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="start">PDU: Packet</text>
  <text x="740" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="start">PDU: Frame</text>
  <text x="740" y="383" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="start">PDU: Bit</text>

  <!-- Summary bar -->
  <rect x="160" y="416" width="560" height="28" rx="6" fill="#0f1a2a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="435" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">수신 시 역순으로 디캡슐화 — 각 계층이 자신의 헤더를 제거 후 위 계층에 전달</text>
</svg>
