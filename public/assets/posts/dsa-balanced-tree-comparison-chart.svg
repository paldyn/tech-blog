<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">균형 트리 비교표</text>

  <!-- Table header -->
  <rect x="50" y="62" width="780" height="40" fill="#1a2a4a" rx="6"/>
  <text x="140" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">종류</text>
  <text x="290" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">균형 조건</text>
  <text x="430" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">높이</text>
  <text x="570" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">삽입/삭제</text>
  <text x="730" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">주요 사용처</text>

  <!-- Row 1: AVL -->
  <rect x="50" y="102" width="780" height="52" fill="#0d1520" rx="0"/>
  <text x="140" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">AVL 트리</text>
  <text x="140" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">1962</text>
  <text x="290" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">|BF| ≤ 1 (엄격)</text>
  <text x="430" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">1.44 log n</text>
  <text x="570" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">회전 많음</text>
  <text x="570" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">O(log n)</text>
  <text x="730" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">읽기 위주 DB</text>

  <!-- Row 2: RB -->
  <rect x="50" y="154" width="780" height="52" fill="#111827" rx="0"/>
  <text x="140" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">레드-블랙 트리</text>
  <text x="140" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">1978</text>
  <text x="290" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">블랙 높이 동일</text>
  <text x="430" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">2 log n</text>
  <text x="570" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">회전 ≤3번</text>
  <text x="570" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">O(log n)</text>
  <text x="730" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">std::map, TreeMap</text>

  <!-- Row 3: B-tree -->
  <rect x="50" y="206" width="780" height="52" fill="#0d1520" rx="0"/>
  <text x="140" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">B 트리</text>
  <text x="140" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">1970</text>
  <text x="290" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">자식 수 [t, 2t]</text>
  <text x="430" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">log_t n</text>
  <text x="570" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">분할/병합</text>
  <text x="570" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">O(log n)</text>
  <text x="730" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">파일 시스템, DB</text>

  <!-- Row 4: B+ tree -->
  <rect x="50" y="258" width="780" height="52" fill="#111827" rx="0"/>
  <text x="140" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">B+ 트리</text>
  <text x="140" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">1973</text>
  <text x="290" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">리프 연결 리스트</text>
  <text x="430" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">log_t n</text>
  <text x="570" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">범위 검색 O(k)</text>
  <text x="570" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">O(log n)</text>
  <text x="730" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">MySQL InnoDB, PostgreSQL</text>

  <!-- Row 5: Treap -->
  <rect x="50" y="310" width="780" height="52" fill="#0d1520" rx="0"/>
  <text x="140" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Treap</text>
  <text x="140" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">랜덤</text>
  <text x="290" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">랜덤 우선순위 힙</text>
  <text x="430" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">O(log n) 기대</text>
  <text x="570" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">간단한 구현</text>
  <text x="730" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">경쟁 프로그래밍</text>

  <!-- Border -->
  <rect x="50" y="102" width="780" height="260" fill="none" rx="0" stroke="#3a4a6e" stroke-width="1"/>
  <!-- col dividers -->
  <line x1="196" y1="102" x2="196" y2="362" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="356" y1="102" x2="356" y2="362" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="500" y1="102" x2="500" y2="362" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="638" y1="102" x2="638" y2="362" stroke="#3a4a6e" stroke-width="1"/>
  <!-- row dividers -->
  <line x1="50" y1="154" x2="830" y2="154" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="50" y1="206" x2="830" y2="206" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="50" y1="258" x2="830" y2="258" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="50" y1="310" x2="830" y2="310" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Decision guide -->
  <rect x="50" y="375" width="780" height="65" fill="#0f1a2e" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="397" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">선택 기준</text>
  <text x="440" y="415" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">인메모리 + 읽기 많음 → AVL | 인메모리 + 쓰기 많음 → 레드-블랙</text>
  <text x="440" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">디스크 기반 + 범위 검색 → B+ 트리 | 디스크 기반 + 범용 → B 트리</text>
</svg>
