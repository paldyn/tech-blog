<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">Structured Clone · 지원 타입과 제외 타입</text>

  <!-- Supported column -->
  <rect x="60" y="66" width="360" height="340" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="92" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#55c555">✓ 복제 가능</text>

  <!-- items -->
  <text x="88" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">기본 타입</text>
  <text x="200" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">String, Number, Boolean, null, undefined, BigInt</text>

  <line x1="80" y1="132" x2="400" y2="132" stroke="#1e2433" stroke-width="1"/>

  <text x="88" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">객체/배열</text>
  <text x="200" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">Object, Array (중첩 포함)</text>

  <line x1="80" y1="164" x2="400" y2="164" stroke="#1e2433" stroke-width="1"/>

  <text x="88" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">날짜·정규식</text>
  <text x="200" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">Date, RegExp</text>

  <line x1="80" y1="196" x2="400" y2="196" stroke="#1e2433" stroke-width="1"/>

  <text x="88" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">컬렉션</text>
  <text x="200" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">Map, Set</text>

  <line x1="80" y1="228" x2="400" y2="228" stroke="#1e2433" stroke-width="1"/>

  <text x="88" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">바이너리</text>
  <text x="200" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">ArrayBuffer, TypedArray, DataView</text>

  <line x1="80" y1="260" x2="400" y2="260" stroke="#1e2433" stroke-width="1"/>

  <text x="88" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">파일/이미지</text>
  <text x="200" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">Blob, File, ImageBitmap, ImageData</text>

  <line x1="80" y1="292" x2="400" y2="292" stroke="#1e2433" stroke-width="1"/>

  <text x="88" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">에러</text>
  <text x="200" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">Error 계열 (ES2022+)</text>

  <line x1="80" y1="324" x2="400" y2="324" stroke="#1e2433" stroke-width="1"/>

  <text x="88" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">순환 참조</text>
  <text x="200" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">지원 (JSON.stringify 불가 케이스)</text>

  <line x1="80" y1="356" x2="400" y2="356" stroke="#1e2433" stroke-width="1"/>

  <text x="88" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">원시래퍼</text>
  <text x="200" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">Boolean, Number, String 객체</text>

  <!-- Not supported column -->
  <rect x="460" y="66" width="360" height="340" rx="8" fill="#0d1117" stroke="#e05555" stroke-width="1.5"/>
  <text x="640" y="92" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#e05555">✗ 복제 불가 (에러 발생)</text>

  <text x="478" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">Function</text>
  <text x="598" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">함수는 직렬화 불가</text>

  <line x1="470" y1="136" x2="800" y2="136" stroke="#1e2433" stroke-width="1"/>

  <text x="478" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">Symbol</text>
  <text x="598" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">전역 Symbol 제외</text>

  <line x1="470" y1="168" x2="800" y2="168" stroke="#1e2433" stroke-width="1"/>

  <text x="478" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">WeakMap / WeakSet</text>
  <text x="598" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">약한 참조 특성상 불가</text>

  <line x1="470" y1="200" x2="800" y2="200" stroke="#1e2433" stroke-width="1"/>

  <text x="478" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">DOM 노드</text>
  <text x="598" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Worker에 DOM 없음</text>

  <line x1="470" y1="232" x2="800" y2="232" stroke="#1e2433" stroke-width="1"/>

  <text x="478" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">Proxy</text>
  <text x="598" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">핸들러 복제 불가</text>

  <line x1="470" y1="264" x2="800" y2="264" stroke="#1e2433" stroke-width="1"/>

  <text x="478" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">클래스 인스턴스</text>
  <text x="598" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">프로토타입 체인 소실</text>

  <line x1="470" y1="296" x2="800" y2="296" stroke="#1e2433" stroke-width="1"/>

  <text x="478" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">getter/setter</text>
  <text x="598" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">프로퍼티 값만 복제</text>

  <!-- note at bottom -->
  <text x="440" y="426" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#7ec8e3">structuredClone(value) — Node 17+ / 모던 브라우저에서 전역 함수로 사용 가능</text>
</svg>
