<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">구조적 vs 비구조적 프루닝</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">가중치를 제거하는 두 가지 전략의 차이</text>

  <!-- Unstructured Pruning -->
  <rect x="60" y="96" width="360" height="230" rx="6" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">비구조적 프루닝</text>
  <text x="240" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">(Weight Pruning / Fine-grained)</text>

  <!-- Weight matrix visualization: unstructured -->
  <!-- 4x6 grid with some zeroed out randomly -->
  <rect x="100" y="155" width="28" height="24" rx="2" fill="#2a2a5a"/>
  <rect x="132" y="155" width="28" height="24" rx="2" fill="#111" stroke="#333"/>
  <rect x="164" y="155" width="28" height="24" rx="2" fill="#2a2a5a"/>
  <rect x="196" y="155" width="28" height="24" rx="2" fill="#2a2a5a"/>
  <rect x="228" y="155" width="28" height="24" rx="2" fill="#111" stroke="#333"/>
  <rect x="260" y="155" width="28" height="24" rx="2" fill="#2a2a5a"/>
  <rect x="292" y="155" width="28" height="24" rx="2" fill="#111" stroke="#333"/>
  <rect x="324" y="155" width="28" height="24" rx="2" fill="#2a2a5a"/>

  <rect x="100" y="183" width="28" height="24" rx="2" fill="#111" stroke="#333"/>
  <rect x="132" y="183" width="28" height="24" rx="2" fill="#2a2a5a"/>
  <rect x="164" y="183" width="28" height="24" rx="2" fill="#111" stroke="#333"/>
  <rect x="196" y="183" width="28" height="24" rx="2" fill="#2a2a5a"/>
  <rect x="228" y="183" width="28" height="24" rx="2" fill="#2a2a5a"/>
  <rect x="260" y="183" width="28" height="24" rx="2" fill="#111" stroke="#333"/>
  <rect x="292" y="183" width="28" height="24" rx="2" fill="#2a2a5a"/>
  <rect x="324" y="183" width="28" height="24" rx="2" fill="#111" stroke="#333"/>

  <rect x="100" y="211" width="28" height="24" rx="2" fill="#2a2a5a"/>
  <rect x="132" y="211" width="28" height="24" rx="2" fill="#2a2a5a"/>
  <rect x="164" y="211" width="28" height="24" rx="2" fill="#111" stroke="#333"/>
  <rect x="196" y="211" width="28" height="24" rx="2" fill="#2a2a5a"/>
  <rect x="228" y="211" width="28" height="24" rx="2" fill="#111" stroke="#333"/>
  <rect x="260" y="211" width="28" height="24" rx="2" fill="#2a2a5a"/>
  <rect x="292" y="211" width="28" height="24" rx="2" fill="#2a2a5a"/>
  <rect x="324" y="211" width="28" height="24" rx="2" fill="#111" stroke="#333"/>

  <text x="240" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">■ 활성 가중치  □ 제거된 가중치 (0)</text>

  <text x="80" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">✓ 파라미터 비율 높음 (50~90% 제거 가능)</text>
  <text x="80" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">✗ 희소 행렬 → 전용 하드웨어 필요</text>
  <text x="80" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">사례: SparseGPT, Wanda</text>

  <!-- Structured Pruning -->
  <rect x="460" y="96" width="360" height="230" rx="6" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">구조적 프루닝</text>
  <text x="640" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">(Channel / Head Pruning)</text>

  <!-- Weight matrix visualization: structured (whole rows removed) -->
  <rect x="500" y="155" width="28" height="24" rx="2" fill="#1a3a1a"/>
  <rect x="532" y="155" width="28" height="24" rx="2" fill="#1a3a1a"/>
  <rect x="564" y="155" width="28" height="24" rx="2" fill="#1a3a1a"/>
  <rect x="596" y="155" width="28" height="24" rx="2" fill="#1a3a1a"/>
  <rect x="628" y="155" width="28" height="24" rx="2" fill="#1a3a1a"/>
  <rect x="660" y="155" width="28" height="24" rx="2" fill="#1a3a1a"/>
  <rect x="692" y="155" width="28" height="24" rx="2" fill="#1a3a1a"/>
  <rect x="724" y="155" width="28" height="24" rx="2" fill="#1a3a1a"/>

  <!-- Row 2: removed (gray) -->
  <rect x="500" y="183" width="280" height="24" rx="2" fill="#111" stroke="#333"/>
  <text x="640" y="199" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">제거된 채널 (행 전체)</text>

  <rect x="500" y="211" width="28" height="24" rx="2" fill="#1a3a1a"/>
  <rect x="532" y="211" width="28" height="24" rx="2" fill="#1a3a1a"/>
  <rect x="564" y="211" width="28" height="24" rx="2" fill="#1a3a1a"/>
  <rect x="596" y="211" width="28" height="24" rx="2" fill="#1a3a1a"/>
  <rect x="628" y="211" width="28" height="24" rx="2" fill="#1a3a1a"/>
  <rect x="660" y="211" width="28" height="24" rx="2" fill="#1a3a1a"/>
  <rect x="692" y="211" width="28" height="24" rx="2" fill="#1a3a1a"/>
  <rect x="724" y="211" width="28" height="24" rx="2" fill="#1a3a1a"/>

  <text x="640" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">■ 활성 채널  ─ 제거된 채널</text>

  <text x="480" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ 실제 모델 크기 감소</text>
  <text x="480" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ 표준 하드웨어에서 즉각 가속</text>
  <text x="480" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">사례: LLM-Pruner, ShortGPT</text>

  <!-- Bottom: magnitude pruning code -->
  <rect x="60" y="346" width="760" height="90" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># Magnitude Pruning (절댓값 기준 가중치 제거)</text>
  <text x="76" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">import</text>
  <text x="124" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> torch.nn.utils.prune </text>
  <text x="292" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">as</text>
  <text x="312" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> prune</text>
  <text x="76" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">prune.l1_unstructured(layer, name=</text>
  <text x="376" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">"weight"</text>
  <text x="436" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">, amount=</text>
  <text x="508" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">0.5</text>
  <text x="532" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">)  </text>
  <text x="556" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># 50% 제거</text>
  <text x="76" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">prune.remove(layer, </text>
  <text x="220" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">"weight"</text>
  <text x="280" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">)      </text>
  <text x="340" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># 마스크 영구 적용</text>
</svg>
