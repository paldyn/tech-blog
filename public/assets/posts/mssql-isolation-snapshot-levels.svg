<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SQL Server 격리 수준 — 동시성 이상 현상 대응</text>

  <!-- Header row -->
  <rect x="60" y="68" width="760" height="36" rx="4" fill="#111122" stroke="#3a4a6e" stroke-width="1"/>
  <text x="160" y="91" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">격리 수준</text>
  <text x="330" y="91" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Dirty Read</text>
  <text x="460" y="91" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Non-Rep. Read</text>
  <text x="600" y="91" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Phantom Read</text>
  <text x="740" y="91" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">락 방식</text>
  <line x1="240" y1="68" x2="240" y2="104" stroke="#2a2a3e" stroke-width="1"/>
  <line x1="400" y1="68" x2="400" y2="104" stroke="#2a2a3e" stroke-width="1"/>
  <line x1="520" y1="68" x2="520" y2="104" stroke="#2a2a3e" stroke-width="1"/>
  <line x1="670" y1="68" x2="670" y2="104" stroke="#2a2a3e" stroke-width="1"/>

  <!-- READ UNCOMMITTED -->
  <rect x="60" y="104" width="760" height="44" rx="0" fill="#1a0a0a" stroke="#3a1a1a" stroke-width="1"/>
  <text x="160" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">READ UNCOMMITTED</text>
  <text x="330" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">발생</text>
  <text x="460" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">발생</text>
  <text x="600" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">발생</text>
  <text x="740" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">공유락 없음</text>
  <line x1="240" y1="104" x2="240" y2="148" stroke="#2a1a1a" stroke-width="1"/>
  <line x1="400" y1="104" x2="400" y2="148" stroke="#2a1a1a" stroke-width="1"/>
  <line x1="520" y1="104" x2="520" y2="148" stroke="#2a1a1a" stroke-width="1"/>
  <line x1="670" y1="104" x2="670" y2="148" stroke="#2a1a1a" stroke-width="1"/>

  <!-- READ COMMITTED (기본) -->
  <rect x="60" y="148" width="760" height="44" rx="0" fill="#0d0d18" stroke="#2a2a3e" stroke-width="1"/>
  <text x="160" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">READ COMMITTED</text>
  <text x="160" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">(SQL Server 기본값)</text>
  <text x="330" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">방지</text>
  <text x="460" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">발생</text>
  <text x="600" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">발생</text>
  <text x="740" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">공유락 즉시 해제</text>
  <line x1="240" y1="148" x2="240" y2="192" stroke="#2a2a3e" stroke-width="1"/>
  <line x1="400" y1="148" x2="400" y2="192" stroke="#2a2a3e" stroke-width="1"/>
  <line x1="520" y1="148" x2="520" y2="192" stroke="#2a2a3e" stroke-width="1"/>
  <line x1="670" y1="148" x2="670" y2="192" stroke="#2a2a3e" stroke-width="1"/>

  <!-- RCSI -->
  <rect x="60" y="192" width="760" height="44" rx="0" fill="#0f1a0f" stroke="#2a4a2a" stroke-width="1"/>
  <text x="160" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">READ COMMITTED</text>
  <text x="160" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">SNAPSHOT (RCSI)</text>
  <text x="330" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">방지</text>
  <text x="460" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">발생</text>
  <text x="600" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">발생</text>
  <text x="740" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">행 버전 (락 없음)</text>
  <line x1="240" y1="192" x2="240" y2="236" stroke="#2a4a2a" stroke-width="1"/>
  <line x1="400" y1="192" x2="400" y2="236" stroke="#2a4a2a" stroke-width="1"/>
  <line x1="520" y1="192" x2="520" y2="236" stroke="#2a4a2a" stroke-width="1"/>
  <line x1="670" y1="192" x2="670" y2="236" stroke="#2a4a2a" stroke-width="1"/>

  <!-- REPEATABLE READ -->
  <rect x="60" y="236" width="760" height="44" rx="0" fill="#0d0d18" stroke="#2a2a3e" stroke-width="1"/>
  <text x="160" y="263" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">REPEATABLE READ</text>
  <text x="330" y="263" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">방지</text>
  <text x="460" y="263" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">방지</text>
  <text x="600" y="263" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">발생</text>
  <text x="740" y="263" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">공유락 유지</text>
  <line x1="240" y1="236" x2="240" y2="280" stroke="#2a2a3e" stroke-width="1"/>
  <line x1="400" y1="236" x2="400" y2="280" stroke="#2a2a3e" stroke-width="1"/>
  <line x1="520" y1="236" x2="520" y2="280" stroke="#2a2a3e" stroke-width="1"/>
  <line x1="670" y1="236" x2="670" y2="280" stroke="#2a2a3e" stroke-width="1"/>

  <!-- SNAPSHOT -->
  <rect x="60" y="280" width="760" height="44" rx="0" fill="#0f1a0f" stroke="#2a4a2a" stroke-width="1"/>
  <text x="160" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">SNAPSHOT</text>
  <text x="330" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">방지</text>
  <text x="460" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">방지</text>
  <text x="600" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">방지</text>
  <text x="740" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">행 버전 (락 없음)</text>
  <line x1="240" y1="280" x2="240" y2="324" stroke="#2a4a2a" stroke-width="1"/>
  <line x1="400" y1="280" x2="400" y2="324" stroke="#2a4a2a" stroke-width="1"/>
  <line x1="520" y1="280" x2="520" y2="324" stroke="#2a4a2a" stroke-width="1"/>
  <line x1="670" y1="280" x2="670" y2="324" stroke="#2a4a2a" stroke-width="1"/>

  <!-- SERIALIZABLE -->
  <rect x="60" y="324" width="760" height="44" rx="0" fill="#1a1a0a" stroke="#3a3a2a" stroke-width="1"/>
  <text x="160" y="351" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">SERIALIZABLE</text>
  <text x="330" y="351" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">방지</text>
  <text x="460" y="351" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">방지</text>
  <text x="600" y="351" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">방지</text>
  <text x="740" y="351" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">범위 락 (키범위)</text>
  <line x1="240" y1="324" x2="240" y2="368" stroke="#2a3a2a" stroke-width="1"/>
  <line x1="400" y1="324" x2="400" y2="368" stroke="#2a3a2a" stroke-width="1"/>
  <line x1="520" y1="324" x2="520" y2="368" stroke="#2a3a2a" stroke-width="1"/>
  <line x1="670" y1="324" x2="670" y2="368" stroke="#2a3a2a" stroke-width="1"/>

  <!-- Note -->
  <text x="440" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">RCSI / SNAPSHOT: 읽기 시 락을 걸지 않아 읽기·쓰기 충돌 없음 — 고동시성 환경의 표준 선택</text>
  <text x="440" y="435" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">RCSI: 문장 시작 시점 스냅샷 · SNAPSHOT: 트랜잭션 시작 시점 스냅샷</text>
  <text x="440" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">RCSI는 Azure SQL Database 기본값 · SNAPSHOT은 명시적 BEGIN TRAN 후 활성화</text>
</svg>
