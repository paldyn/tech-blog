<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">llama.cpp 추론 파이프라인</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">GGUF 로드 → 토크나이저 → 추론 → 디코딩</text>

  <!-- Pipeline boxes -->
  <!-- Step 1 -->
  <rect x="60" y="100" width="150" height="80" rx="6" fill="#151c24" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="135" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">GGUF 로드</text>
  <text x="135" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">mmap 직접 접근</text>
  <text x="135" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">메타데이터 파싱</text>

  <!-- Arrow -->
  <line x1="210" y1="140" x2="248" y2="140" stroke="#444" stroke-width="2"/>
  <polygon points="248,134 260,140 248,146" fill="#444"/>

  <!-- Step 2 -->
  <rect x="260" y="100" width="150" height="80" rx="6" fill="#20181a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="335" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">토크나이저</text>
  <text x="335" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">GGUF 내장 BPE</text>
  <text x="335" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">프롬프트 → 토큰</text>

  <!-- Arrow -->
  <line x1="410" y1="140" x2="448" y2="140" stroke="#444" stroke-width="2"/>
  <polygon points="448,134 460,140 448,146" fill="#444"/>

  <!-- Step 3 -->
  <rect x="460" y="100" width="150" height="80" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="535" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">추론 엔진</text>
  <text x="535" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">CPU/GPU GGML</text>
  <text x="535" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">-ngl로 GPU 오프로드</text>

  <!-- Arrow -->
  <line x1="610" y1="140" x2="648" y2="140" stroke="#444" stroke-width="2"/>
  <polygon points="648,134 660,140 648,146" fill="#444"/>

  <!-- Step 4 -->
  <rect x="660" y="100" width="160" height="80" rx="6" fill="#1a1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="740" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">샘플링·출력</text>
  <text x="740" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">temp·top_p·top_k</text>
  <text x="740" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">토큰 → 텍스트</text>

  <!-- Key options -->
  <rect x="60" y="206" width="760" height="80" rx="6" fill="#111" stroke="#222"/>
  <text x="80" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">주요 CLI 옵션</text>
  <text x="80" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">-ngl 33</text>
  <text x="148" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">GPU 오프로드 레이어 수 (전체: 모델 레이어 수)</text>
  <text x="80" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">-c 4096</text>
  <text x="160" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">컨텍스트 크기 &nbsp;&nbsp;</text>
  <text x="380" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">--temp 0.7</text>
  <text x="466" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">온도 파라미터</text>
  <text x="380" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">-t 8</text>
  <text x="418" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">CPU 스레드 수 (물리 코어 수 = 최적)</text>

  <!-- Code: llama-cpp-python -->
  <rect x="60" y="306" width="760" height="130" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># llama-cpp-python: Python 바인딩</text>
  <text x="76" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">from</text>
  <text x="112" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> llama_cpp </text>
  <text x="196" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">import</text>
  <text x="244" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> Llama</text>
  <text x="76" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">llm = Llama(</text>
  <text x="76" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    model_path=</text>
  <text x="172" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">"model.Q4_K_M.gguf"</text>
  <text x="316" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">,</text>
  <text x="76" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    n_gpu_layers=</text>
  <text x="196" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">33</text>
  <text x="216" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">,  </text>
  <text x="240" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">n_ctx=</text>
  <text x="300" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">4096</text>
  <text x="336" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">, n_threads=</text>
  <text x="428" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">8</text>
  <text x="440" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">,</text>
  <text x="76" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    verbose=</text>
  <text x="156" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">False</text>
  <text x="196" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">)</text>
</svg>
