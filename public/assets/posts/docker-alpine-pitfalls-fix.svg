<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">
    Alpine 함정 진단 및 해결 가이드
  </text>

  <!-- Problem 1 row -->
  <rect x="60" y="64" width="240" height="54" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="180" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">exec format error</text>
  <text x="180" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">glibc 바이너리 실행 실패</text>

  <line x1="302" y1="91" x2="338" y2="91" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="342" y="64" width="476" height="54" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="362" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" font-weight="600">해결: debian-slim 기반으로 교체 OR</text>
  <text x="362" y="102" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">apk add gcompat  # glibc 호환 레이어 설치</text>

  <!-- Problem 2 row -->
  <rect x="60" y="138" width="240" height="54" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="180" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">DNS 해석 실패</text>
  <text x="180" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Service 이름 불인식</text>

  <line x1="302" y1="165" x2="338" y2="165" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="342" y="138" width="476" height="54" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="362" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">apk add --no-cache bind-tools</text>
  <text x="362" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">또는 /etc/resolv.conf에 options ndots:0 추가</text>

  <!-- Problem 3 row -->
  <rect x="60" y="212" width="240" height="54" rx="6" fill="#1a0a0a" stroke="#e8a020" stroke-width="1"/>
  <text x="180" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8a020" text-anchor="middle">시간대 오류</text>
  <text x="180" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">로그 시간 UTC 고정</text>

  <line x1="302" y1="239" x2="338" y2="239" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="342" y="212" width="476" height="54" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="362" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">apk add --no-cache tzdata</text>
  <text x="362" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">ENV</tspan> TZ=Asia/Seoul</text>

  <!-- Problem 4 row -->
  <rect x="60" y="286" width="240" height="54" rx="6" fill="#1a0a0a" stroke="#e8a020" stroke-width="1"/>
  <text x="180" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8a020" text-anchor="middle">빌드 느림</text>
  <text x="180" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">apk 인덱스 매번 재다운로드</text>

  <line x1="302" y1="313" x2="338" y2="313" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="342" y="286" width="476" height="54" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="362" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">apk add <tspan fill="#7ec8e3" font-weight="600">--no-cache</tspan> pkg1 pkg2</text>
  <text x="362" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">여러 RUN 분리 금지 → 한 RUN에 묶기</text>

  <!-- When to use Alpine -->
  <rect x="60" y="360" width="760" height="60" rx="6" fill="#0a0a1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Alpine 사용 적합한 경우 vs 부적합한 경우</text>
  <text x="80" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">적합: Go, Rust 정적 바이너리 / 간단한 CLI 도구 / apk 패키지로 해결 가능한 의존성</text>
  <text x="80" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">부적합: Java JVM 앱 / Python C 확장 / glibc 의존 네이티브 바이너리 → debian-slim 권장</text>
</svg>
