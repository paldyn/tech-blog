  <text x="327" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Stripe · Shopify</text>

  <rect x="430" y="348" width="165" height="88" rx="8" fill="#2a1a0a" stroke="#ce9178" stroke-width="1"/>
  <text x="512" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
