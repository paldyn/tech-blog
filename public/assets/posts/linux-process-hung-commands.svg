<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Hung Process 진단 명령어</text>

  <!-- Left -->
  <text x="220" y="76" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">상태 확인</text>

  <rect x="50" y="88" width="360" height="192" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="66" y="116" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 상태 컬럼 확인</text>
  <text x="66" y="134" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">ps aux | grep myapp</text>
  <text x="66" y="152" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">ps -o pid,stat,wchan -p PID</text>
  <text x="66" y="174" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 대기 채널 (어디서 멈췄나)</text>
  <text x="66" y="192" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">cat /proc/PID/wchan</text>
  <text x="66" y="214" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># syscall 추적</text>
  <text x="66" y="232" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan font-weight="600" fill="#7ec8e3">strace</tspan><tspan fill="#ffffff"> -p PID</tspan></text>
  <text x="66" y="250" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 열린 파일/소켓</text>
  <text x="66" y="268" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan font-weight="600" fill="#7ec8e3">lsof</tspan><tspan fill="#ffffff"> -p PID</tspan></text>

  <!-- Right -->
  <text x="660" y="76" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">종료 및 조치</text>

  <rect x="470" y="88" width="360" height="192" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="486" y="116" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 정상 종료 시도</text>
  <text x="486" y="134" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan font-weight="600" fill="#7ec8e3">kill</tspan><tspan fill="#ffffff"> -TERM PID</tspan></text>
  <text x="486" y="152" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 강제 종료</text>
  <text x="486" y="170" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan font-weight="600" fill="#7ec8e3">kill</tspan><tspan fill="#ffffff"> -KILL PID</tspan></text>
  <text x="486" y="192" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># NFS 강제 언마운트</text>
  <text x="486" y="210" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">umount -f -l /mnt/nfs</text>
  <text x="486" y="232" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 스레드 상태 전체 확인</text>
  <text x="486" y="250" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">ps -eLf | grep PID</text>
  <text x="486" y="268" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 뮤텍스 데드락 확인</text>
  <text x="486" y="286" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">cat /proc/PID/status</text>

  <!-- Bottom tip -->
  <rect x="50" y="298" width="780" height="70" rx="8" fill="#0f1525" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="322" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a030">D 상태는 kill -9도 먹히지 않는다</text>
  <text x="440" y="344" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">STAT=D는 Uninterruptible Sleep — I/O 완료까지 커널이 강제 해제 불가</text>
  <text x="440" y="362" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">NFS hang / 디스크 오류 등 I/O 원인 제거 → 프로세스 자연 해소 또는 재부팅</text>
</svg>
