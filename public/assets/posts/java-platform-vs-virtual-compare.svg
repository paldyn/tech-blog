<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">플랫폼 스레드 vs Virtual Thread 비교</text>

  <!-- Header -->
  <rect x="60" y="64" width="240" height="36" rx="4" fill="#1a2a44" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">항목</text>
  <rect x="306" y="64" width="246" height="36" rx="4" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="429" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">플랫폼 스레드</text>
  <rect x="558" y="64" width="262" height="36" rx="4" fill="#0a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="689" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Virtual Thread</text>

  <!-- Row 1: OS 매핑 -->
  <rect x="60" y="108" width="240" height="36" rx="4" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">OS 스레드 매핑</text>
  <rect x="306" y="108" width="246" height="36" rx="4" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="429" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">1:1 (항상 OS 스레드 점유)</text>
  <rect x="558" y="108" width="262" height="36" rx="4" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="689" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">M:N (캐리어에 마운트 시만)</text>

  <!-- Row 2: 스택 크기 -->
  <rect x="60" y="152" width="240" height="36" rx="4" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">초기 스택 크기</text>
  <rect x="306" y="152" width="246" height="36" rx="4" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="429" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">512KB ~ 1MB (고정)</text>
  <rect x="558" y="152" width="262" height="36" rx="4" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="689" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">수백 바이트 (동적 확장)</text>

  <!-- Row 3: 최대 수 -->
  <rect x="60" y="196" width="240" height="36" rx="4" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">동시 생성 한계</text>
  <rect x="306" y="196" width="246" height="36" rx="4" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="429" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">수천 ~ 수만 (메모리 제약)</text>
  <rect x="558" y="196" width="262" height="36" rx="4" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="689" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">수백만 (힙 용량까지)</text>

  <!-- Row 4: I/O 블로킹 -->
  <rect x="60" y="240" width="240" height="36" rx="4" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">I/O 블로킹 시</text>
  <rect x="306" y="240" width="246" height="36" rx="4" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="429" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">OS 스레드 점유 (낭비)</text>
  <rect x="558" y="240" width="262" height="36" rx="4" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="689" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">캐리어 반환 (park)</text>

  <!-- Row 5: 풀링 필요 -->
  <rect x="60" y="284" width="240" height="36" rx="4" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">스레드 풀링</text>
  <rect x="306" y="284" width="246" height="36" rx="4" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="429" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">필수 (생성 비용 높음)</text>
  <rect x="558" y="284" width="262" height="36" rx="4" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="689" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">불필요 (생성 비용 극히 낮음)</text>

  <!-- Row 6: synchronized -->
  <rect x="60" y="328" width="240" height="36" rx="4" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">synchronized 블록</text>
  <rect x="306" y="328" width="246" height="36" rx="4" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="429" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">정상 동작</text>
  <rect x="558" y="328" width="262" height="36" rx="4" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="689" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">Pinning 발생 가능 (주의)</text>

  <!-- Row 7: CPU bound -->
  <rect x="60" y="372" width="240" height="36" rx="4" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">CPU 바운드 작업</text>
  <rect x="306" y="372" width="246" height="36" rx="4" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="429" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">적합</text>
  <rect x="558" y="372" width="262" height="36" rx="4" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="689" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">이점 없음 (캐리어 수 = 코어)</text>

  <!-- Bottom note -->
  <rect x="60" y="426" width="760" height="52" rx="6" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Virtual Thread의 이점은 I/O 바운드 작업에서 극대화됩니다</text>
  <text x="440" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">CPU 바운드 = 플랫폼 스레드 또는 Fork/Join / I/O 바운드 = Virtual Thread</text>
  <text x="440" y="474" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">기존 코드 그대로 Executor만 교체해 즉시 혜택 가능</text>
</svg>
