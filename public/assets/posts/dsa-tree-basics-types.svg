<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <!-- Title -->
    <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">트리 종류 개요</text>
    <text x="440" y="70" font-size="14" fill="#888" text-anchor="middle">이진 트리부터 B+트리까지 — 용도에 따른 선택 가이드</text>

    <!-- Table header -->
    <rect x="60" y="88" width="760" height="40" fill="#111827" stroke="#3a4a6e" stroke-width="1" rx="4"/>
    <text x="160" y="113" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">종류</text>
    <text x="380" y="113" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">특징</text>
    <text x="620" y="113" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">주요 사용처</text>
    <line x1="260" y1="88" x2="260" y2="368" stroke="#2a3a5e" stroke-width="1"/>
    <line x1="520" y1="88" x2="520" y2="368" stroke="#2a3a5e" stroke-width="1"/>

    <!-- Row 1: Binary Tree -->
    <rect x="60" y="128" width="760" height="40" fill="#0d1520" stroke="#2a3a5e" stroke-width="0.5"/>
    <text x="160" y="153" font-size="13" fill="#e8e8e8" text-anchor="middle">이진 트리</text>
    <text x="380" y="153" font-size="12" fill="#888" text-anchor="middle">자식 최대 2개</text>
    <text x="620" y="153" font-size="12" fill="#888" text-anchor="middle">표현식 트리, Huffman</text>

    <!-- Row 2: BST -->
    <rect x="60" y="168" width="760" height="40" fill="#111827" stroke="#2a3a5e" stroke-width="0.5"/>
    <text x="160" y="193" font-size="13" fill="#e8e8e8" text-anchor="middle">BST</text>
    <text x="380" y="193" font-size="12" fill="#888" text-anchor="middle">왼쪽 &lt; 루트 &lt; 오른쪽</text>
    <text x="620" y="193" font-size="12" fill="#888" text-anchor="middle">정렬된 검색·삽입·삭제</text>

    <!-- Row 3: AVL Tree -->
    <rect x="60" y="208" width="760" height="40" fill="#0d1520" stroke="#2a3a5e" stroke-width="0.5"/>
    <text x="160" y="233" font-size="13" fill="#55c555" text-anchor="middle">AVL Tree</text>
    <text x="380" y="233" font-size="12" fill="#888" text-anchor="middle">균형 계수 |h_L - h_R| ≤ 1</text>
    <text x="620" y="233" font-size="12" fill="#888" text-anchor="middle">엄격한 균형이 필요한 경우</text>

    <!-- Row 4: Red-Black Tree -->
    <rect x="60" y="248" width="760" height="40" fill="#111827" stroke="#2a3a5e" stroke-width="0.5"/>
    <text x="160" y="273" font-size="13" fill="#e05555" text-anchor="middle">Red-Black Tree</text>
    <text x="380" y="273" font-size="12" fill="#888" text-anchor="middle">느슨한 균형, 빠른 삽입/삭제</text>
    <text x="620" y="273" font-size="12" fill="#888" text-anchor="middle">Java TreeMap, C++ std::map</text>

    <!-- Row 5: Heap -->
    <rect x="60" y="288" width="760" height="40" fill="#0d1520" stroke="#2a3a5e" stroke-width="0.5"/>
    <text x="160" y="313" font-size="13" fill="#7777cc" text-anchor="middle">힙 (Heap)</text>
    <text x="380" y="313" font-size="12" fill="#888" text-anchor="middle">부모 ≥(또는 ≤) 자식</text>
    <text x="620" y="313" font-size="12" fill="#888" text-anchor="middle">우선순위 큐, 힙 정렬</text>

    <!-- Row 6: B+Tree -->
    <rect x="60" y="328" width="760" height="40" fill="#111827" stroke="#2a3a5e" stroke-width="0.5"/>
    <text x="160" y="353" font-size="13" fill="#ce9178" text-anchor="middle">B+Tree</text>
    <text x="380" y="353" font-size="12" fill="#888" text-anchor="middle">다방향, 리프에만 데이터</text>
    <text x="620" y="353" font-size="12" fill="#888" text-anchor="middle">MySQL InnoDB 인덱스</text>
  </g>
</svg>
