<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arR" markerWidth="9" markerHeight="9" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#555"/>
    </marker>
    <marker id="arL" markerWidth="9" markerHeight="9" refX="1" refY="3.5" orient="auto">
      <path d="M9,0 L9,7 L0,3.5 z" fill="#555"/>
    </marker>
    <marker id="arD" markerWidth="9" markerHeight="9" refX="4.5" refY="8" orient="auto">
      <path d="M0,0 L9,0 L4.5,9 z" fill="#555"/>
    </marker>
    <marker id="arU" markerWidth="9" markerHeight="9" refX="4.5" refY="1" orient="auto">
      <path d="M0,9 L9,9 L4.5,0 z" fill="#555"/>
    </marker>
    <marker id="arRG" markerWidth="9" markerHeight="9" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#69f0ae"/>
    </marker>
    <marker id="arRP" markerWidth="9" markerHeight="9" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#ce93d8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="36" text-anchor="middle"
    font-family="Wanted Sans Variable, -apple-system, sans-serif"
    font-size="18" font-weight="700" fill="#e8e8e8">Dataset RowStatus 상태 전환도</text>
  <text x="440" y="58" text-anchor="middle"
    font-family="Wanted Sans Variable, -apple-system, sans-serif"
    font-size="12" fill="#555">getRowStatus(nRow) 반환값으로 행의 현재 상태를 확인합니다</text>

  <!-- ===== State Boxes ===== -->

  <!-- NORMAL(0) - center top -->
  <rect x="330" y="80" width="220" height="80" rx="10" fill="#111" stroke="#444" stroke-width="2"/>
  <text x="440" y="110" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#e8e8e8">NORMAL</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="440" y="132" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#777">(0)</text>
  <text x="440" y="152" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#444">조회 직후 / 저장 성공 후</text>

  <!-- INSERT(2) - left -->
  <rect x="60" y="220" width="200" height="80" rx="10" fill="#081408" stroke="#1b5e20" stroke-width="2"/>
  <text x="160" y="250" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#a5d6a7">INSERT</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="160" y="272" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#69f0ae">(2)</text>
  <text x="160" y="292" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#444">ds.insertRow() 호출 후</text>

  <!-- UPDATE(4) - right -->
  <rect x="620" y="220" width="200" height="80" rx="10" fill="#1a1000" stroke="#7c3b00" stroke-width="2"/>
  <text x="720" y="250" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#ffcc80">UPDATE</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="720" y="272" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#ffb74d">(4)</text>
  <text x="720" y="292" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#444">ds.setColumn() 호출 후</text>

  <!-- DELETE(1) - center bottom -->
  <rect x="330" y="330" width="220" height="72" rx="10" fill="#140808" stroke="#7c1c1c" stroke-width="2"/>
  <text x="440" y="358" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#ef9a9a">DELETE</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="440" y="380" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#ff5252">(1)</text>
  <text x="440" y="396" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#444">ds.deleteRow() 호출 후 (NORMAL → DELETE)</text>

  <!-- ===== Arrows ===== -->

  <!-- NORMAL → INSERT: insertRow() -->
  <path d="M 330,130 Q 160,130 160,220" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#arD)"/>
  <text x="218" y="172" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888">insertRow(-1)</text>

  <!-- INSERT → NORMAL: save 성공 -->
  <path d="M 260,220 Q 330,190 330,140" stroke="#69f0ae" stroke-width="1.5" fill="none" marker-end="url(#arRG)" stroke-dasharray="4,3"/>
  <text x="275" y="192" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#69f0ae">저장 성공</text>

  <!-- NORMAL → UPDATE: setColumn() -->
  <path d="M 550,130 Q 720,130 720,220" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#arD)"/>
  <text x="614" y="172" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888">setColumn()</text>

  <!-- UPDATE → NORMAL: save 성공 -->
  <path d="M 620,220 Q 560,180 560,140" stroke="#ffb74d" stroke-width="1.5" fill="none" marker-end="url(#arU)" stroke-dasharray="4,3"/>
  <text x="565" y="192" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#ffb74d">저장 성공</text>

  <!-- NORMAL → DELETE: deleteRow() (NORMAL only) -->
  <path d="M 440,160 L 440,330" stroke="#555" stroke-width="1.5" fill="none" marker-end="url(#arD)"/>
  <text x="448" y="255" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#888">deleteRow()</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="448" y="268" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555">(NORMAL 행만)</text>

  <!-- DELETE → NORMAL: save 성공 -->
  <path d="M 330,360 Q 250,320 210,300" stroke="#ff5252" stroke-width="1.5" fill="none" marker-end="url(#arL)" stroke-dasharray="4,3"/>
  <text x="240" y="336" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#ff5252">저장 후 행 제거</text>

  <!-- INSERT → DELETE: insertRow 후 deleteRow → 즉시 제거 -->
  <path d="M 160,300 Q 160,380 330,376" stroke="#e57373" stroke-width="1.5" fill="none" marker-end="url(#arR)" stroke-dasharray="3,3"/>
  <text x="86" y="370" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#e57373">deleteRow()</text>
  <text x="68" y="383" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555">→ 즉시 제거</text>

  <!-- INSERT setColumn stays INSERT -->
  <path d="M 160,220 Q 80,190 80,270 Q 80,320 160,300" stroke="#555" stroke-width="1.2" fill="none" stroke-dasharray="3,3"/>
  <text x="28" y="266" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#444">setColumn()</text>
  <text x="20" y="278" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#444">→ INSERT 유지</text>

  <!-- Legend -->
  <rect x="620" y="340" width="240" height="64" rx="6" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="636" y="358" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#888">범례</text>
  <line x1="636" y1="368" x2="670" y2="368" stroke="#555" stroke-width="1.5"/>
  <text x="676" y="372" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#666">상태 전환 (변경)</text>
  <line x1="636" y1="386" x2="670" y2="386" stroke="#69f0ae" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="676" y="390" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#666">저장 성공 후 리셋</text>
  <text x="636" y="398" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#444">RowStatus.NORMAL=0, INSERT=2, UPDATE=4, DELETE=1</text>
</svg>
