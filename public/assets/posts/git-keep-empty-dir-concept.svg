<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Git은 빈 디렉터리를 추적하지 않는다</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">오브젝트 모델이 파일만 추적하기 때문 — .gitkeep으로 해결</text>

  <!-- Left: why problem -->
  <rect x="60" y="92" width="340" height="230" fill="#0d1520" rx="8" stroke="#5a2a2a" stroke-width="1"/>
  <text x="230" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">빈 디렉터리를 커밋하면?</text>
  <line x1="80" y1="126" x2="380" y2="126" stroke="#3a1a1a" stroke-width="1"/>

  <!-- Tree structure attempt -->
  <text x="96" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#aaa">src/</text>
  <text x="96" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#aaa">├── components/</text>
  <text x="96" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#aaa">│   └── Button.jsx</text>
  <text x="96" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555">└── assets/      ← 빈 폴더!</text>

  <text x="230" y="242" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">git add src/assets/</text>
  <text x="230" y="260" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">→ 스테이징되지 않음</text>
  <text x="230" y="280" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Git 오브젝트 모델은 tree → blob</text>
  <text x="230" y="298" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">내부에 blob이 없으면 tree도 저장 안 됨</text>

  <!-- Right: solutions -->
  <rect x="480" y="92" width="340" height="230" fill="#0d1520" rx="8" stroke="#1a4a1a" stroke-width="1"/>
  <text x="650" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">해결 방법</text>
  <line x1="500" y1="126" x2="800" y2="126" stroke="#1a3a1a" stroke-width="1"/>

  <text x="500" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#aaa">src/assets/</text>
  <text x="500" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">├── .gitkeep    ← 빈 파일 추가</text>

  <text x="650" y="204" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">또는</text>

  <text x="500" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#aaa">src/assets/</text>
  <text x="500" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">└── .gitignore  ← 하위만 무시 설정</text>

  <text x="650" y="282" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">내용: * + !.gitignore</text>
  <text x="650" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">(하위 파일은 무시, 자신은 유지)</text>

  <!-- Bottom: why -->
  <rect x="60" y="340" width="760" height="42" fill="#0a0f1a" rx="6" stroke="#1e2c4a" stroke-width="1"/>
  <text x="440" y="358" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Git 오브젝트 모델: blob (파일) → tree (디렉터리) → commit</text>
  <text x="440" y="375" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">디렉터리는 최소 하나의 blob을 포함할 때만 tree 오브젝트로 저장된다</text>
</svg>
