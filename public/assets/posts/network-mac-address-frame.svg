<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-d" viewBox="0 0 14 14" refX="7" refY="12"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 14 0 L 7 13 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">이더넷 프레임 내 MAC 주소 위치</text>

  <!-- Ethernet Frame Layout -->
  <!-- Preamble -->
  <rect x="40" y="68" width="90" height="64" rx="4" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="85" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">프리앰블</text>
  <text x="85" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">7B</text>
  <!-- SFD -->
  <rect x="134" y="68" width="50" height="64" rx="4" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="159" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">SFD</text>
  <text x="159" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">1B</text>
  <!-- Dest MAC -->
  <rect x="188" y="68" width="110" height="64" rx="4" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="243" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">목적지 MAC</text>
  <text x="243" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">Dest MAC</text>
  <text x="243" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">6 bytes</text>
  <!-- Src MAC -->
  <rect x="302" y="68" width="110" height="64" rx="4" fill="#0d2016" stroke="#55c555" stroke-width="2"/>
  <text x="357" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">출발지 MAC</text>
  <text x="357" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">Src MAC</text>
  <text x="357" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">6 bytes</text>
  <!-- EtherType -->
  <rect x="416" y="68" width="80" height="64" rx="4" fill="#1a120a" stroke="#e8a55c" stroke-width="1.5"/>
  <text x="456" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8a55c" text-anchor="middle">EType</text>
  <text x="456" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">2B</text>
  <!-- Payload -->
  <rect x="500" y="68" width="240" height="64" rx="4" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="620" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">페이로드 (Payload)</text>
  <text x="620" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">46 ~ 1500 bytes</text>
  <!-- FCS -->
  <rect x="744" y="68" width="90" height="64" rx="4" fill="#2a0a2a" stroke="#cc55cc" stroke-width="1.5"/>
  <text x="789" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#cc55cc" text-anchor="middle">FCS</text>
  <text x="789" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">CRC-32</text>
  <text x="789" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">4B</text>

  <!-- Annotation: MAC is layer 2 address -->
  <line x1="243" y1="132" x2="243" y2="170" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-d)"/>
  <line x1="357" y1="132" x2="357" y2="170" stroke="#55c555" stroke-width="2" marker-end="url(#arr-d)"/>

  <rect x="120" y="170" width="360" height="60" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="300" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">MAC = 2계층(데이터링크) 주소</text>
  <text x="300" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">동일 네트워크 세그먼트 내에서만 유효</text>

  <!-- Unicast/Multicast/Broadcast -->
  <rect x="60" y="256" width="235" height="118" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="177" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">유니캐스트</text>
  <text x="177" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">AA:BB:CC:DD:EE:FF</text>
  <text x="177" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">특정 장치 1개 대상</text>
  <rect x="324" y="256" width="235" height="118" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="441" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">멀티캐스트</text>
  <text x="441" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">01:XX:XX:XX:XX:XX</text>
  <text x="441" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">그룹 장치 대상</text>
  <rect x="584" y="256" width="235" height="118" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="701" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8a55c" text-anchor="middle">브로드캐스트</text>
  <text x="701" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">FF:FF:FF:FF:FF:FF</text>
  <text x="701" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">전체 장치 대상</text>
</svg>
