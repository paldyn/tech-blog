<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">파티션 테이블 구조 — MBR vs GPT</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">현대 시스템은 GPT 사용 권장 — 2TB 이상·UEFI 부팅 지원</text>

  <!-- MBR layout -->
  <text x="60" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e0a020">MBR (Master Boot Record)</text>
  <rect x="60" y="114" width="340" height="48" fill="#1a0e00" rx="6" stroke="#e0a020" stroke-width="1.5"/>
  <text x="230" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e0a020" text-anchor="middle">MBR 섹터 (512 bytes)</text>
  <text x="230" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">부트 코드 446B + 파티션 테이블 64B + 서명 2B</text>

  <!-- MBR partitions -->
  <rect x="60" y="174" width="78" height="36" fill="#071420" rx="4" stroke="#7ec8e3" stroke-width="1"/>
  <text x="99" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">P1 /boot</text>
  <text x="99" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">500M</text>
  <rect x="142" y="174" width="120" height="36" fill="#071420" rx="4" stroke="#7ec8e3" stroke-width="1"/>
  <text x="202" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">P2 /  (기본)</text>
  <text x="202" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">20G</text>
  <rect x="266" y="174" width="134" height="36" fill="#111" rx="4" stroke="#444" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="333" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">확장 파티션 (E)</text>
  <text x="333" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#444" text-anchor="middle">→ 논리 파티션 무제한</text>

  <!-- MBR limits -->
  <text x="60" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">✕ 기본 파티션 최대 4개</text>
  <text x="60" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">✕ 최대 디스크 크기 2TB</text>
  <text x="60" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  BIOS(레거시) 부팅 전용</text>

  <!-- GPT layout -->
  <text x="500" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">GPT (GUID Partition Table) — 권장</text>
  <rect x="500" y="114" width="320" height="30" fill="#071a07" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="660" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">Protective MBR + GPT Header</text>

  <!-- GPT partitions -->
  <rect x="500" y="156" width="60" height="36" fill="#071a07" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="530" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">EFI</text>
  <text x="530" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">100M</text>
  <rect x="564" y="156" width="60" height="36" fill="#071a07" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="594" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">/boot</text>
  <text x="594" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">1G</text>
  <rect x="628" y="156" width="80" height="36" fill="#071a07" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="668" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">/  root</text>
  <text x="668" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">50G</text>
  <rect x="712" y="156" width="60" height="36" fill="#071a07" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="742" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">/home</text>
  <text x="742" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">나머지</text>
  <rect x="776" y="156" width="44" height="36" fill="#0d0d1a" rx="4" stroke="#7777cc" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="798" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#7777cc" text-anchor="middle">GPT</text>
  <text x="798" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#7777cc" text-anchor="middle">Backup</text>

  <!-- GPT benefits -->
  <text x="500" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ 파티션 수 제한 없음 (128개)</text>
  <text x="500" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ 9.4ZB까지 지원</text>
  <text x="500" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ UEFI 부팅 · 헤더 이중화</text>

  <!-- fdisk commands -->
  <text x="60" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">fdisk 기본 조작</text>
  <rect x="60" y="318" width="380" height="100" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="337" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># 파티션 테이블 확인</text>
  <text x="76" y="355" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">fdisk</text>
  <text x="114" y="355" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> -l /dev/sdb</text>
  <text x="76" y="375" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># 인터랙티브 편집</text>
  <text x="76" y="393" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">fdisk</text>
  <text x="114" y="393" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> /dev/sdb</text>
  <text x="76" y="411" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># 내부 명령: g=GPT, n=new, d=del, w=저장</text>

  <!-- parted commands -->
  <text x="500" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">parted 비대화형 사용</text>
  <rect x="500" y="318" width="320" height="100" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="516" y="337" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># GPT 파티션 테이블 생성</text>
  <text x="516" y="355" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">parted</text>
  <text x="562" y="355" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> /dev/sdc mklabel gpt</text>
  <text x="516" y="375" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># 파티션 생성 (0~50GB)</text>
  <text x="516" y="393" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">parted</text>
  <text x="562" y="393" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> /dev/sdc mkpart primary 0% 50%</text>
  <text x="516" y="411" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># 확인</text>
</svg>
