<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" style="background:#0a0a0a">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">정답에 이진 탐색 (파라메트릭 서치)</text>

  <!-- Core concept -->
  <text x="440" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">아이디어: 정답 후보 공간에서 이진 탐색 → 최솟값/최댓값 탐색</text>

  <!-- Monotone function visualization -->
  <rect x="60" y="96" width="760" height="160" rx="8" fill="#0a0f1a" stroke="#3a4a6e" stroke-width="1"/>

  <!-- X axis: possible answer values -->
  <line x1="100" y1="220" x2="780" y2="220" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">정답 후보 범위 [lo ... hi]</text>

  <!-- False region (red) -->
  <rect x="100" y="130" width="340" height="80" rx="4" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="270" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555">F F F F F F F F F F</text>
  <text x="270" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">feasible(mid) = False</text>

  <!-- True region (green) -->
  <rect x="440" y="130" width="340" height="80" rx="4" fill="#1a2a1f" stroke="#55c555" stroke-width="1"/>
  <text x="610" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">T T T T T T T T T T</text>
  <text x="610" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">feasible(mid) = True</text>

  <!-- Boundary marker -->
  <line x1="440" y1="116" x2="440" y2="232" stroke="#7ec8e3" stroke-width="2.5"/>
  <text x="440" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">정답 (경계)</text>

  <!-- Example problem -->
  <text x="60" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">예시: N개 물건을 M명에 분배, 최대 부하 최소화 (Rope Cutting 문제)</text>

  <!-- Template code -->
  <rect x="60" y="298" width="760" height="188" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">// feasible(mid): mid가 가능한 정답인지 판단 O(N) or O(N logN)</tspan>
  </text>
  <text x="76" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">bool</tspan><tspan fill="#ffffff"> feasible(</tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff"> mid) { </tspan><tspan fill="#9aa4b8">/* 문제별 구현 */</tspan><tspan fill="#ffffff"> }</tspan>
  </text>
  <text x="76" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">// 최솟값 탐색: feasible이 True인 가장 작은 값</tspan>
  </text>
  <text x="76" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff"> lo = LO, hi = HI;</tspan>
  </text>
  <text x="76" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">while</tspan><tspan fill="#ffffff"> (lo &lt; hi) {</tspan>
  </text>
  <text x="76" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    int</tspan><tspan fill="#ffffff"> mid = lo + (hi - lo) / 2;</tspan>
  </text>
  <text x="76" y="430" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    if</tspan><tspan fill="#ffffff"> (feasible(mid)) hi = mid;</tspan>
  </text>
  <text x="76" y="448" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    else</tspan><tspan fill="#ffffff"> lo = mid + 1;</tspan>
  </text>
  <text x="76" y="466" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">}</tspan><tspan fill="#9aa4b8"> // lo = 정답</tspan>
  </text>
</svg>
