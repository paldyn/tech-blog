<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">
    Platform Threads vs Virtual Threads
  </text>

  <!-- Platform threads section -->
  <text x="210" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e05555" text-anchor="middle">전통 방식 (1:1 매핑)</text>

  <!-- OS Threads row -->
  <rect x="60" y="92" width="300" height="38" fill="#2a0a0a" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="210" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">OS 커널 스레드 (고비용)</text>

  <!-- Platform Thread boxes -->
  <rect x="60" y="144" width="56" height="40" fill="#1a1a1a" rx="4" stroke="#e05555" stroke-width="1"/>
  <text x="88" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">T1</text>

  <rect x="122" y="144" width="56" height="40" fill="#1a1a1a" rx="4" stroke="#e05555" stroke-width="1"/>
  <text x="150" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">T2</text>

  <rect x="184" y="144" width="56" height="40" fill="#1a1a1a" rx="4" stroke="#e05555" stroke-width="1"/>
  <text x="212" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">T3</text>

  <rect x="246" y="144" width="56" height="40" fill="#1a1a1a" rx="4" stroke="#333" stroke-width="1"/>
  <text x="274" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">...</text>

  <text x="210" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">최대 ~수백 개 (MB급 스택)</text>

  <!-- Blocking problem -->
  <rect x="60" y="228" width="300" height="50" fill="#1a0808" rx="6" stroke="#e05555" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="210" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">I/O 블로킹 = OS 스레드 점유</text>
  <text x="210" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">DB 응답 대기 중에도 스레드 소비</text>

  <!-- Virtual threads section -->
  <text x="660" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">Virtual Threads (M:N 매핑)</text>

  <!-- Carrier threads -->
  <rect x="510" y="92" width="310" height="38" fill="#0f2a0f" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="665" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">캐리어 스레드 (CPU 코어 수)</text>

  <!-- Virtual Thread boxes: many -->
  <rect x="510" y="144" width="40" height="30" fill="#1a1a1a" rx="3" stroke="#55c555" stroke-width="1"/>
  <text x="530" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">VT</text>

  <rect x="556" y="144" width="40" height="30" fill="#1a1a1a" rx="3" stroke="#55c555" stroke-width="1"/>
  <text x="576" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">VT</text>

  <rect x="602" y="144" width="40" height="30" fill="#1a1a1a" rx="3" stroke="#55c555" stroke-width="1"/>
  <text x="622" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">VT</text>

  <rect x="648" y="144" width="40" height="30" fill="#1a1a1a" rx="3" stroke="#55c555" stroke-width="1"/>
  <text x="668" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">VT</text>

  <rect x="694" y="144" width="40" height="30" fill="#1a1a1a" rx="3" stroke="#55c555" stroke-width="1"/>
  <text x="714" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">VT</text>

  <rect x="740" y="144" width="40" height="30" fill="#1a1a1a" rx="3" stroke="#55c555" stroke-width="1"/>
  <text x="760" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">VT</text>

  <text x="810" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">...</text>

  <text x="660" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">수십만 개 가능 (KB급 힙 메모리)</text>

  <!-- Non-blocking park -->
  <rect x="510" y="228" width="310" height="50" fill="#0a1a0a" rx="6" stroke="#55c555" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="665" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">I/O 블로킹 = VT만 park (언마운트)</text>
  <text x="665" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">캐리어 스레드는 다른 VT 처리 가능</text>

  <!-- Spring Boot config -->
  <rect x="60" y="306" width="760" height="170" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="328" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// Spring Boot 3.2+ Virtual Threads 활성화</text>
  <text x="76" y="346" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// application.properties</text>
  <text x="76" y="364" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">spring.threads.virtual.enabled=true</text>

  <text x="76" y="392" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 또는 Java Config</text>
  <text x="76" y="410" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">@Bean <tspan fill="#7ec8e3" font-weight="600">public</tspan> TomcatProtocolHandlerCustomizer&lt;?&gt; virtualThreads() &#123;</text>
  <text x="76" y="428" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3" font-weight="600">return</tspan> p -&gt; p.setExecutor(Executors.newVirtualThreadPerTaskExecutor());</text>
  <text x="76" y="446" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">&#125;</text>
  <text x="76" y="464" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// → Tomcat이 각 요청을 VT에서 처리</text>
</svg>
