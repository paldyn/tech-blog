<svg width="880" height="480" viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">모듈러 역원을 구하는 세 가지 방법</text>

  <!-- method 1 -->
  <rect x="60" y="92" width="360" height="158" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">
    <text x="76" y="126" font-size="15" font-weight="600" fill="#7ec8e3">방법 1 — 페르마 소정리</text>
    <text x="76" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#ffffff">a⁻¹ ≡ a^(p-2) (mod p)</text>
    <text x="76" y="192" fill="#ffffff">조건: <tspan fill="#e05555" font-weight="600">p가 소수</tspan>일 때만</text>
    <text x="76" y="224" fill="#9aa4b8">pow(a, p-2, p) 한 줄 · O(log p)</text>
  </g>

  <!-- method 2 -->
  <rect x="460" y="92" width="360" height="158" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">
    <text x="476" y="126" font-size="15" font-weight="600" fill="#7ec8e3">방법 2 — 확장 유클리드</text>
    <text x="476" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve" fill="#ffffff">ax + my = 1 의 x가 역원</text>
    <text x="476" y="192" fill="#ffffff">조건: <tspan fill="#55c555" font-weight="600">gcd(a, m) = 1</tspan>이면 OK</text>
    <text x="476" y="224" fill="#9aa4b8">m이 소수가 아니어도 가능 · O(log m)</text>
  </g>

  <!-- method 3 -->
  <rect x="60" y="290" width="760" height="110" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">
    <text x="76" y="324" font-size="15" font-weight="600" fill="#7ec8e3">방법 3 — 1..n 역원 일괄 전처리 (선형 점화식)</text>
    <text x="76" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">inv</tspan><tspan fill="#ffffff">[i] = -(m // i) · </tspan><tspan fill="#7ec8e3" font-weight="600">inv</tspan><tspan fill="#ffffff">[m % i] % m</tspan></text>
    <text x="76" y="384" fill="#9aa4b8">조합론에서 팩토리얼 역원 테이블 만들 때 — 전체 O(n)</text>
  </g>

  <rect x="60" y="424" width="760" height="0" fill="none"/>
  <text x="60" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">gcd(a, m) ≠ 1 이면 역원이 존재하지 않는다 — 예: 2⁻¹ (mod 4)는 없음 (2x는 항상 짝수)</text>
</svg>
