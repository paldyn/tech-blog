<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="340" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="rt_arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">래칫(ratchet) 전략</text>
  <text x="60" y="76" font-size="14" fill="#888">엄격함은 한 방향으로만 — 한번 strict가 된 영역은 되돌리지 않는다</text>

  <!-- step boxes ascending -->
  <rect x="60" y="240" width="180" height="56" fill="#101418" rx="10" stroke="#7777cc" stroke-width="1.5"/>
  <text x="150" y="265" font-size="13" fill="#e8e8e8" text-anchor="middle">전역 strict: false</text>
  <text x="150" y="285" font-size="12" fill="#888" text-anchor="middle">출발점</text>

  <line x1="240" y1="250" x2="290" y2="218" stroke="#55c555" stroke-width="2" marker-end="url(#rt_arr)"/>
  <rect x="300" y="180" width="200" height="56" fill="#101418" rx="10" stroke="#7777cc" stroke-width="1.5"/>
  <text x="400" y="205" font-size="13" fill="#e8e8e8" text-anchor="middle">새 파일만 strict</text>
  <text x="400" y="225" font-size="12" fill="#888" text-anchor="middle">overrides / strict glob</text>

  <line x1="500" y1="190" x2="550" y2="158" stroke="#55c555" stroke-width="2" marker-end="url(#rt_arr)"/>
  <rect x="560" y="120" width="200" height="56" fill="#101418" rx="10" stroke="#7777cc" stroke-width="1.5"/>
  <text x="660" y="145" font-size="13" fill="#e8e8e8" text-anchor="middle">커버리지 % 상승</text>
  <text x="660" y="165" font-size="12" fill="#888" text-anchor="middle">type-coverage로 가드</text>

  <line x1="660" y1="120" x2="720" y2="95" stroke="#55c555" stroke-width="2" marker-end="url(#rt_arr)"/>
  <rect x="700" y="58" width="120" height="40" fill="#101418" rx="10" stroke="#55c555" stroke-width="1.5"/>
  <text x="760" y="83" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">strict: true</text>

  <text x="60" y="324" font-size="13" fill="#9aa4b8">→ CI에서 커버리지 하한을 강제하면, PR이 엄격함을 후퇴시키는 것을 막는다</text>
</svg>
