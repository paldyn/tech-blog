<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <!-- Background -->
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="45" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Redux 기본 패턴</text>

  <!-- ===== Left: Action box ===== -->
  <rect x="60" y="70" width="240" height="320" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <!-- Header -->
  <rect x="60" y="70" width="240" height="30" rx="6" fill="#0a0a1a"/>
  <rect x="60" y="88" width="240" height="12" fill="#0a0a1a"/>
  <text x="180" y="90" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Action</text>
  <!-- Code -->
  <text xml:space="preserve" x="76" y="122"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// actions.js</text>
  <text xml:space="preserve" x="76" y="142"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">const</text>
  <text xml:space="preserve" x="116" y="142"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> ADD_TODO =</text>
  <text xml:space="preserve" x="76" y="162"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">  'ADD_TODO'</text>
  <text xml:space="preserve" x="76" y="200"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">function</text>
  <text xml:space="preserve" x="145" y="200"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> addTodo(text) {</text>
  <text xml:space="preserve" x="76" y="220"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">  return</text>
  <text xml:space="preserve" x="122" y="220"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> {</text>
  <text xml:space="preserve" x="76" y="240"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    type: ADD_TODO,</text>
  <text xml:space="preserve" x="76" y="260"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    payload: { text }</text>
  <text xml:space="preserve" x="76" y="280"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  }</text>
  <text xml:space="preserve" x="76" y="300"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">}</text>

  <!-- ===== Center: Reducer box ===== -->
  <rect x="320" y="70" width="240" height="320" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <!-- Header -->
  <rect x="320" y="70" width="240" height="30" rx="6" fill="#0a0a1a"/>
  <rect x="320" y="88" width="240" height="12" fill="#0a0a1a"/>
  <text x="440" y="90" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Reducer</text>
  <!-- Code -->
  <text xml:space="preserve" x="336" y="122"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// reducer.js</text>
  <text xml:space="preserve" x="336" y="142"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">function</text>
  <text xml:space="preserve" x="405" y="142"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> todosReducer(</text>
  <text xml:space="preserve" x="336" y="162"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  state = [],</text>
  <text xml:space="preserve" x="336" y="182"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  action</text>
  <text xml:space="preserve" x="336" y="202"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">) {</text>
  <text xml:space="preserve" x="336" y="222"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">  switch</text>
  <text xml:space="preserve" x="384" y="222"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> (action.type) {</text>
  <text xml:space="preserve" x="336" y="242"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    case</text>
  <text xml:space="preserve" x="376" y="242"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> ADD_TODO:</text>
  <text xml:space="preserve" x="336" y="262"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">      return</text>
  <text xml:space="preserve" x="393" y="262"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> [</text>
  <text xml:space="preserve" x="336" y="282"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        ...state,</text>
  <text xml:space="preserve" x="336" y="302"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        action.payload</text>
  <text xml:space="preserve" x="336" y="322"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">      ]</text>
  <text xml:space="preserve" x="336" y="342"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    default</text>
  <text xml:space="preserve" x="396" y="342"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">: </text>
  <text xml:space="preserve" x="336" y="362"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">      return</text>
  <text xml:space="preserve" x="393" y="362"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> state</text>

  <!-- ===== Right: Store + Subscribe box ===== -->
  <rect x="580" y="70" width="240" height="320" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <!-- Header -->
  <rect x="580" y="70" width="240" height="30" rx="6" fill="#0a0a1a"/>
  <rect x="580" y="88" width="240" height="12" fill="#0a0a1a"/>
  <text x="700" y="90" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Store + Subscribe</text>
  <!-- Code -->
  <text xml:space="preserve" x="596" y="122"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// store.js</text>
  <text xml:space="preserve" x="596" y="142"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">import</text>
  <text xml:space="preserve" x="638" y="142"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> { createStore }</text>
  <text xml:space="preserve" x="596" y="162"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">  from</text>
  <text xml:space="preserve" x="632" y="162"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178"> 'redux'</text>
  <text xml:space="preserve" x="596" y="200"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">const</text>
  <text xml:space="preserve" x="636" y="200"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> store =</text>
  <text xml:space="preserve" x="596" y="220"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  createStore(todosReducer)</text>
  <text xml:space="preserve" x="596" y="258"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">store.subscribe(() =&gt;</text>
  <text xml:space="preserve" x="596" y="278"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  console.log(</text>
  <text xml:space="preserve" x="596" y="298"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    store.getState()</text>
  <text xml:space="preserve" x="596" y="318"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  )</text>
  <text xml:space="preserve" x="596" y="338"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">)</text>
  <text xml:space="preserve" x="596" y="358"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">store.dispatch(</text>
  <text xml:space="preserve" x="596" y="378"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  addTodo(</text>
  <text xml:space="preserve" x="596" y="395"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">    'Learn Redux'</text>
  <text xml:space="preserve" x="596" y="412"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  )</text>
</svg>
