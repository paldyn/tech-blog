<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="ar" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="ag" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="21" font-weight="700" fill="#e8e8e8" text-anchor="middle">WatchService — 디렉터리 변경 감시</text>
  <text x="440" y="64" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">OS 네이티브 파일 시스템 이벤트를 Java에서 구독</text>

  <!-- OS File System -->
  <rect x="60" y="90" width="200" height="120" rx="8" fill="#1a1a1a" stroke="#888" stroke-width="1.5"/>
  <text x="160" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#888" text-anchor="middle">OS 파일 시스템</text>
  <text x="160" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">(inotify / kqueue / FSEvents)</text>
  <text x="160" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">파일 생성 / 수정 / 삭제</text>
  <text x="160" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">이벤트 발생</text>
  <text x="160" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">/watched/dir/</text>

  <!-- WatchService -->
  <rect x="340" y="90" width="200" height="120" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">WatchService</text>
  <text x="440" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">이벤트 큐</text>
  <text x="440" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">WatchKey[1]</text>
  <text x="440" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">WatchKey[2]</text>
  <text x="440" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">WatchKey[N]</text>

  <!-- Application -->
  <rect x="620" y="90" width="200" height="120" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="2"/>
  <text x="720" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">Application</text>
  <text x="720" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">watcher.take()</text>
  <text x="720" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">key.pollEvents()</text>
  <text x="720" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">event.kind()</text>
  <text x="720" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">key.reset()</text>

  <!-- Arrows -->
  <line x1="260" y1="150" x2="340" y2="150" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="540" y1="150" x2="620" y2="150" stroke="#55c555" stroke-width="2" marker-end="url(#ag)"/>
  <text x="290" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">이벤트 큐잉</text>
  <text x="580" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">블로킹 대기</text>

  <!-- WatchEvent types -->
  <rect x="60" y="240" width="760" height="50" rx="6" fill="#111" stroke="#3a3a3a" stroke-width="1"/>
  <text x="440" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">StandardWatchEventKinds</text>
  <text x="155" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">ENTRY_CREATE</text>
  <text x="330" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">ENTRY_MODIFY</text>
  <text x="510" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">ENTRY_DELETE</text>
  <text x="700" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">OVERFLOW</text>

  <!-- WatchKey lifecycle -->
  <text x="440" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">WatchKey 상태 전환</text>

  <rect x="100" y="336" width="120" height="40" rx="6" fill="#1a2e1a" stroke="#55c555" stroke-width="1"/>
  <text x="160" y="361" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">Ready (등록됨)</text>

  <rect x="300" y="336" width="120" height="40" rx="6" fill="#2e1a0d" stroke="#e09050" stroke-width="1"/>
  <text x="360" y="361" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e09050" text-anchor="middle">Signalled (이벤트)</text>

  <rect x="500" y="336" width="120" height="40" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="560" y="361" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">reset() 호출</text>

  <rect x="700" y="336" width="120" height="40" rx="6" fill="#2e1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="760" y="361" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">Invalid (취소됨)</text>

  <line x1="220" y1="356" x2="300" y2="356" stroke="#888" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="420" y1="356" x2="500" y2="356" stroke="#888" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="620" y1="356" x2="700" y2="356" stroke="#888" stroke-width="1.5" marker-end="url(#ar)"/>

  <text x="260" y="349" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#666" text-anchor="middle">이벤트 감지</text>
  <text x="460" y="349" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#666" text-anchor="middle">pollEvents()</text>
  <text x="660" y="349" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#666" text-anchor="middle">cancel()/close()</text>

  <text x="440" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">reset()을 호출하지 않으면 key가 Signalled 상태 유지 — 다음 이벤트를 놓친다</text>
  <text x="440" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">reset() 반환값이 false면 디렉터리가 삭제된 것 — 루프 종료</text>
</svg>
