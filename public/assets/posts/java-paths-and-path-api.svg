<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Path API — 경로 다루기의 모든 것</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">java.nio.file 패키지의 Path 인터페이스와 Paths 팩토리</text>

  <!-- Paths factory -->
  <rect x="60" y="95" width="200" height="54" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">Paths (팩토리)</text>
  <text x="160" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Paths.get() / Path.of()</text>

  <!-- Path interface -->
  <rect x="340" y="95" width="200" height="54" rx="8" fill="#1a2e1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">Path (인터페이스)</text>
  <text x="440" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">경로 표현 · 불변 객체</text>

  <!-- FileSystems -->
  <rect x="620" y="95" width="200" height="54" rx="8" fill="#2e1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="720" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">FileSystem</text>
  <text x="720" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">OS별 구현 (Unix/Win)</text>

  <!-- Arrows top row -->
  <line x1="260" y1="122" x2="340" y2="122" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>
  <line x1="540" y1="122" x2="620" y2="122" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Path Operations box -->
  <rect x="60" y="190" width="760" height="44" rx="6" fill="#111" stroke="#3a4a3a" stroke-width="1"/>
  <text x="440" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">주요 Path 메서드</text>
  <text x="440" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">resolve · relativize · normalize · toAbsolutePath · getParent · getFileName · getNameCount</text>

  <!-- 4 method cards -->
  <!-- resolve -->
  <rect x="60" y="255" width="175" height="80" rx="7" fill="#0d1d0d" stroke="#55c555" stroke-width="1"/>
  <text x="148" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">resolve(other)</text>
  <text x="148" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">경로 이어붙이기</text>
  <text x="148" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">/home + docs → /home/docs</text>
  <text x="148" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">상대/절대 자동 판별</text>

  <!-- relativize -->
  <rect x="253" y="255" width="175" height="80" rx="7" fill="#0d0d1d" stroke="#7ec8e3" stroke-width="1"/>
  <text x="341" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">relativize(target)</text>
  <text x="341" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">상대 경로 계산</text>
  <text x="341" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">/a/b → /a/b/c = c</text>
  <text x="341" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">둘 다 절대/상대여야 함</text>

  <!-- normalize -->
  <rect x="446" y="255" width="175" height="80" rx="7" fill="#1a1a0d" stroke="#b5cea8" stroke-width="1"/>
  <text x="534" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#b5cea8" text-anchor="middle">normalize()</text>
  <text x="534" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">.. · . 제거</text>
  <text x="534" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#b5cea8" text-anchor="middle">/a/../b/./c → /b/c</text>
  <text x="534" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">심볼릭링크 미추적</text>

  <!-- toAbsolutePath -->
  <rect x="639" y="255" width="181" height="80" rx="7" fill="#1d0d1d" stroke="#7777cc" stroke-width="1"/>
  <text x="730" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">toAbsolutePath()</text>
  <text x="730" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">절대 경로 변환</text>
  <text x="730" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">cwd + 상대경로 결합</text>
  <text x="730" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">실제 존재 불필요</text>

  <!-- Path components section -->
  <text x="440" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">경로 분해 — /home/user/docs/report.pdf</text>

  <rect x="60" y="380" width="760" height="50" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <!-- Path segments visualization -->
  <rect x="80" y="390" width="70" height="30" rx="4" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="115" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">home</text>

  <rect x="165" y="390" width="60" height="30" rx="4" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="195" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">user</text>

  <rect x="240" y="390" width="60" height="30" rx="4" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="270" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">docs</text>

  <rect x="315" y="390" width="100" height="30" rx="4" fill="#1a2e1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="365" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">report.pdf</text>

  <text x="470" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">getNameCount() = 4</text>
  <text x="470" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">getFileName() = report.pdf</text>
  <text x="650" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">getName(0) = home</text>
  <text x="650" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">getParent() = /home/user/docs</text>

  <!-- Interop row -->
  <text x="440" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">상호 변환</text>
  <rect x="100" y="470" width="160" height="34" rx="5" fill="#1a1a1a" stroke="#888" stroke-width="1"/>
  <text x="180" y="492" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">File → path.toFile()</text>

  <rect x="360" y="470" width="160" height="34" rx="5" fill="#1a1a1a" stroke="#888" stroke-width="1"/>
  <text x="440" y="492" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">URI → path.toUri()</text>

  <rect x="620" y="470" width="160" height="34" rx="5" fill="#1a1a1a" stroke="#888" stroke-width="1"/>
  <text x="700" y="492" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">String → toString()</text>
</svg>
