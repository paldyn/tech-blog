<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">시간-공간 트레이드오프</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">메모이제이션: 공간을 더 써서 시간을 단축하는 대표 기법</text>

  <!-- Left: Naive recursive -->
  <rect x="60" y="90" width="360" height="270" rx="8" fill="#0f0808" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">순수 재귀 (느림)</text>
  <rect x="76" y="126" width="328" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="148" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> fib(n) {</tspan>
  </text>
  <text x="92" y="168" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">  </tspan>
    <tspan fill="#7ec8e3" font-weight="600">if</tspan>
    <tspan fill="#ffffff"> (n </tspan>
    <tspan fill="#ffffff">&lt;= </tspan>
    <tspan fill="#b5cea8">1</tspan>
    <tspan fill="#ffffff">) </tspan>
    <tspan fill="#7ec8e3" font-weight="600">return</tspan>
    <tspan fill="#ffffff"> n;</tspan>
  </text>
  <text x="92" y="188" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">  </tspan>
    <tspan fill="#7ec8e3" font-weight="600">return</tspan>
    <tspan fill="#ffffff"> fib(n-</tspan>
    <tspan fill="#b5cea8">1</tspan>
    <tspan fill="#ffffff">) + fib(n-</tspan>
    <tspan fill="#b5cea8">2</tspan>
    <tspan fill="#ffffff">);</tspan>
  </text>
  <text x="92" y="208" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">}</tspan>
  </text>
  <text x="92" y="234" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#9aa4b8">// 시간: O(2ⁿ)</tspan>
  </text>
  <text x="92" y="254" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#9aa4b8">// 공간: O(n) 재귀 스택</tspan>
  </text>
  <text x="92" y="302" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e05555">fib(40) = 수십 억 번 호출!</tspan>
  </text>
  <text x="240" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">중복 계산 반복</text>

  <!-- Right: Memoized -->
  <rect x="460" y="90" width="360" height="270" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">메모이제이션 (빠름)</text>
  <rect x="476" y="126" width="328" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="148" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan>
    <tspan fill="#ffffff"> memo = {};</tspan>
  </text>
  <text x="492" y="168" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> fib(n) {</tspan>
  </text>
  <text x="492" y="188" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">  </tspan>
    <tspan fill="#7ec8e3" font-weight="600">if</tspan>
    <tspan fill="#ffffff"> (n </tspan>
    <tspan fill="#ffffff">&lt;= </tspan>
    <tspan fill="#b5cea8">1</tspan>
    <tspan fill="#ffffff">) </tspan>
    <tspan fill="#7ec8e3" font-weight="600">return</tspan>
    <tspan fill="#ffffff"> n;</tspan>
  </text>
  <text x="492" y="208" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">  </tspan>
    <tspan fill="#7ec8e3" font-weight="600">if</tspan>
    <tspan fill="#ffffff"> (memo[n]) </tspan>
    <tspan fill="#7ec8e3" font-weight="600">return</tspan>
    <tspan fill="#ffffff"> memo[n];</tspan>
  </text>
  <text x="492" y="228" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">  memo[n] = fib(n-</tspan>
    <tspan fill="#b5cea8">1</tspan>
    <tspan fill="#ffffff">) + fib(n-</tspan>
    <tspan fill="#b5cea8">2</tspan>
    <tspan fill="#ffffff">);</tspan>
  </text>
  <text x="492" y="248" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">  return</tspan>
    <tspan fill="#ffffff"> memo[n];</tspan>
  </text>
  <text x="492" y="272" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">}</tspan>
  </text>
  <text x="492" y="296" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#9aa4b8">// 시간: O(n)  공간: O(n)</tspan>
  </text>
  <text x="640" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">공간 O(n) 써서 시간 O(2ⁿ)→O(n)</text>
</svg>
