<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" width="880" height="540">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Wanted+Sans+Variable:wght@400;500;600;700&amp;display=swap');
      text { font-family: 'Wanted Sans Variable', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; }
    </style>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#141414;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sysGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a2744;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3060;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ctxGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a3322;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3d28;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="taskGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#332a10;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d3214;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="outGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2d1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#361e38;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="880" height="540" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="20" font-weight="700" letter-spacing="0.5">프롬프트 해부학 — 좋은 프롬프트의 구조</text>
  <line x1="120" y1="58" x2="760" y2="58" stroke="#333" stroke-width="1"/>

  <!-- LEFT: Prompt structure visual -->
  <!-- System Prompt block -->
  <rect x="48" y="78" width="380" height="78" rx="8" fill="url(#sysGrad)" stroke="#3a5ca8" stroke-width="1.5"/>
  <rect x="48" y="78" width="6" height="78" rx="3" fill="#4a7cd4"/>
  <text x="68" y="101" fill="#7aa8e8" font-size="11" font-weight="600" letter-spacing="1">SYSTEM PROMPT</text>
  <text x="68" y="121" fill="#c8d8f0" font-size="13">당신은 친절한 한국어 요리 전문가입니다.</text>
  <text x="68" y="140" fill="#8aaccc" font-size="12">레시피를 단계별로 설명하고, 초보자도 이해할</text>
  <text x="68" y="155" fill="#8aaccc" font-size="12">수 있도록 쉬운 언어를 사용하세요.</text>

  <!-- Context block -->
  <rect x="48" y="166" width="380" height="78" rx="8" fill="url(#ctxGrad)" stroke="#3a7854" stroke-width="1.5"/>
  <rect x="48" y="166" width="6" height="78" rx="3" fill="#4aaa6e"/>
  <text x="68" y="189" fill="#6abf8e" font-size="11" font-weight="600" letter-spacing="1">CONTEXT (배경 정보)</text>
  <text x="68" y="209" fill="#b0dcc0" font-size="13">사용자는 요리 초보이며 집에 기본 재료만 있음.</text>
  <text x="68" y="228" fill="#7ab09a" font-size="12">오늘 저녁: 닭가슴살, 양파, 감자, 소금, 후추</text>
  <text x="68" y="244" fill="#7ab09a" font-size="12">조리 시간: 30분 이내</text>

  <!-- Task block -->
  <rect x="48" y="254" width="380" height="66" rx="8" fill="url(#taskGrad)" stroke="#8a6a10" stroke-width="1.5"/>
  <rect x="48" y="254" width="6" height="66" rx="3" fill="#d4a020"/>
  <text x="68" y="277" fill="#d4b060" font-size="11" font-weight="600" letter-spacing="1">TASK (구체적 지시)</text>
  <text x="68" y="297" fill="#e8d0a0" font-size="13">위 재료로 만들 수 있는 간단한 저녁 메뉴를</text>
  <text x="68" y="312" fill="#e8d0a0" font-size="13">3가지 추천하고, 가장 쉬운 것의 레시피를 써줘.</text>

  <!-- Output format block -->
  <rect x="48" y="330" width="380" height="66" rx="8" fill="url(#outGrad)" stroke="#7a4a7e" stroke-width="1.5"/>
  <rect x="48" y="330" width="6" height="66" rx="3" fill="#b064b8"/>
  <text x="68" y="353" fill="#c080c8" font-size="11" font-weight="600" letter-spacing="1">OUTPUT FORMAT (출력 형식)</text>
  <text x="68" y="373" fill="#deb8e0" font-size="13">형식: 번호 목록 → 선택된 메뉴 → 단계별 레시피</text>
  <text x="68" y="390" fill="#deb8e0" font-size="13">각 단계는 한 문장으로. 마지막에 팁 1개 추가.</text>

  <!-- Arrow down -->
  <line x1="238" y1="404" x2="238" y2="434" stroke="#555" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="228,434 248,434 238,448" fill="#555"/>

  <!-- LLM box -->
  <rect x="108" y="448" width="260" height="40" rx="20" fill="#1e1e1e" stroke="#444" stroke-width="1.5"/>
  <circle cx="148" cy="468" r="12" fill="#1a2744" stroke="#3a5ca8" stroke-width="1"/>
  <text x="148" y="472" text-anchor="middle" fill="#6a9cd4" font-size="10" font-weight="700">AI</text>
  <text x="238" y="473" text-anchor="middle" fill="#888" font-size="13">LLM 처리</text>

  <!-- RIGHT: Labels and explanations -->
  <line x1="454" y1="74" x2="454" y2="490" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Label: System Prompt -->
  <line x1="454" y1="117" x2="486" y2="117" stroke="#3a5ca8" stroke-width="1.5"/>
  <circle cx="454" cy="117" r="3" fill="#4a7cd4"/>
  <text x="494" y="108" fill="#7aa8e8" font-size="14" font-weight="600">System Prompt</text>
  <text x="494" y="126" fill="#666" font-size="12">AI의 역할·성격·규칙을 정의</text>
  <text x="494" y="142" fill="#555" font-size="11">→ 전체 대화의 기준점이 됨</text>

  <!-- Label: Context -->
  <line x1="454" y1="205" x2="486" y2="205" stroke="#3a7854" stroke-width="1.5"/>
  <circle cx="454" cy="205" r="3" fill="#4aaa6e"/>
  <text x="494" y="196" fill="#6abf8e" font-size="14" font-weight="600">Context</text>
  <text x="494" y="214" fill="#666" font-size="12">관련 배경 정보·데이터 제공</text>
  <text x="494" y="230" fill="#555" font-size="11">→ AI가 상황을 파악하게 함</text>

  <!-- Label: Task -->
  <line x1="454" y1="287" x2="486" y2="287" stroke="#8a6a10" stroke-width="1.5"/>
  <circle cx="454" cy="287" r="3" fill="#d4a020"/>
  <text x="494" y="278" fill="#d4b060" font-size="14" font-weight="600">Task</text>
  <text x="494" y="296" fill="#666" font-size="12">정확하고 구체적인 지시사항</text>
  <text x="494" y="312" fill="#555" font-size="11">→ 모호함을 없애는 핵심 요소</text>

  <!-- Label: Output Format -->
  <line x1="454" y1="363" x2="486" y2="363" stroke="#7a4a7e" stroke-width="1.5"/>
  <circle cx="454" cy="363" r="3" fill="#b064b8"/>
  <text x="494" y="354" fill="#c080c8" font-size="14" font-weight="600">Output Format</text>
  <text x="494" y="372" fill="#666" font-size="12">원하는 응답 형태를 명시</text>
  <text x="494" y="388" fill="#555" font-size="11">→ 파싱·후처리 효율 향상</text>

  <!-- Bottom note -->
  <text x="440" y="516" text-anchor="middle" fill="#444" font-size="11">* 모든 요소가 항상 필요한 건 아니다 — 상황에 맞게 조합하는 것이 프롬프트 엔지니어링의 핵심</text>
</svg>
