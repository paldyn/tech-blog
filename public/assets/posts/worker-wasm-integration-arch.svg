<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto">
      <polygon points="0 0,20 7,0 14" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
    <marker id="arr-g" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto">
      <polygon points="0 0,20 7,0 14" fill="#55c555" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">WebAssembly + Worker · 아키텍처</text>

  <!-- Main Thread -->
  <rect x="60" y="72" width="200" height="140" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="97" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="15" font-weight="600" fill="#7ec8e3">Main Thread</text>
  <rect x="78" y="108" width="164" height="24" rx="4" fill="#0a1520"/>
  <text x="160" y="125" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">new Worker('wasm-w.js')</text>
  <rect x="78" y="140" width="164" height="24" rx="4" fill="#0a1520"/>
  <text x="160" y="157" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">worker.postMessage(data)</text>
  <text x="160" y="196" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">UI 렌더링 담당</text>

  <!-- Arrow Main → Worker -->
  <line x1="268" y1="142" x2="328" y2="142"
    stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="298" y="134" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">전달</text>

  <!-- Worker (Wasm Host) -->
  <rect x="336" y="72" width="200" height="240" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="436" y="97" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="15" font-weight="600" fill="#55c555">Web Worker</text>
  <text x="436" y="116" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">(Wasm 호스트)</text>

  <rect x="354" y="128" width="164" height="24" rx="4" fill="#0a1a0a"/>
  <text x="436" y="145" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">instantiateStreaming</text>
  <rect x="354" y="160" width="164" height="24" rx="4" fill="#0a1a0a"/>
  <text x="436" y="177" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">wasmModule.exports.fn()</text>
  <rect x="354" y="192" width="164" height="24" rx="4" fill="#0a1a0a"/>
  <text x="436" y="209" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">wasm memory (shared)</text>

  <text x="436" y="248" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Main Thread 블로킹 없음</text>
  <text x="436" y="266" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">CPU 집중 연산 수행</text>
  <text x="436" y="284" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">결과 postMessage 로 반환</text>

  <!-- Arrow Worker → Main (return) -->
  <line x1="336" y1="162" x2="268" y2="162"
    stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <text x="302" y="175" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">결과</text>

  <!-- Wasm Module box -->
  <rect x="608" y="72" width="212" height="240" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="714" y="97" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="15" font-weight="600" fill="#7777cc">Wasm 모듈 (.wasm)</text>
  <text x="714" y="116" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">C / C++ / Rust / Go → 컴파일</text>

  <rect x="626" y="128" width="176" height="24" rx="4" fill="#100a20"/>
  <text x="714" y="145" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">exports.add(a, b)</text>
  <rect x="626" y="160" width="176" height="24" rx="4" fill="#100a20"/>
  <text x="714" y="177" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">exports.processImage(ptr)</text>
  <rect x="626" y="192" width="176" height="24" rx="4" fill="#100a20"/>
  <text x="714" y="209" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">exports.memory (shared)</text>

  <text x="714" y="248" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">선형 메모리 (Linear Memory)</text>
  <text x="714" y="266" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">JS ↔ Wasm 데이터 교환</text>
  <text x="714" y="284" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">네이티브 수준 성능</text>

  <!-- Arrow Worker → Wasm -->
  <line x1="544" y1="192" x2="600" y2="192"
    stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="572" y="184" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">호출</text>

  <!-- Use cases at bottom -->
  <rect x="60" y="340" width="760" height="80" rx="8" fill="#0d1117" stroke="#3a4a6e"/>
  <text x="440" y="366" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#e8e8e8">주요 활용 사례</text>

  <text x="120" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">암호화 / 해싱</text>
  <text x="280" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">이미지 / 비디오 처리</text>
  <text x="440" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">물리 / 수치 연산</text>
  <text x="600" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e0a030">SQLite / DB 엔진</text>
  <text x="760" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">오디오 DSP</text>
</svg>
