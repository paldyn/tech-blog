<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>
  <text x="440" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">테이블 설계 체크리스트</text>

  <!-- Check items -->
  <rect x="60" y="60" width="360" height="56" rx="8" fill="#0d2400" stroke="#55c555" stroke-width="1"/>
  <text x="240" y="85" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">열 이름 규칙</text>
  <text x="240" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">소문자 snake_case · 예약어 사용 금지</text>

  <rect x="460" y="60" width="360" height="56" rx="8" fill="#0d2400" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="85" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">데이터 타입 선택</text>
  <text x="640" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">가장 작은 적합 타입 · VARCHAR 크기 과다 금지</text>

  <rect x="60" y="136" width="360" height="56" rx="8" fill="#0d2400" stroke="#55c555" stroke-width="1"/>
  <text x="240" y="161" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">NOT NULL 기본 원칙</text>
  <text x="240" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">NULL은 예외적으로만 · DEFAULT 설정 병행</text>

  <rect x="460" y="136" width="360" height="56" rx="8" fill="#0d2400" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="161" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">제약조건 이름 명시</text>
  <text x="640" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">CONSTRAINT pk_xxx / fk_yyy 패턴 권장</text>

  <rect x="60" y="212" width="360" height="56" rx="8" fill="#111822" stroke="#7ec8e3" stroke-width="1"/>
  <text x="240" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">타임스탬프 열 패턴</text>
  <text x="240" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">created_at / updated_at 기본 추가 권장</text>

  <rect x="460" y="212" width="360" height="56" rx="8" fill="#111822" stroke="#7ec8e3" stroke-width="1"/>
  <text x="640" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">CREATE TABLE AS</text>
  <text x="640" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">제약조건은 복사 안 됨 — 별도 추가 필요</text>

  <rect x="60" y="288" width="760" height="46" rx="8" fill="#1a1020" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">흔한 실수</text>
  <text x="440" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">VARCHAR(255) 남용 · FLOAT으로 금액 저장(부동소수점 오차) · 모든 열에 NULL 허용</text>
</svg>
