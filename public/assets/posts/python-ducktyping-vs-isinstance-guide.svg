<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">언제 무엇을 쓸까</text>

  <rect x="60" y="78" width="240" height="180" rx="10" fill="#101622" stroke="#55c555" stroke-width="1.5"/>
  <text x="84" y="108" font-size="16" font-weight="600" fill="#55c555">덕 타이핑 (기본)</text>
  <text x="84" y="136" font-size="13" fill="#cccccc">평범한 코드의 기본값.</text>
  <text x="84" y="160" font-size="13" fill="#cccccc">필요한 메서드를 그냥</text>
  <text x="84" y="180" font-size="13" fill="#cccccc">호출하고, 안 되면</text>
  <text x="84" y="200" font-size="13" fill="#cccccc">예외로 자연히 드러난다</text>
  <text x="84" y="232" font-size="13" fill="#9aa4b8">유연 · 확장 쉬움</text>

  <rect x="320" y="78" width="240" height="180" rx="10" fill="#101622" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="344" y="108" font-size="16" font-weight="600" fill="#7ec8e3">isinstance</text>
  <text x="344" y="136" font-size="13" fill="#cccccc">분기가 타입별로</text>
  <text x="344" y="160" font-size="13" fill="#cccccc">정말 달라야 할 때,</text>
  <text x="344" y="180" font-size="13" fill="#cccccc">또는 경계에서 입력을</text>
  <text x="344" y="200" font-size="13" fill="#cccccc">엄격히 검증할 때</text>
  <text x="344" y="232" font-size="13" fill="#9aa4b8">명시적 · 좁은 계약</text>

  <rect x="580" y="78" width="240" height="180" rx="10" fill="#101622" stroke="#7777cc" stroke-width="1.5"/>
  <text x="604" y="108" font-size="16" font-weight="600" fill="#9c9cff">Protocol / ABC</text>
  <text x="604" y="136" font-size="13" fill="#cccccc">"이런 능력을 가진</text>
  <text x="604" y="160" font-size="13" fill="#cccccc">것"을 타입 힌트로</text>
  <text x="604" y="180" font-size="13" fill="#cccccc">표현하고 싶을 때.</text>
  <text x="604" y="200" font-size="13" fill="#cccccc">덕 타이핑 + 정적 검사</text>
  <text x="604" y="232" font-size="13" fill="#9aa4b8">유연함을 타입으로</text>
</svg>
