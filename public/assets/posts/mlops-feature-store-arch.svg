<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arrow-blue" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrow-purple" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#7777cc"/>
    </marker>
    <marker id="arrow-green" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#55c555"/>
    </marker>
    <marker id="arrow-gray" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">피처 스토어 아키텍처</text>

  <!-- TOP ROW: Data Sources -->
  <!-- Event Stream -->
  <rect x="60" y="70" width="200" height="72" rx="8" fill="#0f1a1f" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="97" text-anchor="middle" font-size="14" font-weight="700" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">이벤트 스트림</text>
  <text x="160" y="118" text-anchor="middle" font-size="12" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">Kafka, Kinesis</text>
  <text x="160" y="134" text-anchor="middle" font-size="11" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">실시간 이벤트 수집</text>

  <!-- Batch Data -->
  <rect x="290" y="70" width="200" height="72" rx="8" fill="#12101f" stroke="#7777cc" stroke-width="1.5"/>
  <text x="390" y="97" text-anchor="middle" font-size="14" font-weight="700" fill="#7777cc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">배치 데이터</text>
  <text x="390" y="118" text-anchor="middle" font-size="12" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">S3, BigQuery</text>
  <text x="390" y="134" text-anchor="middle" font-size="11" fill="#7777cc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">대용량 정형 데이터</text>

  <!-- On-demand Features -->
  <rect x="520" y="70" width="200" height="72" rx="8" fill="#1f120f" stroke="#ce9178" stroke-width="1.5"/>
  <text x="620" y="97" text-anchor="middle" font-size="14" font-weight="700" fill="#ce9178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">온디맨드 피처</text>
  <text x="620" y="118" text-anchor="middle" font-size="12" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">실시간 계산</text>
  <text x="620" y="134" text-anchor="middle" font-size="11" fill="#ce9178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">요청 시점 피처 생성</text>

  <!-- Arrows from sources to pipeline -->
  <line x1="160" y1="142" x2="370" y2="170" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="390" y1="142" x2="390" y2="168" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <line x1="620" y1="142" x2="415" y2="170" stroke="#ce9178" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Feature Pipeline -->
  <rect x="120" y="170" width="640" height="58" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="196" text-anchor="middle" font-size="14" font-weight="700" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">피처 파이프라인</text>
  <text x="440" y="216" text-anchor="middle" font-size="12" fill="#aaa" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">변환 · 정규화 · 집계 · 검증</text>

  <!-- Split arrows from pipeline -->
  <line x1="280" y1="228" x2="230" y2="268" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <line x1="600" y1="228" x2="640" y2="268" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Offline Store -->
  <rect x="60" y="268" width="370" height="78" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="245" y="293" text-anchor="middle" font-size="14" font-weight="700" fill="#7777cc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">오프라인 스토어 (Offline Store)</text>
  <text x="245" y="313" text-anchor="middle" font-size="12" fill="#aaa" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">학습용 Historical 피처</text>
  <text x="245" y="332" text-anchor="middle" font-size="11" fill="#7777cc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">S3 / BigQuery / Parquet</text>

  <!-- Online Store -->
  <rect x="450" y="268" width="370" height="78" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="635" y="293" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">온라인 스토어 (Online Store)</text>
  <text x="635" y="313" text-anchor="middle" font-size="12" fill="#aaa" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">서빙용 Low-latency 피처</text>
  <text x="635" y="332" text-anchor="middle" font-size="11" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">Redis / DynamoDB / Cassandra</text>

  <!-- Feature Registry (center) -->
  <rect x="355" y="280" width="170" height="54" rx="8" fill="#1a1210" stroke="#e8c56a" stroke-width="1.5"/>
  <text x="440" y="302" text-anchor="middle" font-size="12" font-weight="700" fill="#e8c56a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">피처 레지스트리</text>
  <text x="440" y="320" text-anchor="middle" font-size="10" fill="#aaa" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">메타데이터 · 계보 · 버전</text>

  <!-- Arrows down to final boxes -->
  <line x1="245" y1="346" x2="200" y2="398" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <line x1="635" y1="346" x2="670" y2="398" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Bottom: Model Training box -->
  <rect x="60" y="398" width="290" height="52" rx="8" fill="#161028" stroke="#7777cc" stroke-width="1.5"/>
  <text x="205" y="421" text-anchor="middle" font-size="13" font-weight="700" fill="#7777cc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">모델 학습</text>
  <text x="205" y="439" text-anchor="middle" font-size="11" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">get_historical_features()</text>

  <!-- Bottom: Model Serving box -->
  <rect x="530" y="398" width="290" height="52" rx="8" fill="#0a1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="675" y="421" text-anchor="middle" font-size="13" font-weight="700" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">모델 서빙</text>
  <text x="675" y="439" text-anchor="middle" font-size="11" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">get_online_features()</text>
</svg>
