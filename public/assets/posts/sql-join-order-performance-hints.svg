<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">옵티마이저 vs 강제 힌트</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">언제 옵티마이저를 믿고 언제 개입할 것인가</text>

  <!-- Optimizer section -->
  <rect x="60" y="90" width="370" height="290" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="245" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">옵티마이저가 결정하는 것</text>

  <text x="80" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">통계 수집 기반 비용 계산</text>
  <text x="80" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 테이블 행 수, 선택도, 인덱스 카디널리티</text>
  <text x="80" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 조인 순서 (최적 드라이빙 테이블)</text>
  <text x="80" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 조인 알고리즘 선택</text>

  <rect x="72" y="210" width="346" height="108" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="88" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- 통계 업데이트 (PostgreSQL)</text>
  <text x="88" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">ANALYZE orders;</text>
  <text x="88" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- Oracle</text>
  <text x="88" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">EXEC DBMS_STATS.GATHER_TABLE_STATS(</text>
  <text x="88" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    'schema','orders');</text>

  <text x="245" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">통계가 최신이면 대부분 옵티마이저를 믿는다</text>
  <text x="245" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">통계 갱신 → 실행 계획 재평가가 먼저</text>

  <!-- Hints section -->
  <rect x="450" y="90" width="370" height="290" rx="8" fill="#111827" stroke="#e8c87a" stroke-width="1.5"/>
  <text x="635" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8c87a">힌트로 강제하는 경우</text>

  <text x="470" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">힌트 사용 조건</text>
  <text x="470" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 통계 갱신 후에도 잘못된 계획 선택</text>
  <text x="470" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 데이터 특성을 옵티마이저가 모를 때</text>
  <text x="470" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 조인 수가 너무 많아 탐색 공간 폭발</text>

  <rect x="462" y="210" width="346" height="108" rx="6" fill="#070b14" stroke="#2a2a10"/>
  <text x="478" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- MySQL STRAIGHT_JOIN</text>
  <text x="478" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">SELECT STRAIGHT_JOIN *</text>
  <text x="478" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">FROM vip_users v</text>
  <text x="478" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">JOIN orders o ON ...</text>
  <text x="478" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- 작성 순서로 조인 강제</text>

  <text x="635" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8c87a">힌트는 버전 업그레이드 시 재검토 필요</text>
  <text x="635" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">옵티마이저 개선으로 역효과 가능성</text>

  <!-- Footer -->
  <text x="440" y="424" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · SQL 완전 정복</text>
</svg>
