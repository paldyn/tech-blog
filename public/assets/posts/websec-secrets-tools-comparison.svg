<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">시크릿 관리 도구 비교</text>

  <!-- Code block: Vault dynamic secrets example -->
  <rect x="60" y="65" width="390" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="87" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># HashiCorp Vault: 동적 DB 자격증명</text>
  <text x="76" y="107" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 1. DB 시크릿 엔진 활성화</text>
  <text x="76" y="125" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">vault secrets enable database</text>
  <text x="76" y="145" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 2. PostgreSQL 연결 설정</text>
  <text x="76" y="163" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">vault write database/config/mydb \</text>
  <text x="76" y="181" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  plugin_name=postgresql \</text>
  <text x="76" y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">  connection_url="postgresql://..."</text>
  <text x="76" y="219" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 3. 앱이 동적 자격증명 요청</text>
  <text x="76" y="239" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">vault read database/creds/app-role</text>
  <text x="76" y="257" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve"># TTL 1h짜리 임시 계정 즉시 생성</text>

  <!-- Code block: AWS Secrets Manager -->
  <rect x="470" y="65" width="350" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="486" y="87" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># AWS Secrets Manager (Python)</text>
  <text x="486" y="107" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">import boto3, json</text>
  <text x="486" y="127" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">sm = boto3.client(</text>
  <text x="486" y="145" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">  "secretsmanager")</text>
  <text x="486" y="165" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">resp = sm.get_secret_value(</text>
  <text x="486" y="183" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">  SecretId="prod/db/creds")</text>
  <text x="486" y="203" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">secret = json.loads(</text>
  <text x="486" y="221" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  resp["SecretString"])</text>
  <text x="486" y="241" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># IAM 역할 기반 접근 제어</text>
  <text x="486" y="261" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 자동 교체 Lambda 연동 가능</text>

  <!-- Comparison table -->
  <rect x="60" y="280" width="760" height="36" rx="6" fill="#141a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="150" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">도구</text>
  <text x="310" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">적합한 환경</text>
  <text x="490" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">강점</text>
  <text x="700" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">주의사항</text>

  <rect x="60" y="320" width="760" height="30" rx="0" fill="#0f1520" stroke="#2a3a5e" stroke-width="1"/>
  <text x="150" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">HashiCorp Vault</text>
  <text x="310" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">멀티클라우드/온프레미스</text>
  <text x="490" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">동적 자격증명, 유연한 인증</text>
  <text x="700" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">운영 복잡도 높음</text>

  <rect x="60" y="350" width="760" height="30" rx="0" fill="#111820" stroke="#2a3a5e" stroke-width="1"/>
  <text x="150" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">AWS Secrets Manager</text>
  <text x="310" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">AWS 네이티브 환경</text>
  <text x="490" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">IAM 통합, 자동 교체</text>
  <text x="700" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">AWS Lock-in, 비용</text>

  <rect x="60" y="380" width="760" height="30" rx="0" fill="#0f1520" stroke="#2a3a5e" stroke-width="1"/>
  <text x="150" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">K8s Sealed Secrets</text>
  <text x="310" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Kubernetes 워크로드</text>
  <text x="490" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">GitOps 친화적</text>
  <text x="700" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">K8s 전용</text>

  <rect x="60" y="410" width="760" height="30" rx="0" fill="#111820" stroke="#2a3a5e" stroke-width="1"/>
  <text x="150" y="430" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">GitHub Actions Secrets</text>
  <text x="310" y="430" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">CI/CD 파이프라인</text>
  <text x="490" y="430" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">설정 간단, Actions 통합</text>
  <text x="700" y="430" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">GitHub 의존성</text>
</svg>
