<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arrzt" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <text x="440" y="50" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Zero Trust vs 기존 경계 보안</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">"절대 신뢰하지 말고, 항상 검증하라"</text>

  <!-- Traditional model -->
  <rect x="60" y="100" width="360" height="360" rx="10" fill="#1a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="240" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">기존 경계 보안 (Perimeter)</text>

  <!-- Outer safe zone -->
  <rect x="80" y="148" width="320" height="220" rx="8" fill="#250808" stroke="#e05555" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="240" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">내부망 (신뢰 구역)</text>

  <!-- Resources inside -->
  <rect x="100" y="188" width="120" height="44" rx="6" fill="#1a1a2e" stroke="#555" stroke-width="1"/>
  <text x="160" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">DB 서버</text>
  <rect x="240" y="188" width="120" height="44" rx="6" fill="#1a1a2e" stroke="#555" stroke-width="1"/>
  <text x="300" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">내부 API</text>
  <rect x="100" y="250" width="120" height="44" rx="6" fill="#1a1a2e" stroke="#555" stroke-width="1"/>
  <text x="160" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">파일 서버</text>
  <rect x="240" y="250" width="120" height="44" rx="6" fill="#1a1a2e" stroke="#555" stroke-width="1"/>
  <text x="300" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">CI/CD</text>

  <!-- Firewall -->
  <rect x="80" y="308" width="320" height="40" rx="6" fill="#3a0808" stroke="#e05555" stroke-width="2"/>
  <text x="240" y="333" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">방화벽 (경계)</text>

  <!-- Problem -->
  <rect x="80" y="366" width="320" height="76" rx="6" fill="#1a0505" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e05555" text-anchor="middle">문제점</text>
  <text x="240" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">내부에 들어오면 모두 신뢰</text>
  <text x="240" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">내부자 위협 · 래터럴 무브 취약</text>
  <text x="240" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">VPN만으로는 내부 접근 통제 없음</text>

  <!-- Zero Trust model -->
  <rect x="460" y="100" width="360" height="360" rx="10" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">Zero Trust 모델</text>

  <!-- Policy Engine -->
  <rect x="540" y="148" width="200" height="48" rx="8" fill="#1a2035" stroke="#7ec8e3" stroke-width="2"/>
  <text x="640" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">정책 엔진</text>
  <text x="640" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">모든 요청을 실시간 검증</text>

  <!-- Verification steps -->
  <rect x="480" y="220" width="120" height="48" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="540" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="700" fill="#55c555" text-anchor="middle">신원 검증</text>
  <text x="540" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">MFA · SSO</text>

  <rect x="620" y="220" width="120" height="48" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="680" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="700" fill="#55c555" text-anchor="middle">기기 상태</text>
  <text x="680" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">패치 수준 · 보안</text>

  <rect x="480" y="288" width="120" height="48" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="540" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="700" fill="#55c555" text-anchor="middle">컨텍스트</text>
  <text x="540" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">위치 · 시간</text>

  <rect x="620" y="288" width="120" height="48" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="680" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="700" fill="#55c555" text-anchor="middle">최소 권한</text>
  <text x="680" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">리소스별 접근</text>

  <!-- Benefit -->
  <rect x="480" y="356" width="320" height="86" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">장점</text>
  <text x="640" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">위치와 무관하게 일관된 정책 적용</text>
  <text x="640" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">내부자 위협 대응 가능</text>
  <text x="640" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">래터럴 무브 차단</text>
  <text x="640" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">클라우드 · 원격근무 환경 최적</text>
</svg>
