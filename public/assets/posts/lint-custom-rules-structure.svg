<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">ESLint 규칙 완전 구조</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">meta + create 두 파트로 구성</text>

  <!-- Left: meta -->
  <rect x="60" y="96" width="360" height="340" rx="8" fill="#1a1a1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">meta (규칙 메타데이터)</text>
  <text x="76" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">type</tspan>: <tspan fill="#ce9178">'problem'</tspan> <tspan fill="#9aa4b8">// problem|suggestion|layout</tspan></text>
  <text x="76" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">fixable</tspan>: <tspan fill="#ce9178">'code'</tspan> <tspan fill="#9aa4b8">// 자동 수정 지원 여부</tspan></text>
  <text x="76" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">hasSuggestions</tspan>: <tspan fill="#ce9178">true</tspan> <tspan fill="#9aa4b8">// 수정 제안 제공</tspan></text>
  <text x="76" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">// 메시지 ID 선언</text>
  <text x="76" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">messages</tspan>: {</text>
  <text x="76" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  noConsole: <tspan fill="#ce9178">'console.{{method}} 금지'</tspan>,</text>
  <text x="76" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  useLogger: <tspan fill="#ce9178">'logger 사용 권장'</tspan>,</text>
  <text x="76" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">}</text>
  <text x="76" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">// 옵션 스키마 (JSON Schema)</text>
  <text x="76" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">schema</tspan>: [{ <tspan fill="#ce9178">type</tspan>: <tspan fill="#ce9178">'object'</tspan>,</text>
  <text x="76" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  properties: { allow: { type: <tspan fill="#ce9178">'array'</tspan> } } }]</text>
  <text x="76" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">// eslint-disable 허용 여부</text>
  <text x="76" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">docs</tspan>: { description: <tspan fill="#ce9178">'...'</tspan>, recommended: <tspan fill="#ce9178">true</tspan> }</text>

  <!-- Right: create -->
  <rect x="460" y="96" width="360" height="340" rx="8" fill="#1a1a1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">create (규칙 구현)</text>
  <text x="476" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">create</tspan>(context) {</text>
  <text x="476" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">  // 옵션 읽기</text>
  <text x="476" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">const</tspan> [opts] = context.options</text>
  <text x="476" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">return</tspan> {</text>
  <text x="476" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">    // AST 노드 타입 = 방문자</text>
  <text x="476" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">    CallExpression(node) {</text>
  <text x="476" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">      <tspan fill="#7ec8e3" font-weight="600">if</tspan> (!isConsoleLog(node)) <tspan fill="#7ec8e3" font-weight="600">return</tspan></text>
  <text x="476" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">      context.report({</text>
  <text x="476" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">        node, messageId: <tspan fill="#ce9178">'noConsole'</tspan>,</text>
  <text x="476" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">        data: { method: getMethod(node) },</text>
  <text x="476" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">        fix: (fixer) =&gt; fixer.remove(node)</text>
  <text x="476" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">      })</text>
  <text x="476" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">    }</text>
  <text x="476" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  }</text>
</svg>
