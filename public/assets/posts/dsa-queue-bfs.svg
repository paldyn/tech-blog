<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-vis" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">BFS 탐색과 큐</text>
  <text x="440" y="66" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">방문 순서: 1 → 2 → 3 → 4 → 5 → 6 (레벨 순)</text>

  <!-- ─── Graph ─── -->
  <!-- edges -->
  <line x1="200" y1="140" x2="140" y2="230" stroke="#3a5a8a" stroke-width="2"/>
  <line x1="200" y1="140" x2="260" y2="230" stroke="#3a5a8a" stroke-width="2"/>
  <line x1="140" y1="230" x2="100" y2="320" stroke="#3a5a8a" stroke-width="2"/>
  <line x1="140" y1="230" x2="180" y2="320" stroke="#3a5a8a" stroke-width="2"/>
  <line x1="260" y1="230" x2="300" y2="320" stroke="#3a5a8a" stroke-width="2"/>

  <!-- nodes -->
  <!-- Node 1 (root) - visited -->
  <circle cx="200" cy="140" r="28" fill="#1a4a1a" stroke="#55c555" stroke-width="2.5"/>
  <text x="200" y="146" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="16" font-weight="600" fill="#55c555">1</text>

  <!-- Node 2 -->
  <circle cx="140" cy="230" r="28" fill="#1a4a1a" stroke="#55c555" stroke-width="2.5"/>
  <text x="140" y="236" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="16" font-weight="600" fill="#55c555">2</text>

  <!-- Node 3 -->
  <circle cx="260" cy="230" r="28" fill="#1a4a1a" stroke="#55c555" stroke-width="2.5"/>
  <text x="260" y="236" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="16" font-weight="600" fill="#55c555">3</text>

  <!-- Node 4 -->
  <circle cx="100" cy="320" r="28" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="2"/>
  <text x="100" y="326" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="16" font-weight="600" fill="#7ec8e3">4</text>

  <!-- Node 5 -->
  <circle cx="180" cy="320" r="28" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="2"/>
  <text x="180" y="326" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="16" font-weight="600" fill="#7ec8e3">5</text>

  <!-- Node 6 -->
  <circle cx="300" cy="320" r="28" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="2"/>
  <text x="300" y="326" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="16" font-weight="600" fill="#7ec8e3">6</text>

  <!-- level labels -->
  <text x="60" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Level 0</text>
  <text x="60" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Level 1</text>
  <text x="60" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Level 2</text>

  <!-- ─── RIGHT: BFS steps ─── -->
  <text x="600" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">BFS 큐 상태 변화</text>

  <!-- Step 1 -->
  <rect x="430" y="94" width="400" height="52" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="446" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">초기: enqueue(1)</text>
  <text x="446" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" xml:space="preserve">큐: [1]</text>

  <!-- Step 2 -->
  <rect x="430" y="156" width="400" height="70" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="446" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">dequeue() → 1 방문</text>
  <text x="446" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">enqueue(2), enqueue(3)</text>
  <text x="446" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" xml:space="preserve">큐: [2, 3]</text>

  <!-- Step 3 -->
  <rect x="430" y="236" width="400" height="70" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="446" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">dequeue() → 2 방문</text>
  <text x="446" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">enqueue(4), enqueue(5)</text>
  <text x="446" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" xml:space="preserve">큐: [3, 4, 5]</text>

  <!-- Step 4 -->
  <rect x="430" y="316" width="400" height="70" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="446" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">dequeue() → 3 방문</text>
  <text x="446" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">enqueue(6)</text>
  <text x="446" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" xml:space="preserve">큐: [4, 5, 6]</text>

  <!-- Step 5 -->
  <rect x="430" y="396" width="400" height="52" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="446" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">dequeue 반복 → 4, 5, 6 방문</text>
  <text x="446" y="434" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" xml:space="preserve">큐: [] (완료)</text>

  <!-- visit order -->
  <rect x="60" y="416" width="350" height="52" rx="8" fill="#0d1f0d" stroke="#1a4a1a" stroke-width="1"/>
  <text x="76" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600" xml:space="preserve">방문 순서: 1 → 2 → 3 → 4 → 5 → 6</text>
  <text x="76" y="456" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">레벨별(거리순) 탐색 보장</text>
</svg>
