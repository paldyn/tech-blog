<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" style="background:#0a0a0a;border-radius:12px;">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <text x="440" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">리눅스 파일 유형 7가지</text>
  <text x="440" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">ls -l 첫 번째 문자가 파일 유형을 나타낸다</text>

  <!-- Regular file -->
  <rect x="60" y="100" width="760" height="46" fill="#111827" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="96" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">-</text>
  <text x="200" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">일반 파일 (Regular File)</text>
  <text x="200" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">텍스트, 바이너리, 실행 파일 등 일반적인 파일</text>
  <text x="800" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" text-anchor="end">touch file.txt</text>

  <!-- Directory -->
  <rect x="60" y="156" width="760" height="46" fill="#0f1621" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="96" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="22" font-weight="700" fill="#7ec8e3" text-anchor="middle">d</text>
  <text x="200" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">디렉터리 (Directory)</text>
  <text x="200" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">파일명→inode 매핑 테이블을 담는 특수 파일</text>
  <text x="800" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" text-anchor="end">mkdir dir</text>

  <!-- Symbolic link -->
  <rect x="60" y="212" width="760" height="46" fill="#111827" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="96" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="22" font-weight="700" fill="#7777cc" text-anchor="middle">l</text>
  <text x="200" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">심볼릭 링크 (Symbolic Link)</text>
  <text x="200" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">대상 경로 문자열을 저장하는 특수 파일</text>
  <text x="800" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" text-anchor="end">ln -s target link</text>

  <!-- Character device -->
  <rect x="60" y="268" width="760" height="46" fill="#0f1621" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="96" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="22" font-weight="700" fill="#ce9178" text-anchor="middle">c</text>
  <text x="200" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#ce9178">문자 장치 (Character Device)</text>
  <text x="200" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">문자 단위 I/O: /dev/tty, /dev/null, /dev/random</text>
  <text x="800" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" text-anchor="end">ls -l /dev/tty</text>

  <!-- Block device -->
  <rect x="60" y="324" width="760" height="46" fill="#111827" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="96" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">b</text>
  <text x="200" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">블록 장치 (Block Device)</text>
  <text x="200" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">블록 단위 I/O: /dev/sda, /dev/nvme0n1</text>
  <text x="800" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" text-anchor="end">ls -l /dev/sda</text>

  <!-- Named pipe (FIFO) -->
  <rect x="60" y="380" width="760" height="46" fill="#0f1621" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="96" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="22" font-weight="700" fill="#55c555" text-anchor="middle">p</text>
  <text x="200" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">명명된 파이프 (Named Pipe / FIFO)</text>
  <text x="200" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">프로세스 간 통신(IPC)용 단방향 채널</text>
  <text x="800" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" text-anchor="end">mkfifo mypipe</text>

  <!-- Socket -->
  <rect x="60" y="436" width="760" height="46" fill="#111827" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="96" y="464" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="22" font-weight="700" fill="#7ec8e3" text-anchor="middle">s</text>
  <text x="200" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">소켓 (Socket)</text>
  <text x="200" y="474" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">IPC용 양방향 통신: /run/docker.sock, /tmp/.mysql.sock</text>
  <text x="800" y="464" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" text-anchor="end">ls -l /run/*.sock</text>

  <text x="440" y="492" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">file 명령은 유형뿐 아니라 내용(ELF, ASCII, PNG …)까지 판별한다</text>
</svg>
