<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>
  <text x="50" y="52" font-size="22" font-weight="700" fill="#e8e8e8">프로덕션 워크로드 최소 스펙</text>
  <text x="50" y="80" font-size="14" fill="#888">신뢰성·리소스·보안·종료를 한 Deployment에 모은 모습</text>

  <rect x="50" y="105" width="780" height="250" rx="10" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="66" y="132" xml:space="preserve" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">spec:</text>
  <text x="66" y="152" xml:space="preserve" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  <tspan fill="#7ec8e3" font-weight="600">replicas</tspan>: 3                  <tspan fill="#9aa4b8"># 단일 장애점 제거</tspan></text>
  <text x="66" y="172" xml:space="preserve" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  template:</text>
  <text x="66" y="192" xml:space="preserve" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    spec:</text>
  <text x="66" y="212" xml:space="preserve" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">      <tspan fill="#7ec8e3" font-weight="600">securityContext</tspan>: { runAsNonRoot: true }</text>
  <text x="66" y="232" xml:space="preserve" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">      containers:</text>
  <text x="66" y="252" xml:space="preserve" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">      - name: web</text>
  <text x="66" y="272" xml:space="preserve" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">        <tspan fill="#7ec8e3" font-weight="600">resources</tspan>: { requests, limits }   <tspan fill="#9aa4b8"># QoS</tspan></text>
  <text x="66" y="292" xml:space="preserve" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">        <tspan fill="#7ec8e3" font-weight="600">readinessProbe</tspan>: { ... }          <tspan fill="#9aa4b8"># 트래픽 게이트</tspan></text>
  <text x="66" y="312" xml:space="preserve" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">        <tspan fill="#7ec8e3" font-weight="600">livenessProbe</tspan>:  { ... }          <tspan fill="#9aa4b8"># 자가 회복</tspan></text>
  <text x="66" y="332" xml:space="preserve" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">        <tspan fill="#7ec8e3" font-weight="600">lifecycle.preStop</tspan>: { ... }       <tspan fill="#9aa4b8"># graceful</tspan></text>
</svg>
