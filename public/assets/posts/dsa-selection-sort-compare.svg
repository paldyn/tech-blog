<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="38" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">선택 정렬 — 구현 및 버블과 비교</text>

  <!-- Code block -->
  <rect x="60" y="58" width="460" height="280" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="82" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#7ec8e3" font-weight="600" xml:space="preserve">void</text>
  <text x="116" y="82" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve"> selectionSort(vector&lt;int&gt;&amp; a) &#123;</text>
  <text x="76" y="101" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#7ec8e3" font-weight="600" xml:space="preserve">    int</text>
  <text x="116" y="101" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve"> n = a.size();</text>
  <text x="76" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#7ec8e3" font-weight="600" xml:space="preserve">    for</text>
  <text x="111" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve"> (int i = 0; i &lt; n-1; i++) &#123;</text>
  <text x="76" y="139" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#7ec8e3" font-weight="600" xml:space="preserve">        int</text>
  <text x="130" y="139" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve"> minIdx = i;</text>
  <text x="76" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#7ec8e3" font-weight="600" xml:space="preserve">        for</text>
  <text x="126" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve"> (int j = i+1; j &lt; n; j++)</text>
  <text x="76" y="177" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#7ec8e3" font-weight="600" xml:space="preserve">            if</text>
  <text x="133" y="177" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve"> (a[j] &lt; a[minIdx])</text>
  <text x="76" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">                minIdx = j;</text>
  <text x="76" y="215" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#7ec8e3" font-weight="600" xml:space="preserve">        if</text>
  <text x="111" y="215" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve"> (minIdx != i)</text>
  <text x="76" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">            swap(a[i], a[minIdx]);</text>
  <text x="76" y="253" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">    &#125;</text>
  <text x="76" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">&#125;</text>
  <text x="76" y="291" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#9aa4b8" xml:space="preserve">// 비교: 항상 O(N²), 교환: 최대 N-1회</text>
  <text x="76" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#9aa4b8" xml:space="preserve">// 불안정 정렬 (동일 키 순서 미보장)</text>
  <text x="76" y="329" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#9aa4b8" xml:space="preserve">// in-place O(1) 공간</text>

  <!-- Comparison table -->
  <rect x="540" y="58" width="300" height="280" fill="#111" rx="8" stroke="#333" stroke-width="1"/>
  <text x="690" y="82" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8">버블 vs 선택 비교</text>
  <!-- Headers -->
  <text x="590" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">항목</text>
  <text x="660" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">버블</text>
  <text x="780" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">선택</text>
  <line x1="548" y1="112" x2="832" y2="112" stroke="#222" stroke-width="1"/>
  <!-- Rows -->
  <text x="590" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">최선</text>
  <text x="660" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">O(N)</text>
  <text x="780" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">O(N²)</text>
  <line x1="548" y1="142" x2="832" y2="142" stroke="#222" stroke-width="1"/>
  <text x="590" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">최악</text>
  <text x="660" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">O(N²)</text>
  <text x="780" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">O(N²)</text>
  <line x1="548" y1="170" x2="832" y2="170" stroke="#222" stroke-width="1"/>
  <text x="590" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">교환 횟수</text>
  <text x="660" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">O(N²)</text>
  <text x="780" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">O(N)</text>
  <line x1="548" y1="198" x2="832" y2="198" stroke="#222" stroke-width="1"/>
  <text x="590" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">안정성</text>
  <text x="660" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">안정</text>
  <text x="780" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">불안정</text>
  <line x1="548" y1="226" x2="832" y2="226" stroke="#222" stroke-width="1"/>
  <text x="590" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">공간</text>
  <text x="660" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">O(1)</text>
  <text x="780" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">O(1)</text>
  <line x1="548" y1="254" x2="832" y2="254" stroke="#222" stroke-width="1"/>
  <text x="590" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">쓰기 비용</text>
  <text x="660" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">높음</text>
  <text x="780" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">낮음</text>
  <line x1="548" y1="282" x2="832" y2="282" stroke="#222" stroke-width="1"/>
  <text x="690" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">쓰기 비용이 비쌀 때(플래시 메모리 등) 선택 정렬 유리</text>
</svg>
