<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">오픈소스 라이선스와 GNU/Linux</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">GPL · BSD · MIT — 세 가지 주요 오픈소스 흐름</text>

  <!-- GPL Box -->
  <rect x="60" y="100" width="230" height="240" fill="#0d1f0d" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="175" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">GPL (Copyleft)</text>
  <text x="175" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">GNU General Public License</text>
  <text x="175" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Linux 커널 라이선스</text>
  <text x="100" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">• 소스코드 공개 의무</text>
  <text x="100" y="223" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">• 수정 배포 시 동일 라이선스</text>
  <text x="100" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">• 자유롭게 사용·수정 가능</text>
  <text x="100" y="259" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">• 상업적 사용 가능</text>
  <text x="175" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">예: Linux, gcc, bash</text>
  <text x="175" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">Stallman의 "카피레프트"</text>

  <!-- BSD Box -->
  <rect x="325" y="100" width="230" height="240" fill="#0d1a2a" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">BSD License</text>
  <text x="440" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">Berkeley Software Distribution</text>
  <text x="440" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8c55a" text-anchor="middle">Unix 후손 라이선스</text>
  <text x="364" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">• 소스 공개 의무 없음</text>
  <text x="364" y="223" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">• 저작권 표시만 유지</text>
  <text x="364" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">• 상업 제품에 포함 가능</text>
  <text x="364" y="259" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">• 독점 소프트웨어도 허용</text>
  <text x="440" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">예: FreeBSD, macOS(Darwin)</text>
  <text x="440" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">UC Berkeley에서 파생</text>

  <!-- MIT/Permissive Box -->
  <rect x="590" y="100" width="230" height="240" fill="#1a0d1a" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="705" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7777cc" text-anchor="middle">MIT / Apache</text>
  <text x="705" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">Permissive License</text>
  <text x="705" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">가장 자유로운 라이선스</text>
  <text x="630" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">• 거의 제한 없음</text>
  <text x="630" y="223" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">• 저작권·라이선스 고지만</text>
  <text x="630" y="241" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">• 독점 소프트웨어 허용</text>
  <text x="630" y="259" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">• 특허 조항(Apache v2)</text>
  <text x="705" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">예: React, Kubernetes</text>
  <text x="705" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">기업 오픈소스에 많이 사용</text>

  <text x="440" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">GNU/Linux = GNU 도구(GPL) + Linux 커널(GPL v2) — 완전한 자유 OS</text>
</svg>
