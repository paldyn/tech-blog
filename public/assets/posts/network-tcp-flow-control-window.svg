<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="aw1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="aw2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">TCP 흐름 제어: 수신 윈도우(rwnd)</text>

  <!-- Sender -->
  <rect x="60" y="68" width="140" height="40" rx="6" fill="#0a1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="93" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">송신자</text>

  <!-- Receiver -->
  <rect x="680" y="68" width="140" height="40" rx="6" fill="#0a2a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="750" y="93" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">수신자</text>

  <!-- Timelines -->
  <line x1="130" y1="108" x2="130" y2="430" stroke="#2a3a4a" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="750" y1="108" x2="750" y2="430" stroke="#2a4a2a" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Round 1: rwnd=4000 -->
  <text x="760" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">rwnd=4000</text>
  <line x1="750" y1="140" x2="144" y2="160" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#aw2)"/>

  <!-- Send 4 segments -->
  <line x1="130" y1="180" x2="736" y2="195" stroke="#7ec8e3" stroke-width="2" marker-end="url(#aw1)"/>
  <text x="390" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">Seq=1, Len=1000</text>

  <line x1="130" y1="205" x2="736" y2="218" stroke="#7ec8e3" stroke-width="2" marker-end="url(#aw1)"/>
  <text x="390" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">Seq=1001, Len=1000</text>

  <line x1="130" y1="228" x2="736" y2="241" stroke="#7ec8e3" stroke-width="2" marker-end="url(#aw1)"/>
  <text x="390" y="223" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">Seq=2001, Len=1000</text>

  <line x1="130" y1="251" x2="736" y2="262" stroke="#7ec8e3" stroke-width="2" marker-end="url(#aw1)"/>
  <text x="390" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">Seq=3001, Len=1000</text>

  <!-- Stop indicator -->
  <rect x="60" y="270" width="130" height="30" rx="4" fill="#1a1a0a" stroke="#ce9178" stroke-width="1"/>
  <text x="125" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178">STOP (rwnd 소진)</text>

  <!-- ACK with new rwnd -->
  <line x1="750" y1="290" x2="144" y2="315" stroke="#55c555" stroke-width="2" marker-end="url(#aw2)"/>
  <rect x="300" y="274" width="290" height="34" rx="4" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="445" y="291" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">ACK=4001, rwnd=2000</text>
  <text x="445" y="305" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">앱이 2000바이트만 처리, 버퍼 절반 남음</text>

  <!-- Send 2 more segments -->
  <line x1="130" y1="345" x2="736" y2="358" stroke="#7ec8e3" stroke-width="2" marker-end="url(#aw1)"/>
  <text x="390" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">Seq=4001, Len=1000</text>

  <line x1="130" y1="368" x2="736" y2="379" stroke="#7ec8e3" stroke-width="2" marker-end="url(#aw1)"/>
  <text x="390" y="363" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">Seq=5001, Len=1000</text>

  <!-- Zero window -->
  <line x1="750" y1="400" x2="144" y2="415" stroke="#e05555" stroke-width="2" marker-end="url(#aw1)"/>
  <rect x="300" y="384" width="290" height="34" rx="4" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="445" y="401" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">ACK=6001, rwnd=0</text>
  <text x="445" y="415" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">수신 버퍼 가득 → 송신자 즉시 중단</text>

  <!-- Bottom note -->
  <rect x="60" y="452" width="760" height="36" rx="4" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="440" y="468" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">rwnd=0이면 송신자는 Window Probe만 전송 → 수신자가 rwnd&gt;0 ACK 보낼 때까지 대기</text>
  <text x="440" y="482" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Window Size 필드 = 수신 버퍼 여유 공간 (최대 65535 bytes, Scale 옵션으로 확장 가능)</text>
</svg>
