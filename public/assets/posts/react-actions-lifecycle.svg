<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" style="background:#0a0a0a;border-radius:12px;">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Action 라이프사이클</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">Submit → Pending → Result</text>

  <!-- Timeline: horizontal boxes -->
  <!-- Step 1 -->
  <rect x="60" y="100" width="140" height="70" rx="10" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="130" y="128" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">① Submit</text>
  <text x="130" y="148" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">사용자가 폼</text>
  <text x="130" y="164" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">제출</text>

  <line x1="200" y1="135" x2="258" y2="135" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="260" y="100" width="140" height="70" rx="10" fill="#2a1a0d" stroke="#e05555" stroke-width="2"/>
  <text x="330" y="128" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">② Pending</text>
  <text x="330" y="148" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">async action</text>
  <text x="330" y="164" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">실행 중</text>

  <line x1="400" y1="135" x2="458" y2="135" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3a (success) -->
  <rect x="460" y="80" width="140" height="70" rx="10" fill="#0d2a0d" stroke="#55c555" stroke-width="2"/>
  <text x="530" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">③ Success</text>
  <text x="530" y="126" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">폼 리셋</text>
  <text x="530" y="142" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">UI 업데이트</text>

  <!-- Step 3b (error) -->
  <rect x="460" y="164" width="140" height="70" rx="10" fill="#2a0d0d" stroke="#e05555" stroke-width="2"/>
  <text x="530" y="192" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">③ Error</text>
  <text x="530" y="210" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">에러 메시지</text>
  <text x="530" y="226" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">표시</text>

  <!-- Arrows to 3a/3b -->
  <line x1="400" y1="125" x2="458" y2="115" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>
  <line x1="400" y1="145" x2="458" y2="195" stroke="#e05555" stroke-width="2" marker-end="url(#arrr)"/>
  <text x="430" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">resolve</text>
  <text x="430" y="172" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">reject</text>

  <!-- useFormStatus label -->
  <rect x="660" y="100" width="160" height="60" rx="8" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="1"/>
  <text x="740" y="124" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">useFormStatus</text>
  <text x="740" y="142" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">{ pending, data,</text>
  <text x="740" y="156" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">method, action }</text>

  <!-- Code: full action lifecycle -->
  <rect x="60" y="264" width="760" height="168" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="283" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// Actions + useFormStatus + useOptimistic 완전한 패턴</text>
  <text x="76" y="301" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">function</tspan> NameForm() &#123;</text>
  <text x="76" y="319" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">const</tspan> [name, setName] = useState(<tspan fill="#ce9178">''</tspan>);</text>
  <text x="76" y="337" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">const</tspan> [error, setError] = useState(<tspan fill="#b5cea8">null</tspan>);</text>
  <text x="76" y="355" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">async function</tspan> updateName(formData) &#123;</text>
  <text x="76" y="373" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    <tspan fill="#7ec8e3" font-weight="600">const</tspan> newName = formData.get(<tspan fill="#ce9178">'name'</tspan>);</text>
  <text x="76" y="391" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    <tspan fill="#7ec8e3" font-weight="600">const</tspan> result = <tspan fill="#7ec8e3" font-weight="600">await</tspan> updateUserName(newName);</text>
  <text x="76" y="409" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    <tspan fill="#7ec8e3" font-weight="600">if</tspan> (result.error) setError(result.error);</text>
  <text x="76" y="427" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    <tspan fill="#7ec8e3" font-weight="600">else</tspan> setName(newName);</text>
</svg>
