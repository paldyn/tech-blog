<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" height="360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">&#xC5D0;&#xB7EC; &#xACBD;&#xACC4;&#xC640; &#xCDE8;&#xADC0;&#xD560; &#xC218; &#xC5C6;&#xB294; &#xC5D0;&#xB7EC;</text>

  <!-- Left: error boundary concept -->
  <rect x="50" y="68" width="360" height="270" rx="6" fill="#000000" stroke="#7777cc"/>
  <text x="230" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">&#xC5D0;&#xB7EC; &#xACBD;&#xACC4; &#xACC4;&#xCE35;</text>

  <text x="66" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// &#xCD5C;&#xC0C1;&#xC704; async &#xD568;&#xC218;&#xC5D0;&#xC11C; &#xD3EC;&#xCC29;</text>
  <text x="66" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">async function</text><text x="178" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> main() {</text>
  <text x="66" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  try</text><text x="96" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> {</text>
  <text x="66" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    await</tspan><tspan fill="#ffffff"> runApp()</tspan></text>
  <text x="66" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  } </text><text x="90" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">catch</text><text x="120" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> (e) {</text>
  <text x="66" y="206" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    logger.fatal(e)</text>
  <text x="66" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    process.exit(</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="66" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  }</text>
  <text x="66" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>
  <text x="66" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">&#xC815;&#xC0AC;&#xC9C4;&amp;#xB9C8:unhandledRejection&#xACFC; &#xD568;&#xAED8;</text>
  <text x="66" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">&#xB85C;&#xAE45; + &#xC885;&#xB8CC; &#xC81C;&#xC5B4;&#xC218; &#xD655;&#xBCF4;</text>

  <!-- Right: non-recoverable errors -->
  <rect x="460" y="68" width="370" height="270" rx="6" fill="#000000" stroke="#e05555"/>
  <text x="645" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">&#xCDE8;&#xADC0;&#xD560; &#xC218; &#xC5C6;&#xB294; &#xC5D0;&#xB7EC; &#xD328;&#xD134;</text>

  <text x="476" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// &#xC5D0;&#xB7EC; &#xBB34;&#xC2DC; (&#xC808;&#xB300; &#xAE08;&#xC9C0;)</text>
  <text x="476" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">fetchData().catch(() </tspan><tspan fill="#ffffff">=&gt; {})</tspan></text>
  <text x="476" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// &#xC2E4;&#xD328; &#xC6D0;&#xC778;&#xC744; &#xC54C; &#xC218; &#xC5C6;&#xC74C;</text>

  <line x1="476" y1="170" x2="814" y2="170" stroke="#3a4a6e" stroke-width="1"/>

  <text x="476" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// &#xD3F4;&#xBC31; + &#xB85C;&#xAE45; (&#xAD8C;&#xC7A5;)</text>
  <text x="476" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">fetchData()</text>
  <text x="476" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  .catch(e =&gt; {</text>
  <text x="476" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    sentry.capture(e)</text>
  <text x="476" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    return</tspan><tspan fill="#ffffff"> defaultData</tspan></text>
  <text x="476" y="282" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  })</text>
  <text x="476" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">&#xC2E4;&#xD328;&#xB97C; &#xAE30;&#xB85D;&#xD558;&#xACE0; &#xD3F4;&#xBC31;&#xC73C;&#xB85C; &#xC774;&#xC5B4;&#xAC10;</text>
  <text x="476" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">&#xC0AC;&#xC6A9;&#xC790; &#xACBD;&#xD5D8;&#xC744; &#xAC00;&#xB2A5;&#xD558;&#xBA74; &#xC720;&#xC9C0;</text>
</svg>
