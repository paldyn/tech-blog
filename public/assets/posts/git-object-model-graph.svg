<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-y" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">오브젝트 그래프 — 실제 저장소 구조</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">두 커밋이 공유하는 blob 오브젝트</text>

  <!-- Commit C2 (latest) -->
  <rect x="60" y="90" width="160" height="96" fill="#1a0f08" rx="8" stroke="#4a3a1a" stroke-width="1"/>
  <text x="140" y="114" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">commit C2</text>
  <text x="140" y="132" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#555">sha: abc2...</text>
  <text x="140" y="150" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">tree: T2</text>
  <text x="140" y="168" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">parent: C1</text>

  <!-- Commit C1 -->
  <rect x="60" y="220" width="160" height="96" fill="#1a0f08" rx="8" stroke="#4a3a1a" stroke-width="1"/>
  <text x="140" y="244" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">commit C1</text>
  <text x="140" y="262" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#555">sha: abc1...</text>
  <text x="140" y="280" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">tree: T1</text>

  <!-- Arrow C2 parent → C1 -->
  <line x1="140" y1="186" x2="140" y2="220" stroke="#ce9178" stroke-width="1.5" marker-end="url(#arr-y)"/>

  <!-- Tree T2 -->
  <rect x="310" y="90" width="160" height="96" fill="#0a1a0a" rx="8" stroke="#1a4a1a" stroke-width="1"/>
  <text x="390" y="114" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">tree T2</text>
  <text x="390" y="136" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa">main.c  → B1</text>
  <text x="390" y="154" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa">README → B3  ← 변경됨</text>
  <text x="390" y="172" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa">lib/   → T3</text>

  <!-- Tree T1 -->
  <rect x="310" y="220" width="160" height="96" fill="#0a1a0a" rx="8" stroke="#1a4a1a" stroke-width="1"/>
  <text x="390" y="244" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">tree T1</text>
  <text x="390" y="266" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa">main.c  → B1  ← 공유!</text>
  <text x="390" y="284" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa">README → B2</text>
  <text x="390" y="302" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa">lib/   → T3  ← 공유!</text>

  <!-- C2 → T2 -->
  <line x1="220" y1="138" x2="310" y2="138" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <!-- C1 → T1 -->
  <line x1="220" y1="268" x2="310" y2="268" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <!-- Blobs -->
  <rect x="570" y="70" width="120" height="50" fill="#0d1520" rx="6" stroke="#2a4a6e" stroke-width="1"/>
  <text x="630" y="92" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">blob B1</text>
  <text x="630" y="110" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">main.c 내용</text>

  <rect x="570" y="140" width="120" height="50" fill="#0d1520" rx="6" stroke="#2a4a6e" stroke-width="1"/>
  <text x="630" y="162" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">blob B2</text>
  <text x="630" y="180" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">README (old)</text>

  <rect x="570" y="210" width="120" height="50" fill="#0d1520" rx="6" stroke="#2a4a6e" stroke-width="1"/>
  <text x="630" y="232" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">blob B3</text>
  <text x="630" y="250" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">README (new)</text>

  <rect x="570" y="280" width="120" height="50" fill="#0d1520" rx="6" stroke="#2a4a6e" stroke-width="1"/>
  <text x="630" y="302" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">tree T3</text>
  <text x="630" y="320" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">lib/ 내용</text>

  <!-- Arrows from trees to blobs -->
  <line x1="470" y1="122" x2="570" y2="95" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <line x1="470" y1="140" x2="570" y2="235" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <line x1="470" y1="157" x2="570" y2="305" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-g)"/>

  <line x1="470" y1="251" x2="570" y2="95" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-b)"/>
  <line x1="470" y1="268" x2="570" y2="165" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <line x1="470" y1="285" x2="570" y2="305" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-g)"/>

  <!-- Key insight box -->
  <rect x="60" y="344" width="760" height="72" fill="#0a0f1a" rx="8" stroke="#1e2c4a" stroke-width="1"/>
  <text x="440" y="366" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">핵심: 변경되지 않은 파일은 오브젝트를 공유한다</text>
  <text x="440" y="388" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">B1(main.c)과 T3(lib/)은 C1과 C2 모두가 참조한다. 동일 내용은 저장소에 한 번만 저장.  </text>
  <text x="440" y="406" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">오브젝트는 내용 기반(content-addressable) SHA로 식별 — 같은 내용 = 같은 SHA = 같은 오브젝트</text>
</svg>
