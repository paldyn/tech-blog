<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">뷰 vs 구체화 뷰 비교</text>
  <text x="440" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">일반 뷰는 쿼리, 구체화 뷰는 결과를 저장</text>

  <!-- Regular View column -->
  <rect x="60" y="105" width="340" height="280" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <rect x="60" y="105" width="340" height="36" fill="#1e2433" rx="8"/>
  <rect x="60" y="129" width="340" height="12" fill="#1e2433"/>
  <text x="230" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#888">일반 뷰 (VIEW)</text>

  <text x="230" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">SQL 정의만 저장</text>

  <!-- flow: query arrives -->
  <rect x="90" y="180" width="280" height="34" fill="#0f1724" rx="6" stroke="#3a4a6e"/>
  <text x="230" y="201" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">① SELECT 요청</text>

  <line x1="230" y1="214" x2="230" y2="234" stroke="#888" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="230,234 224,222 236,222" fill="#888"/>

  <rect x="90" y="234" width="280" height="34" fill="#0f1724" rx="6" stroke="#3a4a6e"/>
  <text x="230" y="255" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">② 저장된 SQL로 재작성</text>

  <line x1="230" y1="268" x2="230" y2="288" stroke="#888" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="230,288 224,276 236,276" fill="#888"/>

  <rect x="90" y="288" width="280" height="34" fill="#0f1724" rx="6" stroke="#3a4a6e"/>
  <text x="230" y="309" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">③ 베이스 테이블 매번 스캔</text>

  <line x1="230" y1="322" x2="230" y2="342" stroke="#888" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="230,342 224,330 236,330" fill="#888"/>

  <rect x="90" y="342" width="280" height="28" fill="#0f1724" rx="6" stroke="#e05555"/>
  <text x="230" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">항상 최신 / 쿼리마다 비용 발생</text>

  <!-- Materialized View column -->
  <rect x="480" y="105" width="340" height="280" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <rect x="480" y="105" width="340" height="36" fill="#1e2433" rx="8"/>
  <rect x="480" y="129" width="340" height="12" fill="#1e2433"/>
  <text x="650" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">구체화 뷰 (MATERIALIZED VIEW)</text>

  <text x="650" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">SQL 결과를 디스크에 물리적 저장</text>

  <rect x="510" y="180" width="280" height="34" fill="#0f1724" rx="6" stroke="#3a4a6e"/>
  <text x="650" y="201" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">① SELECT 요청</text>

  <line x1="650" y1="214" x2="650" y2="234" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="650,234 644,222 656,222" fill="#55c555"/>

  <rect x="510" y="234" width="280" height="34" fill="#0f1724" rx="6" stroke="#55c555"/>
  <text x="650" y="255" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">② 저장된 결과 즉시 반환</text>

  <line x1="650" y1="268" x2="650" y2="288" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="650,288 644,276 656,276" fill="#7777cc"/>

  <rect x="510" y="288" width="280" height="34" fill="#0f1724" rx="6" stroke="#7777cc"/>
  <text x="650" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">REFRESH MATERIALIZED VIEW</text>
  <text x="650" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">수동/스케줄 갱신</text>

  <rect x="510" y="342" width="280" height="28" fill="#0f1724" rx="6" stroke="#7ec8e3"/>
  <text x="650" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">빠른 조회 / 데이터 최신성 트레이드오프</text>

  <!-- Bottom boxes -->
  <rect x="60" y="415" width="340" height="50" fill="#111827" rx="8" stroke="#3a4a6e"/>
  <text x="230" y="437" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">적합: 실시간 데이터, 간단한 집계</text>
  <text x="230" y="455" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">권한 분리, 복잡 쿼리 추상화</text>

  <rect x="480" y="415" width="340" height="50" fill="#111827" rx="8" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="437" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">적합: 무거운 집계, BI 보고서</text>
  <text x="650" y="455" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">데이터 업데이트가 덜 빈번한 경우</text>
</svg>
