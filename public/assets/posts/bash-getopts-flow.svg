<svg width="880" height="480" viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">getopts 파싱 흐름</text>

  <defs>
    <marker id="gArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Start -->
  <rect x="350" y="64" width="180" height="40" rx="20" fill="#1e3a5f" stroke="#3a6ea8" stroke-width="2"/>
  <text x="440" y="88" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">while getopts</text>

  <line x1="440" y1="104" x2="440" y2="134" stroke="#7ec8e3" stroke-width="2" marker-end="url(#gArr)"/>

  <!-- Decision diamond -->
  <polygon points="440,134 540,164 440,194 340,164" fill="#111827" stroke="#3a6ea8" stroke-width="2"/>
  <text x="440" y="168" text-anchor="middle" font-size="13" fill="#e8e8e8">옵션 있음?</text>

  <!-- No branch -->
  <line x1="540" y1="164" x2="700" y2="164" stroke="#e05555" stroke-width="2" marker-end="url(#gArr)"/>
  <text x="620" y="158" text-anchor="middle" font-size="12" fill="#e05555">없음(종료)</text>
  <rect x="700" y="144" width="120" height="40" rx="20" fill="#3b1212" stroke="#ef4444" stroke-width="1.5"/>
  <text x="760" y="168" text-anchor="middle" font-size="13" fill="#e8e8e8">루프 탈출</text>

  <!-- Yes branch -->
  <line x1="440" y1="194" x2="440" y2="224" stroke="#55c555" stroke-width="2" marker-end="url(#gArr)"/>
  <text x="450" y="214" font-size="12" fill="#55c555">있음</text>

  <!-- case box -->
  <rect x="320" y="224" width="240" height="50" rx="8" fill="#14532d" stroke="#22c55e" stroke-width="1.5"/>
  <text x="440" y="252" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">case $opt in ...</text>

  <line x1="440" y1="274" x2="440" y2="294" stroke="#7ec8e3" stroke-width="2" marker-end="url(#gArr)"/>

  <!-- OPTARG -->
  <rect x="320" y="294" width="240" height="50" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1.5"/>
  <text x="440" y="323" text-anchor="middle" font-size="13" fill="#e8e8e8">$OPTARG 로 값 읽기</text>

  <!-- Loop back -->
  <path d="M 320 319 Q 200 319 200 164 Q 200 104 350 84" stroke="#7ec8e3" stroke-width="2" fill="none" stroke-dasharray="4,4" marker-end="url(#gArr)"/>
  <text x="175" y="224" text-anchor="middle" font-size="12" fill="#7ec8e3">다음 옵션</text>

  <!-- Code block -->
  <rect x="60" y="366" width="760" height="96" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="386" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">while</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">getopts</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"hvo:"</tspan><tspan fill="#ffffff"> opt; </tspan><tspan fill="#7ec8e3" font-weight="600">do</tspan></text>
  <text x="76" y="404" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">case</tspan><tspan fill="#ffffff"> $opt </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan></text>
  <text x="76" y="422" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">        h) usage;;  v) VERBOSE=1;;  o) OUTFILE=$OPTARG;;  \?) </tspan><tspan fill="#7ec8e3" font-weight="600">exit</tspan><tspan fill="#ffffff"> 1;;</tspan></text>
  <text x="76" y="440" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">esac</tspan></text>
  <text x="76" y="458" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">done</tspan></text>
</svg>
