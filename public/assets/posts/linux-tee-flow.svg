<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380" style="background:#0a0a0a;border-radius:12px;">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <text x="440" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">tee — 파이프라인 분기</text>
  <text x="440" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">표준 입력을 파일과 표준 출력으로 동시에 복사</text>

  <!-- pipe without tee (top row) -->
  <text x="60" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#666">tee 없이</text>

  <rect x="60" y="126" width="120" height="40" fill="#111827" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="120" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">command</text>

  <line x1="180" y1="146" x2="240" y2="146" stroke="#555" stroke-width="2"/>
  <polygon points="240,140 252,146 240,152" fill="#555"/>

  <rect x="252" y="126" width="120" height="40" fill="#111827" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="312" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">grep foo</text>

  <line x1="372" y1="146" x2="432" y2="146" stroke="#555" stroke-width="2"/>
  <polygon points="432,140 444,146 432,152" fill="#555"/>

  <rect x="444" y="126" width="140" height="40" fill="#111827" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="514" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">터미널만 출력</text>

  <!-- pipe with tee (bottom section) -->
  <text x="60" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">tee 사용</text>

  <rect x="60" y="224" width="120" height="40" fill="#1a1a2e" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="120" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">command</text>

  <line x1="180" y1="244" x2="230" y2="244" stroke="#7777cc" stroke-width="2"/>
  <polygon points="230,238 242,244 230,250" fill="#7777cc"/>

  <!-- tee box -->
  <rect x="242" y="214" width="100" height="60" fill="#112211" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="292" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">tee</text>
  <text x="292" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" text-anchor="middle">out.log</text>

  <!-- tee to file (downward) -->
  <line x1="292" y1="274" x2="292" y2="310" stroke="#55c555" stroke-width="2"/>
  <polygon points="286,310 292,322 298,310" fill="#55c555"/>
  <rect x="232" y="322" width="120" height="36" fill="#111827" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="292" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">out.log (파일)</text>

  <!-- tee to stdout (rightward) -->
  <line x1="342" y1="244" x2="412" y2="244" stroke="#7777cc" stroke-width="2"/>
  <polygon points="412,238 424,244 412,250" fill="#7777cc"/>

  <rect x="424" y="224" width="120" height="40" fill="#1a1a2e" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="484" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" text-anchor="middle">grep foo</text>

  <line x1="544" y1="244" x2="614" y2="244" stroke="#7777cc" stroke-width="2"/>
  <polygon points="614,238 626,244 614,250" fill="#7777cc"/>

  <rect x="626" y="224" width="140" height="40" fill="#111827" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="696" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">터미널 출력</text>

  <!-- label arrows -->
  <text x="270" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">파일 저장</text>
  <text x="370" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">stdout 계속 전달</text>

  <!-- bottom note -->
  <text x="440" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">T자 이음새(tee joint)처럼 흐름을 두 방향으로 나눈다</text>
</svg>
