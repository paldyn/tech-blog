<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" fill="#e8e8e8" font-size="22" font-weight="700" text-anchor="middle">Grid 동적 컬럼 추가 코드</text>

  <text x="230" y="82" fill="#888" font-size="13" text-anchor="middle">컬럼 동적 구성</text>
  <rect x="60" y="92" width="360" height="322" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="114" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">function <tspan fill="#e8e8e8">fn_buildGrid</tspan>() {</text>
  <text x="76" y="132" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  var <tspan fill="#e8e8e8">oGrid</tspan> = this.grd_main;</text>
  <text x="76" y="150" xml:space="preserve" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  // 기존 컬럼 전체 제거</text>
  <text x="76" y="168" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  oGrid.set_formats(<tspan fill="#ce9178">""</ttml></tspan>);</text>
  <text x="76" y="186" xml:space="preserve" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  // 메타 Dataset 순회</text>
  <text x="76" y="204" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  var <tspan fill="#e8e8e8">ds</tspan> = this.ds_colMeta;</text>
  <text x="76" y="222" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  for <tspan fill="#e8e8e8">(var i=0; i&lt;ds.rowcount; i++) {</ttml></tspan></text>
  <text x="76" y="240" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    var <tspan fill="#e8e8e8">sNm</ttml></tspan> = ds.getColumn(i,<tspan fill="#ce9178">"colNm"</ttml></tspan>);</text>
  <text x="76" y="258" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    var <tspan fill="#e8e8e8">sLb</ttml></tspan> = ds.getColumn(i,<tspan fill="#ce9178">"colLabel"</ttml></tspan>);</text>
  <text x="76" y="276" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    var <tspan fill="#e8e8e8">nWd</ttml></tspan> = ds.getColumn(i,<tspan fill="#ce9178">"colWidth"</ttml></ttml></tspan>);</text>
  <text x="76" y="294" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    oGrid.addCol(</text>
  <text x="76" y="312" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">      sNm, sLb, nWd,</text>
  <text x="76" y="330" xml:space="preserve" fill="#ce9178" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">      "text"</text>
  <text x="76" y="348" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    );</text>
  <text x="76" y="366" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  }</text>
  <text x="76" y="384" xml:space="preserve" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  // Dataset 연결</text>
  <text x="76" y="402" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  oGrid.set_binddataset(<tspan fill="#ce9178">"ds_main"</ttml></tspan>);</text>

  <text x="650" y="82" fill="#888" font-size="13" text-anchor="middle">컬럼 가시성·너비 제어</text>
  <rect x="460" y="92" width="360" height="322" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="476" y="114" xml:space="preserve" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// 특정 컬럼 숨기기</text>
  <text x="476" y="132" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">function <tspan fill="#e8e8e8">fn_hideCol</ttml></tspan>(sColId) {</text>
  <text x="476" y="150" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  var <tspan fill="#e8e8e8">oCol</ttml></ttml></tspan> = this.grd_main</text>
  <text x="476" y="168" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    .getColByID(sColId);</text>
  <text x="476" y="186" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  if <tspan fill="#e8e8e8">(oCol)</ttml></ttml></tspan></text>
  <text x="476" y="204" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    oCol.set_visible(<tspan fill="#7ec8e3">false</ttml></ttml></tspan>);</text>
  <text x="476" y="222" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>
  <text x="476" y="250" xml:space="preserve" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// 너비 동적 조정</text>
  <text x="476" y="268" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">function <tspan fill="#e8e8e8">fn_resizeCol</ttml></ttml></tspan>(sId, nW) {</text>
  <text x="476" y="286" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  var <tspan fill="#e8e8e8">oCol</ttml></ttml></tspan> = this.grd_main</text>
  <text x="476" y="304" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    .getColByID(sId);</text>
  <text x="476" y="322" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  if <tspan fill="#e8e8e8">(oCol)</ttml></ttml></tspan></text>
  <text x="476" y="340" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    oCol.set_width(nW);</text>
  <text x="476" y="358" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>
  <text x="476" y="386" xml:space="preserve" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// 컬럼 수 확인</text>
  <text x="476" y="404" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">var <tspan fill="#e8e8e8">nCnt</ttml></ttml></tspan> = this.grd_main.getColCount();</text>
</svg>
