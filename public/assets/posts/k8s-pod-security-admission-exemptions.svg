<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">PSA Exemptions — 제외 대상 설정</text>

  <!-- Code block -->
  <text x="60" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">AdmissionConfiguration 예시</text>
  <rect x="60" y="94" width="440" height="300" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan x="76" fill="#7ec8e3" font-weight="600">apiVersion</tspan><tspan fill="#ffffff">: apiserver.config.k8s.io/v1</tspan>
  </text>
  <text x="76" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan x="76" fill="#7ec8e3" font-weight="600">kind</tspan><tspan fill="#ffffff">: AdmissionConfiguration</tspan>
  </text>
  <text x="76" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan x="76" fill="#7ec8e3" font-weight="600">plugins</tspan><tspan fill="#ffffff">:</tspan>
  </text>
  <text x="76" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan x="76" fill="#ffffff">  - </tspan><tspan fill="#7ec8e3" font-weight="600">name</tspan><tspan fill="#ffffff">: PodSecurity</tspan>
  </text>
  <text x="76" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan x="76" fill="#7ec8e3" font-weight="600">    configuration</tspan><tspan fill="#ffffff">:</tspan>
  </text>
  <text x="76" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan x="76" fill="#7ec8e3" font-weight="600">      defaults</tspan><tspan fill="#ffffff">:</tspan>
  </text>
  <text x="76" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">
    <tspan x="76">        enforce: baseline</tspan>
  </text>
  <text x="76" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">
    <tspan x="76">        warn: restricted</tspan>
  </text>
  <text x="76" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan x="76" fill="#7ec8e3" font-weight="600">      exemptions</tspan><tspan fill="#ffffff">:</tspan>
  </text>
  <text x="76" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">        # 특정 사용자 제외</text>
  <text x="76" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">
    <tspan x="76">        usernames: [system:admin]</tspan>
  </text>
  <text x="76" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">        # kube-system 등 제외</text>
  <text x="76" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">
    <tspan x="76">        namespaces: [kube-system]</tspan>
  </text>
  <text x="76" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">        # RuntimeClass 제외</text>

  <!-- Explanation boxes -->
  <text x="540" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">제외 범위 종류</text>

  <rect x="540" y="94" width="300" height="80" rx="8" fill="#0a0a0a" stroke="#7777cc" stroke-width="1"/>
  <text x="560" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">usernames</text>
  <text x="560" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">특정 사용자(ServiceAccount 포함)의</text>
  <text x="560" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">요청을 PSA 검사에서 제외</text>

  <rect x="540" y="194" width="300" height="80" rx="8" fill="#0a0a0a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="560" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">namespaces</text>
  <text x="560" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">해당 Namespace의 모든 Pod를</text>
  <text x="560" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">PSA 검사에서 완전히 제외</text>

  <rect x="540" y="294" width="300" height="80" rx="8" fill="#0a0a0a" stroke="#55c555" stroke-width="1"/>
  <text x="560" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">runtimeClasses</text>
  <text x="560" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">특정 RuntimeClass를 사용하는</text>
  <text x="560" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Pod를 PSA 검사에서 제외</text>

  <text x="440" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">제외 대상은 클러스터 관리자가 신중히 설정해야 하며, 최소 권한 원칙 유지 필요</text>
</svg>
