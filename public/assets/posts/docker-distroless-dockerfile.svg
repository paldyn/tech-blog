<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">
    Distroless 멀티 스테이지 Dockerfile
  </text>

  <!-- Stage 1 label -->
  <text x="80" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Stage 1 — Builder</text>

  <!-- Code block 1 -->
  <rect x="60" y="86" width="380" height="174" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="108" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600"># Stage 1: 빌드 환경</text>
  <text x="76" y="126" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">FROM</tspan><tspan fill="#ffffff"> maven:3.9-eclipse-temurin-21</tspan></text>
  <text x="76" y="144" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">AS</tspan><tspan fill="#ffffff"> builder</tspan></text>
  <text x="76" y="162" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">WORKDIR</tspan><tspan fill="#ffffff"> /app</tspan></text>
  <text x="76" y="180" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">COPY</tspan><tspan fill="#ffffff"> pom.xml .</tspan></text>
  <text x="76" y="198" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">RUN</tspan><tspan fill="#ffffff"> mvn dependency:resolve</tspan></text>
  <text x="76" y="216" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">COPY</tspan><tspan fill="#ffffff"> src ./src</tspan></text>
  <text x="76" y="234" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">RUN</tspan><tspan fill="#ffffff"> mvn package -DskipTests</tspan></text>

  <!-- Arrow between stages -->
  <line x1="460" y1="173" x2="498" y2="173" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Stage 2 label -->
  <text x="510" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">Stage 2 — Distroless Runtime</text>

  <!-- Code block 2 -->
  <rect x="490" y="86" width="350" height="174" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="506" y="108" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600"># Stage 2: Distroless</text>
  <text x="506" y="126" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">FROM</tspan><tspan fill="#ffffff"> gcr.io/distroless/java21</tspan></text>
  <text x="506" y="144" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">WORKDIR</tspan><tspan fill="#ffffff"> /app</tspan></text>
  <text x="506" y="162" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">COPY</tspan><tspan fill="#ffffff"> --from=builder</tspan></text>
  <text x="506" y="180" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">     /app/target/app.jar .</tspan></text>
  <text x="506" y="198" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">EXPOSE</tspan><tspan fill="#ffffff"> 8080</tspan></text>
  <text x="506" y="216" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">CMD</tspan><tspan fill="#ffffff"> [</tspan><tspan fill="#ce9178">"app.jar"</tspan><tspan fill="#ffffff">]</tspan></text>

  <!-- Available distroless images -->
  <text x="60" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">주요 Distroless 이미지 태그</text>

  <rect x="60" y="308" width="180" height="52" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="150" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">java21</text>
  <text x="150" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">gcr.io/distroless/java21</text>

  <rect x="260" y="308" width="180" height="52" rx="6" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="350" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">nodejs20</text>
  <text x="350" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">gcr.io/distroless/nodejs20</text>

  <rect x="460" y="308" width="180" height="52" rx="6" fill="#1a1a0a" stroke="#e8a020" stroke-width="1"/>
  <text x="550" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8a020" text-anchor="middle">python3</text>
  <text x="550" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">gcr.io/distroless/python3</text>

  <rect x="660" y="308" width="180" height="52" rx="6" fill="#1a0a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="750" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">static / base</text>
  <text x="750" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Go·Rust 바이너리용</text>

  <!-- Debug tip -->
  <rect x="60" y="380" width="760" height="72" rx="6" fill="#0a0a1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">디버그 팁: :debug 태그 사용</text>
  <text x="80" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    gcr.io/distroless/java21<tspan fill="#ce9178">:debug</tspan>  # busybox 셸 포함 — 프로덕션에서는 사용 금지
  </text>
  <text x="80" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">프로덕션은 반드시 :nonroot 또는 기본 태그 사용, 셸 접근 차단</text>
</svg>
