<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400" style="background:#0a0a0a;border-radius:12px">
  <!-- Background -->
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Header -->
  <rect x="0" y="0" width="880" height="72" rx="12" fill="#0d1a2a"/>
  <rect x="0" y="60" width="880" height="12" fill="#0d1a2a"/>
  <text x="60" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#ffffff">PCA: 주성분 분석의 핵심 원리</text>
  <text x="60" y="62" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">분산이 최대인 방향으로 투영하여 차원 축소</text>
  <line x1="60" y1="82" x2="820" y2="82" stroke="#1e2433" stroke-width="1"/>

  <!-- Left panel: 2D scatter with PC axes -->
  <text x="60" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">원본 2D 데이터 공간 — 주성분 방향</text>
  <rect x="60" y="115" width="380" height="250" rx="8" fill="#0d1520" stroke="#1e2433"/>

  <!-- Data points (elongated cluster, roughly diagonal) -->
  <circle cx="140" cy="310" r="5" fill="#7ec8e3" opacity="0.75"/>
  <circle cx="158" cy="298" r="5" fill="#7ec8e3" opacity="0.75"/>
  <circle cx="172" cy="286" r="5" fill="#7ec8e3" opacity="0.75"/>
  <circle cx="185" cy="275" r="5" fill="#7ec8e3" opacity="0.75"/>
  <circle cx="200" cy="265" r="5" fill="#7ec8e3" opacity="0.75"/>
  <circle cx="216" cy="254" r="5" fill="#7ec8e3" opacity="0.75"/>
  <circle cx="232" cy="243" r="5" fill="#7ec8e3" opacity="0.75"/>
  <circle cx="246" cy="232" r="5" fill="#7ec8e3" opacity="0.75"/>
  <circle cx="260" cy="221" r="5" fill="#7ec8e3" opacity="0.75"/>
  <circle cx="275" cy="210" r="5" fill="#7ec8e3" opacity="0.75"/>
  <circle cx="292" cy="200" r="5" fill="#7ec8e3" opacity="0.75"/>
  <circle cx="308" cy="190" r="5" fill="#7ec8e3" opacity="0.75"/>
  <circle cx="323" cy="180" r="5" fill="#7ec8e3" opacity="0.75"/>
  <circle cx="338" cy="170" r="5" fill="#7ec8e3" opacity="0.75"/>
  <!-- Off-axis scatter -->
  <circle cx="148" cy="285" r="5" fill="#7ec8e3" opacity="0.6"/>
  <circle cx="163" cy="308" r="5" fill="#7ec8e3" opacity="0.6"/>
  <circle cx="195" cy="248" r="5" fill="#7ec8e3" opacity="0.6"/>
  <circle cx="222" cy="270" r="5" fill="#7ec8e3" opacity="0.6"/>
  <circle cx="240" cy="226" r="5" fill="#7ec8e3" opacity="0.6"/>
  <circle cx="268" cy="240" r="5" fill="#7ec8e3" opacity="0.6"/>
  <circle cx="285" cy="215" r="5" fill="#7ec8e3" opacity="0.6"/>
  <circle cx="312" cy="202" r="5" fill="#7ec8e3" opacity="0.6"/>
  <circle cx="328" cy="192" r="5" fill="#7ec8e3" opacity="0.6"/>
  <circle cx="178" cy="260" r="5" fill="#7ec8e3" opacity="0.6"/>
  <circle cx="205" cy="283" r="5" fill="#7ec8e3" opacity="0.6"/>
  <circle cx="252" cy="256" r="5" fill="#7ec8e3" opacity="0.6"/>

  <!-- PC1 arrow (main direction, high variance) -->
  <line x1="118" y1="332" x2="362" y2="148" stroke="#55c555" stroke-width="2.5" stroke-dasharray="none"/>
  <polygon points="362,148 348,152 354,165" fill="#55c555"/>
  <text x="370" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">PC1</text>
  <text x="368" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">최대 분산</text>

  <!-- PC2 arrow (perpendicular, low variance) -->
  <line x1="230" y1="290" x2="280" y2="225" stroke="#e05555" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="280,225 268,232 274,246" fill="#e05555"/>
  <text x="283" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">PC2</text>
  <text x="283" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">잔여 분산</text>

  <!-- Mean center dot -->
  <circle cx="234" cy="243" r="6" fill="none" stroke="#e8e8e8" stroke-width="2"/>
  <text x="240" y="243" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">μ</text>

  <!-- Right panel: 1D projection -->
  <text x="480" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">PC1으로 투영 — 1차원으로 압축</text>
  <rect x="480" y="115" width="360" height="250" rx="8" fill="#0d1520" stroke="#1e2433"/>

  <!-- PC1 axis (horizontal projection line) -->
  <line x1="510" y1="245" x2="810" y2="245" stroke="#55c555" stroke-width="2"/>
  <polygon points="810,245 796,239 796,251" fill="#55c555"/>
  <text x="815" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">PC1</text>

  <!-- Projected points on axis -->
  <circle cx="530" cy="245" r="5" fill="#7ec8e3" opacity="0.9"/>
  <circle cx="548" cy="245" r="5" fill="#7ec8e3" opacity="0.9"/>
  <circle cx="565" cy="245" r="5" fill="#7ec8e3" opacity="0.9"/>
  <circle cx="583" cy="245" r="5" fill="#7ec8e3" opacity="0.9"/>
  <circle cx="600" cy="245" r="5" fill="#7ec8e3" opacity="0.9"/>
  <circle cx="618" cy="245" r="5" fill="#7ec8e3" opacity="0.9"/>
  <circle cx="636" cy="245" r="5" fill="#7ec8e3" opacity="0.9"/>
  <circle cx="652" cy="245" r="5" fill="#7ec8e3" opacity="0.9"/>
  <circle cx="668" cy="245" r="5" fill="#7ec8e3" opacity="0.9"/>
  <circle cx="685" cy="245" r="5" fill="#7ec8e3" opacity="0.9"/>
  <circle cx="702" cy="245" r="5" fill="#7ec8e3" opacity="0.9"/>
  <circle cx="718" cy="245" r="5" fill="#7ec8e3" opacity="0.9"/>
  <circle cx="734" cy="245" r="5" fill="#7ec8e3" opacity="0.9"/>
  <circle cx="750" cy="245" r="5" fill="#7ec8e3" opacity="0.9"/>
  <!-- Off-center projections -->
  <circle cx="540" cy="245" r="5" fill="#7ec8e3" opacity="0.55"/>
  <circle cx="557" cy="245" r="5" fill="#7ec8e3" opacity="0.55"/>
  <circle cx="607" cy="245" r="5" fill="#7ec8e3" opacity="0.55"/>
  <circle cx="625" cy="245" r="5" fill="#7ec8e3" opacity="0.55"/>
  <circle cx="643" cy="245" r="5" fill="#7ec8e3" opacity="0.55"/>
  <circle cx="660" cy="245" r="5" fill="#7ec8e3" opacity="0.55"/>
  <circle cx="677" cy="245" r="5" fill="#7ec8e3" opacity="0.55"/>
  <circle cx="695" cy="245" r="5" fill="#7ec8e3" opacity="0.55"/>
  <circle cx="712" cy="245" r="5" fill="#7ec8e3" opacity="0.55"/>
  <circle cx="591" cy="245" r="5" fill="#7ec8e3" opacity="0.55"/>
  <circle cx="618" cy="245" r="5" fill="#7ec8e3" opacity="0.55"/>

  <!-- Drop lines from some original data positions -->
  <line x1="583" y1="180" x2="583" y2="240" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="636" y1="175" x2="636" y2="240" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <line x1="700" y1="185" x2="700" y2="240" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <!-- Original data dots -->
  <circle cx="583" cy="175" r="4" fill="#888" opacity="0.5"/>
  <circle cx="636" cy="168" r="4" fill="#888" opacity="0.5"/>
  <circle cx="700" cy="180" r="4" fill="#888" opacity="0.5"/>

  <!-- Label: lost info -->
  <text x="530" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">수직 방향 정보</text>
  <text x="530" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(PC2) 손실</text>

  <!-- Info row: variance retained -->
  <rect x="480" y="295" width="165" height="50" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="562" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">PC1 설명 분산</text>
  <text x="562" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555">87.3%</text>

  <rect x="658" y="295" width="165" height="50" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="740" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">PC2 설명 분산</text>
  <text x="740" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e05555">12.7%</text>

  <!-- Footer -->
  <text x="440" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">고유값 분해: Cov(X) · v = λ · v  →  주성분 v₁, v₂ ... vₙ 순서로 분산 λ₁ ≥ λ₂ ≥ ... ≥ λₙ</text>
</svg>
