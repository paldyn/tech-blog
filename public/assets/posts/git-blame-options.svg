<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">git blame 주요 옵션</text>
  <text x="60" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">범위 지정·공백 무시·이동 추적</text>

  <!-- Left column: options -->
  <text x="60" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">범위 &amp; 옵션</text>
  <rect x="60" y="122" width="370" height="220" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan x="76" dy="0"><tspan fill="#9aa4b8"># 특정 줄 범위만</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git blame</tspan> -L 10,20 app.js</tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git blame</tspan> -L '/func/,+10' app.js</tspan>
    <tspan x="76" dy="18"> </tspan>
    <tspan x="76" dy="18"><tspan fill="#9aa4b8"># 공백 변경 무시</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git blame</tspan> -w app.js</tspan>
    <tspan x="76" dy="18"> </tspan>
    <tspan x="76" dy="18"><tspan fill="#9aa4b8"># 코드 이동 추적</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git blame</tspan> -M app.js</tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git blame</tspan> -C app.js</tspan>
  </text>

  <!-- Right column: porcelain output -->
  <text x="450" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">--porcelain: 스크립트 파싱용</text>
  <rect x="450" y="122" width="370" height="220" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="466" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan x="466" dy="0"><tspan fill="#7ec8e3">git blame</tspan> --porcelain app.js</tspan>
    <tspan x="466" dy="18"> </tspan>
    <tspan x="466" dy="18"><tspan fill="#9aa4b8"># 출력 예시</tspan></tspan>
    <tspan x="466" dy="18"><tspan fill="#7ec8e3">a1b2c3d4...</tspan> 1 1 1</tspan>
    <tspan x="466" dy="18">author John</tspan>
    <tspan x="466" dy="18">author-mail &lt;john@ex.com&gt;</tspan>
    <tspan x="466" dy="18">author-time 1705287012</tspan>
    <tspan x="466" dy="18">summary feat: init commit</tspan>
    <tspan x="466" dy="18">filename app.js</tspan>
    <tspan x="466" dy="18">	import React from 'react'</tspan>
  </text>

  <!-- Option cards at bottom -->
  <rect x="60" y="366" width="165" height="72" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="142" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">-L n,m</text>
  <text x="142" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">줄 범위 지정</text>
  <text x="142" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">정규식 패턴도 가능</text>

  <rect x="247" y="366" width="165" height="72" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.2"/>
  <text x="329" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">-w</text>
  <text x="329" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">공백 무시</text>
  <text x="329" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">리포맷 커밋 필터링</text>

  <rect x="434" y="366" width="165" height="72" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1.2"/>
  <text x="516" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">-M / -C</text>
  <text x="516" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">코드 이동 추적</text>
  <text x="516" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">파일 간 이동도 감지</text>

  <rect x="621" y="366" width="199" height="72" rx="8" fill="#0d1117" stroke="#e8a838" stroke-width="1.2"/>
  <text x="720" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8a838" text-anchor="middle">--porcelain</text>
  <text x="720" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">스크립트 파싱용</text>
  <text x="720" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">구조화된 출력</text>
</svg>
