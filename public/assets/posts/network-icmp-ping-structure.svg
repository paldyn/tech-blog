<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="aip" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="aig" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ICMP 메시지 구조와 주요 타입</text>

  <!-- ICMP Header structure -->
  <text x="440" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">ICMP 헤더 (IP 페이로드)</text>

  <!-- Header fields -->
  <rect x="60" y="95" width="120" height="40" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="120" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">Type (8비트)</text>
  <text x="120" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">메시지 유형</text>

  <rect x="185" y="95" width="120" height="40" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="245" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">Code (8비트)</text>
  <text x="245" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">세부 코드</text>

  <rect x="310" y="95" width="160" height="40" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="390" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">Checksum (16비트)</text>
  <text x="390" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">오류 검출</text>

  <rect x="475" y="95" width="345" height="40" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="647" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">Rest of Header (32비트, 타입별 용도 다름)</text>
  <text x="647" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">echo: Identifier + Sequence Number</text>

  <!-- ICMP types table -->
  <text x="440" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">주요 ICMP 메시지 타입</text>

  <rect x="60" y="178" width="760" height="170" rx="8" fill="#111" stroke="#555" stroke-width="1"/>
  <!-- Header row -->
  <text x="80" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Type/Code</text>
  <text x="220" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">이름</text>
  <text x="430" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">설명</text>
  <line x1="80" y1="208" x2="800" y2="208" stroke="#333" stroke-width="1"/>
  <text x="80" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">8/0</text>
  <text x="220" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Echo Request</text>
  <text x="430" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">ping 요청</text>
  <text x="80" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555">0/0</text>
  <text x="220" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Echo Reply</text>
  <text x="430" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">ping 응답</text>
  <text x="80" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555">11/0</text>
  <text x="220" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Time Exceeded</text>
  <text x="430" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">TTL 만료 (traceroute 활용)</text>
  <text x="80" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555">3/x</text>
  <text x="220" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Dest Unreachable</text>
  <text x="430" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">목적지 도달 불가 (코드: net/host/port/frag)</text>
  <text x="80" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8a030">4/0</text>
  <text x="220" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Source Quench</text>
  <text x="430" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">혼잡 알림 (deprecated)</text>
  <text x="80" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7777cc">5/0</text>
  <text x="220" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Redirect</text>
  <text x="430" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">더 나은 게이트웨이 알림</text>

  <!-- ping flow -->
  <rect x="60" y="368" width="760" height="90" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="388" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># ping 실행 출력 예시</text>
  <text x="80" y="408" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">$ ping -c 3 8.8.8.8</text>
  <text x="80" y="428" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">64 bytes from 8.8.8.8: icmp_seq=1 ttl=118 time=14.2 ms</text>
  <text x="80" y="448" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">64 bytes from 8.8.8.8: icmp_seq=2 ttl=118 time=13.9 ms</text>
</svg>
