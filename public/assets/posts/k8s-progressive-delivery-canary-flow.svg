<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430">
  <defs>
    <marker id="pd-arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="pd-fail" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="430" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">카나리 — 분석 게이트로 단계적 승급</text>

  <!-- stages -->
  <rect x="50" y="100" width="150" height="74" rx="8" fill="#1a3a4a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="125" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">5%</text>
  <text x="125" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">초기 노출</text>

  <rect x="240" y="100" width="150" height="74" rx="8" fill="#1a3a4a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="315" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">25%</text>
  <text x="315" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">확대</text>

  <rect x="430" y="100" width="150" height="74" rx="8" fill="#1a3a4a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="505" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">50%</text>
  <text x="505" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">확대</text>

  <rect x="620" y="100" width="150" height="74" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="2"/>
  <text x="695" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">100%</text>
  <text x="695" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">전면 승급</text>

  <line x1="200" y1="137" x2="240" y2="137" stroke="#7ec8e3" stroke-width="2" marker-end="url(#pd-arr)"/>
  <line x1="390" y1="137" x2="430" y2="137" stroke="#7ec8e3" stroke-width="2" marker-end="url(#pd-arr)"/>
  <line x1="580" y1="137" x2="620" y2="137" stroke="#7ec8e3" stroke-width="2" marker-end="url(#pd-arr)"/>

  <!-- analysis gate -->
  <rect x="50" y="220" width="720" height="64" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="410" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">각 단계마다 분석(Analysis) — 메트릭으로 건강 상태 자동 판정</text>
  <text x="410" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">에러율 · p99 지연 · 성공률 임계치 통과 → 다음 단계 / 실패 → 자동 롤백</text>

  <line x1="125" y1="174" x2="125" y2="220" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="315" y1="174" x2="315" y2="220" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="505" y1="174" x2="505" y2="220" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- pass / fail -->
  <rect x="160" y="330" width="280" height="60" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="300" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">통과 → 가중치 증가, 다음 단계로</text>
  <text x="300" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">사람 개입 없이 자동 진행(또는 pause)</text>

  <rect x="470" y="330" width="280" height="60" rx="8" fill="#2a1416" stroke="#e05555" stroke-width="1.5"/>
  <text x="610" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">실패 → 즉시 자동 롤백(abort)</text>
  <text x="610" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">트래픽을 v1로 되돌림, 영향 최소</text>

  <line x1="300" y1="284" x2="300" y2="330" stroke="#55c555" stroke-width="2" marker-end="url(#pd-arr)"/>
  <line x1="610" y1="284" x2="610" y2="330" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#pd-fail)"/>
</svg>
