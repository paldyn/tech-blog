<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-w" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">final 참조 vs 불변 객체 — 흔한 오해</text>

  <!-- ─── Left: mutable object with final ref ─── -->
  <text x="220" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">final 참조 (객체 내용은 가변)</text>

  <rect x="60" y="96" width="320" height="122" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="117" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">final</text>
  <text x="117" y="117" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> List&lt;String&gt; list</text>
  <text x="76" y="137" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    = </text>
  <text x="102" y="137" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">new</text>
  <text x="130" y="137" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> ArrayList&lt;&gt;();</text>
  <text x="76" y="157" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve">list.add(</text>
  <text x="141" y="157" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">"OK"</text>
  <text x="178" y="157" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve">); </text>
  <text x="205" y="157" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 허용!</text>
  <text x="76" y="177" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" xml:space="preserve">list = </text>
  <text x="120" y="177" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">new</text>
  <text x="148" y="177" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" xml:space="preserve"> ArrayList&lt;&gt;();</text>
  <text x="76" y="197" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// ↑ 컴파일 에러</text>

  <!-- Memory diagram for mutable -->
  <rect x="60" y="236" width="140" height="52" rx="6" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">list (final)</text>
  <text x="130" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">재할당 금지</text>

  <line x1="200" y1="262" x2="234" y2="262" stroke="#7ec8e3" stroke-width="2"
        marker-end="url(#arr-w)"/>

  <rect x="236" y="236" width="144" height="52" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="308" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">ArrayList</text>
  <text x="308" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">add/remove 가능</text>

  <!-- X mark: re-assign -->
  <line x1="60" y1="330" x2="200" y2="330" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4"
        marker-end="url(#arr-r)"/>
  <text x="130" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">재할당 시도 → 에러</text>
  <rect x="202" y="315" width="178" height="36" rx="6" fill="#2a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="291" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">new ArrayList&lt;&gt;()</text>

  <!-- ─── Divider ─── -->
  <line x1="430" y1="72" x2="430" y2="430" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ─── Right: truly immutable ─── -->
  <text x="660" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">진짜 불변 — List.of()</text>

  <rect x="450" y="96" width="370" height="122" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="466" y="117" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">final</text>
  <text x="507" y="117" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> List&lt;String&gt; names</text>
  <text x="466" y="137" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    = List.of(</text>
  <text x="558" y="137" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">"A"</text>
  <text x="581" y="137" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">, </text>
  <text x="594" y="137" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">"B"</text>
  <text x="617" y="137" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">);</text>
  <text x="466" y="157" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" xml:space="preserve">names.add(</text>
  <text x="551" y="157" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">"C"</text>
  <text x="574" y="157" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" xml:space="preserve">);</text>
  <text x="466" y="177" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// UnsupportedOperationException</text>
  <text x="466" y="197" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 런타임 예외 발생!</text>

  <!-- Memory diagram for immutable -->
  <rect x="450" y="236" width="140" height="52" rx="6" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="520" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">names (final)</text>
  <text x="520" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">재할당 금지</text>

  <line x1="590" y1="262" x2="624" y2="262" stroke="#7ec8e3" stroke-width="2"
        marker-end="url(#arr-w)"/>

  <rect x="626" y="236" width="194" height="52" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="723" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">ImmutableList</text>
  <text x="723" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">수정 시도 → 예외</text>

  <!-- Summary bottom -->
  <rect x="60" y="370" width="760" height="78" rx="8" fill="#111111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">핵심 구분</text>
  <text x="280" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">final 참조</text>
  <text x="280" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">참조 주소만 고정, 내용은 변경 가능</text>
  <line x1="430" y1="405" x2="430" y2="445" stroke="#2a2a2a" stroke-width="1"/>
  <text x="600" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">불변 객체</text>
  <text x="600" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">List.of() 등 → 내용 자체가 변경 불가</text>
</svg>
