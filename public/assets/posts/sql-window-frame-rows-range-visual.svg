<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">ROWS vs RANGE — 프레임 경계 비교</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">동일한 ORDER BY 값이 있을 때 두 모드의 차이</text>

  <!-- Left: ROWS mode -->
  <text x="215" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">ROWS BETWEEN</text>
  <text x="215" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">물리적 행 위치 기준</text>

  <rect x="60" y="126" width="310" height="254" rx="6" fill="#0e1117" stroke="#1e2433"/>
  <!-- Headers -->
  <line x1="60" y1="156" x2="370" y2="156" stroke="#1e2433"/>
  <line x1="190" y1="126" x2="190" y2="380" stroke="#1e2433"/>
  <text x="125" y="145" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">score (ORDER BY)</text>
  <text x="280" y="145" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">SUM (ROWS 1 PREC)</text>

  <!-- Row data: scores 10,20,20,30,40 -->
  <text x="125" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">10</text>
  <text x="280" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">10</text>
  <line x1="60" y1="184" x2="370" y2="184" stroke="#252b3a"/>

  <!-- Current row highlight row 2 -->
  <rect x="61" y="184" width="308" height="38" fill="#0a1520" opacity="0.8"/>
  <text x="125" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">20</text>
  <text x="280" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">30</text>
  <text x="68" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#7ec8e3">←현재</text>
  <line x1="60" y1="222" x2="370" y2="222" stroke="#252b3a"/>

  <!-- Row 3 (score=20, same as row 2) -->
  <text x="125" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">20</text>
  <text x="280" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">40</text>
  <text x="365" y="244" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">20+20</text>
  <line x1="60" y1="252" x2="370" y2="252" stroke="#252b3a"/>

  <text x="125" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">30</text>
  <text x="280" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">50</text>
  <line x1="60" y1="282" x2="370" y2="282" stroke="#252b3a"/>

  <text x="125" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">40</text>
  <text x="280" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">70</text>
  <line x1="60" y1="312" x2="370" y2="312" stroke="#252b3a"/>

  <text x="215" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">행 2 기준: 1 PRECEDING = 행 1 (score=10)</text>
  <text x="215" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">행 3 기준: 1 PRECEDING = 행 2 (score=20)</text>
  <text x="215" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">→ 물리적 위치, score 값 무관</text>

  <!-- Right: RANGE mode -->
  <text x="665" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">RANGE BETWEEN</text>
  <text x="665" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">논리적 값 범위 기준</text>

  <rect x="510" y="126" width="310" height="254" rx="6" fill="#0e1117" stroke="#1e2433"/>
  <line x1="510" y1="156" x2="820" y2="156" stroke="#1e2433"/>
  <line x1="640" y1="126" x2="640" y2="380" stroke="#1e2433"/>
  <text x="575" y="145" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">score (ORDER BY)</text>
  <text x="730" y="145" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">SUM (RANGE 10 PREC)</text>

  <text x="575" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">10</text>
  <text x="730" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">10</text>
  <line x1="510" y1="184" x2="820" y2="184" stroke="#252b3a"/>

  <!-- current at row 2/3 (both score=20): RANGE 10 PRECEDING means score >= 10 AND <= 20 -->
  <rect x="511" y="184" width="308" height="76" fill="#0a1a0a" opacity="0.7"/>
  <text x="575" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">20</text>
  <text x="730" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">50</text>
  <text x="518" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#55c555">peer</text>
  <line x1="510" y1="222" x2="820" y2="222" stroke="#252b3a"/>

  <text x="575" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">20</text>
  <text x="730" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">50</text>
  <text x="518" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#55c555">peer</text>
  <text x="815" y="230" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">10+20+20</text>
  <line x1="510" y1="252" x2="820" y2="252" stroke="#252b3a"/>

  <text x="575" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">30</text>
  <text x="730" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">70</text>
  <line x1="510" y1="282" x2="820" y2="282" stroke="#252b3a"/>

  <text x="575" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">40</text>
  <text x="730" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">90</text>
  <line x1="510" y1="312" x2="820" y2="312" stroke="#252b3a"/>

  <text x="665" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">score=20 행: RANGE 10 PRECEDING = score ≥10</text>
  <text x="665" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">같은 score 값의 행이 모두 peer → 동일 결과</text>
  <text x="665" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">→ score=20인 두 행 모두 SUM=50</text>

  <!-- Bottom note -->
  <text x="440" y="406" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#666">ROWS: 물리적 행 수 기준 / RANGE: ORDER BY 값 범위 기준 (동점 행 = 피어)</text>
  <text x="440" y="426" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#666">RANGE N PRECEDING은 숫자·날짜 타입에만 사용 가능 (CURRENT ROW 제외)</text>
  <text x="440" y="446" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555">GROUPS 모드(SQL:2011): 피어 그룹 수 기준 — PostgreSQL 11+ 지원</text>
</svg>
