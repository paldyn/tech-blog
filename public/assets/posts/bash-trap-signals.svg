<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">trap 시그널 처리 흐름</text>

  <!-- Process box -->
  <rect x="60" y="80" width="200" height="60" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">스크립트 실행 중</text>
  <text x="160" y="127" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">trap handler 등록됨</text>

  <!-- Signals box -->
  <rect x="340" y="70" width="200" height="240" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">시그널 / 이벤트</text>
  <text x="440" y="122" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555">SIGINT  (Ctrl+C)</text>
  <text x="440" y="148" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555">SIGTERM (kill)</text>
  <text x="440" y="174" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555">SIGHUP  (터미널 닫힘)</text>
  <text x="440" y="200" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">EXIT    (정상 종료)</text>
  <text x="440" y="226" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">ERR     (명령 실패)</text>
  <text x="440" y="252" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">DEBUG   (각 명령 전)</text>
  <text x="440" y="278" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">RETURN  (함수 반환)</text>

  <!-- Cleanup handler box -->
  <rect x="620" y="80" width="200" height="60" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">cleanup 함수 실행</text>
  <text x="720" y="127" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">임시파일 삭제, 잠금 해제</text>

  <!-- Error handler box -->
  <rect x="620" y="200" width="200" height="60" rx="8" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="720" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">error handler 실행</text>
  <text x="720" y="247" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">로그 기록, 알림 전송</text>

  <!-- Arrows: process → signals -->
  <line x1="260" y1="110" x2="340" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>

  <!-- Arrows: signals → handlers -->
  <line x1="540" y1="100" x2="620" y2="105" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <line x1="540" y1="190" x2="620" y2="225" stroke="#e05555" stroke-width="2" marker-end="url(#arr-r)"/>

  <!-- Label for EXIT/ERR -->
  <text x="570" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">EXIT</text>
  <text x="570" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">ERR/INT/TERM</text>

  <!-- Note box at bottom -->
  <rect x="60" y="340" width="760" height="56" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="363" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">SIGKILL(9) 과 SIGSTOP(19)은 trap 불가 — 커널이 직접 처리</text>
  <text x="440" y="383" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">trap '' SIGINT → 시그널 무시 | trap - SIGINT → 기본 동작 복원</text>
</svg>
