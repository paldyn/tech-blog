<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Java IO vs NIO vs NIO.2 비교</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">java.io (Java 1) / java.nio (Java 1.4) / java.nio.file (Java 7)</text>

  <!-- Header row -->
  <rect x="60" y="90" width="220" height="40" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="170" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">항목</text>

  <rect x="290" y="90" width="170" height="40" rx="6" fill="#101828" stroke="#7ec8e3" stroke-width="1"/>
  <text x="375" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">java.io</text>

  <rect x="470" y="90" width="170" height="40" rx="6" fill="#102010" stroke="#55c555" stroke-width="1"/>
  <text x="555" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">java.nio</text>

  <rect x="650" y="90" width="170" height="40" rx="6" fill="#1a1a10" stroke="#b5cea8" stroke-width="1"/>
  <text x="735" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#b5cea8">java.nio.file</text>

  <!-- Row 1: Model -->
  <rect x="60" y="140" width="220" height="40" rx="4" fill="#101010" stroke="#3a3a4e" stroke-width="1"/>
  <text x="170" y="165" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">모델</text>

  <rect x="290" y="140" width="170" height="40" rx="4" fill="#0e1618" stroke="#3a3a4e" stroke-width="1"/>
  <text x="375" y="165" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">스트림 (단방향)</text>

  <rect x="470" y="140" width="170" height="40" rx="4" fill="#0e1618" stroke="#3a3a4e" stroke-width="1"/>
  <text x="555" y="165" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">채널 + 버퍼 (양방향)</text>

  <rect x="650" y="140" width="170" height="40" rx="4" fill="#0e1618" stroke="#3a3a4e" stroke-width="1"/>
  <text x="735" y="165" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Files/Path API</text>

  <!-- Row 2: Blocking -->
  <rect x="60" y="190" width="220" height="40" rx="4" fill="#101010" stroke="#3a3a4e" stroke-width="1"/>
  <text x="170" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">블로킹</text>

  <rect x="290" y="190" width="170" height="40" rx="4" fill="#0e1618" stroke="#3a3a4e" stroke-width="1"/>
  <text x="375" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">항상 블로킹</text>

  <rect x="470" y="190" width="170" height="40" rx="4" fill="#0e1618" stroke="#3a3a4e" stroke-width="1"/>
  <text x="555" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">Non-blocking 가능</text>

  <rect x="650" y="190" width="170" height="40" rx="4" fill="#0e1618" stroke="#3a3a4e" stroke-width="1"/>
  <text x="735" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">비동기 IO 지원</text>

  <!-- Row 3: Charset -->
  <rect x="60" y="240" width="220" height="40" rx="4" fill="#101010" stroke="#3a3a4e" stroke-width="1"/>
  <text x="170" y="265" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">인코딩 제어</text>

  <rect x="290" y="240" width="170" height="40" rx="4" fill="#0e1618" stroke="#3a3a4e" stroke-width="1"/>
  <text x="375" y="265" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">클래스에 따라 다름</text>

  <rect x="470" y="240" width="170" height="40" rx="4" fill="#0e1618" stroke="#3a3a4e" stroke-width="1"/>
  <text x="555" y="265" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">Charset 명시적 지원</text>

  <rect x="650" y="240" width="170" height="40" rx="4" fill="#0e1618" stroke="#3a3a4e" stroke-width="1"/>
  <text x="735" y="265" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">StandardCharsets 사용</text>

  <!-- Row 4: File ops -->
  <rect x="60" y="290" width="220" height="40" rx="4" fill="#101010" stroke="#3a3a4e" stroke-width="1"/>
  <text x="170" y="315" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">파일 작업</text>

  <rect x="290" y="290" width="170" height="40" rx="4" fill="#0e1618" stroke="#3a3a4e" stroke-width="1"/>
  <text x="375" y="315" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">File (구식, 제한적)</text>

  <rect x="470" y="290" width="170" height="40" rx="4" fill="#0e1618" stroke="#3a3a4e" stroke-width="1"/>
  <text x="555" y="315" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">-</text>

  <rect x="650" y="290" width="170" height="40" rx="4" fill="#0e1618" stroke="#3a3a4e" stroke-width="1"/>
  <text x="735" y="315" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">Files/Path (현대적)</text>

  <!-- Row 5: Usecase -->
  <rect x="60" y="340" width="220" height="40" rx="4" fill="#101010" stroke="#3a3a4e" stroke-width="1"/>
  <text x="170" y="365" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">주 용도</text>

  <rect x="290" y="340" width="170" height="40" rx="4" fill="#0e1618" stroke="#3a3a4e" stroke-width="1"/>
  <text x="375" y="365" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">간단한 파일 IO</text>

  <rect x="470" y="340" width="170" height="40" rx="4" fill="#0e1618" stroke="#3a3a4e" stroke-width="1"/>
  <text x="555" y="365" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">네트워크 / 대용량</text>

  <rect x="650" y="340" width="170" height="40" rx="4" fill="#0e1618" stroke="#3a3a4e" stroke-width="1"/>
  <text x="735" y="365" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">파일 시스템 조작</text>

  <!-- Recommendation -->
  <rect x="60" y="400" width="760" height="50" rx="8" fill="#101820" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="422" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">현대 Java 권장</text>
  <text x="440" y="442" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">파일 읽기/쓰기 → Files.readString/writeString | 대용량/비동기 → AsynchronousFileChannel</text>
</svg>
