<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" style="background:#0a0a0a;border-radius:12px">
  <defs>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#3a6ea8"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">HSTS Preload: 브라우저 내장 목록</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">첫 방문 전부터 HTTPS를 강제하는 메커니즘</text>

  <!-- HSTS normal vs preload comparison -->
  <!-- Left: Normal HSTS weakness -->
  <rect x="60" y="96" width="355" height="36" rx="6" fill="#2d0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="237" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">일반 HSTS의 한계</text>

  <rect x="60" y="144" width="355" height="100" rx="6" fill="#1a0d0d" stroke="#7a2a2a" stroke-width="1"/>
  <text x="80" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">첫 방문 취약점</text>
  <text x="80" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">1. 사용자가 처음으로 http://example.com 방문</text>
  <text x="80" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">2. HTTP 요청이 네트워크에 노출됨</text>
  <text x="80" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">3. 이때 MITM 공격이 가능</text>
  <text x="80" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">(HSTS 학습 전 최초 연결이 취약)</text>

  <!-- Right: Preload solution -->
  <rect x="465" y="96" width="355" height="36" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="642" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">Preload 해결책</text>

  <rect x="465" y="144" width="355" height="100" rx="6" fill="#0d1a0d" stroke="#2a7a2a" stroke-width="1"/>
  <text x="485" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">브라우저 내장 목록</text>
  <text x="485" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">Chrome · Firefox · Safari 소스에</text>
  <text x="485" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">도메인 목록이 컴파일 시 포함</text>
  <text x="485" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">→ 설치 즉시 HTTPS 강제</text>
  <text x="485" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">첫 방문 포함 모든 연결 보호</text>

  <!-- Preload requirements -->
  <rect x="60" y="265" width="760" height="36" rx="6" fill="#1a2a3a" stroke="#3a6ea8" stroke-width="1"/>
  <text x="440" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Preload 등록 요건 (hstspreload.org)</text>

  <!-- Requirements list -->
  <rect x="60" y="312" width="760" height="98" rx="6" fill="#0f1820" stroke="#3a6ea8" stroke-width="1"/>
  <text x="80" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">① max-age</text>
  <text x="80" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">최소 1년(31536000초) 이상</text>
  <text x="280" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">② includeSubDomains</text>
  <text x="280" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">모든 서브도메인 HTTPS 필수</text>
  <text x="530" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">③ preload 지시자</text>
  <text x="530" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">헤더에 preload 포함 필수</text>
  <text x="80" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8a020">⚠ 주의: 취소 어려움</text>
  <text x="80" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">등록 후 제거까지 수개월 소요. 서브도메인 포함 모든 경로에서 HTTPS 완벽 대응 필수</text>

  <!-- Final HSTS header -->
  <rect x="60" y="425" width="760" height="8" rx="4" fill="#1a2a3a"/>
</svg>
