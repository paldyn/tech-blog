<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320">
  <rect width="880" height="320" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ParamSpec로 타입 안전한 데코레이터</text>

  <rect x="60" y="64" width="760" height="236" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text x="80" y="92" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ffffff"> typing </tspan><tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> Callable, ParamSpec, TypeVar</tspan></text>

  <text x="80" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">P = ParamSpec(</tspan><tspan fill="#ce9178">"P"</tspan><tspan fill="#ffffff">)</tspan><tspan fill="#ffffff">;  R = TypeVar(</tspan><tspan fill="#ce9178">"R"</tspan><tspan fill="#ffffff">)</tspan></text>

  <text x="80" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">def</tspan><tspan fill="#ffffff"> logged(fn: Callable[P, R]) -&gt; Callable[P, R]:</tspan></text>

  <text x="80" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    def</tspan><tspan fill="#ffffff"> wrap(*args: P.args, **kw: P.kwargs) -&gt; R:</tspan></text>

  <text x="80" y="188" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">        print</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"call"</tspan><tspan fill="#ffffff">, fn.__name__)</tspan></text>

  <text x="80" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">        return</tspan><tspan fill="#ffffff"> fn(*args, **kw)</tspan></text>

  <text x="80" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    return</tspan><tspan fill="#ffffff"> wrap</tspan></text>

  <text x="80" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">@logged</tspan></text>

  <text x="80" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">def</tspan><tspan fill="#ffffff"> add(a: </tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff">, b: </tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff">) -&gt; </tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> a + b</tspan></text>
</svg>
