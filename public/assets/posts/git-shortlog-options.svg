<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">git shortlog 활용 패턴</text>
  <text x="60" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">범위 지정·그룹화·릴리스 노트 생성</text>

  <!-- Code block -->
  <rect x="60" y="100" width="760" height="258" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">
    <tspan x="76" dy="0"><tspan fill="#6a8aa0"># 특정 범위의 커밋만 (릴리스 간 비교)</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git shortlog</tspan> v1.0.0..v1.1.0</tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git shortlog</tspan> v1.0.0..HEAD</tspan>
    <tspan x="76" dy="18"> </tspan>
    <tspan x="76" dy="18"><tspan fill="#6a8aa0"># 최근 30일간 기여자</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git shortlog</tspan> --since="30 days ago" -sn</tspan>
    <tspan x="76" dy="18"> </tspan>
    <tspan x="76" dy="18"><tspan fill="#6a8aa0"># CHANGELOG용 그룹화 (커밋 메시지 기준)</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git shortlog</tspan> -sn HEAD~20..HEAD</tspan>
    <tspan x="76" dy="18"> </tspan>
    <tspan x="76" dy="18"><tspan fill="#6a8aa0"># stdin으로 파이프 (git log와 연계)</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git log</tspan> --no-merges v1.0..HEAD | <tspan fill="#7ec8e3">git shortlog</tspan></tspan>
    <tspan x="76" dy="18"> </tspan>
    <tspan x="76" dy="18"><tspan fill="#6a8aa0"># CONTRIBUTORS 파일 생성</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git shortlog</tspan> -sn --no-merges &gt; CONTRIBUTORS</tspan>
  </text>

  <!-- Bottom info boxes -->
  <rect x="60" y="376" width="230" height="46" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="175" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">--no-merges</text>
  <text x="175" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">머지 커밋 제외</text>

  <rect x="310" y="376" width="230" height="46" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.2"/>
  <text x="425" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">v1.0.0..v1.1.0</text>
  <text x="425" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">릴리스 간 기여자</text>

  <rect x="560" y="376" width="260" height="46" rx="8" fill="#0d1117" stroke="#e8a838" stroke-width="1.2"/>
  <text x="690" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8a838" text-anchor="middle">stdin 파이프</text>
  <text x="690" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">git log | git shortlog</text>
</svg>
