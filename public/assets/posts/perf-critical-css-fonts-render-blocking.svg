<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 2 L 12 7 L 0 12 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 2 L 12 7 L 0 12 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">렌더 블로킹 vs 최적화된 로딩</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">CSS·폰트 로딩이 FCP에 미치는 영향</text>

  <!-- Before (blocking) -->
  <text x="60" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">❌ 렌더 블로킹</text>

  <rect x="60" y="116" width="120" height="32" rx="4" fill="#1a2a4a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="120" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">HTML 파싱</text>

  <line x1="180" y1="132" x2="208" y2="132" stroke="#e05555" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="210" y="116" width="160" height="32" rx="4" fill="#2a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="290" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">CSS 다운로드 (블로킹)</text>

  <line x1="370" y1="132" x2="398" y2="132" stroke="#e05555" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="400" y="116" width="120" height="32" rx="4" fill="#2a1a0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="460" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">폰트 로딩 (FOUT)</text>

  <line x1="520" y1="132" x2="548" y2="132" stroke="#e05555" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="550" y="116" width="100" height="32" rx="4" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
  <text x="600" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">FCP 지연됨</text>

  <!-- After (optimized) -->
  <text x="60" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">✅ 최적화</text>

  <rect x="60" y="196" width="120" height="32" rx="4" fill="#1a2a4a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="120" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">HTML 파싱</text>

  <line x1="180" y1="212" x2="208" y2="212" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <rect x="210" y="196" width="140" height="32" rx="4" fill="#0d2a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="280" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">크리티컬 CSS 인라인</text>

  <line x1="350" y1="212" x2="378" y2="212" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <rect x="380" y="196" width="100" height="32" rx="4" fill="#0d2a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="430" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">즉시 FCP</text>

  <!-- Parallel loading -->
  <rect x="500" y="196" width="180" height="32" rx="4" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="590" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">나머지 CSS 비동기 로드</text>

  <!-- Divider -->
  <line x1="60" y1="260" x2="820" y2="260" stroke="#222" stroke-width="1"/>

  <!-- Critical CSS explanation -->
  <rect x="60" y="276" width="360" height="96" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">크리티컬 CSS란?</text>
  <text x="80" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">초기 뷰포트(Above the fold)를 렌더링하는 데</text>
  <text x="80" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">필요한 최소한의 CSS — &lt;style&gt;로 인라인화</text>
  <text x="80" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">나머지 CSS는 비동기 로드 (onload 트릭)</text>

  <!-- Font display explanation -->
  <rect x="460" y="276" width="360" height="96" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">font-display 전략</text>
  <text x="476" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">swap: 폴백 폰트 즉시 표시 후 교체 (권장)</text>
  <text x="476" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">optional: 느리면 폴백 유지 (LCP 최적)</text>
  <text x="476" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">block: 텍스트 숨김 (FOIT — 피해야 함)</text>

  <!-- Code block -->
  <rect x="60" y="392" width="760" height="68" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="416" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">/* 크리티컬 CSS 비동기 로드 트릭 */</text>
  <text x="76" y="434" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">&lt;<tspan fill="#7ec8e3" font-weight="600">link</tspan> rel=<tspan fill="#ce9178">"stylesheet"</tspan> href=<tspan fill="#ce9178">"main.css"</tspan> media=<tspan fill="#ce9178">"print"</tspan> onload=<tspan fill="#ce9178">"this.media='all'"</tspan>/&gt;</text>
  <text x="76" y="452" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">/* media="print"로 즉시 렌더 블로킹 해제 → 로드 완료 후 all로 교체 */</text>
</svg>
