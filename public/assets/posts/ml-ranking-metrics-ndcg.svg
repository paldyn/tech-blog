<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">NDCG 계산 과정</text>
  <text x="440" y="66" text-anchor="middle" fill="#888" font-size="13">순위가 높을수록 관련성의 기여도가 지수적으로 감소한다</text>

  <!-- Step 1: Relevance scores -->
  <text x="120" y="98" text-anchor="middle" fill="#7ec8e3" font-size="13" font-weight="600">① 랭킹 결과</text>
  <rect x="60" y="108" width="120" height="240" rx="6" fill="#111827" stroke="#1a3a5c" stroke-width="1.5"/>

  <!-- Rank items -->
  <text x="80" y="132" fill="#888" font-size="11">순위</text>
  <text x="130" y="132" fill="#888" font-size="11">관련도</text>
  <line x1="76" y1="138" x2="174" y2="138" stroke="#333" stroke-width="1"/>
  <text x="88" y="156" fill="#e8e8e8" font-size="12">1위</text>
  <text x="145" y="156" text-anchor="middle" fill="#55c555" font-size="13" font-weight="600">3</text>
  <text x="88" y="178" fill="#e8e8e8" font-size="12">2위</text>
  <text x="145" y="178" text-anchor="middle" fill="#55c555" font-size="13" font-weight="600">2</text>
  <text x="88" y="200" fill="#e8e8e8" font-size="12">3위</text>
  <text x="145" y="200" text-anchor="middle" fill="#e05555" font-size="13" font-weight="600">3</text>
  <text x="88" y="222" fill="#e8e8e8" font-size="12">4위</text>
  <text x="145" y="222" text-anchor="middle" fill="#888" font-size="13" font-weight="600">0</text>
  <text x="88" y="244" fill="#e8e8e8" font-size="12">5위</text>
  <text x="145" y="244" text-anchor="middle" fill="#7ec8e3" font-size="13" font-weight="600">1</text>
  <text x="120" y="268" text-anchor="middle" fill="#888" font-size="10">최대=3 (매우 관련)</text>
  <text x="120" y="282" text-anchor="middle" fill="#888" font-size="10">0=무관련</text>
  <text x="120" y="298" text-anchor="middle" fill="#888" font-size="10">2=관련</text>
  <text x="120" y="316" text-anchor="middle" fill="#888" font-size="10">1=약간 관련</text>
  <text x="120" y="334" text-anchor="middle" fill="#888" font-size="10">3=매우 관련</text>

  <!-- Step 2: DCG -->
  <text x="320" y="98" text-anchor="middle" fill="#e0a020" font-size="13" font-weight="600">② DCG 계산</text>
  <text x="320" y="116" text-anchor="middle" fill="#888" font-size="11">DCG = Σ (2^rel - 1) / log₂(rank+1)</text>
  <rect x="220" y="124" width="200" height="220" rx="6" fill="#111827" stroke="#3a2905" stroke-width="1.5"/>

  <text x="230" y="148" fill="#888" font-size="11">순위  공식                값</text>
  <line x1="226" y1="154" x2="414" y2="154" stroke="#333" stroke-width="1"/>
  <text x="230" y="172" fill="#e8e8e8" font-size="11">1위   (2³-1)/log₂(2)</text>
  <text x="400" y="172" text-anchor="end" fill="#55c555" font-size="12" font-weight="600">7.00</text>
  <text x="230" y="192" fill="#e8e8e8" font-size="11">2위   (2²-1)/log₂(3)</text>
  <text x="400" y="192" text-anchor="end" fill="#55c555" font-size="12" font-weight="600">1.89</text>
  <text x="230" y="212" fill="#e8e8e8" font-size="11">3위   (2³-1)/log₂(4)</text>
  <text x="400" y="212" text-anchor="end" fill="#55c555" font-size="12" font-weight="600">3.50</text>
  <text x="230" y="232" fill="#e8e8e8" font-size="11">4위   (2⁰-1)/log₂(5)</text>
  <text x="400" y="232" text-anchor="end" fill="#888" font-size="12">0.00</text>
  <text x="230" y="252" fill="#e8e8e8" font-size="11">5위   (2¹-1)/log₂(6)</text>
  <text x="400" y="252" text-anchor="end" fill="#7ec8e3" font-size="12" font-weight="600">0.39</text>
  <line x1="226" y1="260" x2="414" y2="260" stroke="#333" stroke-width="1"/>
  <text x="230" y="278" fill="#888" font-size="11">DCG@5 합계</text>
  <text x="400" y="278" text-anchor="end" fill="#e0a020" font-size="14" font-weight="700">12.78</text>
  <text x="320" y="308" text-anchor="middle" fill="#888" font-size="10">순위가 낮을수록 분모↑ → 기여도↓</text>
  <text x="320" y="324" text-anchor="middle" fill="#888" font-size="10">3위 관련도=3이지만 1위보다 기여 작음</text>

  <!-- Step 3: IDCG -->
  <text x="540" y="98" text-anchor="middle" fill="#7777cc" font-size="13" font-weight="600">③ IDCG (이상적 DCG)</text>
  <text x="540" y="116" text-anchor="middle" fill="#888" font-size="11">관련도 내림차순 정렬</text>
  <rect x="440" y="124" width="200" height="160" rx="6" fill="#111827" stroke="#2a1a4a" stroke-width="1.5"/>

  <text x="450" y="148" fill="#888" font-size="11">이상 순위  관련도   기여</text>
  <line x1="446" y1="154" x2="634" y2="154" stroke="#333" stroke-width="1"/>
  <text x="450" y="172" fill="#e8e8e8" font-size="11">1위        3</text>
  <text x="630" y="172" text-anchor="end" fill="#7777cc" font-size="11">7.00</text>
  <text x="450" y="192" fill="#e8e8e8" font-size="11">2위        3</text>
  <text x="630" y="192" text-anchor="end" fill="#7777cc" font-size="11">3.79</text>
  <text x="450" y="212" fill="#e8e8e8" font-size="11">3위        2</text>
  <text x="630" y="212" text-anchor="end" fill="#7777cc" font-size="11">1.50</text>
  <text x="450" y="232" fill="#e8e8e8" font-size="11">4위        1</text>
  <text x="630" y="232" text-anchor="end" fill="#7777cc" font-size="11">0.43</text>
  <text x="450" y="252" fill="#e8e8e8" font-size="11">5위        0</text>
  <text x="630" y="252" text-anchor="end" fill="#888" font-size="11">0.00</text>
  <line x1="446" y1="258" x2="634" y2="258" stroke="#333" stroke-width="1"/>
  <text x="450" y="275" fill="#888" font-size="11">IDCG@5</text>
  <text x="630" y="275" text-anchor="end" fill="#7777cc" font-size="14" font-weight="700">12.72</text>

  <!-- Step 4: NDCG -->
  <rect x="680" y="124" width="160" height="100" rx="8" fill="#0e1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="760" y="152" text-anchor="middle" fill="#e8e8e8" font-size="14" font-weight="600">NDCG@5</text>
  <text x="760" y="176" text-anchor="middle" fill="#888" font-size="12">DCG / IDCG</text>
  <text x="760" y="196" text-anchor="middle" fill="#888" font-size="12">12.78 / 12.72</text>
  <text x="760" y="218" text-anchor="middle" fill="#7ec8e3" font-size="20" font-weight="700">≈ 1.00</text>

  <text x="760" y="260" text-anchor="middle" fill="#888" font-size="11">범위: 0 ~ 1</text>
  <text x="760" y="278" text-anchor="middle" fill="#55c555" font-size="11">1.0 = 완벽한 순위</text>
  <text x="760" y="296" text-anchor="middle" fill="#888" font-size="11">0.0 = 최악의 순위</text>

  <!-- Bottom note -->
  <rect x="60" y="370" width="760" height="52" rx="6" fill="#111827" stroke="#333" stroke-width="1"/>
  <text x="440" y="392" text-anchor="middle" fill="#e8e8e8" font-size="12" font-weight="600">핵심: 높은 순위에 관련도 높은 문서가 올수록 NDCG가 1에 가까워진다</text>
  <text x="440" y="412" text-anchor="middle" fill="#888" font-size="11">검색 엔진 · 추천 시스템 · 광고 랭킹 평가에서 표준 지표로 사용</text>

  <!-- Footer -->
  <text x="440" y="448" text-anchor="middle" fill="#444" font-size="11">PALDYN · AI 완전 정복 시리즈</text>
</svg>
