<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arrD" markerWidth="8" markerHeight="8" refX="4" refY="7" orient="auto">
      <path d="M1,1 L7,1 L4,7 z" fill="#444"/>
    </marker>
    <marker id="arrU" markerWidth="8" markerHeight="8" refX="4" refY="1" orient="auto">
      <path d="M1,7 L7,7 L4,1 z" fill="#444"/>
    </marker>
    <marker id="arrDB" markerWidth="8" markerHeight="8" refX="4" refY="7" orient="auto">
      <path d="M1,1 L7,1 L4,7 z" fill="#4488ff"/>
    </marker>
    <marker id="arrUB" markerWidth="8" markerHeight="8" refX="4" refY="1" orient="auto">
      <path d="M1,7 L7,7 L4,1 z" fill="#44cc88"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="36" text-anchor="middle"
    font-family="Wanted Sans Variable, -apple-system, sans-serif"
    font-size="18" font-weight="700" fill="#e8e8e8">Nexacro N CRUD — 3계층 데이터 흐름</text>

  <!-- ===== Layer 1: UI ===== -->
  <rect x="20" y="56" width="840" height="110" rx="8" fill="#0d1520" stroke="#1e3a6e" stroke-width="1.5"/>
  <text x="36" y="78" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#64b5f6">사용자 인터페이스 레이어</text>

  <!-- Read button -->
  <rect x="36" y="90" width="140" height="60" rx="6" fill="#112030" stroke="#2a5090" stroke-width="1"/>
  <text x="106" y="116" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#90caf9">조회 버튼</text>
  <text x="106" y="135" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555">fn_search() 호출</text>

  <!-- New button -->
  <rect x="202" y="90" width="140" height="60" rx="6" fill="#0d1a10" stroke="#1b5e20" stroke-width="1"/>
  <text x="272" y="116" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#a5d6a7">신규 버튼</text>
  <text x="272" y="135" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555">fn_new() 호출</text>

  <!-- Grid (edit) -->
  <rect x="368" y="90" width="180" height="60" rx="6" fill="#1a1000" stroke="#5c3800" stroke-width="1"/>
  <text x="458" y="112" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#ffcc80">Grid 직접 편집</text>
  <text x="458" y="128" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555">oncelldblclick / oncellclick</text>
  <text x="458" y="143" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555">edittype="text" 셀 편집</text>

  <!-- Delete button -->
  <rect x="574" y="90" width="140" height="60" rx="6" fill="#1a0808" stroke="#7c1c1c" stroke-width="1"/>
  <text x="644" y="116" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#ef9a9a">삭제 버튼</text>
  <text x="644" y="135" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555">fn_delete() 호출</text>

  <!-- Save button -->
  <rect x="730" y="90" width="116" height="60" rx="6" fill="#1a0a3a" stroke="#5a2a9e" stroke-width="1"/>
  <text x="788" y="116" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#ce93d8">저장 버튼</text>
  <text x="788" y="135" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555">fn_save() 호출</text>

  <!-- Arrows UI → Dataset -->
  <line x1="106" y1="166" x2="106" y2="196" stroke="#444" stroke-width="1.5" marker-end="url(#arrD)"/>
  <line x1="272" y1="166" x2="272" y2="196" stroke="#444" stroke-width="1.5" marker-end="url(#arrD)"/>
  <line x1="458" y1="166" x2="458" y2="196" stroke="#444" stroke-width="1.5" marker-end="url(#arrD)"/>
  <line x1="644" y1="166" x2="644" y2="196" stroke="#444" stroke-width="1.5" marker-end="url(#arrD)"/>
  <line x1="788" y1="166" x2="788" y2="196" stroke="#5a2a9e" stroke-width="1.5" marker-end="url(#arrD)"/>

  <!-- ===== Layer 2: Dataset ===== -->
  <rect x="20" y="196" width="840" height="140" rx="8" fill="#0d150d" stroke="#1e5e1e" stroke-width="1.5"/>
  <text x="36" y="218" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#81c784">Dataset 레이어 — RowStatus 자동 추적</text>

  <!-- insertRow -->
  <rect x="36" y="228" width="160" height="90" rx="6" fill="#081408" stroke="#1b5e20" stroke-width="1"/>
  <text x="116" y="250" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#a5d6a7">ds.insertRow(nRow)</text>
  <text x="116" y="268" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555">새 행 추가 후</text>
  <text x="116" y="283" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555">rowposition 이동</text>
  <rect x="46" y="294" width="140" height="18" rx="4" fill="#0a200a"/>
  <text x="116" y="307" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#69f0ae">INSERT (2)</text>

  <!-- setColumn -->
  <rect x="220" y="228" width="220" height="90" rx="6" fill="#1a1000" stroke="#5c3800" stroke-width="1"/>
  <text x="330" y="250" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#ffcc80">ds.setColumn(row, col, val)</text>
  <text x="330" y="268" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555">컬럼 값 변경</text>
  <text x="330" y="283" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555">oncolumnchanged 이벤트 발생</text>
  <rect x="230" y="294" width="200" height="18" rx="4" fill="#1a1000"/>
  <text x="330" y="307" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#ffb74d">UPDATE (4) / INSERT(2) 유지</text>

  <!-- deleteRow -->
  <rect x="464" y="228" width="160" height="90" rx="6" fill="#140808" stroke="#7c1c1c" stroke-width="1"/>
  <text x="544" y="250" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#ef9a9a">ds.deleteRow(nRow)</text>
  <text x="544" y="268" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555">INSERT행: 즉시 제거</text>
  <text x="544" y="283" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555">NORMAL행: 숨김 처리</text>
  <rect x="474" y="294" width="140" height="18" rx="4" fill="#200808"/>
  <text x="544" y="307" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#ff5252">DELETE (1)</text>

  <!-- Transaction box -->
  <rect x="648" y="228" width="196" height="90" rx="6" fill="#140a28" stroke="#5a2a9e" stroke-width="1"/>
  <text x="746" y="250" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#ce93d8">this.transaction()</text>
  <text x="746" y="268" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555">변경 행 자동 직렬화</text>
  <text x="746" y="283" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555">RowStatus별 분류 전송</text>
  <rect x="658" y="294" width="176" height="18" rx="4" fill="#200a40"/>
  <text x="746" y="307" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#b39ddb">저장 완료 → NORMAL(0)</text>

  <!-- Arrows Dataset → Server -->
  <line x1="106" y1="336" x2="106" y2="368" stroke="#444" stroke-width="1.5" marker-end="url(#arrD)"/>
  <line x1="330" y1="336" x2="330" y2="368" stroke="#444" stroke-width="1.5" marker-end="url(#arrD)"/>
  <line x1="544" y1="336" x2="544" y2="368" stroke="#444" stroke-width="1.5" marker-end="url(#arrD)"/>
  <line x1="746" y1="336" x2="746" y2="368" stroke="#5a2a9e" stroke-width="1.5" marker-end="url(#arrD)"/>

  <!-- ===== Layer 3: Server ===== -->
  <rect x="20" y="368" width="840" height="92" rx="8" fill="#150e08" stroke="#5c4000" stroke-width="1.5"/>
  <text x="36" y="390" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#ffb74d">서버 레이어 — SQL 처리</text>

  <rect x="36" y="400" width="175" height="44" rx="5" fill="#1a1200" stroke="#5c3800" stroke-width="1"/>
  <text x="123" y="419" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#888">SELECT → Dataset 응답</text>
  <text x="123" y="436" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555">조회용 svcID</text>

  <rect x="240" y="400" width="200" height="44" rx="5" fill="#1a1200" stroke="#5c3800" stroke-width="1"/>
  <text x="340" y="419" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#888">INSERT / UPDATE / DELETE</text>
  <text x="340" y="436" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555">저장용 svcID (단일 호출)</text>

  <rect x="468" y="400" width="180" height="44" rx="5" fill="#1a1200" stroke="#5c3800" stroke-width="1"/>
  <text x="558" y="419" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#888">errorCode 0 → 성공</text>
  <text x="558" y="436" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555">콜백: fn_callback()</text>

  <rect x="676" y="400" width="168" height="44" rx="5" fill="#1a1200" stroke="#5c3800" stroke-width="1"/>
  <text x="760" y="419" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="11" fill="#888">errorCode ≠ 0 → 오류</text>
  <text x="760" y="436" text-anchor="middle" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#555">alert(errorMsg) 처리</text>
</svg>
