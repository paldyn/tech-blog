<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">원격 브랜치 이름 변경 전체 흐름</text>
  <text x="60" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">로컬 변경 → 원격 push → 구 브랜치 삭제</text>

  <!-- Step boxes -->
  <!-- Step 1 -->
  <rect x="60" y="108" width="220" height="70" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">1. 로컬 이름 변경</text>
  <text x="170" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#aaa" text-anchor="middle">git branch -m old new</text>
  <text x="170" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">로컬 포인터 파일만 교체</text>

  <!-- Arrow 1→2 -->
  <line x1="280" y1="143" x2="320" y2="143" stroke="#555" stroke-width="2"/>
  <polygon points="320,138 332,143 320,148" fill="#555"/>

  <!-- Step 2 -->
  <rect x="332" y="108" width="220" height="70" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="442" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">2. 원격에 push</text>
  <text x="442" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#aaa" text-anchor="middle">git push -u origin new</text>
  <text x="442" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">추적 관계 -u로 재설정</text>

  <!-- Arrow 2→3 -->
  <line x1="552" y1="143" x2="592" y2="143" stroke="#555" stroke-width="2"/>
  <polygon points="592,138 604,143 592,148" fill="#555"/>

  <!-- Step 3 -->
  <rect x="604" y="108" width="220" height="70" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="714" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">3. 원격 구 브랜치 삭제</text>
  <text x="714" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#aaa" text-anchor="middle">git push origin --delete old</text>
  <text x="714" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">팀원 공지 필수</text>

  <!-- Full code block -->
  <text x="60" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">전체 순서 (예: feature/login → feature/auth)</text>
  <rect x="60" y="218" width="760" height="162" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">
    <tspan x="76" dy="0"><tspan fill="#6a8aa0"># 1. 로컬 이름 변경</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git branch</tspan> -m feature/login feature/auth</tspan>
    <tspan x="76" dy="18"> </tspan>
    <tspan x="76" dy="18"><tspan fill="#6a8aa0"># 2. 새 이름으로 push + 추적 설정</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git push</tspan> -u origin feature/auth</tspan>
    <tspan x="76" dy="18"> </tspan>
    <tspan x="76" dy="18"><tspan fill="#6a8aa0"># 3. 원격에서 구 이름 삭제</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git push</tspan> origin --delete feature/login</tspan>
    <tspan x="76" dy="18"> </tspan>
    <tspan x="76" dy="18"><tspan fill="#6a8aa0"># 팀원은 로컬 추적 브랜치 업데이트 필요</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git fetch</tspan> --prune</tspan>
  </text>
</svg>
