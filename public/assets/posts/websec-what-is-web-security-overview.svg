<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">웹 보안이란 무엇인가</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">공격자 vs 방어자 — 웹 애플리케이션 위협 전체 지도</text>

  <!-- Attacker side -->
  <rect x="60" y="100" width="220" height="44" rx="8" fill="#2a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="170" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">공격자 (Attacker)</text>
  <text x="170" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">스크립트 키디 · 해커 · 내부자</text>

  <!-- Attack types -->
  <rect x="60" y="180" width="220" height="38" rx="6" fill="#1a0a0a" stroke="#993333" stroke-width="1"/>
  <text x="170" y="197" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">SQL 인젝션 · XSS · CSRF</text>
  <text x="170" y="211" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">입력 조작 공격</text>

  <rect x="60" y="230" width="220" height="38" rx="6" fill="#1a0a0a" stroke="#993333" stroke-width="1"/>
  <text x="170" y="247" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">인증 우회 · 세션 탈취</text>
  <text x="170" y="261" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">신원 도용 공격</text>

  <rect x="60" y="280" width="220" height="38" rx="6" fill="#1a0a0a" stroke="#993333" stroke-width="1"/>
  <text x="170" y="297" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">DDoS · 브루트 포스</text>
  <text x="170" y="311" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">가용성 공격</text>

  <!-- Web App (center) -->
  <rect x="330" y="160" width="220" height="180" rx="10" fill="#0a1020" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="187" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">웹 애플리케이션</text>
  <rect x="350" y="198" width="180" height="30" rx="5" fill="#101828" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Frontend (HTML/JS)</text>
  <rect x="350" y="236" width="180" height="30" rx="5" fill="#101828" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Backend API</text>
  <rect x="350" y="274" width="180" height="30" rx="5" fill="#101828" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Database</text>
  <rect x="350" y="312" width="180" height="20" rx="4" fill="#101828" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">파일 · 외부 API · 인증 서버</text>

  <!-- Defense side -->
  <rect x="600" y="100" width="220" height="44" rx="8" fill="#0a2a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="710" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">방어자 (Defender)</text>
  <text x="710" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">개발자 · 보안팀 · DevSecOps</text>

  <!-- Defense mechanisms -->
  <rect x="600" y="180" width="220" height="38" rx="6" fill="#0a1a0a" stroke="#336633" stroke-width="1"/>
  <text x="710" y="197" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">입력 검증 · 출력 인코딩</text>
  <text x="710" y="211" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">인젝션 방어</text>

  <rect x="600" y="230" width="220" height="38" rx="6" fill="#0a1a0a" stroke="#336633" stroke-width="1"/>
  <text x="710" y="247" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">MFA · 세션 토큰 · 해싱</text>
  <text x="710" y="261" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">인증 강화</text>

  <rect x="600" y="280" width="220" height="38" rx="6" fill="#0a1a0a" stroke="#336633" stroke-width="1"/>
  <text x="710" y="297" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">WAF · Rate Limit · CDN</text>
  <text x="710" y="311" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">인프라 방어</text>

  <!-- Arrows: attacker -> webapp -->
  <line x1="280" y1="199" x2="330" y2="220" stroke="#e05555" stroke-width="2" marker-end="url(#arr2)"/>
  <line x1="280" y1="249" x2="330" y2="250" stroke="#e05555" stroke-width="2" marker-end="url(#arr2)"/>
  <line x1="280" y1="299" x2="330" y2="285" stroke="#e05555" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Arrows: defense -> webapp -->
  <line x1="600" y1="220" x2="550" y2="220" stroke="#55c555" stroke-width="2" marker-end="url(#arr1)"/>
  <line x1="600" y1="249" x2="550" y2="249" stroke="#55c555" stroke-width="2" marker-end="url(#arr1)"/>
  <line x1="600" y1="285" x2="550" y2="285" stroke="#55c555" stroke-width="2" marker-end="url(#arr1)"/>

  <!-- Bottom CIA row -->
  <text x="440" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">보안의 목표 — CIA 3요소</text>

  <rect x="100" y="392" width="180" height="64" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="190" y="416" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">기밀성</text>
  <text x="190" y="434" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Confidentiality</text>
  <text x="190" y="449" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8">권한 없는 접근 차단</text>

  <rect x="350" y="392" width="180" height="64" rx="8" fill="#0d1520" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="416" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">무결성</text>
  <text x="440" y="434" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Integrity</text>
  <text x="440" y="449" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8">데이터 변조 방지</text>

  <rect x="600" y="392" width="180" height="64" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="690" y="416" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">가용성</text>
  <text x="690" y="434" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Availability</text>
  <text x="690" y="449" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8">서비스 연속 제공</text>

  <!-- top divider line -->
  <line x1="60" y1="90" x2="820" y2="90" stroke="#222" stroke-width="1"/>
</svg>
