<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arro" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e0c055"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">재귀 질의 vs 반복 질의</text>
  <text x="440" y="64" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">클라이언트와 재귀 해석기 사이: 재귀 | 해석기와 NS 사이: 반복</text>

  <!-- Left: Recursive query -->
  <rect x="40" y="80" width="380" height="300" rx="8" fill="#0f1a0f" stroke="#2a5a2a" stroke-width="1.5"/>
  <text x="230" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">재귀 질의 (클라이언트 → 해석기)</text>

  <!-- Client asks resolver -->
  <rect x="60" y="120" width="90" height="40" rx="4" fill="#1a2a3a" stroke="#3a5a7a" stroke-width="1"/>
  <text x="105" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">클라이언트</text>

  <rect x="270" y="120" width="120" height="40" rx="4" fill="#1a1a0a" stroke="#5a5a1a" stroke-width="1"/>
  <text x="330" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e0c055">재귀 해석기</text>

  <!-- Query arrow -->
  <line x1="150" y1="135" x2="268" y2="135" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrg)"/>
  <text x="209" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">"최종 답 줘"</text>

  <!-- Resolver works -->
  <text x="330" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">해석기가 알아서</text>
  <text x="330" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">루트→TLD→Auth</text>
  <text x="330" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">모두 조회</text>

  <!-- Return arrow -->
  <line x1="268" y1="160" x2="150" y2="160" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <text x="209" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">"IP: x.x.x.x"</text>

  <!-- Description -->
  <text x="230" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">클라이언트는 한 번만 물어봄</text>
  <text x="230" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">해석기가 복잡한 과정 처리</text>
  <text x="230" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">RD(Recursion Desired) 비트 = 1</text>
  <text x="230" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">일반 클라이언트가 사용</text>
  <text x="230" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">해석기 캐시 활용</text>

  <!-- Right: Iterative query -->
  <rect x="460" y="80" width="380" height="300" rx="8" fill="#1a1a0a" stroke="#5a5a1a" stroke-width="1.5"/>
  <text x="650" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e0c055">반복 질의 (해석기 → NS)</text>

  <!-- Resolver and Root -->
  <rect x="480" y="120" width="90" height="40" rx="4" fill="#1a1a0a" stroke="#5a5a1a" stroke-width="1"/>
  <text x="525" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e0c055">해석기</text>

  <rect x="700" y="120" width="110" height="40" rx="4" fill="#0f1a0f" stroke="#2a5a2a" stroke-width="1"/>
  <text x="755" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Root NS</text>

  <line x1="570" y1="130" x2="698" y2="130" stroke="#e0c055" stroke-width="1.5" marker-end="url(#arro)"/>
  <text x="634" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e0c055">"example.com 어디?"</text>
  <line x1="698" y1="148" x2="570" y2="148" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <text x="634" y="163" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">".com NS 주소 알려줌"</text>

  <rect x="700" y="180" width="110" height="40" rx="4" fill="#1a1a0a" stroke="#5a5a1a" stroke-width="1"/>
  <text x="755" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e0c055">TLD NS</text>

  <line x1="570" y1="190" x2="698" y2="190" stroke="#e0c055" stroke-width="1.5" marker-end="url(#arro)"/>
  <text x="634" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e0c055">".com에 물어봄"</text>
  <line x1="698" y1="208" x2="570" y2="208" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <text x="634" y="223" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">"Auth NS 주소 알려줌"</text>

  <rect x="700" y="240" width="110" height="40" rx="4" fill="#0f0f1a" stroke="#2a2a5a" stroke-width="1"/>
  <text x="755" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">Auth NS</text>

  <line x1="570" y1="250" x2="698" y2="250" stroke="#e0c055" stroke-width="1.5" marker-end="url(#arro)"/>
  <text x="634" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e0c055">"Auth에 물어봄"</text>
  <line x1="698" y1="268" x2="570" y2="268" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrg)"/>
  <text x="634" y="283" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">"IP 93.184.216.34"</text>

  <text x="650" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">각 단계에서 다음 NS 주소만 받음</text>
  <text x="650" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e0c055">RA(Recursion Available) = 0</text>
  <text x="650" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">해석기가 직접 순환</text>

  <!-- Bottom note -->
  <text x="440" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">루트 NS는 재귀 질의 지원 안 함 → 반복 질의만 처리 (DoS 방지)</text>
</svg>
