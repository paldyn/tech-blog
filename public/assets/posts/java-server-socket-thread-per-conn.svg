<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="tp1" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="340" rx="12" fill="#0a0a0a"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">연결마다 스레드 하나 — 동시 처리의 고전적 모델</text>

  <!-- ServerSocket -->
  <rect x="60" y="120" width="200" height="120" rx="10" fill="#11151c" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="170" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">ServerSocket</text>
  <text x="160" y="196" font-size="12" fill="#888" text-anchor="middle">accept() 반복</text>

  <!-- worker threads -->
  <rect x="560" y="80" width="260" height="56" rx="10" fill="#11151c" stroke="#55c555" stroke-width="1.5"/>
  <text x="690" y="105" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Thread-1 → 클라이언트 A</text>
  <text x="690" y="124" font-size="12" fill="#888" text-anchor="middle">read / write 블로킹 처리</text>

  <rect x="560" y="152" width="260" height="56" rx="10" fill="#11151c" stroke="#55c555" stroke-width="1.5"/>
  <text x="690" y="177" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Thread-2 → 클라이언트 B</text>
  <text x="690" y="196" font-size="12" fill="#888" text-anchor="middle">read / write 블로킹 처리</text>

  <rect x="560" y="224" width="260" height="56" rx="10" fill="#11151c" stroke="#55c555" stroke-width="1.5"/>
  <text x="690" y="249" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Thread-3 → 클라이언트 C</text>
  <text x="690" y="268" font-size="12" fill="#888" text-anchor="middle">read / write 블로킹 처리</text>

  <line x1="262" y1="160" x2="558" y2="108" stroke="#55c555" stroke-width="2.5" marker-end="url(#tp1)"/>
  <line x1="262" y1="180" x2="558" y2="180" stroke="#55c555" stroke-width="2.5" marker-end="url(#tp1)"/>
  <line x1="262" y1="200" x2="558" y2="252" stroke="#55c555" stroke-width="2.5" marker-end="url(#tp1)"/>

  <text x="440" y="312" font-size="13" fill="#888" text-anchor="middle">연결당 스레드는 직관적이지만, 수천 연결에서는 스레드 풀·가상 스레드가 필요해진다</text>
</svg>
