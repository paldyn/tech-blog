<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arrf" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SQLite FTS5 — 전문 검색 구조</text>

  <!-- Document input -->
  <rect x="60" y="80" width="200" height="80" fill="#1a1a2e" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="160" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">문서 (Document)</text>
  <text x="160" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">"SQLite는 가볍고 빠른</text>
  <text x="160" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">임베디드 데이터베이스"</text>

  <!-- Tokenizer -->
  <rect x="300" y="80" width="180" height="80" fill="#1a2a1a" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="390" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">토크나이저</text>
  <text x="390" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">unicode61 (기본)</text>
  <text x="390" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ascii / trigram / 커스텀</text>

  <line x1="260" y1="120" x2="298" y2="120" stroke="#55c555" stroke-width="2" marker-end="url(#arrg2)"/>

  <!-- Inverted Index -->
  <rect x="520" y="60" width="300" height="260" fill="#0f1a2e" rx="10" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="670" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">역 인덱스 (Inverted Index)</text>

  <rect x="536" y="100" width="268" height="32" fill="#1a1a2e" rx="4" stroke="#7ec8e3" stroke-width="1"/>
  <text x="670" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">"SQLite" → [doc1, doc5, doc8]</text>

  <rect x="536" y="140" width="268" height="32" fill="#1a1a2e" rx="4" stroke="#7ec8e3" stroke-width="1"/>
  <text x="670" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">"가볍" → [doc1, doc3]</text>

  <rect x="536" y="180" width="268" height="32" fill="#1a1a2e" rx="4" stroke="#7ec8e3" stroke-width="1"/>
  <text x="670" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">"데이터베이스" → [doc1, doc2, doc4]</text>

  <rect x="536" y="220" width="268" height="32" fill="#1a1a2e" rx="4" stroke="#7ec8e3" stroke-width="1"/>
  <text x="670" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">"임베디드" → [doc1, doc7]</text>

  <text x="670" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">토큰 → 문서 ID + 위치 포스팅 리스트</text>
  <text x="670" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">세그먼트 B-Tree 구조로 저장</text>

  <line x1="480" y1="120" x2="518" y2="120" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrf)"/>

  <!-- Code block: FTS5 create and search -->
  <rect x="60" y="200" width="420" height="260" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">-- FTS5 테이블 생성</text>
  <text x="76" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">CREATE VIRTUAL TABLE</tspan><tspan fill="#ffffff"> articles</tspan></text>
  <text x="76" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">USING</tspan><tspan fill="#ffffff"> fts5(</tspan></text>
  <text x="76" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  title, body,</text>
  <text x="76" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  tokenize = <tspan fill="#ce9178">'unicode61'</tspan></text>
  <text x="76" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">);</text>
  <text x="76" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">-- 검색 (BM25 랭킹)</text>
  <text x="76" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">SELECT</tspan><tspan fill="#ffffff"> rowid, title,</tspan></text>
  <text x="76" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  bm25(articles) <tspan font-weight="600" fill="#7ec8e3">AS</tspan><tspan fill="#ffffff"> score</tspan></text>
  <text x="76" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">FROM</tspan><tspan fill="#ffffff"> articles</tspan></text>
  <text x="76" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">WHERE</tspan><tspan fill="#ffffff"> articles </tspan><tspan font-weight="600" fill="#7ec8e3">MATCH</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">'SQLite'</tspan></text>
  <text x="76" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">ORDER BY</tspan><tspan fill="#ffffff"> score;</tspan></text>
</svg>
