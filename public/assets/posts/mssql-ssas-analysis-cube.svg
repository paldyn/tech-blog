<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arrc" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrd" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SSAS 큐브 구조 — 스타 스키마와 계층</text>

  <!-- Fact Table -->
  <rect x="330" y="100" width="220" height="120" fill="#1a1a2e" rx="10" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">Fact: FactSales</text>
  <text x="440" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8" text-anchor="middle">SalesAmount (측정값)</text>
  <text x="440" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8" text-anchor="middle">Quantity · Cost</text>
  <text x="440" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8" text-anchor="middle">DateKey · ProductKey</text>
  <text x="440" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8" text-anchor="middle">CustomerKey · TerritoryKey</text>

  <!-- Dim: Date -->
  <rect x="60" y="80" width="180" height="110" fill="#1a2a1a" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="150" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Dim: DimDate</text>
  <text x="150" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">Year ▶ Quarter</text>
  <text x="150" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">▶ Month ▶ Day</text>
  <text x="150" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(계층 4단계)</text>
  <text x="150" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">TimeIntelligence</text>

  <!-- Dim: Product -->
  <rect x="60" y="230" width="180" height="90" fill="#1a2a1a" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="150" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Dim: DimProduct</text>
  <text x="150" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">Category ▶ Subcategory</text>
  <text x="150" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">▶ Product</text>
  <text x="150" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">색상 · 크기 · 무게</text>

  <!-- Dim: Customer -->
  <rect x="640" y="80" width="180" height="90" fill="#1a2a1a" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="730" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Dim: DimCustomer</text>
  <text x="730" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">Country ▶ State</text>
  <text x="730" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">▶ City ▶ Customer</text>
  <text x="730" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">세그먼트 · 인구통계</text>

  <!-- Dim: Territory -->
  <rect x="640" y="220" width="180" height="80" fill="#1a2a1a" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="730" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Dim: Territory</text>
  <text x="730" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">Region ▶ Country</text>
  <text x="730" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">▶ Territory</text>

  <!-- Arrows dim -> fact -->
  <line x1="240" y1="135" x2="328" y2="145" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrd)"/>
  <line x1="240" y1="275" x2="328" y2="185" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrd)"/>
  <line x1="638" y1="125" x2="552" y2="145" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrd)"/>
  <line x1="638" y1="260" x2="552" y2="185" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrd)"/>

  <!-- Code block: cube processing -->
  <rect x="60" y="360" width="760" height="100" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">-- SSAS 프로세싱 명령 (XMLA / TMSL)</text>
  <text x="76" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">ProcessFull</tspan><tspan fill="#ffffff">  -- 전체 재처리 (데이터 + 집계)</tspan></text>
  <text x="76" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">ProcessUpdate</tspan><tspan fill="#ffffff"> -- 증분 업데이트 (Tabular)</tspan></text>
  <text x="76" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">ProcessAdd</tspan><tspan fill="#ffffff">    -- 파티션에 새 데이터 추가</tspan></text>
</svg>
