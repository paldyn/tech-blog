<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">의미로 고르기 — 모음인가, 레코드인가</text>

  <text x="50" y="90" font-size="16" font-weight="600" fill="#e05555">list — 같은 것의 모음</text>
  <rect x="50" y="104" width="360" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="68" y="138" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">scores = [88, 92, 79, 95]</tspan></text>
  <text xml:space="preserve" x="68" y="164" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">scores.append(100)</tspan></text>
  <text xml:space="preserve" x="68" y="198" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#9aa4b8"># 개수도 순서도 바뀐다.</tspan></text>

  <text x="470" y="90" font-size="16" font-weight="600" fill="#55c555">tuple — 자리마다 다른 의미</text>
  <rect x="470" y="104" width="360" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="488" y="138" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">point = (37.5, 127.0)</tspan></text>
  <text xml:space="preserve" x="488" y="164" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#ffffff">lat, lng = point</tspan></text>
  <text xml:space="preserve" x="488" y="198" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#9aa4b8"># (위도, 경도) — 자리가 곧 뜻.</tspan></text>

  <text x="60" y="262" font-size="14" fill="#cccccc">원소를 하나 더 붙여도 말이 되면 list, 자리마다 역할이 정해져 있으면 tuple.</text>
  <text x="60" y="286" font-size="13" fill="#888">레코드가 더 커지고 이름이 필요해지면 NamedTuple 이나 dataclass 로 넘어간다.</text>
</svg>
