<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">힙 덤프: 캡처 → 분석</text>

  <defs>
    <marker id="hdArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="50" y="76" font-size="13" fill="#888">캡처 방법</text>
  <!-- capture chips -->
  <rect x="50" y="86" width="280" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="66" y="113" font-size="12.5" fill="#ffffff" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">jcmd &lt;pid&gt; GC.heap_dump</text>
  <rect x="50" y="146" width="280" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="66" y="173" font-size="12.5" fill="#ffffff" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">jmap -dump:live,file=a.hprof</text>
  <rect x="50" y="206" width="280" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="66" y="233" font-size="12" fill="#ffffff" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">+HeapDumpOnOutOfMemoryError</text>

  <!-- hprof file -->
  <rect x="400" y="124" width="150" height="88" rx="8" fill="#0f1626" stroke="#e0a055" stroke-width="1.5"/>
  <text x="475" y="162" font-size="15" font-weight="600" fill="#e0a055" text-anchor="middle">app.hprof</text>
  <text x="475" y="184" font-size="12" fill="#888" text-anchor="middle">힙 스냅샷</text>

  <!-- analysis tools -->
  <text x="620" y="76" font-size="13" fill="#888">분석 도구</text>
  <rect x="620" y="116" width="210" height="44" rx="6" fill="#14241a" stroke="#55c555" stroke-width="1.5"/>
  <text x="725" y="143" font-size="14" fill="#e8e8e8" text-anchor="middle">Eclipse MAT</text>
  <rect x="620" y="192" width="210" height="44" rx="6" fill="#14241a" stroke="#55c555" stroke-width="1.5"/>
  <text x="725" y="219" font-size="14" fill="#e8e8e8" text-anchor="middle">VisualVM / JMC</text>

  <!-- arrows capture -> hprof -->
  <line x1="330" y1="108" x2="398" y2="152" stroke="#7ec8e3" stroke-width="2" marker-end="url(#hdArr)"/>
  <line x1="330" y1="168" x2="398" y2="168" stroke="#7ec8e3" stroke-width="2" marker-end="url(#hdArr)"/>
  <line x1="330" y1="228" x2="398" y2="186" stroke="#7ec8e3" stroke-width="2" marker-end="url(#hdArr)"/>

  <!-- arrows hprof -> tools -->
  <line x1="550" y1="160" x2="618" y2="138" stroke="#55c555" stroke-width="2" marker-end="url(#hdArr)"/>
  <line x1="550" y1="176" x2="618" y2="214" stroke="#55c555" stroke-width="2" marker-end="url(#hdArr)"/>
</svg>
