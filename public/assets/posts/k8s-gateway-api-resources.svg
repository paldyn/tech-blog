<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-accent" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Gateway API 리소스 계층 구조</text>

  <!-- Role labels on left -->
  <text x="50" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" font-weight="600">인프라 관리자</text>
  <text x="50" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">Infrastructure Admin</text>

  <text x="50" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" font-weight="600">클러스터 운영자</text>
  <text x="50" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">Cluster Operator</text>

  <text x="50" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" font-weight="600">앱 개발자</text>
  <text x="50" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">Application Developer</text>

  <!-- Divider lines -->
  <line x1="168" y1="80" x2="168" y2="480" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- GatewayClass Box -->
  <rect x="200" y="86" width="480" height="70" rx="8" fill="#1a1235" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7777cc" text-anchor="middle">GatewayClass</text>
  <text x="440" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">spec.controllerName: gateway.nginx.org/nginx-gateway-controller</text>
  <text x="440" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">클러스터 범위(Cluster-scoped) · 컨트롤러 구현체 참조</text>

  <!-- Arrow GatewayClass to Gateway -->
  <line x1="440" y1="156" x2="440" y2="196" stroke="#7777cc" stroke-width="2"
        marker-end="url(#arr-accent)"/>

  <!-- Gateway Box -->
  <rect x="200" y="196" width="480" height="80" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">Gateway</text>
  <text x="440" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">spec.gatewayClassName: nginx · listeners: HTTP :80, HTTPS :443</text>
  <text x="440" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">네임스페이스 범위 · 실제 LB/프록시 인스턴스 프로비저닝</text>

  <!-- Arrow Gateway to Routes -->
  <line x1="300" y1="276" x2="240" y2="316" stroke="#7ec8e3" stroke-width="1.5"
        marker-end="url(#arr-blue)"/>
  <line x1="440" y1="276" x2="440" y2="316" stroke="#7ec8e3" stroke-width="1.5"
        marker-end="url(#arr-blue)"/>
  <line x1="580" y1="276" x2="640" y2="316" stroke="#7ec8e3" stroke-width="1.5"
        marker-end="url(#arr-blue)"/>

  <!-- HTTPRoute Box -->
  <rect x="180" y="316" width="170" height="72" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="265" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">HTTPRoute</text>
  <text x="265" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">경로/헤더 기반 라우팅</text>
  <text x="265" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">트래픽 분산 지원</text>

  <!-- TCPRoute Box -->
  <rect x="375" y="316" width="130" height="72" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">TCPRoute</text>
  <text x="440" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">L4 TCP 라우팅</text>
  <text x="440" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">포트 기반</text>

  <!-- TLSRoute Box -->
  <rect x="530" y="316" width="130" height="72" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="595" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">TLSRoute</text>
  <text x="595" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">TLS SNI 기반</text>
  <text x="595" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">패스스루 지원</text>

  <!-- Arrow Route to Service -->
  <line x1="265" y1="388" x2="265" y2="426" stroke="#55c555" stroke-width="1.5"
        marker-end="url(#arr-green)"/>
  <line x1="440" y1="388" x2="440" y2="426" stroke="#55c555" stroke-width="1.5"
        marker-end="url(#arr-green)"/>
  <line x1="595" y1="388" x2="595" y2="426" stroke="#55c555" stroke-width="1.5"
        marker-end="url(#arr-green)"/>

  <!-- Service boxes -->
  <rect x="185" y="426" width="160" height="50" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="265" y="449" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">Service A</text>
  <text x="265" y="466" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">frontend:80</text>

  <rect x="365" y="426" width="150" height="50" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="449" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">Service B</text>
  <text x="440" y="466" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">api:8080</text>

  <rect x="530" y="426" width="150" height="50" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="605" y="449" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">Service C</text>
  <text x="605" y="466" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">grpc:9090</text>

  <!-- Bottom note -->
  <text x="440" y="520" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">Gateway API는 인프라 관리자, 클러스터 운영자, 앱 개발자 역할을 명확하게 분리합니다</text>
</svg>
