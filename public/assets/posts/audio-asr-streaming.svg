<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrB" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">실시간 스트리밍 ASR 아키텍처</text>

  <!-- Microphone -->
  <rect x="30" y="90" width="100" height="60" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">🎤 마이크</text>
  <text x="80" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">연속 PCM 스트림</text>

  <line x1="130" y1="120" x2="158" y2="120" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrB)"/>

  <!-- Chunk Buffer -->
  <rect x="160" y="80" width="140" height="80" rx="8" fill="#0f1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="230" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">청크 버퍼</text>
  <text x="230" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">슬라이딩 윈도우</text>
  <text x="230" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">2~3초 + 0.5초 겹침</text>

  <line x1="300" y1="120" x2="328" y2="120" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- VAD -->
  <rect x="330" y="80" width="120" height="80" rx="8" fill="#0f2a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="390" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">VAD</text>
  <text x="390" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">음성 활동 감지</text>
  <text x="390" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">Silero VAD</text>

  <line x1="450" y1="120" x2="478" y2="120" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Whisper -->
  <rect x="480" y="70" width="180" height="100" rx="8" fill="#1a0a2e" stroke="#ce9178" stroke-width="2"/>
  <text x="570" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#ce9178" text-anchor="middle">Whisper</text>
  <text x="570" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">faster-whisper</text>
  <text x="570" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">CTranslate2 INT8</text>
  <text x="570" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">실시간 추론</text>

  <line x1="660" y1="120" x2="688" y2="120" stroke="#ce9178" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Output -->
  <rect x="690" y="80" width="160" height="80" rx="8" fill="#0f2a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="770" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">실시간 자막</text>
  <text x="770" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">partial 결과</text>
  <text x="770" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">→ final 확정</text>

  <!-- Latency info -->
  <rect x="30" y="200" width="820" height="130" rx="8" fill="#0d1117" stroke="#444" stroke-width="1"/>
  <text x="440" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">지연시간(Latency) 최적화 전략</text>

  <rect x="50" y="240" width="220" height="74" rx="6" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="160" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">청크 크기 튜닝</text>
  <text x="160" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">200ms: 지연 ↓, 정확도 ↓</text>
  <text x="160" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">2~3초: 지연 ↑, 정확도 ↑</text>
  <text x="160" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#666" text-anchor="middle">실용: 1~2초 + 500ms 겹침</text>

  <rect x="285" y="240" width="220" height="74" rx="6" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="395" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">모델 경량화</text>
  <text x="395" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">INT8 양자화 (2× 빠름)</text>
  <text x="395" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">whisper-turbo 권장</text>
  <text x="395" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#666" text-anchor="middle">CPU로도 실시간 가능</text>

  <rect x="520" y="240" width="220" height="74" rx="6" fill="#111" stroke="#ce9178" stroke-width="1"/>
  <text x="630" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ce9178" text-anchor="middle">병렬 처리</text>
  <text x="630" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">asyncio 비동기 큐</text>
  <text x="630" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">별도 스레드에서 추론</text>
  <text x="630" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#666" text-anchor="middle">캡처 ≠ 추론 블로킹</text>
</svg>
