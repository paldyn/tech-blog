<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 360" style="background:#0a0a0a;border-radius:12px;">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">tbPSM 저장 객체 유형</text>

  <!-- PROCEDURE -->
  <rect x="60" y="68" width="170" height="100" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="145" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">PROCEDURE</text>
  <text x="145" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">IN/OUT 파라미터</text>
  <text x="145" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">반환값 없음</text>
  <text x="145" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">EXEC 또는 CALL</text>

  <!-- FUNCTION -->
  <rect x="250" y="68" width="170" height="100" rx="8" fill="#0d1a2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="335" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">FUNCTION</text>
  <text x="335" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">RETURN 타입 필수</text>
  <text x="335" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SQL 내 호출 가능</text>
  <text x="335" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">SELECT f() FROM dual</text>

  <!-- PACKAGE -->
  <rect x="440" y="68" width="170" height="100" rx="8" fill="#0d1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="525" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">PACKAGE</text>
  <text x="525" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">명세 + 본체 분리</text>
  <text x="525" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">전역 변수·커서 포함</text>
  <text x="525" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">pkg.proc() 호출</text>

  <!-- TRIGGER -->
  <rect x="630" y="68" width="190" height="100" rx="8" fill="#0d1a2e" stroke="#e05555" stroke-width="1.5"/>
  <text x="725" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">TRIGGER</text>
  <text x="725" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">BEFORE/AFTER DML</text>
  <text x="725" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">:NEW / :OLD 참조</text>
  <text x="725" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">자동 실행</text>

  <!-- Cursor types -->
  <rect x="60" y="196" width="760" height="130" rx="8" fill="#0d0d0d" stroke="#333" stroke-width="1"/>
  <text x="440" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">커서(Cursor) 유형</text>

  <rect x="80" y="234" width="200" height="72" rx="6" fill="#111133" stroke="#7777cc" stroke-width="1"/>
  <text x="180" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">암묵적 커서</text>
  <text x="180" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SELECT INTO / DML</text>
  <text x="180" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SQL%ROWCOUNT 속성</text>

  <rect x="300" y="234" width="200" height="72" rx="6" fill="#111133" stroke="#55c555" stroke-width="1"/>
  <text x="400" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">명시적 커서</text>
  <text x="400" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">OPEN / FETCH / CLOSE</text>
  <text x="400" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">다중 행 처리</text>

  <rect x="520" y="234" width="280" height="72" rx="6" fill="#111133" stroke="#7ec8e3" stroke-width="1"/>
  <text x="660" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">커서 FOR 루프</text>
  <text x="660" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">FOR rec IN (SELECT ...) LOOP</text>
  <text x="660" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">OPEN/FETCH/CLOSE 자동 처리</text>
</svg>
