<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-white" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#aaaaaa"/>
    </marker>
  </defs>

  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">MockMvc 요청 처리 흐름</text>

  <!-- 흐름 박스들 -->
  <!-- Test Code -->
  <rect x="60" y="76" width="130" height="50" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="125" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Test Code</text>
  <text x="125" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">mockMvc.perform()</text>

  <!-- 화살표 -->
  <line x1="190" y1="101" x2="228" y2="101" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- MockMvc -->
  <rect x="228" y="76" width="130" height="50" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="293" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">MockMvc</text>
  <text x="293" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">요청 빌더</text>

  <line x1="358" y1="101" x2="396" y2="101" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- DispatcherServlet -->
  <rect x="396" y="76" width="130" height="50" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="461" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Dispatcher</text>
  <text x="461" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Servlet</text>

  <line x1="526" y1="101" x2="564" y2="101" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Controller -->
  <rect x="564" y="76" width="130" height="50" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="629" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Controller</text>
  <text x="629" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">실제 Spring 빈</text>

  <!-- 응답 반환 화살표 -->
  <line x1="564" y1="140" x2="190" y2="140" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-white)"/>
  <text x="380" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">응답 (MockHttpServletResponse)</text>

  <!-- ResultActions 섹션 -->
  <text x="60" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">ResultActions 검증 메서드</text>

  <!-- 왼쪽 컬럼: andExpect -->
  <rect x="60" y="212" width="370" height="130" rx="8" fill="#0d1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">andExpect — 상태·헤더·바디 검증</text>
  <text x="80" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa">.andExpect(status().isOk())</text>
  <text x="80" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa">.andExpect(header().string("Content-Type", ...))</text>
  <text x="80" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa">.andExpect(jsonPath("$.name").value("홍길동"))</text>
  <text x="80" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa">.andExpect(content().contentType(APPLICATION_JSON))</text>
  <text x="80" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa">.andExpect(view().name("user/list"))</text>

  <!-- 오른쪽 컬럼: andDo / andReturn -->
  <rect x="450" y="212" width="370" height="130" rx="8" fill="#0d1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="470" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">andDo·andReturn — 부가 처리</text>
  <text x="470" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa">.andDo(print())  // 요청·응답 콘솔 출력</text>
  <text x="470" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa">.andDo(document("user-get", ...))  // RestDocs</text>
  <text x="470" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa">MvcResult result = .andReturn();</text>
  <text x="470" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa">String body = result.getResponse()</text>
  <text x="470" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa">                     .getContentAsString();</text>

  <!-- jsonPath 섹션 -->
  <text x="60" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">자주 쓰는 jsonPath 패턴</text>

  <rect x="60" y="388" width="760" height="106" rx="8" fill="#0d1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa">$.name              → 루트 필드</text>
  <text x="80" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa">$.address.city      → 중첩 필드</text>
  <text x="80" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa">$.items[0].price    → 배열 첫 번째 요소</text>
  <text x="440" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa">$.length()          → 배열 길이</text>
  <text x="440" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa">$[?(@.active==true)]→ 필터 표현식</text>
  <text x="440" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa">$.items[*].name     → 배열 전체 순회</text>
  <text x="80" y="482" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">jsonPath().value() / .exists() / .doesNotExist() / .isArray() / .isEmpty()</text>
</svg>
