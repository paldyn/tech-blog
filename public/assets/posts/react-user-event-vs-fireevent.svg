<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" style="background:#0a0a0a;border-radius:12px;">
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">fireEvent vs user-event</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">클릭 한 번에 일어나는 일의 차이</text>

  <!-- Left: fireEvent -->
  <rect x="60" y="100" width="360" height="290" rx="10" fill="#1a1a00" stroke="#e8c800" stroke-width="2"/>
  <text x="240" y="130" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" font-weight="600" fill="#e8c800">fireEvent.click(button)</text>

  <rect x="90" y="152" width="300" height="40" rx="6" fill="#0a0a0a" stroke="#5a5a2a" stroke-width="1"/>
  <text x="240" y="177" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">click 이벤트 1개만 디스패치</text>

  <text x="100" y="232" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">· 포커스가 이동하지 않는다</text>
  <text x="100" y="262" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">· hover/pointer 이벤트가 없다</text>
  <text x="100" y="292" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">· disabled 요소에도 발생시킬 수 있다</text>

  <text x="240" y="348" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8c800">브라우저에선 불가능한 동작이 통과할 수 있다</text>

  <!-- Right: user-event -->
  <rect x="460" y="100" width="360" height="290" rx="10" fill="#0d2010" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="130" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" font-weight="600" fill="#55c555">await user.click(button)</text>

  <rect x="490" y="150" width="300" height="32" rx="6" fill="#0a0a0a" stroke="#2a5a2a" stroke-width="1"/>
  <text x="640" y="171" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">pointerover / pointerenter</text>

  <rect x="490" y="190" width="300" height="32" rx="6" fill="#0a0a0a" stroke="#2a5a2a" stroke-width="1"/>
  <text x="640" y="211" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">pointerdown / mousedown</text>

  <rect x="490" y="230" width="300" height="32" rx="6" fill="#0a0a0a" stroke="#2a5a2a" stroke-width="1"/>
  <text x="640" y="251" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#7ec8e3">focus</text>

  <rect x="490" y="270" width="300" height="32" rx="6" fill="#0a0a0a" stroke="#2a5a2a" stroke-width="1"/>
  <text x="640" y="291" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">pointerup / mouseup</text>

  <rect x="490" y="310" width="300" height="32" rx="6" fill="#0a0a0a" stroke="#2a5a2a" stroke-width="1"/>
  <text x="640" y="331" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#55c555">click</text>

  <text x="640" y="372" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">disabled면 아무 이벤트도 발생하지 않는다</text>

  <text x="440" y="430" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">user-event는 브라우저가 실제로 발생시키는 이벤트 시퀀스를 순서대로 재현한다</text>
</svg>
