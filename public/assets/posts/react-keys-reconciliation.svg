<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
    <marker id="arrr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">key의 역할 — 리스트 재조정</text>

  <!-- Left: Without key -->
  <rect x="60" y="56" width="360" height="280" rx="10" fill="#2a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="80" text-anchor="middle" font-size="15" font-weight="600" fill="#e05555">❌ key 없음 (인덱스 기반)</text>

  <!-- Before state -->
  <text x="240" y="108" text-anchor="middle" font-size="12" fill="#888">삭제 전</text>
  <rect x="76" y="116" width="148" height="34" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="150" y="138" text-anchor="middle" font-size="13" fill="#ffffff">index=0: 사과</text>
  <rect x="232" y="116" width="148" height="34" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="306" y="138" text-anchor="middle" font-size="13" fill="#ffffff">index=1: 바나나</text>

  <text x="240" y="172" text-anchor="middle" font-size="11" fill="#888">사과 삭제 후</text>
  <rect x="76" y="180" width="148" height="34" rx="6" fill="#3a1010" stroke="#e05555" stroke-width="1"/>
  <text x="150" y="202" text-anchor="middle" font-size="13" fill="#e05555">index=0: 바나나</text>
  <rect x="232" y="180" width="148" height="34" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="306" y="202" text-anchor="middle" font-size="13" fill="#888">(없음)</text>

  <text x="240" y="236" text-anchor="middle" font-size="12" fill="#e05555">React 판단:</text>
  <text x="240" y="256" text-anchor="middle" font-size="12" fill="#e05555">index=0 항목이 바뀜 → 업데이트</text>
  <text x="240" y="276" text-anchor="middle" font-size="12" fill="#e05555">index=1 항목이 사라짐 → 삭제</text>
  <text x="240" y="300" text-anchor="middle" font-size="12" fill="#e05555">→ 입력값, 포커스, 애니메이션 등</text>
  <text x="240" y="318" text-anchor="middle" font-size="12" fill="#e05555">   내부 상태가 엉뚱한 항목에 붙음</text>

  <!-- Right: With key -->
  <rect x="460" y="56" width="360" height="280" rx="10" fill="#0f2a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="80" text-anchor="middle" font-size="15" font-weight="600" fill="#55c555">✅ key 있음 (고유 ID)</text>

  <!-- Before state -->
  <text x="640" y="108" text-anchor="middle" font-size="12" fill="#888">삭제 전</text>
  <rect x="476" y="116" width="148" height="34" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="550" y="138" text-anchor="middle" font-size="13" fill="#ffffff">key=1: 사과</text>
  <rect x="632" y="116" width="148" height="34" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="706" y="138" text-anchor="middle" font-size="13" fill="#ffffff">key=2: 바나나</text>

  <text x="640" y="172" text-anchor="middle" font-size="11" fill="#888">사과 삭제 후</text>
  <rect x="632" y="180" width="148" height="34" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="706" y="202" text-anchor="middle" font-size="13" fill="#ffffff">key=2: 바나나</text>

  <text x="640" y="236" text-anchor="middle" font-size="12" fill="#55c555">React 판단:</text>
  <text x="640" y="256" text-anchor="middle" font-size="12" fill="#55c555">key=1 항목이 사라짐 → 삭제</text>
  <text x="640" y="276" text-anchor="middle" font-size="12" fill="#55c555">key=2 항목은 그대로 → 이동만</text>
  <text x="640" y="300" text-anchor="middle" font-size="12" fill="#55c555">→ 바나나의 내부 상태 보존</text>
  <text x="640" y="318" text-anchor="middle" font-size="12" fill="#55c555">   정확하고 효율적인 재조정</text>

  <!-- Bottom conclusion -->
  <rect x="60" y="360" width="760" height="80" rx="8" fill="#0f1629" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="388" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">key = React가 각 리스트 항목의 신원(identity)을 추적하는 수단</text>
  <text x="440" y="412" text-anchor="middle" font-size="13" fill="#888">key가 같으면 같은 컴포넌트 인스턴스를 재사용 / key가 다르면 이전 것을 제거하고 새로 마운트</text>
</svg>
