<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Husky v8 vs v9 설정 비교</text>

  <!-- v8 header -->
  <rect x="60" y="68" width="360" height="40" rx="6" fill="#1a1a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="93" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc">Husky v8 (이전)</text>

  <!-- v9 header -->
  <rect x="460" y="68" width="360" height="40" rx="6" fill="#1a1a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="93" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">Husky v9 (현재)</text>

  <!-- v8 code -->
  <rect x="60" y="116" width="360" height="220" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># package.json</text>
  <text xml:space="preserve" x="80" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">{</text>
  <text xml:space="preserve" x="80" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">  "prepare"</text><text xml:space="preserve" x="182" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">: </text><text xml:space="preserve" x="200" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">"husky install"</text><text xml:space="preserve" x="316" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">,</text>
  <text xml:space="preserve" x="80" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">  "husky"</text><text xml:space="preserve" x="163" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">: {}</text>
  <text xml:space="preserve" x="80" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">}</text>
  <text xml:space="preserve" x="80" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 훅 추가</text>
  <text xml:space="preserve" x="80" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">npx husky add</text>
  <text xml:space="preserve" x="80" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  .husky/pre-commit</text>
  <text xml:space="preserve" x="80" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">  "npm run lint"</text>

  <!-- v9 code -->
  <rect x="460" y="116" width="360" height="220" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="480" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 설치 &amp; 초기화</text>
  <text xml:space="preserve" x="480" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">npm install --save-dev husky</text>
  <text xml:space="preserve" x="480" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">npx husky init</text>
  <text xml:space="preserve" x="480" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 훅 파일 직접 편집</text>
  <text xml:space="preserve" x="480" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># .husky/pre-commit</text>
  <text xml:space="preserve" x="480" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">npm run lint</text>
  <text xml:space="preserve" x="480" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># package.json</text>
  <text xml:space="preserve" x="480" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">"prepare": </text><text xml:space="preserve" x="584" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">"husky"</text>

  <!-- diff note -->
  <rect x="60" y="350" width="760" height="20" rx="4" fill="none"/>
  <text x="440" y="365" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">v9: husky add 명령어 삭제됨 — 파일을 직접 생성·편집하는 방식으로 통일</text>
</svg>
