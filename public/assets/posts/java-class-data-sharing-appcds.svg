<svg xmlns="http://www.w3.org/2000/svg" width="880" height="280" viewBox="0 0 880 280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="280" rx="12" fill="#0a0a0a"/>
  <text x="40" y="48" font-size="22" font-weight="700" fill="#e8e8e8">AppCDS 생성 흐름</text>

  <defs>
    <marker id="ac-arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="40" y="92" width="240" height="86" rx="8" fill="#101010" stroke="#7777cc" stroke-width="1"/>
  <text x="160" y="124" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">1. 클래스 목록 기록</text>
  <text x="160" y="148" font-size="13" fill="#9aa4b8" text-anchor="middle">앱을 한 번 실행하며</text>
  <text x="160" y="168" font-size="13" fill="#9aa4b8" text-anchor="middle">로드된 클래스 수집</text>

  <rect x="320" y="92" width="240" height="86" rx="8" fill="#101010" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="124" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">2. 아카이브 덤프</text>
  <text x="440" y="148" font-size="13" fill="#9aa4b8" text-anchor="middle">목록을 파싱·검증해</text>
  <text x="440" y="168" font-size="13" fill="#9aa4b8" text-anchor="middle">.jsa 파일로 저장</text>

  <rect x="600" y="92" width="240" height="86" rx="8" fill="#101010" stroke="#55c555" stroke-width="1"/>
  <text x="720" y="124" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">3. 아카이브로 기동</text>
  <text x="720" y="148" font-size="13" fill="#9aa4b8" text-anchor="middle">매 실행마다 .jsa를</text>
  <text x="720" y="168" font-size="13" fill="#9aa4b8" text-anchor="middle">mmap → 기동 단축</text>

  <line x1="280" y1="135" x2="318" y2="135" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ac-arr)"/>
  <line x1="560" y1="135" x2="598" y2="135" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ac-arr)"/>

  <text x="40" y="230" font-size="13" fill="#9aa4b8">JDK 19+의 -XX:+AutoCreateSharedArchive 는 1·2단계를 자동화해 한 줄로 끝낼 수 있습니다.</text>
  <text x="40" y="256" font-size="13" fill="#9aa4b8">애플리케이션 클래스까지 포함(AppCDS)하면 기본 CDS보다 훨씬 큰 기동 단축 효과를 얻습니다.</text>
</svg>
