<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-v" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">LlamaIndex 핵심 아키텍처</text>
  <text x="440" y="66" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">데이터 수집 → 인덱싱 → 쿼리 → 응답 전 과정의 데이터 중심 파이프라인</text>

  <!-- Data Sources -->
  <rect x="40" y="100" width="140" height="260" rx="8" fill="#0f0f1a" stroke="#3a3a6e" stroke-width="1.5"/>
  <text x="110" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Data Sources</text>
  <rect x="56" y="134" width="108" height="30" rx="4" fill="#1a1a2e" stroke="#555" stroke-width="1"/>
  <text x="110" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">PDF / Word</text>
  <rect x="56" y="172" width="108" height="30" rx="4" fill="#1a1a2e" stroke="#555" stroke-width="1"/>
  <text x="110" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">웹 / HTML</text>
  <rect x="56" y="210" width="108" height="30" rx="4" fill="#1a1a2e" stroke="#555" stroke-width="1"/>
  <text x="110" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Database</text>
  <rect x="56" y="248" width="108" height="30" rx="4" fill="#1a1a2e" stroke="#555" stroke-width="1"/>
  <text x="110" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">API / JSON</text>
  <rect x="56" y="286" width="108" height="30" rx="4" fill="#1a1a2e" stroke="#555" stroke-width="1"/>
  <text x="110" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">GitHub / Notion</text>

  <!-- Arrow to Loader -->
  <line x1="180" y1="230" x2="218" y2="230" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-v)"/>

  <!-- Document Loaders -->
  <rect x="220" y="180" width="130" height="100" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="285" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Readers</text>
  <text x="285" y="224" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">SimpleDirectory</text>
  <text x="285" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Reader</text>
  <text x="285" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">150+ 종류</text>

  <!-- Arrow to Node Parser -->
  <line x1="350" y1="230" x2="388" y2="230" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Node Parser -->
  <rect x="390" y="180" width="130" height="100" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="455" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Node Parser</text>
  <text x="455" y="224" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">청크 분할</text>
  <text x="455" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">메타데이터 추가</text>
  <text x="455" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Node 생성</text>

  <!-- Arrow to Index -->
  <line x1="520" y1="230" x2="558" y2="230" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Index -->
  <rect x="560" y="160" width="140" height="140" rx="8" fill="#1a0f0a" stroke="#e0a855" stroke-width="1.5"/>
  <text x="630" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a855">Index</text>
  <rect x="574" y="200" width="112" height="26" rx="4" fill="#2a1a0a" stroke="#e0a855" stroke-width="1"/>
  <text x="630" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">VectorStoreIndex</text>
  <rect x="574" y="232" width="112" height="26" rx="4" fill="#2a1a0a" stroke="#e0a855" stroke-width="1"/>
  <text x="630" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">SummaryIndex</text>
  <rect x="574" y="264" width="112" height="26" rx="4" fill="#2a1a0a" stroke="#e0a855" stroke-width="1"/>
  <text x="630" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">KnowledgeGraph</text>

  <!-- Arrow to Query Engine -->
  <line x1="700" y1="230" x2="738" y2="230" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- Query Engine -->
  <rect x="740" y="186" width="100" height="88" rx="8" fill="#0f1f0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="790" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Query</text>
  <text x="790" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Engine</text>
  <text x="790" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">검색+합성</text>
  <text x="790" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">응답 생성</text>

  <!-- User query arrow down -->
  <line x1="790" y1="380" x2="790" y2="278" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="790" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">사용자 쿼리</text>

  <!-- Storage Layer -->
  <rect x="40" y="400" width="720" height="60" rx="8" fill="#0f0f0f" stroke="#333" stroke-width="1.5"/>
  <text x="400" y="424" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">Storage Layer</text>
  <text x="200" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">DocStore (원문)</text>
  <text x="400" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">IndexStore (구조)</text>
  <text x="600" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">VectorStore (임베딩)</text>
</svg>
