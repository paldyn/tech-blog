<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">엑셀 내보내기·가져오기 흐름</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">Grid.exportExcel / FileUpload → Dataset.loadXML</text>

  <!-- Export side -->
  <rect x="60" y="96" width="340" height="320" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="230" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">엑셀 내보내기 (Export)</text>

  <rect x="80" y="132" width="300" height="34" rx="4" fill="#0a2010"/>
  <text x="230" y="153" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">① Grid 또는 Dataset 선택</text>

  <line x1="230" y1="166" x2="230" y2="186" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="224,186 230,198 236,186" fill="#55c555"/>

  <rect x="80" y="198" width="300" height="34" rx="4" fill="#0a2010"/>
  <text x="230" y="219" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">② exportExcel() 호출</text>

  <line x1="230" y1="232" x2="230" y2="252" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="224,252 230,264 236,252" fill="#55c555"/>

  <rect x="80" y="264" width="300" height="34" rx="4" fill="#0a2010"/>
  <text x="230" y="285" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">③ 브라우저 파일 다운로드</text>

  <line x1="230" y1="298" x2="230" y2="318" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="224,318 230,330 236,318" fill="#55c555"/>

  <rect x="80" y="330" width="300" height="62" rx="4" fill="#0a2010"/>
  <text x="230" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Grid 컬럼 헤더 포함</text>
  <text x="230" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">숨김 컬럼 제외 옵션</text>
  <text x="230" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">서버 없이 클라이언트에서 직접</text>

  <!-- Import side -->
  <rect x="480" y="96" width="340" height="320" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="650" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">엑셀 가져오기 (Import)</text>

  <rect x="500" y="132" width="300" height="34" rx="4" fill="#0a1a2a"/>
  <text x="650" y="153" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">① FileUpload로 .xlsx 선택</text>

  <line x1="650" y1="166" x2="650" y2="186" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="644,186 650,198 656,186" fill="#7ec8e3"/>

  <rect x="500" y="198" width="300" height="34" rx="4" fill="#0a1a2a"/>
  <text x="650" y="219" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">② 서버 파싱 → XML/JSON 변환</text>

  <line x1="650" y1="232" x2="650" y2="252" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="644,252 650,264 656,252" fill="#7ec8e3"/>

  <rect x="500" y="264" width="300" height="34" rx="4" fill="#0a1a2a"/>
  <text x="650" y="285" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">③ Dataset.loadXML() 또는 트랜잭션</text>

  <line x1="650" y1="298" x2="650" y2="318" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="644,318 650,330 656,318" fill="#7ec8e3"/>

  <rect x="500" y="330" width="300" height="62" rx="4" fill="#0a1a2a"/>
  <text x="650" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Grid 표시 → 검증</text>
  <text x="650" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ 저장 트랜잭션</text>
  <text x="650" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">서버 파싱 필수</text>
</svg>
