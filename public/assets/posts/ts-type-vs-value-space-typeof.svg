<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">typeof의 두 가지 역할</text>

  <!-- Left: JS typeof (value) -->
  <rect x="60" y="70" width="360" height="260" rx="8" fill="#1a1a0a" stroke="#e8c840" stroke-width="1.5"/>
  <text x="240" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8c840" text-anchor="middle">JS typeof — 값 공간</text>
  <text x="240" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">런타임에 타입 이름 문자열 반환</text>

  <rect x="76" y="130" width="328" height="180" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="154" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// 런타임 연산</text>
  <text x="92" y="174" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">const</tspan> x = <tspan fill="#b5cea8">42</tspan>;</text>
  <text x="92" y="194" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">if</tspan> (<tspan fill="#7ec8e3" font-weight="600">typeof</tspan> x === <tspan fill="#ce9178">'number'</tspan>) {</text>
  <text x="92" y="214" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  <tspan fill="#9aa4b8">// x는 여기서 number</tspan></text>
  <text x="92" y="234" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  console.log(x.toFixed(<tspan fill="#b5cea8">2</tspan>));</text>
  <text x="92" y="254" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">}</text>
  <text x="92" y="274" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// "string"|"number"|"boolean"...</text>

  <!-- Right: TS typeof (type) -->
  <rect x="460" y="70" width="360" height="260" rx="8" fill="#0a1a2a" stroke="#3178c6" stroke-width="1.5"/>
  <text x="640" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">TS typeof — 타입 공간</text>
  <text x="640" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">컴파일 타임에 변수 타입 추출</text>

  <rect x="476" y="130" width="328" height="180" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="154" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// 타입 연산 (컴파일 타임)</text>
  <text x="492" y="174" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">const</tspan> config = { host: <tspan fill="#ce9178">"localhost"</tspan>, port: <tspan fill="#b5cea8">3000</tspan> };</text>
  <text x="492" y="194" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">type</tspan> Config = <tspan fill="#7ec8e3" font-weight="600">typeof</tspan> config;</text>
  <text x="492" y="214" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// Config = { host: string; port: number }</text>
  <text x="492" y="240" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">function</tspan> connect(cfg: <tspan fill="#7ec8e3" font-weight="600">typeof</tspan> config) {}</text>
  <text x="492" y="260" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// 타입으로만 사용 — JS 출력 없음</text>
  <text x="492" y="280" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// 값 공간에서는 여전히 JS typeof</text>

  <text x="440" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">typeof가 타입 위치(: 뒤)에 있으면 TS 연산, 값 위치(if문 등)에 있으면 JS 연산</text>
</svg>
