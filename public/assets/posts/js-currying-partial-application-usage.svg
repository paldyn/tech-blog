<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">커링 실전 활용 패턴</text>
  <text x="440" y="70" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">Practical Currying Patterns</text>

  <!-- Left: Generic curry -->
  <rect x="60" y="90" width="360" height="220" fill="#111" rx="10" stroke="#1e2433" stroke-width="1"/>
  <text x="240" y="112" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" text-anchor="middle">범용 curry 헬퍼</text>

  <rect x="76" y="122" width="328" height="168" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="92" y="142" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">const</tspan> curry = (fn) =&gt; {</text>
  <text x="92" y="160" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">const</tspan> arity = fn.length;</text>
  <text x="92" y="178" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">return function</tspan> curried(...args) {</text>
  <text x="92" y="196" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    <tspan fill="#7ec8e3">if</tspan> (args.length &gt;= arity)</text>
  <text x="92" y="214" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">      <tspan fill="#7ec8e3">return</tspan> fn(...args);</text>
  <text x="92" y="232" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    <tspan fill="#7ec8e3">return</tspan> (...more) =&gt;</text>
  <text x="92" y="250" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">      curried(...args, ...more);</text>
  <text x="92" y="268" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  };</text>
  <text x="92" y="286" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">};</text>

  <!-- Right: Real use case -->
  <rect x="460" y="90" width="360" height="220" fill="#111" rx="10" stroke="#1e2433" stroke-width="1"/>
  <text x="640" y="112" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" text-anchor="middle">실용 예: 이벤트 핸들러</text>

  <rect x="476" y="122" width="328" height="168" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="492" y="142" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">const</tspan> log = curry(</text>
  <text x="492" y="160" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  (level, tag, msg) =&gt;</text>
  <text x="492" y="178" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    console.log(</text>
  <text x="492" y="196" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">      <tspan fill="#ce9178">`[</tspan><tspan fill="#e8e8e8">${level}</tspan><tspan fill="#ce9178">:</tspan><tspan fill="#e8e8e8">${tag}</tspan><tspan fill="#ce9178">]`</tspan>, msg)</text>
  <text x="492" y="214" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">);</text>
  <text x="492" y="236" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">// 레벨 고정</text>
  <text x="492" y="254" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">const</tspan> warn = log(<tspan fill="#ce9178">'WARN'</tspan>);</text>
  <text x="492" y="272" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">const</tspan> warnAuth = warn(<tspan fill="#ce9178">'AUTH'</tspan>);</text>
  <text x="492" y="290" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">warnAuth(<tspan fill="#ce9178">'토큰 만료'</tspan>);</text>

  <!-- Pipeline example -->
  <rect x="60" y="330" width="760" height="110" fill="#0d0d0d" rx="10" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="352" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" text-anchor="middle">배열 파이프라인에서의 커링</text>

  <rect x="76" y="362" width="727" height="64" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="92" y="382" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">const</tspan> gt = curry((min, n) =&gt; n &gt; min);</text>
  <text x="92" y="400" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">const</tspan> mul = curry((factor, n) =&gt; n * factor);</text>
  <text x="92" y="418" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">[<tspan fill="#b5cea8">1</tspan>,<tspan fill="#b5cea8">5</tspan>,<tspan fill="#b5cea8">3</tspan>,<tspan fill="#b5cea8">8</tspan>].filter(gt(<tspan fill="#b5cea8">3</tspan>)).map(mul(<tspan fill="#b5cea8">10</tspan>)); <tspan fill="#6a8aa0">// [50, 80]</tspan></text>

  <!-- Footer -->
  <text x="440" y="462" fill="#444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">PALDYN · JavaScript 완전 정복</text>
</svg>
