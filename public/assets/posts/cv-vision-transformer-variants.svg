<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ViT 계열 모델 비교</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">원본 ViT의 한계를 극복한 후속 아키텍처들</text>

  <!-- Column Headers -->
  <rect x="40" y="88" width="130" height="36" rx="6" fill="#1e1e2e" stroke="#444" stroke-width="1"/>
  <text x="105" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">모델</text>

  <rect x="174" y="88" width="90" height="36" rx="6" fill="#1e1e2e" stroke="#444" stroke-width="1"/>
  <text x="219" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">핵심 아이디어</text>

  <rect x="268" y="88" width="180" height="36" rx="6" fill="#1e1e2e" stroke="#444" stroke-width="1"/>
  <text x="358" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">장점</text>

  <rect x="452" y="88" width="180" height="36" rx="6" fill="#1e1e2e" stroke="#444" stroke-width="1"/>
  <text x="542" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">단점/제약</text>

  <rect x="636" y="88" width="204" height="36" rx="6" fill="#1e1e2e" stroke="#444" stroke-width="1"/>
  <text x="738" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">적합 태스크</text>

  <!-- DeiT -->
  <rect x="40" y="128" width="130" height="50" rx="4" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="105" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">DeiT</text>
  <text x="105" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Data-Efficient</text>

  <rect x="174" y="128" width="90" height="50" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="219" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">증류 토큰</text>
  <text x="219" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">지식 증류</text>

  <rect x="268" y="128" width="180" height="50" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="358" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">ImageNet만으로 학습 가능</text>
  <text x="358" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">CNN 증류로 성능 향상</text>

  <rect x="452" y="128" width="180" height="50" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="542" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">교사 모델 필요</text>

  <rect x="636" y="128" width="204" height="50" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="738" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">중소규모 데이터 분류</text>

  <!-- Swin Transformer -->
  <rect x="40" y="182" width="130" height="50" rx="4" fill="#0f1a2e" stroke="#55c555" stroke-width="1"/>
  <text x="105" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Swin Transformer</text>
  <text x="105" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">계층형 ViT</text>

  <rect x="174" y="182" width="90" height="50" rx="4" fill="#0f1a2e" stroke="#333" stroke-width="1"/>
  <text x="219" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">이동 윈도우</text>
  <text x="219" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">어텐션</text>

  <rect x="268" y="182" width="180" height="50" rx="4" fill="#0f1a2e" stroke="#333" stroke-width="1"/>
  <text x="358" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">선형 복잡도 O(N)</text>
  <text x="358" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">계층적 특징맵 지원</text>

  <rect x="452" y="182" width="180" height="50" rx="4" fill="#0f1a2e" stroke="#333" stroke-width="1"/>
  <text x="542" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">이동 윈도우 구현 복잡</text>

  <rect x="636" y="182" width="204" height="50" rx="4" fill="#0f1a2e" stroke="#333" stroke-width="1"/>
  <text x="738" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">객체 탐지·분할</text>
  <text x="738" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">(고해상도 적합)</text>

  <!-- BEiT -->
  <rect x="40" y="236" width="130" height="50" rx="4" fill="#111" stroke="#ce9178" stroke-width="1"/>
  <text x="105" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
