  <text x="105" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">BERT for ViT</text>

  <rect x="174" y="236" width="90" height="50" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="219" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">마스킹 패치</text>
  <text x="219" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">복원 학습</text>

  <rect x="268" y="236" width="180" height="50" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="358" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">레이블 없이 사전학습</text>
  <text x="358" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">자기지도 학습</text>

  <rect x="452" y="236" width="180" height="50" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="542" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">dVAE tokenizer 필요</text>
  <text x="542" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">높은 사전학습 비용</text>

  <rect x="636" y="236" width="204" height="50" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="738" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">비지도 표현 학습</text>

  <!-- MAE -->
  <rect x="40" y="290" width="130" height="50" rx="4" fill="#0f1a2e" stroke="#b5cea8" stroke-width="1"/>
  <text x="105" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#b5cea8" text-anchor="middle">MAE</text>
  <text x="105" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Masked Autoencoder</text>

  <rect x="174" y="290" width="90" height="50" rx="4" fill="#0f1a2e" stroke="#333" stroke-width="1"/>
  <text x="219" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">75% 패치</text>
  <text x="219" y="329" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">마스킹 복원</text>

  <rect x="268" y="290" width="180" height="50" rx="4" fill="#0f1a2e" stroke="#333" stroke-width="1"/>
  <text x="358" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">3× 빠른 사전학습</text>
  <text x="358" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">강력한 표현 학습</text>

  <rect x="452" y="290" width="180" height="50" rx="4" fill="#0f1a2e" stroke="#333" stroke-width="1"/>
  <text x="542" y="319" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">파인튜닝 필요</text>

  <rect x="636" y="290" width="204" height="50" rx="4" fill="#0f1a2e" stroke="#333" stroke-width="1"/>
  <text x="738" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">대규모 비지도 학습</text>
  <text x="738" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">+ 파인튜닝</text>

  <!-- Bottom note -->
  <text x="440" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">원본 ViT의 문제: 대규모 사전학습 데이터 필요 + 이차 복잡도 O(N²) + 밀집 어텐션만 지원</text>
  <text x="440" y="395" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Swin은 탐지·분할 백본으로, MAE/BEiT는 자기지도 사전학습 방식으로 각각 한계를 극복</text>
</svg>
