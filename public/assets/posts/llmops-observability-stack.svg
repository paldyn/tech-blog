<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="obs-arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">LLM 관측성(Observability) 스택</text>

  <!-- LLM App -->
  <rect x="340" y="70" width="200" height="54" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">LLM 애플리케이션</text>
  <text x="440" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">SDK 계측 코드 삽입</text>

  <line x1="440" y1="124" x2="440" y2="148" stroke="#7ec8e3" stroke-width="2" marker-end="url(#obs-arr)"/>

  <!-- Collector -->
  <rect x="280" y="156" width="320" height="54" rx="8" fill="#2a1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Trace Collector</text>
  <text x="440" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">요청·응답·토큰·레이턴시 수집</text>

  <!-- Fan-out to three stores -->
  <line x1="380" y1="210" x2="200" y2="238" stroke="#7ec8e3" stroke-width="2" marker-end="url(#obs-arr)"/>
  <line x1="440" y1="210" x2="440" y2="238" stroke="#7ec8e3" stroke-width="2" marker-end="url(#obs-arr)"/>
  <line x1="500" y1="210" x2="680" y2="238" stroke="#7ec8e3" stroke-width="2" marker-end="url(#obs-arr)"/>

  <!-- Trace Store -->
  <rect x="60" y="246" width="280" height="90" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="200" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">트레이스 스토어</text>
  <text x="200" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Langfuse / LangSmith</text>
  <text x="200" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">요청별 전체 체인 시각화</text>
  <text x="200" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">입력/출력/메타데이터 저장</text>

  <!-- Metrics Store -->
  <rect x="380" y="246" width="120" height="90" rx="8" fill="#1a2a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">메트릭</text>
  <text x="440" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Prometheus</text>
  <text x="440" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Grafana</text>
  <text x="440" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">시계열 집계</text>

  <!-- Cost Store -->
  <rect x="540" y="246" width="280" height="90" rx="8" fill="#2a2a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="680" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">비용 추적</text>
  <text x="680" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Helicone / 자체 구현</text>
  <text x="680" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">토큰 × 단가 = 비용</text>
  <text x="680" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">팀·기능별 비용 분리</text>

  <!-- Dashboard -->
  <rect x="200" y="368" width="480" height="54" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">통합 대시보드 + 알림</text>
  <text x="440" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">레이턴시 · 에러율 · 비용 · 품질 점수 · 토큰 사용량</text>

  <line x1="200" y1="336" x2="360" y2="368" stroke="#7ec8e3" stroke-width="2" marker-end="url(#obs-arr)"/>
  <line x1="440" y1="336" x2="440" y2="368" stroke="#7ec8e3" stroke-width="2" marker-end="url(#obs-arr)"/>
  <line x1="680" y1="336" x2="520" y2="368" stroke="#7ec8e3" stroke-width="2" marker-end="url(#obs-arr)"/>
</svg>
