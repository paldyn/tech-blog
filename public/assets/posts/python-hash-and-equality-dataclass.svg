<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380">
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">dataclass와 __hash__ 자동 생성</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">eq=True · frozen=True · unsafe_hash</text>

  <rect x="60" y="100" width="760" height="252" rx="10" fill="#111520" stroke="#1e2433"/>
  <rect x="80" y="116" width="720" height="220" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="96" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">from</tspan><tspan fill="#e8e8e8"> dataclasses </tspan><tspan fill="#7ec8e3">import</tspan><tspan fill="#e8e8e8"> dataclass</tspan></text>
  <text x="96" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"></tspan></text>
  <text x="96" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># eq=True (기본): __eq__ 생성, __hash__=None</tspan></text>
  <text x="96" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">@</tspan><tspan fill="#7ec8e3">dataclass</tspan></text>
  <text x="96" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">class</tspan><tspan fill="#e8e8e8"> Mutable: x: </tspan><tspan fill="#7ec8e3">int</tspan></text>
  <text x="96" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"></tspan></text>
  <text x="96" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># frozen=True: 불변 + __hash__ 자동 생성</tspan></text>
  <text x="96" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">@</tspan><tspan fill="#7ec8e3">dataclass</tspan><tspan fill="#e8e8e8">(frozen=</tspan><tspan fill="#7ec8e3">True</tspan><tspan fill="#e8e8e8">)</tspan></text>
  <text x="96" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">class</tspan><tspan fill="#e8e8e8"> Immutable:</tspan></text>
  <text x="96" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    x: </tspan><tspan fill="#7ec8e3">int</tspan><tspan fill="#e8e8e8">; y: </tspan><tspan fill="#7ec8e3">int</tspan></text>
  <text x="96" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"></tspan></text>
  <text x="96" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">p = Immutable(</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">); hash(p)  </tspan><tspan fill="#55c555"># OK — dict 키·set 원소 가능</tspan></text>
</svg>
