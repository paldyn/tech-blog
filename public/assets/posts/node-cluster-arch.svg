<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700">Node.js Cluster 아키텍처</text>
  <text x="440" y="70" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">Primary 프로세스가 Worker를 fork — 라운드로빈 로드 밸런싱</text>

  <!-- Client -->
  <rect x="60" y="170" width="120" height="50" rx="8" fill="#111827" stroke="#888" stroke-width="1.5"/>
  <text x="120" y="200" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600">Client</text>

  <!-- Arrow to Primary -->
  <line x1="180" y1="195" x2="240" y2="195" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="240,195 232,190 232,200" fill="#7ec8e3"/>
  <text x="210" y="185" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">TCP</text>

  <!-- Primary box -->
  <rect x="240" y="120" width="180" height="160" rx="10" fill="#111827" stroke="#7ec8e3" stroke-width="2"/>
  <text x="330" y="150" text-anchor="middle" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600">Primary</text>
  <text x="330" y="170" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">cluster.isMaster</text>
  <rect x="260" y="182" width="140" height="30" rx="5" fill="#1a2533" stroke="#7777cc" stroke-width="1"/>
  <text x="330" y="202" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">OS 소켓 공유</text>
  <rect x="260" y="222" width="140" height="30" rx="5" fill="#1a2533" stroke="#55c555" stroke-width="1"/>
  <text x="330" y="242" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">라운드로빈 분배</text>

  <!-- Fork arrows -->
  <line x1="420" y1="175" x2="490" y2="145" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="450" y="150" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11">fork()</text>
  <line x1="420" y1="200" x2="490" y2="230" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="420" y1="200" x2="490" y2="320" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Worker 1 -->
  <rect x="490" y="100" width="160" height="90" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="570" y="126" text-anchor="middle" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600">Worker #1</text>
  <text x="570" y="146" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">PID: 1001</text>
  <rect x="510" y="158" width="120" height="22" rx="4" fill="#0f1a12" stroke="#55c555" stroke-width="1"/>
  <text x="570" y="174" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">http.Server</text>

  <!-- Worker 2 -->
  <rect x="490" y="210" width="160" height="90" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="570" y="236" text-anchor="middle" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600">Worker #2</text>
  <text x="570" y="256" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">PID: 1002</text>
  <rect x="510" y="268" width="120" height="22" rx="4" fill="#0f1a12" stroke="#55c555" stroke-width="1"/>
  <text x="570" y="284" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">http.Server</text>

  <!-- Worker 3 -->
  <rect x="490" y="300" width="160" height="90" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="570" y="326" text-anchor="middle" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600">Worker #N</text>
  <text x="570" y="346" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">os.cpus().length</text>
  <rect x="510" y="358" width="120" height="22" rx="4" fill="#0f1a12" stroke="#55c555" stroke-width="1"/>
  <text x="570" y="374" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">http.Server</text>

  <!-- Benefits box -->
  <rect x="680" y="120" width="160" height="180" rx="8" fill="#111218" stroke="#7777cc" stroke-width="1.5"/>
  <text x="760" y="148" text-anchor="middle" fill="#7777cc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600">장점</text>
  <text x="700" y="172" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">✓ 멀티코어 활용</text>
  <text x="700" y="194" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">✓ 무중단 재시작</text>
  <text x="700" y="216" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">✓ 격리된 프로세스</text>
  <text x="700" y="238" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">✗ 메모리 미공유</text>
  <text x="700" y="260" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">✗ IPC 오버헤드</text>
  <text x="700" y="282" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">→ Redis 상태 공유</text>

  <!-- Bottom note -->
  <text x="440" y="440" text-anchor="middle" fill="#555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">Primary와 Worker는 별도 프로세스 — IPC(process.send)로 메시지 교환</text>
</svg>
