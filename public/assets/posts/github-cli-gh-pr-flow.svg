<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">gh로 끝내는 PR 워크플로우</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">브랜치 push부터 머지까지 터미널에서</text>

  <!-- step boxes -->
  <rect x="50" y="120" width="180" height="76" rx="10" fill="#101010" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="152" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">① 생성</text>
  <text x="140" y="176" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">gh pr create</text>

  <rect x="270" y="120" width="180" height="76" rx="10" fill="#101010" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="360" y="152" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">② 확인</text>
  <text x="360" y="176" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">gh pr checks</text>

  <rect x="490" y="120" width="180" height="76" rx="10" fill="#101010" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="580" y="152" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">③ 리뷰</text>
  <text x="580" y="176" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">gh pr review</text>

  <rect x="710" y="120" width="120" height="76" rx="10" fill="#101010" stroke="#55c555" stroke-width="1.5"/>
  <text x="770" y="152" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">④ 머지</text>
  <text x="770" y="176" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">gh pr merge</text>

  <line x1="230" y1="158" x2="264" y2="158" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <line x1="450" y1="158" x2="484" y2="158" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <line x1="670" y1="158" x2="704" y2="158" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- detail box -->
  <rect x="50" y="230" width="780" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="68" y="258" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># PR을 만들고 바로 웹에서 열기</text>
  <text x="68" y="282" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">gh pr create <tspan fill="#7ec8e3" font-weight="600">--fill</tspan> <tspan fill="#7ec8e3" font-weight="600">--web</tspan></text>
  <text x="68" y="306" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">gh pr merge <tspan fill="#7ec8e3" font-weight="600">--squash</tspan> <tspan fill="#7ec8e3" font-weight="600">--delete-branch</tspan></text>
</svg>
