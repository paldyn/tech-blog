<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <rect width="880" height="540" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">Config Server &amp; Client 설정</text>
  <text x="440" y="74" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" fill="#888">서버 설정과 클라이언트 연결 설정 핵심 코드</text>

  <!-- Left panel header -->
  <rect x="40" y="94" width="390" height="34" rx="6" fill="#0f1929" stroke="#2d5a8e" stroke-width="1"/>
  <text x="235" y="116" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7ec8e3">Config Server (application.yml)</text>

  <!-- Left code box -->
  <rect x="40" y="136" width="390" height="362" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text xml:space="preserve" x="56" y="157"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600">server:</text>

  <text xml:space="preserve" x="56" y="176"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan>  port: </tspan>
    <tspan fill="#b5cea8">8888</tspan>
  </text>

  <text xml:space="preserve" x="56" y="195"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600">spring:</text>

  <text xml:space="preserve" x="56" y="214"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">  application:</text>

  <text xml:space="preserve" x="56" y="233"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan>    name: </tspan>
    <tspan fill="#ce9178">config-server</tspan>
  </text>

  <text xml:space="preserve" x="56" y="252"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">  cloud:</text>

  <text xml:space="preserve" x="56" y="271"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">    config:</text>

  <text xml:space="preserve" x="56" y="290"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">      server:</text>

  <text xml:space="preserve" x="56" y="309"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">        git:</text>

  <text xml:space="preserve" x="56" y="328"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan>          uri: </tspan>
    <tspan fill="#ce9178">https://github.com/org/config</tspan>
  </text>

  <text xml:space="preserve" x="56" y="347"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan>          default-label: </tspan>
    <tspan fill="#ce9178">main</tspan>
  </text>

  <text xml:space="preserve" x="56" y="366"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan>          search-paths: </tspan>
    <tspan fill="#ce9178">'{application}'</tspan>
  </text>

  <text xml:space="preserve" x="56" y="385"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">          clone-on-start: true</text>

  <text xml:space="preserve" x="56" y="404"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8">        # 암호화 키 설정</text>

  <text xml:space="preserve" x="56" y="423"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">      encrypt:</text>

  <text xml:space="preserve" x="56" y="442"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan>        key: </tspan>
    <tspan fill="#ce9178">$</tspan>
    <tspan>{ENCRYPT_KEY}</tspan>
  </text>

  <text xml:space="preserve" x="56" y="461"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8"># Git 저장소 파일: order-service-dev.yml</text>

  <text xml:space="preserve" x="56" y="480"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600">db:</text>

  <text xml:space="preserve" x="56" y="499"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan>  password: </tspan>
    <tspan fill="#ce9178">{cipher}ENC_PASS_HERE</tspan>
  </text>

  <!-- Divider -->
  <line x1="444" y1="90" x2="444" y2="526" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Right panel header -->
  <rect x="450" y="94" width="390" height="34" rx="6" fill="#0e1c0e" stroke="#2d6e2d" stroke-width="1"/>
  <text x="645" y="116" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#55c555">Config Client (bootstrap.yml)</text>

  <!-- Right code box -->
  <rect x="450" y="136" width="390" height="362" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text xml:space="preserve" x="466" y="157"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8"># bootstrap.yml (Spring Boot 2.x)</text>

  <text xml:space="preserve" x="466" y="176"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8"># Spring Boot 3.x: application.yml에 병합</text>

  <text xml:space="preserve" x="466" y="195"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600">spring:</text>

  <text xml:space="preserve" x="466" y="214"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">  application:</text>

  <text xml:space="preserve" x="466" y="233"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan>    name: </tspan>
    <tspan fill="#ce9178">order-service</tspan>
    <tspan fill="#9aa4b8">  # 파일명 기준</tspan>
  </text>

  <text xml:space="preserve" x="466" y="252"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">  config:</text>

  <text xml:space="preserve" x="466" y="271"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">    import:</text>

  <text xml:space="preserve" x="466" y="290"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan>      - </tspan>
    <tspan fill="#ce9178">configserver:</tspan>
    <tspan fill="#9aa4b8">  # 3.x 방식</tspan>
  </text>

  <text xml:space="preserve" x="466" y="309"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">  cloud:</text>

  <text xml:space="preserve" x="466" y="328"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">    config:</text>

  <text xml:space="preserve" x="466" y="347"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan>      uri: </tspan>
    <tspan fill="#ce9178">http://config-server:8888</tspan>
  </text>

  <text xml:space="preserve" x="466" y="366"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan>      fail-fast: </tspan>
    <tspan fill="#b5cea8">true</tspan>
  </text>

  <text xml:space="preserve" x="466" y="385"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">  profiles:</text>

  <text xml:space="preserve" x="466" y="404"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan>    active: </tspan>
    <tspan fill="#ce9178">dev</tspan>
    <tspan fill="#9aa4b8">  # 프로파일 지정</tspan>
  </text>

  <text xml:space="preserve" x="466" y="423"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8"># @RefreshScope 빈은 동적 갱신됨</text>

  <text xml:space="preserve" x="466" y="442"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600">@RefreshScope</text>

  <text xml:space="preserve" x="466" y="461"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600">@Component</text>

  <text xml:space="preserve" x="466" y="480"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3" font-weight="600">public class</tspan>
    <tspan> AppConfig {</tspan>
  </text>

  <text xml:space="preserve" x="466" y="499"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan>  </tspan>
    <tspan fill="#7ec8e3" font-weight="600">@Value</tspan>
    <tspan>(</tspan>
    <tspan fill="#ce9178">"${db.password}"</tspan>
    <tspan>)</tspan>
  </text>

  <!-- Bottom note -->
  <text x="440" y="527" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">spring.application.name → Git 파일명 기준, spring.profiles.active → 파일명 접미사 기준</text>
</svg>
