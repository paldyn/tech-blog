<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 330">
  <rect width="880" height="330" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">제너레이터 제어 메서드</text>

  <!-- send() box -->
  <rect x="50" y="64" width="240" height="220" rx="8"
        fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="90" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="17" font-weight="700" fill="#55c555">send(value)</text>
  <text x="170" y="115" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">값을 제너레이터에 주입</text>
  <rect x="66" y="126" width="208" height="60" rx="4"
        fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="148" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">g.send(value)</text>
  <text x="82" y="166" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8"># value → yield 결과</text>
  <text x="170" y="210" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">None이면 next()와 동일</text>
  <text x="170" y="228" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">다음 yield값을 반환</text>
  <text x="170" y="264" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">프라이밍 후에만 가능</text>

  <!-- throw() box -->
  <rect x="320" y="64" width="240" height="220" rx="8"
        fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="90" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="17" font-weight="700" fill="#e05555">throw(exc)</text>
  <text x="440" y="115" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">예외를 제너레이터 안에 주입</text>
  <rect x="336" y="126" width="208" height="60" rx="4"
        fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="352" y="148" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">g.throw(ValueError,</text>
  <text x="352" y="166" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">         <tspan fill="#ce9178">"오류"</tspan>)</text>
  <text x="440" y="210" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">yield 위치에서 예외 발생</text>
  <text x="440" y="228" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">내부에서 잡으면 계속 실행</text>
  <text x="440" y="246" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">못 잡으면 호출자로 전파</text>
  <text x="440" y="264" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">취소·리셋 신호에 활용</text>

  <!-- close() box -->
  <rect x="590" y="64" width="240" height="220" rx="8"
        fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="710" y="90" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="17" font-weight="700" fill="#7ec8e3">close()</text>
  <text x="710" y="115" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">제너레이터를 강제 종료</text>
  <rect x="606" y="126" width="208" height="60" rx="4"
        fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="622" y="148" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">g.close()</text>
  <text x="622" y="166" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8"># GeneratorExit 발생</text>
  <text x="710" y="210" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">GeneratorExit 주입</text>
  <text x="710" y="228" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">내부에서 잡아 정리 가능</text>
  <text x="710" y="246" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">GC가 자동으로도 호출</text>
  <text x="710" y="264" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">리소스 정리에 활용</text>
</svg>
