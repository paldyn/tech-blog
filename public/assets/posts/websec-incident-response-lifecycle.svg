<svg xmlns="http://www.w3.org/2000/svg" width="880" height="450" viewBox="0 0 880 450">
  <defs>
    <marker id="arr-irb" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-irg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="450" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">침해사고 대응 6단계 (NIST 기반)</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">사고 대응은 사고가 터진 뒤가 아니라, 그 전에 준비하는 것에서 시작한다</text>

  <!-- 6 boxes 2 rows x 3 -->
  <rect x="50" y="100" width="240" height="100" rx="8" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">1. 준비 (Preparation)</text>
  <text x="170" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">IR 플랜 · 연락망 · 권한</text>
  <text x="170" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">로깅·백업·플레이북·훈련</text>
  <text x="170" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">평시에 하는 모든 일</text>

  <rect x="320" y="100" width="240" height="100" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">2. 탐지·분석</text>
  <text x="440" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">SIEM 경보 · 제보 접수</text>
  <text x="440" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">범위·심각도 판정 · 분류</text>
  <text x="440" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">"진짜 사고인가?"</text>

  <rect x="590" y="100" width="240" height="100" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="710" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">3. 격리 (Containment)</text>
  <text x="710" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">확산 차단 · 세션/키 무효화</text>
  <text x="710" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">증거 보존 (포렌식)</text>
  <text x="710" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">단기 vs 장기 격리</text>

  <rect x="50" y="250" width="240" height="100" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="170" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">4. 근절 (Eradication)</text>
  <text x="170" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">악성코드·백도어 제거</text>
  <text x="170" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">취약점 패치 · 자격증명 교체</text>
  <text x="170" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">근본 원인 제거</text>

  <rect x="320" y="250" width="240" height="100" rx="8" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">5. 복구 (Recovery)</text>
  <text x="440" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">서비스 정상화 · 검증</text>
  <text x="440" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">재침해 여부 집중 모니터링</text>
  <text x="440" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">깨끗함을 확인하고 복귀</text>

  <rect x="590" y="250" width="240" height="100" rx="8" fill="#1a102a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="710" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">6. 사후 검토</text>
  <text x="710" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">포스트모템 (비난 없는)</text>
  <text x="710" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">교훈 → 준비 단계로 환류</text>
  <text x="710" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">Lessons Learned</text>

  <line x1="290" y1="150" x2="318" y2="150" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-irb)"/>
  <line x1="560" y1="150" x2="588" y2="150" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-irb)"/>
  <line x1="290" y1="300" x2="318" y2="300" stroke="#55c555" stroke-width="2" marker-end="url(#arr-irg)"/>
  <line x1="560" y1="300" x2="588" y2="300" stroke="#55c555" stroke-width="2" marker-end="url(#arr-irg)"/>
  <!-- down connector 3->4 -->
  <path d="M 710 200 C 710 225, 170 240, 170 248" fill="none" stroke="#e05555"
        stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-irg)"/>
  <!-- loop 6 -> 1 -->
  <path d="M 710 350 C 710 392, 170 392, 170 352" fill="none" stroke="#7777cc"
        stroke-width="2.5" stroke-dasharray="4,4" marker-end="url(#arr-irg)"/>
  <text x="440" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">교훈을 다시 준비 단계로 — 사고 대응은 순환한다</text>
</svg>
