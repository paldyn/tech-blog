<svg xmlns="http://www.w3.org/2000/svg" width="880" height="270" viewBox="0 0 880 270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="270" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">요청이 앱에 닿기까지</text>

  <defs>
    <marker id="uvar" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="60" y="100" width="150" height="90" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="135" y="140" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">클라이언트</text>
  <text x="135" y="164" font-size="12" fill="#9aa4b8" text-anchor="middle">브라우저·앱</text>

  <line x1="210" y1="145" x2="266" y2="145" stroke="#7ec8e3" stroke-width="2" marker-end="url(#uvar)"/>
  <text x="238" y="128" font-size="11" fill="#9aa4b8" text-anchor="middle">HTTP</text>

  <rect x="270" y="100" width="200" height="90" rx="6" fill="#000000" stroke="#7777cc" stroke-width="1"/>
  <text x="370" y="136" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">uvicorn</text>
  <text x="370" y="160" font-size="12" fill="#9aa4b8" text-anchor="middle">ASGI 서버</text>
  <text x="370" y="180" font-size="12" fill="#9aa4b8" text-anchor="middle">네트워크·이벤트 루프</text>

  <line x1="470" y1="145" x2="526" y2="145" stroke="#7ec8e3" stroke-width="2" marker-end="url(#uvar)"/>
  <text x="498" y="128" font-size="11" fill="#9aa4b8" text-anchor="middle">ASGI</text>

  <rect x="530" y="100" width="290" height="90" rx="6" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="675" y="136" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">ASGI 앱 (FastAPI 등)</text>
  <text x="675" y="160" font-size="12" fill="#9aa4b8" text-anchor="middle">라우팅 · 뷰 함수</text>
  <text x="675" y="180" font-size="12" fill="#9aa4b8" text-anchor="middle">async 핸들러 실행</text>

  <rect x="60" y="214" width="760" height="42" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="240" font-size="13" fill="#55c555" text-anchor="middle">uvicorn은 네트워크를, 앱은 로직을 — ASGI 규약이 둘을 잇는다</text>
</svg>
