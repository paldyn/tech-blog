<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="solid-arr" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0,12 4,0 8" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">Transferable · 소유권 이전 (Zero-Copy)</text>

  <!-- ===== CLONE (복사) ===== -->
  <text x="240" y="82" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#e05555">postMessage — 복사 (느림)</text>

  <!-- Sender side -->
  <rect x="60" y="96" width="160" height="80" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="1.5"/>
  <text x="140" y="122" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#e8e8e8">Main Thread</text>
  <rect x="76" y="132" width="128" height="28" rx="4" fill="#2a1010"/>
  <text x="140" y="151" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#b5cea8">ArrayBuffer [1 MB]</text>

  <!-- copy arrow -->
  <line x1="228" y1="136" x2="300" y2="136"
    stroke="#e05555" stroke-width="2" marker-end="url(#solid-arr)"/>
  <text x="264" y="128" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e05555">복사</text>

  <!-- Receiver side -->
  <rect x="308" y="96" width="160" height="80" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="1.5"/>
  <text x="388" y="122" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#e8e8e8">Worker</text>
  <rect x="324" y="132" width="128" height="28" rx="4" fill="#2a1010"/>
  <text x="388" y="151" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#b5cea8">ArrayBuffer [1 MB]</text>

  <!-- original still exists note -->
  <text x="140" y="196" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">원본 유지 (2 MB 사용)</text>
  <text x="388" y="196" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">새 복사본</text>

  <!-- ===== TRANSFER (소유권 이전) ===== -->
  <text x="240" y="240" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#55c555">postMessage + transfer — 소유권 이전 (빠름)</text>

  <!-- Sender side -->
  <rect x="60" y="255" width="160" height="80" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="140" y="281" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#e8e8e8">Main Thread</text>
  <rect x="76" y="290" width="128" height="28" rx="4" fill="#101a10"/>
  <text x="140" y="309" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#e05555">ArrayBuffer [neutered]</text>

  <!-- transfer arrow (solid) -->
  <line x1="228" y1="295" x2="300" y2="295"
    stroke="#55c555" stroke-width="3" marker-end="url(#solid-arr)"/>
  <text x="264" y="287" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555">이전</text>

  <!-- Receiver side -->
  <rect x="308" y="255" width="160" height="80" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="388" y="281" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#e8e8e8">Worker</text>
  <rect x="324" y="290" width="128" height="28" rx="4" fill="#101a10"/>
  <text x="388" y="309" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#b5cea8">ArrayBuffer [1 MB]</text>

  <text x="140" y="355" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e05555">byteLength === 0 (사용 불가)</text>
  <text x="388" y="355" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">소유권 획득 (1 MB만 사용)</text>

  <!-- Transferable types list -->
  <rect x="510" y="96" width="310" height="260" rx="8" fill="#0d1117" stroke="#1e2433"/>
  <text x="665" y="122" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#e8e8e8">Transferable 타입</text>

  <text x="530" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">ArrayBuffer</text>
  <text x="530" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">가장 흔한 케이스</text>

  <line x1="520" y1="178" x2="800" y2="178" stroke="#1e2433" stroke-width="1"/>

  <text x="530" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">MessagePort</text>
  <text x="530" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">채널 포트 이전</text>

  <line x1="520" y1="224" x2="800" y2="224" stroke="#1e2433" stroke-width="1"/>

  <text x="530" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">ImageBitmap</text>
  <text x="530" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">GPU 비트맵 이전</text>

  <line x1="520" y1="270" x2="800" y2="270" stroke="#1e2433" stroke-width="1"/>

  <text x="530" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">OffscreenCanvas</text>
  <text x="530" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">캔버스 렌더링 위임</text>

  <line x1="520" y1="316" x2="800" y2="316" stroke="#1e2433" stroke-width="1"/>

  <text x="530" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">ReadableStream 외</text>
  <text x="530" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">WritableStream, TransformStream</text>

  <!-- code hint at bottom -->
  <rect x="60" y="376" width="760" height="36" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="90" y="399" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">// </text>
  <text x="114" y="399" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">worker.postMessage({ buf }, [buf]);  </text>
  <text x="440" y="399" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 2번째 인수: transfer list</text>
</svg>
