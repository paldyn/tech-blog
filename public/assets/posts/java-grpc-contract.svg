<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="gc1" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="gc2" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="340" rx="12" fill="#0a0a0a"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">gRPC — .proto 계약에서 양쪽 코드를 생성한다</text>

  <!-- proto box -->
  <rect x="330" y="90" width="220" height="70" rx="10" fill="#11151c" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="124" font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">.proto 계약</text>
  <text x="440" y="146" font-size="12" fill="#888" text-anchor="middle">서비스·메시지 정의</text>

  <!-- client stub -->
  <rect x="60" y="220" width="320" height="80" rx="10" fill="#11151c" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="220" y="254" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">클라이언트 Stub</text>
  <text x="220" y="278" font-size="12" fill="#888" text-anchor="middle">로컬 메서드처럼 원격 호출</text>

  <!-- server impl -->
  <rect x="500" y="220" width="320" height="80" rx="10" fill="#11151c" stroke="#55c555" stroke-width="1.5"/>
  <text x="660" y="254" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">서버 구현</text>
  <text x="660" y="278" font-size="12" fill="#888" text-anchor="middle">생성된 추상 클래스를 구현</text>

  <line x1="400" y1="160" x2="240" y2="218" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#gc1)"/>
  <text x="270" y="190" font-size="11" fill="#888">코드 생성</text>
  <line x1="480" y1="160" x2="640" y2="218" stroke="#55c555" stroke-width="2.5" marker-end="url(#gc2)"/>
  <text x="600" y="190" font-size="11" fill="#888">코드 생성</text>

  <text x="440" y="328" font-size="13" fill="#888" text-anchor="middle">통신은 Protocol Buffers 바이너리 + HTTP/2 — 작고 빠르며 타입이 강제된다</text>
</svg>
