<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">huggingface_hub 라이브러리 — 주요 API</text>

  <!-- Row 1: Download APIs -->
  <text x="60" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">파일 다운로드</text>

  <rect x="60" y="96" width="360" height="76" rx="6" fill="#1a2535" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="240" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">hf_hub_download()</text>
  <text x="240" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">단일 파일 다운로드 후 로컬 경로 반환</text>
  <text x="240" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">repo_id, filename, revision 지정</text>

  <rect x="460" y="96" width="360" height="76" rx="6" fill="#1a2535" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="640" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">snapshot_download()</text>
  <text x="640" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">리포지터리 전체 또는 패턴 매칭 다운로드</text>
  <text x="640" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">ignore_patterns=["*.msgpack"] 등 필터</text>

  <!-- Row 2: Upload APIs -->
  <text x="60" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">파일 업로드 / 리포 관리</text>

  <rect x="60" y="212" width="220" height="76" rx="6" fill="#1a2c1a" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="170" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">create_repo()</text>
  <text x="170" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">모델/데이터/스페이스</text>
  <text x="170" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">리포지터리 신규 생성</text>

  <rect x="300" y="212" width="220" height="76" rx="6" fill="#1a2c1a" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="410" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">upload_file()</text>
  <text x="410" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">단일 파일 업로드</text>
  <text x="410" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">path_or_fileobj 지정</text>

  <rect x="540" y="212" width="280" height="76" rx="6" fill="#1a2c1a" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="680" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">upload_folder()</text>
  <text x="680" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">로컬 폴더 전체를 리포에 업로드</text>
  <text x="680" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ignore_patterns 지원</text>

  <!-- Row 3: Cache section -->
  <text x="60" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">from_pretrained() 내부 흐름</text>

  <rect x="60" y="332" width="140" height="60" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="130" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">① 캐시 확인</text>
  <text x="130" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">~/.cache/huggingface</text>

  <line x1="200" y1="362" x2="238" y2="362" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="240" y="332" width="140" height="60" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="310" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">② Hub API</text>
  <text x="310" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">hf_hub_download()</text>

  <line x1="380" y1="362" x2="418" y2="362" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="420" y="332" width="140" height="60" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="490" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">③ 가중치 로드</text>
  <text x="490" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">safetensors/bin</text>

  <line x1="560" y1="362" x2="598" y2="362" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="600" y="332" width="220" height="60" rx="6" fill="#1a2535" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="710" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">④ Python 객체 반환</text>
  <text x="710" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">PreTrainedModel 인스턴스</text>

  <!-- Code block -->
  <rect x="60" y="416" width="760" height="68" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">from</text>
  <text x="116" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> huggingface_hub </text>
  <text x="264" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">import</text>
  <text x="314" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> hf_hub_download, snapshot_download</text>
  <text x="76" y="458" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">path = hf_hub_download(repo_id=</text>
  <text x="360" y="458" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">"klue/bert-base"</text>
  <text x="478" y="458" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">, filename=</text>
  <text x="578" y="458" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">"config.json"</text>
  <text x="670" y="458" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">)</text>
  <text x="76" y="476" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">local_dir = snapshot_download(</text>
  <text x="332" y="476" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">"klue/bert-base"</text>
  <text x="450" y="476" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">, ignore_patterns=[</text>
  <text x="612" y="476" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">"*.msgpack"</text>
  <text x="700" y="476" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">])</text>
</svg>
