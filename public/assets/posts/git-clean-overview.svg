<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">git clean: Untracked 파일 제거 범위</text>

  <!-- Legend -->
  <rect x="60" y="68" width="16" height="16" rx="3" fill="#e05555"/>
  <text x="82" y="81" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">제거됨</text>
  <rect x="160" y="68" width="16" height="16" rx="3" fill="#55c555"/>
  <text x="182" y="81" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">유지됨</text>
  <rect x="260" y="68" width="16" height="16" rx="3" fill="#7777cc"/>
  <text x="282" y="81" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">옵션 필요</text>

  <!-- Header row -->
  <text x="200" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">-f</text>
  <text x="340" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">-fd</text>
  <text x="480" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">-fx</text>
  <text x="620" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">-fX</text>
  <text x="760" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">-n (dry-run)</text>

  <!-- Row 1: Untracked files -->
  <rect x="60" y="124" width="140" height="44" rx="6" fill="#111827" stroke="#2a3650" stroke-width="1"/>
  <text x="130" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">untracked 파일</text>

  <rect x="130" y="124" width="140" height="44" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="200" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">제거</text>

  <rect x="270" y="124" width="140" height="44" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="340" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">제거</text>

  <rect x="410" y="124" width="140" height="44" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="480" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">제거</text>

  <rect x="550" y="124" width="140" height="44" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="620" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">제거</text>

  <rect x="690" y="124" width="140" height="44" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="760" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">미리보기만</text>

  <!-- Row 2: Untracked dirs -->
  <rect x="60" y="178" width="140" height="44" rx="6" fill="#111827" stroke="#2a3650" stroke-width="1"/>
  <text x="130" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">untracked 디렉터리</text>

  <rect x="130" y="178" width="140" height="44" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="200" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">유지</text>

  <rect x="270" y="178" width="140" height="44" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="340" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">제거</text>

  <rect x="410" y="178" width="140" height="44" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="480" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">제거</text>

  <rect x="550" y="178" width="140" height="44" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="620" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">제거</text>

  <rect x="690" y="178" width="140" height="44" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="760" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">미리보기만</text>

  <!-- Row 3: .gitignore files -->
  <rect x="60" y="232" width="140" height="44" rx="6" fill="#111827" stroke="#2a3650" stroke-width="1"/>
  <text x="130" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">.gitignore 파일</text>
  <text x="130" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(무시된 파일)</text>

  <rect x="130" y="232" width="140" height="44" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="200" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">유지</text>

  <rect x="270" y="232" width="140" height="44" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="340" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">유지</text>

  <rect x="410" y="232" width="140" height="44" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="480" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">제거</text>

  <rect x="550" y="232" width="140" height="44" rx="6" fill="#10001a" stroke="#7777cc" stroke-width="1"/>
  <text x="620" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">무시파일만</text>
  <text x="620" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">제거</text>

  <rect x="690" y="232" width="140" height="44" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="760" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">미리보기만</text>

  <!-- Warning -->
  <rect x="60" y="306" width="760" height="56" rx="8" fill="#1a0f00" stroke="#e05555" stroke-width="1.5"/>
  <text x="80" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">⚠ 복구 불가 — 항상 -n(dry-run)으로 먼저 확인</text>
  <text x="80" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">git clean으로 삭제된 파일은 reflog·stash 어디에도 없음. git clean -n 또는 -i(interactive)로 먼저 목록 확인 필수</text>

  <!-- Interactive note -->
  <rect x="60" y="382" width="760" height="52" rx="8" fill="#111827" stroke="#2a3650" stroke-width="1.5"/>
  <text x="80" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">git clean -n     </text>
  <text x="230" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888"># 삭제 예정 목록만 출력</text>
  <text x="80" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">git clean -i     </text>
  <text x="230" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888"># 대화형 — 파일별로 선택</text>
</svg>
