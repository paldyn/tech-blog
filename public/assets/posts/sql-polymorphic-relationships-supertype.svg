<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">수퍼타입으로 다형성 해소</text>
  <text x="440" y="66" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">댓글 대상을 추상화 → 정상 FK 보장</text>

  <!-- commentable supertype -->
  <rect x="330" y="86" width="220" height="110" rx="4" fill="#111" stroke="#7777cc" stroke-width="2"/>
  <rect x="330" y="86" width="220" height="28" rx="4" fill="#12101a" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="105" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">COMMENTABLE</text>
  <text x="340" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">PK  id</text>
  <text x="340" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">    entity_type</text>
  <text x="340" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">    created_at</text>
  <text x="340" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">    ...</text>

  <!-- POST subtype -->
  <rect x="60" y="86" width="200" height="90" rx="4" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <rect x="60" y="86" width="200" height="28" rx="4" fill="#0d1a20" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="105" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3">POST</text>
  <text x="70" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">PK,FK  commentable_id</text>
  <text x="70" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">       title</text>
  <text x="70" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">       content</text>

  <!-- PRODUCT subtype -->
  <rect x="620" y="86" width="200" height="90" rx="4" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <rect x="620" y="86" width="200" height="28" rx="4" fill="#0d200d" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="105" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555">PRODUCT</text>
  <text x="630" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">PK,FK  commentable_id</text>
  <text x="630" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">       name</text>
  <text x="630" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">       price</text>

  <!-- Lines from subtypes to commentable -->
  <line x1="260" y1="131" x2="330" y2="131" stroke="#888" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="620" y1="131" x2="550" y2="131" stroke="#888" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- COMMENT table -->
  <rect x="280" y="240" width="320" height="110" rx="4" fill="#111" stroke="#ce9178" stroke-width="1.5"/>
  <rect x="280" y="240" width="320" height="28" rx="4" fill="#1e150a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="440" y="259" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#ce9178">COMMENT</text>
  <text x="290" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">PK   id</text>
  <text x="290" y="301" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">FK   commentable_id → COMMENTABLE(id)</text>
  <text x="290" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">     body, author_id, ...</text>

  <!-- Line from COMMENT to COMMENTABLE -->
  <line x1="440" y1="240" x2="440" y2="196" stroke="#7777cc" stroke-width="1.5"/>
  <!-- N side at comment -->
  <line x1="440" y1="245" x2="434" y2="237" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="440" y1="245" x2="440" y2="235" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="440" y1="245" x2="446" y2="237" stroke="#7777cc" stroke-width="1.5"/>
  <!-- 1 side at commentable -->
  <line x1="434" y1="200" x2="446" y2="200" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="434" y1="194" x2="446" y2="194" stroke="#7777cc" stroke-width="1.5"/>

  <text x="458" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">N:1</text>

  <!-- Key insight -->
  <rect x="60" y="342" width="760" height="26" rx="4" fill="#0d1520" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">COMMENTABLE 수퍼타입 → COMMENT.commentable_id는 정상 FK · 참조 무결성 완벽 보장</text>
</svg>
