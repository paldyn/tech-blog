<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">CRD — 쿠버네티스 API 확장 구조</text>

  <!-- API Server -->
  <rect x="330" y="76" width="220" height="60" rx="8" fill="#1a0a2a" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">kube-apiserver</text>
  <text x="440" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">API 라우팅 허브</text>

  <!-- Built-in APIs -->
  <rect x="60" y="200" width="230" height="200" rx="8" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="175" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">내장 API</text>
  <text x="80" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">apps/v1 Deployment</text>
  <text x="80" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">v1 Pod / Service</text>
  <text x="80" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">batch/v1 Job</text>
  <text x="80" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">networking.k8s.io Ingress</text>
  <text x="80" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">rbac.authorization... Role</text>
  <text x="175" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">쿠버네티스 코어에 포함</text>

  <!-- CRD API -->
  <rect x="330" y="200" width="220" height="200" rx="8" fill="#1a0a2a" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">CRD (Custom API)</text>
  <text x="350" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">myapp.example.com/v1</text>
  <text x="350" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  Database</text>
  <text x="350" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">monitoring.coreos.com/v1</text>
  <text x="350" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  Prometheus</text>
  <text x="350" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">argoproj.io/v1alpha1</text>
  <text x="350" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  Application</text>
  <text x="440" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">CRD 등록으로 확장</text>

  <!-- Custom Controller -->
  <rect x="590" y="200" width="230" height="200" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="705" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Custom Controller</text>
  <text x="610" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">CRD 리소스 감시</text>
  <text x="610" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Desired State 계산</text>
  <text x="610" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Actual State 조정</text>
  <text x="610" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Status 업데이트</text>
  <text x="705" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">Reconciliation Loop</text>

  <!-- Arrows from API server -->
  <line x1="380" y1="136" x2="200" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="440" y1="136" x2="440" y2="200" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="500" y1="136" x2="680" y2="200" stroke="#55c555" stroke-width="2" marker-end="url(#arrGreen)"/>

  <!-- etcd -->
  <rect x="330" y="440" width="220" height="30" rx="6" fill="#0a0a0a" stroke="#888" stroke-width="1"/>
  <text x="440" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">etcd — CR 데이터 저장</text>
  <line x1="440" y1="400" x2="440" y2="440" stroke="#888" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- kubectl -->
  <rect x="40" y="76" width="160" height="60" rx="8" fill="#0a0a0a" stroke="#888" stroke-width="1"/>
  <text x="120" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">kubectl</text>
  <text x="120" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">kubectl get databases</text>
  <line x1="200" y1="106" x2="330" y2="106" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
</svg>
