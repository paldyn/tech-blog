<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">StatefulSet — 순서와 영속성이 보장되는 Pod</text>
  <text x="440" y="66" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">각 Pod는 고유한 이름, 네트워크 ID, 스토리지를 가집니다</text>

  <!-- StatefulSet box -->
  <rect x="290" y="90" width="300" height="60" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7777cc">StatefulSet: web</text>
  <text x="440" y="136" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8">replicas: 3 · 순차 생성 (0→1→2)</text>

  <!-- Arrows -->
  <line x1="360" y1="150" x2="190" y2="210" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="440" y1="150" x2="440" y2="210" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="520" y1="150" x2="690" y2="210" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Pod web-0 -->
  <rect x="60" y="212" width="260" height="108" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="2"/>
  <text x="190" y="234" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc">web-0</text>
  <text x="190" y="252" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">hostname: web-0</text>
  <text x="190" y="268" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">web-0.web-svc.default.svc</text>
  <text x="190" y="284" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">PVC: data-web-0</text>
  <text x="190" y="302" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">재시작해도 같은 PVC 재연결</text>

  <!-- Pod web-1 -->
  <rect x="310" y="212" width="260" height="108" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="234" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc">web-1</text>
  <text x="440" y="252" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">hostname: web-1</text>
  <text x="440" y="268" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">web-1.web-svc.default.svc</text>
  <text x="440" y="284" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">PVC: data-web-1</text>
  <text x="440" y="302" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">재시작해도 같은 PVC 재연결</text>

  <!-- Pod web-2 -->
  <rect x="560" y="212" width="260" height="108" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="2"/>
  <text x="690" y="234" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc">web-2</text>
  <text x="690" y="252" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">hostname: web-2</text>
  <text x="690" y="268" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">web-2.web-svc.default.svc</text>
  <text x="690" y="284" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">PVC: data-web-2</text>
  <text x="690" y="302" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">재시작해도 같은 PVC 재연결</text>

  <!-- Arrows to PVCs -->
  <line x1="190" y1="320" x2="190" y2="370" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <line x1="440" y1="320" x2="440" y2="370" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <line x1="690" y1="320" x2="690" y2="370" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- PVC boxes -->
  <rect x="100" y="372" width="180" height="48" rx="6" fill="#0d1e0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="190" y="393" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">data-web-0</text>
  <text x="190" y="411" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">PersistentVolumeClaim</text>

  <rect x="350" y="372" width="180" height="48" rx="6" fill="#0d1e0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="393" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">data-web-1</text>
  <text x="440" y="411" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">PersistentVolumeClaim</text>

  <rect x="600" y="372" width="180" height="48" rx="6" fill="#0d1e0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="690" y="393" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">data-web-2</text>
  <text x="690" y="411" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">PersistentVolumeClaim</text>

  <!-- Bottom note -->
  <text x="440" y="454" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8">Pod 삭제 후 재생성되어도 이름(web-0)과 PVC(data-web-0)가 그대로 유지됩니다</text>
  <text x="440" y="474" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">생성: web-0 → web-1 → web-2 (순서 보장) · 삭제: web-2 → web-1 → web-0 (역순)</text>
</svg>
