<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-p" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">GitHub Flow 전체 주기</text>

  <!-- main branch -->
  <text x="76" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">main</text>
  <line x1="60" y1="106" x2="820" y2="106" stroke="#7ec8e3" stroke-width="3"/>
  <circle cx="140" cy="106" r="7" fill="#7ec8e3"/>
  <circle cx="620" cy="106" r="7" fill="#55c555"/>
  <text x="620" y="93" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">PR 머지</text>

  <!-- feature branch -->
  <text x="200" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">feature/add-search</text>
  <line x1="220" y1="186" x2="620" y2="186" stroke="#7777cc" stroke-width="2"/>
  <circle cx="300" cy="186" r="6" fill="#7777cc"/>
  <circle cx="400" cy="186" r="6" fill="#7777cc"/>
  <circle cx="520" cy="186" r="6" fill="#7777cc"/>

  <!-- fork and merge arrows -->
  <line x1="220" y1="106" x2="220" y2="186" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-p)"/>
  <path d="M 620 186 Q 620 146 620 106" fill="none" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-g)"/>

  <!-- Step boxes -->
  <rect x="60" y="232" width="130" height="72" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="125" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">① 브랜치</text>
  <text x="125" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">main에서</text>
  <text x="125" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">topic 브랜치 생성</text>

  <rect x="210" y="232" width="130" height="72" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.2"/>
  <text x="275" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">② 커밋</text>
  <text x="275" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">작은 단위로</text>
  <text x="275" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">커밋 누적</text>

  <rect x="360" y="232" width="130" height="72" rx="8" fill="#111" stroke="#e8c84a" stroke-width="1.2"/>
  <text x="425" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8c84a">③ PR 오픈</text>
  <text x="425" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">코드 리뷰</text>
  <text x="425" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">요청</text>

  <rect x="510" y="232" width="130" height="72" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.2"/>
  <text x="575" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">④ 리뷰</text>
  <text x="575" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Approve 후</text>
  <text x="575" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">CI 통과 확인</text>

  <rect x="660" y="232" width="160" height="72" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="740" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">⑤ 머지 + 배포</text>
  <text x="740" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">main = 항상</text>
  <text x="740" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">배포 가능 상태</text>

  <!-- note box -->
  <rect x="60" y="336" width="760" height="110" rx="8" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="440" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">GitHub Flow 핵심 원칙</text>
  <text x="440" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• main은 항상 배포 가능한 상태 유지</text>
  <text x="440" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• develop 브랜치 없음 — 브랜치는 main에서 바로 분기</text>
  <text x="440" y="418" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• PR이 중심 — 리뷰와 CI를 통과해야 머지</text>
  <text x="440" y="436" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 머지 즉시 배포 (자동화 권장)</text>
</svg>
