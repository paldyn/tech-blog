<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">크리덴셜 스터핑 방어 코드</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Python — 속도 제한·유출 확인·이상 감지 통합 방어</text>

  <rect x="60" y="94" width="760" height="348" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text xml:space="preserve" x="80" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">import</text>
  <text xml:space="preserve" x="131" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> hashlib, hmac, time</text>

  <text xml:space="preserve" x="80" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">import</text>
  <text xml:space="preserve" x="131" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> httpx</text>
  <text xml:space="preserve" x="175" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  # HaveIBeenPwned API 호출용</text>

  <text xml:space="preserve" x="80" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">async def</text>
  <text xml:space="preserve" x="152" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> login(username, password, ip, user_agent):</text>

  <text xml:space="preserve" x="80" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    # 1. 속도 제한: IP당 10회/분</text>
  <text xml:space="preserve" x="80" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">    if</text>
  <text xml:space="preserve" x="111" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> rate_limit_exceeded(ip, limit=</text>
  <text xml:space="preserve" x="369" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">10</text>
  <text xml:space="preserve" x="381" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">, window=</text>
  <text xml:space="preserve" x="462" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">60</text>
  <text xml:space="preserve" x="474" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">):</text>
  <text xml:space="preserve" x="80" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">        raise</text>
  <text xml:space="preserve" x="153" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> TooManyRequestsError(</text>
  <text xml:space="preserve" x="321" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"429"</text>
  <text xml:space="preserve" x="360" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>

  <text xml:space="preserve" x="80" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    # 2. 유출 비밀번호 확인 (k-anonymity)</text>
  <text xml:space="preserve" x="80" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">    if await</text>
  <text xml:space="preserve" x="153" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> is_pwned_password(password):</text>
  <text xml:space="preserve" x="80" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">        return</text>
  <text xml:space="preserve" x="153" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> force_password_reset_response()</text>

  <text xml:space="preserve" x="80" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    # 3. 이상 로그인 신호 감지</text>
  <text xml:space="preserve" x="80" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    risk = compute_risk_score(username, ip, user_agent)</text>
  <text xml:space="preserve" x="80" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">    if</text>
  <text xml:space="preserve" x="111" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> risk &gt;</text>
  <text xml:space="preserve" x="162" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8"> 0.7</text>
  <text xml:space="preserve" x="196" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">:</text>
  <text xml:space="preserve" x="80" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">        return</text>
  <text xml:space="preserve" x="153" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> challenge_mfa_response()</text>

  <text xml:space="preserve" x="80" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    # 4. 정상 인증 처리</text>
  <text xml:space="preserve" x="80" y="434" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">    return</text>
  <text xml:space="preserve" x="138" y="434" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> authenticate_user(username, password)</text>
</svg>
