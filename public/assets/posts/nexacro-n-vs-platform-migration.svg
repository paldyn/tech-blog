<svg width="880" viewBox="0 0 880 578"
     xmlns="http://www.w3.org/2000/svg"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <!-- Background -->
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle"
        font-size="22" font-weight="700" fill="#e8e8e8">Platform → N 마이그레이션 체크포인트</text>
  <text x="440" y="70" text-anchor="middle"
        font-size="14" fill="#888">확인·수정 필요 항목 vs 그대로 사용 가능한 항목</text>

  <!-- ========== Top Section: Breaking / Check Points ========== -->
  <rect x="60" y="88" width="760" height="192"
        fill="#110710" stroke="#3d1a1a" stroke-width="1.5" rx="8"/>

  <!-- Section header -->
  <rect x="60" y="88" width="760" height="36"
        fill="#1e0a0a" stroke="#3d1a1a" stroke-width="0" rx="8"/>
  <rect x="60" y="112" width="760" height="12" fill="#1e0a0a"/>
  <text x="80" y="112" font-size="14" font-weight="700" fill="#e05555">⚠  확인·수정 필요 항목 (Platform → N 전환 시)</text>

  <!-- 4 items, 2 per row -->
  <!-- Row 1: y=134 -->
  <!-- Item 1: left (x=80 to x=400) -->
  <rect x="80" y="130" width="310" height="62"
        fill="#0c0406" stroke="#3d1a1a" stroke-width="1" rx="5"/>
  <text x="100" y="150" font-size="13" font-weight="600" fill="#e8e8e8">IE11 종속 코드 제거</text>
  <text x="100" y="168" font-size="11" fill="#888">IE 전용 조건문·ActiveX 객체 호출 제거</text>
  <text x="100" y="184" font-size="11" fill="#e05555">모던 브라우저만 지원함 (Chrome 필수)</text>

  <!-- Item 2: right (x=450 to x=780) -->
  <rect x="450" y="130" width="310" height="62"
        fill="#0c0406" stroke="#3d1a1a" stroke-width="1" rx="5"/>
  <text x="470" y="150" font-size="13" font-weight="600" fill="#e8e8e8">deprecated 컴포넌트 교체</text>
  <text x="470" y="168" font-size="11" fill="#888">XPSpreadsheet 등 일부 컴포넌트 미지원</text>
  <text x="470" y="184" font-size="11" fill="#e05555">Grid·Chart로 대체 작업 필요</text>

  <!-- Row 2: y=200 -->
  <!-- Item 3: left -->
  <rect x="80" y="202" width="310" height="62"
        fill="#0c0406" stroke="#3d1a1a" stroke-width="1" rx="5"/>
  <text x="100" y="222" font-size="13" font-weight="600" fill="#e8e8e8">폰트·스타일 파일 재검증</text>
  <text x="100" y="240" font-size="11" fill="#888">Platform 스타일 파일 일부 호환 안 됨</text>
  <text x="100" y="256" font-size="11" fill="#e05555">CSS 클래스명 변경 사항 확인 필수</text>

  <!-- Item 4: right -->
  <rect x="450" y="202" width="310" height="62"
        fill="#0c0406" stroke="#3d1a1a" stroke-width="1" rx="5"/>
  <text x="470" y="222" font-size="13" font-weight="600" fill="#e8e8e8">environment.xml 재설정</text>
  <text x="470" y="240" font-size="11" fill="#888">서비스 URL·TypeDef 경로 재매핑</text>
  <text x="470" y="256" font-size="11" fill="#e05555">Studio N에서 프로젝트 재구성</text>

  <!-- Transition arrow between sections -->
  <!-- Gap: y=280 to y=316 (36px). Using solid polygon -->
  <polygon points="436,281 444,281 444,303 454,303 440,316 426,303 436,303"
           fill="#555" stroke="#0a0a0a" stroke-width="1" stroke-linejoin="round"/>

  <!-- ========== Bottom Section: Backward Compatible ========== -->
  <rect x="60" y="318" width="760" height="192"
        fill="#070e07" stroke="#1a3d1a" stroke-width="1.5" rx="8"/>

  <!-- Section header -->
  <rect x="60" y="318" width="760" height="36"
        fill="#061306" stroke="#1a3d1a" stroke-width="0" rx="8"/>
  <rect x="60" y="342" width="760" height="12" fill="#061306"/>
  <text x="80" y="342" font-size="14" font-weight="700" fill="#55c555">✓  하위 호환 (Platform 코드 그대로 사용 가능)</text>

  <!-- 4 items, 2 per row -->
  <!-- Item 1: left -->
  <rect x="80" y="360" width="310" height="62"
        fill="#050c05" stroke="#1a3d1a" stroke-width="1" rx="5"/>
  <text x="100" y="380" font-size="13" font-weight="600" fill="#e8e8e8">transaction() API 완전 동일</text>
  <text x="100" y="398" font-size="11" fill="#888">6개 인자 구조·콜백 패턴 그대로</text>
  <text x="100" y="414" font-size="11" fill="#55c555">서버 통신 코드 재작성 불필요</text>

  <!-- Item 2: right -->
  <rect x="450" y="360" width="310" height="62"
        fill="#050c05" stroke="#1a3d1a" stroke-width="1" rx="5"/>
  <text x="470" y="380" font-size="13" font-weight="600" fill="#e8e8e8">Dataset API 동일</text>
  <text x="470" y="398" font-size="11" fill="#888">addRow · getColumn · setColumn 등</text>
  <text x="470" y="414" font-size="11" fill="#55c555">데이터 조작 로직 재사용 가능</text>

  <!-- Item 3: left -->
  <rect x="80" y="432" width="310" height="62"
        fill="#050c05" stroke="#1a3d1a" stroke-width="1" rx="5"/>
  <text x="100" y="452" font-size="13" font-weight="600" fill="#e8e8e8">Form 라이프사이클 동일</text>
  <text x="100" y="470" font-size="11" fill="#888">onload · oninit · ondestroy 그대로</text>
  <text x="100" y="486" font-size="11" fill="#55c555">이벤트 핸들러 구조 재사용 가능</text>

  <!-- Item 4: right -->
  <rect x="450" y="432" width="310" height="62"
        fill="#050c05" stroke="#1a3d1a" stroke-width="1" rx="5"/>
  <text x="470" y="452" font-size="13" font-weight="600" fill="#e8e8e8">Grid 바인딩·셀 조작 동일</text>
  <text x="470" y="470" font-size="11" fill="#888">setBindDataset · getObjColumn 등</text>
  <text x="470" y="486" font-size="11" fill="#55c555">화면 로직 대부분 그대로 사용 가능</text>

  <!-- Footer -->
  <text x="440" y="534" text-anchor="middle"
        font-size="11" fill="#444">PALDYN · Nexacro N 완전 정복 시리즈</text>

</svg>
