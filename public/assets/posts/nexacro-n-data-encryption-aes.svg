<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">AES 암호화 처리 흐름 (클라이언트 ↔ 서버)</text>

  <!-- Client side -->
  <text x="220" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Nexacro 클라이언트</text>
  <text x="660" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">서버</text>

  <line x1="440" y1="88" x2="440" y2="440" stroke="#222" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Client: plaintext input -->
  <rect x="60" y="98" width="240" height="56" rx="8" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">평문 입력값</text>
  <text x="180" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">주민번호, 카드번호 등</text>

  <!-- Arrow down -->
  <line x1="180" y1="154" x2="180" y2="180" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Client: AES encrypt -->
  <rect x="60" y="186" width="240" height="56" rx="8" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">AES-256 암호화</text>
  <text x="180" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">gfn_aesEncrypt(plain, key, iv)</text>

  <!-- Arrow right: send encrypted -->
  <line x1="300" y1="214" x2="554" y2="214" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="440" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">암호화 데이터 전송</text>

  <!-- Server: decrypt -->
  <rect x="560" y="186" width="240" height="56" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="680" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">서버 복호화</text>
  <text x="680" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">AES 복호화 → DB 처리</text>

  <!-- Server: DB stored encrypted -->
  <line x1="680" y1="242" x2="680" y2="268" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <rect x="560" y="274" width="240" height="56" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="680" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">DB 저장 (컬럼 암호화)</text>
  <text x="680" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">마스킹 값 + 암호화 값 병행</text>

  <!-- Server response back -->
  <line x1="560" y1="302" x2="306" y2="302" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="440" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">마스킹 값 반환</text>

  <!-- Client: display masked -->
  <rect x="60" y="278" width="240" height="56" rx="8" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">마스킹 표시</text>
  <text x="180" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">910101-*******</text>

  <!-- Code box -->
  <rect x="60" y="356" width="760" height="104" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="376" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// AES-256 CBC 암호화 (CryptoJS 활용)</text>
  <text x="80" y="396" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> gfn_aesEncrypt(plain, key, iv) {</tspan>
  </text>
  <text x="80" y="416" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  </tspan>
    <tspan fill="#7ec8e3" font-weight="600">var</tspan>
    <tspan fill="#ffffff"> k = CryptoJS.enc.Utf8.parse(key);</tspan>
  </text>
  <text x="80" y="436" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  </tspan>
    <tspan fill="#7ec8e3" font-weight="600">var</tspan>
    <tspan fill="#ffffff"> encrypted = CryptoJS.AES.encrypt(plain, k, {</tspan>
  </text>
  <text x="80" y="456" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    iv: CryptoJS.enc.Utf8.parse(iv), mode: CryptoJS.mode.CBC</tspan>
  </text>
</svg>
