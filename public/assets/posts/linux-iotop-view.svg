<svg width="880" height="440" viewBox="0 0 880 440" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">iotop — 프로세스별 I/O 실시간 모니터링</text>

  <!-- iotop terminal mockup -->
  <rect x="60" y="68" width="760" height="220" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Terminal title bar -->
  <rect x="60" y="68" width="760" height="26" rx="8" fill="#111111"/>
  <rect x="60" y="80" width="760" height="14" fill="#111111"/>
  <text x="440" y="86" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">iotop</text>

  <!-- Header line -->
  <text x="76" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">Total DISK READ:   48.52 MB/s | Total DISK WRITE:  12.30 MB/s</text>
  <text x="76" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">  TID  PRIO  USER  DISK READ   DISK WRITE  SWAPIN     IO&gt;    COMMAND</text>

  <!-- Process rows -->
  <rect x="62" y="134" width="756" height="18" fill="#0a1a0a"/>
  <text x="76" y="147" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">  234  be/4  root    <tspan fill="#ffffff">45.21 MB/s</tspan>      0.00 B/s  0.00%  <tspan fill="#ffffff">82.5%</tspan>  dd if=/dev/sda</text>

  <text x="76" y="167" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff"> 1892  be/4  mysql    0.00 B/s   <tspan fill="#7ec8e3">12.30 MB/s</tspan>  0.00%   <tspan fill="#7ec8e3">15.2%</tspan>  mysqld</text>

  <text x="76" y="185" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff"> 4521  be/4  www      1.02 MB/s    256.0 K/s  0.00%    2.1%  nginx</text>

  <text x="76" y="203" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff"> 8812  be/4  user     128.0 K/s     0.00 B/s  0.00%    0.8%  python3 app.py</text>

  <text x="76" y="221" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">   ...  idle tasks ...</text>
  <text x="76" y="239" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">  Press o to show only active I/O tasks  |  Press q to quit</text>
  <text x="76" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">  Press a to toggle accumulate | p PID order | d delay | h help</text>

  <!-- Key shortcuts -->
  <text x="440" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">주요 단축키와 옵션</text>

  <rect x="60" y="334" width="760" height="76" rx="8" fill="#0d0d0d" stroke="#2a2a2a" stroke-width="1"/>
  <text x="80" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• <tspan fill="#7ec8e3" font-weight="600">-o</tspan> (--only) — I/O 중인 프로세스만 표시   <tspan fill="#7ec8e3" font-weight="600">-d 2</tspan> — 2초 갱신 주기</text>
  <text x="80" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• <tspan fill="#7ec8e3" font-weight="600">-u root</tspan> — 특정 사용자만 필터   <tspan fill="#7ec8e3" font-weight="600">-p 1234</tspan> — 특정 PID만</text>
  <text x="80" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• <tspan fill="#7ec8e3" font-weight="600">-a</tspan> — 누적 I/O 표시   <tspan fill="#7ec8e3" font-weight="600">-b</tspan> — 배치 모드(스크립트용)   <tspan fill="#7ec8e3" font-weight="600">-n 5</tspan> — 5회 후 종료</text>
</svg>
