<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SQL 데이터 타입 — 숫자 · 문자열 · 불리언</text>

  <!-- Numeric column -->
  <rect x="60" y="70" width="230" height="380" fill="#111827" rx="10" stroke="#3a4a6e" stroke-width="1.5"/>
  <rect x="60" y="70" width="230" height="38" fill="#1e3a5f" rx="10"/>
  <rect x="60" y="96" width="230" height="12" fill="#1e3a5f"/>
  <text x="175" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">숫자 타입</text>

  <text x="78" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">정수</text>
  <text x="78" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">SMALLINT</text>
  <text x="175" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">-32768 ~ 32767 (2B)</text>
  <text x="78" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">INTEGER / INT</text>
  <text x="175" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">±2.1억 (4B)</text>
  <text x="78" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">BIGINT</text>
  <text x="175" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">±920경 (8B)</text>

  <line x1="78" y1="196" x2="272" y2="196" stroke="#3a4a6e" stroke-width="1"/>
  <text x="78" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">근사 소수</text>
  <text x="78" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">REAL / FLOAT4</text>
  <text x="175" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">4B IEEE 754</text>
  <text x="78" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">DOUBLE / FLOAT8</text>
  <text x="175" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">8B IEEE 754</text>
  <text x="78" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#e05555">⚠ 금액 계산에 사용 금지</text>

  <line x1="78" y1="276" x2="272" y2="276" stroke="#3a4a6e" stroke-width="1"/>
  <text x="78" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">정밀 소수</text>
  <text x="78" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">NUMERIC(p, s)</text>
  <text x="78" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">p: 전체 자릿수, s: 소수점 이하</text>
  <text x="78" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">DECIMAL(p, s)와 동일</text>
  <text x="78" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">✓ 금액·환율 등 정밀도 필요 시</text>
  <text x="78" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">예: NUMERIC(12, 2) = 최대 10자리.2소수</text>

  <!-- String column -->
  <rect x="320" y="70" width="230" height="380" fill="#111827" rx="10" stroke="#3a4a6e" stroke-width="1.5"/>
  <rect x="320" y="70" width="230" height="38" fill="#1e3a5f" rx="10"/>
  <rect x="320" y="96" width="230" height="12" fill="#1e3a5f"/>
  <text x="435" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">문자열 타입</text>

  <text x="338" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">CHAR(n)</text>
  <text x="338" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">고정 길이. 부족하면 공백 패딩</text>
  <text x="338" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">예: CHAR(2) — 국가 코드, 성별 코드</text>

  <line x1="338" y1="174" x2="532" y2="174" stroke="#3a4a6e" stroke-width="1"/>
  <text x="338" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">VARCHAR(n)</text>
  <text x="338" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">가변 길이, 최대 n문자</text>
  <text x="338" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">예: VARCHAR(100) — 이름, 이메일</text>
  <text x="338" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">✓ 가장 일반적인 문자열 타입</text>

  <line x1="338" y1="254" x2="532" y2="254" stroke="#3a4a6e" stroke-width="1"/>
  <text x="338" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">TEXT</text>
  <text x="338" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">길이 제한 없는 텍스트</text>
  <text x="338" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">PostgreSQL: 표준. Oracle: CLOB 사용</text>

  <line x1="338" y1="318" x2="532" y2="318" stroke="#3a4a6e" stroke-width="1"/>
  <text x="338" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">문자 집합 주의</text>
  <text x="338" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">한국어: UTF-8 권장</text>
  <text x="338" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">VARCHAR(100) = 100문자</text>
  <text x="338" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">(UTF-8에서 한글은 3바이트)</text>
  <text x="338" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">바이트≠문자 수 혼동 주의</text>
  <text x="338" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888"> </text>

  <!-- Boolean / Binary column -->
  <rect x="580" y="70" width="240" height="380" fill="#111827" rx="10" stroke="#3a4a6e" stroke-width="1.5"/>
  <rect x="580" y="70" width="240" height="38" fill="#1e3a5f" rx="10"/>
  <rect x="580" y="96" width="240" height="12" fill="#1e3a5f"/>
  <text x="700" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">불리언 · 이진 타입</text>

  <text x="598" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">불리언</text>
  <text x="598" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">BOOLEAN</text>
  <text x="598" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">TRUE / FALSE / NULL</text>
  <text x="598" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">PostgreSQL: 표준 지원</text>
  <text x="598" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">Oracle: NUMBER(1) 또는 CHAR(1)</text>
  <text x="598" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">MySQL: TINYINT(1) 관례</text>

  <line x1="598" y1="226" x2="802" y2="226" stroke="#3a4a6e" stroke-width="1"/>
  <text x="598" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">이진 데이터</text>
  <text x="598" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">BYTEA</text>
  <text x="598" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">PostgreSQL 바이너리</text>
  <text x="598" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">BLOB / VARBINARY</text>
  <text x="598" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">MySQL·Oracle 이진 대용량</text>

  <line x1="598" y1="328" x2="802" y2="328" stroke="#3a4a6e" stroke-width="1"/>
  <text x="598" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">선택 가이드</text>
  <text x="598" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">ID/개수 → INT / BIGINT</text>
  <text x="598" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">금액/환율 → NUMERIC(p,s)</text>
  <text x="598" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">이름/설명 → VARCHAR(n)</text>
  <text x="598" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">긴 텍스트 → TEXT / CLOB</text>
  <text x="598" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">과학값 → DOUBLE만 허용</text>
</svg>
