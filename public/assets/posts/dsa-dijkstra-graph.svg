<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-gray" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#555"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">다익스트라 알고리즘 — 최단 경로 탐색</text>

  <!-- Subtitle -->
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">A → F 최단 거리: A→C→D→E→F = 6</text>

  <!-- === GRAPH EDGES (gray = normal, green = shortest path) === -->
  <!-- A→B (weight 4) -->
  <line x1="154" y1="224" x2="258" y2="148" stroke="#555" stroke-width="2" marker-end="url(#arr-gray)"/>
  <text x="195" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">4</text>

  <!-- A→C (weight 2) — shortest path -->
  <line x1="154" y1="264" x2="258" y2="348" stroke="#55c555" stroke-width="2.5" marker-end="url(#arr-green)"/>
  <text x="196" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#55c555" text-anchor="middle" font-weight="600">2</text>

  <!-- B→D (weight 3) -->
  <line x1="306" y1="148" x2="418" y2="228" stroke="#555" stroke-width="2" marker-end="url(#arr-gray)"/>
  <text x="368" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">3</text>

  <!-- B→E (weight 5) -->
  <line x1="322" y1="126" x2="558" y2="126" stroke="#555" stroke-width="2" marker-end="url(#arr-gray)"/>
  <text x="440" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">5</text>

  <!-- C→D (weight 1) — shortest path -->
  <line x1="306" y1="366" x2="418" y2="272" stroke="#55c555" stroke-width="2.5" marker-end="url(#arr-green)"/>
  <text x="356" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#55c555" text-anchor="middle" font-weight="600">1</text>

  <!-- C→F (weight 8) -->
  <line x1="306" y1="380" x2="558" y2="388" stroke="#555" stroke-width="2" marker-end="url(#arr-gray)"/>
  <text x="432" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">8</text>

  <!-- D→E (weight 2) — shortest path -->
  <line x1="466" y1="240" x2="558" y2="142" stroke="#55c555" stroke-width="2.5" marker-end="url(#arr-green)"/>
  <text x="520" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#55c555" text-anchor="middle" font-weight="600">2</text>

  <!-- D→F (weight 4) -->
  <line x1="460" y1="264" x2="558" y2="366" stroke="#555" stroke-width="2" marker-end="url(#arr-gray)"/>
  <text x="516" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">4</text>

  <!-- E→F (weight 1) — shortest path -->
  <line x1="588" y1="148" x2="588" y2="358" stroke="#55c555" stroke-width="2.5" marker-end="url(#arr-green)"/>
  <text x="614" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#55c555" text-anchor="middle" font-weight="600">1</text>

  <!-- === NODES === -->
  <!-- Node A (source) -->
  <circle cx="140" cy="244" r="28" fill="#1a3a5e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="140" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#7ec8e3" text-anchor="middle">A</text>
  <text x="140" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">dist=0</text>

  <!-- Node B -->
  <circle cx="290" cy="128" r="28" fill="#1a2a1a" stroke="#555" stroke-width="2"/>
  <text x="290" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#e8e8e8" text-anchor="middle">B</text>
  <text x="290" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">dist=4</text>

  <!-- Node C (on shortest path) -->
  <circle cx="290" cy="370" r="28" fill="#1a3a1a" stroke="#55c555" stroke-width="2"/>
  <text x="290" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#55c555" text-anchor="middle">C</text>
  <text x="290" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">dist=2</text>

  <!-- Node D (on shortest path) -->
  <circle cx="442" cy="250" r="28" fill="#1a3a1a" stroke="#55c555" stroke-width="2"/>
  <text x="442" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#55c555" text-anchor="middle">D</text>
  <text x="442" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">dist=3</text>

  <!-- Node E (on shortest path) -->
  <circle cx="590" cy="130" r="28" fill="#1a3a1a" stroke="#55c555" stroke-width="2"/>
  <text x="590" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#55c555" text-anchor="middle">E</text>
  <text x="590" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">dist=5</text>

  <!-- Node F (destination) -->
  <circle cx="590" cy="386" r="28" fill="#3a1a1a" stroke="#e05555" stroke-width="2"/>
  <text x="590" y="391" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#e05555" text-anchor="middle">F</text>
  <text x="590" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">dist=6</text>

  <!-- Legend -->
  <rect x="680" y="200" width="170" height="110" fill="#111" rx="8" stroke="#333" stroke-width="1"/>
  <text x="765" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">범례</text>
  <line x1="696" y1="242" x2="726" y2="242" stroke="#55c555" stroke-width="2.5"/>
  <text x="736" y="247" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">최단 경로</text>
  <line x1="696" y1="266" x2="726" y2="266" stroke="#555" stroke-width="2"/>
  <text x="736" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">일반 간선</text>
  <circle cx="709" cy="292" r="8" fill="#1a3a5e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="736" y="297" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">출발 노드</text>

  <!-- Distance table -->
  <rect x="680" y="330" width="170" height="160" fill="#111" rx="8" stroke="#333" stroke-width="1"/>
  <text x="765" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">최단 거리</text>
  <text x="700" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">A: 0</text>
  <text x="780" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">B: 4</text>
  <text x="700" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">C: 2</text>
  <text x="780" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">D: 3</text>
  <text x="700" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">E: 5</text>
  <text x="780" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">F: 6</text>
  <line x1="696" y1="428" x2="840" y2="428" stroke="#333" stroke-width="1"/>
  <text x="765" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">초록 = 최단 경로 상</text>

  <!-- Source label -->
  <text x="140" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">출발</text>
  <!-- Dest label -->
  <text x="590" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">도착</text>
</svg>
