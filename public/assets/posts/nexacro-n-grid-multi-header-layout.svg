<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Grid 다중 헤더 구조</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">HeadLine · colspan · rowspan으로 계층 헤더 구성</text>

  <!-- Grid mock -->
  <rect x="60" y="90" width="760" height="290" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1.5"/>

  <!-- Head row 1: 기본정보(colspan=2) | 인사정보(colspan=3) | 급여(rowspan=2) -->
  <!-- Row 1 height: 40px -->
  <rect x="60" y="90" width="760" height="42" fill="#1a2744" rx="8"/>
  <rect x="60" y="112" width="760" height="20" fill="#1a2744"/>

  <!-- 기본정보 (spans col 0-1, width=250px) -->
  <rect x="62" y="92" width="248" height="38" fill="#1e3060" rx="4"/>
  <text x="186" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">기본정보</text>
  <text x="186" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">colspan=2</text>

  <!-- 인사정보 (spans col 2-4, width=340px) -->
  <rect x="312" y="92" width="338" height="38" fill="#1e3a22" rx="4"/>
  <text x="481" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">인사정보</text>
  <text x="481" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">colspan=3</text>

  <!-- 급여 (rowspan=2, spans both head rows, col 5) -->
  <rect x="652" y="92" width="166" height="78" fill="#2e2040" rx="4"/>
  <text x="735" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">급여</text>
  <text x="735" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">rowspan=2</text>

  <!-- Divider line between head rows -->
  <line x1="60" y1="132" x2="650" y2="132" stroke="#253555" stroke-width="1"/>

  <!-- Head row 2: 사번 | 성명 | 부서 | 직급 | 입사일 | (급여 already spanned) -->
  <rect x="60" y="132" width="760" height="38" fill="#1a2744"/>
  <rect x="62" y="134" width="122" height="34" fill="#1d2d5a" rx="3"/>
  <text x="123" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">사번</text>
  <rect x="186" y="134" width="122" height="34" fill="#1d2d5a" rx="3"/>
  <text x="247" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">성명</text>
  <rect x="310" y="134" width="112" height="34" fill="#1d3820" rx="3"/>
  <text x="366" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">부서</text>
  <rect x="424" y="134" width="112" height="34" fill="#1d3820" rx="3"/>
  <text x="480" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">직급</text>
  <rect x="538" y="134" width="112" height="34" fill="#1d3820" rx="3"/>
  <text x="594" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">입사일</text>

  <!-- Divider line at head bottom -->
  <line x1="60" y1="170" x2="820" y2="170" stroke="#253555" stroke-width="1.5"/>

  <!-- Body rows -->
  <rect x="60" y="170" width="760" height="36" fill="#0e1420"/>
  <text x="123" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">E001</text>
  <text x="247" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">홍길동</text>
  <text x="366" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">개발팀</text>
  <text x="480" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">과장</text>
  <text x="594" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">2020-03-02</text>
  <text x="735" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">4,500,000</text>
  <line x1="60" y1="206" x2="820" y2="206" stroke="#1a2030" stroke-width="1"/>

  <rect x="60" y="206" width="760" height="36" fill="#111827"/>
  <text x="123" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">E002</text>
  <text x="247" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">김철수</text>
  <text x="366" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">기획팀</text>
  <text x="480" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">대리</text>
  <text x="594" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">2022-07-11</text>
  <text x="735" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">3,800,000</text>
  <line x1="60" y1="242" x2="820" y2="242" stroke="#1a2030" stroke-width="1"/>

  <!-- Annotation: HeadLine 1, HeadLine 2 -->
  <line x1="30" y1="111" x2="58" y2="111" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="28" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="end">HeadLine 0</text>
  <line x1="30" y1="151" x2="58" y2="151" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="28" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="end">HeadLine 1</text>

  <!-- Column separators -->
  <line x1="186" y1="132" x2="186" y2="380" stroke="#1a2030" stroke-width="1"/>
  <line x1="310" y1="90" x2="310" y2="380" stroke="#1a2030" stroke-width="1"/>
  <line x1="424" y1="132" x2="424" y2="380" stroke="#1a2030" stroke-width="1"/>
  <line x1="538" y1="132" x2="538" y2="380" stroke="#1a2030" stroke-width="1"/>
  <line x1="652" y1="90" x2="652" y2="380" stroke="#1a2030" stroke-width="1"/>

  <!-- Legend box -->
  <rect x="60" y="280" width="760" height="90" fill="#0f1520" rx="6" stroke="#1e2433"/>
  <text x="440" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">헤더 구성 규칙</text>
  <rect x="80" y="310" width="12" height="12" fill="#1e3060" rx="2"/>
  <text x="100" y="321" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">colspan: 가로 방향 여러 컬럼을 하나로 묶음</text>
  <rect x="80" y="330" width="12" height="12" fill="#2e2040" rx="2"/>
  <text x="100" y="341" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">rowspan: 세로 방향 여러 헤더 행을 하나로 묶음</text>
  <text x="80" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">colspan + rowspan은 동시에 사용할 수 없음 — 하나만 지정</text>
</svg>
