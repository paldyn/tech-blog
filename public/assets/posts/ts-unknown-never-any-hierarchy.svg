<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">TypeScript 타입 계층 — unknown · any · never</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle" xml:space="preserve">top type / bottom type / 탈출구</text>

  <!-- Top type: unknown -->
  <rect x="310" y="96" width="260" height="52" rx="8" fill="#0d0f1a" stroke="#3a3a8a" stroke-width="2"/>
  <text x="440" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7777cc" text-anchor="middle" xml:space="preserve">unknown (top type)</text>
  <text x="440" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">모든 값을 할당받을 수 있음</text>

  <!-- any: escape hatch -->
  <rect x="310" y="178" width="260" height="52" rx="8" fill="#1a1000" stroke="#5a3a00" stroke-width="2"/>
  <text x="440" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e8a020" text-anchor="middle" xml:space="preserve">any (탈출구)</text>
  <text x="440" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">타입 검사 비활성화 — 양방향 허용</text>

  <!-- Arrows from unknown/any to middle types -->
  <line x1="440" y1="148" x2="440" y2="178" stroke="#555" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Middle types -->
  <rect x="60" y="262" width="170" height="44" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="145" y="289" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">string</text>

  <rect x="255" y="262" width="170" height="44" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="340" y="289" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">number</text>

  <rect x="450" y="262" width="170" height="44" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="535" y="289" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">boolean</text>

  <rect x="645" y="262" width="175" height="44" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="732" y="289" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">object ...</text>

  <!-- Arrows from any to middle -->
  <line x1="360" y1="230" x2="145" y2="262" stroke="#5a3a00" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="400" y1="230" x2="340" y2="262" stroke="#5a3a00" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="480" y1="230" x2="535" y2="262" stroke="#5a3a00" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="520" y1="230" x2="732" y2="262" stroke="#5a3a00" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Bottom type: never -->
  <rect x="310" y="348" width="260" height="52" rx="8" fill="#1a0a0a" stroke="#5a1a1a" stroke-width="2"/>
  <text x="440" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e05555" text-anchor="middle" xml:space="preserve">never (bottom type)</text>
  <text x="440" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">어떤 값도 할당 불가 · 빈 유니언</text>

  <!-- Arrows to never -->
  <line x1="145" y1="306" x2="380" y2="348" stroke="#555" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="340" y1="306" x2="415" y2="348" stroke="#555" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="535" y1="306" x2="465" y2="348" stroke="#555" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="732" y1="306" x2="500" y2="348" stroke="#555" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Labels -->
  <text x="60" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" xml:space="preserve">unknown: 좁히기 전 사용 불가 → 안전</text>
  <text x="60" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8a020" xml:space="preserve">any: 검사 우회 → 위험하지만 점진적 채택 시 유용</text>
  <text x="60" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" xml:space="preserve">never: 도달 불가 코드 · 빈 유니언 · 완전성 검사에 활용</text>
</svg>
