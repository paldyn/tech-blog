<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Error 객체 구조 — 표준 프로퍼티</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">new Error('message')로 생성되는 객체의 모든 프로퍼티</text>

  <!-- Error object box -->
  <rect x="50" y="90" width="380" height="310" rx="8" fill="#0a0a14" stroke="#7777cc" stroke-width="2"/>
  <text x="240" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc">Error 인스턴스</text>

  <!-- Properties -->
  <rect x="66" y="128" width="348" height="34" rx="4" fill="#141428"/>
  <text x="82" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">.name</text>
  <text x="320" y="150" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">"Error"</text>
  <text x="390" y="150" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">서브클래스마다 다름</text>

  <rect x="66" y="170" width="348" height="34" rx="4" fill="#141428"/>
  <text x="82" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">.message</text>
  <text x="390" y="192" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">"에러 설명 문자열"</text>

  <rect x="66" y="212" width="348" height="34" rx="4" fill="#141428"/>
  <text x="82" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">.stack</text>
  <text x="390" y="234" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">문자열 (비표준, 사실상 표준)</text>

  <rect x="66" y="254" width="348" height="34" rx="4" fill="#141428"/>
  <text x="82" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">.cause</text>
  <text x="390" y="276" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">원인 에러 (ES2022)</text>

  <rect x="66" y="296" width="348" height="34" rx="4" fill="#141428"/>
  <text x="82" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">.toString()</text>
  <text x="390" y="318" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">"Error: 에러 설명 문자열"</text>

  <text x="240" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">내장 Error 서브클래스</text>

  <text x="82" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">TypeError  |  RangeError  |  SyntaxError</text>
  <text x="82" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">URIError  |  EvalError  |  ReferenceError</text>

  <!-- Right: stack trace visualization -->
  <rect x="460" y="90" width="370" height="310" rx="8" fill="#000000" stroke="#3a4a6e"/>
  <text x="645" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">스택 트레이스 예시</text>

  <text x="476" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">Error: 사용자 로드 실패</text>
  <text x="476" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    at fetchUser (api.js:12)</text>
  <text x="476" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    at loadDashboard (ui.js:34)</text>
  <text x="476" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    at init (app.js:8)</text>
  <text x="476" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    at &lt;anonymous&gt;:1:1</text>

  <text x="645" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">스택 파싱 예시</text>

  <text x="476" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">function</text>
  <text x="534" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> getLocation(e) {</text>
  <text x="476" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">  const</tspan><tspan fill="#ffffff"> line = e.stack</tspan></text>
  
  <text x="476" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    .split(</tspan><tspan fill="#ce9178">'\n'</tspan><tspan fill="#ffffff">)[</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">];</tspan></text>

  <text x="476" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">  return</tspan><tspan fill="#ffffff"> line?.trim();</tspan></text>
  
  <text x="476" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>

  <text x="645" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">stack 형식은 엔진마다 다름 (V8/SpiderMonkey)</text>

  <!-- Bottom note -->
  <rect x="50" y="418" width="780" height="26" rx="4" fill="#0a1020" stroke="#7777cc"/>
  <text x="440" y="436" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">Error.captureStackTrace(obj, fn) — V8 전용, fn 위의 프레임만 포함</text>
</svg>
