<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Root 모드 vs Rootless 모드 비교</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">dockerd를 root 없이 실행해 공격 표면을 줄이는 방법</text>

  <!-- Root mode -->
  <rect x="60" y="90" width="360" height="320" fill="#1a0808" stroke="#e05555" stroke-width="1.5" rx="10"/>
  <text x="240" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555">Root 모드 (기본)</text>

  <rect x="80" y="128" width="320" height="54" fill="#150606" stroke="#772222" rx="8"/>
  <text x="240" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">dockerd (root 권한으로 실행)</text>
  <text x="240" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">UID 0, /var/run/docker.sock (root 소유)</text>

  <line x1="240" y1="186" x2="240" y2="208" stroke="#555" stroke-width="1.5"/>
  <polygon points="240,212 234,202 246,202" fill="#555"/>

  <rect x="80" y="212" width="320" height="44" fill="#150606" stroke="#772222" rx="6"/>
  <text x="240" y="239" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Container (root 가능)</text>

  <text x="80" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#cc6666">⚠  dockerd 취약점 = root 탈취 가능</text>
  <text x="80" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#cc6666">⚠  docker.sock 노출 = 호스트 root와 동등</text>
  <text x="80" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#cc6666">⚠  컨테이너 내 root = 호스트에도 위험</text>
  <text x="80" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">✓  성능 최대</text>
  <text x="80" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">✓  모든 기능 사용 가능</text>
  <text x="80" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">✓  낮은 포트(80/443) 바인드 가능</text>

  <!-- Rootless mode -->
  <rect x="460" y="90" width="360" height="320" fill="#0a1a08" stroke="#55c555" stroke-width="1.5" rx="10"/>
  <text x="640" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">Rootless 모드</text>

  <rect x="480" y="128" width="320" height="54" fill="#0a1f08" stroke="#336633" rx="8"/>
  <text x="640" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">dockerd (일반 사용자 권한)</text>
  <text x="640" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">UID 1000, ~/.docker/run/docker.sock</text>

  <line x1="640" y1="186" x2="640" y2="208" stroke="#555" stroke-width="1.5"/>
  <polygon points="640,212 634,202 646,202" fill="#555"/>

  <rect x="480" y="212" width="320" height="44" fill="#0a1f08" stroke="#336633" rx="6"/>
  <text x="640" y="239" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Container (user namespace 매핑)</text>

  <text x="480" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓  dockerd 취약점 → 일반 사용자 권한만</text>
  <text x="480" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓  컨테이너 탈출 시 호스트 피해 최소화</text>
  <text x="480" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓  멀티테넌트 환경에 적합</text>
  <text x="480" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">△  일부 커널 기능 제한</text>
  <text x="480" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">△  낮은 포트 불가 (포트 포워딩 필요)</text>
  <text x="480" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">△  overlay network 일부 제한</text>

  <!-- Bottom note -->
  <text x="440" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#666">Rootless 모드는 Docker 20.10+에서 안정화됐습니다</text>
  <text x="440" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#666">보안이 중요한 CI/CD 환경, 멀티테넌트 서버에서 적극 권장됩니다</text>
</svg>
