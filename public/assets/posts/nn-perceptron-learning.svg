<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700" xml:space="preserve">퍼셉트론 학습 알고리즘 구현</text>
  <text x="440" y="70" text-anchor="middle" fill="#888" font-size="13" xml:space="preserve">퍼셉트론 수렴 정리: 선형 분리 가능한 데이터는 유한 번의 업데이트로 수렴</text>

  <!-- Code block background -->
  <rect x="60" y="88" width="760" height="258" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <!-- Code lines (18px line height, starting y=88+14=102) -->
  <!-- Line 1: import numpy as np -->
  <text x="76" y="106" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">import</tspan> numpy <tspan fill="#7ec8e3">as</tspan> np</text>
  <!-- Line 2: blank -->
  <!-- Line 3: class Perceptron: -->
  <text x="76" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">class</tspan> <tspan fill="#ffffff">Perceptron</tspan>:</text>
  <!-- Line 4: def fit -->
  <text x="76" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3">def</tspan> <tspan fill="#55c555">fit</tspan>(self, X, y, lr=<tspan fill="#b5cea8">0.1</tspan>):</text>
  <!-- Line 5: w init -->
  <text x="76" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    self.w = np.zeros(X.shape[<tspan fill="#b5cea8">1</tspan>]+<tspan fill="#b5cea8">1</tspan>)</text>
  <!-- Line 6: for epochs -->
  <text x="76" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">for</tspan> _ <tspan fill="#7ec8e3">in</tspan> range(<tspan fill="#b5cea8">100</tspan>):</text>
  <!-- Line 7: for samples -->
  <text x="76" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      <tspan fill="#7ec8e3">for</tspan> xi, yi <tspan fill="#7ec8e3">in</tspan> zip(X, y):</text>
  <!-- Line 8: append bias -->
  <text x="76" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        xi_ = np.append(xi, <tspan fill="#b5cea8">1</tspan>)</text>
  <!-- Line 9: predict -->
  <text x="76" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        <tspan fill="#9aa4b8"># 계단 함수 활성화</tspan></text>
  <!-- Line 10: yhat -->
  <text x="76" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        yh = <tspan fill="#b5cea8">1</tspan> <tspan fill="#7ec8e3">if</tspan> self.w @ xi_ &gt;= <tspan fill="#b5cea8">0</tspan> <tspan fill="#7ec8e3">else</tspan> <tspan fill="#b5cea8">0</tspan></text>
  <!-- Line 11: weight update -->
  <text x="76" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        self.w += lr * (yi - yh) * xi_</text>
  <!-- Line 12: return -->
  <text x="76" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">return</tspan> self</text>

  <!-- Update rule annotation box -->
  <rect x="60" y="362" width="340" height="64" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="230" y="385" text-anchor="middle" fill="#888" font-size="12" xml:space="preserve">가중치 업데이트 규칙</text>
  <text x="230" y="408" text-anchor="middle" fill="#e8e8e8" font-size="15" font-weight="600" xml:space="preserve">Δw = η · (y − ŷ) · x</text>

  <!-- Convergence annotation box -->
  <rect x="480" y="362" width="340" height="64" rx="8" fill="#0c1a0c" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="385" text-anchor="middle" fill="#888" font-size="12" xml:space="preserve">수렴 조건</text>
  <text x="650" y="408" text-anchor="middle" fill="#55c555" font-size="13" font-weight="600" xml:space="preserve">선형 분리 가능 → 유한 스텝 수렴</text>

  <!-- Footer -->
</svg>
