<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">LMSYS Chatbot Arena ELO 레이팅 구조</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">인간 선호도 기반 실시간 모델 랭킹</text>

  <!-- How it works -->
  <!-- Step 1: User sends prompt -->
  <rect x="60" y="96" width="140" height="60" rx="6" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">사용자가</text>
  <text x="130" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">프롬프트 입력</text>

  <line x1="200" y1="126" x2="228" y2="126" stroke="#555" stroke-width="2" marker-end="url(#d)"/>

  <!-- Step 2: Two anonymous models -->
  <rect x="230" y="90" width="140" height="72" rx="6" fill="#111827" stroke="#888" stroke-width="1.5"/>
  <text x="300" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">모델 A (익명)</text>
  <text x="300" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">답변 생성</text>
  <text x="300" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">실제 모델명 숨김</text>

  <line x1="370" y1="126" x2="398" y2="126" stroke="#555" stroke-width="2" marker-end="url(#d)"/>

  <!-- Step 3: User votes -->
  <rect x="400" y="96" width="140" height="60" rx="6" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="470" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">사용자가</text>
  <text x="470" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">더 나은 답 선택</text>
  <text x="470" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">또는 동점/모두 나쁨</text>

  <line x1="540" y1="126" x2="568" y2="126" stroke="#555" stroke-width="2" marker-end="url(#d)"/>

  <!-- Step 4: ELO update -->
  <rect x="570" y="96" width="140" height="60" rx="6" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">ELO 점수</text>
  <text x="640" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">업데이트</text>

  <line x1="710" y1="126" x2="738" y2="126" stroke="#555" stroke-width="2" marker-end="url(#d)"/>

  <!-- Step 5: Ranking -->
  <rect x="740" y="96" width="100" height="60" rx="6" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="790" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">실시간</text>
  <text x="790" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">랭킹 갱신</text>

  <defs>
    <marker id="d" markerWidth="18.6667" markerHeight="14" refX="18.6667" refY="7" orient="auto">
      <polygon points="0 0, 18.6667 7, 0 14" fill="#555"/>
    </marker>
  </defs>

  <!-- Sample ELO rankings -->
  <rect x="60" y="196" width="760" height="180" rx="8" fill="#0d1117" stroke="#333" stroke-width="1"/>
  <text x="84" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8">ELO 레이팅 개념 이해 (예시)</text>
  <text x="84" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">체스 ELO와 동일한 원리: 예상 승률 대비 실제 승패로 점수 증감</text>

  <!-- Bar chart -->
  <text x="84" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ELO 1350+</text>
  <rect x="180" y="262" width="300" height="16" rx="3" fill="#7777cc"/>
  <text x="490" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">최상위 모델군 (GPT-4o, Claude 3.5 등)</text>

  <text x="84" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ELO 1200~</text>
  <rect x="180" y="290" width="210" height="16" rx="3" fill="#55c555"/>
  <text x="400" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">중상위 (LLaMA 3 70B, Qwen 2.5 등)</text>

  <text x="84" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ELO 1000~</text>
  <rect x="180" y="318" width="140" height="16" rx="3" fill="#7ec8e3"/>
  <text x="330" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">중위 (7B~13B 오픈소스 등)</text>

  <text x="84" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">장점: 실제 사용자 선호 반영 / 단점: 영어 편향, 특정 주제 편향 가능성</text>
</svg>
