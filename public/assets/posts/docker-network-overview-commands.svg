<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" style="background:#0a0a0a;border-radius:12px;font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">Docker 네트워크 기본 명령어</text>
  <text x="440" y="68" text-anchor="middle" fill="#888" font-size="13">docker network 서브커맨드 한눈에 보기</text>

  <!-- Left column: commands list -->
  <rect x="60" y="90" width="340" height="300" rx="8" fill="#070b14" stroke="#1e2433"/>
  <text x="80" y="118" fill="#888" font-size="12" xml:space="preserve"># 네트워크 관리 핵심 명령어</text>
  <text x="80" y="136" fill="#7ec8e3" font-size="12" xml:space="preserve">docker network ls</text>
  <text x="80" y="154" fill="#7ec8e3" font-size="12" xml:space="preserve">docker network inspect &lt;name&gt;</text>
  <text x="80" y="172" fill="#7ec8e3" font-size="12" xml:space="preserve">docker network create &lt;name&gt;</text>
  <text x="80" y="190" fill="#7ec8e3" font-size="12" xml:space="preserve">docker network rm &lt;name&gt;</text>
  <text x="80" y="208" fill="#7ec8e3" font-size="12" xml:space="preserve">docker network prune</text>
  <line x1="80" y1="222" x2="380" y2="222" stroke="#1e2433" stroke-width="1"/>
  <text x="80" y="242" fill="#888" font-size="12" xml:space="preserve"># 컨테이너 연결·해제</text>
  <text x="80" y="260" fill="#7ec8e3" font-size="12" xml:space="preserve">docker network connect \</text>
  <text x="80" y="278" fill="#7ec8e3" font-size="12" xml:space="preserve">  &lt;network&gt; &lt;container&gt;</text>
  <text x="80" y="296" fill="#7ec8e3" font-size="12" xml:space="preserve">docker network disconnect \</text>
  <text x="80" y="314" fill="#7ec8e3" font-size="12" xml:space="preserve">  &lt;network&gt; &lt;container&gt;</text>
  <text x="80" y="342" fill="#888" font-size="12" xml:space="preserve"># 실행 시 네트워크 지정</text>
  <text x="80" y="360" fill="#7ec8e3" font-size="12" xml:space="preserve">docker run --network &lt;name&gt;</text>
  <text x="80" y="378" fill="#7ec8e3" font-size="12" xml:space="preserve">  --name myapp myimage</text>

  <!-- Right column: output example -->
  <rect x="480" y="90" width="340" height="300" rx="8" fill="#070b14" stroke="#1e2433"/>
  <text x="500" y="118" fill="#888" font-size="12" xml:space="preserve"># docker network ls 출력 예시</text>
  <text x="500" y="136" fill="#e8e8e8" font-size="12" xml:space="preserve">NETWORK ID   NAME</text>
  <text x="500" y="154" fill="#e8e8e8" font-size="12" xml:space="preserve">  DRIVER   SCOPE</text>
  <text x="500" y="172" fill="#b5cea8" font-size="12" xml:space="preserve">abc123       bridge</text>
  <text x="500" y="190" fill="#b5cea8" font-size="12" xml:space="preserve">  bridge   local</text>
  <text x="500" y="208" fill="#b5cea8" font-size="12" xml:space="preserve">def456       host</text>
  <text x="500" y="226" fill="#b5cea8" font-size="12" xml:space="preserve">  host     local</text>
  <text x="500" y="244" fill="#b5cea8" font-size="12" xml:space="preserve">ghi789       none</text>
  <text x="500" y="262" fill="#b5cea8" font-size="12" xml:space="preserve">  null     local</text>
  <line x1="500" y1="278" x2="800" y2="278" stroke="#1e2433" stroke-width="1"/>
  <text x="500" y="298" fill="#888" font-size="12" xml:space="preserve"># 기본 3개 네트워크는 삭제 불가</text>
  <text x="500" y="316" fill="#888" font-size="12" xml:space="preserve"># bridge = docker0 브리지</text>
  <text x="500" y="334" fill="#888" font-size="12" xml:space="preserve"># host   = 호스트 네트워크 스택</text>
  <text x="500" y="352" fill="#888" font-size="12" xml:space="preserve"># none   = 완전 격리 (loopback)</text>
  <text x="500" y="378" fill="#55c555" font-size="12" xml:space="preserve"># 사용자 정의 네트워크 추천!</text>
</svg>
