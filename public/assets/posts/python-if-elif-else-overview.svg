<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">if / elif / else 실행 흐름</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#aaaaaa" text-anchor="middle">Python 조건문 분기 구조</text>

  <!-- START -->
  <rect x="340" y="92" width="200" height="44" rx="22" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">실행 시작</text>

  <!-- Arrow down -->
  <line x1="440" y1="136" x2="440" y2="158" stroke="#555" stroke-width="2"/>
  <polygon points="440,162 435,152 445,152" fill="#555"/>

  <!-- IF condition diamond -->
  <polygon points="440,162 540,200 440,238 340,200" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">if 조건</text>
  <text x="440" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">참 / 거짓?</text>

  <!-- True branch left -->
  <line x1="340" y1="200" x2="210" y2="200" stroke="#55c555" stroke-width="2"/>
  <polygon points="206,200 216,195 216,205" fill="#55c555"/>
  <text x="275" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">True</text>

  <!-- IF block -->
  <rect x="80" y="174" width="126" height="52" rx="8" fill="#0d2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="143" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">if 블록 실행</text>
  <text x="143" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">조건 참일 때</text>

  <!-- False branch down from if -->
  <line x1="440" y1="238" x2="440" y2="260" stroke="#e05555" stroke-width="2"/>
  <polygon points="440,264 435,254 445,254" fill="#e05555"/>
  <text x="456" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">False</text>

  <!-- ELIF condition diamond -->
  <polygon points="440,264 540,302 440,340 340,302" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">elif 조건</text>
  <text x="440" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">참 / 거짓?</text>

  <!-- True branch right for elif -->
  <line x1="540" y1="302" x2="670" y2="302" stroke="#55c555" stroke-width="2"/>
  <polygon points="674,302 664,297 664,307" fill="#55c555"/>
  <text x="607" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">True</text>

  <!-- ELIF block -->
  <rect x="674" y="276" width="126" height="52" rx="8" fill="#0d2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="737" y="299" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">elif 블록 실행</text>
  <text x="737" y="317" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">조건 참일 때</text>

  <!-- False branch down from elif -->
  <line x1="440" y1="340" x2="440" y2="362" stroke="#e05555" stroke-width="2"/>
  <polygon points="440,366 435,356 445,356" fill="#e05555"/>
  <text x="456" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">False</text>

  <!-- ELSE block -->
  <rect x="354" y="366" width="172" height="52" rx="8" fill="#2a1a0d" stroke="#e8a838" stroke-width="1.5"/>
  <text x="440" y="389" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8a838" text-anchor="middle">else 블록 실행</text>
  <text x="440" y="407" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">모든 조건 거짓일 때</text>

  <!-- Merge arrows down to END -->
  <!-- from if block down -->
  <line x1="143" y1="226" x2="143" y2="462" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="143" y1="462" x2="380" y2="462" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- from elif block down -->
  <line x1="737" y1="328" x2="737" y2="462" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="737" y1="462" x2="500" y2="462" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- from else block down -->
  <line x1="440" y1="418" x2="440" y2="462" stroke="#555" stroke-width="1.5"/>

  <!-- END -->
  <polygon points="440,466 500,462 440,458 380,462" fill="#1a1a2e" stroke="#555" stroke-width="1"/>
  <rect x="340" y="464" width="200" height="40" rx="20" fill="#1a1a2e" stroke="#555" stroke-width="1.5"/>
  <text x="440" y="488" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">다음 코드 계속</text>

  <!-- Note: multiple elif -->
  <text x="440" y="508" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">* elif는 0개 이상, else는 선택 사항</text>
</svg>
