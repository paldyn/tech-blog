<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="340" rx="12" fill="#0a0a0a"/>
  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">신뢰 경계로 도구를 나눈다</text>

  <!-- left: pickle -->
  <rect x="60" y="85" width="360" height="215" rx="10" fill="#1a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="84" y="127" font-size="16" font-weight="600" fill="#e05555">pickle — 내부 데이터만</text>
  <text x="84" y="161" font-size="13" fill="#cccccc">· 파이썬 객체를 그대로 저장</text>
  <text x="84" y="195" font-size="13" fill="#cccccc">· 캐시·내가 만든 파일에는 OK</text>
  <text x="84" y="229" font-size="13" fill="#cccccc">· 네트워크 입력엔 위험</text>
  <text x="84" y="263" font-size="13" fill="#e05555">✗ 외부에서 받은 데이터 금지</text>

  <!-- right: json -->
  <rect x="460" y="85" width="360" height="215" rx="10" fill="#101a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="484" y="127" font-size="16" font-weight="600" fill="#55c555">json — 외부 데이터</text>
  <text x="484" y="161" font-size="13" fill="#cccccc">· 순수 데이터만 표현</text>
  <text x="484" y="195" font-size="13" fill="#cccccc">· 코드 실행 경로가 없음</text>
  <text x="484" y="229" font-size="13" fill="#cccccc">· API·설정 파일에 적합</text>
  <text x="484" y="263" font-size="13" fill="#55c555">✔ 신뢰할 수 없는 입력에 안전</text>
</svg>
