<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" style="background:#0a0a0a">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">함수형 컴포넌트 vs 클래스형 컴포넌트</text>

  <!-- Function Component -->
  <rect x="60" y="68" width="370" height="200" rx="12" fill="#0f1825" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="245" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">함수형 컴포넌트 (현재 표준)</text>
  <rect x="76" y="106" width="338" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">function</tspan><tspan fill="#ffffff"> Welcome({ name }) {</tspan></text>
  <text x="92" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan font-weight="600" fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> [count, setCount]</tspan></text>
  <text x="92" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">    = useState(</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="92" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  useEffect(() =&gt; {</tspan></text>
  <text x="92" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">    document.title = name;</tspan></text>
  <text x="92" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  }, [name]);</tspan></text>
  <text x="92" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan font-weight="600" fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> &lt;</tspan><tspan fill="#55c555">h1</tspan><tspan fill="#ffffff">&gt;{name}&lt;/</tspan><tspan fill="#55c555">h1</tspan><tspan fill="#ffffff">&gt;;</tspan></text>

  <!-- Class Component -->
  <rect x="450" y="68" width="370" height="200" rx="12" fill="#1a1025" stroke="#888" stroke-width="1.5"/>
  <text x="635" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">클래스형 컴포넌트 (레거시)</text>
  <rect x="466" y="106" width="338" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">class</tspan><tspan fill="#ffffff"> Welcome </tspan><tspan font-weight="600" fill="#7ec8e3">extends</tspan><tspan fill="#ffffff"> Component {</tspan></text>
  <text x="482" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  state = { count: </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff"> };</tspan></text>
  <text x="482" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  componentDidMount() {</tspan></text>
  <text x="482" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">    document.title = </tspan><tspan font-weight="600" fill="#7ec8e3">this</tspan><tspan fill="#ffffff">.props.name;</tspan></text>
  <text x="482" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  }</tspan></text>
  <text x="482" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  render() {</tspan></text>
  <text x="482" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan font-weight="600" fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> &lt;</tspan><tspan fill="#55c555">h1</tspan><tspan fill="#ffffff">&gt;{...}&lt;/</tspan><tspan fill="#55c555">h1</tspan><tspan fill="#ffffff">&gt;;</tspan></text>

  <!-- Comparison table -->
  <text x="440" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">주요 차이점</text>

  <rect x="60" y="326" width="760" height="148" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" xml:space="preserve">  함수형 컴포넌트                          클래스형 컴포넌트</text>
  <line x1="76" y1="358" x2="820" y2="358" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff" xml:space="preserve">  Hooks(useState, useEffect 등) 사용       lifecycle 메서드 사용</text>
  <text x="76" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff" xml:space="preserve">  this 없음 — 코드가 단순하고 짧음          this.props, this.state 필요</text>
  <text x="76" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff" xml:space="preserve">  커스텀 훅으로 로직 재사용 쉬움            HOC/render props로만 로직 공유</text>
  <text x="76" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" xml:space="preserve">  React 16.8+ 권장 방식 ✓                 신규 코드에서 사용 지양</text>
  <text x="76" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">  Error Boundary는 클래스만 가능 (예외)     Error Boundary 구현 가능</text>
</svg>
