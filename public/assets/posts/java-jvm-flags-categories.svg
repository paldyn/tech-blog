<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="40" y="48" font-size="22" font-weight="700" fill="#e8e8e8">JVM 플래그 3계층</text>

  <rect x="40" y="80" width="800" height="68" rx="8" fill="#101010" stroke="#55c555" stroke-width="1"/>
  <text x="56" y="108" font-size="14" font-weight="600" fill="#55c555">표준 옵션 (안정·보장)</text>
  <text x="56" y="132" font-size="13" fill="#9aa4b8">-cp, -version, -D... — 모든 JVM이 지원하고 버전 간 호환 보장</text>

  <rect x="40" y="160" width="800" height="68" rx="8" fill="#101010" stroke="#7ec8e3" stroke-width="1"/>
  <text x="56" y="188" font-size="14" font-weight="600" fill="#7ec8e3">-X 옵션 (비표준·대체로 안정)</text>
  <text x="56" y="212" font-size="13" fill="#9aa4b8">-Xmx, -Xms, -Xss, -Xint — 구현 의존적이지만 널리 쓰이는 핵심 옵션</text>

  <rect x="40" y="240" width="800" height="68" rx="8" fill="#101010" stroke="#e05555" stroke-width="1"/>
  <text x="56" y="268" font-size="14" font-weight="600" fill="#e05555">-XX 옵션 (고급·실험적 포함)</text>
  <text x="56" y="292" font-size="13" fill="#9aa4b8">-XX:+UseG1GC (Boolean), -XX:MaxGCPauseMillis=200 (Value) — 세밀한 튜닝용</text>
</svg>
