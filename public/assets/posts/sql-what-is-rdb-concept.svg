<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">관계형 데이터베이스 핵심 개념</text>
  <text x="440" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">테이블·행·열·관계의 구조</text>

  <!-- customers table -->
  <rect x="60" y="110" width="280" height="200" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1.5"/>
  <rect x="60" y="110" width="280" height="36" fill="#1e2433" rx="8"/>
  <rect x="60" y="134" width="280" height="12" fill="#1e2433"/>
  <text x="200" y="133" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">customers</text>
  <!-- header row -->
  <rect x="60" y="146" width="280" height="28" fill="#0f1724"/>
  <text x="90" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">id</text>
  <text x="150" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">name</text>
  <text x="260" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">email</text>
  <!-- rows -->
  <text x="90" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">1</text>
  <text x="150" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">김민준</text>
  <text x="220" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">min@…</text>
  <line x1="60" y1="200" x2="340" y2="200" stroke="#1e2433" stroke-width="1"/>
  <text x="90" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">2</text>
  <text x="150" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">이서연</text>
  <text x="220" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">seo@…</text>
  <line x1="60" y1="228" x2="340" y2="228" stroke="#1e2433" stroke-width="1"/>
  <text x="90" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">3</text>
  <text x="150" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">박지호</text>
  <text x="220" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">jih@…</text>
  <line x1="60" y1="256" x2="340" y2="256" stroke="#1e2433" stroke-width="1"/>
  <text x="90" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">4</text>
  <text x="150" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">최수아</text>
  <text x="220" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">sua@…</text>
  <!-- column label -->
  <text x="200" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">← 열(Column/Attribute)</text>
  <!-- row label arrow -->
  <line x1="42" y1="192" x2="60" y2="192" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="20" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">행</text>

  <!-- orders table -->
  <rect x="540" y="110" width="280" height="200" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1.5"/>
  <rect x="540" y="110" width="280" height="36" fill="#1e2433" rx="8"/>
  <rect x="540" y="134" width="280" height="12" fill="#1e2433"/>
  <text x="680" y="133" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">orders</text>
  <rect x="540" y="146" width="280" height="28" fill="#0f1724"/>
  <text x="560" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">id</text>
  <text x="600" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">cust_id</text>
  <text x="690" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">amount</text>
  <text x="760" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888">date</text>
  <!-- rows -->
  <text x="560" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">101</text>
  <text x="607" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">1</text>
  <text x="690" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">45,000</text>
  <text x="757" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">04-01</text>
  <line x1="540" y1="200" x2="820" y2="200" stroke="#1e2433" stroke-width="1"/>
  <text x="560" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">102</text>
  <text x="607" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">1</text>
  <text x="690" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">12,000</text>
  <text x="757" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">04-03</text>
  <line x1="540" y1="228" x2="820" y2="228" stroke="#1e2433" stroke-width="1"/>
  <text x="560" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">103</text>
  <text x="607" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">2</text>
  <text x="690" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">88,000</text>
  <text x="757" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">04-05</text>
  <line x1="540" y1="256" x2="820" y2="256" stroke="#1e2433" stroke-width="1"/>
  <text x="560" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">104</text>
  <text x="607" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">3</text>
  <text x="690" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">30,000</text>
  <text x="757" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">04-07</text>

  <!-- Relation arrow: customers.id → orders.cust_id -->
  <line x1="340" y1="192" x2="530" y2="192" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="530,192 516,185 516,199" fill="#7ec8e3"/>
  <text x="435" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">FK 관계</text>

  <!-- PK labels -->
  <rect x="63" y="175" width="24" height="14" fill="#7ec8e3" rx="3"/>
  <text x="75" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" font-weight="700" fill="#0a0a0a">PK</text>
  <rect x="543" y="175" width="24" height="14" fill="#7ec8e3" rx="3"/>
  <text x="555" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" font-weight="700" fill="#0a0a0a">PK</text>
  <rect x="598" y="175" width="24" height="14" fill="#7777cc" rx="3"/>
  <text x="610" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" font-weight="700" fill="#fff">FK</text>

  <!-- Bottom summary boxes -->
  <rect x="60" y="360" width="180" height="72" fill="#111827" rx="8" stroke="#55c555" stroke-width="1"/>
  <text x="150" y="383" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">테이블(Relation)</text>
  <text x="150" y="403" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">행(Row/Tuple)의 집합</text>
  <text x="150" y="421" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">열은 속성을 표현</text>

  <rect x="270" y="360" width="180" height="72" fill="#111827" rx="8" stroke="#7ec8e3" stroke-width="1"/>
  <text x="360" y="383" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">기본 키(PK)</text>
  <text x="360" y="403" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">행을 유일하게 식별</text>
  <text x="360" y="421" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">NULL 불허</text>

  <rect x="480" y="360" width="180" height="72" fill="#111827" rx="8" stroke="#7777cc" stroke-width="1"/>
  <text x="570" y="383" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">외래 키(FK)</text>
  <text x="570" y="403" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">다른 테이블의 PK 참조</text>
  <text x="570" y="421" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">참조 무결성 보장</text>

  <rect x="690" y="360" width="130" height="72" fill="#111827" rx="8" stroke="#e05555" stroke-width="1"/>
  <text x="755" y="383" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">1:N 관계</text>
  <text x="755" y="403" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">1 고객 →</text>
  <text x="755" y="421" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">N 주문</text>

  <!-- bottom text -->
  <text x="440" y="475" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555">테이블 간의 관계(Relation)가 RDBMS의 핵심 — 중복 없이 데이터를 분리·연결합니다</text>
</svg>
