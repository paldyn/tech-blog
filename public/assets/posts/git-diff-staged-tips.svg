<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">git diff --staged 활용 패턴</text>

  <!-- Pattern 1 -->
  <text x="60" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">특정 파일만 검토</text>
  <rect x="60" y="96" width="370" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 파일 지정</text>
  <text x="76" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">git diff --staged src/auth.js</text>
  <text x="76" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">git diff --staged -- '*.ts'</text>

  <!-- Pattern 2 -->
  <text x="450" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">통계 요약</text>
  <rect x="450" y="96" width="370" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="466" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 변경 파일 + 라인 수 요약</text>
  <text x="466" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">git diff --staged --stat</text>
  <text x="466" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555"> src/auth.js | 12 +++++------</text>

  <!-- Pattern 3 -->
  <text x="60" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc">부분 스테이징 검토</text>
  <rect x="60" y="214" width="760" height="90" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># git add -p로 일부만 스테이징한 뒤 각각 확인</text>
  <text x="76" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">git add -p src/app.js        </text>
  <text x="76" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">git diff --staged src/app.js </text>
  <text x="76" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">git diff src/app.js          </text>

  <!-- Legend for pattern 3 -->
  <text x="480" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888"># 커밋될 부분</text>
  <text x="480" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888"># 아직 스테이징 안 된 부분</text>

  <!-- Note -->
  <rect x="60" y="328" width="760" height="36" rx="8" fill="#111827" stroke="#2a3650" stroke-width="1.5"/>
  <text x="80" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">커밋 전 diff --staged 검토는 불필요한 디버그 코드, TODO 주석, 민감 정보 실수 커밋을 막는 마지막 관문</text>
</svg>
