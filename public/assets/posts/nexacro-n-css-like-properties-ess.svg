<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ESS 파일 구조 및 상태별 스타일</text>

  <!-- ESS syntax box -->
  <rect x="60" y="68" width="420" height="310" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="90" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">/* Button.ess — 상태별 스타일 정의 */</text>
  <text x="80" y="110" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">Button</tspan>
    <tspan fill="#ffffff"> {</tspan>
  </text>
  <text x="80" y="130" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  background : </tspan>
    <tspan fill="#ce9178">"#4a90e2"</tspan>
    <tspan fill="#ffffff">;</tspan>
  </text>
  <text x="80" y="150" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  color      : </tspan>
    <tspan fill="#ce9178">"#ffffff"</tspan>
    <tspan fill="#ffffff">;</tspan>
  </text>
  <text x="80" y="170" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  border     : </tspan>
    <tspan fill="#ce9178">"1px solid #2a70c2"</tspan>
    <tspan fill="#ffffff">;</tspan>
  </text>
  <text x="80" y="190" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  font       : </tspan>
    <tspan fill="#ce9178">"normal 13px Malgun Gothic"</tspan>
    <tspan fill="#ffffff">;</tspan>
  </text>
  <text x="80" y="210" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">}</tspan>
  </text>
  <text x="80" y="232" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">Button</tspan>
    <tspan fill="#ffffff">:mouseover {</tspan>
  </text>
  <text x="80" y="252" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  background : </tspan>
    <tspan fill="#ce9178">"#5aa0f2"</tspan>
    <tspan fill="#ffffff">;</tspan>
  </text>
  <text x="80" y="272" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">}</tspan>
  </text>
  <text x="80" y="292" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">Button</tspan>
    <tspan fill="#ffffff">:disable {</tspan>
  </text>
  <text x="80" y="312" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  background : </tspan>
    <tspan fill="#ce9178">"#aaaaaa"</tspan>
    <tspan fill="#ffffff">; opacity : </tspan>
    <tspan fill="#b5cea8">0.5</tspan>
    <tspan fill="#ffffff">;</tspan>
  </text>
  <text x="80" y="332" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">}</tspan>
  </text>
  <text x="80" y="352" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">Button</tspan>
    <tspan fill="#ffffff">:focus {</tspan>
  </text>
  <text x="80" y="370" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  border : </tspan>
    <tspan fill="#ce9178">"2px solid #ff9900"</tspan>
    <tspan fill="#ffffff">; }</tspan>
  </text>

  <!-- State descriptions -->
  <rect x="510" y="68" width="310" height="310" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="665" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">지원 상태(State) 목록</text>

  <line x1="510" y1="106" x2="820" y2="106" stroke="#222" stroke-width="1"/>

  <!-- States list -->
  <text x="530" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">:normal</text>
  <text x="660" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">기본 상태</text>

  <text x="530" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">:mouseover</text>
  <text x="660" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">마우스 오버</text>

  <text x="530" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">:press</text>
  <text x="660" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">눌린 상태</text>

  <text x="530" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">:focus</text>
  <text x="660" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">포커스 상태</text>

  <text x="530" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">:disable</text>
  <text x="660" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">비활성 상태</text>

  <text x="530" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">:readonly</text>
  <text x="660" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">읽기 전용</text>

  <text x="530" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">:select</text>
  <text x="660" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">선택된 상태 (그리드 행)</text>

  <text x="530" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">:odd / :even</text>
  <text x="660" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">홀수/짝수 행 (그리드)</text>

  <text x="530" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">:required</text>
  <text x="660" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">필수 입력 상태</text>

  <text x="530" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">:error</text>
  <text x="660" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">오류 상태</text>

  <text x="530" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">:changed</text>
  <text x="660" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">값 변경 상태</text>
</svg>
