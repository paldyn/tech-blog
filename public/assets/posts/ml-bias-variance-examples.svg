<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">과소적합 · 적정 적합 · 과대적합 비교</text>
  <text x="440" y="66" text-anchor="middle" fill="#888" font-size="13">같은 데이터에 모델 복잡도를 달리했을 때의 차이</text>

  <!-- Column 1: Underfitting -->
  <text x="163" y="96" text-anchor="middle" fill="#e05555" font-size="15" font-weight="600">과소적합 (Underfitting)</text>
  <rect x="60" y="108" width="206" height="200" rx="8" fill="#100808" stroke="#3a1010" stroke-width="1.5"/>
  <!-- Simple scatter points -->
  <circle cx="90"  cy="270" r="3.5" fill="#7ec8e3"/>
  <circle cx="110" cy="245" r="3.5" fill="#7ec8e3"/>
  <circle cx="130" cy="200" r="3.5" fill="#7ec8e3"/>
  <circle cx="150" cy="210" r="3.5" fill="#7ec8e3"/>
  <circle cx="165" cy="185" r="3.5" fill="#7ec8e3"/>
  <circle cx="180" cy="165" r="3.5" fill="#7ec8e3"/>
  <circle cx="200" cy="175" r="3.5" fill="#7ec8e3"/>
  <circle cx="215" cy="155" r="3.5" fill="#7ec8e3"/>
  <circle cx="230" cy="145" r="3.5" fill="#7ec8e3"/>
  <circle cx="250" cy="140" r="3.5" fill="#7ec8e3"/>
  <!-- Flat line (underfitting) -->
  <line x1="72" y1="205" x2="254" y2="205" stroke="#e05555" stroke-width="2.5"/>
  <text x="163" y="325" text-anchor="middle" fill="#e05555" font-size="11">모델이 패턴을 배우지 못함</text>
  <text x="163" y="341" text-anchor="middle" fill="#888" font-size="11">훈련 오차: 높음</text>
  <text x="163" y="357" text-anchor="middle" fill="#888" font-size="11">검증 오차: 높음</text>
  <text x="163" y="373" text-anchor="middle" fill="#555" font-size="10">예: 선형 모델 → 비선형 데이터</text>

  <!-- Column 2: Good fit -->
  <text x="440" y="96" text-anchor="middle" fill="#55c555" font-size="15" font-weight="600">적정 적합 (Good Fit)</text>
  <rect x="337" y="108" width="206" height="200" rx="8" fill="#080f08" stroke="#0a2a15" stroke-width="1.5"/>
  <!-- Same scatter -->
  <circle cx="367" cy="270" r="3.5" fill="#7ec8e3"/>
  <circle cx="387" cy="245" r="3.5" fill="#7ec8e3"/>
  <circle cx="407" cy="200" r="3.5" fill="#7ec8e3"/>
  <circle cx="427" cy="210" r="3.5" fill="#7ec8e3"/>
  <circle cx="442" cy="185" r="3.5" fill="#7ec8e3"/>
  <circle cx="457" cy="165" r="3.5" fill="#7ec8e3"/>
  <circle cx="477" cy="175" r="3.5" fill="#7ec8e3"/>
  <circle cx="492" cy="155" r="3.5" fill="#7ec8e3"/>
  <circle cx="507" cy="145" r="3.5" fill="#7ec8e3"/>
  <circle cx="527" cy="140" r="3.5" fill="#7ec8e3"/>
  <!-- Smooth curve through data -->
  <polyline points="367,272 390,243 410,205 430,200 450,182 470,168 490,156 510,146 527,140"
    fill="none" stroke="#55c555" stroke-width="2.5" stroke-linejoin="round"/>
  <text x="440" y="325" text-anchor="middle" fill="#55c555" font-size="11">패턴만 학습, 노이즈 무시</text>
  <text x="440" y="341" text-anchor="middle" fill="#888" font-size="11">훈련 오차: 낮음</text>
  <text x="440" y="357" text-anchor="middle" fill="#888" font-size="11">검증 오차: 낮음</text>
  <text x="440" y="373" text-anchor="middle" fill="#555" font-size="10">목표 상태</text>

  <!-- Column 3: Overfitting -->
  <text x="717" y="96" text-anchor="middle" fill="#e07030" font-size="15" font-weight="600">과대적합 (Overfitting)</text>
  <rect x="614" y="108" width="206" height="200" rx="8" fill="#100c08" stroke="#3a2005" stroke-width="1.5"/>
  <!-- Same scatter -->
  <circle cx="644" cy="270" r="3.5" fill="#7ec8e3"/>
  <circle cx="664" cy="245" r="3.5" fill="#7ec8e3"/>
  <circle cx="684" cy="200" r="3.5" fill="#7ec8e3"/>
  <circle cx="704" cy="210" r="3.5" fill="#7ec8e3"/>
  <circle cx="719" cy="185" r="3.5" fill="#7ec8e3"/>
  <circle cx="734" cy="165" r="3.5" fill="#7ec8e3"/>
  <circle cx="754" cy="175" r="3.5" fill="#7ec8e3"/>
  <circle cx="769" cy="155" r="3.5" fill="#7ec8e3"/>
  <circle cx="784" cy="145" r="3.5" fill="#7ec8e3"/>
  <circle cx="804" cy="140" r="3.5" fill="#7ec8e3"/>
  <!-- Wiggly overfitting curve -->
  <polyline points="644,270 658,230 672,210 684,202 695,215 704,208 712,180 720,188 728,163 734,167 748,178 754,173 762,152 770,157 779,143 790,147 804,141"
    fill="none" stroke="#e07030" stroke-width="2.5" stroke-linejoin="round"/>
  <text x="717" y="325" text-anchor="middle" fill="#e07030" font-size="11">노이즈까지 모두 학습</text>
  <text x="717" y="341" text-anchor="middle" fill="#888" font-size="11">훈련 오차: 매우 낮음</text>
  <text x="717" y="357" text-anchor="middle" fill="#888" font-size="11">검증 오차: 높음</text>
  <text x="717" y="373" text-anchor="middle" fill="#555" font-size="10">예: 깊은 트리 → 소규모 데이터</text>

  <!-- Summary -->
  <rect x="60" y="394" width="760" height="36" rx="6" fill="#111827" stroke="#333" stroke-width="1"/>
  <text x="440" y="417" text-anchor="middle" fill="#888" font-size="12">편향² + 분산 + 환원불가 오차 = 총 오차  ·  목표는 셋의 합을 최소화하는 복잡도 선택</text>

  <!-- Footer -->
  <text x="440" y="450" text-anchor="middle" fill="#444" font-size="11">PALDYN · AI 완전 정복 시리즈</text>
</svg>
