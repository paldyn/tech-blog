<svg width="880" height="480" viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">타입 없는 JavaScript의 고통스러운 현실</text>
  <!-- Left: code -->
  <text x="225" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">문제 코드 (JS)</text>
  <rect x="60" y="95" width="370" height="290" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan x="76" dy="0" fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> getUserName(user) {</tspan>
    <tspan x="76" dy="20" fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> user.name.toUpperCase();</tspan>
    <tspan x="76" dy="20" fill="#ffffff">}</tspan>
    <tspan x="76" dy="26" fill="#9aa4b8">// 어떤 타입이 들어올 수 있지?</tspan>
    <tspan x="76" dy="20" fill="#ffffff">getUserName({ name: </tspan><tspan fill="#ce9178">"alice"</tspan><tspan fill="#ffffff"> });</tspan>
    <tspan x="76" dy="20" fill="#9aa4b8">// OK: "ALICE"</tspan>
    <tspan x="76" dy="26" fill="#ffffff">getUserName(</tspan><tspan fill="#7ec8e3" font-weight="600">null</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="76" dy="20" fill="#9aa4b8">// 💥 런타임 오류!</tspan>
    <tspan x="76" dy="20" fill="#9aa4b8">// Cannot read property</tspan>
    <tspan x="76" dy="18" fill="#9aa4b8">// 'name' of null</tspan>
    <tspan x="76" dy="26" fill="#ffffff">getUserName({ fullName: </tspan><tspan fill="#ce9178">"bob"</tspan><tspan fill="#ffffff"> });</tspan>
    <tspan x="76" dy="20" fill="#9aa4b8">// 💥 undefined 오류!</tspan>
  </text>
  <!-- Right: problems list -->
  <text x="655" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">타입 없을 때 발생하는 문제</text>
  <rect x="450" y="95" width="370" height="60" rx="8" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="470" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" font-weight="600">① 런타임 오류 (프로덕션 장애)</text>
  <text x="470" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">배포 후 사용자가 직접 오류를 만남</text>
  <rect x="450" y="168" width="370" height="60" rx="8" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="470" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" font-weight="600">② 자동완성 부재</text>
  <text x="470" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">어떤 속성이 있는지 IDE가 모름</text>
  <rect x="450" y="241" width="370" height="60" rx="8" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="470" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" font-weight="600">③ 리팩토링 공포</text>
  <text x="470" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">함수 시그니처 바꾸면 어디 깨지는지 모름</text>
  <rect x="450" y="314" width="370" height="60" rx="8" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="470" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" font-weight="600">④ 문서화 부재</text>
  <text x="470" y="361" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">함수가 무엇을 받는지 코드에서 알 수 없음</text>
  <text x="440" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7777cc">TypeScript는 이 4가지 문제를 컴파일 타임에 해결합니다</text>
</svg>
