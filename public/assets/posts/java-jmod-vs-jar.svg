<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="340" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">JAR vs JMOD — 무엇을 담을 수 있나</text>

  <!-- JAR column -->
  <rect x="60" y="78" width="360" height="220" rx="8" fill="#0f1626" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="240" y="108" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">modular JAR (.jar)</text>
  <text x="84" y="146" font-size="13" fill="#ffffff">• .class 파일</text>
  <text x="84" y="172" font-size="13" fill="#ffffff">• 리소스 (이미지, 설정)</text>
  <text x="84" y="198" font-size="13" fill="#ffffff">• module-info.class</text>
  <text x="84" y="230" font-size="13" fill="#e05555">✗ 네이티브 라이브러리</text>
  <text x="84" y="256" font-size="13" fill="#e05555">✗ 네이티브 실행 명령</text>
  <text x="84" y="282" font-size="12" fill="#9aa4b8">런타임 클래스패스/모듈패스에 직접 사용</text>

  <!-- JMOD column -->
  <rect x="460" y="78" width="360" height="220" rx="8" fill="#102117" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="108" font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">JMOD (.jmod)</text>
  <text x="484" y="146" font-size="13" fill="#ffffff">• .class 파일</text>
  <text x="484" y="172" font-size="13" fill="#ffffff">• 리소스 + module-info.class</text>
  <text x="484" y="198" font-size="13" fill="#55c555">✓ 네이티브 라이브러리 (.so/.dll)</text>
  <text x="484" y="224" font-size="13" fill="#55c555">✓ 네이티브 명령 / 헤더 / 설정</text>
  <text x="484" y="256" font-size="13" fill="#e05555">✗ 런타임에 직접 실행 불가</text>
  <text x="484" y="282" font-size="12" fill="#9aa4b8">컴파일·jlink 시점 전용 패키징 포맷</text>
</svg>
