<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="43" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">예외 객체의 주요 속성</text>

  <!-- 5 attribute cards in a row -->
  <!-- args -->
  <rect x="55" y="70" width="148" height="100" rx="8" fill="#0c1628" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="129" y="96" text-anchor="middle" font-size="13" font-weight="700" fill="#7ec8e3">.args</text>
  <line x1="73" y1="106" x2="185" y2="106" stroke="#2a3d5e" stroke-width="1"/>
  <text x="73" y="125" font-size="11" fill="#888">생성자에 전달된</text>
  <text x="73" y="143" font-size="11" fill="#888">인자 튜플</text>
  <text x="73" y="163" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">e.args[0]</text>

  <!-- __str__ -->
  <rect x="220" y="70" width="148" height="100" rx="8" fill="#0c1628" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="294" y="96" text-anchor="middle" font-size="13" font-weight="700" fill="#7ec8e3">str(e)</text>
  <line x1="238" y1="106" x2="350" y2="106" stroke="#2a3d5e" stroke-width="1"/>
  <text x="238" y="125" font-size="11" fill="#888">예외 메시지 문자열</text>
  <text x="238" y="143" font-size="11" fill="#888">로그 출력에 유용</text>
  <text x="238" y="163" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">str(e)</text>

  <!-- __cause__ -->
  <rect x="385" y="70" width="148" height="100" rx="8" fill="#0c1c0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="459" y="96" text-anchor="middle" font-size="12" font-weight="700" fill="#55c555">.__cause__</text>
  <line x1="403" y1="106" x2="515" y2="106" stroke="#2a3d5e" stroke-width="1"/>
  <text x="403" y="125" font-size="11" fill="#888">raise ... from 으로</text>
  <text x="403" y="143" font-size="11" fill="#888">명시한 원인 예외</text>
  <text x="403" y="163" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">e.__cause__</text>

  <!-- __context__ -->
  <rect x="550" y="70" width="148" height="100" rx="8" fill="#0c1628" stroke="#7777cc" stroke-width="1.5"/>
  <text x="624" y="96" text-anchor="middle" font-size="12" font-weight="700" fill="#7777cc">.__context__</text>
  <line x1="568" y1="106" x2="680" y2="106" stroke="#2a3d5e" stroke-width="1"/>
  <text x="568" y="125" font-size="11" fill="#888">except 내에서 발생</text>
  <text x="568" y="143" font-size="11" fill="#888">시 자동 설정 예외</text>
  <text x="568" y="163" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">e.__context__</text>

  <!-- __traceback__ -->
  <rect x="715" y="70" width="148" height="100" rx="8" fill="#1a1000" stroke="#ce9178" stroke-width="1.5"/>
  <text x="789" y="96" text-anchor="middle" font-size="12" font-weight="700" fill="#ce9178">.__traceback__</text>
  <line x1="733" y1="106" x2="845" y2="106" stroke="#2a3d5e" stroke-width="1"/>
  <text x="733" y="125" font-size="11" fill="#888">traceback 객체</text>
  <text x="733" y="143" font-size="11" fill="#888">호출 스택 정보</text>
  <text x="733" y="163" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#9aa4b8">e.__traceback__</text>

  <!-- Usage code block -->
  <rect x="55" y="195" width="770" height="148" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="75" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3" font-weight="600">try</text><text x="99" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">:</text>
  <text x="75" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">    risky()</text>
  <text x="75" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e05555" font-weight="600">except</text><text x="135" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> Exception </text><text x="240" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">as</text><text x="260" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> e:</text>
  <text x="75" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">    </text><text x="91" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">print</text><text x="131" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(</text><text x="140" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">f"타입: {type(e).__name__}, 메시지: {e}"</text><text x="750" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>
  <text x="75" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">    </text><text x="91" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">print</text><text x="131" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(</text><text x="140" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">f"인자: {e.args}"</text><text x="303" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>
  <text x="75" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">    </text><text x="91" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">print</text><text x="131" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(</text><text x="140" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">f"원인: {e.__cause__}"</text><text x="318" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>
</svg>
