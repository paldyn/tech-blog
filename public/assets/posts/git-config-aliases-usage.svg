<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340">
  <rect width="880" height="340" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Alias 사용 전후 비교</text>

  <!-- Before -->
  <rect x="60" y="68" width="354" height="230" rx="8" fill="#111" stroke="#2a1e1e"/>
  <text x="237" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">Before (alias 없이)</text>

  <rect x="78" y="108" width="318" height="170" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="96" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">git status</text>
  <text x="96" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">git checkout -b feature/login</text>
  <text x="96" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">git add -A</text>
  <text x="96" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">git commit -m "로그인 구현"</text>
  <text x="96" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">git log --oneline --graph --all</text>
  <text x="96" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">git branch</text>
  <text x="96" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">git push -u origin feature/login</text>

  <!-- After -->
  <rect x="466" y="68" width="354" height="230" rx="8" fill="#0d150d" stroke="#1e3a1e"/>
  <text x="643" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">After (alias 적용)</text>

  <rect x="484" y="108" width="318" height="170" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="502" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">git st</text>
  <text x="502" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">git co -b feature/login</text>
  <text x="502" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">git add -A</text>
  <text x="502" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">git ci -m "로그인 구현"</text>
  <text x="502" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">git lg</text>
  <text x="502" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">git br</text>
  <text x="502" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">git publish</text>

  <!-- middle arrow -->
  <polygon points="418,178 450,163 450,193" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="1"/>
  <line x1="418" y1="178" x2="385" y2="178" stroke="#7ec8e3" stroke-width="2"/>

  <text x="440" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">동일한 작업, 훨씬 짧은 타이핑 — 하루에 수백 번 치는 명령어라면 alias가 의미 있다</text>
</svg>
