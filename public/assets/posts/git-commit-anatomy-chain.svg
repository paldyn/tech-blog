<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320">
  <rect width="880" height="320" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">커밋 체인과 HEAD 포인터</text>

  <!-- Commit C1 -->
  <rect x="60" y="90" width="180" height="100" rx="8" fill="#111827" stroke="#2a3a5c" stroke-width="1.5"/>
  <text x="150" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="700" fill="#b5cea8" text-anchor="middle">a3f9d21</text>
  <text x="150" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">parent: (없음)</text>
  <text x="150" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">Initialize repo</text>
  <text x="150" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">root-commit</text>

  <!-- Arrow C1 -> C2 -->
  <line x1="240" y1="140" x2="310" y2="140" stroke="#7777cc" stroke-width="2"/>
  <polygon points="310,134 322,140 310,146" fill="#7777cc"/>

  <!-- Commit C2 -->
  <rect x="322" y="90" width="180" height="100" rx="8" fill="#111827" stroke="#2a3a5c" stroke-width="1.5"/>
  <text x="412" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="700" fill="#b5cea8" text-anchor="middle">7f1e3c2</text>
  <text x="412" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">parent: a3f9d21</text>
  <text x="412" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">Add README</text>
  <text x="412" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">2번째 커밋</text>

  <!-- Arrow C2 -> C3 -->
  <line x1="502" y1="140" x2="572" y2="140" stroke="#7777cc" stroke-width="2"/>
  <polygon points="572,134 584,140 572,146" fill="#7777cc"/>

  <!-- Commit C3 -->
  <rect x="584" y="90" width="180" height="100" rx="8" fill="#111827" stroke="#55c555" stroke-width="2"/>
  <text x="674" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="700" fill="#b5cea8" text-anchor="middle">d8e2b95</text>
  <text x="674" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">parent: 7f1e3c2</text>
  <text x="674" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">feat: login page</text>
  <text x="674" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">← HEAD, main</text>

  <!-- HEAD label above -->
  <rect x="620" y="56" width="54" height="24" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="647" y="73" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">HEAD</text>
  <line x1="647" y1="80" x2="647" y2="90" stroke="#55c555" stroke-width="2" stroke-dasharray="3,2"/>

  <rect x="684" y="56" width="48" height="24" rx="4" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="708" y="73" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc" text-anchor="middle">main</text>
  <line x1="708" y1="80" x2="708" y2="90" stroke="#7777cc" stroke-width="2" stroke-dasharray="3,2"/>

  <!-- Bottom explanation -->
  <rect x="60" y="220" width="760" height="68" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">화살표 방향</text>
  <text x="80" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">각 커밋은 자신의 <tspan font-weight="700" fill="#7777cc">부모(parent)</tspan>를 가리킨다. HEAD와 브랜치는 커밋 해시를 가리키는 포인터.</text>
  <text x="80" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">새 커밋이 생기면 브랜치 포인터만 앞으로 이동하고 기존 커밋 객체는 변하지 않는다.</text>
</svg>
