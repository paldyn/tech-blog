<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arrGen" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">패키징 설정의 세대 교체</text>

  <rect x="60" y="120" width="210" height="80" rx="8" fill="#11151f" stroke="#e05555" stroke-width="1.5"/>
  <text x="165" y="150" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">setup.py</text>
  <text x="165" y="172" font-size="12" fill="#888" text-anchor="middle">실행되는 파이썬 코드</text>
  <text x="165" y="190" font-size="12" fill="#888" text-anchor="middle">명령형 설정</text>

  <rect x="335" y="120" width="210" height="80" rx="8" fill="#11151f" stroke="#e0a555" stroke-width="1.5"/>
  <text x="440" y="150" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">setup.cfg</text>
  <text x="440" y="172" font-size="12" fill="#888" text-anchor="middle">정적 INI 설정</text>
  <text x="440" y="190" font-size="12" fill="#888" text-anchor="middle">과도기</text>

  <rect x="610" y="120" width="210" height="80" rx="8" fill="#11151f" stroke="#55c555" stroke-width="1.5"/>
  <text x="715" y="150" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">pyproject.toml</text>
  <text x="715" y="172" font-size="12" fill="#888" text-anchor="middle">표준 선언 설정</text>
  <text x="715" y="190" font-size="12" fill="#888" text-anchor="middle">PEP 517/518/621</text>

  <line x1="270" y1="160" x2="333" y2="160" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrGen)"/>
  <line x1="545" y1="160" x2="608" y2="160" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrGen)"/>

  <text x="60" y="262" font-size="13" fill="#888">setup.py는 여전히 동작하지만, 새 프로젝트의 기본은 pyproject.toml이다.</text>
