<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Adaptive Hash Index — B+Tree vs Hash</text>

  <!-- B+Tree path -->
  <rect x="60" y="72" width="370" height="290" rx="8" fill="#0d1117" stroke="#2a3a5a"/>
  <text x="245" y="98" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">B+Tree 인덱스 탐색</text>
  <text x="245" y="116" text-anchor="middle" font-size="12" fill="#888">O(log N) — 트리 높이만큼 페이지 접근</text>

  <!-- Root -->
  <rect x="196" y="130" width="98" height="36" rx="4" fill="#1e2d4a" stroke="#2a3a5a"/>
  <text x="245" y="153" text-anchor="middle" font-size="12" fill="#7ec8e3">Root</text>

  <!-- Internal nodes -->
  <line x1="220" y1="166" x2="160" y2="196" stroke="#2a3a5a" stroke-width="1.5"/>
  <line x1="270" y1="166" x2="330" y2="196" stroke="#2a3a5a" stroke-width="1.5"/>

  <rect x="112" y="196" width="96" height="36" rx="4" fill="#16213e" stroke="#2a3a5a"/>
  <text x="160" y="219" text-anchor="middle" font-size="12" fill="#7777cc">Internal</text>
  <rect x="282" y="196" width="96" height="36" rx="4" fill="#16213e" stroke="#2a3a5a"/>
  <text x="330" y="219" text-anchor="middle" font-size="12" fill="#7777cc">Internal</text>

  <!-- Leaf nodes -->
  <line x1="148" y1="232" x2="108" y2="260" stroke="#2a3a5a" stroke-width="1.5"/>
  <line x1="172" y1="232" x2="200" y2="260" stroke="#2a3a5a" stroke-width="1.5"/>
  <line x1="310" y1="232" x2="280" y2="260" stroke="#2a3a5a" stroke-width="1.5"/>
  <line x1="350" y1="232" x2="370" y2="260" stroke="#2a3a5a" stroke-width="1.5"/>

  <rect x="80" y="260" width="72" height="36" rx="4" fill="#1e3a2a" stroke="#2a4a2a"/>
  <text x="116" y="283" text-anchor="middle" font-size="11" fill="#55c555">Leaf</text>
  <rect x="170" y="260" width="72" height="36" rx="4" fill="#1e3a2a" stroke="#2a4a2a"/>
  <text x="206" y="283" text-anchor="middle" font-size="11" fill="#55c555">Leaf</text>
  <rect x="256" y="260" width="72" height="36" rx="4" fill="#1e3a2a" stroke="#2a4a2a"/>
  <text x="292" y="283" text-anchor="middle" font-size="11" fill="#55c555">Leaf</text>
  <rect x="344" y="260" width="72" height="36" rx="4" fill="#1e3a2a" stroke="#2a4a2a"/>
  <text x="380" y="283" text-anchor="middle" font-size="11" fill="#55c555">Leaf</text>

  <text x="245" y="335" text-anchor="middle" font-size="13" fill="#888">높이 3 → 3번의 페이지 접근</text>
  <text x="245" y="353" text-anchor="middle" font-size="13" fill="#888">각 접근마다 Buffer Pool 조회</text>

  <!-- AHI path -->
  <rect x="450" y="72" width="370" height="290" rx="8" fill="#0d1117" stroke="#4a3a2a"/>
  <text x="635" y="98" text-anchor="middle" font-size="14" font-weight="600" fill="#e05555">Adaptive Hash Index 탐색</text>
  <text x="635" y="116" text-anchor="middle" font-size="12" fill="#888">O(1) — 해시 한 번으로 리프 페이지 직행</text>

  <!-- Hash table -->
  <rect x="475" y="130" width="320" height="160" rx="6" fill="#111520" stroke="#3a2a10"/>

  <!-- Hash slots -->
  <rect x="490" y="148" width="80" height="28" rx="3" fill="#1a1a10" stroke="#3a3a1a"/>
  <text x="530" y="167" text-anchor="middle" font-size="11" fill="#888">slot 0</text>
  <rect x="490" y="182" width="80" height="28" rx="3" fill="#2a2010" stroke="#4a3a10"/>
  <text x="530" y="201" text-anchor="middle" font-size="11" fill="#e8a020">slot 1 ●</text>
  <rect x="490" y="216" width="80" height="28" rx="3" fill="#1a1a10" stroke="#3a3a1a"/>
  <text x="530" y="235" text-anchor="middle" font-size="11" fill="#888">slot 2</text>
  <rect x="490" y="250" width="80" height="28" rx="3" fill="#2a2010" stroke="#4a3a10"/>
  <text x="530" y="269" text-anchor="middle" font-size="11" fill="#e8a020">slot 3 ●</text>

  <!-- Arrow to leaf page -->
  <line x1="572" y1="196" x2="640" y2="196" stroke="#e8a020" stroke-width="2"/>
  <polygon points="640,190 652,196 640,202" fill="#e8a020"/>

  <rect x="654" y="172" width="124" height="48" rx="4" fill="#1e3a2a" stroke="#2a5a2a"/>
  <text x="716" y="192" text-anchor="middle" font-size="12" fill="#55c555">Leaf Page</text>
  <text x="716" y="210" text-anchor="middle" font-size="11" fill="#888">직접 접근!</text>

  <text x="635" y="335" text-anchor="middle" font-size="13" fill="#55c555">해시 계산 1번으로 리프 직행</text>
  <text x="635" y="353" text-anchor="middle" font-size="12" fill="#888">동일 쿼리가 자주 반복될 때 효과 극대화</text>

  <!-- Bottom conditions -->
  <rect x="60" y="385" width="760" height="78" rx="8" fill="#111827" stroke="#2a2a40"/>
  <text x="440" y="408" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">AHI 자동 구축 조건</text>
  <text x="200" y="434" text-anchor="middle" font-size="13" fill="#888">동일 인덱스 범위를 N번 이상 반복 탐색</text>
  <text x="200" y="452" text-anchor="middle" font-size="13" fill="#888">(innodb_adaptive_hash_index_parts 조각화)</text>
  <text x="620" y="434" text-anchor="middle" font-size="13" fill="#7ec8e3">Buffer Pool 내 페이지만 대상</text>
  <text x="620" y="452" text-anchor="middle" font-size="13" fill="#7ec8e3">디스크 접근 없이 메모리 내 최적화</text>
</svg>
