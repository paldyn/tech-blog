<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">기본 키 전략 비교</text>

  <!-- Natural Key -->
  <rect x="60" y="60" width="220" height="130" rx="8" fill="#111822" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">자연 키 (Natural Key)</text>
  <text x="170" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">비즈니스 의미 있는 값</text>
  <text x="170" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">예: 주민번호, 사원번호</text>
  <text x="170" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">+ 가독성, 중복 방지</text>
  <text x="170" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">- 변경 불가, 개인정보 노출</text>
  <text x="170" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">- FK 전파 비용 큼</text>

  <!-- Surrogate Key -->
  <rect x="310" y="60" width="220" height="130" rx="8" fill="#111822" stroke="#55c555" stroke-width="2"/>
  <text x="420" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">대리 키 (Surrogate)</text>
  <text x="420" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">의미 없는 일련번호</text>
  <text x="420" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">예: AUTO_INCREMENT, IDENTITY</text>
  <text x="420" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">+ 불변, 작은 크기(4~8 byte)</text>
  <text x="420" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">+ 인덱스 효율 최적</text>
  <text x="420" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">- 외부 노출 시 순서 예측 가능</text>

  <!-- UUID -->
  <rect x="560" y="60" width="260" height="130" rx="8" fill="#111822" stroke="#7777cc" stroke-width="1.5"/>
  <text x="690" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">UUID / ULID</text>
  <text x="690" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">전역 고유 식별자</text>
  <text x="690" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">UUIDv4: 랜덤 / UUIDv7: 시간순</text>
  <text x="690" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">+ 분산 생성, 예측 불가</text>
  <text x="690" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">- 16 byte (INT 4배), 인덱스 단편화</text>
  <text x="690" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">ULID/UUIDv7: 정렬 가능으로 개선</text>

  <!-- Code -->
  <rect x="60" y="210" width="760" height="192" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- 대리 키 BIGINT (가장 권장)</text>
  <text x="76" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">id <tspan fill="#b5cea8">BIGINT</tspan> <tspan font-weight="600" fill="#7ec8e3">GENERATED ALWAYS AS IDENTITY PRIMARY KEY</tspan>  <tspan fill="#9aa4b8">-- PG</tspan></text>
  <text x="76" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">id <tspan fill="#b5cea8">BIGINT</tspan> <tspan font-weight="600" fill="#7ec8e3">AUTO_INCREMENT PRIMARY KEY</tspan>               <tspan fill="#9aa4b8">-- MySQL</tspan></text>
  <text x="76" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- UUID v4 (PostgreSQL)</text>
  <text x="76" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">id <tspan fill="#b5cea8">UUID</tspan> <tspan font-weight="600" fill="#7ec8e3">DEFAULT</tspan> gen_random_uuid() <tspan font-weight="600" fill="#7ec8e3">PRIMARY KEY</tspan></text>
  <text x="76" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- 복합 기본 키 (다대다 관계 테이블)</text>
  <text x="76" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan font-weight="600" fill="#7ec8e3">CONSTRAINT</tspan> pk_order_tags <tspan font-weight="600" fill="#7ec8e3">PRIMARY KEY</tspan> (order_id, tag_id)</text>
  <text x="76" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- 규칙: PK 크기 작을수록 모든 FK·인덱스가 효율적</text>
  <text x="76" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- BIGINT AUTO_INCREMENT: 기본, UUID: 분산 시스템</text>
</svg>
