<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">기본 키 설계 전략 비교</text>

  <!-- Natural Key -->
  <rect x="60" y="70" width="240" height="320" fill="#111827" rx="10" stroke="#e05555" stroke-width="1.5"/>
  <rect x="60" y="70" width="240" height="38" fill="#2a1010" rx="10"/>
  <rect x="60" y="96" width="240" height="12" fill="#2a1010"/>
  <text x="180" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">자연 키 (Natural Key)</text>

  <text x="78" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">업무 의미 있는 값을 PK로</text>
  <text x="78" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">예: 주민번호, 사원번호, ISBN</text>

  <line x1="78" y1="162" x2="282" y2="162" stroke="#3a4a6e" stroke-width="1"/>
  <text x="78" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">장점</text>
  <text x="78" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">추가 ID 컬럼 불필요</text>
  <text x="78" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">업무 논리와 직접 연결</text>

  <line x1="78" y1="232" x2="282" y2="232" stroke="#3a4a6e" stroke-width="1"/>
  <text x="78" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">단점</text>
  <text x="78" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">값이 바뀌면 모든 FK 갱신</text>
  <text x="78" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">긴 키 → 인덱스 크기 증가</text>
  <text x="78" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">개인정보를 키로 사용 위험</text>
  <text x="78" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">외부 시스템에 의존 (ISBN 변경 등)</text>
  <text x="78" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">복합 자연키 → FK 복잡</text>

  <!-- Surrogate INT/BIGINT -->
  <rect x="330" y="70" width="240" height="320" fill="#111827" rx="10" stroke="#55c555" stroke-width="1.5"/>
  <rect x="330" y="70" width="240" height="38" fill="#0d1a0d" rx="10"/>
  <rect x="330" y="96" width="240" height="12" fill="#0d1a0d"/>
  <text x="450" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">대리 키 — BIGINT (순차)</text>

  <text x="348" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">DB가 자동 생성하는 숫자 ID</text>
  <text x="348" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">예: 1, 2, 3, 4, ...</text>

  <line x1="348" y1="162" x2="552" y2="162" stroke="#3a4a6e" stroke-width="1"/>
  <text x="348" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">장점</text>
  <text x="348" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">8바이트로 작고 빠름</text>
  <text x="348" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">B-Tree 인덱스에 최적</text>
  <text x="348" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">순서 예측 가능 (정렬 유리)</text>

  <line x1="348" y1="250" x2="552" y2="250" stroke="#3a4a6e" stroke-width="1"/>
  <text x="348" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">단점</text>
  <text x="348" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">순번 노출 (보안 취약)</text>
  <text x="348" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">분산 환경 중복 위험</text>
  <text x="348" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">핫스팟 (끝에만 삽입)</text>

  <!-- UUID / ULID -->
  <rect x="600" y="70" width="220" height="320" fill="#111827" rx="10" stroke="#7777cc" stroke-width="1.5"/>
  <rect x="600" y="70" width="220" height="38" fill="#0d0d1a" rx="10"/>
  <rect x="600" y="96" width="220" height="12" fill="#0d0d1a"/>
  <text x="710" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">대리 키 — UUID / ULID</text>

  <text x="618" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">랜덤 또는 시간순 유니크 ID</text>
  <text x="618" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">예: 550e8400-e29b-...</text>

  <line x1="618" y1="162" x2="802" y2="162" stroke="#3a4a6e" stroke-width="1"/>
  <text x="618" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">장점</text>
  <text x="618" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">분산 환경에서 안전</text>
  <text x="618" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">예측 불가 → 보안 우수</text>
  <text x="618" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">앱 레이어에서 생성 가능</text>

  <line x1="618" y1="250" x2="802" y2="250" stroke="#3a4a6e" stroke-width="1"/>
  <text x="618" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">단점</text>
  <text x="618" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">16바이트 → 인덱스 2배</text>
  <text x="618" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">UUID v4: 랜덤 → 페이지 분열</text>
  <text x="618" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">ULID/UUID v7: 시간순 개선</text>

  <!-- Decision guide -->
  <rect x="60" y="420" width="760" height="40" fill="#111827" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">단일 DB · 내부 API → BIGINT IDENTITY  |  분산 · 공개 API → UUID v7 / ULID  |  소규모 참조 코드 → 자연키</text>
</svg>
