<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">RAG vs 파인튜닝 핵심 비교</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888">지식 주입 vs 행동 학습</text>

  <!-- Headers -->
  <rect x="60" y="88" width="360" height="36" rx="6" fill="#0d1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">RAG</text>

  <rect x="460" y="88" width="360" height="36" rx="6" fill="#0d1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">파인튜닝 (Fine-tuning)</text>

  <!-- Row 1: 작동 방식 -->
  <rect x="60" y="134" width="360" height="52" rx="4" fill="#111"/>
  <text x="240" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8">외부 문서를 실시간 검색해 컨텍스트로 제공</text>
  <text x="240" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">모델 가중치는 변경되지 않음</text>

  <rect x="460" y="134" width="360" height="52" rx="4" fill="#111"/>
  <text x="640" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8">학습 데이터로 모델 가중치를 직접 업데이트</text>
  <text x="640" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">지식이 모델 파라미터에 저장됨</text>

  <!-- Row labels -->
  <text x="420" y="165" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">방식</text>

  <!-- Row 2: 지식 업데이트 -->
  <rect x="60" y="190" width="360" height="52" rx="4" fill="#0e0e0e"/>
  <text x="240" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">실시간 업데이트 ○</text>
  <text x="240" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">문서를 교체·추가하면 즉시 반영</text>

  <rect x="460" y="190" width="360" height="52" rx="4" fill="#0e0e0e"/>
  <text x="640" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">재학습 필요 △</text>
  <text x="640" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">새 정보는 다시 파인튜닝해야 반영</text>

  <text x="420" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">업데이트</text>

  <!-- Row 3: 출처 추적 -->
  <rect x="60" y="246" width="360" height="52" rx="4" fill="#111"/>
  <text x="240" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">출처 추적 가능 ○</text>
  <text x="240" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">어떤 문서를 참조했는지 명시 가능</text>

  <rect x="460" y="246" width="360" height="52" rx="4" fill="#111"/>
  <text x="640" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">블랙박스 △</text>
  <text x="640" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">어디서 배운 정보인지 추적 어려움</text>

  <text x="420" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">추적성</text>

  <!-- Row 4: 비용 -->
  <rect x="60" y="302" width="360" height="52" rx="4" fill="#0e0e0e"/>
  <text x="240" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">초기 비용 낮음 ○</text>
  <text x="240" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">임베딩+벡터 DB 비용 (운영 비용 있음)</text>

  <rect x="460" y="302" width="360" height="52" rx="4" fill="#0e0e0e"/>
  <text x="640" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">초기 GPU 비용 높음 △</text>
  <text x="640" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">한번 학습 후 추론 비용 낮아짐</text>

  <text x="420" y="332" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">비용</text>

  <!-- Row 5: 강점 -->
  <rect x="60" y="358" width="360" height="52" rx="4" fill="#111"/>
  <text x="240" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">동적 지식, 사실 정확도, 감사성</text>
  <text x="240" y="398" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">최신 정보, 긴 문서 검색, 출처 인용</text>

  <rect x="460" y="358" width="360" height="52" rx="4" fill="#111"/>
  <text x="640" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">스타일·형식·도메인 특화 행동</text>
  <text x="640" y="398" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">응답 스타일, 형식, 전문 용어 최적화</text>

  <text x="420" y="388" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">강점</text>
</svg>
