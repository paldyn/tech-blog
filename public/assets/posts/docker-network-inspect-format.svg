<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" style="background:#0a0a0a;border-radius:12px;font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">--format 템플릿으로 원하는 필드 추출</text>
  <text x="440" y="68" text-anchor="middle" fill="#888" font-size="13">Go 템플릿으로 inspect 출력을 필터링</text>

  <!-- Left: format examples -->
  <rect x="60" y="88" width="360" height="240" rx="8" fill="#070b14" stroke="#1e2433"/>
  <text x="80" y="114" fill="#888" font-size="12" xml:space="preserve"># 서브넷만 추출</text>
  <text x="80" y="132" fill="#7ec8e3" font-size="12" xml:space="preserve">docker network inspect my-net \</text>
  <text x="80" y="150" fill="#7ec8e3" font-size="12" xml:space="preserve">  --format \</text>
  <text x="80" y="168" fill="#ce9178" font-size="12" xml:space="preserve">  '{{range .IPAM.Config}}</text>
  <text x="80" y="186" fill="#ce9178" font-size="12" xml:space="preserve">    {{.Subnet}}{{end}}'</text>
  <line x1="80" y1="200" x2="400" y2="200" stroke="#1e2433" stroke-width="1"/>
  <text x="80" y="220" fill="#888" font-size="12" xml:space="preserve"># 연결된 컨테이너 이름+IP</text>
  <text x="80" y="238" fill="#7ec8e3" font-size="12" xml:space="preserve">docker network inspect my-net \</text>
  <text x="80" y="256" fill="#ce9178" font-size="12" xml:space="preserve">  --format '{{range .Containers}}</text>
  <text x="80" y="274" fill="#ce9178" font-size="12" xml:space="preserve">  {{.Name}} {{.IPv4Address}}</text>
  <text x="80" y="292" fill="#ce9178" font-size="12" xml:space="preserve">  {{end}}'</text>
  <text x="80" y="316" fill="#888" font-size="11" xml:space="preserve"># web  172.20.0.2/16</text>

  <!-- Right: more formats -->
  <rect x="460" y="88" width="360" height="240" rx="8" fill="#070b14" stroke="#1e2433"/>
  <text x="480" y="114" fill="#888" font-size="12" xml:space="preserve"># 드라이버 + internal 여부</text>
  <text x="480" y="132" fill="#7ec8e3" font-size="12" xml:space="preserve">docker network inspect my-net \</text>
  <text x="480" y="150" fill="#ce9178" font-size="12" xml:space="preserve">  --format \</text>
  <text x="480" y="168" fill="#ce9178" font-size="12" xml:space="preserve">  '{{.Driver}} {{.Internal}}'</text>
  <line x1="480" y1="184" x2="800" y2="184" stroke="#1e2433" stroke-width="1"/>
  <text x="480" y="204" fill="#888" font-size="12" xml:space="preserve"># 여러 네트워크 한꺼번에</text>
  <text x="480" y="222" fill="#7ec8e3" font-size="12" xml:space="preserve">docker network inspect \</text>
  <text x="480" y="240" fill="#7ec8e3" font-size="12" xml:space="preserve">  net1 net2 net3</text>
  <line x1="480" y1="256" x2="800" y2="256" stroke="#1e2433" stroke-width="1"/>
  <text x="480" y="276" fill="#888" font-size="12" xml:space="preserve"># overlay: peers 확인</text>
  <text x="480" y="294" fill="#7ec8e3" font-size="12" xml:space="preserve">docker network inspect \</text>
  <text x="480" y="312" fill="#ce9178" font-size="12" xml:space="preserve">  --format '{{.Peers}}'</text>
  <text x="480" y="316" fill="#888" font-size="11" xml:space="preserve">  my-overlay</text>
</svg>
