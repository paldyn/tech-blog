<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Spring MVC 뷰 렌더링 흐름</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">Controller → Model → ViewResolver → View → Response</text>

  <!-- Step 1: Controller -->
  <rect x="60" y="110" width="140" height="64" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="130" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Controller</text>
  <text x="130" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">뷰 이름 반환</text>
  <text x="130" y="168" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">"home"</text>

  <!-- Arrow 1 -->
  <polygon points="214,142 228,137 228,147" fill="#7ec8e3"/>
  <line x1="200" y1="142" x2="228" y2="142" stroke="#7ec8e3" stroke-width="2"/>
  <text x="214" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">뷰 이름</text>

  <!-- Step 2: DispatcherServlet -->
  <rect x="232" y="110" width="140" height="64" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="302" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">Dispatcher</text>
  <text x="302" y="147" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">Servlet</text>
  <text x="302" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">ViewResolver 체인 탐색</text>

  <!-- Arrow 2 -->
  <polygon points="386,142 400,137 400,147" fill="#7ec8e3"/>
  <line x1="372" y1="142" x2="400" y2="142" stroke="#7ec8e3" stroke-width="2"/>
  <text x="386" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">resolve</text>

  <!-- Step 3: ViewResolver -->
  <rect x="404" y="110" width="140" height="64" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="474" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">ViewResolver</text>
  <text x="474" y="152" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">"home"</text>
  <text x="474" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">→ templates/home.html</text>

  <!-- Arrow 3 -->
  <polygon points="558,142 572,137 572,147" fill="#7ec8e3"/>
  <line x1="544" y1="142" x2="572" y2="142" stroke="#7ec8e3" stroke-width="2"/>
  <text x="558" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">View 객체</text>

  <!-- Step 4: View -->
  <rect x="576" y="110" width="120" height="64" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="636" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">View</text>
  <text x="636" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Model 데이터로</text>
  <text x="636" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">HTML 렌더링</text>

  <!-- Arrow 4 -->
  <polygon points="710,142 724,137 724,147" fill="#55c555"/>
  <line x1="696" y1="142" x2="724" y2="142" stroke="#55c555" stroke-width="2"/>

  <!-- Step 5: Response -->
  <rect x="728" y="110" width="112" height="64" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="784" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">Response</text>
  <text x="784" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">200 OK</text>
  <text x="784" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">text/html</text>

  <!-- Model flow (below) -->
  <text x="440" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">Model 전달 방법 비교</text>

  <!-- Model/ModelMap/ModelAndView boxes -->
  <rect x="60" y="234" width="220" height="116" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="170" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Model</text>
  <rect x="72" y="266" width="196" height="74" fill="#070b14" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="80" y="283" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">@GetMapping("/home")</text>
  <text x="80" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">public String home(</text>
  <text x="80" y="317" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc" xml:space="preserve">    Model model) {</text>
  <text x="80" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">  model.addAttribute(…);</text>

  <rect x="300" y="234" width="240" height="116" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="420" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">ModelAndView</text>
  <rect x="312" y="266" width="216" height="74" fill="#070b14" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="320" y="283" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">@GetMapping("/home")</text>
  <text x="320" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">public ModelAndView home() {</text>
  <text x="320" y="317" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">  ModelAndView mv = new …;</text>
  <text x="320" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">  mv.setViewName("home");</text>

  <rect x="560" y="234" width="260" height="116" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="690" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">Map / @ModelAttribute</text>
  <rect x="572" y="266" width="236" height="74" fill="#070b14" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="580" y="283" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">@GetMapping("/home")</text>
  <text x="580" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">public String home(</text>
  <text x="580" y="317" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc" xml:space="preserve">  Map&lt;String,Object&gt; model) {</text>
  <text x="580" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">  model.put("key", value);</text>

  <!-- ViewResolver chain -->
  <text x="440" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">ViewResolver 구현체</text>

  <rect x="60" y="404" width="186" height="60" fill="#0d1a2a" rx="6" stroke="#1e3a5a" stroke-width="1"/>
  <text x="153" y="424" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">ThymeleafViewResolver</text>
  <text x="153" y="442" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">templates/*.html</text>
  <text x="153" y="456" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Spring Boot 기본값</text>

  <rect x="264" y="404" width="186" height="60" fill="#0d1a2a" rx="6" stroke="#1e3a5a" stroke-width="1"/>
  <text x="357" y="424" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">InternalResource</text>
  <text x="357" y="441" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">ViewResolver</text>
  <text x="357" y="456" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">JSP (레거시)</text>

  <rect x="468" y="404" width="186" height="60" fill="#0d1a2a" rx="6" stroke="#1e3a5a" stroke-width="1"/>
  <text x="561" y="424" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#ce9178">ContentNegotiating</text>
  <text x="561" y="441" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#ce9178">ViewResolver</text>
  <text x="561" y="456" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Accept 헤더로 View 선택</text>

  <rect x="672" y="404" width="148" height="60" fill="#0d1a2a" rx="6" stroke="#1e3a5a" stroke-width="1"/>
  <text x="746" y="424" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">BeanName</text>
  <text x="746" y="441" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">ViewResolver</text>
  <text x="746" y="456" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">빈 이름으로 View 탐색</text>
</svg>
