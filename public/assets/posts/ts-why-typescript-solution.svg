<svg width="880" height="460" viewBox="0 0 880 460" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">TypeScript가 주는 4가지 핵심 이점</text>
  <!-- 4 benefits in 2x2 grid -->
  <!-- Top-left: Type Safety -->
  <rect x="60" y="70" width="370" height="160" rx="10" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">① 타입 안전성</text>
  <text x="80" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">오류를 실행 전에 컴파일 타임에 발견.</text>
  <text x="80" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">null 참조, 잘못된 타입 인자 등을</text>
  <text x="80" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">개발 중 즉시 감지합니다.</text>
  <text x="80" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">user.name  // IDE가 자동완성 제공</text>
  <text x="80" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">user.nmae  // 즉시 오류 표시</text>
  <!-- Top-right: Tooling -->
  <rect x="450" y="70" width="370" height="160" rx="10" fill="#0a1020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="470" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc">② 강력한 IDE 지원</text>
  <text x="470" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">자동완성, 타입 힌트, 인라인 문서,</text>
  <text x="470" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">자동 임포트, 리팩토링 도구가</text>
  <text x="470" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">정확하게 동작합니다.</text>
  <text x="470" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">Ctrl+Space  // 속성 목록 표시</text>
  <text x="470" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">F12         // 정의로 이동</text>
  <!-- Bottom-left: Documentation -->
  <rect x="60" y="248" width="370" height="160" rx="10" fill="#1a0a10" stroke="#ce9178" stroke-width="1.5"/>
  <text x="80" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#ce9178">③ 살아있는 문서화</text>
  <text x="80" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">타입 시그니처가 곧 문서입니다.</text>
  <text x="80" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">함수가 무엇을 받고 반환하는지</text>
  <text x="80" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">코드 자체에 명시됩니다.</text>
  <text x="80" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">fetch(url: string): Promise&lt;Response&gt;</text>
  <text x="80" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">// 읽기만 해도 사용법을 알 수 있음</text>
  <!-- Bottom-right: Refactoring -->
  <rect x="450" y="248" width="370" height="160" rx="10" fill="#0a1810" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="470" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">④ 안전한 리팩토링</text>
  <text x="470" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">타입을 바꾸면 영향 받는 모든 곳에</text>
  <text x="470" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">오류가 표시됩니다.</text>
  <text x="470" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">대규모 코드베이스에서도 자신 있게</text>
  <text x="470" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">코드를 변경할 수 있습니다.</text>
  <text x="470" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">Rename Symbol  // 전체 프로젝트 적용</text>
</svg>
