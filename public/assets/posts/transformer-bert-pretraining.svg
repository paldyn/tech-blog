<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">BERT 사전학습: MLM + NSP</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">양방향 컨텍스트 + 문장 간 관계 학습 — 레이블 없는 대규모 텍스트로</text>

  <!-- MLM section -->
  <rect x="50" y="90" width="380" height="370" fill="#0d1117" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">① Masked Language Model (MLM)</text>
  <text x="240" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">전체 토큰의 15%를 마스킹 → 원본 토큰 예측</text>

  <!-- Input sequence visualization -->
  <text x="66" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">입력:</text>
  <rect x="104" y="150" width="52" height="28" fill="#1a2a1a" rx="4"/><text x="130" y="169" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">나는</text>
  <rect x="160" y="150" width="52" height="28" fill="#2a0a0a" rx="4" stroke="#e05555" stroke-width="1.5"/><text x="186" y="169" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" text-anchor="middle">[M]</text>
  <rect x="216" y="150" width="52" height="28" fill="#1a2a1a" rx="4"/><text x="242" y="169" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">좋아</text>
  <rect x="272" y="150" width="52" height="28" fill="#1a2a1a" rx="4"/><text x="298" y="169" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">한다</text>
  <rect x="328" y="150" width="52" height="28" fill="#1a2a1a" rx="4"/><text x="354" y="169" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">[SEP]</text>

  <line x1="240" y1="178" x2="240" y2="196" stroke="#444" stroke-width="2"/>
  <polygon points="234,196 240,208 246,196" fill="#444"/>

  <!-- BERT encoder -->
  <rect x="104" y="208" width="276" height="40" fill="#1a1f35" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="242" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">BERT Encoder (양방향)</text>

  <line x1="186" y1="248" x2="186" y2="266" stroke="#444" stroke-width="1.5"/>
  <polygon points="180,266 186,278 192,266" fill="#444"/>

  <!-- MLM head output -->
  <rect x="104" y="278" width="276" height="40" fill="#111827" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="242" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">MLM Head: Linear + Softmax</text>

  <!-- Prediction arrow -->
  <line x1="186" y1="318" x2="186" y2="336" stroke="#444" stroke-width="1.5"/>
  <polygon points="180,336 186,348 192,336" fill="#444"/>
  <rect x="104" y="348" width="276" height="32" fill="#0a1520" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="242" y="369" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">예측: "AI"  (정답 복원)</text>

  <!-- MLM masking strategy -->
  <rect x="66" y="396" width="348" height="54" fill="#111827" rx="4"/>
  <text x="240" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">마스킹 전략 (선택된 15% 중)</text>
  <text x="240" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">80% [MASK] 치환 | 10% 랜덤 토큰 | 10% 원본 유지</text>
  <text x="240" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">→ 모델이 실제 추론 시 [MASK] 없이도 견고하게 동작</text>

  <!-- NSP section -->
  <rect x="450" y="90" width="380" height="370" fill="#0d1117" rx="8" stroke="#ce9178" stroke-width="1.5"/>
  <text x="640" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#ce9178" text-anchor="middle">② Next Sentence Prediction (NSP)</text>
  <text x="640" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">두 문장이 실제로 이어지는지 이진 분류</text>

  <!-- NSP example -->
  <rect x="466" y="148" width="348" height="50" fill="#111827" rx="4"/>
  <text x="640" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">[CLS] 나는 AI를 좋아한다 [SEP]</text>
  <text x="640" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">딥러닝은 AI의 한 분야다 [SEP]</text>

  <text x="640" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">→ 레이블: IsNext ✓</text>

  <rect x="466" y="232" width="348" height="50" fill="#111827" rx="4"/>
  <text x="640" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">[CLS] 나는 AI를 좋아한다 [SEP]</text>
  <text x="640" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">오늘 날씨가 맑다 [SEP]</text>
  <text x="640" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">→ 레이블: NotNext ✗</text>

  <!-- [CLS] token -->
  <rect x="466" y="316" width="348" height="80" fill="#111827" rx="4"/>
  <text x="640" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#ce9178" text-anchor="middle">[CLS] 토큰의 역할</text>
  <text x="640" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">항상 첫 번째 위치 → 전체 시퀀스 요약</text>
  <text x="640" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">NSP 분류: [CLS] 표현 → Binary Classifier</text>
  <text x="640" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">파인튜닝: [CLS] 표현으로 다운스트림 분류</text>

  <!-- Scale info -->
  <rect x="466" y="408" width="348" height="40" fill="#111827" rx="4"/>
  <text x="640" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#b5cea8" text-anchor="middle">사전학습 규모</text>
  <text x="640" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">BookCorpus + 위키피디아 (총 3.3B 단어), 256 TPU</text>
</svg>
