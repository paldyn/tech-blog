<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">직접 만드는 고차 함수</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">함수를 받아 조합하는 패턴</text>

  <!-- compose -->
  <rect x="60" y="100" width="360" height="170" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="240" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">함수 합성 (compose)</text>
  <rect x="76" y="136" width="328" height="118" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">def</tspan> compose(f, g):</text>
  <text x="92" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    <tspan fill="#7ec8e3">return lambda</tspan> x: f(g(x))</text>
  <text x="92" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"></text>
  <text x="92" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">double = <tspan fill="#7ec8e3">lambda</tspan> x: x * <tspan fill="#b5cea8">2</tspan></text>
  <text x="92" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">inc    = <tspan fill="#7ec8e3">lambda</tspan> x: x + <tspan fill="#b5cea8">1</tspan></text>
  <text x="92" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">double_then_inc = compose(inc, double)</text>

  <!-- memoize -->
  <rect x="460" y="100" width="360" height="170" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="640" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">메모이제이션 (memoize)</text>
  <rect x="476" y="136" width="328" height="118" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="492" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">def</tspan> memoize(func):</text>
  <text x="492" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    cache = {}</text>
  <text x="492" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    def</tspan> wrapper(*args):</text>
  <text x="492" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">        if</tspan> args <tspan fill="#7ec8e3">not in</tspan> cache:</text>
  <text x="492" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">            cache[args] = func(*args)</text>
  <text x="492" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">        return</tspan> cache[args]</text>

  <!-- Pipeline -->
  <rect x="60" y="290" width="760" height="130" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="440" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#ce9178">파이프라인 (pipeline)</text>
  <rect x="76" y="326" width="728" height="78" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">from</tspan> functools <tspan fill="#7ec8e3">import</tspan> reduce</text>
  <text x="92" y="364" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">def</tspan> pipeline(*funcs):</text>
  <text x="92" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">    return lambda</tspan> val: reduce(<tspan fill="#7ec8e3">lambda</tspan> v, f: f(v), funcs, val)</text>
  <text x="92" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># pipeline(strip, upper, exclaim)("hello") → "HELLO!"</tspan></text>

  <text x="440" y="442" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">고차 함수로 로직을 조합 가능한 작은 단위로 분리</text>
</svg>
