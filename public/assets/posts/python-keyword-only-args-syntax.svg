<?xml version="1.0" encoding="UTF-8"?>
<svg width="880" height="440" viewBox="0 0 880 440" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="60" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">키워드 전용 인수: * 구분자</text>
  <text x="60" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">* 뒤 매개변수는 반드시 이름을 명시해서 전달</text>

  <!-- Syntax diagram -->
  <rect x="60" y="90" width="760" height="68" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="76" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">def</tspan><tspan fill="#ffffff"> send(to, subject, *, cc=</tspan><tspan fill="#7ec8e3">None</tspan><tspan fill="#ffffff">, bcc=</tspan><tspan fill="#7ec8e3">None</tspan><tspan fill="#ffffff">, html=</tspan><tspan fill="#7ec8e3">False</tspan><tspan fill="#ffffff">):</tspan></text>
  <text x="76" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    ...     # * 뒤: cc, bcc, html 은 키워드로만 전달 가능</text>

  <!-- Annotation: before * -->
  <rect x="60" y="188" width="340" height="220" fill="#000000" rx="8" stroke="#7ec8e3"/>
  <text x="230" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">* 이전: 일반 매개변수</text>
  <text x="76" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">send(</tspan><tspan fill="#ce9178">"you@x.com"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="76" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">     </tspan><tspan fill="#ce9178">"안녕"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="76" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">     cc=</tspan><tspan fill="#ce9178">"cc@x.com"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="76" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">to, subject는 위치로 전달 가능</text>
  <text x="76" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">send("you@x.com", "안녕") ✓</text>
  <text x="76" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">위치 또는 키워드 모두 허용</text>

  <!-- Annotation: after * -->
  <rect x="480" y="188" width="340" height="220" fill="#000000" rx="8" stroke="#55c555"/>
  <text x="650" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">* 이후: 키워드 전용</text>
  <text x="496" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 성공 ✓</text>
  <text x="496" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">send(</tspan><tspan fill="#ce9178">"a"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"b"</tspan><tspan fill="#ffffff">, html=</tspan><tspan fill="#7ec8e3">True</tspan><tspan fill="#ffffff">)</tspan></text>

  <text x="496" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 오류 ✗</text>
  <text x="496" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e05555">send(</tspan><tspan fill="#ce9178">"a"</tspan><tspan fill="#e05555">, </tspan><tspan fill="#ce9178">"b"</tspan><tspan fill="#e05555">, </tspan><tspan fill="#7ec8e3">None</tspan><tspan fill="#e05555">, </tspan><tspan fill="#7ec8e3">None</tspan><tspan fill="#e05555">, </tspan><tspan fill="#7ec8e3">True</tspan><tspan fill="#e05555">)</tspan></text>
  <text x="496" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555"># TypeError: too many positional</text>
  <text x="496" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">키워드만 허용 — 위치 전달 불가</text>
</svg>
