<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Mistral 패밀리 모델 맵</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">유럽에서 나온 효율성의 대명사 LLM</text>

  <!-- Mistral 7B -->
  <rect x="60" y="96" width="220" height="130" rx="8" fill="#111827" stroke="#55c555" stroke-width="2"/>
  <text x="170" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">Mistral 7B</text>
  <text x="170" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">2023.09 공개</text>
  <line x1="76" y1="154" x2="264" y2="154" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• LLaMA 13B 능가</text>
  <text x="80" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• Sliding Window Attention</text>
  <text x="80" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">• Apache 2.0 라이선스</text>

  <!-- Mixtral 8x7B -->
  <rect x="310" y="96" width="240" height="130" rx="8" fill="#111827" stroke="#e05555" stroke-width="2"/>
  <text x="430" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555">Mixtral 8x7B</text>
  <text x="430" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">2023.12 공개 (Sparse MoE)</text>
  <line x1="326" y1="154" x2="534" y2="154" stroke="#3a4a6e" stroke-width="1"/>
  <text x="330" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 8개 전문가 중 2개 활성화</text>
  <text x="330" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 실제 추론: 12B 수준</text>
  <text x="330" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">• GPT-3.5 동급 성능</text>

  <!-- Mistral Large / Le Chat -->
  <rect x="580" y="96" width="240" height="130" rx="8" fill="#111827" stroke="#7777cc" stroke-width="2"/>
  <text x="700" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc">Mistral Large</text>
  <text x="700" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">2024.02 API 전용</text>
  <line x1="596" y1="154" x2="804" y2="154" stroke="#3a4a6e" stroke-width="1"/>
  <text x="600" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• GPT-4급 추론 능력</text>
  <text x="600" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 다국어 (프랑스어 특화)</text>
  <text x="600" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">• La Plateforme API</text>

  <!-- MoE Explanation -->
  <rect x="60" y="256" width="760" height="156" rx="8" fill="#0d1117" stroke="#333" stroke-width="1"/>
  <text x="84" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8">Sparse Mixture of Experts (MoE) 핵심 원리</text>

  <!-- MoE diagram -->
  <!-- Input -->
  <rect x="84" y="296" width="80" height="32" rx="4" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="124" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">입력</text>

  <!-- Router -->
  <rect x="204" y="296" width="80" height="32" rx="4" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="244" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">Router</text>

  <!-- Experts -->
  <rect x="334" y="284" width="60" height="26" rx="4" fill="#1a1a2e" stroke="#888" stroke-width="1"/>
  <text x="364" y="301" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">E1</text>
  <rect x="404" y="284" width="60" height="26" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="434" y="301" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">E2 ✓</text>
  <rect x="474" y="284" width="60" height="26" rx="4" fill="#1a1a2e" stroke="#888" stroke-width="1"/>
  <text x="504" y="301" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">E3</text>
  <rect x="334" y="318" width="60" height="26" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="364" y="335" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">E4 ✓</text>
  <rect x="404" y="318" width="60" height="26" rx="4" fill="#1a1a2e" stroke="#888" stroke-width="1"/>
  <text x="434" y="335" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">E5</text>
  <rect x="474" y="318" width="60" height="26" rx="4" fill="#1a1a2e" stroke="#888" stroke-width="1"/>
  <text x="504" y="335" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">E6</text>

  <!-- Output -->
  <rect x="574" y="296" width="80" height="32" rx="4" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="614" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">합산 출력</text>

  <text x="690" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">8개 중 2개만</text>
  <text x="690" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">활성화 →</text>
  <text x="690" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">속도↑ 비용↓</text>

  <!-- Arrows (simple lines for flow) -->
  <line x1="164" y1="312" x2="202" y2="312" stroke="#444" stroke-width="2" marker-end="url(#b)"/>
  <line x1="284" y1="312" x2="332" y2="312" stroke="#444" stroke-width="2" marker-end="url(#b)"/>
  <line x1="536" y1="312" x2="572" y2="312" stroke="#444" stroke-width="2" marker-end="url(#b)"/>
  <defs>
    <marker id="b" markerWidth="18.6667" markerHeight="14" refX="18.6667" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 18.6667 7, 0 14" fill="#555"/>
    </marker>
  </defs>

  <text x="84" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Mixtral 8x7B: 총 파라미터 46.7B지만 추론 시 12B만 활성화 → 비용 대비 성능 최상</text>
</svg>
