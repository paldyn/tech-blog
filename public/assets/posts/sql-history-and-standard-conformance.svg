<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">DBMS별 SQL 표준 준수 수준</text>
  <text x="440" y="68" text-anchor="middle" font-size="14" fill="#888">Core SQL-92 대비 주요 방언(Dialect) 비교</text>

  <!-- Column headers -->
  <text x="160" y="100" text-anchor="middle" font-size="13" font-weight="600" fill="#888">기능</text>
  <text x="290" y="100" text-anchor="middle" font-size="13" font-weight="600" fill="#e05555">Oracle</text>
  <text x="400" y="100" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">PostgreSQL</text>
  <text x="520" y="100" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">MySQL</text>
  <text x="640" y="100" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">SQL Server</text>
  <text x="760" y="100" text-anchor="middle" font-size="13" font-weight="600" fill="#e8c060">표준</text>
  <line x1="60" y1="108" x2="820" y2="108" stroke="#2a3040" stroke-width="1"/>

  <!-- Row 1: OUTER JOIN -->
  <rect x="60" y="112" width="760" height="36" fill="#0d1520" rx="0"/>
  <text x="160" y="135" text-anchor="middle" font-size="12" fill="#e8e8e8">OUTER JOIN</text>
  <text x="290" y="135" text-anchor="middle" font-size="12" fill="#55c555">✓ 표준</text>
  <text x="400" y="135" text-anchor="middle" font-size="12" fill="#55c555">✓ 표준</text>
  <text x="520" y="135" text-anchor="middle" font-size="12" fill="#55c555">✓ 표준</text>
  <text x="640" y="135" text-anchor="middle" font-size="12" fill="#55c555">✓ 표준</text>
  <text x="760" y="135" text-anchor="middle" font-size="11" fill="#888">SQL-92</text>

  <!-- Row 2: LIMIT -->
  <rect x="60" y="148" width="760" height="36" fill="#0a1018" rx="0"/>
  <text x="160" y="171" text-anchor="middle" font-size="12" fill="#e8e8e8">행 수 제한</text>
  <text x="290" y="171" text-anchor="middle" font-size="12" fill="#e05555">ROWNUM/FETCH</text>
  <text x="400" y="171" text-anchor="middle" font-size="12" fill="#7ec8e3">LIMIT/FETCH</text>
  <text x="520" y="171" text-anchor="middle" font-size="12" fill="#55c555">LIMIT</text>
  <text x="640" y="171" text-anchor="middle" font-size="12" fill="#7777cc">TOP/FETCH</text>
  <text x="760" y="171" text-anchor="middle" font-size="11" fill="#e8c060">FETCH FIRST</text>

  <!-- Row 3: Auto PK -->
  <rect x="60" y="184" width="760" height="36" fill="#0d1520" rx="0"/>
  <text x="160" y="207" text-anchor="middle" font-size="12" fill="#e8e8e8">자동 증가 PK</text>
  <text x="290" y="207" text-anchor="middle" font-size="12" fill="#e05555">SEQUENCE</text>
  <text x="400" y="207" text-anchor="middle" font-size="12" fill="#7ec8e3">SERIAL/IDENTITY</text>
  <text x="520" y="207" text-anchor="middle" font-size="12" fill="#55c555">AUTO_INCREMENT</text>
  <text x="640" y="207" text-anchor="middle" font-size="12" fill="#7777cc">IDENTITY</text>
  <text x="760" y="207" text-anchor="middle" font-size="11" fill="#e8c060">IDENTITY(SQL:2003)</text>

  <!-- Row 4: String concat -->
  <rect x="60" y="220" width="760" height="36" fill="#0a1018" rx="0"/>
  <text x="160" y="243" text-anchor="middle" font-size="12" fill="#e8e8e8">문자열 연결</text>
  <text x="290" y="243" text-anchor="middle" font-size="12" fill="#e05555">||  또는 CONCAT</text>
  <text x="400" y="243" text-anchor="middle" font-size="12" fill="#7ec8e3">|| (표준)</text>
  <text x="520" y="243" text-anchor="middle" font-size="12" fill="#55c555">CONCAT()</text>
  <text x="640" y="243" text-anchor="middle" font-size="12" fill="#7777cc">+ 또는 CONCAT</text>
  <text x="760" y="243" text-anchor="middle" font-size="11" fill="#e8c060">|| (SQL-92)</text>

  <!-- Row 5: UPSERT -->
  <rect x="60" y="256" width="760" height="36" fill="#0d1520" rx="0"/>
  <text x="160" y="279" text-anchor="middle" font-size="12" fill="#e8e8e8">UPSERT</text>
  <text x="290" y="279" text-anchor="middle" font-size="12" fill="#e05555">MERGE INTO</text>
  <text x="400" y="279" text-anchor="middle" font-size="12" fill="#7ec8e3">INSERT … ON CONFLICT</text>
  <text x="520" y="279" text-anchor="middle" font-size="12" fill="#55c555">INSERT … ON DUPLICATE</text>
  <text x="640" y="279" text-anchor="middle" font-size="12" fill="#7777cc">MERGE</text>
  <text x="760" y="279" text-anchor="middle" font-size="11" fill="#e8c060">MERGE(SQL:2003)</text>

  <!-- Row 6: Window func -->
  <rect x="60" y="292" width="760" height="36" fill="#0a1018" rx="0"/>
  <text x="160" y="315" text-anchor="middle" font-size="12" fill="#e8e8e8">윈도우 함수</text>
  <text x="290" y="315" text-anchor="middle" font-size="12" fill="#55c555">✓ 완전</text>
  <text x="400" y="315" text-anchor="middle" font-size="12" fill="#55c555">✓ 완전</text>
  <text x="520" y="315" text-anchor="middle" font-size="12" fill="#55c555">✓ 8.0+</text>
  <text x="640" y="315" text-anchor="middle" font-size="12" fill="#55c555">✓ 완전</text>
  <text x="760" y="315" text-anchor="middle" font-size="11" fill="#e8c060">SQL:1999</text>

  <!-- Border -->
  <rect x="60" y="112" width="760" height="216" fill="none" stroke="#2a3040" stroke-width="1" rx="4"/>

  <!-- Key message -->
  <rect x="60" y="348" width="760" height="88" fill="#0f1a0f" rx="8" stroke="#1e5a1e" stroke-width="1"/>
  <text x="80" y="374" font-size="13" font-weight="600" fill="#55c555">표준과 방언(Dialect)을 구분해야 하는 이유</text>
  <text x="80" y="396" font-size="12" fill="#e8e8e8">SQL-92 Core를 익히면 어떤 DBMS에서도 80% 이상 통용됩니다.</text>
  <text x="80" y="416" font-size="12" fill="#888">나머지 20%는 DBMS별 방언 — 이식성이 중요한 코드는 표준 문법을 우선 사용하세요.</text>
  <text x="80" y="432" font-size="12" fill="#888">방언은 성능·편의 이유로 존재하므로 DBMS를 고정할 수 있다면 적극 활용해도 좋습니다.</text>

  <!-- Footer -->
  <text x="440" y="462" text-anchor="middle" font-size="11" fill="#444">PALDYN · SQL 완전 정복 Chapter 1</text>
</svg>
