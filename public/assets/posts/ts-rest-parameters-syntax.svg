<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">나머지 매개변수 (Rest Parameters)</text>

  <!-- Top code box: basic syntax -->
  <text x="440" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">기본 문법: ...args: T[]</text>

  <rect x="60" y="88" width="760" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="75" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">// 기본 rest 매개변수</text>
  <text x="75" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> sum(...nums: </tspan>
    <tspan fill="#7ec8e3" font-weight="600">number</tspan>
    <tspan fill="#ffffff">[]): </tspan>
    <tspan fill="#7ec8e3" font-weight="600">number</tspan>
    <tspan fill="#ffffff"> {</tspan>
  </text>
  <text x="75" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">  return</tspan>
    <tspan fill="#ffffff"> nums.reduce((acc, n) </tspan>
    <tspan fill="#7ec8e3" font-weight="600">=&gt;</tspan>
    <tspan fill="#ffffff"> acc + n, </tspan>
    <tspan fill="#b5cea8">0</tspan>
    <tspan fill="#ffffff">);</tspan>
  </text>
  <text x="75" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">}</tspan>
  </text>
  <text x="75" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">sum(</tspan>
    <tspan fill="#b5cea8">1</tspan>
    <tspan fill="#ffffff">, </tspan>
    <tspan fill="#b5cea8">2</tspan>
    <tspan fill="#ffffff">, </tspan>
    <tspan fill="#b5cea8">3</tspan>
    <tspan fill="#ffffff">, </tspan>
    <tspan fill="#b5cea8">4</tspan>
    <tspan fill="#ffffff">);    </tspan>
    <tspan fill="#9aa4b8">// 10 — 개수 제한 없음</tspan>
  </text>
  <text x="75" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">sum();              </tspan>
    <tspan fill="#9aa4b8">// 0 — 빈 배열 허용</tspan>
  </text>

  <!-- Left: Typed rest + prefix -->
  <text x="230" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">앞 매개변수와 조합</text>

  <rect x="60" y="254" width="340" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="75" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">// 일반 + rest 조합</text>
  <text x="75" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> log(</tspan>
  </text>
  <text x="75" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">  level: </tspan>
    <tspan fill="#7ec8e3" font-weight="600">string</tspan>
    <tspan fill="#ffffff">,</tspan>
  </text>
  <text x="75" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">  ...msgs: </tspan>
    <tspan fill="#7ec8e3" font-weight="600">string</tspan>
    <tspan fill="#ffffff">[]</tspan>
  </text>
  <text x="75" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">) { </tspan>
    <tspan fill="#9aa4b8">/* ... */</tspan>
    <tspan fill="#ffffff"> }</tspan>
  </text>

  <!-- Right: Tuple rest -->
  <text x="650" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">튜플 타입 Rest</text>

  <rect x="480" y="254" width="340" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="495" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">// 튜플 rest — 정확한 타입</text>
  <text x="495" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> trio(</tspan>
  </text>
  <text x="495" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">  ...args: [</tspan>
    <tspan fill="#7ec8e3" font-weight="600">string</tspan>
    <tspan fill="#ffffff">, </tspan>
    <tspan fill="#7ec8e3" font-weight="600">number</tspan>
    <tspan fill="#ffffff">, </tspan>
    <tspan fill="#7ec8e3" font-weight="600">boolean</tspan>
    <tspan fill="#ffffff">]</tspan>
  </text>
  <text x="495" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">) { </tspan>
    <tspan fill="#9aa4b8">/* 정확히 3개 */</tspan>
    <tspan fill="#ffffff"> }</tspan>
  </text>
  <text x="495" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">trio(</tspan>
    <tspan fill="#ce9178">'a'</tspan>
    <tspan fill="#ffffff">, </tspan>
    <tspan fill="#b5cea8">1</tspan>
    <tspan fill="#ffffff">, </tspan>
    <tspan fill="#7ec8e3" font-weight="600">true</tspan>
    <tspan fill="#ffffff">); </tspan>
    <tspan fill="#9aa4b8">// OK</tspan>
  </text>

  <!-- Bottom rules -->
  <rect x="60" y="385" width="760" height="55" rx="6" fill="#0a1628" stroke="#3178c6" stroke-width="1.5"/>
  <text x="440" y="407" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Rest 매개변수 규칙</text>
  <text x="440" y="427" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">반드시 마지막 매개변수 위치 · 함수당 하나 · 타입은 배열 또는 튜플이어야 함</text>
</svg>
