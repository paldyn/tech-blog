<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">불변 객체 — 상태 변경 없이 새 객체로</text>

  <!-- Mutable side -->
  <text x="160" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e05555" text-anchor="middle">가변 객체 (Mutable)</text>
  <rect x="60" y="96" width="200" height="70" rx="8" fill="#2a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="160" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">Point { x=3, y=4 }</text>
  <text x="160" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">상태를 내부에서 직접 변경</text>

  <line x1="270" y1="131" x2="300" y2="131" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="285" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555" text-anchor="middle">setX(5)</text>

  <rect x="310" y="96" width="200" height="70" rx="8" fill="#2a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="410" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">Point { x=5, y=4 }</text>
  <text x="410" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">같은 객체 — 원본 훼손</text>

  <!-- Immutable side -->
  <text x="700" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">불변 객체 (Immutable)</text>
  <rect x="560" y="96" width="200" height="70" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="660" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">Point { x=3, y=4 }</text>
  <text x="660" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">원본 유지 — 변경 불가</text>

  <!-- withX arrow going down to new object -->
  <line x1="660" y1="166" x2="660" y2="200" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="700" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">withX(5)</text>

  <rect x="560" y="210" width="200" height="70" rx="8" fill="#0d1f0d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="660" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">Point { x=5, y=4 }</text>
  <text x="660" y="259" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">새 객체 — 원본 보존</text>

  <!-- Code block -->
  <rect x="60" y="310" width="760" height="160" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">public final class</tspan><tspan fill="#ffffff"> Point {</tspan></text>
  <text x="76" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">    private final int</tspan><tspan fill="#ffffff"> x, y;</tspan></text>
  <text x="76" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">    public</tspan><tspan fill="#ffffff"> Point(</tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff"> x, </tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff"> y) { </tspan><tspan fill="#7ec8e3" font-weight="600">this</tspan><tspan fill="#ffffff">.x=x; </tspan><tspan fill="#7ec8e3" font-weight="600">this</tspan><tspan fill="#ffffff">.y=y; }</tspan></text>
  <text x="76" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    // setter 없음 — withX()로 새 객체 반환</text>
  <text x="76" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">    public</tspan><tspan fill="#ffffff"> Point withX(</tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff"> newX) {</tspan></text>
  <text x="76" y="432" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">        return new</tspan><tspan fill="#ffffff"> Point(newX, </tspan><tspan fill="#7ec8e3" font-weight="600">this</tspan><tspan fill="#ffffff">.y);</tspan></text>
  <text x="76" y="452" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    }</tspan></text>
  <text x="76" y="462" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">}</tspan></text>
</svg>
