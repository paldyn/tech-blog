<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="jcaArr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">JCA 프로바이더 아키텍처</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">엔진 클래스는 알고리즘 이름만 요청하고, 실제 구현은 프로바이더가 제공한다</text>

  <!-- Application -->
  <rect x="290" y="98" width="300" height="58" rx="8" fill="#101020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc">애플리케이션 코드</text>
  <text x="440" y="145" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">MessageDigest.getInstance("SHA-256")</text>

  <line x1="440" y1="156" x2="440" y2="186" stroke="#7ec8e3" stroke-width="2" marker-end="url(#jcaArr)"/>

  <!-- Engine class (facade) -->
  <rect x="240" y="188" width="400" height="58" rx="8" fill="#102010" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">엔진 클래스 (Engine Class)</text>
  <text x="440" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">MessageDigest · Cipher · Signature · KeyGenerator</text>

  <line x1="440" y1="246" x2="440" y2="276" stroke="#7ec8e3" stroke-width="2" marker-end="url(#jcaArr)"/>
  <text x="560" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">알고리즘 이름으로 조회</text>

  <!-- Providers -->
  <rect x="100" y="278" width="200" height="86" rx="8" fill="#1a1a10" stroke="#e0b055" stroke-width="1.5"/>
  <text x="200" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e0b055">SUN</text>
  <text x="200" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">SHA · DSA</text>
  <text x="200" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">기본 제공</text>

  <rect x="340" y="278" width="200" height="86" rx="8" fill="#1a1a10" stroke="#e0b055" stroke-width="1.5"/>
  <text x="440" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e0b055">SunJCE</text>
  <text x="440" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">AES · RSA</text>
  <text x="440" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">기본 제공</text>

  <rect x="580" y="278" width="200" height="86" rx="8" fill="#1a1a10" stroke="#e0b055" stroke-width="1.5"/>
  <text x="680" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e0b055">BouncyCastle</text>
  <text x="680" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">확장 알고리즘</text>
  <text x="680" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">서드파티</text>

  <text x="440" y="404" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">프로바이더를 교체해도 애플리케이션 코드는 그대로 — 이것이 JCA의 플러그형 설계다</text>
</svg>
