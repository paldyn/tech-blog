<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="flow-arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888"/>
    </marker>
    <marker id="flow-aug" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="flow-rev" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">포드-풀커슨 — 최대 유량 탐색</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">간선 표기: 현재유량/최대용량 | 초록=증가경로</text>

  <!-- Flow network: S(100,250), A(260,140), B(260,360), C(440,140), D(440,360), T(600,250) -->

  <!-- S→A: cap 10, flow 10 (saturated) -->
  <line x1="124" y1="240" x2="244" y2="152" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#flow-arr)"/>
  <text x="173" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" font-weight="600" text-anchor="middle">10/10</text>

  <!-- S→B: cap 8, flow 8 -->
  <line x1="124" y1="260" x2="244" y2="348" stroke="#55c555" stroke-width="2.5" marker-end="url(#flow-aug)"/>
  <text x="173" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" font-weight="600" text-anchor="middle">8/8</text>

  <!-- A→C: cap 6, flow 6 -->
  <line x1="278" y1="140" x2="424" y2="140" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#flow-arr)"/>
  <text x="351" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" font-weight="600" text-anchor="middle">6/6</text>

  <!-- A→D: cap 4, flow 4 -->
  <line x1="270" y1="154" x2="428" y2="348" stroke="#55c555" stroke-width="2.5" marker-end="url(#flow-aug)"/>
  <text x="355" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" font-weight="600" text-anchor="middle">4/4</text>

  <!-- B→C: cap 5, flow 2 -->
  <line x1="270" y1="348" x2="428" y2="154" stroke="#e8e8e8" stroke-width="2" marker-end="url(#flow-arr)"/>
  <text x="344" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">2/5</text>

  <!-- B→D: cap 8, flow 6 -->
  <line x1="278" y1="362" x2="424" y2="362" stroke="#e8e8e8" stroke-width="2" marker-end="url(#flow-arr)"/>
  <text x="351" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">6/8</text>

  <!-- C→T: cap 10, flow 8 -->
  <line x1="456" y1="148" x2="580" y2="240" stroke="#e8e8e8" stroke-width="2" marker-end="url(#flow-arr)"/>
  <text x="524" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">8/10</text>

  <!-- D→T: cap 10, flow 10 -->
  <line x1="456" y1="354" x2="580" y2="260" stroke="#55c555" stroke-width="2.5" marker-end="url(#flow-aug)"/>
  <text x="524" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" font-weight="600" text-anchor="middle">10/10</text>

  <!-- Nodes -->
  <circle cx="100" cy="250" r="28" fill="#1a3a5e" stroke="#7ec8e3" stroke-width="2.5"/>
  <text x="100" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#7ec8e3" text-anchor="middle">S</text>
  <text x="100" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">출발(source)</text>

  <circle cx="260" cy="140" r="24" fill="#111" stroke="#555" stroke-width="2"/>
  <text x="260" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e8e8e8" text-anchor="middle">A</text>

  <circle cx="260" cy="360" r="24" fill="#111" stroke="#555" stroke-width="2"/>
  <text x="260" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e8e8e8" text-anchor="middle">B</text>

  <circle cx="440" cy="140" r="24" fill="#111" stroke="#555" stroke-width="2"/>
  <text x="440" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e8e8e8" text-anchor="middle">C</text>

  <circle cx="440" cy="360" r="24" fill="#111" stroke="#555" stroke-width="2"/>
  <text x="440" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e8e8e8" text-anchor="middle">D</text>

  <circle cx="600" cy="250" r="28" fill="#3a1a1a" stroke="#e05555" stroke-width="2.5"/>
  <text x="600" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#e05555" text-anchor="middle">T</text>
  <text x="600" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">도착(sink)</text>

  <!-- Max flow value -->
  <rect x="660" y="160" width="200" height="160" fill="#111" rx="10" stroke="#55c555" stroke-width="2"/>
  <text x="760" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">최대 유량</text>
  <text x="760" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="32" font-weight="700" fill="#55c555" text-anchor="middle">18</text>
  <text x="760" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">= S→A→... 10</text>
  <text x="760" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">+ S→B→... 8</text>
  <text x="760" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">(최소 컷 = 18)</text>

  <!-- Min cut indicator -->
  <rect x="660" y="340" width="200" height="100" fill="#2a1a1a" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="760" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" font-weight="600" text-anchor="middle">최소 컷 (Min-Cut)</text>
  <text x="760" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">{S,A,B} | {C,D,T}</text>
  <text x="760" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">컷 용량 = max-flow</text>
  <text x="760" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">(최대-유량 최소-컷 정리)</text>
</svg>
