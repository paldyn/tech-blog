<svg xmlns="http://www.w3.org/2000/svg" width="880" height="290" viewBox="0 0 880 290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="290" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">Celery 구조: 보내고, 쌓고, 처리한다</text>

  <defs>
    <marker id="clar" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="50" y="110" width="180" height="90" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="140" y="146" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">웹 앱 (생산자)</text>
  <text x="140" y="170" font-size="12" fill="#9aa4b8" text-anchor="middle">task.delay() 호출</text>
  <text x="140" y="190" font-size="12" fill="#9aa4b8" text-anchor="middle">바로 응답 반환</text>

  <line x1="230" y1="155" x2="296" y2="155" stroke="#7ec8e3" stroke-width="2" marker-end="url(#clar)"/>
  <text x="263" y="138" font-size="11" fill="#9aa4b8" text-anchor="middle">작업 등록</text>

  <rect x="300" y="110" width="180" height="90" rx="6" fill="#000000" stroke="#7777cc" stroke-width="1"/>
  <text x="390" y="146" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">브로커 (큐)</text>
  <text x="390" y="170" font-size="12" fill="#9aa4b8" text-anchor="middle">Redis · RabbitMQ</text>
  <text x="390" y="190" font-size="12" fill="#9aa4b8" text-anchor="middle">작업을 쌓아 둠</text>

  <line x1="480" y1="155" x2="546" y2="155" stroke="#7ec8e3" stroke-width="2" marker-end="url(#clar)"/>
  <text x="513" y="138" font-size="11" fill="#9aa4b8" text-anchor="middle">가져가 실행</text>

  <rect x="550" y="110" width="180" height="90" rx="6" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="146" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">워커 (소비자)</text>
  <text x="640" y="170" font-size="12" fill="#9aa4b8" text-anchor="middle">실제 작업 수행</text>
  <text x="640" y="190" font-size="12" fill="#9aa4b8" text-anchor="middle">여러 개 가능</text>

  <line x1="730" y1="155" x2="796" y2="155" stroke="#55c555" stroke-width="2" marker-end="url(#clar)"/>

  <rect x="760" y="110" width="70" height="90" rx="6" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="795" y="150" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">결과</text>
  <text x="795" y="174" font-size="12" fill="#9aa4b8" text-anchor="middle">저장소</text>

  <rect x="50" y="226" width="780" height="42" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="252" font-size="13" fill="#55c555" text-anchor="middle">요청은 작업만 큐에 던지고 즉시 응답 — 무거운 일은 워커가 뒤에서 처리한다</text>
</svg>
