<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arrow" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 L5,7 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Nexacro N 빌드 옵션 구조</text>

  <!-- Root node -->
  <rect x="260" y="60" width="360" height="50" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3">빌드 설정 (TypeDef.xml)</text>
  <text x="440" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">루트 설정 파일</text>

  <!-- Trunk lines -->
  <line x1="440" y1="110" x2="440" y2="136" stroke="#333" stroke-width="1.5"/>
  <line x1="160" y1="136" x2="720" y2="136" stroke="#333" stroke-width="1.5"/>
  <line x1="160" y1="136" x2="160" y2="160" stroke="#333" stroke-width="1.5"/>
  <line x1="440" y1="136" x2="440" y2="160" stroke="#333" stroke-width="1.5"/>
  <line x1="720" y1="136" x2="720" y2="160" stroke="#333" stroke-width="1.5"/>

  <!-- Branch 1: 서비스 설정 -->
  <rect x="40" y="160" width="240" height="40" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc">서비스 설정</text>

  <!-- Branch 1 items -->
  <rect x="40" y="216" width="240" height="130" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="60" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">▸ ServiceInfo</text>
  <text x="80" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">(서버 URL)</text>
  <text x="60" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">▸ Protocol 설정</text>
  <text x="60" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">▸ Timeout 값</text>

  <!-- Branch 2: 리소스 설정 -->
  <rect x="320" y="160" width="240" height="40" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">리소스 설정</text>

  <!-- Branch 2 items -->
  <rect x="320" y="216" width="240" height="130" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="340" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">▸ JS/CSS 번들링</text>
  <text x="340" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">▸ 이미지 압축</text>
  <text x="340" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">▸ 캐시 제어</text>

  <!-- Branch 3: 배포 환경 -->
  <rect x="600" y="160" width="240" height="40" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="720" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e05555">배포 환경</text>

  <!-- Branch 3 items -->
  <rect x="600" y="216" width="240" height="130" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="620" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">▸ dev / staging / prod</text>
  <text x="620" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">▸ Debug 모드 플래그</text>
  <text x="620" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">▸ 소스맵 생성 여부</text>

  <!-- Bottom note -->
  <rect x="200" y="374" width="480" height="48" rx="8" fill="#1a1a1a" stroke="#444" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="440" y="394" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">각 환경별 TypeDef_&#123;env&#125;.xml 로 분리 관리</text>
  <text x="440" y="412" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">배포 시 해당 환경의 설정 파일을 TypeDef.xml 로 복사</text>

  <!-- Lines to bottom note -->
  <line x1="160" y1="346" x2="160" y2="366" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="160" y1="366" x2="440" y2="366" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="440" y1="346" x2="440" y2="366" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="720" y1="346" x2="720" y2="366" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="720" y1="366" x2="440" y2="366" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="440" y1="366" x2="440" y2="374" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
