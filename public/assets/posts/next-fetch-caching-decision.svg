<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arb" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="are" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="aro" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e09050"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">캐시 옵션 선택 가이드</text>

  <!-- Question: 데이터 변경 빈도? -->
  <rect x="300" y="70" width="280" height="60" rx="10" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="96"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">데이터가 얼마나 자주 바뀌나요?</text>
  <text x="440" y="116"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">변경 빈도가 캐시 전략의 핵심</text>

  <!-- Arrow: never/rarely -->
  <line x1="360" y1="130" x2="200" y2="190" stroke="#55c555" stroke-width="2" marker-end="url(#arg)"/>
  <text x="230" y="174"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">거의 안 바뀜</text>

  <!-- Arrow: sometimes -->
  <line x1="440" y1="130" x2="440" y2="190" stroke="#e09050" stroke-width="2" marker-end="url(#aro)"/>
  <text x="448" y="168"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e09050">주기적 변경</text>

  <!-- Arrow: always -->
  <line x1="520" y1="130" x2="680" y2="190" stroke="#e05555" stroke-width="2" marker-end="url(#are)"/>
  <text x="594" y="174"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">매 요청마다 다름</text>

  <!-- Result 1: force-cache -->
  <rect x="60" y="194" width="270" height="76" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="195" y="220"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">force-cache (기본)</text>
  <text x="195" y="240"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">빌드 시 패칭 후 CDN 캐시</text>
  <text x="195" y="258"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">정적 페이지, 공개 콘텐츠</text>

  <!-- Result 2: revalidate/tags -->
  <rect x="305" y="194" width="270" height="76" rx="8" fill="#0d0d1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="220"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc">revalidate / tags</text>
  <text x="440" y="240"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">TTL 또는 이벤트 기반 무효화</text>
  <text x="440" y="258"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">블로그, 상품 목록, ISR</text>

  <!-- Result 3: no-store -->
  <rect x="550" y="194" width="270" height="76" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="685" y="220"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">no-store</text>
  <text x="685" y="240"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">매 요청마다 새 fetch</text>
  <text x="685" y="258"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">실시간 데이터, 개인화 콘텐츠</text>

  <!-- Warning: revalidate:0 -->
  <rect x="60" y="300" width="760" height="60" rx="8" fill="#1a1000" stroke="#e09050" stroke-width="1"/>
  <text x="440" y="324"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e09050">⚠ revalidate: 0 vs cache: 'no-store'</text>
  <text x="440" y="346"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">revalidate: 0 은 동적 렌더링 강제 (no-store와 동일 효과). 두 옵션을 동시에 사용하면 no-store 우선.</text>

  <!-- Dynamic functions note -->
  <rect x="60" y="382" width="760" height="56" rx="8" fill="#0d0d0d" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="406"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">동적 함수 사용 시 자동으로 no-store 적용</text>
  <text x="440" y="426"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">cookies(), headers(), searchParams 등을 사용하면 해당 라우트 전체가 동적 렌더링으로 전환됩니다</text>
</svg>
