<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">아날로그 변조(Modulation) 방식</text>

  <!-- ASK -->
  <rect x="60" y="66" width="240" height="150" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="180" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">ASK (진폭 편이)</text>
  <!-- Wave: high amp = 1, low amp = 0 -->
  <path d="M 80 130 Q 92 104 104 130 Q 116 156 128 130 Q 140 104 152 130 Q 164 156 176 130
           Q 188 128 200 128 Q 212 128 224 128 Q 236 128 248 128 Q 260 128 272 128 Q 284 128 290 128"
        fill="none" stroke="#55c555" stroke-width="2"/>
  <text x="120" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">1 = 높은 진폭</text>
  <text x="240" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">0 = 낮은 진폭</text>
  <text x="180" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">광통신, 잡음에 취약</text>

  <!-- FSK -->
  <rect x="320" y="66" width="240" height="150" rx="8" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">FSK (주파수 편이)</text>
  <!-- High freq = 1, Low freq = 0 -->
  <path d="M 340 130 Q 347 110 354 130 Q 361 150 368 130 Q 375 110 382 130 Q 389 150 396 130 Q 403 110 410 130 Q 417 150 424 130
           M 430 130 Q 442 118 454 130 Q 466 142 478 130 Q 490 118 502 130 Q 514 142 526 130"
        fill="none" stroke="#7ec8e3" stroke-width="2"/>
  <text x="382" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">1 = 높은 주파수</text>
  <text x="500" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">0 = 낮은 주파수</text>
  <text x="440" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">모뎀, 잡음에 강함</text>

  <!-- PSK -->
  <rect x="580" y="66" width="240" height="150" rx="8" fill="#1a120a" stroke="#e8a55c" stroke-width="1.5"/>
  <text x="700" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8a55c" text-anchor="middle">PSK (위상 편이)</text>
  <!-- Same freq, phase change -->
  <path d="M 600 130 Q 612 110 624 130 Q 636 150 648 130 Q 660 110 672 130 Q 684 150 696 130
           M 700 130 Q 712 150 724 130 Q 736 110 748 130 Q 760 150 772 130 Q 784 110 796 130"
        fill="none" stroke="#e8a55c" stroke-width="2"/>
  <line x1="698" y1="100" x2="698" y2="160" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="640" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8a55c" text-anchor="middle">1→0 위상 반전</text>
  <text x="700" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Wi-Fi, LTE, 고속 모뎀</text>

  <!-- QAM explanation -->
  <rect x="60" y="240" width="760" height="170" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e8e8e8" text-anchor="middle">QAM (직교 진폭 변조) — 현대 통신의 핵심</text>
  <text x="440" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">진폭(ASK) + 위상(PSK) 결합 → 심볼당 여러 비트 전송</text>
  <!-- QAM constellation points (simplified) -->
  <!-- Axis -->
  <line x1="300" y1="360" x2="580" y2="360" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="440" y1="310" x2="440" y2="400" stroke="#3a4a6e" stroke-width="1"/>
  <!-- 16-QAM points -->
  <circle cx="380" cy="320" r="5" fill="#7ec8e3"/>
  <circle cx="410" cy="320" r="5" fill="#7ec8e3"/>
  <circle cx="470" cy="320" r="5" fill="#7ec8e3"/>
  <circle cx="500" cy="320" r="5" fill="#7ec8e3"/>
  <circle cx="380" cy="345" r="5" fill="#55c555"/>
  <circle cx="410" cy="345" r="5" fill="#55c555"/>
  <circle cx="470" cy="345" r="5" fill="#55c555"/>
  <circle cx="500" cy="345" r="5" fill="#55c555"/>
  <circle cx="380" cy="375" r="5" fill="#e8a55c"/>
  <circle cx="410" cy="375" r="5" fill="#e8a55c"/>
  <circle cx="470" cy="375" r="5" fill="#e8a55c"/>
  <circle cx="500" cy="375" r="5" fill="#e8a55c"/>
  <circle cx="380" cy="395" r="5" fill="#cc55cc"/>
  <circle cx="410" cy="395" r="5" fill="#cc55cc"/>
  <circle cx="470" cy="395" r="5" fill="#cc55cc"/>
  <circle cx="500" cy="395" r="5" fill="#cc55cc"/>
  <text x="440" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">16-QAM 성상도</text>
  <text x="640" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">16-QAM: 4비트/심볼</text>
  <text x="640" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">64-QAM: 6비트/심볼</text>
  <text x="640" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8a55c">256-QAM: 8비트/심볼</text>
  <text x="640" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Wi-Fi 6E, 5G 사용</text>
</svg>
