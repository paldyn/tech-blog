<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Next.js 렌더링 방식 비교</text>
  <text x="440" y="70" text-anchor="middle" font-size="14" fill="#888">SSR · SSG · ISR · CSR — 언제 무엇을 선택할까</text>

  <!-- SSR row -->
  <rect x="60" y="90" width="760" height="66" rx="8" fill="#10102a" stroke="#7777cc" stroke-width="1.5"/>
  <rect x="60" y="90" width="110" height="66" rx="8" fill="#7777cc22"/>
  <text x="115" y="126" text-anchor="middle" font-size="15" font-weight="700" fill="#7777cc">SSR</text>
  <text x="115" y="144" text-anchor="middle" font-size="11" fill="#7777cc">서버 사이드</text>
  <text x="360" y="118" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">요청마다 서버에서 HTML 생성</text>
  <text x="360" y="140" text-anchor="middle" font-size="12" fill="#888">로그인 대시보드, 실시간 데이터가 필요한 페이지</text>
  <text x="680" y="126" text-anchor="middle" font-size="12" fill="#9aa4b8">cache: 'no-store'</text>

  <!-- SSG row -->
  <rect x="60" y="170" width="760" height="66" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <rect x="60" y="170" width="110" height="66" rx="8" fill="#55c55522"/>
  <text x="115" y="206" text-anchor="middle" font-size="15" font-weight="700" fill="#55c555">SSG</text>
  <text x="115" y="224" text-anchor="middle" font-size="11" fill="#55c555">정적 생성</text>
  <text x="360" y="198" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">빌드 시 HTML을 미리 생성 (가장 빠름)</text>
  <text x="360" y="220" text-anchor="middle" font-size="12" fill="#888">블로그, 마케팅 페이지, 문서 사이트</text>
  <text x="680" y="206" text-anchor="middle" font-size="12" fill="#9aa4b8">cache: 'force-cache'</text>

  <!-- ISR row -->
  <rect x="60" y="250" width="760" height="66" rx="8" fill="#1a150a" stroke="#ce9178" stroke-width="1.5"/>
  <rect x="60" y="250" width="110" height="66" rx="8" fill="#ce917822"/>
  <text x="115" y="286" text-anchor="middle" font-size="15" font-weight="700" fill="#ce9178">ISR</text>
  <text x="115" y="304" text-anchor="middle" font-size="11" fill="#ce9178">증분 재생성</text>
  <text x="360" y="278" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">빌드 후에도 주기적으로 페이지 재생성</text>
  <text x="360" y="300" text-anchor="middle" font-size="12" fill="#888">상품 목록, 뉴스 피드, 가격 정보</text>
  <text x="680" y="286" text-anchor="middle" font-size="12" fill="#9aa4b8">revalidate: 3600</text>

  <!-- CSR row -->
  <rect x="60" y="330" width="760" height="66" rx="8" fill="#0c1a1f" stroke="#7ec8e3" stroke-width="1.5"/>
  <rect x="60" y="330" width="110" height="66" rx="8" fill="#7ec8e322"/>
  <text x="115" y="366" text-anchor="middle" font-size="15" font-weight="700" fill="#7ec8e3">CSR</text>
  <text x="115" y="384" text-anchor="middle" font-size="11" fill="#7ec8e3">클라이언트</text>
  <text x="360" y="358" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">브라우저에서 JavaScript로 렌더링</text>
  <text x="360" y="380" text-anchor="middle" font-size="12" fill="#888">인터랙티브 차트, 에디터, 실시간 UI</text>
  <text x="680" y="366" text-anchor="middle" font-size="12" fill="#9aa4b8">'use client' + useEffect</text>
</svg>
