<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">
    BuildKit --mount=type=secret 사용법
  </text>

  <!-- Code: secret mount -->
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Dockerfile (비밀값 이미지에 포함 안 됨)</text>
  <rect x="60" y="86" width="760" height="144" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="106" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># syntax=docker/dockerfile:1</tspan></text>
  <text x="76" y="124" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">FROM</tspan><tspan fill="#ffffff"> node:20-slim</tspan>
  </text>
  <text x="76" y="142" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">WORKDIR</tspan><tspan fill="#ffffff"> /app</tspan>
  </text>
  <text x="76" y="160" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">COPY</tspan><tspan fill="#ffffff"> package*.json ./</tspan>
  </text>
  <text x="76" y="178" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># .npmrc를 이미지에 남기지 않고 npm ci에 제공</text>
  <text x="76" y="196" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">RUN</tspan><tspan fill="#ffffff"> --mount=type=secret,id=npmrc,target=/root/.npmrc \</tspan>
  </text>
  <text x="76" y="214" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    npm ci</tspan>
  </text>

  <!-- Build command -->
  <text x="60" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">빌드 명령</text>
  <rect x="60" y="262" width="760" height="54" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="282" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># --secret으로 파일 제공</text>
  <text x="76" y="300" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">docker build --secret id=npmrc,src=$HOME/.npmrc -t myapp .</tspan>
  </text>

  <!-- Verify -->
  <text x="60" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">검증: 이미지에 .npmrc가 없음을 확인</text>
  <rect x="60" y="350" width="760" height="54" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="370" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">docker run --rm myapp find / -name .npmrc 2&gt;/dev/null</tspan>
  </text>
  <text x="76" y="390" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 출력 없으면 성공 — .npmrc가 이미지 어디에도 없음</text>
</svg>
