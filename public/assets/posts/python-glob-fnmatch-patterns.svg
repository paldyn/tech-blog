<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">glob / fnmatch 패턴 비교</text>

  <!-- Header row -->
  <rect x="60" y="68" width="200" height="36" rx="6" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="160" y="91" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">패턴</text>
  <rect x="272" y="68" width="200" height="36" rx="6" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="372" y="91" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">의미</text>
  <rect x="484" y="68" width="356" height="36" rx="6" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="662" y="91" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">예시</text>

  <!-- Row 1 -->
  <rect x="60" y="116" width="200" height="36" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="160" y="139" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" text-anchor="middle">*</text>
  <rect x="272" y="116" width="200" height="36" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="372" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">0개 이상의 문자 (/ 제외)</text>
  <rect x="484" y="116" width="356" height="36" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="662" y="139" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" text-anchor="middle">*.py → a.py, hello.py</text>

  <!-- Row 2 -->
  <rect x="60" y="164" width="200" height="36" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="160" y="187" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" text-anchor="middle">?</text>
  <rect x="272" y="164" width="200" height="36" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="372" y="187" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">정확히 1개의 문자</text>
  <rect x="484" y="164" width="356" height="36" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="662" y="187" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" text-anchor="middle">file?.py → file1.py, filea.py</text>

  <!-- Row 3 -->
  <rect x="60" y="212" width="200" height="36" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="160" y="235" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" text-anchor="middle">[abc]</text>
  <rect x="272" y="212" width="200" height="36" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="372" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">문자 집합 중 하나</text>
  <rect x="484" y="212" width="356" height="36" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="662" y="235" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" text-anchor="middle">[abc].txt → a.txt, c.txt</text>

  <!-- Row 4 -->
  <rect x="60" y="260" width="200" height="36" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="160" y="283" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" text-anchor="middle">[!abc] / [^abc]</text>
  <rect x="272" y="260" width="200" height="36" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="372" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">집합 이외의 문자</text>
  <rect x="484" y="260" width="356" height="36" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="662" y="283" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" text-anchor="middle">[!0-9]* → 숫자 아닌 시작</text>

  <!-- Row 5 -->
  <rect x="60" y="308" width="200" height="36" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="160" y="331" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">** (glob only)</text>
  <rect x="272" y="308" width="200" height="36" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="372" y="331" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">모든 하위 디렉토리 포함</text>
  <rect x="484" y="308" width="356" height="36" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="662" y="331" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" text-anchor="middle">**/*.py → 재귀 탐색</text>

  <!-- Note -->
  <rect x="60" y="360" width="760" height="68" rx="8" fill="#111820" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="383" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">모듈 차이</text>
  <text x="440" y="405" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">glob: 파일시스템 실제 탐색 · fnmatch: 문자열 패턴 매칭만 (파일 존재 확인 없음)</text>
  <text x="440" y="421" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">glob은 ** 지원 (recursive=True 필요), fnmatch는 미지원</text>
</svg>
