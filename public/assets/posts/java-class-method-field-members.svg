<svg xmlns="http://www.w3.org/2000/svg" width="880" height="330" viewBox="0 0 880 330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="330" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">Class에서 갈라지는 멤버 객체들</text>

  <defs>
    <marker id="cmArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="350" y="86" width="180" height="56" rx="8" fill="#0d1322" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="113" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">Class&lt;?&gt;</text>
  <text x="440" y="132" font-size="12" fill="#888" text-anchor="middle">타입 메타 객체</text>

  <!-- Field -->
  <rect x="60" y="200" width="230" height="86" rx="8" fill="#0f1626" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="175" y="228" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">Field</text>
  <text x="175" y="252" font-size="12" fill="#9aa4b8" text-anchor="middle">get(obj) / set(obj, v)</text>
  <text x="175" y="272" font-size="12" fill="#9aa4b8" text-anchor="middle">getType() / getName()</text>

  <!-- Method -->
  <rect x="325" y="200" width="230" height="86" rx="8" fill="#0f1626" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="228" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">Method</text>
  <text x="440" y="252" font-size="12" fill="#9aa4b8" text-anchor="middle">invoke(obj, args...)</text>
  <text x="440" y="272" font-size="12" fill="#9aa4b8" text-anchor="middle">getReturnType()</text>

  <!-- Constructor -->
  <rect x="590" y="200" width="230" height="86" rx="8" fill="#0f1626" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="705" y="228" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">Constructor</text>
  <text x="705" y="252" font-size="12" fill="#9aa4b8" text-anchor="middle">newInstance(args...)</text>
  <text x="705" y="272" font-size="12" fill="#9aa4b8" text-anchor="middle">getParameterTypes()</text>

  <line x1="400" y1="142" x2="200" y2="198" stroke="#7ec8e3" stroke-width="2" marker-end="url(#cmArr)"/>
  <line x1="440" y1="142" x2="440" y2="198" stroke="#7ec8e3" stroke-width="2" marker-end="url(#cmArr)"/>
  <line x1="480" y1="142" x2="680" y2="198" stroke="#7ec8e3" stroke-width="2" marker-end="url(#cmArr)"/>

  <text x="175" y="172" font-size="12" fill="#7ec8e3" text-anchor="middle">getDeclaredFields()</text>
  <text x="705" y="172" font-size="12" fill="#7ec8e3" text-anchor="middle">getDeclaredConstructors()</text>
</svg>
