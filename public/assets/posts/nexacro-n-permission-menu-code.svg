<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" fill="#e8e8e8" font-size="22" font-weight="700" text-anchor="middle">권한 체크 · 버튼 제어 코드</text>

  <text x="230" y="82" fill="#888" font-size="13" text-anchor="middle">메뉴 권한 필터링</text>
  <rect x="60" y="92" width="360" height="322" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="114" xml:space="preserve" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// 메뉴 Dataset 필터 적용</text>
  <text x="76" y="132" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">function <tspan fill="#e8e8e8">fn_filterMenu</tspan>() {</text>
  <text x="76" y="150" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  var <tspan fill="#e8e8e8">dsMenu</tspan> = this.ds_menu;</text>
  <text x="76" y="168" xml:space="preserve" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  // 삭제 대상 수집</text>
  <text x="76" y="186" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  var <tspan fill="#e8e8e8">aRemove</tspan> = [];</text>
  <text x="76" y="204" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  for <tspan fill="#e8e8e8">(var i=0; i&lt;dsMenu.rowcount; i++) {</tspan></text>
  <text x="76" y="222" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    var <tspan fill="#e8e8e8">sId</tspan> = dsMenu.getColumn(</text>
  <text x="76" y="240" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">      i, <tspan fill="#ce9178">"menuId"</tspan>);</text>
  <text x="76" y="258" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    if <tspan fill="#e8e8e8">(!fn_hasAuth(sId))</tspan></text>
  <text x="76" y="276" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">      aRemove.push(i);</text>
  <text x="76" y="294" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  }</text>
  <text x="76" y="312" xml:space="preserve" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  // 역순 삭제 (인덱스 안전)</text>
  <text x="76" y="330" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  for <tspan fill="#e8e8e8">(var j=aRemove.length-1;</tspan></text>
  <text x="76" y="348" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">       j &gt;= 0; j--)</text>
  <text x="76" y="366" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    dsMenu.deleteRow(aRemove[j]);</text>
  <text x="76" y="384" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  this.mnu_main.refresh();</text>
  <text x="76" y="402" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>

  <text x="650" y="82" fill="#888" font-size="13" text-anchor="middle">버튼 권한 제어</text>
  <rect x="460" y="92" width="360" height="322" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="476" y="114" xml:space="preserve" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// gds_menuAuth로 버튼 제어</text>
  <text x="476" y="132" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">function <tspan fill="#e8e8e8">fn_applyBtnAuth</tspan>(sMenuId) {</text>
  <text x="476" y="150" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  var <tspan fill="#e8e8e8">ds</tspan> = application.gds_menuAuth;</text>
  <text x="476" y="168" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  var <tspan fill="#e8e8e8">nRow</tspan> = ds.findRow(</text>
  <text x="476" y="186" xml:space="preserve" fill="#ce9178" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    "menuId", sMenuId);</text>
  <text x="476" y="204" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  var <tspan fill="#e8e8e8">bNew</tspan> = nRow &gt;= 0 &amp;&amp;</text>
  <text x="476" y="222" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    ds.getColumn(nRow, <tspan fill="#ce9178">"auth_new"</tspan>) == <tspan fill="#ce9178">"Y"</tspan>;</text>
  <text x="476" y="240" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  var <tspan fill="#e8e8e8">bDel</tspan> = nRow &gt;= 0 &amp;&amp;</text>
  <text x="476" y="258" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    ds.getColumn(nRow, <tspan fill="#ce9178">"auth_del"</tspan>) == <tspan fill="#ce9178">"Y"</tspan>;</text>
  <text x="476" y="276" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  this.btn_new.set_enable(bNew);</text>
  <text x="476" y="294" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  this.btn_delete.set_enable(bDel);</text>
  <text x="476" y="312" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>
  <text x="476" y="340" xml:space="preserve" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// 권한 확인 헬퍼</text>
  <text x="476" y="358" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">function <tspan fill="#e8e8e8">fn_hasAuth</tspan>(sMenuId) {</text>
  <text x="476" y="376" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  var <tspan fill="#e8e8e8">ds</tspan> = application.gds_menuAuth;</text>
  <text x="476" y="394" xml:space="preserve" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  return <tspan fill="#e8e8e8">ds.findRow(</tspan><tspan fill="#ce9178">"menuId"</tspan>,</text>
  <text x="476" y="412" xml:space="preserve" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    sMenuId) &gt;= 0;</text>
</svg>
