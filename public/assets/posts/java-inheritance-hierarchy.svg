<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560">
  <defs>
    <marker id="arr-inh" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-gray" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Java 상속 계층 구조</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">extends 키워드로 부모 클래스의 상태와 행동을 물려받는다</text>

  <!-- === Parent class: Animal === -->
  <rect x="290" y="100" width="300" height="150" rx="10"
        fill="#111827" stroke="#3b82f6" stroke-width="2"/>
  <!-- class header -->
  <rect x="290" y="100" width="300" height="36" rx="10" fill="#1e3a5f"/>
  <rect x="290" y="122" width="300" height="14" fill="#1e3a5f"/>
  <text x="440" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">Animal  (부모 클래스 / 슈퍼클래스)</text>

  <line x1="290" y1="142" x2="590" y2="142" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
  <text x="310" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">- name : String</text>
  <text x="310" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">- age  : int</text>
  <line x1="290" y1="192" x2="590" y2="192" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
  <text x="310" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">+ getName() : String</text>
  <text x="310" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">+ sound() : void</text>

  <!-- Arrow from Dog to Animal -->
  <line x1="210" y1="310" x2="350" y2="252" stroke="#7ec8e3" stroke-width="2"
        marker-end="url(#arr-inh)"/>

  <!-- Arrow from Cat to Animal -->
  <line x1="670" y1="310" x2="530" y2="252" stroke="#7ec8e3" stroke-width="2"
        marker-end="url(#arr-inh)"/>

  <!-- "extends" label left -->
  <text x="248" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle" font-style="italic">extends</text>

  <!-- "extends" label right -->
  <text x="632" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle" font-style="italic">extends</text>

  <!-- === Child class: Dog === -->
  <rect x="60" y="316" width="300" height="170" rx="10"
        fill="#111827" stroke="#55c555" stroke-width="2"/>
  <rect x="60" y="316" width="300" height="36" rx="10" fill="#1a3a1a"/>
  <rect x="60" y="338" width="300" height="14" fill="#1a3a1a"/>
  <text x="210" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">Dog  (자식 클래스 / 서브클래스)</text>

  <line x1="60" y1="358" x2="360" y2="358" stroke="#55c555" stroke-width="1" opacity="0.5"/>
  <text x="80" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">- breed : String</text>
  <text x="80" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">↑ Dog 고유 필드</text>
  <line x1="60" y1="408" x2="360" y2="408" stroke="#55c555" stroke-width="1" opacity="0.5"/>
  <text x="80" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">+ sound() : void  // @Override</text>
  <text x="80" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">+ fetch() : void</text>
  <text x="80" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">↑ Dog 고유 메서드</text>

  <!-- === Child class: Cat === -->
  <rect x="520" y="316" width="300" height="170" rx="10"
        fill="#111827" stroke="#e0a055" stroke-width="2"/>
  <rect x="520" y="316" width="300" height="36" rx="10" fill="#3a2a10"/>
  <rect x="520" y="338" width="300" height="14" fill="#3a2a10"/>
  <text x="670" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e0a055" text-anchor="middle">Cat  (자식 클래스 / 서브클래스)</text>

  <line x1="520" y1="358" x2="820" y2="358" stroke="#e0a055" stroke-width="1" opacity="0.5"/>
  <text x="540" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">- indoor : boolean</text>
  <text x="540" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">↑ Cat 고유 필드</text>
  <line x1="520" y1="408" x2="820" y2="408" stroke="#e0a055" stroke-width="1" opacity="0.5"/>
  <text x="540" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e0a055">+ sound() : void  // @Override</text>
  <text x="540" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e0a055">+ purr() : void</text>
  <text x="540" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">↑ Cat 고유 메서드</text>

  <!-- IS-A 관계 레이블 -->
  <text x="440" y="520" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">IS-A 관계: Dog is-a Animal · Cat is-a Animal</text>
  <text x="440" y="543" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">상속받은 name, age 필드와 getName() 메서드를 Dog와 Cat 모두 사용 가능</text>
</svg>
