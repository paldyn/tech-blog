<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Container vs Form — 배치 방식 비교</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">Div · Spread · Tab vs 단독 화면 Form</text>

  <!-- Left column: Container -->
  <rect x="60" y="90" width="360" height="364" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="240" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">Container 계열</text>
  <text x="240" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Form 안에서 자식 컴포넌트를 그루핑</text>

  <!-- Div -->
  <rect x="76" y="150" width="328" height="56" rx="6" fill="#111" stroke="#3a5a7a" stroke-width="1.5"/>
  <text x="240" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Div</text>
  <text x="240" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">범용 그룹 박스. 독자 스크롤 가능</text>

  <!-- Spread -->
  <rect x="76" y="216" width="328" height="56" rx="6" fill="#111" stroke="#3a5a7a" stroke-width="1.5"/>
  <text x="240" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Spread</text>
  <text x="240" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">반복 데이터 타일 렌더링</text>

  <!-- Tab -->
  <rect x="76" y="282" width="328" height="56" rx="6" fill="#111" stroke="#3a5a7a" stroke-width="1.5"/>
  <text x="240" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Tab / TabPanel</text>
  <text x="240" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">탭별 콘텐츠 전환</text>

  <!-- Characteristics -->
  <rect x="76" y="348" width="328" height="88" rx="6" fill="#0a1520" stroke="#2a4a6a" stroke-width="1"/>
  <text x="240" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">특성</text>
  <text x="90" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 부모 Form의 스크립트 스코프 공유</text>
  <text x="90" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• this.divPanel.컴포넌트 로 접근</text>
  <text x="90" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• visible 토글로 패널 전환 용이</text>

  <!-- Right column: Form (separate) -->
  <rect x="460" y="90" width="360" height="364" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">Form 계열</text>
  <text x="640" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">ChildFrame에 로드되는 독립 화면</text>

  <!-- Form types -->
  <rect x="476" y="150" width="328" height="56" rx="6" fill="#111" stroke="#3a7a3a" stroke-width="1.5"/>
  <text x="640" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Form (일반)</text>
  <text x="640" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">ChildFrame에 set_loadurl로 로드</text>

  <rect x="476" y="216" width="328" height="56" rx="6" fill="#111" stroke="#3a7a3a" stroke-width="1.5"/>
  <text x="640" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">PopupForm</text>
  <text x="640" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">독립 창 팝업 / 레이어 팝업</text>

  <rect x="476" y="282" width="328" height="56" rx="6" fill="#111" stroke="#3a7a3a" stroke-width="1.5"/>
  <text x="640" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Include Form</text>
  <text x="640" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Include 태그로 삽입되는 조각</text>

  <!-- Characteristics -->
  <rect x="476" y="348" width="328" height="88" rx="6" fill="#0a1f0a" stroke="#2a6a2a" stroke-width="1"/>
  <text x="640" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">특성</text>
  <text x="490" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 독립 스크립트 스코프</text>
  <text x="490" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 별도 xfdl 파일로 분리</text>
  <text x="490" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 생명주기 이벤트(onload 등) 보유</text>

  <!-- Footer -->
  <text x="440" y="482" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN · Nexacro N 완전 정복 시리즈</text>
</svg>
