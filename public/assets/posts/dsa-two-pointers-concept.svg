<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">투 포인터 (Two Pointers)</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">두 인덱스를 독립적으로 이동해 O(N²) → O(N) 달성</text>

  <!-- Pattern 1: Two Sum (sorted) -->
  <text x="80" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">패턴 1 — 양쪽 끝에서 수렴 (Two Sum in Sorted Array)</text>

  <!-- Array: 1 3 5 7 9 11 -->
  <!-- Cell width 70, starting at x=80 -->
  <rect x="80"  y="112" width="64" height="44" rx="4" fill="#222" stroke="#444"/>
  <text x="112" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#e8e8e8" text-anchor="middle">1</text>

  <rect x="148" y="112" width="64" height="44" rx="4" fill="#222" stroke="#444"/>
  <text x="180" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#e8e8e8" text-anchor="middle">3</text>

  <rect x="216" y="112" width="64" height="44" rx="4" fill="#222" stroke="#444"/>
  <text x="248" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#e8e8e8" text-anchor="middle">5</text>

  <rect x="284" y="112" width="64" height="44" rx="4" fill="#222" stroke="#444"/>
  <text x="316" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#e8e8e8" text-anchor="middle">7</text>

  <rect x="352" y="112" width="64" height="44" rx="4" fill="#222" stroke="#444"/>
  <text x="384" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#e8e8e8" text-anchor="middle">9</text>

  <rect x="420" y="112" width="64" height="44" rx="4" fill="#222" stroke="#444"/>
  <text x="452" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#e8e8e8" text-anchor="middle">11</text>

  <!-- left pointer highlight -->
  <rect x="80" y="112" width="64" height="44" rx="4" fill="none" stroke="#e05555" stroke-width="2.5"/>
  <text x="112" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">left=0</text>

  <!-- right pointer highlight -->
  <rect x="420" y="112" width="64" height="44" rx="4" fill="none" stroke="#7ec8e3" stroke-width="2.5"/>
  <text x="452" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">right=5</text>

  <text x="600" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">target = 12</text>
  <text x="600" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">1 + 11 = 12 ✓</text>

  <!-- Logic arrows -->
  <text x="80" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">sum &gt; target → right-- | sum &lt; target → left++ | sum == target → 정답</text>

  <!-- Pattern 2: Fast/Slow -->
  <text x="80" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">패턴 2 — 같은 방향 이동 (Fast/Slow Pointer)</text>

  <!-- Array for window -->
  <rect x="80"  y="248" width="64" height="44" rx="4" fill="#222" stroke="#444"/>
  <text x="112" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#e8e8e8" text-anchor="middle">2</text>

  <rect x="148" y="248" width="64" height="44" rx="4" fill="#1a2e1a" stroke="#55c555" stroke-width="2"/>
  <text x="180" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#55c555" text-anchor="middle">1</text>

  <rect x="216" y="248" width="64" height="44" rx="4" fill="#1a2e1a" stroke="#55c555" stroke-width="2"/>
  <text x="248" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#55c555" text-anchor="middle">5</text>

  <rect x="284" y="248" width="64" height="44" rx="4" fill="#1a2e1a" stroke="#55c555" stroke-width="2"/>
  <text x="316" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#55c555" text-anchor="middle">3</text>

  <rect x="352" y="248" width="64" height="44" rx="4" fill="#222" stroke="#444"/>
  <text x="384" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#e8e8e8" text-anchor="middle">2</text>

  <rect x="420" y="248" width="64" height="44" rx="4" fill="#222" stroke="#444"/>
  <text x="452" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#e8e8e8" text-anchor="middle">4</text>

  <text x="180" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">slow=1</text>
  <text x="316" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">fast=3</text>
  <text x="600" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">slow는 조건 만족 시 이동</text>
  <text x="600" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">fast는 매 스텝 이동</text>

  <!-- Pattern 3 description -->
  <text x="80" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">패턴 3 — 분리 배열 병합 (Merge Two Sorted)</text>
  <text x="80" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">각 배열에 포인터 하나씩 — 비교 후 작은 쪽 선택 및 전진</text>

  <!-- Complexity -->
  <rect x="60" y="384" width="760" height="76" rx="8" fill="#111" stroke="#333"/>
  <text x="440" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">투 포인터 적용 조건</text>
  <text x="200" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">✓ 단조성: 포인터 이동이</text>
  <text x="200" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">역행하지 않아야 함</text>
  <text x="440" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">✓ 각 포인터가 최대</text>
  <text x="440" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">N번 이동 → O(N)</text>
  <text x="700" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">✓ 포인터 이동 결정이</text>
  <text x="700" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">O(1) 이내</text>
</svg>
