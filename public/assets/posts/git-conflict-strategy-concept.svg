<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">-X ours / -X theirs: 자동 충돌 해결 전략</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#888">충돌 시 어느 쪽을 자동으로 선택할지 미리 지정</text>

  <!-- merge context -->
  <text x="220" y="103" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">git merge 에서의 의미</text>

  <rect x="60" y="114" width="320" height="140" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1"/>
  <text x="220" y="140" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">git merge -X ours feature</text>
  <line x1="80" y1="148" x2="360" y2="148" stroke="#1e2433" stroke-width="1"/>
  <text x="100" y="168"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">ours = HEAD (main)</text>
  <text x="100" y="188"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">충돌 시 main 버전을 선택</text>
  <text x="100" y="212"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">theirs = 병합 대상(feature)</text>
  <text x="100" y="232"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">충돌 시 feature 버전을 선택</text>

  <!-- rebase context -->
  <text x="660" y="103" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">git rebase 에서의 의미 (반대!)</text>

  <rect x="500" y="114" width="320" height="140" rx="8" fill="#0d1117" stroke="#e05555" stroke-width="1.5"/>
  <text x="660" y="134" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">⚠ rebase 중에는 ours/theirs 반전!</text>
  <line x1="520" y1="142" x2="800" y2="142" stroke="#1e2433" stroke-width="1"/>
  <text x="520" y="162"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">rebase 중 ours = 현재 재배치 기준(base)</text>
  <text x="520" y="182"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">즉 ours가 "원래 브랜치"가 아님</text>
  <text x="520" y="206"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">git rebase -X theirs main</text>
  <text x="520" y="226"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">→ feature 커밋 내용 유지</text>

  <!-- Middle: warning banner -->
  <rect x="60" y="276" width="760" height="60" rx="8" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">주의: -X 전략은 충돌 파일 전체에 적용된다</text>
  <text x="440" y="322" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">충돌 위치마다 다른 판단이 필요하다면 수동 해결이 더 안전하다</text>

  <!-- Bottom: use cases -->
  <rect x="60" y="358" width="360" height="88" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="240" y="380" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">-X ours 적합한 상황</text>
  <text x="80" y="402"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 버전 번호, 빌드 설정을 main 기준으로 고정</text>
  <text x="80" y="422"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 실험적 브랜치 병합 시 기존 코드 보호</text>
  <text x="80" y="438"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 대규모 포맷 변경 롤백</text>

  <rect x="460" y="358" width="360" height="88" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="640" y="380" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">-X theirs 적합한 상황</text>
  <text x="480" y="402"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• feature의 최신 변경을 모두 수용</text>
  <text x="480" y="422"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 번역 파일, 자동생성 파일 업데이트</text>
  <text x="480" y="438"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 포맷터 결과로 전면 교체</text>
</svg>
