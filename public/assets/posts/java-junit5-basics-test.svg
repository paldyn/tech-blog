<svg xmlns="http://www.w3.org/2000/svg" width="880" height="384" viewBox="0 0 880 384">
  <rect width="880" height="384" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">첫 JUnit 5 테스트</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">@Test · assertEquals · @DisplayName</text>

  <rect x="60" y="90" width="760" height="278" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="78" y="118" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  ><tspan fill="#7ec8e3" font-weight="600">import</tspan> org.junit.jupiter.api.Test;</text>
  <text x="78" y="138" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  ><tspan fill="#7ec8e3" font-weight="600">import static</tspan> ...api.Assertions.assertEquals;</text>
  <text x="78" y="166" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  ><tspan fill="#7ec8e3" font-weight="600">class</tspan> CalculatorTest {</text>
  <text x="78" y="194" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >    <tspan fill="#b5cea8">@Test</tspan></text>
  <text x="78" y="214" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >    <tspan fill="#b5cea8">@DisplayName</tspan>(<tspan fill="#ce9178">"2 + 3 은 5다"</tspan>)</text>
  <text x="78" y="234" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >    <tspan fill="#7ec8e3" font-weight="600">void</tspan> add_returnsSum() {</text>
  <text x="78" y="254" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >        Calculator calc = <tspan fill="#7ec8e3" font-weight="600">new</tspan> Calculator();</text>
  <text x="78" y="274" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >        <tspan fill="#7ec8e3" font-weight="600">int</tspan> result = calc.add(<tspan fill="#b5cea8">2</tspan>, <tspan fill="#b5cea8">3</tspan>);</text>
  <text x="78" y="298" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >        assertEquals(<tspan fill="#b5cea8">5</tspan>, result);  <tspan fill="#9aa4b8">// 기대, 실제</tspan></text>
  <text x="78" y="318" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >    }</text>
  <text x="78" y="338" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >}</text>
  <text x="78" y="360" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"
  >// public 키워드 불필요 — package-private 으로 충분</text>
</svg>
