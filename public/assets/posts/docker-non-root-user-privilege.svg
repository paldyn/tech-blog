<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Root vs 비루트 사용자 권한 비교</text>

  <!-- ── Left: Root User ── -->
  <rect x="60" y="72" width="355" height="52" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="237" y="93" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555">Root 사용자 (UID 0)</text>
  <text x="237" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">docker run --user=root (기본값)</text>

  <!-- Root privileges -->
  <rect x="60" y="140" width="355" height="290" rx="8" fill="#111" stroke="#333" stroke-width="1"/>

  <text x="80" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">위험 요소</text>

  <text x="80" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">✗  호스트 파일시스템 전체 접근 가능</text>
  <text x="80" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">✗  커널 모듈 로드/언로드 가능</text>
  <text x="80" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">✗  컨테이너 탈출 시 호스트 root</text>
  <text x="80" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">✗  임의 프로세스 kill 가능</text>
  <text x="80" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">✗  네트워크 인터페이스 설정 변경</text>
  <text x="80" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">✗  /etc/shadow 등 민감 파일 접근</text>

  <rect x="80" y="334" width="315" height="36" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="237" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">취약점 익스플로잇 → 호스트 장악</text>
  <text x="237" y="363" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">Blast Radius: 최대</text>

  <!-- ── Right: Non-Root User ── -->
  <rect x="465" y="72" width="355" height="52" rx="8" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="642" y="93" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">비루트 사용자 (UID ≥ 1000)</text>
  <text x="642" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">USER appuser / --user=1000:1000</text>

  <!-- Non-root privileges -->
  <rect x="465" y="140" width="355" height="290" rx="8" fill="#111" stroke="#333" stroke-width="1"/>

  <text x="485" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">보안 이점</text>

  <text x="485" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">✓  파일 접근 범위 최소화</text>
  <text x="485" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">✓  특권 syscall 차단</text>
  <text x="485" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">✓  컨테이너 탈출 피해 최소화</text>
  <text x="485" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">✓  Kubernetes PodSecurity 준수</text>
  <text x="485" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">✓  CIS Docker Benchmark 충족</text>
  <text x="485" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">✓  침해 사고 영향 범위 제한</text>

  <rect x="485" y="334" width="315" height="36" rx="6" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="642" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">취약점 익스플로잇 → 앱 프로세스만 피해</text>
  <text x="642" y="363" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">Blast Radius: 최소</text>

  <!-- center divider -->
  <line x1="440" y1="80" x2="440" y2="430" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- bottom note -->
  <text x="440" y="456" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">컨테이너 내부 UID 0이어도 User Namespace 미사용 시 호스트 root와 동일한 UID를 공유한다</text>
</svg>
