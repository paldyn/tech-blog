<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">이벤트 전파 3단계</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">캡처 → 타깃 → 버블링</text>

  <!-- DOM tree (center) -->
  <!-- document -->
  <rect x="330" y="96" width="220" height="36" rx="6" fill="#111" stroke="#555" stroke-width="1.5"/>
  <text x="440" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">document</text>

  <!-- body -->
  <line x1="440" y1="132" x2="440" y2="152" stroke="#555" stroke-width="1.5"/>
  <rect x="330" y="152" width="220" height="36" rx="6" fill="#111" stroke="#555" stroke-width="1.5"/>
  <text x="440" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">&lt;div id="outer"&gt;</text>

  <!-- outer -->
  <line x1="440" y1="188" x2="440" y2="208" stroke="#555" stroke-width="1.5"/>
  <rect x="330" y="208" width="220" height="36" rx="6" fill="#111" stroke="#555" stroke-width="1.5"/>
  <text x="440" y="231" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">&lt;div id="middle"&gt;</text>

  <!-- middle -->
  <line x1="440" y1="244" x2="440" y2="264" stroke="#555" stroke-width="1.5"/>
  <rect x="360" y="264" width="160" height="40" rx="6" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">🎯 &lt;button&gt; (타깃)</text>
  <text x="440" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">클릭 발생 지점</text>

  <!-- Phase 1: Capture (left arrows going down) -->
  <text x="200" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">① 캡처 단계</text>
  <text x="200" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">(capture: true)</text>

  <line x1="200" y1="132" x2="200" y2="280" stroke="#7777cc" stroke-width="2"/>
  <polygon points="200,288 194,276 206,276" fill="#7777cc"/>

  <!-- Capture labels -->
  <text x="130" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">document</text>
  <text x="150" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">outer</text>
  <text x="150" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">middle</text>

  <line x1="200" y1="148" x2="328" y2="115" stroke="#7777cc" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="200" y1="185" x2="328" y2="170" stroke="#7777cc" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="200" y1="226" x2="328" y2="226" stroke="#7777cc" stroke-width="2" stroke-dasharray="3,3"/>

  <!-- Phase 2: Target (center, already marked) -->
  <text x="440" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">② 타깃 단계</text>

  <!-- Phase 3: Bubble (right arrows going up) -->
  <text x="680" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">③ 버블링 단계</text>
  <text x="680" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">(기본값)</text>

  <line x1="680" y1="278" x2="680" y2="135" stroke="#55c555" stroke-width="2"/>
  <polygon points="680,127 674,139 686,139" fill="#55c555"/>

  <!-- Bubble labels -->
  <text x="700" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">middle</text>
  <text x="700" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">outer</text>
  <text x="700" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">document</text>

  <line x1="680" y1="235" x2="550" y2="226" stroke="#55c555" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="680" y1="190" x2="550" y2="170" stroke="#55c555" stroke-width="2" stroke-dasharray="3,3"/>
  <line x1="680" y1="148" x2="550" y2="115" stroke="#55c555" stroke-width="2" stroke-dasharray="3,3"/>

  <!-- Bottom: stopPropagation -->
  <rect x="60" y="364" width="760" height="114" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">전파 제어 메서드</text>

  <rect x="84" y="402" width="300" height="60" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="234" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">stopPropagation()</text>
  <text x="234" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">현재 단계 이후 전파 중단</text>
  <text x="234" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">같은 요소의 다른 리스너는 계속</text>

  <rect x="494" y="402" width="300" height="60" rx="6" fill="#1a1a0a" stroke="#e8e8e8" stroke-width="1"/>
  <text x="644" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">stopImmediatePropagation()</text>
  <text x="644" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">현재 요소의 나머지 리스너도 중단</text>
  <text x="644" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">전파 완전 종료</text>
</svg>
