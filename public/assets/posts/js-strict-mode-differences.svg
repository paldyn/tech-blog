<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Strict mode vs Sloppy mode — 주요 차이점</text>

  <!-- Header row -->
  <rect x="60" y="64" width="360" height="36" rx="6" fill="#1a1a1a" stroke="#555"/>
  <text x="240" y="87" text-anchor="middle" font-size="14" font-weight="700" fill="#e05555">Sloppy mode (기본)</text>

  <rect x="460" y="64" width="360" height="36" rx="6" fill="#1a1a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="87" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">Strict mode ("use strict")</text>

  <!-- Row 1: 미선언 변수 -->
  <text x="440" y="122" text-anchor="middle" font-size="12" font-weight="600" fill="#888">① 미선언 변수</text>
  <rect x="60" y="130" width="360" height="68" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">x = </text>
  <text x="108" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">42</text>
  <text x="124" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">;</text>
  <text x="76" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// 전역 변수 생성됨</text>
  <text x="76" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">// → window.x = 42 (브라우저)</text>

  <rect x="460" y="130" width="360" height="68" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="476" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">x = </text>
  <text x="508" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">42</text>
  <text x="524" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">;</text>
  <text x="476" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">// ReferenceError: x is not</text>
  <text x="476" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">// defined</text>

  <!-- Row 2: this in function -->
  <text x="440" y="222" text-anchor="middle" font-size="12" font-weight="600" fill="#888">② 일반 함수의 this</text>
  <rect x="60" y="230" width="360" height="68" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">function</text>
  <text x="148" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> show() {</text>
  <text x="76" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  console.log(</text>
  <text x="184" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">this</text>
  <text x="208" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">);</text>
  <text x="76" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">} // → Window (전역 객체)</text>

  <rect x="460" y="230" width="360" height="68" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="476" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">function</text>
  <text x="548" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> show() {</text>
  <text x="476" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  console.log(</text>
  <text x="584" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">this</text>
  <text x="608" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">);</text>
  <text x="476" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">} // → undefined</text>

  <!-- Row 3: with statement -->
  <text x="440" y="322" text-anchor="middle" font-size="12" font-weight="600" fill="#888">③ with 문 / 중복 매개변수</text>
  <rect x="60" y="330" width="360" height="68" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">with</text>
  <text x="108" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> (obj) { ... }</text>
  <text x="76" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">// 허용됨 (스코프 혼란)</text>
  <text x="76" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">function f(a, a) { ... }</text>

  <rect x="460" y="330" width="360" height="68" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="476" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">with</text>
  <text x="508" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> (obj) { ... }</text>
  <text x="476" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">// SyntaxError 금지</text>
  <text x="476" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">// function f(a,a) → SyntaxError</text>

  <!-- Row 4: delete -->
  <text x="440" y="422" text-anchor="middle" font-size="12" font-weight="600" fill="#888">④ delete로 변수 삭제</text>
  <rect x="60" y="430" width="360" height="50" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="450" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">var</text>
  <text x="100" y="450" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> x = </text>
  <text x="136" y="450" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">1</text>
  <text x="144" y="450" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">; </text>
  <text x="76" y="468" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">delete x; // false 반환</text>

  <rect x="460" y="430" width="360" height="50" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="476" y="450" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">var</text>
  <text x="500" y="450" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> x = </text>
  <text x="536" y="450" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">1</text>
  <text x="544" y="450" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">;</text>
  <text x="476" y="468" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">delete x; // SyntaxError</text>

  <!-- Footer -->
  <text x="440" y="500" text-anchor="middle" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복 시리즈 #5</text>
</svg>
