<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Object 정적 메서드 분류</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">열거 · 복사 · 체인 · 잠금 카테고리별 정리</text>

  <!-- Category 1: Enumeration -->
  <rect x="60" y="92" width="370" height="170" fill="#0d1520" rx="8" stroke="#1e3a5f"/>
  <text x="245" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">열거 메서드</text>
  <text x="80" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">Object.keys(obj)</text>
  <text x="310" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ 열거 가능한 own 키 배열</text>
  <text x="80" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">Object.values(obj)</text>
  <text x="310" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ 열거 가능한 own 값 배열</text>
  <text x="80" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">Object.entries(obj)</text>
  <text x="310" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ [key, value] 쌍 배열</text>
  <text x="80" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">Object.fromEntries(iter)</text>
  <text x="310" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ entries 배열을 객체로 변환</text>
  <text x="80" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">Object.getOwnPropertyNames(obj)</text>
  <text x="80" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">                         → non-enumerable 포함 모든 own 키</text>
  <text x="80" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">Object.getOwnPropertySymbols(obj)</text>
  <text x="80" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">                           → Symbol 키 배열</text>

  <!-- Category 2: Copy / Merge -->
  <rect x="450" y="92" width="370" height="170" fill="#0d1a12" rx="8" stroke="#1e3320"/>
  <text x="635" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">복사 · 병합 메서드</text>
  <text x="470" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">Object.assign(target, ...src)</text>
  <text x="470" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">   얕은 복사, getter는 값으로 변환</text>
  <text x="470" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">Object.getOwnPropertyDescriptors(obj)</text>
  <text x="470" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">   모든 디스크립터 반환 (getter 보존)</text>
  <text x="470" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">structuredClone(obj)</text>
  <text x="470" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">   깊은 복사 (순환참조 지원)</text>
  <text x="470" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">{ ...obj }</text>
  <text x="470" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">   얕은 복사, 스프레드 문법</text>

  <!-- Category 3: Prototype -->
  <rect x="60" y="280" width="370" height="150" fill="#12101e" rx="8" stroke="#2a1e5f"/>
  <text x="245" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">프로토타입 메서드</text>
  <text x="80" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">Object.create(proto, desc?)</text>
  <text x="80" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">   [[Prototype]]을 지정하며 객체 생성</text>
  <text x="80" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">Object.getPrototypeOf(obj)</text>
  <text x="80" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">   [[Prototype]] 반환</text>
  <text x="80" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">Object.setPrototypeOf(obj, proto)</text>
  <text x="80" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">   [[Prototype]] 변경 (성능 주의)</text>

  <!-- Category 4: Locking -->
  <rect x="450" y="280" width="370" height="150" fill="#1a0d0d" rx="8" stroke="#3a1e1e"/>
  <text x="635" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">잠금 메서드</text>
  <text x="470" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">Object.freeze(obj)</text>
  <text x="470" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">   추가·삭제·수정 모두 금지</text>
  <text x="470" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">Object.seal(obj)</text>
  <text x="470" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">   추가·삭제 금지, 값 수정 허용</text>
  <text x="470" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">Object.preventExtensions(obj)</text>
  <text x="470" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">   추가만 금지</text>

  <!-- Footer note -->
  <rect x="60" y="450" width="760" height="36" fill="#111" rx="6" stroke="#222"/>
  <text x="440" y="473" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Object.hasOwn(obj, key) — ES2022, Object.create(null)에서도 안전한 own property 검사</text>

  <text x="440" y="504" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복</text>
</svg>
