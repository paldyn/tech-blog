<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" style="background:#0a0a0a;border-radius:12px;">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">하드 링크 vs 심볼릭 링크</text>
  <text x="440" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">inode를 직접 가리키는가, 경로를 통해 가리키는가</text>

  <!-- Hard Link section -->
  <text x="80" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">하드 링크</text>

  <!-- file.txt -->
  <rect x="60" y="126" width="130" height="40" fill="#1a2533" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="125" y="151" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">file.txt</text>

  <!-- link.txt -->
  <rect x="60" y="186" width="130" height="40" fill="#1a2533" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="125" y="211" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">link.txt</text>

  <!-- Both point to same inode -->
  <line x1="190" y1="146" x2="240" y2="196" stroke="#7ec8e3" stroke-width="2"/>
  <line x1="190" y1="206" x2="240" y2="196" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="240,190 256,196 240,202" fill="#7ec8e3"/>

  <rect x="256" y="170" width="130" height="52" fill="#0f1e0f" rx="8" stroke="#55c555" stroke-width="2"/>
  <text x="321" y="191" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">inode #42381</text>
  <text x="321" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">링크수: 2</text>

  <!-- inode to data -->
  <line x1="386" y1="196" x2="420" y2="196" stroke="#555" stroke-width="2"/>
  <polygon points="420,190 432,196 420,202" fill="#555"/>

  <rect x="432" y="170" width="130" height="52" fill="#111827" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="497" y="191" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">데이터 블록</text>
  <text x="497" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" text-anchor="middle">Hello, World</text>

  <text x="125" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">원본 삭제해도</text>
  <text x="125" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">데이터 유지됨</text>

  <!-- divider -->
  <line x1="60" y1="292" x2="820" y2="292" stroke="#1e2433" stroke-width="1" stroke-dasharray="6 4"/>

  <!-- Soft Link section -->
  <text x="80" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc">심볼릭 링크 (소프트 링크)</text>

  <!-- symlink box -->
  <rect x="60" y="330" width="130" height="40" fill="#1a1a2e" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="125" y="355" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc" text-anchor="middle">slink.txt</text>

  <!-- symlink contains path string -->
  <line x1="190" y1="350" x2="240" y2="350" stroke="#7777cc" stroke-width="2" stroke-dasharray="6 3"/>
  <polygon points="240,344 252,350 240,356" fill="#7777cc"/>

  <rect x="252" y="330" width="160" height="40" fill="#1a1a2e" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="332" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">inode #99999</text>
  <text x="332" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc" text-anchor="middle">→ "/path/file.txt"</text>

  <line x1="412" y1="350" x2="450" y2="350" stroke="#7777cc" stroke-width="2" stroke-dasharray="6 3"/>
  <polygon points="450,344 462,350 450,356" fill="#7777cc"/>

  <rect x="462" y="330" width="130" height="40" fill="#1a2533" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="527" y="355" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">file.txt</text>

  <line x1="592" y1="350" x2="630" y2="350" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="630,344 642,350 630,356" fill="#7ec8e3"/>

  <rect x="642" y="330" width="100" height="40" fill="#0f1e0f" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="692" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">inode</text>
  <text x="692" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">#42381</text>

  <text x="332" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">원본 삭제 시</text>
  <text x="332" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">댕글링 링크 (깨진 링크)</text>

  <text x="440" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">심볼릭 링크는 자체 inode를 가지며 그 안에 대상 경로 문자열을 저장</text>
</svg>
