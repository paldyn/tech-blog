<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-p" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Maven 3대 빌드 라이프사이클</text>

  <!-- === clean lifecycle === -->
  <text x="60" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e05555">clean 라이프사이클</text>

  <rect x="60" y="100" width="110" height="44" rx="6" fill="#0a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="115" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ffffff">pre-clean</text>
  <text x="115" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">준비</text>

  <line x1="170" y1="122" x2="194" y2="122" stroke="#e05555" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="195" y="100" width="90" height="44" rx="6" fill="#0a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">clean</text>
  <text x="240" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">target/ 삭제</text>

  <line x1="285" y1="122" x2="309" y2="122" stroke="#e05555" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="310" y="100" width="110" height="44" rx="6" fill="#0a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="365" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ffffff">post-clean</text>
  <text x="365" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">정리 후</text>

  <!-- === site lifecycle === -->
  <text x="500" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7777cc">site 라이프사이클</text>

  <rect x="500" y="100" width="80" height="44" rx="6" fill="#0a0a0a" stroke="#7777cc" stroke-width="1"/>
  <text x="540" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ffffff">pre-site</text>
  <text x="540" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">준비</text>

  <line x1="580" y1="122" x2="604" y2="122" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-p)"/>

  <rect x="605" y="100" width="70" height="44" rx="6" fill="#0a0a0a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">site</text>
  <text x="640" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">문서 생성</text>

  <line x1="675" y1="122" x2="699" y2="122" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-p)"/>

  <rect x="700" y="100" width="120" height="44" rx="6" fill="#0a0a0a" stroke="#7777cc" stroke-width="1"/>
  <text x="760" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ffffff">site-deploy</text>
  <text x="760" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">서버 배포</text>

  <!-- === default lifecycle === -->
  <text x="60" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">default 라이프사이클 (핵심)</text>

  <!-- Phase boxes - row 1 -->
  <rect x="60" y="200" width="100" height="52" rx="6" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="110" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">validate</text>
  <text x="110" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">pom.xml 검증</text>

  <line x1="160" y1="226" x2="184" y2="226" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <rect x="185" y="200" width="100" height="52" rx="6" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="235" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">compile</text>
  <text x="235" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">소스 컴파일</text>

  <line x1="285" y1="226" x2="309" y2="226" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <rect x="310" y="200" width="90" height="52" rx="6" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="355" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">test</text>
  <text x="355" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">단위 테스트</text>

  <line x1="400" y1="226" x2="424" y2="226" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <rect x="425" y="200" width="100" height="52" rx="6" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="475" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">package</text>
  <text x="475" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">JAR/WAR 생성</text>

  <line x1="525" y1="226" x2="549" y2="226" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <rect x="550" y="200" width="90" height="52" rx="6" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="595" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">verify</text>
  <text x="595" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">통합 테스트</text>

  <line x1="640" y1="226" x2="664" y2="226" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <rect x="665" y="200" width="80" height="52" rx="6" fill="#0a0a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="705" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">install</text>
  <text x="705" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">로컬 저장소</text>

  <line x1="745" y1="226" x2="769" y2="226" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <rect x="770" y="200" width="80" height="52" rx="6" fill="#0a0a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="810" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">deploy</text>
  <text x="810" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">원격 배포</text>

  <!-- Cumulative note -->
  <text x="440" y="286" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">mvn package 실행 → validate, compile, test, package 순서로 모두 실행</text>

  <!-- Bottom: phase-plugin binding code box -->
  <rect x="60" y="310" width="760" height="168" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan x="76" dy="0"  fill="#9aa4b8"># 페이즈 → 플러그인 골 바인딩 예시 (jar 패키징 기본값)</tspan>
    <tspan x="76" dy="20" fill="#ffffff"> </tspan>
    <tspan x="76" dy="19" fill="#7ec8e3" font-weight="600">compile</tspan>
    <tspan fill="#ffffff">   → </tspan>
    <tspan fill="#55c555">maven-compiler-plugin:compile</tspan>
    <tspan x="76" dy="19" fill="#7ec8e3" font-weight="600">test</tspan>
    <tspan fill="#ffffff">      → </tspan>
    <tspan fill="#55c555">maven-surefire-plugin:test</tspan>
    <tspan x="76" dy="19" fill="#7ec8e3" font-weight="600">package</tspan>
    <tspan fill="#ffffff">   → </tspan>
    <tspan fill="#55c555">maven-jar-plugin:jar</tspan>
    <tspan x="76" dy="19" fill="#7ec8e3" font-weight="600">install</tspan>
    <tspan fill="#ffffff">    → </tspan>
    <tspan fill="#55c555">maven-install-plugin:install</tspan>
    <tspan x="76" dy="19" fill="#9aa4b8">   packaging &lt;war&gt; 이면 package → maven-war-plugin:war 로 바뀜</tspan>
  </text>
</svg>
