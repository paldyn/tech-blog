<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7ec8e3" stroke="#2a4a5a" stroke-width="0.5"/>
    </marker>
  </defs>
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">의존성 주입(DI) 세 가지 방식</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">Constructor · Setter · Field Injection</text>

  <!-- Column headers -->
  <text x="160" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">생성자 주입</text>
  <text x="440" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">세터 주입</text>
  <text x="720" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">필드 주입</text>

  <!-- Constructor Injection box -->
  <rect x="40" y="120" width="240" height="190" rx="8" fill="#070b14" stroke="#1e3a2a"/>
  <text x="56" y="145" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// 권장 방식</text>
  <text x="56" y="163" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">@Service</text>
  <text x="56" y="181" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">class OrderService {</text>
  <text x="56" y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  <tspan fill="#7777cc">private final</tspan></text>
  <text x="56" y="217" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    ItemRepo repo;</text>
  <text x="56" y="235" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">  @Autowired</text>
  <text x="56" y="253" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  OrderService(</text>
  <text x="56" y="271" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    ItemRepo r){repo=r;}</text>
  <text x="56" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">}</text>

  <!-- Setter Injection box -->
  <rect x="320" y="120" width="240" height="190" rx="8" fill="#070b14" stroke="#1e2433"/>
  <text x="336" y="145" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// 선택적 의존성</text>
  <text x="336" y="163" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">@Service</text>
  <text x="336" y="181" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">class NotifyService {</text>
  <text x="336" y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  <tspan fill="#7777cc">private</tspan> Sender s;</text>
  <text x="336" y="217" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">  @Autowired</text>
  <text x="336" y="235" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  <tspan fill="#7777cc">public void</tspan> set(</text>
  <text x="336" y="253" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    Sender s){</text>
  <text x="336" y="271" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    this.s = s; }</text>
  <text x="336" y="289" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">}</text>

  <!-- Field Injection box -->
  <rect x="600" y="120" width="240" height="190" rx="8" fill="#070b14" stroke="#1e2433"/>
  <text x="616" y="145" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">// 테스트 어렵다</text>
  <text x="616" y="163" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">@Service</text>
  <text x="616" y="181" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">class PayService {</text>
  <text x="616" y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">  @Autowired</text>
  <text x="616" y="217" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc" xml:space="preserve">  private</text>
  <text x="616" y="235" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    PayRepo repo;</text>
  <text x="616" y="253" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">  // 리플렉션 주입</text>
  <text x="616" y="271" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">  // IoC 외 사용불가</text>
  <text x="616" y="289" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">}</text>

  <!-- Comparison table -->
  <rect x="40" y="332" width="800" height="36" rx="6" fill="#0e1820"/>
  <text x="80" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">항목</text>
  <text x="240" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">생성자 주입</text>
  <text x="450" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">세터 주입</text>
  <text x="660" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">필드 주입</text>

  <line x1="40" y1="368" x2="840" y2="368" stroke="#1e2433" stroke-width="1"/>

  <text x="80" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">불변성(final)</text>
  <text x="240" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">가능</text>
  <text x="450" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">불가</text>
  <text x="660" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">불가</text>

  <line x1="40" y1="402" x2="840" y2="402" stroke="#1a1a1a" stroke-width="1"/>

  <text x="80" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">순환 참조 감지</text>
  <text x="240" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">시작 시 감지</text>
  <text x="450" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">런타임</text>
  <text x="660" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">런타임</text>

  <line x1="40" y1="434" x2="840" y2="434" stroke="#1a1a1a" stroke-width="1"/>

  <text x="80" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">단위 테스트</text>
  <text x="240" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">new 직접 생성</text>
  <text x="450" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">setter 호출</text>
  <text x="660" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">리플렉션 필요</text>

  <line x1="40" y1="466" x2="840" y2="466" stroke="#1a1a1a" stroke-width="1"/>

  <text x="80" y="486" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">권장 여부</text>
  <text x="240" y="486" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">★ 권장</text>
  <text x="450" y="486" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">선택적 의존</text>
  <text x="660" y="486" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">지양</text>

  <!-- Footer -->
  <text x="440" y="526" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · Spring 완전 정복 시리즈</text>
</svg>
