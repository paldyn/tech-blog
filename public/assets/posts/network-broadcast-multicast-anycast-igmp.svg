<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arrb" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrd" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">IGMP: 멀티캐스트 그룹 관리 프로토콜</text>

  <!-- Source -->
  <rect x="60" y="100" width="120" height="60" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="120" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">멀티캐스트</text>
  <text x="120" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">소스 서버</text>

  <!-- Arrow to Router -->
  <line x1="180" y1="130" x2="290" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrd)"/>
  <text x="235" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">224.1.2.3</text>

  <!-- Router -->
  <rect x="290" y="95" width="120" height="70" rx="8" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="350" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">멀티캐스트</text>
  <text x="350" y="141" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">라우터</text>
  <text x="350" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">(IGMP Querier)</text>

  <!-- Router to Host A (joined) -->
  <line x1="410" y1="115" x2="530" y2="90" stroke="#55c555" stroke-width="2" marker-end="url(#arrb)"/>
  <!-- Router to Host B (joined) -->
  <line x1="410" y1="130" x2="530" y2="155" stroke="#55c555" stroke-width="2" marker-end="url(#arrb)"/>
  <!-- Router to Host C (not joined, dashed) -->
  <line x1="410" y1="145" x2="530" y2="220" stroke="#444" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Host A (member) -->
  <rect x="530" y="68" width="110" height="50" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="585" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">호스트 A</text>
  <text x="585" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">그룹 가입 ✓</text>

  <!-- Host B (member) -->
  <rect x="530" y="130" width="110" height="50" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="585" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">호스트 B</text>
  <text x="585" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">그룹 가입 ✓</text>

  <!-- Host C (not member) -->
  <rect x="530" y="200" width="110" height="50" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="585" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#555" text-anchor="middle">호스트 C</text>
  <text x="585" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">미가입 ✗</text>

  <!-- IGMP messages -->
  <text x="700" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">IGMP 메시지 타입</text>
  <rect x="690" y="92" width="160" height="140" rx="6" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="706" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" font-weight="600">Membership Query</text>
  <text x="706" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">라우터 → 호스트 조회</text>
  <text x="706" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" font-weight="600">Membership Report</text>
  <text x="706" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">호스트 → 가입 응답</text>
  <text x="706" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" font-weight="600">Leave Group</text>
  <text x="706" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">호스트 → 탈퇴 알림</text>

  <!-- Code block -->
  <rect x="60" y="300" width="760" height="130" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="322" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 멀티캐스트 그룹 가입/탈퇴 (Python)</text>
  <text x="80" y="342" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">import</text>
  <text x="149" y="342" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> socket, struct</text>
  <text x="80" y="362" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">sock = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)</text>
  <text x="80" y="382" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># IP_ADD_MEMBERSHIP: 그룹(224.1.2.3)에 가입</text>
  <text x="80" y="402" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">mreq = struct.pack(</text>
  <text x="248" y="402" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">"4sL"</text>
  <text x="290" y="402" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">, socket.inet_aton(</text>
  <text x="432" y="402" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">"224.1.2.3"</text>
  <text x="530" y="402" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">), socket.INADDR_ANY)</text>
  <text x="80" y="422" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">sock.setsockopt(socket.IPPROTO_IP, socket.IP_ADD_MEMBERSHIP, mreq)</text>
</svg>
