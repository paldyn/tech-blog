<svg xmlns="http://www.w3.org/2000/svg" width="880" height="332" viewBox="0 0 880 332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="332" rx="12" fill="#0a0a0a"/>
  <text x="60" y="44" font-size="22" font-weight="700" fill="#e8e8e8">추측하지 말고 측정한다</text>
  <text x="60" y="70" font-size="14" fill="#7ec8e3">먼저 수치를 보고, 느린 타입은 trace로 추적한다</text>

  <rect x="60" y="92" width="760" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="120" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># 전체 체크 시간·타입 개수를 집계</text>
  <text x="76" y="140" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">tsc</tspan> --noEmit --extendedDiagnostics</text>
  <text x="76" y="180" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># 느린 타입을 trace 파일로 추적</text>
  <text x="76" y="200" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">tsc</tspan> --generateTrace trace_out</text>
  <text x="76" y="240" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># trace_out/trace.json 을</text>
  <text x="76" y="260" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># ui.perfetto.dev 에서 열어 분석</text>
</svg>
