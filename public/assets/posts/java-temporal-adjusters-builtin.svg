<svg xmlns="http://www.w3.org/2000/svg" width="880" height="450" viewBox="0 0 880 450">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="450" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">내장 TemporalAdjusters 동작 예시</text>

  <text x="440" y="78" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e0a040">기준 날짜: 2026-06-12 (금요일)</text>

  <rect x="100" y="104" width="300" height="28" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="114" y="123" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">firstDayOfMonth()</text>
  <line x1="416" y1="118" x2="466" y2="118" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="482" y="123" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">2026-06-01</text>

  <rect x="100" y="144" width="300" height="28" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="114" y="163" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">lastDayOfMonth()</text>
  <line x1="416" y1="158" x2="466" y2="158" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="482" y="163" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">2026-06-30</text>

  <rect x="100" y="184" width="300" height="28" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="114" y="203" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">firstDayOfNextMonth()</text>
  <line x1="416" y1="198" x2="466" y2="198" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="482" y="203" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">2026-07-01</text>

  <rect x="100" y="224" width="300" height="28" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="114" y="243" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">next(MONDAY)</text>
  <line x1="416" y1="238" x2="466" y2="238" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="482" y="243" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">2026-06-15 <tspan fill="#888">(다음 월요일)</tspan></text>

  <rect x="100" y="264" width="300" height="28" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="114" y="283" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">nextOrSame(FRIDAY)</text>
  <line x1="416" y1="278" x2="466" y2="278" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="482" y="283" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">2026-06-12 <tspan fill="#888">(오늘이 금요일이라 그대로)</tspan></text>

  <rect x="100" y="304" width="300" height="28" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="114" y="323" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">lastInMonth(FRIDAY)</text>
  <line x1="416" y1="318" x2="466" y2="318" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="482" y="323" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">2026-06-26 <tspan fill="#888">(이달의 마지막 금요일)</tspan></text>

  <rect x="100" y="344" width="300" height="28" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="114" y="363" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">dayOfWeekInMonth(2, SUNDAY)</text>
  <line x1="416" y1="358" x2="466" y2="358" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="482" y="363" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">2026-06-14 <tspan fill="#888">(둘째 일요일)</tspan></text>

  <text x="440" y="416" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">모두 date.with(TemporalAdjusters.xxx()) 형태로 사용 — 원본은 변하지 않는다</text>
</svg>
