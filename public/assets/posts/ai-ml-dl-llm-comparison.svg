<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560">
  <!-- Background -->
  <rect width="880" height="560" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="40"
        text-anchor="middle"
        fill="#e8e8e8"
        font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif"
        font-size="18" font-weight="600">AI 학습 방식 비교</text>

  <!-- ═══════════════════════════════════════════
       COLUMN 1 — 전통 프로그래밍  x=60 w=240
       ═══════════════════════════════════════════ -->
  <rect x="60" y="60" width="240" height="460" rx="10"
        fill="#0d0d1a" stroke="#3b5bdb" stroke-width="1.2"/>

  <!-- Header -->
  <rect x="60" y="60" width="240" height="44" rx="10" fill="#1a1f3c"/>
  <rect x="60" y="90" width="240" height="14" fill="#1a1f3c"/>
  <text x="180" y="87"
        text-anchor="middle"
        fill="#748ffc"
        font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif"
        font-size="13" font-weight="700">전통 프로그래밍</text>

  <!-- Description -->
  <text x="80" y="124"
        fill="#aaa"
        font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif"
        font-size="11">개발자가 규칙을 직접 작성해</text>
  <text x="80" y="139"
        fill="#aaa"
        font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif"
        font-size="11">컴퓨터에 명령하는 방식</text>

  <!-- Flow steps -->
  <rect x="80" y="158" width="200" height="28" rx="5" fill="#1a1f3c" stroke="#3b5bdb" stroke-width="0.8"/>
  <text x="180" y="177" text-anchor="middle" fill="#748ffc" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="11">규칙 (If/Else, 조건)</text>

  <text x="180" y="200" text-anchor="middle" fill="#444" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="14">↓</text>

  <rect x="80" y="210" width="200" height="28" rx="5" fill="#111" stroke="#333" stroke-width="0.8"/>
  <text x="180" y="229" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="11">입력 데이터</text>

  <text x="180" y="252" text-anchor="middle" fill="#444" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="14">↓</text>

  <rect x="80" y="262" width="200" height="28" rx="5" fill="#0d1f0d" stroke="#2d862d" stroke-width="0.8"/>
  <text x="180" y="281" text-anchor="middle" fill="#5cad5c" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="11">결과 출력</text>

  <!-- Label -->
  <text x="80" y="314"
        fill="#666"
        font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif"
        font-size="10">코드 예시 — 스팸 분류기</text>

  <!-- Code block -->
  <rect x="72" y="322" width="216" height="170" rx="6"
        fill="#070b14" stroke="#1e2a3a" stroke-width="1"/>
  <rect x="72" y="322" width="216" height="20" rx="6" fill="#0d1622"/>
  <rect x="72" y="332" width="216" height="10" fill="#0d1622"/>
  <text x="86" y="337" fill="#3a4a5a" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9">rule_based.py</text>

  <text x="82" y="357" fill="#6a8f5a" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10"># 규칙을 개발자가 직접 작성</text>
  <text x="82" y="373" fill="#c792ea" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">def</text>
  <text x="108" y="373" fill="#82aaff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">is_spam</text>
  <text x="154" y="373" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">(text):</text>
  <text x="82" y="389" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">    bad = [</text>
  <text x="82" y="405" fill="#c3e88d" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">        "무료", "광고"</text>
  <text x="82" y="421" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">    ]</text>
  <text x="82" y="437" fill="#c792ea" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">    return</text>
  <text x="128" y="437" fill="#82aaff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">any</text>
  <text x="147" y="437" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">(</text>
  <text x="152" y="437" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">w in text</text>
  <text x="82" y="453" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">         for w in bad)</text>

  <!-- ═══════════════════════════════════════════
       COLUMN 2 — 머신러닝  x=320 w=240
       ═══════════════════════════════════════════ -->
  <rect x="320" y="60" width="240" height="460" rx="10"
        fill="#0a180f" stroke="#0ca678" stroke-width="1.2"/>

  <!-- Header -->
  <rect x="320" y="60" width="240" height="44" rx="10" fill="#0a2010"/>
  <rect x="320" y="90" width="240" height="14" fill="#0a2010"/>
  <text x="440" y="87"
        text-anchor="middle"
        fill="#38d9a9"
        font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif"
        font-size="13" font-weight="700">머신러닝 (ML)</text>

  <!-- Description -->
  <text x="340" y="124"
        fill="#aaa"
        font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif"
        font-size="11">데이터와 정답을 주면 패턴을</text>
  <text x="340" y="139"
        fill="#aaa"
        font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif"
        font-size="11">스스로 학습해 모델을 만드는 방식</text>

  <!-- Flow steps -->
  <rect x="340" y="158" width="200" height="28" rx="5" fill="#0a2010" stroke="#0ca678" stroke-width="0.8"/>
  <text x="440" y="177" text-anchor="middle" fill="#38d9a9" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="11">데이터 + 정답 (레이블)</text>

  <text x="440" y="200" text-anchor="middle" fill="#444" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="14">↓</text>

  <rect x="340" y="210" width="200" height="28" rx="5" fill="#111" stroke="#333" stroke-width="0.8"/>
  <text x="440" y="229" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="11">학습 (패턴 자동 추출)</text>

  <text x="440" y="252" text-anchor="middle" fill="#444" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="14">↓</text>

  <rect x="340" y="262" width="200" height="28" rx="5" fill="#0a2010" stroke="#0ca678" stroke-width="0.8"/>
  <text x="440" y="281" text-anchor="middle" fill="#38d9a9" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="11">모델 (재사용 가능한 규칙)</text>

  <!-- Label -->
  <text x="340" y="314"
        fill="#666"
        font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif"
        font-size="10">코드 예시 — scikit-learn</text>

  <!-- Code block -->
  <rect x="332" y="322" width="216" height="170" rx="6"
        fill="#070b14" stroke="#1e2a3a" stroke-width="1"/>
  <rect x="332" y="322" width="216" height="20" rx="6" fill="#0d1622"/>
  <rect x="332" y="332" width="216" height="10" fill="#0d1622"/>
  <text x="346" y="337" fill="#3a4a5a" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9">ml_spam.py</text>

  <text x="342" y="357" fill="#6a8f5a" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10"># 데이터로 패턴을 자동 학습</text>
  <text x="342" y="373" fill="#c792ea" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">from</text>
  <text x="365" y="373" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">sklearn.naive_bayes</text>
  <text x="342" y="389" fill="#c792ea" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">import</text>
  <text x="381" y="389" fill="#82aaff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">MultinomialNB</text>
  <text x="342" y="409" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">model =</text>
  <text x="387" y="409" fill="#82aaff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">MultinomialNB</text>
  <text x="465" y="409" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">()</text>
  <text x="342" y="425" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">model.fit(X_train, y_train)</text>
  <text x="342" y="441" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">pred = model.predict(X_test)</text>
  <text x="342" y="461" fill="#6a8f5a" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10"># 규칙은 모델이 스스로 학습</text>

  <!-- ═══════════════════════════════════════════
       COLUMN 3 — LLM  x=580 w=240
       ═══════════════════════════════════════════ -->
  <rect x="580" y="60" width="240" height="460" rx="10"
        fill="#160000" stroke="#e03131" stroke-width="1.2"/>

  <!-- Header -->
  <rect x="580" y="60" width="240" height="44" rx="10" fill="#200000"/>
  <rect x="580" y="90" width="240" height="14" fill="#200000"/>
  <text x="700" y="87"
        text-anchor="middle"
        fill="#ff6b6b"
        font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif"
        font-size="13" font-weight="700">대형 언어 모델 (LLM)</text>

  <!-- Description -->
  <text x="600" y="124"
        fill="#aaa"
        font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif"
        font-size="11">방대한 텍스트로 사전 학습된</text>
  <text x="600" y="139"
        fill="#aaa"
        font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif"
        font-size="11">모델에 프롬프트로 지시하는 방식</text>

  <!-- Flow steps -->
  <rect x="600" y="158" width="200" height="28" rx="5" fill="#200000" stroke="#e03131" stroke-width="0.8"/>
  <text x="700" y="177" text-anchor="middle" fill="#ff6b6b" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="11">프롬프트 (자연어 지시)</text>

  <text x="700" y="200" text-anchor="middle" fill="#444" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="14">↓</text>

  <rect x="600" y="210" width="200" height="28" rx="5" fill="#111" stroke="#333" stroke-width="0.8"/>
  <text x="700" y="229" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="11">LLM (사전 학습된 모델)</text>

  <text x="700" y="252" text-anchor="middle" fill="#444" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="14">↓</text>

  <rect x="600" y="262" width="200" height="28" rx="5" fill="#200000" stroke="#e03131" stroke-width="0.8"/>
  <text x="700" y="281" text-anchor="middle" fill="#ff6b6b" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="11">생성된 텍스트 응답</text>

  <!-- Label -->
  <text x="600" y="314"
        fill="#666"
        font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif"
        font-size="10">코드 예시 — Claude API</text>

  <!-- Code block -->
  <rect x="592" y="322" width="216" height="170" rx="6"
        fill="#070b14" stroke="#1e2a3a" stroke-width="1"/>
  <rect x="592" y="322" width="216" height="20" rx="6" fill="#0d1622"/>
  <rect x="592" y="332" width="216" height="10" fill="#0d1622"/>
  <text x="606" y="337" fill="#3a4a5a" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9">llm_spam.py</text>

  <text x="602" y="357" fill="#6a8f5a" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10"># 프롬프트만으로 분류</text>
  <text x="602" y="373" fill="#c792ea" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">import</text>
  <text x="641" y="373" fill="#82aaff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">anthropic</text>
  <text x="602" y="391" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">client = anthropic.</text>
  <text x="602" y="407" fill="#82aaff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">    Anthropic</text>
  <text x="662" y="407" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">()</text>
  <text x="602" y="423" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">msg = client.messages</text>
  <text x="602" y="439" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">    .create(</text>
  <text x="602" y="455" fill="#c3e88d" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">    "스팸인지 분류해줘"</text>
  <text x="602" y="471" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">)</text>

  <!-- Footer -->
  <text x="440" y="545"
        text-anchor="middle"
        fill="#333"
        font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif"
        font-size="11">PALDYN · AI Basics Series #1</text>
</svg>
