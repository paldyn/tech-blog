<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr3" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">어댑터 · 퍼사드 · 프록시 패턴</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">세 가지 구조 패턴의 역할과 차이</text>

  <!-- ADAPTER Section -->
  <rect x="50" y="96" width="240" height="34" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="170" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">어댑터 패턴</text>

  <!-- Client -->
  <rect x="50" y="150" width="100" height="50" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="100" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">클라이언트</text>
  <text x="100" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Target 인터페이스</text>

  <!-- Adapter -->
  <rect x="185" y="150" width="105" height="50" rx="6" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="237" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">어댑터</text>
  <text x="237" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">인터페이스 변환</text>

  <!-- Adaptee -->
  <rect x="50" y="230" width="240" height="50" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="170" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">어댑티 (Adaptee)</text>
  <text x="170" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">기존 / 외부 라이브러리 인터페이스</text>

  <line x1="150" y1="175" x2="183" y2="175" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>
  <line x1="237" y1="200" x2="237" y2="228" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- FACADE Section -->
  <rect x="320" y="96" width="240" height="34" rx="6" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">퍼사드 패턴</text>

  <rect x="380" y="150" width="120" height="50" rx="6" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">퍼사드</text>
  <text x="440" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">단순화된 인터페이스</text>

  <rect x="320" y="230" width="70" height="50" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="355" y="255" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8">서브시스템 A</text>

  <rect x="405" y="230" width="70" height="50" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="440" y="255" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8">서브시스템 B</text>

  <rect x="490" y="230" width="70" height="50" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="525" y="255" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8">서브시스템 C</text>

  <line x1="390" y1="200" x2="355" y2="228" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>
  <line x1="440" y1="200" x2="440" y2="228" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>
  <line x1="490" y1="200" x2="525" y2="228" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>

  <!-- PROXY Section -->
  <rect x="590" y="96" width="240" height="34" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="710" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">프록시 패턴</text>

  <rect x="590" y="150" width="105" height="50" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="642" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">클라이언트</text>
  <text x="642" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Subject 인터페이스</text>

  <rect x="720" y="150" width="105" height="50" rx="6" fill="#111" stroke="#e05555" stroke-width="1.5"/>
  <text x="772" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">프록시</text>
  <text x="772" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">접근 제어 / 캐시</text>

  <rect x="655" y="230" width="110" height="50" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="710" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">실제 대상 (Real)</text>
  <text x="710" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Subject 구현체</text>

  <line x1="695" y1="175" x2="718" y2="175" stroke="#e05555" stroke-width="2" marker-end="url(#arr3)"/>
  <line x1="772" y1="200" x2="772" y2="250" stroke="#e05555" stroke-width="2"/>
  <line x1="772" y1="250" x2="766" y2="228" stroke="#e05555" stroke-width="2" marker-end="url(#arr3)"/>

  <!-- Summary row -->
  <rect x="50" y="330" width="240" height="80" rx="8" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="170" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" font-weight="600">어댑터 핵심</text>
  <text x="170" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">호환되지 않는 인터페이스</text>
  <text x="170" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">→ 변환(wrapping)</text>

  <rect x="320" y="330" width="240" height="80" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" font-weight="600">퍼사드 핵심</text>
  <text x="440" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">복잡한 서브시스템</text>
  <text x="440" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">→ 단순 진입점 제공</text>

  <rect x="590" y="330" width="240" height="80" rx="8" fill="#111" stroke="#e05555" stroke-width="1"/>
  <text x="710" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" font-weight="600">프록시 핵심</text>
  <text x="710" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">동일 인터페이스 유지</text>
  <text x="710" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">→ 접근 제어 / 캐시 삽입</text>

  <text x="440" y="454" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">어댑터=인터페이스 변환 · 퍼사드=복잡성 은닉 · 프록시=투명한 제어</text>
</svg>
