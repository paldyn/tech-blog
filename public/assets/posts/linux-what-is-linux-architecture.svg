<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Linux 아키텍처 개요</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">하드웨어부터 사용자 앱까지 5계층 구조</text>

  <!-- Layer 5: Hardware -->
  <rect x="60" y="400" width="760" height="52" fill="#1a1a2e" rx="8" stroke="#444" stroke-width="1"/>
  <text x="440" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">하드웨어 (Hardware)</text>
  <text x="440" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">CPU · RAM · 디스크 · NIC · GPU · 입출력 장치</text>

  <!-- Layer 4: Kernel -->
  <rect x="60" y="328" width="760" height="58" fill="#0d1a2a" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">Linux 커널 (Kernel)</text>
  <text x="440" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">프로세스 관리 · 메모리 관리 · 파일시스템 · 네트워크 · 디바이스 드라이버</text>

  <!-- Layer 3: System Libraries -->
  <rect x="60" y="260" width="760" height="52" fill="#0d1f0d" rx="8" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">시스템 라이브러리 (glibc, libstdc++, …)</text>
  <text x="440" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">시스템 콜을 감싸는 표준 인터페이스 — 앱이 커널을 직접 호출하지 않아도 됨</text>

  <!-- Layer 2: Shell &amp; Daemons -->
  <rect x="60" y="192" width="760" height="52" fill="#1c1a0d" rx="8" stroke="#e8c55a" stroke-width="1"/>
  <text x="440" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e8c55a" text-anchor="middle">셸 · 데몬 · 서비스 (Bash, systemd, sshd, …)</text>
  <text x="440" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">사용자 명령 해석 / 백그라운드 서비스 관리 / 부팅 시 자동 시작</text>

  <!-- Layer 1: Applications -->
  <rect x="60" y="98" width="760" height="78" fill="#1a0d1a" rx="8" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">사용자 애플리케이션 (User Applications)</text>

  <!-- App boxes -->
  <rect x="100" y="136" width="120" height="28" fill="#2a1f3a" rx="4"/>
  <text x="160" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">웹 브라우저</text>
  <rect x="240" y="136" width="120" height="28" fill="#2a1f3a" rx="4"/>
  <text x="300" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">텍스트 에디터</text>
  <rect x="380" y="136" width="120" height="28" fill="#2a1f3a" rx="4"/>
  <text x="440" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">개발 도구</text>
  <rect x="520" y="136" width="120" height="28" fill="#2a1f3a" rx="4"/>
  <text x="580" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">데이터베이스</text>
  <rect x="660" y="136" width="120" height="28" fill="#2a1f3a" rx="4"/>
  <text x="720" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">게임 / GUI</text>

  <!-- Arrows between layers -->
  <line x1="440" y1="388" x2="440" y2="396" stroke="#555" stroke-width="2"/>
  <polygon points="440,400 436,392 444,392" fill="#555"/>
  <line x1="440" y1="316" x2="440" y2="324" stroke="#555" stroke-width="2"/>
  <polygon points="440,328 436,320 444,320" fill="#555"/>
  <line x1="440" y1="248" x2="440" y2="256" stroke="#555" stroke-width="2"/>
  <polygon points="440,260 436,252 444,252" fill="#555"/>
  <line x1="440" y1="180" x2="440" y2="188" stroke="#555" stroke-width="2"/>
  <polygon points="440,192 436,184 444,184" fill="#555"/>
</svg>
