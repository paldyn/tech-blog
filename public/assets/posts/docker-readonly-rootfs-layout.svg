<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">--read-only 컨테이너 파일 시스템 구성</text>

  <!-- Normal container -->
  <rect x="60" y="66" width="350" height="36" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="235" y="89" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">일반 컨테이너 (읽기-쓰기)</text>

  <rect x="60" y="116" width="350" height="200" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="235" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">/ (루트 파일 시스템)</text>

  <!-- filesystem items - writable -->
  <rect x="80" y="152" width="310" height="30" rx="4" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="95" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">✗  /etc  /var  /tmp  /usr  — 모두 쓰기 가능</text>

  <rect x="80" y="190" width="310" height="30" rx="4" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="95" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">✗  공격자가 바이너리 교체 가능</text>

  <rect x="80" y="228" width="310" height="30" rx="4" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="95" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">✗  /etc/cron.d에 악성 크론 추가 가능</text>

  <rect x="80" y="266" width="310" height="30" rx="4" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="95" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">✗  침해 흔적 숨기기 용이</text>

  <!-- Read-only container -->
  <rect x="470" y="66" width="350" height="36" rx="6" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="645" y="89" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">--read-only 컨테이너</text>

  <rect x="470" y="116" width="350" height="200" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="645" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">/ (루트 파일 시스템 — 읽기 전용)</text>

  <!-- filesystem items - read-only -->
  <rect x="490" y="152" width="310" height="30" rx="4" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="505" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓  /etc  /usr  /bin  — 읽기 전용 (immutable)</text>

  <rect x="490" y="190" width="310" height="30" rx="4" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="505" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓  바이너리 교체 불가</text>

  <!-- tmpfs mounts -->
  <rect x="490" y="228" width="145" height="30" rx="4" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="562" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">--tmpfs /tmp</text>

  <rect x="655" y="228" width="145" height="30" rx="4" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="727" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">--tmpfs /run</text>

  <!-- named volume -->
  <rect x="490" y="266" width="310" height="30" rx="4" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="645" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">-v mydata:/app/data  (named volume)</text>

  <!-- Memory note for tmpfs -->
  <text x="562" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">tmpfs = 메모리</text>
  <text x="727" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">재시작 시 소실</text>

  <!-- Command box -->
  <rect x="60" y="338" width="760" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#9aa4b8"># read-only 컨테이너 실행</text>
  <text x="76" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">docker run --read-only \</text>
  <text x="76" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">  --tmpfs /tmp:rw,noexec,nosuid,size=100m \</text>
  <text x="76" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">  --tmpfs /run:rw,noexec,nosuid \</text>
  <text x="76" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">  -v app-data:/app/data myapp:latest</text>

  <!-- bottom note -->
  <text x="440" y="470" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">noexec: tmpfs에서 바이너리 실행 금지 / nosuid: setuid 비트 무력화 / size=100m: 메모리 한도</text>
</svg>
