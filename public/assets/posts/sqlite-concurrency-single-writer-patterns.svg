<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SQLite 동시성 패턴 — 멀티스레드 안전 사용법</text>

  <!-- Pattern 1: Single connection -->
  <rect x="60" y="68" width="360" height="160" fill="#0f1a2e" rx="10" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">패턴 1: 단일 연결 + 직렬화</text>
  <text x="240" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(단순, 안전, 성능 제한)</text>

  <rect x="76" y="120" width="328" height="94" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve"># 전역 Lock으로 직렬화</text>
  <text x="92" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">import</tspan><tspan fill="#ffffff"> threading, sqlite3</tspan></text>
  <text x="92" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">_lock = threading.Lock()</text>
  <text x="92" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">db = sqlite3.connect(<tspan fill="#ce9178">"app.db"</tspan>)</text>

  <!-- Pattern 2: Connection pool -->
  <rect x="460" y="68" width="360" height="160" fill="#0f1a2e" rx="10" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="640" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">패턴 2: 스레드별 연결</text>
  <text x="640" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(WAL + busy_timeout 필수)</text>

  <rect x="476" y="120" width="328" height="94" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve"># 스레드-로컬 연결</text>
  <text x="492" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">_local = threading.local()</text>
  <text x="492" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">def</tspan><tspan fill="#ffffff"> get_conn():</tspan></text>
  <text x="492" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  <tspan font-weight="600" fill="#7ec8e3">if not</tspan><tspan fill="#ffffff"> hasattr(_local, </tspan><tspan fill="#ce9178">'db'</tspan><tspan fill="#ffffff">):</tspan></text>

  <!-- SKIP LOCKED pattern -->
  <rect x="60" y="252" width="760" height="148" fill="#0f1a2e" rx="10" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">패턴 3: BEGIN IMMEDIATE — 빠른 잠금 획득</text>

  <rect x="76" y="290" width="360" height="98" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">-- 문제: BEGIN DEFERRED는</text>
  <text x="92" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">-- 쓰기 시점에 RESERVED 획득</text>
  <text x="92" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">-- → 다른 트랜잭션과 충돌 위험</text>
  <text x="92" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">BEGIN; ... UPDATE ...; COMMIT;</text>

  <rect x="456" y="290" width="368" height="98" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="472" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">-- 해결: BEGIN IMMEDIATE로</text>
  <text x="472" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">-- 시작 시점에 RESERVED 획득</text>
  <text x="472" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">BEGIN IMMEDIATE</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="472" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">UPDATE</tspan><tspan fill="#ffffff"> ... ; </tspan><tspan font-weight="600" fill="#7ec8e3">COMMIT</tspan><tspan fill="#ffffff">;</tspan></text>
</svg>
