  <rect x="320" y="100" width="240" height="170" rx="8" fill="#000000" stroke="#e0a020" stroke-width="1"/>
  <text x="440" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e0a020" text-anchor="middle">임시 (차선)</text>
  <text x="440" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
