  <rect x="60" y="100" width="240" height="170" rx="8" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="180" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">1순위 (근본)</text>
  <text x="180" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
