  <text x="180" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8" text-anchor="middle">업그레이드</text>
  <text x="180" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
