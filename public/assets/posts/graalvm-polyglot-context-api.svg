<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Polyglot Context / Value API — Java에서 JS 실행</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#888">직렬화 없이 Java 객체를 JS에 전달, 결과를 Value로 수신</text>

  <!-- Left: Java code -->
  <rect x="60" y="90" width="370" height="370" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="74" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">// Java Host Code</text>

  <!-- Line 1 -->
  <text x="74" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">try</tspan> (<tspan fill="#7ec8e3" font-weight="600">var</tspan> ctx = Context</text>
  <text x="74" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    .newBuilder(<tspan fill="#ce9178">"js"</tspan>)</text>
  <text x="74" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    .allowAllAccess(<tspan fill="#b5cea8">true</tspan>)</text>
  <text x="74" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    .build()) {</text>

  <!-- Spacer line -->
  <text x="74" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  <tspan fill="#9aa4b8">// Java 객체를 JS에 노출</tspan></text>
  <text x="74" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  ctx.getBindings(<tspan fill="#ce9178">"js"</tspan>)</text>
  <text x="74" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">     .putMember(<tspan fill="#ce9178">"data"</tspan>, myList);</text>

  <text x="74" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  <tspan fill="#9aa4b8">// JS 코드 실행</tspan></text>
  <text x="74" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  Value result = ctx.eval(</text>
  <text x="74" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    <tspan fill="#ce9178">"js"</tspan>,</text>
  <text x="74" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    <tspan fill="#ce9178">"data.reduce((a,b)=&gt;a+b,0)"</tspan></text>
  <text x="74" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  );</text>

  <text x="74" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  <tspan fill="#9aa4b8">// Value → Java 타입 변환</tspan></text>
  <text x="74" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">long</tspan> sum = result.asLong();</text>
  <text x="74" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>
  <text x="74" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"><tspan fill="#9aa4b8">// ctx.close() 자동 호출</tspan></text>
  <text x="74" y="444" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"><tspan fill="#9aa4b8">// (try-with-resources)</tspan></text>

  <!-- Right: Concept boxes -->
  <!-- Context box -->
  <rect x="490" y="90" width="330" height="80" rx="8" fill="#0a1828" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="655" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">Context</text>
  <text x="655" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">언어 런타임의 격리 실행 단위</text>
  <text x="655" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">스레드 1개 점유 · 동기 실행</text>

  <!-- Value box -->
  <rect x="490" y="196" width="330" height="80" rx="8" fill="#0a1828" stroke="#55c555" stroke-width="1.5"/>
  <text x="655" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">Value (폴리글랏 포인터)</text>
  <text x="655" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">복사/직렬화 없이 원본 객체 참조</text>
  <text x="655" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">asLong() · asString() · as(Class) 등</text>

  <!-- Bindings box -->
  <rect x="490" y="302" width="330" height="80" rx="8" fill="#1a1a0a" stroke="#e8c84a" stroke-width="1.5"/>
  <text x="655" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8c84a">Bindings (언어 전역 스코프)</text>
  <text x="655" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Java → JS: putMember(name, obj)</text>
  <text x="655" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">JS에서 name으로 Java 객체 직접 접근</text>

  <!-- Footprint box -->
  <rect x="490" y="408" width="330" height="56" rx="8" fill="#0a1a0a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="655" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc">Interop 프로토콜</text>
  <text x="655" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">배열·맵·함수·예외 — 언어 중립 메시지 기반 통신</text>

  <!-- Arrows from code to right boxes -->
  <line x1="430" y1="130" x2="490" y2="130" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <line x1="430" y1="284" x2="490" y2="236" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="430" y1="235" x2="490" y2="342" stroke="#e8c84a" stroke-width="1.5"/>
</svg>
