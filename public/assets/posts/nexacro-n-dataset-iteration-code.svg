<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Dataset 순회 실전 코드</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">합계 집계와 저장 전 유효성 검증 패턴</text>

  <!-- Code block -->
  <rect x="60" y="88" width="760" height="256" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>

  <text xml:space="preserve" x="76" y="115" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">// 합계 집계</text>
  <text xml:space="preserve" x="76" y="133" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#7ec8e3">var</tspan> total = <tspan fill="#b5cea8">0</tspan>;</text>
  <text xml:space="preserve" x="76" y="151" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#7ec8e3">for</tspan> (<tspan fill="#7ec8e3">var</tspan> i=<tspan fill="#b5cea8">0</tspan>; i&lt;ds.rowcount; i++) {</text>
  <text xml:space="preserve" x="76" y="169" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">  total += ds.getColumn(i, <tspan fill="#ce9178">"AMT"</tspan>);</text>
  <text xml:space="preserve" x="76" y="187" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">}</text>
  <!-- blank -->
  <text xml:space="preserve" x="76" y="223" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">// 저장 전 필수값 검증</text>
  <text xml:space="preserve" x="76" y="241" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#7ec8e3">var</tspan> RT = Dataset.ROWTYPE;</text>
  <text xml:space="preserve" x="76" y="259" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#7ec8e3">for</tspan> (<tspan fill="#7ec8e3">var</tspan> i=<tspan fill="#b5cea8">0</tspan>; i&lt;ds.rowcount; i++) {</text>
  <text xml:space="preserve" x="76" y="277" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">  <tspan fill="#7ec8e3">if</tspan> (ds.getRowType(i)==RT.NORMAL) <tspan fill="#7ec8e3">continue</tspan>;</text>
  <text xml:space="preserve" x="76" y="295" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">  <tspan fill="#7ec8e3">if</tspan> (!ds.getColumn(i,<tspan fill="#ce9178">"EMP_NM"</tspan>))</text>
  <text xml:space="preserve" x="76" y="313" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">    <tspan fill="#7ec8e3">return</tspan> alert(<tspan fill="#ce9178">"사원명 필수"</tspan>);</text>

  <!-- Note -->
  <text x="440" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">NORMAL 행을 continue로 건너뛰면 INSERT·UPDATE 행만 검증할 수 있습니다</text>
</svg>
