<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">how= 에 따라 남는 행이 달라진다</text>

  <g>
    <text x="170" y="100" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">inner</text>
    <circle cx="145" cy="160" r="42" fill="#1a2433" stroke="#3a4a6e"/>
    <circle cx="195" cy="160" r="42" fill="#1a2433" stroke="#3a4a6e"/>
    <path d="M 170 124 A 42 42 0 0 1 170 196 A 42 42 0 0 1 170 124 Z" fill="#7ec8e3" opacity="0.85"/>
    <text x="170" y="230" font-size="12" fill="#9aa4b8" text-anchor="middle">양쪽 다 있는 키만</text>
  </g>

  <g>
    <text x="390" y="100" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">left</text>
    <circle cx="365" cy="160" r="42" fill="#55c555" opacity="0.85"/>
    <circle cx="415" cy="160" r="42" fill="#1a2433" stroke="#3a4a6e"/>
    <path d="M 390 124 A 42 42 0 0 1 390 196 A 42 42 0 0 1 390 124 Z" fill="#55c555" opacity="0.85"/>
    <text x="390" y="230" font-size="12" fill="#9aa4b8" text-anchor="middle">왼쪽 전부 + 매칭</text>
  </g>

  <g>
    <text x="610" y="100" font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">right</text>
    <circle cx="585" cy="160" r="42" fill="#1a2433" stroke="#3a4a6e"/>
    <circle cx="635" cy="160" r="42" fill="#7777cc" opacity="0.85"/>
    <path d="M 610 124 A 42 42 0 0 1 610 196 A 42 42 0 0 1 610 124 Z" fill="#7777cc" opacity="0.85"/>
    <text x="610" y="230" font-size="12" fill="#9aa4b8" text-anchor="middle">오른쪽 전부 + 매칭</text>
  </g>

  <g>
    <text x="790" y="100" font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">outer</text>
    <circle cx="765" cy="160" r="42" fill="#e05555" opacity="0.8"/>
    <circle cx="815" cy="160" r="42" fill="#e05555" opacity="0.8"/>
    <text x="790" y="230" font-size="12" fill="#9aa4b8" text-anchor="middle">양쪽 전부</text>
  </g>

  <rect x="60" y="262" width="760" height="44" rx="6" fill="#0f1320" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="290" font-size="14" fill="#7ec8e3" text-anchor="middle">매칭 안 되는 행의 빈 칸은 NaN으로 채워진다 — 기본값은 inner</text>
</svg>
