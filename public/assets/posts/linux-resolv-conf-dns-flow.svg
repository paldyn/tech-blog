<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480" style="background:#0a0a0a;border-radius:12px;">
  <defs>
    <marker id="arr" markerWidth="18" markerHeight="14" refX="16" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0,18 7,0 14" fill="#4a5a6a" stroke="none"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" xml:space="preserve">DNS 이름 해석 흐름</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" xml:space="preserve">애플리케이션 → nsswitch → /etc/hosts → systemd-resolved → 상위 DNS</text>
  <line x1="60" y1="86" x2="820" y2="86" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Step 1: Application -->
  <rect x="310" y="100" width="260" height="52" rx="10" fill="#12192a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" xml:space="preserve">애플리케이션</text>
  <text x="440" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">curl, ping, ssh... getaddrinfo() 호출</text>

  <!-- Arrow 1 -->
  <line x1="440" y1="152" x2="440" y2="174" stroke="#4a5a6a" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2: NSS + /etc/nsswitch.conf -->
  <rect x="310" y="176" width="260" height="52" rx="10" fill="#12192a" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc" xml:space="preserve">NSS (nsswitch.conf)</text>
  <text x="440" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">hosts: files mdns4 dns</text>

  <!-- Arrow 2: split -->
  <line x1="390" y1="228" x2="248" y2="270" stroke="#4a5a6a" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="490" y1="228" x2="560" y2="270" stroke="#4a5a6a" stroke-width="2" marker-end="url(#arr)"/>
  <text x="310" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" xml:space="preserve">1순위: files</text>
  <text x="560" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" xml:space="preserve">2순위: dns</text>

  <!-- Step 3a: /etc/hosts (left) -->
  <rect x="120" y="272" width="256" height="52" rx="10" fill="#0d1520" stroke="#55c555" stroke-width="2"/>
  <text x="248" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555" xml:space="preserve">/etc/hosts</text>
  <text x="248" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">정적 호스트 매핑 (로컬 우선)</text>

  <!-- Step 3b: systemd-resolved (right) -->
  <rect x="460" y="272" width="300" height="52" rx="10" fill="#0d1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="610" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" xml:space="preserve">systemd-resolved</text>
  <text x="610" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">127.0.0.53:53 · 캐시 · DNSSEC</text>

  <!-- Arrow from systemd-resolved to upstream -->
  <line x1="610" y1="324" x2="610" y2="366" stroke="#4a5a6a" stroke-width="2" marker-end="url(#arr)"/>
  <text x="648" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" xml:space="preserve">캐시 미스 시</text>

  <!-- Step 4: Upstream DNS -->
  <rect x="460" y="368" width="300" height="52" rx="10" fill="#0d1520" stroke="#e05555" stroke-width="1.5"/>
  <text x="610" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555" xml:space="preserve">상위 DNS 서버</text>
  <text x="610" y="408" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">8.8.8.8, 1.1.1.1 등 (resolv.conf)</text>

  <!-- Hit label under /etc/hosts -->
  <text x="248" y="346" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" xml:space="preserve">→ 발견 시 즉시 반환</text>

  <!-- /etc/resolv.conf reference -->
  <text x="440" y="460" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" xml:space="preserve">resolv.conf의 nameserver 항목이 systemd-resolved를 가리킴 (127.0.0.53)</text>
</svg>
