<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">typeof — 반환값 표와 함정</text>

  <!-- Table header -->
  <rect x="60" y="60" width="760" height="36" fill="#141f2e" rx="6"/>
  <text x="220" y="83" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7ec8e3">표현식</text>
  <text x="500" y="83" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7ec8e3">typeof 결과</text>
  <text x="720" y="83" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7ec8e3">비고</text>

  <!-- Row data -->
  <!-- Row 1 -->
  <rect x="60" y="96" width="760" height="32" fill="#0f0f0f" rx="0"/>
  <text x="220" y="117" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">typeof 42</text>
  <text x="500" y="117" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"number"</text>
  <text x="720" y="117" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">NaN도 "number"</text>

  <!-- Row 2 -->
  <rect x="60" y="128" width="760" height="32" fill="#111" rx="0"/>
  <text x="220" y="149" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">typeof "hi"</text>
  <text x="500" y="149" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"string"</text>
  <text x="720" y="149" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">문자열</text>

  <!-- Row 3 -->
  <rect x="60" y="160" width="760" height="32" fill="#0f0f0f" rx="0"/>
  <text x="220" y="181" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">typeof true</text>
  <text x="500" y="181" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"boolean"</text>
  <text x="720" y="181" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">boolean</text>

  <!-- Row 4 -->
  <rect x="60" y="192" width="760" height="32" fill="#111" rx="0"/>
  <text x="220" y="213" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">typeof undefined</text>
  <text x="500" y="213" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"undefined"</text>
  <text x="720" y="213" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">미선언 변수도 "undefined"</text>

  <!-- Row 5 -->
  <rect x="60" y="224" width="760" height="32" fill="#0f0f0f" rx="0"/>
  <text x="220" y="245" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">typeof Symbol()</text>
  <text x="500" y="245" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"symbol"</text>
  <text x="720" y="245" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">심볼</text>

  <!-- Row 6 -->
  <rect x="60" y="256" width="760" height="32" fill="#111" rx="0"/>
  <text x="220" y="277" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">typeof 9n</text>
  <text x="500" y="277" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"bigint"</text>
  <text x="720" y="277" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">BigInt</text>

  <!-- Row 7: function -->
  <rect x="60" y="288" width="760" height="32" fill="#0f0f0f" rx="0"/>
  <text x="220" y="309" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">typeof function(){}</text>
  <text x="500" y="309" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">"function"</text>
  <text x="720" y="309" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">함수만 특별 처리</text>

  <!-- Row 8: null — TRAP -->
  <rect x="60" y="320" width="760" height="32" fill="#1a0d0d" rx="0"/>
  <text x="220" y="341" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">typeof null</text>
  <text x="500" y="341" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">"object" ⚠</text>
  <text x="720" y="341" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e05555">역사적 버그! null ≠ object</text>

  <!-- Row 9: object -->
  <rect x="60" y="352" width="760" height="32" fill="#111" rx="0"/>
  <text x="220" y="373" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">typeof {}</text>
  <text x="500" y="373" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"object"</text>
  <text x="720" y="373" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">Array·Date·RegExp도 "object"</text>

  <!-- Table border bottom rounded -->
  <rect x="60" y="384" width="760" height="1" fill="#333"/>

  <!-- null check correct way -->
  <rect x="60" y="398" width="760" height="56" fill="#0f0f1a" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="418" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#7777cc">null 판별은 === null로, 배열 판별은 Array.isArray()로</text>
  <text x="440" y="440" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> isNull </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#e8e8e8"> v </tspan><tspan fill="#7ec8e3">=&gt;</tspan><tspan fill="#e8e8e8"> v </tspan><tspan fill="#7ec8e3">===</tspan><tspan fill="#e8e8e8"> </tspan><tspan fill="#7ec8e3">null</tspan><tspan fill="#e8e8e8">; </tspan>
    <tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> isArr </tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#e8e8e8"> v </tspan><tspan fill="#7ec8e3">=&gt;</tspan><tspan fill="#e8e8e8"> Array.isArray(v);</tspan>
  </text>
  <text x="440" y="458" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#666">typeof null === "object" — JS 초기 설계 버그 (수정 불가: 웹 호환성)</text>
</svg>
