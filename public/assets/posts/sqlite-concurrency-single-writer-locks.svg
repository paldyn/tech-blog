<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arrcw" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SQLite 잠금 상태 전이</text>

  <!-- Lock states -->
  <rect x="60" y="80" width="130" height="60" fill="#1a2a1a" rx="8" stroke="#55c555" stroke-width="2"/>
  <text x="125" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">UNLOCKED</text>
  <text x="125" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">잠금 없음</text>

  <rect x="230" y="80" width="130" height="60" fill="#1a1a2e" rx="8" stroke="#7ec8e3" stroke-width="2"/>
  <text x="295" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">SHARED</text>
  <text x="295" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">읽기 잠금 (N개 동시)</text>

  <rect x="400" y="80" width="130" height="60" fill="#1a1a2e" rx="8" stroke="#7777cc" stroke-width="2"/>
  <text x="465" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">RESERVED</text>
  <text x="465" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">쓰기 예약 (1개)</text>

  <rect x="570" y="80" width="130" height="60" fill="#2a1a1a" rx="8" stroke="#e05555" stroke-width="2"/>
  <text x="635" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">PENDING</text>
  <text x="635" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">신규 SHARED 차단</text>

  <rect x="700" y="80" width="120" height="60" fill="#2a1a1a" rx="8" stroke="#e05555" stroke-width="2"/>
  <text x="760" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">EXCLUSIVE</text>
  <text x="760" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">배타적 쓰기</text>

  <!-- Arrows between lock states -->
  <line x1="190" y1="110" x2="228" y2="110" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrcw)"/>
  <text x="209" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#9aa4b8" text-anchor="middle">BEGIN</text>

  <line x1="360" y1="110" x2="398" y2="110" stroke="#7777cc" stroke-width="2" marker-end="url(#arrcw)"/>
  <text x="379" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#9aa4b8" text-anchor="middle">BEGIN WRITE</text>

  <line x1="530" y1="110" x2="568" y2="110" stroke="#e05555" stroke-width="2" marker-end="url(#arrcw)"/>
  <text x="549" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#9aa4b8" text-anchor="middle">SHARED=0</text>

  <line x1="700" y1="110" x2="698" y2="110" stroke="#e05555" stroke-width="2" marker-end="url(#arrcw)"/>

  <!-- Timeline: WAL mode concurrency -->
  <rect x="60" y="190" width="760" height="280" fill="#0f1a2e" rx="10" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8" text-anchor="middle">WAL 모드 동시성 타임라인</text>

  <!-- Time axis -->
  <line x1="80" y1="440" x2="800" y2="440" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">t=0</text>
  <text x="780" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">t→</text>

  <!-- Reader 1 -->
  <rect x="80" y="232" width="400" height="30" fill="#1a2a1a" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="90" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">Reader 1 (SELECT)</text>
  <text x="282" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">읽기 진행 중 ─────────────</text>

  <!-- Reader 2 -->
  <rect x="200" y="276" width="300" height="30" fill="#1a2a1a" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="210" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">Reader 2</text>
  <text x="350" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">동시 읽기 가능 ──────</text>

  <!-- Writer 1 -->
  <rect x="160" y="320" width="240" height="30" fill="#1a1a2e" rx="4" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">Writer 1 (UPDATE)</text>
  <text x="282" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">WAL에 쓰기 ─────</text>

  <!-- Writer 2 - blocked -->
  <rect x="250" y="364" width="120" height="30" fill="#2a1a1a" rx="4" stroke="#e05555" stroke-width="1.5"/>
  <text x="310" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">Writer 2 — 대기</text>

  <rect x="400" y="364" width="240" height="30" fill="#1a1a2e" rx="4" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="520" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">Writer 1 완료 후 실행</text>

  <!-- Checkpoint -->
  <rect x="620" y="320" width="160" height="30" fill="#1a2a1a" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="700" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">자동 체크포인트</text>

  <!-- Labels -->
  <text x="76" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">────</text>
</svg>
