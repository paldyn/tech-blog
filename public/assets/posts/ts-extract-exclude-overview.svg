<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr-ex" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-excl" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Extract vs Exclude: 유니언 필터링</text>

  <!-- Union T visualization -->
  <rect x="60" y="72" width="240" height="200" fill="#111827" rx="8" stroke="#334155" stroke-width="1.5"/>
  <text x="180" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">유니언 T</text>

  <!-- Union members -->
  <rect x="76" y="106" width="100" height="30" fill="#1a3a2a" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="126" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">"string"</text>

  <rect x="76" y="144" width="100" height="30" fill="#1a3a2a" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="126" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">"number"</text>

  <rect x="76" y="182" width="100" height="30" fill="#3a1a1a" rx="4" stroke="#e05555" stroke-width="1"/>
  <text x="126" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">"boolean"</text>

  <rect x="76" y="220" width="100" height="30" fill="#3a1a1a" rx="4" stroke="#e05555" stroke-width="1"/>
  <text x="126" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">"object"</text>

  <!-- Legend -->
  <rect x="184" y="110" width="8" height="8" fill="#55c555" rx="1"/>
  <text x="196" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">Extract 선택</text>
  <rect x="184" y="186" width="8" height="8" fill="#e05555" rx="1"/>
  <text x="196" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">Exclude 제거</text>

  <!-- Arrow Extract -->
  <line x1="302" y1="138" x2="370" y2="138" stroke="#55c555" stroke-width="2" marker-end="url(#arr-ex)"/>
  <text x="310" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">Extract&lt;T, U&gt;</text>

  <!-- Arrow Exclude -->
  <line x1="302" y1="210" x2="370" y2="300" stroke="#e05555" stroke-width="2" marker-end="url(#arr-excl)"/>
  <text x="308" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">Exclude&lt;T, U&gt;</text>

  <!-- Extract result -->
  <rect x="372" y="100" width="220" height="100" fill="#111827" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="482" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Extract 결과</text>
  <text x="388" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">"string" | "number"</text>
  <text x="388" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">U에 할당 가능한 것만 남김</text>
  <text x="388" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">→ 교집합</text>

  <!-- Exclude result -->
  <rect x="372" y="270" width="220" height="100" fill="#111827" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="482" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">Exclude 결과</text>
  <text x="388" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">"boolean" | "object"</text>
  <text x="388" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">U에 할당 가능한 것 제거</text>
  <text x="388" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">→ 차집합</text>

  <!-- Implementation -->
  <rect x="620" y="72" width="208" height="148" fill="#111827" rx="8" stroke="#334155" stroke-width="1"/>
  <text x="724" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">구현 (조건부 타입)</text>
  <text x="636" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">Extract&lt;T, U&gt; =</text>
  <text x="636" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  T extends U</text>
  <text x="636" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" xml:space="preserve">    ? T : never</text>
  <text x="636" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">Exclude&lt;T, U&gt; =</text>
  <text x="636" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  T extends U</text>
  <text x="636" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555" xml:space="preserve">    ? never : T</text>

  <!-- Note box -->
  <rect x="620" y="236" width="208" height="80" fill="#0d1117" rx="8" stroke="#334155" stroke-width="1"/>
  <text x="724" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">Omit과의 관계</text>
  <text x="636" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Omit 내부에서 Exclude 사용:</text>
  <text x="636" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">Pick&lt;T, Exclude&lt;keyof T, K&gt;&gt;</text>

  <!-- Set diagram -->
  <rect x="60" y="290" width="280" height="112" fill="#0d1117" rx="8" stroke="#334155" stroke-width="1.5"/>
  <text x="200" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">집합론적 관점</text>
  <text x="80" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">Extract&lt;T, U&gt; = T ∩ U</text>
  <text x="80" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">Exclude&lt;T, U&gt; = T \ U (차집합)</text>
  <text x="80" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">유니언 타입 = 집합, 조건부 타입으로 필터</text>
  <text x="80" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">분배 조건부 타입(distributive)으로 동작</text>
</svg>
