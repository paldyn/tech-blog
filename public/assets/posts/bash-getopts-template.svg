<svg width="880" height="420" viewBox="0 0 880 420" xmlns="http://www.w3.org/2000/svg" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">getopts 완성 템플릿</text>

  <rect x="60" y="64" width="760" height="336" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="86" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">#!/usr/bin/env bash</tspan></text>
  <text x="76" y="104" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">VERBOSE=</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">; OUTPUT=</tspan><tspan fill="#ce9178">""</tspan></text>
  <text x="76" y="122" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"> </text>
  <text x="76" y="140" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">usage() { </tspan><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"사용법: $0 [-v] [-o 파일] &lt;소스&gt;"</tspan><tspan fill="#ffffff">; </tspan><tspan fill="#7ec8e3" font-weight="600">exit</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">; }</tspan></text>
  <text x="76" y="158" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"> </text>
  <text x="76" y="176" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">while</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">getopts</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">":hvo:"</tspan><tspan fill="#ffffff"> opt; </tspan><tspan fill="#7ec8e3" font-weight="600">do</tspan><tspan fill="#9aa4b8">  # 첫 : = 에러 직접 처리</tspan></text>
  <text x="76" y="194" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">case</tspan><tspan fill="#ffffff"> $opt </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan></text>
  <text x="76" y="212" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">        h) usage ;;</tspan></text>
  <text x="76" y="230" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">        v) VERBOSE=</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff"> ;;</tspan></text>
  <text x="76" y="248" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">        o) OUTPUT=</tspan><tspan fill="#ce9178">"$OPTARG"</tspan><tspan fill="#ffffff"> ;;</tspan></text>
  <text x="76" y="266" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">        :) </tspan><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"-$OPTARG 에 값 필요"</tspan><tspan fill="#ffffff"> &gt;&amp;2; </tspan><tspan fill="#7ec8e3" font-weight="600">exit</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff"> ;;</tspan></text>
  <text x="76" y="284" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">       \?) </tspan><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"알 수 없는 옵션: -$OPTARG"</tspan><tspan fill="#ffffff"> &gt;&amp;2; </tspan><tspan fill="#7ec8e3" font-weight="600">exit</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff"> ;;</tspan></text>
  <text x="76" y="302" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">esac</tspan></text>
  <text x="76" y="320" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">done</tspan></text>
  <text x="76" y="338" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">shift</tspan><tspan fill="#ffffff"> $(( OPTIND - </tspan><ttml fill="#b5cea8">1</ttml><tspan fill="#ffffff"> ))</tspan><tspan fill="#9aa4b8">  # 옵션 처리 후 나머지 인자 앞으로</tspan></text>
  <text x="76" y="356" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">SRC=</tspan><tspan fill="#ce9178">"$1"</tspan><tspan fill="#9aa4b8">  # 남은 위치 인자</tspan></text>
  <text x="76" y="374" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">[[ $VERBOSE -eq </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff"> ]] &amp;&amp; </tspan><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"verbose ON, output=$OUTPUT, src=$SRC"</tspan></text>
</svg>
