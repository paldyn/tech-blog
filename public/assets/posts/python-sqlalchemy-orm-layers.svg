<svg xmlns="http://www.w3.org/2000/svg" width="880" height="290" viewBox="0 0 880 290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="290" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">SQLAlchemy의 두 층</text>

  <defs>
    <marker id="saar" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="60" y="84" width="360" height="80" rx="6" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="240" y="114" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">ORM 층</text>
  <text x="240" y="140" font-size="12" fill="#9aa4b8" text-anchor="middle">클래스·객체로 다룸 · Session</text>

  <rect x="460" y="84" width="360" height="80" rx="6" fill="#000000" stroke="#7777cc" stroke-width="1"/>
  <text x="640" y="114" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">Core 층</text>
  <text x="640" y="140" font-size="12" fill="#9aa4b8" text-anchor="middle">SQL 표현식 · Engine · 연결</text>

  <line x1="240" y1="164" x2="240" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#saar)"/>
  <line x1="640" y1="164" x2="640" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#saar)"/>
  <text x="440" y="186" font-size="12" fill="#9aa4b8" text-anchor="middle">둘 다 같은 엔진 위에서 동작</text>

  <rect x="60" y="204" width="760" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="231" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">데이터베이스 (PostgreSQL · MySQL · SQLite ...)</text>

  <rect x="60" y="262" width="760" height="0"/>
  <text x="440" y="274" font-size="13" fill="#9aa4b8" text-anchor="middle">객체 중심이면 ORM, 세밀한 SQL 제어가 필요하면 Core를 골라 쓴다</text>
</svg>
