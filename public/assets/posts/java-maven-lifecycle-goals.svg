<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-o" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">페이즈 vs 골 — mvn 실행 방식의 두 가지 형태</text>

  <!-- Left column: Phase execution -->
  <text x="60" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">mvn &lt;phase&gt; — 누적 실행</text>

  <rect x="60" y="96" width="360" height="152" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan x="76" dy="0"  fill="#9aa4b8"># 페이즈 지정 — 앞 단계 모두 실행</tspan>
    <tspan x="76" dy="20" fill="#7ec8e3" font-weight="600">$ mvn package</tspan>
    <tspan x="76" dy="20" fill="#9aa4b8">  # validate</tspan>
    <tspan x="76" dy="20" fill="#9aa4b8">  # compile</tspan>
    <tspan x="76" dy="20" fill="#9aa4b8">  # test</tspan>
    <tspan x="76" dy="20" fill="#55c555" font-weight="600">  # package  ← 여기까지</tspan>
  </text>

  <!-- Cumulative visual: boxes stacked -->
  <rect x="60" y="268" width="72" height="36" rx="4" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="291" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">validate</text>
  <line x1="132" y1="286" x2="146" y2="286" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="147" y="268" width="72" height="36" rx="4" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="183" y="291" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">compile</text>
  <line x1="219" y1="286" x2="233" y2="286" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="234" y="268" width="55" height="36" rx="4" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="261" y="291" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">test</text>
  <line x1="289" y1="286" x2="303" y2="286" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="304" y="262" width="80" height="48" rx="4" fill="#0a0a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="344" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">package</text>
  <text x="344" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">목표 페이즈</text>

  <!-- Right column: Goal direct execution -->
  <text x="460" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e05555">mvn &lt;plugin&gt;:&lt;goal&gt; — 직접 실행</text>

  <rect x="460" y="96" width="360" height="152" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan x="476" dy="0"  fill="#9aa4b8"># 골 직접 지정 — 해당 골만 실행</tspan>
    <tspan x="476" dy="20" fill="#e05555" font-weight="600">$ mvn dependency:tree</tspan>
    <tspan x="476" dy="20" fill="#9aa4b8">  # 의존성 트리 출력만</tspan>
    <tspan x="476" dy="20" fill="#e05555" font-weight="600">$ mvn versions:display-updates</tspan>
    <tspan x="476" dy="20" fill="#9aa4b8">  # 업데이트 가능 버전 확인</tspan>
    <tspan x="476" dy="20" fill="#9aa4b8">  # 라이프사이클 페이즈 무관</tspan>
  </text>

  <!-- Goal direct: no prior phases -->
  <rect x="460" y="268" width="140" height="48" rx="4" fill="#0a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="530" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">dependency:tree</text>
  <text x="530" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">이전 페이즈 없음</text>

  <line x1="600" y1="286" x2="654" y2="286" stroke="#e05555" stroke-width="2" marker-end="url(#arr-o)"/>

  <rect x="655" y="268" width="140" height="48" rx="4" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="725" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">의존성 트리 출력</text>
  <text x="725" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">즉시 완료</text>

  <!-- Bottom explanation box -->
  <rect x="60" y="338" width="760" height="112" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan x="76" dy="0"  fill="#9aa4b8"># 요약: 페이즈 vs 골</tspan>
    <tspan x="76" dy="20" fill="#7ec8e3" font-weight="600">mvn compile</tspan>
    <tspan fill="#ffffff">      # 페이즈 — validate + compile 순서 실행</tspan>
    <tspan x="76" dy="20" fill="#e05555" font-weight="600">mvn compiler:compile</tspan>
    <tspan fill="#ffffff"> # 골 직접 — compile 골만 단독 실행</tspan>
    <tspan x="76" dy="20" fill="#9aa4b8">                       # 단, compile 전제조건(소스 없음 등)은 사용자 책임</tspan>
    <tspan x="76" dy="20" fill="#55c555" font-weight="600">mvn clean package</tspan>
    <tspan fill="#ffffff">    # 복수 지정 — clean 라이프사이클 후 default package</tspan>
  </text>
</svg>
