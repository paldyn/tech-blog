<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arrd" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto">
      <polygon points="0 0,20 7,0 14" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto">
      <polygon points="0 0,20 7,0 14" fill="#55c555"/>
    </marker>
    <marker id="arro" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto">
      <polygon points="0 0,20 7,0 14" fill="#e8a855"/>
    </marker>
  </defs>
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">RMAN 백업 아키텍처</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">Oracle DB 전용 백업 도구 — 블록 수준 백업 · 증분 · 카탈로그</text>

  <!-- Target DB -->
  <rect x="50" y="92" width="230" height="200" rx="10" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="165" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Target Database</text>

  <rect x="66" y="128" width="198" height="30" rx="4" fill="#0d1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="165" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">Datafiles</text>

  <rect x="66" y="166" width="198" height="30" rx="4" fill="#0d1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="165" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">Control File</text>

  <rect x="66" y="204" width="198" height="30" rx="4" fill="#0d1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="165" y="224" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">Archived Redo Logs</text>

  <rect x="66" y="242" width="198" height="36" rx="4" fill="#0a0f18"/>
  <text x="165" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">RMAN은 Oracle 서버</text>
  <text x="165" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">채널로 직접 접근</text>

  <!-- RMAN client -->
  <rect x="330" y="92" width="200" height="100" rx="10" fill="#1a1510" stroke="#e8a855" stroke-width="2"/>
  <text x="430" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8a855">RMAN Client</text>
  <text x="430" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ccc">명령 파싱 &amp; 실행</text>
  <text x="430" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Backup · Restore</text>
  <text x="430" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Report · List</text>

  <!-- Arrows -->
  <line x1="282" y1="170" x2="328" y2="150" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrd)"/>
  <line x1="328" y1="162" x2="282" y2="182" stroke="#e8a855" stroke-width="1.5" marker-end="url(#arro)"/>

  <!-- RMAN Catalog -->
  <rect x="330" y="220" width="200" height="70" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="430" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">Recovery Catalog</text>
  <text x="430" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ccc">별도 DB 스키마</text>
  <text x="430" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">(선택, Control File에도 저장)</text>

  <line x1="430" y1="194" x2="430" y2="218" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrg)"/>

  <!-- Backup destinations -->
  <rect x="600" y="92" width="230" height="130" rx="10" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="715" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">백업 목적지</text>

  <rect x="616" y="128" width="198" height="30" rx="4" fill="#12101a" stroke="#7777cc" stroke-width="1"/>
  <text x="715" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">Disk (Fast Recovery Area)</text>

  <rect x="616" y="166" width="198" height="30" rx="4" fill="#12101a" stroke="#7777cc" stroke-width="1"/>
  <text x="715" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">Tape (SBT Channel)</text>

  <rect x="616" y="204" width="198" height="14" rx="4" fill="#0a0a0a"/>
  <text x="715" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">OSS / Object Storage 지원</text>

  <line x1="530" y1="142" x2="598" y2="162" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arrd)"/>

  <!-- Backup types -->
  <rect x="50" y="318" width="780" height="160" rx="8" fill="#111" stroke="#333"/>
  <text x="440" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">RMAN 백업 유형</text>

  <rect x="66" y="352" width="220" height="110" rx="6" fill="#0d1520"/>
  <text x="176" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">Full Backup</text>
  <text x="176" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ccc">변경된 블록만 포함</text>
  <text x="176" y="410" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ccc">(사용된 블록 전체)</text>
  <text x="176" y="428" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Incremental의 기준</text>
  <text x="176" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">BACKUP DATABASE;</text>

  <rect x="306" y="352" width="220" height="110" rx="6" fill="#0d1a0d"/>
  <text x="416" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">Level 0 (Incremental Base)</text>
  <text x="416" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ccc">증분의 기준점</text>
  <text x="416" y="410" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ccc">Full과 동일 크기</text>
  <text x="416" y="428" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">주 1회 권장</text>
  <text x="416" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">BACKUP INCREMENTAL LEVEL 0</text>

  <rect x="546" y="352" width="270" height="110" rx="6" fill="#12101a"/>
  <text x="681" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">Level 1 (Incremental)</text>
  <text x="681" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ccc">직전 Level 0/1 이후 변경 블록</text>
  <text x="681" y="410" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ccc">Differential(기본) / Cumulative</text>
  <text x="681" y="428" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">일별 권장</text>
  <text x="681" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">BACKUP INCREMENTAL LEVEL 1</text>
</svg>
