<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Redo vs Undo — 역할 비교</text>

  <!-- Redo column -->
  <rect x="60" y="70" width="360" height="50" rx="8" fill="#0a1020" stroke="#7ec8e3" stroke-width="2"/>
  <text x="240" y="91" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3">REDO</text>
  <text x="240" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">내구성(Durability) 보장</text>

  <!-- Undo column -->
  <rect x="460" y="70" width="360" height="50" rx="8" fill="#1a0f0f" stroke="#e05555" stroke-width="2"/>
  <text x="640" y="91" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e05555">UNDO</text>
  <text x="640" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">원자성(Atomicity) + 읽기 일관성</text>

  <!-- Redo items -->
  <rect x="75" y="140" width="330" height="36" rx="6" fill="#0d1828" stroke="#3a4a6e"/>
  <text x="240" y="163" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">변경 후 이미지(After Image) 기록</text>

  <rect x="75" y="186" width="330" height="36" rx="6" fill="#0d1828" stroke="#3a4a6e"/>
  <text x="240" y="209" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">크래시 후 Roll Forward 사용</text>

  <rect x="75" y="232" width="330" height="36" rx="6" fill="#0d1828" stroke="#3a4a6e"/>
  <text x="240" y="255" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Redo Log Buffer → Redo Log File</text>

  <rect x="75" y="278" width="330" height="36" rx="6" fill="#0d1828" stroke="#3a4a6e"/>
  <text x="240" y="301" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">COMMIT 시 LGWR 동기 기록 필수</text>

  <rect x="75" y="324" width="330" height="36" rx="6" fill="#0d1828" stroke="#3a4a6e"/>
  <text x="240" y="347" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">ARCHIVELOG 모드: 보관본 생성</text>

  <!-- Undo items -->
  <rect x="475" y="140" width="330" height="36" rx="6" fill="#1a1010" stroke="#3a4a6e"/>
  <text x="640" y="163" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">변경 전 이미지(Before Image) 기록</text>

  <rect x="475" y="186" width="330" height="36" rx="6" fill="#1a1010" stroke="#3a4a6e"/>
  <text x="640" y="209" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">ROLLBACK 시 원복에 사용</text>

  <rect x="475" y="232" width="330" height="36" rx="6" fill="#1a1010" stroke="#3a4a6e"/>
  <text x="640" y="255" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">일관된 읽기(CR 블록) 생성</text>

  <rect x="475" y="278" width="330" height="36" rx="6" fill="#1a1010" stroke="#3a4a6e"/>
  <text x="640" y="301" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">UNDO Tablespace에 저장</text>

  <rect x="475" y="324" width="330" height="36" rx="6" fill="#1a1010" stroke="#3a4a6e"/>
  <text x="640" y="347" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">UNDO_RETENTION 초과 시 재사용</text>

  <!-- DML event flow -->
  <rect x="60" y="390" width="760" height="90" rx="8" fill="#111" stroke="#555"/>
  <text x="440" y="413" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">DML 발생 시 처리 순서</text>

  <text x="130" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">① Undo 기록</text>
  <line x1="200" y1="440" x2="240" y2="440" stroke="#555" stroke-width="1.5"/>
  <polygon points="238,435 250,440 238,445" fill="#555"/>
  <text x="295" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">② Redo 기록</text>
  <line x1="345" y1="440" x2="385" y2="440" stroke="#555" stroke-width="1.5"/>
  <polygon points="383,435 395,440 383,445" fill="#555"/>
  <text x="450" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">③ 블록 변경</text>
  <line x1="500" y1="440" x2="540" y2="440" stroke="#555" stroke-width="1.5"/>
  <polygon points="538,435 550,440 538,445" fill="#555"/>
  <text x="610" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">④ COMMIT→LGWR</text>
  <line x1="680" y1="440" x2="720" y2="440" stroke="#555" stroke-width="1.5"/>
  <polygon points="718,435 730,440 718,445" fill="#555"/>
  <text x="770" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">⑤ DBWR 비동기</text>

  <text x="440" y="468" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Redo Log 기록(LGWR)이 완료되어야 COMMIT 응답 반환 — WAL 원칙</text>
</svg>
