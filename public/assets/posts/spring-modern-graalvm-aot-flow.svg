<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">
    GraalVM 네이티브 이미지 빌드 흐름
  </text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">
    Spring AOT 처리 → GraalVM 컴파일 → Native Binary
  </text>

  <!-- Stage 1: Source Code -->
  <rect x="40" y="96" width="160" height="70" fill="#1a1a2e" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="120" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">소스 코드</text>
  <text x="120" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">@SpringBootApp</text>
  <text x="120" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">@Configuration</text>

  <!-- Arrow 1 -->
  <line x1="200" y1="131" x2="250" y2="131" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Stage 2: Spring AOT -->
  <rect x="250" y="96" width="160" height="70" fill="#0f2020" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="330" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Spring AOT</text>
  <text x="330" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">빈 분석·코드 생성</text>
  <text x="330" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">힌트 등록</text>

  <!-- Arrow 2 -->
  <line x1="410" y1="131" x2="460" y2="131" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Stage 3: GraalVM Compile -->
  <rect x="460" y="96" width="160" height="70" fill="#1a1008" rx="8" stroke="#e8a020" stroke-width="1.5"/>
  <text x="540" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8a020" text-anchor="middle">GraalVM</text>
  <text x="540" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">native-image</text>
  <text x="540" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">AOT 컴파일</text>

  <!-- Arrow 3 -->
  <line x1="620" y1="131" x2="670" y2="131" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Stage 4: Native Binary -->
  <rect x="670" y="96" width="170" height="70" fill="#1a0a0a" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="755" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">Native Binary</text>
  <text x="755" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">JVM 없이 실행</text>
  <text x="755" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">~50ms 기동</text>

  <!-- Comparison: JVM vs Native -->
  <text x="440" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">JVM vs Native Image 비교</text>

  <!-- JVM column -->
  <rect x="60" y="230" width="340" height="220" fill="#111" rx="8" stroke="#444" stroke-width="1"/>
  <text x="230" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">JVM (전통 방식)</text>

  <text x="80" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">기동 시간</text>
  <text x="360" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="end">2~10초</text>

  <text x="80" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">메모리(idle)</text>
  <text x="360" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="end">200~500MB</text>

  <text x="80" y="337" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">최고 처리량</text>
  <text x="360" y="337" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="end">JIT 최적화로 높음</text>

  <text x="80" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">리플렉션</text>
  <text x="360" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="end">런타임에 자유롭게</text>

  <text x="80" y="391" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">빌드 시간</text>
  <text x="360" y="391" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="end">빠름 (&lt;1분)</text>

  <text x="80" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">적합 환경</text>
  <text x="360" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="end">장기 실행 서버</text>

  <!-- Native column -->
  <rect x="480" y="230" width="340" height="220" fill="#111" rx="8" stroke="#444" stroke-width="1"/>
  <text x="650" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">Native Image</text>

  <text x="500" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">기동 시간</text>
  <text x="800" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="end">~50ms</text>

  <text x="500" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">메모리(idle)</text>
  <text x="800" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="end">~50MB</text>

  <text x="500" y="337" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">최고 처리량</text>
  <text x="800" y="337" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="end">JIT 없어 낮을 수 있음</text>

  <text x="500" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">리플렉션</text>
  <text x="800" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="end">힌트 등록 필요</text>

  <text x="500" y="391" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">빌드 시간</text>
  <text x="800" y="391" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="end">5~15분 (메모리 집중)</text>

  <text x="500" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">적합 환경</text>
  <text x="800" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="end">서버리스, 컨테이너</text>
</svg>
