<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700">Cluster 기본 패턴</text>
  <text x="440" y="70" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">cluster.isPrimary 분기로 단일 파일에서 Primary / Worker 역할 분리</text>

  <!-- Code block -->
  <rect x="60" y="90" width="760" height="294" rx="6" fill="#070b14" stroke="#1e2433"/>

  <text x="76" y="118" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">import</text>
  <text x="120" y="118" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"> cluster </text>
  <text x="190" y="118" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">from</text>
  <text x="222" y="118" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"> 'cluster'</text>
  <text x="284" y="118" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">;</text>
  <text x="76" y="136" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">import</text>
  <text x="120" y="136" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"> { cpus } </text>
  <text x="202" y="136" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">from</text>
  <text x="234" y="136" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"> 'os'</text>
  <text x="270" y="136" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">;</text>
  <text x="76" y="154" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">import</text>
  <text x="120" y="154" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"> http </text>
  <text x="168" y="154" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">from</text>
  <text x="200" y="154" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"> 'http'</text>
  <text x="248" y="154" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">;</text>

  <text x="76" y="190" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">if</text>
  <text x="94" y="190" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"> (cluster.isPrimary) {</text>
  <text x="76" y="208" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  // CPU 수만큼 워커 생성</text>
  <text x="76" y="226" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  for</text>
  <text x="102" y="226" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"> (</text>
  <text x="118" y="226" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">let</text>
  <text x="138" y="226" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"> i = </text>
  <text x="168" y="226" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">0</text>
  <text x="178" y="226" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">; i &lt; cpus().length; i++)</text>
  <text x="76" y="244" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    cluster.fork();</text>

  <text x="76" y="262" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  cluster.on(</text>
  <text x="172" y="262" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">'exit'</text>
  <text x="214" y="262" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">, (worker, code) =&gt; {</text>
  <text x="76" y="280" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    console.log(`Worker ${worker.process.pid} 종료`);</text>
  <text x="76" y="298" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    if</text>
  <text x="102" y="298" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"> (!worker.exitedAfterDisconnect) cluster.fork();</text>
  <text x="76" y="316" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  });</text>
  <text x="76" y="334" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">} </text>
  <text x="90" y="334" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">else</text>
  <text x="116" y="334" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"> { http.createServer(handler).listen(</text>
  <text x="404" y="334" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">3000</text>
  <text x="428" y="334" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">); }</text>

  <!-- Bottom note -->
  <text x="440" y="405" text-anchor="middle" fill="#555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">exitedAfterDisconnect === false → 비정상 종료 → 자동 재시작</text>
</svg>
