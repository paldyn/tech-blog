<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Intl.NumberFormat — 숫자 국제화</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">통화 · 퍼센트 · 단위 · 컴팩트 포맷</text>

  <!-- style row -->
  <rect x="60" y="92" width="760" height="36" rx="6" fill="#1a1f2e"/>
  <text x="175" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">style</text>
  <text x="440" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">예시</text>
  <text x="720" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">출력</text>

  <!-- decimal -->
  <rect x="60" y="128" width="760" height="38" fill="#111827"/>
  <text x="175" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" text-anchor="middle"><tspan fill="#ffffff">decimal</tspan><tspan fill="#9aa4b8">{ style:'decimal', maximumFractionDigits:2 }</tspan><tspan fill="#55c555">1,234,567.89</tspan></text>

  <!-- currency -->
  <rect x="60" y="166" width="760" height="38" fill="#0d1117"/>
  <text x="175" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" text-anchor="middle">currency</text>
  <text x="440" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" text-anchor="middle">{ style:'currency', currency:'KRW' }</text>
  <text x="720" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">₩1,234,568</text>

  <!-- percent -->
  <rect x="60" y="204" width="760" height="38" fill="#111827"/>
  <text x="175" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" text-anchor="middle"><tspan fill="#ffffff">percent</tspan><tspan fill="#9aa4b8">{ style:'percent', minimumFractionDigits:1 }</tspan><tspan fill="#55c555">85.0%</tspan></text>

  <!-- unit -->
  <rect x="60" y="242" width="760" height="38" fill="#0d1117"/>
  <text x="175" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" text-anchor="middle"><tspan fill="#ffffff">unit</tspan><tspan fill="#9aa4b8">{ style:'unit', unit:'kilometer-per-hour' }</tspan><tspan fill="#55c555">120 km/h</tspan></text>

  <!-- compact -->
  <rect x="60" y="280" width="760" height="38" fill="#111827"/>
  <text x="175" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" text-anchor="middle"><tspan fill="#ffffff">compact</tspan><tspan fill="#9aa4b8">{ notation:'compact', compactDisplay:'short' }</tspan><tspan fill="#55c555">1.2만 / 1.2M</tspan></text>

  <!-- Code block -->
  <rect x="60" y="334" width="760" height="122" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">재사용 포맷터 패턴</text>
  <rect x="72" y="364" width="736" height="80" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="88" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">const</text><text x="142" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> krwFmt = </text><text x="220" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">new</text><text x="250" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> Intl.NumberFormat(</text><text x="388" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">'ko-KR'</text><text x="442" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">, { style: </text><text x="530" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">'currency'</text><text x="608" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">, currency: </text><text x="692" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">'KRW'</text><text x="740" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> });</text>
  <text x="88" y="402" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">krwFmt.format(</tspan><tspan fill="#b5cea8">15000</tspan><tspan fill="#ffffff">); </tspan><tspan fill="#9aa4b8">// '₩15,000'</tspan></text>
  <text x="88" y="420" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">krwFmt.formatRange(</tspan><tspan fill="#b5cea8">10000</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">20000</tspan><tspan fill="#ffffff">); </tspan><tspan fill="#9aa4b8">// '₩10,000~₩20,000'</tspan></text>
  <text x="88" y="438" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">krwFmt.formatToParts(</tspan><tspan fill="#b5cea8">15000</tspan><tspan fill="#ffffff">); </tspan><tspan fill="#9aa4b8">// [{ type:'currency', value:'₩' }, ...]</tspan></text>
</svg>
