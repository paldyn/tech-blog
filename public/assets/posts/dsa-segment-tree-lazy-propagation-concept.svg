<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arw" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Lazy Propagation — 지연 전파</text>

  <!-- Left: without lazy (O(n log n)) -->
  <text x="180" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">범위 업데이트 (Lazy 없음)</text>
  <text x="180" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">update(0,3, +5) → 4번 포인트 업데이트</text>
  <text x="180" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">= O(n log n)</text>

  <!-- With lazy: -->
  <text x="650" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Lazy Propagation</text>
  <text x="650" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">update(0,3, +5) → 관련 노드에 lazy 표시</text>
  <text x="650" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">= O(log n)</text>

  <!-- Tree before update (left side) -->
  <!-- Root [0,3]=10 -->
  <rect x="140" y="138" width="80" height="38" fill="#1a2a4a" rx="5" stroke="#3a5a7e" stroke-width="1.5"/>
  <text x="180" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">[0,3]</text>
  <text x="180" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">10</text>

  <rect x="88" y="210" width="72" height="38" fill="#1a2a4a" rx="4" stroke="#2a4a6e"/>
  <text x="124" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">[0,1]</text>
  <text x="124" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">6</text>

  <rect x="204" y="210" width="72" height="38" fill="#1a2a4a" rx="4" stroke="#2a4a6e"/>
  <text x="240" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">[2,3]</text>
  <text x="240" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">4</text>

  <line x1="167" y1="176" x2="145" y2="210" stroke="#555" stroke-width="1.5"/>
  <line x1="193" y1="176" x2="215" y2="210" stroke="#555" stroke-width="1.5"/>

  <!-- Arrow to right -->
  <path d="M 335 195 L 385 195" stroke="#ce9178" stroke-width="2" fill="none" marker-end="url(#arw)"/>
  <text x="360" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178" text-anchor="middle">+5 on</text>
  <text x="360" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178" text-anchor="middle">[0,3]</text>

  <!-- Tree after lazy (right) -->
  <!-- Root [0,3]=30 (10 + 4*5) with lazy=5 marked -->
  <rect x="560" y="138" width="80" height="38" fill="#1a2a1a" rx="5" stroke="#55c555" stroke-width="2"/>
  <text x="600" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">[0,3]</text>
  <text x="600" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">30</text>
  <!-- lazy badge -->
  <rect x="648" y="138" width="46" height="20" fill="#3a2a0a" rx="3" stroke="#ce9178" stroke-width="1"/>
  <text x="671" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#ce9178" text-anchor="middle">lazy=5</text>

  <!-- Children not updated yet — shown as stale -->
  <rect x="510" y="210" width="72" height="38" fill="#1a1a1a" rx="4" stroke="#555" stroke-width="1"/>
  <text x="546" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">[0,1]</text>
  <text x="546" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">6 (미갱신)</text>

  <rect x="620" y="210" width="72" height="38" fill="#1a1a1a" rx="4" stroke="#555" stroke-width="1"/>
  <text x="656" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">[2,3]</text>
  <text x="656" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">4 (미갱신)</text>

  <text x="546" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">쿼리 시점에 전파</text>
  <text x="656" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">쿼리 시점에 전파</text>

  <line x1="587" y1="176" x2="563" y2="210" stroke="#555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="613" y1="176" x2="635" y2="210" stroke="#555" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Code box -->
  <rect x="50" y="290" width="780" height="155" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="66" y="312" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">def</tspan><tspan fill="#ffffff"> _push_down(self, node, s, e):</tspan>
  </text>
  <text x="66" y="330" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    if</tspan><tspan fill="#ffffff"> self.lazy[node] == </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff">        </tspan><tspan fill="#9aa4b8"># lazy 없으면 패스</tspan>
  </text>
  <text x="66" y="348" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    mid = (s + e) // </tspan><tspan fill="#b5cea8">2</tspan>
  </text>
  <text x="66" y="366" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    lc, rc = </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">*node, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">*node+</tspan><tspan fill="#b5cea8">1</tspan>
  </text>
  <text x="66" y="384" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    self.tree[lc]  += self.lazy[node] * (mid-s+</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">)</tspan>
  </text>
  <text x="66" y="402" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    self.tree[rc]  += self.lazy[node] * (e-mid)</tspan>
  </text>
  <text x="66" y="420" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    self.lazy[lc]  += self.lazy[node]   </tspan><tspan fill="#9aa4b8"># lazy 전파</tspan>
  </text>
  <text x="66" y="438" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    self.lazy[rc]  += self.lazy[node]</tspan>
  </text>
</svg>
