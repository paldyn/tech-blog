<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">아호-코라식 탐색 과정</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">텍스트 "ushers" — 실패 링크 타고 여러 패턴 동시 발견</text>

  <!-- Text chars -->
  <text x="60" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">텍스트:</text>
  <rect x="120" y="90" width="52" height="40" fill="#111" stroke="#333" stroke-width="1" rx="3"/>
  <text x="146" y="115" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" fill="#e8e8e8">u</text>
  <rect x="176" y="90" width="52" height="40" fill="#1a2a1a" stroke="#55c555" stroke-width="2" rx="3"/>
  <text x="202" y="115" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" fill="#55c555">s</text>
  <rect x="232" y="90" width="52" height="40" fill="#1a2a1a" stroke="#55c555" stroke-width="2" rx="3"/>
  <text x="258" y="115" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" fill="#55c555">h</text>
  <rect x="288" y="90" width="52" height="40" fill="#1a2a1a" stroke="#55c555" stroke-width="2" rx="3"/>
  <text x="314" y="115" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" fill="#55c555">e</text>
  <rect x="344" y="90" width="52" height="40" fill="#1a2a1a" stroke="#55c555" stroke-width="2" rx="3"/>
  <text x="370" y="115" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" fill="#55c555">r</text>
  <rect x="400" y="90" width="52" height="40" fill="#1a2a1a" stroke="#55c555" stroke-width="2" rx="3"/>
  <text x="426" y="115" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" fill="#55c555">s</text>

  <!-- Match annotations -->
  <text x="202" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">s</text>
  <text x="258" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">sh</text>
  <text x="314" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">she ✓</text>
  <text x="370" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">sher</text>
  <text x="426" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">hers ✓</text>

  <!-- Match result boxes -->
  <rect x="60" y="168" width="760" height="52" fill="#111" stroke="#2a3a2a" stroke-width="1" rx="6"/>
  <text x="440" y="188" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">발견된 패턴</text>
  <text x="200" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">"she" @ 위치 1</text>
  <text x="440" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">"he" @ 위치 2</text>
  <text x="680" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">"hers" @ 위치 2</text>

  <!-- Code -->
  <rect x="60" y="236" width="760" height="140" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="76" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">def</text>
  <text x="104" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"> search(text, root):</text>
  <text x="76" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">    cur = root</text>
  <text x="76" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">    for</text>
  <text x="107" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"> i, c in enumerate(text):</text>
  <text x="76" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">        while</text>
  <text x="130" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"> cur and c not in cur.goto:</text>
  <text x="76" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">            cur = cur.fail</text>
  <text x="76" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">        cur = cur.goto.get(c, root)</text>
  <text x="76" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">        temp = cur</text>
  <text x="76" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">        while</text>
  <text x="130" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"> temp: yield i, temp.output; temp=temp.dict_link</text>
</svg>
