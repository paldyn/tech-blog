<svg xmlns="http://www.w3.org/2000/svg" width="880" height="260" viewBox="0 0 880 260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="260" rx="12" fill="#0a0a0a"/>
  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">incremental과 composite 설정</text>

  <rect x="60" y="78" width="760" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan x="80" y="104" fill="#ffffff">{ </tspan><tspan fill="#ce9178">"compilerOptions"</tspan><tspan fill="#ffffff">: {</tspan>
    <tspan x="80" y="124" fill="#ce9178">    "incremental"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#7ec8e3" font-weight="600">true</tspan><tspan fill="#ffffff">,</tspan>
    <tspan x="80" y="144" fill="#ce9178">    "tsBuildInfoFile"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"./.cache/tsbuildinfo"</tspan><tspan fill="#ffffff">,</tspan>
    <tspan x="80" y="164" fill="#ce9178">    "composite"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#7ec8e3" font-weight="600">true</tspan><tspan fill="#ffffff">,    </tspan><tspan fill="#9aa4b8">// 프로젝트 참조용</tspan>
    <tspan x="80" y="184" fill="#ce9178">    "declaration"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#7ec8e3" font-weight="600">true</tspan><tspan fill="#ffffff">     </tspan><tspan fill="#9aa4b8">// composite가 요구</tspan>
    <tspan x="80" y="204" fill="#ffffff">} }</tspan>
  </text>
</svg>
