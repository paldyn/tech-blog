<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">단조 스택 — Next Greater Element</text>
  <text x="440" y="66" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">배열 [2, 1, 5, 3, 6, 4] — 각 원소의 오른쪽 첫 번째 큰 값</text>

  <!-- array -->
  <text x="60" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">입력:</text>

  <!-- cells -->
  <rect x="60"  y="104" width="62" height="52" rx="6" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="91"  y="126" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="600" fill="#e8e8e8">2</text>
  <text x="91"  y="146" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888">[0]</text>

  <rect x="130" y="104" width="62" height="52" rx="6" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="161" y="126" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="600" fill="#e8e8e8">1</text>
  <text x="161" y="146" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888">[1]</text>

  <rect x="200" y="104" width="62" height="52" rx="6" fill="#0d1f0d" stroke="#1a5a1a" stroke-width="2"/>
  <text x="231" y="126" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="600" fill="#55c555">5</text>
  <text x="231" y="146" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888">[2]</text>

  <rect x="270" y="104" width="62" height="52" rx="6" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="301" y="126" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="600" fill="#e8e8e8">3</text>
  <text x="301" y="146" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888">[3]</text>

  <rect x="340" y="104" width="62" height="52" rx="6" fill="#0d1f0d" stroke="#1a5a1a" stroke-width="2"/>
  <text x="371" y="126" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="600" fill="#55c555">6</text>
  <text x="371" y="146" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888">[4]</text>

  <rect x="410" y="104" width="62" height="52" rx="6" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="441" y="126" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="600" fill="#e8e8e8">4</text>
  <text x="441" y="146" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#888">[5]</text>

  <!-- result arrows -->
  <path d="M 91 156 Q 161 180 161 180" fill="none" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4"/>
  <!-- 2 → 5 -->
  <path d="M 91 160 Q 160 198, 231 174" fill="none" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <!-- 1 → 5 -->
  <path d="M 161 160 Q 196 194, 231 178" fill="none" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <!-- 3 → 6 -->
  <path d="M 301 160 Q 336 194, 371 178" fill="none" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <!-- 5 → 6 -->
  <path d="M 231 160 Q 301 200, 371 178" fill="none" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <!-- result -->
  <text x="560" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">결과 (NGE):</text>
  <rect x="560" y="104" width="260" height="52" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="576" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600" xml:space="preserve">[5, 5, 6, 6, -1, -1]</text>
  <text x="576" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">-1: 오른쪽에 더 큰 값 없음</text>

  <!-- ─── Step table ─── -->
  <text x="60" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">단조 감소 스택 처리 과정</text>

  <rect x="60" y="196" width="760" height="198" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <!-- headers -->
  <text x="76"  y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">i</text>
  <text x="110" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">val</text>
  <text x="170" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">동작 (스택 = [바닥..top])</text>
  <text x="600" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">확정된 NGE</text>
  <line x1="76" y1="224" x2="804" y2="224" stroke="#2a3a5e" stroke-width="1"/>

  <text x="76"  y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">0</text>
  <text x="110" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">2</text>
  <text x="170" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">push → [2]</text>
  <text x="600" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">-</text>

  <text x="76"  y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">1</text>
  <text x="110" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">1</text>
  <text x="170" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">1&lt;top(2) → push → [2,1]</text>
  <text x="600" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">-</text>

  <text x="76"  y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">2</text>
  <text x="110" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">5</text>
  <text x="170" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">5&gt;top(1) pop, 5&gt;top(2) pop, push 5</text>
  <text x="600" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">nge[1]=5, nge[0]=5</text>

  <text x="76"  y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">3</text>
  <text x="110" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">3</text>
  <text x="170" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">3&lt;top(5) → push → [5,3]</text>
  <text x="600" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">-</text>

  <text x="76"  y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">4</text>
  <text x="110" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">6</text>
  <text x="170" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">6&gt;3 pop, 6&gt;5 pop, push 6</text>
  <text x="600" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">nge[3]=6, nge[2]=6</text>

  <text x="76"  y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">5</text>
  <text x="110" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">4</text>
  <text x="170" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">4&lt;top(6) → push → [6,4]</text>
  <text x="600" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">-</text>

  <text x="76"  y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8">루프 종료 후 잔여 [6,4] → nge[4]=nge[5]=-1</text>

  <!-- complexity box -->
  <rect x="60" y="406" width="760" height="68" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="428" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">각 원소는 스택에 최대 1번 push, 1번 pop → 전체 O(n)</text>
  <text x="76" y="448" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">불변식</tspan>: 스택 안 원소는 항상 단조 감소 (top이 가장 작음)</text>
  <text x="76" y="466" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">단조 증가 스택이면 Next Smaller Element (NSE) 문제 해결</text>
</svg>
