<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">임베딩: 의미를 벡터 공간에 배치</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">유사한 의미의 단어는 벡터 공간에서 가까이 위치한다</text>

  <!-- Left panel: 2D embedding space visualization -->
  <rect x="60" y="90" width="400" height="380" rx="10" fill="#111" stroke="#222"/>
  <text x="260" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">2D 임베딩 공간 (t-SNE 투영)</text>

  <!-- Axes -->
  <line x1="100" y1="390" x2="430" y2="390" stroke="#333" stroke-width="1.5"/>
  <line x1="100" y1="390" x2="100" y2="120" stroke="#333" stroke-width="1.5"/>
  <text x="436" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">dim1</text>
  <text x="82" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">dim2</text>

  <!-- Animal cluster -->
  <circle cx="170" cy="180" r="3.5" fill="#55c555"/>
  <text x="180" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">개</text>
  <circle cx="200" cy="165" r="3.5" fill="#55c555"/>
  <text x="210" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">고양이</text>
  <circle cx="155" cy="200" r="3.5" fill="#55c555"/>
  <text x="165" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">강아지</text>
  <circle cx="185" cy="215" r="3.5" fill="#55c555"/>
  <text x="195" y="213" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">새</text>

  <!-- Cluster circle (animal) -->
  <ellipse cx="178" cy="190" rx="50" ry="40" fill="none" stroke="#55c555" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="135" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">동물 클러스터</text>

  <!-- Food cluster -->
  <circle cx="340" cy="175" r="3.5" fill="#7ec8e3"/>
  <text x="350" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">피자</text>
  <circle cx="360" cy="200" r="3.5" fill="#7ec8e3"/>
  <text x="370" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">햄버거</text>
  <circle cx="320" cy="200" r="3.5" fill="#7ec8e3"/>
  <text x="330" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">라면</text>
  <circle cx="345" cy="220" r="3.5" fill="#7ec8e3"/>
  <text x="355" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">김치</text>

  <ellipse cx="344" cy="203" rx="45" ry="38" fill="none" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="310" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">음식 클러스터</text>

  <!-- Tech cluster -->
  <circle cx="200" cy="330" r="3.5" fill="#7777cc"/>
  <text x="210" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">AI</text>
  <circle cx="240" cy="320" r="3.5" fill="#7777cc"/>
  <text x="250" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">GPU</text>
  <circle cx="230" cy="350" r="3.5" fill="#7777cc"/>
  <text x="240" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">LLM</text>
  <circle cx="190" cy="355" r="3.5" fill="#7777cc"/>
  <text x="200" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">모델</text>

  <ellipse cx="216" cy="340" rx="44" ry="30" fill="none" stroke="#7777cc" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="175" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">기술 클러스터</text>

  <!-- Right panel: analogy &amp; embedding table -->
  <rect x="480" y="90" width="360" height="380" rx="10" fill="#111" stroke="#222"/>
  <text x="660" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">벡터 산술 (Word2Vec 유추)</text>

  <!-- Analogy -->
  <rect x="500" y="124" width="320" height="80" rx="6" fill="#0a0a1a" stroke="#1e1e40"/>
  <text x="660" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">king - man + woman ≈ queen</text>
  <text x="660" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">서울 - 한국 + 일본 ≈ 도쿄</text>
  <text x="660" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">의미 관계가 벡터 방향으로 인코딩됨</text>

  <!-- Embedding lookup table -->
  <text x="500" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">임베딩 행렬 (look-up table)</text>

  <rect x="500" y="238" width="320" height="30" rx="4" fill="#0f0f14" stroke="#1a1a20"/>
  <text x="520" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">ID → [d_model 차원 벡터]</text>

  <rect x="500" y="272" width="320" height="30" rx="4" fill="#1e2d44" stroke="#3e5a88"/>
  <text x="520" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">9906 → [0.23, -0.41, 0.87, ...]</text>

  <rect x="500" y="306" width="320" height="30" rx="4" fill="#1e2d44" stroke="#3e5a88"/>
  <text x="520" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">21552 → [0.15, 0.73, -0.22, ...]</text>

  <rect x="500" y="340" width="320" height="30" rx="4" fill="#1e2d44" stroke="#3e5a88"/>
  <text x="520" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">... (vocab_size × d_model)</text>

  <!-- Dimensions info -->
  <rect x="500" y="388" width="320" height="64" rx="6" fill="#0a1a0a" stroke="#1a3a1a"/>
  <text x="660" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">모델별 임베딩 차원</text>
  <text x="660" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">GPT-2: 768 | GPT-3: 12288</text>
  <text x="660" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">LLaMA 3 8B: 4096 | 70B: 8192</text>
</svg>
