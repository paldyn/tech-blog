<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr-sc" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">startTransition과 isPending 활용</text>

  <!-- Code: startTransition usage -->
  <rect x="60" y="70" width="480" height="280" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="92" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 탭 전환 예시</text>
  <text x="76" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> TabContainer() {</tspan>
  </text>
  <text x="76" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">  </tspan>
    <tspan fill="#7ec8e3" font-weight="600">const</tspan>
    <tspan fill="#ffffff"> [tab, setTab] = useState(</tspan>
    <tspan fill="#ce9178">'home'</tspan>
    <tspan fill="#ffffff">);</tspan>
  </text>
  <text x="76" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">  </tspan>
    <tspan fill="#7ec8e3" font-weight="600">const</tspan>
    <tspan fill="#ffffff"> [isPending, startTransition] = useTransition();</tspan>
  </text>
  <text x="76" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  function</tspan>
    <tspan fill="#ffffff"> handleTabChange(next: string) {</tspan>
  </text>
  <text x="76" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">    startTransition(() =&gt; {</tspan>
  </text>
  <text x="76" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">      setTab(next);</tspan>
  </text>
  <text x="76" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    });</text>
  <text x="76" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  }</text>
  <text x="76" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  return</tspan>
    <tspan fill="#ffffff"> (</tspan>
  </text>
  <text x="76" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">    &lt;</tspan>
    <tspan fill="#55c555">div</tspan>
    <tspan fill="#ffffff"> style={{ opacity: isPending ? </tspan>
    <tspan fill="#b5cea8">0.7</tspan>
    <tspan fill="#ffffff"> : </tspan>
    <tspan fill="#b5cea8">1</tspan>
    <tspan fill="#ffffff"> }}&gt;</tspan>
  </text>
  <text x="76" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">      &lt;</tspan>
    <tspan fill="#55c555">TabButton</tspan>
    <tspan fill="#ffffff"> onClick={() =&gt; handleTabChange(</tspan>
    <tspan fill="#ce9178">'home'</tspan>
    <tspan fill="#ffffff">)}/&gt;</tspan>
  </text>
  <text x="76" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">      {tab === </tspan>
    <tspan fill="#ce9178">'home'</tspan>
    <tspan fill="#ffffff"> &amp;&amp; &lt;</tspan>
    <tspan fill="#55c555">HomePage</tspan>
    <tspan fill="#ffffff">/&gt;}</tspan>
  </text>
  <text x="76" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  );</text>
  <text x="76" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">}</text>

  <!-- Right: explanation boxes -->
  <rect x="560" y="70" width="280" height="80" rx="6" fill="#1a2030" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="580" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">startTransition 효과</text>
  <text x="580" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">setTab이 "전환" 업데이트로 표시됨</text>
  <text x="580" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">→ 다른 긴급 업데이트보다 낮은 우선순위</text>

  <rect x="560" y="164" width="280" height="80" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="580" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">isPending 활용</text>
  <text x="580" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">전환 진행 중 = true</text>
  <text x="580" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">opacity 낮춰 "준비 중" 시각적 표현</text>

  <rect x="560" y="258" width="280" height="80" rx="6" fill="#2a1a1e" stroke="#e05555" stroke-width="1.5"/>
  <text x="580" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">주의사항</text>
  <text x="580" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">transition 안의 setState는</text>
  <text x="580" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">입력값(controlled input) 업데이트 금지</text>

  <!-- Timeline visualization -->
  <rect x="60" y="380" width="760" height="40" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="80" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">타이핑 </text>
  <rect x="148" y="386" width="60" height="20" rx="3" fill="#e05555" opacity="0.9"/>
  <text x="178" y="399" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#ffffff">긴급</text>
  <text x="218" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888"> vs 탭 전환 </text>
  <rect x="318" y="386" width="80" height="20" rx="3" fill="#7ec8e3" opacity="0.7"/>
  <text x="358" y="399" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#000000">전환(후순위)</text>
  <text x="410" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888"> → 동시성 스케줄러가 긴급 작업 먼저 처리</text>
</svg>
