<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">journal 로그 항목 구조</text>

  <!-- Log entry example -->
  <rect x="60" y="64" width="760" height="56" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="88" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">May 18 09:15:32</text>
  <text x="258" y="88" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555"> myhost</text>
  <text x="344" y="88" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600"> sshd[1234]:</text>
  <text x="480" y="88" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> Accepted publickey for root</text>
  <text x="80" y="108" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">    ↑ 타임스탬프           ↑ 호스트명     ↑ 유닛/PID          ↑ 메시지</text>

  <!-- Fields grid -->
  <text x="60" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">주요 journal 필드</text>

  <!-- Field boxes - row 1 -->
  <rect x="60" y="166" width="196" height="72" rx="6" fill="#0d0d1a" stroke="#7777cc" stroke-width="1"/>
  <text x="80" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7777cc">_SYSTEMD_UNIT</text>
  <text x="80" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">서비스 유닛 이름</text>
  <text x="80" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8">nginx.service</text>

  <rect x="270" y="166" width="196" height="72" rx="6" fill="#0d0d1a" stroke="#7777cc" stroke-width="1"/>
  <text x="290" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7777cc">PRIORITY</text>
  <text x="290" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">syslog 우선순위 (0~7)</text>
  <text x="290" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8">0=emerg  3=err  6=info</text>

  <rect x="480" y="166" width="196" height="72" rx="6" fill="#0d0d1a" stroke="#7777cc" stroke-width="1"/>
  <text x="500" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7777cc">_PID / _UID</text>
  <text x="500" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">프로세스 / 사용자 ID</text>
  <text x="500" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8">_PID=1234  _UID=0</text>

  <rect x="690" y="166" width="130" height="72" rx="6" fill="#0d0d1a" stroke="#7777cc" stroke-width="1"/>
  <text x="710" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7777cc">_HOSTNAME</text>
  <text x="710" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">호스트명</text>
  <text x="710" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8">myhost</text>

  <!-- Field-based filtering -->
  <text x="60" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">필드 기반 필터링</text>

  <rect x="60" y="288" width="760" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># PID로 필터</text>
  <text x="80" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">journalctl <tspan fill="#ffffff">_PID=</tspan><tspan fill="#b5cea8">1234</tspan></text>
  <text x="80" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># 커널 메시지만</text>
  <text x="80" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">journalctl <tspan fill="#ffffff">-k</tspan>            <tspan fill="#888"># --dmesg 와 동일</tspan></text>
  <text x="80" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">journalctl <tspan fill="#ffffff">_TRANSPORT=kernel</tspan></text>
</svg>
