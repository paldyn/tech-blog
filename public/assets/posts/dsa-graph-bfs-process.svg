<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr-bfs" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-bfs2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">BFS — 층위별 탐색 과정</text>

  <!-- Graph nodes layout -->
  <!-- Start: node 0 -->
  <circle cx="160" cy="140" r="26" fill="#1a3a1a" stroke="#55c555" stroke-width="3"/>
  <text x="160" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">0</text>
  <text x="160" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">dist=0</text>

  <!-- Level 1: nodes 1, 2 -->
  <circle cx="80" cy="270" r="26" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2.5"/>
  <text x="80" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">1</text>
  <text x="80" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">dist=1</text>

  <circle cx="240" cy="270" r="26" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2.5"/>
  <text x="240" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">2</text>
  <text x="240" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">dist=1</text>

  <!-- Level 2: nodes 3, 4, 5 -->
  <circle cx="80" cy="400" r="26" fill="#2e2a1a" stroke="#e8c060" stroke-width="2"/>
  <text x="80" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e8c060" text-anchor="middle">3</text>
  <text x="80" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8c060" text-anchor="middle">dist=2</text>

  <circle cx="200" cy="400" r="26" fill="#2e2a1a" stroke="#e8c060" stroke-width="2"/>
  <text x="200" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e8c060" text-anchor="middle">4</text>
  <text x="200" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8c060" text-anchor="middle">dist=2</text>

  <circle cx="320" cy="400" r="26" fill="#2e2a1a" stroke="#e8c060" stroke-width="2"/>
  <text x="320" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e8c060" text-anchor="middle">5</text>
  <text x="320" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8c060" text-anchor="middle">dist=2</text>

  <!-- Edges -->
  <line x1="138" y1="158" x2="100" y2="250" stroke="#888" stroke-width="1.5"/>
  <line x1="182" y1="158" x2="222" y2="250" stroke="#888" stroke-width="1.5"/>
  <line x1="66" y1="293" x2="80" y2="374" stroke="#888" stroke-width="1.5"/>
  <line x1="94" y1="293" x2="186" y2="378" stroke="#888" stroke-width="1.5"/>
  <line x1="226" y1="293" x2="308" y2="378" stroke="#888" stroke-width="1.5"/>

  <!-- BFS layer labels -->
  <text x="360" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" font-weight="600">Layer 0: {0}</text>
  <text x="360" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" font-weight="600">Layer 1: {1, 2}</text>
  <text x="360" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8c060" font-weight="600">Layer 2: {3, 4, 5}</text>

  <!-- Queue visualization steps -->
  <text x="460" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">큐(Queue) 상태 변화</text>

  <!-- Step 1 -->
  <text x="460" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">초기</text>
  <rect x="520" y="92" width="44" height="28" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="542" y="111" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">0</text>
  <text x="572" y="111" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">→ 방문: {0}  dist[0]=0</text>

  <!-- Step 2 -->
  <text x="460" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">dequeue 0</text>
  <text x="540" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">→ 이웃 1,2 enqueue</text>
  <rect x="520" y="154" width="44" height="28" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="542" y="173" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">1</text>
  <rect x="570" y="154" width="44" height="28" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="592" y="173" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">2</text>

  <!-- Step 3 -->
  <text x="460" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">dequeue 1</text>
  <text x="540" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">→ 이웃 3,4 enqueue</text>
  <rect x="520" y="216" width="44" height="28" rx="4" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="542" y="235" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">2</text>
  <rect x="570" y="216" width="44" height="28" rx="4" fill="#2e2a1a" stroke="#e8c060" stroke-width="1.5"/>
  <text x="592" y="235" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8c060" text-anchor="middle">3</text>
  <rect x="620" y="216" width="44" height="28" rx="4" fill="#2e2a1a" stroke="#e8c060" stroke-width="1.5"/>
  <text x="642" y="235" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8c060" text-anchor="middle">4</text>

  <!-- Step 4 -->
  <text x="460" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">dequeue 2</text>
  <text x="540" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">→ 이웃 5 enqueue</text>
  <rect x="520" y="278" width="44" height="28" rx="4" fill="#2e2a1a" stroke="#e8c060" stroke-width="1.5"/>
  <text x="542" y="297" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8c060" text-anchor="middle">3</text>
  <rect x="570" y="278" width="44" height="28" rx="4" fill="#2e2a1a" stroke="#e8c060" stroke-width="1.5"/>
  <text x="592" y="297" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8c060" text-anchor="middle">4</text>
  <rect x="620" y="278" width="44" height="28" rx="4" fill="#2e2a1a" stroke="#e8c060" stroke-width="1.5"/>
  <text x="642" y="297" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8c060" text-anchor="middle">5</text>

  <!-- Key property -->
  <rect x="460" y="340" width="360" height="100" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">BFS 핵심 성질</text>
  <text x="476" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ 비가중 그래프 최단 경로 보장</text>
  <text x="476" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ 같은 레이어 = 같은 거리</text>
  <text x="476" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">✗ 가중 그래프 최단 경로 → 다익스트라</text>

  <text x="460" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">시간: O(V+E)  |  공간: O(V) (큐, 방문 배열)</text>
</svg>
