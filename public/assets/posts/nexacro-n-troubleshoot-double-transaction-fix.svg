<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="40" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">이중 트랜잭션 방지 패턴</text>

  <!-- Bad pattern -->
  <rect x="60" y="62" width="360" height="260" rx="6" fill="#000000" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="84" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#e05555">방지 없는 패턴</text>
  <text x="76" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">function</text><text x="136" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve"> fn_save() {</text>
  <text x="76" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8" xml:space="preserve">  // 클릭 시마다 실행 가능</text>
  <text x="76" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve">  this.transaction(</text>
  <text x="76" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ce9178" xml:space="preserve">    "save", url,</text>
  <text x="76" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ce9178" xml:space="preserve">    "dsIn=dsInput", "","cb"</text>
  <text x="76" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve">  );</text>
  <text x="76" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve">}</text>
  <text x="76" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#e05555" xml:space="preserve">// ← 더블클릭 시 2번 실행!</text>

  <!-- Good pattern -->
  <rect x="460" y="62" width="360" height="260" rx="6" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="84" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#55c555">락 플래그 패턴</text>
  <text x="476" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">var</text><text x="504" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve"> g_isProcessing = </text><text x="644" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">false</text><text x="690" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve">;</text>
  <text x="476" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">function</text><text x="536" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve"> fn_save() {</text>
  <text x="476" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  if</text><text x="504" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve"> (g_isProcessing) </text><text x="636" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">return</text><text x="690" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve">;</text>
  <text x="476" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve">  g_isProcessing = </text><text x="646" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">true</text><text x="674" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve">;</text>
  <text x="476" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve">  this.transaction(</text>
  <text x="476" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ce9178" xml:space="preserve">    "save", url, "dsIn=dsInput"</text>
  <text x="476" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ce9178" xml:space="preserve">    ,"","fn_saveCallback"</text>
  <text x="476" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve">  );</text>
  <text x="476" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve">}</text>
  <text x="476" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8" xml:space="preserve">// 콜백에서 해제</text>
  <text x="476" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve">g_isProcessing = </text><text x="636" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">false</text><text x="664" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff" xml:space="preserve">;</text>
</svg>
