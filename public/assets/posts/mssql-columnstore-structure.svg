<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">행 저장 vs 컬럼 저장 — 구조 비교</text>

  <!-- Row Store (left) -->
  <rect x="60" y="68" width="340" height="44" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="230" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">행 저장 (Rowstore)</text>

  <!-- Row store data visualization -->
  <!-- Row 1 -->
  <rect x="60" y="130" width="340" height="30" rx="0" fill="#0d0d18" stroke="#2a2a3e" stroke-width="1"/>
  <rect x="60" y="130" width="85" height="30" fill="#111133"/>
  <text x="102" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">1</text>
  <text x="215" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Kim</text>
  <text x="340" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">50000</text>
  <!-- Row 2 -->
  <rect x="60" y="160" width="340" height="30" rx="0" fill="#111120" stroke="#2a2a3e" stroke-width="1"/>
  <rect x="60" y="160" width="85" height="30" fill="#111133"/>
  <text x="102" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">2</text>
  <text x="215" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Lee</text>
  <text x="340" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">30000</text>
  <!-- Row 3 -->
  <rect x="60" y="190" width="340" height="30" rx="0" fill="#0d0d18" stroke="#2a2a3e" stroke-width="1"/>
  <rect x="60" y="190" width="85" height="30" fill="#111133"/>
  <text x="102" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">3</text>
  <text x="215" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Park</text>
  <text x="340" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">70000</text>
  <!-- Column headers -->
  <rect x="60" y="112" width="340" height="18" rx="0" fill="#1a1a2e"/>
  <text x="102" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7777cc" text-anchor="middle">id</text>
  <text x="215" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7777cc" text-anchor="middle">name</text>
  <text x="340" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7777cc" text-anchor="middle">salary</text>
  <line x1="145" y1="112" x2="145" y2="220" stroke="#2a2a3e" stroke-width="1"/>
  <line x1="285" y1="112" x2="285" y2="220" stroke="#2a2a3e" stroke-width="1"/>

  <text x="230" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">SUM(salary): 전체 열 읽음 (비효율)</text>
  <text x="230" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">OLTP 단건 조회/수정에 최적</text>

  <!-- Column Store (right) -->
  <rect x="480" y="68" width="340" height="44" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="2"/>
  <text x="650" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">컬럼 저장 (Columnstore)</text>

  <!-- Column store segments -->
  <rect x="480" y="112" width="100" height="108" rx="4" fill="#1a2a1a" stroke="#2a4a2a" stroke-width="1.5"/>
  <text x="530" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#55c555" text-anchor="middle">id</text>
  <text x="530" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">1</text>
  <text x="530" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">2</text>
  <text x="530" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">3</text>
  <text x="530" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">압축저장</text>

  <rect x="590" y="112" width="100" height="108" rx="4" fill="#1a2a1a" stroke="#2a4a2a" stroke-width="1.5"/>
  <text x="640" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#55c555" text-anchor="middle">name</text>
  <text x="640" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">Kim</text>
  <text x="640" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">Lee</text>
  <text x="640" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">Park</text>
  <text x="640" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">딕셔너리 압축</text>

  <rect x="700" y="112" width="120" height="108" rx="4" fill="#0f2a1a" stroke="#2a4a2a" stroke-width="2"/>
  <text x="760" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#55c555" text-anchor="middle">salary</text>
  <text x="760" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">50000</text>
  <text x="760" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">30000</text>
  <text x="760" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">70000</text>
  <text x="760" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">RLE 압축</text>

  <text x="650" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">SUM(salary): salary 세그먼트만 읽음</text>
  <text x="650" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">OLAP 집계/분석에 최적</text>

  <!-- Row group and segment info -->
  <rect x="60" y="296" width="760" height="80" rx="8" fill="#111120" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">컬럼스토어 내부 구성</text>
  <text x="220" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">행 그룹(Row Group): 약 100만 행 단위</text>
  <text x="220" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">세그먼트(Segment): 열별 압축 단위</text>
  <text x="660" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">압축률: 행 저장 대비 5~10배</text>
  <text x="660" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">배치 모드 실행: SIMD 병렬 처리</text>
  <line x1="430" y1="308" x2="430" y2="372" stroke="#2a2a3e" stroke-width="1"/>

  <!-- Bottom code -->
  <rect x="60" y="392" width="760" height="60" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="416" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">CREATE COLUMNSTORE INDEX</text>
  <text x="76" y="416" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> csi_sales ON dbo.sales;</text>
  <text x="76" y="436" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- 또는 테이블 생성 시: </text>
  <text x="76" y="436" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">INDEX</text>
  <text x="76" y="436" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> csi CLUSTERED COLUMNSTORE</text>
</svg>
