<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-ok" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">
    Docker 이미지 시크릿 유출 경로
  </text>

  <!-- Path 1: ENV -->
  <rect x="60" y="64" width="360" height="80" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="80" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">경로 1: ENV 하드코딩</text>
  <text x="80" y="104" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">ENV DB_PASSWORD=s3cr3t</text>
  <text x="80" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">docker inspect로 바로 노출됨</text>

  <!-- Path 2: COPY .env -->
  <rect x="460" y="64" width="360" height="80" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="480" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">경로 2: .env 파일 COPY</text>
  <text x="480" y="104" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">COPY .env /app/.env</text>
  <text x="480" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">docker history, 레이어 추출로 노출</text>

  <!-- Path 3: RUN with token -->
  <rect x="60" y="164" width="360" height="80" rx="8" fill="#1a0a0a" stroke="#e8a020" stroke-width="1"/>
  <text x="80" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8a020">경로 3: RUN에 직접 토큰</text>
  <text x="80" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8a020">RUN curl -H "Token: abc123" ...</text>
  <text x="80" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">docker history --no-trunc으로 노출</text>

  <!-- Path 4: ARG -->
  <rect x="460" y="164" width="360" height="80" rx="8" fill="#1a0a0a" stroke="#e8a020" stroke-width="1"/>
  <text x="480" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8a020">경로 4: ARG 비밀값</text>
  <text x="480" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8a020">ARG API_KEY=sk-...</text>
  <text x="480" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">docker history에 --build-arg 값 노출</text>

  <!-- Solutions -->
  <text x="60" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">안전한 대안</text>

  <rect x="60" y="292" width="360" height="80" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="80" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">RUN --mount=type=secret</text>
  <text x="80" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">RUN --mount=type=secret,id=token \</text>
  <text x="80" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">    cat /run/secrets/token | pip ...</text>

  <rect x="460" y="292" width="360" height="80" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="480" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">런타임 환경변수 주입</text>
  <text x="480" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">빌드 시 포함 안 하고 실행 시 주입</text>
  <text x="480" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">docker run -e DB_PASSWORD=... app</text>

  <!-- Scan tools -->
  <rect x="60" y="390" width="760" height="88" rx="6" fill="#0a0a1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">시크릿 스캔 도구</text>
  <rect x="80" y="422" width="160" height="36" rx="4" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="160" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">truffleHog</text>
  <rect x="260" y="422" width="160" height="36" rx="4" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="340" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">gitleaks</text>
  <rect x="440" y="422" width="160" height="36" rx="4" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="520" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">detect-secrets</text>
  <rect x="620" y="422" width="180" height="36" rx="4" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="710" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">docker scout cves</text>
  <text x="80" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">CI 파이프라인에서 이미지 빌드 전후 자동 스캔 권장</text>
</svg>
