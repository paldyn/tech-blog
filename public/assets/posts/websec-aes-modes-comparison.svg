<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520" style="background:#0a0a0a;border-radius:12px">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">AES 운용 모드 비교: ECB vs CBC vs GCM</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">모드 선택이 암호화 보안 수준을 결정한다</text>

  <!-- Header -->
  <rect x="60" y="90" width="760" height="36" rx="6" fill="#1a2a3a" stroke="#3a6ea8" stroke-width="1"/>
  <text x="160" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">모드</text>
  <text x="310" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">특징</text>
  <text x="530" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">보안 등급</text>
  <text x="720" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">사용 권장</text>
  <line x1="230" y1="90" x2="230" y2="420" stroke="#2a3a4a" stroke-width="1"/>
  <line x1="440" y1="90" x2="440" y2="420" stroke="#2a3a4a" stroke-width="1"/>
  <line x1="640" y1="90" x2="640" y2="420" stroke="#2a3a4a" stroke-width="1"/>

  <!-- ECB Row -->
  <rect x="60" y="126" width="760" height="90" rx="0" fill="#1a0d0d"/>
  <text x="160" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">ECB</text>
  <text x="160" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Electronic</text>
  <text x="160" y="187" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Codebook</text>
  <text x="335" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">각 블록을 독립적으로 암호화</text>
  <text x="335" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">같은 블록 = 같은 암호문</text>
  <text x="335" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">IV 없음, 병렬 처리 가능</text>
  <text x="335" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">패턴 노출 (ECB 펭귄 문제)</text>
  <rect x="480" y="143" width="120" height="30" rx="4" fill="#5a1a1a"/>
  <text x="540" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">절대 금지</text>
  <rect x="658" y="143" width="140" height="30" rx="4" fill="#5a1a1a"/>
  <text x="728" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e05555" text-anchor="middle">사용하지 말 것</text>

  <!-- CBC Row -->
  <rect x="60" y="216" width="760" height="90" rx="0" fill="#0f1820"/>
  <text x="160" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="700" fill="#e8a020" text-anchor="middle">CBC</text>
  <text x="160" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Cipher Block</text>
  <text x="160" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Chaining</text>
  <text x="335" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">이전 블록 XOR 후 암호화</text>
  <text x="335" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">패턴 감춤, IV 필요</text>
  <text x="335" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">순차 처리 (병렬 불가)</text>
  <text x="335" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8a020" text-anchor="middle">무결성 검증 없음 → PKCS#7 패딩 오라클</text>
  <rect x="480" y="233" width="120" height="30" rx="4" fill="#4a3a0a"/>
  <text x="540" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8a020" text-anchor="middle">레거시</text>
  <rect x="658" y="233" width="140" height="30" rx="4" fill="#4a3a0a"/>
  <text x="728" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8a020" text-anchor="middle">GCM으로 대체 권장</text>

  <!-- GCM Row -->
  <rect x="60" y="306" width="760" height="115" rx="0" fill="#0d1a0d"/>
  <text x="160" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">GCM</text>
  <text x="160" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Galois/Counter</text>
  <text x="160" y="373" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Mode</text>
  <text x="335" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">CTR 모드 + GHASH 인증</text>
  <text x="335" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">암호화 + 무결성 동시 제공 (AEAD)</text>
  <text x="335" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">병렬 처리 가능, 빠름</text>
  <text x="335" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">12바이트 Nonce (랜덤, 재사용 금지)</text>
  <text x="335" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8a020" text-anchor="middle">⚠ Nonce 재사용 시 키 전체 노출</text>
  <rect x="480" y="333" width="120" height="30" rx="4" fill="#0d2a0d"/>
  <text x="540" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">현재 표준</text>
  <rect x="658" y="333" width="140" height="30" rx="4" fill="#0d2a0d"/>
  <text x="728" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">AES-256-GCM 사용</text>

  <rect x="60" y="126" width="760" height="295" fill="none" stroke="#2a3a4a" stroke-width="1"/>

  <!-- Bottom code example -->
  <rect x="60" y="440" width="760" height="62" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="460" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" xml:space="preserve" fill="#9aa4b8"># Python AES-256-GCM 예시</text>
  <text x="76" y="476" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" xml:space="preserve" fill="#7ec8e3" font-weight="600">from </text>
  <text x="110" y="476" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" xml:space="preserve" fill="#ffffff">cryptography.hazmat.primitives.ciphers.aead </text>
  <text x="386" y="476" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" xml:space="preserve" fill="#7ec8e3" font-weight="600">import </text>
  <text x="428" y="476" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" xml:space="preserve" fill="#ffffff">AESGCM</text>
  <text x="76" y="492" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" xml:space="preserve" fill="#ffffff">ct = AESGCM(key).encrypt(nonce, plaintext, aad)  </text>
  <text x="450" y="492" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" xml:space="preserve" fill="#9aa4b8"># aad: 추가 인증 데이터</text>
</svg>
