<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <text x="440" y="50" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">웹 보안 계층 구조</text>
  <text x="440" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">Defense in Layers</text>

  <!-- Layer 1: Network -->
  <rect x="60" y="110" width="760" height="60" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">네트워크 계층</text>
  <text x="440" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">방화벽 · DDoS 방어 · TLS/HTTPS 암호화</text>

  <!-- Layer 2: Application -->
  <rect x="100" y="190" width="680" height="60" rx="8" fill="#1a2035" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">애플리케이션 계층</text>
  <text x="440" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">WAF · 입력 검증 · 인증 · 인가</text>

  <!-- Layer 3: Session -->
  <rect x="140" y="270" width="600" height="60" rx="8" fill="#0d2020" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">세션 · 토큰 계층</text>
  <text x="440" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">세션 관리 · JWT · OAuth2 · MFA</text>

  <!-- Layer 4: Data -->
  <rect x="180" y="350" width="520" height="60" rx="8" fill="#1a1005" stroke="#e0a055" stroke-width="1.5"/>
  <text x="440" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e0a055" text-anchor="middle">데이터 계층</text>
  <text x="440" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">암호화 · 해싱 · 접근 제어 · 백업</text>

  <!-- Layer 5: Monitoring -->
  <rect x="220" y="430" width="440" height="50" rx="8" fill="#1a0a1a" stroke="#cc77cc" stroke-width="1.5"/>
  <text x="440" y="451" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#cc77cc" text-anchor="middle">모니터링 · 감사</text>
  <text x="440" y="469" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">SIEM · 로그 분석 · 인시던트 대응</text>
</svg>
