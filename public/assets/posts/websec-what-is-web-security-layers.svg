<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arrd" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">웹 보안 계층 구조</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">네트워크부터 애플리케이션 로직까지 — 각 계층별 위협과 대응</text>

  <!-- Layer boxes (bottom to top logic, drawn top to bottom) -->
  <!-- Layer 1: Network -->
  <rect x="60" y="100" width="760" height="60" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="200" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">① 네트워크 계층</text>
  <text x="200" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">DDoS · 스니핑 → 방화벽 · TLS</text>
  <text x="580" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">TCP/IP · DNS · HTTP/HTTPS</text>
  <text x="580" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">전송 암호화(TLS 1.3) · DNSSEC · IP Filtering</text>

  <!-- Layer 2: Web Server -->
  <rect x="80" y="178" width="720" height="60" rx="8" fill="#0a1220" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="210" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">② 웹 서버 계층</text>
  <text x="210" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">설정 오류 · 디렉터리 탐색 → 보안 헤더</text>
  <text x="570" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Nginx · Apache · CDN · WAF</text>
  <text x="570" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Rate Limiting · Security Headers · TLS 종단</text>

  <!-- Layer 3: Application -->
  <rect x="100" y="256" width="680" height="60" rx="8" fill="#120a20" stroke="#7777cc" stroke-width="1.5"/>
  <text x="220" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">③ 애플리케이션 계층</text>
  <text x="220" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">XSS · SQLi · CSRF · IDOR → 입력검증</text>
  <text x="560" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">인증·인가 · 세션 관리 · 비즈니스 로직</text>
  <text x="560" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Parameterized Query · CSP · SameSite Cookie</text>

  <!-- Layer 4: Data -->
  <rect x="120" y="334" width="640" height="60" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="230" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">④ 데이터 계층</text>
  <text x="230" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">데이터 유출 · 불법 접근 → 암호화·마스킹</text>
  <text x="550" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">DB · 파일 스토리지 · 캐시 · 로그</text>
  <text x="550" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">저장 암호화 · 최소 권한 · 감사 로그</text>

  <!-- vertical arrows between layers -->
  <line x1="440" y1="160" x2="440" y2="174" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrd)"/>
  <line x1="440" y1="238" x2="440" y2="252" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrd)"/>
  <line x1="440" y1="316" x2="440" y2="330" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrd)"/>

  <!-- Code block -->
  <rect x="60" y="415" width="760" height="50" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="434" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 핵심 원칙: Defense in Depth (심층 방어)</text>
  <text x="80" y="454" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">각 계층이 독립적으로 실패해도 다음 계층이 공격을 차단한다</text>
</svg>
