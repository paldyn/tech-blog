<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">일반 재귀 vs 꼬리 재귀 호출 스택</text>
  <text x="440" y="70" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">Regular Recursion vs Tail Call Optimization</text>

  <!-- Left: regular recursion stack overflow -->
  <rect x="60" y="90" width="360" height="360" fill="#1a0d0d" rx="10" stroke="#3a1a1a" stroke-width="1.5"/>
  <text x="240" y="114" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" text-anchor="middle">일반 재귀 (스택 위험)</text>

  <rect x="76" y="124" width="328" height="90" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="92" y="144" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">function</tspan> sum(n) {</text>
  <text x="92" y="162" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">if</tspan> (n &lt;= <tspan fill="#b5cea8">0</tspan>) <tspan fill="#7ec8e3">return</tspan> <tspan fill="#b5cea8">0</tspan>;</text>
  <text x="92" y="180" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">return</tspan> n + sum(n - <tspan fill="#b5cea8">1</tspan>); <tspan fill="#6a8aa0">// !</tspan></text>
  <text x="92" y="198" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">}</text>

  <!-- Stack frames -->
  <text x="240" y="234" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">sum(3) 호출 스택</text>

  <rect x="130" y="242" width="220" height="26" fill="#3a1a1a" rx="4"/>
  <text x="240" y="259" fill="#e05555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" text-anchor="middle">sum(3): 3 + sum(2) 대기</text>

  <rect x="130" y="272" width="220" height="26" fill="#3a1a1a" rx="4"/>
  <text x="240" y="289" fill="#e05555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" text-anchor="middle">sum(2): 2 + sum(1) 대기</text>

  <rect x="130" y="302" width="220" height="26" fill="#3a1a1a" rx="4"/>
  <text x="240" y="319" fill="#e05555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" text-anchor="middle">sum(1): 1 + sum(0) 대기</text>

  <rect x="130" y="332" width="220" height="26" fill="#1a1a3a" rx="4"/>
  <text x="240" y="349" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" text-anchor="middle">sum(0): return 0</text>

  <text x="240" y="380" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">n이 크면 스택 오버플로우</text>
  <text x="240" y="398" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" text-anchor="middle">sum(100000) → 💥</text>

  <rect x="76" y="412" width="328" height="24" fill="#1a0d0d" rx="4"/>
  <text x="240" y="428" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">n개 스택 프레임 동시 유지</text>

  <!-- Right: tail call -->
  <rect x="460" y="90" width="360" height="360" fill="#0d1a0d" rx="10" stroke="#1a3a1a" stroke-width="1.5"/>
  <text x="640" y="114" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" text-anchor="middle">꼬리 재귀 (스택 재사용)</text>

  <rect x="476" y="124" width="328" height="90" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="492" y="144" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">function</tspan> sumTCO(n, acc = <tspan fill="#b5cea8">0</tspan>) {</text>
  <text x="492" y="162" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">if</tspan> (n &lt;= <tspan fill="#b5cea8">0</tspan>) <tspan fill="#7ec8e3">return</tspan> acc;</text>
  <text x="492" y="180" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">return</tspan> sumTCO(n-<tspan fill="#b5cea8">1</tspan>, acc+n); <tspan fill="#6a8aa0">// 꼬리</tspan></text>
  <text x="492" y="198" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">}</text>

  <text x="640" y="234" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">꼬리 호출 최적화 시 스택</text>

  <rect x="530" y="242" width="220" height="26" fill="#0a1a0a" rx="4"/>
  <text x="640" y="259" fill="#55c555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" text-anchor="middle">sumTCO(3, 0) → 재사용</text>

  <rect x="530" y="272" width="220" height="26" fill="#0a1a0a" rx="4"/>
  <text x="640" y="289" fill="#55c555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" text-anchor="middle">sumTCO(2, 3) → 재사용</text>

  <rect x="530" y="302" width="220" height="26" fill="#0a1a0a" rx="4"/>
  <text x="640" y="319" fill="#55c555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" text-anchor="middle">sumTCO(1, 5) → 재사용</text>

  <rect x="530" y="332" width="220" height="26" fill="#0d3a0d" rx="4"/>
  <text x="640" y="349" fill="#55c555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" text-anchor="middle">sumTCO(0, 6) → return 6</text>

  <text x="640" y="380" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">항상 1개 스택 프레임만 사용</text>
  <text x="640" y="398" fill="#888" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" text-anchor="middle">sumTCO(100000) → 6 ✓</text>

  <rect x="476" y="412" width="328" height="24" fill="#0d1a0d" rx="4"/>
  <text x="640" y="428" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">Safari만 지원 (다른 엔진 미지원)</text>

  <!-- Footer -->
  <text x="440" y="474" fill="#444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">PALDYN · JavaScript 완전 정복</text>
</svg>
