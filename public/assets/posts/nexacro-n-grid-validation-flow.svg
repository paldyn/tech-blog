<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">그리드 유효성 검사 전략</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="400" fill="#888" text-anchor="middle">행 순회 → 변경 행만 → 셀 단위 검증 → 포커스 이동</text>

  <!-- 그리드 시각화 -->
  <rect x="60" y="96" width="360" height="200" fill="#111" rx="8" stroke="#333" stroke-width="1.5"/>
  <text x="240" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">그리드 (ds_order)</text>

  <!-- 헤더 행 -->
  <rect x="76" y="122" width="76" height="24" fill="#1a1a2a" rx="2"/>
  <text x="114" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">rowStatus</text>
  <rect x="156" y="122" width="80" height="24" fill="#1a1a2a" rx="2"/>
  <text x="196" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">품목명</text>
  <rect x="240" y="122" width="60" height="24" fill="#1a1a2a" rx="2"/>
  <text x="270" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">수량</text>
  <rect x="304" y="122" width="100" height="24" fill="#1a1a2a" rx="2"/>
  <text x="354" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">단가</text>

  <!-- 데이터 행 1 (NORMAL - 건너뜀) -->
  <rect x="76" y="150" width="76" height="24" fill="#111" rx="2"/>
  <text x="114" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">NORMAL</text>
  <rect x="156" y="150" width="80" height="24" fill="#111" rx="2"/>
  <text x="196" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">사과</text>
  <rect x="240" y="150" width="60" height="24" fill="#111" rx="2"/>
  <text x="270" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">10</text>
  <rect x="304" y="150" width="100" height="24" fill="#111" rx="2"/>
  <text x="354" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">1,000</text>
  <text x="74" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">→</text>

  <!-- 행 2 (INSERT - 검사) -->
  <rect x="76" y="178" width="76" height="24" fill="#0d2137" rx="2"/>
  <text x="114" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3" text-anchor="middle">INSERT</text>
  <rect x="156" y="178" width="80" height="24" fill="#0d2137" rx="2"/>
  <text x="196" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">←빈값!</text>
  <rect x="240" y="178" width="60" height="24" fill="#0d2137" rx="2"/>
  <text x="270" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">5</text>
  <rect x="304" y="178" width="100" height="24" fill="#0d2137" rx="2"/>
  <text x="354" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">2,000</text>
  <!-- 검사 표시 -->
  <text x="66" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">✓</text>

  <!-- 행 3 (UPDATE - 검사) -->
  <rect x="76" y="206" width="76" height="24" fill="#1a1a0d" rx="2"/>
  <text x="114" y="223" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8c44a" text-anchor="middle">UPDATE</text>
  <rect x="156" y="206" width="80" height="24" fill="#1a1a0d" rx="2"/>
  <text x="196" y="223" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">바나나</text>
  <rect x="240" y="206" width="60" height="24" fill="#1a1a0d" rx="2"/>
  <text x="270" y="223" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">←0!</text>
  <rect x="304" y="206" width="100" height="24" fill="#1a1a0d" rx="2"/>
  <text x="354" y="223" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8c44a" text-anchor="middle">1,500</text>
  <text x="66" y="223" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8c44a">✓</text>

  <!-- 행 4 (DELETE - 건너뜀) -->
  <rect x="76" y="234" width="76" height="24" fill="#1a0d0d" rx="2"/>
  <text x="114" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555" text-anchor="middle">DELETE</text>
  <rect x="156" y="234" width="80" height="24" fill="#1a0d0d" rx="2"/>
  <text x="196" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">포도</text>
  <rect x="240" y="234" width="60" height="24" fill="#1a0d0d" rx="2"/>
  <text x="270" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">3</text>
  <rect x="304" y="234" width="100" height="24" fill="#1a0d0d" rx="2"/>
  <text x="354" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">3,000</text>
  <text x="74" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">→</text>

  <!-- 범례 -->
  <text x="76" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">→ NORMAL / DELETE: 검사 건너뜀</text>
  <text x="76" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">✓ INSERT / UPDATE: 필수·형식·범위 검사</text>

  <!-- 검사 흐름 박스 (오른쪽) -->
  <rect x="460" y="96" width="360" height="340" fill="#0e0e14" rx="8" stroke="#2a2a4a" stroke-width="1.5"/>
  <text x="640" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">행 순회 검사 흐름</text>

  <rect x="476" y="128" width="328" height="34" fill="#111" rx="6" stroke="#333" stroke-width="1"/>
  <text x="640" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">for r = 0 to rowCount - 1</text>

  <line x1="640" y1="162" x2="640" y2="178" stroke="#555" stroke-width="1"/>
  <polygon points="636,178 640,186 644,178" fill="#555"/>

  <rect x="476" y="186" width="328" height="34" fill="#111" rx="6" stroke="#333" stroke-width="1"/>
  <text x="640" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">getRowType(r) == NORMAL || DELETE?</text>

  <!-- Yes → continue -->
  <line x1="476" y1="203" x2="460" y2="240" stroke="#555" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="432" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">skip</text>

  <!-- No → 검사 -->
  <line x1="640" y1="220" x2="640" y2="236" stroke="#555" stroke-width="1"/>
  <polygon points="636,236 640,244 644,236" fill="#555"/>
  <text x="652" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">check</text>

  <rect x="476" y="244" width="328" height="34" fill="#0d2137" rx="6" stroke="#2a4a7a" stroke-width="1"/>
  <text x="640" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">필수값 검사 (gfn_isNull)</text>

  <line x1="640" y1="278" x2="640" y2="294" stroke="#555" stroke-width="1"/>
  <polygon points="636,294 640,302 644,294" fill="#555"/>

  <rect x="476" y="302" width="328" height="34" fill="#0d1e0d" rx="6" stroke="#2a5a2a" stroke-width="1"/>
  <text x="640" y="323" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">범위 검사 (수량 > 0)</text>

  <line x1="640" y1="336" x2="640" y2="352" stroke="#555" stroke-width="1"/>
  <polygon points="636,352 640,360 644,352" fill="#555"/>

  <rect x="476" y="360" width="328" height="34" fill="#1e0d0d" rx="6" stroke="#4a1e1e" stroke-width="1"/>
  <text x="640" y="381" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">실패 → grd.setCellPos(r, col) + alert</text>

  <line x1="640" y1="394" x2="640" y2="410" stroke="#555" stroke-width="1"/>
  <polygon points="636,410 640,418 644,410" fill="#555"/>
  <rect x="476" y="418" width="328" height="18" fill="#0f0f0f" rx="4"/>
  <text x="640" y="431" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">return false (저장 중단)</text>
</svg>
