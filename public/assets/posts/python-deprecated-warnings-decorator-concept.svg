<svg width="880" height="400" viewBox="0 0 880 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">deprecated 경고 데코레이터 패턴</text>
  <!-- Left: warnings module -->
  <rect x="40" y="70" width="380" height="280" fill="#1a0d00" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="230" y="94" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">직접 구현 (@deprecated)</text>
  <rect x="56" y="106" width="348" height="214" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="70" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">import </tspan><tspan fill="#ffffff">warnings</tspan></text>
  <text x="70" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">from </tspan><tspan fill="#ffffff">functools </tspan><tspan fill="#7ec8e3" font-weight="600">import </tspan><tspan fill="#ffffff">wraps</tspan></text>
  <text x="70" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">def </tspan><tspan fill="#ffffff">deprecated(reason=</tspan><tspan fill="#ce9178">""</tspan><tspan fill="#ffffff">):</tspan></text>
  <text x="70" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">def </tspan><tspan fill="#ffffff">decorator(func):</tspan></text>
  <text x="70" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">        </tspan><tspan fill="#7777cc">@wraps(func)</tspan></text>
  <text x="70" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">        </tspan><tspan fill="#7ec8e3" font-weight="600">def </tspan><tspan fill="#ffffff">wrapper(*a, **k):</tspan></text>
  <text x="70" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">            warnings.warn(</tspan></text>
  <text x="70" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">                </tspan><tspan fill="#ce9178">f"{func.__name__} deprecated. {reason}"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="70" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">                DeprecationWarning, stacklevel=</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="70" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">            </tspan><tspan fill="#7ec8e3" font-weight="600">return </tspan><tspan fill="#ffffff">func(*a, **k)</tspan></text>
  <text x="70" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">        </tspan><tspan fill="#7ec8e3" font-weight="600">return </tspan><tspan fill="#ffffff">wrapper</tspan></text>
  <text x="230" y="342" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">stacklevel=2 → 호출자 위치 표시</text>
  <!-- Right: deprecation-decorator library -->
  <rect x="460" y="70" width="380" height="280" fill="#051005" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="94" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">라이브러리 활용 방법</text>
  <rect x="476" y="106" width="348" height="214" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="490" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#9aa4b8"># pip install deprecation</tspan></text>
  <text x="490" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">import </tspan><tspan fill="#ffffff">deprecation</tspan></text>
  <text x="490" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7777cc">@deprecation.deprecated(</tspan></text>
  <text x="490" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">    deprecated_in=</tspan><tspan fill="#ce9178">"2.0"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="490" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">    removed_in=</tspan><tspan fill="#ce9178">"3.0"</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="490" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">    details=</tspan><tspan fill="#ce9178">"Use new_func() instead"</tspan></text>
  <text x="490" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7777cc">)</tspan></text>
  <text x="490" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">def </tspan><tspan fill="#ffffff">old_func():</tspan></text>
  <text x="490" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">    ...</tspan></text>
  <text x="650" y="328" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">버전 정보 포함 구조화된 경고</text>
  <text x="650" y="346" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">실제 제거 버전 도달 시 에러로 전환 가능</text>
  <!-- bottom note -->
  <text x="440" y="378" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Python 3.13+ 내장 warnings.deprecated 데코레이터 추가됨</text>
</svg>
