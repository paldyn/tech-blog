<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 540" height="540">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="540" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Mutating vs Validating Webhook</text>

  <!-- Divider line -->
  <line x1="440" y1="64" x2="440" y2="520" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- LEFT: Mutating -->
  <text x="220" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#e05555" text-anchor="middle">MutatingWebhook</text>

  <!-- Mutating capabilities box -->
  <rect x="64" y="108" width="310" height="148" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="219" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">할 수 있는 것</text>
  <text x="84" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">&#x2022; 필드 기본값 주입 (defaulting)</text>
  <text x="84" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">&#x2022; 레이블 / 어노테이션 추가</text>
  <text x="84" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">&#x2022; 사이드카 컨테이너 삽입</text>
  <text x="84" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">&#x2022; 리소스 spec 수정/보정</text>
  <text x="84" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">&#x2022; 응답: JSON Patch 배열</text>

  <!-- Mutating YAML structure -->
  <rect x="64" y="272" width="310" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="84" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">kind:</text>
  <text x="138" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">MutatingWebhookConfiguration</text>
  <text x="84" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">webhooks:</text>
  <text x="84" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">- name: default.example.com</text>
  <text x="84" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  admissionReviewVersions:</text>
  <text x="84" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  - v1</text>
  <text x="84" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  sideEffects: None</text>
  <text x="84" y="402" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">  failurePolicy:</text>
  <text x="216" y="402" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178"> Fail</text>
  <text x="84" y="420" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># Ignore = 실패해도 통과</text>
  <text x="84" y="438" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># Fail = 실패 시 요청 거부</text>
  <text x="84" y="456" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  clientConfig:</text>
  <text x="84" y="474" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    service: {name: webhook-svc}</text>

  <!-- RIGHT: Validating -->
  <text x="660" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555" text-anchor="middle">ValidatingWebhook</text>

  <!-- Validating capabilities box -->
  <rect x="504" y="108" width="310" height="148" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="659" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">할 수 있는 것</text>
  <text x="524" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">&#x2022; 허용(allow) 또는 거부(deny)</text>
  <text x="524" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">&#x2022; 복잡한 교차 필드 검증</text>
  <text x="524" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">&#x2022; 외부 시스템과 연동 검사</text>
  <text x="524" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">&#x2022; 보안 정책 / 컴플라이언스</text>
  <text x="524" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">&#x2022; 오브젝트 변경 불가 (읽기 전용)</text>

  <!-- Validating YAML structure -->
  <rect x="504" y="272" width="310" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="524" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">kind:</text>
  <text x="578" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">ValidatingWebhookConfiguration</text>
  <text x="524" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">webhooks:</text>
  <text x="524" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">- name: validate.example.com</text>
  <text x="524" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">  rules:</text>
  <text x="524" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  - apiGroups: ["apps"]</text>
  <text x="524" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    resources: ["deployments"]</text>
  <text x="524" y="402" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    operations:</text>
  <text x="524" y="420" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    - CREATE</text>
  <text x="524" y="438" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    - UPDATE</text>
  <text x="524" y="456" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">  namespaceSelector:</text>
  <text x="524" y="474" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    matchLabels: {env: prod}</text>

  <!-- Bottom note -->
  <text x="440" y="516" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">Mutating이 먼저 실행 → Validating이 최종 확인 (순서 고정)</text>
</svg>
