<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <defs>
    <marker id="depArr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">API 폐기·제거 생명주기</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">폐기는 예고다 — forRemoval 표시를 놓치면 언젠가 컴파일이 깨진다</text>

  <!-- stage 1 -->
  <rect x="50" y="118" width="220" height="120" rx="10" fill="#1a1a10" stroke="#e0b055" stroke-width="1.5"/>
  <text x="160" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e0b055">1. 폐기 예고</text>
  <text x="160" y="182" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">@Deprecated</text>
  <text x="160" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">경고 발생, 동작은 유지</text>

  <line x1="272" y1="178" x2="326" y2="178" stroke="#7ec8e3" stroke-width="2" marker-end="url(#depArr)"/>

  <!-- stage 2 -->
  <rect x="330" y="118" width="220" height="120" rx="10" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555">2. 제거 예정</text>
  <text x="440" y="182" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">forRemoval=true</text>
  <text x="440" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">강한 경고, 곧 사라짐</text>

  <line x1="552" y1="178" x2="606" y2="178" stroke="#7ec8e3" stroke-width="2" marker-end="url(#depArr)"/>

  <!-- stage 3 -->
  <rect x="610" y="118" width="220" height="120" rx="10" fill="#101020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="720" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc">3. 제거</text>
  <text x="720" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">컴파일·런타임 실패</text>
  <text x="720" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">대체 API로 이전 필수</text>

  <text x="440" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">jdeprscan으로 코드가 어느 단계의 API를 쓰는지 미리 진단할 수 있다</text>
  <text x="440" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">폐기 경고를 방치하지 말고 즉시 대체 — 마이그레이션 비용을 분산</text>
</svg>
