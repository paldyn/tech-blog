<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 560" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" fill="#e8e8e8" font-size="22" font-weight="700" text-anchor="middle">콜백 코드 패턴</text>

  <!-- Left section: Opener -->
  <text x="230" y="84" fill="#888" font-size="13" text-anchor="middle">Opener Form (호출 측)</text>
  <rect x="60" y="94" width="380" height="214" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="116" xml:space="preserve" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// ① 팝업 열기</text>
  <text x="76" y="134" xml:space="preserve" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">function <tspan fill="#ffffff">fn_open</tspan>() {</text>
  <text x="76" y="152" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  var sKey = this.edt_key.value;</text>
  <text x="76" y="170" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  var oExtra = { key: sKey };</text>
  <text x="76" y="188" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  this.openPopup(</text>
  <text x="76" y="206" xml:space="preserve" fill="#ce9178" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    "popup/ItemSearch",</text>
  <text x="76" y="224" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    <tspan fill="#b5cea8">0</tspan>, <tspan fill="#ce9178">"fn_callback"</tspan>, <tspan fill="#7ec8e3">null</tspan>,</text>
  <text x="76" y="242" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    <tspan fill="#7ec8e3">false</tspan>, oExtra, <tspan fill="#ce9178">"600:450"</tspan>);</text>
  <text x="76" y="260" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>
  <text x="76" y="296" xml:space="preserve" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">↓ 팝업이 닫힐 때 자동 호출</text>

  <!-- Left section: Callback -->
  <rect x="60" y="316" width="380" height="196" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="338" xml:space="preserve" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// ② 콜백 함수</text>
  <text x="76" y="356" xml:space="preserve" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">function <tspan fill="#ffffff">fn_callback</tspan>(objPopup, nReturn,</text>
  <text x="76" y="374" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">                   sExt, oExt) {</text>
  <text x="76" y="392" xml:space="preserve" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  if <tspan fill="#ffffff">(nReturn == </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">) {</tspan></text>
  <text x="76" y="410" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    this.ds_list.copyData(</text>
  <text x="76" y="428" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">      objPopup.ds_result);</text>
  <text x="76" y="446" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  }</text>
  <text x="76" y="464" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>

  <!-- Right section: Popup -->
  <text x="650" y="84" fill="#888" font-size="13" text-anchor="middle">Popup Form (팝업 측)</text>
  <rect x="460" y="94" width="360" height="196" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="116" xml:space="preserve" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// getArgs: 전달값 수신</text>
  <text x="476" y="134" xml:space="preserve" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">function <tspan fill="#ffffff">this_onInit</tspan>(obj, e) {</text>
  <text x="476" y="152" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  var args = this.getArgs();</text>
  <text x="476" y="170" xml:space="preserve" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  if <tspan fill="#ffffff">(args) {</tspan></text>
  <text x="476" y="188" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    this.sKey = args.key;</text>
  <text x="476" y="206" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  }</text>
  <text x="476" y="224" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  this.fn_search();</text>
  <text x="476" y="242" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>

  <!-- Right: Close popup code -->
  <rect x="460" y="316" width="360" height="178" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="338" xml:space="preserve" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">// 확인 버튼: 값 반환 후 닫기</text>
  <text x="476" y="356" xml:space="preserve" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">function <tspan fill="#ffffff">btn_ok_onclick</tspan>(obj, e) {</text>
  <text x="476" y="374" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  this.ds_result.clearData();</text>
  <text x="476" y="392" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  this.fn_setResult();</text>
  <text x="476" y="410" xml:space="preserve" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  // nReturn=1 → 정상 확인</text>
  <text x="476" y="428" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  this.closePopup(<tspan fill="#b5cea8">1</tspan>);</text>
  <text x="476" y="446" xml:space="preserve" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>

  <!-- nReturn legend -->
  <rect x="460" y="510" width="360" height="34" rx="6" fill="#111827" stroke="#374151"/>
  <text x="476" y="532" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace">nReturn: <tspan fill="#55c555">1</tspan>=확인  <tspan fill="#e05555">0</tspan>=취소  <tspan fill="#7777cc">-1</tspan>=강제종료</text>
</svg>
