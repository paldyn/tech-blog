<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300">
  <defs>
    <marker id="gn_arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="300" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">TypeVar로 타입을 그대로 전달하기</text>

  <!-- center function box -->
  <rect x="320" y="120" width="240" height="80" rx="8" fill="#111418" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="152" font-family="'JetBrains Mono','Menlo',monospace" font-size="13.5" fill="#ffffff" text-anchor="middle">def first(x: list[T])</text>
  <text x="440" y="174" font-family="'JetBrains Mono','Menlo',monospace" font-size="13.5" fill="#ffffff" text-anchor="middle">-&gt; T</text>

  <!-- input examples left -->
  <rect x="60" y="80" width="200" height="50" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="160" y="111" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" text-anchor="middle">list[int]</text>

  <rect x="60" y="190" width="200" height="50" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="160" y="221" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" text-anchor="middle">list[str]</text>

  <!-- output examples right -->
  <rect x="620" y="80" width="200" height="50" rx="8" fill="#000000" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="111" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#b5cea8" text-anchor="middle">int</text>

  <rect x="620" y="190" width="200" height="50" rx="8" fill="#000000" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="221" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ce9178" text-anchor="middle">str</text>

  <!-- arrows in -->
  <line x1="260" y1="105" x2="320" y2="145" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#gn_arr)"/>
  <line x1="260" y1="215" x2="320" y2="175" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#gn_arr)"/>
  <!-- arrows out -->
  <line x1="560" y1="145" x2="620" y2="105" stroke="#55c555" stroke-width="2.5" marker-end="url(#gn_arr)"/>
  <line x1="560" y1="175" x2="620" y2="215" stroke="#55c555" stroke-width="2.5" marker-end="url(#gn_arr)"/>

  <text x="440" y="278" font-family="'Wanted Sans Variable','Wanted Sans',sans-serif" font-size="13" fill="#9aa4b8" text-anchor="middle">T는 호출 시점에 결정 — 입력이 list[int]면 반환은 int로 추론된다</text>
</svg>
