<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-ov" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">LLMOps 스택 전체 구조</text>

  <!-- Row 1: User -->
  <rect x="340" y="68" width="200" height="52" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">사용자 / 애플리케이션</text>
  <text x="440" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Web · Mobile · API Client</text>

  <line x1="440" y1="120" x2="440" y2="142" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-ov)"/>

  <!-- Row 2: Gateway -->
  <rect x="200" y="150" width="480" height="52" rx="8" fill="#2a1a2a" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">API 게이트웨이 + 프록시</text>
  <text x="440" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Rate Limiting · 인증 · 라우팅 · 캐시 레이어</text>

  <line x1="440" y1="202" x2="440" y2="224" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-ov)"/>

  <!-- Row 3: three boxes -->
  <!-- Prompt Management -->
  <rect x="60" y="232" width="220" height="72" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">프롬프트 관리</text>
  <text x="170" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">버전 · A/B 테스트</text>
  <text x="170" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Langfuse · PromptLayer</text>

  <!-- LLM Router -->
  <rect x="330" y="232" width="220" height="72" rx="8" fill="#2a1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">LLM 라우터</text>
  <text x="440" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">모델 선택 · Fallback</text>
  <text x="440" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">LiteLLM · BerriAI</text>

  <!-- Eval -->
  <rect x="600" y="232" width="220" height="72" rx="8" fill="#2a2a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="710" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">평가 파이프라인</text>
  <text x="710" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">LLM-as-Judge · RAGAS</text>
  <text x="710" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">회귀 감지 CI 연동</text>

  <!-- Arrows row3 -->
  <line x1="280" y1="202" x2="170" y2="230" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-ov)"/>
  <line x1="440" y1="202" x2="440" y2="230" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-ov)"/>
  <line x1="600" y1="202" x2="710" y2="230" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-ov)"/>

  <!-- Row 4: Observability -->
  <rect x="60" y="330" width="480" height="72" rx="8" fill="#1a2a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="300" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">관측성 &amp; 비용 추적</text>
  <text x="300" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">토큰 사용량 · 레이턴시 · 에러율 · 환각 감지</text>
  <text x="300" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Langfuse · Helicone · LangSmith · Phoenix</text>

  <!-- Cost Optimizer -->
  <rect x="590" y="330" width="230" height="72" rx="8" fill="#2a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="705" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">비용 최적화</text>
  <text x="705" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">시맨틱 캐싱 · 배치 처리</text>
  <text x="705" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">모델 다운사이징 · 양자화</text>

  <!-- Row 3 down arrows -->
  <line x1="170" y1="304" x2="170" y2="326" stroke="#7ec8e3" stroke-width="2"/>
  <line x1="170" y1="326" x2="60" y2="330" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-ov)"/>
  <line x1="440" y1="304" x2="440" y2="326" stroke="#7ec8e3" stroke-width="2"/>
  <line x1="440" y1="326" x2="300" y2="330" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-ov)"/>
  <line x1="710" y1="304" x2="710" y2="330" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-ov)"/>

  <!-- Code block -->
  <rect x="60" y="422" width="760" height="62" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="442" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># MLOps vs LLMOps 핵심 차이</text>
  <text x="76" y="460" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">MLOps:  </tspan><tspan fill="#55c555">가중치</tspan><tspan fill="#ffffff"> 배포 → LLMOps: </tspan><tspan fill="#7ec8e3">프롬프트 + 모델</tspan><tspan fill="#ffffff"> 이중 관리</tspan></text>
  <text x="76" y="478" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">MLOps:  </tspan><tspan fill="#55c555">정량 메트릭</tspan><tspan fill="#ffffff"> → LLMOps: </tspan><tspan fill="#e05555">환각·유해성</tspan><tspan fill="#ffffff"> 정성 평가 추가</tspan></text>
</svg>
