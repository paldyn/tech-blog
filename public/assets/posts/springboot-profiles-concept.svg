<svg width="880" viewBox="0 0 880 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Spring Boot Profiles — 환경별 설정 분리</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">동일한 코드베이스, 환경마다 다른 설정 — 프로파일로 깔끔하게 분리</text>

  <!-- Shared base box -->
  <rect x="310" y="96" width="260" height="64" fill="#131320" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">application.yml</text>
  <text x="440" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">공통 기본 설정 (모든 환경 적용)</text>

  <!-- Arrow down-left to dev -->
  <line x1="370" y1="160" x2="220" y2="232" stroke="#55c555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- Arrow down-center to test -->
  <line x1="440" y1="160" x2="440" y2="232" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- Arrow down-right to prod -->
  <line x1="510" y1="160" x2="660" y2="232" stroke="#e05555" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- dev profile box -->
  <rect x="60" y="234" width="310" height="100" fill="#0d1a0d" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <rect x="60" y="234" width="310" height="28" fill="#55c555" rx="8"/>
  <rect x="60" y="248" width="310" height="14" fill="#55c555"/>
  <text x="215" y="253" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#0a0a0a">dev</text>
  <text x="80" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">application-dev.yml</text>
  <text x="80" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">DB: H2 인메모리</text>
  <text x="80" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">로그: DEBUG  |  DevTools: 활성</text>

  <!-- test profile box -->
  <rect x="310" y="234" width="260" height="100" fill="#081015" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <rect x="310" y="234" width="260" height="28" fill="#7ec8e3" rx="8"/>
  <rect x="310" y="248" width="260" height="14" fill="#7ec8e3"/>
  <text x="440" y="253" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#0a0a0a">test</text>
  <text x="328" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">application-test.yml</text>
  <text x="328" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">DB: Testcontainers</text>
  <text x="328" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">로그: WARN  |  메일: Stub</text>

  <!-- prod profile box -->
  <rect x="510" y="234" width="310" height="100" fill="#190808" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <rect x="510" y="234" width="310" height="28" fill="#e05555" rx="8"/>
  <rect x="510" y="248" width="310" height="14" fill="#e05555"/>
  <text x="665" y="253" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#0a0a0a">prod</text>
  <text x="528" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">application-prod.yml</text>
  <text x="528" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">DB: MySQL (RDS)</text>
  <text x="528" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">로그: INFO  |  모니터링: 활성</text>

  <!-- Activation methods -->
  <text x="440" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">프로파일 활성화 방법</text>

  <!-- Method 1 -->
  <rect x="60" y="390" width="230" height="80" fill="#111" rx="6"/>
  <text x="175" y="412" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">커맨드라인 인수</text>
  <text x="80" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">--spring.profiles.active</text>
  <text x="80" y="452" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">  =prod</text>

  <!-- Method 2 -->
  <rect x="325" y="390" width="230" height="80" fill="#111" rx="6"/>
  <text x="440" y="412" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">OS 환경 변수</text>
  <text x="340" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">SPRING_PROFILES_ACTIVE</text>
  <text x="340" y="452" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178">  =prod</text>

  <!-- Method 3 -->
  <rect x="590" y="390" width="230" height="80" fill="#111" rx="6"/>
  <text x="705" y="412" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">application.yml 기본값</text>
  <text x="606" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">spring<tspan font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e8e8e8">:</tspan></text>
  <text x="606" y="452" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">  profiles.active: dev</text>
</svg>
