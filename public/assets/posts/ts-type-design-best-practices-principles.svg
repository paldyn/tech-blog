<svg xmlns="http://www.w3.org/2000/svg" width="880" height="422" viewBox="0 0 880 422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="422" rx="12" fill="#0a0a0a"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">타입 설계 4원칙</text>

  <rect x="60" y="88" width="760" height="60" rx="8" fill="#15171c" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="60" y="88" width="5" height="60" rx="2" fill="#55c555"/>
  <text x="84" y="112" font-size="14" font-weight="600" fill="#e8e8e8">정확한 만큼만 넓게</text>
  <text x="84" y="132" font-size="13" fill="#9aa4b8">any·과한 옵셔널 대신 실제로 가능한 값만 타입에 담는다</text>

  <rect x="60" y="166" width="760" height="60" rx="8" fill="#15171c" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="60" y="166" width="5" height="60" rx="2" fill="#55c555"/>
  <text x="84" y="190" font-size="14" font-weight="600" fill="#e8e8e8">상태는 유니온으로</text>
  <text x="84" y="210" font-size="13" fill="#9aa4b8">불리언 플래그 조합보다 판별 유니온으로 모순을 차단한다</text>

  <rect x="60" y="244" width="760" height="60" rx="8" fill="#15171c" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="60" y="244" width="5" height="60" rx="2" fill="#55c555"/>
  <text x="84" y="268" font-size="14" font-weight="600" fill="#e8e8e8">경계에서만 검증</text>
  <text x="84" y="288" font-size="13" fill="#9aa4b8">외부 입력은 입구에서 한 번 좁히고 내부는 정확한 타입을 신뢰</text>

  <rect x="60" y="322" width="760" height="60" rx="8" fill="#15171c" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="60" y="322" width="5" height="60" rx="2" fill="#55c555"/>
  <text x="84" y="346" font-size="14" font-weight="600" fill="#e8e8e8">추론을 믿되 경계는 명시</text>
  <text x="84" y="366" font-size="13" fill="#9aa4b8">지역 변수는 추론에 맡기고 함수 시그니처·공개 API는 명시한다</text>
</svg>
