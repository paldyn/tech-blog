<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">TTL 권장값 &amp; 네거티브 캐싱</text>

  <!-- TTL 권장값 표 -->
  <text x="60" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">레코드별 TTL 권장값</text>

  <!-- Header row -->
  <rect x="60" y="88" width="760" height="34" rx="4" fill="#1a1a2a" stroke="#3a3a5a" stroke-width="1"/>
  <text x="160" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">레코드 타입</text>
  <text x="360" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">권장 TTL</text>
  <text x="560" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">사용 이유</text>
  <text x="760" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">변경 빈도</text>

  <!-- Row 1 -->
  <rect x="60" y="122" width="760" height="34" rx="0" fill="#111120" stroke="#333" stroke-width="0.5"/>
  <text x="160" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">A / AAAA</text>
  <text x="360" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#b5cea8" text-anchor="middle">300 ~ 3600s</text>
  <text x="560" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">IP 변경 대응</text>
  <text x="760" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e09050" text-anchor="middle">중간</text>

  <!-- Row 2 -->
  <rect x="60" y="156" width="760" height="34" rx="0" fill="#0f0f1e" stroke="#333" stroke-width="0.5"/>
  <text x="160" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">CNAME</text>
  <text x="360" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#b5cea8" text-anchor="middle">3600 ~ 86400s</text>
  <text x="560" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">별칭 안정적</text>
  <text x="760" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">낮음</text>

  <!-- Row 3 -->
  <rect x="60" y="190" width="760" height="34" rx="0" fill="#111120" stroke="#333" stroke-width="0.5"/>
  <text x="160" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">MX</text>
  <text x="360" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#b5cea8" text-anchor="middle">3600 ~ 86400s</text>
  <text x="560" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">메일 안정성</text>
  <text x="760" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">낮음</text>

  <!-- Row 4 -->
  <rect x="60" y="224" width="760" height="34" rx="0" fill="#0f0f1e" stroke="#333" stroke-width="0.5"/>
  <text x="160" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">TXT (SPF/DKIM)</text>
  <text x="360" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#b5cea8" text-anchor="middle">3600s</text>
  <text x="560" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">이메일 인증</text>
  <text x="760" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">낮음</text>

  <!-- Row 5 -->
  <rect x="60" y="258" width="760" height="34" rx="0" fill="#111120" stroke="#333" stroke-width="0.5"/>
  <text x="160" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">NS</text>
  <text x="360" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#b5cea8" text-anchor="middle">86400s (24h)</text>
  <text x="560" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">NS 거의 불변</text>
  <text x="760" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">매우 낮음</text>

  <!-- Negative caching -->
  <text x="60" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e05555">네거티브 캐싱 (NXDOMAIN / NODATA)</text>

  <rect x="60" y="334" width="360" height="88" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">NXDOMAIN</text>
  <text x="240" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">도메인 자체가 없음</text>
  <text x="240" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">SOA MINIMUM TTL 동안 캐시</text>
  <text x="240" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">RFC 2308: 최대 3시간(10800s)</text>

  <rect x="460" y="334" width="360" height="88" rx="8" fill="#1a1a0a" stroke="#e09050" stroke-width="1.5"/>
  <text x="640" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e09050" text-anchor="middle">NODATA</text>
  <text x="640" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">도메인은 있지만 레코드 없음</text>
  <text x="640" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">예: A 레코드 없는 도메인</text>
  <text x="640" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">동일하게 SOA MINIMUM TTL</text>

  <!-- Code block -->
  <rect x="60" y="436" width="760" height="28" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="455" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#9aa4b8">; SOA 레코드의 MINIMUM 필드가 네거티브 캐시 TTL을 결정</tspan>  example.com. SOA ns1 admin <tspan fill="#b5cea8">2024010101</tspan> <tspan fill="#b5cea8">3600</tspan> <tspan fill="#b5cea8">900</tspan> <tspan fill="#b5cea8">604800</tspan> <tspan fill="#7ec8e3" font-weight="600">3600</tspan></text>
</svg>
