<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">범위 Cherry-pick 중 충돌 처리</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#888">여러 커밋 픽 중 중간 충돌 — 계속·건너뜀·중단 선택</text>

  <!-- Range cherry-pick command -->
  <rect x="60" y="90" width="760" height="44" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="117" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" xml:space="preserve">git cherry-pick abc1234^..def5678   (A, B, C, D 순서로 적용)</text>

  <!-- Commit A -->
  <rect x="60" y="156" width="160" height="44" rx="6" fill="#0a1a0a" stroke="#55c555"/>
  <text x="140" y="182" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" xml:space="preserve">A — 성공</text>
  <line x1="220" y1="178" x2="254" y2="178" stroke="#555" stroke-width="1.5"/>
  <polygon points="262,178 252,172 252,184" fill="#555"/>

  <!-- Commit B (conflict) -->
  <rect x="262" y="156" width="160" height="44" rx="6" fill="#1a0808" stroke="#e05555"/>
  <text x="342" y="175" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555" xml:space="preserve">B — CONFLICT</text>
  <text x="342" y="193" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">작업 중단</text>

  <!-- Three options from B conflict -->
  <!-- Option 1: resolve and continue -->
  <line x1="342" y1="200" x2="342" y2="240" stroke="#e05555" stroke-width="1.5"/>
  <line x1="162" y1="240" x2="660" y2="240" stroke="#555" stroke-width="1"/>

  <!-- Option 1 (left): resolve -->
  <line x1="200" y1="240" x2="200" y2="264" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="200,272 193,262 207,262" fill="#55c555"/>
  <rect x="90" y="272" width="220" height="60" rx="6" fill="#0a1a0a" stroke="#55c555"/>
  <text x="200" y="294" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">파일 수정 → git add</text>
  <text x="200" y="312" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555">cherry-pick --continue</text>
  <text x="200" y="330" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">B' 커밋 생성 → C, D 계속</text>

  <!-- Option 2 (center): skip -->
  <line x1="420" y1="240" x2="420" y2="264" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="420,272 413,262 427,262" fill="#7777cc"/>
  <rect x="320" y="272" width="200" height="60" rx="6" fill="#0a0a1a" stroke="#7777cc"/>
  <text x="420" y="294" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7777cc">cherry-pick --skip</text>
  <text x="420" y="312" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">B 커밋 포기</text>
  <text x="420" y="330" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">C, D 계속 적용</text>

  <!-- Option 3 (right): abort -->
  <line x1="640" y1="240" x2="640" y2="264" stroke="#e05555" stroke-width="1.5"/>
  <polygon points="640,272 633,262 647,262" fill="#e05555"/>
  <rect x="540" y="272" width="200" height="60" rx="6" fill="#1a0808" stroke="#e05555"/>
  <text x="640" y="294" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#e05555">cherry-pick --abort</text>
  <text x="640" y="312" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">전체 취소</text>
  <text x="640" y="330" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">A' 도 롤백</text>

  <!-- Bottom: --no-commit tip -->
  <rect x="60" y="356" width="760" height="88" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1"/>
  <text x="88" y="380"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">-n 옵션: 여러 커밋을 하나로 합쳐 충돌 최소화</text>
  <text x="88" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" xml:space="preserve">git cherry-pick -n abc1234 def5678 ghi9012</text>
  <text x="88" y="424"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">세 커밋의 변경사항을 스테이지에 합산 → 충돌 한 번에 처리 → git commit</text>
</svg>
