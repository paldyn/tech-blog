<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Playwright E2E 테스트 흐름</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">코드 작성 → 실행 → 리포트 생성까지</text>

  <defs>
    <marker id="p1" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="p2" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="p3" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>

  <!-- Step boxes -->
  <rect x="60" y="110" width="140" height="80" rx="7" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="130" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">테스트 코드</text>
  <text x="130" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">.spec.ts 파일</text>
  <text x="130" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">page.goto · click</text>

  <line x1="200" y1="150" x2="240" y2="150" stroke="#7ec8e3" stroke-width="2" marker-end="url(#p1)"/>

  <rect x="242" y="110" width="140" height="80" rx="7" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="312" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">Playwright</text>
  <text x="312" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">테스트 러너</text>
  <text x="312" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">병렬 실행</text>

  <line x1="382" y1="150" x2="422" y2="150" stroke="#55c555" stroke-width="2" marker-end="url(#p2)"/>

  <rect x="424" y="110" width="140" height="80" rx="7" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="494" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">브라우저</text>
  <text x="494" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Chromium · Firefox</text>
  <text x="494" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">WebKit</text>

  <line x1="564" y1="150" x2="604" y2="150" stroke="#ce9178" stroke-width="2" marker-end="url(#p3)"/>

  <rect x="606" y="110" width="140" height="80" rx="7" fill="#111827" stroke="#ce9178" stroke-width="1.5"/>
  <text x="676" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#ce9178">HTML 리포트</text>
  <text x="676" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">스크린샷 · 트레이스</text>
  <text x="676" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">비디오 녹화</text>

  <!-- Playwright features -->
  <text x="440" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e8e8e8">Playwright 주요 기능</text>

  <rect x="60" y="258" width="180" height="90" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="150" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">자동 대기</text>
  <text x="150" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">요소 등장까지 자동</text>
  <text x="150" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">waitForSelector 불필요</text>
  <text x="150" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">플레이키 테스트 감소</text>

  <rect x="260" y="258" width="180" height="90" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="350" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">코드 생성</text>
  <text x="350" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">codegen 명령으로</text>
  <text x="350" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">클릭 녹화 → 코드 생성</text>
  <text x="350" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">초보자 친화적</text>

  <rect x="460" y="258" width="180" height="90" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="550" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">병렬 실행</text>
  <text x="550" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">여러 브라우저 동시</text>
  <text x="550" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">worker 기반 병렬화</text>
  <text x="550" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">실행 시간 단축</text>

  <rect x="660" y="258" width="160" height="90" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="740" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">API 모킹</text>
  <text x="740" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">route.fulfill()로</text>
  <text x="740" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">네트워크 가로채기</text>
  <text x="740" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">에러 시나리오 테스트</text>

  <!-- Bottom note -->
  <rect x="60" y="372" width="760" height="36" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="395" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">npx playwright test --ui  →  인터랙티브 UI 모드로 각 테스트 단계 시각화</text>
</svg>
