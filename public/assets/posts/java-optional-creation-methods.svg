<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Optional 생성 — of · empty · ofNullable</text>

  <!-- Three method boxes -->
  <!-- Optional.of -->
  <rect x="60" y="68" width="240" height="130" rx="8" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="180" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">Optional.of(T)</text>
  <text x="180" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">값이 반드시 존재할 때</text>
  <line x1="80" y1="126" x2="280" y2="126" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">null 전달 시</text>
  <text x="180" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">NullPointerException</text>
  <text x="180" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">즉시 발생</text>

  <!-- Optional.empty -->
  <rect x="320" y="68" width="240" height="130" rx="8" fill="#1a1a1a" stroke="#888" stroke-width="2"/>
  <text x="440" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888" text-anchor="middle">Optional.empty()</text>
  <text x="440" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">값이 없음을 명시할 때</text>
  <line x1="340" y1="126" x2="540" y2="126" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">인자 없음</text>
  <text x="440" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">항상 안전</text>
  <text x="440" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">싱글턴 인스턴스 반환</text>

  <!-- Optional.ofNullable -->
  <rect x="580" y="68" width="240" height="130" rx="8" fill="#1a1a0d" stroke="#b5cea8" stroke-width="2"/>
  <text x="700" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#b5cea8" text-anchor="middle">Optional.ofNullable(T)</text>
  <text x="700" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">null 가능성이 있을 때</text>
  <line x1="600" y1="126" x2="800" y2="126" stroke="#3a4a6e" stroke-width="1"/>
  <text x="700" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">null이면 empty 반환</text>
  <text x="700" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">항상 안전</text>
  <text x="700" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">레거시 코드 연동 시 사용</text>

  <!-- Decision flow -->
  <rect x="200" y="232" width="480" height="50" rx="8" fill="#1a0a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" text-anchor="middle">선택 기준: null이 절대 없음 → of() | null 가능 → ofNullable() | 없음 표현 → empty()</text>

  <!-- Code block -->
  <rect x="60" y="306" width="760" height="148" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 생성 방법별 예시</text>
  <text x="76" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">var</tspan><tspan fill="#ffffff"> a = Optional.of(</tspan><tspan fill="#ce9178">"hello"</tspan><tspan fill="#ffffff">);         </tspan><tspan fill="#9aa4b8">// OK</tspan></text>
  <text x="76" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">var</tspan><tspan fill="#ffffff"> b = Optional.of(</tspan><tspan fill="#7ec8e3" font-weight="600">null</tspan><tspan fill="#ffffff">);          </tspan><tspan fill="#9aa4b8">// NPE! 즉시 실패</tspan></text>
  <text x="76" y="388" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">var</tspan><tspan fill="#ffffff"> c = Optional.empty();             </tspan><tspan fill="#9aa4b8">// Optional&lt;Object&gt; empty</tspan></text>
  <text x="76" y="408" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">var</tspan><tspan fill="#ffffff"> d = Optional.ofNullable(str);     </tspan><tspan fill="#9aa4b8">// str이 null이면 empty</tspan></text>
  <text x="76" y="428" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">var</tspan><tspan fill="#ffffff"> e = Optional.ofNullable(</tspan><tspan fill="#7ec8e3" font-weight="600">null</tspan><tspan fill="#ffffff">);    </tspan><tspan fill="#9aa4b8">// == Optional.empty()</tspan></text>
  <text x="76" y="448" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">a.equals(Optional.of(</tspan><tspan fill="#ce9178">"hello"</tspan><tspan fill="#ffffff">));  </tspan><tspan fill="#9aa4b8">// true</tspan></text>
</svg>
