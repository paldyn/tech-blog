<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr-w" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">일반 저장소 vs Bare 저장소 구조 비교</text>

  <!-- LEFT: Normal repo -->
  <text x="200" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">일반 저장소</text>

  <!-- Working tree box -->
  <rect x="60" y="100" width="280" height="56" rx="8" fill="#1a2233" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="200" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">작업 트리 (Working Tree)</text>
  <text x="200" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">소스 파일, 편집 가능</text>

  <!-- .git box -->
  <rect x="60" y="174" width="280" height="56" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="200" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">.git/ 디렉터리</text>
  <text x="200" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">객체·refs·config…</text>

  <!-- .git sub-items -->
  <rect x="80" y="248" width="240" height="28" rx="5" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="200" y="267" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" text-anchor="middle">objects/ · refs/ · HEAD · config</text>

  <!-- Label: can edit -->
  <rect x="80" y="290" width="240" height="32" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="200" y="311" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">✓ 직접 편집·커밋 가능</text>

  <!-- Divider -->
  <line x1="440" y1="75" x2="440" y2="420" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- RIGHT: Bare repo -->
  <text x="660" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">Bare 저장소 (repo.git)</text>

  <!-- Bare: only git internals, no working tree -->
  <rect x="460" y="100" width="360" height="56" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Git 내부 디렉터리 (루트)</text>
  <text x="640" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">.git/ 내용이 최상위에 위치</text>

  <!-- Bare contents -->
  <rect x="480" y="174" width="320" height="28" rx="5" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="640" y="193" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" text-anchor="middle">objects/ · refs/ · HEAD · config</text>

  <!-- No working tree label -->
  <rect x="480" y="218" width="320" height="32" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="640" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">✗ 작업 트리 없음 — 직접 편집 불가</text>

  <!-- Use case label -->
  <rect x="480" y="264" width="320" height="32" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">✓ push 수신 전용 — 서버·미러용</text>

  <!-- Bottom comparison -->
  <rect x="60" y="358" width="760" height="70" rx="8" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="440" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">주요 차이점 요약</text>
  <text x="200" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">일반: 개발 작업용</text>
  <text x="440" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#555" text-anchor="middle">|</text>
  <text x="660" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Bare: 공유·배포 허브</text>
</svg>
