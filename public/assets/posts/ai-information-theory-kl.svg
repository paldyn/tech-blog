<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520" style="background:#0a0a0a;border-radius:12px">
  <!-- Header -->
  <rect x="0" y="0" width="880" height="72" rx="12" fill="#0d1a2a"/>
  <rect x="0" y="60" width="880" height="12" fill="#0d1a2a"/>
  <text x="60" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#ffffff">KL 발산과 교차 엔트로피</text>
  <text x="60" y="62" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">두 확률 분포 사이의 거리를 측정하는 방법</text>
  <line x1="60" y1="82" x2="820" y2="82" stroke="#1e2433" stroke-width="1"/>

  <!-- LEFT: KL Divergence -->
  <text x="60" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">KL 발산 (Kullback-Leibler Divergence)</text>
  <rect x="60" y="115" width="360" height="80" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="80" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7ec8e3" font-weight="600">D_KL(P ‖ Q) = Σ P(x) · log(P(x)/Q(x))</text>
  <text x="80" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">P: 실제(정답) 분포 / Q: 모델이 학습한 근사 분포</text>
  <text x="80" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">D_KL ≥ 0, P=Q일 때만 0  (비대칭: D_KL(P‖Q) ≠ D_KL(Q‖P))</text>

  <!-- Distribution bars comparison -->
  <text x="60" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">분포 비교 시각화</text>
  <rect x="60" y="222" width="360" height="130" rx="8" fill="#0d1520" stroke="#1e2433"/>
  <!-- P distribution bars -->
  <text x="80" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" font-weight="600">실제 P</text>
  <rect x="80" y="248" width="20" height="60" fill="#7ec8e3" rx="2" opacity="0.8"/>
  <rect x="110" y="268" width="20" height="40" fill="#7ec8e3" rx="2" opacity="0.8"/>
  <rect x="140" y="280" width="20" height="28" fill="#7ec8e3" rx="2" opacity="0.8"/>
  <rect x="170" y="292" width="20" height="16" fill="#7ec8e3" rx="2" opacity="0.8"/>
  <text x="80" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">A</text>
  <text x="110" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">B</text>
  <text x="140" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">C</text>
  <text x="170" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">D</text>
  <!-- Q distribution bars -->
  <text x="230" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ce9178" font-weight="600">근사 Q</text>
  <rect x="230" y="270" width="20" height="38" fill="#ce9178" rx="2" opacity="0.8"/>
  <rect x="260" y="258" width="20" height="50" fill="#ce9178" rx="2" opacity="0.8"/>
  <rect x="290" y="272" width="20" height="36" fill="#ce9178" rx="2" opacity="0.8"/>
  <rect x="320" y="286" width="20" height="22" fill="#ce9178" rx="2" opacity="0.8"/>
  <text x="230" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">A</text>
  <text x="260" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">B</text>
  <text x="290" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">C</text>
  <text x="320" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">D</text>
  <text x="100" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">D_KL(P‖Q) = 차이가 클수록 증가</text>

  <!-- RIGHT: Cross-Entropy Relation -->
  <text x="460" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">교차 엔트로피와의 관계</text>
  <rect x="460" y="115" width="360" height="130" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="1"/>
  <text x="480" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7777cc" font-weight="600">H(P, Q) = H(P) + D_KL(P ‖ Q)</text>
  <line x1="480" y1="152" x2="800" y2="152" stroke="#333" stroke-width="1"/>
  <text x="480" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">교차 엔트로피 = 자체 엔트로피 + KL 발산</text>
  <text x="480" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">P가 고정되면 H(P)는 상수 → H(P,Q) 최소화</text>
  <text x="480" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">= D_KL(P‖Q) 최소화 = Q를 P에 가깝게</text>
  <text x="480" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">→ 딥러닝 학습의 목표: Q(모델)를 P(정답)에 근사</text>

  <!-- Mutual Information -->
  <text x="460" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">상호 정보량 (Mutual Information)</text>
  <rect x="460" y="274" width="360" height="78" rx="8" fill="#0d1520" stroke="#1e2433"/>
  <text x="480" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">I(X;Y) = H(X) + H(Y) − H(X,Y)</text>
  <text x="480" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">두 변수 X, Y가 서로 얼마나 정보를 공유하는지</text>
  <text x="480" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">특성 선택, 압축, GAN 학습 등에 활용</text>

  <!-- Code box -->
  <text x="60" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Python: KL 발산과 교차 엔트로피 계산</text>
  <rect x="60" y="382" width="760" height="90" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="404" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">import</text>
  <text x="124" y="404" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">numpy as np</text>
  <text x="76" y="422" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">P = np.array([</text>
  <text x="180" y="422" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">0.5, 0.3, 0.15, 0.05</text>
  <text x="360" y="422" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">])  </text>
  <text x="396" y="422" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 실제 분포</text>
  <text x="76" y="440" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Q = np.array([</text>
  <text x="180" y="440" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">0.4, 0.35, 0.15, 0.1</text>
  <text x="352" y="440" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">])   </text>
  <text x="396" y="440" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 근사 분포</text>
  <text x="76" y="458" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">kl = np.sum(P * np.log(P / Q))         </text>
  <text x="432" y="458" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># D_KL(P‖Q)</text>
  <text x="76" y="464" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">cross_h = -np.sum(P * np.log(Q))       </text>
  <text x="432" y="464" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># H(P,Q)</text>

  <!-- Footer -->
  <text x="440" y="508" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈</text>
</svg>
