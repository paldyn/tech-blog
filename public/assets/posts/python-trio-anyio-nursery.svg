<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="nuArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">구조적 동시성 — nursery</text>

  <rect x="60" y="90" width="760" height="200" fill="#11161f" stroke="#55c555" stroke-width="1.5" rx="10"/>
  <text x="84" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555">async with open_nursery() as n:</text>

  <rect x="110" y="150" width="200" height="50" fill="#222222" stroke="#555555" stroke-width="1" rx="6"/>
  <text x="210" y="181" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">자식 작업 A</text>
  <rect x="340" y="150" width="200" height="50" fill="#222222" stroke="#555555" stroke-width="1" rx="6"/>
  <text x="440" y="181" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">자식 작업 B</text>
  <rect x="570" y="150" width="200" height="50" fill="#222222" stroke="#555555" stroke-width="1" rx="6"/>
  <text x="670" y="181" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">자식 작업 C</text>

  <text x="84" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">블록을 벗어나기 전에 모든 자식이 끝나야 한다</text>
  <text x="84" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">하나라도 실패하면 나머지 자동 취소 → 누수 없음</text>

  <text x="60" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">작업의 생애가 블록 범위에 묶여 추적과 정리가 명확하다</text>
</svg>
