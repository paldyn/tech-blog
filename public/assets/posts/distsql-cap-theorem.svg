<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a;border-radius:12px;">
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">CAP 정리와 분산 데이터베이스의 위치</text>

  <!-- Triangle -->
  <!-- C (Consistency) top -->
  <polygon points="440,76 180,380 700,380" fill="none" stroke="#555" stroke-width="1.5"/>

  <!-- C vertex -->
  <circle cx="440" cy="76" r="48" fill="#111133" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">C</text>
  <text x="440" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Consistency</text>
  <text x="440" y="103" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">일관성</text>

  <!-- A vertex -->
  <circle cx="180" cy="380" r="48" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="180" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">A</text>
  <text x="180" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Availability</text>
  <text x="180" y="407" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">가용성</text>

  <!-- P vertex -->
  <circle cx="700" cy="380" r="48" fill="#1a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="700" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">P</text>
  <text x="700" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Partition</text>
  <text x="700" y="407" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">분할 내성</text>

  <!-- DB positions -->
  <!-- CA: Traditional RDBMS (left-top edge) -->
  <circle cx="310" cy="228" r="26" fill="#111133" stroke="#7777cc" stroke-width="1.5"/>
  <text x="310" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" font-weight="700" fill="#7777cc" text-anchor="middle">CA</text>
  <text x="310" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#888" text-anchor="middle">단일 RDBMS</text>
  <text x="244" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">Oracle/PG/MySQL</text>

  <!-- CP: HBase, Zookeeper, CockroachDB -->
  <circle cx="570" cy="228" r="26" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="570" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" font-weight="700" fill="#e05555" text-anchor="middle">CP</text>
  <text x="570" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#888" text-anchor="middle">분산 일관성</text>
  <text x="572" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">CockroachDB, Spanner</text>

  <!-- AP: Cassandra, DynamoDB -->
  <circle cx="440" cy="360" r="26" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" font-weight="700" fill="#55c555" text-anchor="middle">AP</text>
  <text x="440" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#888" text-anchor="middle">고가용성</text>
  <text x="380" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">Cassandra, DynamoDB</text>

  <!-- Legend -->
  <rect x="60" y="440" width="760" height="24" rx="6" fill="#0d0d0d" stroke="#333" stroke-width="1"/>
  <text x="440" y="457" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">분산 환경에서 P(네트워크 분할)는 피할 수 없음 → C와 A 중 하나를 선택해야 함 (CAP 트레이드오프)</text>
</svg>
