<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">children 활용 컴포지션 패턴</text>

  <!-- Pattern 1: Layout component -->
  <text x="220" y="74" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">레이아웃 컴포넌트</text>
  <rect x="60" y="84" width="320" height="160" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <rect x="76" y="96" width="288" height="140" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve">
    <tspan x="92" y="116" fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> PageLayout({ children }) {</tspan>
    <tspan x="92" dy="18" fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> (</tspan>
    <tspan x="92" dy="18" fill="#ffffff">    </tspan><tspan fill="#ce9178">&lt;div</tspan><tspan fill="#ffffff"> className=</tspan><tspan fill="#ce9178">"layout"</tspan><tspan fill="#ce9178">&gt;</tspan>
    <tspan x="92" dy="18" fill="#ffffff">      </tspan><tspan fill="#ce9178">&lt;Header</tspan><tspan fill="#ffffff"> /&gt;</tspan>
    <tspan x="92" dy="18" fill="#ffffff">      </tspan><tspan fill="#ce9178">&lt;main&gt;</tspan><tspan fill="#ffffff">{children}</tspan><tspan fill="#ce9178">&lt;/main&gt;</tspan>
    <tspan x="92" dy="18" fill="#ffffff">      </tspan><tspan fill="#ce9178">&lt;Footer</tspan><tspan fill="#ffffff"> /&gt;</tspan>
    <tspan x="92" dy="18" fill="#ce9178">    &lt;/div&gt;</tspan>
  </text>

  <!-- Pattern 2: Slot pattern -->
  <text x="660" y="74" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">슬롯 패턴 (여러 영역)</text>
  <rect x="500" y="84" width="320" height="160" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <rect x="516" y="96" width="288" height="140" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve">
    <tspan x="532" y="116" fill="#9aa4b8">// header/footer를 prop으로 받기</tspan>
    <tspan x="532" dy="18" fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> Dialog({</tspan>
    <tspan x="532" dy="18" fill="#ffffff">  header, children, footer</tspan>
    <tspan x="532" dy="18" fill="#ffffff">}) {</tspan>
    <tspan x="532" dy="18" fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> (</tspan>
    <tspan x="532" dy="18" fill="#ffffff">    </tspan><tspan fill="#ce9178">&lt;div</tspan><tspan fill="#ffffff"> className=</tspan><tspan fill="#ce9178">"dialog"</tspan><tspan fill="#ce9178">&gt;</tspan>
    <tspan x="532" dy="18" fill="#ffffff">      {header} {children} {footer}</tspan>
  </text>

  <!-- Pattern 3: render prop / function children -->
  <text x="220" y="278" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">함수 children (Render Prop)</text>
  <rect x="60" y="288" width="320" height="148" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <rect x="76" y="300" width="288" height="128" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve">
    <tspan x="92" y="320" fill="#9aa4b8">// children이 함수인 경우</tspan>
    <tspan x="92" dy="18" fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> DataLoader({ url, children }) {</tspan>
    <tspan x="92" dy="18" fill="#7ec8e3" font-weight="600">  const</tspan><tspan fill="#ffffff"> data = useFetch(url);</tspan>
    <tspan x="92" dy="18" fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> children(data);</tspan>
    <tspan x="92" dy="18" fill="#ffffff">}</tspan>
    <tspan x="92" dy="18" fill="#9aa4b8">// 사용: {data =&gt; &lt;List data={data}/&gt;}</tspan>
  </text>

  <!-- Pattern 4: conditional children -->
  <text x="660" y="278" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">children 유무에 따른 분기</text>
  <rect x="500" y="288" width="320" height="148" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <rect x="516" y="300" width="288" height="128" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve">
    <tspan x="532" y="320" fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> Button({ children, icon }) {</tspan>
    <tspan x="532" dy="18" fill="#7ec8e3" font-weight="600">  if</tspan><tspan fill="#ffffff"> (!children &amp;&amp; !icon)</tspan>
    <tspan x="532" dy="18" fill="#7ec8e3" font-weight="600">    return</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">null</tspan><tspan fill="#ffffff">;</tspan>
    <tspan x="532" dy="18" fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> (</tspan>
    <tspan x="532" dy="18" fill="#ffffff">    </tspan><tspan fill="#ce9178">&lt;button&gt;</tspan>
    <tspan x="532" dy="18" fill="#ffffff">      {icon} {children}</tspan>
  </text>

  <!-- Bottom tip -->
  <text x="440" y="450" text-anchor="middle" font-size="12" fill="#888">children은 React에서 컴포지션의 핵심 수단 — 상속 대신 children으로 UI 조합(컴포지션)을 구현한다</text>
</svg>
