<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;background:#0a0a0a">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">children 활용 패턴</text>
  <text x="440" y="72" font-size="14" fill="#888" text-anchor="middle">래퍼 컴포넌트, 슬롯 패턴, 조건부 children</text>

  <!-- Pattern 1: Layout Wrapper -->
  <rect x="55" y="95" width="370" height="175" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="118" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">레이아웃 래퍼</text>
  <rect x="70" y="128" width="340" height="128" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="148" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// 공통 레이아웃 컴포넌트</text>
  <text x="82" y="166" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">function</text>
  <text x="125" y="166" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> PageLayout({ children }) {</text>
  <text x="82" y="184" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">  return</text>
  <text x="126" y="184" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> (</text>
  <text x="82" y="202" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">    &lt;div className=</text>
  <text x="191" y="202" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">"page"</text>
  <text x="229" y="202" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&gt;</text>
  <text x="82" y="220" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">      &lt;Nav /&gt;</text>
  <text x="82" y="238" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">      {children}</text>

  <!-- Pattern 2: Slot Pattern -->
  <rect x="455" y="95" width="370" height="175" rx="8" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="118" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">슬롯 패턴 (Named Children)</text>
  <rect x="470" y="128" width="340" height="128" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="148" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// header, footer도 prop으로</text>
  <text x="482" y="166" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">function</text>
  <text x="525" y="166" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> Modal({ header, footer, children }) {</text>
  <text x="482" y="184" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">  return</text>
  <text x="526" y="184" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> (</text>
  <text x="482" y="202" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">    &lt;dialog&gt;</text>
  <text x="482" y="220" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">      &lt;header&gt;{header}&lt;/header&gt;</text>
  <text x="482" y="238" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">      &lt;main&gt;{children}&lt;/main&gt;</text>

  <!-- Pattern 3: Conditional children -->
  <rect x="55" y="295" width="370" height="155" rx="8" fill="#111" stroke="#ce9178" stroke-width="1.5"/>
  <text x="240" y="318" font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">조건부 children 렌더링</text>
  <rect x="70" y="328" width="340" height="108" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="348" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// children 있을 때만 래퍼 렌더</text>
  <text x="82" y="366" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">function</text>
  <text x="125" y="366" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> Tooltip({ tip, children }) {</text>
  <text x="82" y="384" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">  if</text>
  <text x="100" y="384" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> (!children) </text>
  <text x="82" y="402" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">    return</text>
  <text x="126" y="402" font-size="13" fill="#b5cea8" font-family="'JetBrains Mono',monospace" xml:space="preserve"> null</text>
  <text x="82" y="420" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">  return</text>
  <text x="126" y="420" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> &lt;span title={tip}&gt;{children}&lt;/span&gt;</text>

  <!-- Pattern 4: Render function -->
  <rect x="455" y="295" width="370" height="155" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="318" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">함수 children (Render Props)</text>
  <rect x="470" y="328" width="340" height="108" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="348" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// children이 함수일 수도 있다</text>
  <text x="482" y="366" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&lt;DataLoader url=</text>
  <text x="577" y="366" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">"/api/users"</text>
  <text x="656" y="366" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&gt;</text>
  <text x="482" y="384" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">  {data =&gt;</text>
  <text x="482" y="402" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">    &lt;UserList users={data} /&gt;</text>
  <text x="482" y="420" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">  }</text>
  <text x="482" y="438" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&lt;/DataLoader&gt;</text>
</svg>
