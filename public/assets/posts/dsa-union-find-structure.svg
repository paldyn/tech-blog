<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr-uf" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">유니온 파인드 — 경로 압축 &amp; 랭크 합치기</text>

  <!-- Before path compression (left) -->
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">① 초기 상태 (각자 루트)</text>

  <circle cx="90" cy="120" r="20" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="90" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">0</text>
  <circle cx="150" cy="120" r="20" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="150" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">1</text>
  <circle cx="210" cy="120" r="20" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="210" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">2</text>
  <circle cx="270" cy="120" r="20" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="270" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">3</text>
  <circle cx="330" cy="120" r="20" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="330" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">4</text>

  <text x="90" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">p[0]=0</text>
  <text x="150" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">p[1]=1</text>
  <text x="210" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">p[2]=2</text>
  <text x="270" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">p[3]=3</text>
  <text x="330" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">p[4]=4</text>

  <!-- After union(0,1), union(2,3), union(1,2) (middle left) -->
  <text x="60" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">② union(0,1) → union(1,2) → union(2,3) 후</text>

  <!-- Tree: 0 as root, 1,2,3 as children -->
  <circle cx="210" cy="240" r="22" fill="#1a3a1a" stroke="#55c555" stroke-width="2.5"/>
  <text x="210" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle" font-weight="700">0*</text>

  <circle cx="150" cy="310" r="20" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="150" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">1</text>
  <circle cx="210" cy="310" r="20" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="210" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">2</text>
  <circle cx="270" cy="310" r="20" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="270" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">3</text>
  <circle cx="330" cy="240" r="20" fill="#2e1a1a" stroke="#e05555" stroke-width="2"/>
  <text x="330" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">4*</text>
  <text x="332" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">별도</text>

  <line x1="196" y1="262" x2="163" y2="292" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-uf)"/>
  <line x1="210" y1="262" x2="210" y2="290" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-uf)"/>
  <line x1="224" y1="262" x2="257" y2="292" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-uf)"/>

  <!-- Path compression illustration (right) -->
  <text x="460" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">③ 경로 압축 — find(3) 호출 시</text>

  <!-- Before -->
  <text x="460" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">압축 전 체인: 3→2→1→0</text>
  <circle cx="530" cy="130" r="18" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="530" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">3</text>
  <circle cx="590" cy="130" r="18" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="590" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">2</text>
  <circle cx="650" cy="130" r="18" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="650" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">1</text>
  <circle cx="710" cy="130" r="18" fill="#1a3a1a" stroke="#55c555" stroke-width="2.5"/>
  <text x="710" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle" font-weight="700">0</text>

  <line x1="548" y1="130" x2="572" y2="130" stroke="#888" stroke-width="1.5" marker-end="url(#arr-uf)"/>
  <line x1="608" y1="130" x2="632" y2="130" stroke="#888" stroke-width="1.5" marker-end="url(#arr-uf)"/>
  <line x1="668" y1="130" x2="692" y2="130" stroke="#888" stroke-width="1.5" marker-end="url(#arr-uf)"/>

  <!-- After -->
  <text x="460" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">압축 후: 모두 루트(0)를 직접 가리킴</text>
  <circle cx="620" cy="230" r="22" fill="#1a3a1a" stroke="#55c555" stroke-width="2.5"/>
  <text x="620" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle" font-weight="700">0</text>
  <circle cx="530" cy="300" r="18" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="530" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">1</text>
  <circle cx="590" cy="300" r="18" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="590" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">2</text>
  <circle cx="650" cy="300" r="18" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="650" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">3</text>

  <line x1="598" y1="248" x2="538" y2="284" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-uf)"/>
  <line x1="612" y1="252" x2="594" y2="284" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-uf)"/>
  <line x1="630" y1="252" x2="648" y2="284" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-uf)"/>

  <!-- Complexity -->
  <rect x="460" y="338" width="370" height="88" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="645" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">최적화 효과</text>
  <text x="476" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">경로 압축만: O(log n) amortized</text>
  <text x="476" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">랭크 + 경로 압축: O(α(n)) amortized</text>
  <text x="476" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">α(n): 역아커만 함수 — 실질적으로 ≤ 5</text>

  <text x="60" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">활용: 크루스칼 MST, 연결 컴포넌트, 사이클 감지, 네트워크 연결 판별</text>
  <text x="60" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">동적 연결성 쿼리: "지금까지 추가된 간선으로 u와 v가 연결됐나?"</text>
</svg>
