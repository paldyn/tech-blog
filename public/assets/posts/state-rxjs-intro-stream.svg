<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="45" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">RxJS — Observable 스트림</text>

  <!-- ===== ROW 1: of(1,2,3) ===== -->
  <text x="80" y="95"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">of(1, 2, 3)</text>
  <line x1="80" y1="115" x2="780" y2="115" stroke="#555" stroke-width="2"/>
  <!-- Arrow head on timeline -->
  <polygon points="780,110 792,115 780,120" fill="#555"/>

  <!-- Circles: 1, 2, 3 -->
  <circle cx="220" cy="115" r="18" fill="#0a1020" stroke="#7ec8e3" stroke-width="2"/>
  <text x="220" y="120" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">1</text>

  <circle cx="370" cy="115" r="18" fill="#0a1020" stroke="#7ec8e3" stroke-width="2"/>
  <text x="370" y="120" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">2</text>

  <circle cx="520" cy="115" r="18" fill="#0a1020" stroke="#7ec8e3" stroke-width="2"/>
  <text x="520" y="120" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">3</text>

  <!-- Complete marker -->
  <line x1="620" y1="100" x2="620" y2="130" stroke="#888" stroke-width="2.5"/>
  <text x="624" y="97"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">complete</text>

  <!-- ===== ROW 2: interval → map(×2) ===== -->
  <text x="80" y="175"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">interval → map(×2)</text>
  <line x1="80" y1="193" x2="780" y2="193" stroke="#555" stroke-width="2"/>
  <polygon points="780,188 792,193 780,198" fill="#555"/>

  <circle cx="220" cy="193" r="18" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="220" y="198" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">0</text>

  <circle cx="370" cy="193" r="18" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="370" y="198" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">2</text>

  <circle cx="520" cy="193" r="18" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="520" y="198" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">4</text>

  <line x1="620" y1="178" x2="620" y2="208" stroke="#888" stroke-width="2.5"/>
  <text x="624" y="175"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">complete</text>

  <!-- take(3) label -->
  <text x="440" y="218"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">interval(1000) | take(3) | map(n =&gt; n*2)</text>

  <!-- ===== ROW 3: click → debounce → switchMap ===== -->
  <text x="80" y="250"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#b07ec8">click → debounce → switchMap</text>
  <line x1="80" y1="270" x2="780" y2="270" stroke="#555" stroke-width="2"/>
  <polygon points="780,265 792,270 780,275" fill="#555"/>

  <!-- Rapid clicks (small gray circles) -->
  <circle cx="160" cy="270" r="10" fill="#222" stroke="#555" stroke-width="1.5"/>
  <text x="160" y="274" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#777">c</text>

  <circle cx="195" cy="270" r="10" fill="#222" stroke="#555" stroke-width="1.5"/>
  <text x="195" y="274" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#777">c</text>

  <circle cx="225" cy="270" r="10" fill="#222" stroke="#555" stroke-width="1.5"/>
  <text x="225" y="274" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#777">c</text>

  <!-- Debounce dotted line -->
  <line x1="225" y1="270" x2="330" y2="270" stroke="#b07ec8" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="277" y="261"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">300ms</text>

  <!-- Debounced emission -->
  <circle cx="330" cy="270" r="18" fill="#1a0a1a" stroke="#b07ec8" stroke-width="2"/>
  <text x="330" y="274" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#b07ec8">API</text>

  <!-- switchMap result -->
  <circle cx="500" cy="270" r="18" fill="#1a0a1a" stroke="#b07ec8" stroke-width="2"/>
  <text x="500" y="274" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#b07ec8">결과</text>

  <!-- ===== OPERATOR LIST BOX ===== -->
  <rect x="60" y="310" width="760" height="100" fill="#111" stroke="#333" rx="8"/>
  <text x="80" y="332"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">주요 연산자</text>

  <!-- 생성 -->
  <text x="80" y="355"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">생성</text>
  <text x="80" y="373"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">of, from, interval, fromEvent, ajax</text>

  <!-- 변환 -->
  <text x="280" y="355"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">변환</text>
  <text x="280" y="373"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">map, switchMap, mergeMap, concatMap</text>

  <!-- 필터 -->
  <text x="490" y="355"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8c55a">필터</text>
  <text x="490" y="373"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8c55a">filter, take, debounceTime, distinctUntilChanged</text>

  <!-- 결합 -->
  <text x="690" y="355"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#b07ec8">결합</text>
  <text x="690" y="373"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#b07ec8">combineLatest, forkJoin, merge, zip</text>
</svg>
