<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">단락 평가 실전 활용 패턴</text>

  <!-- &amp;&amp; patterns -->
  <rect x="60" y="72" width="360" height="150" fill="#111827" rx="8" stroke="#3a4a6e"/>
  <text x="240" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">&amp;&amp; 단락 평가 패턴</text>
  <rect x="84" y="116" width="312" height="90" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="100" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 조건부 실행 (if 단축)</text>
  <text x="100" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">isLoggedIn &amp;&amp; showDashboard();</text>
  <text x="100" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// JSX 조건부 렌더링</text>
  <text x="100" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">{isAdmin &amp;&amp; &lt;AdminPanel /&gt;}</text>

  <!-- || patterns -->
  <rect x="460" y="72" width="360" height="150" fill="#111827" rx="8" stroke="#3a4a6e"/>
  <text x="640" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7777cc" text-anchor="middle">|| &amp; ?? 기본값 패턴</text>
  <rect x="484" y="116" width="312" height="90" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="500" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// ?? 가 더 안전한 기본값</text>
  <text x="500" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> name = user.name ?? </tspan><tspan fill="#ce9178">'익명'</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="500" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> port = config.port ?? </tspan><tspan fill="#b5cea8">3000</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="500" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 0이나 '' 도 유효하면 ??</text>

  <!-- Combined usage -->
  <text x="60" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">조합 활용 &amp; 주의사항</text>
  <rect x="60" y="270" width="760" height="110" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="80" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// ?? 와 || 혼합은 괄호 필요 (SyntaxError 방지)</text>
  <text x="80" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">a ?? b || c;   </text><text x="212" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">// SyntaxError</text>
  <text x="80" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(a ?? b) || c; </text><text x="226" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">// OK</text>
  <text x="80" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// ??= 패턴: 초기화 시 기존값 보호</text>
  <text x="80" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">function</text><text x="138" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> init(config) {</text>
  <text x="80" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  config.timeout ??= </tspan><tspan fill="#b5cea8">5000</tspan><tspan fill="#ffffff">; config.retries ??= </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff">; }</tspan></text>

  <!-- Footer -->
</svg>
