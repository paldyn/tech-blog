<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">infer 고급 패턴 — 배열·튜플·재귀</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle" xml:space="preserve">복잡한 타입 구조를 분해하는 기법</text>

  <!-- Left: Array element type -->
  <rect x="60" y="98" width="360" height="152" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
  <text x="240" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">배열 요소 타입 추출</text>
  <text x="76" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">type ElementOf&lt;T&gt; =</text>
  <text x="76" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  T extends (infer E)[] ? E : never;</text>
  <text x="76" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">// ElementOf&lt;string[]&gt; → string</text>
  <text x="76" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// 튜플 첫 번째 요소</text>
  <text x="76" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">type Head&lt;T extends any[]&gt; =</text>
  <text x="76" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  T extends [infer H, ...any[]] ? H : never;</text>

  <!-- Right: Tail and recursive -->
  <rect x="460" y="98" width="360" height="152" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
  <text x="640" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" text-anchor="middle" xml:space="preserve">튜플 나머지·재귀 뒤집기</text>
  <text x="476" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// Tail: 첫 번째 제외</text>
  <text x="476" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">type Tail&lt;T extends any[]&gt; =</text>
  <text x="476" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  T extends [any, ...infer R] ? R : [];</text>
  <text x="476" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// Reverse: 재귀로 뒤집기</text>
  <text x="476" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">type Reverse&lt;T extends any[]&gt; =</text>
  <text x="476" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  T extends [infer H, ...infer R]</text>

  <!-- TS 4.7+ infer constraint -->
  <rect x="60" y="272" width="760" height="128" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle" xml:space="preserve">TS 4.7+ — infer에 제약 추가</text>
  <text x="76" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// infer R extends string: R를 string으로 좁힘</text>
  <text x="76" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">type StringReturn&lt;T&gt; = T extends () =&gt; infer R extends string</text>
  <text x="76" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  ? R : never;</text>
  <text x="76" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">// StringReturn&lt;() =&gt; "hello"&gt; → "hello" (리터럴 타입 유지)</text>

  <!-- Bottom note -->
  <rect x="60" y="420" width="760" height="22" rx="4" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="440" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">infer는 타입 레벨 패턴 매칭이다 — 런타임에는 존재하지 않음</text>
</svg>
