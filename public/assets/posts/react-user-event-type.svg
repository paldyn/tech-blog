<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 430" style="background:#0a0a0a;border-radius:12px;">
  <defs>
    <marker id="arrBlue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">user.type(input, 'ab')의 이벤트 시퀀스</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">한 글자마다 실제 키 입력 이벤트가 모두 발생한다</text>

  <!-- Row 1: char 'a' -->
  <text x="100" y="148" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#e8e8e8">'a'</text>

  <rect x="180" y="120" width="140" height="44" rx="6" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="2"/>
  <text x="250" y="147" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">keydown</text>
  <line x1="320" y1="142" x2="344" y2="142" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrBlue)"/>

  <rect x="344" y="120" width="140" height="44" rx="6" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="2"/>
  <text x="414" y="147" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">keypress</text>
  <line x1="484" y1="142" x2="508" y2="142" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrBlue)"/>

  <rect x="508" y="120" width="140" height="44" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="2"/>
  <text x="578" y="139" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#55c555">input</text>
  <text x="578" y="156" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">value: "a"</text>
  <line x1="648" y1="142" x2="672" y2="142" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrBlue)"/>

  <rect x="672" y="120" width="140" height="44" rx="6" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="2"/>
  <text x="742" y="147" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">keyup</text>

  <!-- Row 2: char 'b' -->
  <text x="100" y="228" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#e8e8e8">'b'</text>

  <rect x="180" y="200" width="140" height="44" rx="6" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="2"/>
  <text x="250" y="227" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">keydown</text>
  <line x1="320" y1="222" x2="344" y2="222" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrBlue)"/>

  <rect x="344" y="200" width="140" height="44" rx="6" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="2"/>
  <text x="414" y="227" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">keypress</text>
  <line x1="484" y1="222" x2="508" y2="222" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrBlue)"/>

  <rect x="508" y="200" width="140" height="44" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="2"/>
  <text x="578" y="219" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#55c555">input</text>
  <text x="578" y="236" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">value: "ab"</text>
  <line x1="648" y1="222" x2="672" y2="222" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrBlue)"/>

  <rect x="672" y="200" width="140" height="44" rx="6" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="2"/>
  <text x="742" y="227" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">keyup</text>

  <!-- Info box -->
  <rect x="180" y="288" width="540" height="70" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="450" y="316" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">fireEvent.change는 value를 한 번에 바꿔치기하지만,</text>
  <text x="450" y="338" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">user.type은 글자마다 onChange가 호출되어 검증 로직까지 테스트된다</text>

  <text x="440" y="398" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">글자 수 제한(maxlength), 입력 중 포맷팅 같은 동작도 그대로 재현된다</text>
</svg>
