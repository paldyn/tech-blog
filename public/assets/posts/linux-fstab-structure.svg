<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">/etc/fstab 구조 — 6개 필드</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">부팅 시 자동 마운트되는 항목을 공백(탭) 구분 6개 컬럼으로 정의</text>

  <!-- fstab example line -->
  <rect x="60" y="90" width="760" height="52" fill="#070b14" rx="8" stroke="#1e2433" stroke-width="1.5"/>
  <text x="76" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0" xml:space="preserve"># &lt;장치&gt;              &lt;마운트포인트&gt;  &lt;타입&gt;  &lt;옵션&gt;          &lt;dump&gt;  &lt;pass&gt;</text>
  <text x="76" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" xml:space="preserve">UUID=abc123-def456   /              ext4    defaults,noatime  0       1</text>

  <!-- Field breakdown arrows + boxes -->
  <!-- Field 1: Device -->
  <line x1="140" y1="142" x2="140" y2="168" stroke="#7ec8e3" stroke-width="1.5"/>
  <rect x="60" y="168" width="160" height="56" fill="#071420" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">① 장치</text>
  <text x="140" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">UUID= / LABEL= /</text>
  <text x="140" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">/dev/sda1</text>

  <!-- Field 2: Mount point -->
  <line x1="290" y1="142" x2="290" y2="168" stroke="#55c555" stroke-width="1.5"/>
  <rect x="236" y="168" width="108" height="56" fill="#071a07" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="290" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">② 마운트 포인트</text>
  <text x="290" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">/  /home</text>
  <text x="290" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">/mnt/data</text>

  <!-- Field 3: Type -->
  <line x1="400" y1="142" x2="400" y2="168" stroke="#ce9178" stroke-width="1.5"/>
  <rect x="358" y="168" width="84" height="56" fill="#1a0e07" rx="6" stroke="#ce9178" stroke-width="1.5"/>
  <text x="400" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">③ 타입</text>
  <text x="400" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">ext4 xfs</text>
  <text x="400" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">vfat btrfs</text>

  <!-- Field 4: Options -->
  <line x1="546" y1="142" x2="546" y2="168" stroke="#7777cc" stroke-width="1.5"/>
  <rect x="456" y="168" width="180" height="56" fill="#0d0d1a" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="546" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">④ 마운트 옵션</text>
  <text x="546" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">defaults, noatime</text>
  <text x="546" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">ro, nosuid, noexec</text>

  <!-- Field 5: dump -->
  <line x1="700" y1="142" x2="700" y2="168" stroke="#888" stroke-width="1.5"/>
  <rect x="658" y="168" width="84" height="56" fill="#111111" rx="6" stroke="#444" stroke-width="1.5"/>
  <text x="700" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">⑤ dump</text>
  <text x="700" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">0 = 백업 안 함</text>
  <text x="700" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">1 = dump 대상</text>

  <!-- Field 6: pass -->
  <line x1="800" y1="142" x2="800" y2="168" stroke="#888" stroke-width="1.5"/>
  <rect x="758" y="168" width="62" height="56" fill="#111111" rx="6" stroke="#444" stroke-width="1.5"/>
  <text x="789" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">⑥ pass</text>
  <text x="789" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">0=없음</text>
  <text x="789" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">1=루트</text>

  <!-- Examples section -->
  <text x="60" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">실제 /etc/fstab 예시</text>
  <rect x="60" y="284" width="760" height="148" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="305" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># 루트 파일시스템</text>
  <text x="76" y="323" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">UUID=1234-abcd  /         ext4   defaults,noatime   0  1</text>
  <text x="76" y="345" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># /home 별도 파티션</text>
  <text x="76" y="363" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">UUID=5678-efgh  /home     ext4   defaults           0  2</text>
  <text x="76" y="385" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># 스왑</text>
  <text x="76" y="403" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">UUID=9999-xxxx  none      swap   sw                 0  0</text>
  <text x="76" y="421" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># tmpfs</text>
  <text x="76" y="418" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">tmpfs           /tmp      tmpfs  nosuid,nodev,size=1g 0  0</text>
</svg>
