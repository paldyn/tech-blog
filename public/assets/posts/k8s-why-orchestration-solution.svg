<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">오케스트레이션이 해결하는 4가지 문제</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Problem → K8s Solution</text>

  <!-- Problem 1 -->
  <rect x="60" y="96" width="360" height="80" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="80" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555">문제: 컨테이너 수동 배치</text>
  <text x="80" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">어느 서버에 실행해야 자원을 효율적으로 쓸까?</text>
  <text x="80" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">서버마다 직접 SSH → docker run 반복</text>

  <line x1="422" y1="136" x2="448" y2="136" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="450" y="96" width="370" height="80" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="470" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">해결: Scheduler 자동 배치</text>
  <text x="470" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">CPU/메모리 여유 있는 노드에 자동 스케줄링</text>
  <text x="470" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">kubectl apply 한 번으로 완료</text>

  <!-- Problem 2 -->
  <rect x="60" y="196" width="360" height="80" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="80" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555">문제: 장애 수동 복구</text>
  <text x="80" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">컨테이너 죽으면 알람 → 사람이 재시작</text>
  <text x="80" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">새벽 장애 시 온콜 담당자 호출</text>

  <line x1="422" y1="236" x2="448" y2="236" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="450" y="196" width="370" height="80" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="470" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">해결: Self-healing</text>
  <text x="470" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">kubelet이 상태 감시 → 자동 재시작</text>
  <text x="470" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">노드 장애 시 다른 노드에 자동 이동</text>

  <!-- Problem 3 -->
  <rect x="60" y="296" width="360" height="80" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="80" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555">문제: 수동 스케일링</text>
  <text x="80" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">트래픽 급증 시 빠른 대응 불가</text>
  <text x="80" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">용량 계산 → 서버 증설 → 재배포 수시간</text>

  <line x1="422" y1="336" x2="448" y2="336" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="450" y="296" width="370" height="80" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="470" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">해결: HPA 자동 스케일링</text>
  <text x="470" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">CPU 70% 초과 시 수십 초 만에 파드 추가</text>
  <text x="470" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">트래픽 감소 시 자동 축소로 비용 절감</text>

  <!-- Bottom: Code snippet -->
  <rect x="60" y="396" width="760" height="44" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="416" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># CPU 50% 초과 시 최대 10개까지 자동 확장</text>
  <text x="80" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">kubectl autoscale deployment myapp --cpu-percent=50 --min=2 --max=10</text>
</svg>
