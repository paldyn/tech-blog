<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">다중 레벨 groupingBy — 중첩 그루핑 코드 예제</text>

  <!-- Code block -->
  <rect x="60" y="66" width="480" height="370" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="90" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 부서 → 직급별 중첩 그루핑</text>
  <text x="76" y="110" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// + 이름 목록만 추출</text>
  <text x="76" y="130" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan font-weight="600" fill="#7ec8e3">Map</tspan>
    <tspan fill="#ffffff">&lt;</tspan>
    <tspan font-weight="600" fill="#7ec8e3">String</tspan>
    <tspan fill="#ffffff">,</tspan>
    <tspan font-weight="600" fill="#7ec8e3"> Map</tspan>
    <tspan fill="#ffffff">&lt;</tspan>
    <tspan font-weight="600" fill="#7ec8e3">String</tspan>
    <tspan fill="#ffffff">,</tspan>
    <tspan font-weight="600" fill="#7ec8e3"> List</tspan>
    <tspan fill="#ffffff">&lt;</tspan>
    <tspan font-weight="600" fill="#7ec8e3">String</tspan>
    <tspan fill="#ffffff">&gt;&gt;&gt; result =</tspan>
  </text>
  <text x="76" y="150" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">    employees.</tspan><tspan font-weight="600" fill="#7ec8e3">stream</tspan><tspan fill="#ffffff">()</tspan></text>
  <text x="76" y="170" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">        .</tspan><tspan font-weight="600" fill="#7ec8e3">collect</tspan><tspan fill="#ffffff">(</tspan><tspan font-weight="600" fill="#7ec8e3">groupingBy</tspan><tspan fill="#ffffff">(</tspan></text>
  <text x="76" y="190" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">            Employee::</tspan><tspan font-weight="600" fill="#7ec8e3">getDept</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="76" y="210" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">            </tspan><tspan font-weight="600" fill="#7ec8e3">groupingBy</tspan><tspan fill="#ffffff">(</tspan></text>
  <text x="76" y="230" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">                Employee::</tspan><tspan font-weight="600" fill="#7ec8e3">getLevel</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="76" y="250" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">                </tspan><tspan font-weight="600" fill="#7ec8e3">mapping</tspan><tspan fill="#ffffff">(Employee::</tspan><tspan font-weight="600" fill="#7ec8e3">getName</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="76" y="270" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">                         </tspan><tspan font-weight="600" fill="#7ec8e3">toList</tspan><tspan fill="#ffffff">())</tspan></text>
  <text x="76" y="290" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">            )</tspan></text>
  <text x="76" y="310" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">        ));</tspan></text>
  <text x="76" y="340" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 결과 구조:</text>
  <text x="76" y="360" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// {"개발팀": {"시니어":["홍길동","김영수"],</text>
  <text x="76" y="380" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">//             "주니어":["이철희"]}}</text>
  <text x="76" y="400" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// {"마케팅팀": {"시니어":["박민지"]}}</text>

  <!-- Result tree diagram on the right -->
  <text x="584" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">결과 구조</text>

  <!-- Level 1: Dept -->
  <rect x="566" y="106" width="254" height="44" rx="6" fill="#0d0d25" stroke="#7777cc" stroke-width="1.5"/>
  <text x="693" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">Map&lt;String, ...&gt;</text>
  <text x="693" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">1단계: 부서명 키</text>

  <!-- Arrow down -->
  <line x1="693" y1="150" x2="693" y2="168" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Level 2: Level -->
  <rect x="566" y="170" width="254" height="44" rx="6" fill="#0d0d25" stroke="#7777cc" stroke-width="1.5"/>
  <text x="693" y="187" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">Map&lt;String, ...&gt;</text>
  <text x="693" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">2단계: 직급 키</text>

  <!-- Arrow down -->
  <line x1="693" y1="214" x2="693" y2="232" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Level 3: List<String> -->
  <rect x="566" y="234" width="254" height="44" rx="6" fill="#0f1f0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="693" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">List&lt;String&gt;</text>
  <text x="693" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">3단계: 이름 목록</text>

  <!-- Key points -->
  <rect x="566" y="298" width="254" height="138" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="693" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">포인트</text>
  <text x="580" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">· 중첩 깊이 제한 없음</text>
  <text x="580" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">· mapping()으로 최종 값 변환</text>
  <text x="580" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">· counting() 조합도 가능</text>
  <text x="580" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">· 정적 임포트로 코드 간결화</text>
  <text x="580" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">· 가독성을 위해 2단계까지 권장</text>

  <text x="440" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">import static java.util.stream.Collectors.*; 로 정적 임포트 시 groupingBy, mapping, toList 등 이름만으로 사용 가능</text>
</svg>
