<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-iface" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">인터페이스 다중 구현</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#888">클래스는 여러 인터페이스를 동시에 구현할 수 있다</text>

  <!-- Interface 1: Printable — x=40, y=88, w=240, h=110 -->
  <rect x="40" y="88" width="240" height="110" rx="8"
        fill="#0a0a0a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="110" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">«interface»</text>
  <text x="160" y="130" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8">Printable</text>
  <line x1="41" y1="140" x2="279" y2="140" stroke="#2a3a4e" stroke-width="1"/>
  <text x="60" y="162"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" font-style="italic">void print()</text>
  <text x="60" y="182"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">default void preview() {}</text>

  <!-- Interface 2: Saveable — x=320, y=88, w=240, h=110 -->
  <rect x="320" y="88" width="240" height="110" rx="8"
        fill="#0a0a0a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="110" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">«interface»</text>
  <text x="440" y="130" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8">Saveable</text>
  <line x1="321" y1="140" x2="559" y2="140" stroke="#2a3a4e" stroke-width="1"/>
  <text x="340" y="162"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" font-style="italic">void save(String path)</text>
  <text x="340" y="182"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">default void backup() {}</text>

  <!-- Interface 3: Shareable — x=600, y=88, w=240, h=110 -->
  <rect x="600" y="88" width="240" height="110" rx="8"
        fill="#0a0a0a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="720" y="110" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">«interface»</text>
  <text x="720" y="130" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8">Shareable</text>
  <line x1="601" y1="140" x2="839" y2="140" stroke="#2a3a4e" stroke-width="1"/>
  <text x="620" y="162"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" font-style="italic">void share(String url)</text>
  <text x="620" y="182"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">default void copyLink() {}</text>

  <!-- Lines from interfaces down to horizontal rail y=256 -->
  <!-- Printable bottom (160, 198) -> down to (160, 256) -->
  <line x1="160" y1="198" x2="160" y2="256" stroke="#7777cc" stroke-width="1.5"
        stroke-dasharray="4,4"/>
  <!-- Saveable bottom (440, 198) -> down to (440, 256) -->
  <line x1="440" y1="198" x2="440" y2="256" stroke="#7777cc" stroke-width="1.5"
        stroke-dasharray="4,4"/>
  <!-- Shareable bottom (720, 198) -> down to (720, 256) -->
  <line x1="720" y1="198" x2="720" y2="256" stroke="#7777cc" stroke-width="1.5"
        stroke-dasharray="4,4"/>

  <!-- Horizontal rail at y=256 -->
  <line x1="160" y1="256" x2="720" y2="256" stroke="#7777cc" stroke-width="1.5"
        stroke-dasharray="4,4"/>

  <!-- Trunk down from center (440, 256) to class top (440, 278) -->
  <line x1="440" y1="256" x2="440" y2="278" stroke="#7777cc" stroke-width="1.5"
        stroke-dasharray="4,4" marker-end="url(#arr-iface)"/>

  <!-- "implements" label -->
  <text x="462" y="270"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">implements</text>

  <!-- Implementation class: Document — x=160, y=278, w=560, h=155, bottom=433 -->
  <rect x="160" y="278" width="560" height="155" rx="8"
        fill="#0a0a0a" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="302" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e8e8e8">Document</text>
  <text x="440" y="320" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">implements Printable, Saveable, Shareable</text>
  <line x1="161" y1="330" x2="719" y2="330" stroke="#2a3a4e" stroke-width="1"/>

  <text x="184" y="352"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">@Override  public void print()  { System.out.println("출력"); }</text>
  <text x="184" y="372"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">@Override  public void save(String path)  { Files.write(...); }</text>
  <text x="184" y="392"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">@Override  public void share(String url)  { sendLink(url); }</text>
  <text x="184" y="412"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">// default 메서드(preview, backup, copyLink)는 그대로 상속</text>

  <!-- Bottom note -->
  <text x="440" y="456" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">클래스는 단일 상속만 가능 · 인터페이스는 개수 제한 없이 구현 가능</text>
  <text x="440" y="472" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">→ 다중 상속의 복잡성 없이 다양한 역할을 하나의 클래스에 부여</text>
</svg>
