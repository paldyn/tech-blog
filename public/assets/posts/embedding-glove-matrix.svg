<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">GloVe 공기 행렬 (Co-occurrence Matrix)</text>

  <!-- Subtitle -->
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">두 단어가 같은 문맥에 등장하는 빈도를 행렬로 기록</text>

  <!-- Column headers -->
  <text x="262" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">ice</text>
  <text x="332" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">cold</text>
  <text x="402" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">warm</text>
  <text x="472" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">fire</text>
  <text x="542" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">water</text>

  <!-- Row headers -->
  <text x="245" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="end">ice</text>
  <text x="245" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="end">cold</text>
  <text x="245" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="end">warm</text>
  <text x="245" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="end">fire</text>
  <text x="245" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="end">water</text>

  <!-- Row 1: ice -->
  <!-- ice-ice: self (diagonal, dark) -->
  <rect x="248" y="120" width="58" height="44" fill="#1a1a1a" rx="4"/>
  <text x="277" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">—</text>
  <!-- ice-cold: HIGH -->
  <rect x="308" y="120" width="58" height="44" fill="#1a3a2a" rx="4" stroke="#55c555" stroke-width="1.5"/>
  <text x="337" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">8.4</text>
  <!-- ice-warm: LOW -->
  <rect x="378" y="120" width="58" height="44" fill="#111" rx="4"/>
  <text x="407" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#444" text-anchor="middle">0.7</text>
  <!-- ice-fire: LOW -->
  <rect x="448" y="120" width="58" height="44" fill="#111" rx="4"/>
  <text x="477" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#444" text-anchor="middle">0.2</text>
  <!-- ice-water: MED -->
  <rect x="518" y="120" width="58" height="44" fill="#152a35" rx="4" stroke="#7ec8e3" stroke-width="1"/>
  <text x="547" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">5.1</text>

  <!-- Row 2: cold -->
  <!-- cold-ice: HIGH -->
  <rect x="248" y="190" width="58" height="44" fill="#1a3a2a" rx="4" stroke="#55c555" stroke-width="1.5"/>
  <text x="277" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">8.4</text>
  <!-- cold-cold: self -->
  <rect x="308" y="190" width="58" height="44" fill="#1a1a1a" rx="4"/>
  <text x="337" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">—</text>
  <!-- cold-warm: MED -->
  <rect x="378" y="190" width="58" height="44" fill="#152a35" rx="4" stroke="#7ec8e3" stroke-width="1"/>
  <text x="407" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">4.2</text>
  <!-- cold-fire: LOW -->
  <rect x="448" y="190" width="58" height="44" fill="#111" rx="4"/>
  <text x="477" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#444" text-anchor="middle">0.3</text>
  <!-- cold-water: LOW -->
  <rect x="518" y="190" width="58" height="44" fill="#111" rx="4"/>
  <text x="547" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#444" text-anchor="middle">1.8</text>

  <!-- Row 3: warm -->
  <!-- warm-ice: LOW -->
  <rect x="248" y="260" width="58" height="44" fill="#111" rx="4"/>
  <text x="277" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#444" text-anchor="middle">0.7</text>
  <!-- warm-cold: MED -->
  <rect x="308" y="260" width="58" height="44" fill="#152a35" rx="4" stroke="#7ec8e3" stroke-width="1"/>
  <text x="337" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">4.2</text>
  <!-- warm-warm: self -->
  <rect x="378" y="260" width="58" height="44" fill="#1a1a1a" rx="4"/>
  <text x="407" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">—</text>
  <!-- warm-fire: HIGH -->
  <rect x="448" y="260" width="58" height="44" fill="#2a1a1a" rx="4" stroke="#e05555" stroke-width="1.5"/>
  <text x="477" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">7.1</text>
  <!-- warm-water: LOW -->
  <rect x="518" y="260" width="58" height="44" fill="#111" rx="4"/>
  <text x="547" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#444" text-anchor="middle">1.2</text>

  <!-- Row 4: fire -->
  <!-- fire-ice: LOW -->
  <rect x="248" y="330" width="58" height="44" fill="#111" rx="4"/>
  <text x="277" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#444" text-anchor="middle">0.2</text>
  <!-- fire-cold: LOW -->
  <rect x="308" y="330" width="58" height="44" fill="#111" rx="4"/>
  <text x="337" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#444" text-anchor="middle">0.3</text>
  <!-- fire-warm: HIGH -->
  <rect x="378" y="330" width="58" height="44" fill="#2a1a1a" rx="4" stroke="#e05555" stroke-width="1.5"/>
  <text x="407" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">7.1</text>
  <!-- fire-fire: self -->
  <rect x="448" y="330" width="58" height="44" fill="#1a1a1a" rx="4"/>
  <text x="477" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">—</text>
  <!-- fire-water: MED -->
  <rect x="518" y="330" width="58" height="44" fill="#152a35" rx="4" stroke="#7ec8e3" stroke-width="1"/>
  <text x="547" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">3.8</text>

  <!-- Row 5: water -->
  <!-- water-ice: MED -->
  <rect x="248" y="400" width="58" height="44" fill="#152a35" rx="4" stroke="#7ec8e3" stroke-width="1"/>
  <text x="277" y="427" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">5.1</text>
  <!-- water-cold: LOW -->
  <rect x="308" y="400" width="58" height="44" fill="#111" rx="4"/>
  <text x="337" y="427" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#444" text-anchor="middle">1.8</text>
  <!-- water-warm: LOW -->
  <rect x="378" y="400" width="58" height="44" fill="#111" rx="4"/>
  <text x="407" y="427" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#444" text-anchor="middle">1.2</text>
  <!-- water-fire: MED -->
  <rect x="448" y="400" width="58" height="44" fill="#152a35" rx="4" stroke="#7ec8e3" stroke-width="1"/>
  <text x="477" y="427" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">3.8</text>
  <!-- water-water: self -->
  <rect x="518" y="400" width="58" height="44" fill="#1a1a1a" rx="4"/>
  <text x="547" y="427" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">—</text>

  <!-- Legend -->
  <rect x="640" y="136" width="180" height="160" fill="#111" rx="8" stroke="#222" stroke-width="1"/>
  <text x="730" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">범례</text>
  <rect x="660" y="172" width="24" height="20" fill="#1a3a2a" rx="3" stroke="#55c555" stroke-width="1.5"/>
  <text x="694" y="187" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">높은 공기 빈도</text>
  <rect x="660" y="204" width="24" height="20" fill="#152a35" rx="3" stroke="#7ec8e3" stroke-width="1"/>
  <text x="694" y="219" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">중간 공기 빈도</text>
  <rect x="660" y="236" width="24" height="20" fill="#111" rx="3"/>
  <text x="694" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">낮은 공기 빈도</text>
  <rect x="660" y="268" width="24" height="20" fill="#1a1a1a" rx="3"/>
  <text x="694" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555">대각 (자기 자신)</text>

  <!-- Key insight annotation -->
  <rect x="640" y="320" width="180" height="120" fill="#0d1a0d" rx="8" stroke="#55c555" stroke-width="1"/>
  <text x="730" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">핵심 통찰</text>
  <text x="730" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">ice↔cold: 8.4</text>
  <text x="730" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">warm↔fire: 7.1</text>
  <text x="730" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">전역 통계로 단어 간</text>
  <text x="730" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">의미 관계 포착</text>

  <!-- Bottom explanation -->
  <text x="440" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">X_ij = 전체 말뭉치에서 단어 i 문맥 창 내에 단어 j가 등장한 횟수</text>
</svg>
