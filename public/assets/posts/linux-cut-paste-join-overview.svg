<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">cut · paste · join — 열 기반 텍스트 처리</text>

  <!-- cut section -->
  <rect x="60" y="70" width="240" height="120" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="180" y="97" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">cut</text>
  <text x="180" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">지정 필드/바이트/문자 추출</text>
  <text x="180" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">-d 구분자  -f 필드  -c 문자</text>
  <text x="180" y="164" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">cut -d: -f1 /etc/passwd</text>

  <!-- paste section -->
  <rect x="320" y="70" width="240" height="120" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="97" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">paste</text>
  <text x="440" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">여러 파일을 열 방향으로 합치기</text>
  <text x="440" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">-d 구분자 지정</text>
  <text x="440" y="164" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">paste -d, a.txt b.txt</text>

  <!-- join section -->
  <rect x="580" y="70" width="240" height="120" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="700" y="97" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e05555">join</text>
  <text x="700" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">공통 필드 기준 파일 결합</text>
  <text x="700" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">-1 -2 필드 번호 지정</text>
  <text x="700" y="164" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">join -1 1 -2 1 f1 f2</text>

  <!-- cut data flow diagram -->
  <text x="60" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">cut 데이터 흐름</text>

  <!-- input rows -->
  <rect x="60" y="248" width="200" height="100" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="70" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">입력 (tab 구분)</text>
  <text x="70" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">root  0   /root</text>
  <text x="70" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">alice 1001 /home</text>
  <text x="70" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">bob   1002 /home</text>

  <!-- arrow -->
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <line x1="262" y1="298" x2="310" y2="298" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="272" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">-f1</text>

  <!-- output -->
  <rect x="312" y="268" width="120" height="70" rx="6" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="322" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">출력</text>
  <text x="322" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">root</text>
  <text x="322" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">alice</text>

  <!-- paste data flow diagram -->
  <text x="500" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">paste 데이터 흐름</text>

  <rect x="500" y="248" width="100" height="80" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="510" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">a.txt</text>
  <text x="510" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">Alice</text>
  <text x="510" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">Bob</text>

  <rect x="500" y="340" width="100" height="80" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="510" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">b.txt</text>
  <text x="510" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">Dev</text>
  <text x="510" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">Ops</text>

  <defs>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <line x1="602" y1="288" x2="640" y2="330" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>
  <line x1="602" y1="380" x2="640" y2="338" stroke="#55c555" stroke-width="2"/>

  <rect x="642" y="310" width="170" height="80" rx="6" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="652" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">출력 (쉼표 구분)</text>
  <text x="652" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">Alice,Dev</text>
  <text x="652" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">Bob,Ops</text>

  <!-- bottom note -->
  <text x="440" y="458" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">join은 사전 정렬(sort) 필요 — sort -k1 file | join ...</text>
</svg>
