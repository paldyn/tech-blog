<svg width="880" height="460" viewBox="0 0 880 460" xmlns="http://www.w3.org/2000/svg" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" fill="#e8e8e8" font-size="18" font-weight="700">콜백 패턴의 유형</text>
  <text x="440" y="66" text-anchor="middle" fill="#555" font-size="13">동기 콜백 · 비동기 콜백 · 이벤트 기반 콜백</text>

  <!-- Sync callback -->
  <rect x="40" y="88" width="250" height="330" rx="10" fill="#111" stroke="#2a3a1a" stroke-width="1.5"/>
  <rect x="40" y="88" width="250" height="40" rx="10" fill="#1a2a0a"/>
  <text x="165" y="114" text-anchor="middle" fill="#99cc77" font-size="13" font-weight="700">동기 콜백</text>

  <text x="60" y="152" fill="#888" font-size="11" font-family="monospace">// 즉시 실행</text>
  <text x="60" y="172" fill="#aaa" font-size="11" font-family="monospace">[1,2,3].forEach(n =&gt; {</text>
  <text x="72" y="192" fill="#aaa" font-size="11" font-family="monospace">  console.log(n);</text>
  <text x="60" y="212" fill="#aaa" font-size="11" font-family="monospace">});</text>

  <text x="60" y="248" fill="#888" font-size="11" font-family="monospace">Array.sort((a, b) =&gt; a - b)</text>
  <text x="60" y="268" fill="#888" font-size="11" font-family="monospace">Array.map(x =&gt; x * 2)</text>
  <text x="60" y="288" fill="#888" font-size="11" font-family="monospace">Array.filter(x =&gt; x &gt; 0)</text>

  <rect x="56" y="310" width="218" height="88" rx="6" fill="#161f10" stroke="#2a3a1a" stroke-width="1"/>
  <text x="165" y="334" text-anchor="middle" fill="#77aa55" font-size="11" font-weight="600">특징</text>
  <text x="165" y="354" text-anchor="middle" fill="#666" font-size="10">콜 스택에서 직접 실행</text>
  <text x="165" y="372" text-anchor="middle" fill="#666" font-size="10">이벤트 루프 관계 없음</text>
  <text x="165" y="390" text-anchor="middle" fill="#666" font-size="10">반환값으로 결과 전달 가능</text>

  <!-- Async callback -->
  <rect x="315" y="88" width="250" height="330" rx="10" fill="#111" stroke="#1a2a3a" stroke-width="1.5"/>
  <rect x="315" y="88" width="250" height="40" rx="10" fill="#0a1a2a"/>
  <text x="440" y="114" text-anchor="middle" fill="#7799cc" font-size="13" font-weight="700">비동기 콜백</text>

  <text x="335" y="152" fill="#888" font-size="11" font-family="monospace">// 나중에 실행</text>
  <text x="335" y="172" fill="#aaa" font-size="11" font-family="monospace">setTimeout(() =&gt; {</text>
  <text x="347" y="192" fill="#aaa" font-size="11" font-family="monospace">  console.log("1초 후");</text>
  <text x="335" y="212" fill="#aaa" font-size="11" font-family="monospace">}, 1000);</text>

  <text x="335" y="248" fill="#888" font-size="11" font-family="monospace">fs.readFile(path, (err, data) =&gt; {</text>
  <text x="347" y="268" fill="#888" font-size="11" font-family="monospace">  // Node.js 에러 퍼스트</text>
  <text x="347" y="288" fill="#888" font-size="11" font-family="monospace">  if (err) throw err;</text>
  <text x="335" y="308" fill="#888" font-size="11" font-family="monospace">});</text>

  <rect x="331" y="310" width="218" height="88" rx="6" fill="#101620" stroke="#1a2a3a" stroke-width="1"/>
  <text x="440" y="334" text-anchor="middle" fill="#5577aa" font-size="11" font-weight="600">특징</text>
  <text x="440" y="354" text-anchor="middle" fill="#666" font-size="10">태스크/마이크로태스크 큐에서 실행</text>
  <text x="440" y="372" text-anchor="middle" fill="#666" font-size="10">에러 퍼스트 관례 (Node.js)</text>
  <text x="440" y="390" text-anchor="middle" fill="#666" font-size="10">중첩 시 콜백 헬 발생</text>

  <!-- Event callback -->
  <rect x="590" y="88" width="250" height="330" rx="10" fill="#111" stroke="#3a1a2a" stroke-width="1.5"/>
  <rect x="590" y="88" width="250" height="40" rx="10" fill="#2a0a1a"/>
  <text x="715" y="114" text-anchor="middle" fill="#cc7799" font-size="13" font-weight="700">이벤트 기반 콜백</text>

  <text x="610" y="152" fill="#888" font-size="11" font-family="monospace">// 이벤트 발생 시 실행</text>
  <text x="610" y="172" fill="#aaa" font-size="11" font-family="monospace">btn.addEventListener(</text>
  <text x="622" y="192" fill="#aaa" font-size="11" font-family="monospace">  'click',</text>
  <text x="622" y="212" fill="#aaa" font-size="11" font-family="monospace">  (event) =&gt; { ... }</text>
  <text x="610" y="232" fill="#aaa" font-size="11" font-family="monospace">);</text>

  <text x="610" y="268" fill="#888" font-size="11" font-family="monospace">emitter.on('data', (chunk) =&gt; {</text>
  <text x="622" y="288" fill="#888" font-size="11" font-family="monospace">  // Node.js EventEmitter</text>
  <text x="610" y="308" fill="#888" font-size="11" font-family="monospace">});</text>

  <rect x="606" y="310" width="218" height="88" rx="6" fill="#1f1016" stroke="#3a1a2a" stroke-width="1"/>
  <text x="715" y="334" text-anchor="middle" fill="#aa5577" font-size="11" font-weight="600">특징</text>
  <text x="715" y="354" text-anchor="middle" fill="#666" font-size="10">여러 번 반복 실행 가능</text>
  <text x="715" y="372" text-anchor="middle" fill="#666" font-size="10">발행/구독 패턴</text>
  <text x="715" y="390" text-anchor="middle" fill="#666" font-size="10">removeEventListener로 제거</text>

  <!-- Bottom -->
  <text x="440" y="440" text-anchor="middle" fill="#333" font-size="11">세 유형 모두 "함수를 인자로 전달"하지만 실행 시점과 컨텍스트가 다릅니다</text>
</svg>
