<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">WAF: 웹 애플리케이션 방화벽 동작 원리</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">인터넷 트래픽이 앱 서버에 도달하기 전 필터링 레이어</text>

  <!-- Internet -->
  <rect x="40" y="120" width="130" height="56" rx="8" fill="#1a1a1a" stroke="#555" stroke-width="1.5"/>
  <text x="105" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#aaa" text-anchor="middle">인터넷</text>
  <text x="105" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">사용자 / 봇</text>

  <!-- Arrow to WAF -->
  <line x1="170" y1="148" x2="238" y2="148" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- WAF Box (main) -->
  <rect x="240" y="100" width="200" height="96" rx="10" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="340" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">WAF</text>
  <text x="340" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">규칙 엔진 검사</text>
  <text x="340" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">서명 / 이상탐지 / ML</text>
  <text x="340" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">Web Application Firewall</text>

  <!-- Block arrow going down -->
  <line x1="340" y1="196" x2="340" y2="258" stroke="#e05555" stroke-width="2"
        stroke-dasharray="4,4" marker-end="url(#arr-red)"/>
  <rect x="270" y="260" width="140" height="50" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="340" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">차단 (Block)</text>
  <text x="340" y="299" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">403 / 429 응답</text>

  <!-- Allow arrow going right -->
  <line x1="440" y1="148" x2="508" y2="148" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="474" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">허용</text>

  <!-- App Server -->
  <rect x="510" y="100" width="160" height="96" rx="10" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="590" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">앱 서버</text>
  <text x="590" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">비즈니스 로직</text>
  <text x="590" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">API / DB / 파일</text>
  <text x="590" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">Origin Server</text>

  <!-- WAF rule types (bottom) -->
  <text x="60" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8">WAF 탐지 방식</text>

  <rect x="40" y="378" width="180" height="80" rx="8" fill="#0f1820" stroke="#7777cc" stroke-width="1.5"/>
  <text x="130" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">서명 기반</text>
  <text x="130" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">알려진 패턴 DB</text>
  <text x="130" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">OWASP CRS 규칙</text>
  <text x="130" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">Signature-based</text>

  <rect x="240" y="378" width="180" height="80" rx="8" fill="#0f200f" stroke="#55c555" stroke-width="1.5"/>
  <text x="330" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">이상 탐지</text>
  <text x="330" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">정상 트래픽 기준선</text>
  <text x="330" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">통계적 편차 감지</text>
  <text x="330" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">Anomaly Detection</text>

  <rect x="440" y="378" width="180" height="80" rx="8" fill="#1a1020" stroke="#ce9178" stroke-width="1.5"/>
  <text x="530" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">ML / AI</text>
  <text x="530" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">행동 패턴 학습</text>
  <text x="530" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">제로데이 공격 탐지</text>
  <text x="530" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">Machine Learning</text>

  <rect x="640" y="378" width="200" height="80" rx="8" fill="#201a0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="740" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">커스텀 규칙</text>
  <text x="740" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">IP 차단 / 지역 차단</text>
  <text x="740" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">헤더·파라미터 필터</text>
  <text x="740" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">Custom Rules</text>
</svg>
