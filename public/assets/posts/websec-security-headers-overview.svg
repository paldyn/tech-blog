<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 540" style="background:#0a0a0a;border-radius:12px">
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">HTTP 보안 헤더 완전 가이드</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">각 헤더의 방어 대상과 중요도</text>

  <!-- Header row -->
  <rect x="60" y="90" width="760" height="36" rx="6" fill="#1a2a3a" stroke="#3a6ea8" stroke-width="1"/>
  <text x="250" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">헤더</text>
  <text x="540" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">방어 대상</text>
  <text x="770" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">중요도</text>
  <line x1="420" y1="90" x2="420" y2="506" stroke="#2a3a4a" stroke-width="1"/>
  <line x1="700" y1="90" x2="700" y2="506" stroke="#2a3a4a" stroke-width="1"/>

  <!-- Row 1: HSTS -->
  <rect x="60" y="126" width="760" height="46" rx="0" fill="#0f1820"/>
  <text x="250" y="145" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" text-anchor="middle">Strict-Transport-Security</text>
  <text x="250" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(HSTS)</text>
  <text x="560" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">HTTP 다운그레이드 · SSL Stripping 차단</text>
  <rect x="725" y="134" width="60" height="24" rx="4" fill="#5a1a1a"/>
  <text x="755" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">필수</text>

  <!-- Row 2: CSP -->
  <rect x="60" y="172" width="760" height="46" rx="0" fill="#0d1520"/>
  <text x="250" y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" text-anchor="middle">Content-Security-Policy</text>
  <text x="560" y="199" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">XSS · 인라인 스크립트 · 악성 리소스 로드</text>
  <rect x="725" y="180" width="60" height="24" rx="4" fill="#5a1a1a"/>
  <text x="755" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">필수</text>

  <!-- Row 3: X-Frame-Options -->
  <rect x="60" y="218" width="760" height="46" rx="0" fill="#0f1820"/>
  <text x="250" y="245" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" text-anchor="middle">X-Frame-Options</text>
  <text x="560" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">클릭재킹 · iframe 임베드 악용</text>
  <rect x="725" y="226" width="60" height="24" rx="4" fill="#4a3a0a"/>
  <text x="755" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8a020" text-anchor="middle">권장</text>

  <!-- Row 4: X-Content-Type-Options -->
  <rect x="60" y="264" width="760" height="46" rx="0" fill="#0d1520"/>
  <text x="250" y="291" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" text-anchor="middle">X-Content-Type-Options</text>
  <text x="560" y="291" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">MIME 스니핑으로 인한 XSS 방어</text>
  <rect x="725" y="272" width="60" height="24" rx="4" fill="#4a3a0a"/>
  <text x="755" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8a020" text-anchor="middle">권장</text>

  <!-- Row 5: Referrer-Policy -->
  <rect x="60" y="310" width="760" height="46" rx="0" fill="#0f1820"/>
  <text x="250" y="337" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" text-anchor="middle">Referrer-Policy</text>
  <text x="560" y="337" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">민감 URL 정보 Referer 헤더 유출 방지</text>
  <rect x="725" y="318" width="60" height="24" rx="4" fill="#0d1a0d"/>
  <text x="755" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">보통</text>

  <!-- Row 6: Permissions-Policy -->
  <rect x="60" y="356" width="760" height="46" rx="0" fill="#0d1520"/>
  <text x="250" y="383" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" text-anchor="middle">Permissions-Policy</text>
  <text x="560" y="383" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">카메라·마이크·위치정보 API 오남용 차단</text>
  <rect x="725" y="364" width="60" height="24" rx="4" fill="#0d1a0d"/>
  <text x="755" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">보통</text>

  <!-- Row 7: Cross-Origin headers -->
  <rect x="60" y="402" width="760" height="46" rx="0" fill="#0f1820"/>
  <text x="250" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" text-anchor="middle">COEP / COEP / CORP</text>
  <text x="250" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Cross-Origin 격리</text>
  <text x="560" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">Spectre · SharedArrayBuffer 사이드채널 공격</text>
  <rect x="725" y="410" width="60" height="24" rx="4" fill="#1a1a0d"/>
  <text x="755" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e820" text-anchor="middle">상황</text>

  <!-- Border -->
  <rect x="60" y="126" width="760" height="322" fill="none" stroke="#2a3a4a" stroke-width="1"/>

  <!-- Bottom nginx example -->
  <rect x="60" y="510" width="760" height="22" rx="4" fill="#111827"/>
  <text x="440" y="525" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">다음 글(HSTS)부터 각 헤더를 심층 분석합니다</text>
</svg>
