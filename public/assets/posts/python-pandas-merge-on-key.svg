<svg xmlns="http://www.w3.org/2000/svg" width="880" height="330" viewBox="0 0 880 330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="330" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">공통 키로 두 표를 잇기</text>

  <defs>
    <marker id="mgar" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="150" y="92" font-size="14" font-weight="600" fill="#e8e8e8">orders</text>
  <rect x="60" y="104" width="180" height="80" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="78" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">user_id  amount</text>
  <text xml:space="preserve" x="78" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">1        100</text>
  <text xml:space="preserve" x="78" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">2        250</text>

  <text x="150" y="220" font-size="14" font-weight="600" fill="#e8e8e8">users</text>
  <rect x="60" y="232" width="180" height="80" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="78" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">user_id  name</text>
  <text xml:space="preserve" x="78" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">1        Ana</text>
  <text xml:space="preserve" x="78" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">2        Bo</text>

  <path d="M 248 200 C 320 200, 320 208, 392 208" fill="none" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#mgar)"/>
  <text x="320" y="180" font-size="12" fill="#9aa4b8" text-anchor="middle">on="user_id"</text>

  <text x="620" y="92" font-size="14" font-weight="600" fill="#55c555">merged</text>
  <rect x="400" y="104" width="420" height="120" rx="6" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text xml:space="preserve" x="418" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">user_id  amount  name</text>
  <text xml:space="preserve" x="418" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">1        100     Ana</text>
  <text xml:space="preserve" x="418" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">2        250     Bo</text>
  <text xml:space="preserve" x="418" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 같은 user_id 행끼리 결합</text>

  <rect x="400" y="244" width="420" height="68" rx="6" fill="#0f1320" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="418" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">pd.merge(orders, users,</text>
  <text xml:space="preserve" x="418" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">         on=<tspan fill="#ce9178">"user_id"</tspan>, how=<tspan fill="#ce9178">"left"</tspan>)</text>
</svg>
