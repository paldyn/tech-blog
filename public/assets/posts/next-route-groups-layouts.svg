<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr-down" viewBox="0 0 14 14" refX="7" refY="12"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 1 0 L 7 13 L 13 0 z" fill="#888"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">라우트 그룹 — 레이아웃 분리와 중첩</text>

  <!-- RootLayout -->
  <rect x="50" y="68" width="780" height="52" rx="8" fill="#0d1f2d" stroke="#3a5a7e" stroke-width="2"/>
  <text x="440" y="90" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">app/layout.tsx  (Root Layout)</text>
  <text x="440" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">html / body 정의 — 모든 페이지에 적용</text>

  <!-- Arrow down left -->
  <line x1="230" y1="120" x2="230" y2="150" stroke="#888" stroke-width="1.5"
        marker-end="url(#arr-down)"/>

  <!-- Arrow down right -->
  <line x1="650" y1="120" x2="650" y2="150" stroke="#888" stroke-width="1.5"
        marker-end="url(#arr-down)"/>

  <!-- Marketing layout -->
  <rect x="50" y="150" width="360" height="60" rx="8" fill="#0d1f35" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="174" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">(marketing)/layout.tsx</text>
  <text x="230" y="193" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Header, Footer, Nav 포함</text>

  <!-- App layout -->
  <rect x="470" y="150" width="360" height="60" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="174" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">(app)/layout.tsx</text>
  <text x="650" y="193" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Sidebar, AuthGuard 포함</text>

  <!-- Arrow down from marketing -->
  <line x1="155" y1="210" x2="155" y2="240" stroke="#888" stroke-width="1.5"
        marker-end="url(#arr-down)"/>
  <line x1="310" y1="210" x2="310" y2="240" stroke="#888" stroke-width="1.5"
