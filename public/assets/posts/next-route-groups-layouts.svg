  <!-- Marketing pages -->
  <rect x="70" y="240" width="160" height="44" rx="6" fill="#1e2d3d" stroke="#3a4a6e" stroke-width="1"/>
  <text x="150" y="260" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">/</text>
  <text x="150" y="276" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">홈</text>

  <rect x="248" y="240" width="160" height="44" rx="6" fill="#1e2d3d" stroke="#3a4a6e" stroke-width="1"/>
  <text x="328" y="260" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">/about</text>
  <text x="328" y="276" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">소개</text>

  <!-- App pages -->
  <rect x="495" y="240" width="170" height="44" rx="6" fill="#1e2d3d" stroke="#3a4a6e" stroke-width="1"/>
  <text x="580" y="260" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">/dashboard</text>
  <text x="580" y="276" text-anchor="middle"
