  <!-- Arrow down from app -->
  <line x1="585" y1="210" x2="585" y2="240" stroke="#888" stroke-width="1.5"
        marker-end="url(#arr-down)"/>
  <line x1="720" y1="210" x2="720" y2="240" stroke="#888" stroke-width="1.5"
