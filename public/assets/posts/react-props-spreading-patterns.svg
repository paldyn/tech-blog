  <!-- Code example -->
  <rect x="60" y="266" width="760" height="154" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// в‘ў className лі‘н•© + в‘  м»ӨмҠӨн…Җ л¶„лҰ¬ нҢЁн„ҙ мЎ°н•©</text>
  <text x="76" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">function</tspan><tspan fill="#ffffff"> Card({ variant = </tspan><tspan fill="#ce9178">'default'</tspan><tspan fill="#ffffff">, className = </tspan><tspan fill="#ce9178">''</tspan><tspan fill="#ffffff">, ...rest }) {</tspan></text>
  <text x="76" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan font-weight="600" fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> baseClass = </tspan><tspan fill="#ce9178">`card card-${variant}`</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="76" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan font-weight="600" fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> &lt;</tspan><tspan fill="#55c555">div</tspan><tspan fill="#ffffff"> className={[baseClass, className].filter(Boolean).join(</tspan><tspan fill="#ce9178">' '</tspan><tspan fill="#ffffff">)} {...rest} /&gt;;</tspan></text>
  <text x="76" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">}</text>
  <text x="76" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// мӮ¬мҡ© мёЎм—җм„ң className м¶”к°Җ к°ҖлҠҘ вҖ” лӮҙл¶Җ нҒҙлһҳмҠӨмҷҖ лі‘н•©лҗЁ</text>
  <text x="76" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">&lt;</tspan><tspan fill="#55c555">Card</tspan><tspan fill="#ffffff"> variant=</tspan><tspan fill="#ce9178">"primary"</tspan><tspan fill="#ffffff"> className=</tspan><tspan fill="#ce9178">"mt-4"</tspan><tspan fill="#ffffff"> onClick={handleClick} /&gt;</tspan></text>
