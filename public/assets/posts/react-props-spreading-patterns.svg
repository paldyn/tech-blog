  <text x="470" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">лӘ…мӢңм ҒмңјлЎң н—Ҳмҡ©н•ң propsл§Ң кәјлӮҙ м „лӢ¬.</text>
