  <text x="80" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">{ variant, size, ...rest } кө¬мЎ°л¶„н•ҙлЎң м»ӨмҠӨн…Җл§Ң кәјлӮҙкі </text>
