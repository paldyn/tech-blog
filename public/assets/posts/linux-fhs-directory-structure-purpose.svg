<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">핵심 디렉터리 용도 정리</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">어떤 파일이 어디에 있는지 알면 탐색이 빨라진다</text>

  <!-- Table header -->
  <rect x="60" y="86" width="760" height="34" fill="#161616" rx="4"/>
  <text x="130" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#888" text-anchor="middle">디렉터리</text>
  <text x="400" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#888" text-anchor="middle">역할 / 내용</text>
  <text x="700" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#888" text-anchor="middle">예시</text>

  <!-- /etc -->
  <rect x="60" y="124" width="760" height="32" fill="#0d1a0d" rx="0"/>
  <text x="130" y="145" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8c55a" text-anchor="middle">/etc</text>
  <text x="400" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ccc" text-anchor="middle">시스템·서비스 설정 파일</text>
  <text x="700" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">/etc/nginx/, /etc/ssh/</text>

  <!-- /var/log -->
  <rect x="60" y="160" width="760" height="32" fill="#0a0a0a" rx="0"/>
  <text x="130" y="181" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" text-anchor="middle">/var/log</text>
  <text x="400" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ccc" text-anchor="middle">시스템 · 서비스 로그 파일</text>
  <text x="700" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">syslog, auth.log, nginx/</text>

  <!-- /home -->
  <rect x="60" y="196" width="760" height="32" fill="#0d1a0d" rx="0"/>
  <text x="130" y="217" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc" text-anchor="middle">/home</text>
  <text x="400" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ccc" text-anchor="middle">일반 사용자 홈 디렉터리</text>
  <text x="700" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">/home/alice/, /home/bob/</text>

  <!-- /usr/bin -->
  <rect x="60" y="232" width="760" height="32" fill="#0a0a0a" rx="0"/>
  <text x="130" y="253" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">/usr/bin</text>
  <text x="400" y="253" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ccc" text-anchor="middle">일반 사용자 실행 파일</text>
  <text x="700" y="253" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">python3, git, vim</text>

  <!-- /usr/local -->
  <rect x="60" y="268" width="760" height="32" fill="#0d1a0d" rx="0"/>
  <text x="130" y="289" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">/usr/local</text>
  <text x="400" y="289" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ccc" text-anchor="middle">수동 설치 프로그램</text>
  <text x="700" y="289" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">make install 결과물</text>

  <!-- /tmp -->
  <rect x="60" y="304" width="760" height="32" fill="#0a0a0a" rx="0"/>
  <text x="130" y="325" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">/tmp</text>
  <text x="400" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ccc" text-anchor="middle">임시 파일 (재부팅 시 삭제)</text>
  <text x="700" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">tmpfs, 세계 쓰기 가능</text>

  <!-- /proc /sys -->
  <rect x="60" y="340" width="760" height="32" fill="#0d1a0d" rx="0"/>
  <text x="130" y="361" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">/proc /sys</text>
  <text x="400" y="361" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ccc" text-anchor="middle">커널 정보 가상 파일시스템</text>
  <text x="700" y="361" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">procfs / sysfs</text>

  <!-- Column dividers -->
  <line x1="200" y1="86" x2="200" y2="372" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="600" y1="86" x2="600" y2="372" stroke="#1a1a1a" stroke-width="1"/>

  <text x="440" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">설정 파일 찾기: /etc  |  로그 찾기: /var/log  |  실행 파일 찾기: /usr/bin, /usr/local/bin</text>
</svg>
