<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">Node.js fs 모듈 · API 분류</text>

  <!-- Column 1: Callback -->
  <rect x="60" y="64" width="228" height="352" rx="8" fill="#0d1117" stroke="#888" stroke-width="1.5"/>
  <text x="174" y="90" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#888">콜백 API (구식)</text>
  <text x="174" y="108" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#555">require('fs')</text>

  <text x="78" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">fs.readFile()</text>
  <text x="78" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">fs.writeFile()</text>
  <text x="78" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">fs.appendFile()</text>
  <text x="78" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">fs.unlink()</text>
  <text x="78" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">fs.rename()</text>
  <text x="78" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">fs.mkdir()</text>
  <text x="78" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">fs.readdir()</text>
  <text x="78" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">fs.stat()</text>
  <text x="78" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">fs.watch()</text>
  <text x="78" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">콜백 (err, data) 패턴</text>
  <text x="78" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">Node 초창기부터 존재</text>
  <text x="78" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">콜백 지옥 유발 가능</text>

  <!-- Column 2: Sync -->
  <rect x="304" y="64" width="228" height="352" rx="8" fill="#0d1117" stroke="#e0a030" stroke-width="1.5"/>
  <text x="418" y="90" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#e0a030">동기 API (주의)</text>
  <text x="418" y="108" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#555">require('fs') — Sync 접미사</text>

  <text x="322" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e0a030">fs.readFileSync()</text>
  <text x="322" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e0a030">fs.writeFileSync()</text>
  <text x="322" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e0a030">fs.appendFileSync()</text>
  <text x="322" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e0a030">fs.unlinkSync()</text>
  <text x="322" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e0a030">fs.renameSync()</text>
  <text x="322" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e0a030">fs.mkdirSync()</text>
  <text x="322" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e0a030">fs.readdirSync()</text>
  <text x="322" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e0a030">fs.statSync()</text>
  <text x="322" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e0a030">fs.existsSync()</text>
  <text x="322" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">이벤트 루프 블로킹!</text>
  <text x="322" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">CLI 스크립트 / 초기화에만</text>
  <text x="322" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">서버 요청 처리 중 금지</text>

  <!-- Column 3: Promises -->
  <rect x="548" y="64" width="272" height="352" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="684" y="90" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#55c555">Promise API (권장)</text>
  <text x="684" y="108" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#555">fs.promises 또는 fs/promises</text>

  <text x="566" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">fsp.readFile()</text>
  <text x="566" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">fsp.writeFile()</text>
  <text x="566" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">fsp.appendFile()</text>
  <text x="566" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">fsp.unlink()</text>
  <text x="566" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">fsp.rename()</text>
  <text x="566" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">fsp.mkdir({ recursive })</text>
  <text x="566" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">fsp.readdir({ withFileTypes })</text>
  <text x="566" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">fsp.stat() / lstat()</text>
  <text x="566" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">fsp.open() / FileHandle</text>
  <text x="566" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">await/async 조합 가능</text>
  <text x="566" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Node 10+ 안정 지원</text>
  <text x="566" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">신규 코드 권장 방식</text>

  <!-- Bottom note -->
  <text x="440" y="432" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#7ec8e3">import { promises as fsp } from 'fs'  또는  import fsp from 'fs/promises'</text>
</svg>
