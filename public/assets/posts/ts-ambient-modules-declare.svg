<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">declare module — 모듈 단위로 타입 입히기</text>

  <!-- Left: problem -->
  <rect x="60" y="76" width="350" height="232" fill="#111827" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="235" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">타입 없는 패키지</text>

  <rect x="76" y="116" width="318" height="114" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">import slug</text>
  <text x="92" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  from "slugify-x";</text>
  <text x="92" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" xml:space="preserve">// ❌ TS7016: 선언 파일</text>
  <text x="92" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" xml:space="preserve">//   없음 — 암묵적 any</text>
  <text x="92" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// @types에도 없는 패키지</text>

  <text x="235" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">내장 타입 ✗ · @types ✗</text>
  <text x="235" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">마지막 수단은 직접 선언</text>

  <!-- Arrow -->
  <line x1="412" y1="192" x2="466" y2="192" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- Right: solution -->
  <rect x="470" y="76" width="350" height="232" fill="#111827" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="645" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">앰비언트 모듈 선언</text>

  <rect x="486" y="116" width="318" height="150" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="502" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// types/slugify-x.d.ts</text>
  <text x="502" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">declare module "slugify-x" {</text>
  <text x="502" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  export default function</text>
  <text x="502" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    slug(s: string): string;</text>
  <text x="502" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  export const V: string;</text>
  <text x="502" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>

  <text x="645" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">블록 안은 그 모듈의 내보내기 정의</text>

  <!-- Bottom note -->
  <rect x="60" y="334" width="760" height="56" fill="#111827" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">따옴표 안의 이름 = import 지정자와 정확히 일치해야 매칭</text>
  <text x="440" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">상대 경로가 아닌 모듈 지정자에만 사용한다 — 내 코드는 그냥 TypeScript로 작성</text>
</svg>
