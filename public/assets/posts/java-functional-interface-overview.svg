<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">함수형 인터페이스 — 람다의 타입</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">추상 메서드 1개 = 람다 표현식 할당 가능</text>

  <!-- 중앙 핵심 박스 -->
  <rect x="280" y="92" width="320" height="72" rx="8" fill="#1a1020" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc">@FunctionalInterface</text>
  <text x="440" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">추상 메서드(SAM) 정확히 1개</text>
  <text x="440" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">default·static·private 메서드는 개수 제한 없음</text>

  <!-- 왼쪽: 람다 대입 -->
  <rect x="60" y="220" width="240" height="72" rx="8" fill="#0f140f" stroke="#55c555" stroke-width="1.5"/>
  <text x="180" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">람다 표현식</text>
  <text x="180" y="265" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">(a, b) -&gt; a + b</text>
  <text x="180" y="283" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">익명 클래스 대체</text>

  <!-- 오른쪽: 메서드 참조 -->
  <rect x="580" y="220" width="240" height="72" rx="8" fill="#0f0f14" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="700" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">메서드 참조</text>
  <text x="700" y="265" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">String::toUpperCase</text>
  <text x="700" y="283" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">람다의 축약 표현</text>

  <!-- 화살표: 람다/메서드참조 → 핵심 박스 -->
  <line x1="300" y1="220" x2="370" y2="164" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="580" y1="220" x2="510" y2="164" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- 4대 빌트인 함수형 인터페이스 -->
  <text x="440" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8">java.util.function 주요 인터페이스</text>

  <!-- 4개 박스 (하단 2×2) -->
  <!-- Function -->
  <rect x="60" y="338" width="180" height="68" rx="8" fill="#0d0d1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="150" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc">Function&lt;T,R&gt;</text>
  <text x="150" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">T 받아 R 반환</text>
  <text x="150" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">apply(T) -&gt; R</text>

  <!-- Predicate -->
  <rect x="260" y="338" width="180" height="68" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="350" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">Predicate&lt;T&gt;</text>
  <text x="350" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">T 받아 boolean 반환</text>
  <text x="350" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">test(T) -&gt; boolean</text>

  <!-- Consumer -->
  <rect x="460" y="338" width="180" height="68" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="550" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">Consumer&lt;T&gt;</text>
  <text x="550" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">T 받아 void</text>
  <text x="550" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">accept(T)</text>

  <!-- Supplier -->
  <rect x="660" y="338" width="180" height="68" rx="8" fill="#0d1414" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="750" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">Supplier&lt;T&gt;</text>
  <text x="750" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">인수 없이 T 반환</text>
  <text x="750" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">get() -&gt; T</text>

  <!-- 코드 박스 -->
  <rect x="60" y="425" width="760" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="447" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#9aa4b8">// 같은 람다, 다른 함수형 인터페이스 타입</text>
  <text x="76" y="465" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#7ec8e3" font-weight="600">Function</text>
  <text x="144" y="465" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">&lt;String, Integer&gt; len = s -&gt; s.length();</text>
  <text x="76" y="483" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#7ec8e3" font-weight="600">Predicate</text>
  <text x="163" y="483" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"
        font-size="13" fill="#ffffff">&lt;String&gt; empty = String::isEmpty;</text>
</svg>
