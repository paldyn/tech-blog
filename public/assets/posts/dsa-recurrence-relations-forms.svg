<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">대표 점화식 유형</text>

  <!-- subtitle row labels -->
  <text x="60" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">점화식</text>
  <text x="310" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">알고리즘 예시</text>
  <text x="560" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">점근적 해</text>

  <!-- divider -->
  <line x1="60" y1="102" x2="820" y2="102" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Row 1: T(n) = 2T(n/2) + n -->
  <rect x="60" y="115" width="230" height="56" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="137" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">T(n) = 2T(n/2) + n</text>
  <text x="76" y="157" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">분할 정복 형태</text>

  <rect x="310" y="115" width="220" height="56" rx="8" fill="#111827" stroke="#2a3a5e" stroke-width="1"/>
  <text x="326" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">병합 정렬</text>
  <text x="326" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Merge Sort</text>

  <rect x="560" y="115" width="260" height="56" rx="8" fill="#0d1f0d" stroke="#1a4a1a" stroke-width="1"/>
  <text x="576" y="137" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600" xml:space="preserve">T(n) = Θ(n log n)</text>
  <text x="576" y="157" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">준선형 시간</text>

  <!-- Row 2: T(n) = T(n/2) + 1 -->
  <rect x="60" y="191" width="230" height="56" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="213" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">T(n) = T(n/2) + 1</text>
  <text x="76" y="233" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">절반씩 제거</text>

  <rect x="310" y="191" width="220" height="56" rx="8" fill="#111827" stroke="#2a3a5e" stroke-width="1"/>
  <text x="326" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">이진 탐색</text>
  <text x="326" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Binary Search</text>

  <rect x="560" y="191" width="260" height="56" rx="8" fill="#0d1f0d" stroke="#1a4a1a" stroke-width="1"/>
  <text x="576" y="213" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600" xml:space="preserve">T(n) = Θ(log n)</text>
  <text x="576" y="233" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">로그 시간</text>

  <!-- Row 3: T(n) = T(n-1) + n -->
  <rect x="60" y="267" width="230" height="56" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="289" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">T(n) = T(n-1) + n</text>
  <text x="76" y="309" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">선형 감소</text>

  <rect x="310" y="267" width="220" height="56" rx="8" fill="#111827" stroke="#2a3a5e" stroke-width="1"/>
  <text x="326" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">선택 정렬</text>
  <text x="326" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Selection Sort</text>

  <rect x="560" y="267" width="260" height="56" rx="8" fill="#0d1f0d" stroke="#1a4a1a" stroke-width="1"/>
  <text x="576" y="289" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600" xml:space="preserve">T(n) = Θ(n²)</text>
  <text x="576" y="309" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">이차 시간</text>

  <!-- Row 4: T(n) = 2T(n-1) + 1 -->
  <rect x="60" y="343" width="230" height="56" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="365" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">T(n) = 2T(n-1) + 1</text>
  <text x="76" y="385" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">두 갈래로 분기</text>

  <rect x="310" y="343" width="220" height="56" rx="8" fill="#111827" stroke="#2a3a5e" stroke-width="1"/>
  <text x="326" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">하노이 탑</text>
  <text x="326" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Tower of Hanoi</text>

  <rect x="560" y="343" width="260" height="56" rx="8" fill="#0d1f0d" stroke="#1a4a1a" stroke-width="1"/>
  <text x="576" y="365" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600" xml:space="preserve">T(n) = Θ(2ⁿ)</text>
  <text x="576" y="385" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">지수 시간</text>

  <!-- divider 2 -->
  <line x1="60" y1="420" x2="820" y2="420" stroke="#2a2a2a" stroke-width="1"/>

  <!-- general form -->
  <text x="60" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">일반 형태:</text>
  <rect x="60" y="460" width="760" height="56" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="482" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">T(n)</tspan> = <tspan fill="#7ec8e3" font-weight="600">a</tspan> · T(n/<tspan fill="#7ec8e3" font-weight="600">b</tspan>) + f(n)   // a≥1, b&gt;1, f(n)은 분할·병합 비용</text>
  <text x="76" y="502" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">a = 재귀 호출 수,  b = 문제 크기 축소 비율</text>
</svg>
