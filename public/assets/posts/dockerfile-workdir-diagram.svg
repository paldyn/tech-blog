<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420" role="img" aria-label="WORKDIR 동작 원리">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">WORKDIR 동작 원리</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">이후 인스트럭션의 현재 디렉터리를 설정</text>

  <!-- Without WORKDIR (left) -->
  <rect x="60" y="95" width="340" height="270" rx="8" fill="#1a0808" stroke="#3d1e1e" stroke-width="1.5"/>
  <text x="230" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">WORKDIR 없이 (비권장)</text>

  <rect x="76" y="132" width="308" height="150" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
  <text x="92" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">FROM</text>
  <text x="128" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> node:20-alpine</text>
  <text x="92" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># 현재 위치: /</text>
  <text x="92" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">RUN</text>
  <text x="122" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> mkdir -p /app</text>
  <text x="92" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">COPY</text>
  <text x="128" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> . /app</text>
  <text x="92" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">RUN</text>
  <text x="122" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> cd /app &amp;&amp; npm install</text>
  <text x="92" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">CMD</text>
  <text x="122" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> ["node", "/app/server.js"]</text>

  <text x="80" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">mkdir 중복, cd는 레이어 간 유지 안 됨</text>
  <text x="80" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">절대 경로 반복 — 변경 시 여러 곳 수정</text>
  <text x="80" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">CMD에도 /app/ 절대 경로 반복</text>

  <!-- With WORKDIR (right) -->
  <rect x="480" y="95" width="340" height="270" rx="8" fill="#081808" stroke="#1e3d1e" stroke-width="1.5"/>
  <text x="650" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">WORKDIR 사용 (권장)</text>

  <rect x="496" y="132" width="308" height="150" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
  <text x="512" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">FROM</text>
  <text x="548" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> node:20-alpine</text>
  <text x="512" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">WORKDIR</text>
  <text x="580" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve"> /app</text>
  <text x="512" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># 이후 현재 위치: /app</text>
  <text x="512" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">COPY</text>
  <text x="548" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> . .</text>
  <text x="512" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">RUN</text>
  <text x="544" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> npm install</text>
  <text x="512" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">CMD</text>
  <text x="544" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> ["node", "server.js"]</text>

  <text x="500" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">/app 자동 생성, 절대 경로 반복 없음</text>
  <text x="500" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">RUN·COPY·CMD 모두 /app 기준</text>
  <text x="500" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">docker exec 진입 시에도 /app이 기본</text>

  <!-- Bottom note -->
  <text x="440" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555">WORKDIR은 디렉터리가 없으면 자동으로 생성한다 (mkdir -p 불필요)</text>
</svg>
