<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-grn" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Buildah — 이미지 빌드 방식 비교</text>

  <!-- Left: Dockerfile way -->
  <text x="200" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">Dockerfile 방식</text>

  <rect x="60" y="96" width="280" height="44" rx="5" fill="#0a1628" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="200" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" text-anchor="middle">buildah bud -t myapp .</text>

  <line x1="200" y1="140" x2="200" y2="170" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="60" y="170" width="280" height="44" rx="5" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="200" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">Dockerfile 파싱</text>
  <text x="200" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(BuildKit 없이 자체 파싱)</text>

  <line x1="200" y1="214" x2="200" y2="244" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="60" y="244" width="280" height="44" rx="5" fill="#0d1117" stroke="#ce9178" stroke-width="1.5"/>
  <text x="200" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178" text-anchor="middle">레이어별 컨테이너 생성·커밋</text>

  <!-- Right: Script way -->
  <text x="660" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">스크립트 방식 (고급)</text>

  <rect x="520" y="96" width="300" height="44" rx="5" fill="#0a1628" stroke="#55c555" stroke-width="1.5"/>
  <text x="670" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" text-anchor="middle">buildah from ubuntu:22.04</text>
  <text x="670" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">→ CONTAINER 변수 반환</text>

  <line x1="670" y1="140" x2="670" y2="170" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="520" y="170" width="300" height="44" rx="5" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="670" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" text-anchor="middle">buildah run $CTR -- apt install nginx</text>

  <line x1="670" y1="214" x2="670" y2="244" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="520" y="244" width="300" height="44" rx="5" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="670" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" text-anchor="middle">buildah copy $CTR ./app /app</text>

  <line x1="670" y1="288" x2="670" y2="318" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="520" y="318" width="300" height="44" rx="5" fill="#0a1628" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="670" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" text-anchor="middle">buildah commit $CTR myapp:latest</text>

  <!-- Shared output box -->
  <line x1="200" y1="288" x2="440" y2="370" stroke="#ce9178" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="670" y1="362" x2="560" y2="384" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="280" y="382" width="320" height="52" rx="6" fill="#0d1117" stroke="#b5cea8" stroke-width="2"/>
  <text x="440" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#b5cea8" text-anchor="middle">OCI 이미지 생성</text>
  <text x="440" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">buildah push myapp:latest docker://registry/myapp:latest</text>

  <!-- Bottom label -->
  <text x="440" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Buildah = 루트 데몬 없이 OCI 이미지 빌드 — Dockerfile 또는 쉘 스크립트로 세밀한 레이어 제어 가능</text>
</svg>
