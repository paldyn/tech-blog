<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">폼 유효성 검사 흐름</text>

  <defs>
    <marker id="arrf" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Step 1: User Input -->
  <rect x="340" y="76" width="200" height="52" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">사용자 입력</text>

  <!-- Arrow down -->
  <line x1="440" y1="128" x2="440" y2="158" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrf)"/>

  <!-- Step 2: Validate -->
  <rect x="340" y="160" width="200" height="52" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc">유효성 검사 실행</text>

  <!-- Arrow to error (left) -->
  <line x1="340" y1="186" x2="250" y2="186" stroke="#e05555" stroke-width="2" marker-end="url(#arrr)"/>
  <text x="295" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">실패</text>

  <!-- Arrow to pass (right) -->
  <line x1="540" y1="186" x2="630" y2="186" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>
  <text x="585" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">통과</text>

  <!-- Error box -->
  <rect x="100" y="160" width="150" height="52" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="175" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">에러 메시지</text>
  <text x="175" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">errors state 업데이트</text>

  <!-- Error loop back -->
  <path d="M 175 212 Q 175 260 340 260" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" fill="none" marker-end="url(#arrr)"/>
  <text x="220" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">UI에 표시</text>

  <!-- Pass box -->
  <rect x="630" y="160" width="150" height="52" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="705" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">제출 처리</text>
  <text x="705" y="202" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">API 호출 등</text>

  <!-- Validation timing labels -->
  <rect x="60" y="280" width="236" height="120" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="178" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">onChange 검사</text>
  <text x="178" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">타이핑마다 즉시 피드백</text>
  <text x="178" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">UX 좋음 / 리렌더 빈번</text>
  <text x="178" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">입력 중 경고 즉시 표시</text>

  <rect x="322" y="280" width="236" height="120" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="440" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">onBlur 검사</text>
  <text x="440" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">포커스 벗어날 때 검사</text>
  <text x="440" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">입력 중 방해 안 함</text>
  <text x="440" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">대부분 폼의 권장 타이밍</text>

  <rect x="584" y="280" width="236" height="120" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="702" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">onSubmit 검사</text>
  <text x="702" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">제출 시점에만 검사</text>
  <text x="702" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">가장 단순한 구현</text>
  <text x="702" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">입력 중 오류 표시 없음</text>
</svg>
