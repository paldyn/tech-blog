<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e0a555"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">강화학습 핵심 루프</text>
  <text x="440" y="66" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">에이전트 ↔ 환경 상호작용 사이클</text>

  <!-- 에이전트 박스 -->
  <rect x="60" y="180" width="240" height="100" fill="#1a1030" rx="10" stroke="#7777cc" stroke-width="2"/>
  <text x="180" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7777cc" text-anchor="middle">에이전트</text>
  <text x="180" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Agent</text>
  <text x="180" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">정책 π(a|s)에 따라 행동 선택</text>

  <!-- 환경 박스 -->
  <rect x="580" y="180" width="240" height="100" fill="#0f1a2e" rx="10" stroke="#7ec8e3" stroke-width="2"/>
  <text x="700" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">환경</text>
  <text x="700" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Environment</text>
  <text x="700" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">상태 전이 + 보상 계산</text>

  <!-- 행동(Action) 화살표 위 -->
  <line x1="300" y1="210" x2="580" y2="210" stroke="#e0a555" stroke-width="2.5" marker-end="url(#arr-orange)"/>
  <text x="440" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a555" text-anchor="middle">행동 aₜ (Action)</text>

  <!-- 상태/보상 화살표 아래 -->
  <line x1="580" y1="250" x2="300" y2="250" stroke="#55c555" stroke-width="2.5" marker-end="url(#arr-green)"/>
  <text x="440" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">상태 sₜ₊₁, 보상 rₜ (State, Reward)</text>

  <!-- 핵심 개념 4개 박스 -->
  <!-- State -->
  <rect x="60" y="336" width="170" height="76" fill="#0f1520" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="145" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">상태 (State)</text>
  <text x="145" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">환경의 현재 관측값</text>
  <text x="145" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">s ∈ S</text>

  <!-- Action -->
  <rect x="250" y="336" width="170" height="76" fill="#1a1010" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="335" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a555" text-anchor="middle">행동 (Action)</text>
  <text x="335" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">에이전트의 선택</text>
  <text x="335" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">a ∈ A</text>

  <!-- Reward -->
  <rect x="440" y="336" width="170" height="76" fill="#0d1f0d" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="525" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">보상 (Reward)</text>
  <text x="525" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">즉각적 피드백 신호</text>
  <text x="525" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">r ∈ ℝ</text>

  <!-- Policy -->
  <rect x="630" y="336" width="190" height="76" fill="#1a1030" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="725" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">정책 (Policy)</text>
  <text x="725" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">상태→행동 매핑</text>
  <text x="725" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">π: S → A</text>

  <!-- 목표 텍스트 -->
  <text x="440" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">목표: 누적 보상 G = Σ γᵗ rₜ 최대화</text>
  <text x="440" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#555" text-anchor="middle">γ (할인율): 미래 보상의 현재 가치</text>
</svg>
