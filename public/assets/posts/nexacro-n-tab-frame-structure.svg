<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Tab Frame 구조</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">TabControl + ChildFrame 조합으로 MDI 구현</text>

  <!-- Frame border -->
  <rect x="60" y="96" width="760" height="360" rx="8" fill="#0d1117" stroke="#1e2433" stroke-width="1.5"/>
  <text x="440" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Application Frame</text>

  <!-- Tab bar -->
  <rect x="76" y="124" width="728" height="32" rx="4" fill="#111827" stroke="#1e2433" stroke-width="1"/>
  <!-- Active tab -->
  <rect x="80" y="126" width="120" height="28" rx="4" fill="#7777cc"/>
  <text x="140" y="145" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#fff">홈</text>
  <!-- Inactive tabs -->
  <rect x="206" y="128" width="120" height="24" rx="3" fill="#1e2433"/>
  <text x="266" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">공지사항</text>
  <rect x="332" y="128" width="120" height="24" rx="3" fill="#1e2433"/>
  <text x="392" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">매출현황</text>
  <rect x="458" y="128" width="120" height="24" rx="3" fill="#1e2433"/>
  <text x="518" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">재고관리</text>
  <!-- Close buttons -->
  <text x="316" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">✕</text>
  <text x="442" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">✕</text>
  <text x="568" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">✕</text>

  <!-- Content area -->
  <rect x="76" y="160" width="728" height="272" rx="4" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7777cc">ChildFrame (활성 탭 Form 로드)</text>

  <!-- Form inside frame -->
  <rect x="100" y="204" width="680" height="204" rx="6" fill="#111827" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">home.xfdl — 홈 화면 Form</text>

  <!-- Lifecycle indicators -->
  <rect x="120" y="244" width="160" height="60" rx="4" fill="#0d1117" stroke="#55c555" stroke-width="1"/>
  <text x="200" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">탭 열기</text>
  <text x="200" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">loadForm(url)</text>
  <text x="200" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">onload 이벤트</text>

  <rect x="360" y="244" width="160" height="60" rx="4" fill="#0d1117" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">탭 전환</text>
  <text x="440" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">활성화/비활성화</text>
  <text x="440" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Form 캐시 유지</text>

  <rect x="600" y="244" width="160" height="60" rx="4" fill="#0d1117" stroke="#e05555" stroke-width="1"/>
  <text x="680" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">탭 닫기</text>
  <text x="680" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">ondestroy</text>
  <text x="680" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Form 메모리 해제</text>

  <!-- Arrow between boxes -->
  <line x1="280" y1="274" x2="358" y2="274" stroke="#888" stroke-width="1.5"/>
  <polygon points="358,269 370,274 358,279" fill="#888"/>
  <line x1="520" y1="274" x2="598" y2="274" stroke="#888" stroke-width="1.5"/>
  <polygon points="598,269 610,274 598,279" fill="#888"/>
</svg>
