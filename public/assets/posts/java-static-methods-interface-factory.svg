<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <defs>
    <marker id="arrB" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrG" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">인터페이스 static 팩토리 메서드 패턴</text>

  <!-- Shape interface box: x=200, y=74, w=480, h=96 -->
  <rect x="200" y="74" width="480" height="96" fill="#0e151e" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="96" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">&#171;interface&#187; Shape</text>
  <text x="440" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888888">double area();  &#8592; abstract (구현 클래스 필수)</text>
  <text x="440" y="136" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">static Shape circle(double r)  &#8592; 팩토리</text>
  <text x="440" y="156" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">static Shape rectangle(double w, double h)  &#8592; 팩토리</text>

  <!-- Arrow: Shape.circle → Circle class -->
  <line x1="300" y1="170" x2="200" y2="230" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrB)"/>
  <text x="218" y="204" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">creates</text>

  <!-- Arrow: Shape.rectangle → Rectangle class -->
  <line x1="580" y1="170" x2="680" y2="230" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrB)"/>
  <text x="660" y="204" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">creates</text>

  <!-- Circle class: x=60, y=238, w=280, h=76 -->
  <rect x="60" y="238" width="280" height="76" fill="#0e200e" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="200" y="260" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">Circle implements Shape</text>
  <text x="200" y="280" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">double r;</text>
  <text x="200" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888888">area() = Math.PI * r * r</text>

  <!-- Rectangle class: x=540, y=238, w=280, h=76 -->
  <rect x="540" y="238" width="280" height="76" fill="#0e200e" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="680" y="260" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">Rectangle implements Shape</text>
  <text x="680" y="280" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">double w, h;</text>
  <text x="680" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888888">area() = w * h</text>

  <!-- Code box: x=60, y=340, w=760, h=96 -->
  <rect x="60" y="340" width="760" height="96" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="362" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#9aa4b8">// 구현 클래스 이름 노출 없이 인터페이스 타입으로 사용</tspan>
  </text>
  <text x="80" y="382" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">Shape c = Shape.circle(</tspan><tspan fill="#b5cea8">5.0</tspan><tspan fill="#ffffff">);    </tspan>
    <tspan fill="#9aa4b8">// Shape.circle() — 인터페이스명.메서드()</tspan>
  </text>
  <text x="80" y="402" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">Shape r = Shape.rectangle(</tspan><tspan fill="#b5cea8">3.0</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">4.0</tspan><tspan fill="#ffffff">);  </tspan>
    <tspan fill="#9aa4b8">// 구현 클래스(Rectangle) 직접 노출 불필요</tspan>
  </text>
  <text x="80" y="422" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">System.out.println(c.area());  </tspan>
    <tspan fill="#9aa4b8">// 78.5... — area()는 구현 클래스가 제공</tspan>
  </text>
</svg>
