<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700">process 객체 핵심 속성과 이벤트</text>
  <text x="440" y="70" text-anchor="middle" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">Node.js 글로벌 process — 환경·실행·시그널·종료 제어</text>

  <!-- Column 1: Properties -->
  <rect x="60" y="90" width="240" height="340" rx="8" fill="#111218" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="116" text-anchor="middle" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600">프로세스 정보</text>

  <text x="80" y="142" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">process.pid</text>
  <text x="80" y="160" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">현재 프로세스 ID</text>

  <text x="80" y="186" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">process.ppid</text>
  <text x="80" y="204" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">부모 프로세스 ID</text>

  <text x="80" y="230" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">process.platform</text>
  <text x="80" y="248" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">linux / darwin / win32</text>

  <text x="80" y="274" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">process.arch</text>
  <text x="80" y="292" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">x64 / arm64 / ia32</text>

  <text x="80" y="318" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">process.version</text>
  <text x="80" y="336" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">v22.0.0 형식</text>

  <text x="80" y="362" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">process.uptime()</text>
  <text x="80" y="380" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">프로세스 가동 시간(초)</text>

  <text x="80" y="406" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">process.memoryUsage()</text>
  <text x="80" y="422" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">heapUsed, rss, external</text>

  <!-- Column 2: Env + I/O -->
  <rect x="320" y="90" width="240" height="340" rx="8" fill="#111218" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="116" text-anchor="middle" fill="#7777cc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600">환경 · I/O</text>

  <text x="340" y="142" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">process.env</text>
  <text x="340" y="160" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">환경 변수 객체 (읽기/쓰기)</text>

  <text x="340" y="186" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">process.argv</text>
  <text x="340" y="204" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">CLI 인수 배열</text>

  <text x="340" y="230" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">process.argv0</text>
  <text x="340" y="248" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">실행 파일 원본 이름</text>

  <text x="340" y="274" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">process.cwd()</text>
  <text x="340" y="292" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">현재 작업 디렉터리</text>

  <text x="340" y="318" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">process.stdin</text>
  <text x="340" y="336" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">Readable 스트림 (fd 0)</text>

  <text x="340" y="362" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">process.stdout</text>
  <text x="340" y="380" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">Writable 스트림 (fd 1)</text>

  <text x="340" y="406" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">process.stderr</text>
  <text x="340" y="422" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">Writable 스트림 (fd 2)</text>

  <!-- Column 3: Events + Exit -->
  <rect x="580" y="90" width="240" height="340" rx="8" fill="#111218" stroke="#55c555" stroke-width="1.5"/>
  <text x="700" y="116" text-anchor="middle" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600">이벤트 · 종료</text>

  <text x="600" y="142" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">'exit'</text>
  <text x="600" y="160" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">프로세스 종료 직전 (동기만)</text>

  <text x="600" y="186" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">'beforeExit'</text>
  <text x="600" y="204" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">이벤트 루프 비어있을 때</text>

  <text x="600" y="230" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">'uncaughtException'</text>
  <text x="600" y="248" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">잡히지 않은 예외</text>

  <text x="600" y="274" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">'unhandledRejection'</text>
  <text x="600" y="292" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">처리되지 않은 Promise 거부</text>

  <text x="600" y="318" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">'SIGINT' / 'SIGTERM'</text>
  <text x="600" y="336" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">시그널 수신 (graceful 종료)</text>

  <text x="600" y="362" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">process.exit(code)</text>
  <text x="600" y="380" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">0 = 정상, 1 = 오류</text>

  <text x="600" y="406" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">process.exitCode</text>
  <text x="600" y="422" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">자연 종료 시 종료 코드</text>

  <!-- Bottom note -->
  <text x="440" y="465" text-anchor="middle" fill="#555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">process는 글로벌 객체 — import 없이 사용 가능. ESM에서도 전역으로 접근</text>
</svg>
