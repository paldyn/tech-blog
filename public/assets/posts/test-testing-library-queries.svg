<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Testing Library 쿼리 우선순위</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">접근성이 높은 쿼리를 우선 사용 — 낮을수록 차선책</text>

  <!-- Priority 1 -->
  <rect x="60" y="88" width="760" height="62" rx="8" fill="#0d2218" stroke="#55c555" stroke-width="2"/>
  <text x="80" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">1순위 — 접근성 기반 (모든 사용자에게 접근 가능)</text>
  <text x="80" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">getByRole  getByLabelText  getByPlaceholderText  getByText  getByDisplayValue</text>

  <!-- Priority 2 -->
  <rect x="60" y="162" width="760" height="62" rx="8" fill="#141a0a" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="80" y="187" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#b5cea8">2순위 — 시맨틱 (의미 있는 속성)</text>
  <text x="80" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">getByAltText  getByTitle</text>

  <!-- Priority 3 -->
  <rect x="60" y="236" width="760" height="62" rx="8" fill="#0a1020" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="261" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">3순위 — 테스트 전용 ID (최후 수단)</text>
  <text x="80" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">getByTestId  &lt;button data-testid="submit"&gt;</text>

  <!-- Query prefix table -->
  <text x="60" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">쿼리 접두어 — 결과 없을 때 동작 차이</text>

  <!-- Header row -->
  <rect x="60" y="340" width="760" height="32" rx="4" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="120" y="361" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">접두어</text>
  <text x="340" y="361" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">없을 때</text>
  <text x="540" y="361" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">여러 개일 때</text>
  <text x="720" y="361" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">비동기</text>

  <!-- Row 1: getBy -->
  <rect x="60" y="372" width="760" height="30" rx="0" fill="#0d1117" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="120" y="392" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">getBy</text>
  <text x="340" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">에러 던짐</text>
  <text x="540" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">에러 던짐</text>
  <text x="720" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">-</text>

  <!-- Row 2: queryBy -->
  <rect x="60" y="402" width="760" height="30" rx="0" fill="#111827" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="120" y="422" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">queryBy</text>
  <text x="340" y="422" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8">null 반환</text>
  <text x="540" y="422" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">에러 던짐</text>
  <text x="720" y="422" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">-</text>

  <!-- Row 3: findBy -->
  <rect x="60" y="432" width="760" height="30" rx="0" fill="#0d1117" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="120" y="452" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">findBy</text>
  <text x="340" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">Promise reject</text>
  <text x="540" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">Promise reject</text>
  <text x="720" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">O (polling)</text>

  <!-- Row 4: getAllBy -->
  <rect x="60" y="462" width="760" height="30" rx="0" fill="#111827" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="120" y="482" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">getAllBy</text>
  <text x="340" y="482" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">에러 던짐</text>
  <text x="540" y="482" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">배열 반환</text>
  <text x="720" y="482" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">-</text>
</svg>
