<svg width="880" height="450" viewBox="0 0 880 450" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="450" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">확장 유클리드: 48x + 18y = gcd를 만족하는 (x, y)</text>

  <!-- table header -->
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">
    <text x="100" y="104">몫 q</text>
    <text x="240" y="104">r</text>
    <text x="380" y="104">x</text>
    <text x="510" y="104">y</text>
    <text x="620" y="104">검증: 48x + 18y = r</text>
  </g>

  <g font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <rect x="60" y="118" width="760" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="100" y="143" xml:space="preserve" fill="#9aa4b8">—</text>
    <text x="230" y="143" xml:space="preserve" fill="#b5cea8">48</text>
    <text x="370" y="143" xml:space="preserve" fill="#ffffff">1</text>
    <text x="500" y="143" xml:space="preserve" fill="#ffffff">0</text>
    <text x="620" y="143" xml:space="preserve" fill="#9aa4b8">48·1 + 18·0 = 48</text>

    <rect x="60" y="166" width="760" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="100" y="191" xml:space="preserve" fill="#9aa4b8">—</text>
    <text x="230" y="191" xml:space="preserve" fill="#b5cea8">18</text>
    <text x="370" y="191" xml:space="preserve" fill="#ffffff">0</text>
    <text x="500" y="191" xml:space="preserve" fill="#ffffff">1</text>
    <text x="620" y="191" xml:space="preserve" fill="#9aa4b8">48·0 + 18·1 = 18</text>

    <rect x="60" y="214" width="760" height="40" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="100" y="239" xml:space="preserve" fill="#7ec8e3" font-weight="600">2</text>
    <text x="230" y="239" xml:space="preserve" fill="#b5cea8">12</text>
    <text x="370" y="239" xml:space="preserve" fill="#ffffff">1</text>
    <text x="500" y="239" xml:space="preserve" fill="#ffffff">-2</text>
    <text x="620" y="239" xml:space="preserve" fill="#9aa4b8">48·1 + 18·(-2) = 12</text>

    <rect x="60" y="262" width="760" height="40" rx="6" fill="#000000" stroke="#55c555" stroke-width="1.5"/>
    <text x="100" y="287" xml:space="preserve" fill="#7ec8e3" font-weight="600">1</text>
    <text x="230" y="287" xml:space="preserve" fill="#55c555" font-weight="600">6</text>
    <text x="370" y="287" xml:space="preserve" fill="#55c555" font-weight="600">-1</text>
    <text x="500" y="287" xml:space="preserve" fill="#55c555" font-weight="600">3</text>
    <text x="620" y="287" xml:space="preserve" fill="#ffffff">48·(-1) + 18·3 = 6</text>
  </g>

  <!-- rule + result -->
  <rect x="60" y="330" width="760" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">갱신 규칙</tspan><tspan fill="#ffffff">: r = r_prev - q·r_cur  (x, y도 같은 식으로 갱신)</tspan></text>

  <text x="60" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">r이 gcd에 도달한 행의 (x, y)가 베주 계수 — 모듈러 역원 계산의 토대가 된다</text>
</svg>
