<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">rerere: 충돌 해결책 기록 → 재사용</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#888">Reuse Recorded Resolution — 같은 충돌은 한 번만 해결한다</text>

  <!-- Phase 1: First time -->
  <rect x="60" y="92" width="360" height="320" rx="10" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">1회차: 처음 충돌 해결</text>

  <rect x="80" y="132" width="320" height="32" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="240" y="153" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">git merge feature</text>

  <line x1="240" y1="164" x2="240" y2="192" stroke="#555" stroke-width="1.5"/>
  <polygon points="240,200 233,190 247,190" fill="#555"/>

  <rect x="80" y="200" width="320" height="32" rx="6" fill="#1a0808" stroke="#e05555"/>
  <text x="240" y="221" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">CONFLICT 발생</text>

  <line x1="240" y1="232" x2="240" y2="260" stroke="#555" stroke-width="1.5"/>
  <polygon points="240,268 233,258 247,258" fill="#555"/>

  <text x="240" y="287" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">수동으로 충돌 해결</text>
  <text x="240" y="307" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">(마커 제거, git add)</text>

  <line x1="240" y1="316" x2="240" y2="344" stroke="#555" stroke-width="1.5"/>
  <polygon points="240,352 233,342 247,342" fill="#555"/>

  <rect x="80" y="352" width="320" height="32" rx="6" fill="#0a1a0a" stroke="#55c555"/>
  <text x="240" y="373" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">rerere가 해결책을 .git/rr-cache 에 저장</text>

  <!-- Arrow between phases -->
  <line x1="420" y1="252" x2="460" y2="252" stroke="#7777cc" stroke-width="2"/>
  <polygon points="468,252 456,244 456,260" fill="#7777cc"/>
  <text x="440" y="244" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">재사용</text>

  <!-- Phase 2: Subsequent times -->
  <rect x="460" y="92" width="360" height="320" rx="10" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">2회차+: 같은 충돌 자동 해결</text>

  <rect x="480" y="132" width="320" height="32" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="640" y="153" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">git rebase main</text>

  <line x1="640" y1="164" x2="640" y2="192" stroke="#555" stroke-width="1.5"/>
  <polygon points="640,200 633,190 647,190" fill="#555"/>

  <rect x="480" y="200" width="320" height="32" rx="6" fill="#1a0808" stroke="#e05555"/>
  <text x="640" y="221" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">같은 충돌 감지</text>

  <line x1="640" y1="232" x2="640" y2="260" stroke="#555" stroke-width="1.5"/>
  <polygon points="640,268 633,258 647,258" fill="#555"/>

  <text x="640" y="287" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">rr-cache에서 해결책 자동 적용</text>
  <text x="640" y="307" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">(수동 편집 불필요)</text>

  <line x1="640" y1="316" x2="640" y2="344" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="640,352 633,342 647,342" fill="#55c555"/>

  <rect x="480" y="352" width="320" height="32" rx="6" fill="#0a1a0a" stroke="#55c555"/>
  <text x="640" y="373" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">git add → 커밋 완료</text>
</svg>
