<svg xmlns="http://www.w3.org/2000/svg" width="880" height="450" viewBox="0 0 880 450">
  <rect width="880" height="450" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">Background Sync 코드 패턴</text>
  <text x="440" y="70" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#888">페이지 등록 · SW sync 핸들러</text>

  <!-- Left: Page code -->
  <text x="60" y="100"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#7ec8e3">페이지 — 큐 등록</text>
  <rect x="60" y="110" width="370" height="300" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="138" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">async function</tspan> sendForm(data) {</text>
  <text x="76" y="156" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3">try</tspan> {</text>
  <text x="76" y="174" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">await</tspan> fetch(<tspan fill="#ce9178">'/api/submit'</tspan>,{</text>
  <text x="76" y="192" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">      method:<tspan fill="#ce9178">'POST'</tspan>,body:JSON.stringify(data)</text>
  <text x="76" y="210" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">    });</text>
  <text x="76" y="228" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">  } <tspan fill="#7ec8e3">catch</tspan> {</text>
  <text x="76" y="246" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8">    // 오프라인: IndexedDB에 저장</text>
  <text x="76" y="264" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">await</tspan> saveToIDB(data);</text>
  <text x="76" y="282" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">const</tspan> reg =</text>
  <text x="76" y="300" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">      <tspan fill="#7ec8e3">await</tspan> navigator.serviceWorker.ready;</text>
  <text x="76" y="318" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">await</tspan> reg.sync.register(</text>
  <text x="76" y="336" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">      <tspan fill="#ce9178">'send-form'</tspan></text>
  <text x="76" y="354" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">    );</text>
  <text x="76" y="372" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">  }</text>
  <text x="76" y="390" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">}</text>

  <!-- Right: SW sync handler -->
  <text x="460" y="100"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#7777cc">SW — sync 이벤트 처리</text>
  <rect x="460" y="110" width="370" height="300" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="138" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">self.addEventListener(<tspan fill="#ce9178">'sync'</tspan>, e => {</text>
  <text x="476" y="156" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3">if</tspan> (e.tag !== <tspan fill="#ce9178">'send-form'</tspan>) <tspan fill="#7ec8e3">return</tspan>;</text>
  <text x="476" y="174" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">  e.waitUntil(replayQueue());</text>
  <text x="476" y="192" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">});</text>
  <text x="476" y="214" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">async function</tspan> replayQueue() {</text>
  <text x="476" y="232" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3">const</tspan> items = <tspan fill="#7ec8e3">await</tspan> getAllFromIDB();</text>
  <text x="476" y="250" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3">for</tspan> (<tspan fill="#7ec8e3">const</tspan> item <tspan fill="#7ec8e3">of</tspan> items) {</text>
  <text x="476" y="268" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">const</tspan> res = <tspan fill="#7ec8e3">await</tspan> fetch(</text>
  <text x="476" y="286" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">      <tspan fill="#ce9178">'/api/submit'</tspan>, {</text>
  <text x="476" y="304" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">        method: <tspan fill="#ce9178">'POST'</tspan>,</text>
  <text x="476" y="322" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">        body: JSON.stringify(item)</text>
  <text x="476" y="340" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">      });</text>
  <text x="476" y="358" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">if</tspan> (res.ok) <tspan fill="#7ec8e3">await</tspan> deleteFromIDB(item);</text>
  <text x="476" y="376" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8">    // 실패 시 예외 → 브라우저 재시도</text>
  <text x="476" y="394" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">  }</text>
</svg>
