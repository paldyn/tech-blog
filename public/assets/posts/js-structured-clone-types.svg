<svg width="880" height="460" viewBox="0 0 880 460" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">structuredClone — 지원 타입</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">지원 타입 vs 지원 안 되는 타입</text>
  <line x1="60" y1="92" x2="820" y2="92" stroke="#1e2433" stroke-width="1"/>

  <!-- Supported types -->
  <text x="60" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓ 지원 타입 (깊은 복사 가능)</text>
  <rect x="60" y="126" width="360" height="208" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#6a8aa0">// 기본 값 타입</tspan>
  </text>
  <text x="76" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">structuredClone({ a: </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">, b: </tspan><tspan fill="#ce9178">'hi'</tspan><tspan fill="#e8e8e8"> })</tspan>
  </text>
  <text x="76" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">structuredClone([</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">, [</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#e8e8e8">]])</tspan>
  </text>
  <text x="76" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">structuredClone(</tspan><tspan fill="#7ec8e3">new</tspan><tspan fill="#e8e8e8"> Date())</tspan>
  </text>
  <text x="76" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">structuredClone(</tspan><tspan fill="#7ec8e3">new</tspan><tspan fill="#e8e8e8"> Map([[</tspan><tspan fill="#ce9178">'k'</tspan><tspan fill="#e8e8e8">,</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">]]))</tspan>
  </text>
  <text x="76" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">structuredClone(</tspan><tspan fill="#7ec8e3">new</tspan><tspan fill="#e8e8e8"> Set([</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">,</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">]))</tspan>
  </text>
  <text x="76" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">structuredClone(</tspan><tspan fill="#7ec8e3">new</tspan><tspan fill="#e8e8e8"> ArrayBuffer(</tspan><tspan fill="#b5cea8">8</tspan><tspan fill="#e8e8e8">))</tspan>
  </text>
  <text x="76" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">structuredClone(/regex/gi)</tspan>
  </text>
  <text x="76" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">structuredClone(</tspan><tspan fill="#7ec8e3">new</tspan><tspan fill="#e8e8e8"> Blob([</tspan><tspan fill="#ce9178">'data'</tspan><tspan fill="#e8e8e8">]))</tspan>
  </text>
  <text x="76" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 순환 참조도 지원!</text>

  <!-- Unsupported types -->
  <text x="460" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">✗ 지원 안 되는 타입</text>
  <rect x="460" y="126" width="360" height="208" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="476" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 함수</text>
  <text x="476" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">structuredClone(() =&gt; {})</tspan>
  </text>
  <text x="476" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">// DataCloneError</text>
  <text x="476" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// DOM 노드</text>
  <text x="476" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#e8e8e8">structuredClone(document.body)</tspan>
  </text>
  <text x="476" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">// DataCloneError</text>
  <text x="476" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// Symbol, WeakMap, WeakSet</text>
  <text x="476" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 프로토타입 메서드</text>
  <text x="476" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">// (사용자 정의 클래스 인스턴스 → 프로토타입 소실)</text>

  <text x="440" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복</text>
</svg>
