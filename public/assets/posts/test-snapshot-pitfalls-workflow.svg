<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">스냅샷 테스트 워크플로우</text>

  <!-- Step 1: 첫 실행 -->
  <rect x="60" y="72" width="180" height="60" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="150" y="97" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">첫 실행</text>
  <text x="150" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">스냅샷 파일 생성</text>

  <line x1="240" y1="102" x2="278" y2="102" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2: 코드 변경 -->
  <rect x="280" y="72" width="180" height="60" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="370" y="97" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">코드 변경 후 실행</text>
  <text x="370" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">현재 vs 저장 비교</text>

  <line x1="460" y1="102" x2="498" y2="102" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Decision: 일치? -->
  <polygon points="540,72 620,102 540,132 460,102" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="540" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">일치?</text>
  <text x="540" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">비교</text>

  <!-- Yes path (일치) -->
  <line x1="620" y1="102" x2="658" y2="102" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>
  <rect x="660" y="72" width="160" height="60" rx="8" fill="#0d2218" stroke="#55c555" stroke-width="1.5"/>
  <text x="740" y="97" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">통과</text>
  <text x="740" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">변경 없음 확인</text>
  <text x="640" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">YES</text>

  <!-- No path (불일치) -->
  <line x1="540" y1="132" x2="540" y2="168" stroke="#e05555" stroke-width="2" marker-end="url(#arrr)"/>
  <text x="550" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">NO</text>

  <!-- Decision2: 의도된 변경? -->
  <rect x="400" y="170" width="280" height="60" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="540" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">의도된 변경인가?</text>
  <text x="540" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">코드 리뷰로 판단</text>

  <!-- 의도된 변경: 스냅샷 업데이트 -->
  <line x1="400" y1="200" x2="352" y2="200" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>
  <text x="365" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">YES</text>
  <rect x="160" y="170" width="190" height="60" rx="8" fill="#0d2218" stroke="#55c555" stroke-width="1.5"/>
  <text x="255" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">--updateSnapshot</text>
  <text x="255" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">스냅샷 파일 갱신</text>

  <!-- 의도치 않은 변경: 버그 -->
  <line x1="680" y1="200" x2="718" y2="200" stroke="#e05555" stroke-width="2" marker-end="url(#arrr)"/>
  <text x="690" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">NO</text>
  <rect x="720" y="170" width="100" height="60" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="770" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">버그 발견</text>
  <text x="770" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">코드 수정</text>

  <!-- Pitfalls section -->
  <text x="60" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">스냅샷 테스트의 함정</text>

  <rect x="60" y="282" width="230" height="76" rx="8" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="80" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">자동 승인 습관화</text>
  <text x="80" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">"변경이 많네, 그냥</text>
  <text x="80" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">--u 해버리자" → 무의미</text>

  <rect x="310" y="282" width="230" height="76" rx="8" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="330" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">거대 스냅샷</text>
  <text x="330" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">전체 컴포넌트 트리를</text>
  <text x="330" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">스냅샷 → 리뷰 불가</text>

  <rect x="560" y="282" width="260" height="76" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="580" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">인라인 스냅샷 권장</text>
  <text x="580" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">toMatchInlineSnapshot으로</text>
  <text x="580" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">테스트 파일 안에 유지</text>

  <!-- Good use cases -->
  <text x="60" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">스냅샷이 적합한 경우</text>
  <rect x="60" y="400" width="760" height="48" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">직렬화된 값 검증 (API 응답 구조, 에러 메시지 형식)</text>
  <text x="80" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">작고 안정적인 결과물 · 코드 생성기 출력 · 설정 파일 구조</text>
</svg>
