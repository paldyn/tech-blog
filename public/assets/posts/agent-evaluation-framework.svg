<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">에이전트 평가 프레임워크</text>
  <text x="440" y="66" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">Task Success · Trajectory · LLM-as-Judge · 비용 네 축을 동시에 평가</text>

  <!-- Task Success Rate -->
  <rect x="40" y="90" width="380" height="150" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">① Task Success Rate</text>
  <text x="230" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">태스크별 성공/실패 이진 판단</text>

  <!-- Progress bar -->
  <rect x="60" y="148" width="340" height="22" rx="4" fill="#1a1a1a"/>
  <rect x="60" y="148" width="255" height="22" rx="4" fill="#55c555"/>
  <text x="315" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">75%</text>

  <text x="60" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">성공 기준 예시:</text>
  <text x="60" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">• 코드 실행 성공 + 정답 출력</text>
  <text x="60" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">• 검색 결과에 정답 포함 여부</text>

  <!-- Trajectory Quality -->
  <rect x="460" y="90" width="380" height="150" rx="8" fill="#1a0f0a" stroke="#e0a855" stroke-width="1.5"/>
  <text x="650" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e0a855">② Trajectory Quality</text>
  <text x="650" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">중간 과정(도구 선택·순서·횟수) 평가</text>

  <rect x="476" y="148" width="348" height="18" rx="3" fill="#000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="161" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e0a855" font-weight="600" xml:space="preserve">불필요한 도구 호출 수 / 정답까지 최단 경로 대비 비율</text>
  <text x="476" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">• 도구 호출 효율 (필요한 최소 횟수 대비)</text>
  <text x="476" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">• 불필요한 루프·중복 검색 비율</text>
  <text x="476" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">• 올바른 도구 선택 정확도</text>

  <!-- LLM-as-Judge -->
  <rect x="40" y="260" width="380" height="150" rx="8" fill="#0f1f0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="230" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">③ LLM-as-Judge</text>
  <text x="230" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">강력한 LLM이 에이전트 결과를 평가</text>

  <rect x="56" y="316" width="348" height="18" rx="3" fill="#000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="329" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" font-weight="600" xml:space="preserve">judge_llm.evaluate(question, answer, rubric)</text>
  <text x="56" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">• Pairwise comparison (어느 쪽이 나은가)</text>
  <text x="56" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">• Absolute scoring (루브릭 기반 절대 점수)</text>
  <text x="56" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">• Reference-based (레퍼런스 답변 대비)</text>
  <text x="56" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">• 도구: LangSmith Evaluator, OpenAI Evals</text>

  <!-- Cost & Latency -->
  <rect x="460" y="260" width="380" height="150" rx="8" fill="#1a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="650" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">④ Cost &amp; Latency</text>
  <text x="650" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">비용·속도의 현실적 트레이드오프</text>

  <rect x="476" y="316" width="348" height="18" rx="3" fill="#000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="329" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc" font-weight="600" xml:space="preserve">tokens_used, api_calls, wall_time, cost_usd</text>
  <text x="476" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">• 태스크당 평균 토큰 사용량</text>
  <text x="476" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">• API 호출 횟수 (에이전트 루프 수)</text>
  <text x="476" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">• P50/P95 응답 레이턴시</text>
  <text x="476" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">• 태스크당 비용 (USD)</text>

  <!-- Summary bar -->
  <rect x="40" y="430" width="800" height="46" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="60" y="452" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 종합 점수 = α×성공률 + β×궤적점수 + γ×LLM점수 - δ×비용</text>
  <text x="60" y="468" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 가중치 α,β,γ,δ는 비즈니스 우선순위에 따라 조정 (기본: 0.4, 0.2, 0.3, 0.1)</text>
</svg>
