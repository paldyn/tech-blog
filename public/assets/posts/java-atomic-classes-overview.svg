<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arra" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">java.util.concurrent.atomic 클래스 계층</text>

  <!-- AtomicInteger -->
  <rect x="60" y="70" width="180" height="80" rx="8" fill="#0a1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="150" y="97" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">AtomicInteger</text>
  <text x="150" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">get() / set()</text>
  <text x="150" y="131" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">incrementAndGet()</text>
  <text x="150" y="143" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">compareAndSet()</text>

  <!-- AtomicLong -->
  <rect x="270" y="70" width="180" height="80" rx="8" fill="#0a1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="360" y="97" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">AtomicLong</text>
  <text x="360" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">AtomicInteger와 동일</text>
  <text x="360" y="131" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">64비트 범위</text>

  <!-- AtomicBoolean -->
  <rect x="480" y="70" width="180" height="80" rx="8" fill="#0a1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="570" y="97" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">AtomicBoolean</text>
  <text x="570" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">get() / set()</text>
  <text x="570" y="131" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">compareAndSet()</text>

  <!-- AtomicReference -->
  <rect x="690" y="70" width="150" height="80" rx="8" fill="#1a1400" stroke="#e8c44a" stroke-width="2"/>
  <text x="765" y="97" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8c44a">AtomicReference</text>
  <text x="765" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">객체 참조 원자 조작</text>
  <text x="765" y="131" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">ABA 문제 있음</text>

  <!-- LongAdder -->
  <rect x="60" y="185" width="180" height="80" rx="8" fill="#0a1f0a" stroke="#55c555" stroke-width="2"/>
  <text x="150" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">LongAdder</text>
  <text x="150" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">고경합 카운터에 최적</text>
  <text x="150" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">내부 셀 분산으로 경합 줄임</text>
  <text x="150" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">sum() / add() / reset()</text>

  <!-- LongAccumulator -->
  <rect x="270" y="185" width="180" height="80" rx="8" fill="#0a1f0a" stroke="#55c555" stroke-width="2"/>
  <text x="360" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">LongAccumulator</text>
  <text x="360" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">커스텀 집계 함수</text>
  <text x="360" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">max/min 등 구현 가능</text>

  <!-- AtomicStampedReference -->
  <rect x="480" y="185" width="200" height="80" rx="8" fill="#1f0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="580" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">AtomicStampedReference</text>
  <text x="580" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">ABA 문제 해결</text>
  <text x="580" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">버전 스탬프로 변경 감지</text>

  <!-- CAS Explanation -->
  <text x="80" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">CAS (Compare-And-Swap) 원리</text>
  <rect x="60" y="315" width="760" height="155" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="337" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 의사 코드: compareAndSet(expected, newValue)</text>
  <text x="76" y="355" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// CPU 단일 명령(CMPXCHG)으로 실행 — 인터럽트 불가</text>
  <text x="76" y="373" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">if</text>
  <text x="96" y="373" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> (현재값 == expected) {</text>
  <text x="76" y="391" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    현재값 = newValue;</text>
  <text x="76" y="409" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    return true</text>
  <text x="193.4" y="409" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">;</text>
  <text x="76" y="427" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">} </text>
  <text x="90" y="427" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">else</text>
  <text x="114" y="427" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> { </text>
  <text x="138" y="427" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">return false</text>
  <text x="232" y="427" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">; }</text>
  <text x="76" y="457" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 실패 시 루프로 재시도 (spin) — 경합 적을 때 효율적</text>
</svg>
