<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">HTTP 메서드 × CRUD 매핑 전략</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">Spring MVC 단축 어노테이션과 멱등성 특성</text>

  <!-- Table header -->
  <rect x="60" y="96" width="760" height="36" fill="#111827" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="130" y="119" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">메서드</text>
  <text x="280" y="119" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">CRUD</text>
  <text x="420" y="119" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">멱등 / 안전</text>
  <text x="600" y="119" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">어노테이션</text>
  <!-- vertical dividers in header -->
  <line x1="200" y1="96" x2="200" y2="132" stroke="#222" stroke-width="1"/>
  <line x1="340" y1="96" x2="340" y2="132" stroke="#222" stroke-width="1"/>
  <line x1="490" y1="96" x2="490" y2="132" stroke="#222" stroke-width="1"/>

  <!-- Row GET -->
  <rect x="60" y="140" width="760" height="52" fill="#0d1117" rx="0"/>
  <rect x="60" y="140" width="140" height="52" fill="#0d2a1a" rx="0"/>
  <text x="130" y="170" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#55c555">GET</text>
  <text x="280" y="163" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Read</text>
  <text x="280" y="181" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">목록·단건 조회</text>
  <text x="420" y="163" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">멱등 ✓  안전 ✓</text>
  <text x="600" y="170" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">@GetMapping</text>
  <line x1="200" y1="140" x2="200" y2="192" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="340" y1="140" x2="340" y2="192" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="490" y1="140" x2="490" y2="192" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="60" y1="192" x2="820" y2="192" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Row POST -->
  <rect x="60" y="192" width="760" height="52" fill="#0d1117" rx="0"/>
  <rect x="60" y="192" width="140" height="52" fill="#2a1a0d" rx="0"/>
  <text x="130" y="222" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#ce9178">POST</text>
  <text x="280" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Create</text>
  <text x="280" y="233" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">리소스 생성</text>
  <text x="420" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">비멱등  비안전</text>
  <text x="600" y="222" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">@PostMapping</text>
  <line x1="200" y1="192" x2="200" y2="244" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="340" y1="192" x2="340" y2="244" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="490" y1="192" x2="490" y2="244" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="60" y1="244" x2="820" y2="244" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Row PUT -->
  <rect x="60" y="244" width="760" height="52" fill="#0d1117" rx="0"/>
  <rect x="60" y="244" width="140" height="52" fill="#1a1a2a" rx="0"/>
  <text x="130" y="274" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#7777cc">PUT</text>
  <text x="280" y="267" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Update (전체)</text>
  <text x="280" y="285" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">리소스 전체 교체</text>
  <text x="420" y="267" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">멱등 ✓  비안전</text>
  <text x="600" y="274" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">@PutMapping</text>
  <line x1="200" y1="244" x2="200" y2="296" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="340" y1="244" x2="340" y2="296" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="490" y1="244" x2="490" y2="296" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="60" y1="296" x2="820" y2="296" stroke="#3a4a6e" stroke-width="1"/>

