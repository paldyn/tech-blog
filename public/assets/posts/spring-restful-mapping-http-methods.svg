  <text x="130" y="326" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#7ec8e3">PATCH</text>
  <text x="280" y="319" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Update (부분)</text>
  <text x="280" y="337" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">리소스 부분 수정</text>
  <text x="420" y="319" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">비멱등  비안전</text>
  <text x="600" y="326" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">@PatchMapping</text>
  <line x1="200" y1="296" x2="200" y2="348" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="340" y1="296" x2="340" y2="348" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="490" y1="296" x2="490" y2="348" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="60" y1="348" x2="820" y2="348" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Row DELETE -->
  <rect x="60" y="348" width="760" height="52" fill="#0d1117" rx="0"/>
  <rect x="60" y="348" width="140" height="52" fill="#2a0d0d" rx="0"/>
  <text x="130" y="378" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#e05555">DELETE</text>
  <text x="280" y="371" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Delete</text>
  <text x="280" y="389" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">리소스 삭제</text>
  <text x="420" y="371" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">멱등 ✓  비안전</text>
  <text x="600" y="378" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">@DeleteMapping</text>
  <line x1="200" y1="348" x2="200" y2="400" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="340" y1="348" x2="340" y2="400" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="490" y1="348" x2="490" y2="400" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Table border -->
  <rect x="60" y="140" width="760" height="260" fill="none" rx="0" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Status Code Guide -->
  <text x="440" y="436" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">성공 응답 상태 코드</text>
  <rect x="60" y="448" width="152" height="48" fill="#111827" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="136" y="468" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">200 OK</text>
  <text x="136" y="487" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">GET, PUT, PATCH</text>

  <rect x="228" y="448" width="152" height="48" fill="#111827" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="304" y="468" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">201 Created</text>
  <text x="304" y="487" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">POST 성공 시</text>

  <rect x="396" y="448" width="152" height="48" fill="#111827" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="472" y="468" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">204 No Content</text>
  <text x="472" y="487" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">DELETE, 바디 없을 때</text>

  <rect x="564" y="448" width="256" height="48" fill="#111827" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="692" y="468" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">Location 헤더</text>
  <text x="692" y="487" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">201 응답 시 생성된 URI 포함</text>
</svg>
