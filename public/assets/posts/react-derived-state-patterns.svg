<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420"
     style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">흔히 state로 만들지만 계산이 맞는 케이스</text>

  <!-- Case 1: filtered list -->
  <rect x="60" y="62" width="360" height="150" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="240" y="82" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">필터된 목록</text>
  <rect x="76" y="90" width="328" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="11" xml:space="preserve">
    <tspan x="92" y="108" fill="#9aa4b8">// filter 조건만 state, 결과는 계산</tspan>
    <tspan x="92" dy="16" fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> [filter, setFilter] = useState(</tspan><tspan fill="#ce9178">'all'</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="92" dy="16" fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> visible = todos.filter(t =&gt;</tspan>
    <tspan x="92" dy="16" fill="#ffffff">  filter === </tspan><tspan fill="#ce9178">'all'</tspan><tspan fill="#ffffff"> || t.done === (filter===</tspan><tspan fill="#ce9178">'done'</tspan><tspan fill="#ffffff">)</tspan>
    <tspan x="92" dy="16" fill="#ffffff">);</tspan>
  </text>

  <!-- Case 2: search -->
  <rect x="460" y="62" width="360" height="150" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="640" y="82" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">검색 결과</text>
  <rect x="476" y="90" width="328" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="11" xml:space="preserve">
    <tspan x="492" y="108" fill="#9aa4b8">// 검색어만 state, 결과는 계산</tspan>
    <tspan x="492" dy="16" fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> [query, setQuery] = useState(</tspan><tspan fill="#ce9178">''</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="492" dy="16" fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> results = users.filter(u =&gt;</tspan>
    <tspan x="492" dy="16" fill="#ffffff">  u.name.toLowerCase().includes(</tspan>
    <tspan x="492" dy="16" fill="#ffffff">    query.toLowerCase()</tspan>
    <tspan x="492" dy="16" fill="#ffffff">  )</tspan>
  </text>

  <!-- Case 3: form validity -->
  <rect x="60" y="228" width="360" height="150" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="240" y="248" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">폼 유효성</text>
  <rect x="76" y="256" width="328" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="11" xml:space="preserve">
    <tspan x="92" y="274" fill="#9aa4b8">// 입력값만 state, 유효성은 계산</tspan>
    <tspan x="92" dy="16" fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> [email, setEmail] = useState(</tspan><tspan fill="#ce9178">''</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="92" dy="16" fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> isValid = email.includes(</tspan><tspan fill="#ce9178">'@'</tspan><tspan fill="#ffffff">)</tspan>
    <tspan x="92" dy="16" fill="#ffffff">  &amp;&amp; email.length &gt; </tspan><tspan fill="#b5cea8">4</tspan><tspan fill="#ffffff">;</tspan>
    <tspan x="92" dy="16" fill="#9aa4b8">// isValid를 state로 만들 필요 없음</tspan>
  </text>

  <!-- Case 4: selected item full data -->
  <rect x="460" y="228" width="360" height="150" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="640" y="248" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">선택 항목 데이터</text>
  <rect x="476" y="256" width="328" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="11" xml:space="preserve">
    <tspan x="492" y="274" fill="#9aa4b8">// ID만 state, 객체는 계산</tspan>
    <tspan x="492" dy="16" fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> [selectedId, setId] = useState(</tspan><tspan fill="#b5cea8">null</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="492" dy="16" fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> selected = items.find(</tspan>
    <tspan x="492" dy="16" fill="#ffffff">  i =&gt; i.id === selectedId</tspan>
    <tspan x="492" dy="16" fill="#ffffff">);</tspan>
    <tspan x="492" dy="16" fill="#9aa4b8">// items 업데이트 시 자동 반영</tspan>
  </text>

  <!-- Bottom tip -->
  <text x="440" y="400" text-anchor="middle" font-size="12" fill="#888">useMemo를 쓰면 비용이 큰 계산(예: 수천 건 필터)을 의존성이 바뀔 때만 재실행할 수 있다</text>
</svg>
