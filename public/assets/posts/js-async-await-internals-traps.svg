<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">async/await &#xD568;&#xC815;&#xACFC; &#xC8FC;&#xC758;&#xC0AC;&#xD56D;</text>

  <!-- Left: serial vs parallel -->
  <rect x="50" y="68" width="370" height="300" rx="6" fill="#070b14" stroke="#e05555"/>
  <text x="235" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">&#xC9C1;&#xB82C; await &#xD568;&#xC815;</text>

  <text x="66" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// &#xC9C1;&#xB82C; &#x2014; &#xBD88;&#xD544;&#xC694;&#xD558;&#xAC8C; &#xB290;&#xB9BC;</text>
  <text x="66" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> a = </tspan><tspan fill="#7ec8e3">await</tspan><tspan fill="#e8e8e8"> fetchA()</tspan></text>
  <text x="66" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> b = </tspan><tspan fill="#7ec8e3">await</tspan><tspan fill="#e8e8e8"> fetchB() </tspan><tspan fill="#6a8aa0">// a 완료 후</tspan></text>
  <text x="235" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">fetchA + fetchB &#xC2DC;&#xAC04; &#xB204;&#xC801;</text>

  <line x1="66" y1="196" x2="404" y2="196" stroke="#1e2433" stroke-width="1"/>

  <text x="66" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// &#xBCD1;&#xB82C; &#xD574;&#xACB0;&#xCC45; 1: Promise.all</text>
  <text x="66" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">const</text><text x="106" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> [a, b] = </text><text x="182" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">await</text>
  <text x="66" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  Promise.all([fetchA(), fetchB()])</text>
  <text x="235" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">max(fetchA, fetchB) &#xC2DC;&#xAC04;&#xB9CC;</text>

  <line x1="66" y1="296" x2="404" y2="296" stroke="#1e2433" stroke-width="1"/>
  <text x="66" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// &#xD574;&#xACB0;&#xCC45; 2: &#xC120; &#xC2DC;&#xC791;, &#xB098;&#xC911;&#xC5D0; await</text>
  <text x="66" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">const</text><text x="106" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> pA = fetchA(), pB = fetchB()</text>
  <text x="66" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> a = </tspan><tspan fill="#7ec8e3">await</tspan><tspan fill="#e8e8e8"> pA</tspan></text>
  <text x="66" y="370" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> b = </tspan><tspan fill="#7ec8e3">await</tspan><tspan fill="#e8e8e8"> pB</tspan></text>

  <!-- Right: loop + forEach trap -->
  <rect x="460" y="68" width="370" height="300" rx="6" fill="#070b14" stroke="#7777cc"/>
  <text x="645" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">&#xB8E8;&#xD504; &amp; forEach &#xD568;&#xC815;</text>

  <text x="476" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">// forEach &#xB0B4; await: &#xD6A8;&#xACFC; &#xC5C6;&#xC74C;!</text>
  <text x="476" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">items.forEach(</tspan><tspan fill="#7ec8e3">async</tspan><tspan fill="#e8e8e8"> item =&gt; {</tspan></text>
  <text x="476" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">  await</tspan><tspan fill="#e8e8e8"> process(item) </tspan><tspan fill="#6a8aa0">// &#xBB34;&#xC2DC;</tspan></text>
  <text x="476" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">})</text>

  <line x1="476" y1="188" x2="814" y2="188" stroke="#1e2433" stroke-width="1"/>

  <text x="476" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// &#xC21C;&#xCC28; &#xCC98;&#xB9AC; (for...of)</text>
  <text x="476" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">for</tspan><tspan fill="#e8e8e8"> (</tspan><tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> item </tspan><tspan fill="#7ec8e3">of</tspan><tspan fill="#e8e8e8"> items) {</tspan></text>
  <text x="476" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">  await</tspan><tspan fill="#e8e8e8"> process(item)</tspan></text>
  <text x="476" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>

  <line x1="476" y1="282" x2="814" y2="282" stroke="#1e2433" stroke-width="1"/>

  <text x="476" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// &#xBCD1;&#xB82C; &#xCC98;&#xB9AC; (map + Promise.all)</text>
  <text x="476" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">await</text><text x="516" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> Promise.all(</text>
  <text x="476" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  items.map(item =&gt; process(item))</text>
  <text x="476" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">)</text>
</svg>
