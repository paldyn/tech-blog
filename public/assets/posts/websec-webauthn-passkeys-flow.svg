<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">WebAuthn 등록 &amp; 인증 흐름</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">공개키 기반 도메인 바인딩 인증</text>

  <!-- Participants -->
  <rect x="60" y="100" width="130" height="48" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="125" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">브라우저</text>

  <rect x="370" y="100" width="140" height="48" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="121" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555">인증기</text>
  <text x="440" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">(YubiKey/TouchID)</text>

  <rect x="690" y="100" width="130" height="48" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="755" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">서버 RP</text>

  <!-- Registration flow -->
  <text x="440" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">[ 등록 ]</text>

  <line x1="820" y1="190" x2="192" y2="190" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="506" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">① challenge + rpId + userId 발급</text>

  <line x1="192" y1="212" x2="368" y2="212" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>
  <text x="280" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">② 사용자 제스처 요청</text>

  <line x1="368" y1="232" x2="192" y2="232" stroke="#e05555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="280" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">③ 키쌍 생성 + 공개키 반환</text>

  <line x1="192" y1="262" x2="688" y2="262" stroke="#7777cc" stroke-width="2" marker-end="url(#arrg)"/>
  <text x="440" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">④ 공개키 + attestation 전송</text>

  <!-- Authentication flow -->
  <text x="440" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">[ 인증 ]</text>

  <line x1="688" y1="312" x2="192" y2="312" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="440" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">⑤ challenge + rpId 발급</text>

  <line x1="192" y1="332" x2="368" y2="332" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>
  <text x="280" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">⑥ 생체/PIN 확인</text>

  <line x1="368" y1="352" x2="192" y2="352" stroke="#e05555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="280" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">⑦ 개인키로 challenge 서명</text>

  <line x1="192" y1="380" x2="688" y2="380" stroke="#7777cc" stroke-width="2" marker-end="url(#arrg)"/>
  <text x="440" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">⑧ 서명 전송 → 공개키로 검증</text>

  <!-- Domain binding note -->
  <rect x="60" y="410" width="760" height="64" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="434" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">도메인 바인딩 — 피싱 완전 차단</text>
  <text x="440" y="456" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">rpId는 등록 도메인과 정확히 일치해야 서명. evil.com에서는 example.com 키 사용 불가</text>
</svg>
