<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700" xml:space="preserve">PyTorch 자동 미분 (Autograd)</text>
  <text x="440" y="70" text-anchor="middle" fill="#888" font-size="13" xml:space="preserve">loss.backward() 한 줄로 모든 파라미터의 기울기를 자동으로 계산</text>

  <!-- Code block -->
  <rect x="60" y="88" width="760" height="258" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="76" y="106" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">import</tspan> torch, torch.nn <tspan fill="#7ec8e3">as</tspan> nn</text>

  <text x="76" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">model = nn.Linear(<tspan fill="#b5cea8">3</tspan>, <tspan fill="#b5cea8">1</tspan>)</text>
  <text x="76" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">opt   = torch.optim.SGD(</text>
  <text x="76" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    model.parameters(), lr=<tspan fill="#b5cea8">0.01</tspan>)</text>
  <text x="76" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">loss_fn = nn.MSELoss()</text>

  <text x="76" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">x = torch.randn(<tspan fill="#b5cea8">16</tspan>, <tspan fill="#b5cea8">3</tspan>)</text>
  <text x="76" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">y = torch.randn(<tspan fill="#b5cea8">16</tspan>, <tspan fill="#b5cea8">1</tspan>)</text>

  <text x="76" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#9aa4b8"># 1. 순전파</tspan></text>
  <text x="76" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">pred = model(x)</text>
  <text x="76" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">loss = loss_fn(pred, y)</text>
  <text x="76" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#9aa4b8"># 2. 역전파 + 업데이트</tspan></text>

  <!-- Info boxes -->
  <rect x="460" y="278" width="340" height="76" rx="6" fill="#0d1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="630" y="298" text-anchor="middle" fill="#7777cc" font-size="12" font-weight="600" xml:space="preserve">Autograd 동작 원리</text>
  <text x="630" y="316" text-anchor="middle" fill="#e8e8e8" font-size="11" xml:space="preserve">연산 시 계산 그래프 자동 기록</text>
  <text x="630" y="334" text-anchor="middle" fill="#e8e8e8" font-size="11" xml:space="preserve">backward() → 그래프 역방향 탐색</text>
  <text x="630" y="352" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">각 파라미터의 .grad에 기울기 축적</text>

  <!-- 3 steps box -->
  <rect x="60" y="358" width="760" height="58" rx="8" fill="#111" stroke="#1e1e1e"/>
  <text x="440" y="376" text-anchor="middle" fill="#888" font-size="12" xml:space="preserve">학습 루프 3단계</text>
  <text x="220" y="400" text-anchor="middle" fill="#7ec8e3" font-size="13" font-weight="600" xml:space="preserve">① opt.zero_grad()</text>
  <text x="440" y="400" text-anchor="middle" fill="#55c555" font-size="13" font-weight="600" xml:space="preserve">② loss.backward()</text>
  <text x="660" y="400" text-anchor="middle" fill="#ce9178" font-size="13" font-weight="600" xml:space="preserve">③ opt.step()</text>

  <!-- Footer -->
</svg>
