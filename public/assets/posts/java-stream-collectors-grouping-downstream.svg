<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 510">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="510" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Collectors.groupingBy — 다운스트림 Collector 조합</text>

  <!-- Main flow -->
  <rect x="60" y="72" width="168" height="52" rx="8" fill="#0f1f0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="144" y="93" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Stream&lt;T&gt;</text>
  <text x="144" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">입력 스트림</text>

  <line x1="228" y1="98" x2="282" y2="98" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="284" y="72" width="312" height="52" rx="8" fill="#0d0d25" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="93" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">groupingBy(classifier, downstream)</text>
  <text x="440" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">분류 키 함수 + 다운스트림 Collector</text>

  <line x1="596" y1="98" x2="648" y2="98" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="650" y="72" width="170" height="52" rx="8" fill="#1a1a08" stroke="#e8c542" stroke-width="1.5"/>
  <text x="735" y="93" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8c542" text-anchor="middle">Map&lt;K, R&gt;</text>
  <text x="735" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">R은 downstream이 결정</text>

  <line x1="60" y1="146" x2="820" y2="146" stroke="#222" stroke-width="1"/>
  <text x="440" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">downstream Collector 종류별 결과 타입</text>

  <!-- Row 1 -->
  <rect x="60" y="182" width="240" height="70" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">toList()</text>
  <text x="180" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Map&lt;K, List&lt;T&gt;&gt;</text>
  <text x="180" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
