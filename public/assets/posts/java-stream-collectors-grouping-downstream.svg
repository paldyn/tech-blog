  <rect x="580" y="182" width="240" height="70" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="700" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">summingInt(fn)</text>
  <text x="700" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Map&lt;K, Integer&gt;</text>
  <text x="700" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">그룹별 정수 합산</text>

  <!-- Row 2 -->
  <rect x="60" y="268" width="240" height="70" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="289" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">mapping(fn, coll)</text>
  <text x="180" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Map&lt;K, List&lt;R&gt;&gt;</text>
  <text x="180" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
