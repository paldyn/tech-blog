  <rect x="320" y="268" width="240" height="70" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="289" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">joining(delimiter)</text>
  <text x="440" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Map&lt;K, String&gt;</text>
  <text x="440" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">문자열 요소 연결</text>

  <rect x="580" y="268" width="240" height="70" rx="8" fill="#0d0d25" stroke="#7777cc" stroke-width="1.5"/>
  <text x="700" y="289" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">groupingBy(fn2)</text>
  <text x="700" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Map&lt;K, Map&lt;K2, List&gt;&gt;</text>
  <text x="700" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">중첩 그루핑</text>

  <!-- Row 3 -->
  <rect x="60" y="354" width="366" height="70" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="243" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">collectingAndThen(downstream, finisher)</text>
  <text x="243" y="393" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">수집 후 추가 변환 적용</text>
  <text x="243" y="411" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">예: toList() + unmodifiableList()</text>

  <rect x="454" y="354" width="366" height="70" rx="8" fill="#0f1f0f" stroke="#55c555" stroke-width="1"/>
  <text x="637" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">teeing(c1, c2, merger)  Java 12+</text>
  <text x="637" y="393" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">두 Collector로 동시 수집 후 병합</text>
  <text x="637" y="411" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">예: 최솟값 + 최댓값 한 번에</text>

  <text x="440" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">downstream에 다시 Collector를 넣어 무한 중첩 조합 가능</text>
  <text x="440" y="480" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">단일 스트림 파이프라인으로 복잡한 집계를 처리</text>
</svg>
