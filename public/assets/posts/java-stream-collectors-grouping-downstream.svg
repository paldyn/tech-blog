  <rect x="320" y="182" width="240" height="70" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">counting()</text>
  <text x="440" y="221" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
