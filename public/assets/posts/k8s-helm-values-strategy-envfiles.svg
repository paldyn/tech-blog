<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">환경별 Values 파일 전략</text>

  <!-- values-base.yaml -->
  <rect x="60" y="70" width="220" height="220" rx="8" fill="#0f1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">values.yaml (base)</text>
  <rect x="74" y="106" width="192" height="172" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="88" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">replicaCount: 1</text>
  <text x="88" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">image:</text>
  <text x="88" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  tag: latest</text>
  <text x="88" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">resources:</text>
  <text x="88" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  limits:</text>
  <text x="88" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8" xml:space="preserve">    cpu: 500m</text>
  <text x="88" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8" xml:space="preserve">    memory: 512Mi</text>
  <text x="88" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve"># 공통 기본값</text>

  <!-- values-dev.yaml -->
  <rect x="330" y="70" width="220" height="180" rx="8" fill="#0f2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">values-dev.yaml</text>
  <rect x="344" y="106" width="192" height="132" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="358" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" font-weight="600" xml:space="preserve">replicaCount: 1</text>
  <text x="358" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">ingress:</text>
  <text x="358" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  host: dev.example.com</text>
  <text x="358" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">debug:</text>
  <text x="358" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  enabled: true</text>
  <text x="358" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve"># dev 전용 설정</text>

  <!-- values-prod.yaml -->
  <rect x="600" y="70" width="220" height="200" rx="8" fill="#200f10" stroke="#e05555" stroke-width="1.5"/>
  <text x="710" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">values-prod.yaml</text>
  <rect x="614" y="106" width="192" height="152" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="628" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555" font-weight="600" xml:space="preserve">replicaCount: 3</text>
  <text x="628" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">resources:</text>
  <text x="628" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  limits:</text>
  <text x="628" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8" xml:space="preserve">    cpu: 2</text>
  <text x="628" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#b5cea8" xml:space="preserve">    memory: 2Gi</text>
  <text x="628" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">autoscaling:</text>
  <text x="628" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  enabled: true</text>
  <text x="628" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve"># prod 전용 설정</text>

  <!-- arrows pointing down to commands -->
  <line x1="170" y1="290" x2="220" y2="330" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="440" y1="250" x2="440" y2="330" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="710" y1="270" x2="660" y2="330" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- helm commands -->
  <rect x="60" y="330" width="360" height="100" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve"># dev 배포</text>
  <text x="76" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">helm upgrade --install myapp ./chart \</text>
  <text x="76" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  -f values.yaml \</text>
  <text x="76" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" font-weight="600" xml:space="preserve">  -f values-dev.yaml</text>

  <rect x="460" y="330" width="360" height="100" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve"># prod 배포</text>
  <text x="476" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">helm upgrade --install myapp ./chart \</text>
  <text x="476" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  -f values.yaml \</text>
  <text x="476" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555" font-weight="600" xml:space="preserve">  -f values-prod.yaml</text>
</svg>
