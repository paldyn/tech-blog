  <text x="387" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">적음</text>
  <rect x="460" y="200" width="160" height="44" fill="#0d1117" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="540" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">bash ✓</text>
  <rect x="628" y="200" width="192" height="44" fill="#0d1117" rx="4" stroke="#7ec8e3" stroke-width="1"/>
  <text x="724" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">일반 프로덕션</text>

  <!-- alpine -->
  <rect x="60" y="252" width="136" height="44" fill="#0d1117" rx="4" stroke="#1e2433" stroke-width="1"/>
