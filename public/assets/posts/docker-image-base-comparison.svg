  <rect x="204" y="252" width="110" height="44" fill="#0d1117" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="259" y="279" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">~5MB</text>
  <rect x="322" y="252" width="130" height="44" fill="#0d1117" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="387" y="279" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">매우 적음</text>
  <rect x="460" y="252" width="160" height="44" fill="#0d1117" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="540" y="279" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">ash ✓</text>
  <rect x="628" y="252" width="192" height="44" fill="#0d1117" rx="4" stroke="#e05555" stroke-width="1"/>
  <text x="724" y="279" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">musl 호환성 확인 필수</text>

  <!-- distroless -->
  <rect x="60" y="304" width="136" height="44" fill="#0d1117" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="128" y="331" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">distroless</text>
  <rect x="204" y="304" width="110" height="44" fill="#0d1117" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="259" y="331" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">~2-20MB</text>
  <rect x="322" y="304" width="130" height="44" fill="#0d1117" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="387" y="331" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">최소</text>
  <rect x="460" y="304" width="160" height="44" fill="#0d1117" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="540" y="331" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">셸 없음 ✗</text>
  <rect x="628" y="304" width="192" height="44" fill="#0d1117" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="724" y="331" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">보안 최우선 환경</text>

  <!-- scratch -->
  <rect x="60" y="356" width="136" height="44" fill="#0d1117" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="128" y="383" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" text-anchor="middle">scratch</text>
  <rect x="204" y="356" width="110" height="44" fill="#0d1117" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="259" y="383" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">0B</text>
  <rect x="322" y="356" width="130" height="44" fill="#0d1117" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="387" y="383" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">없음</text>
  <rect x="460" y="356" width="160" height="44" fill="#0d1117" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="540" y="383" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">불가 ✗</text>
  <rect x="628" y="356" width="192" height="44" fill="#0d1117" rx="4" stroke="#7777cc" stroke-width="1"/>
  <text x="724" y="383" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">정적 바이너리 (Go 등)</text>

  <!-- Recommendation -->
  <rect x="60" y="420" width="760" height="56" fill="#0d1117" rx="8" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">선택 가이드</text>
  <text x="440" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">개발: debian-slim / 보안 우선: distroless / 정적 Go·Rust: scratch / 일반 웹: debian-slim or alpine</text>
</svg>
