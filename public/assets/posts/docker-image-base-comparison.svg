<svg width="880" height="500" viewBox="0 0 880 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">베이스 이미지 비교</text>
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">크기 · 보안 · 호환성 트레이드오프</text>

  <!-- Header -->
  <rect x="60" y="104" width="136" height="36" fill="#1e2433" rx="4"/>
  <text x="128" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#888" text-anchor="middle">이미지</text>
  <rect x="204" y="104" width="110" height="36" fill="#1e2433" rx="4"/>
  <text x="259" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#888" text-anchor="middle">크기</text>
  <rect x="322" y="104" width="130" height="36" fill="#1e2433" rx="4"/>
  <text x="387" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#888" text-anchor="middle">보안 취약점</text>
  <rect x="460" y="104" width="160" height="36" fill="#1e2433" rx="4"/>
  <text x="540" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#888" text-anchor="middle">셸 / 디버깅</text>
  <rect x="628" y="104" width="192" height="36" fill="#1e2433" rx="4"/>
  <text x="724" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#888" text-anchor="middle">적합한 용도</text>

  <!-- debian -->
  <rect x="60" y="148" width="136" height="44" fill="#0d1117" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="128" y="175" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" text-anchor="middle">debian</text>
  <rect x="204" y="148" width="110" height="44" fill="#0d1117" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="259" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">~120MB</text>
  <rect x="322" y="148" width="130" height="44" fill="#0d1117" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="387" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">많음</text>
