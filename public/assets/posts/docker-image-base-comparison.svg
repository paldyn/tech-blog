  <text x="724" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">개발 / 디버깅</text>

  <!-- debian-slim -->
  <rect x="60" y="200" width="136" height="44" fill="#0d1117" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="128" y="227" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8" text-anchor="middle">debian-slim</text>
  <rect x="204" y="200" width="110" height="44" fill="#0d1117" rx="4" stroke="#1e2433" stroke-width="1"/>
  <text x="259" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">~30MB</text>
