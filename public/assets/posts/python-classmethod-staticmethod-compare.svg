<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">세 가지 메서드 종류 비교</text>

  <!-- Header row -->
  <rect x="60" y="70" width="240" height="36" rx="6" fill="#1a1a2e" stroke="#1e2433"/>
  <text x="180" y="93" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">항목</text>

  <rect x="310" y="70" width="170" height="36" rx="6" fill="#1a2e1a" stroke="#55c555"/>
  <text x="395" y="93" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">instance method</text>

  <rect x="490" y="70" width="170" height="36" rx="6" fill="#1a1a2e" stroke="#7ec8e3"/>
  <text x="575" y="93" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">@classmethod</text>

  <rect x="670" y="70" width="150" height="36" rx="6" fill="#2e1a1a" stroke="#e8c040"/>
  <text x="745" y="93" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8c040">@staticmethod</text>

  <!-- Row 1: 첫 인자 -->
  <rect x="60" y="116" width="240" height="44" rx="4" fill="#111111" stroke="#1e2433"/>
  <text x="180" y="141" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">첫 번째 인자</text>
  <rect x="310" y="116" width="170" height="44" rx="4" fill="#0d1117" stroke="#1e2433"/>
  <text x="395" y="138" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">self</text>
  <text x="395" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">(인스턴스)</text>
  <rect x="490" y="116" width="170" height="44" rx="4" fill="#0d1117" stroke="#1e2433"/>
  <text x="575" y="138" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">cls</text>
  <text x="575" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">(클래스 자체)</text>
  <rect x="670" y="116" width="150" height="44" rx="4" fill="#0d1117" stroke="#1e2433"/>
  <text x="745" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8c040">없음</text>
  <text x="745" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">(독립 함수)</text>

  <!-- Row 2: 인스턴스 접근 -->
  <rect x="60" y="170" width="240" height="44" rx="4" fill="#111111" stroke="#1e2433"/>
  <text x="180" y="195" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">인스턴스 접근</text>
  <rect x="310" y="170" width="170" height="44" rx="4" fill="#0d1117" stroke="#1e2433"/>
  <text x="395" y="195" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" fill="#55c555">✓</text>
  <rect x="490" y="170" width="170" height="44" rx="4" fill="#0d1117" stroke="#1e2433"/>
  <text x="575" y="195" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" fill="#e05555">✗</text>
  <rect x="670" y="170" width="150" height="44" rx="4" fill="#0d1117" stroke="#1e2433"/>
  <text x="745" y="195" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" fill="#e05555">✗</text>

  <!-- Row 3: 클래스 접근 -->
  <rect x="60" y="224" width="240" height="44" rx="4" fill="#111111" stroke="#1e2433"/>
  <text x="180" y="249" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">클래스 접근</text>
  <rect x="310" y="224" width="170" height="44" rx="4" fill="#0d1117" stroke="#1e2433"/>
  <text x="395" y="249" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" fill="#55c555">✓</text>
  <rect x="490" y="224" width="170" height="44" rx="4" fill="#0d1117" stroke="#1e2433"/>
  <text x="575" y="249" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" fill="#55c555">✓</text>
  <rect x="670" y="224" width="150" height="44" rx="4" fill="#0d1117" stroke="#1e2433"/>
  <text x="745" y="249" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" fill="#e05555">✗</text>

  <!-- Row 4: 호출 방식 -->
  <rect x="60" y="278" width="240" height="44" rx="4" fill="#111111" stroke="#1e2433"/>
  <text x="180" y="303" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">호출 방식</text>
  <rect x="310" y="278" width="170" height="44" rx="4" fill="#0d1117" stroke="#1e2433"/>
  <text x="395" y="298" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">obj.method()</text>
  <text x="395" y="314" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">Cls.method(obj)</text>
  <rect x="490" y="278" width="170" height="44" rx="4" fill="#0d1117" stroke="#1e2433"/>
  <text x="575" y="298" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">Cls.method()</text>
  <text x="575" y="314" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">obj.method()</text>
  <rect x="670" y="278" width="150" height="44" rx="4" fill="#0d1117" stroke="#1e2433"/>
  <text x="745" y="298" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8c040">Cls.method()</text>
  <text x="745" y="314" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">obj.method()</text>

  <!-- Row 5: 주요 용도 -->
  <rect x="60" y="332" width="240" height="54" rx="4" fill="#111111" stroke="#1e2433"/>
  <text x="180" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">주요 용도</text>
  <rect x="310" y="332" width="170" height="54" rx="4" fill="#0d1117" stroke="#1e2433"/>
  <text x="395" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">일반 인스턴스</text>
  <text x="395" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">동작 구현</text>
  <rect x="490" y="332" width="170" height="54" rx="4" fill="#0d1117" stroke="#1e2433"/>
  <text x="575" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">팩토리 메서드</text>
  <text x="575" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">대체 생성자</text>
  <rect x="670" y="332" width="150" height="54" rx="4" fill="#0d1117" stroke="#1e2433"/>
  <text x="745" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8c040">유틸리티 함수</text>
  <text x="745" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">클래스 네임스페이스</text>

  <!-- Note -->
  <rect x="60" y="406" width="760" height="52" rx="6" fill="#0d1117" stroke="#1e2433"/>
  <text x="440" y="426" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">상속 시 classmethod의 cls는 항상 호출된 클래스를 가리킵니다 (부모 클래스가 아님)</text>
  <text x="440" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6a8aa0">이를 활용하면 자식 클래스 인스턴스를 반환하는 팩토리 메서드를 부모 클래스에 구현할 수 있습니다</text>
</svg>
