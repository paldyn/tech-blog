<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Nexacro 버전 진화 연대표</text>
  <text x="440" y="68" text-anchor="middle" font-size="13" fill="#888">14 → Platform → N → V24</text>

  <!-- ===== Version Box 1: Nexacro 14 ===== -->
  <!-- x=60, width=140, right=200, center=130 -->
  <rect x="60" y="100" width="140" height="230" fill="#0e0e14" rx="8" stroke="#555" stroke-width="1.5"/>
  <text x="130" y="126" text-anchor="middle" font-size="13" font-weight="700" fill="#aaa">Nexacro 14</text>
  <text x="130" y="146" text-anchor="middle" font-size="11" fill="#666">~2012년</text>
  <line x1="72" y1="154" x2="188" y2="154" stroke="#333" stroke-width="1"/>
  <text x="130" y="172" text-anchor="middle" font-size="11" fill="#888">런타임: ActiveX</text>
  <text x="130" y="192" text-anchor="middle" font-size="10" fill="#666">• IE 전용 구동</text>
  <text x="130" y="210" text-anchor="middle" font-size="10" fill="#666">• 윈도우 클라이언트</text>
  <text x="130" y="228" text-anchor="middle" font-size="10" fill="#666">• 강력한 Grid 기능</text>
  <text x="130" y="246" text-anchor="middle" font-size="10" fill="#666">• C/S 대체 최적화</text>
  <text x="130" y="270" text-anchor="middle" font-size="10" fill="#555">⚠ IE 의존</text>
  <text x="130" y="285" text-anchor="middle" font-size="10" fill="#555">⚠ 모바일 불가</text>
  <text x="130" y="306" text-anchor="middle" font-size="10" fill="#777">구 버전 (레거시)</text>

  <!-- Arrow 1→2 (solid polygon →) at y=215, gap x=200-260 -->
  <polygon points="200,208 244,208 244,200 260,215 244,230 244,222 200,222"
           fill="#7777cc" stroke="#0a0a0a" stroke-width="1" stroke-linejoin="round"/>

  <!-- ===== Version Box 2: Nexacro Platform ===== -->
  <!-- x=260, width=140, right=400, center=330 -->
  <rect x="260" y="100" width="140" height="230" fill="#0e0e18" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="330" y="126" text-anchor="middle" font-size="12" font-weight="700" fill="#9988cc">Nexacro</text>
  <text x="330" y="143" text-anchor="middle" font-size="12" font-weight="700" fill="#9988cc">Platform</text>
  <text x="330" y="160" text-anchor="middle" font-size="11" fill="#7777cc">2013~2021년</text>
  <line x1="272" y1="168" x2="388" y2="168" stroke="#333" stroke-width="1"/>
  <text x="330" y="186" text-anchor="middle" font-size="11" fill="#888">런타임: HTML5+</text>
  <text x="330" y="204" text-anchor="middle" font-size="10" fill="#888">• 멀티 브라우저 지원</text>
  <text x="330" y="222" text-anchor="middle" font-size="10" fill="#888">• Flash 병행 지원</text>
  <text x="330" y="240" text-anchor="middle" font-size="10" fill="#888">• 모바일 부분 지원</text>
  <text x="330" y="258" text-anchor="middle" font-size="10" fill="#888">• 14와 API 호환</text>
  <text x="330" y="282" text-anchor="middle" font-size="10" fill="#666">기업 표준으로 확산</text>
  <text x="330" y="298" text-anchor="middle" font-size="10" fill="#666">국내 대기업 도입</text>

  <!-- Arrow 2→3 (solid polygon →) at y=215, gap x=400-460 -->
  <polygon points="400,208 444,208 444,200 460,215 444,230 444,222 400,222"
           fill="#7777cc" stroke="#0a0a0a" stroke-width="1" stroke-linejoin="round"/>

  <!-- ===== Version Box 3: Nexacro N ===== -->
  <!-- x=460, width=140, right=600, center=530 -->
  <rect x="460" y="100" width="140" height="230" fill="#0c1018" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="530" y="126" text-anchor="middle" font-size="13" font-weight="700" fill="#7ec8e3">Nexacro N</text>
  <text x="530" y="146" text-anchor="middle" font-size="11" fill="#7ec8e3">2022년~</text>
  <line x1="472" y1="154" x2="588" y2="154" stroke="#1e3050" stroke-width="1"/>
  <text x="530" y="172" text-anchor="middle" font-size="11" fill="#e8e8e8">런타임: 순수 HTML5</text>
  <text x="530" y="190" text-anchor="middle" font-size="10" fill="#aaa">• Flash 완전 제거</text>
  <text x="530" y="208" text-anchor="middle" font-size="10" fill="#aaa">• 모든 모던 브라우저</text>
  <text x="530" y="226" text-anchor="middle" font-size="10" fill="#aaa">• 모바일 정식 지원</text>
  <text x="530" y="244" text-anchor="middle" font-size="10" fill="#aaa">• 성능 대폭 개선</text>
  <text x="530" y="268" text-anchor="middle" font-size="10" fill="#55c555">✓ 크로스 브라우저</text>
  <text x="530" y="284" text-anchor="middle" font-size="10" fill="#55c555">✓ IE 의존 탈피</text>

  <!-- Arrow 3→4 (solid polygon →) at y=215, gap x=600-660 -->
  <polygon points="600,208 644,208 644,200 660,215 644,230 644,222 600,222"
           fill="#55c555" stroke="#0a0a0a" stroke-width="1" stroke-linejoin="round"/>

  <!-- ===== Version Box 4: V24 ===== -->
  <!-- x=660, width=140, right=800, center=730 -->
  <rect x="660" y="100" width="140" height="230" fill="#0a140e" rx="8" stroke="#55c555" stroke-width="2"/>
  <text x="730" y="126" text-anchor="middle" font-size="13" font-weight="700" fill="#55c555">Nexacro N V24</text>
  <text x="730" y="146" text-anchor="middle" font-size="11" fill="#55c555">최신 (2024~)</text>
  <line x1="672" y1="154" x2="788" y2="154" stroke="#1a3020" stroke-width="1"/>
  <text x="730" y="172" text-anchor="middle" font-size="11" fill="#e8e8e8">런타임: HTML5 최신</text>
  <text x="730" y="190" text-anchor="middle" font-size="10" fill="#aaa">• TypeScript 지원</text>
  <text x="730" y="208" text-anchor="middle" font-size="10" fill="#aaa">• ES6+ 문법 사용</text>
  <text x="730" y="226" text-anchor="middle" font-size="10" fill="#aaa">• 성능 벤치마크 향상</text>
  <text x="730" y="244" text-anchor="middle" font-size="10" fill="#aaa">• Studio N V24</text>
  <text x="730" y="268" text-anchor="middle" font-size="10" fill="#55c555">✓ 현재 권장 버전</text>
  <text x="730" y="284" text-anchor="middle" font-size="10" fill="#55c555">✓ 장기 지원(LTS)</text>

  <!-- Footer -->
  <text x="440" y="420" text-anchor="middle" font-size="11" fill="#444">PALDYN · Nexacro N 완전 정복 시리즈 — Chapter 1</text>
</svg>
