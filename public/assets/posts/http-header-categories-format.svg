<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">HTTP 헤더 필드 문법</text>
    <!-- Syntax diagram -->
    <rect x="60" y="65" width="760" height="68" rx="8" fill="#0f1f35" stroke="#4a6a9a" stroke-width="1.5"/>
    <text x="440" y="88" text-anchor="middle" font-size="13" fill="#888">헤더 필드 형식 (RFC 7230)</text>
    <text x="440" y="116" text-anchor="middle" font-size="16" font-weight="600" fill="#7ec8e3">field-name &quot;:&quot; OWS field-value OWS</text>
    <!-- Annotations -->
    <text x="200" y="155" text-anchor="middle" font-size="11" fill="#888">대소문자 무시</text>
    <line x1="200" y1="145" x2="200" y2="133" stroke="#666" stroke-width="1"/>
    <text x="440" y="155" text-anchor="middle" font-size="11" fill="#888">콜론 전 공백 금지</text>
    <text x="680" y="155" text-anchor="middle" font-size="11" fill="#888">선택적 공백(OWS)</text>
    <!-- Code block -->
    <rect x="60" y="175" width="760" height="186" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="76" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">GET /api/users HTTP/1.1</text>
    <text x="76" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Host</tspan><tspan fill="#ffffff">: api.example.com</tspan></text>
    <text x="76" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">User-Agent</tspan><tspan fill="#ffffff">: Mozilla/5.0 Chrome/120</tspan></text>
    <text x="76" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Accept</tspan><tspan fill="#ffffff">: application/json</tspan></text>
    <text x="76" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Accept-Encoding</tspan><tspan fill="#ffffff">: gzip, deflate, br</tspan></text>
    <text x="76" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Cache-Control</tspan><tspan fill="#ffffff">: no-cache</tspan></text>
    <text x="76" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Authorization</tspan><tspan fill="#ffffff">: Bearer eyJhbGci...</tspan></text>
    <!-- category labels on right -->
    <text x="810" y="222" font-size="10" fill="#55c555">요청</text>
    <text x="810" y="242" font-size="10" fill="#55c555">요청</text>
    <text x="810" y="262" font-size="10" fill="#cc77cc">표현</text>
    <text x="810" y="282" font-size="10" fill="#cc77cc">표현</text>
    <text x="810" y="302" font-size="10" fill="#7ec8e3">공통</text>
    <text x="810" y="322" font-size="10" fill="#55c555">요청</text>
    <text x="440" y="400" text-anchor="middle" font-size="11" fill="#555">헤더 이름은 대소문자 무관 — HTTP/2는 소문자 권장 (HPACK 압축 효율)</text>
  </g>
</svg>
