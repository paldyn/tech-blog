<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">du — 디렉터리별 디스크 사용량</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">어느 디렉터리가 공간을 많이 차지하는지 트리 구조로 탐색</text>

  <!-- LEFT: du commands -->
  <text x="60" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">주요 du 명령어</text>
  <rect x="60" y="114" width="380" height="196" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 현재 디렉터리 전체 합계</text>
  <text x="76" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">du -sh</text>
  <text x="130" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> .</text>

  <text x="76" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 1단계 하위 디렉터리 크기</text>
  <text x="76" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">du -h</text>
  <text x="120" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> --max-depth=1 /var</text>

  <text x="76" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 큰 것부터 정렬</text>
  <text x="76" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">du -h</text>
  <text x="120" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> --max-depth=1 /var \</text>
  <text x="76" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  | sort -rh | head -10</text>

  <text x="76" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 특정 크기 이상 파일 찾기</text>
  <text x="76" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">find</text>
  <text x="106" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> / -size +1G -type f 2>/dev/null</text>
  <text x="76" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># ncdu — 대화형 브라우저</text>
  <text x="76" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">ncdu</text>
  <text x="112" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> /</text>

  <!-- RIGHT: du –max-depth=1 /var output tree -->
  <text x="480" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">du -h --max-depth=1 /var | sort -rh</text>
  <rect x="480" y="114" width="360" height="196" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="135" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">12G     /var</text>
  <text x="496" y="153" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" xml:space="preserve">7.2G    /var/log</text>
  <text x="496" y="171" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e0a020" xml:space="preserve">2.8G    /var/lib</text>
  <text x="496" y="189" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">820M    /var/cache</text>
  <text x="496" y="207" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" xml:space="preserve">180M    /var/www</text>
  <text x="496" y="225" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">12M     /var/spool</text>
  <text x="496" y="243" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">4.0K    /var/lock</text>

  <!-- Bar chart -->
  <rect x="660" y="135" width="144" height="14" fill="#e05555" rx="2"/>
  <rect x="660" y="153" width="56" height="14" fill="#e0a020" rx="2"/>
  <rect x="660" y="171" width="16" height="14" fill="#55c555" rx="2"/>
  <rect x="660" y="189" width="4" height="14" fill="#55c555" rx="2"/>
  <rect x="660" y="207" width="2" height="14" fill="#888" rx="2"/>

  <!-- df vs du comparison -->
  <text x="60" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">df vs du — 차이점</text>
  <rect x="60" y="366" width="360" height="34" fill="#071420" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="240" y="381" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">df</text>
  <text x="240" y="395" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">파일시스템 전체 관점 — 마운트된 장치 단위</text>
  <rect x="460" y="366" width="360" height="34" fill="#071a07" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="381" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">du</text>
  <text x="640" y="395" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">디렉터리 관점 — 어디서 공간을 쓰는지 탐색</text>
</svg>
