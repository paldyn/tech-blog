<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#ffffff">
    쿼리 메서드 명명 규칙과 @Query
  </text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" fill="#e8e8e8">
    메서드 이름으로 SQL 자동 생성 vs @Query로 직접 JPQL 지정
  </text>

  <!-- Left section label -->
  <text x="60" y="96"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">
    UserRepository.java
  </text>

  <!-- Left code block -->
  <rect x="50" y="104" width="380" height="300" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <!-- Left code lines (base x=66, first y=130, step=18) -->
  <text xml:space="preserve" x="66" y="130"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3">interface</tspan><tspan> UserRepository</tspan>
  </text>
  <text xml:space="preserve" x="66" y="148"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan>  </tspan><tspan fill="#7ec8e3">extends</tspan><tspan> JpaRepository&lt;</tspan><tspan fill="#7ec8e3">User</tspan><tspan>,Long&gt; {</tspan>
  </text>
  <text xml:space="preserve" x="66" y="184"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">
    <tspan>  // 메서드명 → 자동 쿼리 생성</tspan>
  </text>
  <text xml:space="preserve" x="66" y="202"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan>  List&lt;</tspan><tspan fill="#7ec8e3">User</tspan><tspan>&gt; findByName(</tspan>
  </text>
  <text xml:space="preserve" x="66" y="220"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan>      </tspan><tspan fill="#7ec8e3">String</tspan><tspan> name);</tspan>
  </text>
  <text xml:space="preserve" x="66" y="238"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan>  List&lt;</tspan><tspan fill="#7ec8e3">User</tspan><tspan>&gt; findByAgeGreaterThan(</tspan>
  </text>
  <text xml:space="preserve" x="66" y="256"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan>      </tspan><tspan fill="#7ec8e3">int</tspan><tspan> age);</tspan>
  </text>
  <text xml:space="preserve" x="66" y="292"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">
    <tspan>  // @Query 직접 JPQL 지정</tspan>
  </text>
  <text xml:space="preserve" x="66" y="310"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan>  </tspan><tspan fill="#55c555">@Query</tspan><tspan>(</tspan><tspan fill="#ce9178">"SELECT u FROM User u"</tspan>
  </text>
  <text xml:space="preserve" x="66" y="328"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan>       + </tspan><tspan fill="#ce9178">" WHERE u.age &gt; :age"</tspan><tspan>)</tspan>
  </text>
  <text xml:space="preserve" x="66" y="346"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan>  List&lt;</tspan><tspan fill="#7ec8e3">User</tspan><tspan>&gt; findOlderThan(</tspan>
  </text>
  <text xml:space="preserve" x="66" y="364"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan>      </tspan><tspan fill="#55c555">@Param</tspan><tspan>(</tspan><tspan fill="#ce9178">"age"</tspan><tspan>) </tspan><tspan fill="#7ec8e3">int</tspan><tspan> age);</tspan>
  </text>
  <text xml:space="preserve" x="66" y="382"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan>}</tspan>
  </text>

  <!-- Right section label -->
  <text x="456" y="96"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">
    주요 키워드 파싱 규칙
  </text>

  <!-- Right panel background -->
  <rect x="450" y="104" width="380" height="300" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <!-- Keyword table rows -->
  <!-- Header -->
  <text x="466" y="130"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">
    키워드
  </text>
  <text x="616" y="130"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">
    생성 조건
  </text>
  <line x1="466" y1="136" x2="810" y2="136" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Row 1 -->
  <text x="466" y="156"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">
    findBy
  </text>
  <text x="616" y="156"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    WHERE 절 시작
  </text>

  <!-- Row 2 -->
  <text x="466" y="180"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">
    And / Or
  </text>
  <text x="616" y="180"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    AND / OR 연산
  </text>

  <!-- Row 3 -->
  <text x="466" y="204"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">
    GreaterThan
  </text>
  <text x="616" y="204"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    &gt; (초과)
  </text>

  <!-- Row 4 -->
  <text x="466" y="228"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">
    LessThanEqual
  </text>
  <text x="616" y="228"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    &lt;= (이하)
  </text>

  <!-- Row 5 -->
  <text x="466" y="252"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">
    Like / Containing
  </text>
  <text x="616" y="252"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    LIKE '%val%'
  </text>

  <!-- Row 6 -->
  <text x="466" y="276"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">
    In
  </text>
  <text x="616" y="276"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    IN (val1, val2, ...)
  </text>

  <!-- Row 7 -->
  <text x="466" y="300"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">
    IsNull / IsNotNull
  </text>
  <text x="616" y="300"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    IS NULL / IS NOT NULL
  </text>

  <!-- Row 8 -->
  <text x="466" y="324"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">
    OrderBy...Desc
  </text>
  <text x="616" y="324"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    ORDER BY ... DESC
  </text>

  <!-- Row 9 -->
  <text x="466" y="348"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">
    countBy / existsBy
  </text>
  <text x="616" y="348"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    COUNT / EXISTS
  </text>

  <!-- Row 10 -->
  <text x="466" y="372"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">
    deleteBy / removeBy
  </text>
  <text x="616" y="372"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    DELETE WHERE
  </text>

  <line x1="608" y1="140" x2="608" y2="388" stroke="#3a4a6e" stroke-width="1"/>
</svg>
