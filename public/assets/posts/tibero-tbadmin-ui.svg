<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420" style="background:#0a0a0a;border-radius:12px;">
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">tbAdmin 주요 기능 구성</text>

  <!-- Left nav panel -->
  <rect x="60" y="68" width="180" height="320" rx="8" fill="#0d0d1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="150" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">tbAdmin 메뉴</text>

  <rect x="72" y="106" width="156" height="28" rx="4" fill="#111133"/>
  <text x="150" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">&#x25B6; 모니터링</text>

  <rect x="72" y="142" width="156" height="28" rx="4" fill="#0d0d1a"/>
  <text x="150" y="161" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">&#x25B7; SQL 작업</text>

  <rect x="72" y="178" width="156" height="28" rx="4" fill="#0d0d1a"/>
  <text x="150" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">&#x25B7; 스키마 관리</text>

  <rect x="72" y="214" width="156" height="28" rx="4" fill="#0d0d1a"/>
  <text x="150" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">&#x25B7; 성능 분석</text>

  <rect x="72" y="250" width="156" height="28" rx="4" fill="#0d0d1a"/>
  <text x="150" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">&#x25B7; 세션 관리</text>

  <rect x="72" y="286" width="156" height="28" rx="4" fill="#0d0d1a"/>
  <text x="150" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">&#x25B7; 백업/복구</text>

  <rect x="72" y="322" width="156" height="28" rx="4" fill="#0d0d1a"/>
  <text x="150" y="341" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">&#x25B7; 사용자 권한</text>

  <!-- Main content: monitoring panel -->
  <rect x="260" y="68" width="560" height="320" rx="8" fill="#0a0a10" stroke="#333" stroke-width="1"/>
  <text x="540" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">모니터링 대시보드</text>

  <!-- Metrics -->
  <rect x="276" y="108" width="160" height="72" rx="6" fill="#0d1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="356" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Buffer Hit Ratio</text>
  <text x="356" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#55c555" text-anchor="middle">98.7%</text>

  <rect x="456" y="108" width="160" height="72" rx="6" fill="#0d1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="536" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">활성 세션 수</text>
  <text x="536" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#7ec8e3" text-anchor="middle">142</text>

  <rect x="636" y="108" width="164" height="72" rx="6" fill="#0d1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="718" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">TPS (초당 트랜잭션)</text>
  <text x="718" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#7777cc" text-anchor="middle">2,340</text>

  <!-- Active SQL list -->
  <rect x="276" y="196" width="524" height="28" rx="4" fill="#111133"/>
  <text x="290" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">SID</text>
  <text x="340" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">사용자</text>
  <text x="430" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">상태</text>
  <text x="510" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">대기 이벤트</text>

  <rect x="276" y="224" width="524" height="24" rx="0" fill="#0d0d1a"/>
  <text x="290" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ffffff">42</text>
  <text x="340" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ffffff">APP_USER</text>
  <text x="430" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">ACTIVE</text>
  <text x="510" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">db file sequential read</text>

  <rect x="276" y="248" width="524" height="24" rx="0" fill="#0a0a14"/>
  <text x="290" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ffffff">87</text>
  <text x="340" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ffffff">BATCH</text>
  <text x="430" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">WAITING</text>
  <text x="510" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">enq: TX - row lock</text>

  <rect x="276" y="272" width="524" height="24" rx="0" fill="#0d0d1a"/>
  <text x="290" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ffffff">115</text>
  <text x="340" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ffffff">REPORT</text>
  <text x="430" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">ACTIVE</text>
  <text x="510" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">SQL*Net message from client</text>

  <!-- SQL Editor area -->
  <rect x="276" y="310" width="524" height="60" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="292" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#7ec8e3">SELECT</text>
  <text x="356" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> sid, username, status </text>
  <text x="292" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#7ec8e3">FROM</text>
  <text x="340" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> v$session</text>
  <text x="292" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" font-weight="600" fill="#7ec8e3">WHERE</text>
  <text x="348" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"> status = </text><text x="434" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">'ACTIVE'</text>
</svg>
