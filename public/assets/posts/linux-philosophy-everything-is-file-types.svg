<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ls -la로 보는 파일 타입 구분자</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">권한 문자열 첫 글자가 파일 종류를 나타낸다</text>

  <!-- Code block -->
  <rect x="60" y="88" width="760" height="250" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>

  <text x="76" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># ls -la /dev 출력 예시 — 첫 글자에 주목</text>
  <text x="76" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">-rw-r--r-- 1 root root  1234  /etc/hostname</text>
  <text x="76" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">  ^-- '-' : 일반 파일 (regular file)</text>

  <text x="76" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">drwxr-xr-x 2 root root  4096  /etc/</text>
  <text x="76" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  ^-- 'd' : 디렉터리 (directory)</text>

  <text x="76" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">lrwxrwxrwx 1 root root     7  /bin -> usr/bin</text>
  <text x="76" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8c55a">  ^-- 'l' : 심볼릭 링크 (symbolic link)</text>

  <text x="76" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">brw-rw---- 1 root disk  8, 0  /dev/sda</text>
  <text x="76" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">  ^-- 'b' : 블록 디바이스 / 'c' : 문자 디바이스</text>

  <text x="76" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">prw-r--r-- 1 user user     0  /tmp/mypipe</text>
  <text x="76" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">  ^-- 'p' : 네임드 파이프 / 's' : Unix 소켓</text>

  <text x="440" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">file 명령어로도 타입 확인 가능: file /dev/sda → block special</text>
</svg>
