<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">네트워크란 무엇인가</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">장치(노드)들이 링크로 연결되어 데이터를 주고받는 구조</text>

  <!-- Central node -->
  <circle cx="440" cy="260" r="36" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle" font-weight="600">라우터</text>
  <text x="440" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Router</text>

  <!-- Top node -->
  <circle cx="440" cy="130" r="30" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle" font-weight="600">서버</text>
  <text x="440" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">Server</text>

  <!-- Left node -->
  <circle cx="220" cy="260" r="30" fill="#2a1a1a" stroke="#e05555" stroke-width="2"/>
  <text x="220" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle" font-weight="600">PC</text>
  <text x="220" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">Client</text>

  <!-- Right node -->
  <circle cx="660" cy="260" r="30" fill="#2a1a1a" stroke="#e05555" stroke-width="2"/>
  <text x="660" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle" font-weight="600">PC</text>
  <text x="660" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">Client</text>

  <!-- Bottom-left node -->
  <circle cx="290" cy="390" r="30" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="290" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle" font-weight="600">스마트폰</text>
  <text x="290" y="403" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">Mobile</text>

  <!-- Bottom-right node -->
  <circle cx="590" cy="390" r="30" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="590" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle" font-weight="600">IoT 기기</text>
  <text x="590" y="403" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">IoT Device</text>

  <!-- Links -->
  <defs>
    <marker id="arr1" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="2" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto-start-reverse">
      <path d="M 13 0 L 0 7 L 13 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <line x1="440" y1="160" x2="440" y2="224" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)" marker-start="url(#arr2)"/>
  <line x1="250" y1="260" x2="404" y2="260" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)" marker-start="url(#arr2)"/>
  <line x1="476" y1="260" x2="630" y2="260" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)" marker-start="url(#arr2)"/>
  <line x1="320" y1="370" x2="412" y2="286" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)" marker-start="url(#arr2)"/>
  <line x1="560" y1="370" x2="468" y2="286" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)" marker-start="url(#arr2)"/>

  <!-- Labels -->
  <text x="490" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">유선 링크</text>
  <text x="305" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">유선 링크</text>

  <!-- Legend -->
  <rect x="60" y="108" width="120" height="90" fill="#111" rx="8" stroke="#333" stroke-width="1"/>
  <text x="70" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" font-weight="600">범례</text>
  <circle cx="80" cy="148" r="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="94" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">서버 노드</text>
  <circle cx="80" cy="168" r="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="94" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">클라이언트</text>
  <circle cx="80" cy="188" r="6" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="94" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">인프라 노드</text>
</svg>
