<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <!-- Background -->
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">.ts 구현 vs .d.ts 선언 — 무엇이 남는가</text>

  <!-- Left: implementation -->
  <rect x="60" y="76" width="360" height="234" fill="#111827" rx="8" stroke="#334155" stroke-width="1.5"/>
  <text x="240" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">lib.ts — 구현</text>

  <rect x="76" y="116" width="328" height="132" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">export function add(</text>
  <text x="92" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  a: number, b: number</text>
  <text x="92" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">): number {</text>
  <text x="92" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  return a + b;</text>
  <text x="92" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>
  <text x="92" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">export const V = "1.2.0";</text>

  <text x="240" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">로직과 타입이 함께 있는 원본</text>

  <!-- Right: declaration -->
  <rect x="460" y="76" width="360" height="234" fill="#111827" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="640" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">lib.d.ts — 선언</text>

  <rect x="476" y="116" width="328" height="132" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">export declare function add(</text>
  <text x="492" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  a: number, b: number</text>
  <text x="492" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">): number;</text>
  <text x="492" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">export declare const</text>
  <text x="492" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  V: "1.2.0";</text>
  <text x="492" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 본문 없음 — 시그니처만</text>

  <text x="640" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">구현이 사라지고 공개 API의 형태만 남는다</text>

  <!-- Bottom note -->
  <rect x="60" y="338" width="760" height="62" fill="#111827" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">declare = "구현은 다른 곳에 있고, 형태는 이렇다"는 약속</text>
  <text x="440" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">에디터 자동완성·타입 검사는 이 파일만 읽고도 라이브러리 전체 API를 이해한다</text>
</svg>
