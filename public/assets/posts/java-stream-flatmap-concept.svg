<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Stream.flatMap — 중첩 스트림 평탄화</text>

  <!-- map() section -->
  <text x="220" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">map(fn)  — 중첩 스트림 반환</text>

  <!-- Input stream -->
  <rect x="60" y="96" width="120" height="110" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="120" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888" text-anchor="middle">Stream&lt;List&lt;T&gt;&gt;</text>
  <text x="120" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">[A, B]</text>
  <text x="120" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">[C, D, E]</text>
  <text x="120" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">[F]</text>

  <!-- Arrow -->
  <line x1="180" y1="151" x2="218" y2="151" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="199" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">map</text>

  <!-- Output of map: Stream<Stream<T>> -->
  <rect x="220" y="96" width="140" height="110" rx="8" fill="#1a0808" stroke="#e05555" stroke-width="1.5"/>
  <text x="290" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e05555" text-anchor="middle">Stream&lt;Stream&lt;T&gt;&gt;</text>
  <rect x="234" y="122" width="112" height="22" rx="4" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="290" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">Stream[A, B]</text>
  <rect x="234" y="150" width="112" height="22" rx="4" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="290" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">Stream[C,D,E]</text>
  <rect x="234" y="178" width="112" height="22" rx="4" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="290" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">Stream[F]</text>

  <text x="290" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">중첩 — 다루기 불편!</text>

  <!-- flatMap() section -->
  <text x="650" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">flatMap(fn)  — 평탄화</text>

  <!-- Input stream 2 -->
  <rect x="480" y="96" width="120" height="110" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="540" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888" text-anchor="middle">Stream&lt;List&lt;T&gt;&gt;</text>
  <text x="540" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">[A, B]</text>
  <text x="540" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">[C, D, E]</text>
  <text x="540" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">[F]</text>

  <!-- Arrow -->
  <line x1="600" y1="151" x2="638" y2="151" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="619" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">flatMap</text>

  <!-- Output of flatMap: Stream<T> flat -->
  <rect x="640" y="96" width="180" height="110" rx="8" fill="#0f1f0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="730" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">Stream&lt;T&gt;  평탄화</text>
  <text x="730" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#7ec8e3" text-anchor="middle">A  B  C  D  E  F</text>
  <text x="730" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">단일 스트림으로 병합</text>
  <text x="730" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">원소 순서 보존</text>

  <text x="730" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">중첩 없이 바로 처리!</text>

  <!-- Divider -->
  <line x1="60" y1="252" x2="820" y2="252" stroke="#222" stroke-width="1"/>

  <!-- 주요 활용 패턴 -->
  <text x="440" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">주요 활용 패턴</text>

  <!-- Pattern 1 -->
  <rect x="60" y="292" width="235" height="80" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="177" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">중첩 컬렉션 평탄화</text>
  <text x="177" y="333" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">List&lt;List&lt;T&gt;&gt; → Stream&lt;T&gt;</text>
  <text x="177" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">.flatMap(Collection::stream)</text>

  <!-- Pattern 2 -->
  <rect x="315" y="292" width="250" height="80" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">문자열 분리 후 수집</text>
  <text x="440" y="333" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">문장 스트림 → 단어 스트림</text>
  <text x="440" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">.flatMap(s -> Arrays.stream(s.split(" ")))</text>

  <!-- Pattern 3 -->
  <rect x="585" y="292" width="235" height="80" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="702" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Optional 연쇄</text>
  <text x="702" y="333" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Optional&lt;Optional&lt;T&gt;&gt; 방지</text>
  <text x="702" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Stream.of(opt).flatMap(Optional::stream)</text>

  <!-- flatMapToInt/Long/Double -->
  <rect x="60" y="388" width="760" height="52" rx="8" fill="#0d0d25" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="409" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">기본형 특화: flatMapToInt() / flatMapToLong() / flatMapToDouble()</text>
  <text x="440" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">박싱 비용 없이 int/long/double 스트림으로 평탄화 — 대용량 숫자 처리 시 성능상 유리</text>

  <text x="440" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">flatMap의 매핑 함수는 반드시 Stream을 반환해야 하며, null 반환 시 NullPointerException 발생</text>
</svg>
