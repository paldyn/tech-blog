<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">누적 합 (Prefix Sum)</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">O(N) 전처리 후 구간 합 쿼리를 O(1)에 처리</text>

  <!-- Original array -->
  <text x="80" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">원본 배열 A</text>

  <!-- Cells for A -->
  <rect x="80"  y="108" width="60" height="44" rx="4" fill="#222" stroke="#444"/>
  <text x="110" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#e8e8e8" text-anchor="middle">3</text>
  <text x="110" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">[0]</text>

  <rect x="144" y="108" width="60" height="44" rx="4" fill="#222" stroke="#444"/>
  <text x="174" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#e8e8e8" text-anchor="middle">1</text>
  <text x="174" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">[1]</text>

  <rect x="208" y="108" width="60" height="44" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="238" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#7777cc" text-anchor="middle">4</text>
  <text x="238" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">[2]</text>

  <rect x="272" y="108" width="60" height="44" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="302" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#7777cc" text-anchor="middle">1</text>
  <text x="302" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">[3]</text>

  <rect x="336" y="108" width="60" height="44" rx="4" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="366" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#7777cc" text-anchor="middle">5</text>
  <text x="366" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">[4]</text>

  <rect x="400" y="108" width="60" height="44" rx="4" fill="#222" stroke="#444"/>
  <text x="430" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#e8e8e8" text-anchor="middle">9</text>
  <text x="430" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">[5]</text>

  <!-- sum[2..4] bracket -->
  <line x1="208" y1="104" x2="396" y2="104" stroke="#7777cc" stroke-width="2"/>
  <line x1="208" y1="104" x2="208" y2="96" stroke="#7777cc" stroke-width="2"/>
  <line x1="396" y1="104" x2="396" y2="96" stroke="#7777cc" stroke-width="2"/>
  <text x="302" y="93" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">sum(2..4) = 4+1+5 = 10</text>

  <!-- Arrow down -->
  <line x1="110" y1="160" x2="110" y2="196" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>
  <text x="440" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">전처리: P[i] = P[i-1] + A[i]</text>

  <!-- Prefix sum array -->
  <text x="80" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">누적 합 배열 P (1-indexed)</text>

  <rect x="80"  y="224" width="60" height="44" rx="4" fill="#0d2e0d" stroke="#55c555"/>
  <text x="110" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#55c555" text-anchor="middle">0</text>
  <text x="110" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">P[0]</text>

  <rect x="144" y="224" width="60" height="44" rx="4" fill="#0d2e0d" stroke="#55c555"/>
  <text x="174" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#55c555" text-anchor="middle">3</text>
  <text x="174" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">P[1]</text>

  <rect x="208" y="224" width="60" height="44" rx="4" fill="#0d2e0d" stroke="#55c555"/>
  <text x="238" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#55c555" text-anchor="middle">4</text>
  <text x="238" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">P[2]</text>

  <rect x="272" y="224" width="60" height="44" rx="4" fill="#0d2e0d" stroke="#55c555"/>
  <text x="302" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#55c555" text-anchor="middle">8</text>
  <text x="302" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">P[3]</text>

  <rect x="336" y="224" width="60" height="44" rx="4" fill="#0d2e0d" stroke="#55c555"/>
  <text x="366" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#55c555" text-anchor="middle">9</text>
  <text x="366" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">P[4]</text>

  <rect x="400" y="224" width="60" height="44" rx="4" fill="#0d2e0d" stroke="#55c555"/>
  <text x="430" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#55c555" text-anchor="middle">14</text>
  <text x="430" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">P[5]</text>

  <rect x="464" y="224" width="60" height="44" rx="4" fill="#0d2e0d" stroke="#55c555"/>
  <text x="494" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#55c555" text-anchor="middle">23</text>
  <text x="494" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">P[6]</text>

  <!-- Query formula -->
  <rect x="60" y="290" width="760" height="60" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">구간 합 쿼리: sum(l, r) = P[r+1] - P[l]</text>
  <text x="440" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle">sum(2, 4) = P[5] - P[2] = 14 - 4 = 10  ✓  O(1)</text>

  <!-- Build table -->
  <rect x="60" y="368" width="760" height="92" rx="8" fill="#111" stroke="#333"/>
  <text x="440" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">복잡도 비교</text>

  <text x="180" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">순수 반복</text>
  <text x="180" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">전처리 O(1), 쿼리 O(N)</text>
  <text x="180" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Q개 쿼리 → O(NQ)</text>

  <text x="440" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">누적 합</text>
  <text x="440" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">전처리 O(N), 쿼리 O(1)</text>
  <text x="440" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Q개 쿼리 → O(N+Q)</text>

  <text x="700" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle">세그먼트 트리</text>
  <text x="700" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">전처리 O(N), 쿼리 O(log N)</text>
  <text x="700" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">업데이트도 O(log N)</text>
</svg>
