<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">EXISTS vs IN vs JOIN — 동작 차이</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888" text-anchor="middle">NULL 처리와 성능 특성 비교</text>

  <!-- EXISTS -->
  <rect x="50" y="96" width="240" height="220" fill="#0d0d0d" rx="8" stroke="#55c555"/>
  <text x="170" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">EXISTS</text>
  <rect x="66" y="128" width="208" height="130" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="82" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">SELECT</text>
  <text x="82" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">  c.name</text>
  <text x="82" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">FROM</text>
  <text x="82" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">     customers c</text>
  <text x="82" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">WHERE EXISTS</text>
  <text x="82" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">  (<tspan fill="#7ec8e3">SELECT</tspan> <tspan fill="#b5cea8">1</tspan></text>
  <text x="82" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">   <tspan fill="#7ec8e3">FROM</tspan> orders o</text>
  <text x="82" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">   <tspan fill="#7ec8e3">WHERE</tspan> o.cid=c.id);</text>
  <text x="170" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">✓ 첫 행 발견 즉시 중단</text>
  <text x="170" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">✓ NULL 안전</text>
  <text x="170" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">TRUE/FALSE 반환</text>

  <!-- IN -->
  <rect x="320" y="96" width="240" height="220" fill="#0d0d0d" rx="8" stroke="#7777cc"/>
  <text x="440" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">IN (서브쿼리)</text>
  <rect x="336" y="128" width="208" height="130" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="352" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">SELECT</text>
  <text x="352" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">  c.name</text>
  <text x="352" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">FROM</text>
  <text x="352" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">     customers c</text>
  <text x="352" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">WHERE</text>
  <text x="352" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">  c.id <tspan fill="#7ec8e3">IN</tspan> (</text>
  <text x="352" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">    <tspan fill="#7ec8e3">SELECT</tspan> cid</text>
  <text x="352" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">    <tspan fill="#7ec8e3">FROM</tspan> orders);</text>
  <text x="440" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">서브쿼리 전체 실행 후 IN 체크</text>
  <text x="440" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">⚠ cid에 NULL 있으면 NOT IN 오작동</text>
  <text x="440" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">목록이 작으면 효율적</text>

  <!-- JOIN -->
  <rect x="590" y="96" width="240" height="220" fill="#0d0d0d" rx="8" stroke="#7ec8e3"/>
  <text x="710" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">LEFT JOIN + IS NULL</text>
  <rect x="606" y="128" width="208" height="130" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="622" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">SELECT</text>
  <text x="622" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">  c.name</text>
  <text x="622" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">FROM</text>
  <text x="622" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">     customers c</text>
  <text x="622" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">LEFT JOIN</text>
  <text x="622" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">  orders o <tspan fill="#7ec8e3">ON</tspan> o.cid=c.id</text>
  <text x="622" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">WHERE</text>
  <text x="622" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">      o.cid <tspan fill="#7ec8e3">IS NULL</tspan>;</text>
  <text x="622" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">  -- NOT EXISTS 동치</text>
  <text x="710" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">✓ NULL 안전 (IS NULL)</text>
  <text x="710" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">중복 행 주의 (1:N 조인)</text>
  <text x="710" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">DISTINCT 필요할 수 있음</text>

  <!-- Bottom: NOT IN NULL trap -->
  <rect x="50" y="346" width="780" height="90" fill="#1a0e0e" rx="8" stroke="#e05555"/>
  <text x="440" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">⚠ NOT IN + NULL 함정 — 결과가 항상 공집합</text>
  <text x="440" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" text-anchor="middle">WHERE id NOT IN (1, 2, NULL)   →   id &lt;&gt; 1 AND id &lt;&gt; 2 AND id &lt;&gt; NULL</text>
  <text x="440" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">id &lt;&gt; NULL은 항상 UNKNOWN → 어떤 행도 NOT IN 조건을 만족하지 못함 → 공집합</text>
  <text x="440" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">→ NOT EXISTS 또는 LEFT JOIN + IS NULL 사용 권장</text>
</svg>
