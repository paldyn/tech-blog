<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">DocumentFragment 사용 패턴</text>

  <!-- Code block -->
  <rect x="60" y="64" width="760" height="302" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="84" y="94" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 기본 사용법</text>
  <text x="84" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> frag = document.</tspan><tspan fill="#ffffff">createDocumentFragment</tspan><tspan fill="#ffffff">();</tspan></text>
  <text x="84" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">['사과', '바나나', '체리'].forEach(</tspan><tspan fill="#7ec8e3">name</tspan><tspan fill="#ffffff"> =&gt; {</tspan></text>
  <text x="84" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> li = document.</tspan><tspan fill="#ffffff">createElement</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">'li'</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="84" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  li.textContent = name;</tspan></text>
  <text x="84" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  frag.</tspan><tspan fill="#ffffff">appendChild</tspan><tspan fill="#ffffff">(li); </tspan><tspan fill="#9aa4b8">// DOM 접촉 없음</tspan></text>
  <text x="84" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">});</tspan></text>
  <text x="84" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">document.</tspan><tspan fill="#ffffff">querySelector</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">'ul'</tspan><tspan fill="#ffffff">).</tspan><tspan fill="#ffffff">appendChild</tspan><tspan fill="#ffffff">(frag); </tspan><tspan fill="#9aa4b8">// 리플로우 1회</tspan></text>

  <line x1="84" y1="232" x2="796" y2="232" stroke="#3a4a6e" stroke-width="1"/>

  <text x="84" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// template 엘리먼트와 함께 — content 속성이 Fragment</text>
  <text x="84" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> tmpl = document.</tspan><tspan fill="#ffffff">querySelector</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">'#row-template'</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="84" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> clone = tmpl.content.</tspan><tspan fill="#ffffff">cloneNode</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#b5cea8">true</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="84" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">clone.</tspan><tspan fill="#ffffff">querySelector</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">'.name'</tspan><tspan fill="#ffffff">).textContent = </tspan><tspan fill="#ce9178">'홍길동'</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="84" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">document.</tspan><tspan fill="#ffffff">querySelector</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">'tbody'</tspan><tspan fill="#ffffff">).</tspan><tspan fill="#ffffff">appendChild</tspan><tspan fill="#ffffff">(clone);</tspan></text>

  <text x="84" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 삽입 후: frag.childNodes.length === 0 (자식 이전 완료)</text>
</svg>
