<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">DocumentFragment 사용 패턴</text>

  <!-- Code block -->
  <rect x="60" y="64" width="760" height="302" rx="6" fill="#070b14" stroke="#1e2433"/>

  <text x="84" y="94" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">// 기본 사용법</text>
  <text x="84" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> frag = document.</tspan><tspan fill="#e8e8e8">createDocumentFragment</tspan><tspan fill="#e8e8e8">();</tspan></text>
  <text x="84" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">['사과', '바나나', '체리'].forEach(</tspan><tspan fill="#7ec8e3">name</tspan><tspan fill="#e8e8e8"> =&gt; {</tspan></text>
  <text x="84" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">  </tspan><tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> li = document.</tspan><tspan fill="#e8e8e8">createElement</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'li'</tspan><tspan fill="#e8e8e8">);</tspan></text>
  <text x="84" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">  li.textContent = name;</tspan></text>
  <text x="84" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">  frag.</tspan><tspan fill="#e8e8e8">appendChild</tspan><tspan fill="#e8e8e8">(li); </tspan><tspan fill="#6a8aa0">// DOM 접촉 없음</tspan></text>
  <text x="84" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">});</tspan></text>
  <text x="84" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">document.</tspan><tspan fill="#e8e8e8">querySelector</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'ul'</tspan><tspan fill="#e8e8e8">).</tspan><tspan fill="#e8e8e8">appendChild</tspan><tspan fill="#e8e8e8">(frag); </tspan><tspan fill="#6a8aa0">// 리플로우 1회</tspan></text>

  <line x1="84" y1="232" x2="796" y2="232" stroke="#1e2433" stroke-width="1"/>

  <text x="84" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">// template 엘리먼트와 함께 — content 속성이 Fragment</text>
  <text x="84" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> tmpl = document.</tspan><tspan fill="#e8e8e8">querySelector</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'#row-template'</tspan><tspan fill="#e8e8e8">);</tspan></text>
  <text x="84" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> clone = tmpl.content.</tspan><tspan fill="#e8e8e8">cloneNode</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#b5cea8">true</tspan><tspan fill="#e8e8e8">);</tspan></text>
  <text x="84" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">clone.</tspan><tspan fill="#e8e8e8">querySelector</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'.name'</tspan><tspan fill="#e8e8e8">).textContent = </tspan><tspan fill="#ce9178">'홍길동'</tspan><tspan fill="#e8e8e8">;</tspan></text>
  <text x="84" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">document.</tspan><tspan fill="#e8e8e8">querySelector</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'tbody'</tspan><tspan fill="#e8e8e8">).</tspan><tspan fill="#e8e8e8">appendChild</tspan><tspan fill="#e8e8e8">(clone);</tspan></text>

  <text x="84" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">// 삽입 후: frag.childNodes.length === 0 (자식 이전 완료)</text>
</svg>
