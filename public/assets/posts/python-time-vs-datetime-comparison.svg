<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">time 모듈 vs datetime 모듈 비교</text>

  <!-- Headers -->
  <rect x="60" y="68" width="360" height="44" rx="8" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="240" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">time 모듈</text>

  <rect x="460" y="68" width="360" height="44" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">datetime 모듈</text>

  <!-- Row 1: 목적 -->
  <rect x="60" y="128" width="115" height="52" rx="4" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="118" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">목적</text>

  <rect x="181" y="128" width="239" height="52" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="300" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">C 라이브러리 타임 인터페이스</text>
  <text x="300" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Unix timestamp / 대기 / 측정</text>

  <rect x="460" y="128" width="360" height="52" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="640" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">날짜·시간 객체 (date, time, datetime, timedelta)</text>
  <text x="640" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">산술 · 포맷 · 타임존 처리</text>

  <!-- Row 2: 반환 타입 -->
  <rect x="60" y="192" width="115" height="52" rx="4" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="118" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">반환 타입</text>

  <rect x="181" y="192" width="239" height="52" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="300" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" text-anchor="middle">float (초 단위)</text>
  <text x="300" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">또는 time.struct_time</text>

  <rect x="460" y="192" width="360" height="52" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="640" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" text-anchor="middle">datetime, date, time, timedelta 객체</text>
  <text x="640" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">메서드·속성 풍부</text>

  <!-- Row 3: 주요 함수 -->
  <rect x="60" y="256" width="115" height="80" rx="4" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="118" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">주요 함수</text>

  <rect x="181" y="256" width="239" height="80" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="197" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">time.time()</text>
  <text x="197" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">time.sleep(n)</text>
  <text x="197" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">time.perf_counter()</text>

  <rect x="460" y="256" width="360" height="80" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="476" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">datetime.now() / .utcnow()</text>
  <text x="476" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">datetime.strptime() / .strftime()</text>
  <text x="476" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">timedelta, date.today()</text>

  <!-- Row 4: 적합한 용도 -->
  <rect x="60" y="350" width="115" height="80" rx="4" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="118" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">적합한 용도</text>

  <rect x="181" y="350" width="239" height="80" rx="4" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="197" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">· 실행 시간 측정</text>
  <text x="197" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">· 일정 시간 대기(sleep)</text>
  <text x="197" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">· Unix timestamp 직접 처리</text>

  <rect x="460" y="350" width="360" height="80" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="476" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">· 날짜 계산 (7일 후, 만료 확인)</text>
  <text x="476" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">· 포맷 변환 (표시·저장)</text>
  <text x="476" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">· 타임존 처리 (+ zoneinfo)</text>

  <!-- Perf counter note -->
  <rect x="60" y="450" width="760" height="48" rx="8" fill="#111820" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="469" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">성능 측정 권장</text>
  <text x="440" y="487" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" text-anchor="middle">time.perf_counter()  (단조 증가, 고해상도) · time.time() 보다 적합</text>
</svg>
