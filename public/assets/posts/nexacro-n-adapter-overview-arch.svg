<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-back" viewBox="0 0 14 14" refX="2" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 14 0 L 1 7 L 14 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Nexacro N 어댑터 아키텍처</text>

  <!-- Layer 1: Nexacro N Frontend -->
  <rect x="60" y="80" width="760" height="80" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">Nexacro N 클라이언트</text>
  <text x="440" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">transaction() → HTTP/HTTPS 요청 (PL 프로토콜)</text>

  <!-- Arrow down -->
  <line x1="440" y1="160" x2="440" y2="188" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="440" y1="246" x2="440" y2="218" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-back)"/>

  <!-- Layer 2: Adapter -->
  <rect x="200" y="200" width="480" height="80" rx="8" fill="#14200a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">Nexacro N 어댑터</text>
  <text x="440" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">PL 파싱 → Dataset/Variable 변환 → 비즈니스 로직 호출</text>

  <!-- Adapter types below -->
  <rect x="60" y="316" width="200" height="56" rx="8" fill="#0a0a0a" stroke="#7777cc" stroke-width="1"/>
  <text x="160" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Java 어댑터</text>
  <text x="160" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Spring / Servlet</text>

  <rect x="280" y="316" width="200" height="56" rx="8" fill="#0a0a0a" stroke="#7777cc" stroke-width="1"/>
  <text x="380" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Node.js 어댑터</text>
  <text x="380" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Express / Fastify</text>

  <rect x="500" y="316" width="200" height="56" rx="8" fill="#0a0a0a" stroke="#7777cc" stroke-width="1"/>
  <text x="600" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">.NET 어댑터</text>
  <text x="600" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">ASP.NET / .NET Core</text>

  <!-- Arrow from adapter to adapter types -->
  <line x1="310" y1="280" x2="160" y2="316" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="440" y1="280" x2="380" y2="316" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="570" y1="280" x2="600" y2="316" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- Layer 3: Backend -->
  <rect x="60" y="400" width="760" height="60" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="425" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">백엔드 서비스 / DB</text>
  <text x="440" y="447" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">비즈니스 로직 · JPA / MyBatis · RDBMS · 외부 API</text>

  <!-- Arrows from adapter types to backend -->
  <line x1="160" y1="372" x2="160" y2="400" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="380" y1="372" x2="380" y2="400" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="600" y1="372" x2="600" y2="400" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr)"/>
</svg>
