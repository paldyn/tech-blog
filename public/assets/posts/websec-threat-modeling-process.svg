<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arrp" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8">위협 모델링 4단계 프로세스</text>

  <!-- Step 1 -->
  <rect x="60" y="70" width="160" height="200" rx="8" fill="#0a1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#7ec8e3">1</text>
  <text x="140" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">시스템 분해</text>
  <text x="140" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">DFD 작성</text>
  <text x="140" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">신뢰 경계 표시</text>
  <text x="140" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">자산 목록 작성</text>
  <text x="140" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">진입/출구점 파악</text>
  <text x="140" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">→ 아키텍처 문서</text>
  <text x="140" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">→ 시퀀스 다이어그램</text>
  <text x="140" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">산출물: DFD</text>

  <!-- Arrow 1-->
  <line x1="220" y1="170" x2="245" y2="170" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrp)"/>

  <!-- Step 2 -->
  <rect x="245" y="70" width="160" height="200" rx="8" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="325" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#55c555">2</text>
  <text x="325" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">위협 식별</text>
  <text x="325" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">STRIDE 적용</text>
  <text x="325" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">공격 트리 작성</text>
  <text x="325" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">OWASP 체크리스트</text>
  <text x="325" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">과거 사고 참조</text>
  <text x="325" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">→ 브레인스토밍</text>
  <text x="325" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">→ 팀 리뷰</text>
  <text x="325" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">산출물: 위협 목록</text>

  <!-- Arrow 2 -->
  <line x1="405" y1="170" x2="430" y2="170" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrp)"/>

  <!-- Step 3 -->
  <rect x="430" y="70" width="160" height="200" rx="8" fill="#12081a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="510" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#7777cc">3</text>
  <text x="510" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">위협 평가</text>
  <text x="510" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">DREAD 점수 산정</text>
  <text x="510" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">CVSS 활용</text>
  <text x="510" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">비즈니스 영향 분석</text>
  <text x="510" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">가능성 x 영향도</text>
  <text x="510" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">→ 리스크 매트릭스</text>
  <text x="510" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">→ 우선순위 결정</text>
  <text x="510" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">산출물: 우선순위표</text>

  <!-- Arrow 3 -->
  <line x1="590" y1="170" x2="615" y2="170" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrp)"/>

  <!-- Step 4 -->
  <rect x="615" y="70" width="205" height="200" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="717" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e05555">4</text>
  <text x="717" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">대응책 수립</text>
  <text x="717" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">제거·완화·수용·전가</text>
  <text x="717" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">구체적 컨트롤 명시</text>
  <text x="717" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">보안 요구사항 문서화</text>
  <text x="717" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">잔여 리스크 승인</text>
  <text x="717" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">→ 개발 티켓 생성</text>
  <text x="717" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">→ 테스트 케이스 작성</text>
  <text x="717" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">산출물: 보안 요구사항</text>

  <!-- Code block -->
  <rect x="60" y="290" width="760" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 위협 모델링 체크리스트 예시 (로그인 기능)</text>
  <text x="80" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">threats = [</text>
  <text x="80" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">    "S: 비밀번호 추측(브루트 포스) → 레이트 리미팅",</text>
  <text x="80" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">    "I: 로그인 폼 XSS → 출력 인코딩 + CSP",</text>
  <text x="80" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">    "E: 세션 토큰 탈취 후 권한 상승 → HttpOnly 쿠키",</text>
  <text x="80" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">]</text>
</svg>
