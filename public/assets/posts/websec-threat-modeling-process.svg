<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arrtm" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <text x="440" y="50" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">위협 모델링 프로세스</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">4단계 위협 분석 사이클</text>

  <!-- Step 1 -->
  <rect x="60" y="110" width="170" height="90" rx="10" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="145" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">1. 시스템 정의</text>
  <text x="145" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">무엇을 보호하는가?</text>
  <text x="145" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">DFD 작성 · 자산 식별</text>

  <!-- Arrow 1→2 -->
  <line x1="230" y1="155" x2="295" y2="155" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrtm)"/>

  <!-- Step 2 -->
  <rect x="295" y="110" width="170" height="90" rx="10" fill="#2a1a0d" stroke="#e0a055" stroke-width="2"/>
  <text x="380" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e0a055" text-anchor="middle">2. 위협 식별</text>
  <text x="380" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">무엇이 잘못될 수 있나?</text>
  <text x="380" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">STRIDE · 공격 트리</text>

  <!-- Arrow 2→3 -->
  <line x1="465" y1="155" x2="530" y2="155" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrtm)"/>

  <!-- Step 3 -->
  <rect x="530" y="110" width="170" height="90" rx="10" fill="#2a0d0d" stroke="#e05555" stroke-width="2"/>
  <text x="615" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">3. 위험 평가</text>
  <text x="615" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">얼마나 심각한가?</text>
  <text x="615" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">DREAD · CVSS</text>

  <!-- Arrow 3→4 -->
  <line x1="700" y1="155" x2="765" y2="155" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrtm)"/>

  <!-- Step 4 -->
  <rect x="765" y="110" width="55" height="90" rx="10" fill="#0d2a0d" stroke="#55c555" stroke-width="2"/>
  <text x="792" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="700" fill="#55c555" text-anchor="middle">4.</text>
  <text x="792" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="700" fill="#55c555" text-anchor="middle">완화</text>
  <text x="792" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">대책</text>

  <!-- DFD Example -->
  <text x="440" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8" text-anchor="middle">DFD (데이터 흐름 다이어그램) 구성요소</text>

  <rect x="60" y="265" width="150" height="55" rx="8" fill="#1a2035" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="135" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">외부 개체</text>
  <text x="135" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">사용자, 외부 API</text>

  <rect x="240" y="265" width="150" height="55" rx="8" fill="#0d2a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="315" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">프로세스</text>
  <text x="315" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">앱 로직, API 서버</text>

  <rect x="420" y="265" width="150" height="55" rx="8" fill="#2a1a0d" stroke="#e0a055" stroke-width="1.5"/>
  <text x="495" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e0a055" text-anchor="middle">데이터 저장소</text>
  <text x="495" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">DB, 파일 시스템</text>

  <rect x="600" y="265" width="150" height="55" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="675" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">신뢰 경계</text>
  <text x="675" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">DMZ, 네트워크 경계</text>

  <!-- STRIDE mapping -->
  <rect x="60" y="355" width="760" height="120" rx="8" fill="#12121a" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">STRIDE 위협 분류</text>
  <text x="130" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle" font-weight="600">S — Spoofing</text>
  <text x="130" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">인증 위장</text>
  <text x="260" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle" font-weight="600">T — Tampering</text>
  <text x="260" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">데이터 변조</text>
  <text x="390" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e0a055" text-anchor="middle" font-weight="600">R — Repudiation</text>
  <text x="390" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">행위 부인</text>
  <text x="130" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle" font-weight="600">I — Info Disclosure</text>
  <text x="130" y="464" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">정보 유출</text>
  <text x="260" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#cc77cc" text-anchor="middle" font-weight="600">D — Denial of Service</text>
  <text x="260" y="464" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">서비스 거부</text>
  <text x="390" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffaa55" text-anchor="middle" font-weight="600">E — Privilege Escalation</text>
  <text x="390" y="464" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">권한 상승</text>
</svg>
