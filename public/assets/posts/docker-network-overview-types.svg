<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" width="880" style="background:#0a0a0a;border-radius:12px;font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">Docker 네트워크 드라이버 종류</text>
  <text x="440" y="72" text-anchor="middle" fill="#888" font-size="13">각 드라이버는 서로 다른 네트워크 격리 방식을 제공한다</text>

  <!-- bridge -->
  <rect x="60" y="100" width="220" height="120" rx="10" fill="#0d1b2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="128" text-anchor="middle" fill="#7ec8e3" font-size="16" font-weight="600">bridge</text>
  <text x="170" y="152" text-anchor="middle" fill="#e8e8e8" font-size="13">기본 드라이버. 가상 브리지를</text>
  <text x="170" y="170" text-anchor="middle" fill="#e8e8e8" font-size="13">통해 컨테이너끼리 통신</text>
  <text x="170" y="192" text-anchor="middle" fill="#55c555" font-size="12">✓ 기본값 · 단일 호스트</text>
  <text x="170" y="210" text-anchor="middle" fill="#888" font-size="12">docker0 브리지 사용</text>

  <!-- host -->
  <rect x="330" y="100" width="220" height="120" rx="10" fill="#0d1b2a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="440" y="128" text-anchor="middle" fill="#ce9178" font-size="16" font-weight="600">host</text>
  <text x="440" y="152" text-anchor="middle" fill="#e8e8e8" font-size="13">호스트 네트워크 스택을</text>
  <text x="440" y="170" text-anchor="middle" fill="#e8e8e8" font-size="13">컨테이너와 공유</text>
  <text x="440" y="192" text-anchor="middle" fill="#e05555" font-size="12">✗ 격리 없음 · Linux 전용</text>
  <text x="440" y="210" text-anchor="middle" fill="#888" font-size="12">성능 최우선 상황에 사용</text>

  <!-- none -->
  <rect x="600" y="100" width="220" height="120" rx="10" fill="#0d1b2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="710" y="128" text-anchor="middle" fill="#7777cc" font-size="16" font-weight="600">none</text>
  <text x="710" y="152" text-anchor="middle" fill="#e8e8e8" font-size="13">네트워크 인터페이스가</text>
  <text x="710" y="170" text-anchor="middle" fill="#e8e8e8" font-size="13">전혀 없는 완전 격리</text>
  <text x="710" y="192" text-anchor="middle" fill="#888" font-size="12">loopback만 존재</text>
  <text x="710" y="210" text-anchor="middle" fill="#888" font-size="12">최고 보안 격리 필요 시</text>

  <!-- overlay -->
  <rect x="60" y="265" width="220" height="120" rx="10" fill="#0d1b2a" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="293" text-anchor="middle" fill="#55c555" font-size="16" font-weight="600">overlay</text>
  <text x="170" y="317" text-anchor="middle" fill="#e8e8e8" font-size="13">여러 Docker 호스트를</text>
  <text x="170" y="335" text-anchor="middle" fill="#e8e8e8" font-size="13">연결하는 분산 네트워크</text>
  <text x="170" y="357" text-anchor="middle" fill="#55c555" font-size="12">✓ Swarm / 멀티호스트</text>
  <text x="170" y="375" text-anchor="middle" fill="#888" font-size="12">VXLAN 터널링 사용</text>

  <!-- macvlan -->
  <rect x="330" y="265" width="220" height="120" rx="10" fill="#0d1b2a" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="440" y="293" text-anchor="middle" fill="#b5cea8" font-size="16" font-weight="600">macvlan</text>
  <text x="440" y="317" text-anchor="middle" fill="#e8e8e8" font-size="13">컨테이너에 실제 MAC</text>
  <text x="440" y="335" text-anchor="middle" fill="#e8e8e8" font-size="13">주소를 직접 할당</text>
  <text x="440" y="357" text-anchor="middle" fill="#888" font-size="12">물리 네트워크 직접 연결</text>
  <text x="440" y="375" text-anchor="middle" fill="#888" font-size="12">레거시 앱 마이그레이션</text>

  <!-- ipvlan -->
  <rect x="600" y="265" width="220" height="120" rx="10" fill="#0d1b2a" stroke="#888" stroke-width="1.5"/>
  <text x="710" y="293" text-anchor="middle" fill="#e8e8e8" font-size="16" font-weight="600">ipvlan</text>
  <text x="710" y="317" text-anchor="middle" fill="#e8e8e8" font-size="13">MAC 공유, IP 분리.</text>
  <text x="710" y="335" text-anchor="middle" fill="#e8e8e8" font-size="13">L2/L3 모드 선택 가능</text>
  <text x="710" y="357" text-anchor="middle" fill="#888" font-size="12">MAC 테이블 과부하 방지</text>
  <text x="710" y="375" text-anchor="middle" fill="#888" font-size="12">macvlan 대안</text>

  <!-- Bottom note -->
  <rect x="60" y="420" width="760" height="80" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="448" text-anchor="middle" fill="#55c555" font-size="14" font-weight="600">핵심 요약</text>
  <text x="440" y="470" text-anchor="middle" fill="#e8e8e8" font-size="13">단일 호스트 개발 → bridge  |  성능 극한 → host  |  멀티 호스트 → overlay</text>
  <text x="440" y="490" text-anchor="middle" fill="#888" font-size="12">물리 네트워크 직접 접근 → macvlan / ipvlan  |  완전 격리 → none</text>
</svg>
