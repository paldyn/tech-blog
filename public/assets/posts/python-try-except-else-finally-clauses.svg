<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="43" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">각 절의 역할과 작성 가이드</text>

  <!-- 4 clause cards -->
  <!-- try -->
  <rect x="55" y="70" width="175" height="130" rx="8" fill="#0c1628" stroke="#7ec8e3" stroke-width="2"/>
  <text x="143" y="97" text-anchor="middle" font-size="15" font-weight="700" fill="#7ec8e3">try</text>
  <line x1="75" y1="107" x2="210" y2="107" stroke="#2a3d5e" stroke-width="1"/>
  <text x="75" y="126" font-size="11" fill="#888">실패 가능성 있는</text>
  <text x="75" y="143" font-size="11" fill="#888">최소한의 코드만</text>
  <text x="75" y="160" font-size="11" fill="#888">배치. 범위가 넓을</text>
  <text x="75" y="177" font-size="11" fill="#888">수록 디버깅 어려움</text>

  <!-- except -->
  <rect x="255" y="70" width="175" height="130" rx="8" fill="#1a0c0c" stroke="#e05555" stroke-width="2"/>
  <text x="343" y="97" text-anchor="middle" font-size="15" font-weight="700" fill="#e05555">except</text>
  <line x1="275" y1="107" x2="410" y2="107" stroke="#2a3d5e" stroke-width="1"/>
  <text x="275" y="126" font-size="11" fill="#888">구체적 예외 타입</text>
  <text x="275" y="143" font-size="11" fill="#888">지정 권장. bare</text>
  <text x="275" y="160" font-size="11" fill="#888">except: 는 피할 것.</text>
  <text x="275" y="177" font-size="11" fill="#888">여러 절 가능</text>

  <!-- else -->
  <rect x="455" y="70" width="175" height="130" rx="8" fill="#0c1c0a" stroke="#55c555" stroke-width="2"/>
  <text x="543" y="97" text-anchor="middle" font-size="15" font-weight="700" fill="#55c555">else</text>
  <line x1="475" y1="107" x2="610" y2="107" stroke="#2a3d5e" stroke-width="1"/>
  <text x="475" y="126" font-size="11" fill="#888">예외가 없을 때만</text>
  <text x="475" y="143" font-size="11" fill="#888">실행. try 성공 후</text>
  <text x="475" y="160" font-size="11" fill="#888">이어지는 로직을</text>
  <text x="475" y="177" font-size="11" fill="#888">분리할 때 유용</text>

  <!-- finally -->
  <rect x="655" y="70" width="175" height="130" rx="8" fill="#1a1000" stroke="#ce9178" stroke-width="2"/>
  <text x="743" y="97" text-anchor="middle" font-size="15" font-weight="700" fill="#ce9178">finally</text>
  <line x1="675" y1="107" x2="810" y2="107" stroke="#2a3d5e" stroke-width="1"/>
  <text x="675" y="126" font-size="11" fill="#888">예외 여부 무관</text>
  <text x="675" y="143" font-size="11" fill="#888">항상 실행. 자원</text>
  <text x="675" y="160" font-size="11" fill="#888">정리, 파일 닫기</text>
  <text x="675" y="177" font-size="11" fill="#888">등 cleanup 코드</text>

  <!-- Code block -->
  <rect x="55" y="222" width="770" height="148" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="75" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3" font-weight="600">try</text><text x="99" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">:</text>
  <text x="75" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">    result = risky_operation()</text>
  <text x="75" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#e05555" font-weight="600">except</text><text x="135" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff"> ValueError </text><text x="240" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#7ec8e3" font-weight="600">as</text><text x="260" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff"> e:</text>
  <text x="75" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">    handle_error(e)</text>
  <text x="75" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#55c555" font-weight="600">else</text><text x="117" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">:    process(result)</text>
  <text x="75" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ce9178" font-weight="600">finally</text><text x="145" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">: cleanup()</text>
</svg>
