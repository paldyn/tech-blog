<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">인증서 검증 단계 및 CT 로그</text>

  <!-- Validation steps -->
  <rect x="60" y="64" width="460" height="54" rx="8" fill="#111122" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="290" y="84" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">① 유효기간 확인 (NotBefore ~ NotAfter)</text>
  <text x="290" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">현재 시각이 범위 내 없으면 즉시 거부</text>

  <line x1="290" y1="120" x2="290" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="60" y="142" width="460" height="54" rx="8" fill="#111122" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="290" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">② 도메인 일치 확인 (Hostname Verification)</text>
  <text x="290" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">SAN(subjectAltName)이 요청 도메인과 일치하는지 확인</text>

  <line x1="290" y1="198" x2="290" y2="218" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="60" y="220" width="460" height="54" rx="8" fill="#111122" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="290" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">③ 서명 체인 검증 (Chain of Trust)</text>
  <text x="290" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Leaf → Intermediate → Root CA 서명 순차 검증</text>

  <line x1="290" y1="276" x2="290" y2="296" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="60" y="298" width="460" height="54" rx="8" fill="#111122" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="290" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">④ 폐기 상태 확인 (OCSP / CRL)</text>
  <text x="290" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">CA가 비밀키 유출 등으로 인증서 폐기했는지 확인</text>

  <!-- CT Log section -->
  <rect x="550" y="64" width="290" height="288" rx="8" fill="#111a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="695" y="88" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">Certificate Transparency</text>
  <text x="695" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">모든 인증서를 공개 로그에 기록</text>

  <rect x="570" y="118" width="250" height="44" rx="6" fill="#0d200d" stroke="#55c555" stroke-width="1"/>
  <text x="695" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">SCT (Signed Certificate Timestamp)</text>
  <text x="695" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">인증서가 CT 로그에 제출됐음을 증명</text>

  <rect x="570" y="172" width="250" height="44" rx="6" fill="#0d200d" stroke="#55c555" stroke-width="1"/>
  <text x="695" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">누구나 로그 조회 가능</text>
  <text x="695" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">crt.sh에서 도메인 인증서 전체 조회</text>

  <rect x="570" y="226" width="250" height="54" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="695" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">CT 없으면 Chrome 차단</text>
  <text x="695" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">2018년 이후 발급 인증서는</text>
  <text x="695" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">SCT 필수 (2개 이상 로그)</text>

  <rect x="570" y="290" width="250" height="44" rx="6" fill="#0d200d" stroke="#55c555" stroke-width="1"/>
  <text x="695" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">오발급 인증서 신속 탐지</text>
  <text x="695" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">공격자가 위조 인증서 발급 시 감지</text>

  <!-- Bottom note -->
  <rect x="60" y="368" width="760" height="36" rx="6" fill="#110a0a" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">취약점 방어: CAA 레코드로 허가된 CA만 인증서 발급 가능하도록 DNS에 설정</text>
  <text x="440" y="397" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">example.com. CAA 0 issue "letsencrypt.org"  → 다른 CA의 오발급 방지</text>
</svg>
