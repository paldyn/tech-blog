<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">엑셀 템플릿 기반 출력 흐름</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">서버에서 템플릿에 데이터 주입 → 완성 파일 다운로드</text>

  <!-- Steps -->
  <rect x="60" y="100" width="140" height="64" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">① Nexacro</text>
  <text x="130" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">조회 조건 전달</text>
  <text x="130" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">FileDownload 호출</text>

  <line x1="200" y1="132" x2="240" y2="132" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="240,126 252,132 240,138" fill="#7ec8e3"/>

  <rect x="252" y="100" width="160" height="64" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="332" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">② 서버 Controller</text>
  <text x="332" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">DB 조회</text>
  <text x="332" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">파라미터 수신</text>

  <line x1="412" y1="132" x2="452" y2="132" stroke="#7777cc" stroke-width="2"/>
  <polygon points="452,126 464,132 452,138" fill="#7777cc"/>

  <rect x="464" y="100" width="160" height="64" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="544" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">③ 템플릿 로드</text>
  <text x="544" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">report_tmpl.xlsx</text>
  <text x="544" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">XSSFWorkbook</text>

  <line x1="624" y1="132" x2="664" y2="132" stroke="#55c555" stroke-width="2"/>
  <polygon points="664,126 676,132 664,138" fill="#55c555"/>

  <rect x="676" y="100" width="164" height="64" rx="8" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="758" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">④ 데이터 주입</text>
  <text x="758" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">셀에 값 Write</text>
  <text x="758" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">스트리밍 출력</text>

  <!-- Arrow down from step 4 -->
  <line x1="758" y1="164" x2="758" y2="210" stroke="#e05555" stroke-width="2"/>
  <polygon points="752,210 758,222 764,210" fill="#e05555"/>

  <rect x="600" y="222" width="220" height="50" rx="6" fill="#111827" stroke="#e05555" stroke-width="1"/>
  <text x="710" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">⑤ 완성 .xlsx 다운로드</text>
  <text x="710" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Content-Disposition: attachment</text>

  <!-- Template structure illustration -->
  <rect x="60" y="210" width="480" height="210" rx="8" fill="#111827" stroke="#55c555" stroke-width="1"/>
  <text x="300" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">엑셀 템플릿 구조 예시</text>

  <!-- Template cells -->
  <rect x="80" y="246" width="440" height="20" rx="0" fill="#1e2433"/>
  <text x="100" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">회사명: [COMPANY_NM]</text>
  <text x="350" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">기준일: [BASE_DT]</text>

  <rect x="80" y="268" width="440" height="18" rx="0" fill="#111827"/>
  <text x="100" y="281" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">품목코드 | 품목명 | 수량 | 단가 | 금액</text>

  <rect x="80" y="288" width="440" height="16" rx="0" fill="#0a2010"/>
  <text x="100" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">→ 데이터 행 반복 삽입 영역 (POI insertRow)</text>

  <rect x="80" y="306" width="440" height="16" rx="0" fill="#0a2010"/>
  <text x="100" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">→ 행 복사 패턴으로 스타일 유지</text>

  <rect x="80" y="324" width="440" height="18" rx="0" fill="#1e2433"/>
  <text x="100" y="337" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">합계: [TOTAL_AMT]</text>

  <text x="300" y="380" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">[ ] 마커를 셀 값으로 검색 후 대체 (replace 패턴)</text>
  <text x="300" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">기존 스타일(셀 병합·서식) 보존 가능</text>
</svg>
