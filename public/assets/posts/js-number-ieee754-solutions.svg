<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">부동소수점 문제 해결 패턴</text>

  <!-- Solution 1: toFixed / round -->
  <rect x="60" y="68" width="380" height="150" rx="10" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="250" y="92" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">① 반올림으로 비교</text>
  <rect x="76" y="102" width="348" height="106" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// Math.round 활용</text>
  <text x="92" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">const</text>
  <text x="132" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> round = (n, d) =&gt;</text>
  <text x="92" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  Math.round(n * </text>
  <text x="92" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">                10</text>
  <text x="92" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">                  **d) / </text>
  <text x="92" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">                           10</text>
  <text x="92" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">                              **d</text>
  <!-- Cleaner version -->
  <rect x="76" y="102" width="348" height="106" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// toFixed로 문자열 변환 후 비교</text>
  <text x="92" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">(0.1 + 0.2).toFixed(</text>
  <text x="232" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">10</text>
  <text x="250" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">);</text>
  <text x="92" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">// "0.3000000000"</text>
  <text x="92" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">+(0.1+0.2).toFixed(</text>
  <text x="220" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">10</text>
  <text x="238" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">) === </text>
  <text x="288" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">0.3</text>
  <text x="92" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">// true ✓</text>

  <!-- Solution 2: epsilon -->
  <rect x="460" y="68" width="380" height="150" rx="10" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="650" y="92" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">② EPSILON으로 근사 비교</text>
  <rect x="476" y="102" width="348" height="106" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="492" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// Number.EPSILON 활용</text>
  <text x="492" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">function</text>
  <text x="564" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> nearlyEqual(a, b) {</text>
  <text x="492" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">  return</text>
  <text x="548" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> Math.abs(a - b)</text>
  <text x="492" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    &lt; Number.EPSILON;</text>
  <text x="492" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">}</text>

  <!-- Solution 3: integer arithmetic -->
  <rect x="60" y="238" width="380" height="150" rx="10" fill="#0d1117" stroke="#ce9178" stroke-width="1.5"/>
  <text x="250" y="262" text-anchor="middle" font-size="14" font-weight="600" fill="#ce9178">③ 정수로 변환 후 연산</text>
  <rect x="76" y="272" width="348" height="106" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// 금액 계산: 원 단위 정수로</text>
  <text x="92" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">const</text>
  <text x="132" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> price = </text>
  <text x="200" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">1000</text>
  <text x="228" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">; // 10.00원</text>
  <text x="92" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">const</text>
  <text x="132" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> tax = </text>
  <text x="182" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">100</text>
  <text x="206" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">; // 1.00원</text>
  <text x="92" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">price + tax; // </text>
  <text x="188" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">1100</text>
  <text x="216" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve"> (정확)</text>
  <text x="92" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// 표시 시 /100 해서 원 단위로</text>

  <!-- Solution 4: BigInt -->
  <rect x="460" y="238" width="380" height="150" rx="10" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="650" y="262" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc">④ BigInt 사용</text>
  <rect x="476" y="272" width="348" height="106" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="492" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// 큰 정수가 필요할 때</text>
  <text x="492" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">const</text>
  <text x="532" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> id = BigInt(</text>
  <text x="636" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">"9007199254740993"</text>
  <text x="492" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">                   )</text>
  <text x="492" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">const id =</text>
  <text x="492" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">  9007199254740993n</text>
  <text x="492" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">// 정확한 정수 표현</text>

  <!-- Footer -->
  <text x="440" y="402" text-anchor="middle" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복 시리즈 #10</text>
</svg>
