<svg width="880" height="470" viewBox="0 0 880 470" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="470" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">모듈러 역원: 나눗셈을 곱셈으로 (mod 7)</text>

  <!-- inverse table -->
  <g font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <rect x="60" y="92" width="120" height="38" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="120" y="116" text-anchor="middle" fill="#9aa4b8">a</text>
    <rect x="60" y="138" width="120" height="38" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="120" y="162" text-anchor="middle" fill="#9aa4b8">a⁻¹ mod 7</text>

    <rect x="190" y="92" width="80" height="38" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="230" y="116" text-anchor="middle" fill="#ffffff">1</text>
    <rect x="190" y="138" width="80" height="38" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="230" y="162" text-anchor="middle" fill="#ffffff">1</text>

    <rect x="280" y="92" width="80" height="38" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="320" y="116" text-anchor="middle" fill="#ffffff">2</text>
    <rect x="280" y="138" width="80" height="38" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="320" y="162" text-anchor="middle" fill="#ffffff">4</text>

    <rect x="370" y="92" width="80" height="38" rx="6" fill="#000000" stroke="#55c555" stroke-width="2"/>
    <text x="410" y="116" text-anchor="middle" fill="#55c555" font-weight="600">3</text>
    <rect x="370" y="138" width="80" height="38" rx="6" fill="#000000" stroke="#55c555" stroke-width="2"/>
    <text x="410" y="162" text-anchor="middle" fill="#55c555" font-weight="600">5</text>

    <rect x="460" y="92" width="80" height="38" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="500" y="116" text-anchor="middle" fill="#ffffff">4</text>
    <rect x="460" y="138" width="80" height="38" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="500" y="162" text-anchor="middle" fill="#ffffff">2</text>

    <rect x="550" y="92" width="80" height="38" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="590" y="116" text-anchor="middle" fill="#ffffff">5</text>
    <rect x="550" y="138" width="80" height="38" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="590" y="162" text-anchor="middle" fill="#ffffff">3</text>

    <rect x="640" y="92" width="80" height="38" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="680" y="116" text-anchor="middle" fill="#ffffff">6</text>
    <rect x="640" y="138" width="80" height="38" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="680" y="162" text-anchor="middle" fill="#ffffff">6</text>
  </g>

  <!-- definition -->
  <rect x="60" y="212" width="760" height="44" rx="6" fill="#000000" stroke="#55c555" stroke-width="1.5"/>
  <text x="76" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#55c555" font-weight="600">3 × 5 = 15 ≡ 1 (mod 7)</tspan><tspan fill="#ffffff">  →  5가 3의 역원 (3⁻¹ ≡ 5)</tspan></text>

  <!-- comparison -->
  <rect x="60" y="290" width="360" height="86" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">일반 정수 세계</text>
  <text x="76" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve" fill="#ffffff">6 ÷ 3 = 2</text>

  <rect x="460" y="290" width="360" height="86" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">mod 7 세계 (역원을 곱한다)</text>
  <text x="476" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        xml:space="preserve"><tspan fill="#ffffff">6 · 3⁻¹ = 6 · 5 = 30 ≡ </tspan><tspan fill="#55c555" font-weight="600">2</tspan></text>

  <text x="60" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">소수 모듈러에서는 1 ~ p-1 모든 수가 역원을 가진다 — 나눗셈이 항상 가능한 세계 (유한체)</text>
</svg>
