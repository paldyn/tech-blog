<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">숨김 파일 관련 핵심 명령</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">ls, find, 설정 파일 경로 패턴</text>

  <!-- ls variants -->
  <text x="80" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">ls 옵션 조합</text>
  <rect x="60" y="106" width="360" height="168" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="128" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">$ ls -a    <tspan fill="#9aa4b8"># .파일 포함 전부</tspan></text>
  <text x="76" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">$ ls -A    <tspan fill="#9aa4b8"># . .. 제외 숨김파일</tspan></text>
  <text x="76" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">$ ls -la   <tspan fill="#9aa4b8"># 상세 + 숨김 전부</tspan></text>
  <text x="76" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">$ ls -lA   <tspan fill="#9aa4b8"># 상세 + . .. 제외</tspan></text>
  <text x="76" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">$ ls -lah  <tspan fill="#9aa4b8"># 숨김+상세+크기단위</tspan></text>
  <text x="76" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># . .. 를 제외하고 싶을 때는</text>
  <text x="76" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">$ ls -A | grep <tspan fill="#ce9178">'^[.]'</tspan></text>
  <text x="76" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># . 으로 시작하는 항목만 grep</text>

  <!-- find hidden files -->
  <text x="80" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">find 로 숨김 파일 탐색</text>
  <rect x="60" y="304" width="360" height="76" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">$ find ~ -maxdepth 1 -name <tspan fill="#ce9178">'.*'</tspan></text>
  <text x="76" y="344" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 홈 디렉터리의 숨김 파일</text>
  <text x="76" y="362" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">$ find . -name <tspan fill="#ce9178">'.*'</tspan> -not -name <tspan fill="#ce9178">'.'</tspan></text>

  <!-- Common config files -->
  <text x="480" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8c55a">자주 만나는 숨김 파일</text>
  <rect x="460" y="106" width="360" height="274" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="128" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">~/.bashrc</text>
  <text x="476" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  bash 대화형 셸 설정</text>
  <text x="476" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">~/.bash_profile</text>
  <text x="476" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  bash 로그인 셸 설정</text>
  <text x="476" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">~/.ssh/</text>
  <text x="476" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  SSH 키·설정 디렉터리</text>
  <text x="476" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">~/.config/</text>
  <text x="476" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  XDG 설정 디렉터리</text>
  <text x="476" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">~/.gitconfig</text>
  <text x="476" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  git 사용자 설정</text>
  <text x="476" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">~/.vimrc</text>
  <text x="476" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  vim 편집기 설정</text>
  <text x="476" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">~/.local/share/</text>
  <text x="476" y="348" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  XDG 로컬 데이터</text>
  <text x="476" y="366" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">~/.cache/</text>
  <text x="476" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  임시 캐시 데이터</text>
</svg>
