<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Kubernetes Volume 타입 분류</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">임시 · 노드 로컬 · 네트워크 · 특수 목적</text>

  <!-- Ephemeral volumes -->
  <rect x="60" y="90" width="375" height="200" fill="#0f1923" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="247" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">임시 볼륨 (Pod 수명과 동일)</text>

  <rect x="76" y="124" width="160" height="52" fill="#0a1015" rx="5" stroke="#2a3a4e" stroke-width="1"/>
  <text x="156" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">emptyDir</text>
  <text x="156" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">컨테이너 간 공유 임시 공간</text>

  <rect x="254" y="124" width="165" height="52" fill="#0a1015" rx="5" stroke="#2a3a4e" stroke-width="1"/>
  <text x="336" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">configMap / secret</text>
  <text x="336" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">읽기 전용 설정·비밀 주입</text>

  <rect x="76" y="186" width="160" height="52" fill="#0a1015" rx="5" stroke="#2a3a4e" stroke-width="1"/>
  <text x="156" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">downwardAPI</text>
  <text x="156" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Pod 메타데이터 파일 노출</text>

  <rect x="254" y="186" width="165" height="52" fill="#0a1015" rx="5" stroke="#2a3a4e" stroke-width="1"/>
  <text x="336" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">projected</text>
  <text x="336" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">여러 소스 하나로 합치기</text>

  <!-- Persistent volumes -->
  <rect x="455" y="90" width="375" height="200" fill="#0f1923" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="642" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">영구 볼륨 (Pod 수명 초과)</text>

  <rect x="471" y="124" width="160" height="52" fill="#0a1015" rx="5" stroke="#0a2a0a" stroke-width="1"/>
  <text x="551" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">PersistentVolumeClaim</text>
  <text x="551" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">PV 동적/정적 프로비저닝</text>

  <rect x="649" y="124" width="165" height="52" fill="#0a1015" rx="5" stroke="#0a2a0a" stroke-width="1"/>
  <text x="731" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">hostPath</text>
  <text x="731" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">노드 파일시스템 직접 마운트</text>

  <rect x="471" y="186" width="160" height="52" fill="#0a1015" rx="5" stroke="#0a2a0a" stroke-width="1"/>
  <text x="551" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">nfs</text>
  <text x="551" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">NFS 서버 직접 마운트</text>

  <rect x="649" y="186" width="165" height="52" fill="#0a1015" rx="5" stroke="#0a2a0a" stroke-width="1"/>
  <text x="731" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">CSI</text>
  <text x="731" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">EBS/EFS/GCE-PD 등 플러그인</text>

  <!-- Special volumes -->
  <rect x="60" y="306" width="375" height="110" fill="#0f1923" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="247" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">특수 목적 볼륨</text>

  <rect x="76" y="340" width="160" height="52" fill="#0a1015" rx="5" stroke="#2a2a4e" stroke-width="1"/>
  <text x="156" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">serviceAccountToken</text>
  <text x="156" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SA 토큰 자동 주입</text>

  <rect x="254" y="340" width="165" height="52" fill="#0a1015" rx="5" stroke="#2a2a4e" stroke-width="1"/>
  <text x="336" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">ephemeral (v1.23+)</text>
  <text x="336" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">인라인 임시 PVC</text>

  <!-- Access modes -->
  <rect x="455" y="306" width="375" height="110" fill="#0f1923" rx="8" stroke="#e8a020" stroke-width="1.5"/>
  <text x="642" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8a020" text-anchor="middle">Access Modes</text>

  <rect x="471" y="340" width="105" height="52" fill="#0a1015" rx="5" stroke="#3a2a0a" stroke-width="1"/>
  <text x="523" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e8e8e8" text-anchor="middle">RWO</text>
  <text x="523" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">단일 노드 R/W</text>

  <rect x="584" y="340" width="105" height="52" fill="#0a1015" rx="5" stroke="#3a2a0a" stroke-width="1"/>
  <text x="636" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e8e8e8" text-anchor="middle">RWX</text>
  <text x="636" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">다중 노드 R/W</text>

  <rect x="697" y="340" width="117" height="52" fill="#0a1015" rx="5" stroke="#3a2a0a" stroke-width="1"/>
  <text x="755" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e8e8e8" text-anchor="middle">ROX</text>
  <text x="755" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">다중 노드 R/O</text>

  <!-- Code block -->
  <rect x="60" y="432" width="760" height="68" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="452" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">volumes:</text>
  <text x="80" y="472" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#ffffff">- name: cache  emptyDir: {}</text>
  <text x="80" y="490" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#ffffff">- name: config  configMap: {name: app-config}</text>
</svg>
