<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">이중 연결 리스트 구조</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">각 노드에 prev·next 포인터 — 양방향 탐색 가능</text>

  <defs>
    <marker id="dll-fwd" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="dll-bwd" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>

  <!-- NULL left -->
  <rect x="60" y="148" width="55" height="34" rx="4" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="88" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#444" text-anchor="middle">NULL</text>

  <!-- Node 1 -->
  <rect x="130" y="130" width="140" height="70" rx="8" fill="#0f1a2e" stroke="#3a6ea8" stroke-width="2"/>
  <line x1="175" y1="130" x2="175" y2="200" stroke="#3a6ea8" stroke-width="1"/>
  <line x1="235" y1="130" x2="235" y2="200" stroke="#3a6ea8" stroke-width="1"/>
  <text x="152" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#ce9178" text-anchor="middle">prev</text>
  <text x="205" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">10</text>
  <text x="257" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3" text-anchor="middle">next</text>
  <!-- prev arrow (to null) -->
  <line x1="130" y1="165" x2="115" y2="165" stroke="#ce9178" stroke-width="2" marker-end="url(#dll-bwd)"/>
  <!-- next arrow -->
  <line x1="270" y1="165" x2="310" y2="165" stroke="#7ec8e3" stroke-width="2" marker-end="url(#dll-fwd)"/>

  <!-- Node 2 -->
  <rect x="310" y="130" width="140" height="70" rx="8" fill="#0f1a2e" stroke="#3a6ea8" stroke-width="2"/>
  <line x1="355" y1="130" x2="355" y2="200" stroke="#3a6ea8" stroke-width="1"/>
  <line x1="415" y1="130" x2="415" y2="200" stroke="#3a6ea8" stroke-width="1"/>
  <text x="332" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#ce9178" text-anchor="middle">prev</text>
  <text x="385" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">25</text>
  <text x="437" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3" text-anchor="middle">next</text>
  <!-- backward arrow (to node 1) -->
  <line x1="310" y1="175" x2="270" y2="175" stroke="#ce9178" stroke-width="2" marker-end="url(#dll-bwd)"/>
  <!-- forward arrow -->
  <line x1="450" y1="165" x2="490" y2="165" stroke="#7ec8e3" stroke-width="2" marker-end="url(#dll-fwd)"/>

  <!-- Node 3 -->
  <rect x="490" y="130" width="140" height="70" rx="8" fill="#0f1a2e" stroke="#3a6ea8" stroke-width="2"/>
  <line x1="535" y1="130" x2="535" y2="200" stroke="#3a6ea8" stroke-width="1"/>
  <line x1="595" y1="130" x2="595" y2="200" stroke="#3a6ea8" stroke-width="1"/>
  <text x="512" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#ce9178" text-anchor="middle">prev</text>
  <text x="565" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">37</text>
  <text x="617" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3" text-anchor="middle">next</text>
  <!-- backward arrow -->
  <line x1="490" y1="175" x2="450" y2="175" stroke="#ce9178" stroke-width="2" marker-end="url(#dll-bwd)"/>
  <!-- forward arrow (to null) -->
  <line x1="630" y1="165" x2="665" y2="165" stroke="#7ec8e3" stroke-width="2" marker-end="url(#dll-fwd)"/>

  <!-- NULL right -->
  <rect x="665" y="148" width="55" height="34" rx="4" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="693" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#444" text-anchor="middle">NULL</text>

  <!-- Labels -->
  <text x="200" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">head</text>
  <text x="565" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">tail</text>

  <!-- Legend -->
  <line x1="80" y1="250" x2="120" y2="250" stroke="#7ec8e3" stroke-width="2" marker-end="url(#dll-fwd)"/>
  <text x="130" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">next (앞 방향)</text>
  <line x1="280" y1="250" x2="320" y2="250" stroke="#ce9178" stroke-width="2" marker-end="url(#dll-bwd)"/>
  <text x="330" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">prev (뒤 방향)</text>

  <!-- vs singly linked list -->
  <rect x="60" y="278" width="760" height="118" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="302" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">// 노드 구조 비교</tspan>
  </text>
  <text x="76" y="322" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">// 단일: data + next       → 1 포인터</tspan>
  </text>
  <text x="76" y="342" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">// 이중: data + prev + next → 2 포인터 (메모리 2배)</tspan>
  </text>
  <text x="76" y="368" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">class</tspan>
    <tspan fill="#ffffff"> DNode:</tspan>
  </text>
  <text x="76" y="388" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  def</tspan>
    <tspan fill="#ffffff"> __init__(self, data):</tspan>
  </text>
  <text x="76" y="388" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    </tspan>
  </text>
</svg>
