<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560">
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">마스터 정리: T(n) = aT(n/b) + f(n)</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">c = log_b(a) 로 정의, f(n)과 n^c를 비교해 세 경우 중 하나 적용</text>

  <!-- Case 1 box -->
  <rect x="60" y="90" width="760" height="120" rx="10" fill="#0d0d1f" stroke="#4a4a9a" stroke-width="2"/>
  <rect x="60" y="90" width="8" height="120" rx="4" fill="#7777cc"/>
  <text x="88" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7777cc">Case 1 — f(n)이 n^c 보다 다항식적으로 작을 때</text>
  <text x="88" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">조건: f(n) = O(n^(c-ε))  for some ε &gt; 0</text>
  <!-- formula -->
  <rect x="88" y="153" width="680" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="104" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 재귀 호출 비용이 지배 → 결합 비용은 무시됨</text>
  <text x="104" y="189" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">T(n)</tspan> = <tspan fill="#55c555" font-weight="600">Θ(n^c)</tspan>  <tspan fill="#9aa4b8">// = Θ(n^(log_b a))</tspan></text>

  <!-- Case 2 box -->
  <rect x="60" y="228" width="760" height="120" rx="10" fill="#0d1a0d" stroke="#3a7a3a" stroke-width="2"/>
  <rect x="60" y="228" width="8" height="120" rx="4" fill="#55c555"/>
  <text x="88" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">Case 2 — f(n)이 n^c 와 같은 차수일 때</text>
  <text x="88" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">조건: f(n) = Θ(n^c · log^k n)  for some k ≥ 0</text>
  <rect x="88" y="291" width="680" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="104" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 두 비용이 균형 → log 인수만큼 증가</text>
  <text x="104" y="327" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">T(n)</tspan> = <tspan fill="#55c555" font-weight="600">Θ(n^c · log^(k+1) n)</tspan></text>

  <!-- Case 3 box -->
  <rect x="60" y="366" width="760" height="120" rx="10" fill="#1f0d0d" stroke="#7a3a3a" stroke-width="2"/>
  <rect x="60" y="366" width="8" height="120" rx="4" fill="#e05555"/>
  <text x="88" y="393" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e05555">Case 3 — f(n)이 n^c 보다 다항식적으로 클 때</text>
  <text x="88" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">조건: f(n) = Ω(n^(c+ε)) 이고 정규성 조건 성립</text>
  <rect x="88" y="429" width="680" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="104" y="448" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 결합 비용이 지배 → 재귀 호출 비용은 무시됨</text>
  <text x="104" y="465" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">T(n)</tspan> = <tspan fill="#55c555" font-weight="600">Θ(f(n))</tspan></text>

  <!-- note -->
  <text x="60" y="512" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">※ 정규성 조건: a·f(n/b) ≤ c·f(n) for c &lt; 1, 충분히 큰 n</text>
  <text x="60" y="532" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">※ T(n)=n^(log n) 같은 특수 형태는 마스터 정리 적용 불가</text>
</svg>
