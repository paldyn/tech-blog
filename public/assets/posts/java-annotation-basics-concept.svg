<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">애너테이션 — 코드에 붙이는 메타데이터</text>

  <defs>
    <marker id="abArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="60" y="86" width="340" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="78" y="116" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-weight="600" xml:space="preserve">@Entity</text>
  <text x="78" y="140" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-weight="600" xml:space="preserve">@Table(name = "users")</text>
  <text x="78" y="164" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">public class User {</text>
  <text x="78" y="188" font-size="13" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-weight="600" xml:space="preserve">    @Id</text>
  <text x="78" y="212" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    Long id;</text>

  <rect x="500" y="100" width="320" height="56" rx="8" fill="#0f1626" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="660" y="125" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">로직을 바꾸지 않는다</text>
  <text x="660" y="145" font-size="12" fill="#888" text-anchor="middle">코드에 정보(태그)만 덧붙인다</text>

  <rect x="500" y="170" width="320" height="56" rx="8" fill="#102117" stroke="#55c555" stroke-width="1.5"/>
  <text x="660" y="195" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">도구·프레임워크가 읽는다</text>
  <text x="660" y="215" font-size="12" fill="#888" text-anchor="middle">컴파일러 · 리플렉션 · 애너테이션 처리기</text>

  <line x1="400" y1="150" x2="498" y2="128" stroke="#7ec8e3" stroke-width="2" marker-end="url(#abArr)"/>
  <line x1="400" y1="170" x2="498" y2="196" stroke="#7ec8e3" stroke-width="2" marker-end="url(#abArr)"/>

  <text x="440" y="288" font-size="13" fill="#9aa4b8" text-anchor="middle">애너테이션 자체는 아무 일도 하지 않는다 — 그것을 읽는 코드가 의미를 부여한다</text>
</svg>
