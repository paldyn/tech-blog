<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-warn" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Docker Secrets 동작 방식</text>

  <!-- ── Bad path: ENV ── -->
  <rect x="60" y="68" width="200" height="52" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="160" y="89" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">환경변수 (❌ 위험)</text>
  <text x="160" y="109" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">ENV DB_PASS=secret123</text>

  <!-- env goes to layers -->
  <rect x="60" y="156" width="200" height="44" rx="6" fill="#1a0000" stroke="#e05555" stroke-width="1"/>
  <text x="160" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">이미지 레이어에 노출</text>
  <text x="160" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">docker inspect → env 섹션에 평문 저장</text>

  <line x1="160" y1="120" x2="160" y2="156" stroke="#e05555" stroke-width="2"
        marker-end="url(#arr-warn)"/>

  <!-- ── Good path: Secrets ── -->
  <!-- Secret source -->
  <rect x="330" y="68" width="220" height="52" rx="8" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="89" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">Secret 정의</text>
  <text x="440" y="109" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">파일 또는 external 소스</text>

  <!-- Manager -->
  <rect x="330" y="158" width="220" height="44" rx="6" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Swarm Manager / Compose</text>
  <text x="440" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">암호화 저장 (Raft 로그)</text>

  <line x1="440" y1="120" x2="440" y2="158" stroke="#7ec8e3" stroke-width="2"
        marker-end="url(#arr)"/>

  <!-- tmpfs mount -->
  <rect x="330" y="240" width="220" height="52" rx="6" fill="#0d1f2d" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="261" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">tmpfs 마운트</text>
  <text x="440" y="281" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">/run/secrets/{name} — 메모리만</text>

  <line x1="440" y1="202" x2="440" y2="240" stroke="#7ec8e3" stroke-width="2"
        marker-end="url(#arr)"/>

  <!-- Container reads -->
  <rect x="330" y="330" width="220" height="52" rx="6" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="351" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">컨테이너 앱</text>
  <text x="440" y="371" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">cat /run/secrets/db_password</text>

  <line x1="440" y1="292" x2="440" y2="330" stroke="#55c555" stroke-width="2"
        marker-end="url(#arr)"/>

  <!-- ── Right: Security properties ── -->
  <rect x="620" y="68" width="220" height="200" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="730" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">보안 특성</text>

  <text x="640" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓  이미지 레이어에 포함 안 됨</text>
  <text x="640" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓  docker inspect에 값 안 보임</text>
  <text x="640" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓  메모리(tmpfs)에만 존재</text>
  <text x="640" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓  컨테이너 종료 시 자동 삭제</text>
  <text x="640" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓  접근 허용된 서비스만 읽기 가능</text>
  <text x="640" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">기본 파일 권한: 0444</text>

  <!-- Security note -->
  <rect x="620" y="286" width="220" height="80" rx="8" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="730" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">docker compose</text>
  <text x="730" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Swarm 없이도 동작</text>
  <text x="730" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">로컬 개발 + 프로덕션 공통 패턴</text>
  <text x="730" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">파일 기반 secret 지원</text>

  <!-- bottom note -->
  <text x="440" y="460" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Swarm 모드: 전송 중 TLS 암호화, Raft 저장소에 AES-256으로 암호화</text>
  <text x="440" y="478" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Compose standalone: 호스트 파일을 tmpfs로 바인드마운트 (단순화된 구현)</text>
</svg>
