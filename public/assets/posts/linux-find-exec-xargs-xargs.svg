<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">xargs: 파이프 출력을 인수로 변환</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">stdin 의 여러 줄을 하나의 명령 인수 목록으로 전달</text>

  <!-- Flow diagram -->
  <!-- find output -->
  <rect x="60" y="92" width="180" height="80" fill="#000000" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" text-anchor="middle">find 출력 (stdin)</text>
  <text x="150" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" text-anchor="middle">./a.log</text>
  <text x="150" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" text-anchor="middle">./b.log</text>
  <text x="150" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" text-anchor="middle">./c.log</text>

  <!-- Arrow to xargs -->
  <polygon points="278,132 298,124 298,140" fill="#7ec8e3"/>
  <line x1="240" y1="132" x2="297" y2="132" stroke="#7ec8e3" stroke-width="2"/>
  <text x="268" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">파이프</text>

  <!-- xargs box -->
  <rect x="300" y="108" width="120" height="48" fill="#0f2a0f" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="360" y="137" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#55c555" text-anchor="middle">xargs rm</text>

  <!-- Arrow to command -->
  <polygon points="458,132 478,124 478,140" fill="#55c555"/>
  <line x1="420" y1="132" x2="477" y2="132" stroke="#55c555" stroke-width="2"/>

  <!-- Resulting command -->
  <rect x="480" y="108" width="340" height="48" fill="#000000" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="496" y="137" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">rm ./a.log ./b.log ./c.log</text>

  <!-- Note: batch -->
  <text x="650" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6a8aa0" text-anchor="middle">→ 한 번만 실행 (빠름)</text>

  <!-- xargs options -->
  <text x="80" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">xargs 주요 옵션</text>
  <rect x="60" y="226" width="360" height="132" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">-n 1    <tspan fill="#9aa4b8"># 인수 1개씩 전달 (;\; 와 동일)</tspan></text>
  <text x="76" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">-P 4    <tspan fill="#9aa4b8"># 4개 병렬 실행</tspan></text>
  <text x="76" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">-I {}   <tspan fill="#9aa4b8"># 위치 지정 (-exec {} 처럼)</tspan></text>
  <text x="76" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">-0      <tspan fill="#9aa4b8"># 널 바이트 구분 (공백 안전)</tspan></text>
  <text x="76" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">-t      <tspan fill="#9aa4b8"># 실행 전 명령 출력</tspan></text>
  <text x="76" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">-r      <tspan fill="#9aa4b8"># 입력 없으면 실행 안 함</tspan></text>

  <!-- Practical examples with xargs -->
  <text x="480" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">실전 조합 예시</text>
  <rect x="460" y="226" width="360" height="132" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 공백 있는 파일명 안전 처리</text>
  <text x="476" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">find . -print0 | xargs -0 rm</text>
  <text x="476" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 4 코어로 병렬 gzip</text>
  <text x="476" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">find . -name <tspan fill="#ce9178">'*.log'</tspan> -print0 \</text>
  <text x="476" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  | xargs -0 -P 4 gzip</text>
  <text x="476" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># {} 위치 지정</text>
</svg>
