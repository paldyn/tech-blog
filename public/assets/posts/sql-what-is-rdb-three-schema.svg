<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">ANSI/SPARC 3단계 아키텍처</text>
  <text x="440" y="72" text-anchor="middle" font-size="14" fill="#888">데이터 독립성을 보장하는 DBMS의 내부 구조</text>

  <!-- Level 1: External -->
  <rect x="60" y="100" width="760" height="80" fill="#0d1a2a" rx="8" stroke="#1e3a5a" stroke-width="1.5"/>
  <text x="160" y="136" text-anchor="middle" font-size="15" font-weight="600" fill="#7ec8e3">외부 단계 (External)</text>
  <text x="160" y="158" text-anchor="middle" font-size="12" fill="#888">사용자 뷰 · 애플리케이션 뷰</text>
  <!-- App boxes -->
  <rect x="300" y="112" width="100" height="52" fill="#102030" rx="5" stroke="#1e3a5a"/>
  <text x="350" y="136" text-anchor="middle" font-size="12" fill="#7ec8e3">앱 A</text>
  <text x="350" y="154" text-anchor="middle" font-size="11" fill="#888">주문 뷰</text>
  <rect x="420" y="112" width="100" height="52" fill="#102030" rx="5" stroke="#1e3a5a"/>
  <text x="470" y="136" text-anchor="middle" font-size="12" fill="#7ec8e3">앱 B</text>
  <text x="470" y="154" text-anchor="middle" font-size="11" fill="#888">고객 뷰</text>
  <rect x="540" y="112" width="100" height="52" fill="#102030" rx="5" stroke="#1e3a5a"/>
  <text x="590" y="136" text-anchor="middle" font-size="12" fill="#7ec8e3">앱 C</text>
  <text x="590" y="154" text-anchor="middle" font-size="11" fill="#888">재고 뷰</text>
  <rect x="660" y="112" width="140" height="52" fill="#102030" rx="5" stroke="#1e3a5a"/>
  <text x="730" y="136" text-anchor="middle" font-size="11" fill="#888">논리적 독립성</text>
  <text x="730" y="154" text-anchor="middle" font-size="11" fill="#55c555">↕ 보장</text>

  <!-- Arrow down 1 -->
  <line x1="440" y1="180" x2="440" y2="210" stroke="#444" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Level 2: Conceptual -->
  <rect x="60" y="210" width="760" height="80" fill="#0d2010" rx="8" stroke="#1e5a1e" stroke-width="1.5"/>
  <text x="160" y="246" text-anchor="middle" font-size="15" font-weight="600" fill="#55c555">개념 단계 (Conceptual)</text>
  <text x="160" y="268" text-anchor="middle" font-size="12" fill="#888">전체 DB 논리 구조 (스키마)</text>
  <rect x="300" y="222" width="460" height="52" fill="#0a1a0a" rx="5" stroke="#1e5a1e"/>
  <text x="530" y="244" text-anchor="middle" font-size="12" fill="#e8e8e8">테이블 · 관계 · 제약 조건 · 도메인</text>
  <text x="530" y="262" text-anchor="middle" font-size="12" fill="#55c555">orders, customers, products …</text>

  <!-- Arrow down 2 -->
  <line x1="440" y1="290" x2="440" y2="320" stroke="#444" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Level 3: Internal -->
  <rect x="60" y="320" width="760" height="80" fill="#1a1000" rx="8" stroke="#5a3a00" stroke-width="1.5"/>
  <text x="160" y="356" text-anchor="middle" font-size="15" font-weight="600" fill="#e8c060">내부 단계 (Internal)</text>
  <text x="160" y="378" text-anchor="middle" font-size="12" fill="#888">물리 저장 구조</text>
  <rect x="300" y="332" width="460" height="52" fill="#100e00" rx="5" stroke="#5a3a00"/>
  <text x="530" y="354" text-anchor="middle" font-size="12" fill="#e8e8e8">페이지 레이아웃 · 인덱스 · 파티션</text>
  <text x="530" y="372" text-anchor="middle" font-size="12" fill="#e8c060">B-Tree, Heap, WAL 파일 …</text>

  <!-- Physical independence label -->
  <rect x="660" y="332" width="140" height="52" fill="#100e00" rx="5" stroke="#5a3a00"/>
  <text x="730" y="354" text-anchor="middle" font-size="11" fill="#888">물리적 독립성</text>
  <text x="730" y="372" text-anchor="middle" font-size="11" fill="#55c555">↕ 보장</text>

  <!-- Arrow down 3 -->
  <line x1="440" y1="400" x2="440" y2="430" stroke="#444" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Storage -->
  <rect x="300" y="430" width="280" height="48" fill="#111" rx="6" stroke="#333"/>
  <text x="440" y="452" text-anchor="middle" font-size="13" fill="#888">디스크 · SSD · NVM</text>
  <text x="440" y="468" text-anchor="middle" font-size="12" fill="#555">물리 저장 매체</text>

  <!-- Footer -->
  <text x="440" y="505" text-anchor="middle" font-size="11" fill="#444">PALDYN · SQL 완전 정복 Chapter 1</text>
</svg>
