<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">multiprocessing 기본 예제</text>

  <rect x="60" y="62" width="760" height="310" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text xml:space="preserve" x="84" y="88" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">from</text>
  <text xml:space="preserve" x="120" y="88" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> multiprocessing </text>
  <text xml:space="preserve" x="268" y="88" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">import</text>
  <text xml:space="preserve" x="318" y="88" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> Process, Queue</text>

  <text xml:space="preserve" x="84" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">def</text>
  <text xml:space="preserve" x="112" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> compute(n, q):</text>
  <text xml:space="preserve" x="84" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    &#35; CPU 집약 계산</text>
  <text xml:space="preserve" x="84" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    result = sum(i * i </text>
  <text xml:space="preserve" x="274" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">for</text>
  <text xml:space="preserve" x="302" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> i </text>
  <text xml:space="preserve" x="320" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">in</text>
  <text xml:space="preserve" x="340" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> range(n))</text>
  <text xml:space="preserve" x="84" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    q.put(result)</text>

  <text xml:space="preserve" x="84" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">if</text>
  <text xml:space="preserve" x="104" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> __name__ == </text>
  <text xml:space="preserve" x="220" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"__main__"</text>
  <text xml:space="preserve" x="310" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">:</text>
  <text xml:space="preserve" x="84" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    q = Queue()</text>
  <text xml:space="preserve" x="84" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    p = Process(target=compute, args=(</text>
  <text xml:space="preserve" x="402" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">10_000_000</text>
  <text xml:space="preserve" x="488" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">, q))</text>
  <text xml:space="preserve" x="84" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    p.start()</text>
  <text xml:space="preserve" x="84" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    result = q.get()  </text>
  <text xml:space="preserve" x="294" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">&#35; 자식 프로세스 결과 수신</text>
  <text xml:space="preserve" x="84" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    p.join()</text>
  <text xml:space="preserve" x="84" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    &#35; if __name__ == "__main__" 필수</text>
  <text xml:space="preserve" x="84" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    &#35; 없으면 Windows 에서 재귀적 프로세스 생성</text>
  <text xml:space="preserve" x="84" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    print(result)</text>
</svg>
