<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arrcs" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">델타 스토어 — 쓰기 가능한 컬럼스토어 인덱스</text>

  <!-- INSERT flow -->
  <rect x="60" y="80" width="140" height="60" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">INSERT</text>
  <text x="130" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">새 데이터</text>

  <!-- Arrow to Delta Store -->
  <line x1="200" y1="110" x2="280" y2="110" stroke="#7ec8e3" stroke-width="2"
        marker-end="url(#arrcs)"/>

  <!-- Delta Store -->
  <rect x="280" y="68" width="200" height="84" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="380" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">델타 스토어</text>
  <text x="380" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">(행 저장 형식)</text>
  <text x="380" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">열린 행 그룹</text>

  <!-- Tuple Mover arrow -->
  <line x1="480" y1="110" x2="560" y2="110" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4"
        marker-end="url(#arrcs)"/>
  <text x="520" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">Tuple Mover</text>
  <text x="520" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="middle">(~100만행 시)</text>

  <!-- Compressed Row Group -->
  <rect x="560" y="68" width="260" height="84" rx="8" fill="#0f1a0f" stroke="#2a4a2a" stroke-width="2"/>
  <text x="690" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">압축된 행 그룹</text>
  <text x="690" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">(열 저장 + 압축)</text>
  <text x="690" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">닫힌 행 그룹</text>

  <!-- Delete bitmap -->
  <rect x="60" y="200" width="140" height="60" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="130" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">DELETE</text>
  <text x="130" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">삭제 요청</text>

  <line x1="200" y1="230" x2="280" y2="230" stroke="#e05555" stroke-width="2"
        marker-end="url(#arrcs)"/>

  <!-- Delete bitmap box -->
  <rect x="280" y="188" width="200" height="84" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="380" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">삭제 비트맵</text>
  <text x="380" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">(Delete Bitmap)</text>
  <text x="380" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">물리 삭제 아님</text>

  <!-- Info boxes -->
  <rect x="60" y="300" width="360" height="84" rx="8" fill="#111120" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">컬럼스토어 인덱스 종류</text>
  <text x="240" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">CLUSTERED: 테이블 자체가 열 저장</text>
  <text x="240" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">NONCLUSTERED: 행 저장 + 열 저장 공존</text>
  <text x="240" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">NONCLUSTERED → OLTP 테이블 분석 쿼리 가속</text>

  <rect x="460" y="300" width="360" height="84" rx="8" fill="#111120" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">성능 효과</text>
  <text x="640" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">집계 쿼리: 10~100배 속도 향상</text>
  <text x="640" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">압축: 행 저장 대비 5~10배</text>
  <text x="640" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">배치 모드: CPU 벡터 연산 활용</text>
</svg>
