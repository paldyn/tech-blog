<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">GPT 패밀리 진화 타임라인</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">GPT-1 (2018) → GPT-4o (2024)</text>

  <!-- Timeline axis -->
  <line x1="80" y1="200" x2="800" y2="200" stroke="#333" stroke-width="2"/>

  <!-- GPT-1 -->
  <circle cx="100" cy="200" r="10" fill="#7ec8e3"/>
  <rect x="60" y="220" width="90" height="50" rx="6" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="105" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">GPT-1</text>
  <text x="105" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">2018</text>
  <text x="105" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">117M</text>
  <!-- label above -->
  <text x="105" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Transformer</text>
  <text x="105" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Decoder-only</text>

  <!-- GPT-2 -->
  <circle cx="230" cy="200" r="12" fill="#7ec8e3"/>
  <rect x="185" y="220" width="95" height="50" rx="6" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="232" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">GPT-2</text>
  <text x="232" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">2019</text>
  <text x="232" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">1.5B</text>
  <text x="232" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">공개 거부</text>
  <text x="232" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ 공개</text>

  <!-- GPT-3 -->
  <circle cx="380" cy="200" r="16" fill="#55c555"/>
  <rect x="328" y="220" width="108" height="50" rx="6" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="382" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">GPT-3</text>
  <text x="382" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">2020</text>
  <text x="382" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">175B</text>
  <text x="382" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Few-shot</text>
  <text x="382" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Learning</text>

  <!-- GPT-3.5 / ChatGPT -->
  <circle cx="530" cy="200" r="18" fill="#e05555"/>
  <rect x="472" y="220" width="118" height="50" rx="6" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="531" y="237" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e05555">GPT-3.5</text>
  <text x="531" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">2022 ChatGPT</text>
  <text x="531" y="267" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">RLHF 적용</text>
  <text x="531" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">1억 유저</text>
  <text x="531" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">2개월 달성</text>

  <!-- GPT-4 / GPT-4o -->
  <circle cx="720" cy="200" r="22" fill="#7777cc"/>
  <rect x="656" y="220" width="134" height="50" rx="6" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="723" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7777cc">GPT-4 / 4o</text>
  <text x="723" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">2023~2024</text>
  <text x="723" y="265" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">멀티모달</text>
  <text x="723" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">MoE 추정</text>
  <text x="723" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">비공개 파라미터</text>

  <!-- Connector arrows -->
  <line x1="110" y1="200" x2="218" y2="200" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="242" y1="200" x2="364" y2="200" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="396" y1="200" x2="512" y2="200" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="548" y1="200" x2="698" y2="200" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>

  <defs>
    <marker id="arr" markerWidth="20" markerHeight="14" refX="20" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 20 7, 0 14" fill="#555"/>
    </marker>
  </defs>

  <!-- Key insight box -->
  <rect x="60" y="320" width="760" height="116" rx="8" fill="#0d1117" stroke="#333" stroke-width="1"/>
  <text x="84" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8">핵심 진화 포인트</text>
  <text x="84" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• GPT-1→2: 비지도 사전학습 가능성 실증  •  GPT-2→3: 스케일링으로 Few-shot 창발</text>
  <text x="84" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• GPT-3→3.5: RLHF로 사용자 지향 정렬  •  GPT-3.5→4: 멀티모달 + 추론 대폭 향상</text>
  <text x="84" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">• 공통: Transformer Decoder-only 아키텍처, 자기회귀(Autoregressive) 생성 방식 유지</text>
</svg>
