<svg width="880" height="380" viewBox="0 0 880 380" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">외적의 크기 = 평행사변형 넓이</text>

  <!-- parallelogram -->
  <polygon points="150,300 320,300 400,170 230,170" fill="#7ec8e333" stroke="#7ec8e3" stroke-width="2"/>
  <circle cx="150" cy="300" r="5" fill="#55c555"/><text x="136" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">A</text>
  <circle cx="320" cy="300" r="5" fill="#e05555"/><text x="320" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">B</text>
  <circle cx="230" cy="170" r="5" fill="#7777cc"/><text x="206" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">C</text>
  <text x="250" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7ec8e3" font-weight="600">|u × v|</text>
  <text x="234" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">u</text>
  <text x="178" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">v</text>

  <!-- formula box -->
  <rect x="470" y="88" width="350" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="486" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8"># u = B−A, v = C−A</tspan></text>
  <text x="486" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">u × v = u.x·v.y − u.y·v.x</tspan></text>
  <text x="486" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">평행사변형 넓이 = |u × v|</tspan></text>
  <text x="486" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#55c555" font-weight="600">삼각형 넓이  = |u × v| / 2</tspan></text>

  <!-- determinant box -->
  <rect x="470" y="226" width="350" height="78" rx="6" fill="#000000" stroke="#7777cc" stroke-width="1.5"/>
  <text x="486" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">           | u.x  v.x |</tspan></text>
  <text x="486" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">u × v = det| u.y  v.y |</tspan></text>
  <text x="486" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8"># 2×2 행렬식과 동일</tspan></text>

  <text x="60" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">정수 좌표면 외적도 정수 — 넓이의 2배를 정수로 들고 다니면 오차 없이 비교·판정 가능</text>
</svg>
