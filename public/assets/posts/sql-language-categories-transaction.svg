<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">TCL: 트랜잭션 흐름</text>

  <!-- BEGIN -->
  <rect x="60" y="80" width="140" height="44" rx="6" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">BEGIN</text>

  <line x1="200" y1="102" x2="260" y2="102" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- DML operations -->
  <rect x="260" y="70" width="220" height="130" rx="6" fill="#0d1f14" stroke="#55c555" stroke-width="1.5"/>
  <text x="370" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">DML 작업들</text>
  <text x="370" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">INSERT INTO orders ...</text>
  <text x="370" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">UPDATE inventory ...</text>
  <text x="370" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff" text-anchor="middle">DELETE FROM cart ...</text>
  <text x="370" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">아직 반영 안 됨 (임시 상태)</text>

  <!-- SAVEPOINT -->
  <rect x="260" y="220" width="220" height="44" rx="6" fill="#0d1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="370" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">SAVEPOINT sp1 (선택)</text>

  <!-- Arrow: DML -> COMMIT or ROLLBACK -->
  <line x1="480" y1="102" x2="560" y2="102" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="520" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">성공</text>

  <line x1="480" y1="160" x2="560" y2="230" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrr)"/>
  <text x="530" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">오류</text>

  <!-- COMMIT -->
  <rect x="560" y="70" width="140" height="60" rx="6" fill="#0d1f14" stroke="#55c555" stroke-width="1.5"/>
  <text x="630" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">COMMIT</text>
  <text x="630" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">영구 반영</text>

  <!-- ROLLBACK -->
  <rect x="560" y="200" width="140" height="60" rx="6" fill="#1a0e0e" stroke="#e05555" stroke-width="1.5"/>
  <text x="630" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">ROLLBACK</text>
  <text x="630" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">원복</text>

  <!-- Result boxes -->
  <rect x="740" y="70" width="100" height="60" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="790" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">DB 변경</text>
  <text x="790" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">영구 저장</text>

  <rect x="740" y="200" width="100" height="60" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="790" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">DB 변경</text>
  <text x="790" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">취소됨</text>

  <line x1="700" y1="100" x2="740" y2="100" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>
  <line x1="700" y1="230" x2="740" y2="230" stroke="#e05555" stroke-width="2" marker-end="url(#arrr)"/>

  <!-- DDL note -->
  <rect x="60" y="290" width="760" height="50" rx="6" fill="#131310" stroke="#4a4a1a" stroke-width="1"/>
  <text x="440" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">주의: DDL(CREATE/ALTER/DROP)은 대부분 DBMS에서 자동 COMMIT됩니다.</text>
  <text x="440" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">PostgreSQL은 예외적으로 DDL도 트랜잭션 내에서 ROLLBACK 가능합니다.</text>
</svg>
