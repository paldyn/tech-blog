<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">마나커 알고리즘 — 오른쪽 경계 C, R 활용</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">P[i]를 구할 때 C(현재 최대 팰린드롬 중심), R(오른쪽 경계) 재사용</text>

  <!-- Case 1: i in R -->
  <rect x="60" y="88" width="360" height="140" fill="#111" stroke="#3a4a6e" stroke-width="1" rx="8"/>
  <text x="240" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">케이스 1: i &lt; R (Z-box 안)</text>
  <text x="80" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">mirror = 2*C - i (C에 대한 i의 대칭점)</text>
  <text x="80" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">if R - i &gt; P[mirror]:</text>
  <text x="80" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">  P[i] = P[mirror]  (그대로 재사용)</text>
  <text x="80" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">else:</text>
  <text x="80" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">  P[i] = R - i  (경계까지만, 이후 확장)</text>

  <!-- Case 2: i >= R -->
  <rect x="460" y="88" width="360" height="140" fill="#111" stroke="#3a4a6e" stroke-width="1" rx="8"/>
  <text x="640" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">케이스 2: i &gt;= R (새 영역)</text>
  <text x="480" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">알려진 정보 없음</text>
  <text x="480" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">P[i] = 0 에서 시작</text>
  <text x="480" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">직접 확장 while 루프 실행</text>
  <text x="480" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">확장 성공 시 C, R 갱신</text>

  <!-- Main algorithm code -->
  <text x="60" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">마나커 핵심 루프</text>
  <rect x="60" y="262" width="760" height="120" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="76" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">C = R = 0</text>
  <text x="76" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">for</text>
  <text x="104" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"> i in range(n):</text>
  <text x="76" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">    mirror = 2*C - i</text>
  <text x="76" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">    if</text>
  <text x="104" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"> i &lt; R: P[i] = min(R-i, P[mirror])</text>
  <text x="76" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">    while</text>
  <text x="120" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"> T[i-P[i]-1] == T[i+P[i]+1]: P[i]+=1</text>
  <text x="76" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">    if</text>
  <text x="104" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"> i+P[i] &gt; R: C, R = i, i+P[i]</text>
</svg>
