<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <!-- 배경 -->
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Saga Orchestrator 구현 패턴</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">Spring State Machine 기반 Saga 오케스트레이터</text>

  <!-- Saga 상태 정의 (좌측) -->
  <rect x="60" y="96" width="370" height="185" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" xml:space="preserve">// Saga 상태와 이벤트 열거형</text>
  <text x="76" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">public enum</tspan><tspan fill="#ffffff"> OrderSagaState {</tspan></text>
  <text x="76" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    STARTED, PAYMENT_PENDING,</text>
  <text x="76" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    STOCK_PENDING, DELIVERY_PENDING,</text>
  <text x="76" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    COMPLETED, COMPENSATING, FAILED</text>
  <text x="76" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>
  <text x="76" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">public enum</tspan><tspan fill="#ffffff"> OrderSagaEvent {</tspan></text>
  <text x="76" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    PAYMENT_OK, PAYMENT_FAIL,</text>
  <text x="76" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    STOCK_OK, STOCK_FAIL,</text>
  <text x="76" y="283" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    DELIVERY_OK, COMPENSATE_DONE</text>
  <text x="76" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>

  <!-- Orchestrator 실행 코드 (우측) -->
  <rect x="450" y="96" width="370" height="185" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="466" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" xml:space="preserve">// Saga 시작 — 각 단계 순차 실행</text>
  <text x="466" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">@Service</tspan></text>
  <text x="466" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">public class</tspan><tspan fill="#ffffff"> OrderSagaOrchestrator {</tspan></text>
  <text x="466" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  <tspan font-weight="600" fill="#7ec8e3">public void</tspan><tspan fill="#ffffff"> startSaga(Long orderId) {</tspan></text>
  <text x="466" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    SagaState s = sagaRepo.create(orderId);</text>
  <text x="466" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    paymentClient.reserve(orderId);</text>
  <text x="466" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">    // 결과는 이벤트로 비동기 수신</text>
  <text x="466" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    s.transition(PAYMENT_PENDING);</text>
  <text x="466" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    sagaRepo.save(s);</text>
  <text x="466" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  }</text>

  <!-- 이벤트 핸들러 (좌측 하단) -->
  <rect x="60" y="300" width="370" height="185" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" xml:space="preserve">// 결제 완료 이벤트 수신</text>
  <text x="76" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">@KafkaListener</tspan><tspan fill="#ffffff">(topics = </tspan><tspan fill="#ce9178">"payment-result"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="76" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">public void</tspan><tspan fill="#ffffff"> onPaymentResult(PaymentResult r) {</tspan></text>
  <text x="76" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  SagaState s = sagaRepo.find(r.orderId());</text>
  <text x="76" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  <tspan font-weight="600" fill="#7ec8e3">if</tspan><tspan fill="#ffffff"> (r.success()) {</tspan></text>
  <text x="76" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    stockClient.reserve(r.orderId());</text>
  <text x="76" y="430" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    s.transition(STOCK_PENDING);</text>
  <text x="76" y="448" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  } <tspan font-weight="600" fill="#7ec8e3">else</tspan><tspan fill="#ffffff"> {</tspan></text>
  <text x="76" y="466" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    compensate(s); <tspan fill="#9aa4b8">// 보상 트랜잭션</tspan></text>
  <text x="76" y="484" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  }</text>

  <!-- 보상 트랜잭션 코드 (우측 하단) -->
  <rect x="450" y="300" width="370" height="185" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="466" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" xml:space="preserve">// 보상 트랜잭션 — 역순 실행</text>
  <text x="466" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">private void</tspan><tspan fill="#ffffff"> compensate(SagaState s) {</tspan></text>
  <text x="466" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  s.transition(COMPENSATING);</text>
  <text x="466" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  <tspan font-weight="600" fill="#7ec8e3">switch</tspan><tspan fill="#ffffff"> (s.getLastSuccess()) {</tspan></text>
  <text x="466" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    <tspan font-weight="600" fill="#7ec8e3">case</tspan><tspan fill="#ffffff"> DELIVERY_PENDING:</tspan></text>
  <text x="466" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">      deliveryClient.cancel(s.orderId());</text>
  <text x="466" y="430" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    <tspan font-weight="600" fill="#7ec8e3">case</tspan><tspan fill="#ffffff"> STOCK_PENDING:</tspan></text>
  <text x="466" y="448" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">      stockClient.release(s.orderId());</text>
  <text x="466" y="466" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    <tspan font-weight="600" fill="#7ec8e3">case</tspan><tspan fill="#ffffff"> PAYMENT_PENDING:</tspan></text>
  <text x="466" y="484" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">      paymentClient.refund(s.orderId());</text>
</svg>
