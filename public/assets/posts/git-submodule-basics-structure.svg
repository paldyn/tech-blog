<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">서브모듈 구조: 저장소 안의 저장소</text>

  <!-- Main Repo box -->
  <rect x="60" y="80" width="360" height="360" rx="10" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="240" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">메인 저장소 (main-project)</text>

  <!-- .gitmodules file -->
  <rect x="90" y="130" width="300" height="60" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="106" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># .gitmodules</text>
  <text x="106" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">[submodule "libs/util"]</text>

  <!-- Main repo files -->
  <rect x="90" y="210" width="300" height="100" rx="6" fill="#1a2035" stroke="#3a4a6e" stroke-width="1"/>
  <text x="106" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">📄 src/main.js</text>
  <text x="106" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">📄 README.md</text>
  <text x="106" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">📁 libs/util/  ← 서브모듈 포인터</text>

  <!-- Pointer box inside main repo -->
  <rect x="90" y="330" width="300" height="80" rx="6" fill="#1a2035" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" font-weight="600" text-anchor="middle">서브모듈 포인터</text>
  <text x="240" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" text-anchor="middle">commit: a3f9c82</text>
  <text x="240" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">특정 커밋을 가리킴</text>

  <!-- Arrow from main repo to submodule -->
  <line x1="460" y1="370" x2="498" y2="370" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="479" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">참조</text>

  <!-- Submodule Repo box -->
  <rect x="500" y="130" width="320" height="320" rx="10" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="660" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">서브모듈 저장소 (util)</text>

  <!-- Submodule commits -->
  <rect x="526" y="180" width="268" height="100" rx="6" fill="#1a2035" stroke="#3a4a6e" stroke-width="1"/>
  <text x="660" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">커밋 히스토리</text>
  <text x="542" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">● a3f9c82  ← HEAD</text>
  <text x="542" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">● 7d2e4f1</text>
  <text x="542" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">● 1c8b305</text>

  <!-- Submodule files -->
  <rect x="526" y="300" width="268" height="80" rx="6" fill="#1a2035" stroke="#3a4a6e" stroke-width="1"/>
  <text x="542" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">📄 index.js</text>
  <text x="542" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">📄 utils.js</text>
  <text x="542" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">📁 (독립 Git 저장소)</text>

  <!-- Key insight box -->
  <rect x="60" y="458" width="760" height="42" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="480" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" text-anchor="middle" font-weight="600">핵심: 메인 저장소는 서브모듈의 "특정 커밋"만 추적한다 — 브랜치나 파일이 아님</text>
</svg>
