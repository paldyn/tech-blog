<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arr" markerWidth="14" markerHeight="14" refX="10.5" refY="5.25" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,10.5 L14,5.25 z" fill="#555"/>
    </marker>
    <marker id="arr-g" markerWidth="14" markerHeight="14" refX="10.5" refY="5.25" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,10.5 L14,5.25 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">감성 분석 3가지 접근법 비교</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">규칙/사전 기반 · ML 기반 · 딥러닝(BERT) 기반 파이프라인 및 성능 비교</text>

  <!-- ===== COLUMN HEADERS ===== -->
  <!-- Col 1: Rule/Lexicon -->
  <rect x="60" y="88" width="228" height="32" fill="#1a1a1a" rx="6" stroke="#555" stroke-width="1.5"/>
  <text x="174" y="109" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">① 규칙/사전 기반</text>

  <!-- Col 2: ML -->
  <rect x="308" y="88" width="228" height="32" fill="#0d1a2e" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="422" y="109" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">② ML 기반</text>

  <!-- Col 3: BERT -->
  <rect x="556" y="88" width="264" height="32" fill="#1a1a2e" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="688" y="109" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">③ 딥러닝(BERT) 기반</text>

  <!-- ===== COLUMN 1: Rule/Lexicon ===== -->
  <!-- Step 1: Input -->
  <rect x="76" y="136" width="196" height="36" fill="#111827" rx="6" stroke="#333" stroke-width="1"/>
  <text x="174" y="159" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">텍스트 입력</text>

  <!-- Arrow -->
  <line x1="174" y1="172" x2="174" y2="188" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2: Word lookup -->
  <rect x="76" y="192" width="196" height="48" fill="#111827" rx="6" stroke="#333" stroke-width="1"/>
  <text x="174" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">감성 사전 조회</text>
  <text x="174" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">VADER / KNU 감성사전</text>

  <!-- Arrow -->
  <line x1="174" y1="240" x2="174" y2="256" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3: Count -->
  <rect x="76" y="260" width="196" height="48" fill="#111827" rx="6" stroke="#333" stroke-width="1"/>
  <text x="174" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">긍/부정 점수 집계</text>
  <text x="174" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">pos_count - neg_count</text>

  <!-- Arrow -->
  <line x1="174" y1="308" x2="174" y2="324" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 4: Label -->
  <rect x="76" y="328" width="196" height="36" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="174" y="351" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">긍정 / 부정 레이블</text>

  <!-- Pros/Cons -->
  <rect x="76" y="378" width="196" height="60" fill="#111118" rx="4" stroke="#3a4a6e"/>
  <text x="88" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">장점: 빠름, 설명 가능</text>
  <text x="88" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">단점: 문맥 인식 불가</text>
  <text x="88" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">부정어·풍자 처리 취약</text>

  <!-- ===== COLUMN 2: ML ===== -->
  <!-- Step 1: Input -->
  <rect x="324" y="136" width="196" height="36" fill="#0d1a2e" rx="6" stroke="#1e2a3a" stroke-width="1"/>
  <text x="422" y="159" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">텍스트 입력</text>

  <!-- Arrow -->
  <line x1="422" y1="172" x2="422" y2="188" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2: TF-IDF -->
  <rect x="324" y="192" width="196" height="48" fill="#0d1a2e" rx="6" stroke="#1e2a3a" stroke-width="1"/>
  <text x="422" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">TF-IDF 피처 추출</text>
  <text x="422" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">N-gram, BoW 벡터화</text>

  <!-- Arrow -->
  <line x1="422" y1="240" x2="422" y2="256" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3: Classifier -->
  <rect x="324" y="260" width="196" height="48" fill="#0d1a2e" rx="6" stroke="#1e2a3a" stroke-width="1"/>
  <text x="422" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">분류기 (Classifier)</text>
  <text x="422" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">SVM / 나이브 베이즈 / LR</text>

  <!-- Arrow -->
  <line x1="422" y1="308" x2="422" y2="324" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 4: Label -->
  <rect x="324" y="328" width="196" height="36" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="422" y="351" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">긍정 / 부정 레이블</text>

  <!-- Pros/Cons -->
  <rect x="324" y="378" width="196" height="60" fill="#111118" rx="4" stroke="#3a4a6e"/>
  <text x="336" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">장점: 빠름, 해석 가능</text>
  <text x="336" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">단점: 피처 엔지니어링 필요</text>
  <text x="336" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">도메인 의존성 높음</text>

  <!-- ===== COLUMN 3: BERT ===== -->
  <!-- Step 1: Input -->
  <rect x="572" y="136" width="232" height="36" fill="#1a1a2e" rx="6" stroke="#2e2e4e" stroke-width="1"/>
  <text x="688" y="159" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">텍스트 입력</text>

  <!-- Arrow -->
  <line x1="688" y1="172" x2="688" y2="188" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2: Tokenize -->
  <rect x="572" y="192" width="232" height="48" fill="#1a1a2e" rx="6" stroke="#2e2e4e" stroke-width="1"/>
  <text x="688" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">WordPiece 토크나이저</text>
  <text x="688" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">[CLS] + 토큰 ID 시퀀스</text>

  <!-- Arrow -->
  <line x1="688" y1="240" x2="688" y2="256" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3: BERT -->
  <rect x="572" y="260" width="232" height="48" fill="#0d0d2e" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="688" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">BERT Encoder</text>
  <text x="688" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">[CLS] 표현 → 분류 레이어</text>

  <!-- Arrow -->
  <line x1="688" y1="308" x2="688" y2="324" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 4: Label + confidence -->
  <rect x="572" y="328" width="232" height="36" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="688" y="351" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">긍정 0.97 / 부정 0.03</text>

  <!-- Pros/Cons -->
  <rect x="572" y="378" width="232" height="60" fill="#111118" rx="4" stroke="#3a4a6e"/>
  <text x="584" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">장점: 최고 성능, 문맥 이해</text>
  <text x="584" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">부정어·풍자도 어느정도 처리</text>
  <text x="584" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">단점: 학습 데이터·GPU 필요</text>

  <!-- ===== EXAMPLE RESULT ===== -->
  <rect x="60" y="456" width="756" height="60" fill="#0d1117" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="88" y="476" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">예시 분석: "이 영화 정말 최고!" → </text>
  <text x="330" y="476" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">긍정 0.97</text>
  <text x="88" y="500" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">규칙 기반: 최고(+2), 정말(+1) → 점수 +3 → 긍정  |  BERT: [CLS] 표현으로 0.97 확률 → 긍정  |  감성 분석 정확도: 규칙 ~75%, ML ~85%, BERT ~92%</text>
</svg>
