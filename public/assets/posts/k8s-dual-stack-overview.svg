<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">쿠버네티스 듀얼스택 네트워킹</text>

  <!-- IPv4 column label -->
  <text x="230" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">IPv4 스택</text>

  <!-- IPv6 column label -->
  <text x="650" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">IPv6 스택</text>

  <!-- Center divider -->
  <line x1="440" y1="62" x2="440" y2="420" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="440" y="58" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#444" text-anchor="middle">Dual Stack</text>

  <!-- Pod with dual IPs -->
  <rect x="270" y="90" width="300" height="90" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="420" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Pod</text>
  <text x="420" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">10.244.0.5  (IPv4)</text>
  <text x="420" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178" text-anchor="middle">fd00::5  (IPv6)</text>
  <text x="420" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">파드는 두 주소 모두 보유</text>

  <!-- IPv4 path -->
  <line x1="270" y1="140" x2="140" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <rect x="50" y="116" width="90" height="48" rx="6" fill="#111827" stroke="#3a5a7a" stroke-width="1"/>
  <text x="95" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">IPv4</text>
  <text x="95" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">10.244.0.0/16</text>

  <!-- IPv6 path -->
  <line x1="570" y1="140" x2="700" y2="140" stroke="#ce9178" stroke-width="2" marker-end="url(#arr-orange)"/>
  <rect x="700" y="116" width="130" height="48" rx="6" fill="#1a1208" stroke="#5a3a1a" stroke-width="1"/>
  <text x="765" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ce9178" text-anchor="middle">IPv6</text>
  <text x="765" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">fd00::/48</text>

  <!-- Service with dual ClusterIPs -->
  <rect x="270" y="230" width="300" height="90" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="420" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Service (ClusterIP)</text>
  <text x="420" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">10.96.0.1  (IPv4 ClusterIP)</text>
  <text x="420" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178" text-anchor="middle">fd00:10:96::1  (IPv6 ClusterIP)</text>
  <text x="420" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">ipFamilyPolicy: PreferDualStack</text>

  <!-- Arrow from Pod to Service -->
  <line x1="420" y1="180" x2="420" y2="228" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-blue)"/>

  <!-- Config example -->
  <rect x="50" y="358" width="780" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="66" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">kubectl get node -o jsonpath=</text>
  <text x="66" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">  '{.items[0].spec.podCIDRs}'</text>
  <text x="66" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># → ["10.244.0.0/24","fd00:10:244::/64"]</text>
  <text x="66" y="418" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888"># 노드당 IPv4 + IPv6 CIDR 블록 할당</text>
</svg>
