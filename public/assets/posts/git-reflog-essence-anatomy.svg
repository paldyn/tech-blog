<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">reflog 출력 구조 분석</text>

  <!-- reflog output -->
  <rect x="60" y="70" width="760" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="96" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">abc1234</tspan> HEAD@<tspan fill="#b5cea8">{0}</tspan>: <tspan fill="#55c555">commit</tspan>: feat: 로그인 구현</text>
  <text x="76" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">def5678</tspan> HEAD@<tspan fill="#b5cea8">{1}</tspan>: <tspan fill="#ce9178">reset</tspan>: moving to HEAD~1</text>
  <text x="76" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">zzz9999</tspan> HEAD@<tspan fill="#b5cea8">{2}</tspan>: <tspan fill="#e05555">commit (amend)</tspan>: refactor: 정리</text>
  <text x="76" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">ghi9012</tspan> HEAD@<tspan fill="#b5cea8">{3}</tspan>: <tspan fill="#7777cc">checkout</tspan>: main → feature/auth</text>

  <!-- Annotation: SHA -->
  <rect x="60" y="214" width="180" height="50" rx="6" fill="#0d1224" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">커밋 SHA</text>
  <text x="150" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">해당 시점의 커밋</text>
  <line x1="150" y1="210" x2="110" y2="158" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Annotation: HEAD@{N} -->
  <rect x="280" y="214" width="200" height="50" rx="6" fill="#0d1224" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="380" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#b5cea8">HEAD@{N}</text>
  <text x="380" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">N번 전 HEAD 위치</text>
  <line x1="380" y1="210" x2="280" y2="158" stroke="#b5cea8" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Annotation: action -->
  <rect x="520" y="214" width="200" height="50" rx="6" fill="#0d1224" stroke="#55c555" stroke-width="1.5"/>
  <text x="620" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">동작 유형</text>
  <text x="620" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">commit / reset / checkout 등</text>
  <line x1="620" y1="210" x2="560" y2="158" stroke="#55c555" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Storage info -->
  <rect x="60" y="294" width="760" height="50" rx="6" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
  <text x="440" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">저장 위치: .git/logs/HEAD  (브랜치별: .git/logs/refs/heads/브랜치명)</text>
  <text x="440" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">보존 기간: gc.reflogExpire (기본 90일)  /  gc.reflogExpireUnreachable (기본 30일)</text>
</svg>
