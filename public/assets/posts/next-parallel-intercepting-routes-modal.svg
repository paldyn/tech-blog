<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-right" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-right-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">인터셉팅 라우트 — 모달 패턴</text>

  <!-- Scenario 1: Client navigation (intercepted) -->
  <rect x="50" y="68" width="370" height="380" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="235" y="94" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">클라이언트 내비게이션 (인터셉트됨)</text>
  <text x="235" y="112" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Link 클릭 → 현재 페이지 유지 + 모달</text>

  <!-- Gallery page mockup -->
  <rect x="70" y="124" width="310" height="140" rx="6" fill="#0d1520" stroke="#1e2a3e" stroke-width="1"/>
  <text x="225" y="144" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">/photos (갤러리)</text>
  <!-- Photo grid -->
  <rect x="84" y="154" width="80" height="56" rx="4" fill="#1a2a3a"/>
  <rect x="172" y="154" width="80" height="56" rx="4" fill="#1a2a3a"/>
  <rect x="260" y="154" width="80" height="56" rx="4" fill="#3a5a7e"/>
  <text x="300" y="187" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3">클릭!</text>
  <!-- Modal overlay -->
  <rect x="84" y="120" width="296" height="138" rx="4" fill="#0a0a0a" opacity="0.7"/>
  <rect x="140" y="138" width="184" height="108" rx="6" fill="#1e2a3e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="232" y="162" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">사진 상세 모달</text>
  <text x="232" y="180" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">URL: /photos/42</text>
  <text x="232" y="198" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">배경: 갤러리 유지</text>
  <text x="232" y="218" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#9aa4b8">뒤로 가기: 모달 닫힘</text>

  <rect x="70" y="278" width="310" height="158" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="86" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">// 파일 구조</text>
  <text x="86" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">app/photos/</text>
  <text x="86" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">├── page.tsx   (갤러리)</text>
  <text x="86" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7777cc" xml:space="preserve">├── @modal/</text>
  <text x="86" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" xml:space="preserve">│   └── (.)photos/[id]/</text>
  <text x="86" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">│       └── page.tsx</text>
  <text x="86" y="406" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">└── [id]/</text>
  <text x="86" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">    └── page.tsx (전체화면)</text>

  <!-- Scenario 2: Direct URL (full page) -->
  <rect x="460" y="68" width="370" height="380" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="645" y="94" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">직접 URL 접근 (전체 화면)</text>
  <text x="645" y="112" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">새 탭 열기 / URL 직접 입력 / 새로고침</text>

  <!-- Full page mockup -->
  <rect x="480" y="124" width="310" height="140" rx="6" fill="#0d1520" stroke="#1e2a3e" stroke-width="1"/>
  <text x="635" y="144" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">/photos/42 (전체 화면)</text>
  <rect x="496" y="158" width="278" height="94" rx="4" fill="#1a3a1a" stroke="#2a5a2a" stroke-width="1"/>
  <text x="635" y="196" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">사진 상세 전체 페이지</text>
  <text x="635" y="214" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">photos/[id]/page.tsx 렌더링</text>
  <text x="635" y="232" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">갤러리 배경 없음</text>

  <rect x="480" y="278" width="310" height="158" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">// 인터셉트 접두사 의미</text>
  <text x="496" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" xml:space="preserve">(.)   </text>
  <text x="548" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">같은 레벨</text>
  <text x="496" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" xml:space="preserve">(..)  </text>
  <text x="556" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">한 레벨 위</text>
  <text x="496" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" xml:space="preserve">(..)(..) </text>
  <text x="568" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">두 레벨 위</text>
  <text x="496" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" xml:space="preserve">(...) </text>
  <text x="548" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">루트 app/ 레벨</text>
  <text x="496" y="406" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">// 클라이언트 이동 시 인터셉트</text>
  <text x="496" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">// 직접 접근 시 원래 라우트 사용</text>
</svg>
