<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 560" style="background:#0a0a0a" rx="12">
  <rect width="880" height="560" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">QLoRA 세 가지 핵심 기술</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">Dettmers et al. (2023) — 세 기술의 결합으로 소비자 GPU에서 LLM 파인튜닝을 가능케 한다</text>

  <!-- === Box 1: NF4 Quantization === -->
  <rect x="60" y="90" width="232" height="230" rx="10" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <rect x="60" y="90" width="232" height="36" rx="10" fill="#132233"/>
  <rect x="60" y="116" width="232" height="10" fill="#132233"/>
  <text x="176" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">① NF4 양자화</text>

  <text x="176" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Normal Float 4-bit</text>

  <!-- NF4 visualization: bit range -->
  <rect x="80" y="158" width="192" height="32" rx="6" fill="#0d1a2e"/>
  <text x="176" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">fp16 16비트 → NF4 4비트</text>
  <text x="176" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">가중치가 정규분포를 따른다는</text>
  <text x="176" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">수학적 가정 위에 설계된</text>
  <text x="176" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">정보 이론적 최적 코드북</text>

  <!-- Memory saving badge -->
  <rect x="88" y="252" width="176" height="28" rx="6" fill="#0d2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="176" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">메모리 75% 절약</text>
  <text x="176" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">fp16 대비 (16bit→4bit)</text>

  <!-- === Box 2: Double Quantization === -->
  <rect x="324" y="90" width="232" height="230" rx="10" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <rect x="324" y="90" width="232" height="36" rx="10" fill="#1a1a33"/>
  <rect x="324" y="116" width="232" height="10" fill="#1a1a33"/>
  <text x="440" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">② 이중 양자화</text>

  <text x="440" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Double Quantization</text>

  <!-- DQ flow -->
  <rect x="344" y="158" width="192" height="24" rx="4" fill="#1a1a44"/>
  <text x="440" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">양자화 상수 (fp32, 64블록당)</text>
  <text x="440" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#888" text-anchor="middle">↓</text>
  <rect x="344" y="210" width="192" height="24" rx="4" fill="#1a1a44"/>
  <text x="440" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">상수를 다시 8비트로 양자화</text>

  <text x="440" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">fp32(32bit) → int8(8bit)</text>
  <text x="440" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">2단계 압축으로 상수 오버헤드 제거</text>

  <!-- Memory saving badge -->
  <rect x="352" y="283" width="176" height="28" rx="6" fill="#0d0d2a" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">0.37 bits/param 추가 절약</text>

  <!-- === Box 3: Paged Optimizer === -->
  <rect x="588" y="90" width="232" height="230" rx="10" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <rect x="588" y="90" width="232" height="36" rx="10" fill="#0d2a1a"/>
  <rect x="588" y="116" width="232" height="10" fill="#0d2a1a"/>
  <text x="704" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">③ 페이지드 옵티마이저</text>

  <text x="704" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Paged Optimizer</text>

  <!-- GPU → CPU swap diagram -->
  <rect x="608" y="158" width="86" height="32" rx="4" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="651" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">GPU VRAM</text>
  <text x="704" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555" text-anchor="middle">⇄</text>
  <rect x="726" y="158" width="86" height="32" rx="4" fill="#0d2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="769" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">CPU RAM</text>

  <text x="704" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">OOM 발생 시 옵티마이저</text>
  <text x="704" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">상태를 CPU로 페이지 스왑</text>
  <text x="704" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">학습 안정성 대폭 향상</text>
  <text x="704" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">NVIDIA 통합 메모리 기술 활용</text>

  <!-- Memory saving badge -->
  <rect x="616" y="283" width="176" height="28" rx="6" fill="#0d2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="704" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">OOM 에러 방지</text>

  <!-- Code block: BitsAndBytesConfig -->
  <rect x="60" y="338" width="760" height="198" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
  <text x="84" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># BitsAndBytesConfig - QLoRA의 핵심 설정</text>
  <text x="84" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">from <tspan fill="#e8e8e8">transformers </tspan><tspan fill="#7ec8e3">import</tspan><tspan fill="#e8e8e8"> BitsAndBytesConfig</tspan></text>
  <text x="84" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> </text>
  <text x="84" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"><tspan fill="#e8e8e8">bnb_config = </tspan><tspan fill="#7ec8e3">BitsAndBytesConfig</tspan><tspan fill="#e8e8e8">(</tspan></text>
  <text x="84" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    <tspan fill="#e8e8e8">load_in_4bit</tspan><tspan fill="#888">=</tspan><tspan fill="#7ec8e3">True</tspan><tspan fill="#888">,          </tspan><tspan fill="#6a8aa0"># 4비트 로드 활성화</tspan></text>
  <text x="84" y="450" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    <tspan fill="#e8e8e8">bnb_4bit_quant_type</tspan><tspan fill="#888">=</tspan><tspan fill="#ce9178">"nf4"</tspan><tspan fill="#888">,    </tspan><tspan fill="#6a8aa0"># NF4 코드북 사용</tspan></text>
  <text x="84" y="468" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    <tspan fill="#e8e8e8">bnb_4bit_use_double_quant</tspan><tspan fill="#888">=</tspan><tspan fill="#7ec8e3">True</tspan><tspan fill="#888">, </tspan><tspan fill="#6a8aa0"># 이중 양자화 활성화</tspan></text>
  <text x="84" y="486" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    <tspan fill="#e8e8e8">bnb_4bit_compute_dtype</tspan><tspan fill="#888">=</tspan><tspan fill="#e8e8e8">torch.bfloat16 </tspan><tspan fill="#6a8aa0"># 연산은 bf16으로</tspan></text>
  <text x="84" y="504" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"><tspan fill="#e8e8e8">)</tspan>  <tspan fill="#6a8aa0"># 페이지드 옵티마이저: optim="paged_adamw_8bit"</tspan></text>
  <text x="84" y="525" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># → 세 기법 결합으로 70B 모델도 48GB VRAM에서 파인튜닝 가능</text>
</svg>
