<svg xmlns="http://www.w3.org/2000/svg" width="880" height="470" viewBox="0 0 880 470">
  <rect width="880" height="470" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">자주 쓰는 패턴 문자</text>

  <!-- Left column -->
  <rect x="60" y="78" width="84" height="28" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="102" y="97" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3">yyyy</text>
  <text x="160" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">연도 — 2026</text>

  <rect x="60" y="118" width="84" height="28" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="102" y="137" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3">MM</text>
  <text x="160" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">월 — 01~12 (두 자리)</text>

  <rect x="60" y="158" width="84" height="28" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="102" y="177" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3">dd</text>
  <text x="160" y="177" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">일 — 01~31</text>

  <rect x="60" y="198" width="84" height="28" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="102" y="217" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3">HH</text>
  <text x="160" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">시 — 00~23 (24시간제)</text>

  <rect x="60" y="238" width="84" height="28" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="102" y="257" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3">mm / ss</text>
  <text x="160" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">분 / 초 — 00~59</text>

  <!-- Right column -->
  <rect x="460" y="78" width="84" height="28" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="502" y="97" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3">E / EEEE</text>
  <text x="560" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">요일 — 금 / 금요일 (로케일)</text>

  <rect x="460" y="118" width="84" height="28" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="502" y="137" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3">a</text>
  <text x="560" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">오전/오후 (로케일)</text>

  <rect x="460" y="158" width="84" height="28" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="502" y="177" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3">hh</text>
  <text x="560" y="177" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">시 — 01~12 (a와 함께 사용)</text>

  <rect x="460" y="198" width="84" height="28" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="502" y="217" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3">VV</text>
  <text x="560" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">타임존 ID — Asia/Seoul</text>

  <rect x="460" y="238" width="84" height="28" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="502" y="257" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3">XXX</text>
  <text x="560" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">오프셋 — +09:00 (Z 표기 가능)</text>

  <!-- Warning box -->
  <rect x="60" y="302" width="760" height="128" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="330" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">대소문자가 다르면 전혀 다른 의미 — 단골 버그 3종</text>
  <text x="440" y="356" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">YYYY = week-based year — 연말·연초 주에 연도가 어긋난다. 연도는 반드시 yyyy (또는 uuuu)</text>
  <text x="440" y="380" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">hh = 12시간제 — a 없이 쓰면 14시가 02로 출력. 24시간제는 HH</text>
  <text x="440" y="404" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">DD = day-of-year(연중 일수) — 날짜의 일은 dd</text>
</svg>
