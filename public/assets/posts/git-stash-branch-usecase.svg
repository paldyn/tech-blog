<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrd" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">충돌 시 stash branch로 해결</text>

  <!-- Scenario: tried pop, got conflict -->
  <rect x="60" y="80" width="200" height="70" rx="8" fill="#1f0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="160" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">stash pop 충돌</text>
  <text x="160" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">현재 브랜치가 많이</text>
  <text x="160" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">변해서 충돌 다수</text>

  <!-- Arrow -->
  <line x1="260" y1="115" x2="320" y2="115" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="290" y="105" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">git checkout .</text>
  <text x="290" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">(충돌 취소)</text>

  <!-- Clean state -->
  <rect x="320" y="80" width="160" height="70" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="400" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">클린 상태</text>
  <text x="400" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">stash는 스택에</text>
  <text x="400" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">아직 남아 있음</text>

  <!-- Arrow -->
  <line x1="480" y1="115" x2="540" y2="115" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="510" y="105" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">stash branch</text>
  <text x="510" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">new-feature</text>

  <!-- New branch result -->
  <rect x="540" y="80" width="200" height="70" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">new-feature 브랜치</text>
  <text x="640" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">stash 저장 시점 기준</text>
  <text x="640" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">충돌 없이 적용 완료</text>

  <!-- Code block -->
  <rect x="60" y="186" width="760" height="148" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 시나리오: stash@{0}을 새 브랜치로 꺼내기</text>
  <text x="76" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">git stash <tspan fill="#7ec8e3" font-weight="600">branch</tspan> feature/auth-redesign</text>
  <text x="76" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># Switched to a new branch 'feature/auth-redesign'</text>
  <text x="76" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># On branch feature/auth-redesign</text>
  <text x="76" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># Dropped refs/stash@{0}</text>
  <text x="76" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 이후 일반 브랜치처럼 작업</text>
  <text x="76" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">git <tspan fill="#7ec8e3" font-weight="600">commit</tspan> -m <tspan fill="#ce9178">"feat: auth redesign"</tspan></text>
</svg>
