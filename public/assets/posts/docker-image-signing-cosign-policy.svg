<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="340" fill="#0a0a0a" rx="12"/>

  <text x="440" y="40" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" font-weight="700" fill="#e8e8e8">Policy Controller: 서명 없는 이미지 차단</text>

  <!-- Flow -->
  <rect x="40" y="64" width="140" height="52" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="110" y="88" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">kubectl apply</text>
  <text x="110" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Pod 생성 요청</text>

  <line x1="180" y1="90" x2="230" y2="90" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="230" y="64" width="180" height="52" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="320" y="88" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">Admission Webhook</text>
  <text x="320" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Policy Controller</text>

  <line x1="410" y1="90" x2="460" y2="90" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="460" y="64" width="160" height="52" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="540" y="88" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">서명 검증</text>
  <text x="540" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">ClusterImagePolicy 조회</text>

  <!-- OK / Fail branches -->
  <line x1="620" y1="90" x2="660" y2="70" stroke="#55c555" stroke-width="1.5"/>
  <line x1="620" y1="90" x2="660" y2="112" stroke="#e05555" stroke-width="1.5"/>

  <rect x="660" y="54" width="160" height="36" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="740" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">✓ 허용 (Allow)</text>

  <rect x="660" y="96" width="160" height="36" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="740" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">✗ 거부 (Deny)</text>

  <!-- Policy YAML -->
  <rect x="40" y="144" width="800" height="176" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="56" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># ClusterImagePolicy: 서명된 이미지만 허용</text>
  <text x="56" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">apiVersion: policy.sigstore.dev/v1beta1</text>
  <text x="56" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">kind: ClusterImagePolicy</text>
  <text x="56" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">spec</tspan>:</text>
  <text x="56" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">images</tspan>: [{<tspan fill="#7ec8e3" font-weight="600">glob</tspan>: <tspan fill="#ce9178">"ghcr.io/myorg/**"</tspan>}]</text>
  <text x="56" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">authorities</tspan>:</text>
  <text x="56" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    - <tspan fill="#7ec8e3" font-weight="600">keyless</tspan>:</text>
  <text x="56" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">        <tspan fill="#7ec8e3" font-weight="600">identities</tspan>:</text>
  <text x="56" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">          - <tspan fill="#7ec8e3" font-weight="600">issuer</tspan>: <tspan fill="#ce9178">"https://token.actions.githubusercontent.com"</tspan></text>
</svg>
