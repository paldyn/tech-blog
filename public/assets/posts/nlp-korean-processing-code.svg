<svg width="880" height="400" viewBox="0 0 880 400"
  xmlns="http://www.w3.org/2000/svg"
  font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">Kiwi + KLUE-RoBERTa 한국어 NLP 실전</text>
  <text x="440" y="68" text-anchor="middle" fill="#888" font-size="13">형태소 분석 → NER 파이프라인</text>

  <!-- Left: Kiwi morphological analysis -->
  <text x="220" y="96" text-anchor="middle" fill="#e8e8e8" font-size="15" font-weight="600">① Kiwi 형태소 분석</text>
  <rect x="40" y="108" width="360" height="252" rx="6" fill="#070b14" stroke="#1e2433"/>

  <text x="56" y="129" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">from </text>
  <text x="96" y="129" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">kiwipiepy </text>
  <text x="168" y="129" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">import </text>
  <text x="216" y="129" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">Kiwi</text>

  <text x="56" y="153" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">kiwi </text>
  <text x="84" y="153" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">= </text>
  <text x="100" y="153" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">Kiwi()</text>

  <text x="56" y="177" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">text </text>
  <text x="84" y="177" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">= </text>
  <text x="100" y="177" fill="#ce9178" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">"삼성전자가 반도체 시장을</text>
  <text x="56" y="195" fill="#ce9178" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">       선도하고 있다."</text>

  <text x="56" y="219" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">result </text>
  <text x="100" y="219" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">= </text>
  <text x="116" y="219" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">kiwi.analyze(text)</text>
  <text x="56" y="237" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">for </text>
  <text x="80" y="237" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">token </text>
  <text x="120" y="237" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">in </text>
  <text x="136" y="237" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">result[</text>
  <text x="184" y="237" fill="#b5cea8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">0</text>
  <text x="192" y="237" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">][</text>
  <text x="208" y="237" fill="#b5cea8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">0</text>
  <text x="216" y="237" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">]:</text>
  <text x="56" y="255" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    print(token.form, token.tag)</text>
  <text x="56" y="279" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"># 삼성전자 NNP</text>
  <text x="56" y="297" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"># 가 JKS</text>
  <text x="56" y="315" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"># 반도체 NNG</text>
  <text x="56" y="333" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"># 시장 NNG</text>
  <text x="56" y="351" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"># 선도 NNG   하 XSV ...</text>

  <!-- Right: KLUE NER -->
  <text x="660" y="96" text-anchor="middle" fill="#e8e8e8" font-size="15" font-weight="600">② KLUE-RoBERTa NER</text>
  <rect x="480" y="108" width="360" height="252" rx="6" fill="#070b14" stroke="#1e2433"/>

  <text x="496" y="129" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">from </text>
  <text x="536" y="129" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">transformers </text>
  <text x="656" y="129" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">import</text>
  <text x="496" y="147" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    pipeline</text>

  <text x="496" y="171" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">ner </text>
  <text x="520" y="171" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">= </text>
  <text x="536" y="171" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">pipeline(</text>
  <text x="496" y="189" fill="#ce9178" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    "token-classification"</text>
  <text x="496" y="207" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    model=</text>
  <text x="548" y="207" fill="#ce9178" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">"snunlp/KR-FinBert"</text>
  <text x="496" y="225" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    aggregation_strategy=</text>
  <text x="496" y="243" fill="#ce9178" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">        "simple"</text>
  <text x="496" y="261" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">)</text>

  <text x="496" y="285" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">entities </text>
  <text x="560" y="285" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">= </text>
  <text x="576" y="285" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">ner(</text>
  <text x="496" y="303" fill="#ce9178" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    "삼성전자가 서울 강남구에</text>
  <text x="496" y="321" fill="#ce9178" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">     신사옥을 건립했다."</text>
  <text x="496" y="339" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">)</text>
  <text x="496" y="351" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"># 삼성전자→ORG, 서울→LOC</text>

  <!-- Bottom -->
  <text x="440" y="382" text-anchor="middle" fill="#888" font-size="12">KLUE 벤치마크: NER F1 ~0.88, DP UAS ~0.90, MRC EM ~85 (RoBERTa-large)</text>
</svg>
