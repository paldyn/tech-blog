<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420">
  <defs>
    <marker id="arr" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="9" refY="5" orient="auto">
      <path d="M1,1 L9,5 L1,9 Z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">실험 트래킹 흐름</text>

  <!-- Stage boxes (y=80, height=90) -->
  <!-- Box 1: 코드 작성 x=60 w=120 -->
  <rect x="60" y="80" width="120" height="90" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="120" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">코드 작성</text>
  <text x="120" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">모델 아키텍처</text>
  <text x="120" y="145" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">하이퍼파라미터</text>

  <!-- Arrow 1→2 -->
  <line x1="180" y1="125" x2="209" y2="125" stroke="#7ec8e3" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Box 2: 실험 실행 x=210 w=120 -->
  <rect x="210" y="80" width="120" height="90" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="270" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">실험 실행</text>
  <text x="270" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">학습 루프</text>
  <text x="270" y="145" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">데이터 로드</text>

  <!-- Arrow 2→3 -->
  <line x1="330" y1="125" x2="359" y2="125" stroke="#7ec8e3" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Box 3: 로깅 x=360 w=120 -->
  <rect x="360" y="80" width="120" height="90" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="420" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">로깅</text>
  <text x="420" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">파라미터 · 메트릭</text>
  <text x="420" y="145" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">아티팩트</text>

  <!-- Arrow 3→4 -->
  <line x1="480" y1="125" x2="509" y2="125" stroke="#7ec8e3" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Box 4: 비교·분석 x=510 w=120 -->
  <rect x="510" y="80" width="120" height="90" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="570" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">비교·분석</text>
  <text x="570" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">실험 대시보드</text>
  <text x="570" y="145" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">시각화</text>

  <!-- Arrow 4→5 -->
  <line x1="630" y1="125" x2="659" y2="125" stroke="#7ec8e3" stroke-width="1.8" marker-end="url(#arr)"/>

  <!-- Box 5: 최적 선택 x=660 w=160 -->
  <rect x="660" y="80" width="160" height="90" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="740" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">최적 선택</text>
  <text x="740" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">챔피언 모델</text>
  <text x="740" y="145" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">배포 승격</text>

  <!-- Divider -->
  <line x1="60" y1="210" x2="820" y2="210" stroke="#222233" stroke-width="1"/>

  <!-- Lower section: Logged items -->
  <text x="60" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">추적 대상</text>

  <!-- 파라미터 row -->
  <text x="60" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">파라미터</text>

  <rect x="175" y="253" width="115" height="26" rx="5" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="232" y="271" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ccccee">learning_rate</text>

  <rect x="298" y="253" width="95" height="26" rx="5" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="345" y="271" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ccccee">batch_size</text>

  <rect x="401" y="253" width="75" height="26" rx="5" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="438" y="271" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ccccee">epochs</text>

  <rect x="484" y="253" width="115" height="26" rx="5" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="541" y="271" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ccccee">n_estimators</text>

  <!-- 메트릭 row -->
  <text x="60" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">메트릭</text>

  <rect x="175" y="297" width="65" height="26" rx="5" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="207" y="315" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ccddcc">loss</text>

  <rect x="248" y="297" width="80" height="26" rx="5" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="288" y="315" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ccddcc">accuracy</text>

  <rect x="336" y="297" width="80" height="26" rx="5" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="376" y="315" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ccddcc">val_loss</text>

  <rect x="424" y="297" width="100" height="26" rx="5" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="474" y="315" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ccddcc">val_accuracy</text>

  <!-- 아티팩트 row -->
  <text x="60" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#ce9178">아티팩트</text>

  <rect x="175" y="341" width="90" height="26" rx="5" fill="#1a1a0a" stroke="#ce9178" stroke-width="1"/>
  <text x="220" y="359" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8c8a8">model.pkl</text>

  <rect x="273" y="341" width="180" height="26" rx="5" fill="#1a1a0a" stroke="#ce9178" stroke-width="1"/>
  <text x="363" y="359" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8c8a8">confusion_matrix.png</text>

  <rect x="461" y="341" width="150" height="26" rx="5" fill="#1a1a0a" stroke="#ce9178" stroke-width="1"/>
  <text x="536" y="359" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8c8a8">feature_importance.csv</text>

  <!-- Connecting line from Box 3 (로깅) down to logged items section -->
  <line x1="420" y1="170" x2="420" y2="210" stroke="#55c555" stroke-width="1" stroke-dasharray="3,3" stroke-opacity="0.6"/>
</svg>
