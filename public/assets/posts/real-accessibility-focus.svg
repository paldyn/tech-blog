<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">키보드 내비게이션과 포커스 관리</text>

  <!-- Focus Trap section -->
  <rect x="60" y="68" width="380" height="260" rx="8" fill="#0f0f1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="250" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">포커스 트랩 (모달 다이얼로그)</text>

  <rect x="76" y="104" width="348" height="212" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">function</tspan> Modal({ isOpen, onClose }) {</text>
  <text x="92" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">const</tspan> firstRef = useRef(null);</text>
  <text x="92" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"></text>
  <text x="92" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  useEffect(() =&gt; {</text>
  <text x="92" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">    <tspan fill="#7ec8e3" font-weight="600">if</tspan> (isOpen) firstRef.current?.focus();</text>
  <text x="92" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  }, [isOpen]);</text>
  <text x="92" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"></text>
  <text x="92" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  <tspan fill="#9aa4b8">// @radix-ui/react-dialog 권장</tspan></text>
  <text x="92" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  <tspan fill="#9aa4b8">// focus-trap-react 라이브러리</tspan></text>
  <text x="92" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">}</text>

  <!-- Skip Link -->
  <rect x="460" y="68" width="360" height="130" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">스킵 내비게이션</text>

  <rect x="476" y="104" width="328" height="82" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">/* 포커스 전까지 숨김 */</text>
  <text x="492" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">.skip-link { position: absolute;</text>
  <text x="492" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  left: -<tspan fill="#b5cea8">9999px</tspan>; }</text>
  <text x="492" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">.skip-link:focus { left: <tspan fill="#b5cea8">0</tspan>; }</text>

  <!-- Keyboard events -->
  <rect x="460" y="214" width="360" height="114" rx="8" fill="#1a1a0f" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="640" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">키보드 이벤트 처리</text>

  <rect x="476" y="248" width="328" height="68" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">const</tspan> onKey = (e) =&gt; {</text>
  <text x="492" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">if</tspan> (e.key === <tspan fill="#ce9178">'Escape'</tspan>) onClose();</text>
  <text x="492" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">};</text>

  <!-- Color contrast section -->
  <text x="60" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">색 대비 기준 (WCAG 2.1)</text>

  <rect x="60" y="380" width="196" height="56" rx="8" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="158" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">AA 기준</text>
  <text x="158" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">일반 텍스트 ≥ 4.5:1</text>

  <rect x="272" y="380" width="196" height="56" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="370" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">AAA 기준</text>
  <text x="370" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">일반 텍스트 ≥ 7:1</text>

  <rect x="484" y="380" width="196" height="56" rx="8" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="582" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">대형 텍스트 AA</text>
  <text x="582" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">18pt 이상 ≥ 3:1</text>

  <rect x="696" y="380" width="124" height="56" rx="8" fill="#111" stroke="#ce9178" stroke-width="1"/>
  <text x="758" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ce9178" text-anchor="middle">도구</text>
  <text x="758" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">axe-core / jest-axe</text>
</svg>
