<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>
  <text x="440" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">RecursiveAction: 병렬 배열 정렬</text>

  <rect x="60" y="58" width="760" height="340" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="80" y="86" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">class</tspan><tspan fill="#ffffff"> ParallelSort </tspan><tspan fill="#7ec8e3" font-weight="600">extends</tspan><tspan fill="#ffffff"> RecursiveAction {</tspan></text>
  <text x="80" y="106" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">    static final int</tspan><tspan fill="#ffffff"> THRESHOLD = </tspan><tspan fill="#b5cea8">500</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="80" y="126" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">    final int</tspan><tspan fill="#ffffff">[] arr; </tspan><tspan fill="#7ec8e3" font-weight="600">final int</tspan><tspan fill="#ffffff"> lo, hi;</tspan></text>

  <text x="80" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    @Override </tspan><tspan fill="#7ec8e3" font-weight="600">protected void</tspan><tspan fill="#ffffff"> compute() {</tspan></text>
  <text x="80" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">        if</tspan><tspan fill="#ffffff"> (hi - lo &lt;= THRESHOLD) {</tspan></text>
  <text x="80" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">            Arrays.sort(arr, lo, hi); </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="80" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">        }</tspan></text>
  <text x="80" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">        int</tspan><tspan fill="#ffffff"> mid = (lo + hi) &gt;&gt;&gt; 1;</tspan></text>
  <text x="80" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">        var</tspan><tspan fill="#ffffff"> left = </tspan><tspan fill="#7ec8e3" font-weight="600">new</tspan><tspan fill="#ffffff"> ParallelSort(arr, lo, mid);</tspan></text>
  <text x="80" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">        var</tspan><tspan fill="#ffffff"> right = </tspan><tspan fill="#7ec8e3" font-weight="600">new</tspan><tspan fill="#ffffff"> ParallelSort(arr, mid, hi);</tspan></text>
  <text x="80" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">        invokeAll(left, right); </tspan><tspan fill="#9aa4b8">// 양쪽 동시 실행 후 대기</tspan></text>
  <text x="80" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">        // 정렬된 두 구간 병합</tspan></text>
  <text x="80" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">        merge(arr, lo, mid, hi);</tspan></text>
  <text x="80" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    }</tspan></text>
  <text x="80" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">}</tspan></text>
</svg>
