<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">oncellstyle 최적화 — 미리 계산된 스타일 맵 활용</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">스크롤마다 호출되므로 연산 최소화가 핵심</text>

  <!-- Left: bad pattern -->
  <rect x="60" y="94" width="360" height="30" fill="#2e0d0d" rx="4"/>
  <text x="240" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">느린 패턴 — 매번 복잡한 계산</text>

  <rect x="60" y="129" width="360" height="234" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="76" y="153" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// ❌ 스크롤마다 반복 계산</text>
  <text x="76" y="171" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">function</tspan><tspan fill="#ffffff"> grd_oncellstyle_bad(obj,e){</tspan></text>
  
  <text x="76" y="189" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">  var</tspan><tspan fill="#ffffff"> nAmt = parseInt(</tspan></text>
  
  <text x="76" y="207" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    ds.getColumn(e.row, <tspan fill="#ce9178">"AMT"</tspan>));</text>
  <text x="76" y="225" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">  var</tspan><tspan fill="#ffffff"> sType = ds.getColumn(</tspan></text>
  
  <text x="76" y="243" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    e.row, <tspan fill="#ce9178">"TYPE"</tspan>);</text>
  <text x="76" y="261" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  // 복잡한 조건 판단...</text>
  <text x="76" y="279" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  if</text>
  <text x="92" y="279" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> (nAmt &lt; <tspan fill="#b5cea8">0</tspan> &amp;&amp; sType == <tspan fill="#ce9178">"A"</tspan>) {</text>
  <text x="76" y="297" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    e.backgroundColor = <tspan fill="#ce9178">"red"</tspan>;</text>
  <text x="76" y="315" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  }</text>
  <text x="76" y="333" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>

  <!-- Right: good pattern -->
  <rect x="460" y="94" width="360" height="30" fill="#0d2e0d" rx="4"/>
  <text x="640" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">빠른 패턴 — 미리 계산된 맵 조회</text>

  <rect x="460" y="129" width="360" height="234" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="476" y="153" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// ✓ 데이터 로드 후 1회 계산</text>
  <text x="476" y="171" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">var</text>
  <text x="500" y="171" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> g_rowStyles = {};</text>
  <text x="476" y="189" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">function</tspan><tspan fill="#ffffff"> fn_buildStyleMap() {</tspan></text>
  
  <text x="476" y="207" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  for</text>
  <text x="500" y="207" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> (var r=<tspan fill="#b5cea8">0</tspan>; r&lt;ds.rowcount; r++) {</text>
  <text x="476" y="225" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">    var</text>
  <text x="504" y="225" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> nA = parseInt(ds.getColumn(r,<tspan fill="#ce9178">"AMT"</tspan>));</text>
  <text x="476" y="243" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    g_rowStyles[r] = nA &lt; <tspan fill="#b5cea8">0</tspan> ? <tspan fill="#ce9178">"red"</tspan> : <tspan fill="#ce9178">""</tspan>;</text>
  <text x="476" y="261" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  }</text>
  <text x="476" y="279" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>
  <text x="476" y="297" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">function</tspan><tspan fill="#ffffff"> grd_oncellstyle(obj,e) {</tspan></text>
  
  <text x="476" y="315" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  // O(1) 맵 조회만</text>
  <text x="476" y="333" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  e.backgroundColor = g_rowStyles[e.row] || <tspan fill="#ce9178">""</tspan>;</text>
  <text x="476" y="351" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>
</svg>
