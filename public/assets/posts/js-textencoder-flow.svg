<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">TextEncoder · TextDecoder 흐름</text>

  <!-- 문자열 박스 -->
  <rect x="60" y="80" width="200" height="70" fill="#111827" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="108" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" text-anchor="middle">JS String</text>
  <text x="160" y="130" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">'안녕 Hello'</text>

  <!-- TextEncoder 화살표 -->
  <rect x="300" y="90" width="160" height="50" fill="#1a2235" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="380" y="112" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" text-anchor="middle">TextEncoder</text>
  <text x="380" y="130" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">.encode()</text>
  <!-- arrow right -->
  <polygon points="270,115 290,109 290,121" fill="#7ec8e3"/>
  <line x1="260" y1="115" x2="290" y2="115" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="470,115 460,109 460,121" fill="#7ec8e3"/>
  <line x1="460" y1="115" x2="490" y2="115" stroke="#7ec8e3" stroke-width="2"/>

  <!-- Uint8Array 박스 -->
  <rect x="490" y="80" width="200" height="70" fill="#111827" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="590" y="108" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" text-anchor="middle">Uint8Array</text>
  <text x="590" y="130" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">UTF-8 바이트 시퀀스</text>

  <!-- TextDecoder 화살표 (역방향) -->
  <rect x="300" y="200" width="160" height="50" fill="#1a2235" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="380" y="222" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" text-anchor="middle">TextDecoder</text>
  <text x="380" y="240" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">.decode()</text>
  <!-- arrow left -->
  <polygon points="270,225 290,219 290,231" fill="#55c555"/>
  <line x1="260" y1="225" x2="290" y2="225" stroke="#55c555" stroke-width="2"/>
  <polygon points="470,225 460,219 460,231" fill="#55c555"/>
  <line x1="460" y1="225" x2="490" y2="225" stroke="#55c555" stroke-width="2"/>

  <!-- encoding 레이블 -->
  <text x="380" y="174" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">UTF-8 (항상)</text>
  <text x="380" y="286" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">UTF-8 / UTF-16 / 기타</text>

  <!-- 코드 블록 -->
  <rect x="60" y="312" width="760" height="88" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="80" y="338" xml:space="preserve" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">const</text>
  <text x="124" y="338" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"> enc = new TextEncoder();</text>
  <text x="80" y="356" xml:space="preserve" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">const</text>
  <text x="124" y="356" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"> bytes = enc.encode(</text>
  <text x="278" y="356" xml:space="preserve" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">'안녕'</text>
  <text x="326" y="356" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">); </text>
  <text x="366" y="356" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// Uint8Array(6) [236,149,136,235,133,149]</text>
  <text x="80" y="374" xml:space="preserve" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">const</text>
  <text x="124" y="374" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"> dec = new TextDecoder();</text>
  <text x="80" y="392" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">dec.decode(bytes);  </text>
  <text x="248" y="392" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// '안녕'</text>
</svg>
