  <rect x="520" y="310" width="140" height="52" rx="6" fill="#1a1a00" stroke="#e8c800" stroke-width="1"/>
  <text x="590" y="332" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#e8c800">Jotai / Recoil</text>
  <text x="590" y="350" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">아토믹</text>

  <!-- Layer 4: Server state -->
  <rect x="60" y="400" width="760" height="80" rx="10" fill="#1a0d1a" stroke="#7777cc" stroke-width="2"/>
  <text x="130" y="432" text-anchor="middle"
