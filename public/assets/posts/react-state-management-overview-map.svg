  <text x="130" y="452" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">원격 데이터</text>

  <rect x="200" y="412" width="160" height="52" rx="6" fill="#1a0d2a" stroke="#7777cc" stroke-width="1"/>
  <text x="280" y="434" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7777cc">TanStack Query</text>
  <text x="280" y="452" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">캐싱·동기화</text>

  <rect x="380" y="412" width="160" height="52" rx="6" fill="#1a0d2a" stroke="#7777cc" stroke-width="1"/>
  <text x="460" y="434" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7777cc">RTK Query</text>
  <text x="460" y="452" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Redux 통합</text>

  <rect x="560" y="412" width="160" height="52" rx="6" fill="#1a0d2a" stroke="#7777cc" stroke-width="1"/>
  <text x="640" y="434" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7777cc">SWR</text>
  <text x="640" y="452" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Next.js 친화</text>
</svg>
