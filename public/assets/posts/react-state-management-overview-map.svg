  <rect x="380" y="208" width="160" height="52" rx="6" fill="#0d1a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="460" y="230" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3">Context +</text>
  <text x="460" y="248" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3">useReducer</text>

  <rect x="560" y="208" width="160" height="52" rx="6" fill="#0d1a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="640" y="230" text-anchor="middle"
