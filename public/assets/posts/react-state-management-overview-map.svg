<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520" style="background:#0a0a0a;border-radius:12px;">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">React 상태 관리 옵션 지도</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">범위와 복잡도에 따른 선택 가이드</text>

  <!-- Layer 1: Local state -->
  <rect x="60" y="94" width="760" height="80" rx="10" fill="#0d1a0d" stroke="#55c555" stroke-width="2"/>
  <text x="130" y="126" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">① 로컬 상태</text>
  <text x="130" y="146" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">단일 컴포넌트</text>

  <rect x="200" y="106" width="160" height="52" rx="6" fill="#0d2a0d" stroke="#55c555" stroke-width="1"/>
  <text x="280" y="128" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#55c555">useState</text>
  <text x="280" y="146" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">단순 값</text>

  <rect x="380" y="106" width="160" height="52" rx="6" fill="#0d2a0d" stroke="#55c555" stroke-width="1"/>
  <text x="460" y="128" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#55c555">useReducer</text>
  <text x="460" y="146" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">복잡한 로직</text>

  <rect x="560" y="106" width="160" height="52" rx="6" fill="#0d2a0d" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="128" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#55c555">useRef</text>
  <text x="640" y="146" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">렌더 미유발</text>

  <!-- Layer 2: Shared state via Context -->
  <rect x="60" y="196" width="760" height="80" rx="10" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="2"/>
  <text x="130" y="228" text-anchor="middle"
