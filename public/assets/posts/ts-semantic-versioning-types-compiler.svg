<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">컴파일러 버전도 호환 표면이다</text>
  <text x="60" y="76" font-size="14" fill="#888">TypeScript 자체는 SemVer를 따르지 않는다 — 마이너에도 깨질 수 있다</text>

  <!-- note box -->
  <rect x="60" y="100" width="360" height="230" fill="#101418" rx="10" stroke="#e05555" stroke-width="1.5"/>
  <text x="84" y="134" font-size="16" font-weight="600" fill="#e05555">주의점</text>
  <text x="84" y="168" font-size="13" fill="#888">• TS는 5.3 → 5.4 마이너에서도</text>
  <text x="84" y="188" font-size="13" fill="#888">  타입 검사 동작이 바뀔 수 있다</text>
  <text x="84" y="220" font-size="13" fill="#888">• 새 TS 문법을 .d.ts에 쓰면</text>
  <text x="84" y="240" font-size="13" fill="#888">  구버전 사용자가 못 읽는다</text>
  <text x="84" y="272" font-size="13" fill="#888">• 의존 라이브러리 타입 변경이</text>
  <text x="84" y="292" font-size="13" fill="#888">  내 공개 타입에 전파될 수 있다</text>

  <!-- solution box -->
  <rect x="460" y="100" width="360" height="230" fill="#101418" rx="10" stroke="#55c555" stroke-width="1.5"/>
  <text x="484" y="134" font-size="16" font-weight="600" fill="#55c555">대응</text>
  <text x="484" y="162" font-size="13" fill="#888">지원 TS 버전 범위를 명시</text>
  <rect x="484" y="176" width="312" height="64" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="500" y="200" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff"><tspan fill="#9cdcfe">"peerDependencies"</tspan>: {</text>
  <text xml:space="preserve" x="500" y="224" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">  <tspan fill="#9cdcfe">"typescript"</tspan>: <tspan fill="#ce9178">"&gt;=5.0"</tspan> }</text>
  <text x="484" y="268" font-size="13" fill="#888">• typesVersions로 버전별 분기</text>
  <text x="484" y="298" font-size="13" fill="#888">• CI에서 여러 TS 버전 매트릭스 테스트</text>
</svg>
