<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8">공격 표면 축소 — Before vs After</text>

  <!-- Before -->
  <text x="210" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555">Before (넓은 공격 표면)</text>

  <rect x="60" y="96" width="300" height="36" rx="5" fill="#1a0808" stroke="#993333" stroke-width="1"/>
  <text x="210" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">GET /admin/dashboard (인증 없음)</text>

  <rect x="60" y="140" width="300" height="36" rx="5" fill="#1a0808" stroke="#993333" stroke-width="1"/>
  <text x="210" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">POST /upload (타입 검증 없음)</text>

  <rect x="60" y="184" width="300" height="36" rx="5" fill="#1a0808" stroke="#993333" stroke-width="1"/>
  <text x="210" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">GET /debug/env (환경변수 노출)</text>

  <rect x="60" y="228" width="300" height="36" rx="5" fill="#1a0808" stroke="#993333" stroke-width="1"/>
  <text x="210" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">포트 22 전체 인터넷 노출</text>

  <rect x="60" y="272" width="300" height="36" rx="5" fill="#1a0808" stroke="#993333" stroke-width="1"/>
  <text x="210" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">500+ npm 패키지 (미감사)</text>

  <!-- Divider -->
  <line x1="440" y1="80" x2="440" y2="330" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- After -->
  <text x="660" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">After (축소된 공격 표면)</text>

  <rect x="520" y="96" width="300" height="36" rx="5" fill="#0a2010" stroke="#336633" stroke-width="1"/>
  <text x="670" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">GET /admin → IP Allowlist + MFA</text>

  <rect x="520" y="140" width="300" height="36" rx="5" fill="#0a2010" stroke="#336633" stroke-width="1"/>
  <text x="670" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">POST /upload → MIME + 크기 검증</text>

  <rect x="520" y="184" width="300" height="36" rx="5" fill="#0a2010" stroke="#336633" stroke-width="1"/>
  <text x="670" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">/debug 엔드포인트 완전 제거</text>

  <rect x="520" y="228" width="300" height="36" rx="5" fill="#0a2010" stroke="#336633" stroke-width="1"/>
  <text x="670" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">SSH: VPN 내부 + 키 인증만</text>

  <rect x="520" y="272" width="300" height="36" rx="5" fill="#0a2010" stroke="#336633" stroke-width="1"/>
  <text x="670" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">의존성 감사 (npm audit fix)</text>

  <!-- Code block -->
  <rect x="60" y="340" width="760" height="64" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 공격 표면 자동 감사</text>
  <text x="80" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">$ npm audit --audit-level=moderate    # JS 의존성</text>
  <text x="80" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">$ nmap -sV --open target.com          # 열린 포트 스캔</text>
</svg>
