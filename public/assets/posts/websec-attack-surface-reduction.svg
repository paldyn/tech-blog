  <rect x="500" y="259" width="320" height="55" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="660" y="281" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">S3 버킷 기본 비공개 설정</text>
  <text x="660" y="299" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">필요한 경로만 선택적 공개</text>

  <rect x="500" y="326" width="320" height="55" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="660" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">프로덕션 디버그 비활성화</text>
  <text x="660" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">환경변수 DEBUG=false, 오류 메시지 일반화</text>

  <!-- Arrow between columns -->
  <text x="440" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="28" font-weight="700" fill="#7ec8e3" text-anchor="middle">→</text>
  <text x="440" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
