<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="50" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">공격 표면 축소 전후 비교</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">Before / After Attack Surface Reduction</text>

  <!-- Before column -->
  <text x="220" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">Before (위험)</text>

  <rect x="60" y="125" width="320" height="55" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="220" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">비활성 어드민 엔드포인트 노출</text>
  <text x="220" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">/admin, /debug, /actuator → 인터넷에 공개</text>

  <rect x="60" y="192" width="320" height="55" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="220" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">과도한 npm 의존성</text>
  <text x="220" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">1,200개 패키지 → 공급망 취약점 다수</text>

  <rect x="60" y="259" width="320" height="55" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="220" y="281" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">모든 S3 버킷 공개</text>
  <text x="220" y="299" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">민감 파일 포함 전체 공개 설정</text>

  <rect x="60" y="326" width="320" height="55" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="220" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">디버그 모드 활성화</text>
  <text x="220" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">스택 트레이스 · 환경 변수 노출</text>

  <!-- After column -->
  <text x="660" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">After (개선)</text>

  <rect x="500" y="125" width="320" height="55" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="660" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">어드민 엔드포인트 내부망 제한</text>
  <text x="660" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">IP 화이트리스트 + VPN 필수</text>

  <rect x="500" y="192" width="320" height="55" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="660" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
