<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">target · module · lib 의 역할 분담</text>

  <rect x="50" y="86" width="240" height="160" rx="8" fill="#11151c" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="70" y="114" font-size="15" font-weight="600" fill="#e8e8e8">target</text>
  <text x="70" y="142" font-size="12" fill="#888">출력 JS의 문법 수준</text>
  <text x="70" y="168" font-size="12" fill="#888">ES2015 · ES2020 ...</text>
  <text x="70" y="194" font-size="12" fill="#888">화살표·async를 그대로</text>
  <text x="70" y="214" font-size="12" fill="#888">둘지, 낮춰 변환할지</text>
  <text x="70" y="234" font-size="12" fill="#888">결정</text>

  <rect x="320" y="86" width="240" height="160" rx="8" fill="#11151c" stroke="#7777cc" stroke-width="1.5"/>
  <text x="340" y="114" font-size="15" font-weight="600" fill="#e8e8e8">module</text>
  <text x="340" y="142" font-size="12" fill="#888">출력 모듈 형식</text>
  <text x="340" y="168" font-size="12" fill="#888">ESNext · CommonJS</text>
  <text x="340" y="194" font-size="12" fill="#888">import/export 를</text>
  <text x="340" y="214" font-size="12" fill="#888">require로 바꿀지 등</text>
  <text x="340" y="234" font-size="12" fill="#888">모듈 시스템 선택</text>

  <rect x="590" y="86" width="240" height="160" rx="8" fill="#11151c" stroke="#55c555" stroke-width="1.5"/>
  <text x="610" y="114" font-size="15" font-weight="600" fill="#e8e8e8">lib</text>
  <text x="610" y="142" font-size="12" fill="#888">사용 가능한 내장 API</text>
  <text x="610" y="168" font-size="12" fill="#888">DOM · ES2020 ...</text>
  <text x="610" y="194" font-size="12" fill="#888">Array.flat, fetch,</text>
  <text x="610" y="214" font-size="12" fill="#888">document 등의 타입</text>
  <text x="610" y="234" font-size="12" fill="#888">포함 여부</text>

  <text x="60" y="290" font-size="13" fill="#9aa4b8">target은 문법, module은 모듈 형식, lib은 사용 가능한 타입 — 세 축이 따로 논다.</text>
</svg>
