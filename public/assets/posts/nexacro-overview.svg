<svg width="1200" height="640" viewBox="0 0 1200 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="360" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="360" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="cardC" x1="0" y1="0" x2="360" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <style>
      .title { fill: #e2e8f0; font-family: "Pretendard", "Noto Sans KR", sans-serif; font-size: 36px; font-weight: 700; }
      .subtitle { fill: #cbd5e1; font-family: "Pretendard", "Noto Sans KR", sans-serif; font-size: 18px; font-weight: 500; }
      .cardTitle { fill: #f8fafc; font-family: "Pretendard", "Noto Sans KR", sans-serif; font-size: 22px; font-weight: 700; }
      .cardBody { fill: #dbeafe; font-family: "Pretendard", "Noto Sans KR", sans-serif; font-size: 15px; font-weight: 500; }
      .label { fill: #94a3b8; font-family: "JetBrains Mono", monospace; font-size: 11px; text-anchor: middle; }
    </style>
  </defs>

  <rect width="1200" height="640" fill="url(#bg)"/>

  <text x="64" y="84" class="title">Nexacro Runtime Overview</text>
  <text x="64" y="120" class="subtitle">화면(UI), 데이터(Dataset), 서버연동(Transaction)이 하나의 흐름으로 동작한다</text>

  <rect x="64" y="186" width="300" height="170" rx="18" fill="url(#cardA)"/>
  <text x="88" y="232" class="cardTitle">1. 화면 영역 (Form)</text>
  <text x="88" y="268" class="cardBody">• Button / Edit / Grid 컴포넌트</text>
  <text x="88" y="296" class="cardBody">• 이벤트(onload, onclick)</text>
  <text x="88" y="324" class="cardBody">• 사용자 상호작용 처리</text>

  <rect x="448" y="186" width="300" height="170" rx="18" fill="url(#cardB)"/>
  <text x="472" y="232" class="cardTitle">2. 데이터 영역 (Dataset)</text>
  <text x="472" y="268" class="cardBody">• 화면-데이터 바인딩</text>
  <text x="472" y="296" class="cardBody">• 필터, 정렬, 상태 추적</text>
  <text x="472" y="324" class="cardBody">• 변경 데이터 관리</text>

  <rect x="832" y="186" width="300" height="170" rx="18" fill="url(#cardC)"/>
  <text x="856" y="232" class="cardTitle">3. 서버 연동 (Transaction)</text>
  <text x="856" y="268" class="cardBody">• 요청 URL/파라미터 구성</text>
  <text x="856" y="296" class="cardBody">• Dataset in/out 매핑</text>
  <text x="856" y="324" class="cardBody">• 콜백에서 결과 처리</text>

  <path d="M364 278 H448" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M748 278 H832" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="406" y="252" class="label">Binding</text>
  <text x="790" y="252" class="label">Req/Res</text>

  <rect x="308" y="430" width="584" height="130" rx="18" fill="#0b1220" stroke="#334155" stroke-width="2"/>
  <text x="336" y="474" class="cardTitle">핵심 메시지</text>
  <text x="336" y="510" class="cardBody">넥사크로는 "UI 개발 도구"를 넘어, 프론트 화면과 데이터 처리 흐름을</text>
  <text x="336" y="538" class="cardBody">일관된 규칙으로 연결해주는 엔터프라이즈 업무용 애플리케이션 플랫폼이다.</text>
</svg>
