<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">블랙박스 · 그레이박스 · 화이트박스</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">테스터에게 정보를 얼마나 주고 시작하는가</text>

  <!-- Black box -->
  <rect x="50" y="100" width="240" height="230" rx="10" fill="#151515" stroke="#888" stroke-width="1.5"/>
  <text x="170" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8" text-anchor="middle">블랙박스</text>
  <text x="170" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">사전 정보 없음</text>
  <line x1="74" y1="168" x2="266" y2="168" stroke="#333" stroke-width="1"/>
  <text x="170" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">외부 공격자의 시점 재현</text>
  <text x="170" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">정찰 단계부터 직접 수행</text>
  <text x="170" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#55c555" text-anchor="middle">가장 현실적인 시나리오</text>
  <text x="170" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e05555" text-anchor="middle">시간 대비 커버리지 낮음</text>
  <text x="170" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">외부 노출 자산 평가에 적합</text>

  <!-- Gray box -->
  <rect x="320" y="100" width="240" height="230" rx="10" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">그레이박스</text>
  <text x="440" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">일반 계정 + 문서 일부 제공</text>
  <line x1="344" y1="168" x2="536" y2="168" stroke="#26334d" stroke-width="1"/>
  <text x="440" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">로그인한 사용자 · 내부자 시점</text>
  <text x="440" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">인증 이후 영역 집중 점검</text>
  <text x="440" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#55c555" text-anchor="middle">비용 대비 효과 균형점</text>
  <text x="440" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e05555" text-anchor="middle">정보 수준 합의 필요</text>
  <text x="440" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">웹 서비스 정기 점검의 표준</text>

  <!-- White box -->
  <rect x="590" y="100" width="240" height="230" rx="10" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="710" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">화이트박스</text>
  <text x="710" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">소스 코드 · 아키텍처 전체 공개</text>
  <line x1="614" y1="168" x2="806" y2="168" stroke="#1d3a26" stroke-width="1"/>
  <text x="710" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">코드 리뷰 + 동적 검증 결합</text>
  <text x="710" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">같은 시간에 가장 깊은 분석</text>
  <text x="710" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#55c555" text-anchor="middle">커버리지 최대</text>
  <text x="710" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e05555" text-anchor="middle">외부자 시점 재현은 아님</text>
  <text x="710" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">고위험 핵심 컴포넌트에 적합</text>

  <text x="440" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">"현실성"이 목적이면 블랙, "주어진 시간에 최대 발견"이 목적이면 화이트에 가깝게</text>
</svg>
