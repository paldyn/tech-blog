<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">mmap 실전 패턴</text>

  <rect x="60" y="68" width="370" height="26" rx="4" fill="#1a2a4a"/>
  <text x="245" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">대용량 파일 고속 검색</text>

  <rect x="60" y="96" width="370" height="280" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><ttml:tspan font-weight="600" fill="#7ec8e3">import</ttml:tspan> mmap, re</text>
  <text xml:space="preserve" x="76" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><ttml:tspan font-weight="600" fill="#7ec8e3">def</ttml:tspan> <ttml:tspan fill="#55c555">grep_mmap</ttml:tspan>(path, pattern):</text>
  <text xml:space="preserve" x="76" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    pat = re.compile(pattern)</text>
  <text xml:space="preserve" x="76" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    <ttml:tspan font-weight="600" fill="#7ec8e3">with</ttml:tspan> <ttml:tspan font-weight="600" fill="#7ec8e3">open</ttml:tspan>(path, <ttml:tspan fill="#ce9178">"rb"</ttml:tspan>) as f:</text>
  <text xml:space="preserve" x="76" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        mm = mmap.mmap(</text>
  <text xml:space="preserve" x="76" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">            f.fileno(), <ttml:tspan fill="#b5cea8">0</ttml:tspan>,</text>
  <text xml:space="preserve" x="76" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">            access=mmap.ACCESS_READ)</text>
  <text xml:space="preserve" x="76" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        matches = pat.findall(mm)</text>
  <text xml:space="preserve" x="76" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        mm.close()</text>
  <text xml:space="preserve" x="76" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        <ttml:tspan font-weight="600" fill="#7ec8e3">return</ttml:tspan> matches</text>
  <text xml:space="preserve" x="76" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 10GB 로그에서 IP 추출</text>
  <text xml:space="preserve" x="76" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">ips = grep_mmap(</text>
  <text xml:space="preserve" x="76" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    <ttml:tspan fill="#ce9178">"server.log"</ttml:tspan>, rb<ttml:tspan fill="#ce9178">"\d+\.\d+\.\d+\.\d+"</ttml:tspan>)</text>

  <rect x="450" y="68" width="370" height="26" rx="4" fill="#2a1a4a"/>
  <text x="635" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">쓰기 가능 mmap</text>

  <rect x="450" y="96" width="370" height="280" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="466" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># r+b로 열어 mmap 수정</text>
  <text xml:space="preserve" x="466" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><ttml:tspan font-weight="600" fill="#7ec8e3">with</ttml:tspan> <ttml:tspan font-weight="600" fill="#7ec8e3">open</ttml:tspan>(<ttml:tspan fill="#ce9178">"data.bin"</ttml:tspan>, <ttml:tspan fill="#ce9178">"r+b"</ttml:tspan>) as f:</text>
  <text xml:space="preserve" x="466" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    mm = mmap.mmap(f.fileno(), <ttml:tspan fill="#b5cea8">0</ttml:tspan>)</text>
  <text xml:space="preserve" x="466" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">    # bytes처럼 인덱싱</text>
  <text xml:space="preserve" x="466" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    mm[<ttml:tspan fill="#b5cea8">0</ttml:tspan>] = <ttml:tspan fill="#b5cea8">0xFF</ttml:ttml:tspan>        <ttml:tspan fill="#9aa4b8"># 1바이트 수정</ttml:tspan></text>
  <text xml:space="preserve" x="466" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    mm[<ttml:tspan fill="#b5cea8">10</ttml:tspan>:<ttml:tspan fill="#b5cea8">14</ttml:ttml:tspan>] = b<ttml:tspan fill="#ce9178">"\x00\x01\x02\x03"</ttml:ttml:tspan></text>
  <text xml:space="preserve" x="466" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">    # seek/read도 사용 가능</text>
  <text xml:space="preserve" x="466" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    mm.seek(<ttml:tspan fill="#b5cea8">100</ttml:ttml:tspan>)</text>
  <text xml:space="preserve" x="466" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    data = mm.read(<ttml:ttml:tspan fill="#b5cea8">50</ttml:ttml:tspan>)</text>
  <text xml:space="preserve" x="466" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    mm.flush()      <ttml:tspan fill="#9aa4b8"># 디스크 동기화</ttml:ttml:tspan></text>
  <text xml:space="preserve" x="466" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    mm.close()</text>

  <rect x="60" y="390" width="760" height="5" rx="2" fill="#3a4a6e"/>
</svg>
