<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380"
     style="border-radius:12px" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>
  <text x="440" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">번역 품질 결정 요소</text>

  <!-- Three pillars -->
  <!-- Pillar 1: Glossary -->
  <rect x="60" y="72" width="240" height="240" rx="10" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="100" text-anchor="middle" font-size="15" font-weight="700" fill="#7ec8e3">용어집 (Glossary)</text>

  <rect x="80" y="114" width="200" height="40" rx="6" fill="#000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="90" y="132" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#ce9178" xml:space="preserve">"API" → "API"</text>
  <text x="90" y="148" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#ce9178" xml:space="preserve">"endpoint" → "엔드포인트"</text>

  <text x="180" y="182" text-anchor="middle" font-size="12" fill="#888">일관된 전문 용어 보장</text>
  <text x="180" y="198" text-anchor="middle" font-size="12" fill="#888">브랜드명 · 제품명 처리</text>
  <text x="180" y="218" text-anchor="middle" font-size="12" fill="#888">도메인별 용어집 분리</text>
  <text x="180" y="238" text-anchor="middle" font-size="12" fill="#888">버전 관리 필수</text>
  <text x="180" y="258" text-anchor="middle" font-size="12" fill="#7ec8e3">영향도: 매우 높음</text>

  <!-- Pillar 2: Style -->
  <rect x="320" y="72" width="240" height="240" rx="10" fill="#1a1030" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="100" text-anchor="middle" font-size="15" font-weight="700" fill="#7777cc">스타일 가이드</text>

  <rect x="340" y="114" width="200" height="40" rx="6" fill="#000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="350" y="132" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#ce9178" xml:space="preserve">tone: "formal"</text>
  <text x="350" y="148" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#ce9178" xml:space="preserve">honorific: true</text>

  <text x="440" y="182" text-anchor="middle" font-size="12" fill="#888">경어 / 평어 설정</text>
  <text x="440" y="198" text-anchor="middle" font-size="12" fill="#888">문체 (격식 · 비격식)</text>
  <text x="440" y="218" text-anchor="middle" font-size="12" fill="#888">문장 길이 선호도</text>
  <text x="440" y="238" text-anchor="middle" font-size="12" fill="#888">숫자·날짜 포맷</text>
  <text x="440" y="258" text-anchor="middle" font-size="12" fill="#7777cc">영향도: 높음</text>

  <!-- Pillar 3: Context -->
  <rect x="580" y="72" width="240" height="240" rx="10" fill="#1a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="700" y="100" text-anchor="middle" font-size="15" font-weight="700" fill="#55c555">문맥 정보</text>

  <rect x="600" y="114" width="200" height="40" rx="6" fill="#000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="610" y="132" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#ce9178" xml:space="preserve">domain: "legal"</text>
  <text x="610" y="148" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#ce9178" xml:space="preserve">audience: "expert"</text>

  <text x="700" y="182" text-anchor="middle" font-size="12" fill="#888">대상 독자 수준</text>
  <text x="700" y="198" text-anchor="middle" font-size="12" fill="#888">문서 유형 (계약 · 기사)</text>
  <text x="700" y="218" text-anchor="middle" font-size="12" fill="#888">이전 번역 예시 (few-shot)</text>
  <text x="700" y="238" text-anchor="middle" font-size="12" fill="#888">문화 적응 요구사항</text>
  <text x="700" y="258" text-anchor="middle" font-size="12" fill="#55c555">영향도: 높음</text>

  <!-- Bottom -->
  <text x="440" y="346" text-anchor="middle" font-size="12" fill="#888">세 요소 모두 시스템 프롬프트에 포함할수록 번역 품질 향상</text>
</svg>
