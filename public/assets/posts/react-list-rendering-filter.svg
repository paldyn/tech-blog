<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;background:#0a0a0a">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">filter + map 패턴 &amp; 중첩 리스트</text>
  <text x="440" y="72" font-size="14" fill="#888" text-anchor="middle">배열 메서드를 조합해 복잡한 리스트 처리</text>

  <!-- filter + map -->
  <rect x="55" y="95" width="380" height="200" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="245" y="118" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">filter + map 조합</text>
  <rect x="70" y="128" width="350" height="152" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="148" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// 완료된 항목만 렌더링</text>
  <text x="82" y="166" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&lt;ul&gt;</text>
  <text x="82" y="184" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">  {todos</text>
  <text x="82" y="202" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">    .filter</text>
  <text x="127" y="202" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">(t =&gt; t.done)</text>
  <text x="82" y="220" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">    .map</text>
  <text x="116" y="220" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">(t =&gt; (</text>
  <text x="82" y="238" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">      &lt;li </text>
  <text x="112" y="238" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">key</text>
  <text x="135" y="238" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">={t.id}&gt;{t.title}&lt;/li&gt;</text>
  <text x="82" y="256" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">    ))</text>
  <text x="82" y="274" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">  }</text>

  <!-- nested list -->
  <rect x="455" y="95" width="370" height="200" rx="8" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="118" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">중첩 리스트</text>
  <rect x="470" y="128" width="340" height="152" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="148" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// 카테고리 → 아이템 중첩</text>
  <text x="482" y="166" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">{categories.map(cat =&gt; (</text>
  <text x="482" y="184" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">  &lt;section </text>
  <text x="536" y="184" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">key</text>
  <text x="559" y="184" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">={cat.id}&gt;</text>
  <text x="482" y="202" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">    &lt;h3&gt;{cat.name}&lt;/h3&gt;</text>
  <text x="482" y="220" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">    &lt;ul&gt;{cat.items.map(i =&gt;</text>
  <text x="482" y="238" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">      &lt;li </text>
  <text x="512" y="238" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">key</text>
  <text x="535" y="238" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">={i.id}&gt;{i.name}&lt;/li&gt;</text>
  <text x="482" y="256" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">    )}&lt;/ul&gt;</text>
  <text x="482" y="274" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">  &lt;/section&gt;</text>

  <!-- Key warning -->
  <rect x="55" y="320" width="770" height="110" rx="8" fill="#1e1a0a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="440" y="343" font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">⚠ key prop 규칙</text>

  <rect x="70" y="355" width="340" height="60" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="375" font-size="12" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// ❌ index를 key로 쓰면 안 되는 경우</text>
  <text x="82" y="393" font-size="13" fill="#e05555" font-family="'JetBrains Mono',monospace" xml:space="preserve">{items.map((item, i) =&gt; &lt;li key={i}&gt;</text>

  <rect x="430" y="355" width="380" height="60" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="442" y="375" font-size="12" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// ✅ 고유 ID를 key로</text>
  <text x="442" y="393" font-size="13" fill="#55c555" font-family="'JetBrains Mono',monospace" xml:space="preserve">{items.map(item =&gt; &lt;li key={item.id}&gt;</text>
</svg>
