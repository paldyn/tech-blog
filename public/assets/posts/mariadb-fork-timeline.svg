<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">MariaDB 역사 & MySQL과의 분기점</text>

  <defs>
    <marker id="arr-mdb" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-mdb2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Timeline axis -->
  <line x1="80" y1="180" x2="820" y2="180" stroke="#444" stroke-width="2"/>

  <!-- MySQL events -->
  <line x1="120" y1="170" x2="120" y2="190" stroke="#7ec8e3" stroke-width="2"/>
  <text x="120" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">2000</text>
  <text x="120" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">MySQL AB</text>
  <text x="120" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">오픈소스</text>

  <line x1="280" y1="170" x2="280" y2="190" stroke="#7ec8e3" stroke-width="2"/>
  <text x="280" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">2008</text>
  <text x="280" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Sun 인수</text>

  <line x1="400" y1="170" x2="400" y2="190" stroke="#e05555" stroke-width="2"/>
  <text x="400" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">2009~10</text>
  <text x="400" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">Oracle 인수</text>
  <text x="400" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">MySQL 불안정성 우려</text>

  <!-- Fork arrow -->
  <path d="M 400 190 C 400 240 480 260 500 300" stroke="#e05555" stroke-width="2" fill="none" stroke-dasharray="4,4" marker-end="url(#arr-mdb2)"/>
  <text x="460" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">Fork!</text>

  <!-- MariaDB branch -->
  <rect x="440" y="300" width="200" height="50" rx="8" fill="#1a0f2e" stroke="#7777cc" stroke-width="2"/>
  <text x="540" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">MariaDB 5.1</text>
  <text x="540" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">2009년 Monty Widenius 설립</text>

  <!-- Later MySQL -->
  <line x1="540" y1="170" x2="540" y2="190" stroke="#7ec8e3" stroke-width="2"/>
  <text x="540" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">2013</text>
  <text x="540" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">MySQL 5.6</text>
  <text x="540" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">MariaDB 10.0</text>

  <line x1="680" y1="170" x2="680" y2="190" stroke="#7ec8e3" stroke-width="2"/>
  <text x="680" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">2018</text>
  <text x="680" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">MySQL 8.0</text>
  <text x="680" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">MariaDB 10.3+</text>

  <line x1="790" y1="170" x2="790" y2="190" stroke="#55c555" stroke-width="2"/>
  <text x="790" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">현재</text>
  <text x="790" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">MariaDB 11.x</text>
  <text x="790" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(독자 발전)</text>

  <!-- Bottom: divergence note -->
  <rect x="60" y="380" width="760" height="56" rx="8" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="440" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">MariaDB 10.0(2013) 이후 MySQL과 독립적으로 진화 — 호환성은 높지만 완전히 동일하지 않음</text>
  <text x="440" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">MariaDB Corporation AB 운영. 완전한 GPL 라이선스. MySQL Enterprise 기능 대부분을 무료 제공</text>
</svg>
