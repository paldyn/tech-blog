<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" style="background:#0a0a0a">
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">조건부 렌더링 5가지 방법</text>

  <rect x="60" y="68" width="370" height="100" rx="12" fill="#0f1825" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">① if/else — return 전에 분기</text>
  <rect x="76" y="106" width="338" height="50" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">if</tspan><tspan fill="#ffffff"> (isLoading) </tspan><tspan font-weight="600" fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> &lt;</tspan><tspan fill="#55c555">Spinner</tspan><tspan fill="#ffffff"> /&gt;;</tspan></text>
  <text x="92" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">if</tspan><tspan fill="#ffffff"> (error) </tspan><tspan font-weight="600" fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> &lt;</tspan><tspan fill="#55c555">ErrorMsg</tspan><tspan fill="#ffffff"> /&gt;;</tspan></text>

  <rect x="450" y="68" width="370" height="100" rx="12" fill="#0f1825" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="470" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">② 삼항 연산자 — JSX 안에서 분기</text>
  <rect x="466" y="106" width="338" height="50" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">{isOn ? &lt;</tspan><tspan fill="#55c555">Active</tspan><tspan fill="#ffffff"> /&gt; : &lt;</tspan><tspan fill="#55c555">Inactive</tspan><tspan fill="#ffffff"> /&gt;}</tspan></text>
  <text x="482" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">// 두 가지 중 하나 표시</text>

  <rect x="60" y="184" width="370" height="100" rx="12" fill="#0d2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">③ &amp;&amp; — 조건 충족 시만 표시</text>
  <rect x="76" y="222" width="338" height="50" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">{hasError </tspan><tspan fill="#e05555">&amp;&amp;</tspan><tspan fill="#ffffff"> &lt;</tspan><tspan fill="#55c555">ErrorBanner</tspan><tspan fill="#ffffff"> msg={error} /&gt;}</tspan></text>
  <text x="92" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">// 0 &#x2192; "0" 출력 주의! count &gt; 0 &amp;&amp; ... 권장</text>

  <rect x="450" y="184" width="370" height="100" rx="12" fill="#0d2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="470" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">④ 변수 저장 — 복잡한 분기</text>
  <rect x="466" y="222" width="338" height="50" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">let</tspan><tspan fill="#ffffff"> content = &lt;</tspan><tspan fill="#55c555">Default</tspan><tspan fill="#ffffff"> /&gt;;</tspan></text>
  <text x="482" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">if</tspan><tspan fill="#ffffff"> (isAdmin) content = &lt;</tspan><tspan fill="#55c555">AdminPanel</tspan><tspan fill="#ffffff"> /&gt;;</tspan></text>

  <rect x="60" y="300" width="760" height="78" rx="12" fill="#1a1025" stroke="#cc77cc" stroke-width="1.5"/>
  <text x="80" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#cc77cc">⑤ 컴포넌트 맵(map object) — 다중 분기</text>
  <rect x="76" y="340" width="728" height="26" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> MAP = { list: &lt;</tspan><tspan fill="#55c555">ListView</tspan><tspan fill="#ffffff"> /&gt;, grid: &lt;</tspan><tspan fill="#55c555">GridView</tspan><tspan fill="#ffffff"> /&gt; };</tspan></text>

  <rect x="60" y="400" width="760" height="78" rx="8" fill="#0f1825" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="424" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">언제 어떤 방법을 쓸까</text>
  <text x="76" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">단순 on/off → &amp;&amp; | 두 가지 중 하나 → 삼항 | 여러 가드 → if/else return</text>
  <text x="76" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">3개 이상 분기 → 변수 또는 switch | 뷰 전환 → 컴포넌트 맵</text>
</svg>
