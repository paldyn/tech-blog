<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="340" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">커버리지: 어느 줄이 실행됐나</text>

  <rect x="60" y="86" width="760" height="190" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">def</text>
  <text xml:space="preserve" x="118" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">grade(score):</text>
  <rect x="68" y="130" width="744" height="26" rx="3" fill="#0f1a0f"/>
  <text xml:space="preserve" x="100" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">if</text>
  <text xml:space="preserve" x="130" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">score &gt;= 60:</text>
  <rect x="68" y="160" width="744" height="26" rx="3" fill="#0f1a0f"/>
  <text xml:space="preserve" x="124" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">return</text>
  <text xml:space="preserve" x="186" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"pass"</text>
  <rect x="68" y="192" width="744" height="26" rx="3" fill="#1a0f0f"/>
  <text xml:space="preserve" x="100" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">return</text>
  <text xml:space="preserve" x="162" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"fail"</text>
  <text xml:space="preserve" x="540" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555"># 실행 안 됨 (miss)</text>
  <text xml:space="preserve" x="76" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># grade(80)만 테스트 → fail 경로 미커버</text>

  <rect x="60" y="266" width="160" height="24" rx="3" fill="#0f1a0f"/>
  <text x="70" y="284" font-size="12" fill="#55c555">초록 = 실행됨</text>
  <rect x="240" y="266" width="160" height="24" rx="3" fill="#1a0f0f"/>
  <text x="250" y="284" font-size="12" fill="#e05555">빨강 = 누락</text>

  <text x="60" y="320" font-size="13" fill="#888" xml:space="preserve">커버리지는 테스트가 어떤 코드 줄을 건드렸는지 백분율로 알려 준다.</text>
</svg>
