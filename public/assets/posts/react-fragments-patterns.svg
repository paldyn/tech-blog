<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;background:#0a0a0a">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Fragment 사용 패턴</text>
  <text x="440" y="72" font-size="14" fill="#888" text-anchor="middle">단축 문법과 key 필요 시 전체 문법</text>

  <!-- Short syntax -->
  <rect x="55" y="95" width="370" height="310" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="118" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">단축 문법 &lt;&gt;...&lt;/&gt;</text>

  <rect x="70" y="128" width="340" height="82" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="148" font-size="12" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// 가장 일반적인 형태</text>
  <text x="82" y="166" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">function</text>
  <text x="125" y="166" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> Component() {</text>
  <text x="82" y="184" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">  return</text>
  <text x="126" y="184" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> (</text>
  <text x="82" y="202" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">    &lt;&gt;&lt;h1/&gt;&lt;p/&gt;&lt;/&gt;</text>
  <text x="82" y="202" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">  )</text>

  <rect x="70" y="228" width="340" height="64" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="248" font-size="12" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// 장점: 간결, import 불필요</text>
  <text x="82" y="266" font-size="13" fill="#55c555" font-family="'JetBrains Mono',monospace" xml:space="preserve">// 단점: key prop 사용 불가</text>
  <text x="82" y="284" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// (map 안에서 사용 불가)</text>

  <text x="240" y="322" font-size="13" fill="#888" text-anchor="middle">빈 태그처럼 보이지만 DOM에는</text>
  <text x="240" y="340" font-size="13" fill="#888" text-anchor="middle">아무 요소도 추가하지 않는다</text>
  <rect x="100" y="352" width="280" height="38" rx="5" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="376" font-size="13" fill="#888" text-anchor="middle">React.Fragment === &lt;&gt;...&lt;/&gt;</text>

  <!-- Full syntax -->
  <rect x="455" y="95" width="370" height="310" rx="8" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="118" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">전체 문법 — key 사용 가능</text>

  <rect x="470" y="128" width="340" height="135" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="148" font-size="12" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// map에서 key 지정 시</text>
  <text x="482" y="166" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">data.map(item =&gt; (</text>
  <text x="482" y="184" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">  &lt;React.Fragment</text>
  <text x="482" y="202" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">    key</text>
  <text x="510" y="202" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">={item.id}</text>
  <text x="482" y="220" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">  &gt;</text>
  <text x="482" y="238" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">    &lt;dt&gt;{item.term}&lt;/dt&gt;</text>
  <text x="482" y="256" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">    &lt;dd&gt;{item.desc}&lt;/dd&gt;</text>

  <rect x="470" y="278" width="340" height="100" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="298" font-size="12" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// import 방법</text>
  <text x="482" y="316" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">import</text>
  <text x="523" y="316" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> { Fragment }</text>
  <text x="482" y="334" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">  from</text>
  <text x="518" y="334" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve"> 'react'</text>
  <text x="482" y="352" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// &lt;Fragment key={...}&gt;</text>
  <text x="482" y="370" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// 도 동일하게 작동</text>
</svg>
