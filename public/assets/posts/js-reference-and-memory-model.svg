<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">값 복사 vs 참조 복사 — 메모리 모델</text>

  <!-- Stack section -->
  <rect x="60" y="72" width="340" height="280" fill="#111827" rx="8" stroke="#1e2433"/>
  <text x="230" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">스택 (Stack)</text>
  <text x="230" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">원시값 직접 저장</text>

  <!-- Stack variables -->
  <rect x="90" y="138" width="280" height="36" fill="#0d1a2d" rx="4" stroke="#2a3a5a"/>
  <text x="110" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">a</text>
  <text x="280" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" text-anchor="middle">42</text>
  <text x="350" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" text-anchor="end">number</text>

  <rect x="90" y="182" width="280" height="36" fill="#0d1a2d" rx="4" stroke="#2a3a5a"/>
  <text x="110" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">b</text>
  <text x="280" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" text-anchor="middle">42</text>
  <text x="350" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" text-anchor="end">복사됨</text>

  <rect x="90" y="226" width="280" height="36" fill="#0d1a2d" rx="4" stroke="#2a3a5a"/>
  <text x="110" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">str</text>
  <text x="280" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" text-anchor="middle">"hello"</text>
  <text x="350" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" text-anchor="end">string</text>

  <rect x="90" y="270" width="280" height="36" fill="#1a2d1a" rx="4" stroke="#2a5a2a"/>
  <text x="110" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">obj</text>
  <text x="230" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">→ 0x4A2F</text>
  <text x="350" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" text-anchor="end">ref</text>

  <rect x="90" y="314" width="280" height="36" fill="#1a2d1a" rx="4" stroke="#2a5a2a"/>
  <text x="110" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">obj2</text>
  <text x="230" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">→ 0x4A2F</text>
  <text x="350" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" text-anchor="end">같은 ref</text>

  <!-- Heap section -->
  <rect x="480" y="72" width="340" height="280" fill="#111827" rx="8" stroke="#1e2433"/>
  <text x="650" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">힙 (Heap)</text>
  <text x="650" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">객체 실체 저장</text>

  <rect x="510" y="240" width="280" height="80" fill="#0d2d1a" rx="6" stroke="#2a5a2a"/>
  <text x="650" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">0x4A2F</text>
  <text x="530" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">{ name: "Alice", age: 30 }</text>
  <text x="650" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">obj와 obj2가 같은 객체 참조</text>

  <!-- Arrow from stack obj to heap -->
  <line x1="370" y1="282" x2="420" y2="282" stroke="#55c555" stroke-width="2"/>
  <polygon points="420,277 435,282 420,287" fill="#55c555"/>
  <line x1="370" y1="326" x2="420" y2="282" stroke="#55c555" stroke-width="2" stroke-dasharray="4,2"/>
  <polygon points="420,277 435,282 420,287" fill="#55c555"/>

  <!-- Code bottom -->
  <text x="60" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">참조 복사의 함정</text>
  <rect x="60" y="400" width="760" height="78" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="80" y="424" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">const</text><text x="120" y="424" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> obj = { name: </text><text x="246" y="424" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">"Alice"</text><text x="294" y="424" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> };</text>
  <text x="80" y="442" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">const</text><text x="120" y="442" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> obj2 = obj;           </text><text x="296" y="442" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">// 참조 복사 (얕은 복사)</text>
  <text x="80" y="460" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">obj2.name = </text><text x="182" y="460" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">"Bob"</text><text x="218" y="460" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">;        </text><text x="296" y="460" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">// obj.name도 "Bob" 됨!</text>
  <text x="80" y="478" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">obj === obj2;          </text><text x="296" y="478" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">// true (같은 참조)</text>

  <!-- Footer -->
  <text x="440" y="502" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN — JavaScript 완전 정복</text>
</svg>
