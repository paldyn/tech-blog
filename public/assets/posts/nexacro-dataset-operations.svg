<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <defs>
    <linearGradient id="hdrOps" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2a1a3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#180f28;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>

  <!-- Header -->
  <rect x="0" y="0" width="880" height="64" rx="12" fill="url(#hdrOps)"/>
  <rect x="0" y="52" width="880" height="12" fill="url(#hdrOps)"/>
  <text x="44" y="38" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#e8e8e8">Nexacro N — Dataset 핵심 메서드</text>
  <text x="44" y="54" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="12" fill="#555">읽기 · 쓰기 · 행 추가/삭제 · 검색 · 필터 — 자주 쓰는 API 한눈에</text>

  <!-- Read Operations -->
  <rect x="44" y="82" width="248" height="264" rx="10" fill="#111" stroke="#8844ff" stroke-width="1.2"/>
  <rect x="44" y="82" width="248" height="34" rx="10" fill="#2a1a4a"/>
  <rect x="44" y="104" width="248" height="12" fill="#2a1a4a"/>
  <text x="168" y="104" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#cc88ff" text-anchor="middle">읽기 (Read)</text>

  <text x="64" y="130" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#555">행+열 인덱스로 값 읽기</text>
  <rect x="64" y="136" width="212" height="20" rx="3" fill="#1a1022"/>
  <text x="74" y="150" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#cc88ff">getColumn(nRow, "colId")</text>

  <text x="64" y="170" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#555">열 이름으로 인덱스 획득</text>
  <rect x="64" y="176" width="212" height="20" rx="3" fill="#1a1022"/>
  <text x="74" y="190" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#cc88ff">getColIndex("colId")</text>

  <text x="64" y="210" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#555">현재 행(rowposition) 값 읽기</text>
  <rect x="64" y="216" width="212" height="20" rx="3" fill="#1a1022"/>
  <text x="74" y="230" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#cc88ff">getColumn(ds.rowposition, "id")</text>

  <text x="64" y="250" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#555">총 행수 / 열수</text>
  <rect x="64" y="256" width="212" height="20" rx="3" fill="#1a1022"/>
  <text x="74" y="270" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#cc88ff">ds.rowcount  /  ds.colcount</text>

  <text x="64" y="292" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#555">전체 초기화</text>
  <rect x="64" y="298" width="212" height="20" rx="3" fill="#1a1022"/>
  <text x="74" y="312" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#cc88ff">ds.clearData()  /  ds.clear()</text>

  <text x="64" y="332" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#555">SaveType 확인</text>
  <rect x="64" y="338" width="212" height="20" rx="3" fill="#1a1022"/>
  <text x="74" y="352" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#cc88ff">ds.getRowSaveType(nRow)</text>

  <!-- Write Operations -->
  <rect x="316" y="82" width="248" height="264" rx="10" fill="#111" stroke="#4aff9e" stroke-width="1.2"/>
  <rect x="316" y="82" width="248" height="34" rx="10" fill="#1a3a2a"/>
  <rect x="316" y="104" width="248" height="12" fill="#1a3a2a"/>
  <text x="440" y="104" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#4aff9e" text-anchor="middle">쓰기 / 행 조작 (Write)</text>

  <text x="336" y="130" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#555">값 쓰기 (SaveType → U)</text>
  <rect x="336" y="136" width="212" height="20" rx="3" fill="#0d1a11"/>
  <text x="346" y="150" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#4aff9e">setColumn(nRow, "colId", val)</text>

  <text x="336" y="170" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#555">행 추가 (SaveType → I)</text>
  <rect x="336" y="176" width="212" height="20" rx="3" fill="#0d1a11"/>
  <text x="346" y="190" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#4aff9e">addRow() → 행 인덱스 반환</text>

  <text x="336" y="210" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#555">특정 위치에 행 삽입</text>
  <rect x="336" y="216" width="212" height="20" rx="3" fill="#0d1a11"/>
  <text x="346" y="230" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#4aff9e">insertRow(nRow)</text>

  <text x="336" y="250" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#555">행 삭제 표시 (SaveType → D)</text>
  <rect x="336" y="256" width="212" height="20" rx="3" fill="#0d1a11"/>
  <text x="346" y="270" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#ff8888">deleteRow(nRow)</text>

  <text x="336" y="292" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#555">행 영구 제거 (서버 전송 안됨)</text>
  <rect x="336" y="298" width="212" height="20" rx="3" fill="#0d1a11"/>
  <text x="346" y="312" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#ffaa44">removeRow(nRow)</text>

  <text x="336" y="332" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#555">현재 행 포인터 이동</text>
  <rect x="336" y="338" width="212" height="20" rx="3" fill="#0d1a11"/>
  <text x="346" y="352" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#4aff9e">ds.rowposition = nRow</text>

  <!-- Search/Filter Operations -->
  <rect x="588" y="82" width="248" height="264" rx="10" fill="#111" stroke="#ffaa44" stroke-width="1.2"/>
  <rect x="588" y="82" width="248" height="34" rx="10" fill="#3a2a1a"/>
  <rect x="588" y="104" width="248" height="12" fill="#3a2a1a"/>
  <text x="712" y="104" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#ffaa44" text-anchor="middle">검색 / 필터 (Search)</text>

  <text x="608" y="130" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#555">특정 값 가진 행 인덱스 찾기</text>
  <rect x="608" y="136" width="212" height="20" rx="3" fill="#1a1100"/>
  <text x="618" y="150" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#ffcc88">findRow("colId", value)</text>

  <text x="608" y="170" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#555">조건식으로 행 찾기</text>
  <rect x="608" y="176" width="212" height="20" rx="3" fill="#1a1100"/>
  <text x="618" y="190" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#ffcc88">findRowExpr("age >= 30")</text>

  <text x="608" y="210" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#555">필터 적용 (조건 행만 표시)</text>
  <rect x="608" y="216" width="212" height="20" rx="3" fill="#1a1100"/>
  <text x="618" y="230" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#ffcc88">ds.filter("deptCd == 'D001'")</text>

  <text x="608" y="250" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#555">필터 해제</text>
  <rect x="608" y="256" width="212" height="20" rx="3" fill="#1a1100"/>
  <text x="618" y="270" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#ffcc88">ds.filter("")</text>

  <text x="608" y="292" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#555">정렬</text>
  <rect x="608" y="298" width="212" height="20" rx="3" fill="#1a1100"/>
  <text x="618" y="312" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#ffcc88">ds.keystring = "salary:D"</text>

  <text x="608" y="332" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#555">삭제된 행 수 / 전체 반환</text>
  <rect x="608" y="338" width="212" height="20" rx="3" fill="#1a1100"/>
  <text x="618" y="352" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#ffcc88">getDeletedRowCount()</text>

  <!-- Footer -->
  <text x="836" y="370" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#333" text-anchor="end">PALDYN · Nexacro N 시리즈</text>
</svg>
