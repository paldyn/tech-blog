<svg xmlns="http://www.w3.org/2000/svg" width="880" height="470" viewBox="0 0 880 470">
  <rect width="880" height="470" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">JVM 바이트코드 명령어 6대 분류</text>

  <!-- ===== ROW 1 ===== -->

  <!-- Cell 1: 로드·스토어 (x=60, y=68) -->
  <rect x="60" y="68" width="240" height="172" fill="#0d1117" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="180" y="90" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7ec8e3">① 로드·스토어</text>
  <line x1="69" y1="100" x2="291" y2="100" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="69" y="106" width="222" height="128" fill="#000000" rx="4" stroke="#3a4a6e"/>
  <text x="81" y="124" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3">iload_0  iload_1  iload</text>
  <text x="81" y="142" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3">istore_0  istore_1</text>
  <text x="81" y="160" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3">aload_0  astore</text>
  <text x="81" y="178" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3">ldc  ldc_w  ldc2_w</text>
  <text x="81" y="196" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8">; 로컬 변수 ↔ 스택</text>
  <text x="81" y="214" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8">; 상수 풀 →  스택</text>

  <!-- Cell 2: 산술·논리 (x=320, y=68) -->
  <rect x="320" y="68" width="240" height="172" fill="#0d1117" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="90" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#55c555">② 산술·논리</text>
  <line x1="329" y1="100" x2="551" y2="100" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="329" y="106" width="222" height="128" fill="#000000" rx="4" stroke="#3a4a6e"/>
  <text x="341" y="124" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#55c555">iadd  isub  imul  idiv</text>
  <text x="341" y="142" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#55c555">irem  ineg  iinc</text>
  <text x="341" y="160" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#55c555">iand  ior  ixor</text>
  <text x="341" y="178" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#55c555">ishl  ishr  iushr</text>
  <text x="341" y="196" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8">; l/f/d 접두사 변형</text>
  <text x="341" y="214" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8">; (ladd fadd dadd …)</text>

  <!-- Cell 3: 타입 변환 (x=580, y=68) -->
  <rect x="580" y="68" width="240" height="172" fill="#0d1117" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="700" y="90" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7777cc">③ 타입 변환</text>
  <line x1="589" y1="100" x2="811" y2="100" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="589" y="106" width="222" height="128" fill="#000000" rx="4" stroke="#3a4a6e"/>
  <text x="601" y="124" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7777cc">i2l  i2f  i2d</text>
  <text x="601" y="142" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7777cc">l2i  f2i  d2i</text>
  <text x="601" y="160" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7777cc">i2b  i2c  i2s</text>
  <text x="601" y="178" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7777cc">checkcast &lt;type&gt;</text>
  <text x="601" y="196" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7777cc">instanceof &lt;type&gt;</text>
  <text x="601" y="214" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8">; 묵시적/명시적 변환</text>

  <!-- ===== ROW 2 ===== -->

  <!-- Cell 4: 제어 흐름 (x=60, y=258) -->
  <rect x="60" y="258" width="240" height="172" fill="#0d1117" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="180" y="280" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#e05555">④ 제어 흐름</text>
  <line x1="69" y1="290" x2="291" y2="290" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="69" y="296" width="222" height="128" fill="#000000" rx="4" stroke="#3a4a6e"/>
  <text x="81" y="314" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#e05555">goto &lt;offset&gt;</text>
  <text x="81" y="332" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#e05555">if_icmpeq  if_icmpne</text>
  <text x="81" y="350" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#e05555">if_icmplt  if_icmple</text>
  <text x="81" y="368" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#e05555">tableswitch</text>
  <text x="81" y="386" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#e05555">lookupswitch</text>
  <text x="81" y="404" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8">; ifnull / ifnonnull</text>

  <!-- Cell 5: 메서드 호출 (x=320, y=258) -->
  <rect x="320" y="258" width="240" height="172" fill="#0d1117" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="280" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7ec8e3">⑤ 메서드 호출·반환</text>
  <line x1="329" y1="290" x2="551" y2="290" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="329" y="296" width="222" height="128" fill="#000000" rx="4" stroke="#3a4a6e"/>
  <text x="341" y="314" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3">invokevirtual</text>
  <text x="341" y="332" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3">invokespecial</text>
  <text x="341" y="350" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3">invokestatic</text>
  <text x="341" y="368" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3">invokedynamic</text>
  <text x="341" y="386" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3">ireturn  areturn</text>
  <text x="341" y="404" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8">; return (void)</text>

  <!-- Cell 6: 객체·배열 (x=580, y=258) -->
  <rect x="580" y="258" width="240" height="172" fill="#0d1117" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="700" y="280" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#b5cea8">⑥ 객체·배열</text>
  <line x1="589" y1="290" x2="811" y2="290" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="589" y="296" width="222" height="128" fill="#000000" rx="4" stroke="#3a4a6e"/>
  <text x="601" y="314" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#b5cea8">new  dup  dup2</text>
  <text x="601" y="332" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#b5cea8">getfield  putfield</text>
  <text x="601" y="350" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#b5cea8">getstatic  putstatic</text>
  <text x="601" y="368" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#b5cea8">newarray  anewarray</text>
  <text x="601" y="386" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#b5cea8">arraylength</text>
  <text x="601" y="404" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8">; athrow (예외)</text>

  <!-- Caption -->
  <text x="440" y="452" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#6a8aa0">JVM 명세는 약 200개의 opcode를 정의 — 타입별 변형(i/l/f/d/a)으로 실제 수는 훨씬 많다</text>
</svg>
