<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">DNS 계층 구조</text>
  <text x="440" y="64" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">루트 → TLD → 2차 도메인 → 서브도메인</text>

  <!-- Root -->
  <rect x="370" y="80" width="140" height="44" rx="6" fill="#0f1a0f" stroke="#2a5a2a" stroke-width="1.5"/>
  <text x="440" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">루트 (.) </text>
  <text x="440" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">13개 루트 클러스터</text>

  <!-- TLD level -->
  <line x1="300" y1="124" x2="220" y2="150" stroke="#333" stroke-width="1"/>
  <line x1="440" y1="124" x2="440" y2="150" stroke="#333" stroke-width="1"/>
  <line x1="580" y1="124" x2="660" y2="150" stroke="#333" stroke-width="1"/>

  <rect x="140" y="150" width="100" height="44" rx="6" fill="#1a1a0a" stroke="#5a5a1a" stroke-width="1"/>
  <text x="190" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e0c055">.com</text>
  <text x="190" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">gTLD</text>

  <rect x="390" y="150" width="100" height="44" rx="6" fill="#1a1a0a" stroke="#5a5a1a" stroke-width="1"/>
  <text x="440" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e0c055">.kr</text>
  <text x="440" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">ccTLD</text>

  <rect x="610" y="150" width="120" height="44" rx="6" fill="#1a1a0a" stroke="#5a5a1a" stroke-width="1"/>
  <text x="670" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e0c055">.io / .dev</text>
  <text x="670" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">신규 gTLD</text>

  <!-- 2nd level -->
  <line x1="190" y1="194" x2="140" y2="220" stroke="#333" stroke-width="1"/>
  <line x1="190" y1="194" x2="260" y2="220" stroke="#333" stroke-width="1"/>
  <line x1="440" y1="194" x2="440" y2="220" stroke="#333" stroke-width="1"/>
  <line x1="670" y1="194" x2="670" y2="220" stroke="#333" stroke-width="1"/>

  <rect x="70" y="220" width="130" height="44" rx="6" fill="#0f0f1a" stroke="#2a2a5a" stroke-width="1"/>
  <text x="135" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">google.com</text>
  <text x="135" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">2차 도메인</text>

  <rect x="210" y="220" width="130" height="44" rx="6" fill="#0f0f1a" stroke="#2a2a5a" stroke-width="1"/>
  <text x="275" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">example.com</text>
  <text x="275" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">2차 도메인</text>

  <rect x="370" y="220" width="130" height="44" rx="6" fill="#0f0f1a" stroke="#2a2a5a" stroke-width="1"/>
  <text x="435" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">naver.co.kr</text>
  <text x="435" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">co.kr 하위</text>

  <rect x="600" y="220" width="130" height="44" rx="6" fill="#0f0f1a" stroke="#2a2a5a" stroke-width="1"/>
  <text x="665" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">paldyn.dev</text>
  <text x="665" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">2차 도메인</text>

  <!-- Subdomain level -->
  <line x1="275" y1="264" x2="230" y2="290" stroke="#333" stroke-width="1"/>
  <line x1="275" y1="264" x2="320" y2="290" stroke="#333" stroke-width="1"/>

  <rect x="170" y="290" width="110" height="44" rx="6" fill="#1a0a0a" stroke="#5a2a2a" stroke-width="1"/>
  <text x="225" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">www.</text>
  <text x="225" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">서브도메인</text>

  <rect x="290" y="290" width="110" height="44" rx="6" fill="#1a0a0a" stroke="#5a2a2a" stroke-width="1"/>
  <text x="345" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">api.</text>
  <text x="345" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">서브도메인</text>

  <!-- Right side: full domain name explanation -->
  <rect x="740" y="80" width="100" height="280" rx="6" fill="#0a0a14" stroke="#2a2a5a" stroke-width="1"/>
  <text x="790" y="104" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">FQDN</text>
  <text x="790" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">www</text>
  <text x="790" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">.</text>
  <text x="790" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">example</text>
  <text x="790" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">.</text>
  <text x="790" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e0c055">com</text>
  <text x="790" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">.</text>
  <text x="790" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">(루트)</text>
  <text x="790" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">오른쪽에서</text>
  <text x="790" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">왼쪽으로</text>
  <text x="790" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">계층 탐색</text>
  <text x="790" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">↑</text>
  <text x="790" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">위임(NS)</text>
</svg>
