<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">스택 응용: 괄호 검사 &amp; 함수 호출 스택</text>

  <!-- ─── LEFT PANEL: Bracket matching ─── -->
  <text x="210" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">괄호 유효성 검사</text>

  <!-- input string -->
  <rect x="60" y="88" width="300" height="44" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="107" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">입력: </text>
  <text x="120" y="107" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#ce9178" xml:space="preserve">"({[]})"</text>
  <text x="76" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555" xml:space="preserve">→ 유효 (Valid)</text>

  <!-- step by step -->
  <text x="60" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">처리 흐름 (왼쪽→오른쪽):</text>

  <!-- char boxes -->
  <rect x="60"  y="164" width="40" height="36" rx="4" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="80"  y="187" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#7ec8e3">(</text>

  <rect x="107" y="164" width="40" height="36" rx="4" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="127" y="187" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#7ec8e3">{</text>

  <rect x="154" y="164" width="40" height="36" rx="4" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="174" y="187" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#7ec8e3">[</text>

  <rect x="201" y="164" width="40" height="36" rx="4" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="221" y="187" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#e05555">]</text>

  <rect x="248" y="164" width="40" height="36" rx="4" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="268" y="187" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#e05555">}</text>

  <rect x="295" y="164" width="40" height="36" rx="4" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="315" y="187" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#e05555">)</text>

  <!-- action labels -->
  <text x="80"  y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">push</text>
  <text x="127" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">push</text>
  <text x="174" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">push</text>
  <text x="221" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">pop+match</text>
  <text x="268" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">pop+match</text>
  <text x="315" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">pop+match</text>

  <!-- stack states -->
  <text x="60" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">스택 상태:</text>

  <rect x="60" y="250" width="300" height="70" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">  (   →  [(]</text>
  <text x="76" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">  {   →  [(, {]</text>
  <text x="76" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">  [   →  [(, {, []</text>

  <rect x="60" y="328" width="300" height="70" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">  ]  pop [ → match!</text>
  <text x="76" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">  }  pop { → match!</text>
  <text x="76" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">  )  pop ( → match!</text>

  <rect x="60" y="406" width="300" height="36" rx="6" fill="#0d1f0d" stroke="#1a4a1a" stroke-width="1"/>
  <text x="76" y="429" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600" xml:space="preserve">스택 비어있음 → 유효!</text>

  <!-- ─── RIGHT PANEL: Call Stack ─── -->
  <text x="660" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">함수 호출 스택</text>

  <!-- code snippet -->
  <rect x="480" y="88" width="340" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">def</text>
  <text x="529" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"> main():</text>
  <text x="496" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">    foo()  # 호출</text>
  <text x="496" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">def</text>
  <text x="529" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"> foo():</text>
  <text x="496" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">    bar()  # 호출</text>
  <text x="496" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">    ...</text>

  <!-- call stack visualization -->
  <rect x="580" y="202" width="200" height="240" rx="6" fill="none" stroke="#3a4a6e" stroke-width="2"/>
  <line x1="580" y1="440" x2="780" y2="440" stroke="#3a4a6e" stroke-width="3"/>

  <rect x="586" y="386" width="188" height="48" rx="4" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="680" y="406" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">main()</text>
  <text x="680" y="424" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888">반환 주소·지역 변수</text>

  <rect x="586" y="330" width="188" height="48" rx="4" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="680" y="350" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">foo()</text>
  <text x="680" y="368" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888">반환 주소·지역 변수</text>

  <rect x="586" y="274" width="188" height="48" rx="4" fill="#2a1a4a" stroke="#5a3a8a" stroke-width="2"/>
  <text x="680" y="294" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">bar()   ← TOP</text>
  <text x="680" y="312" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888">현재 실행 중</text>

  <rect x="586" y="210" width="188" height="56" rx="4" fill="none" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="680" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#444">다음 호출 공간</text>

  <text x="480" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">bar() 종료 시 pop → foo() 재개, foo() 종료 → main() 재개</text>
</svg>
