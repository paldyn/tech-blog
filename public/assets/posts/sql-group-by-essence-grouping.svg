<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">GROUP BY — 데이터를 묶는 원리</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">행 → 그룹 변환과 집계 컬럼 규칙</text>

  <!-- Raw data -->
  <rect x="60" y="90" width="230" height="300" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="175" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">원본 데이터 (6행)</text>
  <rect x="60" y="122" width="230" height="22" rx="4" fill="#0f1a2e"/>
  <text x="108" y="137" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">country</text>
  <text x="220" y="137" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">amount</text>
  <line x1="60" y1="144" x2="290" y2="144" stroke="#1e2433" stroke-width="1"/>
  <!-- rows -->
  <rect x="61" y="145" width="228" height="18" rx="2" fill="#1e3a1e" fill-opacity="0.4"/>
  <text x="108" y="158" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">KR</text>
  <text x="220" y="158" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">5000</text>
  <line x1="60" y1="163" x2="290" y2="163" stroke="#1e2433" stroke-width="1"/>
  <rect x="61" y="163" width="228" height="18" rx="2" fill="#1e2a3a" fill-opacity="0.4"/>
  <text x="108" y="176" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">US</text>
  <text x="220" y="176" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">8000</text>
  <line x1="60" y1="181" x2="290" y2="181" stroke="#1e2433" stroke-width="1"/>
  <rect x="61" y="181" width="228" height="18" rx="2" fill="#1e3a1e" fill-opacity="0.4"/>
  <text x="108" y="194" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">KR</text>
  <text x="220" y="194" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">3000</text>
  <line x1="60" y1="199" x2="290" y2="199" stroke="#1e2433" stroke-width="1"/>
  <rect x="61" y="199" width="228" height="18" rx="2" fill="#2a1e3a" fill-opacity="0.4"/>
  <text x="108" y="212" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc">JP</text>
  <text x="220" y="212" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">6000</text>
  <line x1="60" y1="217" x2="290" y2="217" stroke="#1e2433" stroke-width="1"/>
  <rect x="61" y="217" width="228" height="18" rx="2" fill="#1e2a3a" fill-opacity="0.4"/>
  <text x="108" y="230" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">US</text>
  <text x="220" y="230" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">4000</text>
  <line x1="60" y1="235" x2="290" y2="235" stroke="#1e2433" stroke-width="1"/>
  <rect x="61" y="235" width="228" height="18" rx="2" fill="#1e3a1e" fill-opacity="0.4"/>
  <text x="108" y="248" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">KR</text>
  <text x="220" y="248" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">7000</text>

  <!-- Arrow -->
  <line x1="310" y1="240" x2="350" y2="240" stroke="#7777cc" stroke-width="2.5"/>
  <polygon points="350,232 366,240 350,248" fill="#7777cc"/>
  <text x="328" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">GROUP BY</text>
  <text x="328" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">country</text>

  <!-- Grouped data -->
  <rect x="370" y="90" width="230" height="300" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="485" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">그룹 (3개)</text>
  <!-- KR group -->
  <rect x="382" y="124" width="206" height="72" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="485" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">KR 그룹</text>
  <text x="485" y="160" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">5000, 3000, 7000</text>
  <text x="485" y="178" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">→ SUM = 15000</text>
  <!-- US group -->
  <rect x="382" y="208" width="206" height="60" rx="6" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="485" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">US 그룹</text>
  <text x="485" y="244" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">8000, 4000</text>
  <text x="485" y="260" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">→ SUM = 12000</text>
  <!-- JP group -->
  <rect x="382" y="280" width="206" height="48" rx="6" fill="#1e1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="485" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">JP 그룹</text>
  <text x="485" y="318" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">6000 → SUM = 6000</text>

  <!-- Arrow 2 -->
  <line x1="618" y1="240" x2="656" y2="240" stroke="#55c555" stroke-width="2.5"/>
  <polygon points="656,232 672,240 656,248" fill="#55c555"/>
  <text x="637" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">집계</text>

  <!-- Result table -->
  <rect x="676" y="90" width="164" height="300" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="758" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">결과 (3행)</text>
  <rect x="676" y="122" width="164" height="22" rx="4" fill="#0f1a2e"/>
  <text x="726" y="137" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">country</text>
  <text x="810" y="137" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">total</text>
  <line x1="676" y1="144" x2="840" y2="144" stroke="#1e2433" stroke-width="1"/>
  <text x="726" y="162" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">KR</text>
  <text x="810" y="162" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">15000</text>
  <line x1="676" y1="168" x2="840" y2="168" stroke="#1e2433" stroke-width="1"/>
  <text x="726" y="186" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">US</text>
  <text x="810" y="186" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">12000</text>
  <line x1="676" y1="192" x2="840" y2="192" stroke="#1e2433" stroke-width="1"/>
  <text x="726" y="210" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc">JP</text>
  <text x="810" y="210" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">6000</text>

  <!-- Query -->
  <rect x="60" y="406" width="760" height="60" rx="8" fill="#070b14" stroke="#1e2433"/>
  <text x="80" y="426" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">SELECT country, SUM(amount) AS total</text>
  <text x="80" y="450" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">FROM orders</text>
  <text x="80" y="450" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">FROM orders   GROUP BY country   ORDER BY total DESC;</text>

  <!-- Footer -->
  <text x="440" y="484" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · SQL 완전 정복</text>
</svg>
