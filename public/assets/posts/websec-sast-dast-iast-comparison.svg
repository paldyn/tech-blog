<svg xmlns="http://www.w3.org/2000/svg" width="880" height="470" viewBox="0 0 880 470">
  <rect width="880" height="470" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SAST vs DAST vs IAST</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">코드를 보는가, 실행을 보는가, 둘 다 보는가</text>

  <!-- SAST column -->
  <rect x="50" y="100" width="240" height="310" rx="10" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="170" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">SAST</text>
  <text x="170" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Static — 소스 코드 분석</text>
  <line x1="74" y1="170" x2="266" y2="170" stroke="#26334d" stroke-width="1"/>
  <text x="170" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">화이트박스 · 실행 불필요</text>
  <text x="170" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">개발 초기(PR)부터 적용</text>
  <text x="170" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">파일·라인 단위로 위치 특정</text>
  <text x="170" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">언어별 도구 필요</text>
  <line x1="74" y1="282" x2="266" y2="282" stroke="#26334d" stroke-width="1"/>
  <text x="170" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#55c555" text-anchor="middle">강점: 빠른 피드백 · 저렴</text>
  <text x="170" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e05555" text-anchor="middle">약점: 오탐 많음 · 설정 오류 못 봄</text>
  <line x1="74" y1="348" x2="266" y2="348" stroke="#26334d" stroke-width="1"/>
  <text x="170" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">Semgrep · CodeQL</text>
  <text x="170" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">SonarQube · Checkmarx</text>

  <!-- DAST column -->
  <rect x="320" y="100" width="240" height="310" rx="10" fill="#2a1a10" stroke="#e0a555" stroke-width="2"/>
  <text x="440" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e0a555" text-anchor="middle">DAST</text>
  <text x="440" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Dynamic — 실행 중 외부 공격</text>
  <line x1="344" y1="170" x2="536" y2="170" stroke="#4d3926" stroke-width="1"/>
  <text x="440" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">블랙박스 · 실행 환경 필요</text>
  <text x="440" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">공격자와 같은 시점에서 관찰</text>
  <text x="440" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">언어 무관 · 설정 오류 탐지</text>
  <text x="440" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">스테이징/QA 단계에 적합</text>
  <line x1="344" y1="282" x2="536" y2="282" stroke="#4d3926" stroke-width="1"/>
  <text x="440" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#55c555" text-anchor="middle">강점: 실증된 결과 · 오탐 적음</text>
  <text x="440" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e05555" text-anchor="middle">약점: 늦은 발견 · 위치 특정 어려움</text>
  <line x1="344" y1="348" x2="536" y2="348" stroke="#4d3926" stroke-width="1"/>
  <text x="440" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">OWASP ZAP · Burp Suite</text>
  <text x="440" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">Nuclei · Nikto</text>

  <!-- IAST column -->
  <rect x="590" y="100" width="240" height="310" rx="10" fill="#1a102a" stroke="#7777cc" stroke-width="2"/>
  <text x="710" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7777cc" text-anchor="middle">IAST</text>
  <text x="710" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Interactive — 내부 계측 에이전트</text>
  <line x1="614" y1="170" x2="806" y2="170" stroke="#33264d" stroke-width="1"/>
  <text x="710" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">그레이박스 · 앱 내부에서 관찰</text>
  <text x="710" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">테스트 트래픽 위에서 동작</text>
  <text x="710" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">요청 → 코드 경로 연결 제공</text>
  <text x="710" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">런타임(JVM 등) 에이전트 설치</text>
  <line x1="614" y1="282" x2="806" y2="282" stroke="#33264d" stroke-width="1"/>
  <text x="710" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#55c555" text-anchor="middle">강점: 정확도 + 위치 특정 동시</text>
  <text x="710" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e05555" text-anchor="middle">약점: 커버리지가 테스트에 의존</text>
  <line x1="614" y1="348" x2="806" y2="348" stroke="#33264d" stroke-width="1"/>
  <text x="710" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">Contrast Security</text>
  <text x="710" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">Seeker · Datadog ASM 계열</text>

  <text x="440" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">셋은 경쟁 관계가 아니라 서로 다른 사각지대를 메우는 보완 관계다</text>
</svg>
