<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-right" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-left" viewBox="0 0 14 14" refX="2" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 14 0 L 1 7 L 14 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-bl" viewBox="0 0 14 14" refX="2" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 14 0 L 1 7 L 14 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-br" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">덱 (Deque) — 양끝 삽입·삭제 O(1)</text>

  <!-- ─── Deque visualization ─── -->
  <rect x="140" y="68" width="600" height="72" rx="8" fill="#0d1020" stroke="#2a3a5e" stroke-width="2"/>

  <!-- cells -->
  <rect x="150" y="78" width="110" height="52" rx="6" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="205" y="109" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="18" font-weight="600" fill="#e8e8e8">10</text>

  <rect x="268" y="78" width="110" height="52" rx="6" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="323" y="109" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="18" font-weight="600" fill="#e8e8e8">20</text>

  <rect x="386" y="78" width="110" height="52" rx="6" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="441" y="109" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="18" font-weight="600" fill="#e8e8e8">30</text>

  <rect x="504" y="78" width="110" height="52" rx="6" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="559" y="109" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="18" font-weight="600" fill="#e8e8e8">40</text>

  <rect x="622" y="78" width="110" height="52" rx="6" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="677" y="109" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="18" font-weight="600" fill="#e8e8e8">50</text>

  <!-- left operations -->
  <!-- appendleft -->
  <line x1="60" y1="84" x2="144" y2="100" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#arr-right)"/>
  <text x="55" y="79" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">appendleft(5)</text>
  <!-- popleft -->
  <line x1="148" y1="116" x2="64" y2="132" stroke="#e05555" stroke-width="2.5" marker-end="url(#arr-left)"/>
  <text x="55" y="147" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">popleft()</text>

  <!-- right operations -->
  <!-- append -->
  <line x1="820" y1="84" x2="736" y2="100" stroke="#55c555" stroke-width="2.5" marker-end="url(#arr-bl)"/>
  <text x="825" y="79" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">append(60)</text>
  <!-- pop -->
  <line x1="732" y1="116" x2="816" y2="132" stroke="#7777cc" stroke-width="2.5" marker-end="url(#arr-br)"/>
  <text x="825" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">pop()</text>

  <!-- head / tail labels -->
  <text x="205" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">← HEAD (front)</text>
  <text x="677" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">TAIL (rear) →</text>

  <!-- ─── Operations table ─── -->
  <rect x="60" y="172" width="760" height="172" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <!-- header -->
  <text x="76" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">연산</text>
  <text x="280" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">동작</text>
  <text x="600" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">복잡도</text>
  <line x1="76" y1="202" x2="804" y2="202" stroke="#2a3a5e" stroke-width="1"/>

  <text x="76"  y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">appendleft(x)</text>
  <text x="280" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">왼쪽(앞)에 x 삽입</text>
  <text x="600" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">O(1)</text>

  <text x="76"  y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" font-weight="600">popleft()</text>
  <text x="280" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">왼쪽(앞) 원소 제거 후 반환</text>
  <text x="600" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">O(1)</text>

  <text x="76"  y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">append(x)</text>
  <text x="280" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">오른쪽(뒤)에 x 삽입</text>
  <text x="600" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">O(1)</text>

  <text x="76"  y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc" font-weight="600">pop()</text>
  <text x="280" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">오른쪽(뒤) 원소 제거 후 반환</text>
  <text x="600" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">O(1)</text>

  <text x="76"  y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">deque[i]</text>
  <text x="280" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">임의 인덱스 접근</text>
  <text x="600" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" font-weight="600">O(n)</text>

  <!-- ─── Use cases ─── -->
  <rect x="60" y="358" width="370" height="98" rx="8" fill="#0d1020" stroke="#2a3a5e" stroke-width="1"/>
  <text x="245" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">덱이 적합한 경우</text>
  <text x="76" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 슬라이딩 윈도우 최솟값/최댓값</text>
  <text x="76" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 팰린드롬 검사 (양끝 비교)</text>
  <text x="76" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• BFS + 스택 역할 동시에 (0-1 BFS)</text>

  <rect x="450" y="358" width="370" height="98" rx="8" fill="#0d1020" stroke="#2a3a5e" stroke-width="1"/>
  <text x="635" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">vs 큐 / 스택</text>
  <text x="466" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 큐로 쓰려면 append + popleft</text>
  <text x="466" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 스택으로 쓰려면 append + pop</text>
  <text x="466" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• Python list는 popleft가 O(n)</text>
</svg>
