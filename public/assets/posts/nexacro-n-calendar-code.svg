  <!-- Line 6 y=181 -->
  <text x="76" y="181" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#e8e8e8">    <tspan fill="#7ec8e3">var</tspan><tspan> sM = sDate.substr(</tspan><tspan fill="#b5cea8">4</tspan><tspan>, </tspan><tspan fill="#b5cea8">2</tspan><tspan>);</tspan></text>

  <!-- Line 7 y=199 -->
