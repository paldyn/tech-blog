    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#e8e8e8">    <tspan fill="#7ec8e3">var</tspan><tspan> sDate = obj.value;</tspan></text>

  <!-- Line 4 y=145 -->
  <text x="76" y="145" xml:space="preserve"
