<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">라우트 세그먼트 유형</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">폴더 이름 형식에 따른 특수 동작</text>

  <!-- Segment types grid -->
  <!-- Row 1 -->
  <rect x="60" y="90" width="360" height="80" rx="8" fill="#0f1827" stroke="#3b4a6e" stroke-width="1.5"/>
  <text x="80" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#ce9178">folder</text>
  <text x="80" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">일반 라우트 세그먼트</text>
  <text x="80" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">app/about/ → /about</text>

  <rect x="460" y="90" width="360" height="80" rx="8" fill="#0f1827" stroke="#3b4a6e" stroke-width="1.5"/>
  <text x="480" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#ce9178">[folder]</text>
  <text x="480" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">동적 세그먼트 (params.folder)</text>
  <text x="480" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">[slug]/ → /hello, /world ...</text>

  <!-- Row 2 -->
  <rect x="60" y="186" width="360" height="80" rx="8" fill="#101a10" stroke="#2d5a3d" stroke-width="1.5"/>
  <text x="80" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#ce9178">[...folder]</text>
  <text x="80" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">캐치올 세그먼트 (배열로 받음)</text>
  <text x="80" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">[...slug]/ → /a/b/c</text>

  <rect x="460" y="186" width="360" height="80" rx="8" fill="#101a10" stroke="#2d5a3d" stroke-width="1.5"/>
  <text x="480" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#ce9178">[[...folder]]</text>
  <text x="480" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">선택적 캐치올 (0개도 매칭)</text>
  <text x="480" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">[[...slug]]/ → / 및 /a/b/c</text>

  <!-- Row 3 -->
  <rect x="60" y="282" width="360" height="80" rx="8" fill="#1a1020" stroke="#5a2d7a" stroke-width="1.5"/>
  <text x="80" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#ce9178">(folder)</text>
  <text x="80" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">라우트 그룹 (URL에 미포함)</text>
  <text x="80" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7777cc">(marketing)/pricing → /pricing</text>

  <rect x="460" y="282" width="360" height="80" rx="8" fill="#1a1820" stroke="#2d4a7a" stroke-width="1.5"/>
  <text x="480" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#ce9178">_folder</text>
  <text x="480" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">라우팅에서 완전히 제외</text>
  <text x="480" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">_components/ → URL 없음</text>
</svg>
