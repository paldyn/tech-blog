<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">최대 풀링 vs 평균 풀링</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">2×2 풀링, stride=2 → 공간 크기 절반</text>

  <!-- Input section -->
  <text x="220" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">입력 (4×4)</text>

  <g transform="translate(98, 118)">
    <!-- Row 0 -->
    <rect x="0"   y="0"  width="58" height="58" fill="#1a2535" stroke="#2a3550" stroke-width="1"/>
    <rect x="58"  y="0"  width="58" height="58" fill="#1a2535" stroke="#2a3550" stroke-width="1"/>
    <rect x="116" y="0"  width="58" height="58" fill="#1a2535" stroke="#2a3550" stroke-width="1"/>
    <rect x="174" y="0"  width="58" height="58" fill="#1a2535" stroke="#2a3550" stroke-width="1"/>
    <!-- Row 1 -->
    <rect x="0"   y="58" width="58" height="58" fill="#1a2535" stroke="#2a3550" stroke-width="1"/>
    <rect x="58"  y="58" width="58" height="58" fill="#1a2535" stroke="#2a3550" stroke-width="1"/>
    <rect x="116" y="58" width="58" height="58" fill="#1a2535" stroke="#2a3550" stroke-width="1"/>
    <rect x="174" y="58" width="58" height="58" fill="#1a2535" stroke="#2a3550" stroke-width="1"/>
    <!-- Row 2 -->
    <rect x="0"   y="116" width="58" height="58" fill="#1a2535" stroke="#2a3550" stroke-width="1"/>
    <rect x="58"  y="116" width="58" height="58" fill="#1a2535" stroke="#2a3550" stroke-width="1"/>
    <rect x="116" y="116" width="58" height="58" fill="#1a2535" stroke="#2a3550" stroke-width="1"/>
    <rect x="174" y="116" width="58" height="58" fill="#1a2535" stroke="#2a3550" stroke-width="1"/>
    <!-- Row 3 -->
    <rect x="0"   y="174" width="58" height="58" fill="#1a2535" stroke="#2a3550" stroke-width="1"/>
    <rect x="58"  y="174" width="58" height="58" fill="#1a2535" stroke="#2a3550" stroke-width="1"/>
    <rect x="116" y="174" width="58" height="58" fill="#1a2535" stroke="#2a3550" stroke-width="1"/>
    <rect x="174" y="174" width="58" height="58" fill="#1a2535" stroke="#2a3550" stroke-width="1"/>

    <!-- Quadrant highlights -->
    <rect x="0"   y="0"   width="116" height="116" fill="none" stroke="#7ec8e3" stroke-width="2.5" rx="2"/>
    <rect x="116" y="0"   width="116" height="116" fill="none" stroke="#ce9178" stroke-width="2.5" rx="2"/>
    <rect x="0"   y="116" width="116" height="116" fill="none" stroke="#7777cc" stroke-width="2.5" rx="2"/>
    <rect x="116" y="116" width="116" height="116" fill="none" stroke="#55c555" stroke-width="2.5" rx="2"/>

    <!-- Values -->
    <text x="29"  y="36"  text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7ec8e3">1</text>
    <text x="87"  y="36"  text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7ec8e3">3</text>
    <text x="145" y="36"  text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#ce9178">2</text>
    <text x="203" y="36"  text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#ce9178">4</text>

    <text x="29"  y="94"  text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7ec8e3">5</text>
    <text x="87"  y="94"  text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7ec8e3">2</text>
    <text x="145" y="94"  text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#ce9178">6</text>
    <text x="203" y="94"  text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#ce9178">1</text>

    <text x="29"  y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7777cc">7</text>
    <text x="87"  y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7777cc">4</text>
    <text x="145" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555">3</text>
    <text x="203" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555">8</text>

    <text x="29"  y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7777cc">2</text>
    <text x="87"  y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7777cc">1</text>
    <text x="145" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555">5</text>
    <text x="203" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555">2</text>
  </g>

  <!-- Arrow to Max Pool -->
  <polygon points="350,228 378,218 378,238" fill="#7ec8e3" stroke="#2a5a7a" stroke-width="1"/>
  <line x1="335" y1="228" x2="378" y2="228" stroke="#7ec8e3" stroke-width="2.5"/>

  <!-- Max Pool Output -->
  <text x="460" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Max Pooling (2×2)</text>

  <g transform="translate(400, 118)">
    <rect x="0"  y="0"   width="70" height="70" fill="#1a3d2a" stroke="#7ec8e3" stroke-width="2"/>
    <rect x="70" y="0"   width="70" height="70" fill="#1a2535" stroke="#ce9178" stroke-width="2"/>
    <rect x="0"  y="70"  width="70" height="70" fill="#1a2535" stroke="#7777cc" stroke-width="2"/>
    <rect x="70" y="70"  width="70" height="70" fill="#1a2535" stroke="#55c555" stroke-width="2"/>

    <text x="35"  y="43"  text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="24" font-weight="700" fill="#7ec8e3">5</text>
    <text x="105" y="43"  text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="24" font-weight="700" fill="#ce9178">6</text>
    <text x="35"  y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="24" font-weight="700" fill="#7777cc">7</text>
    <text x="105" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="24" font-weight="700" fill="#55c555">8</text>

    <text x="35"  y="60"  text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">max(1,3,5,2)</text>
    <text x="105" y="60"  text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">max(2,4,6,1)</text>
    <text x="35"  y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">max(7,4,2,1)</text>
    <text x="105" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">max(3,8,5,2)</text>
  </g>
  <text x="460" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">각 영역의 최대값 선택</text>
  <text x="460" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">강한 활성화(특징) 보존</text>

  <!-- Arrow to Avg Pool -->
  <polygon points="618,228 646,218 646,238" fill="#ce9178" stroke="#7a3a18" stroke-width="1"/>
  <line x1="600" y1="228" x2="646" y2="228" stroke="#ce9178" stroke-width="2.5"/>

  <!-- Avg Pool Output -->
  <text x="752" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#ce9178">Avg Pooling (2×2)</text>

  <g transform="translate(685, 118)">
    <rect x="0"  y="0"   width="70" height="70" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="2"/>
    <rect x="70" y="0"   width="70" height="70" fill="#1a1a2a" stroke="#ce9178" stroke-width="2"/>
    <rect x="0"  y="70"  width="70" height="70" fill="#1a1a2a" stroke="#7777cc" stroke-width="2"/>
    <rect x="70" y="70"  width="70" height="70" fill="#1a1a2a" stroke="#55c555" stroke-width="2"/>

    <text x="35"  y="38"  text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" font-weight="700" fill="#7ec8e3">2.75</text>
    <text x="105" y="38"  text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" font-weight="700" fill="#ce9178">3.25</text>
    <text x="35"  y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" font-weight="700" fill="#7777cc">3.5</text>
    <text x="105" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" font-weight="700" fill="#55c555">4.5</text>

    <text x="35"  y="55"  text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">avg(1,3,5,2)</text>
    <text x="105" y="55"  text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">avg(2,4,6,1)</text>
    <text x="35"  y="125" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">avg(7,4,2,1)</text>
    <text x="105" y="125" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">avg(3,8,5,2)</text>
  </g>
  <text x="752" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">각 영역의 평균값 계산</text>
  <text x="752" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">부드러운 특징 표현</text>

  <!-- Bottom comparison -->
  <rect x="36" y="380" width="808" height="90" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="440" y="404" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">풀링의 역할</text>

  <text x="160" y="428" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">공간 크기 감소</text>
  <text x="160" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">연산량 · 메모리 절약</text>

  <text x="440" y="428" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">위치 불변성</text>
  <text x="440" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">패턴이 조금 이동해도 같은 결과</text>

  <text x="720" y="428" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">수용야(receptive field) 확장</text>
  <text x="720" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">이후 레이어가 더 넓은 영역 커버</text>
</svg>
