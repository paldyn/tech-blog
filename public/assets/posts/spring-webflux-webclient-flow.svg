<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-ret" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>

  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">WebClient 요청·응답 파이프라인</text>

  <!-- Application box -->
  <rect x="60" y="80" width="160" height="280" rx="10" fill="#0d1f3c" stroke="#4a7ab5" stroke-width="1.5"/>
  <text x="140" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Application</text>
  <line x1="70" y1="118" x2="210" y2="118" stroke="#4a7ab5" stroke-width="1" stroke-opacity="0.5"/>

  <rect x="74" y="130" width="132" height="32" rx="6" fill="#0f2845" stroke="#4a7ab5" stroke-width="1"/>
  <text x="140" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff">WebClient 빌드</text>

  <rect x="74" y="170" width="132" height="32" rx="6" fill="#0f2845" stroke="#4a7ab5" stroke-width="1"/>
  <text x="140" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff">uri() / method()</text>

  <rect x="74" y="210" width="132" height="32" rx="6" fill="#0f2845" stroke="#4a7ab5" stroke-width="1"/>
  <text x="140" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff">headers() / body()</text>

  <rect x="74" y="250" width="132" height="32" rx="6" fill="#0f2845" stroke="#4a7ab5" stroke-width="1"/>
  <text x="140" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff">retrieve()</text>

  <rect x="74" y="290" width="132" height="32" rx="6" fill="#0f2845" stroke="#4a7ab5" stroke-width="1"/>
  <text x="140" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ffffff">bodyToMono(T)</text>

  <!-- Arrow: App → Filters -->
  <line x1="220" y1="220" x2="266" y2="220" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="242" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">요청</text>

  <!-- Filters box -->
  <rect x="268" y="140" width="144" height="160" rx="10" fill="#141c2a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="340" y="164" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">ExchangeFilter</text>
  <line x1="278" y1="174" x2="402" y2="174" stroke="#3a4a6e" stroke-width="1" stroke-opacity="0.5"/>

  <rect x="280" y="184" width="120" height="26" rx="5" fill="#1a2535" stroke="#3a4a6e" stroke-width="1"/>
  <text x="340" y="201" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">인증 헤더 추가</text>

  <rect x="280" y="218" width="120" height="26" rx="5" fill="#1a2535" stroke="#3a4a6e" stroke-width="1"/>
  <text x="340" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">요청/응답 로깅</text>

  <rect x="280" y="252" width="120" height="26" rx="5" fill="#1a2535" stroke="#3a4a6e" stroke-width="1"/>
  <text x="340" y="269" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">재시도 처리</text>

  <!-- Arrow: Filters → HTTP -->
  <line x1="412" y1="220" x2="458" y2="220" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="434" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">필터 통과</text>

  <!-- Reactor Netty box -->
  <rect x="460" y="140" width="160" height="160" rx="10" fill="#101a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="540" y="164" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Reactor Netty</text>
  <line x1="470" y1="174" x2="610" y2="174" stroke="#55c555" stroke-width="1" stroke-opacity="0.4"/>

  <rect x="474" y="184" width="132" height="26" rx="5" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="540" y="201" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">TCP 연결 풀</text>

  <rect x="474" y="218" width="132" height="26" rx="5" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="540" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">논블로킹 I/O</text>

  <rect x="474" y="252" width="132" height="26" rx="5" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="540" y="269" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">HTTP 코덱</text>

  <!-- Arrow: Netty → External -->
  <line x1="620" y1="220" x2="666" y2="220" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="642" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">HTTP</text>

  <!-- External Service box -->
  <rect x="668" y="158" width="152" height="124" rx="10" fill="#1a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="744" y="184" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">외부 서비스</text>
  <line x1="678" y1="194" x2="810" y2="194" stroke="#e05555" stroke-width="1" stroke-opacity="0.4"/>

  <rect x="682" y="204" width="124" height="26" rx="5" fill="#120a0a" stroke="#e05555" stroke-width="1"/>
  <text x="744" y="221" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">REST API</text>

  <rect x="682" y="238" width="124" height="26" rx="5" fill="#120a0a" stroke="#e05555" stroke-width="1"/>
  <text x="744" y="255" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">마이크로서비스</text>

  <!-- Return path (dashed) -->
  <line x1="668" y1="244" x2="620" y2="244" stroke="#ce9178" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-ret)"/>
  <line x1="460" y1="244" x2="412" y2="244" stroke="#ce9178" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-ret)"/>
  <line x1="268" y1="244" x2="220" y2="244" stroke="#ce9178" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-ret)"/>
  <text x="540" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#ce9178">응답 역방향 흐름</text>

  <!-- Error handling box -->
  <rect x="60" y="390" width="360" height="60" rx="8" fill="#1a1010" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="412" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" font-weight="600">에러 처리 체인</text>
  <text x="240" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">onStatus() → onErrorMap() → retry() → timeout()</text>

  <!-- Success handling box -->
  <rect x="460" y="390" width="360" height="60" rx="8" fill="#0a1f10" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="412" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" font-weight="600">응답 처리 체인</text>
  <text x="640" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">bodyToMono(T) → map() → flatMap() → subscribe()</text>
</svg>
