<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4466cc"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="500" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="33" font-family="'Wanted Sans Variable', sans-serif" font-size="17" font-weight="700" fill="#e8e8e8" text-anchor="middle">RAG 파이프라인 — 두 단계로 이루어진 구조</text>

  <!-- ─────────────── PHASE 1 CONTAINER ─────────────── -->
  <rect x="24" y="50" width="832" height="192" rx="10" fill="#0d0d16" stroke="#1e1e40" stroke-width="1.5"/>
  <text x="440" y="72" font-family="'Wanted Sans Variable', sans-serif" font-size="11" font-weight="600" fill="#4455aa" text-anchor="middle" letter-spacing="1.5">PHASE 1 — 인덱싱 (오프라인 사전 처리)</text>

  <!-- Box 1: Documents -->
  <rect x="65" y="88" width="150" height="130" rx="8" fill="#111120" stroke="#2a2a60" stroke-width="1.5"/>
  <text x="140" y="122" font-family="'Wanted Sans Variable', sans-serif" font-size="26" text-anchor="middle">📄</text>
  <text x="140" y="147" font-family="'Wanted Sans Variable', sans-serif" font-size="13" font-weight="600" fill="#99aadd" text-anchor="middle">원본 문서</text>
  <text x="140" y="165" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#444466" text-anchor="middle">PDF · 웹페이지</text>
  <text x="140" y="180" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#444466" text-anchor="middle">DB · 사내 문서</text>

  <!-- Arrow 1→2 -->
  <line x1="215" y1="153" x2="265" y2="153" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 2: Chunking -->
  <rect x="265" y="88" width="150" height="130" rx="8" fill="#111e11" stroke="#2a602a" stroke-width="1.5"/>
  <text x="340" y="122" font-family="'Wanted Sans Variable', sans-serif" font-size="26" text-anchor="middle">✂️</text>
  <text x="340" y="147" font-family="'Wanted Sans Variable', sans-serif" font-size="13" font-weight="600" fill="#88cc88" text-anchor="middle">청킹</text>
  <text x="340" y="165" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#446644" text-anchor="middle">문서를 작은 단위로</text>
  <text x="340" y="180" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#446644" text-anchor="middle">분할 (300–500 토큰)</text>

  <!-- Arrow 2→3 -->
  <line x1="415" y1="153" x2="465" y2="153" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 3: Embedding Model -->
  <rect x="465" y="88" width="150" height="130" rx="8" fill="#1e1111" stroke="#602a2a" stroke-width="1.5"/>
  <text x="540" y="122" font-family="'Wanted Sans Variable', sans-serif" font-size="26" text-anchor="middle">🧮</text>
  <text x="540" y="147" font-family="'Wanted Sans Variable', sans-serif" font-size="13" font-weight="600" fill="#dd9999" text-anchor="middle">임베딩 모델</text>
  <text x="540" y="165" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#664444" text-anchor="middle">텍스트 → 벡터</text>
  <text x="540" y="180" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#664444" text-anchor="middle">(수백~수천 차원)</text>

  <!-- Arrow 3→4 -->
  <line x1="615" y1="153" x2="665" y2="153" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 4: Vector DB -->
  <rect x="665" y="88" width="150" height="130" rx="8" fill="#111120" stroke="#4444aa" stroke-width="1.5"/>
  <text x="740" y="122" font-family="'Wanted Sans Variable', sans-serif" font-size="26" text-anchor="middle">🗄️</text>
  <text x="740" y="147" font-family="'Wanted Sans Variable', sans-serif" font-size="13" font-weight="600" fill="#aaaaff" text-anchor="middle">벡터 데이터베이스</text>
  <text x="740" y="165" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#444466" text-anchor="middle">벡터 저장 &amp;</text>
  <text x="740" y="180" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#444466" text-anchor="middle">유사도 검색 지원</text>

  <!-- ─────────────── PHASE 2 CONTAINER ─────────────── -->
  <rect x="24" y="258" width="832" height="212" rx="10" fill="#0d160d" stroke="#1e401e" stroke-width="1.5"/>
  <text x="440" y="280" font-family="'Wanted Sans Variable', sans-serif" font-size="11" font-weight="600" fill="#44aa44" text-anchor="middle" letter-spacing="1.5">PHASE 2 — 검색 &amp; 생성 (실시간)</text>

  <!-- Box 5: User Query -->
  <rect x="50" y="296" width="120" height="130" rx="8" fill="#1e1e11" stroke="#5a5a2a" stroke-width="1.5"/>
  <text x="110" y="328" font-family="'Wanted Sans Variable', sans-serif" font-size="26" text-anchor="middle">💬</text>
  <text x="110" y="353" font-family="'Wanted Sans Variable', sans-serif" font-size="12" font-weight="600" fill="#cccc88" text-anchor="middle">사용자 질문</text>
  <text x="110" y="370" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#555544" text-anchor="middle">"최신 제품</text>
  <text x="110" y="384" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#555544" text-anchor="middle">사양이 뭐예요?"</text>

  <!-- Arrow Q→QE -->
  <line x1="170" y1="361" x2="205" y2="361" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 6: Query Embedding -->
  <rect x="205" y="296" width="120" height="130" rx="8" fill="#1e1111" stroke="#602a2a" stroke-width="1.5"/>
  <text x="265" y="328" font-family="'Wanted Sans Variable', sans-serif" font-size="26" text-anchor="middle">🧮</text>
  <text x="265" y="353" font-family="'Wanted Sans Variable', sans-serif" font-size="12" font-weight="600" fill="#dd9999" text-anchor="middle">질문 임베딩</text>
  <text x="265" y="370" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#664444" text-anchor="middle">동일 모델로</text>
  <text x="265" y="384" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#664444" text-anchor="middle">벡터 변환</text>

  <!-- Arrow QE→VS -->
  <line x1="325" y1="361" x2="360" y2="361" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 7: Vector Search -->
  <rect x="360" y="296" width="130" height="130" rx="8" fill="#111120" stroke="#4444aa" stroke-width="1.5"/>
  <text x="425" y="328" font-family="'Wanted Sans Variable', sans-serif" font-size="26" text-anchor="middle">🔍</text>
  <text x="425" y="353" font-family="'Wanted Sans Variable', sans-serif" font-size="12" font-weight="600" fill="#aaaaff" text-anchor="middle">유사도 검색</text>
  <text x="425" y="370" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#444466" text-anchor="middle">가장 가까운</text>
  <text x="425" y="384" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#444466" text-anchor="middle">청크 Top-K 추출</text>

  <!-- Arrow VS→LLM -->
  <line x1="490" y1="361" x2="525" y2="361" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 8: LLM -->
  <rect x="525" y="296" width="130" height="130" rx="8" fill="#111e1e" stroke="#2a6060" stroke-width="1.5"/>
  <text x="590" y="328" font-family="'Wanted Sans Variable', sans-serif" font-size="26" text-anchor="middle">🤖</text>
  <text x="590" y="353" font-family="'Wanted Sans Variable', sans-serif" font-size="12" font-weight="600" fill="#88cccc" text-anchor="middle">LLM 생성</text>
  <text x="590" y="370" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#446666" text-anchor="middle">컨텍스트 + 질문</text>
  <text x="590" y="384" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#446666" text-anchor="middle">→ 최종 답변</text>

  <!-- Arrow LLM→Answer -->
  <line x1="655" y1="361" x2="690" y2="361" stroke="#444" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Box 9: Answer -->
  <rect x="690" y="296" width="130" height="130" rx="8" fill="#111e11" stroke="#2a602a" stroke-width="1.5"/>
  <text x="755" y="328" font-family="'Wanted Sans Variable', sans-serif" font-size="26" text-anchor="middle">✅</text>
  <text x="755" y="353" font-family="'Wanted Sans Variable', sans-serif" font-size="12" font-weight="600" fill="#88cc88" text-anchor="middle">정확한 답변</text>
  <text x="755" y="370" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#446644" text-anchor="middle">출처 기반의</text>
  <text x="755" y="384" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#446644" text-anchor="middle">신뢰할 수 있는 응답</text>

  <!-- ─── Dashed connector: Vector DB → Vector Search ─── -->
  <path d="M 740 218 L 740 250 L 425 250 L 425 296"
        fill="none" stroke="#4466cc" stroke-width="1.5"
        stroke-dasharray="6,3" marker-end="url(#arr-blue)"/>
  <text x="582" y="246" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#4466cc" text-anchor="middle">저장된 벡터로 조회</text>
</svg>
