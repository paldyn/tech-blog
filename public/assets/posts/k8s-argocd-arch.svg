<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrp" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Argo CD 구성 요소</text>

  <!-- Git -->
  <rect x="60" y="140" width="160" height="80" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="140" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">Git 저장소</text>
  <text x="140" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">매니페스트 (진실 공급원)</text>

  <!-- user -->
  <rect x="60" y="320" width="160" height="80" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="140" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">개발자 · 운영자</text>
  <text x="140" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">웹 UI · argocd CLI</text>

  <!-- argocd box -->
  <rect x="280" y="80" width="360" height="380" rx="10" fill="#0f1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="460" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">argocd 네임스페이스</text>

  <rect x="300" y="124" width="150" height="76" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="375" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">api-server</text>
  <text x="375" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">UI · CLI · API 게이트</text>
  <text x="375" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">RBAC · SSO 연동</text>

  <rect x="470" y="124" width="150" height="76" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="545" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">repo-server</text>
  <text x="545" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Git clone + 렌더링</text>
  <text x="545" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Helm · Kustomize 실행</text>

  <rect x="300" y="232" width="320" height="76" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="460" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">application-controller</text>
  <text x="460" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">렌더링 결과와 클러스터 상태를 비교(diff)</text>
  <text x="460" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">OutOfSync 감지 → 동기화 실행</text>

  <rect x="300" y="340" width="150" height="60" rx="8" fill="#201a10" stroke="#ce9178" stroke-width="1"/>
  <text x="375" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">Redis</text>
  <text x="375" y="385" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">비교 결과 캐시</text>

  <rect x="470" y="340" width="150" height="60" rx="8" fill="#201a10" stroke="#ce9178" stroke-width="1"/>
  <text x="545" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">dex</text>
  <text x="545" y="385" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">OIDC · SSO</text>

  <text x="460" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Application CRD로 "무엇을 어디에 배포할지" 선언</text>

  <!-- target cluster -->
  <rect x="680" y="140" width="140" height="120" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="750" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">대상 클러스터</text>
  <text x="750" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">자기 자신 또는</text>
  <text x="750" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">원격 멀티 클러스터</text>
  <text x="750" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(허브-스포크)</text>

  <!-- arrows -->
  <path d="M 545 124 C 520 64, 280 64, 221 148" fill="none" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <text x="160" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">pull (3분 주기 + webhook)</text>

  <line x1="220" y1="360" x2="300" y2="180" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>

  <line x1="620" y1="270" x2="680" y2="220" stroke="#7777cc" stroke-width="2" marker-end="url(#arrp)"/>
  <text x="660" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">apply (sync)</text>
</svg>
