<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">InnoDB 내부 구조</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">버퍼 풀 · Redo/Undo 로그 · 더블 라이트 버퍼</text>

  <!-- Memory section -->
  <rect x="60" y="100" width="380" height="280" fill="#111827" rx="8" stroke="#7ec8e3" stroke-width="2"/>
  <text x="250" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">메모리 영역</text>

  <!-- Buffer Pool -->
  <rect x="80" y="134" width="340" height="80" fill="#0f1724" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="250" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">Buffer Pool</text>
  <text x="250" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">데이터·인덱스 페이지 캐시 (innodb_buffer_pool_size)</text>
  <text x="250" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">LRU 알고리즘으로 Dirty Page 관리</text>

  <!-- Log Buffer -->
  <rect x="80" y="228" width="155" height="60" fill="#0f1724" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="157" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">Log Buffer</text>
  <text x="157" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Redo 로그 버퍼</text>
  <text x="157" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">플러시 전 임시 보관</text>

  <!-- Change Buffer -->
  <rect x="265" y="228" width="155" height="60" fill="#0f1724" rx="6" stroke="#888" stroke-width="1"/>
  <text x="342" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Change Buffer</text>
  <text x="342" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">보조 인덱스 변경</text>
  <text x="342" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">지연 병합</text>

  <!-- Adaptive Hash Index -->
  <rect x="80" y="304" width="340" height="56" fill="#0f1724" rx="6" stroke="#888" stroke-width="1"/>
  <text x="250" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Adaptive Hash Index</text>
  <text x="250" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">자주 접근하는 페이지를 해시로 자동 캐시</text>

  <!-- Disk section -->
  <rect x="480" y="100" width="340" height="280" fill="#111827" rx="8" stroke="#7777cc" stroke-width="2"/>
  <text x="650" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">디스크 영역</text>

  <!-- Tablespace -->
  <rect x="500" y="134" width="300" height="60" fill="#0f1724" rx="6" stroke="#e8e8e8" stroke-width="1"/>
  <text x="650" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8e8e8">테이블스페이스 (.ibd)</text>
  <text x="650" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">데이터 + 클러스터드 인덱스 + 보조 인덱스</text>

  <!-- Redo log -->
  <rect x="500" y="208" width="140" height="60" fill="#0f1724" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="570" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Redo Log</text>
  <text x="570" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">ib_logfile0/1</text>
  <text x="570" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">충돌 복구용</text>

  <!-- Undo log -->
  <rect x="660" y="208" width="140" height="60" fill="#0f1724" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="730" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">Undo Log</text>
  <text x="730" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">롤백 · MVCC</text>
  <text x="730" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">일관된 스냅샷</text>

  <!-- Doublewrite buffer -->
  <rect x="500" y="284" width="300" height="56" fill="#0f1724" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="650" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">Doublewrite Buffer</text>
  <text x="650" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">페이지 쓰기 전 임시 저장 → 부분 쓰기 방지</text>

  <!-- Arrows memory to disk -->
  <line x1="440" y1="214" x2="480" y2="243" stroke="#55c555" stroke-width="2"/>
  <polygon points="480,243 468,233 474,247" fill="#55c555"/>
  <text x="459" y="225" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">플러시</text>

  <!-- Bottom: MVCC note -->
  <rect x="60" y="400" width="760" height="70" fill="#111827" rx="8" stroke="#1e2433"/>
  <text x="440" y="424" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">InnoDB MVCC — 읽기가 쓰기를 차단하지 않는 이유</text>
  <text x="440" y="446" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">SELECT은 트랜잭션 시작 시점의 Undo Log 스냅샷을 읽음 → 쓰기 락 불필요</text>
  <text x="440" y="462" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">기본 격리 수준: REPEATABLE READ — PHANTOM READ 방지를 Gap Lock으로 보완</text>
</svg>
