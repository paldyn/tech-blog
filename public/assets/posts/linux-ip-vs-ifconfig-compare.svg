<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ip vs ifconfig — 명령어 대응표</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">ifconfig는 net-tools 패키지(구식) / ip는 iproute2 패키지(현대)</text>

  <!-- Header -->
  <rect x="60" y="94" width="760" height="40" fill="#111827" rx="6"/>
  <text x="240" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#888" text-anchor="middle">작업</text>
  <text x="490" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">ifconfig (구식)</text>
  <text x="730" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">ip (현대)</text>

  <!-- Row 1 -->
  <rect x="60" y="136" width="760" height="40" fill="#0f1117" rx="4"/>
  <text x="240" y="161" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">인터페이스 목록</text>
  <text x="490" y="161" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" text-anchor="middle">ifconfig -a</text>
  <text x="730" y="161" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">ip link show</text>

  <!-- Row 2 -->
  <rect x="60" y="178" width="760" height="40" fill="#13151f" rx="4"/>
  <text x="240" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">IP 주소 확인</text>
  <text x="490" y="203" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" text-anchor="middle">ifconfig eth0</text>
  <text x="730" y="203" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">ip addr show eth0</text>

  <!-- Row 3 -->
  <rect x="60" y="220" width="760" height="40" fill="#0f1117" rx="4"/>
  <text x="240" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">IP 주소 추가</text>
  <text x="490" y="245" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" text-anchor="middle">ifconfig eth0 192.168.1.10/24</text>
  <text x="730" y="245" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">ip addr add 192.168.1.10/24 dev eth0</text>

  <!-- Row 4 -->
  <rect x="60" y="262" width="760" height="40" fill="#13151f" rx="4"/>
  <text x="240" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">인터페이스 UP/DOWN</text>
  <text x="490" y="287" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" text-anchor="middle">ifconfig eth0 up/down</text>
  <text x="730" y="287" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">ip link set eth0 up/down</text>

  <!-- Row 5 -->
  <rect x="60" y="304" width="760" height="40" fill="#0f1117" rx="4"/>
  <text x="240" y="329" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">라우팅 테이블</text>
  <text x="490" y="329" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" text-anchor="middle">route -n</text>
  <text x="730" y="329" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">ip route show</text>

  <!-- Row 6 -->
  <rect x="60" y="346" width="760" height="40" fill="#13151f" rx="4"/>
  <text x="240" y="371" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">기본 게이트웨이 추가</text>
  <text x="490" y="371" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" text-anchor="middle">route add default gw 192.168.1.1</text>
  <text x="730" y="371" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">ip route add default via 192.168.1.1</text>

  <!-- Row 7 -->
  <rect x="60" y="388" width="760" height="40" fill="#0f1117" rx="4"/>
  <text x="240" y="413" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">ARP 캐시</text>
  <text x="490" y="413" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" text-anchor="middle">arp -n</text>
  <text x="730" y="413" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" text-anchor="middle">ip neigh show</text>

  <!-- Dividers -->
  <line x1="380" y1="94" x2="380" y2="428" stroke="#222" stroke-width="1"/>
  <line x1="610" y1="94" x2="610" y2="428" stroke="#222" stroke-width="1"/>

  <text x="440" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" text-anchor="middle">최신 배포판에서 ifconfig는 기본 설치 안 됨 — ip 명령어를 사용하세요</text>
</svg>
