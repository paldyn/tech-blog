<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Helm Hook 라이프사이클 타임라인</text>

  <!-- Install phase label -->
  <text x="220" y="85" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">Install 단계</text>
  <line x1="60" y1="93" x2="380" y2="93" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Upgrade phase label -->
  <text x="660" y="85" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7777cc" text-anchor="middle">Upgrade 단계</text>
  <line x1="500" y1="93" x2="820" y2="93" stroke="#7777cc" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- === INSTALL ROW === -->
  <!-- pre-install hook -->
  <rect x="60" y="110" width="120" height="60" rx="8" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="2"/>
  <text x="120" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">pre-install</text>
  <text x="120" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Hook</text>

  <!-- arrow -->
  <line x1="180" y1="140" x2="214" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- install resources -->
  <rect x="218" y="110" width="130" height="60" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="283" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Install</text>
  <text x="283" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">리소스 생성</text>
  <text x="283" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#666" text-anchor="middle">Deployment, Service...</text>

  <!-- arrow -->
  <line x1="348" y1="140" x2="378" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- post-install hook -->
  <rect x="382" y="110" width="120" height="60" rx="8" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="2"/>
  <text x="442" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">post-install</text>
  <text x="442" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Hook</text>

  <!-- labels below install row -->
  <text x="120" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">DB 마이그레이션</text>
  <text x="283" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">K8s 오브젝트</text>
  <text x="442" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">알림/테스트</text>

  <!-- === UPGRADE ROW === -->
  <!-- pre-upgrade hook -->
  <rect x="500" y="110" width="120" height="60" rx="8" fill="#1a1026" stroke="#7777cc" stroke-width="2"/>
  <text x="560" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">pre-upgrade</text>
  <text x="560" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Hook</text>

  <!-- arrow -->
  <line x1="620" y1="140" x2="654" y2="140" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-purple)"/>

  <!-- upgrade resources -->
  <rect x="658" y="110" width="120" height="60" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="718" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Upgrade</text>
  <text x="718" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">리소스 업데이트</text>
  <text x="718" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#666" text-anchor="middle">Rolling update...</text>

  <!-- arrow -->
  <line x1="778" y1="140" x2="808" y2="140" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-purple)"/>

  <!-- post-upgrade hook -->
  <rect x="760" y="110" width="60" height="60" rx="8" fill="#1a1026" stroke="#7777cc" stroke-width="2"/>
  <text x="790" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#7777cc" text-anchor="middle">post-</text>
  <text x="790" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#7777cc" text-anchor="middle">upgrade</text>
  <text x="790" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#888" text-anchor="middle">Hook</text>

  <!-- labels below upgrade row -->
  <text x="560" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">스키마 마이그레이션</text>
  <text x="718" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">K8s 오브젝트</text>
  <text x="790" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">검증</text>

  <!-- === DELETE ROW === -->
  <!-- Delete phase label -->
  <text x="220" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e05555" text-anchor="middle">Delete 단계</text>
  <line x1="60" y1="233" x2="380" y2="233" stroke="#e05555" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- pre-delete -->
  <rect x="60" y="250" width="120" height="60" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="2"/>
  <text x="120" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">pre-delete</text>
  <text x="120" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Hook</text>

  <!-- arrow -->
  <line x1="180" y1="280" x2="214" y2="280" stroke="#e05555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- delete resources -->
  <rect x="218" y="250" width="130" height="60" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="283" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">Delete</text>
  <text x="283" y="291" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">리소스 삭제</text>
  <text x="283" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#666" text-anchor="middle">helm uninstall</text>

  <!-- arrow -->
  <line x1="348" y1="280" x2="378" y2="280" stroke="#e05555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- post-delete -->
  <rect x="382" y="250" width="120" height="60" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="2"/>
  <text x="442" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">post-delete</text>
  <text x="442" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Hook</text>

  <!-- labels below delete row -->
  <text x="120" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">백업/정리</text>
  <text x="442" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">외부 리소스 해제</text>

  <!-- Test Hook section -->
  <text x="660" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">Test 단계</text>
  <line x1="500" y1="233" x2="820" y2="233" stroke="#55c555" stroke-width="1" stroke-dasharray="4,3"/>

  <rect x="580" y="250" width="160" height="60" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="660" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">test</text>
  <text x="660" y="291" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">helm test 명령 실행</text>
  <text x="660" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="9" fill="#666" text-anchor="middle">연결 검증 Pod</text>

  <text x="660" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">helm test [release]</text>

  <!-- Bottom legend -->
  <rect x="60" y="370" width="760" height="80" rx="8" fill="#111111" stroke="#333" stroke-width="1"/>
  <text x="440" y="393" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Hook 제어 Annotation</text>
  <text x="150" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">helm.sh/hook</text>
  <text x="150" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">hook 종류 지정</text>
  <text x="380" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">helm.sh/hook-weight</text>
  <text x="380" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">실행 순서 (낮을수록 먼저)</text>
  <text x="640" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">helm.sh/hook-delete-policy</text>
  <text x="640" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">완료 후 리소스 정리 방법</text>
</svg>
