<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Oracle 파티셔닝 유형 비교</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">Range · List · Hash — 분할 기준과 특성</text>

  <!-- === Range Partitioning === -->
  <rect x="50" y="88" width="240" height="400" rx="10" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3">Range</text>
  <text x="170" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">연속 범위 기반 분할</text>

  <rect x="66" y="148" width="208" height="32" rx="5" fill="#0d1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="170" y="169" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">P1: 2024-01 ~ 2024-03</text>
  <rect x="66" y="188" width="208" height="32" rx="5" fill="#0d1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="170" y="209" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">P2: 2024-04 ~ 2024-06</text>
  <rect x="66" y="228" width="208" height="32" rx="5" fill="#0d1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="170" y="249" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">P3: 2024-07 ~ 2024-09</text>
  <rect x="66" y="268" width="208" height="32" rx="5" fill="#0d1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="170" y="289" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">P4: 2024-10 ~ 2024-12</text>

  <rect x="66" y="318" width="208" height="84" rx="6" fill="#0a0f18"/>
  <text x="170" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8">장점</text>
  <text x="170" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">범위 쿼리 프루닝 탁월</text>
  <text x="170" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">파티션 Drop = 대량 삭제</text>
  <text x="170" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">시계열 데이터에 최적</text>

  <rect x="66" y="412" width="208" height="58" rx="6" fill="#0a0f18"/>
  <text x="170" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8">대표 컬럼</text>
  <text x="170" y="450" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ccc">날짜, 정수 범위</text>
  <text x="170" y="468" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ccc">시퀀스, 연월</text>

