  <rect x="336" y="188" width="208" height="32" rx="5" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="209" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">P_BUSAN: 'PUS', 'GHE'</text>
  <rect x="336" y="228" width="208" height="32" rx="5" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="249" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">P_JEJU: 'JEJ'</text>
  <rect x="336" y="268" width="208" height="32" rx="5" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="289" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">P_OTHERS: DEFAULT</text>

  <rect x="336" y="318" width="208" height="84" rx="6" fill="#081208"/>
  <text x="440" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8">장점</text>
  <text x="440" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">이산값 분류에 직관적</text>
  <text x="440" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">DEFAULT 파티션 지원</text>
  <text x="440" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">지역/코드/상태 컬럼</text>

  <rect x="336" y="412" width="208" height="58" rx="6" fill="#081208"/>
  <text x="440" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8">대표 컬럼</text>
  <text x="440" y="450" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ccc">국가코드, 지역코드</text>
  <text x="440" y="468" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ccc">상태값, 카테고리</text>

  <!-- === Hash Partitioning === -->
  <rect x="590" y="88" width="240" height="400" rx="10" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="710" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7777cc">Hash</text>
  <text x="710" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">해시값 기반 균등 분산</text>

  <rect x="606" y="148" width="208" height="32" rx="5" fill="#12101a" stroke="#7777cc" stroke-width="1"/>
  <text x="710" y="169" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">P1: hash(cust_id) mod 0</text>
  <rect x="606" y="188" width="208" height="32" rx="5" fill="#12101a" stroke="#7777cc" stroke-width="1"/>
  <text x="710" y="209" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">P2: hash(cust_id) mod 1</text>
  <rect x="606" y="228" width="208" height="32" rx="5" fill="#12101a" stroke="#7777cc" stroke-width="1"/>
  <text x="710" y="249" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">P3: hash(cust_id) mod 2</text>
  <rect x="606" y="268" width="208" height="32" rx="5" fill="#12101a" stroke="#7777cc" stroke-width="1"/>
  <text x="710" y="289" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">P4: hash(cust_id) mod 3</text>

  <rect x="606" y="318" width="208" height="84" rx="6" fill="#0e0c18"/>
  <text x="710" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8">장점</text>
  <text x="710" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">핫스팟 방지·I/O 분산</text>
  <text x="710" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">파티션 수 = 2의 거듭제곱</text>
  <text x="710" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">범위 프루닝 불가</text>

  <rect x="606" y="412" width="208" height="58" rx="6" fill="#0e0c18"/>
  <text x="710" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8">대표 컬럼</text>
  <text x="710" y="450" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ccc">고객ID, 주문번호</text>
  <text x="710" y="468" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ccc">분산이 중요한 PK</text>

  <!-- Bottom note -->
  <text x="440" y="506" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Composite: Range-List, Range-Hash, List-Hash 조합 가능</text>
</svg>
