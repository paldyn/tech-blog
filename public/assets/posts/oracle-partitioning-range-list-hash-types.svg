  <text x="440" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">이산 값 목록 기반 분할</text>

  <rect x="336" y="148" width="208" height="32" rx="5" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
