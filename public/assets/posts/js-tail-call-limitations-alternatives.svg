<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">TCO 대안: 트램폴린과 반복문</text>
  <text x="440" y="70" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">Trampoline Pattern &amp; Iterative Alternative</text>

  <!-- Trampoline -->
  <rect x="60" y="90" width="360" height="240" fill="#111" rx="10" stroke="#1e2433" stroke-width="1"/>
  <text x="240" y="112" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" text-anchor="middle">트램폴린 패턴</text>

  <rect x="76" y="122" width="328" height="188" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="92" y="142" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">const</tspan> trampoline = (fn) =&gt; {</text>
  <text x="92" y="160" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">return</tspan> (...args) =&gt; {</text>
  <text x="92" y="178" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    <tspan fill="#7ec8e3">let</tspan> result = fn(...args);</text>
  <text x="92" y="196" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    <tspan fill="#7ec8e3">while</tspan> (<tspan fill="#7ec8e3">typeof</tspan> result === <tspan fill="#ce9178">'function'</tspan>)</text>
  <text x="92" y="214" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">      result = result();</text>
  <text x="92" y="232" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    <tspan fill="#7ec8e3">return</tspan> result;</text>
  <text x="92" y="250" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  };</text>
  <text x="92" y="268" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">};</text>
  <text x="92" y="290" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">const</tspan> sum = trampoline((n, acc=<tspan fill="#b5cea8">0</tspan>) =&gt;</text>
  <text x="92" y="308" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  n &lt;= <tspan fill="#b5cea8">0</tspan> ? acc : () =&gt; sum(n-<tspan fill="#b5cea8">1</tspan>, acc+n));</text>

  <!-- Iterative -->
  <rect x="460" y="90" width="360" height="240" fill="#111" rx="10" stroke="#1e2433" stroke-width="1"/>
  <text x="640" y="112" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" text-anchor="middle">반복문으로 변환 (가장 실용적)</text>

  <rect x="476" y="122" width="328" height="188" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="492" y="142" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">// 재귀 → while 루프</text>
  <text x="492" y="160" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">function</tspan> <tspan fill="#e8e8e8">sumIter</tspan>(n) {</text>
  <text x="492" y="178" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">let</tspan> acc = <tspan fill="#b5cea8">0</tspan>;</text>
  <text x="492" y="196" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">while</tspan> (n &gt; <tspan fill="#b5cea8">0</tspan>) {</text>
  <text x="492" y="214" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    acc += n;</text>
  <text x="492" y="232" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    n--;</text>
  <text x="492" y="250" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  }</text>
  <text x="492" y="268" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">return</tspan> acc;</text>
  <text x="492" y="286" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">}</text>
  <text x="492" y="308" fill="#55c555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">sumIter(<tspan fill="#b5cea8">1000000</tspan>); <tspan fill="#6a8aa0">// 문제 없음</tspan></text>

  <!-- Engine support table -->
  <rect x="60" y="348" width="760" height="72" fill="#0d0d0d" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="368" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" text-anchor="middle">JS 엔진별 TCO 지원 현황 (2025)</text>

  <text x="100" y="392" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">Safari (JavaScriptCore)</text>
  <text x="100" y="410" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">✓ ES2015 이후 지원</text>

  <text x="340" y="392" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">V8 (Chrome/Node)</text>
  <text x="340" y="410" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">✗ 의도적으로 미구현</text>

  <text x="580" y="392" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">SpiderMonkey (Firefox)</text>
  <text x="580" y="410" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">✗ 미구현</text>

  <!-- Footer -->
  <text x="440" y="442" fill="#444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" text-anchor="middle">PALDYN · JavaScript 완전 정복</text>
</svg>
