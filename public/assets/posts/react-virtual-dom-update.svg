<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" style="background:#0a0a0a">
  <defs>
    <marker id="arrW" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8e8e8"/>
    </marker>
    <marker id="arrO" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Virtual DOM 업데이트 흐름</text>

  <!-- 단계 박스들 -->
  <!-- Step 1 -->
  <rect x="60" y="72" width="148" height="70" rx="8" fill="#101820" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="134" y="98" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">1. setState</text>
  <text x="134" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">상태 변경</text>
  <text x="134" y="134" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">리렌더 예약</text>

  <line x1="208" y1="107" x2="232" y2="107" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arrW)"/>

  <!-- Step 2 -->
  <rect x="236" y="72" width="148" height="70" rx="8" fill="#101820" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="310" y="98" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">2. Render</text>
  <text x="310" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">컴포넌트 함수 호출</text>
  <text x="310" y="134" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">새 VDOM 트리 생성</text>

  <line x1="384" y1="107" x2="408" y2="107" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arrW)"/>

  <!-- Step 3 -->
  <rect x="412" y="72" width="148" height="70" rx="8" fill="#101820" stroke="#ce9178" stroke-width="1.5"/>
  <text x="486" y="98" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">3. Diffing</text>
  <text x="486" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">이전/새 VDOM</text>
  <text x="486" y="134" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">트리 비교</text>

  <line x1="560" y1="107" x2="584" y2="107" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arrW)"/>

  <!-- Step 4 -->
  <rect x="588" y="72" width="148" height="70" rx="8" fill="#101820" stroke="#55c555" stroke-width="1.5"/>
  <text x="662" y="98" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">4. Commit</text>
  <text x="662" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">변경된 DOM만</text>
  <text x="662" y="134" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">최소 업데이트</text>

  <!-- Diffing 예시 -->
  <text x="440" y="176" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">Diffing 예시: 텍스트 노드만 변경</text>

  <!-- 이전 VDOM -->
  <rect x="60" y="192" width="340" height="100" rx="8" fill="#0f1c2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="218" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">이전 VDOM</text>
  <rect x="80" y="226" width="300" height="52" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="248"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">&lt;p&gt;카운트: 0&lt;/p&gt;</text>
  <text x="96" y="268"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">&lt;button&gt;+1&lt;/button&gt;</text>

  <!-- 화살표 -->
  <line x1="400" y1="242" x2="440" y2="242" stroke="#ce9178" stroke-width="2" marker-end="url(#arrO)"/>

  <!-- 새 VDOM -->
  <rect x="444" y="192" width="376" height="100" rx="8" fill="#0f1c2e" stroke="#ce9178" stroke-width="1.5"/>
  <text x="632" y="218" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">새 VDOM</text>
  <rect x="464" y="226" width="336" height="52" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="248"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178">&lt;p&gt;카운트: 1&lt;/p&gt;</text>
  <text x="480" y="268"
        xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">&lt;button&gt;+1&lt;/button&gt;</text>

  <!-- 결과 설명 -->
  <rect x="60" y="316" width="760" height="116" rx="8" fill="#0a0e16" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="342" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">React가 Real DOM에 적용하는 것</text>
  <text x="440" y="366" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">p 요소의 텍스트 노드만 "카운트: 0" → "카운트: 1" 로 변경</text>
  <text x="440" y="388" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">button 요소는 변경 없음 — Real DOM 건드리지 않음</text>
  <text x="440" y="412" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">전체 DOM을 새로 그리는 것이 아니라 diff 결과만큼만 최소 변경</text>
</svg>
