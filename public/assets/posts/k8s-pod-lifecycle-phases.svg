<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="13" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#555"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="13" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="13" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">파드(Pod) 생명주기 상태 머신</text>

  <!-- Pending -->
  <rect x="340" y="72" width="200" height="64" rx="8" fill="#2d1a0a" stroke="#ce9178" stroke-width="2"/>
  <text x="440" y="100" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#ce9178">Pending</text>
  <text x="440" y="122" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">스케줄링 대기 / 이미지 pull</text>

  <!-- Arrow: Pending → Running -->
  <line x1="440" y1="136" x2="440" y2="168" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="455" y="156"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">스케줄 + pull 완료</text>

  <!-- Running -->
  <rect x="340" y="168" width="200" height="64" rx="8" fill="#0d2d0d" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="196" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555">Running</text>
  <text x="440" y="218" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">컨테이너 실행 중</text>

  <!-- Arrow: Running → Succeeded -->
  <line x1="380" y1="232" x2="230" y2="290" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="250" y="260"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">정상 종료 (exit 0)</text>

  <!-- Arrow: Running → Failed -->
  <line x1="500" y1="232" x2="650" y2="290" stroke="#e05555" stroke-width="2" marker-end="url(#arr-red)"/>
  <text x="570" y="260"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">비정상 종료</text>

  <!-- Succeeded -->
  <rect x="80" y="290" width="200" height="64" rx="8" fill="#0d2d0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="180" y="318" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555">Succeeded</text>
  <text x="180" y="340" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">모든 컨테이너 exit 0</text>

  <!-- Failed -->
  <rect x="600" y="290" width="200" height="64" rx="8" fill="#2d0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="700" y="318" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e05555">Failed</text>
  <text x="700" y="340" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">컨테이너 비정상 종료</text>

  <!-- Unknown -->
  <rect x="340" y="290" width="200" height="64" rx="8" fill="#1a1a1a" stroke="#888" stroke-width="1.5"/>
  <text x="440" y="318" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#888">Unknown</text>
  <text x="440" y="340" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">노드 통신 불가</text>

  <!-- Arrow: Running → Unknown -->
  <line x1="440" y1="232" x2="440" y2="290" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <!-- Restart arrow (Failed → Pending via restart policy) -->
  <path d="M 700 354 Q 820 354 820 200 Q 820 72 540 72"
        fill="none" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-red)"/>
  <text x="796" y="230"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">restartPolicy: Always</text>

  <!-- Conditions info box -->
  <rect x="60" y="400" width="760" height="44" rx="6" fill="#1a1a1a"/>
  <text x="440" y="420" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">Conditions: PodScheduled · ContainersReady · Initialized · Ready</text>
  <text x="440" y="438" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Phase는 큰 그림, Conditions는 세부 체크포인트</text>
</svg>
