<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Pod 라이프사이클 단계</text>

  <!-- Pending -->
  <rect x="60" y="90" width="140" height="70" rx="8" fill="#1a1a00" stroke="#7777cc" stroke-width="2"/>
  <text x="130" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Pending</text>
  <text x="130" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#6b7280" text-anchor="middle">스케줄링 대기</text>
  <text x="130" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#6b7280" text-anchor="middle">이미지 풀 중</text>

  <line x1="210" y1="125" x2="250" y2="125" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Running -->
  <rect x="260" y="90" width="140" height="70" rx="8" fill="#0d1f12" stroke="#55c555" stroke-width="2"/>
  <text x="330" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Running</text>
  <text x="330" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#6b7280" text-anchor="middle">하나 이상 컨테이너</text>
  <text x="330" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#6b7280" text-anchor="middle">실행 중</text>

  <line x1="410" y1="110" x2="450" y2="110" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="410" y1="140" x2="450" y2="210" stroke="#e05555" stroke-width="2" marker-end="url(#arrr)"/>

  <!-- Succeeded -->
  <rect x="460" y="90" width="140" height="70" rx="8" fill="#0d1f12" stroke="#55c555" stroke-width="1.5"/>
  <text x="530" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Succeeded</text>
  <text x="530" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#6b7280" text-anchor="middle">모든 컨테이너</text>
  <text x="530" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#6b7280" text-anchor="middle">정상 종료 (exit 0)</text>

  <!-- Failed -->
  <rect x="460" y="200" width="140" height="70" rx="8" fill="#1a0000" stroke="#e05555" stroke-width="1.5"/>
  <text x="530" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">Failed</text>
  <text x="530" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#6b7280" text-anchor="middle">하나 이상 컨테이너</text>
  <text x="530" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#6b7280" text-anchor="middle">비정상 종료</text>

  <!-- Unknown -->
  <rect x="460" y="310" width="140" height="70" rx="8" fill="#1a1a1a" stroke="#6b7280" stroke-width="1.5"/>
  <text x="530" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888" text-anchor="middle">Unknown</text>
  <text x="530" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#6b7280" text-anchor="middle">노드 통신 불가</text>
  <text x="530" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#6b7280" text-anchor="middle">상태 확인 불가</text>

  <!-- Terminating -->
  <rect x="680" y="90" width="160" height="70" rx="8" fill="#1a0000" stroke="#7f1d1d" stroke-width="1.5"/>
  <text x="760" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">Terminating</text>
  <text x="760" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#6b7280" text-anchor="middle">삭제 요청 수신</text>
  <text x="760" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#6b7280" text-anchor="middle">graceful shutdown</text>

  <line x1="610" y1="125" x2="670" y2="125" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Container states label -->
  <rect x="60" y="230" width="360" height="130" rx="8" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
  <text x="240" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">컨테이너 State (Pod 내부)</text>
  <text x="80" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">&#x25CF; Waiting</text>
  <text x="80" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af">  이미지 풀 중, Init 컨테이너 실행 중</text>
  <text x="80" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">&#x25CF; Running</text>
  <text x="80" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af">  프로세스 실행 중</text>
  <text x="80" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">&#x25CF; Terminated</text>

  <text x="440" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#6b7280" text-anchor="middle">Pod phase vs 컨테이너 state는 별개다. Pod Running이어도 컨테이너가 Waiting일 수 있음</text>
</svg>
