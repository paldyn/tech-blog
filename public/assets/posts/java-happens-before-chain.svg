<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">happens-before 체인 예시</text>

  <!-- Main Thread -->
  <text x="60" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">메인 스레드</text>

  <!-- Step 1 -->
  <rect x="60" y="100" width="180" height="50" rx="8" fill="#1a2a4a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="150" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ffffff">sharedValue = 42</text>
  <text x="150" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">메인 스레드 쓰기</text>

  <!-- Arrow 1 -->
  <path d="M 240 125 L 290 125" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="255" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">HB</text>

  <!-- Step 2 -->
  <rect x="290" y="100" width="160" height="50" rx="8" fill="#1a2a4a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="370" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">t.start()</text>
  <text x="370" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">스레드 시작 규칙 #4</text>

  <!-- Arrow down to Thread T -->
  <path d="M 370 150 L 370 200" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="376" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">HB</text>

  <!-- Thread T -->
  <text x="290" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">스레드 T</text>

  <rect x="290" y="226" width="200" height="50" rx="8" fill="#2a1a4a" stroke="#5a3a8e" stroke-width="1.5"/>
  <text x="390" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ffffff">result = sharedValue</text>
  <text x="390" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">42 보장 (가시성)</text>

  <!-- Arrow from Thread T up to join -->
  <path d="M 390 276 L 390 316" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="396" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">HB</text>

  <!-- Back in main thread -->
  <rect x="290" y="320" width="160" height="50" rx="8" fill="#1a2a4a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="370" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">t.join()</text>
  <text x="370" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">스레드 종료 규칙 #5</text>

  <!-- Arrow after join -->
  <path d="M 450 345 L 500 345" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="462" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">HB</text>

  <rect x="500" y="320" width="230" height="50" rx="8" fill="#0d1a0d" stroke="#2a4a2a" stroke-width="1.5"/>
  <text x="615" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ffffff">System.out.println(result)</text>
  <text x="615" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">result 값 안전하게 읽힘</text>

  <!-- Right side chain summary -->
  <rect x="620" y="90" width="220" height="200" rx="10" fill="#050e05" stroke="#2a4a2a" stroke-width="1"/>
  <text x="730" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">체인 순서</text>
  <text x="636" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">① sharedValue=42</text>
  <path d="M 730 148 L 730 158" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="636" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">② t.start()</text>
  <path d="M 730 180 L 730 190" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="636" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">③ 스레드 T 실행</text>
  <path d="M 730 212 L 730 222" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="636" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">④ t.join()</text>
  <path d="M 730 244 L 730 254" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="636" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">⑤ println(result)</text>

  <text x="730" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">이행성으로 ①→⑤ 모두 보장</text>
</svg>
