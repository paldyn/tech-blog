<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <!-- Background -->
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">동적 라우트 — 파일 구조와 URL 매핑</text>

  <!-- Left: File structure -->
  <rect x="50" y="68" width="360" height="360" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="230" y="96" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">파일 구조</text>

  <rect x="68" y="108" width="324" height="304" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="84" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">app/</text>
  <text x="84" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">├── blog/</text>
  <text x="84" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve">│   ├── [slug]/</text>
  <text x="84" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve">│   │   └── page.tsx</text>
  <text x="84" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">│   └── page.tsx</text>
  <text x="84" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">├── shop/</text>
  <text x="84" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" xml:space="preserve">│   └── [category]/</text>
  <text x="84" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" xml:space="preserve">│       └── [id]/</text>
  <text x="84" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" xml:space="preserve">│           └── page.tsx</text>
  <text x="84" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">└── user/</text>
  <text x="84" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" xml:space="preserve">    └── [userId]/</text>
  <text x="84" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" xml:space="preserve">        ├── page.tsx</text>
  <text x="84" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" xml:space="preserve">        └── settings/</text>
  <text x="84" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" xml:space="preserve">            └── page.tsx</text>
  <text x="84" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">// [ ] 안의 이름이 params 키</text>

  <!-- Right: URL mapping -->
  <rect x="470" y="68" width="360" height="360" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="650" y="96" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">URL 매핑</text>

  <!-- blog/[slug] -->
  <rect x="490" y="110" width="320" height="82" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="500" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve">blog/[slug]</text>
  <text x="500" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">/blog/hello-world</text>
  <text x="500" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">  → { slug: 'hello-world' }</text>
  <text x="500" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">/blog/nextjs-tips → { slug: 'nextjs-tips' }</text>

  <!-- shop/[category]/[id] -->
  <rect x="490" y="204" width="320" height="82" rx="6" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1"/>
  <text x="500" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" xml:space="preserve">shop/[category]/[id]</text>
  <text x="500" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">/shop/electronics/42</text>
  <text x="500" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">  → { category: 'electronics',</text>
  <text x="500" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">       id: '42' }</text>

  <!-- user/[userId] -->
  <rect x="490" y="298" width="320" height="82" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="500" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" xml:space="preserve">user/[userId]/settings</text>
  <text x="500" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">/user/123/settings</text>
  <text x="500" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" xml:space="preserve">  → { userId: '123' }</text>
  <text x="500" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">  (params는 항상 string)</text>

  <!-- Note at bottom -->
  <rect x="50" y="444" width="780" height="0" rx="0" fill="none"/>
</svg>
