<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">제네릭 기본값 선언 문법</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">타입 파라미터에 = 키워드로 기본 타입 지정</text>

  <!-- Left label: Function -->
  <text x="60" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">함수 (Function)</text>

  <!-- Left code block: 6 lines, h=126 -->
  <rect x="60" y="116" width="360" height="126" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">function</tspan> wrap&lt;<tspan fill="#7ec8e3" font-weight="600">T</tspan> = <tspan fill="#ce9178">string</tspan>&gt;(</text>
  <text x="76" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  value: <tspan fill="#7ec8e3" font-weight="600">T</tspan></text>
  <text x="76" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">): { value: <tspan fill="#7ec8e3" font-weight="600">T</tspan> } {</text>
  <text x="76" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3" font-weight="600">return</tspan> { value };</text>
  <text x="76" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>
  <text x="76" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// T 생략 시 기본값 string 사용</text>

  <!-- Right label: Interface -->
  <text x="460" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">인터페이스 (Interface)</text>

  <!-- Right code block: 6 lines, h=126 -->
  <rect x="460" y="116" width="360" height="126" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">interface</tspan> ApiResponse&lt;</text>
  <text x="476" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3" font-weight="600">T</tspan> = <tspan fill="#7ec8e3" font-weight="600">unknown</tspan></text>
  <text x="476" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">&gt; {</text>
  <text x="476" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  data: <tspan fill="#7ec8e3" font-weight="600">T</tspan>;</text>
  <text x="476" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  status: <tspan fill="#b5cea8">number</tspan>;</text>
  <text x="476" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>

  <!-- Bottom label: Class -->
  <text x="60" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">클래스 (Class)</text>

  <!-- Bottom code block: 5 lines, h=108 -->
  <rect x="60" y="274" width="760" height="108" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">class</tspan> Box&lt;<tspan fill="#7ec8e3" font-weight="600">T</tspan> = <tspan fill="#ce9178">string</tspan>&gt; {</text>
  <text x="76" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3" font-weight="600">constructor</tspan>(<tspan fill="#7ec8e3" font-weight="600">private</tspan> value: <tspan fill="#7ec8e3" font-weight="600">T</tspan>) {}</text>
  <text x="76" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  get(): <tspan fill="#7ec8e3" font-weight="600">T</tspan> { <tspan fill="#7ec8e3" font-weight="600">return</tspan> <tspan fill="#7ec8e3" font-weight="600">this</tspan>.value; }</text>
  <text x="76" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>
  <text x="76" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"><tspan fill="#7ec8e3" font-weight="600">const</tspan> b = <tspan fill="#7ec8e3" font-weight="600">new</tspan> Box(); <tspan fill="#9aa4b8">// Box&lt;string&gt; — T에 기본값 string 적용</tspan></text>

  <!-- Rule box: 2 lines, h=54 -->
  <rect x="60" y="404" width="760" height="54" rx="6" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">규칙: 기본값이 있는 파라미터는 항상 뒤에 위치 — function f&lt;A, B = string&gt;() ✓  function f&lt;A = string, B&gt;() ✗</text>
  <text x="440" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">기본값 지정 시 호출·인스턴스 생성에서 해당 파라미터 생략 가능 (추론 실패 시 기본값 적용)</text>
</svg>
