<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 540"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="540" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">CREATE TABLE 문 해부</text>

  <!-- Code block -->
  <rect x="60" y="68" width="760" height="244" rx="6" fill="#070b14" stroke="#1e2433"/>

  <!-- Line 1: CREATE TABLE -->
  <text x="80" y="94" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">CREATE TABLE</text>
  <text x="201" y="94" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"> employees (</text>

  <!-- Line 2: id column -->
  <text x="94" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">  id</text>
  <text x="122" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">        INTEGER</text>
  <text x="266" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">     NOT NULL</text>
  <text x="361" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc"> PRIMARY KEY,</text>

  <!-- Line 3: name column -->
  <text x="94" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">  name</text>
  <text x="138" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">      VARCHAR(100)</text>
  <text x="334" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555"> NOT NULL,</text>

  <!-- Line 4: email column -->
  <text x="94" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">  email</text>
  <text x="146" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">     VARCHAR(200)</text>
  <text x="342" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc"> UNIQUE,</text>

  <!-- Line 5: salary column -->
  <text x="94" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">  salary</text>
  <text x="154" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">    DECIMAL(12,2)</text>
  <text x="352" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555"> DEFAULT 0</text>
  <text x="432" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555"> CHECK (salary &gt;= 0),</text>

  <!-- Line 6: dept_id column -->
  <text x="94" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">  dept_id</text>
  <text x="162" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">   INTEGER,</text>

  <!-- Line 7: created_at column -->
  <text x="94" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">  created_at</text>
  <text x="202" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3"> TIMESTAMP</text>
  <text x="302" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">  DEFAULT CURRENT_TIMESTAMP,</text>

  <!-- Line 8: FK constraint -->
  <text x="94" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">  -- 테이블 수준 제약</text>

  <!-- Line 9: FK -->
  <text x="94" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  CONSTRAINT</text>
  <text x="196" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178"> fk_dept</text>
  <text x="258" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3"> FOREIGN KEY</text>
  <text x="370" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"> (dept_id)</text>
  <text x="452" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3"> REFERENCES</text>
  <text x="556" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"> departments(id)</text>

  <!-- Line 10: closing paren -->
  <text x="80" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">);</text>

  <!-- ── Annotations ── -->
  <!-- Annotation 1: CREATE TABLE -->
  <line x1="199" y1="68" x2="199" y2="56" stroke="#7777cc" stroke-width="1"/>
  <text x="122" y="52" font-size="11" fill="#7777cc">DDL 키워드</text>

  <!-- Annotation 2: 컬럼명 -->
  <line x1="110" y1="120" x2="70" y2="336" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="62" y="348" font-size="11" fill="#888">컬럼명</text>

  <!-- Annotation 3: 데이터 타입 -->
  <line x1="266" y1="106" x2="380" y2="340" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="365" y="352" font-size="11" fill="#7ec8e3">데이터 타입</text>

  <!-- Annotation 4: 제약 조건 -->
  <line x1="400" y1="112" x2="560" y2="336" stroke="#55c555" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="535" y="348" font-size="11" fill="#55c555">열 수준 제약</text>

  <!-- Annotation 5: 테이블 수준 제약 -->
  <line x1="450" y1="238" x2="720" y2="336" stroke="#ce9178" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="700" y="348" font-size="11" fill="#ce9178">테이블 수준 제약</text>

  <!-- Bottom notes -->
  <rect x="60" y="366" width="760" height="118" rx="6" fill="#0d0d15" stroke="#2a2a3a"/>
  <text x="440" y="388" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">CREATE TABLE의 세 구성 요소</text>

  <text x="110" y="410" font-size="12" font-weight="600" fill="#7ec8e3">①  테이블명</text>
  <text x="230" y="410" font-size="12" fill="#888">가독성 높은 명사 복수형 권장 (employees, orders)</text>

  <text x="110" y="430" font-size="12" font-weight="600" fill="#7ec8e3">②  컬럼 정의</text>
  <text x="230" y="430" font-size="12" fill="#888">이름 + 타입 [+ 열 수준 제약]. 컬럼 순서는 CREATE 시 고정</text>

  <text x="110" y="450" font-size="12" font-weight="600" fill="#7ec8e3">③  테이블 제약</text>
  <text x="230" y="450" font-size="12" fill="#888">여러 컬럼을 묶는 FK, 복합 PK, 복합 UNIQUE</text>

  <text x="110" y="470" font-size="12" font-weight="600" fill="#e8c555">⚠  주의</text>
  <text x="160" y="470" font-size="12" fill="#888">컬럼 추가는 저렴, 컬럼 타입 변경은 테이블 잠금+리빌드 발생 가능</text>

  <!-- Footer -->
  <text x="440" y="506" text-anchor="middle" font-size="11" fill="#444">PALDYN · SQL 완전 정복 · Part I · Chapter 2</text>
</svg>
