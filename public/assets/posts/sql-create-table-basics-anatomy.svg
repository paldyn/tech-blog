<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">CREATE TABLE 문 해부</text>

  <!-- Code block -->
  <rect x="60" y="72" width="430" height="280" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="100" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">CREATE TABLE</text>
  <text x="76" y="100" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">             employees (</text>
  <text x="76" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">  employee_id  </text>
  <text x="76" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">INT</text>
  <text x="76" y="118" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">           NOT NULL</text>
  <text x="76" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">             </text>
  <text x="76" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">                    PRIMARY KEY</text>
  <text x="76" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">            ,</text>
  <text x="76" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">  name         </text>
  <text x="76" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">VARCHAR</text>
  <text x="76" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">              (100) </text>
  <text x="76" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">NOT NULL</text>
  <text x="76" y="154" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">               ,</text>
  <text x="76" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">  hire_date    </text>
  <text x="76" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">DATE</text>
  <text x="76" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">              ,</text>
  <text x="76" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">  salary       </text>
  <text x="76" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">NUMERIC</text>
  <text x="76" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">              (12,2) </text>
  <text x="76" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">DEFAULT</text>
  <text x="76" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#b5cea8">               0</text>
  <text x="76" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">                ,</text>
  <text x="76" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">  dept_id      </text>
  <text x="76" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">INT</text>
  <text x="76" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">              ,</text>
  <text x="76" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">  CONSTRAINT</text>
  <text x="76" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">            fk_dept</text>
  <text x="76" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    FOREIGN KEY</text>
  <text x="76" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">               (dept_id)</text>
  <text x="76" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    REFERENCES</text>
  <text x="76" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">               departments(dept_id)</text>
  <text x="76" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">);</text>
  <text x="76" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">  </text>

  <!-- Annotation boxes -->
  <rect x="520" y="80" width="300" height="60" fill="#111827" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="536" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">열 이름</text>
  <text x="536" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">snake_case 권장. 예약어 충돌 시 ""로 감싸기</text>

  <rect x="520" y="154" width="300" height="60" fill="#111827" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="536" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">데이터 타입</text>
  <text x="536" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">INT / VARCHAR(n) / NUMERIC(p,s) / DATE 등</text>

  <rect x="520" y="228" width="300" height="60" fill="#111827" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="536" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">열 제약조건</text>
  <text x="536" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">NOT NULL / DEFAULT / UNIQUE / CHECK / PK</text>

  <rect x="520" y="302" width="300" height="60" fill="#111827" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="536" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">테이블 제약조건</text>
  <text x="536" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">CONSTRAINT 이름 붙여 관리 용이하게</text>

  <!-- Lines connecting code to annotations -->
  <line x1="490" y1="118" x2="520" y2="108" stroke="#e05555" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="490" y1="154" x2="520" y2="182" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="490" y1="190" x2="520" y2="257" stroke="#55c555" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="490" y1="244" x2="520" y2="330" stroke="#7777cc" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Schema prefix note -->
  <rect x="60" y="380" width="760" height="50" fill="#111827" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle" font-weight="600">스키마 명시: CREATE TABLE hr.employees (...)</text>
  <text x="440" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">스키마를 생략하면 현재 검색 경로(search_path / current schema)의 기본 스키마에 생성됩니다.</text>
</svg>
