<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">CREATE TABLE 구문 해부</text>

  <!-- Code block -->
  <rect x="60" y="64" width="480" height="290" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text x="76" y="88" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">CREATE TABLE</tspan>
    <tspan fill="#ffffff"> orders (</tspan>
  </text>
  <text x="76" y="108" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    id          </tspan>
    <tspan fill="#7ec8e3" font-weight="600">BIGINT</tspan>
    <tspan fill="#7ec8e3" font-weight="600"> GENERATED ALWAYS AS IDENTITY</tspan>
  </text>
  <text x="76" y="128" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">                </tspan>
    <tspan fill="#7ec8e3" font-weight="600">PRIMARY KEY</tspan>
    <tspan fill="#ffffff">,</tspan>
  </text>
  <text x="76" y="148" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    customer_id  </tspan>
    <tspan fill="#7ec8e3" font-weight="600">INT</tspan>
    <tspan fill="#7ec8e3" font-weight="600"> NOT NULL</tspan>
    <tspan fill="#ffffff">,</tspan>
  </text>
  <text x="76" y="168" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    status       </tspan>
    <tspan fill="#7ec8e3" font-weight="600">VARCHAR</tspan>
    <tspan fill="#ffffff">(</tspan>
    <tspan fill="#b5cea8">20</tspan>
    <tspan fill="#ffffff">)</tspan>
    <tspan fill="#7ec8e3" font-weight="600"> NOT NULL DEFAULT </tspan>
    <tspan fill="#ce9178">'pending'</tspan>
    <tspan fill="#ffffff">,</tspan>
  </text>
  <text x="76" y="188" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    total        </tspan>
    <tspan fill="#7ec8e3" font-weight="600">NUMERIC</tspan>
    <tspan fill="#ffffff">(</tspan>
    <tspan fill="#b5cea8">12</tspan>
    <tspan fill="#ffffff">,</tspan>
    <tspan fill="#b5cea8">2</tspan>
    <tspan fill="#ffffff">)</tspan>
    <tspan fill="#7ec8e3" font-weight="600"> CHECK</tspan>
    <tspan fill="#ffffff">(total </tspan>
    <tspan fill="#ffffff">&gt;= </tspan>
    <tspan fill="#b5cea8">0</tspan>
    <tspan fill="#ffffff">),</tspan>
  </text>
  <text x="76" y="208" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    created_at   </tspan>
    <tspan fill="#7ec8e3" font-weight="600">TIMESTAMPTZ</tspan>
    <tspan fill="#7ec8e3" font-weight="600"> DEFAULT now</tspan>
    <tspan fill="#ffffff">(),</tspan>
  </text>
  <text x="76" y="228" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    </tspan>
    <tspan fill="#7ec8e3" font-weight="600">CONSTRAINT</tspan>
    <tspan fill="#ffffff"> fk_cust</tspan>
  </text>
  <text x="76" y="248" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">        </tspan>
    <tspan fill="#7ec8e3" font-weight="600">FOREIGN KEY</tspan>
    <tspan fill="#ffffff"> (customer_id)</tspan>
  </text>
  <text x="76" y="268" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">        </tspan>
    <tspan fill="#7ec8e3" font-weight="600">REFERENCES</tspan>
    <tspan fill="#ffffff"> customers(id)</tspan>
  </text>
  <text x="76" y="288" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">        </tspan>
    <tspan fill="#7ec8e3" font-weight="600">ON DELETE CASCADE</tspan>
  </text>
  <text x="76" y="312" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">);</tspan>
  </text>

  <!-- Callout boxes -->
  <rect x="570" y="80" width="270" height="50" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="705" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">테이블명</text>
  <text x="705" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">스키마.테이블 형식 권장</text>
  <line x1="540" y1="88" x2="570" y2="105" stroke="#55c555" stroke-width="1" stroke-dasharray="4,4"/>

  <rect x="570" y="142" width="270" height="50" rx="6" fill="#0f1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="705" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">열 정의</text>
  <text x="705" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">이름 + 타입 + 열 제약</text>
  <line x1="540" y1="148" x2="570" y2="167" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="4,4"/>

  <rect x="570" y="204" width="270" height="50" rx="6" fill="#1a1a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="705" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">테이블 제약 (CONSTRAINT)</text>
  <text x="705" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">복합 키, FK 등 명시적 이름</text>
  <line x1="540" y1="228" x2="570" y2="229" stroke="#e05555" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- IF NOT EXISTS note -->
  <rect x="60" y="378" width="760" height="54" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">CREATE TABLE IF NOT EXISTS</text>
  <text x="440" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">테이블이 이미 존재하면 오류 대신 무시 — 멱등 마이그레이션 스크립트에 유용</text>
</svg>
