<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arrc" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">CREATE TABLE 구조 해부</text>

  <!-- Code block -->
  <rect x="60" y="66" width="480" height="340" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="90" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">CREATE TABLE</tspan><tspan fill="#ffffff"> 주문 (</tspan></text>
  <text x="80" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  주문ID    </tspan><tspan fill="#7ec8e3" font-weight="600">INTEGER</tspan></text>
  <text x="80" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">             PRIMARY KEY</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="80" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  고객ID    </tspan><tspan fill="#7ec8e3" font-weight="600">VARCHAR</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#b5cea8">10</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="80" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">             NOT NULL</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="80" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  주문일    </tspan><tspan fill="#7ec8e3" font-weight="600">DATE</tspan></text>
  <text x="80" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">             NOT NULL</tspan></text>
  <text x="80" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">             DEFAULT</tspan><tspan fill="#ffffff"> CURRENT_DATE,</tspan></text>
  <text x="80" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  금액      </tspan><tspan fill="#7ec8e3" font-weight="600">NUMERIC</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#b5cea8">12</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="80" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">             CHECK</tspan><tspan fill="#ffffff"> (금액 </tspan><tspan fill="#7ec8e3" font-weight="600">&gt;</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">),</tspan></text>
  <text x="80" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">  FOREIGN KEY</tspan><tspan fill="#ffffff"> (고객ID)</tspan></text>
  <text x="80" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">    REFERENCES</tspan><tspan fill="#ffffff"> 고객(고객ID)</tspan></text>
  <text x="80" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">    ON DELETE CASCADE</tspan></text>
  <text x="80" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">);</tspan></text>
  <text x="80" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">-- IF NOT EXISTS로 중복 생성 방지</tspan></text>
  <text x="80" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">CREATE TABLE IF NOT EXISTS</tspan><tspan fill="#ffffff"> ...</tspan></text>

  <!-- Annotations -->
  <!-- Column name -->
  <line x1="543" y1="100" x2="568" y2="100" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrc)"/>
  <rect x="570" y="70" width="240" height="60" rx="6" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="690" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">열 이름 + 데이터 타입</text>
  <text x="690" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">이름은 예약어 회피, 언더스코어 권장</text>
  <text x="690" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">타입은 스토리지 효율 고려</text>

  <!-- PRIMARY KEY -->
  <line x1="543" y1="130" x2="568" y2="140" stroke="#ce9178" stroke-width="1.5" marker-end="url(#arrc)"/>
  <rect x="570" y="148" width="240" height="52" rx="6" fill="#1a0a0a" stroke="#ce9178" stroke-width="1"/>
  <text x="690" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ce9178">PRIMARY KEY</text>
  <text x="690" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">UNIQUE + NOT NULL 자동 포함</text>

  <!-- NOT NULL / DEFAULT -->
  <line x1="543" y1="196" x2="568" y2="216" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrc)"/>
  <rect x="570" y="222" width="240" height="52" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="690" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">NOT NULL + DEFAULT</text>
  <text x="690" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">NULL 허용 여부 + 기본값</text>

  <!-- CHECK -->
  <line x1="543" y1="252" x2="568" y2="296" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arrc)"/>
  <rect x="570" y="300" width="240" height="52" rx="6" fill="#0a0a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="690" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">CHECK 제약</text>
  <text x="690" y="338" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">비즈니스 규칙을 DB 레이어에서 강제</text>

  <!-- FOREIGN KEY -->
  <line x1="543" y1="290" x2="568" y2="368" stroke="#e05555" stroke-width="1.5" marker-end="url(#arrc)"/>
  <rect x="570" y="372" width="240" height="52" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="690" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">FOREIGN KEY + ON DELETE</text>
  <text x="690" y="410" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">참조 무결성 — CASCADE/SET NULL</text>
</svg>
