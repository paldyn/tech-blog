<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Nexacro N + Node.js 어댑터 구조</text>

  <!-- Nexacro Client -->
  <rect x="40" y="80" width="200" height="80" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Nexacro N</text>
  <text x="140" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">transaction() 호출</text>

  <line x1="240" y1="120" x2="290" y2="120" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="265" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">PL POST</text>

  <!-- Express App -->
  <rect x="292" y="60" width="280" height="320" rx="10" fill="#14200a" stroke="#55c555" stroke-width="1.5"/>
  <text x="432" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">Node.js (Express)</text>

  <rect x="312" y="106" width="240" height="52" rx="6" fill="#0a0a0a" stroke="#55c555" stroke-width="1"/>
  <text x="432" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">nexacro-node-adapter</text>
  <text x="432" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">PL 파싱 미들웨어</text>

  <rect x="312" y="172" width="240" height="52" rx="6" fill="#0a0a0a" stroke="#7777cc" stroke-width="1"/>
  <text x="432" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">Router</text>
  <text x="432" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">서비스 ID 라우팅</text>

  <rect x="312" y="238" width="240" height="52" rx="6" fill="#0a0a0a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="432" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">Service Module</text>
  <text x="432" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">비즈니스 로직 (async/await)</text>

  <rect x="312" y="304" width="240" height="52" rx="6" fill="#0a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="432" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">DB Client</text>
  <text x="432" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">pg / mysql2 / knex</text>

  <!-- Internal arrows -->
  <line x1="432" y1="158" x2="432" y2="172" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="432" y1="224" x2="432" y2="238" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="432" y1="290" x2="432" y2="304" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr)"/>

  <line x1="572" y1="120" x2="632" y2="120" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="602" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SQL</text>

  <!-- DB -->
  <rect x="634" y="80" width="200" height="120" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="734" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">Database</text>
  <text x="734" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">PostgreSQL</text>
  <text x="734" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">MySQL / MSSQL</text>

  <!-- External API -->
  <rect x="634" y="220" width="200" height="120" rx="8" fill="#0a0a14" stroke="#7777cc" stroke-width="1"/>
  <text x="734" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">외부 API</text>
  <text x="734" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">REST / SOAP</text>
  <text x="734" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">마이크로서비스</text>

  <line x1="572" y1="260" x2="634" y2="260" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <!-- Note bottom -->
  <text x="440" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Node.js 어댑터: npm install nexacro-node-adapter  |  비동기(async/await) 완전 지원</text>
</svg>
