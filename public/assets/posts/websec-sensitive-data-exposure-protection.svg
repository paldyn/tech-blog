<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">민감 데이터 보호 방법</text>

  <!-- BAD label -->
  <text x="210" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">❌ 취약한 코드</text>

  <!-- GOOD label -->
  <text x="650" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">✅ 안전한 코드</text>

  <!-- BAD code box -->
  <rect x="20" y="92" width="400" height="180" rx="8" fill="#000000" stroke="#e05555" stroke-width="1"/>
  <text x="36" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// ❌ MD5 해싱 (위험)</text>
  <text x="36" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">const </text><text x="98" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">hash = md5(password)</text>
  <text x="36" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// ❌ API 키 하드코딩</text>
  <text x="36" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">const </text><text x="98" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">key = </text><text x="154" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">"sk-abc123"</text>
  <text x="36" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">⚠ 레인보우 테이블로 역산 가능</text>
  <text x="36" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">⚠ 소스 노출 시 즉시 탈취</text>

  <!-- GOOD code box -->
  <rect x="460" y="92" width="400" height="180" rx="8" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="476" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// ✅ bcrypt 해싱</text>
  <text x="476" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">const </text><text x="538" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">hash = </text><text x="598" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">await</text>
  <text x="476" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  bcrypt.hash(pw, 12)</text>
  <text x="476" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// ✅ 환경변수 사용</text>
  <text x="476" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">const </text><text x="538" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">key = process.env.</text><text x="718" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">API_KEY</text>
  <text x="476" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ 솔트 포함 느린 해시</text>
  <text x="476" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ 소스 노출과 무관하게 안전</text>

  <!-- Divider -->
  <line x1="440" y1="92" x2="440" y2="272" stroke="#3a4a6e" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Bottom summary boxes -->
  <rect x="20" y="294" width="840" height="80" rx="8" fill="#0a1020" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">민감 데이터 보호 원칙</text>
  <text x="80" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 전송: HTTPS/TLS 강제</text>
  <text x="80" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 저장: bcrypt/Argon2 해싱</text>
  <text x="360" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 시크릿: 환경변수/Vault 관리</text>
  <text x="360" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 응답: 필요한 필드만 반환</text>
  <text x="660" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 로깅: 민감정보 마스킹</text>
  <text x="660" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 암호화: AES-256 이상</text>

  <!-- Encryption flow diagram -->
  <rect x="20" y="390" width="840" height="76" rx="8" fill="#080808" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#9aa4b8" text-anchor="middle">비밀번호 저장 흐름</text>
  <rect x="40" y="424" width="120" height="32" rx="4" fill="#1a1020" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">평문 비밀번호</text>
  <text x="175" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7ec8e3" text-anchor="middle">→</text>
  <rect x="200" y="424" width="120" height="32" rx="4" fill="#1a1020" stroke="#3a4a6e" stroke-width="1"/>
  <text x="260" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">bcrypt(pw, 12)</text>
  <text x="335" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7ec8e3" text-anchor="middle">→</text>
  <rect x="360" y="424" width="180" height="32" rx="4" fill="#1a1020" stroke="#55c555" stroke-width="1"/>
  <text x="450" y="444" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#55c555" text-anchor="middle">$2b$12$abc...xyz</text>
  <text x="555" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7ec8e3" text-anchor="middle">→</text>
  <rect x="580" y="424" width="120" height="32" rx="4" fill="#1a1020" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">DB 저장</text>
</svg>
