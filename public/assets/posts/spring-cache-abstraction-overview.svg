<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 540" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-y" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Spring Cache 추상화 — 캐시 히트 · 미스 플로우</text>

  <!-- Abstraction layer -->
  <rect x="240" y="66" width="400" height="48" rx="8" fill="#0a0e1a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="90" text-anchor="middle" font-size="15" font-weight="700" fill="#7ec8e3">Spring Cache Abstraction</text>
  <text x="440" y="106" text-anchor="middle" font-size="12" fill="#888">@Cacheable · @CachePut · @CacheEvict · @Caching</text>

  <!-- Provider boxes -->
  <rect x="60" y="150" width="140" height="60" rx="8" fill="#0d1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="130" y="174" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">ConcurrentMap</text>
  <text x="130" y="192" text-anchor="middle" font-size="11" fill="#666">(Simple, 개발용)</text>

  <rect x="230" y="150" width="140" height="60" rx="8" fill="#0d1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="300" y="174" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">Caffeine</text>
  <text x="300" y="192" text-anchor="middle" font-size="11" fill="#666">(인메모리, 고성능)</text>

  <rect x="400" y="150" width="140" height="60" rx="8" fill="#0d1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="470" y="174" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">Redis</text>
  <text x="470" y="192" text-anchor="middle" font-size="11" fill="#666">(분산, TTL)</text>

  <rect x="570" y="150" width="140" height="60" rx="8" fill="#0d1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="640" y="174" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">JCache (JSR-107)</text>
  <text x="640" y="192" text-anchor="middle" font-size="11" fill="#666">(EhCache 등)</text>

  <!-- Connecting arrows from abstraction to providers -->
  <line x1="310" y1="114" x2="170" y2="150" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <line x1="380" y1="114" x2="310" y2="150" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <line x1="490" y1="114" x2="470" y2="150" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <line x1="560" y1="114" x2="620" y2="150" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <!-- Divider -->
  <line x1="60" y1="238" x2="820" y2="238" stroke="#333" stroke-width="1"/>
  <text x="440" y="232" text-anchor="middle" font-size="13" font-weight="600" fill="#888">캐시 동작 플로우</text>

  <!-- Cache hit flow -->
  <text x="200" y="260" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">Cache HIT</text>

  <rect x="60" y="270" width="100" height="40" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="110" y="295" text-anchor="middle" font-size="12" fill="#e8e8e8">Service 호출</text>

  <line x1="160" y1="290" x2="208" y2="290" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="210" y="270" width="100" height="40" rx="6" fill="#0d1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="260" y="290" text-anchor="middle" font-size="12" fill="#7ec8e3">Cache</text>
  <text x="260" y="304" text-anchor="middle" font-size="11" fill="#555">키 조회</text>

  <rect x="210" y="330" width="100" height="36" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="260" y="352" text-anchor="middle" font-size="12" fill="#55c555">히트! 반환</text>

  <line x1="260" y1="310" x2="260" y2="330" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <line x1="210" y1="348" x2="162" y2="298" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- Cache miss flow -->
  <text x="620" y="260" text-anchor="middle" font-size="14" font-weight="600" fill="#e8c555">Cache MISS</text>

  <rect x="440" y="270" width="100" height="40" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="490" y="295" text-anchor="middle" font-size="12" fill="#e8e8e8">Service 호출</text>

  <line x1="540" y1="290" x2="588" y2="290" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="590" y="270" width="100" height="40" rx="6" fill="#0d1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="640" y="290" text-anchor="middle" font-size="12" fill="#7ec8e3">Cache</text>
  <text x="640" y="304" text-anchor="middle" font-size="11" fill="#555">미스</text>

  <line x1="690" y1="290" x2="738" y2="290" stroke="#e8c555" stroke-width="2" marker-end="url(#arr-y)"/>

  <rect x="740" y="270" width="80" height="40" rx="6" fill="#1a1a0a" stroke="#e8c555" stroke-width="1.5"/>
  <text x="780" y="295" text-anchor="middle" font-size="12" fill="#e8c555">DB 조회</text>

  <path d="M 780 310 Q 780 350 640 350" fill="none" stroke="#e8c555" stroke-width="2" marker-end="url(#arr-y)"/>
  <text x="730" y="362" text-anchor="middle" font-size="11" fill="#888">결과 캐시 저장</text>

  <rect x="590" y="358" width="100" height="36" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="374" text-anchor="middle" font-size="11" fill="#55c555">캐시 저장 후</text>
  <text x="640" y="387" text-anchor="middle" font-size="11" fill="#55c555">결과 반환</text>

  <line x1="590" y1="376" x2="542" y2="306" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- Annotation table -->
  <text x="60" y="428" font-size="15" font-weight="600" fill="#e8e8e8">주요 어노테이션</text>

  <rect x="60" y="440" width="180" height="72" rx="6" fill="#0a0e1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="462" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">@Cacheable</text>
  <text x="150" y="478" text-anchor="middle" font-size="12" fill="#888">캐시 히트 시 메서드 건너뜀</text>
  <text x="150" y="494" text-anchor="middle" font-size="11" fill="#666">미스 시 실행 후 결과 저장</text>

  <rect x="260" y="440" width="180" height="72" rx="6" fill="#0a0e1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="350" y="462" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">@CachePut</text>
  <text x="350" y="478" text-anchor="middle" font-size="12" fill="#888">항상 메서드 실행</text>
  <text x="350" y="494" text-anchor="middle" font-size="11" fill="#666">결과를 캐시에 덮어씀</text>

  <rect x="460" y="440" width="180" height="72" rx="6" fill="#0a0e1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="550" y="462" text-anchor="middle" font-size="13" font-weight="600" fill="#e05555">@CacheEvict</text>
  <text x="550" y="478" text-anchor="middle" font-size="12" fill="#888">캐시 항목 삭제</text>
  <text x="550" y="494" text-anchor="middle" font-size="11" fill="#666">allEntries=true로 전체 삭제</text>

  <rect x="660" y="440" width="160" height="72" rx="6" fill="#0a0e1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="740" y="462" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">@Caching</text>
  <text x="740" y="478" text-anchor="middle" font-size="12" fill="#888">위 3개 혼합</text>
  <text x="740" y="494" text-anchor="middle" font-size="11" fill="#666">복합 캐시 조작</text>
</svg>
