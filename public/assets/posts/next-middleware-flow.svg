<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Next.js Middleware 처리 흐름</text>

  <!-- Client box -->
  <rect x="60" y="90" width="140" height="56" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="130" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">클라이언트</text>
  <text x="130" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Browser / Mobile</text>

  <!-- Arrow: Client -> Middleware -->
  <line x1="200" y1="118" x2="268" y2="118" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="234" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Request</text>

  <!-- Middleware box -->
  <rect x="270" y="76" width="180" height="84" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="360" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">Middleware</text>
  <text x="360" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">middleware.ts</text>
  <text x="360" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Edge Runtime</text>

  <!-- Arrow: Middleware -> Next handler -->
  <line x1="450" y1="118" x2="518" y2="118" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="484" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">next()</text>

  <!-- App router box -->
  <rect x="520" y="90" width="160" height="56" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="600" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">App Router</text>
  <text x="600" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Pages / API Routes</text>

  <!-- Redirect arrow down from Middleware -->
  <line x1="360" y1="160" x2="360" y2="220" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-red)"/>
  <text x="380" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">redirect()</text>

  <!-- Rewrite arrow -->
  <line x1="450" y1="130" x2="540" y2="180" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-blue)"/>
  <text x="510" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">rewrite()</text>

  <!-- Redirect target box -->
  <rect x="270" y="222" width="180" height="50" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="360" y="247" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">Redirect 응답</text>
  <text x="360" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">301/307/308</text>

  <!-- Rewrite target box -->
  <rect x="520" y="180" width="160" height="50" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="600" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Rewrite 응답</text>
  <text x="600" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">URL 변경 없이 처리</text>

  <!-- Divider -->
  <line x1="60" y1="300" x2="820" y2="300" stroke="#222" stroke-width="1"/>

  <!-- What can Middleware do section -->
  <text x="440" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e8e8e8" text-anchor="middle">Middleware가 할 수 있는 것</text>

  <!-- Cards row -->
  <!-- Card 1 -->
  <rect x="60" y="354" width="168" height="110" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="144" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">인증 / 인가</text>
  <text x="144" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">토큰 검증 후</text>
  <text x="144" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">로그인 페이지로 리다이렉트</text>
  <text x="144" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">또는 접근 허용</text>
  <text x="144" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">✓ 가장 흔한 활용</text>

  <!-- Card 2 -->
  <rect x="248" y="354" width="168" height="110" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="332" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">A/B 테스트</text>
  <text x="332" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">쿠키 기반 실험 그룹</text>
  <text x="332" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">분기 → 다른 페이지로</text>
  <text x="332" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">URL 변경 없이 rewrite</text>
  <text x="332" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">✓ SEO 영향 없음</text>

  <!-- Card 3 -->
  <rect x="436" y="354" width="168" height="110" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="520" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">국제화(i18n)</text>
  <text x="520" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Accept-Language 헤더</text>
  <text x="520" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">감지 → /ko/, /en/ 등</text>
  <text x="520" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">로케일 경로로 rewrite</text>
  <text x="520" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">✓ 서버측 감지</text>

  <!-- Card 4 -->
  <rect x="624" y="354" width="196" height="110" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="722" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">헤더 추가 / 변경</text>
  <text x="722" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">CSP, CORS 헤더 삽입</text>
  <text x="722" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">응답 헤더 커스터마이징</text>
  <text x="722" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">요청 헤더 전달</text>
  <text x="722" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">✓ 보안 강화</text>

  <!-- Bottom note -->
  <text x="440" y="490" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">⚠ DB 쿼리, fs 접근, Node.js 전용 API는 사용 불가 — Edge Runtime 제약</text>
</svg>
