<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Web Storage 비교</text>

  <!-- Table header -->
  <rect x="60" y="64" width="760" height="36" rx="6" fill="#131a2e"/>
  <text x="160" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">항목</text>
  <text x="340" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">localStorage</text>
  <text x="580" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8a84c">sessionStorage</text>

  <!-- Row 1: 지속성 -->
  <rect x="60" y="100" width="760" height="44" rx="4" fill="#111"/>
  <text x="160" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">지속성</text>
  <text x="340" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">영구 (명시적 삭제까지)</text>
  <text x="580" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8a84c">탭/창 닫으면 삭제</text>

  <!-- Row 2: 공유 범위 -->
  <rect x="60" y="144" width="760" height="44" rx="4" fill="#0f0f0f"/>
  <text x="160" y="171" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">탭 간 공유</text>
  <text x="340" y="171" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">같은 origin 모든 탭 공유</text>
  <text x="580" y="171" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8a84c">탭마다 독립 (공유 안 됨)</text>

  <!-- Row 3: 용량 -->
  <rect x="60" y="188" width="760" height="44" rx="4" fill="#111"/>
  <text x="160" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">용량</text>
  <text x="340" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">~5–10 MB (브라우저마다 다름)</text>
  <text x="580" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8a84c">~5–10 MB</text>

  <!-- Row 4: 데이터 타입 -->
  <rect x="60" y="232" width="760" height="44" rx="4" fill="#0f0f0f"/>
  <text x="160" y="259" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">데이터 타입</text>
  <text x="340" y="259" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">문자열만 (JSON 직렬화 필요)</text>
  <text x="580" y="259" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">문자열만</text>

  <!-- Row 5: 서버 전송 -->
  <rect x="60" y="276" width="760" height="44" rx="4" fill="#111"/>
  <text x="160" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">서버 자동 전송</text>
  <text x="340" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">없음 (쿠키와 달리)</text>
  <text x="580" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">없음</text>

  <!-- API Methods -->
  <text x="60" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">공통 API</text>

  <rect x="60" y="368" width="760" height="112" rx="6" fill="#111" stroke="#2a2a2a"/>
  <text x="80" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">storage.<text fill="#7ec8e3">setItem</text><text fill="#e8e8e8">(key, value)   </text><text fill="#6a8aa0">// 저장 (문자열 변환)</text></text>
  <text x="80" y="410" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">storage.<text fill="#7ec8e3">getItem</text><text fill="#e8e8e8">(key)          </text><text fill="#6a8aa0">// 읽기 (없으면 null)</text></text>
  <text x="80" y="430" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">storage.<text fill="#7ec8e3">removeItem</text><text fill="#e8e8e8">(key)       </text><text fill="#6a8aa0">// 개별 삭제</text></text>
  <text x="80" y="450" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">storage.<text fill="#7ec8e3">clear</text><text fill="#e8e8e8">()               </text><text fill="#6a8aa0">// 전체 삭제</text></text>
  <text x="80" y="470" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">storage.<text fill="#e8e8e8">length    storage.</text><text fill="#7ec8e3">key</text><text fill="#e8e8e8">(index)   </text><text fill="#6a8aa0">// 순회</text></text>
</svg>
