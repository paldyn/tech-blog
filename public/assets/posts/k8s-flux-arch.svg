<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Flux — 컨트롤러 툴킷 구조</text>

  <!-- sources -->
  <rect x="60" y="110" width="180" height="70" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Git 저장소</text>
  <text x="150" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888" text-anchor="middle">GitRepository CRD</text>

  <rect x="60" y="200" width="180" height="70" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Helm · OCI 저장소</text>
  <text x="150" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888" text-anchor="middle">HelmRepository · OCIRepository</text>

  <line x1="240" y1="145" x2="300" y2="175" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="240" y1="235" x2="300" y2="205" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- source controller -->
  <rect x="300" y="130" width="220" height="120" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="2"/>
  <text x="410" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">source-controller</text>
  <text x="410" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">소스를 주기적으로 fetch</text>
  <text x="410" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">검증 후 아티팩트(tar)로 제공</text>
  <text x="410" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">다른 컨트롤러의 공급원</text>

  <line x1="520" y1="160" x2="580" y2="135" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>
  <line x1="520" y1="220" x2="580" y2="245" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>

  <!-- kustomize controller -->
  <rect x="580" y="90" width="240" height="100" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="700" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">kustomize-controller</text>
  <text x="700" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888" text-anchor="middle">Kustomization CRD</text>
  <text x="700" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">빌드 → apply → prune → 헬스체크</text>

  <!-- helm controller -->
  <rect x="580" y="210" width="240" height="100" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="700" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">helm-controller</text>
  <text x="700" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888" text-anchor="middle">HelmRelease CRD</text>
  <text x="700" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">진짜 helm 릴리스를 설치 · 업그레이드</text>

  <!-- aux controllers -->
  <rect x="60" y="330" width="350" height="90" rx="8" fill="#201a10" stroke="#ce9178" stroke-width="1.5"/>
  <text x="235" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">notification-controller</text>
  <text x="235" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Slack 등으로 이벤트 알림 발송</text>
  <text x="235" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Git webhook 수신 → 즉시 reconcile</text>

  <rect x="470" y="330" width="350" height="90" rx="8" fill="#201a10" stroke="#ce9178" stroke-width="1.5"/>
  <text x="645" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">image-reflector · image-automation</text>
  <text x="645" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">레지스트리의 새 이미지 태그 감지</text>
  <text x="645" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">매니페스트 수정 커밋을 Git에 자동 push</text>

  <!-- bottom -->
  <rect x="60" y="446" width="760" height="50" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="467" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">"하나의 앱"이 아니라 독립 컨트롤러들의 조합 — 필요한 것만 설치한다</text>
  <text x="440" y="487" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">모든 구성은 CRD — kubectl과 K8s RBAC만으로 운영 가능</text>
</svg>
