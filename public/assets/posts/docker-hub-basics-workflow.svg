<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">
    Docker Hub 기본 워크플로
  </text>

  <!-- Build step -->
  <rect x="60" y="70" width="220" height="60" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="170" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">① 이미지 빌드</text>
  <text x="170" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" text-anchor="middle">docker build -t user/app:v1 .</text>

  <!-- Arrow 1 -->
  <line x1="282" y1="100" x2="318" y2="100" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Login step -->
  <rect x="320" y="70" width="220" height="60" rx="8" fill="#1a1a0a" stroke="#e8a020" stroke-width="1"/>
  <text x="430" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8a020" text-anchor="middle">② 로그인</text>
  <text x="430" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" text-anchor="middle">docker login</text>

  <!-- Arrow 2 -->
  <line x1="542" y1="100" x2="578" y2="100" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Push step -->
  <rect x="580" y="70" width="240" height="60" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="700" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">③ 푸시</text>
  <text x="700" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" text-anchor="middle">docker push user/app:v1</text>

  <!-- Rate limit info -->
  <rect x="60" y="160" width="760" height="110" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="80" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">Docker Hub Rate Limit (2025 기준)</text>

  <!-- Table headers -->
  <text x="80" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">플랜</text>
  <text x="250" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">pull 제한</text>
  <text x="450" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">비고</text>

  <text x="80" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">익명</text>
  <text x="250" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">100회/6시간 (IP 기준)</text>
  <text x="450" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">CI에서 가장 자주 막힘</text>

  <text x="80" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">Free 계정</text>
  <text x="250" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8a020">200회/6시간</text>
  <text x="450" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">docker login으로 해결</text>

  <text x="80" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff">Pro/Team</text>
  <text x="250" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">무제한</text>
  <text x="450" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">유료 플랜</text>

  <!-- Tag strategies -->
  <text x="60" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">태그 전략</text>

  <rect x="60" y="316" width="176" height="100" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="148" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle" font-weight="600">Semver</text>
  <text x="148" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" text-anchor="middle">app:1.2.3</text>
  <text x="148" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" text-anchor="middle">app:1.2</text>
  <text x="148" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" text-anchor="middle">app:1</text>
  <text x="148" y="406" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" text-anchor="middle">app:latest</text>

  <rect x="256" y="316" width="176" height="100" rx="6" fill="#0a0a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="344" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle" font-weight="600">Git 커밋</text>
  <text x="344" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" text-anchor="middle">app:main</text>
  <text x="344" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" text-anchor="middle">app:a1b2c3d</text>
  <text x="344" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" text-anchor="middle">app:pr-42</text>

  <rect x="452" y="316" width="176" height="100" rx="6" fill="#1a1a0a" stroke="#e8a020" stroke-width="1"/>
  <text x="540" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8a020" text-anchor="middle" font-weight="600">날짜/환경</text>
  <text x="540" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" text-anchor="middle">app:2026-05-22</text>
  <text x="540" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" text-anchor="middle">app:prod</text>
  <text x="540" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" text-anchor="middle">app:staging</text>

  <rect x="648" y="316" width="192" height="100" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="744" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle" font-weight="600">avoid :latest만</text>
  <text x="744" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">latest는 의미 없음</text>
  <text x="744" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">롤백 불가</text>
  <text x="744" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">버전 추적 불가</text>
</svg>
