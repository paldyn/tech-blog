<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380" style="background:#0a0a0a;border-radius:12px">
  <!-- Title -->
  <text x="60" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" xml:space="preserve">splitChunks · manualChunks 설정</text>
  <text x="60" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888" xml:space="preserve">자동 청킹 + 수동 vendor 분리 전략</text>

  <!-- webpack splitChunks -->
  <text x="60" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" xml:space="preserve">webpack — splitChunks 세밀 제어</text>
  <rect x="60" y="110" width="376" height="240" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">splitChunks: {</text>
  <text x="76" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  chunks: </tspan><tspan fill="#ce9178">'all'</tspan><tspan fill="#ffffff">,</tspan></text>

  <text x="76" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  minSize: </tspan><tspan fill="#b5cea8">20_000</tspan><tspan fill="#ffffff">,</tspan></text>

  <text x="76" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  maxInitialRequests: </tspan><tspan fill="#b5cea8">5</tspan><tspan fill="#ffffff">,</tspan></text>

  <text x="76" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  cacheGroups: {</text>
  <text x="76" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    react: {</text>
  <text x="76" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">      test: </tspan><tspan fill="#b5cea8">/react|react-dom/</tspan><tspan fill="#ffffff">,</tspan></text>

  <text x="76" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">      name: </tspan><tspan fill="#ce9178">'react-vendor'</tspan><tspan fill="#ffffff">,</tspan></text>

  <text x="76" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">      priority: </tspan><tspan fill="#b5cea8">10</tspan><tspan fill="#ffffff">,</tspan></text>

  <text x="76" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    }</text>
  <text x="76" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  }</text>
  <text x="76" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">}</text>

  <!-- Vite manualChunks -->
  <text x="476" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" xml:space="preserve">Vite — manualChunks 함수형</text>
  <rect x="476" y="110" width="364" height="240" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="492" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// rollupOptions.output</text>
  <text x="492" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">manualChunks(id) {</text>
  <text x="492" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">  if </tspan><tspan fill="#ffffff">(id.includes(</tspan><tspan fill="#ce9178">'react'</tspan><tspan fill="#ffffff">)) {</tspan></text>

  <text x="492" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">    return </tspan><tspan fill="#ce9178">'react-vendor'</tspan><tspan fill="#ffffff">;</tspan></text>

  <text x="492" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  }</text>
  <text x="492" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">  if </tspan><tspan fill="#ffffff">(id.includes(</tspan><tspan fill="#ce9178">'chart.js'</tspan><tspan fill="#ffffff">)) {</tspan></text>

  <text x="492" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">    return </tspan><tspan fill="#ce9178">'chart-vendor'</tspan><tspan fill="#ffffff">;</tspan></text>

  <text x="492" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  }</text>
  <text x="492" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">  if </tspan><tspan fill="#ffffff">(id.includes(</tspan><tspan fill="#ce9178">'node_modules'</tspan><tspan fill="#ffffff">))</tspan></text>

  <text x="492" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3">    return </tspan><tspan fill="#ce9178">'vendor'</tspan><tspan fill="#ffffff">;</tspan></text>

  <text x="492" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">},</text>

  <text x="60" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" xml:space="preserve">runtimeChunk: 'single' — 런타임을 별도 청크로 분리해 contenthash 안정화</text>
</svg>
