<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" style="background:#0a0a0a;border-radius:12px;">
  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Selector 패턴 — 상태 파생과 메모이제이션</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">createSelector로 파생 상태를 효율적으로 계산</text>

  <!-- Left: basic selectors -->
  <rect x="60" y="94" width="380" height="320" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="113" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// cartSelectors.ts</text>
  <text x="76" y="131" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">import</tspan> &#123; createSelector &#125; <tspan fill="#7ec8e3" font-weight="600">from</tspan> <tspan fill="#ce9178">'@reduxjs/toolkit'</tspan>;</text>
  <text x="76" y="149" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 기본 selector</text>
  <text x="76" y="167" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">export const</tspan> selectCartItems =</text>
  <text x="76" y="185" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  (s: RootState) =&gt; s.cart.items;</text>
  <text x="76" y="203" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 파생 selector (memoized)</text>
  <text x="76" y="221" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">export const</tspan> selectCartTotal = createSelector(</text>
  <text x="76" y="239" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  selectCartItems,</text>
  <text x="76" y="257" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  items =&gt; items.reduce((sum, i) =&gt; sum + i.price, <tspan fill="#b5cea8">0</tspan>)</text>
  <text x="76" y="275" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">); <tspan fill="#9aa4b8">// items 참조가 같으면 재계산 안 함</tspan></text>
  <text x="76" y="293" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">export const</tspan> selectItemCount = createSelector(</text>
  <text x="76" y="311" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  selectCartItems,</text>
  <text x="76" y="329" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  items =&gt; items.reduce((sum, i) =&gt; sum + i.qty, <tspan fill="#b5cea8">0</tspan>)</text>
  <text x="76" y="347" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">);</text>
  <text x="76" y="365" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 여러 slice를 조합하는 selector</text>
  <text x="76" y="383" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">export const</tspan> selectIsCartEmpty = createSelector(</text>
  <text x="76" y="401" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  selectCartItems,</text>

  <!-- Right: component usage -->
  <rect x="460" y="94" width="360" height="320" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="113" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 컴포넌트에서 selector 사용</text>
  <text x="476" y="131" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">function</tspan> CartBadge() &#123;</text>
  <text x="476" y="149" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">const</tspan> count = useAppSelector(selectItemCount);</text>
  <text x="476" y="167" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">if</tspan> (count === <tspan fill="#b5cea8">0</tspan>) <tspan fill="#7ec8e3" font-weight="600">return</tspan> <tspan fill="#b5cea8">null</tspan>;</text>
  <text x="476" y="185" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">return</tspan> &lt;<tspan fill="#7ec8e3" font-weight="600">span</tspan> className=<tspan fill="#ce9178">"badge"</tspan>&gt;&#123;count&#125;&lt;/<tspan fill="#7ec8e3" font-weight="600">span</tspan>&gt;;</text>
  <text x="476" y="203" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">&#125;</text>
  <text x="476" y="221" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">function</tspan> CartSummary() &#123;</text>
  <text x="476" y="239" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">const</tspan> total = useAppSelector(selectCartTotal);</text>
  <text x="476" y="257" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">const</tspan> dispatch = useAppDispatch();</text>
  <text x="476" y="275" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">return</tspan> (</text>
  <text x="476" y="293" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    &lt;<tspan fill="#7ec8e3" font-weight="600">div</tspan>&gt;</text>
  <text x="476" y="311" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      &lt;<tspan fill="#7ec8e3" font-weight="600">p</tspan>&gt;합계: &#123;total&#125;원&lt;/<tspan fill="#7ec8e3" font-weight="600">p</tspan>&gt;</text>
  <text x="476" y="329" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      &lt;<tspan fill="#7ec8e3" font-weight="600">button</tspan> onClick=&#123;() =&gt; dispatch(clearCart())&#125;&gt;</text>
  <text x="476" y="347" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">        비우기</text>
  <text x="476" y="365" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      &lt;/<tspan fill="#7ec8e3" font-weight="600">button</tspan>&gt;</text>
  <text x="476" y="383" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    &lt;/<tspan fill="#7ec8e3" font-weight="600">div</tspan>&gt;</text>
  <text x="476" y="401" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  );</text>
</svg>
