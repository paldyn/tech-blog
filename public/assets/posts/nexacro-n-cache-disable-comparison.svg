<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">트랜잭션 캐시 문제와 해결 방법</text>

  <!-- Section labels -->
  <text x="205" y="82" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e05555">캐시 활성화 (문제)</text>
  <text x="675" y="82" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">캐시 비활성화 (해결)</text>

  <!-- Divider -->
  <line x1="440" y1="62" x2="440" y2="430" stroke="#2a2a2a" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- ===== LEFT: Cache ON ===== -->
  <!-- Box 1: Client -->
  <rect x="95" y="104" width="220" height="46" fill="#2a1212" rx="6" stroke="#e05555" stroke-width="1.5"/>
  <text x="205" y="131" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">브라우저 / Nexacro Form</text>

  <!-- Arrow down (cache hit path) -->
  <polygon points="202,150 208,150 208,188 214,188 205,200 196,188 202,188"
           fill="#e05555" stroke="#0a0a0a" stroke-width="1"/>
  <text x="222" y="178"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">GET 요청</text>

  <!-- Box 2: Cache -->
  <rect x="95" y="200" width="220" height="46" fill="#2a1212" rx="6" stroke="#e05555" stroke-width="1.5"/>
  <text x="205" y="220" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">브라우저 캐시 HIT</text>
  <text x="205" y="238" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">서버 미도달</text>

  <!-- Arrow back to client -->
  <polygon points="202,246 208,246 208,284 214,284 205,296 196,284 202,284"
           fill="#e05555" stroke="#0a0a0a" stroke-width="1"/>
  <text x="222" y="274"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">캐시된 응답 반환</text>

  <!-- Box 3: Stale data warning -->
  <rect x="95" y="296" width="220" height="46" fill="#3a1818" rx="6" stroke="#e05555" stroke-width="2"/>
  <text x="205" y="316" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">⚠ 오래된 데이터 표시</text>
  <text x="205" y="334" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">사용자에게 이전 결과 노출</text>

  <!-- Left label -->
  <text x="205" y="392"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">DB 변경 후에도 갱신 안 됨</text>

  <!-- ===== RIGHT: Cache OFF ===== -->
  <!-- Box 1: Client -->
  <rect x="565" y="104" width="220" height="46" fill="#12213a" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="675" y="131" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">브라우저 / Nexacro Form</text>

  <!-- Arrow down (to server) -->
  <polygon points="672,150 678,150 678,188 684,188 675,200 666,188 672,188"
           fill="#55c555" stroke="#0a0a0a" stroke-width="1"/>
  <text x="692" y="178"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">GET + _t=timestamp</text>

  <!-- Box 2: Server -->
  <rect x="565" y="200" width="220" height="46" fill="#12213a" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="675" y="220" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">서버 DB 실시간 조회</text>
  <text x="675" y="238" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">URL 고유 → 캐시 미적용</text>

  <!-- Arrow back to client -->
  <polygon points="672,246 678,246 678,284 684,284 675,296 666,284 672,284"
           fill="#55c555" stroke="#0a0a0a" stroke-width="1"/>
  <text x="692" y="274"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">최신 데이터 응답</text>

  <!-- Box 3: Fresh data -->
  <rect x="565" y="296" width="220" height="46" fill="#122a12" rx="6" stroke="#55c555" stroke-width="2"/>
  <text x="675" y="316" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓ 최신 데이터 표시</text>
  <text x="675" y="334" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">매 요청마다 서버 응답 반영</text>

  <!-- Right label -->
  <text x="675" y="392"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">DB 변경 즉시 화면 반영</text>

  <!-- Bottom note -->
  <text x="440" y="430"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#666" text-anchor="middle">핵심: URL에 고유 타임스탬프 포함 → 캐시 키 변화 → 서버 재요청</text>
</svg>
