<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-main" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Native Image 빌드 파이프라인</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">입력 → 정적 분석 → 힙 스냅샷 → AOT 컴파일 → 실행 파일</text>

  <!-- Stage 1: Input -->
  <rect x="60" y="100" width="150" height="72" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="135" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">입력</text>
  <text x="135" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">JAR / Class 파일</text>
  <text x="135" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">+ 메타데이터 JSON</text>

  <!-- Arrow 1→2 -->
  <line x1="210" y1="136" x2="270" y2="136" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-main)"/>

  <!-- Stage 2: Static Analysis -->
  <rect x="270" y="100" width="160" height="72" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="350" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">정적 분석</text>
  <text x="350" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">포인트-투 분석</text>
  <text x="350" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">도달 가능 요소 결정</text>

  <!-- Arrow 2→3 -->
  <line x1="430" y1="136" x2="488" y2="136" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-main)"/>

  <!-- Stage 3: Heap Snapshotting -->
  <rect x="488" y="100" width="160" height="72" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="568" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">힙 스냅샷</text>
  <text x="568" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">초기화 객체 직렬화</text>
  <text x="568" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">이미지에 내장</text>

  <!-- Arrow 3→4 -->
  <line x1="648" y1="136" x2="706" y2="136" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-main)"/>

  <!-- Stage 4: AOT Compile -->
  <rect x="706" y="100" width="114" height="72" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="763" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">AOT 컴파일</text>
  <text x="763" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">기계어 생성</text>
  <text x="763" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">링킹</text>

  <!-- Arrow down from AOT -->
  <line x1="763" y1="172" x2="763" y2="222" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- Output box -->
  <rect x="658" y="222" width="162" height="60" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="739" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">네이티브 실행 파일</text>
  <text x="739" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">JVM 불필요 · 즉시 기동</text>

  <!-- Closed-world box -->
  <rect x="60" y="210" width="560" height="54" rx="8" fill="#1a1205" stroke="#e05555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="340" y="233" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">폐쇄 세계 가정 (Closed-World Assumption)</text>
  <text x="340" y="253" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">빌드 시점에 알 수 없는 클래스·리플렉션은 메타데이터로 명시해야 함</text>

  <!-- Benefits section -->
  <text x="60" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">장점</text>

  <rect x="60" y="318" width="240" height="54" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="180" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">즉시 기동 (수 ms)</text>
  <text x="180" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">JVM 워밍업 없음</text>

  <rect x="320" y="318" width="240" height="54" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">낮은 메모리 사용</text>
  <text x="440" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">불필요 클래스 제거</text>

  <!-- Limitations section -->
  <text x="60" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">주요 제약</text>

  <rect x="60" y="418" width="240" height="42" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="180" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">리플렉션 / JNI 수동 등록 필요</text>
  <text x="180" y="455" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">reachability-metadata.json</text>

  <rect x="320" y="418" width="240" height="42" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">동적 클래스 로딩 불가</text>
  <text x="440" y="455" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">빌드 시점 세계가 고정됨</text>
</svg>
