<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">import type은 컴파일하면 사라진다</text>

  <!-- Left: TS source -->
  <rect x="60" y="76" width="350" height="240" fill="#111827" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="235" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">TypeScript 소스</text>

  <rect x="76" y="116" width="318" height="132" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">import { api }</text>
  <text x="92" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  from "./api.js";</text>
  <text x="92" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">import type { User }</text>
  <text x="92" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  from "./types.js";</text>
  <text x="92" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> </text>
  <text x="92" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">const u: User = api.get();</text>

  <text x="235" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">값 import와 타입 import가 섞여 있음</text>

  <!-- Arrow -->
  <line x1="412" y1="196" x2="466" y2="196" stroke="#7ec8e3" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="439" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">tsc</text>

  <!-- Right: emitted JS -->
  <rect x="470" y="76" width="350" height="240" fill="#111827" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="645" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">컴파일된 JavaScript</text>

  <rect x="486" y="116" width="318" height="132" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="502" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">import { api }</text>
  <text x="502" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  from "./api.js";</text>
  <text x="502" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// import type 라인 제거됨</text>
  <text x="502" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> </text>
  <text x="502" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> </text>
  <text x="502" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">const u = api.get();</text>

  <text x="645" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">types.js는 로드조차 되지 않는다</text>

  <!-- Bottom note -->
  <rect x="60" y="340" width="760" height="42" fill="#111827" rx="8" stroke="#334155" stroke-width="1.5"/>
  <text x="440" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">타입 전용 import는 런타임에 존재하지 않는다 — 사이드 이펙트도, 순환 로드도 일으키지 않음</text>
</svg>
