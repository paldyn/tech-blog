<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <style>
      text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }
      .mono { font-family: 'JetBrains Mono','Menlo','Consolas',monospace; }
    </style>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">나이브 베이즈 분류기 구현</text>

  <!-- Left: Theory -->
  <rect x="60" y="64" width="364" height="30" rx="6" fill="#1a1a2e"/>
  <text x="242" y="84" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">나이브 베이즈의 "나이브"한 가정</text>

  <rect x="60" y="100" width="364" height="196" rx="6" fill="#111"/>
  <text x="242" y="126" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">독립성 가정 (Conditional Independence)</text>
  <text x="242" y="148" text-anchor="middle" font-size="12" fill="#aaa">특징들이 클래스 c 조건 하에</text>
  <text x="242" y="166" text-anchor="middle" font-size="12" fill="#aaa">서로 독립이라고 가정한다</text>
  <text x="242" y="192" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">P(x₁,...,xₙ|c) = ∏P(xᵢ|c)</text>
  <text x="242" y="216" text-anchor="middle" font-size="12" fill="#666">현실에서는 독립이 아닐 수 있음</text>
  <text x="242" y="234" text-anchor="middle" font-size="12" fill="#666">그러나 스팸 분류 등에서 실용적으로 잘 동작</text>
  <text x="242" y="256" text-anchor="middle" font-size="11" fill="#555">→ 훈련 빠름, 데이터 적어도 동작, 설명 가능</text>
  <text x="242" y="284" text-anchor="middle" font-size="11" fill="#55c555">→ 스팸 필터, 문서 분류, 추천 필터에 여전히 유용</text>

  <!-- Right: Code -->
  <rect x="456" y="64" width="364" height="30" rx="6" fill="#0e2010"/>
  <text x="638" y="84" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">sklearn으로 구현</text>

  <rect x="456" y="100" width="364" height="258" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text xml:space="preserve" x="472" y="122" class="mono" font-size="12" fill="#7ec8e3">from</text>
  <text xml:space="preserve" x="508" y="122" class="mono" font-size="12" fill="#e8e8e8">sklearn.naive_bayes</text>
  <text xml:space="preserve" x="472" y="140" class="mono" font-size="12" fill="#7ec8e3">    import</text>
  <text xml:space="preserve" x="534" y="140" class="mono" font-size="12" fill="#e8e8e8">MultinomialNB</text>
  <text xml:space="preserve" x="472" y="158" class="mono" font-size="12" fill="#7ec8e3">from</text>
  <text xml:space="preserve" x="508" y="158" class="mono" font-size="12" fill="#e8e8e8">sklearn.feature_extraction</text>
  <text xml:space="preserve" x="508" y="176" class="mono" font-size="12" fill="#7ec8e3">    .text import</text>
  <text xml:space="preserve" x="608" y="176" class="mono" font-size="12" fill="#e8e8e8">CountVectorizer</text>
  <text xml:space="preserve" x="472" y="194" class="mono" font-size="12" fill="#6a8aa0"># 학습 데이터</text>
  <text xml:space="preserve" x="472" y="212" class="mono" font-size="12" fill="#e8e8e8">emails = [</text>
  <text xml:space="preserve" x="472" y="230" class="mono" font-size="12" fill="#ce9178">  "무료 클릭 혜택",</text>
  <text xml:space="preserve" x="472" y="248" class="mono" font-size="12" fill="#ce9178">  "회의 일정 공유",</text>
  <text xml:space="preserve" x="472" y="266" class="mono" font-size="12" fill="#ce9178">  "당첨 클릭하세요",</text>
  <text xml:space="preserve" x="472" y="284" class="mono" font-size="12" fill="#ce9178">  "프로젝트 검토",</text>
  <text xml:space="preserve" x="472" y="284" class="mono" font-size="12" fill="#e8e8e8">             ]</text>
  <text xml:space="preserve" x="472" y="302" class="mono" font-size="12" fill="#6a8aa0"># 1=스팸, 0=정상</text>
  <text xml:space="preserve" x="472" y="320" class="mono" font-size="12" fill="#e8e8e8">labels = [</text>
  <text xml:space="preserve" x="472" y="338" class="mono" font-size="12" fill="#b5cea8">    1, 0, 1, 0</text>
  <text xml:space="preserve" x="472" y="338" class="mono" font-size="12" fill="#e8e8e8">           ]</text>
  <text xml:space="preserve" x="472" y="356" class="mono" font-size="12" fill="#e8e8e8">vec = CountVectorizer()</text>

  <!-- Bottom insight -->
  <rect x="60" y="378" width="760" height="44" rx="6" fill="#111"/>
  <text x="440" y="398" text-anchor="middle" font-size="12" fill="#aaa">나이브 베이즈 vs 딥러닝: 스팸 필터처럼 해석 가능성·속도가 중요한 작업엔 나이브 베이즈가 유리</text>
  <text x="440" y="416" text-anchor="middle" font-size="11" fill="#555">딥러닝은 더 복잡한 패턴을 포착하지만, 왜 그렇게 분류했는지 설명하기 어렵다 (Black-box 문제)</text>

  <!-- Footer -->
  <text x="440" y="444" text-anchor="middle" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈</text>
</svg>
