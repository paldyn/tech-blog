<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">마커 인터페이스 vs @interface 어노테이션</text>
  <text x="440" y="66" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">두 방식의 문법 차이와 트레이드오프 비교</text>

  <!-- ── 좌: 마커 인터페이스 코드 ── -->
  <text x="50" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">마커 인터페이스</text>

  <rect x="50" y="92" width="360" height="70" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="66" y="114" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 빈 몸체 = 타입 태그</text>
  <text x="66" y="132" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">public interface</tspan><tspan fill="#ffffff"> Auditable { }</tspan></text>
  <text x="66" y="150" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">class</tspan><tspan fill="#ffffff"> Order </tspan><tspan fill="#7ec8e3" font-weight="600">implements</tspan><tspan fill="#ffffff"> Auditable { }</tspan></text>

  <!-- ── 우: 어노테이션 코드 ── -->
  <text x="470" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">@interface 어노테이션</text>

  <rect x="470" y="92" width="360" height="70" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="486" y="114" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 어노테이션 방식</text>
  <text x="486" y="132" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">public @interface</tspan><tspan fill="#ffffff"> Auditable { }</tspan></text>
  <text x="486" y="150" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">@Auditable</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">class</tspan><tspan fill="#ffffff"> Order { }</tspan></text>

  <!-- 비교 섹션 레이블 -->
  <text x="440" y="182" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">특성 비교</text>

  <!-- 테이블 헤더 (y=190, h=44) -->
  <rect x="50"  y="190" width="120" height="44" rx="4" fill="#111827" stroke="#444" stroke-width="1"/>
  <rect x="178" y="190" width="268" height="44" rx="4" fill="#1a3a1a" stroke="#2d5a2d" stroke-width="1"/>
  <rect x="454" y="190" width="376" height="44" rx="4" fill="#1a1a3a" stroke="#2d2d5a" stroke-width="1"/>
  <text x="110" y="216" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">비교 항목</text>
  <text x="312" y="216" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">마커 인터페이스</text>
  <text x="642" y="216" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">@interface 어노테이션</text>

  <!-- Row 1: 타입 체계 (y=242, h=44) -->
  <rect x="50"  y="242" width="120" height="44" rx="4" fill="#111827" stroke="#333" stroke-width="1"/>
  <rect x="178" y="242" width="268" height="44" rx="4" fill="#0d1a0d" stroke="#2d5a2d" stroke-width="1"/>
  <rect x="454" y="242" width="376" height="44" rx="4" fill="#0d0d1a" stroke="#2d2d5a" stroke-width="1"/>
  <text x="110" y="268" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">타입 체계</text>
  <text x="312" y="268" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">instanceof 타입 체크 가능</text>
  <text x="642" y="268" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">instanceof 불가, 타입 시스템 외부</text>

  <!-- Row 2: 상속 (y=294, h=44) -->
  <rect x="50"  y="294" width="120" height="44" rx="4" fill="#111827" stroke="#333" stroke-width="1"/>
  <rect x="178" y="294" width="268" height="44" rx="4" fill="#0d1a0d" stroke="#2d5a2d" stroke-width="1"/>
  <rect x="454" y="294" width="376" height="44" rx="4" fill="#0d0d1a" stroke="#2d2d5a" stroke-width="1"/>
  <text x="110" y="320" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">상속</text>
  <text x="312" y="320" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">자식 클래스 자동 마킹</text>
  <text x="642" y="320" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">@Inherited 명시 없으면 미상속</text>

  <!-- Row 3: 메타데이터 (y=346, h=44) -->
  <rect x="50"  y="346" width="120" height="44" rx="4" fill="#111827" stroke="#333" stroke-width="1"/>
  <rect x="178" y="346" width="268" height="44" rx="4" fill="#0d1a0d" stroke="#2d5a2d" stroke-width="1"/>
  <rect x="454" y="346" width="376" height="44" rx="4" fill="#0d0d1a" stroke="#2d2d5a" stroke-width="1"/>
  <text x="110" y="372" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">메타데이터</text>
  <text x="312" y="372" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">불가 (빈 몸체)</text>
  <text x="642" y="372" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">속성 필드 추가 가능</text>

  <!-- Row 4: 권장 케이스 (y=398, h=44) -->
  <rect x="50"  y="398" width="120" height="44" rx="4" fill="#111827" stroke="#333" stroke-width="1"/>
  <rect x="178" y="398" width="268" height="44" rx="4" fill="#0d1a0d" stroke="#2d5a2d" stroke-width="1"/>
  <rect x="454" y="398" width="376" height="44" rx="4" fill="#0d0d1a" stroke="#2d2d5a" stroke-width="1"/>
  <text x="110" y="424" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">권장 케이스</text>
  <text x="312" y="424" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">타입 표시 (Serializable류)</text>
  <text x="642" y="424" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">AOP &#183; 설정 &#183; 리플렉션</text>

</svg>
