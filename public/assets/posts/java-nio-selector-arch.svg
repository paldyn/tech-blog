<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arry" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#b5cea8"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="21" font-weight="700" fill="#e8e8e8" text-anchor="middle">NIO Selector — 단일 스레드 다중 채널</text>
  <text x="440" y="64" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Selector가 준비된 채널만 골라 단일 스레드에 전달</text>

  <!-- Single Thread -->
  <rect x="60" y="85" width="130" height="320" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="125" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">단일</text>
  <text x="125" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">스레드</text>
  <text x="125" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">select()</text>
  <text x="125" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">블로킹 대기</text>
  <text x="125" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">selectedKeys()</text>
  <text x="125" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">이벤트 처리</text>
  <text x="125" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">N개 채널</text>
  <text x="125" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">동시 처리</text>

  <!-- Selector box -->
  <rect x="260" y="160" width="180" height="170" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="350" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">Selector</text>

  <!-- Keys inside Selector -->
  <rect x="278" y="194" width="144" height="24" rx="3" fill="#55c555" fill-opacity="0.2" stroke="#55c555" stroke-width="1"/>
  <text x="350" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">SelectionKey (ACCEPT)</text>

  <rect x="278" y="224" width="144" height="24" rx="3" fill="#7ec8e3" fill-opacity="0.2" stroke="#7ec8e3" stroke-width="1"/>
  <text x="350" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">SelectionKey (READ)</text>

  <rect x="278" y="254" width="144" height="24" rx="3" fill="#7ec8e3" fill-opacity="0.2" stroke="#7ec8e3" stroke-width="1"/>
  <text x="350" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">SelectionKey (READ)</text>

  <rect x="278" y="284" width="144" height="24" rx="3" fill="#b5cea8" fill-opacity="0.2" stroke="#b5cea8" stroke-width="1"/>
  <text x="350" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#b5cea8" text-anchor="middle">SelectionKey (WRITE)</text>

  <text x="350" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#666" text-anchor="middle">registeredKeys / selectedKeys</text>

  <!-- Arrows: Thread → Selector -->
  <line x1="190" y1="245" x2="260" y2="245" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Channels right -->
  <!-- ServerSocketChannel -->
  <rect x="520" y="85" width="300" height="50" rx="7" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="670" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">ServerSocketChannel</text>
  <text x="670" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">논블로킹, OP_ACCEPT 등록</text>

  <!-- SocketChannel 1 -->
  <rect x="520" y="155" width="300" height="50" rx="7" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="670" y="177" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">SocketChannel (client 1)</text>
  <text x="670" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">OP_READ / OP_WRITE</text>

  <!-- SocketChannel 2 -->
  <rect x="520" y="225" width="300" height="50" rx="7" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="670" y="247" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">SocketChannel (client 2)</text>
  <text x="670" y="263" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">OP_READ / OP_WRITE</text>

  <!-- SocketChannel N -->
  <rect x="520" y="295" width="300" height="50" rx="7" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="670" y="317" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">SocketChannel (client N)</text>
  <text x="670" y="333" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">OP_READ / OP_WRITE</text>

  <!-- Arrows: Selector → Channels -->
  <line x1="440" y1="195" x2="520" y2="110" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrg)"/>
  <line x1="440" y1="220" x2="520" y2="180" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="440" y1="245" x2="520" y2="250" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="440" y1="270" x2="520" y2="320" stroke="#b5cea8" stroke-width="1.5" marker-end="url(#arry)"/>

  <!-- SelectionKey ops label -->
  <rect x="60" y="430" width="760" height="54" rx="6" fill="#111" stroke="#3a3a3a" stroke-width="1"/>
  <text x="440" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">SelectionKey 관심 이벤트</text>
  <text x="155" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">OP_ACCEPT (1)</text>
  <text x="330" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">OP_CONNECT (8)</text>
  <text x="538" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">OP_READ (1)</text>
  <text x="706" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8" text-anchor="middle">OP_WRITE (4)</text>
</svg>
