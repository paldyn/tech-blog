<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Linux Namespace 7종 상세 — 컨테이너 격리 구현</text>

  <!-- Namespace types grid (2 rows x 4 cols) -->
  <!-- PID Namespace -->
  <rect x="60" y="68" width="190" height="110" rx="8" fill="#1a2e1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="155" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">PID Namespace</text>
  <text x="155" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">프로세스 ID 격리</text>
  <text x="155" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">컨테이너 내 PID 1 = 호스트의 12345</text>
  <text x="155" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">중첩 가능 (부모가 자식 보임)</text>
  <text x="155" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">CLONE_NEWPID</text>

  <!-- Network Namespace -->
  <rect x="265" y="68" width="190" height="110" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="360" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc">Network Namespace</text>
  <text x="360" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">네트워크 스택 격리</text>
  <text x="360" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">독립된 인터페이스·라우팅</text>
  <text x="360" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">iptables·포트 독립</text>
  <text x="360" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">CLONE_NEWNET</text>

  <!-- Mount Namespace -->
  <rect x="470" y="68" width="190" height="110" rx="8" fill="#2e2a1a" stroke="#e0a050" stroke-width="1.5"/>
  <text x="565" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e0a050">Mount Namespace</text>
  <text x="565" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">파일시스템 마운트 격리</text>
  <text x="565" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">pivot_root / chroot 기반</text>
  <text x="565" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">호스트 FS 보호</text>
  <text x="565" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e0a050">CLONE_NEWNS</text>

  <!-- UTS Namespace -->
  <rect x="675" y="68" width="145" height="110" rx="8" fill="#2e1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="748" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">UTS Namespace</text>
  <text x="748" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">hostname·domainname</text>
  <text x="748" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">독립된 호스트명</text>
  <text x="748" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">컨테이너명 표시</text>
  <text x="748" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">CLONE_NEWUTS</text>

  <!-- Row 2 -->
  <!-- IPC Namespace -->
  <rect x="60" y="196" width="190" height="110" rx="8" fill="#1a2e2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="155" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">IPC Namespace</text>
  <text x="155" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">IPC 리소스 격리</text>
  <text x="155" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">공유메모리·세마포어</text>
  <text x="155" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">메시지 큐 독립</text>
  <text x="155" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">CLONE_NEWIPC</text>

  <!-- User Namespace -->
  <rect x="265" y="196" width="190" height="110" rx="8" fill="#2e1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="360" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc">User Namespace</text>
  <text x="360" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">UID/GID 매핑 격리</text>
  <text x="360" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">컨테이너 root → 호스트 일반 user</text>
  <text x="360" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">rootless 컨테이너 기반</text>
  <text x="360" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">CLONE_NEWUSER</text>

  <!-- Cgroup Namespace -->
  <rect x="470" y="196" width="190" height="110" rx="8" fill="#1e2e1e" stroke="#55c555" stroke-width="1"/>
  <text x="565" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">Cgroup Namespace</text>
  <text x="565" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">cgroup 루트 격리</text>
  <text x="565" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">컨테이너의 / = 실제 cgroup경로</text>
  <text x="565" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">정보 노출 방지 (Linux 4.6+)</text>
  <text x="565" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">CLONE_NEWCGROUP</text>

  <!-- Time Namespace -->
  <rect x="675" y="196" width="145" height="110" rx="8" fill="#1e2e2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="748" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">Time Namespace</text>
  <text x="748" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">시계 격리 (Linux 5.6+)</text>
  <text x="748" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">CLOCK_MONOTONIC</text>
  <text x="748" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">테스트/마이그레이션</text>
  <text x="748" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">CLONE_NEWTIME</text>

  <!-- Code block: unshare examples -->
  <rect x="60" y="326" width="760" height="180" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 네임스페이스 직접 실험 (unshare)</text>
  <text x="76" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 새 PID + Mount + UTS 네임스페이스에서 bash 실행</text>
  <text x="76" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">sudo unshare</text>
  <text x="172" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> --pid --mount --uts --fork bash</text>
  <text x="76" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 현재 프로세스의 네임스페이스 확인</text>
  <text x="76" y="434" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">ls</text>
  <text x="96" y="434" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> -la /proc/$$/ns/</text>
  <text x="76" y="460" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 두 프로세스가 같은 ns 공유하는지 비교 (inode 번호)</text>
  <text x="76" y="480" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">ls</text>
  <text x="96" y="480" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> -lai /proc/1/ns/ /proc/$$/ns/</text>
  <text x="76" y="500" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># nsenter: 다른 프로세스의 ns에 진입</text>
</svg>
