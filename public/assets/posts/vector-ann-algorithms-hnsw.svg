<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">HNSW 계층 구조</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">상위 레이어 거친 탐색 → 하위 레이어 정밀 탐색</text>

  <!-- Layer 2 (top) - sparse -->
  <rect x="60" y="88" width="760" height="66" rx="6" fill="#0e0e1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="80" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">Layer 2</text>
  <text x="80" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">상위 레이어: 거친 탐색 (소수 노드)</text>

  <!-- Layer 2 nodes -->
  <circle cx="250" cy="121" r="14" fill="#1a1040" stroke="#7777cc" stroke-width="2"/>
  <text x="250" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">E</text>
  <circle cx="500" cy="121" r="14" fill="#1a1040" stroke="#7777cc" stroke-width="2"/>
  <text x="500" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">N</text>
  <circle cx="700" cy="121" r="14" fill="#1a1040" stroke="#7777cc" stroke-width="2"/>
  <text x="700" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">Q</text>
  <line x1="264" y1="121" x2="486" y2="121" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="514" y1="121" x2="686" y2="121" stroke="#7777cc" stroke-width="1.5"/>

  <!-- Entry point label -->
  <text x="250" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">진입점</text>

  <!-- Arrow layer 2 → layer 1 -->
  <line x1="440" y1="156" x2="440" y2="170" stroke="#7777cc" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="433,170 440,182 447,170" fill="#7777cc"/>

  <!-- Layer 1 (mid) - medium density -->
  <rect x="60" y="184" width="760" height="66" rx="6" fill="#081828" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Layer 1</text>
  <text x="80" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">중간 레이어: 중간 밀도 탐색</text>

  <!-- Layer 1 nodes -->
  <circle cx="200" cy="217" r="12" fill="#0a1e28" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="200" y="221" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">A</text>
  <circle cx="320" cy="217" r="12" fill="#0a1e28" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="320" y="221" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">B</text>
  <circle cx="450" cy="217" r="12" fill="#0a1e28" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="450" y="221" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">C</text>
  <circle cx="580" cy="217" r="12" fill="#0a1e28" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="580" y="221" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">D</text>
  <circle cx="710" cy="217" r="12" fill="#0a1e28" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="710" y="221" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">F</text>
  <line x1="212" y1="217" x2="308" y2="217" stroke="#7ec8e3" stroke-width="1"/>
  <line x1="332" y1="217" x2="438" y2="217" stroke="#7ec8e3" stroke-width="1"/>
  <line x1="462" y1="217" x2="568" y2="217" stroke="#7ec8e3" stroke-width="1"/>
  <line x1="592" y1="217" x2="698" y2="217" stroke="#7ec8e3" stroke-width="1"/>

  <!-- Arrow layer 1 → layer 0 -->
  <line x1="440" y1="252" x2="440" y2="266" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="433,266 440,278 447,266" fill="#7ec8e3"/>

  <!-- Layer 0 (bottom) - dense -->
  <rect x="60" y="280" width="760" height="66" rx="6" fill="#0a1e0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">Layer 0</text>
  <text x="80" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">하위 레이어: 정밀 탐색 (모든 노드)</text>

  <!-- Layer 0 nodes - dense -->
  <circle cx="140" cy="313" r="9" fill="#0a1e0a" stroke="#55c555" stroke-width="1"/>
  <circle cx="200" cy="313" r="9" fill="#0a1e0a" stroke="#55c555" stroke-width="1"/>
  <circle cx="260" cy="313" r="9" fill="#0a1e0a" stroke="#55c555" stroke-width="1"/>
  <circle cx="320" cy="313" r="9" fill="#0a1e0a" stroke="#55c555" stroke-width="1"/>
  <circle cx="380" cy="313" r="9" fill="#0a1e0a" stroke="#55c555" stroke-width="1"/>
  <circle cx="440" cy="313" r="11" fill="#1a2e1a" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="317" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">★</text>
  <circle cx="500" cy="313" r="9" fill="#0a1e0a" stroke="#55c555" stroke-width="1"/>
  <circle cx="560" cy="313" r="9" fill="#0a1e0a" stroke="#55c555" stroke-width="1"/>
  <circle cx="620" cy="313" r="9" fill="#0a1e0a" stroke="#55c555" stroke-width="1"/>
  <circle cx="680" cy="313" r="9" fill="#0a1e0a" stroke="#55c555" stroke-width="1"/>
  <circle cx="740" cy="313" r="9" fill="#0a1e0a" stroke="#55c555" stroke-width="1"/>

  <!-- Connecting lines -->
  <line x1="149" y1="313" x2="191" y2="313" stroke="#55c555" stroke-width="1"/>
  <line x1="209" y1="313" x2="251" y2="313" stroke="#55c555" stroke-width="1"/>
  <line x1="269" y1="313" x2="311" y2="313" stroke="#55c555" stroke-width="1"/>
  <line x1="329" y1="313" x2="371" y2="313" stroke="#55c555" stroke-width="1"/>
  <line x1="389" y1="313" x2="429" y2="313" stroke="#55c555" stroke-width="1"/>
  <line x1="451" y1="313" x2="491" y2="313" stroke="#55c555" stroke-width="1"/>
  <line x1="509" y1="313" x2="551" y2="313" stroke="#55c555" stroke-width="1"/>
  <line x1="569" y1="313" x2="611" y2="313" stroke="#55c555" stroke-width="1"/>
  <line x1="629" y1="313" x2="671" y2="313" stroke="#55c555" stroke-width="1"/>
  <line x1="689" y1="313" x2="731" y2="313" stroke="#55c555" stroke-width="1"/>

  <!-- Result label -->
  <text x="440" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">★ = 최근접 이웃 결과 | 레이어가 낮을수록 촘촘한 연결</text>
</svg>
