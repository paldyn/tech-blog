<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Python 코드 한 눈에 보기</text>

  <!-- Code block -->
  <rect x="60" y="68" width="760" height="284" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text x="76" y="96" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 변수 — 타입 선언 없이 바로 할당</text>
  <text x="76" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">name = <tspan fill="#ce9178">"Alice"</tspan></text>
  <text x="76" y="136" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">age  = <tspan fill="#b5cea8">30</tspan></text>
  <text x="76" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">score = <tspan fill="#b5cea8">98.5</tspan></text>

  <text x="76" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 조건문 — 들여쓰기로 블록 구분</text>
  <text x="76" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> age &gt;= </tspan><tspan fill="#b5cea8">18</tspan><tspan fill="#ffffff">:</tspan></text>
  <text x="76" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">print</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">f"안녕하세요, {name}님!"</tspan><tspan fill="#ffffff">)</tspan></text>

  <text x="76" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 함수 정의 — def 키워드</text>
  <text x="76" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">def</tspan><tspan fill="#ffffff"> greet(</tspan><tspan fill="#ffffff">person</tspan><tspan fill="#ffffff">):</tspan></text>
  <text x="76" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">f"Hello, {person}!"</tspan></text>

  <text x="76" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">print</tspan><tspan fill="#ffffff">(greet(name))  </tspan><tspan fill="#9aa4b8"># → Hello, Alice!</tspan></text>
  <text x="76" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">print</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#7ec8e3" font-weight="600">type</tspan><tspan fill="#ffffff">(age))   </tspan><tspan fill="#9aa4b8"># → &lt;class 'int'&gt;</tspan></text>
</svg>
