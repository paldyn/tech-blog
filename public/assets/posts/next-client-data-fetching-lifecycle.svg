<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arb" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">클라이언트 데이터 패칭 라이프사이클</text>

  <!-- Flow stages -->
  <!-- Stage 1 -->
  <rect x="60" y="80" width="170" height="64" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="145" y="108"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">마운트</text>
  <text x="145" y="130"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">loading=true</text>

  <!-- Arrow 1->2 -->
  <line x1="230" y1="112" x2="280" y2="112" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arb)"/>

  <!-- Stage 2 -->
  <rect x="284" y="80" width="170" height="64" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="369" y="108"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e09050">API 요청</text>
  <text x="369" y="130"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">fetch 실행</text>

  <!-- Arrow 2->3 -->
  <line x1="454" y1="112" x2="504" y2="112" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arb)"/>

  <!-- Stage 3 -->
  <rect x="508" y="80" width="170" height="64" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="593" y="108"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">응답 수신</text>
  <text x="593" y="130"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">data / error 설정</text>

  <!-- Arrow 3->4 -->
  <line x1="678" y1="112" x2="728" y2="112" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arb)"/>

  <!-- Stage 4 -->
  <rect x="732" y="80" width="108" height="64" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="786" y="108"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">리렌더</text>
  <text x="786" y="130"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">UI 업데이트</text>

  <!-- Two column headers -->
  <text x="230" y="178"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">useEffect + useState (직접 구현)</text>

  <text x="650" y="178"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">SWR / TanStack Query (라이브러리)</text>

  <!-- Code block left: useEffect -->
  <rect x="60" y="190" width="360" height="188" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="212" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// useEffect 패턴 — 직접 상태 관리</text>
  <text x="76" y="230" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> UserCard() {</tspan>
  </text>
  <text x="76" y="248" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  const</tspan>
    <tspan fill="#ffffff"> [data, setData] = useState(</tspan>
    <tspan fill="#b5cea8">null</tspan>
    <tspan fill="#ffffff">);</tspan>
  </text>
  <text x="76" y="266" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  const</tspan>
    <tspan fill="#ffffff"> [loading, setLoading] =</tspan>
  </text>
  <text x="76" y="284" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">    useState(</tspan>
    <tspan fill="#b5cea8">true</tspan>
    <tspan fill="#ffffff">);</tspan>
  </text>
  <text x="76" y="302" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">  // 로딩·에러 상태 직접 관리</text>
  <text x="76" y="320" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  useEffect</tspan>
    <tspan fill="#ffffff">(() =&gt; { ... }, []);</tspan>
  </text>
  <text x="76" y="338" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">  // 캐시·중복 제거 없음</text>
  <text x="76" y="364" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">}</text>

  <!-- Code block right: SWR -->
  <rect x="460" y="190" width="360" height="188" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="212" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// SWR — 캐시·중복 제거 자동</text>
  <text x="476" y="230" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">import</tspan>
    <tspan fill="#ffffff"> useSWR </tspan>
    <tspan fill="#7ec8e3" font-weight="600">from</tspan>
    <tspan fill="#ce9178"> 'swr'</tspan>
  </text>
  <text x="476" y="248" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> UserCard() {</tspan>
  </text>
  <text x="476" y="266" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  const</tspan>
    <tspan fill="#ffffff"> { data, isLoading } =</tspan>
  </text>
  <text x="476" y="284" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">    useSWR(</tspan>
    <tspan fill="#ce9178">'/api/user'</tspan>
    <tspan fill="#ffffff">, fetcher);</tspan>
  </text>
  <text x="476" y="302" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">  // 캐시·중복·포커스 갱신 내장</text>
  <text x="476" y="320" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  if</tspan>
    <tspan fill="#ffffff"> (isLoading) </tspan>
    <tspan fill="#7ec8e3" font-weight="600">return</tspan>
    <tspan fill="#ffffff"> &lt;Spinner /&gt;;</tspan>
  </text>
  <text x="476" y="338" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">  // revalidateOnFocus 기본 활성화</text>
  <text x="476" y="364" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">}</text>

  <!-- Bottom note -->
  <text x="440" y="416"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">클라이언트 패칭 권장 사례</text>
  <text x="440" y="438"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">사용자 인터랙션 후 데이터  |  실시간 갱신  |  개인화 콘텐츠  |  즐겨찾기·장바구니</text>
  <text x="440" y="460"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">초기 데이터는 서버 컴포넌트로 제공하고 이후 업데이트만 클라이언트에서 처리하는 하이브리드 패턴 권장</text>
</svg>
