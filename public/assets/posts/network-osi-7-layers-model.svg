<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-down" viewBox="0 0 14 14" refX="7" refY="12"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 14 0 L 7 13 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-up" viewBox="0 0 14 14" refX="7" refY="2"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 14 L 14 14 L 7 1 z" fill="#55c555"/>
    </marker>
  </defs>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">OSI 7계층 모델</text>

  <!-- Layer colors and data -->
  <!-- Layer 7: Application -->
  <rect x="180" y="64" width="320" height="46" rx="6" fill="#2a0a2a" stroke="#cc55cc" stroke-width="1.5"/>
  <text x="260" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">7계층</text>
  <text x="260" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#cc55cc">응용 계층 (Application)</text>
  <text x="550" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">HTTP, FTP, SMTP</text>
  <text x="550" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">데이터: 메시지</text>

  <!-- Layer 6: Presentation -->
  <rect x="180" y="116" width="320" height="46" rx="6" fill="#1a0a2a" stroke="#9977cc" stroke-width="1.5"/>
  <text x="260" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">6계층</text>
  <text x="260" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#9977cc">표현 계층 (Presentation)</text>
  <text x="550" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">SSL/TLS, JPEG</text>
  <text x="550" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">인코딩, 암호화</text>

  <!-- Layer 5: Session -->
  <rect x="180" y="168" width="320" height="46" rx="6" fill="#0a0a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="260" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">5계층</text>
  <text x="260" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">세션 계층 (Session)</text>
  <text x="550" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">NetBIOS, RPC</text>
  <text x="550" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">연결 수립/유지</text>

  <!-- Layer 4: Transport -->
  <rect x="180" y="220" width="320" height="46" rx="6" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="260" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">4계층</text>
  <text x="260" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">전송 계층 (Transport)</text>
  <text x="550" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">TCP, UDP</text>
  <text x="550" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">데이터: 세그먼트</text>

  <!-- Layer 3: Network -->
  <rect x="180" y="272" width="320" height="46" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="260" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">3계층</text>
  <text x="260" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">네트워크 계층 (Network)</text>
  <text x="550" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">IP, ICMP</text>
  <text x="550" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">데이터: 패킷</text>

  <!-- Layer 2: Data Link -->
  <rect x="180" y="324" width="320" height="46" rx="6" fill="#1a1200" stroke="#c8c855" stroke-width="1.5"/>
  <text x="260" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">2계층</text>
  <text x="260" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#c8c855">데이터 링크 계층 (Data Link)</text>
  <text x="550" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">이더넷, 802.11</text>
  <text x="550" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">데이터: 프레임</text>

  <!-- Layer 1: Physical -->
  <rect x="180" y="376" width="320" height="46" rx="6" fill="#1a0a00" stroke="#e8a55c" stroke-width="1.5"/>
  <text x="260" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">1계층</text>
  <text x="260" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8a55c">물리 계층 (Physical)</text>
  <text x="550" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">케이블, 광섬유</text>
  <text x="550" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">데이터: 비트</text>

  <!-- Down arrow (송신) -->
  <line x1="140" y1="80" x2="140" y2="410" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-down)"/>
  <text x="140" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">캡슐화</text>
  <text x="140" y="475" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">송신 측</text>

  <!-- Up arrow (수신) -->
  <line x1="770" y1="415" x2="770" y2="85" stroke="#55c555" stroke-width="2" marker-end="url(#arr-up)"/>
  <text x="770" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">역캡슐화</text>
  <text x="770" y="475" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">수신 측</text>
</svg>
