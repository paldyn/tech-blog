<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">OSI 7계층 모델</text>
  <text x="440" y="66" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">네트워크 통신을 7개의 추상 계층으로 표준화한 참조 모델</text>

  <!-- Layer boxes -->
  <!-- L7 Application -->
  <rect x="60" y="88" width="340" height="48" rx="6" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">7</text>
  <text x="100" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">응용 계층 (Application)</text>
  <text x="100" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">HTTP, FTP, SMTP, DNS</text>
  <!-- L6 Presentation -->
  <rect x="60" y="144" width="340" height="48" rx="6" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="80" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">6</text>
  <text x="100" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">표현 계층 (Presentation)</text>
  <text x="100" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">TLS/SSL, 암호화, 압축, 인코딩</text>
  <!-- L5 Session -->
  <rect x="60" y="200" width="340" height="48" rx="6" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="80" y="219" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">5</text>
  <text x="100" y="219" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">세션 계층 (Session)</text>
  <text x="100" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">세션 수립/유지/종료, RPC</text>
  <!-- L4 Transport -->
  <rect x="60" y="256" width="340" height="48" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">4</text>
  <text x="100" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">전송 계층 (Transport)</text>
  <text x="100" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">TCP, UDP — 포트, 흐름제어, 오류복구</text>
  <!-- L3 Network -->
  <rect x="60" y="312" width="340" height="48" rx="6" fill="#2a1a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="80" y="331" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">3</text>
  <text x="100" y="331" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">네트워크 계층 (Network)</text>
  <text x="100" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">IP, ICMP — 라우팅, 논리 주소</text>
  <!-- L2 Data Link -->
  <rect x="60" y="368" width="340" height="48" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="80" y="387" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">2</text>
  <text x="100" y="387" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">데이터링크 계층 (Data Link)</text>
  <text x="100" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">Ethernet, Wi-Fi — MAC, 프레임</text>
  <!-- L1 Physical -->
  <rect x="60" y="424" width="340" height="48" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1.2"/>
  <text x="80" y="443" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">1</text>
  <text x="100" y="443" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">물리 계층 (Physical)</text>
  <text x="100" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">케이블, 광섬유, 전파 — 비트 전송</text>

  <!-- Right side: PDU + Device -->
  <text x="490" y="85" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">PDU</text>
  <text x="620" y="85" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">대표 장비</text>

  <!-- PDU labels -->
  <text x="490" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">데이터(Data)</text>
  <text x="490" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">데이터(Data)</text>
  <text x="490" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">데이터(Data)</text>
  <text x="490" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">세그먼트</text>
  <text x="490" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">패킷(Packet)</text>
  <text x="490" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">프레임(Frame)</text>
  <text x="490" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">비트(Bit)</text>

  <!-- Device labels -->
  <text x="620" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">애플리케이션</text>
  <text x="620" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">애플리케이션</text>
  <text x="620" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">애플리케이션</text>
  <text x="620" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">방화벽, L4 LB</text>
  <text x="620" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">라우터</text>
  <text x="620" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">스위치, 브리지</text>
  <text x="620" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">케이블, 허브, NIC</text>

  <!-- Brace annotation: upper 3 = Application layers -->
  <line x1="466" y1="90" x2="466" y2="250" stroke="#333" stroke-width="1"/>
  <text x="470" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#444">상위 계층</text>

  <!-- Bottom note -->
  <rect x="60" y="482" width="760" height="26" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="499" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">송신 시 7→1 캡슐화(Encapsulation), 수신 시 1→7 역캡슐화(Decapsulation)</text>
</svg>
