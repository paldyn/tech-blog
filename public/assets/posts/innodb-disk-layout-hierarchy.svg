<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">InnoDB 디스크 레이아웃 계층 구조</text>

  <!-- Tablespace -->
  <rect x="60" y="72" width="760" height="390" rx="10" fill="#0d1117" stroke="#2a3a5a" stroke-width="2"/>
  <text x="160" y="100" font-size="16" font-weight="600" fill="#7ec8e3">Tablespace (ibdata1 / 개별 .ibd 파일)</text>
  <text x="700" y="100" text-anchor="end" font-size="12" fill="#888">논리적 최상위 단위</text>

  <!-- Segment -->
  <rect x="90" y="115" width="340" height="318" rx="8" fill="#111520" stroke="#2a3a4a"/>
  <text x="260" y="142" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc">Segment</text>
  <text x="260" y="162" text-anchor="middle" font-size="12" fill="#888">Leaf 세그먼트 (실제 데이터)</text>
  <text x="260" y="178" text-anchor="middle" font-size="12" fill="#888">Non-Leaf 세그먼트 (인덱스 내부 노드)</text>

  <!-- Extent -->
  <rect x="110" y="195" width="300" height="220" rx="6" fill="#0f1620" stroke="#2a4a3a"/>
  <text x="260" y="220" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">Extent = 64개 Page (1MB)</text>

  <!-- Pages -->
  <rect x="124" y="235" width="62" height="40" rx="4" fill="#1a2a3a" stroke="#2a4a5a"/>
  <text x="155" y="260" text-anchor="middle" font-size="11" fill="#7ec8e3">Page 0</text>

  <rect x="192" y="235" width="62" height="40" rx="4" fill="#1a2a3a" stroke="#2a4a5a"/>
  <text x="223" y="260" text-anchor="middle" font-size="11" fill="#7ec8e3">Page 1</text>

  <rect x="260" y="235" width="62" height="40" rx="4" fill="#1a2a3a" stroke="#2a4a5a"/>
  <text x="291" y="260" text-anchor="middle" font-size="11" fill="#7ec8e3">Page 2</text>

  <rect x="328" y="235" width="76" height="40" rx="4" fill="#1a2a3a" stroke="#2a4a5a"/>
  <text x="366" y="260" text-anchor="middle" font-size="11" fill="#888">... 64개</text>

  <!-- Page detail -->
  <rect x="124" y="295" width="276" height="108" rx="5" fill="#000000" stroke="#3a4a6e"/>
  <text x="262" y="318" text-anchor="middle" font-size="12" font-weight="600" fill="#e8e8e8">Page 내부 구조 (16KB)</text>
  <text x="140" y="338" font-size="12" fill="#7777cc">File Header</text>
  <text x="340" y="338" text-anchor="end" font-size="12" fill="#888">38 bytes</text>
  <text x="140" y="356" font-size="12" fill="#7ec8e3">Page Header</text>
  <text x="340" y="356" text-anchor="end" font-size="12" fill="#888">56 bytes</text>
  <text x="140" y="374" font-size="12" fill="#55c555">User Records</text>
  <text x="340" y="374" text-anchor="end" font-size="12" fill="#888">가변 크기</text>
  <text x="140" y="392" font-size="12" fill="#888">Free Space / Page Dir</text>

  <!-- Right: file types -->
  <rect x="450" y="115" width="355" height="318" rx="8" fill="#111520" stroke="#2a3a4a"/>
  <text x="627" y="142" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">파일 종류</text>

  <rect x="466" y="158" width="324" height="52" rx="5" fill="#1e2d4a" stroke="#2a3a5a"/>
  <text x="628" y="180" text-anchor="middle" font-size="13" fill="#7ec8e3">System Tablespace (ibdata1)</text>
  <text x="628" y="198" text-anchor="middle" font-size="12" fill="#888">Data Dict, Undo Log, Change Buffer</text>

  <rect x="466" y="220" width="324" height="52" rx="5" fill="#1e3a2a" stroke="#2a4a2a"/>
  <text x="628" y="242" text-anchor="middle" font-size="13" fill="#55c555">File-per-Table (.ibd)</text>
  <text x="628" y="260" text-anchor="middle" font-size="12" fill="#888">innodb_file_per_table=ON (권장)</text>

  <rect x="466" y="282" width="324" height="52" rx="5" fill="#2a1e3a" stroke="#3a2a4a"/>
  <text x="628" y="304" text-anchor="middle" font-size="13" fill="#7777cc">Temporary Tablespace</text>
  <text x="628" y="322" text-anchor="middle" font-size="12" fill="#888">ibtmp1 (임시 테이블, 재시작 시 초기화)</text>

  <rect x="466" y="344" width="324" height="52" rx="5" fill="#2a1a10" stroke="#4a2a1a"/>
  <text x="628" y="366" text-anchor="middle" font-size="13" fill="#e05555">Undo Tablespace</text>
  <text x="628" y="384" text-anchor="middle" font-size="12" fill="#888">undo_001, undo_002 (8.0+ 분리)</text>
</svg>
