<svg xmlns="http://www.w3.org/2000/svg" width="880" height="490" viewBox="0 0 880 490">
  <rect width="880" height="490" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">TypeScript Playground 인터페이스</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">설치 없이 브라우저에서 즉시 실험 — typescriptlang.org/play</text>
  <!-- Browser chrome mock -->
  <rect x="60" y="90" width="760" height="375" rx="8" fill="#1a1a1a" stroke="#333" stroke-width="1.5"/>
  <!-- Tab bar -->
  <rect x="60" y="90" width="760" height="32" rx="8" fill="#222" stroke="none"/>
  <rect x="60" y="106" width="760" height="16" rx="0" fill="#222" stroke="none"/>
  <rect x="80" y="95" width="140" height="22" rx="4" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="150" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa">TypeScript Playground</text>
  <!-- URL bar -->
  <rect x="60" y="122" width="760" height="26" rx="0" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="139" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555">typescriptlang.org/play</text>
  <!-- Toolbar area -->
  <rect x="60" y="148" width="760" height="32" rx="0" fill="#1e1e1e" stroke="#333" stroke-width="1"/>
  <text x="80" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">버전: 5.x.x</text>
  <text x="220" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">| 예제 | 설정 | 내보내기 | 공유</text>
  <!-- Left editor -->
  <rect x="60" y="180" width="380" height="250" rx="0" fill="#1e1e1e" stroke="#333" stroke-width="1"/>
  <text x="250" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">TypeScript 입력 (.ts)</text>
  <text x="80" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">interface</text>
  <text x="168" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> User {</text>
  <text x="80" y="243" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  name</text>
  <text x="132" y="243" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">: </text>
  <text x="147" y="243" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">string</text>
  <text x="80" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  age</text>
  <text x="125" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">: </text>
  <text x="140" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">number</text>
  <text x="80" y="281" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>
  <text x="80" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">const</text>
  <text x="130" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> user</text>
  <text x="168" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">: </text>
  <text x="183" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">User = {</text>
  <text x="80" y="329" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  name: </text>
  <text x="149" y="329" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">"Alice"</text>
  <text x="80" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  age: </text>
  <text x="140" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">30</text>
  <text x="80" y="367" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>
  <!-- Right output -->
  <rect x="440" y="180" width="380" height="250" rx="0" fill="#1e1e1e" stroke="#333" stroke-width="1"/>
  <text x="630" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">JavaScript 출력 (.js)</text>
  <text x="460" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// interface 사라짐</text>
  <text x="460" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">const</text>
  <text x="510" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> user = {</text>
  <text x="460" y="267" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  name: </text>
  <text x="529" y="267" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">"Alice"</text>
  <text x="460" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  age: </text>
  <text x="520" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">30</text>
  <text x="460" y="305" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">};</text>
  <!-- Error panel -->
  <rect x="60" y="430" width="760" height="35" rx="0" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="80" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">오류 0개 | 타입 정보 패널에서 호버로 타입 확인 가능</text>
  <text x="600" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">실시간 업데이트</text>
</svg>
