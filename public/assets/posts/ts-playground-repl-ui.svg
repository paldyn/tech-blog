<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">TypeScript Playground 주요 기능</text>

  <!-- Left panel - TS editor -->
  <rect x="60" y="70" width="360" height="320" rx="8" fill="#0a0f1a" stroke="#3178c6" stroke-width="1.5"/>
  <text x="240" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">TypeScript 입력</text>

  <rect x="76" y="104" width="328" height="270" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="128" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// 여기에 TypeScript 코드 입력</text>
  <text x="92" y="148" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">type</tspan> Point = {</text>
  <text x="92" y="168" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  x: <tspan fill="#ce9178">number</tspan>;</text>
  <text x="92" y="188" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  y: <tspan fill="#ce9178">number</tspan>;</text>
  <text x="92" y="208" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">};</text>
  <text x="92" y="228" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">function</tspan> dist(a: Point, b: Point) {</text>
  <text x="92" y="248" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  <tspan fill="#7ec8e3" font-weight="600">return</tspan> Math.sqrt(</text>
  <text x="92" y="268" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">    (a.x-b.x)**<tspan fill="#b5cea8">2</tspan> + (a.y-b.y)**<tspan fill="#b5cea8">2</tspan></text>
  <text x="92" y="288" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  );</text>
  <text x="92" y="308" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">}</text>

  <!-- Right panel - JS output -->
  <rect x="460" y="70" width="360" height="200" rx="8" fill="#0f1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">JavaScript 출력 (실시간)</text>

  <rect x="476" y="104" width="328" height="150" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="128" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// 타입 제거됨</text>
  <text x="492" y="148" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">function</tspan> dist(a, b) {</text>
  <text x="492" y="168" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  <tspan fill="#7ec8e3" font-weight="600">return</tspan> Math.sqrt(</text>
  <text x="492" y="188" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">    (a.x-b.x)**<tspan fill="#b5cea8">2</tspan>+(a.y-b.y)**<tspan fill="#b5cea8">2</tspan></text>
  <text x="492" y="208" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  );</text>
  <text x="492" y="228" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">}</text>

  <!-- Right panel 2 - errors/info -->
  <rect x="460" y="290" width="360" height="100" rx="8" fill="#2a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="640" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">오류 / 타입 정보 패널</text>
  <text x="640" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">실시간 타입 오류 강조 표시</text>
  <text x="640" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">변수에 마우스 오버 → 추론 타입 표시</text>
  <text x="640" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">URL로 공유 가능 (협업 · 질문 시 유용)</text>

  <!-- Feature labels -->
  <text x="240" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">TS 버전 전환 · strict 옵션 토글 · .d.ts 보기 지원</text>
  <text x="240" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">typescriptlang.org/play</text>
</svg>
