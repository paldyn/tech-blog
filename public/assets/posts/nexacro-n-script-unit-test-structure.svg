<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Nexacro N 스크립트 단위 테스트 구조</text>
  <text x="440" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">순수 함수 분리 → 독립 테스트 가능한 로직 설계</text>

  <!-- Testable zone vs Non-testable -->
  <rect x="40" y="100" width="375" height="320" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="228" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">테스트 가능한 영역</text>
  <line x1="60" y1="134" x2="395" y2="134" stroke="#1e3a1e" stroke-width="1"/>

  <rect x="60" y="146" width="335" height="50" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="1"/>
  <text x="228" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">순수 계산 함수</text>
  <text x="228" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">입력 → 출력 결정론적 함수 (UI 없음)</text>

  <rect x="60" y="208" width="335" height="50" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="1"/>
  <text x="228" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">포맷팅 / 유효성 검증 함수</text>
  <text x="228" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">fnFormatDate, fnValidateEmail 등</text>

  <rect x="60" y="270" width="335" height="50" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="1"/>
  <text x="228" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Dataset 변환 로직</text>
  <text x="228" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">필터, 집계, 정렬 계산 함수</text>

  <rect x="60" y="332" width="335" height="50" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="1"/>
  <text x="228" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">비즈니스 규칙 검증</text>
  <text x="228" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">조건 충족 여부 판단 함수</text>

  <text x="228" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">→ 공통 라이브러리(common.js)에 분리</text>

  <!-- Non-testable zone -->
  <rect x="465" y="100" width="375" height="320" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="653" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">단위 테스트 어려운 영역</text>
  <line x1="485" y1="134" x2="820" y2="134" stroke="#3a1e1e" stroke-width="1"/>

  <rect x="485" y="146" width="335" height="50" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="653" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">Transaction 호출</text>
  <text x="653" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">서버 의존성 → 통합 테스트로</text>

  <rect x="485" y="208" width="335" height="50" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="653" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">컴포넌트 이벤트 핸들러</text>
  <text x="653" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">UI 렌더링 의존 → 시나리오 테스트로</text>

  <rect x="485" y="270" width="335" height="50" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="653" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">팝업 / 화면 전환</text>
  <text x="653" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">DOM 의존성 → E2E 테스트로</text>

  <rect x="485" y="332" width="335" height="50" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="653" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">세션 / 권한 처리</text>
  <text x="653" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">인프라 의존성 → 통합 테스트로</text>

  <text x="653" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">→ 핵심 로직을 분리해 공통 함수로 추출</text>

  <!-- Bottom: strategy -->
  <rect x="40" y="436" width="800" height="44" rx="8" fill="#111118" stroke="#2a2a3a" stroke-width="1"/>
  <text x="60" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">전략: 테스트 가능한 로직 → 공통 JS 파일로 분리 → Node.js(Jest) 또는 별도 Test Form에서 단위 테스트</text>
  <text x="60" y="474" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">비즈니스 로직이 UI에서 분리될수록 테스트 가능성이 높아진다</text>
</svg>
