<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrP" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">옵저버 vs 발행-구독(Pub/Sub)</text>

  <!-- Observer pattern -->
  <rect x="60" y="68" width="350" height="182" rx="8" fill="#001a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="235" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">옵저버 패턴</text>
  <text x="235" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Subject가 Observer를 직접 알고 있음</text>

  <!-- Subject box -->
  <rect x="80" y="126" width="120" height="44" rx="6" fill="#111827" stroke="#7ec8e3" stroke-width="1"/>
  <text x="140" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Subject</text>
  <text x="140" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Observable</text>

  <!-- Observer boxes -->
  <rect x="250" y="114" width="100" height="32" rx="4" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="300" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">Observer A</text>

  <rect x="250" y="156" width="100" height="32" rx="4" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="300" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">Observer B</text>

  <rect x="250" y="198" width="100" height="32" rx="4" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="300" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">Observer C</text>

  <line x1="200" y1="140" x2="248" y2="130" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="200" y1="148" x2="248" y2="172" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="200" y1="165" x2="248" y2="214" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <text x="235" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Subject → Observer 직접 참조 (강한 결합)</text>

  <!-- PubSub pattern -->
  <rect x="460" y="68" width="360" height="182" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">발행-구독(Pub/Sub) 패턴</text>
  <text x="640" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Publisher와 Subscriber는 서로를 모름</text>

  <!-- Publisher -->
  <rect x="476" y="126" width="100" height="44" rx="6" fill="#111827" stroke="#7ec8e3" stroke-width="1"/>
  <text x="526" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Publisher</text>

  <!-- Message Broker -->
  <rect x="608" y="118" width="100" height="60" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="658" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">Message</text>
  <text x="658" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">Broker</text>
  <text x="658" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">EventEmitter/Bus</text>

  <!-- Subscribers -->
  <rect x="750" y="114" width="52" height="28" rx="4" fill="#0a0a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="776" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">Sub A</text>
  <rect x="750" y="150" width="52" height="28" rx="4" fill="#0a0a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="776" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">Sub B</text>
  <rect x="750" y="186" width="52" height="28" rx="4" fill="#0a0a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="776" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">Sub C</text>

  <line x1="576" y1="148" x2="606" y2="148" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arrP)"/>
  <line x1="708" y1="130" x2="748" y2="128" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arrP)"/>
  <line x1="708" y1="148" x2="748" y2="164" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arrP)"/>
  <line x1="708" y1="164" x2="748" y2="200" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arrP)"/>

  <text x="640" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Broker가 중간에서 분리 (느슨한 결합)</text>

  <!-- Code -->
  <rect x="60" y="272" width="760" height="180" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// EventEmitter 기반 Pub/Sub</text>
  <text x="76" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">class</text>
  <text x="122" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> EventBus {</text>
  <text x="76" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  #handlers = </text>
  <text x="174" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">new</text>
  <text x="202" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> Map();</text>
  <text x="76" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  on(event, handler) {</text>
  <text x="76" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    </text>
  <text x="88" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">if</text>
  <text x="104" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> (!</text>
  <text x="118" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">this</text>
  <text x="148" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">.#handlers.has(event))</text>
  <text x="76" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">      this</text>
  <text x="130" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">.#handlers.set(event, </text>
  <text x="309" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">new</text>
  <text x="333" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> Set());</text>
  <text x="76" y="414" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    this</text>
  <text x="117" y="414" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">.#handlers.get(event).add(handler); }</text>
  <text x="76" y="434" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  emit(event, data) { </text>
  <text x="76" y="434" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"></text>
  <text x="248" y="434" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">this</text>
  <text x="278" y="434" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">.#handlers.get(event)?.forEach(h => h(data)); }</text>
</svg>
