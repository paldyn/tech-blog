<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <!-- Background -->
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">KoNLPy로 한국어 품사 태깅</text>

  <!-- Code block background -->
  <rect x="60" y="68" width="760" height="262" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Line numbers background -->
  <rect x="60" y="68" width="44" height="262" fill="#060910" rx="6"/>
  <rect x="104" y="68" width="1" height="262" fill="#1e2433"/>

  <!-- Line numbers -->
  <text x="82" y="104" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" text-anchor="middle">1</text>
  <text x="82" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" text-anchor="middle">2</text>
  <text x="82" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" text-anchor="middle">3</text>
  <text x="82" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" text-anchor="middle">4</text>
  <text x="82" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" text-anchor="middle">5</text>
  <text x="82" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" text-anchor="middle">6</text>
  <text x="82" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" text-anchor="middle">7</text>
  <text x="82" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" text-anchor="middle">8</text>
  <text x="82" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" text-anchor="middle">9</text>
  <text x="82" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" text-anchor="middle">10</text>
  <text x="82" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" text-anchor="middle">11</text>
  <text x="82" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" text-anchor="middle">12</text>

  <!-- Code lines -->
  <!-- Line 1: from konlpy.tag import Komoran -->
  <text x="120" y="104" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">from</text>
  <text x="162" y="104" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> konlpy.tag </text>
  <text x="292" y="104" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">import</text>
  <text x="340" y="104" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> Komoran</text>

  <!-- Line 2: blank -->

  <!-- Line 3: komoran = Komoran() -->
  <text x="120" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">komoran </text>
  <text x="190" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">=</text>
  <text x="202" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> Komoran()</text>

  <!-- Line 4: blank -->

  <!-- Line 5: text = "..." -->
  <text x="120" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">text </text>
  <text x="158" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">=</text>
  <text x="170" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178"> "고양이가 빠르게 달린다"</text>

  <!-- Line 6: pos = komoran.pos(text) -->
  <text x="120" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">pos </text>
  <text x="150" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">=</text>
  <text x="162" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> komoran.pos(text)</text>

  <!-- Line 7: # [('고양이', 'NNG'), -->
  <text x="120" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># [('고양이', 'NNG'),</text>

  <!-- Line 8: #  ('가', 'JKS'), -->
  <text x="120" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">#  ('가', 'JKS'),</text>

  <!-- Line 9: #  ('빠르게', 'MAG'), -->
  <text x="120" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">#  ('빠르게', 'MAG'),</text>

  <!-- Line 10: #  ('달린다', 'VV+EF')] -->
  <text x="120" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">#  ('달린다', 'VV+EF')]</text>

  <!-- Line 11: # 명사만 추출 -->
  <text x="120" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 명사만 추출</text>

  <!-- Line 12: nouns = komoran.nouns(text) -->
  <text x="120" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">nouns </text>
  <text x="170" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">=</text>
  <text x="182" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> komoran.nouns(text)</text>

  <!-- Annotation box -->
  <rect x="530" y="200" width="270" height="80" fill="#111827" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="546" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">명사 추출 결과</text>
  <text x="546" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555"># nouns = ['고양이']</text>
  <text x="546" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">형용사·동사 원형으로 필터링:</text>
  <text x="546" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3"># VA, VV 태그 선별 가능</text>
</svg>
