<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Testcontainers 실전 코드 패턴</text>

  <!-- 왼쪽: PostgreSQL 기본 설정 -->
  <text x="80" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">PostgreSQL 컨테이너 기본</text>

  <rect x="60" y="90" width="370" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="110" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">@DataJpaTest</tspan>
  </text>
  <text x="76" y="128" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">@AutoConfigureTestDatabase</tspan>
  </text>
  <text x="76" y="146" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  (replace = Replace.NONE)</tspan>
  </text>
  <text x="76" y="164" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">@Testcontainers</tspan>
  </text>
  <text x="76" y="182" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">class</tspan><tspan fill="#ffffff"> UserRepoTest {</tspan>
  </text>
  <text x="76" y="200" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  @Container</tspan>
  </text>
  <text x="76" y="218" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  static</tspan><tspan fill="#ffffff"> PostgreSQLContainer&lt;?&gt; db</tspan>
  </text>
  <text x="76" y="236" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    =</tspan><tspan fill="#7ec8e3" font-weight="600"> new</tspan><tspan fill="#ffffff"> PostgreSQLContainer&lt;&gt;(</tspan>
  </text>
  <text x="76" y="254" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ce9178">        "postgres:16"</tspan><tspan fill="#ffffff">);</tspan>
  </text>
  <text x="76" y="278" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>

  <!-- 오른쪽: DynamicPropertySource -->
  <text x="460" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">@DynamicPropertySource 연결</text>

  <rect x="450" y="90" width="370" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="466" y="110" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  @DynamicPropertySource</tspan>
  </text>
  <text x="466" y="128" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  static void</tspan><tspan fill="#ffffff"> props(</tspan>
  </text>
  <text x="466" y="146" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">      DynamicPropertyRegistry r) {</tspan>
  </text>
  <text x="466" y="164" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    r.add(</tspan><tspan fill="#ce9178">"spring.datasource.url"</tspan><tspan fill="#ffffff">,</tspan>
  </text>
  <text x="466" y="182" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">         db::getJdbcUrl);</tspan>
  </text>
  <text x="466" y="200" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    r.add(</tspan><tspan fill="#ce9178">"spring.datasource.username"</tspan><tspan fill="#ffffff">,</tspan>
  </text>
  <text x="466" y="218" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">         db::getUsername);</tspan>
  </text>
  <text x="466" y="236" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    r.add(</tspan><tspan fill="#ce9178">"spring.datasource.password"</tspan><tspan fill="#ffffff">,</tspan>
  </text>
  <text x="466" y="254" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">         db::getPassword);</tspan>
  </text>
  <text x="466" y="272" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  }</text>

  <!-- 하단: 공유 기반 클래스 -->
  <text x="80" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">공유 기반 클래스 (컨테이너 재사용)</text>

  <rect x="60" y="330" width="760" height="140" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="350" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">@SpringBootTest</tspan><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">@Testcontainers</tspan>
  </text>
  <text x="76" y="368" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">abstract class</tspan><tspan fill="#ffffff"> IntegrationBase {</tspan>
  </text>
  <text x="76" y="386" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  @Container  static</tspan><tspan fill="#ffffff"> PostgreSQLContainer&lt;?&gt; db</tspan>
  </text>
  <text x="76" y="404" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    = new</tspan><tspan fill="#ffffff"> PostgreSQLContainer&lt;&gt;(</tspan><tspan fill="#ce9178">"postgres:16"</tspan><tspan fill="#ffffff">)</tspan>
  </text>
  <text x="76" y="422" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">        .withReuse(</tspan><tspan fill="#b5cea8">true</tspan><tspan fill="#ffffff">);</tspan><tspan fill="#9aa4b8">  // JVM 종료까지 재사용</tspan>
  </text>
  <text x="76" y="440" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  // @DynamicPropertySource + @ActiveProfiles("integration") ...</text>
  <text x="76" y="458" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>
</svg>
