<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arw" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">B 트리 구조 (t=2, 최대 3개 키)</text>

  <!-- Root node: [20 | 40] -->
  <rect x="330" y="70" width="220" height="48" fill="#1a2a4a" rx="8" stroke="#7ec8e3" stroke-width="2"/>
  <line x1="403" y1="70" x2="403" y2="118" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="476" y1="70" x2="476" y2="118" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="366" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e8e8e8" text-anchor="middle">20</text>
  <text x="440" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e8e8e8" text-anchor="middle">40</text>
  <text x="512" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ptr</text>
  <text x="160" y="62" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">루트 (키 2개, 자식 3개)</text>

  <!-- Level 2 nodes -->
  <!-- Left: [5 | 10 | 15] -->
  <rect x="60" y="185" width="240" height="48" fill="#0d1520" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <line x1="120" y1="185" x2="120" y2="233" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="180" y1="185" x2="180" y2="233" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="240" y1="185" x2="240" y2="233" stroke="#3a4a6e" stroke-width="1"/>
  <text x="90" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">5</text>
  <text x="150" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">10</text>
  <text x="210" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">15</text>
  <text x="268" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">·</text>

  <!-- Mid: [25 | 30] -->
  <rect x="340" y="185" width="200" height="48" fill="#0d1520" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <line x1="406" y1="185" x2="406" y2="233" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="473" y1="185" x2="473" y2="233" stroke="#3a4a6e" stroke-width="1"/>
  <text x="373" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">25</text>
  <text x="439" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">30</text>
  <text x="506" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">·</text>

  <!-- Right: [45 | 60] -->
  <rect x="580" y="185" width="200" height="48" fill="#0d1520" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <line x1="646" y1="185" x2="646" y2="233" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="713" y1="185" x2="713" y2="233" stroke="#3a4a6e" stroke-width="1"/>
  <text x="613" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">45</text>
  <text x="679" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">60</text>
  <text x="746" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">·</text>

  <!-- Edges root → level2 -->
  <line x1="366" y1="118" x2="180" y2="185" stroke="#555" stroke-width="1.5"/>
  <line x1="440" y1="118" x2="440" y2="185" stroke="#555" stroke-width="1.5"/>
  <line x1="512" y1="118" x2="680" y2="185" stroke="#555" stroke-width="1.5"/>

  <!-- Leaf level (simplified) -->
  <text x="90" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">리프 4개</text>
  <rect x="60" y="288" width="50" height="32" fill="#0a1424" rx="4" stroke="#2a3a5e"/>
  <text x="85" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">1,3</text>
  <rect x="118" y="288" width="50" height="32" fill="#0a1424" rx="4" stroke="#2a3a5e"/>
  <text x="143" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">7,9</text>
  <rect x="176" y="288" width="58" height="32" fill="#0a1424" rx="4" stroke="#2a3a5e"/>
  <text x="205" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">11,13</text>
  <rect x="242" y="288" width="58" height="32" fill="#0a1424" rx="4" stroke="#2a3a5e"/>
  <text x="271" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">17,19</text>

  <line x1="85" y1="233" x2="85" y2="288" stroke="#444" stroke-width="1"/>
  <line x1="143" y1="233" x2="143" y2="288" stroke="#444" stroke-width="1"/>
  <line x1="205" y1="233" x2="205" y2="288" stroke="#444" stroke-width="1"/>
  <line x1="271" y1="233" x2="271" y2="288" stroke="#444" stroke-width="1"/>

  <!-- Properties box -->
  <rect x="50" y="340" width="780" height="100" fill="#0f1a2e" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="363" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">B 트리 속성 (최소 차수 t)</text>
  <text x="80" y="385" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">• 루트를 제외한 모든 노드: 최소 t-1개, 최대 2t-1개의 키</text>
  <text x="80" y="403" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">• 내부 노드의 자식 수 = 키 수 + 1 (t ~ 2t개)</text>
  <text x="80" y="421" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">• 모든 리프는 같은 깊이 (완전 균형) | 높이 = O(log_t n)</text>
  <text x="80" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">• t=2 → 2-3-4 트리, t=500 → 디스크 페이지 최적화</text>
</svg>
