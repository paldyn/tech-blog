<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">단조 스택 응용 — 히스토그램 최대 직사각형</text>
  <text x="440" y="66" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">heights = [2, 1, 5, 6, 2, 3] → 최대 넓이 = 10</text>

  <!-- ─── Histogram bars ─── -->
  <!-- base line y=230 -->
  <!-- bar width=60, gap=4, start x=80 -->

  <!-- bar 0: h=2 (120px) -->
  <rect x="80" y="110" width="60" height="120" rx="3" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="110" y="246" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">h=2</text>

  <!-- bar 1: h=1 (60px) -->
  <rect x="148" y="170" width="60" height="60" rx="3" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="178" y="246" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">h=1</text>

  <!-- bar 2: h=5 (300px) → capped to display -->
  <rect x="216" y="50" width="60" height="180" rx="3" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="246" y="246" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">h=5</text>

  <!-- bar 3: h=6 (240px) -->
  <rect x="284" y="30" width="60" height="200" rx="3" fill="#2a3a5a" stroke="#4a6a9a" stroke-width="2"/>
  <text x="314" y="246" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">h=6</text>

  <!-- bar 4: h=2 (120px) -->
  <rect x="352" y="110" width="60" height="120" rx="3" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="382" y="246" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">h=2</text>

  <!-- bar 5: h=3 (180px) -->
  <rect x="420" y="50" width="60" height="180" rx="3" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="450" y="246" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">h=3</text>

  <!-- highlight max rectangle (bars 2-3, h=5, width=2) -->
  <rect x="216" y="50" width="128" height="180" fill="none" stroke="#55c555" stroke-width="3" stroke-dasharray="5,3"/>
  <text x="280" y="45" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">넓이 = 5×2 = 10 ✓</text>

  <!-- base line -->
  <line x1="70" y1="230" x2="500" y2="230" stroke="#2a3a5e" stroke-width="2"/>

  <!-- ─── Code & Algorithm ─── -->
  <rect x="540" y="30" width="300" height="300" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="556" y="52" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">def</text>
  <text x="590" y="52" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"> largest_rect(h):</text>
  <text x="556" y="70" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">    stack = []   # 인덱스 스택</text>
  <text x="556" y="88" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">    max_area = 0</text>
  <text x="556" y="106" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">    h.append(0)  # sentinel</text>
  <text x="556" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">    for</text>
  <text x="592" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"> i, cur in enumerate(h):</text>
  <text x="556" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">        while</text>
  <text x="618" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"> stack and h[stack[-1]] &gt;= cur:</text>
  <text x="556" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">            top = stack.pop()</text>
  <text x="556" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">            w = i if not stack</text>
  <text x="556" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">                  else i-stack[-1]-1</text>
  <text x="556" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">            max_area = max(max_area,</text>
  <text x="556" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">                           h[top]*w)</text>
  <text x="556" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">        stack.append(i)</text>
  <text x="556" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">    return</text>
  <text x="606" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"> max_area</text>
  <text x="556" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">// 시간 O(n), 공간 O(n)</text>
  <text x="556" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555" xml:space="preserve">// 결과: 10</text>

  <!-- ─── Applications summary ─── -->
  <rect x="60" y="268" width="462" height="96" rx="8" fill="#0d1020" stroke="#2a3a5e" stroke-width="1"/>
  <text x="291" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">단조 스택 주요 응용</text>
  <text x="76" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• Next Greater / Smaller Element (NGE/NSE)</text>
  <text x="76" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 히스토그램 최대 직사각형 넓이</text>
  <text x="76" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 빗물 가두기 (Trapping Rain Water)</text>

  <!-- ─── bottom note ─── -->
  <rect x="60" y="374" width="760" height="68" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">단조 감소 스택</text>
  <text x="220" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">: 스택 top ≥ 현재값 이면 pop  →  NGE (오른쪽 첫 큰값)</text>
  <text x="76" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">단조 증가 스택</text>
  <text x="220" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">: 스택 top ≤ 현재값 이면 pop  →  NSE (오른쪽 첫 작은값)</text>
  <text x="76" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">공통: 각 원소 push/pop 최대 1회 → 전체 O(n), 공간 O(n)</text>
</svg>
