<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" style="background:#0a0a0a;border-radius:12px;">
  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">파일 시스템 vs 관계형 데이터베이스</text>

  <!-- Left: File System -->
  <rect x="60" y="68" width="340" height="340" rx="10" fill="none" stroke="#e05555" stroke-width="1.5"/>
  <text x="230" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">파일 시스템</text>

  <!-- File boxes -->
  <rect x="80" y="108" width="140" height="56" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="150" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">sales_2024.csv</text>
  <text x="150" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">고객명, 상품, 금액 ...</text>

  <rect x="240" y="108" width="140" height="56" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="310" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">members.txt</text>
  <text x="310" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">고객명, 이메일 ...</text>

  <rect x="80" y="184" width="300" height="56" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="230" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">orders_jan.xlsx / orders_feb.xlsx ...</text>
  <text x="230" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">동일 구조가 파일마다 반복 저장</text>

  <!-- Problems -->
  <rect x="80" y="260" width="300" height="120" rx="6" fill="#100808" stroke="#e05555" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="230" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">문제점</text>
  <text x="96" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">&#x2717; 데이터 중복 — 동일 고객이 여러 파일에 존재</text>
  <text x="96" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">&#x2717; 불일치 — 파일마다 다른 형식</text>
  <text x="96" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">&#x2717; 검색 어려움 — 전체 파일 스캔 필요</text>
  <text x="96" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">&#x2717; 동시 접근 — 잠금 없어 충돌 발생</text>

  <!-- Right: RDB -->
  <rect x="480" y="68" width="340" height="340" rx="10" fill="none" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">관계형 데이터베이스</text>

  <!-- Tables -->
  <rect x="500" y="108" width="140" height="56" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="570" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">users</text>
  <text x="570" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">PK: user_id</text>

  <rect x="660" y="108" width="140" height="56" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="730" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">orders</text>
  <text x="730" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">FK: user_id</text>

  <rect x="500" y="184" width="300" height="56" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">products</text>
  <text x="650" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">중복 없는 단일 진실 공급원</text>

  <!-- Benefits -->
  <rect x="500" y="260" width="300" height="120" rx="6" fill="#08100a" stroke="#55c555" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="650" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">장점</text>
  <text x="516" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">&#x2713; 정규화 — 데이터 한 곳에만 저장</text>
  <text x="516" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">&#x2713; SQL — 강력한 집합 기반 검색</text>
  <text x="516" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">&#x2713; 트랜잭션 — ACID 보장</text>
  <text x="516" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">&#x2713; 동시성 제어 — 잠금·MVCC</text>

  <!-- Center arrow -->
  <text x="440" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="28" fill="#7ec8e3" text-anchor="middle">&#x2192;</text>
  <text x="440" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">발전</text>
</svg>
