<svg xmlns="http://www.w3.org/2000/svg" width="880" height="392" viewBox="0 0 880 392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="392" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">자바 명명 규칙 한눈에</text>
  <text x="60" y="72" font-size="13" fill="#888">요소마다 정해진 표기법이 있고, 이름만 봐도 종류를 알 수 있다</text>

  <text x="80" y="112" font-size="13" font-weight="600" fill="#888">요소</text>
  <text x="300" y="112" font-size="13" font-weight="600" fill="#888">표기법</text>
  <text x="520" y="112" font-size="13" font-weight="600" fill="#888">예시</text>
  <line x1="60" y1="124" x2="820" y2="124" stroke="#333" stroke-width="1"/>

  <rect x="60" y="132" width="760" height="44" rx="4" fill="#101010"/>
  <text x="80" y="160" font-size="14" fill="#e8e8e8">클래스 · 인터페이스</text>
  <text x="300" y="160" font-size="14" font-weight="600" fill="#7ec8e3">PascalCase</text>
  <text x="520" y="160" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">OrderService, Runnable</text>

  <rect x="60" y="176" width="760" height="44" rx="4" fill="#0a0a0a"/>
  <text x="80" y="204" font-size="14" fill="#e8e8e8">메서드 · 변수</text>
  <text x="300" y="204" font-size="14" font-weight="600" fill="#55c555">camelCase</text>
  <text x="520" y="204" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">calcTotal(), itemCount</text>

  <rect x="60" y="220" width="760" height="44" rx="4" fill="#101010"/>
  <text x="80" y="248" font-size="14" fill="#e8e8e8">상수 (static final)</text>
  <text x="300" y="248" font-size="14" font-weight="600" fill="#e05555">UPPER_SNAKE</text>
  <text x="520" y="248" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">MAX_RETRY, PI</text>

  <rect x="60" y="264" width="760" height="44" rx="4" fill="#0a0a0a"/>
  <text x="80" y="292" font-size="14" fill="#e8e8e8">패키지</text>
  <text x="300" y="292" font-size="14" font-weight="600" fill="#7777cc">소문자.점 연결</text>
  <text x="520" y="292" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">com.paldyn.order</text>

  <rect x="60" y="308" width="760" height="44" rx="4" fill="#101010"/>
  <text x="80" y="336" font-size="14" fill="#e8e8e8">타입 파라미터</text>
  <text x="300" y="336" font-size="14" font-weight="600" fill="#e0a055">단일 대문자</text>
  <text x="520" y="336" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">T, E, K, V, R</text>
</svg>
