<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="50" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">캡슐화(Encapsulation) 개념</text>
  <text x="440" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">내부 상태를 숨기고 공개 메서드로만 접근을 허용</text>

  <!-- 왼쪽: 캡슐화 없는 경우 -->
  <text x="180" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e05555">캡슐화 없음</text>

  <!-- BankAccount 박스 (왼쪽) -->
  <rect x="60" y="132" width="240" height="220" fill="#1a1010" rx="10" stroke="#e05555" stroke-width="1.5"/>
  <text x="180" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">BankAccount</text>
  <!-- 구분선 -->
  <line x1="60" y1="166" x2="300" y2="166" stroke="#e05555" stroke-width="0.5" opacity="0.5"/>

  <!-- 필드들 (public) -->
  <rect x="76" y="176" width="208" height="38" fill="#2a1515" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="90" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">public</text>
  <text x="138" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff"> long balance</text>
  <text x="90" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">// 누구나 수정 가능 ← 위험</text>

  <rect x="76" y="222" width="208" height="38" fill="#2a1515" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="90" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">public</text>
  <text x="138" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff"> String owner</text>
  <text x="90" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">// 유효성 검사 없음 ← 위험</text>

  <!-- 외부 코드 (왼쪽) -->
  <rect x="76" y="276" width="208" height="60" fill="#1e1515" rx="6" stroke="#555" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="90" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">// 외부 코드</text>
  <text x="90" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">acc.balance</text>
  <text x="182" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555"> = -9999</text>
  <text x="90" y="329" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">// 불변식 파괴!</text>

  <!-- 위험 표시 -->
  <text x="180" y="380" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">✗ 내부 상태가 언제든 오염될 수 있음</text>

  <!-- 오른쪽: 캡슐화 있는 경우 -->
  <text x="680" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">캡슐화 적용</text>

  <!-- BankAccount 박스 (오른쪽) -->
  <rect x="560" y="132" width="260" height="230" fill="#0e1a0e" rx="10" stroke="#55c555" stroke-width="1.5"/>
  <text x="690" y="156" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">BankAccount</text>
  <line x1="560" y1="166" x2="820" y2="166" stroke="#55c555" stroke-width="0.5" opacity="0.5"/>

  <!-- private 필드 -->
  <rect x="576" y="176" width="228" height="38" fill="#0a1a0a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="590" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">private</text>
  <text x="646" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff"> long balance</text>
  <text x="590" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">// 내부에서만 접근 가능 ✓</text>

  <!-- public 메서드 -->
  <rect x="576" y="222" width="228" height="56" fill="#0a1a0a" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="590" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">public</text>
  <text x="636" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff"> void deposit(</text>
  <text x="590" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">    validate(amount);</text>
  <text x="590" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">    balance += amount;</text>

  <!-- 외부 코드 (오른쪽) -->
  <rect x="576" y="286" width="228" height="58" fill="#101a10" rx="6" stroke="#555" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="590" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">// 외부 코드</text>
  <text x="590" y="323" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">acc.deposit(-9999);</text>
  <text x="590" y="339" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">// IllegalArgument ← 보호됨</text>

  <!-- 성공 표시 -->
  <text x="690" y="380" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓ 메서드가 유효성 검사 후 상태 변경</text>

  <!-- 가운데 VS -->
  <text x="440" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="24" font-weight="700" fill="#666">VS</text>

  <!-- 하단 3가지 원칙 -->
  <text x="440" y="418" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">캡슐화의 3가지 원칙</text>

  <rect x="60" y="432" width="230" height="66" fill="#111827" rx="8" stroke="#7777cc" stroke-width="1"/>
  <text x="175" y="455" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">① 데이터 숨김</text>
  <text x="175" y="473" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">필드는 private으로</text>
  <text x="175" y="489" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">외부 직접 접근 차단</text>

  <rect x="325" y="432" width="230" height="66" fill="#111827" rx="8" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="455" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">② 불변식 보호</text>
  <text x="440" y="473" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">메서드 안에서 항상</text>
  <text x="440" y="489" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">유효성 검사 수행</text>

  <rect x="590" y="432" width="230" height="66" fill="#111827" rx="8" stroke="#7ec8e3" stroke-width="1"/>
  <text x="705" y="455" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">③ 구현 자유</text>
  <text x="705" y="473" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">내부 구현 변경 시</text>
  <text x="705" y="489" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">외부 코드 영향 없음</text>
</svg>
