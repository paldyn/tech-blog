<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">서비스 트래픽 라우팅</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">selector 레이블로 파드를 선택하고 kube-proxy가 분산 처리</text>

  <!-- Client -->
  <rect x="60" y="130" width="140" height="60" rx="8" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="130" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">클라이언트</text>
  <text x="130" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">curl myapp:80</text>

  <!-- Arrow to Service -->
  <line x1="200" y1="160" x2="278" y2="160" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Service -->
  <rect x="280" y="120" width="180" height="80" rx="8" fill="#0f0f2e" stroke="#7777cc" stroke-width="2"/>
  <text x="370" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">Service</text>
  <text x="370" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">selector:</text>
  <text x="370" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">  app: myapp</text>

  <!-- Arrows to Pods -->
  <line x1="460" y1="148" x2="558" y2="120" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="460" y1="160" x2="558" y2="220" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="460" y1="172" x2="558" y2="320" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Pod 1 -->
  <rect x="560" y="90" width="240" height="64" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="680" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">Pod (app=myapp)</text>
  <text x="680" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">10.244.0.5:8080</text>

  <!-- Pod 2 -->
  <rect x="560" y="190" width="240" height="64" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="680" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">Pod (app=myapp)</text>
  <text x="680" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">10.244.0.6:8080</text>

  <!-- Pod 3 -->
  <rect x="560" y="290" width="240" height="64" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="680" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">Pod (app=myapp)</text>
  <text x="680" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">10.244.1.2:8080</text>

  <!-- iptables/kube-proxy note -->
  <rect x="280" y="240" width="180" height="48" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="370" y="261" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">kube-proxy</text>
  <text x="370" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">iptables/IPVS 규칙으로 분산</text>

  <!-- Code: Service YAML -->
  <rect x="60" y="310" width="200" height="108" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">selector</text>
  <text x="76" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  app: myapp</text>
  <text x="76" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">ports</text>
  <text x="76" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  - port: 80</text>
  <text x="76" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    targetPort: 8080</text>
</svg>
