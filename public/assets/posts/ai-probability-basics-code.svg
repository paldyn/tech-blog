<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <style>
      text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }
      .mono { font-family: 'JetBrains Mono','Menlo','Consolas',monospace; }
    </style>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">확률 연산 코드: 기대값·엔트로피·MLE</text>

  <!-- Left: Expectation and Variance -->
  <rect x="60" y="64" width="364" height="30" rx="6" fill="#1a1a2e"/>
  <text x="242" y="84" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">기대값 · 분산 · 표준편차</text>

  <rect x="60" y="100" width="364" height="230" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text xml:space="preserve" x="76" y="122" class="mono" font-size="12" fill="#7ec8e3">import</text>
  <text xml:space="preserve" x="124" y="122" class="mono" font-size="12" fill="#e8e8e8">numpy as np</text>
  <text xml:space="preserve" x="76" y="140" class="mono" font-size="12" fill="#6a8aa0"># 이산 확률 변수</text>
  <text xml:space="preserve" x="76" y="158" class="mono" font-size="12" fill="#6a8aa0"># 주사위 기대값</text>
  <text xml:space="preserve" x="76" y="176" class="mono" font-size="12" fill="#e8e8e8">values = np.array([</text>
  <text xml:space="preserve" x="76" y="194" class="mono" font-size="12" fill="#b5cea8">    1,2,3,4,5,6</text>
  <text xml:space="preserve" x="76" y="194" class="mono" font-size="12" fill="#e8e8e8">                 ])</text>
  <text xml:space="preserve" x="76" y="212" class="mono" font-size="12" fill="#e8e8e8">probs = np.ones(</text>
  <text xml:space="preserve" x="76" y="230" class="mono" font-size="12" fill="#b5cea8">    6</text>
  <text xml:space="preserve" x="96" y="230" class="mono" font-size="12" fill="#e8e8e8">) / </text>
  <text xml:space="preserve" x="126" y="230" class="mono" font-size="12" fill="#b5cea8">6</text>
  <text xml:space="preserve" x="76" y="248" class="mono" font-size="12" fill="#e8e8e8">E_X = np.sum(</text>
  <text xml:space="preserve" x="76" y="266" class="mono" font-size="12" fill="#e8e8e8">    values * probs)</text>
  <text xml:space="preserve" x="76" y="284" class="mono" font-size="12" fill="#6a8aa0"># E[X] = 3.5</text>
  <text xml:space="preserve" x="76" y="302" class="mono" font-size="12" fill="#e8e8e8">Var_X = np.sum(</text>
  <text xml:space="preserve" x="76" y="320" class="mono" font-size="12" fill="#e8e8e8">    (values - E_X)**</text>
  <text xml:space="preserve" x="76" y="338" class="mono" font-size="12" fill="#b5cea8">    2</text>
  <text xml:space="preserve" x="96" y="338" class="mono" font-size="12" fill="#e8e8e8"> * probs)</text>

  <!-- Right: Entropy and MLE -->
  <rect x="456" y="64" width="364" height="30" rx="6" fill="#0e2010"/>
  <text x="638" y="84" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">엔트로피 · 교차 엔트로피 손실</text>

  <rect x="456" y="100" width="364" height="230" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text xml:space="preserve" x="472" y="122" class="mono" font-size="12" fill="#7ec8e3">import</text>
  <text xml:space="preserve" x="520" y="122" class="mono" font-size="12" fill="#e8e8e8">torch, torch.nn as nn</text>
  <text xml:space="preserve" x="472" y="140" class="mono" font-size="12" fill="#6a8aa0"># 엔트로피: 불확실성 측정</text>
  <text xml:space="preserve" x="472" y="158" class="mono" font-size="12" fill="#6a8aa0"># H = -∑p·log(p)</text>
  <text xml:space="preserve" x="472" y="176" class="mono" font-size="12" fill="#e8e8e8">p = torch.tensor([</text>
  <text xml:space="preserve" x="472" y="194" class="mono" font-size="12" fill="#b5cea8">    0.7, 0.2, 0.1</text>
  <text xml:space="preserve" x="472" y="194" class="mono" font-size="12" fill="#e8e8e8">                 ])</text>
  <text xml:space="preserve" x="472" y="212" class="mono" font-size="12" fill="#e8e8e8">H = -(p * p.log()).sum()</text>
  <text xml:space="preserve" x="472" y="230" class="mono" font-size="12" fill="#6a8aa0"># 교차 엔트로피 손실</text>
  <text xml:space="preserve" x="472" y="248" class="mono" font-size="12" fill="#6a8aa0"># 분류 학습의 핵심 손실함수</text>
  <text xml:space="preserve" x="472" y="266" class="mono" font-size="12" fill="#e8e8e8">loss_fn = nn.CrossEntropyLoss()</text>
  <text xml:space="preserve" x="472" y="284" class="mono" font-size="12" fill="#6a8aa0"># logits: 모델 출력</text>
  <text xml:space="preserve" x="472" y="302" class="mono" font-size="12" fill="#6a8aa0"># target: 정답 클래스 인덱스</text>
  <text xml:space="preserve" x="472" y="320" class="mono" font-size="12" fill="#e8e8e8">logits = torch.randn(</text>
  <text xml:space="preserve" x="472" y="338" class="mono" font-size="12" fill="#b5cea8">    32, 10</text>
  <text xml:space="preserve" x="520" y="338" class="mono" font-size="12" fill="#e8e8e8">)</text>

  <!-- Summary box -->
  <rect x="60" y="348" width="760" height="72" rx="8" fill="#111"/>
  <text x="440" y="370" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">확률론이 AI에서 쓰이는 핵심 순간</text>
  <text x="220" y="390" text-anchor="middle" font-size="12" fill="#7ec8e3">분류: softmax → 확률 분포</text>
  <text x="440" y="390" text-anchor="middle" font-size="12" fill="#55c555">손실: 교차 엔트로피 = -log P(정답)</text>
  <text x="680" y="390" text-anchor="middle" font-size="12" fill="#e05555">생성: 토큰 샘플링 = 확률 분포에서 추출</text>
  <text x="310" y="408" text-anchor="middle" font-size="11" fill="#555">불확실성 정량화 = 엔트로피</text>
  <text x="600" y="408" text-anchor="middle" font-size="11" fill="#555">베이즈 추론 = 사후 확률 계산</text>

  <!-- Footer -->
  <text x="440" y="444" text-anchor="middle" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈</text>
</svg>
