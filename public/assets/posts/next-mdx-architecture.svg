<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">MDX 처리 파이프라인</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">.mdx 파일 → React 컴포넌트 변환 흐름</text>

  <defs>
    <marker id="md1" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="md2" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="md3" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>

  <!-- Step 1: MDX file -->
  <rect x="60" y="100" width="160" height="70" rx="7" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="140" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">post.mdx</text>
  <text x="140" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Markdown + JSX</text>

  <!-- Arrow 1 -->
  <line x1="220" y1="135" x2="278" y2="135" stroke="#7ec8e3" stroke-width="2" marker-end="url(#md1)"/>

  <!-- Step 2: next-mdx/remote or @next/mdx -->
  <rect x="280" y="100" width="180" height="70" rx="7" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="370" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">MDX Compiler</text>
  <text x="370" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">remark + rehype</text>
  <text x="370" y="165" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">플러그인 체인</text>

  <!-- Arrow 2 -->
  <line x1="460" y1="135" x2="518" y2="135" stroke="#55c555" stroke-width="2" marker-end="url(#md2)"/>

  <!-- Step 3: React Component -->
  <rect x="520" y="100" width="180" height="70" rx="7" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="610" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">React Component</text>
  <text x="610" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">export default MDXContent</text>
  <text x="610" y="165" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Server Component 지원</text>

  <!-- Arrow 3 -->
  <line x1="700" y1="135" x2="758" y2="135" stroke="#ce9178" stroke-width="2" marker-end="url(#md3)"/>

  <!-- Step 4: Browser -->
  <rect x="760" y="100" width="60" height="70" rx="7" fill="#111827" stroke="#ce9178" stroke-width="1.5"/>
  <text x="790" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178">HTML</text>

  <!-- Two approaches -->
  <text x="440" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e8e8e8">두 가지 접근 방식</text>

  <rect x="60" y="238" width="360" height="150" rx="7" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">@next/mdx (파일 기반)</text>
  <text x="240" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">.mdx 파일을 page처럼 사용</text>
  <text x="240" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">app/blog/post.mdx → /blog/post</text>
  <text x="240" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">빌드 타임에 정적 생성</text>
  <text x="240" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">소규모 문서/블로그에 적합</text>
  <text x="240" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">next.config.ts에 플러그인 추가</text>

  <rect x="460" y="238" width="360" height="150" rx="7" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">next-mdx-remote (원격/DB)</text>
  <text x="640" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">문자열 또는 DB에서 MDX 로드</text>
  <text x="640" y="310" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">CMS · Headless · 동적 콘텐츠</text>
  <text x="640" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">MDXRemote 컴포넌트 사용</text>
  <text x="640" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">대규모 콘텐츠 플랫폼에 적합</text>
  <text x="640" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">컴파일을 런타임에 수행</text>
</svg>
