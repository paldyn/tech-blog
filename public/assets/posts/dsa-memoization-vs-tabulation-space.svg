<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">공간 최적화: 슬라이딩 윈도우 DP</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">피보나치: O(n) → O(1) 공간으로 줄이기</text>

  <!-- Before optimization -->
  <text x="60" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">Before: O(n) 공간</text>
  <text x="60" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">dp[0..n] 전체 배열 유지</text>

  <!-- Array boxes for before -->
  <rect x="60" y="138" width="44" height="34" fill="#2a1a1a" rx="4" stroke="#e05555" stroke-width="1"/>
  <text x="82" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">dp[0]</text>
  <rect x="114" y="138" width="44" height="34" fill="#2a1a1a" rx="4" stroke="#e05555" stroke-width="1"/>
  <text x="136" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">dp[1]</text>
  <rect x="168" y="138" width="44" height="34" fill="#2a1a1a" rx="4" stroke="#e05555" stroke-width="1"/>
  <text x="190" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">dp[2]</text>
  <rect x="222" y="138" width="44" height="34" fill="#2a1a1a" rx="4" stroke="#e05555" stroke-width="1"/>
  <text x="244" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">dp[3]</text>
  <text x="280" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">... dp[n]</text>

  <!-- After optimization -->
  <text x="60" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">After: O(1) 공간</text>
  <text x="60" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">변수 2개만 유지 (직전 두 값)</text>

  <rect x="60" y="242" width="60" height="38" fill="#1a3a2a" rx="4" stroke="#55c555" stroke-width="2"/>
  <text x="90" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">prev</text>
  <rect x="140" y="242" width="60" height="38" fill="#1a3a2a" rx="4" stroke="#55c555" stroke-width="2"/>
  <text x="170" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">curr</text>

  <line x1="205" y1="261" x2="250" y2="261" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="265" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">매 이터레이션:</text>
  <text x="265" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">curr, prev = prev+curr, curr</text>

  <!-- Divider -->
  <line x1="460" y1="85" x2="460" y2="440" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Right: Code comparison -->
  <text x="490" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">공간 최적화 코드</text>

  <rect x="490" y="118" width="350" height="186" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="506" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># O(1) 공간 피보나치</text>
  <text x="506" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">def fib_opt(n):</text>
  <text x="506" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">    if n &lt;= 1: return n</text>
  <text x="506" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    prev, curr = 0, 1</text>
  <text x="506" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">    for _ in range(2, n+1):</text>
  <text x="506" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">        prev,curr = curr,prev+curr</text>
  <text x="506" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">    return curr</text>
  <text x="506" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 시간 O(n), 공간 O(1)</text>

  <!-- Comparison table -->
  <text x="60" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">선택 기준 요약</text>

  <rect x="60" y="350" width="760" height="100" fill="#111" rx="8" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Table header -->
  <rect x="60" y="350" width="190" height="30" fill="#1a1a3a" rx="4"/>
  <text x="155" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">비교 항목</text>
  <rect x="255" y="350" width="180" height="30" fill="#1a2a3a" rx="4"/>
  <text x="345" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">메모이제이션 (Top-Down)</text>
  <rect x="440" y="350" width="180" height="30" fill="#1a3a2a" rx="4"/>
  <text x="530" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">타뷸레이션 (Bottom-Up)</text>
  <rect x="625" y="350" width="190" height="30" fill="#2a1a1a" rx="4"/>
  <text x="720" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">공간 최적화</text>

  <!-- Row 1 -->
  <text x="155" y="398" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">구현 난이도</text>
  <text x="345" y="398" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">쉬움 (점화식 직관적)</text>
  <text x="530" y="398" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">중간 (순서 파악 필요)</text>
  <text x="720" y="398" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">어려움 (상태 분석)</text>

  <!-- Row 2 -->
  <text x="155" y="426" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">공간 복잡도</text>
  <text x="345" y="426" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">O(n) + 스택</text>
  <text x="530" y="426" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">O(n)</text>
  <text x="720" y="426" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">O(1) ~ O(n)</text>
</svg>
