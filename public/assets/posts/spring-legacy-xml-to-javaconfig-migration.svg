<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">XML → Java Config 마이그레이션 단계</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">점진적 전환으로 리스크를 최소화하는 4단계 전략</text>

  <!-- Step boxes -->
  <!-- Step 1 -->
  <rect x="40" y="100" width="170" height="110" rx="8" fill="#1a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="125" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle" font-weight="600">STEP 1</text>
  <text x="125" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">현황 파악</text>
  <text x="125" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">XML 파일 목록화</text>
  <text x="125" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">의존 관계 파악</text>
  <text x="125" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Bean 목록 추출</text>

  <!-- Arrow 1→2 -->
  <line x1="210" y1="155" x2="248" y2="155" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="250" y="100" width="170" height="110" rx="8" fill="#0a1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="335" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle" font-weight="600">STEP 2</text>
  <text x="335" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">@ImportResource</text>
  <text x="335" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">XML을 Java에서 임포트</text>
  <text x="335" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">공존 단계 유지</text>
  <text x="335" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">테스트 안정화</text>

  <!-- Arrow 2→3 -->
  <line x1="420" y1="155" x2="458" y2="155" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="460" y="100" width="170" height="110" rx="8" fill="#0a201a" stroke="#55c555" stroke-width="1.5"/>
  <text x="545" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle" font-weight="600">STEP 3</text>
  <text x="545" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">Bean 마이그레이션</text>
  <text x="545" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">XML 빈을 @Bean으로</text>
  <text x="545" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">모듈별 순차 전환</text>
  <text x="545" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">회귀 테스트 실행</text>

  <!-- Arrow 3→4 -->
  <line x1="630" y1="155" x2="668" y2="155" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4 -->
  <rect x="670" y="100" width="170" height="110" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="2"/>
  <text x="755" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle" font-weight="600">STEP 4</text>
  <text x="755" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">완전 Java Config</text>
  <text x="755" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">XML 파일 제거</text>
  <text x="755" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">@Configuration 완성</text>
  <text x="755" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Spring Boot 호환</text>

  <!-- @ImportResource code box -->
  <rect x="40" y="240" width="370" height="164" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="56" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// STEP 2: XML과 Java Config 공존</text>
  <text x="56" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">@Configuration</tspan></text>
  <text x="56" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">@ImportResource</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"classpath:legacy.xml"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="56" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">public class</tspan><tspan fill="#ffffff"> MigrationConfig {</tspan></text>
  <text x="56" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  <tspan fill="#9aa4b8">// 새 Bean은 여기에 @Bean으로 추가</tspan></text>
  <text x="56" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  <tspan fill="#9aa4b8">// 기존 XML Bean은 자동으로 주입 가능</tspan></text>
  <text x="56" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>

  <!-- Tips box -->
  <rect x="460" y="240" width="380" height="164" rx="8" fill="#1a1a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="650" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">마이그레이션 핵심 체크포인트</text>
  <text x="476" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓</text>
  <text x="492" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">테스트 커버리지 확보 후 시작</text>
  <text x="476" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓</text>
  <text x="492" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">모듈 단위로 점진적 전환</text>
  <text x="476" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓</text>
  <text x="492" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">각 단계마다 전체 테스트 실행</text>
  <text x="476" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓</text>
  <text x="492" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">Bean 이름 변경 시 ref 일괄 수정</text>
  <text x="476" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓</text>
  <text x="492" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">최종 단계에서 XML 완전 제거</text>

  <!-- Bottom note -->
  <text x="440" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">Spring 5부터는 AnnotationConfigApplicationContext가 권장 · XML ApplicationContext는 Deprecated 예정</text>
</svg>
