<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Svelte — 컴파일러 기반 반응성</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">.svelte → 컴파일 → 바닐라 JS (Virtual DOM 없음)</text>

  <!-- .svelte source -->
  <rect x="60" y="100" width="240" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">&lt;!-- Counter.svelte --&gt;</text>
  <text x="76" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">&lt;<tspan fill="#7ec8e3" font-weight="600">script</tspan>&gt;</text>
  <text x="76" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">let</tspan> count = <tspan fill="#b5cea8">0</tspan></text>
  <text x="76" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">&lt;/<tspan fill="#7ec8e3" font-weight="600">script</tspan>&gt;</text>
  <text x="76" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">&lt;<tspan fill="#55c555">button</tspan> on:click=&#123;() =&gt; count++&#125;&gt;</text>
  <text x="76" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  &#123;count&#125; 클릭</text>

  <line x1="300" y1="165" x2="360" y2="165" stroke="#ce9178" stroke-width="2" marker-end="url(#arr)"/>
  <text x="310" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178">컴파일</text>

  <!-- Compiled JS -->
  <rect x="365" y="100" width="295" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="381" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">// 컴파일된 JS (단순화)</text>
  <text x="381" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">let</tspan> count = <tspan fill="#b5cea8">0</tspan></text>
  <text x="381" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">button.addEventListener(<tspan fill="#ce9178">'click'</tspan>, () =&gt; {</text>
  <text x="381" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  count++</text>
  <text x="381" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve">  text.data = count  <tspan fill="#9aa4b8">// DOM 직접</tspan></text>
  <text x="381" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">})</text>

  <!-- No VDOM -->
  <rect x="680" y="100" width="160" height="130" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="760" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Virtual DOM</text>
  <text x="760" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">없음</text>
  <text x="760" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">런타임 Diff</text>
  <text x="760" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">불필요</text>
  <text x="760" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">번들 크기 최소</text>

  <line x1="660" y1="165" x2="680" y2="165" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>

  <!-- Runes (Svelte 5) -->
  <text x="60" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">Svelte 5 — Runes (새 반응성 문법)</text>

  <rect x="60" y="288" width="370" height="180" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">// Svelte 5 Runes</text>
  <text x="76" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">let</tspan> count = $state(<tspan fill="#b5cea8">0</tspan>)          <tspan fill="#9aa4b8">// 반응성 상태</tspan></text>
  <text x="76" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">let</tspan> doubled = $derived(count * <tspan fill="#b5cea8">2</tspan>) <tspan fill="#9aa4b8">// 파생 값</tspan></text>
  <text x="76" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">$effect(() =&gt; {               <tspan fill="#9aa4b8">// 사이드 이펙트</tspan></text>
  <text x="76" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  console.log(count)          <tspan fill="#9aa4b8">// 자동 의존성 추적</tspan></text>
  <text x="76" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">})</text>
  <text x="76" y="448" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">// $props: defineProps 대체</text>
  <text x="76" y="466" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">let</tspan> { name, age = 0 } = $props()</text>

  <rect x="450" y="288" width="370" height="180" rx="6" fill="#1a1a1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="466" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">// Svelte 4 (기존)</text>
  <text x="466" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">let</tspan> count = <tspan fill="#b5cea8">0</tspan>             <tspan fill="#9aa4b8">// 일반 변수</tspan></text>
  <text x="466" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">$: doubled = count * <tspan fill="#b5cea8">2</tspan>    <tspan fill="#9aa4b8">// 반응성 선언문</tspan></text>
  <text x="466" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">$: { console.log(count) }  <tspan fill="#9aa4b8">// 반응성 블록</tspan></text>
  <text x="466" y="410" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">// export let name = ''  // props</text>
  <text x="466" y="448" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">// $: 는 직관적이지만 TS와 궁합 나쁨</text>
  <text x="466" y="466" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">// Runes는 명시적, TS 완전 지원</text>
</svg>
