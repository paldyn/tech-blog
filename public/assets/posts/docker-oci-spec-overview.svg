  <rect x="76" y="128" width="208" height="44" rx="4" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">Manifest</text>
  <text x="180" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">레이어·config 참조 목록</text>

  <rect x="76" y="180" width="208" height="44" rx="4" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
