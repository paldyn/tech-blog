  <rect x="76" y="232" width="208" height="44" rx="4" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">Layers</text>
  <text x="180" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">tar.gz 레이어 블롭</text>

  <rect x="76" y="284" width="208" height="44" rx="4" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
