        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">Manifest API</text>
  <text x="700" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">GET/PUT/DELETE manifest</text>

  <rect x="596" y="232" width="208" height="44" rx="4" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="700" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">Blob API</text>
  <text x="700" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">레이어 업로드/다운로드</text>

  <rect x="596" y="284" width="208" height="44" rx="4" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="700" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">Tags API</text>
  <text x="700" y="319" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">GET /v2/{name}/tags/list</text>

  <rect x="596" y="336" width="208" height="44" rx="4" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="700" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">구현: Docker Hub, ECR</text>
  <text x="700" y="371" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Harbor, Quay, GHCR</text>

  <!-- Bottom label -->
  <text x="440" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">OCI 3종 스펙이 컨테이너 생태계 표준화 — 툴 교체·생태계 확장이 가능한 기반</text>
  <text x="440" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8" text-anchor="middle">Docker → containerd → runc 모두 OCI 준수 → Podman, nerdctl, Buildah 모두 상호 호환</text>
