  <text x="440" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">create/start/stop/delete</text>

  <rect x="346" y="232" width="188" height="44" rx="4" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">Hooks</text>
  <text x="440" y="267" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">prestart/poststart/poststop</text>

  <rect x="346" y="284" width="188" height="44" rx="4" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">Linux 특화</text>
  <text x="440" y="319" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
