  <rect x="346" y="336" width="188" height="44" rx="4" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="355" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">구현체: runc, crun</text>
  <text x="440" y="371" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">gVisor, Kata도 구현</text>

  <!-- OCI Distribution Spec -->
  <rect x="580" y="70" width="240" height="360" rx="8" fill="#0d1117" stroke="#ce9178" stroke-width="2"/>
  <text x="700" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#ce9178" text-anchor="middle">Distribution Spec</text>
  <text x="700" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">레지스트리 API 표준</text>

  <rect x="596" y="128" width="208" height="44" rx="4" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="700" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">GET /v2/</text>
  <text x="700" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">레지스트리 버전 확인 엔드포인트</text>

  <rect x="596" y="180" width="208" height="44" rx="4" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
