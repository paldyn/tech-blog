  <rect x="346" y="180" width="188" height="44" rx="4" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="199" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
