<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <style>text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }</style>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">데이터 플라이휠 효과</text>
  <text x="440" y="68" text-anchor="middle" font-size="14" fill="#888">데이터가 많을수록 모델이 좋아지고, 좋은 모델이 더 많은 사용자를 유인한다</text>

  <!-- Central circle -->
  <circle cx="440" cy="280" r="58" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="274" text-anchor="middle" font-size="14" font-weight="700" fill="#7777cc">데이터</text>
  <text x="440" y="292" text-anchor="middle" font-size="14" font-weight="700" fill="#7777cc">플라이휠</text>

  <!-- 5 nodes around the circle -->
  <!-- Node 1: 사용자 (top) -->
  <rect x="348" y="76" width="184" height="54" rx="8" fill="#111" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="99" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">사용자 증가</text>
  <text x="440" y="118" text-anchor="middle" font-size="12" fill="#aaa">더 많은 사람이 제품을 사용</text>

  <!-- Arrow 1→2 (clockwise) -->
  <path d="M 560 140 Q 610 160 620 220" fill="none" stroke="#555" stroke-width="2"/>
  <polygon points="614,220 628,218 620,232" fill="#555"/>

  <!-- Node 2: 데이터 수집 (right) -->
  <rect x="618" y="222" width="162" height="54" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="2"/>
  <text x="699" y="245" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">데이터 수집</text>
  <text x="699" y="263" text-anchor="middle" font-size="12" fill="#aaa">사용 로그·피드백 축적</text>

  <!-- Arrow 2→3 -->
  <path d="M 618 310 Q 580 360 520 390" fill="none" stroke="#555" stroke-width="2"/>
  <polygon points="525,382 516,394 509,383" fill="#555"/>

  <!-- Node 3: 모델 학습 (bottom-right) -->
  <rect x="486" y="390" width="174" height="54" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="2"/>
  <text x="573" y="413" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">모델 재학습</text>
  <text x="573" y="431" text-anchor="middle" font-size="12" fill="#aaa">새 데이터로 성능 향상</text>

  <!-- Arrow 3→4 -->
  <path d="M 480 418 Q 420 440 370 418" fill="none" stroke="#555" stroke-width="2"/>
  <polygon points="375,426 362,416 374,408" fill="#555"/>

  <!-- Node 4: 제품 개선 (bottom-left) -->
  <rect x="220" y="390" width="162" height="54" rx="8" fill="#111" stroke="#e05555" stroke-width="2"/>
  <text x="301" y="413" text-anchor="middle" font-size="13" font-weight="600" fill="#e05555">제품 성능 개선</text>
  <text x="301" y="431" text-anchor="middle" font-size="12" fill="#aaa">더 정확한 추천·답변</text>

  <!-- Arrow 4→5 -->
  <path d="M 248 390 Q 210 340 232 278" fill="none" stroke="#555" stroke-width="2"/>
  <polygon points="226,282 232,268 240,279" fill="#555"/>

  <!-- Node 5: 경쟁력 (left) -->
  <rect x="100" y="222" width="162" height="54" rx="8" fill="#111" stroke="#e05555" stroke-width="2"/>
  <text x="181" y="245" text-anchor="middle" font-size="13" font-weight="600" fill="#e05555">경쟁 우위 확보</text>
  <text x="181" y="263" text-anchor="middle" font-size="12" fill="#aaa">타 서비스 대비 차별화</text>

  <!-- Arrow 5→1 -->
  <path d="M 270 222 Q 320 150 360 128" fill="none" stroke="#555" stroke-width="2"/>
  <polygon points="356,140 368,126 370,140" fill="#555"/>

  <!-- Data quality note -->
  <rect x="60" y="458" width="760" height="40" rx="6" fill="#111"/>
  <text x="440" y="478" text-anchor="middle" font-size="12" fill="#aaa">⚠️ 데이터 품질이 핵심: 많은 데이터보다 좋은 데이터가 중요하다 (Garbage In, Garbage Out)</text>
  <text x="440" y="493" text-anchor="middle" font-size="11" fill="#555">구글·메타·틱톡의 강점은 수십억 사용자가 생성하는 고품질 데이터 플라이휠에서 나온다</text>

  <!-- Footer -->
  <text x="440" y="514" text-anchor="middle" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈</text>
</svg>
