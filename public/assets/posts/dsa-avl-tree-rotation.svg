<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">AVL 트리 회전 (Rotation)</text>

  <!-- ===== LEFT: LL 회전 ===== -->
  <text x="120" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">LL 회전 (우회전)</text>

  <!-- Before LL -->
  <text x="72" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">삽입 전</text>

  <!-- Node C (root) -->
  <circle cx="130" cy="140" r="22" fill="#1a2a4a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="130" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">C</text>
  <!-- BF label -->
  <text x="158" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">BF=-2</text>

  <!-- Node B -->
  <circle cx="90" cy="200" r="22" fill="#1a2a4a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="90" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">B</text>
  <text x="62" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">BF=-1</text>

  <!-- Node A -->
  <circle cx="60" cy="260" r="22" fill="#1a2a4a" stroke="#55c555" stroke-width="2"/>
  <text x="60" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">A</text>

  <!-- edges before -->
  <line x1="113" y1="158" x2="103" y2="180" stroke="#555" stroke-width="1.5"/>
  <line x1="75" y1="218" x2="69" y2="240" stroke="#555" stroke-width="1.5"/>

  <!-- Arrow right -->
  <path d="M 175 195 Q 200 195 215 195" stroke="#7ec8e3" stroke-width="2" fill="none" marker-end="url(#arr-b)"/>
  <text x="195" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">우회전</text>

  <!-- After LL -->
  <text x="260" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">회전 후</text>

  <!-- Node B (new root) -->
  <circle cx="255" cy="140" r="22" fill="#1a2a4a" stroke="#55c555" stroke-width="2"/>
  <text x="255" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">B</text>
  <text x="280" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">BF=0</text>

  <!-- Node A -->
  <circle cx="218" cy="200" r="22" fill="#1a2a4a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="218" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">A</text>

  <!-- Node C -->
  <circle cx="292" cy="200" r="22" fill="#1a2a4a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="292" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">C</text>

  <!-- edges after -->
  <line x1="237" y1="157" x2="228" y2="180" stroke="#555" stroke-width="1.5"/>
  <line x1="273" y1="157" x2="281" y2="180" stroke="#555" stroke-width="1.5"/>

  <!-- ===== RIGHT: LR 회전 ===== -->
  <text x="570" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#ce9178" text-anchor="middle">LR 회전 (좌-우회전)</text>

  <!-- Step 1: Before -->
  <text x="420" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">삽입 후</text>

  <!-- C root -->
  <circle cx="430" cy="140" r="22" fill="#1a2a4a" stroke="#ce9178" stroke-width="2"/>
  <text x="430" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">C</text>
  <text x="456" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">BF=-2</text>

  <!-- A left child -->
  <circle cx="390" cy="200" r="22" fill="#1a2a4a" stroke="#ce9178" stroke-width="2"/>
  <text x="390" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">A</text>

  <!-- B right child of A -->
  <circle cx="420" cy="260" r="22" fill="#1a2a4a" stroke="#55c555" stroke-width="2"/>
  <text x="420" y="265" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">B</text>

  <line x1="413" y1="158" x2="403" y2="180" stroke="#555" stroke-width="1.5"/>
  <line x1="403" y1="218" x2="413" y2="242" stroke="#555" stroke-width="1.5"/>

  <!-- Arrow 1 -->
  <path d="M 460 195 Q 488 195 502 195" stroke="#ce9178" stroke-width="2" fill="none" marker-end="url(#arr-b)"/>
  <text x="481" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178" text-anchor="middle">좌회전(A)</text>

  <!-- Step 2 after LR -->
  <text x="590" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">최종 결과</text>

  <!-- B new root -->
  <circle cx="640" cy="140" r="22" fill="#1a2a4a" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">B</text>
  <text x="665" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">BF=0</text>

  <circle cx="600" cy="200" r="22" fill="#1a2a4a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="600" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">A</text>

  <circle cx="680" cy="200" r="22" fill="#1a2a4a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="680" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">C</text>

  <line x1="622" y1="157" x2="612" y2="180" stroke="#555" stroke-width="1.5"/>
  <line x1="658" y1="157" x2="668" y2="180" stroke="#555" stroke-width="1.5"/>

  <!-- BF 설명 박스 -->
  <rect x="60" y="310" width="760" height="70" fill="#0f1a2e" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="335" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">균형 인수 (Balance Factor)</text>
  <text x="440" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa" text-anchor="middle">BF = height(왼쪽 서브트리) - height(오른쪽 서브트리)</text>
  <text x="440" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa" text-anchor="middle">AVL 조건: 모든 노드에서 |BF| ≤ 1</text>

  <!-- Code box -->
  <rect x="60" y="395" width="760" height="108" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="418" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">def height(node):</text>
  <text x="76" y="436" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">    # None 이면 -1 반환</tspan>
  </text>
  <text x="76" y="454" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    return</tspan><tspan fill="#ffffff"> -1 </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> node </tspan><tspan fill="#7ec8e3" font-weight="600">is</tspan><tspan fill="#ffffff"> None </tspan><tspan fill="#7ec8e3" font-weight="600">else</tspan><tspan fill="#ffffff"> node.height</tspan>
  </text>
  <text x="76" y="472" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">def</tspan><tspan fill="#ffffff"> balance_factor(node):</tspan>
  </text>
  <text x="76" y="490" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    return</tspan><tspan fill="#ffffff"> height(node.left) - height(node.right)</tspan>
  </text>
</svg>
