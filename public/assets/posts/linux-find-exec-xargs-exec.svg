<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">find -exec 동작 원리</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">{} 에 파일 경로를 치환해 명령을 실행</text>

  <!-- find -exec flow -->
  <!-- find box -->
  <rect x="60" y="92" width="180" height="48" fill="#1a1a2e" rx="6" stroke="#7ec8e3" stroke-width="2"/>
  <text x="150" y="121" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">find . -name '*.log'</text>

  <!-- Arrow down -->
  <polygon points="150,158 142,140 158,140" fill="#7ec8e3"/>
  <line x1="150" y1="140" x2="150" y2="170" stroke="#7ec8e3" stroke-width="2"/>

  <!-- Files found -->
  <rect x="80" y="158" width="140" height="84" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="150" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" text-anchor="middle">찾은 파일 목록</text>
  <text x="150" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" text-anchor="middle">./app.log</text>
  <text x="150" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" text-anchor="middle">./logs/err.log</text>
  <text x="150" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" text-anchor="middle">./logs/sys.log</text>

  <!-- Arrow right to exec -->
  <polygon points="258,200 278,192 278,208" fill="#55c555"/>
  <line x1="220" y1="200" x2="277" y2="200" stroke="#55c555" stroke-width="2"/>
  <text x="248" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">-exec</text>

  <!-- exec box showing substitution -->
  <rect x="280" y="160" width="280" height="80" fill="#000000" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="296" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">-exec gzip <tspan fill="#e8c55a">{}</tspan> \;</text>
  <text x="296" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">↓ {} 를 각 파일로 치환</text>
  <text x="296" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">gzip ./app.log</text>
  <text x="296" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">      </text>

  <!-- Execution per file -->
  <rect x="280" y="254" width="280" height="60" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="296" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">gzip ./app.log     ← 실행 1</text>
  <text x="296" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">gzip ./logs/err.log ← 실행 2</text>
  <text x="296" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">gzip ./logs/sys.log ← 실행 3</text>

  <!-- Comparison: ; vs + -->
  <rect x="600" y="92" width="240" height="290" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="720" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">; vs + 비교</text>
  <text x="616" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8c55a">-exec cmd {} \;</text>
  <text x="616" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">  파일마다 한 번씩 실행</text>
  <text x="616" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">  → N개 파일 = N번 fork</text>
  <line x1="616" y1="192" x2="820" y2="192" stroke="#333" stroke-width="1"/>
  <text x="616" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">-exec cmd {} +</text>
  <text x="616" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">  파일을 묶어 한 번 실행</text>
  <text x="616" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">  → xargs 와 유사</text>
  <text x="616" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">  훨씬 빠름</text>
  <line x1="616" y1="286" x2="820" y2="286" stroke="#333" stroke-width="1"/>
  <text x="616" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">-execdir cmd {} \;</text>
  <text x="616" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">  파일 위치에서 실행</text>
  <text x="616" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">  보안 권장 방식</text>

  <!-- Bottom examples -->
  <rect x="60" y="356" width="520" height="44" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">find . -name <tspan fill="#ce9178">'*.tmp'</tspan> -exec rm {} \;</text>
  <text x="76" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">find . -name <tspan fill="#ce9178">'*.c'</tspan> -exec wc -l {} +  <tspan fill="#9aa4b8"># 더 빠름</tspan></text>
</svg>
