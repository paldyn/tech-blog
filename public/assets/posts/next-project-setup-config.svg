<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">next.config.ts 핵심 설정</text>
  <text x="440" y="70" text-anchor="middle" font-size="14" fill="#888">프로젝트 루트의 Next.js 설정 파일</text>

  <!-- Code box -->
  <rect x="80" y="90" width="720" height="260" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> type { NextConfig } </tspan><tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ce9178"> 'next'</tspan>
  </text>
  <text x="96" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff"> </text>
  <text x="96" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> nextConfig: NextConfig = {</tspan>
  </text>
  <text x="96" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan fill="#ffffff">  reactStrictMode: </tspan><tspan fill="#7ec8e3" font-weight="600">true</tspan><tspan fill="#ffffff">,</tspan>
  </text>
  <text x="96" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan fill="#ffffff">  images: {</tspan>
  </text>
  <text x="96" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan fill="#ffffff">    remotePatterns: [{ </tspan><tspan fill="#ce9178">hostname</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">'example.com'</tspan><tspan fill="#ffffff"> }],</tspan>
  </text>
  <text x="96" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan fill="#ffffff">  },</tspan>
  </text>
  <text x="96" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan fill="#ffffff">  experimental: { ppr: </tspan><tspan fill="#7ec8e3" font-weight="600">true</tspan><tspan fill="#ffffff"> },</tspan>
  </text>
  <text x="96" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan fill="#ffffff">}</tspan>
  </text>
  <text x="96" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff"> </text>
  <text x="96" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">export default</tspan><tspan fill="#ffffff"> nextConfig</tspan>
  </text>

  <!-- Bottom note -->
  <rect x="80" y="370" width="720" height="80" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="400" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">설정 파일 지원 형식</text>
  <text x="440" y="425" text-anchor="middle" font-size="13" fill="#888">next.config.js (CommonJS) · next.config.mjs (ESM) · next.config.ts (TypeScript)</text>
</svg>
