<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="360" rx="12" fill="#0a0a0a"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">머지 커밋 되돌리기: -m 으로 mainline 지정</text>
  <text x="60" y="78" font-size="16" font-weight="600" fill="#888">머지 커밋은 부모가 둘이라 어느 쪽을 기준으로 되돌릴지 알려 줘야 한다</text>

  <!-- main line -->
  <text x="60" y="155" font-size="13" fill="#888">main</text>
  <circle cx="150" cy="180" r="10" fill="#7ec8e3"/><text x="143" y="185" font-size="11" fill="#0a0a0a">A</text>
  <circle cx="250" cy="180" r="10" fill="#7ec8e3"/><text x="243" y="185" font-size="11" fill="#0a0a0a">B</text>
  <circle cx="470" cy="180" r="12" fill="#e0a555"/><text x="461" y="185" font-size="11" fill="#0a0a0a">M</text>
  <line x1="160" y1="180" x2="240" y2="180" stroke="#888" stroke-width="2"/>
  <line x1="260" y1="180" x2="458" y2="180" stroke="#888" stroke-width="2"/>
  <text x="448" y="155" font-size="12" fill="#e0a555">머지 커밋</text>

  <!-- feature line -->
  <text x="290" y="280" font-size="13" fill="#888">feature</text>
  <circle cx="350" cy="260" r="10" fill="#55c555"/><text x="343" y="265" font-size="11" fill="#0a0a0a">X</text>
  <circle cx="430" cy="260" r="10" fill="#55c555"/><text x="423" y="265" font-size="11" fill="#0a0a0a">Y</text>
  <line x1="250" y1="190" x2="343" y2="253" stroke="#888" stroke-width="2"/>
  <line x1="360" y1="260" x2="420" y2="260" stroke="#888" stroke-width="2"/>
  <line x1="439" y1="253" x2="462" y2="190" stroke="#888" stroke-width="2"/>
  <text x="150" y="225" font-size="11" fill="#7ec8e3">부모1 (mainline)</text>
  <text x="350" y="300" font-size="11" fill="#55c555">부모2 (feature)</text>

  <rect x="560" y="200" width="280" height="100" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="580" y="230" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8"># 부모1 기준으로 되돌리기</text>
  <text xml:space="preserve" x="580" y="258" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">git revert -m 1 M</text>
  <text xml:space="preserve" x="580" y="286" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8"># feature 변경이 통째로 취소</text>

  <text x="60" y="340" font-size="13" fill="#888">-m 1은 보통 머지를 받은 쪽(main), feature가 가져온 변경을 무효화한다</text>
</svg>
