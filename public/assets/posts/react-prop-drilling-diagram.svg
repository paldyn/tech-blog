<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Prop Drilling 문제</text>

  <defs>
    <marker id="arrdr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arrdg" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Left: prop drilling problem -->
  <text x="210" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e05555">Prop Drilling (문제)</text>

  <rect x="120" y="92" width="180" height="44" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="210" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">App (user 보유)</text>

  <line x1="210" y1="136" x2="210" y2="158" stroke="#e05555" stroke-width="2" marker-end="url(#arrdr)"/>
  <text x="230" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">user</text>

  <rect x="100" y="160" width="220" height="44" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="210" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Layout (user 필요없음)</text>

  <line x1="210" y1="204" x2="210" y2="226" stroke="#e05555" stroke-width="2" marker-end="url(#arrdr)"/>
  <text x="230" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">user</text>

  <rect x="100" y="228" width="220" height="44" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="210" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Sidebar (user 필요없음)</text>

  <line x1="210" y1="272" x2="210" y2="294" stroke="#e05555" stroke-width="2" marker-end="url(#arrdr)"/>
  <text x="230" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">user</text>

  <rect x="100" y="296" width="220" height="44" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="210" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">UserProfile (실제 사용)</text>

  <rect x="60" y="358" width="300" height="40" rx="6" fill="#1a0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="210" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">중간 컴포넌트들이 불필요하게 user를 전달</text>

  <!-- Right: Context solution -->
  <text x="640" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">Context로 해결</text>

  <rect x="550" y="92" width="180" height="44" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
