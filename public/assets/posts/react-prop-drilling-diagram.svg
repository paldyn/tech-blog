  <rect x="530" y="160" width="220" height="44" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="640" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Layout (user 전달 안 함)</text>

  <line x1="640" y1="204" x2="640" y2="226" stroke="#55c555" stroke-width="2" marker-end="url(#arrdg)"/>

  <rect x="530" y="228" width="220" height="44" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="640" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Sidebar (user 전달 안 함)</text>

  <line x1="640" y1="272" x2="640" y2="294" stroke="#55c555" stroke-width="2" marker-end="url(#arrdg)"/>

  <rect x="530" y="296" width="220" height="44" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">UserProfile (useContext로 직접)</text>

  <rect x="460" y="358" width="360" height="40" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">필요한 곳에서만 Context 소비</text>

  <!-- Bottom summary -->
  <rect x="60" y="414" width="760" height="30" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="440" y="434" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Context 외 해결책: 컴포지션(slot) · 상태 관리 라이브러리 · 컴포넌트 재구성</text>
</svg>