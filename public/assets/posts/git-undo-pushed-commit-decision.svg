<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="dcArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="340" rx="12" fill="#0a0a0a"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">되돌리기 방법 결정 흐름</text>
  <text x="60" y="78" font-size="16" font-weight="600" fill="#888">먼저 "누가 이 브랜치를 보고 있는가"를 묻는다</text>

  <rect x="320" y="105" width="240" height="56" rx="10" fill="#000000" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="345" y="130" font-size="14" fill="#ffffff">다른 사람이</text>
  <text x="345" y="150" font-size="14" fill="#ffffff">그 커밋을 받았나?</text>

  <!-- yes -> revert -->
  <line x1="320" y1="133" x2="200" y2="133" stroke="#7ec8e3" stroke-width="2"/>
  <line x1="200" y1="133" x2="200" y2="215" stroke="#7ec8e3" stroke-width="2" marker-end="url(#dcArr)"/>
  <text x="210" y="180" font-size="13" fill="#55c555">예</text>
  <rect x="100" y="225" width="200" height="80" rx="10" fill="#000000" stroke="#55c555" stroke-width="1.5"/>
  <text x="120" y="255" font-size="15" font-weight="600" fill="#55c555">revert</text>
  <text x="120" y="280" font-size="12" fill="#9aa4b8">취소 커밋을 추가해</text>
  <text x="120" y="298" font-size="12" fill="#9aa4b8">정상적으로 push</text>

  <!-- no -> reset -->
  <line x1="560" y1="133" x2="680" y2="133" stroke="#7ec8e3" stroke-width="2"/>
  <line x1="680" y1="133" x2="680" y2="215" stroke="#7ec8e3" stroke-width="2" marker-end="url(#dcArr)"/>
  <text x="640" y="180" font-size="13" fill="#e05555">아니오(혼자)</text>
  <rect x="580" y="225" width="200" height="80" rx="10" fill="#000000" stroke="#e05555" stroke-width="1.5"/>
  <text x="600" y="255" font-size="15" font-weight="600" fill="#e05555">reset + lease</text>
  <text x="600" y="280" font-size="12" fill="#9aa4b8">reset 후</text>
  <text x="600" y="298" font-size="12" fill="#9aa4b8">--force-with-lease</text>
</svg>
