<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrp" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">git revert — 되돌리기 커밋 추가</text>

  <!-- Timeline label -->
  <text x="60" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">히스토리 타임라인</text>

  <!-- Commits timeline -->
  <line x1="60" y1="140" x2="820" y2="140" stroke="#333" stroke-width="1"/>

  <!-- Commit A -->
  <circle cx="120" cy="140" r="22" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="120" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3" text-anchor="middle" font-weight="600">A</text>
  <text x="120" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">feat: 로그인</text>

  <line x1="142" y1="140" x2="208" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Commit B (bad) -->
  <circle cx="250" cy="140" r="22" fill="#2a1a1a" stroke="#e05555" stroke-width="2"/>
  <text x="250" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#e05555" text-anchor="middle" font-weight="600">B</text>
  <text x="250" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">feat: 버그 도입</text>
  <!-- Bug mark -->
  <text x="250" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#e05555" text-anchor="middle">🐛</text>

  <line x1="272" y1="140" x2="338" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Commit C -->
  <circle cx="380" cy="140" r="22" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="380" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3" text-anchor="middle" font-weight="600">C</text>
  <text x="380" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">feat: 추가 기능</text>

  <line x1="402" y1="140" x2="468" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Commit D -->
  <circle cx="510" cy="140" r="22" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="510" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3" text-anchor="middle" font-weight="600">D</text>
  <text x="510" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">fix: 다른 수정</text>

  <!-- revert command -->
  <rect x="560" y="115" width="260" height="50" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="576" y="135" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">git revert </text>
  <text x="680" y="135" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">B의SHA</text>
  <text x="576" y="155" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8"># B의 변경을 취소하는 새 커밋</text>

  <line x1="820" y1="140" x2="820" y2="240" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="820" y1="240" x2="660" y2="240" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrp)"/>

  <!-- Revert commit -->
  <circle cx="640" cy="280" r="26" fill="#1a2a1e" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555" text-anchor="middle" font-weight="600">Revert</text>
  <text x="640" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555" text-anchor="middle" font-weight="600">B</text>

  <text x="640" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">새 커밋으로 추가됨</text>
  <text x="640" y="343" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">B의 변경사항 반대 적용</text>
  <text x="640" y="361" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">C, D는 그대로 유지</text>

  <!-- Key points -->
  <rect x="60" y="380" width="520" height="60" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="80" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" font-weight="600">revert의 핵심 특성</text>
  <text x="80" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">히스토리를 지우지 않고 새 커밋을 추가 → push된 공유 브랜치에서 안전하게 사용 가능</text>
</svg>
