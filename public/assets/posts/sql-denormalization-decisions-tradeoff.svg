<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">비정규화 트레이드오프</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">Normalization vs Denormalization</text>

  <!-- Left column: Normalized -->
  <rect x="60" y="95" width="340" height="50" rx="8" fill="#0f1f0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="230" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">정규화 (3NF)</text>
  <text x="230" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">데이터 무결성 보장</text>

  <!-- Right column: Denormalized -->
  <rect x="480" y="95" width="340" height="50" rx="8" fill="#1f0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="650" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555">비정규화</text>
  <text x="650" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">읽기 성능 최적화</text>

  <!-- Pros/Cons boxes -->
  <!-- Normalized pros -->
  <rect x="60" y="165" width="150" height="140" rx="6" fill="#111" stroke="#333"/>
  <text x="135" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">장점</text>
  <text x="75" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• 갱신 이상 없음</text>
  <text x="75" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• 중복 최소화</text>
  <text x="75" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• 일관성 유지</text>
  <text x="75" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• 저장 공간 절약</text>
  <text x="75" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• 트랜잭션 간단</text>
  <text x="75" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• 스키마 명확</text>

  <!-- Normalized cons -->
  <rect x="250" y="165" width="150" height="140" rx="6" fill="#111" stroke="#333"/>
  <text x="325" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">단점</text>
  <text x="265" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• JOIN 비용 증가</text>
  <text x="265" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• 쿼리 복잡도 ↑</text>
  <text x="265" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• 읽기 I/O 증가</text>
  <text x="265" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• 인덱스 분산</text>

  <!-- Denormalized pros -->
  <rect x="480" y="165" width="150" height="140" rx="6" fill="#111" stroke="#333"/>
  <text x="555" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">장점</text>
  <text x="495" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• JOIN 제거</text>
  <text x="495" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• 읽기 속도 ↑</text>
  <text x="495" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• 캐시 효율 ↑</text>
  <text x="495" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• 쿼리 단순화</text>
  <text x="495" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• 인덱스 집중</text>

  <!-- Denormalized cons -->
  <rect x="670" y="165" width="150" height="140" rx="6" fill="#111" stroke="#333"/>
  <text x="745" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">단점</text>
  <text x="685" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• 갱신 이상 위험</text>
  <text x="685" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• 데이터 중복</text>
  <text x="685" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• 저장 공간 증가</text>
  <text x="685" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">• 일관성 관리 필요</text>

  <!-- When to use row -->
  <rect x="60" y="325" width="340" height="50" rx="6" fill="#0d1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="230" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">사용 시나리오</text>
  <text x="230" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">OLTP · 쓰기 중심 시스템</text>

  <rect x="480" y="325" width="340" height="50" rx="6" fill="#0d1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="650" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">사용 시나리오</text>
  <text x="650" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">OLAP · 읽기 중심 · 리포팅</text>

  <!-- VS arrow in center -->
  <text x="440" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#7777cc">VS</text>

  <!-- Decision flow -->
  <rect x="180" y="390" width="520" height="50" rx="8" fill="#12101a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="410" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">결정 기준</text>
  <text x="440" y="428" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b0b0b0">읽기/쓰기 비율 · 프로파일링 결과 · 허용 가능한 일관성 수준</text>
</svg>
