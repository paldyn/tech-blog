<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 2 L 12 7 L 0 12 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-warn" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 2 L 12 7 L 0 12 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">JS 파싱 · 컴파일 파이프라인</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">네트워크에서 실행까지 — 각 단계의 비용</text>

  <!-- Stage boxes -->
  <!-- 1: Download -->
  <rect x="60" y="110" width="130" height="60" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="125" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">① 다운로드</text>
  <text x="125" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">네트워크 전송</text>

  <!-- 2: Parse -->
  <rect x="230" y="110" width="130" height="60" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="295" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">② 파싱</text>
  <text x="295" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">AST 생성</text>

  <!-- 3: Compile -->
  <rect x="400" y="110" width="130" height="60" rx="8" fill="#1a1a2e" stroke="#e05555" stroke-width="1.5"/>
  <text x="465" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">③ 컴파일</text>
  <text x="465" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">바이트코드 생성</text>

  <!-- 4: Execute -->
  <rect x="570" y="110" width="130" height="60" rx="8" fill="#1a1a2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="635" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">④ 실행</text>
  <text x="635" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">JIT 최적화</text>

  <!-- Arrows -->
  <line x1="190" y1="140" x2="228" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="360" y1="140" x2="398" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="530" y1="140" x2="568" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Cost labels below arrows -->
  <text x="295" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">⚠ 메인 스레드 블로킹</text>
  <text x="465" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">⚠ CPU 집중 작업</text>

  <!-- Parse detail box -->
  <rect x="60" y="240" width="360" height="110" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">파싱 비용 요인</text>
  <text x="80" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">• 파일 크기 1KB → 파싱 ~0.06ms (V8 기준)</text>
  <text x="80" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">• 100KB 번들 → ~6ms (저사양 기기 ×3~5)</text>
  <text x="80" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">• Eager Parse vs Lazy Parse (함수 내부)</text>

  <!-- Compile detail box -->
  <rect x="460" y="240" width="360" height="110" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">컴파일 비용 요인</text>
  <text x="480" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">• Ignition: AST → 바이트코드 (빠름)</text>
  <text x="480" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">• TurboFan: 핫 경로 JIT 최적화 (느림)</text>
  <text x="480" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">• Deopt: 타입 변경 시 재컴파일</text>

  <!-- Code block -->
  <rect x="60" y="380" width="760" height="84" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="404" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 파싱 비용 측정 — Performance API</text>
  <text x="76" y="422" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">const</tspan> t0 = performance.now();</text>
  <text x="76" y="440" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">await</tspan> <tspan fill="#7ec8e3" font-weight="600">import</tspan>(<tspan fill="#ce9178">'./heavy-module.js'</tspan>);</text>
  <text x="76" y="458" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">console.log(<tspan fill="#ce9178">`파싱+컴파일: ${performance.now()-t0}ms`</tspan>);</text>
</svg>
