<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8">HTTP 메서드 · 상태 코드와 보안</text>

  <!-- HTTP Methods -->
  <text x="60" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">HTTP 메서드 보안 특성</text>

  <!-- Headers -->
  <rect x="60" y="88" width="80" height="30" rx="4" fill="#0d1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">메서드</text>
  <rect x="148" y="88" width="80" height="30" rx="4" fill="#0d1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="188" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">멱등성</text>
  <rect x="236" y="88" width="80" height="30" rx="4" fill="#0d1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="276" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">안전성</text>
  <rect x="324" y="88" width="260" height="30" rx="4" fill="#0d1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="454" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">보안 주의사항</text>

  <!-- GET -->
  <rect x="60" y="126" width="80" height="28" rx="4" fill="#101820" stroke="#222" stroke-width="1"/>
  <text x="100" y="145" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">GET</text>
  <rect x="148" y="126" width="80" height="28" rx="4" fill="#101820" stroke="#222" stroke-width="1"/>
  <text x="188" y="145" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">O</text>
  <rect x="236" y="126" width="80" height="28" rx="4" fill="#101820" stroke="#222" stroke-width="1"/>
  <text x="276" y="145" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">O</text>
  <rect x="324" y="126" width="260" height="28" rx="4" fill="#101820" stroke="#222" stroke-width="1"/>
  <text x="454" y="145" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">민감 데이터를 쿼리 파라미터에 담지 말 것</text>

  <!-- POST -->
  <rect x="60" y="162" width="80" height="28" rx="4" fill="#101820" stroke="#222" stroke-width="1"/>
  <text x="100" y="181" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">POST</text>
  <rect x="148" y="162" width="80" height="28" rx="4" fill="#101820" stroke="#222" stroke-width="1"/>
  <text x="188" y="181" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">X</text>
  <rect x="236" y="162" width="80" height="28" rx="4" fill="#101820" stroke="#222" stroke-width="1"/>
  <text x="276" y="181" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">X</text>
  <rect x="324" y="162" width="260" height="28" rx="4" fill="#101820" stroke="#222" stroke-width="1"/>
  <text x="454" y="181" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">CSRF 공격 대상, CSRF 토큰 필수</text>

  <!-- PUT/PATCH -->
  <rect x="60" y="198" width="80" height="28" rx="4" fill="#101820" stroke="#222" stroke-width="1"/>
  <text x="100" y="217" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3" font-weight="600">PUT/PATCH</text>
  <rect x="148" y="198" width="80" height="28" rx="4" fill="#101820" stroke="#222" stroke-width="1"/>
  <text x="188" y="217" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">O (PUT)</text>
  <rect x="236" y="198" width="80" height="28" rx="4" fill="#101820" stroke="#222" stroke-width="1"/>
  <text x="276" y="217" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">X</text>
  <rect x="324" y="198" width="260" height="28" rx="4" fill="#101820" stroke="#222" stroke-width="1"/>
  <text x="454" y="217" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">인가 확인 필수, IDOR 주의</text>

  <!-- DELETE -->
  <rect x="60" y="234" width="80" height="28" rx="4" fill="#101820" stroke="#222" stroke-width="1"/>
  <text x="100" y="253" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">DELETE</text>
  <rect x="148" y="234" width="80" height="28" rx="4" fill="#101820" stroke="#222" stroke-width="1"/>
  <text x="188" y="253" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">O</text>
  <rect x="236" y="234" width="80" height="28" rx="4" fill="#101820" stroke="#222" stroke-width="1"/>
  <text x="276" y="253" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">X</text>
  <rect x="324" y="234" width="260" height="28" rx="4" fill="#101820" stroke="#222" stroke-width="1"/>
  <text x="454" y="253" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">소유자 검증 없으면 IDOR로 타인 자원 삭제</text>

  <!-- Status codes -->
  <text x="630" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">보안 관련 상태 코드</text>

  <rect x="620" y="88" width="220" height="194" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">401</text>
  <text x="680" y="112" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> Unauthorized</text>
  <text x="640" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" xml:space="preserve">    인증 필요</text>
  <text x="640" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">403</text>
  <text x="680" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> Forbidden</text>
  <text x="640" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" xml:space="preserve">    인가 거부</text>
  <text x="640" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">404</text>
  <text x="680" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> Not Found</text>
  <text x="640" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" xml:space="preserve">    403 대신 써서 존재 숨김</text>
  <text x="640" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">429</text>
  <text x="680" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> Too Many Req</text>
  <text x="640" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" xml:space="preserve">    Rate Limit 초과</text>

  <!-- Bottom note -->
  <rect x="60" y="284" width="760" height="56" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">실수 줄이기 — 상태 코드 선택 원칙</text>
  <text x="440" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">401 vs 403: 로그인 안 됨(401) vs 권한 없음(403) — 혼용하면 공격자에게 정보 제공</text>
  <text x="440" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">존재 자체를 숨겨야 할 때(타인의 자원): 404 반환이 더 안전할 수 있음</text>
</svg>
