<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="50" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">HTTP 상태 코드와 보안</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">보안 관점에서 올바른 상태 코드 사용</text>

  <!-- Table header -->
  <rect x="60" y="100" width="760" height="40" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="160" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">상태 코드</text>
  <text x="350" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">의미</text>
  <text x="590" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">보안 고려사항</text>

  <!-- 200 -->
  <rect x="60" y="148" width="760" height="44" rx="0" fill="#111116" stroke="#222" stroke-width="1"/>
  <text x="160" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">200 OK</text>
  <text x="350" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">요청 성공</text>
  <text x="590" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">응답 본문에 민감 정보 최소화</text>

  <!-- 301/302 -->
  <rect x="60" y="192" width="760" height="44" rx="0" fill="#0e0e14" stroke="#222" stroke-width="1"/>
  <text x="160" y="219" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">301/302 Redirect</text>
  <text x="350" y="219" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">리다이렉션</text>
  <text x="590" y="219" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">오픈 리다이렉트 취약점 주의</text>

  <!-- 400 -->
  <rect x="60" y="236" width="760" height="44" rx="0" fill="#111116" stroke="#222" stroke-width="1"/>
  <text x="160" y="263" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e0a055" text-anchor="middle">400 Bad Request</text>
  <text x="350" y="263" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">잘못된 요청</text>
  <text x="590" y="263" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">검증 실패 시 — 상세 오류 메시지 금지</text>

  <!-- 401/403 -->
  <rect x="60" y="280" width="760" height="44" rx="0" fill="#0e0e14" stroke="#222" stroke-width="1"/>
  <text x="160" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">401/403</text>
  <text x="350" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">인증/인가 실패</text>
  <text x="590" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">계정 존재 여부 노출 방지 → 둘 다 동일 응답</text>

  <!-- 404 -->
  <rect x="60" y="324" width="760" height="44" rx="0" fill="#111116" stroke="#222" stroke-width="1"/>
  <text x="160" y="351" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#888" text-anchor="middle">404 Not Found</text>
  <text x="350" y="351" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">리소스 없음</text>
  <text x="590" y="351" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">권한 없는 리소스엔 403 대신 404 사용 가능</text>

  <!-- 500 -->
  <rect x="60" y="368" width="760" height="44" rx="0" fill="#0e0e14" stroke="#222" stroke-width="1"/>
  <text x="160" y="395" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">500 Server Error</text>
  <text x="350" y="395" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">서버 오류</text>
  <text x="590" y="395" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">스택 트레이스 절대 노출 금지</text>

  <!-- Bottom note -->
  <rect x="60" y="420" width="760" height="14" rx="4" fill="#1a1a0a" stroke="#e0a055" stroke-width="1"/>
  <text x="440" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e0a055" text-anchor="middle">일관된 응답 시간으로 타이밍 공격 방지 — 성공·실패 응답 속도를 동일하게</text>
</svg>
