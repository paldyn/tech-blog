<svg width="880" height="420" viewBox="0 0 880 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">독립 집합 ⇔ 정점 덮개: 여집합 한 줄 환원</text>

  <!-- left graph: independent set -->
  <text x="230" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">독립 집합 (서로 안 이어짐)</text>
  <!-- edges -->
  <g stroke="#555" stroke-width="2">
    <line x1="150" y1="180" x2="310" y2="180"/>
    <line x1="150" y1="180" x2="150" y2="320"/>
    <line x1="310" y1="180" x2="310" y2="320"/>
    <line x1="150" y1="320" x2="310" y2="320"/>
    <line x1="310" y1="180" x2="150" y2="320"/>
  </g>
  <!-- nodes: IS = top-right + bottom-left? choose 2 non-adjacent: A(TL) and D(BR) not adjacent? TL-BR no edge -->
  <circle cx="150" cy="180" r="16" fill="#55c555"/><text x="150" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#0a0a0a" font-weight="700">A</text>
  <circle cx="310" cy="180" r="16" fill="#262626" stroke="#888" stroke-width="1.5"/><text x="310" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">B</text>
  <circle cx="150" cy="320" r="16" fill="#262626" stroke="#888" stroke-width="1.5"/><text x="150" y="325" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">C</text>
  <circle cx="310" cy="320" r="16" fill="#55c555"/><text x="310" y="325" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#0a0a0a" font-weight="700">D</text>
  <text x="230" y="370" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">IS = {A, D}, 크기 2</text>

  <!-- right graph: vertex cover (complement) -->
  <text x="650" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555">정점 덮개 (모든 간선 덮음)</text>
  <g stroke="#555" stroke-width="2">
    <line x1="570" y1="180" x2="730" y2="180"/>
    <line x1="570" y1="180" x2="570" y2="320"/>
    <line x1="730" y1="180" x2="730" y2="320"/>
    <line x1="570" y1="320" x2="730" y2="320"/>
    <line x1="730" y1="180" x2="570" y2="320"/>
  </g>
  <circle cx="570" cy="180" r="16" fill="#262626" stroke="#888" stroke-width="1.5"/><text x="570" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">A</text>
  <circle cx="730" cy="180" r="16" fill="#e05555"/><text x="730" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#0a0a0a" font-weight="700">B</text>
  <circle cx="570" cy="320" r="16" fill="#e05555"/><text x="570" y="325" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#0a0a0a" font-weight="700">C</text>
  <circle cx="730" cy="320" r="16" fill="#262626" stroke="#888" stroke-width="1.5"/><text x="730" y="325" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">D</text>
  <text x="650" y="370" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">VC = {B, C}, 크기 n−2</text>

  <text x="440" y="402" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">S가 독립 집합 ⇔ 여집합 V∖S가 정점 덮개 — 변환은 그냥 여집합 (다항 시간)</text>
</svg>
