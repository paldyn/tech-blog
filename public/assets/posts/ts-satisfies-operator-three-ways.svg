<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430">
  <!-- Background -->
  <rect width="880" height="430" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">세 가지 방식 — 타입 검사와 추론 보존</text>

  <!-- Column headers -->
  <text x="200" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">구문</text>
  <text x="480" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">타입 검사</text>
  <text x="720" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">추론 보존</text>

  <!-- Row 1: annotation -->
  <rect x="60" y="96" width="280" height="56" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="129" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">const x: T = value;</text>
  <rect x="380" y="96" width="200" height="56" fill="#111827" rx="6" stroke="#334155" stroke-width="1"/>
  <text x="480" y="129" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">✓ 엄격하게 검사</text>
  <rect x="620" y="96" width="200" height="56" fill="#111827" rx="6" stroke="#334155" stroke-width="1"/>
  <text x="720" y="129" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">✗ T로 넓어짐</text>

  <!-- Row 2: as -->
  <rect x="60" y="168" width="280" height="56" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="201" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">const x = value as T;</text>
  <rect x="380" y="168" width="200" height="56" fill="#111827" rx="6" stroke="#334155" stroke-width="1"/>
  <text x="480" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">✗ 검사를 우회</text>
  <rect x="620" y="168" width="200" height="56" fill="#111827" rx="6" stroke="#334155" stroke-width="1"/>
  <text x="720" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">✗ T로 강제 고정</text>

  <!-- Row 3: satisfies -->
  <rect x="60" y="240" width="280" height="56" fill="#000000" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="76" y="273" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">value satisfies T;</text>
  <rect x="380" y="240" width="200" height="56" fill="#111827" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="480" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">✓ 엄격하게 검사</text>
  <rect x="620" y="240" width="200" height="56" fill="#111827" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="720" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">✓ 리터럴 유지</text>

  <!-- Bottom note -->
  <rect x="60" y="330" width="760" height="70" fill="#111827" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">초과 프로퍼티 검사 + 오타 방지 + 좁은 추론 = satisfies</text>
  <text x="440" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">as 단언이 필요해 보이는 자리 대부분은 satisfies로 더 안전하게 대체할 수 있다</text>
</svg>
