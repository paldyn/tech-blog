<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">IoC 컨테이너 인터페이스 계층 구조</text>
  <text x="440" y="68" text-anchor="middle" font-size="14" font-weight="600" fill="#888">BeanFactory → ApplicationContext → 주요 구현체</text>

  <!-- BeanFactory interface box (centered, w=320, x=280..600, y=88..162) -->
  <rect x="280" y="88" width="320" height="74" rx="8" fill="#0f1a20" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="114" text-anchor="middle" font-size="13" fill="#7ec8e3">«interface»</text>
  <text x="440" y="138" text-anchor="middle" font-size="16" font-weight="700" fill="#e8e8e8">BeanFactory</text>
  <text x="440" y="156" text-anchor="middle" font-size="12" fill="#888">getBean() · containsBean() · isSingleton()</text>

  <!-- Arrow: BeanFactory → ApplicationContext -->
  <line x1="440" y1="162" x2="440" y2="194" stroke="#444" stroke-width="1.5"/>
  <polygon points="440,197 434,188 446,188" fill="#444"/>
  <text x="453" y="182" font-size="11" fill="#555">extends</text>

  <!-- ApplicationContext box (w=480, x=200..680, y=197..295) -->
  <rect x="200" y="197" width="480" height="98" rx="8" fill="#0f1a14" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="222" text-anchor="middle" font-size="13" fill="#55c555">«interface»</text>
  <text x="440" y="246" text-anchor="middle" font-size="16" font-weight="700" fill="#e8e8e8">ApplicationContext</text>
  <text x="440" y="266" text-anchor="middle" font-size="12" fill="#888">BeanFactory + 이벤트 발행·구독 · MessageSource(i18n) · Environment</text>
  <text x="440" y="283" text-anchor="middle" font-size="12" fill="#888">빈 사전 초기화(Eager) · 프로파일 활성화 · Resource 로딩</text>

  <!-- Fan-out lines from AC bottom (440,295) to three impl tops -->
  <!-- Impl centers: 170, 440, 710  →  boxes: 65..277, 334..546, 603..815 -->
  <line x1="440" y1="295" x2="171" y2="342" stroke="#444" stroke-width="1.5"/>
  <line x1="440" y1="295" x2="440" y2="342" stroke="#444" stroke-width="1.5"/>
  <line x1="440" y1="295" x2="709" y2="342" stroke="#444" stroke-width="1.5"/>
  <polygon points="171,345 165,336 177,336" fill="#444"/>
  <polygon points="440,345 434,336 446,336" fill="#444"/>
  <polygon points="709,345 703,336 715,336" fill="#444"/>

  <!-- Impl 1: ClassPathXmlApplicationContext (x=65, w=212, center=171) -->
  <rect x="65" y="345" width="212" height="58" rx="6" fill="#0e0e1a" stroke="#7777cc" stroke-width="1"/>
  <text x="171" y="369" text-anchor="middle" font-size="11" font-weight="600" fill="#7777cc">ClassPath</text>
  <text x="171" y="386" text-anchor="middle" font-size="11" font-weight="600" fill="#7777cc">XmlApplicationContext</text>

  <!-- Impl 2: FileSystemXmlApplicationContext (x=334, w=212, center=440) -->
  <rect x="334" y="345" width="212" height="58" rx="6" fill="#0e0e1a" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="369" text-anchor="middle" font-size="11" font-weight="600" fill="#7777cc">FileSystem</text>
  <text x="440" y="386" text-anchor="middle" font-size="11" font-weight="600" fill="#7777cc">XmlApplicationContext</text>

  <!-- Impl 3: AnnotationConfigApplicationContext (x=603, w=212, center=709) -->
  <rect x="603" y="345" width="212" height="58" rx="6" fill="#0e0e1a" stroke="#7777cc" stroke-width="1"/>
  <text x="709" y="369" text-anchor="middle" font-size="11" font-weight="600" fill="#7777cc">AnnotationConfig</text>
  <text x="709" y="386" text-anchor="middle" font-size="11" font-weight="600" fill="#7777cc">ApplicationContext</text>

  <!-- Labels under impl boxes (y=403 + 16 = 419 → use 418) -->
  <text x="171" y="418" text-anchor="middle" font-size="11" fill="#888">XML 설정 · classpath 기준</text>
  <text x="440" y="418" text-anchor="middle" font-size="11" fill="#888">XML 설정 · 파일 시스템 경로</text>
  <text x="709" y="418" text-anchor="middle" font-size="12" fill="#e8e8e8">★ @Configuration 자바 설정</text>

  <!-- Footer -->
  <text x="440" y="486" text-anchor="middle" font-size="11" fill="#444">Spring Boot는 내부적으로 AnnotationConfigServletWebServerApplicationContext를 사용합니다</text>
</svg>
