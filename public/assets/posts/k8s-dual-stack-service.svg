<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <!-- Background -->
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Service ipFamilyPolicy 비교</text>

  <!-- Header row -->
  <text x="140" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">정책</text>
  <text x="340" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">IPv4 ClusterIP</text>
  <text x="520" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">IPv6 ClusterIP</text>
  <text x="720" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">용도</text>
  <line x1="40" y1="82" x2="840" y2="82" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Row 1: SingleStack IPv4 -->
  <rect x="40" y="90" width="800" height="56" rx="4" fill="#0f1520"/>
  <text x="140" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">SingleStack</text>
  <text x="140" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">(IPv4)</text>
  <text x="340" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">✓ 할당됨</text>
  <text x="520" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">✗ 없음</text>
  <text x="720" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">IPv4 전용 서비스</text>

  <!-- Row 2: SingleStack IPv6 -->
  <rect x="40" y="150" width="800" height="56" rx="4" fill="#111"/>
  <text x="140" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">SingleStack</text>
  <text x="140" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">(IPv6)</text>
  <text x="340" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">✗ 없음</text>
  <text x="520" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">✓ 할당됨</text>
  <text x="720" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">IPv6 전용 서비스</text>

  <!-- Row 3: PreferDualStack -->
  <rect x="40" y="210" width="800" height="56" rx="4" fill="#0f1520"/>
  <text x="140" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">PreferDualStack</text>
  <text x="340" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">✓ 할당됨</text>
  <text x="520" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">✓ 할당됨 (가능시)</text>
  <text x="720" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">듀얼스택 선호</text>

  <!-- Row 4: RequireDualStack -->
  <rect x="40" y="270" width="800" height="56" rx="4" fill="#111"/>
  <text x="140" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">RequireDualStack</text>
  <text x="340" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">✓ 필수</text>
  <text x="520" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">✓ 필수</text>
  <text x="720" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">듀얼스택 강제 (실패시 오류)</text>

  <!-- Bottom note -->
  <text x="440" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">클러스터가 Single Stack이면 RequireDualStack 서비스 생성 실패</text>
  <text x="440" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">ipFamilies 필드로 우선순위 지정 가능: [IPv4, IPv6] 또는 [IPv6, IPv4]</text>

  <!-- Column separators -->
  <line x1="230" y1="82" x2="230" y2="328" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="430" y1="82" x2="430" y2="328" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="618" y1="82" x2="618" y2="328" stroke="#1a1a1a" stroke-width="1"/>
</svg>
