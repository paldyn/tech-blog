<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Cursor IDE 기능 구조</text>
  <text x="440" y="72" text-anchor="middle" font-size="13" fill="#888">Cursor — AI-Native Code Editor</text>

  <!-- Center: Cursor -->
  <rect x="330" y="160" width="220" height="100" rx="10" fill="#1a1428" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="196" text-anchor="middle" font-size="18" font-weight="700" fill="#7777cc">Cursor</text>
  <text x="440" y="218" text-anchor="middle" font-size="13" fill="#888">VS Code 포크 기반</text>
  <text x="440" y="238" text-anchor="middle" font-size="12" fill="#888">AI-Native IDE</text>

  <defs>
    <marker id="cursarr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Feature boxes around center -->
  <!-- Tab (top left) -->
  <rect x="60" y="96" width="200" height="90" rx="8" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="122" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">Tab 자동완성</text>
  <text x="160" y="144" text-anchor="middle" font-size="12" fill="#888">문맥 인식 multi-line</text>
  <text x="160" y="162" text-anchor="middle" font-size="12" fill="#888">편집 예측·수정 제안</text>

  <line x1="260" y1="141" x2="330" y2="185" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#cursarr)"/>

  <!-- Chat (top right) -->
  <rect x="620" y="96" width="200" height="90" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="720" y="122" text-anchor="middle" font-size="14" font-weight="700" fill="#7ec8e3">Chat 패널</text>
  <text x="720" y="144" text-anchor="middle" font-size="12" fill="#888">@codebase 전체 검색</text>
  <text x="720" y="162" text-anchor="middle" font-size="12" fill="#888">코드 인라인 인용</text>

  <line x1="620" y1="141" x2="550" y2="185" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#cursarr)"/>

  <!-- Composer (bottom left) -->
  <rect x="60" y="290" width="200" height="90" rx="8" fill="#111" stroke="#e05555" stroke-width="1.5"/>
  <text x="160" y="316" text-anchor="middle" font-size="14" font-weight="700" fill="#e05555">Composer</text>
  <text x="160" y="338" text-anchor="middle" font-size="12" fill="#888">멀티파일 동시 생성·수정</text>
  <text x="160" y="356" text-anchor="middle" font-size="12" fill="#888">Agent 모드 자율 실행</text>

  <line x1="260" y1="310" x2="330" y2="260" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#cursarr)"/>

  <!-- Context (bottom right) -->
  <rect x="620" y="290" width="200" height="90" rx="8" fill="#111" stroke="#ce9178" stroke-width="1.5"/>
  <text x="720" y="316" text-anchor="middle" font-size="14" font-weight="700" fill="#ce9178">@ 컨텍스트</text>
  <text x="720" y="338" text-anchor="middle" font-size="12" fill="#888">@file, @folder, @web</text>
  <text x="720" y="356" text-anchor="middle" font-size="12" fill="#888">@docs, @git</text>

  <line x1="620" y1="310" x2="550" y2="260" stroke="#ce9178" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#cursarr)"/>

  <!-- Model selector (bottom center) -->
  <rect x="330" y="290" width="220" height="80" rx="8" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="316" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">모델 선택</text>
  <text x="440" y="336" text-anchor="middle" font-size="12" fill="#888">Claude 4, GPT-4o</text>
  <text x="440" y="354" text-anchor="middle" font-size="12" fill="#888">Gemini, 로컬 모델</text>

  <!-- Rules box -->
  <rect x="60" y="400" width="760" height="40" rx="6" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="440" y="418" text-anchor="middle" font-size="12" font-weight="600" fill="#e8e8e8">.cursorrules / .cursor/rules — 프로젝트별 AI 동작 지침 파일</text>
  <text x="440" y="434" text-anchor="middle" font-size="12" fill="#888">코딩 스타일, 라이브러리 선호, 금지 패턴을 정의하면 모든 기능에 자동 적용</text>
</svg>
