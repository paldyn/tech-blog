<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">this 매개변수</text>

  <!-- Problem -->
  <text x="230" y="78" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">문제: this 컨텍스트 손실</text>

  <rect x="60" y="90" width="340" height="170" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="75" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">class</tspan>
    <tspan fill="#ffffff"> Timer {</tspan>
  </text>
  <text x="75" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">  count = </tspan>
    <tspan fill="#b5cea8">0</tspan>
    <tspan fill="#ffffff">;</tspan>
  </text>
  <text x="75" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">  tick() {</tspan>
  </text>
  <text x="75" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">    // 콜백에서 this 손실!</text>
  <text x="75" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">    setTimeout(</tspan>
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff">() {</tspan>
  </text>
  <text x="75" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#e05555">      this</tspan>
    <tspan fill="#ffffff">.count++;  </tspan>
    <tspan fill="#9aa4b8">// ❌ 오류</tspan>
  </text>
  <text x="75" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">    }, </tspan>
    <tspan fill="#b5cea8">1000</tspan>
    <tspan fill="#ffffff">);</tspan>
  </text>
  <text x="75" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">  }</tspan>
  </text>
  <text x="75" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">}</tspan>
  </text>

  <!-- Solution -->
  <text x="650" y="78" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">해결: this 타입 명시</text>

  <rect x="480" y="90" width="340" height="170" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="495" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">class</tspan>
    <tspan fill="#ffffff"> Timer {</tspan>
  </text>
  <text x="495" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">  count = </tspan>
    <tspan fill="#b5cea8">0</tspan>
    <tspan fill="#ffffff">;</tspan>
  </text>
  <text x="495" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">  tick(</tspan>
    <tspan fill="#7ec8e3" font-weight="600">this</tspan>
    <tspan fill="#ffffff">: Timer) {</tspan>
  </text>
  <text x="495" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">    // 화살표 함수로 this 유지</text>
  <text x="495" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">    setTimeout(() </tspan>
    <tspan fill="#7ec8e3" font-weight="600">=&gt;</tspan>
    <tspan fill="#ffffff"> {</tspan>
  </text>
  <text x="495" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#55c555">      this</tspan>
    <tspan fill="#ffffff">.count++;  </tspan>
    <tspan fill="#9aa4b8">// ✓ OK</tspan>
  </text>
  <text x="495" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">    }, </tspan>
    <tspan fill="#b5cea8">1000</tspan>
    <tspan fill="#ffffff">);</tspan>
  </text>
  <text x="495" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">  }</tspan>
  </text>
  <text x="495" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">
    <tspan fill="#ffffff">}</tspan>
  </text>

  <!-- Middle: arrow + label -->
  <line x1="405" y1="175" x2="475" y2="175" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr2)"/>
  <text x="440" y="167" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#9aa4b8">수정</text>

  <!-- Explanation boxes -->
  <rect x="60" y="282" width="760" height="60" rx="6" fill="#0a1628" stroke="#3178c6" stroke-width="1.5"/>
  <text x="440" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">this 매개변수의 특징</text>
  <text x="440" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">첫 번째 매개변수로 선언 — 컴파일 후 JS에서는 제거됨 (타입 체크 전용)</text>

  <!-- Three rule boxes -->
  <rect x="60" y="362" width="230" height="95" rx="6" fill="#0a1628" stroke="#3178c6" stroke-width="1.5"/>
  <text x="175" y="384" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">this: void</text>
  <text x="175" y="404" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">this 사용 불가</text>
  <text x="175" y="422" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">콜백에서 this 접근</text>
  <text x="175" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">차단 시 유용</text>

  <rect x="325" y="362" width="230" height="95" rx="6" fill="#0a1628" stroke="#3178c6" stroke-width="1.5"/>
  <text x="440" y="384" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">this: ClassName</text>
  <text x="440" y="404" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">특정 클래스 인스턴스</text>
  <text x="440" y="422" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">잘못된 컨텍스트로</text>
  <text x="440" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">호출 시 오류 발생</text>

  <rect x="590" y="362" width="230" height="95" rx="6" fill="#0a1628" stroke="#3178c6" stroke-width="1.5"/>
  <text x="705" y="384" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">화살표 함수</text>
  <text x="705" y="404" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">자체 this 없음</text>
  <text x="705" y="422" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">외부 스코프 this</text>
  <text x="705" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">자동 캡처</text>
</svg>
