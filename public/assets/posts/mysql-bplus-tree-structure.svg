  <text x="725" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">89: row data</text>

  <!-- Lines internal→leaf -->
  <line x1="160" y1="200" x2="115" y2="244" stroke="#55c555" stroke-width="1"/>
  <line x1="200" y1="200" x2="200" y2="244" stroke="#55c555" stroke-width="1"/>
  <line x1="240" y1="200" x2="285" y2="244" stroke="#55c555" stroke-width="1"/>
  <line x1="400" y1="200" x2="390" y2="244" stroke="#55c555" stroke-width="1"/>
  <line x1="440" y1="200" x2="440" y2="244" stroke="#55c555" stroke-width="1"/>
  <line x1="480" y1="200" x2="550" y2="244" stroke="#55c555" stroke-width="1"/>
  <line x1="640" y1="200" x2="660" y2="244" stroke="#55c555" stroke-width="1"/>
  <line x1="680" y1="200" x2="700" y2="244" stroke="#55c555" stroke-width="1"/>
  <line x1="720" y1="200" x2="750" y2="244" stroke="#55c555" stroke-width="1"/>

  <!-- Doubly-linked leaf list -->
  <line x1="190" y1="278" x2="210" y2="278" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-b)"/>
  <line x1="340" y1="278" x2="360" y2="278" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-b)"/>
  <line x1="490" y1="278" x2="510" y2="278" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-b)"/>
  <line x1="640" y1="278" x2="660" y2="278" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-b)"/>

  <text x="440" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">Leaf 노드는 이중 연결 리스트 — 범위 스캔 효율적</text>

  <!-- InnoDB page details -->
  <rect x="60" y="380" width="760" height="104" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">-- InnoDB 페이지 크기 확인 (기본 16KB)</text>
  <text x="76" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">SHOW</text>
  <text x="118" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> VARIABLES </text>
  <text x="226" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">LIKE</text>
  <text x="266" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve"> 'innodb_page_size'</text>
  <text x="76" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">-- → 16384 (16KB)</text>
  <text x="76" y="460" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">-- B-Tree 높이 3~4면 수억 행도 3~4 I/O로 탐색 가능</text>
  <text x="76" y="476" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">-- 루트/상위 내부 노드 → 버퍼 풀 고정 가능</text>
</svg>
