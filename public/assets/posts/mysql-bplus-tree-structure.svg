  <text x="125" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">1: row data</text>
  <text x="125" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">5: row data</text>
  <text x="125" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">9: row data</text>

  <rect x="210" y="244" width="130" height="68" rx="6" fill="#0a1528" stroke="#55c555" stroke-width="1.5"/>
  <text x="275" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#55c555">Leaf</text>
  <text x="275" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">11: row data</text>
  <text x="275" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">15: row data</text>
  <text x="275" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">19: row data</text>

  <rect x="360" y="244" width="130" height="68" rx="6" fill="#0a1528" stroke="#55c555" stroke-width="1.5"/>
  <text x="425" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#55c555">Leaf</text>
  <text x="425" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">31: row data</text>
  <text x="425" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">35: row data</text>
  <text x="425" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">39: row data</text>

  <rect x="510" y="244" width="130" height="68" rx="6" fill="#0a1528" stroke="#55c555" stroke-width="1.5"/>
  <text x="575" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
