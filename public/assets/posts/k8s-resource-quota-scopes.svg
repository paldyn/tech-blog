<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ResourceQuota Scope — 적용 대상 필터링</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">QoS 클래스·Priority 기반 세분화 쿼터</text>

  <!-- Scope boxes -->
  <rect x="60" y="96" width="180" height="80" fill="#0f1923" rx="8" stroke="#7ec8e3" stroke-width="1"/>
  <text x="150" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">BestEffort</text>
  <text x="150" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">requests/limits 없는</text>
  <text x="150" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">BestEffort QoS Pod만</text>
  <text x="150" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">pods 쿼터만 허용</text>

  <rect x="260" y="96" width="180" height="80" fill="#0f1923" rx="8" stroke="#7777cc" stroke-width="1"/>
  <text x="350" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">NotBestEffort</text>
  <text x="350" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Burstable/Guaranteed</text>
  <text x="350" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">QoS Pod에 적용</text>
  <text x="350" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">cpu/memory 쿼터 허용</text>

  <rect x="460" y="96" width="180" height="80" fill="#0f1923" rx="8" stroke="#55c555" stroke-width="1"/>
  <text x="550" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Terminating</text>
  <text x="550" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">activeDeadlineSeconds</text>
  <text x="550" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">설정된 Pod (Job 등)</text>
  <text x="550" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">일시적 워크로드 분리</text>

  <rect x="660" y="96" width="160" height="80" fill="#0f1923" rx="8" stroke="#e8a020" stroke-width="1"/>
  <text x="740" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8a020" text-anchor="middle">PriorityClass</text>
  <text x="740" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">우선순위 클래스별</text>
  <text x="740" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">별도 쿼터 적용</text>
  <text x="740" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">scopeSelector 사용</text>

  <!-- Practical example -->
  <rect x="60" y="196" width="760" height="100" fill="#0f1923" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">실무 활용 예시: PriorityClass 쿼터 분리</text>
  <text x="120" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• critical-apps (우선순위 높음): cpu 8 / memory 16Gi 전용 쿼터 보장</text>
  <text x="120" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• best-effort (우선순위 낮음): pods 20개 제한 — 고우선순위 리소스 침범 방지</text>
  <text x="120" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 두 쿼터가 같은 네임스페이스에 공존 가능, scopeSelector로 분리</text>

  <!-- Code block -->
  <rect x="60" y="314" width="760" height="100" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">spec:</text>
  <text x="80" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#ffffff">  scopeSelector:</text>
  <text x="80" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#ffffff">    matchExpressions:</text>
  <text x="80" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#ffffff">    - operator: In  scopeName: PriorityClass</text>
  <text x="80" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#ce9178">      values: ["critical"]</text>
</svg>
