<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">동기 블로킹 vs asyncio 동시 실행</text>

  <!-- 동기 행 -->
  <text x="60" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e05555">동기 (순차)</text>
  <!-- Task A -->
  <rect x="200" y="96" width="60" height="36" fill="#55c555" rx="4"/>
  <rect x="260" y="96" width="120" height="36" fill="#222222" stroke="#555555" stroke-width="1" rx="4"/>
  <text x="216" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#0a0a0a" font-weight="600">A</text>
  <text x="300" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9aa4b8">I/O 대기</text>
  <!-- Task B -->
  <rect x="380" y="96" width="60" height="36" fill="#55c555" rx="4"/>
  <rect x="440" y="96" width="120" height="36" fill="#222222" stroke="#555555" stroke-width="1" rx="4"/>
  <text x="396" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#0a0a0a" font-weight="600">B</text>
  <text x="480" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9aa4b8">I/O 대기</text>
  <!-- Task C -->
  <rect x="560" y="96" width="60" height="36" fill="#55c555" rx="4"/>
  <rect x="620" y="96" width="120" height="36" fill="#222222" stroke="#555555" stroke-width="1" rx="4"/>
  <text x="576" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#0a0a0a" font-weight="600">C</text>
  <text x="660" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9aa4b8">I/O 대기</text>

  <!-- 비동기 행 -->
  <text x="60" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555">asyncio (동시)</text>
  <rect x="200" y="228" width="60" height="36" fill="#55c555" rx="4"/>
  <text x="216" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#0a0a0a" font-weight="600">A</text>
  <rect x="260" y="228" width="60" height="36" fill="#55c555" rx="4"/>
  <text x="276" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#0a0a0a" font-weight="600">B</text>
  <rect x="320" y="228" width="60" height="36" fill="#55c555" rx="4"/>
  <text x="336" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#0a0a0a" font-weight="600">C</text>
  <rect x="380" y="228" width="120" height="36" fill="#222222" stroke="#555555" stroke-width="1" rx="4"/>
  <text x="400" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9aa4b8">세 작업의 I/O 대기 겹침</text>

  <!-- 시간 축 -->
  <text x="200" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">시간 →</text>
  <text x="640" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">전체 시간이 길다</text>
  <text x="380" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">대기 시간에 다른 작업을 처리 → 전체 시간 단축</text>
</svg>
