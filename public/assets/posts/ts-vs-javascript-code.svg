<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">같은 기능, 다른 언어</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888" text-anchor="middle">사용자 객체를 다루는 코드 비교</text>

  <!-- JS column -->
  <rect x="60" y="96" width="340" height="40" rx="8" fill="#1a1520" stroke="#6a4a9e" stroke-width="1.5"/>
  <text x="230" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">JavaScript</text>

  <rect x="60" y="146" width="340" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// 타입 정보 없음</tspan></text>
  <text x="76" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> createUser(name, age) {</tspan></text>
  <text x="76" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  return { name, age, id: Date.now() };</text>
  <text x="76" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>
  <text x="76" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// 잘못된 호출 — 오류 없음</tspan></text>
  <text x="76" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> u = createUser(30, </tspan><tspan fill="#ce9178">"Alice"</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="76" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// u.neme — 오타지만 undefined만 반환</tspan></text>
  <text x="76" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e05555">console.log(u.neme); // undefined</tspan></text>

  <!-- TS column -->
  <rect x="480" y="96" width="340" height="40" rx="8" fill="#0f1f0f" stroke="#3a8e3a" stroke-width="1.5"/>
  <text x="650" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">TypeScript</text>

  <rect x="480" y="146" width="340" height="200" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// 타입으로 계약 명시</tspan></text>
  <text x="496" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> createUser(name: </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff">,</tspan></text>
  <text x="496" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  age: </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff">) {</tspan></text>
  <text x="496" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  return { name, age, id: Date.now() };</text>
  <text x="496" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>
  <text x="496" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// 잘못된 호출 — 즉시 오류!</tspan></text>
  <text x="496" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e05555">createUser(30, "Alice"); // TS 오류</tspan></text>
  <text x="496" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e05555">u.neme; // Property not exist!</tspan></text>

  <!-- VS divider -->
  <line x1="440" y1="100" x2="440" y2="420" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Bottom result comparison -->
  <rect x="60" y="368" width="340" height="80" rx="8" fill="#2a0808" stroke="#e05555" stroke-width="1"/>
  <text x="230" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">결과: 런타임에서 버그 발견</text>
  <text x="230" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">개발자가 직접 모든 케이스를</text>
  <text x="230" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">테스트해야만 발견 가능</text>

  <rect x="480" y="368" width="340" height="80" rx="8" fill="#0a1f0a" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">결과: 코딩 중 즉시 오류 표시</text>
  <text x="650" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">IDE가 빨간 줄로 오류 위치를</text>
  <text x="650" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">저장 즉시 알려줌</text>
</svg>
