<svg viewBox="0 0 880 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>text { font-family: 'Wanted Sans Variable', 'Wanted Sans', -apple-system, sans-serif; }</style>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="40" fill="#e8e8e8" font-size="18" font-weight="600" text-anchor="middle">배열 메서드 분류</text>
  <line x1="40" y1="54" x2="840" y2="54" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Category 1: 변환 -->
  <rect x="20" y="66" width="256" height="190" fill="#111" rx="8"/>
  <rect x="20" y="66" width="256" height="34" fill="#1a2a1a" rx="8"/>
  <rect x="20" y="88" width="256" height="12" fill="#1a2a1a"/>
  <text x="148" y="88" fill="#86efac" font-size="12" font-weight="600" text-anchor="middle">변환 (새 배열 반환)</text>

  <text x="36" y="118" fill="#e8e8e8" font-size="12" font-family="monospace, 'Courier New'">map(fn)</text>
  <text x="200" y="118" fill="#555" font-size="11" text-anchor="end">각 요소를 변환</text>

  <text x="36" y="140" fill="#e8e8e8" font-size="12" font-family="monospace, 'Courier New'">filter(fn)</text>
  <text x="200" y="140" fill="#555" font-size="11" text-anchor="end">조건 맞는 것만</text>

  <text x="36" y="162" fill="#e8e8e8" font-size="12" font-family="monospace, 'Courier New'">flat(depth)</text>
  <text x="200" y="162" fill="#555" font-size="11" text-anchor="end">중첩 배열 평탄화</text>

  <text x="36" y="184" fill="#e8e8e8" font-size="12" font-family="monospace, 'Courier New'">flatMap(fn)</text>
  <text x="200" y="184" fill="#555" font-size="11" text-anchor="end">map + flat(1)</text>

  <text x="36" y="206" fill="#e8e8e8" font-size="12" font-family="monospace, 'Courier New'">slice(s, e)</text>
  <text x="200" y="206" fill="#555" font-size="11" text-anchor="end">부분 복사</text>

  <text x="36" y="228" fill="#e8e8e8" font-size="12" font-family="monospace, 'Courier New'">concat(...)</text>
  <text x="200" y="228" fill="#555" font-size="11" text-anchor="end">배열 합치기</text>

  <!-- Category 2: 탐색 -->
  <rect x="312" y="66" width="256" height="215" fill="#111" rx="8"/>
  <rect x="312" y="66" width="256" height="34" fill="#1a1a2e" rx="8"/>
  <rect x="312" y="88" width="256" height="12" fill="#1a1a2e"/>
  <text x="440" y="88" fill="#7dd3fc" font-size="12" font-weight="600" text-anchor="middle">탐색 (값 또는 boolean)</text>

  <text x="328" y="118" fill="#e8e8e8" font-size="12" font-family="monospace, 'Courier New'">find(fn)</text>
  <text x="552" y="118" fill="#555" font-size="11" text-anchor="end">첫 매칭 요소</text>

  <text x="328" y="140" fill="#e8e8e8" font-size="12" font-family="monospace, 'Courier New'">findIndex(fn)</text>
  <text x="552" y="140" fill="#555" font-size="11" text-anchor="end">첫 매칭 인덱스</text>

  <text x="328" y="162" fill="#e8e8e8" font-size="12" font-family="monospace, 'Courier New'">findLast(fn)</text>
  <text x="552" y="162" fill="#555" font-size="11" text-anchor="end">끝에서 첫 매칭 ES2023</text>

  <text x="328" y="184" fill="#e8e8e8" font-size="12" font-family="monospace, 'Courier New'">includes(v)</text>
  <text x="552" y="184" fill="#555" font-size="11" text-anchor="end">포함 여부 boolean</text>

  <text x="328" y="206" fill="#e8e8e8" font-size="12" font-family="monospace, 'Courier New'">some(fn)</text>
  <text x="552" y="206" fill="#555" font-size="11" text-anchor="end">하나라도 조건 충족</text>

  <text x="328" y="228" fill="#e8e8e8" font-size="12" font-family="monospace, 'Courier New'">every(fn)</text>
  <text x="552" y="228" fill="#555" font-size="11" text-anchor="end">모두 조건 충족</text>

  <text x="328" y="250" fill="#e8e8e8" font-size="12" font-family="monospace, 'Courier New'">indexOf(v)</text>
  <text x="552" y="250" fill="#555" font-size="11" text-anchor="end">인덱스 (-1 없음)</text>

  <!-- Category 3: 축소 -->
  <rect x="604" y="66" width="256" height="168" fill="#111" rx="8"/>
  <rect x="604" y="66" width="256" height="34" fill="#2a1a10" rx="8"/>
  <rect x="604" y="88" width="256" height="12" fill="#2a1a10"/>
  <text x="732" y="88" fill="#fbbf24" font-size="12" font-weight="600" text-anchor="middle">축소 (단일 값 반환)</text>

  <text x="620" y="118" fill="#e8e8e8" font-size="12" font-family="monospace, 'Courier New'">reduce(fn, init)</text>
  <text x="844" y="118" fill="#555" font-size="11" text-anchor="end">누산 → 단일 값</text>

  <text x="620" y="140" fill="#e8e8e8" font-size="12" font-family="monospace, 'Courier New'">reduceRight(fn)</text>
  <text x="844" y="140" fill="#555" font-size="11" text-anchor="end">오른쪽에서 누산</text>

  <text x="620" y="162" fill="#e8e8e8" font-size="12" font-family="monospace, 'Courier New'">join(sep)</text>
  <text x="844" y="162" fill="#555" font-size="11" text-anchor="end">문자열로 결합</text>

  <text x="620" y="184" fill="#e8e8e8" font-size="12" font-family="monospace, 'Courier New'">at(-1)</text>
  <text x="844" y="184" fill="#555" font-size="11" text-anchor="end">음수 인덱스 접근 ES2022</text>

  <text x="620" y="206" fill="#e8e8e8" font-size="12" font-family="monospace, 'Courier New'">length</text>
  <text x="844" y="206" fill="#555" font-size="11" text-anchor="end">배열 길이 프로퍼티</text>

  <!-- Category 4: 불변 (ES2023) -->
  <rect x="20" y="274" width="415" height="185" fill="#111" rx="8"/>
  <rect x="20" y="274" width="415" height="34" fill="#1a0a2e" rx="8"/>
  <rect x="20" y="296" width="415" height="12" fill="#1a0a2e"/>
  <text x="227" y="296" fill="#c4b5fd" font-size="12" font-weight="600" text-anchor="middle">불변 메서드 — ES2023 (원본 보존)</text>

  <text x="36" y="326" fill="#e8e8e8" font-size="12" font-family="monospace, 'Courier New'">toSorted(fn)</text>
  <text x="420" y="326" fill="#555" font-size="11" text-anchor="end">sort() 원본 보존 버전</text>

  <text x="36" y="348" fill="#e8e8e8" font-size="12" font-family="monospace, 'Courier New'">toReversed()</text>
  <text x="420" y="348" fill="#555" font-size="11" text-anchor="end">reverse() 원본 보존 버전</text>

  <text x="36" y="370" fill="#e8e8e8" font-size="12" font-family="monospace, 'Courier New'">toSpliced(s, n, ...)</text>
  <text x="420" y="370" fill="#555" font-size="11" text-anchor="end">splice() 원본 보존 버전</text>

  <text x="36" y="392" fill="#e8e8e8" font-size="12" font-family="monospace, 'Courier New'">with(index, value)</text>
  <text x="420" y="392" fill="#555" font-size="11" text-anchor="end">특정 인덱스만 교체</text>

  <text x="36" y="422" fill="#444" font-size="10">원본을 변경하는 sort/reverse/splice와 달리 새 배열을 반환 — React 상태 관리에 적합</text>

  <!-- Category 5: 생성 -->
  <rect x="451" y="274" width="409" height="185" fill="#111" rx="8"/>
  <rect x="451" y="274" width="409" height="34" fill="#0d1f1a" rx="8"/>
  <rect x="451" y="296" width="409" height="12" fill="#0d1f1a"/>
  <text x="655" y="296" fill="#34d399" font-size="12" font-weight="600" text-anchor="middle">생성</text>

  <text x="467" y="326" fill="#e8e8e8" font-size="12" font-family="monospace, 'Courier New'">Array.from(iter, fn)</text>
  <text x="844" y="326" fill="#555" font-size="11" text-anchor="end">이터러블 → 배열</text>

  <text x="467" y="348" fill="#e8e8e8" font-size="12" font-family="monospace, 'Courier New'">Array.of(1, 2, 3)</text>
  <text x="844" y="348" fill="#555" font-size="11" text-anchor="end">인자를 배열로</text>

  <text x="467" y="370" fill="#e8e8e8" font-size="12" font-family="monospace, 'Courier New'">Array(n).fill(v)</text>
  <text x="844" y="370" fill="#555" font-size="11" text-anchor="end">n개 v로 채운 배열</text>

  <text x="467" y="392" fill="#e8e8e8" font-size="12" font-family="monospace, 'Courier New'">[...new Set(arr)]</text>
  <text x="844" y="392" fill="#555" font-size="11" text-anchor="end">중복 제거</text>

  <text x="467" y="422" fill="#444" font-size="10">Array.from({ length: 5 }, (_, i) =&gt; i)  →  [0, 1, 2, 3, 4]</text>
</svg>
