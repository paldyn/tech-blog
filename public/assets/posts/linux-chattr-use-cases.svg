<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="360" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">chattr / lsattr 실전 사용법</text>
  <text x="440" y="68" text-anchor="middle" font-size="14" fill="#888">보안 설정 · 로그 보호 · 설정 파일 잠금</text>

  <!-- Left: chattr commands -->
  <text x="60" y="98" font-size="14" font-weight="600" fill="#7ec8e3">속성 설정 / 해제</text>
  <rect x="60" y="106" width="390" height="210" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="76" y="126" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># 불변 속성 설정 (root만 가능)</text>
  <text x="76" y="144" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">chattr </text>
  <text x="116" y="144" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">+i /etc/resolv.conf</text>
  <line x1="76" y1="156" x2="434" y2="156" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="174" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># 로그 파일 추가 전용</text>
  <text x="76" y="192" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">chattr </text>
  <text x="116" y="192" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">+a /var/log/app.log</text>
  <line x1="76" y1="204" x2="434" y2="204" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="222" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># 속성 해제</text>
  <text x="76" y="240" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">chattr </text>
  <text x="116" y="240" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">-i /etc/resolv.conf</text>
  <line x1="76" y1="252" x2="434" y2="252" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="270" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># 재귀 설정</text>
  <text x="76" y="288" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">chattr </text>
  <text x="116" y="288" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">-R +i /etc/ssh/</text>

  <!-- Right: lsattr output -->
  <text x="470" y="98" font-size="14" font-weight="600" fill="#55c555">lsattr — 속성 확인</text>
  <rect x="470" y="106" width="360" height="210" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="486" y="126" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># 파일 속성 확인</text>
  <text x="486" y="144" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555" xml:space="preserve">lsattr </text>
  <text x="526" y="144" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">/etc/resolv.conf</text>
  <text x="486" y="162" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e05555" xml:space="preserve">----i---------e-- /etc/resolv.conf</text>
  <line x1="486" y1="174" x2="814" y2="174" stroke="#3a4a6e" stroke-width="1"/>

  <text x="486" y="192" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># 재귀 확인</text>
  <text x="486" y="210" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555" xml:space="preserve">lsattr </text>
  <text x="526" y="210" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">-R /etc/ssh/</text>
  <line x1="486" y1="222" x2="814" y2="222" stroke="#3a4a6e" stroke-width="1"/>

  <text x="486" y="240" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># 속성 없는 파일 출력 예</text>
  <text x="486" y="258" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">--------------e-- /etc/hosts</text>
  <line x1="486" y1="270" x2="814" y2="270" stroke="#3a4a6e" stroke-width="1"/>

  <text x="486" y="290" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># e = extent format (ext4 기본)</text>
  <text x="486" y="308" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># i = immutable, a = append-only</text>

  <!-- Footer -->
  <rect x="60" y="330" width="760" height="20" rx="4" fill="none"/>
  <text x="440" y="346" text-anchor="middle" font-size="12" fill="#555">chattr는 root 권한 필요 · 속성은 cp나 mv로 복사되지 않음 · tar --preserve-permissions로 보존</text>
</svg>
