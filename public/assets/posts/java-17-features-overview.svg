<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Java 17 LTS 핵심 기능 (2021.09)</text>

  <!-- Sealed Classes -->
  <rect x="60" y="62" width="360" height="90" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="86" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">Sealed Classes (JEP 409) — 표준화</text>
  <text x="240" y="106" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">sealed / permits / non-sealed</text>
  <text x="240" y="124" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">상속 계층을 명시적으로 봉인 — Pattern Matching의 완전성 검사 가능</text>
  <text x="240" y="142" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">15·16 Preview → 17 Standard</text>

  <!-- Pattern Matching switch Preview -->
  <rect x="460" y="62" width="360" height="90" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="86" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">Pattern Matching Switch (JEP 406) Preview</text>
  <text x="640" y="106" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">switch에서 타입 패턴 사용</text>
  <text x="640" y="124" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Guarded Pattern: case String s when s.length() > 5</text>
  <text x="640" y="142" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">17 Preview → 21 Standard</text>

  <!-- Strong Encapsulation -->
  <rect x="60" y="168" width="360" height="80" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="192" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">Strong Encapsulation (JEP 403)</text>
  <text x="240" y="212" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">--illegal-access 플래그 완전 제거</text>
  <text x="240" y="230" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">내부 JDK API 리플렉션 접근 기본 차단</text>

  <!-- RandomGenerator -->
  <rect x="460" y="168" width="360" height="80" rx="8" fill="#0a1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="640" y="192" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">RandomGenerator API (JEP 356)</text>
  <text x="640" y="212" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">새 인터페이스 계층구조 — 알고리즘 선택 가능</text>
  <text x="640" y="230" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">L32X64MixRandom, Xoroshiro128PlusPlus 등</text>

  <!-- Context-specific Deserialization -->
  <rect x="60" y="264" width="360" height="80" rx="8" fill="#1a1a0a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="240" y="288" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178">Context-Specific Deserial. Filters</text>
  <text x="240" y="308" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">JVM 전역 역직렬화 필터 설정 (보안 강화)</text>
  <text x="240" y="326" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">ObjectInputFilter.Config 활용</text>

  <!-- macOS / AArch64 -->
  <rect x="460" y="264" width="360" height="80" rx="8" fill="#1a1a0a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="640" y="288" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178">macOS / AArch64 포팅</text>
  <text x="640" y="308" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Apple Silicon (M1/M2) 네이티브 지원</text>
  <text x="640" y="326" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">macOS Rendering Pipeline (JEP 382)</text>

  <!-- Removed/Deprecated -->
  <rect x="60" y="360" width="760" height="90" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="384" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">제거된 항목 (마이그레이션 시 주의)</text>
  <text x="440" y="404" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">RMI Activation System 제거 (JEP 407)</text>
  <text x="440" y="422" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Applet API Deprecated for Removal (JEP 398) · Security Manager Deprecated (JEP 411)</text>
  <text x="440" y="440" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">sun.misc.Unsafe 일부 메서드 접근 제한 강화</text>
</svg>
