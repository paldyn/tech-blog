<svg xmlns="http://www.w3.org/2000/svg" width="880" height="330" viewBox="0 0 880 330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="330" rx="12" fill="#0a0a0a"/>
  <text x="40" y="48" font-size="22" font-weight="700" fill="#e8e8e8">문자열 중복 제거 — 내부 배열 공유</text>

  <defs>
    <marker id="sd-arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- before -->
  <text x="40" y="84" font-size="14" font-weight="600" fill="#e05555">중복 제거 전</text>
  <rect x="40" y="100" width="150" height="44" rx="6" fill="#101010" stroke="#7777cc" stroke-width="1"/>
  <text x="115" y="128" font-size="13" fill="#e8e8e8" text-anchor="middle">String "KR"</text>
  <rect x="40" y="158" width="150" height="44" rx="6" fill="#101010" stroke="#7777cc" stroke-width="1"/>
  <text x="115" y="186" font-size="13" fill="#e8e8e8" text-anchor="middle">String "KR"</text>
  <rect x="40" y="216" width="150" height="44" rx="6" fill="#101010" stroke="#7777cc" stroke-width="1"/>
  <text x="115" y="244" font-size="13" fill="#e8e8e8" text-anchor="middle">String "KR"</text>

  <rect x="250" y="100" width="120" height="44" rx="6" fill="#101010" stroke="#e05555" stroke-width="1"/>
  <text x="310" y="128" font-size="13" fill="#9aa4b8" text-anchor="middle">byte[] 'K','R'</text>
  <rect x="250" y="158" width="120" height="44" rx="6" fill="#101010" stroke="#e05555" stroke-width="1"/>
  <text x="310" y="186" font-size="13" fill="#9aa4b8" text-anchor="middle">byte[] 'K','R'</text>
  <rect x="250" y="216" width="120" height="44" rx="6" fill="#101010" stroke="#e05555" stroke-width="1"/>
  <text x="310" y="244" font-size="13" fill="#9aa4b8" text-anchor="middle">byte[] 'K','R'</text>

  <line x1="190" y1="122" x2="248" y2="122" stroke="#7777cc" stroke-width="2"/>
  <line x1="190" y1="180" x2="248" y2="180" stroke="#7777cc" stroke-width="2"/>
  <line x1="190" y1="238" x2="248" y2="238" stroke="#7777cc" stroke-width="2"/>
  <text x="115" y="290" font-size="13" fill="#9aa4b8" text-anchor="middle">같은 내용인데 배열이 3개</text>

  <!-- after -->
  <text x="510" y="84" font-size="14" font-weight="600" fill="#55c555">중복 제거 후</text>
  <rect x="510" y="100" width="150" height="44" rx="6" fill="#101010" stroke="#7777cc" stroke-width="1"/>
  <text x="585" y="128" font-size="13" fill="#e8e8e8" text-anchor="middle">String "KR"</text>
  <rect x="510" y="158" width="150" height="44" rx="6" fill="#101010" stroke="#7777cc" stroke-width="1"/>
  <text x="585" y="186" font-size="13" fill="#e8e8e8" text-anchor="middle">String "KR"</text>
  <rect x="510" y="216" width="150" height="44" rx="6" fill="#101010" stroke="#7777cc" stroke-width="1"/>
  <text x="585" y="244" font-size="13" fill="#e8e8e8" text-anchor="middle">String "KR"</text>

  <rect x="710" y="158" width="120" height="44" rx="6" fill="#101010" stroke="#55c555" stroke-width="1"/>
  <text x="770" y="186" font-size="13" fill="#9aa4b8" text-anchor="middle">byte[] 'K','R'</text>

  <line x1="660" y1="122" x2="708" y2="176" stroke="#55c555" stroke-width="2" marker-end="url(#sd-arr)"/>
  <line x1="660" y1="180" x2="708" y2="180" stroke="#55c555" stroke-width="2" marker-end="url(#sd-arr)"/>
  <line x1="660" y1="238" x2="708" y2="184" stroke="#55c555" stroke-width="2" marker-end="url(#sd-arr)"/>
  <text x="650" y="290" font-size="13" fill="#9aa4b8" text-anchor="middle">String 객체는 그대로, 배열만 1개로 공유</text>
</svg>
