<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arrA" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="50" y="52" font-size="22" font-weight="700" fill="#e8e8e8">kubectl 진단 4종 세트</text>
  <text x="50" y="80" font-size="14" fill="#888">범위를 위에서 아래로 좁히는 디버깅 파이프라인</text>

  <rect x="50" y="120" width="165" height="80" rx="8" fill="#16181d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="66" y="148" font-size="14" font-weight="600" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace">get</text>
  <text x="66" y="170" font-size="12" fill="#ffffff">전체 목록·상태</text>
  <text x="66" y="189" font-size="12" fill="#9aa4b8">범위를 좁힌다</text>

  <rect x="255" y="120" width="165" height="80" rx="8" fill="#16181d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="271" y="148" font-size="14" font-weight="600" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace">describe</text>
  <text x="271" y="170" font-size="12" fill="#ffffff">Events·조건 표시</text>
  <text x="271" y="189" font-size="12" fill="#9aa4b8">왜 그런지 단서</text>

  <rect x="460" y="120" width="165" height="80" rx="8" fill="#16181d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="476" y="148" font-size="14" font-weight="600" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace">logs</text>
  <text x="476" y="170" font-size="12" fill="#ffffff">앱 표준출력</text>
  <text x="476" y="189" font-size="12" fill="#9aa4b8">런타임 에러</text>

  <rect x="665" y="120" width="165" height="80" rx="8" fill="#16181d" stroke="#55c555" stroke-width="1.5"/>
  <text x="681" y="148" font-size="14" font-weight="600" fill="#55c555" font-family="'JetBrains Mono','Menlo','Consolas',monospace">exec / debug</text>
  <text x="681" y="170" font-size="12" fill="#ffffff">컨테이너 진입</text>
  <text x="681" y="189" font-size="12" fill="#9aa4b8">직접 확인</text>

  <line x1="215" y1="160" x2="253" y2="160" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrA)"/>
  <line x1="420" y1="160" x2="458" y2="160" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrA)"/>
  <line x1="625" y1="160" x2="663" y2="160" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrA)"/>

  <text x="50" y="250" font-size="13" fill="#888">각 단계는 다음 단계의 대상을 좁혀준다 — 추측이 아니라 증거로 한 칸씩 내려간다.</text>
  <text x="50" y="276" font-size="13" fill="#888">describe의 Events가 가장 빠른 단서이고, exec는 마지막 수단으로 컨테이너 내부를 직접 본다.</text>
</svg>
