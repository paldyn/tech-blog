<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">리스트 기초 — 생성·접근·수정·슬라이싱</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">Python list: 가변 · 순서 있음 · 중복 허용</text>

  <!-- Memory layout -->
  <rect x="60" y="100" width="760" height="90" rx="10" fill="#111520" stroke="#3a4a6e"/>
  <text x="440" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">리스트 메모리 레이아웃 — lst = [10, 20, 30, 40, 50]</text>

  <!-- cells -->
  <rect x="100" y="136" width="100" height="40" rx="4" fill="#000000" stroke="#7ec8e3"/>
  <text x="150" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#b5cea8" text-anchor="middle">10</text>
  <rect x="214" y="136" width="100" height="40" rx="4" fill="#000000" stroke="#7ec8e3"/>
  <text x="264" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#b5cea8" text-anchor="middle">20</text>
  <rect x="328" y="136" width="100" height="40" rx="4" fill="#000000" stroke="#7ec8e3"/>
  <text x="378" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#b5cea8" text-anchor="middle">30</text>
  <rect x="442" y="136" width="100" height="40" rx="4" fill="#000000" stroke="#7ec8e3"/>
  <text x="492" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#b5cea8" text-anchor="middle">40</text>
  <rect x="556" y="136" width="100" height="40" rx="4" fill="#000000" stroke="#7ec8e3"/>
  <text x="606" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#b5cea8" text-anchor="middle">50</text>

  <!-- index labels -->
  <text x="150" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">[0]</text>
  <text x="264" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">[1]</text>
  <text x="378" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">[2]</text>
  <text x="492" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">[3]</text>
  <text x="606" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">[4]</text>

  <!-- negative index labels -->
  <text x="150" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc" text-anchor="middle">[-5]</text>
  <text x="264" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc" text-anchor="middle">[-4]</text>
  <text x="378" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc" text-anchor="middle">[-3]</text>
  <text x="492" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc" text-anchor="middle">[-2]</text>
  <text x="606" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc" text-anchor="middle">[-1]</text>

  <!-- Code left: creation &amp; access -->
  <rect x="60" y="220" width="380" height="240" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8"># 생성</tspan></text>
  <text x="76" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">lst = [</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff">]</tspan></text>
  <text x="76" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">empty = []</tspan></text>
  <text x="76" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">mixed = [</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"hi"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#7ec8e3">True</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#7ec8e3">None</tspan><tspan fill="#ffffff">]</tspan></text>
  <text x="76" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8"># 접근</tspan></text>
  <text x="76" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">lst[</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">]    </tspan><tspan fill="#9aa4b8"># 1</tspan></text>
  <text x="76" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">lst[-</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">]   </tspan><tspan fill="#9aa4b8"># 3 (마지막)</tspan></text>
  <text x="76" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8"># 슬라이싱 [start:stop:step]</tspan></text>
  <text x="76" y="386" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">lst[</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">:</tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff">]   </tspan><tspan fill="#9aa4b8"># [2, 3]</tspan></text>
  <text x="76" y="404" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">lst[::]     </tspan><tspan fill="#9aa4b8"># 복사본</tspan></text>
  <text x="76" y="422" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">lst[::-</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">]  </tspan><tspan fill="#9aa4b8"># 역순 [3,2,1]</tspan></text>
  <text x="76" y="440" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">lst[::</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">]   </tspan><tspan fill="#9aa4b8"># [1, 3]</tspan></text>

  <!-- Code right: mutation -->
  <rect x="460" y="220" width="360" height="240" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="476" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8"># 추가·삽입</tspan></text>
  <text x="476" y="260" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">lst.</tspan><tspan fill="#7ec8e3">append</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#b5cea8">4</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="476" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">lst.</tspan><tspan fill="#7ec8e3">insert</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">99</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="476" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">lst.</tspan><tspan fill="#7ec8e3">extend</tspan><tspan fill="#ffffff">([</tspan><tspan fill="#b5cea8">5</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">6</tspan><tspan fill="#ffffff">])</tspan></text>
  <text x="476" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8"># 삭제</tspan></text>
  <text x="476" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">lst.</tspan><tspan fill="#7ec8e3">remove</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#b5cea8">99</tspan><tspan fill="#ffffff">)  </tspan><tspan fill="#9aa4b8"># 값으로 삭제</tspan></text>
  <text x="476" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">lst.</tspan><tspan fill="#7ec8e3">pop</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">)    </tspan><tspan fill="#9aa4b8"># 인덱스로 삭제</tspan></text>
  <text x="476" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">del</tspan><tspan fill="#ffffff"> lst[</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">]</tspan></text>
  <text x="476" y="386" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8"># 검색</tspan></text>
  <text x="476" y="404" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3">in</tspan><tspan fill="#ffffff"> lst     </tspan><tspan fill="#9aa4b8"># True/False</tspan></text>
  <text x="476" y="422" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">lst.</tspan><tspan fill="#7ec8e3">index</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff">)  </tspan><tspan fill="#9aa4b8"># 위치 반환</tspan></text>
  <text x="476" y="440" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">lst.</tspan><tspan fill="#7ec8e3">count</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff">)  </tspan><tspan fill="#9aa4b8"># 개수</tspan></text>
</svg>
