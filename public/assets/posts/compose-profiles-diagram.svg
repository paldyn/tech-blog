<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">compose profiles — 환경별 서비스 선택</text>

  <!-- Header row labels -->
  <text x="160" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">서비스</text>
  <text x="310" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">profiles</text>
  <text x="490" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">default up</text>
  <text x="630" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">--profile dev</text>
  <text x="770" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e0a055" text-anchor="middle">--profile debug</text>

  <!-- web row -->
  <rect x="60" y="96" width="200" height="44" fill="#1a1a2e" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="160" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">web</text>
  <text x="280" y="123" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">(없음)</text>
  <text x="490" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" fill="#55c555" text-anchor="middle">✓</text>
  <text x="630" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" fill="#55c555" text-anchor="middle">✓</text>
  <text x="770" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" fill="#55c555" text-anchor="middle">✓</text>

  <!-- db row -->
  <rect x="60" y="152" width="200" height="44" fill="#1a1a2e" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="160" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">db</text>
  <text x="280" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">(없음)</text>
  <text x="490" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" fill="#55c555" text-anchor="middle">✓</text>
  <text x="630" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" fill="#55c555" text-anchor="middle">✓</text>
  <text x="770" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" fill="#55c555" text-anchor="middle">✓</text>

  <!-- phpmyadmin row -->
  <rect x="60" y="208" width="200" height="44" fill="#1a1400" rx="6" stroke="#e0a055" stroke-width="1"/>
  <text x="160" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e0a055" text-anchor="middle">phpmyadmin</text>
  <text x="280" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e0a055" text-anchor="middle">dev</text>
  <text x="490" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" fill="#e05555" text-anchor="middle">✗</text>
  <text x="630" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" fill="#55c555" text-anchor="middle">✓</text>
  <text x="770" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" fill="#e05555" text-anchor="middle">✗</text>

  <!-- debugger row -->
  <rect x="60" y="264" width="200" height="44" fill="#150a1a" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="160" y="291" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">debugger</text>
  <text x="280" y="291" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">debug</text>
  <text x="490" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" fill="#e05555" text-anchor="middle">✗</text>
  <text x="630" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" fill="#e05555" text-anchor="middle">✗</text>
  <text x="770" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" fill="#55c555" text-anchor="middle">✓</text>

  <!-- seeder row -->
  <rect x="60" y="320" width="200" height="44" fill="#0a1a0a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="160" y="347" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">seeder</text>
  <text x="280" y="347" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">dev, test</text>
  <text x="490" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" fill="#e05555" text-anchor="middle">✗</text>
  <text x="630" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" fill="#55c555" text-anchor="middle">✓</text>
  <text x="770" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" fill="#e05555" text-anchor="middle">✗</text>

  <!-- Divider -->
  <line x1="60" y1="380" x2="820" y2="380" stroke="#2a2a3a" stroke-width="1"/>

  <!-- Legend -->
  <text x="60" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">실행 방법</text>
  <text x="60" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">compose up                        → profiles 없는 서비스만 실행</text>
  <text x="60" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">compose --profile dev up          → 기본 + dev 프로필 서비스 실행</text>
  <text x="60" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">COMPOSE_PROFILES=dev compose up  → 환경변수로도 지정 가능</text>
</svg>
