<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 600" width="880" height="600">
  <defs>
    <style>
      text { font-family: 'Wanted Sans Variable', 'Wanted Sans', -apple-system, sans-serif; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5ab4f5"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5af5a0"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f55af5"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="600" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle" fill="#e8e8e8" font-size="19" font-weight="700">어떤 방법을 선택해야 할까?</text>
  <text x="440" y="60" text-anchor="middle" fill="#555" font-size="12">의사결정 흐름도</text>

  <!-- START node -->
  <rect x="340" y="78" width="200" height="44" rx="22" fill="#1e1e1e" stroke="#555" stroke-width="1.5"/>
  <text x="440" y="105" text-anchor="middle" fill="#e8e8e8" font-size="13" font-weight="600">LLM에 적응 작업 필요</text>

  <!-- Arrow down -->
  <line x1="440" y1="122" x2="440" y2="152" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Q1: 데이터 접근 필요? -->
  <polygon points="440,152 580,192 440,232 300,192" fill="#151520" stroke="#3a6aa0" stroke-width="1.5"/>
  <text x="440" y="186" text-anchor="middle" fill="#9ac8f0" font-size="12" font-weight="600">외부·최신 데이터를</text>
  <text x="440" y="202" text-anchor="middle" fill="#9ac8f0" font-size="12" font-weight="600">실시간으로 참조해야 하나?</text>

  <!-- Yes → RAG -->
  <line x1="580" y1="192" x2="680" y2="192" stroke="#5af5a0" stroke-width="1.5" marker-end="url(#arrowGreen)"/>
  <text x="628" y="184" text-anchor="middle" fill="#5af5a0" font-size="11">예</text>

  <rect x="682" y="168" width="170" height="48" rx="8" fill="#0d2018" stroke="#2a7a50" stroke-width="1.5"/>
  <text x="767" y="189" text-anchor="middle" fill="#5af5a0" font-size="13" font-weight="700">RAG</text>
  <text x="767" y="207" text-anchor="middle" fill="#5af5a0" font-size="10">검색 + 생성 파이프라인</text>

  <!-- No → arrow down -->
  <line x1="440" y1="232" x2="440" y2="270" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="452" y="255" fill="#888" font-size="11">아니오</text>

  <!-- Q2: 행동 패턴 변경? -->
  <polygon points="440,270 580,310 440,350 300,310" fill="#151520" stroke="#3a6aa0" stroke-width="1.5"/>
  <text x="440" y="304" text-anchor="middle" fill="#9ac8f0" font-size="12" font-weight="600">모델의 말투·형식·행동</text>
  <text x="440" y="320" text-anchor="middle" fill="#9ac8f0" font-size="12" font-weight="600">패턴을 근본적으로 바꿔야 하나?</text>

  <!-- Yes → 파인튜닝 고려 -->
  <line x1="580" y1="310" x2="680" y2="310" stroke="#f55af5" stroke-width="1.5" marker-end="url(#arrowPurple)"/>
  <text x="628" y="302" text-anchor="middle" fill="#f55af5" font-size="11">예</text>

  <rect x="682" y="285" width="170" height="48" rx="8" fill="#1a0d1a" stroke="#7a2a7a" stroke-width="1.5"/>
  <text x="767" y="306" text-anchor="middle" fill="#f55af5" font-size="13" font-weight="700">파인튜닝 고려</text>
  <text x="767" y="323" text-anchor="middle" fill="#f55af5" font-size="10">충분한 데이터·비용 필요</text>

  <!-- No → arrow down -->
  <line x1="440" y1="350" x2="440" y2="388" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="452" y="373" fill="#888" font-size="11">아니오</text>

  <!-- Q3: 간단한 조정? -->
  <polygon points="440,388 580,428 440,468 300,428" fill="#151520" stroke="#3a6aa0" stroke-width="1.5"/>
  <text x="440" y="422" text-anchor="middle" fill="#9ac8f0" font-size="12" font-weight="600">형식·지시·예시 조정으로</text>
  <text x="440" y="438" text-anchor="middle" fill="#9ac8f0" font-size="12" font-weight="600">충분히 해결되나?</text>

  <!-- Yes → PE -->
  <line x1="300" y1="428" x2="200" y2="428" stroke="#5ab4f5" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="252" y="420" text-anchor="middle" fill="#5ab4f5" font-size="11">예</text>

  <rect x="28" y="404" width="170" height="48" rx="8" fill="#0d2035" stroke="#2a6aa0" stroke-width="1.5"/>
  <text x="113" y="425" text-anchor="middle" fill="#5ab4f5" font-size="13" font-weight="700">프롬프트 엔지니어링</text>
  <text x="113" y="442" text-anchor="middle" fill="#5ab4f5" font-size="10">가장 빠르고 저렴한 방법</text>

  <!-- No → Combination -->
  <line x1="440" y1="468" x2="440" y2="506" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="452" y="492" fill="#888" font-size="11">아니오</text>

  <!-- Combination node -->
  <rect x="290" y="508" width="300" height="52" rx="10" fill="#1a1a1a" stroke="#888" stroke-width="1.5"/>
  <text x="440" y="530" text-anchor="middle" fill="#e8e8e8" font-size="13" font-weight="700">복합 접근</text>
  <text x="440" y="548" text-anchor="middle" fill="#aaa" font-size="11">PE + RAG + 파인튜닝 조합</text>

  <!-- Connecting line from RAG box back to Q2 hint (optional decoration) -->
  <!-- Side note for combination -->
  <text x="440" y="585" text-anchor="middle" fill="#444" font-size="10">예: 파인튜닝으로 스타일 학습 후 RAG로 지식 보완</text>
</svg>
