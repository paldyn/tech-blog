<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="50" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Java 기본형(Primitive Types) 8종</text>

  <!-- Table header background -->
  <rect x="60" y="66" width="760" height="36" rx="6" fill="#131b2e"/>

  <!-- Header labels -->
  <text x="100" y="89" font-size="13" font-weight="600" fill="#7ec8e3">타입</text>
  <text x="200" y="89" font-size="13" font-weight="600" fill="#7ec8e3">크기</text>
  <text x="290" y="89" font-size="13" font-weight="600" fill="#7ec8e3">값의 범위</text>
  <text x="630" y="89" font-size="13" font-weight="600" fill="#7ec8e3">기본값</text>
  <text x="740" y="89" font-size="13" font-weight="600" fill="#7ec8e3">분류</text>

  <!-- Column separator lines -->
  <line x1="180" y1="66" x2="180" y2="462" stroke="#1e2433" stroke-width="1"/>
  <line x1="270" y1="66" x2="270" y2="462" stroke="#1e2433" stroke-width="1"/>
  <line x1="610" y1="66" x2="610" y2="462" stroke="#1e2433" stroke-width="1"/>
  <line x1="720" y1="66" x2="720" y2="462" stroke="#1e2433" stroke-width="1"/>

  <!-- Row 1: byte -->
  <rect x="60" y="102" width="760" height="40" fill="#0d1929"/>
  <rect x="60" y="102" width="4" height="40" fill="#7ec8e3"/>
  <text x="76" y="127" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">byte</text>
  <text x="200" y="127" font-size="13" fill="#c8c8c8">8 bit</text>
  <text x="290" y="127" font-size="13" fill="#c8c8c8">-128 ~ 127</text>
  <text x="630" y="127" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">0</text>
  <text x="740" y="127" font-size="12" fill="#888">정수형</text>

  <!-- Row 2: short -->
  <rect x="60" y="142" width="760" height="40" fill="#0a0a0a"/>
  <rect x="60" y="142" width="4" height="40" fill="#7ec8e3"/>
  <text x="76" y="167" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">short</text>
  <text x="200" y="167" font-size="13" fill="#c8c8c8">16 bit</text>
  <text x="290" y="167" font-size="13" fill="#c8c8c8">-32,768 ~ 32,767</text>
  <text x="630" y="167" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">0</text>
  <text x="740" y="167" font-size="12" fill="#888">정수형</text>

  <!-- Row 3: int -->
  <rect x="60" y="182" width="760" height="40" fill="#0d1929"/>
  <rect x="60" y="182" width="4" height="40" fill="#55c555"/>
  <text x="76" y="207" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">int</text>
  <text x="200" y="207" font-size="13" fill="#c8c8c8">32 bit</text>
  <text x="290" y="207" font-size="13" fill="#c8c8c8">-2,147,483,648 ~ 2,147,483,647</text>
  <text x="630" y="207" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">0</text>
  <text x="740" y="207" font-size="12" fill="#888">정수형</text>

  <!-- Row 4: long -->
  <rect x="60" y="222" width="760" height="40" fill="#0a0a0a"/>
  <rect x="60" y="222" width="4" height="40" fill="#55c555"/>
  <text x="76" y="247" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">long</text>
  <text x="200" y="247" font-size="13" fill="#c8c8c8">64 bit</text>
  <text x="290" y="247" font-size="13" fill="#c8c8c8">-2^63 ~ 2^63-1  (약 9.2 x 10^18)</text>
  <text x="630" y="247" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">0L</text>
  <text x="740" y="247" font-size="12" fill="#888">정수형</text>

  <!-- Row 5: float -->
  <rect x="60" y="262" width="760" height="40" fill="#0d1929"/>
  <rect x="60" y="262" width="4" height="40" fill="#e05555"/>
  <text x="76" y="287" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">float</text>
  <text x="200" y="287" font-size="13" fill="#c8c8c8">32 bit</text>
  <text x="290" y="287" font-size="13" fill="#c8c8c8">IEEE 754 단정밀도, 유효 자리 약 7</text>
  <text x="630" y="287" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">0.0f</text>
  <text x="740" y="287" font-size="12" fill="#888">실수형</text>

  <!-- Row 6: double -->
  <rect x="60" y="302" width="760" height="40" fill="#0a0a0a"/>
  <rect x="60" y="302" width="4" height="40" fill="#e05555"/>
  <text x="76" y="327" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">double</text>
  <text x="200" y="327" font-size="13" fill="#c8c8c8">64 bit</text>
  <text x="290" y="327" font-size="13" fill="#c8c8c8">IEEE 754 배정밀도, 유효 자리 약 15</text>
  <text x="630" y="327" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">0.0d</text>
  <text x="740" y="327" font-size="12" fill="#888">실수형</text>

  <!-- Row 7: char -->
  <rect x="60" y="342" width="760" height="40" fill="#0d1929"/>
  <rect x="60" y="342" width="4" height="40" fill="#7777cc"/>
  <text x="76" y="367" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">char</text>
  <text x="200" y="367" font-size="13" fill="#c8c8c8">16 bit</text>
  <text x="290" y="367" font-size="13" fill="#c8c8c8">\u0000 ~ \uFFFF (0 ~ 65,535)</text>
  <text x="630" y="367" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">\u0000</text>
  <text x="740" y="367" font-size="12" fill="#888">문자형</text>

  <!-- Row 8: boolean -->
  <rect x="60" y="382" width="760" height="40" fill="#0a0a0a"/>
  <rect x="60" y="382" width="4" height="40" fill="#ce9178"/>
  <text x="76" y="407" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">boolean</text>
  <text x="200" y="407" font-size="13" fill="#888">JVM 의존</text>
  <text x="290" y="407" font-size="13" fill="#c8c8c8">true / false</text>
  <text x="630" y="407" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">false</text>
  <text x="740" y="407" font-size="12" fill="#888">논리형</text>

  <!-- Bottom border line -->
  <line x1="60" y1="422" x2="820" y2="422" stroke="#1e2433" stroke-width="1"/>

  <!-- Notes -->
  <text x="64" y="448" font-size="12" fill="#555">* 인스턴스/정적 필드 기본값. 지역 변수는 자동 초기화 없음.</text>
  <text x="64" y="464" font-size="12" fill="#555">* boolean 크기는 JVM 구현에 따라 다름 (배열 원소는 1 byte).</text>
</svg>
