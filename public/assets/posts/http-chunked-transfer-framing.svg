<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430">
  <rect width="880" height="430" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arrB" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrG" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">본문의 끝을 알리는 세 가지 방법</text>
    <!-- D1 -->
    <rect x="90" y="80" width="400" height="58" rx="8" fill="#0f1f3a" stroke="#4a7aaa" stroke-width="1.5"/>
    <text x="290" y="104" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">전송 시작 시점에 본문 크기를 아는가?</text>
    <text x="290" y="124" text-anchor="middle" font-size="11" fill="#888">정적 파일, 완성된 버퍼 등</text>
    <text x="544" y="97" text-anchor="middle" font-size="12" fill="#55c555">예</text>
    <line x1="490" y1="109" x2="598" y2="109" stroke="#55c555" stroke-width="2" marker-end="url(#arrG)"/>
    <rect x="600" y="80" width="220" height="58" rx="8" fill="#0f2a1a" stroke="#3aaa5a" stroke-width="1.5"/>
    <text x="710" y="104" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">Content-Length: N</text>
    <text x="710" y="124" text-anchor="middle" font-size="11" fill="#888">N바이트 읽으면 끝</text>
    <text x="320" y="160" font-size="12" fill="#888">아니오</text>
    <line x1="290" y1="138" x2="290" y2="176" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrB)"/>
    <!-- D2 -->
    <rect x="90" y="178" width="400" height="58" rx="8" fill="#0f1f3a" stroke="#4a7aaa" stroke-width="1.5"/>
    <text x="290" y="202" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">HTTP/1.1 이상인가?</text>
    <text x="290" y="222" text-anchor="middle" font-size="11" fill="#888">동적 생성, 스트리밍, 압축 직후 등</text>
    <text x="544" y="195" text-anchor="middle" font-size="12" fill="#55c555">예</text>
    <line x1="490" y1="207" x2="598" y2="207" stroke="#55c555" stroke-width="2" marker-end="url(#arrG)"/>
    <rect x="600" y="178" width="220" height="58" rx="8" fill="#0f1f3a" stroke="#4a7aaa" stroke-width="1.5"/>
    <text x="710" y="202" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">chunked 전송</text>
    <text x="710" y="222" text-anchor="middle" font-size="11" fill="#888">크기+데이터 반복, 0으로 종료</text>
    <text x="320" y="258" font-size="12" fill="#888">아니오</text>
    <line x1="290" y1="236" x2="290" y2="274" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrB)"/>
    <!-- Fallback -->
    <rect x="90" y="276" width="400" height="58" rx="8" fill="#2a1f0f" stroke="#aa7a3a" stroke-width="1.5"/>
    <text x="290" y="300" text-anchor="middle" font-size="13" font-weight="600" fill="#dd9955">HTTP/1.0 폴백 — Connection: close</text>
    <text x="290" y="320" text-anchor="middle" font-size="11" fill="#888">연결 종료(EOF) 자체가 본문의 끝 — 연결 재사용 불가</text>
    <!-- Summary -->
    <text x="440" y="380" text-anchor="middle" font-size="12" fill="#888">영속 연결에서는 "어디까지가 이 응답인지"를 반드시 메시지 안에서 알 수 있어야 한다</text>
    <text x="440" y="398" text-anchor="middle" font-size="11" fill="#555">그 답이 Content-Length 또는 chunked — 둘 다 없으면 연결을 닫는 수밖에 없다</text>
  </g>
</svg>
