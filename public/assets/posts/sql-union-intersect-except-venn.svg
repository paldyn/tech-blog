<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">UNION · INTERSECT · EXCEPT 집합 연산</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">결과 집합 간 합집합 · 교집합 · 차집합</text>

  <!-- UNION -->
  <rect x="50" y="90" width="240" height="30" rx="6" fill="#1a2233" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">UNION / UNION ALL</text>

  <!-- Circle A left -->
  <circle cx="140" cy="205" r="68" fill="#55c555" fill-opacity="0.18" stroke="#55c555" stroke-width="2"/>
  <text x="110" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">쿼리</text>
  <text x="110" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">A</text>
  <!-- Circle A right -->
  <circle cx="204" cy="205" r="68" fill="#55c555" fill-opacity="0.18" stroke="#55c555" stroke-width="2"/>
  <text x="232" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">쿼리</text>
  <text x="232" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">B</text>
  <!-- Union fill overlay -->
  <circle cx="140" cy="205" r="68" fill="#55c555" fill-opacity="0.25"/>
  <circle cx="204" cy="205" r="68" fill="#55c555" fill-opacity="0.25"/>

  <text x="170" y="283" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">ALL 없으면 중복 제거</text>
  <text x="170" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">ALL 있으면 중복 유지 (빠름)</text>

  <!-- INTERSECT -->
  <rect x="320" y="90" width="240" height="30" rx="6" fill="#1a2233" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">INTERSECT</text>

  <circle cx="410" cy="205" r="68" fill="#7ec8e3" fill-opacity="0.08" stroke="#7ec8e3" stroke-width="2"/>
  <text x="388" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">A</text>
  <circle cx="474" cy="205" r="68" fill="#7ec8e3" fill-opacity="0.08" stroke="#7ec8e3" stroke-width="2"/>
  <text x="496" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">B</text>
  <!-- Intersection highlight -->
  <clipPath id="clipA">
    <circle cx="410" cy="205" r="68"/>
  </clipPath>
  <circle cx="474" cy="205" r="68" fill="#7ec8e3" fill-opacity="0.40" clip-path="url(#clipA)"/>
  <text x="442" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="700" fill="#7ec8e3">교집합</text>

  <text x="440" y="283" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">양쪽 모두에 존재하는 행만</text>
  <text x="440" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">중복 자동 제거 (ALL 지원 DB 있음)</text>

  <!-- EXCEPT -->
  <rect x="590" y="90" width="240" height="30" rx="6" fill="#1a2233" stroke="#e05555" stroke-width="1.5"/>
  <text x="710" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">EXCEPT / MINUS</text>

  <circle cx="680" cy="205" r="68" fill="#e05555" fill-opacity="0.30" stroke="#e05555" stroke-width="2"/>
  <text x="655" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">A</text>
  <circle cx="744" cy="205" r="68" fill="#0a0a0a" fill-opacity="0.60" stroke="#555" stroke-width="1.5"/>
  <text x="768" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555">B</text>
  <!-- Subtract B from A -->
  <clipPath id="clipB2">
    <circle cx="744" cy="205" r="68"/>
  </clipPath>
  <circle cx="680" cy="205" r="68" fill="#0a0a0a" clip-path="url(#clipB2)"/>

  <text x="710" y="283" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">A에만 있고 B에 없는 행</text>
  <text x="710" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Oracle: MINUS 사용</text>

  <!-- Rules section -->
  <rect x="50" y="320" width="780" height="100" rx="8" fill="#111118" stroke="#333"/>
  <text x="440" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">집합 연산 필수 규칙</text>
  <text x="160" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">① 컬럼 수 동일</text>
  <text x="160" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">양쪽 SELECT 컬럼 수 일치</text>
  <text x="160" y="402" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">컬럼명은 첫 쿼리 기준</text>

  <text x="440" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">② 데이터 타입 호환</text>
  <text x="440" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">위치별 타입이 암묵 변환 가능해야</text>
  <text x="440" y="402" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">INT ↔ BIGINT 가능, TEXT ↔ INT 불가</text>

  <text x="720" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">③ ORDER BY 위치</text>
  <text x="720" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">전체 집합 연산 마지막에만 가능</text>
  <text x="720" y="402" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">괄호로 쿼리 묶어야 개별 정렬 가능</text>
</svg>
