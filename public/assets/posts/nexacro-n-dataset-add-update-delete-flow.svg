<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Dataset 행 추가·수정·삭제 흐름</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">addRow · setColumn · deleteRow 동작 시퀀스</text>

  <!-- ===== Three operation columns ===== -->
  <!-- ADD column -->
  <rect x="60" y="92" width="240" height="44" fill="#1a1a2e" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">① 행 추가 (addRow)</text>

  <!-- UPDATE column -->
  <rect x="320" y="92" width="240" height="44" fill="#1a1500" rx="8" stroke="#e8c85a" stroke-width="1.5"/>
  <text x="440" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e8c85a" text-anchor="middle">② 행 수정 (setColumn)</text>

  <!-- DELETE column -->
  <rect x="580" y="92" width="240" height="44" fill="#1a0f0f" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="700" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555" text-anchor="middle">③ 행 삭제 (deleteRow)</text>

  <!-- ADD steps -->
  <rect x="60" y="152" width="240" height="26" fill="#0f1a1a" rx="4"/>
  <text x="180" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">var r = ds.addRow();</text>
  <rect x="60" y="182" width="240" height="26" fill="#0f1a1a" rx="4"/>
  <text x="180" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">ds.setColumn(r,"EMP_CD","E005")</text>
  <rect x="60" y="212" width="240" height="26" fill="#0f1a1a" rx="4"/>
  <text x="180" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">rowType → INSERT (2)</text>

  <!-- UPDATE steps -->
  <rect x="320" y="152" width="240" height="26" fill="#1a1500" rx="4"/>
  <text x="440" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">기존 행 선택 (NORMAL)</text>
  <rect x="320" y="182" width="240" height="26" fill="#1a1500" rx="4"/>
  <text x="440" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">ds.setColumn(i,"EMP_NM","홍길동")</text>
  <rect x="320" y="212" width="240" height="26" fill="#1a1500" rx="4"/>
  <text x="440" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8c85a" text-anchor="middle">rowType → UPDATE (4)</text>

  <!-- DELETE steps -->
  <rect x="580" y="152" width="240" height="26" fill="#1a0f0f" rx="4"/>
  <text x="700" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">기존 행 선택 (NORMAL)</text>
  <rect x="580" y="182" width="240" height="26" fill="#1a0f0f" rx="4"/>
  <text x="700" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">ds.deleteRow(i);</text>
  <rect x="580" y="212" width="240" height="26" fill="#1a0f0f" rx="4"/>
  <text x="700" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">rowType → DELETE (8)</text>

  <!-- Converging arrows to transaction -->
  <line x1="180" y1="238" x2="180" y2="276" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="440" y1="238" x2="440" y2="276" stroke="#e8c85a" stroke-width="1.5"/>
  <line x1="700" y1="238" x2="700" y2="276" stroke="#e05555" stroke-width="1.5"/>
  <line x1="180" y1="276" x2="700" y2="276" stroke="#555" stroke-width="1.5"/>
  <polygon points="436,276 444,276 440,294" fill="#7777cc"/>

  <!-- Transaction box -->
  <rect x="320" y="296" width="240" height="52" fill="#1a1a2e" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">transaction()</text>
  <text x="440" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">변경 행만 서버로 전송</text>

  <!-- Result note -->
  <rect x="60" y="372" width="760" height="68" fill="#0f0f1a" rx="8" stroke="#444" stroke-width="1"/>
  <text x="440" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">addRow() 변형: insertRow(index) / insertCopyRow(index, srcRow)</text>
  <text x="440" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">insertRow — 특정 위치에 삽입 / insertCopyRow — 기존 행을 복사해서 삽입</text>
</svg>
