<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">L4 vs L7 로드 밸런서 비교</text>

  <!-- Headers -->
  <rect x="50" y="76" width="244" height="44" rx="6" fill="#0f1a2a" stroke="#2a5a8a" stroke-width="1.5"/>
  <text x="172" y="103" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">항목</text>

  <rect x="308" y="76" width="244" height="44" rx="6" fill="#0b2016" stroke="#2a8a50" stroke-width="2"/>
  <text x="430" y="103" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">L4 로드 밸런서</text>

  <rect x="566" y="76" width="264" height="44" rx="6" fill="#1a0f20" stroke="#7a3a9a" stroke-width="2"/>
  <text x="698" y="103" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#b87ce8">L7 로드 밸런서</text>

  <!-- Row 1: 동작 계층 -->
  <rect x="50" y="134" width="244" height="48" rx="4" fill="#0d1219" stroke="#1a2a3a" stroke-width="1"/>
  <text x="172" y="163" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">동작 계층</text>

  <rect x="308" y="134" width="244" height="48" rx="4" fill="#091410" stroke="#1a3a20" stroke-width="1"/>
  <text x="430" y="163" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Transport Layer (TCP/UDP)</text>

  <rect x="566" y="134" width="264" height="48" rx="4" fill="#120d1a" stroke="#2a1a3a" stroke-width="1"/>
  <text x="698" y="163" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Application Layer (HTTP/S)</text>

  <!-- Row 2: 라우팅 기준 -->
  <rect x="50" y="196" width="244" height="48" rx="4" fill="#0d1219" stroke="#1a2a3a" stroke-width="1"/>
  <text x="172" y="225" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">라우팅 기준</text>

  <rect x="308" y="196" width="244" height="48" rx="4" fill="#091410" stroke="#1a3a20" stroke-width="1"/>
  <text x="430" y="225" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">IP:Port, 프로토콜</text>

  <rect x="566" y="196" width="264" height="48" rx="4" fill="#120d1a" stroke="#2a1a3a" stroke-width="1"/>
  <text x="698" y="225" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">URL, 헤더, 쿠키, 메서드</text>

  <!-- Row 3: TLS 종료 -->
  <rect x="50" y="258" width="244" height="48" rx="4" fill="#0d1219" stroke="#1a2a3a" stroke-width="1"/>
  <text x="172" y="287" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">TLS 종료</text>

  <rect x="308" y="258" width="244" height="48" rx="4" fill="#091410" stroke="#1a3a20" stroke-width="1"/>
  <text x="430" y="287" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">패스스루 또는 가능</text>

  <rect x="566" y="258" width="264" height="48" rx="4" fill="#120d1a" stroke="#2a1a3a" stroke-width="1"/>
  <text x="698" y="287" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">TLS Termination 지원</text>

  <!-- Row 4: 성능 -->
  <rect x="50" y="320" width="244" height="48" rx="4" fill="#0d1219" stroke="#1a2a3a" stroke-width="1"/>
  <text x="172" y="349" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">처리 속도</text>

  <rect x="308" y="320" width="244" height="48" rx="4" fill="#091410" stroke="#1a3a20" stroke-width="1"/>
  <text x="430" y="349" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">매우 빠름 (헤더 분석 없음)</text>

  <rect x="566" y="320" width="264" height="48" rx="4" fill="#120d1a" stroke="#2a1a3a" stroke-width="1"/>
  <text x="698" y="349" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">상대적으로 느림</text>

  <!-- Row 5: 대표 제품 -->
  <rect x="50" y="382" width="244" height="48" rx="4" fill="#0d1219" stroke="#1a2a3a" stroke-width="1"/>
  <text x="172" y="411" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">대표 제품</text>

  <rect x="308" y="382" width="244" height="48" rx="4" fill="#091410" stroke="#1a3a20" stroke-width="1"/>
  <text x="430" y="411" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">AWS NLB, HAProxy (TCP)</text>

  <rect x="566" y="382" width="264" height="48" rx="4" fill="#120d1a" stroke="#2a1a3a" stroke-width="1"/>
  <text x="698" y="411" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">AWS ALB, Nginx, Envoy</text>

  <!-- Bottom note -->
  <text x="440" y="462" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">L4는 속도·낮은 지연 우선, L7은 콘텐츠 기반 라우팅·보안 기능 우선</text>
</svg>
