<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 450" style="background:#0a0a0a;border-radius:12px">
  <!-- Background -->
  <rect width="880" height="450" rx="12" fill="#0a0a0a"/>

  <!-- Header -->
  <rect x="0" y="0" width="880" height="72" rx="12" fill="#0d1a2a"/>
  <rect x="0" y="60" width="880" height="12" fill="#0d1a2a"/>
  <text x="60" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#ffffff">설명 분산비(Scree Plot)와 PCA 구현</text>
  <text x="60" y="62" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">적정 주성분 개수를 누적 분산비로 결정한다</text>
  <line x1="60" y1="82" x2="820" y2="82" stroke="#1e2433" stroke-width="1"/>

  <!-- Left panel: Scree plot bar + cumulative curve -->
  <text x="60" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Scree Plot — 주성분별 설명 분산비</text>
  <rect x="60" y="115" width="355" height="260" rx="8" fill="#0d1520" stroke="#1e2433"/>

  <!-- Y-axis label -->
  <text x="70" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" transform="rotate(-90 70 230)">설명 분산비 (%)</text>

  <!-- X-axis -->
  <line x1="100" y1="340" x2="400" y2="340" stroke="#1e2433" stroke-width="1"/>
  <!-- Y-axis -->
  <line x1="100" y1="130" x2="100" y2="340" stroke="#1e2433" stroke-width="1"/>

  <!-- Y gridlines and labels -->
  <line x1="100" y1="200" x2="395" y2="200" stroke="#1e2433" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <line x1="100" y1="270" x2="395" y2="270" stroke="#1e2433" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <line x1="100" y1="165" x2="395" y2="165" stroke="#1e2433" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <text x="93" y="344" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">0</text>
  <text x="93" y="274" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">25</text>
  <text x="93" y="204" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">50</text>
  <text x="93" y="169" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">75</text>

  <!-- Bars: PC1=42%, PC2=28%, PC3=14%, PC4=8%, PC5=4%, PC6=2%, PC7=1%, PC8=1% -->
  <!-- Bar width=28, gap=8. Start x=110 -->
  <!-- PC1: 42% → height = 42/100*210=88 -->
  <rect x="110" y="252" width="28" height="88" rx="3" fill="#7777cc"/>
  <text x="124" y="349" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">PC1</text>

  <!-- PC2: 28% → height=59 -->
  <rect x="146" y="281" width="28" height="59" rx="3" fill="#7777cc" opacity="0.85"/>
  <text x="160" y="349" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">PC2</text>

  <!-- PC3: 14% → height=29 -->
  <rect x="182" y="311" width="28" height="29" rx="3" fill="#7777cc" opacity="0.7"/>
  <text x="196" y="349" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">PC3</text>

  <!-- PC4: 8% → height=17 -->
  <rect x="218" y="323" width="28" height="17" rx="3" fill="#7777cc" opacity="0.55"/>
  <text x="232" y="349" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">PC4</text>

  <!-- PC5: 4% → height=8 -->
  <rect x="254" y="332" width="28" height="8" rx="3" fill="#7777cc" opacity="0.45"/>
  <text x="268" y="349" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">PC5</text>

  <!-- PC6: 2% → height=4 -->
  <rect x="290" y="336" width="28" height="4" rx="3" fill="#7777cc" opacity="0.35"/>
  <text x="304" y="349" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">PC6</text>

  <!-- PC7: 1% -->
  <rect x="326" y="338" width="28" height="2" rx="2" fill="#7777cc" opacity="0.3"/>
  <text x="340" y="349" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">PC7</text>

  <!-- PC8: 1% -->
  <rect x="362" y="338" width="28" height="2" rx="2" fill="#7777cc" opacity="0.25"/>
  <text x="376" y="349" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">PC8</text>

  <!-- Cumulative curve: 42, 70, 84, 92, 96, 98, 99, 100 → y = 340 - val/100*210 -->
  <!-- 42→252, 70→193, 84→163, 92→147, 96→138, 98→134, 99→131, 100→130 -->
  <polyline
    points="124,252 160,193 196,163 232,147 268,138 304,134 340,131 376,130"
    fill="none" stroke="#55c555" stroke-width="2"/>
  <circle cx="124" cy="252" r="4" fill="#55c555"/>
  <circle cx="160" cy="193" r="4" fill="#55c555"/>
  <circle cx="196" cy="163" r="4" fill="#55c555"/>
  <circle cx="232" cy="147" r="4" fill="#55c555"/>
  <circle cx="268" cy="138" r="4" fill="#55c555"/>
  <circle cx="304" cy="134" r="4" fill="#55c555"/>
  <circle cx="340" cy="131" r="4" fill="#55c555"/>
  <circle cx="376" cy="130" r="4" fill="#55c555"/>

  <!-- 95% threshold line -->
  <line x1="100" y1="140" x2="395" y2="140" stroke="#e05555" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="398" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">95%</text>

  <!-- Elbow annotation -->
  <line x1="196" y1="163" x2="196" y2="340" stroke="#55c555" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <text x="196" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">PC3에서</text>
  <text x="196" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">84% 달성</text>

  <!-- Legend -->
  <rect x="280" y="120" width="12" height="12" rx="2" fill="#7777cc"/>
  <text x="296" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">개별 분산비</text>
  <line x1="280" y1="148" x2="292" y2="148" stroke="#55c555" stroke-width="2"/>
  <circle cx="286" cy="148" r="3" fill="#55c555"/>
  <text x="296" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">누적 분산비</text>

  <!-- Right panel: Code block -->
  <text x="445" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">scikit-learn PCA 사용법</text>
  <rect x="445" y="115" width="395" height="260" rx="6" fill="#070b14" stroke="#1e2433"/>

  <!-- Code lines (line height 18px, start y=133, left x=461) -->
  <text x="461" y="133" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">from</text>
  <text x="500" y="133" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"> sklearn.decomposition </text>
  <text x="664" y="133" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">import</text>
  <text x="709" y="133" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"> PCA</text>

  <text x="461" y="151" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># 주성분 수 지정 또는 분산 비율로 지정</text>

  <text x="461" y="169" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">pca = PCA(n_components=</text>
  <text x="637" y="169" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">0.95</text>
  <text x="663" y="169" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">)</text>
  <text x="672" y="169" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"> # 95% 유지</text>

  <text x="461" y="187" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">X_pca = pca.fit_transform(X_scaled)</text>

  <text x="461" y="205" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># 설명 분산비 확인</text>

  <text x="461" y="223" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">evr = pca.explained_variance_ratio_</text>

  <text x="461" y="241" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">print</text>
  <text x="501" y="241" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">(</text>
  <text x="509" y="241" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">f"선택된 PC 수: {pca.n_components_}"</text>
  <text x="796" y="241" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">)</text>

  <text x="461" y="259" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">print</text>
  <text x="501" y="259" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">(</text>
  <text x="509" y="259" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">f"누적 분산: {evr.sum():.3f}"</text>
  <text x="726" y="259" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">)</text>

  <text x="461" y="277" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># 역변환: 압축 → 복원</text>

  <text x="461" y="295" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">X_inv = pca.inverse_transform(X_pca)</text>

  <text x="461" y="313" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># 고유벡터(주성분 방향) 확인</text>

  <text x="461" y="331" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">components = pca.components_</text>
  <text x="680" y="331" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"> # (n_pc, n_feat)</text>

  <text x="461" y="349" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">mean    = pca.mean_</text>
  <text x="583" y="349" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">         # 중심화 평균</text>

  <!-- Bottom stat boxes -->
  <rect x="60" y="390" width="220" height="42" rx="6" fill="#0d1520" stroke="#7777cc" stroke-width="1"/>
  <text x="170" y="407" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">MNIST 784차원 → PCA 50차원</text>
  <text x="170" y="423" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">정보 손실 &lt; 5%, 속도 ×15.7↑</text>

  <rect x="295" y="390" width="220" height="42" rx="6" fill="#0d1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="405" y="407" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">공분산 행렬 고유값 분해</text>
  <text x="405" y="423" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Cov(X) = VΛVᵀ</text>

  <rect x="530" y="390" width="310" height="42" rx="6" fill="#0d1520" stroke="#55c555" stroke-width="1"/>
  <text x="685" y="407" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">누적 분산 95% 기준으로 차원 수 자동 결정</text>
  <text x="685" y="423" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">n_components=0.95 권장</text>
</svg>
