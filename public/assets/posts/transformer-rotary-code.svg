<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">RoPE PyTorch 구현</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">회전 주파수 계산 → cos/sin 캐시 → 쿼리·키에 적용</text>

  <!-- Code block -->
  <rect x="60" y="96" width="760" height="358" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="76" y="120" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># RoPE 핵심 구현 (단순화 버전)</text>
  <text x="76" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">import</text>
  <text x="128" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> torch</text>
  <text x="76" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">import</text>
  <text x="128" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> torch.nn </text>
  <text x="232" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">as</text>
  <text x="250" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> nn</text>

  <text x="76" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">class</text>
  <text x="118" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> RotaryEmbedding(nn.Module):</text>

  <text x="76" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    def</tspan><tspan fill="#ffffff"> __init__(</tspan><tspan fill="#7777cc">self</tspan><tspan fill="#ffffff">, dim, base=</tspan><tspan fill="#b5cea8">10000</tspan><tspan fill="#ffffff">):</tspan></text>

  <text x="76" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">        # θ_i = 1 / base^(2i/dim)</text>
  <text x="76" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">        inv_freq = </tspan><tspan fill="#b5cea8">1.0</tspan><tspan fill="#ffffff"> / (base ** (</tspan><tspan fill="#ffffff">torch.arange(</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">, dim, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">) / dim))</tspan></text>

  <text x="76" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7777cc">        self</tspan><tspan fill="#ffffff">.register_buffer(</tspan><tspan fill="#ce9178">'inv_freq'</tspan><tspan fill="#ffffff">, inv_freq)</tspan></text>

  <text x="76" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    def</tspan><tspan fill="#ffffff"> forward(</tspan><tspan fill="#7777cc">self</tspan><tspan fill="#ffffff">, q, k, seq_len):</tspan></text>

  <text x="76" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        t = torch.arange(seq_len)</text>
  <text x="76" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">        freqs = torch.outer(t, </tspan><tspan fill="#7777cc">self</tspan><tspan fill="#ffffff">.inv_freq)</tspan></text>

  <text x="76" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        emb = torch.cat([freqs, freqs], dim=-</text>
  <text x="408" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">1</text>
  <text x="416" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>
  <text x="76" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        cos, sin = emb.cos(), emb.sin()</text>
  <text x="76" y="374" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">        return</tspan><tspan fill="#ffffff"> apply_rotary(q, cos, sin), \</tspan></text>
  
  <text x="76" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">               apply_rotary(k, cos, sin)</text>

  <text x="76" y="420" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">def</text>
  <text x="100" y="420" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> apply_rotary(x, cos, sin):</text>
  <text x="76" y="438" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    return</tspan><tspan fill="#ffffff"> x * cos + rotate_half(x) * sin</tspan></text>
  
</svg>
