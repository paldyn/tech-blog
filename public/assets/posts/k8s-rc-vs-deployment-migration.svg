<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">RC → Deployment 마이그레이션</text>

  <!-- RC YAML -->
  <rect x="50" y="68" width="370" height="36" rx="6" fill="#1a1428" stroke="#7777cc" stroke-width="1.5"/>
  <text x="235" y="91" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">ReplicationController (Before)</text>

  <rect x="50" y="112" width="370" height="240" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="66" y="132"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">apiVersion:</text>
  <text x="182" y="132"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve"> v1</text>
  <text x="66" y="150"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">kind:</text>
  <text x="114" y="150"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve"> ReplicationController</text>
  <text x="66" y="168"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">spec:</text>
  <text x="66" y="186"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  replicas: 3</text>
  <text x="66" y="204"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  selector:</text>
  <text x="66" y="222"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    app: web</text>
  <text x="66" y="244"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  # selector가 matchLabels 없이</text>
  <text x="66" y="262"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  # flat key-value 방식</text>
  <text x="66" y="280"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  # matchExpressions 미지원</text>
  <text x="66" y="302"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" xml:space="preserve">  # 롤링 업데이트 미지원</text>
  <text x="66" y="320"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" xml:space="preserve">  # 롤백 미지원</text>
  <text x="66" y="338"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" xml:space="preserve">  # 이미지 변경 시 수동 전환</text>

  <!-- Arrow -->
  <line x1="422" y1="232" x2="458" y2="232" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Deployment YAML -->
  <rect x="460" y="68" width="370" height="36" rx="6" fill="#121e38" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="645" y="91" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">Deployment (After)</text>

  <rect x="460" y="112" width="370" height="240" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="132"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">apiVersion:</text>
  <text x="592" y="132"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve"> apps/v1</text>
  <text x="476" y="150"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">kind:</text>
  <text x="524" y="150"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve"> Deployment</text>
  <text x="476" y="168"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">spec:</text>
  <text x="476" y="186"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  replicas: 3</text>
  <text x="476" y="204"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  selector:</text>
  <text x="476" y="222"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    matchLabels:</text>
  <text x="476" y="240"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">      app: web</text>
  <text x="476" y="262"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  strategy:</text>
  <text x="476" y="280"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">    type: RollingUpdate</text>
  <text x="476" y="298"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve">  # 롤링 업데이트 자동 지원</text>
  <text x="476" y="316"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve">  # kubectl rollout undo</text>
  <text x="476" y="334"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve">  # revision 히스토리 관리</text>

  <!-- Bottom migration steps -->
  <rect x="50" y="370" width="780" height="52" rx="8" fill="#121e38" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="392" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">마이그레이션 절차</text>
  <text x="440" y="412" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">① RC YAML → Deployment YAML로 변환 → ② kubectl apply → ③ kubectl delete rc &lt;old-rc&gt; --cascade=orphan (Pod 유지) → ④ Deployment가 Pod 인수</text>
</svg>
