<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">웹 접근성 — ARIA 속성과 역할</text>

  <!-- Left: Semantic HTML -->
  <rect x="60" y="68" width="370" height="290" rx="8" fill="#0f0f1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="245" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">시맨틱 HTML (우선)</text>

  <rect x="76" y="104" width="338" height="242" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">// 나쁜 예 — div 클릭 핸들러</text>
  <text x="92" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">&lt;<tspan fill="#e05555">div</tspan> onClick={handler}&gt;제출&lt;/<tspan fill="#e05555">div</tspan>&gt;</text>
  <text x="92" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"></text>
  <text x="92" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">// 좋은 예 — 시맨틱 요소</text>
  <text x="92" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">&lt;<tspan fill="#55c555">button</tspan> type=<tspan fill="#ce9178">"button"</tspan>&gt;제출&lt;/<tspan fill="#55c555">button</tspan>&gt;</text>
  <text x="92" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">&lt;<tspan fill="#55c555">nav</tspan>&gt;&lt;<tspan fill="#55c555">ul</tspan>&gt;&lt;<tspan fill="#55c555">li</tspan>&gt;&lt;<tspan fill="#55c555">a</tspan> href=<tspan fill="#ce9178">"/"</tspan>&gt;홈&lt;/<tspan fill="#55c555">a</tspan>&gt;&lt;/<tspan fill="#55c555">li</tspan>&gt;</text>
  <text x="92" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">&lt;<tspan fill="#55c555">main</tspan>&gt;&lt;<tspan fill="#55c555">article</tspan>&gt;...&lt;/<tspan fill="#55c555">article</tspan>&gt;&lt;/<tspan fill="#55c555">main</tspan>&gt;</text>
  <text x="92" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">&lt;<tspan fill="#55c555">footer</tspan>&gt;...&lt;/<tspan fill="#55c555">footer</tspan>&gt;</text>
  <text x="92" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"></text>
  <text x="92" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">// 이미지 대체 텍스트</text>
  <text x="92" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">&lt;<tspan fill="#55c555">img</tspan> src=<tspan fill="#ce9178">"logo.png"</tspan> alt=<tspan fill="#ce9178">"PALDYN 로고"</tspan> /&gt;</text>
  <text x="92" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">&lt;<tspan fill="#55c555">img</tspan> src=<tspan fill="#ce9178">"deco.svg"</tspan> alt=<tspan fill="#ce9178">""</tspan> role=<tspan fill="#ce9178">"presentation"</tspan>/&gt;</text>

  <!-- Right: ARIA -->
  <rect x="450" y="68" width="370" height="290" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="635" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">ARIA 속성 (보완)</text>

  <rect x="466" y="104" width="338" height="242" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">// 다이얼로그 접근성</text>
  <text x="482" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">&lt;div role=<tspan fill="#ce9178">"dialog"</tspan></text>
  <text x="482" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">     aria-modal=<tspan fill="#ce9178">"true"</tspan></text>
  <text x="482" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">     aria-labelledby=<tspan fill="#ce9178">"dialog-title"</tspan>&gt;</text>
  <text x="482" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  &lt;h2 id=<tspan fill="#ce9178">"dialog-title"</tspan>&gt;제목&lt;/h2&gt;</text>
  <text x="482" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">&lt;/div&gt;</text>
  <text x="482" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"></text>
  <text x="482" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">// 동적 영역 업데이트</text>
  <text x="482" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">&lt;div aria-live=<tspan fill="#ce9178">"polite"</tspan></text>
  <text x="482" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">     aria-atomic=<tspan fill="#ce9178">"true"</tspan>&gt;</text>
  <text x="482" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  {statusMessage}</text>
  <text x="482" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">&lt;/div&gt;</text>

  <!-- Bottom chips -->
  <text x="60" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">핵심 원칙</text>

  <rect x="60" y="412" width="165" height="54" rx="8" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="143" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">지각 가능</text>
  <text x="143" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">대체 텍스트 · 자막</text>

  <rect x="241" y="412" width="165" height="54" rx="8" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="324" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">운용 가능</text>
  <text x="324" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">키보드 접근 가능</text>

  <rect x="422" y="412" width="165" height="54" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="505" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">이해 가능</text>
  <text x="505" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">명확한 레이블</text>

  <rect x="603" y="412" width="217" height="54" rx="8" fill="#111" stroke="#ce9178" stroke-width="1"/>
  <text x="712" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ce9178" text-anchor="middle">견고성</text>
  <text x="712" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">보조 기술 호환 (WCAG)</text>
</svg>
