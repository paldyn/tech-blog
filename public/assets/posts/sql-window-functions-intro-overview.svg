<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">윈도우 함수 — OVER 절 구조</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888" text-anchor="middle">행을 제거하지 않고 집계·순위·이동값 계산</text>

  <!-- OVER clause anatomy -->
  <rect x="50" y="96" width="780" height="80" fill="#131820" rx="8" stroke="#7ec8e3"/>
  <text x="60" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">function_name(expr)</text>
  <text x="60" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">                    OVER (</text>
  <text x="60" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#55c555">  PARTITION BY</tspan><tspan fill="#ffffff">               col1</tspan><tspan fill="#7777cc">  ORDER BY</tspan><tspan fill="#ffffff">            col2 DESC</tspan><tspan fill="#7ec8e3">  ROWS BETWEEN</tspan><tspan fill="#ffffff">               UNBOUNDED PRECEDING AND CURRENT ROW)</tspan></text>

  <!-- Labels below OVER -->
  <text x="160" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">PARTITION BY</text>
  <text x="160" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">파티션(그룹) 정의</text>

  <text x="380" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">ORDER BY</text>
  <text x="380" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">파티션 내 정렬</text>

  <text x="630" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">FRAME (ROWS/RANGE)</text>
  <text x="630" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">현재 행 기준 프레임 범위</text>

  <!-- Comparison: GROUP BY vs Window -->
  <rect x="50" y="224" width="360" height="240" fill="#0d0d0d" rx="8" stroke="#e05555"/>
  <text x="230" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">GROUP BY — 행 수가 줄어듦</text>
  <rect x="66" y="258" width="328" height="100" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="82" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">SELECT</text>
  <text x="82" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  dept, <tspan fill="#7ec8e3">AVG</tspan>(salary)</text>
  <text x="82" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">FROM</text>
  <text x="82" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">     employees</text>
  <text x="82" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">GROUP BY</text>
  <text x="82" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">         dept;</text>
  <text x="82" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 결과: dept별 1행만 남음</text>
  <text x="230" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">개별 행 정보 손실</text>
  <text x="230" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">집계 후 원본 컬럼 참조 불가</text>
  <text x="230" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6a8aa0" text-anchor="middle">입력: 10행 → 출력: 3행 (dept 3개)</text>

  <!-- Window function: rows preserved -->
  <rect x="470" y="224" width="360" height="240" fill="#0d0d0d" rx="8" stroke="#55c555"/>
  <text x="650" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">윈도우 함수 — 행이 유지됨</text>
  <rect x="486" y="258" width="328" height="118" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="502" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">SELECT</text>
  <text x="502" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  name, dept, salary,</text>
  <text x="502" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3">AVG</tspan>(salary) <tspan fill="#7ec8e3">OVER</tspan> (</text>
  <text x="502" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">PARTITION BY</tspan> dept) avg_sal</text>
  <text x="502" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">FROM</text>
  <text x="502" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">     employees;</text>
  <text x="502" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 각 행에 부서 평균 추가</text>
  <text x="650" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">모든 개별 행 유지</text>
  <text x="650" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">name·salary와 함께 부서 평균 조회</text>
  <text x="650" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6a8aa0" text-anchor="middle">입력: 10행 → 출력: 10행 (행 수 유지)</text>
</svg>
