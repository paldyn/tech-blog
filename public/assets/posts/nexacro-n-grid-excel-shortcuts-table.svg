<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Grid 엑셀 스타일 단축키</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">keyactiontype / keyhandler 속성으로 키보드 동작 제어</text>

  <!-- Header -->
  <rect x="60" y="96" width="200" height="34" fill="#1a1a2e" rx="4"/>
  <rect x="268" y="96" width="180" height="34" fill="#1a1a2e" rx="4"/>
  <rect x="456" y="96" width="364" height="34" fill="#1a1a2e" rx="4"/>
  <text x="160" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">키</text>
  <text x="358" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">기본 동작</text>
  <text x="638" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">Excel처럼 바꾸면</text>

  <!-- Row 1 -->
  <rect x="60" y="134" width="760" height="40" fill="#111" rx="3"/>
  <text x="160" y="159" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178" text-anchor="middle">Enter</text>
  <text x="358" y="159" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">편집 확인</text>
  <text x="638" y="159" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">편집 확인 후 다음 행으로 이동</text>

  <!-- Row 2 -->
  <rect x="60" y="178" width="760" height="40" fill="#161616" rx="3"/>
  <text x="160" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178" text-anchor="middle">Tab</text>
  <text x="358" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">다음 컴포넌트로 포커스</text>
  <text x="638" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">다음 셀(같은 행)로 이동</text>

  <!-- Row 3 -->
  <rect x="60" y="222" width="760" height="40" fill="#111" rx="3"/>
  <text x="160" y="247" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178" text-anchor="middle">Shift+Tab</text>
  <text x="358" y="247" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">이전 컴포넌트로 포커스</text>
  <text x="638" y="247" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">이전 셀로 이동</text>

  <!-- Row 4 -->
  <rect x="60" y="266" width="760" height="40" fill="#161616" rx="3"/>
  <text x="160" y="291" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178" text-anchor="middle">F2</text>
  <text x="358" y="291" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">(없음)</text>
  <text x="638" y="291" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">셀 편집 모드 진입</text>

  <!-- Row 5 -->
  <rect x="60" y="310" width="760" height="40" fill="#111" rx="3"/>
  <text x="160" y="335" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178" text-anchor="middle">Delete / BackSpace</text>
  <text x="358" y="335" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">셀 값 삭제</text>
  <text x="638" y="335" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">셀 값 즉시 삭제 (Excel)</text>

  <!-- Row 6 -->
  <rect x="60" y="354" width="760" height="40" fill="#161616" rx="3"/>
  <text x="160" y="379" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178" text-anchor="middle">방향키 ↑↓←→</text>
  <text x="358" y="379" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">셀 이동</text>
  <text x="638" y="379" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">편집 중 이동 시 확인 후 이동</text>

  <!-- Key attribute info -->
  <rect x="60" y="412" width="760" height="68" fill="#0d1a2e" rx="8" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">Grid 속성으로 키 동작 제어</text>
  <text x="230" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">keyactiontype</text>
  <text x="230" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Tab/Enter 이동 방향 설정</text>
  <text x="560" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">keyhandler</text>
  <text x="560" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">스크립트 핸들러로 위임</text>
</svg>
