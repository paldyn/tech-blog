<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">쇼핑몰 도메인 ERD 예시</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">Crow's Foot 표기법 · 4개 엔티티</text>

  <!-- CUSTOMER entity -->
  <rect x="60" y="90" width="150" height="170" rx="4" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <rect x="60" y="90" width="150" height="32" rx="4" fill="#0d1a20" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="135" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">CUSTOMER</text>
  <text x="70" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">PK  id</text>
  <text x="70" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">    name</text>
  <text x="70" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">    email</text>
  <text x="70" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">    phone</text>
  <text x="70" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">    created_at</text>
  <text x="70" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">    grade</text>

  <!-- ORDER entity -->
  <rect x="340" y="90" width="160" height="190" rx="4" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <rect x="340" y="90" width="160" height="32" rx="4" fill="#0d200d" stroke="#55c555" stroke-width="1.5"/>
  <text x="420" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">ORDER</text>
  <text x="350" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">PK  id</text>
  <text x="350" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">FK  customer_id</text>
  <text x="350" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">    status</text>
  <text x="350" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">    total_amount</text>
  <text x="350" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">    created_at</text>
  <text x="350" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">    shipped_at</text>
  <text x="350" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">    address_id</text>

  <!-- ORDER_ITEM entity -->
  <rect x="340" y="320" width="160" height="150" rx="4" fill="#111" stroke="#ce9178" stroke-width="1.5"/>
  <rect x="340" y="320" width="160" height="32" rx="4" fill="#1e150a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="420" y="341" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#ce9178">ORDER_ITEM</text>
  <text x="350" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">PK  id</text>
  <text x="350" y="387" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">FK  order_id</text>
  <text x="350" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">FK  product_id</text>
  <text x="350" y="425" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">    qty</text>
  <text x="350" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">    unit_price</text>

  <!-- PRODUCT entity -->
  <rect x="660" y="320" width="150" height="150" rx="4" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <rect x="660" y="320" width="150" height="32" rx="4" fill="#12101a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="735" y="341" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">PRODUCT</text>
  <text x="670" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">PK  id</text>
  <text x="670" y="387" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">    name</text>
  <text x="670" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">    price</text>
  <text x="670" y="425" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">    stock</text>
  <text x="670" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">    category_id</text>

  <!-- CUSTOMER → ORDER relationship line (1:N) -->
  <!-- Horizontal line -->
  <line x1="210" y1="180" x2="340" y2="180" stroke="#7777cc" stroke-width="1.5"/>
  <!-- 1 side: double bar at customer (right side) -->
  <line x1="215" y1="174" x2="215" y2="186" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="222" y1="174" x2="222" y2="186" stroke="#7777cc" stroke-width="1.5"/>
  <!-- N side: crow's foot at order (left side) -->
  <line x1="335" y1="180" x2="325" y2="174" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="335" y1="180" x2="323" y2="180" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="335" y1="180" x2="325" y2="186" stroke="#7777cc" stroke-width="1.5"/>
  <text x="275" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">1 : N</text>

  <!-- ORDER → ORDER_ITEM relationship line (1:N) -->
  <line x1="420" y1="280" x2="420" y2="320" stroke="#7777cc" stroke-width="1.5"/>
  <!-- 1 side: bar at order bottom -->
  <line x1="414" y1="285" x2="426" y2="285" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="414" y1="292" x2="426" y2="292" stroke="#7777cc" stroke-width="1.5"/>
  <!-- N side: crow's foot at order_item top -->
  <line x1="420" y1="315" x2="414" y2="305" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="420" y1="315" x2="420" y2="303" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="420" y1="315" x2="426" y2="305" stroke="#7777cc" stroke-width="1.5"/>
  <text x="438" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">1:N</text>

  <!-- ORDER_ITEM → PRODUCT relationship line (N:1) -->
  <line x1="500" y1="395" x2="660" y2="395" stroke="#7777cc" stroke-width="1.5"/>
  <!-- N side: crow's foot at order_item right side -->
  <line x1="505" y1="395" x2="515" y2="389" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="505" y1="395" x2="517" y2="395" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="505" y1="395" x2="515" y2="401" stroke="#7777cc" stroke-width="1.5"/>
  <!-- 1 side: double bar at product left -->
  <line x1="655" y1="389" x2="655" y2="401" stroke="#7777cc" stroke-width="1.5"/>
  <line x1="648" y1="389" x2="648" y2="401" stroke="#7777cc" stroke-width="1.5"/>
  <text x="580" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">N : 1</text>

  <!-- Legend row -->
  <rect x="60" y="470" width="760" height="34" rx="6" fill="#111" stroke="#333"/>
  <text x="440" y="492" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">PK = Primary Key · FK = Foreign Key · 선색 = 참조 관계 · Crow's Foot (≫) = 多 쪽 · ‖ = 1 쪽</text>
</svg>
