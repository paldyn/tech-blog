<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">ConfigMap · Secret 주입 패턴</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">환경변수 주입 vs 볼륨 파일 마운트</text>

  <!-- Pattern 1: envFrom -->
  <rect x="60" y="90" width="360" height="175" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="80" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">① envFrom — 전체 CM/Secret 주입</text>
  <rect x="78" y="126" width="324" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="94" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">envFrom</text>
  <text x="94" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  - configMapRef:</text>
  <text x="94" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      name: app-config</text>
  <text x="94" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  - secretRef:</text>
  <text x="94" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      name: app-secret</text>
  <text x="94" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 모든 키를 환경변수로</text>

  <!-- Pattern 2: valueFrom -->
  <rect x="460" y="90" width="360" height="175" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="480" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">② valueFrom — 개별 키 주입</text>
  <rect x="478" y="126" width="324" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="494" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">env</text>
  <text x="494" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  - name: DB_PASS</text>
  <text x="494" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    valueFrom:</text>
  <text x="494" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      secretKeyRef:</text>
  <text x="494" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">        name: db-secret</text>
  <text x="494" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">        key: password</text>

  <!-- Pattern 3: Volume mount -->
  <rect x="60" y="285" width="360" height="170" rx="8" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="80" y="309" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">③ 볼륨 마운트 — 파일로 주입</text>
  <rect x="78" y="321" width="324" height="114" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="94" y="343" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">volumes</text>
  <text x="94" y="361" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  - name: config</text>
  <text x="94" y="379" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    configMap:</text>
  <text x="94" y="397" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      name: nginx-config</text>
  <text x="94" y="415" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">volumeMounts:</text>
  <text x="94" y="433" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  mountPath: /etc/nginx/conf.d</text>

  <!-- Pattern 4: Immutable -->
  <rect x="460" y="285" width="360" height="170" rx="8" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="480" y="309" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">④ immutable — 변경 방지</text>
  <rect x="478" y="321" width="324" height="114" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="494" y="343" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">apiVersion</text>
  <text x="494" y="361" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">  v1</text>
  <text x="494" y="379" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">kind</text>
  <text x="494" y="397" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">  ConfigMap</text>
  <text x="494" y="415" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">immutable</text>
  <text x="494" y="433" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">  true</text>
</svg>
