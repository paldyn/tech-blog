<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="fb-arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="fb-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="fb-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Circuit Breaker + Fallback 체인</text>

  <!-- Request -->
  <rect x="60" y="76" width="140" height="54" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="130" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">요청</text>
  <text x="130" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">API 게이트웨이</text>

  <line x1="200" y1="103" x2="238" y2="103" stroke="#7ec8e3" stroke-width="2" marker-end="url(#fb-arr)"/>

  <!-- Circuit Breaker -->
  <rect x="246" y="76" width="160" height="54" rx="8" fill="#2a1a2a" stroke="#e05555" stroke-width="1.5"/>
  <text x="326" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">Circuit Breaker</text>
  <text x="326" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">CLOSED / OPEN / HALF-OPEN</text>

  <!-- Primary LLM -->
  <rect x="460" y="76" width="160" height="54" rx="8" fill="#2a1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="540" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Primary LLM</text>
  <text x="540" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Claude Sonnet</text>

  <!-- Success path -->
  <line x1="406" y1="96" x2="458" y2="96" stroke="#7ec8e3" stroke-width="2" marker-end="url(#fb-arr)"/>

  <!-- Success response -->
  <rect x="660" y="76" width="160" height="54" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="740" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">정상 응답</text>
  <text x="740" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">사용자에게 반환</text>

  <line x1="620" y1="103" x2="658" y2="103" stroke="#55c555" stroke-width="2" marker-end="url(#fb-green)"/>

  <!-- Failure path -->
  <path d="M 540 130 Q 540 176 460 190" stroke="#e05555" stroke-width="2" fill="none"
        stroke-dasharray="4,4" marker-end="url(#fb-red)"/>
  <text x="512" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">타임아웃/에러</text>

  <!-- Fallback 1 -->
  <rect x="246" y="198" width="160" height="54" rx="8" fill="#2a2a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="326" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Fallback #1</text>
  <text x="326" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">GPT-4o (OpenAI)</text>

  <line x1="406" y1="225" x2="458" y2="225" stroke="#7ec8e3" stroke-width="2" marker-end="url(#fb-arr)"/>

  <!-- Fallback 1 LLM -->
  <rect x="460" y="198" width="160" height="54" rx="8" fill="#2a1a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="540" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">OpenAI API</text>
  <text x="540" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">gpt-4o</text>

  <!-- Failure path 2 -->
  <path d="M 540 252 Q 540 296 460 310" stroke="#e05555" stroke-width="2" fill="none"
        stroke-dasharray="4,4" marker-end="url(#fb-red)"/>

  <!-- Fallback 2 -->
  <rect x="246" y="318" width="160" height="54" rx="8" fill="#1a2a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="326" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Fallback #2</text>
  <text x="326" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">로컬 Ollama</text>

  <!-- Fallback 3: Cached response -->
  <rect x="246" y="392" width="340" height="54" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="416" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Fallback #3: 캐시된 응답 / 정적 메시지</text>
  <text x="416" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">"현재 서비스 응답 지연 중입니다. 잠시 후 다시 시도해주세요."</text>

  <line x1="326" y1="372" x2="326" y2="390" stroke="#7ec8e3" stroke-width="2" marker-end="url(#fb-arr)"/>
</svg>
