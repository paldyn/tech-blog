<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430">
  <defs>
    <marker id="txOk" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="txErr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="430" fill="#0a0a0a" rx="12"/>
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">계좌 이체 — 둘 다 성공하거나 둘 다 취소</text>

  <!-- begin -->
  <rect x="340" y="84" width="200" height="50" fill="#101622" stroke="#7777cc" stroke-width="1.5" rx="8"/>
  <text x="360" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">트랜잭션 시작</text>

  <line x1="440" y1="134" x2="440" y2="158" stroke="#7777cc" stroke-width="2" marker-end="url(#txOk)"/>

  <!-- two ops -->
  <rect x="160" y="168" width="240" height="56" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="176" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">A 잔액 -10000 (출금)</text>
  <text x="176" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">UPDATE account ...</text>

  <rect x="480" y="168" width="240" height="56" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="496" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">B 잔액 +10000 (입금)</text>
  <text x="496" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">UPDATE account ...</text>

  <!-- success path -->
  <line x1="280" y1="224" x2="200" y2="290" stroke="#55c555" stroke-width="2" marker-end="url(#txOk)"/>
  <rect x="100" y="300" width="280" height="64" fill="#0e1a0e" stroke="#55c555" stroke-width="1.5" rx="8"/>
  <text x="120" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">commit() — 둘 다 영구 반영</text>
  <text x="120" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">모든 변경이 확정된다</text>

  <!-- fail path -->
  <line x1="600" y1="224" x2="680" y2="290" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#txErr)"/>
  <rect x="500" y="300" width="300" height="64" fill="#1a0e0e" stroke="#e05555" stroke-width="1.5" rx="8"/>
  <text x="520" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e05555">예외 → rollback() — 전부 취소</text>
  <text x="520" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">출금만 되고 입금 누락되는 일 방지</text>

  <text x="60" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">원자성(Atomicity): 부분 성공은 없다 — 전부 아니면 전무.</text>
</svg>
