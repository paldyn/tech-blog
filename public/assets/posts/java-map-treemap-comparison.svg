<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 340">
  <rect width="880" height="340" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">HashMap vs LinkedHashMap vs TreeMap</text>

  <!-- Header -->
  <rect x="60" y="64" width="760" height="40" rx="4" fill="#0f1827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="160" y="89" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">특성</text>
  <text x="360" y="89" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">HashMap</text>
  <text x="560" y="89" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">LinkedHashMap</text>
  <text x="760" y="89" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">TreeMap</text>
  <line x1="260" y1="64" x2="260" y2="104" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="460" y1="64" x2="460" y2="104" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="660" y1="64" x2="660" y2="104" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Rows -->
  <!-- put/get/remove -->
  <rect x="60" y="104" width="760" height="44" rx="0" fill="#0d1420" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="160" y="131" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">put/get/remove</text>
  <text x="360" y="131" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">O(1) 평균</text>
  <text x="560" y="131" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">O(1) 평균</text>
  <text x="760" y="131" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8a020">O(log n)</text>

  <!-- 순서 -->
  <rect x="60" y="148" width="760" height="44" rx="0" fill="#111827" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="160" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">키 순서</text>
  <text x="360" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">없음</text>
  <text x="560" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">삽입/접근 순서</text>
  <text x="760" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178">정렬 순서</text>

  <!-- null 키 -->
  <rect x="60" y="192" width="760" height="44" rx="0" fill="#0d1420" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="160" y="219" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">null 키</text>
  <text x="360" y="219" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">1개 허용</text>
  <text x="560" y="219" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">1개 허용</text>
  <text x="760" y="219" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">불허</text>

  <!-- 범위 쿼리 -->
  <rect x="60" y="236" width="760" height="44" rx="0" fill="#111827" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="160" y="263" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">범위 쿼리</text>
  <text x="360" y="263" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">없음</text>
  <text x="560" y="263" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">없음</text>
  <text x="760" y="263" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">headMap/tailMap/subMap</text>

  <!-- Column dividers -->
  <line x1="260" y1="104" x2="260" y2="280" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="460" y1="104" x2="460" y2="280" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="660" y1="104" x2="660" y2="280" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Note -->
  <text x="440" y="312" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">TreeMap = TreeSet과 동일한 Red-Black Tree | Comparable 또는 Comparator 필요</text>
</svg>
