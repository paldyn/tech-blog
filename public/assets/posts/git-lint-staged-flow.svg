<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">lint-staged 동작 흐름</text>

  <!-- git add -->
  <rect x="310" y="68" width="260" height="52" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="95" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">git add (스테이징)</text>
  <text x="440" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">src/foo.ts, src/bar.tsx, README.md 스테이징</text>

  <line x1="440" y1="120" x2="440" y2="148" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- git commit / pre-commit -->
  <rect x="280" y="150" width="320" height="52" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">pre-commit 훅 → npx lint-staged</text>
  <text x="440" y="193" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Husky에서 호출됨</text>

  <line x1="440" y1="202" x2="440" y2="230" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- pattern match -->
  <rect x="230" y="232" width="420" height="52" rx="8" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="440" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">glob 패턴 매칭</text>
  <text x="440" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">스테이징된 파일만 골라서 패턴에 맞는 명령 실행</text>

  <!-- Three branches -->
  <line x1="280" y1="258" x2="150" y2="316" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <line x1="440" y1="284" x2="440" y2="316" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="600" y1="258" x2="730" y2="316" stroke="#e8c84a" stroke-width="2"/>
  <line x1="730" y1="316" x2="730" y2="316" stroke="#e8c84a" stroke-width="2" marker-end="url(#arr)"/>

  <!-- TS files -->
  <rect x="60" y="318" width="190" height="64" rx="8" fill="#0f1a2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="155" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">*.{ts,tsx}</text>
  <text x="155" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">eslint --fix</text>
  <text x="155" y="375" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">prettier --write</text>

  <!-- CSS files -->
  <rect x="340" y="318" width="200" height="64" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">*.{css,scss}</text>
  <text x="440" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">stylelint --fix</text>
  <text x="440" y="375" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">prettier --write</text>

  <!-- MD files -->
  <rect x="630" y="318" width="190" height="64" rx="8" fill="#1f1a00" stroke="#e8c84a" stroke-width="1.5"/>
  <text x="725" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8c84a">*.md</text>
  <text x="725" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">prettier --write</text>
  <text x="725" y="375" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">(매칭 없으면 스킵)</text>

  <!-- result -->
  <rect x="200" y="410" width="480" height="36" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="433" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">수정된 파일은 자동으로 다시 git add → 커밋에 포함</text>
</svg>
