<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">ESLint 커스텀 규칙 — AST 방문 구조</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">소스 → AST → 노드 방문 → 위반 보고</text>

  <!-- Source code -->
  <rect x="60" y="95" width="200" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="115" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 소스 코드</text>
  <text x="80" y="135" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">function</tspan> greet(name) {</text>
  <text x="80" y="155" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  console.<tspan fill="#55c555">log</tspan>(name)</text>
  <text x="80" y="175" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>
  <text x="80" y="195" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// console.log → 오류</text>

  <line x1="260" y1="150" x2="310" y2="150" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="270" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">파싱</text>

  <!-- AST tree -->
  <text x="450" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">AST 노드 트리</text>

  <rect x="395" y="115" width="110" height="40" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="450" y="140" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7777cc">Program</text>

  <line x1="450" y1="155" x2="450" y2="175" stroke="#888" stroke-width="1.5"/>

  <rect x="375" y="175" width="150" height="40" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="450" y="200" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7777cc">FunctionDeclaration</text>

  <line x1="450" y1="215" x2="450" y2="235" stroke="#888" stroke-width="1.5"/>

  <rect x="375" y="235" width="150" height="40" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="450" y="260" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7777cc">ExpressionStatement</text>

  <line x1="450" y1="275" x2="450" y2="295" stroke="#888" stroke-width="1.5"/>

  <rect x="370" y="295" width="160" height="40" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="450" y="320" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555">CallExpression</text>

  <line x1="620" y1="315" x2="530" y2="315" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="545" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">방문</text>

  <!-- Rule visitor -->
  <rect x="620" y="90" width="220" height="260" rx="8" fill="#1a1a1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="730" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">규칙 방문자(Visitor)</text>
  <text x="636" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">create(context) {</text>
  <text x="636" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">return</tspan> {</text>
  <text x="636" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">    CallExpression(node) {</text>
  <text x="636" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">      <tspan fill="#7ec8e3" font-weight="600">if</tspan> (isConsoleLog(node))</text>
  <text x="636" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">        context.report({</text>
  <text x="636" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">          node,</text>
  <text x="636" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve">          messageId: 'noConsole'</text>
  <text x="636" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">        })</text>
  <text x="636" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">    }</text>
  <text x="636" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  }</text>
  <text x="636" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">}</text>

  <!-- Output -->
  <rect x="60" y="420" width="760" height="72" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="76" y="443" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" xml:space="preserve">error  Unexpected console statement  my-plugin/no-console-log</text>
  <text x="76" y="463" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">  3:3  error  greet (line 3, col 3)</text>
  <text x="76" y="483" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">✖ 1 problem (1 error, 0 warnings)</text>
</svg>
