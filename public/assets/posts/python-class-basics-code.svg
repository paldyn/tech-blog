<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">클래스 정의와 사용 예제</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">Dog 클래스 전체 코드</text>

  <!-- Code block left -->
  <rect x="60" y="90" width="380" height="330" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="116" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">class </text>
  <text x="124" y="116" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">Dog:</text>
  <text x="80" y="134" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    species = </text>
  <text x="170" y="134" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ce9178" xml:space="preserve">"Canis lupus"</text>
  <text x="80" y="152" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    </text>
  <text x="80" y="170" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">    def </text>
  <text x="120" y="170" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">__init__(self, name, age):</text>
  <text x="80" y="188" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">        self.name = name</text>
  <text x="80" y="206" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">        self.age  = age</text>
  <text x="80" y="224" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    </text>
  <text x="80" y="242" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">    def </text>
  <text x="120" y="242" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">bark(self):</text>
  <text x="80" y="260" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">        return </text>
  <text x="148" y="260" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ce9178" xml:space="preserve">f"</text>
  <text x="164" y="260" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">{self.name}</text>
  <text x="240" y="260" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ce9178" xml:space="preserve"> says Woof!"</text>
  <text x="80" y="278" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    </text>
  <text x="80" y="296" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">    def </text>
  <text x="120" y="296" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">info(self):</text>
  <text x="80" y="314" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">        return </text>
  <text x="148" y="314" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ce9178" xml:space="preserve">f"</text>
  <text x="164" y="314" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">{self.name}(</text>
  <text x="232" y="314" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">{self.age}</text>
  <text x="290" y="314" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ce9178" xml:space="preserve">)"</text>
  <text x="80" y="332" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    </text>
  <text x="80" y="350" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 인스턴스 생성</text>
  <text x="80" y="368" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">d = Dog(</text>
  <text x="134" y="368" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ce9178" xml:space="preserve">"Rex"</text>
  <text x="172" y="368" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">, </text>
  <text x="186" y="368" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#b5cea8" xml:space="preserve">3</text>
  <text x="196" y="368" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">)</text>
  <text x="80" y="386" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">print(d.bark())   </text>
  <text x="80" y="404" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">print(d.info())</text>

  <!-- Right annotations -->
  <rect x="480" y="90" width="340" height="330" rx="8" fill="#0d1117" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="500" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">출력 결과</text>
  <rect x="500" y="126" width="300" height="50" rx="4" fill="#000000" stroke="#3a4a6e"/>
  <text x="516" y="146" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#55c555" xml:space="preserve">Rex says Woof!</text>
  <text x="516" y="164" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#55c555" xml:space="preserve">Rex(3)</text>

  <text x="500" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">핵심 포인트</text>
  <text x="514" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• class 키워드로 새 타입 정의</text>
  <text x="514" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• species = 클래스 속성 (공유)</text>
  <text x="514" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• self.name = 인스턴스 속성</text>
  <text x="514" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• def bark(self) = 메서드</text>
  <text x="514" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• Dog("Rex", 3) → 인스턴스 생성</text>

  <text x="500" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">타입 확인</text>
  <rect x="500" y="342" width="300" height="66" rx="4" fill="#000000" stroke="#3a4a6e"/>
  <text x="516" y="360" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">type(d)        </text>
  <text x="516" y="378" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># &lt;class '__main__.Dog'&gt;</text>
  <text x="516" y="396" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">isinstance(d, Dog) </text>
</svg>
