<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700" xml:space="preserve">층별 행렬 연산과 순전파(Forward Pass)</text>
  <text x="440" y="70" text-anchor="middle" fill="#888" font-size="13" xml:space="preserve">각 층의 출력 = 활성화함수( 가중치행렬 × 입력 + 편향 )</text>

  <!-- Code block -->
  <rect x="60" y="88" width="760" height="240" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <!-- Line 1 -->
  <text x="76" y="106" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">import</tspan> torch</text>
  <text x="76" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">import</tspan> torch.nn <tspan fill="#7ec8e3">as</tspan> nn</text>
  <!-- blank -->
  <text x="76" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#9aa4b8"># 3층 신경망: 4 → 5 → 4 → 3</tspan></text>
  <text x="76" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3">class</tspan> <tspan fill="#ffffff">SimpleNet</tspan>(nn.Module):</text>
  <text x="76" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3">def</tspan> <tspan fill="#55c555">__init__</tspan>(self):</text>
  <text x="76" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    super().__init__()</text>
  <text x="76" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    self.fc1 = nn.Linear(<tspan fill="#b5cea8">4</tspan>, <tspan fill="#b5cea8">5</tspan>)</text>
  <text x="76" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    self.fc2 = nn.Linear(<tspan fill="#b5cea8">5</tspan>, <tspan fill="#b5cea8">4</tspan>)</text>
  <text x="76" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    self.fc3 = nn.Linear(<tspan fill="#b5cea8">4</tspan>, <tspan fill="#b5cea8">3</tspan>)</text>
  <text x="76" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3">def</tspan> <tspan fill="#55c555">forward</tspan>(self, x):</text>
  <text x="76" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    x = torch.relu(self.fc1(x))</text>
  <text x="76" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    x = torch.relu(self.fc2(x))</text>
  <text x="76" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">return</tspan> self.fc3(x)</text>

  <!-- Layer math annotation boxes -->
  <rect x="60" y="346" width="350" height="66" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="235" y="368" text-anchor="middle" fill="#888" font-size="12" xml:space="preserve">층 연산 수식</text>
  <text x="235" y="388" text-anchor="middle" fill="#e8e8e8" font-size="13" font-weight="600" xml:space="preserve">a⁽ˡ⁾ = f(W⁽ˡ⁾ · a⁽ˡ⁻¹⁾ + b⁽ˡ⁾)</text>
  <text x="235" y="406" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">a: 활성값  W: 가중치  b: 편향  f: 활성화함수</text>

  <rect x="470" y="346" width="350" height="66" rx="8" fill="#0c1a0c" stroke="#55c555" stroke-width="1.5"/>
  <text x="645" y="368" text-anchor="middle" fill="#888" font-size="12" xml:space="preserve">파이토치 행렬 차원</text>
  <text x="645" y="388" text-anchor="middle" fill="#55c555" font-size="13" font-weight="600" xml:space="preserve">x: (B, 4)  →  (B, 5)  →  (B, 4)  →  (B, 3)</text>
  <text x="645" y="406" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">B = 배치 크기 (동시에 처리하는 샘플 수)</text>

  <!-- Footer -->
</svg>
