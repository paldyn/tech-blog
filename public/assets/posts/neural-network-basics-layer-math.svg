<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700" xml:space="preserve">мёөлі„ н–үл ¬ м—°мӮ°кіј мҲңм „нҢҢ(Forward Pass)</text>
  <text x="440" y="70" text-anchor="middle" fill="#888" font-size="13" xml:space="preserve">к°Ғ мёөмқҳ м¶ңл Ҙ = нҷңм„ұнҷ”н•ЁмҲҳ( к°ҖмӨ‘м№ҳн–үл ¬ Г— мһ…л Ҙ + нҺён–Ҙ )</text>

  <!-- Code block -->
  <rect x="60" y="88" width="760" height="240" rx="6" fill="#070b14" stroke="#1e2433"/>

  <!-- Line 1 -->
  <text x="76" y="106" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><tspan fill="#7ec8e3">import</tspan> torch</text>
  <text x="76" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><tspan fill="#7ec8e3">import</tspan> torch.nn <tspan fill="#7ec8e3">as</tspan> nn</text>
  <!-- blank -->
  <text x="76" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><tspan fill="#6a8aa0"># 3мёө мӢ кІҪл§қ: 4 вҶ’ 5 вҶ’ 4 вҶ’ 3</tspan></text>
  <text x="76" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"><tspan fill="#7ec8e3">class</tspan> <tspan fill="#e8e8e8">SimpleNet</tspan>(nn.Module):</text>
  <text x="76" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  <tspan fill="#7ec8e3">def</tspan> <tspan fill="#55c555">__init__</tspan>(self):</text>
  <text x="76" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    super().__init__()</text>
  <text x="76" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    self.fc1 = nn.Linear(<tspan fill="#b5cea8">4</tspan>, <tspan fill="#b5cea8">5</tspan>)</text>
  <text x="76" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    self.fc2 = nn.Linear(<tspan fill="#b5cea8">5</tspan>, <tspan fill="#b5cea8">4</tspan>)</text>
  <text x="76" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    self.fc3 = nn.Linear(<tspan fill="#b5cea8">4</tspan>, <tspan fill="#b5cea8">3</tspan>)</text>
  <text x="76" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  <tspan fill="#7ec8e3">def</tspan> <tspan fill="#55c555">forward</tspan>(self, x):</text>
  <text x="76" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    x = torch.relu(self.fc1(x))</text>
  <text x="76" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    x = torch.relu(self.fc2(x))</text>
  <text x="76" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">    <tspan fill="#7ec8e3">return</tspan> self.fc3(x)</text>

  <!-- Layer math annotation boxes -->
  <rect x="60" y="346" width="350" height="66" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="235" y="368" text-anchor="middle" fill="#888" font-size="12" xml:space="preserve">мёө м—°мӮ° мҲҳмӢқ</text>
  <text x="235" y="388" text-anchor="middle" fill="#e8e8e8" font-size="13" font-weight="600" xml:space="preserve">aвҒҪЛЎвҒҫ = f(WвҒҪЛЎвҒҫ В· aвҒҪЛЎвҒ»В№вҒҫ + bвҒҪЛЎвҒҫ)</text>
  <text x="235" y="406" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">a: нҷңм„ұк°’  W: к°ҖмӨ‘м№ҳ  b: нҺён–Ҙ  f: нҷңм„ұнҷ”н•ЁмҲҳ</text>

  <rect x="470" y="346" width="350" height="66" rx="8" fill="#0c1a0c" stroke="#55c555" stroke-width="1.5"/>
  <text x="645" y="368" text-anchor="middle" fill="#888" font-size="12" xml:space="preserve">нҢҢмқҙнҶ м№ҳ н–үл ¬ м°Ёмӣҗ</text>
  <text x="645" y="388" text-anchor="middle" fill="#55c555" font-size="13" font-weight="600" xml:space="preserve">x: (B, 4)  вҶ’  (B, 5)  вҶ’  (B, 4)  вҶ’  (B, 3)</text>
  <text x="645" y="406" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">B = л°°м№ҳ нҒ¬кё° (лҸҷмӢңм—җ мІҳлҰ¬н•ҳлҠ” мғҳн”Ң мҲҳ)</text>

  <!-- Footer -->
  <text x="440" y="448" text-anchor="middle" fill="#444" font-size="11" xml:space="preserve">PALDYN В· AI мҷ„м „ м •ліө мӢңлҰ¬мҰҲ</text>
</svg>
