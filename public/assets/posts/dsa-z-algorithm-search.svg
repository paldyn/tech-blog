<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Z-알고리즘으로 패턴 검색</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">패턴 + '#' + 텍스트 연결 후 Z 배열 — 값이 |패턴|이면 매칭</text>

  <!-- Concatenated string -->
  <text x="60" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">연결 문자열 s = pat + "#" + text = "abc#xxabcxx"</text>

  <rect x="60" y="116" width="48" height="40" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="2" rx="3"/>
  <text x="84" y="141" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#7ec8e3">a</text>
  <rect x="112" y="116" width="48" height="40" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="2" rx="3"/>
  <text x="136" y="141" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#7ec8e3">b</text>
  <rect x="164" y="116" width="48" height="40" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="2" rx="3"/>
  <text x="188" y="141" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#7ec8e3">c</text>
  <rect x="216" y="116" width="48" height="40" fill="#2a1a1a" stroke="#e05555" stroke-width="2" rx="3"/>
  <text x="240" y="141" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#e05555">#</text>
  <rect x="268" y="116" width="48" height="40" fill="#111" stroke="#333" stroke-width="1" rx="3"/>
  <text x="292" y="141" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#e8e8e8">x</text>
  <rect x="320" y="116" width="48" height="40" fill="#111" stroke="#333" stroke-width="1" rx="3"/>
  <text x="344" y="141" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#e8e8e8">x</text>
  <rect x="372" y="116" width="48" height="40" fill="#1a2a1a" stroke="#55c555" stroke-width="2" rx="3"/>
  <text x="396" y="141" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#55c555">a</text>
  <rect x="424" y="116" width="48" height="40" fill="#1a2a1a" stroke="#55c555" stroke-width="2" rx="3"/>
  <text x="448" y="141" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#55c555">b</text>
  <rect x="476" y="116" width="48" height="40" fill="#1a2a1a" stroke="#55c555" stroke-width="2" rx="3"/>
  <text x="500" y="141" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#55c555">c</text>
  <rect x="528" y="116" width="48" height="40" fill="#111" stroke="#333" stroke-width="1" rx="3"/>
  <text x="552" y="141" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#e8e8e8">x</text>
  <rect x="580" y="116" width="48" height="40" fill="#111" stroke="#333" stroke-width="1" rx="3"/>
  <text x="604" y="141" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="15" fill="#e8e8e8">x</text>

  <!-- Z values row -->
  <text x="60" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Z값:</text>

  <text x="84" y="174" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">11</text>
  <text x="136" y="174" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">0</text>
  <text x="188" y="174" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">0</text>
  <text x="240" y="174" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">0</text>
  <text x="292" y="174" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">0</text>
  <text x="344" y="174" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">0</text>
  <text x="396" y="174" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">3</text>
  <text x="448" y="174" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">0</text>
  <text x="500" y="174" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">0</text>
  <text x="552" y="174" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">0</text>
  <text x="604" y="174" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">0</text>

  <text x="390" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Z[6]=3 == |패턴|=3 → 텍스트 위치 6-4=2 에서 매칭!</text>

  <!-- Code -->
  <rect x="60" y="216" width="460" height="136" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="76" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">def</text>
  <text x="104" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"> z_search(text, pattern):</text>
  <text x="76" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">    s = pattern + "#" + text</text>
  <text x="76" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">    z = z_function(s)</text>
  <text x="76" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve">    m = len(pattern)</text>
  <text x="76" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">    return</text>
  <text x="120" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"> [i-m-1</text>
  <text x="76" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">            for</text>
  <text x="140" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"> i,v in enumerate(z)</text>
  <text x="76" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" font-weight="600" fill="#7ec8e3" xml:space="preserve">            if</text>
  <text x="120" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"> v == m and i &gt; m]</text>

  <!-- Comparison with KMP -->
  <rect x="540" y="216" width="300" height="136" fill="#111" stroke="#2a3a2a" stroke-width="1" rx="6"/>
  <text x="690" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">Z vs KMP 비교</text>
  <text x="556" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">전처리: 둘 다 O(m)</text>
  <text x="556" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">탐색: 둘 다 O(n)</text>
  <text x="556" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">Z: 직관적, 쉬운 구현</text>
  <text x="556" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">KMP: 실패 함수 직접 활용</text>
  <text x="556" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">실용: 취향/팀 표준 따름</text>
</svg>
