<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-l" viewBox="0 0 14 14" refX="2" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 14 0 L 1 7 L 14 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">스위치의 MAC 주소 테이블</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">스위치는 학습을 통해 포트와 MAC 주소를 매핑</text>

  <!-- Switch box -->
  <rect x="340" y="140" width="200" height="80" rx="10" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">스위치</text>
  <text x="440" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">MAC 주소 테이블 보유</text>
  <text x="440" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">포트 1·2·3·4</text>

  <!-- PC A -->
  <rect x="60" y="150" width="140" height="60" rx="8" fill="#0f1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">PC-A</text>
  <text x="130" y="196" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">AA:AA:AA:AA:AA:AA</text>

  <!-- PC B -->
  <rect x="680" y="150" width="140" height="60" rx="8" fill="#0f1a14" stroke="#55c555" stroke-width="1.5"/>
  <text x="750" y="176" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">PC-B</text>
  <text x="750" y="196" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">BB:BB:BB:BB:BB:BB</text>

  <!-- arrows A -> Switch -> B -->
  <line x1="200" y1="180" x2="338" y2="180" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-r)"/>
  <text x="269" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">포트 1</text>

  <line x1="542" y1="180" x2="678" y2="180" stroke="#55c555" stroke-width="2" marker-end="url(#arr-r)"/>
  <text x="610" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">포트 2</text>

  <!-- MAC address table -->
  <rect x="200" y="265" width="480" height="130" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">MAC 주소 테이블 (CAM Table)</text>

  <!-- table header -->
  <line x1="210" y1="298" x2="670" y2="298" stroke="#333" stroke-width="1"/>
  <text x="280" y="314" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">포트</text>
  <text x="490" y="314" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">MAC 주소</text>
  <line x1="210" y1="320" x2="670" y2="320" stroke="#333" stroke-width="1"/>

  <!-- table rows -->
  <text x="280" y="340" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">1</text>
  <text x="490" y="340" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">AA:AA:AA:AA:AA:AA</text>

  <text x="280" y="362" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">2</text>
  <text x="490" y="362" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">BB:BB:BB:BB:BB:BB</text>

  <text x="440" y="395" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">처음 프레임 수신 시 출발지 MAC + 포트 번호를 학습해 테이블에 등록</text>
</svg>
