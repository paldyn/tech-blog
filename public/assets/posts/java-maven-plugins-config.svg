  <text x="76" y="202" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >      <tspan fill="#7ec8e3" font-weight="600">&lt;artifactId&gt;</tspan>maven-shade-plugin<tspan fill="#7ec8e3" font-weight="600">&lt;/artifactId&gt;</tspan></text>
  <text x="76" y="220" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >      <tspan fill="#7ec8e3" font-weight="600">&lt;version&gt;</tspan><tspan fill="#ce9178">3.5.0</tspan><tspan fill="#7ec8e3" font-weight="600">&lt;/version&gt;</tspan></text>
  <text x="76" y="238" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >      <tspan fill="#7ec8e3" font-weight="600">&lt;executions&gt;</tspan></text>
  <text x="76" y="256" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >        <tspan fill="#7ec8e3" font-weight="600">&lt;execution&gt;</tspan></text>
  <text x="76" y="274" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >          <tspan fill="#7ec8e3" font-weight="600">&lt;phase&gt;</tspan>package<tspan fill="#7ec8e3" font-weight="600">&lt;/phase&gt;</tspan></text>
  <text x="76" y="292" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >          <tspan fill="#7ec8e3" font-weight="600">&lt;goals&gt;</tspan></text>
  <text x="76" y="310" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >            <tspan fill="#7ec8e3" font-weight="600">&lt;goal&gt;</tspan>shade<tspan fill="#7ec8e3" font-weight="600">&lt;/goal&gt;</tspan></text>
  <text x="76" y="328" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >          <tspan fill="#7ec8e3" font-weight="600">&lt;/goals&gt;</tspan></text>
  <text x="76" y="346" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >        <tspan fill="#7ec8e3" font-weight="600">&lt;/execution&gt;</tspan></text>
  <text x="76" y="364" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >      <tspan fill="#7ec8e3" font-weight="600">&lt;/executions&gt;</tspan></text>
  <text x="76" y="382" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >    <tspan fill="#7ec8e3" font-weight="600">&lt;/plugin&gt;</tspan></text>
  <text x="76" y="400" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >  <tspan fill="#7ec8e3" font-weight="600">&lt;/plugins&gt;</tspan></text>
  <text x="76" y="418" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  ><tspan fill="#7ec8e3" font-weight="600">&lt;/build&gt;</tspan></text>
  <text x="76" y="444" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"
  ><tspan fill="#9aa4b8">&lt;!-- mvn package → shade goal 자동 실행 --&gt;</tspan></text>

  <!-- Right side: annotation boxes -->
  <!-- Coordinates box -->
  <rect x="548" y="96" width="272" height="70" rx="8" fill="#0a0a0a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="684" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">플러그인 좌표</text>
  <text x="684" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">groupId + artifactId + version</text>
  <text x="684" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8" text-anchor="middle">의존성과 동일한 방식으로 선언</text>

  <!-- Arrow from coord box to code line -->
  <line x1="548" y1="171" x2="500" y2="202" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrC)"/>

  <!-- Execution box -->
  <rect x="548" y="210" width="272" height="84" rx="8" fill="#0a0a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="684" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">execution</text>
  <text x="684" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">goal을 어느 phase에 바인딩할지</text>
  <text x="684" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8" text-anchor="middle">여러 execution 블록 선언 가능</text>
  <text x="684" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">id 로 구분 (선택)</text>

  <!-- Arrow from execution box to code -->
  <line x1="548" y1="256" x2="500" y2="265" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrG)"/>

  <!-- Configuration box -->
  <rect x="548" y="322" width="272" height="70" rx="8" fill="#0a0a0a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="684" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">configuration</text>
  <text x="684" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">플러그인별 파라미터 설정</text>
  <text x="684" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8" text-anchor="middle">execution 밖이면 전역 적용</text>

  <!-- Bottom hint -->
  <rect x="60" y="476" width="760" height="54" rx="8" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="498" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">유용한 플러그인 빠른 참조</text>
  <text x="440" y="518" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">shade(fat-jar) · assembly · failsafe · exec · versions · enforcer · spring-boot</text>
</svg>
