  <!-- Footer row -->
  <rect x="60" y="278" width="760" height="38" fill="#1a2033"/>
  <text x="120" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e0a030" text-anchor="middle">총 4건</text>
  <text x="390" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">합계</text>
  <text x="630" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e0a030" text-anchor="end">16,100,000</text>
  <text x="810" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e0a030" text-anchor="end">1,610,000</text>

  <!-- Average footer row -->
  <line x1="60" y1="316" x2="820" y2="316" stroke="#253555" stroke-width="1"/>
  <rect x="60" y="316" width="760" height="36" fill="#1e2040"/>
  <text x="390" y="339" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">평균</text>
  <text x="630" y="339" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" text-anchor="end">4,025,000</text>
  <text x="810" y="339" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" text-anchor="end">402,500</text>

  <!-- Band labels -->
  <rect x="62" y="92" width="38" height="18" fill="#1e3060" rx="3"/>
  <text x="81" y="105" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" font-weight="600" fill="#7ec8e3" text-anchor="middle">head</text>
  <rect x="62" y="280" width="38" height="18" fill="#2a2a50" rx="3"/>
  <text x="81" y="293" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" font-weight="600" fill="#e0a030" text-anchor="middle">footer</text>
  <rect x="62" y="318" width="38" height="18" fill="#252540" rx="3"/>
  <text x="81" y="331" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" font-weight="600" fill="#7777cc" text-anchor="middle">footer</text>

  <!-- Body label -->
  <rect x="783" y="130" width="35" height="146" fill="#1a2030" rx="3"/>
  <text x="800" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" font-weight="600" fill="#888" text-anchor="middle" transform="rotate(90 800 208)">body</text>

  <!-- Summary indicator -->
  <text x="440" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">footer 밴드에 sumText/avgText/countText 속성으로 집계 공식을 지정합니다</text>
  <text x="440" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">여러 footer 행을 선언해 합계·평균·건수를 각각 다른 행에 표시 가능</text>
</svg>
