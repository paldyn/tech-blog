<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Grid 합계 행(Summary/Footer) 구조</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">sumText · avgText · countText · 집계 함수 활용</text>

  <!-- Grid mock -->
  <rect x="60" y="90" width="760" height="310" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>

  <!-- Head row -->
  <rect x="60" y="90" width="760" height="38" fill="#1a2744" rx="8"/>
  <rect x="60" y="110" width="760" height="18" fill="#1a2744"/>
  <text x="120" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">사번</text>
  <text x="240" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">성명</text>
  <text x="390" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">부서</text>
  <text x="560" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">급여</text>
  <text x="700" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">성과급</text>
  <line x1="60" y1="128" x2="820" y2="128" stroke="#253555" stroke-width="1"/>

  <!-- Column separators -->
  <line x1="180" y1="90" x2="180" y2="400" stroke="#1a2030" stroke-width="1"/>
  <line x1="300" y1="90" x2="300" y2="400" stroke="#1a2030" stroke-width="1"/>
  <line x1="480" y1="90" x2="480" y2="400" stroke="#1a2030" stroke-width="1"/>
  <line x1="640" y1="90" x2="640" y2="400" stroke="#1a2030" stroke-width="1"/>

  <!-- Body rows -->
  <rect x="60" y="128" width="760" height="34" fill="#0e1420"/>
  <text x="120" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">E001</text>
  <text x="240" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">홍길동</text>
  <text x="390" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">개발팀</text>
  <text x="630" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="end">4,500,000</text>
  <text x="810" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="end">450,000</text>
  <line x1="60" y1="162" x2="820" y2="162" stroke="#1a2030" stroke-width="1"/>

  <rect x="60" y="162" width="760" height="34" fill="#111827"/>
  <text x="120" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">E002</text>
  <text x="240" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">김철수</text>
  <text x="390" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">기획팀</text>
  <text x="630" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="end">3,800,000</text>
  <text x="810" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="end">380,000</text>
  <line x1="60" y1="196" x2="820" y2="196" stroke="#1a2030" stroke-width="1"/>

  <rect x="60" y="196" width="760" height="34" fill="#0e1420"/>
  <text x="120" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">E003</text>
  <text x="240" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">이영희</text>
  <text x="390" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">개발팀</text>
  <text x="630" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="end">4,200,000</text>
  <text x="810" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="end">420,000</text>
  <line x1="60" y1="230" x2="820" y2="230" stroke="#1a2030" stroke-width="1"/>

  <rect x="60" y="230" width="760" height="34" fill="#111827"/>
  <text x="120" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">E004</text>
  <text x="240" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">박민수</text>
  <text x="390" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">영업팀</text>
  <text x="630" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="end">3,600,000</text>
  <text x="810" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="end">360,000</text>

  <!-- Footer / Summary divider -->
