<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Job 라이프사이클 &amp; CronJob 스케줄</text>
  <text x="440" y="66" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">완료(Complete) 또는 실패(Failed) 상태가 되면 Job은 종료됩니다</text>

  <!-- Job lifecycle: horizontal -->
  <!-- Created -->
  <rect x="60" y="100" width="120" height="60" rx="8" fill="#121e38" stroke="#7ec8e3" stroke-width="2"/>
  <text x="120" y="126" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">Created</text>
  <text x="120" y="146" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">Job 오브젝트</text>

  <line x1="182" y1="130" x2="228" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Pending -->
  <rect x="230" y="100" width="120" height="60" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="290" y="126" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">Pending</text>
  <text x="290" y="146" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">Pod 스케줄 대기</text>

  <line x1="352" y1="130" x2="398" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Running -->
  <rect x="400" y="100" width="120" height="60" rx="8" fill="#0d1e38" stroke="#7ec8e3" stroke-width="2"/>
  <text x="460" y="126" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">Running</text>
  <text x="460" y="146" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">작업 실행 중</text>

  <!-- Running → Complete -->
  <line x1="522" y1="120" x2="590" y2="100" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <!-- Running → Failed -->
  <line x1="522" y1="150" x2="590" y2="170" stroke="#e05555" stroke-width="2" marker-end="url(#arr-r)"/>

  <!-- Complete -->
  <rect x="592" y="80" width="120" height="60" rx="8" fill="#0d1e0d" stroke="#55c555" stroke-width="2"/>
  <text x="652" y="106" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">Complete</text>
  <text x="652" y="126" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">exitCode: 0</text>

  <!-- Failed -->
  <rect x="592" y="154" width="120" height="60" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="652" y="180" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">Failed</text>
  <text x="652" y="200" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">재시도 or 종료</text>

  <!-- Retry arrow -->
  <path d="M 652 214 Q 730 250 530 200 Q 440 185 460 162" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" fill="none" marker-end="url(#arr-r)"/>
  <text x="680" y="248" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">backoffLimit 이내 재시도</text>

  <!-- CronJob section -->
  <rect x="60" y="270" width="760" height="180" rx="8" fill="#0d1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="294" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e8e8e8">CronJob 스케줄 예시</text>

  <!-- Cron examples in 2 cols -->
  <text x="120" y="322"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">schedule</text>
  <text x="240" y="322"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">설명</text>

  <text x="120" y="342"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">"0 * * * *"</text>
  <text x="280" y="342"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8">매시 정각</text>

  <text x="120" y="360"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">"0 3 * * *"</text>
  <text x="280" y="360"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8">매일 오전 3시</text>

  <text x="120" y="378"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">"0 3 * * 0"</text>
  <text x="280" y="378"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8">매주 일요일 오전 3시</text>

  <text x="120" y="396"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">"*/5 * * * *"</text>
  <text x="280" y="396"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8">5분마다</text>

  <text x="120" y="414"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">"@daily"</text>
  <text x="280" y="414"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8">하루 한번 (= "0 0 * * *")</text>

  <!-- Right col: concurrencyPolicy -->
  <text x="500" y="322"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">concurrencyPolicy</text>

  <text x="500" y="342"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">Allow</text>
  <text x="580" y="342"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">동시 실행 허용 (기본)</text>

  <text x="500" y="362"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555">Forbid</text>
  <text x="580" y="362"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">이전 실행 중이면 스킵</text>

  <text x="500" y="382"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555">Replace</text>
  <text x="590" y="382"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">이전 Job 삭제 후 새 Job</text>
</svg>
