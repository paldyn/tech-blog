<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="340" rx="12" fill="#0a0a0a"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">대소문자만 다른 파일의 함정</text>
  <text x="60" y="78" font-size="16" font-weight="600" fill="#888">Git은 구분하지만 macOS·Windows 파일시스템은 구분하지 않는다</text>

  <!-- git view -->
  <rect x="60" y="110" width="350" height="150" rx="10" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="140" font-size="15" font-weight="600" fill="#7ec8e3">Git 저장소 (case-sensitive)</text>
  <text x="80" y="174" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" fill="#ffffff">README.md</text>
  <text x="80" y="200" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" fill="#ffffff">Readme.md</text>
  <text x="80" y="240" font-size="13" fill="#9aa4b8">두 개의 다른 파일로 추적</text>

  <!-- fs view -->
  <rect x="470" y="110" width="350" height="150" rx="10" fill="#000000" stroke="#e05555" stroke-width="1.5"/>
  <text x="490" y="140" font-size="15" font-weight="600" fill="#e05555">로컬 FS (case-insensitive)</text>
  <text x="490" y="174" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" fill="#ffffff">readme.md</text>
  <text x="490" y="214" font-size="13" fill="#9aa4b8">하나로 합쳐져 덮어쓰임,</text>
  <text x="490" y="236" font-size="13" fill="#9aa4b8">checkout 시 충돌·유실</text>

  <text x="60" y="300" font-size="13" fill="#888">CI(Linux)에선 둘 다 보이지만 개발자 로컬에선 하나만 보여 혼란이 생긴다</text>
  <text x="60" y="326" font-size="13" fill="#888">대소문자 변경은 일반 rename으로 인식되지 않으니 명시적으로 처리해야 한다</text>
</svg>
