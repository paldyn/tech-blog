  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">typeof · instanceof · 타입 가드로 타입 범위를 좁힌다</text>

  <!-- Left code: typeof narrowing -->
