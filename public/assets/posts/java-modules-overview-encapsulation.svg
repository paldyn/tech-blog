<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">강한 캡슐화 — exports한 패키지만 공개</text>

  <defs>
    <marker id="okArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- module container -->
  <rect x="60" y="84" width="420" height="196" rx="10" fill="#0d1322" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="114" font-size="15" font-weight="600" fill="#7ec8e3">module service</text>

  <!-- exported package -->
  <rect x="84" y="132" width="372" height="56" rx="8" fill="#101a12" stroke="#55c555" stroke-width="1.5"/>
  <text x="100" y="158" font-size="14" fill="#e8e8e8">service.api</text>
  <text x="100" y="178" font-size="12" fill="#55c555">exports — 외부 공개</text>

  <!-- concealed package -->
  <rect x="84" y="200" width="372" height="56" rx="8" fill="#1a1010" stroke="#e05555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="100" y="226" font-size="14" fill="#e8e8e8">service.internal</text>
  <text x="100" y="246" font-size="12" fill="#e05555">concealed — 모듈 내부 전용</text>

  <!-- consumer -->
  <rect x="600" y="138" width="220" height="88" rx="10" fill="#0f1626" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="710" y="178" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">다른 모듈</text>
  <text x="710" y="200" font-size="12" fill="#888" text-anchor="middle">requires service</text>

  <!-- allowed arrow -->
  <line x1="598" y1="160" x2="460" y2="160" stroke="#55c555" stroke-width="2" marker-end="url(#okArr)"/>
  <text x="529" y="150" font-size="12" fill="#55c555" text-anchor="middle">접근 OK</text>

  <!-- blocked arrow -->
  <line x1="598" y1="224" x2="500" y2="224" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="478" y="228" font-size="18" font-weight="700" fill="#e05555" text-anchor="middle">✕</text>
  <text x="545" y="248" font-size="12" fill="#e05555" text-anchor="middle">접근 차단</text>
</svg>
