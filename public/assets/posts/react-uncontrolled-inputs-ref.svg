<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">비제어 컴포넌트 실전 패턴</text>

  <!-- useRef + input diagram -->
  <rect x="60" y="72" width="360" height="300" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="240" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">폼 제출 패턴</text>
  <rect x="76" y="108" width="328" height="252" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="128" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve" fill="#ffffff">
    <tspan x="92" dy="0"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> SignupForm() {</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> nameRef = useRef(</tspan><tspan fill="#b5cea8">null</tspan><tspan fill="#ffffff">);</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> emailRef = useRef(</tspan><tspan fill="#b5cea8">null</tspan><tspan fill="#ffffff">);</tspan></tspan>
    <tspan x="92" dy="20"> </tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> handleSubmit(e) {</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">    e.preventDefault();</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">    console.log({</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">      name: nameRef.current.value,</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">      email: emailRef.current.value,</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">    });</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">  }</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> (</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">    &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">form</tspan><tspan fill="#ffffff"> onSubmit={handleSubmit}&gt;</tspan></tspan>
  </text>

  <!-- Right: Use cases -->
  <rect x="460" y="72" width="360" height="300" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="640" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">비제어 컴포넌트가 적합한 경우</text>

  <rect x="476" y="110" width="328" height="56" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="492" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">파일 업로드</text>
  <text x="492" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">&lt;input type="file" ref={fileRef} /&gt; — 제어 불가</text>

  <rect x="476" y="180" width="328" height="56" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="492" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">서드파티 DOM 라이브러리 연동</text>
  <text x="492" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Chart.js · DatePicker 등 직접 DOM 조작</text>

  <rect x="476" y="250" width="328" height="56" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="492" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">성능이 극도로 중요한 폼</text>
  <text x="492" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">키 입력마다 리렌더 없이 제출 시만 읽기</text>

  <rect x="476" y="320" width="328" height="40" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="640" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">실시간 유효성 검사·조건부 UI → 제어 컴포넌트 사용</text>

  <!-- Bottom bar -->
  <rect x="60" y="392" width="760" height="0" rx="0" fill="none"/>
</svg>
