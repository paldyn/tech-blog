  <!-- 170(0), 90(0), 802(2), 2(2), 24(4), 45(5), 75(5), 66(6) -->
  <rect x="300" y="90" width="80" height="38" rx="5" fill="#1a2030" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="340" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">170</text>
  <rect x="300" y="132" width="80" height="38" rx="5" fill="#1a2030" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="340" y="157" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">90</text>
  <rect x="300" y="174" width="80" height="38" rx="5" fill="#1a2030" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="340" y="199" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">802</text>
  <rect x="300" y="216" width="80" height="38" rx="5" fill="#1a2030" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="340" y="241" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">2</text>
  <rect x="300" y="258" width="80" height="38" rx="5" fill="#1a2030" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="340" y="283" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">24</text>
  <rect x="300" y="300" width="80" height="38" rx="5" fill="#1a2030" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="340" y="325" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">45</text>
  <rect x="300" y="342" width="80" height="38" rx="5" fill="#1a2030" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="340" y="367" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">75</text>
  <rect x="300" y="384" width="80" height="38" rx="5" fill="#1a2030" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="340" y="409" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">66</text>

  <!-- Label: ones digit -->
  <text x="340" y="450" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">1의 자리 기준</text>
  <text x="340" y="466" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">0,0,2,2,4,5,5,6</text>

  <!-- Arrow 2 -->
  <line x1="388" y1="250" x2="418" y2="250" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- After pass 2: sort by digit 1 (tens) -->
  <!-- 2(0), 802(0), 24(2), 45(4), 66(6), 170(7), 75(7), 90(9) -->
  <rect x="530" y="90" width="80" height="38" rx="5" fill="#1f1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="570" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc">2</text>
  <rect x="530" y="132" width="80" height="38" rx="5" fill="#1f1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="570" y="157" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc">802</text>
  <rect x="530" y="174" width="80" height="38" rx="5" fill="#1f1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="570" y="199" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc">24</text>
  <rect x="530" y="216" width="80" height="38" rx="5" fill="#1f1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="570" y="241" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc">45</text>
  <rect x="530" y="258" width="80" height="38" rx="5" fill="#1f1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="570" y="283" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc">66</text>
  <rect x="530" y="300" width="80" height="38" rx="5" fill="#1f1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="570" y="325" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc">170</text>
  <rect x="530" y="342" width="80" height="38" rx="5" fill="#1f1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="570" y="367" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc">75</text>
  <rect x="530" y="384" width="80" height="38" rx="5" fill="#1f1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="570" y="409" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc">90</text>

  <text x="570" y="450" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">10의 자리 기준</text>
  <text x="570" y="466" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">0,0,2,4,6,7,7,9</text>

  <!-- Arrow 3 -->
  <line x1="618" y1="250" x2="648" y2="250" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- After pass 3: sort by digit 2 (hundreds) -->
  <!-- 2,24,45,66,75,90,170,802 -->
  <rect x="730" y="90" width="80" height="38" rx="5" fill="#1a2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="770" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">2</text>
  <rect x="730" y="132" width="80" height="38" rx="5" fill="#1a2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="770" y="157" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">24</text>
  <rect x="730" y="174" width="80" height="38" rx="5" fill="#1a2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="770" y="199" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">45</text>
  <rect x="730" y="216" width="80" height="38" rx="5" fill="#1a2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="770" y="241" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">66</text>
  <rect x="730" y="258" width="80" height="38" rx="5" fill="#1a2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="770" y="283" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">75</text>
  <rect x="730" y="300" width="80" height="38" rx="5" fill="#1a2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="770" y="325" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">90</text>
  <rect x="730" y="342" width="80" height="38" rx="5" fill="#1a2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="770" y="367" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">170</text>
  <rect x="730" y="384" width="80" height="38" rx="5" fill="#1a2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="770" y="409" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">802</text>

  <text x="770" y="450" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">100의 자리 기준</text>
  <text x="770" y="466" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">정렬 완료</text>

  <!-- Top right: complexity -->
  <rect x="190" y="90" width="95" height="72" rx="6" fill="#0a0f1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="237" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">복잡도</text>
  <text x="200" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">O(d(N+K))</text>
  <text x="200" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">d=자릿수, K=기수</text>
</svg>
