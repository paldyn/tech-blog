  <text x="770" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">결과</text>

  <!-- Helper macro: column at given x, values as list -->
  <!-- Input column -->
  <rect x="90" y="90" width="80" height="38" rx="5" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="130" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">170</text>
  <rect x="90" y="132" width="80" height="38" rx="5" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="130" y="157" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">45</text>
  <rect x="90" y="174" width="80" height="38" rx="5" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="130" y="199" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">75</text>
  <rect x="90" y="216" width="80" height="38" rx="5" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="130" y="241" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">90</text>
  <rect x="90" y="258" width="80" height="38" rx="5" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="130" y="283" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">2</text>
  <rect x="90" y="300" width="80" height="38" rx="5" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="130" y="325" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">24</text>
  <rect x="90" y="342" width="80" height="38" rx="5" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="130" y="367" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">802</text>
  <rect x="90" y="384" width="80" height="38" rx="5" fill="#1a1f2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="130" y="409" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">66</text>

  <!-- Arrow 1 -->
  <line x1="178" y1="250" x2="208" y2="250" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

