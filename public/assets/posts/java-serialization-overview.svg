<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="ar" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="ag" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="21" font-weight="700" fill="#e8e8e8" text-anchor="middle">Java 직렬화 — 객체 ↔ 바이트 스트림</text>
  <text x="440" y="64" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Serializable 마커 인터페이스 + ObjectOutputStream/InputStream</text>

  <!-- Serialization flow -->
  <!-- Java Object -->
  <rect x="60" y="88" width="185" height="100" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="153" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">Java 객체</text>
  <text x="153" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">class User implements</text>
  <text x="153" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">Serializable {</text>
  <text x="153" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">String name; int age;</text>
  <text x="153" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">}</text>

  <!-- Arrow right: serialize -->
  <line x1="245" y1="138" x2="335" y2="138" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ar)"/>
  <text x="290" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">직렬화</text>
  <text x="290" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">ObjectOutputStream</text>

  <!-- Byte stream -->
  <rect x="335" y="88" width="200" height="100" rx="8" fill="#1a1a1a" stroke="#888" stroke-width="1.5"/>
  <text x="435" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#888" text-anchor="middle">바이트 스트림</text>
  <text x="435" y="132" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#b5cea8" text-anchor="middle">AC ED 00 05 73 72</text>
  <text x="435" y="150" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#b5cea8" text-anchor="middle">00 04 55 73 65 72</text>
  <text x="435" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#b5cea8" text-anchor="middle">...</text>
  <text x="435" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#666" text-anchor="middle">AC ED = magic number</text>

  <!-- Arrow right: deserialize -->
  <line x1="535" y1="138" x2="625" y2="138" stroke="#55c555" stroke-width="2" marker-end="url(#ag)"/>
  <text x="580" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">역직렬화</text>
  <text x="580" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">ObjectInputStream</text>

  <!-- Java Object (after) -->
  <rect x="625" y="88" width="195" height="100" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="2"/>
  <text x="723" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">복원된 객체</text>
  <text x="723" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">User user =</text>
  <text x="723" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">new User()</text>
  <text x="723" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">name="Alice", age=30</text>
  <text x="723" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">생성자 호출 없음!</text>

  <!-- serialVersionUID box -->
  <rect x="60" y="215" width="760" height="64" rx="7" fill="#111" stroke="#3a4a3a" stroke-width="1"/>
  <text x="440" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">serialVersionUID — 버전 호환성 키</text>
  <text x="260" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" text-anchor="middle">static final long serialVersionUID = 1L;</text>
  <text x="700" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">명시 안 하면 JVM이 자동 계산</text>
  <text x="440" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">클래스 변경 시 자동 계산값이 달라져 InvalidClassException 발생!</text>

  <!-- transient + static -->
  <rect x="60" y="300" width="370" height="80" rx="7" fill="#0d1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="245" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">직렬화 제외</text>
  <text x="85" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3">transient</text>
  <text x="173" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">String password;</text>
  <text x="85" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3">static</text>
  <text x="143" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">int count; // 클래스 변수도 제외</text>
  <text x="245" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">역직렬화 시 타입 기본값으로 초기화</text>

  <!-- Customization -->
  <rect x="450" y="300" width="370" height="80" rx="7" fill="#1a0d1a" stroke="#7777cc" stroke-width="1"/>
  <text x="635" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">커스터마이징</text>
  <text x="475" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7777cc">writeObject</text>
  <text x="575" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">(ObjectOutputStream)</text>
  <text x="475" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7777cc">readObject</text>
  <text x="571" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">(ObjectInputStream)</text>
  <text x="635" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">직렬화 과정 직접 제어</text>

  <!-- Use cases -->
  <rect x="60" y="400" width="760" height="60" rx="6" fill="#111" stroke="#3a3a3a" stroke-width="1"/>
  <text x="440" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">주요 사용 사례</text>
  <text x="160" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">RMI 원격 메서드 호출</text>
  <text x="340" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">세션 객체 파일 저장</text>
  <text x="535" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">JVM 간 객체 전송</text>
  <text x="720" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">캐시 스냅샷</text>
</svg>
