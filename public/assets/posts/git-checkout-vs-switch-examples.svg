<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">명령 대응 비교표</text>
  <text x="60" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">구 명령 → 신 명령 마이그레이션 가이드</text>

  <!-- Header row -->
  <rect x="60" y="100" width="370" height="34" rx="0" fill="#1a1400" stroke="none"/>
  <text x="245" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8a838" text-anchor="middle">git checkout (구)</text>

  <rect x="450" y="100" width="370" height="34" rx="0" fill="#0d1a0d" stroke="none"/>
  <text x="635" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">git switch / git restore (신)</text>

  <!-- Rows -->
  <!-- Row 1 -->
  <rect x="60" y="134" width="760" height="1" fill="#222"/>
  <rect x="60" y="135" width="370" height="44" fill="#000000"/>
  <text x="80" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">git checkout main</text>
  <rect x="450" y="135" width="370" height="44" fill="#000000"/>
  <text x="470" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">git switch main</text>

  <!-- Row 2 -->
  <rect x="60" y="179" width="760" height="1" fill="#222"/>
  <rect x="60" y="180" width="370" height="44" fill="#0d1117"/>
  <text x="80" y="207" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">git checkout -b feature</text>
  <rect x="450" y="180" width="370" height="44" fill="#0d1117"/>
  <text x="470" y="207" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">git switch -c feature</text>

  <!-- Row 3 -->
  <rect x="60" y="224" width="760" height="1" fill="#222"/>
  <rect x="60" y="225" width="370" height="44" fill="#000000"/>
  <text x="80" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">git checkout -</text>
  <rect x="450" y="225" width="370" height="44" fill="#000000"/>
  <text x="470" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">git switch -</text>

  <!-- Row 4 -->
  <rect x="60" y="269" width="760" height="1" fill="#222"/>
  <rect x="60" y="270" width="370" height="44" fill="#0d1117"/>
  <text x="80" y="297" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">git checkout HEAD -- file.js</text>
  <rect x="450" y="270" width="370" height="44" fill="#0d1117"/>
  <text x="470" y="297" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">git restore file.js</text>

  <!-- Row 5 -->
  <rect x="60" y="314" width="760" height="1" fill="#222"/>
  <rect x="60" y="315" width="370" height="44" fill="#000000"/>
  <text x="80" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">git checkout abc1234</text>
  <rect x="450" y="315" width="370" height="44" fill="#000000"/>
  <text x="470" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">git switch --detach abc1234</text>

  <!-- Bottom border -->
  <rect x="60" y="359" width="760" height="1" fill="#222"/>

  <!-- Tip -->
  <rect x="60" y="376" width="760" height="48" rx="8" fill="#0d1117" stroke="#3a4a6e"/>
  <text x="80" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa">브랜치 전환 → git switch  |  파일 복원 → git restore  |  나머지 → git checkout</text>
  <text x="80" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">신규 프로젝트는 switch/restore 권장 — 스크립트·레거시 코드는 checkout 계속 사용 가능</text>
</svg>
