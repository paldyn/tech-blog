<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">
    프라이빗 레지스트리 구조 비교
  </text>

  <!-- registry:2 (Docker Distribution) -->
  <rect x="60" y="64" width="360" height="160" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="80" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">registry:2 (Docker Distribution)</text>
  <text x="80" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 가장 가볍고 단순한 OCI 레지스트리</text>
  <text x="80" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 인증: htpasswd (기본) / LDAP (플러그인)</text>
  <text x="80" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 스토리지: 로컬 / S3 / Azure Blob</text>
  <text x="80" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• UI 없음 → Portus/CNAB으로 추가 가능</text>
  <text x="80" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 개인 프로젝트, 소규모 팀에 적합</text>
  <rect x="80" y="188" width="320" height="26" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="205" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff">docker run -d -p 5000:5000 registry:2</text>

  <!-- Harbor -->
  <rect x="460" y="64" width="360" height="160" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="480" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">Harbor</text>
  <text x="480" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• CNCF Graduated 엔터프라이즈 레지스트리</text>
  <text x="480" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• RBAC, LDAP/OIDC 인증, 취약점 스캔</text>
  <text x="480" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• Replication, Content Trust (Notary)</text>
  <text x="480" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 풀 UI 제공, Audit Log, Webhooks</text>
  <text x="480" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 중대형 팀, K8s 환경에 권장</text>
  <rect x="480" y="188" width="320" height="26" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="205" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff">helm install harbor harbor/harbor</text>

  <!-- Feature comparison -->
  <text x="60" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">기능 비교</text>

  <!-- Headers row -->
  <text x="80" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">기능</text>
  <text x="280" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">registry:2</text>
  <text x="430" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">Harbor</text>
  <text x="560" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8a020">Nexus</text>
  <text x="690" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">Artifactory</text>

  <!-- Rows -->
  <text x="80" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">OCI 호환</text>
  <text x="280" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓</text>
  <text x="430" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓</text>
  <text x="560" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓</text>
  <text x="690" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓</text>

  <text x="80" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">취약점 스캔</text>
  <text x="280" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">✗</text>
  <text x="430" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ (Trivy)</text>
  <text x="560" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ (유료)</text>
  <text x="690" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ (유료)</text>

  <text x="80" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">웹 UI</text>
  <text x="280" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">✗</text>
  <text x="430" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓</text>
  <text x="560" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓</text>
  <text x="690" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓</text>

  <text x="80" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">라이선스</text>
  <text x="280" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Apache 2.0</text>
  <text x="430" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Apache 2.0</text>
  <text x="560" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8a020">오픈소스+유료</text>
  <text x="690" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8a020">유료</text>

  <!-- Daemon config note -->
  <rect x="60" y="376" width="760" height="100" rx="6" fill="#0a0a1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">프라이빗 레지스트리 사용 시 daemon.json 설정</text>
  <rect x="80" y="408" width="700" height="58" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="428" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8"># /etc/docker/daemon.json (HTTP 레지스트리 허용)</tspan></text>
  <text x="96" y="446" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">{</tspan><tspan fill="#ce9178">"insecure-registries"</tspan><tspan fill="#ffffff">:[</tspan><tspan fill="#ce9178">"192.168.1.100:5000"</tspan><tspan fill="#ffffff">]}</tspan>
  </text>
  <text x="96" y="462" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8"># 프로덕션에서는 HTTPS + 유효 인증서 필수</tspan>
</svg>
