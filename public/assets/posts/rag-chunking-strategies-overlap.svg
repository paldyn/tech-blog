<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 320" width="880" height="320">
  <rect width="880" height="320" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="34" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">청크 오버랩 시각화</text>
  <text x="440" y="54" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">chunk_size=500 · chunk_overlap=100</text>

  <!-- ===== NO OVERLAP (top) ===== -->
  <text x="60" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">오버랩 없음 (chunk_overlap=0)</text>

  <!-- Chunk A -->
  <rect x="60" y="100" width="230" height="40" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="175" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">청크 A  (tokens 0–500)</text>

  <!-- Gap indicator -->
  <rect x="296" y="100" width="6" height="40" rx="2" fill="#e05555"/>
  <text x="299" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">경계</text>

  <!-- Chunk B -->
  <rect x="308" y="100" width="230" height="40" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="423" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">청크 B  (tokens 500–1000)</text>

  <!-- Gap indicator -->
  <rect x="544" y="100" width="6" height="40" rx="2" fill="#e05555"/>

  <!-- Chunk C -->
  <rect x="556" y="100" width="230" height="40" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="671" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">청크 C  (tokens 1000–1500)</text>

  <!-- Problem label -->
  <text x="440" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">⚠ 경계에서 맥락 단절 — 중요한 정보가 두 청크에 분리될 수 있음</text>

  <!-- Divider -->
  <line x1="40" y1="172" x2="840" y2="172" stroke="#3a4a6e" stroke-width="1"/>

  <!-- ===== WITH OVERLAP (bottom) ===== -->
  <text x="60" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">오버랩 있음 (chunk_overlap=100)</text>

  <!-- Chunk 1 main -->
  <rect x="60" y="206" width="230" height="40" rx="6" fill="#0e1a0e" stroke="#55c555" stroke-width="1.5"/>
  <text x="152" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">청크 1 (0–500)</text>

  <!-- Overlap zone 1→2 -->
  <rect x="292" y="206" width="78" height="40" rx="0" fill="#2a2a1a" stroke="#7777cc" stroke-width="0"/>
  <rect x="292" y="206" width="78" height="40" rx="4" fill="none" stroke="#7777cc" stroke-width="1.5"/>
  <text x="331" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">오버랩</text>
  <text x="331" y="237" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">400–500</text>

  <!-- Chunk 2 main -->
  <rect x="292" y="206" width="280" height="40" rx="6" fill="none" stroke="#55c555" stroke-width="1.5"/>
  <text x="432" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">청크 2 (400–900)</text>

  <!-- Overlap zone 2→3 -->
  <rect x="542" y="206" width="78" height="40" rx="4" fill="#2a2a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="581" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">오버랩</text>
  <text x="581" y="237" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">800–900</text>

  <!-- Chunk 3 main -->
  <rect x="542" y="206" width="280" height="40" rx="6" fill="none" stroke="#55c555" stroke-width="1.5"/>
  <text x="682" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">청크 3 (800–1300)</text>

  <!-- Overlap legend -->
  <rect x="190" y="262" width="16" height="14" rx="3" fill="#2a2a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="212" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">= 오버랩 영역 (이전 청크 끝 100 토큰이 다음 청크 시작에 포함)</text>

  <!-- Success label -->
  <text x="440" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ 경계 맥락 보존 — 검색 품질 향상, chunk_overlap은 chunk_size의 10~20% 권장</text>
</svg>
