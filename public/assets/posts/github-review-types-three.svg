<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">세 가지 리뷰 타입</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">리뷰를 제출할 때 고르는 결정과 머지에 미치는 영향</text>

  <!-- Comment -->
  <rect x="48" y="100" width="256" height="260" rx="10" fill="#101010" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="176" y="140" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="17" font-weight="700" fill="#7ec8e3">💬 Comment</text>
  <text x="176" y="172" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaaaaa">의견만 남긴다</text>
  <text x="176" y="212" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">승인도 반려도 아님</text>
  <text x="176" y="242" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">질문·제안·정보 공유</text>
  <rect x="72" y="296" width="208" height="40" rx="8" fill="#0f1620" stroke="#7ec8e3" stroke-width="1"/>
  <text x="176" y="321" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">머지 영향 없음</text>

  <!-- Approve -->
  <rect x="312" y="100" width="256" height="260" rx="10" fill="#101010" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="140" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="17" font-weight="700" fill="#55c555">✓ Approve</text>
  <text x="440" y="172" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaaaaa">변경을 승인한다</text>
  <text x="440" y="212" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">"머지해도 좋다"</text>
  <text x="440" y="242" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">필수 승인 수 충족에 기여</text>
  <rect x="336" y="296" width="208" height="40" rx="8" fill="#0f2a0f" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="321" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">머지 조건 충족</text>

  <!-- Request changes -->
  <rect x="576" y="100" width="256" height="260" rx="10" fill="#101010" stroke="#e05555" stroke-width="1.5"/>
  <text x="704" y="140" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="17" font-weight="700" fill="#e05555">✗ Request changes</text>
  <text x="704" y="172" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaaaaa">수정을 요청한다</text>
  <text x="704" y="212" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">반드시 고쳐야 할 문제</text>
  <text x="704" y="242" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">재리뷰 전까지 머지 차단</text>
  <rect x="600" y="296" width="208" height="40" rx="8" fill="#2a0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="704" y="321" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">머지 차단</text>
</svg>
