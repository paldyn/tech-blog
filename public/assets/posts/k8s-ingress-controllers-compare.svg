<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Ingress Controller 비교</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">nginx-ingress · Traefik · Contour · HAProxy — 특성 비교</text>

  <!-- Header row -->
  <rect x="60" y="88" width="760" height="40" rx="6" fill="#112240" stroke="#3a6ea5" stroke-width="1"/>
  <text x="170" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">항목</text>
  <text x="320" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">nginx-ingress</text>
  <text x="470" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">Traefik</text>
  <text x="620" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">Contour</text>
  <text x="770" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">HAProxy</text>

  <!-- Row 1: 성숙도 -->
  <rect x="60" y="132" width="760" height="38" rx="4" fill="#0d0d1a" stroke="#1e2433" stroke-width="1"/>
  <text x="170" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">성숙도</text>
  <text x="320" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">★★★★★ 업계 표준</text>
  <text x="470" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">★★★★☆ 활발</text>
  <text x="620" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">★★★☆☆ 성장 중</text>
  <text x="770" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">★★★★☆ 안정적</text>

  <!-- Row 2: 설정 방식 -->
  <rect x="60" y="174" width="760" height="38" rx="4" fill="#0a0a10" stroke="#1e2433" stroke-width="1"/>
  <text x="170" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">설정 방식</text>
  <text x="320" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">Annotation 중심</text>
  <text x="470" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">CRD + Annotation</text>
  <text x="620" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">HTTPProxy CRD</text>
  <text x="770" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">Annotation</text>

  <!-- Row 3: 동적 재설정 -->
  <rect x="60" y="216" width="760" height="38" rx="4" fill="#0d0d1a" stroke="#1e2433" stroke-width="1"/>
  <text x="170" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">동적 재설정</text>
  <text x="320" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">재시작 필요 (일부)</text>
  <text x="470" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">무중단 즉시 반영</text>
  <text x="620" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">무중단 즉시 반영</text>
  <text x="770" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">재시작 필요</text>

  <!-- Row 4: gRPC/TCP 지원 -->
  <rect x="60" y="258" width="760" height="38" rx="4" fill="#0a0a10" stroke="#1e2433" stroke-width="1"/>
  <text x="170" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">gRPC/TCP</text>
  <text x="320" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">지원</text>
  <text x="470" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">지원</text>
  <text x="620" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">지원 (Envoy)</text>
  <text x="770" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">TCP/UDP 지원</text>

  <!-- Row 5: 대시보드 -->
  <rect x="60" y="300" width="760" height="38" rx="4" fill="#0d0d1a" stroke="#1e2433" stroke-width="1"/>
  <text x="170" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">대시보드/UI</text>
  <text x="320" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">별도 도구 필요</text>
  <text x="470" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">내장 대시보드</text>
  <text x="620" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">없음</text>
  <text x="770" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">없음</text>

  <!-- Row 6: 프록시 엔진 -->
  <rect x="60" y="342" width="760" height="38" rx="4" fill="#0a0a10" stroke="#1e2433" stroke-width="1"/>
  <text x="170" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">프록시 엔진</text>
  <text x="320" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">Nginx</text>
  <text x="470" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">Traefik 자체</text>
  <text x="620" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">Envoy</text>
  <text x="770" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">HAProxy</text>

  <text x="440" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">프로덕션 추천: nginx-ingress(범용) / Traefik(동적 환경 + UI 필요) / Contour(Envoy 기반 고성능)</text>
</svg>
