<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">NFS 아키텍처 — 서버와 클라이언트</text>

  <!-- Server side -->
  <rect x="60" y="68" width="340" height="340" rx="10" fill="#0f1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="230" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="17" font-weight="700" fill="#7ec8e3" text-anchor="middle">NFS 서버 (192.168.1.10)</text>

  <!-- Server components -->
  <rect x="90" y="110" width="280" height="50" rx="6" fill="#1a2030" stroke="#7ec8e3" stroke-width="1"/>
  <text x="230" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">nfsd (NFS 데몬)</text>
  <text x="230" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">포트 2049 — RPC 요청 처리</text>

  <rect x="90" y="175" width="280" height="50" rx="6" fill="#1a2030" stroke="#7777cc" stroke-width="1"/>
  <text x="230" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">rpcbind / portmapper</text>
  <text x="230" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">포트 111 — RPC 서비스 등록</text>

  <rect x="90" y="240" width="280" height="50" rx="6" fill="#1a2030" stroke="#55c555" stroke-width="1"/>
  <text x="230" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">/etc/exports</text>
  <text x="230" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">/data 192.168.1.0/24(rw,sync,no_subtree_check)</text>

  <rect x="90" y="305" width="280" height="80" rx="6" fill="#0a1508" stroke="#55c555" stroke-width="1"/>
  <text x="230" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">실제 파일시스템</text>
  <text x="230" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">/data (ext4/xfs)</text>
  <text x="230" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">shared/, logs/, homes/</text>
  <text x="230" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">HDD / NVMe</text>

  <!-- Network in middle -->
  <rect x="380" y="200" width="120" height="60" rx="8" fill="#222" stroke="#555" stroke-width="1"/>
  <text x="440" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">TCP/UDP</text>
  <text x="440" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Port 2049</text>

  <!-- Arrows -->
  <line x1="400" y1="230" x2="370" y2="230" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="480" y1="230" x2="500" y2="230" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Client side -->
  <rect x="480" y="68" width="340" height="340" rx="10" fill="#0f200f" stroke="#55c555" stroke-width="2"/>
  <text x="650" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="17" font-weight="700" fill="#55c555" text-anchor="middle">NFS 클라이언트</text>

  <rect x="510" y="110" width="280" height="50" rx="6" fill="#1a2830" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">NFS 클라이언트 모듈</text>
  <text x="650" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">커널 내장 — nfs.ko, nfs4.ko</text>

  <rect x="510" y="175" width="280" height="50" rx="6" fill="#1a2830" stroke="#7777cc" stroke-width="1"/>
  <text x="650" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">mount 명령 / /etc/fstab</text>
  <text x="650" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">192.168.1.10:/data  /mnt/nfs  nfs4</text>

  <rect x="510" y="240" width="280" height="80" rx="6" fill="#0a1508" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">마운트 포인트</text>
  <text x="650" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">/mnt/nfs (로컬처럼 접근)</text>
  <text x="650" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">I/O → RPC → 서버 처리</text>

  <rect x="510" y="335" width="280" height="50" rx="6" fill="#1a2830" stroke="#7ec8e3" stroke-width="1"/>
  <text x="650" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">속성 캐시 (ac 옵션)</text>
  <text x="650" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">acregmin/acregmax — 캐시 유효 시간</text>

  <!-- Bottom note -->
  <rect x="60" y="428" width="760" height="36" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="451" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">NFSv4 = 단일 포트 2049 사용 (방화벽 설정 단순) | NFSv3 = rpcbind + 추가 포트 필요 | 운영 환경에는 NFSv4 권장</text>
</svg>
