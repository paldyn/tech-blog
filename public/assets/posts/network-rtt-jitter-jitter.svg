<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">지터(Jitter): 도착 시간 편차</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">연속된 패킷의 RTT 변동 — 실시간 서비스(VoIP, 영상 통화)에 치명적</text>

  <!-- Timeline axis -->
  <line x1="80" y1="200" x2="820" y2="200" stroke="#333" stroke-width="1.5"/>
  <text x="80" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">t=0</text>

  <!-- Ideal arrivals (equally spaced) -->
  <text x="80" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" font-weight="600">이상적 도착 (지터 없음)</text>
  <rect x="150" y="162" width="6" height="38" fill="#7ec8e3" rx="2"/>
  <rect x="280" y="162" width="6" height="38" fill="#7ec8e3" rx="2"/>
  <rect x="410" y="162" width="6" height="38" fill="#7ec8e3" rx="2"/>
  <rect x="540" y="162" width="6" height="38" fill="#7ec8e3" rx="2"/>
  <rect x="670" y="162" width="6" height="38" fill="#7ec8e3" rx="2"/>
  <text x="153" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">P1</text>
  <text x="283" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">P2</text>
  <text x="413" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">P3</text>
  <text x="543" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">P4</text>
  <text x="673" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">P5</text>

  <!-- Actual arrivals (irregular) -->
  <text x="80" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" font-weight="600">실제 도착 (지터 있음)</text>
  <rect x="155" y="307" width="6" height="38" fill="#e05555" rx="2"/>
  <rect x="260" y="307" width="6" height="38" fill="#e05555" rx="2"/>
  <rect x="440" y="307" width="6" height="38" fill="#e05555" rx="2"/>
  <rect x="510" y="307" width="6" height="38" fill="#e05555" rx="2"/>
  <rect x="700" y="307" width="6" height="38" fill="#e05555" rx="2"/>
  <line x1="80" y1="345" x2="820" y2="345" stroke="#333" stroke-width="1.5"/>
  <text x="80" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">t=0</text>

  <!-- Jitter annotation -->
  <line x1="280" y1="307" x2="260" y2="307" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="258" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="end">-20ms</text>
  <line x1="410" y1="307" x2="440" y2="307" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="442" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">+30ms</text>

  <!-- Info box -->
  <rect x="60" y="390" width="760" height="50" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">지터 = |RTT(n) - RTT(n-1)|  </text>
  <text x="80" y="430" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">권장: VoIP &lt;30ms  영상 &lt;50ms  게임 &lt;20ms</text>
</svg>
