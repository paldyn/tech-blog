<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">지터(Jitter) — RTT 변동성 시각화</text>

  <!-- Axes for jitter timeline -->
  <text x="80" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">RTT(ms)</text>
  <!-- Y axis -->
  <line x1="100" y1="90" x2="100" y2="260" stroke="#3a4a6e" stroke-width="1.5"/>
  <!-- X axis (time) -->
  <line x1="100" y1="260" x2="820" y2="260" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="830" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">시간</text>

  <!-- Y axis labels -->
  <text x="90" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="end">60</text>
  <text x="90" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="end">40</text>
  <text x="90" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="end">20</text>
  <text x="90" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="end">0</text>
  <!-- Grid lines -->
  <line x1="100" y1="148" x2="820" y2="148" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="100" y1="198" x2="820" y2="198" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Low jitter line (stable) - green -->
  <polyline points="120,220 220,218 320,222 420,219 520,221 620,218 720,220 820,219" fill="none" stroke="#55c555" stroke-width="2.5"/>
  <!-- Average line for stable -->
  <line x1="120" y1="220" x2="820" y2="220" stroke="#55c555" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="840" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">안정</text>

  <!-- High jitter line (variable) - red -->
  <polyline points="120,200 220,130 320,240 420,110 520,230 620,150 720,245 820,120" fill="none" stroke="#e05555" stroke-width="2.5"/>
  <text x="840" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">고지터</text>

  <!-- Mean line for high jitter -->
  <line x1="120" y1="175" x2="820" y2="175" stroke="#e05555" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Jitter annotation: vertical arrows showing variation -->
  <line x1="420" y1="175" x2="420" y2="110" stroke="#e8a55c" stroke-width="2"/>
  <text x="430" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8a55c">지터</text>
  <line x1="420" y1="175" x2="420" y2="230" stroke="#e8a55c" stroke-width="2"/>

  <!-- Legend -->
  <rect x="100" y="280" width="760" height="110" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">지터(Jitter) = 지연 변동의 표준편차</text>
  <text x="200" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">낮은 지터 (&#60;5ms)</text>
  <text x="200" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">VoIP, 스트리밍에 적합</text>
  <text x="440" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8a55c" text-anchor="middle">측정법</text>
  <text x="440" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">ping 통계, mtr</text>
  <text x="680" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">높은 지터 (&#62;30ms)</text>
  <text x="680" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">끊김, 화질 저하</text>
</svg>
