<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Google 스타일 독스트링</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">표준 독스트링 형식 예시</text>

  <rect x="60" y="86" width="760" height="256" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="110" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">def</tspan><tspan fill="#ffffff"> divide(a: </tspan><tspan fill="#7ec8e3" font-weight="600">float</tspan><tspan fill="#ffffff">, b: </tspan><tspan fill="#7ec8e3" font-weight="600">float</tspan><tspan fill="#ffffff">) -&gt; </tspan><tspan fill="#7ec8e3" font-weight="600">float</tspan><tspan fill="#ffffff">:</tspan></text>
  <text x="76" y="130" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">    """두 수를 나눈 결과를 반환한다.</tspan></text>
  <text x="76" y="150" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">    </text>
  <text x="76" y="170" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">    Args:</tspan></text>
  <text x="76" y="190" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">        a: 피제수 (나뉘는 수)</tspan></text>
  <text x="76" y="210" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">        b: 제수 (나누는 수) — 0이면 안 됨</tspan></text>
  <text x="76" y="230" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">    </text>
  <text x="76" y="250" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">    Returns:</tspan></text>
  <text x="76" y="270" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">        a / b 의 부동소수점 결과</tspan></text>
  <text x="76" y="290" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">    </text>
  <text x="76" y="310" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">    Raises:</tspan></text>
  <text x="76" y="330" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">        ZeroDivisionError: b가 0일 때</tspan></text>
  <text x="76" y="334" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">    """</tspan></text>

  <text x="440" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">Sphinx · pdoc · mkdocs 등이 독스트링을 파싱해 HTML 문서 자동 생성</text>
</svg>
