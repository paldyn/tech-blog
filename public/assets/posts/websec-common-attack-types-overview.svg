<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">주요 웹 공격 유형 한눈에 보기</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">OWASP Top 10 기반 — 5개 카테고리 12개 공격 유형</text>

  <!-- Category 1: Injection -->
  <rect x="60" y="90" width="370" height="130" rx="8" fill="#0a1020" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="245" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">인젝션 공격</text>
  <rect x="78" y="124" width="150" height="30" rx="5" fill="#101828" stroke="#3a4a6e" stroke-width="1"/>
  <text x="153" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">SQL 인젝션</text>
  <rect x="238" y="124" width="174" height="30" rx="5" fill="#101828" stroke="#3a4a6e" stroke-width="1"/>
  <text x="325" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">NoSQL · CMD 인젝션</text>
  <text x="245" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">DB·OS·LDAP에 악성 명령 주입 → 파라미터화 쿼리</text>
  <text x="245" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">위험도: ★★★★★  발생빈도: ★★★★</text>

  <!-- Category 2: XSS/CSRF -->
  <rect x="450" y="90" width="370" height="130" rx="8" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="635" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">클라이언트 측 공격</text>
  <rect x="468" y="124" width="150" height="30" rx="5" fill="#0d2010" stroke="#336633" stroke-width="1"/>
  <text x="543" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">XSS (3종)</text>
  <rect x="628" y="124" width="174" height="30" rx="5" fill="#0d2010" stroke="#336633" stroke-width="1"/>
  <text x="715" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">CSRF · 클릭재킹</text>
  <text x="635" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">브라우저·피해자를 매개로 공격 → CSP · SameSite 쿠키</text>
  <text x="635" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">위험도: ★★★★  발생빈도: ★★★★★</text>

  <!-- Category 3: Auth -->
  <rect x="60" y="238" width="370" height="120" rx="8" fill="#12081a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="245" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">인증 · 인가 공격</text>
  <rect x="78" y="272" width="150" height="30" rx="5" fill="#180e28" stroke="#554499" stroke-width="1"/>
  <text x="153" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">브루트 포스</text>
  <rect x="238" y="272" width="174" height="30" rx="5" fill="#180e28" stroke="#554499" stroke-width="1"/>
  <text x="325" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">IDOR · 세션 탈취</text>
  <text x="245" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">인증 우회·권한 상승 → MFA · 세션 고정 방어</text>
  <text x="245" y="346" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">위험도: ★★★★★  발생빈도: ★★★</text>

  <!-- Category 4: Server-side -->
  <rect x="450" y="238" width="370" height="120" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="635" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">서버 측 공격</text>
  <rect x="468" y="272" width="150" height="30" rx="5" fill="#200808" stroke="#993333" stroke-width="1"/>
  <text x="543" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">SSRF · XXE</text>
  <rect x="628" y="272" width="174" height="30" rx="5" fill="#200808" stroke="#993333" stroke-width="1"/>
  <text x="715" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">역직렬화 · 파일 업로드</text>
  <text x="635" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">서버 내부 자원·로직 조작 → 입력 검증·샌드박스</text>
  <text x="635" y="346" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">위험도: ★★★★★  발생빈도: ★★</text>

  <!-- Category 5: Infrastructure -->
  <rect x="60" y="376" width="760" height="120" rx="8" fill="#12100a" stroke="#e8a020" stroke-width="1.5"/>
  <text x="440" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8a020">인프라 · 설정 공격</text>
  <rect x="78" y="410" width="150" height="30" rx="5" fill="#201806" stroke="#806010" stroke-width="1"/>
  <text x="153" y="430" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">DDoS</text>
  <rect x="248" y="410" width="150" height="30" rx="5" fill="#201806" stroke="#806010" stroke-width="1"/>
  <text x="323" y="430" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">보안 설정 오류</text>
  <rect x="418" y="410" width="150" height="30" rx="5" fill="#201806" stroke="#806010" stroke-width="1"/>
  <text x="493" y="430" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">의존성 취약점</text>
  <rect x="588" y="410" width="214" height="30" rx="5" fill="#201806" stroke="#806010" stroke-width="1"/>
  <text x="695" y="430" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">로깅·모니터링 부재</text>
  <text x="440" y="474" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">인프라 레벨 취약점 → Rate Limit · WAF · 정기 패치 · 감사 로그</text>
  <text x="440" y="490" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">위험도: ★★★★  발생빈도: ★★★★★ (설정 오류 기준)</text>
</svg>
