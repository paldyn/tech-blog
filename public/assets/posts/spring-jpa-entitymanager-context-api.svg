<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">EntityManager 핵심 API</text>
  <text x="440" y="70" text-anchor="middle" fill="#888" font-size="13">persist · find · merge · remove · flush — 영속성 컨텍스트 조작 메서드</text>

  <!-- Left column: method list -->
  <!-- persist -->
  <rect x="60" y="92" width="360" height="72" rx="8" fill="#0f1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="116" fill="#7ec8e3" font-size="14" font-weight="600">persist(entity)</text>
  <text x="80" y="136" fill="#888" font-size="12">비영속 → 영속 상태로 전환</text>
  <text x="80" y="153" fill="#888" font-size="12">트랜잭션 커밋 시 INSERT 실행</text>

  <!-- find -->
  <rect x="60" y="176" width="360" height="72" rx="8" fill="#0f1520" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="200" fill="#55c555" font-size="14" font-weight="600">find(Class, id)</text>
  <text x="80" y="220" fill="#888" font-size="12">1차 캐시 조회 → 없으면 SELECT</text>
  <text x="80" y="237" fill="#888" font-size="12">같은 TX 내 동일 인스턴스 반환</text>

  <!-- merge -->
  <rect x="60" y="260" width="360" height="72" rx="8" fill="#0f1520" stroke="#e8b84b" stroke-width="1.5"/>
  <text x="80" y="284" fill="#e8b84b" font-size="14" font-weight="600">merge(entity)</text>
  <text x="80" y="304" fill="#888" font-size="12">준영속/비영속 → 영속 상태 복사</text>
  <text x="80" y="321" fill="#888" font-size="12">새 영속 엔티티를 반환 (원본 아님)</text>

  <!-- remove -->
  <rect x="60" y="344" width="360" height="72" rx="8" fill="#0f1520" stroke="#e05555" stroke-width="1.5"/>
  <text x="80" y="368" fill="#e05555" font-size="14" font-weight="600">remove(entity)</text>
  <text x="80" y="388" fill="#888" font-size="12">영속 엔티티를 삭제 상태로 전환</text>
  <text x="80" y="405" fill="#888" font-size="12">커밋 시 DELETE 실행</text>

  <!-- flush / detach -->
  <rect x="60" y="428" width="172" height="60" rx="8" fill="#0f1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="80" y="452" fill="#7777cc" font-size="13" font-weight="600">flush()</text>
  <text x="80" y="470" fill="#888" font-size="12">SQL을 DB에 즉시 반영</text>

  <rect x="248" y="428" width="172" height="60" rx="8" fill="#0f1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="268" y="452" fill="#7777cc" font-size="13" font-weight="600">detach(entity)</text>
  <text x="268" y="470" fill="#888" font-size="12">영속 → 준영속 전환</text>

  <!-- Right column: code block -->
  <rect x="460" y="92" width="360" height="396" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="476" y="116" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// 기본 CRUD 예시</text>
  <text x="476" y="134" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">@Transactional</text>
  <text x="476" y="152" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">public void example(Long id) {</text>
  <text x="476" y="170" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    // 1. persist: 새 엔티티 저장</text>
  <text x="476" y="188" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    Member m = </text><text x="586" y="188" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">new</text><text x="614" y="188" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> Member("Alice");</text>
  <text x="476" y="206" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    em.persist(m);</text>
  <text x="476" y="224" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    // INSERT 아직 미실행</text>

  <text x="476" y="252" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    // 2. find: 1차 캐시 우선 조회</text>
  <text x="476" y="270" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    Member found = em.find(</text>
  <text x="476" y="288" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">        Member.</text><text x="538" y="288" fill="#7ec8e3" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">class</text><text x="566" y="288" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">, id);</text>

  <text x="476" y="316" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    // 3. 변경 감지(Dirty Check)</text>
  <text x="476" y="334" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    found.setName(</text><text x="572" y="334" fill="#ce9178" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">"Bob"</text><text x="608" y="334" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">);</text>
  <text x="476" y="352" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    // 커밋 시 UPDATE 자동 실행</text>

  <text x="476" y="380" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    // 4. remove: 삭제</text>
  <text x="476" y="398" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    em.remove(found);</text>
  <text x="476" y="416" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    // 커밋 시 DELETE 실행</text>
  <text x="476" y="452" fill="#ffffff" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">} </text><text x="488" y="452" fill="#9aa4b8" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// 트랜잭션 종료 → flush+commit</text>

  <!-- Bottom note -->
  <text x="440" y="504" text-anchor="middle" fill="#888" font-size="12">flush()는 SQL을 DB로 보내는 것 · commit()이 실제 트랜잭션을 확정</text>
</svg>
