<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">iter() 와 next() 내장 함수</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">이터레이터 생성과 값 추출의 네 가지 형태</text>

  <!-- Card 1: iter(iterable) -->
  <rect x="60" y="100" width="360" height="148" rx="10" fill="#0d141a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="80" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="600"><tspan fill="#7ec8e3">iter</tspan><tspan fill="#ffffff">(iterable)</tspan></text>
  <text x="80" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaaaaa">이터러블의 __iter__() 를 호출하여</text>
  <text x="80" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaaaaa">이터레이터 객체를 생성해 반환</text>
  <text x="80" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#666666">예  </tspan><tspan fill="#d4d4d4">it = iter([1, 2, 3])</tspan></text>

  <!-- Card 2: next(iterator) -->
  <rect x="460" y="100" width="360" height="148" rx="10" fill="#0d1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="480" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="600"><tspan fill="#55c555">next</tspan><tspan fill="#ffffff">(iterator)</tspan></text>
  <text x="480" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaaaaa">이터레이터의 __next__() 를 호출해</text>
  <text x="480" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaaaaa">다음 값 반환, 소진되면 StopIteration</text>
  <text x="480" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#666666">예  </tspan><tspan fill="#d4d4d4">next(it)</tspan><tspan fill="#9aa4b8">   # 1</tspan></text>

  <!-- Card 3: iter(callable, sentinel) -->
  <rect x="60" y="264" width="360" height="148" rx="10" fill="#0d141a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="80" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="600"><tspan fill="#7ec8e3">iter</tspan><tspan fill="#ffffff">(callable, </tspan><tspan fill="#ce9178">sentinel</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="80" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaaaaa">인자 없는 callable 을 반복 호출하다가</text>
  <text x="80" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaaaaa">반환값이 sentinel 과 같아지면 중단</text>
  <text x="80" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#666666">예  </tspan><tspan fill="#d4d4d4">iter(lambda: f.read(8), b'')</tspan></text>

  <!-- Card 4: next(iterator, default) -->
  <rect x="460" y="264" width="360" height="148" rx="10" fill="#0d1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="480" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="16" font-weight="600"><tspan fill="#55c555">next</tspan><tspan fill="#ffffff">(iterator, </tspan><tspan fill="#ce9178">default</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="480" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaaaaa">다음 값을 반환하되, 소진되었을 때</text>
  <text x="480" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaaaaa">예외 대신 default 값을 반환</text>
  <text x="480" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#666666">예  </tspan><tspan fill="#d4d4d4">next(it, None)</tspan><tspan fill="#9aa4b8">  # 안전</tspan></text>

  <!-- Bottom note -->
  <text x="440" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">두 번째 인자를 주면 StopIteration 없이 종료를 안전하게 다룰 수 있다</text>
</svg>
