<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 340">
  <rect width="880" height="340" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">iter()와 next() 내장 함수</text>

  <!-- Left box: iter() -->
  <rect x="60" y="64" width="360" height="232" rx="8"
        fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="240" y="89" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">iter()</text>

  <!-- Form 1 -->
  <rect x="76" y="100" width="328" height="64" rx="6"
        fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="121" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan font-weight="600" fill="#7ec8e3">iter</tspan><tspan fill="#ffffff">(iterable) → Iterator</tspan>
  </text>
  <text x="92" y="152" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">  # iterable.__iter__() 호출</tspan>

  <!-- Divider text -->
  <text x="240" y="186" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">또는 (센티넬 형태)</text>

  <!-- Form 2 -->
  <rect x="76" y="196" width="328" height="84" rx="6"
        fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="217" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan font-weight="600" fill="#7ec8e3">iter</tspan><tspan fill="#ffffff">(callable, sentinel)</tspan>
  </text>
  <text x="92" y="237" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">  # callable을 반복 호출하다</tspan>
  <text x="92" y="255" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">  # sentinel이 반환되면 중단</tspan>
  <text x="92" y="273" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">  # sentinel 값은 결과에 포함 안 됨</tspan>

  <!-- Right box: next() -->
  <rect x="460" y="64" width="360" height="232" rx="8"
        fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="640" y="89" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">next()</text>

  <!-- next() form 1 -->
  <rect x="476" y="100" width="328" height="64" rx="6"
        fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="121" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan font-weight="600" fill="#7ec8e3">next</tspan><tspan fill="#ffffff">(iterator) → value</tspan>
  </text>
  <text x="492" y="152" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">  # 소진 시 StopIteration</tspan>

  <text x="640" y="186" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">또는 (기본값 형태)</text>

  <!-- next() form 2 -->
  <rect x="476" y="196" width="328" height="84" rx="6"
        fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="217" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan font-weight="600" fill="#7ec8e3">next</tspan><tspan fill="#ffffff">(iterator, default)</tspan>
  </text>
  <text x="492" y="237" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">  # 소진 시 StopIteration 대신</tspan>
  <text x="492" y="255" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">  # default 값을 반환</tspan>
  <text x="492" y="273" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">  # 안전한 '다음 값' 획득에 유용</tspan>

  <!-- Bottom note -->
  <rect x="60" y="314" width="760" height="14" rx="4" fill="#111827" stroke="none"/>
  <text x="440" y="325" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">두 함수는 이터레이터 프로토콜의 진입점 — 내부적으로 __iter__ / __next__ 를 위임 호출</text>
</svg>
