<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">docker cp — 파일 복사 방향</text>

  <!-- Host box -->
  <rect x="60" y="80" width="280" height="300" rx="10" fill="#0d1020" stroke="#7ec8e3" stroke-width="2"/>
  <text x="200" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">Host 파일시스템</text>

  <rect x="80" y="124" width="240" height="40" rx="6" fill="#111827" stroke="#333"/>
  <text x="200" y="149" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">/home/user/app.conf</text>

  <rect x="80" y="178" width="240" height="40" rx="6" fill="#111827" stroke="#333"/>
  <text x="200" y="203" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">/tmp/backup/</text>

  <rect x="80" y="232" width="240" height="40" rx="6" fill="#111827" stroke="#333"/>
  <text x="200" y="257" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">/var/log/host.log</text>

  <rect x="80" y="286" width="240" height="40" rx="6" fill="#111827" stroke="#333"/>
  <text x="200" y="311" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">./dist/</text>

  <!-- Container box -->
  <rect x="540" y="80" width="280" height="300" rx="10" fill="#0d1a0d" stroke="#55c555" stroke-width="2"/>
  <text x="680" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">Container 파일시스템</text>

  <rect x="560" y="124" width="240" height="40" rx="6" fill="#111827" stroke="#333"/>
  <text x="680" y="149" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">/etc/nginx/nginx.conf</text>

  <rect x="560" y="178" width="240" height="40" rx="6" fill="#111827" stroke="#333"/>
  <text x="680" y="203" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">/var/log/nginx/</text>

  <rect x="560" y="232" width="240" height="40" rx="6" fill="#111827" stroke="#333"/>
  <text x="680" y="257" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">/app/config.json</text>

  <rect x="560" y="286" width="240" height="40" rx="6" fill="#111827" stroke="#333"/>
  <text x="680" y="311" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">/app/static/</text>

  <!-- Arrows: Host → Container (upload) -->
  <!-- Arrow 1 -->
  <line x1="320" y1="144" x2="540" y2="144" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="528,138 542,144 528,150" fill="#7ec8e3"/>
  <text x="430" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">호스트 → 컨테이너</text>

  <!-- Arrow 2: Container → Host (download) -->
  <line x1="540" y1="198" x2="320" y2="198" stroke="#55c555" stroke-width="2"/>
  <polygon points="332,192 318,198 332,204" fill="#55c555"/>
  <text x="430" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">컨테이너 → 호스트</text>

  <!-- Arrow 3: Host → Container -->
  <line x1="320" y1="252" x2="540" y2="252" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="528,246 542,252 528,258" fill="#7ec8e3"/>
  <text x="430" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">호스트 → 컨테이너</text>

  <!-- Arrow 4: Host → Container -->
  <line x1="320" y1="306" x2="540" y2="306" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="528,300 542,306 528,312" fill="#7ec8e3"/>
  <text x="430" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">호스트 → 컨테이너</text>

  <!-- Legend -->
  <line x1="80" y1="400" x2="120" y2="400" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="108,394 122,400 108,406" fill="#7ec8e3"/>
  <text x="130" y="405" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">Host → Container</text>

  <line x1="310" y1="400" x2="350" y2="400" stroke="#55c555" stroke-width="2"/>
  <polygon points="322,394 308,400 322,406" fill="#55c555"/>
  <text x="360" y="405" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Container → Host</text>

  <text x="680" y="405" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">실행 중·중지 컨테이너 모두 동작 (OverlayFS 직접 접근)</text>
</svg>
