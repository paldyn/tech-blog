<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Nexacro N 이벤트 버블링 구조</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888" text-anchor="middle">자식 → 부모 방향으로 이벤트가 전파되는 흐름</text>

  <!-- Hierarchy boxes -->
  <!-- Application -->
  <rect x="60" y="100" width="760" height="60" rx="10" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">Application</text>

  <!-- Frame Form -->
  <rect x="100" y="184" width="680" height="60" rx="10" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="219" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Frame Form (부모)</text>

  <!-- Child Form -->
  <rect x="160" y="268" width="560" height="60" rx="10" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Child Form / Div (자식)</text>

  <!-- Component -->
  <rect x="280" y="352" width="320" height="60" rx="10" fill="#111" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="387" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">Button (이벤트 발생 지점)</text>

  <!-- Arrows (bubbling: bottom → top) -->
  <!-- Component → Child Form -->
  <line x1="440" y1="352" x2="440" y2="332" stroke="#e05555" stroke-width="2.5"/>
  <polygon points="433,332 440,320 447,332" fill="#e05555"/>
  <text x="460" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">버블링</text>

  <!-- Child Form → Frame Form -->
  <line x1="440" y1="268" x2="440" y2="248" stroke="#55c555" stroke-width="2.5"/>
  <polygon points="433,248 440,236 447,248" fill="#55c555"/>

  <!-- Frame → App -->
  <line x1="440" y1="184" x2="440" y2="164" stroke="#7777cc" stroke-width="2.5"/>
  <polygon points="433,164 440,152 447,164" fill="#7777cc"/>

  <!-- Level labels on left -->
  <text x="60" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Level 3 (최상위)</text>
  <text x="60" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Level 2</text>
  <text x="60" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Level 1</text>
  <text x="60" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Level 0 (발생)</text>

  <!-- Note at bottom -->
  <rect x="60" y="432" width="760" height="36" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="455" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">Nexacro N의 이벤트 버블링은 HTML DOM 표준과 유사하나, 컴포넌트 계층 구조를 따름</text>
</svg>
