<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e09055"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#9977cc"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">TiDB HTAP 아키텍처</text>

  <!-- Client -->
  <rect x="330" y="65" width="220" height="46" rx="8" fill="#12213a" stroke="#3a6ea8" stroke-width="2"/>
  <text x="440" y="93" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">MySQL 호환 클라이언트</text>

  <!-- TiDB nodes -->
  <line x1="440" y1="111" x2="440" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <rect x="60" y="140" width="200" height="52" rx="8" fill="#1a1a30" stroke="#4a4a8a" stroke-width="1.5"/>
  <text x="160" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#9977cc" text-anchor="middle">TiDB Node 1</text>
  <text x="160" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">SQL 파싱 / 옵티마이저</text>

  <rect x="340" y="140" width="200" height="52" rx="8" fill="#1a1a30" stroke="#4a4a8a" stroke-width="1.5"/>
  <text x="440" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#9977cc" text-anchor="middle">TiDB Node 2</text>
  <text x="440" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Stateless / 수평 확장</text>

  <rect x="620" y="140" width="200" height="52" rx="8" fill="#1a1a30" stroke="#4a4a8a" stroke-width="1.5"/>
  <text x="720" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#9977cc" text-anchor="middle">TiDB Node 3</text>
  <text x="720" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">트랜잭션 조율</text>

  <!-- PD cluster -->
  <rect x="330" y="234" width="220" height="52" rx="8" fill="#1a1520" stroke="#5a3060" stroke-width="2"/>
  <text x="440" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#cc77aa" text-anchor="middle">PD (Placement Driver)</text>
  <text x="440" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">메타데이터 / 리전 스케줄링 / TSO</text>

  <!-- TiKV nodes -->
  <text x="200" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e09055" text-anchor="middle">TiKV (행 스토리지)</text>

  <rect x="60" y="338" width="160" height="52" rx="8" fill="#1a1208" stroke="#6a4010" stroke-width="1.5"/>
  <text x="140" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e09055" text-anchor="middle">TiKV Node 1</text>
  <text x="140" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Region + Raft 리더</text>

  <rect x="232" y="338" width="160" height="52" rx="8" fill="#1a1208" stroke="#6a4010" stroke-width="1.5"/>
  <text x="312" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e09055" text-anchor="middle">TiKV Node 2</text>
  <text x="312" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Raft 팔로워</text>

  <!-- TiFlash nodes -->
  <text x="660" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">TiFlash (열 스토리지)</text>

  <rect x="448" y="338" width="160" height="52" rx="8" fill="#0a1a0a" stroke="#2a6a2a" stroke-width="1.5"/>
  <text x="528" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">TiFlash 1</text>
  <text x="528" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Raft Learner (컬럼)</text>

  <rect x="620" y="338" width="160" height="52" rx="8" fill="#0a1a0a" stroke="#2a6a2a" stroke-width="1.5"/>
  <text x="700" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">TiFlash 2</text>
  <text x="700" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">분석 쿼리 가속</text>

  <!-- Arrows: TiDB -> TiKV / TiFlash -->
  <line x1="200" y1="192" x2="200" y2="338" stroke="#e09055" stroke-width="2" marker-end="url(#arr-orange)"/>
  <text x="140" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e09055">OLTP</text>

  <line x1="660" y1="192" x2="620" y2="338" stroke="#55c555" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="668" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">OLAP</text>

  <!-- TiKV -> TiFlash replication arrow -->
  <path d="M 392 364 Q 420 400 448 364" stroke="#888" stroke-width="2" fill="none"
        stroke-dasharray="4,4" marker-end="url(#arr-purple)"/>
  <text x="420" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Raft Learner 복제</text>

  <!-- Bottom note -->
  <rect x="60" y="434" width="760" height="62" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="456" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- OLTP: TiKV로 라우팅 (행 스토리지, 저지연)</text>
  <text x="76" y="476" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">SELECT</tspan><tspan fill="#ffffff"> /*+ READ_FROM_STORAGE(TIFLASH[orders]) */ </tspan><tspan fill="#7ec8e3" font-weight="600">SUM</tspan><tspan fill="#ffffff">(amount) </tspan><tspan fill="#7ec8e3" font-weight="600">FROM</tspan><tspan fill="#ffffff"> orders;</tspan></text>
</svg>
