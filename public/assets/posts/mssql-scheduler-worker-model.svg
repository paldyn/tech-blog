<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SQL Server 스케줄러·워커·스레드 모델</text>

  <!-- Scheduler 0 -->
  <rect x="60" y="70" width="370" height="240" rx="10" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="245" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">Scheduler 0 (CPU 0)</text>

  <!-- Runnable Queue -->
  <text x="80" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Runnable Queue</text>
  <rect x="80" y="130" width="80" height="34" rx="4" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="120" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">Worker A</text>
  <rect x="170" y="130" width="80" height="34" rx="4" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="210" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">Worker B</text>
  <rect x="260" y="130" width="80" height="34" rx="4" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="300" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">Worker C</text>

  <!-- Running -->
  <text x="80" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Running (1개만)</text>
  <rect x="80" y="200" width="100" height="40" rx="4" fill="#0a1a30" stroke="#7ec8e3" stroke-width="2"/>
  <text x="130" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">Worker D</text>

  <!-- Suspended pool -->
  <text x="80" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Suspended Pool</text>
  <rect x="80" y="268" width="80" height="28" rx="4" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="120" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">Worker E</text>
  <rect x="170" y="268" width="80" height="28" rx="4" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="210" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">Worker F</text>
  <text x="260" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">... (I/O 대기)</text>

  <!-- Scheduler 1 -->
  <rect x="450" y="70" width="370" height="240" rx="10" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="635" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">Scheduler 1 (CPU 1)</text>

  <text x="470" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Runnable Queue</text>
  <rect x="470" y="130" width="80" height="34" rx="4" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="510" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">Worker G</text>
  <rect x="560" y="130" width="80" height="34" rx="4" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="600" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">Worker H</text>

  <text x="470" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Running (1개만)</text>
  <rect x="470" y="200" width="100" height="40" rx="4" fill="#0a1a30" stroke="#7ec8e3" stroke-width="2"/>
  <text x="520" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">Worker I</text>

  <text x="470" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Suspended Pool</text>
  <rect x="470" y="268" width="80" height="28" rx="4" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="510" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">Worker J</text>

  <!-- Worker Pool (free) -->
  <rect x="60" y="335" width="760" height="54" rx="8" fill="#1a1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Free Worker Pool</text>
  <text x="440" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">유휴 워커 재사용 (max worker threads: 기본 0 = 자동, CPU×7+504~2048)</text>

  <!-- Code block -->
  <rect x="60" y="410" width="760" height="90" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- 워커 스레드 설정 확인 및 변경</text>
  <text xml:space="preserve" x="80" y="450" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">EXEC</tspan><tspan fill="#ffffff"> sp_configure </tspan><tspan fill="#ce9178">'max worker threads'</tspan><tspan fill="#ffffff">;</tspan></text>
  <text xml:space="preserve" x="80" y="468" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">EXEC</tspan><tspan fill="#ffffff"> sp_configure </tspan><tspan fill="#ce9178">'max worker threads'</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">; </tspan><tspan fill="#9aa4b8">-- 0 = 자동</tspan></text>
  <text xml:space="preserve" x="80" y="486" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">RECONFIGURE</tspan><tspan fill="#ffffff">;</tspan></text>
</svg>
