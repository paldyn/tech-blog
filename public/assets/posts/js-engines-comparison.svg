<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480"
  style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">3대 JavaScript 엔진 비교</text>

  <!-- V8 -->
  <rect x="60" y="78" width="240" height="280" rx="10" fill="#0d1928" stroke="#7ec8e3" stroke-width="2"/>
  <text x="180" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="#7ec8e3">V8</text>
  <text x="180" y="128" text-anchor="middle" font-size="12" fill="#888">Google 개발 · 오픈소스</text>
  <line x1="76" y1="140" x2="284" y2="140" stroke="#1e2433" stroke-width="1"/>

  <text x="76" y="162" font-size="12" fill="#aaa">사용처</text>
  <text x="76" y="180" font-size="12" fill="#888">• Chrome / Chromium</text>
  <text x="76" y="198" font-size="12" fill="#888">• Node.js · Deno · Bun</text>
  <text x="76" y="216" font-size="12" fill="#888">• Edge (Chromium 기반)</text>

  <line x1="76" y1="230" x2="284" y2="230" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="250" font-size="12" fill="#aaa">주요 컴포넌트</text>
  <text x="76" y="268" font-size="12" fill="#888">• Ignition (인터프리터)</text>
  <text x="76" y="286" font-size="12" fill="#888">• TurboFan (JIT 컴파일러)</text>
  <text x="76" y="304" font-size="12" fill="#888">• Maglev (중간 단계 JIT)</text>
  <text x="76" y="322" font-size="12" fill="#888">• Orinoco (GC)</text>

  <line x1="76" y1="338" x2="284" y2="338" stroke="#1e2433" stroke-width="1"/>
  <text x="180" y="348" text-anchor="middle" font-size="11" fill="#555">C++로 작성</text>

  <!-- SpiderMonkey -->
  <rect x="320" y="78" width="240" height="280" rx="10" fill="#1a1420" stroke="#ce9178" stroke-width="2"/>
  <text x="440" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="#ce9178">SpiderMonkey</text>
  <text x="440" y="128" text-anchor="middle" font-size="12" fill="#888">Mozilla 개발 · 최초의 JS 엔진</text>
  <line x1="336" y1="140" x2="544" y2="140" stroke="#2a2020" stroke-width="1"/>

  <text x="336" y="162" font-size="12" fill="#aaa">사용처</text>
  <text x="336" y="180" font-size="12" fill="#888">• Firefox</text>
  <text x="336" y="198" font-size="12" fill="#888">• Firefox for Android</text>
  <text x="336" y="216" font-size="12" fill="#888">• Rhino (레거시)</text>

  <line x1="336" y1="230" x2="544" y2="230" stroke="#2a2020" stroke-width="1"/>
  <text x="336" y="250" font-size="12" fill="#aaa">주요 컴포넌트</text>
  <text x="336" y="268" font-size="12" fill="#888">• Baseline Interpreter</text>
  <text x="336" y="286" font-size="12" fill="#888">• WarpMonkey (JIT)</text>
  <text x="336" y="304" font-size="12" fill="#888">• IonMonkey (구형 JIT)</text>
  <text x="336" y="322" font-size="12" fill="#888">• Nursery GC</text>

  <line x1="336" y1="338" x2="544" y2="338" stroke="#2a2020" stroke-width="1"/>
  <text x="440" y="348" text-anchor="middle" font-size="11" fill="#555">C++/Rust로 작성</text>

  <!-- JavaScriptCore -->
  <rect x="580" y="78" width="240" height="280" rx="10" fill="#1a1a0a" stroke="#b5cea8" stroke-width="2"/>
  <text x="700" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="#b5cea8">JavaScriptCore</text>
  <text x="700" y="128" text-anchor="middle" font-size="12" fill="#888">Apple 개발 · WebKit 내장</text>
  <line x1="596" y1="140" x2="804" y2="140" stroke="#2a2a1a" stroke-width="1"/>

  <text x="596" y="162" font-size="12" fill="#aaa">사용처</text>
  <text x="596" y="180" font-size="12" fill="#888">• Safari (macOS · iOS)</text>
  <text x="596" y="198" font-size="12" fill="#888">• Bun (일부)</text>
  <text x="596" y="216" font-size="12" fill="#888">• React Native (iOS)</text>

  <line x1="596" y1="230" x2="804" y2="230" stroke="#2a2a1a" stroke-width="1"/>
  <text x="596" y="250" font-size="12" fill="#aaa">주요 컴포넌트</text>
  <text x="596" y="268" font-size="12" fill="#888">• LLInt (저수준 인터프리터)</text>
  <text x="596" y="286" font-size="12" fill="#888">• Baseline JIT</text>
  <text x="596" y="304" font-size="12" fill="#888">• DFG · FTL (최적화 JIT)</text>
  <text x="596" y="322" font-size="12" fill="#888">• Riptide GC</text>

  <line x1="596" y1="338" x2="804" y2="338" stroke="#2a2a1a" stroke-width="1"/>
  <text x="700" y="348" text-anchor="middle" font-size="11" fill="#555">C++로 작성</text>

  <!-- Common note -->
  <rect x="60" y="390" width="760" height="52" rx="7" fill="#111" stroke="#333"/>
  <text x="440" y="412" text-anchor="middle" font-size="13" fill="#888">세 엔진 모두 ECMAScript 표준을 구현하며, 각자 독자적인 최적화 전략으로 성능을 경쟁합니다.</text>
  <text x="440" y="432" text-anchor="middle" font-size="12" fill="#666">브라우저 개발자 도구에서 "V8-specific" 또는 "JSC-specific" 동작 차이를 발견할 수 있습니다.</text>

  <!-- Footer -->
  <text x="440" y="462" text-anchor="middle" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복 시리즈 · Part I</text>
</svg>
