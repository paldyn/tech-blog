<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">주요 JavaScript 엔진 비교</text>

  <!-- V8 -->
  <rect x="60" y="80" width="240" height="150" rx="10" fill="#0e1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">V8</text>
  <text x="180" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Google 개발 (2008~)</text>
  <text x="180" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">Chrome · Node.js · Deno</text>
  <text x="180" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">Edge (Chromium) · Bun</text>
  <text x="180" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">Ignition + TurboFan + Maglev</text>

  <!-- SpiderMonkey -->
  <rect x="320" y="80" width="240" height="150" rx="10" fill="#0e150e" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">SpiderMonkey</text>
  <text x="440" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Mozilla 개발 (1996~)</text>
  <text x="440" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">Firefox</text>
  <text x="440" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">최초의 JS 엔진</text>
  <text x="440" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">IonMonkey + WarpMonkey</text>

  <!-- JavaScriptCore -->
  <rect x="580" y="80" width="240" height="150" rx="10" fill="#1a150e" stroke="#e8c55a" stroke-width="1.5"/>
  <text x="700" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e8c55a" text-anchor="middle">JavaScriptCore</text>
  <text x="700" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Apple/WebKit (2002~)</text>
  <text x="700" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">Safari · iOS 브라우저</text>
  <text x="700" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">Bun (동시 사용)</text>
  <text x="700" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666" text-anchor="middle">LLInt + Baseline + DFG + FTL</text>

  <!-- Why it matters section -->
  <rect x="60" y="252" width="760" height="120" rx="8" fill="#111" stroke="#333"/>
  <text x="440" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">엔진이 개발자에게 중요한 이유</text>

  <text x="80" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">●</text>
  <text x="100" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">성능 최적화: 같은 형태의 객체 반복 생성, 타입 일관성 유지 → JIT 최적화 극대화</text>

  <text x="80" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">●</text>
  <text x="100" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">크로스 브라우저 동작: 엔진마다 ES 스펙 구현 속도가 달라 신기능 지원 시기가 다름</text>

  <text x="80" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8c55a">●</text>
  <text x="100" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">메모리 관리: GC 알고리즘 차이로 힙 크기와 GC 멈춤 특성이 플랫폼마다 다름</text>

  <text x="80" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">●</text>
  <text x="100" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">디버깅: V8 기반 DevTools가 가장 풍부한 프로파일링 도구 제공</text>

  <text x="440" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN · JavaScript 완전 정복</text>
</svg>
