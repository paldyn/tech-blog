<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <style>
      text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }
    </style>
  </defs>
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">3대 JS 엔진 비교</text>

  <!-- Column headers -->
  <text x="160" y="74" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">V8</text>
  <text x="440" y="74" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">SpiderMonkey</text>
  <text x="720" y="74" text-anchor="middle" font-size="14" font-weight="600" fill="#ce9178">JavaScriptCore</text>

  <line x1="60" y1="82" x2="820" y2="82" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Row 1: Made by -->
  <text x="80" y="106" font-size="12" fill="#666">개발사</text>
  <text x="160" y="106" text-anchor="middle" font-size="13" fill="#7ec8e3">Google</text>
  <text x="440" y="106" text-anchor="middle" font-size="13" fill="#55c555">Mozilla</text>
  <text x="720" y="106" text-anchor="middle" font-size="13" fill="#ce9178">Apple</text>
  <line x1="60" y1="116" x2="820" y2="116" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Row 2: Used in -->
  <text x="80" y="140" font-size="12" fill="#666">사용처</text>
  <text x="160" y="140" text-anchor="middle" font-size="12" fill="#888">Chrome · Node.js</text>
  <text x="440" y="140" text-anchor="middle" font-size="12" fill="#888">Firefox</text>
  <text x="720" y="140" text-anchor="middle" font-size="12" fill="#888">Safari · WebKit</text>
  <line x1="60" y1="150" x2="820" y2="150" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Row 3: Language -->
  <text x="80" y="174" font-size="12" fill="#666">구현 언어</text>
  <text x="160" y="174" text-anchor="middle" font-size="12" fill="#888">C++</text>
  <text x="440" y="174" text-anchor="middle" font-size="12" fill="#888">C++ · Rust</text>
  <text x="720" y="174" text-anchor="middle" font-size="12" fill="#888">C++</text>
  <line x1="60" y1="184" x2="820" y2="184" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Row 4: JIT -->
  <text x="80" y="208" font-size="12" fill="#666">JIT 전략</text>
  <text x="160" y="208" text-anchor="middle" font-size="12" fill="#888">Ignition + TurboFan</text>
  <text x="440" y="208" text-anchor="middle" font-size="12" fill="#888">Baseline + Ion</text>
  <text x="720" y="208" text-anchor="middle" font-size="12" fill="#888">LLInt + DFG + FTL</text>
  <line x1="60" y1="218" x2="820" y2="218" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Row 5: Feature / Strength -->
  <text x="80" y="242" font-size="12" fill="#666">강점</text>
  <text x="160" y="234" text-anchor="middle" font-size="11" fill="#7ec8e3">업계 최고 성능</text>
  <text x="160" y="252" text-anchor="middle" font-size="11" fill="#7ec8e3">대규모 생태계</text>
  <text x="440" y="234" text-anchor="middle" font-size="11" fill="#55c555">오픈소스·표준 준수</text>
  <text x="440" y="252" text-anchor="middle" font-size="11" fill="#55c555">빠른 기능 실험</text>
  <text x="720" y="234" text-anchor="middle" font-size="11" fill="#ce9178">iOS 유일 엔진</text>
  <text x="720" y="252" text-anchor="middle" font-size="11" fill="#ce9178">에너지 효율 최적화</text>
  <line x1="60" y1="262" x2="820" y2="262" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Row 6: Open source -->
  <text x="80" y="286" font-size="12" fill="#666">오픈소스</text>
  <text x="160" y="286" text-anchor="middle" font-size="12" fill="#55c555">✓ BSD License</text>
  <text x="440" y="286" text-anchor="middle" font-size="12" fill="#55c555">✓ MPL 2.0</text>
  <text x="720" y="286" text-anchor="middle" font-size="12" fill="#55c555">✓ LGPL / BSD</text>
  <line x1="60" y1="296" x2="820" y2="296" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Vertical dividers -->
  <line x1="280" y1="82" x2="280" y2="300" stroke="#1e2433" stroke-width="1"/>
  <line x1="560" y1="82" x2="560" y2="300" stroke="#1e2433" stroke-width="1"/>

  <!-- Bottom section: shared conformance -->
  <rect x="60" y="318" width="760" height="80" rx="6" fill="#0d1117" stroke="#2a2a2a"/>
  <text x="440" y="342" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">공통점: ECMAScript 표준 준수</text>
  <text x="440" y="364" text-anchor="middle" font-size="12" fill="#888">세 엔진 모두 TC39의 Test262 테스트 스위트를 통과해야 "ECMAScript 호환"을 인정받습니다.</text>
  <text x="440" y="382" text-anchor="middle" font-size="12" fill="#888">엔진마다 최적화 방식은 달라도, 동일한 JavaScript 코드는 같은 결과를 내야 합니다.</text>

  <!-- Footer -->
  <text x="440" y="446" text-anchor="middle" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복 시리즈</text>
</svg>
