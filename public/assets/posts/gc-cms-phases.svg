<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="cms-arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">CMS GC — 4 단계 동시 수집 타임라인</text>

  <!-- legend -->
  <rect x="300" y="62" width="14" height="14" rx="3" fill="#3a1414" stroke="#e05555" stroke-width="1.5"/>
  <text x="320" y="74" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">STW (전 스레드 정지)</text>
  <rect x="470" y="62" width="14" height="14" rx="3" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="490" y="74" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">동시 (앱과 함께 실행)</text>

  <!-- ===== timeline track row labels ===== -->
  <text x="118" y="128" text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">App 스레드</text>
  <text x="118" y="178" text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">GC 스레드</text>

  <!-- Phase 1: Initial Mark (STW, short) -->
  <!-- App stopped during STW: no app bar here -->
  <rect x="130" y="114" width="2" height="0" fill="none"/>
  <!-- Phase columns geometry: x130..x810 (width 680) -->
  <!-- 1: 130..200 (STW)  gap -->
  <!-- 2: 210..500 (concurrent, wide) -->
  <!-- 3: 510..580 (STW) -->
  <!-- 4: 590..810 (concurrent, wide) -->

  <!-- App thread bars (run during concurrent phases only) -->
  <rect x="210" y="114" width="290" height="20" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>
  <rect x="590" y="114" width="220" height="20" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>
  <!-- app stopped markers under STW columns -->
  <rect x="130" y="114" width="70" height="20" rx="4" fill="#2a1414" stroke="#e05555" stroke-width="1" stroke-dasharray="4,4"/>
  <rect x="510" y="114" width="70" height="20" rx="4" fill="#2a1414" stroke="#e05555" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="165" y="129" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">정지</text>
  <text x="545" y="129" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">정지</text>

  <!-- GC thread bars -->
  <rect x="130" y="164" width="70" height="20" rx="4" fill="#3a1414" stroke="#e05555" stroke-width="1.5"/>
  <rect x="210" y="164" width="290" height="20" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <rect x="510" y="164" width="70" height="20" rx="4" fill="#3a1414" stroke="#e05555" stroke-width="1.5"/>
  <rect x="590" y="164" width="220" height="20" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>

  <!-- Phase boxes (detail cards) -->
  <!-- Phase 1 -->
  <rect x="60" y="214" width="180" height="96" rx="8" fill="#1a0e0e" stroke="#e05555" stroke-width="1.5"/>
  <text x="150" y="240" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">1. Initial Mark</text>
  <text x="150" y="262" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">STW · 매우 짧음</text>
  <text x="150" y="282" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">루트 직접 참조</text>
  <text x="150" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">객체만 표시</text>

  <!-- Phase 2 -->
  <rect x="260" y="214" width="180" height="96" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="350" y="240" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">2. Concurrent Mark</text>
  <text x="350" y="262" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">동시 · 앱 실행 중</text>
  <text x="350" y="282" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">전체 그래프 추적</text>
  <text x="350" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">write barrier로 변경 추적</text>

  <!-- Phase 3 -->
  <rect x="460" y="214" width="180" height="96" rx="8" fill="#1a0e0e" stroke="#e05555" stroke-width="1.5"/>
  <text x="550" y="240" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">3. Remark</text>
  <text x="550" y="262" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">STW · 짧음</text>
  <text x="550" y="282" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">동시 마크 중 변한</text>
  <text x="550" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">부분만 재확인</text>

  <!-- Phase 4 -->
  <rect x="660" y="214" width="180" height="96" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="750" y="240" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">4. Concurrent Sweep</text>
  <text x="750" y="262" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">동시 · 앱 실행 중</text>
  <text x="750" y="282" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">죽은 객체 회수</text>
  <text x="750" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">compaction 없음</text>

  <!-- arrows between phases -->
  <line x1="240" y1="262" x2="258" y2="262" stroke="#7777cc" stroke-width="2" marker-end="url(#cms-arr)"/>
  <line x1="440" y1="262" x2="458" y2="262" stroke="#7777cc" stroke-width="2" marker-end="url(#cms-arr)"/>
  <line x1="640" y1="262" x2="658" y2="262" stroke="#7777cc" stroke-width="2" marker-end="url(#cms-arr)"/>

  <!-- bottom note -->
  <text x="60" y="350" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">핵심 — STW는 Initial Mark · Remark 두 번뿐, 둘 다 짧다</text>
  <text x="60" y="372" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">가장 무거운 작업(전체 마크 · 스윕)은 앱이 도는 동안 동시에 수행</text>
  <text x="60" y="394" text-anchor="start"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">대가: GC 스레드가 앱과 CPU를 나눠 쓰고, write barrier 상시 비용을 지불</text>

  <!-- code box: log line -->
  <rect x="60" y="412" width="760" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="438" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">[gc] CMS Initial Mark <tspan fill="#b5cea8">2.1ms</tspan>  CMS Final Remark <tspan fill="#b5cea8">5.4ms</tspan></text>
  <text x="76" y="458" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 두 STW 합쳐 수 ms — 나머지 마크/스윕은 concurrent</text>
  <text x="76" y="478" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">CMS-concurrent-mark / CMS-concurrent-sweep <tspan fill="#9aa4b8">(앱 동시 실행)</tspan></text>
</svg>
