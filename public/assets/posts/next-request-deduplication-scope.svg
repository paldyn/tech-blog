<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arb" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="are" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Memoization vs Data Cache — 스코프 비교</text>

  <!-- Divider line -->
  <line x1="440" y1="70" x2="440" y2="450" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Left column header: Request Memoization -->
  <text x="230" y="82"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">Request Memoization</text>

  <!-- Right column header: Data Cache -->
  <text x="660" y="82"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">Data Cache</text>

  <!-- === LEFT COLUMN === -->

  <!-- Request 1 label -->
  <text x="70" y="112"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">요청 1</text>

  <!-- Request 1: Components share cache -->
  <rect x="70" y="120" width="340" height="64" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="147"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">캐시 생성 → 컴포넌트간 공유</text>
  <text x="240" y="169"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">렌더 완료 후 캐시 자동 해제</text>

  <!-- Arrow down -->
  <line x1="240" y1="184" x2="240" y2="210" stroke="#666" stroke-width="1.5" marker-end="url(#arb)"/>

  <!-- Cleared indicator -->
  <rect x="130" y="214" width="220" height="40" rx="6" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="239"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">캐시 해제 (렌더 완료)</text>

  <!-- Request 2 label -->
  <text x="70" y="282"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">요청 2</text>

  <!-- Request 2: Fresh cache -->
  <rect x="70" y="290" width="340" height="64" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="317"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">새 캐시 생성 → 실제 fetch 발생</text>
  <text x="240" y="339"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">요청마다 초기화 — 이전 캐시 미사용</text>

  <!-- Scope note left -->
  <rect x="70" y="378" width="340" height="52" rx="6" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="401"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">스코프: 단일 렌더 패스 (서버 요청 1회)</text>
  <text x="240" y="419"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#7ec8e3">React.cache() 로 fetch 외 함수도 적용 가능</text>

  <!-- === RIGHT COLUMN === -->

  <!-- Request 1 label -->
  <text x="470" y="112"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">요청 1</text>

  <!-- Request 1: Cache created -->
  <rect x="470" y="120" width="340" height="64" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="147"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">캐시 미스 → fetch 실행 → 저장</text>
  <text x="640" y="169"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">캐시에 응답 데이터 저장 (파일시스템)</text>

  <!-- Arrow down -->
  <line x1="640" y1="184" x2="640" y2="210" stroke="#55c555" stroke-width="1.5" marker-end="url(#arg)"/>

  <!-- Persisted indicator -->
  <rect x="530" y="214" width="220" height="40" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="239"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">캐시 유지 (요청 간 지속)</text>

  <!-- Request 2 label -->
  <text x="470" y="282"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">요청 2</text>

  <!-- Request 2: Cache hit -->
  <rect x="470" y="290" width="340" height="64" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="317"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">캐시 히트 → fetch 없음</text>
  <text x="640" y="339"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">저장된 응답 반환 — 네트워크 미사용</text>

  <!-- Scope note right -->
  <rect x="470" y="378" width="340" height="52" rx="6" fill="#0d1a0d" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="401"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">스코프: 앱 전체 (서버 재시작 or 만료까지)</text>
  <text x="640" y="419"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#55c555">revalidate / revalidateTag 로 무효화</text>
</svg>
