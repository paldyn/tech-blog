<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" style="background:#0a0a0a">
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">key prop: 올바른 사용법과 안티패턴</text>

  <rect x="60" y="68" width="370" height="98" rx="12" fill="#2a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="245" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">index를 key로 사용 — 위험</text>
  <rect x="76" y="106" width="338" height="48" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">// 재정렬/삭제 시 state 오염 발생!</text>
  <text x="92" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">{items.map((item, </tspan><tspan fill="#e05555">i</tspan><tspan fill="#ffffff">) =&gt; &lt;</tspan><tspan fill="#55c555">li</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#cc77cc">key</tspan><tspan fill="#ffffff">={</tspan><tspan fill="#e05555">i</tspan><tspan fill="#ffffff">}&gt;...)}</tspan></text>

  <rect x="450" y="68" width="370" height="98" rx="12" fill="#0d2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="635" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">고유 ID를 key로 — 안전</text>
  <rect x="466" y="106" width="338" height="48" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" xml:space="preserve">// 고유하고 안정적인 식별자 사용</text>
  <text x="482" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">{items.map(item =&gt; &lt;</tspan><tspan fill="#55c555">li</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#cc77cc">key</tspan><tspan fill="#ffffff">={item.</tspan><tspan fill="#55c555">id</tspan><tspan fill="#ffffff">}&gt;...)}</tspan></text>

  <text x="440" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">key의 역할 — React Reconciliation 최적화</text>

  <rect x="60" y="220" width="760" height="78" rx="8" fill="#0f1825" stroke="#7ec8e3" stroke-width="1"/>
  <text x="80" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">고유 ID 사용 시</text>
  <text x="80" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">항목 재정렬·삽입·삭제 시 React가 어느 DOM을 재사용할지 정확히 파악 → 불필요한 재렌더 최소화</text>
  <text x="80" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">index 사용 시: 삭제 후 index 재배정 → 잘못된 DOM 재사용 → input state 오염, 오작동</text>

  <rect x="60" y="320" width="760" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 중첩 리스트 — React.Fragment key 패턴</text>
  <text x="76" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">{sections.map(s =&gt; (</tspan></text>
  <text x="76" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  &lt;</tspan><tspan fill="#55c555">React.Fragment</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#cc77cc">key</tspan><tspan fill="#ffffff">={s.id}&gt;&lt;</tspan><tspan fill="#55c555">h2</tspan><tspan fill="#ffffff">&gt;{s.title}&lt;/</tspan><tspan fill="#55c555">h2</tspan><tspan fill="#ffffff">&gt;&lt;</tspan><tspan fill="#55c555">p</tspan><tspan fill="#ffffff">&gt;{s.body}&lt;/</tspan><tspan fill="#55c555">p</tspan><tspan fill="#ffffff">&gt;&lt;/</tspan><tspan fill="#55c555">React.Fragment</tspan><tspan fill="#ffffff">&gt;</tspan></text>
  <text x="76" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">))}</text>
  <text x="76" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// &lt;&gt;&lt;/&gt; 단축은 key 불가 — React.Fragment 명시 필요</text>
</svg>
