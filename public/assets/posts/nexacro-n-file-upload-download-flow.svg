<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">파일 업로드·다운로드 흐름</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">Upload / Download 컴포넌트 기반 처리</text>

  <!-- Upload flow -->
  <rect x="60" y="96" width="340" height="340" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">업로드 흐름</text>

  <rect x="80" y="132" width="300" height="36" rx="4" fill="#0a1a2a"/>
  <text x="230" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">① FileUpload 컴포넌트 — 파일 선택</text>

  <line x1="230" y1="168" x2="230" y2="192" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="224,192 230,204 236,192" fill="#7ec8e3"/>

  <rect x="80" y="204" width="300" height="36" rx="4" fill="#0a1a2a"/>
  <text x="230" y="227" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">② upload() 호출 — 파일 전송 시작</text>

  <line x1="230" y1="240" x2="230" y2="264" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="224,264 230,276 236,264" fill="#7ec8e3"/>

  <rect x="80" y="276" width="300" height="36" rx="4" fill="#0a1a2a"/>
  <text x="230" y="299" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">③ onuploadcompleted — 결과 처리</text>

  <line x1="230" y1="312" x2="230" y2="336" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="224,336 230,348 236,336" fill="#7ec8e3"/>

  <rect x="80" y="348" width="300" height="36" rx="4" fill="#0a1a2a"/>
  <text x="230" y="371" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">④ 서버 저장 완료 → Dataset 갱신</text>

  <!-- Download flow -->
  <rect x="480" y="96" width="340" height="340" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">다운로드 흐름</text>

  <rect x="500" y="132" width="300" height="36" rx="4" fill="#0a2010"/>
  <text x="650" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">① 파일 ID / URL 확보 (Dataset)</text>

  <line x1="650" y1="168" x2="650" y2="192" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="644,192 650,204 656,192" fill="#55c555"/>

  <rect x="500" y="204" width="300" height="36" rx="4" fill="#0a2010"/>
  <text x="650" y="227" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">② nexacro.FileDownload() 호출</text>

  <line x1="650" y1="240" x2="650" y2="264" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="644,264 650,276 656,264" fill="#55c555"/>

  <rect x="500" y="276" width="300" height="36" rx="4" fill="#0a2010"/>
  <text x="650" y="299" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">③ 브라우저 다운로드 다이얼로그</text>

  <line x1="650" y1="312" x2="650" y2="336" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="644,336 650,348 656,336" fill="#55c555"/>

  <rect x="500" y="348" width="300" height="36" rx="4" fill="#0a2010"/>
  <text x="650" y="371" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">④ 완료 — ondownloadcompleted</text>
</svg>
