<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">모델 클래스가 DB 테이블이 되기까지</text>

  <defs>
    <marker id="dgar" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="60" y="96" width="230" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="124" font-size="13" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace"># models.py</text>
  <text x="76" y="148" font-size="13" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#7ec8e3" font-weight="600">class</tspan> Book(Model):</text>
  <text x="76" y="172" font-size="13" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  title = CharField()</text>
  <text x="76" y="196" font-size="13" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  price = IntegerField()</text>
  <text x="76" y="226" font-size="12" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace"># 파이썬 클래스</text>

  <line x1="290" y1="171" x2="356" y2="171" stroke="#7ec8e3" stroke-width="2" marker-end="url(#dgar)"/>
  <text x="323" y="154" font-size="11" fill="#9aa4b8" text-anchor="middle">makemigrations</text>
  <text x="323" y="192" font-size="11" fill="#9aa4b8" text-anchor="middle">migrate</text>

  <rect x="360" y="96" width="180" height="150" rx="6" fill="#000000" stroke="#7777cc" stroke-width="1"/>
  <text x="450" y="132" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">마이그레이션</text>
  <text x="450" y="160" font-size="12" fill="#9aa4b8" text-anchor="middle">스키마 변경을</text>
  <text x="450" y="180" font-size="12" fill="#9aa4b8" text-anchor="middle">파이썬 파일로</text>
  <text x="450" y="208" font-size="12" fill="#9aa4b8" text-anchor="middle">기록하고 적용</text>

  <line x1="540" y1="171" x2="606" y2="171" stroke="#55c555" stroke-width="2" marker-end="url(#dgar)"/>

  <rect x="610" y="96" width="210" height="150" rx="6" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="715" y="126" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">DB 테이블</text>
  <text x="626" y="156" font-size="13" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">app_book</text>
  <text x="626" y="180" font-size="12" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">id | title | price</text>
  <text x="626" y="212" font-size="12" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">SQL은 자동 생성</text>

  <rect x="60" y="262" width="760" height="30" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="282" font-size="13" fill="#55c555" text-anchor="middle">SQL을 직접 쓰지 않고, 파이썬 클래스로 테이블을 정의한다</text>
</svg>
