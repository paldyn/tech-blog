<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">부동소수점 정밀도 비교: FP32 → FP16 → BF16 → INT8 → INT4</text>
  <text x="440" y="68" font-size="15" fill="#888" text-anchor="middle">비트 구성 · 메모리 · 7B 모델 파일 크기 비교</text>

  <!-- === BIT LAYOUT ROWS === -->
  <!-- Labels -->
  <text x="60" y="102" font-size="12" font-weight="700" fill="#888">형식</text>
  <text x="160" y="102" font-size="12" font-weight="700" fill="#888">비트 구성 (부호 / 지수 / 가수)</text>
  <text x="620" y="102" font-size="12" font-weight="700" fill="#888">7B 모델 크기</text>
  <text x="760" y="102" font-size="12" font-weight="700" fill="#888">주요 활용</text>

  <!-- FP32 -->
  <text x="60" y="136" font-size="13" font-weight="700" fill="#e8e8e8">FP32</text>
  <!-- sign -->
  <rect x="158" y="118" width="20" height="24" rx="3" fill="#e05555"/>
  <text x="168" y="134" font-size="9" fill="#fff" text-anchor="middle">S</text>
  <!-- exponent 8 bits -->
  <rect x="180" y="118" width="160" height="24" rx="3" fill="#7ec8e3"/>
  <text x="260" y="134" font-size="9" fill="#0a0a0a" text-anchor="middle">지수 8비트</text>
  <!-- mantissa 23 bits -->
  <rect x="342" y="118" width="230" height="24" rx="3" fill="#7777cc"/>
  <text x="457" y="134" font-size="9" fill="#fff" text-anchor="middle">가수 23비트</text>
  <text x="580" y="136" font-size="11" fill="#888">32비트 총합</text>
  <text x="620" y="136" font-size="13" font-weight="700" fill="#ce9178">28 GB</text>
  <text x="760" y="136" font-size="11" fill="#888">학습 기준치</text>

  <!-- FP16 -->
  <text x="60" y="182" font-size="13" font-weight="700" fill="#e8e8e8">FP16</text>
  <rect x="158" y="164" width="20" height="24" rx="3" fill="#e05555"/>
  <text x="168" y="180" font-size="9" fill="#fff" text-anchor="middle">S</text>
  <rect x="180" y="164" width="100" height="24" rx="3" fill="#7ec8e3"/>
  <text x="230" y="180" font-size="9" fill="#0a0a0a" text-anchor="middle">지수 5비트</text>
  <rect x="282" y="164" width="200" height="24" rx="3" fill="#7777cc"/>
  <text x="382" y="180" font-size="9" fill="#fff" text-anchor="middle">가수 10비트</text>
  <text x="490" y="182" font-size="11" fill="#555">16비트</text>
  <text x="620" y="182" font-size="13" font-weight="700" fill="#7ec8e3">14 GB</text>
  <text x="760" y="182" font-size="11" fill="#888">추론·학습 혼합</text>

  <!-- BF16 -->
  <text x="60" y="228" font-size="13" font-weight="700" fill="#e8e8e8">BF16</text>
  <rect x="158" y="210" width="20" height="24" rx="3" fill="#e05555"/>
  <text x="168" y="226" font-size="9" fill="#fff" text-anchor="middle">S</text>
  <rect x="180" y="210" width="160" height="24" rx="3" fill="#7ec8e3"/>
  <text x="260" y="226" font-size="9" fill="#0a0a0a" text-anchor="middle">지수 8비트 (FP32와 동일)</text>
  <rect x="342" y="210" width="80" height="24" rx="3" fill="#7777cc"/>
  <text x="382" y="226" font-size="9" fill="#fff" text-anchor="middle">가수 7비트</text>
  <text x="430" y="228" font-size="11" fill="#555">16비트</text>
  <text x="620" y="228" font-size="13" font-weight="700" fill="#7ec8e3">14 GB</text>
  <text x="760" y="228" font-size="11" fill="#888">LLM 학습 권장</text>

  <!-- INT8 -->
  <text x="60" y="274" font-size="13" font-weight="700" fill="#e8e8e8">INT8</text>
  <rect x="158" y="256" width="20" height="24" rx="3" fill="#e05555"/>
  <text x="168" y="272" font-size="9" fill="#fff" text-anchor="middle">S</text>
  <rect x="180" y="256" width="120" height="24" rx="3" fill="#55c555"/>
  <text x="240" y="272" font-size="9" fill="#0a0a0a" text-anchor="middle">정수 7비트</text>
  <text x="308" y="274" font-size="11" fill="#555">8비트</text>
  <text x="620" y="274" font-size="13" font-weight="700" fill="#55c555">7 GB</text>
  <text x="760" y="274" font-size="11" fill="#888">추론 양자화</text>

  <!-- INT4 -->
  <text x="60" y="320" font-size="13" font-weight="700" fill="#e8e8e8">INT4</text>
  <rect x="158" y="302" width="20" height="24" rx="3" fill="#e05555"/>
  <text x="168" y="318" font-size="9" fill="#fff" text-anchor="middle">S</text>
  <rect x="180" y="302" width="60" height="24" rx="3" fill="#55c555" opacity="0.7"/>
  <text x="210" y="318" font-size="9" fill="#0a0a0a" text-anchor="middle">정수 3비트</text>
  <text x="248" y="320" font-size="11" fill="#555">4비트</text>
  <text x="620" y="320" font-size="13" font-weight="700" fill="#b5cea8">3.5 GB</text>
  <text x="760" y="320" font-size="11" fill="#888">엣지 배포</text>

  <!-- Legend -->
  <rect x="60" y="346" width="14" height="14" rx="2" fill="#e05555"/>
  <text x="80" y="358" font-size="11" fill="#888">부호 비트</text>
  <rect x="160" y="346" width="14" height="14" rx="2" fill="#7ec8e3"/>
  <text x="180" y="358" font-size="11" fill="#888">지수 비트 (동적 범위 결정)</text>
  <rect x="390" y="346" width="14" height="14" rx="2" fill="#7777cc"/>
  <text x="410" y="358" font-size="11" fill="#888">가수 비트 (정밀도 결정)</text>
  <rect x="600" y="346" width="14" height="14" rx="2" fill="#55c555"/>
  <text x="620" y="358" font-size="11" fill="#888">정수 표현</text>

  <!-- BF16 vs FP16 callout -->
  <rect x="60" y="376" width="756" height="62" rx="8" fill="#0d1b2a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="398" font-size="12" font-weight="700" fill="#7ec8e3">BF16 vs FP16 핵심 차이</text>
  <text x="80" y="416" font-size="11" fill="#e8e8e8">BF16: 지수 8비트(FP32와 동일) → 표현 범위 넓음, 오버플로 없음 → LLM 학습에 적합</text>
  <text x="80" y="432" font-size="11" fill="#888">FP16: 지수 5비트 → 표현 범위 좁음, 오버플로 주의 → 정밀도는 더 높으나 학습 불안정 가능</text>
</svg>
