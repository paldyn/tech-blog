<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440"
     style="border-radius:12px" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>
  <text x="440" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">회의 요약 출력 구조</text>

  <!-- Two columns -->
  <!-- Left: Schema -->
  <text x="220" y="72" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">JSON 스키마</text>
  <rect x="60" y="82" width="320" height="280" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="108" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">{</text>
  <text x="80" y="127" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">  summary</text>
  <text x="80" y="127" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">           : str,</text>
  <text x="80" y="146" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">  decisions</text>
  <text x="80" y="146" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">          : [str],</text>
  <text x="80" y="165" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">  action_items</text>
  <text x="80" y="165" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">       : [</text>
  <text x="80" y="184" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    {</text>
  <text x="80" y="203" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" font-weight="600" fill="#7777cc" xml:space="preserve">      task</text>
  <text x="80" y="203" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">       : str,</text>
  <text x="80" y="222" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" font-weight="600" fill="#7777cc" xml:space="preserve">      owner</text>
  <text x="80" y="222" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      : str,</text>
  <text x="80" y="241" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" font-weight="600" fill="#7777cc" xml:space="preserve">      due_date</text>
  <text x="80" y="241" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">   : str</text>
  <text x="80" y="260" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    }],</text>
  <text x="80" y="279" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">  participants</text>
  <text x="80" y="279" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">       : [str],</text>
  <text x="80" y="298" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">  keywords</text>
  <text x="80" y="298" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">           : [str]</text>
  <text x="80" y="342" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">}</text>

  <!-- Right: Example output -->
  <text x="660" y="72" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">출력 예시</text>

  <rect x="460" y="82" width="360" height="80" rx="8" fill="#0f2418" stroke="#55c555" stroke-width="1.5"/>
  <text x="480" y="106" font-size="13" font-weight="600" fill="#55c555">요약</text>
  <text x="480" y="124" font-size="12" fill="#e8e8e8">Q3 출시 일정 조정 논의. API 통합 이슈로</text>
  <text x="480" y="142" font-size="12" fill="#e8e8e8">2주 연장 결정. 추가 개발자 투입 검토.</text>

  <rect x="460" y="174" width="360" height="76" rx="8" fill="#1a1030" stroke="#7777cc" stroke-width="1.5"/>
  <text x="480" y="196" font-size="13" font-weight="600" fill="#7777cc">결정사항</text>
  <text x="480" y="214" font-size="12" fill="#e8e8e8">• Q3 출시일 2주 연기 (7/15 → 7/29)</text>
  <text x="480" y="232" font-size="12" fill="#e8e8e8">• 추가 개발자 1명 배정 (다음 주까지)</text>

  <rect x="460" y="262" width="360" height="100" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="480" y="284" font-size="13" font-weight="600" fill="#7ec8e3">액션아이템</text>
  <text x="480" y="304" font-size="12" fill="#e8e8e8">① [이개발] API 버그 수정 → 6/3</text>
  <text x="480" y="322" font-size="12" fill="#e8e8e8">② [김팀장] 일정 변경 고객 공지 → 5/28</text>
  <text x="480" y="340" font-size="12" fill="#e8e8e8">③ [박기획] 추가 인력 HR 요청 → 5/29</text>

  <!-- Bottom note -->
  <rect x="60" y="390" width="760" height="30" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="410" text-anchor="middle" font-size="12" fill="#888">Slack · 이메일 · Notion · Jira 자동 연동으로 후속 처리 자동화 가능</text>
</svg>
