<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arrd" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">핸드셰이크 중 상태 전이 (클라이언트)</text>

  <!-- State boxes -->
  <!-- CLOSED -->
  <rect x="340" y="68" width="200" height="48" rx="8" fill="#1a1a1a" stroke="#555" stroke-width="1.5"/>
  <text x="440" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#888">CLOSED</text>

  <!-- Arrow CLOSED -> SYN_SENT -->
  <line x1="440" y1="116" x2="440" y2="156" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrd)"/>
  <text x="450" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">connect() 호출</text>

  <!-- SYN_SENT -->
  <rect x="310" y="156" width="260" height="48" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">SYN_SENT</text>

  <!-- Arrow SYN_SENT -> ESTABLISHED -->
  <line x1="440" y1="204" x2="440" y2="244" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrd)"/>
  <text x="450" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">SYN+ACK 수신, ACK 전송</text>

  <!-- ESTABLISHED -->
  <rect x="290" y="244" width="300" height="48" rx="8" fill="#0a2a0a" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">ESTABLISHED</text>

  <!-- Annotation boxes -->
  <!-- Left: what happens in SYN_SENT -->
  <rect x="60" y="156" width="220" height="70" rx="6" fill="#111820" stroke="#2a3a4a" stroke-width="1"/>
  <text x="80" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">SYN_SENT 상태에서</text>
  <text x="80" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• SYN 세그먼트 전송</text>
  <text x="80" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• SYN+ACK 응답 대기</text>
  <line x1="280" y1="191" x2="310" y2="180" stroke="#2a3a4a" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Right: what happens in ESTABLISHED -->
  <rect x="620" y="244" width="200" height="70" rx="6" fill="#0a2a0a" stroke="#2a4a2a" stroke-width="1"/>
  <text x="640" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">ESTABLISHED 에서</text>
  <text x="640" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 양방향 데이터 전송</text>
  <text x="640" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• seq/ack 추적</text>
  <line x1="620" y1="279" x2="590" y2="268" stroke="#2a4a2a" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Code block: ISN -->
  <rect x="60" y="350" width="760" height="108" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 핸드셰이크 패킷 캡처 예시 (tcpdump)</text>
  <text x="76" y="392" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">client <text fill="#7ec8e3" font-weight="600">SYN</text>     seq=1000</text>
  <text x="76" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">server <text fill="#55c555" font-weight="600">SYN+ACK</text>  seq=5000 ack=1001</text>
  <text x="76" y="432" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">client <text fill="#7ec8e3" font-weight="600">ACK</text>     seq=1001 ack=5001</text>
  <text x="76" y="452" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># ack = 상대방 seq + 1 (다음에 받을 바이트 번호)</text>
</svg>
