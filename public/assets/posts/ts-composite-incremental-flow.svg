<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arrI" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrId" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">incremental: 바뀐 것만 다시 빌드</text>

  <rect x="50" y="92" width="230" height="80" rx="8" fill="#11151c" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="70" y="126" font-size="14" font-weight="600" fill="#e8e8e8">1차 빌드</text>
  <text x="70" y="150" font-size="12" fill="#888">전체 컴파일 (느림)</text>

  <rect x="335" y="92" width="210" height="80" rx="8" fill="#11151c" stroke="#7777cc" stroke-width="1.5"/>
  <text x="355" y="126" font-size="14" font-weight="600" fill="#e8e8e8">.tsbuildinfo</text>
  <text x="355" y="150" font-size="12" fill="#888">빌드 상태 저장</text>

  <rect x="600" y="92" width="230" height="80" rx="8" fill="#11151c" stroke="#55c555" stroke-width="1.5"/>
  <text x="620" y="126" font-size="14" font-weight="600" fill="#e8e8e8">2차 빌드</text>
  <text x="620" y="150" font-size="12" fill="#888">바뀐 파일만 (빠름)</text>

  <line x1="280" y1="132" x2="335" y2="132" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrI)"/>
  <line x1="545" y1="132" x2="600" y2="132" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrI)"/>

  <path d="M 715 172 C 715 230, 440 240, 440 178" fill="none" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrId)"/>
  <text x="430" y="262" font-size="12" fill="#9aa4b8" text-anchor="middle">다음 빌드가 이전 상태를 읽어 비교</text>

  <text x="60" y="302" font-size="13" fill="#9aa4b8">.tsbuildinfo에 저장된 상태 덕에 변경 없는 파일은 재컴파일을 건너뛴다.</text>
</svg>
