<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Envelope Encryption: DEK + KEK 분리 전략</text>

  <!-- KMS / HSM -->
  <rect x="60" y="68" width="220" height="80" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="170" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">KMS / HSM</text>
  <text x="170" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">KEK (키 암호화 키)</text>
  <text x="170" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">마스터 키 — 외부 노출 없음</text>

  <!-- Arrow: KMS generates DEK -->
  <line x1="282" y1="108" x2="358" y2="108" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>
  <text x="318" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">DEK 생성</text>

  <!-- Application -->
  <rect x="360" y="68" width="220" height="80" rx="8" fill="#111122" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="470" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">애플리케이션</text>
  <text x="470" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">DEK로 데이터 암호화</text>
  <text x="470" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">사용 후 메모리에서 삭제</text>

  <!-- Arrow: Store encrypted DEK + ciphertext -->
  <line x1="582" y1="108" x2="658" y2="108" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="618" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">저장</text>

  <!-- Database -->
  <rect x="660" y="68" width="160" height="80" rx="8" fill="#0d200d" stroke="#55c555" stroke-width="1.5"/>
  <text x="740" y="91" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">데이터베이스</text>
  <text x="740" y="109" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">암호화된 DEK</text>
  <text x="740" y="127" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">암호문 (AES-GCM)</text>
  <text x="740" y="143" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">평문 키는 저장 안 함</text>

  <!-- KEK rotation benefit -->
  <rect x="60" y="170" width="760" height="80" rx="8" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="440" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">KEK 순환 시 재암호화 장점</text>
  <text x="440" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">DEK를 새 KEK로 재암호화만 하면 됨 — 실제 데이터(수 TB) 재암호화 불필요</text>
  <text x="440" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">각 레코드마다 별도 DEK 사용 → 한 DEK 노출돼도 다른 레코드 안전</text>
  <text x="440" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">(단: 동일 DEK 재사용은 Nonce 충돌 위험이 없는 범위로 제한)</text>

  <!-- Code block: Key versioning -->
  <rect x="60" y="264" width="760" height="118" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 키 버전 관리 — 복호화 시 어떤 키로 암호화됐는지 식별</text>
  <text x="76" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">def</tspan> encrypt_with_version(key_store, plaintext):</text>
  <text x="76" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    current_key = key_store.get_current()     <tspan fill="#9aa4b8"># v3: 현재 활성 키</tspan></text>
  <text x="76" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    ct = encrypt(current_key.material, plaintext)</text>
  <text x="76" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    <tspan fill="#7ec8e3" font-weight="600">return</tspan> <tspan fill="#ce9178">f"v{current_key.version}:{ct}"</tspan>  <tspan fill="#9aa4b8"># 버전 접두사</tspan></text>
  <text x="76" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 복호화: 접두사로 버전 식별 → 해당 버전 키로 복호화</text>
</svg>
