<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Soft Delete vs Hard Delete</text>

  <!-- Soft Delete -->
  <rect x="60" y="66" width="360" height="36" rx="6" fill="#1e2d10" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="89" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">Soft Delete (논리 삭제)</text>

  <!-- Soft Delete table -->
  <rect x="60" y="114" width="360" height="200" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <!-- Header -->
  <rect x="60" y="114" width="360" height="30" rx="6" fill="#0f1f35"/>
  <text x="120" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#888">id</text>
  <text x="200" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#888">name</text>
  <text x="310" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#888">deleted_at</text>
  <!-- Active rows -->
  <text x="120" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">1</text>
  <text x="200" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">김철수</text>
  <text x="310" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">NULL</text>
  <text x="120" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">2</text>
  <text x="200" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">이영희</text>
  <text x="310" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">NULL</text>
  <!-- Soft-deleted row (grayed) -->
  <rect x="61" y="194" width="358" height="24" rx="0" fill="#1a0a0a"/>
  <text x="120" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">3</text>
  <text x="200" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">박민준</text>
  <text x="310" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">2024-03-10</text>
  <text x="120" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">4</text>
  <text x="200" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">최지원</text>
  <text x="310" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">NULL</text>

  <text x="240" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">행 3은 DB에 남아있음 (숨겨짐)</text>

  <!-- Soft Delete pros/cons -->
  <rect x="60" y="278" width="360" height="180" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">장점</text>
  <text x="80" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 데이터 복구 가능</text>
  <text x="80" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 삭제 이력 추적</text>
  <text x="80" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 외래 키 참조 유지</text>
  <text x="80" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">단점</text>
  <text x="80" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 모든 쿼리에 WHERE deleted_at IS NULL</text>
  <text x="80" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 테이블 비대화 (삭제 행 누적)</text>
  <text x="80" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• UNIQUE 제약 관리 복잡</text>

  <!-- Hard Delete -->
  <rect x="460" y="66" width="360" height="36" rx="6" fill="#2a1e10" stroke="#ce9178" stroke-width="1.5"/>
  <text x="640" y="89" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#ce9178" text-anchor="middle">Hard Delete (물리 삭제)</text>

  <!-- Hard Delete table -->
  <rect x="460" y="114" width="360" height="200" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="460" y="114" width="360" height="30" rx="6" fill="#0f1f35"/>
  <text x="520" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#888">id</text>
  <text x="600" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#888">name</text>
  <text x="520" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">1</text>
  <text x="600" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">김철수</text>
  <text x="520" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">2</text>
  <text x="600" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">이영희</text>
  <!-- Row 3 deleted, shown with strikethrough effect -->
  <text x="520" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">(삭제됨)</text>
  <text x="520" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">4</text>
  <text x="600" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ffffff">최지원</text>

  <text x="640" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">행 3은 완전히 제거됨</text>

  <!-- Hard Delete pros/cons -->
  <rect x="460" y="278" width="360" height="180" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">장점</text>
  <text x="480" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 테이블 크기 유지</text>
  <text x="480" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 단순한 쿼리 (필터 불필요)</text>
  <text x="480" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• GDPR 규정 준수 용이</text>
  <text x="480" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">단점</text>
  <text x="480" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 복구 불가 (백업 필요)</text>
  <text x="480" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• FK 참조 시 CASCADE 주의</text>
  <text x="480" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 감사 로그 별도 관리</text>
</svg>
