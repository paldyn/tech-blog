<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Python 매직 메서드 카테고리</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">__dunder__ 형태로 Python이 자동 호출하는 특수 메서드</text>

  <!-- Category 1: Lifecycle -->
  <rect x="60" y="90" width="370" height="120" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">생명주기</text>
  <text x="80" y="133" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">__new__    </text>
  <text x="80" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">                인스턴스 생성</text>
  <text x="80" y="151" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">__init__   </text>
  <text x="80" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">                초기화</text>
  <text x="80" y="169" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">__del__    </text>
  <text x="80" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">                소멸자 (GC 시 호출)</text>
  <text x="80" y="187" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">__init_subclass__</text>
  <text x="80" y="187" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">   서브클래스 훅</text>

  <!-- Category 2: Representation -->
  <rect x="450" y="90" width="370" height="120" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="470" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">표현</text>
  <text x="470" y="133" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">__repr__   </text>
  <text x="470" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">               디버그 문자열 (repr())</text>
  <text x="470" y="151" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">__str__    </text>
  <text x="470" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">               사용자 문자열 (str())</text>
  <text x="470" y="169" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">__format__ </text>
  <text x="470" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">               f-string, format()</text>
  <text x="470" y="187" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">__bytes__  </text>
  <text x="470" y="187" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">               bytes() 변환</text>

  <!-- Category 3: Comparison -->
  <rect x="60" y="228" width="370" height="120" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">비교</text>
  <text x="80" y="271" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">__eq__  __ne__     </text>
  <text x="80" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">        ==, !=</text>
  <text x="80" y="289" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">__lt__  __le__     </text>
  <text x="80" y="289" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">        &lt;, &lt;=</text>
  <text x="80" y="307" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">__gt__  __ge__     </text>
  <text x="80" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">        &gt;, &gt;=</text>
  <text x="80" y="325" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">__hash__           </text>
  <text x="80" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">        hash(), dict 키 사용</text>

  <!-- Category 4: Arithmetic -->
  <rect x="450" y="228" width="370" height="120" rx="8" fill="#0d1117" stroke="#e05555" stroke-width="1.5"/>
  <text x="470" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">산술 연산</text>
  <text x="470" y="271" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">__add__  __radd__  </text>
  <text x="470" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">      +, 우항</text>
  <text x="470" y="289" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">__mul__  __rmul__  </text>
  <text x="470" y="289" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">      *, 우항</text>
  <text x="470" y="307" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">__iadd__           </text>
  <text x="470" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">      += 복합 대입</text>
  <text x="470" y="325" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">__neg__  __abs__   </text>
  <text x="470" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">      단항, abs()</text>

  <!-- Category 5: Container -->
  <rect x="60" y="366" width="370" height="110" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="389" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">컨테이너</text>
  <text x="80" y="409" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">__len__   __getitem__  </text>
  <text x="80" y="409" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  len(), []</text>
  <text x="80" y="427" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">__setitem__ __delitem__</text>
  <text x="80" y="427" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888"> []=, del[]</text>
  <text x="80" y="445" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">__contains__  __iter__</text>
  <text x="80" y="445" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">   in, for</text>
  <text x="80" y="463" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">__reversed__          </text>
  <text x="80" y="463" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">          reversed()</text>

  <!-- Category 6: Context/Call -->
  <rect x="450" y="366" width="370" height="110" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1.5"/>
  <text x="470" y="389" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">컨텍스트 / 호출</text>
  <text x="470" y="409" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">__enter__ __exit__   </text>
  <text x="470" y="409" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  with 문</text>
  <text x="470" y="427" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">__call__             </text>
  <text x="470" y="427" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  obj() 호출 가능 객체</text>
  <text x="470" y="445" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">__getattr__  __setattr__</text>
  <text x="470" y="463" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" fill="#ffffff" xml:space="preserve">__bool__  __int__  __float__</text>
</svg>
