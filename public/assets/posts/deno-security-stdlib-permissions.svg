<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 470" width="880" height="470">
  <rect width="880" height="470" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Deno 권한 모델 — 기본 차단 원칙</text>
  <text x="440" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">모든 시스템 리소스 접근은 명시적 플래그로만 허용된다</text>

  <!-- Permission boxes: 3 cols × 2 rows -->
  <!-- Col1: x=60 w=235, Col2: x=323 w=235, Col3: x=586 w=235 -->

  <!-- Row 1 -->
  <rect x="60" y="102" width="235" height="72" rx="8" fill="#111520" stroke="#1e2433"/>
  <text x="76" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">--allow-read</text>
  <text x="76" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">파일 시스템 읽기 접근</text>

  <rect x="323" y="102" width="235" height="72" rx="8" fill="#111520" stroke="#1e2433"/>
  <text x="339" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">--allow-write</text>
  <text x="339" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">파일 시스템 쓰기 접근</text>

  <rect x="586" y="102" width="235" height="72" rx="8" fill="#111520" stroke="#1e2433"/>
  <text x="602" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">--allow-net</text>
  <text x="602" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">네트워크 요청 허용</text>

  <!-- Row 2 -->
  <rect x="60" y="196" width="235" height="72" rx="8" fill="#111520" stroke="#1e2433"/>
  <text x="76" y="219" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">--allow-env</text>
  <text x="76" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">환경 변수 읽기·쓰기</text>

  <rect x="323" y="196" width="235" height="72" rx="8" fill="#111520" stroke="#1e2433"/>
  <text x="339" y="219" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">--allow-run</text>
  <text x="339" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">서브프로세스 실행</text>

  <rect x="586" y="196" width="235" height="72" rx="8" fill="#111520" stroke="#1e2433"/>
  <text x="602" y="219" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">--allow-sys</text>
  <text x="602" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">시스템 정보 조회</text>

  <!-- Divider -->
  <line x1="60" y1="288" x2="820" y2="288" stroke="#1e2433" stroke-width="1"/>

  <!-- Bottom: left error box, arrow, right success box -->
  <!-- Left error box -->
  <rect x="60" y="304" width="340" height="136" rx="8" fill="#070b14" stroke="#e05555"/>
  <text x="76" y="327" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">권한 없이 실행</text>
  <text x="76" y="351" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">$ deno run script.ts</text>
  <text x="76" y="369" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">PermissionDenied: Requires</text>
  <text x="76" y="387" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">  net access to "api.example.com"</text>
  <text x="76" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">네트워크 접근 시 즉시 예외 발생</text>

  <!-- Arrow -->
  <line x1="413" y1="372" x2="453" y2="372" stroke="#888" stroke-width="2"/>
  <polygon points="453,366 466,372 453,378" fill="#888"/>

  <!-- Right success box -->
  <rect x="480" y="304" width="340" height="136" rx="8" fill="#070b14" stroke="#55c555"/>
  <text x="496" y="327" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">플래그 추가 후 실행</text>
  <text x="496" y="351" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">$ deno run --allow-net script.ts</text>
  <text x="496" y="369" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">{ userId: 1, name: "Deno" }</text>
  <text x="496" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">명시된 권한만 허용 · 최소 권한 원칙</text>
</svg>
