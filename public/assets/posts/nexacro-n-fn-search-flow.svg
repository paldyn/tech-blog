<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">fn_search() 조회 함수 흐름</text>

  <!-- Step 1: Input components -->
  <rect x="60" y="80" width="760" height="54" fill="#12213a" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="100" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">① 조건 입력 컴포넌트</text>
  <text x="440" y="122" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Edit · Calendar · Combo · MultiCombo — 사용자 입력값 보유</text>

  <!-- Arrow 1 -->
  <polygon points="437,134 443,134 443,162 449,162 440,174 431,162 437,162"
           fill="#7ec8e3" stroke="#0a0a0a" stroke-width="1"/>
  <text x="460" y="158"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">fn_search() 버튼 클릭</text>

  <!-- Step 2: Condition collection -->
  <rect x="60" y="174" width="760" height="54" fill="#12213a" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="194" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">② ds_cond Dataset 조건 수집</text>
  <text x="440" y="216" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">clearData() → addRow() → setColumn() 으로 조건값 담기</text>

  <!-- Arrow 2 -->
  <polygon points="437,228 443,228 443,256 449,256 440,268 431,256 437,256"
           fill="#7ec8e3" stroke="#0a0a0a" stroke-width="1"/>
  <text x="460" y="252"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">transaction() 호출</text>

  <!-- Step 3: Transaction -->
  <rect x="60" y="268" width="760" height="54" fill="#1a1a35" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="288" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">③ 서버 조회 (HTTP 요청)</text>
  <text x="440" y="310" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">ds_cond → 서버 SQL 실행 → 결과 반환</text>

  <!-- Arrow 3 -->
  <polygon points="437,322 443,322 443,350 449,350 440,362 431,350 437,350"
           fill="#7777cc" stroke="#0a0a0a" stroke-width="1"/>
  <text x="460" y="346"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">fn_searchCb() 호출</text>

  <!-- Step 4: Result binding -->
  <rect x="60" y="362" width="760" height="54" fill="#122a12" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="382" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">④ ds_list Dataset 갱신 → Grid 자동 반영</text>
  <text x="440" y="404" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">binddataset="ds_list" → Grid가 Dataset 변경을 즉시 감지</text>

  <!-- Bottom note -->
  <text x="440" y="452"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#666" text-anchor="middle">에러 시: fn_searchCb(svcID, errCode≠0, errMsg) → alert·로그 처리 후 return</text>
</svg>
