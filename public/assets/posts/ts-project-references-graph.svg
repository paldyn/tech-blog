<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arrR" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="340" rx="12" fill="#0a0a0a"/>
  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">프로젝트 참조: 의존 그래프대로 빌드</text>

  <rect x="350" y="84" width="180" height="64" rx="8" fill="#11151c" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="110" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">app</text>
  <text x="440" y="132" font-size="11" fill="#888" text-anchor="middle">최종 애플리케이션</text>

  <rect x="140" y="200" width="180" height="64" rx="8" fill="#11151c" stroke="#7777cc" stroke-width="1.5"/>
  <text x="230" y="226" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">ui</text>
  <text x="230" y="248" font-size="11" fill="#888" text-anchor="middle">컴포넌트 패키지</text>

  <rect x="560" y="200" width="180" height="64" rx="8" fill="#11151c" stroke="#7777cc" stroke-width="1.5"/>
  <text x="650" y="226" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">core</text>
  <text x="650" y="248" font-size="11" fill="#888" text-anchor="middle">공통 유틸·타입</text>

  <line x1="400" y1="148" x2="270" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrR)"/>
  <line x1="485" y1="148" x2="615" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrR)"/>
  <line x1="320" y1="244" x2="555" y2="240" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrR)"/>

  <text x="60" y="300" font-size="13" fill="#9aa4b8">화살표 = "references". tsc -b 는 core → ui → app 순으로, 바뀐 것만 빌드한다.</text>
</svg>
