<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">뷰 이름 접두사 패턴</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">redirect: · forward: · 일반 뷰 이름 처리 흐름</text>

  <!-- Normal view -->
  <rect x="60" y="104" width="760" height="64" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="80" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">일반 뷰 이름</text>
  <text x="80" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">return "home";</text>
  <text x="360" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→  ViewResolver가 templates/home.html로 해석 → 200 OK 렌더링</text>

  <!-- Redirect view -->
  <rect x="60" y="184" width="760" height="64" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="80" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">redirect: 접두사</text>
  <text x="80" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">return "redirect:/home";</text>
  <text x="400" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→  302 Found + Location: /home</text>
  <text x="400" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">클라이언트가 /home 으로 새 GET 요청</text>

  <!-- Forward view -->
  <rect x="60" y="264" width="760" height="64" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="80" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">forward: 접두사</text>
  <text x="80" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">return "forward:/api/data";</text>
  <text x="420" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→  서버 내부 포워드 (URL 유지)</text>
  <text x="420" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">클라이언트는 URL 변경 없음</text>

  <!-- PRG Pattern note -->
  <rect x="60" y="352" width="760" height="60" fill="#0d2a1a" rx="8" stroke="#1e5a3a" stroke-width="1"/>
  <text x="440" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">PRG 패턴 (Post-Redirect-Get)</text>
  <text x="440" y="394" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">POST 처리 후 redirect: 로 응답 → 새로고침 시 폼 중복 제출 방지</text>
</svg>
