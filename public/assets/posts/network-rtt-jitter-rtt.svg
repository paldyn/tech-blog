<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-l" viewBox="0 0 14 14" refX="2" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 14 0 L 1 7 L 14 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">RTT(왕복 시간) 측정 원리</text>

  <!-- Client -->
  <rect x="60" y="90" width="130" height="60" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="125" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">클라이언트</text>
  <text x="125" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">송신자</text>

  <!-- Router (middle) -->
  <rect x="375" y="90" width="130" height="60" rx="8" fill="#1a120a" stroke="#e8a55c" stroke-width="1.5"/>
  <text x="440" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">라우터</text>
  <text x="440" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">중간 노드</text>

  <!-- Server -->
  <rect x="690" y="90" width="130" height="60" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="755" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">서버</text>
  <text x="755" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">수신자</text>

  <!-- Request arrows (down line) -->
  <text x="440" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">요청 (Request) — t=0</text>
  <line x1="190" y1="190" x2="690" y2="190" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-r)"/>

  <!-- Segment labels -->
  <text x="313" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">지연1</text>
  <text x="567" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">지연2</text>

  <!-- Response arrows -->
  <text x="440" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">응답 (Response) — t=RTT</text>
  <line x1="690" y1="254" x2="190" y2="254" stroke="#55c555" stroke-width="2" marker-end="url(#arr-l)"/>

  <!-- RTT bracket -->
  <line x1="125" y1="270" x2="125" y2="300" stroke="#e8a55c" stroke-width="1.5"/>
  <line x1="125" y1="300" x2="755" y2="300" stroke="#e8a55c" stroke-width="1.5"/>
  <line x1="755" y1="270" x2="755" y2="300" stroke="#e8a55c" stroke-width="1.5"/>
  <text x="440" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8a55c" text-anchor="middle">RTT = 왕복 소요 시간 (ms)</text>

  <!-- Formula boxes -->
  <rect x="60" y="340" width="360" height="44" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="240" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" text-anchor="middle">RTT = t_response - t_request</text>
  <text x="240" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" text-anchor="middle"># ping으로 측정 가능</text>

  <rect x="460" y="340" width="360" height="44" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="640" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600" text-anchor="middle">단방향 지연 ≈ RTT / 2</text>
  <text x="640" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8" text-anchor="middle"># 대칭 경로 가정</text>
</svg>
