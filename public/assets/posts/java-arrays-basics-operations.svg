<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">배열 주요 연산 &amp; 주의사항</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">순회 · 복사 · 정렬 · 예외</text>

  <!-- Left column: code block -->
  <rect x="60" y="90" width="380" height="316" rx="8" fill="#111827" stroke="#1e2d40" stroke-width="1.5"/>
  <text x="250" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">배열 핵심 패턴</text>

  <rect x="76" y="122" width="348" height="268" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="92" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 1) for-each 순회</text>
  <text x="92" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">for </text>
  <text x="116" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">(</text>
  <text x="122" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">int </text>
  <text x="146" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">v : arr) sysout(v);</text>

  <text x="92" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 2) 배열 복사</text>
  <text x="92" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">int</text>
  <text x="116" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">[] copy =</text>
  <text x="92" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    Arrays.copyOf(arr, arr.length);</text>

  <text x="92" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 3) 정렬</text>
  <text x="92" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">Arrays.sort(arr);</text>
  <text x="92" y="280" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 역순: Integer[] 필요</text>

  <text x="92" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 4) 이진 탐색 (정렬 후)</text>
  <text x="92" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">int </text>
  <text x="116" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">idx = Arrays.binarySearch(arr,</text>
  <text x="92" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">    30</text>
  <text x="116" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">);</text>
  <text x="92" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// idx &lt; 0 → 없음</text>
  <text x="92" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">Arrays.fill(arr, </text>
  <text x="200" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">0</text>
  <text x="208" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">); </text>
  <text x="230" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 전체 초기화</text>

  <!-- Right column: pitfalls -->
  <rect x="460" y="90" width="360" height="316" rx="8" fill="#111827" stroke="#1e2d40" stroke-width="1.5"/>
  <text x="640" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">주의사항 &amp; 흔한 실수</text>

  <!-- Pitfall 1 -->
  <rect x="476" y="122" width="328" height="64" rx="6" fill="#1a0f0f" stroke="#3a1f1f"/>
  <text x="492" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">ArrayIndexOutOfBoundsException</text>
  <text x="492" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">arr[arr.length]  </text>
  <text x="620" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">← 범위 초과!</text>
  <text x="492" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 마지막: arr[arr.length-1]</text>

  <!-- Pitfall 2 -->
  <rect x="476" y="198" width="328" height="64" rx="6" fill="#1a0f0f" stroke="#3a1f1f"/>
  <text x="492" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">얕은 복사 (참조 공유)</text>
  <text x="492" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">int[] b = a; </text>
  <text x="590" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">← 같은 객체!</text>
  <text x="492" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">// Arrays.copyOf(a, a.length) 사용</text>

  <!-- Pitfall 3 -->
  <rect x="476" y="274" width="328" height="64" rx="6" fill="#1a0f0f" stroke="#3a1f1f"/>
  <text x="492" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">== 비교 금지 (주소 비교)</text>
  <text x="492" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">a == b  </text>
  <text x="548" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">← 내용 아닌 참조 비교</text>
  <text x="492" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">// Arrays.equals(a, b) 사용</text>

  <!-- Pitfall 4 -->
  <rect x="476" y="350" width="328" height="40" rx="6" fill="#1a0f0f" stroke="#3a1f1f"/>
  <text x="492" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">null 배열 접근 → NullPointerException</text>
  <text x="492" y="386" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 반드시 초기화 후 사용</text>

  <!-- Bottom bar -->
  <rect x="60" y="424" width="760" height="52" rx="8" fill="#0d1a2a" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="440" y="444" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Arrays 유틸리티 클래스 (java.util.Arrays)</text>
  <text x="140" y="464" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">sort()</text>
  <text x="270" y="464" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">binarySearch()</text>
  <text x="420" y="464" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">copyOf() / copyOfRange()</text>
  <text x="580" y="464" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">equals()</text>
  <text x="710" y="464" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">fill() / toString()</text>
</svg>
