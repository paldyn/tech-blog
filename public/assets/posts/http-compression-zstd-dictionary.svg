<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arrB" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">사전(Dictionary) 압축 — 작은 응답의 구원자</text>
    <!-- Flow boxes -->
    <rect x="60" y="80" width="220" height="70" rx="8" fill="#0f1f3a" stroke="#4a7aaa" stroke-width="1.5"/>
    <text x="170" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">유사한 샘플 수천 개</text>
    <text x="170" y="128" text-anchor="middle" font-size="11" fill="#888">같은 API의 JSON 응답들</text>
    <line x1="280" y1="115" x2="328" y2="115" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrB)"/>
    <rect x="330" y="80" width="220" height="70" rx="8" fill="#1f173a" stroke="#7777cc" stroke-width="1.5"/>
    <text x="440" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#9b8fe8">zstd --train</text>
    <text x="440" y="128" text-anchor="middle" font-size="11" fill="#888">공통 패턴을 사전으로 추출</text>
    <line x1="550" y1="115" x2="598" y2="115" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrB)"/>
    <rect x="600" y="80" width="220" height="70" rx="8" fill="#0f2a1a" stroke="#3aaa5a" stroke-width="1.5"/>
    <text x="710" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">공유 사전 (~110KB)</text>
    <text x="710" y="128" text-anchor="middle" font-size="11" fill="#888">압축·해제 양쪽에 미리 배포</text>
    <!-- Code box -->
    <rect x="60" y="186" width="760" height="140" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="76" y="213" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 1) 실제 응답 샘플로 사전 학습</text>
    <text x="76" y="233" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">zstd</tspan><tspan fill="#ffffff"> --train samples/*.json -o api.dict</tspan></text>
    <text x="76" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 2) 사전을 참조해 압축 — 작은 파일일수록 효과 극적</text>
    <text x="76" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">zstd</tspan><tspan fill="#ffffff"> -D api.dict resp.json</tspan><tspan fill="#9aa4b8">      # 2.1KB → 0.3KB</tspan></text>
    <text x="76" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">zstd</tspan><tspan fill="#ffffff"> -D api.dict -d resp.json.zst</tspan><tspan fill="#9aa4b8">  # 같은 사전으로 해제</tspan></text>
    <!-- Summary -->
    <text x="440" y="368" text-anchor="middle" font-size="12" fill="#888">일반 압축은 파일 안의 반복만 본다 — 사전 압축은 "이 부류의 파일들"이 공유하는 반복까지 활용한다</text>
    <text x="440" y="386" text-anchor="middle" font-size="11" fill="#555">웹 표준화 진행 중: Compression Dictionary Transport (이전 응답·별도 파일을 사전으로 쓰는 dcz/dcb)</text>
  </g>
</svg>
