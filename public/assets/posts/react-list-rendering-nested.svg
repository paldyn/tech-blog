<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">중첩 목록과 컴포넌트 분리</text>

  <rect x="60" y="76" width="760" height="268" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="100" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">
    {/* map 안에 컴포넌트로 분리 → 중첩 map을 줄임 */}
  </text>
  <text x="80" y="122" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan> CategoryList({ categories }) {</tspan>
  </text>
  <text x="80" y="142" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>  </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan> (</tspan>
  </text>
  <text x="80" y="162" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>    &lt;ul&gt;</tspan>
  </text>
  <text x="80" y="182" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>      {categories.map(cat </tspan><tspan fill="#7ec8e3" font-weight="600">=&gt;</tspan><tspan> (</tspan>
  </text>
  <text x="80" y="202" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">
    <tspan>        &lt;CategoryItem key={cat.id} category={cat} /&gt;</tspan>
  </text>
  <text x="80" y="222" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>      ))}</tspan>
  </text>
  <text x="80" y="242" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>    &lt;/ul&gt;</tspan>
  </text>
  <text x="80" y="262" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>  );</tspan>
  </text>
  <text x="80" y="282" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>}</tspan>
  </text>
  <text x="80" y="310" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">
    {/* CategoryItem이 내부 items를 다시 map — 각자 책임 분리 */}
  </text>
  <text x="80" y="330" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">
    {/* key는 반드시 해당 map()의 최상위 요소에만 — 자식 컴포넌트에 전달 X */}
  </text>
</svg>
