<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-ok" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-no" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">private 메서드 4가지 규칙 &amp; 접근 제어</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Java 9 — 인터페이스 내부 공통 코드 캡슐화</text>

  <!-- 4가지 규칙 박스들 -->
  <!-- 규칙 1 -->
  <rect x="60" y="96" width="360" height="70" rx="8" fill="#0d0d1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="80" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">① 구현 필수 (본문 없으면 컴파일 오류)</text>
  <text x="80" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">abstract 불가 — 반드시 메서드 body { } 제공</text>

  <!-- 규칙 2 -->
  <rect x="460" y="96" width="360" height="70" rx="8" fill="#0d0d1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="480" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">② 구현 클래스에서 접근 불가</text>
  <text x="480" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">상속·오버라이드 불가 — 인터페이스 내부 전용</text>

  <!-- 규칙 3 -->
  <rect x="60" y="186" width="360" height="70" rx="8" fill="#0d0d1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="80" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">③ private vs private static</text>
  <text x="80" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">인스턴스용 private / 공유 로직용 private static</text>
  <text x="80" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">static 메서드는 private static만 호출 가능</text>

  <!-- 규칙 4 -->
  <rect x="460" y="186" width="360" height="70" rx="8" fill="#0d0d1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="480" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">④ 중복 제거 목적</text>
  <text x="480" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">여러 default/static이 공유하는 로직을</text>
  <text x="480" y="249" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">단일 private 메서드로 분리</text>

  <!-- 호출 가능 여부 표 -->
  <text x="440" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e8e8e8">호출 가능 여부 매트릭스</text>

  <!-- 표 헤더 -->
  <rect x="60" y="308" width="760" height="36" rx="4" fill="#111120"/>
  <text x="200" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#888">호출자 \ 대상</text>
  <text x="390" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#55c555">private</text>
  <text x="560" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#7ec8e3">private static</text>
  <text x="730" y="330" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e8e8e8">구현 클래스</text>

  <!-- 행 1: default 메서드 -->
  <rect x="60" y="344" width="760" height="36" rx="0" fill="#0d0d14"/>
  <text x="200" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">default 메서드</text>
  <text x="390" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓</text>
  <text x="560" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓</text>
  <text x="730" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">✗</text>

  <!-- 행 2: static 메서드 -->
  <rect x="60" y="380" width="760" height="36" rx="0" fill="#0a0a10"/>
  <text x="200" y="402" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">static 메서드</text>
  <text x="390" y="402" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">✗</text>
  <text x="560" y="402" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓</text>
  <text x="730" y="402" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">✗</text>

  <!-- 행 3: 구현 클래스 -->
  <rect x="60" y="416" width="760" height="36" rx="0" fill="#0d0d14"/>
  <text x="200" y="438" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">구현 클래스</text>
  <text x="390" y="438" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">✗</text>
  <text x="560" y="438" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">✗</text>
  <text x="730" y="438" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">상속만 가능</text>

  <!-- 표 테두리 -->
  <rect x="60" y="308" width="760" height="144" rx="4" fill="none" stroke="#333" stroke-width="1"/>
  <!-- 세로 구분선 -->
  <line x1="290" y1="308" x2="290" y2="452" stroke="#333" stroke-width="1"/>
  <line x1="470" y1="308" x2="470" y2="452" stroke="#333" stroke-width="1"/>
  <line x1="640" y1="308" x2="640" y2="452" stroke="#333" stroke-width="1"/>
  <!-- 가로 구분선 -->
  <line x1="60" y1="344" x2="820" y2="344" stroke="#333" stroke-width="1"/>
  <line x1="60" y1="380" x2="820" y2="380" stroke="#333" stroke-width="1"/>
  <line x1="60" y1="416" x2="820" y2="416" stroke="#333" stroke-width="1"/>

  <!-- 하단 요약 -->
  <text x="440" y="480" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">private 메서드 = 인터페이스 내부 구현 세부 사항 은닉 — 공개 API를 오염시키지 않음</text>
</svg>
