  <rect x="60" y="114" width="760" height="38" rx="4" fill="#111"/>
  <text x="130" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">bge-reranker-v2-m3</text>
