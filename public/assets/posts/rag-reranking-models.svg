  <text x="640" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">경량, 빠른 속도, 영어 특화</text>

  <!-- Tip -->
  <rect x="60" y="336" width="760" height="44" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">실전 권고</text>
  <text x="440" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">한국어 RAG: bge-reranker-v2-m3(무료) 또는 jina-reranker-v2 · 영어 고성능: Cohere Rerank API</text>
