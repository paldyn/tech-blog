  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888">오픈소스 vs 상용 리랭킹 API</text>

  <!-- Column headers -->
