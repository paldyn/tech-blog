  <rect x="60" y="282" width="760" height="38" rx="4" fill="#111"/>
  <text x="130" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">ms-marco-MiniLM</text>
