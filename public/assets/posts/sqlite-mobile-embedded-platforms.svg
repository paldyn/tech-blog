  <text x="96" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">Linux 엣지 디바이스: 오프라인 큐잉</text>

  <text x="80" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">•</text>
  <text x="96" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
