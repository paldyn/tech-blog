  <!-- Android -->
  <rect x="60" y="70" width="360" height="180" fill="#0a1a0a" rx="10" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
