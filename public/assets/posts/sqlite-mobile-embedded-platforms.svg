  <rect x="648" y="108" width="156" height="54" fill="#1a1a2e" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="726" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
