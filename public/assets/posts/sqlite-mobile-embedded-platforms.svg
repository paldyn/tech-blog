  <text x="96" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">주기적 서버 동기화 후 로컬 삭제 패턴</text>

  <text x="80" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">•</text>
  <text x="96" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">SQLite amalgamation 빌드 크기 ~1MB</text>

  <!-- Browser / WASM -->
  <rect x="460" y="272" width="360" height="180" fill="#1a1a0a" rx="10" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="640" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">브라우저 (WebAssembly)</text>

  <text x="480" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">•</text>
  <text x="496" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">sql.js: WASM 컴파일된 SQLite</text>

  <text x="480" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">•</text>
  <text x="496" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">wa-sqlite: OPFS 영구 저장 지원</text>

  <text x="480" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">•</text>
  <text x="496" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">Cloudflare D1: SQLite 서버리스</text>

  <text x="480" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">•</text>
  <text x="496" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">libSQL: Turso 분산 SQLite fork</text>

  <text x="480" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
