  <rect x="76" y="108" width="156" height="54" fill="#1a1a2e" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="154" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
