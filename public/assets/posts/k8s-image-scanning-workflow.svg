<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">컨테이너 이미지 스캔 파이프라인</text>

  <!-- Stage 1: Code Commit -->
  <rect x="60" y="80" width="140" height="70" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">코드 커밋</text>
  <text x="130" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">git push</text>
  <text x="130" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">PR 생성</text>

  <line x1="200" y1="115" x2="228" y2="115" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Stage 2: Build Image -->
  <rect x="228" y="80" width="140" height="70" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="298" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">이미지 빌드</text>
  <text x="298" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">docker build</text>
  <text x="298" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">CI 단계</text>

  <line x1="368" y1="115" x2="396" y2="115" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Stage 3: Scan -->
  <rect x="396" y="70" width="160" height="90" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="2"/>
  <text x="476" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">Trivy 스캔</text>
  <text x="476" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" text-anchor="middle">OS 패키지</text>
  <text x="476" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" text-anchor="middle">언어 라이브러리</text>
  <text x="476" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" text-anchor="middle">설정 오류</text>

  <!-- PASS/FAIL branches -->
  <line x1="556" y1="115" x2="584" y2="90" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>
  <line x1="556" y1="115" x2="584" y2="160" stroke="#e05555" stroke-width="2" marker-end="url(#arrr)"/>

  <!-- PASS -->
  <rect x="584" y="70" width="140" height="60" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="654" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">PASS</text>
  <text x="654" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">레지스트리 푸시</text>

  <!-- FAIL -->
  <rect x="584" y="140" width="140" height="60" rx="8" fill="#200f10" stroke="#e05555" stroke-width="1.5"/>
  <text x="654" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">FAIL</text>
  <text x="654" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">CI 빌드 실패</text>

  <!-- Pass continues -->
  <line x1="724" y1="100" x2="752" y2="100" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>
  <rect x="752" y="80" width="100" height="60" rx="8" fill="#101820" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="802" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">배포</text>
  <text x="802" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Kubernetes</text>

  <!-- Trivy command box -->
  <rect x="60" y="210" width="760" height="120" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="233" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve"># 이미지 취약점 스캔 (CRITICAL, HIGH만 실패 처리)</text>
  <text x="76" y="251" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">trivy image \</text>
  <text x="76" y="269" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  --exit-code 1 \</text>
  <text x="76" y="287" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  --severity CRITICAL,HIGH \</text>
  <text x="76" y="305" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  --ignore-unfixed \</text>
  <text x="76" y="323" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" font-weight="600" xml:space="preserve">  my-registry/myapp:v2.0.0</text>

  <!-- severity levels -->
  <rect x="60" y="354" width="760" height="120" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">CVE 심각도 수준</text>

  <rect x="76" y="390" width="120" height="70" rx="6" fill="#200f10" stroke="#e05555" stroke-width="1"/>
  <text x="136" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">CRITICAL</text>
  <text x="136" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">CVSS ≥ 9.0</text>
  <text x="136" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555" text-anchor="middle">즉시 차단</text>

  <rect x="216" y="390" width="120" height="70" rx="6" fill="#2a1500" stroke="#e05555" stroke-width="1"/>
  <text x="276" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">HIGH</text>
  <text x="276" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">CVSS 7-9</text>
  <text x="276" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555" text-anchor="middle">차단 또는 경고</text>

  <rect x="356" y="390" width="120" height="70" rx="6" fill="#1a1500" stroke="#7ec8e3" stroke-width="1"/>
  <text x="416" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">MEDIUM</text>
  <text x="416" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">CVSS 4-7</text>
  <text x="416" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3" text-anchor="middle">경고, 수동 검토</text>

  <rect x="496" y="390" width="120" height="70" rx="6" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="556" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">LOW</text>
  <text x="556" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">CVSS &lt; 4</text>
  <text x="556" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">정보 수집용</text>

  <rect x="636" y="390" width="164" height="70" rx="6" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="718" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">UNKNOWN</text>
  <text x="718" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">CVE 정보 부족</text>
  <text x="718" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7777cc" text-anchor="middle">별도 검토</text>
</svg>
