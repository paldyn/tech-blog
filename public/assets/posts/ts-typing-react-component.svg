<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">함수 컴포넌트 타이핑 (권장 형태)</text>

  <rect x="60" y="78" width="760" height="210" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve">
    <tspan x="80" y="104" fill="#7ec8e3" font-weight="600">interface</tspan><tspan fill="#ffffff"> ButtonProps {</tspan>
    <tspan x="80" y="124" fill="#ffffff">  label: string;</tspan>
    <tspan x="80" y="144" fill="#ffffff">  onClick?: () =&gt; void;   </tspan><tspan fill="#9aa4b8">// 옵셔널</tspan>
    <tspan x="80" y="164" fill="#ffffff">  children?: React.ReactNode;</tspan>
    <tspan x="80" y="184" fill="#ffffff">}</tspan>
    <tspan x="80" y="212" fill="#9aa4b8">// props에 직접 타입 — React.FC 없이</tspan>
    <tspan x="80" y="232" fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> Button({ label, onClick }: ButtonProps) {</tspan>
    <tspan x="80" y="252" fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> &lt;button onClick={onClick}&gt;{label}&lt;/button&gt;;</tspan>
    <tspan x="80" y="272" fill="#ffffff">}</tspan>
  </text>
</svg>
