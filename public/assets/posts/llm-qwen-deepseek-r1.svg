<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">DeepSeek-R1: 강화학습으로 추론을 학습하다</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">Chain-of-Thought 없이 RL만으로 달성한 GPT-o1급 추론</text>

  <!-- Training pipeline -->
  <!-- Step 1 -->
  <rect x="60" y="96" width="160" height="70" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">1단계</text>
  <text x="140" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">기본 사전학습</text>
  <text x="140" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">(DeepSeek-V3)</text>

  <!-- Arrow -->
  <line x1="220" y1="131" x2="250" y2="131" stroke="#555" stroke-width="2" marker-end="url(#c)"/>

  <!-- Step 2 -->
  <rect x="252" y="96" width="160" height="70" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="332" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">2단계</text>
  <text x="332" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">RL (GRPO)</text>
  <text x="332" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">추론 창발</text>

  <!-- Arrow -->
  <line x1="412" y1="131" x2="442" y2="131" stroke="#555" stroke-width="2" marker-end="url(#c)"/>

  <!-- Step 3 -->
  <rect x="444" y="96" width="160" height="70" rx="8" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="524" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555">3단계</text>
  <text x="524" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">거부 샘플링</text>
  <text x="524" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">+ SFT</text>

  <!-- Arrow -->
  <line x1="604" y1="131" x2="634" y2="131" stroke="#555" stroke-width="2" marker-end="url(#c)"/>

  <!-- Step 4 -->
  <rect x="636" y="96" width="184" height="70" rx="8" fill="#111827" stroke="#7777cc" stroke-width="2"/>
  <text x="728" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">DeepSeek-R1</text>
  <text x="728" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">최종 추론 모델</text>
  <text x="728" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">MIT 라이선스</text>

  <defs>
    <marker id="c" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
  </defs>

  <!-- Code example of R1 style reasoning -->
  <rect x="60" y="190" width="760" height="180" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># DeepSeek-R1이 수학 문제를 푸는 방식 (추론 체인 예시)</text>
  <text x="76" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># 문제: "1부터 100까지 홀수의 합은?"</text>
  <text x="76" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> </text>
  <text x="76" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># R1 내부 추론 (thinking):</text>
  <text x="76" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">&lt;think&gt;</text>
  <text x="76" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  홀수: 1,3,...,99 → 50개</text>
  <text x="76" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  등차수열 합: n/2*(첫항+끝항)</text>
  <text x="76" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  = 50/2*(1+99) = 25*100 = 2500</text>
  <text x="76" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">&lt;/think&gt;</text>
  <text x="76" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">                             # 최종 답변: 2500</text>
</svg>
