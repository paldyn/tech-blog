<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SPA 라우터 핵심 구현</text>

  <!-- Left: pushState navigation -->
  <text x="60" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">pushState 네비게이션</text>

  <rect x="60" y="94" width="370" height="162" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">function <tspan fill="#ffffff">navigate(url, state = {}) {</tspan></text>
  <text x="76" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  history.<tspan fill="#7ec8e3">pushState</tspan><tspan fill="#e8e8e8">(state, </tspan><tspan fill="#ce9178">''</tspan><tspan fill="#e8e8e8">, url);</tspan></text>
  <text x="76" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3">renderPage</tspan><tspan fill="#e8e8e8">(url);</tspan></text>
  <text x="76" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>
  <text x="76" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 뒤로/앞으로 버튼 처리</text>
  <text x="76" y="208" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">window.<tspan fill="#7ec8e3">addEventListener</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'popstate'</tspan><tspan fill="#e8e8e8">, e =&gt; {</tspan></text>
  <text x="76" y="226" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3">renderPage</tspan><tspan fill="#e8e8e8">(location.pathname);</tspan></text>
  <text x="76" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">});</text>

  <!-- Right: URLSearchParams -->
  <text x="450" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">URLSearchParams 활용</text>

  <rect x="450" y="94" width="370" height="184" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="466" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// URL 쿼리 파라미터 다루기</text>
  <text x="466" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">const <tspan fill="#ffffff">params = </tspan><tspan fill="#7ec8e3">new </tspan><tspan fill="#e8e8e8">URLSearchParams(</tspan></text>
  <text x="466" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  location.search);</text>
  <text x="466" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">params.<tspan fill="#7ec8e3">get</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'q'</tspan><tspan fill="#e8e8e8">);         </tspan><tspan fill="#9aa4b8">// 'hello'</tspan></text>
  <text x="466" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">params.<tspan fill="#7ec8e3">set</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'q'</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#ce9178">'world'</tspan><tspan fill="#e8e8e8">);</tspan></text>
  <text x="466" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// URL 갱신 (뒤로가기 스택 유지)</text>
  <text x="466" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">history.<tspan fill="#7ec8e3">replaceState</tspan><tspan fill="#e8e8e8">({}, </tspan><tspan fill="#ce9178">''</tspan><tspan fill="#e8e8e8">,</tspan></text>
  <text x="466" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#ce9178">`?${params}`</tspan><tspan fill="#e8e8e8">);</tspan></text>
  <text x="466" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// URL: ?q=world&amp;lang=ko</text>

  <!-- Bottom: link intercept -->
  <text x="60" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8a84c">링크 클릭 가로채기 (SPA 패턴)</text>

  <rect x="60" y="296" width="760" height="124" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">document.<tspan fill="#7ec8e3">addEventListener</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'click'</tspan><tspan fill="#e8e8e8">, e =&gt; {</tspan></text>
  <text x="76" y="334" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  const <tspan fill="#ffffff">a = e.target.<tspan fill="#7ec8e3">closest</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'a[href]'</tspan><tspan fill="#e8e8e8">);</tspan></tspan></text>
  <text x="76" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  if <tspan fill="#ffffff">(!a || a.origin !== location.origin) </tspan><tspan fill="#7ec8e3">return</tspan><tspan fill="#e8e8e8">;</tspan></text>
  <text x="76" y="370" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  e.<tspan fill="#7ec8e3">preventDefault</tspan><tspan fill="#e8e8e8">();</tspan></text>
  <text x="76" y="388" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3">navigate</tspan><tspan fill="#e8e8e8">(a.pathname + a.search + a.hash);</tspan></text>
  <text x="76" y="406" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">});</text>
</svg>
