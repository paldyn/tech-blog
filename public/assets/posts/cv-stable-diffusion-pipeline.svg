<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrG" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Stable Diffusion 파이프라인 (LDM)</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">픽셀 공간이 아닌 잠재 공간(Latent Space)에서 확산 수행</text>

  <!-- Text Prompt -->
  <rect x="40" y="100" width="160" height="60" rx="8" fill="#2a1a0a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="120" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">텍스트 프롬프트</text>
  <text x="120" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">"a cat on the moon"</text>

  <line x1="200" y1="130" x2="228" y2="130" stroke="#ce9178" stroke-width="2" marker-end="url(#arr)"/>

  <!-- CLIP Text Encoder -->
  <rect x="230" y="100" width="160" height="60" rx="8" fill="#1a0a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="310" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">CLIP 텍스트 인코더</text>
  <text x="310" y="141" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">77 토큰 × 768d</text>
  <text x="310" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">텍스트 임베딩 c</text>

  <!-- Arrow to UNet -->
  <line x1="310" y1="160" x2="310" y2="208" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <text x="326" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">크로스 어텐션</text>

  <!-- Gaussian Noise -->
  <rect x="40" y="220" width="160" height="60" rx="8" fill="#1a1414" stroke="#e05555" stroke-width="1.5"/>
  <text x="120" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">가우시안 노이즈</text>
  <text x="120" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">z_T ~ N(0, I)</text>
  <text x="120" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">64×64×4 잠재</text>

  <line x1="200" y1="250" x2="228" y2="250" stroke="#e05555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- UNet Denoiser -->
  <rect x="230" y="190" width="400" height="120" rx="10" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <text x="430" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">U-Net 노이즈 예측기 ε_θ</text>
  <text x="430" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">입력: z_t (노이즈 잠재) + t (타임스텝) + c (텍스트 임베딩)</text>
  <text x="430" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">ResNet 블록 + 크로스 어텐션 블록 교차 배치</text>
  <text x="430" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">T~20 스텝 반복 (DDIM 기준)</text>
  <text x="430" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">CFG: ε̃ = ε(z_t, ∅) + w·(ε(z_t, c) - ε(z_t, ∅))</text>

  <line x1="630" y1="250" x2="658" y2="250" stroke="#55c555" stroke-width="2" marker-end="url(#arrG)"/>

  <!-- Decoded Latent -->
  <rect x="660" y="220" width="140" height="60" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="730" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">잠재 z₀</text>
  <text x="730" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">64×64×4</text>
  <text x="730" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">정제된 잠재</text>

  <!-- VAE Decoder -->
  <line x1="730" y1="280" x2="730" y2="308" stroke="#55c555" stroke-width="2" marker-end="url(#arrG)"/>

  <rect x="640" y="310" width="220" height="60" rx="8" fill="#1a2a1a" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="750" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#b5cea8" text-anchor="middle">VAE 디코더</text>
  <text x="750" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">64×64×4 → 512×512×3</text>
  <text x="750" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">8× 업스케일링</text>

  <line x1="750" y1="370" x2="750" y2="398" stroke="#b5cea8" stroke-width="2" marker-end="url(#arrG)"/>

  <!-- Output image -->
  <rect x="660" y="400" width="180" height="60" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="2"/>
  <text x="750" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">🖼 생성 이미지</text>
  <text x="750" y="447" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">512×512 (또는 1024×1024)</text>

  <!-- VAE Encoder note -->
  <rect x="40" y="390" width="560" height="80" rx="8" fill="#0d1117" stroke="#444" stroke-width="1"/>
  <text x="320" y="415" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">img2img / inpainting: VAE 인코더도 사용</text>
  <text x="320" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">원본 이미지 → VAE 인코더 → z₀ → 부분 노이즈 추가 → U-Net → VAE 디코더 → 편집 이미지</text>
  <text x="320" y="455" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">strength 파라미터로 원본 보존↔창의성 조절</text>
</svg>
