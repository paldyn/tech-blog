<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arrc" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#7777cc"/>
    </marker>
    <marker id="arrg" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Full Partition-Wise Join</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">동일 파티션 키로 양쪽 테이블을 같은 수로 나눴을 때 — 병렬 독립 조인 가능</text>

  <!-- Orders table (left) partitions -->
  <text x="170" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">ORDERS (Hash cust_id)</text>

  <rect x="50" y="112" width="240" height="36" rx="5" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">O_P1: hash(cust_id) mod 0</text>

  <rect x="50" y="158" width="240" height="36" rx="5" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="181" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">O_P2: hash(cust_id) mod 1</text>

  <rect x="50" y="204" width="240" height="36" rx="5" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="227" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">O_P3: hash(cust_id) mod 2</text>

  <rect x="50" y="250" width="240" height="36" rx="5" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="273" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">O_P4: hash(cust_id) mod 3</text>

  <!-- Customers table (right) partitions -->
  <text x="710" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">CUSTOMERS (Hash cust_id)</text>

  <rect x="590" y="112" width="240" height="36" rx="5" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="710" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">C_P1: hash(cust_id) mod 0</text>

  <rect x="590" y="158" width="240" height="36" rx="5" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="710" y="181" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">C_P2: hash(cust_id) mod 1</text>

  <rect x="590" y="204" width="240" height="36" rx="5" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="710" y="227" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">C_P3: hash(cust_id) mod 2</text>

  <rect x="590" y="250" width="240" height="36" rx="5" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="710" y="273" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">C_P4: hash(cust_id) mod 3</text>

  <!-- Horizontal join arrows (paired) -->
  <line x1="292" y1="130" x2="588" y2="130" stroke="#7777cc" stroke-width="2" marker-end="url(#arrc)"/>
  <text x="440" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">P1 ↔ P1</text>

  <line x1="292" y1="176" x2="588" y2="176" stroke="#7777cc" stroke-width="2" marker-end="url(#arrc)"/>
  <text x="440" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">P2 ↔ P2</text>

  <line x1="292" y1="222" x2="588" y2="222" stroke="#7777cc" stroke-width="2" marker-end="url(#arrc)"/>
  <text x="440" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">P3 ↔ P3</text>

  <line x1="292" y1="268" x2="588" y2="268" stroke="#7777cc" stroke-width="2" marker-end="url(#arrc)"/>
  <text x="440" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">P4 ↔ P4</text>

  <!-- Parallel workers -->
  <rect x="350" y="300" width="180" height="80" rx="6" fill="#12101a" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">병렬 워커 4개</text>
  <text x="440" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">각 워커가 독립적으로</text>
  <text x="440" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">P(n) ↔ P(n) 조인</text>
  <text x="440" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">데이터 재배분 없음</text>

  <!-- Benefits -->
  <rect x="50" y="404" width="780" height="76" rx="6" fill="#111" stroke="#333"/>
  <text x="440" y="424" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">Full PWJ 조건 &amp; 효과</text>
  <text x="280" y="446" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">조건:</text>
  <text x="280" y="464" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">양쪽 동일 파티션 키 + 동일 파티션 수</text>
  <text x="600" y="446" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">효과:</text>
  <text x="600" y="464" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">메모리 사용 최소화, 병렬 확장성 극대화</text>
</svg>
