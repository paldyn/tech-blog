<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-gray" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#666"/>
    </marker>
    <marker id="arr-yellow" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8d44d"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">'use client' 경계와 컴포넌트 트리</text>

  <!-- Server area background -->
  <rect x="50" y="68" width="780" height="180" rx="8" fill="#0d1f2d" stroke="#3a5a7e"
        stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="70" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Server</text>

  <!-- Page (server) -->
  <rect x="350" y="108" width="180" height="44" rx="6" fill="#0d2a3a" stroke="#3a7a9e" stroke-width="1.5"/>
  <text x="440" y="128" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Page</text>
  <text x="440" y="144" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Server Component</text>

  <!-- Arrow Page -> Header -->
  <line x1="380" y1="152" x2="235" y2="196" stroke="#555" stroke-width="1.5"
        marker-end="url(#arr-gray)"/>

  <!-- Arrow Page -> ProductList -->
  <line x1="440" y1="152" x2="440" y2="196" stroke="#555" stroke-width="1.5"
        marker-end="url(#arr-gray)"/>

  <!-- Arrow Page -> Footer -->
  <line x1="500" y1="152" x2="650" y2="196" stroke="#555" stroke-width="1.5"
        marker-end="url(#arr-gray)"/>

  <!-- Header (server) -->
  <rect x="130" y="196" width="200" height="44" rx="6" fill="#0d2a3a" stroke="#3a7a9e" stroke-width="1.5"/>
  <text x="230" y="216" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Header</text>
  <text x="230" y="232" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Server Component</text>

  <!-- Footer (server) -->
  <rect x="556" y="196" width="200" height="44" rx="6" fill="#0d2a3a" stroke="#3a7a9e" stroke-width="1.5"/>
  <text x="656" y="216" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Footer</text>
  <text x="656" y="232" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Server Component</text>

  <!-- use client boundary label -->
  <text x="340" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#e8d44d">← 'use client' 경계</text>

  <!-- Client area background -->
  <rect x="290" y="192" width="302" height="270" rx="8" fill="#1a1a0d" stroke="#5a5a2e"
        stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="310" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8d44d">Client</text>

  <!-- ProductList (client) -->
  <rect x="340" y="220" width="200" height="44" rx="6" fill="#2a2a0d" stroke="#7a7a2e" stroke-width="1.5"/>
  <text x="440" y="240" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8d44d">ProductList</text>
  <text x="440" y="256" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">'use client'</text>

  <!-- Arrow ProductList -> AddToCart -->
  <line x1="400" y1="264" x2="365" y2="308" stroke="#7a7a2e" stroke-width="1.5"
        marker-end="url(#arr-yellow)"/>

  <!-- Arrow ProductList -> ReviewList -->
  <line x1="480" y1="264" x2="512" y2="308" stroke="#7a7a2e" stroke-width="1.5"
        marker-end="url(#arr-yellow)"/>

  <!-- AddToCart (client - implicit) -->
  <rect x="308" y="308" width="172" height="50" rx="6" fill="#2a2a0d" stroke="#5a5a2e" stroke-width="1"/>
  <text x="394" y="330" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8d44d">AddToCart</text>
  <text x="394" y="346" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">자동으로 클라이언트</text>

  <!-- ReviewList (client - implicit) -->
  <rect x="398" y="308" width="172" height="50" rx="6" fill="#2a2a0d" stroke="#5a5a2e" stroke-width="1"/>
  <text x="484" y="330" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8d44d">ReviewList</text>
  <text x="484" y="346" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">자동으로 클라이언트</text>

  <!-- Explanation boxes -->
  <rect x="50" y="390" width="360" height="90" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="70" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">서버 컴포넌트 특징</text>
  <text x="70" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· 기본값 — 선언 없이 서버 컴포넌트</text>
  <text x="70" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· JS 번들에 포함되지 않음</text>
  <text x="70" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· async/await, DB 접근 가능</text>

  <rect x="470" y="390" width="360" height="90" rx="6" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="490" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8d44d">클라이언트 경계 규칙</text>
  <text x="490" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· 'use client' 선언한 파일부터 경계</text>
  <text x="490" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· 하위 컴포넌트는 자동으로 클라이언트</text>
  <text x="490" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· 경계를 가능한 잎 노드 근처로 유지</text>
</svg>
