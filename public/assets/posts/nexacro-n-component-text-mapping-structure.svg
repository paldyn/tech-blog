<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">컴포넌트 텍스트 매핑 구조</text>

  <!-- Resource File -->
  <rect x="60" y="80" width="220" height="220" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">언어 리소스</text>
  <text x="170" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">(ko.xml / en.xml)</text>

  <!-- Text IDs -->
  <rect x="80" y="136" width="180" height="30" rx="4" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="170" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">SAVE → "저장" / "Save"</text>
  <rect x="80" y="172" width="180" height="30" rx="4" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="170" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">SEARCH → "조회" / "Search"</text>
  <rect x="80" y="208" width="180" height="30" rx="4" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="170" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">COL_NAME → "이름" / "Name"</text>
  <rect x="80" y="244" width="180" height="30" rx="4" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="170" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">MSG_OK → "완료" / "Done"</text>

  <!-- Arrow right -->
  <line x1="280" y1="190" x2="354" y2="190" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="317" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">매핑</text>

  <!-- i18n Engine -->
  <rect x="360" y="140" width="160" height="100" rx="8" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">i18n 엔진</text>
  <text x="440" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">현재 언어: ko</text>
  <text x="440" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">$ID → 언어별 텍스트</text>
  <text x="440" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">런타임 치환</text>

  <!-- Arrow to components -->
  <line x1="520" y1="190" x2="594" y2="190" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="557" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3" text-anchor="middle">적용</text>

  <!-- Components column -->
  <rect x="600" y="80" width="220" height="220" rx="8" fill="#1a1a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="710" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">컴포넌트</text>

  <rect x="620" y="120" width="180" height="34" rx="4" fill="#0d0d1a" stroke="#7777cc" stroke-width="1"/>
  <text x="710" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">Button: text="$SAVE"</text>
  <text x="710" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">→ "저장" 표시</text>

  <rect x="620" y="162" width="180" height="34" rx="4" fill="#0d0d1a" stroke="#7777cc" stroke-width="1"/>
  <text x="710" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">Static: text="$LBL_NAME"</text>
  <text x="710" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">→ "이름" 표시</text>

  <rect x="620" y="202" width="180" height="34" rx="4" fill="#0d0d1a" stroke="#7777cc" stroke-width="1"/>
  <text x="710" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">Grid Cell: text="$COL_ID"</text>
  <text x="710" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">→ "코드" 표시</text>

  <rect x="620" y="242" width="180" height="34" rx="4" fill="#0d0d1a" stroke="#7777cc" stroke-width="1"/>
  <text x="710" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">Tab: text="$TAB_BASIC"</text>
  <text x="710" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">→ "기본정보" 표시</text>

  <!-- Bottom: Language Switch -->
  <rect x="60" y="330" width="760" height="100" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">언어 전환 시 자동 갱신 흐름</text>

  <rect x="80" y="370" width="140" height="44" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="150" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#55c555" text-anchor="middle">언어 전환</text>
  <text x="150" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">setLanguage("en")</text>

  <line x1="220" y1="392" x2="254" y2="392" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="260" y="370" width="140" height="44" rx="6" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="330" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#7ec8e3" text-anchor="middle">리소스 교체</text>
  <text x="330" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">en.xml 로드</text>

  <line x1="400" y1="392" x2="434" y2="392" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="440" y="370" width="140" height="44" rx="6" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="510" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#7ec8e3" text-anchor="middle">컴포넌트 갱신</text>
  <text x="510" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">$ID → 새 언어 텍스트</text>

  <line x1="580" y1="392" x2="614" y2="392" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="620" y="370" width="140" height="44" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="690" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" font-weight="600" fill="#55c555" text-anchor="middle">화면 완성</text>
  <text x="690" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">Save / Search 표시</text>
</svg>
