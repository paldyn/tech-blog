<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">next/script 로드 전략</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">strategy 옵션별 동작 타이밍</text>

  <!-- Timeline bar -->
  <line x1="60" y1="180" x2="820" y2="180" stroke="#333" stroke-width="2"/>
  <text x="60" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">페이지 로드 시작</text>
  <text x="750" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">페이지 완료</text>

  <!-- Timeline ticks -->
  <line x1="120" y1="175" x2="120" y2="185" stroke="#555" stroke-width="1"/>
  <line x1="340" y1="175" x2="340" y2="185" stroke="#555" stroke-width="1"/>
  <line x1="560" y1="175" x2="560" y2="185" stroke="#555" stroke-width="1"/>
  <line x1="760" y1="175" x2="760" y2="185" stroke="#555" stroke-width="1"/>
  <text x="120" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">HTML 파싱</text>
  <text x="340" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">DOMContentLoaded</text>
  <text x="560" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">hydration 완료</text>
  <text x="760" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">idle</text>

  <!-- beforeInteractive -->
  <rect x="60" y="220" width="148" height="44" rx="6" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="134" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e05555">beforeInteractive</text>
  <text x="134" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">즉시 (렌더 차단)</text>

  <!-- afterInteractive -->
  <rect x="440" y="220" width="148" height="44" rx="6" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="514" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3">afterInteractive</text>
  <text x="514" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">hydration 후 (기본값)</text>

  <!-- lazyOnload -->
  <rect x="660" y="220" width="140" height="44" rx="6" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="730" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555">lazyOnload</text>
  <text x="730" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">idle 시간에 로드</text>

  <!-- worker -->
  <rect x="240" y="300" width="400" height="44" rx="6" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7777cc">worker (실험적)</text>
  <text x="440" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Web Worker에서 실행 — 메인 스레드 차단 없음</text>

  <!-- Use case -->
  <rect x="60" y="370" width="240" height="68" rx="6" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e05555">beforeInteractive</text>
  <text x="180" y="410" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">polyfill, 쿠키 동의</text>
  <text x="180" y="428" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">(최소한만 사용)</text>

  <rect x="320" y="370" width="240" height="68" rx="6" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3">afterInteractive</text>
  <text x="440" y="410" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Google Tag Manager</text>
  <text x="440" y="428" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">인증 스크립트</text>

  <rect x="580" y="370" width="240" height="68" rx="6" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text x="700" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555">lazyOnload</text>
  <text x="700" y="410" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">채팅 위젯, SNS 버튼</text>
  <text x="700" y="428" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">비필수 분석 툴</text>
</svg>
