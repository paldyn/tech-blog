<svg xmlns="http://www.w3.org/2000/svg" width="880" height="450" viewBox="0 0 880 450">
  <rect width="880" height="450" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ASVS 3개 검증 레벨</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">애플리케이션의 위험도에 맞는 레벨을 선택한다</text>

  <!-- Level 1 -->
  <rect x="60" y="100" width="760" height="90" rx="8" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="90" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555">Level 1 — 최소 기준선</text>
  <text x="90" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">모든 애플리케이션이 갖춰야 할 최소한의 보안 수준</text>
  <text x="90" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">침투 테스트 도구만으로 외부에서 검증 가능 · OWASP Top 10 수준 방어</text>

  <!-- Level 2 -->
  <rect x="60" y="210" width="760" height="90" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="90" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">Level 2 — 표준 (대부분의 서비스 권장)</text>
  <text x="90" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">민감 데이터를 다루는 일반적인 비즈니스 애플리케이션의 권장 수준</text>
  <text x="90" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">전자상거래 · B2B SaaS · 개인정보 처리 서비스 · 문서와 코드 접근이 필요한 검증</text>

  <!-- Level 3 -->
  <rect x="60" y="320" width="760" height="90" rx="8" fill="#2a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="90" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc">Level 3 — 고보증 (High Assurance)</text>
  <text x="90" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">침해 시 인명·금융·사회 인프라에 중대한 피해가 발생하는 시스템</text>
  <text x="90" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">금융 코어 · 의료 · 공공 인프라 · 아키텍처 수준의 심층 검증 요구</text>
</svg>
