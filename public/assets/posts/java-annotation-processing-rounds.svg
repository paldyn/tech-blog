<svg xmlns="http://www.w3.org/2000/svg" width="880" height="330" viewBox="0 0 880 330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="330" rx="12" fill="#0a0a0a"/>
  <text x="40" y="48" font-size="22" font-weight="700" fill="#e8e8e8">애너테이션 프로세싱 — 컴파일 라운드</text>

  <defs>
    <marker id="ap-arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="ap-arr2" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- input -->
  <rect x="40" y="92" width="160" height="76" rx="8" fill="#101010" stroke="#7ec8e3" stroke-width="1"/>
  <text x="120" y="124" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">소스 .java</text>
  <text x="120" y="146" font-size="13" fill="#9aa4b8" text-anchor="middle">@애너테이션 포함</text>
  <text x="120" y="162" font-size="13" fill="#9aa4b8" text-anchor="middle"></text>

  <!-- javac -->
  <rect x="260" y="92" width="160" height="76" rx="8" fill="#101010" stroke="#7777cc" stroke-width="1"/>
  <text x="340" y="124" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">javac</text>
  <text x="340" y="146" font-size="13" fill="#9aa4b8" text-anchor="middle">애너테이션 스캔 →</text>
  <text x="340" y="162" font-size="13" fill="#9aa4b8" text-anchor="middle">프로세서 호출</text>

  <!-- processor -->
  <rect x="480" y="92" width="160" height="76" rx="8" fill="#101010" stroke="#55c555" stroke-width="1"/>
  <text x="560" y="124" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Processor</text>
  <text x="560" y="146" font-size="13" fill="#9aa4b8" text-anchor="middle">process() 실행</text>
  <text x="560" y="162" font-size="13" fill="#9aa4b8" text-anchor="middle">새 소스 생성</text>

  <!-- generated -->
  <rect x="700" y="92" width="140" height="76" rx="8" fill="#101010" stroke="#55c555" stroke-width="1"/>
  <text x="770" y="124" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">생성 .java</text>
  <text x="770" y="146" font-size="13" fill="#9aa4b8" text-anchor="middle">Filer가 출력</text>
  <text x="770" y="162" font-size="13" fill="#9aa4b8" text-anchor="middle"></text>

  <line x1="200" y1="130" x2="258" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ap-arr)"/>
  <line x1="420" y1="130" x2="478" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ap-arr)"/>
  <line x1="640" y1="130" x2="698" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ap-arr)"/>

  <!-- feedback loop: generated -> javac (next round) -->
  <path d="M 770 168 C 770 240, 340 240, 340 170" fill="none" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#ap-arr2)"/>
  <text x="555" y="270" font-size="13" fill="#7ec8e3" text-anchor="middle">생성 소스에 또 애너테이션이 있으면 다음 라운드 재실행 (더 이상 없으면 종료)</text>
  <text x="555" y="300" font-size="13" fill="#9aa4b8" text-anchor="middle">최종적으로 모든 .java가 .class로 컴파일</text>
</svg>
