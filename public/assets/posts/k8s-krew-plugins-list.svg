<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">꼭 설치해야 할 인기 플러그인</text>

  <!-- Header row -->
  <rect x="60" y="64" width="760" height="36" rx="6" fill="#1a1a1a"/>
  <text x="140" y="87" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#888">플러그인</text>
  <text x="300" y="87" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#888">명령어</text>
  <text x="600" y="87" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#888">기능</text>

  <!-- ctx -->
  <rect x="60" y="104" width="760" height="44" rx="0" fill="#0d1f2d"/>
  <text x="140" y="126" text-anchor="middle" dominant-baseline="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">ctx</text>
  <text x="300" y="120" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178">kubectl ctx</text>
  <text x="300" y="138" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178">kubectl ctx prod-ctx</text>
  <text x="600" y="126" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">인터랙티브 context 전환 (fzf)</text>

  <!-- ns -->
  <rect x="60" y="152" width="760" height="44" rx="0" fill="#0a0a0a"/>
  <text x="140" y="174" text-anchor="middle" dominant-baseline="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">ns</text>
  <text x="300" y="168" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178">kubectl ns</text>
  <text x="300" y="186" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178">kubectl ns kube-system</text>
  <text x="600" y="174" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">인터랙티브 namespace 전환</text>

  <!-- neat -->
  <rect x="60" y="200" width="760" height="44" rx="0" fill="#0d1f2d"/>
  <text x="140" y="222" text-anchor="middle" dominant-baseline="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">neat</text>
  <text x="300" y="216" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178">kubectl get pod my-pod -o yaml</text>
  <text x="300" y="234" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178">  | kubectl neat</text>
  <text x="600" y="222" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">불필요 필드 제거한 깔끔한 YAML</text>

  <!-- stern -->
  <rect x="60" y="248" width="760" height="44" rx="0" fill="#0a0a0a"/>
  <text x="140" y="270" text-anchor="middle" dominant-baseline="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">stern</text>
  <text x="300" y="264" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178">kubectl stern my-app</text>
  <text x="300" y="282" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178">kubectl stern -n default .</text>
  <text x="600" y="270" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">여러 파드 로그 동시 실시간 스트리밍</text>

  <!-- view-secret -->
  <rect x="60" y="296" width="760" height="44" rx="0" fill="#0d1f2d"/>
  <text x="140" y="318" text-anchor="middle" dominant-baseline="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">view-secret</text>
  <text x="300" y="312" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178">kubectl view-secret my-secret</text>
  <text x="300" y="330" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178">kubectl view-secret my-secret -a</text>
  <text x="600" y="318" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Secret base64 자동 디코딩</text>

  <!-- node-shell -->
  <rect x="60" y="344" width="760" height="44" rx="0" fill="#0a0a0a"/>
  <text x="140" y="366" text-anchor="middle" dominant-baseline="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">node-shell</text>
  <text x="300" y="360" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178">kubectl node-shell worker-1</text>
  <text x="300" y="378" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178"># 노드 직접 접속</text>
  <text x="600" y="366" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">노드에 privileged 쉘 접속</text>

  <!-- who-can -->
  <rect x="60" y="392" width="760" height="44" rx="0" fill="#0d1f2d"/>
  <text x="140" y="414" text-anchor="middle" dominant-baseline="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">who-can</text>
  <text x="300" y="408" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178">kubectl who-can create pods</text>
  <text x="300" y="426" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178">kubectl who-can get secrets</text>
  <text x="600" y="414" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">RBAC 권한 역방향 조회</text>

  <rect x="60" y="436" width="760" height="2" fill="#1a1a1a"/>
  <text x="440" y="460" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">kubectl krew list 로 설치된 플러그인 확인 | krew.sigs.k8s.io 에서 전체 카탈로그 검색</text>
</svg>
