<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">T5: Text-To-Text Transfer Transformer</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">모든 NLP 태스크를 텍스트→텍스트로 통일 — 하나의 모델, 하나의 인터페이스</text>

  <!-- Left: Task unification -->
  <rect x="50" y="90" width="380" height="360" fill="#0d1117" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">태스크 통일 인터페이스</text>
  <text x="240" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">태스크 이름을 프리픽스로 추가 → 동일 모델</text>

  <!-- Translation -->
  <rect x="66" y="148" width="348" height="40" fill="#111827" rx="4"/>
  <text x="240" y="165" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" text-anchor="middle">translate English to Korean:</text>
  <text x="240" y="181" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" text-anchor="middle">"I love AI" → "나는 AI를 사랑한다"</text>

  <!-- Summarization -->
  <rect x="66" y="196" width="348" height="40" fill="#111827" rx="4"/>
  <text x="240" y="213" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" text-anchor="middle">summarize:</text>
  <text x="240" y="229" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" text-anchor="middle">[긴 기사] → "한 줄 요약"</text>

  <!-- Classification -->
  <rect x="66" y="244" width="348" height="40" fill="#111827" rx="4"/>
  <text x="240" y="261" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle">sst2 sentence:</text>
  <text x="240" y="277" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" text-anchor="middle">"This film is great!" → "positive"</text>

  <!-- NLI -->
  <rect x="66" y="292" width="348" height="40" fill="#111827" rx="4"/>
  <text x="240" y="309" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc" text-anchor="middle">mnli hypothesis: [H] premise: [P]</text>
  <text x="240" y="325" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" text-anchor="middle">→ "entailment" / "neutral" / "contradiction"</text>

  <!-- Regression -->
  <rect x="66" y="340" width="348" height="40" fill="#111827" rx="4"/>
  <text x="240" y="357" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8" text-anchor="middle">stsb sentence1: [S1] sentence2: [S2]</text>
  <text x="240" y="373" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff" text-anchor="middle">→ "3.8"  (유사도 점수를 텍스트로 출력)</text>

  <text x="240" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">회귀 점수도 텍스트로! → 통일 인터페이스 완성</text>
  <text x="240" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">Cross-Entropy Loss (토큰 예측) 하나로 모든 태스크 학습</text>

  <!-- Right: T5 specifics -->
  <rect x="450" y="90" width="380" height="360" fill="#0d1117" rx="8" stroke="#ce9178" stroke-width="1.5"/>
  <text x="640" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#ce9178" text-anchor="middle">T5 주요 특징</text>

  <!-- C4 dataset -->
  <text x="466" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">① 사전학습 데이터: C4</text>
  <text x="466" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Common Crawl 정제본 (750GB)</text>
  <text x="466" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">웹 텍스트 기반 고품질 필터링</text>

  <line x1="466" y1="190" x2="818" y2="190" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Span Corruption -->
  <text x="466" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">② 사전학습 목표: Span Corruption</text>
  <text x="466" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">연속 토큰 구간(span) 마스킹 후 복원</text>
  <text x="466" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ffffff">입력: "나는 &lt;X&gt; 좋아한다"</text>
  <text x="466" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">타깃: "&lt;X&gt; AI를"</text>
  <text x="466" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">MLM보다 효율적 (목표 시퀀스 짧음)</text>

  <line x1="466" y1="294" x2="818" y2="294" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Relative PE -->
  <text x="466" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">③ 상대 위치 인코딩 (Relative PE)</text>
  <text x="466" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">절대 PE 대신 상대 거리 학습</text>
  <text x="466" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">긴 시퀀스 일반화에 더 유리</text>

  <line x1="466" y1="362" x2="818" y2="362" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Model sizes -->
  <text x="466" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#ce9178">④ 모델 크기 라인업</text>
  <text x="466" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Small 60M · Base 220M · Large 770M</text>
  <text x="466" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">XL 3B · XXL 11B (Google TPU v3)</text>
  <text x="466" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">Flan-T5: 지시 조정(instruction tuning) 버전</text>
</svg>
