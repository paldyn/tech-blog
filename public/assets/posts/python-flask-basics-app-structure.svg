<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="340" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">최소 Flask 앱의 구성</text>

  <rect x="60" y="80" width="760" height="180" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="110" font-size="13" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace"># app.py</text>
  <text x="76" y="134" font-size="13" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#7ec8e3" font-weight="600">from</tspan> flask <tspan fill="#7ec8e3" font-weight="600">import</tspan> Flask</text>
  <text x="76" y="166" font-size="13" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">app = Flask(__name__)</text>
  <text x="76" y="198" font-size="13" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#b5cea8">@app.route(</tspan><tspan fill="#ce9178">"/hello"</tspan><tspan fill="#b5cea8">)</tspan></text>
  <text x="76" y="222" font-size="13" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#7ec8e3" font-weight="600">def</tspan> hello():</text>
  <text x="76" y="246" font-size="13" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">    <tspan fill="#7ec8e3" font-weight="600">return</tspan> <tspan fill="#ce9178">"Hello, Flask!"</tspan></text>

  <rect x="60" y="284" width="370" height="40" rx="6" fill="#0f1320" stroke="#7777cc" stroke-width="1"/>
  <text x="245" y="309" font-size="13" fill="#7ec8e3" text-anchor="middle">app = Flask(__name__) → 앱 객체 생성</text>

  <rect x="450" y="284" width="370" height="40" rx="6" fill="#0f1320" stroke="#7777cc" stroke-width="1"/>
  <text x="635" y="309" font-size="13" fill="#7ec8e3" text-anchor="middle">@app.route → URL과 함수 연결</text>
</svg>
