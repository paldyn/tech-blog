<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">JSX Element 객체의 실제 구조</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">JSX는 빌드 시 평범한 JS 객체로 변환된다</text>

  <!-- JSX input -->
  <rect x="60" y="96" width="320" height="80" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">JSX 코드</text>
  <text x="80" y="142" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan> el = &lt;</tspan><tspan fill="#ce9178">h1</tspan><tspan> className=</tspan><tspan fill="#ce9178">"title"</tspan><tspan>&gt;</tspan>
  </text>
  <text x="80" y="162" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>  Hello&lt;/</tspan><tspan fill="#ce9178">h1</tspan><tspan>&gt;;</tspan>
  </text>

  <!-- arrow -->
  <line x1="380" y1="136" x2="460" y2="136" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="420" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">_jsx()</text>

  <!-- Element object -->
  <rect x="460" y="96" width="360" height="180" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">JSX Element 객체 (평범한 JS 객체)</text>
  <text x="480" y="142" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>{</tspan>
  </text>
  <text x="480" y="162" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>  </tspan><tspan fill="#b5cea8">$$typeof</tspan><tspan>: Symbol(react.element),</tspan>
  </text>
  <text x="480" y="182" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>  </tspan><tspan fill="#b5cea8">type</tspan><tspan>: </tspan><tspan fill="#ce9178">"h1"</tspan><tspan>,</tspan>
  </text>
  <text x="480" y="202" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>  </tspan><tspan fill="#b5cea8">props</tspan><tspan>: { className: </tspan><tspan fill="#ce9178">"title"</tspan><tspan>,</tspan>
  </text>
  <text x="480" y="222" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>           children: </tspan><tspan fill="#ce9178">"Hello"</tspan><tspan> },</tspan>
  </text>
  <text x="480" y="252" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>}</tspan>
  </text>

  <!-- type explanation -->
  <text x="60" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">type 필드의 의미</text>

  <rect x="60" y="336" width="360" height="100" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">문자열 — 내장 DOM 태그</text>
  <text x="80" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">type: "div", "span", "h1", ...</text>
  <text x="80" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">React가 직접 DOM 노드 생성</text>
  <text x="80" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">소문자로 시작 — 예: &lt;div /&gt;</text>

  <rect x="460" y="336" width="360" height="100" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="480" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">함수 참조 — 사용자 정의 컴포넌트</text>
  <text x="480" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">type: Button (함수 자체)</text>
  <text x="480" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">React가 함수를 호출해 렌더</text>
  <text x="480" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">대문자로 시작 — 예: &lt;Button /&gt;</text>
</svg>
