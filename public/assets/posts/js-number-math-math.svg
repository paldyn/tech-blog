<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Math 객체 주요 메서드</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">올림·내림·반올림·삼각함수·난수</text>

  <!-- Left column: rounding -->
  <rect x="60" y="90" width="235" height="170" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="177" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">반올림 계열</text>
  <text x="80" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">Math.round(4.5)</text>
  <text x="80" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ 5 (반올림)</text>
  <text x="80" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">Math.ceil(4.1)</text>
  <text x="80" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ 5 (올림)</text>
  <text x="80" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">Math.floor(4.9)</text>
  <text x="80" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ 4 (내림)</text>
  <text x="80" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">Math.trunc(-4.9)</text>
  <text x="80" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ -4 (0 방향으로 절사)</text>

  <!-- Middle column: min/max/abs -->
  <rect x="315" y="90" width="235" height="170" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="432" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">비교 · 절대값</text>
  <text x="335" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">Math.max(1,5,3)</text>
  <text x="335" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ 5</text>
  <text x="335" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">Math.min(1,5,3)</text>
  <text x="335" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ 1</text>
  <text x="335" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">Math.abs(-7)</text>
  <text x="335" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ 7</text>
  <text x="335" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">Math.sign(-3)</text>
  <text x="335" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ -1 (부호: -1/0/1)</text>

  <!-- Right column: power/random -->
  <rect x="570" y="90" width="250" height="170" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="695" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">거듭제곱 · 난수</text>
  <text x="590" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">Math.pow(2, 10)</text>
  <text x="590" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ 1024 (** 연산자 권장)</text>
  <text x="590" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">Math.sqrt(9)</text>
  <text x="590" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ 3</text>
  <text x="590" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">Math.cbrt(27)</text>
  <text x="590" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ 3 (세제곱근)</text>
  <text x="590" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">Math.random()</text>
  <text x="590" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ [0,1) 균등 난수</text>

  <!-- Bottom: code examples -->
  <rect x="60" y="278" width="760" height="136" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">자주 쓰는 패턴</text>
  <rect x="72" y="308" width="736" height="94" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="88" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 정수 난수 [min, max]</text>
  <text x="88" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">const</text><text x="142" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> randInt = (min, max) =&gt;</text>
  <text x="88" y="364" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  Math.floor(Math.random() * (max - min + </text><text x="436" y="364" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">1</text><text x="448" y="364" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)) + min;</text>
  <text x="88" y="388" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 소수점 N자리 반올림</text>
  <text x="88" y="406" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> roundTo = (n, dp) =&gt; Math.round(n * </tspan><tspan fill="#b5cea8">10</tspan><tspan fill="#ffffff"> ** dp) / </tspan><tspan fill="#b5cea8">10</tspan><tspan fill="#ffffff"> ** dp;</tspan></text>
</svg>
