<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">명령형 vs 선언형</text>

  <text x="60" y="92" font-size="16" font-weight="600" fill="#e05555">setup.py (명령형)</text>
  <rect x="60" y="108" width="360" height="170" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="136" font-family="'JetBrains Mono',monospace" font-size="13" fill="#7ec8e3" font-weight="600">from</text>
  <text xml:space="preserve" x="120" y="136" font-family="'JetBrains Mono',monospace" font-size="13" fill="#ffffff">setuptools <tspan fill="#7ec8e3" font-weight="600">import</tspan> setup</text>
  <text xml:space="preserve" x="76" y="166" font-family="'JetBrains Mono',monospace" font-size="13" fill="#ffffff">setup(</text>
  <text xml:space="preserve" x="76" y="188" font-family="'JetBrains Mono',monospace" font-size="13" fill="#ffffff">  name=<tspan fill="#ce9178">"myapp"</tspan>,</text>
  <text xml:space="preserve" x="76" y="210" font-family="'JetBrains Mono',monospace" font-size="13" fill="#ffffff">  version=<tspan fill="#ce9178">"0.1"</tspan>,</text>
  <text xml:space="preserve" x="76" y="232" font-family="'JetBrains Mono',monospace" font-size="13" fill="#9aa4b8">  # 코드가 실행돼 값이 정해짐</text>
  <text xml:space="preserve" x="76" y="254" font-family="'JetBrains Mono',monospace" font-size="13" fill="#ffffff">)</text>

  <text x="480" y="92" font-size="16" font-weight="600" fill="#55c555">pyproject.toml (선언형)</text>
  <rect x="480" y="108" width="340" height="170" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="496" y="136" font-family="'JetBrains Mono',monospace" font-size="13" fill="#7ec8e3" font-weight="600">[project]</text>
  <text xml:space="preserve" x="496" y="166" font-family="'JetBrains Mono',monospace" font-size="13" fill="#ffffff">name = <tspan fill="#ce9178">"myapp"</tspan></text>
  <text xml:space="preserve" x="496" y="188" font-family="'JetBrains Mono',monospace" font-size="13" fill="#ffffff">version = <tspan fill="#ce9178">"0.1"</tspan></text>
  <text xml:space="preserve" x="496" y="218" font-family="'JetBrains Mono',monospace" font-size="13" fill="#9aa4b8"># 그냥 데이터 — 실행 없음</text>
  <text xml:space="preserve" x="496" y="248" font-family="'JetBrains Mono',monospace" font-size="13" fill="#9aa4b8"># 도구가 안전하게 읽음</text>
</svg>
