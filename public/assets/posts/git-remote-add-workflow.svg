<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">git remote add — 원격 저장소 연결</text>

  <!-- Subtitle -->
  <text x="440" y="78" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" fill="#888">로컬에 원격 저장소를 이름으로 등록한다</text>

  <!-- Left box: 로컬 저장소 -->
  <rect x="60" y="110" width="310" height="240" rx="8" fill="#0d1117" stroke="#2a3a52" stroke-width="1.5"/>
  <text x="215" y="140" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">로컬 저장소</text>

  <!-- .git/config code block inside left box -->
  <rect x="80" y="152" width="270" height="130" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="96" y="178" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#6a8aa0">[remote "origin"]</text>
  <text x="96" y="196" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">  url = https://github.com/</text>
  <text x="96" y="214" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">        user/repo.git</text>
  <text x="96" y="232" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e8e8e8">  fetch = +refs/heads/*:</text>
  <text x="96" y="250" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">    refs/remotes/origin/*</text>
  <text x="215" y="306" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">.git/config 에 자동 기록됨</text>

  <!-- Right box: 원격 저장소 -->
  <rect x="510" y="110" width="310" height="240" rx="8" fill="#0d1117" stroke="#2a3a52" stroke-width="1.5"/>
  <text x="665" y="140" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">원격 저장소 (GitHub)</text>
  <text x="665" y="195" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">github.com/user/repo</text>
  <text x="665" y="222" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">HTTPS / SSH 접근</text>
  <text x="665" y="248" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">완전한 Git 저장소</text>
  <text x="665" y="306" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">네트워크상에 존재</text>

  <!-- Arrow: 로컬 → 원격 (shaft + head) -->
  <rect x="372" y="226" width="94" height="4" fill="#7777cc"/>
  <polygon points="466,216 466,236 510,228" fill="#7777cc" stroke="#4a4a88" stroke-width="1"/>
  <!-- Arrow label -->
  <text x="440" y="210" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">origin</text>

  <!-- Bottom command bar -->
  <rect x="60" y="375" width="760" height="46" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="403" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#6a8aa0">$ </text>
  <text x="92" y="403" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">git remote add </text>
  <text x="240" y="403" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">origin </text>
  <text x="290" y="403" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8">&lt;url&gt;</text>
</svg>
