<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <defs>
    <marker id="nm-arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="nm-back" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">노드 라이프사이클 — 합류부터 퇴장까지</text>

  <!-- join -->
  <rect x="40" y="130" width="150" height="90" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="115" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">join</text>
  <text x="115" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">토큰으로 합류</text>
  <text x="115" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">kubeadm join</text>

  <!-- Ready -->
  <rect x="240" y="130" width="150" height="90" rx="8" fill="#1a3a4a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="315" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">Ready</text>
  <text x="315" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">스케줄링 가능</text>
  <text x="315" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Pod 수용</text>

  <!-- cordon -->
  <rect x="440" y="130" width="150" height="90" rx="8" fill="#201a10" stroke="#ce9178" stroke-width="1.5"/>
  <text x="515" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#ce9178" text-anchor="middle">cordon</text>
  <text x="515" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SchedulingDisabled</text>
  <text x="515" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">기존 Pod는 유지</text>

  <!-- drain -->
  <rect x="640" y="130" width="150" height="90" rx="8" fill="#2a1416" stroke="#e05555" stroke-width="1.5"/>
  <text x="715" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">drain → 제거</text>
  <text x="715" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Pod 비우고</text>
  <text x="715" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">delete node</text>

  <line x1="190" y1="175" x2="240" y2="175" stroke="#7ec8e3" stroke-width="2" marker-end="url(#nm-arr)"/>
  <line x1="390" y1="175" x2="440" y2="175" stroke="#7ec8e3" stroke-width="2" marker-end="url(#nm-arr)"/>
  <line x1="590" y1="175" x2="640" y2="175" stroke="#7ec8e3" stroke-width="2" marker-end="url(#nm-arr)"/>

  <!-- uncordon back -->
  <path d="M 515 220 C 515 280, 315 280, 315 224" fill="none" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#nm-back)"/>
  <text x="415" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">uncordon — 다시 Ready로 복귀</text>

  <text x="440" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">cordon은 되돌릴 수 있지만, delete node는 합류부터 다시 — 작업의 무게가 다르다</text>
</svg>
