<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-p" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Nexacro N 테마 시스템 구조</text>

  <!-- Theme Files -->
  <text x="160" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">테마 파일</text>

  <rect x="60" y="94" width="200" height="60" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">light.ess</text>
  <text x="160" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">라이트 테마 스타일</text>

  <rect x="60" y="164" width="200" height="60" rx="8" fill="#1a1a0d" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="160" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#b5cea8" text-anchor="middle">dark.ess</text>
  <text x="160" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">다크 테마 스타일</text>

  <rect x="60" y="234" width="200" height="60" rx="8" fill="#0d0d1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">corporate.ess</text>
  <text x="160" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">회사 브랜드 테마</text>

  <!-- Arrows to engine -->
  <line x1="260" y1="124" x2="354" y2="210" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="260" y1="194" x2="354" y2="220" stroke="#b5cea8" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="260" y1="264" x2="354" y2="240" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-p)"/>

  <!-- Theme Engine -->
  <rect x="360" y="170" width="160" height="100" rx="10" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">테마 엔진</text>
  <text x="440" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">setTheme() API</text>
  <text x="440" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">스타일 실시간 적용</text>
  <text x="440" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">컴포넌트 재렌더</text>

  <!-- Arrows from engine to components -->
  <line x1="520" y1="210" x2="594" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="520" y1="220" x2="594" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="520" y1="240" x2="594" y2="270" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="520" y1="250" x2="594" y2="340" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Components -->
  <text x="710" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">컴포넌트</text>

  <rect x="600" y="94" width="220" height="50" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="710" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Button / Edit / Static</text>
  <text x="710" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">배경색·글자색·테두리</text>

  <rect x="600" y="158" width="220" height="50" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="710" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Grid / Dataset</text>
  <text x="710" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">행 색상·헤더 스타일</text>

  <rect x="600" y="232" width="220" height="50" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="710" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Form / Div</text>
  <text x="710" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">배경·레이아웃 색상</text>

  <rect x="600" y="302" width="220" height="50" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="710" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Popup / Div</text>
  <text x="710" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">오버레이·그림자 효과</text>

  <!-- ESS File structure info -->
  <rect x="60" y="330" width="480" height="110" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="352" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">/* light.ess — 라이트 테마 정의 */</text>
  <text x="80" y="372" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">Button</tspan>
    <tspan fill="#ffffff"> {</tspan>
  </text>
  <text x="80" y="392" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  background: </tspan>
    <tspan fill="#ce9178">"#f0f0f0"</tspan>
    <tspan fill="#ffffff">;</tspan>
  </text>
  <text x="80" y="412" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  color: </tspan>
    <tspan fill="#ce9178">"#333333"</tspan>
    <tspan fill="#ffffff">; border: </tspan>
    <tspan fill="#ce9178">"1px solid #cccccc"</tspan>
    <tspan fill="#ffffff">;</tspan>
  </text>
  <text x="80" y="430" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">}</tspan>
  </text>
</svg>
