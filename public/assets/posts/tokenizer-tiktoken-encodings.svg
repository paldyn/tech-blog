<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">tiktoken 인코딩별 특성 비교</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">OpenAI 모델별로 다른 인코딩을 사용한다 — 교차 호환 불가</text>

  <!-- Table header -->
  <rect x="60" y="92" width="760" height="44" rx="6" fill="#111820" stroke="#1e2433"/>
  <text x="160" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">인코딩 이름</text>
  <text x="330" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">어휘 크기</text>
  <text x="490" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">사용 모델</text>
  <text x="700" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">특징</text>

  <!-- r50k_base -->
  <rect x="60" y="140" width="760" height="50" rx="0" fill="#0f0f14" stroke="#1a1a20"/>
  <text x="160" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" text-anchor="middle">r50k_base</text>
  <text x="330" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" text-anchor="middle">50,257</text>
  <text x="490" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">text-davinci-002</text>
  <text x="490" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Codex 구형</text>
  <text x="700" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">GPT-2 어휘 계승</text>

  <!-- p50k_base -->
  <rect x="60" y="190" width="760" height="50" rx="0" fill="#0f0f14" stroke="#1a1a20"/>
  <text x="160" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" text-anchor="middle">p50k_base</text>
  <text x="330" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8" text-anchor="middle">50,281</text>
  <text x="490" y="213" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">text-davinci-003</text>
  <text x="490" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Codex 최신</text>
  <text x="700" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">코드 특화 패턴</text>

  <!-- cl100k_base -->
  <rect x="60" y="240" width="760" height="50" rx="0" fill="#0a1428" stroke="#1e3a5e"/>
  <text x="160" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">cl100k_base</text>
  <text x="330" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">100,277</text>
  <text x="490" y="263" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">GPT-4, GPT-3.5-turbo</text>
  <text x="490" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">text-embedding-3</text>
  <text x="700" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">다국어 효율 2배↑</text>

  <!-- o200k_base -->
  <rect x="60" y="290" width="760" height="50" rx="0" fill="#0a1428" stroke="#1e3a5e"/>
  <text x="160" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle">o200k_base</text>
  <text x="330" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" text-anchor="middle">200,019</text>
  <text x="490" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">GPT-4o, GPT-4o-mini</text>
  <text x="490" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">o1, o3 시리즈</text>
  <text x="700" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">최신, 다국어 최적화</text>

  <!-- Performance note -->
  <rect x="60" y="358" width="760" height="96" rx="8" fill="#0f1a0f" stroke="#1e3a1e"/>
  <text x="440" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">tiktoken 성능 특징</text>
  <text x="440" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">Rust 구현으로 Python BPE 대비 5~10배 빠른 인코딩 속도</text>
  <text x="440" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">병렬 처리 지원: encode_batch()로 멀티스레드 인코딩</text>
  <text x="440" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">스트리밍 방지: special_tokens 화이트리스트로 인젝션 방어</text>
</svg>
