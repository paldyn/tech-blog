<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ReplicaSet 조정 루프 (Reconcile Loop)</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">현재 Pod 수와 replicas 값의 차이를 지속적으로 조정</text>

  <!-- Observe -->
  <rect x="60" y="100" width="180" height="80" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="150" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">① 관찰</text>
  <text x="150" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">현재 매칭 Pod 수 확인</text>
  <text x="150" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">(selector로 조회)</text>

  <line x1="250" y1="140" x2="310" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Compare -->
  <rect x="320" y="100" width="180" height="80" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="2"/>
  <text x="410" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">② 비교</text>
  <text x="410" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">현재 수 vs spec.replicas</text>
  <text x="410" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">차이 계산</text>

  <line x1="510" y1="120" x2="570" y2="100" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrg)"/>
  <line x1="510" y1="160" x2="570" y2="180" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrr)"/>

  <!-- Create -->
  <rect x="580" y="70" width="180" height="70" rx="8" fill="#0d1f12" stroke="#166534" stroke-width="2"/>
  <text x="670" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">현재 &lt; 목표</text>
  <text x="670" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">부족한 만큼 Pod 생성</text>
  <text x="670" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">(병렬 생성 가능)</text>

  <!-- Delete -->
  <rect x="580" y="170" width="180" height="70" rx="8" fill="#1a0000" stroke="#7f1d1d" stroke-width="2"/>
  <text x="670" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">현재 &gt; 목표</text>
  <text x="670" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">초과분 Pod 삭제</text>
  <text x="670" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af" text-anchor="middle">(임의 선택)</text>

  <!-- Equal -->
  <line x1="510" y1="140" x2="800" y2="140" stroke="#374151" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="740" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#6b7280">현재=목표: 대기</text>

  <!-- Selector warning -->
  <rect x="60" y="280" width="760" height="120" rx="8" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
  <text x="440" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">selector.matchLabels — Pod 수 계산의 기준</text>
  <text x="80" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af">&#x2022; RS는 ownerRef가 자신을 가리키는 Pod만 관리하지 않음 — matchLabels를 기준으로 Pod를 계산</text>
  <text x="80" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af">&#x2022; 수동으로 만든 Pod에 같은 레이블을 붙이면 RS가 해당 Pod를 자기 Pod로 간주해 버릴 수 있음</text>
  <text x="80" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">&#x26A0; 이 경우 RS가 과잉 Pod로 판단해 임의 Pod 삭제 가능 — 레이블 충돌 주의</text>
</svg>
