<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">System-Versioned Table 구조</text>

  <!-- Table header -->
  <text x="60" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">employees (System-Versioned)</text>

  <!-- Table box -->
  <rect x="60" y="105" width="760" height="52" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <!-- Header cells -->
  <text x="110" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">id</text>
  <text x="230" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">name</text>
  <text x="370" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#7ec8e3" text-anchor="middle">salary</text>
  <text x="530" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">row_start (숨김)</text>
  <text x="720" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">row_end (숨김)</text>
  <line x1="60" y1="135" x2="820" y2="135" stroke="#3a4a6e" stroke-width="1"/>
  <text x="110" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">데이터 컬럼</text>
  <text x="370" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">사용자 정의</text>
  <text x="530" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">행 생성 시각 (TIMESTAMP(6))</text>
  <text x="720" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">행 삭제 시각 (MAXVALUE = 현재)</text>

  <!-- Current data section -->
  <text x="60" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">현재 데이터 (row_end = MAXVALUE)</text>
  <rect x="60" y="202" width="760" height="44" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="110" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">1</text>
  <text x="230" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">Alice</text>
  <text x="370" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">85,000</text>
  <text x="530" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">2026-01-10 09:00:00</text>
  <text x="720" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">9999-12-31 (MAXVALUE)</text>
  <line x1="60" y1="228" x2="820" y2="228" stroke="#3a4a6e" stroke-width="1"/>
  <text x="110" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">2</text>
  <text x="230" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">Bob</text>
  <text x="370" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">72,000</text>
  <text x="530" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">2026-03-01 14:30:00</text>
  <text x="720" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">9999-12-31 (MAXVALUE)</text>

  <!-- History section -->
  <text x="60" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">히스토리 데이터 (row_end ≠ MAXVALUE)</text>
  <rect x="60" y="289" width="760" height="44" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="110" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">1</text>
  <text x="230" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Alice</text>
  <text x="370" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">75,000</text>
  <text x="530" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">2025-06-01 00:00:00</text>
  <text x="720" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">2026-01-10 09:00:00</text>
  <line x1="60" y1="315" x2="820" y2="315" stroke="#3a4a6e" stroke-width="1"/>
  <text x="110" y="327" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">1</text>
  <text x="230" y="327" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Alice</text>
  <text x="370" y="327" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">60,000</text>
  <text x="530" y="327" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">2024-01-01 00:00:00</text>
  <text x="720" y="327" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">2025-06-01 00:00:00</text>

  <!-- Code block -->
  <rect x="60" y="360" width="760" height="112" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- System-Versioned Table 생성</text>
  <text xml:space="preserve" x="80" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">CREATE TABLE</tspan><tspan fill="#ffffff"> employees (</tspan></text>
  <text xml:space="preserve" x="80" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">    id      </tspan><tspan fill="#7ec8e3" font-weight="600">INT PRIMARY KEY</tspan><tspan fill="#ffffff">,</tspan></text>
  <text xml:space="preserve" x="80" y="438" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">    name    </tspan><tspan fill="#7ec8e3" font-weight="600">VARCHAR</tspan><tspan fill="#ffffff">(100),  salary </tspan><tspan fill="#7ec8e3" font-weight="600">DECIMAL</tspan><tspan fill="#ffffff">(10,2)</tspan></text>
  <text xml:space="preserve" x="80" y="456" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">) </tspan><tspan fill="#7ec8e3" font-weight="600">WITH SYSTEM VERSIONING</tspan><tspan fill="#ffffff">;</tspan></text>
</svg>
