<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">트랜잭션 커스텀 HTTP 헤더 추가 방법</text>

  <!-- Left: Flow diagram -->
  <rect x="60" y="72" width="320" height="340" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="220" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">헤더 추가 방법</text>

  <!-- Method 1 -->
  <rect x="78" y="112" width="284" height="60" fill="#0d1520" rx="5" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="220" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">① setHttpHeader()</text>
  <text x="220" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">트랜잭션별 헤더 직접 설정</text>
  <text x="220" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">application.setHttpHeader()</text>

  <!-- Method 2 -->
  <rect x="78" y="186" width="284" height="60" fill="#0d1520" rx="5" stroke="#55c555" stroke-width="1.5"/>
  <text x="220" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">② addServiceHeader()</text>
  <text x="220" y="224" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">TypeDefinition 서비스별 헤더</text>
  <text x="220" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">특정 서비스에 고정 헤더 추가</text>

  <!-- Method 3 -->
  <rect x="78" y="260" width="284" height="60" fill="#0d1520" rx="5" stroke="#7777cc" stroke-width="1.5"/>
  <text x="220" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">③ environment.xml 설정</text>
  <text x="220" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">전역 고정 헤더</text>
  <text x="220" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">모든 트랜잭션에 자동 포함</text>

  <!-- Use cases -->
  <rect x="78" y="334" width="284" height="60" fill="#0d1520" rx="5" stroke="#1e2433"/>
  <text x="220" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8c55a">주요 활용 사례</text>
  <text x="220" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Token 인증 / CSRF 방어</text>
  <text x="220" y="388" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">언어 설정 / 세션 식별자 전달</text>

  <!-- Right: Code block -->
  <rect x="400" y="72" width="420" height="340" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="610" y="94" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">코드 예제</text>
  <line x1="400" y1="102" x2="820" y2="102" stroke="#1e2433" stroke-width="1"/>

  <text x="416" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0" xml:space="preserve">// ① Application 레벨 헤더 설정</text>
  <text x="416" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0" xml:space="preserve">//    (모든 트랜잭션에 적용)</text>
  <text x="416" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">nexacro.getApplication()</text>
  <text x="416" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">  .setHttpHeader(</text>
  <text x="416" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">    "X-CSRF-Token"</text>
  <text x="535" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">,</text>
  <text x="416" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">    this.sCsrfToken);</text>

  <line x1="400" y1="230" x2="820" y2="230" stroke="#1e2433" stroke-width="1" stroke-dasharray="4,4"/>

  <text x="416" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0" xml:space="preserve">// ② JWT 토큰 Bearer 헤더</text>
  <text x="416" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">function</text>
  <text x="473" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve"> gfn_setAuthHeader(token) {</text>
  <text x="416" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">    nexacro.getApplication()</text>
  <text x="416" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">      .setHttpHeader(</text>
  <text x="416" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">        "Authorization"</text>
  <text x="523" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">,</text>
  <text x="416" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">        "Bearer "</text>
  <text x="476" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve"> + token);</text>
  <text x="416" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">}</text>
  <text x="416" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0" xml:space="preserve">// 로그인 성공 후 호출</text>
  <text x="416" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">gfn_setAuthHeader(sLoginToken);</text>

  <!-- Bottom note -->
  <text x="440" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">setHttpHeader()는 누적 추가 — 제거 시 null 값으로 다시 setHttpHeader() 호출</text>
</svg>
