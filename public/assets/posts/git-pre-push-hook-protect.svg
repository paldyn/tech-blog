<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">pre-push 훅 활용: 브랜치 보호 &amp; 테스트 게이트</text>

  <!-- Left: Branch protection -->
  <rect x="60" y="72" width="360" height="220" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">main 직접 push 차단</text>

  <rect x="80" y="110" width="320" height="52" rx="6" fill="#1f1010" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="133" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">차단 대상</text>
  <text x="240" y="151" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">git push origin main (직접 커밋)</text>

  <rect x="80" y="174" width="320" height="52" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="240" y="197" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">허용 대상</text>
  <text x="240" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">feat/* 브랜치 push → PR 경유</text>

  <text x="240" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">로컬 정책 (--no-verify로 우회 가능)</text>
  <text x="240" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">서버 정책은 GitHub 브랜치 보호 규칙으로 강제</text>

  <!-- Right: Test gate -->
  <rect x="460" y="72" width="360" height="220" rx="8" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">push 전 테스트 게이트</text>

  <rect x="480" y="110" width="320" height="52" rx="6" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="133" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">전략 1: 관련 테스트만 실행</text>
  <text x="640" y="151" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">변경 파일과 관련된 테스트만 빠르게</text>

  <rect x="480" y="174" width="320" height="52" rx="6" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="640" y="197" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">전략 2: CI에 위임</text>
  <text x="640" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">pre-push는 가볍게, 전체 테스트는 CI</text>

  <text x="640" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">pre-push는 필수 실행 - CI 실패 전 조기 발견</text>
  <text x="640" y="276" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">느릴수록 개발자가 --no-verify로 우회</text>

  <!-- Code block -->
  <rect x="60" y="310" width="760" height="34" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">if</tspan> [ <tspan fill="#ce9178">"$remote_ref"</tspan> = <tspan fill="#ce9178">"refs/heads/main"</tspan> ]; <tspan fill="#7ec8e3" font-weight="600">then</tspan>  <tspan fill="#7ec8e3" font-weight="600">echo</tspan> <tspan fill="#ce9178">"main push blocked"</tspan>; <tspan fill="#7ec8e3" font-weight="600">exit</tspan> <tspan fill="#b5cea8">1</tspan>; <tspan fill="#7ec8e3" font-weight="600">fi</tspan></text>
</svg>
