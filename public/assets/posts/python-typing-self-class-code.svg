<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300">
  <rect width="880" height="300" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Self로 정확한 반환 타입 표현</text>

  <rect x="60" y="64" width="760" height="216" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text x="80" y="92" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ffffff"> typing </tspan><tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> Self</tspan><tspan fill="#9aa4b8">     # Python 3.11+</tspan></text>

  <text x="80" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">class</tspan><tspan fill="#ffffff"> Query:</tspan></text>

  <text x="80" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    def</tspan><tspan fill="#ffffff"> filter(self, **kw) -&gt; Self:</tspan></text>

  <text x="80" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">        self._where.update(kw)</tspan></text>

  <text x="80" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">        return</tspan><tspan fill="#ffffff"> self</tspan><tspan fill="#9aa4b8">          # Self 반환</tspan></text>

  <text x="80" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">class</tspan><tspan fill="#ffffff"> UserQuery(Query): ...</tspan></text>

  <text x="80" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">q = UserQuery().filter(age=</tspan><tspan fill="#b5cea8">30</tspan><tspan fill="#ffffff">)</tspan><tspan fill="#9aa4b8"># q: UserQuery</tspan></text>
</svg>
