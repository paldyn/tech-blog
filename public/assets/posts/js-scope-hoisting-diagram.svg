<svg width="880" height="480" viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="20" font-weight="700" fill="#e8e8e8">스코프 체인 — 변수 탐색 방향</text>
  <text x="440" y="68" text-anchor="middle" font-size="13" fill="#555">안쪽에서 바깥쪽으로 순서대로 찾는다</text>

  <!-- Global Scope box -->
  <rect x="40" y="90" width="800" height="360" rx="10" fill="none" stroke="#333" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="60" y="114" font-size="12" fill="#555">전역 스코프 (Global Scope)</text>
  <rect x="56" y="122" width="200" height="34" rx="6" fill="#1a1a1a"/>
  <text x="156" y="143" text-anchor="middle" font-size="13" fill="#888">const globalVar = "🌐"</text>

  <!-- Function Scope box -->
  <rect x="100" y="170" width="680" height="250" rx="10" fill="none" stroke="#2a3a2a" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="120" y="194" font-size="12" fill="#446644">함수 스코프 (outer)</text>
  <rect x="116" y="202" width="210" height="34" rx="6" fill="#141a14"/>
  <text x="221" y="223" text-anchor="middle" font-size="13" fill="#6a9a6a">let outerVar = "🏠"</text>

  <!-- Block Scope box -->
  <rect x="160" y="248" width="560" height="154" rx="10" fill="none" stroke="#1a2a3a" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="180" y="272" font-size="12" fill="#446688">블록 스코프 (inner block)</text>
  <rect x="176" y="280" width="210" height="34" rx="6" fill="#10141a"/>
  <text x="281" y="301" text-anchor="middle" font-size="13" fill="#5588aa">let innerVar = "📦"</text>

  <!-- Arrow showing scope lookup -->
  <text x="440" y="340" text-anchor="middle" font-size="14" fill="#e8e8e8" font-weight="600">innerVar 찾기 → 발견 ✓</text>
  <text x="440" y="362" text-anchor="middle" font-size="13" fill="#888">outerVar 찾기 → 현재 블록 없음 → 외부 스코프로</text>
  <text x="440" y="382" text-anchor="middle" font-size="13" fill="#888">globalVar 찾기 → 외부 → 외부 → 전역에서 발견</text>

  <!-- Direction arrow -->
  <path d="M 760 330 L 760 180" stroke="#444" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="776" y="260" font-size="11" fill="#555" transform="rotate(90,776,260)">탐색 방향 →</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#444"/>
    </marker>
  </defs>

  <text x="440" y="465" text-anchor="middle" font-size="11" fill="#444">안쪽 스코프에서 찾고, 없으면 바깥쪽으로 — 전역까지 탐색 후 없으면 ReferenceError</text>
</svg>
