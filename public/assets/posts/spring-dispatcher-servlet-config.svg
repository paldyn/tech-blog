<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Spring MVC Java Config 핵심 설정</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">@EnableWebMvc 와 WebMvcConfigurer 기반 설정</text>

  <!-- left panel: WebMvcConfigurer -->
  <text x="64" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">WebMvcConfigurer 구현</text>
  <rect x="60" y="94" width="380" height="340" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="116" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">@Configuration</text>
  <text x="76" y="134" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">@EnableWebMvc</text>
  <text x="76" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">public class </text>
  <text x="172" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">WebConfig</text>
  <text x="76" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    implements </tspan><tspan fill="#ffffff">WebMvcConfigurer {</tspan></text>

  <text x="76" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">  // 정적 자원 매핑</text>
  <text x="76" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">  @Override</text>
  <text x="76" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">  public void </tspan><tspan fill="#ffffff">addResourceHandlers(</tspan></text>
  
  <text x="76" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      ResourceHandlerRegistry reg) {</text>
  <text x="76" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    reg.addResourceHandler(</text>
  <text x="76" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">        "/static/**"</text>
  <text x="76" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      ).addResourceLocations(</text>
  <text x="76" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">        "classpath:/static/"</text>
  <text x="76" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">      );</text>
  <text x="76" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  }</text>
  <text x="76" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>

  <!-- right panel: DispatcherServlet 자동 감지 특수 빈 목록 -->
  <text x="454" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">DispatcherServlet 자동 감지 특수 빈</text>
  <rect x="450" y="94" width="370" height="340" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <!-- header row -->
  <rect x="454" y="98" width="362" height="22" rx="3" fill="#111827"/>
  <text x="466" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">빈 타입</text>
  <text x="640" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">역할</text>

  <line x1="454" y1="122" x2="816" y2="122" stroke="#3a4a6e" stroke-width="1"/>

  <text x="466" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">HandlerMapping</text>
  <text x="640" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">핸들러 탐색</text>

  <line x1="454" y1="148" x2="816" y2="148" stroke="#1a1a1a" stroke-width="1"/>

  <text x="466" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">HandlerAdapter</text>
  <text x="640" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">핸들러 실행</text>

  <line x1="454" y1="174" x2="816" y2="174" stroke="#1a1a1a" stroke-width="1"/>

  <text x="466" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">HandlerExceptionResolver</text>
  <text x="640" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">예외 처리</text>

  <line x1="454" y1="200" x2="816" y2="200" stroke="#1a1a1a" stroke-width="1"/>

  <text x="466" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">ViewResolver</text>
  <text x="640" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">뷰 이름 해석</text>

  <line x1="454" y1="226" x2="816" y2="226" stroke="#1a1a1a" stroke-width="1"/>

  <text x="466" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">LocaleResolver</text>
  <text x="640" y="242" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">국제화(i18n)</text>

  <line x1="454" y1="252" x2="816" y2="252" stroke="#1a1a1a" stroke-width="1"/>

  <text x="466" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">ThemeResolver</text>
  <text x="640" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">테마 결정</text>

  <line x1="454" y1="278" x2="816" y2="278" stroke="#1a1a1a" stroke-width="1"/>

  <text x="466" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">MultipartResolver</text>
  <text x="640" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">파일 업로드</text>

  <line x1="454" y1="304" x2="816" y2="304" stroke="#1a1a1a" stroke-width="1"/>

  <text x="466" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">FlashMapManager</text>
  <text x="640" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#9aa4b8">리다이렉트 데이터</text>

  <!-- Spring Boot 자동 설정 note -->
  <rect x="454" y="336" width="362" height="88" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="466" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#55c555">Spring Boot 자동 설정</text>
  <text x="466" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">DispatcherServletAutoConfiguration</text>
  <text x="466" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">  → DispatcherServlet 빈 자동 등록</text>
  <text x="466" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">WebMvcAutoConfiguration</text>
  <text x="466" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">  → 위 특수 빈들 기본값 자동 설정</text>
</svg>
