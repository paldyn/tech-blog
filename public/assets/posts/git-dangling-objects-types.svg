<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-dash" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Dangling Objects의 종류와 발생 원인</text>

  <!-- Dangling commit -->
  <rect x="60" y="70" width="240" height="140" rx="8" fill="#1a0e0e" stroke="#e05555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="180" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">dangling commit</text>
  <text x="180" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">어떤 ref도 가리키지 않는</text>
  <text x="180" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">커밋 객체</text>
  <text x="180" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">발생: 브랜치 삭제, reset,</text>
  <text x="180" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">rebase, squash merge</text>
  <text x="180" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">복구 가능 ✓</text>

  <!-- Dangling blob -->
  <rect x="330" y="70" width="240" height="140" rx="8" fill="#1a0e0e" stroke="#e8c84a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="450" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8c84a" text-anchor="middle">dangling blob</text>
  <text x="450" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">어떤 tree도 참조하지 않는</text>
  <text x="450" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">파일 객체</text>
  <text x="450" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8c84a" text-anchor="middle">발생: git add 후 커밋 없이</text>
  <text x="450" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8c84a" text-anchor="middle">reset/checkout, 이전 내용</text>
  <text x="450" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">내용 추출 가능 ✓</text>

  <!-- Dangling tree -->
  <rect x="600" y="70" width="240" height="140" rx="8" fill="#1a0e0e" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="720" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">dangling tree</text>
  <text x="720" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">커밋에서 참조되지 않는</text>
  <text x="720" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">디렉터리 객체</text>
  <text x="720" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">발생: rebase, amend로</text>
  <text x="720" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">교체된 이전 트리</text>
  <text x="720" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">내용 조회 가능 ✓</text>

  <!-- Lifecycle timeline -->
  <text x="60" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">생명주기: 생성 → 보존 → 삭제</text>

  <rect x="60" y="256" width="760" height="70" rx="8" fill="#0e0e0e" stroke="#3a3a3a" stroke-width="1"/>

  <!-- Timeline boxes -->
  <rect x="76" y="268" width="140" height="42" rx="6" fill="#14140e" stroke="#e8c84a" stroke-width="1"/>
  <text x="146" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8c84a" text-anchor="middle">dangling 생성</text>
  <text x="146" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">reset/rebase/삭제</text>

  <line x1="216" y1="289" x2="246" y2="289" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="256" y="268" width="140" height="42" rx="6" fill="#0e1620" stroke="#7ec8e3" stroke-width="1"/>
  <text x="326" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">reflog 보존</text>
  <text x="326" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">기본 30일</text>

  <line x1="396" y1="289" x2="426" y2="289" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="436" y="268" width="140" height="42" rx="6" fill="#1a100a" stroke="#ce9178" stroke-width="1"/>
  <text x="506" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178" text-anchor="middle">reflog 만료</text>
  <text x="506" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">unreachable 확정</text>

  <line x1="576" y1="289" x2="606" y2="289" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="616" y="268" width="140" height="42" rx="6" fill="#1a0e0e" stroke="#e05555" stroke-width="1"/>
  <text x="686" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">gc prune 삭제</text>
  <text x="686" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">영구 제거</text>

  <!-- Identification commands -->
  <rect x="60" y="345" width="760" height="110" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># dangling commit 목록</text>
  <text x="76" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git fsck --unreachable 2>/dev/null | grep commit</text>
  <text x="76" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># dangling blob 내용 확인</text>
  <text x="76" y="434" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">git cat-file -p &lt;blob-sha&gt;</text>
</svg>
