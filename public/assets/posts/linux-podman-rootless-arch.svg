<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Podman 루트리스 아키텍처</text>

  <!-- Docker (with daemon) - left column -->
  <rect x="60" y="80" width="360" height="200" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="106" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555">Docker (데몬 방식)</text>

  <rect x="80" y="116" width="140" height="44" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="150" y="138" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">docker CLI</text>
  <text x="150" y="154" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">사용자 권한</text>

  <rect x="240" y="116" width="160" height="44" rx="6" fill="#3a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="320" y="138" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">dockerd</text>
  <text x="320" y="154" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">root 권한 데몬</text>

  <line x1="220" y1="138" x2="240" y2="138"
        stroke="#e05555" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="80" y="176" width="320" height="44" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="198" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">containerd + runc</text>
  <text x="240" y="214" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">root 권한으로 실행</text>

  <line x1="320" y1="160" x2="240" y2="176"
        stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4"/>

  <text x="240" y="254" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">⚠ 데몬이 root → 데몬 탈취 시 호스트 장악 가능</text>

  <!-- Podman (rootless) - right column -->
  <rect x="460" y="80" width="360" height="200" rx="8" fill="#002010" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="106" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">Podman (루트리스)</text>

  <rect x="480" y="116" width="140" height="44" rx="6" fill="#002a10" stroke="#55c555" stroke-width="1"/>
  <text x="550" y="138" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">podman CLI</text>
  <text x="550" y="154" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">사용자 권한</text>

  <rect x="640" y="116" width="160" height="44" rx="6" fill="#003820" stroke="#55c555" stroke-width="1"/>
  <text x="720" y="138" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">conmon + runc</text>
  <text x="720" y="154" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">사용자 권한</text>

  <line x1="620" y1="138" x2="640" y2="138"
        stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <rect x="480" y="176" width="320" height="44" rx="6" fill="#002010" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="198" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">User Namespace (UID 매핑)</text>
  <text x="640" y="214" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">호스트 UID 1000 → 컨테이너 UID 0</text>

  <text x="640" y="254" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓ 데몬 없음 — 프로세스가 root 권한 불필요</text>

  <!-- Storage comparison -->
  <rect x="60" y="310" width="760" height="150" rx="8" fill="#111118" stroke="#444" stroke-width="1"/>
  <text x="440" y="336" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">루트리스 스토리지 — ~/.local/share/containers</text>

  <rect x="80" y="350" width="220" height="90" rx="6" fill="#0a0a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="190" y="374" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">이미지 스토리지</text>
  <text x="190" y="394" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">~/.local/share/containers/</text>
  <text x="190" y="412" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">storage/overlay/</text>
  <text x="190" y="430" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">fuse-overlayfs 사용</text>

  <rect x="330" y="350" width="220" height="90" rx="6" fill="#0a0a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="374" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">네트워크</text>
  <text x="440" y="394" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">slirp4netns</text>
  <text x="440" y="412" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">사용자 공간 네트워크 스택</text>
  <text x="440" y="430" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">포트 &lt;1024 → rootlessport</text>

  <rect x="580" y="350" width="220" height="90" rx="6" fill="#0a0a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="690" y="374" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">설정 경로</text>
  <text x="690" y="394" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">~/.config/containers/</text>
  <text x="690" y="412" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">registries.conf</text>
  <text x="690" y="430" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">storage.conf</text>
</svg>
