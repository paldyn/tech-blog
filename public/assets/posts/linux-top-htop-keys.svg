<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">top / htop 인터랙티브 단축키</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">실행 중 사용할 수 있는 핵심 키</text>

  <!-- top shortcuts -->
  <rect x="50" y="86" width="370" height="358" rx="8" fill="#111827" stroke="#1e2d45" stroke-width="1.5"/>
  <text x="235" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">top 단축키</text>
  <line x1="66" y1="120" x2="404" y2="120" stroke="#1e2d45" stroke-width="1"/>

  <!-- top key table -->
  <rect x="66" y="128" width="338" height="28" rx="3" fill="#1e2d45"/>
  <text x="96" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">키</text>
  <text x="200" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">동작</text>

  <!-- Keys -->
  <rect x="66" y="158" width="338" height="26" rx="0" fill="#0d1929"/>
  <rect x="66" y="158" width="54" height="26" rx="3" fill="#0f1f2f"/>
  <text x="93" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" text-anchor="middle">q</text>
  <text x="200" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">종료</text>

  <rect x="66" y="186" width="338" height="26" rx="0" fill="#0a0a0a"/>
  <rect x="66" y="186" width="54" height="26" rx="3" fill="#0f1f2f"/>
  <text x="93" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" text-anchor="middle">P</text>
  <text x="200" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">CPU 사용률로 정렬</text>

  <rect x="66" y="214" width="338" height="26" rx="0" fill="#0d1929"/>
  <rect x="66" y="214" width="54" height="26" rx="3" fill="#0f1f2f"/>
  <text x="93" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" text-anchor="middle">M</text>
  <text x="200" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">메모리 사용률로 정렬</text>

  <rect x="66" y="242" width="338" height="26" rx="0" fill="#0a0a0a"/>
  <rect x="66" y="242" width="54" height="26" rx="3" fill="#0f1f2f"/>
  <text x="93" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" text-anchor="middle">T</text>
  <text x="200" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">누적 CPU 시간으로 정렬</text>

  <rect x="66" y="270" width="338" height="26" rx="0" fill="#0d1929"/>
  <rect x="66" y="270" width="54" height="26" rx="3" fill="#0f1f2f"/>
  <text x="93" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" text-anchor="middle">k</text>
  <text x="200" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">프로세스 kill (PID 입력)</text>

  <rect x="66" y="298" width="338" height="26" rx="0" fill="#0a0a0a"/>
  <rect x="66" y="298" width="54" height="26" rx="3" fill="#0f1f2f"/>
  <text x="93" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" text-anchor="middle">r</text>
  <text x="200" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">renice — 우선순위 변경</text>

  <rect x="66" y="326" width="338" height="26" rx="0" fill="#0d1929"/>
  <rect x="66" y="326" width="54" height="26" rx="3" fill="#0f1f2f"/>
  <text x="93" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" text-anchor="middle">u</text>
  <text x="200" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">특정 사용자 프로세스만 필터</text>

  <rect x="66" y="354" width="338" height="26" rx="0" fill="#0a0a0a"/>
  <rect x="66" y="354" width="54" height="26" rx="3" fill="#0f1f2f"/>
  <text x="93" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" text-anchor="middle">1</text>
  <text x="200" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">CPU 코어별 사용률 분리 표시</text>

  <rect x="66" y="382" width="338" height="26" rx="0" fill="#0d1929"/>
  <rect x="66" y="382" width="54" height="26" rx="3" fill="#0f1f2f"/>
  <text x="93" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" text-anchor="middle">W</text>
  <text x="200" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">현재 설정을 ~/.toprc에 저장</text>

  <rect x="66" y="410" width="338" height="26" rx="0" fill="#0a0a0a"/>
  <rect x="66" y="410" width="54" height="26" rx="3" fill="#0f1f2f"/>
  <text x="93" y="428" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" text-anchor="middle">d</text>
  <text x="200" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">갱신 간격(초) 변경</text>

  <!-- htop advantages -->
  <rect x="460" y="86" width="370" height="358" rx="8" fill="#111827" stroke="#1e2d45" stroke-width="1.5"/>
  <text x="645" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">htop 추가 기능</text>
  <line x1="476" y1="120" x2="814" y2="120" stroke="#1e2d45" stroke-width="1"/>

  <!-- htop advantage items -->
  <rect x="476" y="130" width="338" height="42" rx="6" fill="#0f2010" stroke="#55c555" stroke-width="1"/>
  <text x="492" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">컬러 바 게이지</text>
  <text x="492" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">CPU·메모리를 색상 바로 시각화</text>

  <rect x="476" y="180" width="338" height="42" rx="6" fill="#101020" stroke="#7777cc" stroke-width="1"/>
  <text x="492" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">마우스 지원</text>
  <text x="492" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">클릭으로 컬럼 정렬·프로세스 선택</text>

  <rect x="476" y="230" width="338" height="42" rx="6" fill="#0d1422" stroke="#7ec8e3" stroke-width="1"/>
  <text x="492" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">트리 보기 (F5)</text>
  <text x="492" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">pstree처럼 부모-자식 계층 표시</text>

  <rect x="476" y="280" width="338" height="42" rx="6" fill="#1a1000" stroke="#ce9178" stroke-width="1"/>
  <text x="492" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">검색 (F3//) </text>
  <text x="492" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">이름으로 프로세스 즉시 검색</text>

  <rect x="476" y="330" width="338" height="42" rx="6" fill="#0f2010" stroke="#b5cea8" stroke-width="1"/>
  <text x="492" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#b5cea8">멀티 선택 (Space)</text>
  <text x="492" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">여러 프로세스 동시 kill/renice</text>

  <rect x="476" y="380" width="338" height="56" rx="6" fill="#111827" stroke="#1e2d45" stroke-width="1"/>
  <text x="492" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">설치: sudo apt install htop</text>
  <text x="492" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">설정: ~/.config/htop/htoprc</text>
  <text x="492" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">F2 → Setup 에서 표시 컬럼 커스텀</text>
</svg>
