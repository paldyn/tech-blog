<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">jq · yq 실전 패턴</text>

  <!-- Left: jq advanced examples -->
  <rect x="60" y="66" width="360" height="320" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">jq 고급 패턴</text>

  <text x="80" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 배열 길이</text>
  <text x="80" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">jq</tspan> <tspan fill="#ce9178">'.items | length'</tspan> response.json</text>

  <text x="80" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># null 제외 필터</text>
  <text x="80" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">jq</tspan> <tspan fill="#ce9178">'[.[] | select(.email != null)]'</tspan> .</text>

  <text x="80" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 문자열 보간 + join</text>
  <text x="80" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">jq</tspan> -r <tspan fill="#ce9178">'.[] | "\(.name): \(.score)"'</tspan> .</text>

  <text x="80" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 그룹 합산 (group_by + add)</text>
  <text x="80" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">jq</tspan> <tspan fill="#ce9178">'group_by(.dept)[] | {dept:.[0].dept, total: map(.salary)|add}'</tspan></text>

  <text x="80" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 변수 사용</text>
  <text x="80" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">jq</tspan> --arg name <tspan fill="#ce9178">"Alice"</tspan> <tspan fill="#ce9178">'.[] | select(.name == $name)'</tspan></text>

  <text x="80" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">-r : raw string / -c : compact / -e : 빈값 종료코드 1</text>

  <!-- Right: yq k8s examples -->
  <rect x="460" y="66" width="360" height="320" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="480" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178">yq Kubernetes 설정 패턴</text>

  <text x="480" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 이미지 태그 조회</text>
  <text x="480" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">yq</tspan> <tspan fill="#ce9178">'.spec.containers[0].image'</tspan> deploy.yaml</text>

  <text x="480" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 이미지 태그 변경 (인플레이스)</text>
  <text x="480" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">yq</tspan> -i <tspan fill="#ce9178">'.spec.containers[0].image = "app:v2"'</tspan> deploy.yaml</text>

  <text x="480" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 여러 YAML 문서 병합</text>
  <text x="480" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">yq</tspan> eval-all <tspan fill="#ce9178">'. *+ load("patch.yaml")'</tspan> base.yaml</text>

  <text x="480" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># YAML → JSON 변환</text>
  <text x="480" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">yq</tspan> -o json <tspan fill="#ce9178">'.'</tspan> config.yaml</text>

  <text x="480" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 멀티독 YAML 각 문서 처리</text>
  <text x="480" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">yq</tspan> e <tspan fill="#ce9178">'select(.kind == "Deployment")'</tspan> all.yaml</text>

  <text x="480" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">-i : in-place 수정 / -o : 출력 형식 지정</text>
</svg>
