<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">개념 매핑: Compose → Kubernetes</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">익숙한 Compose 개념을 K8s 리소스로 대응시키기</text>

  <!-- Column headers -->
  <text x="200" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">Docker Compose</text>
  <text x="680" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc">Kubernetes</text>

  <!-- Mapping rows -->
  <!-- service → Pod/Deployment -->
  <rect x="60" y="112" width="280" height="48" rx="6" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="200" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">service</text>
  <text x="200" y="151" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">컨테이너 정의 단위</text>

  <line x1="340" y1="136" x2="440" y2="136" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <rect x="440" y="112" width="380" height="48" rx="6" fill="#0f0f2e" stroke="#7777cc" stroke-width="1"/>
  <text x="630" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">Pod + Deployment</text>
  <text x="630" y="151" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">컨테이너 그룹 + 선언적 관리</text>

  <!-- image → image (same) -->
  <rect x="60" y="175" width="280" height="48" rx="6" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="200" y="197" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">image:</text>
  <text x="200" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">컨테이너 이미지</text>

  <line x1="340" y1="199" x2="440" y2="199" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <rect x="440" y="175" width="380" height="48" rx="6" fill="#0f0f2e" stroke="#7777cc" stroke-width="1"/>
  <text x="630" y="197" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">spec.containers[].image</text>
  <text x="630" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">동일한 이미지 참조</text>

  <!-- ports → Service -->
  <rect x="60" y="238" width="280" height="48" rx="6" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="200" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">ports:</text>
  <text x="200" y="277" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">포트 바인딩</text>

  <line x1="340" y1="262" x2="440" y2="262" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <rect x="440" y="238" width="380" height="48" rx="6" fill="#0f0f2e" stroke="#7777cc" stroke-width="1"/>
  <text x="630" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">Service (ClusterIP/NodePort)</text>
  <text x="630" y="277" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">네트워크 추상화 레이어</text>

  <!-- volumes → PVC -->
  <rect x="60" y="301" width="280" height="48" rx="6" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="200" y="323" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">volumes:</text>
  <text x="200" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">데이터 영속성</text>

  <line x1="340" y1="325" x2="440" y2="325" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <rect x="440" y="301" width="380" height="48" rx="6" fill="#0f0f2e" stroke="#7777cc" stroke-width="1"/>
  <text x="630" y="323" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">PersistentVolumeClaim (PVC)</text>
  <text x="630" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">동적 스토리지 프로비저닝</text>

  <!-- environment → ConfigMap/Secret -->
  <rect x="60" y="364" width="280" height="48" rx="6" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="200" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">environment:</text>
  <text x="200" y="403" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">환경 변수 · 설정</text>

  <line x1="340" y1="388" x2="440" y2="388" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <rect x="440" y="364" width="380" height="48" rx="6" fill="#0f0f2e" stroke="#7777cc" stroke-width="1"/>
  <text x="630" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">ConfigMap + Secret</text>
  <text x="630" y="403" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">설정값과 민감 정보 분리</text>
</svg>
