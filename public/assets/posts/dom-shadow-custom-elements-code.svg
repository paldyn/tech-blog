<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Custom Element + Shadow DOM 구현</text>

  <rect x="60" y="64" width="760" height="352" rx="6" fill="#070b14" stroke="#1e2433"/>

  <text x="84" y="94" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">class</tspan><tspan fill="#e8e8e8"> MyCard </tspan><tspan fill="#7ec8e3">extends</tspan><tspan fill="#e8e8e8"> HTMLElement {</tspan></text>
  <text x="84" y="112" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">  </tspan><tspan fill="#7ec8e3">static</tspan><tspan fill="#e8e8e8"> observedAttributes = [</tspan><tspan fill="#ce9178">'title'</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#ce9178">'theme'</tspan><tspan fill="#e8e8e8">];</tspan></text>
  <text x="84" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">  constructor() {</tspan></text>
  <text x="84" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">    </tspan><tspan fill="#7ec8e3">super</tspan><tspan fill="#e8e8e8">();</tspan></text>
  <text x="84" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">    </tspan><tspan fill="#7ec8e3">this</tspan><tspan fill="#e8e8e8">._root = </tspan><tspan fill="#7ec8e3">this</tspan><tspan fill="#e8e8e8">.</tspan><tspan fill="#e8e8e8">attachShadow</tspan><tspan fill="#e8e8e8">({ mode: </tspan><tspan fill="#ce9178">'open'</tspan><tspan fill="#e8e8e8"> });</tspan></text>
  <text x="84" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">  }</tspan></text>
  <text x="84" y="202" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">  connectedCallback() {</tspan></text>
  <text x="84" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">    </tspan><tspan fill="#7ec8e3">this</tspan><tspan fill="#e8e8e8">._root.innerHTML = </tspan><tspan fill="#ce9178">`</tspan></text>
  <text x="84" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">      &lt;style&gt;:host { display:block; } &lt;/style&gt;</tspan></text>
  <text x="84" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">      &lt;h2&gt;</tspan><tspan fill="#e8e8e8">${</tspan><tspan fill="#7ec8e3">this</tspan><tspan fill="#e8e8e8">.getAttribute(</tspan><tspan fill="#ce9178">'title'</tspan><tspan fill="#e8e8e8">)}</tspan><tspan fill="#ce9178">&lt;/h2&gt;&lt;slot&gt;&lt;/slot&gt;</tspan><tspan fill="#e8e8e8">`</tspan><tspan fill="#e8e8e8">;</tspan></text>
  <text x="84" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">  }</tspan></text>
  <text x="84" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">  attributeChangedCallback(name, _, newVal) {</tspan></text>
  <text x="84" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">    </tspan><tspan fill="#7ec8e3">if</tspan><tspan fill="#e8e8e8"> (name === </tspan><tspan fill="#ce9178">'title'</tspan><tspan fill="#e8e8e8">) </tspan><tspan fill="#7ec8e3">this</tspan><tspan fill="#e8e8e8">._root.</tspan><tspan fill="#e8e8e8">querySelector</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'h2'</tspan><tspan fill="#e8e8e8">).textContent = newVal;</tspan></text>
  <text x="84" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">  }</tspan></text>
  <text x="84" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">}</tspan></text>

  <line x1="84" y1="360" x2="796" y2="360" stroke="#1e2433" stroke-width="1"/>

  <text x="84" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#e8e8e8">customElements.</tspan><tspan fill="#e8e8e8">define</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">'my-card'</tspan><tspan fill="#e8e8e8">, MyCard);</tspan></text>
  <text x="84" y="398" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">// HTML: &lt;my-card title="안녕"&gt;&lt;p&gt;내용&lt;/p&gt;&lt;/my-card&gt;</text>
</svg>
