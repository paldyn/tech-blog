<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Python 실행 방식 선택 가이드</text>

  <!-- Use case boxes -->
  <!-- REPL use cases -->
  <rect x="50" y="68" width="370" height="160" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="235" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">REPL이 적합한 상황</text>
  <text x="75" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">✓ 빠른 계산·검증 (1+1, len("abc"))</text>
  <text x="75" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">✓ API / 라이브러리 탐색</text>
  <text x="75" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">✓ 도움말 조회 (help(), dir())</text>
  <text x="75" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">✓ 학습·실험·디버깅</text>
  <text x="75" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">✓ 대화형 데이터 분석 (Jupyter)</text>

  <!-- Script use cases -->
  <rect x="460" y="68" width="370" height="160" rx="8" fill="#07111a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="645" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">스크립트가 적합한 상황</text>
  <text x="485" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">✓ 반복 실행이 필요한 로직</text>
  <text x="485" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">✓ 여러 함수·클래스 정의</text>
  <text x="485" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">✓ 다른 모듈로 임포트</text>
  <text x="485" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">✓ 자동화·배치 작업</text>
  <text x="485" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">✓ 프로젝트 코드 관리</text>

  <!-- Bottom: -c option and ipython -->
  <rect x="50" y="248" width="370" height="148" rx="8" fill="#111827" stroke="#1e2433" stroke-width="1"/>
  <text x="235" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">-c 옵션: 한 줄 실행</text>
  <rect x="66" y="280" width="338" height="100" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
  <text x="82" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">$ python3 -c </text>
  <text x="170" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">"print(1+1)"</text>
  <text x="82" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">2</text>
  <text x="82" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">$ python3 -c </text>
  <text x="170" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">"import sys; print(sys.version)"</text>
  <text x="82" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888"># 쉘 스크립트에서 Python 한줄 호출</text>

  <!-- Right bottom: ipython / jupyter -->
  <rect x="460" y="248" width="370" height="148" rx="8" fill="#111827" stroke="#1e2433" stroke-width="1"/>
  <text x="645" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">고급 REPL 도구</text>
  <rect x="476" y="280" width="338" height="100" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
  <text x="492" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">$ pip install ipython</text>
  <text x="492" y="318" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">$ ipython</text>
  <text x="492" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">In [1]: </text>
  <text x="560" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">import pandas</text>
  <text x="492" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888"># 자동완성·구문 강조·매직명령</text>
</svg>
