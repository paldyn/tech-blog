<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e0a030"/>
    </marker>
  </defs>
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">useActionState 데이터 흐름</text>

  <!-- Client Component box -->
  <rect x="60" y="78" width="380" height="300" rx="10" fill="#0f1a2e" stroke="#3a5a8e" stroke-width="1.5"/>
  <text x="250" y="102" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Client Component</text>

  <!-- useActionState call -->
  <rect x="80" y="116" width="340" height="60" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="90" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> [state, action, isPending] =</tspan>
  </text>
  <text x="90" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  useActionState(serverFn, null)</text>

  <!-- State display -->
  <rect x="80" y="192" width="160" height="86" rx="6" fill="#1a1a2e" stroke="#4a4a8e" stroke-width="1"/>
  <text x="160" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">state (반환값)</text>
  <text x="160" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">null (초기값)</text>
  <text x="160" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">{ success: true }</text>
  <text x="160" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">{ error: '오류 메시지' }</text>

  <!-- isPending display -->
  <rect x="260" y="192" width="160" height="86" rx="6" fill="#1a1a2e" stroke="#4a4a8e" stroke-width="1"/>
  <text x="340" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">isPending (boolean)</text>
  <text x="340" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">제출 진행 중이면 true</text>
  <text x="340" y="256" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">버튼 disabled 등에 활용</text>

  <!-- UI rendering -->
  <rect x="80" y="296" width="340" height="66" rx="6" fill="#0f1a0f" stroke="#2a4a2a" stroke-width="1"/>
  <text x="250" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">UI 렌더링</text>
  <text x="250" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">state.error → 오류 메시지 표시</text>
  <text x="250" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">state.success → 성공 피드백</text>

  <!-- Arrow: Client to Server -->
  <line x1="440" y1="200" x2="520" y2="200" stroke="#e0a030" stroke-width="2" marker-end="url(#arr-orange)"/>
  <text x="480" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e0a030">action 호출</text>
  <text x="480" y="208" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e0a030">(FormData)</text>

  <!-- Server Action box -->
  <rect x="520" y="140" width="300" height="200" rx="10" fill="#0f2e0f" stroke="#2a6e2a" stroke-width="1.5"/>
  <text x="670" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">Server Action</text>

  <rect x="540" y="178" width="260" height="140" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="556" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">async function</tspan><tspan fill="#ffffff"> serverFn(</tspan>
  </text>
  <text x="556" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  prevState: State,</text>
  <text x="556" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  formData: FormData</text>
  <text x="556" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">) {</text>
  <text x="556" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">  // 검증 / DB / 외부 API</text>
  <text x="556" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> { error: '...' }</tspan>
  </text>
  <text x="556" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">}</text>

  <!-- Arrow: Server to Client (return value) -->
  <path d="M 670 340 Q 670 390 440 390 Q 250 390 250 380" stroke="#55c555" stroke-width="2"
        stroke-dasharray="4,4" fill="none" marker-end="url(#arr)"/>
  <text x="460" y="384" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">반환값 → state 업데이트</text>

  <!-- Bottom label -->
  <text x="440" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">prevState: 이전 상태값 — 누적 오류 등 다중 단계 처리에 활용</text>
</svg>
