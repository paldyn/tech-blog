<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">DocumentFragment — 배치 삽입의 원리</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">메모리 내 가상 컨테이너로 리플로우 최소화</text>

  <!-- Left: Without Fragment -->
  <text x="100" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">❌ 개별 삽입 (리플로우 3회)</text>

  <!-- DOM tree box -->
  <rect x="40" y="128" width="120" height="40" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="100" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">Live DOM</text>

  <!-- Three arrows down -->
  <line x1="100" y1="168" x2="100" y2="188" stroke="#e05555" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="100,196 95,186 105,186" fill="#e05555"/>

  <rect x="60" y="198" width="80" height="32" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="100" y="219" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">append(li₁)</text>

  <line x1="100" y1="230" x2="100" y2="248" stroke="#e05555" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="100,256 95,246 105,246" fill="#e05555"/>

  <rect x="60" y="258" width="80" height="32" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="100" y="279" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">append(li₂)</text>

  <line x1="100" y1="290" x2="100" y2="308" stroke="#e05555" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="100,316 95,306 105,306" fill="#e05555"/>

  <rect x="60" y="318" width="80" height="32" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="100" y="339" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">append(li₃)</text>

  <!-- Reflow labels -->
  <text x="155" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">리플로우①</text>
  <text x="155" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">리플로우②</text>
  <text x="155" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">리플로우③</text>

  <!-- Divider -->
  <line x1="280" y1="100" x2="280" y2="460" stroke="#333" stroke-width="1"/>

  <!-- Right: With Fragment -->
  <text x="580" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">✅ Fragment 사용 (리플로우 1회)</text>

  <!-- Memory box (fragment) -->
  <rect x="460" y="128" width="240" height="110" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="580" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">DocumentFragment (메모리)</text>

  <!-- Items inside fragment -->
  <rect x="500" y="162" width="60" height="26" rx="5" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="530" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">li₁</text>

  <rect x="575" y="162" width="60" height="26" rx="5" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="605" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">li₂</text>

  <rect x="650" y="162" width="60" height="26" rx="5" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="680" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">li₃</text>

  <!-- Connector lines between items -->
  <line x1="560" y1="175" x2="575" y2="175" stroke="#55c555" stroke-width="1"/>
  <line x1="635" y1="175" x2="650" y2="175" stroke="#55c555" stroke-width="1"/>

  <!-- Arrow from fragment to DOM -->
  <line x1="580" y1="238" x2="580" y2="268" stroke="#55c555" stroke-width="2"/>
  <polygon points="580,278 573,266 587,266" fill="#55c555"/>

  <!-- One append label -->
  <text x="596" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">append(frag)</text>

  <!-- Live DOM box -->
  <rect x="500" y="280" width="160" height="40" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="580" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">Live DOM</text>

  <!-- Reflow label -->
  <text x="680" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">리플로우①만</text>

  <!-- Fragment self-empties note -->
  <rect x="460" y="340" width="240" height="42" rx="6" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="580" y="357" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">삽입 후 Fragment는 자동으로</text>
  <text x="580" y="373" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">비워짐 (자식 노드 이전됨)</text>

  <!-- Bottom comparison bar -->
  <rect x="40" y="420" width="800" height="56" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">Fragment는 실제 DOM 노드가 아니므로 parentNode = null, 화면에 렌더링되지 않음</text>
  <text x="440" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">document.createDocumentFragment()  |  new DocumentFragment()</text>
</svg>
