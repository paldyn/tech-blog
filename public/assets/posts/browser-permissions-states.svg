<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Permissions API 상태 전이</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">prompt → granted / denied</text>

  <!-- States -->
  <!-- prompt (center-left) -->
  <rect x="140" y="170" width="180" height="80" rx="10" fill="#1f1400" stroke="#e8b84b" stroke-width="2"/>
  <text x="230" y="205" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#e8b84b">prompt</text>
  <text x="230" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">아직 결정 안 함</text>

  <!-- granted (top-right) -->
  <rect x="560" y="100" width="180" height="80" rx="10" fill="#0d1f0d" stroke="#55c555" stroke-width="2"/>
  <text x="650" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#55c555">granted</text>
  <text x="650" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">사용자 허가</text>

  <!-- denied (bottom-right) -->
  <rect x="560" y="260" width="180" height="80" rx="10" fill="#1f0d0d" stroke="#e05555" stroke-width="2"/>
  <text x="650" y="295" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#e05555">denied</text>
  <text x="650" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">사용자 거부 (영구)</text>

  <!-- prompt → granted arrow -->
  <line x1="320" y1="195" x2="555" y2="145" stroke="#55c555" stroke-width="2"/>
  <polygon points="548,138 560,143 551,152" fill="#55c555"/>
  <text x="430" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">허가 클릭</text>

  <!-- prompt → denied arrow -->
  <line x1="320" y1="225" x2="555" y2="295" stroke="#e05555" stroke-width="2"/>
  <polygon points="548,289 560,296 550,304" fill="#e05555"/>
  <text x="428" y="283" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">거부 클릭</text>

  <!-- granted → denied (browser settings) -->
  <line x1="650" y1="180" x2="650" y2="257" stroke="#888" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="644,257 650,269 656,257" fill="#888"/>
  <text x="710" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">브라우저 설정</text>

  <!-- denied → granted (browser settings) -->
  <line x1="620" y1="260" x2="620" y2="183" stroke="#888" stroke-width="1.5" stroke-dasharray="6,3"/>
  <polygon points="614,183 620,171 626,183" fill="#888"/>

  <!-- Initial arrow -->
  <rect x="60" y="195" width="80" height="30" rx="5" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="100" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">초기 상태</text>
  <line x1="140" y1="210" x2="135" y2="210" stroke="#444" stroke-width="1.5"/>
  <polygon points="135,204 123,210 135,216" fill="#444"/>

  <!-- Change event box -->
  <rect x="140" y="340" width="620" height="60" rx="8" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="155" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// 권한 변화 감지</text>
  <text x="155" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">status.<text fill="#7ec8e3">addEventListener</text>(<text fill="#ce9178">'change'</text>, () => console.log(status.state));</text>

  <!-- Bottom note -->
  <text x="440" y="424" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">denied 상태는 JS로 되돌릴 수 없음 — 브라우저 사이트 설정에서만 변경 가능</text>
</svg>
