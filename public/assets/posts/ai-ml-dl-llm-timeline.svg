<svg xmlns="http://www.w3.org/2000/svg" width="880" height="260" viewBox="0 0 880 260">
  <defs>
    <style>
      text { font-family: 'Wanted Sans Variable', 'Wanted Sans', -apple-system, sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="880" height="260" fill="#0a0a0a" rx="12"/>

  <!-- Era bands (bottom half) -->
  <!-- AI era: full width -->
  <rect x="60" y="160" width="760" height="20" rx="2" fill="#1a1a1a"/>
  <text x="440" y="173" font-size="9" fill="#444" text-anchor="middle" letter-spacing="0.2em">AI</text>

  <!-- ML era: 1990s~ -->
  <rect x="200" y="184" width="620" height="20" rx="2" fill="#1f1f1f"/>
  <text x="510" y="197" font-size="9" fill="#555" text-anchor="middle" letter-spacing="0.2em">ML</text>

  <!-- DL era: 2012~ -->
  <rect x="420" y="208" width="400" height="20" rx="2" fill="#252525"/>
  <text x="620" y="221" font-size="9" fill="#666" text-anchor="middle" letter-spacing="0.2em">DL</text>

  <!-- LLM era: 2017~ -->
  <rect x="580" y="232" width="240" height="20" rx="2" fill="#2a2a2a"/>
  <text x="700" y="245" font-size="9" fill="#777" text-anchor="middle" letter-spacing="0.2em">LLM</text>

  <!-- Main timeline line -->
  <line x1="60" y1="130" x2="820" y2="130" stroke="#2a2a2a" stroke-width="1.5"/>

  <!-- Arrow -->
  <polygon points="820,125 832,130 820,135" fill="#2a2a2a"/>

  <!-- Points -->
  <!-- 1950s -->
  <circle cx="60" cy="130" r="5" fill="#0a0a0a" stroke="#555" stroke-width="1.5"/>
  <text x="60" y="118" font-size="11" fill="#666" text-anchor="middle" font-weight="600">1950s</text>
  <text x="60" y="100" font-size="10" fill="#555" text-anchor="middle">AI 탄생</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="60" y="86" font-size="9" fill="#3a3a3a" text-anchor="middle">(규칙 기반)</text>

  <!-- 1980s -->
  <circle cx="200" cy="130" r="5" fill="#0a0a0a" stroke="#555" stroke-width="1.5"/>
  <text x="200" y="118" font-size="11" fill="#666" text-anchor="middle" font-weight="600">1980s</text>
  <text x="200" y="100" font-size="10" fill="#555" text-anchor="middle">신경망 이론</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="200" y="86" font-size="9" fill="#3a3a3a" text-anchor="middle">(미실용)</text>

  <!-- 1997 -->
  <circle cx="320" cy="130" r="5" fill="#0a0a0a" stroke="#555" stroke-width="1.5"/>
  <text x="320" y="118" font-size="11" fill="#666" text-anchor="middle" font-weight="600">1997</text>
  <text x="320" y="100" font-size="10" fill="#555" text-anchor="middle">딥블루</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="320" y="86" font-size="9" fill="#3a3a3a" text-anchor="middle">(체스 우승)</text>

  <!-- 2012 -->
  <circle cx="420" cy="130" r="6" fill="#222" stroke="#777" stroke-width="2"/>
  <text x="420" y="118" font-size="11" fill="#888" text-anchor="middle" font-weight="600">2012</text>
  <text x="420" y="100" font-size="10" fill="#666" text-anchor="middle">AlexNet</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="420" y="86" font-size="9" fill="#444" text-anchor="middle">(DL 실용화)</text>

  <!-- 2017 -->
  <circle cx="580" cy="130" r="6" fill="#222" stroke="#888" stroke-width="2"/>
  <text x="580" y="118" font-size="11" fill="#999" text-anchor="middle" font-weight="600">2017</text>
  <text x="580" y="100" font-size="10" fill="#777" text-anchor="middle">Transformer</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="580" y="86" font-size="9" fill="#555" text-anchor="middle">(LLM의 기반)</text>

  <!-- 2022 -->
  <circle cx="740" cy="130" r="7" fill="#1a1a1a" stroke="#aaa" stroke-width="2"/>
  <text x="740" y="118" font-size="11" fill="#bbb" text-anchor="middle" font-weight="600">2022</text>
  <text x="740" y="100" font-size="10" fill="#999" text-anchor="middle">ChatGPT</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="740" y="86" font-size="9" fill="#666" text-anchor="middle">(LLM 대중화)</text>
</svg>
