<svg xmlns="http://www.w3.org/2000/svg" width="880" height="462" viewBox="0 0 880 462">
  <rect width="880" height="462" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">REST 6가지 제약조건</text>
  <text x="440" y="72" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">Roy Fielding(2000) — 모든 조건을 충족해야 진정한 RESTful API</text>

  <!-- Row 1 left: Client-Server -->
  <rect x="60" y="98" width="370" height="86" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="126"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3">① Client-Server</text>
  <text x="80" y="146"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aab8cc">클라이언트와 서버 역할을 엄격히 분리</text>
  <text x="80" y="166"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">UI와 데이터 저장소가 독립적으로 발전</text>

  <!-- Row 1 right: Stateless -->
  <rect x="450" y="98" width="370" height="86" rx="8" fill="#1a0f2e" stroke="#6e3a9e" stroke-width="1.5"/>
  <text x="470" y="126"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#b07ec8">② Stateless</text>
  <text x="470" y="146"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#b8aac8">서버는 클라이언트 세션 상태를 보관하지 않음</text>
  <text x="470" y="166"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">모든 요청에 처리에 필요한 정보 전부 포함</text>

  <!-- Row 2 left: Cacheable -->
  <rect x="60" y="202" width="370" height="86" rx="8" fill="#0f2e1a" stroke="#3a6e4a" stroke-width="1.5"/>
  <text x="80" y="230"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec89e">③ Cacheable</text>
  <text x="80" y="250"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aac8b8">응답에 캐시 가능 여부를 명시해야 함</text>
  <text x="80" y="270"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">Cache-Control 헤더로 불필요한 요청 제거</text>

  <!-- Row 2 right: Uniform Interface -->
  <rect x="450" y="202" width="370" height="86" rx="8" fill="#2e1a0f" stroke="#9e6e3a" stroke-width="1.5"/>
  <text x="470" y="230"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#c8a07e">④ Uniform Interface</text>
  <text x="470" y="250"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#c8b8aa">일관된 인터페이스로 구성 요소 결합도 낮춤</text>
  <text x="470" y="270"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">URI 식별 · HTTP 메서드 · HATEOAS</text>

  <!-- Row 3 left: Layered System -->
  <rect x="60" y="306" width="370" height="86" rx="8" fill="#2e2e0f" stroke="#9e9e3a" stroke-width="1.5"/>
  <text x="80" y="334"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#c8c87e">⑤ Layered System</text>
  <text x="80" y="354"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#c8c8aa">계층 구조로 확장성과 보안 강화</text>
  <text x="80" y="374"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">클라이언트는 중간 계층(프록시·CDN) 여부 모름</text>

  <!-- Row 3 right: Code on Demand -->
  <rect x="450" y="306" width="370" height="86" rx="8" fill="#0f2e2e" stroke="#3a9e9e" stroke-width="1.5"/>
  <text x="470" y="334"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8c8">⑥ Code on Demand (선택)</text>
  <text x="470" y="354"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aac8c8">서버가 실행 가능 코드 전송 허용</text>
  <text x="470" y="374"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">JavaScript 등 클라이언트 기능 동적 확장</text>
</svg>
