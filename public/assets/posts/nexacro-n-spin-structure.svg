<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" style="background:#0a0a0a;">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">Spin — 컴포넌트 구조 및 속성</text>

  <!-- Left: Spin anatomy -->
  <rect x="50" y="68" width="370" height="354" rx="8" fill="#0d1220" stroke="#2a3a4a" stroke-width="1.5"/>
  <text x="235" y="96" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="15" font-weight="600" fill="#7ec8e3">Spin 컴포넌트 구조</text>

  <!-- Spin visual mock -->
  <!-- Main container -->
  <rect x="100" y="116" width="270" height="50" rx="6" fill="#1a2a40" stroke="#3050a0" stroke-width="1.5"/>
  <!-- Value display area -->
  <rect x="102" y="118" width="196" height="46" rx="5" fill="#111a30"/>
  <text x="200" y="149" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="20" font-weight="600" fill="#e8e8e8">42</text>
  <!-- Up button -->
  <rect x="302" y="118" width="66" height="22" rx="0" fill="#1e3a60" stroke="#3050a0"/>
  <text x="335" y="134" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" fill="#7ec8e3">▲</text>
  <!-- Down button -->
  <rect x="302" y="142" width="66" height="22" rx="0" fill="#1e3a60" stroke="#3050a0"/>
  <text x="335" y="158" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" fill="#7ec8e3">▼</text>

  <!-- Annotations -->
  <!-- value label (above up/down buttons area) -->
  <text x="200" y="108" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">value 표시 영역</text>
  <text x="335" y="108" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">상승/하강 버튼</text>

  <!-- Properties box -->
  <rect x="76" y="188" width="318" height="210" rx="6" fill="#101828" stroke="#1e2a40"/>
  <text x="88" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">속성</text>
  <text x="180" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">기본값 / 설명</text>

  <rect x="80" y="216" width="310" height="1" fill="#1e2a40"/>

  <text x="88" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#7ec8e3">value</text>
  <text x="180" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e8e8e8">현재 값 (숫자)</text>

  <text x="88" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#7ec8e3">min</text>
  <text x="180" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e8e8e8">최솟값 (기본 0)</text>

  <text x="88" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#7ec8e3">max</text>
  <text x="180" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e8e8e8">최댓값 (기본 100)</text>

  <text x="88" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#7ec8e3">step</text>
  <text x="180" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e8e8e8">증감 단위 (기본 1)</text>

  <text x="88" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#7ec8e3">spintype</text>
  <text x="180" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e8e8e8">normal / loop / roll</text>

  <text x="88" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#55c555">onchanged</text>
  <text x="180" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e8e8e8">값 변경 시 이벤트</text>

  <text x="88" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#7ec8e3">edittype</text>
  <text x="180" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e8e8e8">readonly / normal</text>

  <text x="88" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#7ec8e3">numformat</text>
  <text x="180" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e8e8e8">숫자 포맷 문자열</text>

  <!-- Right: spintype explanation -->
  <rect x="460" y="68" width="370" height="354" rx="8" fill="#0d1220" stroke="#2a3a4a" stroke-width="1.5"/>
  <text x="645" y="96" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="15" font-weight="600" fill="#7ec8e3">spintype 동작 방식</text>

  <!-- normal -->
  <rect x="476" y="108" width="338" height="84" rx="6" fill="#0a1830" stroke="#1e3a60"/>
  <text x="488" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" font-weight="700" fill="#7ec8e3">normal</text>
  <text x="488" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e8e8e8">min/max 경계에서 정지</text>
  <text x="488" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">max에서 ▲ 클릭 → 변화 없음</text>

  <!-- loop -->
  <rect x="476" y="202" width="338" height="84" rx="6" fill="#0a2010" stroke="#1e5020"/>
  <text x="488" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" font-weight="700" fill="#55c555">loop</text>
  <text x="488" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e8e8e8">max 초과 시 min으로 순환</text>
  <text x="488" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">max에서 ▲ 클릭 → min 값</text>

  <!-- roll -->
  <rect x="476" y="296" width="338" height="84" rx="6" fill="#1a1a08" stroke="#4a4a10"/>
  <text x="488" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" font-weight="700" fill="#b5cea8">roll</text>
  <text x="488" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e8e8e8">max 초과 시 값 고정 유지</text>
  <text x="488" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">경계에서 계속 유지 가능</text>

  <!-- Footer -->
</svg>
