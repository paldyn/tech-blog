<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="340" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">then 체이닝과 타입의 흐름</text>
  <text x="60" y="78" font-size="13" fill="#888">콜백 반환값이 다음 then의 입력 타입이 된다 (중첩 Promise는 평탄화)</text>

  <defs>
    <marker id="arrP" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="60" y="120" width="220" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="170" y="150" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Promise&lt;User&gt;</text>
  <text x="170" y="184" font-size="13" fill="#ffffff" text-anchor="middle">then((u) =&gt; u.id)</text>
  <text x="170" y="208" font-size="13" fill="#9aa4b8" text-anchor="middle">u: User</text>

  <rect x="340" y="120" width="200" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="150" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Promise&lt;number&gt;</text>
  <text x="440" y="184" font-size="13" fill="#ffffff" text-anchor="middle">then((id) =&gt;</text>
  <text x="440" y="206" font-size="13" fill="#ffffff" text-anchor="middle">fetchPosts(id))</text>

  <rect x="600" y="120" width="220" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="710" y="150" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">Promise&lt;Post[]&gt;</text>
  <text x="710" y="184" font-size="13" fill="#ffffff" text-anchor="middle">Promise 반환 →</text>
  <text x="710" y="206" font-size="13" fill="#9aa4b8" text-anchor="middle">평탄화 (중첩 X)</text>

  <line x1="280" y1="175" x2="338" y2="175" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrP)"/>
  <line x1="540" y1="175" x2="598" y2="175" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrP)"/>

  <text x="60" y="290" font-size="13" fill="#ffffff">then 콜백이 Promise를 반환해도 Promise&lt;Promise&lt;T&gt;&gt;가 아니라 Promise&lt;T&gt;로 자동 평탄화된다.</text>
</svg>
