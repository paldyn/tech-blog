<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">다중 해상도·DPI 지원 전략</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">FHD / QHD / 4K · DPI Scale Factor</text>

  <!-- Resolution boxes -->
  <!-- FHD -->
  <rect x="60" y="90" width="220" height="220" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="170" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">FHD (1920×1080)</text>
  <text x="170" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">DPI Scale 100%</text>
  <rect x="76" y="150" width="188" height="120" rx="4" fill="#0a1020" stroke="#2a4a6a" stroke-width="1"/>
  <text x="170" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">Form: 1920×1080</text>
  <text x="170" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">기본 설계 해상도</text>
  <text x="170" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">pixelper="1.0"</text>
  <text x="170" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">추가 설정 불필요</text>
  <text x="170" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">기준 해상도</text>
  <text x="170" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">100% 기준</text>

  <!-- QHD -->
  <rect x="330" y="90" width="220" height="220" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">QHD (2560×1440)</text>
  <text x="440" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">DPI Scale 125~150%</text>
  <rect x="346" y="150" width="188" height="120" rx="4" fill="#0a200a" stroke="#2a6a2a" stroke-width="1"/>
  <text x="440" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">실제 논리픽셀: ~1706×960</text>
  <text x="440" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(150% 기준)</text>
  <text x="440" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8c84a" text-anchor="middle">pixelper="1.5"</text>
  <text x="440" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">또는 autosize="true"</text>
  <text x="440" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8c84a" text-anchor="middle">스케일 조정 필요</text>
  <text x="440" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">폰트·아이콘 흐릿해짐 주의</text>

  <!-- 4K -->
  <rect x="600" y="90" width="220" height="220" rx="8" fill="#1f0d0d" stroke="#e05555" stroke-width="2"/>
  <text x="710" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555" text-anchor="middle">4K (3840×2160)</text>
  <text x="710" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">DPI Scale 200%</text>
  <rect x="616" y="150" width="188" height="120" rx="4" fill="#200a0a" stroke="#6a2a2a" stroke-width="1"/>
  <text x="710" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">논리픽셀: 1920×1080</text>
  <text x="710" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(200% 기준)</text>
  <text x="710" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">pixelper="2.0"</text>
  <text x="710" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">또는 SVG 리소스 사용</text>
  <text x="710" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">고해상도 리소스 필요</text>
  <text x="710" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">@2x 이미지 준비</text>

  <!-- Environment.xml note -->
  <rect x="60" y="336" width="760" height="114" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8c84a" text-anchor="middle">Environment.xml — 해상도 설정</text>
  <rect x="76" y="368" width="728" height="70" rx="4" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="388" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">&lt;Nexacro</text><text x="162" y="388" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> pixelper=<tspan fill="#ce9178">"1.5"</tspan> autosize=<tspan fill="#ce9178">"true"</tspan> autosizetype=<tspan fill="#ce9178">"ratio"</tspan>/&gt;</text>
  <text x="92" y="406" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">&lt;!-- pixelper: DPI 스케일 비율 | autosize: 폼 자동 크기 조정 --&gt;</text>
  <text x="92" y="424" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">&lt;!-- autosizetype: "ratio"=비율유지 / "fill"=화면채움 --&gt;</text>

  <!-- Footer -->
  <text x="440" y="482" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN · Nexacro N 완전 정복 시리즈</text>
</svg>
