<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <style>text { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }</style>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Python 2 vs Python 3</text>
  <text x="440" y="68" text-anchor="middle" font-size="15" font-weight="600" fill="#888">주요 차이점 비교</text>

  <!-- Header -->
  <rect x="60" y="84" width="760" height="36" rx="6" fill="#1a1a2e"/>
  <text x="200" y="107" text-anchor="middle" font-size="13" font-weight="700" fill="#888">기능</text>
  <text x="490" y="107" text-anchor="middle" font-size="13" font-weight="700" fill="#e05555">Python 2</text>
  <text x="730" y="107" text-anchor="middle" font-size="13" font-weight="700" fill="#55c555">Python 3</text>
  <line x1="340" y1="84" x2="340" y2="120" stroke="#333" stroke-width="1"/>
  <line x1="620" y1="84" x2="620" y2="120" stroke="#333" stroke-width="1"/>

  <!-- Row 1: print -->
  <rect x="60" y="120" width="760" height="54" rx="0" fill="#0f1418" stroke="#1e2433" stroke-width="0.5"/>
  <text x="200" y="143" text-anchor="middle" font-size="12" font-weight="600" fill="#e8e8e8">print</text>
  <text x="200" y="161" text-anchor="middle" font-size="11" fill="#666">출력 방식</text>
  <text x="490" y="148" text-anchor="middle" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e05555">print "hello"</text>
  <text x="490" y="163" text-anchor="middle" font-size="10" fill="#666">문(statement)</text>
  <text x="730" y="148" text-anchor="middle" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#55c555">print("hello")</text>
  <text x="730" y="163" text-anchor="middle" font-size="10" fill="#666">함수(function)</text>
  <line x1="340" y1="120" x2="340" y2="174" stroke="#333" stroke-width="1"/>
  <line x1="620" y1="120" x2="620" y2="174" stroke="#333" stroke-width="1"/>

  <!-- Row 2: 정수 나누기 -->
  <rect x="60" y="174" width="760" height="54" rx="0" fill="#111" stroke="#1e2433" stroke-width="0.5"/>
  <text x="200" y="197" text-anchor="middle" font-size="12" font-weight="600" fill="#e8e8e8">정수 나누기</text>
  <text x="200" y="215" text-anchor="middle" font-size="11" fill="#666">division</text>
  <text x="490" y="202" text-anchor="middle" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e05555">5 / 2  →  2</text>
  <text x="490" y="217" text-anchor="middle" font-size="10" fill="#666">floor division 기본</text>
  <text x="730" y="202" text-anchor="middle" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#55c555">5 / 2  →  2.5</text>
  <text x="730" y="217" text-anchor="middle" font-size="10" fill="#666">float 반환</text>
  <line x1="340" y1="174" x2="340" y2="228" stroke="#333" stroke-width="1"/>
  <line x1="620" y1="174" x2="620" y2="228" stroke="#333" stroke-width="1"/>

  <!-- Row 3: 문자열 -->
  <rect x="60" y="228" width="760" height="54" rx="0" fill="#0f1418" stroke="#1e2433" stroke-width="0.5"/>
  <text x="200" y="251" text-anchor="middle" font-size="12" font-weight="600" fill="#e8e8e8">문자열 기본</text>
  <text x="200" y="269" text-anchor="middle" font-size="11" fill="#666">str type</text>
  <text x="490" y="256" text-anchor="middle" font-size="12" fill="#e05555">bytes (ASCII)</text>
  <text x="490" y="271" text-anchor="middle" font-size="10" fill="#666">u"..." prefix 필요</text>
  <text x="730" y="256" text-anchor="middle" font-size="12" fill="#55c555">Unicode (UTF-8)</text>
  <text x="730" y="271" text-anchor="middle" font-size="10" fill="#666">기본이 유니코드</text>
  <line x1="340" y1="228" x2="340" y2="282" stroke="#333" stroke-width="1"/>
  <line x1="620" y1="228" x2="620" y2="282" stroke="#333" stroke-width="1"/>

  <!-- Row 4: range -->
  <rect x="60" y="282" width="760" height="54" rx="0" fill="#111" stroke="#1e2433" stroke-width="0.5"/>
  <text x="200" y="305" text-anchor="middle" font-size="12" font-weight="600" fill="#e8e8e8">range()</text>
  <text x="200" y="323" text-anchor="middle" font-size="11" fill="#666">범위 생성</text>
  <text x="490" y="310" text-anchor="middle" font-size="12" fill="#e05555">list 반환 (메모리 즉시)</text>
  <text x="490" y="325" text-anchor="middle" font-family="'JetBrains Mono','Menlo',monospace" font-size="11" fill="#666">xrange() = 지연 평가</text>
  <text x="730" y="310" text-anchor="middle" font-size="12" fill="#55c555">iterator 반환</text>
  <text x="730" y="325" text-anchor="middle" font-size="10" fill="#666">메모리 효율적</text>
  <line x1="340" y1="282" x2="340" y2="336" stroke="#333" stroke-width="1"/>
  <line x1="620" y1="282" x2="620" y2="336" stroke="#333" stroke-width="1"/>

  <!-- Row 5: input -->
  <rect x="60" y="336" width="760" height="54" rx="0" fill="#0f1418" stroke="#1e2433" stroke-width="0.5"/>
  <text x="200" y="359" text-anchor="middle" font-size="12" font-weight="600" fill="#e8e8e8">사용자 입력</text>
  <text x="200" y="377" text-anchor="middle" font-size="11" fill="#666">input function</text>
  <text x="490" y="364" text-anchor="middle" font-family="'JetBrains Mono','Menlo',monospace" font-size="11" fill="#e05555">raw_input() / input()</text>
  <text x="490" y="379" text-anchor="middle" font-size="10" fill="#666">두 함수가 존재</text>
  <text x="730" y="364" text-anchor="middle" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#55c555">input()</text>
  <text x="730" y="379" text-anchor="middle" font-size="10" fill="#666">항상 str 반환</text>
  <line x1="340" y1="336" x2="340" y2="390" stroke="#333" stroke-width="1"/>
  <line x1="620" y1="336" x2="620" y2="390" stroke="#333" stroke-width="1"/>

  <!-- Footer note -->
  <rect x="60" y="406" width="760" height="54" rx="8" fill="#0f1820" stroke="#333"/>
  <text x="440" y="428" text-anchor="middle" font-size="12" fill="#888">Python 2는 2020년 1월 1일부로 공식 지원이 종료되었다 (EOL)</text>
  <text x="440" y="448" text-anchor="middle" font-size="12" fill="#888">모든 새 프로젝트는 Python 3를 사용해야 한다</text>
</svg>
