<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr-sb" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Suspense 중첩과 병렬 로딩</text>

  <!-- Nested Suspense diagram -->
  <text x="240" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">중첩 Suspense</text>

  <!-- Outer Suspense -->
  <rect x="60" y="92" width="360" height="240" rx="8" fill="none" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="90" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">Suspense fallback="페이지 로딩..."</text>

  <!-- Inner Suspense -->
  <rect x="82" y="126" width="320" height="190" rx="6" fill="none" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="108" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc">Suspense fallback="섹션 로딩..."</text>

  <rect x="98" y="156" width="140" height="50" rx="6" fill="#1a2030" stroke="#7ec8e3" stroke-width="1"/>
  <text x="168" y="177" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Header</text>
  <text x="168" y="195" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">✓ 완료</text>

  <rect x="250" y="156" width="140" height="50" rx="6" fill="#2a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="320" y="177" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">Widget</text>
  <text x="320" y="195" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">로딩 중...</text>

  <rect x="98" y="222" width="288" height="80" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="242" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">가장 가까운 Suspense 경계가</text>
  <text x="242" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">fallback="섹션 로딩..."</text>
  <text x="242" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Header는 이미 완료 → 숨겨지지 않음</text>

  <!-- Parallel loading diagram -->
  <text x="640" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">독립 Suspense로 병렬 로딩</text>

  <rect x="460" y="92" width="360" height="240" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> Dashboard() {</tspan>
  </text>
  <text x="476" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  return</tspan>
    <tspan fill="#ffffff"> (</tspan>
  </text>
  <text x="476" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">    &lt;</tspan>
    <tspan fill="#55c555">div</tspan>
    <tspan fill="#ffffff">&gt;</tspan>
  </text>
  <text x="476" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">      &lt;</tspan>
    <tspan fill="#55c555">Suspense</tspan>
    <tspan fill="#ffffff"> fallback={&lt;</tspan>
    <tspan fill="#55c555">S</tspan>
    <tspan fill="#ffffff">/&gt;}&gt;</tspan>
  </text>
  <text x="476" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">        &lt;</tspan>
    <tspan fill="#55c555">ProfileSection</tspan>
    <tspan fill="#ffffff">/&gt;</tspan>
  </text>
  <text x="476" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">      &lt;/</tspan>
    <tspan fill="#55c555">Suspense</tspan>
    <tspan fill="#ffffff">&gt;</tspan>
  </text>
  <text x="476" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">      &lt;</tspan>
    <tspan fill="#55c555">Suspense</tspan>
    <tspan fill="#ffffff"> fallback={&lt;</tspan>
    <tspan fill="#55c555">S</tspan>
    <tspan fill="#ffffff">/&gt;}&gt;</tspan>
  </text>
  <text x="476" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">        &lt;</tspan>
    <tspan fill="#55c555">ActivityFeed</tspan>
    <tspan fill="#ffffff">/&gt;</tspan>
  </text>
  <text x="476" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">      &lt;/</tspan>
    <tspan fill="#55c555">Suspense</tspan>
    <tspan fill="#ffffff">&gt;</tspan>
  </text>
  <text x="476" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">    &lt;/div&gt;</tspan>
  </text>
  <text x="476" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">)</text>
  <text x="476" y="328" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">}</text>

  <!-- Note for parallel -->
  <rect x="460" y="342" width="360" height="40" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">두 데이터 요청이 병렬로 시작</text>
  <text x="640" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">각 섹션이 독립적으로 준비되는 대로 표시</text>

  <!-- Bottom note -->
  <text x="440" y="426" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Suspense를 하나로 묶으면 모두 준비될 때까지 기다림 — 독립 배치로 워터폴 방지</text>
  <text x="440" y="446" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">ErrorBoundary + Suspense 조합: 에러/로딩 모두 부모에서 선언적으로 처리</text>
</svg>
