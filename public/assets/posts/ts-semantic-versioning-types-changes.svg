<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">타입 변경과 SemVer</text>
  <text x="60" y="76" font-size="14" fill="#888">타입 변경도 사용자 코드를 깨뜨리면 메이저다</text>

  <!-- breaking (major) -->
  <rect x="60" y="100" width="380" height="290" fill="#101418" rx="10" stroke="#e05555" stroke-width="1.5"/>
  <text x="84" y="134" font-size="16" font-weight="600" fill="#e05555">메이저 (호환 깨짐)</text>
  <text x="84" y="170" font-size="13" fill="#888">• 함수 매개변수 타입 좁힘</text>
  <text x="84" y="200" font-size="13" fill="#888">• 반환 타입 넓힘 (T → T | null)</text>
  <text x="84" y="230" font-size="13" fill="#888">• 필수 필드 추가</text>
  <text x="84" y="260" font-size="13" fill="#888">• 공개 타입·export 제거/개명</text>
  <text x="84" y="290" font-size="13" fill="#888">• 유니온 멤버 제거</text>
  <text x="84" y="320" font-size="13" fill="#888">• 오버로드 시그니처 삭제</text>
  <text x="84" y="362" font-size="13" fill="#9aa4b8">→ 기존 사용자 코드가 컴파일 실패</text>

  <!-- non-breaking (minor/patch) -->
  <rect x="460" y="100" width="380" height="290" fill="#101418" rx="10" stroke="#55c555" stroke-width="1.5"/>
  <text x="484" y="134" font-size="16" font-weight="600" fill="#55c555">마이너 / 패치</text>
  <text x="484" y="170" font-size="13" fill="#888">• 매개변수 타입 넓힘</text>
  <text x="484" y="200" font-size="13" fill="#888">• 반환 타입 좁힘</text>
  <text x="484" y="230" font-size="13" fill="#888">• 선택 필드 추가 (?:)</text>
  <text x="484" y="260" font-size="13" fill="#888">• 새 export 추가</text>
  <text x="484" y="290" font-size="13" fill="#888">• 유니온 멤버 추가 (대개)</text>
  <text x="484" y="320" font-size="13" fill="#888">• 오버로드 시그니처 추가</text>
  <text x="484" y="362" font-size="13" fill="#9aa4b8">→ 기존 코드는 그대로 통과</text>
</svg>
