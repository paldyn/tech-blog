<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Python 클래스 구조</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">class 키워드, 속성, 메서드</text>

  <!-- Class box -->
  <rect x="60" y="95" width="760" height="60" rx="8" fill="#111827" stroke="#1e2433" stroke-width="1.5"/>
  <text x="90" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">class</text>
  <text x="140" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e8e8e8">Dog</text>
  <text x="170" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888">:</text>
  <text x="300" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">← 클래스 선언. 첫 글자 대문자(PascalCase) 관례</text>
  <text x="90" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">클래스 = 사용자 정의 타입. 데이터(속성)와 동작(메서드)을 하나로 묶는 설계도</text>

  <!-- Three columns -->
  <!-- Column 1: Class attributes -->
  <rect x="60" y="175" width="230" height="180" rx="8" fill="#0d1117" stroke="#1e2433" stroke-width="1.5"/>
  <rect x="60" y="175" width="230" height="32" rx="8" fill="#1a2332"/>
  <text x="175" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">클래스 속성</text>
  <text x="80" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">모든 인스턴스가 공유</text>
  <rect x="74" y="234" width="202" height="40" rx="4" fill="#070b14" stroke="#1e2433"/>
  <text x="86" y="252" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">species</text>
  <text x="140" y="252" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> = </text>
  <text x="162" y="252" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#ce9178" xml:space="preserve">"Canis"</text>
  <text x="86" y="270" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># 클래스 변수</text>
  <text x="80" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Dog.species 또는</text>
  <text x="80" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">인스턴스.species 로 접근</text>
  <text x="80" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">변경하면 클래스 단위 공유</text>
  <text x="80" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">공유 상수/카운터 용도</text>

  <!-- Column 2: __init__ -->
  <rect x="325" y="175" width="230" height="180" rx="8" fill="#0d1117" stroke="#1e2433" stroke-width="1.5"/>
  <rect x="325" y="175" width="230" height="32" rx="8" fill="#1a2332"/>
  <text x="440" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">__init__ (초기화)</text>
  <text x="345" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">인스턴스 생성 시 자동 호출</text>
  <rect x="339" y="234" width="202" height="58" rx="4" fill="#070b14" stroke="#1e2433"/>
  <text x="351" y="252" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">def </text>
  <text x="375" y="252" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">__init__(self, name):</text>
  <text x="351" y="270" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    self.name = name</text>
  <text x="351" y="288" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">    # 인스턴스 속성</text>
  <text x="345" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">self → 현재 인스턴스 참조</text>
  <text x="345" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">name → 인스턴스별 고유 데이터</text>
  <text x="345" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">객체마다 독립 보관</text>

  <!-- Column 3: method -->
  <rect x="590" y="175" width="230" height="180" rx="8" fill="#0d1117" stroke="#1e2433" stroke-width="1.5"/>
  <rect x="590" y="175" width="230" height="32" rx="8" fill="#1a2332"/>
  <text x="705" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">인스턴스 메서드</text>
  <text x="610" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">인스턴스에서 호출하는 함수</text>
  <rect x="604" y="234" width="202" height="58" rx="4" fill="#070b14" stroke="#1e2433"/>
  <text x="616" y="252" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">def </text>
  <text x="640" y="252" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">bark(self):</text>
  <text x="616" y="270" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">    return </text>
  <text x="672" y="270" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#ce9178" xml:space="preserve">f"Woof!"</text>
  <text x="616" y="288" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># 동작 정의</text>
  <text x="610" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">dog.bark() 형태로 호출</text>
  <text x="610" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">self는 파이썬이 자동 전달</text>
  <text x="610" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">데이터와 동작을 캡슐화</text>

  <!-- Instantiation flow -->
  <rect x="60" y="380" width="760" height="70" rx="8" fill="#0d1117" stroke="#1e2433" stroke-width="1.5"/>
  <text x="90" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">인스턴스 생성 흐름</text>
  <rect x="90" y="412" width="270" height="26" rx="4" fill="#070b14" stroke="#1e2433"/>
  <text x="102" y="429" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">dog = Dog(</text>
  <text x="166" y="429" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#ce9178" xml:space="preserve">"Rex"</text>
  <text x="196" y="429" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">)</text>
  <!-- Arrow -->
  <line x1="370" y1="425" x2="420" y2="425" stroke="#7777cc" stroke-width="2"/>
  <polygon points="420,420 432,425 420,430" fill="#7777cc"/>
  <text x="440" y="421" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Dog.__new__(Dog) → 메모리 할당</text>
  <text x="440" y="439" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">→ Dog.__init__(instance, "Rex") 호출</text>
</svg>
