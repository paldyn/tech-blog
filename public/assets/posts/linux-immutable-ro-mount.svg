<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="360" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">읽기 전용 마운트 · 불변 파일 관련 명령어</text>
  <text x="440" y="68" text-anchor="middle" font-size="14" fill="#888">chattr +i / ro 마운트 / 불변 확인</text>

  <!-- Left: immutable patterns -->
  <text x="60" y="98" font-size="14" font-weight="600" fill="#7ec8e3">중요 파일 불변 설정</text>
  <rect x="60" y="106" width="380" height="200" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="76" y="126" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># SSH 설정 잠금</text>
  <text x="76" y="144" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">chattr </text>
  <text x="116" y="144" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">+i /etc/ssh/sshd_config</text>
  <line x1="76" y1="156" x2="424" y2="156" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="174" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># sudoers 잠금</text>
  <text x="76" y="192" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">chattr </text>
  <text x="116" y="192" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">+i /etc/sudoers</text>
  <line x1="76" y1="204" x2="424" y2="204" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="222" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># 감사 로그 추가 전용</text>
  <text x="76" y="240" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">chattr </text>
  <text x="116" y="240" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">+a /var/log/audit/audit.log</text>
  <line x1="76" y1="252" x2="424" y2="252" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="270" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># sysctl.conf 잠금</text>
  <text x="76" y="288" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">chattr </text>
  <text x="116" y="288" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">+i /etc/sysctl.conf</text>

  <!-- Right: ro mount -->
  <text x="470" y="98" font-size="14" font-weight="600" fill="#55c555">읽기 전용 마운트</text>
  <rect x="470" y="106" width="380" height="200" rx="6" fill="#000000" stroke="#3a4a6e"/>

  <text x="486" y="126" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># 임시 ro 마운트 재마운트</text>
  <text x="486" y="144" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555" xml:space="preserve">mount </text>
  <text x="526" y="144" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">-o remount,ro /boot</text>
  <line x1="486" y1="156" x2="834" y2="156" stroke="#3a4a6e" stroke-width="1"/>

  <text x="486" y="174" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># fstab에 ro 옵션</text>
  <text x="486" y="192" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">/dev/sda1 /boot ext4</text>
  <text x="486" y="210" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e05555" xml:space="preserve">  ro</text>
  <text x="510" y="210" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">,noexec,nosuid  0 1</text>
  <line x1="486" y1="222" x2="834" y2="222" stroke="#3a4a6e" stroke-width="1"/>

  <text x="486" y="240" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve"># systemd-tmpfs ro</text>
  <text x="486" y="258" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8" xml:space="preserve">[Service]</text>
  <text x="486" y="276" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555" xml:space="preserve">ReadOnlyPaths=</text>
  <text x="596" y="276" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">/etc /usr</text>
  <text x="486" y="294" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555" xml:space="preserve">ProtectSystem=</text>
  <text x="596" y="294" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff" xml:space="preserve">strict</text>

  <!-- Footer tips -->
  <rect x="60" y="320" width="760" height="28" rx="6" fill="#141622"/>
  <text x="440" y="338" text-anchor="middle" font-size="12" fill="#888">패키지 업데이트 전 chattr -i 해제 필요 · CI/CD 파이프라인에 자동화 고려</text>
</svg>
