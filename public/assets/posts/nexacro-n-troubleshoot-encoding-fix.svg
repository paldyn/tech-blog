<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">인코딩 설정 체크리스트</text>

  <!-- Column headers -->
  <text x="160" y="75" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Nexacro / 클라이언트</text>
  <text x="440" y="75" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">서버 (Java)</text>
  <text x="720" y="75" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">DB (Oracle / MySQL)</text>

  <!-- Nexacro column -->
  <rect x="60" y="88" width="200" height="270" rx="6" fill="#0d1117" stroke="#7ec8e3" stroke-width="1"/>

  <rect x="72" y="100" width="176" height="56" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="88" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">TypeDefinition.xml</text>
  <text x="88" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">charset="utf-8"</text>

  <rect x="72" y="164" width="176" height="56" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="88" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">Application.xml</text>
  <text x="88" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">encoding="utf-8"</text>

  <rect x="72" y="228" width="176" height="56" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="88" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">HTML meta</text>
  <text x="88" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">charset=UTF-8</text>

  <text x="160" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">✓ 세 곳 모두 UTF-8</text>
  <text x="160" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">빌드 결과물 meta도 확인</text>

  <!-- Java column -->
  <rect x="340" y="88" width="200" height="270" rx="6" fill="#0d1117" stroke="#7777cc" stroke-width="1"/>

  <rect x="352" y="100" width="176" height="56" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="368" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">Filter.java</text>
  <text x="368" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">setCharacterEncoding</text>

  <rect x="352" y="164" width="176" height="56" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="368" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">server.xml (Tomcat)</text>
  <text x="368" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">URIEncoding="UTF-8"</text>

  <rect x="352" y="228" width="176" height="56" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="368" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">JDBC URL</text>
  <text x="368" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">?useUnicode=true</text>

  <text x="440" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">✓ 요청·응답 전부 UTF-8</text>
  <text x="440" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">GET 파라미터: URIEncoding 필수</text>

  <!-- DB column -->
  <rect x="620" y="88" width="200" height="270" rx="6" fill="#0d1117" stroke="#55c555" stroke-width="1"/>

  <rect x="632" y="100" width="176" height="56" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="648" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">Oracle</text>
  <text x="648" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">AL32UTF8</text>

  <rect x="632" y="164" width="176" height="56" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="648" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">MySQL</text>
  <text x="648" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">utf8mb4</text>

  <rect x="632" y="228" width="176" height="56" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="648" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" xml:space="preserve">NLS_LANG (Oracle)</text>
  <text x="648" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">KOREAN_KOREA.AL32UTF8</text>

  <text x="720" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">✓ 이모지 포함 시 utf8mb4</text>
  <text x="720" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">기존 EUC-KR DB: 마이그레이션 필요</text>

  <text x="440" y="403" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#555">한 곳이라도 다르면 한글 깨짐 — 전 구간 UTF-8 통일이 유일한 해결책</text>
</svg>
