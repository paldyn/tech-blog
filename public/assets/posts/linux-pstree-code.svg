<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">pstree 주요 옵션</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">옵션 조합으로 트리를 더 풍부하게 읽는 방법</text>

  <!-- Left panel: commands -->
  <rect x="50" y="86" width="380" height="310" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="66" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">pstree 명령 예시</text>
  <line x1="66" y1="118" x2="414" y2="118" stroke="#3a4a6e" stroke-width="1"/>

  <text x="66" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># PID 번호 함께 출력</text>
  <text x="66" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">pstree -p</text>

  <text x="66" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 사용자 이름 함께 출력</text>
  <text x="66" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">pstree -u</text>

  <text x="66" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># PID + 사용자 + 컬러</text>
  <text x="66" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">pstree -puc</text>

  <text x="66" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 특정 사용자의 트리만</text>
  <text x="66" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">pstree -u www-data</text>

  <text x="66" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 특정 PID 하위 트리만</text>
  <text x="66" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">pstree -p 1204</text>

  <text x="66" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 스레드도 포함 출력</text>
  <text x="66" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">pstree -t -p $$</text>

  <!-- Right panel: typical output -->
  <rect x="460" y="86" width="370" height="310" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="476" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">pstree -p 출력 예시</text>
  <line x1="476" y1="118" x2="814" y2="118" stroke="#3a4a6e" stroke-width="1"/>

  <text x="476" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">systemd(1)─┬─sshd(892)─┬</text>
  <text x="476" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">           │           └─sshd(3001)</text>
  <text x="476" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">           │             └─bash(3010)</text>
  <text x="476" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">           │               └─ps(3050)</text>
  <text x="476" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">           ├─nginx(1204)─┬</text>
  <text x="476" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">           │             ├─nginx(1205)</text>
  <text x="476" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">           │             └─nginx(1206)</text>
  <text x="476" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">           ├─cron(1412)</text>
  <text x="476" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">           └─bash(2100)</text>

  <!-- Notes -->
  <rect x="476" y="306" width="354" height="76" rx="6" fill="#111827" stroke="#1e2d45" stroke-width="1"/>
  <text x="492" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">2*[bash] 표기 의미</text>
  <text x="492" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">동일 이름 프로세스 n개를 묶어 표시</text>
  <text x="492" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">-H 옵션으로 현재 프로세스 하이라이트</text>
  <text x="492" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">-n 옵션으로 이름 대신 PID 정렬</text>
</svg>
