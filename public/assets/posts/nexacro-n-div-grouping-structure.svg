<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 530" style="background:#0a0a0a;">
  <rect width="880" height="530" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">Div 그루핑 — 화면 논리 단위 분리</text>

  <!-- Column labels -->
  <text x="205" y="82" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#e05555">그루핑 전 (Flat)</text>
  <text x="665" y="82" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#55c555">그루핑 후 (Div 활용)</text>

  <!-- ===== LEFT: Before (flat) ===== -->
  <rect x="50" y="96" width="310" height="388" rx="8" fill="#0d1220" stroke="#2a3a4a" stroke-width="1.5"/>
  <text x="62" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#7ec8e3">Form</text>

  <!-- Flat components -->
  <rect x="70" y="124" width="270" height="26" rx="4" fill="#1a2030" stroke="#2a3a5a"/>
  <text x="82" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">stcTitle</text>

  <rect x="70" y="158" width="124" height="26" rx="4" fill="#1a2030" stroke="#2a3a5a"/>
  <text x="82" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">edtName</text>

  <rect x="202" y="158" width="138" height="26" rx="4" fill="#1a2030" stroke="#2a3a5a"/>
  <text x="214" y="176" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">edtAge</text>

  <rect x="70" y="192" width="270" height="26" rx="4" fill="#1a2030" stroke="#2a3a5a"/>
  <text x="82" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">edtAddress</text>

  <rect x="70" y="226" width="124" height="26" rx="4" fill="#1a2030" stroke="#2a3a5a"/>
  <text x="82" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">btnSearch</text>

  <rect x="202" y="226" width="138" height="26" rx="4" fill="#1a2030" stroke="#2a3a5a"/>
  <text x="214" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">btnSave</text>

  <rect x="70" y="260" width="270" height="44" rx="4" fill="#1a2030" stroke="#2a3a5a"/>
  <text x="82" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">Grid</text>

  <!-- Warning: individual control -->
  <rect x="70" y="316" width="270" height="142" rx="6" fill="#160a0a" stroke="#602020" stroke-width="1.5"/>
  <text x="82" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e05555">컴포넌트 개별 제어 필요</text>
  <text x="82" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7a4444">stcTitle.set_visible(b)</text>
  <text x="82" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7a4444">edtName.set_visible(b)</text>
  <text x="82" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7a4444">edtAge.set_visible(b)</text>
  <text x="82" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7a4444">btnSearch.set_visible(b)</text>
  <text x="82" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7a4444">btnSave.set_visible(b) ...</text>

  <!-- Arrow center at y=280 -->
  <rect x="374" y="274" width="72" height="12" rx="2" fill="#7777cc"/>
  <!-- Arrowhead: tip at x=486 -->
  <polygon points="446,262 446,298 474,280" fill="#7777cc" stroke="#3a3a80" stroke-width="1"/>
  <!-- Arrow label (y=260, arrow center y=280, diff=20 >= 14) -->
  <text x="418" y="258" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#7777cc">Div 적용</text>

  <!-- ===== RIGHT: After (div grouped) ===== -->
  <rect x="490" y="96" width="340" height="388" rx="8" fill="#0d1220" stroke="#2a3a4a" stroke-width="1.5"/>
  <text x="502" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#7ec8e3">Form</text>

  <!-- divHeader -->
  <rect x="510" y="124" width="300" height="110" rx="6" fill="#0a1a32" stroke="#2050a0" stroke-width="1.5"/>
  <text x="522" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" font-weight="600" fill="#7ec8e3">divHeader</text>
  <rect x="522" y="152" width="276" height="24" rx="4" fill="#1a2030" stroke="#2a3a5a"/>
  <text x="534" y="169" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">stcTitle</text>
  <rect x="522" y="184" width="130" height="24" rx="4" fill="#1a2030" stroke="#2a3a5a"/>
  <text x="534" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">btnSearch</text>
  <rect x="660" y="184" width="130" height="24" rx="4" fill="#1a2030" stroke="#2a3a5a"/>
  <text x="672" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">btnSave</text>

  <!-- divContent -->
  <rect x="510" y="248" width="300" height="110" rx="6" fill="#0a2010" stroke="#206030" stroke-width="1.5"/>
  <text x="522" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" font-weight="600" fill="#55c555">divContent</text>
  <rect x="522" y="276" width="276" height="24" rx="4" fill="#1a2030" stroke="#2a3a5a"/>
  <text x="534" y="293" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">edtName / edtAge</text>
  <rect x="522" y="308" width="276" height="24" rx="4" fill="#1a2030" stroke="#2a3a5a"/>
  <text x="534" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">edtAddress / Grid</text>

  <!-- Benefit notice -->
  <rect x="510" y="372" width="300" height="90" rx="6" fill="#0a180a" stroke="#206030" stroke-width="1.5"/>
  <text x="522" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555">단 한 줄로 그룹 전체 제어</text>
  <text x="522" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7ec8e3">divContent.set_visible(false)</text>
  <text x="522" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#7ec8e3">divContent.set_enable(false)</text>
  <text x="522" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">→ 포함된 자식 전체 영향</text>

  <!-- Footer -->
</svg>
