<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">비트 플래그 패턴 — 권한 시스템 구현</text>

  <!-- Flags definition -->
  <rect x="60" y="72" width="360" height="200" fill="#111827" rx="8" stroke="#1e2433"/>
  <text x="240" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">권한 플래그 정의</text>
  <rect x="84" y="116" width="312" height="140" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="100" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">const</text><text x="140" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> PERM = {</text>
  <text x="100" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  READ:    </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8"> &lt;&lt; </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#888">, // 0001 = 1</tspan></text>
  <text x="100" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  WRITE:   </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8"> &lt;&lt; </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#888">, // 0010 = 2</tspan></text>
  <text x="100" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  EXECUTE: </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8"> &lt;&lt; </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#888">, // 0100 = 4</tspan></text>
  <text x="100" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">  DELETE:  </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8"> &lt;&lt; </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#888">, // 1000 = 8</tspan></text>
  <text x="100" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">};</text>

  <!-- Flags operations -->
  <rect x="460" y="72" width="360" height="200" fill="#111827" rx="8" stroke="#1e2433"/>
  <text x="640" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">권한 조작</text>
  <rect x="484" y="116" width="312" height="140" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="500" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">// 권한 부여: | (OR)</text>
  <text x="500" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">let</text><text x="524" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> user = PERM.READ | PERM.WRITE;</text>
  <text x="500" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">// 권한 확인: &amp; (AND)</text>
  <text x="500" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">user &amp; PERM.READ;    </text><text x="654" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">// 1 (있음)</text>
  <text x="500" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">user &amp; PERM.DELETE;  </tspan><tspan fill="#888">// 0 (없음)</tspan></text>
  <text x="500" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">// 권한 제거: &amp; ~</text>
  <text x="500" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">user &amp;= ~PERM.WRITE;</text>

  <!-- Practical code -->
  <text x="60" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">실전 활용 패턴</text>
  <rect x="60" y="322" width="760" height="80" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="80" y="346" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">// RGB 색상 분해 (0xFF5733 형식)</text>
  <text x="80" y="364" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> r = (color &gt;&gt; </tspan><tspan fill="#b5cea8">16</tspan><tspan fill="#e8e8e8">) &amp; </tspan><tspan fill="#b5cea8">0xFF</tspan><tspan fill="#e8e8e8">; </tspan><tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> g = (color &gt;&gt; </tspan><tspan fill="#b5cea8">8</tspan><tspan fill="#e8e8e8">) &amp; </tspan><tspan fill="#b5cea8">0xFF</tspan><tspan fill="#e8e8e8">; </tspan><tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> b = color &amp; </tspan><tspan fill="#b5cea8">0xFF</tspan><tspan fill="#e8e8e8">;</tspan></text>
  <text x="80" y="382" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">// 짝수 판별 (LSB 확인): n &amp; 1 === 0, 거듭제곱 판별: n &amp; (n-1) === 0</text>
  <text x="80" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">Number.isInteger(n) &amp;&amp; n &gt; </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#e8e8e8"> &amp;&amp; (n &amp; (n - </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">)) === </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#888">; // 2의 거듭제곱</tspan></text>

  <!-- Footer -->
</svg>
