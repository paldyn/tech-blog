<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">불변성과 객체 동일성</text>

  <!-- intern example -->
  <rect x="60" y="74" width="360" height="120" rx="8" fill="#0f1a2e" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="240" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">인터닝 (Small int / 짧은 문자열)</text>
  <rect x="76" y="108" width="328" height="72" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="90" y="126" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">a = </tspan><tspan fill="#b5cea8">256</tspan>
    <tspan fill="#ffffff">;  b = </tspan><tspan fill="#b5cea8">256</tspan>
  </text>
  <text x="90" y="146" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">print</tspan>
    <tspan fill="#ffffff">(a </tspan><tspan fill="#7ec8e3" font-weight="600">is</tspan>
    <tspan fill="#ffffff"> b)  </tspan>
    <tspan fill="#9aa4b8"># True (동일 객체)</tspan>
  </text>
  <text x="90" y="166" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#9aa4b8"># -5 ~ 256 정수는 CPython이 캐시</tspan>
  </text>

  <!-- hash example -->
  <rect x="460" y="74" width="360" height="120" rx="8" fill="#0f1a2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">불변 객체와 해싱</text>
  <rect x="476" y="108" width="328" height="72" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="490" y="126" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">t = (</tspan><tspan fill="#b5cea8">1</tspan>
    <tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">2</tspan>
    <tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">3</tspan>
    <tspan fill="#ffffff">)</tspan>
  </text>
  <text x="490" y="146" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">d = {t: </tspan>
    <tspan fill="#ce9178">"value"</tspan>
    <tspan fill="#ffffff">}  </tspan>
    <tspan fill="#9aa4b8"># dict 키 가능</tspan>
  </text>
  <text x="490" y="166" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#9aa4b8"># [1,2,3] → TypeError: unhashable</tspan>
  </text>

  <!-- Deep immutability warning -->
  <rect x="60" y="214" width="760" height="80" rx="8" fill="#2a1a00" stroke="#e0a055" stroke-width="1.5"/>
  <text x="440" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e0a055" text-anchor="middle">⚠ 얕은 불변성 (Shallow Immutability)</text>
  <text x="440" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">t = ([1, 2], [3, 4])  →  tuple 자체는 불변</text>
  <text x="440" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">하지만 t[0].append(99)  →  내부 list 변경 가능!</text>

  <!-- Code copy example -->
  <rect x="60" y="314" width="760" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="334" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 불변 복사 패턴 — 새 인스턴스 반환</text>
  <text x="76" y="354" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">from</tspan>
    <tspan fill="#ffffff"> dataclasses </tspan>
    <tspan fill="#7ec8e3" font-weight="600">import</tspan>
    <tspan fill="#ffffff"> dataclass, replace</tspan>
  </text>
  <text x="76" y="374" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">@dataclass</tspan>
    <tspan fill="#ffffff">(frozen=</tspan>
    <tspan fill="#7ec8e3" font-weight="600">True</tspan>
    <tspan fill="#ffffff">)</tspan>
  </text>
  <text x="76" y="394" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">class</tspan>
    <tspan fill="#ffffff"> Point: x: </tspan>
    <tspan fill="#7ec8e3" font-weight="600">float</tspan>
    <tspan fill="#ffffff">; y: </tspan>
    <tspan fill="#7ec8e3" font-weight="600">float</tspan>
  </text>
  <text x="76" y="406" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">p2 = replace(p, x=</tspan>
    <tspan fill="#b5cea8">10.0</tspan>
    <tspan fill="#ffffff">)  </tspan>
    <tspan fill="#9aa4b8"># 새 Point, 기존 p 불변</tspan>
  </text>
</svg>
