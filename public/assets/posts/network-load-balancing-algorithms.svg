<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">로드 밸런싱 알고리즘 비교</text>

  <!-- Card 1: Round Robin (top-left) -->
  <rect x="45" y="78" width="378" height="168" rx="8" fill="#0d1a2a" stroke="#2a5a8a" stroke-width="1.5"/>
  <text x="234" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">Round Robin</text>
  <line x1="65" y1="126" x2="403" y2="126" stroke="#1a2a3a" stroke-width="1"/>
  <text x="65" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">요청: A → B → C → A → B → C ...</text>
  <text x="65" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">서버 상태와 무관하게 순서대로 배분</text>
  <text x="65" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">서버 성능이 균일할 때 적합, 구현 단순</text>
  <text x="65" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">가장 기본적인 알고리즘</text>

  <!-- Card 2: Least Connections (top-right) -->
  <rect x="457" y="78" width="378" height="168" rx="8" fill="#0d1a2a" stroke="#2a5a8a" stroke-width="1.5"/>
  <text x="646" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">Least Connections</text>
  <line x1="477" y1="126" x2="815" y2="126" stroke="#1a2a3a" stroke-width="1"/>
  <text x="477" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">서버 A: 활성 연결 3개 / B: 1개 → B 선택</text>
  <text x="477" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">현재 처리 중인 연결 수 기반으로 선택</text>
  <text x="477" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">처리 시간이 다른 요청에 효과적</text>
  <text x="477" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">동적 부하 기반 분산</text>

  <!-- Card 3: IP Hash (bottom-left) -->
  <rect x="45" y="282" width="378" height="168" rx="8" fill="#0d1a2a" stroke="#2a5a8a" stroke-width="1.5"/>
  <text x="234" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">IP Hash</text>
  <line x1="65" y1="330" x2="403" y2="330" stroke="#1a2a3a" stroke-width="1"/>
  <text x="65" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">hash(1.2.3.4) → 항상 서버 A</text>
  <text x="65" y="377" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">동일 IP에서 오는 요청은 항상 같은 서버</text>
  <text x="65" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">세션 유지(Sticky Session) 효과</text>
  <text x="65" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">세션 기반 앱에 적합</text>

  <!-- Card 4: Weighted (bottom-right) -->
  <rect x="457" y="282" width="378" height="168" rx="8" fill="#0d1a2a" stroke="#2a5a8a" stroke-width="1.5"/>
  <text x="646" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">Weighted Round Robin</text>
  <line x1="477" y1="330" x2="815" y2="330" stroke="#1a2a3a" stroke-width="1"/>
  <text x="477" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">A(weight 3): ●●●  B(weight 1): ●</text>
  <text x="477" y="377" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">서버별 처리 가중치를 설정해 비율 조정</text>
  <text x="477" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">고성능 서버에 더 많은 트래픽 할당</text>
  <text x="477" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">이기종 서버 환경에 적합</text>

  <!-- Bottom label -->
  <text x="440" y="500" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">외에도 Random, Least Response Time, Resource-Based 등 다양한 변형이 존재</text>
</svg>
