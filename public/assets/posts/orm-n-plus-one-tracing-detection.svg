<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">N+1 탐지 방법 — 프레임워크별</text>

  <!-- Django -->
  <rect x="60" y="66" width="360" height="160" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="90" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># Django — django-query-inspector</text>
  <text x="80" y="110" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8"># settings.py</tspan>
  </text>
  <text x="80" y="130" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">QUERY_INSPECTOR_ENABLED = </tspan><tspan fill="#7ec8e3" font-weight="600">True</tspan>
  </text>
  <text x="80" y="158" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8"># 해결: select_related / prefetch_related</tspan>
  </text>
  <text x="80" y="178" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">User.objects.prefetch_related(</tspan><tspan fill="#ce9178">'orders'</tspan><tspan fill="#ffffff">)</tspan>
  </text>
  <text x="80" y="198" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">User.objects.select_related(</tspan><tspan fill="#ce9178">'profile'</tspan><tspan fill="#ffffff">)</tspan>
  </text>
  <text x="80" y="218" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># prefetch=IN, select=JOIN</text>

  <!-- Hibernate/JPA -->
  <rect x="460" y="66" width="360" height="160" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="480" y="90" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// JPA — Hibernate SQL logging</text>
  <text x="480" y="110" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// application.properties</text>
  <text x="480" y="130" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">spring.jpa.show-sql=</tspan><tspan fill="#7ec8e3" font-weight="600">true</tspan>
  </text>
  <text x="480" y="158" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 해결: JPQL Fetch Join</text>
  <text x="480" y="178" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ce9178">"SELECT u FROM User u"</tspan>
  </text>
  <text x="480" y="198" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ce9178">"JOIN FETCH u.orders"</tspan>
  </text>
  <text x="480" y="218" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 또는 @BatchSize(size=100)</text>

  <!-- Prisma -->
  <rect x="60" y="252" width="360" height="160" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="276" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// Prisma — query events</text>
  <text x="80" y="296" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> prisma = </tspan><tspan fill="#7ec8e3" font-weight="600">new</tspan><tspan fill="#ffffff"> PrismaClient({</tspan>
  </text>
  <text x="80" y="316" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  log: [</tspan><tspan fill="#ce9178">'query'</tspan><tspan fill="#ffffff">]</tspan>
  </text>
  <text x="80" y="336" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">})</tspan>
  </text>
  <text x="80" y="364" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 해결: include로 즉시 로딩</text>
  <text x="80" y="384" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">prisma.user.findMany({ include: { orders: </tspan><tspan fill="#7ec8e3" font-weight="600">true</tspan><tspan fill="#ffffff"> } })</tspan>
  </text>
  <text x="80" y="404" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// Prisma는 IN 방식으로 자동 최적화</text>

  <!-- General tip -->
  <rect x="460" y="252" width="360" height="160" rx="6" fill="#0f1f35" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="640" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">탐지 체크리스트</text>
  <text x="480" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 루프 안에서 ORM 관계 속성 접근 확인</text>
  <text x="480" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 개발 환경 SQL 로깅 활성화</text>
  <text x="480" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• APM 툴: DataDog, New Relic, Sentry</text>
  <text x="480" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 쿼리 횟수 N에 비례하면 의심</text>
  <text x="480" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">• 해결: Eager Load / DataLoader 패턴</text>
</svg>
