<svg xmlns="http://www.w3.org/2000/svg" width="880" height="372" viewBox="0 0 880 372">
  <rect width="880" height="372" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">BOM 사용법</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">Maven dependencyManagement · Gradle platform</text>

  <!-- Maven -->
  <text x="80" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">pom.xml (Maven)</text>
  <rect x="60" y="116" width="380" height="220" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="142" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >&lt;dependencyManagement&gt;</text>
  <text x="76" y="162" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >  &lt;dependencies&gt;&lt;dependency&gt;</text>
  <text x="76" y="182" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >    &lt;groupId&gt;<tspan fill="#ce9178">c.f.jackson</tspan>&lt;/groupId&gt;</text>
  <text x="76" y="202" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >    &lt;artifactId&gt;<tspan fill="#ce9178">jackson-bom</tspan>&lt;/artifactId&gt;</text>
  <text x="76" y="222" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >    &lt;version&gt;<tspan fill="#b5cea8">2.17.0</tspan>&lt;/version&gt;</text>
  <text x="76" y="242" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >    &lt;type&gt;<tspan fill="#ce9178">pom</tspan>&lt;/type&gt;</text>
  <text x="76" y="262" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >    &lt;scope&gt;<tspan fill="#ce9178">import</tspan>&lt;/scope&gt;</text>
  <text x="76" y="282" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >  &lt;/dependency&gt;&lt;/dependencies&gt;</text>
  <text x="76" y="302" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >&lt;/dependencyManagement&gt;</text>
  <text x="76" y="326" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"
  >// scope=import 가 핵심</text>

  <!-- Gradle -->
  <text x="460" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">build.gradle.kts (Gradle)</text>
  <rect x="440" y="116" width="380" height="220" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="456" y="142" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  ><tspan fill="#7ec8e3" font-weight="600">dependencies</tspan> {</text>
  <text x="456" y="166" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >  <tspan fill="#9aa4b8">// BOM 가져오기</tspan></text>
  <text x="456" y="186" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >  <tspan fill="#7ec8e3" font-weight="600">implementation</tspan>(<tspan fill="#7ec8e3" font-weight="600">platform</tspan>(</text>
  <text x="456" y="206" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178"
  >    "c.f.jackson:jackson-bom:2.17.0"</text>
  <text x="456" y="226" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >  ))</text>
  <text x="456" y="252" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >  <tspan fill="#9aa4b8">// 버전 생략 — BOM이 채움</tspan></text>
  <text x="456" y="272" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >  <tspan fill="#7ec8e3" font-weight="600">implementation</tspan>(</text>
  <text x="456" y="292" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178"
  >    "c.f.jackson.core:jackson-databind"</text>
  <text x="456" y="312" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >  )</text>
  <text x="456" y="332" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"
  >}</text>
</svg>
