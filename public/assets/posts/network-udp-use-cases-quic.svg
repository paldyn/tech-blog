<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">QUIC: UDP 위에 구축한 신뢰성</text>
  <text x="440" y="64" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">HTTP/3의 전송 계층 — UDP의 속도 + TCP의 신뢰성</text>

  <!-- TCP+TLS stack -->
  <text x="200" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">TCP + TLS 1.3</text>

  <rect x="80" y="108" width="240" height="36" rx="4" fill="#1a0d2e" stroke="#5a3a7e" stroke-width="1"/>
  <text x="200" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">HTTP/2</text>

  <rect x="80" y="150" width="240" height="36" rx="4" fill="#0d1a0d" stroke="#2a5a2a" stroke-width="1"/>
  <text x="200" y="171" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">TLS 1.3</text>

  <rect x="80" y="192" width="240" height="36" rx="4" fill="#1a1a0a" stroke="#5a5a1a" stroke-width="1"/>
  <text x="200" y="213" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e0c055">TCP</text>

  <rect x="80" y="234" width="240" height="36" rx="4" fill="#1a0a0a" stroke="#5a2a2a" stroke-width="1"/>
  <text x="200" y="255" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">IP</text>

  <!-- Connection time for TCP -->
  <rect x="80" y="286" width="240" height="60" rx="4" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="200" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">TCP 3-way HS: 1.5 RTT</text>
  <text x="200" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">+ TLS 1.3 HS: 1 RTT</text>
  <text x="200" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">= 총 2.5 RTT</text>

  <!-- QUIC stack -->
  <text x="680" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">QUIC (HTTP/3)</text>

  <rect x="560" y="108" width="240" height="36" rx="4" fill="#1a0d2e" stroke="#5a3a7e" stroke-width="1"/>
  <text x="680" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">HTTP/3</text>

  <rect x="560" y="150" width="240" height="80" rx="4" fill="#0f0f1a" stroke="#2a2a5a" stroke-width="1.5"/>
  <text x="680" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">QUIC</text>
  <text x="680" y="195" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">TLS 1.3 내장, 스트림, 흐름제어</text>
  <text x="680" y="213" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">재전송, 혼잡제어 포함</text>

  <rect x="560" y="234" width="240" height="36" rx="4" fill="#1a0a0a" stroke="#5a2a2a" stroke-width="1"/>
  <text x="680" y="255" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">UDP + IP</text>

  <!-- QUIC connection time -->
  <rect x="560" y="286" width="240" height="60" rx="4" fill="#0f1a0f" stroke="#2a5a2a" stroke-width="1"/>
  <text x="680" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">첫 연결: 1 RTT</text>
  <text x="680" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">재연결 (0-RTT): 0 RTT!</text>
  <text x="680" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">HOL Blocking 없음</text>

  <!-- Middle vs label -->
  <text x="440" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" font-weight="700" fill="#888">vs</text>
</svg>
