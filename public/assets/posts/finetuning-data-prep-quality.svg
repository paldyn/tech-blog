<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" style="background:#0a0a0a;" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">데이터 품질 vs 양: 파인튜닝 성공 공식</text>
  <text x="440" y="70" font-size="15" fill="#888" text-anchor="middle">고품질 소량 &gt; 저품질 대량 — 데이터 정제에 시간을 투자하라</text>

  <!-- Matrix background -->
  <rect x="60" y="88" width="440" height="316" fill="#0d1117" rx="10" stroke="#3a4a6e" stroke-width="1.2"/>

  <!-- Axis labels -->
  <!-- Y axis: 품질 -->
  <text x="78" y="106" font-size="12" fill="#888">품질</text>
  <text x="78" y="122" font-size="11" fill="#55c555">높음 ▲</text>
  <text x="78" y="382" font-size="11" fill="#e05555">낮음 ▼</text>

  <!-- X axis: 양 -->
  <text x="240" y="410" font-size="12" fill="#888" text-anchor="middle">적음 ◀</text>
  <text x="430" y="410" font-size="12" fill="#888" text-anchor="middle">▶ 많음</text>

  <!-- Divider lines -->
  <line x1="60" y1="247" x2="500" y2="247" stroke="#3a4a6e" stroke-width="1.2"/>
  <line x1="280" y1="88" x2="280" y2="404" stroke="#3a4a6e" stroke-width="1.2"/>

  <!-- Quadrant: 고품질 + 소량 (best) -->
  <rect x="66" y="94" width="208" height="147" fill="#0d1f0d" rx="6"/>
  <text x="170" y="128" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">고품질 + 소량</text>
  <text x="170" y="148" font-size="12" fill="#e8e8e8" text-anchor="middle">Stanford Alpaca 방식</text>
  <text x="170" y="166" font-size="11" fill="#888" text-anchor="middle">52K 고품질 → 강력한</text>
  <text x="170" y="182" font-size="11" fill="#888" text-anchor="middle">instruction following</text>
  <rect x="118" y="196" width="104" height="28" fill="#55c555" rx="6"/>
  <text x="170" y="214" font-size="12" font-weight="700" fill="#0a0a0a" text-anchor="middle">권장 전략</text>

  <!-- Quadrant: 고품질 + 대량 (ideal) -->
  <rect x="286" y="94" width="208" height="147" fill="#0d1a2a" rx="6"/>
  <text x="390" y="128" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">고품질 + 대량</text>
  <text x="390" y="148" font-size="12" fill="#e8e8e8" text-anchor="middle">이상적 시나리오</text>
  <text x="390" y="166" font-size="11" fill="#888" text-anchor="middle">최고 성능 달성 가능</text>
  <text x="390" y="182" font-size="11" fill="#888" text-anchor="middle">비용·시간 高</text>
  <rect x="338" y="196" width="104" height="28" fill="#7ec8e3" rx="6"/>
  <text x="390" y="214" font-size="12" font-weight="700" fill="#0a0a0a" text-anchor="middle">최적 시나리오</text>

  <!-- Quadrant: 저품질 + 소량 (bad) -->
  <rect x="66" y="253" width="208" height="144" fill="#1f1010" rx="6"/>
  <text x="170" y="286" font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">저품질 + 소량</text>
  <text x="170" y="306" font-size="12" fill="#e8e8e8" text-anchor="middle">최악의 조합</text>
  <text x="170" y="324" font-size="11" fill="#888" text-anchor="middle">모델 성능 저하</text>
  <text x="170" y="340" font-size="11" fill="#888" text-anchor="middle">훈련 불안정</text>
  <rect x="118" y="356" width="104" height="28" fill="#e05555" rx="6"/>
  <text x="170" y="374" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">사용 금지</text>

  <!-- Quadrant: 저품질 + 대량 (worse than small+high) -->
  <rect x="286" y="253" width="208" height="144" fill="#1a1510" rx="6"/>
  <text x="390" y="286" font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">저품질 + 대량</text>
  <text x="390" y="306" font-size="12" fill="#e8e8e8" text-anchor="middle">고품질 소량보다 나쁨</text>
  <text x="390" y="324" font-size="11" fill="#888" text-anchor="middle">노이즈가 신호를 덮음</text>
  <text x="390" y="340" font-size="11" fill="#888" text-anchor="middle">Garbage in, garbage out</text>
  <rect x="338" y="356" width="104" height="28" fill="#7a4020" rx="6"/>
  <text x="390" y="374" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">비추천</text>

  <!-- Checklist -->
  <rect x="528" y="88" width="320" height="316" fill="#111520" rx="10" stroke="#3a4a6e" stroke-width="1.2"/>
  <text x="688" y="116" font-size="15" font-weight="700" fill="#e8e8e8" text-anchor="middle">데이터 검증 체크리스트</text>

  <!-- items -->
  <rect x="548" y="132" width="16" height="16" fill="#55c555" rx="3"/>
  <text x="574" y="145" font-size="13" fill="#e8e8e8">중복 제거 (deduplication)</text>

  <rect x="548" y="162" width="16" height="16" fill="#55c555" rx="3"/>
  <text x="574" y="175" font-size="13" fill="#e8e8e8">길이 필터링 (min/max token)</text>

  <rect x="548" y="192" width="16" height="16" fill="#55c555" rx="3"/>
  <text x="574" y="205" font-size="13" fill="#e8e8e8">언어 일관성 확인</text>

  <rect x="548" y="222" width="16" height="16" fill="#55c555" rx="3"/>
  <text x="574" y="235" font-size="13" fill="#e8e8e8">응답 품질 라벨링 검토</text>

  <rect x="548" y="252" width="16" height="16" fill="#55c555" rx="3"/>
  <text x="574" y="265" font-size="13" fill="#e8e8e8">편향·독성 콘텐츠 제거</text>

  <rect x="548" y="282" width="16" height="16" fill="#55c555" rx="3"/>
  <text x="574" y="295" font-size="13" fill="#e8e8e8">train/val 분리 (80:20)</text>

  <line x1="548" y1="314" x2="832" y2="314" stroke="#3a4a6e" stroke-width="1"/>
  <text x="688" y="338" font-size="12" fill="#888" text-anchor="middle">태스크별 최소 권장 데이터</text>
  <text x="688" y="358" font-size="12" fill="#7ec8e3" text-anchor="middle">분류: 100~500 · 생성: 500~2000</text>
  <text x="688" y="378" font-size="12" fill="#7ec8e3" text-anchor="middle">복잡 추론: 2,000+ 샘플</text>
</svg>
