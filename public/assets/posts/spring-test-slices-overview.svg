<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="880" height="560" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Spring 테스트 슬라이스 전체 구조</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">슬라이스마다 로드하는 컨텍스트 범위가 다르다</text>

  <!-- @SpringBootTest (전체) -->
  <rect x="60" y="96" width="760" height="58" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="121" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">@SpringBootTest</text>
  <text x="440" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">전체 애플리케이션 컨텍스트 로딩 — 통합 테스트</text>

  <!-- 슬라이스 박스 4개 -->
  <!-- @WebMvcTest -->
  <rect x="60" y="186" width="178" height="100" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="149" y="213" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">@WebMvcTest</text>
  <text x="149" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">Controller 레이어</text>
  <text x="149" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">MockMvc 자동 구성</text>
  <text x="149" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Service는 @MockBean 사용</text>

  <!-- @DataJpaTest -->
  <rect x="258" y="186" width="178" height="100" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="347" y="213" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">@DataJpaTest</text>
  <text x="347" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">JPA 레이어</text>
  <text x="347" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">인메모리 DB 자동 설정</text>
  <text x="347" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">@Transactional 기본 적용</text>

  <!-- @JsonTest -->
  <rect x="456" y="186" width="178" height="100" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="545" y="213" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">@JsonTest</text>
  <text x="545" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">JSON 직렬화 레이어</text>
  <text x="545" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">JacksonTester 자동 구성</text>
  <text x="545" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">@JsonComponent 포함</text>

  <!-- @RestClientTest -->
  <rect x="654" y="186" width="166" height="100" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="737" y="213" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">@RestClientTest</text>
  <text x="737" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">HTTP 클라이언트</text>
  <text x="737" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">MockRestServiceServer</text>
  <text x="737" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">RestTemplate 자동 구성</text>

  <!-- 속도 비교 섹션 -->
  <text x="60" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">테스트 속도 비교</text>

  <!-- 단위 테스트 바 -->
  <rect x="60" y="340" width="140" height="28" rx="6" fill="#2a3a1a" stroke="#55c555" stroke-width="1"/>
  <text x="130" y="359" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">단위 테스트</text>

  <rect x="210" y="344" width="60" height="20" rx="4" fill="#55c555"/>
  <text x="278" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">~수 ms</text>

  <!-- 슬라이스 테스트 바 -->
  <rect x="60" y="382" width="140" height="28" rx="6" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="130" y="401" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">슬라이스 테스트</text>

  <rect x="210" y="386" width="150" height="20" rx="4" fill="#7ec8e3"/>
  <text x="368" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">~수백 ms</text>

  <!-- 통합 테스트 바 -->
  <rect x="60" y="424" width="140" height="28" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="130" y="443" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">통합 테스트</text>

  <rect x="210" y="428" width="340" height="20" rx="4" fill="#e05555"/>
  <text x="558" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">수 초 ~ 수십 초</text>

  <!-- @DataJpaTest 추가 정보 -->
  <text x="60" y="490" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">슬라이스별 자동 구성 범위</text>

  <text x="60" y="516" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">@WebMvcTest: Controller, ControllerAdvice, Filter, WebMvcConfigurer, HandlerMethodArgumentResolver 포함</text>
  <text x="60" y="538" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">@DataJpaTest: JPA 관련 Bean만 로드 — Service, Controller, Component 제외</text>
</svg>
