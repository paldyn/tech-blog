<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320">
  <rect width="880" height="320" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Protocol 정의와 사용</text>

  <rect x="60" y="64" width="760" height="236" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text x="80" y="92" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ffffff"> typing </tspan><tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> Protocol</tspan></text>

  <text x="80" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">class</tspan><tspan fill="#ffffff"> SupportsClose(Protocol):</tspan></text>

  <text x="80" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    def</tspan><tspan fill="#ffffff"> close(self) -&gt; </tspan><tspan fill="#7ec8e3" font-weight="600">None</tspan><tspan fill="#ffffff">: ...</tspan></text>

  <text x="80" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">def</tspan><tspan fill="#ffffff"> shut(res: SupportsClose) -&gt; </tspan><tspan fill="#7ec8e3" font-weight="600">None</tspan><tspan fill="#ffffff">:</tspan></text>

  <text x="80" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    res.close()</tspan></text>

  <text x="80" y="244" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8"># 파일·소켓·DB 커넥션 모두 close() 가 있으므로</tspan></text>

  <text x="80" y="264" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8"># 상속 선언 없이 그대로 인자로 전달 가능</tspan></text>

  <text x="80" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">shut(</tspan><tspan fill="#7ec8e3" font-weight="600">open</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"a.txt"</tspan><tspan fill="#ffffff">))</tspan><tspan fill="#9aa4b8">   # 검사 통과</tspan></text>
</svg>
