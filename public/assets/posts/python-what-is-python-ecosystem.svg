<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <style>text:not([font-family]) { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }</style>
  </defs>
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Python 활용 생태계</text>
  <text x="440" y="68" text-anchor="middle" font-size="15" font-weight="600" fill="#888">하나의 언어로 가능한 것들</text>

  <!-- 웹 개발 -->
  <rect x="60" y="88" width="240" height="110" rx="8" fill="#0f1820" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="114" text-anchor="middle" font-size="14" font-weight="700" fill="#7ec8e3">웹 개발</text>
  <text x="180" y="136" text-anchor="middle" font-size="12" fill="#888">Django · Flask · FastAPI</text>
  <text x="180" y="156" text-anchor="middle" font-size="11" fill="#666">강력한 웹 프레임워크</text>
  <text x="180" y="174" text-anchor="middle" font-size="11" fill="#666">생태계 다양성 최고 수준</text>

  <!-- 데이터 분석 -->
  <rect x="320" y="88" width="240" height="110" rx="8" fill="#0f1820" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="114" text-anchor="middle" font-size="14" font-weight="700" fill="#55c555">데이터 분석</text>
  <text x="440" y="136" text-anchor="middle" font-size="12" fill="#888">pandas · NumPy · SciPy</text>
  <text x="440" y="156" text-anchor="middle" font-size="11" fill="#666">데이터 처리의 표준 도구</text>
  <text x="440" y="174" text-anchor="middle" font-size="11" fill="#666">과학·금융 계산에 최적</text>

  <!-- AI / 머신러닝 -->
  <rect x="580" y="88" width="240" height="110" rx="8" fill="#0f1820" stroke="#7777cc" stroke-width="1.5"/>
  <text x="700" y="114" text-anchor="middle" font-size="14" font-weight="700" fill="#7777cc">AI / 머신러닝</text>
  <text x="700" y="136" text-anchor="middle" font-size="12" fill="#888">TensorFlow · PyTorch</text>
  <text x="700" y="156" text-anchor="middle" font-size="11" fill="#666">딥러닝 연구 표준 언어</text>
  <text x="700" y="174" text-anchor="middle" font-size="11" fill="#666">ChatGPT도 Python으로</text>

  <!-- 자동화 -->
  <rect x="60" y="218" width="240" height="110" rx="8" fill="#0f1820" stroke="#ce9178" stroke-width="1.5"/>
  <text x="180" y="244" text-anchor="middle" font-size="14" font-weight="700" fill="#ce9178">자동화 · 스크립팅</text>
  <text x="180" y="266" text-anchor="middle" font-size="12" fill="#888">os · subprocess · shutil</text>
  <text x="180" y="286" text-anchor="middle" font-size="11" fill="#666">반복 작업을 코드로 해결</text>
  <text x="180" y="304" text-anchor="middle" font-size="11" fill="#666">DevOps 자동화에 필수</text>

  <!-- 교육 -->
  <rect x="320" y="218" width="240" height="110" rx="8" fill="#0f1820" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="244" text-anchor="middle" font-size="14" font-weight="700" fill="#e05555">교육 · 입문</text>
  <text x="440" y="266" text-anchor="middle" font-size="12" fill="#888">Jupyter · Turtle · IDLE</text>
  <text x="440" y="286" text-anchor="middle" font-size="11" fill="#666">세계 1위 입문 언어</text>
  <text x="440" y="304" text-anchor="middle" font-size="11" fill="#666">초보자도 빠른 결과 확인</text>

  <!-- 임베디드 -->
  <rect x="580" y="218" width="240" height="110" rx="8" fill="#0f1820" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="700" y="244" text-anchor="middle" font-size="14" font-weight="700" fill="#b5cea8">임베디드 · IoT</text>
  <text x="700" y="266" text-anchor="middle" font-size="12" fill="#888">MicroPython · RPi</text>
  <text x="700" y="286" text-anchor="middle" font-size="11" fill="#666">소형 기기 프로그래밍</text>
  <text x="700" y="304" text-anchor="middle" font-size="11" fill="#666">라즈베리파이 공식 언어</text>
</svg>
