<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="50" fill="#e8e8e8" font-size="22" font-weight="700" text-anchor="middle">팝업 콜백(returnValue) 흐름</text>

  <!-- Column labels -->
  <text x="200" y="96" fill="#888" font-size="13" text-anchor="middle">Opener Form</text>
  <text x="680" y="96" fill="#888" font-size="13" text-anchor="middle">Popup Form</text>

  <!-- Opener box (top) -->
  <rect x="60" y="106" width="280" height="88" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="200" y="130" fill="#7ec8e3" font-size="14" font-weight="600" text-anchor="middle">fn_open()</text>
  <text x="200" y="152" fill="#e8e8e8" font-size="12" text-anchor="middle">openPopup(sUrl, 0, "fn_callback",</text>
  <text x="200" y="170" fill="#e8e8e8" font-size="12" text-anchor="middle">null, false, extraData)</text>
  <text x="200" y="188" fill="#888" font-size="12" text-anchor="middle">colsize: "600:450"</text>

  <!-- Popup box (top) -->
  <rect x="540" y="106" width="280" height="88" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="680" y="130" fill="#55c555" font-size="14" font-weight="600" text-anchor="middle">onInit()</text>
  <text x="680" y="152" fill="#e8e8e8" font-size="12" text-anchor="middle">var args = this.getArgs();</text>
  <text x="680" y="170" fill="#e8e8e8" font-size="12" text-anchor="middle">// mode, key 수신</text>
  <text x="680" y="188" fill="#888" font-size="12" text-anchor="middle">화면 초기화 및 조회</text>

  <!-- Arrow 1: Opener → Popup (openPopup) -->
  <line x1="340" y1="148" x2="534" y2="148" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="540,148 528,142 528,154" fill="#7ec8e3"/>
  <text x="440" y="138" fill="#7ec8e3" font-size="12" text-anchor="middle">① openPopup()</text>

  <!-- Popup close box -->
  <rect x="540" y="228" width="280" height="80" rx="8" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="680" y="252" fill="#e05555" font-size="14" font-weight="600" text-anchor="middle">fn_confirm()</text>
  <text x="680" y="272" fill="#e8e8e8" font-size="12" text-anchor="middle">this.closePopup(this.gds_result);</text>
  <text x="680" y="290" fill="#888" font-size="12" text-anchor="middle">// Dataset 또는 값 반환</text>

  <!-- Dashed connector in popup column -->
  <line x1="680" y1="194" x2="680" y2="226" stroke="#374151" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Callback box (bottom-left) -->
  <text x="200" y="334" fill="#888" font-size="13" text-anchor="middle">Opener Form — 콜백 수신</text>
  <rect x="60" y="344" width="280" height="96" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="200" y="368" fill="#55c555" font-size="14" font-weight="600" text-anchor="middle">fn_callback(objPopup, nReturn)</text>
  <text x="200" y="388" fill="#e8e8e8" font-size="12" text-anchor="middle">if (nReturn == 1) {</text>
  <text x="200" y="406" fill="#e8e8e8" font-size="12" text-anchor="middle">  ds.copyData(objPopup.gds_result);</text>
  <text x="200" y="424" fill="#888" font-size="12" text-anchor="middle">}</text>

  <!-- L-shape arrow: Popup close → Opener callback -->
  <!-- Vertical segment from popup close bottom to callback y center -->
  <line x1="680" y1="308" x2="680" y2="392" stroke="#55c555" stroke-width="2"/>
  <!-- Horizontal segment -->
  <line x1="340" y1="392" x2="680" y2="392" stroke="#55c555" stroke-width="2"/>
  <!-- Arrowhead pointing left -->
  <polygon points="340,392 352,386 352,398" fill="#55c555"/>
  <!-- Label -->
  <text x="510" y="382" fill="#55c555" font-size="12" text-anchor="middle">② closePopup(returnValue)</text>
</svg>
