<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif;background:#0a0a0a">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">JSX Props 전달 패턴</text>
  <text x="440" y="72" font-size="14" fill="#888" text-anchor="middle">spread, children, 객체 / 배열 props 활용</text>

  <!-- Spread -->
  <rect x="55" y="95" width="380" height="175" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="245" y="118" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Props Spread</text>
  <rect x="70" y="128" width="350" height="128" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="148" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// 객체를 풀어서 전달</text>
  <text x="82" y="166" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">const</text>
  <text x="124" y="166" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve"> btnProps = {</text>
  <text x="82" y="184" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">  type: </text>
  <text x="123" y="184" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">'button'</text>
  <text x="179" y="184" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">, disabled: </text>
  <text x="268" y="184" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">false</text>
  <text x="303" y="184" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">}</text>
  <text x="82" y="202" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// 아래 두 줄은 동일</text>
  <text x="82" y="220" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&lt;Button {...btnProps} /&gt;</text>
  <text x="82" y="238" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&lt;Button type="button" disabled={false} /&gt;</text>

  <!-- Children JSX -->
  <rect x="455" y="95" width="380" height="175" rx="8" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="645" y="118" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">children은 특별한 prop</text>
  <rect x="470" y="128" width="350" height="128" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="148" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// 열기/닫기 태그 사이 = children</text>
  <text x="482" y="166" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&lt;Card&gt;</text>
  <text x="482" y="184" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">  &lt;h2&gt;제목&lt;/h2&gt;</text>
  <text x="482" y="202" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">  &lt;p&gt;내용&lt;/p&gt;</text>
  <text x="482" y="220" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&lt;/Card&gt;</text>
  <text x="482" y="238" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono',monospace" xml:space="preserve">// Card의 props.children 으로 전달</text>

  <!-- Dynamic expressions row -->
  <rect x="55" y="295" width="770" height="135" rx="8" fill="#111" stroke="#ce9178" stroke-width="1.5"/>
  <text x="440" y="318" font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">동적 표현식 패턴 — 자주 쓰는 3가지</text>

  <rect x="70" y="330" width="230" height="85" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="82" y="349" font-size="12" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">// 단락 &amp;&amp;</text>
  <text x="82" y="367" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">{isLoggedIn &amp;&amp;</text>
  <text x="82" y="385" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">  &lt;UserMenu /&gt;</text>
  <text x="82" y="403" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">}</text>

  <rect x="320" y="330" width="230" height="85" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="332" y="349" font-size="12" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">// 삼항 연산자</text>
  <text x="332" y="367" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">{count &gt; 0</text>
  <text x="332" y="385" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">  ? &lt;List /&gt;</text>
  <text x="332" y="403" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">  : &lt;Empty /&gt;}</text>

  <rect x="570" y="330" width="240" height="85" rx="5" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="582" y="349" font-size="12" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono',monospace" xml:space="preserve">// ?? 널 병합</text>
  <text x="582" y="367" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">&lt;p&gt;{name ??</text>
  <text x="582" y="385" font-size="13" fill="#ce9178" font-family="'JetBrains Mono',monospace" xml:space="preserve">  '익명'</text>
  <text x="582" y="403" font-size="13" fill="#ffffff" font-family="'JetBrains Mono',monospace" xml:space="preserve">}&lt;/p&gt;</text>
</svg>
