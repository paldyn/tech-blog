<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">tsc 주요 플래그와 옵션</text>

  <!-- Table header -->
  <rect x="60" y="65" width="180" height="32" rx="4" fill="#0f1f2f" stroke="#3178c6" stroke-width="1"/>
  <text x="150" y="85" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">플래그</text>

  <rect x="250" y="65" width="380" height="32" rx="4" fill="#0f1f2f" stroke="#3178c6" stroke-width="1"/>
  <text x="440" y="85" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">설명</text>

  <rect x="640" y="65" width="180" height="32" rx="4" fill="#0f1f2f" stroke="#3178c6" stroke-width="1"/>
  <text x="730" y="85" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">예시</text>

  <!-- Row 1 -->
  <rect x="60" y="106" width="760" height="36" rx="4" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="76" y="129" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">--watch</text>
  <text x="250" y="129" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">파일 변경 감지 후 자동 재컴파일</text>
  <text x="640" y="129" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">tsc --watch</text>

  <!-- Row 2 -->
  <rect x="60" y="150" width="760" height="36" rx="4" fill="#0a0a0a" stroke="#222" stroke-width="1"/>
  <text x="76" y="173" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">--noEmit</text>
  <text x="250" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">타입 체크만, 파일 출력 없음</text>
  <text x="640" y="173" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">tsc --noEmit</text>

  <!-- Row 3 -->
  <rect x="60" y="194" width="760" height="36" rx="4" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="76" y="217" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">--target</text>
  <text x="250" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">출력 JS 버전 지정</text>
  <text x="640" y="217" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">tsc --target ES2022</text>

  <!-- Row 4 -->
  <rect x="60" y="238" width="760" height="36" rx="4" fill="#0a0a0a" stroke="#222" stroke-width="1"/>
  <text x="76" y="261" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">--strict</text>
  <text x="250" y="261" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">엄격 모드 활성화 (strictNullChecks 등)</text>
  <text x="640" y="261" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">tsc --strict</text>

  <!-- Row 5 -->
  <rect x="60" y="282" width="760" height="36" rx="4" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="76" y="305" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">--outDir</text>
  <text x="250" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">출력 디렉터리 지정</text>
  <text x="640" y="305" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">tsc --outDir dist</text>

  <!-- Row 6 -->
  <rect x="60" y="326" width="760" height="36" rx="4" fill="#0a0a0a" stroke="#222" stroke-width="1"/>
  <text x="76" y="349" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">--skipLibCheck</text>
  <text x="250" y="349" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">node_modules .d.ts 파일 타입 검사 건너뜀</text>
  <text x="640" y="349" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">tsconfig에서 설정</text>

  <!-- Row 7 -->
  <rect x="60" y="370" width="760" height="36" rx="4" fill="#111" stroke="#222" stroke-width="1"/>
  <text x="76" y="393" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">--declaration</text>
  <text x="250" y="393" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">.d.ts 선언 파일 생성 (라이브러리 배포 시)</text>
  <text x="640" y="393" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">tsc --declaration</text>

  <!-- note -->
  <text x="440" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">플래그는 CLI에서도, tsconfig.json "compilerOptions"에서도 동일하게 설정 가능</text>
  <text x="440" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">tsconfig가 있으면 CLI 인자보다 tsconfig가 우선 (--p 플래그로 경로 지정 가능)</text>
</svg>
