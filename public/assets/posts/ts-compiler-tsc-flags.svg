<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="50" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">tsconfig.json 핵심 옵션</text>
  <text x="440" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">꼭 알아야 할 컴파일러 설정</text>
  <!-- Table header -->
  <rect x="60" y="96" width="200" height="36" rx="4" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <rect x="262" y="96" width="200" height="36" rx="4" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <rect x="464" y="96" width="356" height="36" rx="4" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="160" y="119" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">옵션</text>
  <text x="362" y="119" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">값 예시</text>
  <text x="642" y="119" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">설명</text>
  <!-- Row 1 -->
  <text x="76" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">target</text>
  <text x="278" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">ES2020, ESNext</text>
  <text x="480" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">컴파일 후 JS 버전 지정</text>
  <!-- Row 2 -->
  <text x="76" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">module</text>
  <text x="278" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">commonjs, ESNext</text>
  <text x="480" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">모듈 시스템 (Node: commonjs)</text>
  <!-- Row 3 -->
  <text x="76" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" font-weight="600">strict</text>
  <text x="278" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">true</text>
  <text x="480" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">엄격 모드 활성화 (강력 권장)</text>
  <!-- Row 4 -->
  <text x="76" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">outDir</text>
  <text x="278" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">./dist</text>
  <text x="480" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">JS 출력 디렉터리</text>
  <!-- Row 5 -->
  <text x="76" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">rootDir</text>
  <text x="278" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">./src</text>
  <text x="480" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">TS 소스 루트 디렉터리</text>
  <!-- Row 6 -->
  <text x="76" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">declaration</text>
  <text x="278" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">true</text>
  <text x="480" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">.d.ts 타입 선언 파일 생성</text>
  <!-- Row 7 -->
  <text x="76" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">sourceMap</text>
  <text x="278" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">true</text>
  <text x="480" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">디버깅용 소스맵 파일 생성</text>
  <!-- Row 8 -->
  <text x="76" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" font-weight="600">noEmitOnError</text>
  <text x="278" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">true</text>
  <text x="480" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">오류 시 JS 파일 미출력</text>
  <!-- Dividers -->
  <line x1="60" y1="166" x2="820" y2="166" stroke="#1a1a3a" stroke-width="1"/>
  <line x1="60" y1="192" x2="820" y2="192" stroke="#1a1a3a" stroke-width="1"/>
  <line x1="60" y1="218" x2="820" y2="218" stroke="#1a1a3a" stroke-width="1"/>
  <line x1="60" y1="244" x2="820" y2="244" stroke="#1a1a3a" stroke-width="1"/>
  <line x1="60" y1="270" x2="820" y2="270" stroke="#1a1a3a" stroke-width="1"/>
  <line x1="60" y1="296" x2="820" y2="296" stroke="#1a1a3a" stroke-width="1"/>
  <line x1="60" y1="322" x2="820" y2="322" stroke="#1a1a3a" stroke-width="1"/>
  <line x1="60" y1="348" x2="820" y2="348" stroke="#1a1a3a" stroke-width="1"/>
  <line x1="260" y1="96" x2="260" y2="358" stroke="#1a1a3a" stroke-width="1"/>
  <line x1="462" y1="96" x2="462" y2="358" stroke="#1a1a3a" stroke-width="1"/>
  <!-- strict subflags note -->
  <rect x="60" y="370" width="760" height="72" rx="6" fill="#0d1f0d" stroke="#2d6a2d" stroke-width="1"/>
  <text x="440" y="394" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">strict: true 가 활성화하는 하위 플래그</text>
  <text x="440" y="418" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">noImplicitAny · strictNullChecks · strictFunctionTypes · strictBindCallApply · noImplicitThis</text>
  <text x="440" y="456" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">신규 프로젝트는 처음부터 strict: true 를 권장합니다</text>
</svg>
