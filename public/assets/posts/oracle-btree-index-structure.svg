<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Oracle B-Tree 인덱스 구조</text>

  <!-- Root Block -->
  <rect x="330" y="70" width="220" height="56" rx="8" fill="#0a1020" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="93" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">Root Block</text>
  <text x="440" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">분기 포인터 + 최소/최대 키</text>

  <!-- Arrow from root to branches -->
  <line x1="365" y1="126" x2="220" y2="188" stroke="#555" stroke-width="1.5"/>
  <polygon points="213,183 227,193 220,198" fill="#555"/>
  <line x1="440" y1="126" x2="440" y2="188" stroke="#555" stroke-width="1.5"/>
  <polygon points="433,188 447,188 440,200" fill="#555"/>
  <line x1="515" y1="126" x2="660" y2="188" stroke="#555" stroke-width="1.5"/>
  <polygon points="653,183 667,193 660,198" fill="#555"/>

  <!-- Branch Blocks -->
  <rect x="120" y="200" width="200" height="46" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="220" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">Branch Block</text>
  <text x="220" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">키 범위 포인터</text>

  <rect x="340" y="200" width="200" height="46" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">Branch Block</text>
  <text x="440" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">키 범위 포인터</text>

  <rect x="560" y="200" width="200" height="46" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="660" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">Branch Block</text>
  <text x="660" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">키 범위 포인터</text>

  <!-- Arrows to leaf blocks -->
  <line x1="170" y1="246" x2="110" y2="310" stroke="#555" stroke-width="1.5"/>
  <polygon points="103,305 117,315 110,320" fill="#555"/>
  <line x1="220" y1="246" x2="220" y2="310" stroke="#555" stroke-width="1.5"/>
  <polygon points="213,310 227,310 220,322" fill="#555"/>
  <line x1="270" y1="246" x2="330" y2="310" stroke="#555" stroke-width="1.5"/>
  <polygon points="323,305 337,315 330,320" fill="#555"/>
  <line x1="390" y1="246" x2="390" y2="310" stroke="#555" stroke-width="1.5"/>
  <polygon points="383,310 397,310 390,322" fill="#555"/>
  <line x1="440" y1="246" x2="500" y2="310" stroke="#555" stroke-width="1.5"/>
  <polygon points="493,305 507,315 500,320" fill="#555"/>
  <line x1="610" y1="246" x2="610" y2="310" stroke="#555" stroke-width="1.5"/>
  <polygon points="603,310 617,310 610,322" fill="#555"/>
  <line x1="660" y1="246" x2="720" y2="310" stroke="#555" stroke-width="1.5"/>
  <polygon points="713,305 727,315 720,320" fill="#555"/>
  <line x1="710" y1="246" x2="780" y2="310" stroke="#555" stroke-width="1.5"/>
  <polygon points="773,305 787,315 780,320" fill="#555"/>

  <!-- Leaf Blocks -->
  <rect x="60" y="322" width="130" height="64" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="125" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">Leaf Block</text>
  <text x="125" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Key + ROWID</text>
  <text x="125" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">← 이전 블록</text>

  <rect x="200" y="322" width="130" height="64" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="265" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">Leaf Block</text>
  <text x="265" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Key + ROWID</text>
  <text x="265" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">← → 링크</text>

  <rect x="340" y="322" width="130" height="64" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="405" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">Leaf Block</text>
  <text x="405" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Key + ROWID</text>
  <text x="405" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">← → 링크</text>

  <rect x="480" y="322" width="130" height="64" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="545" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">Leaf Block</text>
  <text x="545" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Key + ROWID</text>
  <text x="545" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">← → 링크</text>

  <rect x="620" y="322" width="100" height="64" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="670" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">Leaf</text>
  <text x="670" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Key + ROWID</text>

  <rect x="730" y="322" width="100" height="64" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="780" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">Leaf</text>
  <text x="780" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Key + ROWID</text>
  <text x="780" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">다음 블록 →</text>

  <!-- Leaf link arrows -->
  <line x1="190" y1="354" x2="200" y2="354" stroke="#55c555" stroke-width="2" stroke-dasharray="4,2"/>
  <line x1="330" y1="354" x2="340" y2="354" stroke="#55c555" stroke-width="2" stroke-dasharray="4,2"/>
  <line x1="470" y1="354" x2="480" y2="354" stroke="#55c555" stroke-width="2" stroke-dasharray="4,2"/>
  <line x1="610" y1="354" x2="620" y2="354" stroke="#55c555" stroke-width="2" stroke-dasharray="4,2"/>
  <line x1="720" y1="354" x2="730" y2="354" stroke="#55c555" stroke-width="2" stroke-dasharray="4,2"/>

  <!-- Key concepts -->
  <rect x="60" y="410" width="760" height="90" rx="8" fill="#111" stroke="#333"/>
  <text x="440" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">B-Tree 인덱스 핵심 특성</text>
  <text x="200" y="456" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">Leaf 블록 이중 연결</text>
  <text x="200" y="474" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Range Scan 최적</text>
  <text x="440" y="456" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">NULL 값 저장 안 함</text>
  <text x="440" y="474" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">IS NULL → Full Scan</text>
  <text x="680" y="456" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">항상 균형 트리</text>
  <text x="680" y="474" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Root → Leaf 항상 같은 depth</text>
  <text x="200" y="492" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">Index Split</text>
  <text x="440" y="492" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">ROWID = 물리적 위치 포인터</text>
  <text x="680" y="492" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">OLTP 최적, DW는 Bitmap 고려</text>
</svg>
