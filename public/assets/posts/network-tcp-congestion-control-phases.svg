<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">TCP 혼잡 제어 4단계</text>

  <!-- Phase 1: Slow Start -->
  <rect x="60" y="68" width="182" height="130" rx="8" fill="#0a1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="151" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">① Slow Start</text>
  <text x="72" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">시작 시 cwnd = 1 MSS</text>
  <text x="72" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">ACK마다 cwnd += 1</text>
  <text x="72" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">→ RTT마다 2배 증가</text>
  <text x="72" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">cwnd ≥ ssthresh → CA</text>
  <text x="72" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">지수 성장</text>

  <!-- Phase 2: Congestion Avoidance -->
  <rect x="254" y="68" width="182" height="130" rx="8" fill="#0a2a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="345" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">② Cong. Avoidance</text>
  <text x="266" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">cwnd &gt;= ssthresh</text>
  <text x="266" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">ACK마다 += 1/cwnd</text>
  <text x="266" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">→ RTT마다 +1 MSS</text>
  <text x="266" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">선형(AIMD) 증가</text>
  <text x="266" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">손실 감지 전까지</text>

  <!-- Phase 3: Fast Retransmit -->
  <rect x="448" y="68" width="182" height="130" rx="8" fill="#1a1a0a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="539" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#ce9178">③ Fast Retransmit</text>
  <text x="460" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">3 Dup-ACK 감지</text>
  <text x="460" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">ssthresh = cwnd/2</text>
  <text x="460" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">cwnd = ssthresh+3</text>
  <text x="460" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178">→ Fast Recovery</text>
  <text x="460" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">RTO 기다리지 않음</text>

  <!-- Phase 4: Fast Recovery -->
  <rect x="642" y="68" width="182" height="130" rx="8" fill="#1a0808" stroke="#e05555" stroke-width="1.5"/>
  <text x="733" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">④ Fast Recovery</text>
  <text x="654" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Dup-ACK마다 cwnd++</text>
  <text x="654" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">새 ACK 수신 시</text>
  <text x="654" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">cwnd = ssthresh</text>
  <text x="654" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">→ CA 재진입</text>
  <text x="654" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Tahoe는 SS부터 재시작</text>

  <!-- RTO timeout -->
  <rect x="254" y="222" width="376" height="50" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="1.5"/>
  <text x="442" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">RTO 타임아웃 (더 심한 손실)</text>
  <text x="442" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">ssthresh = cwnd/2, cwnd = 1 MSS → Slow Start 재시작</text>

  <!-- Code block -->
  <rect x="60" y="294" width="760" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># Linux TCP 혼잡 제어 알고리즘 확인/변경</text>
  <text x="76" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">sysctl net.ipv4.tcp_congestion_control</text>
  <text x="76" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># cubic (기본, Linux 2.6.19+)</text>
  <text x="76" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">sysctl -w net.ipv4.tcp_congestion_control=<text fill="#ce9178">bbr</text></text>
  <text x="76" y="396" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># bbr: 대역폭·RTT 기반 (고속장거리 링크 권장)</text>
</svg>
