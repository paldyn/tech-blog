<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">큐 (Queue) — FIFO (First In, First Out)</text>

  <!-- ─── Queue visualization ─── -->
  <!-- container -->
  <rect x="60" y="68" width="760" height="80" rx="8" fill="#0d1020" stroke="#2a3a5e" stroke-width="2"/>

  <!-- cells -->
  <rect x="180" y="78" width="110" height="60" rx="6" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="235" y="115" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="16" font-weight="600" fill="#e8e8e8">10</text>

  <rect x="298" y="78" width="110" height="60" rx="6" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="353" y="115" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="16" font-weight="600" fill="#e8e8e8">20</text>

  <rect x="416" y="78" width="110" height="60" rx="6" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="471" y="115" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="16" font-weight="600" fill="#e8e8e8">30</text>

  <rect x="534" y="78" width="110" height="60" rx="6" fill="#1a2a4a" stroke="#3a5a8a" stroke-width="1.5"/>
  <text x="589" y="115" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="16" font-weight="600" fill="#e8e8e8">40</text>

  <!-- empty slots -->
  <rect x="652" y="78" width="110" height="60" rx="6" fill="none" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="707" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#444">비어있음</text>
  <rect x="68"  y="78" width="104" height="60" rx="6" fill="none" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- FRONT / REAR labels -->
  <text x="235" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">▲ FRONT (head)</text>
  <text x="589" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">▲ REAR (tail)</text>

  <!-- enqueue arrow from right -->
  <line x1="820" y1="108" x2="769" y2="108" stroke="#55c555" stroke-width="2.5" marker-end="url(#arr-green)"/>
  <text x="822" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="end">enqueue</text>
  <text x="822" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="end">(50 입력)</text>

  <!-- dequeue arrow to left -->
  <line x1="60" y1="108" x2="112" y2="108" stroke="#e05555" stroke-width="2.5" marker-end="url(#arr-red)"/>
  <text x="58" y="104" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">dequeue</text>
  <text x="58" y="118" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">(10 출력)</text>

  <!-- ─── Operations table ─── -->
  <rect x="60" y="188" width="760" height="144" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <!-- header -->
  <text x="100" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">연산</text>
  <text x="280" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">동작</text>
  <text x="560" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">복잡도</text>
  <line x1="76" y1="218" x2="804" y2="218" stroke="#2a3a5e" stroke-width="1"/>

  <text x="100" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">enqueue(x)</text>
  <text x="280" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">rear 다음에 x 삽입, rear++</text>
  <text x="560" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">O(1)</text>

  <text x="100" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555" font-weight="600">dequeue()</text>
  <text x="280" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">front 원소 반환 후 front++</text>
  <text x="560" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">O(1)</text>

  <text x="100" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc" font-weight="600">peek()</text>
  <text x="280" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">front 원소 조회 (제거 없음)</text>
  <text x="560" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">O(1)</text>

  <text x="100" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">size()</text>
  <text x="280" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">rear - front</text>
  <text x="560" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">O(1)</text>

  <!-- ─── Use cases ─── -->
  <rect x="60" y="350" width="370" height="106" rx="8" fill="#0d1020" stroke="#2a3a5e" stroke-width="1"/>
  <text x="245" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">주요 응용</text>
  <text x="76" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• BFS (너비 우선 탐색)</text>
  <text x="76" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 프린터 스풀 / 운영체제 프로세스 스케줄링</text>
  <text x="76" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 네트워크 패킷 버퍼 / 이벤트 처리</text>
  <text x="76" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 슬라이딩 윈도우 최솟값 (덱 활용)</text>

  <!-- ─── Pitfall ─── -->
  <rect x="450" y="350" width="370" height="106" rx="8" fill="#1f0d0d" stroke="#5a2a2a" stroke-width="1"/>
  <text x="635" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">선형 배열 큐의 함정</text>
  <text x="466" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">front를 앞당길 때 앞 공간이 낭비됨</text>
  <text x="466" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">→ dequeue O(n) 문제 (앞 원소 제거 후 shift)</text>
  <text x="466" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">→ 해결: 원형 큐 또는 front 인덱스만 증가</text>
  <text x="466" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">→ Python collections.deque 사용 권장</text>
</svg>
