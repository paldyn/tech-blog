<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Visibility Map과 Index-Only Scan</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">힙 페이지별 all-visible 비트가 힙 접근 여부를 결정</text>

  <!-- Visibility Map block -->
  <text x="130" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">Visibility Map</text>
  <rect x="60" y="120" width="140" height="200" rx="8" fill="#0a1020" stroke="#7ec8e3" stroke-width="1.5"/>

  <!-- VM bits -->
  <rect x="72" y="132" width="116" height="28" rx="4" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="130" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Page 0: all-visible ✓</text>
  <rect x="72" y="166" width="116" height="28" rx="4" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="130" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Page 1: all-visible ✓</text>
  <rect x="72" y="200" width="116" height="28" rx="4" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="130" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">Page 2: dirty ✗</text>
  <rect x="72" y="234" width="116" height="28" rx="4" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="130" y="252" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Page 3: all-visible ✓</text>
  <rect x="72" y="268" width="116" height="28" rx="4" fill="#0a2010" stroke="#55c555" stroke-width="1"/>
  <text x="130" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Page 4: all-visible ✓</text>

  <!-- Arrows to heap pages -->
  <!-- Page 0 arrow - green -->
  <line x1="200" y1="146" x2="310" y2="146" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="314,146 304,141 304,151" fill="#55c555"/>

  <!-- Page 1 arrow - green -->
  <line x1="200" y1="180" x2="310" y2="200" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="314,202 303,196 305,207" fill="#55c555"/>

  <!-- Page 2 arrow - red dashed -->
  <line x1="200" y1="214" x2="310" y2="254" stroke="#e05555" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="314,256 303,250 305,261" fill="#e05555"/>

  <!-- Page 3 arrow - green -->
  <line x1="200" y1="248" x2="310" y2="308" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="314,310 303,304 305,315" fill="#55c555"/>

  <!-- Heap pages -->
  <text x="440" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">Heap Pages</text>

  <rect x="316" y="128" width="160" height="36" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="396" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Page 0 — 힙 미접근</text>

  <rect x="316" y="182" width="160" height="36" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="396" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Page 1 — 힙 미접근</text>

  <rect x="316" y="236" width="160" height="36" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="396" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">Page 2 — 힙 접근 필요</text>
  <text x="396" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">(죽은 튜플 확인)</text>

  <rect x="316" y="290" width="160" height="36" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="396" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Page 3 — 힙 미접근</text>

  <!-- Result area -->
  <text x="680" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">결과 반환</text>

  <rect x="560" y="120" width="260" height="200" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="690" y="145" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">Index-Only Scan 결과</text>

  <text x="575" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">● Page 0~1, 3: 인덱스 데이터로 반환</text>
  <text x="575" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">● Page 2: 힙에서 MVCC 검증 후 반환</text>

  <rect x="574" y="206" width="232" height="48" rx="4" fill="#111520" stroke="#444"/>
  <text x="586" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">힙 접근 최소화 =</text>
  <text x="586" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">랜덤 I/O 최소화 = 속도↑</text>

  <text x="575" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">VACUUM 후 all-visible 비트 설정</text>
  <text x="575" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">→ 다음 IOS는 힙 완전 미접근</text>

  <!-- Code block bottom -->
  <rect x="60" y="380" width="760" height="72" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="399" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">-- Index-Only Scan 통계 확인</text>
  <text x="76" y="417" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">SELECT</text>
  <text x="118" y="417" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> idx_scan, idx_tup_read, idx_tup_fetch</text>
  <text x="76" y="435" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">FROM</text>
  <text x="106" y="435" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> pg_stat_user_indexes </text>
  <text x="280" y="435" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">WHERE</text>
  <text x="316" y="435" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> indexrelname = </text>
  <text x="430" y="435" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">'idx_users_email_cov'</text>
  <text x="571" y="435" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">;</text>
</svg>
