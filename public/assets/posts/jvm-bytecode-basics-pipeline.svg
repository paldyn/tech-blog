<svg xmlns="http://www.w3.org/2000/svg" width="880" height="444" viewBox="0 0 880 444">
  <rect width="880" height="444" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">Java 컴파일 파이프라인: .java → .class → JVM 실행</text>

  <!-- ===== Box 1: Java Source ===== -->
  <rect x="60" y="74" width="200" height="304" fill="#0d1117" rx="10" stroke="#1e2433" stroke-width="1.5"/>
  <text x="160" y="100" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#e8e8e8">Java 소스 파일</text>
  <text x="160" y="118" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">Add.java</text>

  <!-- Java code block -->
  <rect x="76" y="130" width="168" height="130" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="88" y="150" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#7ec8e3">public class Add {</text>
  <text x="88" y="168" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">  static int add(</text>
  <text x="88" y="186" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">    int a, int b)</text>
  <text x="88" y="204" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">  {</text>
  <text x="88" y="222" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#7ec8e3">    return a + b;</text>
  <text x="88" y="240" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#e8e8e8">  }</text>

  <text x="160" y="278" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">사람이 작성하는 고수준 언어</text>
  <text x="160" y="296" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">플랫폼 독립적 소스</text>

  <rect x="80" y="318" width="160" height="28" fill="#1a2030" rx="6"/>
  <text x="160" y="337" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#7ec8e3">javac로 컴파일</text>

  <!-- Arrow 1 (javac) -->
  <line x1="264" y1="220" x2="300" y2="220" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="300,213 316,220 300,227" fill="#7ec8e3"/>
  <text x="290" y="210" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#7ec8e3">javac</text>

  <!-- ===== Box 2: .class file ===== -->
  <rect x="316" y="74" width="248" height="304" fill="#0d1117" rx="10" stroke="#1e2433" stroke-width="1.5"/>
  <text x="440" y="100" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#e8e8e8">.class 바이트코드</text>
  <text x="440" y="118" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">Add.class (이진 파일)</text>

  <!-- Bytecode block -->
  <rect x="332" y="130" width="216" height="148" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="344" y="150" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#6a8aa0">// add(int,int):int</text>
  <text x="344" y="168" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#7ec8e3">0: iload_0</text>
  <text x="344" y="186" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#7ec8e3">1: iload_1</text>
  <text x="344" y="204" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#7ec8e3">2: iadd</text>
  <text x="344" y="222" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#7ec8e3">3: ireturn</text>
  <text x="344" y="240" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#6a8aa0">magic: 0xCAFEBABE</text>
  <text x="344" y="258" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="12" fill="#6a8aa0">version: 65 (Java 21)</text>

  <text x="440" y="298" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#7ec8e3">플랫폼 중립적 명령어셋</text>
  <text x="440" y="316" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">JVM 명세를 따르는</text>
  <text x="440" y="334" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">모든 구현체에서 동일 실행</text>

  <rect x="340" y="352" width="200" height="28" fill="#1a2030" rx="6"/>
  <text x="440" y="371" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#7ec8e3">1B opcode + 선택적 피연산자</text>

  <!-- Arrow 2 (ClassLoader) -->
  <line x1="568" y1="220" x2="604" y2="220" stroke="#55c555" stroke-width="2"/>
  <polygon points="604,213 620,220 604,227" fill="#55c555"/>
  <text x="594" y="210" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">로드</text>

  <!-- ===== Box 3: JVM Runtime ===== -->
  <rect x="620" y="74" width="200" height="304" fill="#0d1117" rx="10" stroke="#1e2433" stroke-width="1.5"/>
  <text x="720" y="100" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#e8e8e8">JVM 실행 엔진</text>
  <text x="720" y="118" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">바이트코드 → 네이티브</text>

  <rect x="636" y="132" width="168" height="32" fill="#1a2030" rx="6"/>
  <text x="720" y="152" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#7ec8e3">① 클래스 로더</text>

  <rect x="636" y="174" width="168" height="32" fill="#1a2030" rx="6"/>
  <text x="720" y="194" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#7ec8e3">② 인터프리터</text>

  <rect x="636" y="216" width="168" height="32" fill="#1a2030" rx="6"/>
  <text x="720" y="236" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#55c555">③ JIT (C1 / C2)</text>

  <rect x="636" y="258" width="168" height="32" fill="#1a2030" rx="6"/>
  <text x="720" y="278" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e05555">④ GC / 힙 관리</text>

  <text x="720" y="318" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#7777cc">네이티브 코드 실행</text>
  <text x="720" y="338" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#6a8aa0">OS / CPU 직접 처리</text>

  <!-- Caption -->
  <text x="440" y="408" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#6a8aa0">같은 .class 파일 → Windows · Linux · macOS · ARM · x86 어디서나 동일하게 동작</text>
</svg>
