<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <!-- Title -->
    <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">이진 탐색 트리 (BST) 구조와 탐색</text>
    <text x="440" y="70" font-size="14" fill="#888" text-anchor="middle">왼쪽 서브트리 &lt; 루트 &lt; 오른쪽 서브트리 — 이진 탐색을 트리에 적용</text>

    <!-- BST Tree (left side) -->
    <!-- Root: 50 -->
    <circle cx="220" cy="130" r="26" fill="#1a2544" stroke="#7ec8e3" stroke-width="2"/>
    <text x="220" y="136" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">50</text>

    <!-- Level 1: 30, 70 -->
    <circle cx="130" cy="215" r="26" fill="#1a2544" stroke="#3a4a6e" stroke-width="1.5"/>
    <text x="130" y="221" font-size="15" font-weight="700" fill="#e8e8e8" text-anchor="middle">30</text>
    <circle cx="310" cy="215" r="26" fill="#1a2544" stroke="#3a4a6e" stroke-width="1.5"/>
    <text x="310" y="221" font-size="15" font-weight="700" fill="#e8e8e8" text-anchor="middle">70</text>

    <!-- Level 2: 20, 40, 60, 80 -->
    <circle cx="80" cy="300" r="26" fill="#1a3a1e" stroke="#3a7a3e" stroke-width="1.5"/>
    <text x="80" y="306" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">20</text>
    <circle cx="180" cy="300" r="26" fill="#1a3a1e" stroke="#3a7a3e" stroke-width="1.5"/>
    <text x="180" y="306" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">40</text>
    <circle cx="260" cy="300" r="26" fill="#1a3a1e" stroke="#3a7a3e" stroke-width="1.5"/>
    <text x="260" y="306" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">60</text>
    <circle cx="360" cy="300" r="26" fill="#1a3a1e" stroke="#3a7a3e" stroke-width="1.5"/>
    <text x="360" y="306" font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">80</text>

    <!-- Edges -->
    <line x1="200" y1="152" x2="148" y2="196" stroke="#3a4a6e" stroke-width="2"/>
    <line x1="240" y1="152" x2="292" y2="196" stroke="#3a4a6e" stroke-width="2"/>
    <line x1="116" y1="237" x2="97" y2="278" stroke="#3a4a6e" stroke-width="2"/>
    <line x1="144" y1="237" x2="163" y2="278" stroke="#3a4a6e" stroke-width="2"/>
    <line x1="296" y1="237" x2="277" y2="278" stroke="#3a4a6e" stroke-width="2"/>
    <line x1="324" y1="237" x2="343" y2="278" stroke="#3a4a6e" stroke-width="2"/>

    <!-- BST Property annotation -->
    <text x="60" y="365" font-size="12" fill="#888">중위 순회: 20, 30, 40, 50, 60, 70, 80</text>
    <text x="60" y="382" font-size="12" fill="#55c555">→ 항상 오름차순!</text>

    <!-- Search path annotation -->
    <text x="60" y="415" font-size="13" font-weight="600" fill="#ce9178">60 탐색: 50(↑right)→70(↑left)→60(찾음!)</text>
    <text x="60" y="435" font-size="12" fill="#888">비교 횟수: 3 = 트리 높이 = O(log n)</text>

    <!-- Right side: BST invariant -->
    <text x="620" y="100" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">BST 불변 조건</text>
    <rect x="480" y="112" width="340" height="120" fill="#0f1a2e" stroke="#2a3a5e" stroke-width="1" rx="6"/>
    <text x="500" y="136" font-size="13" fill="#e8e8e8">모든 노드 x에 대해:</text>
    <text x="500" y="158" font-size="13" fill="#7ec8e3">left  서브트리의 모든 값 &lt; x.val</text>
    <text x="500" y="178" font-size="13" fill="#55c555">right 서브트리의 모든 값 &gt; x.val</text>
    <text x="500" y="198" font-size="12" fill="#888">(중복 키 처리는 구현마다 다름)</text>
    <text x="500" y="218" font-size="12" fill="#888">재귀적으로 모든 서브트리에 적용</text>

    <!-- Complexity table -->
    <text x="620" y="258" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">시간복잡도</text>
    <rect x="480" y="270" width="340" height="130" fill="#0f1a2e" stroke="#2a3a5e" stroke-width="1" rx="6"/>
    <text x="500" y="294" font-size="13" font-weight="600" fill="#888">연산</text>
    <text x="680" y="294" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">평균</text>
    <text x="800" y="294" font-size="13" font-weight="600" fill="#e05555" text-anchor="end">최악</text>
    <line x1="500" y1="300" x2="800" y2="300" stroke="#2a3a5e" stroke-width="0.5"/>
    <text x="500" y="320" font-size="12" fill="#e8e8e8">검색</text>
    <text x="680" y="320" font-size="12" fill="#55c555" text-anchor="middle">O(log n)</text>
    <text x="800" y="320" font-size="12" fill="#e05555" text-anchor="end">O(n)</text>
    <text x="500" y="340" font-size="12" fill="#e8e8e8">삽입</text>
    <text x="680" y="340" font-size="12" fill="#55c555" text-anchor="middle">O(log n)</text>
    <text x="800" y="340" font-size="12" fill="#e05555" text-anchor="end">O(n)</text>
    <text x="500" y="360" font-size="12" fill="#e8e8e8">삭제</text>
    <text x="680" y="360" font-size="12" fill="#55c555" text-anchor="middle">O(log n)</text>
    <text x="800" y="360" font-size="12" fill="#e05555" text-anchor="end">O(n)</text>
    <text x="500" y="390" font-size="11" fill="#555">최악: 정렬된 데이터 삽입 시 편향 트리 발생</text>

    <!-- Bottom note -->
    <rect x="60" y="450" width="760" height="22" fill="#0f1a2e" stroke="#2a3a5e" stroke-width="1" rx="4"/>
    <text x="440" y="466" font-size="12" fill="#888" text-anchor="middle">최악을 방지하려면 자가 균형 BST(AVL, Red-Black Tree) 사용 → 항상 O(log n) 보장</text>
  </g>
</svg>
