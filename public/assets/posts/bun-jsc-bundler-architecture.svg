<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Bun 아키텍처 — JSC 기반 런타임</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">Zig 구현 + JavaScriptCore 엔진 + 올인원 도구체인</text>

  <!-- Three columns: Node.js vs Deno vs Bun -->
  <!-- Col headers -->
  <rect x="60" y="96" width="230" height="36" rx="6" fill="#1a1a2e" stroke="#1e2433"/>
  <text x="175" y="119" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">Node.js</text>

  <rect x="325" y="96" width="230" height="36" rx="6" fill="#1a1a2e" stroke="#1e2433"/>
  <text x="440" y="119" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Deno</text>

  <rect x="590" y="96" width="230" height="36" rx="6" fill="#1a2e1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="705" y="119" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">Bun</text>

  <!-- Engine row -->
  <text x="60" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">엔진</text>
  <rect x="60" y="170" width="230" height="44" rx="6" fill="#111520" stroke="#1e2433"/>
  <text x="175" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">V8 (Google)</text>

  <rect x="325" y="170" width="230" height="44" rx="6" fill="#111520" stroke="#1e2433"/>
  <text x="440" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">V8 (Google)</text>

  <rect x="590" y="170" width="230" height="44" rx="6" fill="#111520" stroke="#55c555"/>
  <text x="705" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">JavaScriptCore (Apple)</text>

  <!-- Language row -->
  <text x="60" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">구현 언어</text>
  <rect x="60" y="242" width="230" height="44" rx="6" fill="#111520" stroke="#1e2433"/>
  <text x="175" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">C++ / JavaScript</text>

  <rect x="325" y="242" width="230" height="44" rx="6" fill="#111520" stroke="#1e2433"/>
  <text x="440" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Rust</text>

  <rect x="590" y="242" width="230" height="44" rx="6" fill="#111520" stroke="#55c555"/>
  <text x="705" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">Zig</text>

  <!-- Toolchain row -->
  <text x="60" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">내장 도구</text>
  <rect x="60" y="314" width="230" height="44" rx="6" fill="#111520" stroke="#1e2433"/>
  <text x="175" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">별도 설치 필요</text>

  <rect x="325" y="314" width="230" height="44" rx="6" fill="#111520" stroke="#1e2433"/>
  <text x="440" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">fmt · lint · test</text>

  <rect x="590" y="314" width="230" height="44" rx="6" fill="#111520" stroke="#55c555"/>
  <text x="705" y="333" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">bundler · transpiler</text>
  <text x="705" y="351" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">test · fmt · pkg mgr</text>

  <!-- Bottom summary -->
  <rect x="60" y="376" width="760" height="60" rx="8" fill="#111520" stroke="#1e2433"/>
  <text x="440" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">Bun = 런타임 + 번들러 + 트랜스파일러 + 패키지 매니저 + 테스트 러너</text>
  <text x="440" y="422" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">하나의 바이너리로 Node.js 생태계 전체를 대체하는 것이 목표</text>
</svg>
