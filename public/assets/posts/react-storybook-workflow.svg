<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" style="background:#0a0a0a;border-radius:12px;">
  <defs>
    <marker id="arrBlue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">스토리 하나로 할 수 있는 일</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">한 번 작성한 상태 명세를 네 가지 도구가 재사용한다</text>

  <!-- Corner boxes -->
  <rect x="60" y="110" width="280" height="70" rx="8" fill="#0d1a2d" stroke="#7ec8e3" stroke-width="2"/>
  <text x="200" y="138" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">격리 개발</text>
  <text x="200" y="160" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">라우팅·전역 상태 없이 컴포넌트만 띄운다</text>

  <rect x="540" y="110" width="280" height="70" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="2"/>
  <text x="680" y="138" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Autodocs 문서화</text>
  <text x="680" y="160" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">args 기반 자동 문서 + Controls 패널</text>

  <rect x="60" y="310" width="280" height="70" rx="8" fill="#1a1a00" stroke="#e8c800" stroke-width="2"/>
  <text x="200" y="338" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8c800">play 인터랙션 테스트</text>
  <text x="200" y="360" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">스토리 위에서 user-event 시나리오 실행</text>

  <rect x="540" y="310" width="280" height="70" rx="8" fill="#200d0d" stroke="#e05555" stroke-width="2"/>
  <text x="680" y="338" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">시각 회귀 테스트</text>
  <text x="680" y="360" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Chromatic 등으로 픽셀 변화 감지</text>

  <!-- Center node -->
  <rect x="350" y="210" width="180" height="64" rx="12" fill="#12121f" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="236" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">스토리</text>
  <text x="440" y="258" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">컴포넌트 상태의 명세</text>

  <!-- Arrows from center -->
  <line x1="385" y1="210" x2="265" y2="180" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrBlue)"/>
  <line x1="495" y1="210" x2="615" y2="180" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrBlue)"/>
  <line x1="385" y1="274" x2="265" y2="310" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrBlue)"/>
  <line x1="495" y1="274" x2="615" y2="310" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrBlue)"/>

  <text x="440" y="420" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">스토리를 잘 쪼개 두는 것이 문서·테스트·리뷰 품질을 한꺼번에 끌어올린다</text>
</svg>
