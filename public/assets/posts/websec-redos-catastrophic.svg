<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ReDoS: &#xC7AC;&#xC559;&#xC801; &#xBC31;&#xD2B8;&#xB798;&#xD0B9;</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#9aa4b8" text-anchor="middle">ReDoS – Catastrophic Backtracking</text>

  <!-- Code box: vulnerable regex -->
  <rect x="30" y="96" width="820" height="152" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <rect x="30" y="96" width="820" height="32" rx="8" fill="#0f1929"/>
  <rect x="30" y="112" width="820" height="16" fill="#0f1929"/>
  <circle cx="54" cy="112" r="5" fill="#e05a5a"/>
  <circle cx="72" cy="112" r="5" fill="#d4c027"/>
  <circle cx="90" cy="112" r="5" fill="#4ec94e"/>
  <text x="440" y="117" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8" text-anchor="middle">redos-vulnerable.js</text>

  <text x="58" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// &#x274C; &#xCDE8;&#xC57D;&#xD55C; &#xC815;&#xADDC;&#xC2DD; (&#xC9C0;&#xC218; &#xBCF5;&#xC7A1;&#xB3C4;)</text>
  <text x="58" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> regex = /^(a+)+$/</tspan></text>
  <text x="58" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// &#xC785;&#xB825;: "aaaaaaaaaaX"</text>
  <text x="58" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// &#x2192; &#xC218;&#xBC31;&#xB9CC; &#xBC88; &#xBC31;&#xD2B8;&#xB798;&#xD0B9; &#xBC1C;&#xC0DD;!</text>

  <!-- Backtracking tree visualization -->
  <text x="440" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#9aa4b8" text-anchor="middle">&#xBC31;&#xD2B8;&#xB798;&#xD0B9; &#xD2B8;&#xB9AC; &#xC131;&#xC7A5; (&#xC785;&#xB825; &#xAE38;&#xC774;&#xC5D0; &#xB530;&#xB77C; &#xC9C0;&#xC218;&#xC801; &#xD3ED;&#xBC1C;)</text>

  <!-- Tree nodes representing exponential branching -->
  <!-- Root -->
  <circle cx="440" cy="300" r="10" fill="#e05a5a"/>
  <text x="440" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9" fill="#ffffff" text-anchor="middle">a+</text>

  <!-- Level 1 -->
  <line x1="420" y1="310" x2="340" y2="330" stroke="#d4c027" stroke-width="1.5"/>
  <line x1="460" y1="310" x2="540" y2="330" stroke="#d4c027" stroke-width="1.5"/>
  <circle cx="330" cy="338" r="8" fill="#e08a3a"/>
  <circle cx="550" cy="338" r="8" fill="#e08a3a"/>

  <!-- Level 2 -->
  <line x1="316" y1="345" x2="266" y2="365" stroke="#d4c027" stroke-width="1.2"/>
  <line x1="344" y1="345" x2="394" y2="365" stroke="#d4c027" stroke-width="1.2"/>
  <line x1="536" y1="345" x2="486" y2="365" stroke="#d4c027" stroke-width="1.2"/>
  <line x1="564" y1="345" x2="614" y2="365" stroke="#d4c027" stroke-width="1.2"/>
  <circle cx="258" cy="372" r="6" fill="#d4c027"/>
  <circle cx="402" cy="372" r="6" fill="#d4c027"/>
  <circle cx="478" cy="372" r="6" fill="#d4c027"/>
  <circle cx="622" cy="372" r="6" fill="#d4c027"/>

  <!-- Level 3 with many nodes -->
  <line x1="249" y1="378" x2="220" y2="394" stroke="#7ec8e3" stroke-width="1"/>
  <line x1="267" y1="378" x2="296" y2="394" stroke="#7ec8e3" stroke-width="1"/>
  <line x1="393" y1="378" x2="364" y2="394" stroke="#7ec8e3" stroke-width="1"/>
  <line x1="411" y1="378" x2="440" y2="394" stroke="#7ec8e3" stroke-width="1"/>
  <line x1="469" y1="378" x2="440" y2="394" stroke="#7ec8e3" stroke-width="1"/>
  <line x1="487" y1="378" x2="516" y2="394" stroke="#7ec8e3" stroke-width="1"/>
  <line x1="613" y1="378" x2="584" y2="394" stroke="#7ec8e3" stroke-width="1"/>
  <line x1="631" y1="378" x2="660" y2="394" stroke="#7ec8e3" stroke-width="1"/>
  <circle cx="212" cy="400" r="5" fill="#7ec8e3"/>
  <circle cx="304" cy="400" r="5" fill="#7ec8e3"/>
  <circle cx="356" cy="400" r="5" fill="#7ec8e3"/>
  <circle cx="448" cy="400" r="5" fill="#7ec8e3"/>
  <circle cx="524" cy="400" r="5" fill="#7ec8e3"/>
  <circle cx="668" cy="400" r="5" fill="#7ec8e3"/>

  <!-- Ellipsis for more levels -->
  <text x="160" y="415" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e05a5a">. . .</text>
  <text x="720" y="415" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e05a5a">. . .</text>

  <!-- Complexity labels -->
  <rect x="300" y="418" width="280" height="32" rx="6" fill="#1a0808" stroke="#e05a5a" stroke-width="1"/>
  <text x="440" y="439" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05a5a" text-anchor="middle">&#xC2DC;&#xAC04; &#xBCF5;&#xC7A1;&#xB3C4;: O(2&#x207F;) &#x2014; &#xC785;&#xB825; &#xD55C; &#xAE00;&#xC790;&#xB9C8;&#xB2E4; &#xACBD;&#xC6B0;&#xC758; &#xC218; &#xBC30;&#xC99D;</text>

  <!-- Footer -->
  <line x1="30" y1="468" x2="850" y2="468" stroke="#3a4a6e" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="440" y="484" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555e77" text-anchor="middle">ReDoS (Regular Expression Denial of Service) – CWE-1333</text>
</svg>
