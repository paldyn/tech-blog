<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Nexacro N 다국어(i18n) 구조</text>

  <!-- Center: i18n Engine -->
  <rect x="340" y="180" width="200" height="70" rx="10" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">i18n 엔진</text>
  <text x="440" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">텍스트 ID → 언어별 값</text>
  <text x="440" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">현재 언어 컨텍스트 관리</text>

  <!-- Left: Language Resources -->
  <rect x="60" y="90" width="200" height="60" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">언어 리소스 파일</text>
  <text x="160" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ko.xml / en.xml / jp.xml</text>

  <rect x="60" y="190" width="200" height="60" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">TypeDefinition</text>
  <text x="160" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">언어별 리소스 등록</text>

  <rect x="60" y="290" width="200" height="60" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="160" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">DB 기반 다국어</text>
  <text x="160" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">서버 조회 후 Dataset 적재</text>

  <!-- Right: Consumers -->
  <rect x="620" y="90" width="200" height="60" rx="8" fill="#1a1a0d" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="720" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#b5cea8" text-anchor="middle">컴포넌트 텍스트</text>
  <text x="720" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">text 속성 자동 교체</text>

  <rect x="620" y="190" width="200" height="60" rx="8" fill="#1a1a0d" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="720" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#b5cea8" text-anchor="middle">스크립트 메시지</text>
  <text x="720" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">gfn_getText() 호출</text>

  <rect x="620" y="290" width="200" height="60" rx="8" fill="#1a1a0d" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="720" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#b5cea8" text-anchor="middle">그리드 헤더/코드</text>
  <text x="720" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Dataset 바인딩으로 적용</text>

  <!-- Arrows left to center -->
  <line x1="260" y1="120" x2="334" y2="200" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <line x1="260" y1="220" x2="334" y2="220" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <line x1="260" y1="320" x2="334" y2="240" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- Arrows center to right -->
  <line x1="546" y1="200" x2="614" y2="120" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="546" y1="220" x2="614" y2="220" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="546" y1="240" x2="614" y2="320" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Language selector -->
  <rect x="340" y="360" width="200" height="60" rx="8" fill="#1a0d1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">언어 전환 트리거</text>
  <text x="440" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">setLanguage() → 화면 갱신</text>

  <line x1="440" y1="360" x2="440" y2="256" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr)"/>
</svg>
