<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Docker 보안 레이어</text>

  <!-- Layer 1: Host -->
  <rect x="60" y="68" width="760" height="72" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="140" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">① 호스트 OS 보안</text>
  <text x="140" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">커널 버전 최신화 · SELinux/AppArmor 활성화 · 호스트 사용자 최소 권한</text>
  <text x="720" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">기반</text>

  <!-- Layer 2: Docker daemon -->
  <rect x="80" y="156" width="720" height="72" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">② Docker daemon 보안</text>
  <text x="160" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">TLS 인증 · rootless mode · Docker socket 접근 제한 · daemon.json 강화</text>

  <!-- Layer 3: Image -->
  <rect x="100" y="244" width="680" height="72" rx="8" fill="#1a1a2e" stroke="#55c555" stroke-width="1.5"/>
  <text x="180" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">③ 이미지 보안</text>
  <text x="180" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">신뢰할 수 있는 베이스 이미지 · 취약점 스캔 · 최소 이미지 · 비밀 제외</text>

  <!-- Layer 4: Container runtime -->
  <rect x="120" y="332" width="640" height="72" rx="8" fill="#1a1a2e" stroke="#e05555" stroke-width="1.5"/>
  <text x="200" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">④ 컨테이너 런타임 보안</text>
  <text x="200" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">비루트 사용자 · read-only rootfs · --cap-drop · seccomp/AppArmor 프로파일</text>

  <!-- Layer 5: App -->
  <rect x="140" y="420" width="600" height="44" rx="8" fill="#1a1a2e" stroke="#ce9178" stroke-width="1.5"/>
  <text x="440" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">⑤ 애플리케이션 보안 · 시크릿 관리 · 네트워크 격리</text>
</svg>
