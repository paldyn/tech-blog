<svg width="880" height="480" viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#e8e8e8" text-anchor="middle">ES6 주요 기능 — 6대 카테고리</text>

  <!-- Category 1: Variables -->
  <rect x="30" y="68" width="250" height="116" rx="10" fill="#0d1018" stroke="#3a4a7a" stroke-width="1.2"/>
  <text x="155" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7888cc" text-anchor="middle">변수 &amp; 스코프</text>
  <text x="46" y="114" font-family="'Courier New',monospace" font-size="11" fill="#8888ff">let</text>
  <text x="80" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">블록 스코프 변수</text>
  <text x="46" y="132" font-family="'Courier New',monospace" font-size="11" fill="#8888ff">const</text>
  <text x="88" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">재할당 불가 바인딩</text>
  <text x="46" y="150" font-family="'Courier New',monospace" font-size="11" fill="#8888ff">TDZ</text>
  <text x="80" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">일시적 사각지대</text>
  <text x="46" y="168" font-family="'Courier New',monospace" font-size="11" fill="#8888ff">{ }</text>
  <text x="65" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">블록 스코핑</text>

  <!-- Category 2: Functions -->
  <rect x="310" y="68" width="250" height="116" rx="10" fill="#0d180d" stroke="#2a6a2a" stroke-width="1.2"/>
  <text x="435" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#4caf7d" text-anchor="middle">함수 개선</text>
  <text x="326" y="114" font-family="'Courier New',monospace" font-size="11" fill="#4caf7d">() =&gt;</text>
  <text x="374" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">화살표 함수, this 고정</text>
  <text x="326" y="132" font-family="'Courier New',monospace" font-size="11" fill="#4caf7d">default</text>
  <text x="380" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">기본 매개변수</text>
  <text x="326" y="150" font-family="'Courier New',monospace" font-size="11" fill="#4caf7d">...rest</text>
  <text x="375" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">나머지 매개변수</text>
  <text x="326" y="168" font-family="'Courier New',monospace" font-size="11" fill="#4caf7d">...</text>
  <text x="345" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">스프레드 연산자</text>

  <!-- Category 3: Data structures -->
  <rect x="590" y="68" width="258" height="116" rx="10" fill="#180d0d" stroke="#6a2a2a" stroke-width="1.2"/>
  <text x="719" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05252" text-anchor="middle">자료구조</text>
  <text x="606" y="114" font-family="'Courier New',monospace" font-size="11" fill="#e05252">Map</text>
  <text x="636" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">키-값, 순회 가능</text>
  <text x="606" y="132" font-family="'Courier New',monospace" font-size="11" fill="#e05252">Set</text>
  <text x="632" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">중복 없는 값 집합</text>
  <text x="606" y="150" font-family="'Courier New',monospace" font-size="11" fill="#e05252">WeakMap</text>
  <text x="668" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">약한 참조 맵</text>
  <text x="606" y="168" font-family="'Courier New',monospace" font-size="11" fill="#e05252">Symbol</text>
  <text x="660" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">고유 식별자</text>

  <!-- Category 4: Syntax sugar -->
  <rect x="30" y="210" width="250" height="116" rx="10" fill="#18150a" stroke="#6a5a10" stroke-width="1.2"/>
  <text x="155" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#f4c542" text-anchor="middle">문법 편의</text>
  <text x="46" y="256" font-family="'Courier New',monospace" font-size="11" fill="#f4c542">`${}`</text>
  <text x="86" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">템플릿 리터럴</text>
  <text x="46" y="274" font-family="'Courier New',monospace" font-size="11" fill="#f4c542">{a,b}</text>
  <text x="92" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">구조 분해 할당</text>
  <text x="46" y="292" font-family="'Courier New',monospace" font-size="11" fill="#f4c542">{key}</text>
  <text x="90" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">단축 프로퍼티명</text>
  <text x="46" y="310" font-family="'Courier New',monospace" font-size="11" fill="#f4c542">class</text>
  <text x="84" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">프로토타입 문법설탕</text>

  <!-- Category 5: Async -->
  <rect x="310" y="210" width="250" height="116" rx="10" fill="#100d18" stroke="#4a2a7a" stroke-width="1.2"/>
  <text x="435" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#aa88ff" text-anchor="middle">비동기</text>
  <text x="326" y="256" font-family="'Courier New',monospace" font-size="11" fill="#aa88ff">Promise</text>
  <text x="382" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">비동기 값 표현</text>
  <text x="326" y="274" font-family="'Courier New',monospace" font-size="11" fill="#aa88ff">function*</text>
  <text x="396" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">제너레이터 함수</text>
  <text x="326" y="292" font-family="'Courier New',monospace" font-size="11" fill="#aa88ff">for..of</text>
  <text x="380" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">이터러블 순회</text>
  <text x="326" y="310" font-family="'Courier New',monospace" font-size="11" fill="#aa88ff">Symbol.iterator</text>
  <text x="450" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">커스텀 이터러블</text>

  <!-- Category 6: Module -->
  <rect x="590" y="210" width="258" height="116" rx="10" fill="#0d1510" stroke="#2a5a3a" stroke-width="1.2"/>
  <text x="719" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#5aaa7a" text-anchor="middle">모듈 시스템</text>
  <text x="606" y="256" font-family="'Courier New',monospace" font-size="11" fill="#5aaa7a">import</text>
  <text x="654" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">모듈 가져오기</text>
  <text x="606" y="274" font-family="'Courier New',monospace" font-size="11" fill="#5aaa7a">export</text>
  <text x="654" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">모듈 내보내기</text>
  <text x="606" y="292" font-family="'Courier New',monospace" font-size="11" fill="#5aaa7a">export default</text>
  <text x="718" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">기본 내보내기</text>
  <text x="606" y="310" font-family="'Courier New',monospace" font-size="11" fill="#5aaa7a">import()</text>
  <text x="660" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">동적 import</text>

  <!-- Bottom note -->
  <text x="440" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#888" text-anchor="middle">ES6 = 하나의 업데이트가 아니라, JavaScript라는 언어의 재탄생</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="440" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">class, module, Promise, arrow function, let/const — 모두 2015년에 동시 등장</text>

  <!-- Legend badge -->
  <rect x="300" y="400" width="280" height="48" rx="8" fill="#141414" stroke="#333" stroke-width="1"/>
  <text x="440" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#aaa" text-anchor="middle">ECMAScript 2015 (ES6)</text>
  <text x="440" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">TC39 / ECMA International 표준 — 2015년 6월 확정</text>
</svg>
