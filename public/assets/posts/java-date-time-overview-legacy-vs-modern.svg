<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">레거시 날짜 API vs java.time</text>

  <!-- Legacy column -->
  <rect x="60" y="80" width="360" height="142" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">java.util.Date · Calendar (레거시)</text>
  <text x="240" y="134" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">가변(mutable) — set으로 상태가 바뀜</text>
  <text x="240" y="156" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">월이 0부터 시작 (0 = 1월) — 버그 온상</text>
  <text x="240" y="178" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">SimpleDateFormat은 스레드 불안전</text>
  <text x="240" y="200" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">날짜·시간·타임존 개념이 한 클래스에 혼재</text>

  <!-- Modern column -->
  <rect x="460" y="80" width="360" height="142" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">java.time (JSR-310, Java 8+)</text>
  <text x="640" y="134" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">불변(immutable) — 연산마다 새 객체 반환</text>
  <text x="640" y="156" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">1월 = 1 — 직관적인 값 체계</text>
  <text x="640" y="178" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">DateTimeFormatter는 스레드 안전</text>
  <text x="640" y="200" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">사람의 시간 / 기계의 시간 타입 분리</text>

  <!-- Code comparison -->
  <text x="440" y="256" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">동일한 작업, 두 가지 코드</text>

  <rect x="60" y="272" width="760" height="176" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="298" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 레거시 — Calendar (Java 7 이하)</text>
  <text x="76" y="317" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">Calendar cal = Calendar.getInstance();</text>
  <text x="76" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">cal.set(<tspan fill="#b5cea8">2026</tspan>, <tspan fill="#b5cea8">5</tspan>, <tspan fill="#b5cea8">12</tspan>);  <tspan fill="#9aa4b8">// 5는 6월!</tspan></text>
  <text x="76" y="355" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">Date date = cal.getTime();</text>
  <text x="76" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// java.time (Java 8+)</text>
  <text x="76" y="403" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">LocalDate d = LocalDate.of(<tspan fill="#b5cea8">2026</tspan>, <tspan fill="#b5cea8">6</tspan>, <tspan fill="#b5cea8">12</tspan>);</text>
  <text x="76" y="422" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">LocalDate next = d.plusWeeks(<tspan fill="#b5cea8">1</tspan>);</text>
</svg>
