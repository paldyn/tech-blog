<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="ar" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="21" font-weight="700" fill="#e8e8e8" text-anchor="middle">스레드 기초 — 프로세스 vs 스레드</text>
  <text x="440" y="64" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">동시성 프로그래밍의 핵심 단위 이해</text>

  <!-- Process box -->
  <rect x="60" y="85" width="760" height="270" rx="10" fill="#111" stroke="#7777cc" stroke-width="2"/>
  <text x="100" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">JVM 프로세스</text>

  <!-- Shared resources -->
  <rect x="80" y="124" width="420" height="40" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="290" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">공유 자원: 힙(Heap) · 메서드 영역 · 코드 · 파일 핸들</text>

  <!-- Thread 1 -->
  <rect x="80" y="178" width="200" height="160" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">Thread 1 (main)</text>
  <text x="100" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">• PC Register</text>
  <text x="100" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">• JVM Stack (고유)</text>
  <text x="100" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">• Native Method Stack</text>
  <text x="100" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">→ 힙은 공유</text>
  <text x="100" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">→ 스택은 독립</text>
  <text x="100" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">OS 스레드에 1:1 매핑</text>

  <!-- Thread 2 -->
  <rect x="300" y="178" width="200" height="160" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="400" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">Thread 2</text>
  <text x="320" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">• PC Register</text>
  <text x="320" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">• JVM Stack (고유)</text>
  <text x="320" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">• Native Method Stack</text>
  <text x="320" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">→ 힙은 공유</text>
  <text x="320" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">→ 스택은 독립</text>
  <text x="320" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">OS 스레드에 1:1 매핑</text>

  <!-- Virtual Thread (separate) -->
  <rect x="520" y="178" width="290" height="160" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="665" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">Virtual Thread (Java 21+)</text>
  <text x="540" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">• M:N 매핑 (수백만 개 가능)</text>
  <text x="540" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">• 블로킹 I/O → OS 스레드 양보</text>
  <text x="540" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">• ForkJoinPool 캐리어 스레드</text>
  <text x="540" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">스레드 수 = 요청 수 모델 가능</text>
  <text x="540" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">기존 Thread API 그대로 사용</text>
  <text x="540" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">Thread.ofVirtual().start(task)</text>

  <!-- Why use threads -->
  <rect x="60" y="380" width="760" height="80" rx="6" fill="#111" stroke="#3a3a3a" stroke-width="1"/>
  <text x="440" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8" text-anchor="middle">스레드가 필요한 이유</text>
  <text x="175" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">응답성 (UI 블로킹 방지)</text>
  <text x="370" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">처리량 (멀티코어 활용)</text>
  <text x="570" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8" text-anchor="middle">I/O 대기 중 다른 작업</text>
  <text x="760" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">비동기 이벤트 처리</text>
  <text x="440" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">공유 메모리 → 경쟁 조건(Race Condition) 주의 / 불변 객체 + 동기화 필수</text>
</svg>
