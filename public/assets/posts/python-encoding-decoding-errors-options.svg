<svg xmlns="http://www.w3.org/2000/svg" width="880" height="330" viewBox="0 0 880 330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="330" rx="12" fill="#0a0a0a"/>
  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">errors 인자: 깨진 바이트를 어떻게 처리할까</text>

  <!-- row 1 -->
  <rect x="60" y="80" width="260" height="48" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="78" y="110" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" font-weight="600">errors='strict'</text>
  <text x="350" y="110" font-size="14" fill="#cccccc">기본값 — 예외 발생(권장 출발점)</text>

  <!-- row 2 -->
  <rect x="60" y="140" width="260" height="48" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="78" y="170" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" font-weight="600">errors='ignore'</text>
  <text x="350" y="170" font-size="14" fill="#cccccc">깨진 바이트를 그냥 버림(데이터 손실)</text>

  <!-- row 3 -->
  <rect x="60" y="200" width="260" height="48" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="78" y="230" font-size="14" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" font-weight="600">errors='replace'</text>
  <text x="350" y="230" font-size="14" fill="#cccccc">U+FFFD(◆) 기호로 치환</text>

  <!-- row 4 -->
  <rect x="60" y="260" width="260" height="48" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="78" y="290" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" font-weight="600">backslashreplace</text>
  <text x="350" y="290" font-size="14" fill="#cccccc">\xNN 형태로 보존(복원·디버깅용)</text>
</svg>
