<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Optional 안티패턴 7가지</text>

  <!-- Pattern 1 -->
  <rect x="60" y="64" width="370" height="62" rx="8" fill="#2a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="80" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">① isPresent() + get()</text>
  <text x="80" y="106" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">if(opt.isPresent()) return opt.get();</text>
  <text x="80" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ orElseThrow() / ifPresent() 사용</text>

  <!-- Pattern 2 -->
  <rect x="450" y="64" width="370" height="62" rx="8" fill="#2a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="470" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">② 메서드 파라미터에 Optional</text>
  <text x="470" y="106" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">void process(Optional&lt;String&gt; name)</text>
  <text x="470" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ 오버로딩 또는 @Nullable 파라미터</text>

  <!-- Pattern 3 -->
  <rect x="60" y="144" width="370" height="62" rx="8" fill="#2a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="80" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">③ 필드에 Optional</text>
  <text x="80" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">private Optional&lt;String&gt; name;</text>
  <text x="80" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ nullable 필드로 선언</text>

  <!-- Pattern 4 -->
  <rect x="450" y="144" width="370" height="62" rx="8" fill="#2a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="470" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">④ Optional&lt;List&gt; 반환</text>
  <text x="470" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Optional&lt;List&lt;User&gt;&gt; findAll()</text>
  <text x="470" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ 빈 컬렉션 반환</text>

  <!-- Pattern 5 -->
  <rect x="60" y="224" width="370" height="62" rx="8" fill="#2a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="80" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">⑤ 중첩 Optional</text>
  <text x="80" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Optional&lt;Optional&lt;String&gt;&gt; nested</text>
  <text x="80" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ flatMap()으로 평탄화</text>

  <!-- Pattern 6 -->
  <rect x="450" y="224" width="370" height="62" rx="8" fill="#2a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="470" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">⑥ 비용 큰 식을 orElse에</text>
  <text x="470" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">opt.orElse(dao.createDefault())</text>
  <text x="470" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ orElseGet(() -&gt; dao.createDefault())</text>

  <!-- Pattern 7 -->
  <rect x="255" y="304" width="370" height="62" rx="8" fill="#2a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="275" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">⑦ Optional.get() 호출</text>
  <text x="275" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">String val = opt.get();</text>
  <text x="275" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ orElseThrow() 사용</text>

  <!-- Summary -->
  <rect x="60" y="388" width="760" height="90" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="410" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// Optional 사용 결정 기준</text>
  <text x="76" y="430" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> (메서드가 값을 반환하고, 그 값이 없을 수 있다면)</tspan></text>
  <text x="76" y="450" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    Optional을 </tspan><tspan fill="#7ec8e3" font-weight="600">반환 타입</tspan><tspan fill="#ffffff">으로 사용 </tspan><tspan fill="#9aa4b8">// 딱 이 경우만</tspan></text>
  <text x="76" y="470" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">else</tspan><tspan fill="#ffffff">    null 허용 타입, @Nullable, 빈 컬렉션 활용</tspan></text>
</svg>
