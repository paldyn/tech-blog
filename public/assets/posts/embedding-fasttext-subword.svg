<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="10.5" refY="5.25" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,10.5 L14,5.25 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrowGreen" markerWidth="14" markerHeight="14" refX="10.5" refY="5.25" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,10.5 L14,5.25 z" fill="#55c555"/>
    </marker>
    <marker id="arrowGray" markerWidth="14" markerHeight="14" refX="10.5" refY="5.25" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L0,10.5 L14,5.25 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">FastText 부분 단어(Subword) 분해</text>

  <!-- Section 1: Word decomposition -->
  <text x="80" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3">단어 → 문자 n-gram 분해</text>

  <!-- Original word -->
  <rect x="80" y="100" width="130" height="44" fill="#1a1a2e" rx="8" stroke="#7777cc" stroke-width="2"/>
  <text x="145" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#e8e8e8" text-anchor="middle">학습한다</text>

  <!-- Arrow right -->
  <polygon points="218,122 250,122 250,116 270,122 250,128 250,122" fill="#555"/>
  <text x="244" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">분해</text>

  <!-- n-gram chips - row 1 (2-grams) -->
  <text x="280" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">2-gram</text>
  <rect x="280" y="100" width="54" height="28" fill="#141428" rx="5" stroke="#7777cc" stroke-width="1"/>
  <text x="307" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">&lt;학습</text>
  <rect x="340" y="100" width="54" height="28" fill="#141428" rx="5" stroke="#7777cc" stroke-width="1"/>
  <text x="367" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">학습한</text>
  <rect x="400" y="100" width="54" height="28" fill="#141428" rx="5" stroke="#7777cc" stroke-width="1"/>
  <text x="427" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">습한다</text>
  <rect x="460" y="100" width="54" height="28" fill="#141428" rx="5" stroke="#7777cc" stroke-width="1"/>
  <text x="487" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">한다&gt;</text>

  <!-- n-gram chips - row 2 (3-grams) -->
  <text x="280" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">3-gram</text>
  <rect x="280" y="146" width="64" height="28" fill="#0d1a0d" rx="5" stroke="#55c555" stroke-width="1"/>
  <text x="312" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">&lt;학습한</text>
  <rect x="350" y="146" width="64" height="28" fill="#0d1a0d" rx="5" stroke="#55c555" stroke-width="1"/>
  <text x="382" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">학습한다</text>
  <rect x="420" y="146" width="64" height="28" fill="#0d1a0d" rx="5" stroke="#55c555" stroke-width="1"/>
  <text x="452" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">습한다&gt;</text>

  <!-- full word chip -->
  <text x="500" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">전체</text>
  <rect x="500" y="146" width="80" height="28" fill="#1a150d" rx="5" stroke="#e8a020" stroke-width="1.5"/>
  <text x="540" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8a020" text-anchor="middle">&lt;학습한다&gt;</text>

  <!-- Arrow down to sum -->
  <line x1="440" y1="182" x2="440" y2="214" stroke="#555" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <text x="455" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">합산</text>

  <!-- Sum box -->
  <rect x="320" y="218" width="240" height="44" fill="#111" rx="8" stroke="#e8a020" stroke-width="1.5"/>
  <text x="440" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">v(학습한다) =</text>
  <text x="440" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8a020" text-anchor="middle">Σ v(subword_i)</text>

  <!-- Section 2: OOV handling -->
  <line x1="60" y1="290" x2="820" y2="290" stroke="#222" stroke-width="1"/>
  <text x="80" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e05555">OOV 단어 처리 비교</text>

  <!-- Word2Vec OOV -->
  <rect x="80" y="332" width="340" height="100" fill="#111" rx="8" stroke="#333" stroke-width="1"/>
  <text x="250" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">Word2Vec (실패)</text>
  <rect x="100" y="366" width="120" height="32" fill="#2a1a1a" rx="6" stroke="#e05555" stroke-width="1"/>
  <text x="160" y="387" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">새로운단어</text>
  <text x="236" y="387" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#e05555" text-anchor="middle">→</text>
  <rect x="258" y="366" width="140" height="32" fill="#1a0a0a" rx="6" stroke="#e05555" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="328" y="387" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">KeyError ✗</text>
  <text x="250" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666" text-anchor="middle">훈련 어휘에 없으면 처리 불가</text>

  <!-- FastText OOV -->
  <rect x="460" y="332" width="360" height="100" fill="#111" rx="8" stroke="#333" stroke-width="1"/>
  <text x="640" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">FastText (성공)</text>
  <rect x="480" y="366" width="120" height="32" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="540" y="387" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">새로운단어</text>
  <text x="616" y="387" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" fill="#55c555" text-anchor="middle">→</text>
  <rect x="634" y="366" width="164" height="32" fill="#0d1a0d" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="716" y="387" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">부분 단어로 추론 ✓</text>
  <text x="640" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666" text-anchor="middle">알려진 n-gram으로 벡터 합성</text>

  <!-- Korean morphology note -->
  <rect x="80" y="450" width="740" height="24" fill="#0d0d1a" rx="6"/>
  <text x="440" y="466" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">한국어처럼 형태소가 풍부한 언어에서 특히 강력 — 조사, 어미 변형도 부분 단어로 처리</text>
</svg>
