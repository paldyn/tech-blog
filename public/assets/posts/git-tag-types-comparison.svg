<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-tt" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888"/>
    </marker>
    <marker id="arr-tt2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Lightweight vs Annotated 태그 비교</text>

  <!-- LEFT: Lightweight -->
  <text x="200" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">Lightweight 태그</text>

  <!-- Commit object -->
  <rect x="80" y="100" width="200" height="66" rx="8" fill="#1a2233" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="180" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Commit 객체</text>
  <text x="180" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">abc1234</text>
  <text x="180" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">tree · author · message</text>

  <!-- Arrow: tag ref → commit -->
  <rect x="80" y="190" width="200" height="44" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="180" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">refs/tags/v1.0</text>
  <text x="180" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">→ abc1234 (직접 참조)</text>

  <!-- Arrow down -->
  <line x1="180" y1="166" x2="180" y2="189" stroke="#888" stroke-width="2" marker-end="url(#arr-tt)"/>

  <!-- Lightweight properties -->
  <rect x="80" y="258" width="200" height="110" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="180" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">특징</text>
  <text x="180" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">• 별도 태그 객체 없음</text>
  <text x="180" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">• 메시지·서명 불가</text>
  <text x="180" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">• 태거(tagger) 정보 없음</text>
  <text x="180" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">• 개인 북마크에 적합</text>

  <!-- Divider -->
  <line x1="440" y1="80" x2="440" y2="430" stroke="#2a2a2a" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- RIGHT: Annotated -->
  <text x="660" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">Annotated 태그</text>

  <!-- Tag object -->
  <rect x="480" y="100" width="220" height="86" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="590" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Tag 객체</text>
  <text x="590" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">def5678</text>
  <text x="590" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">tagger · date · message</text>
  <text x="590" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">object → abc1234</text>

  <!-- Arrow: tag obj → commit -->
  <line x1="590" y1="186" x2="590" y2="212" stroke="#55c555" stroke-width="2" marker-end="url(#arr-tt2)"/>

  <!-- Commit object (right) -->
  <rect x="480" y="214" width="220" height="50" rx="8" fill="#1a2233" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="590" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Commit 객체</text>
  <text x="590" y="253" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">abc1234</text>

  <!-- Tag ref → tag object -->
  <rect x="480" y="285" width="220" height="44" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="590" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">refs/tags/v1.0</text>
  <text x="590" y="323" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">→ def5678 (태그 객체)</text>
  <line x1="590" y1="264" x2="590" y2="284" stroke="#888" stroke-width="2" marker-end="url(#arr-tt)"/>

  <!-- Annotated properties -->
  <rect x="480" y="352" width="220" height="120" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="590" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">특징</text>
  <text x="590" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">• 별도 Tag 객체 생성</text>
  <text x="590" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">• 메시지 포함 가능</text>
  <text x="590" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">• GPG 서명 지원</text>
  <text x="590" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">• 릴리스 태그에 권장</text>
</svg>
