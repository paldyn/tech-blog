<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 20 7, 0 14" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
    <marker id="arr2" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 20 7, 0 14" fill="#55c555" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
  </defs>

  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Java Stack과 스택 프레임 구조</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">스레드별로 독립 · 메서드 호출마다 Frame 생성 · LIFO</text>

  <!-- Left: Thread Java Stack -->
  <rect x="60" y="88" width="250" height="388" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5" rx="8"/>
  <text x="185" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">Thread Stack</text>
  <text x="185" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">(스레드 고유 · LIFO)</text>

  <!-- Frame 3 (top - current) -->
  <rect x="80" y="144" width="210" height="72" fill="#0f1e2e" stroke="#7ec8e3" stroke-width="1.2" rx="6"/>
  <text x="185" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">Frame 3: add(a, b)</text>
  <text x="185" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">지역변수 · 오퍼랜드 스택</text>
  <text x="185" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">← 현재 실행 중</text>
  <text x="80" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">TOP</text>

  <!-- Frame 2 -->
  <rect x="80" y="224" width="210" height="60" fill="#111820" stroke="#555" stroke-width="1" rx="6"/>
  <text x="185" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">Frame 2: calculate()</text>
  <text x="185" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">add() 호출 후 대기</text>
  <text x="80" y="243" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">  2</text>

  <!-- Frame 1 -->
  <rect x="80" y="292" width="210" height="60" fill="#111820" stroke="#555" stroke-width="1" rx="6"/>
  <text x="185" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">Frame 1: main()</text>
  <text x="185" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">calculate() 호출 후 대기</text>
  <text x="80" y="311" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">BOT</text>

  <!-- Stack overflow warning -->
  <rect x="80" y="380" width="210" height="72" fill="#1a0a0a" stroke="#e05555" stroke-width="1" rx="6" stroke-dasharray="4,3"/>
  <text x="185" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">StackOverflowError</text>
  <text x="185" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">무한 재귀 등으로</text>
  <text x="185" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">스택 공간 초과 시 발생</text>

  <!-- Middle: Frame Detail -->
  <rect x="340" y="88" width="240" height="388" fill="#0d1117" stroke="#55c555" stroke-width="1.5" rx="8"/>
  <text x="460" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">Stack Frame 내부</text>
  <text x="460" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">(Frame 3 상세)</text>

  <!-- Local Variable Array -->
  <rect x="360" y="144" width="200" height="80" fill="#0a1a0a" stroke="#55c555" stroke-width="1" rx="6"/>
  <text x="460" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">Local Variable Array</text>
  <text x="370" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">[0] this  → 현재 인스턴스</text>
  <text x="370" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">[1] a     → int 파라미터</text>
  <text x="370" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">[2] b     → int 파라미터</text>

  <!-- Operand Stack -->
  <rect x="360" y="234" width="200" height="80" fill="#0a1a0a" stroke="#55c555" stroke-width="1" rx="6"/>
  <text x="460" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">Operand Stack</text>
  <text x="370" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">iload_1  (a 값 push)</text>
  <text x="370" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">iload_2  (b 값 push)</text>
  <text x="370" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">iadd     (덧셈 후 pop)</text>

  <!-- Frame Data -->
  <rect x="360" y="324" width="200" height="60" fill="#0a1a0a" stroke="#55c555" stroke-width="1" rx="6"/>
  <text x="460" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">Frame Data</text>
  <text x="370" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">반환 주소 / 예외 테이블</text>
  <text x="370" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">Constant Pool 참조</text>

  <!-- Right: Code block -->
  <rect x="610" y="88" width="210" height="388" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="8"/>
  <text x="715" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">예시 코드</text>

  <text x="626" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">class</text>
  <text x="666" y="138" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> Calc {</text>

  <text x="626" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">  int</tspan><tspan fill="#ffffff"> add(</tspan><tspan fill="#7ec8e3">int</tspan><tspan fill="#ffffff"> a,</tspan></text>

  <text x="626" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">          int</tspan><tspan fill="#ffffff"> b) {</tspan></text>

  <text x="626" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    return</tspan><tspan fill="#ffffff"> a + b;</tspan></text>

  <text x="626" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  }</text>

  <text x="626" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">  int</tspan><tspan fill="#ffffff"> calculate() {</tspan></text>

  <text x="626" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">    return</tspan><tspan fill="#ffffff"> add(</tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff">,</tspan></text>

  <text x="626" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#b5cea8">                  4</tspan><tspan fill="#ffffff">);</tspan></text>

  <text x="626" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  }</text>

  <text x="626" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">  void</tspan><tspan fill="#ffffff"> main(</tspan><tspan fill="#ffffff">...) {</tspan></text>

  <text x="626" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    calculate();</text>
  <text x="626" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  }</text>
  <text x="626" y="378" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>

  <!-- Arrows: Stack → Frame detail -->
  <line x1="310" y1="188" x2="340" y2="188" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Footer labels -->
  <text x="185" y="500" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">스레드별 독립 스택</text>
  <text x="460" y="500" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Frame 3개 = 호출 깊이 3</text>
  <text x="715" y="500" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">실제 호출 코드</text>
</svg>
