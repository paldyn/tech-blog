<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr3" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">컨텍스트 매니저 클래스 프로토콜</text>

  <!-- Box 1: with statement -->
  <rect x="260" y="60" width="360" height="52" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="82" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">with MyCtx() as x:</text>
  <text x="440" y="101" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">with 문 진입</text>

  <!-- Arrow 1 -->
  <line x1="440" y1="112" x2="440" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr1)"/>

  <!-- Box 2: __enter__ -->
  <rect x="270" y="148" width="340" height="52" rx="8" fill="#0d2b1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">__enter__(self)</text>
  <text x="440" y="189" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">반환값이 x 에 바인딩됨</text>

  <!-- Arrow 2 -->
  <line x1="440" y1="200" x2="440" y2="228" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- Box 3: body -->
  <rect x="290" y="236" width="300" height="52" rx="8" fill="#1a1a1a" stroke="#888" stroke-width="1.5"/>
  <text x="440" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">블록 본문 실행</text>
  <text x="440" y="277" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">with 블록 내부 코드</text>

  <!-- Fork arrows: left (normal), right (exception) -->
  <line x1="380" y1="288" x2="220" y2="330" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>
  <line x1="500" y1="288" x2="660" y2="330" stroke="#e05555" stroke-width="2" marker-end="url(#arr3)"/>

  <!-- Labels for fork -->
  <text x="265" y="317" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">정상 종료</text>
  <text x="615" y="317" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">예외 발생</text>

  <!-- Box 4a: __exit__ normal -->
  <rect x="60" y="338" width="320" height="62" rx="8" fill="#0d2b1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="220" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">__exit__(None, None, None)</text>
  <text x="220" y="381" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">정상 종료 — exc 인수 모두 None</text>
  <text x="220" y="395" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">반환값 무시</text>

  <!-- Box 4b: __exit__ exception -->
  <rect x="500" y="338" width="320" height="62" rx="8" fill="#2b0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="660" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">__exit__(type, val, tb)</text>
  <text x="660" y="381" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">True → 예외 억제 / False → 전파</text>
  <text x="660" y="395" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">exc_type, exc_val, exc_tb 전달</text>

  <!-- Bottom labels -->
  <text x="220" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">→ 블록 정상 종료</text>
  <text x="660" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">→ 예외 처리 여부 결정</text>

  <!-- Key note box -->
  <rect x="220" y="452" width="440" height="30" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="472" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">클래스에 __enter__ / __exit__ 두 메서드를 구현하면 컨텍스트 매니저가 된다</text>
</svg>
