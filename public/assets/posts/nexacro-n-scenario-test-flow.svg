<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="660" viewBox="0 0 880 660">
  <defs>
    <marker id="arrow" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 L5,7 Z" fill="#555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="660" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">시나리오 테스트 흐름</text>

  <!-- Phase 1 -->
  <rect x="140" y="62" width="600" height="100" rx="8" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="86" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3">① 테스트 시나리오 설계</text>
  <text x="440" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">사용자 스토리 기반 시나리오 작성</text>
  <text x="440" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Happy Path + Edge Case 정의</text>
  <text x="440" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">테스트 데이터 준비</text>

  <!-- Arrow 1→2 -->
  <line x1="440" y1="162" x2="440" y2="180" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 2 -->
  <rect x="140" y="182" width="600" height="100" rx="8" fill="#1a1a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7777cc">② 테스트 환경 구성</text>
  <text x="440" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">스테이징 서버 접속 정보 설정</text>
  <text x="440" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">테스트 계정 준비</text>
  <text x="440" y="264" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">초기 데이터 세팅</text>

  <!-- Arrow 2→3 -->
  <line x1="440" y1="282" x2="440" y2="300" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 3 -->
  <rect x="140" y="302" width="600" height="100" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555">③ 시나리오 실행</text>
  <text x="440" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">단계별 UI 동작 확인</text>
  <text x="440" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">화면 전환, 팝업, 그리드 조작</text>
  <text x="440" y="384" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">트랜잭션 결과 검증</text>

  <!-- Arrow 3→4 -->
  <line x1="440" y1="402" x2="440" y2="420" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 4 -->
  <rect x="140" y="422" width="600" height="100" rx="8" fill="#1a1a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="446" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7777cc">④ 결과 기록</text>
  <text x="440" y="468" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">통과/실패 체크리스트 작성</text>
  <text x="440" y="486" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">스크린샷 캡처</text>
  <text x="440" y="504" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">버그 리포트 생성</text>

  <!-- Arrow 4→5 -->
  <line x1="440" y1="522" x2="440" y2="540" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Phase 5 -->
  <rect x="140" y="542" width="600" height="90" rx="8" fill="#1a1a0a" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="440" y="567" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#b5cea8">⑤ 회귀 방지</text>
  <text x="440" y="591" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">수정 후 동일 시나리오 재실행</text>
  <text x="440" y="613" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">시나리오 라이브러리에 추가</text>
</svg>
