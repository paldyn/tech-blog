<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">배열의 메모리 구조</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">연속된 메모리 블록에 같은 타입 원소를 순서대로 저장</text>

  <!-- Memory layout -->
  <text x="80" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">메모리 주소:</text>
  <text x="80" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#666">0x1000</text>
  <text x="195" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#666">0x1004</text>
  <text x="310" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#666">0x1008</text>
  <text x="425" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#666">0x100C</text>
  <text x="540" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#666">0x1010</text>
  <text x="655" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#666">0x1014</text>

  <!-- Array cells -->
  <rect x="80" y="138" width="105" height="60" rx="4" fill="#0f1a2e" stroke="#3a6ea8" stroke-width="2"/>
  <text x="132" y="165" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="18" font-weight="600" fill="#7ec8e3" text-anchor="middle">10</text>
  <text x="132" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">arr[0]</text>

  <rect x="190" y="138" width="105" height="60" rx="4" fill="#0f1a2e" stroke="#3a6ea8" stroke-width="2"/>
  <text x="242" y="165" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="18" font-weight="600" fill="#7ec8e3" text-anchor="middle">25</text>
  <text x="242" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">arr[1]</text>

  <rect x="300" y="138" width="105" height="60" rx="4" fill="#0f1a2e" stroke="#3a6ea8" stroke-width="2"/>
  <text x="352" y="165" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="18" font-weight="600" fill="#7ec8e3" text-anchor="middle">37</text>
  <text x="352" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">arr[2]</text>

  <rect x="410" y="138" width="105" height="60" rx="4" fill="#0f1a2e" stroke="#3a6ea8" stroke-width="2"/>
  <text x="462" y="165" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="18" font-weight="600" fill="#7ec8e3" text-anchor="middle">42</text>
  <text x="462" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">arr[3]</text>

  <rect x="520" y="138" width="105" height="60" rx="4" fill="#0f1a2e" stroke="#3a6ea8" stroke-width="2"/>
  <text x="572" y="165" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="18" font-weight="600" fill="#7ec8e3" text-anchor="middle">58</text>
  <text x="572" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">arr[4]</text>

  <rect x="630" y="138" width="105" height="60" rx="4" fill="#0f1a2e" stroke="#3a6ea8" stroke-width="2"/>
  <text x="682" y="165" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="18" font-weight="600" fill="#7ec8e3" text-anchor="middle">71</text>
  <text x="682" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">arr[5]</text>

  <!-- Formula -->
  <rect x="80" y="220" width="380" height="50" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="270" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">arr[i] 주소 계산 공식</text>
  <text x="270" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8" text-anchor="middle">base + i × element_size</text>

  <!-- Example calculation -->
  <rect x="480" y="220" width="360" height="50" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="660" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">arr[3] 주소 예시</text>
  <text x="660" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8e8e8" text-anchor="middle">0x1000 + 3 × 4 = 0x100C</text>

  <!-- Operations -->
  <rect x="80" y="290" width="760" height="120" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="314" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">// 기본 연산 복잡도</tspan>
  </text>
  <text x="96" y="334" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">arr[</tspan>
    <tspan fill="#b5cea8">3</tspan>
    <tspan fill="#ffffff">]        = </tspan>
    <tspan fill="#b5cea8">42</tspan>
    <tspan fill="#ffffff">   </tspan>
    <tspan fill="#9aa4b8">// O(1) 읽기 — 주소 계산 1회</tspan>
  </text>
  <text x="96" y="354" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">arr[</tspan>
    <tspan fill="#b5cea8">3</tspan>
    <tspan fill="#ffffff">] = </tspan>
    <tspan fill="#b5cea8">99</tspan>
    <tspan fill="#ffffff">      </tspan>
    <tspan fill="#9aa4b8">// O(1) 쓰기</tspan>
  </text>
  <text x="96" y="374" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">insert(arr, </tspan>
    <tspan fill="#b5cea8">2</tspan>
    <tspan fill="#ffffff">, val) </tspan>
    <tspan fill="#9aa4b8">// O(n) 삽입 — 원소 이동 필요</tspan>
  </text>
  <text x="96" y="394" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">delete(arr, </tspan>
    <tspan fill="#b5cea8">2</tspan>
    <tspan fill="#ffffff">)    </tspan>
    <tspan fill="#9aa4b8">// O(n) 삭제 — 원소 당김 필요</tspan>
  </text>
</svg>
