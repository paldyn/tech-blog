<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" markerWidth="21" markerHeight="14" refX="17.5" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0, 21 7, 0 14" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">클래스 로딩 3단계 프로세스</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">Loading → Linking (Verify + Prepare + Resolve) → Initialization</text>

  <!-- Phase 1: Loading -->
  <rect x="60" y="88" width="220" height="360" fill="#0d1117" stroke="#7777cc" stroke-width="1.5" rx="8"/>
  <text x="170" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7777cc" text-anchor="middle">① 로딩</text>
  <text x="170" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Loading</text>

  <rect x="80" y="148" width="180" height="56" fill="#0f0f1e" stroke="#7777cc" stroke-width="1" rx="4"/>
  <text x="170" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">바이너리 스트림 읽기</text>
  <text x="170" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">파일시스템 / JAR / 네트워크</text>

  <rect x="80" y="216" width="180" height="40" fill="#0f0f1e" stroke="#7777cc" stroke-width="1" rx="4"/>
  <text x="170" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">Method Area에 저장</text>
  <text x="170" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">(클래스 메타데이터)</text>

  <rect x="80" y="268" width="180" height="40" fill="#0f0f1e" stroke="#7777cc" stroke-width="1" rx="4"/>
  <text x="170" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">java.lang.Class 객체</text>
  <text x="170" y="301" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Heap에 생성</text>

  <rect x="80" y="320" width="180" height="104" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="4"/>
  <text x="92" y="341" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 수동 로딩 예시</text>
  <text x="92" y="359" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">Class&lt;?&gt; cls =</text>
  <text x="92" y="377" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff"> Class</tspan><tspan fill="#ffffff">.forName(</tspan></text>
  
  <text x="92" y="395" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">  "com.App"</text>
  <text x="92" y="413" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">);</text>

  <!-- Arrow 1→2 -->
  <line x1="280" y1="268" x2="310" y2="268" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Phase 2: Linking -->
  <rect x="310" y="88" width="240" height="360" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.5" rx="8"/>
  <text x="430" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">② 링킹</text>
  <text x="430" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Linking</text>

  <!-- Verify -->
  <rect x="330" y="148" width="200" height="68" fill="#0f1e2e" stroke="#7ec8e3" stroke-width="1" rx="4"/>
  <text x="430" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">2-1. Verification</text>
  <text x="330" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">  • 바이트코드 무결성 검사</text>
  <text x="330" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">  • 실패 → VerifyError</text>

  <!-- Prepare -->
  <rect x="330" y="226" width="200" height="68" fill="#0f1e2e" stroke="#7ec8e3" stroke-width="1" rx="4"/>
  <text x="430" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">2-2. Preparation</text>
  <text x="330" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">  • static 필드에 기본값 할당</text>
  <text x="330" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">  • int=0, ref=null, bool=false</text>

  <!-- Resolve -->
  <rect x="330" y="304" width="200" height="68" fill="#0f1e2e" stroke="#7ec8e3" stroke-width="1" rx="4"/>
  <text x="430" y="323" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">2-3. Resolution</text>
  <text x="330" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">  • 심볼릭 참조 → 직접 참조</text>
  <text x="330" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">  • 선택적: Lazy or Eager</text>

  <!-- Linking note -->
  <rect x="330" y="382" width="200" height="44" fill="#0a0a1a" stroke="#555" stroke-width="1" rx="4"/>
  <text x="430" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">순서: Verify → Prepare</text>
  <text x="430" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Resolve는 이후 언제든</text>

  <!-- Arrow 2→3 -->
  <line x1="550" y1="268" x2="580" y2="268" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Phase 3: Initialization -->
  <rect x="580" y="88" width="240" height="360" fill="#0d1117" stroke="#55c555" stroke-width="1.5" rx="8"/>
  <text x="700" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">③ 초기화</text>
  <text x="700" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Initialization</text>

  <rect x="600" y="148" width="200" height="60" fill="#0a1a0a" stroke="#55c555" stroke-width="1" rx="4"/>
  <text x="700" y="167" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">&lt;clinit&gt; 실행</text>
  <text x="600" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8">  • static 블록 + static 필드</text>
  <text x="600" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">  • 단 한 번 · JVM이 직렬화</text>

  <rect x="600" y="218" width="200" height="44" fill="#0a1a0a" stroke="#55c555" stroke-width="1" rx="4"/>
  <text x="700" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">트리거 조건</text>
  <text x="600" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">  • new / static 접근 / 리플렉션</text>

  <rect x="600" y="272" width="200" height="164" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="4"/>
  <text x="612" y="293" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">class</text>
  <text x="646" y="293" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> DB {</text>
  <text x="612" y="311" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">  static</tspan><tspan fill="#ffffff"> String URL;</tspan></text>
  
  <text x="612" y="329" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  static</text>
  <text x="664" y="329" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> {</text>
  <text x="612" y="347" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">    // &lt;clinit&gt;</text>
  <text x="612" y="365" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    URL =</text>
  <text x="612" y="383" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">      "jdbc:..."</text>
  <text x="612" y="401" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  }</text>
  <text x="612" y="419" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>

  <!-- Bottom labels -->
  <text x="170" y="478" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">최초 사용 전까지 지연</text>
  <text x="430" y="478" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">바이트코드 유효성 보장</text>
  <text x="700" y="478" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">스레드 안전 보장 (JVM)</text>
</svg>
