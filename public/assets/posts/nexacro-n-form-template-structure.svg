<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">폼 템플릿 복사 → 업무 폼 생성 흐름</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">TPL_*.xfdl → 복사 → 이름 변경 → 업무 로직 채우기</text>

  <!-- Template files -->
  <rect x="40" y="96" width="240" height="290" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">템플릿 파일들</text>

  <rect x="56" y="132" width="208" height="52" rx="6" fill="#111" stroke="#555"/>
  <text x="160" y="155" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">TPL_single.xfdl</text>
  <text x="160" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">단건 조회·입력 폼</text>

  <rect x="56" y="196" width="208" height="52" rx="6" fill="#111" stroke="#555"/>
  <text x="160" y="219" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">TPL_list.xfdl</text>
  <text x="160" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">목록 조회 그리드 폼</text>

  <rect x="56" y="260" width="208" height="52" rx="6" fill="#111" stroke="#555"/>
  <text x="160" y="283" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">TPL_list_detail.xfdl</text>
  <text x="160" y="301" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">목록 + 상세 복합 폼</text>

  <rect x="56" y="324" width="208" height="52" rx="6" fill="#111" stroke="#555"/>
  <text x="160" y="347" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" text-anchor="middle">TPL_popup.xfdl</text>
  <text x="160" y="365" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">공통 팝업 베이스</text>

  <!-- Arrow: copy -->
  <line x1="280" y1="241" x2="380" y2="241" stroke="#555" stroke-width="2"/>
  <polygon points="388,241 376,235 376,247" fill="#555"/>
  <text x="334" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">복사·이름변경</text>

  <!-- Business form result -->
  <rect x="388" y="120" width="240" height="242" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="508" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">업무 폼 (완성)</text>

  <text x="404" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">SCR001_주문조회.xfdl</text>
  <text x="404" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">  → 조건·그리드 배치 완료</text>
  <text x="404" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">  → fn_search() override</text>

  <text x="404" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">SCR002_품목등록.xfdl</text>
  <text x="404" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">  → 입력 필드 배치 완료</text>
  <text x="404" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">  → fn_save() override</text>

  <text x="404" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">POP001_품목선택.xfdl</text>
  <text x="404" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">  → 팝업 레이아웃 완성</text>
  <text x="404" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">  → 파라미터 수신 코드</text>
  <text x="404" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">  → 선택값 반환 코드</text>

  <!-- What templates provide -->
  <rect x="668" y="96" width="192" height="290" rx="8" fill="#1a1208" stroke="#e8a840" stroke-width="1.5"/>
  <text x="764" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8a840" text-anchor="middle">템플릿이 제공하는 것</text>

  <text x="684" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">레이아웃 영역</text>
  <text x="684" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">  검색조건 Div</text>
  <text x="684" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">  결과 그리드 Div</text>
  <text x="684" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">  버튼 툴바 Div</text>

  <text x="684" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">빈 Dataset</text>
  <text x="684" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">  ds_cond (검색조건)</text>
  <text x="684" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">  ds_list  (결과목록)</text>

  <text x="684" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">훅 메서드 스텁</text>
  <text x="684" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">  fn_init()  { }</text>
  <text x="684" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">  fn_search(){ }</text>
  <text x="684" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">  fn_save()  { }</text>
  <text x="684" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">  fn_delete(){ }</text>

  <text x="440" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#555" text-anchor="middle">템플릿에서 업무 폼까지: 레이아웃 배치 + 컬럼 정의 + 훅 override만 하면 완성</text>
</svg>
