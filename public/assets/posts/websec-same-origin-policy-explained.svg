<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">동일 출처 정책(SOP) 동작 원리</text>

  <!-- Origin definition -->
  <rect x="60" y="68" width="760" height="72" rx="8" fill="#0a100a" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">출처(Origin) = 프로토콜 + 호스트 + 포트</text>
  <rect x="240" y="100" width="400" height="30" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="120" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7ec8e3" font-weight="600" xml:space="preserve">https://app.example.com:443/path?q=1</text>

  <!-- Origin breakdown -->
  <text x="262" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">https://</text>
  <text x="362" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e09040">app.example.com</text>
  <text x="530" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">:443</text>
  <text x="262" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">프로토콜</text>
  <text x="382" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">호스트</text>
  <text x="530" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">포트</text>

  <!-- Same origin examples -->
  <text x="60" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">기준: https://app.example.com:443</text>

  <!-- Allowed -->
  <rect x="60" y="208" width="370" height="130" rx="8" fill="#0a100a" stroke="#55c555" stroke-width="1"/>
  <text x="245" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">동일 출처 (허용)</text>
  <text x="76" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">https://app.example.com/api</text>
  <text x="424" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="end">경로만 다름</text>
  <text x="76" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">https://app.example.com/page?a=1</text>
  <text x="76" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" xml:space="preserve">✓ 응답 내용 읽기 가능</text>
  <text x="76" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" xml:space="preserve">✓ DOM 직접 접근 가능</text>
  <text x="76" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" xml:space="preserve">✓ 쿠키·스토리지 공유</text>

  <!-- Blocked -->
  <rect x="450" y="208" width="370" height="130" rx="8" fill="#1a0505" stroke="#e05555" stroke-width="1"/>
  <text x="635" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">다른 출처 (차단)</text>
  <text x="466" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">http://app.example.com</text>
  <text x="770" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="end">프로토콜 다름</text>
  <text x="466" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">https://sub.example.com</text>
  <text x="770" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="end">서브도메인 다름</text>
  <text x="466" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">https://example.com</text>
  <text x="770" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="end">호스트 다름</text>
  <text x="466" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">https://app.example.com:8080</text>
  <text x="770" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="end">포트 다름</text>
  <text x="466" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" xml:space="preserve">✗ 응답 내용 읽기 불가</text>

  <!-- SOP protects what -->
  <text x="60" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">SOP가 막는 것 vs 막지 않는 것</text>

  <rect x="60" y="390" width="370" height="86" rx="8" fill="#0a100a" stroke="#55c555" stroke-width="1"/>
  <text x="245" y="410" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">SOP가 차단하는 것</text>
  <text x="76" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• fetch/XHR 응답 읽기 (교차 출처)</text>
  <text x="76" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 다른 출처 iframe의 DOM 접근</text>
  <text x="76" y="466" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 다른 출처 스크립트의 쿠키 접근</text>

  <rect x="450" y="390" width="370" height="86" rx="8" fill="#1a1000" stroke="#e09040" stroke-width="1"/>
  <text x="635" y="410" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e09040">SOP가 차단하지 않는 것</text>
  <text x="466" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• 교차 출처 요청 전송 (응답을 못 읽을 뿐)</text>
  <text x="466" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• &lt;img&gt; &lt;script&gt; &lt;link&gt; 리소스 로드</text>
  <text x="466" y="466" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• &lt;form&gt; 제출 (CSRF의 원인)</text>
</svg>
