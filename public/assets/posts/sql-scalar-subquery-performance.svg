<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">스칼라 서브쿼리 성능 — JOIN 대체 비교</text>

  <!-- Bad: correlated scalar in SELECT -->
  <rect x="50" y="72" width="360" height="148" fill="#1a0e0e" rx="8" stroke="#e05555"/>
  <text x="230" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">✗ 상관 서브쿼리 — 행별 실행</text>
  <rect x="66" y="104" width="328" height="104" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="82" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">SELECT</text>
  <text x="82" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  o.order_id,</text>
  <text x="82" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  (<tspan fill="#7ec8e3">SELECT</tspan> name <tspan fill="#7ec8e3">FROM</tspan> customers c</text>
  <text x="82" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">   <tspan fill="#7ec8e3">WHERE</tspan> c.id = o.cust_id) cname</text>
  <text x="82" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">FROM</text>
  <text x="82" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">     orders o;  <tspan fill="#6a8aa0">-- N번 실행</tspan></text>

  <!-- Good: JOIN -->
  <rect x="470" y="72" width="360" height="148" fill="#0a180e" rx="8" stroke="#55c555"/>
  <text x="650" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">✓ LEFT JOIN 대체 — 1회 조인</text>
  <rect x="486" y="104" width="328" height="104" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="502" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">SELECT</text>
  <text x="502" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  o.order_id,</text>
  <text x="502" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  c.name AS cname</text>
  <text x="502" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">FROM</text>
  <text x="502" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">     orders o</text>
  <text x="502" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">  LEFT JOIN</text>
  <text x="502" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">            customers c <tspan fill="#7ec8e3">USING</tspan>(id);</text>

  <!-- Non-correlated: safe usage -->
  <rect x="50" y="242" width="780" height="132" fill="#0d0d0d" rx="8" stroke="#7777cc"/>
  <text x="440" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">비상관 스칼라 서브쿼리 — 안전한 활용 패턴</text>

  <rect x="66" y="276" width="360" height="84" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="82" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">-- WHERE 절: 최신 주문과 같은 금액</text>
  <text x="82" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">SELECT</text>
  <text x="82" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">       * <tspan fill="#7ec8e3">FROM</tspan> orders</text>
  <text x="82" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">WHERE</text>
  <text x="82" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">      amount = (<tspan fill="#7ec8e3">SELECT MAX</tspan>(amount)</text>
  <text x="82" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">               <tspan fill="#7ec8e3">FROM</tspan> orders);</text>

  <rect x="454" y="276" width="360" height="84" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="470" y="296" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">-- HAVING: 부서 평균 초과 부서</text>
  <text x="470" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">SELECT</text>
  <text x="470" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">       dept, <tspan fill="#7ec8e3">AVG</tspan>(salary)</text>
  <text x="470" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">FROM</text>
  <text x="470" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">     emp <tspan fill="#7ec8e3">GROUP BY</tspan> dept</text>
  <text x="470" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">HAVING</text>
  <text x="470" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">       <tspan fill="#7ec8e3">AVG</tspan>(salary)&gt;(<tspan fill="#7ec8e3">SELECT AVG</tspan>(salary) <tspan fill="#7ec8e3">FROM</tspan> emp);</text>
</svg>
