<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">PECS — Producer Extends, Consumer Super</text>

  <!-- Center: Your code box -->
  <rect x="330" y="154" width="220" height="80" fill="#1e1b4b" rx="10" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#a5b4fc" text-anchor="middle">당신의 코드</text>
  <text x="440" y="203" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">(데이터를 읽거나 씀)</text>
  <text x="440" y="223" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#9aa4b8" text-anchor="middle">Collections.copy(dest, src)</text>

  <!-- Left: Producer -->
  <rect x="40" y="130" width="240" height="128" fill="#0a1628" rx="10" stroke="#7ec8e3" stroke-width="2"/>
  <text x="160" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">Producer (src)</text>
  <text x="160" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">? extends T</text>
  <text x="160" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">데이터를 제공 (읽기)</text>
  <text x="160" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8" text-anchor="middle">List&lt;Integer&gt;, List&lt;Double&gt; 등</text>
  <text x="160" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8" text-anchor="middle">모두 Number의 하위 타입 허용</text>

  <!-- Right: Consumer -->
  <rect x="600" y="130" width="240" height="128" fill="#081a08" rx="10" stroke="#55c555" stroke-width="2"/>
  <text x="720" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">Consumer (dest)</text>
  <text x="720" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">? super T</text>
  <text x="720" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">데이터를 받음 (쓰기)</text>
  <text x="720" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8" text-anchor="middle">List&lt;Number&gt;, List&lt;Object&gt; 등</text>
  <text x="720" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8" text-anchor="middle">Integer의 상위 타입 모두 허용</text>

  <!-- Arrows -->
  <defs>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-l" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <line x1="280" y1="194" x2="328" y2="194" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-r)"/>
  <text x="304" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">읽기</text>
  <line x1="552" y1="194" x2="600" y2="194" stroke="#55c555" stroke-width="2" marker-end="url(#arr-l)"/>
  <text x="576" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">쓰기</text>

  <!-- Memory aid box -->
  <rect x="40" y="300" width="800" height="62" fill="#111111" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">암기법: Producer Extends — 데이터를 꺼내 쓸 컬렉션엔 extends</text>
  <text x="440" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">Consumer Super — 데이터를 넣을 컬렉션엔 super</text>
</svg>
