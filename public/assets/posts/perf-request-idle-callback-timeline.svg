<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">requestIdleCallback — 프레임 유휴 시간</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">브라우저가 한가한 틈새에 비핵심 작업 수행</text>

  <!-- Frame timeline -->
  <text x="60" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">렌더 프레임 (~16.67ms / 60fps)</text>

  <!-- Frame 1 -->
  <rect x="60" y="118" width="90" height="36" rx="4" fill="#1a2a4a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="105" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">JS 실행</text>
  <rect x="150" y="118" width="50" height="36" rx="4" fill="#2a1a4a" stroke="#7777cc" stroke-width="1"/>
  <text x="175" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">렌더</text>
  <!-- Idle in frame 1 -->
  <rect x="200" y="118" width="70" height="36" rx="4" fill="#0d2a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="235" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">유휴 시간</text>
  <text x="235" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">rIC 실행</text>

  <!-- Frame 2 -->
  <rect x="276" y="118" width="90" height="36" rx="4" fill="#1a2a4a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="321" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">JS 실행</text>
  <rect x="366" y="118" width="50" height="36" rx="4" fill="#2a1a4a" stroke="#7777cc" stroke-width="1"/>
  <text x="391" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">렌더</text>
  <!-- No idle in frame 2 (busy) -->
  <rect x="416" y="118" width="30" height="36" rx="4" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="431" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555" text-anchor="middle">없음</text>

  <!-- Frame 3 -->
  <rect x="452" y="118" width="90" height="36" rx="4" fill="#1a2a4a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="497" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">JS 실행</text>
  <rect x="542" y="118" width="50" height="36" rx="4" fill="#2a1a4a" stroke="#7777cc" stroke-width="1"/>
  <text x="567" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">렌더</text>
  <!-- Idle in frame 3 -->
  <rect x="592" y="118" width="100" height="36" rx="4" fill="#0d2a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="642" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">유휴 시간</text>
  <text x="642" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">rIC 계속 실행</text>

  <!-- Legend -->
  <rect x="700" y="118" width="160" height="36" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <rect x="710" y="128" width="12" height="12" rx="2" fill="#0d2a0d" stroke="#55c555" stroke-width="1"/>
  <text x="728" y="139" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">rIC 콜백 실행 구간</text>
  <rect x="710" y="143" width="12" height="8" rx="2" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="728" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">유휴 없음 (바쁜 프레임)</text>

  <!-- timeRemaining explanation -->
  <rect x="60" y="180" width="760" height="60" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">IdleDeadline.timeRemaining()</text>
  <text x="440" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">현재 유휴 기간에 남은 시간(ms) 반환 — 0이 되기 전에 작업을 중단하고 다음 유휴까지 양보</text>

  <!-- Code block -->
  <rect x="60" y="264" width="760" height="164" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 대용량 리스트를 유휴 시간에 나눠서 처리</text>
  <text x="76" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">function</tspan> processItems(items) {</text>
  <text x="76" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3" font-weight="600">let</tspan> i = <tspan fill="#b5cea8">0</tspan>;</text>
  <text x="76" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  <tspan fill="#7ec8e3" font-weight="600">function</tspan> process(deadline) {</text>
  <text x="76" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3" font-weight="600">while</tspan> (i &lt; items.length &amp;&amp; deadline.timeRemaining() &gt; <tspan fill="#b5cea8">0</tspan>) {</text>
  <text x="76" y="378" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">      doWork(items[i++]); <tspan fill="#9aa4b8">// 유휴 시간 내 처리</tspan></text>
  <text x="76" y="396" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    }</text>
  <text x="76" y="414" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3" font-weight="600">if</tspan> (i &lt; items.length) requestIdleCallback(process);</text>
  <text x="76" y="432" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  }</text>
  <text x="76" y="450" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  requestIdleCallback(process);</text>
</svg>
