<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320">
  <rect width="880" height="320" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">TypedDict 정의와 선택적 키</text>

  <rect x="60" y="64" width="760" height="236" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text x="80" y="92" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ffffff"> typing </tspan><tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> TypedDict, NotRequired</tspan></text>

  <text x="80" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">class</tspan><tspan fill="#ffffff"> User(TypedDict):</tspan></text>

  <text x="80" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    name: </tspan><tspan fill="#7ec8e3" font-weight="600">str</tspan></text>

  <text x="80" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    age: </tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan></text>

  <text x="80" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    email: NotRequired[</tspan><tspan fill="#7ec8e3" font-weight="600">str</tspan><tspan fill="#ffffff">]</tspan><tspan fill="#9aa4b8">  # 있어도 없어도 됨</tspan></text>

  <text x="80" y="224" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">u: User = {</tspan><tspan fill="#ce9178">"name"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"Sam"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"age"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#b5cea8">30</tspan><tspan fill="#ffffff">}</tspan></text>

  <text x="80" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">bad: User = {</tspan><tspan fill="#ce9178">"name"</tspan><tspan fill="#ffffff">: </tspan><tspan fill="#ce9178">"Sam"</tspan><tspan fill="#ffffff">}</tspan><tspan fill="#e05555">   # 오류: age 누락</tspan></text>

  <text x="80" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8"># 런타임엔 그냥 평범한 dict 이다</tspan></text>
</svg>
