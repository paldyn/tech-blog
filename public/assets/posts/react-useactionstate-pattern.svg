<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" style="background:#0a0a0a;border-radius:12px;">
  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">useActionState 완성 예제</text>
  <text x="440" y="68" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">유효성 검사 + 에러 표시 + pending UI</text>

  <!-- Left: Form component -->
  <rect x="60" y="94" width="380" height="340" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="113" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// Form 컴포넌트</text>
  <text x="76" y="131" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">import</tspan> &#123; useActionState &#125; <tspan fill="#7ec8e3" font-weight="600">from</tspan> <tspan fill="#ce9178">'react'</tspan>;</text>
  <text x="76" y="149" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">function</tspan> SignupForm() &#123;</text>
  <text x="76" y="167" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">const</tspan> [state, action, pending] =</text>
  <text x="76" y="185" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    useActionState(signupAction, &#123;</text>
  <text x="76" y="203" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      error: <tspan fill="#b5cea8">null</tspan>, success: <tspan fill="#b5cea8">false</tspan></text>
  <text x="76" y="221" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    &#125;);</text>
  <text x="76" y="239" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">if</tspan> (state.success) <tspan fill="#7ec8e3" font-weight="600">return</tspan> &lt;<tspan fill="#7ec8e3" font-weight="600">p</tspan>&gt;가입 완료!&lt;/<tspan fill="#7ec8e3" font-weight="600">p</tspan>&gt;;</text>
  <text x="76" y="257" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">return</tspan> (</text>
  <text x="76" y="275" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    &lt;<tspan fill="#7ec8e3" font-weight="600">form</tspan> action=&#123;action&#125;&gt;</text>
  <text x="76" y="293" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      &lt;<tspan fill="#7ec8e3" font-weight="600">input</tspan> name=<tspan fill="#ce9178">"email"</tspan> type=<tspan fill="#ce9178">"email"</tspan> /&gt;</text>
  <text x="76" y="311" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      &#123;state.error &amp;&amp; (</text>
  <text x="76" y="329" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">        &lt;<tspan fill="#7ec8e3" font-weight="600">p</tspan> className=<tspan fill="#ce9178">"error"</tspan>&gt;&#123;state.error&#125;&lt;/<tspan fill="#7ec8e3" font-weight="600">p</tspan>&gt;</text>
  <text x="76" y="347" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      )&#125;</text>
  <text x="76" y="365" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      &lt;<tspan fill="#7ec8e3" font-weight="600">button</tspan> disabled=&#123;pending&#125;&gt;</text>
  <text x="76" y="383" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">        &#123;pending ? <tspan fill="#ce9178">'처리 중...'</tspan> : <tspan fill="#ce9178">'가입'</tspan>&#125;</text>
  <text x="76" y="401" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      &lt;/<tspan fill="#7ec8e3" font-weight="600">button</tspan>&gt;</text>
  <text x="76" y="419" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    &lt;/<tspan fill="#7ec8e3" font-weight="600">form</tspan>&gt;</text>

  <!-- Right: action function -->
  <rect x="460" y="94" width="360" height="340" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="113" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// Action 함수</text>
  <text x="476" y="131" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">async function</tspan> signupAction(</text>
  <text x="476" y="149" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  prevState: State,</text>
  <text x="476" y="167" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  formData: FormData</text>
  <text x="476" y="185" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">) &#123;</text>
  <text x="476" y="203" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">const</tspan> email = formData.get(<tspan fill="#ce9178">'email'</tspan>);</text>
  <text x="476" y="221" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">if</tspan> (!email) <tspan fill="#7ec8e3" font-weight="600">return</tspan> &#123;</text>
  <text x="476" y="239" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    error: <tspan fill="#ce9178">'이메일을 입력하세요'</tspan>,</text>
  <text x="476" y="257" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    success: <tspan fill="#b5cea8">false</tspan></text>
  <text x="476" y="275" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  &#125;;</text>
  <text x="476" y="293" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">try</tspan> &#123;</text>
  <text x="476" y="311" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    <tspan fill="#7ec8e3" font-weight="600">await</tspan> createUser(email);</text>
  <text x="476" y="329" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    <tspan fill="#7ec8e3" font-weight="600">return</tspan> &#123; error: <tspan fill="#b5cea8">null</tspan>, success: <tspan fill="#b5cea8">true</tspan> &#125;;</text>
  <text x="476" y="347" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  &#125; <tspan fill="#7ec8e3" font-weight="600">catch</tspan> (e) &#123;</text>
  <text x="476" y="365" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    <tspan fill="#7ec8e3" font-weight="600">return</tspan> &#123;</text>
  <text x="476" y="383" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      error: <tspan fill="#ce9178">'가입 실패'</tspan>, success: <tspan fill="#b5cea8">false</tspan></text>
  <text x="476" y="401" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    &#125;;</text>
  <text x="476" y="419" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  &#125;</text>
</svg>
