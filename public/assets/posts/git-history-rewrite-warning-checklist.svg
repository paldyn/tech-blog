<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">히스토리 재작성 전 체크리스트</text>

  <!-- Checklist items -->
  <rect x="60" y="75" width="760" height="50" rx="8" fill="#1a1a2e" stroke="#555" stroke-width="1"/>
  <text x="90" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" fill="#55c555">☐</text>
  <text x="130" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8" font-weight="600">이미 push했는가?</text>
  <text x="130" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">push 전이면 자유롭게. push 후라면 아래 항목을 모두 확인할 것.</text>

  <rect x="60" y="138" width="760" height="50" rx="8" fill="#1a1a2e" stroke="#555" stroke-width="1"/>
  <text x="90" y="159" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" fill="#55c555">☐</text>
  <text x="130" y="159" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8" font-weight="600">팀원이 이 브랜치를 기반으로 작업 중인가?</text>
  <text x="130" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">기반으로 작업 중이면 재작성 금지. 본인만 쓰는 feature 브랜치면 안전.</text>

  <rect x="60" y="201" width="760" height="50" rx="8" fill="#1a1a2e" stroke="#555" stroke-width="1"/>
  <text x="90" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" fill="#55c555">☐</text>
  <text x="130" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8" font-weight="600">백업했는가?</text>
  <text x="130" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">git reflog은 90일간 복구 가능. 그 이상은 백업 브랜치: git branch backup/before-rewrite</text>

  <rect x="60" y="264" width="760" height="50" rx="8" fill="#1a1a2e" stroke="#555" stroke-width="1"/>
  <text x="90" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" fill="#55c555">☐</text>
  <text x="130" y="285" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8" font-weight="600">팀에 공지했는가?</text>
  <text x="130" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">force push 예정 시각과 이유를 팀 채널에 공지. 이후 팀원은 re-clone 또는 reset --hard.</text>

  <rect x="60" y="327" width="760" height="50" rx="8" fill="#1a1a2e" stroke="#555" stroke-width="1"/>
  <text x="90" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" fill="#55c555">☐</text>
  <text x="130" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#e8e8e8" font-weight="600">CI/CD 파이프라인에 영향이 없는가?</text>
  <text x="130" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">SHA 기반 배포 트리거, 태그 참조, 브랜치 보호 규칙 등을 미리 점검.</text>
</svg>
