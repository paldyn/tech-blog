<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">트랜잭션 콜백 패턴 구조</text>

  <!-- Pattern 1: Dedicated Callback -->
  <rect x="60" y="72" width="360" height="340" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="240" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">패턴 A: 전용 콜백 (권장)</text>
  <text x="240" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">트랜잭션마다 별도 콜백 함수</text>

  <rect x="78" y="130" width="324" height="264" fill="#070b14" rx="5" stroke="#1e2433"/>
  <text x="94" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0" xml:space="preserve">// 조회 트랜잭션</text>
  <text x="94" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">this.transaction(</text>
  <text x="94" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">  "SVC_SRCH", ..., "fn_searchCb"</text>
  <text x="94" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">);</text>

  <text x="94" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0" xml:space="preserve">// 저장 트랜잭션</text>
  <text x="94" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">this.transaction(</text>
  <text x="94" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">  "SVC_SAVE", ..., "fn_saveCb"</text>
  <text x="94" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">);</text>

  <text x="94" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">function</text>
  <text x="151" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve"> fn_searchCb(s,e,m) {</text>
  <text x="94" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0" xml:space="preserve">    // 조회 전용 처리</text>
  <text x="94" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">}</text>
  <text x="94" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">function</text>
  <text x="151" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve"> fn_saveCb(s,e,m) {</text>
  <text x="94" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0" xml:space="preserve">    // 저장 전용 처리</text>
  <text x="94" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">}</text>

  <!-- Pattern 2: Shared Callback -->
  <rect x="460" y="72" width="360" height="340" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1"/>
  <text x="640" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">패턴 B: 공통 콜백 (분기)</text>
  <text x="640" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">svcId로 분기 — 유사한 트랜잭션에 적합</text>

  <rect x="478" y="130" width="324" height="264" fill="#070b14" rx="5" stroke="#1e2433"/>
  <text x="494" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">this.transaction(</text>
  <text x="494" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">  "SVC_SRCH", ..., "fn_cb"</text>
  <text x="494" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">);</text>
  <text x="494" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">this.transaction(</text>
  <text x="494" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve">  "SVC_SAVE", ..., "fn_cb"</text>
  <text x="494" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">);</text>

  <text x="494" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">function</text>
  <text x="551" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve"> fn_cb(svcId, err, msg) {</text>
  <text x="494" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">  if</text>
  <text x="514" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve"> (err !== </text>
  <text x="572" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#b5cea8" xml:space="preserve">0</text>
  <text x="579" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">) {</text>
  <text x="494" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">    alert(msg); </text>
  <text x="494" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">    return</text>
  <text x="540" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">;</text>
  <text x="494" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">  }</text>
  <text x="494" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">  switch</text>
  <text x="539" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve"> (svcId) {</text>
  <text x="494" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">    case</text>
  <text x="524" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve"> "SVC_SRCH"</text>
  <text x="592" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">: ...</text>
  <text x="494" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">    case</text>
  <text x="524" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#ce9178" xml:space="preserve"> "SVC_SAVE"</text>
  <text x="592" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">: ...</text>

  <!-- Bottom note -->
  <text x="440" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">트랜잭션이 많을수록 전용 콜백 패턴이 코드 가독성·유지보수에 유리</text>
</svg>
