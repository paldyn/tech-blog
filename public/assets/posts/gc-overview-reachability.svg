<svg xmlns="http://www.w3.org/2000/svg" width="880" height="470" viewBox="0 0 880 470">
  <defs>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="470" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">도달 가능성 — 살았는가, 죽었는가</text>

  <text x="150" y="84" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">GC Roots</text>
  <text x="530" y="84" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">객체 그래프 (Heap)</text>

  <!-- Roots -->
  <rect x="60" y="100" width="180" height="48" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="150" y="130" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">스택의 지역 변수</text>

  <rect x="60" y="168" width="180" height="48" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="150" y="198" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">static 필드</text>

  <rect x="60" y="236" width="180" height="48" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="150" y="266" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">JNI · 네이티브 참조</text>

  <!-- Reachable objects -->
  <circle cx="350" cy="150" r="26" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="350" y="156" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">A</text>

  <circle cx="500" cy="120" r="26" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="500" y="126" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">B</text>

  <circle cx="640" cy="170" r="26" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="176" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">C</text>

  <!-- Reachable arrows -->
  <line x1="240" y1="124" x2="320" y2="144" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="240" y1="190" x2="322" y2="162" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="375" y1="143" x2="471" y2="127" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="523" y1="133" x2="614" y2="158" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <text x="495" y="220" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">루트에서 닿는다 → 생존</text>

  <!-- Unreachable objects -->
  <circle cx="420" cy="310" r="26" fill="#1a0a0a" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="420" y="316" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">D</text>

  <circle cx="570" cy="340" r="26" fill="#1a0a0a" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="570" y="346" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">E</text>

  <line x1="445" y1="319" x2="540" y2="335" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-red)"/>

  <text x="700" y="330" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">서로 참조해도 루트에서</text>
  <text x="700" y="348" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">끊기면 → 회수 대상</text>

  <!-- Bottom note -->
  <rect x="60" y="396" width="760" height="50" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="426" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">GC는 참조 카운트가 아니라 루트 기반 그래프 탐색 — 순환 참조(D ↔ E)도 정확히 회수한다</text>
</svg>
