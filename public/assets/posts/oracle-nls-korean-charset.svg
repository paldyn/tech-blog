<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500" style="background:#0a0a0a;" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Oracle NLS 문자 집합 계층</text>
  <text x="440" y="68" text-anchor="middle" font-size="16" font-weight="600" fill="#aaaaaa">DB → 세션 → 클라이언트 문자 집합 우선순위</text>

  <!-- DB Charset box -->
  <rect x="290" y="96" width="300" height="80" rx="12" fill="#112236" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="128" text-anchor="middle" font-size="15" font-weight="700" fill="#7ec8e3">DB 문자 집합</text>
  <text x="440" y="150" text-anchor="middle" font-size="13" fill="#e8e8e8">AL32UTF8 (권장) / KO16MSWIN949</text>
  <text x="440" y="168" text-anchor="middle" font-size="11" fill="#888">NLS_CHARACTERSET — 변경 불가에 가까움</text>

  <!-- Arrow down -->
  <line x1="440" y1="176" x2="440" y2="220" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="435,220 440,236 445,220" fill="#7ec8e3"/>

  <!-- National charset box -->
  <rect x="290" y="236" width="300" height="70" rx="12" fill="#0e1a0e" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="264" text-anchor="middle" font-size="15" font-weight="700" fill="#55c555">국가 문자 집합 (NCHAR)</text>
  <text x="440" y="284" text-anchor="middle" font-size="13" fill="#e8e8e8">AL16UTF16 또는 UTF8</text>
  <text x="440" y="300" text-anchor="middle" font-size="11" fill="#888">NCHAR, NVARCHAR2, NCLOB 컬럼 전용</text>

  <!-- Session NLS layer -->
  <rect x="60" y="340" width="760" height="110" rx="12" fill="#1a1208" stroke="#e0a833" stroke-width="1.5"/>
  <text x="440" y="362" text-anchor="middle" font-size="14" font-weight="600" fill="#e0a833">세션·클라이언트 NLS 파라미터 (ALTER SESSION / 환경변수)</text>

  <rect x="80" y="374" width="180" height="60" rx="8" fill="#221a08" stroke="#e0a833" stroke-width="1"/>
  <text x="170" y="398" text-anchor="middle" font-size="12" font-weight="600" fill="#e0a833">NLS_LANGUAGE</text>
  <text x="170" y="416" text-anchor="middle" font-size="11" fill="#aaaaaa">KOREAN / AMERICAN</text>
  <text x="170" y="430" text-anchor="middle" font-size="11" fill="#888">메시지·날짜명 언어</text>

  <rect x="280" y="374" width="200" height="60" rx="8" fill="#221a08" stroke="#e0a833" stroke-width="1"/>
  <text x="380" y="398" text-anchor="middle" font-size="12" font-weight="600" fill="#e0a833">NLS_DATE_FORMAT</text>
  <text x="380" y="416" text-anchor="middle" font-size="11" fill="#aaaaaa">YYYY-MM-DD HH24:MI:SS</text>
  <text x="380" y="430" text-anchor="middle" font-size="11" fill="#888">날짜 리터럴 형식</text>

  <rect x="500" y="374" width="200" height="60" rx="8" fill="#221a08" stroke="#e0a833" stroke-width="1"/>
  <text x="600" y="398" text-anchor="middle" font-size="12" font-weight="600" fill="#e0a833">NLS_SORT / NLS_COMP</text>
  <text x="600" y="416" text-anchor="middle" font-size="11" fill="#aaaaaa">KOREAN / LINGUISTIC</text>
  <text x="600" y="430" text-anchor="middle" font-size="11" fill="#888">한국어 정렬·비교 기준</text>

  <!-- Arrow from DB to session -->
  <line x1="440" y1="306" x2="440" y2="340" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="460" y="328" font-size="11" fill="#888">세션이 DB 설정 상속·재정의</text>

  <!-- NLS_LANG env var note -->
  <rect x="60" y="460" width="760" height="30" rx="6" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
  <text x="440" y="480" text-anchor="middle" font-size="12" fill="#888">클라이언트: NLS_LANG=KOREAN_KOREA.AL32UTF8 환경변수로 DB 접속 전 문자 집합 선언</text>
</svg>
