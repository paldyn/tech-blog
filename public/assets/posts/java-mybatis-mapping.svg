<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="mbArr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">MyBatis — 인터페이스와 SQL을 매핑</text>

  <!-- interface -->
  <text x="60" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">매퍼 인터페이스 (자바)</text>
  <rect x="60" y="104" width="350" height="86" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="76" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">interface</tspan> MemberMapper {</text>
  <text x="76" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  Member findById(Long id);</text>
  <text x="76" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>

  <!-- arrow -->
  <line x1="410" y1="147" x2="500" y2="147" stroke="#7ec8e3" stroke-width="2" marker-end="url(#mbArr)"/>
  <text x="412" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">id로 연결</text>

  <!-- xml sql -->
  <text x="500" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e0a555">매퍼 XML (SQL)</text>
  <rect x="500" y="104" width="320" height="86" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="516" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">&lt;select id=<tspan fill="#ce9178">"findById"</tspan>&gt;</text>
  <text x="516" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  SELECT * FROM member</text>
  <text x="516" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  WHERE id = #{id}</text>

  <!-- result mapping -->
  <line x1="440" y1="190" x2="440" y2="240" stroke="#7ec8e3" stroke-width="2" marker-end="url(#mbArr)"/>
  <text x="455" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">결과 행 → 객체 자동 매핑</text>

  <rect x="240" y="250" width="400" height="60" fill="#0e1a0e" stroke="#55c555" stroke-width="1.5" rx="8"/>
  <text x="260" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">Member 객체로 반환</text>
  <text x="260" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">컬럼 ↔ 필드 매핑은 MyBatis가 처리</text>

  <text x="60" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">SQL은 내가 직접 쓰고, 파라미터 바인딩과 결과 매핑의 반복만 MyBatis가 덜어준다.</text>
</svg>
