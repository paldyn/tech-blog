<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 340">
  <rect width="880" height="340" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-bb" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Secret은 실행 시점에만 주입된다</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">암호화 저장 → 워크플로우에 주입 → 로그에서 마스킹</text>

  <rect x="50" y="120" width="200" height="80" rx="10" fill="#101010" stroke="#55c555" stroke-width="1.5"/>
  <text x="150" y="155" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">암호화 저장소</text>
  <text x="150" y="180" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">읽기 불가 · write-only</text>

  <rect x="340" y="120" width="200" height="80" rx="10" fill="#16122a" stroke="#9988dd" stroke-width="1.5"/>
  <text x="440" y="155" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#9988dd">워크플로우 런</text>
  <text x="440" y="180" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">secrets.API_KEY</text>

  <rect x="630" y="120" width="200" height="80" rx="10" fill="#101010" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="730" y="155" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">실행 로그</text>
  <text x="730" y="180" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">***</text>

  <line x1="250" y1="160" x2="334" y2="160" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-bb)"/>
  <line x1="540" y1="160" x2="624" y2="160" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-bb)"/>

  <text x="150" y="240" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">한 번 저장하면 다시 못 봄</text>
  <text x="440" y="240" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">env/with로 참조</text>
  <text x="730" y="240" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">값이 자동 가려짐</text>

  <text x="440" y="300" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">⚠ 포크 PR에는 기본적으로 secret이 노출되지 않는다</text>
</svg>
