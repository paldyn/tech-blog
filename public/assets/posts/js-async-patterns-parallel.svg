<svg width="880" height="440" viewBox="0 0 880 440" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#e8e8e8" text-anchor="middle">순차 실행 vs 병렬 실행 — 시간 비교</text>

  <!-- Sequential section -->
  <text x="200" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05252" text-anchor="middle">순차 실행 (await 순서대로)</text>
  <text x="200" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">총 소요 시간: ~3초</text>

  <!-- Sequential bars -->
  <rect x="40" y="112" width="100" height="32" rx="6" fill="#2a1a1a" stroke="#7a2a2a" stroke-width="1.2"/>
  <text x="90" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05252" text-anchor="middle">API A (1s)</text>

  <rect x="150" y="112" width="100" height="32" rx="6" fill="#2a1a1a" stroke="#7a2a2a" stroke-width="1.2"/>
  <text x="200" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05252" text-anchor="middle">API B (1s)</text>

  <rect x="260" y="112" width="100" height="32" rx="6" fill="#2a1a1a" stroke="#7a2a2a" stroke-width="1.2"/>
  <text x="310" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05252" text-anchor="middle">API C (1s)</text>

  <!-- Time arrow sequential -->
  <line x1="40" y1="160" x2="360" y2="160" stroke="#555" stroke-width="1" marker-end="url(#arrowTime)"/>
  <text x="40" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#444">0s</text>
  <text x="130" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#444">1s</text>
  <text x="240" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#444">2s</text>
  <text x="350" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05252">3s</text>

  <!-- Sequential code -->
  <rect x="40" y="192" width="320" height="80" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="56" y="216" font-family="'Courier New',monospace" font-size="11" fill="#888">const a = await fetchA(); // 1s 대기</text>
  <text x="56" y="236" font-family="'Courier New',monospace" font-size="11" fill="#888">const b = await fetchB(); // 1s 대기</text>
  <text x="56" y="256" font-family="'Courier New',monospace" font-size="11" fill="#888">const c = await fetchC(); // 1s 대기</text>

  <!-- Parallel section -->
  <text x="660" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#4caf7d" text-anchor="middle">병렬 실행 (Promise.all)</text>
  <text x="660" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">총 소요 시간: ~1초</text>

  <!-- Parallel bars -->
  <rect x="500" y="112" width="100" height="32" rx="6" fill="#0d2818" stroke="#2a7a4a" stroke-width="1.2"/>
  <text x="550" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#4caf7d" text-anchor="middle">API A (1s)</text>

  <rect x="500" y="150" width="100" height="32" rx="6" fill="#0d2818" stroke="#2a7a4a" stroke-width="1.2"/>
  <text x="550" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#4caf7d" text-anchor="middle">API B (1s)</text>

  <rect x="500" y="188" width="100" height="32" rx="6" fill="#0d2818" stroke="#2a7a4a" stroke-width="1.2"/>
  <text x="550" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#4caf7d" text-anchor="middle">API C (1s)</text>

  <!-- Completion marker -->
  <line x1="606" y1="108" x2="606" y2="224" stroke="#4caf7d" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="620" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#4caf7d">모두 완료!</text>
  <text x="620" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">1초 만에</text>

  <!-- Parallel code -->
  <rect x="480" y="240" width="360" height="80" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="496" y="264" font-family="'Courier New',monospace" font-size="11" fill="#4caf7d">const [a, b, c] =</text>
  <text x="496" y="284" font-family="'Courier New',monospace" font-size="11" fill="#4caf7d">  await Promise.all([</text>
  <text x="496" y="304" font-family="'Courier New',monospace" font-size="11" fill="#888">    fetchA(), fetchB(), fetchC()</text>

  <!-- Divider -->
  <line x1="440" y1="72" x2="440" y2="390" stroke="#222" stroke-width="1"/>

  <!-- Savings note -->
  <rect x="300" y="348" width="280" height="52" rx="8" fill="#141414" stroke="#333" stroke-width="1"/>
  <text x="440" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#f4a942" text-anchor="middle">독립적인 작업은 병렬로!</text>
  <text x="440" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">3배 빠른 처리 — 1/3 시간 절약</text>

  <defs>
    <marker id="arrowTime" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
  </defs>
</svg>
