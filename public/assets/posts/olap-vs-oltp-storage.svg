<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">행 지향 vs 열 지향 스토리지</text>

  <!-- Row-oriented label -->
  <text x="200" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">행 지향 (OLTP)</text>

  <!-- Row store visualization -->
  <rect x="60" y="92" width="300" height="28" rx="4" fill="#12213a" stroke="#3a6ea8" stroke-width="1"/>
  <text x="76" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">Row 1: [1 | 김철수 | 9900 | 2026-05]</text>

  <rect x="60" y="128" width="300" height="28" rx="4" fill="#0e1c30" stroke="#2a4060" stroke-width="1"/>
  <text x="76" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#c8c8c8">Row 2: [2 | 이영희 | 4500 | 2026-05]</text>

  <rect x="60" y="164" width="300" height="28" rx="4" fill="#0e1c30" stroke="#2a4060" stroke-width="1"/>
  <text x="76" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#c8c8c8">Row 3: [3 | 박민준 | 7200 | 2026-05]</text>

  <text x="200" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">✓ 단건 조회 빠름 (전체 행 한 번에)</text>
  <text x="200" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">✗ amount만 집계 시 불필요한 컬럼도 읽음</text>

  <!-- Column-oriented label -->
  <text x="640" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#88cc44" text-anchor="middle">열 지향 (OLAP)</text>

  <!-- Column store visualization -->
  <rect x="460" y="92" width="100" height="102" rx="4" fill="#101a08" stroke="#2a4010" stroke-width="1"/>
  <text x="510" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#88cc44" text-anchor="middle">id</text>
  <text x="510" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#c8c8c8" text-anchor="middle">1</text>
  <text x="510" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#c8c8c8" text-anchor="middle">2</text>
  <text x="510" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#c8c8c8" text-anchor="middle">3</text>

  <rect x="574" y="92" width="100" height="102" rx="4" fill="#101a08" stroke="#2a4010" stroke-width="1"/>
  <text x="624" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#88cc44" text-anchor="middle">name</text>
  <text x="624" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#c8c8c8" text-anchor="middle">김철수</text>
  <text x="624" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#c8c8c8" text-anchor="middle">이영희</text>
  <text x="624" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#c8c8c8" text-anchor="middle">박민준</text>

  <rect x="688" y="92" width="100" height="102" rx="4" fill="#1a2010" stroke="#4a6020" stroke-width="2"/>
  <text x="738" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#88cc44" text-anchor="middle">amount</text>
  <text x="738" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">9900</text>
  <text x="738" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">4500</text>
  <text x="738" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">7200</text>

  <text x="640" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">✓ SUM(amount): amount 컬럼만 읽음</text>
  <text x="640" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">✓ 높은 압축률 (같은 타입 값 연속)</text>

  <!-- Code comparison -->
  <rect x="60" y="260" width="760" height="130" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="282" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- OLTP 쿼리: 행 지향에서 빠름 (인덱스 → 단건 페이지)</text>
  <text x="76" y="302" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">SELECT</tspan><tspan fill="#ffffff"> * </tspan><tspan fill="#7ec8e3" font-weight="600">FROM</tspan><tspan fill="#ffffff"> orders </tspan><tspan fill="#7ec8e3" font-weight="600">WHERE</tspan><tspan fill="#ffffff"> id = </tspan><tspan fill="#b5cea8">42</tspan><tspan fill="#ffffff">;</tspan>
  </text>
  <text x="76" y="326" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- OLAP 쿼리: 열 지향에서 빠름 (amount 열만 스캔)</text>
  <text x="76" y="346" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">SELECT</tspan><tspan fill="#ffffff"> month, </tspan><tspan fill="#7ec8e3" font-weight="600">SUM</tspan><tspan fill="#ffffff">(amount) </tspan><tspan fill="#7ec8e3" font-weight="600">FROM</tspan><tspan fill="#ffffff"> orders </tspan><tspan fill="#7ec8e3" font-weight="600">GROUP BY</tspan><tspan fill="#ffffff"> month;</tspan>
  </text>
  <text x="76" y="370" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 행 지향에서 1억 행 스캔 시 불필요한 컬럼까지 읽어 성능 저하</text>

  <text x="440" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">열 지향: 압축률 5~10배 · I/O 대폭 감소 · 벡터 연산(SIMD) 적용 가능</text>
</svg>
