<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">메서드 참조 — 실전 활용 코드</text>

  <!-- Block 1: Stream with method ref -->
  <text x="60" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Stream에서 메서드 참조 활용</text>
  <rect x="60" y="90" width="380" height="156" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="112" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan font-weight="600" fill="#7ec8e3">List</tspan><tspan fill="#ffffff">&lt;</tspan><tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff">&gt; names = List.of(</tspan><tspan fill="#ce9178">"bob"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"alice"</tspan><tspan fill="#ffffff">);</tspan>
  </text>
  <text x="76" y="132" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 임의 객체 인스턴스 메서드</text>
  <text x="76" y="152" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">names.</tspan><tspan font-weight="600" fill="#7ec8e3">stream</tspan><tspan fill="#ffffff">()</tspan>
  </text>
  <text x="76" y="172" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">     .</tspan><tspan font-weight="600" fill="#7ec8e3">map</tspan><tspan fill="#ffffff">(String::</tspan><tspan font-weight="600" fill="#7ec8e3">toUpperCase</tspan><tspan fill="#ffffff">)</tspan>
  </text>
  <text x="76" y="192" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 정적 메서드</text>
  <text x="76" y="212" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">     .</tspan><tspan font-weight="600" fill="#7ec8e3">forEach</tspan><tspan fill="#ffffff">(System.out::</tspan><tspan font-weight="600" fill="#7ec8e3">println</tspan><tspan fill="#ffffff">);</tspan>
  </text>

  <!-- Block 2: Comparator -->
  <text x="460" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Comparator와 생성자 참조</text>
  <rect x="460" y="90" width="360" height="156" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="112" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// Comparator.comparing + 메서드 참조</text>
  <text x="476" y="132" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">names.</tspan><tspan font-weight="600" fill="#7ec8e3">stream</tspan><tspan fill="#ffffff">()</tspan>
  </text>
  <text x="476" y="152" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">     .</tspan><tspan font-weight="600" fill="#7ec8e3">sorted</tspan><tspan fill="#ffffff">(</tspan><tspan font-weight="600" fill="#7ec8e3">Comparator</tspan><tspan fill="#ffffff">.</tspan><tspan font-weight="600" fill="#7ec8e3">comparing</tspan><tspan fill="#ffffff">(</tspan>
  </text>
  <text x="476" y="172" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">             String::</tspan><tspan font-weight="600" fill="#7ec8e3">length</tspan><tspan fill="#ffffff">))</tspan>
  </text>
  <text x="476" y="192" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 생성자 참조</text>
  <text x="476" y="212" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">     .</tspan><tspan font-weight="600" fill="#7ec8e3">collect</tspan><tspan fill="#ffffff">(</tspan><tspan font-weight="600" fill="#7ec8e3">toCollection</tspan><tspan fill="#ffffff">(TreeSet::</tspan><tspan font-weight="600" fill="#7ec8e3">new</tspan><tspan fill="#ffffff">));</tspan>
  </text>

  <!-- Block 3: toMap with constructor ref -->
  <text x="60" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">특정 객체 메서드 참조 + toMap</text>
  <rect x="60" y="280" width="380" height="120" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="302" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff"> sep = </tspan><tspan fill="#ce9178">", "</tspan><tspan fill="#ffffff">;</tspan>
  </text>
  <text x="76" y="322" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// sep 변수를 참조하는 특정 객체 메서드</text>
  <text x="76" y="342" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan font-weight="600" fill="#7ec8e3">Function</tspan><tspan fill="#ffffff">&lt;</tspan><tspan font-weight="600" fill="#7ec8e3">List</tspan><tspan fill="#ffffff">&lt;</tspan><tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff">&gt;,</tspan><tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff">&gt; joiner =</tspan>
  </text>
  <text x="76" y="362" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    list -&gt; </tspan><tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff">.</tspan><tspan font-weight="600" fill="#7ec8e3">join</tspan><tspan fill="#ffffff">(sep, list);</tspan>
  </text>
  <text x="76" y="382" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 특정 객체: String::join 불가 (sep 필요)</text>

  <!-- Block 4: when to use -->
  <text x="460" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">메서드 참조 vs 람다 선택 기준</text>
  <rect x="460" y="280" width="360" height="120" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">메서드 참조가 좋은 경우</text>
  <text x="480" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">· 람다가 메서드 하나만 호출할 때</text>
  <text x="480" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">· 메서드 이름이 의도를 명확히 표현할 때</text>
  <text x="480" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">람다가 더 나은 경우</text>
  <text x="480" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">· 추가 로직이 있을 때</text>
  <text x="480" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">· 외부 변수 캡처가 필요할 때</text>

  <text x="440" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">메서드 참조는 람다 표현식과 완전히 동일한 바이트코드로 컴파일됨 — 성능 차이 없음</text>
</svg>
