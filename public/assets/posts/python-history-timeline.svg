<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <style>text:not([font-family]) { font-family: 'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif; }</style>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Python 역사 타임라인</text>
  <text x="440" y="68" text-anchor="middle" font-size="15" font-weight="600" fill="#888">1989년 구상부터 현재까지</text>

  <!-- Timeline axis -->
  <line x1="80" y1="240" x2="820" y2="240" stroke="#333" stroke-width="2"/>

  <!-- 1989 -->
  <circle cx="100" cy="240" r="7" fill="#7ec8e3"/>
  <text x="100" y="222" text-anchor="middle" font-size="11" font-weight="700" fill="#7ec8e3">1989</text>
  <text x="100" y="270" text-anchor="middle" font-size="11" fill="#aaa">구상 시작</text>
  <text x="100" y="284" text-anchor="middle" font-size="10" fill="#666">Guido van Rossum</text>

  <!-- 1991 -->
  <circle cx="200" cy="240" r="7" fill="#55c555"/>
  <text x="200" y="190" text-anchor="middle" font-size="11" font-weight="700" fill="#55c555">1991</text>
  <line x1="200" y1="197" x2="200" y2="233" stroke="#55c555" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="200" y="270" text-anchor="middle" font-size="11" fill="#aaa">Python 0.9.0</text>
  <text x="200" y="284" text-anchor="middle" font-size="10" fill="#666">최초 공개</text>

  <!-- 1994 -->
  <circle cx="300" cy="240" r="7" fill="#7777cc"/>
  <text x="300" y="222" text-anchor="middle" font-size="11" font-weight="700" fill="#7777cc">1994</text>
  <text x="300" y="270" text-anchor="middle" font-size="11" fill="#aaa">Python 1.0</text>
  <text x="300" y="284" text-anchor="middle" font-size="10" fill="#666">lambda, map, filter</text>

  <!-- 2000 -->
  <circle cx="430" cy="240" r="7" fill="#ce9178"/>
  <text x="430" y="190" text-anchor="middle" font-size="11" font-weight="700" fill="#ce9178">2000</text>
  <line x1="430" y1="197" x2="430" y2="233" stroke="#ce9178" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="430" y="270" text-anchor="middle" font-size="11" fill="#aaa">Python 2.0</text>
  <text x="430" y="284" text-anchor="middle" font-size="10" fill="#666">GC · Unicode · 리스트 컴프</text>

  <!-- 2008 -->
  <circle cx="560" cy="240" r="7" fill="#e05555"/>
  <text x="560" y="222" text-anchor="middle" font-size="11" font-weight="700" fill="#e05555">2008</text>
  <text x="560" y="270" text-anchor="middle" font-size="11" fill="#aaa">Python 3.0</text>
  <text x="560" y="284" text-anchor="middle" font-size="10" fill="#666">하위 비호환 대개편</text>

  <!-- 2020 -->
  <circle cx="690" cy="240" r="7" fill="#888"/>
  <text x="690" y="190" text-anchor="middle" font-size="11" font-weight="700" fill="#888">2020</text>
  <line x1="690" y1="197" x2="690" y2="233" stroke="#888" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="690" y="270" text-anchor="middle" font-size="11" fill="#aaa">Python 2.7 EOL</text>
  <text x="690" y="284" text-anchor="middle" font-size="10" fill="#666">2 시대 공식 종료</text>

  <!-- 2023 -->
  <circle cx="800" cy="240" r="8" fill="#55c555" stroke="#e8e8e8" stroke-width="1.5"/>
  <text x="800" y="222" text-anchor="middle" font-size="11" font-weight="700" fill="#55c555">2023~</text>
  <text x="800" y="270" text-anchor="middle" font-size="11" fill="#aaa">Python 3.12+</text>
  <text x="800" y="284" text-anchor="middle" font-size="10" fill="#666">타입 파라미터 문법</text>

  <!-- Legend box -->
  <rect x="60" y="320" width="760" height="120" rx="8" fill="#0f1418" stroke="#333"/>
  <text x="440" y="346" text-anchor="middle" font-size="13" font-weight="700" fill="#e8e8e8">핵심 설계 철학 (처음부터 지금까지)</text>
  <text x="170" y="374" text-anchor="middle" font-size="12" fill="#7ec8e3">가독성</text>
  <text x="170" y="392" text-anchor="middle" font-size="11" fill="#666">사람이 읽기 좋은 코드</text>
  <text x="370" y="374" text-anchor="middle" font-size="12" fill="#55c555">실용성</text>
  <text x="370" y="392" text-anchor="middle" font-size="11" fill="#666">즉시 쓸 수 있는 언어</text>
  <text x="570" y="374" text-anchor="middle" font-size="12" fill="#7777cc">배터리 포함</text>
  <text x="570" y="392" text-anchor="middle" font-size="11" fill="#666">풍부한 표준 라이브러리</text>
  <text x="760" y="374" text-anchor="middle" font-size="12" fill="#ce9178">커뮤니티</text>
  <text x="760" y="392" text-anchor="middle" font-size="11" fill="#666">오픈소스 생태계</text>
  <text x="440" y="420" text-anchor="middle" font-size="11" fill="#555">Guido van Rossum이 직접 BDFL(자비로운 종신 독재자)로 이끈 언어</text>
</svg>
