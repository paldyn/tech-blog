<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Python 주요 역사 타임라인</text>

  <!-- Timeline line -->
  <line x1="80" y1="100" x2="800" y2="100" stroke="#334155" stroke-width="2"/>

  <!-- Dots and labels -->
  <!-- 1989 -->
  <circle cx="80" cy="100" r="7" fill="#7ec8e3"/>
  <text x="80" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">1989</text>
  <line x1="80" y1="107" x2="80" y2="130" stroke="#334155" stroke-width="1"/>
  <text x="80" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">개발 시작</text>
  <text x="80" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Guido</text>

  <!-- 1991 -->
  <circle cx="185" cy="100" r="7" fill="#55c555"/>
  <text x="185" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">1991</text>
  <line x1="185" y1="107" x2="185" y2="130" stroke="#334155" stroke-width="1"/>
  <text x="185" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">Python 0.9</text>
  <text x="185" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">첫 공개</text>

  <!-- 1994 -->
  <circle cx="290" cy="100" r="7" fill="#fbbf24"/>
  <text x="290" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#fbbf24" text-anchor="middle">1994</text>
  <line x1="290" y1="107" x2="290" y2="130" stroke="#334155" stroke-width="1"/>
  <text x="290" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">Python 1.0</text>
  <text x="290" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">lambda/map/filter</text>

  <!-- 2000 -->
  <circle cx="395" cy="100" r="7" fill="#a78bfa"/>
  <text x="395" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle">2000</text>
  <line x1="395" y1="107" x2="395" y2="130" stroke="#334155" stroke-width="1"/>
  <text x="395" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">Python 2.0</text>
  <text x="395" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">리스트 컴프리헨션</text>

  <!-- 2008 -->
  <circle cx="550" cy="100" r="9" fill="#e05555"/>
  <text x="550" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">2008</text>
  <line x1="550" y1="109" x2="550" y2="130" stroke="#334155" stroke-width="1"/>
  <text x="550" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8e8e8" text-anchor="middle">Python 3.0</text>
  <text x="550" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555" text-anchor="middle">대규모 개편 (비호환)</text>

  <!-- 2020 -->
  <circle cx="700" cy="100" r="7" fill="#6b7280"/>
  <text x="700" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">2020</text>
  <line x1="700" y1="107" x2="700" y2="130" stroke="#334155" stroke-width="1"/>
  <text x="700" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">Python 2 EOL</text>
  <text x="700" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">공식 지원 종료</text>

  <!-- 2024 -->
  <circle cx="800" cy="100" r="9" fill="#55c555"/>
  <text x="800" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">2024~</text>
  <line x1="800" y1="109" x2="800" y2="130" stroke="#334155" stroke-width="1"/>
  <text x="800" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">Python 3.12+</text>
  <text x="800" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555" text-anchor="middle">현재 권장 버전</text>

  <!-- Key milestones section -->
  <text x="80" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888">주요 이정표</text>

  <rect x="80" y="234" width="370" height="64" rx="6" fill="#0d1117" stroke="#1e3a5f" stroke-width="1"/>
  <text x="100" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">GvR의 크리스마스 휴가 프로젝트 (1989)</text>
  <text x="100" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9ca3af">ABC 언어의 후계자로 시작 — 예외 처리와 그룹 구조 개선</text>
  <text x="100" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6b7280">이름은 Monty Python's Flying Circus에서</text>

  <rect x="470" y="234" width="370" height="64" rx="6" fill="#0d1117" stroke="#1e3a5f" stroke-width="1"/>
  <text x="490" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">Python 3의 "파괴적 혁신" (2008)</text>
  <text x="490" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9ca3af">print → 함수, str·bytes 분리, 정수 나누기 개편</text>
  <text x="490" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6b7280">Python 2와 비호환 → 10년간 두 버전 공존</text>

  <rect x="80" y="314" width="760" height="64" rx="6" fill="#0d1117" stroke="#1a3520" stroke-width="1"/>
  <text x="100" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">현재: TIOBE 1위 (2023~)</text>
  <text x="100" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9ca3af">AI/ML 붐과 함께 압도적 1위 유지 — 데이터 과학, 웹, 자동화, 교육 전 분야에서 선택지 1순위</text>
  <text x="100" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6b7280">3.11: 25% 속도 향상 / 3.12: 더 빠른 인터프리터 / 3.13: 실험적 GIL 제거</text>
</svg>
