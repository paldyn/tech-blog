<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Python 역사 타임라인</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">1989년 탄생부터 현재까지</text>

  <!-- Timeline line -->
  <line x1="80" y1="120" x2="800" y2="120" stroke="#333" stroke-width="2"/>

  <!-- Markers & labels — 1989 -->
  <circle cx="110" cy="120" r="8" fill="#7777cc"/>
  <text x="110" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">1989</text>
  <rect x="60" y="136" width="100" height="50" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="110" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">귀도 반 로섬</text>
  <text x="110" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">크리스마스 프로젝트</text>

  <!-- 1991 -->
  <circle cx="220" cy="120" r="8" fill="#7ec8e3"/>
  <text x="220" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">1991</text>
  <rect x="170" y="136" width="100" height="50" rx="6" fill="#0f1e2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="220" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">Python 0.9</text>
  <text x="220" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">최초 공개 릴리즈</text>

  <!-- 1994 -->
  <circle cx="330" cy="120" r="8" fill="#55c555"/>
  <text x="330" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">1994</text>
  <rect x="280" y="136" width="100" height="50" rx="6" fill="#0f1f0f" stroke="#55c555" stroke-width="1"/>
  <text x="330" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">Python 1.0</text>
  <text x="330" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">lambda, map, filter</text>

  <!-- 2000 -->
  <circle cx="440" cy="120" r="8" fill="#f59e0b"/>
  <text x="440" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#f59e0b" text-anchor="middle">2000</text>
  <rect x="390" y="136" width="100" height="50" rx="6" fill="#1f1a0f" stroke="#f59e0b" stroke-width="1"/>
  <text x="440" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">Python 2.0</text>
  <text x="440" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">리스트 컴프리헨션</text>

  <!-- 2008 -->
  <circle cx="570" cy="120" r="8" fill="#e05555"/>
  <text x="570" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">2008</text>
  <rect x="520" y="136" width="100" height="50" rx="6" fill="#1f0f0f" stroke="#e05555" stroke-width="1"/>
  <text x="570" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">Python 3.0</text>
  <text x="570" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">하위 호환 단절</text>

  <!-- 2020 -->
  <circle cx="700" cy="120" r="8" fill="#a78bfa"/>
  <text x="700" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#a78bfa" text-anchor="middle">2020</text>
  <rect x="650" y="136" width="100" height="50" rx="6" fill="#1a1030" stroke="#a78bfa" stroke-width="1"/>
  <text x="700" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">Python 2 EOL</text>
  <text x="700" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">공식 지원 종료</text>

  <!-- Guido section -->
  <rect x="60" y="220" width="360" height="100" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1"/>
  <text x="80" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">귀도 반 로섬 (Guido van Rossum)</text>
  <text x="80" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaaaaa">네덜란드 출신 프로그래머. 1989년 크리스마스 연휴에</text>
  <text x="80" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaaaaa">ABC 언어에서 영감을 받아 Python 개발 시작.</text>
  <text x="80" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaaaaa">BDFL(자비로운 종신 독재자)로 2018년까지 이끌었음.</text>

  <!-- Version table -->
  <rect x="460" y="220" width="360" height="100" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">현재 지원 버전</text>
  <text x="480" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">Python 3.11</text>
  <text x="680" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8">2022 — 속도 25% 향상</text>
  <text x="480" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">Python 3.12</text>
  <text x="680" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8">2023 — 오류 메시지 개선</text>
  <text x="480" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">Python 3.13</text>
  <text x="680" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">2024 — 최신 안정 버전</text>

  <!-- ABC language note -->
  <rect x="60" y="340" width="760" height="60" rx="8" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
  <text x="440" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaaaaa" text-anchor="middle">Python의 이름은 영국 코미디 그룹 "Monty Python's Flying Circus"에서 따왔습니다.</text>
  <text x="440" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">뱀(python)과는 무관 — 유머 감각도 Python 철학의 일부입니다.</text>

  <text x="440" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">35년 이상의 역사를 가진 Python — 지금도 성장 중</text>
</svg>
