<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">접두사 해시 배열로 임의 부분 문자열 해시 O(1)</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">s = "abcde", prefix_hash[i] = hash(s[0..i-1])</text>

  <!-- Prefix hash array -->
  <text x="60" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">접두사 해시 배열 구축</text>

  <!-- index labels -->
  <text x="110" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">i=0</text>
  <text x="176" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">i=1</text>
  <text x="242" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">i=2</text>
  <text x="308" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">i=3</text>
  <text x="374" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">i=4</text>
  <text x="440" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">i=5</text>

  <rect x="84" y="138" width="52" height="40" fill="#111" stroke="#333" stroke-width="1" rx="3"/>
  <text x="110" y="163" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">0</text>
  <rect x="150" y="138" width="52" height="40" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1" rx="3"/>
  <text x="176" y="163" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">H(a)</text>
  <rect x="216" y="138" width="52" height="40" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1" rx="3"/>
  <text x="242" y="163" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">H(ab)</text>
  <rect x="282" y="138" width="52" height="40" fill="#1a2a1a" stroke="#55c555" stroke-width="2" rx="3"/>
  <text x="308" y="163" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">H(abc)</text>
  <rect x="348" y="138" width="52" height="40" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1" rx="3"/>
  <text x="374" y="163" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">H(abcd)</text>
  <rect x="414" y="138" width="52" height="40" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1" rx="3"/>
  <text x="440" y="163" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">H(abcde)</text>

  <!-- Query explanation -->
  <text x="60" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">부분 문자열 s[l..r] 해시 → O(1) 쿼리</text>

  <rect x="60" y="220" width="760" height="64" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="76" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># hash(s[l..r]) = prefix[r+1] - prefix[l] * B^(r-l+1)</text>
  <text x="76" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">def get_hash(l, r): </text>
  <text x="76" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    return (prefix[r+1] - prefix[l]*pw[r-l+1]) % MOD</text>

  <!-- Applications -->
  <rect x="60" y="304" width="760" height="80" fill="#111" stroke="#2a3a2a" stroke-width="1" rx="8"/>
  <text x="440" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">롤링 해시 응용</text>
  <text x="90" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">최장 중복 부분 문자열</text>
  <text x="90" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">이진 탐색 + 해시 O(n log n)</text>
  <text x="280" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">문자열 동치 판별</text>
  <text x="280" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">O(1)로 두 부분 문자열 비교</text>
  <text x="480" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">팰린드롬 판별</text>
  <text x="480" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">s와 reverse(s) 해시 배열 비교</text>
  <text x="660" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">문서 유사도</text>
  <text x="660" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Shingle 해시 집합 Jaccard</text>
</svg>
