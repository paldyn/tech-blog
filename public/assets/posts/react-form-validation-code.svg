<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">커스텀 훅으로 폼 유효성 검사</text>

  <!-- Left code panel -->
  <rect x="60" y="72" width="370" height="316" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="245" y="95" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">useFormField 커스텀 훅</text>
  <rect x="76" y="108" width="338" height="268" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="128" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve" fill="#ffffff">
    <tspan x="92" dy="0"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> useFormField(validate) {</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> [value, setValue] = useState(</tspan><tspan fill="#ce9178">''</tspan><tspan fill="#ffffff">);</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> [error, setError] = useState(</tspan><tspan fill="#b5cea8">null</tspan><tspan fill="#ffffff">);</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> [touched, setTouched] = useState(</tspan><tspan fill="#b5cea8">false</tspan><tspan fill="#ffffff">);</tspan></tspan>
    <tspan x="92" dy="20"> </tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> handleChange(e) {</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">    setValue(e.target.value);</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> (touched) setError(validate(e.target.value));</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">  }</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> handleBlur() {</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">    setTouched(</tspan><tspan fill="#b5cea8">true</tspan><tspan fill="#ffffff">);</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">    setError(validate(value));</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#ffffff">  }</tspan></tspan>
    <tspan x="92" dy="20"><tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> { value, error, handleChange, handleBlur };</tspan></tspan>
  </text>

  <!-- Right: Usage example -->
  <rect x="450" y="72" width="370" height="316" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="635" y="95" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">사용 예시</text>
  <rect x="466" y="108" width="338" height="268" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="128" font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve" fill="#ffffff">
    <tspan x="482" dy="0"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> email = useFormField(v =&gt;</tspan></tspan>
    <tspan x="482" dy="20"><tspan fill="#ffffff">  v.includes(</tspan><tspan fill="#ce9178">'@'</tspan><tspan fill="#ffffff">) ? </tspan><tspan fill="#b5cea8">null</tspan><tspan fill="#ffffff"> : </tspan><tspan fill="#ce9178">'이메일 형식 오류'</tspan></tspan>
    <tspan x="482" dy="20"><tspan fill="#ffffff">);</tspan></tspan>
    <tspan x="482" dy="20"> </tspan>
    <tspan x="482" dy="20"><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> (</tspan></tspan>
    <tspan x="482" dy="20"><tspan fill="#ffffff">  &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">div</tspan><tspan fill="#ffffff">&gt;</tspan></tspan>
    <tspan x="482" dy="20"><tspan fill="#ffffff">    &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">input</tspan></tspan>
    <tspan x="482" dy="20"><tspan fill="#ffffff">      value={email.value}</tspan></tspan>
    <tspan x="482" dy="20"><tspan fill="#ffffff">      onChange={email.handleChange}</tspan></tspan>
    <tspan x="482" dy="20"><tspan fill="#ffffff">      onBlur={email.handleBlur}</tspan></tspan>
    <tspan x="482" dy="20"><tspan fill="#ffffff">    /&gt;</tspan></tspan>
    <tspan x="482" dy="20"><tspan fill="#ffffff">    {email.error &amp;&amp; (</tspan></tspan>
    <tspan x="482" dy="20"><tspan fill="#ffffff">      &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">p</tspan><tspan fill="#ffffff"> style={{color:</tspan><tspan fill="#ce9178">'red'</tspan><tspan fill="#ffffff">}}&gt;{email.error}&lt;/</tspan><tspan fill="#7ec8e3" font-weight="600">p</tspan><tspan fill="#ffffff">&gt;</tspan></tspan>
    <tspan x="482" dy="20"><tspan fill="#ffffff">    )}</tspan></tspan>
  </text>
</svg>
