<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" style="background:#0a0a0a">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">TypeScript 타입 추론</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888" text-anchor="middle">명시하지 않아도 타입을 자동으로 알아냅니다</text>

  <!-- Left: explicit annotation -->
  <rect x="60" y="96" width="360" height="44" rx="8" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="240" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">명시적 타입 어노테이션</text>

  <rect x="60" y="150" width="360" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// 개발자가 직접 타입 명시</tspan></text>
  <text x="76" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">let</tspan><tspan fill="#ffffff"> count: </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff"> = </tspan><tspan fill="#b5cea8">42</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="76" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">let</tspan><tspan fill="#ffffff"> name: </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff"> = </tspan><tspan fill="#ce9178">"Alice"</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="76" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">let</tspan><tspan fill="#ffffff"> active: </tspan><tspan fill="#7ec8e3" font-weight="600">boolean</tspan><tspan fill="#ffffff"> = </tspan><tspan fill="#7ec8e3" font-weight="600">true</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="76" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// 중복 — 자동 추론과 동일</tspan></text>

  <!-- Right: type inference -->
  <rect x="460" y="96" width="360" height="44" rx="8" fill="#0d1a0d" stroke="#3a8e3a" stroke-width="1.5"/>
  <text x="640" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">타입 추론 (생략 가능)</text>

  <rect x="460" y="150" width="360" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// 초기값으로 타입 자동 추론</tspan></text>
  <text x="476" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">let</tspan><tspan fill="#ffffff"> count = </tspan><tspan fill="#b5cea8">42</tspan><tspan fill="#ffffff">;</tspan><tspan fill="#9aa4b8">     // number</tspan></text>
  <text x="476" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">let</tspan><tspan fill="#ffffff"> name = </tspan><tspan fill="#ce9178">"Alice"</tspan><tspan fill="#ffffff">;</tspan><tspan fill="#9aa4b8"> // string</tspan></text>
  <text x="476" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">let</tspan><tspan fill="#ffffff"> active = </tspan><tspan fill="#7ec8e3" font-weight="600">true</tspan><tspan fill="#ffffff">;</tspan><tspan fill="#9aa4b8">   // boolean</tspan></text>
  <text x="476" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#9aa4b8">// 타입 안전성은 동일하게 유지!</tspan></text>

  <!-- Middle: when to annotate -->
  <text x="440" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">언제 타입을 명시해야 할까?</text>

  <rect x="60" y="318" width="362" height="100" rx="8" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="84" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">명시 필요한 경우</text>
  <text x="84" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">- 함수 파라미터 (추론 불가)</text>
  <text x="84" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">- 초기값 없는 변수 선언</text>
  <text x="84" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">- 복잡한 객체 구조</text>

  <rect x="458" y="318" width="362" height="100" rx="8" fill="#0d0d1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">추론에 맡기는 경우</text>
  <text x="482" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">- 초기값이 있는 변수</text>
  <text x="482" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">- 함수 반환 타입 (명확한 경우)</text>
  <text x="482" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">- 배열, 객체 리터럴</text>

  <!-- Bottom tip -->
  <text x="440" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">IDE에서 변수 위에 마우스를 올리면 추론된 타입을 즉시 확인할 수 있습니다</text>
</svg>
