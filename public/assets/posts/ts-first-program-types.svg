<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">타입 주석 문법 핵심 패턴</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">변수, 함수 파라미터, 반환값에 타입을 붙이는 방법</text>
  <!-- Variable annotations -->
  <rect x="60" y="95" width="760" height="90" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">변수 타입 주석</text>
  <text x="80" y="143" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">let</text>
  <text x="107" y="143" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> name</text>
  <text x="149" y="143" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">: </text>
  <text x="164" y="143" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">string</text>
  <text x="215" y="143" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> = </text>
  <text x="244" y="143" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">"Alice"</text>
  <text x="344" y="143" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 명시적 타입</text>
  <text x="80" y="167" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">let</text>
  <text x="107" y="167" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> count = </text>
  <text x="174" y="167" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">0</text>
  <text x="185" y="167" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">;</text>
  <text x="344" y="167" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 추론: number</text>
  <!-- Function annotations -->
  <rect x="60" y="200" width="760" height="140" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="223" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">함수 파라미터 &amp; 반환 타입</text>
  <text x="80" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">function</text>
  <text x="169" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> greet(name</text>
  <text x="278" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">: </text>
  <text x="293" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">string</text>
  <text x="344" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">)</text>
  <text x="354" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">: </text>
  <text x="369" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">string</text>
  <text x="420" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> {</text>
  <text x="80" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  return</text>
  <text x="153" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve"> `Hello, ${name}!`</text>
  <text x="80" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>
  <text x="80" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 화살표 함수도 동일</text>
  <text x="80" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">const</text>
  <text x="131" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> add = (a</text>
  <text x="207" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">: </text>
  <text x="222" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">number</text>
  <text x="291" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">, b</text>
  <text x="319" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">: </text>
  <text x="334" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">number</text>
  <text x="403" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">)</text>
  <text x="413" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> =&gt; a + b;</text>
  <!-- Syntax formula -->
  <rect x="60" y="358" width="760" height="100" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">타입 주석 문법 공식</text>
  <text x="440" y="410" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#ffffff" xml:space="preserve">식별자</text>
  <text x="492" y="410" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#888" xml:space="preserve">: </text>
  <text x="508" y="410" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#7ec8e3" font-weight="600" xml:space="preserve">타입</text>
  <text x="556" y="410" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" fill="#aaa" xml:space="preserve"> = 값;</text>
  <text x="440" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">콜론(:) 뒤에 타입을 명시. 타입이 추론 가능하면 생략 가능 (타입스크립트가 알아서 추론)</text>
</svg>
