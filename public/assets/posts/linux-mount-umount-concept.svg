<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">마운트(mount) 개념 — 장치를 디렉터리 트리에 연결</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">블록 장치의 파일시스템을 특정 디렉터리(마운트 포인트)에 붙인다</text>

  <!-- LEFT: Before mount -->
  <text x="60" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">마운트 전</text>

  <!-- Root FS box -->
  <rect x="60" y="132" width="200" height="52" fill="#111827" rx="8" stroke="#2a3450" stroke-width="1.5"/>
  <text x="160" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">/  (루트)</text>
  <text x="160" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">sda1 — ext4</text>

  <!-- Dirs under root -->
  <rect x="60" y="206" width="90" height="40" fill="#111827" rx="6" stroke="#2a3450" stroke-width="1"/>
  <text x="105" y="231" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">/home</text>
  <rect x="170" y="206" width="90" height="40" fill="#111827" rx="6" stroke="#2a3450" stroke-width="1"/>
  <text x="215" y="231" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">/mnt</text>
  <!-- connector lines -->
  <line x1="160" y1="184" x2="105" y2="206" stroke="#2a3450" stroke-width="1.5"/>
  <line x1="160" y1="184" x2="215" y2="206" stroke="#2a3450" stroke-width="1.5"/>

  <!-- /mnt/data — empty label -->
  <rect x="170" y="268" width="90" height="40" fill="#0d1117" rx="6" stroke="#333" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="215" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">/mnt/data</text>
  <text x="215" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#444" text-anchor="middle">(비어 있음)</text>
  <line x1="215" y1="246" x2="215" y2="268" stroke="#333" stroke-width="2" stroke-dasharray="4 3"/>

  <!-- Disconnected device -->
  <rect x="110" y="340" width="160" height="52" fill="#1a1200" rx="8" stroke="#c07000" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="190" y="361" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e0a020" text-anchor="middle">sdb1</text>
  <text x="190" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">ext4 — 접근 불가</text>

  <!-- Arrow (no mount) -->
  <line x1="190" y1="308" x2="190" y2="340" stroke="#e05555" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="196" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">✕ 연결 없음</text>

  <!-- CENTER Arrow (mount command) -->
  <rect x="310" y="290" width="260" height="50" fill="#0d1117" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="311" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">$ sudo mount /dev/sdb1 \</text>
  <text x="440" y="329" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" text-anchor="middle" xml:space="preserve">        /mnt/data</text>
  <!-- Arrow shaft -->
  <rect x="426" y="348" width="28" height="30" fill="#55c555"/>
  <!-- Arrow head -->
  <polygon points="440,398 412,360 468,360" fill="#55c555"/>
  <rect x="428" y="348" width="24" height="1" fill="#0a0a0a" opacity="0.3"/>

  <!-- RIGHT: After mount -->
  <text x="600" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">마운트 후</text>

  <!-- Root FS box -->
  <rect x="600" y="132" width="200" height="52" fill="#111827" rx="8" stroke="#2a3450" stroke-width="1.5"/>
  <text x="700" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">/  (루트)</text>
  <text x="700" y="173" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">sda1 — ext4</text>

  <!-- Dirs under root -->
  <rect x="600" y="206" width="90" height="40" fill="#111827" rx="6" stroke="#2a3450" stroke-width="1"/>
  <text x="645" y="231" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">/home</text>
  <rect x="710" y="206" width="90" height="40" fill="#111827" rx="6" stroke="#2a3450" stroke-width="1"/>
  <text x="755" y="231" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">/mnt</text>
  <line x1="700" y1="184" x2="645" y2="206" stroke="#2a3450" stroke-width="1.5"/>
  <line x1="700" y1="184" x2="755" y2="206" stroke="#2a3450" stroke-width="1.5"/>

  <!-- /mnt/data — mounted -->
  <rect x="710" y="268" width="90" height="52" fill="#0a1f0a" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="755" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">/mnt/data</text>
  <text x="755" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888" text-anchor="middle">sdb1 연결됨</text>
  <line x1="755" y1="246" x2="755" y2="268" stroke="#55c555" stroke-width="1.5"/>

  <!-- Device (attached) -->
  <rect x="700" y="344" width="160" height="48" fill="#0a1f0a" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="780" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">sdb1</text>
  <text x="780" y="381" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">ext4 — 접근 가능 ✓</text>
  <line x1="755" y1="320" x2="755" y2="344" stroke="#55c555" stroke-width="1.5"/>
  <line x1="755" y1="344" x2="780" y2="344" stroke="#55c555" stroke-width="1.5"/>

  <!-- Footer labels -->
  <text x="440" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">umount /mnt/data 로 분리 · -t 옵션으로 파일시스템 타입 지정 · -o 로 마운트 옵션 설정</text>
</svg>
