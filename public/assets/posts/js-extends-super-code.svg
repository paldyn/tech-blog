  <!-- Title -->
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">extends와 super 키워드</text>
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">부모 클래스 상속 · super로 부모 생성자와 메서드 호출</text>

  <!-- Code block -->
  <rect x="60" y="100" width="760" height="256" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>

  <text x="76" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#e8e8e8"><tspan fill="#7ec8e3">class</tspan><tspan> Animal {</tspan></text>
  <text x="76" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#e8e8e8">  <tspan fill="#7ec8e3">constructor</tspan><tspan>(name) { </tspan><tspan fill="#7ec8e3">this</tspan><tspan>.name = name; }</tspan></text>
  <text x="76" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#e8e8e8">  speak() { <tspan fill="#7ec8e3">return</tspan><tspan> </tspan><tspan fill="#ce9178">'generic'</tspan><tspan>; }</tspan></text>
  <text x="76" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#e8e8e8">}</text>
  <text x="76" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#e8e8e8"> </text>
  <text x="76" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#e8e8e8"><tspan fill="#7ec8e3">class</tspan><tspan> Dog </tspan><tspan fill="#7ec8e3">extends</tspan><tspan> Animal {</tspan></text>
  <text x="76" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#e8e8e8">  <tspan fill="#7ec8e3">constructor</tspan><tspan>(name, breed) {</tspan></text>
  <text x="76" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#e8e8e8">    <tspan fill="#7ec8e3">super</tspan><tspan>(name); </tspan><tspan fill="#6a8aa0">// 부모 constructor 호출</tspan></text>
  <text x="76" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#e8e8e8">    <tspan fill="#7ec8e3">this</tspan><tspan>.breed = breed;</tspan></text>
  <text x="76" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#e8e8e8">  }</text>
  <text x="76" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#e8e8e8">  speak() { <tspan fill="#7ec8e3">return</tspan><tspan> `${</tspan><tspan fill="#7ec8e3">this</tspan><tspan>.name}: 멍!`; }</tspan></text>
  <text x="76" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#e8e8e8">}</text>

