<svg xmlns="http://www.w3.org/2000/svg" width="880" height="510" viewBox="0 0 880 510">
  <rect width="880" height="510" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="13" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">컨테이너 런타임 계층 구조</text>

  <!-- Layer 1: Kubernetes -->
  <rect x="240" y="76" width="400" height="56" rx="8" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="110" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">Kubernetes (kubelet)</text>
  <text x="828" y="104" text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">오케스트레이터</text>

  <!-- Arrow: K8s → CRI -->
  <line x1="440" y1="132" x2="440" y2="164" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Layer 2: CRI -->
  <rect x="240" y="164" width="400" height="56" rx="8" fill="#0d2d0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="198" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">CRI (Container Runtime Interface)</text>
  <text x="828" y="192" text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">표준 인터페이스</text>

  <!-- Arrows: CRI → containerd/CRI-O -->
  <line x1="330" y1="220" x2="230" y2="252" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="550" y1="220" x2="650" y2="252" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Layer 3a: containerd -->
  <rect x="70" y="252" width="300" height="56" rx="8" fill="#1e1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="220" y="286" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc">containerd</text>

  <!-- Layer 3b: CRI-O -->
  <rect x="510" y="252" width="300" height="56" rx="8" fill="#1e1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="660" y="286" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc">CRI-O</text>
  <text x="828" y="280" text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">고수준 런타임</text>

  <!-- Arrows: containerd/CRI-O → OCI -->
  <line x1="230" y1="308" x2="340" y2="340" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="660" y1="308" x2="548" y2="340" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Layer 4: OCI -->
  <rect x="240" y="340" width="400" height="56" rx="8" fill="#2d1a0a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="440" y="374" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#ce9178">OCI Runtime Spec</text>
  <text x="828" y="368" text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">OCI 표준</text>

  <!-- Arrows: OCI → runc/crun -->
  <line x1="330" y1="396" x2="230" y2="428" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="550" y1="396" x2="650" y2="428" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Layer 5a: runc -->
  <rect x="70" y="428" width="300" height="56" rx="8" fill="#1e1e1e" stroke="#888" stroke-width="1"/>
  <text x="220" y="462" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">runc</text>

  <!-- Layer 5b: crun / kata -->
  <rect x="510" y="428" width="300" height="56" rx="8" fill="#1e1e1e" stroke="#888" stroke-width="1"/>
  <text x="660" y="462" text-anchor="middle" dominant-baseline="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">crun / kata-containers</text>
  <text x="828" y="456" text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">저수준 런타임</text>
</svg>
