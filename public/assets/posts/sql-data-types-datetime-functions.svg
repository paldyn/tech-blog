<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">날짜/시간 함수 및 연산</text>

  <rect x="60" y="64" width="760" height="270" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text x="76" y="88" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 현재 날짜/시간</text>
  <text x="76" y="108" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">SELECT</tspan>
    <tspan fill="#ffffff"> CURRENT_DATE,  </tspan>
    <tspan fill="#9aa4b8">-- 2026-05-30</tspan>
  </text>
  <text x="76" y="128" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">       CURRENT_TIMESTAMP,  </tspan>
    <tspan fill="#9aa4b8">-- 2026-05-30 14:30:00+09</tspan>
  </text>
  <text x="76" y="148" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">       </tspan>
    <tspan fill="#7ec8e3" font-weight="600">now</tspan>
    <tspan fill="#ffffff">();</tspan>
    <tspan fill="#9aa4b8">            -- PostgreSQL 동의어</tspan>
  </text>

  <text x="76" y="174" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 날짜 연산 (INTERVAL)</text>
  <text x="76" y="194" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">SELECT</tspan>
    <tspan fill="#ffffff"> CURRENT_DATE + </tspan>
    <tspan fill="#7ec8e3" font-weight="600">INTERVAL</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#ce9178">'7 days'</tspan>
    <tspan fill="#ffffff">  </tspan>
    <tspan fill="#9aa4b8">-- 7일 후</tspan>
  </text>
  <text x="76" y="214" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">SELECT</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#7ec8e3" font-weight="600">EXTRACT</tspan>
    <tspan fill="#ffffff">(</tspan>
    <tspan fill="#7ec8e3" font-weight="600">YEAR FROM</tspan>
    <tspan fill="#ffffff"> birth_date)  </tspan>
    <tspan fill="#9aa4b8">-- 연도 추출</tspan>
  </text>

  <text x="76" y="240" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 타임존 변환</text>
  <text x="76" y="260" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">SELECT</tspan>
    <tspan fill="#ffffff"> created_at </tspan>
    <tspan fill="#7ec8e3" font-weight="600">AT TIME ZONE</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#ce9178">'Asia/Seoul'</tspan>
    <tspan fill="#ffffff">  </tspan>
    <tspan fill="#9aa4b8">-- PG</tspan>
  </text>
  <text x="76" y="280" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">SELECT</tspan>
    <tspan fill="#ffffff"> CONVERT_TZ(created_at, </tspan>
    <tspan fill="#ce9178">'UTC'</tspan>
    <tspan fill="#ffffff">, </tspan>
    <tspan fill="#ce9178">'Asia/Seoul'</tspan>
    <tspan fill="#ffffff">)  </tspan>
    <tspan fill="#9aa4b8">-- MySQL</tspan>
  </text>

  <text x="76" y="306" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 두 날짜 차이 (PostgreSQL)</text>
  <text x="76" y="326" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">SELECT</tspan>
    <tspan fill="#ffffff"> AGE(</tspan>
    <tspan fill="#7ec8e3" font-weight="600">NOW</tspan>
    <tspan fill="#ffffff">(), birth_date)  </tspan>
    <tspan fill="#9aa4b8">-- '25 years 3 mons 12 days'</tspan>
  </text>
</svg>
