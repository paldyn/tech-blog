<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">TypeScript 컴파일 파이프라인</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">타입 검사는 컴파일 시점 — 런타임에 타입 정보는 사라진다</text>

  <!-- Pipeline: .ts → Parser → Type Checker → Emitter → .js -->
  <!-- .ts file -->
  <rect x="60" y="110" width="100" height="60" rx="8" fill="#111520" stroke="#7ec8e3"/>
  <text x="110" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">.ts</text>
  <text x="110" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">소스 파일</text>

  <!-- Arrow 1 -->
  <line x1="160" y1="140" x2="193" y2="140" stroke="#888" stroke-width="2"/>
  <polygon points="193,134 206,140 193,146" fill="#888"/>

  <!-- Parser -->
  <rect x="206" y="110" width="130" height="60" rx="8" fill="#111520" stroke="#7777cc"/>
  <text x="271" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">파서</text>
  <text x="271" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">AST 생성</text>
  <text x="271" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">구문 분석</text>

  <!-- Arrow 2 -->
  <line x1="336" y1="140" x2="369" y2="140" stroke="#888" stroke-width="2"/>
  <polygon points="369,134 382,140 369,146" fill="#888"/>

  <!-- Type Checker -->
  <rect x="382" y="104" width="160" height="72" rx="8" fill="#111520" stroke="#e8e8e8"/>
  <text x="462" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">타입 검사기</text>
  <text x="462" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">타입 추론·오류 보고</text>
  <text x="462" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">심볼 테이블 구성</text>

  <!-- Arrow 3 -->
  <line x1="542" y1="140" x2="575" y2="140" stroke="#888" stroke-width="2"/>
  <polygon points="575,134 588,140 575,146" fill="#888"/>

  <!-- Emitter -->
  <rect x="588" y="110" width="130" height="60" rx="8" fill="#111520" stroke="#7777cc"/>
  <text x="653" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">에미터</text>
  <text x="653" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">타입 제거</text>
  <text x="653" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">JS 코드 생성</text>

  <!-- Arrow 4 -->
  <line x1="718" y1="140" x2="751" y2="140" stroke="#888" stroke-width="2"/>
  <polygon points="751,134 764,140 751,146" fill="#888"/>

  <!-- .js file -->
  <rect x="764" y="110" width="56" height="60" rx="8" fill="#111520" stroke="#55c555"/>
  <text x="792" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">.js</text>
  <text x="792" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">출력</text>

  <!-- Type error arrow going up from Type Checker -->
  <line x1="462" y1="104" x2="462" y2="78" stroke="#e05555" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="530" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">타입 오류 → 컴파일 실패 (옵션)</text>

  <!-- Code comparison below -->
  <!-- Left: TypeScript source -->
  <text x="60" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">TypeScript 소스</text>
  <rect x="60" y="226" width="360" height="136" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">function</text><text x="132" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> greet(name: </text><text x="241" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">string</text><text x="277" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">): </text><text x="295" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">string</text><text x="331" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> {</text>
  <text x="76" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  return</text><text x="124" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178"> `Hello, ${name}!`</text><text x="296" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">;</text>
  <text x="76" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>
  <text x="76" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 타입 오류 — 컴파일 시점에 잡힘</text>
  <text x="76" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">greet(</text><text x="112" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">42</text><text x="125" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">);</text><text x="148" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">  // TS2345 ❌</text>

  <!-- Arrow middle -->
  <line x1="432" y1="295" x2="460" y2="295" stroke="#7777cc" stroke-width="2"/>
  <polygon points="460,289 473,295 460,301" fill="#7777cc"/>
  <text x="450" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">컴파일</text>

  <!-- Right: compiled JS -->
  <text x="487" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">컴파일된 JavaScript</text>
  <rect x="487" y="226" width="333" height="136" rx="6" fill="#000000" stroke="#55c555"/>
  <text x="503" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 타입 정보 완전히 제거됨</text>
  <text x="503" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">function</text><text x="559" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> greet(name) {</text>
  <text x="503" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">  return</text><text x="551" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178"> `Hello, ${name}!`</text><text x="701" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">;</text>
  <text x="503" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>
</svg>
