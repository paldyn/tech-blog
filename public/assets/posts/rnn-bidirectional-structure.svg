<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">양방향 RNN 구조</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888">Forward + Backward 두 방향으로 컨텍스트 포착</text>

  <!-- Forward RNN row (top) -->
  <text x="60" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">→ Forward RNN</text>
  <!-- Cells -->
  <rect x="130" y="128" width="100" height="56" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <text x="180" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">F-Cell 1</text>
  <text x="180" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ h̄1</text>

  <rect x="320" y="128" width="100" height="56" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <text x="370" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">F-Cell 2</text>
  <text x="370" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ h̄2</text>

  <rect x="510" y="128" width="100" height="56" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <text x="560" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">F-Cell 3</text>
  <text x="560" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ h̄3</text>

  <rect x="700" y="128" width="100" height="56" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <text x="750" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">F-Cell 4</text>
  <text x="750" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">→ h̄4</text>

  <!-- Forward arrows -->
  <line x1="60" y1="156" x2="128" y2="156" stroke="#55c555" stroke-width="2"/>
  <polygon points="128,150 140,156 128,162" fill="#55c555"/>
  <line x1="230" y1="156" x2="318" y2="156" stroke="#55c555" stroke-width="2"/>
  <polygon points="318,150 330,156 318,162" fill="#55c555"/>
  <line x1="420" y1="156" x2="508" y2="156" stroke="#55c555" stroke-width="2"/>
  <polygon points="508,150 520,156 508,162" fill="#55c555"/>
  <line x1="610" y1="156" x2="698" y2="156" stroke="#55c555" stroke-width="2"/>
  <polygon points="698,150 710,156 698,162" fill="#55c555"/>
  <line x1="800" y1="156" x2="840" y2="156" stroke="#55c555" stroke-width="2"/>

  <!-- Backward RNN row (middle) -->
  <text x="60" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">← Backward RNN</text>
  <rect x="130" y="254" width="100" height="56" rx="8" fill="#0d1117" stroke="#e05555" stroke-width="2"/>
  <text x="180" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">B-Cell 1</text>
  <text x="180" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">← h̃1</text>

  <rect x="320" y="254" width="100" height="56" rx="8" fill="#0d1117" stroke="#e05555" stroke-width="2"/>
  <text x="370" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">B-Cell 2</text>
  <text x="370" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">← h̃2</text>

  <rect x="510" y="254" width="100" height="56" rx="8" fill="#0d1117" stroke="#e05555" stroke-width="2"/>
  <text x="560" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">B-Cell 3</text>
  <text x="560" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">← h̃3</text>

  <rect x="700" y="254" width="100" height="56" rx="8" fill="#0d1117" stroke="#e05555" stroke-width="2"/>
  <text x="750" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">B-Cell 4</text>
  <text x="750" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">← h̃4</text>

  <!-- Backward arrows (right to left) -->
  <line x1="840" y1="282" x2="802" y2="282" stroke="#e05555" stroke-width="2"/>
  <polygon points="802,276 790,282 802,288" fill="#e05555"/>
  <line x1="700" y1="282" x2="422" y2="282" stroke="#e05555" stroke-width="2"/>
  <polygon points="422,276 410,282 422,288" fill="#e05555"/>
  <line x1="320" y1="282" x2="232" y2="282" stroke="#e05555" stroke-width="2"/>
  <polygon points="232,276 220,282 232,288" fill="#e05555"/>
  <line x1="130" y1="282" x2="60" y2="282" stroke="#e05555" stroke-width="2"/>

  <!-- Input x labels -->
  <text x="180" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">x_1</text>
  <text x="370" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">x_2</text>
  <text x="560" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">x_3</text>
  <text x="750" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">x_4</text>
  <!-- Input arrows -->
  <line x1="180" y1="354" x2="180" y2="312" stroke="#888" stroke-width="1.5"/>
  <polygon points="174,312 180,300 186,312" fill="#888"/>
  <line x1="370" y1="354" x2="370" y2="312" stroke="#888" stroke-width="1.5"/>
  <polygon points="364,312 370,300 376,312" fill="#888"/>
  <line x1="560" y1="354" x2="560" y2="312" stroke="#888" stroke-width="1.5"/>
  <polygon points="554,312 560,300 566,312" fill="#888"/>
  <line x1="750" y1="354" x2="750" y2="312" stroke="#888" stroke-width="1.5"/>
  <polygon points="744,312 750,300 756,312" fill="#888"/>
  <!-- Same x arrows to forward -->
  <line x1="180" y1="354" x2="180" y2="184" stroke="#888" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="370" y1="354" x2="370" y2="184" stroke="#888" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="560" y1="354" x2="560" y2="184" stroke="#888" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="750" y1="354" x2="750" y2="184" stroke="#888" stroke-width="2" stroke-dasharray="4,3"/>

  <!-- Output = concat -->
  <rect x="60" y="390" width="760" height="40" rx="6" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="415" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">출력: y_t = [h̄_t ; h̃_t]  →  각 토큰에서 과거+미래 문맥을 모두 담은 2×hidden 벡터</text>
</svg>
