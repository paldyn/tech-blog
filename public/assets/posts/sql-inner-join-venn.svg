<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle" xml:space="preserve">INNER JOIN — 교집합 행 반환</text>

  <!-- Venn diagram -->
  <!-- Left circle: Table A -->
  <circle cx="300" cy="160" r="90" fill="#0a1020" stroke="#7ec8e3" stroke-width="2" fill-opacity="0.8"/>
  <!-- Right circle: Table B -->
  <circle cx="420" cy="160" r="90" fill="#0a1020" stroke="#7777cc" stroke-width="2" fill-opacity="0.8"/>
  <!-- Intersection highlight -->
  <clipPath id="leftClip">
    <circle cx="300" cy="160" r="90"/>
  </clipPath>
  <circle cx="420" cy="160" r="90" fill="#1a2a3a" stroke="none" clip-path="url(#leftClip)" fill-opacity="0.9"/>
  <!-- Intersection fill -->
  <ellipse cx="360" cy="160" rx="30" ry="70" fill="#7ec8e3" fill-opacity="0.25"/>

  <!-- Labels -->
  <text x="270" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">A만</text>
  <text x="270" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">(반환 안 됨)</text>
  <text x="450" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle" xml:space="preserve">B만</text>
  <text x="450" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" xml:space="preserve">(반환 안 됨)</text>
  <text x="360" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle" xml:space="preserve">A ∩ B</text>
  <text x="360" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle" xml:space="preserve">반환</text>

  <!-- Table labels -->
  <text x="240" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">users</text>
  <text x="480" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7777cc" text-anchor="middle" xml:space="preserve">orders</text>

  <!-- Example tables - right side -->
  <text x="600" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" xml:space="preserve">예시 데이터</text>

  <!-- users table -->
  <rect x="560" y="90" width="130" height="120" rx="4" fill="#0d1117" stroke="#7ec8e3" stroke-width="1"/>
  <text x="625" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" text-anchor="middle" xml:space="preserve">users</text>
  <line x1="560" y1="112" x2="690" y2="112" stroke="#1e2433"/>
  <text x="580" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve">id  name</text>
  <text x="580" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve"> 1  Alice</text>
  <text x="580" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve"> 2  Bob</text>
  <text x="580" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve"> 3  Carol</text>
  <text x="580" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve">           ↑주문없음</text>

  <!-- orders table -->
  <rect x="700" y="90" width="150" height="120" rx="4" fill="#0d1117" stroke="#7777cc" stroke-width="1"/>
  <text x="775" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc" text-anchor="middle" xml:space="preserve">orders</text>
  <line x1="700" y1="112" x2="850" y2="112" stroke="#1e2433"/>
  <text x="710" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve">id  user_id</text>
  <text x="710" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">10     1</text>
  <text x="710" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">11     1</text>
  <text x="710" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">12     2</text>
  <text x="710" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve">99     9  ← 없음</text>

  <!-- INNER JOIN result -->
  <rect x="560" y="228" width="290" height="110" rx="4" fill="#071a07" stroke="#55c555" stroke-width="1.5"/>
  <text x="705" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" text-anchor="middle" xml:space="preserve">INNER JOIN 결과</text>
  <line x1="560" y1="250" x2="850" y2="250" stroke="#1e3a1e"/>
  <text x="575" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888" xml:space="preserve">u.id  name   o.id</text>
  <text x="575" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" xml:space="preserve">   1  Alice    10</text>
  <text x="575" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" xml:space="preserve">   1  Alice    11</text>
  <text x="575" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" xml:space="preserve">   2  Bob      12</text>
  <text x="575" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#6a8aa0" xml:space="preserve">Carol(3), order(99) 제외</text>

  <!-- Code block -->
  <rect x="60" y="274" width="480" height="130" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- INNER JOIN 기본 문법</text>
  <text x="76" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">SELECT</text>
  <text x="124" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> u.id, u.name, o.id </text>
  <text x="280" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">AS</text>
  <text x="300" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> order_id</text>
  <text x="76" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">FROM</text>
  <text x="124" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">   users u</text>
  <text x="76" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">INNER JOIN</text>
  <text x="160" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> orders o</text>
  <text x="76" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">ON</text>
  <text x="100" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">         o.user_id = u.id;</text>
  <text x="76" y="386" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- JOIN 키워드만 써도 기본 INNER JOIN</text>
  <text x="76" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- Carol(주문없음), order(user없음) 모두 제외</text>

  <!-- Footer -->
  <text x="440" y="470" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle" xml:space="preserve">PALDYN — SQL 완전 정복</text>
</svg>
