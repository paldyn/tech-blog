<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">TCP 혼잡 제어: cwnd 변화 (Reno)</text>

  <!-- Axes -->
  <!-- Y axis -->
  <line x1="80" y1="80" x2="80" y2="420" stroke="#444" stroke-width="1.5"/>
  <text x="30" y="255" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" transform="rotate(-90, 30, 255)">cwnd (MSS)</text>

  <!-- X axis -->
  <line x1="80" y1="420" x2="840" y2="420" stroke="#444" stroke-width="1.5"/>
  <text x="460" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">전송 라운드 (RTT)</text>

  <!-- Y axis ticks -->
  <line x1="75" y1="130" x2="80" y2="130" stroke="#444" stroke-width="1"/>
  <text x="68" y="134" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">24</text>
  <line x1="75" y1="190" x2="80" y2="190" stroke="#444" stroke-width="1"/>
  <text x="68" y="194" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">18</text>
  <line x1="75" y1="250" x2="80" y2="250" stroke="#444" stroke-width="1"/>
  <text x="68" y="254" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">12</text>
  <line x1="75" y1="310" x2="80" y2="310" stroke="#444" stroke-width="1"/>
  <text x="68" y="314" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">6</text>
  <line x1="75" y1="370" x2="80" y2="370" stroke="#444" stroke-width="1"/>
  <text x="68" y="374" text-anchor="end" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">1</text>

  <!-- ssthresh line -->
  <line x1="80" y1="250" x2="840" y2="250" stroke="#ce9178" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="844" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#ce9178">ssthresh</text>

  <!-- Slow Start phase 1: exponential growth 1→2→4→8→12 -->
  <!-- Round 1: cwnd=1 -->
  <line x1="80" y1="420" x2="80" y2="370" stroke="#7ec8e3" stroke-width="2.5"/>
  <circle cx="80" cy="370" r="4" fill="#7ec8e3"/>

  <line x1="80" y1="370" x2="160" y2="310" stroke="#7ec8e3" stroke-width="2.5"/>
  <circle cx="160" cy="310" r="4" fill="#7ec8e3"/>

  <line x1="160" y1="310" x2="240" y2="250" stroke="#7ec8e3" stroke-width="2.5"/>
  <circle cx="240" cy="250" r="4" fill="#7ec8e3"/>

  <!-- Hits ssthresh: CA phase, linear growth 12→13→14 -->
  <line x1="240" y1="250" x2="320" y2="240" stroke="#55c555" stroke-width="2.5"/>
  <circle cx="320" cy="240" r="4" fill="#55c555"/>
  <line x1="320" y1="240" x2="400" y2="230" stroke="#55c555" stroke-width="2.5"/>
  <circle cx="400" cy="230" r="4" fill="#55c555"/>
  <line x1="400" y1="230" x2="480" y2="220" stroke="#55c555" stroke-width="2.5"/>
  <circle cx="480" cy="220" r="4" fill="#55c555"/>

  <!-- Triple Dup-ACK loss event (Fast Retransmit) at cwnd≈16 -->
  <line x1="480" y1="220" x2="480" y2="215" stroke="#55c555" stroke-width="2.5"/>
  <!-- Sudden drop to ssthresh/2 -->
  <line x1="480" y1="215" x2="560" y2="285" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4"/>
  <circle cx="560" cy="285" r="4" fill="#e05555"/>

  <!-- Loss event marker -->
  <text x="488" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">Triple</text>
  <text x="488" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">Dup-ACK</text>
  <line x1="480" y1="225" x2="480" y2="420" stroke="#e05555" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- CA phase after recovery -->
  <line x1="560" y1="285" x2="640" y2="275" stroke="#55c555" stroke-width="2.5"/>
  <circle cx="640" cy="275" r="4" fill="#55c555"/>
  <line x1="640" y1="275" x2="720" y2="265" stroke="#55c555" stroke-width="2.5"/>
  <circle cx="720" cy="265" r="4" fill="#55c555"/>

  <!-- Timeout event (RTO) -->
  <line x1="720" y1="265" x2="800" y2="370" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4"/>
  <circle cx="800" cy="370" r="4" fill="#e05555"/>
  <text x="724" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">Timeout</text>
  <line x1="720" y1="265" x2="720" y2="420" stroke="#e05555" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Labels -->
  <rect x="88" y="92" width="100" height="30" rx="4" fill="#0a1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="138" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">Slow Start</text>

  <rect x="256" y="92" width="160" height="30" rx="4" fill="#0a2a0a" stroke="#55c555" stroke-width="1"/>
  <text x="336" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">Congestion Avoidance</text>

  <!-- X axis labels -->
  <text x="80" y="435" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">1</text>
  <text x="160" y="435" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">2</text>
  <text x="240" y="435" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">3</text>
  <text x="320" y="435" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">4</text>
  <text x="400" y="435" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">5</text>
  <text x="480" y="435" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">6</text>
  <text x="560" y="435" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">7</text>
  <text x="640" y="435" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">8</text>
  <text x="720" y="435" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">9</text>
  <text x="800" y="435" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">10</text>

  <!-- Legend -->
  <rect x="60" y="462" width="760" height="28" rx="4" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="80" y1="476" x2="108" y2="476" stroke="#7ec8e3" stroke-width="2.5"/>
  <text x="112" y="480" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">Slow Start (지수)</text>
  <line x1="240" y1="476" x2="268" y2="476" stroke="#55c555" stroke-width="2.5"/>
  <text x="272" y="480" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">Congestion Avoidance (선형)</text>
  <line x1="470" y1="476" x2="498" y2="476" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="502" y="480" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">손실 이벤트 복구</text>
</svg>
