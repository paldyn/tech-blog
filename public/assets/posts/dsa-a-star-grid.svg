<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-path" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">A* 탐색 — f(n) = g(n) + h(n)</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">g(n): 출발점~n 실제 비용 | h(n): n~목표 휴리스틱 추정값</text>

  <!-- Grid 7x6 starting at x=60, y=90, cell=64 -->
  <!-- Row 0 -->
  <!-- Col 0: Start -->
  <rect x="60" y="90" width="64" height="64" fill="#1a3a5e" rx="4" stroke="#7ec8e3" stroke-width="2"/>
  <text x="92" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">S</text>
  <text x="92" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3" text-anchor="middle">g=0</text>
  <text x="92" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3" text-anchor="middle">h=6</text>

  <!-- Col 1 -->
  <rect x="124" y="90" width="64" height="64" fill="#1a3a1a" rx="4" stroke="#55c555" stroke-width="2"/>
  <text x="156" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">g=1,h=5</text>
  <text x="156" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">f=6</text>

  <!-- Col 2 -->
  <rect x="188" y="90" width="64" height="64" fill="#111" rx="4" stroke="#333" stroke-width="1"/>
  <text x="220" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">g=2,h=4</text>
  <text x="220" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">f=6</text>

  <!-- Col 3: Wall -->
  <rect x="252" y="90" width="64" height="64" fill="#2a2a2a" rx="4" stroke="#444" stroke-width="1"/>
  <text x="284" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#555" text-anchor="middle">■</text>

  <!-- Col 4 -->
  <rect x="316" y="90" width="64" height="64" fill="#111" rx="4" stroke="#333" stroke-width="1"/>
  <text x="348" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">g=4,h=2</text>
  <text x="348" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">f=6</text>

  <!-- Col 5 -->
  <rect x="380" y="90" width="64" height="64" fill="#1a3a1a" rx="4" stroke="#55c555" stroke-width="2"/>
  <text x="412" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">g=5,h=1</text>
  <text x="412" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">f=6</text>

  <!-- Col 6: Goal -->
  <rect x="444" y="90" width="64" height="64" fill="#3a1a1a" rx="4" stroke="#e05555" stroke-width="2"/>
  <text x="476" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">G</text>
  <text x="476" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555" text-anchor="middle">g=6,h=0</text>
  <text x="476" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555" text-anchor="middle">f=6</text>

  <!-- Row 1 -->
  <rect x="60" y="154" width="64" height="64" fill="#111" rx="4" stroke="#333" stroke-width="1"/>
  <text x="92" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">g=1,h=7</text>

  <rect x="124" y="154" width="64" height="64" fill="#111" rx="4" stroke="#333" stroke-width="1"/>
  <text x="156" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">g=2,h=6</text>

  <rect x="188" y="154" width="64" height="64" fill="#111" rx="4" stroke="#333" stroke-width="1"/>
  <text x="220" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">g=3,h=5</text>

  <!-- Wall -->
  <rect x="252" y="154" width="64" height="64" fill="#2a2a2a" rx="4" stroke="#444" stroke-width="1"/>
  <text x="284" y="189" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#555" text-anchor="middle">■</text>

  <rect x="316" y="154" width="64" height="64" fill="#111" rx="4" stroke="#333" stroke-width="1"/>
  <text x="348" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">g=5,h=3</text>

  <rect x="380" y="154" width="64" height="64" fill="#111" rx="4" stroke="#333" stroke-width="1"/>
  <text x="412" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">g=6,h=2</text>

  <rect x="444" y="154" width="64" height="64" fill="#111" rx="4" stroke="#333" stroke-width="1"/>
  <text x="476" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">g=7,h=1</text>

  <!-- Row 2 -->
  <rect x="60" y="218" width="64" height="64" fill="#111" rx="4" stroke="#333" stroke-width="1"/>
  <rect x="124" y="218" width="64" height="64" fill="#2a2a2a" rx="4" stroke="#444" stroke-width="1"/>
  <text x="156" y="253" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#555" text-anchor="middle">■</text>
  <rect x="188" y="218" width="64" height="64" fill="#2a2a2a" rx="4" stroke="#444" stroke-width="1"/>
  <text x="220" y="253" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#555" text-anchor="middle">■</text>
  <rect x="252" y="218" width="64" height="64" fill="#2a2a2a" rx="4" stroke="#444" stroke-width="1"/>
  <text x="284" y="253" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" fill="#555" text-anchor="middle">■</text>
  <rect x="316" y="218" width="64" height="64" fill="#111" rx="4" stroke="#333" stroke-width="1"/>
  <rect x="380" y="218" width="64" height="64" fill="#111" rx="4" stroke="#333" stroke-width="1"/>
  <rect x="444" y="218" width="64" height="64" fill="#111" rx="4" stroke="#333" stroke-width="1"/>

  <!-- Path arrows row 0 -->
  <line x1="124" y1="122" x2="186" y2="122" stroke="#55c555" stroke-width="2.5" marker-end="url(#arr-path)"/>
  <line x1="252" y1="122" x2="314" y2="122" stroke="#55c555" stroke-width="2.5" marker-end="url(#arr-path)"/>
  <line x1="380" y1="122" x2="442" y2="122" stroke="#55c555" stroke-width="2.5" marker-end="url(#arr-path)"/>

  <!-- Around wall path: detour via row1 col2-col4 -->
  <line x1="220" y1="154" x2="220" y2="148" stroke="#55c555" stroke-width="2.5"/>
  <line x1="348" y1="148" x2="348" y2="154" stroke="#55c555" stroke-width="2.5" marker-end="url(#arr-path)"/>
  <line x1="220" y1="148" x2="348" y2="148" stroke="#55c555" stroke-width="2.5"/>

  <!-- Right info panel -->
  <rect x="540" y="90" width="300" height="300" fill="#111" rx="10" stroke="#333" stroke-width="1"/>
  <text x="690" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">A* vs 다익스트라</text>

  <text x="560" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" font-weight="600">다익스트라</text>
  <text x="560" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">f(n) = g(n)</text>
  <text x="560" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">목표 방향 무관하게 탐색</text>
  <text x="560" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">모든 방향 균등 확장</text>

  <line x1="560" y1="220" x2="830" y2="220" stroke="#333" stroke-width="1"/>

  <text x="560" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" font-weight="600">A*</text>
  <text x="560" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">f(n) = g(n) + h(n)</text>
  <text x="560" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">목표 방향으로 편향 탐색</text>
  <text x="560" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">h(n)이 정확할수록 빠름</text>

  <line x1="560" y1="316" x2="830" y2="316" stroke="#333" stroke-width="1"/>

  <text x="560" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc" font-weight="600">허용 가능 휴리스틱 조건</text>
  <text x="560" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">h(n) ≤ 실제 남은 비용</text>
  <text x="560" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">(과대평가 시 최적해 보장 안 됨)</text>

  <!-- Legend -->
  <rect x="540" y="410" width="300" height="72" fill="#111" rx="8" stroke="#333" stroke-width="1"/>
  <rect x="556" y="424" width="16" height="16" fill="#1a3a5e" rx="2" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="582" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">출발(S)</text>
  <rect x="650" y="424" width="16" height="16" fill="#3a1a1a" rx="2" stroke="#e05555" stroke-width="1.5"/>
  <text x="676" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">목표(G)</text>
  <rect x="556" y="452" width="16" height="16" fill="#1a3a1a" rx="2" stroke="#55c555" stroke-width="1.5"/>
  <text x="582" y="464" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">최단 경로</text>
  <rect x="650" y="452" width="16" height="16" fill="#2a2a2a" rx="2" stroke="#444" stroke-width="1.5"/>
  <text x="676" y="464" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">장벽(Wall)</text>
</svg>
