<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">STP 동작 — 루프 없는 트리 형성</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">루트 브리지 선출 → 최단 경로 유지 → 루프 포트 차단 (Blocking)</text>

  <defs>
    <marker id="stp1" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Root Bridge -->
  <rect x="330" y="90" width="220" height="64" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="2.5"/>
  <text x="440" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555" text-anchor="middle" font-weight="700">SW1 (루트 브리지)</text>
  <text x="440" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">BID: 0001.AAAA.BBBB  우선순위: 4096</text>

  <!-- SW2 -->
  <rect x="120" y="260" width="180" height="56" rx="8" fill="#0f1a0f" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="210" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle" font-weight="600">SW2</text>
  <text x="210" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Root Port: Gi0/1</text>

  <!-- SW3 -->
  <rect x="580" y="260" width="180" height="56" rx="8" fill="#0f1a0f" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="670" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle" font-weight="600">SW3</text>
  <text x="670" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Root Port: Gi0/1</text>

  <!-- Links Root to SW2 and SW3 -->
  <line x1="390" y1="154" x2="260" y2="260" stroke="#55c555" stroke-width="2" marker-end="url(#stp1)"/>
  <text x="295" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">지정 포트</text>

  <line x1="490" y1="154" x2="620" y2="260" stroke="#55c555" stroke-width="2" marker-end="url(#stp1)"/>
  <text x="574" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">지정 포트</text>

  <!-- Link SW2 to SW3 - BLOCKED -->
  <line x1="300" y1="288" x2="580" y2="288" stroke="#e05555" stroke-width="2" stroke-dasharray="6,4"/>
  <rect x="386" y="272" width="108" height="30" rx="6" fill="#1a0f0f" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle" font-weight="600">차단 (Blocking)</text>

  <!-- Legend -->
  <rect x="60" y="370" width="760" height="68" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="80" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" font-weight="600">포트 역할</text>
  <text x="80" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">루트 포트(RP)</text>
  <text x="180" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">비루트 스위치에서 루트 브리지로 가는 최단 경로</text>
  <text x="80" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">지정 포트(DP)</text>
  <text x="180" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">세그먼트에서 루트로 최단 — 포워딩 상태</text>
  <text x="480" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">비지정 포트</text>
  <text x="568" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">루프 방지를 위해 차단 (Blocking) 상태</text>
  <text x="480" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">RSTP(802.1w)는 수렴 시간을 1~2초로 단축 (STP 30~50초)</text>
</svg>
