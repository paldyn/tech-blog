<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">와일드카드 ? — 세 가지 형태</text>

  <!-- 3 columns -->
  <!-- Column 1: Unbounded -->
  <rect x="40" y="64" width="240" height="300" fill="#111111" rx="10" stroke="#7777cc" stroke-width="1"/>
  <rect x="40" y="64" width="240" height="40" fill="#1e1b4b" rx="10"/>
  <rect x="40" y="96" width="240" height="8" fill="#1e1b4b"/>
  <text x="160" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#a5b4fc" text-anchor="middle">비한정 와일드카드</text>
  <text x="160" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">List&lt;?&gt;</text>
  <text x="160" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">모든 타입 허용</text>
  <text x="56" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#9aa4b8">// 읽기: Object만 가능</tspan></text>
  <text x="56" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Object</tspan><tspan fill="#ffffff"> o = list.get(</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="56" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#9aa4b8">// 쓰기: null 만 가능</tspan></text>
  <text x="56" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">list.add(</tspan><tspan fill="#7ec8e3" font-weight="600">null</tspan><tspan fill="#ffffff">); </tspan><tspan fill="#9aa4b8">// OK</tspan></text>
  <text x="56" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">list.add("x"); // 오류!</text>
  <text x="56" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">용도: 타입 무관 읽기,</text>
  <text x="56" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">size() 등 메서드 호출</text>
  <text x="56" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">void</tspan><tspan fill="#ffffff"> printAll(List&lt;?&gt; list)</tspan></text>

  <!-- Column 2: Upper bounded -->
  <rect x="320" y="64" width="240" height="300" fill="#111111" rx="10" stroke="#7ec8e3" stroke-width="1"/>
  <rect x="320" y="64" width="240" height="40" fill="#0d1a2a" rx="10"/>
  <rect x="320" y="96" width="240" height="8" fill="#0d1a2a"/>
  <text x="440" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">상한 와일드카드</text>
  <text x="440" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">List&lt;? extends Number&gt;</text>
  <text x="440" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">Number 및 하위 타입 허용</text>
  <text x="336" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#9aa4b8">// 읽기: Number로 가능</tspan></text>
  <text x="336" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Number</tspan><tspan fill="#ffffff"> n = list.get(</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="336" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#9aa4b8">// 쓰기: 불가</tspan></text>
  <text x="336" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">list.add(42); // 컴파일 오류!</text>
  <text x="336" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">용도: 생산자 (Producer),</text>
  <text x="336" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">읽기 전용 컬렉션 처리</text>
  <text x="336" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">double</tspan><tspan fill="#ffffff"> sum(List&lt;? </tspan><tspan fill="#7ec8e3" font-weight="600">extends</tspan><tspan fill="#ffffff"> Number&gt;)</tspan></text>

  <!-- Column 3: Lower bounded -->
  <rect x="600" y="64" width="240" height="300" fill="#111111" rx="10" stroke="#55c555" stroke-width="1"/>
  <rect x="600" y="64" width="240" height="40" fill="#081a08" rx="10"/>
  <rect x="600" y="96" width="240" height="8" fill="#081a08"/>
  <text x="720" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">하한 와일드카드</text>
  <text x="720" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">List&lt;? super Integer&gt;</text>
  <text x="720" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">Integer 및 상위 타입 허용</text>
  <text x="616" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#9aa4b8">// 읽기: Object만 안전</tspan></text>
  <text x="616" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Object</tspan><tspan fill="#ffffff"> o = list.get(</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="616" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#9aa4b8">// 쓰기: Integer 및 하위 가능</tspan></text>
  <text x="616" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">list.add(42); // OK</text>
  <text x="616" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">용도: 소비자 (Consumer),</text>
  <text x="616" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">쓰기 전용 컬렉션 처리</text>
  <text x="616" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">void</tspan><tspan fill="#ffffff"> fill(List&lt;? </tspan><tspan fill="#7ec8e3" font-weight="600">super</tspan><tspan fill="#ffffff"> Integer&gt;)</tspan></text>

  <text x="440" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">와일드카드는 제네릭 파라미터가 아닌 매개변수·반환 타입 위치에서 유연성을 제공</text>
</svg>
