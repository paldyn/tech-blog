<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">자동 증가 키 — SERIAL · IDENTITY · UUID</text>

  <!-- SERIAL/SEQUENCE -->
  <rect x="60" y="66" width="360" height="280" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">SERIAL / IDENTITY (정수 자동 증가)</text>

  <text x="80" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">-- PostgreSQL SERIAL (레거시)</tspan></text>
  <text x="80" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">ID </tspan><tspan fill="#7ec8e3" font-weight="600">SERIAL PRIMARY KEY</tspan></text>

  <text x="80" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">-- SQL:2003 표준 IDENTITY</tspan></text>
  <text x="80" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">ID </tspan><tspan fill="#7ec8e3" font-weight="600">INTEGER</tspan></text>
  <text x="80" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">   GENERATED ALWAYS</tspan></text>
  <text x="80" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">   AS IDENTITY</tspan></text>
  <text x="80" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">   PRIMARY KEY</tspan></text>

  <text x="80" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">-- MySQL AUTO_INCREMENT</tspan></text>
  <text x="80" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">ID </tspan><tspan fill="#7ec8e3" font-weight="600">INT AUTO_INCREMENT PK</tspan></text>

  <text x="240" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">장점: 빠름, 작음, 순서 있음</text>
  <text x="240" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">주의: URL에 노출 시 순서 예측 가능</text>

  <!-- UUID -->
  <rect x="460" y="66" width="360" height="280" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ce9178">UUID / ULID</text>

  <text x="480" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">-- UUID v4 (완전 랜덤)</tspan></text>
  <text x="480" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">ID </tspan><tspan fill="#7ec8e3" font-weight="600">UUID DEFAULT</tspan></text>
  <text x="480" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">   gen_random_uuid()</tspan></text>
  <text x="480" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">   PRIMARY KEY</tspan></text>

  <text x="480" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">-- UUID v7 (시간 정렬, 권장)</tspan></text>
  <text x="480" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">-- '018e5b1d-....'</tspan></text>
  <text x="480" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">-- 앞 48비트 = Unix ms 타임스탬프</tspan></text>
  <text x="480" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">-- B-tree 삽입 순서 보장</tspan></text>

  <text x="640" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">장점: 전역 유일, 분산 생성 가능</text>
  <text x="640" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">UUID v4 단점: 랜덤 → B-tree 단편화</text>
  <text x="640" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">UUID v7/ULID: 순서 보장으로 단편화 해결</text>

  <text x="440" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">단일 DB: INTEGER IDENTITY 권장 / 분산·마이크로서비스: UUID v7 또는 Snowflake ID</text>
</svg>
