<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">mTLS — 상호 인증 핸드셰이크 흐름</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">TLS vs mTLS: 서버만 인증 vs 클라이언트도 인증</text>

  <defs>
    <marker id="mtlsR" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="mtlsL" viewBox="0 0 14 14" refX="2" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto-start-reverse">
      <path d="M 13 0 L 0 7 L 13 14 z" fill="#55c555"/>
    </marker>
    <marker id="mtlsRed" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- 왼쪽: 일반 TLS -->
  <rect x="60" y="88" width="340" height="36" rx="6" fill="#1a0a0a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">일반 TLS (단방향 인증)</text>

  <text x="95" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">클라이언트</text>
  <text x="310" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">서버</text>
  <line x1="110" y1="148" x2="110" y2="390" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
  <line x1="360" y1="148" x2="360" y2="390" stroke="#55c555" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>

  <line x1="110" y1="170" x2="360" y2="170" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#mtlsR)"/>
  <text x="235" y="165" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">ClientHello</text>

  <line x1="360" y1="205" x2="110" y2="205" stroke="#55c555" stroke-width="1.5" marker-end="url(#mtlsL)"/>
  <text x="235" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">ServerHello + 서버 인증서</text>

  <!-- 서버 인증서 검증 표시 -->
  <rect x="85" y="215" width="120" height="22" rx="4" fill="#0a1520" stroke="#7ec8e3" stroke-width="1" opacity="0.7"/>
  <text x="145" y="229" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">서버 인증서 검증 ✓</text>

  <line x1="110" y1="255" x2="360" y2="255" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#mtlsR)"/>
  <text x="235" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">ClientKeyExchange + Finished</text>

  <line x1="360" y1="295" x2="110" y2="295" stroke="#55c555" stroke-width="1.5" marker-end="url(#mtlsL)"/>
  <text x="235" y="290" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">Finished</text>

  <text x="230" y="335" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">연결 성립 — 서버만 인증됨</text>
  <text x="230" y="355" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">누구나 연결 가능 (클라 인증 없음)</text>

  <!-- 오른쪽: mTLS -->
  <rect x="480" y="88" width="340" height="36" rx="6" fill="#0d2a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">mTLS (상호 인증)</text>

  <text x="505" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">클라이언트</text>
  <text x="730" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">서버</text>
  <line x1="520" y1="148" x2="520" y2="430" stroke="#7ec8e3" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
  <line x1="775" y1="148" x2="775" y2="430" stroke="#55c555" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>

  <line x1="520" y1="170" x2="775" y2="170" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#mtlsR)"/>
  <text x="647" y="165" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">ClientHello</text>

  <line x1="775" y1="205" x2="520" y2="205" stroke="#55c555" stroke-width="1.5" marker-end="url(#mtlsL)"/>
  <text x="647" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">ServerHello + 서버 인증서 + CertRequest</text>

  <!-- 서버 인증서 검증 표시 -->
  <rect x="495" y="214" width="120" height="22" rx="4" fill="#0a1520" stroke="#7ec8e3" stroke-width="1" opacity="0.7"/>
  <text x="555" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">서버 인증서 검증 ✓</text>

  <line x1="520" y1="255" x2="775" y2="255" stroke="#7777cc" stroke-width="1.5" marker-end="url(#mtlsRed)"/>
  <text x="647" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">클라이언트 인증서 + CertVerify + Finished</text>

  <!-- 클라 인증서 검증 표시 -->
  <rect x="660" y="263" width="120" height="22" rx="4" fill="#0d1a0d" stroke="#55c555" stroke-width="1" opacity="0.7"/>
  <text x="720" y="277" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#55c555">클라 인증서 검증 ✓</text>

  <line x1="775" y1="305" x2="520" y2="305" stroke="#55c555" stroke-width="1.5" marker-end="url(#mtlsL)"/>
  <text x="647" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e8e8e8">Finished</text>

  <text x="647" y="345" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">연결 성립 — 양방향 인증됨</text>
  <text x="647" y="365" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">인증된 클라이언트만 접근 가능</text>

  <!-- 사용 사례 -->
  <rect x="60" y="420" width="760" height="56" rx="8" fill="#111"/>
  <text x="440" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8e8e8">mTLS 주요 사용 사례</text>
  <text x="200" y="460" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">마이크로서비스 간 통신</text>
  <text x="440" y="460" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">제로트러스트 아키텍처</text>
  <text x="700" y="460" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">API 게이트웨이 인증</text>
</svg>
