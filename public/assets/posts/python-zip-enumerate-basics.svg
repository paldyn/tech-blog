<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">zip과 enumerate 동작 원리</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">인덱스 없이 병렬 순회 · 인덱스와 함께 순회</text>

  <!-- zip -->
  <rect x="60" y="100" width="360" height="230" rx="8" fill="#111827" stroke="#3a4a6e"/>
  <text x="240" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">zip(a, b, ...)</text>

  <!-- Visual: two lists → tuples -->
  <text x="130" y="152" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">["A","B","C"]</text>
  <text x="320" y="152" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">[1, 2, 3]</text>
  <text x="224" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">+</text>

  <line x1="130" y1="156" x2="200" y2="174" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="320" y1="156" x2="200" y2="174" stroke="#7ec8e3" stroke-width="1.5"/>

  <text x="200" y="186" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">→ ("A",1), ("B",2), ("C",3)</text>

  <rect x="76" y="200" width="328" height="114" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="92" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">names = [<tspan fill="#ce9178">"Alice"</tspan>, <tspan fill="#ce9178">"Bob"</tspan>, <tspan fill="#ce9178">"Charlie"</tspan>]</text>
  <text x="92" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">ages  = [<tspan fill="#b5cea8">25</tspan>, <tspan fill="#b5cea8">30</tspan>, <tspan fill="#b5cea8">35</tspan>]</text>
  <text x="92" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">for name, age <tspan fill="#7ec8e3">in</tspan> <tspan fill="#7ec8e3">zip</tspan>(names, ages):</text>
  <text x="92" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">print</tspan>(<tspan fill="#ce9178">f"{name}: {age}"</tspan>)</text>
  <text x="92" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># Alice: 25 / Bob: 30 / Charlie: 35</text>

  <!-- enumerate -->
  <rect x="460" y="100" width="360" height="230" rx="8" fill="#111827" stroke="#3a4a6e"/>
  <text x="640" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">enumerate(iterable, start=0)</text>

  <!-- Visual -->
  <text x="600" y="152" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">["A","B","C"]</text>
  <line x1="600" y1="156" x2="640" y2="174" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="186" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">→ (0,"A"),(1,"B"),(2,"C")</text>

  <rect x="476" y="200" width="328" height="114" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="492" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">items = [<tspan fill="#ce9178">"apple"</tspan>, <tspan fill="#ce9178">"banana"</tspan>, <tspan fill="#ce9178">"cherry"</tspan>]</text>
  <text x="492" y="238" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">for i, item <tspan fill="#7ec8e3">in</tspan> <tspan fill="#7ec8e3">enumerate</tspan>(items):</text>
  <text x="492" y="256" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    <tspan fill="#7ec8e3">print</tspan>(<tspan fill="#ce9178">f"{i+1}. {item}"</tspan>)</text>
  <text x="492" y="274" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 1. apple / 2. banana / 3. cherry</text>
  <text x="492" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># enumerate(items, start=1) 도 가능</text>

  <!-- Key differences -->
  <rect x="60" y="350" width="760" height="120" rx="8" fill="#111827" stroke="#3a4a6e"/>
  <text x="440" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">핵심 특성 비교</text>

  <text x="200" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">특성</text>
  <text x="460" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">zip</text>
  <text x="700" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">enumerate</text>
  <line x1="76" y1="408" x2="804" y2="408" stroke="#333" stroke-width="1"/>

  <text x="200" y="428" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">반환 타입</text>
  <text x="460" y="428" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">zip 객체 (지연)</text>
  <text x="700" y="428" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">enumerate 객체 (지연)</text>

  <text x="200" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">길이 불일치</text>
  <text x="460" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">짧은 쪽에서 중단</text>
  <text x="700" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">N/A</text>

  <text x="440" y="484" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">둘 다 지연 평가 이터레이터 — list()로 감싸야 즉시 확인 가능</text>
</svg>
