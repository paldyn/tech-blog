<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a;">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">Select / MultiSelect — 리스트 선택 비교</text>

  <!-- Left: Select -->
  <rect x="50" y="66" width="370" height="376" rx="8" fill="#0d1220" stroke="#2a3a4a" stroke-width="1.5"/>
  <text x="235" y="94" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#7ec8e3">Select (단일 선택)</text>

  <!-- Select mock UI -->
  <rect x="70" y="106" width="330" height="140" rx="6" fill="#0d1828" stroke="#1e3050"/>
  <!-- Items -->
  <rect x="76" y="112" width="318" height="28" rx="3" fill="#1a3060"/>
  <text x="90" y="131" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#7ec8e3">▶ 개발팀</text>
  <text x="70" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">  영업팀</text>
  <text x="70" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">  기획팀</text>
  <text x="70" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">  인사팀</text>
  <text x="70" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">  재무팀</text>

  <!-- Select properties -->
  <rect x="70" y="260" width="330" height="160" rx="6" fill="#0d1828"/>
  <text x="84" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#7ec8e3">value</text>
  <text x="170" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e8e8e8">선택 코드값 (단일)</text>

  <text x="84" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#7ec8e3">selectcount</text>
  <text x="170" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e8e8e8">선택 항목 수 (항상 1)</text>

  <text x="84" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#7ec8e3">innerdataset</text>
  <text x="170" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e8e8e8">소스 Dataset</text>

  <text x="84" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#55c555">onchanged</text>
  <text x="170" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e8e8e8">선택 변경 이벤트</text>

  <rect x="70" y="360" width="330" height="42" rx="4" fill="#0a1a0a" stroke="#1e4020"/>
  <text x="84" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555">sel.value → 선택된 코드 1개</text>
  <text x="84" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">Combo와 유사, 리스트 항상 노출</text>

  <!-- Right: MultiSelect -->
  <rect x="460" y="66" width="370" height="376" rx="8" fill="#0d1220" stroke="#2a3a4a" stroke-width="1.5"/>
  <text x="645" y="94" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#55c555">MultiSelect (다중 선택)</text>

  <!-- MultiSelect mock UI -->
  <rect x="480" y="106" width="330" height="140" rx="6" fill="#0d1828" stroke="#1e3050"/>
  <!-- Items with checkboxes -->
  <rect x="486" y="112" width="14" height="14" rx="2" fill="#55c555"/>
  <text x="490" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="10" fill="#0a0a0a">✓</text>
  <text x="506" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e8e8e8">개발팀</text>

  <rect x="486" y="136" width="14" height="14" rx="2" fill="none" stroke="#555" stroke-width="1.5"/>
  <text x="506" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">영업팀</text>

  <rect x="486" y="160" width="14" height="14" rx="2" fill="#55c555"/>
  <text x="490" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="10" fill="#0a0a0a">✓</text>
  <text x="506" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e8e8e8">기획팀</text>

  <rect x="486" y="184" width="14" height="14" rx="2" fill="none" stroke="#555" stroke-width="1.5"/>
  <text x="506" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">인사팀</text>

  <rect x="486" y="208" width="14" height="14" rx="2" fill="none" stroke="#555" stroke-width="1.5"/>
  <text x="506" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">재무팀</text>

  <!-- MultiSelect properties -->
  <rect x="480" y="260" width="330" height="160" rx="6" fill="#0d1828"/>
  <text x="494" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#7ec8e3">selectcount</text>
  <text x="590" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e8e8e8">선택 항목 수 (복수)</text>

  <text x="494" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#7ec8e3">getSelectItem(i)</text>
  <text x="590" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e8e8e8">i번째 선택 항목 코드</text>

  <text x="494" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#7ec8e3">innerdataset</text>
  <text x="590" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e8e8e8">소스 Dataset</text>

  <text x="494" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#55c555">onchanged</text>
  <text x="590" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e8e8e8">선택 변경 이벤트</text>

  <rect x="480" y="360" width="330" height="42" rx="4" fill="#0a1a0a" stroke="#1e4020"/>
  <text x="494" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#55c555">getSelectItem(i) 반복으로 수집</text>
  <text x="494" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">체크박스 스타일 다중 선택</text>

  <!-- Footer -->
</svg>
