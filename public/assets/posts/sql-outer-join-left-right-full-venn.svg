<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <rect width="880" height="540" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">OUTER JOIN 종류별 결과 비교</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">LEFT · RIGHT · FULL OUTER JOIN이 반환하는 행</text>

  <!-- LEFT JOIN section -->
  <rect x="60" y="96" width="234" height="380" rx="8" fill="#111827" stroke="#1e2433" stroke-width="1"/>
  <text x="177" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">LEFT OUTER JOIN</text>

  <!-- Venn LEFT -->
  <circle cx="155" cy="185" r="48" fill="#1e3a5f" fill-opacity="0.7" stroke="#7ec8e3" stroke-width="1.5"/>
  <circle cx="199" cy="185" r="48" fill="#111827" fill-opacity="0.5" stroke="#555" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="140" y="189" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">A</text>
  <text x="213" y="189" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">B</text>
  <!-- highlight left circle -->
  <circle cx="155" cy="185" r="48" fill="#7ec8e3" fill-opacity="0.18" stroke="none"/>

  <text x="177" y="253" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">A의 모든 행 + 매칭된 B</text>
  <text x="177" y="269" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">매칭 없으면 B 컬럼 = NULL</text>

  <!-- LEFT example table -->
  <rect x="72" y="285" width="210" height="168" rx="6" fill="#070b14" stroke="#1e2433"/>
  <!-- header -->
  <rect x="72" y="285" width="210" height="24" rx="6" fill="#0f1a2e" stroke="none"/>
  <text x="110" y="301" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">uid</text>
  <text x="177" y="301" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">name</text>
  <text x="249" y="301" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">order_id</text>
  <!-- rows -->
  <text x="110" y="319" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">1</text>
  <text x="177" y="319" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">Alice</text>
  <text x="249" y="319" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">101</text>
  <text x="110" y="337" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">2</text>
  <text x="177" y="337" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">Bob</text>
  <text x="249" y="337" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">102</text>
  <!-- highlighted row - no match -->
  <rect x="73" y="343" width="208" height="18" rx="2" fill="#1e3a1e" fill-opacity="0.6"/>
  <text x="110" y="356" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" xml:space="preserve">3</text>
  <text x="177" y="356" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" xml:space="preserve">Carol</text>
  <text x="249" y="356" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555" xml:space="preserve">NULL</text>
  <!-- divider lines -->
  <line x1="72" y1="309" x2="282" y2="309" stroke="#1e2433" stroke-width="1"/>
  <line x1="72" y1="327" x2="282" y2="327" stroke="#1e2433" stroke-width="1"/>
  <line x1="72" y1="345" x2="282" y2="345" stroke="#1e2433" stroke-width="1"/>
  <text x="177" y="388" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">Carol은 주문 없음 → NULL 포함</text>
  <text x="177" y="448" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">FROM A LEFT JOIN B</text>
  <text x="177" y="464" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">ON A.id = B.a_id</text>

  <!-- RIGHT JOIN section -->
  <rect x="323" y="96" width="234" height="380" rx="8" fill="#111827" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">RIGHT OUTER JOIN</text>

  <!-- Venn RIGHT -->
  <circle cx="411" cy="185" r="48" fill="#111827" fill-opacity="0.5" stroke="#555" stroke-width="1.5" stroke-dasharray="4 3"/>
  <circle cx="455" cy="185" r="48" fill="#1e3a5f" fill-opacity="0.7" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="397" y="189" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">A</text>
  <text x="469" y="189" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">B</text>
  <circle cx="455" cy="185" r="48" fill="#7ec8e3" fill-opacity="0.18" stroke="none"/>

  <text x="440" y="253" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">B의 모든 행 + 매칭된 A</text>
  <text x="440" y="269" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">매칭 없으면 A 컬럼 = NULL</text>

  <!-- RIGHT example table -->
  <rect x="335" y="285" width="210" height="168" rx="6" fill="#070b14" stroke="#1e2433"/>
  <rect x="335" y="285" width="210" height="24" rx="6" fill="#0f1a2e" stroke="none"/>
  <text x="370" y="301" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">uid</text>
  <text x="418" y="301" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">name</text>
  <text x="495" y="301" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">order_id</text>
  <text x="370" y="319" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">1</text>
  <text x="418" y="319" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">Alice</text>
  <text x="495" y="319" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">101</text>
  <rect x="336" y="325" width="208" height="18" rx="2" fill="#1e3a1e" fill-opacity="0.6"/>
  <text x="370" y="338" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555" xml:space="preserve">NULL</text>
  <text x="418" y="338" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555" xml:space="preserve">NULL</text>
  <text x="495" y="338" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" xml:space="preserve">103</text>
  <line x1="335" y1="309" x2="545" y2="309" stroke="#1e2433" stroke-width="1"/>
  <line x1="335" y1="327" x2="545" y2="327" stroke="#1e2433" stroke-width="1"/>
  <line x1="335" y1="345" x2="545" y2="345" stroke="#1e2433" stroke-width="1"/>
  <text x="440" y="388" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">주문 103은 주인 없음 → NULL</text>
  <text x="440" y="448" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">FROM A RIGHT JOIN B</text>
  <text x="440" y="464" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">ON A.id = B.a_id</text>

  <!-- FULL OUTER JOIN section -->
  <rect x="586" y="96" width="234" height="380" rx="8" fill="#111827" stroke="#1e2433" stroke-width="1"/>
  <text x="703" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">FULL OUTER JOIN</text>

  <!-- Venn FULL -->
  <circle cx="674" cy="185" r="48" fill="#1e3a5f" fill-opacity="0.6" stroke="#7ec8e3" stroke-width="1.5"/>
  <circle cx="718" cy="185" r="48" fill="#1e3a5f" fill-opacity="0.6" stroke="#7ec8e3" stroke-width="1.5"/>
  <circle cx="674" cy="185" r="48" fill="#7ec8e3" fill-opacity="0.18" stroke="none"/>
  <circle cx="718" cy="185" r="48" fill="#7ec8e3" fill-opacity="0.18" stroke="none"/>
  <text x="660" y="189" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">A</text>
  <text x="732" y="189" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">B</text>

  <text x="703" y="253" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">A + B 모든 행</text>
  <text x="703" y="269" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">매칭 없는 쪽 컬럼 = NULL</text>

  <!-- FULL example table -->
  <rect x="598" y="285" width="210" height="168" rx="6" fill="#070b14" stroke="#1e2433"/>
  <rect x="598" y="285" width="210" height="24" rx="6" fill="#0f1a2e" stroke="none"/>
  <text x="633" y="301" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">uid</text>
  <text x="681" y="301" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">name</text>
  <text x="758" y="301" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3" xml:space="preserve">order_id</text>
  <text x="633" y="319" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">1</text>
  <text x="681" y="319" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">Alice</text>
  <text x="758" y="319" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8" xml:space="preserve">101</text>
  <rect x="599" y="325" width="208" height="18" rx="2" fill="#1e3a1e" fill-opacity="0.5"/>
  <text x="633" y="338" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" xml:space="preserve">3</text>
  <text x="681" y="338" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" xml:space="preserve">Carol</text>
  <text x="758" y="338" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555" xml:space="preserve">NULL</text>
  <rect x="599" y="343" width="208" height="18" rx="2" fill="#3a1e1e" fill-opacity="0.5"/>
  <text x="633" y="356" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555" xml:space="preserve">NULL</text>
  <text x="681" y="356" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555" xml:space="preserve">NULL</text>
  <text x="758" y="356" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555" xml:space="preserve">103</text>
  <line x1="598" y1="309" x2="808" y2="309" stroke="#1e2433" stroke-width="1"/>
  <line x1="598" y1="327" x2="808" y2="327" stroke="#1e2433" stroke-width="1"/>
  <line x1="598" y1="345" x2="808" y2="345" stroke="#1e2433" stroke-width="1"/>
  <line x1="598" y1="363" x2="808" y2="363" stroke="#1e2433" stroke-width="1"/>
  <text x="703" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">양쪽 고아 행 모두 포함</text>
  <text x="703" y="448" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">FROM A FULL OUTER JOIN B</text>
  <text x="703" y="464" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">ON A.id = B.a_id</text>

  <!-- Footer -->
  <text x="440" y="520" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · SQL 완전 정복</text>
</svg>
