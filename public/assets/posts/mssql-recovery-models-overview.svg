<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">SQL Server 복구 모델 비교</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">Full · Bulk-Logged · Simple 세 가지 모델의 특성</text>

  <!-- Headers -->
  <rect x="60" y="88" width="226" height="40" rx="6" fill="#0d1e2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="173" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">Full (전체)</text>

  <rect x="326" y="88" width="226" height="40" rx="6" fill="#101030" stroke="#7777cc" stroke-width="1.5"/>
  <text x="439" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Bulk-Logged</text>

  <rect x="592" y="88" width="226" height="40" rx="6" fill="#1a1a0a" stroke="#888" stroke-width="1.5"/>
  <text x="705" y="113" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888">Simple (단순)</text>

  <!-- Row: Log -->
  <text x="173" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">모든 트랜잭션 완전 로그</text>
  <text x="439" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">대량 작업 최소 로그</text>
  <text x="705" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">완료 트랜잭션 즉시 재사용</text>

  <!-- Row: Backup -->
  <text x="173" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">Full + Diff + Log 백업</text>
  <text x="439" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">Full + Diff + Log 백업*</text>
  <text x="705" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Full + Diff 백업만</text>

  <!-- Row: PITR -->
  <text x="173" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">특정 시점 복구 (PITR) ✓</text>
  <text x="439" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">대량 작업 기간 제외 PITR</text>
  <text x="705" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">PITR 불가 ✗</text>

  <!-- Row: Log growth -->
  <text x="173" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">로그 백업 없으면 로그 무한 증가</text>
  <text x="439" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">대량 작업 후 로그 급증 가능</text>
  <text x="705" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">로그 자동 재사용 (소형 유지)</text>

  <!-- Dividers -->
  <line x1="60" y1="136" x2="820" y2="136" stroke="#333" stroke-width="1"/>
  <line x1="60" y1="168" x2="820" y2="168" stroke="#333" stroke-width="1"/>
  <line x1="60" y1="200" x2="820" y2="200" stroke="#333" stroke-width="1"/>
  <line x1="60" y1="232" x2="820" y2="232" stroke="#333" stroke-width="1"/>
  <line x1="60" y1="264" x2="820" y2="264" stroke="#333" stroke-width="1"/>

  <line x1="312" y1="88" x2="312" y2="264" stroke="#333" stroke-width="1"/>
  <line x1="578" y1="88" x2="578" y2="264" stroke="#333" stroke-width="1"/>

  <!-- Use case -->
  <rect x="60" y="280" width="226" height="68" rx="6" fill="#0a1a0e" stroke="#55c555" stroke-width="1"/>
  <text x="173" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">적합: 프로덕션 OLTP</text>
  <text x="173" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">금융·의료·주문 시스템</text>
  <text x="173" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">RPO = 최소 (마지막 로그 백업)</text>

  <rect x="326" y="280" width="226" height="68" rx="6" fill="#101030" stroke="#7777cc" stroke-width="1"/>
  <text x="439" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">적합: ETL 일괄 적재</text>
  <text x="439" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">BULK INSERT · bcp 성능 최대화</text>
  <text x="439" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">적재 후 Full 모델로 복귀 권장</text>

  <rect x="592" y="280" width="226" height="68" rx="6" fill="#1a1a0a" stroke="#888" stroke-width="1"/>
  <text x="705" y="302" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">적합: 개발/테스트 DB</text>
  <text x="705" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">로그 관리 최소화</text>
  <text x="705" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">프로덕션에는 부적합</text>

  <!-- Code -->
  <rect x="60" y="368" width="760" height="80" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">ALTER DATABASE AdventureWorks SET RECOVERY FULL;</text>
  <text x="76" y="406" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">BACKUP DATABASE AdventureWorks TO DISK = 'D:\full.bak';</text>
  <text x="76" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">-- Full 모델 전환 후 Full 백업 필수: 로그 체인 시작</text>
  <text x="76" y="442" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">-- 이후 BACKUP LOG로 로그 체인 유지해야 PITR 가능</text>
</svg>
