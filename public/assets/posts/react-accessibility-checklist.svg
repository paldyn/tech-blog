<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">React 접근성 체크리스트</text>

  <!-- Column headers -->
  <text x="220" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">올바른 방법 ✓</text>
  <text x="660" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">흔한 실수 ✗</text>

  <!-- Row 1: Images -->
  <rect x="60" y="92" width="360" height="52" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="80" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#55c555">이미지에 alt 속성 항상 제공</text>
  <text x="80" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">&lt;img src="..." alt="프로필 사진" /&gt;</text>
  <rect x="460" y="92" width="360" height="52" rx="6" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="480" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e05555">alt 누락 / alt=""로 모두 처리</text>
  <text x="480" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">&lt;img src="logo.png" /&gt; (스크린 리더 혼란)</text>

  <!-- Row 2: Buttons -->
  <rect x="60" y="154" width="360" height="52" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="80" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#55c555">버튼은 &lt;button&gt; 태그 사용</text>
  <text x="80" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">키보드 포커스·Enter 클릭 자동 지원</text>
  <rect x="460" y="154" width="360" height="52" rx="6" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="480" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e05555">&lt;div onClick&gt; 버튼으로 사용</text>
  <text x="480" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">키보드로 접근 불가 (tab 포커스 안됨)</text>

  <!-- Row 3: Forms -->
  <rect x="60" y="216" width="360" height="52" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="80" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#55c555">모든 input에 label 연결</text>
  <text x="80" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">&lt;label htmlFor="email"&gt;이메일&lt;/label&gt;</text>
  <rect x="460" y="216" width="360" height="52" rx="6" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="480" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e05555">placeholder만으로 레이블 대체</text>
  <text x="480" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">입력 시 힌트 사라져 혼란 유발</text>

  <!-- Row 4: Colors -->
  <rect x="60" y="278" width="360" height="52" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="80" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#55c555">색상 대비 4.5:1 이상 (WCAG AA)</text>
  <text x="80" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">axe DevTools로 자동 검사 가능</text>
  <rect x="460" y="278" width="360" height="52" rx="6" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="480" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e05555">색상만으로 의미 전달</text>
  <text x="480" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888">아이콘·텍스트 함께 사용 권장</text>

  <!-- Tool row -->
  <rect x="60" y="348" width="760" height="32" rx="6" fill="#111827" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="369" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#7ec8e3" text-anchor="middle">검사 도구: axe-core · @testing-library/jest-dom · eslint-plugin-jsx-a11y · Lighthouse</text>
</svg>
