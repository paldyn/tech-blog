<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">DaemonSet — 모든 노드에 Pod 1개씩</text>
  <text x="440" y="66" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">노드가 추가되면 DaemonSet이 자동으로 새 Pod를 생성합니다</text>

  <!-- DaemonSet box -->
  <rect x="290" y="90" width="300" height="68" rx="8" fill="#121e38" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">DaemonSet</text>
  <text x="440" y="140" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8">selector: app=fluentd</text>

  <!-- Arrows to nodes -->
  <line x1="345" y1="158" x2="185" y2="218" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="440" y1="158" x2="440" y2="218" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="535" y1="158" x2="695" y2="218" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Node 1 -->
  <rect x="60" y="220" width="250" height="178" rx="8" fill="#0d1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="185" y="244" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8">node-1</text>
  <!-- DaemonSet Pod (highlighted) -->
  <rect x="80" y="254" width="210" height="56" rx="6" fill="#0d1e0d" stroke="#55c555" stroke-width="2"/>
  <text x="185" y="277" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">fluentd-ds-xk2p1</text>
  <text x="185" y="297" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">Running (DaemonSet Pod)</text>
  <!-- Other pods label -->
  <text x="185" y="342" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">app/db/web Pods...</text>
  <text x="185" y="360" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#444">일반 워크로드 Pod들</text>

  <!-- Node 2 -->
  <rect x="315" y="220" width="250" height="178" rx="8" fill="#0d1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="244" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8">node-2</text>
  <rect x="335" y="254" width="210" height="56" rx="6" fill="#0d1e0d" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="277" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">fluentd-ds-9m3vw</text>
  <text x="440" y="297" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">Running (DaemonSet Pod)</text>
  <text x="440" y="342" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">app/db/web Pods...</text>
  <text x="440" y="360" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#444">일반 워크로드 Pod들</text>

  <!-- Node 3 (new node, dashed) -->
  <rect x="570" y="220" width="250" height="178" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="695" y="244" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">node-3 (신규)</text>
  <rect x="590" y="254" width="210" height="56" rx="6" fill="#0d1e0d" stroke="#55c555" stroke-width="2"/>
  <text x="695" y="277" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">fluentd-ds-r7nt4</text>
  <text x="695" y="297" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">자동 생성됨</text>
  <text x="695" y="342" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">노드 join 시 즉시 배포</text>
  <text x="695" y="360" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">수동 개입 불필요</text>

  <!-- Bottom summary -->
  <rect x="60" y="420" width="760" height="44" rx="8" fill="#121e38" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="437" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">주요 용도: 로그 수집(Fluentd) · 모니터링(Prometheus node-exporter) · 네트워크 플러그인(kube-proxy)</text>
  <text x="440" y="455" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">노드 삭제 시 해당 노드의 DaemonSet Pod도 함께 제거됩니다</text>
</svg>
