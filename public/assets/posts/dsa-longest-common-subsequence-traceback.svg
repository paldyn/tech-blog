<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">LCS 역추적 및 응용 관계</text>

  <!-- Traceback description -->
  <text x="60" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">역추적: dp[m][n]에서 시작해 대각선(match) 또는 최대 방향으로 거슬러 올라가기</text>

  <rect x="60" y="90" width="400" height="168" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">def lcs_string(X, Y):</text>
  <text x="76" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    m, n = len(X), len(Y)</text>
  <text x="76" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    dp = [[0]*(n+1) for _ in range(m+1)]</text>
  <text x="76" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">    # dp 채우기 (생략)...</text>
  <text x="76" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    result = []</text>
  <text x="76" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    i, j = m, n</text>
  <text x="76" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">    while i &gt; 0 and j &gt; 0:</text>
  <text x="76" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">        if X[i-1] == Y[j-1]:  # 대각선 방향</text>
  <text x="76" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">            result.append(X[i-1]); i-=1; j-=1</text>

  <!-- Relationship diagram -->
  <text x="500" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">LCS와 관련 문제들</text>

  <!-- LCS central box -->
  <rect x="580" y="92" width="120" height="40" fill="#1a2a3a" rx="6" stroke="#7ec8e3" stroke-width="2"/>
  <text x="640" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">LCS</text>

  <!-- Edit distance -->
  <rect x="480" y="172" width="120" height="40" fill="#2a1a2a" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="540" y="197" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">편집 거리</text>
  <line x1="600" y1="132" x2="540" y2="170" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-g)"/>
  <text x="558" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">m+n-2*LCS</text>

  <!-- LCS string -->
  <rect x="670" y="172" width="120" height="40" fill="#1a3a2a" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="730" y="197" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">SCS (최단 공통 상위)</text>
  <line x1="680" y1="132" x2="730" y2="170" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <text x="718" y="157" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">m+n-LCS</text>

  <!-- Diff -->
  <rect x="480" y="252" width="120" height="40" fill="#2a2a1a" rx="6" stroke="#e0c555" stroke-width="1.5"/>
  <text x="540" y="277" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e0c555">Diff / Patch</text>
  <line x1="520" y1="212" x2="530" y2="250" stroke="#e0c555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-g)"/>

  <!-- STS -->
  <rect x="670" y="252" width="120" height="40" fill="#2a1a1a" rx="6" stroke="#e05555" stroke-width="1.5"/>
  <text x="730" y="277" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">LCS 응용: DNA</text>
  <line x1="740" y1="212" x2="740" y2="250" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <!-- Complexity comparison -->
  <rect x="60" y="278" width="400" height="96" fill="#111" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">공간 최적화: O(min(m,n))</text>
  <text x="80" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">현재 행과 이전 행만 필요 → 2행 배열 또는 1D 배열</text>
  <text x="80" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">dp = [0]*(n+1); prev = 0</text>
  <text x="80" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">for i in range(1, m+1): prev=dp[j-1]; ...</text>
  <text x="80" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">단, 역추적을 위해서는 전체 dp 배열 필요</text>
</svg>
