<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">폼 간 통신 패턴 비교</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">직접 참조 vs application 객체 경유 vs 이벤트 버스</text>

  <!-- Pattern 1: Direct reference (bad) -->
  <text x="155" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">① 직접 참조 (비권장)</text>
  <rect x="40" y="112" width="230" height="120" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>

  <rect x="56" y="126" width="90" height="36" rx="6" fill="#111" stroke="#555"/>
  <text x="101" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">SCR001</text>

  <rect x="164" y="126" width="90" height="36" rx="6" fill="#111" stroke="#555"/>
  <text x="209" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">SCR002</text>

  <line x1="146" y1="144" x2="162" y2="144" stroke="#e05555" stroke-width="1.5"/>
  <polygon points="164,144 152,138 152,150" fill="#e05555"/>

  <text x="155" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555" text-anchor="middle">parent.SCR002</text>
  <text x="155" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">✗ 강한 결합 — 이름 변경 시 오류</text>

  <!-- Pattern 2: application object -->
  <text x="440" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">② application 객체 경유</text>
  <rect x="325" y="112" width="230" height="160" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>

  <rect x="341" y="126" width="90" height="36" rx="6" fill="#1a2233" stroke="#7ec8e3"/>
  <text x="386" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">SCR001</text>

  <rect x="341" y="216" width="90" height="36" rx="6" fill="#1a2233" stroke="#7ec8e3"/>
  <text x="386" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">SCR002</text>

  <rect x="451" y="162" width="88" height="36" rx="6" fill="#1a2a1a" stroke="#55c555"/>
  <text x="495" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">application</text>

  <line x1="431" y1="144" x2="451" y2="172" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="452,175 444,162 456,164" fill="#55c555"/>

  <line x1="451" y1="190" x2="431" y2="225" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="431,228 425,215 437,217" fill="#55c555"/>

  <!-- Pattern 3: Event bus -->
  <text x="725" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">③ 이벤트 버스 패턴</text>
  <rect x="610" y="112" width="230" height="160" rx="8" fill="#1a2233" stroke="#7ec8e3" stroke-width="1.5"/>

  <rect x="626" y="126" width="80" height="36" rx="6" fill="#111" stroke="#555"/>
  <text x="666" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">SCR001</text>

  <rect x="626" y="216" width="80" height="36" rx="6" fill="#111" stroke="#555"/>
  <text x="666" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">SCR003</text>

  <rect x="726" y="126" width="80" height="36" rx="6" fill="#111" stroke="#555"/>
  <text x="766" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">SCR002</text>

  <rect x="726" y="216" width="80" height="36" rx="6" fill="#111" stroke="#555"/>
  <text x="766" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">SCR004</text>

  <!-- Event Bus center -->
  <rect x="676" y="172" width="88" height="36" rx="6" fill="#1a2233" stroke="#7ec8e3"/>
  <text x="720" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">EventBus</text>

  <line x1="706" y1="144" x2="700" y2="172" stroke="#7ec8e3" stroke-width="1"/>
  <line x1="766" y1="162" x2="760" y2="172" stroke="#7ec8e3" stroke-width="1"/>
  <line x1="700" y1="208" x2="706" y2="228" stroke="#7ec8e3" stroke-width="1"/>
  <line x1="760" y1="208" x2="766" y2="228" stroke="#7ec8e3" stroke-width="1"/>

  <!-- EventBus via application -->
  <text x="726" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">application.gfn_on("event")</text>

  <!-- Second row: summary table -->
  <rect x="40" y="310" width="800" height="120" rx="8" fill="#111" stroke="#3a4a6e"/>

  <text x="160" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">방법</text>
  <text x="400" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">장점</text>
  <text x="640" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">단점 / 주의</text>
  <line x1="40" y1="344" x2="840" y2="344" stroke="#333" stroke-width="1"/>

  <text x="80" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">직접 참조</text>
  <text x="280" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">구현 간단</text>
  <text x="520" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">강한 결합, 이름 변경 시 모두 수정</text>

  <text x="80" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">application 경유</text>
  <text x="280" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">폼 참조 없음, 데이터 공유</text>
  <text x="520" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">폴링 필요, 타이밍 관리 주의</text>

  <text x="80" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">이벤트 버스</text>
  <text x="280" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">느슨한 결합, 구독/발행</text>
  <text x="520" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">직접 구현 필요, 디버깅 복잡성</text>
</svg>
