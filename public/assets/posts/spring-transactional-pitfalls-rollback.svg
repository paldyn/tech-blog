<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 430">
  <rect width="880" height="430" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">롤백 규칙 &amp; 주요 함정 정리</text>

  <!-- ── Left: 롤백 규칙 다이어그램 ── -->
  <text x="70" y="76"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#e8e8e8">예외 종류별 롤백 기본 동작</text>

  <!-- Throwable hierarchy -->
  <rect x="310" y="88" width="140" height="36" rx="6" fill="#111827" stroke="#888" stroke-width="1"/>
  <text x="380" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" font-weight="600" fill="#888" text-anchor="middle">Throwable</text>

  <!-- Exception branch -->
  <line x1="340" y1="124" x2="220" y2="152" stroke="#555" stroke-width="1.5"/>
  <line x1="420" y1="124" x2="530" y2="152" stroke="#555" stroke-width="1.5"/>

  <!-- Error -->
  <rect x="470" y="152" width="120" height="36" rx="6" fill="#111827" stroke="#e05555" stroke-width="1.2"/>
  <text x="530" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">Error</text>

  <!-- Exception -->
  <rect x="150" y="152" width="140" height="36" rx="6" fill="#111827" stroke="#888" stroke-width="1"/>
  <text x="220" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" font-weight="600" fill="#888" text-anchor="middle">Exception</text>

  <!-- CheckedException branch -->
  <line x1="185" y1="188" x2="120" y2="216" stroke="#555" stroke-width="1.5"/>
  <!-- RuntimeException branch -->
  <line x1="255" y1="188" x2="320" y2="216" stroke="#555" stroke-width="1.5"/>

  <!-- CheckedException -->
  <rect x="60" y="216" width="120" height="36" rx="6" fill="#1a1507" stroke="#e8a030" stroke-width="1.5"/>
  <text x="120" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" font-weight="600" fill="#e8a030" text-anchor="middle">체크 예외</text>

  <!-- RuntimeException -->
  <rect x="260" y="216" width="140" height="36" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="330" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">RuntimeException</text>

  <!-- Rollback labels -->
  <text x="120" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e8a030" text-anchor="middle">커밋 (기본)</text>
  <text x="120" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888" text-anchor="middle">IOException, SQLException...</text>

  <text x="330" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555" text-anchor="middle">롤백 (기본)</text>
  <text x="330" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888" text-anchor="middle">NullPointerException...</text>

  <text x="530" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e05555" text-anchor="middle">롤백 (기본)</text>
  <text x="530" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888" text-anchor="middle">OutOfMemoryError...</text>

  <!-- ── Right: 코드 예제 ── -->
  <text x="460" y="76"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7ec8e3">rollbackFor / noRollbackFor 활용</text>

  <rect x="460" y="88" width="350" height="222" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="476" y="116" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8">// 체크 예외도 롤백</text>
  <text x="476" y="134" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3">@Transactional</text>
  <text x="476" y="152" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">  (rollbackFor = IOException.<tspan fill="#7ec8e3">class</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="476" y="170" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3">public void <tspan fill="#ffffff">transfer() </tspan><tspan fill="#7ec8e3">throws </tspan><tspan fill="#ffffff">IOException {</tspan></text>
  <text x="476" y="188" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">  fileService.write(); <tspan fill="#55c555">// 롤백 ✓</tspan></text>
  <text x="476" y="206" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">}</text>
  <!-- blank -->
  <text x="476" y="242" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8">// 특정 예외는 롤백 제외</text>
  <text x="476" y="260" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3">@Transactional</text>
  <text x="476" y="278" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">  (noRollbackFor = </text>
  <text x="476" y="296" xml:space="preserve"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">      OptimisticLockException.<tspan fill="#7ec8e3">class</tspan><tspan fill="#ffffff">)</tspan></text>

  <!-- ── Bottom: 함정 요약 테이블 ── -->
  <rect x="70" y="312" width="740" height="96" rx="8" fill="#111827" stroke="#555" stroke-width="1"/>
  <text x="90" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" font-weight="600" fill="#e8e8e8">자주 발생하는 함정 요약</text>

  <text x="90" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e05555">① 자기 호출</text>
  <text x="185" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">— 같은 클래스 내 this.method() 호출 시 @Transactional 무시</text>

  <text x="90" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e05555">② 체크 예외 커밋</text>
  <text x="200" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">— IOException 등 체크 예외는 기본적으로 롤백하지 않음</text>

  <text x="90" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e05555">③ private 메서드</text>
  <text x="200" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">— private 메서드의 @Transactional은 AOP가 적용되지 않음</text>

  <text x="90" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#e05555">④ try-catch 삼킴</text>
  <text x="185" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">— 내부에서 예외를 catch해 삼키면 AOP가 예외를 감지 못해 커밋됨</text>
</svg>
