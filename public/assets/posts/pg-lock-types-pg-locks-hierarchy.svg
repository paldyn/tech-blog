<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" style="background:#0a0a0a;border-radius:12px">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">PostgreSQL 락 유형 계층</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">테이블 수준 락 → 행 수준 락 → Advisory 락</text>

  <!-- Table Locks -->
  <rect x="60" y="96" width="760" height="36" rx="6" fill="#1a1a2e" stroke="#7777cc"/>
  <text x="440" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">테이블 수준 락 (LWLock — 강도 오름차순)</text>

  <!-- Table lock rows -->
  <rect x="60" y="140" width="760" height="130" rx="6" fill="#111" stroke="#1e2433"/>
  <!-- headers -->
  <text x="80" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">락 모드</text>
  <text x="380" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">획득 시점</text>
  <text x="750" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="end">충돌 대상</text>
  <line x1="80" y1="168" x2="800" y2="168" stroke="#1e2433"/>
  <text x="80" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">AccessShareLock</text>
  <text x="380" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">SELECT</text>
  <text x="750" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="end">AccessExclusiveLock만</text>
  <text x="80" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">RowShareLock</text>
  <text x="380" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">SELECT FOR UPDATE/SHARE</text>
  <text x="750" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="end">ExclusiveLock, AEL</text>
  <text x="80" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">RowExclusiveLock</text>
  <text x="380" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">INSERT / UPDATE / DELETE</text>
  <text x="750" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="end">ShareLock 이상</text>
  <text x="80" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555">AccessExclusiveLock</text>
  <text x="380" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">DROP / TRUNCATE / VACUUM FULL</text>
  <text x="750" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="end">모든 락과 충돌</text>
  <text x="80" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555">ShareRowExclusiveLock</text>
  <text x="380" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">CREATE TRIGGER (일부)</text>
  <text x="750" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="end">RowEx 이상</text>

  <!-- Row Locks -->
  <rect x="60" y="284" width="360" height="120" rx="6" fill="#111" stroke="#1e2433"/>
  <text x="240" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">행 수준 락 (힙 튜플 헤더)</text>
  <text x="80" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">FOR KEY SHARE</text>
  <text x="80" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">FOR SHARE</text>
  <text x="80" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">FOR NO KEY UPDATE</text>
  <text x="80" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555">FOR UPDATE</text>
  <text x="340" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="end">가장 강한 행 락</text>

  <!-- Advisory Locks -->
  <rect x="460" y="284" width="360" height="120" rx="6" fill="#111" stroke="#1e2433"/>
  <text x="640" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Advisory 락 (애플리케이션 레벨)</text>
  <text x="480" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">pg_advisory_lock(key)</text>
  <text x="480" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">pg_try_advisory_lock(key)</text>
  <text x="480" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">pg_advisory_lock_shared(key)</text>
  <text x="480" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">pg_advisory_unlock(key)</text>

  <!-- Bottom note -->
  <rect x="60" y="420" width="760" height="52" rx="6" fill="#0d1117" stroke="#1e2433"/>
  <text x="440" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle" font-weight="600">ALTER TABLE은 AccessExclusiveLock → 장기 대기 유발 → lock_timeout 설정 권장</text>
  <text x="440" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">SET lock_timeout = '5s'; — 5초 내 락 획득 못 하면 오류 반환</text>
</svg>
