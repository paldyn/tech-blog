<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto">
      <polygon points="0 0, 20 7, 0 14" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">JDK 동적 프록시 vs CGLIB</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="400" fill="#888">Spring AOP가 사용하는 두 가지 프록시 생성 방식</text>

  <!-- JDK Dynamic Proxy box -->
  <rect x="60" y="100" width="355" height="370" rx="10" fill="#111827" stroke="#1e3a5f" stroke-width="1.5"/>
  <rect x="60" y="100" width="355" height="44" rx="10" fill="#1e3a5f"/>
  <rect x="60" y="130" width="355" height="14" fill="#1e3a5f"/>
  <text x="237" y="127" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">JDK Dynamic Proxy</text>

  <!-- JDK rows -->
  <text x="84" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">조건</text>
  <text x="84" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">대상 클래스가 인터페이스를 구현해야 함</text>

  <line x1="84" y1="200" x2="395" y2="200" stroke="#3a4a6e" stroke-width="1"/>

  <text x="84" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">내부 구현</text>
  <text x="84" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">java.lang.reflect.Proxy</text>
  <text x="84" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">+ InvocationHandler</text>

  <line x1="84" y1="268" x2="395" y2="268" stroke="#3a4a6e" stroke-width="1"/>

  <text x="84" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">특징</text>
  <text x="84" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓  인터페이스 타입으로만 주입 가능</text>
  <text x="84" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓  JDK 표준 라이브러리 (외부 의존 없음)</text>
  <text x="84" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">✗  구체 클래스 타입으로 주입 불가</text>

  <line x1="84" y1="360" x2="395" y2="360" stroke="#3a4a6e" stroke-width="1"/>

  <text x="84" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Spring Boot 기본값</text>
  <text x="84" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Spring 4.x 이하 기본 (인터페이스 있을 때)</text>

  <!-- proxyTargetClass label -->
  <rect x="84" y="420" width="280" height="28" rx="5" fill="#0d1f35"/>
  <text x="96" y="437" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">spring.aop.proxy-target-class=false</text>

  <!-- CGLIB box -->
  <rect x="465" y="100" width="355" height="370" rx="10" fill="#111827" stroke="#3a2a1e" stroke-width="1.5"/>
  <rect x="465" y="100" width="355" height="44" rx="10" fill="#3a2a1e"/>
  <rect x="465" y="130" width="355" height="14" fill="#3a2a1e"/>
  <text x="642" y="127" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#ce9178">CGLIB (Code Generation Library)</text>

  <!-- CGLIB rows -->
  <text x="489" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">조건</text>
  <text x="489" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">인터페이스 없어도 OK (클래스 상속)</text>

  <line x1="489" y1="200" x2="800" y2="200" stroke="#3a4a6e" stroke-width="1"/>

  <text x="489" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">내부 구현</text>
  <text x="489" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">바이트코드 조작으로 서브클래스 생성</text>
  <text x="489" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">+ MethodInterceptor</text>

  <line x1="489" y1="268" x2="800" y2="268" stroke="#3a4a6e" stroke-width="1"/>

  <text x="489" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">특징</text>
  <text x="489" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓  구체 클래스·인터페이스 모두 주입 가능</text>
  <text x="489" y="328" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">✓  Spring Boot 3.x 기본값</text>
  <text x="489" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">✗  final 클래스 / final 메서드 불가</text>

  <line x1="489" y1="360" x2="800" y2="360" stroke="#3a4a6e" stroke-width="1"/>

  <text x="489" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Spring Boot 기본값</text>
  <text x="489" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Spring Boot 2.0+ 기본 (proxyTargetClass=true)</text>

  <rect x="489" y="420" width="280" height="28" rx="5" fill="#1f1008"/>
  <text x="501" y="437" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">spring.aop.proxy-target-class=true</text>

  <!-- VS label in middle -->
  <circle cx="440" cy="285" r="24" fill="#1a1a1a" stroke="#333" stroke-width="1.5"/>
  <text x="440" y="291" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#888">VS</text>

  <!-- footer -->
</svg>
