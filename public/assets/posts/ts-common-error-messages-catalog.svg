<svg xmlns="http://www.w3.org/2000/svg" width="880" height="422" viewBox="0 0 880 422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="422" rx="12" fill="#0a0a0a"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">자주 만나는 에러 코드 4선</text>

  <rect x="60" y="88" width="760" height="60" rx="8" fill="#15171c" stroke="#3a4a6e" stroke-width="1"/>
  <text x="84" y="112" font-size="14" font-weight="600" fill="#7ec8e3">TS2322</text>
  <text x="84" y="132" font-size="13" fill="#e8e8e8">Type X is not assignable — 타입이 받는 쪽과 맞지 않음</text>

  <rect x="60" y="166" width="760" height="60" rx="8" fill="#15171c" stroke="#3a4a6e" stroke-width="1"/>
  <text x="84" y="190" font-size="14" font-weight="600" fill="#7ec8e3">TS2339</text>
  <text x="84" y="210" font-size="13" fill="#e8e8e8">Property does not exist — 객체에 없는 속성을 접근</text>

  <rect x="60" y="244" width="760" height="60" rx="8" fill="#15171c" stroke="#3a4a6e" stroke-width="1"/>
  <text x="84" y="268" font-size="14" font-weight="600" fill="#7ec8e3">TS2345</text>
  <text x="84" y="288" font-size="13" fill="#e8e8e8">Argument of type — 함수 인자 타입이 매개변수와 불일치</text>

  <rect x="60" y="322" width="760" height="60" rx="8" fill="#15171c" stroke="#3a4a6e" stroke-width="1"/>
  <text x="84" y="346" font-size="14" font-weight="600" fill="#7ec8e3">TS18048</text>
  <text x="84" y="366" font-size="13" fill="#e8e8e8">is possibly 'undefined' — 좁히기 전에 접근, 옵셔널 체크 필요</text>
</svg>
