<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">프로토타입 체인 구조</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">인스턴스 → 프로토타입 → Object.prototype → null</text>

  <!-- alice instance box -->
  <rect x="60" y="100" width="200" height="120" fill="#0d1520" rx="8" stroke="#1e3a5f"/>
  <text x="160" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">alice (인스턴스)</text>
  <text x="80" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">name:</text>
  <text x="130" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">'Alice'</text>
  <text x="80" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">age:</text>
  <text x="120" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8">30</text>
  <text x="80" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">[[Prototype]]</text>
  <text x="160" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">고유 프로퍼티</text>

  <!-- Arrow 1: alice → User.prototype -->
  <polygon points="270,160 290,154 290,166" fill="#7777cc"/>
  <line x1="260" y1="160" x2="290" y2="160" stroke="#7777cc" stroke-width="2"/>

  <!-- User.prototype box -->
  <rect x="292" y="100" width="220" height="140" fill="#12101e" rx="8" stroke="#2a1e5f"/>
  <text x="402" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">User.prototype</text>
  <text x="310" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">greet:</text>
  <text x="360" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">ƒ greet(){}</text>
  <text x="310" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">toString:</text>
  <text x="372" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">ƒ toString(){}</text>
  <text x="310" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">constructor:</text>
  <text x="390" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">User</text>
  <text x="310" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">[[Prototype]]</text>
  <text x="402" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">공유 메서드</text>

  <!-- Arrow 2: User.prototype → Object.prototype -->
  <polygon points="522,160 542,154 542,166" fill="#7777cc"/>
  <line x1="512" y1="160" x2="542" y2="160" stroke="#7777cc" stroke-width="2"/>

  <!-- Object.prototype box -->
  <rect x="544" y="100" width="220" height="140" fill="#101412" rx="8" stroke="#1e3a20"/>
  <text x="654" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">Object.prototype</text>
  <text x="562" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">hasOwnProperty:</text>
  <text x="685" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">ƒ</text>
  <text x="562" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">toString:</text>
  <text x="624" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">ƒ</text>
  <text x="562" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">valueOf:</text>
  <text x="618" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">ƒ</text>
  <text x="562" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">[[Prototype]]</text>
  <text x="654" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555">모든 객체의 루트</text>

  <!-- Arrow 3: Object.prototype → null -->
  <polygon points="774,160 790,154 790,166" fill="#444"/>
  <line x1="764" y1="160" x2="790" y2="160" stroke="#444" stroke-width="2"/>
  <rect x="792" y="140" width="52" height="40" fill="#1a1a1a" rx="6" stroke="#333"/>
  <text x="818" y="165" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#666">null</text>

  <!-- Label arrows -->
  <text x="275" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">[[Proto]]</text>
  <text x="527" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">[[Proto]]</text>
  <text x="779" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#444">[[Proto]]</text>

  <!-- Property lookup flow -->
  <text x="440" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">프로퍼티 탐색 순서</text>

  <rect x="60" y="298" width="760" height="100" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="80" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">alice.</text><text x="120" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">greet</text><text x="162" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">();</text>
  <text x="80" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 1. alice 자체에 greet 있나? → 없음</text>
  <text x="80" y="358" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 2. alice[[Prototype]] = User.prototype에 greet 있나? → 있음! → 호출</text>
  <text x="80" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 없었다면: 3. Object.prototype → 4. null → TypeError</text>

  <!-- Bottom note -->
  <rect x="60" y="418" width="760" height="50" fill="#0d1520" rx="6" stroke="#1e3a5f"/>
  <text x="440" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">프로퍼티 가림 (Shadowing)</text>
  <text x="440" y="458" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">alice.toString = () =&gt; '...' 이면 인스턴스 자체의 toString이 prototype의 toString을 가림</text>

  <!-- Footer -->
  <text x="440" y="504" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복</text>
</svg>
