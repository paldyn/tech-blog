<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">창발 임계값 시각화</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">모델 크기별 다자릿수 산술 정확도 변화 (가상 예시)</text>

  <!-- Chart area -->
  <rect x="80" y="88" width="720" height="280" fill="#0d1117" rx="8" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Y axis label -->
  <text x="30" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle" transform="rotate(-90 30 228)">정확도 (%)</text>

  <!-- Y axis -->
  <line x1="120" y1="100" x2="120" y2="348" stroke="#333" stroke-width="1"/>
  <!-- X axis -->
  <line x1="120" y1="348" x2="780" y2="348" stroke="#333" stroke-width="1"/>

  <!-- Y ticks and labels -->
  <line x1="118" y1="100" x2="122" y2="100" stroke="#444"/>
  <text x="112" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="end">100%</text>
  <line x1="118" y1="164" x2="122" y2="164" stroke="#444"/>
  <text x="112" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="end">75%</text>
  <line x1="118" y1="228" x2="122" y2="228" stroke="#444"/>
  <text x="112" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="end">50%</text>
  <line x1="118" y1="292" x2="122" y2="292" stroke="#444"/>
  <text x="112" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="end">25%</text>

  <!-- Grid lines -->
  <line x1="120" y1="164" x2="780" y2="164" stroke="#3a4a6e" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="120" y1="228" x2="780" y2="228" stroke="#3a4a6e" stroke-width="2" stroke-dasharray="4,4"/>
  <line x1="120" y1="292" x2="780" y2="292" stroke="#3a4a6e" stroke-width="2" stroke-dasharray="4,4"/>

  <!-- X axis labels (model sizes) -->
  <text x="160" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">1B</text>
  <text x="240" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">3B</text>
  <text x="320" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">7B</text>
  <text x="400" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">13B</text>
  <text x="480" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">30B</text>
  <text x="560" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">70B</text>
  <text x="640" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">100B</text>
  <text x="720" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">175B+</text>
  <text x="450" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">→ 모델 파라미터 수</text>

  <!-- Data points: near-zero performance until ~13B -->
  <circle cx="160" cy="343" r="5" fill="#e05555"/>
  <circle cx="240" cy="341" r="5" fill="#e05555"/>
  <circle cx="320" cy="340" r="5" fill="#e05555"/>

  <!-- Threshold zone marker -->
  <rect x="360" y="100" width="80" height="248" fill="#55c555" fill-opacity="0.05" stroke="#55c555" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="400" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">창발</text>
  <text x="400" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">임계값</text>

  <!-- Emergence point at 13B -->
  <circle cx="400" cy="260" r="8" fill="#55c555" stroke="#e8e8e8" stroke-width="1.5"/>

  <!-- After threshold - rising performance -->
  <circle cx="480" cy="210" r="5" fill="#55c555"/>
  <circle cx="560" cy="170" r="5" fill="#55c555"/>
  <circle cx="640" cy="145" r="5" fill="#55c555"/>
  <circle cx="720" cy="128" r="5" fill="#55c555"/>

  <!-- Connect points with path -->
  <path d="M 160,343 L 240,341 L 320,340 L 400,260 L 480,210 L 560,170 L 640,145 L 720,128" fill="none" stroke="#7ec8e3" stroke-width="2.5"/>

  <!-- Annotations -->
  <text x="270" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">실패 구간</text>
  <text x="270" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">정확도 ~5%</text>

  <text x="580" y="155" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">성공 구간</text>
  <text x="580" y="171" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">정확도 ~80%+</text>

  <!-- Side by side model comparison -->
  <rect x="80" y="396" width="320" height="50" fill="#1a0f0f" rx="8" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">7B 미만 모델</text>
  <text x="240" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">"567 + 234 = ?" → 랜덤에 가까운 응답</text>

  <rect x="480" y="396" width="320" height="50" fill="#0a1a0f" rx="8" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">13B+ 모델</text>
  <text x="640" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">"567 + 234 = 801" → 높은 정확도</text>
</svg>
