<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Comparator 체이닝 — 다중 기준 정렬</text>

  <!-- Code block: Comparator chaining -->
  <text x="440" y="78" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">Comparator.comparing() + thenComparing() 체이닝</text>

  <rect x="60" y="92" width="760" height="196" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="114" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">record</text>
  <text x="120" y="114" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> Employee(String dept, String name, </text>
  <text x="76" y="132" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">                  int</text>
  <text x="158" y="132" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> salary) {}</text>

  <text x="76" y="156" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 1. 부서 오름차순 → 2. 이름 오름차순 → 3. 급여 내림차순</text>

  <text x="76" y="176" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">Comparator&lt;Employee&gt; order =</text>

  <text x="76" y="194" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    Comparator.comparing(Employee::dept)</text>

  <text x="76" y="212" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">             .thenComparing(Employee::name)</text>

  <text x="76" y="230" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">             .thenComparingInt(Employee::salary)</text>

  <text x="76" y="248" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">             .reversed();</text>

  <text x="76" y="270" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">employees.sort(order);</text>

  <!-- Key methods -->
  <text x="440" y="316" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">유용한 Comparator 팩터리 메서드</text>

  <rect x="60" y="330" width="180" height="50" rx="8" fill="#0d1428" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="352" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">comparing(f)</text>
  <text x="150" y="370" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">키 추출 + Comparable 순서</text>

  <rect x="260" y="330" width="180" height="50" rx="8" fill="#0d1428" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="350" y="352" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">thenComparing(f)</text>
  <text x="350" y="370" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">동순위 시 추가 기준</text>

  <rect x="460" y="330" width="180" height="50" rx="8" fill="#0d1428" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="550" y="352" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">reversed()</text>
  <text x="550" y="370" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">순서 반전</text>

  <rect x="660" y="330" width="160" height="50" rx="8" fill="#0d1428" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="740" y="352" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">nullsFirst/Last</text>
  <text x="740" y="370" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">null 처리</text>
</svg>
