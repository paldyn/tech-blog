<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">apt 패키지 설치 흐름</text>

  <!-- Repository -->
  <rect x="60" y="76" width="180" height="56" rx="8" fill="#0a1020" stroke="#7ec8e3" stroke-width="2"/>
  <text x="150" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">원격 저장소</text>
  <text x="150" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">deb packages + metadata</text>

  <!-- apt update arrow -->
  <line x1="240" y1="104" x2="328" y2="104" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="326,99 338,104 326,109" fill="#7ec8e3"/>
  <text x="268" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">apt update</text>

  <!-- Local cache -->
  <rect x="338" y="76" width="200" height="56" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="438" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">로컬 패키지 캐시</text>
  <text x="438" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">/var/lib/apt/lists/</text>

  <!-- apt install arrow -->
  <line x1="538" y1="104" x2="626" y2="104" stroke="#55c555" stroke-width="2"/>
  <polygon points="624,99 636,104 624,109" fill="#55c555"/>
  <text x="558" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">apt install</text>

  <!-- dpkg -->
  <rect x="636" y="76" width="184" height="56" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="2"/>
  <text x="728" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">dpkg 설치</text>
  <text x="728" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">/var/lib/dpkg/</text>

  <!-- source list -->
  <rect x="60" y="172" width="760" height="60" rx="8" fill="#0d0d0d" stroke="#333"/>
  <text x="80" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888">/etc/apt/sources.list  형식</text>
  <text x="80" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">deb  https://deb.debian.org/debian  bookworm  main contrib non-free</text>

  <!-- Command table -->
  <rect x="60" y="256" width="760" height="188" rx="8" fill="#0d0d0d" stroke="#333"/>
  <text x="80" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">핵심 apt 명령어</text>

  <!-- Row 1 -->
  <rect x="80" y="292" width="300" height="36" rx="4" fill="#111" stroke="#222"/>
  <text x="96" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">apt update</text>
  <text x="400" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">패키지 목록 갱신 (설치 아님)</text>

  <!-- Row 2 -->
  <rect x="80" y="332" width="300" height="36" rx="4" fill="#111" stroke="#222"/>
  <text x="96" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">apt install PACKAGE</text>
  <text x="400" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">패키지 설치 (의존성 포함)</text>

  <!-- Row 3 -->
  <rect x="80" y="372" width="300" height="36" rx="4" fill="#111" stroke="#222"/>
  <text x="96" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">apt remove PACKAGE</text>
  <text x="400" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">패키지 제거 (설정파일 유지)</text>

  <!-- Row 4 -->
  <rect x="80" y="412" width="300" height="24" rx="4" fill="#111" stroke="#222"/>
  <text x="96" y="428" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">apt purge PACKAGE</text>
  <text x="400" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">패키지 + 설정파일 완전 제거</text>

  <!-- upgrade note -->
  <text x="400" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">apt upgrade</text>
  <text x="510" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888"> 설치된 패키지 업그레이드</text>
  <text x="400" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">apt full-upgrade</text>
  <text x="530" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888"> 의존성 충돌 해결 포함</text>
  <text x="400" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">apt autoremove</text>
  <text x="514" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888"> 불필요 패키지 정리</text>
  <text x="400" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">apt list --installed</text>
  <text x="554" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888"> 설치 목록</text>
</svg>
