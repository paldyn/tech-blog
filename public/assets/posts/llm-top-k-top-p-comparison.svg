<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Top-k vs Top-p (Nucleus) 샘플링 비교</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">두 기법은 후보 토큰을 제한하는 방식이 다르다</text>

  <!-- Divider -->
  <line x1="440" y1="88" x2="440" y2="400" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- LEFT SIDE: Top-k -->
  <text x="220" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7777cc" text-anchor="middle">Top-k 샘플링</text>
  <text x="220" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">k = 3 (상위 3개 토큰만 유지)</text>

  <!-- Token bars for Top-k -->
  <rect x="72" y="140" width="296" height="220" fill="#111827" rx="8" stroke="#7777cc" stroke-width="1" stroke-opacity="0.4"/>

  <!-- All 6 tokens shown -->
  <!-- Token 1: 40% - kept -->
  <rect x="88" y="160" width="200" height="22" fill="#7777cc" rx="3" opacity="0.9"/>
  <text x="96" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">토큰 A (the)</text>
  <text x="296" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="end">40%</text>
  <text x="310" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">✓</text>

  <!-- Token 2: 28% - kept -->
  <rect x="88" y="190" width="140" height="22" fill="#7777cc" rx="3" opacity="0.75"/>
  <text x="96" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">토큰 B (a)</text>
  <text x="296" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="end">28%</text>
  <text x="310" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">✓</text>

  <!-- Token 3: 18% - kept -->
  <rect x="88" y="220" width="90" height="22" fill="#7777cc" rx="3" opacity="0.6"/>
  <text x="96" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">토큰 C (an)</text>
  <text x="296" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="end">18%</text>
  <text x="310" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">✓</text>

  <!-- k=3 boundary line -->
  <line x1="80" y1="252" x2="360" y2="252" stroke="#e05555" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="368" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">k=3</text>

  <!-- Token 4: 8% - dropped -->
  <rect x="88" y="258" width="40" height="22" fill="#333" rx="3"/>
  <text x="96" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">토큰 D (one)</text>
  <text x="296" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="end">8%</text>
  <text x="310" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">✗</text>

  <!-- Token 5: 4% - dropped -->
  <rect x="88" y="288" width="20" height="22" fill="#333" rx="3"/>
  <text x="96" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">토큰 E (this)</text>
  <text x="296" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="end">4%</text>
  <text x="310" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">✗</text>

  <!-- Token 6: 2% - dropped -->
  <rect x="88" y="318" width="10" height="22" fill="#333" rx="3"/>
  <text x="96" y="333" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">토큰 F (my)</text>
  <text x="296" y="333" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="end">2%</text>
  <text x="310" y="333" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">✗</text>

  <!-- Top-k note -->
  <text x="220" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">항상 k개 고정 선택</text>
  <text x="220" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">분포 형태와 무관하게 동일한 수의 후보</text>

  <!-- RIGHT SIDE: Top-p -->
  <text x="660" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7ec8e3" text-anchor="middle">Top-p (Nucleus) 샘플링</text>
  <text x="660" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">p = 0.85 (누적 85%까지 포함)</text>

  <!-- Token bars for Top-p -->
  <rect x="452" y="140" width="296" height="220" fill="#111827" rx="8" stroke="#7ec8e3" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Token 1: 40%, cumsum=40% - kept -->
  <rect x="468" y="160" width="200" height="22" fill="#7ec8e3" rx="3" opacity="0.9"/>
  <text x="476" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#0a0a0a">토큰 A (the)</text>
  <text x="660" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#0a0a0a" text-anchor="end">40%</text>
  <text x="674" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">✓</text>
  <text x="692" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">∑40%</text>

  <!-- Token 2: 28%, cumsum=68% - kept -->
  <rect x="468" y="190" width="140" height="22" fill="#7ec8e3" rx="3" opacity="0.75"/>
  <text x="476" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#0a0a0a">토큰 B (a)</text>
  <text x="660" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#0a0a0a" text-anchor="end">28%</text>
  <text x="674" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">✓</text>
  <text x="692" y="205" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7ec8e3">∑68%</text>

  <!-- Token 3: 18%, cumsum=86% - kept (just over p=0.85) -->
  <rect x="468" y="220" width="90" height="22" fill="#7ec8e3" rx="3" opacity="0.6"/>
  <text x="476" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">토큰 C (an)</text>
  <text x="660" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="end">18%</text>
  <text x="674" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">✓</text>
  <text x="692" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">∑86%</text>

  <!-- p boundary line -->
  <line x1="460" y1="252" x2="740" y2="252" stroke="#e05555" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="748" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#e05555">p=0.85</text>

  <!-- Token 4: 8%, cumsum=94% - dropped -->
  <rect x="468" y="258" width="40" height="22" fill="#333" rx="3"/>
  <text x="476" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">토큰 D (one)</text>
  <text x="660" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="end">8%</text>
  <text x="674" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">✗</text>

  <!-- Token 5: 4% - dropped -->
  <rect x="468" y="288" width="20" height="22" fill="#333" rx="3"/>
  <text x="476" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">토큰 E (this)</text>
  <text x="660" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="end">4%</text>
  <text x="674" y="303" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">✗</text>

  <!-- Token 6: 2% - dropped -->
  <rect x="468" y="318" width="10" height="22" fill="#333" rx="3"/>
  <text x="476" y="333" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">토큰 F (my)</text>
  <text x="660" y="333" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="end">2%</text>
  <text x="674" y="333" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">✗</text>

  <!-- Top-p note -->
  <text x="660" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">분포에 따라 후보 수가 동적으로 변함</text>
  <text x="660" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">집중된 분포 → 적은 후보 / 평평한 분포 → 많은 후보</text>

  <!-- Bottom comparison bar -->
  <rect x="60" y="416" width="760" height="48" fill="#111827" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="220" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Top-k 장점</text>
  <text x="220" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">단순하고 예측 가능 / 구현 쉬움</text>
  <line x1="440" y1="420" x2="440" y2="460" stroke="#333" stroke-width="1"/>
  <text x="660" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Top-p 장점</text>
  <text x="660" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">분포 적응적 / 실제 성능 더 좋음</text>
</svg>
