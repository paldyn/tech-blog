<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="320" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">로그 파일 로테이션 라이프사이클</text>

  <!-- Files timeline -->
  <rect x="60" y="80" width="140" height="52" rx="6" fill="#0d1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="130" y="103" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">app.log</text>
  <text x="130" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">현재 기록 중</text>

  <line x1="200" y1="106" x2="238" y2="106" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="219" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">rotate</text>

  <rect x="240" y="80" width="140" height="52" rx="6" fill="#0a0f1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="310" y="103" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">app.log.1</text>
  <text x="310" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">어제 (압축 전)</text>

  <line x1="380" y1="106" x2="418" y2="106" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="399" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">compress</text>

  <rect x="420" y="80" width="140" height="52" rx="6" fill="#0a0f1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="490" y="103" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">app.log.2.gz</text>
  <text x="490" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">2일 전 (압축됨)</text>

  <line x1="560" y1="106" x2="598" y2="106" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="600" y="80" width="140" height="52" rx="6" fill="#0a0f1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="670" y="103" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">app.log.N.gz</text>
  <text x="670" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">N일 전</text>

  <line x1="740" y1="106" x2="778" y2="106" stroke="#e05555" stroke-width="2" marker-end="url(#arr)"/>
  <text x="759" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555">삭제</text>

  <rect x="780" y="80" width="60" height="52" rx="6" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="810" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">보존 초과</text>

  <!-- Hooks -->
  <text x="440" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">스크립트 훅</text>

  <rect x="60" y="180" width="760" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" font-weight="600">prerotate</text>
  <text x="270" y="204" xml:space="preserve" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">로테이션 전 실행 (예: 버퍼 플러시)</text>
  <text x="80" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" font-weight="600">postrotate</text>
  <text x="270" y="228" xml:space="preserve" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">로테이션 후 실행 (예: nginx -s reopen)</text>
  <text x="80" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" font-weight="600">sharedscripts</text>
  <text x="270" y="252" xml:space="preserve" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">와일드카드 매칭 파일 전체에 훅 한 번만 실행</text>
  <text x="80" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" font-weight="600">create 0640 nginx adm</text>
  <text x="360" y="276" xml:space="preserve" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">새 파일 권한·소유자 지정</text>
</svg>
