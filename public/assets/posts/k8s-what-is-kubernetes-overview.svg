<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">쿠버네티스란 무엇인가?</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">컨테이너 오케스트레이션 플랫폼의 핵심 역할</text>

  <!-- Left: Without K8s -->
  <rect x="60" y="100" width="340" height="360" rx="10" fill="#0d0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="230" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">수동 운영 (K8s 없이)</text>

  <rect x="84" y="142" width="292" height="52" rx="6" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="230" y="163" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">서버 1: Container A, B</text>
  <text x="230" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">수동 배포 · 장애 시 직접 재시작</text>

  <rect x="84" y="208" width="292" height="52" rx="6" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="230" y="229" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">서버 2: Container C</text>
  <text x="230" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">트래픽 폭증 시 수동 확장</text>

  <rect x="84" y="274" width="292" height="52" rx="6" fill="#1a0d0d" stroke="#444" stroke-width="1"/>
  <text x="230" y="295" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">서버 3: (다운)</text>
  <text x="230" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">장애 감지 불가 · 서비스 중단</text>

  <rect x="84" y="340" width="292" height="100" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="230" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">문제점</text>
  <text x="230" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">· 장애 자동 복구 없음</text>
  <text x="230" y="398" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">· 스케일링 수동 처리</text>
  <text x="230" y="414" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">· 배포 일관성 보장 어려움</text>
  <text x="230" y="430" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">· 무중단 배포 구현 복잡</text>

  <!-- Right: With K8s -->
  <rect x="480" y="100" width="340" height="360" rx="10" fill="#0d0d0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">Kubernetes 오케스트레이션</text>

  <rect x="504" y="142" width="292" height="52" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="163" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Node 1: Pod A, Pod B</text>
  <text x="650" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">자동 스케줄링 · 상태 감시</text>

  <rect x="504" y="208" width="292" height="52" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="229" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Node 2: Pod C, Pod D</text>
  <text x="650" y="246" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">부하 급증 시 HPA 자동 확장</text>

  <rect x="504" y="274" width="292" height="52" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="295" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Node 3: (장애) → 자동 복구</text>
  <text x="650" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">Pod 재스케줄 · 서비스 무중단</text>

  <rect x="504" y="340" width="292" height="100" rx="6" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="650" y="362" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">K8s가 제공하는 것</text>
  <text x="650" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">· 자동 장애 복구 (Self-healing)</text>
  <text x="650" y="398" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">· 자동 스케일링 (HPA/VPA)</text>
  <text x="650" y="414" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">· 선언적 배포 관리</text>
  <text x="650" y="430" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">· 롤링 업데이트 / 롤백</text>

  <!-- Arrow between -->
  <line x1="402" y1="280" x2="478" y2="280" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="440" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">도입</text>
</svg>
