<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">비트마스크 DP — TSP 상태 표현</text>
  <text x="440" y="66" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">도시 4개 (0~3), visited 집합을 비트마스크로 표현</text>

  <!-- Bitmask bit meaning -->
  <text x="60" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">비트마스크 표현 (n=4, 비트 0~3 = 도시 0~3)</text>

  <!-- Bit positions -->
  <rect x="60" y="106" width="50" height="36" fill="#1a1a3a" rx="4" stroke="#7777cc" stroke-width="1.5"/>
  <text x="85" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">bit 3</text>
  <text x="85" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">도시3</text>
  <rect x="114" y="106" width="50" height="36" fill="#1a1a3a" rx="4" stroke="#7777cc" stroke-width="1.5"/>
  <text x="139" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">bit 2</text>
  <text x="139" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">도시2</text>
  <rect x="168" y="106" width="50" height="36" fill="#1a2a3a" rx="4" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="193" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">bit 1</text>
  <text x="193" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">도시1</text>
  <rect x="222" y="106" width="50" height="36" fill="#1a3a2a" rx="4" stroke="#55c555" stroke-width="1.5"/>
  <text x="247" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">bit 0</text>
  <text x="247" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">도시0</text>

  <!-- Example states -->
  <text x="60" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">상태 예시</text>

  <!-- State 0b0001 = 1 -->
  <rect x="60" y="178" width="200" height="38" fill="#111" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="80" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">0001 = 1</text>
  <text x="200" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">도시0 방문</text>

  <!-- State 0b0101 = 5 -->
  <rect x="60" y="222" width="200" height="38" fill="#111" rx="4" stroke="#7ec8e3" stroke-width="1"/>
  <text x="80" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">0101 = 5</text>
  <text x="200" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">도시0,2 방문</text>

  <!-- State 0b1111 = 15 -->
  <rect x="60" y="266" width="200" height="38" fill="#2a3a2a" rx="4" stroke="#77dd77" stroke-width="2"/>
  <text x="80" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">1111 = 15</text>
  <text x="200" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#77dd77">모든 도시 방문!</text>

  <!-- Bitwise operations -->
  <text x="300" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">비트 연산 패턴</text>
  <rect x="300" y="178" width="540" height="166" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="316" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 도시 i 방문 여부 확인</text>
  <text x="316" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">visited = mask &amp; (1 &lt;&lt; i) != 0</text>
  <text x="316" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 도시 i 방문 상태 추가</text>
  <text x="316" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">new_mask = mask | (1 &lt;&lt; i)</text>
  <text x="316" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 도시 i 제거 (방문 취소)</text>
  <text x="316" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">prev_mask = mask ^ (1 &lt;&lt; i)</text>
  <text x="316" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># 모든 도시 방문 확인 (n=4)</text>
  <text x="316" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">all_visited = mask == (1 &lt;&lt; n) - 1  # 0b1111</text>

  <!-- TSP DP formula -->
  <text x="60" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">TSP 점화식: dp[mask][i] = mask 도시들 방문 후 현재 i에 있는 최소 비용</text>
  <rect x="60" y="350" width="760" height="110" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"># dp[1&lt;&lt;0][0] = 0  (시작 도시 0, 도시0만 방문)</text>
  <text x="76" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">for mask in range(1, 1&lt;&lt;n):</text>
  <text x="76" y="406" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">    for u in range(n):           # 현재 위치</text>
  <text x="76" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">        for v in range(n):       # 다음 방문 도시</text>
  <text x="76" y="442" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">            if mask&amp;(1&lt;&lt;v)==0:  # v 미방문</text>
  <text x="76" y="460" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">                dp[mask|(1&lt;&lt;v)][v]=min(..., dp[mask][u]+dist[u][v])</text>
</svg>
