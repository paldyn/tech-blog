<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">tmux vs screen 주요 단축키</text>

  <!-- tmux col header -->
  <rect x="60" y="60" width="380" height="36" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="250" y="83" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">tmux  (prefix: Ctrl+b)</text>

  <!-- screen col header -->
  <rect x="456" y="60" width="364" height="36" rx="6" fill="#1a2e1a" stroke="#3a6e3a" stroke-width="1.5"/>
  <text x="638" y="83" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">screen  (prefix: Ctrl+a)</text>

  <!-- Header row labels -->
  <text x="440" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">기능</text>

  <!-- Row 1: 분리 -->
  <rect x="60" y="106" width="180" height="36" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="150" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">세션 분리</text>
  <rect x="248" y="106" width="192" height="36" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="344" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" text-anchor="middle">Ctrl+b  d</text>
  <rect x="456" y="106" width="100" height="36" rx="4" fill="#112211" stroke="#2a5e2a" stroke-width="1"/>
  <text x="506" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">세션 분리</text>
  <rect x="560" y="106" width="260" height="36" rx="4" fill="#112211" stroke="#2a5e2a" stroke-width="1"/>
  <text x="690" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" text-anchor="middle">Ctrl+a  d</text>

  <!-- Row 2: 새 윈도우 -->
  <rect x="60" y="150" width="180" height="36" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="150" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">새 윈도우</text>
  <rect x="248" y="150" width="192" height="36" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="344" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" text-anchor="middle">Ctrl+b  c</text>
  <rect x="456" y="150" width="100" height="36" rx="4" fill="#112211" stroke="#2a5e2a" stroke-width="1"/>
  <text x="506" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">새 창</text>
  <rect x="560" y="150" width="260" height="36" rx="4" fill="#112211" stroke="#2a5e2a" stroke-width="1"/>
  <text x="690" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" text-anchor="middle">Ctrl+a  c</text>

  <!-- Row 3: 윈도우 이동 -->
  <rect x="60" y="194" width="180" height="36" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="150" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">윈도우 이동</text>
  <rect x="248" y="194" width="192" height="36" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="344" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" text-anchor="middle">Ctrl+b  n/p</text>
  <rect x="456" y="194" width="100" height="36" rx="4" fill="#112211" stroke="#2a5e2a" stroke-width="1"/>
  <text x="506" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">창 이동</text>
  <rect x="560" y="194" width="260" height="36" rx="4" fill="#112211" stroke="#2a5e2a" stroke-width="1"/>
  <text x="690" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" text-anchor="middle">Ctrl+a  n/p</text>

  <!-- Row 4: 팬 분할 (tmux only) -->
  <rect x="60" y="238" width="180" height="36" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="150" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">팬 수직 분할</text>
  <rect x="248" y="238" width="192" height="36" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="344" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" text-anchor="middle">Ctrl+b  %</text>
  <rect x="456" y="238" width="100" height="36" rx="4" fill="#1a1a1a" stroke="#3a3a3a" stroke-width="1"/>
  <text x="506" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">팬 분할</text>
  <rect x="560" y="238" width="260" height="36" rx="4" fill="#1a1a1a" stroke="#3a3a3a" stroke-width="1"/>
  <text x="690" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#555" text-anchor="middle">지원 안 함</text>

  <!-- Row 5: 팬 이동 -->
  <rect x="60" y="282" width="180" height="36" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="150" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">팬 간 이동</text>
  <rect x="248" y="282" width="192" height="36" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="344" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" text-anchor="middle">Ctrl+b  화살표</text>
  <rect x="456" y="282" width="100" height="36" rx="4" fill="#1a1a1a" stroke="#3a3a3a" stroke-width="1"/>
  <text x="506" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">해당없음</text>
  <rect x="560" y="282" width="260" height="36" rx="4" fill="#1a1a1a" stroke="#3a3a3a" stroke-width="1"/>
  <text x="690" y="304" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#555" text-anchor="middle">—</text>

  <!-- Row 6: 스크롤 -->
  <rect x="60" y="326" width="180" height="36" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="150" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">스크롤 모드</text>
  <rect x="248" y="326" width="192" height="36" rx="4" fill="#111122" stroke="#2a3a5e" stroke-width="1"/>
  <text x="344" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" text-anchor="middle">Ctrl+b  [</text>
  <rect x="456" y="326" width="100" height="36" rx="4" fill="#112211" stroke="#2a5e2a" stroke-width="1"/>
  <text x="506" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">스크롤백</text>
  <rect x="560" y="326" width="260" height="36" rx="4" fill="#112211" stroke="#2a5e2a" stroke-width="1"/>
  <text x="690" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" text-anchor="middle">Ctrl+a  [</text>

  <!-- Code -->
  <rect x="60" y="378" width="760" height="86" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="398" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># tmux 새 이름 세션 + 레이아웃</text>
  <text x="80" y="416" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">tmux</text>
  <text x="116" y="416" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> new-session -s dev -n editor</text>
  <text x="80" y="434" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># screen: 이름 세션</text>
  <text x="80" y="452" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">screen</text>
  <text x="122" y="452" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> -S dev      </text>
  <text x="80" y="458" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">        # 재접속: screen -r dev</text>
</svg>
