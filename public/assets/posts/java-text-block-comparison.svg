<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Text Block vs 기존 문자열 리터럴</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888" text-anchor="middle">Java 15 (JEP 378) — 여러 줄 문자열을 간결하게</text>

  <!-- ===== LEFT: 기존 방식 ===== -->
  <!-- Label bar -->
  <rect x="60" y="84" width="370" height="34" rx="6" fill="#2d1f10"/>
  <text x="245" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">기존 방식 — 이스케이프 직접 삽입</text>

  <!-- Code block -->
  <rect x="60" y="122" width="370" height="218" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text x="76" y="145" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 번거롭고 오류 발생 쉬움</text>
  <text x="76" y="163" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">String</tspan><tspan fill="#ffffff"> json = </tspan><tspan fill="#ce9178">"{\n"</tspan><tspan fill="#ffffff"> +</tspan></text>
  <text x="76" y="181" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#ce9178">"  \"name\": \"Alice\",\n"</tspan><tspan fill="#ffffff"> +</tspan></text>
  <text x="76" y="199" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#ce9178">"  \"age\": 30,\n"</tspan><tspan fill="#ffffff"> +</tspan></text>
  <text x="76" y="217" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#ce9178">"  \"city\": \"Seoul\"\n"</tspan><tspan fill="#ffffff"> +</tspan></text>
  <text x="76" y="235" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    </tspan><tspan fill="#ce9178">"}"</tspan><tspan fill="#ffffff">;</tspan></text>

  <!-- Issues annotation -->
  <text x="76" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">✗  \n 수동 삽입 — 누락 시 줄바꿈 없음</text>
  <text x="76" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">✗  \" 이스케이프 — 가독성 저하</text>
  <text x="76" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">✗  + 연결 — 성능 및 유지보수 부담</text>

  <!-- Arrow -->
  <defs>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <line x1="442" y1="220" x2="448" y2="220" stroke="#55c555" stroke-width="2" marker-end="url(#arr-r)"/>

  <!-- ===== RIGHT: Text Block ===== -->
  <!-- Label bar -->
  <rect x="450" y="84" width="370" height="34" rx="6" fill="#163322"/>
  <text x="635" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Text Block — Java 15+</text>

  <!-- Code block -->
  <rect x="450" y="122" width="370" height="218" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text x="466" y="145" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 작성한 모습 그대로 문자열이 됨</text>
  <text x="466" y="163" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">String</tspan><tspan fill="#ffffff"> json = </tspan><tspan fill="#ce9178">"""</tspan></text>
  <text x="466" y="181" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">        {</tspan></text>
  <text x="466" y="199" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">          "name": "Alice",</tspan></text>
  <text x="466" y="217" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">          "age": 30,</tspan></text>
  <text x="466" y="235" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">          "city": "Seoul"</tspan></text>
  <text x="466" y="253" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">        }"""</tspan><tspan fill="#ffffff">;</tspan></text>

  <!-- Benefits annotation -->
  <text x="466" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓  줄바꿈 자동 처리</text>
  <text x="466" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓  " 이스케이프 불필요</text>
  <text x="466" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓  들여쓰기 자동 제거 (reindentation)</text>

</svg>
