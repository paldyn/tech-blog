<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 360">
  <rect width="880" height="360" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrd" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">제너레이터 함수 실행 흐름</text>

  <!-- State boxes: horizontal flow -->
  <!-- Box: 함수 호출 -->
  <rect x="50" y="80" width="150" height="60" rx="8"
        fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="125" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">gen = func()</text>
  <text x="125" y="126" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">아직 실행 안 됨</text>

  <!-- Arrow 1 -->
  <line x1="200" y1="110" x2="238" y2="110"
        stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="219" y="102" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">next()</text>

  <!-- Box: 실행 중 -->
  <rect x="240" y="80" width="150" height="60" rx="8"
        fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="315" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">실행 중</text>
  <text x="315" y="126" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">yield 까지 진행</text>

  <!-- Arrow 2 -->
  <line x1="390" y1="110" x2="428" y2="110"
        stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>
  <text x="409" y="102" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">yield 값</text>

  <!-- Box: 일시정지 -->
  <rect x="430" y="80" width="150" height="60" rx="8"
        fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="505" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">일시 정지</text>
  <text x="505" y="126" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">프레임 상태 보존</text>

  <!-- Arrow: resume (curved back) -->
  <path d="M 505 80 C 505 50, 315 50, 315 80"
        fill="none" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <text x="410" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">next() → 재개</text>

  <!-- Arrow 3: StopIteration -->
  <line x1="580" y1="110" x2="618" y2="110"
        stroke="#888" stroke-width="2" marker-end="url(#arrd)"/>
  <text x="599" y="102" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">함수 종료</text>

  <!-- Box: 종료 -->
  <rect x="620" y="80" width="150" height="60" rx="8"
        fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="695" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">종료</text>
  <text x="695" y="126" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">StopIteration</text>

  <!-- Example title -->
  <text x="440" y="180" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">▼ 실행 예시</text>

  <!-- Code box: two columns -->
  <!-- Left: generator definition -->
  <rect x="50" y="194" width="370" height="148" rx="6"
        fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="66" y="217" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan font-weight="600" fill="#7ec8e3">def </tspan><tspan>countdown(n):</tspan>
  </text>
  <text x="66" y="235" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="66" dy="0">    </tspan><tspan font-weight="600" fill="#7ec8e3">while </tspan><tspan>n &gt; </tspan><tspan fill="#b5cea8">0</tspan><tspan>:</tspan>
  </text>
  <text x="66" y="253" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan x="66" dy="0">        </tspan><tspan font-weight="600" fill="#7ec8e3">yield </tspan><tspan>n  </tspan><tspan fill="#9aa4b8"># 여기서 일시 정지</tspan>
  </text>
  <text x="66" y="271" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        n -= <tspan fill="#b5cea8">1</tspan></text>
  <text x="66" y="289" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">    # return → StopIteration</tspan>

  <!-- Right: usage -->
  <rect x="460" y="194" width="370" height="148" rx="6"
        fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="476" y="217" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">gen = countdown(<tspan fill="#b5cea8">3</tspan>)</text>
  <text x="476" y="235" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 아직 코드 실행 안 됨</tspan>
  <text x="476" y="253" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">print(next(gen))  <tspan fill="#9aa4b8"># 3</tspan></text>
  <text x="476" y="271" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">print(next(gen))  <tspan fill="#9aa4b8"># 2</tspan></text>
  <text x="476" y="289" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">print(next(gen))  <tspan fill="#9aa4b8"># 1</tspan></text>
  <text x="476" y="307" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555">print(next(gen))  # StopIteration!</tspan>
</svg>
