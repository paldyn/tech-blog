<svg width="880" height="480" viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">Bash 반복문 종류</text>

  <!-- for in -->
  <rect x="60" y="64" width="240" height="36" rx="6" fill="#1e3a5f" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="180" y="86" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">for ... in</text>
  <rect x="60" y="106" width="240" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="126" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> i </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> 1 2 3; </tspan><tspan fill="#7ec8e3" font-weight="600">do</tspan></text>
  <text x="76" y="144" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> $i</tspan></text>
  <text x="76" y="162" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">done</tspan></text>
  <text x="76" y="180" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># 범위</text>
  <text x="76" y="198" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> i </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> {1..5}; </tspan><tspan fill="#7ec8e3" font-weight="600">do</tspan><tspan fill="#ffffff"> ...</tspan><tspan fill="#7ec8e3" font-weight="600">done</tspan></text>
  <text x="76" y="216" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> i </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> {0..10..2}; </tspan><tspan fill="#7ec8e3" font-weight="600">do</tspan><tspan fill="#ffffff"> ...</tspan></text>
  <text x="76" y="234" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># 글로빙</text>
  <text x="76" y="252" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> f </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> *.txt; </tspan><tspan fill="#7ec8e3" font-weight="600">do</tspan><tspan fill="#ffffff"> ...</tspan><tspan fill="#7ec8e3" font-weight="600">done</tspan></text>

  <!-- C-style for -->
  <rect x="320" y="64" width="240" height="36" rx="6" fill="#1e3a5f" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="440" y="86" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">C 스타일 for</text>
  <rect x="320" y="106" width="240" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="336" y="126" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> ((i=0; i&lt;5; i++)); </tspan><tspan fill="#7ec8e3" font-weight="600">do</tspan></text>
  <text x="336" y="144" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> $i</tspan></text>
  <text x="336" y="162" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">done</tspan></text>
  <text x="336" y="180" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># 역방향</text>
  <text x="336" y="198" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> ((i=10; i&gt;0; i-=2))</tspan></text>
  <text x="336" y="216" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">do</tspan><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> $i; </tspan><tspan fill="#7ec8e3" font-weight="600">done</tspan></text>

  <!-- while -->
  <rect x="580" y="64" width="240" height="36" rx="6" fill="#1e3a5f" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="700" y="86" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">while / until</text>
  <rect x="580" y="106" width="240" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="596" y="126" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">count=</tspan><tspan fill="#b5cea8">1</tspan></text>
  <text x="596" y="144" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">while</tspan><tspan fill="#ffffff"> [[ $count -le </tspan><tspan fill="#b5cea8">5</tspan><tspan fill="#ffffff"> ]]; </tspan><tspan fill="#7ec8e3" font-weight="600">do</tspan></text>
  <text x="596" y="162" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> $count</tspan></text>
  <text x="596" y="180" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">  (( count++ ))</tspan></text>
  <text x="596" y="198" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">done</tspan></text>
  <text x="596" y="216" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># until — 조건 거짓일 동안</text>
  <text x="596" y="234" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">until</tspan><tspan fill="#ffffff"> [[ $count -gt </tspan><tspan fill="#b5cea8">5</tspan><tspan fill="#ffffff"> ]]; </tspan><tspan fill="#7ec8e3" font-weight="600">do</tspan></text>

  <!-- Loop control -->
  <rect x="60" y="264" width="760" height="180" rx="8" fill="#111827" stroke="#334155" stroke-width="1"/>
  <text x="440" y="290" text-anchor="middle" font-size="16" font-weight="600" fill="#e8e8e8">루프 제어 — break / continue</text>

  <rect x="76" y="300" width="340" height="128" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="320" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># break — 루프 탈출</text>
  <text x="92" y="338" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> i </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> {1..10}; </tspan><tspan fill="#7ec8e3" font-weight="600">do</tspan></text>
  <text x="92" y="356" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">  [[ $i -eq </tspan><tspan fill="#b5cea8">5</tspan><tspan fill="#ffffff"> ]] &amp;&amp; </tspan><tspan fill="#7ec8e3" font-weight="600">break</tspan></text>
  <text x="92" y="374" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> $i  </tspan><tspan fill="#9aa4b8"># 1 2 3 4</tspan></text>
  <text x="92" y="392" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">done</tspan></text>
  <text x="92" y="410" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># break 2 — 바깥 루프까지 탈출</text>

  <rect x="430" y="300" width="374" height="128" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="446" y="320" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># continue — 다음 반복으로</text>
  <text x="446" y="338" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> i </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> {1..5}; </tspan><tspan fill="#7ec8e3" font-weight="600">do</tspan></text>
  <text x="446" y="356" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">  (( i % </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff"> == </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff"> )) &amp;&amp; </tspan><tspan fill="#7ec8e3" font-weight="600">continue</tspan></text>
  <text x="446" y="374" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">echo</tspan><tspan fill="#ffffff"> $i  </tspan><tspan fill="#9aa4b8"># 1 3 5</tspan></text>
  <text x="446" y="392" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">done</tspan></text>
  <text x="446" y="410" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># continue 2 — 바깥 루프의 다음 반복</text>
</svg>
