<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arw" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555"/>
    </marker>
    <marker id="arw-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#aa4444"/>
    </marker>
    <marker id="arw-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#44aa44"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="480" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="33" font-family="'Wanted Sans Variable', sans-serif" font-size="17" font-weight="700" fill="#e8e8e8" text-anchor="middle">RAG 유무에 따른 답변 품질 차이</text>

  <!-- ═══════════ LEFT PANEL — Without RAG ═══════════ -->
  <rect x="16" y="48" width="414" height="414" rx="10" fill="#130a0a" stroke="#3a1515" stroke-width="1.5"/>

  <!-- Left header -->
  <rect x="16" y="48" width="414" height="42" rx="10" fill="#2a1010"/>
  <rect x="16" y="80" width="414" height="10" fill="#2a1010"/>
  <text x="223" y="75" font-family="'Wanted Sans Variable', sans-serif" font-size="14" font-weight="700" fill="#dd6666" text-anchor="middle">❌ 일반 LLM (RAG 없음)</text>

  <!-- User question -->
  <rect x="36" y="108" width="374" height="52" rx="8" fill="#1a1414" stroke="#3a2a2a" stroke-width="1"/>
  <text x="56" y="127" font-family="'Wanted Sans Variable', sans-serif" font-size="11" fill="#888">💬 사용자 질문</text>
  <text x="56" y="148" font-family="'Wanted Sans Variable', sans-serif" font-size="12" font-weight="600" fill="#ccaa77">"2026년 신제품 A의 배터리 사양을 알려줘"</text>

  <!-- Arrow down -->
  <line x1="223" y1="160" x2="223" y2="184" stroke="#555" stroke-width="1.5" marker-end="url(#arw)"/>

  <!-- LLM box -->
  <rect x="36" y="184" width="374" height="106" rx="8" fill="#1e1414" stroke="#5a2a2a" stroke-width="1.5"/>
  <text x="223" y="216" font-family="'Wanted Sans Variable', sans-serif" font-size="28" text-anchor="middle">🤖</text>
  <text x="223" y="240" font-family="'Wanted Sans Variable', sans-serif" font-size="13" font-weight="600" fill="#cc7777" text-anchor="middle">LLM</text>
  <rect x="60" y="252" width="326" height="24" rx="4" fill="#2a1414" stroke="#5a3030" stroke-width="1"/>
  <text x="223" y="268" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#aa5555" text-anchor="middle">⚠️ 훈련 데이터: ~2024년 기준 | 사내 문서 없음</text>

  <!-- Arrow down -->
  <line x1="223" y1="290" x2="223" y2="312" stroke="#aa4444" stroke-width="1.5" marker-end="url(#arw-red)"/>

  <!-- Bad answer box -->
  <rect x="36" y="312" width="374" height="130" rx="8" fill="#180f0f" stroke="#663333" stroke-width="1.5"/>
  <text x="56" y="335" font-family="'Wanted Sans Variable', sans-serif" font-size="11" fill="#aa4444">🚫 불완전하거나 잘못된 답변</text>
  <line x1="36" y1="345" x2="410" y2="345" stroke="#3a1a1a" stroke-width="1"/>
  <text x="56" y="363" font-family="'Wanted Sans Variable', sans-serif" font-size="11" fill="#7a5555">"신제품 A에 대한 정보가 없습니다." 또는</text>
  <text x="56" y="381" font-family="'Wanted Sans Variable', sans-serif" font-size="11" fill="#7a5555">그럴듯하지만 틀린 사양을 지어냄 (할루시네이션)</text>
  <text x="56" y="403" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#664444">→ 지식 한계 · 도메인 데이터 부재 · 신뢰 불가</text>
  <text x="56" y="420" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#664444">→ 최신 정보 반영 불가 · 출처 없음</text>

  <!-- ═══════════ RIGHT PANEL — With RAG ═══════════ -->
  <rect x="450" y="48" width="414" height="414" rx="10" fill="#0a130a" stroke="#153a15" stroke-width="1.5"/>

  <!-- Right header -->
  <rect x="450" y="48" width="414" height="42" rx="10" fill="#102a10"/>
  <rect x="450" y="80" width="414" height="10" fill="#102a10"/>
  <text x="657" y="75" font-family="'Wanted Sans Variable', sans-serif" font-size="14" font-weight="700" fill="#66dd66" text-anchor="middle">✅ RAG 적용 LLM</text>

  <!-- User question (same) -->
  <rect x="470" y="108" width="374" height="52" rx="8" fill="#141a14" stroke="#2a3a2a" stroke-width="1"/>
  <text x="490" y="127" font-family="'Wanted Sans Variable', sans-serif" font-size="11" fill="#888">💬 사용자 질문</text>
  <text x="490" y="148" font-family="'Wanted Sans Variable', sans-serif" font-size="12" font-weight="600" fill="#ccaa77">"2026년 신제품 A의 배터리 사양을 알려줘"</text>

  <!-- Arrow down -->
  <line x1="657" y1="160" x2="657" y2="184" stroke="#555" stroke-width="1.5" marker-end="url(#arw)"/>

  <!-- Retrieval step -->
  <rect x="470" y="184" width="374" height="70" rx="8" fill="#142014" stroke="#2a5a2a" stroke-width="1.5"/>
  <text x="490" y="206" font-family="'Wanted Sans Variable', sans-serif" font-size="11" font-weight="600" fill="#66aa66">🔍 벡터 DB 검색</text>
  <text x="490" y="223" font-family="'Wanted Sans Variable', sans-serif" font-size="11" fill="#557755">"신제품 A 배터리"와 유사한 문서 청크 추출</text>
  <text x="490" y="240" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#446644">출처: 제품 카탈로그 p.14 · 내부 스펙 문서 2026.03</text>

  <!-- Arrow down -->
  <line x1="657" y1="254" x2="657" y2="274" stroke="#44aa44" stroke-width="1.5" marker-end="url(#arw-green)"/>

  <!-- LLM + Context -->
  <rect x="470" y="274" width="374" height="74" rx="8" fill="#111e1e" stroke="#2a5a5a" stroke-width="1.5"/>
  <text x="490" y="296" font-family="'Wanted Sans Variable', sans-serif" font-size="11" font-weight="600" fill="#66aaaa">🤖 LLM + 컨텍스트 주입</text>
  <text x="490" y="313" font-family="'Wanted Sans Variable', sans-serif" font-size="11" fill="#447777">프롬프트 = [검색된 문서 청크] + [사용자 질문]</text>
  <text x="490" y="330" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#446666">모델이 제공된 컨텍스트를 바탕으로 답변 생성</text>

  <!-- Arrow down -->
  <line x1="657" y1="348" x2="657" y2="368" stroke="#44aa44" stroke-width="1.5" marker-end="url(#arw-green)"/>

  <!-- Good answer -->
  <rect x="470" y="368" width="374" height="80" rx="8" fill="#0e1e0e" stroke="#336633" stroke-width="1.5"/>
  <text x="490" y="390" font-family="'Wanted Sans Variable', sans-serif" font-size="11" font-weight="600" fill="#66cc66">✅ 정확하고 신뢰할 수 있는 답변</text>
  <text x="490" y="408" font-family="'Wanted Sans Variable', sans-serif" font-size="11" fill="#558855">"신제품 A 배터리: 5000mAh, 65W 급속충전..."</text>
  <text x="490" y="425" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#446644">(출처: 제품 카탈로그 2026.03, p.14)</text>
  <text x="490" y="440" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#446644">→ 최신 · 정확 · 출처 명시 · 도메인 지식 활용</text>

  <!-- Center divider -->
  <line x1="440" y1="60" x2="440" y2="450" stroke="#222" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="440" y="458" font-family="'Wanted Sans Variable', sans-serif" font-size="10" fill="#333" text-anchor="middle">vs</text>
</svg>
