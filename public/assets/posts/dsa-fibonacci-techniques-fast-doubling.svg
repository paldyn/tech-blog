<svg width="880" height="430" viewBox="0 0 880 430" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="fdArr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="430" rx="12" fill="#0a0a0a"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">빠른 배가 공식: F(2k)·F(2k+1)을 한 번에</text>

  <!-- formula box -->
  <rect x="60" y="84" width="760" height="92" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">F(2k)   = F(k) · ( 2·F(k+1) − F(k) )</tspan></text>
  <text x="76" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">F(2k+1) = F(k)² + F(k+1)²</tspan></text>
  <text x="76" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8"># (F(k), F(k+1)) 쌍만 들고 비트를 따라 내려간다</tspan></text>

  <!-- recursion chain -->
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14">
    <rect x="60" y="226" width="150" height="64" rx="8" fill="#000000" stroke="#55c555" stroke-width="2"/>
    <text x="135" y="254" text-anchor="middle" fill="#ffffff" font-weight="600">n = 91</text>
    <text x="135" y="276" text-anchor="middle" fill="#9aa4b8" font-size="12">1011011₂</text>

    <rect x="265" y="226" width="150" height="64" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="340" y="254" text-anchor="middle" fill="#ffffff" font-weight="600">k = 45</text>
    <text x="340" y="276" text-anchor="middle" fill="#9aa4b8" font-size="12">F(45),F(46)</text>

    <rect x="470" y="226" width="150" height="64" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="545" y="254" text-anchor="middle" fill="#ffffff" font-weight="600">k = 22</text>
    <text x="545" y="276" text-anchor="middle" fill="#9aa4b8" font-size="12">F(22),F(23)</text>

    <rect x="675" y="226" width="145" height="64" rx="8" fill="#000000" stroke="#55c555" stroke-width="2"/>
    <text x="747" y="254" text-anchor="middle" fill="#ffffff" font-weight="600">k = 0</text>
    <text x="747" y="276" text-anchor="middle" fill="#55c555" font-size="12">바닥</text>
  </g>

  <line x1="212" y1="258" x2="263" y2="258" stroke="#7ec8e3" stroke-width="2" marker-end="url(#fdArr)"/>
  <line x1="417" y1="258" x2="468" y2="258" stroke="#7ec8e3" stroke-width="2" marker-end="url(#fdArr)"/>
  <line x1="622" y1="258" x2="673" y2="258" stroke="#7ec8e3" stroke-width="2" marker-end="url(#fdArr)"/>
  <text x="237" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">n/2</text>
  <text x="442" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">n/2</text>
  <text x="647" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">…</text>

  <!-- complexity -->
  <rect x="60" y="324" width="760" height="44" rx="6" fill="#000000" stroke="#55c555" stroke-width="1.5"/>
  <text x="76" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">비트 수만큼 재귀 → 곱셈 횟수 </tspan><tspan fill="#55c555" font-weight="600">O(log n)</tspan><tspan fill="#ffffff"> (행렬 거듭제곱보다 상수 작음)</tspan></text>

  <text x="60" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">상위 비트부터 한 칸씩 내려오며 (F(k),F(k+1)) → (F(2k),F(2k+1))로 배가한다</text>
</svg>
