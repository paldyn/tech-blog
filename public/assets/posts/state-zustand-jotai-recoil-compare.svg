<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" style="background:#0a0a0a" rx="12">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="45" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">가벼운 상태 관리 라이브러리 비교</text>

  <!-- ===== ZUSTAND (left) ===== -->
  <rect x="60" y="70" width="260" height="400" fill="#0a0a0a" stroke="#7ec8e3" stroke-width="2" rx="8"/>
  <!-- Header bg -->
  <rect x="60" y="70" width="260" height="40" fill="#0a1020" rx="8"/>
  <rect x="60" y="94" width="260" height="16" fill="#0a1020"/>

  <text x="190" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">Zustand</text>
  <text x="190" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888888" text-anchor="middle">~1KB, Flux 기반</text>

  <!-- Zustand features -->
  <text font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">
    <tspan x="78" y="150" fill="#e8e8e8">✓ 간단한 API (create)</tspan>
    <tspan x="78" dy="25" fill="#e8e8e8">✓ Context 없이 사용</tspan>
    <tspan x="78" dy="25" fill="#e8e8e8">✓ Middleware 지원</tspan>
    <tspan x="78" dy="25" fill="#e8e8e8">✓ Devtools 통합</tspan>
    <tspan x="78" dy="25" fill="#e8e8e8">✓ 선택적 구독</tspan>
  </text>

  <!-- Zustand code box -->
  <rect x="70" y="278" width="240" height="178" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan x="82" y="298" fill="#ffffff">const useStore =</tspan>
    <tspan x="82" dy="19" fill="#ffffff">  create((set) =&gt; ({</tspan>
    <tspan x="82" dy="19" fill="#ffffff">    count: <tspan fill="#b5cea8">0</tspan>,</tspan>
    <tspan x="82" dy="19" fill="#ffffff">    inc: () =&gt; set(</tspan>
    <tspan x="82" dy="19" fill="#ffffff">      s =&gt; ({</tspan>
    <tspan x="82" dy="19" fill="#ffffff">        count: s.count+<tspan fill="#b5cea8">1</tspan></tspan>
    <tspan x="82" dy="19" fill="#ffffff">      })</tspan>
    <tspan x="82" dy="19" fill="#ffffff">    )</tspan>
    <tspan x="82" dy="19" fill="#ffffff">  }))</tspan>
  </text>

  <!-- ===== JOTAI (center) ===== -->
  <rect x="330" y="70" width="240" height="400" fill="#0a0a0a" stroke="#55c555" stroke-width="2" rx="8"/>
  <rect x="330" y="70" width="240" height="40" fill="#0a1a0a" rx="8"/>
  <rect x="330" y="94" width="240" height="16" fill="#0a1a0a"/>

  <text x="450" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">Jotai</text>
  <text x="450" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888888" text-anchor="middle">~4KB, Atomic 기반</text>

  <!-- Jotai features -->
  <text font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">
    <tspan x="348" y="150" fill="#e8e8e8">✓ Atom 단위 상태</tspan>
    <tspan x="348" dy="25" fill="#e8e8e8">✓ React Suspense 통합</tspan>
    <tspan x="348" dy="25" fill="#e8e8e8">✓ 파생 atom (selector)</tspan>
    <tspan x="348" dy="25" fill="#e8e8e8">✓ SSR 지원</tspan>
    <tspan x="348" dy="25" fill="#e8e8e8">✓ 최소 리렌더링</tspan>
  </text>

  <!-- Jotai code box -->
  <rect x="340" y="278" width="220" height="178" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan x="352" y="298" fill="#ffffff">const countAtom =</tspan>
    <tspan x="352" dy="19" fill="#ffffff">  atom(<tspan fill="#b5cea8">0</tspan>)</tspan>
    <tspan x="352" dy="19" fill="#ffffff"> </tspan>
    <tspan x="352" dy="19" fill="#9aa4b8">// Component</tspan>
    <tspan x="352" dy="19" fill="#ffffff">const [count,</tspan>
    <tspan x="352" dy="19" fill="#ffffff">  setCount] =</tspan>
    <tspan x="352" dy="19" fill="#ffffff">  useAtom(countAtom)</tspan>
  </text>

  <!-- ===== RECOIL (right) ===== -->
  <rect x="580" y="70" width="240" height="400" fill="#0a0a0a" stroke="#b07ec8" stroke-width="2" rx="8"/>
  <rect x="580" y="70" width="240" height="40" fill="#1a0a1a" rx="8"/>
  <rect x="580" y="94" width="240" height="16" fill="#1a0a1a"/>

  <text x="700" y="97" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#b07ec8" text-anchor="middle">Recoil</text>
  <text x="700" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888888" text-anchor="middle">Facebook, Atom+Selector</text>

  <!-- Recoil features -->
  <text font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13">
    <tspan x="598" y="150" fill="#e8e8e8">✓ atom / selector</tspan>
    <tspan x="598" dy="25" fill="#e8e8e8">✓ 비동기 selector</tspan>
    <tspan x="598" dy="25" fill="#e8e8e8">✓ Snapshot API</tspan>
    <tspan x="598" dy="25" fill="#e05555">⚠ 번들 크기 큼</tspan>
    <tspan x="598" dy="25" fill="#e05555">⚠ 활발하지 않은 유지보수</tspan>
  </text>

  <!-- Recoil code box -->
  <rect x="590" y="278" width="220" height="178" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan x="602" y="298" fill="#ffffff">const countAtom =</tspan>
    <tspan x="602" dy="19" fill="#ffffff">  atom({</tspan>
    <tspan x="602" dy="19" fill="#ffffff">    key: <tspan fill="#ce9178">'count'</tspan>,</tspan>
    <tspan x="602" dy="19" fill="#ffffff">    default: <tspan fill="#b5cea8">0</tspan></tspan>
    <tspan x="602" dy="19" fill="#ffffff">  })</tspan>
  </text>
</svg>
