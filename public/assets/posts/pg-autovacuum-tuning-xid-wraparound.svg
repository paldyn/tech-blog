<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" style="background:#0a0a0a;border-radius:12px">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">XID Wraparound 방지 — Freeze 메커니즘</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">32비트 XID 공간 (21억 트랜잭션) 순환 구조</text>

  <!-- XID Circle representation -->
  <!-- Linear bar showing XID space -->
  <rect x="60" y="100" width="760" height="40" rx="6" fill="#1a1a2e" stroke="#1e2433"/>
  <!-- Past -->
  <rect x="60" y="100" width="200" height="40" rx="6" fill="#2a1a1a"/>
  <text x="160" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">과거 (OLD)</text>
  <!-- Current zone -->
  <rect x="260" y="100" width="120" height="40" fill="#1a2a1a"/>
  <text x="320" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">현재</text>
  <!-- Future -->
  <rect x="380" y="100" width="440" height="40" rx="6" fill="#1a1a2e"/>
  <text x="600" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">미래 (FUTURE) — 2^31 ≈ 21억</text>

  <!-- Warning zone -->
  <rect x="700" y="100" width="120" height="40" rx="0 6 6 0" fill="#3a1a00"/>
  <text x="760" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">⚠ DANGER</text>

  <!-- Arrows pointing to key positions -->
  <line x1="320" y1="140" x2="320" y2="170" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="320" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">현재 XID</text>

  <!-- Freeze threshold -->
  <line x1="560" y1="140" x2="560" y2="170" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="560" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">Freeze 임계 (2억)</text>

  <!-- Danger threshold -->
  <line x1="740" y1="140" x2="740" y2="170" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="740" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">강제 VACUUM (1.1억)</text>

  <!-- Freeze explanation -->
  <rect x="60" y="208" width="360" height="180" rx="8" fill="#111" stroke="#1e2433"/>
  <text x="240" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7777cc" text-anchor="middle">Freeze 동작</text>
  <text x="80" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• xmin이 vacuum_freeze_min_age(5천만)</text>
  <text x="80" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">  보다 오래된 튜플을 FrozenXID로 교체</text>
  <text x="80" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• FrozenXID는 항상 과거로 판정 →</text>
  <text x="80" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">  Wraparound 위험 제거</text>
  <text x="80" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• pg_class.relfrozenxid 업데이트</text>
  <text x="80" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• age(relfrozenxid)로 위험도 모니터링</text>

  <!-- Monitoring query -->
  <rect x="460" y="208" width="360" height="180" rx="8" fill="#070b14" stroke="#1e2433"/>
  <text x="468" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">-- XID 고갈 위험 테이블 탐지</text>
  <text x="468" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">SELECT</text>
  <text x="468" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  relname,</text>
  <text x="468" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  age(relfrozenxid) AS xid_age,</text>
  <text x="468" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  2147483647 - age(relfrozenxid)</text>
  <text x="468" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">    AS xids_remaining</text>
  <text x="468" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">FROM</text>
  <text x="468" y="360" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  pg_class</text>
  <text x="468" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">ORDER BY</text>
  <text x="468" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  xid_age DESC LIMIT 10;</text>

  <!-- Bottom warning -->
  <rect x="60" y="404" width="760" height="52" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle" font-weight="600">⚠ age(relfrozenxid) &gt; 1.5억: 즉시 VACUUM FREEZE 실행 필요</text>
  <text x="440" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">autovacuum_freeze_max_age(2억) 초과 시 강제 autovacuum 가동 — 서비스 중에도 발동</text>
</svg>
