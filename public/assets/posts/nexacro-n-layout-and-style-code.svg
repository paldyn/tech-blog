<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">레이아웃·스타일 xfdl 코드</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">배치 속성과 style 속성 선언 예시</text>

  <!-- Left: xfdl layout -->
  <text x="70" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">xfdl 레이아웃 선언</text>
  <rect x="60" y="108" width="360" height="240" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="128" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">&lt;!-- 절대 좌표 배치 --&gt;</text>
  <text x="76" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">&lt;Edit</text>
  <text x="76" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  id=<tspan fill="#ce9178">"edtName"</tspan></text>
  <text x="76" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  left=<tspan fill="#b5cea8">"120"</tspan> top=<tspan fill="#b5cea8">"20"</tspan></text>
  <text x="76" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  width=<tspan fill="#b5cea8">"200"</tspan> height=<tspan fill="#b5cea8">"24"</tspan></text>
  <text x="76" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">/&gt;</text>
  <text x="76" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">&lt;!-- Anchor — 폼 크기 변할 때 우측 고정 --&gt;</text>
  <text x="76" y="258" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">&lt;Button</text>
  <text x="76" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  id=<tspan fill="#ce9178">"btnOk"</tspan></text>
  <text x="76" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  right=<tspan fill="#b5cea8">"10"</tspan> bottom=<tspan fill="#b5cea8">"10"</tspan></text>
  <text x="76" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  anchors=<tspan fill="#ce9178">"right bottom"</tspan></text>
  <text x="76" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">/&gt;</text>

  <!-- Right: style 속성 -->
  <text x="470" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">style 속성 선언</text>
  <rect x="460" y="108" width="360" height="240" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="476" y="128" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">&lt;!-- 인라인 style 속성 --&gt;</text>
  <text x="476" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">&lt;Static</text>
  <text x="476" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  id=<tspan fill="#ce9178">"stcTitle"</tspan></text>
  <text x="476" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  style=<tspan fill="#ce9178">"background:#1a2a3a;</tspan></text>
  <text x="476" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">    color:#e8e8e8;</text>
  <text x="476" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">    font-size:14px;</text>
  <text x="476" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">    font-weight:bold;"</text>
  <text x="476" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">/&gt;</text>
  <text x="476" y="276" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">&lt;!-- CSS 클래스 참조 --&gt;</text>
  <text x="476" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">&lt;Button</text>
  <text x="476" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  cssclass=<tspan fill="#ce9178">"btn-primary"</tspan></text>
  <text x="476" y="330" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">/&gt;</text>

  <!-- Bottom: 동적 스타일 변경 -->
  <text x="70" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8c84a">스크립트로 동적 스타일 변경</text>
  <rect x="60" y="384" width="760" height="32" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="404" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 오류 강조</tspan></text>
  <text x="180" y="404" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">this.edtName.<tspan fill="#55c555">set_style</tspan>(<tspan fill="#ce9178">"border:1px solid #e05555; background:#1f0d0d;"</tspan>);</text>

  <!-- Footer -->
  <text x="440" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444" text-anchor="middle">PALDYN · Nexacro N 완전 정복 시리즈</text>
</svg>
