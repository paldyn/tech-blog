<svg xmlns="http://www.w3.org/2000/svg" width="880" height="280" viewBox="0 0 880 280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="280" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">요청 본문 → Pydantic 모델 검증</text>

  <defs>
    <marker id="fbar" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="60" y="92" width="230" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="175" y="118" font-size="13" fill="#9aa4b8" text-anchor="middle">JSON 요청 본문</text>
  <text x="76" y="146" font-size="13" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">{</text>
  <text x="76" y="168" font-size="13" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  <tspan fill="#ce9178">"name"</tspan>: <tspan fill="#ce9178">"book"</tspan>,</text>
  <text x="76" y="190" font-size="13" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  <tspan fill="#ce9178">"price"</tspan>: <tspan fill="#b5cea8">9000</tspan></text>
  <text x="76" y="208" font-size="13" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">}</text>

  <line x1="290" y1="152" x2="356" y2="152" stroke="#7ec8e3" stroke-width="2" marker-end="url(#fbar)"/>
  <text x="323" y="135" font-size="11" fill="#9aa4b8" text-anchor="middle">검증</text>

  <rect x="360" y="92" width="250" height="120" rx="6" fill="#000000" stroke="#7777cc" stroke-width="1"/>
  <text x="376" y="118" font-size="13" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace"><tspan fill="#7ec8e3" font-weight="600">class</tspan> Item(BaseModel):</text>
  <text x="376" y="142" font-size="13" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  name: <tspan fill="#7ec8e3" font-weight="600">str</tspan></text>
  <text x="376" y="166" font-size="13" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace">  price: <tspan fill="#7ec8e3" font-weight="600">int</tspan></text>
  <text x="376" y="194" font-size="12" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace"># 타입·필수값 확인</text>

  <line x1="610" y1="152" x2="676" y2="152" stroke="#55c555" stroke-width="2" marker-end="url(#fbar)"/>

  <rect x="680" y="92" width="140" height="120" rx="6" fill="#000000" stroke="#55c555" stroke-width="1"/>
  <text x="750" y="138" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Item 객체</text>
  <text x="750" y="164" font-size="12" fill="#9aa4b8" text-anchor="middle">검증 끝난</text>
  <text x="750" y="184" font-size="12" fill="#9aa4b8" text-anchor="middle">타입 보장</text>

  <rect x="60" y="232" width="760" height="34" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="254" font-size="13" fill="#55c555" text-anchor="middle">검증을 통과한 데이터만 함수 안으로 들어온다 — 방어 코드가 사라진다</text>
</svg>
