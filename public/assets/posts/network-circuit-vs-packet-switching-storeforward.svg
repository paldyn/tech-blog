<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="320" fill="#0a0a0a" rx="12"/>
  <text x="440" y="38" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">저장 후 전달 (Store-and-Forward)</text>
  <text x="440" y="58" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">패킷 교환의 핵심 메커니즘 — 라우터가 전체 패킷을 받고 나서 다음 홉으로 전달</text>

  <!-- Code block showing timing -->
  <rect x="60" y="76" width="760" height="160" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="100" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">전송 지연 계산 (Store-and-Forward)</text>
  <text x="76" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">링크 속도: 1 Mbps, 패킷 크기: 1000 bit, 홉 수: 3</text>
  <text x="76" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">전송 지연/홉 = 1000 / 1,000,000 = 1ms</text>
  <text x="76" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">총 전송 지연 = 1ms × 3 홉 = 3ms</text>
  <text x="76" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">(전파 지연 제외 — 실제로는 전파 지연이 훨씬 큼)</text>
  <text x="76" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">패킷이 크면 전송 지연 증가 → MTU로 단편화</text>
  <text x="76" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" xml:space="preserve">★ 패킷 파이프라이닝: 여러 패킷을 동시에 경로 상 이동</text>

  <!-- Bottom row: Pipelining diagram -->
  <rect x="60" y="254" width="760" height="46" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">파이프라이닝: P1이 R2로 이동하는 동안 P2가 R1에서 처리됨</text>
  <text x="440" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">→ 회선 교환 대비 링크 활용률이 훨씬 높다</text>
</svg>
