<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">CREATE TABLE 변형 패턴</text>

  <!-- IF NOT EXISTS -->
  <rect x="60" y="72" width="370" height="130" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="96" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#9aa4b8">-- 이미 있으면 무시 (에러 방지)</text>
  <text x="76" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">CREATE TABLE IF NOT EXISTS</text>
  <text x="76" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">  logs (</text>
  <text x="76" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">  id      </text>
  <text x="76" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">BIGINT</text>
  <text x="76" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">        PRIMARY KEY</text>
  <text x="76" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">              ,</text>
  <text x="76" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">  msg     </text>
  <text x="76" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">TEXT</text>
  <text x="76" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">              );</text>

  <text x="245" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">IF NOT EXISTS: 스크립트 재실행 안전</text>

  <!-- CTAS -->
  <rect x="460" y="72" width="360" height="130" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="476" y="96" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#9aa4b8">-- 쿼리 결과로 테이블 생성(CTAS)</text>
  <text x="476" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">CREATE TABLE</text>
  <text x="476" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">             dept_summary</text>
  <text x="476" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">AS</text>
  <text x="476" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">   SELECT</text>
  <text x="476" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">          dept_id,</text>
  <text x="476" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">         </text>
  <text x="476" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">         COUNT</text>
  <text x="476" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">              (*) headcount</text>
  <text x="476" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">          FROM</text>
  <text x="476" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">               employees</text>
  <text x="476" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">          GROUP BY</text>
  <text x="476" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo',monospace"
        font-size="13" fill="#ffffff">                   dept_id;</text>

  <text x="640" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">CTAS: 스냅샷·임시 분석 테이블에 유용</text>

  <!-- Comparison notes -->
  <rect x="60" y="248" width="760" height="120" fill="#111827" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">열 정의 주요 옵션</text>

  <text x="80" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" font-weight="600">NOT NULL</text>
  <text x="185" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">NULL 값을 허용하지 않음. 인덱스 효율에도 영향</text>

  <text x="80" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" font-weight="600">DEFAULT 값</text>
  <text x="185" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">INSERT 시 값 생략하면 자동 채워짐 (상수·함수 모두 가능)</text>

  <text x="80" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" font-weight="600">GENERATED ALWAYS AS (식)</text>
  <text x="340" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">계산 열: 다른 열의 식으로 자동 계산 (SQL:2003)</text>

  <text x="80" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" font-weight="600">UNIQUE</text>
  <text x="185" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">테이블 내 중복 불허 (NULL은 여러 행에 허용)</text>
</svg>
