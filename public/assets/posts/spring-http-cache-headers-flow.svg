<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">HTTP 캐시 요청/응답 플로우</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">ETag 검증과 304 Not Modified 흐름</text>

  <!-- Client -->
  <rect x="60" y="92" width="140" height="56" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="130" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">브라우저</text>
  <text x="130" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">/ 프록시 캐시</text>

  <!-- Spring Server -->
  <rect x="570" y="92" width="160" height="56" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Spring 서버</text>
  <text x="650" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">ResponseEntity + Header</text>

  <!-- Flow 1: First Request -->
  <text x="400" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" font-weight="600" text-anchor="middle">① 첫 번째 요청</text>
  <line x1="200" y1="180" x2="568" y2="180" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="384" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">GET /api/products</text>

  <!-- Flow 2: 200 Response with ETag -->
  <text x="400" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" font-weight="600" text-anchor="middle">② 200 OK + ETag / Last-Modified</text>
  <line x1="568" y1="240" x2="200" y2="240" stroke="#55c555" stroke-width="2" marker-end="url(#arr-b)"/>
  <text x="384" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">ETag: "abc123"  Cache-Control: max-age=60</text>

  <!-- Browser stores cache box -->
  <rect x="60" y="272" width="140" height="44" rx="6" fill="#111" stroke="#3a3a5a" stroke-width="1"/>
  <text x="130" y="291" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">캐시 저장</text>
  <text x="130" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">ETag: "abc123"</text>

  <!-- Flow 3: Conditional Request -->
  <text x="400" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" font-weight="600" text-anchor="middle">③ 조건부 재검증 요청 (캐시 만료 후)</text>
  <line x1="200" y1="354" x2="568" y2="354" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="384" y="371" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">If-None-Match: "abc123"</text>

  <!-- Fork: 데이터 변경 없음 / 변경됨 -->
  <!-- No change path -->
  <text x="310" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">데이터 동일</text>
  <line x1="568" y1="390" x2="350" y2="420" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-g)"/>

  <rect x="200" y="424" width="140" height="44" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="270" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">304 Not Modified</text>
  <text x="270" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">바디 없음 (대역폭 절약)</text>

  <!-- Changed path -->
  <text x="560" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">데이터 변경됨</text>
  <line x1="568" y1="390" x2="540" y2="420" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-r)"/>

  <rect x="480" y="424" width="140" height="44" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="550" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">200 OK</text>
  <text x="550" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">새 ETag + 새 바디</text>

  <!-- Bottom note -->
  <text x="440" y="498" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">304 응답은 바디가 없으므로 대역폭을 크게 절약한다. Spring ShallowEtagHeaderFilter가 ETag를 자동 생성한다.</text>
</svg>
