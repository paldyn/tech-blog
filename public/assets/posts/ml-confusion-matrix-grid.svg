<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">혼동 행렬 구조와 해석</text>
  <text x="440" y="66" text-anchor="middle" fill="#888" font-size="13">행은 실제 클래스, 열은 예측 클래스 — 대각선이 맞은 예측이다</text>

  <!-- Axis labels -->
  <text x="340" y="100" text-anchor="middle" fill="#888" font-size="13" font-weight="600">예측 (Predicted)</text>
  <text x="340" y="118" text-anchor="middle" fill="#7ec8e3" font-size="12">양성 (Pos)</text>
  <text x="460" y="118" text-anchor="middle" fill="#7777cc" font-size="12">음성 (Neg)</text>

  <!-- Row labels -->
  <text x="170" y="192" text-anchor="middle" fill="#888" font-size="13" font-weight="600" transform="rotate(-90, 170, 192)">실제 (Actual)</text>
  <text x="205" y="174" text-anchor="end" fill="#7ec8e3" font-size="12">양성 (Pos)</text>
  <text x="205" y="254" text-anchor="end" fill="#7777cc" font-size="12">음성 (Neg)</text>

  <!-- TP cell -->
  <rect x="210" y="128" width="140" height="80" rx="4" fill="#0e2a14" stroke="#1a5c2a" stroke-width="2"/>
  <text x="280" y="160" text-anchor="middle" fill="#55c555" font-size="20" font-weight="700">TP</text>
  <text x="280" y="180" text-anchor="middle" fill="#55c555" font-size="13">True Positive</text>
  <text x="280" y="198" text-anchor="middle" fill="#888" font-size="11">실제 Pos, 예측 Pos</text>

  <!-- FN cell -->
  <rect x="352" y="128" width="140" height="80" rx="4" fill="#2a1414" stroke="#5c1a1a" stroke-width="2"/>
  <text x="422" y="160" text-anchor="middle" fill="#e07030" font-size="20" font-weight="700">FN</text>
  <text x="422" y="180" text-anchor="middle" fill="#e07030" font-size="13">False Negative</text>
  <text x="422" y="198" text-anchor="middle" fill="#888" font-size="11">실제 Pos, 예측 Neg</text>

  <!-- FP cell -->
  <rect x="210" y="210" width="140" height="80" rx="4" fill="#2a1414" stroke="#5c1a1a" stroke-width="2"/>
  <text x="280" y="242" text-anchor="middle" fill="#e05555" font-size="20" font-weight="700">FP</text>
  <text x="280" y="262" text-anchor="middle" fill="#e05555" font-size="13">False Positive</text>
  <text x="280" y="280" text-anchor="middle" fill="#888" font-size="11">실제 Neg, 예측 Pos</text>

  <!-- TN cell -->
  <rect x="352" y="210" width="140" height="80" rx="4" fill="#0e1a2a" stroke="#1a3a5c" stroke-width="2"/>
  <text x="422" y="242" text-anchor="middle" fill="#7ec8e3" font-size="20" font-weight="700">TN</text>
  <text x="422" y="262" text-anchor="middle" fill="#7ec8e3" font-size="13">True Negative</text>
  <text x="422" y="280" text-anchor="middle" fill="#888" font-size="11">실제 Neg, 예측 Neg</text>

  <!-- Right panel: Derived metrics -->
  <rect x="540" y="88" width="300" height="250" rx="8" fill="#111827" stroke="#333" stroke-width="1.5"/>
  <text x="690" y="112" text-anchor="middle" fill="#e8e8e8" font-size="14" font-weight="600">유도 지표</text>
  <line x1="556" y1="122" x2="824" y2="122" stroke="#333" stroke-width="1"/>

  <text x="556" y="142" fill="#888" font-size="11">Precision  =  TP / (TP + FP)</text>
  <text x="556" y="162" fill="#888" font-size="11">Recall     =  TP / (TP + FN)</text>
  <text x="556" y="182" fill="#888" font-size="11">Specificity = TN / (TN + FP)</text>
  <text x="556" y="202" fill="#888" font-size="11">Accuracy   = (TP+TN) / 전체</text>
  <text x="556" y="222" fill="#888" font-size="11">F1 = 2·P·R / (P + R)</text>
  <text x="556" y="248" fill="#7ec8e3" font-size="11" font-weight="600">TPR = Recall (민감도)</text>
  <text x="556" y="266" fill="#e0a020" font-size="11" font-weight="600">FPR = FP / (FP + TN)</text>
  <text x="556" y="286" fill="#7777cc" font-size="11">ROC 곡선의 Y축/X축</text>
  <text x="556" y="316" fill="#888" font-size="11">※ 대각선 합 / 전체 = 정확도</text>
  <text x="556" y="332" fill="#888" font-size="11">※ 비대각선 = 잘못된 예측</text>

  <!-- Example numbers -->
  <rect x="60" y="330" width="460" height="70" rx="6" fill="#111827" stroke="#333" stroke-width="1"/>
  <text x="290" y="354" text-anchor="middle" fill="#e8e8e8" font-size="13" font-weight="600">예시: 암 진단 1000명</text>
  <text x="100" y="374" fill="#55c555" font-size="12">TP=90  FN=10</text>
  <text x="100" y="392" fill="#e05555" font-size="12">FP=50  TN=850</text>
  <text x="290" y="374" text-anchor="middle" fill="#888" font-size="11">정확도 (90+850)/1000 = 94%</text>
  <text x="290" y="392" text-anchor="middle" fill="#e0a020" font-size="11">재현율 90/(90+10) = 90%</text>
  <text x="450" y="374" text-anchor="end" fill="#7777cc" font-size="11">정밀도 90/(90+50) = 64%</text>
  <text x="450" y="392" text-anchor="end" fill="#7777cc" font-size="11">FPR 50/(50+850) = 5.6%</text>

  <!-- Footer -->
  <text x="440" y="428" text-anchor="middle" fill="#444" font-size="11">PALDYN · AI 완전 정복 시리즈</text>
</svg>
