<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">tcpdump 출력 구조 해부</text>

  <!-- Command -->
  <rect x="50" y="64" width="780" height="38" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="70" y="88" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">$ <tspan fill="#7ec8e3" font-weight="600">tcpdump</tspan> -i eth0 -nn -v tcp port 80</text>

  <!-- Output line 1: SYN -->
  <text x="50" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555">SYN — 연결 시작</text>
  <rect x="50" y="134" width="780" height="38" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="68" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8">14:22:01.123456</tspan>  IP 10.0.0.5.52001 &gt; <tspan fill="#7ec8e3">1.2.3.4.80</tspan>: Flags [<tspan fill="#e0a055">S</tspan>], seq <tspan fill="#b5cea8">0</tspan>, win 65535, length 0</text>

  <!-- Output line 2: SYN-ACK -->
  <text x="50" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3">SYN-ACK — 서버 응답</text>
  <rect x="50" y="204" width="780" height="38" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="68" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8">14:22:01.125123</tspan>  IP <tspan fill="#7ec8e3">1.2.3.4.80</tspan> &gt; 10.0.0.5.52001: Flags [<tspan fill="#e0a055">S.</tspan>], seq 0, ack <tspan fill="#b5cea8">1</tspan>, win 65535</text>

  <!-- Output line 3: HTTP GET -->
  <text x="50" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8e8e8">HTTP GET 요청</text>
  <rect x="50" y="274" width="780" height="38" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="68" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8">14:22:01.126001</tspan>  IP 10.0.0.5.52001 &gt; 1.2.3.4.80: Flags [<tspan fill="#e0a055">P.</tspan>], seq 1:79, ack 1, length <tspan fill="#b5cea8">78</tspan></text>

  <!-- Output line 4: FIN -->
  <text x="50" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e05555">FIN — 연결 종료</text>
  <rect x="50" y="344" width="780" height="38" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="68" y="368" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ffffff" xml:space="preserve"><tspan fill="#9aa4b8">14:22:01.200123</tspan>  IP 1.2.3.4.80 &gt; 10.0.0.5.52001: Flags [<tspan fill="#e0a055">F.</tspan>], seq 1, ack 79, length 0</text>

  <!-- Flag legend -->
  <rect x="50" y="400" width="780" height="62" rx="6" fill="#0f1219" stroke="#1a2a3a" stroke-width="1"/>
  <text x="70" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8e8e8">TCP Flags:  </text>
  <text x="170" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e0a055">S</text>
  <text x="185" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">=SYN  </text>
  <text x="235" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e0a055">.</text>
  <text x="248" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">=ACK  </text>
  <text x="298" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e0a055">P</text>
  <text x="313" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">=PUSH  </text>
  <text x="367" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e0a055">F</text>
  <text x="382" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">=FIN  </text>
  <text x="430" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e0a055">R</text>
  <text x="445" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">=RST (강제종료)</text>
  <text x="70" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">-nn: IP·포트 이름 변환 없음  -v: 상세  -w file.pcap: 파일 저장  -r file.pcap: 파일 읽기</text>
</svg>
