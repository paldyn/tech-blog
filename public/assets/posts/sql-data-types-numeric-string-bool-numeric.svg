<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">숫자 데이터 타입 완전 정리</text>

  <!-- Integer types -->
  <rect x="30" y="68" width="400" height="28" fill="#192040" rx="4"/>
  <text x="230" y="86" text-anchor="middle" font-size="13" font-weight="700" fill="#7ec8e3">정수형 (Exact Integer)</text>

  <rect x="30" y="98" width="400" height="160" fill="#0f1320" stroke="#3a4a6e" stroke-width="1" rx="6"/>

  <!-- Header -->
  <rect x="30" y="98" width="400" height="30" fill="#192040" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="110" y="118" text-anchor="middle" font-size="12" font-weight="600" fill="#9aa4b8">타입</text>
  <text x="250" y="118" text-anchor="middle" font-size="12" font-weight="600" fill="#9aa4b8">크기</text>
  <text x="380" y="118" text-anchor="middle" font-size="12" font-weight="600" fill="#9aa4b8">범위</text>
  <line x1="175" y1="98" x2="175" y2="258" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="310" y1="98" x2="310" y2="258" stroke="#3a4a6e" stroke-width="1"/>

  <rect x="30" y="128" width="400" height="32" fill="#0d1420" stroke="#3a4a6e" stroke-width="1"/>
  <text x="110" y="149" text-anchor="middle" font-size="12" fill="#7ec8e3" font-weight="600">SMALLINT</text>
  <text x="250" y="149" text-anchor="middle" font-size="12" fill="#888">2 bytes</text>
  <text x="380" y="149" text-anchor="middle" font-size="11" fill="#b5cea8">-32768 ~ 32767</text>

  <rect x="30" y="160" width="400" height="32" fill="#131928" stroke="#3a4a6e" stroke-width="1"/>
  <text x="110" y="181" text-anchor="middle" font-size="12" fill="#7ec8e3" font-weight="600">INTEGER / INT</text>
  <text x="250" y="181" text-anchor="middle" font-size="12" fill="#888">4 bytes</text>
  <text x="380" y="181" text-anchor="middle" font-size="11" fill="#b5cea8">-2.1B ~ 2.1B</text>

  <rect x="30" y="192" width="400" height="32" fill="#0d1420" stroke="#3a4a6e" stroke-width="1"/>
  <text x="110" y="213" text-anchor="middle" font-size="12" fill="#7ec8e3" font-weight="600">BIGINT</text>
  <text x="250" y="213" text-anchor="middle" font-size="12" fill="#888">8 bytes</text>
  <text x="380" y="213" text-anchor="middle" font-size="11" fill="#b5cea8">&#177;9.2 x 10^18</text>

  <rect x="30" y="224" width="400" height="32" fill="#131928" stroke="#3a4a6e" stroke-width="1"/>
  <text x="110" y="245" text-anchor="middle" font-size="12" fill="#55c555" font-weight="600">SERIAL / IDENTITY</text>
  <text x="250" y="245" text-anchor="middle" font-size="12" fill="#888">4/8 bytes</text>
  <text x="380" y="245" text-anchor="middle" font-size="11" fill="#888">자동 증가 ID용</text>

  <!-- Exact numeric -->
  <rect x="450" y="68" width="400" height="28" fill="#192040" rx="4"/>
  <text x="650" y="86" text-anchor="middle" font-size="13" font-weight="700" fill="#7ec8e3">고정소수점 (Exact Numeric)</text>

  <rect x="450" y="98" width="400" height="100" fill="#0f1320" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <rect x="450" y="98" width="400" height="30" fill="#192040" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="570" y="118" text-anchor="middle" font-size="12" font-weight="600" fill="#9aa4b8">타입</text>
  <text x="720" y="118" text-anchor="middle" font-size="12" font-weight="600" fill="#9aa4b8">설명</text>
  <line x1="630" y1="98" x2="630" y2="198" stroke="#3a4a6e" stroke-width="1"/>

  <rect x="450" y="128" width="400" height="32" fill="#0d1420" stroke="#3a4a6e" stroke-width="1"/>
  <text x="540" y="149" text-anchor="middle" font-size="12" fill="#7ec8e3" font-weight="600">NUMERIC(p,s)</text>
  <text x="720" y="149" text-anchor="middle" font-size="11" fill="#888">p자리, 소수점 s자리 — 금액</text>

  <rect x="450" y="160" width="400" height="32" fill="#131928" stroke="#3a4a6e" stroke-width="1"/>
  <text x="540" y="181" text-anchor="middle" font-size="12" fill="#7ec8e3" font-weight="600">DECIMAL(p,s)</text>
  <text x="720" y="181" text-anchor="middle" font-size="11" fill="#888">NUMERIC와 동일 (SQL 표준)</text>

  <!-- Floating point -->
  <rect x="450" y="214" width="400" height="28" fill="#192040" rx="4"/>
  <text x="650" y="232" text-anchor="middle" font-size="13" font-weight="700" fill="#ce9178">부동소수점 (Approximate)</text>

  <rect x="450" y="244" width="400" height="100" fill="#0f1320" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <rect x="450" y="244" width="400" height="30" fill="#192040" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="570" y="264" text-anchor="middle" font-size="12" font-weight="600" fill="#9aa4b8">타입</text>
  <text x="720" y="264" text-anchor="middle" font-size="12" font-weight="600" fill="#9aa4b8">설명</text>
  <line x1="630" y1="244" x2="630" y2="344" stroke="#3a4a6e" stroke-width="1"/>

  <rect x="450" y="274" width="400" height="32" fill="#0d1420" stroke="#3a4a6e" stroke-width="1"/>
  <text x="540" y="295" text-anchor="middle" font-size="12" fill="#ce9178" font-weight="600">REAL / FLOAT4</text>
  <text x="720" y="295" text-anchor="middle" font-size="11" fill="#888">4 bytes (IEEE 754 단정밀도)</text>

  <rect x="450" y="306" width="400" height="32" fill="#131928" stroke="#3a4a6e" stroke-width="1"/>
  <text x="540" y="327" text-anchor="middle" font-size="12" fill="#ce9178" font-weight="600">DOUBLE PRECISION</text>
  <text x="720" y="327" text-anchor="middle" font-size="11" fill="#888">8 bytes (IEEE 754 배정밀도)</text>

  <!-- Warning -->
  <rect x="30" y="278" width="400" height="76" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5" rx="6"/>
  <text x="230" y="300" text-anchor="middle" font-size="13" font-weight="600" fill="#e05555">&#9888; 금액에 FLOAT 쓰면 안 되는 이유</text>
  <text x="230" y="320" text-anchor="middle" font-size="12" fill="#888">부동소수점은 이진수 표현 한계로 오차 발생</text>
  <text x="230" y="338" text-anchor="middle" font-size="11" fill="#9aa4b8">0.1 + 0.2 = 0.30000000000000004</text>
  <text x="230" y="354" text-anchor="middle" font-size="11" fill="#888">금액·수량은 반드시 NUMERIC(p,s) 사용</text>

  <!-- Bottom: code example -->
  <rect x="30" y="372" width="820" height="82" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="50" y="392" font-size="11" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo',monospace">-- 올바른 금액 컬럼 정의</text>
  <text x="50" y="412" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">price    NUMERIC(12, 2)  -- 최대 999999999999.99 (12자리, 소수 2자리)</text>
  <text x="50" y="432" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">quantity INTEGER         -- 정수형</text>
  <text x="50" y="452" font-size="13" fill="#7ec8e3" font-weight="600" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve">ratio    DOUBLE PRECISION -- 통계 계산용 부동소수점</text>
</svg>
