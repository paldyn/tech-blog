<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">숫자 데이터 타입 — 정수 · 고정소수점 · 부동소수점</text>

  <!-- ── Left: Exact types ── -->
  <rect x="60" y="68" width="350" height="390" rx="8" fill="#0d0d0d" stroke="#1a3a1a"/>
  <text x="235" y="96" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">정확한 타입 (Exact)</text>
  <line x1="60" y1="108" x2="410" y2="108" stroke="#1a2a1a"/>

  <!-- Integer family -->
  <text x="78" y="130" font-size="12" font-weight="600" fill="#7ec8e3">정수 (Integer)</text>

  <rect x="78" y="138" width="314" height="32" rx="4" fill="#0a1520" stroke="#1e3045"/>
  <text x="90" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">SMALLINT</text>
  <text x="188" y="158" font-size="11" fill="#888">  2바이트  ·  -32,768 ~ 32,767</text>

  <rect x="78" y="174" width="314" height="32" rx="4" fill="#0a1520" stroke="#1e3045"/>
  <text x="90" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">INTEGER</text>
  <text x="178" y="194" font-size="11" fill="#e8e8e8">  4바이트  ·  ±21억</text>
  <rect x="300" y="179" width="84" height="20" rx="3" fill="#142814"/>
  <text x="342" y="193" text-anchor="middle" font-size="10" fill="#55c555">가장 일반적</text>

  <rect x="78" y="210" width="314" height="32" rx="4" fill="#0a1520" stroke="#1e3045"/>
  <text x="90" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">BIGINT</text>
  <text x="162" y="230" font-size="11" fill="#888">  8바이트  ·  ±9.2×10¹⁸</text>

  <!-- Divider -->
  <line x1="78" y1="252" x2="378" y2="252" stroke="#1e2a1e" stroke-dasharray="4,4"/>

  <!-- Fixed-point family -->
  <text x="78" y="272" font-size="12" font-weight="600" fill="#7ec8e3">고정소수점 (Fixed-Point)</text>

  <rect x="78" y="280" width="314" height="32" rx="4" fill="#0a1520" stroke="#1e3045"/>
  <text x="90" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">DECIMAL(p, s)</text>
  <text x="228" y="300" font-size="11" fill="#888">  ≡ NUMERIC  ·  정밀 연산</text>

  <rect x="78" y="316" width="314" height="52" rx="4" fill="#060e06" stroke="#1a2a1a"/>
  <text x="90" y="334" font-size="11" fill="#888">p (precision) = 전체 유효 자릿수</text>
  <text x="90" y="350" font-size="11" fill="#888">s (scale)     = 소수점 이하 자릿수</text>
  <text x="90" y="362" font-size="11" fill="#e8c555">DECIMAL(10, 2)  →  최대 12345678.90</text>

  <!-- Code block -->
  <rect x="78" y="376" width="314" height="68" rx="4" fill="#070b14" stroke="#1e2433"/>
  <text x="90" y="394" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">-- 금액은 항상 DECIMAL/NUMERIC</text>
  <text x="90" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">price   </text>
  <text x="138" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc">DECIMAL</text>
  <text x="194" y="412" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">(12, 2)</text>
  <text x="90" y="430" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">tax_pct </text>
  <text x="146" y="430" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc">NUMERIC</text>
  <text x="202" y="430" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8e8e8">(5, 4)</text>

  <!-- ── Right: Approximate types ── -->
  <rect x="470" y="68" width="350" height="390" rx="8" fill="#0d0d0d" stroke="#3a1a1a"/>
  <text x="645" y="96" text-anchor="middle" font-size="14" font-weight="600" fill="#e05555">근사 타입 (Approximate)</text>
  <line x1="470" y1="108" x2="820" y2="108" stroke="#2a1a1a"/>

  <!-- Floating-point types -->
  <text x="488" y="130" font-size="12" font-weight="600" fill="#e05555">부동소수점 (Floating-Point)</text>

  <rect x="488" y="138" width="314" height="32" rx="4" fill="#1a0a0a" stroke="#3a1a1a"/>
  <text x="500" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">REAL</text>
  <text x="536" y="158" font-size="11" fill="#888">             4바이트  ·  유효 6~7자리</text>

  <rect x="488" y="174" width="314" height="32" rx="4" fill="#1a0a0a" stroke="#3a1a1a"/>
  <text x="500" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">DOUBLE PRECISION</text>
  <text x="654" y="194" font-size="11" fill="#888">  8바이트  ·  15자리</text>

  <rect x="488" y="210" width="314" height="32" rx="4" fill="#1a0a0a" stroke="#3a1a1a"/>
  <text x="500" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">FLOAT(n)</text>
  <text x="572" y="230" font-size="11" fill="#888">       n≤24→REAL  n≤53→DOUBLE</text>

  <!-- Warning block -->
  <rect x="488" y="254" width="314" height="62" rx="4" fill="#1a0606" stroke="#3a1010"/>
  <text x="500" y="273" font-size="12" font-weight="600" fill="#e05555">⚠ 부동소수점 오차 주의</text>
  <text x="500" y="291" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">0.1 + 0.2</text>
  <text x="568" y="291" font-size="11" fill="#e05555"> → 0.30000000000000004</text>
  <text x="500" y="309" font-size="11" fill="#888">금액·세금·환율에 절대 사용 금지</text>

  <!-- Divider -->
  <line x1="488" y1="327" x2="788" y2="327" stroke="#2a1a1a" stroke-dasharray="4,4"/>

  <!-- Usage guide -->
  <text x="488" y="347" font-size="12" font-weight="600" fill="#e8e8e8">사용 판단 기준</text>

  <text x="488" y="369" font-size="11" fill="#55c555">✓ 과학 계산 · 통계 · ML 특성값</text>
  <text x="488" y="387" font-size="11" fill="#55c555">✓ GPS 좌표 (DOUBLE PRECISION)</text>
  <text x="488" y="405" font-size="11" fill="#55c555">✓ 정밀도보다 범위·속도가 우선일 때</text>

  <text x="488" y="427" font-size="11" fill="#e05555">✗ 상품 가격  →  DECIMAL(10, 2)</text>
  <text x="488" y="445" font-size="11" fill="#e05555">✗ 환율·세율  →  DECIMAL(15, 6)</text>

  <!-- Footer -->
  <text x="440" y="492" text-anchor="middle" font-size="11" fill="#444">PALDYN · SQL 완전 정복 · Part I · Chapter 2</text>
</svg>
