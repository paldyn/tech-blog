<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">숫자 데이터 타입 비교</text>

  <!-- Integer types -->
  <text x="60" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">정수형</text>

  <rect x="60" y="90" width="760" height="32" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="140" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" font-weight="600" text-anchor="middle">타입</text>
  <text x="300" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" font-weight="600" text-anchor="middle">크기</text>
  <text x="480" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" font-weight="600" text-anchor="middle">범위</text>
  <text x="720" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" font-weight="600" text-anchor="middle">용도</text>

  <rect x="60" y="122" width="760" height="26" fill="#0f1a0f" stroke="#2a3a2a" stroke-width="1"/>
  <text x="140" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">TINYINT</text>
  <text x="300" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">1 byte</text>
  <text x="480" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">0~255 / -128~127</text>
  <text x="720" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">MySQL 전용 불리언 대안</text>

  <rect x="60" y="148" width="760" height="26" fill="#111827" stroke="#2a3a2a" stroke-width="1"/>
  <text x="140" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">SMALLINT</text>
  <text x="300" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">2 bytes</text>
  <text x="480" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">-32,768 ~ 32,767</text>
  <text x="720" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">코드, 레벨 등 소규모 정수</text>

  <rect x="60" y="174" width="760" height="26" fill="#0f1a0f" stroke="#2a3a2a" stroke-width="1"/>
  <text x="140" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" font-weight="600" text-anchor="middle">INT / INTEGER</text>
  <text x="300" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">4 bytes</text>
  <text x="480" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">약 -21억 ~ 21억</text>
  <text x="720" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">일반 ID, 카운터 (주의: 오버플로우)</text>

  <rect x="60" y="200" width="760" height="26" fill="#111827" stroke="#2a3a2a" stroke-width="1"/>
  <text x="140" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" font-weight="600" text-anchor="middle">BIGINT</text>
  <text x="300" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">8 bytes</text>
  <text x="480" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">약 -920경 ~ 920경</text>
  <text x="720" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">PK 기본 선택 (대규모 서비스)</text>

  <!-- Exact types -->
  <text x="60" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">정밀 소수형 (Exact Numeric)</text>

  <rect x="60" y="268" width="760" height="52" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="290" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">NUMERIC</tspan>
    <tspan fill="#ffffff">(10, 2)  </tspan>
    <tspan fill="#9aa4b8">-- 정밀도 10, 소수점 2자리: 12345678.99</tspan>
  </text>
  <text x="76" y="310" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">DECIMAL</tspan>
    <tspan fill="#ffffff">(10, 2)  </tspan>
    <tspan fill="#9aa4b8">-- NUMERIC과 동의어 (표준) — 금액에 필수</tspan>
  </text>

  <!-- Float warning -->
  <text x="60" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e05555">부동소수점 — 금액에 절대 사용 금지</text>

  <rect x="60" y="360" width="760" height="52" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="382" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">FLOAT</tspan>
    <tspan fill="#ffffff"> / </tspan>
    <tspan fill="#7ec8e3" font-weight="600">DOUBLE</tspan>
    <tspan fill="#ffffff">  </tspan>
    <tspan fill="#9aa4b8">-- IEEE 754 이진 부동소수 — 0.1 + 0.2 = 0.30000000000000004</tspan>
  </text>
  <text x="76" y="402" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">-- 과학 계산, 머신러닝 피처 저장에는 OK — 결제/회계에는 NUMERIC 사용</tspan>
  </text>
</svg>
