<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Grid Format Editor 구조</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">Formats → Format → Columns / Rows / Band 계층</text>

  <!-- Formats tree -->
  <rect x="60" y="90" width="240" height="370" fill="#111827" rx="8" stroke="#3a4a6e"/>
  <text x="180" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">Format Editor 트리</text>

  <text x="80" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e0a030">▼</text>
  <text x="98" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8"> Formats</text>

  <text x="98" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e0a030">  ▼</text>
  <text x="122" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3"> Format[default]</text>

  <text x="140" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">    ▶ Columns</text>
  <text x="156" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">      Column[0] size=80</text>
  <text x="156" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">      Column[1] size=120</text>
  <text x="156" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">      Column[2] size=100</text>

  <text x="140" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">    ▶ Rows</text>
  <text x="156" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">      Row[0] band=head</text>
  <text x="156" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">      Row[1] band=body</text>
  <text x="156" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">      Row[2] band=foot</text>

  <text x="140" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">    ▶ Band[head]</text>
  <text x="156" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">      Cell[0,0] "사번"</text>
  <text x="156" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">      Cell[0,1] "성명"</text>

  <text x="140" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">    ▶ Band[body]</text>
  <text x="156" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">      Cell[0,0] emp_id</text>
  <text x="156" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">      Cell[0,1] emp_nm</text>

  <!-- Right panel: Cell properties -->
  <rect x="320" y="90" width="520" height="370" fill="#111827" rx="8" stroke="#3a4a6e"/>
  <text x="580" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">Cell 주요 속성 (Format Editor 우측 패널)</text>

  <!-- Property rows -->
  <rect x="340" y="128" width="480" height="32" fill="#0f1929" rx="4"/>
  <text x="360" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">datacolumn</text>
  <text x="600" y="149" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">Dataset 컬럼명 매핑</text>

  <rect x="340" y="168" width="480" height="32" fill="#111827" rx="4"/>
  <text x="360" y="189" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">celltype</text>
  <text x="600" y="189" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">normal|edit|combo|button…</text>

  <rect x="340" y="208" width="480" height="32" fill="#0f1929" rx="4"/>
  <text x="360" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">colspan / rowspan</text>
  <text x="600" y="229" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">셀 병합 (열/행 수)</text>

  <rect x="340" y="248" width="480" height="32" fill="#111827" rx="4"/>
  <text x="360" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">edittype</text>
  <text x="600" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">normal|readonly|password</text>

  <rect x="340" y="288" width="480" height="32" fill="#0f1929" rx="4"/>
  <text x="360" y="309" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">format</text>
  <text x="600" y="309" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">표시 형식 (날짜·숫자)</text>

  <rect x="340" y="328" width="480" height="32" fill="#111827" rx="4"/>
  <text x="360" y="349" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">halign / valign</text>
  <text x="600" y="349" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">수평/수직 정렬</text>

  <rect x="340" y="368" width="480" height="32" fill="#0f1929" rx="4"/>
  <text x="360" y="389" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">style</text>
  <text x="600" y="389" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">인라인 스타일 문자열</text>

  <rect x="340" y="408" width="480" height="32" fill="#111827" rx="4"/>
  <text x="360" y="429" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">text</text>
  <text x="600" y="429" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">헤더·고정 텍스트</text>

  <!-- Bottom tip -->
  <rect x="60" y="480" width="760" height="0" fill="none"/>
</svg>
