<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400" style="background:#0a0a0a" rx="12">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="44" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">튜플 활용 패턴</text>

  <!-- Code box -->
  <rect x="44" y="68" width="792" height="258" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>

  <!-- Line 1 -->
  <text x="60" y="90" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 함수 반환값으로 튜플</text>
  <!-- Line 2 -->
  <text x="60" y="109" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> useState(init: </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff">): [</tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff">, (n: </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff">) =&gt; </tspan><tspan fill="#7ec8e3" font-weight="600">void</tspan><tspan fill="#ffffff">] {</tspan></text>
  <!-- Line 3 -->
  <text x="60" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">let</tspan><tspan fill="#ffffff"> val = init;</tspan></text>
  <!-- Line 4 -->
  <text x="60" y="147" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> [val, (n) =&gt; { val = n; }];</tspan></text>
  <!-- Line 5 -->
  <text x="60" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">}</text>
  <!-- blank line -->
  <!-- Line 7 -->
  <text x="60" y="193" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> [count, setCount] = useState(</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">);</tspan></text>
  <!-- blank line -->
  <!-- Line 9 -->
  <text x="60" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// rest 요소</text>
  <!-- Line 10 -->
  <text x="60" y="239" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">type</tspan><tspan fill="#ffffff"> StringsAndNumber = [...</tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff">[], </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff">];</tspan></text>
  <!-- Line 11 -->
  <text x="60" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> data: StringsAndNumber = [</tspan><tspan fill="#ce9178">'a'</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">'b'</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">42</tspan><tspan fill="#ffffff">];</tspan></text>

  <!-- Note box -->
  <rect x="44" y="344" width="792" height="42" fill="#0d1a2d" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="60" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" xml:space="preserve">튜플 vs 객체 — 짧고 순서 있는 데이터엔 튜플, 의미 있는 키 필요하면 객체</text>
</svg>
