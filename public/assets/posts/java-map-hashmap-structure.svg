<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="ahm" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="atree2" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">HashMap 내부 구조 — 버킷 배열 + 체이닝</text>

  <!-- put flow -->
  <text x="440" y="76" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">put("name", "Alice") → hashCode("name") &amp; (n-1) → 버킷 인덱스</text>

  <!-- Bucket array label -->
  <text x="130" y="110" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">table[] (버킷 배열)</text>

  <!-- Bucket 0: empty -->
  <rect x="60" y="120" width="140" height="44" rx="4" fill="#0d1420" stroke="#3a4a6e" stroke-width="1"/>
  <text x="90" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">[0]</text>
  <text x="130" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">null</text>

  <!-- Bucket 1: single entry -->
  <rect x="60" y="168" width="140" height="44" rx="4" fill="#0d1827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="90" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">[1]</text>
  <text x="130" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Entry</text>

  <!-- Bucket 2: empty -->
  <rect x="60" y="216" width="140" height="44" rx="4" fill="#0d1420" stroke="#3a4a6e" stroke-width="1"/>
  <text x="90" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">[2]</text>
  <text x="130" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">null</text>

  <!-- Bucket 3: chain (collision) -->
  <rect x="60" y="264" width="140" height="44" rx="4" fill="#1a0a0f" stroke="#ce9178" stroke-width="1.5"/>
  <text x="90" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">[3]</text>
  <text x="130" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">Entry →</text>

  <!-- Bucket 4: chain with name=Alice -->
  <rect x="60" y="312" width="140" height="44" rx="4" fill="#0f1827" stroke="#e8a020" stroke-width="2"/>
  <text x="90" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">[4]</text>
  <text x="130" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8a020">name=Alice</text>

  <!-- Bucket ... -->
  <rect x="60" y="360" width="140" height="44" rx="4" fill="#0d1420" stroke="#3a4a6e" stroke-width="1"/>
  <text x="90" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">[n-1]</text>
  <text x="130" y="388" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">...</text>

  <!-- Entry node 1 in bucket[1] -->
  <rect x="260" y="155" width="200" height="64" rx="6" fill="#0d1827" stroke="#55c555" stroke-width="1.5"/>
  <text x="360" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">hash | key | value | next</text>
  <text x="360" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">age → 30</text>
  <text x="360" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">next = null</text>

  <!-- Entry chain in bucket[3]: 2 nodes -->
  <rect x="260" y="252" width="190" height="64" rx="6" fill="#1a0a0f" stroke="#ce9178" stroke-width="1.5"/>
  <text x="355" y="271" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">hash | key | value | next</text>
  <text x="355" y="291" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178">city → Seoul</text>
  <text x="355" y="307" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ce9178">next →</text>

  <rect x="470" y="252" width="190" height="64" rx="6" fill="#1a0a0f" stroke="#ce9178" stroke-width="1.5"/>
  <text x="565" y="271" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">hash | key | value | next</text>
  <text x="565" y="291" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178">zip → 12345</text>
  <text x="565" y="307" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">next = null</text>

  <!-- name=Alice entry (bucket 4) -->
  <rect x="260" y="300" width="200" height="64" rx="6" fill="#0f1827" stroke="#e8a020" stroke-width="2"/>
  <text x="360" y="319" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">hash | key | value | next</text>
  <text x="360" y="339" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8a020">name → Alice</text>
  <text x="360" y="355" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">next = null</text>

  <!-- Arrows: bucket[1] -> Entry -->
  <line x1="200" y1="187" x2="256" y2="187" stroke="#55c555" stroke-width="2" marker-end="url(#ahm)"/>
  <!-- Arrows: bucket[3] -> chain1 -->
  <line x1="200" y1="284" x2="256" y2="284" stroke="#ce9178" stroke-width="2" marker-end="url(#atree2)"/>
  <!-- chain1 -> chain2 -->
  <line x1="454" y1="284" x2="466" y2="284" stroke="#ce9178" stroke-width="2" marker-end="url(#atree2)"/>
  <!-- bucket[4] -> entry -->
  <line x1="200" y1="332" x2="256" y2="332" stroke="#e8a020" stroke-width="2" marker-end="url(#ahm)"/>

  <!-- Java 8 tree conversion note -->
  <rect x="60" y="420" width="760" height="48" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="441" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Java 8: 버킷 체인 길이 8 이상 → Red-Black Tree로 전환 (TREEIFY_THRESHOLD)</text>
  <text x="440" y="459" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">최악 검색 O(n) → O(log n) 개선 | 원소 감소 시 링크드 리스트로 복귀 (UNTREEIFY_THRESHOLD=6)</text>
</svg>
