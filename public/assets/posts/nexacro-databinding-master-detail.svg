<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <linearGradient id="hdrMd" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a2a3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1a2a;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowB2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4488ff"/>
    </marker>
    <marker id="arrowO2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ff8844"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Header -->
  <rect x="0" y="0" width="880" height="64" rx="12" fill="url(#hdrMd)"/>
  <rect x="0" y="52" width="880" height="12" fill="url(#hdrMd)"/>
  <text x="44" y="38" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#e8e8e8">Nexacro N — Master-Detail 바인딩 패턴</text>
  <text x="44" y="54" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="12" fill="#555">Grid(마스터)에서 행 선택 → rowposition 변경 → Detail 컴포넌트 자동 갱신</text>

  <!-- ── Master Area ── -->
  <rect x="44" y="82" width="380" height="170" rx="10" fill="#0f0f0f" stroke="#2a4a6a" stroke-width="1.5"/>
  <text x="64" y="104" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#4488ff">마스터 영역</text>
  <text x="64" y="118" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#444">Grid (datasource="dsDept")</text>

  <!-- Master Grid Header -->
  <rect x="64" y="124" width="340" height="22" rx="3" fill="#0f1e30"/>
  <text x="144" y="139" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#4488ff" text-anchor="middle">deptCd</text>
  <line x1="194" y1="124" x2="194" y2="146" stroke="#1a3050" stroke-width="0.5"/>
  <text x="294" y="139" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#4488ff" text-anchor="middle">deptName</text>
  <line x1="374" y1="124" x2="374" y2="146" stroke="#1a3050" stroke-width="0.5"/>
  <text x="390" y="139" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#4488ff" text-anchor="middle">cnt</text>

  <!-- Master Row 0 — selected -->
  <rect x="64" y="146" width="340" height="22" fill="#0a1828"/>
  <rect x="64" y="146" width="4" height="22" fill="#4488ff"/>
  <text x="144" y="161" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#88bbff" text-anchor="middle">D001</text>
  <line x1="194" y1="146" x2="194" y2="168" stroke="#1a3050" stroke-width="0.5"/>
  <text x="294" y="161" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#88bbff" text-anchor="middle">개발팀 ◀ 선택</text>
  <line x1="374" y1="146" x2="374" y2="168" stroke="#1a3050" stroke-width="0.5"/>
  <text x="390" y="161" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#88bbff" text-anchor="middle">5</text>

  <!-- Master Row 1 -->
  <rect x="64" y="168" width="340" height="22" fill="#0c0c0c"/>
  <text x="144" y="183" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#555" text-anchor="middle">D002</text>
  <line x1="194" y1="168" x2="194" y2="190" stroke="#1a3050" stroke-width="0.5"/>
  <text x="294" y="183" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#555" text-anchor="middle">기획팀</text>
  <line x1="374" y1="168" x2="374" y2="190" stroke="#1a3050" stroke-width="0.5"/>
  <text x="390" y="183" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#555" text-anchor="middle">3</text>

  <!-- Master Row 2 -->
  <rect x="64" y="190" width="340" height="22" fill="#0c0c0c"/>
  <text x="144" y="205" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#555" text-anchor="middle">D003</text>
  <line x1="194" y1="190" x2="194" y2="212" stroke="#1a3050" stroke-width="0.5"/>
  <text x="294" y="205" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#555" text-anchor="middle">영업팀</text>
  <line x1="374" y1="190" x2="374" y2="212" stroke="#1a3050" stroke-width="0.5"/>
  <text x="390" y="205" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#555" text-anchor="middle">7</text>

  <!-- Master event note -->
  <text x="64" y="232" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#444">dsDept.onrowposchanged → fn_loadDetail("D001")</text>
  <text x="64" y="244" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#444">→ transaction 호출로 dsEmployee 재조회</text>

  <!-- ── Arrow middle ── -->
  <line x1="424" y1="168" x2="456" y2="200" stroke="#4488ff" stroke-width="2" marker-end="url(#arrowB2)"/>
  <text x="440" y="188" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#4488ff" text-anchor="middle">onrow</text>
  <text x="440" y="200" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#4488ff" text-anchor="middle">poschanged</text>

  <!-- ── Detail Area ── -->
  <rect x="456" y="82" width="380" height="170" rx="10" fill="#0f0f0f" stroke="#2a4a2a" stroke-width="1.5"/>
  <text x="476" y="104" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#44ff88">상세 영역</text>
  <text x="476" y="118" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#444">Grid (datasource="dsEmployee")</text>

  <!-- Detail Grid Header -->
  <rect x="476" y="124" width="340" height="22" rx="3" fill="#0f2018"/>
  <text x="556" y="139" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#44ff88" text-anchor="middle">empNo</text>
  <line x1="596" y1="124" x2="596" y2="146" stroke="#1a3028" stroke-width="0.5"/>
  <text x="676" y="139" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#44ff88" text-anchor="middle">empName</text>
  <line x1="756" y1="124" x2="756" y2="146" stroke="#1a3028" stroke-width="0.5"/>
  <text x="796" y="139" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#44ff88" text-anchor="middle">salary</text>

  <!-- Detail Rows — D001 employees -->
  <rect x="476" y="146" width="340" height="22" fill="#0a180a"/>
  <text x="556" y="161" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#88cc88" text-anchor="middle">EMP001</text>
  <line x1="596" y1="146" x2="596" y2="168" stroke="#1a3028" stroke-width="0.5"/>
  <text x="676" y="161" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#88cc88" text-anchor="middle">홍길동</text>
  <line x1="756" y1="146" x2="756" y2="168" stroke="#1a3028" stroke-width="0.5"/>
  <text x="796" y="161" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#88cc88" text-anchor="middle">4,500,000</text>

  <rect x="476" y="168" width="340" height="22" fill="#0c0c0c"/>
  <text x="556" y="183" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#666" text-anchor="middle">EMP002</text>
  <line x1="596" y1="168" x2="596" y2="190" stroke="#1a3028" stroke-width="0.5"/>
  <text x="676" y="183" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#666" text-anchor="middle">이순신</text>
  <line x1="756" y1="168" x2="756" y2="190" stroke="#1a3028" stroke-width="0.5"/>
  <text x="796" y="183" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#666" text-anchor="middle">5,200,000</text>

  <rect x="476" y="190" width="340" height="22" fill="#0c0c0c"/>
  <text x="556" y="205" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#666" text-anchor="middle">EMP003</text>
  <line x1="596" y1="190" x2="596" y2="212" stroke="#1a3028" stroke-width="0.5"/>
  <text x="676" y="205" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#666" text-anchor="middle">강감찬</text>
  <line x1="756" y1="190" x2="756" y2="212" stroke="#1a3028" stroke-width="0.5"/>
  <text x="796" y="205" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#666" text-anchor="middle">3,800,000</text>

  <!-- Detail note -->
  <text x="476" y="232" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#444">deptCd = "D001" 사원만 표시</text>
  <text x="476" y="244" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#444">dsEmployee.clearData() → transaction 재조회</text>

  <!-- ── Detail Form (bottom) ── -->
  <rect x="44" y="278" width="792" height="140" rx="10" fill="#0f0f0f" stroke="#3a2a3a" stroke-width="1.5"/>
  <text x="64" y="300" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#cc88ff">상세 입력 폼 (Edit 바인딩)</text>
  <text x="64" y="314" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#444">dsEmployee.rowposition가 바뀌면 아래 Edit들이 해당 행 값으로 자동 갱신</text>

  <!-- Form fields -->
  <!-- empNo -->
  <rect x="64" y="322" width="160" height="28" rx="4" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="74" y="334" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="8" fill="#444">사원번호 (empNo)</text>
  <text x="74" y="344" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#888">EMP001</text>

  <!-- empName -->
  <rect x="244" y="322" width="160" height="28" rx="4" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="254" y="334" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="8" fill="#444">사원명 (empName)</text>
  <text x="254" y="344" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#888">홍길동</text>

  <!-- deptCd -->
  <rect x="424" y="322" width="160" height="28" rx="4" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="434" y="334" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="8" fill="#444">부서코드 (deptCd)</text>
  <text x="434" y="344" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#888">D001</text>

  <!-- salary -->
  <rect x="604" y="322" width="160" height="28" rx="4" fill="#111" stroke="#2a2a2a" stroke-width="1"/>
  <text x="614" y="334" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="8" fill="#444">급여 (salary)</text>
  <text x="614" y="344" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#888">4,500,000</text>

  <!-- Binding labels -->
  <text x="64" y="372" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#555">datasource="dsEmployee" datacolumn="empNo"</text>
  <text x="244" y="372" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#555">datasource="dsEmployee" datacolumn="empName"</text>
  <text x="424" y="372" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#555">datasource="dsEmployee" datacolumn="deptCd"</text>
  <text x="604" y="372" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="9" fill="#555">datasource="dsEmployee" datacolumn="salary"</text>

  <!-- Arrow from detail grid to form -->
  <line x1="440" y1="252" x2="440" y2="277" stroke="#cc88ff" stroke-width="1.5" marker-end="url(#arrowO2)" stroke-dasharray="4,3"/>
  <text x="440" y="268" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="8" fill="#cc88ff" text-anchor="middle">행 클릭 → rowposition</text>

  <!-- Footer -->
  <text x="836" y="450" font-family="Wanted Sans Variable, -apple-system, sans-serif" font-size="10" fill="#333" text-anchor="end">PALDYN · Nexacro N 시리즈</text>
</svg>
