<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Performance Schema 계층 구조</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">수집 계층 (Instruments) → 저장 계층 (Consumers)</text>

  <defs>
    <marker id="arr-ps-ov" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Instruments Layer -->
  <rect x="60" y="90" width="740" height="130" rx="8" fill="#0f1a2e" stroke="#3a6aae" stroke-width="2"/>
  <text x="430" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">Instruments (측정 대상 등록)</text>

  <rect x="76" y="124" width="130" height="40" rx="4" fill="#1a2a3e" stroke="#3a6aae" stroke-width="1"/>
  <text x="141" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">statement/*</text>

  <rect x="216" y="124" width="130" height="40" rx="4" fill="#1a2a3e" stroke="#3a6aae" stroke-width="1"/>
  <text x="281" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">wait/io/file/*</text>

  <rect x="356" y="124" width="130" height="40" rx="4" fill="#1a2a3e" stroke="#3a6aae" stroke-width="1"/>
  <text x="421" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">wait/lock/table/*</text>

  <rect x="496" y="124" width="130" height="40" rx="4" fill="#1a2a3e" stroke="#3a6aae" stroke-width="1"/>
  <text x="561" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">memory/*</text>

  <rect x="636" y="124" width="148" height="40" rx="4" fill="#1a2a3e" stroke="#3a6aae" stroke-width="1"/>
  <text x="710" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">transaction/*</text>

  <text x="430" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">setup_instruments 테이블에서 활성화/비활성화. ENABLED=YES로 개별 제어</text>

  <!-- Arrow down -->
  <line x1="430" y1="222" x2="430" y2="248" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-ps-ov)"/>
  <text x="450" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">이벤트 발생</text>

  <!-- Consumers Layer -->
  <rect x="60" y="250" width="740" height="130" rx="8" fill="#0a1a10" stroke="#55c555" stroke-width="2"/>
  <text x="430" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">Consumers (수집 데이터 저장 테이블)</text>

  <rect x="76" y="284" width="148" height="40" rx="4" fill="#0a2a10" stroke="#55c555" stroke-width="1"/>
  <text x="150" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">events_statements_*</text>

  <rect x="234" y="284" width="148" height="40" rx="4" fill="#0a2a10" stroke="#55c555" stroke-width="1"/>
  <text x="308" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">events_waits_*</text>

  <rect x="392" y="284" width="148" height="40" rx="4" fill="#0a2a10" stroke="#55c555" stroke-width="1"/>
  <text x="466" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">events_transactions_*</text>

  <rect x="550" y="284" width="110" height="40" rx="4" fill="#0a2a10" stroke="#55c555" stroke-width="1"/>
  <text x="605" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">memory_summary_*</text>

  <rect x="670" y="284" width="114" height="40" rx="4" fill="#0a2a10" stroke="#55c555" stroke-width="1"/>
  <text x="727" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">table_io_waits_*</text>

  <text x="430" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">_history: 최근 N건 | _history_long: 전체 이력 | _summary_*: 집계 | _current: 현재 실행 중</text>

  <!-- sys schema -->
  <rect x="60" y="400" width="740" height="56" rx="8" fill="#1a150a" stroke="#e09055" stroke-width="1.5"/>
  <text x="430" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e09055" text-anchor="middle">sys 스키마 — Performance Schema 위의 사람이 읽기 좋은 뷰 모음</text>
  <text x="430" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">sys.statements_with_full_table_scans / sys.host_summary / sys.schema_table_statistics / 등 100+ 뷰</text>
</svg>
