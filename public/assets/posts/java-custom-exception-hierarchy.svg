<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8e8e8"/>
    </marker>
    <marker id="arrG" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">커스텀 예외 클래스 계층 설계</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">도메인 루트 예외 → 구체적 예외 계층 구조</text>

  <!-- Exception root -->
  <rect x="340" y="90" width="200" height="44" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="117" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">RuntimeException</text>

  <line x1="440" y1="134" x2="440" y2="164" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Domain Root -->
  <rect x="300" y="166" width="280" height="50" rx="8" fill="#102020" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="187" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">AppException (도메인 루트)</text>
  <text x="440" y="207" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">errorCode, message, cause 포함</text>

  <line x1="360" y1="216" x2="230" y2="256" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="440" y1="216" x2="440" y2="256" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="520" y1="216" x2="650" y2="256" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Sub exceptions -->
  <rect x="100" y="258" width="260" height="44" rx="8" fill="#101828" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="279" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">ValidationException</text>
  <text x="230" y="295" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">field, rejectedValue</text>

  <rect x="320" y="258" width="240" height="44" rx="8" fill="#101828" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="279" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">BusinessException</text>
  <text x="440" y="295" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">비즈니스 규칙 위반</text>

  <rect x="530" y="258" width="240" height="44" rx="8" fill="#101828" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="650" y="279" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">InfraException</text>
  <text x="650" y="295" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">외부 시스템 연동 오류</text>

  <line x1="230" y1="302" x2="125" y2="342" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="230" y1="302" x2="280" y2="342" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="440" y1="302" x2="455" y2="342" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="650" y1="302" x2="625" y2="342" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="650" y1="302" x2="765" y2="342" stroke="#e8e8e8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Leaf exceptions -->
  <rect x="40" y="344" width="146" height="44" rx="8" fill="#0e1618" stroke="#7ec8e3" stroke-width="1"/>
  <text x="113" y="365" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">InvalidEmailException</text>
  <text x="113" y="381" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">이메일 형식 오류</text>

  <rect x="204" y="344" width="150" height="44" rx="8" fill="#0e1618" stroke="#7ec8e3" stroke-width="1"/>
  <text x="279" y="365" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">RequiredFieldException</text>
  <text x="279" y="381" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">필수 필드 누락</text>

  <rect x="371" y="344" width="172" height="44" rx="8" fill="#0e1618" stroke="#ce9178" stroke-width="1"/>
  <text x="457" y="365" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">InsufficientStockException</text>
  <text x="457" y="381" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">재고 부족</text>

  <rect x="561" y="344" width="140" height="44" rx="8" fill="#0e1618" stroke="#ce9178" stroke-width="1"/>
  <text x="631" y="365" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">ExternalApiException</text>
  <text x="631" y="381" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">외부 API 오류</text>

  <rect x="718" y="344" width="122" height="44" rx="8" fill="#0e1618" stroke="#ce9178" stroke-width="1"/>
  <text x="779" y="365" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">DatabaseException</text>
  <text x="779" y="381" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">DB 연결/쿼리 오류</text>

  <!-- Benefits note -->
  <rect x="60" y="410" width="760" height="70" rx="8" fill="#101020" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">루트 예외 계층의 이점</text>
  <text x="440" y="452" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">catch (AppException e) 로 모든 도메인 예외 통합 처리 가능</text>
  <text x="440" y="470" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">ErrorCode enum으로 HTTP 상태 코드·메시지 일관성 확보</text>
</svg>
