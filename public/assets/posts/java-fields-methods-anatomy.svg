<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr-up" viewBox="0 0 14 14" refX="7" refY="12"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 14 L 7 0 L 14 14 z" fill="#888"/>
    </marker>
    <marker id="arr-down" viewBox="0 0 14 14" refX="7" refY="2"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 7 14 L 14 0 z" fill="#888"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="36" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">메서드 구조 분해</text>

  <!-- Code block -->
  <rect x="60" y="52" width="760" height="112" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <!-- Line 1: method signature with syntax coloring -->
  <text y="82" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="76" fill="#7ec8e3" font-weight="600">public</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#55c555" font-weight="600">int</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#e0a055" font-weight="600">add</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff"> a, </tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff"> b) {</tspan></text>

  <!-- Line 2: body -->
  <text y="102" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="76" fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> a + b;</tspan><tspan fill="#9aa4b8">  // 결과값 반환</tspan></text>

  <!-- Line 3: closing brace -->
  <text y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan x="76" fill="#ffffff">}</tspan></text>

  <!-- ===== Annotation boxes ===== -->

  <!-- Box 1: 접근 제어자 (public) — color #7ec8e3 -->
  <rect x="60" y="190" width="152" height="62" rx="6" fill="#0f1e30" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="136" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">① 접근 제어자</text>
  <text x="136" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">public / private / protected</text>

  <!-- Box 2: 반환 타입 (int) — color #55c555 -->
  <rect x="224" y="190" width="152" height="62" rx="6" fill="#071a0e" stroke="#55c555" stroke-width="1.5"/>
  <text x="300" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">② 반환 타입</text>
  <text x="300" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">반환값 없으면 void</text>

  <!-- Box 3: 메서드 이름 (add) — color #e0a055 -->
  <rect x="388" y="190" width="152" height="62" rx="6" fill="#1e1408" stroke="#e0a055" stroke-width="1.5"/>
  <text x="464" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a055" text-anchor="middle">③ 메서드 이름</text>
  <text x="464" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">소문자 camelCase 관례</text>

  <!-- Box 4: 매개변수 목록 — color #7777cc -->
  <rect x="552" y="190" width="268" height="62" rx="6" fill="#0d0818" stroke="#7777cc" stroke-width="1.5"/>
  <text x="686" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">④ 매개변수 목록</text>
  <text x="686" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">없으면 빈 괄호 () — 생략 불가</text>

  <!-- Vertical connector lines (from code to annotation boxes) -->
  <!-- Line to box 1 (public at ~x=99, y=82 → box1 top y=190) -->
  <line x1="99" y1="88" x2="99" y2="188" stroke="#7ec8e3" stroke-width="1.5"
        stroke-dasharray="4,4" marker-end="url(#arr-down)"/>

  <!-- Line to box 2 (int return at ~x=152, y=82 → box2 top) -->
  <line x1="152" y1="88" x2="300" y2="188" stroke="#55c555" stroke-width="1.5"
        stroke-dasharray="4,4" marker-end="url(#arr-down)"/>

  <!-- Line to box 3 (add at ~x=184, y=82 → box3 top) -->
  <line x1="184" y1="88" x2="464" y2="188" stroke="#e0a055" stroke-width="1.5"
        stroke-dasharray="4,4" marker-end="url(#arr-down)"/>

  <!-- Line to box 4 ((int a, int b) at ~x=240, y=82 → box4 top) -->
  <line x1="240" y1="88" x2="686" y2="188" stroke="#7777cc" stroke-width="1.5"
        stroke-dasharray="4,4" marker-end="url(#arr-down)"/>

  <!-- Bottom explanation: return statement -->
  <rect x="60" y="276" width="760" height="52" rx="6" fill="#0a1020" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="297" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">⑤ 메서드 본문 — { } 사이의 실행 로직</text>
  <text x="440" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">반환 타입이 void가 아니면 반드시 return 문 필요</text>
</svg>
