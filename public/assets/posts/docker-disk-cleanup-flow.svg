<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="adc" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Docker 디스크 공간 구성</text>

  <!-- /var/lib/docker -->
  <rect x="60" y="68" width="760" height="56" rx="8" fill="#1a2035" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">/var/lib/docker/</text>
  <text x="440" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Docker 루트 디렉터리 — docker info | grep "Docker Root Dir"</text>

  <!-- Sub dirs -->
  <rect x="60" y="148" width="150" height="68" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="135" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">overlay2/</text>
  <text x="135" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">이미지·컨테이너 레이어</text>
  <text x="135" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">보통 가장 큰 영역</text>

  <rect x="232" y="148" width="140" height="68" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="302" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">volumes/</text>
  <text x="302" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">Named volumes</text>
  <text x="302" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">DB 데이터 주의</text>

  <rect x="394" y="148" width="140" height="68" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="464" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">containers/</text>
  <text x="464" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">컨테이너 메타+로그</text>
  <text x="464" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">로그 파일 누적</text>

  <rect x="556" y="148" width="140" height="68" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="626" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">buildkit/</text>
  <text x="626" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">빌드 캐시</text>
  <text x="626" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">자주 쌓임</text>

  <rect x="718" y="148" width="102" height="68" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="769" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">image/</text>
  <text x="769" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">이미지 메타</text>
  <text x="769" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">manifest 등</text>

  <!-- Step by step cleanup -->
  <rect x="60" y="240" width="760" height="160" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">단계별 정리 전략 (안전 → 공격적)</text>

  <rect x="76" y="276" width="728" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">docker</tspan> system df                          <tspan fill="#9aa4b8"># 1. 현황 파악</tspan></text>
  <text x="92" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">docker</tspan> container prune -f                  <tspan fill="#9aa4b8"># 2. 중지된 컨테이너</tspan></text>
  <text x="92" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">docker</tspan> image prune -f                       <tspan fill="#9aa4b8"># 3. 댕글링 이미지</tspan></text>
  <text x="92" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">docker</tspan> builder prune --keep-storage=<tspan fill="#b5cea8">2g</tspan> -f  <tspan fill="#9aa4b8"># 4. 빌드 캐시</tspan></text>
  <text x="92" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">docker</tspan> system prune -af                     <tspan fill="#9aa4b8"># 5. 전체 (미사용 이미지까지)</tspan></text>
</svg>
