<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">언어 리소스 파일 구조</text>

  <!-- ko.xml -->
  <rect x="60" y="70" width="230" height="200" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="175" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">ko.xml (한국어)</text>
  <text x="76" y="118" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">&lt;resource</tspan>
    <tspan fill="#ffffff"> lang=</tspan>
    <tspan fill="#ce9178">"ko"</tspan>
    <tspan fill="#7ec8e3" font-weight="600">&gt;</tspan>
  </text>
  <text x="76" y="138" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">  </tspan>
    <tspan fill="#7ec8e3" font-weight="600">&lt;text</tspan>
    <tspan fill="#ffffff"> id=</tspan>
    <tspan fill="#ce9178">"SAVE"</tspan>
    <tspan fill="#7ec8e3" font-weight="600">&gt;</tspan>
  </text>
  <text x="76" y="156" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">    저장</tspan>
  </text>
  <text x="76" y="174" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">  &lt;/text&gt;</tspan>
  </text>
  <text x="76" y="192" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">  &lt;text</tspan>
    <tspan fill="#ffffff"> id=</tspan>
    <tspan fill="#ce9178">"SEARCH"</tspan>
    <tspan fill="#7ec8e3" font-weight="600">&gt;</tspan>
  </text>
  <text x="76" y="210" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">    조회</tspan>
  </text>
  <text x="76" y="228" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">  &lt;/text&gt;</tspan>
  </text>
  <text x="76" y="248" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">&lt;/resource&gt;</tspan>
  </text>

  <!-- en.xml -->
  <rect x="325" y="70" width="230" height="200" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">en.xml (영어)</text>
  <text x="341" y="118" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">&lt;resource</tspan>
    <tspan fill="#ffffff"> lang=</tspan>
    <tspan fill="#ce9178">"en"</tspan>
    <tspan fill="#7ec8e3" font-weight="600">&gt;</tspan>
  </text>
  <text x="341" y="138" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">  </tspan>
    <tspan fill="#7ec8e3" font-weight="600">&lt;text</tspan>
    <tspan fill="#ffffff"> id=</tspan>
    <tspan fill="#ce9178">"SAVE"</tspan>
    <tspan fill="#7ec8e3" font-weight="600">&gt;</tspan>
  </text>
  <text x="341" y="156" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">    Save</tspan>
  </text>
  <text x="341" y="174" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">  &lt;/text&gt;</tspan>
  </text>
  <text x="341" y="192" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">  &lt;text</tspan>
    <tspan fill="#ffffff"> id=</tspan>
    <tspan fill="#ce9178">"SEARCH"</tspan>
    <tspan fill="#7ec8e3" font-weight="600">&gt;</tspan>
  </text>
  <text x="341" y="210" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">    Search</tspan>
  </text>
  <text x="341" y="228" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">  &lt;/text&gt;</tspan>
  </text>
  <text x="341" y="248" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">&lt;/resource&gt;</tspan>
  </text>

  <!-- Usage box -->
  <rect x="590" y="70" width="250" height="200" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="715" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#b5cea8" text-anchor="middle">컴포넌트 참조</text>
  <text x="606" y="118" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#9aa4b8">&lt;!-- XFDL 컴포넌트 --&gt;</tspan>
  </text>
  <text x="606" y="136" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">&lt;Button</tspan>
  </text>
  <text x="606" y="154" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">  id=</tspan>
    <tspan fill="#ce9178">"btn_save"</tspan>
  </text>
  <text x="606" y="172" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">  text=</tspan>
    <tspan fill="#ce9178">"$SAVE"</tspan>
  </text>
  <text x="606" y="190" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">/&gt;</tspan>
  </text>
  <text x="606" y="212" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#9aa4b8">// 스크립트에서</tspan>
  </text>
  <text x="606" y="230" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">var</tspan>
    <tspan fill="#ffffff"> t = gfn_getText(</tspan>
  </text>
  <text x="606" y="248" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">  </tspan>
    <tspan fill="#ce9178">"SAVE"</tspan>
    <tspan fill="#ffffff">);</tspan>
  </text>

  <!-- Explanation row -->
  <rect x="60" y="296" width="760" height="100" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">다국어 처리 방식 비교</text>

  <!-- Col headers -->
  <text x="160" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">XML 리소스 방식</text>
  <text x="440" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">DB 방식</text>
  <text x="700" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#b5cea8" text-anchor="middle">하이브리드 방식</text>

  <line x1="310" y1="330" x2="310" y2="390" stroke="#333" stroke-width="1"/>
  <line x1="570" y1="330" x2="570" y2="390" stroke="#333" stroke-width="1"/>

  <text x="160" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">빌드 시 번들, 빠름</text>
  <text x="440" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">런타임 조회, 유연</text>
  <text x="700" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">공통 XML + 동적 DB</text>

  <text x="160" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">수정 시 재배포 필요</text>
  <text x="440" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">변경 즉시 반영 가능</text>
  <text x="700" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">대부분 프로젝트 선택</text>
</svg>
