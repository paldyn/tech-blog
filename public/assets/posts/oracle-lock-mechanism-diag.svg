<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">잠금 경합 세션 진단 쿼리</text>

  <!-- Code block -->
  <rect x="60" y="66" width="760" height="270" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="90" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">-- 잠금 보유자(Holder) ↔ 대기자(Waiter) 매핑</text>
  <text x="76" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">SELECT</text>
  <text x="76" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    h.sid           AS holder_sid,</text>
  <text x="76" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    hs.username     AS holder_user,</text>
  <text x="76" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    hs.sql_id       AS holder_sql,</text>
  <text x="76" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    w.sid           AS waiter_sid,</text>
  <text x="76" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    ws.username     AS waiter_user,</text>
  <text x="76" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    ws.event        AS wait_event,</text>
  <text x="76" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    ws.seconds_in_wait</text>
  <text x="76" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">FROM</text>
  <text x="76" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    v$lock h</text>
  <text x="76" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">JOIN</text>
  <text x="76" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">    v$lock w  ON h.id1 = w.id1</text>
  <text x="76" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">JOIN v$session hs ON h.sid = hs.sid</text>
  <text x="76" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" xml:space="preserve">JOIN v$session ws ON w.sid = ws.sid</text>
</svg>
