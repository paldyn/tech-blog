<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">클라우드 IAM 잘못된 설정 위협 맵</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">AWS / GCP / Azure IAM 잘못된 설정 공격 경로</text>

  <!-- Center: Cloud Resources -->
  <rect x="330" y="180" width="220" height="70" rx="10" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">클라우드 리소스</text>
  <text x="440" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">S3 · EC2 · RDS · Secrets · Lambda</text>
  <text x="440" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">Cloud Resources</text>

  <!-- Left: Attacker paths -->
  <rect x="40" y="100" width="220" height="66" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="150" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">과도한 권한 IAM 역할</text>
  <text x="150" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">AdministratorAccess 남발</text>
  <text x="150" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#666" text-anchor="middle">Overprivileged Role</text>

  <rect x="40" y="200" width="220" height="66" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="150" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">공개 노출 액세스 키</text>
  <text x="150" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">GitHub 코드에 하드코딩</text>
  <text x="150" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#666" text-anchor="middle">Exposed Access Key</text>

  <rect x="40" y="300" width="220" height="66" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="150" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">MFA 미설정 루트 계정</text>
  <text x="150" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">루트 계정 일상 사용</text>
  <text x="150" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#666" text-anchor="middle">Root Account Misuse</text>

  <!-- Arrows to center -->
  <line x1="260" y1="133" x2="328" y2="200" stroke="#e05555" stroke-width="1.5"
        stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <line x1="260" y1="233" x2="328" y2="215" stroke="#e05555" stroke-width="1.5"
        stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <line x1="260" y1="333" x2="328" y2="230" stroke="#e05555" stroke-width="1.5"
        stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <!-- Right: Defenses -->
  <rect x="620" y="100" width="220" height="66" rx="8" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="730" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">최소 권한 정책</text>
  <text x="730" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">조건부 + 리소스 범위 제한</text>
  <text x="730" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#666" text-anchor="middle">Least Privilege Policy</text>

  <rect x="620" y="200" width="220" height="66" rx="8" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="730" y="225" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">IAM Access Analyzer</text>
  <text x="730" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">미사용 권한 자동 탐지</text>
  <text x="730" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#666" text-anchor="middle">Unused Permission Detection</text>

  <rect x="620" y="300" width="220" height="66" rx="8" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="730" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">MFA 강제 + SCPs</text>
  <text x="730" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#aaa" text-anchor="middle">조직 레벨 정책 제어</text>
  <text x="730" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#666" text-anchor="middle">Service Control Policies</text>

  <!-- Arrows from center to defense -->
  <line x1="550" y1="200" x2="618" y2="133" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="550" y1="215" x2="618" y2="233" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="550" y1="230" x2="618" y2="333" stroke="#55c555" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Bottom note -->
  <rect x="40" y="410" width="800" height="44" rx="8" fill="#0f0f0f" stroke="#333" stroke-width="1"/>
  <text x="440" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">AWS 침해 사고의 74%는 IAM 잘못된 설정이 원인 (Palo Alto Unit42, 2023)</text>
  <text x="440" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">Identity is the new perimeter — IAM 오설정 = 방화벽 우회</text>
</svg>
