<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrd" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">SQL Server 복제 유형 비교</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">Snapshot · Transactional · Merge · P2P</text>

  <!-- Snapshot -->
  <rect x="60" y="88" width="368" height="140" rx="8" fill="#0d1e2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="244" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Snapshot 복제</text>
  <text x="244" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">주기적으로 전체 데이터 스냅샷 전송</text>
  <text x="244" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">구성 단순 / 데이터 변경 빈도 낮을 때</text>
  <text x="244" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Subscriber 최신화 지연 = 스냅샷 주기</text>
  <text x="244" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">가격표·코드 테이블 배포에 적합</text>
  <text x="244" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">대용량 테이블은 전송 부담 큼</text>

  <!-- Transactional -->
  <rect x="452" y="88" width="368" height="140" rx="8" fill="#0a1a0e" stroke="#55c555" stroke-width="1.5"/>
  <text x="636" y="112" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">Transactional 복제</text>
  <text x="636" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">로그 리더가 변경만 추출 → Subscriber 적용</text>
  <text x="636" y="154" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">낮은 지연 (수 초 이내) 데이터 배포</text>
  <text x="636" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Publisher → Distributor → Subscriber 단방향</text>
  <text x="636" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">OLTP → 보고서 DB 배포에 가장 많이 사용</text>
  <text x="636" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Publisher에 Primary Key 필수</text>

  <!-- Merge -->
  <rect x="60" y="248" width="368" height="140" rx="8" fill="#101030" stroke="#7777cc" stroke-width="1.5"/>
  <text x="244" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">Merge 복제</text>
  <text x="244" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">Publisher ↔ Subscriber 양방향 변경 병합</text>
  <text x="244" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">오프라인 클라이언트(모바일) 동기화</text>
  <text x="244" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">충돌 감지·해결 정책 필요 (복잡도 ↑)</text>
  <text x="244" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">rowguid 컬럼 + 트리거 오버헤드</text>
  <text x="244" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">SQL Server 2019 이후 사용 감소 (AG 대체)</text>

  <!-- P2P -->
  <rect x="452" y="248" width="368" height="140" rx="8" fill="#1a1000" stroke="#ce9178" stroke-width="1.5"/>
  <text x="636" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178">Peer-to-Peer (P2P)</text>
  <text x="636" y="294" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">모든 노드가 Publisher이자 Subscriber</text>
  <text x="636" y="314" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">읽기/쓰기 분산 (다중 Active)</text>
  <text x="636" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Transactional 기반 / Enterprise 에디션만</text>
  <text x="636" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">충돌 시 수렴 보장 어려움 → 애플리케이션 충돌 방지 필요</text>
  <text x="636" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">지역별 읽기/쓰기 OLTP 서비스</text>

  <text x="440" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">현대 워크로드에서는 Always On AG + 읽기 전용 라우팅이 Transactional 복제를 대부분 대체</text>
  <text x="440" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">복제는 AG로 불가능한 이기종 타겟(Oracle, Azure SQL)·필터링 배포에 여전히 유효</text>
</svg>
