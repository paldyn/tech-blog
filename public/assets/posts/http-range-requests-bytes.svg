<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="60" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">바이트 범위 표기 — bytes= 세 가지 형태</text>

  <!-- offset labels above first bar -->
  <text x="80" y="92" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888">0</text>
  <text x="780" y="92" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888" text-anchor="end">73400319 (끝)</text>

  <!-- full file reference bar -->
  <rect x="80" y="100" width="720" height="34" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="440" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9aa4b8" text-anchor="middle">전체 파일 (73400320 바이트)</text>

  <!-- Range 1: bytes=0-1023 -->
  <text x="80" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Range:</tspan><tspan fill="#ffffff"> bytes=</tspan><tspan fill="#b5cea8">0-1023</tspan></text>
  <rect x="80" y="186" width="720" height="30" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <rect x="80" y="186" width="120" height="30" fill="#1d3a4a" stroke="#7ec8e3" stroke-width="1.5" rx="6"/>
  <text x="206" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">처음 1024바이트 (앞에서부터)</text>

  <!-- Range 2: bytes=1024- -->
  <text x="80" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Range:</tspan><tspan fill="#ffffff"> bytes=</tspan><tspan fill="#b5cea8">1024-</tspan></text>
  <rect x="80" y="268" width="720" height="30" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <rect x="200" y="268" width="600" height="30" fill="#163a22" stroke="#55c555" stroke-width="1.5" rx="6"/>
  <text x="490" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">1024부터 파일 끝까지 — 이어받기에 사용</text>

  <!-- Range 3: bytes=-500 -->
  <text x="80" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Range:</tspan><tspan fill="#ffffff"> bytes=</tspan><tspan fill="#b5cea8">-500</tspan></text>
  <rect x="80" y="350" width="720" height="30" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <rect x="700" y="350" width="100" height="30" fill="#3a2a16" stroke="#e0a855" stroke-width="1.5" rx="6"/>
  <text x="690" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="end">끝에서 마지막 500바이트 (꼬리 읽기)</text>

  <text x="80" y="416" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9aa4b8">오프셋은 0부터, 끝 오프셋은 포함(inclusive). 음수 표기는 끝에서부터 셈.</text>
</svg>
