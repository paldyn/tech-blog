<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">훈련·검증·테스트 세트 분리</text>
  <text x="440" y="66" text-anchor="middle" fill="#888" font-size="13">데이터를 세 파트로 나눠 올바른 모델 평가를 수행한다</text>

  <!-- Split bar background -->
  <rect x="60" y="98" width="760" height="56" rx="6" fill="#1a1a1a"/>

  <!-- Train: 70% = 532px of 760px -->
  <rect x="62" y="100" width="528" height="52" rx="4" fill="#1a3a5c"/>
  <text x="326" y="131" text-anchor="middle" fill="#7ec8e3" font-size="14" font-weight="600">훈련 세트 (Train) — 70%</text>

  <!-- Val: 15% = 114px -->
  <rect x="592" y="100" width="112" height="52" rx="4" fill="#3a2905"/>
  <text x="648" y="131" text-anchor="middle" fill="#e0a020" font-size="13" font-weight="600">검증 — 15%</text>

  <!-- Test: 15% = 114px -->
  <rect x="706" y="100" width="112" height="52" rx="4" fill="#0a2a15"/>
  <text x="762" y="131" text-anchor="middle" fill="#55c555" font-size="13" font-weight="600">테스트 — 15%</text>

  <!-- Use-case boxes -->
  <!-- Train box: x=60, width=243 -->
  <rect x="60" y="180" width="243" height="168" rx="8" fill="#111827" stroke="#1a3a5c" stroke-width="1.5"/>
  <text x="181" y="204" text-anchor="middle" fill="#7ec8e3" font-size="14" font-weight="600">훈련 세트</text>
  <text x="181" y="226" text-anchor="middle" fill="#ccc" font-size="12">모델 파라미터 학습</text>
  <text x="181" y="246" text-anchor="middle" fill="#ccc" font-size="12">가중치 · 계수 최적화</text>
  <text x="181" y="266" text-anchor="middle" fill="#ccc" font-size="12">전처리 통계량 fit</text>
  <text x="181" y="286" text-anchor="middle" fill="#888" font-size="11">스케일러 fit은 여기서만</text>
  <text x="181" y="328" text-anchor="middle" fill="#555" font-size="11">권장 비율: 60 ~ 80 %</text>

  <!-- Val box: x=318, width=243 -->
  <rect x="318" y="180" width="243" height="168" rx="8" fill="#111827" stroke="#3a2905" stroke-width="1.5"/>
  <text x="439" y="204" text-anchor="middle" fill="#e0a020" font-size="14" font-weight="600">검증 세트</text>
  <text x="439" y="226" text-anchor="middle" fill="#ccc" font-size="12">하이퍼파라미터 튜닝</text>
  <text x="439" y="246" text-anchor="middle" fill="#ccc" font-size="12">모델 선택 · 비교</text>
  <text x="439" y="266" text-anchor="middle" fill="#ccc" font-size="12">조기 종료 판단</text>
  <text x="439" y="286" text-anchor="middle" fill="#888" font-size="11">반복 참조 허용</text>
  <text x="439" y="328" text-anchor="middle" fill="#555" font-size="11">권장 비율: 10 ~ 20 %</text>

  <!-- Test box: x=576, width=244 -->
  <rect x="576" y="180" width="244" height="168" rx="8" fill="#111827" stroke="#0a2a15" stroke-width="1.5"/>
  <text x="698" y="204" text-anchor="middle" fill="#55c555" font-size="14" font-weight="600">테스트 세트</text>
  <text x="698" y="226" text-anchor="middle" fill="#ccc" font-size="12">최종 성능 평가</text>
  <text x="698" y="246" text-anchor="middle" fill="#ccc" font-size="12">배포 전 단 한 번 사용</text>
  <text x="698" y="266" text-anchor="middle" fill="#ccc" font-size="12">실제 일반화 성능 추정</text>
  <text x="698" y="286" text-anchor="middle" fill="#e05555" font-size="11">⚠ 개발 중 절대 열람 금지</text>
  <text x="698" y="328" text-anchor="middle" fill="#555" font-size="11">권장 비율: 10 ~ 20 %</text>

  <!-- Footer -->
  <text x="440" y="408" text-anchor="middle" fill="#444" font-size="11">PALDYN · AI 완전 정복 시리즈</text>
</svg>
