<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arrr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Kustomize base/overlays 디렉토리 구조</text>

  <!-- base directory -->
  <rect x="60" y="70" width="260" height="280" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="190" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">base/</text>

  <rect x="80" y="108" width="220" height="228" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7777cc" xml:space="preserve">kustomization.yaml</text>
  <text x="96" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">deployment.yaml</text>
  <text x="96" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">service.yaml</text>
  <text x="96" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">hpa.yaml</text>
  <text x="96" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" xml:space="preserve">공통 리소스 정의</text>
  <text x="96" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" xml:space="preserve">환경에 관계없는 구조</text>
  <text x="96" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" xml:space="preserve">유효한 Kubernetes YAML</text>
  <text x="96" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" xml:space="preserve">(직접 apply 가능)</text>
  <text x="96" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" xml:space="preserve">replicas: 1 (기본값)</text>
  <text x="96" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" xml:space="preserve">image: myapp:latest</text>

  <!-- dev overlay -->
  <rect x="370" y="70" width="220" height="200" rx="8" fill="#0f2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="480" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">overlays/dev/</text>
  <rect x="386" y="108" width="188" height="148" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="402" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7777cc" xml:space="preserve">kustomization.yaml</text>
  <text x="402" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">resources:</text>
  <text x="402" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve">  - ../../base</text>
  <text x="402" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">namePrefix: dev-</text>
  <text x="402" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">namespace: dev</text>
  <text x="402" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555" font-weight="600" xml:space="preserve">replicas: 1</text>
  <text x="402" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555" font-weight="600" xml:space="preserve">image tag: dev-latest</text>

  <!-- staging overlay -->
  <rect x="370" y="290" width="220" height="180" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="480" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">overlays/staging/</text>
  <rect x="386" y="328" width="188" height="128" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="402" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7777cc" xml:space="preserve">kustomization.yaml</text>
  <text x="402" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">resources:</text>
  <text x="402" y="384" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve">  - ../../base</text>
  <text x="402" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">namePrefix: staging-</text>
  <text x="402" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3" font-weight="600" xml:space="preserve">replicas: 2</text>
  <text x="402" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3" font-weight="600" xml:space="preserve">image tag: v1.9.0-rc1</text>

  <!-- prod overlay -->
  <rect x="630" y="70" width="220" height="280" rx="8" fill="#200f10" stroke="#e05555" stroke-width="1.5"/>
  <text x="740" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">overlays/prod/</text>
  <rect x="646" y="108" width="188" height="228" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="662" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7777cc" xml:space="preserve">kustomization.yaml</text>
  <text x="662" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">resources:</text>
  <text x="662" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve">  - ../../base</text>
  <text x="662" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">namespace: production</text>
  <text x="662" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#e05555" font-weight="600" xml:space="preserve">replicas: 5</text>
  <text x="662" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#e05555" font-weight="600" xml:space="preserve">image tag: v2.0.0</text>
  <text x="662" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">resources.limits:</text>
  <text x="662" y="256" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#e05555" font-weight="600" xml:space="preserve">  cpu: 2, mem: 2Gi</text>
  <text x="662" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">HPA + PDB + patches</text>
  <text x="662" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" xml:space="preserve">추가 리소스 파일 포함 가능</text>

  <!-- arrows: base to overlays -->
  <line x1="320" y1="190" x2="368" y2="160" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrg)"/>
  <line x1="320" y1="210" x2="368" y2="380" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="320" y1="200" x2="628" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrr)"/>

  <!-- bottom commands -->
  <rect x="60" y="390" width="280" height="96" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="200" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">dev 배포</text>
  <text x="76" y="432" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">kubectl apply -k \</text>
  <text x="76" y="450" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  overlays/dev/</text>
  <text x="76" y="472" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" font-weight="600" xml:space="preserve">  # dev-myapp, dev namespace</text>
</svg>
