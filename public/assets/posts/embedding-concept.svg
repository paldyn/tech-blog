<svg xmlns="http://www.w3.org/2000/svg" width="880" height="600" viewBox="0 0 880 600">
  <!-- Background -->
  <rect width="880" height="600" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="40"
        text-anchor="middle"
        fill="#e8e8e8"
        font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif"
        font-size="18" font-weight="600">임베딩: 텍스트를 벡터 공간에 배치하기</text>

  <!-- ─── Left panel: Raw text ─── -->
  <rect x="60" y="65" width="260" height="490" rx="10"
        fill="#0d0d1a" stroke="#3b5bdb" stroke-width="1.2"/>
  <text x="190" y="96"
        text-anchor="middle"
        fill="#748ffc"
        font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif"
        font-size="13" font-weight="700">원본 텍스트</text>

  <!-- word chips -->
  <rect x="85" y="115" width="80" height="32" rx="16" fill="#1a1f3c" stroke="#3b5bdb" stroke-width="1"/>
  <text x="125" y="136" text-anchor="middle" fill="#a5b4fc" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="13">고양이</text>

  <rect x="185" y="115" width="80" height="32" rx="16" fill="#1a1f3c" stroke="#3b5bdb" stroke-width="1"/>
  <text x="225" y="136" text-anchor="middle" fill="#a5b4fc" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="13">강아지</text>

  <rect x="85" y="162" width="80" height="32" rx="16" fill="#0f2b1a" stroke="#0ca678" stroke-width="1"/>
  <text x="125" y="183" text-anchor="middle" fill="#38d9a9" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="13">사과</text>

  <rect x="185" y="162" width="80" height="32" rx="16" fill="#0f2b1a" stroke="#0ca678" stroke-width="1"/>
  <text x="225" y="183" text-anchor="middle" fill="#38d9a9" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="13">바나나</text>

  <rect x="85" y="209" width="80" height="32" rx="16" fill="#2a1500" stroke="#e67700" stroke-width="1"/>
  <text x="125" y="230" text-anchor="middle" fill="#ffa94d" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="13">서울</text>

  <rect x="185" y="209" width="80" height="32" rx="16" fill="#2a1500" stroke="#e67700" stroke-width="1"/>
  <text x="225" y="230" text-anchor="middle" fill="#ffa94d" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="13">도쿄</text>

  <rect x="85" y="256" width="80" height="32" rx="16" fill="#1a0820" stroke="#ae3ec9" stroke-width="1"/>
  <text x="125" y="277" text-anchor="middle" fill="#da77f2" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="13">달리다</text>

  <rect x="185" y="256" width="80" height="32" rx="16" fill="#1a0820" stroke="#ae3ec9" stroke-width="1"/>
  <text x="225" y="277" text-anchor="middle" fill="#da77f2" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="13">걷다</text>

  <!-- Code block showing vector -->
  <text x="85" y="320" fill="#555" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="11">임베딩 후 벡터 (768차원 예시)</text>
  <rect x="78" y="332" width="224" height="200" rx="6"
        fill="#070b14" stroke="#1e2a3a" stroke-width="1"/>
  <rect x="78" y="332" width="224" height="20" rx="6" fill="#0d1622"/>
  <rect x="78" y="342" width="224" height="10" fill="#0d1622"/>
  <text x="92" y="347" fill="#3a4a5a" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9">고양이 → vector</text>

  <text x="90" y="368" fill="#c792ea" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">고양이 = [</text>
  <text x="90" y="384" fill="#c3e88d" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">   0.231, -0.847, 0.562,</text>
  <text x="90" y="400" fill="#c3e88d" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">   0.129,  0.984,-0.311,</text>
  <text x="90" y="416" fill="#c3e88d" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">   0.723, -0.056, 0.445,</text>
  <text x="90" y="432" fill="#4a5568" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">   ...  (768개 숫자)</text>
  <text x="90" y="448" fill="#c792ea" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">]</text>
  <text x="90" y="468" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">강아지 = [ 0.219, -0.831,</text>
  <text x="90" y="484" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">   0.578, ... ]  ← 유사!</text>
  <text x="90" y="504" fill="#6a8f5a" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">사과   = [ -0.541, 0.203,</text>
  <text x="90" y="520" fill="#6a8f5a" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10">   -0.112, ... ]  ← 다름</text>

  <!-- Arrow -->
  <line x1="325" y1="310" x2="375" y2="310" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="350" y="303" text-anchor="middle" fill="#555" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="11">임베딩</text>
  <text x="350" y="325" text-anchor="middle" fill="#444" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="10">모델</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
  </defs>

  <!-- ─── Right panel: 2D Vector space visualization ─── -->
  <rect x="380" y="65" width="440" height="490" rx="10"
        fill="#080810" stroke="#222240" stroke-width="1.2"/>
  <text x="600" y="96"
        text-anchor="middle"
        fill="#888"
        font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif"
        font-size="13" font-weight="600">벡터 공간 (2차원으로 단순화)</text>

  <!-- Axes -->
  <line x1="420" y1="510" x2="800" y2="510" stroke="#222" stroke-width="1"/>
  <line x1="420" y1="510" x2="420" y2="110" stroke="#222" stroke-width="1"/>
  <text x="804" y="514" fill="#333" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="10">x</text>
  <text x="416" y="106" fill="#333" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="10">y</text>

  <!-- Grid lines (faint) -->
  <line x1="530" y1="110" x2="530" y2="510" stroke="#0f0f0f" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="640" y1="110" x2="640" y2="510" stroke="#0f0f0f" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="750" y1="110" x2="750" y2="510" stroke="#0f0f0f" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="420" y1="410" x2="800" y2="410" stroke="#0f0f0f" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="420" y1="310" x2="800" y2="310" stroke="#0f0f0f" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="420" y1="210" x2="800" y2="210" stroke="#0f0f0f" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Cluster 1: 동물 -->
  <circle cx="510" cy="190" r="5" fill="#a5b4fc"/>
  <text x="520" y="186" fill="#a5b4fc" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="13">고양이</text>
  <circle cx="560" cy="215" r="5" fill="#a5b4fc"/>
  <text x="570" y="211" fill="#a5b4fc" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="13">강아지</text>
  <circle cx="535" cy="165" r="5" fill="#748ffc"/>
  <text x="545" y="161" fill="#748ffc" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="12">호랑이</text>
  <!-- Cluster ellipse -->
  <ellipse cx="535" cy="193" rx="60" ry="50" fill="none" stroke="#3b5bdb" stroke-width="1" stroke-dasharray="5,3" opacity="0.6"/>
  <text x="500" y="257" fill="#3b5bdb" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="11" opacity="0.8">동물 클러스터</text>

  <!-- Cluster 2: 과일 -->
  <circle cx="690" cy="175" r="5" fill="#38d9a9"/>
  <text x="700" y="171" fill="#38d9a9" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="13">사과</text>
  <circle cx="730" cy="200" r="5" fill="#38d9a9"/>
  <text x="740" y="196" fill="#38d9a9" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="13">바나나</text>
  <circle cx="705" cy="155" r="5" fill="#2db88f"/>
  <text x="715" y="151" fill="#2db88f" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="12">딸기</text>
  <ellipse cx="715" cy="177" rx="55" ry="45" fill="none" stroke="#0ca678" stroke-width="1" stroke-dasharray="5,3" opacity="0.6"/>
  <text x="682" y="235" fill="#0ca678" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="11" opacity="0.8">과일 클러스터</text>

  <!-- Cluster 3: 도시 -->
  <circle cx="500" cy="390" r="5" fill="#ffa94d"/>
  <text x="510" y="386" fill="#ffa94d" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="13">서울</text>
  <circle cx="545" cy="415" r="5" fill="#ffa94d"/>
  <text x="555" y="411" fill="#ffa94d" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="13">도쿄</text>
  <circle cx="520" cy="365" r="5" fill="#fd8c3e"/>
  <text x="530" y="361" fill="#fd8c3e" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="12">베이징</text>
  <ellipse cx="522" cy="393" rx="60" ry="48" fill="none" stroke="#e67700" stroke-width="1" stroke-dasharray="5,3" opacity="0.6"/>
  <text x="488" y="452" fill="#e67700" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="11" opacity="0.8">도시 클러스터</text>

  <!-- Cluster 4: 동사 -->
  <circle cx="710" cy="380" r="5" fill="#da77f2"/>
  <text x="720" y="376" fill="#da77f2" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="13">달리다</text>
  <circle cx="745" cy="405" r="5" fill="#da77f2"/>
  <text x="755" y="401" fill="#da77f2" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="13">걷다</text>
  <circle cx="720" cy="355" r="5" fill="#be4bdb"/>
  <text x="730" y="351" fill="#be4bdb" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="12">뛰다</text>
  <ellipse cx="725" cy="385" rx="55" ry="48" fill="none" stroke="#ae3ec9" stroke-width="1" stroke-dasharray="5,3" opacity="0.6"/>
  <text x="698" y="445" fill="#ae3ec9" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="11" opacity="0.8">동사 클러스터</text>

  <!-- Distance annotation: 비슷한 단어 ← -->
  <line x1="515" y1="190" x2="555" y2="215" stroke="#333" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="520" y="214" fill="#444" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="10">가까움</text>

  <!-- Distance annotation: 다른 클러스터 -->
  <line x1="535" y1="210" x2="690" y2="175" stroke="#1a1a2a" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="608" y="187" fill="#2a2a3a" font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif" font-size="10">멀리 떨어짐</text>

  <!-- Footer -->
  <text x="440" y="583"
        text-anchor="middle"
        fill="#333"
        font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif"
        font-size="11">PALDYN · AI Basics Series #9 — 의미가 비슷한 단어는 벡터 공간에서 가까이 배치됩니다</text>
</svg>
