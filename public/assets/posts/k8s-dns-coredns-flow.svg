<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-accent" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">CoreDNS DNS 질의 흐름</text>

  <!-- Step labels -->
  <text x="60" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">1. DNS 쿼리 전송</text>
  <text x="310" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">2. CoreDNS 처리</text>
  <text x="590" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">3. 응답 반환</text>

  <!-- Pod Box -->
  <rect x="40" y="110" width="200" height="90" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="140" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Application Pod</text>
  <text x="140" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">my-app (Namespace: prod)</text>
  <text x="140" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">resolv.conf: nameserver 10.96.0.10</text>

  <!-- Arrow 1: Pod to CoreDNS -->
  <line x1="240" y1="155" x2="330" y2="155" stroke="#7ec8e3" stroke-width="2"
        marker-end="url(#arr-blue)"/>
  <text x="285" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">UDP/TCP :53</text>

  <!-- CoreDNS Box -->
  <rect x="330" y="110" width="220" height="90" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">CoreDNS Pod</text>
  <text x="440" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">kube-system 네임스페이스</text>
  <text x="440" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">ClusterIP: 10.96.0.10</text>

  <!-- Arrow 2: CoreDNS to etcd/cache -->
  <line x1="550" y1="155" x2="640" y2="155" stroke="#55c555" stroke-width="2"
        marker-end="url(#arr-green)"/>
  <text x="595" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">조회/캐시</text>

  <!-- K8s API / etcd Box -->
  <rect x="640" y="110" width="200" height="90" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="740" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Kubernetes API</text>
  <text x="740" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Services / Endpoints</text>
  <text x="740" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">ClusterIP 매핑 반환</text>

  <!-- Return arrow: CoreDNS back to Pod -->
  <path d="M 440 200 Q 440 240 290 240 Q 140 240 140 200" stroke="#55c555" stroke-width="2"
        fill="none" stroke-dasharray="5,3" marker-end="url(#arr-green)"/>
  <text x="290" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">ClusterIP 10.100.200.50 반환</text>

  <!-- FQDN Code Box -->
  <rect x="40" y="300" width="390" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="56" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">DNS 쿼리 FQDN 예시</text>
  <text x="56" y="346" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"># 서비스 FQDN (완전 정규화 도메인)</text>
  <text x="56" y="366" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">my-svc.my-ns.svc.cluster.local</text>
  <text x="56" y="386" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"># 같은 네임스페이스면 단축명 사용 가능</text>
  <text x="56" y="406" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">my-svc</text>
  <text x="56" y="426" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># search: my-ns.svc.cluster.local ...</text>

  <!-- Resolution result box -->
  <rect x="460" y="300" width="380" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">질의 결과</text>
  <text x="476" y="346" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"># ClusterIP 반환 (일반 Service)</text>
  <text x="476" y="366" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">A record: 10.100.200.50</text>
  <text x="476" y="386" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"># Pod IP 반환 (Headless Service)</text>
  <text x="476" y="406" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555" font-weight="600">A record: 10.244.1.5</text>
  <text x="476" y="426" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">#          10.244.2.8 ...</text>

  <!-- Bottom note -->
  <text x="440" y="488" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">CoreDNS는 kube-dns Service를 통해 클러스터 내 모든 Pod의 DNS 서버로 작동합니다</text>
</svg>
