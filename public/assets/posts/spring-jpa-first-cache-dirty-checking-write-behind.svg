<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">쓰기 지연(Write-Behind) 저장소</text>
  <text x="440" y="70" text-anchor="middle" fill="#888" font-size="13">persist/remove 호출 → SQL 큐 누적 → flush 시 일괄 전송</text>

  <!-- Left: Application code -->
  <rect x="60" y="88" width="340" height="360" rx="8" fill="#070b14" stroke="#1e2433"/>
  <text x="80" y="112" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">@Transactional</text>
  <text x="80" y="130" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">public void process() {</text>
  <text x="80" y="160" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    // ① SQL 없음</text>
  <text x="80" y="178" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    em.persist(</text><text x="156" y="178" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">new</text><text x="182" y="178" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> Member(</text><text x="244" y="178" fill="#ce9178" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">"A"</text><text x="268" y="178" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">));</text>
  <text x="80" y="208" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    // ② SQL 없음</text>
  <text x="80" y="226" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    em.persist(</text><text x="156" y="226" fill="#7ec8e3" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">new</text><text x="182" y="226" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"> Member(</text><text x="244" y="226" fill="#ce9178" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">"B"</text><text x="268" y="226" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">));</text>
  <text x="80" y="256" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    // ③ SQL 없음</text>
  <text x="80" y="274" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    m.setName(</text><text x="164" y="274" fill="#ce9178" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">"Changed"</text><text x="240" y="274" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">);</text>
  <text x="80" y="310" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    // ④ 트랜잭션 커밋</text>
  <text x="80" y="328" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    // flush() 자동 호출</text>
  <text x="80" y="346" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">    // SQL 일괄 전송</text>
  <text x="80" y="372" fill="#e8e8e8" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">} </text><text x="96" y="372" fill="#6a8aa0" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">// commit</text>

  <!-- Middle: Write-Behind Queue -->
  <rect x="430" y="88" width="200" height="280" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="530" y="114" text-anchor="middle" fill="#7777cc" font-size="14" font-weight="600">쓰기 지연 저장소</text>
  <text x="530" y="133" text-anchor="middle" fill="#888" font-size="11">(SQL 큐)</text>

  <rect x="446" y="148" width="168" height="36" rx="4" fill="#0a1520" stroke="#7777cc" stroke-width="1"/>
  <text x="530" y="163" text-anchor="middle" fill="#7ec8e3" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace">INSERT member "A"</text>
  <text x="530" y="178" text-anchor="middle" fill="#888" font-size="10">← persist("A") 시</text>

  <rect x="446" y="196" width="168" height="36" rx="4" fill="#0a1520" stroke="#7777cc" stroke-width="1"/>
  <text x="530" y="211" text-anchor="middle" fill="#7ec8e3" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace">INSERT member "B"</text>
  <text x="530" y="226" text-anchor="middle" fill="#888" font-size="10">← persist("B") 시</text>

  <rect x="446" y="244" width="168" height="36" rx="4" fill="#0a1520" stroke="#55c555" stroke-width="1"/>
  <text x="530" y="259" text-anchor="middle" fill="#55c555" font-size="11" font-family="'JetBrains Mono','Menlo','Consolas',monospace">UPDATE member</text>
  <text x="530" y="274" text-anchor="middle" fill="#888" font-size="10">← flush 시 dirty check</text>

  <text x="530" y="330" text-anchor="middle" fill="#888" font-size="11">flush() 시</text>
  <text x="530" y="346" text-anchor="middle" fill="#7ec8e3" font-size="11" font-weight="600">순서대로 전송</text>
  <text x="530" y="362" text-anchor="middle" fill="#888" font-size="11">↓ DB 커넥션 획득</text>

  <!-- Arrows from code to queue -->
  <line x1="400" y1="178" x2="430" y2="166" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="400" y1="226" x2="430" y2="214" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="400" y1="274" x2="430" y2="262" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Arrow queue to DB -->
  <line x1="630" y1="228" x2="680" y2="228" stroke="#55c555" stroke-width="2"/>
  <polygon points="676,222 688,228 676,234" fill="#55c555"/>
  <text x="655" y="216" text-anchor="middle" fill="#55c555" font-size="11">flush</text>

  <!-- Right: DB -->
  <rect x="688" y="88" width="152" height="280" rx="8" fill="#1a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="764" y="114" text-anchor="middle" fill="#e05555" font-size="14" font-weight="600">Database</text>

  <rect x="704" y="130" width="120" height="30" rx="4" fill="#0a0505" stroke="#e05555" stroke-width="1"/>
  <text x="764" y="150" text-anchor="middle" fill="#e05555" font-size="11">INSERT "A" ✓</text>
  <rect x="704" y="170" width="120" height="30" rx="4" fill="#0a0505" stroke="#e05555" stroke-width="1"/>
  <text x="764" y="190" text-anchor="middle" fill="#e05555" font-size="11">INSERT "B" ✓</text>
  <rect x="704" y="210" width="120" height="30" rx="4" fill="#0a0505" stroke="#55c555" stroke-width="1"/>
  <text x="764" y="230" text-anchor="middle" fill="#55c555" font-size="11">UPDATE ✓</text>

  <text x="764" y="300" text-anchor="middle" fill="#888" font-size="11">일괄 처리</text>
  <text x="764" y="318" text-anchor="middle" fill="#888" font-size="11">DB 왕복 최소화</text>
  <text x="764" y="348" text-anchor="middle" fill="#888" font-size="10">네트워크 비용↓</text>

  <!-- Bottom note -->
  <rect x="60" y="392" width="760" height="60" rx="6" fill="#0f0f1a" stroke="#2a2a3a"/>
  <text x="80" y="414" fill="#7ec8e3" font-size="12">💡 JDBC batch insert: hibernate.jdbc.batch_size=50 설정으로 INSERT를 배치로 묶어 성능 향상</text>
  <text x="80" y="434" fill="#888" font-size="12">IDENTITY PK 전략에서는 배치 INSERT가 비활성화됨 (persist() 시 즉시 INSERT 필요)</text>
  <text x="80" y="452" fill="#888" font-size="12">SEQUENCE 전략 + allocationSize를 쓰면 배치 INSERT 활성화 가능</text>
</svg>
