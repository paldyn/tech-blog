<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arrt" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SQLite B-Tree 페이지 탐색</text>

  <!-- Root page -->
  <rect x="320" y="72" width="240" height="64" fill="#1a1a2e" rx="8" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">루트 페이지 (Page 2)</text>
  <text x="440" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8" text-anchor="middle">인테리어 노드 | 키: [50 | 100 | 200]</text>
  <text x="440" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">자식: [P3 | P4 | P5 | P6]</text>

  <!-- Level 2 pages -->
  <rect x="80" y="200" width="170" height="60" fill="#1a1a2e" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="165" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">Page 3</text>
  <text x="165" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#9aa4b8" text-anchor="middle">rowid 1 ~ 49</text>

  <rect x="280" y="200" width="170" height="60" fill="#1a1a2e" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="365" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">Page 4</text>
  <text x="365" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#9aa4b8" text-anchor="middle">rowid 50 ~ 99</text>

  <rect x="480" y="200" width="170" height="60" fill="#1a1a2e" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="565" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">Page 5</text>
  <text x="565" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#9aa4b8" text-anchor="middle">rowid 100 ~ 199</text>

  <rect x="680" y="200" width="170" height="60" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="765" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">Page 6</text>
  <text x="765" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#9aa4b8" text-anchor="middle">rowid 200 ~</text>

  <!-- Arrows root -> children -->
  <line x1="380" y1="136" x2="200" y2="198" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrt)"/>
  <line x1="410" y1="136" x2="360" y2="198" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrt)"/>
  <line x1="470" y1="136" x2="560" y2="198" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrt)"/>
  <line x1="500" y1="136" x2="760" y2="198" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrt)"/>

  <!-- Record structure -->
  <text x="60" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">셀(레코드) 직렬화 포맷</text>

  <rect x="60" y="322" width="760" height="50" fill="#0f1a2e" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>

  <rect x="76" y="330" width="80" height="34" fill="#1a2a1a" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="116" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" font-weight="600" fill="#55c555" text-anchor="middle">페이로드 길이</text>
  <text x="116" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#888" text-anchor="middle">varint</text>

  <rect x="166" y="330" width="80" height="34" fill="#1a1a2e" rx="4" stroke="#7ec8e3" stroke-width="1"/>
  <text x="206" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" font-weight="600" fill="#7ec8e3" text-anchor="middle">rowid</text>
  <text x="206" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#888" text-anchor="middle">varint</text>

  <rect x="256" y="330" width="100" height="34" fill="#1a1a2e" rx="4" stroke="#7ec8e3" stroke-width="1"/>
  <text x="306" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" font-weight="600" fill="#7ec8e3" text-anchor="middle">헤더 (타입코드)</text>
  <text x="306" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#888" text-anchor="middle">컬럼 타입 배열</text>

  <rect x="366" y="330" width="80" height="34" fill="#1a2a1a" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="406" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" font-weight="600" fill="#55c555" text-anchor="middle">col1 값</text>
  <text x="406" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#888" text-anchor="middle">INTEGER</text>

  <rect x="456" y="330" width="100" height="34" fill="#1a2a1a" rx="4" stroke="#55c555" stroke-width="1"/>
  <text x="506" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" font-weight="600" fill="#55c555" text-anchor="middle">col2 값</text>
  <text x="506" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#888" text-anchor="middle">TEXT (varint 길이 + bytes)</text>

  <rect x="566" y="330" width="238" height="34" fill="#1a1a2e" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="685" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">... 추가 컬럼 · 오버플로 포인터(필요시)</text>

  <!-- Code block -->
  <rect x="60" y="392" width="760" height="34" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">PRAGMA</tspan><tspan fill="#ffffff"> integrity_check;  </tspan><tspan fill="#9aa4b8">-- B-Tree 구조 이상 여부 검사</tspan></text>
</svg>
