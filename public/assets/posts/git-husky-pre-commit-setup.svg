<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Husky 설치 및 훅 등록 흐름</text>

  <!-- Step 1 -->
  <rect x="60" y="68" width="220" height="72" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">① 설치</text>
  <text x="170" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">npm install --save-dev husky</text>
  <text x="170" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">v9+ — prepare 스크립트 불필요</text>

  <line x1="280" y1="104" x2="320" y2="104" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="322" y="68" width="220" height="72" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="432" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">② 초기화</text>
  <text x="432" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">npx husky init</text>
  <text x="432" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">.husky/ 디렉터리 생성</text>

  <line x1="542" y1="104" x2="582" y2="104" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="584" y="68" width="236" height="72" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="702" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">③ 훅 파일 편집</text>
  <text x="702" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">.husky/pre-commit</text>
  <text x="702" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666">npm run lint 등 명령어 추가</text>

  <!-- Directory structure -->
  <rect x="60" y="174" width="340" height="200" rx="8" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="230" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">.husky/ 디렉터리 구조</text>
  <text xml:space="preserve" x="82" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">.husky/</text>
  <text xml:space="preserve" x="82" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555">├── pre-commit</text>
  <text xml:space="preserve" x="82" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3">├── commit-msg</text>
  <text xml:space="preserve" x="82" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8c84a">├── pre-push</text>
  <text xml:space="preserve" x="82" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">└── _/</text>
  <text xml:space="preserve" x="82" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888">    └── husky.sh  (내부)</text>
  <text xml:space="preserve" x="82" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#666">※ 파일은 git add로 커밋됨</text>

  <!-- pre-commit content -->
  <rect x="440" y="174" width="380" height="200" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="630" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">.husky/pre-commit 예시</text>
  <text xml:space="preserve" x="460" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">#!/bin/sh</text>
  <text xml:space="preserve" x="460" y="242" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> </text>
  <text xml:space="preserve" x="460" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 타입 검사</text>
  <text xml:space="preserve" x="460" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">npm run type-check</text>
  <text xml:space="preserve" x="460" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> </text>
  <text xml:space="preserve" x="460" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 변경 파일만 lint</text>
  <text xml:space="preserve" x="460" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">npx lint-staged</text>
  <text xml:space="preserve" x="460" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600"> </text>

  <!-- package.json note -->
  <rect x="60" y="396" width="760" height="44" rx="8" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="440" y="418" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">package.json의 "prepare": "husky" 스크립트가 npm install 시 자동으로 .husky 설정을 활성화</text>
</svg>
