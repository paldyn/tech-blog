<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" style="background:#0a0a0a;border-radius:12px">
  <rect x="0" y="0" width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Header -->
  <rect x="0" y="0" width="880" height="68" rx="12" fill="#0d1a2a"/>
  <rect x="0" y="56" width="880" height="12" fill="#0d1a2a"/>
  <text x="60" y="38" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#ffffff">XGBoost · LightGBM · CatBoost 비교</text>
  <text x="60" y="60" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">캐글을 지배한 세 라이브러리의 핵심 차이</text>

  <!-- ===== Comparison Table ===== -->
  <!-- Table header row -->
  <rect x="60" y="88" width="760" height="34" rx="6" fill="#131a2e"/>
  <text x="180" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">항목</text>
  <line x1="260" y1="88" x2="260" y2="122" stroke="#1e2433" stroke-width="1"/>
  <text x="390" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">XGBoost</text>
  <line x1="510" y1="88" x2="510" y2="122" stroke="#1e2433" stroke-width="1"/>
  <text x="630" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">LightGBM</text>
  <line x1="750" y1="88" x2="750" y2="122" stroke="#1e2433" stroke-width="1"/>
  <text x="815" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">CatBoost</text>

  <!-- Row 1: 트리 성장 방식 -->
  <rect x="60" y="122" width="760" height="36" rx="0" fill="#0e1420"/>
  <text x="180" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">트리 성장 방식</text>
  <line x1="260" y1="122" x2="260" y2="158" stroke="#1e2433" stroke-width="1"/>
  <text x="390" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">Level-wise</text>
  <line x1="510" y1="122" x2="510" y2="158" stroke="#1e2433" stroke-width="1"/>
  <text x="630" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">Leaf-wise ★빠름</text>
  <line x1="750" y1="122" x2="750" y2="158" stroke="#1e2433" stroke-width="1"/>
  <text x="815" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">Symmetric</text>

  <!-- Row 2: 속도 -->
  <rect x="60" y="158" width="760" height="36" rx="0" fill="#0a0f1c"/>
  <text x="180" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">학습 속도</text>
  <line x1="260" y1="158" x2="260" y2="194" stroke="#1e2433" stroke-width="1"/>
  <text x="390" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b5cea8" text-anchor="middle">★★★</text>
  <line x1="510" y1="158" x2="510" y2="194" stroke="#1e2433" stroke-width="1"/>
  <text x="630" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">★★★★★ 최고속</text>
  <line x1="750" y1="158" x2="750" y2="194" stroke="#1e2433" stroke-width="1"/>
  <text x="815" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b5cea8" text-anchor="middle">★★★★</text>

  <!-- Row 3: 범주형 -->
  <rect x="60" y="194" width="760" height="36" rx="0" fill="#0e1420"/>
  <text x="180" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">범주형 처리</text>
  <line x1="260" y1="194" x2="260" y2="230" stroke="#1e2433" stroke-width="1"/>
  <text x="390" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">수동 인코딩 필요</text>
  <line x1="510" y1="194" x2="510" y2="230" stroke="#1e2433" stroke-width="1"/>
  <text x="630" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">부분 지원</text>
  <line x1="750" y1="194" x2="750" y2="230" stroke="#1e2433" stroke-width="1"/>
  <text x="815" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">자동 처리 ★</text>

  <!-- Row 4: 메모리 -->
  <rect x="60" y="230" width="760" height="36" rx="0" fill="#0a0f1c"/>
  <text x="180" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">메모리 효율</text>
  <line x1="260" y1="230" x2="260" y2="266" stroke="#1e2433" stroke-width="1"/>
  <text x="390" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b5cea8" text-anchor="middle">보통</text>
  <line x1="510" y1="230" x2="510" y2="266" stroke="#1e2433" stroke-width="1"/>
  <text x="630" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">히스토그램 기법 ★</text>
  <line x1="750" y1="230" x2="750" y2="266" stroke="#1e2433" stroke-width="1"/>
  <text x="815" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" text-anchor="middle" font-size="13" fill="#b5cea8">보통</text>

  <!-- Row 5: 정규화 -->
  <rect x="60" y="266" width="760" height="36" rx="0" fill="#0e1420"/>
  <text x="180" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">내장 정규화</text>
  <line x1="260" y1="266" x2="260" y2="302" stroke="#1e2433" stroke-width="1"/>
  <text x="390" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">L1 + L2 (α, λ)</text>
  <line x1="510" y1="266" x2="510" y2="302" stroke="#1e2433" stroke-width="1"/>
  <text x="630" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b5cea8" text-anchor="middle">lambda, min_data</text>
  <line x1="750" y1="266" x2="750" y2="302" stroke="#1e2433" stroke-width="1"/>
  <text x="815" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b5cea8" text-anchor="middle">depth, l2</text>
  <rect x="60" y="122" width="760" height="180" rx="0" fill="none" stroke="#1e2433" stroke-width="1"/>

  <!-- Code block -->
  <rect x="60" y="315" width="760" height="118" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="333" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0"># XGBoost / LightGBM 학습 예시</text>
  <text x="76" y="351" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">import</text>
  <text x="130" y="351" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">xgboost as xgb</text>
  <text x="76" y="369" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">model = xgb.XGBClassifier(</text>
  <text x="76" y="387" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">    n_estimators=</text>
  <text x="243" y="387" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">500</text>
  <text x="270" y="387" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">, learning_rate=</text>
  <text x="399" y="387" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">0.05</text>
  <text x="76" y="405" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">    max_depth=</text>
  <text x="191" y="405" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">6</text>
  <text x="205" y="405" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">, subsample=</text>
  <text x="317" y="405" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">0.8</text>
  <text x="344" y="405" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">, use_label_encoder=</text>
  <text x="550" y="405" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">False</text>
  <text x="76" y="423" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">)</text>

  <!-- Footer -->
  <text x="60" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">LightGBM은 Leaf-wise 성장으로 XGBoost보다 10배 이상 빠를 수 있으나, 소규모 데이터에서 과적합 주의 — PALDYN AI 완전 정복</text>
</svg>
