<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" style="background:#0a0a0a;border-radius:12px">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">클릭재킹 방어 전략</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">X-Frame-Options · CSP frame-ancestors · frame-busting</text>

  <!-- Defense 1: X-Frame-Options -->
  <rect x="60" y="100" width="360" height="150" rx="8" fill="#0d1520" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="240" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">① X-Frame-Options 헤더</text>

  <rect x="80" y="138" width="320" height="72" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="157" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8"># DENY: 모든 iframe 차단</text>
  <text x="96" y="173" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#ffffff">X-Frame-Options: </text>
  <text x="243" y="173" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#ce9178">DENY</text>
  <text x="96" y="189" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8"># SAMEORIGIN: 같은 오리진만 허용</text>
  <text x="96" y="205" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#ffffff">X-Frame-Options: </text>
  <text x="243" y="205" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#ce9178">SAMEORIGIN</text>

  <rect x="80" y="222" width="320" height="22" rx="4" fill="#1a0f0f" stroke="#7a2a2a" stroke-width="1"/>
  <text x="240" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">구버전 브라우저 지원 · 특정 도메인 허용 불가</text>

  <!-- Defense 2: CSP frame-ancestors -->
  <rect x="460" y="100" width="360" height="150" rx="8" fill="#0d1a0d" stroke="#3aa83a" stroke-width="1.5"/>
  <text x="640" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">② CSP frame-ancestors (권장)</text>

  <rect x="480" y="138" width="320" height="90" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="157" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" xml:space="preserve" fill="#9aa4b8"># 자신만 허용</text>
  <text x="496" y="173" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" xml:space="preserve" fill="#ffffff">Content-Security-Policy:</text>
  <text x="496" y="189" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" xml:space="preserve" fill="#7ec8e3" font-weight="600">  frame-ancestors </text>
  <text x="607" y="189" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" xml:space="preserve" fill="#ce9178">'self'</text>
  <text x="496" y="205" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" xml:space="preserve" fill="#9aa4b8"># 특정 도메인 허용</text>
  <text x="496" y="221" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" xml:space="preserve" fill="#7ec8e3" font-weight="600">  frame-ancestors </text>
  <text x="607" y="221" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" xml:space="preserve" fill="#ce9178">'self' https://partner.com</text>

  <rect x="480" y="240" width="320" height="22" rx="4" fill="#0d1a0d" stroke="#2a7a2a" stroke-width="1"/>
  <text x="640" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">특정 도메인 허용 가능 · 최신 표준 · X-Frame-Options 대체</text>

  <!-- Defense 3: JS frame-busting (NOT recommended) -->
  <rect x="60" y="275" width="360" height="140" rx="8" fill="#1a1a0d" stroke="#a88a3a" stroke-width="1.5"/>
  <text x="240" y="299" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8a020" text-anchor="middle">③ JS frame-busting (비권장)</text>

  <rect x="80" y="313" width="320" height="54" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="96" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#9aa4b8">// 취약한 버스팅 — sandbox로 우회 가능</text>
  <text x="96" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#7ec8e3" font-weight="600">if </text>
  <text x="115" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve" fill="#ffffff">(top !== self) top.location = self.location</text>

  <rect x="80" y="378" width="320" height="26" rx="4" fill="#1a0f0f" stroke="#7a2a2a" stroke-width="1"/>
  <text x="240" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">sandbox="allow-scripts" 로 JS 버스팅 비활성화 가능</text>

  <!-- Defense 4: SameSite -->
  <rect x="460" y="275" width="360" height="140" rx="8" fill="#180d1a" stroke="#8a3aa8" stroke-width="1.5"/>
  <text x="640" y="299" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#b07ad0" text-anchor="middle">④ SameSite 쿠키 보완</text>

  <text x="480" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">클릭재킹 공격은 피해자가 로그인된 상태</text>
  <text x="480" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">에서 발생한다. SameSite=Strict이면</text>
  <text x="480" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">크로스 사이트 iframe에서 세션 쿠키가</text>
  <text x="480" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">전송되지 않아 공격 효과가 차단된다.</text>

  <!-- Recommendation -->
  <rect x="60" y="435" width="760" height="18" rx="4" fill="#111827"/>
  <text x="440" y="448" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">권장: CSP frame-ancestors 'self' + SameSite=Lax 이상 병행 적용</text>
</svg>
