<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">pathlib 핵심 메서드</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">Path 객체로 읽고 쓰고 탐색하는 현대적 파일 I/O</text>

  <!-- Card 1: 읽기 -->
  <rect x="60" y="100" width="240" height="138" rx="10" fill="#0d141a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="78" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">읽기</text>
  <text x="78" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#d4d4d4">p.read_text()</text>
  <text x="78" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#d4d4d4">p.read_bytes()</text>
  <text x="78" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">한 번에 전체를 메모리로</text>

  <!-- Card 2: 쓰기 -->
  <rect x="320" y="100" width="240" height="138" rx="10" fill="#0d1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="338" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">쓰기</text>
  <text x="338" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#d4d4d4">p.write_text(s)</text>
  <text x="338" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#d4d4d4">p.write_bytes(b)</text>
  <text x="338" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">열고 쓰고 닫기를 한 줄로</text>

  <!-- Card 3: 경로 속성 -->
  <rect x="580" y="100" width="240" height="138" rx="10" fill="#14101a" stroke="#7777cc" stroke-width="1"/>
  <text x="598" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">경로 속성</text>
  <text x="598" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#d4d4d4">.name   .stem</text>
  <text x="598" y="184" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#d4d4d4">.suffix  .parent</text>
  <text x="598" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#d4d4d4">.parts</text>

  <!-- Card 4: 탐색 -->
  <rect x="60" y="252" width="240" height="138" rx="10" fill="#0d141a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="78" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">탐색</text>
  <text x="78" y="314" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#d4d4d4">p.glob(</tspan><tspan fill="#ce9178">"*.py"</tspan><tspan fill="#d4d4d4">)</tspan></text>
  <text x="78" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#d4d4d4">p.rglob(</tspan><tspan fill="#ce9178">"*.md"</tspan><tspan fill="#d4d4d4">)</tspan></text>
  <text x="78" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#d4d4d4">p.iterdir()</text>

  <!-- Card 5: 조작 -->
  <rect x="320" y="252" width="240" height="138" rx="10" fill="#1a100d" stroke="#e05555" stroke-width="1"/>
  <text x="338" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">조작</text>
  <text x="338" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#d4d4d4">p.mkdir(...)</text>
  <text x="338" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#d4d4d4">p.rename(q)</text>
  <text x="338" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#d4d4d4">p.unlink()</text>

  <!-- Card 6: 확인 · 메타 -->
  <rect x="580" y="252" width="240" height="138" rx="10" fill="#0d1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="598" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">확인 · 메타</text>
  <text x="598" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#d4d4d4">p.exists()  p.stat()</text>
  <text x="598" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#d4d4d4">p.is_file()</text>
  <text x="598" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#d4d4d4">p.is_dir()</text>

  <!-- Bottom note -->
  <text x="440" y="420" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">from pathlib import Path   ·   p = Path("data.txt")</text>
</svg>
