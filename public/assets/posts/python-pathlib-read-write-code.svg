<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">pathlib 파일 I/O 핵심 메서드</text>

  <rect x="60" y="68" width="760" height="300" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text xml:space="preserve" x="78" y="90" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><ttml:tspan font-weight="600" fill="#7ec8e3">from</ttml:tspan> pathlib <ttml:tspan font-weight="600" fill="#7ec8e3">import</ttml:tspan> Path</text>
  <text xml:space="preserve" x="78" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">p = Path(<ttml:tspan fill="#ce9178">"data"</ttml:tspan>) / <ttml:tspan fill="#ce9178">"report.txt"</ttml:tspan></text>
  <line x1="78" y1="122" x2="800" y2="122" stroke="#3a4a6e" stroke-width="1"/>

  <text xml:space="preserve" x="78" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 읽기</text>
  <text xml:space="preserve" x="78" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">text = p.read_text(encoding=<ttml:tspan fill="#ce9178">"utf-8"</ttml:tspan>)   <ttml:tspan fill="#9aa4b8"># → str</ttml:tspan></text>
  <text xml:space="preserve" x="78" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">data = p.read_bytes()              <ttml:tspan fill="#9aa4b8"># → bytes</ttml:tspan></text>
  <line x1="78" y1="194" x2="800" y2="194" stroke="#3a4a6e" stroke-width="1"/>

  <text xml:space="preserve" x="78" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 쓰기 (파일 없으면 생성, 있으면 덮어씀)</text>
  <text xml:space="preserve" x="78" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">p.write_text(<ttml:tspan fill="#ce9178">"내용"</ttml:tspan>, encoding=<ttml:tspan fill="#ce9178">"utf-8"</ttml:tspan>)  <ttml:tspan fill="#9aa4b8"># → int (bytes)</ttml:tspan></text>
  <text xml:space="preserve" x="78" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">p.write_bytes(b<ttml:tspan fill="#ce9178">"\x89PNG"</ttml:tspan>)         <ttml:tspan fill="#9aa4b8"># → int</ttml:tspan></text>
  <line x1="78" y1="266" x2="800" y2="266" stroke="#3a4a6e" stroke-width="1"/>

  <text xml:space="preserve" x="78" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># open()과 함께 (대용량·스트리밍)</text>
  <text xml:space="preserve" x="78" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><ttml:tspan font-weight="600" fill="#7ec8e3">with</ttml:tspan> p.open(<ttml:tspan fill="#ce9178">"r"</ttml:tspan>, encoding=<ttml:tspan fill="#ce9178">"utf-8"</ttml:tspan>) as f:</text>
  <text xml:space="preserve" x="78" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    <ttml:tspan font-weight="600" fill="#7ec8e3">for</ttml:tspan> line in f:</text>
  <text xml:space="preserve" x="78" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        process(line)</text>
  <text xml:space="preserve" x="78" y="366" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># p.open() == open(p, ...) — 동일 결과</ttml:tspan></text>

  <rect x="60" y="380" width="760" height="14" rx="3" fill="#3a4a6e"/>
</svg>
