<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">HMAC 내부 구조</text>
  <text x="440" y="66" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">HMAC(K, M) = H((K ⊕ opad) ∥ H((K ⊕ ipad) ∥ M))</text>

  <!-- Step 1: Key preparation -->
  <text x="60" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">① 키 패딩</text>

  <rect x="60" y="110" width="120" height="44" rx="6" fill="#111122" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="120" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">비밀키 K</text>
  <text x="120" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">임의 길이</text>

  <line x1="182" y1="132" x2="228" y2="132" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="230" y="110" width="160" height="44" rx="6" fill="#111122" stroke="#7777cc" stroke-width="1"/>
  <text x="310" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">블록 크기로 패딩</text>
  <text x="310" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">SHA-256: 64 byte</text>

  <!-- ipad / opad -->
  <rect x="60" y="174" width="160" height="44" rx="6" fill="#0d1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="140" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">K ⊕ ipad</text>
  <text x="140" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">ipad = 0x36 반복</text>

  <rect x="240" y="174" width="160" height="44" rx="6" fill="#0d200d" stroke="#55c555" stroke-width="1"/>
  <text x="320" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">K ⊕ opad</text>
  <text x="320" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">opad = 0x5c 반복</text>

  <!-- Message -->
  <rect x="460" y="174" width="120" height="44" rx="6" fill="#111122" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="520" y="194" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">메시지 M</text>
  <text x="520" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">임의 길이</text>

  <!-- Step 2: Inner hash -->
  <text x="60" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">② 내부 해시</text>

  <rect x="60" y="262" width="360" height="44" rx="6" fill="#111122" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">H( (K ⊕ ipad) ∥ M )</text>
  <text x="240" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">키-ipad와 메시지를 이어붙여 해시</text>

  <line x1="240" y1="308" x2="240" y2="334" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Inner hash result -->
  <rect x="130" y="336" width="220" height="44" rx="6" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="240" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">inner_hash (32 bytes)</text>
  <text x="240" y="372" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">SHA-256이면 256 bit</text>

  <!-- Step 3: Outer hash -->
  <text x="460" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">③ 외부 해시</text>

  <rect x="460" y="262" width="360" height="44" rx="6" fill="#111a11" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8">H( (K ⊕ opad) ∥ inner_hash )</text>
  <text x="640" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">키-opad와 inner_hash를 이어붙여 해시</text>

  <line x1="640" y1="308" x2="640" y2="334" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>

  <!-- Final HMAC -->
  <rect x="500" y="336" width="280" height="54" rx="8" fill="#112211" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">HMAC 출력</text>
  <text x="640" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">256 bit 태그 (SHA-256 기반 시)</text>

  <!-- Caption -->
  <text x="440" y="420" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">2중 해시 구조: 길이 확장 공격(Length Extension Attack) 방어</text>
  <text x="440" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">키 없이는 유효한 HMAC 생성 불가 → 무결성 + 인증 동시 제공</text>
</svg>
