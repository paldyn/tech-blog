<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Nexacro N 메뉴 네비게이션 구조</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">메뉴 Dataset → Tree/TabControl → 화면 이동 흐름</text>

  <!-- Menu Dataset -->
  <rect x="60" y="94" width="220" height="280" fill="#111827" rx="8" stroke="#3a4a6e"/>
  <text x="170" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">메뉴 Dataset</text>
  <text x="80" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">menu_id parent_id</text>
  <line x1="80" y1="152" x2="268" y2="152" stroke="#3a4a6e"/>
  <text x="80" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">M001   (null)</text>
  <text x="80" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">M002   M001</text>
  <text x="80" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">M003   M001</text>
  <text x="80" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">M004   M001</text>
  <text x="80" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">M005   (null)</text>
  <text x="80" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">M006   M005</text>
  <line x1="80" y1="272" x2="268" y2="272" stroke="#3a4a6e"/>
  <text x="80" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">menu_text / form_url</text>
  <text x="80" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">use_yn / order_num</text>
  <text x="80" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">auth_yn (권한 여부)</text>
  <text x="80" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">icon_path</text>

  <!-- Arrow 1 -->
  <polygon points="298,234 330,224 330,244" fill="#7ec8e3"/>
  <rect x="284" y="228" width="46" height="12" fill="#7ec8e3"/>

  <!-- Tree Menu -->
  <rect x="336" y="94" width="220" height="280" fill="#111827" rx="8" stroke="#3a4a6e"/>
  <text x="446" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">Tree 메뉴</text>
  <text x="356" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e0a030">▼</text>
  <text x="372" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8"> 인사관리</text>
  <text x="388" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">  ▷ 사원 조회</text>
  <text x="388" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">  ▷ 부서 관리</text>
  <text x="388" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">  ▷ 발령 처리</text>
  <text x="356" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e0a030">▼</text>
  <text x="372" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8"> 급여관리</text>
  <text x="388" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">  ▷ 급여 산정</text>
  <text x="388" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">  ▷ 퇴직금</text>
  <text x="388" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">  ▷ 원천징수</text>

  <!-- Arrow 2 -->
  <polygon points="574,234 606,224 606,244" fill="#7ec8e3"/>
  <rect x="560" y="228" width="46" height="12" fill="#7ec8e3"/>

  <!-- Frame area -->
  <rect x="612" y="94" width="220" height="280" fill="#111827" rx="8" stroke="#3a4a6e"/>
  <text x="722" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">화면 프레임</text>
  <!-- Tab bar -->
  <rect x="628" y="130" width="80" height="24" fill="#1d4ed8" rx="4 4 0 0"/>
  <text x="668" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#fff" text-anchor="middle">사원 조회</text>
  <rect x="708" y="130" width="80" height="24" fill="#1a2535" rx="4 4 0 0" stroke="#3a4a6e"/>
  <text x="748" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">대기 중</text>
  <!-- Content area -->
  <rect x="628" y="154" width="188" height="200" fill="#0f1929" rx="0 4 4 4"/>
  <text x="722" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">HR001.xfdl</text>
  <text x="722" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555" text-anchor="middle">loadPage() 호출로 로드</text>

  <!-- Bottom note -->
  <rect x="60" y="394" width="760" height="80" fill="#111827" rx="8" stroke="#3a4a6e"/>
  <text x="440" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">메뉴 클릭 → 화면 로드 흐름</text>
  <text x="80" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">1. 노드 클릭 → form_url 컬럼 읽기</text>
  <text x="340" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">2. 탭 프레임 loadPage(url) 호출</text>
  <text x="600" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">3. 폼 동적 로드 → 화면 표시</text>
  <text x="80" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ 이미 열린 탭이면 재사용 (중복 로드 방지)</text>
</svg>
