<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">lsblk — 블록 장치 트리 구조 시각화</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">디스크 → 파티션 → 마운트 포인트 계층을 한눈에 파악</text>

  <!-- lsblk -f output -->
  <text x="60" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">lsblk -f 출력 예시</text>
  <rect x="60" y="114" width="760" height="182" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">NAME        FSTYPE   FSVER  LABEL  UUID                                 MOUNTPOINTS</text>
  <text x="76" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">sda</text>
  <text x="76" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">├─sda1      ext4     1.0           1a2b3c4d-…                          /boot</text>
  <text x="76" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">├─sda2      ext4     1.0           5e6f7a8b-…                          /</text>
  <text x="76" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">└─sda3      swap     1             9c0d1e2f-…                          [SWAP]</text>
  <text x="76" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">sdb</text>
  <text x="76" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">└─sdb1      xfs             data   a3b4c5d6-…                          /data</text>
  <text x="76" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">sr0</text>
  <text x="76" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">                                                                       (CD-ROM)</text>

  <!-- Annotations: disk/partition/fs -->
  <text x="60" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">계층 구조 의미</text>
  <rect x="60" y="330" width="200" height="52" fill="#071420" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3" text-anchor="middle">디스크 (sda, sdb)</text>
  <text x="160" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">물리/가상 블록 장치</text>

  <rect x="300" y="330" width="200" height="52" fill="#0d0d1a" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="400" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">파티션 (sda1, sda2)</text>
  <text x="400" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">디스크를 논리적으로 분할</text>

  <rect x="540" y="330" width="280" height="52" fill="#071a07" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="680" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">FSTYPE + UUID + MOUNTPOINTS</text>
  <text x="680" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">파일시스템 식별 및 마운트 위치</text>

  <!-- Arrow flow -->
  <polygon points="268,356 292,348 292,364" fill="#7777cc"/>
  <line x1="260" y1="356" x2="292" y2="356" stroke="#7777cc" stroke-width="2"/>
  <polygon points="508,356 534,348 534,364" fill="#55c555"/>
  <line x1="500" y1="356" x2="534" y2="356" stroke="#55c555" stroke-width="2"/>

  <!-- Commands at bottom -->
  <text x="60" y="410" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">lsblk</text>
  <text x="106" y="410" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">        # 기본 트리</text>
  <text x="300" y="410" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">lsblk -f</text>
  <text x="364" y="410" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">      # FS+UUID</text>
  <text x="560" y="410" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">lsblk -o NAME,SIZE,TYPE,MOUNTPOINT</text>
</svg>
