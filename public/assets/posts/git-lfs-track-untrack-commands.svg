<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">LFS 트래킹 해제 (untrack)</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">untrack 후 파일을 일반 Git 오브젝트로 전환하는 절차</text>

  <!-- Step 1 -->
  <rect x="60" y="92" width="760" height="64" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">① 트래킹 해제</text>
  <text xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan x="76" y="138" fill="#7ec8e3" font-weight="600">git lfs untrack</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">"*.png"</tspan>
    <tspan fill="#9aa4b8">   # .gitattributes에서 패턴 제거</tspan>
  </text>

  <!-- Step 2 -->
  <rect x="60" y="172" width="760" height="64" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">② 파일 캐시에서 제거 후 재추가</text>
  <text xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan x="76" y="218" fill="#7ec8e3" font-weight="600">git rm</tspan><tspan fill="#ffffff"> --cached </tspan><tspan fill="#ce9178">*.png</tspan>
    <tspan fill="#9aa4b8">      # 인덱스에서 제거 (파일은 유지)</tspan>
  </text>

  <!-- Step 3 -->
  <rect x="60" y="252" width="760" height="64" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">③ 커밋</text>
  <text xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan x="76" y="298" fill="#7ec8e3" font-weight="600">git add</tspan><tspan fill="#ffffff"> .gitattributes </tspan><tspan fill="#ce9178">*.png</tspan>
    <tspan x="76" dy="0" fill="#9aa4b8">          # 일반 파일로 재스테이징</tspan>
  </text>

  <!-- Warning box -->
  <rect x="60" y="330" width="760" height="64" fill="#1a0808" rx="8" stroke="#5a2a2a" stroke-width="1"/>
  <text x="440" y="352" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">⚠ untrack 주의사항</text>
  <text x="440" y="372" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa">untrack은 새 커밋부터만 적용된다. 히스토리에 있는 LFS 포인터는 그대로 유지된다.</text>
  <text x="440" y="388" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">히스토리까지 제거하려면 git lfs migrate export 사용 (다음 글 참고)</text>
</svg>
