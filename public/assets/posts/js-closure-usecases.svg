<svg width="880" height="400" viewBox="0 0 880 400" xmlns="http://www.w3.org/2000/svg" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="19" font-weight="700" fill="#e8e8e8">클로저의 주요 활용 패턴</text>
  <text x="440" y="64" text-anchor="middle" font-size="13" fill="#555">상태 은닉 / 팩토리 함수 / 모듈 패턴 / 이벤트 핸들러</text>

  <!-- Card 1: 상태 은닉 -->
  <rect x="30" y="82" width="190" height="278" rx="10" fill="#101018" stroke="#223" stroke-width="1"/>
  <text x="125" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#8899dd">① 상태 은닉</text>
  <line x1="50" y1="116" x2="200" y2="116" stroke="#223" stroke-width="1"/>
  <text x="125" y="138" text-anchor="middle" font-size="11" fill="#666">외부에서 직접 변경</text>
  <text x="125" y="154" text-anchor="middle" font-size="11" fill="#666">불가능한 private 변수</text>
  <rect x="45" y="164" width="160" height="110" rx="5" fill="#08080e"/>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="125" y="183" text-anchor="middle" font-size="10.5" fill="#8899dd">function counter() {</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="125" y="200" text-anchor="middle" font-size="10.5" fill="#666">  let n = 0;</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="125" y="217" text-anchor="middle" font-size="10.5" fill="#8899dd">  return {</text>
  <text x="125" y="234" text-anchor="middle" font-size="10.5" fill="#8899dd">    inc: () =&gt; ++n,</text>
  <text x="125" y="251" text-anchor="middle" font-size="10.5" fill="#8899dd">    get: () =&gt; n</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="125" y="268" text-anchor="middle" font-size="10.5" fill="#8899dd">  };</text>
  <text x="125" y="310" text-anchor="middle" font-size="11" fill="#556">n은 외부에서 접근 불가</text>
  <text x="125" y="328" text-anchor="middle" font-size="11" fill="#556">메서드로만 조작 가능</text>

  <!-- Card 2: 팩토리 -->
  <rect x="237" y="82" width="190" height="278" rx="10" fill="#101810" stroke="#232" stroke-width="1"/>
  <text x="332" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#66bb66">② 팩토리 함수</text>
  <line x1="257" y1="116" x2="407" y2="116" stroke="#232" stroke-width="1"/>
  <text x="332" y="138" text-anchor="middle" font-size="11" fill="#666">설정값을 내장한</text>
  <text x="332" y="154" text-anchor="middle" font-size="11" fill="#666">맞춤형 함수 생성</text>
  <rect x="252" y="164" width="160" height="110" rx="5" fill="#080e08"/>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="332" y="183" text-anchor="middle" font-size="10.5" fill="#66bb66">function mult(factor) {</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="332" y="200" text-anchor="middle" font-size="10.5" fill="#66bb66">  return n =&gt; n * factor;</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="332" y="217" text-anchor="middle" font-size="10.5" fill="#888">}</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="332" y="240" text-anchor="middle" font-size="10.5" fill="#888">const double = mult(2);</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="332" y="257" text-anchor="middle" font-size="10.5" fill="#888">const triple = mult(3);</text>
  <text x="332" y="274" text-anchor="middle" font-size="10.5" fill="#66bb66">double(5); // 10</text>
  <text x="332" y="310" text-anchor="middle" font-size="11" fill="#556">factor를 기억하는</text>
  <text x="332" y="328" text-anchor="middle" font-size="11" fill="#556">독립적인 함수 생성</text>

  <!-- Card 3: 모듈 -->
  <rect x="444" y="82" width="190" height="278" rx="10" fill="#181008" stroke="#332" stroke-width="1"/>
  <text x="539" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#ccaa44">③ 모듈 패턴</text>
  <line x1="464" y1="116" x2="614" y2="116" stroke="#332" stroke-width="1"/>
  <text x="539" y="138" text-anchor="middle" font-size="11" fill="#666">IIFE + 클로저로</text>
  <text x="539" y="154" text-anchor="middle" font-size="11" fill="#666">캡슐화 구현</text>
  <rect x="459" y="164" width="160" height="120" rx="5" fill="#100c04"/>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="539" y="183" text-anchor="middle" font-size="10.5" fill="#ccaa44">const store = (() =&gt; {</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="539" y="200" text-anchor="middle" font-size="10.5" fill="#888">  let data = [];</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="539" y="217" text-anchor="middle" font-size="10.5" fill="#ccaa44">  return {</text>
  <text x="539" y="234" text-anchor="middle" font-size="10.5" fill="#ccaa44">    add: v =&gt; data.push(v),</text>
  <text x="539" y="251" text-anchor="middle" font-size="10.5" fill="#ccaa44">    list: () =&gt; [...data]</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="539" y="268" text-anchor="middle" font-size="10.5" fill="#ccaa44">  };</text>
  <text x="539" y="310" text-anchor="middle" font-size="11" fill="#556">data를 숨기고</text>
  <text x="539" y="328" text-anchor="middle" font-size="11" fill="#556">API만 노출</text>

  <!-- Card 4: 이벤트 -->
  <rect x="651" y="82" width="199" height="278" rx="10" fill="#180a10" stroke="#322" stroke-width="1"/>
  <text x="750" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#cc6688">④ 이벤트 핸들러</text>
  <line x1="671" y1="116" x2="830" y2="116" stroke="#322" stroke-width="1"/>
  <text x="750" y="138" text-anchor="middle" font-size="11" fill="#666">이벤트 당시 환경을</text>
  <text x="750" y="154" text-anchor="middle" font-size="11" fill="#666">핸들러가 기억</text>
  <rect x="666" y="164" width="168" height="120" rx="5" fill="#100408"/>
  <text x="750" y="183" text-anchor="middle" font-size="10.5" fill="#888">buttons.forEach((btn, i) =&gt; {</text>
  <text x="750" y="200" text-anchor="middle" font-size="10.5" fill="#cc6688">  btn.onclick = () =&gt; {</text>
  <text x="750" y="217" text-anchor="middle" font-size="10.5" fill="#cc6688">    alert(`버튼 ${i}`);</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="750" y="234" text-anchor="middle" font-size="10.5" fill="#cc6688">  };</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="750" y="251" text-anchor="middle" font-size="10.5" fill="#888">});</text>
  <text x="750" y="310" text-anchor="middle" font-size="11" fill="#556">각 핸들러가 i를</text>
  <text x="750" y="328" text-anchor="middle" font-size="11" fill="#556">독립적으로 기억</text>

  <text x="440" y="390" text-anchor="middle" font-size="11" fill="#444">클로저는 React의 useState, useEffect, useMemo 등 현대 프레임워크 훅의 내부 동작 기반이기도 하다</text>
</svg>
