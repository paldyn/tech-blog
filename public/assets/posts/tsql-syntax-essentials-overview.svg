<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">T-SQL vs 표준 SQL — 주요 차이점</text>

  <!-- Column headers -->
  <text x="200" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#888" text-anchor="middle">기능</text>
  <text x="440" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">T-SQL (SQL Server)</text>
  <text x="720" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#888" text-anchor="middle">ANSI SQL 표준</text>

  <!-- Row lines -->
  <line x1="60" y1="92" x2="820" y2="92" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="310" y1="92" x2="310" y2="460" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="580" y1="92" x2="580" y2="460" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Row 1 -->
  <rect x="62" y="96" width="246" height="46" rx="4" fill="#0f1520"/>
  <text x="185" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">문자열 연결</text>
  <rect x="312" y="96" width="266" height="46" rx="4" fill="#0a1a0a"/>
  <text x="445" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" text-anchor="middle">+ 연산자</text>
  <rect x="582" y="96" width="236" height="46" rx="4" fill="#0f1520"/>
  <text x="700" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" text-anchor="middle">|| 연산자</text>

  <!-- Row 2 -->
  <rect x="62" y="144" width="246" height="46" rx="4" fill="#0a0a0a"/>
  <text x="185" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">현재 날짜/시간</text>
  <rect x="312" y="144" width="266" height="46" rx="4" fill="#0a1a0a"/>
  <text x="445" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" text-anchor="middle">GETDATE() / SYSDATETIME()</text>
  <rect x="582" y="144" width="236" height="46" rx="4" fill="#0a0a0a"/>
  <text x="700" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" text-anchor="middle">CURRENT_TIMESTAMP</text>

  <!-- Row 3 -->
  <rect x="62" y="192" width="246" height="46" rx="4" fill="#0f1520"/>
  <text x="185" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">상위 N개</text>
  <rect x="312" y="192" width="266" height="46" rx="4" fill="#0a1a0a"/>
  <text x="445" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" text-anchor="middle">SELECT TOP N</text>
  <rect x="582" y="192" width="236" height="46" rx="4" fill="#0f1520"/>
  <text x="700" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" text-anchor="middle">FETCH FIRST N ROWS</text>

  <!-- Row 4 -->
  <rect x="62" y="240" width="246" height="46" rx="4" fill="#0a0a0a"/>
  <text x="185" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">페이지 처리</text>
  <rect x="312" y="240" width="266" height="46" rx="4" fill="#0a1a0a"/>
  <text x="445" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" text-anchor="middle">OFFSET ... FETCH NEXT</text>
  <rect x="582" y="240" width="236" height="46" rx="4" fill="#0a0a0a"/>
  <text x="700" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">LIMIT / OFFSET</text>

  <!-- Row 5 -->
  <rect x="62" y="288" width="246" height="46" rx="4" fill="#0f1520"/>
  <text x="185" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">자동 증가 ID</text>
  <rect x="312" y="288" width="266" height="46" rx="4" fill="#0a1a0a"/>
  <text x="445" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" text-anchor="middle">IDENTITY(1,1)</text>
  <rect x="582" y="288" width="236" height="46" rx="4" fill="#0f1520"/>
  <text x="700" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">GENERATED ALWAYS / SEQUENCE</text>

  <!-- Row 6 -->
  <rect x="62" y="336" width="246" height="46" rx="4" fill="#0a0a0a"/>
  <text x="185" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">NULL 합산</text>
  <rect x="312" y="336" width="266" height="46" rx="4" fill="#0a1a0a"/>
  <text x="445" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" text-anchor="middle">ISNULL(val, 0)</text>
  <rect x="582" y="336" width="236" height="46" rx="4" fill="#0a0a0a"/>
  <text x="700" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" text-anchor="middle">COALESCE(val, 0)</text>

  <!-- Code block -->
  <rect x="60" y="400" width="760" height="82" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- T-SQL 배치 구분자 GO와 TOP</text>
  <text xml:space="preserve" x="80" y="442" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">SELECT TOP</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">10</tspan><tspan fill="#ffffff"> id, name </tspan><tspan fill="#7ec8e3" font-weight="600">FROM</tspan><tspan fill="#ffffff"> customers </tspan><tspan fill="#7ec8e3" font-weight="600">ORDER BY</tspan><tspan fill="#ffffff"> created_at </tspan><tspan fill="#7ec8e3" font-weight="600">DESC</tspan><tspan fill="#ffffff">;</tspan></text>
  <text xml:space="preserve" x="80" y="460" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">GO</tspan><tspan fill="#ffffff">    </tspan><tspan fill="#9aa4b8">-- 배치 구분자 (클라이언트 도구에서만 의미 있음)</tspan></text>
  <text xml:space="preserve" x="80" y="476" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">SELECT TOP</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">5</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">PERCENT</tspan><tspan fill="#ffffff"> * </tspan><tspan fill="#7ec8e3" font-weight="600">FROM</tspan><tspan fill="#ffffff"> products; </tspan><tspan fill="#9aa4b8">-- 전체의 5%</tspan></text>
</svg>
