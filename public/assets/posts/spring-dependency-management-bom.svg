<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">BOM — Bill of Materials 동작 원리</text>

  <!-- Without BOM (left) -->
  <rect x="60" y="68" width="360" height="300" fill="#120a0a" rx="10" stroke="#3a1a1a" stroke-width="1.5"/>
  <text x="240" y="96" font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">BOM 없이 (직접 버전 관리)</text>

  <rect x="76" y="108" width="328" height="228" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="92" y="128" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// 버전 충돌 위험</text>
  <text x="92" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">dependencies {</text>
  <text x="92" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  implementation(</text>
  <text x="92" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">    "org.springframework:</text>
  <text x="92" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">     spring-web:6.1.5"</text>
  <text x="92" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  )</text>
  <text x="92" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  implementation(</text>
  <text x="92" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">    "org.springframework:</text>
  <text x="92" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">     spring-context:6.1.4"</text>
  <text x="92" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  )</text>
  <text x="92" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">  // 버전 불일치 → 런타임 오류</text>
  <text x="92" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>

  <text x="76" y="356" font-size="12" fill="#e05555">✗  수십 개 버전을 개발자가 직접 맞춤</text>
  <text x="76" y="374" font-size="12" fill="#e05555">✗  버전 불일치로 런타임 오류 위험</text>

  <!-- Center arrow -->
  <polygon points="420,218 456,218 456,206 476,238 456,270 456,258 420,258"
           fill="#7777cc" stroke="#0a0a0a" stroke-width="1.5" stroke-linejoin="round"/>
  <rect x="412" y="276" width="72" height="20" fill="#0a0a0a"/>
  <text x="448" y="290" font-size="11" fill="#7777cc" text-anchor="middle">BOM 적용</text>

  <!-- With BOM (right) -->
  <rect x="460" y="68" width="360" height="300" fill="#0a120a" rx="10" stroke="#1a3a1a" stroke-width="1.5"/>
  <text x="640" y="96" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">BOM 적용 (버전 자동 관리)</text>

  <rect x="476" y="108" width="328" height="228" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="492" y="128" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">// Spring Boot BOM 자동 관리</text>
  <text x="492" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">dependencies {</text>
  <text x="492" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  implementation(</text>
  <text x="492" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">    "org.springframework:</text>
  <text x="492" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">     spring-web"</text>
  <text x="492" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">    // 버전 없음 → BOM이 결정</text>
  <text x="492" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  )</text>
  <text x="492" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">  implementation(</text>
  <text x="492" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">    "org.springframework:</text>
  <text x="492" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178">     spring-context"</text>
  <text x="492" y="308" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0">    // 항상 같은 버전 보장</text>
  <text x="492" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">}</text>

  <text x="476" y="356" font-size="12" fill="#55c555">✓  하나의 BOM 버전만 올리면 됨</text>
  <text x="476" y="374" font-size="12" fill="#55c555">✓  검증된 호환 버전 조합 보장</text>

  <!-- Bottom: BOM hierarchy -->
  <rect x="60" y="392" width="760" height="88" fill="#0e1420" rx="8" stroke="#333" stroke-width="1"/>
  <text x="440" y="414" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Spring BOM 계층 구조</text>
  <text x="180" y="440" font-size="12" fill="#888" text-anchor="middle">spring-boot 3.3.0</text>
  <text x="180" y="458" font-size="11" fill="#555" text-anchor="middle">(플러그인 버전)</text>
  <text x="440" y="440" font-size="12" fill="#888" text-anchor="middle">spring-boot-dependencies</text>
  <text x="440" y="458" font-size="11" fill="#7ec8e3" text-anchor="middle">(BOM - 수백 개 버전 정의)</text>
  <text x="700" y="440" font-size="12" fill="#888" text-anchor="middle">spring-boot-starter-parent</text>
  <text x="700" y="458" font-size="11" fill="#555" text-anchor="middle">(Maven 부모 POM)</text>
  <line x1="280" y1="447" x2="360" y2="447" stroke="#555" stroke-width="1" marker-end="url(#bomArr)"/>
  <line x1="520" y1="447" x2="600" y2="447" stroke="#555" stroke-width="1" marker-end="url(#bomArr)"/>
  <defs>
    <marker id="bomArr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L5,3 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Footer -->
  <text x="440" y="494" font-size="11" fill="#444" text-anchor="middle">PALDYN · Spring 완전 정복 시리즈 #8 · Chapter 2</text>
</svg>
