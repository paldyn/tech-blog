<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <!-- Background -->
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Transformers Pipeline으로 NER 구현</text>

  <!-- Code block background -->
  <rect x="60" y="68" width="760" height="262" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Line numbers background -->
  <rect x="60" y="68" width="44" height="262" fill="#060910" rx="6"/>
  <rect x="104" y="68" width="1" height="262" fill="#1e2433"/>

  <!-- Line numbers -->
  <text x="82" y="104" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" text-anchor="middle">1</text>
  <text x="82" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" text-anchor="middle">2</text>
  <text x="82" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" text-anchor="middle">3</text>
  <text x="82" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" text-anchor="middle">4</text>
  <text x="82" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" text-anchor="middle">5</text>
  <text x="82" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" text-anchor="middle">6</text>
  <text x="82" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" text-anchor="middle">7</text>
  <text x="82" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" text-anchor="middle">8</text>
  <text x="82" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" text-anchor="middle">9</text>
  <text x="82" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" text-anchor="middle">10</text>
  <text x="82" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" text-anchor="middle">11</text>
  <text x="82" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#3a4a5a" text-anchor="middle">12</text>

  <!-- Code lines -->
  <!-- Line 1: from transformers import pipeline -->
  <text x="120" y="104" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">from</text>
  <text x="162" y="104" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> transformers </text>
  <text x="284" y="104" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">import</text>
  <text x="332" y="104" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> pipeline</text>

  <!-- Line 2: blank -->

  <!-- Line 3: ner = pipeline( -->
  <text x="120" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">ner </text>
  <text x="150" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">=</text>
  <text x="162" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> pipeline(</text>

  <!-- Line 4:     "ner", -->
  <text x="120" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">    "ner"</text>
  <text x="246" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">,</text>

  <!-- Line 5:     model="snunlp/KR-FinBert-SC", -->
  <text x="120" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    model</tspan><tspan fill="#7ec8e3">=</tspan><tspan fill="#ce9178">"snunlp/KR-FinBert-SC"</tspan><tspan fill="#ffffff">,</tspan></text>

  <!-- Line 6:     aggregation_strategy="simple", -->
  <text x="120" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    aggregation_strategy</text>
  <text x="318" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">=</text>
  <text x="330" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"simple"</text>
  <text x="420" y="194" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">,</text>

  <!-- Line 7: ) -->
  <text x="120" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">)</text>

  <!-- Line 8: blank -->

  <!-- Line 9: text = "..." -->
  <text x="120" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">text </text>
  <text x="158" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">=</text>
  <text x="170" y="248" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178"> "홍길동이 삼성전자에 입사했다."</text>

  <!-- Line 10: result = ner(text) -->
  <text x="120" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">result </text>
  <text x="174" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">=</text>
  <text x="186" y="266" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> ner(text)</text>

  <!-- Line 11: # result comment -->
  <text x="120" y="284" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># [{'entity_group': 'PER',</text>

  <!-- Line 12: #   'word': '홍길동', 'score': 0.99}, -->
  <text x="120" y="302" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">#  'word': '홍길동', 'score': 0.99},</text>

  <!-- Output annotation box -->
  <rect x="530" y="260" width="270" height="56" fill="#111827" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="546" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">출력 결과</text>
  <text x="546" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc"># 홍길동 → PER (0.99)</text>
  <text x="546" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555"># 삼성전자 → ORG (0.97)</text>
</svg>
