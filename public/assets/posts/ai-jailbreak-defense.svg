<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">탈옥 방어 다층 아키텍처</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">입력 → 모델 → 출력의 각 단계별 방어 레이어</text>

  <!-- Layer 1: Input Guard -->
  <rect x="60" y="96" width="760" height="80" rx="10" fill="#10180d" stroke="#55c555" stroke-width="1.5"/>
  <text x="80" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">레이어 1 — 입력 가드 (Input Guard)</text>
  <text x="80" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 프롬프트 인젝션 패턴 탐지 (정규식 + 분류 모델)</text>
  <text x="380" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 입력 길이·언어·인코딩 검증</text>
  <text x="80" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 사용자 이력 기반 위험도 점수</text>
  <text x="380" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 구조화된 입력 사용 (JSON schema 검증)</text>

  <!-- Arrow down -->
  <line x1="440" y1="176" x2="440" y2="196" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Layer 2: System Prompt Hardening -->
  <rect x="60" y="198" width="760" height="80" rx="10" fill="#100d1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="80" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">레이어 2 — 시스템 프롬프트 강화</text>
  <text x="80" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 명확한 금지 사항·역할 정의 시스템 프롬프트</text>
  <text x="380" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• RLHF + Constitutional AI로 내재화된 가치</text>
  <text x="80" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 페르소나 전환 명시적 거부 지침</text>
  <text x="380" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 이전 지시 무효화 시도 저항성</text>

  <!-- Arrow down -->
  <line x1="440" y1="278" x2="440" y2="298" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Layer 3: Output Filter -->
  <rect x="60" y="300" width="760" height="80" rx="10" fill="#1a100d" stroke="#e0a055" stroke-width="1.5"/>
  <text x="80" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e0a055">레이어 3 — 출력 필터 (Output Filter)</text>
  <text x="80" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 유해 콘텐츠 분류기 (별도 모델로 출력 검사)</text>
  <text x="380" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 개인정보 패턴 마스킹</text>
  <text x="80" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 유해성 점수 임계값 초과 시 응답 차단</text>
  <text x="380" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 스트리밍 중 실시간 토큰 필터링</text>

  <!-- Code box -->
  <rect x="60" y="400" width="760" height="42" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="418" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">Llama Guard</text>
  <text x="212" y="418" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">: Meta의 입출력 동시 안전성 분류기 — 14개 유해 카테고리 탐지</text>
  <text x="76" y="436" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">NeMo Guardrails</text>
  <text x="258" y="436" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">: NVIDIA의 대화 흐름 제어 + 사실 확인 + 안전성 레이어</text>
</svg>
