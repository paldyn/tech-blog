<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">mount / umount 주요 명령어</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">마운트 옵션 · 현황 확인 · 언마운트까지</text>

  <!-- LEFT: mount commands -->
  <text x="60" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">마운트 명령어</text>
  <rect x="60" y="118" width="360" height="202" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># 기본 마운트</text>
  <text x="76" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">mount</text>
  <text x="118" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> /dev/sdb1 /mnt/data</text>

  <text x="76" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># 파일시스템 타입 지정</text>
  <text x="76" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">mount</text>
  <text x="118" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> -t ext4 /dev/sdb1 /mnt/d</text>

  <text x="76" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># 읽기 전용 마운트</text>
  <text x="76" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">mount</text>
  <text x="118" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> -o ro /dev/sdb1 /mnt/d</text>

  <text x="76" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># noexec,nosuid 옵션</text>
  <text x="76" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">mount</text>
  <text x="118" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> -o nosuid,noexec /dev/sdb1</text>
  <text x="76" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">        /mnt/data</text>

  <!-- RIGHT: umount &amp; check commands -->
  <text x="460" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">언마운트 &amp; 확인</text>
  <rect x="460" y="118" width="360" height="202" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="476" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># 언마운트 (장치 또는 경로)</text>
  <text x="476" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">umount</text>
  <text x="534" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> /mnt/data</text>

  <text x="476" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># 강제 언마운트</text>
  <text x="476" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">umount</text>
  <text x="534" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> -l /mnt/data  </text>
  <text x="652" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># lazy</text>

  <text x="476" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># 현재 마운트 목록</text>
  <text x="476" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">mount</text>
  <text x="518" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"> | grep</text>
  <text x="572" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve"> sdb</text>
  <text x="476" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># 또는</text>
  <text x="476" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">findmnt</text>
  <text x="540" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> /mnt/data</text>
  <text x="476" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">cat</text>
  <text x="502" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve"> /proc/mounts</text>

  <!-- Option table -->
  <text x="60" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">주요 마운트 옵션 (-o)</text>
  <!-- headers -->
  <text x="60" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">옵션</text>
  <text x="200" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">설명</text>
  <line x1="60" y1="382" x2="820" y2="382" stroke="#1e2433" stroke-width="1"/>
  <!-- rows -->
  <text x="60" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">ro / rw</text>
  <text x="200" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">읽기 전용 / 읽기쓰기</text>
  <text x="460" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">noexec</text>
  <text x="580" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">실행 파일 실행 금지</text>
  <text x="60" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">nosuid</text>
  <text x="200" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">SetUID 비트 무시</text>
  <text x="460" y="420" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">remount</text>
  <text x="580" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">재마운트 (옵션 변경)</text>
  <text x="60" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">bind</text>
  <text x="200" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">디렉터리를 다른 위치에 바인드</text>
  <text x="460" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">defaults</text>
  <text x="580" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">rw,suid,exec,auto,async 묶음</text>
</svg>
