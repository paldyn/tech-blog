<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">Falsy 값 7종과 Truthy 값</text>

  <!-- Falsy box -->
  <text x="210" y="78" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#e05555">Falsy (7가지)</text>

  <rect x="60" y="88" width="360" height="320" fill="#0f0707" rx="8" stroke="#e05555" stroke-width="1.5"/>

  <!-- 7 falsy values with explanation -->
  <rect x="80" y="106" width="320" height="36" fill="#1a0d0d" rx="4"/>
  <text x="180" y="120" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e05555">false</text>
  <text x="280" y="120"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">— boolean false 자체</text>
  <text x="180" y="134" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#555">Boolean(false) === false</text>

  <rect x="80" y="150" width="320" height="36" fill="#1a0d0d" rx="4"/>
  <text x="128" y="164"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e05555">0</text>
  <text x="148" y="164"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#9aa4b8">, </text>
  <text x="158" y="164"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e05555">-0</text>
  <text x="195" y="164"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#9aa4b8">, </text>
  <text x="205" y="164"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e05555">0n</text>
  <text x="238" y="164"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">— 숫자 0, BigInt 0</text>
  <text x="180" y="178" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#555">세 종류의 0</text>

  <rect x="80" y="194" width="320" height="36" fill="#1a0d0d" rx="4"/>
  <text x="130" y="208"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e05555">""</text>
  <text x="152" y="208"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" fill="#888">, </text>
  <text x="164" y="208"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e05555">''</text>
  <text x="186" y="208"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" fill="#888">, </text>
  <text x="198" y="208"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e05555">``</text>
  <text x="222" y="208"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">— 빈 문자열</text>
  <text x="180" y="222" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#555">공백 " "은 truthy!</text>

  <rect x="80" y="238" width="320" height="36" fill="#1a0d0d" rx="4"/>
  <text x="110" y="252"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e05555">null</text>
  <text x="155" y="252"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">— 의도적 없음</text>
  <text x="180" y="266" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#555">null !== undefined</text>

  <rect x="80" y="282" width="320" height="36" fill="#1a0d0d" rx="4"/>
  <text x="110" y="296"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e05555">undefined</text>
  <text x="205" y="296"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">— 값 없음</text>
  <text x="180" y="310" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#555">선언됐지만 초기화 안 됨</text>

  <rect x="80" y="326" width="320" height="36" fill="#1a0d0d" rx="4"/>
  <text x="110" y="340"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#e05555">NaN</text>
  <text x="150" y="340"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">— Not a Number</text>
  <text x="180" y="354" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#555">NaN !== NaN (자기 자신과도 불일치)</text>

  <text x="240" y="400"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">이 7가지만 falsy — 나머지 모두 truthy</text>

  <!-- Truthy box -->
  <text x="660" y="78" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="16" font-weight="600" fill="#55c555">Truthy (자주 헷갈리는 것들)</text>

  <rect x="460" y="88" width="360" height="320" fill="#0a0f0a" rx="8" stroke="#55c555" stroke-width="1.5"/>

  <rect x="480" y="106" width="320" height="36" fill="#0d1f0d" rx="4"/>
  <text x="530" y="120"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#55c555">"0"</text>
  <text x="565" y="120"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">— 비어있지 않은 문자열!</text>
  <text x="640" y="134" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">Boolean("0") === true</text>

  <rect x="480" y="150" width="320" height="36" fill="#0d1f0d" rx="4"/>
  <text x="530" y="164"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#55c555">"false"</text>
  <text x="580" y="164"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">— 비어있지 않은 문자열!</text>
  <text x="640" y="178" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">문자열 "false"는 truthy</text>

  <rect x="480" y="194" width="320" height="36" fill="#0d1f0d" rx="4"/>
  <text x="530" y="208"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#55c555">[]</text>
  <text x="550" y="208"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">— 빈 배열도 truthy!</text>
  <text x="640" y="222" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">Boolean([]) === true</text>

  <rect x="480" y="238" width="320" height="36" fill="#0d1f0d" rx="4"/>
  <text x="530" y="252"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#55c555">{}</text>
  <text x="550" y="252"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">— 빈 객체도 truthy!</text>
  <text x="640" y="266" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">Boolean({}) === true</text>

  <rect x="480" y="282" width="320" height="36" fill="#0d1f0d" rx="4"/>
  <text x="530" y="296"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#55c555">-1</text>
  <text x="558" y="296"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">— 0이 아닌 모든 숫자</text>
  <text x="640" y="310" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">Infinity, -Infinity도 truthy</text>

  <rect x="480" y="326" width="320" height="36" fill="#0d1f0d" rx="4"/>
  <text x="530" y="340"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#55c555">function(){}</text>
  <text x="628" y="340"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">— 함수</text>
  <text x="640" y="354" text-anchor="middle"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">모든 객체·함수는 truthy</text>

  <!-- Bottom note -->
  <text x="440" y="428" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#7ec8e3">기억법: falsy는 "비어있거나 없는" 느낌의 값 7개. 나머지는 truthy</text>
  <text x="440" y="448" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#666">document.all — 역사적 이유로 유일한 falsy 객체 (레거시 브라우저 감지용)</text>
</svg>
