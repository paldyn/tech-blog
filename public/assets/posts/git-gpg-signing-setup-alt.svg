<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">SSH 키로 서명하기 (Git 2.34+)</text>

  <!-- Why SSH -->
  <rect x="60" y="70" width="360" height="110" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="95" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">SSH 서명의 장점</text>
  <text x="240" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">이미 있는 SSH 키 재사용</text>
  <text x="240" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">GPG 설치·설정 불필요</text>
  <text x="240" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">GitHub에서 공식 지원</text>

  <!-- GPG vs SSH -->
  <rect x="460" y="70" width="360" height="110" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="640" y="95" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">GPG 서명의 장점</text>
  <text x="640" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">키 만료·폐기·신뢰망 지원</text>
  <text x="640" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">공증된 신원 연결 가능</text>
  <text x="640" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">이메일 암호화도 지원</text>

  <!-- SSH signing config -->
  <rect x="60" y="205" width="760" height="155" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="229" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># SSH 키로 서명하도록 설정 (Git 2.34+)</text>
  <text xml:space="preserve" x="80" y="249" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">git config</text><text xml:space="preserve" x="178" y="249" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> --global gpg.format ssh</text>
  <text xml:space="preserve" x="80" y="269" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">git config</text><text xml:space="preserve" x="178" y="269" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> --global user.signingkey ~/.ssh/id_ed25519.pub</text>
  <text xml:space="preserve" x="80" y="289" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">git config</text><text xml:space="preserve" x="178" y="289" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> --global commit.gpgsign true</text>
  <text xml:space="preserve" x="80" y="315" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 서명 검증용 허용 서명자 파일 설정</text>
  <text xml:space="preserve" x="80" y="335" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">git config</text><text xml:space="preserve" x="178" y="335" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> --global gpg.ssh.allowedSignersFile ~/.ssh/allowed_signers</text>
  <text xml:space="preserve" x="80" y="351" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># allowed_signers: "alice@example.com ssh-ed25519 AAAA..."</text>
</svg>
