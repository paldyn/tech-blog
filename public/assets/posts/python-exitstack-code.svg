<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">ExitStack 코드 예제</text>

  <rect x="60" y="62" width="760" height="310" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text xml:space="preserve" x="84" y="88" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">from</text>
  <text xml:space="preserve" x="120" y="88" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> contextlib </text>
  <text xml:space="preserve" x="230" y="88" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">import</text>
  <text xml:space="preserve" x="280" y="88" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> ExitStack</text>

  <text xml:space="preserve" x="84" y="116" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">&#35; 동적 개수의 파일을 동시에 열기</text>
  <text xml:space="preserve" x="84" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">filenames = [</text>
  <text xml:space="preserve" x="163" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"a.csv"</text>
  <text xml:space="preserve" x="214" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">, </text>
  <text xml:space="preserve" x="228" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"b.csv"</text>
  <text xml:space="preserve" x="278" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">, </text>
  <text xml:space="preserve" x="292" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">"c.csv"</text>
  <text xml:space="preserve" x="342" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">]</text>

  <text xml:space="preserve" x="84" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">with</text>
  <text xml:space="preserve" x="117" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> ExitStack() </text>
  <text xml:space="preserve" x="237" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">as</text>
  <text xml:space="preserve" x="260" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> stack:</text>

  <text xml:space="preserve" x="84" y="184" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    files = [</text>
  <text xml:space="preserve" x="84" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">        stack.enter_context(open(fn))</text>
  <text xml:space="preserve" x="84" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">        for</text>
  <text xml:space="preserve" x="140" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> fn </text>
  <text xml:space="preserve" x="168" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">in</text>
  <text xml:space="preserve" x="190" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> filenames</text>
  <text xml:space="preserve" x="84" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    ]</text>
  <text xml:space="preserve" x="84" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    </text>
  <text xml:space="preserve" x="88" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">&#35; 모든 파일이 자동으로 닫힘</text>
  <text xml:space="preserve" x="84" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    process(files)</text>

  <text xml:space="preserve" x="84" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">&#35; callback 으로 임의 정리 함수 등록</text>
  <text xml:space="preserve" x="84" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">with</text>
  <text xml:space="preserve" x="117" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> ExitStack() </text>
  <text xml:space="preserve" x="237" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">as</text>
  <text xml:space="preserve" x="260" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> stack:</text>
  <text xml:space="preserve" x="84" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    stack.callback(cleanup_db)</text>
  <text xml:space="preserve" x="84" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    stack.callback(send_alert)</text>
</svg>
