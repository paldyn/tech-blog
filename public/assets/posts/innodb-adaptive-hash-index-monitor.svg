<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">AHI 모니터링 — 언제 끄고 언제 켤 것인가</text>

  <!-- SQL code -->
  <rect x="60" y="70" width="420" height="192" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="96" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#6a8aa0" xml:space="preserve">-- AHI 활성화 여부</text>
  <text x="76" y="114" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">SHOW</text>
  <text x="118" y="114" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e8e8e8" xml:space="preserve"> VARIABLES </text>
  <text x="240" y="114" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">LIKE</text>
  <text x="282" y="114" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ce9178" xml:space="preserve"> 'innodb_adaptive%'</text>
  <text x="76" y="132" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#6a8aa0" xml:space="preserve">-- AHI 적중률 (INNODB STATUS)</text>
  <text x="76" y="150" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">SHOW</text>
  <text x="118" y="150" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e8e8e8" xml:space="preserve"> ENGINE INNODB STATUS\G</text>
  <text x="76" y="168" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#6a8aa0" xml:space="preserve">-- ... Hash table size XXXX cells,</text>
  <text x="76" y="186" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#6a8aa0" xml:space="preserve">--     used cells Y, node heap has Z</text>
  <text x="76" y="204" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#6a8aa0" xml:space="preserve">-- A hash searches/s, B non-hash/s</text>
  <text x="76" y="222" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#6a8aa0" xml:space="preserve">-- 비율 A/(A+B) → 높을수록 효과적</text>
  <text x="76" y="240" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">SET</text>
  <text x="106" y="240" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e8e8e8" xml:space="preserve"> GLOBAL innodb_adaptive_hash_index = </text>
  <text x="486" y="240" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" xml:space="preserve">OFF</text>

  <!-- When to disable -->
  <rect x="500" y="70" width="340" height="192" rx="6" fill="#111827" stroke="#2a2a40"/>
  <text x="670" y="96" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">AHI 비활성화 권장 상황</text>

  <text x="516" y="122" font-size="13" fill="#e05555">⚠ 랜덤 조회 패턴</text>
  <text x="516" y="140" font-size="12" fill="#888">같은 키를 반복 탐색하지 않는</text>
  <text x="516" y="156" font-size="12" fill="#888">워크로드 → AHI Hit율 낮음</text>

  <text x="516" y="180" font-size="13" fill="#e05555">⚠ RW Latch 경합</text>
  <text x="516" y="198" font-size="12" fill="#888">AHI 내부 RW Latch가 병목일 때</text>
  <text x="516" y="214" font-size="12" fill="#888">(고동시성 OLTP)</text>

  <text x="516" y="238" font-size="13" fill="#e05555">⚠ JOIN 위주 OLAP</text>
  <text x="516" y="256" font-size="12" fill="#888">대용량 조인은 해시로 이득 없음</text>

  <!-- When to keep -->
  <rect x="60" y="285" width="760" height="76" rx="8" fill="#0f2a1a" stroke="#2a4a2a"/>
  <text x="440" y="308" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">AHI 유지 권장 상황 (기본 ON)</text>
  <text x="250" y="336" text-anchor="middle" font-size="13" fill="#888">PK 또는 단일 컬럼 인덱스로 반복 조회</text>
  <text x="650" y="336" text-anchor="middle" font-size="13" fill="#888">세션/사용자 조회처럼 동일 키 집중 트래픽</text>
  <text x="250" y="352" text-anchor="middle" font-size="12" fill="#888">(e-commerce 상품 상세 페이지 등)</text>
  <text x="650" y="352" text-anchor="middle" font-size="12" fill="#888">read-heavy OLTP</text>
</svg>
