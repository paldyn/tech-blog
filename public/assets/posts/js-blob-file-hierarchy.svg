<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">Blob · File · FileReader 계층</text>

  <!-- Blob 박스 -->
  <rect x="290" y="76" width="300" height="80" fill="#111827" rx="8" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="108" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" text-anchor="middle">Blob</text>
  <text x="440" y="130" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">불변 이진 데이터 | size · type</text>

  <!-- 화살표: Blob → File -->
  <line x1="440" y1="156" x2="440" y2="186" stroke="#55c555" stroke-width="2"/>
  <polygon points="440,192 434,182 446,182" fill="#55c555"/>
  <text x="460" y="176" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12">extends</text>

  <!-- File 박스 -->
  <rect x="290" y="196" width="300" height="80" fill="#111827" rx="8" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="228" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" text-anchor="middle">File</text>
  <text x="440" y="250" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">name · lastModified + Blob</text>

  <!-- FileReader 박스 -->
  <rect x="60" y="196" width="180" height="80" fill="#111827" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="150" y="228" fill="#7777cc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" text-anchor="middle">FileReader</text>
  <text x="150" y="248" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">이벤트 기반 읽기</text>
  <!-- 화살표: File → FileReader -->
  <line x1="290" y1="236" x2="240" y2="236" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Blob.arrayBuffer() / text() / stream() 박스 -->
  <rect x="640" y="196" width="200" height="80" fill="#111827" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="740" y="218" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" text-anchor="middle">Blob 메서드</text>
  <text x="740" y="238" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">.text() → Promise&lt;string&gt;</text>
  <text x="740" y="254" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">.arrayBuffer() → Promise</text>
  <text x="740" y="270" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">.stream() → ReadableStream</text>
  <!-- 화살표 -->
  <line x1="590" y1="236" x2="640" y2="236" stroke="#e05555" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- 코드 블록 -->
  <rect x="60" y="316" width="760" height="100" fill="#070b14" rx="6" stroke="#1e2433"/>
  <text x="80" y="342" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// Blob 생성</text>
  <text x="80" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">const</tspan><tspan fill="#e8e8e8"> blob = new Blob([</tspan><tspan fill="#ce9178">'Hello'</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#ce9178">' World'</tspan><tspan fill="#e8e8e8">], { type: </tspan><tspan fill="#ce9178">'text/plain'</tspan><tspan fill="#e8e8e8"> });</tspan></text>

  <text x="80" y="378" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">blob.size;    </text>
  <text x="200" y="378" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// 11</text>
  <text x="80" y="396" xml:space="preserve" fill="#e8e8e8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">await blob.text();  </text>
  <text x="240" y="396" xml:space="preserve" fill="#6a8aa0" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// 'Hello World'</text>
</svg>
