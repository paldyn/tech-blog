<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <!-- 배경 -->
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">OpenFeign 핵심 코드 패턴</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">설정 → 인터페이스 → 서비스 호출 → 커스텀 설정</text>

  <!-- 의존성 + FeignClient 코드 (좌측) -->
  <rect x="60" y="100" width="360" height="180" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" xml:space="preserve">// build.gradle</text>
  <text x="76" y="143" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">implementation</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">'org.springframework.cloud</tspan></text>
  <text x="76" y="161" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">  :spring-cloud-starter-openfeign'</text>
  <text x="76" y="185" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" xml:space="preserve">// @FeignClient 선언</text>
  <text x="76" y="203" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">@FeignClient</tspan><tspan fill="#ffffff">(name = </tspan><tspan fill="#ce9178">"product-service"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="76" y="221" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">public interface</tspan><tspan fill="#ffffff"> ProductClient {</tspan></text>
  <text x="76" y="239" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    <tspan font-weight="600" fill="#7ec8e3">@GetMapping</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"/products/{id}"</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="76" y="257" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    Product findById(<tspan font-weight="600" fill="#7ec8e3">@PathVariable</tspan><tspan fill="#ffffff"> Long id);</tspan></text>
  <text x="76" y="275" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>

  <!-- 서비스 호출 코드 (우측) -->
  <rect x="460" y="100" width="360" height="180" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="476" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" xml:space="preserve">// OrderService.java</text>
  <text x="476" y="143" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">@Service</tspan></text>
  <text x="476" y="161" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">public class</tspan><tspan fill="#ffffff"> OrderService {</tspan></text>
  <text x="476" y="179" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    <tspan font-weight="600" fill="#7ec8e3">private final</tspan><tspan fill="#ffffff"> ProductClient client;</tspan></text>
  <text x="476" y="203" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    <tspan font-weight="600" fill="#7ec8e3">public</tspan><tspan fill="#ffffff"> Order createOrder(Long pid) {</tspan></text>
  <text x="476" y="221" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">        Product p = client.findById(pid);</text>
  <text x="476" y="239" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">        // 단순 메서드 호출로 HTTP 완료</text>
  <text x="476" y="257" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">        <tspan font-weight="600" fill="#7ec8e3">return new</tspan><tspan fill="#ffffff"> Order(p);</tspan></text>
  <text x="476" y="275" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    }</text>

  <!-- RequestInterceptor 코드 (좌측 하단) -->
  <rect x="60" y="305" width="360" height="175" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="327" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" xml:space="preserve">// 공통 헤더 추가 (인증 토큰 등)</text>
  <text x="76" y="345" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">@Component</tspan></text>
  <text x="76" y="363" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">public class</tspan><tspan fill="#ffffff"> AuthInterceptor</tspan></text>
  <text x="76" y="381" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">        <tspan font-weight="600" fill="#7ec8e3">implements</tspan><tspan fill="#ffffff"> RequestInterceptor {</tspan></text>
  <text x="76" y="399" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    <tspan font-weight="600" fill="#7ec8e3">public void</tspan><tspan fill="#ffffff"> apply(RequestTemplate t) {</tspan></text>
  <text x="76" y="417" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">        t.header(<tspan fill="#ce9178">"Authorization"</tspan>,</text>
  <text x="76" y="435" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">            <tspan fill="#ce9178">"Bearer "</tspan><tspan fill="#ffffff"> + getToken());</tspan></text>
  <text x="76" y="453" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    }</text>
  <text x="76" y="471" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>

  <!-- ErrorDecoder 코드 (우측 하단) -->
  <rect x="460" y="305" width="360" height="175" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="476" y="327" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" xml:space="preserve">// 에러 응답 → 비즈니스 예외 변환</text>
  <text x="476" y="345" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">@Component</tspan></text>
  <text x="476" y="363" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">public class</tspan><tspan fill="#ffffff"> FeignErrorDecoder</tspan></text>
  <text x="476" y="381" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">        <tspan font-weight="600" fill="#7ec8e3">implements</tspan><tspan fill="#ffffff"> ErrorDecoder {</tspan></text>
  <text x="476" y="399" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    <tspan font-weight="600" fill="#7ec8e3">public</tspan><tspan fill="#ffffff"> Exception decode(String m,</tspan></text>
  <text x="476" y="417" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">                               Response r) {</text>
  <text x="476" y="435" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">        <tspan font-weight="600" fill="#7ec8e3">if</tspan><tspan fill="#ffffff"> (r.status() == </tspan><tspan fill="#b5cea8">404</tspan><tspan fill="#ffffff">)</tspan></text>
  <text x="476" y="453" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">            <tspan font-weight="600" fill="#7ec8e3">return new</tspan><tspan fill="#ffffff"> NotFoundException();</tspan></text>
  <text x="476" y="471" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">    }</text>
</svg>
