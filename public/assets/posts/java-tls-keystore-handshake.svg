<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="tlsArr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="tlsArrG" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">TLS 핸드셰이크 흐름</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">인증서 검증 후 세션 키를 합의하고 암호화 통신을 시작한다</text>

  <!-- Client / Server headers -->
  <rect x="90" y="98" width="220" height="46" rx="8" fill="#101020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="200" y="127" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc">클라이언트</text>

  <rect x="570" y="98" width="220" height="46" rx="8" fill="#102010" stroke="#55c555" stroke-width="1.5"/>
  <text x="680" y="127" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">서버</text>

  <!-- lifelines -->
  <line x1="200" y1="150" x2="200" y2="410" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="680" y1="150" x2="680" y2="410" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Step 1 -->
  <text x="440" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">1. ClientHello (지원 암호군·TLS 버전)</text>
  <line x1="210" y1="192" x2="670" y2="192" stroke="#7ec8e3" stroke-width="2" marker-end="url(#tlsArr)"/>

  <!-- Step 2 -->
  <text x="440" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">2. ServerHello + 인증서(공개키)</text>
  <line x1="670" y1="240" x2="210" y2="240" stroke="#55c555" stroke-width="2" marker-end="url(#tlsArrG)"/>

  <!-- Step 3 -->
  <rect x="120" y="262" width="160" height="42" rx="6" fill="#1a1a10" stroke="#e0b055" stroke-width="1.5"/>
  <text x="200" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e0b055">3. 인증서 검증(TrustStore)</text>

  <!-- Step 4 -->
  <text x="440" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">4. 키 교환 · 세션 키 합의</text>
  <line x1="210" y1="346" x2="670" y2="346" stroke="#7ec8e3" stroke-width="2" marker-end="url(#tlsArr)"/>

  <!-- Step 5 -->
  <text x="440" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">5. 암호화된 애플리케이션 데이터</text>
  <line x1="210" y1="394" x2="670" y2="394" stroke="#55c555" stroke-width="2" marker-end="url(#tlsArrG)"/>
  <line x1="670" y1="394" x2="670" y2="394" stroke="#55c555" stroke-width="2"/>
</svg>
