<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Truthy/Falsy 활용 패턴</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">관용구 · __bool__ 커스텀 · 주의사항</text>

  <!-- Left: common idioms -->
  <rect x="60" y="100" width="380" height="270" rx="10" fill="#111520" stroke="#1e2433"/>
  <text x="250" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Python 관용구</text>
  <rect x="80" y="140" width="340" height="212" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="96" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># 빈 컬렉션 검사</tspan></text>
  <text x="96" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">if</tspan><tspan fill="#e8e8e8"> items:        </tspan><tspan fill="#6a8aa0"># len(items) > 0 보다 선호</tspan></text>
  <text x="96" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">if not</tspan><tspan fill="#e8e8e8"> items:     </tspan><tspan fill="#6a8aa0"># len(items) == 0</tspan></text>
  <text x="96" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># or 기본값 패턴</tspan></text>
  <text x="96" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">name = user_input </tspan><tspan fill="#7ec8e3">or</tspan><tspan fill="#e8e8e8"> </tspan><tspan fill="#ce9178">"guest"</tspan></text>
  <text x="96" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">val = d.get(</tspan><tspan fill="#ce9178">"k"</tspan><tspan fill="#e8e8e8">) </tspan><tspan fill="#7ec8e3">or</tspan><tspan fill="#e8e8e8"> default</tspan></text>
  <text x="96" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># and 단락 평가</tspan></text>
  <text x="96" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">obj </tspan><tspan fill="#7ec8e3">and</tspan><tspan fill="#e8e8e8"> obj.method()</tspan></text>
  <text x="96" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># all / any</tspan></text>
  <text x="96" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">all</tspan><tspan fill="#e8e8e8">([</tspan><tspan fill="#7ec8e3">True</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#ce9178">"hi"</tspan><tspan fill="#e8e8e8">])  </tspan><tspan fill="#6a8aa0"># True</tspan></text>
  <text x="96" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">any</tspan><tspan fill="#e8e8e8">([</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#7ec8e3">None</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#ce9178">"x"</tspan><tspan fill="#e8e8e8">]) </tspan><tspan fill="#6a8aa0"># True</tspan></text>

  <!-- Right: custom __bool__ -->
  <rect x="460" y="100" width="360" height="270" rx="10" fill="#111520" stroke="#1e2433"/>
  <text x="640" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">__bool__ 커스텀</text>
  <rect x="480" y="140" width="320" height="212" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="496" y="162" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">class</tspan><tspan fill="#e8e8e8"> Bag:</tspan></text>
  <text x="496" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    </tspan><tspan fill="#7ec8e3">def</tspan><tspan fill="#e8e8e8"> __init__(self, items):</tspan></text>
  <text x="496" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">        self.items = items</tspan></text>
  <text x="496" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">    </tspan><tspan fill="#7ec8e3">def</tspan><tspan fill="#e8e8e8"> __bool__(self):</tspan></text>
  <text x="496" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">        </tspan><tspan fill="#7ec8e3">return</tspan><tspan fill="#e8e8e8"> </tspan><tspan fill="#7ec8e3">bool</tspan><tspan fill="#e8e8e8">(self.items)</tspan></text>
  <text x="496" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"></tspan></text>
  <text x="496" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">bag = Bag([</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#e8e8e8">])</tspan></text>
  <text x="496" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">if</tspan><tspan fill="#e8e8e8"> bag:   </tspan><tspan fill="#6a8aa0"># True (원소 있음)</tspan></text>
  <text x="496" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"></tspan></text>
  <text x="496" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># __bool__ 없으면 __len__ 사용</tspan></text>
  <text x="496" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#6a8aa0"># 둘 다 없으면 항상 True</tspan></text>
</svg>
