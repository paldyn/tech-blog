<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">내장 함수형 인터페이스 — 코드 예제</text>

  <!-- Function -->
  <text x="60" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Function&lt;T,R&gt; — 변환</text>
  <rect x="60" y="90" width="380" height="104" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="110" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan font-weight="600" fill="#7ec8e3">Function</tspan><tspan fill="#ffffff">&lt;String, Integer&gt; length</tspan></text>
  <text x="76" y="126" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff">    = </tspan><tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff">::length;</tspan></text>
  <text x="76" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan font-weight="600" fill="#7ec8e3">Function</tspan><tspan fill="#ffffff">&lt;Integer, String&gt; intStr</tspan></text>
  <text x="76" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff">    = </tspan><tspan font-weight="600" fill="#7ec8e3">Object</tspan><tspan fill="#ffffff">::toString;</tspan></text>
  <text x="76" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#9aa4b8">// andThen 조합: "hello" -&gt; 5 -&gt; "5"</tspan></text>
  <text x="76" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan font-weight="600" fill="#7ec8e3">var</tspan><tspan fill="#ffffff"> len2str = length.andThen(intStr);</tspan></text>

  <!-- Consumer -->
  <text x="460" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Consumer&lt;T&gt; — 소비</text>
  <rect x="460" y="90" width="360" height="104" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="110" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan font-weight="600" fill="#7ec8e3">Consumer</tspan><tspan fill="#ffffff">&lt;String&gt; print</tspan></text>
  <text x="476" y="126" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff">    = </tspan><tspan font-weight="600" fill="#7ec8e3">System</tspan><tspan fill="#ffffff">.out::println;</tspan></text>
  <text x="476" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#9aa4b8">// andThen 체이닝: 로그 + 출력 순서대로</tspan></text>
  <text x="476" y="158" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan font-weight="600" fill="#7ec8e3">Consumer</tspan><tspan fill="#ffffff">&lt;String&gt; logAndPrint</tspan></text>
  <text x="476" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff">    = logger::info.andThen(print);</tspan></text>

  <!-- Supplier -->
  <text x="60" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Supplier&lt;T&gt; — 공급</text>
  <rect x="60" y="226" width="380" height="104" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan font-weight="600" fill="#7ec8e3">Supplier</tspan><tspan fill="#ffffff">&lt;List&lt;String&gt;&gt; factory</tspan></text>
  <text x="76" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff">    = </tspan><tspan font-weight="600" fill="#7ec8e3">ArrayList</tspan><tspan fill="#ffffff">::new;</tspan></text>
  <text x="76" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#9aa4b8">// 지연 평가: 필요할 때만 생성</tspan></text>
  <text x="76" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan font-weight="600" fill="#7ec8e3">Optional</tspan><tspan fill="#ffffff">&lt;String&gt; opt = </tspan><tspan font-weight="600" fill="#7ec8e3">Optional</tspan><tspan fill="#ffffff">.empty();</tspan></text>
  <text x="76" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff"> val = opt.orElseGet(() -&gt; </tspan><tspan fill="#ce9178">"default"</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="76" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#9aa4b8">// 빈 Optional일 때만 람다 실행</tspan></text>

  <!-- Predicate -->
  <text x="460" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Predicate&lt;T&gt; — 검사</text>
  <rect x="460" y="226" width="360" height="104" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="246" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan font-weight="600" fill="#7ec8e3">Predicate</tspan><tspan fill="#ffffff">&lt;String&gt; notEmpty</tspan></text>
  <text x="476" y="262" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff">    = s -&gt; !s.isEmpty();</tspan></text>
  <text x="476" y="278" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan font-weight="600" fill="#7ec8e3">Predicate</tspan><tspan fill="#ffffff">&lt;String&gt; startA</tspan></text>
  <text x="476" y="294" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#ffffff">    = s -&gt; s.startsWith(</tspan><tspan fill="#ce9178">"A"</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="476" y="310" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#9aa4b8">// and / or / negate 조합</tspan></text>
  <text x="476" y="326" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan font-weight="600" fill="#7ec8e3">var</tspan><tspan fill="#ffffff"> valid = notEmpty.and(startA);</tspan></text>

  <!-- UnaryOperator -->
  <rect x="60" y="350" width="760" height="60" rx="8" fill="#0d0d25" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">UnaryOperator&lt;T&gt;  =  Function&lt;T, T&gt;   |   BinaryOperator&lt;T&gt;  =  BiFunction&lt;T, T, T&gt;</text>
  <text x="440" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">예:  UnaryOperator&lt;String&gt; trim = String::trim;    BinaryOperator&lt;Integer&gt; max = Integer::max;</text>

  <text x="440" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Stream.map()은 Function, Stream.filter()는 Predicate, Stream.forEach()는 Consumer 타입을 받음</text>
</svg>
