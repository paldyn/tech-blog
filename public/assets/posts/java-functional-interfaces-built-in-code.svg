<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">내장 함수형 인터페이스 — 코드 예제</text>

  <!-- Function -->
  <text x="60" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Function&lt;T,R&gt; — 변환</text>
  <rect x="60" y="90" width="380" height="104" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="112" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan font-weight="600" fill="#7ec8e3">Function</tspan><tspan fill="#ffffff">&lt;</tspan><tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff">, </tspan><tspan font-weight="600" fill="#7ec8e3">Integer</tspan><tspan fill="#ffffff">&gt; length = </tspan><tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff">::</tspan><tspan font-weight="600" fill="#7ec8e3">length</tspan><tspan fill="#ffffff">;</tspan>
  </text>
  <text x="76" y="132" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan font-weight="600" fill="#7ec8e3">Function</tspan><tspan fill="#ffffff">&lt;</tspan><tspan font-weight="600" fill="#7ec8e3">Integer</tspan><tspan fill="#ffffff">, </tspan><tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff">&gt; intStr = </tspan><tspan font-weight="600" fill="#7ec8e3">Object</tspan><tspan fill="#ffffff">::</tspan><tspan font-weight="600" fill="#7ec8e3">toString</tspan><tspan fill="#ffffff">;</tspan>
  </text>
  <text x="76" y="152" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// andThen 조합</text>
  <text x="76" y="172" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan font-weight="600" fill="#7ec8e3">Function</tspan><tspan fill="#ffffff">&lt;</tspan><tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff">, </tspan><tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff">&gt; len2str = length.</tspan><tspan font-weight="600" fill="#7ec8e3">andThen</tspan><tspan fill="#ffffff">(intStr);</tspan>
  </text>
  <text x="76" y="185" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// "hello" -&gt; 5 -&gt; "5"</text>

  <!-- Consumer -->
  <text x="460" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Consumer&lt;T&gt; — 소비</text>
  <rect x="460" y="90" width="360" height="104" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="112" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan font-weight="600" fill="#7ec8e3">Consumer</tspan><tspan fill="#ffffff">&lt;</tspan><tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff">&gt; print = </tspan><tspan font-weight="600" fill="#7ec8e3">System</tspan><tspan fill="#ffffff">.out::</tspan><tspan font-weight="600" fill="#7ec8e3">println</tspan><tspan fill="#ffffff">;</tspan>
  </text>
  <text x="476" y="132" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// andThen 체이닝</text>
  <text x="476" y="152" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan font-weight="600" fill="#7ec8e3">Consumer</tspan><tspan fill="#ffffff">&lt;</tspan><tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff">&gt; logAndPrint =</tspan>
  </text>
  <text x="476" y="172" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    logger::</tspan><tspan font-weight="600" fill="#7ec8e3">info</tspan><tspan fill="#ffffff">.</tspan><tspan font-weight="600" fill="#7ec8e3">andThen</tspan><tspan fill="#ffffff">(print);</tspan>
  </text>
  <text x="476" y="185" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 로그 + 출력을 순서대로</text>

  <!-- Supplier -->
  <text x="60" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Supplier&lt;T&gt; — 공급</text>
  <rect x="60" y="226" width="380" height="104" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="248" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan font-weight="600" fill="#7ec8e3">Supplier</tspan><tspan fill="#ffffff">&lt;</tspan><tspan font-weight="600" fill="#7ec8e3">List</tspan><tspan fill="#ffffff">&lt;</tspan><tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff">&gt;&gt; factory = ArrayList::</tspan><tspan font-weight="600" fill="#7ec8e3">new</tspan><tspan fill="#ffffff">;</tspan>
  </text>
  <text x="76" y="268" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 지연 평가: 필요할 때만 생성</text>
  <text x="76" y="288" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan font-weight="600" fill="#7ec8e3">Optional</tspan><tspan fill="#ffffff">&lt;</tspan><tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff">&gt; opt = </tspan><tspan font-weight="600" fill="#7ec8e3">Optional</tspan><tspan fill="#ffffff">.</tspan><tspan font-weight="600" fill="#7ec8e3">empty</tspan><tspan fill="#ffffff">();</tspan>
  </text>
  <text x="76" y="308" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff"> val = opt.</tspan><tspan font-weight="600" fill="#7ec8e3">orElseGet</tspan><tspan fill="#ffffff">(() -&gt; </tspan><tspan fill="#ce9178">"default"</tspan><tspan fill="#ffffff">);</tspan>
  </text>
  <text x="76" y="320" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 빈 Optional일 때만 람다 실행</text>

  <!-- Predicate -->
  <text x="460" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Predicate&lt;T&gt; — 검사</text>
  <rect x="460" y="226" width="360" height="104" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="248" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan font-weight="600" fill="#7ec8e3">Predicate</tspan><tspan fill="#ffffff">&lt;</tspan><tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff">&gt; notEmpty = s -&gt; !s.</tspan><tspan font-weight="600" fill="#7ec8e3">isEmpty</tspan><tspan fill="#ffffff">();</tspan>
  </text>
  <text x="476" y="268" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan font-weight="600" fill="#7ec8e3">Predicate</tspan><tspan fill="#ffffff">&lt;</tspan><tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff">&gt; startA = s -&gt; s.</tspan><tspan font-weight="600" fill="#7ec8e3">startsWith</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#ce9178">"A"</tspan><tspan fill="#ffffff">);</tspan>
  </text>
  <text x="476" y="288" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// and / or / negate 조합</text>
  <text x="476" y="308" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan font-weight="600" fill="#7ec8e3">Predicate</tspan><tspan fill="#ffffff">&lt;</tspan><tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff">&gt; valid = notEmpty.</tspan><tspan font-weight="600" fill="#7ec8e3">and</tspan><tspan fill="#ffffff">(startA);</tspan>
  </text>
  <text x="476" y="320" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 비어있지 않으면서 A로 시작하는지</text>

  <!-- UnaryOperator -->
  <rect x="60" y="350" width="760" height="60" rx="8" fill="#0d0d25" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">UnaryOperator&lt;T&gt;  =  Function&lt;T, T&gt;   |   BinaryOperator&lt;T&gt;  =  BiFunction&lt;T, T, T&gt;</text>
  <text x="440" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">예:  UnaryOperator&lt;String&gt; trim = String::trim;    BinaryOperator&lt;Integer&gt; max = Integer::max;</text>

  <text x="440" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Stream.map()은 Function, Stream.filter()는 Predicate, Stream.forEach()는 Consumer 타입을 받음</text>
</svg>
