<svg xmlns="http://www.w3.org/2000/svg" width="880" height="640" viewBox="0 0 880 640">
  <!-- Background -->
  <rect width="880" height="640" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="42"
        text-anchor="middle"
        fill="#e8e8e8"
        font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif"
        font-size="19" font-weight="600">AI · ML · DL · LLM 개념의 포함 관계</text>

  <!-- ─── AI outer box ─── -->
  <rect x="60" y="60" width="760" height="540" rx="16"
        fill="#0c0e2a" stroke="#3b5bdb" stroke-width="1.5"/>
  <text x="84" y="94"
        fill="#748ffc"
        font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif"
        font-size="16" font-weight="700">AI · 인공지능 (Artificial Intelligence)</text>
  <text x="84" y="114"
        fill="#5c7cfa"
        font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif"
        font-size="12">규칙 기반부터 학습 기반까지 — 인간의 지능을 모방하는 모든 컴퓨터 기술의 총칭</text>

  <!-- ─── ML box ─── -->
  <rect x="110" y="135" width="660" height="435" rx="13"
        fill="#07180f" stroke="#0ca678" stroke-width="1.5"/>
  <text x="134" y="165"
        fill="#38d9a9"
        font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif"
        font-size="16" font-weight="700">ML · 머신러닝 (Machine Learning)</text>
  <text x="134" y="185"
        fill="#2db88f"
        font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif"
        font-size="12">명시적 규칙 없이 데이터에서 패턴을 스스로 학습 — AI의 하위 분야</text>

  <!-- ML example tags -->
  <text x="134" y="206"
        fill="#1a7a58"
        font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif"
        font-size="11">예: 결정 트리 · 랜덤 포레스트 · SVM · XGBoost · 선형·로지스틱 회귀</text>

  <!-- ─── DL box ─── -->
  <rect x="160" y="220" width="560" height="322" rx="10"
        fill="#190e00" stroke="#e67700" stroke-width="1.5"/>
  <text x="184" y="249"
        fill="#ffa94d"
        font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif"
        font-size="16" font-weight="700">DL · 딥러닝 (Deep Learning)</text>
  <text x="184" y="269"
        fill="#fd8c3e"
        font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif"
        font-size="12">신경망을 수십~수백 레이어로 쌓아 고차원 표현을 자동 학습 — ML의 하위 분야</text>

  <!-- DL example tags -->
  <text x="184" y="290"
        fill="#7a4e00"
        font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif"
        font-size="11">예: CNN (이미지 분류) · RNN (시계열) · 트랜스포머 (언어 모델) · GAN (생성)</text>

  <!-- ─── LLM box ─── -->
  <rect x="210" y="305" width="460" height="212" rx="8"
        fill="#140000" stroke="#e03131" stroke-width="1.5"/>
  <text x="234" y="334"
        fill="#ff6b6b"
        font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif"
        font-size="16" font-weight="700">LLM · 대형 언어 모델 (Large Language Model)</text>
  <text x="234" y="354"
        fill="#e05252"
        font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif"
        font-size="12">수천억 파라미터로 방대한 텍스트 학습 — 다음 토큰 예측으로 언어를 생성하는 딥러닝 모델</text>

  <!-- Code block inside LLM -->
  <rect x="234" y="370" width="408" height="128" rx="6"
        fill="#070b14" stroke="#1e2a3a" stroke-width="1"/>
  <!-- tab bar -->
  <rect x="234" y="370" width="408" height="22" rx="6" fill="#0d1622"/>
  <rect x="234" y="381" width="408" height="11" fill="#0d1622"/>
  <text x="252" y="385"
        fill="#3a4a5a"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10">대표 LLM</text>

  <text x="252" y="408" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11">GPT-4o        OpenAI      추론 · 코딩 · 멀티모달</text>
  <text x="252" y="424" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11">Claude 3.5    Anthropic   안전 · 대화 · 분석</text>
  <text x="252" y="440" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11">Gemini 1.5    Google      멀티모달 · 검색</text>
  <text x="252" y="456" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11">LLaMA 3.1     Meta        오픈소스 공개</text>
  <text x="252" y="472" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11">HyperCLOVA X  NAVER       한국어 특화</text>

  <!-- Footer -->
  <text x="440" y="622"
        text-anchor="middle"
        fill="#333"
        font-family="'Wanted Sans Variable','Noto Sans KR',sans-serif"
        font-size="11">PALDYN · AI Basics Series #1</text>
</svg>
