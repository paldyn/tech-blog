<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" width="880" height="420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Bash · Zsh · Fish 비교</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">주요 특징과 호환성 비교</text>

  <!-- Header -->
  <rect x="60" y="90" width="760" height="36" fill="#161616" rx="4"/>
  <text x="190" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#888" text-anchor="middle">항목</text>
  <text x="380" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555" text-anchor="middle">Bash</text>
  <text x="560" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">Zsh</text>
  <text x="740" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">Fish</text>

  <!-- Row 1 -->
  <rect x="60" y="130" width="760" height="36" fill="#0d1a0d" rx="0"/>
  <text x="190" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">POSIX 호환</text>
  <text x="380" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">✓ 완전 호환</text>
  <text x="560" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">✓ 대부분 호환</text>
  <text x="740" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">✗ 비호환</text>

  <!-- Row 2 -->
  <rect x="60" y="170" width="760" height="36" fill="#0a0a0a" rx="0"/>
  <text x="190" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">자동완성 품질</text>
  <text x="380" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">기본 수준</text>
  <text x="560" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">플러그인으로 강화</text>
  <text x="740" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">기본이 최강</text>

  <!-- Row 3 -->
  <rect x="60" y="210" width="760" height="36" fill="#0d1a0d" rx="0"/>
  <text x="190" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">실시간 문법 강조</text>
  <text x="380" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">✗ 기본 없음</text>
  <text x="560" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">플러그인(zsh-syntax)</text>
  <text x="740" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">✓ 기본 내장</text>

  <!-- Row 4 -->
  <rect x="60" y="250" width="760" height="36" fill="#0a0a0a" rx="0"/>
  <text x="190" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">역사 기반 제안</text>
  <text x="380" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">✗ 기본 없음</text>
  <text x="560" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">zsh-autosuggestions</text>
  <text x="740" y="273" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">✓ 기본 내장</text>

  <!-- Row 5 -->
  <rect x="60" y="290" width="760" height="36" fill="#0d1a0d" rx="0"/>
  <text x="190" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">학습 곡선</text>
  <text x="380" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">중간</text>
  <text x="560" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">중간~높음</text>
  <text x="740" y="313" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">낮음</text>

  <!-- Row 6 -->
  <rect x="60" y="330" width="760" height="36" fill="#0a0a0a" rx="0"/>
  <text x="190" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">시스템 기본 셸</text>
  <text x="380" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">대부분 Linux</text>
  <text x="560" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">macOS (Catalina+)</text>
  <text x="740" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#aaa" text-anchor="middle">별도 설치</text>

  <!-- Column dividers -->
  <line x1="280" y1="90" x2="280" y2="366" stroke="#222" stroke-width="1"/>
  <line x1="470" y1="90" x2="470" y2="366" stroke="#222" stroke-width="1"/>
  <line x1="650" y1="90" x2="650" y2="366" stroke="#222" stroke-width="1"/>

  <text x="440" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">스크립팅은 bash, 인터랙티브 작업은 zsh(Oh My Zsh) 또는 fish를 조합하는 경우가 많다</text>
</svg>
