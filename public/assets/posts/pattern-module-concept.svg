<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">모듈 패턴의 진화</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">IIFE → Revealing Module → ES Module</text>

  <!-- IIFE Module -->
  <rect x="50" y="96" width="240" height="30" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="170" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">① IIFE 모듈 (ES5 이전)</text>

  <rect x="50" y="136" width="240" height="100" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="170" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">즉시 실행 함수로 스코프 격리</text>
  <text x="170" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">private: 클로저 내 변수</text>
  <text x="170" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">public: 반환 객체</text>
  <text x="170" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">⚠ 전역 변수 오염 가능</text>

  <!-- Revealing Module -->
  <rect x="320" y="96" width="240" height="30" rx="6" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">② Revealing Module (ES5)</text>

  <rect x="320" y="136" width="240" height="100" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">private 함수 내부 정의</text>
  <text x="440" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">명시적으로 노출할 것만 반환</text>
  <text x="440" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">내부 포인터 참조로 일관성 유지</text>
  <text x="440" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓ 더 명확한 공개 API</text>

  <!-- ES Module -->
  <rect x="590" y="96" width="240" height="30" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="710" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">③ ES Module (ES2015+)</text>

  <rect x="590" y="136" width="240" height="100" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="710" y="160" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">파일 단위 스코프 자동 격리</text>
  <text x="710" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">export 선언 = 공개 API</text>
  <text x="710" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">정적 분석·트리쉐이킹 지원</text>
  <text x="710" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓ 현대 표준</text>

  <!-- arrows between sections -->
  <line x1="290" y1="186" x2="318" y2="186" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="560" y1="186" x2="588" y2="186" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ES Module details -->
  <text x="440" y="280" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">ES Module 핵심 특성</text>

  <rect x="50" y="296" width="180" height="80" rx="6" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="140" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">정적 바인딩</text>
  <text x="140" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">import가 live binding</text>
  <text x="140" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">원본 값 변경 반영</text>

  <rect x="250" y="296" width="180" height="80" rx="6" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="340" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">싱글턴 캐시</text>
  <text x="340" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">한 번만 실행·평가</text>
  <text x="340" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">재import시 캐시 반환</text>

  <rect x="450" y="296" width="180" height="80" rx="6" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="540" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc">엄격 모드 기본</text>
  <text x="540" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">'use strict' 자동</text>
  <text x="540" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">top-level this = undefined</text>

  <rect x="650" y="296" width="180" height="80" rx="6" fill="#111" stroke="#e05555" stroke-width="1"/>
  <text x="740" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">비동기 로딩</text>
  <text x="740" y="340" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">동적 import()</text>
  <text x="740" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">코드 스플리팅 기반</text>

  <text x="440" y="430" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">모듈 패턴은 캡슐화·의존성 관리·재사용성을 동시에 해결하는 설계 원칙</text>
</svg>
