<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-p" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8a020"/>
    </marker>
  </defs>

  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">HPA 커스텀 메트릭 파이프라인</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">Prometheus → Adapter → custom.metrics.k8s.io → HPA</text>

  <!-- App -->
  <rect x="60" y="98" width="130" height="64" fill="#0f1923" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="125" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">App Pod</text>
  <text x="125" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">/metrics 노출</text>
  <text x="125" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">http_requests_total</text>

  <!-- Arrow App → Prometheus -->
  <line x1="190" y1="130" x2="236" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>

  <!-- Prometheus -->
  <rect x="236" y="98" width="140" height="64" fill="#1a0e0a" rx="8" stroke="#e8a020" stroke-width="1.5"/>
  <text x="306" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8a020" text-anchor="middle">Prometheus</text>
  <text x="306" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">메트릭 스크랩</text>
  <text x="306" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">TSDB 저장</text>

  <!-- Arrow Prometheus → Adapter -->
  <line x1="376" y1="130" x2="422" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>

  <!-- Prometheus Adapter -->
  <rect x="422" y="98" width="160" height="64" fill="#0f1923" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="502" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Prometheus</text>
  <text x="502" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Adapter</text>
  <text x="502" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">PromQL → k8s API 변환</text>

  <!-- Arrow Adapter → API Server -->
  <line x1="582" y1="130" x2="626" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>

  <!-- API Server -->
  <rect x="626" y="98" width="140" height="64" fill="#0f1923" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="696" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">kube-apiserver</text>
  <text x="696" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">custom.metrics</text>
  <text x="696" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">.k8s.io API</text>

  <!-- HPA -->
  <rect x="786" y="98" width="74" height="64" fill="#1a1420" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="823" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">HPA</text>
  <text x="823" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">스케일</text>

  <line x1="766" y1="130" x2="786" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-b)"/>

  <!-- Labels under arrows -->
  <text x="306" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">scrape</text>
  <text x="502" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">쿼리 변환</text>
  <text x="696" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">API 등록</text>

  <!-- Adapter config box -->
  <rect x="60" y="200" width="760" height="100" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#888"># Prometheus Adapter rules 설정</text>
  <text x="80" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#7ec8e3" font-weight="600">rules:</text>
  <text x="80" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#ffffff">- seriesQuery: 'http_requests_total{namespace!="",pod!=""}'</text>
  <text x="80" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#ffffff">  metricsQuery: 'sum(rate(&lt;&lt;.Series&gt;&gt;[2m])) by (&lt;&lt;.GroupBy&gt;&gt;)'</text>
  <text x="80" y="296" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="13" fill="#ffffff">  name: {as: "http_requests_per_second"}</text>

  <!-- HPA custom metric spec -->
  <rect x="60" y="316" width="760" height="140" fill="#0f1923" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">HPA 커스텀 메트릭 참조</text>

  <rect x="78" y="350" width="360" height="90" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="98" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="12" fill="#888"># Object 메트릭 (Ingress RPS)</text>
  <text x="98" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="12" fill="#ffffff">- type: Object</text>
  <text x="98" y="406" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="12" fill="#ffffff">  object: {metric: {name: http_requests}, target: {value: 1000}}</text>
  <text x="98" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="12" fill="#ffffff">  describedObject: {apiVersion: networking.k8s.io/v1, kind: Ingress}</text>

  <rect x="458" y="350" width="344" height="90" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="478" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="12" fill="#888"># Pods 메트릭 (Pod별 RPS)</text>
  <text x="478" y="388" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="12" fill="#ffffff">- type: Pods</text>
  <text x="478" y="406" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="12" fill="#ffffff">  pods:</text>
  <text x="478" y="424" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        xml:space="preserve" font-size="12" fill="#ffffff">    metric: {name: http_requests_per_second}</text>
</svg>
