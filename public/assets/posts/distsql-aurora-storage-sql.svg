<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Aurora 주요 기능 비교</text>

  <!-- Code: Global DB -->
  <rect x="60" y="68" width="760" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="90" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- Aurora Global Database: 1 Primary + 5 Secondary 리전</text>
  <text x="76" y="110" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 리전간 복제 지연: &lt;1초 / 재해복구 RTO &lt;1분</text>
  <text x="76" y="130" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">-- 애플리케이션은 리전별 엔드포인트에 연결</text>
  <text x="76" y="150" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">-- 읽기: Secondary 리전 (낮은 지연)</tspan>
  </text>
  <text x="76" y="170" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">SELECT</tspan><tspan fill="#ffffff"> * </tspan><tspan fill="#7ec8e3" font-weight="600">FROM</tspan><tspan fill="#ffffff"> products </tspan><tspan fill="#7ec8e3" font-weight="600">WHERE</tspan><tspan fill="#ffffff"> id = </tspan><tspan fill="#b5cea8">42</tspan><tspan fill="#ffffff">;</tspan>
  </text>
  <text x="76" y="190" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">-- 쓰기: Primary 리전으로만 (읽기 전용 secondary)</tspan>
  </text>
  <text x="76" y="210" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">INSERT INTO</tspan><tspan fill="#ffffff"> orders ...</tspan><tspan fill="#ffffff">; </tspan><tspan fill="#9aa4b8">-- Primary 엔드포인트에 연결</tspan>
  </text>

  <!-- Feature cards -->
  <rect x="60" y="240" width="224" height="66" rx="8" fill="#0e1c30" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="172" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Auto Scaling</text>
  <text x="172" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#c8c8c8" text-anchor="middle">읽기 복제본 자동 추가/제거</text>
  <text x="172" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">CPU 70% 초과 시 확장</text>

  <rect x="296" y="240" width="224" height="66" rx="8" fill="#0e1c30" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="408" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Serverless v2</text>
  <text x="408" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#c8c8c8" text-anchor="middle">0.5 ACU 단위 즉시 스케일</text>
  <text x="408" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">비활성 시 최소 비용</text>

  <rect x="532" y="240" width="288" height="66" rx="8" fill="#0e1c30" stroke="#3a6ea8" stroke-width="1.5"/>
  <text x="676" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Failover 30초 이내</text>
  <text x="676" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#c8c8c8" text-anchor="middle">Read Replica → Writer 자동 승격</text>
  <text x="676" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">스토리지 공유 → 복제 지연 없음</text>

  <text x="440" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Aurora = 완전 관리형 서비스 / RDS와 달리 스토리지가 자동 성장 / 수동 스토리지 프로비저닝 불필요</text>
</svg>
