<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">예시 기반 vs 속성 기반</text>

  <text x="60" y="92" font-size="16" font-weight="600" fill="#e8e8e8">예시 기반</text>
  <rect x="60" y="108" width="360" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">assert</text>
  <text xml:space="preserve" x="138" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">sorted([3,1,2])</text>
  <text xml:space="preserve" x="138" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">   == [1,2,3]</text>
  <text xml:space="preserve" x="76" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 내가 고른 입력 몇 개만</text>
  <text xml:space="preserve" x="76" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 놓친 경계값은 못 잡음</text>

  <text x="460" y="92" font-size="16" font-weight="600" fill="#e8e8e8">속성 기반 (Hypothesis)</text>
  <rect x="460" y="108" width="360" height="150" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="476" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">@given(lists(integers()))</text>
  <text xml:space="preserve" x="476" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">def</text>
  <text xml:space="preserve" x="518" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">test(xs):</text>
  <text xml:space="preserve" x="500" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600">assert</text>
  <text xml:space="preserve" x="562" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">sorted(xs) ==</text>
  <text xml:space="preserve" x="562" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  sorted(sorted(xs))</text>
  <text xml:space="preserve" x="476" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 수백 개 입력 자동 생성</text>

  <text x="60" y="296" font-size="13" fill="#888" xml:space="preserve">"입력이 무엇이든 성립해야 할 속성"을 적으면, 라이브러리가 다양한 입력으로 그 속성을 두드린다.</text>
</svg>
