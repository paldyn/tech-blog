<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">useSyncExternalStore 동작 원리</text>

  <!-- External Store -->
  <rect x="60" y="80" width="200" height="130" rx="8" fill="#1a100a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="160" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">외부 저장소</text>
  <text x="80" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• Redux store</text>
  <text x="80" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• Zustand store</text>
  <text x="80" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• window.navigator.onLine</text>
  <text x="80" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• 커스텀 EventEmitter</text>

  <!-- useSyncExternalStore hook -->
  <rect x="320" y="80" width="240" height="130" rx="8" fill="#0a1a20" stroke="#7ec8e3" stroke-width="2"/>
  <text x="440" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">useSyncExternalStore</text>
  <text x="340" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">subscribe(callback)</text>
  <text x="340" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">→ 저장소 변경 시 React에 알림</text>
  <text x="340" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">getSnapshot()</text>
  <text x="340" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">→ 현재 상태 값 반환</text>

  <!-- React Component -->
  <rect x="620" y="80" width="200" height="130" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="720" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">React 컴포넌트</text>
  <text x="640" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">useSyncExternalStore</text>
  <text x="640" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">가 반환한 값 사용</text>
  <text x="640" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">저장소 변경 → 자동</text>
  <text x="640" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">리렌더링</text>

  <!-- Arrows -->
  <line x1="260" y1="130" x2="318" y2="130" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="289" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3" text-anchor="middle">구독</text>

  <line x1="260" y1="155" x2="318" y2="155" stroke="#ce9178" stroke-width="2" marker-end="url(#arr)"/>
  <text x="289" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#ce9178" text-anchor="middle">스냅샷</text>

  <line x1="560" y1="145" x2="618" y2="145" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-purple)"/>
  <text x="589" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7777cc" text-anchor="middle">렌더</text>

  <!-- Store change notification -->
  <path d="M 160 210 Q 160 240 440 240 Q 720 240 720 210" stroke="#ce9178" stroke-width="2"
        stroke-dasharray="4,4" fill="none" marker-end="url(#arr)"/>
  <text x="440" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#ce9178" text-anchor="middle">저장소 변경 → callback() 호출 → React 리렌더 예약</text>

  <!-- Code section -->
  <rect x="60" y="278" width="760" height="152" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="300" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> value = </tspan><tspan fill="#7ec8e3" font-weight="600">useSyncExternalStore</tspan><tspan fill="#ffffff">(</tspan></text>
  <text x="76" y="319" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">  subscribe,       </tspan><tspan fill="#9aa4b8">// (callback) =&gt; unsubscribe 함수 반환</tspan></text>
  <text x="76" y="338" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">  getSnapshot,     </tspan><tspan fill="#9aa4b8">// () =&gt; 현재 스냅샷 반환. 동기적이어야 함</tspan></text>
  <text x="76" y="357" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">  getServerSnapshot </tspan><tspan fill="#9aa4b8">// 선택. SSR에서 쓸 초기값</tspan></text>
  <text x="76" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">);</tspan></text>
  <text x="76" y="395" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// subscribe는 컴포넌트 외부에 정의 (렌더마다 재생성 방지)</text>
  <text x="76" y="414" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// getSnapshot은 같은 상태면 동일 레퍼런스를 반환해야 함 (불필요한 리렌더 방지)</text>
</svg>
