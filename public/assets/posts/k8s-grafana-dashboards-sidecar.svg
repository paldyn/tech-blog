<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">사이드카 기반 대시보드 프로비저닝</text>

  <!-- ConfigMap code box -->
  <text x="240" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">대시보드 ConfigMap</text>

  <rect x="50" y="106" width="380" height="224" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="66" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">apiVersion</tspan>: v1</text>
  <text x="66" y="152" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">kind</tspan>: ConfigMap</text>
  <text x="66" y="172" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">metadata</tspan>:</text>
  <text x="66" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  name: api-dashboard</text>
  <text x="66" y="212" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  labels:</text>
  <text x="66" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    grafana_dashboard: <tspan fill="#ce9178">"1"</tspan></text>
  <text x="66" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">data</tspan>:</text>
  <text x="66" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  api-dashboard.json: |</text>
  <text x="66" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    {</text>
  <text x="66" y="312" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">      ...대시보드 JSON 모델...</text>

  <!-- right column flow -->
  <rect x="510" y="106" width="320" height="64" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="670" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Kubernetes API Server</text>
  <text x="670" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ConfigMap 생성 · 변경 감지 (watch)</text>

  <line x1="670" y1="170" x2="670" y2="216" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="510" y="216" width="320" height="64" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="670" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">k8s-sidecar 컨테이너</text>
  <text x="670" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">라벨 grafana_dashboard 붙은 ConfigMap 수집</text>

  <line x1="670" y1="280" x2="670" y2="326" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="510" y="326" width="320" height="64" rx="8" fill="#201a10" stroke="#ce9178" stroke-width="1.5"/>
  <text x="670" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">/tmp/dashboards/*.json</text>
  <text x="670" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">공유 emptyDir 볼륨에 JSON 파일 기록</text>

  <line x1="670" y1="390" x2="670" y2="436" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>

  <rect x="510" y="436" width="320" height="64" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="670" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Grafana 컨테이너</text>
  <text x="670" y="484" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">파일 변경 감지 → 대시보드 자동 로드</text>

  <!-- dashed arrow: ConfigMap -> API server -->
  <path d="M 430 138 L 510 138" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <text x="470" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">kubectl apply</text>

  <!-- bottom note -->
  <rect x="50" y="370" width="380" height="130" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">왜 사이드카 방식인가?</text>
  <text x="70" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· 대시보드를 Git으로 버전 관리 (코드형 운영)</text>
  <text x="70" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· Grafana 재시작 없이 실시간 반영</text>
  <text x="70" y="472" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· UI 수동 편집으로 인한 드리프트 방지</text>
</svg>
