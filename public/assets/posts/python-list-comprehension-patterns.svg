<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">리스트 컴프리헨션 패턴</text>
  <text x="440" y="74" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">중첩 · 조건 표현식 · 다중 이터러블</text>

  <!-- Nested -->
  <rect x="60" y="100" width="360" height="160" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="240" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">중첩 컴프리헨션</text>
  <rect x="76" y="136" width="328" height="108" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 행렬 평탄화</tspan></text>
  <text x="92" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">matrix = [[<tspan fill="#b5cea8">1</tspan>,<tspan fill="#b5cea8">2</tspan>],[<tspan fill="#b5cea8">3</tspan>,<tspan fill="#b5cea8">4</tspan>],[<tspan fill="#b5cea8">5</tspan>,<tspan fill="#b5cea8">6</tspan>]]</text>
  <text x="92" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">flat = [x <tspan fill="#7ec8e3">for</tspan> row <tspan fill="#7ec8e3">in</tspan> matrix</text>
  <text x="92" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">         <tspan fill="#7ec8e3">for</tspan> x <tspan fill="#7ec8e3">in</tspan> row]</text>
  <text x="92" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># [1, 2, 3, 4, 5, 6]</tspan></text>

  <!-- Conditional expression -->
  <rect x="460" y="100" width="360" height="160" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="640" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">표현식 부분 조건식</text>
  <rect x="476" y="136" width="328" height="108" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="492" y="156" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 짝수는 그대로, 홀수는 음수로</tspan></text>
  <text x="492" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">nums = range(<tspan fill="#b5cea8">6</tspan>)</text>
  <text x="492" y="192" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">result = [x <tspan fill="#7ec8e3">if</tspan> x%<tspan fill="#b5cea8">2</tspan>==<tspan fill="#b5cea8">0</tspan></text>
  <text x="492" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">           <tspan fill="#7ec8e3">else</tspan> -x</text>
  <text x="492" y="228" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">           <tspan fill="#7ec8e3">for</tspan> x <tspan fill="#7ec8e3">in</tspan> nums]</text>

  <!-- Multiple iterables -->
  <rect x="60" y="280" width="360" height="160" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="240" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#ce9178">카르테시안 곱</text>
  <rect x="76" y="316" width="328" height="108" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="92" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 두 리스트의 모든 조합</tspan></text>
  <text x="92" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">colors = [<tspan fill="#ce9178">"red"</tspan>, <tspan fill="#ce9178">"blue"</tspan>]</text>
  <text x="92" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">sizes = [<tspan fill="#ce9178">"S"</tspan>, <tspan fill="#ce9178">"M"</tspan>, <tspan fill="#ce9178">"L"</tspan>]</text>
  <text x="92" y="390" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">pairs = [(c,s) <tspan fill="#7ec8e3">for</tspan> c <tspan fill="#7ec8e3">in</tspan> colors</text>
  <text x="92" y="408" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">               <tspan fill="#7ec8e3">for</tspan> s <tspan fill="#7ec8e3">in</tspan> sizes]</text>

  <!-- Walrus operator -->
  <rect x="460" y="280" width="360" height="160" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="640" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">바다코끼리 연산자 (:=)</text>
  <rect x="476" y="316" width="328" height="108" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="492" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 한 번만 계산하고 필터에도 사용</tspan></text>
  <text x="492" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">import</tspan> math</text>
  <text x="492" y="372" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">data = [<tspan fill="#b5cea8">4</tspan>, -<tspan fill="#b5cea8">1</tspan>, <tspan fill="#b5cea8">9</tspan>, -<tspan fill="#b5cea8">3</tspan>, <tspan fill="#b5cea8">16</tspan>]</text>
  <text x="492" y="390" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">[y <tspan fill="#7ec8e3">for</tspan> x <tspan fill="#7ec8e3">in</tspan> data</text>
  <text x="492" y="408" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8"> <tspan fill="#7ec8e3">if</tspan> (y := math.sqrt(x)) > <tspan fill="#b5cea8">2</tspan>]</text>

  <text x="440" y="460" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">3단계 이상 중첩은 가독성 저하 — 일반 루프 또는 함수 분리 권장</text>
</svg>
