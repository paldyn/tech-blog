<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="db_arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">.d.ts 번들링</text>
  <text x="60" y="76" font-size="14" fill="#888">흩어진 선언 파일을 단일 진입점 하나로 묶는다</text>

  <!-- many d.ts files -->
  <rect x="60" y="120" width="220" height="160" fill="#101418" rx="10" stroke="#7777cc" stroke-width="1.5"/>
  <text x="170" y="148" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">tsc 출력</text>
  <text x="84" y="178" font-size="13" fill="#888">index.d.ts</text>
  <text x="84" y="202" font-size="13" fill="#888">utils/format.d.ts</text>
  <text x="84" y="226" font-size="13" fill="#888">core/parser.d.ts</text>
  <text x="84" y="250" font-size="13" fill="#888">internal/cache.d.ts</text>
  <text x="170" y="272" font-size="12" fill="#9aa4b8" text-anchor="middle">수십 개로 흩어짐</text>

  <!-- bundler -->
  <line x1="280" y1="200" x2="370" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#db_arr)"/>
  <rect x="380" y="168" width="190" height="64" fill="#101418" rx="10" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="475" y="195" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">dts 번들러</text>
  <text x="475" y="216" font-size="12" fill="#888" text-anchor="middle">api-extractor / tsup</text>

  <!-- single output -->
  <line x1="570" y1="200" x2="660" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#db_arr)"/>
  <rect x="670" y="140" width="150" height="120" fill="#101418" rx="10" stroke="#55c555" stroke-width="1.5"/>
  <text x="745" y="190" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">index.d.ts</text>
  <text x="745" y="214" font-size="12" fill="#888" text-anchor="middle">한 파일</text>
  <text x="745" y="234" font-size="12" fill="#888" text-anchor="middle">공개 API만</text>

  <text x="60" y="324" font-size="13" fill="#9aa4b8">→ internal 타입은 합치면서 숨기고, 사용자에게는 깔끔한 단일 타입 진입점만 노출</text>
</svg>
