<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="470" viewBox="0 0 880 470">
  <defs>
    <marker id="rdf-arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="rdf-arr-w" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e0a855"/>
    </marker>
    <marker id="rdf-arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="470" fill="#0a0a0a" rx="12"/>

  <text x="60" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">리다이렉트 2-홉 흐름 — 301 따라가기</text>

  <text x="175" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">브라우저</text>
  <text x="705" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">서버</text>

  <line x1="175" y1="100" x2="175" y2="440" stroke="#3a4a6e" stroke-width="1.5"/>
  <line x1="705" y1="100" x2="705" y2="440" stroke="#3a4a6e" stroke-width="1.5"/>

  <!-- Hop 1 request -->
  <line x1="175" y1="138" x2="703" y2="138" stroke="#7ec8e3" stroke-width="2" marker-end="url(#rdf-arr)"/>
  <text x="190" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">GET</tspan><tspan fill="#ffffff"> /old-page</tspan></text>

  <!-- 301 response box -->
  <rect x="290" y="158" width="375" height="62" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="306" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">HTTP/1.1 </tspan><tspan fill="#e0a855" font-weight="600">301 Moved Permanently</tspan></text>
  <text x="306" y="204" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Location:</tspan><tspan fill="#ce9178"> /new-page</tspan></text>

  <!-- 301 response arrow -->
  <line x1="705" y1="240" x2="177" y2="240" stroke="#e0a855" stroke-width="2" marker-end="url(#rdf-arr-w)"/>
  <text x="440" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">본문 없음 · 브라우저가 Location 으로 자동 재요청</text>

  <!-- Hop 2 request -->
  <line x1="175" y1="312" x2="703" y2="312" stroke="#7ec8e3" stroke-width="2" marker-end="url(#rdf-arr)"/>
  <text x="190" y="302" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">GET</tspan><tspan fill="#ffffff"> /new-page</tspan></text>

  <!-- 200 response box -->
  <rect x="330" y="332" width="335" height="40" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>
  <text x="346" y="357" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">HTTP/1.1 </tspan><tspan fill="#55c555" font-weight="600">200 OK</tspan><tspan fill="#9aa4b8">  # 실제 페이지</tspan></text>

  <!-- 200 response arrow -->
  <line x1="705" y1="392" x2="177" y2="392" stroke="#55c555" stroke-width="2" marker-end="url(#rdf-arr-g)"/>
  <text x="440" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">최종 콘텐츠 도착 · 주소창은 /new-page 로 변경</text>

  <text x="60" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#9aa4b8">한 번의 이동이 사용자 눈엔 보이지만 실제로는 두 번의 왕복(2 RTT)이 발생한다.</text>
</svg>
