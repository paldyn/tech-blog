<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">처리량 중심 — 짧아진 STW, 그래도 STW</text>

  <!-- Pause length comparison bars -->
  <text x="60" y="86"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">한 번의 STW 멈춤 길이 (같은 작업량 기준)</text>

  <!-- Serial bar -->
  <text x="120" y="124" text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">Serial (1)</text>
  <rect x="130" y="110" width="640" height="26" rx="4" fill="#3a1414" stroke="#e05555" stroke-width="1.5"/>
  <text x="450" y="128" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">긴 멈춤</text>

  <!-- Parallel bar -->
  <text x="120" y="170" text-anchor="end"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">Parallel (N)</text>
  <rect x="130" y="156" width="200" height="26" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="230" y="174" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">짧은 멈춤</text>
  <text x="350" y="174"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">스레드 수만큼 분담 — 하지만 0은 아니다 (여전히 STW)</text>

  <!-- Goal-oriented tuning flags box (code box) -->
  <text x="60" y="222"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">목표 지향 튜닝 플래그</text>

  <rect x="60" y="236" width="760" height="146" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="266" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">-XX:+UseParallelGC</tspan>             <tspan fill="#9aa4b8"># 처리량 수집기 활성화</tspan></text>
  <text x="76" y="290" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">-XX:MaxGCPauseMillis</tspan>=<tspan fill="#b5cea8">200</tspan>        <tspan fill="#9aa4b8"># 목표 최대 멈춤(ms)</tspan></text>
  <text x="76" y="314" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">-XX:GCTimeRatio</tspan>=<tspan fill="#b5cea8">99</tspan>             <tspan fill="#9aa4b8"># 목표 처리량(1/(1+N))</tspan></text>
  <text x="76" y="338" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">-XX:ParallelGCThreads</tspan>=<tspan fill="#b5cea8">4</tspan>        <tspan fill="#9aa4b8"># GC 스레드 수</tspan></text>
  <text x="76" y="362" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">-XX:+UseAdaptiveSizePolicy</tspan>     <tspan fill="#9aa4b8"># 적응형 영역 크기조정</tspan></text>

  <!-- Suited / not suited -->
  <rect x="60" y="404" width="370" height="90" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="245" y="432" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">잘 맞는 곳</text>
  <text x="245" y="456" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">배치 잡 · 대용량 데이터 처리</text>
  <text x="245" y="476" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">총 처리량이 최우선인 워크로드</text>

  <rect x="450" y="404" width="370" height="90" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="635" y="432" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">안 맞는 곳</text>
  <text x="635" y="456" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">힙이 크면 STW가 여전히 길어짐</text>
  <text x="635" y="476" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">지연에 민감한 API · 실시간 서비스</text>
</svg>
