<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e09050"/>
    </marker>
  </defs>
  <rect width="880" height="560" rx="12" fill="#0a0a0a"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">TLS 1.3 핸드셰이크 흐름</text>

  <!-- Client and Server -->
  <rect x="60" y="58" width="130" height="48" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="125" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Client</text>

  <rect x="690" y="58" width="130" height="48" rx="8" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="755" y="86" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Server</text>

  <!-- Timeline lines -->
  <line x1="125" y1="106" x2="125" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="755" y1="106" x2="755" y2="490" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Step 1: ClientHello -->
  <line x1="125" y1="136" x2="753" y2="136" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="440" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">① ClientHello (지원 cipher suite, key_share, random)</text>

  <!-- Step 2: ServerHello + Certificate -->
  <line x1="755" y1="168" x2="127" y2="168" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="440" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">② ServerHello (선택 cipher, key_share)</text>

  <line x1="755" y1="200" x2="127" y2="200" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="440" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">③ Certificate (서버 인증서 + 서명)</text>

  <line x1="755" y1="232" x2="127" y2="232" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="440" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">④ CertificateVerify + Finished</text>

  <!-- Key derivation note -->
  <rect x="240" y="246" width="400" height="28" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">ECDHE 키 교환 → 세션 키 도출 (HKDF)</text>

  <!-- Step 5: Client Finished -->
  <line x1="125" y1="294" x2="753" y2="294" stroke="#e09050" stroke-width="2" marker-end="url(#arr)"/>
  <text x="440" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e09050" text-anchor="middle">⑤ Finished (MAC 확인)</text>

  <!-- Application data -->
  <rect x="240" y="308" width="400" height="28" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">암호화 통신 시작 (1-RTT)</text>

  <line x1="125" y1="356" x2="753" y2="356" stroke="#e09050" stroke-width="2" marker-end="url(#arr)"/>
  <text x="440" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Application Data (암호화)</text>
  <line x1="755" y1="380" x2="127" y2="380" stroke="#e09050" stroke-width="2" marker-end="url(#arr-orange)"/>
  <text x="440" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Application Data (암호화)</text>

  <!-- TLS 1.2 vs 1.3 comparison -->
  <text x="60" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">TLS 1.2 vs TLS 1.3</text>

  <rect x="60" y="440" width="360" height="72" rx="8" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="240" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">TLS 1.2 (2-RTT)</text>
  <text x="240" y="482" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">RSA 키 교환 지원 (forward secrecy 없음)</text>
  <text x="240" y="500" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">약한 cipher suite 포함 (RC4, 3DES 등)</text>

  <rect x="460" y="440" width="360" height="72" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="640" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">TLS 1.3 (1-RTT / 0-RTT)</text>
  <text x="640" y="482" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ECDHE 필수 (Perfect Forward Secrecy)</text>
  <text x="640" y="500" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">취약 cipher 제거, 0-RTT 재연결 지원</text>
</svg>
