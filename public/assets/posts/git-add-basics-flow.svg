<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340">
  <rect width="880" height="340" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">git add 내부 동작</text>

  <!-- Working Tree -->
  <rect x="60" y="80" width="200" height="200" rx="8" fill="#111827" stroke="#2a3a5c" stroke-width="1.5"/>
  <text x="160" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Working Tree</text>
  <text x="80" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">README.md</text>
  <text x="80" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">src/auth.js ← 신규</text>
  <text x="80" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555">src/app.js  ← 수정</text>
  <text x="80" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">package.json</text>

  <!-- Arrow: Working Tree -> Index -->
  <line x1="260" y1="180" x2="330" y2="180" stroke="#55c555" stroke-width="2.5"/>
  <polygon points="330,173 344,180 330,187" fill="#55c555"/>
  <text x="297" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">git add</text>
  <!-- Internal: hash object -->
  <text x="297" y="195" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">blob 생성</text>
  <text x="297" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#555" text-anchor="middle">index 갱신</text>

  <!-- Index / Staging Area -->
  <rect x="344" y="80" width="200" height="200" rx="8" fill="#0a1a0a" stroke="#205a20" stroke-width="1.5"/>
  <text x="444" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Index (Staging)</text>
  <text x="364" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">README.md</text>
  <text x="364" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">src/auth.js</text>
  <text x="364" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555">src/app.js</text>
  <text x="364" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">package.json</text>

  <!-- Objects DB note -->
  <rect x="344" y="208" width="200" height="52" rx="4" fill="#061006"/>
  <text x="364" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">.git/objects/에 blob 저장</text>
  <text x="364" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#555">e3b0c44... (content hash)</text>

  <!-- Arrow: Index -> Repository -->
  <line x1="544" y1="180" x2="614" y2="180" stroke="#7ec8e3" stroke-width="2.5"/>
  <polygon points="614,173 628,180 614,187" fill="#7ec8e3"/>
  <text x="581" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3" text-anchor="middle">git commit</text>

  <!-- Repository -->
  <rect x="628" y="80" width="192" height="200" rx="8" fill="#0a0a1a" stroke="#20205a" stroke-width="1.5"/>
  <text x="724" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Repository</text>
  <text x="648" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">commit a3f...</text>
  <text x="648" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">tree b2c...</text>
  <text x="648" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888">blob e3b...</text>
  <text x="648" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">tree/commit 객체</text>
  <text x="648" y="207" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#555">추가 생성</text>

  <!-- Restore arrow (reverse) -->
  <path d="M 444 280 Q 444 310 160 310 Q 80 310 80 280" stroke="#e05555" stroke-width="1.5" fill="none" stroke-dasharray="5,3"/>
  <polygon points="80,280 74,268 86,268" fill="#e05555"/>
  <text x="262" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555" text-anchor="middle">git restore --staged (언스테이징)</text>
</svg>
