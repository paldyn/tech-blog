<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrw" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8e8e8"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">카디널리티 추정기(CE) 동작 원리</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">SQL Server 옵티마이저가 행 수를 예측하는 방식</text>

  <!-- SQL Query box -->
  <rect x="60" y="96" width="760" height="56" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="117" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">SELECT * FROM Orders WHERE CustomerID = 42 AND Amount &gt; 1000;</text>
  <text x="76" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">-- CE는 이 조건에 몇 행이 해당하는지 추정해야 한다</text>

  <line x1="440" y1="152" x2="440" y2="184" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Statistics input -->
  <rect x="60" y="184" width="340" height="104" rx="8" fill="#0d1e2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="230" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">통계 정보 (Statistics)</text>
  <text x="230" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">히스토그램 (200 스텝)</text>
  <text x="230" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">밀도 벡터 (열 조합별 선택도)</text>
  <text x="230" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">평균 행 길이 · NULL 비율</text>

  <!-- CE Model -->
  <rect x="480" y="184" width="340" height="104" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="650" y="206" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">CE 모델 선택</text>
  <text x="650" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">CE 70 (레거시, compat 70~110)</text>
  <text x="650" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">CE 120 (SQL Server 2014+)</text>
  <text x="650" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">CE 150 (SQL Server 2019+, 기본값)</text>

  <line x1="400" y1="236" x2="480" y2="236" stroke="#e8e8e8" stroke-width="1.5" stroke-dasharray="4,4"/>

  <line x1="440" y1="288" x2="440" y2="320" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Estimation output -->
  <rect x="160" y="320" width="560" height="72" rx="8" fill="#0a1a0e" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="346" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">행 수 추정 (Estimated Rows)</text>
  <text x="440" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">CustomerID=42: 히스토그램 조회 → 밀도 × 행수</text>
  <text x="440" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">Amount&gt;1000: 범위 선택도 적용 → 독립성 가정으로 곱</text>

  <line x1="440" y1="392" x2="440" y2="420" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="200" y="420" width="480" height="52" rx="8" fill="#101010" stroke="#888" stroke-width="1"/>
  <text x="440" y="442" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">실행 계획 선택: Seek vs Scan, NL vs Hash Join</text>
  <text x="440" y="461" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">추정값이 실제와 크게 다르면 → 비효율적 플랜 선택</text>
</svg>
