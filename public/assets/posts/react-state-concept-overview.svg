<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440"
     style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">State — 컴포넌트의 기억</text>

  <!-- Props vs State comparison -->
  <!-- Props box -->
  <rect x="60" y="64" width="360" height="200" rx="10" fill="#0f1629" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="240" y="90" text-anchor="middle" font-size="16" font-weight="600" fill="#7ec8e3">props</text>
  <text x="240" y="114" text-anchor="middle" font-size="13" fill="#888">부모로부터 받는 데이터</text>

  <rect x="76" y="126" width="328" height="126" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve">
    <tspan x="92" y="148" fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> Greeting({ name }) {</tspan>
    <tspan x="92" dy="18" fill="#9aa4b8">  // name은 props — 읽기 전용</tspan>
    <tspan x="92" dy="18" fill="#9aa4b8">  // 부모가 바꾸면 리렌더</tspan>
    <tspan x="92" dy="18" fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">&lt;h1&gt;</tspan><tspan fill="#ffffff">안녕, {name}!</tspan><tspan fill="#ce9178">&lt;/h1&gt;</tspan><tspan fill="#ffffff">;</tspan>
    <tspan x="92" dy="18" fill="#ffffff">}</tspan>
  </text>

  <!-- State box -->
  <rect x="460" y="64" width="360" height="200" rx="10" fill="#0f2a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="90" text-anchor="middle" font-size="16" font-weight="600" fill="#55c555">state</text>
  <text x="640" y="114" text-anchor="middle" font-size="13" fill="#888">컴포넌트가 직접 관리하는 데이터</text>

  <rect x="476" y="126" width="328" height="126" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text font-family="'JetBrains Mono','Menlo',monospace" font-size="13" xml:space="preserve">
    <tspan x="492" y="148" fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> Counter() {</tspan>
    <tspan x="492" dy="18" fill="#9aa4b8">  // count는 state — 직접 변경 가능</tspan>
    <tspan x="492" dy="18" fill="#7ec8e3" font-weight="600">  const</tspan><tspan fill="#ffffff"> [count, setCount] = useState(</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">);</tspan>
    <tspan x="492" dy="18" fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#ce9178">&lt;p&gt;</tspan><tspan fill="#ffffff">{count}</tspan><tspan fill="#ce9178">&lt;/p&gt;</tspan><tspan fill="#ffffff">;</tspan>
    <tspan x="492" dy="18" fill="#ffffff">}</tspan>
  </text>

  <!-- State render cycle -->
  <rect x="60" y="284" width="760" height="140" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="440" y="308" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">State 변경 → 리렌더 사이클</text>

  <!-- Step boxes -->
  <rect x="76" y="320" width="150" height="44" rx="6" fill="#1e3a5f" stroke="#3a7cc4" stroke-width="1"/>
  <text x="151" y="338" text-anchor="middle" font-size="12" fill="#7ec8e3">① 초기 렌더링</text>
  <text x="151" y="356" text-anchor="middle" font-size="11" fill="#888">state = 초기값</text>

  <line x1="226" y1="342" x2="270" y2="342" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="270" y="320" width="150" height="44" rx="6" fill="#1e1b4b" stroke="#7777cc" stroke-width="1"/>
  <text x="345" y="338" text-anchor="middle" font-size="12" fill="#7777cc">② 이벤트 발생</text>
  <text x="345" y="356" text-anchor="middle" font-size="11" fill="#888">사용자 클릭 등</text>

  <line x1="420" y1="342" x2="464" y2="342" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="464" y="320" width="150" height="44" rx="6" fill="#2a1a00" stroke="#e05555" stroke-width="1"/>
  <text x="539" y="338" text-anchor="middle" font-size="12" fill="#e05555">③ setState 호출</text>
  <text x="539" y="356" text-anchor="middle" font-size="11" fill="#888">새 state 예약</text>

  <line x1="614" y1="342" x2="658" y2="342" stroke="#7777cc" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="658" y="320" width="150" height="44" rx="6" fill="#0f2a0f" stroke="#55c555" stroke-width="1"/>
  <text x="733" y="338" text-anchor="middle" font-size="12" fill="#55c555">④ 리렌더링</text>
  <text x="733" y="356" text-anchor="middle" font-size="11" fill="#888">새 UI 반영</text>

  <text x="440" y="402" text-anchor="middle" font-size="12" fill="#888">setState로 상태를 바꾸면 React가 컴포넌트를 다시 실행(리렌더)해서 최신 UI를 화면에 반영합니다.</text>
</svg>
