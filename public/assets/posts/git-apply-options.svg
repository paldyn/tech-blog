<svg xmlns="http://www.w3.org/2000/svg" width="880" height="370" viewBox="0 0 880 370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="370" rx="12" fill="#0a0a0a"/>
  <text x="60" y="48" font-size="22" font-weight="700" fill="#e8e8e8">git apply 의 핵심 옵션</text>

  <rect x="60" y="80" width="760" height="250" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan x="80" y="112" fill="#9aa4b8"># 적용 가능한지 먼저 검사 (변경 없음)</tspan>
    <tspan x="80" y="134" fill="#ffffff">git apply --check change.diff</tspan>
    <tspan x="80" y="164" fill="#9aa4b8"># 어떤 파일이 얼마나 바뀌는지 요약</tspan>
    <tspan x="80" y="186" fill="#ffffff">git apply --stat change.diff</tspan>
    <tspan x="80" y="216" fill="#9aa4b8"># 충돌 시 3-way 병합 시도</tspan>
    <tspan x="80" y="238" fill="#ffffff">git apply --3way change.diff</tspan>
    <tspan x="80" y="268" fill="#9aa4b8"># 작업 트리 + 스테이징에 함께 적용</tspan>
    <tspan x="80" y="290" fill="#ffffff">git apply --index change.diff</tspan>
  </text>

  <text x="60" y="356" font-size="13" fill="#888">-R(--reverse) 을 붙이면 적용했던 패치를 거꾸로 되돌릴 수 있습니다.</text>
</svg>
