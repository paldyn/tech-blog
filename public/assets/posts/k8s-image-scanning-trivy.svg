<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Trivy 스캔 대상 및 .trivyignore</text>

  <!-- scan targets -->
  <rect x="60" y="70" width="360" height="170" rx="8" fill="#0f1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Trivy 스캔 대상 (--scanners)</text>

  <rect x="80" y="106" width="100" height="60" rx="6" fill="#1a3020" stroke="#55c555" stroke-width="1"/>
  <text x="130" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">vuln</text>
  <text x="130" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">OS/라이브러리</text>
  <text x="130" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">취약점</text>

  <rect x="200" y="106" width="100" height="60" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="250" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">secret</text>
  <text x="250" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">평문 시크릿</text>
  <text x="250" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">검출</text>

  <rect x="320" y="106" width="90" height="60" rx="6" fill="#2a1a00" stroke="#e05555" stroke-width="1"/>
  <text x="365" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">config</text>
  <text x="365" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">잘못된 설정</text>
  <text x="365" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">검사</text>

  <text x="80" y="205" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">trivy image --scanners vuln,secret \</text>
  <text x="80" y="223" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  myapp:v2.0.0</text>

  <!-- .trivyignore -->
  <rect x="460" y="70" width="360" height="240" rx="8" fill="#200f10" stroke="#e05555" stroke-width="1.5"/>
  <text x="640" y="95" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">.trivyignore — 예외 처리</text>

  <rect x="476" y="106" width="328" height="192" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve"># .trivyignore</text>
  <text x="492" y="144" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve"># 허용된 CVE (만료일 포함 권장)</text>
  <text x="492" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve">CVE-2023-12345</text>
  <text x="492" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve"># exp:2026-12-31</text>
  <text x="492" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve"># pkg: openssl  취약점이 아닌 경우</text>
  <text x="492" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve">CVE-2024-11111</text>
  <text x="492" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve"># 업스트림 패치 대기 중</text>
  <text x="492" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555" font-weight="600" xml:space="preserve"># 무분별한 무시는 금지!</text>
  <text x="492" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve"># 반드시 이유와 검토일 기록</text>
  <text x="492" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555" font-weight="600" xml:space="preserve"># 코드리뷰 필수</text>

  <!-- SARIF output -->
  <rect x="60" y="270" width="360" height="140" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="240" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">SARIF 형식으로 GitHub Security에 업로드</text>

  <rect x="76" y="308" width="328" height="90" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve"># GitHub Actions</text>
  <text x="92" y="346" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3" font-weight="600" xml:space="preserve">trivy image \</text>
  <text x="92" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve">  --format sarif \</text>
  <text x="92" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve">  --output trivy-results.sarif \</text>
  <text x="92" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555" font-weight="600" xml:space="preserve">  myapp:v2.0.0</text>
</svg>
