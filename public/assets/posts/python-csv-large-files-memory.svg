<svg xmlns="http://www.w3.org/2000/svg" width="880" height="290" viewBox="0 0 880 290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="290" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">메모리 사용: 통째로 vs 조각으로</text>

  <text x="60" y="92" font-size="15" font-weight="600" fill="#e05555">read_csv() 통째로</text>
  <rect x="60" y="104" width="760" height="40" rx="4" fill="#1a0f0f" stroke="#e05555" stroke-width="1"/>
  <rect x="62" y="106" width="700" height="36" rx="3" fill="#e05555" opacity="0.55"/>
  <text x="412" y="129" font-size="13" fill="#ffffff" text-anchor="middle">전체 데이터가 RAM에 상주 → 파일이 RAM보다 크면 MemoryError</text>

  <text x="60" y="180" font-size="15" font-weight="600" fill="#55c555">chunksize 조각으로</text>
  <rect x="60" y="192" width="760" height="40" rx="4" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <rect x="62" y="194" width="120" height="36" rx="3" fill="#55c555" opacity="0.6"/>
  <text x="490" y="217" font-size="13" fill="#ffffff" text-anchor="middle">한 조각만 RAM에 → 파일 크기와 무관하게 일정한 메모리</text>

  <rect x="60" y="250" width="760" height="30" rx="4" fill="#0f1320" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="270" font-size="13" fill="#7ec8e3" text-anchor="middle">필요한 컬럼만(usecols)·알맞은 dtype도 메모리를 크게 줄인다</text>
</svg>
