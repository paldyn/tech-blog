<svg xmlns="http://www.w3.org/2000/svg" width="880" height="490" viewBox="0 0 880 490">
  <rect width="880" height="490" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">비밀번호 강도와 크래킹 시간</text>

  <!-- Column headers -->
  <text x="170" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">비밀번호 예시</text>
  <text x="430" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">엔트로피</text>
  <text x="640" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">크래킹 예상 시간</text>
  <text x="800" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">등급</text>

  <!-- Row 1: Very weak -->
  <rect x="40" y="88" width="800" height="52" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="170" y="111" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" text-anchor="middle">123456</text>
  <text x="170" y="129" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">숫자만 6자리</text>
  <rect x="340" y="100" width="180" height="12" rx="4" fill="#1a0808" stroke="#333" stroke-width="1"/>
  <rect x="340" y="100" width="18" height="12" rx="4" fill="#e05555"/>
  <text x="640" y="119" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" text-anchor="middle">즉시 (0.001초)</text>
  <text x="800" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">매우 약함</text>

  <!-- Row 2: Weak -->
  <rect x="40" y="152" width="800" height="52" rx="6" fill="#1a0f08" stroke="#e08855" stroke-width="1"/>
  <text x="170" y="175" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e08855" text-anchor="middle">password1</text>
  <text x="170" y="193" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">소문자+숫자 9자리</text>
  <rect x="340" y="164" width="180" height="12" rx="4" fill="#1a0808" stroke="#333" stroke-width="1"/>
  <rect x="340" y="164" width="54" height="12" rx="4" fill="#e08855"/>
  <text x="640" y="183" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e08855" text-anchor="middle">딕셔너리 공격: 초</text>
  <text x="800" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e08855" text-anchor="middle">약함</text>

  <!-- Row 3: Medium -->
  <rect x="40" y="216" width="800" height="52" rx="6" fill="#1a1808" stroke="#e8c55a" stroke-width="1"/>
  <text x="170" y="239" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8c55a" text-anchor="middle">P@ssw0rd!</text>
  <text x="170" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">혼합 9자리 (예측 가능)</text>
  <rect x="340" y="228" width="180" height="12" rx="4" fill="#1a0808" stroke="#333" stroke-width="1"/>
  <rect x="340" y="228" width="90" height="12" rx="4" fill="#e8c55a"/>
  <text x="640" y="247" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e8c55a" text-anchor="middle">몇 분 ~ 몇 시간</text>
  <text x="800" y="247" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8c55a" text-anchor="middle">보통</text>

  <!-- Row 4: Good -->
  <rect x="40" y="280" width="800" height="52" rx="6" fill="#0a180a" stroke="#55c555" stroke-width="1"/>
  <text x="170" y="303" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" text-anchor="middle">k#9mP2vL!xQ</text>
  <text x="170" y="321" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">무작위 혼합 12자리</text>
  <rect x="340" y="292" width="180" height="12" rx="4" fill="#1a0808" stroke="#333" stroke-width="1"/>
  <rect x="340" y="292" width="144" height="12" rx="4" fill="#55c555"/>
  <text x="640" y="311" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" text-anchor="middle">수백 년 이상</text>
  <text x="800" y="311" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">강함</text>

  <!-- Row 5: Passphrase -->
  <rect x="40" y="344" width="800" height="52" rx="6" fill="#0a1020" stroke="#7ec8e3" stroke-width="1"/>
  <text x="170" y="367" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" text-anchor="middle">correct-horse-battery!</text>
  <text x="170" y="385" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">패스프레이즈 (기억하기 쉬움)</text>
  <rect x="340" y="356" width="180" height="12" rx="4" fill="#1a0808" stroke="#333" stroke-width="1"/>
  <rect x="340" y="356" width="180" height="12" rx="4" fill="#7ec8e3"/>
  <text x="640" y="375" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" text-anchor="middle">수조 년 이상</text>
  <text x="800" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">최강</text>

  <!-- Recommendations -->
  <rect x="40" y="416" width="800" height="58" rx="8" fill="#0f1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">NIST SP 800-63B 권고: 최소 8자 이상 · 복잡도 규칙보다 길이 중시</text>
  <text x="440" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">패스워드 매니저 사용 + MFA 조합이 현실적으로 최고의 방어</text>
</svg>
