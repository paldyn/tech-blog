<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" style="background:#0a0a0a">
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Props 패턴: 기본값, 구조분해, 타입검증</text>

  <!-- Default values -->
  <rect x="60" y="68" width="370" height="130" rx="12" fill="#0f1825" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="245" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">기본값 설정 (Default Props)</text>
  <rect x="76" y="106" width="338" height="80" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">function</tspan><tspan fill="#ffffff"> Badge({</tspan></text>
  <text x="92" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  label = </tspan><tspan fill="#ce9178">'New'</tspan><tspan fill="#ffffff">,  color = </tspan><tspan fill="#ce9178">'blue'</tspan><tspan fill="#ffffff">,  size = </tspan><tspan fill="#ce9178">'md'</tspan></text>
  <text x="92" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">}) {</tspan></text>
  <text x="92" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan font-weight="600" fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> &lt;</tspan><tspan fill="#55c555">span</tspan><tspan fill="#ffffff"> className={</tspan><tspan fill="#ce9178">`badge-${color}-${size}`</tspan><tspan fill="#ffffff">}&gt;{label}&lt;/</tspan><tspan fill="#55c555">span</tspan><tspan fill="#ffffff">&gt;;</tspan></text>

  <!-- PropTypes -->
  <rect x="450" y="68" width="370" height="130" rx="12" fill="#0d2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="635" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">TypeScript로 타입 검증</text>
  <rect x="466" y="106" width="338" height="80" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="126" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">type</tspan><tspan fill="#ffffff"> BadgeProps = {</tspan></text>
  <text x="482" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  label?: string;           </tspan><tspan fill="#9aa4b8">// 선택적</tspan></text>
  <text x="482" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  color: </tspan><tspan fill="#ce9178">'blue' | 'red' | 'green'</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="482" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#ffffff">  onClick?: () =&gt; </tspan><tspan font-weight="600" fill="#7ec8e3">void</tspan><tspan fill="#ffffff">;   </tspan><tspan fill="#9aa4b8">// 함수 prop</tspan></text>

  <!-- Passing all HTML attributes -->
  <text x="440" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">HTML 속성 전체 전달 패턴</text>

  <rect x="60" y="250" width="760" height="82" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">type</tspan><tspan fill="#ffffff"> ButtonProps = React.ComponentPropsWithoutRef&lt;</tspan><tspan fill="#ce9178">'button'</tspan><tspan fill="#ffffff">&gt; &amp; {</tspan></text>
  <text x="76" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  variant?: </tspan><tspan fill="#ce9178">'primary' | 'secondary'</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="76" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">};</text>
  <text x="76" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// button의 모든 속성(disabled, onClick, type...)을 자동으로 상속</text>

  <!-- Immutable props -->
  <rect x="60" y="352" width="760" height="82" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">// 콜백 prop으로 자식 → 부모 데이터 전달 (역방향)</text>
  <text x="76" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan font-weight="600" fill="#7ec8e3">function</tspan><tspan fill="#ffffff"> SearchInput({ onSearch }) {</tspan></text>
  <text x="76" y="414" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan font-weight="600" fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> [q, setQ] = useState(</tspan><tspan fill="#ce9178">''</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="76" y="426" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan font-weight="600" fill="#7ec8e3">return</tspan><tspan fill="#ffffff"> &lt;</tspan><tspan fill="#55c555">input</tspan><tspan fill="#ffffff"> value={q} onChange={e =&gt; { setQ(e.target.value); onSearch(e.target.value); }} /&gt;;</tspan></text>
</svg>
