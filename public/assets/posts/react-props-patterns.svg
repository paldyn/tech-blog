<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Props 전달 패턴</text>

  <rect x="60" y="76" width="760" height="300" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="100" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">
    {/* 1. 구조 분해 할당으로 받기 */}
  </text>
  <text x="80" y="120" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan> Button({ label, onClick, disabled = </tspan><tspan fill="#7ec8e3" font-weight="600">false</tspan><tspan> }) { ... }</tspan>
  </text>
  <text x="80" y="148" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">
    {/* 2. 콜백 props — 자식이 부모의 state 변경을 요청 */}
  </text>
  <text x="80" y="168" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>&lt;Input value={text} onChange={</tspan><tspan fill="#b5cea8">v</tspan><tspan> </tspan><tspan fill="#7ec8e3" font-weight="600">=&gt;</tspan><tspan> setText(</tspan><tspan fill="#b5cea8">v</tspan><tspan>)} /&gt;</tspan>
  </text>
  <text x="80" y="196" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">
    {/* 3. 기본값 설정 */}
  </text>
  <text x="80" y="216" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan> Avatar({ size = </tspan><tspan fill="#b5cea8">48</tspan><tspan>, src, alt = </tspan><tspan fill="#ce9178">""</tspan><tspan> }) { ... }</tspan>
  </text>
  <text x="80" y="244" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">
    {/* 4. 나머지 props 수집 및 전달 (rest props) */}
  </text>
  <text x="80" y="264" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan> Input({ label, ...rest }) {</tspan>
  </text>
  <text x="80" y="284" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>  </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan> &lt;label&gt;{label}&lt;input {...rest} /&gt;&lt;/label&gt;;</tspan>
  </text>
  <text x="80" y="304" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>}</tspan>
  </text>
  <text x="80" y="332" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">
    {/* 5. 조건부 prop — undefined 전달 시 해당 속성 생략됨 */}
  </text>
  <text x="80" y="352" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan>&lt;Button disabled={isLoading || </tspan><tspan fill="#7ec8e3" font-weight="600">undefined</tspan><tspan>} /&gt;</tspan>
  </text>
  <text x="80" y="372" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">
    {/* isLoading === false이면 disabled prop 자체가 없어짐 */}
  </text>
</svg>
