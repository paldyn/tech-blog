<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">MySQL 통계 정보 수집·활용 흐름</text>

  <!-- Data -->
  <rect x="60" y="70" width="160" height="60" fill="#0e1a2e" rx="8" stroke="#3a5a8e" stroke-width="1.5"/>
  <text x="140" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">테이블 데이터</text>
  <text x="140" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">INSERT / UPDATE / DELETE</text>

  <!-- Arrow 1 -->
  <line x1="220" y1="100" x2="280" y2="100" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- InnoDB Stats engine -->
  <rect x="280" y="70" width="180" height="60" fill="#0e1a2e" rx="8" stroke="#3a5a8e" stroke-width="1.5"/>
  <text x="370" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">InnoDB 통계 엔진</text>
  <text x="370" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">자동 갱신 (innodb_stats_auto_recalc)</text>

  <!-- Arrow 2 -->
  <line x1="460" y1="100" x2="520" y2="100" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- mysql.innodb_table_stats -->
  <rect x="520" y="70" width="300" height="60" fill="#0e1420" rx="8" stroke="#2a3a5e" stroke-width="1.5"/>
  <text x="670" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">mysql.innodb_table_stats</text>
  <text x="670" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">n_rows, clustered_index_size, sum_of_other_index_sizes</text>

  <!-- ANALYZE TABLE path -->
  <text x="370" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">ANALYZE TABLE → 즉시 갱신</text>
  <line x1="370" y1="162" x2="670" y2="130" stroke="#55c555" stroke-width="1.5"
        stroke-dasharray="4,4" marker-end="url(#arr-g)"/>

  <!-- mysql.innodb_index_stats -->
  <rect x="520" y="170" width="300" height="60" fill="#0e1420" rx="8" stroke="#2a3a5e" stroke-width="1.5"/>
  <text x="670" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">mysql.innodb_index_stats</text>
  <text x="670" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">n_diff_pfx01..N, n_leaf_pages, size</text>

  <!-- Arrow down from index_stats -->
  <line x1="670" y1="230" x2="670" y2="265" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Optimizer -->
  <rect x="520" y="265" width="300" height="56" fill="#1a2e1a" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="670" y="289" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">옵티마이저</text>
  <text x="670" y="307" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">선택도(Selectivity) 계산 → 인덱스 선택</text>

  <!-- INFORMATION_SCHEMA section -->
  <text x="60" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">INFORMATION_SCHEMA 뷰</text>

  <rect x="60" y="228" width="200" height="52" fill="#0e1420" rx="6" stroke="#2a3a5e" stroke-width="1"/>
  <text x="160" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">TABLES</text>
  <text x="160" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">행 수·크기·엔진 정보</text>

  <rect x="60" y="292" width="200" height="52" fill="#0e1420" rx="6" stroke="#2a3a5e" stroke-width="1"/>
  <text x="160" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">STATISTICS</text>
  <text x="160" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">인덱스 카디널리티</text>

  <rect x="60" y="356" width="200" height="52" fill="#0e1420" rx="6" stroke="#2a3a5e" stroke-width="1"/>
  <text x="160" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">COLUMNS</text>
  <text x="160" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">컬럼 타입·NULL 여부</text>

  <!-- innodb_stats_persistent note -->
  <rect x="280" y="360" width="220" height="48" fill="#1e1a0a" rx="6" stroke="#e0aa55" stroke-width="1"/>
  <text x="390" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e0aa55" text-anchor="middle">innodb_stats_persistent</text>
  <text x="390" y="398" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ON(기본): 디스크 영속 / OFF: 메모리만</text>

  <!-- innodb_stats_sample_pages note -->
  <rect x="515" y="355" width="305" height="48" fill="#1e1a0a" rx="6" stroke="#e0aa55" stroke-width="1"/>
  <text x="667" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e0aa55" text-anchor="middle">innodb_stats_persistent_sample_pages</text>
  <text x="667" y="393" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">기본 20 → 큰 테이블은 100+ 권장</text>

  <!-- Warning note -->
  <rect x="60" y="430" width="760" height="44" fill="#1a2a1a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">INFORMATION_SCHEMA.TABLES의 TABLE_ROWS는 추정치 — 정확한 행 수는 COUNT(*) 사용</text>
  <text x="440" y="468" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">InnoDB 특성상 MVCC로 정확한 전체 행 수 유지가 어려움</text>
</svg>
