<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" style="background:#0a0a0a">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">이진 탐색 구현 패턴: 경계 처리 핵심</text>

  <!-- Left: basic binary search -->
  <text x="60" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">기본 이진 탐색 (exact match)</text>
  <rect x="60" y="88" width="380" height="216" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="110" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff"> binarySearch(vector&lt;</tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff">&gt;&amp; a, </tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff"> t) {</tspan>
  </text>
  <text x="76" y="128" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  int</tspan><tspan fill="#ffffff"> lo = 0, hi = a.size() - 1;</tspan>
  </text>
  <text x="76" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  while</tspan><tspan fill="#ffffff"> (lo &lt;= hi) {</tspan>
  </text>
  <text x="76" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">    // 오버플로우 방지: mid = lo + (hi-lo)/2</tspan>
  </text>
  <text x="76" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    int</tspan><tspan fill="#ffffff"> mid = lo + (hi - lo) / 2;</tspan>
  </text>
  <text x="76" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    if</tspan><tspan fill="#ffffff"> (a[mid] == t) </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> mid;</tspan>
  </text>
  <text x="76" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    else if</tspan><tspan fill="#ffffff"> (a[mid] &lt; t) lo = mid + 1;</tspan>
  </text>
  <text x="76" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    else</tspan><tspan fill="#ffffff"> hi = mid - 1;</tspan>
  </text>
  <text x="76" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  }</tspan>
  </text>
  <text x="76" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> -1;</tspan>
  </text>
  <text x="76" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">}</tspan>
  </text>

  <!-- Right: lower_bound -->
  <text x="460" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7777cc">lower_bound / upper_bound</text>
  <rect x="460" y="88" width="380" height="216" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="476" y="110" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">// t 이상인 첫 인덱스 (STL lower_bound)</tspan>
  </text>
  <text x="476" y="128" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff"> lowerBound(vector&lt;</tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff">&gt;&amp; a, </tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff"> t) {</tspan>
  </text>
  <text x="476" y="146" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  int</tspan><tspan fill="#ffffff"> lo = 0, hi = a.size();</tspan>
  </text>
  <text x="476" y="164" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  while</tspan><tspan fill="#ffffff"> (lo &lt; hi) {</tspan>
  </text>
  <text x="476" y="182" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    int</tspan><tspan fill="#ffffff"> mid = lo + (hi - lo) / 2;</tspan>
  </text>
  <text x="476" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    if</tspan><tspan fill="#ffffff"> (a[mid] &lt; t) lo = mid + 1;</tspan>
  </text>
  <text x="476" y="218" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    else</tspan><tspan fill="#ffffff"> hi = mid;</tspan>
  </text>
  <text x="476" y="236" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  }</tspan>
  </text>
  <text x="476" y="254" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> lo; </tspan><tspan fill="#9aa4b8">// lo == hi 보장</tspan>
  </text>
  <text x="476" y="272" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">}</tspan>
  </text>
  <text x="476" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">// upper_bound: a[mid] &lt;= t 이면 lo=mid+1</tspan>
  </text>

  <!-- Bottom: comparison table -->
  <rect x="60" y="322" width="760" height="100" rx="8" fill="#0a0f1a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="346" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">경계 조건 비교 (가장 자주 틀리는 부분)</text>
  <text x="90" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">패턴</text>
  <text x="240" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">hi 초기값</text>
  <text x="400" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">while 조건</text>
  <text x="560" y="372" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">용도</text>

  <text x="90" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">정확 일치</text>
  <text x="240" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">n - 1</text>
  <text x="400" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">lo &lt;= hi</text>
  <text x="560" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">값 탐색, 삽입 위치</text>

  <text x="90" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">lower/upper_bound</text>
  <text x="240" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">n</text>
  <text x="400" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">lo &lt; hi</text>
  <text x="560" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">범위 카운팅, 정답탐색</text>
</svg>
