<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320">
  <rect width="880" height="320" fill="#0a0a0a" rx="12"/>
  <text x="440" y="38" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">CSMA/CD — 충돌 감지 및 처리</text>
  <text x="440" y="58" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">반이중(Half-Duplex) 이더넷에서 여러 장치가 공유 매체를 사용하는 방식</text>

  <!-- Code block: CSMA/CD steps -->
  <rect x="60" y="76" width="760" height="174" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="100" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3" xml:space="preserve">CSMA/CD 알고리즘</text>
  <text x="76" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">1. Carrier Sense: 채널이 비어있는지 감지</text>
  <text x="76" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">2. Multiple Access: 비면 즉시 전송 시작</text>
  <text x="76" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555" xml:space="preserve">3. Collision Detection: 전송 중 충돌 감지</text>
  <text x="76" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#e05555" xml:space="preserve">4. Jam Signal 전송 → 모든 장치에 충돌 알림</text>
  <text x="76" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ce9178" xml:space="preserve">5. 지수 백오프: 랜덤 시간 후 재시도</text>
  <text x="76" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">   대기 시간 = r * slot_time  (r: 0~2^n 랜덤, n: 재시도 횟수)</text>
  <text x="76" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" xml:space="preserve">→ 전이중(Full-Duplex) 스위치 포트는 CSMA/CD 불필요</text>

  <!-- Note -->
  <rect x="60" y="268" width="760" height="36" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">현대 스위치 환경에서는 각 포트가 전이중으로 동작 — CSMA/CD는 사실상 사용되지 않음.</text>
  <text x="440" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">허브(Hub)를 사용하는 레거시 환경에서만 충돌이 발생함.</text>
</svg>
