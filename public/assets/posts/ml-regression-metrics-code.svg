<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">회귀 지표 계산 코드</text>
  <text x="440" y="66" text-anchor="middle" fill="#888" font-size="13">sklearn.metrics로 모든 회귀 지표를 한 번에 계산한다</text>

  <!-- Code block -->
  <rect x="60" y="86" width="760" height="328" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text x="76" y="108" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">from</tspan><tspan fill="#ffffff"> sklearn.metrics </tspan><tspan fill="#7ec8e3">import</tspan><tspan fill="#ffffff"> (</tspan></text>

  <text x="76" y="126" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">    mean_absolute_error,</text>
  <text x="76" y="144" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">    mean_squared_error,</text>
  <text x="76" y="162" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">    mean_absolute_percentage_error,</text>
  <text x="76" y="180" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">    r2_score)</text>
  <text x="76" y="198" xml:space="preserve" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">import</text>
  <text x="117" y="198" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"> numpy </text>
  <text x="170" y="198" xml:space="preserve" fill="#7ec8e3" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">as</text>
  <text x="185" y="198" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"> np</text>

  <line x1="76" y1="212" x2="804" y2="212" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="230" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">mae  = mean_absolute_error(y_ts, y_pred)</text>
  <text x="76" y="248" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">mse  = mean_squared_error(y_ts, y_pred)</text>
  <text x="76" y="266" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">rmse = np.sqrt(mse)</text>
  <text x="76" y="284" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">mape = mean_absolute_percentage_error(</text>
  <text x="76" y="302" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">    y_ts, y_pred) *</text>
  <text x="218" y="302" xml:space="preserve" fill="#b5cea8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">100</text>
  <text x="76" y="320" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">r2   = r2_score(y_ts, y_pred)</text>

  <line x1="76" y1="334" x2="804" y2="334" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="352" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">print(f</tspan><tspan fill="#ce9178">"MAE ={mae:.2f} RMSE={rmse:.2f}"</tspan><tspan fill="#ffffff">)</tspan></text>

  <text x="76" y="370" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">print(f</tspan><tspan fill="#ce9178">"MAPE={mape:.1f}%  R²={r2:.4f}"</tspan><tspan fill="#ffffff">)</tspan></text>

  <line x1="76" y1="384" x2="804" y2="384" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="402" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"># Adjusted R²: 특성 수 패널티 포함</text>

  <!-- Footer -->
</svg>
