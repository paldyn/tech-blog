<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <!-- Background -->
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Linux Capabilities 관리</text>

  <!-- Default (all) capabilities -->
  <rect x="50" y="62" width="240" height="280" rx="8" fill="#1a0f0f" stroke="#4a2a2a" stroke-width="1.5"/>
  <text x="170" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">기본 Capabilities</text>
  <text x="170" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">(컨테이너 기본 보유)</text>
  <text x="66" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">CHOWN</text>
  <text x="66" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">DAC_OVERRIDE</text>
  <text x="66" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">FSETID, FOWNER</text>
  <text x="66" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">KILL</text>
  <text x="66" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">NET_RAW</text>
  <text x="66" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">  ↑ 패킷 스니핑 가능 (위험)</text>
  <text x="66" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">SYS_CHROOT</text>
  <text x="66" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">  ↑ chroot 실행 가능</text>
  <text x="66" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">SETUID, SETGID</text>
  <text x="66" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">MKNOD, AUDIT_WRITE</text>
  <text x="66" y="322" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">+ 기타 기본 capability들</text>

  <!-- Drop ALL, Add specific -->
  <rect x="320" y="62" width="240" height="280" rx="8" fill="#0f1a0f" stroke="#2a4a2a" stroke-width="2"/>
  <text x="440" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">drop: ALL + add: 필요한 것만</text>
  <text x="440" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">(권장 설정)</text>
  <rect x="336" y="118" width="208" height="176" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="352" y="140" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">capabilities:</text>
  <text x="352" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">  drop:</text>
  <text x="352" y="180" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  - ALL</text>
  <text x="352" y="200" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600">  add:</text>
  <text x="352" y="220" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  - NET_BIND_SERVICE</text>
  <text x="352" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8"># 포트 1024 미만 바인딩</text>
  <text x="352" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8"># 대부분 앱은 add 없이</text>
  <text x="352" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8"># drop: ALL 만으로 충분</text>
  <text x="440" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">최소 권한 원칙 적용</text>
  <text x="440" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">불필요한 커널 권한 제거</text>

  <!-- Dangerous capabilities -->
  <rect x="590" y="62" width="240" height="280" rx="8" fill="#1a0818" stroke="#5a1a3a" stroke-width="1.5"/>
  <text x="710" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">특히 위험한 Capabilities</text>
  <text x="710" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">(절대 부여 금지)</text>
  <text x="606" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">SYS_ADMIN</text>
  <text x="606" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">  마운트, eBPF 등 거의 모든 것</text>
  <text x="606" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">SYS_PTRACE</text>
  <text x="606" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">  다른 프로세스 메모리 읽기</text>
  <text x="606" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">SYS_MODULE</text>
  <text x="606" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">  커널 모듈 로드 (컨테이너 탈출)</text>
  <text x="606" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">NET_ADMIN</text>
  <text x="606" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">  네트워크 인터페이스 조작</text>
  <text x="606" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">privileged: true</text>
  <text x="606" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">  모든 capability + host ns 접근</text>
  <text x="710" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">컨테이너 탈출 공격 벡터</text>

  <!-- Bottom note -->
  <text x="440" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Pod Security Standards의 restricted 프로파일은 capabilities drop: ALL 강제</text>
  <text x="440" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555" text-anchor="middle">docker run --cap-drop ALL --cap-add NET_BIND_SERVICE 과 동일한 효과</text>
</svg>
