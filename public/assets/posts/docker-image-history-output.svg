<svg width="880" height="480" viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">docker image history — 출력 해석</text>
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">각 컬럼의 의미와 --no-trunc 활용</text>

  <!-- Command -->
  <rect x="60" y="100" width="760" height="36" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="76" y="123" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">docker </tspan><tspan fill="#e8e8e8">image history nginx:latest</tspan></text>

  <!-- History output block -->
  <rect x="60" y="152" width="760" height="202" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>
  <!-- Header row -->
  <text x="76" y="174" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3">IMAGE         CREATED     CREATED BY           SIZE</text>
  <line x1="76" y1="180" x2="804" y2="180" stroke="#1e2433" stroke-width="1"/>
  <!-- Data rows -->
  <text x="76" y="198" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">e5e16e1a5897  2 days ago  /bin/sh -c #(nop)…  0B</text>
  <text x="76" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">&lt;missing&gt;     2 days ago  /bin/sh -c nginx…    2.3MB</text>
  <text x="76" y="234" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">&lt;missing&gt;     2 days ago  /bin/sh -c apt-ge…  45MB</text>
  <text x="76" y="252" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">&lt;missing&gt;     2 days ago  /bin/sh -c #(nop)…  0B</text>
  <text x="76" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">&lt;missing&gt;     3 weeks ago /bin/sh -c #(nop)…  0B</text>
  <text x="76" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">&lt;missing&gt;     3 weeks ago /bin/sh -c set -ex  73.9MB</text>
  <text x="76" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">&lt;missing&gt;     3 weeks ago /bin/sh -c #(nop)…  0B</text>
  <text x="76" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># &lt;missing&gt;: 다른 호스트에서 빌드된 레이어</text>

  <!-- Column legend -->
  <text x="60" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">컬럼 의미</text>

  <rect x="60" y="402" width="160" height="60" fill="#0d1117" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="140" y="425" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8e8e8" text-anchor="middle">IMAGE</text>
  <text x="140" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">레이어 ID</text>

  <rect x="240" y="402" width="160" height="60" fill="#0d1117" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="320" y="425" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8e8e8" text-anchor="middle">CREATED BY</text>
  <text x="320" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">생성한 명령 (truncated)</text>

  <rect x="420" y="402" width="160" height="60" fill="#0d1117" rx="6" stroke="#1e2433" stroke-width="1"/>
  <text x="500" y="425" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#e8e8e8" text-anchor="middle">SIZE</text>
  <text x="500" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">해당 레이어 증가량</text>

  <rect x="600" y="402" width="220" height="60" fill="#0d1117" rx="6" stroke="#7777cc" stroke-width="1"/>
  <text x="710" y="425" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7777cc" text-anchor="middle">--no-trunc</text>
  <text x="710" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">전체 명령 출력 (잘림 없음)</text>
</svg>
