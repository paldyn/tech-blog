<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">빈 디렉터리 유지 방법 비교</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">.gitkeep vs .gitignore 방식의 차이</text>

  <!-- Method 1: .gitkeep -->
  <rect x="60" y="90" width="360" height="240" fill="#0d1520" rx="8" stroke="#2a4a6e" stroke-width="1"/>
  <text x="240" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">방법 1: .gitkeep</text>
  <line x1="80" y1="128" x2="400" y2="128" stroke="#1e2c4a" stroke-width="1"/>

  <rect x="80" y="140" width="320" height="64" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan x="96" y="164" fill="#9aa4b8"># 빈 .gitkeep 파일 생성</tspan>
    <tspan x="96" dy="18" fill="#7ec8e3" font-weight="600">touch</tspan><tspan fill="#ffffff"> src/assets/.gitkeep</tspan>
  </text>

  <text x="240" y="228" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓ 단순하고 직관적</text>
  <text x="240" y="248" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓ 관례적으로 널리 사용</text>
  <text x="240" y="268" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">- .gitkeep은 Git 공식 이름 아님</text>
  <text x="240" y="288" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">- .gitignore보다 덜 유연</text>
  <text x="240" y="308" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">- 파일이 추가되면 수동으로 삭제</text>

  <!-- Method 2: .gitignore -->
  <rect x="460" y="90" width="360" height="240" fill="#0d1520" rx="8" stroke="#2a4a6e" stroke-width="1"/>
  <text x="640" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">방법 2: .gitignore 활용</text>
  <line x1="480" y1="128" x2="800" y2="128" stroke="#1e2c4a" stroke-width="1"/>

  <rect x="480" y="140" width="320" height="64" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan x="496" y="164" fill="#9aa4b8"># src/assets/.gitignore</tspan>
    <tspan x="496" dy="18" fill="#ce9178">*</tspan>
    <tspan x="496" dy="18" fill="#55c555" font-weight="600">!.gitignore</tspan>
  </text>

  <text x="640" y="228" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓ 하위 파일을 자동으로 무시</text>
  <text x="640" y="248" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓ 빌드 출력 폴더에 이상적</text>
  <text x="640" y="268" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓ 파일이 생겨도 .gitignore가 남음</text>
  <text x="640" y="288" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">- 패턴이 약간 복잡</text>

  <!-- Bottom recommendation -->
  <rect x="60" y="346" width="760" height="24" fill="#0a0f1a" rx="6" stroke="#1e2c4a" stroke-width="1"/>
  <text x="440" y="362" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">일반 디렉터리 구조 유지 → .gitkeep  /  빌드 출력·업로드 폴더 → .gitignore 방식</text>
</svg>
