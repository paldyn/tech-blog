<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">생성자(Constructor) 종류와 호출 흐름</text>

  <!-- ── 왼쪽 섹션: 기본 생성자 ── -->
  <rect x="60" y="72" width="230" height="44" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="175" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">① 기본 생성자</text>
  <text x="175" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">매개변수 없음 · 컴파일러 자동 추가</text>

  <!-- 기본 생성자 코드 박스 -->
  <rect x="60" y="130" width="230" height="96" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">class</text>
  <text x="113" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> Car {</text>
  <text x="76" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  // 아무 생성자 없으면</text>
  <text x="76" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  // Car() {} 자동 삽입</text>
  <text x="76" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>

  <!-- ── 가운데 섹션: 매개변수 생성자 ── -->
  <rect x="325" y="72" width="230" height="44" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">② 매개변수 생성자</text>
  <text x="440" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">초기값을 받아 필드 설정</text>

  <!-- 매개변수 생성자 코드 박스 -->
  <rect x="325" y="130" width="230" height="96" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="341" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">Car(</text>
  <text x="373" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">String</text>
  <text x="420" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> model,</text>
  <text x="341" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">    int</text>
  <text x="384" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> year) {</text>
  <text x="341" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  this.model = model;</text>
  <text x="341" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>

  <!-- ── 오른쪽 섹션: 생성자 체이닝 ── -->
  <rect x="590" y="72" width="230" height="44" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="705" y="92" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178">③ 생성자 체이닝</text>
  <text x="705" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">this() 로 같은 클래스 생성자 호출</text>

  <!-- 생성자 체이닝 코드 박스 -->
  <rect x="590" y="130" width="230" height="96" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="606" y="152" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">Car() {</text>
  <text x="606" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  this</text>
  <text x="640" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">("Unknown", 0);</text>
  <text x="606" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">  // 첫 줄에만 가능</text>
  <text x="606" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>

  <!-- ── 하단 전체: 생성자 실행 흐름 ── -->
  <text x="440" y="268" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">new 키워드 → 생성자 실행 흐름</text>

  <!-- 흐름 박스들 -->
  <rect x="60" y="286" width="148" height="52" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="134" y="307" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">① new Car()</text>
  <text x="134" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">힙에 메모리 확보</text>

  <line x1="208" y1="312" x2="240" y2="312" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <rect x="242" y="286" width="148" height="52" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="316" y="307" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">② 기본값 초기화</text>
  <text x="316" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">null / 0 / false</text>

  <line x1="390" y1="312" x2="422" y2="312" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <rect x="424" y="286" width="148" height="52" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="498" y="307" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">③ 생성자 실행</text>
  <text x="498" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">필드 값 설정</text>

  <line x1="572" y1="312" x2="604" y2="312" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <rect x="606" y="286" width="148" height="52" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="680" y="307" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">④ 참조 반환</text>
  <text x="680" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">변수에 주소 저장</text>

  <!-- ── 하단: 핵심 규칙 ── -->
  <rect x="60" y="366" width="760" height="140" rx="8" fill="#0d1117" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">생성자 핵심 규칙</text>

  <!-- 규칙 목록 -->
  <rect x="80" y="406" width="340" height="84" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="250" y="426" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">문법 규칙</text>
  <text x="96" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 이름은 클래스명과 동일, 반환 타입 없음</text>
  <text x="96" y="464" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 한 생성자 안에서 this() 최대 1번, 반드시 첫 줄</text>
  <text x="96" y="482" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 명시적 생성자가 있으면 기본 생성자 자동 추가 안 됨</text>

  <rect x="440" y="406" width="360" height="84" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="620" y="426" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">설계 원칙</text>
  <text x="456" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 오버로딩 활용 시 this()로 중복 코드 제거</text>
  <text x="456" y="464" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 필수 필드는 생성자에서 초기화, 선택 필드는 setter</text>
  <text x="456" y="482" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">• 불변 객체는 생성자에서 모든 필드 초기화 후 setter 제거</text>
</svg>
