<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Record&lt;K, V&gt; 구조와 활용</text>

  <!-- Structure Diagram -->
  <rect x="60" y="72" width="340" height="200" fill="#111827" rx="8" stroke="#334155" stroke-width="1.5"/>
  <text x="230" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Record&lt;K, V&gt; 구조</text>

  <!-- K box -->
  <rect x="80" y="110" width="120" height="44" fill="#1a1f2e" rx="6" stroke="#7777cc" stroke-width="1.5"/>
  <text x="140" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">K (키)</text>
  <text x="140" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">string | number | symbol</text>

  <line x1="202" y1="132" x2="234" y2="132" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- V box -->
  <rect x="236" y="110" width="144" height="44" fill="#1a1f2e" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="308" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">V (값)</text>
  <text x="308" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">모든 타입 가능</text>

  <!-- Internal implementation -->
  <rect x="80" y="172" width="300" height="84" fill="#0d1117" rx="6" stroke="#334155" stroke-width="1"/>
  <text x="230" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8e8e8" text-anchor="middle">내부 구현 (Mapped Type)</text>
  <text x="96" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">type Record&lt;K, V&gt; = {</text>
  <text x="96" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  [P in K]: V;</text>
  <text x="96" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">};</text>

  <!-- Use cases right panel -->
  <rect x="430" y="72" width="200" height="126" fill="#111827" rx="8" stroke="#334155" stroke-width="1"/>
  <text x="530" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">주요 사용 패턴</text>
  <text x="446" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">1. 키-값 맵</text>
  <text x="446" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">2. 열거형 → 값 테이블</text>
  <text x="446" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">3. 인덱스 구조 선언</text>
  <text x="446" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">4. 조건부 맵 구성</text>

  <!-- Example: string key map -->
  <rect x="430" y="214" width="200" height="58" fill="#111827" rx="8" stroke="#7ec8e3" stroke-width="1"/>
  <text x="530" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">string → number</text>
  <text x="446" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">Record&lt;string, number&gt;</text>
  <text x="446" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">{ [k: string]: number }</text>

  <!-- Example: literal union key -->
  <rect x="648" y="72" width="196" height="126" fill="#111827" rx="8" stroke="#334155" stroke-width="1"/>
  <text x="746" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">K = 리터럴 유니언</text>
  <text x="664" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Record&lt;</text>
  <text x="664" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">  "a" | "b" | "c",</text>
  <text x="664" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">  number</text>
  <text x="664" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">&gt;</text>
  <text x="664" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">→ 모든 키 필수</text>

  <!-- Example: enum key -->
  <rect x="648" y="214" width="196" height="58" fill="#111827" rx="8" stroke="#7777cc" stroke-width="1"/>
  <text x="746" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">K = keyof T</text>
  <text x="664" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">Record&lt;keyof User,</text>
  <text x="664" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">  boolean&gt;</text>

  <!-- vs Index Signature -->
  <rect x="60" y="290" width="760" height="122" fill="#111827" rx="8" stroke="#334155" stroke-width="1.5"/>
  <text x="440" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">Record vs 인덱스 시그니처 비교</text>

  <text x="80" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">Record&lt;string, number&gt;</text>
  <text x="80" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· 리터럴 유니언 키 지원</text>
  <text x="80" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· 제네릭 타입으로 사용 가능</text>
  <text x="80" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· keyof와 조합 가능</text>

  <line x1="440" y1="328" x2="440" y2="406" stroke="#334155" stroke-width="1"/>

  <text x="460" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">{ [key: string]: number }</text>
  <text x="460" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· 리터럴 키 불가 (string만)</text>
  <text x="460" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· 제네릭 위치 사용 불편</text>
  <text x="460" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· 더 직관적인 문법</text>
</svg>
