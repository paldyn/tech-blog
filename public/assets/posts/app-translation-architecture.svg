<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400"
     style="border-radius:12px" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="ac" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="ag" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>
  <text x="440" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">도메인 특화 AI 번역 시스템</text>

  <!-- Input -->
  <rect x="60" y="80" width="180" height="68" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="150" y="104" text-anchor="middle" font-size="15" font-weight="600" fill="#7ec8e3">원문 입력</text>
  <text x="150" y="124" text-anchor="middle" font-size="12" fill="#888">언어 자동 감지</text>

  <line x1="240" y1="114" x2="290" y2="114" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ac)"/>

  <!-- Context injection -->
  <rect x="290" y="80" width="200" height="68" rx="8" fill="#1a1030" stroke="#7777cc" stroke-width="1.5"/>
  <text x="390" y="104" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc">컨텍스트 주입</text>
  <text x="390" y="124" text-anchor="middle" font-size="12" fill="#888">용어집 + 도메인 + 톤</text>

  <line x1="490" y1="114" x2="540" y2="114" stroke="#7777cc" stroke-width="2" marker-end="url(#ac)"/>

  <!-- LLM translate -->
  <rect x="540" y="80" width="200" height="68" rx="8" fill="#1a1030" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="104" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc">LLM 번역</text>
  <text x="640" y="124" text-anchor="middle" font-size="12" fill="#888">Claude · GPT-4o</text>

  <line x1="740" y1="114" x2="790" y2="114" stroke="#7777cc" stroke-width="2" marker-end="url(#ac)"/>

  <!-- Post-process -->
  <rect x="790" y="80" width="30" height="68" rx="4" fill="#0f2418" stroke="#55c555" stroke-width="1.5"/>

  <!-- Glossary DB (side box) -->
  <rect x="290" y="210" width="200" height="60" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="390" y="234" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">도메인 용어집 DB</text>
  <text x="390" y="254" text-anchor="middle" font-size="12" fill="#888">법률 · 의료 · 기술 · IT</text>
  <line x1="390" y1="210" x2="390" y2="148" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#ac)"/>

  <!-- Style guide (side box) -->
  <rect x="540" y="210" width="200" height="60" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="640" y="234" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">스타일 가이드</text>
  <text x="640" y="254" text-anchor="middle" font-size="12" fill="#888">경어 · 격식체 · 브랜드 보이스</text>
  <line x1="640" y1="210" x2="640" y2="148" stroke="#7777cc" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#ac)"/>

  <!-- Quality check -->
  <rect x="200" y="320" width="480" height="60" rx="8" fill="#0f2418" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="344" text-anchor="middle" font-size="15" font-weight="600" fill="#55c555">품질 검증 + 후처리</text>
  <text x="440" y="365" text-anchor="middle" font-size="12" fill="#888">용어 일관성 확인 · 형식 보존 · BLEU/comet 평가</text>

  <line x1="640" y1="270" x2="560" y2="320" stroke="#55c555" stroke-width="2" marker-end="url(#ag)"/>
  <line x1="390" y1="270" x2="360" y2="320" stroke="#55c555" stroke-width="2" marker-end="url(#ag)"/>
</svg>
