<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">seccomp 필터링 아키텍처</text>

  <!-- App layer -->
  <rect x="60" y="66" width="760" height="52" rx="8" fill="#0d1f2d" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="88" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">컨테이너 프로세스 (User Space)</text>
  <text x="440" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">read() write() open() socket() connect() accept() ...(syscall 호출)</text>

  <!-- Arrow down -->
  <line x1="440" y1="118" x2="440" y2="148" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- seccomp filter -->
  <rect x="60" y="148" width="760" height="60" rx="8" fill="#1a1a00" stroke="#e0d025" stroke-width="2"/>
  <text x="440" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e0d025">seccomp BPF 필터 (Kernel Space)</text>
  <text x="440" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">프로파일 JSON → BPF 바이트코드 → 커널에 설치 → syscall 번호 매칭 → 허용/차단</text>

  <!-- Two arrows: allow and block -->
  <line x1="300" y1="208" x2="220" y2="248" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <line x1="580" y1="208" x2="660" y2="248" stroke="#e05555" stroke-width="2" marker-end="url(#arr-r)"/>

  <!-- Allow path -->
  <rect x="100" y="248" width="240" height="52" rx="6" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="220" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">허용 (ALLOW)</text>
  <text x="220" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">syscall 실행 → 커널 핸들러</text>

  <!-- Block path -->
  <rect x="540" y="248" width="240" height="52" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="660" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">차단 (ERRNO/KILL)</text>
  <text x="660" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">EPERM 반환 또는 프로세스 종료</text>

  <!-- Kernel -->
  <rect x="60" y="326" width="760" height="52" rx="8" fill="#111" stroke="#555" stroke-width="1"/>
  <text x="440" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#888">Linux Kernel</text>
  <text x="440" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">VFS · 네트워크 스택 · 메모리 관리 · 디바이스 드라이버</text>

  <line x1="220" y1="300" x2="220" y2="340" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr-g)"/>

  <!-- Info boxes -->
  <rect x="60" y="400" width="760" height="58" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="422" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Docker 기본 seccomp 프로파일</text>
  <text x="80" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">약 300개 syscall 허용 (전체 ~350개 중) / 차단 syscall: kexec_load, perf_event_open, personality 등</text>
  <text x="80" y="460" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">기본 프로파일로도 충분히 안전하나, 커스텀 화이트리스트로 더욱 강화 가능</text>
</svg>
