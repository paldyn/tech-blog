<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">@Override가 잡아 주는 실수</text>

  <rect x="60" y="78" width="760" height="180" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="78" y="106" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">class Animal { boolean equals(Animal a) { ... } }</text>
  <text x="78" y="130" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"># Object.equals(Object)를 재정의하려 했지만</text>
  <text x="78" y="148" font-size="13" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"># 파라미터가 Animal — 사실은 오버로딩(별개 메서드)</text>
  <text x="78" y="178" font-size="13" fill="#e05555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-weight="600" xml:space="preserve">@Override</text>
  <text x="78" y="202" font-size="13" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve">boolean equals(Animal a) { ... }   </text>
  <text x="430" y="202" font-size="12" fill="#e05555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"># 컴파일 에러!</text>
  <text x="78" y="232" font-size="12" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" xml:space="preserve"># @Override 덕에 "재정의가 아니다"를 즉시 알 수 있다</text>

  <text x="440" y="292" font-size="13" fill="#9aa4b8" text-anchor="middle">@Override는 재정의 의도와 실제가 어긋나는 순간을 컴파일 시점에 드러낸다</text>
</svg>
