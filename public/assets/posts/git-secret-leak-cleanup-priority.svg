<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="slArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">비밀정보 유출: 순서가 전부다</text>
  <text x="60" y="78" font-size="16" font-weight="600" fill="#888">히스토리 청소보다 키 폐기·재발급이 먼저다</text>

  <rect x="60" y="110" width="230" height="100" rx="10" fill="#000000" stroke="#e05555" stroke-width="1.5"/>
  <text x="80" y="140" font-size="16" font-weight="600" fill="#e05555">1. 즉시 폐기</text>
  <text x="80" y="168" font-size="13" fill="#ffffff">유출된 키·토큰을</text>
  <text x="80" y="190" font-size="13" fill="#ffffff">무효화하고 재발급</text>

  <rect x="325" y="110" width="230" height="100" rx="10" fill="#000000" stroke="#e0a555" stroke-width="1.5"/>
  <text x="345" y="140" font-size="16" font-weight="600" fill="#e0a555">2. 히스토리 청소</text>
  <text x="345" y="168" font-size="13" fill="#ffffff">filter-repo로</text>
  <text x="345" y="190" font-size="13" fill="#ffffff">과거 커밋에서 제거</text>

  <rect x="590" y="110" width="230" height="100" rx="10" fill="#000000" stroke="#55c555" stroke-width="1.5"/>
  <text x="610" y="140" font-size="16" font-weight="600" fill="#55c555">3. 재발 방지</text>
  <text x="610" y="168" font-size="13" fill="#ffffff">.gitignore + 스캐너</text>
  <text x="610" y="190" font-size="13" fill="#ffffff">pre-commit 훅 도입</text>

  <line x1="290" y1="160" x2="325" y2="160" stroke="#e05555" stroke-width="2" marker-end="url(#slArr)"/>
  <line x1="555" y1="160" x2="590" y2="160" stroke="#e05555" stroke-width="2" marker-end="url(#slArr)"/>

  <text x="60" y="270" font-size="13" fill="#888">이미 노출된 비밀은 "지워도 누군가 봤다"고 가정 — 청소만으로 안심하지 않는다</text>
  <text x="60" y="296" font-size="13" fill="#888">공개 저장소라면 push된 순간 봇이 수집했다고 보고 무조건 재발급한다</text>
</svg>
