<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">로컬 K8s 클러스터 도구 비교</text>

  <!-- Column headers -->
  <text x="185" y="84" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">kind</text>
  <text x="440" y="84" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555">minikube</text>
  <text x="695" y="84" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7777cc">k3d</text>

  <!-- Divider line -->
  <line x1="60" y1="96" x2="820" y2="96" stroke="#333" stroke-width="1"/>

  <!-- Row labels (left) -->
  <!-- Row 1: 방식 -->
  <text x="60" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">방식</text>
  <!-- Row 2: 노드 수 -->
  <text x="60" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">멀티노드</text>
  <!-- Row 3: 속도 -->
  <text x="60" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">시작 속도</text>
  <!-- Row 4: CI 적합성 -->
  <text x="60" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">CI 사용</text>
  <!-- Row 5: 추천 용도 -->
  <text x="60" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">추천 용도</text>

  <!-- Horizontal row dividers -->
  <line x1="60" y1="148" x2="820" y2="148" stroke="#1e1e1e" stroke-width="1"/>
  <line x1="60" y1="200" x2="820" y2="200" stroke="#1e1e1e" stroke-width="1"/>
  <line x1="60" y1="252" x2="820" y2="252" stroke="#1e1e1e" stroke-width="1"/>
  <line x1="60" y1="304" x2="820" y2="304" stroke="#1e1e1e" stroke-width="1"/>
  <line x1="60" y1="356" x2="820" y2="356" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Vertical column dividers -->
  <line x1="310" y1="96" x2="310" y2="380" stroke="#1e1e1e" stroke-width="1"/>
  <line x1="565" y1="96" x2="565" y2="380" stroke="#1e1e1e" stroke-width="1"/>

  <!-- kind column -->
  <text x="185" y="132" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">Docker 컨테이너</text>
  <text x="185" y="184" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">&#x2713; 지원</text>
  <text x="185" y="236" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">빠름 (~30s)</text>
  <text x="185" y="288" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">최적</text>
  <text x="185" y="332" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">CI / 멀티노드</text>
  <text x="185" y="348" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">테스트</text>

  <!-- minikube column -->
  <text x="440" y="132" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">VM / Docker</text>
  <text x="440" y="184" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">단일 노드</text>
  <text x="440" y="236" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">보통 (~1min)</text>
  <text x="440" y="288" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">가능</text>
  <text x="440" y="332" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">로컬 개발 /</text>
  <text x="440" y="348" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">애드온 실험</text>

  <!-- k3d column -->
  <text x="695" y="132" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">Docker 컨테이너</text>
  <text x="695" y="184" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">&#x2713; 지원</text>
  <text x="695" y="236" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">빠름 (~20s)</text>
  <text x="695" y="288" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">최적</text>
  <text x="695" y="332" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">경량 / 엣지</text>
  <text x="695" y="348" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">k3s 기반</text>

  <!-- Footer note -->
  <text x="440" y="408" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">* kind = Kubernetes IN Docker  |  k3d = k3s in Docker</text>
</svg>
