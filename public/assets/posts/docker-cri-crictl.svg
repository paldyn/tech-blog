<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">crictl — CRI 직접 조작 도구</text>

  <!-- Code block -->
  <rect x="60" y="64" width="760" height="272" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="76" y="88" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># crictl 설정 (K8s 노드에서 사용)</text>
  <text x="76" y="106" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">cat /etc/crictl.yaml</text>
  <text x="76" y="124" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># runtime-endpoint: unix:///run/containerd/containerd.sock</text>

  <text x="76" y="148" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># Pod(Sandbox) 목록 — K8s의 Pod 개념과 동일</text>
  <text x="76" y="166" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">crictl <tspan fill="#7ec8e3" font-weight="600">pods</tspan></text>

  <text x="76" y="190" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 컨테이너 목록 (Pod 내부)</text>
  <text x="76" y="208" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">crictl <tspan fill="#7ec8e3" font-weight="600">ps</tspan> -a</text>

  <text x="76" y="232" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 이미지 목록 (CRI 레벨, k8s.io namespace)</text>
  <text x="76" y="250" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">crictl <tspan fill="#7ec8e3" font-weight="600">images</tspan></text>

  <text x="76" y="274" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 컨테이너 로그 조회</text>
  <text x="76" y="292" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">crictl <tspan fill="#7ec8e3" font-weight="600">logs</tspan> <tspan fill="#ce9178">&lt;container-id&gt;</tspan></text>

  <text x="76" y="316" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 컨테이너 내부 진입 (docker exec 대응)</text>
  <text x="76" y="334" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">crictl <tspan fill="#7ec8e3" font-weight="600">exec</tspan> -it <tspan fill="#ce9178">&lt;container-id&gt;</tspan> sh</text>

  <!-- Bottom label -->
  <text x="440" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">crictl = K8s 노드 디버깅 도구 — docker CLI 없이 CRI 소켓으로 Pod·컨테이너 직접 조작</text>
</svg>
