<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="pipe-arr" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0,20 7,0 14" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">ESM 로드 파이프라인 · 3단계</text>

  <!-- Phase 1: Construction (Parse) -->
  <rect x="60" y="72" width="222" height="120" rx="8" fill="#0a1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="171" y="98" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="15" font-weight="600" fill="#7ec8e3">① Construction</text>
  <text x="171" y="116" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8">파싱 · 의존성 그래프 구축</text>
  <text x="171" y="138" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">파일 fetch/읽기</text>
  <text x="171" y="156" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">import 선언 정적 분석</text>
  <text x="171" y="174" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">Module Record 생성</text>

  <!-- Arrow 1 → 2 -->
  <line x1="290" y1="132" x2="330" y2="132"
    stroke="#7ec8e3" stroke-width="2" marker-end="url(#pipe-arr)"/>

  <!-- Phase 2: Instantiation (Link) -->
  <rect x="338" y="72" width="222" height="120" rx="8" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="449" y="98" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="15" font-weight="600" fill="#55c555">② Instantiation</text>
  <text x="449" y="116" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8">링킹 · 바인딩 설정</text>
  <text x="449" y="138" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">export 메모리 슬롯 할당</text>
  <text x="449" y="156" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">import 바인딩 연결</text>
  <text x="449" y="174" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">아직 값 없음 (uninitialized)</text>

  <!-- Arrow 2 → 3 -->
  <line x1="568" y1="132" x2="608" y2="132"
    stroke="#7ec8e3" stroke-width="2" marker-end="url(#pipe-arr)"/>

  <!-- Phase 3: Evaluation -->
  <rect x="616" y="72" width="222" height="120" rx="8" fill="#100a20" stroke="#7777cc" stroke-width="1.5"/>
  <text x="727" y="98" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="15" font-weight="600" fill="#7777cc">③ Evaluation</text>
  <text x="727" y="116" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8">실행 · 값 채우기</text>
  <text x="727" y="138" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">코드 실행 (깊이 우선)</text>
  <text x="727" y="156" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#888">export 슬롯에 실제 값 저장</text>
  <text x="727" y="174" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="12" fill="#55c555">Live binding — 실시간 연결</text>

  <!-- Key difference box -->
  <rect x="60" y="218" width="760" height="80" rx="8" fill="#0d1117" stroke="#3a4a6e"/>
  <text x="440" y="244" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#e8e8e8">Live Binding vs Copied Value</text>
  <text x="440" y="268" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">ESM export는 값의 복사가 아닌 메모리 슬롯 참조 — 내보낸 쪽에서 값이 바뀌면 가져온 쪽에도 반영됨</text>
  <text x="440" y="286" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">CJS는 require() 시점의 값을 복사 — 이후 변경이 가져온 쪽에 전파되지 않음</text>

  <!-- Code hint -->
  <rect x="60" y="318" width="760" height="44" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// ESM: </text>
  <text x="134" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">export let </text>
  <text x="209" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">count = 0;  나중에 count++ 하면 import 쪽도 새 값 확인 가능</text>
  <text x="76" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// CJS: </text>
  <text x="134" y="354" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">const { count } = require('./counter')  // require 시점 스냅샷 — 이후 변경 반영 안 됨</text>
</svg>
