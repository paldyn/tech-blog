<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Docker 볼륨 4가지 유형 비교</text>

  <!-- Table header -->
  <rect x="60" y="62" width="760" height="36" fill="#1a1f2e" rx="6"/>
  <text x="160" y="85" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">유형</text>
  <text x="320" y="85" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">저장 위치</text>
  <text x="490" y="85" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">관리 주체</text>
  <text x="640" y="85" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">주요 용도</text>

  <!-- Dividers -->
  <line x1="240" y1="62" x2="240" y2="440" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="400" y1="62" x2="400" y2="440" stroke="#3a4a6e" stroke-width="1"/>
  <line x1="570" y1="62" x2="570" y2="440" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Row 1: Named Volume -->
  <rect x="60" y="98" width="760" height="72" fill="#0f1420" rx="0"/>
  <rect x="62" y="100" width="3" height="68" fill="#7ec8e3" rx="2"/>
  <text x="160" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Named Volume</text>
  <text x="160" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">이름 있는 볼륨</text>
  <text x="320" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">/var/lib/docker/</text>
  <text x="320" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">volumes/name/_data</text>
  <text x="490" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">Docker</text>
  <text x="660" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">DB, 영속 데이터,</text>
  <text x="660" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">컨테이너 간 공유</text>

  <!-- Row 2: Anonymous Volume -->
  <rect x="60" y="170" width="760" height="72" fill="#111520" rx="0"/>
  <rect x="62" y="172" width="3" height="68" fill="#7777cc" rx="2"/>
  <text x="160" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Anonymous Volume</text>
  <text x="160" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">익명 볼륨</text>
  <text x="320" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">/var/lib/docker/</text>
  <text x="320" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">volumes/hash/_data</text>
  <text x="490" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">Docker</text>
  <text x="660" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">Dockerfile VOLUME,</text>
  <text x="660" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">임시 격리 데이터</text>

  <!-- Row 3: Bind Mount -->
  <rect x="60" y="242" width="760" height="72" fill="#0f1420" rx="0"/>
  <rect x="62" y="244" width="3" height="68" fill="#e8c53a" rx="2"/>
  <text x="160" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8c53a" text-anchor="middle">Bind Mount</text>
  <text x="160" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">바인드 마운트</text>
  <text x="320" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">호스트 파일시스템</text>
  <text x="320" y="294" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">임의 경로 지정 가능</text>
  <text x="490" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8c53a" text-anchor="middle">사용자</text>
  <text x="660" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">개발 시 소스 코드,</text>
  <text x="660" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">설정 파일 주입</text>

  <!-- Row 4: tmpfs -->
  <rect x="60" y="314" width="760" height="72" fill="#111520" rx="0"/>
  <rect x="62" y="316" width="3" height="68" fill="#ce9178" rx="2"/>
  <text x="160" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">tmpfs</text>
  <text x="160" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">메모리 기반</text>
  <text x="320" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">호스트 메모리</text>
  <text x="320" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">디스크 기록 없음</text>
  <text x="490" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">Docker</text>
  <text x="660" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">시크릿, 세션 토큰,</text>
  <text x="660" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">민감 임시 데이터</text>

  <!-- Bottom border -->
  <rect x="60" y="386" width="760" height="2" fill="#1e2433" rx="1"/>

  <!-- Note -->
  <text x="440" y="420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">Named Volume은 Docker가 관리 → 이식성 높음 / Bind Mount는 호스트 경로 의존 → 유연하지만 경로 고정</text>
  <text x="440" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">tmpfs는 컨테이너 종료 시 데이터 소멸 — 보안 민감 임시 데이터에 적합</text>
</svg>
