<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">학습 곡선으로 과대적합 진단하기</text>
  <text x="440" y="66" text-anchor="middle" fill="#888" font-size="13">훈련 손실과 검증 손실의 차이가 과대적합의 신호다</text>

  <!-- LEFT CHART: Overfitting learning curves -->
  <text x="220" y="92" text-anchor="middle" fill="#e07030" font-size="14" font-weight="600">과대적합 패턴</text>

  <!-- Axes -->
  <line x1="70" y1="330" x2="390" y2="330" stroke="#444" stroke-width="1.5"/>
  <line x1="70" y1="100" x2="70"  y2="330" stroke="#444" stroke-width="1.5"/>
  <polygon points="390,330 378,324 378,336" fill="#444"/>
  <polygon points="70,100 64,112 76,112" fill="#444"/>
  <text x="230" y="354" text-anchor="middle" fill="#666" font-size="12">훈련 에폭 (Epoch)</text>
  <text x="40" y="218" text-anchor="middle" fill="#666" font-size="12" transform="rotate(-90,40,218)">손실 (Loss)</text>

  <!-- Train loss: steadily decreasing -->
  <polyline points="70,290 100,265 130,235 160,205 190,178 220,155 250,137 280,124 310,116 340,112 370,110"
    fill="none" stroke="#7ec8e3" stroke-width="2.5" stroke-linejoin="round"/>
  <text x="378" y="108" fill="#7ec8e3" font-size="11" font-weight="600">훈련 손실</text>

  <!-- Val loss: decreases then increases -->
  <polyline points="70,292 100,270 130,248 160,228 190,210 220,200 250,198 280,205 310,220 340,240 370,260"
    fill="none" stroke="#e05555" stroke-width="2.5" stroke-linejoin="round" stroke-dasharray="6,3"/>
  <text x="378" y="262" fill="#e05555" font-size="11" font-weight="600">검증 손실</text>

  <!-- Gap annotation -->
  <line x1="250" y1="137" x2="250" y2="198" stroke="#e0a020" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="250,198 245,186 255,186" fill="#e0a020"/>
  <text x="260" y="170" fill="#e0a020" font-size="11">Gap</text>

  <!-- Early stop marker -->
  <line x1="240" y1="99" x2="240" y2="330" stroke="#55c555" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="242" y="118" fill="#55c555" font-size="10">Early Stop</text>

  <!-- RIGHT CHART: Good fit -->
  <text x="650" y="92" text-anchor="middle" fill="#55c555" font-size="14" font-weight="600">적정 적합 패턴</text>

  <!-- Axes -->
  <line x1="500" y1="330" x2="820" y2="330" stroke="#444" stroke-width="1.5"/>
  <line x1="500" y1="100" x2="500" y2="330" stroke="#444" stroke-width="1.5"/>
  <polygon points="820,330 808,324 808,336" fill="#444"/>
  <polygon points="500,100 494,112 506,112" fill="#444"/>
  <text x="660" y="354" text-anchor="middle" fill="#666" font-size="12">훈련 에폭 (Epoch)</text>

  <!-- Train loss: decreasing and converging -->
  <polyline points="500,290 530,265 560,235 590,208 620,185 650,168 680,155 710,148 740,143 770,140 800,139"
    fill="none" stroke="#7ec8e3" stroke-width="2.5" stroke-linejoin="round"/>
  <text x="808" y="137" fill="#7ec8e3" font-size="11" font-weight="600">훈련 손실</text>

  <!-- Val loss: decreasing and converging (slightly higher) -->
  <polyline points="500,292 530,270 560,245 590,222 620,202 650,188 680,178 710,172 740,168 770,166 800,165"
    fill="none" stroke="#55c555" stroke-width="2.5" stroke-linejoin="round" stroke-dasharray="6,3"/>
  <text x="808" y="168" fill="#55c555" font-size="11" font-weight="600">검증 손실</text>

  <!-- Small gap annotation -->
  <line x1="750" y1="142" x2="750" y2="167" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="760" y="158" fill="#888" font-size="10">작은 Gap</text>

  <!-- Bottom summary -->
  <rect x="60" y="376" width="760" height="40" rx="6" fill="#111827" stroke="#333" stroke-width="1"/>
  <text x="220" y="393" text-anchor="middle" fill="#e05555" font-size="11">과대적합: 검증 손실이 반등 → 조기 종료 필요</text>
  <line x1="440" y1="378" x2="440" y2="414" stroke="#333" stroke-width="1"/>
  <text x="650" y="393" text-anchor="middle" fill="#55c555" font-size="11">적정: 두 곡선이 수렴 → 학습 완료</text>
  <text x="220" y="409" text-anchor="middle" fill="#888" font-size="10">해결책: 데이터 증가 · 정규화 · Dropout · Early Stopping</text>
  <text x="650" y="409" text-anchor="middle" fill="#888" font-size="10">Gap이 작을수록 일반화 성능이 높다</text>

  <!-- Footer -->
  <text x="440" y="430" text-anchor="middle" fill="#444" font-size="11">PALDYN · AI 완전 정복 시리즈</text>
</svg>
