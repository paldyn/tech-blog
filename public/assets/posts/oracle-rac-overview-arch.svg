<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arrd" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0,20 7,0 14" fill="#7ec8e3"/>
    </marker>
    <marker id="arri" markerWidth="20" markerHeight="14" refX="18" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0 0,20 7,0 14" fill="#e8a855"/>
    </marker>
  </defs>
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Oracle RAC 아키텍처</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">하나의 DB, 여러 인스턴스 — 공유 스토리지 + 인터커넥트</text>

  <!-- Node 1 -->
  <rect x="50" y="92" width="350" height="220" rx="10" fill="#111" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="225" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7ec8e3">Instance 1 (Node 1)</text>

  <rect x="66" y="132" width="150" height="44" rx="6" fill="#0d1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="141" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">SGA (Buffer Cache)</text>
  <text x="141" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">로컬 캐시된 블록</text>

  <rect x="226" y="132" width="150" height="44" rx="6" fill="#0d1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="301" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">PGA · Redo Log</text>
  <text x="301" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">로컬 전용 리소스</text>

  <!-- GES / GCS labels -->
  <rect x="66" y="188" width="310" height="36" rx="5" fill="#0a1520" stroke="#7777cc" stroke-width="1"/>
  <text x="221" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">GES (Global Enqueue Service) + GCS (Global Cache Service)</text>

  <!-- RAC processes -->
  <rect x="66" y="236" width="310" height="58" rx="5" fill="#0d1228"/>
  <text x="221" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">주요 RAC 백그라운드 프로세스</text>
  <text x="140" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#ccc">LMS (Global Cache Service)</text>
  <text x="140" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#ccc">LMD (Global Enqueue Service)</text>
  <text x="310" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#ccc">LMON (Monitor)</text>
  <text x="310" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#ccc">LCK (Lock)</text>

  <!-- Node 2 -->
  <rect x="480" y="92" width="350" height="220" rx="10" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="655" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">Instance 2 (Node 2)</text>

  <rect x="496" y="132" width="150" height="44" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="571" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">SGA (Buffer Cache)</text>
  <text x="571" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">로컬 캐시된 블록</text>

  <rect x="656" y="132" width="150" height="44" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="731" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">PGA · Redo Log</text>
  <text x="731" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">로컬 전용 리소스</text>

  <rect x="496" y="188" width="310" height="36" rx="5" fill="#0a1a08" stroke="#7777cc" stroke-width="1"/>
  <text x="651" y="210" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">GES + GCS</text>

  <rect x="496" y="236" width="310" height="58" rx="5" fill="#0d1228"/>
  <text x="651" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">주요 RAC 백그라운드 프로세스</text>
  <text x="570" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#ccc">LMS / LMD</text>
  <text x="570" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#ccc">LMON / LCK</text>

  <!-- Interconnect -->
  <rect x="340" y="176" width="200" height="60" rx="6" fill="#1a1510" stroke="#e8a855" stroke-width="2"/>
  <text x="440" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e8a855">Private Interconnect</text>
  <text x="440" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Cache Fusion 트래픽</text>
  <text x="440" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">고속 LAN (10GbE/InfiniBand)</text>

  <!-- Arrows interconnect -->
  <line x1="376" y1="206" x2="340" y2="206" stroke="#e8a855" stroke-width="1.5" marker-end="url(#arri)"/>
  <line x1="540" y1="206" x2="576" y2="206" stroke="#e8a855" stroke-width="1.5" marker-end="url(#arri)"/>

  <!-- Shared Storage -->
  <rect x="200" y="344" width="480" height="80" rx="10" fill="#111" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc">Shared Storage (ASM / SAN)</text>
  <text x="440" y="392" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ccc">Datafiles · Control Files · Redo Logs (모든 인스턴스 공유)</text>
  <text x="440" y="410" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Oracle ASM (Automatic Storage Management) 권장</text>

  <!-- Arrows to storage -->
  <line x1="225" y1="314" x2="300" y2="342" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrd)"/>
  <line x1="655" y1="314" x2="580" y2="342" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrd)"/>

  <!-- Bottom: key benefits -->
  <rect x="50" y="448" width="780" height="56" rx="6" fill="#111" stroke="#333"/>
  <text x="180" y="468" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7ec8e3">고가용성</text>
  <text x="180" y="490" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">노드 장애 시 자동 Failover</text>
  <text x="440" y="468" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">수평 확장</text>
  <text x="440" y="490" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">노드 추가로 처리량 증가</text>
  <text x="700" y="468" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc">단일 DB</text>
  <text x="700" y="490" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">데이터 일관성 유지</text>
</svg>
