<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" width="880" height="460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="48" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" text-anchor="middle">DOM 요소 생성 · 삽입 흐름</text>

  <!-- createElement 박스 -->
  <rect x="60" y="80" width="200" height="60" fill="#1a2235" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="106" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" text-anchor="middle">createElement()</text>
  <text x="160" y="126" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">분리된 노드 생성</text>

  <!-- 화살표 → 설정 -->
  <polygon points="270,110 260,104 260,116" fill="#555"/>
  <line x1="260" y1="110" x2="290" y2="110" stroke="#555" stroke-width="2"/>

  <!-- 속성 설정 박스 -->
  <rect x="290" y="80" width="200" height="60" fill="#111827" rx="6" stroke="#555"/>
  <text x="390" y="106" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" text-anchor="middle">속성/텍스트 설정</text>
  <text x="390" y="126" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">id · className · textContent</text>

  <!-- 화살표 → 삽입 -->
  <polygon points="500,110 490,104 490,116" fill="#555"/>
  <line x1="490" y1="110" x2="520" y2="110" stroke="#555" stroke-width="2"/>

  <!-- 삽입 박스 -->
  <rect x="520" y="80" width="300" height="60" fill="#111827" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="670" y="106" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" text-anchor="middle">삽입 메서드</text>
  <text x="670" y="126" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" text-anchor="middle">append · prepend · insertAdjacentElement</text>

  <!-- 삽입 위치 설명 -->
  <rect x="60" y="180" width="760" height="100" fill="#111827" rx="8" stroke="#3a4a6e"/>
  <text x="440" y="204" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" text-anchor="middle">insertAdjacentElement / insertAdjacentHTML 위치</text>

  <!-- 대상 요소 시각화 -->
  <text x="180" y="244" fill="#e05555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" text-anchor="middle">beforebegin</text>
  <rect x="280" y="228" width="240" height="36" fill="#1a2235" rx="4" stroke="#7ec8e3"/>
  <text x="400" y="250" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" text-anchor="middle">대상 요소</text>
  <text x="600" y="244" fill="#e05555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" text-anchor="middle">afterend</text>

  <!-- afterbegin / beforeend 안에 -->
  <text x="310" y="270" fill="#55c555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11">afterbegin↗</text>
  <text x="430" y="270" fill="#55c555" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11">↖beforeend</text>

  <!-- 코드 블록 -->
  <rect x="60" y="306" width="760" height="130" fill="#000000" rx="6" stroke="#3a4a6e"/>
  <text x="80" y="332" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">const</tspan><tspan fill="#ffffff"> li = document.createElement(</tspan><tspan fill="#ce9178">'li'</tspan><tspan fill="#ffffff">);</tspan></text>

  <text x="80" y="350" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">li.textContent = </tspan><tspan fill="#ce9178">'새 항목'</tspan><tspan fill="#ffffff">;</tspan></text>

  <text x="80" y="368" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">li.className = </tspan><tspan fill="#ce9178">'list-item active'</tspan><tspan fill="#ffffff">;</tspan></text>

  <text x="80" y="398" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">document.querySelector(</text>
  <text x="258" y="398" xml:space="preserve" fill="#ce9178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">'ul'</text>
  <text x="290" y="398" xml:space="preserve" fill="#ffffff" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">).append(li);  </text>
  <text x="420" y="398" xml:space="preserve" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">// ul 끝에 삽입</text>
  <text x="80" y="416" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">li.insertAdjacentElement(</tspan><tspan fill="#ce9178">'beforebegin'</tspan><tspan fill="#ffffff">, newEl);  </tspan><tspan fill="#9aa4b8">// li 앞에 삽입</tspan></text>

</svg>
