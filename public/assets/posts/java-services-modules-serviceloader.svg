<svg xmlns="http://www.w3.org/2000/svg" width="880" height="270" viewBox="0 0 880 270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="270" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">ServiceLoader.load 가 하는 일</text>

  <defs>
    <marker id="slArr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="48" y="100" width="172" height="92" rx="8" fill="#0f1626" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="134" y="138" font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">load(Plugin.class)</text>
  <text x="134" y="160" font-size="12" fill="#888" text-anchor="middle">호출 시작</text>

  <rect x="260" y="100" width="172" height="92" rx="8" fill="#0f1626" stroke="#3a4a6e" stroke-width="1"/>
  <text x="346" y="138" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">모듈 그래프 스캔</text>
  <text x="346" y="160" font-size="12" fill="#888" text-anchor="middle">provides 선언 수집</text>

  <rect x="472" y="100" width="172" height="92" rx="8" fill="#0f1626" stroke="#3a4a6e" stroke-width="1"/>
  <text x="558" y="138" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">구현 인스턴스화</text>
  <text x="558" y="160" font-size="12" fill="#888" text-anchor="middle">지연 생성(lazy)</text>

  <rect x="684" y="100" width="172" height="92" rx="8" fill="#101a12" stroke="#55c555" stroke-width="1.5"/>
  <text x="770" y="138" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Iterable 반환</text>
  <text x="770" y="160" font-size="12" fill="#888" text-anchor="middle">순회하며 사용</text>

  <line x1="220" y1="146" x2="258" y2="146" stroke="#7ec8e3" stroke-width="2" marker-end="url(#slArr)"/>
  <line x1="432" y1="146" x2="470" y2="146" stroke="#7ec8e3" stroke-width="2" marker-end="url(#slArr)"/>
  <line x1="644" y1="146" x2="682" y2="146" stroke="#7ec8e3" stroke-width="2" marker-end="url(#slArr)"/>

  <text x="440" y="232" font-size="13" fill="#888" text-anchor="middle">구현을 추가·교체해도 Consumer 코드는 그대로 — 플러그인 구조의 토대</text>
</svg>
