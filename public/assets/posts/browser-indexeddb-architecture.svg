<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 480" width="880" height="480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">IndexedDB 아키텍처</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">Database → Object Store → Index 계층 구조</text>

  <!-- Browser App Box -->
  <rect x="60" y="100" width="220" height="70" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="170" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">브라우저 앱</text>
  <text x="170" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">JavaScript 코드</text>

  <!-- Arrow 1 -->
  <line x1="280" y1="135" x2="336" y2="135" stroke="#555" stroke-width="1.5"/>
  <polygon points="336,129 348,135 336,141" fill="#555"/>
  <text x="314" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">open()</text>

  <!-- IndexedDB Engine Box -->
  <rect x="348" y="100" width="184" height="70" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">IndexedDB 엔진</text>
  <text x="440" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">비동기 트랜잭션 처리</text>

  <!-- Arrow 2 -->
  <line x1="532" y1="135" x2="588" y2="135" stroke="#555" stroke-width="1.5"/>
  <polygon points="588,129 600,135 588,141" fill="#555"/>
  <text x="566" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">persist</text>

  <!-- Storage Box -->
  <rect x="600" y="100" width="220" height="70" rx="8" fill="#1f1400" stroke="#e8b84b" stroke-width="1.5"/>
  <text x="710" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8b84b">디스크 스토리지</text>
  <text x="710" y="152" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">origin-partitioned</text>

  <!-- Divider -->
  <line x1="60" y1="205" x2="820" y2="205" stroke="#222" stroke-width="1"/>

  <!-- Three columns: Database, Object Store, Record -->
  <!-- Database -->
  <rect x="60" y="225" width="220" height="200" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="170" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Database</text>
  <rect x="80" y="262" width="180" height="36" rx="5" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="170" y="285" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">myApp-db  v3</text>
  <rect x="80" y="308" width="180" height="36" rx="5" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="170" y="331" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">analytics-db  v1</text>
  <rect x="80" y="354" width="180" height="36" rx="5" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="170" y="377" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">cache-db  v2</text>

  <!-- Arrow DB -> OS -->
  <line x1="280" y1="310" x2="330" y2="310" stroke="#444" stroke-width="1.5"/>
  <polygon points="330,304 342,310 330,316" fill="#444"/>

  <!-- Object Store -->
  <rect x="342" y="225" width="196" height="200" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Object Store</text>
  <rect x="360" y="262" width="160" height="36" rx="5" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="285" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">users</text>
  <rect x="360" y="308" width="160" height="36" rx="5" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="331" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">products</text>
  <rect x="360" y="354" width="160" height="36" rx="5" fill="#0d1f0d" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="377" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">orders</text>

  <!-- Arrow OS -> Record -->
  <line x1="538" y1="310" x2="588" y2="310" stroke="#444" stroke-width="1.5"/>
  <polygon points="588,304 600,310 588,316" fill="#444"/>

  <!-- Records -->
  <rect x="600" y="225" width="220" height="200" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="710" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Record (key-value)</text>

  <!-- Code block style -->
  <rect x="616" y="262" width="188" height="144" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="628" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// keyPath: 'id'</text>
  <text x="628" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">{</text>
  <text x="628" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  id: <text fill="#b5cea8">1</text>,</text>
  <text x="628" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  name: <text fill="#ce9178">'Alice'</text>,</text>
  <text x="628" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  email: <text fill="#ce9178">'a@b'</text>,</text>
  <text x="628" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  age: <text fill="#b5cea8">28</text></text>
  <text x="628" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">}</text>

  <!-- Bottom labels -->
  <text x="170" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">origin당 여러 DB</text>
  <text x="440" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">DB당 여러 스토어</text>
  <text x="710" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">구조화 객체 저장</text>
</svg>
