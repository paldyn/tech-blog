<svg xmlns="http://www.w3.org/2000/svg" width="880" height="610" viewBox="0 0 880 610">
  <rect width="880" height="610" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Basic vs Bearer 비교</text>

  <!-- Column headers -->
  <rect x="60" y="72" width="360" height="52" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="240" y="103" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#7ec8e3">Basic</text>

  <rect x="460" y="72" width="360" height="52" rx="8" fill="#0f1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="640" y="103" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#7777cc">Bearer (RFC 6750)</text>

  <!-- Row 1: 자격증명 형태 -->
  <rect x="60" y="138" width="360" height="60" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="240" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">자격증명 형태</text>
  <text x="240" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">base64(user:pass)</text>

  <rect x="460" y="138" width="360" height="60" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="640" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">자격증명 형태</text>
  <text x="640" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">발급된 토큰 문자열</text>

  <!-- Row 2: 상태성 -->
  <rect x="60" y="206" width="360" height="60" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="240" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">상태성</text>
  <text x="240" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">무상태, 매 요청 반복 전송</text>

  <rect x="460" y="206" width="360" height="60" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="640" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">상태성</text>
  <text x="640" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">무상태, 토큰만 전송</text>

  <!-- Row 3: 만료 -->
  <rect x="60" y="274" width="360" height="60" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="240" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">만료</text>
  <text x="240" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">없음 (비밀번호 변경 전까지 유효)</text>

  <rect x="460" y="274" width="360" height="60" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="640" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">만료</text>
  <text x="640" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">짧은 TTL 설정 가능</text>

  <!-- Row 4: 탈취 위험 -->
  <rect x="60" y="342" width="360" height="60" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="240" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">탈취 위험</text>
  <text x="240" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555">원본 비밀번호 노출</text>

  <rect x="460" y="342" width="360" height="60" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="640" y="366" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">탈취 위험</text>
  <text x="640" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">토큰만 노출, 만료로 피해 한정</text>

  <!-- Row 5: 사용 맥락 -->
  <rect x="60" y="410" width="360" height="60" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="240" y="434" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">사용 맥락</text>
  <text x="240" y="454" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">내부 도구, 간단한 API</text>

  <rect x="460" y="410" width="360" height="60" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="640" y="434" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">사용 맥락</text>
  <text x="640" y="454" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">OAuth 2.0, REST API, SPA</text>

  <!-- Code box: Basic -->
  <rect x="60" y="486" width="360" height="60" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="512" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">Authorization:</tspan> Basic</text>
  <text x="76" y="532" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">dXNlcjpwYXNzd29yZA==</text>

  <!-- Code box: Bearer -->
  <rect x="460" y="486" width="360" height="60" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="512" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">Authorization:</tspan> Bearer</text>
  <text x="476" y="532" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">eyJhbGciOiJIUzI1NiJ9...</text>

  <!-- Bottom note -->
  <text x="440" y="582" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">두 스킴 모두 평문에 가깝게 전송되므로 HTTPS는 필수다 — base64는 인코딩일 뿐 암호화가 아니다</text>
</svg>
