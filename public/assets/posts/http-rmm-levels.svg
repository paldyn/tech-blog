<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="560" rx="12" fill="#0a0a0a"/>

  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">Richardson 성숙도 모델 — REST의 4단계</text>
  <text x="60" y="78" font-size="16" font-weight="600" fill="#e8e8e8">아래에서 위로 갈수록 HTTP를 더 충실히 활용한다</text>

  <!-- Level 0 -->
  <rect x="60" y="450" width="760" height="70" rx="8" fill="#000000" stroke="#e05555" stroke-width="1.5"/>
  <text x="84" y="472" font-size="15" font-weight="700" fill="#e05555">Level 0 — POX / RPC</text>
  <text x="84" y="490" font-size="13" fill="#888">단일 엔드포인트 하나로 모든 요청 처리</text>
  <text x="84" y="508" font-size="13" fill="#888">HTTP를 단순한 전송 터널로만 사용 (보통 POST)</text>

  <!-- Level 1 -->
  <rect x="120" y="370" width="700" height="70" rx="8" fill="#000000" stroke="#e0a055" stroke-width="1.5"/>
  <text x="144" y="392" font-size="15" font-weight="700" fill="#e0a055">Level 1 — 자원(Resources)</text>
  <text x="144" y="410" font-size="13" fill="#888">+ 작업 단위를 여러 URI로 분리</text>
  <text x="144" y="428" font-size="13" fill="#888">/slots, /reservations 처럼 자원마다 주소를 가짐</text>

  <!-- Level 2 -->
  <rect x="180" y="290" width="640" height="70" rx="8" fill="#000000" stroke="#7ec8e3" stroke-width="2.5"/>
  <text x="204" y="312" font-size="15" font-weight="700" fill="#7ec8e3">Level 2 — HTTP 동사(Verbs)</text>
  <text x="204" y="330" font-size="13" fill="#888">+ GET/POST/PUT/DELETE 의미와 상태코드 사용</text>
  <text x="204" y="348" font-size="13" fill="#888">현실 대부분의 "REST" API가 머무는 지점</text>

  <!-- "대부분 여기" badge -->
  <rect x="660" y="304" width="138" height="42" rx="8" fill="#7ec8e3"/>
  <text x="729" y="324" font-size="13" font-weight="700" fill="#0a0a0a" text-anchor="middle">★ 대부분</text>
  <text x="729" y="340" font-size="13" font-weight="700" fill="#0a0a0a" text-anchor="middle">여기</text>

  <!-- Level 3 -->
  <rect x="240" y="210" width="580" height="70" rx="8" fill="#000000" stroke="#55c555" stroke-width="1.5"/>
  <text x="264" y="232" font-size="15" font-weight="700" fill="#55c555">Level 3 — 하이퍼미디어(HATEOAS)</text>
  <text x="264" y="250" font-size="13" fill="#888">+ 응답에 다음 행동 링크를 포함</text>
  <text x="264" y="268" font-size="13" fill="#888">클라이언트가 링크를 따라 상태를 전이</text>

  <!-- Glory of REST cap -->
  <rect x="300" y="130" width="460" height="56" rx="8" fill="#000000" stroke="#7777cc" stroke-width="1.5"/>
  <text x="530" y="155" font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">The Glory of REST</text>
  <text x="530" y="175" font-size="13" fill="#888" text-anchor="middle">세 단계를 모두 충족할 때 도달하는 이상</text>
</svg>
