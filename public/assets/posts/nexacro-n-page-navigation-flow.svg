<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">페이지 내비게이션 흐름</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">moveToUrl / gotoUrl / 히스토리 스택 패턴</text>

  <!-- Navigation types -->
  <!-- Left: Tab-based -->
  <rect x="60" y="96" width="220" height="200" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="170" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">탭 내비게이션</text>
  <text x="170" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">fn_openTab()</text>
  <rect x="76" y="152" width="188" height="32" rx="4" fill="#1a1a2e"/>
  <text x="170" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">Tab 1 | Tab 2 | Tab 3</text>
  <text x="170" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">• 여러 화면 동시 유지</text>
  <text x="170" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">• 중복 탭 방지 가능</text>
  <text x="170" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">• 닫기 전 저장 확인</text>
  <text x="170" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">✓ 업무 시스템 표준</text>
  <text x="170" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">메모리 주의 필요</text>

  <!-- Center: Direct Frame -->
  <rect x="330" y="96" width="220" height="200" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">직접 Frame 전환</text>
  <text x="440" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">frame.loadForm()</text>
  <rect x="346" y="152" width="188" height="32" rx="4" fill="#0a1a2a"/>
  <text x="440" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">ContentFrame → 단일 Form</text>
  <text x="440" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">• 단순 구조</text>
  <text x="440" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">• 이전 Form 즉시 해제</text>
  <text x="440" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">• 히스토리 직접 관리</text>
  <text x="440" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">✓ 모바일 / 심플 앱</text>
  <text x="440" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">뒤로가기 구현 필요</text>

  <!-- Right: Popup -->
  <rect x="600" y="96" width="220" height="200" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="710" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">팝업 내비게이션</text>
  <text x="710" y="142" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">open() / close()</text>
  <rect x="616" y="152" width="188" height="32" rx="4" fill="#0a2010"/>
  <text x="710" y="172" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Modal 팝업 레이어</text>
  <text x="710" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">• 부모 화면 유지</text>
  <text x="710" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">• 콜백으로 결과 전달</text>
  <text x="710" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">• 조회 팝업에 최적</text>
  <text x="710" y="258" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">✓ 조회·코드선택</text>
  <text x="710" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">중첩 팝업 스택 관리</text>

  <!-- History stack -->
  <rect x="60" y="330" width="760" height="100" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">직접 Frame 전환 — 히스토리 스택 패턴</text>
  <!-- Stack -->
  <rect x="80" y="364" width="100" height="28" rx="3" fill="#1e2433"/>
  <text x="130" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">list.xfdl</text>
  <line x1="180" y1="378" x2="212" y2="378" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="212,373 224,378 212,383" fill="#7777cc"/>
  <rect x="224" y="364" width="100" height="28" rx="3" fill="#1e2433"/>
  <text x="274" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">detail.xfdl</text>
  <line x1="324" y1="378" x2="356" y2="378" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="356,373 368,378 356,383" fill="#7777cc"/>
  <rect x="368" y="364" width="100" height="28" rx="3" fill="#7777cc"/>
  <text x="418" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#fff">edit.xfdl</text>
  <text x="560" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">← history.push(url)</text>
  <text x="560" y="395" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  history.back() → pop</text>
</svg>
