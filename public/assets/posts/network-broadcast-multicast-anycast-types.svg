<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arrs" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arro" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e8a030"/>
    </marker>
    <marker id="arrp" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">전송 방식: 유니캐스트 · 브로드캐스트 · 멀티캐스트 · 애니캐스트</text>

  <!-- Unicast -->
  <text x="105" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">유니캐스트</text>
  <rect x="60" y="105" width="50" height="32" rx="6" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="85" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">송신</text>
  <line x1="110" y1="121" x2="145" y2="121" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrs)"/>
  <rect x="148" y="105" width="50" height="32" rx="6" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="173" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">수신</text>
  <text x="105" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">1:1 전송</text>

  <!-- Broadcast -->
  <text x="320" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">브로드캐스트</text>
  <rect x="270" y="105" width="50" height="32" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="295" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">송신</text>
  <line x1="320" y1="121" x2="340" y2="105" stroke="#e05555" stroke-width="1.5" marker-end="url(#arrs)"/>
  <line x1="320" y1="121" x2="340" y2="121" stroke="#e05555" stroke-width="1.5" marker-end="url(#arrs)"/>
  <line x1="320" y1="121" x2="340" y2="137" stroke="#e05555" stroke-width="1.5" marker-end="url(#arrs)"/>
  <rect x="343" y="98" width="40" height="22" rx="4" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <rect x="343" y="110" width="40" height="22" rx="4" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <rect x="343" y="122" width="40" height="22" rx="4" fill="#2a1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="363" y="113" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#e05555" text-anchor="middle">모든</text>
  <text x="363" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#e05555" text-anchor="middle">호스트</text>
  <text x="363" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#e05555" text-anchor="middle">수신</text>
  <text x="320" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">1:all 전송</text>

  <!-- Multicast -->
  <text x="555" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">멀티캐스트</text>
  <rect x="505" y="105" width="50" height="32" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="530" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">송신</text>
  <line x1="555" y1="112" x2="575" y2="100" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrg)"/>
  <line x1="555" y1="125" x2="575" y2="138" stroke="#55c555" stroke-width="1.5" marker-end="url(#arrg)"/>
  <rect x="578" y="93" width="44" height="22" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <rect x="578" y="130" width="44" height="22" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="600" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#55c555" text-anchor="middle">그룹 A</text>
  <text x="600" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#55c555" text-anchor="middle">그룹 A</text>
  <text x="555" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">1:그룹 전송</text>

  <!-- Anycast -->
  <text x="760" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">애니캐스트</text>
  <rect x="705" y="105" width="50" height="32" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="730" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7777cc" text-anchor="middle">송신</text>
  <line x1="755" y1="121" x2="775" y2="105" stroke="#7777cc" stroke-width="2" marker-end="url(#arrp)"/>
  <rect x="778" y="95" width="44" height="22" rx="4" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="800" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#7777cc" text-anchor="middle">최근접</text>
  <rect x="778" y="120" width="44" height="22" rx="4" fill="#1a1a2a" stroke="#444" stroke-width="1"/>
  <text x="800" y="135" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#555" text-anchor="middle">미선택</text>
  <text x="760" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">1:최근접 전송</text>

  <!-- Divider -->
  <line x1="60" y1="185" x2="820" y2="185" stroke="#222" stroke-width="1"/>

  <!-- Broadcast detail -->
  <text x="210" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">브로드캐스트 주소</text>
  <rect x="60" y="230" width="300" height="110" rx="8" fill="#111" stroke="#e05555" stroke-width="1"/>
  <text x="80" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" font-weight="600">Limited Broadcast</text>
  <text x="80" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">255.255.255.255 — 서브넷 내 모든 호스트</text>
  <text x="80" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8a030" font-weight="600">Directed Broadcast</text>
  <text x="80" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">192.168.1.255 — 특정 서브넷 모든 호스트</text>

  <!-- Multicast detail -->
  <text x="590" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">멀티캐스트 주소 범위</text>
  <rect x="430" y="230" width="390" height="200" rx="8" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="450" y="255" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" font-weight="600">224.0.0.0/4 (Class D)</text>
  <text x="450" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">224.0.0.0/24</text>
  <text x="580" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">Link-local (라우터 미전달)</text>
  <text x="450" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">224.0.1.0/24</text>
  <text x="580" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">Internetwork Control</text>
  <text x="450" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">224.0.0.1</text>
  <text x="580" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">All Hosts (서브넷 전체)</text>
  <text x="450" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">224.0.0.2</text>
  <text x="580" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">All Routers</text>
  <text x="450" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">239.0.0.0/8</text>
  <text x="580" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8a030">Admin-scoped (사설)</text>
  <text x="450" y="415" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">ff00::/8</text>
  <text x="580" y="415" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">IPv6 멀티캐스트 접두사</text>

  <!-- Use cases row -->
  <rect x="60" y="360" width="300" height="100" rx="8" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="210" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">애니캐스트 사용 사례</text>
  <text x="80" y="407" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• DNS 루트 서버 (동일 IP, 전 세계 분산)</text>
  <text x="80" y="427" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• CDN PoP 라우팅 (가장 가까운 엣지)</text>
  <text x="80" y="447" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">• IPv6는 기본 지원, IPv4는 BGP 응용</text>
</svg>
