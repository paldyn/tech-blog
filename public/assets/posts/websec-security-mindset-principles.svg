<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">보안 사고방식의 핵심 원칙</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">개발자가 내면화해야 할 7가지 보안 원칙</text>

  <!-- Principle 1 -->
  <rect x="60" y="90" width="360" height="80" rx="8" fill="#0a1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="90" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">① 공격자 시각으로 생각하라</text>
  <text x="90" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">기능을 만들 때 "어떻게 악용될 수 있나?"를 먼저 묻는다.</text>
  <text x="90" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">입력값을 항상 악의적이라고 가정하고 설계한다.</text>

  <!-- Principle 2 -->
  <rect x="460" y="90" width="360" height="80" rx="8" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="490" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">② 실패를 안전하게 설계하라</text>
  <text x="490" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">오류 발생 시 시스템이 안전한 상태로 떨어져야 한다.</text>
  <text x="490" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">기본값은 차단(Deny by default), 예외만 허용.</text>

  <!-- Principle 3 -->
  <rect x="60" y="188" width="360" height="80" rx="8" fill="#12081a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="90" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc">③ 신뢰는 검증 후에만</text>
  <text x="90" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">내부 서비스라도 입력을 무조건 신뢰하지 않는다.</text>
  <text x="90" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Zero Trust: "절대 신뢰하지 말고, 항상 검증하라."</text>

  <!-- Principle 4 -->
  <rect x="460" y="188" width="360" height="80" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="490" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">④ 심층 방어를 구현하라</text>
  <text x="490" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">한 계층이 뚫려도 다음 계층이 공격을 막는다.</text>
  <text x="490" y="254" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">입력 검증 + WAF + DB 권한 분리 + 감사 로그</text>

  <!-- Principle 5 -->
  <rect x="60" y="286" width="360" height="80" rx="8" fill="#12100a" stroke="#e8a020" stroke-width="1.5"/>
  <text x="90" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8a020">⑤ 보안을 나중으로 미루지 마라</text>
  <text x="90" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">설계 단계 수정 비용 vs 배포 후 패치 비용 = 1:30.</text>
  <text x="90" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Shift Left: 보안 검토를 개발 초기에 당겨라.</text>

  <!-- Principle 6 -->
  <rect x="460" y="286" width="360" height="80" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="490" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">⑥ 단순할수록 안전하다</text>
  <text x="490" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">복잡한 코드는 취약점이 숨기 좋은 공간이다.</text>
  <text x="490" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">KISS: Keep It Simple and Secure.</text>

  <!-- Principle 7 (full width) -->
  <rect x="60" y="384" width="760" height="62" rx="8" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="90" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">⑦ 침해는 언젠가 일어난다고 가정하라</text>
  <text x="90" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">"만약 침해된다면 어떤 피해가 발생하는가?"를 설계에 반영한다.</text>
  <text x="90" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">최소 노출 · 데이터 분리 · 감지 및 대응 계획 (Assume Breach)</text>
</svg>
