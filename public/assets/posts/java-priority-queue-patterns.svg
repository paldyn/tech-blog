<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">PriorityQueue 주요 API와 활용 패턴</text>

  <!-- Left: Natural ordering code -->
  <text x="80" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">기본 정렬 (자연 순서)</text>
  <rect x="64" y="100" width="350" height="176" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// Min-Heap: 가장 작은 값이 head</text>
  <text x="80" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">var</tspan><tspan fill="#ffffff"> pq = </tspan><tspan fill="#7ec8e3" font-weight="600">new</tspan><tspan fill="#ffffff"> PriorityQueue</tspan><tspan fill="#ffffff">&lt;</tspan><tspan fill="#ffffff">Integer&gt;();</tspan></text>
  <text x="80" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">pq.offer(5); pq.offer(1); pq.offer(3);</text>
  <text x="80" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">while</tspan><tspan fill="#ffffff"> (!pq.isEmpty()) {</tspan></text>
  <text x="80" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">    System.out.print(pq.poll());</text>
  <text x="80" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">} </text>
  <text x="80" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// 출력: 1 3 5</text>
  <text x="80" y="246" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// (오름차순 자동 정렬)</text>

  <!-- Right: Custom comparator code -->
  <text x="466" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">역순 정렬 (Max-Heap)</text>
  <rect x="450" y="100" width="366" height="176" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="466" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// Comparator.reverseOrder() 사용</text>
  <text x="466" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">var</tspan><tspan fill="#ffffff"> maxPq = </tspan><tspan fill="#7ec8e3" font-weight="600">new</tspan><tspan fill="#ffffff"> PriorityQueue</tspan><tspan fill="#ffffff">&lt;</tspan><tspan fill="#ffffff">Integer&gt;(</tspan></text>
  <text x="466" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">    Comparator.reverseOrder());</text>
  <text x="466" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">maxPq.offer(5); maxPq.offer(1);</text>
  <text x="466" y="192" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">maxPq.offer(3);</text>
  <text x="466" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">maxPq.poll(); </text>
  <text x="466" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// → 5 (최댓값)</text>

  <!-- Bottom: API comparison table -->
  <text x="440" y="312" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">핵심 API 비교 — 예외 방식 vs null 반환 방식</text>

  <!-- Table header -->
  <rect x="64" y="324" width="752" height="36" fill="#1a2a3a" rx="4" stroke="#3a4a6e" stroke-width="1"/>
  <text x="200" y="347" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">동작</text>
  <text x="420" y="347" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">예외 던짐</text>
  <text x="640" y="347" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">null / false 반환</text>

  <!-- Row 1 -->
  <rect x="64" y="360" width="752" height="34" fill="#0f1a26" rx="0" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="200" y="382" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">삽입</text>
  <text x="420" y="382" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">add(e)</text>
  <text x="640" y="382" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">offer(e)</text>

  <!-- Row 2 -->
  <rect x="64" y="394" width="752" height="34" fill="#0a1520" rx="0" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="200" y="416" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">꺼내기 (제거)</text>
  <text x="420" y="416" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">remove()</text>
  <text x="640" y="416" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">poll()</text>

  <!-- Row 3 -->
  <rect x="64" y="428" width="752" height="34" fill="#0f1a26" rx="0" stroke="#3a4a6e" stroke-width="0.5"/>
  <text x="200" y="450" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">보기 (유지)</text>
  <text x="420" y="450" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">element()</text>
  <text x="640" y="450" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">peek()</text>

  <!-- Time complexity -->
  <text x="440" y="490" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">시간 복잡도: offer O(log n) · poll O(log n) · peek O(1) · remove(Object) O(n)</text>

</svg>
