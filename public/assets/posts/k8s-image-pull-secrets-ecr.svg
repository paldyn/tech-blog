<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">AWS ECR — 단기 토큰 자동 갱신 패턴</text>

  <!-- Problem -->
  <rect x="60" y="70" width="360" height="140" rx="8" fill="#200f10" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">문제: ECR 토큰 만료</text>
  <text x="76" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" xml:space="preserve">ECR 인증 토큰은 12시간마다 만료됨.</text>
  <text x="76" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" xml:space="preserve">수동으로 Secret을 갱신하면:</text>
  <text x="76" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" xml:space="preserve">  → ImagePullBackOff 발생</text>
  <text x="76" y="180" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" xml:space="preserve">  → 새 Pod가 이미지를 못 받음</text>
  <text x="76" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" xml:space="preserve">  실시간 갱신 자동화 필수</text>

  <!-- Solution: CronJob -->
  <rect x="460" y="70" width="380" height="220" rx="8" fill="#0f1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="650" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">해결: CronJob으로 자동 갱신</text>

  <rect x="476" y="108" width="348" height="168" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve"># 매 6시간마다 토큰 갱신 CronJob</text>
  <text x="492" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3" font-weight="600" xml:space="preserve">spec:</text>
  <text x="492" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ce9178" xml:space="preserve">  schedule: "0 */6 * * *"</text>
  <text x="492" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve">  command:</text>
  <text x="492" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve">    - /bin/sh</text>
  <text x="492" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve">    - -c</text>
  <text x="492" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555" font-weight="600" xml:space="preserve">    - kubectl create secret</text>
  <text x="492" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#55c555" font-weight="600" xml:space="preserve">        docker-registry ecr-cred</text>
  <text x="492" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff" xml:space="preserve">      --docker-password=$(aws ecr</text>

  <!-- Arrow problem to solution -->
  <line x1="420" y1="180" x2="458" y2="180" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="440" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">자동화</text>

  <!-- Better solution: IRSA -->
  <rect x="60" y="240" width="760" height="150" rx="8" fill="#0f2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">더 좋은 방법: IRSA (IAM Roles for Service Accounts)</text>
  <text x="440" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Secret 없이 IAM 역할로 ECR 접근 — EKS 환경에서 가장 권장</text>

  <rect x="76" y="298" width="710" height="82" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve"># 1. IRSA ServiceAccount 생성</text>
  <text x="92" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" font-weight="600" xml:space="preserve">eksctl create iamserviceaccount \</text>
  <text x="92" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  --name ecr-reader --namespace production \</text>
  <text x="92" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" font-weight="600" xml:space="preserve">  --attach-policy-arn arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly</text>
</svg>
