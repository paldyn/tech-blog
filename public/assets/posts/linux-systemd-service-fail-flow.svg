<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arrSvc" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="520" rx="12" fill="#0a0a0a"/>
  <text x="60" y="44" font-size="22" font-weight="700" fill="#e8e8e8">서비스 실패 진단 흐름</text>

  <!-- Box1 -->
  <rect x="160" y="80" width="560" height="72" rx="8" fill="#141414" stroke="#e05555" stroke-width="1.5"/>
  <text x="184" y="102" font-size="13" font-weight="600" fill="#e8e8e8">① systemctl status myapp</text>
  <text x="184" y="120" font-size="11" fill="#9aa4b8">Active: failed (Result: exit-code)</text>
  <text x="184" y="138" font-size="11" fill="#9aa4b8">상태 · 마지막 종료 코드 · PID 확인</text>

  <line x1="440" y1="152" x2="440" y2="190" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrSvc)"/>

  <!-- Box2 -->
  <rect x="160" y="192" width="560" height="60" rx="8" fill="#141414" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="184" y="216" font-size="13" font-weight="600" fill="#7ec8e3">② journalctl -u myapp -e</text>
  <text x="184" y="236" font-size="11" fill="#9aa4b8">실패 직전 로그에서 실제 에러 메시지 확인</text>

  <line x1="440" y1="252" x2="440" y2="290" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrSvc)"/>

  <!-- Box3 -->
  <rect x="160" y="292" width="560" height="72" rx="8" fill="#141414" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="184" y="314" font-size="13" font-weight="600" fill="#7ec8e3">③ 원인 분류</text>
  <text x="184" y="332" font-size="11" fill="#9aa4b8">유닛 문법 오타 · 실행파일 경로 · 권한</text>
  <text x="184" y="350" font-size="11" fill="#9aa4b8">의존성(After/Requires) · 환경변수</text>

  <line x1="440" y1="364" x2="440" y2="402" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrSvc)"/>

  <!-- Box4 -->
  <rect x="160" y="404" width="560" height="72" rx="8" fill="#141414" stroke="#55c555" stroke-width="1.5"/>
  <text x="184" y="426" font-size="13" font-weight="600" fill="#55c555">④ 수정 후 반영</text>
  <text x="184" y="444" font-size="11" fill="#9aa4b8">유닛 파일 고쳤으면 daemon-reload 필수</text>
  <text x="184" y="462" font-size="11" fill="#9aa4b8">systemctl restart 로 재시작 · status 재확인</text>
</svg>
