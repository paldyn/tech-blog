<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Money 클래스 — 산술 연산 구현</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">__add__, __mul__, __rmul__, __neg__</text>

  <!-- Code -->
  <rect x="60" y="88" width="410" height="262" rx="6" fill="#070b14" stroke="#1e2433" stroke-width="1.5"/>
  <text x="80" y="112" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">class </text>
  <text x="120" y="112" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">Money:</text>
  <text x="80" y="130" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">    def </text>
  <text x="116" y="130" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">__init__(self, amount, cur):</text>
  <text x="80" y="148" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">        self.amount = amount</text>
  <text x="80" y="166" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">        self.cur = cur</text>
  <text x="80" y="184" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">    def </text>
  <text x="116" y="184" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">__add__(self, other):</text>
  <text x="80" y="202" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">        if </text>
  <text x="110" y="202" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">self.cur != other.cur:</text>
  <text x="80" y="220" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">            raise </text>
  <text x="148" y="220" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">ValueError(</text>
  <text x="214" y="220" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#ce9178" xml:space="preserve">"currency mismatch"</text>
  <text x="332" y="220" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">)</text>
  <text x="80" y="238" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">        return </text>
  <text x="148" y="238" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">Money(self.amount + other.amount, self.cur)</text>
  <text x="80" y="256" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">    def </text>
  <text x="116" y="256" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">__mul__(self, factor):</text>
  <text x="80" y="274" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">        return </text>
  <text x="148" y="274" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">Money(self.amount * factor, self.cur)</text>
  <text x="80" y="292" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">    def </text>
  <text x="116" y="292" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">__rmul__(self, factor):</text>
  <text x="80" y="310" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">        return </text>
  <text x="148" y="310" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">self.__mul__(factor)</text>
  <text x="80" y="328" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">    def </text>
  <text x="116" y="328" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">__neg__(self):</text>
  <text x="80" y="346" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">        return </text>
  <text x="148" y="346" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">Money(-self.amount, self.cur)</text>

  <!-- Right annotations -->
  <rect x="500" y="88" width="320" height="262" rx="8" fill="#0d1117" stroke="#1e2433" stroke-width="1.5"/>
  <text x="520" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">사용 예</text>
  <rect x="520" y="120" width="280" height="130" rx="4" fill="#070b14" stroke="#1e2433"/>
  <text x="536" y="140" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">a = Money(</text>
  <text x="600" y="140" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">100</text>
  <text x="624" y="140" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">, </text>
  <text x="636" y="140" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#ce9178" xml:space="preserve">"KRW"</text>
  <text x="672" y="140" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">)</text>
  <text x="536" y="158" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">b = Money(</text>
  <text x="600" y="158" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">200</text>
  <text x="624" y="158" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">, </text>
  <text x="636" y="158" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#ce9178" xml:space="preserve">"KRW"</text>
  <text x="672" y="158" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">)</text>
  <text x="536" y="176" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">a + b   </text>
  <text x="536" y="176" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">        # Money(300, 'KRW')</text>
  <text x="536" y="194" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">a * 3   </text>
  <text x="536" y="194" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">        # Money(300, 'KRW')</text>
  <text x="536" y="212" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">3 * a   </text>
  <text x="536" y="212" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">        # __rmul__ 호출</text>
  <text x="536" y="230" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">-a      </text>
  <text x="536" y="230" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">        # Money(-100, 'KRW')</text>
  <text x="536" y="248" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">sum([a, b])    </text>
  <text x="536" y="248" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"> # __radd__ 필요!</text>

  <text x="520" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">sum() 지원을 위한 __radd__</text>
  <rect x="520" y="282" width="280" height="50" rx="4" fill="#070b14" stroke="#1e2433"/>
  <text x="536" y="302" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">def </text>
  <text x="560" y="302" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">__radd__(self, other):</text>
  <text x="536" y="320" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">    if </text>
  <text x="560" y="320" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">other == </text>
  <text x="612" y="320" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">0</text>
  <text x="620" y="320" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">: </text>
  <text x="632" y="320" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">return </text>
  <text x="680" y="320" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">self</text>
  <text x="520" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">sum([a,b])는 0 + a + b = a.__radd__(0)로 시작</text>
</svg>
