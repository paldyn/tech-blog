<svg width="880" height="460" viewBox="0 0 880 460" xmlns="http://www.w3.org/2000/svg" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">위치 매개변수 구조</text>

  <!-- Command line visualization -->
  <text x="440" y="78" text-anchor="middle" font-size="14" fill="#888">./myscript.sh  arg1  "arg 2"  arg3</text>

  <!-- Parameter cells -->
  <rect x="60" y="90" width="120" height="50" rx="6" fill="#1e3a5f" stroke="#3a6ea8" stroke-width="2"/>
  <text x="120" y="112" text-anchor="middle" font-size="12" fill="#888">스크립트 이름</text>
  <text x="120" y="130" text-anchor="middle" font-size="14" font-weight="600" fill="#7ec8e3">$0</text>

  <rect x="200" y="90" width="120" height="50" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="2"/>
  <text x="260" y="112" text-anchor="middle" font-size="12" fill="#888">첫 번째 인자</text>
  <text x="260" y="130" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">$1 = arg1</text>

  <rect x="340" y="90" width="140" height="50" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="2"/>
  <text x="410" y="112" text-anchor="middle" font-size="12" fill="#888">두 번째 인자</text>
  <text x="410" y="130" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">$2 = "arg 2"</text>

  <rect x="500" y="90" width="120" height="50" rx="6" fill="#14532d" stroke="#22c55e" stroke-width="2"/>
  <text x="560" y="112" text-anchor="middle" font-size="12" fill="#888">세 번째 인자</text>
  <text x="560" y="130" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">$3 = arg3</text>

  <!-- Special vars -->
  <rect x="60" y="162" width="760" height="120" rx="8" fill="#111827" stroke="#334155" stroke-width="1"/>
  <text x="440" y="186" text-anchor="middle" font-size="15" font-weight="600" fill="#e8e8e8">특수 변수</text>

  <!-- Grid of special vars -->
  <rect x="76" y="196" width="160" height="50" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="156" y="216" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">$#</text>
  <text x="156" y="234" text-anchor="middle" font-size="12" fill="#888">인자 개수 = 3</text>

  <rect x="248" y="196" width="160" height="50" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="328" y="216" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">"$@"</text>
  <text x="328" y="234" text-anchor="middle" font-size="12" fill="#888">개별 인자 목록</text>

  <rect x="420" y="196" width="160" height="50" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="500" y="216" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">"$*"</text>
  <text x="500" y="234" text-anchor="middle" font-size="12" fill="#888">IFS로 합친 문자열</text>

  <rect x="592" y="196" width="232" height="50" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="708" y="216" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">$? / $$ / $!</text>
  <text x="708" y="234" text-anchor="middle" font-size="12" fill="#888">종료코드 / PID / 백그라운드PID</text>

  <!-- shift visualization -->
  <rect x="60" y="298" width="760" height="140" rx="8" fill="#111827" stroke="#334155" stroke-width="1"/>
  <text x="440" y="322" text-anchor="middle" font-size="15" font-weight="600" fill="#e8e8e8">shift — 인자 좌측 이동</text>

  <rect x="76" y="332" width="728" height="90" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="352" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># shift 전: $1=a $2=b $3=c</text>
  <text x="92" y="370" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">shift</tspan></text>
  <text x="92" y="388" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve" fill="#9aa4b8"># shift 후: $1=b $2=c  ($# = 2)</text>
  <text x="92" y="406" font-size="13" font-family="'JetBrains Mono','Menlo',monospace" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">shift</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#9aa4b8">      # 2칸 이동: $1=c  ($# = 1)</tspan></text>
</svg>
