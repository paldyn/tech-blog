<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Auto-Configuration 동작 흐름</text>
  <text x="440" y="65"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">클래스패스 분석 → 조건 평가 → Bean 자동 등록 파이프라인</text>

  <!-- Step 1: Classpath scan -->
  <rect x="60" y="85" width="180" height="70" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="150" y="115"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">1. 클래스패스</text>
  <text x="150" y="135"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">JAR 의존성 분석</text>
  <text x="150" y="151"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">스타터 감지</text>

  <!-- Arrow 1→2 -->
  <line x1="240" y1="120" x2="290" y2="120" stroke="#444" stroke-width="2"/>
  <polygon points="296,120 286,115 286,125" fill="#444"/>

  <!-- Step 2: AutoConfig list -->
  <rect x="296" y="85" width="200" height="70" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="396" y="110"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">2. 후보 목록 로딩</text>
  <text x="396" y="130"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">AutoConfiguration.imports</text>
  <text x="396" y="148"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">150+ 자동 설정 클래스 목록</text>

  <!-- Arrow 2→3 -->
  <line x1="496" y1="120" x2="546" y2="120" stroke="#444" stroke-width="2"/>
  <polygon points="552,120 542,115 542,125" fill="#444"/>

  <!-- Step 3: Condition evaluation -->
  <rect x="552" y="85" width="200" height="70" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="652" y="110"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">3. 조건 평가</text>
  <text x="652" y="130"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">@Conditional 계열 애노테이션</text>
  <text x="652" y="148"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">조건 미충족 시 건너뜀</text>

  <!-- Arrow 3 down -->
  <line x1="652" y1="155" x2="652" y2="185" stroke="#444" stroke-width="2"/>
  <polygon points="652,191 646,179 658,179" fill="#444"/>

  <!-- Step 4: Bean registration (bottom right) -->
  <rect x="552" y="191" width="200" height="70" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="652" y="216"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">4. Bean 등록</text>
  <text x="652" y="236"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">ApplicationContext에 등록</text>
  <text x="652" y="254"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">사용자 Bean이 있으면 생략</text>

  <!-- Conditions breakdown box (bottom left) -->
  <rect x="60" y="191" width="460" height="160" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="290" y="215"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">주요 @Conditional 애노테이션</text>

  <!-- divider -->
  <line x1="76" y1="223" x2="504" y2="223" stroke="#1e2433" stroke-width="1"/>

  <!-- col 1 header -->
  <text x="90" y="242"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" font-weight="600">애노테이션</text>
  <text x="310" y="242"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" font-weight="600">활성화 조건</text>

  <text x="90" y="262"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">@ConditionalOnClass</text>
  <text x="310" y="262"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">지정 클래스가 클래스패스에 존재할 때</text>

  <text x="90" y="282"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">@ConditionalOnMissingBean</text>
  <text x="310" y="282"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">동일 타입 Bean이 없을 때 (사용자 오버라이드 허용)</text>

  <text x="90" y="302"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">@ConditionalOnProperty</text>
  <text x="310" y="302"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">application.properties 특정 값 일치 시</text>

  <text x="90" y="322"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">@ConditionalOnWebApplication</text>
  <text x="310" y="322"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">웹 애플리케이션 컨텍스트일 때</text>

  <text x="90" y="342"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178">@ConditionalOnBean</text>
  <text x="310" y="342"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">지정 Bean이 이미 등록되어 있을 때</text>

  <!-- Bottom note -->
  <text x="440" y="395"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">--debug 플래그로 CONDITIONS EVALUATION REPORT 확인 가능</text>
</svg>
