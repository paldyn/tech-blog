<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Blobless Clone 동작 원리</text>

  <!-- Remote -->
  <rect x="60" y="70" width="240" height="320" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">원격 저장소</text>

  <rect x="78" y="110" width="204" height="60" rx="4" fill="#1a2035" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">커밋 오브젝트</text>
  <text x="180" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">(히스토리 전체)</text>

  <rect x="78" y="186" width="204" height="60" rx="4" fill="#1a2035" stroke="#3a4a6e" stroke-width="1"/>
  <text x="180" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">트리 오브젝트</text>
  <text x="180" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">(디렉터리 구조)</text>

  <rect x="78" y="262" width="204" height="60" rx="4" fill="#1a2035" stroke="#e05555" stroke-width="1"/>
  <text x="180" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">블롭 오브젝트</text>
  <text x="180" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">(파일 내용 — 대용량)</text>

  <!-- Arrow 1: commits+trees -->
  <line x1="310" y1="155" x2="420" y2="155" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="365" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">clone 시 즉시</text>

  <!-- Arrow 2: blobs on demand -->
  <path d="M 310 292 C 360 292 360 370 420 370" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4"
        fill="none" marker-end="url(#arr)"/>
  <text x="370" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">필요 시 lazily</text>

  <!-- Local -->
  <rect x="430" y="70" width="390" height="320" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="625" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">로컬 저장소</text>

  <!-- Immediately downloaded -->
  <rect x="450" y="110" width="350" height="60" rx="4" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="625" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">✓ 커밋 오브젝트 (즉시 다운로드)</text>
  <text x="625" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">git log, git show HEAD 가능</text>

  <rect x="450" y="186" width="350" height="60" rx="4" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="625" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">✓ 트리 오브젝트 (즉시 다운로드)</text>
  <text x="625" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">디렉터리 구조 파악 가능</text>

  <!-- Lazy blobs -->
  <rect x="450" y="262" width="350" height="60" rx="4" fill="#1a0a0a" stroke="#7ec8e3" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="625" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">⏳ 블롭 — 파일 접근 시 다운로드</text>
  <text x="625" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">git checkout, git show file 시 자동 fetch</text>

  <!-- Bottom info -->
  <rect x="60" y="410" width="760" height="20" rx="6" fill="#1a1a2e"/>
  <text x="440" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">지원: GitHub, GitLab, Gitea (서버에서 partial clone protocol 지원 필요)</text>
</svg>
