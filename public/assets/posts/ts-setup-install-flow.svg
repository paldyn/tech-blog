<svg width="880" height="440" viewBox="0 0 880 440" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">TypeScript 설치 단계별 가이드</text>
  <defs>
    <marker id="arr-flow" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>
  <!-- Step boxes (vertical flow, left column labels, right column commands) -->
  <!-- Step 1 -->
  <rect x="60" y="80" width="36" height="36" rx="18" fill="#7777cc"/>
  <text x="78" y="103" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#ffffff">1</text>
  <rect x="116" y="76" width="700" height="44" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="136" y="102" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Node.js 설치</text>
  <text x="400" y="102" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">node.org 또는 nvm install --lts</text>
  <!-- Arrow 1->2 -->
  <line x1="78" y1="116" x2="78" y2="140" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-flow)"/>
  <!-- Step 2 -->
  <rect x="60" y="140" width="36" height="36" rx="18" fill="#7777cc"/>
  <text x="78" y="163" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#ffffff">2</text>
  <rect x="116" y="136" width="700" height="44" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="136" y="162" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">프로젝트 초기화</text>
  <text x="400" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">mkdir my-app &amp;&amp; cd my-app &amp;&amp; npm init -y</text>
  <!-- Arrow 2->3 -->
  <line x1="78" y1="176" x2="78" y2="200" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-flow)"/>
  <!-- Step 3 -->
  <rect x="60" y="200" width="36" height="36" rx="18" fill="#7777cc"/>
  <text x="78" y="223" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#ffffff">3</text>
  <rect x="116" y="196" width="700" height="44" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="136" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">TypeScript 설치</text>
  <text x="400" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">npm install --save-dev typescript</text>
  <!-- Arrow 3->4 -->
  <line x1="78" y1="236" x2="78" y2="260" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-flow)"/>
  <!-- Step 4 -->
  <rect x="60" y="260" width="36" height="36" rx="18" fill="#7777cc"/>
  <text x="78" y="283" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#ffffff">4</text>
  <rect x="116" y="256" width="700" height="44" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="1"/>
  <text x="136" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">tsconfig 생성</text>
  <text x="400" y="282" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">npx tsc --init</text>
  <!-- Arrow 4->5 -->
  <line x1="78" y1="296" x2="78" y2="320" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-flow)"/>
  <!-- Step 5 -->
  <rect x="60" y="320" width="36" height="36" rx="18" fill="#55c555"/>
  <text x="78" y="343" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#ffffff">5</text>
  <rect x="116" y="316" width="700" height="44" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="136" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">첫 파일 작성 + 컴파일</text>
  <text x="400" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">echo "" &gt; index.ts &amp;&amp; npx tsc</text>
  <!-- Version check note -->
  <rect x="60" y="380" width="760" height="38" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="404" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">node -v  &amp;&amp;  npx tsc --version  # 설치 확인</text>
</svg>
