<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <text x="440" y="50" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">TypeScript 설치 및 환경 설정</text>
  <text x="440" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">Node.js 설치부터 첫 실행까지</text>
  <!-- Step 1 -->
  <rect x="60" y="106" width="160" height="80" rx="8" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3">Step 1</text>
  <text x="140" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">Node.js 설치</text>
  <text x="140" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">nodejs.org LTS</text>
  <!-- Arrow 1-2 -->
  <line x1="220" y1="146" x2="278" y2="146" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr2)"/>
  <!-- Step 2 -->
  <rect x="280" y="106" width="160" height="80" rx="8" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="360" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3">Step 2</text>
  <text x="360" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">TypeScript 설치</text>
  <text x="360" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">npm i -D typescript</text>
  <!-- Arrow 2-3 -->
  <line x1="440" y1="146" x2="498" y2="146" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr2)"/>
  <!-- Step 3 -->
  <rect x="500" y="106" width="160" height="80" rx="8" fill="#0d1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="580" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#7ec8e3">Step 3</text>
  <text x="580" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">tsconfig 생성</text>
  <text x="580" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">npx tsc --init</text>
  <!-- Arrow 3-4 -->
  <line x1="660" y1="146" x2="718" y2="146" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr2)"/>
  <!-- Step 4 -->
  <rect x="720" y="106" width="100" height="80" rx="8" fill="#0d2a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="770" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555">Step 4</text>
  <text x="770" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">완료!</text>
  <text x="770" y="174" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">npx tsc</text>
  <!-- Install command -->
  <text x="440" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">설치 명령어</text>
  <rect x="60" y="240" width="760" height="80" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="265" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8"># 새 프로젝트 시작</tspan>
  </text>
  <text x="76" y="285" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#55c555">$ </tspan><tspan fill="#ffffff">mkdir my-ts-app </tspan><tspan fill="#9aa4b8">&amp;&amp;</tspan><tspan fill="#ffffff"> cd my-ts-app</tspan>
  </text>
  <text x="76" y="305" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#55c555">$ </tspan><tspan fill="#ffffff">npm init -y </tspan><tspan fill="#9aa4b8">&amp;&amp;</tspan><tspan fill="#ffffff"> npm install --save-dev typescript</tspan>
  </text>
  <!-- Options -->
  <text x="440" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">설치 옵션</text>
  <rect x="60" y="370" width="235" height="72" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="177" y="394" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">프로젝트 로컬</text>
  <text x="177" y="414" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">npm i -D typescript</text>
  <text x="177" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">권장 — 버전 고정 가능</text>
  <rect x="323" y="370" width="235" height="72" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="394" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">글로벌 설치</text>
  <text x="440" y="414" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">npm i -g typescript</text>
  <text x="440" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">tsc 직접 실행 가능</text>
  <rect x="586" y="370" width="234" height="72" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="703" y="394" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">npx 사용</text>
  <text x="703" y="414" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">npx tsc --init</text>
  <text x="703" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">설치 없이 즉시 실행</text>
</svg>
