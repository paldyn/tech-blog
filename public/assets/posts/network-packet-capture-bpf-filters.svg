<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">BPF 필터 — tcpdump / Wireshark 표현식</text>

  <!-- Host filters -->
  <text x="50" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">호스트·포트 필터</text>
  <rect x="50" y="92" width="780" height="104" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="70" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 특정 호스트와 주고받는 모든 패킷</text>
  <text x="70" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">tcpdump <tspan fill="#7ec8e3" font-weight="600">host</tspan> 1.2.3.4</text>
  <text x="70" y="158" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 포트 443이 src 또는 dst인 패킷</text>
  <text x="70" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">tcpdump <tspan fill="#7ec8e3" font-weight="600">port</tspan> 443</text>

  <!-- Combined filters -->
  <text x="50" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">조합 필터 (and / or / not)</text>
  <rect x="50" y="230" width="780" height="104" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="70" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 특정 호스트의 80 또는 443 포트</text>
  <text x="70" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">tcpdump host 1.2.3.4 <tspan fill="#7ec8e3" font-weight="600">and</tspan> (port 80 <tspan fill="#7ec8e3" font-weight="600">or</tspan> port 443)</text>
  <text x="70" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># ICMP 제외, SYN 패킷만</text>
  <text x="70" y="318" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">tcpdump <tspan fill="#7ec8e3" font-weight="600">not</tspan> icmp <tspan fill="#7ec8e3" font-weight="600">and</tspan> tcp[tcpflags] == tcp-syn</text>

  <!-- Advanced filter -->
  <text x="50" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">저장 후 Wireshark 분석</text>
  <rect x="50" y="370" width="780" height="52" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="70" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># pcap 파일로 저장 (-C 100: 100MB 롤링)</text>
  <text x="70" y="412" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">tcpdump -i eth0 -nn -w /tmp/cap.pcap -C 100 host 1.2.3.4</text>
</svg>
