<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
    <marker id="arrR" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e05555" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
    <marker id="arrG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#55c555" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
    <marker id="arrY" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e8c55e" stroke="#0a0a0a" stroke-width="0.5"/>
    </marker>
  </defs>
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">세 트리 간 이동 명령어</text>

  <!-- Three tree labels -->
  <rect x="60" y="76" width="190" height="44" rx="8" fill="#1a1a0d" stroke="#3a3a1a"/>
  <text x="155" y="103" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8c55e">작업 디렉토리</text>

  <rect x="345" y="76" width="190" height="44" rx="8" fill="#0d1520" stroke="#1e2a3a"/>
  <text x="440" y="103" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">스테이징 영역</text>

  <rect x="630" y="76" width="190" height="44" rx="8" fill="#0d1a0d" stroke="#1e3a1e"/>
  <text x="725" y="103" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">저장소(HEAD)</text>

  <!-- Forward arrows: add and commit -->
  <line x1="252" y1="172" x2="342" y2="172" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="264" y="152" width="64" height="28" rx="5" fill="#0d1520"/>
  <text x="296" y="170" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">git add</text>

  <line x1="537" y1="172" x2="627" y2="172" stroke="#55c555" stroke-width="2" marker-end="url(#arrG)"/>
  <rect x="542" y="152" width="80" height="28" rx="5" fill="#0d1a0d"/>
  <text x="582" y="170" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">git commit</text>

  <!-- Backward: restore staged -->
  <line x1="342" y1="210" x2="252" y2="210" stroke="#e05555" stroke-width="2" marker-end="url(#arrR)"/>
  <rect x="264" y="212" width="64" height="28" rx="5" fill="#1a0d0d"/>
  <text x="296" y="230" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9" fill="#e05555">restore</text>

  <!-- Backward: restore –staged -->
  <line x1="627" y1="210" x2="537" y2="210" stroke="#e8c55e" stroke-width="2" marker-end="url(#arrY)"/>
  <rect x="534" y="212" width="96" height="28" rx="5" fill="#1a150d"/>
  <text x="582" y="230" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="9" fill="#e8c55e">restore --staged</text>

  <!-- checkout: HEAD → working dir (long arrow) -->
  <path d="M 630 280 Q 440 340 252 280" fill="none" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>
  <text x="440" y="356" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc">git checkout  /  git restore  (HEAD → 작업 디렉토리)</text>

  <!-- reset –hard: HEAD → working dir + stage -->
  <path d="M 630 250 Q 440 300 252 250" fill="none" stroke="#e05555" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrR)"/>
  <text x="440" y="300" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555">git reset --hard  (HEAD → 스테이징 + 작업 디렉토리)</text>

  <!-- Table at bottom -->
  <rect x="60" y="368" width="760" height="24" rx="4" fill="#0d0d0d"/>
  <text x="440" y="384" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">세 트리의 상태가 일치할 때 git status는 "nothing to commit, working tree clean"을 출력한다</text>
</svg>
