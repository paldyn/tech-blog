<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">제네릭 메서드 실전 예제</text>

  <!-- Left: swap method -->
  <rect x="40" y="64" width="380" height="260" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="56" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">배열 원소 교환 메서드</text>
  <text x="56" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">public static</tspan><tspan fill="#ffffff"> &lt;</tspan><tspan fill="#55c555">T</tspan><tspan fill="#ffffff">&gt; </tspan><tspan fill="#7ec8e3" font-weight="600">void</tspan><tspan fill="#ffffff"> swap(</tspan><tspan fill="#55c555">T</tspan><tspan fill="#ffffff">[] arr, </tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff"> i, </tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff"> j) {</tspan></text>
  <text x="56" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#55c555">T</tspan><tspan fill="#ffffff"> tmp = arr[i];</tspan></text>
  <text x="56" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  arr[i] = arr[j];</tspan></text>
  <text x="56" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  arr[j] = tmp;</tspan></text>
  <text x="56" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>
  <text x="56" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// 사용 예</tspan></text>
  <text x="56" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">String</tspan><tspan fill="#ffffff">[] names = {</tspan><tspan fill="#ce9178">"A"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"B"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#ce9178">"C"</tspan><tspan fill="#ffffff">};</tspan></text>
  <text x="56" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">swap(names, </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">); </tspan><tspan fill="#9aa4b8">// T = String 추론</tspan></text>
  <text x="56" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// 결과: ["C", "B", "A"]</tspan></text>
  <text x="56" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// 명시적 타입 인자도 가능</tspan></text>
  <text x="56" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">Utils.&lt;</tspan><tspan fill="#7ec8e3" font-weight="600">String</tspan><tspan fill="#ffffff">&gt;swap(names, </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">);</tspan></text>

  <!-- Right: fromArray method -->
  <rect x="460" y="64" width="380" height="260" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">List 반환 제네릭 메서드</text>
  <text x="476" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">public static</tspan><tspan fill="#ffffff"> &lt;</tspan><tspan fill="#55c555">T</tspan><tspan fill="#ffffff">&gt; List&lt;</tspan><tspan fill="#55c555">T</tspan><tspan fill="#ffffff">&gt;</tspan></text>
  <text x="476" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">        fromArray(</tspan><tspan fill="#55c555">T</tspan><tspan fill="#ffffff">[] arr) {</tspan></text>
  <text x="476" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">return new</tspan><tspan fill="#ffffff"> ArrayList&lt;&gt;(Arrays.asList(arr));</tspan></text>
  <text x="476" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>
  <text x="476" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// Integer[] → List&lt;Integer&gt;</tspan></text>
  <text x="476" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Integer</tspan><tspan fill="#ffffff">[] nums = {</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff">};</tspan></text>
  <text x="476" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">List&lt;</tspan><tspan fill="#7ec8e3" font-weight="600">Integer</tspan><tspan fill="#ffffff">&gt; list = fromArray(nums);</tspan></text>
  <text x="476" y="260" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// 정적 팩토리에서 자주 사용</tspan></text>
  <text x="476" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// Collections.emptyList()</tspan></text>
  <text x="476" y="300" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// Collections.singletonList()</tspan></text>

  <text x="440" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">제네릭 메서드 = 비 제네릭 클래스에서도 선언 가능 — static 메서드에서 특히 유용</text>
</svg>
