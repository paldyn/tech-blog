<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">SQL Server DMV 진단 지도</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">증상별 핵심 DMV 연결</text>

  <!-- Center: Problem -->
  <rect x="330" y="192" width="220" height="52" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="440" y="214" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">성능 문제 발생</text>
  <text x="440" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">CPU / IO / 블로킹 / 메모리</text>

  <!-- CPU -->
  <rect x="60" y="76" width="220" height="72" rx="8" fill="#0d1e2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">CPU 과부하</text>
  <text x="170" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8">dm_exec_query_stats</text>
  <text x="170" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">총 CPU·실행수로 상위 쿼리 추출</text>

  <path d="M 280 112 C 300 112 310 162 330 200" stroke="#7ec8e3" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- IO -->
  <rect x="600" y="76" width="220" height="72" rx="8" fill="#0d1e2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="710" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">과다 IO</text>
  <text x="710" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8">dm_io_virtual_file_stats</text>
  <text x="710" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">파일별 IO 대기·처리량 확인</text>

  <path d="M 600 112 C 580 112 570 162 550 200" stroke="#7ec8e3" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- Blocking -->
  <rect x="60" y="340" width="220" height="72" rx="8" fill="#0d1e2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="170" y="364" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">블로킹/교착</text>
  <text x="170" y="384" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8">dm_exec_requests</text>
  <text x="170" y="402" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">blocking_session_id · wait_type</text>

  <path d="M 280 376 C 300 376 310 280 330 244" stroke="#7ec8e3" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- Memory -->
  <rect x="600" y="340" width="220" height="72" rx="8" fill="#0d1e2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="710" y="364" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">메모리 압박</text>
  <text x="710" y="384" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8">dm_os_ring_buffers</text>
  <text x="710" y="402" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">dm_os_memory_clerks</text>

  <path d="M 600 376 C 580 376 570 280 550 244" stroke="#7ec8e3" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- Wait stats (center bottom) -->
  <rect x="280" y="310" width="320" height="64" rx="8" fill="#0a1a0e" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="334" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">공통: dm_os_wait_stats</text>
  <text x="440" y="354" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8">대기 유형별 총 누적 시간 → 시스템 전체 병목 파악</text>
  <text x="440" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">SOS_SCHEDULER · PAGEIOLATCH · LCK_M_X · RESOURCE_SEMAPHORE</text>

  <line x1="440" y1="244" x2="440" y2="310" stroke="#55c555" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Active sessions -->
  <rect x="200" y="192" width="120" height="52" rx="6" fill="#101010" stroke="#888" stroke-width="1"/>
  <text x="260" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">dm_exec_sessions</text>
  <text x="260" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">활성 세션 목록</text>

  <rect x="560" y="192" width="120" height="52" rx="6" fill="#101010" stroke="#888" stroke-width="1"/>
  <text x="620" y="212" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">dm_tran_locks</text>
  <text x="620" y="230" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">현재 잠금 현황</text>

  <text x="440" y="468" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">모든 DMV는 sys.dm_* 스키마 · SELECT 권한만으로 읽기 가능</text>
</svg>
