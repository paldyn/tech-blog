<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arrh" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrh2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <text x="440" y="50" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">HTTP 요청/응답 구조와 보안</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">보안 관점에서 본 HTTP 메시지</text>

  <!-- Client -->
  <rect x="60" y="110" width="140" height="280" rx="10" fill="#1a2035" stroke="#7ec8e3" stroke-width="2"/>
  <text x="130" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">브라우저</text>
  <text x="130" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">(클라이언트)</text>
  <text x="130" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8" text-anchor="middle">요청 전송</text>
  <text x="130" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">응답 렌더링</text>
  <text x="130" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">JavaScript 실행</text>
  <text x="130" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">쿠키 저장</text>
  <text x="130" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">SOP 적용</text>

  <!-- Request arrow -->
  <line x1="200" y1="230" x2="359" y2="230" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrh)"/>
  <text x="280" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">HTTP Request</text>

  <!-- Response arrow -->
  <line x1="360" y1="260" x2="201" y2="260" stroke="#55c555" stroke-width="2" marker-end="url(#arrh2)"/>
  <text x="280" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">HTTP Response</text>

  <!-- HTTP Message breakdown -->
  <rect x="360" y="110" width="460" height="130" rx="8" fill="#12121a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="590" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7777cc" text-anchor="middle">HTTP 요청 (보안 관련 부분)</text>
  <text x="380" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" font-weight="600">Method</text>
  <text x="430" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">GET / POST — 의미적 구분, 멱등성</text>
  <text x="380" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" font-weight="600">URL</text>
  <text x="430" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">파라미터가 로그에 기록 → 민감 정보 금지</text>
  <text x="380" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" font-weight="600">Headers</text>
  <text x="430" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Cookie, Authorization, Origin, Referer</text>
  <text x="380" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" font-weight="600">Body</text>
  <text x="430" y="210" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Content-Type에 따라 파싱 방식 결정</text>
  <text x="380" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">⚠ 모든 부분이 공격 벡터 — 서버에서 반드시 검증</text>

  <rect x="360" y="258" width="460" height="130" rx="8" fill="#121a12" stroke="#55c555" stroke-width="1.5"/>
  <text x="590" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">HTTP 응답 (보안 헤더)</text>
  <text x="380" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" font-weight="600">HSTS</text>
  <text x="430" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">HTTPS 강제, 다운그레이드 방지</text>
  <text x="380" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" font-weight="600">CSP</text>
  <text x="430" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">허용된 리소스 소스만 로드 (XSS 방어)</text>
  <text x="380" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" font-weight="600">X-Frame-Options</text>
  <text x="430" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">클릭재킹 방지</text>
  <text x="380" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" font-weight="600">Set-Cookie</text>
  <text x="430" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">HttpOnly, Secure, SameSite 속성</text>
  <text x="380" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">→ 이 헤더들을 추가만 해도 많은 공격 차단</text>

  <!-- HTTPS vs HTTP -->
  <rect x="60" y="420" width="760" height="60" rx="8" fill="#1a1a0a" stroke="#e0a055" stroke-width="1.5"/>
  <text x="440" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e0a055" text-anchor="middle">HTTP vs HTTPS</text>
  <text x="250" y="466" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">HTTP: 평문 전송 → 중간자 도청·변조 가능</text>
  <text x="630" y="466" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">HTTPS: TLS 암호화 → 기밀성·무결성 보장</text>
</svg>
