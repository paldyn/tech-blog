<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrd" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">HTTP 요청/응답 구조와 보안 포인트</text>

  <!-- Browser -->
  <rect x="60" y="80" width="140" height="60" rx="8" fill="#0a1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="130" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">브라우저</text>
  <text x="130" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">클라이언트</text>

  <!-- Arrow request -->
  <line x1="200" y1="110" x2="380" y2="110" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="290" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">HTTP 요청</text>

  <!-- Server -->
  <rect x="380" y="80" width="140" height="60" rx="8" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="450" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">웹 서버</text>
  <text x="450" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">서버</text>

  <!-- Arrow response -->
  <line x1="380" y1="120" x2="200" y2="120" stroke="#55c555" stroke-width="2" marker-end="url(#arrd)"/>
  <text x="290" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">HTTP 응답</text>

  <!-- Attacker MitM -->
  <rect x="560" y="80" width="260" height="60" rx="8" fill="#1a0808" stroke="#e05555" stroke-width="1.5"/>
  <text x="690" y="102" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">HTTP (평문) 위험</text>
  <text x="690" y="120" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">도청 · 변조 · 중간자(MitM) 공격 가능</text>
  <text x="690" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">쿠키 · 비밀번호 · 토큰 노출</text>

  <!-- Request anatomy -->
  <text x="60" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">HTTP 요청 구조 — 보안 포인트</text>

  <rect x="60" y="192" width="380" height="210" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">POST</text>
  <text x="120" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> /api/login HTTP/1.1</text>
  <text x="80" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">Host:</text>
  <text x="130" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> example.com</text>
  <text x="80" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">Cookie:</text>
  <text x="147" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" xml:space="preserve"> session=abc123</text>
  <text x="80" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">Authorization:</text>
  <text x="208" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" xml:space="preserve"> Bearer eyJ...</text>
  <text x="80" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">Origin:</text>
  <text x="144" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> https://app.com</text>
  <text x="80" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">{"username":"alice",</text>
  <text x="80" y="336" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve"> "password":"secret"}</text>
  <text x="80" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" xml:space="preserve"># HTTPS 없으면 전부 도청 가능!</text>
  <text x="80" y="396" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> </text>

  <!-- Response anatomy -->
  <text x="460" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">HTTP 응답 — 보안 헤더</text>

  <rect x="460" y="192" width="360" height="210" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">HTTP/1.1</text>
  <text x="556" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> 200 OK</text>
  <text x="480" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">Strict-Transport-Security:</text>
  <text x="480" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve">  max-age=31536000</text>
  <text x="480" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">Content-Security-Policy:</text>
  <text x="480" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve">  default-src 'self'</text>
  <text x="480" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">Set-Cookie:</text>
  <text x="480" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve">  id=x; HttpOnly; Secure; SameSite=Lax</text>
  <text x="480" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">X-Content-Type-Options:</text>
  <text x="480" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve">  nosniff</text>
  <text x="480" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" xml:space="preserve"> </text>

  <!-- HTTPS banner -->
  <rect x="60" y="422" width="760" height="54" rx="6" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="446" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">HTTPS = HTTP + TLS</text>
  <text x="440" y="466" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">전송 중 암호화 · 서버 신원 검증 · 무결성 보장 — 2024년 기준 전체 웹 트래픽의 95% 이상이 HTTPS</text>
</svg>
