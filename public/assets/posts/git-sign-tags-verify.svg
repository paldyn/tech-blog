<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">릴리스 태그 서명 워크플로</text>

  <defs>
    <marker id="arrst" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Step 1 -->
  <rect x="60" y="80" width="200" height="70" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="160" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">1. 서명 태그 생성</text>
  <text x="160" y="132" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">git tag -s v1.0.0</text>

  <line x1="260" y1="115" x2="300" y2="115" stroke="#55c555" stroke-width="2" marker-end="url(#arrst)"/>

  <!-- Step 2 -->
  <rect x="300" y="80" width="200" height="70" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="400" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">2. 태그 push</text>
  <text x="400" y="132" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">git push origin v1.0.0</text>

  <line x1="500" y1="115" x2="540" y2="115" stroke="#55c555" stroke-width="2" marker-end="url(#arrst)"/>

  <!-- Step 3 -->
  <rect x="540" y="80" width="200" height="70" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">3. 검증</text>
  <text x="640" y="132" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#888">git verify-tag v1.0.0</text>

  <!-- Code box -->
  <rect x="60" y="175" width="760" height="165" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 모든 태그 서명 상태 일괄 확인</text>
  <text xml:space="preserve" x="80" y="219" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">git tag -l | xargs -I{} git verify-tag {} 2&gt;&amp;1</text>
  <text xml:space="preserve" x="80" y="245" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># fetch 시 서명 검증 (--verify-signatures)</text>
  <text xml:space="preserve" x="80" y="265" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">git fetch --verify-signatures origin</text>
  <text xml:space="preserve" x="80" y="291" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 서명 태그를 기준으로 체크아웃</text>
  <text xml:space="preserve" x="80" y="311" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">git checkout v1.0.0</text>
  <text xml:space="preserve" x="80" y="331" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 서명 확인 후 릴리스 zip 생성</text>
</svg>
