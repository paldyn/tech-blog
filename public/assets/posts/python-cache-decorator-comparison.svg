<svg width="880" height="380" viewBox="0 0 880 380" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>
  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">lru_cache vs cache vs cached_property</text>
  <!-- Table header -->
  <rect x="60" y="66" width="760" height="40" fill="#0d0d20" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="160" y="91" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">데코레이터</text>
  <text x="340" y="91" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">크기 제한</text>
  <text x="520" y="91" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">대상</text>
  <text x="720" y="91" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">추가 기능</text>
  <!-- Row 1: lru_cache -->
  <rect x="60" y="106" width="760" height="54" fill="#070714" rx="0" stroke="#1e2433" stroke-width="0.5"/>
  <text x="160" y="125" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">lru_cache(maxsize=N)</text>
  <text x="160" y="146" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">3.2+</text>
  <text x="340" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">최대 N개 (LRU)</text>
  <text x="520" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">일반 함수</text>
  <text x="720" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">cache_info(), cache_clear()</text>
  <!-- Row 2: cache -->
  <rect x="60" y="160" width="760" height="54" fill="#000000" rx="0" stroke="#1e2433" stroke-width="0.5"/>
  <text x="160" y="179" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">cache</text>
  <text x="160" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">3.9+ (lru_cache(maxsize=None))</text>
  <text x="340" y="189" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">무제한</text>
  <text x="520" y="189" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">일반 함수</text>
  <text x="720" y="189" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">더 빠름 (크기 추적 없음)</text>
  <!-- Row 3: cached_property -->
  <rect x="60" y="214" width="760" height="54" fill="#070714" rx="0" stroke="#1e2433" stroke-width="0.5"/>
  <text x="160" y="233" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">cached_property</text>
  <text x="160" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">3.8+</text>
  <text x="340" y="243" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">인스턴스별 1개</text>
  <text x="520" y="243" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">클래스 메서드</text>
  <text x="720" y="243" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">__dict__에 직접 저장</text>
  <!-- Row 4: methodtools -->
  <rect x="60" y="268" width="760" height="54" fill="#000000" rx="0" stroke="#1e2433" stroke-width="0.5"/>
  <text x="160" y="287" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">@cache (메서드)</text>
  <text x="160" y="308" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">직접 구현 필요</text>
  <text x="340" y="297" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">설정에 따라</text>
  <text x="520" y="297" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ffffff">인스턴스 메서드</text>
  <text x="720" y="297" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">self 때문에 메모리 누수 주의</text>
  <!-- bottom note -->
  <text x="440" y="352" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">lru_cache / cache 인자는 hashable해야 함 — 리스트, 딕셔너리는 직접 캐시 불가</text>
</svg>
