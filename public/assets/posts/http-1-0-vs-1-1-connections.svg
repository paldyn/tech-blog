<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="470" viewBox="0 0 880 470">
  <defs>
    <marker id="arrR" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arrG" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="880" height="470" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">연결 처리 — 1.0 vs 1.1</text>
  <text x="60" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">요청당 새 연결 vs 하나의 연결 재사용</text>

  <!-- LEFT: HTTP/1.0 -->
  <text x="60" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e05555">HTTP/1.0 — 요청마다 새 TCP 연결</text>

  <rect x="60" y="135" width="360" height="290" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <!-- conn 1 -->
  <text x="80" y="175" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">[연결1] 핸드셰이크</text>
  <line x1="80" y1="190" x2="400" y2="190" stroke="#e05555" stroke-width="2" marker-end="url(#arrR)"/>
  <text x="84" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">GET /a.png  → close</text>

  <!-- conn 2 -->
  <text x="80" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">[연결2] 핸드셰이크</text>
  <line x1="80" y1="263" x2="400" y2="263" stroke="#e05555" stroke-width="2" marker-end="url(#arrR)"/>
  <text x="84" y="281" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">GET /b.css  → close</text>

  <!-- conn 3 -->
  <text x="80" y="321" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">[연결3] 핸드셰이크</text>
  <line x1="80" y1="336" x2="400" y2="336" stroke="#e05555" stroke-width="2" marker-end="url(#arrR)"/>
  <text x="84" y="354" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">GET /c.js   → close</text>

  <text x="80" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" xml:space="preserve">매 요청마다 RTT 비용 반복 →  느림</text>

  <!-- RIGHT: HTTP/1.1 -->
  <text x="480" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#55c555">HTTP/1.1 — 하나의 연결 재사용</text>

  <rect x="480" y="135" width="340" height="290" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="500" y="175" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">[연결1] 핸드셰이크 (1회)</text>
  <line x1="500" y1="195" x2="800" y2="195" stroke="#55c555" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="504" y="225" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">GET /a.png</text>
  <text x="504" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">GET /b.css</text>
  <text x="504" y="275" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">GET /c.js</text>
  <text x="504" y="305" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve">… 같은 소켓으로 계속</text>

  <text x="500" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" xml:space="preserve">핸드셰이크 1회 → 지연 감소 (기본값)</text>
</svg>
