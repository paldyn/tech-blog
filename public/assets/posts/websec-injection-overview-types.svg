<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">인젝션 취약점 유형 분류</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Injection — 신뢰할 수 없는 데이터가 인터프리터로 전달될 때 발생</text>

  <!-- Root -->
  <rect x="320" y="96" width="240" height="60" rx="10" fill="#1a0f0f" stroke="#e05555" stroke-width="2"/>
  <text x="440" y="122" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555">인젝션 (Injection)</text>
  <text x="440" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">OWASP A03 2021</text>

  <!-- Level 2: DB / Server / Client -->
  <!-- DB Injection -->
  <rect x="60" y="218" width="200" height="56" rx="8" fill="#1a0f1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="160" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">데이터베이스 인젝션</text>
  <text x="160" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">SQL · NoSQL · LDAP · ORM</text>

  <!-- Server-side Injection -->
  <rect x="340" y="218" width="200" height="56" rx="8" fill="#1a1a0f" stroke="#e0a055" stroke-width="1.5"/>
  <text x="440" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e0a055">서버 사이드 인젝션</text>
  <text x="440" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Command · Template · SSTI</text>

  <!-- Client-side Injection -->
  <rect x="620" y="218" width="200" height="56" rx="8" fill="#0f1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="720" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">클라이언트 사이드</text>
  <text x="720" y="262" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">XSS · DOM · CSS 인젝션</text>

  <!-- Arrows from root to Level 2 -->
  <line x1="380" y1="156" x2="220" y2="218" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="440" y1="156" x2="440" y2="218" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="500" y1="156" x2="660" y2="218" stroke="#e05555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Level 3: Specific types -->
  <!-- Under DB -->
  <rect x="60" y="322" width="92" height="46" rx="6" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="106" y="341" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">SQL</text>
  <text x="106" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666">Classic/Blind</text>

  <rect x="164" y="322" width="92" height="46" rx="6" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="210" y="341" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">NoSQL</text>
  <text x="210" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666">MongoDB/$where</text>

  <!-- Under Server -->
  <rect x="340" y="322" width="92" height="46" rx="6" fill="#111" stroke="#e0a055" stroke-width="1"/>
  <text x="386" y="341" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e0a055">Command</text>
  <text x="386" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666">OS Shell</text>

  <rect x="444" y="322" width="92" height="46" rx="6" fill="#111" stroke="#e0a055" stroke-width="1"/>
  <text x="490" y="341" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e0a055">Template</text>
  <text x="490" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666">Jinja2/Twig</text>

  <!-- Under Client -->
  <rect x="620" y="322" width="92" height="46" rx="6" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="666" y="341" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">XSS</text>
  <text x="666" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666">Reflected/Stored</text>

  <rect x="724" y="322" width="92" height="46" rx="6" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="770" y="341" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">DOM XSS</text>
  <text x="770" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#666">innerHTML</text>

  <!-- Common defense banner -->
  <rect x="60" y="398" width="760" height="66" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="422" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">공통 방어 원칙</text>
  <text x="150" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">입력 검증</text>
  <text x="340" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">파라미터 바인딩</text>
  <text x="530" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">출력 인코딩</text>
  <text x="720" y="448" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">최소 권한</text>
</svg>
