<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">추적 브랜치 설정 명령</text>
  <text x="60" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">설정·변경·확인 방법</text>

  <!-- Code block -->
  <rect x="60" y="100" width="760" height="234" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="122" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">
    <tspan x="76" dy="0"><tspan fill="#6a8aa0"># push 시 추적 설정 (-u = --set-upstream)</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git push</tspan> -u origin main</tspan>
    <tspan x="76" dy="18"> </tspan>
    <tspan x="76" dy="18"><tspan fill="#6a8aa0"># 이미 있는 브랜치에 추적 설정</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git branch</tspan> --set-upstream-to=origin/main main</tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git branch</tspan> -u origin/main main   <tspan fill="#6a8aa0"># 단축형</tspan></tspan>
    <tspan x="76" dy="18"> </tspan>
    <tspan x="76" dy="18"><tspan fill="#6a8aa0"># 추적 관계 제거</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git branch</tspan> --unset-upstream</tspan>
    <tspan x="76" dy="18"> </tspan>
    <tspan x="76" dy="18"><tspan fill="#6a8aa0"># 모든 브랜치 추적 관계 확인</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git branch</tspan> -vv</tspan>
    <tspan x="76" dy="18"><tspan fill="#6a8aa0"># → * main  abc1234 [origin/main: ahead 1] feat: ...</tspan></tspan>
  </text>

  <!-- Bottom cards -->
  <rect x="60" y="352" width="232" height="50" rx="8" fill="#0d1117" stroke="#7ec8e3" stroke-width="1.2"/>
  <text x="176" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">git push -u origin &lt;branch&gt;</text>
  <text x="176" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">push 시 추적 자동 설정</text>

  <rect x="308" y="352" width="232" height="50" rx="8" fill="#0d1117" stroke="#55c555" stroke-width="1.2"/>
  <text x="424" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">git branch -u origin/&lt;branch&gt;</text>
  <text x="424" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">기존 브랜치에 추적 설정</text>

  <rect x="556" y="352" width="164" height="50" rx="8" fill="#0d1117" stroke="#7777cc" stroke-width="1.2"/>
  <text x="638" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" text-anchor="middle">git branch -vv</text>
  <text x="638" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">추적 관계 전체 확인</text>
</svg>
