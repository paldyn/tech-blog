<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 440" width="880" height="440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">LLM 벤치마크 유형 분류</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">지식 · 추론 · 코딩 · 수학 · 인간 선호도</text>

  <!-- Category 1: Knowledge -->
  <rect x="60" y="90" width="230" height="150" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="2"/>
  <text x="175" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">지식·이해</text>
  <line x1="76" y1="126" x2="274" y2="126" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• MMLU</text>
  <text x="80" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  57개 과목 객관식</text>
  <text x="80" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• TruthfulQA</text>
  <text x="80" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  허위 주장 거부 능력</text>
  <text x="80" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  (환각 측정)</text>

  <!-- Category 2: Reasoning -->
  <rect x="310" y="90" width="240" height="150" rx="8" fill="#111827" stroke="#55c555" stroke-width="2"/>
  <text x="430" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">추론·상식</text>
  <line x1="326" y1="126" x2="534" y2="126" stroke="#3a4a6e" stroke-width="1"/>
  <text x="330" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• HellaSwag</text>
  <text x="330" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  문장 완성 상식추론</text>
  <text x="330" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• ARC (Challenge)</text>
  <text x="330" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  초등~고교 과학 문제</text>
  <text x="330" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">• GSM8K (수학 추론)</text>

  <!-- Category 3: Coding -->
  <rect x="570" y="90" width="250" height="150" rx="8" fill="#111827" stroke="#e05555" stroke-width="2"/>
  <text x="695" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e05555">코딩</text>
  <line x1="586" y1="126" x2="804" y2="126" stroke="#3a4a6e" stroke-width="1"/>
  <text x="590" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• HumanEval</text>
  <text x="590" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  Python 함수 완성 (164문제)</text>
  <text x="590" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• SWE-bench</text>
  <text x="590" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  실제 GitHub 이슈 해결</text>
  <text x="590" y="224" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  (고난이도, 에이전트용)</text>

  <!-- Category 4: Human preference -->
  <rect x="60" y="268" width="355" height="140" rx="8" fill="#111827" stroke="#7777cc" stroke-width="2"/>
  <text x="238" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">인간 선호도 (Human Preference)</text>
  <line x1="76" y1="304" x2="399" y2="304" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• LMSYS Chatbot Arena</text>
  <text x="80" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  블라인드 대결 → ELO 레이팅</text>
  <text x="80" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• MT-Bench</text>
  <text x="80" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  GPT-4가 심사 (LLM-as-Judge)</text>
  <text x="80" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  다단계 대화 8개 카테고리</text>

  <!-- Category 5: Math -->
  <rect x="435" y="268" width="385" height="140" rx="8" fill="#111827" stroke="#55c555" stroke-width="2"/>
  <text x="627" y="292" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">수학·추론 특화</text>
  <line x1="451" y1="304" x2="804" y2="304" stroke="#3a4a6e" stroke-width="1"/>
  <text x="455" y="324" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• MATH (Hendrycks)</text>
  <text x="455" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  고교~대학 수학 12,500문제</text>
  <text x="455" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">• AIME (수학 올림피아드)</text>
  <text x="455" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  최고난이도 추론 측정</text>
  <text x="455" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">  (DeepSeek-R1, o1 비교 기준)</text>
</svg>
