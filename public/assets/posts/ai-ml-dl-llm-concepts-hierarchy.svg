<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 620"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <!-- Background -->
  <rect width="880" height="620" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="52" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">AI · ML · DL · LLM 개념 계층 구조</text>
  <text x="440" y="76" text-anchor="middle" font-size="13" fill="#888">큰 개념이 작은 개념을 포함하는 집합 관계</text>

  <!-- AI outer ring -->
  <ellipse cx="440" cy="340" rx="360" ry="230" fill="none" stroke="#7777cc" stroke-width="2" stroke-dasharray="6,4"/>
  <rect x="62" y="108" width="40" height="22" fill="#0a0a0a"/>
  <text x="82" y="124" text-anchor="middle" font-size="16" font-weight="600" fill="#7777cc">AI (인공지능)</text>

  <!-- ML ring -->
  <ellipse cx="440" cy="355" rx="270" ry="175" fill="none" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="6,4"/>
  <rect x="155" y="182" width="40" height="22" fill="#0a0a0a"/>
  <text x="175" y="197" text-anchor="middle" font-size="16" font-weight="600" fill="#7ec8e3">ML (머신러닝)</text>

  <!-- DL ring -->
  <ellipse cx="440" cy="370" rx="185" ry="122" fill="none" stroke="#55c555" stroke-width="2" stroke-dasharray="6,4"/>
  <rect x="240" y="252" width="40" height="22" fill="#0a0a0a"/>
  <text x="260" y="266" text-anchor="middle" font-size="16" font-weight="600" fill="#55c555">DL (딥러닝)</text>

  <!-- LLM innermost -->
  <ellipse cx="440" cy="385" rx="105" ry="68" fill="#1a1a2e" stroke="#e05555" stroke-width="2"/>
  <text x="440" y="378" text-anchor="middle" font-size="16" font-weight="600" fill="#e05555">LLM</text>
  <text x="440" y="398" text-anchor="middle" font-size="12" fill="#e8e8e8">대규모 언어 모델</text>

  <!-- AI label block -->
  <rect x="60" y="458" width="180" height="90" fill="#111122" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="150" y="480" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">AI 특징</text>
  <text x="75" y="500" font-size="12" fill="#888">• 규칙 기반 시스템</text>
  <text x="75" y="518" font-size="12" fill="#888">• 전문가 시스템</text>
  <text x="75" y="536" font-size="12" fill="#888">• 탐색 알고리즘</text>

  <!-- ML label block -->
  <rect x="260" y="458" width="180" height="90" fill="#0f1a1f" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="350" y="480" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">ML 특징</text>
  <text x="275" y="500" font-size="12" fill="#888">• 데이터로 학습</text>
  <text x="275" y="518" font-size="12" fill="#888">• 패턴 인식</text>
  <text x="275" y="536" font-size="12" fill="#888">• SVM · 결정트리</text>

  <!-- DL label block -->
  <rect x="460" y="458" width="180" height="90" fill="#0f1f12" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="550" y="480" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">DL 특징</text>
  <text x="475" y="500" font-size="12" fill="#888">• 신경망 다층 구조</text>
  <text x="475" y="518" font-size="12" fill="#888">• 특징 자동 추출</text>
  <text x="475" y="536" font-size="12" fill="#888">• CNN · RNN · Transformer</text>

  <!-- LLM label block -->
  <rect x="660" y="458" width="180" height="90" fill="#1f0f0f" rx="8" stroke="#e05555" stroke-width="1.5"/>
  <text x="750" y="480" text-anchor="middle" font-size="13" font-weight="600" fill="#e05555">LLM 특징</text>
  <text x="675" y="500" font-size="12" fill="#888">• 수십억 파라미터</text>
  <text x="675" y="518" font-size="12" fill="#888">• 자연어 생성</text>
  <text x="675" y="536" font-size="12" fill="#888">• GPT · Claude · Gemini</text>

  <!-- Footer -->
  <text x="440" y="590" text-anchor="middle" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈 #1</text>
</svg>
