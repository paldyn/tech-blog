<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="ar" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">git gc 수행 과정</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">Loose → Pack 통합, 고아 오브젝트 제거</text>

  <!-- Step 1 -->
  <rect x="60" y="92" width="200" height="70" fill="#111" rx="8" stroke="#555" stroke-width="1"/>
  <text x="160" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">Loose 오브젝트</text>
  <text x="160" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">수백~수천 개</text>
  <text x="160" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">각자 별도 파일</text>

  <line x1="260" y1="127" x2="308" y2="127" stroke="#55c555" stroke-width="2" marker-end="url(#ar)"/>
  <text x="284" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">pack</text>

  <!-- Step 2 -->
  <rect x="310" y="92" width="200" height="70" fill="#0d1a0d" rx="8" stroke="#55c555" stroke-width="1"/>
  <text x="410" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Pack 파일</text>
  <text x="410" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">델타 압축 적용</text>
  <text x="410" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">.pack + .idx</text>

  <line x1="510" y1="127" x2="558" y2="127" stroke="#55c555" stroke-width="2" marker-end="url(#ar)"/>
  <text x="534" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">prune</text>

  <!-- Step 3 -->
  <rect x="560" y="92" width="200" height="70" fill="#0d1a0d" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="660" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">최적화 완료</text>
  <text x="660" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">고아 오브젝트 제거</text>
  <text x="660" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">저장소 크기 감소</text>

  <!-- gc commands -->
  <rect x="60" y="180" width="760" height="180" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">gc 관련 명령</text>
  <text x="76" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">  # 기본 gc (자동으로 조건 충족 시 실행)</text>
  <text x="76" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">  git gc</tspan></text>
  <text x="76" y="266" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">  # 강제 전체 gc (시간 걸림)</text>
  <text x="76" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">  git gc</tspan><tspan fill="#ffffff"> --aggressive</tspan></text>
  <text x="76" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">  # pack 파일 목록 확인</text>
  <text x="76" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  ls .git/objects/pack/</tspan></text>
  <text x="76" y="350" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#888">  # pack에 포함된 오브젝트 수 확인</tspan></text>
</svg>
