<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">브랜치 목록 조회 옵션</text>
  <text x="60" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">로컬·원격·병합 여부까지 한눈에</text>

  <!-- Left: list options -->
  <text x="60" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">조회 명령</text>
  <rect x="60" y="122" width="370" height="222" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan x="76" dy="0"><tspan fill="#9aa4b8"># 로컬 브랜치 목록</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git branch</tspan></tspan>
    <tspan x="76" dy="18"> </tspan>
    <tspan x="76" dy="18"><tspan fill="#9aa4b8"># 원격 브랜치 포함</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git branch</tspan> -a</tspan>
    <tspan x="76" dy="18"> </tspan>
    <tspan x="76" dy="18"><tspan fill="#9aa4b8"># 원격 브랜치만</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git branch</tspan> -r</tspan>
    <tspan x="76" dy="18"> </tspan>
    <tspan x="76" dy="18"><tspan fill="#9aa4b8"># 이미 병합된 브랜치만</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git branch</tspan> --merged</tspan>
    <tspan x="76" dy="18"> </tspan>
    <tspan x="76" dy="18"><tspan fill="#9aa4b8"># 병합 안 된 브랜치만</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git branch</tspan> --no-merged</tspan>
  </text>

  <!-- Right: sample output -->
  <text x="450" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">git branch -a 출력 예시</text>
  <rect x="450" y="122" width="370" height="222" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="466" y="144" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan x="466" dy="0"><tspan fill="#55c555">* main</tspan>              <tspan fill="#9aa4b8">← 현재 브랜치</tspan></tspan>
    <tspan x="466" dy="18">  develop</tspan>
    <tspan x="466" dy="18">  feature/login</tspan>
    <tspan x="466" dy="18">  feature/profile</tspan>
    <tspan x="466" dy="18">  hotfix/auth-bug</tspan>
    <tspan x="466" dy="18"><tspan fill="#e05555">  remotes/origin/HEAD</tspan></tspan>
    <tspan x="466" dy="18"><tspan fill="#e05555">  remotes/origin/main</tspan></tspan>
    <tspan x="466" dy="18"><tspan fill="#e05555">  remotes/origin/develop</tspan></tspan>
    <tspan x="466" dy="18"><tspan fill="#9aa4b8">  # 빨간색: 원격 추적 브랜치</tspan></tspan>
  </text>

  <!-- verbose option -->
  <rect x="60" y="362" width="760" height="72" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="76" y="384" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan x="76" dy="0"><tspan fill="#9aa4b8"># 각 브랜치의 최신 커밋 해시와 메시지 표시</tspan></tspan>
    <tspan x="76" dy="18"><tspan fill="#7ec8e3">git branch</tspan> -v</tspan>
    <tspan x="76" dy="18"><tspan fill="#9aa4b8"># → * main  c7d8e9f feat: add login page</tspan></tspan>
  </text>
</svg>
