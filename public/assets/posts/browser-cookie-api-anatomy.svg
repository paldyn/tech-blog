<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">쿠키 구조와 보안 속성</text>

  <!-- Cookie string anatomy -->
  <text x="60" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7ec8e3">Set-Cookie 헤더 구조</text>

  <rect x="60" y="96" width="760" height="40" rx="6" fill="#131a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="121" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">session=abc123; Max-Age=3600; Path=/; Secure; HttpOnly; SameSite=Lax</text>

  <!-- Attributes breakdown -->
  <!-- name=value -->
  <line x1="90" y1="136" x2="90" y2="160" stroke="#55c555" stroke-width="1.5"/>
  <text x="60" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#55c555">name=value</text>

  <!-- Max-Age -->
  <line x1="225" y1="136" x2="225" y2="160" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="200" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">Max-Age</text>
  <text x="200" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">초 단위 유효기간</text>

  <!-- Path -->
  <line x1="372" y1="136" x2="372" y2="160" stroke="#e8a84c" stroke-width="1.5"/>
  <text x="350" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e8a84c">Path</text>

  <!-- Secure -->
  <line x1="490" y1="136" x2="490" y2="160" stroke="#e05555" stroke-width="1.5"/>
  <text x="468" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555">Secure</text>
  <text x="455" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">HTTPS만 전송</text>

  <!-- HttpOnly -->
  <line x1="585" y1="136" x2="585" y2="160" stroke="#e05555" stroke-width="1.5"/>
  <text x="558" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#e05555">HttpOnly</text>
  <text x="547" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">JS 접근 차단</text>

  <!-- SameSite -->
  <line x1="715" y1="136" x2="715" y2="160" stroke="#7777cc" stroke-width="1.5"/>
  <text x="690" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7777cc">SameSite</text>
  <text x="680" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">CSRF 방어</text>

  <!-- Attributes table -->
  <text x="60" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">보안 속성 정리</text>

  <!-- Secure row -->
  <rect x="60" y="242" width="760" height="52" rx="4" fill="#111"/>
  <text x="80" y="263" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">Secure</text>
  <text x="200" y="263" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">HTTPS 연결에서만 쿠키 전송 (localhost 예외)</text>
  <text x="200" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8">중간자 공격으로 쿠키 탈취 방지</text>

  <!-- HttpOnly row -->
  <rect x="60" y="294" width="760" height="52" rx="4" fill="#0f0f0f"/>
  <text x="80" y="315" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">HttpOnly</text>
  <text x="200" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">JavaScript로 document.cookie 접근 불가</text>
  <text x="200" y="335" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8">XSS 공격에서 쿠키 탈취 방지 — 세션 토큰에 필수</text>

  <!-- SameSite row -->
  <rect x="60" y="346" width="760" height="70" rx="4" fill="#111"/>
  <text x="80" y="367" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">SameSite</text>
  <text x="200" y="367" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">크로스 사이트 요청 시 쿠키 전송 여부 — CSRF 방어</text>
  <text x="200" y="387" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">Strict <tspan fill="#9aa4b8">— 같은 사이트 요청만 전송</tspan></text>
  <text x="200" y="405" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7777cc">Lax <tspan fill="#9aa4b8">— 탑레벨 GET 허용 (기본값)</tspan></text>

  <!-- Max-Age vs Expires -->
  <text x="60" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">유효기간: Max-Age vs Expires</text>

  <rect x="60" y="460" width="370" height="48" rx="6" fill="#131a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="80" y="480" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">Max-Age=3600</text>
  <text x="240" y="480" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">초 단위 — 우선순위 높음</text>
  <text x="80" y="498" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">Max-Age=0 또는 음수 → 즉시 삭제</text>

  <rect x="450" y="460" width="370" height="48" rx="6" fill="#131a2e" stroke="#555" stroke-width="1"/>
  <text x="470" y="480" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">Expires=날짜문자열</text>
  <text x="620" y="480" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">절대 시간</text>
  <text x="470" y="498" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#9aa4b8">둘 다 없으면 세션 쿠키 (탭 닫으면 삭제)</text>
</svg>
