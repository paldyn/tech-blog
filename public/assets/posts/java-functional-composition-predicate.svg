<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Predicate 조합 — and / or / negate</text>

  <!-- and() -->
  <rect x="60" y="66" width="372" height="84" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="80" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">p1.and(p2)</text>
  <text x="80" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">p1(x) &amp;&amp; p2(x) — 단락 평가 (p1 false면 p2 미실행)</text>
  <text x="80" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">예: notNull.and(notEmpty)  — null도 아니고 빈 문자열도 아닌</text>
  <text x="80" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">List.stream().filter(p1.and(p2).and(p3)) 체이닝 가능</text>

  <!-- or() -->
  <rect x="448" y="66" width="372" height="84" rx="8" fill="#111" stroke="#7777cc" stroke-width="1.5"/>
  <text x="468" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">p1.or(p2)</text>
  <text x="468" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">p1(x) || p2(x) — 단락 평가 (p1 true면 p2 미실행)</text>
  <text x="468" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">예: isVip.or(isPremium)  — VIP이거나 프리미엄인</text>
  <text x="468" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">여러 조건 중 하나라도 만족하면 통과</text>

  <!-- negate() -->
  <rect x="60" y="162" width="760" height="60" rx="8" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="80" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">p1.negate()</text>
  <text x="80" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">!p1(x) — 기존 Predicate 반전  |  예: Predicate.not(String::isEmpty)  (Java 11+)</text>

  <!-- Code example -->
  <line x1="60" y1="240" x2="820" y2="240" stroke="#222" stroke-width="1"/>
  <text x="440" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">실전 코드 예제</text>

  <rect x="60" y="272" width="760" height="150" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="294" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan font-weight="600" fill="#7ec8e3">Predicate</tspan><tspan fill="#ffffff">&lt;</tspan><tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff">&gt; notNull  = s -&gt; s != </tspan><tspan font-weight="600" fill="#7ec8e3">null</tspan><tspan fill="#ffffff">;</tspan>
  </text>
  <text x="76" y="314" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan font-weight="600" fill="#7ec8e3">Predicate</tspan><tspan fill="#ffffff">&lt;</tspan><tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff">&gt; notBlank = s -&gt; !s.</tspan><tspan font-weight="600" fill="#7ec8e3">isBlank</tspan><tspan fill="#ffffff">();</tspan>
  </text>
  <text x="76" y="334" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan font-weight="600" fill="#7ec8e3">Predicate</tspan><tspan fill="#ffffff">&lt;</tspan><tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff">&gt; shortEnough = s -&gt; s.</tspan><tspan font-weight="600" fill="#7ec8e3">length</tspan><tspan fill="#ffffff">() &lt;= </tspan><tspan fill="#b5cea8">20</tspan><tspan fill="#ffffff">;</tspan>
  </text>
  <text x="76" y="362" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 세 조건 조합: null이 아니고, 빈 문자열이 아니고, 20자 이하</text>
  <text x="76" y="382" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan font-weight="600" fill="#7ec8e3">Predicate</tspan><tspan fill="#ffffff">&lt;</tspan><tspan font-weight="600" fill="#7ec8e3">String</tspan><tspan fill="#ffffff">&gt; valid = notNull.</tspan><tspan font-weight="600" fill="#7ec8e3">and</tspan><tspan fill="#ffffff">(notBlank).</tspan><tspan font-weight="600" fill="#7ec8e3">and</tspan><tspan fill="#ffffff">(shortEnough);</tspan>
  </text>
  <text x="76" y="402" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">inputs.</tspan><tspan font-weight="600" fill="#7ec8e3">stream</tspan><tspan fill="#ffffff">().</tspan><tspan font-weight="600" fill="#7ec8e3">filter</tspan><tspan fill="#ffffff">(valid).</tspan><tspan font-weight="600" fill="#7ec8e3">collect</tspan><tspan fill="#ffffff">(</tspan><tspan font-weight="600" fill="#7ec8e3">toList</tspan><tspan fill="#ffffff">());</tspan>
  </text>

  <text x="440" y="440" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Consumer.andThen도 동일 패턴 — 여러 Consumer를 체이닝해 순서대로 실행 가능</text>
</svg>
