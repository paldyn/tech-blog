<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">tsc의 두 가지 역할 분리</text>

  <!-- Left: Type Check mode -->
  <rect x="60" y="66" width="360" height="44" rx="6" fill="#0d1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">역할 1: 타입 검사기</text>

  <rect x="60" y="122" width="360" height="96" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># CI에서 타입 검사만 실행</text>
  <text x="76" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">npx tsc --noEmit</text>
  <text x="76" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> </text>
  <text x="76" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># package.json에서</text>
  <text x="76" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">"typecheck": "tsc --noEmit"</text>

  <rect x="60" y="230" width="360" height="72" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="80" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa">JS 파일을 생성하지 않고</text>
  <text x="80" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa">타입 오류만 확인한다</text>
  <text x="80" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">빌드 도구: Vite, esbuild, SWC</text>

  <!-- Right: Build mode -->
  <rect x="460" y="66" width="360" height="44" rx="6" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="94" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">역할 2: 코드 컴파일러</text>

  <rect x="460" y="122" width="360" height="96" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 배포용 JS 빌드</text>
  <text x="476" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">npx tsc</text>
  <text x="476" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> </text>
  <text x="476" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 선언 파일 포함</text>
  <text x="476" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">npx tsc --declaration</text>

  <rect x="460" y="230" width="360" height="72" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="480" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa">타입 제거 후 .js 파일 출력</text>
  <text x="480" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#aaa">라이브러리 배포 시 .d.ts 생성</text>
  <text x="480" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">npm 패키지 배포에 사용</text>

  <!-- Bottom tip -->
  <rect x="60" y="322" width="760" height="52" rx="8" fill="#111" stroke="#444" stroke-width="1"/>
  <text x="440" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">현대 워크플로우 권장</text>
  <text x="440" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">빌드 속도: Vite/esbuild/SWC | 타입 검사: tsc --noEmit (CI) | 런타임 실행: tsx/Bun</text>
</svg>
