<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e0a050"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">타입 좁히기(Narrowing) 기초</text>

  <!-- Input box: string | number -->
  <rect x="290" y="80" width="300" height="60" rx="8" fill="#0a1628" stroke="#3178c6" stroke-width="1.5"/>
  <text x="440" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">입력 타입</text>
  <text x="440" y="128" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="14" font-weight="700" fill="#ffffff">string | number</text>

  <!-- Arrow down from input -->
  <line x1="440" y1="140" x2="440" y2="175" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- typeof check box -->
  <rect x="290" y="178" width="300" height="50" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="198" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 타입 가드 조건</text>
  <text x="440" y="218" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">
    <tspan fill="#7ec8e3" font-weight="600">typeof</tspan>
    <tspan fill="#ffffff"> x === </tspan>
    <tspan fill="#ce9178">"string"</tspan>
  </text>

  <!-- Fork arrows: left (true) and right (false) -->
  <line x1="290" y1="203" x2="195" y2="290" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <line x1="590" y1="203" x2="685" y2="290" stroke="#e0a050" stroke-width="2" marker-end="url(#arr-orange)"/>

  <!-- true label -->
  <text x="218" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" font-weight="600">true</text>

  <!-- false label -->
  <text x="652" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e0a050" font-weight="600">false</text>

  <!-- Left branch: string -->
  <rect x="60" y="293" width="260" height="70" rx="8" fill="#0a1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="190" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">string 타입으로 좁혀짐</text>
  <text x="190" y="345" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">
    <tspan fill="#ffffff">x: </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan>
  </text>

  <!-- Right branch: number -->
  <rect x="560" y="293" width="260" height="70" rx="8" fill="#1a1200" stroke="#e0a050" stroke-width="1.5"/>
  <text x="690" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e0a050">number 타입으로 좁혀짐</text>
  <text x="690" y="345" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">
    <tspan fill="#ffffff">x: </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan>
  </text>

  <!-- Code examples below each branch -->
  <rect x="60" y="382" width="260" height="60" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">
    <tspan fill="#ffffff">x.</tspan><tspan fill="#7ec8e3" font-weight="600">toUpperCase</tspan><tspan fill="#ffffff">()</tspan>
  </text>
  <text x="76" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// string 메서드 사용 가능</text>

  <rect x="560" y="382" width="260" height="60" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="576" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">
    <tspan fill="#ffffff">x.</tspan><tspan fill="#7ec8e3" font-weight="600">toFixed</tspan><tspan fill="#ffffff">(</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">)</tspan>
  </text>
  <text x="576" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// number 메서드 사용 가능</text>

  <!-- Arrows from branch boxes to code examples -->
  <line x1="190" y1="363" x2="190" y2="380" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="690" y1="363" x2="690" y2="380" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
</svg>
