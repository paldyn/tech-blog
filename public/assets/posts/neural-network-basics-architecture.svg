  <!-- Parameter count info bar -->
  <rect x="60" y="430" width="760" height="34" rx="6" fill="#111" stroke="#1e1e1e"/>
  <text x="440" y="443" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">파라미터 수: 입→은1 (4×5+5=25) + 은1→은2 (5×4+4=24) + 은2→출 (4×3+3=15) = 64개</text>
  <text x="440" y="459" text-anchor="middle" fill="#55c555" font-size="11" xml:space="preserve">W(l) ∈ ℝ^(n_out × n_in)  b(l) ∈ ℝ^n_out  →  총 파라미터 = Σ (n_out × n_in + n_out)</text>

