<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700" xml:space="preserve">다층 신경망 (MLP) 기본 구조</text>
  <text x="440" y="70" text-anchor="middle" fill="#888" font-size="13" xml:space="preserve">입력층 → 은닉층(들) → 출력층으로 이어지는 완전 연결 피드포워드 네트워크</text>

  <!-- Layer labels -->
  <text x="110" y="108" text-anchor="middle" fill="#7ec8e3" font-size="13" font-weight="600" xml:space="preserve">입력층</text>
  <text x="110" y="124" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">Input Layer</text>

  <text x="330" y="108" text-anchor="middle" fill="#7777cc" font-size="13" font-weight="600" xml:space="preserve">은닉층 1</text>
  <text x="330" y="124" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">Hidden Layer 1</text>

  <text x="550" y="108" text-anchor="middle" fill="#7777cc" font-size="13" font-weight="600" xml:space="preserve">은닉층 2</text>
  <text x="550" y="124" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">Hidden Layer 2</text>

  <text x="770" y="108" text-anchor="middle" fill="#55c555" font-size="13" font-weight="600" xml:space="preserve">출력층</text>
  <text x="770" y="124" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">Output Layer</text>

