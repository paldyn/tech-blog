<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Profiler — 리렌더 원인(why did this render?)</text>

  <!-- Left box: 리렌더 원인 유형 -->
  <rect x="60" y="76" width="380" height="270" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="250" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="15" font-weight="600" fill="#7ec8e3" text-anchor="middle">리렌더 발생 원인 4가지</text>

  <rect x="80" y="116" width="340" height="42" rx="6" fill="#0d1212" stroke="#7ec8e3" stroke-width="1"/>
  <text x="250" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8" text-anchor="middle">① State 변경</text>
  <text x="250" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888" text-anchor="middle">setState / useReducer dispatch 호출</text>

  <rect x="80" y="166" width="340" height="42" rx="6" fill="#0d0d1a" stroke="#7777cc" stroke-width="1"/>
  <text x="250" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8" text-anchor="middle">② Props 변경</text>
  <text x="250" y="202" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888" text-anchor="middle">부모가 다른 값으로 prop 전달</text>

  <rect x="80" y="216" width="340" height="42" rx="6" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="250" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8" text-anchor="middle">③ Context 변경</text>
  <text x="250" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888" text-anchor="middle">구독 중인 Context value 업데이트</text>

  <rect x="80" y="266" width="340" height="42" rx="6" fill="#111827" stroke="#888" stroke-width="1"/>
  <text x="250" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8" text-anchor="middle">④ 부모 리렌더</text>
  <text x="250" y="302" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#888" text-anchor="middle">memo 없으면 부모 리렌더 시 자동 실행</text>

  <!-- Right box: DevTools 설정 -->
  <rect x="480" y="76" width="340" height="270" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">DevTools 활용 팁</text>

  <rect x="498" y="116" width="304" height="44" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8" text-anchor="middle">Settings → "Record why each component</text>
  <text x="650" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#55c555" text-anchor="middle">rendered while profiling" 체크</text>

  <text x="650" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888" text-anchor="middle">컴포넌트 클릭 시 오른쪽 패널에</text>
  <text x="650" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#e8e8e8" text-anchor="middle">"Why did this render?" 표시</text>

  <rect x="498" y="226" width="304" height="90" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="516" y="248" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="12" fill="#9aa4b8">// 리렌더 원인 예시 표시:</text>
  <text x="516" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="12" fill="#e8e8e8">Props changed: items</text>
  <text x="516" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="12" fill="#e8e8e8">State changed: count</text>
  <text x="516" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    xml:space="preserve" font-size="12" fill="#55c555">Hook: useContext</text>

  <!-- Bottom -->
  <rect x="60" y="366" width="760" height="14" rx="4" fill="#1a1a1a"/>
  <text x="440" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888" text-anchor="middle">커밋 상세 패널의 리렌더 원인을 통해 불필요한 Props·Context 변경을 찾아 최적화</text>
</svg>
