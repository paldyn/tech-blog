<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Form Script 권장 구조</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888" text-anchor="middle">영역별 분리로 가독성과 유지보수성 향상</text>

  <!-- Sections as vertical stack -->
  <!-- Section 1: 전역 변수 -->
  <rect x="60" y="96" width="760" height="60" rx="8" fill="#0d1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="120" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">① 전역 변수 선언 영역</text>
  <text x="120" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">var g_bIsEditing = false;  var g_nCurrentPage = 1;</text>

  <!-- Section 2: 이벤트 핸들러 -->
  <rect x="60" y="168" width="760" height="60" rx="8" fill="#0d2e0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="120" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555">② 이벤트 핸들러 영역</text>
  <text x="120" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">this.form.onload = ... ;    this.btn_search.onclick = ... ;</text>

  <!-- Section 3: 초기화 함수 -->
  <rect x="60" y="240" width="760" height="60" rx="8" fill="#1a0d2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="120" y="262" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">③ 초기화 함수 (fn_init)</text>
  <text x="120" y="284" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">function fn_init() { ... }    // 화면 로드 시 최초 1회 실행</text>

  <!-- Section 4: 비즈니스 로직 -->
  <rect x="60" y="312" width="760" height="60" rx="8" fill="#2e1a0d" stroke="#e8c87e" stroke-width="1.5"/>
  <text x="120" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8c87e">④ 비즈니스 로직 함수 (fn_*)</text>
  <text x="120" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">function fn_search() { ... }    function fn_save() { ... }</text>

  <!-- Section 5: 트랜잭션 콜백 -->
  <rect x="60" y="384" width="760" height="60" rx="8" fill="#2e0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="120" y="406" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">⑤ 트랜잭션 콜백 함수</text>
  <text x="120" y="428" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">function fn_searchCb(svcId, errCode, errMsg) { ... }</text>

  <!-- Arrows between sections -->
  <line x1="440" y1="156" x2="440" y2="168" stroke="#555" stroke-width="1.5"/>
  <line x1="440" y1="228" x2="440" y2="240" stroke="#555" stroke-width="1.5"/>
  <line x1="440" y1="300" x2="440" y2="312" stroke="#555" stroke-width="1.5"/>
  <line x1="440" y1="372" x2="440" y2="384" stroke="#555" stroke-width="1.5"/>

  <!-- Bottom tip -->
  <rect x="60" y="458" width="760" height="30" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="478" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">각 영역을 구분 주석(/* ① ... */)으로 명확히 표시하면 협업 시 코드 탐색이 쉬워진다</text>
</svg>
