<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">ES 모듈 핵심 특성</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">ECMAScript Modules — 6가지 핵심 특징</text>

  <!-- Feature 1 -->
  <rect x="60" y="90" width="360" height="90" rx="8" fill="#0d1422" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="90" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">① 정적 구조 (Static Structure)</text>
  <text x="90" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">import/export는 최상위 레벨에서만</text>
  <text x="90" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">실행 전 의존성 그래프 완성 → 트리 쉐이킹 가능</text>

  <!-- Feature 2 -->
  <rect x="460" y="90" width="360" height="90" rx="8" fill="#0d1a0d" stroke="#1e4a1e" stroke-width="1.5"/>
  <text x="490" y="118" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">② 라이브 바인딩 (Live Bindings)</text>
  <text x="490" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">내보낸 변수가 변경되면 가져오는 쪽도</text>
  <text x="490" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">실시간으로 반영 (복사가 아닌 참조)</text>

  <!-- Feature 3 -->
  <rect x="60" y="200" width="360" height="90" rx="8" fill="#1a1206" stroke="#4a3a0e" stroke-width="1.5"/>
  <text x="90" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8c842">③ 모듈 스코프 (Module Scope)</text>
  <text x="90" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">각 모듈은 독립 스코프 — 전역 오염 없음</text>
  <text x="90" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">명시적으로 export해야 외부 접근 가능</text>

  <!-- Feature 4 -->
  <rect x="460" y="200" width="360" height="90" rx="8" fill="#0d1422" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="490" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">④ 엄격 모드 자동 적용</text>
  <text x="490" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">'use strict' 선언 없이도 항상 strict mode</text>
  <text x="490" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">전역 this는 undefined (브라우저 제외)</text>

  <!-- Feature 5 -->
  <rect x="60" y="310" width="360" height="90" rx="8" fill="#0d1a0d" stroke="#1e4a1e" stroke-width="1.5"/>
  <text x="90" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">⑤ 단일 평가 (Single Evaluation)</text>
  <text x="90" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">동일 모듈을 여러 곳에서 import해도</text>
  <text x="90" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">딱 한 번만 평가 — 모듈 캐시 활용</text>

  <!-- Feature 6 -->
  <rect x="460" y="310" width="360" height="90" rx="8" fill="#1a1206" stroke="#4a3a0e" stroke-width="1.5"/>
  <text x="490" y="338" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e8c842">⑥ 비동기 로딩 지원</text>
  <text x="490" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">브라우저에서 &lt;script type="module"&gt; 사용 시</text>
  <text x="490" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">defer 기본 적용 + dynamic import 지원</text>

  <!-- Bottom note -->
  <rect x="60" y="420" width="760" height="44" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <text x="440" y="442" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">ES2015(ES6)에 도입 — 브라우저 · Node.js · Deno · Bun 모두 네이티브 지원</text>
  <text x="440" y="458" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN — JavaScript 완전 정복</text>

  <!-- Footer -->
  <text x="440" y="490" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN — JavaScript 완전 정복</text>
</svg>
