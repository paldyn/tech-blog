<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="430" viewBox="0 0 880 430">
  <rect width="880" height="430" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arrB" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <g font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
    <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">압축 협상 — Accept-Encoding과 Vary</text>
    <!-- Request box -->
    <rect x="60" y="70" width="760" height="104" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="76" y="97" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 클라이언트: 지원하는 알고리즘을 광고</text>
    <text x="76" y="117" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">GET</tspan><tspan fill="#ffffff"> /app.js HTTP/1.1</tspan></text>
    <text x="76" y="137" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Accept-Encoding</tspan><tspan fill="#ffffff">: gzip, deflate, br, zstd</tspan></text>
    <text x="76" y="157" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8"># q값으로 선호도 표현 가능: br;q=1.0, gzip;q=0.8</tspan></text>
    <line x1="440" y1="174" x2="440" y2="204" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrB)"/>
    <!-- Response box -->
    <rect x="60" y="206" width="760" height="124" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
    <text x="76" y="233" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 서버: 하나를 골라 표현을 만들어 응답</text>
    <text x="76" y="253" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#55c555">HTTP/1.1 200 OK</tspan></text>
    <text x="76" y="273" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Content-Encoding</tspan><tspan fill="#ffffff">: br</tspan></text>
    <text x="76" y="293" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Content-Length</tspan><tspan fill="#ffffff">: 18204</tspan><tspan fill="#9aa4b8">       # 압축된 표현의 크기</tspan></text>
    <text x="76" y="313" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">Vary</tspan><tspan fill="#ffffff">: Accept-Encoding</tspan><tspan fill="#9aa4b8">         # 캐시 분기 키 — 필수!</tspan></text>
    <!-- Summary -->
    <text x="440" y="376" text-anchor="middle" font-size="12" fill="#888">Vary가 없으면 캐시가 br 응답을 gzip만 아는 옛 브라우저에 줘 버린다 — 깨진 페이지의 단골 원인</text>
    <text x="440" y="394" text-anchor="middle" font-size="11" fill="#555">서버는 모르는 인코딩을 고르면 안 되고, 아무것도 겹치지 않으면 무압축(identity)으로 응답한다</text>
  </g>
</svg>
