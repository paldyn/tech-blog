<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 500" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700" xml:space="preserve">순전파(Forward) vs 역전파(Backward)</text>
  <text x="440" y="70" text-anchor="middle" fill="#888" font-size="13" xml:space="preserve">연산 그래프를 따라 예측을 만들고, 반대 방향으로 기울기를 전파한다</text>

  <!-- Forward pass label -->
  <text x="220" y="104" text-anchor="middle" fill="#7ec8e3" font-size="14" font-weight="600" xml:space="preserve">→ 순전파 (Forward Pass)</text>
  <!-- Backward pass label -->
  <text x="660" y="104" text-anchor="middle" fill="#e05555" font-size="14" font-weight="600" xml:space="preserve">← 역전파 (Backward Pass)</text>

  <!-- ===== TOP: forward pass flow ===== -->
  <!-- Node: x -->
  <circle cx="80" cy="180" r="28" fill="#0d1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="80" y="176" text-anchor="middle" fill="#7ec8e3" font-size="13" xml:space="preserve">x</text>
  <text x="80" y="193" text-anchor="middle" fill="#888" font-size="10" xml:space="preserve">입력</text>

  <!-- Arrow x → W*x+b -->
  <polygon points="110,176 155,176 155,168 175,180 155,192 155,184 110,184" fill="#7ec8e3" stroke="#0a0a0a" stroke-width="0.5"/>
  <text x="142" y="162" text-anchor="middle" fill="#ce9178" font-size="11" xml:space="preserve">W, b</text>

  <!-- Node: z = Wx+b -->
  <rect x="175" y="156" width="100" height="48" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="2"/>
  <text x="225" y="176" text-anchor="middle" fill="#e8e8e8" font-size="13" xml:space="preserve">z = Wx+b</text>
  <text x="225" y="193" text-anchor="middle" fill="#888" font-size="10" xml:space="preserve">선형 결합</text>

  <!-- Arrow z → f(z) -->
  <polygon points="277,176 322,176 322,168 342,180 322,192 322,184 277,184" fill="#7777cc" stroke="#0a0a0a" stroke-width="0.5"/>
  <text x="310" y="162" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">활성화</text>

  <!-- Node: a = f(z) -->
  <rect x="342" y="156" width="100" height="48" rx="8" fill="#0c1a0c" stroke="#55c555" stroke-width="2"/>
  <text x="392" y="176" text-anchor="middle" fill="#55c555" font-size="13" xml:space="preserve">a = f(z)</text>
  <text x="392" y="193" text-anchor="middle" fill="#888" font-size="10" xml:space="preserve">활성값</text>

  <!-- Arrow a → Loss -->
  <polygon points="444,176 490,176 490,168 510,180 490,192 490,184 444,184" fill="#55c555" stroke="#0a0a0a" stroke-width="0.5"/>
  <text x="477" y="162" text-anchor="middle" fill="#888" font-size="11" xml:space="preserve">예측</text>

  <!-- Node: L (Loss) -->
  <circle cx="550" cy="180" r="34" fill="#1a0d0d" stroke="#e05555" stroke-width="2.5"/>
  <text x="550" y="176" text-anchor="middle" fill="#e05555" font-size="15" font-weight="700" xml:space="preserve">L</text>
  <text x="550" y="193" text-anchor="middle" fill="#888" font-size="10" xml:space="preserve">손실</text>

  <!-- ===== BOTTOM: backward pass flow (reverse arrows) ===== -->
  <!-- dL/da arrow -->
  <polygon points="510,280 490,280 490,272 444,284 490,296 490,288 510,288" fill="#e05555" stroke="#0a0a0a" stroke-width="0.5"/>
  <text x="477" y="266" text-anchor="middle" fill="#e05555" font-size="11" xml:space="preserve">∂L/∂a</text>

  <!-- dL/dz arrow (chain rule) -->
  <polygon points="342,280 322,280 322,272 277,284 322,296 322,288 342,288" fill="#e05555" stroke="#0a0a0a" stroke-width="0.5"/>
  <text x="310" y="266" text-anchor="middle" fill="#e05555" font-size="11" xml:space="preserve">∂L/∂z</text>

  <!-- dL/dW, dL/dx arrows -->
  <polygon points="175,280 155,280 155,272 110,284 155,296 155,288 175,288" fill="#e05555" stroke="#0a0a0a" stroke-width="0.5"/>
  <text x="142" y="266" text-anchor="middle" fill="#e05555" font-size="11" xml:space="preserve">∂L/∂W</text>

  <!-- Nodes for backward labels -->
  <rect x="342" y="260" width="100" height="48" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="392" y="280" text-anchor="middle" fill="#e05555" font-size="12" xml:space="preserve">f'(z)·δ</text>
  <text x="392" y="297" text-anchor="middle" fill="#888" font-size="10" xml:space="preserve">로컬 기울기</text>

  <rect x="175" y="260" width="100" height="48" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="225" y="280" text-anchor="middle" fill="#e05555" font-size="12" xml:space="preserve">δ·xᵀ</text>
  <text x="225" y="297" text-anchor="middle" fill="#888" font-size="10" xml:space="preserve">가중치 기울기</text>

  <!-- Chain rule box -->
  <rect x="60" y="360" width="480" height="80" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="300" y="382" text-anchor="middle" fill="#7777cc" font-size="14" font-weight="600" xml:space="preserve">연쇄 법칙 (Chain Rule)</text>
  <text x="300" y="404" text-anchor="middle" fill="#e8e8e8" font-size="14" xml:space="preserve">∂L/∂W = (∂L/∂a) · (∂a/∂z) · (∂z/∂W)</text>
  <text x="300" y="426" text-anchor="middle" fill="#888" font-size="12" xml:space="preserve">= (∂L/∂a) · f'(z) · x</text>

  <!-- Weight update box -->
  <rect x="580" y="360" width="240" height="80" rx="8" fill="#0c1a0c" stroke="#55c555" stroke-width="1.5"/>
  <text x="700" y="382" text-anchor="middle" fill="#55c555" font-size="14" font-weight="600" xml:space="preserve">파라미터 업데이트</text>
  <text x="700" y="406" text-anchor="middle" fill="#e8e8e8" font-size="14" xml:space="preserve">W ← W − η · ∂L/∂W</text>
  <text x="700" y="426" text-anchor="middle" fill="#888" font-size="12" xml:space="preserve">η = 학습률</text>

  <!-- Footer -->
</svg>
