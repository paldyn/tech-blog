<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Object 정적 메서드 분류</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">생성 · 복사 · 검사 · 열거 · 동결</text>

  <!-- Group 1: 열거 -->
  <rect x="60" y="95" width="235" height="162" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="177" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">열거</text>
  <text x="80" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Object.keys(obj)</text>
  <text x="80" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">열거 가능한 키 배열</text>
  <text x="80" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Object.values(obj)</text>
  <text x="80" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">열거 가능한 값 배열</text>
  <text x="80" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Object.entries(obj)</text>
  <text x="80" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">[key, value] 쌍 배열</text>

  <!-- Group 2: 복사·병합 -->
  <rect x="315" y="95" width="235" height="162" rx="8" fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="432" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">복사 · 병합</text>
  <text x="335" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Object.assign(t, ...s)</text>
  <text x="335" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">얕은 복사·병합, t 반환</text>
  <text x="335" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Object.fromEntries(it)</text>
  <text x="335" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">entries/Map → 객체 변환</text>
  <text x="335" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Object.create(proto)</text>
  <text x="335" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">지정 프로토타입으로 생성</text>

  <!-- Group 3: 검사 -->
  <rect x="570" y="95" width="250" height="162" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="695" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">검사</text>
  <text x="590" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Object.hasOwn(o, k)</text>
  <text x="590" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">자체 속성 여부 (ES2022)</text>
  <text x="590" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Object.is(a, b)</text>
  <text x="590" y="200" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">SameValue 비교</text>
  <text x="590" y="220" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Object.getPrototypeOf(o)</text>
  <text x="590" y="240" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">프로토타입 반환</text>

  <!-- Group 4: 동결·봉인 -->
  <rect x="60" y="276" width="235" height="140" rx="8" fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="177" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">동결 · 봉인</text>
  <text x="80" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Object.freeze(obj)</text>
  <text x="80" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">불변 — 추가·삭제·변경 불가</text>
  <text x="80" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Object.seal(obj)</text>
  <text x="80" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">추가·삭제 불가, 변경 가능</text>
  <text x="80" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Object.isFrozen / isSealed</text>

  <!-- Group 5: 속성 정의 -->
  <rect x="315" y="276" width="235" height="140" rx="8" fill="#111827" stroke="#e0c045" stroke-width="1.5"/>
  <text x="432" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e0c045" text-anchor="middle">속성 정의</text>
  <text x="335" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">defineProperty(o,k,d)</text>
  <text x="335" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">단일 속성 디스크립터 정의</text>
  <text x="335" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">defineProperties(o, ds)</text>
  <text x="335" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">여러 속성 한번에 정의</text>
  <text x="335" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">getOwnPropertyNames(o)</text>

  <!-- Group 6: ES2022+ -->
  <rect x="570" y="276" width="250" height="140" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="695" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">ES2024 신규</text>
  <text x="590" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Object.groupBy(arr, fn)</text>
  <text x="590" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">배열 그룹핑 (ES2024)</text>
  <text x="590" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Map.groupBy(arr, fn)</text>
  <text x="590" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">Map으로 그룹핑</text>
  <text x="590" y="402" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">이전: Array.prototype.group (폐기)</text>

  <!-- Bottom note -->
  <rect x="60" y="434" width="760" height="60" rx="8" fill="#1a1f2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="80" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">entries + fromEntries 변환 흐름</text>
  <text x="80" y="476" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8">Object.fromEntries(Object.entries(obj).map(([k,v]) =&gt; [k, v*2]))</text>
  <text x="600" y="476" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">← 값을 변환한 새 객체</text>
</svg>
