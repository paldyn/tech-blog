<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400" style="background:#0a0a0a;border-radius:12px">
  <defs>
    <marker id="arrL" viewBox="0 0 14 14" refX="2" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 14 0 L 1 7 L 14 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrR" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">게터·세터 동작 원리</text>

  <!-- External caller box -->
  <rect x="60" y="80" width="200" height="70" rx="10" fill="#111" stroke="#888" stroke-width="1.5"/>
  <text x="160" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">외부 코드</text>
  <text x="160" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">obj.name = "x"</text>

  <!-- Class box in middle -->
  <rect x="330" y="66" width="220" height="220" rx="10" fill="#0a0a12" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="96" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">클래스</text>

  <!-- Setter box inside class -->
  <rect x="346" y="108" width="188" height="54" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" text-anchor="middle">set name(v)</text>
  <text x="440" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">유효성 검사 + 할당</text>

  <!-- Getter box inside class -->
  <rect x="346" y="172" width="188" height="54" rx="6" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="194" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" text-anchor="middle">get name()</text>
  <text x="440" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">가공 후 반환</text>

  <!-- Private field inside class -->
  <rect x="346" y="238" width="188" height="36" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">private _name: string</text>

  <!-- External reader box -->
  <rect x="620" y="80" width="200" height="70" rx="10" fill="#111" stroke="#888" stroke-width="1.5"/>
  <text x="720" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8" text-anchor="middle">외부 코드</text>
  <text x="720" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">console.log(obj.name)</text>

  <!-- Arrows -->
  <line x1="260" y1="115" x2="330" y2="135" stroke="#e05555" stroke-width="2" marker-end="url(#arrR)"/>
  <text x="290" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">setter 호출</text>

  <line x1="550" y1="135" x2="620" y2="115" stroke="#55c555" stroke-width="2" marker-end="url(#arrR)"/>
  <text x="587" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">getter 반환</text>

  <!-- Bottom note -->
  <rect x="60" y="310" width="760" height="66" rx="8" fill="#111111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="336" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">핵심</text>
  <text x="80" y="358" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">외부에서는 일반 프로퍼티처럼 obj.name = "x" / obj.name 으로 접근</text>
  <text x="80" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">내부에서는 setter/getter 로직 실행 — 로직 변경 시 호출 코드 수정 불필요</text>
</svg>
