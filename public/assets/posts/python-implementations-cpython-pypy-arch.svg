<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">CPython vs PyPy 실행 흐름</text>

  <!-- CPython column -->
  <text x="215" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7ec8e3" text-anchor="middle">CPython (기본 구현체)</text>

  <rect x="100" y="95" width="230" height="44" rx="6" fill="#111827" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="215" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8e8e8" text-anchor="middle">소스 코드 (.py)</text>

  <line x1="215" y1="139" x2="215" y2="165" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <rect x="100" y="168" width="230" height="44" rx="6" fill="#111827" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="215" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">파싱 / AST 생성</text>
  <text x="215" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">(구문 분석)</text>

  <line x1="215" y1="212" x2="215" y2="238" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <rect x="100" y="241" width="230" height="44" rx="6" fill="#111827" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="215" y="261" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">바이트코드 컴파일</text>
  <text x="215" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">(.pyc 파일 캐시)</text>

  <line x1="215" y1="285" x2="215" y2="311" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <rect x="100" y="314" width="230" height="44" rx="6" fill="#0d2340" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="215" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">PVM (Python Virtual Machine)</text>
  <text x="215" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">스택 기반 인터프리터</text>

  <line x1="215" y1="358" x2="215" y2="384" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="215" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">실행 결과</text>

  <!-- Divider -->
  <line x1="440" y1="68" x2="440" y2="410" stroke="#1e293b" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- PyPy column -->
  <text x="665" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">PyPy (JIT 구현체)</text>

  <rect x="550" y="95" width="230" height="44" rx="6" fill="#111827" stroke="#10b981" stroke-width="1.5"/>
  <text x="665" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e8e8e8" text-anchor="middle">소스 코드 (.py)</text>

  <line x1="665" y1="139" x2="665" y2="165" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <rect x="550" y="168" width="230" height="44" rx="6" fill="#111827" stroke="#10b981" stroke-width="1.5"/>
  <text x="665" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">파싱 / AST → RPython</text>
  <text x="665" y="204" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">(제한된 Python으로 작성)</text>

  <line x1="665" y1="212" x2="665" y2="238" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <rect x="550" y="241" width="230" height="44" rx="6" fill="#111827" stroke="#10b981" stroke-width="1.5"/>
  <text x="665" y="261" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">트레이싱 JIT 컴파일</text>
  <text x="665" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">(핫스팟 → 기계어)</text>

  <line x1="665" y1="285" x2="665" y2="311" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <rect x="550" y="314" width="230" height="44" rx="6" fill="#0d2d1a" stroke="#166534" stroke-width="1.5"/>
  <text x="665" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">네이티브 기계어 실행</text>
  <text x="665" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">(C보다 느리지만 CPython보다 빠름)</text>

  <line x1="665" y1="358" x2="665" y2="384" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="665" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">실행 결과 (최대 5~10배 빠름)</text>
</svg>
