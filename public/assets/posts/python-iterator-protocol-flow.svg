<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 310">
  <rect width="880" height="310" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="marr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="marrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="marrr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">이터레이터 프로토콜</text>

  <!-- Box 1: Iterable -->
  <rect x="60" y="70" width="215" height="122" rx="8"
        fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="168" y="95" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">이터러블</text>
  <text x="168" y="114" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Iterable</text>
  <text x="168" y="141" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">__iter__()</text>
  <text x="168" y="161" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">list · tuple · str · dict …</text>

  <!-- Arrow 1: iter() -->
  <line x1="275" y1="131" x2="318" y2="131"
        stroke="#7ec8e3" stroke-width="2" marker-end="url(#marr)"/>
  <text x="297" y="122" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">iter()</text>

  <!-- Box 2: Iterator -->
  <rect x="320" y="64" width="240" height="140" rx="8"
        fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="89" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">이터레이터</text>
  <text x="440" y="108" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Iterator</text>
  <text x="440" y="135" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">__iter__() → self</text>
  <text x="440" y="157" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">__next__() → 값 또는 ↑StopIteration</text>
  <text x="440" y="177" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">내부 상태를 유지하며 순회</text>

  <!-- Arrow 2a: → 값 반환 -->
  <line x1="560" y1="108" x2="603" y2="100"
        stroke="#55c555" stroke-width="2" marker-end="url(#marrg)"/>
  <text x="581" y="94" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">next()</text>

  <!-- Arrow 2b: → StopIteration -->
  <line x1="560" y1="163" x2="603" y2="173"
        stroke="#e05555" stroke-width="2" marker-end="url(#marrr)"/>
  <text x="581" y="188" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">소진 시</text>

  <!-- Box 3a: 값 반환 -->
  <rect x="605" y="74" width="215" height="52" rx="8"
        fill="#111827" stroke="#55c555" stroke-width="1.5"/>
  <text x="712" y="104" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">값 반환 (정상)</text>

  <!-- Box 3b: StopIteration -->
  <rect x="605" y="148" width="215" height="52" rx="8"
        fill="#111827" stroke="#e05555" stroke-width="1.5"/>
  <text x="712" y="178" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555">StopIteration</text>

  <!-- Bottom note -->
  <rect x="60" y="230" width="760" height="62" rx="8"
        fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="255" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">for 루프는 내부적으로 iter(obj)를 호출해 이터레이터를 얻은 뒤,</text>
  <text x="440" y="275" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">StopIteration이 발생할 때까지 next()를 반복 호출한다</text>
</svg>
