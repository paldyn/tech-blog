<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">세션 생명 주기와 보안 포인트</text>

  <!-- Step 1: Login -->
  <rect x="60" y="75" width="150" height="70" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="135" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">① 로그인</text>
  <text x="135" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">자격증명 검증</text>
  <text x="135" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">MFA 처리</text>

  <!-- Arrow 1 -->
  <line x1="210" y1="110" x2="268" y2="110" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2: Session Creation -->
  <rect x="270" y="75" width="170" height="70" rx="8" fill="#0f1528" stroke="#7777cc" stroke-width="1.5"/>
  <text x="355" y="101" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">② 세션 생성</text>
  <text x="355" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">CSPRNG으로 ID 생성</text>
  <text x="355" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">서버에 세션 저장</text>

  <!-- Arrow 2 -->
  <line x1="440" y1="110" x2="498" y2="110" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3: Active Session -->
  <rect x="500" y="75" width="170" height="70" rx="8" fill="#0a1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="585" y="101" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">③ 활성 세션</text>
  <text x="585" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">쿠키로 ID 전달</text>
  <text x="585" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">매 요청마다 검증</text>

  <!-- Arrow 3 -->
  <line x1="670" y1="110" x2="718" y2="110" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4: Logout -->
  <rect x="720" y="75" width="130" height="70" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="785" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">④ 로그아웃</text>
  <text x="785" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">세션 무효화</text>
  <text x="785" y="137" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">쿠키 삭제</text>

  <!-- Security points (below) -->
  <text x="440" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">세션 쿠키 보안 속성</text>

  <!-- HttpOnly -->
  <rect x="60" y="210" width="190" height="90" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="155" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">HttpOnly</text>
  <text x="155" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">JS에서 접근 불가</text>
  <text x="155" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">XSS로 탈취 방지</text>
  <text x="155" y="291" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">필수</text>

  <!-- Secure -->
  <rect x="270" y="210" width="190" height="90" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="365" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Secure</text>
  <text x="365" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">HTTPS에서만 전송</text>
  <text x="365" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">중간자 공격 방지</text>
  <text x="365" y="291" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">필수</text>

  <!-- SameSite -->
  <rect x="480" y="210" width="190" height="90" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="575" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">SameSite=Strict</text>
  <text x="575" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">CSRF 방어</text>
  <text x="575" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">크로스 사이트 요청 차단</text>
  <text x="575" y="291" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">강력 권장</text>

  <!-- Expiry -->
  <rect x="690" y="210" width="150" height="90" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="765" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Max-Age</text>
  <text x="765" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">만료 시간 설정</text>
  <text x="765" y="276" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#666" text-anchor="middle">유휴 세션 자동 종료</text>
  <text x="765" y="291" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle">권장</text>

  <!-- Session security best practices -->
  <rect x="60" y="322" width="760" height="130" rx="8" fill="#0f1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="348" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">세션 보안 체크리스트</text>
  <text x="120" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓</text>
  <text x="140" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">로그인 후 새 세션 ID 재발급 (세션 고정 공격 방지)</text>
  <text x="120" y="397" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓</text>
  <text x="140" y="397" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">충분히 긴 세션 ID: 128비트 이상 (CSPRNG 생성)</text>
  <text x="120" y="419" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓</text>
  <text x="140" y="419" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">서버 측 세션 저장소 (클라이언트 저장 시 서명 검증 필수)</text>
  <text x="480" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓</text>
  <text x="500" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">비활성 타임아웃: 30분~1시간</text>
  <text x="480" y="397" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓</text>
  <text x="500" y="397" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">로그아웃 시 서버에서 세션 완전 삭제</text>
  <text x="480" y="419" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓</text>
  <text x="500" y="419" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">권한 변경 후 세션 재생성</text>
</svg>
