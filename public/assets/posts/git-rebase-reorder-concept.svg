<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">커밋 순서 재배열 — rebase -i reorder</text>

  <!-- Before label -->
  <text x="60" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e05555">Before</text>

  <!-- Before commits -->
  <rect x="60" y="115" width="100" height="52" rx="8" fill="#1a1a2e" stroke="#555"/>
  <text x="110" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle" font-weight="600">abc111</text>
  <text x="110" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">docs: README</text>

  <line x1="160" y1="141" x2="188" y2="141" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="190" y="115" width="100" height="52" rx="8" fill="#1a1a2e" stroke="#e05555" stroke-width="2"/>
  <text x="240" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle" font-weight="600">def222</text>
  <text x="240" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">feat: login UI</text>

  <line x1="290" y1="141" x2="318" y2="141" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="320" y="115" width="100" height="52" rx="8" fill="#1a1a2e" stroke="#e05555" stroke-width="2"/>
  <text x="370" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle" font-weight="600">ghi333</text>
  <text x="370" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">feat: login API</text>

  <line x1="420" y1="141" x2="448" y2="141" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="450" y="115" width="100" height="52" rx="8" fill="#1a1a2e" stroke="#555"/>
  <text x="500" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle" font-weight="600">jkl444</text>
  <text x="500" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">test: login test</text>

  <text x="660" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">← UI보다 API가 먼저여야 함</text>

  <!-- Arrow down -->
  <text x="160" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7777cc">git rebase -i HEAD~3</text>
  <line x1="270" y1="225" x2="270" y2="255" stroke="#7777cc" stroke-width="2" marker-end="url(#arr)"/>

  <!-- After label -->
  <text x="60" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
