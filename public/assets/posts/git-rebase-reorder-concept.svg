  <!-- After commits -->
  <rect x="60" y="305" width="100" height="52" rx="8" fill="#1a1a2e" stroke="#555"/>
  <text x="110" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle" font-weight="600">abc111</text>
  <text x="110" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">docs: README</text>

  <line x1="160" y1="331" x2="188" y2="331" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>

  <rect x="190" y="305" width="100" height="52" rx="8" fill="#1a2a1e" stroke="#55c555" stroke-width="2"/>
  <text x="240" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle" font-weight="600">ghi333'</text>
  <text x="240" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">feat: login API</text>

  <line x1="290" y1="331" x2="318" y2="331" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>

  <rect x="320" y="305" width="100" height="52" rx="8" fill="#1a2a1e" stroke="#55c555" stroke-width="2"/>
  <text x="370" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle" font-weight="600">def222'</text>
  <text x="370" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">feat: login UI</text>

  <line x1="420" y1="331" x2="448" y2="331" stroke="#55c555" stroke-width="2" marker-end="url(#arr2)"/>

  <rect x="450" y="305" width="100" height="52" rx="8" fill="#1a1a2e" stroke="#555"/>
  <text x="500" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle" font-weight="600">jkl444'</text>
  <text x="500" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">test: login test</text>

  <text x="660" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555">✓ API → UI 순서로 정렬</text>
  <text x="660" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">SHA는 재계산됨 (')</text>

  <!-- Note -->
  <rect x="60" y="395" width="760" height="58" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="80" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" font-weight="600">핵심 규칙</text>
  <text x="80" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">rebase -i 에디터에서 줄 순서를 바꾸면 그 순서로 커밋이 재생(replay)된다. 의존 관계가 있으면 충돌 발생.</text>
</svg>
