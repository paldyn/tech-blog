<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">java.lang.Object — 11가지 메서드</text>

  <!-- Object class box -->
  <rect x="290" y="60" width="300" height="60" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="86" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">java.lang.Object</text>
  <text x="440" y="106" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">모든 클래스의 암묵적 상위 클래스</text>

  <!-- Methods grouped into categories -->
  <!-- Category 1: Identity / Equality -->
  <text x="60" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">동등성 / 해시</text>
  <rect x="60" y="168" width="220" height="100" rx="8" fill="#0d1428" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="80" y="191" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">equals(Object o)</text>
  <text x="80" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">논리적 동등성 판단</text>
  <text x="80" y="231" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">hashCode()</text>
  <text x="80" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">해시 기반 자료구조에 필수</text>

  <!-- Category 2: String representation -->
  <text x="310" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">문자열 표현</text>
  <rect x="310" y="168" width="220" height="100" rx="8" fill="#0d2214" stroke="#55c555" stroke-width="1.5"/>
  <text x="330" y="191" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#55c555" font-weight="600">toString()</text>
  <text x="330" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">ClassName@hashCode(hex)</text>
  <text x="330" y="231" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">로깅, 디버깅에 오버라이드 권장</text>
  <text x="330" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">record는 자동 생성</text>

  <!-- Category 3: Concurrency -->
  <text x="560" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">동시성 / 대기</text>
  <rect x="560" y="168" width="260" height="100" rx="8" fill="#1a1414" stroke="#e05555" stroke-width="1.5"/>
  <text x="580" y="191" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" font-weight="600">wait() / wait(ms)</text>
  <text x="580" y="211" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">모니터 락 해제 + 대기</text>
  <text x="580" y="231" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" font-weight="600">notify() / notifyAll()</text>
  <text x="580" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">대기 스레드 깨우기</text>

  <!-- Category 4: Copy -->
  <text x="60" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">복사</text>
  <rect x="60" y="310" width="220" height="80" rx="8" fill="#1a1428" stroke="#7777cc" stroke-width="1.5"/>
  <text x="80" y="333" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7777cc" font-weight="600">clone()</text>
  <text x="80" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Cloneable 구현 필요</text>
  <text x="80" y="373" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">얕은 복사 기본값</text>

  <!-- Category 5: Class info -->
  <text x="310" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">타입 정보</text>
  <rect x="310" y="310" width="220" height="80" rx="8" fill="#0d1428" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="330" y="333" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">getClass()</text>
  <text x="330" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">런타임 Class&lt;?&gt; 반환</text>
  <text x="330" y="373" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">final — 오버라이드 불가</text>

  <!-- Category 6: GC deprecated -->
  <text x="560" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">GC (Deprecated)</text>
  <rect x="560" y="310" width="260" height="80" rx="8" fill="#141414" stroke="#888" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="580" y="333" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" font-weight="600">finalize()</text>
  <text x="580" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">Java 9: @Deprecated</text>
  <text x="580" y="373" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">Java 18: forRemoval=true</text>

  <!-- Override recommendation -->
  <rect x="60" y="414" width="760" height="46" rx="8" fill="#0d1428" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="434" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">오버라이드 권장 메서드</text>
  <text x="440" y="452" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">equals() + hashCode() 반드시 쌍으로 · toString() 디버깅에 유용 · clone() 신중히</text>
</svg>
