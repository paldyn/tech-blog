<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Python vs 다른 언어</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">같은 작업을 세 언어로 비교</text>

  <!-- Python column -->
  <rect x="60" y="95" width="240" height="36" rx="6" fill="#1a2e1a" stroke="#22c55e" stroke-width="1"/>
  <text x="180" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Python</text>
  <rect x="60" y="141" width="240" height="110" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="163" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 리스트 제곱합</text>
  <text x="76" y="183" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">nums = [</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#b5cea8">4</tspan><tspan fill="#ffffff">]</tspan></text>
  <text x="76" y="203" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">result = </tspan><tspan fill="#7ec8e3" font-weight="600">sum</tspan><tspan fill="#ffffff">(</tspan></text>
  <text x="76" y="223" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    x**</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> x </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> nums)</tspan></text>

  <!-- Java column -->
  <rect x="330" y="95" width="220" height="36" rx="6" fill="#2e1a1a" stroke="#e05555" stroke-width="1"/>
  <text x="440" y="119" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">Java (비교)</text>
  <rect x="330" y="141" width="220" height="200" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="346" y="163" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff">[] nums = {</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#b5cea8">2</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#b5cea8">3</tspan><tspan fill="#ffffff">,</tspan><tspan fill="#b5cea8">4</tspan><tspan fill="#ffffff">};</tspan></text>
  <text x="346" y="183" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff"> result = </tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">;</tspan></text>
  <text x="346" y="203" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> (</tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff"> x : nums) {</tspan></text>
  <text x="346" y="223" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">    result += x * x;</tspan></text>
  <text x="346" y="243" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">}</tspan></text>

  <!-- Feature summary -->
  <rect x="580" y="95" width="240" height="280" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="700" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">Python의 강점</text>
  <line x1="600" y1="132" x2="800" y2="132" stroke="#7777cc" stroke-width="0.5"/>
  <text x="600" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">&#x2713;  코드 길이 최소화</text>
  <text x="600" y="182" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">&#x2713;  타입 선언 불필요</text>
  <text x="600" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">&#x2713;  풍부한 내장 함수</text>
  <text x="600" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">&#x2713;  빠른 프로토타이핑</text>
  <text x="600" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">&#x2713;  방대한 생태계</text>
  <text x="600" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">&#x2713;  배우기 쉬운 문법</text>
  <text x="600" y="340" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">350만+ 패키지 (PyPI)</text>

  <text x="440" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#666" text-anchor="middle">같은 결과를 더 적은 코드로 — Python의 철학</text>
</svg>
