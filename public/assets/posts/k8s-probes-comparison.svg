<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Liveness · Readiness · Startup Probe 비교</text>
  <text x="440" y="66" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">각 프로브의 목적과 실패 시 동작이 다릅니다</text>

  <!-- Liveness Probe -->
  <rect x="60" y="90" width="240" height="220" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="2"/>
  <text x="180" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e05555">livenessProbe</text>
  <text x="180" y="140" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">목적: 컨테이너 생존 확인</text>
  <text x="180" y="162" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">데드락 · 무한루프 감지</text>
  <text x="180" y="182" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">컨테이너 시작 후 계속 실행</text>
  <text x="180" y="208" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e05555">실패 시:</text>
  <text x="180" y="228" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">컨테이너 재시작</text>
  <text x="180" y="248" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">(restartPolicy 따름)</text>
  <text x="180" y="268" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">트래픽 계속 수신</text>
  <text x="180" y="286" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">재시작 전까지</text>

  <!-- Readiness Probe -->
  <rect x="320" y="90" width="240" height="220" rx="8" fill="#0d1e0d" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555">readinessProbe</text>
  <text x="440" y="140" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">목적: 트래픽 수신 준비 확인</text>
  <text x="440" y="162" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">DB 연결 · 캐시 워밍업 완료</text>
  <text x="440" y="182" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">시작 후 계속 실행</text>
  <text x="440" y="208" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">실패 시:</text>
  <text x="440" y="228" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">Endpoints에서 제거</text>
  <text x="440" y="248" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">(트래픽 차단)</text>
  <text x="440" y="268" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">컨테이너는 재시작 안 함</text>
  <text x="440" y="286" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">성공 시 재추가</text>

  <!-- Startup Probe -->
  <rect x="580" y="90" width="240" height="220" rx="8" fill="#0d1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="700" y="116" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">startupProbe</text>
  <text x="700" y="140" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">목적: 느린 시작 컨테이너 보호</text>
  <text x="700" y="162" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">JVM / 레거시 앱 시작 시간</text>
  <text x="700" y="182" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">성공 후 liveness로 전환</text>
  <text x="700" y="208" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3">실패 시:</text>
  <text x="700" y="228" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">컨테이너 재시작</text>
  <text x="700" y="248" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">(실행 전 기간 보호)</text>
  <text x="700" y="268" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">liveness/readiness를</text>
  <text x="700" y="286" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">성공 전까지 비활성화</text>

  <!-- Probe types row -->
  <rect x="60" y="334" width="760" height="136" rx="8" fill="#121e38" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="356" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">프로브 체크 방식</text>

  <!-- httpGet -->
  <text x="80" y="380"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">httpGet</text>
  <text x="80" y="398"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">HTTP 200-399 응답</text>
  <text x="80" y="414"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">path: /healthz</text>
  <text x="80" y="430"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">port: 8080</text>
  <text x="80" y="448"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">웹 서버에 적합</text>

  <!-- tcpSocket -->
  <text x="330" y="380"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">tcpSocket</text>
  <text x="330" y="398"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">TCP 포트 열림 확인</text>
  <text x="330" y="414"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">port: 5432</text>
  <text x="330" y="430"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">DB/캐시 서버에 적합</text>

  <!-- exec -->
  <text x="580" y="380"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555">exec</text>
  <text x="580" y="398"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">커맨드 exitCode 0 확인</text>
  <text x="580" y="414"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">command: ["redis-cli", "ping"]</text>
  <text x="580" y="430"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">유연하지만 오버헤드 있음</text>
  <text x="580" y="448"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">gRPC (1.24+) 방식도 있음</text>
</svg>
