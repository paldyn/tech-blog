<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8" text-anchor="middle">중복 없는 최장 부분 문자열 (Variable Window)</text>

  <rect x="60" y="66" width="760" height="296" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="80" y="90" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">  def</text>
  <text x="80" y="90" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">      longest_no_repeat(s):</text>
  <text x="80" y="110" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">    # 슬라이딩 윈도우 + 해시맵(최근 인덱스)</text>
  <text x="80" y="130" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    last_seen = {}  </text>
  <text x="80" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    left = best = 0</text>
  <text x="80" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    for</text>
  <text x="80" y="170" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        right, ch in enumerate(s):</text>
  <text x="80" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">      # 중복 발견: left를 이전 등장 위치+1로 점프</text>
  <text x="80" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">      if</text>
  <text x="80" y="210" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">          ch in last_seen and last_seen[ch] &gt;= left:</text>
  <text x="80" y="230" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">        left = last_seen[ch] + 1</text>
  <text x="80" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">      last_seen[ch] = right</text>
  <text x="80" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">      best = max(best, right - left + 1)</text>
  <text x="80" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">    return</text>
  <text x="80" y="290" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">           best</text>

  <text x="80" y="320" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">  # 예: "abcabcbb" → 3 ("abc")</text>
  <text x="80" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">  # 시간: O(N), 공간: O(σ) σ=문자 종류 수</text>

  <!-- bottom -->
  <rect x="60" y="374" width="760" height="16" rx="4" fill="#111"/>
  <text x="440" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">left는 절대 뒤로 가지 않으므로 right, left 각 N번 이동 → O(N)</text>
</svg>
