<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">OWASP API Security Top 10 (2023)</text>

  <!-- Items -->
  <!-- API1 -->
  <rect x="60" y="62" width="760" height="38" rx="0" fill="#1a0a0a" stroke="#5a1a1a" stroke-width="1"/>
  <text x="90" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">API1</text>
  <text x="140" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">BOLA - Broken Object Level Authorization</text>
  <text x="530" y="87" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">/orders/123 → /orders/124 ID 변조로 타인 데이터 접근</text>

  <!-- API2 -->
  <rect x="60" y="100" width="760" height="38" rx="0" fill="#1a1a0a" stroke="#5a5a1a" stroke-width="1"/>
  <text x="90" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">API2</text>
  <text x="140" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">Broken Authentication</text>
  <text x="530" y="125" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">약한 토큰, alg:none, 만료 미검사</text>

  <!-- API3 -->
  <rect x="60" y="138" width="760" height="38" rx="0" fill="#1a0a0a" stroke="#5a1a1a" stroke-width="1"/>
  <text x="90" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">API3</text>
  <text x="140" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">Broken Object Property Level Authorization</text>
  <text x="530" y="163" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Mass Assignment, 과도한 데이터 노출</text>

  <!-- API4 -->
  <rect x="60" y="176" width="760" height="38" rx="0" fill="#1a1a0a" stroke="#5a5a1a" stroke-width="1"/>
  <text x="90" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">API4</text>
  <text x="140" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">Unrestricted Resource Consumption</text>
  <text x="530" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Rate Limit 없음, 대용량 응답, 비용 폭증</text>

  <!-- API5 -->
  <rect x="60" y="214" width="760" height="38" rx="0" fill="#1a0a0a" stroke="#5a1a1a" stroke-width="1"/>
  <text x="90" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">API5</text>
  <text x="140" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">BFLA - Broken Function Level Authorization</text>
  <text x="530" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">일반 사용자가 /admin/* 엔드포인트 접근</text>

  <!-- API6 -->
  <rect x="60" y="252" width="760" height="38" rx="0" fill="#1a1a0a" stroke="#5a5a1a" stroke-width="1"/>
  <text x="90" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">API6</text>
  <text x="140" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">Unrestricted Access to Sensitive Business Flows</text>
  <text x="530" y="277" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">봇 자동화로 재고 선점, 쿠폰 대량 발급</text>

  <!-- API7 -->
  <rect x="60" y="290" width="760" height="38" rx="0" fill="#1a0a0a" stroke="#5a1a1a" stroke-width="1"/>
  <text x="90" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">API7</text>
  <text x="140" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">Server Side Request Forgery (SSRF)</text>
  <text x="530" y="315" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">URL 파라미터로 내부 서비스·메타데이터 접근</text>

  <!-- API8 -->
  <rect x="60" y="328" width="760" height="38" rx="0" fill="#1a1a0a" stroke="#5a5a1a" stroke-width="1"/>
  <text x="90" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">API8</text>
  <text x="140" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">Security Misconfiguration</text>
  <text x="530" y="353" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">디버그 모드, CORS *, 기본 자격증명</text>

  <!-- API9 -->
  <rect x="60" y="366" width="760" height="38" rx="0" fill="#1a0a0a" stroke="#5a1a1a" stroke-width="1"/>
  <text x="90" y="391" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">API9</text>
  <text x="140" y="391" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">Improper Inventory Management</text>
  <text x="530" y="391" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">구버전·테스트 API 방치, 좀비 엔드포인트</text>

  <!-- API10 -->
  <rect x="60" y="404" width="760" height="38" rx="0" fill="#1a1a0a" stroke="#5a5a1a" stroke-width="1"/>
  <text x="90" y="429" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#ce9178">API10</text>
  <text x="140" y="429" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e8e8e8">Unsafe Consumption of APIs</text>
  <text x="530" y="429" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">서드파티 API 응답 무조건 신뢰, 인젝션 전파</text>

  <!-- Note -->
  <text x="440" y="472" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">빨간색: 가장 위험 / 노란색: 높은 위험 | BOLA(API1)가 3년 연속 1위</text>
  <text x="440" y="490" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">출처: owasp.org/API-Security/editions/2023/en/0x00-header/</text>
</svg>
