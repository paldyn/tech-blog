<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">JVM 언어들의 성격 — 무엇을 더 중시하는가</text>

  <rect x="50" y="90" width="255" height="200" rx="10" fill="#11151c" stroke="#7777cc" stroke-width="1.5"/>
  <text x="177" y="124" font-size="16" font-weight="600" fill="#7777cc" text-anchor="middle">Java</text>
  <text x="177" y="156" font-size="13" fill="#ffffff" text-anchor="middle">안정성 · 호환성</text>
  <text x="177" y="184" font-size="12" fill="#888" text-anchor="middle">신중한 진화,</text>
  <text x="177" y="204" font-size="12" fill="#888" text-anchor="middle">거대한 생태계</text>
  <text x="177" y="232" font-size="12" fill="#888" text-anchor="middle">가장 넓은 인력풀</text>
  <text x="177" y="262" font-size="12" fill="#888" text-anchor="middle">기준이 되는 언어</text>

  <rect x="312" y="90" width="255" height="200" rx="10" fill="#11151c" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="124" font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">Kotlin</text>
  <text x="440" y="156" font-size="13" fill="#ffffff" text-anchor="middle">간결함 · 실용성</text>
  <text x="440" y="184" font-size="12" fill="#888" text-anchor="middle">널 안전성,</text>
  <text x="440" y="204" font-size="12" fill="#888" text-anchor="middle">매끄러운 자바 호환</text>
  <text x="440" y="232" font-size="12" fill="#888" text-anchor="middle">안드로이드 공식</text>
  <text x="440" y="262" font-size="12" fill="#888" text-anchor="middle">현대적 문법</text>

  <rect x="574" y="90" width="256" height="200" rx="10" fill="#11151c" stroke="#55c555" stroke-width="1.5"/>
  <text x="702" y="124" font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">Scala</text>
  <text x="702" y="156" font-size="13" fill="#ffffff" text-anchor="middle">표현력 · 함수형</text>
  <text x="702" y="184" font-size="12" fill="#888" text-anchor="middle">강력한 타입 시스템,</text>
  <text x="702" y="204" font-size="12" fill="#888" text-anchor="middle">OOP + FP 융합</text>
  <text x="702" y="232" font-size="12" fill="#888" text-anchor="middle">데이터·빅데이터</text>
  <text x="702" y="262" font-size="12" fill="#888" text-anchor="middle">학습 곡선 가파름</text>
</svg>
