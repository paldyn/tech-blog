<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Server vs Client Components</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">App Router 의 기본은 서버 — 상호작용이 필요한 곳만 클라이언트로</text>

  <!-- LEFT: Server Component -->
  <rect x="60" y="100" width="380" height="240" rx="10" fill="#0d1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="80" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555">Server Component</text>
  <text x="80" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">(기본값) · 서버에서만 실행</text>
  <rect x="76" y="166" width="348" height="58" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">async function</tspan><tspan fill="#ffffff"> UserList() {</tspan></text>
  <text x="92" y="211" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">  const</tspan><tspan fill="#ffffff"> u = </tspan><tspan fill="#7ec8e3" font-weight="600">await</tspan><tspan fill="#ffffff"> db.find()</tspan></text>
  <text x="80" y="252" xml:space="preserve" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13"><tspan fill="#55c555">✓</tspan><tspan fill="#d4d4d4">  DB · 파일 직접 접근</tspan></text>
  <text x="80" y="280" xml:space="preserve" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13"><tspan fill="#55c555">✓</tspan><tspan fill="#d4d4d4">  시크릿 서버에 안전</tspan></text>
  <text x="80" y="308" xml:space="preserve" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13"><tspan fill="#55c555">✓</tspan><tspan fill="#d4d4d4">  제로 JS 번들</tspan></text>

  <!-- RIGHT: Client Component -->
  <rect x="460" y="100" width="380" height="240" rx="10" fill="#0d141a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="480" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">Client Component</text>
  <text x="480" y="153" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">'use client' 선언 필요</text>
  <rect x="476" y="166" width="348" height="58" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="492" y="190" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ce9178">'use client'</tspan></text>
  <text x="492" y="211" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> [q, setQ] = useState()</tspan></text>
  <text x="480" y="252" xml:space="preserve" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13"><tspan fill="#7ec8e3">✓</tspan><tspan fill="#d4d4d4">  useState · useEffect</tspan></text>
  <text x="480" y="280" xml:space="preserve" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13"><tspan fill="#7ec8e3">✓</tspan><tspan fill="#d4d4d4">  브라우저 API · 이벤트</tspan></text>
  <text x="480" y="308" xml:space="preserve" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13"><tspan fill="#7ec8e3">✓</tspan><tspan fill="#d4d4d4">  상호작용 UI</tspan></text>

  <!-- Boundary rule strip -->
  <rect x="60" y="356" width="780" height="58" rx="10" fill="#14101a" stroke="#7777cc" stroke-width="1"/>
  <text x="90" y="391" xml:space="preserve" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13"><tspan fill="#55c555">✓</tspan><tspan fill="#d4d4d4">  SC 는 CC 를 children 으로 전달</tspan></text>
  <text x="470" y="391" xml:space="preserve" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13"><tspan fill="#e05555">✗</tspan><tspan fill="#d4d4d4">  CC 는 SC 를 직접 import 불가</tspan></text>

  <!-- Bottom note -->
  <text x="440" y="446" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">번들·시크릿·데이터는 서버에, 상태·이벤트는 클라이언트에 둔다</text>
</svg>
