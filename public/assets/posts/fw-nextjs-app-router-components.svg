<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-gray" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="45" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Server Components vs Client Components</text>

  <!-- ===== Left Column: Server Component ===== -->
  <!-- Header badge -->
  <rect x="60" y="62" width="370" height="30" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5" rx="6"/>
  <text x="245" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Server Component (기본값)</text>

  <!-- SC Code box -->
  <rect x="60" y="98" width="370" height="196" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>

  <!-- No directive -->
  <text x="76" y="122" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"
        >// 'use client' 없음 — 기본값은 Server</text>

  <text x="76" y="146" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">async function</tspan><tspan fill="#ffffff"> UserProfile() {</tspan>
  </text>
  <text x="76" y="166" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">  // DB 직접 접근 가능</tspan>
  </text>
  <text x="76" y="186" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> user = </tspan><tspan fill="#7ec8e3" font-weight="600">await</tspan><tspan fill="#ffffff"> db.user.findFirst()</tspan>
  </text>
  <text x="76" y="206" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">  // 시크릿 키 노출 없음</tspan>
  </text>
  <text x="76" y="226" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> key = process.env.</tspan><tspan fill="#ce9178">SECRET_KEY</tspan>
  </text>
  <text x="76" y="246" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">div</tspan><tspan fill="#ffffff">&gt;{user.name}&lt;/</tspan><tspan fill="#7ec8e3" font-weight="600">div</tspan><tspan fill="#ffffff">&gt;</tspan>
  </text>
  <text x="76" y="266" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">}</tspan>
  </text>
  <text x="76" y="284" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"
        >// JS 번들에 포함되지 않음 (zero bundle)</tspan>

  <!-- SC Feature list -->
  <rect x="60" y="304" width="370" height="148" fill="#0a1a0a" stroke="#1a3a1a" stroke-width="1" rx="6"/>
  <text x="76" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">가능한 것</text>
  <text x="76" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">✓  async/await 직접 사용</text>
  <text x="76" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">✓  DB, 파일시스템, 시크릿 접근</text>
  <text x="76" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">✓  클라이언트 컴포넌트를 자식으로 포함</text>
  <text x="76" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">불가능한 것</text>
  <text x="76" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">✗  useState, useEffect 사용</text>
  <text x="76" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">✗  onClick 등 이벤트 핸들러</text>
  <text x="76" y="453" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">✗  브라우저 API (window, document)</text>

  <!-- ===== Center: Relationship Arrows ===== -->
  <!-- SC can pass CC as children -->
  <line x1="430" y1="220" x2="450" y2="220" stroke="#55c555" stroke-width="2"
        marker-end="url(#arr-green)"/>
  <text x="440" y="213" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">가능</text>

  <!-- CC cannot import SC -->
  <line x1="450" y1="260" x2="430" y2="260" stroke="#e05555" stroke-width="2"
        marker-end="url(#arr-red)"/>
  <text x="440" y="253" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555" text-anchor="middle">불가</text>

  <!-- ===== Right Column: Client Component ===== -->
  <!-- Header badge -->
  <rect x="450" y="62" width="370" height="30" fill="#0a0a1a" stroke="#7ec8e3" stroke-width="1.5" rx="6"/>
  <text x="635" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">Client Component</text>

  <!-- CC Code box -->
  <rect x="450" y="98" width="370" height="196" fill="#000000" stroke="#3a4a6e" stroke-width="1" rx="6"/>

  <!-- 'use client' directive -->
  <text x="466" y="118" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ce9178">'use client'</tspan><tspan fill="#9aa4b8">  // 파일 맨 위에 선언</tspan>
  </text>

  <text x="466" y="142" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> { useState } </tspan><tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ce9178"> 'react'</tspan>
  </text>

  <text x="466" y="162" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">export function</tspan><tspan fill="#ffffff"> Counter() {</tspan>
  </text>
  <text x="466" y="182" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> [count, setCount] = </tspan><tspan fill="#ffffff">useState(</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">)</tspan>
  </text>
  <text x="466" y="202" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8">  // 브라우저 API 접근 가능</tspan>
  </text>
  <text x="466" y="222" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">button</tspan><tspan fill="#ffffff"> onClick={() =&gt; setCount(c =&gt; c+</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">)}&gt;</tspan>
  </text>
  <text x="466" y="242" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    {count}</tspan>
  </text>
  <text x="466" y="262" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  &lt;/</tspan><tspan fill="#7ec8e3" font-weight="600">button</tspan><tspan fill="#ffffff">&gt;</tspan>
  </text>
  <text x="466" y="282" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">}</tspan>
  </text>

  <!-- CC Feature list -->
  <rect x="450" y="304" width="370" height="148" fill="#0a0a1a" stroke="#1a1a3a" stroke-width="1" rx="6"/>
  <text x="466" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">가능한 것</text>
  <text x="466" y="346" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">✓  useState, useEffect, useRef 등 훅</text>
  <text x="466" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">✓  onClick 등 이벤트 핸들러</text>
  <text x="466" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">✓  window, localStorage, IntersectionObserver</text>
  <text x="466" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">불가능한 것</text>
  <text x="466" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">✗  async 컴포넌트 함수 (use() hook 사용)</text>
  <text x="466" y="436" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">✗  DB·파일시스템 직접 접근</text>
  <text x="466" y="453" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">✗  서버 전용 모듈 import</text>
</svg>
