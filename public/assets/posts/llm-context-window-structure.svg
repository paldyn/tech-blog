<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">컨텍스트 윈도우 구조</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">LLM이 한 번에 처리하는 토큰 시퀀스의 구성</text>

  <!-- Total context window bar background -->
  <rect x="60" y="100" width="760" height="60" fill="#111" rx="8" stroke="#2a2a2a" stroke-width="1"/>

  <!-- System Prompt section (20%) -->
  <rect x="60" y="100" width="152" height="60" fill="#1a1f2e" rx="8"/>
  <rect x="208" y="100" width="4" height="60" fill="#0a0a0a"/>

  <!-- Conversation History section (50%) -->
  <rect x="212" y="100" width="380" height="60" fill="#1a2a1a"/>
  <rect x="588" y="100" width="4" height="60" fill="#0a0a0a"/>

  <!-- Current Query section (30%) -->
  <rect x="592" y="100" width="228" height="60" fill="#2a1a1a" rx="8"/>

  <!-- Section labels inside bars -->
  <text x="136" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">System Prompt</text>
  <text x="136" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">~20%</text>

  <text x="402" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Conversation History</text>
  <text x="402" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">~50%</text>

  <text x="706" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">Current Query</text>
  <text x="706" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">~30%</text>

  <!-- Arrow showing total window -->
  <line x1="60" y1="178" x2="820" y2="178" stroke="#444" stroke-width="1" stroke-dasharray="4,3"/>
  <polygon points="820,174 820,182 828,178" fill="#444"/>
  <polygon points="60,174 60,182 52,178" fill="#444"/>
  <text x="440" y="194" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">전체 컨텍스트 윈도우 (예: 128K 토큰)</text>

  <!-- Detail boxes -->
  <!-- System Prompt detail -->
  <rect x="60" y="215" width="230" height="140" fill="#111827" rx="8" stroke="#7777cc" stroke-width="1" stroke-opacity="0.5"/>
  <text x="175" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">System Prompt</text>
  <text x="80" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• 모델 역할 및 행동 지침</text>
  <text x="80" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• 응답 형식 지정</text>
  <text x="80" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• 안전 제약 및 페르소나</text>
  <text x="80" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• 도구 설명 포함 가능</text>
  <text x="80" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">일반적으로 고정 / 재사용</text>

  <!-- Conversation History detail -->
  <rect x="310" y="215" width="260" height="140" fill="#111827" rx="8" stroke="#55c555" stroke-width="1" stroke-opacity="0.5"/>
  <text x="440" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Conversation History</text>
  <text x="330" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• 이전 사용자 메시지 (user turns)</text>
  <text x="330" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• 이전 어시스턴트 응답</text>
  <text x="330" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• 툴 호출 결과 포함</text>
  <text x="330" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• 대화가 길수록 빠르게 증가</text>
  <text x="330" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">가장 많은 토큰을 소비하는 구간</text>

  <!-- Current Query detail -->
  <rect x="590" y="215" width="230" height="140" fill="#111827" rx="8" stroke="#e05555" stroke-width="1" stroke-opacity="0.5"/>
  <text x="705" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">Current Query</text>
  <text x="610" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• 현재 사용자 입력</text>
  <text x="610" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• 첨부 문서 / 코드 스니펫</text>
  <text x="610" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• RAG 검색 결과 삽입</text>
  <text x="610" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#aaa">• 이미지/멀티모달 입력</text>
  <text x="610" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#666">즉각적 처리 대상</text>

  <!-- Token limit indicator -->
  <rect x="60" y="372" width="760" height="32" fill="#1a1a1a" rx="6"/>
  <text x="80" y="393" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">제한 초과 시:</text>
  <text x="180" y="393" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">오래된 컨텍스트 잘림 (truncation)</text>
  <text x="430" y="393" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">또는</text>
  <text x="460" y="393" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">슬라이딩 윈도우 / 압축 전략 적용</text>
</svg>
