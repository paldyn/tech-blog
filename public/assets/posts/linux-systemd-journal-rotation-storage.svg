<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">journal 저장 위치와 파일 구조</text>

  <!-- Persistent storage -->
  <rect x="60" y="66" width="360" height="130" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="240" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">persistent (디스크)</text>
  <text x="80" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">/var/log/journal/</text>
  <text x="80" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  &lt;machine-id&gt;/</text>
  <text x="80" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">    system.journal</text>
  <text x="80" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">    user-1000.journal</text>

  <!-- Volatile storage -->
  <rect x="460" y="66" width="360" height="130" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="640" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">volatile (RAM)</text>
  <text x="480" y="114" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">/run/log/journal/</text>
  <text x="480" y="134" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">  &lt;machine-id&gt;/</text>
  <text x="480" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff">    system.journal</text>
  <text x="480" y="174" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">    (재부팅 시 삭제)</text>

  <!-- Labels -->
  <text x="240" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">재부팅 후에도 보존</text>
  <text x="640" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">빠르지만 재부팅 시 사라짐</text>

  <!-- Vacuum commands -->
  <text x="60" y="252" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8">수동 정리 (vacuum)</text>

  <rect x="60" y="268" width="760" height="106" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="292" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">journalctl <tspan fill="#ffffff">--vacuum-size=</tspan><tspan fill="#b5cea8">300M</tspan>   <tspan fill="#888"># 300MB 이하로</tspan></text>
  <text x="80" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">journalctl <tspan fill="#ffffff">--vacuum-time=</tspan><tspan fill="#b5cea8">2weeks</tspan> <tspan fill="#888"># 2주 이전 삭제</tspan></text>
  <text x="80" y="340" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">journalctl <tspan fill="#ffffff">--vacuum-files=</tspan><tspan fill="#b5cea8">5</tspan>      <tspan fill="#888"># 최대 5개 파일</tspan></text>
  <text x="80" y="364" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">journalctl <tspan fill="#ffffff">--disk-usage</tspan>           <tspan fill="#888"># 현재 사용량</tspan></text>
</svg>
