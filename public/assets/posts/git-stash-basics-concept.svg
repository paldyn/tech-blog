<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arro" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#ce9178"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">git stash — 작업 임시 저장 흐름</text>

  <!-- Working directory -->
  <rect x="60" y="80" width="200" height="160" rx="8" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="160" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#7ec8e3" text-anchor="middle" font-weight="600">작업 디렉터리</text>
  <text x="160" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">수정된 파일 A</text>
  <text x="160" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">수정된 파일 B</text>
  <text x="160" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8" text-anchor="middle">스테이징된 파일 C</text>
  <text x="160" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">긴급 이슈 발생!</text>
  <text x="160" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">다른 브랜치로 이동 필요</text>

  <!-- stash push arrow -->
  <path d="M 270 130 Q 340 110 408 130" stroke="#7ec8e3" stroke-width="2" stroke-dasharray="4,4" fill="none" marker-end="url(#arr)"/>
  <text x="338" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">git stash</text>
  <text x="338" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">push</text>

  <!-- stash pop arrow -->
  <path d="M 410 170 Q 340 190 270 170" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4" fill="none" marker-end="url(#arrg)"/>
  <text x="338" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">git stash</text>
  <text x="338" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">pop</text>

  <!-- Stash stack -->
  <rect x="420" y="80" width="200" height="160" rx="8" fill="#1a1a1e" stroke="#7777cc" stroke-width="2"/>
  <text x="520" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#7777cc" text-anchor="middle" font-weight="600">Stash 스택</text>
  <rect x="436" y="115" width="168" height="38" rx="4" fill="#2a2a3e" stroke="#7777cc" stroke-width="1"/>
  <text x="520" y="130" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7777cc" text-anchor="middle">stash@{0}</text>
  <text x="520" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#888" text-anchor="middle">WIP: A, B, C 저장</text>
  <rect x="436" y="160" width="168" height="38" rx="4" fill="#1e1e2a" stroke="#555" stroke-width="1"/>
  <text x="520" y="175" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#555" text-anchor="middle">stash@{1}</text>
  <text x="520" y="191" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#555" text-anchor="middle">이전 stash</text>
  <text x="520" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">LIFO 스택 구조</text>
  <text x="520" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">{0}이 가장 최신</text>

  <!-- Clean working dir -->
  <rect x="660" y="80" width="180" height="100" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="2"/>
  <text x="750" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#55c555" text-anchor="middle" font-weight="600">stash 후</text>
  <text x="750" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">작업 디렉터리</text>
  <text x="750" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">깨끗한 상태</text>
  <text x="750" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">✓ 브랜치 이동 가능</text>

  <!-- Arrow from stash to clean -->
  <line x1="620" y1="130" x2="658" y2="130" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>

  <!-- Code examples -->
  <rect x="60" y="290" width="760" height="160" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="316" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 현재 변경사항 임시 저장 (tracked 파일만)</text>
  <text x="76" y="336" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">git stash</text>

  <text x="76" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 이름 붙여 저장 (나중에 식별하기 쉬움)</text>
  <text x="76" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">git stash </text>
  <text x="156" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">push</text>
  <text x="197" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600"> -m</text>
  <text x="225" y="380" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178"> "로그인 기능 WIP"</text>

  <text x="76" y="404" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 가장 최근 stash 복원 후 스택에서 제거</text>
  <text x="76" y="424" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">git stash </text>
  <text x="156" y="424" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">pop</text>
</svg>
