<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">docker cp — 명령 패턴</text>

  <!-- Left column -->
  <text x="80" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">호스트 → 컨테이너</text>
  <rect x="60" y="92" width="370" height="118" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 파일 복사</text>
  <text x="76" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker cp</tspan><tspan fill="#e8e8e8"> app.conf web:/etc/nginx/</tspan></text>
  <text x="76" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 디렉터리 복사</text>
  <text x="76" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker cp</tspan><tspan fill="#e8e8e8"> ./dist/. web:/app/static/</tspan></text>
  <text x="76" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># stdin으로 tar 스트림 전송</text>
  <text x="76" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">tar cf - ./files | </tspan><tspan fill="#7ec8e3">docker cp</tspan><tspan fill="#e8e8e8"> - web:/app/</tspan></text>

  <!-- Left column: Container → Host -->
  <text x="80" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">컨테이너 → 호스트</text>
  <rect x="60" y="248" width="370" height="118" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="270" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 로그 파일 추출</text>
  <text x="76" y="288" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker cp</tspan><tspan fill="#e8e8e8"> web:/var/log/nginx/ ./backup/</tspan></text>
  <text x="76" y="306" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 설정 파일 추출</text>
  <text x="76" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker cp</tspan><tspan fill="#e8e8e8"> web:/etc/nginx/nginx.conf .</tspan></text>
  <text x="76" y="342" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># stdout으로 tar 스트림 출력</text>
  <text x="76" y="360" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker cp</tspan><tspan fill="#e8e8e8"> web:/app - | tar xf -</tspan></text>

  <!-- Right column: Practical patterns -->
  <text x="460" y="80" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">실전 활용 패턴</text>
  <rect x="448" y="92" width="372" height="154" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="464" y="114" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 빌드 결과물 추출 (multi-stage 대체)</text>
  <text x="464" y="132" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#e8e8e8">CID=$(</tspan><tspan fill="#7ec8e3">docker create</tspan><tspan fill="#e8e8e8"> my-builder)</tspan></text>
  <text x="464" y="150" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker cp</tspan><tspan fill="#e8e8e8"> $CID:/app/dist ./dist</tspan></text>
  <text x="464" y="168" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker rm</tspan><tspan fill="#e8e8e8"> $CID</tspan></text>
  <text x="464" y="186" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 컨테이너 내 설정 핫픽스</text>
  <text x="464" y="204" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker cp</tspan><tspan fill="#e8e8e8"> hotfix.conf web:/etc/app/</tspan></text>
  <text x="464" y="222" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12"><tspan fill="#7ec8e3">docker exec</tspan><tspan fill="#e8e8e8"> web reload-config</tspan></text>
  <text x="464" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0"># 변경 후 이미지로 커밋</text>

  <!-- Right column: Cautions -->
  <text x="460" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555">주의 사항</text>
  <rect x="448" y="282" width="372" height="84" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="464" y="304" xml:space="preserve" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 심볼릭 링크는 링크 대상 파일이 복사됨</text>
  <text x="464" y="324" xml:space="preserve" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 퍼미션·소유자 정보는 기본 보존</text>
  <text x="464" y="344" xml:space="preserve" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 운영 컨테이너 직접 수정은 권장하지 않음</text>
  <text x="464" y="364" xml:space="preserve" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">• 이미지 레이어에 반영되지 않음</text>

  <text x="440" y="388" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">경로 끝 슬래시 유무가 디렉터리/내용물 복사를 결정 — cp(1)과 동일한 규칙</text>
</svg>
