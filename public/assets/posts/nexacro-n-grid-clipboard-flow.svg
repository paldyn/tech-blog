<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Grid 클립보드 복사·붙여넣기 흐름</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">Ctrl+C / Ctrl+V 동작과 copytype 설정</text>

  <!-- Copy flow -->
  <rect x="60" y="100" width="360" height="160" fill="#111" rx="8"/>
  <text x="240" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">복사 (Ctrl+C)</text>

  <rect x="80" y="130" width="140" height="40" fill="#1a1a2e" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="150" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">셀 선택</text>

  <polygon points="230,150 256,144 256,147 280,147 280,144 306,150 280,156 280,153 256,153 256,156" fill="#7777cc" stroke="#4a4a99" stroke-width="1"/>

  <rect x="310" y="130" width="90" height="40" fill="#1a2e1a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="355" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">클립보드</text>

  <text x="240" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">copytype 속성에 따라 복사 범위 결정</text>
  <text x="100" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">· selected: 선택 셀만</text>
  <text x="100" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">· row: 현재 행 전체</text>
  <text x="100" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">· all: 모든 행</text>

  <!-- Paste flow -->
  <rect x="460" y="100" width="360" height="160" fill="#111" rx="8"/>
  <text x="640" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">붙여넣기 (Ctrl+V)</text>

  <rect x="480" y="130" width="100" height="40" fill="#1a2e1a" rx="6" stroke="#55c555" stroke-width="1"/>
  <text x="530" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">클립보드</text>

  <polygon points="584,150 610,144 610,147 634,147 634,144 660,150 634,156 634,153 610,153 610,156" fill="#7777cc" stroke="#4a4a99" stroke-width="1"/>

  <rect x="664" y="130" width="136" height="40" fill="#1a1a2e" rx="6" stroke="#7ec8e3" stroke-width="1"/>
  <text x="732" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="middle">현재 행/셀에 입력</text>

  <text x="640" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">탭(\t) 구분 TSV 형식으로 파싱</text>
  <text x="480" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">· 다중 행: 현재 행부터 순서대로</text>
  <text x="480" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">· 열 수 초과분 무시</text>
  <text x="480" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">· 행 부족 시 자동 추가</text>

  <!-- copytype table -->
  <rect x="60" y="280" width="760" height="160" fill="#111" rx="8"/>
  <text x="440" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#e8e8e8" text-anchor="middle">copytype 값별 동작 비교</text>

  <rect x="80" y="314" width="720" height="30" fill="#1a1a2e" rx="3"/>
  <text x="180" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">copytype</text>
  <text x="410" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">복사 대상</text>
  <text x="680" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">용도</text>

  <text x="180" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178" text-anchor="middle">selected</text>
  <text x="410" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">선택된 셀들만</text>
  <text x="680" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">셀 범위 복사</text>

  <text x="180" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178" text-anchor="middle">row</text>
  <text x="410" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">현재 행 전체</text>
  <text x="680" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">행 단위 엑셀 내보내기</text>

  <text x="180" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#ce9178" text-anchor="middle">all</text>
  <text x="410" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">Grid 전체 데이터</text>
  <text x="680" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">전체 복사 후 엑셀 붙여넣기</text>
</svg>
