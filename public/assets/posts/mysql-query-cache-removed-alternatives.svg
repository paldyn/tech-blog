<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">쿼리 캐시 대안 — 어떻게 대체할 것인가</text>

  <!-- App-level cache -->
  <rect x="60" y="75" width="220" height="130" rx="8" fill="#111827" stroke="#2a2a40"/>
  <rect x="60" y="75" width="220" height="32" rx="8" fill="#1e2d4a"/>
  <rect x="60" y="91" width="220" height="16" fill="#1e2d4a"/>
  <text x="170" y="97" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">1. 애플리케이션 레벨 캐시</text>
  <text x="80" y="126" font-size="12" fill="#e8e8e8">Redis / Memcached</text>
  <text x="80" y="148" font-size="12" fill="#888">• 만료 시간 제어 가능</text>
  <text x="80" y="168" font-size="12" fill="#888">• 테이블 단위가 아닌</text>
  <text x="80" y="186" font-size="12" fill="#888">  비즈니스 단위로 캐싱</text>

  <!-- ProxySQL cache -->
  <rect x="330" y="75" width="220" height="130" rx="8" fill="#111827" stroke="#2a2a40"/>
  <rect x="330" y="75" width="220" height="32" rx="8" fill="#1e3a2a"/>
  <rect x="330" y="91" width="220" height="16" fill="#1e3a2a"/>
  <text x="440" y="97" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">2. ProxySQL Query Cache</text>
  <text x="350" y="126" font-size="12" fill="#e8e8e8">미들웨어 레벨 캐시</text>
  <text x="350" y="148" font-size="12" fill="#888">• 규칙 기반 캐싱</text>
  <text x="350" y="168" font-size="12" fill="#888">• MySQL 서버 부하 분산</text>
  <text x="350" y="186" font-size="12" fill="#888">• 고급 라우팅과 결합</text>

  <!-- Materialized view -->
  <rect x="600" y="75" width="220" height="130" rx="8" fill="#111827" stroke="#2a2a40"/>
  <rect x="600" y="75" width="220" height="32" rx="8" fill="#2a1e3a"/>
  <rect x="600" y="91" width="220" height="16" fill="#2a1e3a"/>
  <text x="710" y="97" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">3. 집계 테이블 / 읽기 전용 복제본</text>
  <text x="620" y="126" font-size="12" fill="#e8e8e8">Summary Table 패턴</text>
  <text x="620" y="148" font-size="12" fill="#888">• 대시보드용 집계 저장</text>
  <text x="620" y="168" font-size="12" fill="#888">• 읽기 전용 레플리카</text>
  <text x="620" y="186" font-size="12" fill="#888">• 스케일-아웃 분리</text>

  <!-- Version timeline -->
  <rect x="60" y="230" width="760" height="155" rx="8" fill="#111827" stroke="#2a2a40"/>
  <text x="440" y="258" text-anchor="middle" font-size="14" font-weight="600" fill="#e8e8e8">MySQL 쿼리 캐시 제거 역사</text>

  <line x1="100" y1="310" x2="820" y2="310" stroke="#2a2a40" stroke-width="2"/>

  <circle cx="150" cy="310" r="6" fill="#888"/>
  <text x="150" y="296" text-anchor="middle" font-size="12" fill="#888">5.1</text>
  <text x="150" y="332" text-anchor="middle" font-size="11" fill="#888">쿼리 캐시 도입</text>

  <circle cx="360" cy="310" r="6" fill="#7ec8e3"/>
  <text x="360" y="296" text-anchor="middle" font-size="12" fill="#7ec8e3">5.7</text>
  <text x="360" y="332" text-anchor="middle" font-size="11" fill="#7ec8e3">Deprecated</text>
  <text x="360" y="348" text-anchor="middle" font-size="11" fill="#888">비활성화 권고</text>

  <circle cx="600" cy="310" r="8" fill="#e05555"/>
  <text x="600" y="296" text-anchor="middle" font-size="12" fill="#e05555">8.0</text>
  <text x="600" y="332" text-anchor="middle" font-size="11" fill="#e05555">완전 제거</text>
  <text x="600" y="348" text-anchor="middle" font-size="11" fill="#888">2018년 GA</text>

  <circle cx="780" cy="310" r="6" fill="#55c555"/>
  <text x="780" y="296" text-anchor="middle" font-size="12" fill="#55c555">8.4+</text>
  <text x="780" y="332" text-anchor="middle" font-size="11" fill="#55c555">LTS 완전 무관</text>
</svg>
