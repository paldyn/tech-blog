<svg xmlns="http://www.w3.org/2000/svg" width="880" height="340" viewBox="0 0 880 340">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="340" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">TypeScript 개발 워크플로</text>

  <!-- Step 1 -->
  <rect x="60" y="80" width="140" height="60" rx="8" fill="#0f1f2f" stroke="#3178c6" stroke-width="1.5"/>
  <text x="130" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">코드 작성</text>
  <text x="130" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">.ts 파일 편집</text>

  <line x1="200" y1="110" x2="248" y2="110" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2 -->
  <rect x="250" y="80" width="140" height="60" rx="8" fill="#0f2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="320" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">IDE 피드백</text>
  <text x="320" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">실시간 타입 오류</text>

  <line x1="390" y1="110" x2="438" y2="110" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3 -->
  <rect x="440" y="80" width="140" height="60" rx="8" fill="#2a1a0a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="510" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178" text-anchor="middle">저장</text>
  <text x="510" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Prettier 자동 포매팅</text>

  <line x1="580" y1="110" x2="628" y2="110" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4 -->
  <rect x="630" y="80" width="140" height="60" rx="8" fill="#1a0a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="700" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">watch 컴파일</text>
  <text x="700" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">tsc --watch 자동</text>

  <!-- VS Code TypeScript version note -->
  <rect x="60" y="170" width="760" height="80" rx="8" fill="#0f1f0f" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="196" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">VS Code TypeScript 버전 관리</text>
  <text x="440" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">VS Code에는 자체 TypeScript 버전이 내장되어 있다</text>
  <text x="440" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">프로젝트 로컬 TS 버전을 사용하려면: Cmd+Shift+P → "Select TypeScript Version" → Use Workspace Version</text>

  <!-- Code block -->
  <rect x="60" y="270" width="760" height="50" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="292" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// .vscode/settings.json — 프로젝트 전용 설정</text>
  <text x="76" y="310" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">{ <tspan fill="#ce9178">"typescript.tsdk"</tspan>: <tspan fill="#ce9178">"node_modules/typescript/lib"</tspan> }</text>
</svg>
