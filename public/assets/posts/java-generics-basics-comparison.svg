<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 340">
  <rect width="880" height="340" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">제네릭 — 타입 안전성 비교</text>

  <rect x="40" y="64" width="380" height="38" fill="#1a0808" rx="8"/>
  <text x="230" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">Raw Type (제네릭 없이)</text>

  <rect x="460" y="64" width="380" height="38" fill="#081a08" rx="8"/>
  <text x="650" y="88" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">Generic Type (타입 안전)</text>

  <rect x="40" y="111" width="380" height="108" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="56" y="127" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">List</tspan><tspan fill="#ffffff"> list = </tspan><tspan fill="#7ec8e3" font-weight="600">new</tspan><tspan fill="#ffffff"> ArrayList();</tspan></text>
  <text x="56" y="147" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">list.add(</tspan><tspan fill="#ce9178">"hello"</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="56" y="167" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">list.add(</tspan><tspan fill="#b5cea8">42</tspan><tspan fill="#ffffff">); </tspan><tspan fill="#9aa4b8">// 타입 혼용 허용</tspan></text>
  <text x="56" y="187" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">String</tspan><tspan fill="#ffffff"> s = (</tspan><tspan fill="#7ec8e3" font-weight="600">String</tspan><tspan fill="#ffffff">) list.get(</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="56" y="207" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">// ClassCastException!</text>

  <rect x="460" y="111" width="380" height="108" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="127" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">List</tspan><tspan fill="#ffffff">&lt;</tspan><tspan fill="#7ec8e3" font-weight="600">String</tspan><tspan fill="#ffffff">&gt; list = </tspan><tspan fill="#7ec8e3" font-weight="600">new</tspan><tspan fill="#ffffff"> ArrayList&lt;&gt;();</tspan></text>
  <text x="476" y="147" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">list.add(</tspan><tspan fill="#ce9178">"hello"</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="476" y="167" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// list.add(42); 컴파일 오류!</tspan></text>
  <text x="476" y="187" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">String</tspan><tspan fill="#ffffff"> s = list.get(</tspan><tspan fill="#b5cea8">0</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="476" y="207" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">// 캐스팅 불필요, 타입 안전</text>

  <rect x="40" y="231" width="380" height="62" fill="#1a0808" rx="8" stroke="#e05555" stroke-width="1"/>
  <text x="230" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">런타임 ClassCastException 위험</text>
  <text x="230" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">캐스팅 실수를 컴파일러가 잡아주지 않음</text>

  <rect x="460" y="231" width="380" height="62" fill="#081a08" rx="8" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">컴파일 타임 오류 감지</text>
  <text x="650" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">캐스팅 불필요, IDE가 즉시 오류 표시</text>
</svg>
