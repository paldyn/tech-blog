<svg width="1200" height="680" viewBox="0 0 1200 680" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="680" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="app" x1="0" y1="0" x2="900" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563eb"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="420" y2="110" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0284c7"/>
      <stop offset="1" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="form" x1="0" y1="0" x2="270" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0d9488"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <style>
      .title { fill: #e5e7eb; font-family: "Pretendard", "Noto Sans KR", sans-serif; font-size: 36px; font-weight: 700; }
      .subtitle { fill: #cbd5e1; font-family: "Pretendard", "Noto Sans KR", sans-serif; font-size: 18px; font-weight: 500; }
      .boxTitle { fill: #f9fafb; font-family: "Pretendard", "Noto Sans KR", sans-serif; font-size: 30px; font-weight: 700; }
      .boxDesc { fill: #e2e8f0; font-family: "Pretendard", "Noto Sans KR", sans-serif; font-size: 20px; font-weight: 600; }
      .small { fill: #bfdbfe; font-family: "Pretendard", "Noto Sans KR", sans-serif; font-size: 16px; font-weight: 500; }
      .link { fill: #94a3b8; font-family: "JetBrains Mono", monospace; font-size: 12px; text-anchor: middle; }
      .link-right { text-anchor: start; }
    </style>
  </defs>

  <rect width="1200" height="680" fill="url(#bg)"/>

  <text x="56" y="76" class="title">Nexacro Structure: Application / Frame / Form</text>
  <text x="56" y="110" class="subtitle">전역 설정부터 실제 화면까지, 책임을 나누면 유지보수가 쉬워진다</text>

  <rect x="150" y="148" width="900" height="120" rx="20" fill="url(#app)"/>
  <text x="190" y="200" class="boxTitle">Application</text>
  <text x="190" y="236" class="boxDesc">앱 전역 설정, 서비스 URL, 공통 라이브러리 초기화</text>
  <text x="770" y="236" class="small">app.xadl / Environment</text>

  <rect x="150" y="330" width="430" height="110" rx="18" fill="url(#frame)"/>
  <text x="182" y="374" class="boxTitle">MainFrame</text>
  <text x="182" y="406" class="small">전체 레이아웃, 메뉴/헤더/워크영역</text>

  <rect x="620" y="330" width="430" height="110" rx="18" fill="url(#frame)"/>
  <text x="652" y="374" class="boxTitle">ChildFrame</text>
  <text x="652" y="406" class="small">팝업/서브 화면 컨테이너</text>

  <rect x="80" y="500" width="250" height="110" rx="16" fill="url(#form)"/>
  <text x="112" y="545" class="boxDesc">Form: 검색</text>
  <text x="112" y="575" class="small">조건 입력/조회</text>

  <rect x="350" y="500" width="250" height="110" rx="16" fill="url(#form)"/>
  <text x="382" y="545" class="boxDesc">Form: 목록</text>
  <text x="382" y="575" class="small">Grid + Dataset</text>

  <rect x="620" y="500" width="250" height="110" rx="16" fill="url(#form)"/>
  <text x="652" y="545" class="boxDesc">Form: 상세</text>
  <text x="652" y="575" class="small">입력/검증/저장</text>

  <rect x="890" y="500" width="250" height="110" rx="16" fill="url(#form)"/>
  <text x="922" y="545" class="boxDesc">Form: 팝업</text>
  <text x="922" y="575" class="small">선택/확인/콜백</text>

  <path d="M600 268 V320" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="664" y="292" class="link">layout control</text>

  <path d="M365 440 V490" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M835 440 V490" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="382" y="468" class="link link-right">contains forms</text>
  <text x="852" y="468" class="link link-right">contains forms</text>
</svg>
