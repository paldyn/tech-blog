<svg xmlns="http://www.w3.org/2000/svg" width="880" height="300" viewBox="0 0 880 300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="300" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">커버리지 측정 워크플로우</text>

  <defs>
    <marker id="arr7" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="60" y="100" width="220" height="72" rx="6" fill="#101622" stroke="#7777cc" stroke-width="1"/>
  <text x="170" y="132" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">측정하며 실행</text>
  <text x="170" y="154" font-size="12" fill="#888" text-anchor="middle">coverage run -m pytest</text>

  <rect x="330" y="100" width="220" height="72" rx="6" fill="#101622" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="132" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">요약 보고</text>
  <text x="440" y="154" font-size="12" fill="#888" text-anchor="middle">coverage report</text>

  <rect x="600" y="100" width="220" height="72" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="710" y="132" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">HTML 시각화</text>
  <text x="710" y="154" font-size="12" fill="#888" text-anchor="middle">coverage html</text>

  <line x1="280" y1="136" x2="324" y2="136" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr7)"/>
  <line x1="550" y1="136" x2="594" y2="136" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr7)"/>

  <text x="60" y="222" font-size="13" fill="#888" xml:space="preserve">pytest-cov 플러그인을 쓰면 pytest --cov=mypkg 한 줄로 측정과 보고를 동시에 한다.</text>
  <text x="60" y="252" font-size="13" fill="#888" xml:space="preserve">높은 숫자가 목표가 아니라, 빠진 곳을 찾아 의미 있는 테스트를 더하는 도구다.</text>
</svg>
