<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">행 추가·수정·삭제 코드 패턴</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">그리드 연동 CRUD 최소 패턴</text>

  <!-- Code block -->
  <rect x="60" y="88" width="760" height="256" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>

  <text xml:space="preserve" x="76" y="115" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">// 행 추가</text>
  <text xml:space="preserve" x="76" y="133" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#7ec8e3">var</tspan> r = ds.addRow();</text>
  <text xml:space="preserve" x="76" y="151" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">ds.setColumn(r, <tspan fill="#ce9178">"EMP_CD"</tspan>, <tspan fill="#ce9178">"E005"</tspan>);</text>
  <text xml:space="preserve" x="76" y="169" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">ds.setColumn(r, <tspan fill="#ce9178">"EMP_NM"</tspan>, <tspan fill="#ce9178">"신입사원"</tspan>);</text>
  <!-- blank -->
  <text xml:space="preserve" x="76" y="205" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">// 수정 — currentrow 이용</text>
  <text xml:space="preserve" x="76" y="223" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#7ec8e3">var</tspan> i = ds.currentrow;</text>
  <text xml:space="preserve" x="76" y="241" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8">ds.setColumn(i, <tspan fill="#ce9178">"EMP_NM"</tspan>, <tspan fill="#ce9178">"홍길동"</tspan>);</text>
  <!-- blank -->
  <text xml:space="preserve" x="76" y="277" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#6a8aa0">// 삭제 — 선택 행 삭제</text>
  <text xml:space="preserve" x="76" y="295" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#7ec8e3">var</tspan> sel = ds.currentrow;</text>
  <text xml:space="preserve" x="76" y="313" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e8e8e8"><tspan fill="#7ec8e3">if</tspan> (sel >= <tspan fill="#b5cea8">0</tspan>) ds.deleteRow(sel);</text>

  <!-- Note -->
  <text x="440" y="360" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">addRow()는 마지막 행 뒤에 추가하고 새 행 인덱스를 반환합니다</text>
</svg>
