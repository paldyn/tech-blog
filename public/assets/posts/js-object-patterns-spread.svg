<svg height="480" width="880" viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>text { font-family: 'Wanted Sans Variable', 'Wanted Sans', -apple-system, sans-serif; }</style>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#444"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="40" fill="#e8e8e8" font-size="18" font-weight="600" text-anchor="middle">객체 유틸리티 메서드 — 순회와 변환</text>
  <line x1="40" y1="54" x2="840" y2="54" stroke="#1e1e1e" stroke-width="1"/>

  <!-- Object.keys/values/entries -->
  <text x="40" y="80" fill="#555" font-size="11">객체 순회의 세 가지 뷰</text>

  <rect x="20" y="88" width="840" height="52" fill="#111" rx="6"/>
  <text x="36" y="108" fill="#555" font-size="11" font-family="monospace, 'Courier New'">const user = { name: '지수', age: 28, role: 'dev' }</text>
  <text x="36" y="128" fill="#555" font-size="11" font-family="monospace, 'Courier New'">Object.keys(user)    // ['name', 'age', 'role']      — 키 배열</text>

  <!-- Three views -->
  <rect x="20" y="152" width="268" height="90" fill="#111" rx="6"/>
  <text x="154" y="172" fill="#7dd3fc" font-size="11" font-weight="600" text-anchor="middle">Object.keys(obj)</text>
  <rect x="36" y="180" width="236" height="48" fill="#0d0d0d" rx="4"/>
  <text x="48" y="198" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">['name', 'age', 'role']</text>
  <text x="48" y="218" fill="#555" font-size="10" font-family="monospace, 'Courier New'">// 키(string[]) 반환</text>

  <rect x="306" y="152" width="268" height="90" fill="#111" rx="6"/>
  <text x="440" y="172" fill="#86efac" font-size="11" font-weight="600" text-anchor="middle">Object.values(obj)</text>
  <rect x="322" y="180" width="236" height="48" fill="#0d0d0d" rx="4"/>
  <text x="334" y="198" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">['지수', 28, 'dev']</text>
  <text x="334" y="218" fill="#555" font-size="10" font-family="monospace, 'Courier New'">// 값(any[]) 반환</text>

  <rect x="592" y="152" width="268" height="90" fill="#111" rx="6"/>
  <text x="726" y="172" fill="#fbbf24" font-size="11" font-weight="600" text-anchor="middle">Object.entries(obj)</text>
  <rect x="608" y="180" width="236" height="48" fill="#0d0d0d" rx="4"/>
  <text x="620" y="198" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">[['name','지수'], ...]</text>
  <text x="620" y="218" fill="#555" font-size="10" font-family="monospace, 'Courier New'">// [key, value][] 반환</text>

  <!-- fromEntries -->
  <text x="40" y="265" fill="#555" font-size="11">entries → 변환 → fromEntries 패턴</text>

  <rect x="20" y="273" width="840" height="80" fill="#111" rx="6"/>
  <rect x="36" y="284" width="808" height="58" fill="#0d0d0d" rx="4"/>
  <text x="48" y="302" fill="#555" font-size="11" font-family="monospace, 'Courier New'">// 객체의 모든 값을 변환 — map은 배열에만, 객체엔 이 패턴</text>
  <text x="48" y="320" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">const doubled = Object.<tspan fill="#fbbf24">fromEntries</tspan>(</text>
  <text x="48" y="338" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">  Object.<tspan fill="#fbbf24">entries</tspan>(prices).map(([key, val]) =&gt; [key, val * 2]))</text>

  <!-- Object.assign vs spread -->
  <text x="40" y="376" fill="#555" font-size="11">Object.assign vs 스프레드</text>
  <line x1="40" y1="382" x2="840" y2="382" stroke="#1a1a1a" stroke-width="1"/>

  <rect x="20" y="390" width="415" height="68" fill="#111" rx="6"/>
  <text x="36" y="410" fill="#888" font-size="11">Object.assign(target, source)</text>
  <rect x="36" y="418" width="383" height="30" fill="#0d0d0d" rx="4"/>
  <text x="48" y="437" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">Object.assign({}, defaults, config)   // target 변이</text>

  <rect x="445" y="390" width="415" height="68" fill="#111" rx="6"/>
  <text x="461" y="410" fill="#888" font-size="11">객체 스프레드 (ES2018 권장)</text>
  <rect x="461" y="418" width="383" height="30" fill="#0d0d0d" rx="4"/>
  <text x="473" y="437" fill="#e8e8e8" font-size="11" font-family="monospace, 'Courier New'">const cfg = { ...defaults, ...config }  // 새 객체</text>

  <text x="440" y="472" fill="#444" font-size="10" text-anchor="middle">스프레드는 항상 새 객체 생성 — assign은 첫 인자(target)를 직접 변경하므로 {}를 첫 인자로 줘야 불변</text>
</svg>
