<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">package.json 주요 스크립트</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">개발부터 프로덕션 배포까지 사용되는 명령어</text>

  <!-- Scripts table -->
  <!-- Header row -->
  <rect x="60" y="90" width="380" height="40" rx="6" fill="#111827" stroke="#3b4a6e" stroke-width="1"/>
  <text x="250" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">스크립트</text>
  <rect x="460" y="90" width="360" height="40" rx="6" fill="#111827" stroke="#3b4a6e" stroke-width="1"/>
  <text x="640" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">설명</text>

  <!-- Row 1 -->
  <rect x="60" y="138" width="380" height="44" rx="4" fill="#0a0f1a" stroke="#1e2d45" stroke-width="1"/>
  <text x="80" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">npm run dev</text>
  <text x="80" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">--turbopack 플래그 포함</text>
  <rect x="460" y="138" width="360" height="44" rx="4" fill="#0a0f1a" stroke="#1e2d45" stroke-width="1"/>
  <text x="480" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">개발 서버 실행 (HMR 활성화)</text>

  <!-- Row 2 -->
  <rect x="60" y="190" width="380" height="44" rx="4" fill="#0a0f1a" stroke="#1e2d45" stroke-width="1"/>
  <text x="80" y="212" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">npm run build</text>
  <text x="80" y="227" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">.next/ 폴더 생성</text>
  <rect x="460" y="190" width="360" height="44" rx="4" fill="#0a0f1a" stroke="#1e2d45" stroke-width="1"/>
  <text x="480" y="217" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">프로덕션 빌드 생성</text>

  <!-- Row 3 -->
  <rect x="60" y="242" width="380" height="44" rx="4" fill="#0a0f1a" stroke="#1e2d45" stroke-width="1"/>
  <text x="80" y="264" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">npm run start</text>
  <text x="80" y="279" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">build 후 실행</text>
  <rect x="460" y="242" width="360" height="44" rx="4" fill="#0a0f1a" stroke="#1e2d45" stroke-width="1"/>
  <text x="480" y="269" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">빌드된 앱 서버로 실행</text>

  <!-- Row 4 -->
  <rect x="60" y="294" width="380" height="44" rx="4" fill="#0a0f1a" stroke="#1e2d45" stroke-width="1"/>
  <text x="80" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">npm run lint</text>
  <rect x="460" y="294" width="360" height="44" rx="4" fill="#0a0f1a" stroke="#1e2d45" stroke-width="1"/>
  <text x="480" y="321" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">ESLint 코드 품질 검사</text>

  <!-- Code snippet -->
  <rect x="60" y="356" width="760" height="48" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve"># 개발 서버 실행 (기본 포트 3000)</text>
  <text x="76" y="395" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">npm</tspan> run dev   <tspan fill="#9aa4b8"># http://localhost:3000</tspan></text>
</svg>
