<svg width="880" height="460" viewBox="0 0 880 460" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="60" y="52" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">docker rmi — 이미지 삭제 명령</text>
  <text x="60" y="76" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">핵심 패턴 및 옵션 정리</text>

  <!-- Code block -->
  <rect x="60" y="100" width="760" height="168" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 태그로 삭제</text>
  <text x="76" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">docker </tspan><tspan fill="#ffffff">rmi nginx:latest</tspan></text>
  <text x="76" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># IMAGE ID (앞 12자)로 삭제</text>
  <text x="76" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">docker </tspan><tspan fill="#ffffff">rmi abc123def456</tspan></text>
  <text x="76" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 여러 이미지 한 번에</text>
  <text x="76" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">docker </tspan><tspan fill="#ffffff">rmi nginx:1.25 redis:7</tspan></text>
  <text x="76" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 강제 삭제 (-f)</text>
  <text x="76" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3">docker </tspan><tspan fill="#ffffff">rmi -f nginx:latest</tspan></text>

  <!-- -f option card -->
  <rect x="60" y="294" width="360" height="136" fill="#0d1117" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="84" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">-f / --force</text>
  <text x="84" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">컨테이너가 사용 중이어도 강제 삭제</text>
  <text x="84" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">먼저 태그를 제거하고, 참조가</text>
  <text x="84" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">없어지면 레이어도 자동 삭제됨</text>
  <text x="84" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">⚠ 실행 중 컨테이너에는 권장 안 함</text>

  <!-- –no-prune option card -->
  <rect x="460" y="294" width="360" height="136" fill="#0d1117" rx="8" stroke="#3a4a6e" stroke-width="1"/>
  <text x="484" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7777cc">--no-prune</text>
  <text x="484" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">중간(부모) 이미지 레이어를 유지</text>
  <text x="484" y="366" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">기본값: 댕글링된 부모 레이어도</text>
  <text x="484" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">함께 삭제됨</text>
  <text x="484" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ 부분 빌드 캐시 보존 시 유용</text>
</svg>
