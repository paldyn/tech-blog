<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">HEAD 관련 명령</text>
  <text x="440" y="72" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">HEAD 확인·이동·detached 복구</text>

  <!-- Left: inspect HEAD -->
  <rect x="60" y="92" width="360" height="140" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="240" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">HEAD 확인</text>
  <text x="76" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#888">  # HEAD 파일 직접 읽기</tspan></text>
  <text x="76" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  cat .git/HEAD</tspan></text>
  <text x="76" y="176" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#888">  # HEAD가 가리키는 commit SHA</tspan></text>
  <text x="76" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">  git rev-parse</tspan><tspan fill="#ffffff"> HEAD</tspan></text>
  <text x="76" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#888">  # 브랜치명 (detached면 오류)</tspan></text>

  <!-- Right: detach and re-attach -->
  <rect x="460" y="92" width="360" height="140" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="640" y="114" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">Detached HEAD 복구</text>
  <text x="476" y="136" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#888">  # detached 상태 진입</tspan></text>
  <text x="476" y="156" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">  git checkout</tspan><tspan fill="#ffffff"> abc123def</tspan></text>
  <text x="476" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#888">  # 브랜치로 복귀</tspan></text>
  <text x="476" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">  git checkout</tspan><tspan fill="#ffffff"> main</tspan></text>
  <text x="476" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#888">  # 새 브랜치로 구제</tspan></text>

  <!-- Bottom: HEAD expressions -->
  <rect x="60" y="248" width="760" height="116" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="440" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">HEAD 상대 표현식</text>
  <text x="76" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  HEAD     </tspan><tspan fill="#888">→ 현재 커밋    </tspan><tspan fill="#ffffff">HEAD~    </tspan><tspan fill="#888">→ 한 칸 위 (=HEAD~1)</tspan></text>
  <text x="76" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  HEAD~2   </tspan><tspan fill="#888">→ 두 칸 위      </tspan><tspan fill="#ffffff">HEAD^    </tspan><tspan fill="#888">→ 첫 번째 부모</tspan></text>
  <text x="76" y="332" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  HEAD^2   </tspan><tspan fill="#888">→ 두 번째 부모  </tspan><tspan fill="#ffffff">HEAD@{1} </tspan><tspan fill="#888">→ reflog 1단계 전</tspan></text>
  <text x="76" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">  HEAD^{tree} </tspan><tspan fill="#888">→ HEAD가 가리키는 tree SHA</tspan></text>
</svg>
