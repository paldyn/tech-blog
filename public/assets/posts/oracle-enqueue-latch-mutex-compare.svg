<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Enqueue · 래치 · 뮤텍스 비교</text>

  <!-- Column headers -->
  <rect x="60" y="66" width="240" height="50" rx="8" fill="#0a1020" stroke="#7ec8e3" stroke-width="2"/>
  <text x="180" y="93" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">Enqueue</text>
  <text x="180" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">사용자 트랜잭션 직렬화</text>

  <rect x="320" y="66" width="240" height="50" rx="8" fill="#1a0f0f" stroke="#e05555" stroke-width="2"/>
  <text x="440" y="93" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#e05555">Latch (래치)</text>
  <text x="440" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">SGA 메모리 구조 보호</text>

  <rect x="580" y="66" width="240" height="50" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="2"/>
  <text x="700" y="93" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">Mutex (뮤텍스)</text>
  <text x="700" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">커서·SQL 핀 경량화</text>

  <!-- Row: 대기 방식 -->
  <text x="33" y="155" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" transform="rotate(-90,33,175)">특성</text>

  <rect x="60" y="130" width="240" height="44" rx="4" fill="#0d1828" stroke="#222"/>
  <text x="180" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">대기 방식</text>
  <text x="180" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">OS sleep (큐 대기)</text>

  <rect x="320" y="130" width="240" height="44" rx="4" fill="#1a1010" stroke="#222"/>
  <text x="440" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">대기 방식</text>
  <text x="440" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Spin → OS sleep</text>

  <rect x="580" y="130" width="240" height="44" rx="4" fill="#0f180f" stroke="#222"/>
  <text x="700" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">대기 방식</text>
  <text x="700" y="166" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Spin → OS sleep (경량)</text>

  <!-- Row: 보호 대상 -->
  <rect x="60" y="186" width="240" height="44" rx="4" fill="#0d1828" stroke="#222"/>
  <text x="180" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">보호 대상</text>
  <text x="180" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">행·테이블·시퀀스 등</text>

  <rect x="320" y="186" width="240" height="44" rx="4" fill="#1a1010" stroke="#222"/>
  <text x="440" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">보호 대상</text>
  <text x="440" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Buffer Cache·Shared Pool 등</text>

  <rect x="580" y="186" width="240" height="44" rx="4" fill="#0f180f" stroke="#222"/>
  <text x="700" y="204" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">보호 대상</text>
  <text x="700" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Library Cache 커서·SQL 핀</text>

  <!-- Row: 경합 지표 -->
  <rect x="60" y="242" width="240" height="44" rx="4" fill="#0d1828" stroke="#222"/>
  <text x="180" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">경합 지표</text>
  <text x="180" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">v$lock, v$session_wait</text>

  <rect x="320" y="242" width="240" height="44" rx="4" fill="#1a1010" stroke="#222"/>
  <text x="440" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">경합 지표</text>
  <text x="440" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">v$latch, v$latch_children</text>

  <rect x="580" y="242" width="240" height="44" rx="4" fill="#0f180f" stroke="#222"/>
  <text x="700" y="260" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">경합 지표</text>
  <text x="700" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">v$mutex_sleep</text>

  <!-- Row: 대표 wait event -->
  <rect x="60" y="298" width="240" height="56" rx="4" fill="#0d1828" stroke="#222"/>
  <text x="180" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">대표 Wait Event</text>
  <text x="180" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">enq: TX - row lock</text>
  <text x="180" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">enq: TM - contention</text>

  <rect x="320" y="298" width="240" height="56" rx="4" fill="#1a1010" stroke="#222"/>
  <text x="440" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">대표 Wait Event</text>
  <text x="440" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">latch: cache buffers chains</text>
  <text x="440" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">latch: shared pool</text>

  <rect x="580" y="298" width="240" height="56" rx="4" fill="#0f180f" stroke="#222"/>
  <text x="700" y="316" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">대표 Wait Event</text>
  <text x="700" y="336" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">cursor: pin S wait on X</text>
  <text x="700" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">cursor: mutex X</text>

  <!-- Note -->
  <rect x="60" y="376" width="760" height="100" rx="8" fill="#111" stroke="#333"/>
  <text x="440" y="400" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">핵심 구분점</text>
  <text x="440" y="422" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Enqueue: SQL/사용자가 인식하는 잠금 — 트랜잭션 종료 시 해제</text>
  <text x="440" y="442" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">래치: 내부 메모리 보호 — 짧은 시간 보유, 비재진입, Spin 방식</text>
  <text x="440" y="462" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">뮤텍스: 래치 개선형 — 더 세밀한 범위, 메모리 효율 우수</text>
</svg>
