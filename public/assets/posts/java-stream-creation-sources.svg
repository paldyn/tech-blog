<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Stream 생성 방법 전체 정리</text>

  <!-- Row 1: Collection & Array -->
  <rect x="60" y="68" width="360" height="110" fill="#0f1f30" rx="8" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">컬렉션 · 배열</text>
  <text x="80" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">list.stream()              ArrayList, LinkedList 등</text>
  <text x="80" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">list.parallelStream()      병렬 스트림</text>
  <text x="80" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Arrays.stream(arr)         배열 → IntStream/Stream</text>
  <text x="80" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Arrays.stream(arr, from, to)  범위 스트림</text>

  <!-- Row 1: Static factories -->
  <rect x="460" y="68" width="360" height="110" fill="#0f2010" rx="8" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="90" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">정적 팩토리</text>
  <text x="480" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Stream.of("a","b","c")      원소 나열</text>
  <text x="480" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Stream.empty()              빈 스트림</text>
  <text x="480" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Stream.ofNullable(val)      null → 빈 스트림 (Java 9)</text>
  <text x="480" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">IntStream.range/rangeClosed  정수 범위</text>

  <!-- Row 2: iterate & generate -->
  <rect x="60" y="198" width="360" height="110" fill="#201020" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">무한 스트림 생성</text>
  <text x="80" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Stream.iterate(seed, f)          Java 8: 무한</text>
  <text x="80" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Stream.iterate(seed, pred, f)    Java 9: 종료 조건 추가</text>
  <text x="80" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Stream.generate(Supplier)        반복 공급 (Supplier)</text>
  <text x="80" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">limit(n) 필수 — 무한 소비 주의</text>

  <!-- Row 2: I/O & String -->
  <rect x="460" y="198" width="360" height="110" fill="#1a1500" rx="8" stroke="#e0b555" stroke-width="1.5"/>
  <text x="640" y="220" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e0b555">I/O · 문자열</text>
  <text x="480" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Files.lines(path)               파일 → 줄별 Stream</text>
  <text x="480" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Files.list(dir)                 디렉토리 → 경로 Stream</text>
  <text x="480" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Pattern.splitAsStream(str)      정규식 분할</text>
  <text x="480" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">str.chars()                     IntStream(코드포인트)</text>

  <!-- Row 3: Builder & concat -->
  <rect x="60" y="328" width="360" height="96" fill="#0a1520" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="240" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">Builder · concat</text>
  <text x="80" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Stream.Builder&lt;T&gt; → build()      동적 추가 후 생성</text>
  <text x="80" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">Stream.concat(a, b)              두 스트림 이어붙이기</text>
  <text x="80" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">flatMap이 concat보다 다중 스트림에 적합</text>

  <!-- Row 3: Random & Optional -->
  <rect x="460" y="328" width="360" height="96" fill="#1a1020" rx="8" stroke="#7777cc" stroke-width="1.5"/>
  <text x="640" y="350" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">Random · Optional</text>
  <text x="480" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">new Random().ints(n)            무작위 int 스트림</text>
  <text x="480" y="394" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">new Random().ints(n, lo, hi)    범위 내 무작위</text>
  <text x="480" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">optional.stream()               0개 또는 1개 Stream (Java 9)</text>

  <!-- Bottom note -->
  <text x="440" y="446" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">Files.lines/list → try-with-resources 또는 명시적 close() 필요 (AutoCloseable)</text>
  <text x="440" y="464" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">Stream.iterate/generate 무한 스트림 → limit() 또는 종료 조건 없으면 무한 루프</text>
</svg>
