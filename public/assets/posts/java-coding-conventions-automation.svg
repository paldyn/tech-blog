<svg xmlns="http://www.w3.org/2000/svg" width="880" height="290" viewBox="0 0 880 290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="290" rx="12" fill="#0a0a0a"/>
  <text x="60" y="46" font-size="22" font-weight="700" fill="#e8e8e8">컨벤션은 도구가 강제한다</text>
  <text x="60" y="72" font-size="13" fill="#888">사람의 기억이 아니라 자동화 계층으로 일관성을 지킨다</text>

  <defs>
    <marker id="cc-arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888"/>
    </marker>
  </defs>

  <rect x="60" y="110" width="165" height="104" rx="6" fill="#14142a" stroke="#7777cc" stroke-width="1"/>
  <text x="142" y="142" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">에디터 통일</text>
  <text x="142" y="166" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7777cc" text-anchor="middle">.editorconfig</text>
  <text x="142" y="190" font-size="12" fill="#9aa4b8" text-anchor="middle">타이핑하는 순간</text>

  <rect x="258" y="110" width="165" height="104" rx="6" fill="#14240f" stroke="#55c555" stroke-width="1"/>
  <text x="340" y="142" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">자동 포맷</text>
  <text x="340" y="166" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#55c555" text-anchor="middle">Spotless</text>
  <text x="340" y="190" font-size="12" fill="#9aa4b8" text-anchor="middle">저장 · 빌드 시</text>

  <rect x="456" y="110" width="165" height="104" rx="6" fill="#2a2010" stroke="#e0a055" stroke-width="1"/>
  <text x="538" y="142" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">정적 검사</text>
  <text x="538" y="166" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#e0a055" text-anchor="middle">Checkstyle · PMD</text>
  <text x="538" y="190" font-size="12" fill="#9aa4b8" text-anchor="middle">빌드 시 위반 차단</text>

  <rect x="654" y="110" width="165" height="104" rx="6" fill="#12203a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="736" y="142" font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">CI 게이트</text>
  <text x="736" y="166" font-size="12" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#7ec8e3" text-anchor="middle">파이프라인</text>
  <text x="736" y="190" font-size="12" fill="#9aa4b8" text-anchor="middle">위반 시 머지 차단</text>

  <line x1="229" y1="162" x2="254" y2="162" stroke="#888" stroke-width="2" marker-end="url(#cc-arr)"/>
  <line x1="427" y1="162" x2="452" y2="162" stroke="#888" stroke-width="2" marker-end="url(#cc-arr)"/>
  <line x1="625" y1="162" x2="650" y2="162" stroke="#888" stroke-width="2" marker-end="url(#cc-arr)"/>

  <text x="440" y="256" font-size="13" fill="#888" text-anchor="middle">왼쪽으로 갈수록 피드백이 빠르고, 오른쪽일수록 최후의 방어선이다</text>
</svg>
