<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Path vs File — 구식 API와 현대 API 비교</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">java.io.File (Java 1) vs java.nio.file.Path (Java 7)</text>

  <!-- Header -->
  <rect x="60" y="90" width="240" height="40" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1"/>
  <text x="180" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">항목</text>

  <rect x="310" y="90" width="240" height="40" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1"/>
  <text x="430" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">java.io.File (구식)</text>

  <rect x="560" y="90" width="260" height="40" rx="6" fill="#101810" stroke="#55c555" stroke-width="1.5"/>
  <text x="690" y="115" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">java.nio.file.Path (현대, 권장)</text>

  <!-- Rows -->
  <!-- Row: 삭제 -->
  <rect x="60" y="140" width="240" height="36" rx="4" fill="#101010" stroke="#2a2a3a" stroke-width="1"/>
  <text x="180" y="163" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">파일 삭제</text>
  <rect x="310" y="140" width="240" height="36" rx="4" fill="#150a0a" stroke="#2a2a3a" stroke-width="1"/>
  <text x="430" y="163" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">file.delete() → false 반환 (이유 모름)</text>
  <rect x="560" y="140" width="260" height="36" rx="4" fill="#0a1208" stroke="#2a2a3a" stroke-width="1"/>
  <text x="690" y="163" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">Files.delete(path) → IOException 명시</text>

  <!-- Row: 존재 확인 -->
  <rect x="60" y="184" width="240" height="36" rx="4" fill="#101010" stroke="#2a2a3a" stroke-width="1"/>
  <text x="180" y="207" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">존재 확인</text>
  <rect x="310" y="184" width="240" height="36" rx="4" fill="#150a0a" stroke="#2a2a3a" stroke-width="1"/>
  <text x="430" y="207" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">file.exists() (심볼릭 링크 미추적)</text>
  <rect x="560" y="184" width="260" height="36" rx="4" fill="#0a1208" stroke="#2a2a3a" stroke-width="1"/>
  <text x="690" y="207" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">Files.exists(path, LinkOption...)</text>

  <!-- Row: 경로 결합 -->
  <rect x="60" y="228" width="240" height="36" rx="4" fill="#101010" stroke="#2a2a3a" stroke-width="1"/>
  <text x="180" y="251" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">경로 결합</text>
  <rect x="310" y="228" width="240" height="36" rx="4" fill="#150a0a" stroke="#2a2a3a" stroke-width="1"/>
  <text x="430" y="251" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">new File(parent, "child") (비직관)</text>
  <rect x="560" y="228" width="260" height="36" rx="4" fill="#0a1208" stroke="#2a2a3a" stroke-width="1"/>
  <text x="690" y="251" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">path.resolve("child") (직관적)</text>

  <!-- Row: 파일명 -->
  <rect x="60" y="272" width="240" height="36" rx="4" fill="#101010" stroke="#2a2a3a" stroke-width="1"/>
  <text x="180" y="295" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">파일명/부모</text>
  <rect x="310" y="272" width="240" height="36" rx="4" fill="#150a0a" stroke="#2a2a3a" stroke-width="1"/>
  <text x="430" y="295" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">file.getName(), getParent()</text>
  <rect x="560" y="272" width="260" height="36" rx="4" fill="#0a1208" stroke="#2a2a3a" stroke-width="1"/>
  <text x="690" y="295" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">path.getFileName(), getParent()</text>

  <!-- Row: 오류 처리 -->
  <rect x="60" y="316" width="240" height="36" rx="4" fill="#101010" stroke="#2a2a3a" stroke-width="1"/>
  <text x="180" y="339" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">오류 처리</text>
  <rect x="310" y="316" width="240" height="36" rx="4" fill="#150a0a" stroke="#2a2a3a" stroke-width="1"/>
  <text x="430" y="339" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">boolean 반환 (이유 불명확)</text>
  <rect x="560" y="316" width="260" height="36" rx="4" fill="#0a1208" stroke="#2a2a3a" stroke-width="1"/>
  <text x="690" y="339" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">IOException 명시 (원인 파악 가능)</text>

  <!-- Migration note -->
  <rect x="60" y="370" width="760" height="70" rx="8" fill="#101020" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="393" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">레거시 File을 Path로 변환</text>
  <text x="440" y="413" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">File → Path: file.toPath()   |   Path → File: path.toFile()</text>
  <text x="440" y="431" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">기존 API가 File을 요구하는 경우 toFile()로 변환. 신규 코드는 항상 Path 사용</text>
</svg>
