<svg xmlns="http://www.w3.org/2000/svg" width="880" height="350" viewBox="0 0 880 350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="350" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">async 제너레이터와 for await...of</text>
  <text x="60" y="78" font-size="13" fill="#888">yield하는 값의 타입이 루프 변수까지 그대로 전달된다</text>

  <defs>
    <marker id="arrA" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect x="60" y="120" width="250" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="185" y="150" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">async function*</text>
  <text x="185" y="184" font-size="13" fill="#ffffff" text-anchor="middle">yield page</text>
  <text x="185" y="212" font-size="13" fill="#9aa4b8" text-anchor="middle">page: Item[]</text>

  <rect x="370" y="110" width="220" height="140" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="480" y="142" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">AsyncGenerator</text>
  <text x="480" y="172" font-size="13" fill="#ffffff" text-anchor="middle">&lt;Item[]&gt;</text>
  <text x="480" y="200" font-size="13" fill="#9aa4b8" text-anchor="middle">반환 타입</text>
  <text x="480" y="222" font-size="13" fill="#9aa4b8" text-anchor="middle">(자동 추론)</text>

  <rect x="650" y="120" width="170" height="120" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="735" y="150" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">for await</text>
  <text x="735" y="182" font-size="13" fill="#ffffff" text-anchor="middle">(const p of g)</text>
  <text x="735" y="210" font-size="13" fill="#9aa4b8" text-anchor="middle">p: Item[]</text>

  <line x1="310" y1="180" x2="368" y2="180" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrA)"/>
  <line x1="590" y1="180" x2="648" y2="180" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrA)"/>

  <text x="60" y="300" font-size="13" fill="#ffffff">각 yield는 await을 거쳐 한 번에 하나씩 흘러나오고, 루프가 자동으로 다음 값을 기다린다.</text>
</svg>
