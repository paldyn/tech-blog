<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440"
     style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">JIT 컴파일 — 왜 JavaScript가 빠른가</text>

  <!-- Left: Pure Interpreter -->
  <rect x="60" y="72" width="360" height="270" rx="10" fill="#0d1117" stroke="#555" stroke-width="1.5"/>
  <text x="240" y="100" text-anchor="middle" font-size="15" font-weight="700" fill="#888">순수 인터프리터 방식</text>
  <text x="240" y="120" text-anchor="middle" font-size="12" fill="#555">(초기 JavaScript 엔진)</text>

  <rect x="80" y="134" width="320" height="188" rx="6" fill="#070b14" stroke="#1e2433"/>
  <!-- Loop code -->
  <text x="96" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">for</text>
  <text x="120" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> (let i = </text>
  <text x="202" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">0</text>
  <text x="210" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">; i &lt; </text>
  <text x="258" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">1000000</text>
  <text x="330" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">; i++) {</text>
  <text x="96" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">  sum += i;</text>
  <text x="96" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">}</text>
  <text x="96" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// 매 반복마다:</text>
  <text x="96" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#555" xml:space="preserve">// 1. 바이트코드 읽기</text>
  <text x="96" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#555" xml:space="preserve">// 2. 타입 확인</text>
  <text x="96" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#555" xml:space="preserve">// 3. 연산 수행  ← 100만 번 반복</text>
  <text x="96" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e05555" xml:space="preserve">// 느리다!</text>

  <!-- Right: JIT -->
  <rect x="460" y="72" width="360" height="270" rx="10" fill="#0d1117" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="100" text-anchor="middle" font-size="15" font-weight="700" fill="#55c555">JIT 컴파일 방식</text>
  <text x="640" y="120" text-anchor="middle" font-size="12" fill="#888">(V8 TurboFan)</text>

  <rect x="480" y="134" width="320" height="188" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="496" y="154" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// 처음 몇 번 → 프로파일링</text>
  <text x="496" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// "i는 항상 정수, sum도 정수"</text>
  <text x="496" y="198" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// TurboFan이 기계어로 컴파일:</text>
  <text x="496" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">ADD</text>
  <text x="526" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> EAX, </text>
  <text x="582" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">1</text>
  <text x="590" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">  ; i++</text>
  <text x="496" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">ADD</text>
  <text x="526" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> EBX, EAX</text>
  <text x="640" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">; sum</text>
  <text x="496" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve">// CPU가 직접 실행 → 초고속</text>
  <text x="496" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">// C에 근접한 성능!</text>

  <!-- Center arrow -->
  <polygon points="422,195 444,182 444,190 456,190 456,200 444,200 444,208" fill="#7777cc" stroke="#0a0a0a" stroke-width="1.5" stroke-linejoin="round"/>
  <text x="440" y="220" text-anchor="middle" font-size="11" fill="#7777cc">JIT</text>

  <!-- Bottom: Key insight -->
  <rect x="60" y="362" width="760" height="54" rx="8" fill="#0d1117" stroke="#333"/>
  <text x="440" y="384" text-anchor="middle" font-size="13" font-weight="600" fill="#e8e8e8">JIT의 핵심 — "뜨거운(Hot)" 코드만 컴파일한다</text>
  <text x="440" y="404" text-anchor="middle" font-size="12" fill="#888">자주 실행되는 함수 → 기계어로 컴파일 · 드물게 실행되는 코드 → 인터프리터로 실행</text>
  <text x="440" y="420" text-anchor="middle" font-size="11" fill="#555">타입 가정이 깨지면(deopt) 다시 인터프리터로 폴백 → 일관된 타입 유지가 성능에 중요</text>

  <!-- Footer -->
  <text x="440" y="432" text-anchor="middle" font-size="11" fill="#444">PALDYN · JavaScript 완전 정복 시리즈 #3</text>
</svg>
