<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr1" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">의존성 공급망 공격 경로</text>

  <!-- npm registry box -->
  <rect x="60" y="80" width="200" height="60" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="160" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">npm registry</text>
  <text x="160" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">공개 패키지 저장소</text>

  <!-- Attacker malicious pkg -->
  <rect x="320" y="80" width="200" height="60" rx="8" fill="#2d0000" stroke="#e05555" stroke-width="1.5"/>
  <text x="420" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">악성 패키지 삽입</text>
  <text x="420" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">타이포스쿼팅 / 하이재킹</text>

  <!-- Your project -->
  <rect x="580" y="80" width="200" height="60" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="680" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">npm install</text>
  <text x="680" y="128" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">프로젝트에 설치</text>

  <!-- Arrows top row -->
  <line x1="260" y1="110" x2="318" y2="110" stroke="#e05555" stroke-width="2" marker-end="url(#arr1)"/>
  <line x1="520" y1="110" x2="578" y2="110" stroke="#e05555" stroke-width="2" marker-end="url(#arr1)"/>

  <!-- Attack types -->
  <text x="440" y="185" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">주요 공격 유형</text>

  <!-- Attack boxes -->
  <rect x="60" y="205" width="168" height="72" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="144" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">타이포스쿼팅</text>
  <text x="144" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">lodash → 1odash</text>
  <text x="144" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">오타 노린 패키지</text>

  <rect x="248" y="205" width="168" height="72" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="332" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">계정 하이재킹</text>
  <text x="332" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">관리자 토큰 탈취 →</text>
  <text x="332" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">악성 버전 배포</text>

  <rect x="436" y="205" width="168" height="72" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="520" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">의존성 혼동</text>
  <text x="520" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">내부 패키지명과 동일한</text>
  <text x="520" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">공개 패키지 등록</text>

  <rect x="624" y="205" width="168" height="72" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="708" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">postinstall 스크립트</text>
  <text x="708" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">install 시 자동 실행</text>
  <text x="708" y="264" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">악성 코드 삽입</text>

  <!-- Defense section -->
  <text x="440" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#e8e8e8" text-anchor="middle">방어 도구</text>

  <rect x="60" y="338" width="220" height="60" rx="8" fill="#001a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="170" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">npm audit</text>
  <text x="170" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">알려진 CVE 스캔</text>

  <rect x="310" y="338" width="220" height="60" rx="8" fill="#001a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="420" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">lockfile 검증</text>
  <text x="420" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">package-lock.json 무결성</text>

  <rect x="560" y="338" width="220" height="60" rx="8" fill="#001a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="670" y="362" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Socket / Snyk</text>
  <text x="670" y="382" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">동작 기반 정적 분석</text>

  <!-- CI pipeline box -->
  <rect x="160" y="430" width="520" height="56" rx="8" fill="#0a0a1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="420" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">CI 파이프라인 통합</text>
  <text x="420" y="474" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">PR마다 npm audit --audit-level=high → 빌드 차단</text>
</svg>
