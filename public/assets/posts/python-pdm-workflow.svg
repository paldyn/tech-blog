<svg xmlns="http://www.w3.org/2000/svg" width="880" height="280" viewBox="0 0 880 280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="280" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">PDM 기본 명령</text>

  <rect x="60" y="86" width="760" height="170" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="76" y="118" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">pdm <tspan fill="#7ec8e3" font-weight="600">init</tspan>             <tspan fill="#9aa4b8"># pyproject.toml 생성</tspan></text>
  <text xml:space="preserve" x="76" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">pdm <tspan fill="#7ec8e3" font-weight="600">add</tspan> requests     <tspan fill="#9aa4b8"># 의존성 추가 + 잠금</tspan></text>
  <text xml:space="preserve" x="76" y="166" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">pdm <tspan fill="#7ec8e3" font-weight="600">install</tspan>          <tspan fill="#9aa4b8"># pdm.lock 기준 동기화</tspan></text>
  <text xml:space="preserve" x="76" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">pdm <tspan fill="#7ec8e3" font-weight="600">run</tspan> python app.py <tspan fill="#9aa4b8"># 프로젝트 환경에서 실행</tspan></text>
  <text xml:space="preserve" x="76" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">pdm <tspan fill="#7ec8e3" font-weight="600">update</tspan>           <tspan fill="#9aa4b8"># 허용 범위 내 최신화</tspan></text>
</svg>
