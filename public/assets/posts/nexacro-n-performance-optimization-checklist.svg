<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">성능 측정 & 프로파일링 도구</text>

  <!-- Nexacro Trace -->
  <rect x="60" y="72" width="360" height="140" rx="8" fill="#0d1523" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Nexacro Studio Trace</text>
  <text x="80" y="120" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">▪ trace() 함수로 실행 시간 측정</text>
  <text x="80" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">▪ Nexacro Studio Output 창에서 확인</text>
  <text x="80" y="156" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">▪ 트랜잭션 응답 시간 실시간 모니터링</text>
  <text x="80" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">▪ 네트워크 패킷 크기 확인 가능</text>
  <text x="80" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">▪ 트레이스 레벨 1~3으로 세분화</text>

  <!-- Code for trace -->
  <rect x="440" y="72" width="400" height="140" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="460" y="94" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 실행 시간 측정 패턴</text>
  <text x="460" y="114" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">var</tspan>
    <tspan fill="#ffffff"> t0 = </tspan>
    <tspan fill="#7ec8e3" font-weight="600">new</tspan>
    <tspan fill="#ffffff"> Date().getTime();</tspan>
  </text>
  <text x="460" y="134" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// ... 측정 대상 로직 ...</text>
  <text x="460" y="154" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">var</tspan>
    <tspan fill="#ffffff"> elapsed = </tspan>
    <tspan fill="#7ec8e3" font-weight="600">new</tspan>
    <tspan fill="#ffffff"> Date().getTime()-t0;</tspan>
  </text>
  <text x="460" y="174" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">trace(</tspan>
    <tspan fill="#ce9178">"처리시간: "</tspan>
    <tspan fill="#ffffff"> + elapsed + </tspan>
    <tspan fill="#ce9178">"ms"</tspan>
    <tspan fill="#ffffff">);</tspan>
  </text>
  <text x="460" y="194" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 배포 빌드에서 trace 비활성화</text>

  <!-- Browser DevTools -->
  <rect x="60" y="232" width="360" height="160" rx="8" fill="#0d1523" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="240" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">브라우저 DevTools</text>
  <text x="80" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">▪ Performance 탭: 프레임 드롭 분석</text>
  <text x="80" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">▪ Memory 탭: 힙 스냅샷으로 누수 탐지</text>
  <text x="80" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">▪ Network 탭: 트랜잭션 응답 시간</text>
  <text x="80" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">▪ console.time() / timeEnd() 활용</text>
  <text x="80" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">▪ Layers 패널: 렌더링 레이어 확인</text>
  <text x="80" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">▪ HTML5 런타임에서만 사용 가능</text>

  <!-- Checklist -->
  <rect x="440" y="232" width="400" height="160" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="640" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">성능 체크포인트</text>

  <text x="460" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">✓ 그리드 rowcount ≤ 500 (가상화 미적용 시)</text>
  <text x="460" y="298" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">✓ 트랜잭션 응답 Dataset row 제한</text>
  <text x="460" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">✓ ongetcellstyle 내 DB 조회 금지</text>
  <text x="460" y="334" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">✓ Form_Destroy에서 이벤트 핸들러 해제</text>
  <text x="460" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">✓ 팝업 닫힌 후 destroy() 호출</text>
  <text x="460" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">✓ 전역 변수에 DOM 참조 저장 금지</text>
</svg>
