<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">오케스트레이션이 해결하는 4가지 문제</text>

  <!-- 4 panels -->
  <rect x="60" y="80" width="360" height="120" rx="8" fill="#0f172a" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="80" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">문제 1. 수동 배포 실수</text>
  <text x="80" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af">잘못된 서버에 컨테이너 실행, 환경 변수 누락,</text>
  <text x="80" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af">포트 충돌로 서비스 다운 &#x2192; K8s 선언형 배포로 방지</text>
  <text x="80" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">&#x2714; Deployment + namespace로 환경 격리</text>

  <rect x="460" y="80" width="360" height="120" rx="8" fill="#0f172a" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="480" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">문제 2. 장애 대응 지연</text>
  <text x="480" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af">컨테이너 크래시 &#x2192; 알림 &#x2192; 담당자 접속 &#x2192; 수동 재시작</text>
  <text x="480" y="150" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af">&#x2192; 수분~수시간 다운타임 발생</text>
  <text x="480" y="175" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">&#x2714; K8s Liveness Probe + 자동 재시작으로 수초 내 복구</text>

  <rect x="60" y="230" width="360" height="120" rx="8" fill="#0f172a" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="80" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">문제 3. 리소스 낭비</text>
  <text x="80" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af">트래픽과 무관하게 서버를 항상 최대 용량으로 켜둠</text>
  <text x="80" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af">비용 낭비 심각</text>
  <text x="80" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">&#x2714; HPA/VPA + Cluster Autoscaler로 비용 최적화</text>

  <rect x="460" y="230" width="360" height="120" rx="8" fill="#0f172a" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="480" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">문제 4. 배포 중 서비스 중단</text>
  <text x="480" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af">새 버전 배포 시 기존 컨테이너 중지 &#x2192; 다운타임</text>
  <text x="480" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9ca3af">심야 배포 관행 발생</text>
  <text x="480" y="325" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">&#x2714; Rolling Update로 무중단 배포, 즉각 롤백</text>

  <text x="440" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#6b7280" text-anchor="middle">오케스트레이션 = 컨테이너 운영의 자동화 + 안정화 + 효율화</text>
</svg>
