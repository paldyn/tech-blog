<svg width="880" viewBox="0 0 880 440" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">@Profile과 프로파일 전용 설정 파일</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">@Profile로 빈을 조건부 등록하고, 파일로 설정을 분리합니다</text>

  <!-- Left: @Profile annotation code -->
  <text x="60" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">@Profile — 환경별 빈 조건부 등록</text>
  <rect x="60" y="114" width="370" height="288" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>

  <text x="76" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// 운영 환경 전용 메일 서비스</text>
  <text x="76" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">@Profile</tspan><tspan fill="#e8e8e8">(</tspan><tspan fill="#ce9178">"prod"</tspan><tspan fill="#e8e8e8">)</tspan></text>
  <text x="76" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">@Service</tspan></text>
  <text x="76" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">public class </tspan><tspan fill="#e8e8e8">SmtpMailService</tspan></text>
  <text x="76" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    <tspan fill="#7ec8e3">implements </tspan><tspan fill="#e8e8e8">MailService {</tspan></text>
  <text x="76" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#6a8aa0">// 실제 SMTP 전송</tspan></text>
  <text x="76" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#e8e8e8">}</tspan></text>
  <text x="76" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> </text>
  <text x="76" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// dev/test 환경 전용 스텁</text>
  <text x="76" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">@Profile</tspan><tspan fill="#e8e8e8">({</tspan><tspan fill="#ce9178">"dev"</tspan><tspan fill="#e8e8e8">, </tspan><tspan fill="#ce9178">"test"</tspan><tspan fill="#e8e8e8">})</tspan></text>
  <text x="76" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">@Service</tspan></text>
  <text x="76" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">public class </tspan><tspan fill="#e8e8e8">StubMailService</tspan></text>
  <text x="76" y="362" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    <tspan fill="#7ec8e3">implements </tspan><tspan fill="#e8e8e8">MailService {</tspan></text>
  <text x="76" y="380" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#6a8aa0">// 로그만 출력, 실제 전송 안 함</tspan></text>
  <text x="76" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#e8e8e8">}</tspan></text>

  <!-- Right: yml profile groups code -->
  <text x="450" y="104" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">application.yml — 프로파일 그룹 & 기본값</text>
  <rect x="450" y="114" width="370" height="288" fill="#070b14" rx="6" stroke="#1e2433" stroke-width="1"/>

  <text x="466" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve"># 기본 설정 (모든 환경 공통)</text>
  <text x="466" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">spring</tspan><tspan fill="#e8e8e8">:</tspan></text>
  <text x="466" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">profiles</tspan><tspan fill="#e8e8e8">:</tspan></text>
  <text x="466" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    <tspan fill="#7ec8e3">active</tspan><tspan fill="#e8e8e8">: </tspan><tspan fill="#ce9178">dev</tspan><tspan fill="#6a8aa0">  # 로컬 기본값</tspan></text>
  <text x="466" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    <tspan fill="#7ec8e3">group</tspan><tspan fill="#e8e8e8">:</tspan></text>
  <text x="466" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">      <tspan fill="#7ec8e3">dev</tspan><tspan fill="#e8e8e8">: </tspan><tspan fill="#ce9178">local,dev-db</tspan></text>
  <text x="466" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">      <tspan fill="#7ec8e3">prod</tspan><tspan fill="#e8e8e8">: </tspan><tspan fill="#ce9178">prod-db,monitoring</tspan></text>
  <text x="466" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> </text>
  <text x="466" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">---  # yml 문서 구분자</text>
  <text x="466" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">spring</tspan><tspan fill="#e8e8e8">.</tspan><tspan fill="#7ec8e3">config</tspan><tspan fill="#e8e8e8">.</tspan><tspan fill="#7ec8e3">activate</tspan><tspan fill="#e8e8e8">:</tspan></text>
  <text x="466" y="322" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">on-profile</tspan><tspan fill="#e8e8e8">: </tspan><tspan fill="#ce9178">prod</tspan></text>
  <text x="466" y="340" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve"><tspan fill="#7ec8e3">spring</tspan><tspan fill="#e8e8e8">:</tspan></text>
  <text x="466" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">  <tspan fill="#7ec8e3">datasource</tspan><tspan fill="#e8e8e8">:</tspan></text>
  <text x="466" y="376" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    <tspan fill="#7ec8e3">url</tspan><tspan fill="#e8e8e8">: </tspan><tspan fill="#ce9178">jdbc:mysql://rds/proddb</tspan></text>
  <text x="466" y="394" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" xml:space="preserve">    <tspan fill="#7ec8e3">username</tspan><tspan fill="#e8e8e8">: </tspan><tspan fill="#ce9178">${DB_USER}</tspan></text>
</svg>
