<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">jq · yq — JSON/YAML 커맨드라인 처리</text>

  <!-- jq filter hierarchy -->
  <text x="60" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">jq 핵심 필터 체계</text>

  <!-- identity -->
  <rect x="60" y="92" width="100" height="40" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="110" y="115" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#7777cc">.</text>
  <text x="110" y="130" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">identity</text>

  <!-- field access -->
  <rect x="180" y="92" width="130" height="40" rx="6" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="245" y="112" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">.key</text>
  <text x="245" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">필드 접근</text>

  <!-- array index -->
  <rect x="330" y="92" width="130" height="40" rx="6" fill="#1a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="395" y="112" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">.[0]</text>
  <text x="395" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">배열 인덱스</text>

  <!-- iterate -->
  <rect x="480" y="92" width="130" height="40" rx="6" fill="#1a1a2a" stroke="#55c555" stroke-width="1.5"/>
  <text x="545" y="112" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">.[]</text>
  <text x="545" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">배열 이터레이션</text>

  <!-- pipe -->
  <rect x="630" y="92" width="100" height="40" rx="6" fill="#1a1a2a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="680" y="112" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">|</text>
  <text x="680" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">파이프</text>

  <!-- select/map/reduce -->
  <rect x="60" y="148" width="160" height="40" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="140" y="168" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">select(cond)</text>
  <text x="140" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">조건 필터</text>

  <rect x="240" y="148" width="160" height="40" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="320" y="168" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">map(expr)</text>
  <text x="320" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">배열 변환</text>

  <rect x="420" y="148" width="160" height="40" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="500" y="168" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">keys / values</text>
  <text x="500" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">키/값 목록</text>

  <rect x="600" y="148" width="220" height="40" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="710" y="168" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">to_entries|from_entries</text>
  <text x="710" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">객체 분해/조립</text>

  <!-- jq code examples -->
  <text x="60" y="218" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e8e8e8">jq 실전 예시</text>

  <rect x="60" y="232" width="380" height="190" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 특정 필드 추출</text>
  <text x="80" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">curl -s api/users | <tspan fill="#7ec8e3" font-weight="600">jq</tspan> <tspan fill="#ce9178">'.[].name'</tspan></text>
  <text x="80" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 조건 필터 (age &gt; 30)</text>
  <text x="80" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">jq</tspan> <tspan fill="#ce9178">'[.[] | select(.age > 30)]'</tspan> users.json</text>
  <text x="80" y="358" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 새 객체 구성</text>
  <text x="80" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">jq</tspan> <tspan fill="#ce9178">'{n: .name, a: .age}'</tspan> user.json</text>
  <text x="80" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 플래그 -r : 따옴표 없는 문자열</text>

  <!-- yq section -->
  <rect x="460" y="232" width="360" height="190" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="480" y="258" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178">yq (YAML 처리)</text>
  <text x="480" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># YAML 필드 읽기</text>
  <text x="480" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">yq</tspan> <tspan fill="#ce9178">'.metadata.name'</tspan> pod.yaml</text>
  <text x="480" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># 필드 값 변경</text>
  <text x="480" y="348" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">yq</tspan> <tspan fill="#ce9178">'.spec.replicas = 3'</tspan> deploy.yaml</text>
  <text x="480" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># JSON → YAML 변환</text>
  <text x="480" y="398" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">cat data.json | <tspan fill="#7ec8e3" font-weight="600">yq</tspan> -P <tspan fill="#ce9178">'.'</tspan></text>
  <text x="480" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">yq: mikefarah/yq (Go 버전) 기준</text>
</svg>
