<svg xmlns="http://www.w3.org/2000/svg" width="880" height="404" viewBox="0 0 880 404">
  <defs>
    <marker id="mkA" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="mkB" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="404" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Mock으로 협력 객체 대체</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">SUT를 외부 의존성에서 격리</text>

  <!-- SUT -->
  <rect x="80" y="130" width="240" height="120" rx="8" fill="#0a0a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="200" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">OrderService</text>
  <text x="200" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">테스트 대상 (SUT)</text>
  <text x="200" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8" text-anchor="middle">진짜 객체 — 검증 목표</text>
  <text x="200" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8" text-anchor="middle">로직만 격리해 테스트</text>

  <!-- Mock -->
  <rect x="560" y="130" width="240" height="120" rx="8" fill="#0a0a0a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="680" y="166" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7777cc" text-anchor="middle">PaymentGateway</text>
  <text x="680" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">Mock (가짜 객체)</text>
  <text x="680" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8" text-anchor="middle">정해진 값을 반환하도록</text>
  <text x="680" y="234" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8" text-anchor="middle">스터빙 — 실제 결제 X</text>

  <!-- arrows -->
  <line x1="320" y1="180" x2="560" y2="180" stroke="#7ec8e3" stroke-width="2" marker-end="url(#mkA)"/>
  <text x="440" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">pay() 호출</text>

  <line x1="560" y1="210" x2="320" y2="210" stroke="#55c555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#mkB)"/>
  <text x="440" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">미리 정한 결과 반환</text>

  <!-- note -->
  <rect x="80" y="290" width="720" height="92" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="318" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e8e8e8">왜 Mock인가</text>
  <text x="100" y="342" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8">· 외부 시스템(결제·네트워크·DB) 없이 빠르고 결정적인 테스트</text>
  <text x="100" y="364" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8">· 실패·예외 같은 재현 어려운 상황도 자유롭게 시뮬레이션</text>
</svg>
