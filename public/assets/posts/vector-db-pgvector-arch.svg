<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" height="360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">pgvector 아키텍처</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">PostgreSQL에 벡터 검색 기능을 추가하는 확장</text>

  <!-- App box (left) -->
  <rect x="60" y="108" width="160" height="120" rx="8" fill="#0a1e28" stroke="#7ec8e3" stroke-width="2"/>
  <text x="140" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">애플리케이션</text>
  <text x="140" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Python / Node.js</text>
  <text x="140" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">psycopg2 / asyncpg</text>
  <text x="140" y="196" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">SQLAlchemy / Drizzle</text>
  <text x="140" y="218" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#666">표준 PostgreSQL 연결</text>

  <!-- Arrow app → pg -->
  <line x1="222" y1="168" x2="262" y2="168" stroke="#7ec8e3" stroke-width="2"/>
  <polygon points="262,161 280,168 262,175" fill="#7ec8e3"/>
  <text x="252" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">SQL</text>

  <!-- PostgreSQL + pgvector (center main) -->
  <rect x="282" y="86" width="316" height="196" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#55c555">PostgreSQL + pgvector</text>

  <!-- Sub-box 1: 일반 테이블 -->
  <rect x="300" y="126" width="130" height="60" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="365" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#55c555">일반 테이블</text>
  <text x="365" y="164" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">id, content, metadata</text>
  <text x="365" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">TEXT, JSONB 등</text>

  <!-- Sub-box 2: 벡터 컬럼 -->
  <rect x="452" y="126" width="130" height="60" rx="6" fill="#0a1a0a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="517" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" font-weight="600" fill="#7777cc">벡터 컬럼</text>
  <text x="517" y="164" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="10" fill="#b5cea8">vector(1536)</text>
  <text x="517" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">pgvector 타입</text>

  <!-- Operators row -->
  <rect x="300" y="202" width="282" height="40" rx="4" fill="#071507" stroke="#333"/>
  <text x="441" y="218" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="11" fill="#7ec8e3">&lt;=&gt;  &lt;#&gt;  &lt;-&gt;</text>
  <text x="441" y="234" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">코사인 · 내적 · 유클리드 연산자</text>

  <!-- Extension badge -->
  <rect x="300" y="256" width="282" height="22" rx="4" fill="#1a2e1a"/>
  <text x="441" y="272" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">CREATE EXTENSION IF NOT EXISTS vector;</text>

  <!-- Arrow pg → index -->
  <line x1="600" y1="168" x2="638" y2="168" stroke="#7777cc" stroke-width="2"/>
  <polygon points="638,161 656,168 638,175" fill="#7777cc"/>
  <text x="629" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">인덱스</text>

  <!-- Index box (right) -->
  <rect x="658" y="108" width="162" height="120" rx="8" fill="#0e0e1a" stroke="#7777cc" stroke-width="2"/>
  <text x="739" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7777cc">인덱스</text>
  <rect x="678" y="148" width="122" height="28" rx="4" fill="#1a1040"/>
  <text x="739" y="167" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">HNSW</text>
  <rect x="678" y="184" width="122" height="28" rx="4" fill="#0a1e28"/>
  <text x="739" y="203" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">IVF Flat</text>
  <text x="739" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">ANN 탐색 최적화</text>

  <!-- Bottom label -->
  <text x="440" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">기존 PostgreSQL 인프라에 벡터 검색을 추가 — 별도 DB 없이 운영 가능</text>
</svg>
