  <text x="560" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#ce9178">"20000101"</text>

  <rect x="476" y="308" width="338" height="44" rx="4" fill="#0d1a30"/>
  <text x="488" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#7ec8e3">maxdate</text>
  <text x="560" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="11" fill="#e8e8e8">선택 가능 최댓값</text>
  <text x="560" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#ce9178">"29991231"</text>

  <rect x="476" y="360" width="338" height="44" rx="4" fill="#101828"/>
  <text x="488" y="378" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="11" fill="#55c555">onchanged</text>
  <text x="560" y="378" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
