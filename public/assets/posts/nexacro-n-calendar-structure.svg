<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480" style="background:#0a0a0a;">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">Calendar — 컴포넌트 구조 및 주요 속성</text>

  <!-- Left: Calendar anatomy -->
  <rect x="50" y="68" width="370" height="374" rx="8" fill="#0d1220" stroke="#2a3a4a" stroke-width="1.5"/>
  <text x="235" y="96" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="15" font-weight="600" fill="#7ec8e3">Calendar 컴포넌트 구조</text>

  <!-- Calendar mock-up -->
  <!-- Header: month nav -->
