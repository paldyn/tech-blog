<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">루프백 마운트 — 파일을 블록 디바이스로</text>

  <!-- 파일 -->
  <rect x="60" y="80" width="160" height="70" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="140" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">이미지 파일</text>
  <text x="140" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">disk.img</text>
  <text x="140" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">ubuntu.iso</text>

  <line x1="220" y1="115" x2="280" y2="115" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="250" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">losetup</text>

  <!-- 루프 디바이스 -->
  <rect x="280" y="80" width="180" height="70" rx="8" fill="#0a1420" stroke="#7ec8e3" stroke-width="2"/>
  <text x="370" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">Loop 디바이스</text>
  <text x="370" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">/dev/loop0</text>
  <text x="370" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">블록 디바이스처럼 동작</text>

  <line x1="460" y1="115" x2="520" y2="115" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="490" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">mount -t ext4</text>

  <!-- 마운트포인트 -->
  <rect x="520" y="80" width="160" height="70" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="600" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">마운트포인트</text>
  <text x="600" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">/mnt/disk</text>
  <text x="600" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">일반 FS로 접근</text>

  <!-- 화살표: 애플리케이션 ↔ 마운트포인트 -->
  <rect x="700" y="80" width="140" height="70" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1"/>
  <text x="770" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">애플리케이션</text>
  <text x="770" y="128" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">파일 읽기/쓰기</text>
  <text x="770" y="144" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">loop 여부 모름</text>

  <line x1="700" y1="115" x2="682" y2="115" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <!-- 활용 사례 -->
  <text x="440" y="186" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">루프백 마운트 주요 활용</text>

  <rect x="60" y="204" width="240" height="86" rx="6" fill="#111827" stroke="#7ec8e3" stroke-width="1"/>
  <text x="180" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">ISO 이미지 마운트</text>
  <text x="180" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">CD/DVD 없이 ISO 내용 접근</text>
  <text x="180" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">mount -o loop ubuntu.iso</text>
  <text x="180" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">/mnt/iso</text>

  <rect x="320" y="204" width="240" height="86" rx="6" fill="#111827" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">VM 디스크 이미지</text>
  <text x="440" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">QCOW2/RAW 이미지 수정</text>
  <text x="440" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">guestmount / kpartx 활용</text>
  <text x="440" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">VM 부팅 없이 파일 편집</text>

  <rect x="580" y="204" width="240" height="86" rx="6" fill="#111827" stroke="#7777cc" stroke-width="1"/>
  <text x="700" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">LUKS 파일 컨테이너</text>
  <text x="700" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">파일 → loop → LUKS → ext4</text>
  <text x="700" y="266" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">암호화된 가상 디스크</text>
  <text x="700" y="282" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">이식 가능한 보안 볼트</text>

  <!-- loop 디바이스 제한 -->
  <rect x="60" y="310" width="760" height="148" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="332" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">losetup 주요 명령</text>
  <text x="76" y="356" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 사용 가능한 loop 디바이스 자동 선택</text>
  <text x="76" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">sudo losetup</text>
  <text x="176" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> -f --show disk.img</text>
  <text x="400" y="376" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">  # 출력: /dev/loop0</text>
  <text x="76" y="400" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 모든 loop 디바이스 목록</text>
  <text x="76" y="420" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">sudo losetup</text>
  <text x="176" y="420" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> -a</text>
  <text x="300" y="420" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">  # loop 해제: losetup -d /dev/loop0</text>
  <text x="76" y="444" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 최대 loop 디바이스 수 확인/조정 (기본 256)</text>
</svg>
