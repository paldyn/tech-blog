<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 430">
  <rect width="880" height="430" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">리뷰 코멘트 유형과 좋은 리뷰 원칙</text>

  <!-- Left: comment types -->
  <text x="220" y="80" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">코멘트 유형 (우선순위 명시)</text>

  <rect x="40" y="95" width="390" height="74" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="56" y="118"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">🚫 Blocker (필수 수정)</text>
  <text x="56" y="138"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">버그, 보안 취약점, 비즈니스 로직 오류</text>
  <text x="56" y="157"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">머지 전 반드시 수정 필요</text>

  <rect x="40" y="180" width="390" height="74" rx="6" fill="#1a150a" stroke="#e0955e" stroke-width="1.5"/>
  <text x="56" y="203"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e0955e">⚠ Suggestion (제안)</text>
  <text x="56" y="223"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">코드 개선, 명명 개선, 성능 최적화</text>
  <text x="56" y="242"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e0955e">작성자 재량으로 반영 여부 결정</text>

  <rect x="40" y="265" width="390" height="74" rx="6" fill="#071624" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="56" y="288"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">💬 Nit / Question (질문)</text>
  <text x="56" y="308"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">사소한 스타일, 궁금한 점, 학습 목적</text>
  <text x="56" y="327"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">무시 가능, 대화 목적</text>

  <!-- Divider -->
  <line x1="450" y1="70" x2="450" y2="400" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Right: good review principles -->
  <text x="665" y="80" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#9988dd">좋은 리뷰 원칙</text>

  <rect x="460" y="95" width="390" height="294" rx="8" fill="#111" stroke="#333" stroke-width="1"/>

  <text x="476" y="122"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">코드를 리뷰하고, 사람을 리뷰하지 않는다</text>
  <text x="476" y="142"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">"이 코드는..." vs "당신은..."</text>

  <line x1="476" y1="155" x2="835" y2="155" stroke="#1e1e1e" stroke-width="1"/>

  <text x="476" y="176"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">왜(Why)를 설명한다</text>
  <text x="476" y="196"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">근거 없는 "이렇게 바꿔요"는 설득력이 없다</text>

  <line x1="476" y1="209" x2="835" y2="209" stroke="#1e1e1e" stroke-width="1"/>

  <text x="476" y="230"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">Suggested Changes 기능 활용</text>
  <text x="476" y="250"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">구체적 코드 제안 → 작성자가 1클릭 적용</text>

  <line x1="476" y1="263" x2="835" y2="263" stroke="#1e1e1e" stroke-width="1"/>

  <text x="476" y="284"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">시간 제한 (24시간 내 응답)</text>
  <text x="476" y="304"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">리뷰 지연은 PR 블로킹 = 팀 속도 저하</text>

  <line x1="476" y1="317" x2="835" y2="317" stroke="#1e1e1e" stroke-width="1"/>

  <text x="476" y="338"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">칭찬도 코멘트로 남긴다</text>
  <text x="476" y="358"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">"이 패턴 좋네요!" — 팀 문화 형성에 기여</text>

  <!-- Footer -->
  <text x="440" y="412" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">Google Engineering Practices: "코드 리뷰의 목적은 코드베이스 품질을 높이는 것"</text>
</svg>
