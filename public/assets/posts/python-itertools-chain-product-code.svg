<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">chain()과 product() 사용 예제</text>

  <!-- Left: chain examples -->
  <text x="230" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">chain() — 이터러블 연결</text>
  <rect x="50" y="80" width="370" height="284" rx="6"
        fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="66" y="103" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan font-weight="600" fill="#7ec8e3">from </tspan><tspan>itertools </tspan><tspan font-weight="600" fill="#7ec8e3">import </tspan><tspan>chain</tspan>
  </text>
  <text x="66" y="139" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">a = [<tspan fill="#b5cea8">1</tspan>, <tspan fill="#b5cea8">2</tspan>]; b = [<tspan fill="#b5cea8">3</tspan>, <tspan fill="#b5cea8">4</tspan>]; c = [<tspan fill="#b5cea8">5</tspan>]</text>
  <text x="66" y="157" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">print(list(chain(a, b, c)))</text>
  <text x="66" y="175" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># [1, 2, 3, 4, 5]</text>
  <text x="66" y="211" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 중첩 리스트 펼치기</text>
  <text x="66" y="229" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">nested = [[<tspan fill="#b5cea8">1</tspan>,<tspan fill="#b5cea8">2</tspan>],[<tspan fill="#b5cea8">3</tspan>,<tspan fill="#b5cea8">4</tspan>],[<tspan fill="#b5cea8">5</tspan>]]</text>
  <text x="66" y="247" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">flat = list(chain.from_iterable(nested))</text>
  <text x="66" y="265" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># [1, 2, 3, 4, 5]</text>
  <text x="66" y="301" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 문자열도 이터러블</text>
  <text x="66" y="319" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">words = [<tspan fill="#ce9178">"ab"</tspan>, <tspan fill="#ce9178">"cd"</tspan>]</text>
  <text x="66" y="337" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">chars = list(chain.from_iterable(words))</text>
  <text x="66" y="355" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># ['a', 'b', 'c', 'd']</text>

  <!-- Right: product examples -->
  <text x="650" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">product() — 데카르트 곱</text>
  <rect x="460" y="80" width="370" height="284" rx="6"
        fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="476" y="103" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan font-weight="600" fill="#7ec8e3">from </tspan><tspan>itertools </tspan><tspan font-weight="600" fill="#7ec8e3">import </tspan><tspan>product</tspan>
  </text>
  <text x="476" y="139" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 2중 for 루프 대체</text>
  <text x="476" y="157" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">colors = [<tspan fill="#ce9178">'R'</tspan>, <tspan fill="#ce9178">'G'</tspan>]</text>
  <text x="476" y="175" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">sizes = [<tspan fill="#ce9178">'S'</tspan>, <tspan fill="#ce9178">'M'</tspan>, <tspan fill="#ce9178">'L'</tspan>]</text>
  <text x="476" y="193" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">
    <tspan font-weight="600" fill="#7ec8e3">for </tspan><tspan>c, s </tspan><tspan font-weight="600" fill="#7ec8e3">in </tspan><tspan>product(colors, sizes):</tspan>
  </text>
  <text x="476" y="211" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">    print(f<tspan fill="#ce9178">"{c}-{s}"</tspan>, end=<tspan fill="#ce9178">" "</tspan>)</text>
  <text x="476" y="229" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># R-S R-M R-L G-S G-M G-L</text>
  <text x="476" y="265" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># repeat 인자로 자기 자신과 곱</text>
  <text x="476" y="283" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">list(product([<tspan fill="#b5cea8">0</tspan>,<tspan fill="#b5cea8">1</tspan>], repeat=<tspan fill="#b5cea8">2</tspan>))</text>
  <text x="476" y="301" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># [(0,0),(0,1),(1,0),(1,1)]</text>
  <text x="476" y="337" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 비트 패턴 생성에 유용</text>
  <text x="476" y="355" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 중첩 for 루프 대체 가능</text>
</svg>
