<svg width="880" viewBox="0 0 880 540" xmlns="http://www.w3.org/2000/svg" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="arr-b" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto" refX="12" refY="7">
      <path d="M2,2 L12,7 L2,12" fill="none" stroke="#7ec8e3" stroke-width="1.5"/>
    </marker>
  </defs>

  <rect width="880" height="540" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">동전 교환 — 탐욕 알고리즘</text>

  <!-- Code block -->
  <text x="60" y="82" font-size="16" font-weight="600" fill="#e8e8e8">Python 구현</text>
  <rect x="60" y="96" width="380" height="318" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text x="80" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">def</text>
  <text x="114" y="120" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> greedy_coins(amount, coins):</text>
  <text x="80" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  coins.sort(</text>
  <text x="183" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178" xml:space="preserve">reverse</text>
  <text x="247" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">=</text>
  <text x="257" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">True</text>
  <text x="290" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">)</text>
  <text x="80" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">  result = []</text>
  <text x="80" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  for</text>
  <text x="111" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> coin </text>
  <text x="163" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">in</text>
  <text x="184" y="186" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> coins:</text>
  <text x="80" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">    while</text>
  <text x="140" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> amount &gt;= coin:</text>
  <text x="80" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      result.append(coin)</text>
  <text x="80" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve">      amount -= coin</text>
  <text x="80" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  return</text>
  <text x="138" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff" xml:space="preserve"> result</text>
  <text x="80" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># coins = [500,100,50,10]</text>
  <text x="80" y="324" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># amount = 730</text>
  <text x="80" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># [500,100,100,10,10,10]</text>
  <text x="80" y="364" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># Total: 6 coins</text>
  <text x="80" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8" xml:space="preserve"># Time:  O(amount/min_coin)</text>

  <!-- Right section label -->
  <text x="480" y="82" font-size="16" font-weight="600" fill="#e8e8e8">거스름돈: 730원 분해</text>

  <!-- Step visualization -->
  <!-- Amount bar -->
  <rect x="480" y="100" width="340" height="40" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="650" y="126" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc">amount = 730원</text>

  <!-- Step 1: 500 -->
  <text x="480" y="168" font-size="13" fill="#e8e8e8">Step 1: 500원 선택</text>
  <rect x="480" y="178" width="120" height="36" rx="6" fill="#0d2b0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="540" y="201" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">500</text>
  <text x="610" y="200" font-size="13" fill="#888">남은: 230원</text>

  <!-- Step 2: 100x2 -->
  <text x="480" y="238" font-size="13" fill="#e8e8e8">Step 2: 100원 × 2</text>
  <rect x="480" y="248" width="80" height="36" rx="6" fill="#0d2b0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="520" y="271" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">100</text>
  <rect x="570" y="248" width="80" height="36" rx="6" fill="#0d2b0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="610" y="271" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">100</text>
  <text x="660" y="270" font-size="13" fill="#888">남은: 30원</text>

  <!-- Step 3: 10x3 -->
  <text x="480" y="310" font-size="13" fill="#e8e8e8">Step 3: 10원 × 3</text>
  <rect x="480" y="320" width="60" height="36" rx="6" fill="#0d2b0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="510" y="343" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">10</text>
  <rect x="548" y="320" width="60" height="36" rx="6" fill="#0d2b0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="578" y="343" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">10</text>
  <rect x="616" y="320" width="60" height="36" rx="6" fill="#0d2b0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="646" y="343" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">10</text>
  <text x="686" y="340" font-size="13" fill="#888">남은: 0원</text>

  <!-- Final result -->
  <rect x="480" y="378" width="340" height="56" rx="8" fill="#0d2b0d" stroke="#55c555" stroke-width="2"/>
  <text x="650" y="402" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">결과: 총 6개 동전</text>
  <text x="650" y="422" text-anchor="middle" font-size="13" fill="#888">500+100+100+10+10+10</text>

  <!-- Complexity -->
  <text x="480" y="466" font-size="13" fill="#888">시간복잡도: O(amount / 최소동전) — 한국 화폐처럼</text>
  <text x="480" y="484" font-size="13" fill="#888">10의 배수 체계에서 탐욕 = 항상 최적</text>

  <!-- Bottom note -->
  <text x="60" y="466" font-size="13" fill="#888">50원짜리 미사용: amount=730, 50의 배수 아님</text>
  <text x="60" y="484" font-size="13" fill="#888">정렬 후 큰 동전부터 순서대로 적용</text>
</svg>
