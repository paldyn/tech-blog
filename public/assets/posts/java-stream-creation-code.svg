<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">iterate · generate · ofNullable · Builder 코드</text>

  <!-- Left: iterate -->
  <text x="80" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#7777cc">Stream.iterate — 시드 기반 무한/유한</text>
  <rect x="64" y="90" width="360" height="170" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// Java 8: 무한 스트림 + limit</text>
  <text x="80" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">var</tspan><tspan fill="#ffffff"> evens = Stream.iterate(0, n -&gt; n + 2)</tspan></text>
  <text x="80" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">                       .limit(5).toList();</text>
  <text x="80" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// [0, 2, 4, 6, 8]</text>
  <text x="80" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff"> </text>
  <text x="80" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// Java 9: 종료 조건 포함</text>
  <text x="80" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">var</tspan><tspan fill="#ffffff"> nums = Stream.iterate(1, n -&gt; n &lt;= 100, n -&gt; n * 2)</tspan></text>
  <text x="80" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">                       .toList();</text>
  <text x="80" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// [1, 2, 4, 8, 16, 32, 64]</text>

  <!-- Right: generate + ofNullable -->
  <text x="476" y="78" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">generate · ofNullable · Builder</text>
  <rect x="460" y="90" width="356" height="170" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="110" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// 5개의 UUID 생성</text>
  <text x="476" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">var</tspan><tspan fill="#ffffff"> ids = Stream.generate(UUID::randomUUID)</tspan></text>
  <text x="476" y="146" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">                   .limit(5).toList();</text>
  <text x="476" y="164" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff"> </text>
  <text x="476" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// null 가능 값 안전하게 스트림화</text>
  <text x="476" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">var</tspan><tspan fill="#ffffff"> s = Stream.ofNullable(maybeNull)</tspan></text>
  <text x="476" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">              .map(String::toUpperCase)</text>
  <text x="476" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">              .findFirst();</text>
  <text x="476" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// null이면 빈 스트림 → empty Optional</text>

  <!-- Bottom: Files.lines + concat -->
  <text x="80" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e0b555">Files.lines · concat · Builder</text>
  <rect x="64" y="300" width="752" height="122" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// 파일 줄별 스트림 (try-with-resources로 자동 close)</text>
  <text x="80" y="338" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">try</tspan><tspan fill="#ffffff"> (Stream&lt;String&gt; lines = Files.lines(Path.of(</tspan><tspan fill="#ce9178">"data.txt"</tspan><tspan fill="#ffffff">))) {</tspan></text>
  <text x="80" y="356" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">    lines.filter(l -&gt; !l.isBlank()).forEach(System.out::println);</text>
  <text x="80" y="374" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#ffffff">}</text>
  <text x="80" y="392" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve" fill="#9aa4b8">// 두 스트림 연결</text>
  <text x="80" y="410" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">var</tspan><tspan fill="#ffffff"> merged = Stream.concat(listA.stream(), listB.stream()).toList();</tspan></text>
</svg>
