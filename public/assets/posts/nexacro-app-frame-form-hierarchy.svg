<svg width="880" height="500" viewBox="0 0 880 500" xmlns="http://www.w3.org/2000/svg" style="font-family:'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="56" text-anchor="middle" font-size="20" font-weight="700" fill="#e8e8e8">Application · Frame · Form 의 책임 분리</text>
  <text x="440" y="82" text-anchor="middle" font-size="13" fill="#666">바깥은 가벼워야 하고, 안쪽은 자기 일에만 집중해야 한다</text>

  <!-- Outer: Application layer -->
  <rect x="60" y="116" width="760" height="324" rx="12" fill="#1a1408" stroke="#4a3a1a" stroke-width="1.5"/>
  <text x="86" y="148" font-size="13" fill="#cc8855" font-weight="700">Application</text>
  <text x="200" y="148" font-size="11" fill="#777">— 앱 전역 컨텍스트 (전역 자원, 1회 초기화)</text>
  <text x="86" y="172" font-size="11" fill="#888">서비스 URL · 공통 라이브러리 · 환경 설정 · 세션 정보</text>

  <!-- Middle: Frame layer -->
  <rect x="86" y="196" width="708" height="220" rx="10" fill="#0e1a0e" stroke="#2a4a2a" stroke-width="1.5"/>
  <text x="108" y="226" font-size="13" fill="#66cc88" font-weight="700">Frame</text>
  <text x="180" y="226" font-size="11" fill="#777">— 화면 배치와 컨테이너 (Form을 담는 그릇)</text>
  <text x="108" y="248" font-size="11" fill="#888">레이아웃 · 메뉴/탭 구조 · 다중 Form 호출 — 업무 로직은 가지지 않음</text>

  <!-- Inner: Form layer (the actual work) -->
  <rect x="108" y="270" width="664" height="132" rx="8" fill="#0e1620" stroke="#22405a" stroke-width="1.5"/>
  <text x="130" y="298" font-size="13" fill="#7799cc" font-weight="700">Form</text>
  <text x="180" y="298" font-size="11" fill="#777">— 실제 업무 로직 (컴포넌트 · 이벤트 · Dataset · transaction)</text>

  <!-- Form inner code-like description block -->
  <rect x="130" y="316" width="620" height="72" rx="6" fill="#070b14" stroke="#1a2a40" stroke-width="1"/>
  <text x="148" y="340" font-size="12" fill="#aabbdd" style="font-family:'JetBrains Mono','Menlo','Consolas',monospace">Form { Button · Edit · Grid · Combo · Dataset · transaction() }</text>
  <text x="148" y="364" font-size="11" fill="#667788">사용자 입력 처리 · 데이터 바인딩 · 서버 호출 — 한 화면 안에서 완결</text>
  <text x="148" y="380" font-size="11" fill="#446">하나의 Form은 하나의 업무 단위에만 책임진다</text>

  <!-- Bottom warning note -->
  <text x="440" y="464" text-anchor="middle" font-size="12" fill="#cc8855" font-weight="600">⚠ Frame이나 Application에 업무 로직을 두면 다른 화면에서 손대기 어려워진다</text>
  <text x="440" y="486" text-anchor="middle" font-size="11" fill="#555">바깥 레이어는 가벼울수록 좋고, 업무 로직은 항상 Form 안으로</text>
</svg>
