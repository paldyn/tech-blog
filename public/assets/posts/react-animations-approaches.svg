<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr-anim" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">React 애니메이션 방법 비교</text>

  <!-- ── Column 1: CSS 기반 ── -->
  <rect x="60" y="80" width="240" height="44" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="180" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc">CSS 기반</text>
  <text x="180" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">className 토글 / keyframes</text>

  <!-- CSS approach boxes -->
  <rect x="60" y="144" width="240" height="60" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="84" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">transition</text>
  <text x="84" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">속성 변화를 부드럽게 처리</text>
  <text x="84" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">✓ 간단 · 성능 좋음</text>

  <rect x="60" y="218" width="240" height="60" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="84" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">@keyframes</text>
  <text x="84" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">복잡한 다단계 애니메이션</text>
  <text x="84" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">✓ 루프·지연 쉬움</text>

  <rect x="60" y="292" width="240" height="60" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="84" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">react-transition-group</text>
  <text x="84" y="331" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">enter/exit 클래스 자동 적용</text>
  <text x="84" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">△ 마운트·언마운트 처리 가능</text>

  <!-- ── Column 2: JS 기반 ── -->
  <rect x="320" y="80" width="240" height="44" rx="8" fill="#1a2a1e" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">JS 기반</text>
  <text x="440" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">Spring Physics / WAAPI</text>

  <rect x="320" y="144" width="240" height="60" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="344" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Framer Motion</text>
  <text x="344" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">motion.div animate/variants</text>
  <text x="344" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">✓ 선언적 · 제스처 지원</text>

  <rect x="320" y="218" width="240" height="60" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="344" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">React Spring</text>
  <text x="344" y="257" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">물리 기반 자연스러운 움직임</text>
  <text x="344" y="271" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">✓ useSpring / useSprings</text>

  <rect x="320" y="292" width="240" height="60" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="344" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Web Animations API</text>
  <text x="344" y="331" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">브라우저 네이티브 API</text>
  <text x="344" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">△ useRef + animate()</text>

  <!-- ── Column 3: 선택 기준 ── -->
  <rect x="580" y="80" width="240" height="44" rx="8" fill="#2a1a1e" stroke="#e05555" stroke-width="1.5"/>
  <text x="700" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#e05555">선택 기준</text>
  <text x="700" y="116" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">어떤 상황에 무엇을?</text>

  <rect x="580" y="144" width="240" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="604" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">단순 hover · 페이드</text>
  <text x="604" y="181" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">→ CSS transition</text>

  <rect x="580" y="208" width="240" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="604" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">마운트/언마운트 애니메이션</text>
  <text x="604" y="245" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">→ Framer Motion AnimatePresence</text>

  <rect x="580" y="272" width="240" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="604" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">물리 기반 인터랙션</text>
  <text x="604" y="309" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">→ React Spring</text>

  <rect x="580" y="336" width="240" height="54" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="604" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">복잡한 시퀀스 · 오케스트라</text>
  <text x="604" y="373" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">→ Framer Motion variants</text>

  <!-- Code example -->
  <rect x="60" y="380" width="500" height="110" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="402" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// Framer Motion 기본 예시</text>
  <text x="76" y="420" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">import</tspan>
    <tspan fill="#ffffff"> { motion } </tspan>
    <tspan fill="#7ec8e3" font-weight="600">from</tspan>
    <tspan fill="#ce9178"> 'framer-motion'</tspan>
    <tspan fill="#ffffff">;</tspan>
  </text>
  <text x="76" y="438" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> FadeIn() {</tspan>
  </text>
  <text x="76" y="456" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">  </tspan>
    <tspan fill="#7ec8e3" font-weight="600">return</tspan>
    <tspan fill="#ffffff"> &lt;</tspan>
    <tspan fill="#55c555">motion.div</tspan>
    <tspan fill="#ffffff"> </tspan>
    <tspan fill="#7ec8e3" font-weight="600">initial</tspan>
    <tspan fill="#ffffff">={{ opacity: </tspan>
    <tspan fill="#b5cea8">0</tspan>
    <tspan fill="#ffffff"> }}</tspan>
  </text>
  <text x="76" y="474" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">    </tspan>
    <tspan fill="#7ec8e3" font-weight="600">animate</tspan>
    <tspan fill="#ffffff">={{ opacity: </tspan>
    <tspan fill="#b5cea8">1</tspan>
    <tspan fill="#ffffff"> }} transition={{ duration: </tspan>
    <tspan fill="#b5cea8">0.3</tspan>
    <tspan fill="#ffffff"> }}/&gt;;</tspan>
  </text>

  <!-- Performance Note -->
  <rect x="60" y="496" width="760" height="14" rx="4" fill="none"/>
  <text x="440" y="508" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">성능 우선: transform · opacity만 애니메이션 → GPU 가속 (layout 속성 변경 피할 것)</text>
</svg>
