<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">systemd-nspawn 컨테이너 구조</text>

  <!-- Host systemd layer -->
  <rect x="60" y="70" width="760" height="60" rx="8" fill="#12123a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="98" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc">Host — systemd (PID 1)</text>
  <text x="440" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">machinectl list · systemd-machined · /var/lib/machines/</text>

  <!-- Arrow down -->
  <line x1="440" y1="130" x2="440" y2="156"
        stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <!-- nspawn container -->
  <rect x="60" y="156" width="760" height="280" rx="8" fill="#001a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="182" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">systemd-nspawn 컨테이너</text>

  <!-- Inside container: systemd as PID1 -->
  <rect x="80" y="196" width="720" height="60" rx="6" fill="#002a18" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="222" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">Guest systemd (PID 1 in container)</text>
  <text x="440" y="242" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">완전한 init 시스템 — 서비스 관리, cgroup, journald</text>

  <!-- Namespaces row -->
  <rect x="80" y="270" width="160" height="70" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="0.8"/>
  <text x="160" y="296" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Mount NS</text>
  <text x="160" y="316" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">격리된 루트fs</text>
  <text x="160" y="330" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">/var/lib/machines/</text>

  <rect x="260" y="270" width="160" height="70" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="0.8"/>
  <text x="340" y="296" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Network NS</text>
  <text x="340" y="316" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">host / private</text>
  <text x="340" y="330" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">veth 페어</text>

  <rect x="440" y="270" width="160" height="70" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="0.8"/>
  <text x="520" y="296" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">PID NS</text>
  <text x="520" y="316" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">격리된 PID 트리</text>
  <text x="520" y="330" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">systemd=PID 1</text>

  <rect x="620" y="270" width="160" height="70" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="0.8"/>
  <text x="700" y="296" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">UTS / IPC NS</text>
  <text x="700" y="316" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">독립 hostname</text>
  <text x="700" y="330" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">독립 IPC</text>

  <!-- Services row -->
  <rect x="80" y="356" width="720" height="60" rx="6" fill="#001a08" stroke="#444" stroke-width="1"/>
  <text x="440" y="382" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">게스트 서비스: sshd, nginx, postgresql, ... (systemctl 로 관리)</text>
  <text x="440" y="402" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">호스트 커널 공유 — VM과 달리 별도 커널 불필요</text>

  <!-- Label -->
  <text x="440" y="462" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">systemd-nspawn = 완전한 systemd init을 가진 경량 OS 컨테이너 (VM보다 가볍고 Docker보다 무거운 중간 지점)</text>
</svg>
