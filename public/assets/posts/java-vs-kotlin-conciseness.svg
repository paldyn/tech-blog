  <text xml:space="preserve" x="76" y="156" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">  <tspan fill="#7ec8e3" font-weight="600">private final</tspan> String name;</text>
  <text xml:space="preserve" x="76" y="178" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">  <tspan fill="#7ec8e3" font-weight="600">private final</tspan> int age;</text>
  <text xml:space="preserve" x="76" y="200" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">  <tspan fill="#9aa4b8">// 생성자, getter,</tspan></text>
  <text xml:space="preserve" x="76" y="222" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">  <tspan fill="#9aa4b8">// equals, hashCode,</tspan></text>
  <text xml:space="preserve" x="76" y="244" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">  <tspan fill="#9aa4b8">// toString ... 수십 줄</tspan></text>
  <text xml:space="preserve" x="76" y="266" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">}</text>
  <text xml:space="preserve" x="76" y="300" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#9aa4b8">// record로 줄어들긴 했다</text>

  <text x="460" y="92" font-size="16" font-weight="600" fill="#7ec8e3">Kotlin</text>
  <rect x="460" y="106" width="360" height="216" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="476" y="134" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">data class</tspan> User(</text>
  <text xml:space="preserve" x="476" y="156" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">    <tspan fill="#7ec8e3" font-weight="600">val</tspan> name: String,</text>
  <text xml:space="preserve" x="476" y="178" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">    <tspan fill="#7ec8e3" font-weight="600">val</tspan> age: Int</text>
  <text xml:space="preserve" x="476" y="200" font-size="13" font-family="'JetBrains Mono','Menlo','Consolas',monospace" fill="#ffffff">)</text>
