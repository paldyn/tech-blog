<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">&amp;&amp; 연산자 함정 — 0 렌더링</text>

  <rect x="60" y="76" width="360" height="240" rx="8" fill="#1a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="240" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">잘못된 코드 — 0이 화면에 나타남</text>
  <rect x="80" y="112" width="320" height="120" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="136" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan> [count, setCount] = useState(</tspan><tspan fill="#b5cea8">0</tspan><tspan>);</tspan>
  </text>
  <text x="100" y="156" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan> (</tspan>
  </text>
  <text x="100" y="176" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">
    <tspan>  &lt;div&gt;</tspan>
  </text>
  <text x="100" y="196" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">
    <tspan>    {count &amp;&amp; &lt;Badge&gt;{count}&lt;/Badge&gt;}</tspan>
  </text>
  <text x="100" y="216" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">
    <tspan>  &lt;/div&gt;</tspan>
  </text>
  <text x="80" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">count=0 → 0 &amp;&amp; ... → 0 을 렌더</text>
  <text x="80" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">화면에 "0"이 나타남!</text>
  <text x="80" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">React는 숫자를 렌더하기 때문</text>

  <rect x="460" y="76" width="360" height="240" rx="8" fill="#0d1a10" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">올바른 코드 — 명시적 Boolean 변환</text>
  <rect x="480" y="112" width="320" height="120" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="500" y="136" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan fill="#9aa4b8">{/* 방법 1: !!로 boolean 변환 */}</tspan>
  </text>
  <text x="500" y="156" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">
    <tspan>  {!!count &amp;&amp; &lt;Badge&gt;{count}&lt;/Badge&gt;}</tspan>
  </text>
  <text x="500" y="184" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">
    <tspan fill="#9aa4b8">{/* 방법 2: 삼항 연산자 */}</tspan>
  </text>
  <text x="500" y="204" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">
    <tspan>  {count &gt; 0 ? &lt;Badge&gt;{count}&lt;/Badge&gt; : </tspan><tspan fill="#7ec8e3" font-weight="600">null</tspan><tspan>}</tspan>
  </text>
  <text x="480" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">count=0 → !!0 = false → 아무것도 렌더 안 함</text>
  <text x="480" y="278" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">숫자, 빈 문자열에 주의. Boolean()이 안전</text>
  <text x="480" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">문자열/불린만 사용 시에는 &amp;&amp; 안전</text>
</svg>
