<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">동적 스타일 적용 패턴</text>

  <!-- Pattern 1: Condition Style -->
  <rect x="60" y="72" width="240" height="160" rx="8" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="180" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">조건부 스타일 변경</text>
  <text x="180" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">값에 따라 색상 변경</text>

  <!-- Example: good / bad -->
  <rect x="80" y="128" width="80" height="28" rx="4" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="120" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">양수: 녹색</text>

  <rect x="168" y="128" width="80" height="28" rx="4" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="208" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">음수: 빨강</text>

  <rect x="80" y="164" width="168" height="28" rx="4" fill="#1a1a0d" stroke="#b5cea8" stroke-width="1.5"/>
  <text x="164" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#b5cea8" text-anchor="middle">중립: 기본색</text>

  <text x="80" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">set_color("#55c555")</text>
  <text x="80" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">set_background()</text>

  <!-- Pattern 2: cssclass switch -->
  <rect x="320" y="72" width="240" height="160" rx="8" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="440" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">cssclass 전환</text>
  <text x="440" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ESS 클래스로 상태 전환</text>

  <rect x="340" y="128" width="200" height="28" rx="4" fill="#0d1523" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="147" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">set_cssclass("btn_primary")</text>

  <rect x="340" y="164" width="200" height="28" rx="4" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc" text-anchor="middle">set_cssclass("btn_warning")</text>

  <text x="340" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">테마 전환 영향 받음</text>
  <text x="340" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">재사용성 높음</text>

  <!-- Pattern 3: Grid cell style -->
  <rect x="580" y="72" width="240" height="160" rx="8" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="700" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">그리드 셀 동적 스타일</text>
  <text x="700" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ongetcellstyle 이벤트</text>

  <rect x="600" y="128" width="200" height="28" rx="4" fill="#0d1a0d" stroke="#55c555" stroke-width="1"/>
  <text x="700" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555" text-anchor="middle">값 > 0 → 녹색</text>
  <text x="700" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#555" text-anchor="middle">e.color = "#55c555"</text>

  <rect x="600" y="164" width="200" height="28" rx="4" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="700" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555" text-anchor="middle">값 < 0 → 빨강</text>
  <text x="700" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="9" fill="#555" text-anchor="middle">e.color = "#e05555"</text>

  <text x="600" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">행/열 단위 세밀한 제어</text>
  <text x="600" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">렌더링마다 호출됨</text>

  <!-- Code box bottom -->
  <rect x="60" y="256" width="760" height="180" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="278" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 그리드 ongetcellstyle — 값에 따라 셀 색상 변경</text>
  <text x="80" y="298" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan>
    <tspan fill="#ffffff"> grd_ongetcellstyle(obj, e) {</tspan>
  </text>
  <text x="80" y="318" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  if</tspan>
    <tspan fill="#ffffff"> (e.datarow &lt; </tspan>
    <tspan fill="#b5cea8">0</tspan>
    <tspan fill="#ffffff"> || e.band !== </tspan>
    <tspan fill="#ce9178">"body"</tspan>
    <tspan fill="#ffffff">) </tspan>
    <tspan fill="#7ec8e3" font-weight="600">return</tspan>
    <tspan fill="#ffffff">;</tspan>
  </text>
  <text x="80" y="338" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  var</tspan>
    <tspan fill="#ffffff"> nVal = obj.getBindDataset().getColumn(e.datarow, </tspan>
    <tspan fill="#ce9178">"AMT"</tspan>
    <tspan fill="#ffffff">);</tspan>
  </text>
  <text x="80" y="358" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  if</tspan>
    <tspan fill="#ffffff"> (nVal > </tspan>
    <tspan fill="#b5cea8">0</tspan>
    <tspan fill="#ffffff">) e.color = </tspan>
    <tspan fill="#ce9178">"#55c555"</tspan>
    <tspan fill="#ffffff">;</tspan>
  </text>
  <text x="80" y="378" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  else if</tspan>
    <tspan fill="#ffffff"> (nVal &lt; </tspan>
    <tspan fill="#b5cea8">0</tspan>
    <tspan fill="#ffffff">) e.color = </tspan>
    <tspan fill="#ce9178">"#e05555"</tspan>
    <tspan fill="#ffffff">;</tspan>
  </text>
  <text x="80" y="398" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">}</tspan>
  </text>
  <text x="80" y="418" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// e.background / e.color / e.font 등 설정 가능</text>
</svg>
