<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">cgroups 계층 구조와 컨트롤러</text>

  <!-- Root cgroup -->
  <rect x="320" y="72" width="240" height="52" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="2"/>
  <text x="440" y="100" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#7777cc" text-anchor="middle">/ (root cgroup)</text>
  <text x="440" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">/sys/fs/cgroup/</text>

  <!-- Lines from root -->
  <line x1="360" y1="124" x2="200" y2="172" stroke="#555" stroke-width="1.5"/>
  <line x1="440" y1="124" x2="440" y2="172" stroke="#555" stroke-width="1.5"/>
  <line x1="520" y1="124" x2="680" y2="172" stroke="#555" stroke-width="1.5"/>

  <!-- system.slice -->
  <rect x="100" y="172" width="200" height="48" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="2"/>
  <text x="200" y="198" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555" text-anchor="middle">system.slice</text>
  <text x="200" y="214" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">시스템 서비스</text>

  <!-- user.slice -->
  <rect x="340" y="172" width="200" height="48" rx="8" fill="#0a1020" stroke="#7ec8e3" stroke-width="2"/>
