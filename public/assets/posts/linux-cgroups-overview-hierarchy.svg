  <line x1="160" y1="220" x2="130" y2="264" stroke="#555" stroke-width="1.5"/>
  <line x1="200" y1="220" x2="200" y2="264" stroke="#555" stroke-width="1.5"/>
  <line x1="240" y1="220" x2="270" y2="264" stroke="#555" stroke-width="1.5"/>

  <rect x="60" y="264" width="140" height="44" rx="6" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="130" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">nginx.service</text>
  <text x="130" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">PID: 1234</text>

  <rect x="130" y="264" width="140" height="44" rx="6" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="200" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">sshd.service</text>
  <text x="200" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">PID: 2345</text>

  <rect x="200" y="264" width="140" height="44" rx="6" fill="#111" stroke="#55c555" stroke-width="1"/>
  <text x="270" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">docker.service</text>
  <text x="270" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">PID: 3456</text>

