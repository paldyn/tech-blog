  <rect x="468" y="374" width="110" height="88" rx="6" fill="#111" stroke="#7777cc"/>
  <text x="523" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">pids</text>
  <text x="523" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">pids.max</text>
  <text x="523" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">pids.current</text>
  <text x="523" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">fork 폭탄 방지</text>

  <!-- cpuset -->
  <rect x="594" y="374" width="110" height="88" rx="6" fill="#111" stroke="#888"/>
  <text x="649" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">cpuset</text>
  <text x="649" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">cpuset.cpus</text>
  <text x="649" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">cpuset.mems</text>
  <text x="649" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">CPU 코어 고정</text>

  <!-- net_cls -->
  <rect x="720" y="374" width="80" height="88" rx="6" fill="#111" stroke="#888"/>
  <text x="760" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#888" text-anchor="middle">net_cls</text>
  <text x="760" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">네트워크</text>
  <text x="760" y="438" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">트래픽</text>
  <text x="760" y="458" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">분류</text>
