<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">엑셀 이미지 삽입 흐름 — Apache POI</text>

  <!-- Step boxes -->
  <!-- Step 1 -->
  <rect x="60" y="80" width="180" height="64" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="150" y="107" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">①</text>
  <text x="150" y="127" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">이미지 파일 읽기</text>
  <text x="150" y="143" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">FileInputStream / URL</text>

  <!-- Arrow 1→2 -->
  <line x1="240" y1="112" x2="278" y2="112" stroke="#555" stroke-width="1.5"/>
  <polygon points="278,107 290,112 278,117" fill="#555"/>

  <!-- Step 2 -->
  <rect x="290" y="80" width="200" height="64" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="390" y="107" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">②</text>
  <text x="390" y="127" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Workbook에 추가</text>
  <text x="390" y="143" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">addPicture(bytes, PICTURE_TYPE)</text>

  <!-- Arrow 2→3 -->
  <line x1="490" y1="112" x2="528" y2="112" stroke="#555" stroke-width="1.5"/>
  <polygon points="528,107 540,112 528,117" fill="#555"/>

  <!-- Step 3 -->
  <rect x="540" y="80" width="200" height="64" rx="8" fill="#111827" stroke="#1e2433"/>
  <text x="640" y="107" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">③</text>
  <text x="640" y="127" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Drawing + Anchor</text>
  <text x="640" y="143" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">createDrawingPatriarch()</text>

  <!-- Arrow 3→4 -->
  <line x1="740" y1="112" x2="778" y2="112" stroke="#555" stroke-width="1.5"/>
  <polygon points="778,107 790,112 778,117" fill="#555"/>

  <!-- Step 4 -->
  <rect x="60" y="200" width="760" height="64" rx="8" fill="#111827" stroke="#7777cc"/>
  <text x="440" y="225" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">④ createPicture(anchor, pictureIndex) → 시트에 그림 삽입</text>
  <text x="440" y="251" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">anchor.setCol1 / setRow1 / setDx1 / setDy1 — 셀 좌표 기준 위치 지정</text>

  <!-- Code block -->
  <rect x="60" y="300" width="760" height="148" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="76" y="323" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// POI 이미지 삽입 핵심 코드</text>
  <text x="76" y="341" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">byte</text><text x="118" y="341" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">[] imgBytes = IOUtils.toByteArray(imgStream);</text>
  <text x="76" y="359" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">int</text><text x="104" y="359" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve"> picIdx = wb.addPicture(imgBytes, Workbook.PICTURE_TYPE_PNG);</text>
  <text x="76" y="377" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">Drawing&lt;?&gt; drawing = sheet.createDrawingPatriarch();</text>
  <text x="76" y="395" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">ClientAnchor anchor = wb.getCreationHelper().createClientAnchor();</text>
  <text x="76" y="413" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">anchor.setCol1(</text><text x="196" y="413" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">1</text><text x="204" y="413" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">); anchor.setRow1(</text><text x="336" y="413" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#b5cea8" xml:space="preserve">2</text><text x="344" y="413" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">);</text>
  <text x="76" y="431" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">drawing.createPicture(anchor, picIdx);</text>
</svg>
