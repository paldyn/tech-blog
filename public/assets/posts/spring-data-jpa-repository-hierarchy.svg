<svg xmlns="http://www.w3.org/2000/svg" width="880" height="590" viewBox="0 0 880 590">
  <rect width="880" height="590" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#ffffff">
    Spring Data JPA Repository 계층 구조
  </text>
  <text x="440" y="72" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" fill="#e8e8e8">
    하위 인터페이스는 상위의 모든 메서드를 포함합니다
  </text>

  <!-- Box 1: Repository -->
  <rect x="220" y="96" width="440" height="52" rx="8" fill="#16162a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="118" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#c4b5fd">
    Repository&lt;T, ID&gt;
  </text>
  <text x="440" y="138" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">
    마커 인터페이스 — 제공 메서드 없음
  </text>

  <!-- Arrow 1 -->
  <line x1="440" y1="152" x2="440" y2="174" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="440,180 433,168 447,168" fill="#7ec8e3"/>
  <text x="456" y="170"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">
    extends
  </text>

  <!-- Box 2: CrudRepository -->
  <rect x="220" y="184" width="440" height="64" rx="8" fill="#0f1e2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="207" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">
    CrudRepository&lt;T, ID&gt;
  </text>
  <text x="440" y="227" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">
    save · findById · findAll · delete · count · existsById
  </text>

  <!-- Arrow 2 -->
  <line x1="440" y1="252" x2="440" y2="270" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="440,276 433,264 447,264" fill="#7ec8e3"/>
  <text x="456" y="266"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">
    extends
  </text>

  <!-- Box 3: ListCrudRepository -->
  <rect x="220" y="280" width="440" height="64" rx="8" fill="#0f1e2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="303" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">
    ListCrudRepository&lt;T, ID&gt;
  </text>
  <text x="440" y="323" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">
    findAll() → List&lt;T&gt; 반환 추가 (Spring Data 3.0+)
  </text>

  <!-- Arrow 3 -->
  <line x1="440" y1="348" x2="440" y2="366" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="440,372 433,360 447,360" fill="#7ec8e3"/>
  <text x="456" y="362"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">
    extends
  </text>

  <!-- Box 4: PagingAndSortingRepository -->
  <rect x="220" y="376" width="440" height="64" rx="8" fill="#0f1e2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="399" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">
    PagingAndSortingRepository&lt;T, ID&gt;
  </text>
  <text x="440" y="419" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">
    findAll(Sort) · findAll(Pageable) 추가
  </text>

  <!-- Arrow 4 -->
  <line x1="440" y1="444" x2="440" y2="462" stroke="#55c555" stroke-width="2"/>
  <polygon points="440,468 433,456 447,456" fill="#55c555"/>
  <text x="456" y="458"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">
    extends
  </text>

  <!-- Box 5: JpaRepository (highlighted) -->
  <rect x="220" y="472" width="440" height="68" rx="8" fill="#0d2010" stroke="#55c555" stroke-width="2"/>
  <text x="400" y="495" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">
    JpaRepository&lt;T, ID&gt;
  </text>
  <text x="400" y="515" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">
    flush · saveAndFlush · deleteAllInBatch · getReferenceById
  </text>
  <!-- Badge -->
  <rect x="596" y="481" width="52" height="20" rx="4" fill="#1a3a1a" stroke="#55c555" stroke-width="1"/>
  <text x="622" y="495" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">
    실무 권장
  </text>

  <!-- Legend -->
  <rect x="220" y="556" width="14" height="14" rx="2" fill="#16162a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="567"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">
    마커/상위
  </text>
  <rect x="320" y="556" width="14" height="14" rx="2" fill="#0f1e2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="340" y="567"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">
    범용 CRUD/페이징
  </text>
  <rect x="464" y="556" width="14" height="14" rx="2" fill="#0d2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="484" y="567"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">
    JPA 특화 (실무 주력)
  </text>
</svg>
