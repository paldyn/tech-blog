<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">파일 디스크립터 한도 계층</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">시스템 → 사용자 → 프로세스 3단계 한도</text>

  <!-- System level -->
  <rect x="200" y="88" width="480" height="60" rx="8" fill="#0d1a2e" stroke="#3a6ea8" stroke-width="2"/>
  <text x="440" y="112" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">시스템 전체 한도</text>
  <text x="440" y="134" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">/proc/sys/fs/file-max  (sysctl fs.file-max)</text>

  <line x1="440" y1="148" x2="440" y2="175" stroke="#3a6ea8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- User level -->
  <rect x="200" y="175" width="480" height="60" rx="8" fill="#1a2a1a" stroke="#3a7a3a" stroke-width="1.5"/>
  <text x="440" y="199" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">사용자 한도</text>
  <text x="440" y="219" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">/etc/security/limits.conf  (PAM ulimit)</text>

  <line x1="440" y1="235" x2="440" y2="262" stroke="#3a7a3a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Process level -->
  <rect x="200" y="262" width="480" height="60" rx="8" fill="#1a1a2a" stroke="#5a5a9a" stroke-width="1.5"/>
  <text x="440" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">프로세스 한도</text>
  <text x="440" y="306" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">ulimit -n  /  /proc/{PID}/limits</text>

  <!-- systemd service level note -->
  <rect x="200" y="349" width="480" height="60" rx="8" fill="#1a2a2a" stroke="#3a6a6a" stroke-width="1"/>
  <text x="440" y="373" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">systemd 서비스 전용</text>
  <text x="440" y="393" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">[Service] LimitNOFILE=65536  (limits.conf 무시됨)</text>

  <line x1="440" y1="322" x2="440" y2="349" stroke="#3a6a6a" stroke-width="1" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <!-- Values table -->
  <rect x="60" y="430" width="760" height="36" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">기본값: soft=1024  hard=4096  권장: 65536~1048576  (soft=hard 설정 시 명시적 적용)</text>
</svg>
