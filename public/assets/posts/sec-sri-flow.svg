<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>
  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SRI — 서브리소스 무결성 동작 원리</text>

  <!-- CDN 공급망 공격 시나리오 -->
  <text x="440" y="82" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">CDN 공급망 공격 → SRI로 방어</text>

  <!-- 공격자 -->
  <rect x="60" y="100" width="140" height="52" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="130" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">공격자</text>
  <text x="130" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">CDN 파일 변조</text>

  <!-- CDN -->
  <rect x="260" y="100" width="140" height="52" rx="8" fill="#1a1a0a" stroke="#e8883a" stroke-width="1.5"/>
  <text x="330" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8883a" text-anchor="middle">CDN 서버</text>
  <text x="330" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">변조된 파일 호스팅</text>

  <!-- 브라우저 -->
  <rect x="460" y="100" width="140" height="52" rx="8" fill="#0a0a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="530" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3" text-anchor="middle">브라우저</text>
  <text x="530" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">SRI 검증 실행</text>

  <line x1="200" y1="126" x2="258" y2="126" stroke="#e05555" stroke-width="2" marker-end="url(#arr-r)"/>
  <line x1="400" y1="126" x2="458" y2="126" stroke="#e8883a" stroke-width="2" marker-end="url(#arr)"/>

  <!-- SRI 없음 → 실행됨 -->
  <rect x="660" y="100" width="160" height="52" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="740" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e05555" text-anchor="middle">SRI 없으면</text>
  <text x="740" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">악성 코드 실행됨</text>

  <line x1="600" y1="114" x2="658" y2="114" stroke="#e05555" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr-r)"/>
  <text x="629" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#e05555" text-anchor="middle">SRI 없음</text>

  <!-- SRI 있음 → 차단됨 -->
  <rect x="660" y="168" width="160" height="52" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="740" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">SRI 있으면</text>
  <text x="740" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">해시 불일치 → 차단</text>

  <line x1="600" y1="152" x2="658" y2="190" stroke="#55c555" stroke-width="2" marker-end="url(#arr-g)"/>
  <text x="629" y="164" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555" text-anchor="middle">SRI 있음</text>

  <!-- SRI 코드 블록 -->
  <rect x="60" y="245" width="760" height="160" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="267" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">&lt;!-- integrity: sha384- + base64 해시 --&gt;</text>
  <text x="76" y="287" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">&lt;</text>
  <text x="87" y="287" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">script</text>
  <text x="137" y="287" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> src=</text>
  <text x="175" y="287" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">"https://cdn.example.com/lib.js"</text>
  <text x="76" y="307" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  integrity=</text>
  <text x="163" y="307" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">"sha384-oqVuAfXRKap7fdg..."</text>
  <text x="76" y="327" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">  crossorigin=</text>
  <text x="190" y="327" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178">"anonymous"</text>
  <text x="76" y="347" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">&gt;&lt;/</text>
  <text x="108" y="347" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" font-weight="600" fill="#7ec8e3">script</text>
  <text x="158" y="347" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">&gt;</text>
  <text x="250" y="347" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// crossorigin 없으면 SRI 검증 불가</text>
  <text x="76" y="393" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">// 해시 생성: openssl dgst -sha384 -binary lib.js | openssl base64 -A</text>
</svg>
