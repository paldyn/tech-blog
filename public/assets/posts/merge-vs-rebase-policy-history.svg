<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-b" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-g" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-o" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e0955e"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">Merge vs Squash vs Rebase — 히스토리 비교</text>

  <!-- Dividers -->
  <line x1="293" y1="64" x2="293" y2="490" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="586" y1="64" x2="586" y2="490" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Column headers -->
  <text x="146" y="76" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">Merge Commit</text>
  <text x="440" y="76" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e0955e">Squash and Merge</text>
  <text x="733" y="76" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#9988dd">Rebase and Merge</text>

  <!-- ===== Merge Commit ===== -->
  <!-- main line -->
  <line x1="40" y1="200" x2="260" y2="200" stroke="#7ec8e3" stroke-width="2" stroke-opacity="0.4"/>
  <!-- feature branch -->
  <line x1="100" y1="200" x2="120" y2="120" stroke="#e0955e" stroke-width="1.5"/>
  <line x1="120" y1="120" x2="220" y2="120" stroke="#e0955e" stroke-width="1.5"/>
  <line x1="220" y1="120" x2="240" y2="200" stroke="#e0955e" stroke-width="1.5" marker-end="url(#arr-b)"/>

  <!-- commits on feature -->
  <circle cx="155" cy="120" r="6" fill="#e0955e"/>
  <text x="155" y="106" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#e0955e">A</text>
  <circle cx="200" cy="120" r="6" fill="#e0955e"/>
  <text x="200" y="106" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#e0955e">B</text>

  <!-- commits on main -->
  <circle cx="100" cy="200" r="6" fill="#7ec8e3"/>
  <text x="100" y="216" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#7ec8e3">base</text>
  <circle cx="240" cy="200" r="6" fill="#7ec8e3" stroke="#ffffff" stroke-width="2"/>
  <text x="240" y="216" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#7ec8e3">M</text>

  <!-- Result log -->
  <rect x="40" y="244" width="238" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="56" y="264" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3" font-weight="600">* M</text>
  <text x="80" y="264" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff"> Merge feature</text>
  <text x="56" y="282" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888">|\ </text>
  <text x="56" y="300" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#e0955e">| * B</text>
  <text x="96" y="300" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff"> 기능 B</text>
  <text x="56" y="318" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#e0955e">| * A</text>
  <text x="96" y="318" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff"> 기능 A</text>
  <text x="56" y="336" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3">* base commit</text>

  <!-- Characteristics -->
  <rect x="40" y="358" width="238" height="100" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="56" y="378"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">+ 완전한 히스토리 보존</text>
  <text x="56" y="396"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">+ 브랜치 분기 시점 명확</text>
  <text x="56" y="414"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">- 비선형 그래프, 복잡</text>
  <text x="56" y="432"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">- 머지 커밋 노이즈</text>
  <text x="56" y="450"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">기본값, 가장 안전</text>

  <!-- ===== Squash and Merge ===== -->
  <!-- main line -->
  <line x1="307" y1="200" x2="570" y2="200" stroke="#7ec8e3" stroke-width="2" stroke-opacity="0.4"/>
  <!-- feature -->
  <line x1="370" y1="200" x2="390" y2="120" stroke="#e0955e" stroke-width="1.5"/>
  <line x1="390" y1="120" x2="490" y2="120" stroke="#e0955e" stroke-width="1.5"/>

  <circle cx="430" cy="120" r="6" fill="#e0955e"/>
  <text x="430" y="106" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#e0955e">A</text>
  <circle cx="475" cy="120" r="6" fill="#e0955e"/>
  <text x="475" y="106" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#e0955e">B</text>

  <!-- squash arrow -->
  <path d="M 430 120 Q 460 160 510 200" stroke="#e0955e" stroke-width="1.5" fill="none" stroke-dasharray="3,3" marker-end="url(#arr-o)"/>

  <circle cx="370" cy="200" r="6" fill="#7ec8e3"/>
  <circle cx="510" cy="200" r="6" fill="#e0955e" stroke="#ffffff" stroke-width="2"/>
  <text x="510" y="216" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#e0955e">AB</text>

  <!-- Result log -->
  <rect x="307" y="244" width="268" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="323" y="264" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#e0955e" font-weight="600">* AB</text>
  <text x="351" y="264" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff"> feat: 기능 추가 (squash)</text>
  <text x="323" y="282" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3">* base commit</text>
  <text x="323" y="310" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8"># A, B 커밋이 하나로 합쳐짐</text>
  <text x="323" y="328" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8"># 선형 히스토리 유지</text>

  <!-- Characteristics -->
  <rect x="307" y="358" width="268" height="100" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="323" y="378"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">+ 선형 히스토리</text>
  <text x="323" y="396"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">+ PR 단위 1 커밋</text>
  <text x="323" y="414"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">- 개별 커밋 히스토리 소실</text>
  <text x="323" y="432"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">- 커밋 메시지 정제 필요</text>
  <text x="323" y="450"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">작은 PR 중심 팀에 적합</text>

  <!-- ===== Rebase and Merge ===== -->
  <!-- main line -->
  <line x1="600" y1="200" x2="860" y2="200" stroke="#7ec8e3" stroke-width="2" stroke-opacity="0.4"/>
  <!-- feature -->
  <line x1="650" y1="200" x2="670" y2="120" stroke="#9988dd" stroke-width="1.5"/>
  <line x1="670" y1="120" x2="780" y2="120" stroke="#9988dd" stroke-width="1.5"/>

  <circle cx="710" cy="120" r="6" fill="#9988dd"/>
  <text x="710" y="106" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#9988dd">A</text>
  <circle cx="755" cy="120" r="6" fill="#9988dd"/>
  <text x="755" y="106" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#9988dd">B</text>

  <!-- rebase arrows (A' B' on main) -->
  <path d="M 710 120 Q 730 160 760 200" stroke="#9988dd" stroke-width="1.5" fill="none" stroke-dasharray="3,3"/>
  <path d="M 755 120 Q 780 160 810 200" stroke="#9988dd" stroke-width="1.5" fill="none" stroke-dasharray="3,3" marker-end="url(#arr-g)"/>

  <circle cx="650" cy="200" r="6" fill="#7ec8e3"/>
  <circle cx="760" cy="200" r="6" fill="#9988dd"/>
  <text x="760" y="216" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#9988dd">A'</text>
  <circle cx="810" cy="200" r="6" fill="#9988dd"/>
  <text x="810" y="216" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#9988dd">B'</text>

  <!-- Result log -->
  <rect x="600" y="244" width="262" height="100" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="616" y="264" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9988dd" font-weight="600">* B'</text>
  <text x="644" y="264" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff"> 기능 B</text>
  <text x="616" y="282" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9988dd" font-weight="600">* A'</text>
  <text x="644" y="282" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#ffffff"> 기능 A</text>
  <text x="616" y="300" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#7ec8e3">* base commit</text>
  <text x="616" y="328" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8"># SHA 변경, 선형 유지</text>

  <!-- Characteristics -->
  <rect x="600" y="358" width="262" height="100" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="616" y="378"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">+ 선형 + 개별 커밋 보존</text>
  <text x="616" y="396"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">+ 머지 커밋 없음</text>
  <text x="616" y="414"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">- SHA 변경 (force push 불가)</text>
  <text x="616" y="432"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">- 커밋 품질 관리 필요</text>
  <text x="616" y="450"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">커밋 메시지 엄격 관리 팀</text>
</svg>
