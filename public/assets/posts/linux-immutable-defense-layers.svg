<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">불변 파일 보호 계층</text>
  <text x="440" y="68" text-anchor="middle" font-size="14" fill="#888">여러 방어 계층을 조합한 심층 방어(Defence in Depth)</text>

  <!-- Layer 1: Permissions -->
  <rect x="160" y="84" width="560" height="46" rx="6" fill="#1a1a2a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="101" text-anchor="middle" font-size="13" font-weight="600" fill="#7777cc">1단계: 파일 권한 (chmod/chown)</text>
  <text x="440" y="120" text-anchor="middle" font-size="12" fill="#888">소유자·그룹·기타 rwx 비트로 일반 사용자 접근 제어</text>

  <!-- Arrow -->
  <line x1="440" y1="130" x2="440" y2="148" stroke="#555" stroke-width="2"/>
  <polygon points="435,148 440,158 445,148" fill="#555"/>

  <!-- Layer 2: Special bits / ACL -->
  <rect x="120" y="158" width="640" height="46" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="175" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555">2단계: ACL · 특수 비트 (setfacl/SUID/SGID)</text>
  <text x="440" y="194" text-anchor="middle" font-size="12" fill="#888">개별 사용자·그룹 세밀 제어 · 권한 상승 제한</text>

  <!-- Arrow -->
  <line x1="440" y1="204" x2="440" y2="222" stroke="#555" stroke-width="2"/>
  <polygon points="435,222 440,232 445,222" fill="#555"/>

  <!-- Layer 3: chattr +i -->
  <rect x="80" y="232" width="720" height="46" rx="6" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="249" text-anchor="middle" font-size="13" font-weight="600" fill="#e05555">3단계: 파일 속성 (chattr +i / +a)</text>
  <text x="440" y="268" text-anchor="middle" font-size="12" fill="#888">root도 수정 불가 · 로그 추가 전용 · 커널 레벨 보호</text>

  <!-- Arrow -->
  <line x1="440" y1="278" x2="440" y2="296" stroke="#555" stroke-width="2"/>
  <polygon points="435,296 440,306 445,296" fill="#555"/>

  <!-- Layer 4: ro mount / LUKS -->
  <rect x="60" y="306" width="760" height="46" rx="6" fill="#0a1a2a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="323" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">4단계: 읽기 전용 마운트 · 디스크 암호화 (LUKS)</text>
  <text x="440" y="342" text-anchor="middle" font-size="12" fill="#888">파티션 자체를 ro 마운트 · 물리 접근 시에도 암호화로 보호</text>

  <!-- Files protected -->
  <rect x="60" y="368" width="760" height="24" rx="6" fill="#141622"/>
  <text x="440" y="384" text-anchor="middle" font-size="12" fill="#888">대상: /etc/ssh/ · /etc/sudoers · 감사 로그 · 커널 파라미터 · 부트 이미지</text>
</svg>
