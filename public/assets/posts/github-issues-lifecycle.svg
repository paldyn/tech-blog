<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 300">
  <rect width="880" height="300" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#9988dd"/>
    </marker>
  </defs>

  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">이슈에서 머지까지, 자동으로 닫히는 흐름</text>
  <text x="440" y="70" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">PR 본문의 Closes #38 키워드가 머지 시 이슈를 닫는다</text>

  <!-- Issue open -->
  <rect x="56" y="140" width="190" height="74" rx="10" fill="#101010" stroke="#55c555" stroke-width="1.5"/>
  <text x="151" y="172" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">Issue #38 생성</text>
  <text x="151" y="194" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">버그·작업 등록</text>

  <line x1="246" y1="177" x2="316" y2="177" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- PR -->
  <rect x="318" y="140" width="190" height="74" rx="10" fill="#101010" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="413" y="172" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">PR #42</text>
  <text x="413" y="194" text-anchor="middle"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888">body: Closes #38</text>

  <line x1="508" y1="177" x2="578" y2="177" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <!-- Merge -->
  <rect x="580" y="140" width="240" height="74" rx="10" fill="#16122a" stroke="#9988dd" stroke-width="1.5"/>
  <text x="700" y="172" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#9988dd">PR 머지 = 이슈 자동 Close</text>
  <text x="700" y="194" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">#38이 closed로 전환</text>

  <text x="440" y="262" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12.5" fill="#888">키워드: close / closes / closed / fix / fixes / fixed / resolve / resolves / resolved</text>
</svg>
