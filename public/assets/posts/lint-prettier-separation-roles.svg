<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">ESLint vs Prettier — 역할 분리</text>

  <!-- ESLint section -->
  <rect x="60" y="68" width="360" height="280" rx="10" fill="#0a1020" stroke="#7ec8e3" stroke-width="2"/>
  <text x="240" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">ESLint</text>
  <text x="240" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">코드 품질 분석기 (Linter)</text>

  <rect x="80" y="130" width="320" height="34" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="90" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓ 버그 가능성 탐지 (no-undef, no-unreachable)</text>

  <rect x="80" y="170" width="320" height="34" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="90" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓ 코드 스타일 규칙 (eqeqeq, prefer-const)</text>

  <rect x="80" y="210" width="320" height="34" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="90" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓ 플러그인 확장 (React, accessibility)</text>

  <rect x="80" y="250" width="320" height="34" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="90" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓ AST 기반 의미 분석</text>

  <rect x="80" y="290" width="320" height="34" rx="6" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="90" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">✗ 포맷팅 → Prettier가 더 일관적</text>

  <!-- Prettier section -->
  <rect x="460" y="68" width="360" height="280" rx="10" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="640" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555">Prettier</text>
  <text x="640" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">의견 있는 코드 포맷터</text>

  <rect x="480" y="130" width="320" height="34" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="490" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓ 줄 길이·들여쓰기·따옴표 자동 포맷</text>

  <rect x="480" y="170" width="320" height="34" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="490" y="192" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓ 저장 시 자동 포맷 (editor 통합)</text>

  <rect x="480" y="210" width="320" height="34" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="490" y="232" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓ 팀 전체 일관된 스타일 강제</text>

  <rect x="480" y="250" width="320" height="34" rx="6" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="490" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">✓ 설정 최소화 (의견 있는 기본값)</text>

  <rect x="480" y="290" width="320" height="34" rx="6" fill="#1a0d0d" stroke="#e05555" stroke-width="1"/>
  <text x="490" y="312" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">✗ 코드 품질 분석 불가</text>

  <!-- Integration section -->
  <text x="60" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">공존 전략</text>

  <rect x="60" y="388" width="760" height="76" rx="8" fill="#111827" stroke="#3a4a6e" stroke-width="1"/>
  <text x="80" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">1. eslint-config-prettier</text>
  <text x="280" y="410" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">ESLint의 포맷 관련 규칙을 모두 off → 충돌 방지</text>
  <text x="80" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">2. Husky + lint-staged</text>
  <text x="280" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">커밋 전 eslint + prettier를 스테이지된 파일에만 실행</text>
  <text x="80" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">3. Biome (대안)</text>
  <text x="280" y="454" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">린터+포맷터 통합 도구 — Rust 기반, 100× 빠름, ESLint 대부분 규칙 포함</text>
</svg>
