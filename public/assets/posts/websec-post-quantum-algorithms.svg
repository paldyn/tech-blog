<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">NIST PQC 표준 알고리즘 (2024)</text>

  <!-- Table header -->
  <rect x="60" y="65" width="760" height="36" rx="6" fill="#141a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="170" y="89" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">알고리즘</text>
  <text x="310" y="89" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">FIPS 번호</text>
  <text x="430" y="89" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">용도</text>
  <text x="570" y="89" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">수학적 기반</text>
  <text x="730" y="89" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">특징</text>

  <!-- ML-KEM (Kyber) -->
  <rect x="60" y="105" width="760" height="54" rx="0" fill="#0f1520" stroke="#2a3a5e" stroke-width="1"/>
  <text x="170" y="127" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">ML-KEM</text>
  <text x="170" y="145" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">(Kyber)</text>
  <text x="310" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">FIPS 203</text>
  <text x="430" y="127" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">키 캡슐화(KEM)</text>
  <text x="430" y="145" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">TLS 키 교환 대체</text>
  <text x="570" y="136" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Module-Lattice</text>
  <text x="730" y="127" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">키 크기 작음</text>
  <text x="730" y="145" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">성능 우수</text>

  <!-- ML-DSA (Dilithium) -->
  <rect x="60" y="159" width="760" height="54" rx="0" fill="#111820" stroke="#2a3a5e" stroke-width="1"/>
  <text x="170" y="181" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">ML-DSA</text>
  <text x="170" y="199" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">(Dilithium)</text>
  <text x="310" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">FIPS 204</text>
  <text x="430" y="181" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">디지털 서명</text>
  <text x="430" y="199" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">코드 서명, 인증서</text>
  <text x="570" y="190" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Module-Lattice</text>
  <text x="730" y="181" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">주력 서명 알고리즘</text>
  <text x="730" y="199" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">빠른 서명/검증</text>

  <!-- SLH-DSA (SPHINCS+) -->
  <rect x="60" y="213" width="760" height="54" rx="0" fill="#0f1520" stroke="#2a3a5e" stroke-width="1"/>
  <text x="170" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#ce9178">SLH-DSA</text>
  <text x="170" y="253" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">(SPHINCS+)</text>
  <text x="310" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">FIPS 205</text>
  <text x="430" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">디지털 서명</text>
  <text x="430" y="253" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">펌웨어, 장기 보존</text>
  <text x="570" y="244" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">Hash-based</text>
  <text x="730" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#ce9178">서명 크기 큼</text>
  <text x="730" y="253" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">보수적 보안 가정</text>

  <!-- FN-DSA (FALCON) -->
  <rect x="60" y="267" width="760" height="54" rx="0" fill="#111820" stroke="#2a3a5e" stroke-width="1"/>
  <text x="170" y="289" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">FN-DSA</text>
  <text x="170" y="307" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">(FALCON)</text>
  <text x="310" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">FIPS 206</text>
  <text x="430" y="289" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">디지털 서명</text>
  <text x="430" y="307" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">소형 서명 필요 시</text>
  <text x="570" y="298" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8">NTRU-Lattice</text>
  <text x="730" y="289" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">서명 크기 가장 작음</text>
  <text x="730" y="307" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">구현 복잡도 높음</text>

  <!-- Hybrid mode box -->
  <rect x="60" y="342" width="760" height="72" rx="8" fill="#1a1a2e" stroke="#3a3a6e" stroke-width="1"/>
  <text x="440" y="367" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc">전환 전략: 하이브리드 모드 (권장)</text>
  <text x="440" y="387" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">X25519 + ML-KEM-768 (TLS 키 교환) | RSA-2048 + ML-DSA-65 (서명)</text>
  <text x="440" y="403" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">클래식 알고리즘이 아직 안전하게 보호하면서, PQC 알고리즘도 동시에 적용 — 이중 보호</text>

  <!-- Bottom note -->
  <text x="440" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">TLS 1.3은 이미 X25519Kyber768 하이브리드 지원 — Chrome 131+, cloudflare, AWS KMS 도입 완료</text>
</svg>
