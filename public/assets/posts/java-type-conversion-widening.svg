<svg width="880" height="400" viewBox="0 0 880 400" xmlns="http://www.w3.org/2000/svg"
     font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">

  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="22" font-weight="700">자동 형 확장 변환 (Widening Conversion)</text>

  <!-- ═══ Main widening chain ═══ -->
  <!-- byte box: x=50 -->
  <rect x="50" y="118" width="86" height="52" rx="7" fill="#0d1a2d" stroke="#1e3a6a" stroke-width="1.5"/>
  <text x="93" y="140" text-anchor="middle" fill="#7ec8e3" font-size="14" font-weight="700">byte</text>
  <text x="93" y="158" text-anchor="middle" fill="#888" font-size="11">8 bit</text>

  <!-- short box: x=186 -->
  <rect x="186" y="118" width="86" height="52" rx="7" fill="#0d1a2d" stroke="#1e3a6a" stroke-width="1.5"/>
  <text x="229" y="140" text-anchor="middle" fill="#7ec8e3" font-size="14" font-weight="700">short</text>
  <text x="229" y="158" text-anchor="middle" fill="#888" font-size="11">16 bit</text>

  <!-- int box: x=322 -->
  <rect x="322" y="118" width="86" height="52" rx="7" fill="#0d1a2d" stroke="#1e3a6a" stroke-width="1.5"/>
  <text x="365" y="140" text-anchor="middle" fill="#7ec8e3" font-size="14" font-weight="700">int</text>
  <text x="365" y="158" text-anchor="middle" fill="#888" font-size="11">32 bit</text>

  <!-- long box: x=458 -->
  <rect x="458" y="118" width="86" height="52" rx="7" fill="#0d1a2d" stroke="#1e3a6a" stroke-width="1.5"/>
  <text x="501" y="140" text-anchor="middle" fill="#7ec8e3" font-size="14" font-weight="700">long</text>
  <text x="501" y="158" text-anchor="middle" fill="#888" font-size="11">64 bit</text>

  <!-- float box: x=594 — warning color -->
  <rect x="594" y="118" width="86" height="52" rx="7" fill="#1a1206" stroke="#5a3a0a" stroke-width="1.5"/>
  <text x="637" y="140" text-anchor="middle" fill="#e8d070" font-size="14" font-weight="700">float</text>
  <text x="637" y="158" text-anchor="middle" fill="#888" font-size="11">32 bit</text>

  <!-- double box: x=730 -->
  <rect x="730" y="118" width="100" height="52" rx="7" fill="#0d1a2d" stroke="#1e3a6a" stroke-width="1.5"/>
  <text x="780" y="140" text-anchor="middle" fill="#7ec8e3" font-size="14" font-weight="700">double</text>
  <text x="780" y="158" text-anchor="middle" fill="#888" font-size="11">64 bit</text>

  <!-- Arrows between main chain boxes (solid polygon arrowheads) -->
  <!-- byte → short: shaft from x=136 to x=176, y=144 -->
  <line x1="136" y1="144" x2="178" y2="144" stroke="#55c555" stroke-width="2.5"/>
  <polygon points="178,138 188,144 178,150" fill="#55c555" stroke="#0a200f" stroke-width="0.8"/>

  <!-- short → int: x=272 to x=314 -->
  <line x1="272" y1="144" x2="314" y2="144" stroke="#55c555" stroke-width="2.5"/>
  <polygon points="314,138 324,144 314,150" fill="#55c555" stroke="#0a200f" stroke-width="0.8"/>

  <!-- int → long: x=408 to x=450 -->
  <line x1="408" y1="144" x2="450" y2="144" stroke="#55c555" stroke-width="2.5"/>
  <polygon points="450,138 460,144 450,150" fill="#55c555" stroke="#0a200f" stroke-width="0.8"/>

  <!-- long → float: x=544 to x=586 (warning color) -->
  <line x1="544" y1="144" x2="578" y2="144" stroke="#e0a010" stroke-width="2.5" stroke-dasharray="5,3"/>
  <polygon points="578,138 588,144 578,150" fill="#e0a010" stroke="#5a3a00" stroke-width="0.8"/>

  <!-- float → double: x=680 to x=722 -->
  <line x1="680" y1="144" x2="722" y2="144" stroke="#55c555" stroke-width="2.5"/>
  <polygon points="722,138 732,144 722,150" fill="#55c555" stroke="#0a200f" stroke-width="0.8"/>

  <!-- Warning badge on long→float arrow -->
  <rect x="553" y="104" width="64" height="24" rx="5" fill="#2a1800" stroke="#e0a010" stroke-width="1"/>
  <text x="585" y="121" text-anchor="middle" fill="#e0a010" font-size="11" font-weight="600">⚠ 정밀도 손실</text>

  <!-- ═══ char row ═══ -->
  <!-- char box: x=50, y=228 -->
  <rect x="50" y="228" width="86" height="52" rx="7" fill="#0d2018" stroke="#1a5a3a" stroke-width="1.5"/>
  <text x="93" y="250" text-anchor="middle" fill="#55c555" font-size="14" font-weight="700">char</text>
  <text x="93" y="268" text-anchor="middle" fill="#888" font-size="11">16 bit</text>

  <!-- char → int arrow (diagonal up-right) -->
  <!-- from char right center: (136, 254), to int left center: (322, 144) -->
  <!-- use path with bend to avoid going through short box area -->
  <path d="M 136,254 C 200,254 200,200 280,175 C 312,163 322,155 322,152"
        stroke="#55c555" stroke-width="2" fill="none" stroke-dasharray="4,4"/>
  <polygon points="319,143 325,155 331,143" fill="#55c555" stroke="#0a200f" stroke-width="0.8"
           transform="rotate(-10, 325, 148)"/>

  <!-- char label -->
  <text x="168" y="264" fill="#888" font-size="12">char → int 자동 확장 (UTF-16 코드값)</text>

  <!-- ═══ Legend / Notes ═══ -->
  <rect x="50" y="310" width="780" height="62" rx="7" fill="#0d1117" stroke="#1e2d45" stroke-width="1"/>

  <line x1="78" y1="330" x2="110" y2="330" stroke="#55c555" stroke-width="2.5"/>
  <polygon points="110,325 120,330 110,335" fill="#55c555" stroke="#0a200f" stroke-width="0.8"/>
  <text x="128" y="334" fill="#e8e8e8" font-size="12">안전한 자동 확장 (정밀도 손실 없음)</text>

  <line x1="78" y1="356" x2="110" y2="356" stroke="#e0a010" stroke-width="2.5" stroke-dasharray="5,3"/>
  <polygon points="110,351 120,356 110,361" fill="#e0a010" stroke="#5a3a00" stroke-width="0.8"/>
  <text x="128" y="360" fill="#e8e8e8" font-size="12">자동 확장이지만 long → float 시 유효 자릿수 손실 가능</text>

  <text x="450" y="334" fill="#888" font-size="12">* 명시적 캐스팅 불필요 (컴파일러가 자동 처리)</text>
  <text x="450" y="360" fill="#888" font-size="12">* 역방향(좁히기)은 반드시 (type) 캐스팅 필요</text>

</svg>
