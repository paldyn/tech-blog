<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arb" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="are" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="aro" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e09050"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="46"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">fetch 캐시 옵션 비교</text>

  <!-- Option 1: force-cache (default) -->
  <rect x="60" y="72" width="370" height="88" rx="8" fill="#0d1a0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="245" y="98"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">force-cache (기본값)</text>
  <text x="245" y="120"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">캐시에 있으면 반환, 없으면 fetch 후 저장</text>
  <text x="245" y="142"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">정적 렌더링 · 빌드 시 패칭</text>

  <!-- Option 2: no-store -->
  <rect x="450" y="72" width="370" height="88" rx="8" fill="#1a0d0d" stroke="#e05555" stroke-width="1.5"/>
  <text x="635" y="98"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e05555">no-store</text>
  <text x="635" y="120"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">캐시 완전 무시 — 항상 새 요청</text>
  <text x="635" y="142"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">동적 렌더링 · 매 요청마다 최신 데이터</text>

  <!-- Option 3: revalidate -->
  <rect x="60" y="180" width="370" height="88" rx="8" fill="#0d0d1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="245" y="206"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">next: { revalidate: N }</text>
  <text x="245" y="228"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">N초 후 캐시 만료 → 백그라운드 재검증</text>
  <text x="245" y="250"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">ISR (Incremental Static Regeneration)</text>

  <!-- Option 4: tags -->
  <rect x="450" y="180" width="370" height="88" rx="8" fill="#1a1000" stroke="#e09050" stroke-width="1.5"/>
  <text x="635" y="206"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e09050">next: { tags: ['tag'] }</text>
  <text x="635" y="228"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">태그로 그룹화 → revalidateTag() 호출 시 무효화</text>
  <text x="635" y="250"
        text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e09050">온디맨드 재검증 · Server Action 연동</text>

  <!-- Code block: all options example -->
  <rect x="60" y="288" width="760" height="176" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="310" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 각 캐시 옵션 사용 예시</text>
  <text x="76" y="328" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan>
    <tspan fill="#ffffff"> a = </tspan>
    <tspan fill="#7ec8e3" font-weight="600">await</tspan>
    <tspan fill="#ffffff"> fetch(url);                      </tspan>
    <tspan fill="#9aa4b8">// force-cache (기본)</tspan>
  </text>
  <text x="76" y="346" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan>
    <tspan fill="#ffffff"> b = </tspan>
    <tspan fill="#7ec8e3" font-weight="600">await</tspan>
    <tspan fill="#ffffff"> fetch(url, { cache: </tspan>
    <tspan fill="#ce9178">'no-store'</tspan>
    <tspan fill="#ffffff"> });  </tspan>
    <tspan fill="#9aa4b8">// 항상 최신</tspan>
  </text>
  <text x="76" y="364" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan>
    <tspan fill="#ffffff"> c = </tspan>
    <tspan fill="#7ec8e3" font-weight="600">await</tspan>
    <tspan fill="#ffffff"> fetch(url, { next: { revalidate: </tspan>
    <tspan fill="#b5cea8">60</tspan>
    <tspan fill="#ffffff"> } }); </tspan>
    <tspan fill="#9aa4b8">// ISR 60s</tspan>
  </text>
  <text x="76" y="382" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan>
    <tspan fill="#ffffff"> d = </tspan>
    <tspan fill="#7ec8e3" font-weight="600">await</tspan>
    <tspan fill="#ffffff"> fetch(url, { next: { tags: [</tspan>
    <tspan fill="#ce9178">'posts'</tspan>
    <tspan fill="#ffffff">] } });</tspan>
    <tspan fill="#9aa4b8"> // 태그</tspan>
  </text>
  <text x="76" y="400" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// Server Action 등에서: revalidateTag('posts')</text>
  <text x="76" y="418" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">await</tspan>
    <tspan fill="#ffffff"> revalidatePath(</tspan>
    <tspan fill="#ce9178">'/posts'</tspan>
    <tspan fill="#ffffff">); </tspan>
    <tspan fill="#9aa4b8">// 경로 단위 무효화도 가능</tspan>
  </text>
  <text x="76" y="452" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff"> </text>
</svg>
