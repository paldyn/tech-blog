<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Prometheus Kubernetes 모니터링 아키텍처</text>

  <!-- Scrape targets (left column) -->
  <rect x="60" y="80" width="160" height="50" rx="6" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="140" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">kube-apiserver</text>

  <rect x="60" y="148" width="160" height="50" rx="6" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="140" y="174" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">kubelet / cAdvisor</text>

  <rect x="60" y="216" width="160" height="50" rx="6" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1"/>
  <text x="140" y="242" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">kube-state-metrics</text>

  <rect x="60" y="284" width="160" height="50" rx="6" fill="#1a3020" stroke="#55c555" stroke-width="1"/>
  <text x="140" y="305" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">앱 /metrics</text>
  <text x="140" y="323" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">ServiceMonitor</text>

  <!-- arrows to Prometheus -->
  <line x1="220" y1="105" x2="280" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="220" y1="173" x2="280" y2="215" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="220" y1="241" x2="280" y2="230" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="220" y1="309" x2="280" y2="245" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>

  <!-- Prometheus core -->
  <rect x="280" y="140" width="180" height="160" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="370" y="165" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3" text-anchor="middle">Prometheus</text>
  <text x="370" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Pull 방식 스크랩</text>
  <rect x="296" y="198" width="148" height="32" rx="4" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="370" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#55c555" font-weight="600" text-anchor="middle">TSDB (시계열 DB)</text>
  <text x="370" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">PromQL 엔진</text>
  <text x="370" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">기본 15일 보관</text>
  <text x="370" y="284" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">AlertManager 연동</text>

  <!-- Pushgateway -->
  <rect x="60" y="352" width="160" height="50" rx="6" fill="#1a1a2e" stroke="#7777cc" stroke-width="1"/>
  <text x="140" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">Pushgateway</text>
  <text x="140" y="392" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">배치 작업 메트릭 push</text>

  <line x1="220" y1="377" x2="280" y2="300" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <!-- Outputs from Prometheus -->
  <line x1="460" y1="200" x2="510" y2="160" stroke="#e05555" stroke-width="2" marker-end="url(#arrr)"/>
  <line x1="460" y1="220" x2="510" y2="220" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="460" y1="240" x2="510" y2="280" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>

  <!-- Alertmanager -->
  <rect x="510" y="120" width="160" height="70" rx="8" fill="#200f10" stroke="#e05555" stroke-width="1.5"/>
  <text x="590" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">AlertManager</text>
  <text x="590" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Slack, PagerDuty</text>
  <text x="590" y="184" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">이메일, 웹훅</text>

  <!-- Grafana -->
  <rect x="510" y="200" width="160" height="60" rx="8" fill="#0f1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="590" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Grafana</text>
  <text x="590" y="246" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">대시보드 시각화</text>

  <!-- Remote Write -->
  <rect x="510" y="270" width="160" height="60" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="590" y="296" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Remote Write</text>
  <text x="590" y="314" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Thanos, Cortex</text>

  <!-- ServiceMonitor -->
  <rect x="700" y="120" width="150" height="80" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="775" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">ServiceMonitor</text>
  <text x="775" y="168" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">스크랩 대상 선택</text>
  <text x="775" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">CRD (kube-prom)</text>

  <!-- PrometheusRule -->
  <rect x="700" y="220" width="150" height="80" rx="8" fill="#200f10" stroke="#e05555" stroke-width="1.5"/>
  <text x="775" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">PrometheusRule</text>
  <text x="775" y="268" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">알림 규칙 정의</text>
  <text x="775" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">CRD (kube-prom)</text>

  <!-- arrows from operator CRDs to prometheus -->
  <line x1="700" y1="160" x2="460" y2="185" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <line x1="700" y1="260" x2="672" y2="156" stroke="#7777cc" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrr)"/>

  <!-- kube-prometheus-stack -->
  <rect x="280" y="430" width="440" height="64" rx="8" fill="#0f1520" stroke="#7777cc" stroke-width="1.5"/>
  <text x="500" y="456" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">kube-prometheus-stack (Helm 차트)</text>
  <text x="500" y="476" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Prometheus + AlertManager + Grafana + 기본 규칙 한 번에 설치</text>
</svg>
