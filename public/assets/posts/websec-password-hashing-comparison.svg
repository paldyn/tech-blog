<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">비밀번호 저장 방식 비교</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">왜 비밀번호는 반드시 해싱해야 하는가</text>

  <!-- Row 1: Plain text -->
  <rect x="60" y="90" width="160" height="44" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="1.5"/>
  <text x="140" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555">평문 저장</text>
  <text x="140" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">절대 금지</text>

  <rect x="240" y="90" width="200" height="44" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="340" y="117" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#e05555" xml:space="preserve">password</text>

  <rect x="460" y="90" width="360" height="44" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="640" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">DB 유출 즉시 모든 비밀번호 노출</text>
  <text x="640" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">내부자 열람 가능 · 법적 책임</text>

  <!-- Row 2: MD5/SHA1 -->
  <rect x="60" y="148" width="160" height="44" rx="6" fill="#1a0a0a" stroke="#cc5533" stroke-width="1.5"/>
  <text x="140" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#cc5533">MD5 / SHA-1</text>
  <text x="140" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">위험</text>

  <rect x="240" y="148" width="200" height="44" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="340" y="175" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#cc5533" xml:space="preserve">5f4d…3a2b</text>

  <rect x="460" y="148" width="360" height="44" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="640" y="168" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#cc5533">레인보우 테이블로 수초 내 역산 가능</text>
  <text x="640" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">GPU로 초당 수십억 해시 연산</text>

  <!-- Row 3: SHA-256 -->
  <rect x="60" y="206" width="160" height="44" rx="6" fill="#1a1000" stroke="#e8a020" stroke-width="1.5"/>
  <text x="140" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e8a020">SHA-256</text>
  <text x="140" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">부족</text>

  <rect x="240" y="206" width="200" height="44" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="340" y="233" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#e8a020" xml:space="preserve">e3b0…1b</text>

  <rect x="460" y="206" width="360" height="44" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="640" y="226" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8a020">솔트 없으면 동일 비밀번호 = 동일 해시</text>
  <text x="640" y="242" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">너무 빠름 → 브루트 포스 가능</text>

  <!-- Row 4: bcrypt -->
  <rect x="60" y="264" width="160" height="44" rx="6" fill="#0a2010" stroke="#55c555" stroke-width="1.5"/>
  <text x="140" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555">bcrypt</text>
  <text x="140" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#55c555">권장</text>

  <rect x="240" y="264" width="200" height="44" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="340" y="284" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#55c555" xml:space="preserve">$2b$12$…72자</text>
  <text x="340" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">솔트 내장, cost factor</text>

  <rect x="460" y="264" width="360" height="44" rx="6" fill="#0a2010" stroke="#336633" stroke-width="1"/>
  <text x="640" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">cost factor로 연산 비용 조절 가능</text>
  <text x="640" y="300" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">72바이트 제한 · 72자 초과 무시</text>

  <!-- Row 5: argon2 -->
  <rect x="60" y="322" width="160" height="44" rx="6" fill="#0a1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="140" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3">Argon2id</text>
  <text x="140" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#7ec8e3">최선택 (2023+)</text>

  <rect x="240" y="322" width="200" height="44" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="340" y="342" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="10" fill="#7ec8e3" xml:space="preserve">$argon2id$v=19$…</text>
  <text x="340" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">메모리·시간·병렬성</text>

  <rect x="460" y="322" width="360" height="44" rx="6" fill="#0a1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="640" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">메모리 하드 함수 → GPU 병렬화 어려움</text>
  <text x="640" y="358" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">PHC 우승 (2015) · OWASP 1순위</text>

  <!-- Column headers -->
  <text x="140" y="82" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">방식</text>
  <text x="340" y="82" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">저장 형태</text>
  <text x="640" y="82" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">특성 및 위험</text>

  <!-- Bottom: OWASP recommendation -->
  <rect x="60" y="390" width="760" height="86" rx="6" fill="#0a1520" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="416" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">OWASP 권고 우선순위 (2023)</text>
  <text x="440" y="438" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">1. Argon2id (m=19456, t=2, p=1 최소)  2. scrypt  3. bcrypt (cost≥10)</text>
  <text x="440" y="458" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">MD5·SHA-1·SHA-256 단독 사용은 절대 금지. 비밀번호 전용 해시만 사용.</text>
  <text x="440" y="474" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#9aa4b8">참고: SHA-256은 메시지 무결성 용도로 우수하지만 비밀번호 해싱에는 부적합하다.</text>
</svg>
