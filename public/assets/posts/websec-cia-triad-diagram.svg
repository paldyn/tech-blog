  <rect x="343" y="198" width="194" height="26" rx="5" fill="#0d2010" stroke="#336633" stroke-width="1"/>
  <text x="440" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">전자 서명 · 코드 서명</text>

  <rect x="343" y="232" width="194" height="26" rx="5" fill="#0d2010" stroke="#336633" stroke-width="1"/>
  <text x="440" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">체크섬 · 감사 로그</text>

  <rect x="343" y="266" width="194" height="26" rx="5" fill="#0d2010" stroke="#336633" stroke-width="1"/>
  <text x="440" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">입력 검증 · 타입 강제</text>

  <text x="440" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">위반 사례</text>
  <rect x="343" y="326" width="194" height="44" rx="5" fill="#1a0a0a" stroke="#993333" stroke-width="1"/>
  <text x="440" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">SQL 인젝션으로 DB 조작</text>
  <text x="440" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">JWT 서명 미검증</text>

  <!-- A: Availability -->
  <rect x="590" y="80" width="230" height="300" rx="10" fill="#12081a" stroke="#7777cc" stroke-width="2"/>
  <text x="705" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
