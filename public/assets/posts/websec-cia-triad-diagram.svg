  <text x="705" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">가용성</text>
  <text x="705" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Availability</text>

  <rect x="608" y="164" width="194" height="26" rx="5" fill="#180e28" stroke="#554499" stroke-width="1"/>
  <text x="705" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">이중화 · 로드 밸런싱</text>

  <rect x="608" y="198" width="194" height="26" rx="5" fill="#180e28" stroke="#554499" stroke-width="1"/>
  <text x="705" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">DDoS 방어 · CDN</text>

  <rect x="608" y="232" width="194" height="26" rx="5" fill="#180e28" stroke="#554499" stroke-width="1"/>
  <text x="705" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">레이트 리미팅</text>

  <rect x="608" y="266" width="194" height="26" rx="5" fill="#180e28" stroke="#554499" stroke-width="1"/>
  <text x="705" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">장애 복구 계획 (DR)</text>

  <text x="705" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">위반 사례</text>
  <rect x="608" y="326" width="194" height="44" rx="5" fill="#1a0a0a" stroke="#993333" stroke-width="1"/>
  <text x="705" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">DDoS로 서비스 불능</text>
  <text x="705" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">단일 장애점(SPOF)</text>

  <!-- Bottom note -->
  <text x="440" y="418" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">세 요소는 서로 상충하기도 한다 — 강한 암호화는 가용성을 낮출 수 있고,</text>
  <text x="440" y="438" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">높은 가용성은 기밀성을 희생하기도 한다. 균형 잡힌 설계가 핵심이다.</text>

  <!-- connecting line at bottom of boxes -->
  <line x1="290" y1="230" x2="325" y2="230" stroke="#444" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="555" y1="230" x2="590" y2="230" stroke="#444" stroke-width="1" stroke-dasharray="4,4"/>
</svg>
