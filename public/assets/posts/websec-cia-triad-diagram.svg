<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">CIA 3요소 — 정보보안의 핵심 목표</text>

  <!-- C: Confidentiality -->
  <rect x="60" y="80" width="230" height="300" rx="10" fill="#0a1520" stroke="#7ec8e3" stroke-width="2"/>
  <text x="175" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#7ec8e3">C</text>
  <text x="175" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">기밀성</text>
  <text x="175" y="150" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Confidentiality</text>

  <rect x="78" y="164" width="194" height="26" rx="5" fill="#0d1e30" stroke="#3a4a6e" stroke-width="1"/>
  <text x="175" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">암호화 (AES · RSA · TLS)</text>

  <rect x="78" y="198" width="194" height="26" rx="5" fill="#0d1e30" stroke="#3a4a6e" stroke-width="1"/>
  <text x="175" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">접근 제어 (RBAC · ACL)</text>

  <rect x="78" y="232" width="194" height="26" rx="5" fill="#0d1e30" stroke="#3a4a6e" stroke-width="1"/>
  <text x="175" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">최소 권한 원칙</text>

  <rect x="78" y="266" width="194" height="26" rx="5" fill="#0d1e30" stroke="#3a4a6e" stroke-width="1"/>
  <text x="175" y="284" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">데이터 마스킹</text>

  <text x="175" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
