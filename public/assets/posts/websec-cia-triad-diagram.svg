  <rect x="78" y="326" width="194" height="44" rx="5" fill="#1a0a0a" stroke="#993333" stroke-width="1"/>
  <text x="175" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">평문 비밀번호 저장</text>
  <text x="175" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">HTTP로 민감 데이터 전송</text>

  <!-- I: Integrity -->
  <rect x="325" y="80" width="230" height="300" rx="10" fill="#0a2010" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="110" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="#55c555">I</text>
  <text x="440" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
