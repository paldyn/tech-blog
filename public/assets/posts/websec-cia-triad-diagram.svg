  <rect x="343" y="164" width="194" height="26" rx="5" fill="#0d2010" stroke="#336633" stroke-width="1"/>
  <text x="440" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
