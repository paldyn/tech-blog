<svg xmlns="http://www.w3.org/2000/svg" width="880" height="400" viewBox="0 0 880 400">
  <rect width="880" height="400" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">디지털 서명 알고리즘 비교</text>

  <!-- Col headers -->
  <rect x="60" y="62" width="120" height="36" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="120" y="85" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888">항목</text>

  <rect x="188" y="62" width="190" height="36" rx="6" fill="#111122" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="283" y="85" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">RSA-PSS</text>

  <rect x="386" y="62" width="190" height="36" rx="6" fill="#112211" stroke="#55c555" stroke-width="1.5"/>
  <text x="481" y="85" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">ECDSA (P-256)</text>

  <rect x="584" y="62" width="236" height="36" rx="6" fill="#1a1122" stroke="#7777cc" stroke-width="1.5"/>
  <text x="702" y="85" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">Ed25519 ★</text>

  <!-- Rows -->
  <!-- 키 길이 -->
  <rect x="60" y="106" width="120" height="44" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="120" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">키 길이</text>

  <rect x="188" y="106" width="190" height="44" rx="4" fill="#0d1520" stroke="#2a3a5e" stroke-width="1"/>
  <text x="283" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">2048~4096 bit</text>

  <rect x="386" y="106" width="190" height="44" rx="4" fill="#0d200d" stroke="#2a5e2a" stroke-width="1"/>
  <text x="481" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">256 bit</text>

  <rect x="584" y="106" width="236" height="44" rx="4" fill="#110d20" stroke="#3a2a5e" stroke-width="1"/>
  <text x="702" y="132" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">255 bit</text>

  <!-- 서명 크기 -->
  <rect x="60" y="158" width="120" height="44" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="120" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">서명 크기</text>

  <rect x="188" y="158" width="190" height="44" rx="4" fill="#0d1520" stroke="#2a3a5e" stroke-width="1"/>
  <text x="283" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">256~512 bytes</text>

  <rect x="386" y="158" width="190" height="44" rx="4" fill="#0d200d" stroke="#2a5e2a" stroke-width="1"/>
  <text x="481" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">64 bytes (가변)</text>

  <rect x="584" y="158" width="236" height="44" rx="4" fill="#110d20" stroke="#3a2a5e" stroke-width="1"/>
  <text x="702" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7777cc">64 bytes (고정)</text>

  <!-- 속도 -->
  <rect x="60" y="210" width="120" height="44" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="120" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">속도</text>

  <rect x="188" y="210" width="190" height="44" rx="4" fill="#0d1520" stroke="#2a3a5e" stroke-width="1"/>
  <text x="283" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e0a055">느림 (특히 서명)</text>

  <rect x="386" y="210" width="190" height="44" rx="4" fill="#0d200d" stroke="#2a5e2a" stroke-width="1"/>
  <text x="481" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">빠름</text>

  <rect x="584" y="210" width="236" height="44" rx="4" fill="#110d20" stroke="#3a2a5e" stroke-width="1"/>
  <text x="702" y="236" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">매우 빠름 (배치 검증)</text>

  <!-- 난수 의존성 -->
  <rect x="60" y="262" width="120" height="44" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="120" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">난수</text>
  <text x="120" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">의존성</text>

  <rect x="188" y="262" width="190" height="44" rx="4" fill="#0d1520" stroke="#2a3a5e" stroke-width="1"/>
  <text x="283" y="287" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e0a055">확정적 (PSS 패딩)</text>

  <rect x="386" y="262" width="190" height="44" rx="4" fill="#0d200d" stroke="#2a5e2a" stroke-width="1"/>
  <text x="481" y="278" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">⚠ 난수 필요</text>
  <text x="481" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">재사용 시 비밀키 노출</text>

  <rect x="584" y="262" width="236" height="44" rx="4" fill="#110d20" stroke="#3a2a5e" stroke-width="1"/>
  <text x="702" y="287" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">확정적 (난수 불필요)</text>

  <!-- Use cases -->
  <rect x="60" y="322" width="760" height="58" rx="8" fill="#110d20" stroke="#7777cc" stroke-width="1.5"/>
  <text x="440" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">실무 권장</text>
  <text x="440" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">SSH: Ed25519 · TLS 인증서: ECDSA P-256 · JWT: ES256(ECDSA) 또는 EdDSA</text>
  <text x="440" y="375" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">레거시 호환: RSA-PSS 2048 · ECDSA 난수 취약점(Sony PS3, Bitcoin) 주의</text>
</svg>
