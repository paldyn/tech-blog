<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 520" style="background:#0a0a0a;border-radius:12px">
  <!-- Header -->
  <rect x="0" y="0" width="880" height="72" rx="12" fill="#0d1a2a"/>
  <rect x="0" y="60" width="880" height="12" fill="#0d1a2a"/>
  <text x="60" y="40" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#ffffff">선형 회귀: 최소 제곱법과 경사 하강법</text>
  <text x="60" y="62" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#e8e8e8">데이터에 가장 잘 맞는 직선을 찾는 두 가지 방법</text>
  <line x1="60" y1="82" x2="820" y2="82" stroke="#1e2433" stroke-width="1"/>

  <!-- Scatter plot visualization -->
  <text x="60" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">회귀선과 잔차(Residual) 시각화</text>
  <rect x="60" y="115" width="380" height="250" rx="8" fill="#0d1520" stroke="#1e2433"/>

  <!-- Axes -->
  <line x1="100" y1="340" x2="420" y2="340" stroke="#333" stroke-width="1.5"/>
  <line x1="100" y1="340" x2="100" y2="130" stroke="#333" stroke-width="1.5"/>
  <text x="220" y="360" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">X (입력)</text>
  <text x="85" y="235" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" transform="rotate(-90 85 235)">y (출력)</text>

  <!-- Data points with residual lines -->
  <!-- Point 1 -->
  <line x1="130" y1="300" x2="130" y2="286" stroke="#e05555" stroke-width="1" stroke-dasharray="2,2"/>
  <circle cx="130" cy="300" r="5" fill="#7ec8e3"/>
  <!-- Point 2 -->
  <line x1="170" y1="270" x2="170" y2="263" stroke="#e05555" stroke-width="1" stroke-dasharray="2,2"/>
  <circle cx="170" cy="270" r="5" fill="#7ec8e3"/>
  <!-- Point 3 -->
  <line x1="200" y1="258" x2="200" y2="247" stroke="#e05555" stroke-width="1" stroke-dasharray="2,2"/>
  <circle cx="200" cy="258" r="5" fill="#7ec8e3"/>
  <!-- Point 4 (on line) -->
  <circle cx="240" cy="228" r="5" fill="#7ec8e3"/>
  <!-- Point 5 -->
  <line x1="280" y1="205" x2="280" y2="216" stroke="#e05555" stroke-width="1" stroke-dasharray="2,2"/>
  <circle cx="280" cy="205" r="5" fill="#7ec8e3"/>
  <!-- Point 6 -->
  <line x1="310" y1="190" x2="310" y2="199" stroke="#e05555" stroke-width="1" stroke-dasharray="2,2"/>
  <circle cx="310" cy="190" r="5" fill="#7ec8e3"/>
  <!-- Point 7 -->
  <circle cx="350" cy="175" r="5" fill="#7ec8e3"/>
  <!-- Point 8 -->
  <line x1="390" y1="155" x2="390" y2="168" stroke="#e05555" stroke-width="1" stroke-dasharray="2,2"/>
  <circle cx="390" cy="155" r="5" fill="#7ec8e3"/>

  <!-- Regression line -->
  <line x1="110" y1="305" x2="415" y2="155" stroke="#55c555" stroke-width="2.5"/>
  <text x="412" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">ŷ = wx + b</text>

  <!-- Legend -->
  <circle cx="110" cy="355" r="4" fill="#7ec8e3"/>
  <text x="120" y="359" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">실제값</text>
  <line x1="165" y1="355" x2="185" y2="355" stroke="#55c555" stroke-width="2"/>
  <text x="190" y="359" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">회귀선</text>
  <line x1="245" y1="351" x2="265" y2="351" stroke="#e05555" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="270" y="359" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">잔차(오차)</text>

  <!-- RIGHT: Formulas -->
  <text x="480" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">선형 회귀 수식 체계</text>
  <rect x="480" y="115" width="340" height="250" rx="8" fill="#0d1520" stroke="#1e2433"/>

  <!-- Model -->
  <text x="500" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">모델 (단순 선형 회귀)</text>
  <text x="500" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7ec8e3" font-weight="600">ŷ = w₁x₁ + w₂x₂ + ... + wₙxₙ + b</text>
  <text x="500" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">또는 행렬 형태: ŷ = Xw + b</text>

  <line x1="500" y1="186" x2="800" y2="186" stroke="#1e2433" stroke-width="1"/>

  <!-- Loss -->
  <text x="500" y="206" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">손실 함수 (MSE)</text>
  <text x="500" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#e05555" font-weight="600">L = (1/n) Σ (ŷᵢ − yᵢ)²</text>
  <text x="500" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">= ||Xw − y||² / n</text>

  <line x1="500" y1="252" x2="800" y2="252" stroke="#1e2433" stroke-width="1"/>

  <!-- OLS Solution -->
  <text x="500" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">해석적 해 (Closed-form / OLS)</text>
  <text x="500" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#55c555" font-weight="600">w* = (XᵀX)⁻¹ Xᵀy</text>
  <text x="500" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">∇L=0으로 직접 최솟값 계산</text>
  <text x="500" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">소규모 데이터에 적합, 대규모에서는 역행렬이 비쌈</text>

  <line x1="500" y1="334" x2="800" y2="334" stroke="#1e2433" stroke-width="1"/>

  <!-- GD update -->
  <text x="500" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">경사 하강법 업데이트</text>
  <text x="500" y="370" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#7777cc" font-weight="600">w ← w − η · (2/n) Xᵀ(Xw−y)</text>

  <!-- Bottom: assumption -->
  <rect x="60" y="382" width="760" height="90" rx="8" fill="#0d1520" stroke="#7777cc" stroke-width="1"/>
  <text x="80" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc" font-weight="600">선형 회귀의 핵심 가정 (위반 시 성능 저하)</text>
  <text x="80" y="424" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">선형성: X와 y의 관계가 선형이어야 함   |   등분산성: 오차 분산이 일정   |   독립성: 샘플 간 독립</text>
  <text x="80" y="444" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">다중공선성 주의: 특성 간 높은 상관관계 → 가중치 불안정 → Ridge(L2) 또는 Lasso(L1) 사용</text>
  <text x="80" y="464" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">비선형 관계: 특성 엔지니어링(log, 제곱) 또는 다항 회귀, 랜덤 포레스트로 전환</text>

  <!-- Footer -->
  <text x="440" y="508" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN · AI 완전 정복 시리즈</text>
</svg>
