<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Counter — 요소 빈도 자동 집계</text>

  <!-- Input -->
  <rect x="60" y="72" width="200" height="56" rx="8" fill="#131825" stroke="#3a4a6e"/>
  <text x="160" y="95" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">입력</text>
  <text x="160" y="118" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">"aabbcccda"</text>

  <!-- Arrow -->
  <line x1="260" y1="100" x2="320" y2="100" stroke="#555" stroke-width="2"/>
  <polygon points="320,100 310,95 310,105" fill="#555"/>
  <text x="290" y="93" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">Counter()</text>

  <!-- Counter output -->
  <rect x="320" y="68" width="220" height="68" rx="8" fill="#0d1926" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="430" y="91" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">Counter 객체</text>
  <text x="430" y="116" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">{'c':3,'a':3,'b':2,'d':1}</text>

  <!-- most_common -->
  <line x1="540" y1="100" x2="600" y2="100" stroke="#555" stroke-width="2"/>
  <polygon points="600,100 590,95 590,105" fill="#555"/>
  <text x="570" y="93" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">.most_common(2)</text>
  <rect x="600" y="72" width="220" height="56" rx="8" fill="#0f1a0f" stroke="#55c555"/>
  <text x="710" y="105" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">[('c',3),('a',3)]</text>

  <!-- Operations -->
  <rect x="60" y="160" width="760" height="200" rx="8" fill="#0d0d0d" stroke="#3a4a6e"/>
  <text x="440" y="184" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8e8e8">Counter 산술 연산</text>

  <!-- c1 + c2 -->
  <text x="100" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">c1</text>
  <text x="130" y="216" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">Counter({'a':3,'b':2})</text>
  <text x="100" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">c2</text>
  <text x="130" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">Counter({'a':1,'c':4})</text>

  <text x="80" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3">c1 + c2</text>
  <text x="175" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">→ Counter({'c':4,'a':4,'b':2})</text>
  <text x="440" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">빈도 합산</text>

  <text x="80" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555">c1 - c2</text>
  <text x="175" y="295" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">→ Counter({'a':2,'b':2})</text>
  <text x="440" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">양수 결과만 유지</text>

  <text x="80" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b5cea8">c1 &amp; c2</text>
  <text x="175" y="320" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">→ Counter({'a':1})</text>
  <text x="440" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">교집합 (최솟값)</text>

  <text x="80" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#b5cea8">c1 | c2</text>
  <text x="175" y="345" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">→ Counter({'c':4,'a':3,'b':2})</text>
  <text x="440" y="345" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">합집합 (최댓값)</text>
</svg>
