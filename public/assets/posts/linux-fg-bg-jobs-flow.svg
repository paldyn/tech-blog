<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880">
  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">작업 제어(Job Control) 흐름</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888" text-anchor="middle">포그라운드 ↔ 백그라운드 ↔ 정지 상태 전환</text>

  <!-- Foreground box -->
  <rect x="50" y="100" width="220" height="100" rx="10" fill="#0f2010" stroke="#55c555" stroke-width="2"/>
  <text x="160" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#55c555" text-anchor="middle">포그라운드</text>
  <text x="160" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">터미널 I/O 점유</text>
  <text x="160" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">STAT: S 또는 R</text>
  <text x="160" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">프롬프트 없음</text>

  <!-- Stopped box -->
  <rect x="330" y="100" width="220" height="100" rx="10" fill="#1a1500" stroke="#e8e8e8" stroke-width="2"/>
  <text x="440" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#e8e8e8" text-anchor="middle">정지 (Stopped)</text>
  <text x="440" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">SIGSTOP/SIGTSTP</text>
  <text x="440" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">STAT: T</text>
  <text x="440" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">CPU 사용 없음</text>

  <!-- Background box -->
  <rect x="610" y="100" width="220" height="100" rx="10" fill="#101020" stroke="#7777cc" stroke-width="2"/>
  <text x="720" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="700" fill="#7777cc" text-anchor="middle">백그라운드</text>
  <text x="720" y="152" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">SIGCONT + 백그라운드</text>
  <text x="720" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">STAT: S(또는 R)</text>
  <text x="720" y="188" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">프롬프트 복귀</text>

  <!-- Arrows: Foreground → Stopped -->
  <line x1="270" y1="150" x2="324" y2="150" stroke="#e8e8e8" stroke-width="1.5"/>
  <polygon points="324,143 336,150 324,157" fill="#e8e8e8"/>
  <text x="303" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e8e8e8" text-anchor="middle">Ctrl+Z</text>

  <!-- Arrows: Stopped → Foreground -->
  <line x1="330" y1="168" x2="276" y2="168" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="276,161 264,168 276,175" fill="#55c555"/>
  <text x="303" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555" text-anchor="middle">fg</text>

  <!-- Arrows: Stopped → Background -->
  <line x1="550" y1="150" x2="604" y2="150" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="604,143 616,150 604,157" fill="#7777cc"/>
  <text x="577" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc" text-anchor="middle">bg</text>

  <!-- Arrows: Background → Stopped (via Ctrl+Z not possible, use kill -STOP) -->
  <line x1="610" y1="168" x2="556" y2="168" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="556,161 544,168 556,175" fill="#888"/>
  <text x="583" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888" text-anchor="middle">kill -STOP</text>

  <!-- Arrows: Background → Foreground (fg) -->
  <path d="M 720 200 Q 440 280 160 200" stroke="#55c555" stroke-width="1.5" fill="none"/>
  <polygon points="160,197 148,204 160,211" fill="#55c555"/>
  <text x="440" y="270" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">fg %job_number</text>

  <!-- Arrows: Foreground → Background (&amp; at start) -->
  <path d="M 160 100 Q 440 30 720 100" stroke="#7777cc" stroke-width="1.5" fill="none"/>
  <polygon points="720,103 732,96 720,89" fill="#7777cc"/>
  <text x="440" y="45" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc" text-anchor="middle">command &amp; (시작부터 백그라운드)</text>

  <!-- Bottom section: jobs output example -->
  <rect x="50" y="320" width="780" height="148" rx="8" fill="#070b14" stroke="#1e2433" stroke-width="1.5"/>
  <text x="66" y="344" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">jobs 명령 출력 예시</text>
  <line x1="66" y1="352" x2="814" y2="352" stroke="#1e2433" stroke-width="1"/>

  <text x="66" y="372" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">$ jobs -l</text>
  <text x="66" y="390" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">[1]+ 1234 Running    sleep 100 &amp;</text>
  <text x="66" y="408" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">[2]- 1235 Stopped    vim notes.txt</text>
  <text x="66" y="426" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#888" xml:space="preserve"># [번호] +/- PID 상태 명령어</text>
  <text x="440" y="426" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" xml:space="preserve">+는 현재 작업(fg 기본), -는 이전 작업</text>
  <text x="66" y="454" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">fg %1    # 작업 1을 포그라운드로   bg %2  # 작업 2를 백그라운드로</text>
</svg>
