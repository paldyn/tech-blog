<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">재귀 깊이 문제 해결 전략</text>

  <!-- Strategy 1: setrecursionlimit -->
  <rect x="60" y="68" width="360" height="110" rx="8" fill="#0f1a2e" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="240" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">재귀 한도 늘리기</text>
  <rect x="76" y="100" width="328" height="64" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="90" y="120" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">import</tspan>
    <tspan fill="#ffffff"> sys</tspan>
  </text>
  <text x="90" y="140" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">sys.setrecursionlimit(</tspan>
    <tspan fill="#b5cea8">10000</tspan>
    <tspan fill="#ffffff">)</tspan>
  </text>
  <text x="90" y="158" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#9aa4b8"># 주의: 스택 오버플로 위험</tspan>
  </text>

  <!-- Strategy 2: trampoline -->
  <rect x="460" y="68" width="360" height="110" rx="8" fill="#0f2a1f" stroke="#55c555" stroke-width="1.5"/>
  <text x="640" y="90" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">트램폴린(Trampoline)</text>
  <rect x="476" y="100" width="328" height="64" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="490" y="120" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">def</tspan>
    <tspan fill="#ffffff"> trampoline(f, *args):</tspan>
  </text>
  <text x="490" y="140" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">    v = f(*args)</tspan>
  </text>
  <text x="490" y="160" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">    while</tspan>
    <tspan fill="#ffffff"> callable(v): v = v()</tspan>
  </text>

  <!-- Strategy 3: generator -->
  <rect x="60" y="198" width="360" height="120" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="240" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">제너레이터로 반복 대체</text>
  <rect x="76" y="230" width="328" height="74" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="90" y="250" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8"># 트리 순회를 스택 시뮬레이션</text>
  <text x="90" y="270" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">def</tspan>
    <tspan fill="#ffffff"> dfs(tree):</tspan>
  </text>
  <text x="90" y="290" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">    stack = [tree]</tspan>
  </text>
  <text x="90" y="298" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8">    # 명시적 스택으로 DFS</text>

  <!-- Strategy 4: lru_cache -->
  <rect x="460" y="198" width="360" height="120" rx="8" fill="#2a1a10" stroke="#ce9178" stroke-width="1.5"/>
  <text x="640" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#ce9178" text-anchor="middle">메모이제이션으로 깊이 감소</text>
  <rect x="476" y="230" width="328" height="74" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="490" y="250" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">from</tspan>
    <tspan fill="#ffffff"> functools </tspan>
    <tspan fill="#7ec8e3" font-weight="600">import</tspan>
    <tspan fill="#ffffff"> lru_cache</tspan>
  </text>
  <text x="490" y="270" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#55c555">@lru_cache(maxsize=</tspan>
    <tspan fill="#7ec8e3" font-weight="600">None</tspan>
    <tspan fill="#55c555">)</tspan>
  </text>
  <text x="490" y="290" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">def</tspan>
    <tspan fill="#ffffff"> fib(n): </tspan>
    <tspan fill="#9aa4b8"># 중복 계산 제거</tspan>
  </text>
  <text x="490" y="310" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12">
    <tspan fill="#9aa4b8">    # fib(1000)도 깊이 1000만 사용</tspan>
  </text>

  <!-- Recommendation -->
  <rect x="60" y="336" width="760" height="28" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="354" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#55c555" text-anchor="middle">권장: 깊이 &gt; 수백이면 반복문 또는 명시적 스택으로 변환 — setrecursionlimit 남용 금지</text>
</svg>
