<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 420">
  <rect width="880" height="420" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">TreeMap NavigableMap 주요 API</text>

  <text x="440" y="72" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">TreeMap&lt;Integer, String&gt; scores = {70:"C", 80:"B", 90:"A", 100:"A+"}</text>

  <!-- Code box -->
  <rect x="60" y="86" width="760" height="300" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>

  <text x="76" y="108" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 최솟값/최댓값 키</text>
  <text x="76" y="126" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">scores.firstKey();      </text>
  <text x="292" y="126" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 70</text>
  <text x="76" y="144" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">scores.lastKey();       </text>
  <text x="292" y="144" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 100</text>

  <text x="76" y="166" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// floor/ceiling</text>
  <text x="76" y="184" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">scores.floorKey(</text>
  <text x="206" y="184" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8">85</text>
  <text x="226" y="184" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">);  </text>
  <text x="292" y="184" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 80 (85 이하 최대)</text>
  <text x="76" y="202" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">scores.ceilingKey(</text>
  <text x="220" y="202" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8">85</text>
  <text x="240" y="202" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">); </text>
  <text x="292" y="202" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 90 (85 이상 최소)</text>

  <text x="76" y="224" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 범위 서브맵</text>
  <text x="76" y="242" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">scores.subMap(</text>
  <text x="188" y="242" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8">75</text>
  <text x="208" y="242" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">, </text>
  <text x="218" y="242" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">true</text>
  <text x="248" y="242" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">, </text>
  <text x="258" y="242" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8">95</text>
  <text x="278" y="242" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">, </text>
  <text x="288" y="242" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600">false</text>
  <text x="328" y="242" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">); </text>
  <text x="370" y="242" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// {80:B, 90:A}</text>
  <text x="76" y="260" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">scores.headMap(</text>
  <text x="200" y="260" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8">90</text>
  <text x="220" y="260" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">);      </text>
  <text x="370" y="260" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// {70:C, 80:B}</text>
  <text x="76" y="278" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">scores.tailMap(</text>
  <text x="200" y="278" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8">90</text>
  <text x="220" y="278" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">);      </text>
  <text x="370" y="278" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// {90:A, 100:A+}</text>

  <text x="76" y="300" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 최솟값 poll (제거 + 반환)</text>
  <text x="76" y="318" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">scores.pollFirstEntry(); </text>
  <text x="300" y="318" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 70=C 제거 후 반환</text>
  <text x="76" y="336" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 역순 뷰</text>
  <text x="76" y="354" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff">scores.descendingMap(); </text>
  <text x="300" y="354" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// {100:A+, 90:A, 80:B, 70:C}</text>
  <text x="76" y="372" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// 모두 O(log n) — Red-Black Tree 보장</text>
</svg>
