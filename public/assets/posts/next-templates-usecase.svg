<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <!-- Background -->
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">template.tsx 사용 시나리오</text>

  <!-- Card 1: 페이지 진입 애니메이션 -->
  <rect x="50" y="72" width="370" height="168" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <rect x="68" y="90" width="28" height="28" rx="4" fill="#1a1a3e" stroke="#7777cc" stroke-width="1"/>
  <text x="82" y="109" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">1</text>
  <text x="110" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">페이지 진입 애니메이션</text>
  <text x="68" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">매 페이지 진입마다 fade-in 효과 적용</text>
  <rect x="68" y="146" width="334" height="78" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="84" y="167" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">'use client'</text>
  <text x="84" y="185" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">export default function Template({</text>
  <text x="84" y="203" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  children }) {</text>
  <text x="84" y="217" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">  // animate.fadeIn()</text>

  <!-- Card 2: 페이지별 분석 이벤트 -->
  <rect x="460" y="72" width="370" height="168" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <rect x="478" y="90" width="28" height="28" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="492" y="109" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#55c555">2</text>
  <text x="520" y="107" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">페이지 조회수 기록</text>
  <text x="478" y="130" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">매 이동마다 analytics.pageView() 호출</text>
  <rect x="478" y="146" width="334" height="78" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="494" y="167" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">'use client'</text>
  <text x="494" y="185" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">useEffect(() =&gt; {</text>
  <text x="494" y="203" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  analytics.pageView(path)</text>
  <text x="494" y="217" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">}, [path])</text>

  <!-- Card 3: useEffect 재실행 -->
  <rect x="50" y="262" width="370" height="168" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <rect x="68" y="280" width="28" height="28" rx="4" fill="#2a1a10" stroke="#e07840" stroke-width="1"/>
  <text x="82" y="299" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#e07840">3</text>
  <text x="110" y="297" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">useEffect 재실행 보장</text>
  <text x="68" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">레이아웃에서는 이동 시 Effect 미실행</text>
  <rect x="68" y="336" width="334" height="78" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="84" y="357" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">useEffect(() =&gt; {</text>
  <text x="84" y="375" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  subscribeToFeed()</text>
  <text x="84" y="393" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  return () =&gt; unsubscribe()</text>
  <text x="84" y="407" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#9aa4b8" xml:space="preserve">}, [])</text>

  <!-- Card 4: 클라이언트 라이브러리 초기화 -->
  <rect x="460" y="262" width="370" height="168" rx="8" fill="#111827" stroke="#374151" stroke-width="1"/>
  <rect x="478" y="280" width="28" height="28" rx="4" fill="#1a1a2e" stroke="#7ec8e3" stroke-width="1"/>
  <text x="492" y="299" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">4</text>
  <text x="520" y="297" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">폼 상태 자동 리셋</text>
  <text x="478" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">페이지 이동 시 입력값 초기화 필요할 때</text>
  <rect x="478" y="336" width="334" height="78" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="494" y="357" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// template 재마운트 → key prop 불필요</text>
  <text x="494" y="375" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">const</text>
  <text x="534" y="375" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> [val, setVal] = useState('')</text>
  <text x="494" y="393" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 이동 시 val 자동으로 '' 로 리셋</text>
</svg>
