<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect x="0" y="0" width="880" height="320" rx="12" fill="#0a0a0a"/>
  <text x="60" y="52" font-size="22" font-weight="700" fill="#e8e8e8">리스트 반복 vs 배열 벡터화</text>

  <text x="60" y="92" font-size="16" font-weight="600" fill="#e8e8e8">Python 리스트</text>
  <rect x="60" y="108" width="360" height="116" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="78" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">result = []</text>
  <text xml:space="preserve" x="78" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">for</tspan> x <tspan fill="#7ec8e3" font-weight="600">in</tspan> data:</text>
  <text xml:space="preserve" x="78" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">    result.append(x * <tspan fill="#b5cea8">2</tspan>)</text>
  <text xml:space="preserve" x="78" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># 원소마다 파이썬 루프 → 느림</text>

  <text x="480" y="92" font-size="16" font-weight="600" fill="#e8e8e8">NumPy 배열</text>
  <rect x="480" y="108" width="360" height="116" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="498" y="138" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"><tspan fill="#7ec8e3" font-weight="600">import</tspan> numpy <tspan fill="#7ec8e3" font-weight="600">as</tspan> np</text>
  <text xml:space="preserve" x="498" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">arr = np.array(data)</text>
  <text xml:space="preserve" x="498" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">result = arr * <tspan fill="#b5cea8">2</tspan></text>
  <text xml:space="preserve" x="498" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8"># C 레벨에서 한 번에 → 빠름</text>

  <rect x="60" y="252" width="780" height="44" rx="6" fill="#0f1a0f" stroke="#55c555" stroke-width="1"/>
  <text x="450" y="280" font-size="14" fill="#55c555" text-anchor="middle">같은 연산을 루프 없이 배열 전체에 한 번에 — 이것이 벡터화다</text>
</svg>
