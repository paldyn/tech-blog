<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Sequelize · Prisma · TypeORM 비교</text>

  <!-- Headers -->
  <rect x="60" y="64" width="235" height="40" rx="6" fill="#1e2d4a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="177" y="89" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">Sequelize</text>

  <rect x="322" y="64" width="235" height="40" rx="6" fill="#1e2d4a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="439" y="89" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">Prisma</text>

  <rect x="584" y="64" width="235" height="40" rx="6" fill="#1e2d4a" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="701" y="89" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#ce9178" text-anchor="middle">TypeORM</text>

  <!-- Row: 타입 안전성 -->
  <rect x="60" y="120" width="760" height="36" rx="0" fill="#111827"/>
  <text x="440" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888" text-anchor="middle">타입 안전성</text>
  <text x="177" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555" text-anchor="middle">약함 (JS 기반)</text>
  <text x="439" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">강함 (자동 생성 타입)</text>
  <text x="701" y="143" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">보통 (데코레이터)</text>

  <!-- Row: 스키마 정의 -->
  <rect x="60" y="156" width="760" height="36" rx="0" fill="#0d1520"/>
  <text x="440" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888" text-anchor="middle">스키마 정의</text>
  <text x="177" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">JS 모델 클래스</text>
  <text x="439" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">schema.prisma 파일</text>
  <text x="701" y="179" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">TS 데코레이터 엔티티</text>

  <!-- Row: 마이그레이션 -->
  <rect x="60" y="192" width="760" height="36" rx="0" fill="#111827"/>
  <text x="440" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888" text-anchor="middle">마이그레이션</text>
  <text x="177" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">sequelize-cli</text>
  <text x="439" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">prisma migrate (자동)</text>
  <text x="701" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">typeorm migration</text>

  <!-- Row: 생산성 -->
  <rect x="60" y="228" width="760" height="36" rx="0" fill="#0d1520"/>
  <text x="440" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888" text-anchor="middle">생산성</text>
  <text x="177" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">보통</text>
  <text x="439" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">높음 (Prisma Studio)</text>
  <text x="701" y="251" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3" text-anchor="middle">보통~높음</text>

  <!-- Row: Raw Query -->
  <rect x="60" y="264" width="760" height="36" rx="0" fill="#111827"/>
  <text x="440" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888" text-anchor="middle">Raw SQL</text>
  <text x="177" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">sequelize.query()</text>
  <text x="439" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">$queryRaw</text>
  <text x="701" y="287" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555" text-anchor="middle">query()</text>

  <!-- Row: 적합한 프레임워크 -->
  <rect x="60" y="300" width="760" height="36" rx="0" fill="#0d1520"/>
  <text x="440" y="323" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#888" text-anchor="middle">주요 생태계</text>
  <text x="177" y="323" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">Express.js (레거시)</text>
  <text x="439" y="323" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">Next.js · tRPC</text>
  <text x="701" y="323" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">NestJS</text>

  <!-- Column dividers -->
  <line x1="295" y1="120" x2="295" y2="336" stroke="#2a3a5e" stroke-width="1"/>
  <line x1="557" y1="120" x2="557" y2="336" stroke="#2a3a5e" stroke-width="1"/>

  <!-- Border around table -->
  <rect x="60" y="120" width="760" height="216" rx="0" fill="none" stroke="#2a3a5e" stroke-width="1"/>

  <!-- Code example: Prisma schema -->
  <rect x="60" y="358" width="370" height="140" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="80" y="378" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// Prisma schema.prisma</text>
  <text x="80" y="398" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">model</tspan><tspan fill="#ffffff"> User {</tspan>
  </text>
  <text x="80" y="418" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  id    </tspan><tspan fill="#7ec8e3" font-weight="600">Int</tspan><tspan fill="#ffffff">    @id @default(autoincrement())</tspan>
  </text>
  <text x="80" y="438" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  name  </tspan><tspan fill="#7ec8e3" font-weight="600">String</tspan>
  </text>
  <text x="80" y="458" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  email </tspan><tspan fill="#7ec8e3" font-weight="600">String</tspan><tspan fill="#ffffff"> @unique</tspan>
  </text>
  <text x="80" y="478" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">}</tspan>
  </text>

  <!-- Code example: TypeORM entity -->
  <rect x="450" y="358" width="370" height="140" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="470" y="378" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// TypeORM Entity</text>
  <text x="470" y="398" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">@Entity</tspan><tspan fill="#ffffff">()</tspan>
  </text>
  <text x="470" y="418" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">export class</tspan><tspan fill="#ffffff"> User {</tspan>
  </text>
  <text x="470" y="438" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  @PrimaryGeneratedColumn</tspan><tspan fill="#ffffff">()</tspan>
  </text>
  <text x="470" y="458" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">  id: </tspan><tspan fill="#7ec8e3" font-weight="600">number</tspan><tspan fill="#ffffff">;</tspan>
  </text>
  <text x="470" y="478" xml:space="preserve"
        font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">  @Column</tspan><tspan fill="#ffffff">() name: </tspan><tspan fill="#7ec8e3" font-weight="600">string</tspan><tspan fill="#ffffff">;</tspan>
  </text>
</svg>
