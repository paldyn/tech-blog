<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-cf" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">동기 렌더링 vs 동시성 렌더링</text>

  <!-- Synchronous rendering -->
  <text x="200" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">동기 렌더링 (React 17 이하)</text>

  <!-- Timeline for sync -->
  <rect x="60" y="92" width="280" height="30" rx="4" fill="#2a1a1e" stroke="#e05555" stroke-width="1"/>
  <text x="70" y="111" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e8e8e8">무거운 렌더링 (100ms)</text>

  <rect x="60" y="130" width="80" height="22" rx="4" fill="#1a1a1a" stroke="#555"/>
  <text x="100" y="145" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888">user input</text>

  <text x="150" y="160" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#e05555">→ input이 렌더링 완료까지 블로킹 (jank)</text>

  <!-- concurrent rendering -->
  <text x="600" y="80" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">동시성 렌더링 (React 18+)</text>

  <rect x="460" y="92" width="100" height="30" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="510" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">렌더 일부</text>

  <rect x="568" y="92" width="60" height="30" rx="4" fill="#1a2030" stroke="#7ec8e3" stroke-width="1"/>
  <text x="598" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3">input 처리</text>

  <rect x="636" y="92" width="100" height="30" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text x="686" y="111" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">렌더 재개</text>

  <text x="460" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">→ 렌더링을 중단하고 input을 먼저 처리 가능</text>

  <!-- Concurrent Features -->
  <text x="440" y="178" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#e8e8e8">동시성 기능 목록</text>

  <!-- Feature 1: useTransition -->
  <rect x="60" y="194" width="240" height="90" rx="8" fill="#1a2030" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">useTransition</text>
  <text x="80" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">상태 업데이트를 "전환"으로 표시</text>
  <text x="80" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">긴급하지 않은 업데이트 우선순위 낮춤</text>
  <text x="80" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">isPending으로 로딩 표시 가능</text>

  <!-- Feature 2: useDeferredValue -->
  <rect x="320" y="194" width="240" height="90" rx="8" fill="#1a2030" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7ec8e3">useDeferredValue</text>
  <text x="340" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">값의 업데이트를 후순위로 지연</text>
  <text x="340" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">부모 외부에서 온 값에 적용</text>
  <text x="340" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">검색 결과 디바운스 대안</text>

  <!-- Feature 3: Suspense -->
  <rect x="580" y="194" width="240" height="90" rx="8" fill="#2a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="700" y="216" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="700" fill="#7777cc">Suspense</text>
  <text x="600" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8">비동기 렌더를 선언적으로 처리</text>
  <text x="600" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">동시성 모드에서 진정한 Deferred UI</text>
  <text x="600" y="274" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#55c555">이전 콘텐츠 유지 중 새 데이터 준비</text>

  <!-- createRoot requirement -->
  <rect x="60" y="302" width="760" height="80" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="324" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">// React 18 동시성 활성화 — createRoot 필수</text>
  <text x="76" y="344" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">import</tspan>
    <tspan fill="#ffffff"> { createRoot } </tspan>
    <tspan fill="#7ec8e3" font-weight="600">from</tspan>
    <tspan fill="#ce9178"> 'react-dom/client'</tspan>
    <tspan fill="#ffffff">;</tspan>
  </text>
  <text x="76" y="364" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13">
    <tspan fill="#ffffff">createRoot(document.getElementById(</tspan>
    <tspan fill="#ce9178">'root'</tspan>
    <tspan fill="#ffffff">)!).render(&lt;</tspan>
    <tspan fill="#55c555">App</tspan>
    <tspan fill="#ffffff">/&gt;);</tspan>
  </text>

  <!-- Priority levels -->
  <rect x="60" y="400" width="760" height="76" rx="6" fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="80" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">렌더링 우선순위</text>
  <text x="80" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">긴급(Urgent):</text>
  <text x="176" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">타이핑, 클릭, 스크롤 등 직접 인터랙션 — 즉각 응답 필요</text>
  <text x="80" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#7ec8e3">전환(Transition):</text>
  <text x="204" y="462" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">탭 전환, 페이지 이동, 검색 결과 — 지연 가능</text>
</svg>
