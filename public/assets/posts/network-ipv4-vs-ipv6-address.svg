<svg xmlns="http://www.w3.org/2000/svg" width="880" height="380" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">IPv6 주소 표기와 축약 규칙</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">128비트 = 8개 그룹 × 16비트 — 콜론으로 구분</text>

  <!-- full IPv6 -->
  <rect x="60" y="88" width="760" height="50" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="100" y="110" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">전체 표기:</text>
  <text x="440" y="118" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="16" font-weight="600" fill="#7ec8e3" xml:space="preserve">2001:0db8:0000:0000:0000:0000:0000:0001</text>

  <!-- rule 1: leading zero omission -->
  <rect x="60" y="158" width="760" height="50" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">규칙 1: 각 그룹의 앞자리 0 생략</text>
  <text x="440" y="198" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="16" font-weight="600" fill="#55c555" xml:space="preserve">2001:db8:0:0:0:0:0:1</text>

  <!-- rule 2: double colon -->
  <rect x="60" y="228" width="760" height="50" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="100" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">규칙 2: 연속된 0000 그룹을 :: 로 축약 (한 번만 가능)</text>
  <text x="440" y="268" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="16" font-weight="600" fill="#e8c44a" xml:space="preserve">2001:db8::1</text>

  <!-- special IPv6 -->
  <rect x="60" y="300" width="760" height="60" rx="8" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="440" y="320" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">주요 특수 IPv6 주소</text>
  <text x="80" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#7ec8e3" xml:space="preserve">::1          </text>
  <text x="210" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">루프백 (IPv4의 127.0.0.1)</text>
  <text x="500" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#55c555" xml:space="preserve">fe80::/10   링크로컬</text>
</svg>
