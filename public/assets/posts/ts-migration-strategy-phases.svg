<svg xmlns="http://www.w3.org/2000/svg" width="880" height="320" viewBox="0 0 880 320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="320" fill="#0a0a0a" rx="12"/>
  <defs>
    <marker id="mg_arr" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <text x="60" y="50" font-size="22" font-weight="700" fill="#e8e8e8">마이그레이션 4단계</text>
  <text x="60" y="76" font-size="14" fill="#888">한 번에 strict로 가지 않는다 — 컴파일을 유지하며 단계적으로</text>

  <rect x="60" y="120" width="170" height="120" fill="#101418" rx="10" stroke="#7777cc" stroke-width="1.5"/>
  <text x="145" y="150" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">1. 빌드 연결</text>
  <text x="145" y="178" font-size="12" fill="#888" text-anchor="middle">allowJs로 JS·TS</text>
  <text x="145" y="196" font-size="12" fill="#888" text-anchor="middle">공존, 빌드 통과</text>
  <text x="145" y="222" font-size="12" fill="#9aa4b8" text-anchor="middle">strict: false</text>

  <line x1="230" y1="180" x2="270" y2="180" stroke="#7ec8e3" stroke-width="2" marker-end="url(#mg_arr)"/>
  <rect x="280" y="120" width="170" height="120" fill="#101418" rx="10" stroke="#7777cc" stroke-width="1.5"/>
  <text x="365" y="150" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">2. 파일 변환</text>
  <text x="365" y="178" font-size="12" fill="#888" text-anchor="middle">.js → .ts 개명</text>
  <text x="365" y="196" font-size="12" fill="#888" text-anchor="middle">의존성 말단부터</text>
  <text x="365" y="222" font-size="12" fill="#9aa4b8" text-anchor="middle">any 임시 허용</text>

  <line x1="450" y1="180" x2="490" y2="180" stroke="#7ec8e3" stroke-width="2" marker-end="url(#mg_arr)"/>
  <rect x="500" y="120" width="170" height="120" fill="#101418" rx="10" stroke="#7777cc" stroke-width="1.5"/>
  <text x="585" y="150" font-size="14" font-weight="700" fill="#7777cc" text-anchor="middle">3. strict 강화</text>
  <text x="585" y="178" font-size="12" fill="#888" text-anchor="middle">플래그를 하나씩</text>
  <text x="585" y="196" font-size="12" fill="#888" text-anchor="middle">켜며 정리</text>
  <text x="585" y="222" font-size="12" fill="#9aa4b8" text-anchor="middle">noImplicitAny…</text>

  <line x1="670" y1="180" x2="710" y2="180" stroke="#7ec8e3" stroke-width="2" marker-end="url(#mg_arr)"/>
  <rect x="720" y="120" width="100" height="120" fill="#101418" rx="10" stroke="#55c555" stroke-width="1.5"/>
  <text x="770" y="150" font-size="14" font-weight="700" fill="#55c555" text-anchor="middle">4. 완료</text>
  <text x="770" y="178" font-size="12" fill="#888" text-anchor="middle">strict: true</text>
  <text x="770" y="196" font-size="12" fill="#888" text-anchor="middle">any 제거</text>
  <text x="770" y="222" font-size="12" fill="#9aa4b8" text-anchor="middle">allowJs off</text>
</svg>
