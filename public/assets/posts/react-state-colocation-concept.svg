<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 460"
     style="background:#0a0a0a" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">State Colocation: 상태는 쓰는 곳에</text>

  <!-- Over-lifted state (left) -->
  <text x="220" y="74" text-anchor="middle" font-size="14" font-weight="600" fill="#e05555">❌ 필요 이상으로 위에 있는 state</text>
  <rect x="60" y="84" width="340" height="320" rx="10" fill="#1a0f0f" stroke="#4a2a2a" stroke-width="1.5"/>

  <!-- App -->
  <rect x="90" y="100" width="280" height="44" rx="6" fill="#2a1a1a" stroke="#6a3a3a" stroke-width="1"/>
  <text x="230" y="118" text-anchor="middle" font-size="13" fill="#e05555">App</text>
  <text x="230" y="134" text-anchor="middle" font-size="11" fill="#888">isModalOpen (불필요한 위치)</text>

  <!-- SearchBar -->
  <rect x="90" y="160" width="120" height="36" rx="6" fill="#1a1a2a" stroke="#3a3a5a" stroke-width="1"/>
  <text x="150" y="183" text-anchor="middle" font-size="12" fill="#888">SearchBar</text>

  <!-- Modal -->
  <rect x="230" y="160" width="140" height="36" rx="6" fill="#2a1a1a" stroke="#6a3a3a" stroke-width="1"/>
  <text x="300" y="183" text-anchor="middle" font-size="12" fill="#e05555">Modal</text>

  <!-- Arrow from App to Modal -->
  <line x1="230" y1="144" x2="230" y2="160" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <text x="244" y="155" font-size="10" fill="#e05555">prop drilling</text>

  <!-- User content -->
  <rect x="90" y="220" width="120" height="36" rx="6" fill="#1a1a2a" stroke="#3a3a5a" stroke-width="1"/>
  <text x="150" y="243" text-anchor="middle" font-size="12" fill="#888">UserList</text>

  <!-- ModalButton -->
  <rect x="230" y="220" width="140" height="36" rx="6" fill="#2a1a1a" stroke="#6a3a3a" stroke-width="1"/>
  <text x="300" y="243" text-anchor="middle" font-size="12" fill="#e05555">ModalButton</text>

  <!-- Arrow -->
  <line x1="300" y1="196" x2="300" y2="220" stroke="#e05555" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arr)"/>

  <text x="230" y="295" text-anchor="middle" font-size="11" fill="#888">SearchBar가 modal state 변경 시</text>
  <text x="230" y="311" text-anchor="middle" font-size="11" fill="#e05555">App 전체 + SearchBar + UserList 리렌더!</text>

  <!-- Colocated state (right) -->
  <text x="660" y="74" text-anchor="middle" font-size="14" font-weight="600" fill="#55c555">✓ state를 실제 사용 위치로 내리기</text>
  <rect x="460" y="84" width="360" height="320" rx="10" fill="#0f1a0f" stroke="#2a4a2a" stroke-width="1.5"/>

  <!-- App (no modal state) -->
  <rect x="490" y="100" width="300" height="44" rx="6" fill="#0f1a0f" stroke="#2a4a2a" stroke-width="1"/>
  <text x="640" y="118" text-anchor="middle" font-size="13" fill="#55c555">App</text>
  <text x="640" y="134" text-anchor="middle" font-size="11" fill="#888">modal state 없음 — 가볍다</text>

  <!-- SearchBar -->
  <rect x="490" y="160" width="120" height="36" rx="6" fill="#0f1a2a" stroke="#2a3a5a" stroke-width="1"/>
  <text x="550" y="183" text-anchor="middle" font-size="12" fill="#888">SearchBar</text>

  <!-- Modal Container (owns state) -->
  <rect x="634" y="155" width="170" height="46" rx="6" fill="#0f2a0f" stroke="#2a5a2a" stroke-width="2"/>
  <text x="719" y="172" text-anchor="middle" font-size="12" fill="#55c555">ModalContainer</text>
  <text x="719" y="190" text-anchor="middle" font-size="11" fill="#55c555">isOpen (state 보유)</text>

  <!-- ModalButton inside -->
  <rect x="634" y="220" width="80" height="30" rx="4" fill="#0f1a0f" stroke="#2a4a2a" stroke-width="1"/>
  <text x="674" y="240" text-anchor="middle" font-size="11" fill="#888">ModalBtn</text>

  <!-- Modal content -->
  <rect x="724" y="220" width="80" height="30" rx="4" fill="#0f1a0f" stroke="#2a4a2a" stroke-width="1"/>
  <text x="764" y="240" text-anchor="middle" font-size="11" fill="#888">ModalUI</text>

  <text x="640" y="295" text-anchor="middle" font-size="11" fill="#888">isOpen 변경 시</text>
  <text x="640" y="311" text-anchor="middle" font-size="11" fill="#55c555">ModalContainer만 리렌더 — 나머진 안전</text>

  <!-- Bottom rule -->
  <rect x="60" y="420" width="760" height="28" rx="8" fill="#0a1628" stroke="#1e3a5f" stroke-width="1"/>
  <text x="440" y="438" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3">State Colocation 원칙: state를 그것을 사용하는 최소 공통 조상에 배치한다</text>
</svg>
