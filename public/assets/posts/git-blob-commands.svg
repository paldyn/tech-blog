<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Blob 오브젝트 조작 명령</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">git hash-object / git cat-file</text>

  <!-- Left: hash-object -->
  <text x="220" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3" text-anchor="middle">오브젝트 생성</text>

  <rect x="60" y="118" width="360" height="130" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">  # 파일을 blob으로 저장</text>
  <text x="76" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">git hash-object</tspan><tspan fill="#ffffff"> -w hello.txt</tspan></text>
  <text x="76" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">  8ab686e8a729f4b0c…</text>
  <text x="76" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">  # stdin 입력</text>
  <text x="76" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  <tspan fill="#ffffff">echo "Hi" | </tspan><tspan fill="#7ec8e3" font-weight="600">git hash-object</tspan><tspan fill="#ffffff"> --stdin</tspan></text>

  <!-- Right: cat-file -->
  <text x="660" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555" text-anchor="middle">오브젝트 조회</text>

  <rect x="460" y="118" width="360" height="130" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="476" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">  # 타입 확인</text>
  <text x="476" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">git cat-file</tspan><tspan fill="#ffffff"> -t 8ab686e</tspan></text>
  <text x="476" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">  blob</text>
  <text x="476" y="202" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">git cat-file</tspan><tspan fill="#ffffff"> -p 8ab686e</tspan></text>
  <text x="476" y="222" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">  Hello, Git!</text>

  <!-- -w flag explanation -->
  <rect x="60" y="266" width="360" height="76" fill="#0d1a0d" rx="8" stroke="#55c555" stroke-width="1"/>
  <text x="240" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">-w 플래그</text>
  <text x="240" y="310" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">없으면: SHA만 계산(저장 안 함)</text>
  <text x="240" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#aaa" text-anchor="middle">있으면: .git/objects/에 실제 저장</text>

  <!-- cat-file flags -->
  <rect x="460" y="266" width="360" height="76" fill="#0d0d1a" rx="8" stroke="#7777cc" stroke-width="1"/>
  <text x="640" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">cat-file 주요 옵션</text>
  <text x="640" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" text-anchor="middle">-t: 타입  -p: 내용  -s: 크기(byte)</text>
  <text x="640" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#888" text-anchor="middle">--batch: 여러 오브젝트 일괄 조회</text>

  <!-- Bottom: find blobs -->
  <rect x="60" y="360" width="760" height="76" fill="#000000" rx="8" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="382" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#888" xml:space="preserve">  # 저장된 모든 오브젝트 타입 확인</text>
  <text x="76" y="402" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">git cat-file</tspan><tspan fill="#ffffff"> --batch-all-objects --batch-check='%(objecttype) %(objectname)'</tspan></text>
  <text x="76" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">git cat-file</tspan><tspan fill="#ffffff"> --batch-all-objects --batch-check | grep blob</tspan></text>
</svg>
