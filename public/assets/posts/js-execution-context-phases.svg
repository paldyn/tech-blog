<svg width="880" height="480" viewBox="0 0 880 480" xmlns="http://www.w3.org/2000/svg" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" fill="#e8e8e8" font-size="18" font-weight="700">실행 컨텍스트의 두 단계</text>
  <text x="440" y="68" text-anchor="middle" fill="#555" font-size="13">생성 단계(Creation)와 실행 단계(Execution)</text>

  <!-- Phase 1: Creation -->
  <rect x="60" y="90" width="340" height="340" rx="10" fill="#111" stroke="#2a2a4a" stroke-width="1.5"/>
  <rect x="60" y="90" width="340" height="44" rx="10" fill="#1a1a3a"/>
  <text x="230" y="118" text-anchor="middle" fill="#9999ee" font-size="15" font-weight="700">① 생성 단계 (Creation Phase)</text>

  <!-- Creation items -->
  <rect x="84" y="152" width="292" height="50" rx="7" fill="#161630" stroke="#2a2a5a" stroke-width="1"/>
  <text x="230" y="172" text-anchor="middle" fill="#aaaaff" font-size="12" font-weight="600">Variable Environment 생성</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="230" y="191" text-anchor="middle" fill="#666" font-size="11">var 선언 → undefined 초기화</text>

  <rect x="84" y="214" width="292" height="50" rx="7" fill="#161630" stroke="#2a2a5a" stroke-width="1"/>
  <text x="230" y="234" text-anchor="middle" fill="#aaaaff" font-size="12" font-weight="600">Lexical Environment 생성</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="230" y="253" text-anchor="middle" fill="#666" font-size="11">let / const 선언 → TDZ(임시 사각지대)</text>

  <rect x="84" y="276" width="292" height="50" rx="7" fill="#161630" stroke="#2a2a5a" stroke-width="1"/>
  <text x="230" y="296" text-anchor="middle" fill="#aaaaff" font-size="12" font-weight="600">함수 선언 호이스팅</text>
  <text style="font-family:'JetBrains Mono','Menlo','Consolas',monospace" x="230" y="315" text-anchor="middle" fill="#666" font-size="11">function 선언 → 메모리에 완전히 올라감</text>

  <rect x="84" y="338" width="292" height="50" rx="7" fill="#161630" stroke="#2a2a5a" stroke-width="1"/>
  <text x="230" y="358" text-anchor="middle" fill="#aaaaff" font-size="12" font-weight="600">this 바인딩 결정</text>
  <text x="230" y="377" text-anchor="middle" fill="#666" font-size="11">전역: window/global | 메서드: 수신자 객체</text>

  <!-- Arrow between phases -->
  <text x="440" y="272" text-anchor="middle" fill="#555" font-size="30">→</text>

  <!-- Phase 2: Execution -->
  <rect x="480" y="90" width="340" height="340" rx="10" fill="#111" stroke="#2a4a2a" stroke-width="1.5"/>
  <rect x="480" y="90" width="340" height="44" rx="10" fill="#1a3a1a"/>
  <text x="650" y="118" text-anchor="middle" fill="#99ee99" font-size="15" font-weight="700">② 실행 단계 (Execution Phase)</text>

  <!-- Execution items -->
  <rect x="504" y="152" width="292" height="50" rx="7" fill="#163016" stroke="#2a5a2a" stroke-width="1"/>
  <text x="650" y="172" text-anchor="middle" fill="#aaffaa" font-size="12" font-weight="600">코드 한 줄씩 순서대로 실행</text>
  <text x="650" y="191" text-anchor="middle" fill="#666" font-size="11">표현식 평가, 할당 수행</text>

  <rect x="504" y="214" width="292" height="50" rx="7" fill="#163016" stroke="#2a5a2a" stroke-width="1"/>
  <text x="650" y="234" text-anchor="middle" fill="#aaffaa" font-size="12" font-weight="600">변수에 실제 값 할당</text>
  <text x="650" y="253" text-anchor="middle" fill="#666" font-size="11">undefined → 실제 값으로 교체됨</text>

  <rect x="504" y="276" width="292" height="50" rx="7" fill="#163016" stroke="#2a5a2a" stroke-width="1"/>
  <text x="650" y="296" text-anchor="middle" fill="#aaffaa" font-size="12" font-weight="600">함수 호출 시 새 컨텍스트 생성</text>
  <text x="650" y="315" text-anchor="middle" fill="#666" font-size="11">콜 스택에 push → 실행 완료 시 pop</text>

  <rect x="504" y="338" width="292" height="50" rx="7" fill="#163016" stroke="#2a5a2a" stroke-width="1"/>
  <text x="650" y="358" text-anchor="middle" fill="#aaffaa" font-size="12" font-weight="600">외부 환경 참조(outer) 활성화</text>
  <text x="650" y="377" text-anchor="middle" fill="#666" font-size="11">클로저의 렉시컬 스코프 체인</text>

  <!-- Bottom note -->
  <text x="440" y="455" text-anchor="middle" fill="#444" font-size="12">호이스팅은 생성 단계의 결과 — 실제로 코드가 위로 이동하는 것이 아닙니다</text>
</svg>
