<svg xmlns="http://www.w3.org/2000/svg" width="880" height="520" viewBox="0 0 880 520">
  <rect width="880" height="520" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">생성 단계 vs 실행 단계</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">Creation Phase · Execution Phase</text>

  <!-- Left column: Creation Phase -->
  <rect x="60" y="88" width="350" height="390" rx="10" fill="#0d1422" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="235" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#7ec8e3">① 생성 단계 (Creation Phase)</text>
  <text x="235" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">코드 실행 전, 메모리 할당</text>

  <!-- Creation phase code block -->
  <rect x="78" y="148" width="314" height="198" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="94" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// 소스 코드</text>
  <text x="94" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">console</text>
  <text x="144" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">.log(name); </text>
  <text x="94" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">var </text>
  <text x="124" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">name = </text>
  <text x="172" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">'Alice'</text>
  <text x="218" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">;</text>
  <text x="94" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">function </text>
  <text x="148" y="224" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">greet() {}</text>
  <line x1="78" y1="238" x2="392" y2="238" stroke="#1e2433" stroke-width="1"/>
  <text x="94" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// 생성 단계 결과</text>
  <text x="94" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">name: </text>
  <text x="130" y="276" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">undefined</text>
  <text x="94" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">greet: </text>
  <text x="136" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">fn reference</text>
  <text x="94" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">this: </text>
  <text x="126" y="312" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8c842" xml:space="preserve">globalThis</text>
  <text x="94" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">outer: </text>
  <text x="132" y="330" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#7ec8e3" xml:space="preserve">null</text>

  <text x="235" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">var → undefined으로 초기화</text>
  <text x="235" y="394" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">함수 선언 → 전체 코드 저장</text>
  <text x="235" y="414" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8c842">this / outer 참조 결정</text>
  <text x="235" y="434" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6a8aa0">let/const → TDZ 진입</text>

  <!-- Arrow between columns -->
  <polygon points="466,284 450,274 450,294" fill="#7777cc"/>
  <rect x="415" y="277" width="35" height="14" rx="4" fill="#1a1a2e"/>
  <text x="432" y="288" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#7777cc">실행</text>

  <!-- Right column: Execution Phase -->
  <rect x="470" y="88" width="350" height="390" rx="10" fill="#0d1a0d" stroke="#1e4a1e" stroke-width="1.5"/>
  <text x="645" y="114" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="700" fill="#55c555">② 실행 단계 (Execution Phase)</text>
  <text x="645" y="134" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">한 줄씩 코드 실행</text>

  <!-- Execution phase code block -->
  <rect x="488" y="148" width="314" height="198" rx="6" fill="#070b14" stroke="#1e2433"/>
  <text x="504" y="170" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// 실행 단계 — 순서대로</text>
  <text x="504" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// 1. console.log 실행</text>
  <text x="504" y="206" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// name = undefined → 출력</text>
  <line x1="488" y1="220" x2="802" y2="220" stroke="#1e2433" stroke-width="1"/>
  <text x="504" y="240" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// 2. 할당문 실행</text>
  <text x="504" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">name = </text>
  <text x="548" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#ce9178" xml:space="preserve">'Alice'</text>
  <text x="596" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#e8e8e8" xml:space="preserve">;</text>
  <line x1="488" y1="272" x2="802" y2="272" stroke="#1e2433" stroke-width="1"/>
  <text x="504" y="292" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// 3. 함수 표현식 처리</text>
  <text x="504" y="310" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#6a8aa0" xml:space="preserve">// greet는 이미 준비됨</text>
  <text x="504" y="328" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12" fill="#55c555" xml:space="preserve">// → 호출 가능</text>

  <text x="645" y="374" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">코드 한 줄씩 순서대로 실행</text>
  <text x="645" y="394" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">변수에 실제 값 할당</text>
  <text x="645" y="414" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">함수 호출 시 새 EC 생성</text>
  <text x="645" y="434" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#6a8aa0">TDZ 해제 후 let/const 사용</text>

  <!-- Footer -->
  <text x="440" y="498" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#444">PALDYN — JavaScript 완전 정복</text>
</svg>
