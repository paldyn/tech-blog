<svg xmlns="http://www.w3.org/2000/svg" width="880" height="360" viewBox="0 0 880 360">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="360" fill="#0a0a0a" rx="12"/>

  <text x="440" y="40" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="20" font-weight="700" fill="#e8e8e8">Cloud Build → Artifact Registry 워크플로우</text>

  <!-- Steps -->
  <rect x="40" y="64" width="150" height="64" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="115" y="91" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">코드 Push</text>
  <text x="115" y="109" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">GitHub / Cloud Source</text>
  <text x="115" y="123" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Repositories</text>

  <line x1="190" y1="96" x2="240" y2="96" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="240" y="64" width="150" height="64" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="315" y="91" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">Cloud Build</text>
  <text x="315" y="109" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Trigger 자동 실행</text>
  <text x="315" y="123" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">cloudbuild.yaml</text>

  <line x1="390" y1="96" x2="440" y2="96" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="440" y="64" width="150" height="64" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="515" y="91" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">Artifact Registry</text>
  <text x="515" y="109" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">이미지 저장</text>
  <text x="515" y="123" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">취약점 스캔</text>

  <line x1="590" y1="96" x2="640" y2="96" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="640" y="64" width="200" height="64" rx="8" fill="#0f1a2e" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="740" y="91" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8">GKE / Cloud Run</text>
  <text x="740" y="109" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">Workload Identity로</text>
  <text x="740" y="123" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">자동 pull</text>

  <!-- cloudbuild.yaml code -->
  <rect x="40" y="160" width="800" height="180" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="56" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#9aa4b8" xml:space="preserve"># cloudbuild.yaml</text>
  <text x="56" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#7ec8e3" font-weight="600" xml:space="preserve">steps:</text>
  <text x="56" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">  - <tspan fill="#7ec8e3" font-weight="600">name</tspan>: <tspan fill="#ce9178">'gcr.io/cloud-builders/docker'</tspan></text>
  <text x="56" y="236" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">    <tspan fill="#7ec8e3" font-weight="600">args</tspan>: [<tspan fill="#ce9178">'build'</tspan>, <tspan fill="#ce9178">'-t'</tspan>, <tspan fill="#ce9178">'$_AR_HOSTNAME/$PROJECT_ID/$_REPO/myapp:$SHORT_SHA'</tspan>, <tspan fill="#ce9178">'.'</tspan>]</text>
  <text x="56" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">  - <tspan fill="#7ec8e3" font-weight="600">name</tspan>: <tspan fill="#ce9178">'gcr.io/cloud-builders/docker'</tspan></text>
  <text x="56" y="272" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">    <tspan fill="#7ec8e3" font-weight="600">args</tspan>: [<tspan fill="#ce9178">'push'</tspan>, <tspan fill="#ce9178">'$_AR_HOSTNAME/$PROJECT_ID/$_REPO/myapp:$SHORT_SHA'</tspan>]</text>
  <text x="56" y="290" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#7ec8e3" font-weight="600" xml:space="preserve">images:</text>
  <text x="56" y="308" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">  - <tspan fill="#ce9178">'$_AR_HOSTNAME/$PROJECT_ID/$_REPO/myapp:$SHORT_SHA'</tspan></text>
  <text x="56" y="326" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#7ec8e3" font-weight="600" xml:space="preserve">substitutions:</text>
  <text x="56" y="344" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"
        fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">_AR_HOSTNAME</tspan>: asia-northeast3-docker.pkg.dev</text>
</svg>
