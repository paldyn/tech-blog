<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">이벤트 위임 — 하나의 리스너로 N개 처리</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">버블링을 활용해 공통 조상에서 이벤트를 처리</text>

  <!-- Without delegation (left) -->
  <text x="160" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e05555" text-anchor="middle">❌ 개별 리스너 (N개)</text>

  <rect x="60" y="120" width="200" height="40" rx="8" fill="#1a1a1a" stroke="#555" stroke-width="1.5"/>
  <text x="160" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">&lt;ul&gt;</text>

  <rect x="80" y="176" width="160" height="32" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="160" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">&lt;li&gt; ← onclick</text>

  <rect x="80" y="218" width="160" height="32" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="160" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">&lt;li&gt; ← onclick</text>

  <rect x="80" y="260" width="160" height="32" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="160" y="281" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">&lt;li&gt; ← onclick</text>

  <text x="160" y="316" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">나중에 추가된 &lt;li&gt; =</text>
  <text x="160" y="332" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">리스너 없음 ❌</text>

  <!-- Divider -->
  <line x1="310" y1="96" x2="310" y2="460" stroke="#333" stroke-width="1"/>

  <!-- With delegation (right) -->
  <text x="590" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">✅ 이벤트 위임 (1개)</text>

  <!-- ul with one listener -->
  <rect x="440" y="120" width="300" height="40" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="590" y="145" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">&lt;ul&gt; ← onclick (1개)</text>

  <!-- li items -->
  <rect x="470" y="176" width="240" height="32" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="590" y="197" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">&lt;li data-id="1"&gt;</text>

  <rect x="470" y="218" width="240" height="32" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="590" y="239" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">&lt;li data-id="2"&gt;</text>

  <rect x="470" y="260" width="240" height="32" rx="6" fill="#111" stroke="#333" stroke-width="1"/>
  <text x="590" y="281" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8" text-anchor="middle">&lt;li data-id="3"&gt;</text>

  <!-- Bubble arrows -->
  <line x1="590" y1="260" x2="590" y2="210" stroke="#55c555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="590,202 585,212 595,212" fill="#55c555"/>
  <text x="756" y="236" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">버블링↑</text>

  <!-- Later added li -->
  <rect x="470" y="302" width="240" height="32" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="590" y="323" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">&lt;li&gt; 나중에 추가 ✅</text>

  <!-- Benefits box -->
  <rect x="60" y="360" width="760" height="96" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="440" y="384" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">이벤트 위임의 이점</text>
  <text x="100" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• 메모리 절약: 리스너 N → 1</text>
  <text x="100" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• 동적 요소 자동 처리: 나중에 추가된 자식도 즉시 동작</text>
  <text x="440" y="408" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• 코드 간결: 리스너 등록/해제 로직 단순</text>
  <text x="440" y="428" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">• event.target.closest()로 정확한 대상 판별</text>
</svg>
