<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" height="560" viewBox="0 0 880 560">
  <rect width="880" height="560" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="22" font-weight="700" fill="#e8e8e8">라우팅 설정: YAML vs Java DSL</text>
  <text x="440" y="74" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" fill="#888">Gateway 라우트 설정의 두 가지 방식 비교</text>

  <!-- Left panel header -->
  <rect x="40" y="94" width="390" height="34" rx="6" fill="#0f1929" stroke="#2d5a8e" stroke-width="1"/>
  <text x="235" y="116" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#7ec8e3">application.yml (YAML 설정)</text>

  <!-- Left code box -->
  <rect x="40" y="136" width="390" height="376" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text xml:space="preserve" x="56" y="157"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600">spring:</text>

  <text xml:space="preserve" x="56" y="176"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">  cloud:</text>

  <text xml:space="preserve" x="56" y="195"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">    gateway:</text>

  <text xml:space="preserve" x="56" y="214"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">      routes:</text>

  <text xml:space="preserve" x="56" y="233"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8">        # 사용자 서비스 라우트</text>

  <text xml:space="preserve" x="56" y="252"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan>        - id: </tspan>
    <tspan fill="#ce9178">user-route</tspan>
  </text>

  <text xml:space="preserve" x="56" y="271"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan>          uri: </tspan>
    <tspan fill="#ce9178">lb://user-service</tspan>
  </text>

  <text xml:space="preserve" x="56" y="290"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">          predicates:</text>

  <text xml:space="preserve" x="56" y="309"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan>            - </tspan>
    <tspan fill="#ce9178">Path=/api/users/**</tspan>
  </text>

  <text xml:space="preserve" x="56" y="328"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">          filters:</text>

  <text xml:space="preserve" x="56" y="347"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">            - name: CircuitBreaker</text>

  <text xml:space="preserve" x="56" y="366"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">              args:</text>

  <text xml:space="preserve" x="56" y="385"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan>                name: </tspan>
    <tspan fill="#ce9178">userCB</tspan>
  </text>

  <text xml:space="preserve" x="56" y="404"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan>            - </tspan>
    <tspan fill="#7ec8e3" font-weight="600">AddRequestHeader</tspan>
    <tspan>=X-Via, gw</tspan>
  </text>

  <text xml:space="preserve" x="56" y="423"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan>            - </tspan>
    <tspan fill="#7ec8e3" font-weight="600">StripPrefix</tspan>
    <tspan>=1</tspan>
  </text>

  <text xml:space="preserve" x="56" y="442"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8">        # 주문 서비스 라우트</text>

  <text xml:space="preserve" x="56" y="461"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan>        - id: </tspan>
    <tspan fill="#ce9178">order-route</tspan>
  </text>

  <text xml:space="preserve" x="56" y="480"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan>          uri: </tspan>
    <tspan fill="#ce9178">lb://order-service</tspan>
  </text>

  <text xml:space="preserve" x="56" y="499"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan>          predicates:</tspan>
  </text>

  <text xml:space="preserve" x="56" y="518"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan>            - </tspan>
    <tspan fill="#ce9178">Path=/api/orders/**</tspan>
  </text>

  <!-- Divider -->
  <line x1="444" y1="90" x2="444" y2="545" stroke="#2a2a2a" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Right panel header -->
  <rect x="450" y="94" width="390" height="34" rx="6" fill="#0e1c0e" stroke="#2d6e2d" stroke-width="1"/>
  <text x="645" y="116" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="14" font-weight="600" fill="#55c555">Java DSL (RouteLocator)</text>

  <!-- Right code box -->
  <rect x="450" y="136" width="390" height="376" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <text xml:space="preserve" x="466" y="157"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600">@Configuration</text>

  <text xml:space="preserve" x="466" y="176"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3" font-weight="600">public class</tspan>
    <tspan> GatewayConfig {</tspan>
  </text>

  <text xml:space="preserve" x="466" y="195"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8">  // 라우트 빈 등록</text>

  <text xml:space="preserve" x="466" y="214"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#7ec8e3" font-weight="600">  @Bean</text>

  <text xml:space="preserve" x="466" y="233"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan fill="#7ec8e3" font-weight="600">  public</tspan>
    <tspan> RouteLocator routes(</tspan>
  </text>

  <text xml:space="preserve" x="466" y="252"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">      RouteLocatorBuilder b) {</text>

  <text xml:space="preserve" x="466" y="271"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan>    </tspan>
    <tspan fill="#7ec8e3" font-weight="600">return</tspan>
    <tspan> b.routes()</tspan>
  </text>

  <text xml:space="preserve" x="466" y="290"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan>      .route(</tspan>
    <tspan fill="#ce9178">"user-route"</tspan>
    <tspan>, r -&gt;</tspan>
  </text>

  <text xml:space="preserve" x="466" y="309"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan>        r.path(</tspan>
    <tspan fill="#ce9178">"/api/users/**"</tspan>
    <tspan>)</tspan>
  </text>

  <text xml:space="preserve" x="466" y="328"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan>         .filters(f -&gt; f</tspan>
  </text>

  <text xml:space="preserve" x="466" y="347"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan>           .addRequestHeader(</tspan>
  </text>

  <text xml:space="preserve" x="466" y="366"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan>             </tspan>
    <tspan fill="#ce9178">"X-Via"</tspan>
    <tspan>, </tspan>
    <tspan fill="#ce9178">"gateway"</tspan>
    <tspan>)</tspan>
  </text>

  <text xml:space="preserve" x="466" y="385"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan>           .circuitBreaker(c -&gt; c</tspan>
  </text>

  <text xml:space="preserve" x="466" y="404"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan>             .setName(</tspan>
    <tspan fill="#ce9178">"userCB"</tspan>
    <tspan>)))</tspan>
  </text>

  <text xml:space="preserve" x="466" y="423"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">
    <tspan>         .uri(</tspan>
    <tspan fill="#ce9178">"lb://user-service"</tspan>
    <tspan>))</tspan>
  </text>

  <text xml:space="preserve" x="466" y="442"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">      .build();</text>

  <text xml:space="preserve" x="466" y="461"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">  } </text>

  <text xml:space="preserve" x="466" y="480"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8">  // YAML 방식과 동일한 결과</text>

  <text xml:space="preserve" x="466" y="499"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#9aa4b8">  // Java DSL: 조건부 로직 구현 용이</text>

  <text xml:space="preserve" x="466" y="518"
    font-family="'JetBrains Mono','Menlo','Consolas',monospace"
    font-size="13" fill="#ffffff">} </text>

  <!-- Bottom note -->
  <text x="440" y="546" text-anchor="middle"
    font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
    font-size="13" fill="#888">lb:// URI는 Eureka 레지스트리에서 실제 서비스 주소를 자동으로 조회한다</text>
</svg>
