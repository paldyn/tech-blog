<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380">
  <defs>
    <marker id="arrowhead" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="380" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">Pass@K 계산 코드</text>

  <!-- Title bar above code -->
  <rect x="40" y="66" width="800" height="36" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="60" y="89" font-size="14" font-weight="600" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">Pass@K 공식</text>
  <!-- Badge -->
  <rect x="720" y="74" width="100" height="20" rx="10" fill="#7777cc"/>
  <text x="770" y="88" text-anchor="middle" font-size="11" fill="#ffffff" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-weight="600">HumanEval</text>

  <!-- Code block -->
  <rect x="40" y="102" width="800" height="222" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>

  <!-- Code content -->
  <text x="60" y="124" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> numpy </tspan><tspan fill="#7ec8e3" font-weight="600">as</tspan><tspan fill="#ffffff"> np</tspan>
  </text>
  <text x="60" y="142" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">from</tspan><tspan fill="#ffffff"> typing </tspan><tspan fill="#7ec8e3" font-weight="600">import</tspan><tspan fill="#ffffff"> Callable</tspan>
  </text>
  <text x="60" y="160" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> </text>
  <text x="60" y="178" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#7ec8e3" font-weight="600">def</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#55c555">pass_at_k</tspan><tspan fill="#ffffff">(n: </tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff">, c: </tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff">, k: </tspan><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff">) -> </tspan><tspan fill="#7ec8e3" font-weight="600">float</tspan><tspan fill="#ffffff">:</tspan>
  </text>
  <text x="60" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    </tspan><tspan fill="#ce9178">"""n: 총 시도 횟수, c: 정답 개수, k: k 값"""</tspan>
  </text>
  <text x="60" y="214" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">if</tspan><tspan fill="#ffffff"> n - c &lt; k:</tspan>
  </text>
  <text x="60" y="232" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">        </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">1.0</tspan>
  </text>
  <text x="60" y="250" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">1.0</tspan><tspan fill="#ffffff"> - </tspan><tspan fill="#7ec8e3" font-weight="600">float</tspan><tspan fill="#ffffff">(np.prod(</tspan>
  </text>
  <text x="60" y="268" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">        [(n - c - i) / (n - i) </tspan><tspan fill="#7ec8e3" font-weight="600">for</tspan><tspan fill="#ffffff"> i </tspan><tspan fill="#7ec8e3" font-weight="600">in</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3" font-weight="600">range</tspan><tspan fill="#ffffff">(k)]))</tspan>
  </text>
  <text x="60" y="286" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> </text>
  <text x="60" y="304" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#9aa4b8"># HumanEval 스타일 평가</tspan>
  </text>
  <text x="60" y="322" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13">
    <tspan fill="#ffffff">score = pass_at_k(n=</tspan><tspan fill="#b5cea8">10</tspan><tspan fill="#ffffff">, c=c, k=</tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">)</tspan>
  </text>

  <!-- Explanation boxes below code -->
  <rect x="40" y="336" width="236" height="32" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="158" y="357" text-anchor="middle" font-size="13" font-weight="600" fill="#7ec8e3" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">n = 총 생성 수</text>

  <rect x="292" y="336" width="236" height="32" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="410" y="357" text-anchor="middle" font-size="13" font-weight="600" fill="#55c555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">c = 통과 수</text>

  <rect x="544" y="336" width="236" height="32" rx="6" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="662" y="357" text-anchor="middle" font-size="13" font-weight="600" fill="#ce9178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">k = 허용 시도 수</text>
</svg>
