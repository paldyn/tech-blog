<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 480">
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <text x="440" y="42" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">MyBatis SQL 맵핑 아키텍처</text>
  <text x="440" y="64" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888" text-anchor="middle">SQL 직접 작성 + 결과 자동 매핑 — SQL Mapper 계층</text>

  <defs>
    <marker id="arrFlow" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <!-- Step 1 -->
  <rect x="44" y="82" width="166" height="68" rx="8" fill="#12182a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="127" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Mapper Interface</text>
  <text x="127" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">Java 메서드 호출</text>
  <text x="127" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">파라미터 전달</text>

  <line x1="210" y1="116" x2="264" y2="116" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrFlow)"/>

  <!-- Step 2 -->
  <rect x="266" y="82" width="166" height="68" rx="8" fill="#0e1a0e" stroke="#55c555" stroke-width="1.5"/>
  <text x="349" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">XML Mapper</text>
  <text x="349" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">동적 SQL 조합</text>
  <text x="349" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">if / foreach / trim</text>

  <line x1="432" y1="116" x2="486" y2="116" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrFlow)"/>

  <!-- Step 3 -->
  <rect x="488" y="82" width="166" height="68" rx="8" fill="#1a1220" stroke="#7777cc" stroke-width="1.5"/>
  <text x="571" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">SQL Executor</text>
  <text x="571" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">#{} 파라미터 바인딩</text>
  <text x="571" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">PreparedStatement 실행</text>

  <line x1="654" y1="116" x2="708" y2="116" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arrFlow)"/>

  <!-- Step 4 -->
  <rect x="710" y="82" width="130" height="68" rx="8" fill="#0d1a0e" stroke="#55c555" stroke-width="1.5"/>
  <text x="775" y="108" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">ResultMap</text>
  <text x="775" y="126" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">ResultSet → DTO</text>
  <text x="775" y="142" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">중첩 매핑 지원</text>

  <!-- Dynamic SQL elements -->
  <text x="440" y="178" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8" text-anchor="middle">동적 SQL 태그</text>

  <rect x="44" y="190" width="176" height="86" rx="6" fill="#111"/>
  <text x="132" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">&lt;if&gt;</text>
  <text x="132" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">조건부 SQL 조각</text>
  <text x="132" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">test 속성 OGNL 표현식</text>
  <text x="132" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">null 체크 필수</text>

  <rect x="232" y="190" width="176" height="86" rx="6" fill="#111"/>
  <text x="320" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">&lt;where&gt; / &lt;set&gt;</text>
  <text x="320" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">앞뒤 AND·콤마 자동 처리</text>
  <text x="320" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">빈 절이면 WHERE 생략</text>
  <text x="320" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">&lt;trim&gt;으로 세밀 제어</text>

  <rect x="420" y="190" width="176" height="86" rx="6" fill="#111"/>
  <text x="508" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">&lt;foreach&gt;</text>
  <text x="508" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">IN절·다건 INSERT</text>
  <text x="508" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">collection, item 속성</text>
  <text x="508" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">separator로 구분자 지정</text>

  <rect x="608" y="190" width="232" height="86" rx="6" fill="#111"/>
  <text x="724" y="212" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">&lt;choose&gt; / &lt;sql&gt;</text>
  <text x="724" y="230" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">choose: switch-case 패턴</text>
  <text x="724" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">sql: 공통 조각 재사용</text>
  <text x="724" y="266" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666" text-anchor="middle">include로 삽입</text>

  <!-- Key differences -->
  <rect x="44" y="298" width="792" height="152" rx="8" fill="#111"/>
  <text x="440" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">MyBatis vs JPA 비교</text>

  <rect x="64" y="330" width="340" height="106" rx="6" fill="#0d1520"/>
  <text x="234" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">MyBatis (SQL Mapper)</text>
  <text x="234" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">SQL 직접 작성 — 완전한 제어권</text>
  <text x="234" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">동적 SQL 조합이 자연스러움</text>
  <text x="234" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">복잡한 조인·서브쿼리 용이</text>
  <text x="234" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">한국 SI·공공기관에서 표준</text>

  <rect x="476" y="330" width="340" height="106" rx="6" fill="#0e1a0e"/>
  <text x="646" y="350" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">JPA/Hibernate</text>
  <text x="646" y="368" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">객체 중심 설계</text>
  <text x="646" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">CRUD 자동화, 보일러플레이트 감소</text>
  <text x="646" y="404" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Dirty Checking, 1차 캐시</text>
  <text x="646" y="422" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">스프링 부트 생태계 표준</text>
</svg>
