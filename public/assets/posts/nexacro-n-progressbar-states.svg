<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">ProgressBar 시각 상태 및 속성</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">value · min · max · direction · style</text>

  <!-- 0% -->
  <text x="80" y="116" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">0% (초기 상태)</text>
  <rect x="80" y="126" width="720" height="28" fill="#1a1a2e" rx="6" stroke="#1e2433"/>
  <text x="820" y="146" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="end">value=0</text>

  <!-- 30% -->
  <text x="80" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">30%</text>
  <rect x="80" y="196" width="720" height="28" fill="#1a1a2e" rx="6" stroke="#1e2433"/>
  <rect x="80" y="196" width="216" height="28" fill="#7ec8e3" rx="6"/>
  <text x="820" y="216" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7ec8e3" text-anchor="end">value=30</text>

  <!-- 65% -->
  <text x="80" y="256" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">65% (경고 구간)</text>
  <rect x="80" y="266" width="720" height="28" fill="#1a1a2e" rx="6" stroke="#1e2433"/>
  <rect x="80" y="266" width="468" height="28" fill="#e0a030" rx="6"/>
  <text x="820" y="286" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e0a030" text-anchor="end">value=65</text>

  <!-- 100% -->
  <text x="80" y="326" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888">100% (완료)</text>
  <rect x="80" y="336" width="720" height="28" fill="#1a1a2e" rx="6" stroke="#1e2433"/>
  <rect x="80" y="336" width="720" height="28" fill="#55c555" rx="6"/>
  <text x="820" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="end">value=100</text>

  <!-- Properties table -->
  <rect x="80" y="390" width="720" height="50" fill="#111827" rx="8" stroke="#1e2433"/>
  <text x="110" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">min</text>
  <text x="110" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">0 (기본값)</text>
  <text x="240" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">max</text>
  <text x="240" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">100 (기본값)</text>
  <text x="370" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">direction</text>
  <text x="370" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">right | left | up | down</text>
  <text x="580" y="412" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">showvalue</text>
  <text x="580" y="430" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#b5cea8">true | false</text>
</svg>
