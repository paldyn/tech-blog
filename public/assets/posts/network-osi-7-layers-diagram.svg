<svg xmlns="http://www.w3.org/2000/svg" width="880" height="540" viewBox="0 0 880 540">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr2" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#888"/>
    </marker>
  </defs>
  <rect width="880" height="540" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">OSI 7계층 모델</text>
  <text x="440" y="68" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">각 계층의 역할과 대표 프로토콜</text>

  <!-- Left column: Sender -->
  <text x="200" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">송신자 (Sender)</text>

  <!-- Layer 7 Application -->
  <rect x="60" y="108" width="280" height="44" rx="6" fill="#1a1a35" stroke="#7777cc" stroke-width="1.5"/>
  <text x="90" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">7. 응용 (Application)</text>
  <text x="310" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="end">HTTP, DNS, FTP, SMTP</text>

  <!-- Layer 6 Presentation -->
  <rect x="60" y="158" width="280" height="44" rx="6" fill="#1a1a35" stroke="#7777cc" stroke-width="1"/>
  <text x="90" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#9090dd">6. 표현 (Presentation)</text>
  <text x="310" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="end">SSL/TLS, JPEG, ASCII</text>

  <!-- Layer 5 Session -->
  <rect x="60" y="208" width="280" height="44" rx="6" fill="#1a1a35" stroke="#7777cc" stroke-width="1"/>
  <text x="90" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#9090dd">5. 세션 (Session)</text>
  <text x="310" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="end">NetBIOS, RPC</text>

  <!-- Layer 4 Transport -->
  <rect x="60" y="258" width="280" height="44" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="90" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">4. 전송 (Transport)</text>
  <text x="310" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="end">TCP, UDP</text>

  <!-- Layer 3 Network -->
  <rect x="60" y="308" width="280" height="44" rx="6" fill="#1a2a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="90" y="333" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">3. 네트워크 (Network)</text>
  <text x="310" y="333" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="end">IP, ICMP, ARP</text>

  <!-- Layer 2 DataLink -->
  <rect x="60" y="358" width="280" height="44" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="90" y="383" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">2. 데이터링크 (DataLink)</text>
  <text x="310" y="383" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="end">Ethernet, Wi-Fi, PPP</text>

  <!-- Layer 1 Physical -->
  <rect x="60" y="408" width="280" height="44" rx="6" fill="#2a1a1a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="90" y="433" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">1. 물리 (Physical)</text>
  <text x="310" y="433" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="end">케이블, 광섬유, 전파</text>

  <!-- Right column: Receiver -->
  <text x="680" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#888" text-anchor="middle">수신자 (Receiver)</text>

  <rect x="540" y="108" width="280" height="44" rx="6" fill="#1a1a35" stroke="#7777cc" stroke-width="1.5"/>
  <text x="570" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc">7. 응용 (Application)</text>
  <text x="800" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="end">HTTP, DNS, FTP, SMTP</text>

  <rect x="540" y="158" width="280" height="44" rx="6" fill="#1a1a35" stroke="#7777cc" stroke-width="1"/>
  <text x="570" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#9090dd">6. 표현 (Presentation)</text>
  <text x="800" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="end">SSL/TLS, JPEG, ASCII</text>

  <rect x="540" y="208" width="280" height="44" rx="6" fill="#1a1a35" stroke="#7777cc" stroke-width="1"/>
  <text x="570" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#9090dd">5. 세션 (Session)</text>
  <text x="800" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="end">NetBIOS, RPC</text>

  <rect x="540" y="258" width="280" height="44" rx="6" fill="#1a2a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="570" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">4. 전송 (Transport)</text>
  <text x="800" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="end">TCP, UDP</text>

  <rect x="540" y="308" width="280" height="44" rx="6" fill="#1a2a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="570" y="333" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">3. 네트워크 (Network)</text>
  <text x="800" y="333" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="end">IP, ICMP, ARP</text>

  <rect x="540" y="358" width="280" height="44" rx="6" fill="#2a1a1a" stroke="#e05555" stroke-width="1.5"/>
  <text x="570" y="383" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">2. 데이터링크 (DataLink)</text>
  <text x="800" y="383" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="end">Ethernet, Wi-Fi, PPP</text>

  <rect x="540" y="408" width="280" height="44" rx="6" fill="#2a1a1a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="570" y="433" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#ce9178">1. 물리 (Physical)</text>
  <text x="800" y="433" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="end">케이블, 광섬유, 전파</text>

  <!-- Center arrows: send down, receive up -->
  <line x1="400" y1="158" x2="400" y2="452" stroke="#3a4a6e" stroke-width="1.5" stroke-dasharray="4,4"/>
  <!-- Down arrow from sender -->
  <line x1="350" y1="108" x2="350" y2="452" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="350" y1="452" x2="390" y2="452" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="335" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle" transform="rotate(-90 335 300)">인캡슐레이션 (캡슐화)</text>
  <!-- Up arrow to receiver -->
  <line x1="490" y1="452" x2="530" y2="452" stroke="#7ec8e3" stroke-width="1.5"/>
  <line x1="530" y1="452" x2="530" y2="108" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="546" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#7ec8e3" text-anchor="middle" transform="rotate(90 546 300)">디캡슐레이션 (역캡슐화)</text>

  <!-- Physical medium -->
  <rect x="350" y="462" width="180" height="34" rx="6" fill="#1a1a1a" stroke="#ce9178" stroke-width="1.5"/>
  <text x="440" y="484" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#ce9178" text-anchor="middle">물리 매체 (전기/광/전파)</text>

  <!-- PDU labels on left -->
  <text x="46" y="133" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="end">Data</text>
  <text x="46" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="end">Data</text>
  <text x="46" y="233" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="end">Data</text>
  <text x="46" y="283" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="end">Segment</text>
  <text x="46" y="333" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="end">Packet</text>
  <text x="46" y="383" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="end">Frame</text>
  <text x="46" y="433" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#555" text-anchor="end">Bit</text>
</svg>
