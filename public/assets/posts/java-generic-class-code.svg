<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">제네릭 클래스 정의 &amp; 다중 타입 파라미터</text>

  <!-- Left: Single type param -->
  <rect x="40" y="64" width="380" height="240" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="56" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">단일 타입 파라미터</text>
  <text x="56" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">class</tspan><tspan fill="#ffffff"> Stack&lt;</tspan><tspan fill="#55c555">E</tspan><tspan fill="#ffffff">&gt; {</tspan></text>
  <text x="56" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">private</tspan><tspan fill="#ffffff"> List&lt;</tspan><tspan fill="#55c555">E</tspan><tspan fill="#ffffff">&gt; elements = </tspan><tspan fill="#7ec8e3" font-weight="600">new</tspan><tspan fill="#ffffff"> ArrayList&lt;&gt;();</tspan></text>
  <text x="56" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">public void</tspan><tspan fill="#ffffff"> push(</tspan><tspan fill="#55c555">E</tspan><tspan fill="#ffffff"> e) { elements.add(e); }</tspan></text>
  <text x="56" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">public</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#55c555">E</tspan><tspan fill="#ffffff"> pop() {</tspan></text>
  <text x="56" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">    </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> elements.remove(elements.size() - </tspan><tspan fill="#b5cea8">1</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="56" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  }</text>
  <text x="56" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>
  <text x="56" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#9aa4b8">// 사용 — 타입 인자 전달</tspan></text>
  <text x="56" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">Stack&lt;</tspan><tspan fill="#7ec8e3" font-weight="600">String</tspan><tspan fill="#ffffff">&gt; stack = </tspan><tspan fill="#7ec8e3" font-weight="600">new</tspan><tspan fill="#ffffff"> Stack&lt;&gt;();</tspan></text>
  <text x="56" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">stack.push(</tspan><tspan fill="#ce9178">"hello"</tspan><tspan fill="#ffffff">);</tspan></text>

  <!-- Right: Multiple type params -->
  <rect x="460" y="64" width="380" height="240" fill="#000000" rx="6" stroke="#3a4a6e" stroke-width="1"/>
  <text x="476" y="84" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">다중 타입 파라미터</text>
  <text x="476" y="108" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">class</tspan><tspan fill="#ffffff"> Pair&lt;</tspan><tspan fill="#55c555">K</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#7ec8e3">V</tspan><tspan fill="#ffffff">&gt; {</tspan></text>
  <text x="476" y="128" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">private final</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#55c555">K</tspan><tspan fill="#ffffff"> key;</tspan></text>
  <text x="476" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">private final</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3">V</tspan><tspan fill="#ffffff"> value;</tspan></text>
  <text x="476" y="168" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">public</tspan><tspan fill="#ffffff"> Pair(</tspan><tspan fill="#55c555">K</tspan><tspan fill="#ffffff"> k, </tspan><tspan fill="#7ec8e3">V</tspan><tspan fill="#ffffff"> v) { key=k; value=v; }</tspan></text>
  <text x="476" y="188" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">public</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#55c555">K</tspan><tspan fill="#ffffff"> getKey()   { </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> key; }</tspan></text>
  <text x="476" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">public</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#7ec8e3">V</tspan><tspan fill="#ffffff"> getValue() { </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> value; }</tspan></text>
  <text x="476" y="228" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>
  <text x="476" y="254" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#ffffff">Pair&lt;</tspan><tspan fill="#7ec8e3" font-weight="600">String</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#7ec8e3" font-weight="600">Integer</tspan><tspan fill="#ffffff">&gt; p = </tspan><tspan fill="#7ec8e3" font-weight="600">new</tspan><tspan fill="#ffffff"> Pair&lt;&gt;(</tspan><tspan fill="#ce9178">"age"</tspan><tspan fill="#ffffff">, </tspan><tspan fill="#b5cea8">30</tspan><tspan fill="#ffffff">);</tspan></text>
  <text x="476" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">String</tspan><tspan fill="#ffffff"> k = p.getKey(); </tspan><tspan fill="#9aa4b8">// 캐스팅 없음</tspan></text>
  <text x="476" y="294" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">int</tspan><tspan fill="#ffffff"> v = p.getValue();</tspan></text>

  <!-- Footer note -->
  <text x="440" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">타입 파라미터는 클래스 이름 뒤 &lt;&gt; 안에 선언 — 인스턴스화 시 구체 타입으로 교체됨</text>
</svg>
