<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" width="880" height="500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">MutationObserver 동작 흐름</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">마이크로태스크 큐에서 배치 전달 — 동기 폴링과의 차이</text>

  <!-- Step 1: DOM Mutation -->
  <rect x="60" y="96" width="200" height="64" rx="8" fill="#0d1a1a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="160" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3" text-anchor="middle">① DOM 변경</text>
  <text x="160" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">appendChild / setAttribute</text>

  <!-- Arrow -->
  <line x1="260" y1="128" x2="310" y2="128" stroke="#7ec8e3" stroke-width="1.5"/>
  <polygon points="320,128 308,122 308,134" fill="#7ec8e3"/>

  <!-- Step 2: Record Queue -->
  <rect x="320" y="96" width="200" height="64" rx="8" fill="#0a0d1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="420" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7777cc" text-anchor="middle">② MutationRecord 적재</text>
  <text x="420" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">브라우저 내부 큐</text>

  <!-- Arrow -->
  <line x1="520" y1="128" x2="570" y2="128" stroke="#7777cc" stroke-width="1.5"/>
  <polygon points="580,128 568,122 568,134" fill="#7777cc"/>

  <!-- Step 3: Microtask -->
  <rect x="580" y="96" width="200" height="64" rx="8" fill="#1a0a1a" stroke="#55c555" stroke-width="1.5"/>
  <text x="680" y="122" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">③ 마이크로태스크</text>
  <text x="680" y="144" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">태스크 종료 후 콜백 실행</text>

  <!-- Callback box -->
  <rect x="200" y="220" width="480" height="100" rx="8" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="440" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">callback(mutations, observer)</text>
  <text x="440" y="272" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">mutations: MutationRecord[]  — 이번 배치의 모든 변경</text>
  <text x="440" y="292" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888" text-anchor="middle">observer: 이 MutationObserver 자신 (disconnect 가능)</text>

  <!-- Arrow from step 3 down to callback -->
  <line x1="680" y1="160" x2="680" y2="200" stroke="#55c555" stroke-width="1.5"/>
  <line x1="680" y1="200" x2="440" y2="200" stroke="#55c555" stroke-width="1.5"/>
  <line x1="440" y1="200" x2="440" y2="220" stroke="#55c555" stroke-width="1.5"/>
  <polygon points="440,220 434,210 446,210" fill="#55c555"/>

  <!-- MutationRecord structure -->
  <rect x="60" y="352" width="360" height="104" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="80" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">MutationRecord 주요 필드</text>
  <text x="80" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">type: "childList" | "attributes" | "characterData"</text>
  <text x="80" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">target: 변경된 노드</text>
  <text x="80" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">addedNodes / removedNodes: NodeList</text>
  <text x="80" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">attributeName / oldValue</text>

  <!-- observe options -->
  <rect x="460" y="352" width="360" height="104" rx="8" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="480" y="376" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7777cc">observe(target, options) 옵션</text>
  <text x="480" y="396" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">childList: true  — 자식 노드 추가/제거</text>
  <text x="480" y="414" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">attributes: true  — 속성 변경</text>
  <text x="480" y="432" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">subtree: true  — 모든 후손 감시</text>
  <text x="480" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">characterData: true  — 텍스트 노드 변경</text>
</svg>
