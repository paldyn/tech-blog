<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
  </defs>
  <rect width="880" height="480" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">SQLOS 핵심 개념: Task·Worker·Scheduler</text>

  <!-- Task -->
  <rect x="60" y="80" width="220" height="130" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="2"/>
  <text x="170" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">Task (태스크)</text>
  <line x1="80" y1="116" x2="260" y2="116" stroke="#3a4a6e" stroke-width="1"/>
  <text x="170" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">쿼리 실행 단위</text>
  <text x="170" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">sys.dm_os_tasks</text>
  <text x="170" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Pending / Running</text>
  <text x="170" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">Suspended / Done</text>

  <!-- Arrow Task -> Worker -->
  <line x1="280" y1="145" x2="328" y2="145" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="304" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">배정</text>

  <!-- Worker -->
  <rect x="330" y="80" width="220" height="130" rx="8" fill="#0f1a2e" stroke="#55c555" stroke-width="2"/>
  <text x="440" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#55c555" text-anchor="middle">Worker (워커)</text>
  <line x1="350" y1="116" x2="530" y2="116" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">OS 스레드 래퍼</text>
  <text x="440" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">sys.dm_os_workers</text>
  <text x="440" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">max worker threads</text>
  <text x="440" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">기본 512~2048</text>

  <!-- Arrow Worker -> Scheduler -->
  <line x1="550" y1="145" x2="598" y2="145" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <text x="574" y="138" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">실행</text>

  <!-- Scheduler -->
  <rect x="600" y="80" width="220" height="130" rx="8" fill="#0f1a2e" stroke="#e0a040" stroke-width="2"/>
  <text x="710" y="106" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#e0a040" text-anchor="middle">Scheduler (스케줄러)</text>
  <line x1="620" y1="116" x2="800" y2="116" stroke="#3a4a6e" stroke-width="1"/>
  <text x="710" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">논리 CPU 1:1 매핑</text>
  <text x="710" y="154" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e8e8e8" text-anchor="middle">sys.dm_os_schedulers</text>
  <text x="710" y="172" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">ONLINE / ONLINE HIDDEN</text>
  <text x="710" y="190" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888" text-anchor="middle">DAC / OFFLINE</text>

  <!-- States flow -->
  <text x="60" y="248" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#888">워커 상태 전환</text>

  <rect x="60" y="262" width="130" height="42" rx="6" fill="#0a1a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="125" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">RUNNABLE</text>

  <line x1="190" y1="283" x2="238" y2="283" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="240" y="262" width="130" height="42" rx="6" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="305" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">RUNNING</text>

  <line x1="370" y1="283" x2="418" y2="283" stroke="#e0a040" stroke-width="2" marker-end="url(#arr)"/>
  <text x="394" y="275" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">I/O 대기</text>

  <rect x="420" y="262" width="130" height="42" rx="6" fill="#1a0a0a" stroke="#e05555" stroke-width="1.5"/>
  <text x="485" y="288" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#e05555" text-anchor="middle">SUSPENDED</text>

  <!-- Back arrow from SUSPENDED to RUNNABLE -->
  <path d="M 485 304 Q 485 335 305 335 Q 125 335 125 304" fill="none"
        stroke="#e0a040" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arr)"/>
  <text x="305" y="352" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">I/O 완료 → 다시 Runnable 큐에 추가</text>

  <!-- Code block -->
  <rect x="60" y="380" width="760" height="80" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text xml:space="preserve" x="80" y="404" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8">-- 대기 유형별 통계 (SQLOS 병목 진단)</text>
  <text xml:space="preserve" x="80" y="422" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">SELECT TOP</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">10</tspan><tspan fill="#ffffff"> wait_type, waiting_tasks_count, wait_time_ms,</tspan></text>
  <text xml:space="preserve" x="80" y="440" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#ffffff">       signal_wait_time_ms </tspan><tspan fill="#7ec8e3" font-weight="600">FROM</tspan><tspan fill="#ffffff"> sys.dm_os_wait_stats</tspan></text>
  <text xml:space="preserve" x="80" y="454" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13"><tspan fill="#7ec8e3" font-weight="600">ORDER BY</tspan><tspan fill="#ffffff"> wait_time_ms </tspan><tspan fill="#7ec8e3" font-weight="600">DESC</tspan><tspan fill="#ffffff">;</tspan></text>
</svg>
