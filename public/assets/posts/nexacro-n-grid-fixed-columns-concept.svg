<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Grid 고정 컬럼 구조</text>
  <text x="440" y="70" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888" text-anchor="middle">fixedcol — 좌측 컬럼을 고정해 수평 스크롤 시에도 유지</text>

  <!-- Grid mock -->
  <rect x="60" y="90" width="760" height="290" fill="#111827" rx="8" stroke="#1e2433" stroke-width="1.5"/>

  <!-- Fixed region label -->
  <rect x="62" y="92" width="226" height="286" fill="#1a2a1a" rx="6" stroke="#2a5a2a" stroke-width="1.5"/>
  <text x="175" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">고정 영역 (fixedcol=2)</text>

  <!-- Scrollable region label -->
  <rect x="290" y="92" width="528" height="286" fill="#1a1a2a" rx="6" stroke="#2a2a5a" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="554" y="386" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">스크롤 영역 (수평 스크롤 적용)</text>

  <!-- Head row -->
  <rect x="62" y="92" width="226" height="36" fill="#1a2744" rx="4"/>
  <text x="130" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">사번</text>
  <line x1="192" y1="92" x2="192" y2="378" stroke="#2a5a2a" stroke-width="1"/>
  <text x="245" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555" text-anchor="middle">성명</text>

  <rect x="290" y="92" width="528" height="36" fill="#1a2030"/>
  <text x="360" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">부서</text>
  <text x="460" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">직급</text>
  <text x="560" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">입사일</text>
  <text x="660" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">급여</text>
  <text x="780" y="115" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#888" text-anchor="middle">→ 스크롤</text>

  <line x1="60" y1="128" x2="820" y2="128" stroke="#253555" stroke-width="1.5"/>

  <!-- Body rows: fixed part -->
  <rect x="62" y="128" width="226" height="36" fill="#0d1a0d"/>
  <text x="130" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">E001</text>
  <text x="245" y="151" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">홍길동</text>

  <rect x="62" y="164" width="226" height="36" fill="#0f1f0f"/>
  <text x="130" y="187" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">E002</text>
  <text x="245" y="187" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">김철수</text>

  <rect x="62" y="200" width="226" height="36" fill="#0d1a0d"/>
  <text x="130" y="223" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">E003</text>
  <text x="245" y="223" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">이영희</text>

  <rect x="62" y="236" width="226" height="36" fill="#0f1f0f"/>
  <text x="130" y="259" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">E004</text>
  <text x="245" y="259" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">박민수</text>

  <rect x="62" y="272" width="226" height="36" fill="#0d1a0d"/>
  <text x="130" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">E005</text>
  <text x="245" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">최지연</text>

  <rect x="62" y="308" width="226" height="36" fill="#0f1f0f"/>
  <text x="130" y="331" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">E006</text>
  <text x="245" y="331" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e8e8e8" text-anchor="middle">정수진</text>

  <!-- Body rows: scrollable part (faded) -->
  <rect x="290" y="128" width="528" height="216" fill="#0d0d1a"/>
  <text x="554" y="235" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#333" text-anchor="middle">← 수평 스크롤로 이동 →</text>

  <!-- Divider between fixed and scrollable -->
  <line x1="288" y1="90" x2="288" y2="378" stroke="#55c555" stroke-width="2"/>

  <!-- Row dividers -->
  <line x1="60" y1="164" x2="820" y2="164" stroke="#1a2030" stroke-width="1"/>
  <line x1="60" y1="200" x2="820" y2="200" stroke="#1a2030" stroke-width="1"/>
  <line x1="60" y1="236" x2="820" y2="236" stroke="#1a2030" stroke-width="1"/>
  <line x1="60" y1="272" x2="820" y2="272" stroke="#1a2030" stroke-width="1"/>
  <line x1="60" y1="308" x2="820" y2="308" stroke="#1a2030" stroke-width="1"/>

  <!-- Scroll indicator arrow -->
  <polygon points="400,344 420,344 420,338 440,352 420,366 420,360 400,360" fill="#1e2433"/>
  <polygon points="402,346 422,346 422,340 438,352 422,364 422,358 402,358" fill="#7777cc"/>
  <text x="470" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">수평 스크롤</text>

  <!-- Note -->
  <text x="175" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555" text-anchor="middle">스크롤해도 고정 유지</text>
  <text x="554" y="400" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555" text-anchor="middle">오른쪽 컬럼으로 스크롤 이동</text>
</svg>
