<svg xmlns="http://www.w3.org/2000/svg" width="880" height="420" viewBox="0 0 880 420">
  <rect width="880" height="420" fill="#0a0a0a" rx="12"/>
  <text x="440" y="48" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">컴파운드 컴포넌트 구현 (Tabs)</text>

  <!-- Left: Context + Root -->
  <rect x="60" y="72" width="370" height="320" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="245" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">Context + Root 컴포넌트</text>
  <rect x="76" y="108" width="338" height="272" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="128" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve" fill="#ffffff">
    <tspan x="92" dy="0"><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> TabsContext = createContext(</tspan><tspan fill="#b5cea8">null</tspan><tspan fill="#ffffff">);</tspan></tspan>
    <tspan x="92" dy="18"> </tspan>
    <tspan x="92" dy="18"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> Tabs({ defaultTab, children }) {</tspan></tspan>
    <tspan x="92" dy="18"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> [active, setActive] = useState(defaultTab);</tspan></tspan>
    <tspan x="92" dy="18"><tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> (</tspan></tspan>
    <tspan x="92" dy="18"><tspan fill="#ffffff">    &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">TabsContext.Provider</tspan><tspan fill="#ffffff"> value={{ active, setActive }}&gt;</tspan></tspan>
    <tspan x="92" dy="18"><tspan fill="#ffffff">      &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">div</tspan><tspan fill="#ffffff">&gt;{children}&lt;/</tspan><tspan fill="#7ec8e3" font-weight="600">div</tspan><tspan fill="#ffffff">&gt;</tspan></tspan>
    <tspan x="92" dy="18"><tspan fill="#ffffff">    &lt;/</tspan><tspan fill="#7ec8e3" font-weight="600">TabsContext.Provider</tspan><tspan fill="#ffffff">&gt;</tspan></tspan>
    <tspan x="92" dy="18"><tspan fill="#ffffff">  );</tspan></tspan>
    <tspan x="92" dy="18"><tspan fill="#ffffff">}</tspan></tspan>
    <tspan x="92" dy="18"> </tspan>
    <tspan x="92" dy="18"><tspan fill="#ffffff">Tabs.Tab = </tspan><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff">({ id, children }) {</tspan></tspan>
    <tspan x="92" dy="18"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> { active, setActive } = useContext(TabsContext);</tspan></tspan>
    <tspan x="92" dy="18"><tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> (</tspan></tspan>
    <tspan x="92" dy="18"><tspan fill="#ffffff">    &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">button</tspan><tspan fill="#ffffff"> onClick={() =&gt; setActive(id)}</tspan></tspan>
    <tspan x="92" dy="18"><tspan fill="#ffffff">      className={active === id ? </tspan><tspan fill="#ce9178">'active'</tspan><tspan fill="#ffffff"> : </tspan><tspan fill="#ce9178">''</tspan><tspan fill="#ffffff">}&gt;{children}&lt;/</tspan><tspan fill="#7ec8e3" font-weight="600">button</tspan><tspan fill="#ffffff">&gt;</tspan></tspan>
    <tspan x="92" dy="18"><tspan fill="#ffffff">  );</tspan></tspan>
    <tspan x="92" dy="18"><tspan fill="#ffffff">};</tspan></tspan>
  </text>

  <!-- Right: Panel + Usage -->
  <rect x="450" y="72" width="370" height="320" rx="10" fill="#111827" stroke="#374151" stroke-width="1.5"/>
  <text x="635" y="96" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">Panel + 사용 예</text>
  <rect x="466" y="108" width="338" height="272" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="128" font-family="'JetBrains Mono','Menlo',monospace" font-size="12" xml:space="preserve" fill="#ffffff">
    <tspan x="482" dy="0"><tspan fill="#ffffff">Tabs.Panel = </tspan><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff">({ id, children }) {</tspan></tspan>
    <tspan x="482" dy="18"><tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> { active } = useContext(TabsContext);</tspan></tspan>
    <tspan x="482" dy="18"><tspan fill="#7ec8e3" font-weight="600">  if</tspan><tspan fill="#ffffff"> (active !== id) </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> </tspan><tspan fill="#b5cea8">null</tspan><tspan fill="#ffffff">;</tspan></tspan>
    <tspan x="482" dy="18"><tspan fill="#7ec8e3" font-weight="600">  return</tspan><tspan fill="#ffffff"> &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">div</tspan><tspan fill="#ffffff">&gt;{children}&lt;/</tspan><tspan fill="#7ec8e3" font-weight="600">div</tspan><tspan fill="#ffffff">&gt;;</tspan></tspan>
    <tspan x="482" dy="18"><tspan fill="#ffffff">};</tspan></tspan>
    <tspan x="482" dy="18"> </tspan>
    <tspan x="482" dy="18"><tspan fill="#9aa4b8">// 사용 — 깔끔한 선언적 API</tspan></tspan>
    <tspan x="482" dy="18"><tspan fill="#ffffff">&lt;</tspan><tspan fill="#7ec8e3" font-weight="600">Tabs</tspan><tspan fill="#ffffff"> defaultTab=</tspan><tspan fill="#ce9178">"a"</tspan><tspan fill="#ffffff">&gt;</tspan></tspan>
    <tspan x="482" dy="18"><tspan fill="#ffffff">  &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">Tabs.Tab</tspan><tspan fill="#ffffff"> id=</tspan><tspan fill="#ce9178">"a"</tspan><tspan fill="#ffffff">&gt;React&lt;/</tspan><tspan fill="#7ec8e3" font-weight="600">Tabs.Tab</tspan><tspan fill="#ffffff">&gt;</tspan></tspan>
    <tspan x="482" dy="18"><tspan fill="#ffffff">  &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">Tabs.Tab</tspan><tspan fill="#ffffff"> id=</tspan><tspan fill="#ce9178">"b"</tspan><tspan fill="#ffffff">&gt;Vue&lt;/</tspan><tspan fill="#7ec8e3" font-weight="600">Tabs.Tab</tspan><tspan fill="#ffffff">&gt;</tspan></tspan>
    <tspan x="482" dy="18"><tspan fill="#ffffff">  &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">Tabs.Panel</tspan><tspan fill="#ffffff"> id=</tspan><tspan fill="#ce9178">"a"</tspan><tspan fill="#ffffff">&gt;React 내용&lt;/</tspan><tspan fill="#7ec8e3" font-weight="600">Tabs.Panel</tspan><tspan fill="#ffffff">&gt;</tspan></tspan>
    <tspan x="482" dy="18"><tspan fill="#ffffff">  &lt;</tspan><tspan fill="#7ec8e3" font-weight="600">Tabs.Panel</tspan><tspan fill="#ffffff"> id=</tspan><tspan fill="#ce9178">"b"</tspan><tspan fill="#ffffff">&gt;Vue 내용&lt;/</tspan><tspan fill="#7ec8e3" font-weight="600">Tabs.Panel</tspan><tspan fill="#ffffff">&gt;</tspan></tspan>
    <tspan x="482" dy="18"><tspan fill="#ffffff">&lt;/</tspan><tspan fill="#7ec8e3" font-weight="600">Tabs</tspan><tspan fill="#ffffff">&gt;</tspan></tspan>
  </text>
</svg>
