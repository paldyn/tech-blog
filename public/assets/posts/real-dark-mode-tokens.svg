<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">CSS 디자인 토큰으로 테마 관리</text>

  <!-- CSS Tokens -->
  <rect x="60" y="68" width="370" height="260" rx="8" fill="#0f0f1a" stroke="#7777cc" stroke-width="1.5"/>
  <text x="245" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7777cc" text-anchor="middle">CSS 커스텀 프로퍼티</text>

  <rect x="76" y="104" width="338" height="212" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="92" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">/* 라이트 테마 */</text>
  <text x="92" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">:root, [data-theme=<tspan fill="#ce9178">"light"</tspan>] {</text>
  <text x="92" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  --color-bg: <tspan fill="#b5cea8">#ffffff</tspan>;</text>
  <text x="92" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  --color-text: <tspan fill="#b5cea8">#111111</tspan>;</text>
  <text x="92" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  --color-primary: <tspan fill="#b5cea8">#0070f3</tspan>;</text>
  <text x="92" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">}</text>
  <text x="92" y="234" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#9aa4b8" xml:space="preserve">/* 다크 테마 */</text>
  <text x="92" y="252" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">[data-theme=<tspan fill="#ce9178">"dark"</tspan>] {</text>
  <text x="92" y="270" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  --color-bg: <tspan fill="#b5cea8">#0a0a0a</tspan>;</text>
  <text x="92" y="288" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  --color-text: <tspan fill="#b5cea8">#e8e8e8</tspan>;</text>
  <text x="92" y="306" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">}</text>

  <!-- React Hook -->
  <rect x="450" y="68" width="370" height="260" rx="8" fill="#0f1a0f" stroke="#55c555" stroke-width="1.5"/>
  <text x="635" y="92" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">useTheme 훅</text>

  <rect x="466" y="104" width="338" height="212" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="482" y="124" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">type</tspan> Theme = <tspan fill="#ce9178">'light'</tspan> | <tspan fill="#ce9178">'dark'</tspan> | <tspan fill="#ce9178">'system'</tspan>;</text>
  <text x="482" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"></text>
  <text x="482" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">function</tspan> useTheme() {</text>
  <text x="482" y="178" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">const</tspan> [theme, setTheme] = useState&lt;Theme&gt;(</text>
  <text x="482" y="196" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">    () =&gt; (localStorage.getItem(<tspan fill="#ce9178">'theme'</tspan>) ?? <tspan fill="#ce9178">'system'</tspan>)</text>
  <text x="482" y="214" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  );</text>
  <text x="482" y="232" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  useEffect(() =&gt; {</text>
  <text x="482" y="250" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">    applyTheme(theme);</text>
  <text x="482" y="268" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">    localStorage.setItem(<tspan fill="#ce9178">'theme'</tspan>, theme);</text>
  <text x="482" y="286" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  }, [theme]);</text>
  <text x="482" y="304" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="12" fill="#ffffff" xml:space="preserve">  <tspan fill="#7ec8e3" font-weight="600">return</tspan> { theme, setTheme };</text>

  <!-- Bottom info boxes -->
  <rect x="60" y="358" width="380" height="54" rx="8" fill="#111" stroke="#7ec8e3" stroke-width="1"/>
  <text x="250" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7ec8e3" text-anchor="middle">applyTheme 함수</text>
  <text x="250" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" text-anchor="middle">document.documentElement.dataset.theme = resolved</text>

  <rect x="458" y="358" width="362" height="54" rx="8" fill="#111" stroke="#7777cc" stroke-width="1"/>
  <text x="639" y="380" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#7777cc" text-anchor="middle">system 모드 감지</text>
  <text x="639" y="400" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" text-anchor="middle">window.matchMedia('(prefers-color-scheme: dark)')</text>
</svg>
