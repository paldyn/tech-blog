<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440"
     style="border-radius:12px" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">
  <defs>
    <marker id="ac" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="ap" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
    <marker id="ag" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="440" rx="12" fill="#0a0a0a"/>
  <text x="440" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8">사내 하이브리드 검색 아키텍처</text>

  <!-- Input -->
  <rect x="340" y="70" width="200" height="60" rx="8" fill="#0f1a2e" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="94" text-anchor="middle" font-size="15" font-weight="600" fill="#7ec8e3">직원 검색 쿼리</text>
  <text x="440" y="116" text-anchor="middle" font-size="12" fill="#888">자연어 질문 입력</text>

  <!-- Fork arrows -->
  <line x1="370" y1="130" x2="220" y2="188" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ac)"/>
  <line x1="510" y1="130" x2="660" y2="188" stroke="#7ec8e3" stroke-width="2" marker-end="url(#ac)"/>
  <text x="290" y="162" text-anchor="middle" font-size="11" fill="#888">키워드 검색</text>
  <text x="590" y="162" text-anchor="middle" font-size="11" fill="#888">벡터 검색</text>

  <!-- BM25 branch -->
  <rect x="60" y="188" width="320" height="68" rx="8" fill="#1a1030" stroke="#7777cc" stroke-width="1.5"/>
  <text x="220" y="214" text-anchor="middle" font-size="15" font-weight="600" fill="#7777cc">BM25 키워드 검색</text>
  <text x="220" y="236" text-anchor="middle" font-size="12" fill="#888">Elasticsearch · OpenSearch</text>

  <!-- Vector branch -->
  <rect x="500" y="188" width="320" height="68" rx="8" fill="#0f2418" stroke="#55c555" stroke-width="1.5"/>
  <text x="660" y="214" text-anchor="middle" font-size="15" font-weight="600" fill="#55c555">임베딩 벡터 검색</text>
  <text x="660" y="236" text-anchor="middle" font-size="12" fill="#888">pgvector · Pinecone</text>

  <!-- Join arrows -->
  <line x1="220" y1="256" x2="370" y2="310" stroke="#7777cc" stroke-width="2" marker-end="url(#ap)"/>
  <line x1="660" y1="256" x2="510" y2="310" stroke="#55c555" stroke-width="2" marker-end="url(#ag)"/>

  <!-- RRF Fusion -->
  <rect x="290" y="310" width="300" height="68" rx="8" fill="#1a1218" stroke="#e05555" stroke-width="1.5"/>
  <text x="440" y="336" text-anchor="middle" font-size="15" font-weight="600" fill="#e05555">RRF 결합 · 재순위화</text>
  <text x="440" y="358" text-anchor="middle" font-size="12" fill="#888">Reciprocal Rank Fusion</text>

  <!-- Output -->
  <line x1="440" y1="378" x2="440" y2="408" stroke="#e05555" stroke-width="2" marker-end="url(#ac)"/>
  <rect x="290" y="408" width="300" height="20" rx="6" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="422" text-anchor="middle" font-size="12" fill="#888">최종 통합 검색 결과</text>
</svg>
