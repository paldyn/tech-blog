<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrOrange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e08855"/>
    </marker>
  </defs>
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">Descheduler — 실행 중 Pod 재배치</text>

  <!-- Before rebalancing -->
  <rect x="40" y="72" width="370" height="330" rx="10" fill="#0a0a0a" stroke="#888" stroke-width="1"/>
  <text x="225" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#888" text-anchor="middle">스케줄러만 사용 시 (불균형)</text>

  <rect x="58" y="112" width="150" height="270" rx="8" fill="#1a0a0a" stroke="#e05555" stroke-width="1"/>
  <text x="133" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Node A (과부하)</text>
  <rect x="66" y="142" width="55" height="28" rx="4" fill="#e05555" opacity="0.8"/>
  <text x="93" y="161" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#fff" text-anchor="middle">Pod 1</text>
  <rect x="128" y="142" width="55" height="28" rx="4" fill="#e05555" opacity="0.8"/>
  <text x="155" y="161" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#fff" text-anchor="middle">Pod 2</text>
  <rect x="66" y="180" width="55" height="28" rx="4" fill="#e05555" opacity="0.8"/>
  <text x="93" y="199" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#fff" text-anchor="middle">Pod 3</text>
  <rect x="128" y="180" width="55" height="28" rx="4" fill="#e05555" opacity="0.8"/>
  <text x="155" y="199" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#fff" text-anchor="middle">Pod 4</text>
  <rect x="66" y="218" width="55" height="28" rx="4" fill="#e05555" opacity="0.8"/>
  <text x="93" y="237" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#fff" text-anchor="middle">Pod 5</text>
  <text x="133" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555" text-anchor="middle">5개 — 과부하</text>

  <rect x="228" y="112" width="162" height="270" rx="8" fill="#0a1a0a" stroke="#888" stroke-width="1"/>
  <text x="309" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Node B (여유)</text>
  <text x="309" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="30" fill="#888" text-anchor="middle">∅</text>
  <text x="309" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">0개 — 유휴</text>

  <!-- Arrow -->
  <line x1="430" y1="236" x2="470" y2="236" stroke="#e08855" stroke-width="3" marker-end="url(#arrOrange)"/>
  <text x="450" y="228" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e08855" text-anchor="middle">재배치</text>

  <!-- After rebalancing -->
  <rect x="470" y="72" width="370" height="330" rx="10" fill="#0a0a0a" stroke="#55c555" stroke-width="1"/>
  <text x="655" y="98" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555" text-anchor="middle">Descheduler 적용 후 (균형)</text>

  <rect x="488" y="112" width="150" height="270" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="563" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">Node A</text>
  <rect x="496" y="142" width="55" height="28" rx="4" fill="#55c555" opacity="0.8"/>
  <text x="523" y="161" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#000" text-anchor="middle">Pod 1</text>
  <rect x="558" y="142" width="55" height="28" rx="4" fill="#55c555" opacity="0.8"/>
  <text x="585" y="161" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#000" text-anchor="middle">Pod 2</text>
  <rect x="496" y="180" width="55" height="28" rx="4" fill="#55c555" opacity="0.8"/>
  <text x="523" y="199" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#000" text-anchor="middle">Pod 3</text>
  <text x="563" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">3개</text>

  <rect x="658" y="112" width="162" height="270" rx="8" fill="#0a1a0a" stroke="#55c555" stroke-width="1"/>
  <text x="739" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">Node B</text>
  <rect x="666" y="142" width="55" height="28" rx="4" fill="#55c555" opacity="0.8"/>
  <text x="693" y="161" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#000" text-anchor="middle">Pod 4</text>
  <rect x="730" y="142" width="55" height="28" rx="4" fill="#55c555" opacity="0.8"/>
  <text x="757" y="161" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#000" text-anchor="middle">Pod 5</text>
  <text x="739" y="250" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555" text-anchor="middle">2개</text>

  <text x="440" y="434" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">Descheduler는 Pod를 Evict(축출)하고, Scheduler가 더 나은 노드에 다시 배치</text>
  <text x="440" y="452" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">새 노드 추가, 노드 복귀, 레이블 변경 후 불균형을 해소하는 데 효과적</text>
</svg>
