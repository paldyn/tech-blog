<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr-blue" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#e05555"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">AOT vs JIT — 컴파일 전략 비교</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">빌드 시점 확정 vs 런타임 동적 최적화</text>

  <!-- Divider -->
  <line x1="440" y1="86" x2="440" y2="460" stroke="#333" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="440" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555">vs</text>

  <!-- Left: AOT header -->
  <text x="220" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7ec8e3">AOT (Ahead-Of-Time)</text>

  <!-- Right: JIT header -->
  <text x="660" y="106" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#7777cc">JIT (Just-In-Time)</text>

  <!-- AOT Flow -->
  <rect x="60" y="118" width="160" height="50" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">소스 / 바이트코드</text>
  <text x="140" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">빌드 타임 입력</text>

  <line x1="140" y1="168" x2="140" y2="200" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <rect x="60" y="200" width="160" height="50" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">정적 분석</text>
  <text x="140" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">포인트-투 / 폐쇄 세계</text>

  <line x1="140" y1="250" x2="140" y2="282" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr-blue)"/>

  <rect x="60" y="282" width="160" height="50" rx="8" fill="#111827" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="140" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">기계어 (고정)</text>
  <text x="140" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">실행 파일에 포함</text>

  <line x1="140" y1="332" x2="140" y2="364" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <rect x="60" y="364" width="160" height="50" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="140" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">즉시 기동 · 저메모리</text>
  <text x="140" y="404" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">예측 가능한 성능</text>

  <!-- JIT Flow -->
  <rect x="460" y="118" width="160" height="50" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="540" y="140" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">바이트코드 로드</text>
  <text x="540" y="158" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">런타임 클래스 로딩</text>

  <line x1="540" y1="168" x2="540" y2="200" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-orange)"/>

  <rect x="460" y="200" width="160" height="50" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="540" y="222" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">인터프리터 실행</text>
  <text x="540" y="240" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">프로파일 정보 수집</text>

  <line x1="540" y1="250" x2="540" y2="282" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-orange)"/>

  <rect x="460" y="282" width="160" height="50" rx="8" fill="#111827" stroke="#7777cc" stroke-width="1.5"/>
  <text x="540" y="304" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">JIT 컴파일 (핫 경로)</text>
  <text x="540" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">추측적 최적화 포함</text>

  <line x1="540" y1="332" x2="540" y2="364" stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <rect x="460" y="364" width="160" height="50" rx="8" fill="#0d1f0d" stroke="#55c555" stroke-width="1.5"/>
  <text x="540" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">높은 피크 처리량</text>
  <text x="540" y="404" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">워밍업 후 최적 성능</text>

  <!-- Trade-off summary -->
  <rect x="60" y="434" width="760" height="46" rx="8" fill="#111118" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="454" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">AOT: <tspan fill="#55c555">빠른 기동 · 낮은 메모리</tspan> 대신 <tspan fill="#e05555">피크 처리량 제한</tspan>    JIT: <tspan fill="#55c555">동적 최적화 · 높은 처리량</tspan> 대신 <tspan fill="#e05555">워밍업 지연</tspan></text>
  <text x="440" y="472" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">PGO(Profile-Guided Optimization)로 AOT의 처리량 격차를 상당 부분 줄일 수 있음</text>
</svg>
