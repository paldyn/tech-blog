<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <defs>
    <marker id="arr" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7ec8e3"/>
    </marker>
    <marker id="arrg" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <rect width="880" height="500" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">OpenTelemetry Collector 파이프라인</text>

  <!-- apps -->
  <rect x="60" y="120" width="170" height="70" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="145" y="148" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">앱 + OTel SDK</text>
  <text x="145" y="170" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">자동/수동 계측</text>

  <rect x="60" y="210" width="170" height="70" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="145" y="238" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">서비스 메시 · 인그레스</text>
  <text x="145" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">프록시 레벨 스팬</text>

  <line x1="230" y1="155" x2="290" y2="185" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>
  <line x1="230" y1="245" x2="290" y2="215" stroke="#55c555" stroke-width="2" marker-end="url(#arrg)"/>
  <text x="260" y="148" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#888" text-anchor="middle">OTLP</text>

  <!-- collector -->
  <rect x="290" y="110" width="330" height="190" rx="10" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="2"/>
  <text x="455" y="140" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="#7ec8e3" text-anchor="middle">OTel Collector</text>

  <rect x="308" y="156" width="90" height="100" rx="6" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="353" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">Receivers</text>
  <text x="353" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">otlp</text>
  <text x="353" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">jaeger · zipkin</text>

  <line x1="398" y1="206" x2="410" y2="206" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="410" y="156" width="90" height="100" rx="6" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="455" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">Processors</text>
  <text x="455" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">batch</text>
  <text x="455" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">k8sattributes</text>

  <line x1="500" y1="206" x2="512" y2="206" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="512" y="156" width="90" height="100" rx="6" fill="#0a0a0a" stroke="#3a4a6e" stroke-width="1"/>
  <text x="557" y="186" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">Exporters</text>
  <text x="557" y="208" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">otlp · loki</text>
  <text x="557" y="226" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="10" fill="#888" text-anchor="middle">prometheus</text>

  <text x="455" y="282" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">트레이스 · 메트릭 · 로그를 모두 처리하는 단일 허브</text>

  <!-- backends -->
  <line x1="620" y1="160" x2="690" y2="140" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="620" y1="205" x2="690" y2="225" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="620" y1="250" x2="690" y2="310" stroke="#7ec8e3" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="690" y="110" width="130" height="62" rx="8" fill="#1a1a2e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="755" y="136" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7777cc" text-anchor="middle">Tempo / Jaeger</text>
  <text x="755" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">트레이스 저장</text>

  <rect x="690" y="196" width="130" height="62" rx="8" fill="#1a2a3a" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="755" y="222" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3" text-anchor="middle">Prometheus</text>
  <text x="755" y="244" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">메트릭</text>

  <rect x="690" y="282" width="130" height="62" rx="8" fill="#1a3020" stroke="#55c555" stroke-width="1.5"/>
  <text x="755" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">Loki</text>
  <text x="755" y="330" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">로그</text>

  <!-- deployment modes -->
  <rect x="60" y="360" width="760" height="110" rx="8" fill="#0f1520" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="390" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e8e8e8" text-anchor="middle">Kubernetes 배포 모드</text>
  <text x="90" y="418" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· <tspan fill="#7ec8e3" font-weight="600">DaemonSet (agent)</tspan> — 노드마다 1개, 앱 가까이에서 수신 후 게이트웨이로 전달</text>
  <text x="90" y="442" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">· <tspan fill="#7ec8e3" font-weight="600">Deployment (gateway)</tspan> — 중앙 집계 지점, 샘플링·내보내기 정책을 한곳에서 관리</text>
</svg>
