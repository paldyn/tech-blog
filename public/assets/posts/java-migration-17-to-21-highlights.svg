<svg xmlns="http://www.w3.org/2000/svg" width="880" height="410" viewBox="0 0 880 410">
  <rect width="880" height="410" fill="#0a0a0a" rx="12"/>

  <text x="440" y="46" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">17 → 21의 핵심 신기능</text>
  <text x="440" y="72" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">동시성 모델을 바꾸는 가상 스레드가 최대 변화</text>

  <!-- Virtual threads (highlight, wide) -->
  <rect x="60" y="100" width="760" height="80" rx="8" fill="#102010" stroke="#55c555" stroke-width="2"/>
  <text x="84" y="132" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="#55c555">가상 스레드 (Virtual Threads · JEP 444)</text>
  <text x="84" y="158" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#9aa4b8">수백만 개의 경량 스레드로 블로킹 I/O를 저비용 처리 — 동시성 설계의 판을 바꿈</text>

  <!-- 3 cards -->
  <rect x="60" y="196" width="240" height="112" rx="8" fill="#101020" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="180" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">switch 패턴 매칭</text>
  <text x="180" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">타입별 분기를</text>
  <text x="180" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">switch로 간결하게</text>
  <text x="180" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">JEP 441</text>

  <rect x="320" y="196" width="240" height="112" rx="8" fill="#101020" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="440" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">레코드 패턴</text>
  <text x="440" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">레코드를 분해해</text>
  <text x="440" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">필드 직접 바인딩</text>
  <text x="440" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">JEP 440</text>

  <rect x="580" y="196" width="240" height="112" rx="8" fill="#101020" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="700" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7ec8e3">순차 컬렉션</text>
  <text x="700" y="254" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">getFirst / getLast</text>
  <text x="700" y="274" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#9aa4b8">통일된 순서 API</text>
  <text x="700" y="296" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">JEP 431</text>

  <text x="440" y="352" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#7ec8e3">모두 정식 기능 — 프리뷰 플래그 없이 21에서 바로 사용</text>
  <text x="440" y="384" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">17 코드는 대부분 수정 없이 21에서 컴파일·실행된다</text>
</svg>
