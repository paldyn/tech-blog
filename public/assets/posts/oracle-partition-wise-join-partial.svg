<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <rect width="880" height="460" rx="12" fill="#0a0a0a"/>

  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Partial vs 일반 조인 — 실행 계획 비교</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">한쪽만 파티션됐을 때 Partial PWJ, 파티션 없으면 일반 조인</text>

  <!-- Left: Partial PWJ -->
  <rect x="50" y="84" width="360" height="340" rx="10" fill="#111" stroke="#55c555" stroke-width="1.5"/>
  <text x="230" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555">Partial Partition-Wise Join</text>
  <text x="230" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">ORDERS 파티션 ↔ CUSTOMERS 비파티션</text>

  <!-- orders partitions -->
  <rect x="70" y="142" width="140" height="30" rx="4" fill="#0d1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="140" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">O_P1 (Jan)</text>

  <rect x="70" y="180" width="140" height="30" rx="4" fill="#0d1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="140" y="200" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">O_P2 (Feb)</text>

  <rect x="70" y="218" width="140" height="30" rx="4" fill="#0d1520" stroke="#7ec8e3" stroke-width="1"/>
  <text x="140" y="238" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7ec8e3">O_P3 (Mar)</text>

  <!-- Customers (full table each time) -->
  <rect x="240" y="142" width="140" height="106" rx="4" fill="#1a1020" stroke="#7777cc" stroke-width="1"/>
  <text x="310" y="167" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#7777cc">CUSTOMERS</text>
  <text x="310" y="185" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">(전체 테이블)</text>
  <text x="310" y="203" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">각 파티션 조인 시</text>
  <text x="310" y="221" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">동일 소스 참조</text>
  <text x="310" y="239" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">Hash Build 재사용</text>

  <!-- arrows partial -->
  <line x1="212" y1="157" x2="238" y2="175" stroke="#55c555" stroke-width="1.5"/>
  <line x1="212" y1="195" x2="238" y2="195" stroke="#55c555" stroke-width="1.5"/>
  <line x1="212" y1="233" x2="238" y2="215" stroke="#55c555" stroke-width="1.5"/>

  <rect x="70" y="266" width="310" height="76" rx="6" fill="#081208" stroke="#55c555" stroke-width="1"/>
  <text x="225" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#55c555">Partial PWJ 효과</text>
  <text x="225" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ccc">파티션별로 병렬 실행 가능</text>
  <text x="225" y="324" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ccc">Full PWJ보다 효율 낮지만</text>
  <text x="225" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#55c555">일반 조인보다 병렬성 향상</text>

  <rect x="70" y="358" width="310" height="48" rx="6" fill="#0a0f18"/>
  <text x="225" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">실행 계획 키워드:</text>
  <text x="225" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">PARTITION HASH ALL</text>

  <!-- Right: Normal Join -->
  <rect x="470" y="84" width="360" height="340" rx="10" fill="#111" stroke="#e05555" stroke-width="1.5"/>
  <text x="650" y="108" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e05555">일반 Hash Join (비파티션)</text>
  <text x="650" y="126" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">양쪽 모두 파티션 없음</text>

  <!-- Full table scans -->
  <rect x="490" y="142" width="150" height="106" rx="4" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="565" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">ORDERS</text>
  <text x="565" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">전체 테이블 스캔</text>
  <text x="565" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">수억 건 포함</text>

  <rect x="660" y="142" width="150" height="106" rx="4" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="735" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">CUSTOMERS</text>
  <text x="735" y="180" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">전체 테이블 스캔</text>
  <text x="735" y="198" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="10" fill="#888">Hash Build</text>

  <line x1="642" y1="195" x2="658" y2="195" stroke="#e05555" stroke-width="2"/>

  <rect x="490" y="266" width="310" height="76" rx="6" fill="#1a0808" stroke="#e05555" stroke-width="1"/>
  <text x="645" y="286" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="600" fill="#e05555">일반 조인 단점</text>
  <text x="645" y="306" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ccc">전체 데이터 한 번에 처리</text>
  <text x="645" y="324" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#ccc">대용량 Hash Area 필요</text>
  <text x="645" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#e05555">Temp Segment Spill 위험</text>

  <rect x="490" y="358" width="310" height="48" rx="6" fill="#0a0f18"/>
  <text x="645" y="378" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">실행 계획 키워드:</text>
  <text x="645" y="396" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">HASH JOIN (PARALLEL)</text>
</svg>
