<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Java 배열 구조</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="16" font-weight="600" fill="#888">선언 → 생성 → 초기화 → 접근</text>

  <!-- Section 1: Declaration -->
  <rect x="60" y="96" width="220" height="100" rx="8" fill="#111827" stroke="#1e2d40" stroke-width="1.5"/>
  <text x="170" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">① 선언</text>
  <rect x="76" y="128" width="188" height="52" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="92" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">int</text>
  <text x="116" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">[] arr;</text>
  <text x="92" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">String</text>
  <text x="139" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">[] names;</text>

  <!-- Arrow 1→2 -->
  <line x1="280" y1="146" x2="316" y2="146" stroke="#555" stroke-width="1.5"/>
  <polygon points="316,141 328,146 316,151" fill="#555"/>

  <!-- Section 2: Creation -->
  <rect x="328" y="96" width="220" height="100" rx="8" fill="#111827" stroke="#1e2d40" stroke-width="1.5"/>
  <text x="438" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">② 생성 (new)</text>
  <rect x="344" y="128" width="188" height="52" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="360" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">arr = </text>
  <text x="399.1" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">new int</text>
  <text x="453.9" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">[5];</text>
  <text x="360" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// 기본값 0으로 초기화</text>

  <!-- Arrow 2→3 -->
  <line x1="548" y1="146" x2="584" y2="146" stroke="#555" stroke-width="1.5"/>
  <polygon points="584,141 596,146 584,151" fill="#555"/>

  <!-- Section 3: Init -->
  <rect x="596" y="96" width="224" height="100" rx="8" fill="#111827" stroke="#1e2d40" stroke-width="1.5"/>
  <text x="708" y="118" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">③ 리터럴 초기화</text>
  <rect x="612" y="128" width="192" height="52" rx="6" fill="#000000" stroke="#3a4a6e"/>
  <text x="628" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#7ec8e3">int</text>
  <text x="652" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">[] a = {</text>
  <text x="714.6" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#b5cea8">1,2,3</text>
  <text x="753.8" y="148" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">};</text>
  <text x="628" y="166" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">// new 생략 가능</text>

  <!-- Memory diagram label -->
  <text x="440" y="228" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#e8e8e8">힙(Heap) 메모리 구조</text>

  <!-- Stack box -->
  <rect x="60" y="248" width="160" height="168" rx="8" fill="#0f1a2a" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="140" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Stack</text>
  <rect x="80" y="282" width="120" height="36" rx="4" fill="#1a2a3a" stroke="#2a4a6a"/>
  <text x="140" y="304" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">arr →</text>
  <text x="140" y="322" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">(참조값 / 주소)</text>

  <!-- Arrow Stack→Heap -->
  <line x1="220" y1="300" x2="276" y2="300" stroke="#7777cc" stroke-width="2"/>
  <polygon points="276,295 290,300 276,305" fill="#7777cc"/>

  <!-- Heap array boxes -->
  <rect x="290" y="248" width="530" height="168" rx="8" fill="#0f1a2a" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="555" y="270" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#7ec8e3">Heap</text>

  <!-- Array cells -->
  <rect x="310" y="284" width="80" height="44" rx="4" fill="#1a2a3a" stroke="#2a4a6a" stroke-width="1.5"/>
  <text x="350" y="308" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#b5cea8">10</text>
  <text x="350" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">[0]</text>

  <rect x="394" y="284" width="80" height="44" rx="4" fill="#1a2a3a" stroke="#2a4a6a" stroke-width="1.5"/>
  <text x="434" y="308" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#b5cea8">20</text>
  <text x="434" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">[1]</text>

  <rect x="478" y="284" width="80" height="44" rx="4" fill="#1a2a3a" stroke="#2a4a6a" stroke-width="1.5"/>
  <text x="518" y="308" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#b5cea8">30</text>
  <text x="518" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">[2]</text>

  <rect x="562" y="284" width="80" height="44" rx="4" fill="#1a2a3a" stroke="#2a4a6a" stroke-width="1.5"/>
  <text x="602" y="308" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#b5cea8">40</text>
  <text x="602" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">[3]</text>

  <rect x="646" y="284" width="80" height="44" rx="4" fill="#1a2a3a" stroke="#2a4a6a" stroke-width="1.5"/>
  <text x="686" y="308" text-anchor="middle" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="14" fill="#b5cea8">50</text>
  <text x="686" y="326" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">[4]</text>

  <!-- length label -->
  <text x="490" y="356" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">arr.length = 5   (인덱스: 0 ~ 4)</text>

  <!-- Contiguous memory note -->
  <line x1="310" y1="370" x2="726" y2="370" stroke="#2a4a6a" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="518" y="386" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">연속된 메모리 블록 — O(1) 랜덤 접근</text>

  <!-- Key points -->
  <rect x="60" y="430" width="760" height="30" rx="6" fill="#111418" stroke="#3a4a6e"/>
  <text x="90" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ 고정 크기</text>
  <text x="200" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ 동일 타입만 저장</text>
  <text x="360" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">✓ 0-based 인덱스</text>
  <text x="510" y="450" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">✗ 크기 변경 불가 (List 사용 권장)</text>
</svg>
