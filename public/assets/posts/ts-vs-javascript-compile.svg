<svg width="880" height="400" viewBox="0 0 880 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">TypeScript 컴파일 흐름</text>
  <defs>
    <marker id="arr-fwd" viewBox="0 0 14 14" refX="12" refY="7" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#7777cc"/>
    </marker>
  </defs>
  <!-- Step 1: .ts file -->
  <rect x="60" y="100" width="160" height="120" rx="10" fill="#0a0a1a" stroke="#3178c6" stroke-width="2"/>
  <text x="140" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" font-weight="700" fill="#3178c6">.ts</text>
  <text x="140" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">TypeScript</text>
  <text x="140" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">소스 파일</text>
  <!-- Arrow 1 -->
  <line x1="220" y1="160" x2="290" y2="160" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-fwd)"/>
  <!-- Step 2: tsc -->
  <rect x="290" y="100" width="160" height="120" rx="10" fill="#1a1030" stroke="#7777cc" stroke-width="2"/>
  <text x="370" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7777cc">tsc</text>
  <text x="370" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">TypeScript</text>
  <text x="370" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">컴파일러</text>
  <!-- Arrow 2 -->
  <line x1="450" y1="160" x2="520" y2="160" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-fwd)"/>
  <!-- Step 3: .js file -->
  <rect x="520" y="100" width="160" height="120" rx="10" fill="#0a1a00" stroke="#f0db4f" stroke-width="2"/>
  <text x="600" y="138" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="20" font-weight="700" fill="#f0db4f">.js</text>
  <text x="600" y="162" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">JavaScript</text>
  <text x="600" y="182" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">출력 파일</text>
  <!-- Arrow 3 -->
  <line x1="680" y1="160" x2="740" y2="160" stroke="#7777cc" stroke-width="2" marker-end="url(#arr-fwd)"/>
  <!-- Step 4: runtime -->
  <rect x="740" y="100" width="100" height="120" rx="10" fill="#0a1a0a" stroke="#55c555" stroke-width="2"/>
  <text x="790" y="148" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" font-weight="600">Node.js</text>
  <text x="790" y="170" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">또는</text>
  <text x="790" y="192" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" font-weight="600">Browser</text>
  <!-- Labels below -->
  <text x="140" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">타입 주석 포함</text>
  <text x="370" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">타입 검사 + 변환</text>
  <text x="600" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">타입 정보 제거됨</text>
  <text x="790" y="250" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">JS만 실행</text>
  <!-- Key point -->
  <rect x="60" y="280" width="760" height="60" rx="8" fill="#0d0d1a" stroke="#7777cc" stroke-width="1"/>
  <text x="440" y="307" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#7ec8e3">핵심: TypeScript 타입은 런타임에 존재하지 않습니다</text>
  <text x="440" y="328" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">컴파일 후 타입 주석은 완전히 제거 — 성능 오버헤드 없음</text>
  <text x="440" y="376" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#7777cc">tsc --noEmit 으로 타입만 검사 (빌드 없이)</text>
</svg>
