<svg xmlns="http://www.w3.org/2000/svg" width="880" height="460" viewBox="0 0 880 460">
  <!-- 배경 -->
  <rect width="880" height="460" fill="#0a0a0a" rx="12"/>

  <!-- 제목 -->
  <text x="440" y="44" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">UserDetailsService 구현과 BCrypt 설정</text>

  <!-- 왼쪽 코드 박스 (x=50, y=68, w=378, h=362) -->
  <rect x="50" y="68" width="378" height="362" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="239" y="93" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">CustomUserDetailsService.java</text>
  <line x1="50" y1="104" x2="428" y2="104" stroke="#3a4a6e" stroke-width="1"/>

  <!-- 코드: body=104~430=326px, 14줄×18=252span
       pad=(326-252-13)/2=30.5 → first=104+30.5+10=144.5≈145 -->
  <text x="66" y="145" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">@Service</tspan></text>
  <text x="66" y="163" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">@RequiredArgsConstructor</tspan></text>
  <text x="66" y="181" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">public class</tspan><tspan fill="#ffffff"> CustomUserDetailsService</tspan></text>
  <text x="66" y="199" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="80" fill="#7ec8e3" font-weight="600">implements</tspan><tspan fill="#ffffff"> UserDetailsService {</tspan></text>
  <text x="66" y="217" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="80" fill="#7ec8e3" font-weight="600">private final</tspan><tspan fill="#ffffff"> UserRepository userRepository;</tspan></text>
  <text x="66" y="235" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> </text>
  <text x="66" y="253" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="80" fill="#7ec8e3" font-weight="600">@Override</tspan></text>
  <text x="66" y="271" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="80" fill="#7ec8e3" font-weight="600">public</tspan><tspan fill="#ffffff"> UserDetails loadUserByUsername(</tspan></text>
  <text x="66" y="289" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="94" fill="#ffffff">String username) {</tspan></text>
  <text x="66" y="307" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="94" fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> userRepository</tspan></text>
  <text x="66" y="325" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="108" fill="#ffffff">.findByUsername(username)</tspan></text>
  <text x="66" y="343" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="108" fill="#ffffff">.map(User::toUserDetails)</tspan></text>
  <text x="66" y="361" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="108" fill="#ffffff">.orElseThrow(() -&gt; </tspan><tspan fill="#7ec8e3" font-weight="600">new</tspan></text>
  <text x="66" y="379" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="122" fill="#ffffff">UsernameNotFoundException(</tspan></text>
  <text x="66" y="397" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="136" fill="#ce9178">"User not found"</tspan><tspan fill="#ffffff">));</tspan></text>
  <text x="66" y="415" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"><tspan x="80">}</tspan></text>

  <!-- 오른쪽 코드 박스 (x=452, y=68, w=378, h=362) -->
  <rect x="452" y="68" width="378" height="362" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="641" y="93" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#7777cc">PasswordEncoder 설정</text>
  <line x1="452" y1="104" x2="830" y2="104" stroke="#3a4a6e" stroke-width="1"/>

  <!-- 오른쪽 코드: 11줄×18=198span
       pad=(326-198-13)/2=57.5 → first=104+57.5+10=171.5≈172 -->
  <text x="468" y="172" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// PasswordEncoder 빈 등록</text>
  <text x="468" y="190" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">@Bean</tspan></text>
  <text x="468" y="208" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">public</tspan><tspan fill="#ffffff"> PasswordEncoder passwordEncoder() {</tspan></text>
  <text x="468" y="226" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="482" fill="#7ec8e3" font-weight="600">return new</tspan><tspan fill="#ffffff"> BCryptPasswordEncoder();</tspan></text>
  <text x="468" y="244" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>
  <text x="468" y="262" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> </text>
  <text x="468" y="280" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 비밀번호 인코딩 (회원가입)</text>
  <text x="468" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#ffffff">String encoded = encoder.encode(rawPwd);</tspan></text>
  <text x="468" y="316" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> </text>
  <text x="468" y="334" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 비밀번호 검증 (로그인 내부)</text>
  <text x="468" y="352" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan fill="#7ec8e3" font-weight="600">boolean</tspan><tspan fill="#ffffff"> ok = encoder.matches(</tspan></text>
  <text x="468" y="370" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" xml:space="preserve"><tspan x="482" fill="#ffffff">rawPassword, encodedPassword);</tspan></text>
</svg>
