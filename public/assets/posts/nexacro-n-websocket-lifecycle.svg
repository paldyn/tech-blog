<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">WebSocket 연결 생명주기</text>

  <!-- Column headers -->
  <text x="210" y="82" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#7ec8e3">Nexacro Form (API 호출)</text>
  <text x="670" y="82" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="15" font-weight="600" fill="#55c555">이벤트 핸들러</text>

  <!-- ===== ROW 1: Connection ===== -->
  <!-- Left box -->
  <rect x="60" y="100" width="300" height="54" fill="#12213a" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="210" y="122" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">new WebSocket(url)</text>
  <text x="210" y="142" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">CONNECTING 상태 진입</text>

  <!-- Horizontal arrow: left→right (y=127) -->
  <polygon points="360,124 508,124 508,119 520,127 508,135 508,130 360,130"
           fill="#7ec8e3" stroke="#0a0a0a" stroke-width="1"/>
  <text x="440" y="120" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">TCP 핸드셰이크</text>

  <!-- Right box -->
  <rect x="520" y="100" width="300" height="54" fill="#122a12" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="670" y="122" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">onopen 이벤트</text>
  <text x="670" y="142" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">OPEN 상태 — 연결 수립 완료</text>

  <!-- ===== Down arrow left (y=154→210) ===== -->
  <polygon points="207,154 213,154 213,198 219,198 210,210 201,198 207,198"
           fill="#7ec8e3" stroke="#0a0a0a" stroke-width="1"/>

  <!-- Down arrow right (y=154→210) -->
  <polygon points="667,154 673,154 673,198 679,198 670,210 661,198 667,198"
           fill="#55c555" stroke="#0a0a0a" stroke-width="1"/>

  <!-- ===== ROW 2: Message exchange ===== -->
  <rect x="60" y="210" width="300" height="54" fill="#12213a" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="210" y="232" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">ws.send(data)</text>
  <text x="210" y="252" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">서버로 메시지 송신</text>

  <!-- Bidirectional arrows (y=237) -->
  <!-- Left to Right arrow -->
  <polygon points="360,234 508,234 508,229 520,237 508,245 508,240 360,240"
           fill="#7ec8e3" stroke="#0a0a0a" stroke-width="1"/>
  <!-- Right to Left arrow -->
  <polygon points="520,254 372,254 372,249 360,257 372,265 372,260 520,260"
           fill="#55c555" stroke="#0a0a0a" stroke-width="1"/>

  <rect x="520" y="210" width="300" height="54" fill="#122a12" rx="6" stroke="#55c555" stroke-width="1.5"/>
  <text x="670" y="232" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">onmessage 이벤트</text>
  <text x="670" y="252" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">event.data로 수신 데이터 접근</text>

  <!-- ===== Down arrow left (y=264→310) ===== -->
  <polygon points="207,264 213,264 213,298 219,298 210,310 201,298 207,298"
           fill="#7ec8e3" stroke="#0a0a0a" stroke-width="1"/>

  <!-- Down arrow right (y=264→310) -->
  <polygon points="667,264 673,264 673,298 679,298 670,310 661,298 667,298"
           fill="#e05555" stroke="#0a0a0a" stroke-width="1"/>

  <!-- ===== ROW 3: Error ===== -->
  <!-- Error on right side only -->
  <rect x="520" y="310" width="300" height="54" fill="#2a1212" rx="6" stroke="#e05555" stroke-width="1.5"/>
  <text x="670" y="332" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">onerror 이벤트</text>
  <text x="670" y="352" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">재연결 로직 구현 권장</text>

  <!-- Down arrow left from row2 continues (y=264→360) separate -->
  <polygon points="207,310 213,310 213,348 219,348 210,360 201,348 207,348"
           fill="#7ec8e3" stroke="#0a0a0a" stroke-width="1"/>

  <!-- Down arrow right (error→close) (y=364→410) -->
  <polygon points="667,364 673,364 673,398 679,398 670,410 661,398 667,398"
           fill="#888" stroke="#0a0a0a" stroke-width="1"/>

  <!-- ===== ROW 4: Close ===== -->
  <rect x="60" y="360" width="300" height="54" fill="#12213a" rx="6" stroke="#7ec8e3" stroke-width="1.5"/>
  <text x="210" y="382" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#7ec8e3">ws.close()</text>
  <text x="210" y="402" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">연결 종료 요청</text>

  <!-- Horizontal close arrow -->
  <polygon points="360,384 508,384 508,379 520,387 508,395 508,390 360,390"
           fill="#888" stroke="#0a0a0a" stroke-width="1"/>
  <text x="440" y="376" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">종료 프레임 교환</text>

  <rect x="520" y="410" width="300" height="54" fill="#1a1a1a" rx="6" stroke="#888" stroke-width="1.5"/>
  <text x="670" y="432" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#aaa">onclose 이벤트</text>
  <text x="670" y="452" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#666">CLOSED 상태 — 자원 해제</text>

  <!-- Bottom note -->
  <text x="440" y="488"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#555" text-anchor="middle">Nexacro N HTML5 런타임: 브라우저 네이티브 WebSocket API 그대로 사용 가능</text>
</svg>
