<svg xmlns="http://www.w3.org/2000/svg" width="880" height="440" viewBox="0 0 880 440">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">서명된 커밋의 구조</text>

  <defs>
    <marker id="arrsign" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
  </defs>

  <!-- Commit object box -->
  <rect x="60" y="75" width="440" height="310" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="280" y="98" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="700" fill="#7ec8e3">commit 오브젝트 내용 (cat-file -p HEAD)</text>

  <text xml:space="preserve" x="80" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">tree</text><text xml:space="preserve" x="122" y="122" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> 9d8a3e2f1b4c567890...</text>
  <text xml:space="preserve" x="80" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">parent</text><text xml:space="preserve" x="136" y="142" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> 4f2b1ae7...</text>
  <text xml:space="preserve" x="80" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">author</text><text xml:space="preserve" x="136" y="162" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> Alice &lt;a@b.com&gt; 1716868800 +0900</text>
  <text xml:space="preserve" x="80" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ce9178">committer</text><text xml:space="preserve" x="164" y="182" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> Alice &lt;a@b.com&gt; 1716868800 +0900</text>

  <!-- gpgsig field highlighted -->
  <rect x="72" y="198" width="412" height="120" rx="4" fill="#1a2a1a" stroke="#55c555" stroke-width="1"/>
  <text xml:space="preserve" x="82" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#55c555">gpgsig</text><text xml:space="preserve" x="138" y="218" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> -----BEGIN PGP SIGNATURE-----</text>
  <text xml:space="preserve" x="82" y="238" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888"> iQIzBAABCAAdFiEE...</text>
  <text xml:space="preserve" x="82" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888"> ABCDEFGHIJKLMNop...</text>
  <text xml:space="preserve" x="82" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888"> qrstuvwxyz012345...</text>
  <text xml:space="preserve" x="82" y="298" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff"> -----END PGP SIGNATURE-----</text>
  <text xml:space="preserve" x="82" y="314" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#888"> </text>

  <text xml:space="preserve" x="80" y="342" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#9aa4b8">feat: add user authentication</text>

  <!-- Label for gpgsig -->
  <text x="560" y="260" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555">↑ gpgsig 필드</text>
  <text x="560" y="280" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">커밋 내용 전체에</text>
  <text x="560" y="300" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">개인키로 서명한</text>
  <text x="560" y="320" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">PGP/SSH 서명</text>

  <!-- GitHub Verified badge -->
  <rect x="560" y="350" width="260" height="50" rx="8" fill="#1a2a1a" stroke="#55c555" stroke-width="2"/>
  <text x="690" y="370" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">✓ Verified</text>
  <text x="690" y="390" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">GitHub 서명 검증 배지</text>
</svg>
