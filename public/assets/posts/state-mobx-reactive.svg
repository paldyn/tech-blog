<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>

  <defs>
    <marker id="arr-green" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#55c555"/>
    </marker>
    <marker id="arr-purple" viewBox="0 0 14 14" refX="12" refY="7"
            markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" orient="auto">
      <path d="M 0 0 L 13 7 L 0 14 z" fill="#b07ec8"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="45" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">MobX 반응형 시스템</text>

  <!-- ===== LEFT: Observable State ===== -->
  <rect x="60" y="70" width="200" height="36" fill="#1a0a0a" stroke="#e05555" rx="6"/>
  <text x="160" y="93" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e05555">@observable</text>

  <!-- price -->
  <rect x="60" y="120" width="200" height="60" fill="#0a0a0a" stroke="#e05555" rx="6"/>
  <text x="80" y="148"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">price: 15000</text>
  <text x="80" y="164"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">number</text>

  <!-- quantity -->
  <rect x="60" y="195" width="200" height="60" fill="#0a0a0a" stroke="#e05555" rx="6"/>
  <text x="80" y="223"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">quantity: 3</text>
  <text x="80" y="239"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">number</text>

  <!-- taxRate -->
  <rect x="60" y="270" width="200" height="60" fill="#0a0a0a" stroke="#e05555" rx="6"/>
  <text x="80" y="298"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#ffffff">taxRate: 0.1</text>
  <text x="80" y="314"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">number</text>

  <!-- "변경 추적" label between left and center -->
  <text x="295" y="208"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">변경 추적</text>

  <!-- ===== CENTER: Computed Values ===== -->
  <rect x="320" y="70" width="200" height="36" fill="#0a1a0a" stroke="#55c555" rx="6"/>
  <text x="420" y="93" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#55c555">@computed</text>

  <!-- subtotal -->
  <rect x="320" y="120" width="200" height="60" fill="#0a0a0a" stroke="#55c555" rx="6"/>
  <text x="340" y="144"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">subtotal</text>
  <text x="340" y="162"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">price × quantity</text>

  <!-- totalWithTax -->
  <rect x="320" y="230" width="200" height="60" fill="#0a0a0a" stroke="#55c555" rx="6"/>
  <text x="340" y="254"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">totalWithTax</text>
  <text x="340" y="272"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">subtotal × (1+tax)</text>

  <!-- ===== RIGHT: Reactions ===== -->
  <rect x="600" y="70" width="200" height="36" fill="#1a0a1a" stroke="#b07ec8" rx="6"/>
  <text x="700" y="93" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#b07ec8">Reaction / autorun</text>

  <!-- UI update -->
  <rect x="600" y="120" width="200" height="60" fill="#0a0a0a" stroke="#b07ec8" rx="6"/>
  <text x="620" y="144"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#b07ec8">UI 업데이트</text>
  <text x="620" y="162"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">React observer()</text>

  <!-- autorun -->
  <rect x="600" y="230" width="200" height="60" fill="#0a0a0a" stroke="#b07ec8" rx="6"/>
  <text x="620" y="254"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#b07ec8">autorun()</text>
  <text x="620" y="272"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">콘솔/로그/API</text>

  <!-- ===== ARROWS ===== -->
  <!-- price → subtotal (direct horizontal) -->
  <line x1="260" y1="150" x2="318" y2="150"
        stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- quantity → subtotal (curve up) -->
  <path d="M 260 225 C 300 225 300 150 320 150"
        stroke="#55c555" stroke-width="2" fill="none" marker-end="url(#arr-green)"/>

  <!-- taxRate → totalWithTax (curve) -->
  <path d="M 260 300 C 300 300 300 260 320 260"
        stroke="#55c555" stroke-width="2" fill="none" marker-end="url(#arr-green)"/>

  <!-- subtotal → totalWithTax (vertical) -->
  <line x1="420" y1="180" x2="420" y2="228"
        stroke="#55c555" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- subtotal → UI reaction -->
  <line x1="520" y1="150" x2="598" y2="150"
        stroke="#b07ec8" stroke-width="2" marker-end="url(#arr-purple)"/>

  <!-- totalWithTax → autorun -->
  <line x1="520" y1="260" x2="598" y2="260"
        stroke="#b07ec8" stroke-width="2" marker-end="url(#arr-purple)"/>

  <!-- ===== BOTTOM INFO BAR ===== -->
  <rect x="60" y="370" width="760" height="80" fill="#111" stroke="#333" rx="8"/>
  <text x="440" y="398" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#e8e8e8">핵심: observable 변경 → computed 자동 재계산 → reaction 자동 실행</text>
  <text x="440" y="424" text-anchor="middle"
        font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#888">MobX 6: makeObservable / makeAutoObservable로 클래스 기반 또는 함수형 모두 지원</text>
</svg>
