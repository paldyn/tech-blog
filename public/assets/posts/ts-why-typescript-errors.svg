<svg xmlns="http://www.w3.org/2000/svg" width="880" viewBox="0 0 880 440" style="background:#0a0a0a">
  <rect width="880" height="440" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="48" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">JavaScript vs TypeScript: 오류 발견 시점</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" fill="#888" text-anchor="middle">같은 버그, 하지만 발견되는 시점이 다르다</text>

  <!-- JS Side -->
  <rect x="60" y="96" width="340" height="44" rx="8" fill="#2a0808" stroke="#e05555" stroke-width="1.5"/>
  <text x="230" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e05555" text-anchor="middle">JavaScript — 런타임에서 발견</text>

  <rect x="60" y="150" width="340" height="101" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="76" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> getUserName(user) {</tspan></text>
  <text x="76" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  return user.name.toUpperCase();</text>
  <text x="76" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">}</text>
  <text x="76" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">getUserName(null); // CRASH!</text>

  <!-- JS Error bubble -->
  <rect x="60" y="266" width="340" height="60" rx="8" fill="#1a0505" stroke="#e05555" stroke-width="1"/>
  <text x="230" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">TypeError: Cannot read</text>
  <text x="230" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#e05555" text-anchor="middle">properties of null (reading 'name')</text>

  <!-- Timeline JS -->
  <text x="230" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">개발 &#x2192; 빌드 &#x2192; 배포 &#x2192; 사용자 접근 &#x2192; </text>
  <text x="230" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555" text-anchor="middle">&#x1F525; 런타임 크래시 (사용자에게 노출!)</text>

  <!-- TS Side -->
  <rect x="480" y="96" width="340" height="44" rx="8" fill="#0a1f0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="650" y="124" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#55c555" text-anchor="middle">TypeScript — 컴파일 타임에 발견</text>

  <rect x="480" y="150" width="340" height="101" rx="6" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="496" y="176" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> getUserName(</tspan></text>
  <text x="496" y="196" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13"><tspan fill="#ffffff">  user: </tspan><tspan fill="#7ec8e3" font-weight="600">{ name: </tspan><tspan fill="#7ec8e3" font-weight="600">string </tspan><tspan fill="#ffffff">}) {</tspan></text>
  <text x="496" y="216" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#ffffff">  return user.name.toUpperCase();</text>
  <text x="496" y="240" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="13" fill="#e05555">getUserName(null); // TS 오류!</text>

  <!-- TS Compile error bubble -->
  <rect x="480" y="266" width="340" height="60" rx="8" fill="#0a1505" stroke="#55c555" stroke-width="1"/>
  <text x="650" y="290" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">TS2345: Argument of type 'null'</text>
  <text x="650" y="308" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#55c555" text-anchor="middle">is not assignable — 컴파일 중단</text>

  <!-- Timeline TS -->
  <text x="650" y="356" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888" text-anchor="middle">개발 &#x2192;</text>
  <text x="650" y="374" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#55c555" text-anchor="middle">&#x2713; 코딩 중 즉시 감지 (배포 전 차단!)</text>

  <!-- VS label -->
  <text x="440" y="220" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="18" font-weight="700" fill="#7ec8e3" text-anchor="middle">VS</text>

  <!-- Bottom note -->
  <text x="440" y="415" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#666" text-anchor="middle">TypeScript는 버그가 사용자에게 닿기 전에 개발자에게 알려줍니다</text>
</svg>
