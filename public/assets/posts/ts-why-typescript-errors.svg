<svg xmlns="http://www.w3.org/2000/svg" width="880" height="500" viewBox="0 0 880 500">
  <rect width="880" height="500" fill="#0a0a0a" rx="12"/>
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8">컴파일 타임 vs 런타임 에러 검출</text>
  <text x="440" y="70" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888">같은 실수, TypeScript는 실행 전에 잡는다</text>
  <!-- JS side label -->
  <text x="215" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#55c555">JavaScript</text>
  <!-- TS side label -->
  <text x="665" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="16" font-weight="600" fill="#7ec8e3">TypeScript</text>
  <!-- JS code box -->
  <rect x="60" y="115" width="310" height="190" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="76" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">function</text>
  <text x="165" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> add(a, b) {</text>
  <text x="76" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  return</text>
  <text x="149" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> a + b;</text>
  <text x="76" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">}</text>
  <text x="76" y="210" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 잘못된 호출</text>
  <text x="76" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">add(</text>
  <text x="116" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">"1"</text>
  <text x="148" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">, </text>
  <text x="168" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">2</text>
  <text x="178" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">);</text>
  <text x="76" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 결과: "12" (버그!)</text>
  <text x="76" y="278" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#9aa4b8" xml:space="preserve">// 에러는 런타임에 발생</text>
  <!-- JS runtime error box -->
  <rect x="60" y="320" width="310" height="68" rx="8" fill="#2a1010" stroke="#e05555" stroke-width="1.5"/>
  <text x="215" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#e05555">런타임 에러</text>
  <text x="215" y="364" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#e05555">실행 후에야 "12" 출력을 발견</text>
  <text x="215" y="380" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">사용자가 먼저 경험할 수도 있음</text>
  <!-- TS code box -->
  <rect x="510" y="115" width="310" height="190" rx="8" fill="#000000" stroke="#3a4a6e" stroke-width="1.5"/>
  <text x="526" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">function</text>
  <text x="615" y="140" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> add(</text>
  <text x="526" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">  a: </text>
  <text x="559" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">number</text>
  <text x="628" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">, b: </text>
  <text x="670" y="160" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">number</text>
  <text x="526" y="180" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">) {</text>
  <text x="526" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#7ec8e3" font-weight="600" xml:space="preserve">  return</text>
  <text x="599" y="200" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve"> a + b; }</text>
  <text x="526" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">add(</text>
  <text x="566" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ce9178" xml:space="preserve">"1"</text>
  <text x="598" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">, </text>
  <text x="618" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#b5cea8" xml:space="preserve">2</text>
  <text x="628" y="230" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="13" fill="#ffffff" xml:space="preserve">);</text>
  <!-- Squiggly error indicator -->
  <path d="M 526 238 Q 530 242 534 238 Q 538 234 542 238 Q 546 242 550 238 Q 554 234 558 238 Q 562 242 566 238 Q 570 234 574 238 Q 578 242 582 238" fill="none" stroke="#e05555" stroke-width="1.5"/>
  <text x="526" y="258" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#e05555" xml:space="preserve">// Error: Argument 'string'</text>
  <text x="526" y="274" font-family="'JetBrains Mono','Menlo','Consolas',monospace"
        font-size="11" fill="#e05555" xml:space="preserve">// not assignable to 'number'</text>
  <!-- TS compile error box -->
  <rect x="510" y="320" width="310" height="68" rx="8" fill="#0d2a0a" stroke="#55c555" stroke-width="1.5"/>
  <text x="665" y="344" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#55c555">컴파일 타임 에러</text>
  <text x="665" y="364" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" fill="#55c555">실행 전 에디터에서 즉시 발견</text>
  <text x="665" y="380" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888">사용자가 경험하기 전에 수정</text>
  <!-- Divider -->
  <line x1="440" y1="115" x2="440" y2="400" stroke="#333" stroke-width="1.5" stroke-dasharray="4,4"/>
  <!-- Bottom summary -->
  <rect x="60" y="408" width="760" height="68" rx="8" fill="#111" stroke="#3a4a6e" stroke-width="1"/>
  <text x="440" y="432" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" font-weight="600" fill="#e8e8e8">TypeScript의 핵심 가치: 에러를 더 일찍, 더 저렴하게 발견한다</text>
  <text x="440" y="456" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" fill="#888">버그 수정 비용: 개발 단계 (저) &lt; QA 단계 (중) &lt; 프로덕션 (고)</text>
  <text x="440" y="470" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#555">TypeScript는 버그를 가장 비용이 낮은 개발 단계로 끌어당긴다</text>
</svg>
