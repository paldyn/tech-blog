<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="50" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">JavaScript 런타임 오류 예시</text>
  <text x="440" y="76" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" fill="#888">TypeScript가 컴파일 타임에 잡아주는 오류들</text>
  <!-- Error 1 -->
  <rect x="60" y="100" width="235" height="160" rx="8" fill="#1a0808" stroke="#5a1a1a" stroke-width="1.5"/>
  <text x="177" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">TypeError: undefined</text>
  <rect x="74" y="134" width="207" height="80" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="84" y="155" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#9aa4b8">// JavaScript</tspan>
  </text>
  <text x="84" y="173" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> user = null;</tspan>
  </text>
  <text x="84" y="191" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">user.name; </tspan><tspan fill="#e05555">// 💥 오류!</tspan>
  </text>
  <text x="84" y="209" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff"> </tspan>
  </text>
  <text x="177" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">null 체크 없이 접근</text>
  <text x="177" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">런타임에야 발견됨</text>
  <!-- Error 2 -->
  <rect x="323" y="100" width="235" height="160" rx="8" fill="#1a0808" stroke="#5a1a1a" stroke-width="1.5"/>
  <text x="440" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">타입 불일치 오류</text>
  <rect x="337" y="134" width="207" height="80" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="347" y="155" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#9aa4b8">// JavaScript</tspan>
  </text>
  <text x="347" y="173" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">function</tspan><tspan fill="#ffffff"> add(a, b) {</tspan>
  </text>
  <text x="347" y="191" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">  </tspan><tspan fill="#7ec8e3" font-weight="600">return</tspan><tspan fill="#ffffff"> a + b;</tspan>
  </text>
  <text x="347" y="209" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">}</tspan>
  </text>
  <text x="440" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">add("1", 2) = "12" (문자열 결합)</text>
  <text x="440" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">의도치 않은 동작</text>
  <!-- Error 3 -->
  <rect x="586" y="100" width="234" height="160" rx="8" fill="#1a0808" stroke="#5a1a1a" stroke-width="1.5"/>
  <text x="703" y="124" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="600" fill="#e05555">존재하지 않는 속성</text>
  <rect x="600" y="134" width="206" height="80" rx="4" fill="#000000" stroke="#3a4a6e" stroke-width="1"/>
  <text x="610" y="155" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#9aa4b8">// JavaScript</tspan>
  </text>
  <text x="610" y="173" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#7ec8e3" font-weight="600">const</tspan><tspan fill="#ffffff"> obj = {</tspan>
  </text>
  <text x="610" y="191" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">  id: </tspan><tspan fill="#b5cea8">1</tspan>
  </text>
  <text x="610" y="209" xml:space="preserve" font-family="'JetBrains Mono','Menlo','Consolas',monospace" font-size="12">
    <tspan fill="#ffffff">}; obj.namme; </tspan><tspan fill="#e05555">// typo</tspan>
  </text>
  <text x="703" y="232" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">오타로 undefined 반환</text>
  <text x="703" y="248" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="11" fill="#888">디버깅 어려움</text>
  <!-- TypeScript solution -->
  <rect x="60" y="290" width="760" height="100" rx="8" fill="#0d1a0d" stroke="#2d6a2d" stroke-width="1.5"/>
  <text x="440" y="318" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="14" font-weight="600" fill="#55c555">TypeScript는 이 모든 오류를 컴파일 타임에 잡아줍니다</text>
  <text x="440" y="342" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" fill="#888">null 체크 강제 · 타입 불일치 감지 · 오타 즉시 발견</text>
  <text x="440" y="368" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">코드를 실행하기 전에 오류를 발견 → 디버깅 비용 대폭 절감</text>
  <text x="440" y="440" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#555">production 배포 전에 오류를 잡는 것이 TypeScript의 핵심 가치입니다</text>
</svg>
