<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380">
  <rect width="880" height="380" fill="#0a0a0a" rx="12"/>

  <!-- Title -->
  <text x="440" y="44" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="22" font-weight="700" fill="#e8e8e8">Full Fine-tuning vs PEFT 비교</text>
  <text x="440" y="68" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="15" font-weight="600" fill="#888">GPU 메모리 · 성능 · 비용 트레이드오프</text>

  <!-- Headers -->
  <text x="180" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">기준</text>
  <text x="340" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e05555">Full Fine-tuning</text>
  <text x="490" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7777cc">LoRA</text>
  <text x="630" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#55c555">QLoRA</text>
  <text x="770" y="100" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="13" font-weight="700" fill="#7ec8e3">Adapter</text>

  <line x1="60" y1="108" x2="820" y2="108" stroke="#333" stroke-width="1"/>

  <!-- 7B GPU Memory -->
  <rect x="60" y="112" width="760" height="36" rx="4" fill="#111"/>
  <text x="180" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">7B 모델 GPU</text>
  <text x="340" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">~80GB (A100×2)</text>
  <text x="490" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7777cc">~40GB (A100×1)</text>
  <text x="630" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">~12GB (RTX 4090)</text>
  <text x="770" y="135" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">~40GB</text>

  <!-- Trainable params -->
  <rect x="60" y="152" width="760" height="36" rx="4" fill="#0e0e0e"/>
  <text x="180" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">학습 파라미터</text>
  <text x="340" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">100% (7B개)</text>
  <text x="490" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">0.5~1% (35M~70M)</text>
  <text x="630" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">0.5~1%</text>
  <text x="770" y="175" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">1~3%</text>

  <!-- Performance -->
  <rect x="60" y="192" width="760" height="36" rx="4" fill="#111"/>
  <text x="180" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">성능</text>
  <text x="340" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">최고</text>
  <text x="490" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">Full에 근접</text>
  <text x="630" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">LoRA에 근접</text>
  <text x="770" y="215" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">보통</text>

  <!-- Inference -->
  <rect x="60" y="232" width="760" height="36" rx="4" fill="#0e0e0e"/>
  <text x="180" y="255" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">추론 오버헤드</text>
  <text x="340" y="255" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">없음 (통합)</text>
  <text x="490" y="255" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#55c555">없음 (W에 병합 가능)</text>
  <text x="630" y="255" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#7ec8e3">소량</text>
  <text x="770" y="255" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e05555">있음 (레이어 추가)</text>

  <!-- Recommend -->
  <rect x="60" y="272" width="760" height="36" rx="4" fill="#111"/>
  <text x="180" y="295" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#e8e8e8">추천 상황</text>
  <text x="340" y="295" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">GPU 충분, 최고성능 필요</text>
  <text x="490" y="295" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">일반적 파인튜닝</text>
  <text x="630" y="295" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">소비자 GPU 환경</text>
  <text x="770" y="295" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" fill="#888">멀티태스크 서빙</text>

  <!-- Verdict -->
  <rect x="60" y="326" width="760" height="34" rx="8" fill="#0d1a10" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="348" text-anchor="middle" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-size="12" font-weight="700" fill="#55c555">현업 권고: QLoRA(소비자 GPU) → LoRA(A100) → Full Fine-tuning(최고 성능 필요시)</text>
</svg>
