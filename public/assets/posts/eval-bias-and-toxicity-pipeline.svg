<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400">
  <defs>
    <marker id="arrow" markerUnits="userSpaceOnUse" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#7ec8e3"/>
    </marker>
  </defs>

  <rect width="880" height="400" rx="12" fill="#0a0a0a"/>

  <!-- Title -->
  <text x="440" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">편향·독성 평가 파이프라인</text>

  <!-- Section label -->
  <text x="440" y="74" text-anchor="middle" font-size="13" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">5단계 자동화 평가 흐름</text>

  <!-- Stage boxes — centered vertically at y=150 (top=110, height=90) -->

  <!-- Stage 1: 프롬프트 세트 (x=60) -->
  <rect x="46" y="108" width="132" height="90" rx="8" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="112" y="142" text-anchor="middle" font-size="13" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-weight="600">프롬프트 세트</text>
  <text x="112" y="162" text-anchor="middle" font-size="11" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">BBQ/ToxiGen</text>
  <text x="112" y="178" text-anchor="middle" font-size="11" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">벤치마크 로드</text>

  <!-- Arrow 1→2 -->
  <line x1="179" y1="153" x2="214" y2="153" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 2: LLM 응답 (x=230) -->
  <rect x="216" y="108" width="132" height="90" rx="8" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="282" y="142" text-anchor="middle" font-size="13" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-weight="600">LLM 응답</text>
  <text x="282" y="162" text-anchor="middle" font-size="11" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">모델 배치</text>
  <text x="282" y="178" text-anchor="middle" font-size="11" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">추론 실행</text>

  <!-- Arrow 2→3 -->
  <line x1="349" y1="153" x2="384" y2="153" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 3: 자동 분류 (x=400) -->
  <rect x="386" y="108" width="132" height="90" rx="8" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="452" y="142" text-anchor="middle" font-size="13" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-weight="600">자동 분류</text>
  <text x="452" y="162" text-anchor="middle" font-size="11" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">Perspective API</text>
  <text x="452" y="178" text-anchor="middle" font-size="11" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">/ 분류 모델</text>

  <!-- Arrow 3→4 -->
  <line x1="519" y1="153" x2="554" y2="153" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 4: 통계 집계 (x=570) -->
  <rect x="556" y="108" width="132" height="90" rx="8" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="622" y="142" text-anchor="middle" font-size="13" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-weight="600">통계 집계</text>
  <text x="622" y="162" text-anchor="middle" font-size="11" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">그룹별 격차</text>
  <text x="622" y="178" text-anchor="middle" font-size="11" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">점수 계산</text>

  <!-- Arrow 4→5 -->
  <line x1="689" y1="153" x2="724" y2="153" stroke="#7ec8e3" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 5: 리포트 (x=740) -->
  <rect x="726" y="108" width="132" height="90" rx="8" fill="#1a1a2e" stroke="#3a4a6e" stroke-width="1"/>
  <text x="792" y="142" text-anchor="middle" font-size="13" fill="#e8e8e8" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-weight="600">리포트</text>
  <text x="792" y="162" text-anchor="middle" font-size="11" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">편향 지수</text>
  <text x="792" y="178" text-anchor="middle" font-size="11" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">독성 비율</text>

  <!-- Stage number badges -->
  <circle cx="112" cy="114" r="11" fill="#7777cc"/>
  <text x="112" y="118" text-anchor="middle" font-size="11" fill="#ffffff" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-weight="700">1</text>

  <circle cx="282" cy="114" r="11" fill="#7777cc"/>
  <text x="282" y="118" text-anchor="middle" font-size="11" fill="#ffffff" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-weight="700">2</text>

  <circle cx="452" cy="114" r="11" fill="#7777cc"/>
  <text x="452" y="118" text-anchor="middle" font-size="11" fill="#ffffff" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-weight="700">3</text>

  <circle cx="622" cy="114" r="11" fill="#7777cc"/>
  <text x="622" y="118" text-anchor="middle" font-size="11" fill="#ffffff" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-weight="700">4</text>

  <circle cx="792" cy="114" r="11" fill="#55c555"/>
  <text x="792" y="118" text-anchor="middle" font-size="11" fill="#ffffff" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif" font-weight="700">5</text>

  <!-- Separator line -->
  <line x1="40" y1="230" x2="840" y2="230" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Section label for metric boxes -->
  <text x="440" y="258" text-anchor="middle" font-size="13" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">산출 지표</text>

  <!-- Metric box 1: 편향 갭 -->
  <rect x="60" y="272" width="358" height="90" rx="8" fill="#12121e" stroke="#7777cc" stroke-width="1.5"/>
  <text x="239" y="302" text-anchor="middle" font-size="14" font-weight="600" fill="#7777cc" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">편향 갭 (Bias Gap)</text>
  <text x="239" y="328" text-anchor="middle" font-size="12" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">취약 집단 vs 비취약 집단 정확도 차이</text>
  <text x="239" y="350" text-anchor="middle" font-size="12" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">gap = acc(privileged) - acc(disadvantaged)</text>

  <!-- Metric box 2: 독성률 -->
  <rect x="462" y="272" width="358" height="90" rx="8" fill="#1a0808" stroke="#e05555" stroke-width="1.5"/>
  <text x="641" y="302" text-anchor="middle" font-size="14" font-weight="600" fill="#e05555" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">독성률 (Toxicity Rate)</text>
  <text x="641" y="328" text-anchor="middle" font-size="12" fill="#888" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif">독성 응답 / 전체 응답</text>
  <text x="641" y="350" text-anchor="middle" font-size="12" fill="#9aa4b8" font-family="'JetBrains Mono','Menlo','Consolas',monospace">rate = toxic_count / total_count</text>
</svg>
