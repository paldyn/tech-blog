<svg xmlns="http://www.w3.org/2000/svg" width="880" height="480" viewBox="0 0 880 480">
  <rect width="880" height="480" fill="#0a0a0a" rx="12"/>
  <text x="440" y="50" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="22" font-weight="700" fill="#e8e8e8" text-anchor="middle">CIA Triad 침해 사례</text>
  <text x="440" y="74" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="14" fill="#888" text-anchor="middle">실제 공격과 CIA 속성 매핑</text>

  <!-- Headers -->
  <rect x="60" y="100" width="200" height="44" rx="6" fill="#7ec8e3" fill-opacity="0.15" stroke="#7ec8e3" stroke-width="1"/>
  <text x="160" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#7ec8e3" text-anchor="middle">기밀성 침해</text>
  <rect x="340" y="100" width="200" height="44" rx="6" fill="#55c555" fill-opacity="0.15" stroke="#55c555" stroke-width="1"/>
  <text x="440" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#55c555" text-anchor="middle">무결성 침해</text>
  <rect x="620" y="100" width="200" height="44" rx="6" fill="#e0a055" fill-opacity="0.15" stroke="#e0a055" stroke-width="1"/>
  <text x="720" y="127" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="#e0a055" text-anchor="middle">가용성 침해</text>

  <!-- Row 1 -->
  <rect x="60" y="160" width="200" height="60" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="160" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e05555" text-anchor="middle">데이터 유출 (Breach)</text>
  <text x="160" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">개인정보 DB 탈취</text>
  <text x="160" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">예) LinkedIn 2012 유출</text>

  <rect x="340" y="160" width="200" height="60" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="440" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e05555" text-anchor="middle">SQL Injection</text>
  <text x="440" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">DB 레코드 변조</text>
  <text x="440" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">예) 게시글 내용 조작</text>

  <rect x="620" y="160" width="200" height="60" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="720" y="183" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e05555" text-anchor="middle">DDoS 공격</text>
  <text x="720" y="201" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">서버 과부하 마비</text>
  <text x="720" y="215" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">예) GitHub 2018 공격</text>

  <!-- Row 2 -->
  <rect x="60" y="240" width="200" height="60" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="160" y="263" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e05555" text-anchor="middle">중간자 공격 (MITM)</text>
  <text x="160" y="281" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">통신 가로채기</text>
  <text x="160" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">예) HTTP 평문 도청</text>

  <rect x="340" y="240" width="200" height="60" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="440" y="263" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e05555" text-anchor="middle">XSS 공격</text>
  <text x="440" y="281" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">페이지 콘텐츠 변조</text>
  <text x="440" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">예) 피싱 폼 삽입</text>

  <rect x="620" y="240" width="200" height="60" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="720" y="263" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e05555" text-anchor="middle">랜섬웨어</text>
  <text x="720" y="281" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">파일 암호화 후 협박</text>
  <text x="720" y="295" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">예) WannaCry 2017</text>

  <!-- Row 3 -->
  <rect x="60" y="320" width="200" height="60" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="160" y="343" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e05555" text-anchor="middle">세션 하이재킹</text>
  <text x="160" y="361" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">타인의 세션 도용</text>
  <text x="160" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">예) 쿠키 탈취</text>

  <rect x="340" y="320" width="200" height="60" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="440" y="343" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e05555" text-anchor="middle">파일 업로드 공격</text>
  <text x="440" y="361" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">웹쉘 업로드</text>
  <text x="440" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">예) PHP 백도어</text>

  <rect x="620" y="320" width="200" height="60" rx="6" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
  <text x="720" y="343" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e05555" text-anchor="middle">ReDoS</text>
  <text x="720" y="361" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">정규식 DoS</text>
  <text x="720" y="375" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">예) 서버 CPU 독점</text>

  <!-- Bottom note -->
  <rect x="60" y="400" width="760" height="50" rx="6" fill="#1a1a0a" stroke="#e0a055" stroke-width="1"/>
  <text x="440" y="421" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="12" font-weight="700" fill="#e0a055" text-anchor="middle">하나의 공격이 여러 CIA 속성을 동시에 침해할 수 있다</text>
  <text x="440" y="439" font-family="'Wanted Sans Variable','Wanted Sans',-apple-system,sans-serif"
        font-size="11" fill="#888" text-anchor="middle">예) SQLi: 데이터 유출(기밀성) + 변조(무결성) + 서버 과부하(가용성)</text>
</svg>
